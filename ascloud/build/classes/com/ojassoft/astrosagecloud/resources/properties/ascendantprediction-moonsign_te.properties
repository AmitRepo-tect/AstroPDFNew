


        
	 ZODIAC_SIGN                           = మేషము#వృషభము#మిథునము#కర్కటకం#సింహము#కన్య#తుల#వృశ్చిక#ధనుస్సు#మకరము#కుంభము#మీన
	 HEALTH_PREDICTION                     = మేష లగ్నం కలిగిన వారు తలనొప్పులు, ప్రత్యేకంగా మైగ్రేన్లు, వడదెబ్బ, నరాల సంబంధ వ్యాధి మరియు వ్యాకులత వంటి వ్యాధులతో తరచుగా బాధపడతారు.  వారు అజీర్ణం మరియు నరాలసంబంధ రుగ్మతలు మరియు దద్దుర్లు, మరియు భౌతికంగా ధ్యాస లేకపోవడం వలన ప్రమాదాలు మరియు శారీరక గాయాలు కలుగుతాయి, అప్పుడప్పుడూ ఉష్ణవ్యాధులైన మొలల వంటివి కూడా కలుగుతాయి. చాలా మంది మేషరాశి జాతకులు, తమ తల లేదా ముఖ ప్రాంతంలో ఒక పుట్టుమచ్చను కలిగి ఉంటారు. మేషరాశిలో జన్మించినవారు, అధిక రక్త పోటు మొ.గు గుండెకు సంబంధించిన సమస్యలను కలిగి ఉంటారు.#వృషభ రాశివారు ప్రధానంగా చాలా బలమైన ఆరోగ్యకర సంకేతమయినా, వారికి బలహీనతల వలన వారి జీవితమంతా సమస్యలు కలుగుతాయి. వీరు తరచుగా నరాల సంబంధ వ్యాధులతో బాధపడుతూ ఉంటారు. వీరిలో చాలామంది, ప్రత్యేకంగా మే నెలలో పుట్టిన వారు అధిక బరువు కలిగి ఉంటారు. వారు లైంగిక వ్యాధులకు బలికావచ్చు. వారు గర్భాశయ వెన్నుపూస, క్రింది దవడ మరియు దంతాలు, చుబుకము మరియు అంగిలి సమస్యలకు సులభంగా గురి అవుతారు. వృషభ రాశి వారిలో, మూత్రపిండముల, జననేంద్రియాల మరియు పిత్తాశయం వలన సమస్యలు, మెడ బిగువులు, గొంతు బొంగురు మరియు చెవినొప్పులు సాధారణంగా కలుగుతాయి.#ఈ రాశి స్వభావం, నరాల బలహీనత, నిరాశావాదం, పిరికిదనం, లేదా అసహనం తో ఉంటుంది. క్షయ, ఆస్థమా మరియు రక్తహీనత అనేవి సాధారణ సమస్యలు. అవి నరాల మరియు శ్వాససంబంధ రుగ్మతలకు దారితీస్తాయి, ప్రత్యేకంగా వినికిడి ఇంద్రియాలకు. శ్వాససంబంధ సమస్యలు మరియు వివిధ నరాలసంబంధ పరిస్థితులు సాధారణంగా ఉంటాయి.#కర్కాటక రాశి లగ్నం కలవారు దగ్గు, అజీర్ణం, వాయువు, మరియు కడుపు, కాలేయం మరియు ప్రేగుల తో సాధారణ సమస్యలను కలిగి ఉంటారు. వారు తరచుగా భావోద్వేగ రుగ్మతలయిన వ్యాకులత, హైపోకాండ్రియా మరియు హిస్టీరియా వంటి వాటికి లోనవుతారు. ఈ అధిక సున్నితత్వం, బలహీనమైన జీర్ణ వ్యవస్థకు, గ్యాస్ట్రైటిస్ మరియు ఇతర ఉదర వ్యాధికి దారితీస్తుంది మరియు దగ్గు మరియు దృష్టి బలహీనత రావడానికి ఆస్కారం ఉంది.#సింహ రాశి యొక్క వ్యాధులలో ప్రధానంగా, రక్తం గడ్డకట్టడం వలన గుండెరక్తనాళాలు మూసుకుపోవడం లేదా మూసుకుపోవడం వలన గుండె నొప్పి రావచ్చు. గుండెదడలతో నరాల ఒత్తిడి గుండెను ప్రభావితం చేయవచ్చు. సింహరాశివారికి వచ్చు వ్యాధులలో వెన్ను నొప్పి మరియు ఊపిరితిత్తుల, వెన్నుపూసల సమస్యలు, గుండె మరియు రక్తానికి సంబంధించిన వ్యాధులు, పక్కటెముకలు మరియు పక్క భాగములలో అస్వస్థత, మూర్ఛలు, ప్లెజంటరీస్, భయంకరమైన జ్వరాలతో, మరియు కొన్ని కళ్ళ సమస్యలు ఉంటాయి.#పెద్ద ప్రేవుల సమస్యలు మరియు మలబద్ధకం అనేవి కన్యారాశివారికి సాధారణ సమస్యలు. మానసిక స్థితిలో మార్పులు మరియు సమయానుసారంగా నిరాశ వంటివి వీరి చుట్టూ ఉన్న ఇతరులను ప్రభావితం చేస్తాయి. కన్యారాశి లగ్నం కలవారు వారి లైంగిక అంగాల సమస్యలను కలిగి ఉంటారు. వారు ఆహార విషయంలో జాగ్రత్తగా ఉండాలి, వారు ఆహారం పట్ల వారికున్న వ్యామోహాహ విషయంలో ఎక్కువ జాగ్రత్తగా ఉండాలి.#చాలామంది తులారాశివారు సున్నితమైన చర్మాన్ని కలిగిఉండి, నిద్రలేమి, అధిక ఆహారం మరియు ఎక్కువగా మత్తుపానీయాలు తీసుకుంటారు. తులారాశి, మూత్రపిండములు మరియు చర్మం, నడుము క్రింది భాగము, పిరుదులు, అడ్రినాల్స్ మరియు వాసోమోటర్ వ్యవస్థ ద్వారా బహిర్గతం చేయు పనులను పాలిస్తుంది. తులారాశి, మూత్రపిండములు, నడుము మరియు అండాశయములను పాలిస్తుంది. నడుము నొప్పి, మరియు అధిక చక్కెర లేదా అధిక ఆహారం తీసుకోవడం వలన కలుగు సమస్యలను పాలిస్తుంది.#వృశ్చికరాశి జననేంద్రియాలను మరియు విసర్జన వ్యవస్థను పాలిస్తుంది. వృశ్చికరాశి, ముక్కు మరియు ముక్కుకు సంబంధించిన ఎముకలు, బహిరంగ ప్రదేశం, జననేంద్రియాలు మరియు హెమోగ్లోబిన్ ను పాలిస్తుంది. వృశ్చికరాశి, కటివలయాన్ని మరియు పునరుత్పత్తి మరియు మూత్ర వ్యవస్థలను పాలిస్తుంది మరియు కాలేయ వ్యాధులు మరియు మూత్రపిండముల వ్యాధులు, జీర్ణాశయంలో లేదా జననేంద్రియాలలో రాళ్ళు మరియు గులకరాళ్ళు సులభంగా కలిగిస్తుంది. వృశ్చికరాశి లగ్నం వారు మూలవ్యాధి మరియు పుండ్లతో బాధపడతారు.#ధనూరాశి వారి యొక్క వ్యాధులు ప్రత్యేకంగా పిరుదులు మరియు తొడలకు వస్తాయి. ఈ రాశివారికి వెన్ను నొప్పి ఎంతోకాలంగా ఉంటుంది. జ్వరంతో సమస్యలు మరియు ఊపిరితిత్తుల వ్యాధులు కూడా గమనించవచ్చు.  అధిక అహారం మరియు పానీయాలు ఎక్కువగా సేవించడం వలన కొన్నిసార్లు పిరుదులలో కీళ్ళనొప్పులు కలగవచ్చు.#మకరరాశి వారు గాలి ద్వారా వచ్చు వ్యాధుల వలన బాధపడతారు. మకరరాశి లగ్నం వారు అంత త్వరగా వ్యాధి బారిన పడరు, కానీ ఒకసారి ఆ లక్షణాల బారిన పడితే అతిరోగభయంకలుగు వారవుతారు. మకరరాశి, కీళ్ళను, జుత్త్ను, దంతాలను మరియు చర్మం మరియు ప్రత్యేకంగా నాడీ వ్యవస్థను పాలిస్తుంది. ఈ రాశివారికి ప్రమాదాలవలన ఎముకలు విరుగుట, బెణుకులు, స్థానభ్రంశము మరియు మోకాళ్ళు మరియు వాటి క్రింద గాయాలు కలగవచ్చు.#కుంభరాశి, రక్త ప్రసరణ వ్యవస్థ, శ్వాస వ్యవస్థ మరియు కంటి చూపులను; క్రిందిభాగపు ఎముకలను పాలిస్తుంది; తరచుగా రక్తం మరియు రక్త ప్రసరణానికి సంబంధించిన వ్యాధితో బాధపడతారు, ఇది రక్తం చెడిపోవుటకు కూడా దారితీయవచ్చు. కుంభరాశి వారు అధికరక్తపోటు మరియు గుండె జబ్బులకు సులభంగా గురిఅవుతారు. కుంభరాశి కాలి మడమలను, రక్తప్రసరణ వ్యవస్థను, బిగువులను, అలర్జీలను, ఊహించని అస్వస్థతను మరియు విలక్షణ ప్రమాదాలను పాలిస్తుంది. వారు వివిధరకాలయిన నరాలసంబంధ రుగ్మతలతో కూడా బాధపడవచ్చు.#మీనరాశి ఎండోక్రైన్ వ్యవస్థను నిర్వహిస్తుంది మరియు మధుమేహం వలన తీవ్రమైన పాదముల సమస్యలు మరియు ఇతర సమస్యలు కూడా కలుగవచ్చు. వాపు, ఔషధాలకు అలర్జిక్ ప్రతిచర్య, పాదాలకు గాయాలు మరియు సంబంధిత సమస్యలు సాధారణమైనవి, కానీ మీనరాశివారి భావోద్వేగ స్వభావం వలన వారు భావోద్వేగ అస్వస్థతకు కూడా గురికావచ్చు.
    TEMPERAMENT_AND_PERSONALITY_PREDICTION = మేషరాశి లగ్నం వారు గొప్ప శక్తిని మరియు బలాన్ని కలిగి ఉంటారు, మరియు వారు ఎల్లప్పుడూ  మొదటి అడుగు వేయడానికి సిద్ధంగా ఉంటారు. వారి వ్యక్తిత్వపు గణనీయమైన లక్షణమేమిటంటే వారి ముక్కుసూటితనము.  వారు సహజసిద్ధ నాయకులు; వారు ఇతరులనుండి ఆదేశాలు అందుకోవడానికి ఇష్టపడరు ఎందుకంటే వారికి వారే యజమానులు కాబట్టి. వారి ముందు చూపు లేకపోవడం వలన వారికి వ్యామోహం ఉంటుంది: ఈ లక్షణం కొన్నిసార్లు, దూకుడు స్వాభావం మరియు అదే సమయంలో బలహీనులుగానూ మరియు ఉన్నత వ్యక్తిత్వం కలిగి ఉండి, అదే సమయంలో సులభంగా ఒప్పించగలుగునట్లుగా లేదా మనవిచేసుకోదగినవారిగా ఉంటారు. మేషరాశి లగ్నం వారు ప్రత్యక్షంగా మాట్లాడతారు మరియు తరచుగా దాపరికం లేకుండా మరియు కుయుక్తులు లేకుండా ఉంటారు; కాబట్టి వారు వేడివేడి ఉచ్ఛారణలు లేదా వాదనలలో సులభంగా దిగిపోతారు. వారు మొండివారు మరియు వారి ఆకస్మిక కోపం తరచుగా చుట్టూఉన్నవారిని ఆశ్చర్యానికి గురిచేస్తుంది కానీ వారికి నచ్చచెప్పడం ద్వారా వారిని సులభంగా మామూలు స్థితికి తీసుకురావచ్చు.  వారి దూకుడు స్వభావము కొన్నిసార్లు వారిని గంభీరమైన సమస్యలలోనికి నెట్టివేస్తుంది. నీరు అంటే అంత ఇష్టం ఉండదు మరియు వారు అందమైన కళలు మరియు హుందాతనాన్ని ఇష్టపడతారు. వారిలో చాలమంది, ముందుగా నిర్ణయించబడిన లక్ష్యం చేరుకున్న తరువాతే విశ్రమించడానికి ఇష్టపడతారు. ఈ రాశిలో జన్మించినవారు సున్నితమనస్కులై, సరసమైన వారుగా, కొన్నిసార్లు భావోద్వేగాలకు లోనవుతారు.#ఈ రాశిలో జన్మించినవారు, క్రొత్తవారి విషయంలో తమస్వభావరీత్యా ఎద్దును పోలి ఉంటారు. వారు కొత్తవారిని కలవడానికి అంతగా ఇష్టపడరు, ఎందుకంటే వారి నిశ్శబ్దంగా, నెమ్మదిగా మరియు అంతర్ముఖ స్వభావం వారిని ఇతరులతో స్నేహపూర్వకంగా ఉండనీయదు. వారికి సరిగా గమనం మరియు వారు చెప్పేది సరిగా వినకపోతే, వారు ఇతరులపట్ల నిర్లక్ష్య, అలక్ష్య ధోరణులను కలిగి, జాగ్రత్తగా ఉంటారు. వారు తరచుగా క్రొత్త మిత్రులను చేసుకోవడంలో కష్టపడుతుంటారు. వారు నమ్మదగినవారు మరియు వ్యావహారులు, కాబట్టి వారు వ్యాపారం బాగాచేయగలరు. వీరు కాముకులు మరియు వీరు అన్ని ప్రదేశాలలో సుఖాన్ని పొందగోరుతారు, అయినా మరొకవైపు వారు కష్టపడువారు మరియు చాలా సార్లు తమకు ఇవ్వబడిన పనిని పూర్తిచేస్తారు, కానీ వారి వేగంతోనే.  ఇతరుల ప్రయత్నాలను కూడా వారు మెచ్చుకుంటారు మరియు వారి ప్రతిభకు బహిరంగానే విలువనిస్తారు.  కొన్నిసార్లు వారు యజమానులుగా ఉంటారు. వృషభరాశివారు అంత సులభంగా ఆకర్షితులుకారు, మరియు వారు ఆకర్షితులైనప్పటికీ, వారు అత్యంత జాగ్రత్తగా ఆ వ్యక్తులవైపు అడుగులువేస్తారు. వృషభరాశివారు, వారి విలువలు మరియు నియమాల గురించి చాలా నిక్కచ్చిగా ఉంటారు, వారి మార్గాన్ని మార్చడం చాలా కష్టం. అయినప్పటికీ, వారు ప్రేమపూర్వకంగా, నిజాన్ని మెచ్చుకునేవారిగా మరియు ఆకర్షక వ్యక్తిత్వం కలవారిగా ఉంటారు. వారు దూకుడు స్వభావం గలవారు కాదు కానీ వారిని బలవంతంగా ముందుకు తోస్తే వారు ఎద్దులవలె ప్రచండమైన వారు. కొన్నిసార్లు, వారు  దురభిమానం, మొండితనం మరియు అహేతుకంగా ప్రవర్తిస్తారు. వారి భాగస్వాములను ఎంచుకోవలసి వచ్చినపుడు వారు అత్యంత జాగ్రత్తగా ఉంటారు. వారిని సులభంగా మోసగించగలిగినా కూడా వారికి అపద్ధాలు చెప్పడం ఇష్టం ఉండదు.#విలక్షణ మిథునరాశివరు చాలా ఉత్సాహంగా, మనోహరంగా  మరియు అద్భుతమైన సంభాషన చతురతలను సున్నితమైన రీతిలో మాట్లాడువారిగా ఉంటారు. వారు చాలా చురుకైన మనసు మరియు శరీరాలు కలిగి ఉంటారు, మరియు వారి వయసుకంటే ఎక్కువ యౌవనంగా కనిపిస్తారు. వారు సృజనాత్మకత కలిగి ఉంటారు. వారి బలహీనతలు, నిరంతరం మారుతున్న మనసు, వారు క్షణక్షణం మనసు మార్చుకుంటారు, వారు ఒకదానికే పరిమితంకారు. వారు అసహనంగా కూడా ఉంటారు, సులభంగా విసుగు చెందుతారు, మరియు ఒకే విషయంపై చాలాసేపు శ్రద్ధవహించలేకపోతారు.. వారి పనులను చక్కబెట్టుకొనుటకు ఇతరులను  సులభంగా ఏమార్చు ధోరణిని కూడా వీరు కలిగి ఉంటారు. కానీ మిథున రాశి వారు వారి ఉనికితో అద్భుతమైన వినోదం పంచడం వలన వారి ప్రతికూల అంశాలు కప్పబడిపోతాయి.  వీరందరూ అసహనంగా ఉండి, వారి మనసులు మార్చుకుంటూ ఉంటారు కావున వారు విశ్వసనీయమైన వారు కాదు. మిథున రాశివారిని వారి తెలివి శాసిస్తుంది మరియు మేధకుసంబంధించిన అన్ని విషయాలనూ వారు గొప్పవిగా పరిగణిస్తారు. కమ్యూనికేషన్ కూడా వారికి చాలా ముఖ్యమవడంతో,  విజ్ఞానమనేది వారికి ఎప్పుడూ అడ్డంకి కాదు. సూర్యరాశులన్నింటిలో మిథునరాశివారు అత్యంత ప్రతిభావంతులు. వారు ఒక ఎంపికను నిర్ణయించి, తదుపరి రోజు దానిని పూర్తిగా మార్చుకుంటారు. మిథునరాశివారు దేనిని ఎప్పుడూ స్థిరంగా నిర్ణయించుకోలేరు. వారు స్వేచ్ఛామనస్కులు, వారికి విషయాలు తెలుసుకోవడంలో ఆసక్తి మరియు కోరిక ఉంటాయి. మిథునరాశివారు అరుదుగా ఏదైనా పనిలో తీవ్రంగా నిమగ్నమవుతారు మరియు వారు నిమగ్నంకాని ఏదైనా వారికి ఎత్తుగడ లాగా అనిపిస్తుంది. వారు స్వీయనియంత్రణ లేనివారై ఉంటారు.#కర్కటరాశివారు స్వప్నమయ, అంతర్భుద్ది, భావోద్వేగ లక్షణాలను కలిగి ఉంటారు మరియు వీరికి సురక్షితమైన తిరోగమనం అవసరం. వారు అద్భుతమైన సంభాషణా మరియు భాషా నైపుణ్యాలను అంతర్గతంగా కలిగిఉంటారు. వారు త్వరితబుద్ధిని, మేధాశాలియై, చురుకైన, పరస్పర విరుద్ధస్వభావం కలిగినవారిగా ఉంటారు. వారికి కొంత దైవభక్తి కూడా ఉంటుంది, వీరిలో కొందరు అతీంద్రియ ధోరణులను కలిగ్ ఉంటారు. వారికి అద్భుతమైన జ్ఞాపకశక్తి నైపుణ్యం ఉంటుంది. వారి దయగలిగి, సున్నితమనస్కులై మరియు కారుణ్యం గలవారై ఉంటారు. వారు గృహపరంగాఅ మరియు వారి సంతృప్తికి తగిన విధంగా వారి గృహవాతావరణాన్ని పొందుతారు. వ్యక్తిగత సంబంధబాంధవ్యాలలో, కర్క రాశివారు కఠినత్వం మరియు మృదుత్వం, కలయికతో మరియు భావోద్వేగం, శృంగారం మరియు మనోభావాలు ఒక వైపు, మొండితనం మరియు రాజసం మరొక వైపు కలిగి ఉంటారు. వారు ధారణశీల జ్ఞాపకశక్తి కలిగి ఉంటారు మరియు అరుదుగా అగౌరవాన్ని మరియు హానిని క్షమిస్తారు. కర్కటరాశివారు “అయిపోయిందేదో అయిపోయింది” అనే వాక్యాన్ని అంతగా విశ్వసించరు: వారి తప్పిదాన్ని ఎప్పటికీ మరచిపోరు. భావోద్వేగ స్వభావం కలిగి ఉన్నవారు కాబట్టి, వారు మిత్రులలో ఉత్తమంగా లేదా అధమంగా ఉంటారు. వారు ఉత్సాహంగా మరియు చాలా జాగ్రత్తగా ఉమ్టారు మరియు వారు చేయుపనులలో మంచి ఉత్పాదకత కలిగిఉంటారు.#ఈ జన్మరాశిలోనివారు క్రియాశీలక మరియు ఆకర్షణీయమైన వ్యక్తిత్వం కలిగి ఉంటారు. విలక్షణ సింహరాశి వారు ఔత్సాహికులు, ధైర్యవంతులు, బలమైన సంకల్పం గలవారు, అనుకూలభావాలు గలవారు, స్వతంత్రులు మరియు ఆత్మవిశ్వాసం కలవారై ఉంటారు. వారు ముక్కుసూటిగలవారు మరియు సరళమైన వ్యక్తులు, వారికి కావలసినది వారికి బాగా తెలుసు మరియు దానిని సంపూర్ణ ఉత్సాహం మరియు సృజనాత్మక స్పూర్తితో చేస్తారు. సాధారంగా వారు నిగ్రహం కలవారు, కానీ కుట్ర లేదా దురాక్రమణ వలన బాగా బాధపడినపుడు, కొన్నిసార్లు వారు నిర్మొహమాటంగా మరియు అసహ్యంగా ప్రతిస్పందిస్తారు. వ్యక్తిగత  విమర్శలను సహించరు మరియు వారి ఆధిపత్యాన్ని ప్రశ్నించినపుడు. వారికి ఆకస్మిక కోపం వస్తుంది. వారు మొండివారు మరియు ఒక నమ్మకానికి లేదా ఒక చర్యకు మంచి, చెడు సమయాలలో కట్టుబడి ఉంటారు. ఆదర్శవంతమైన మరియు మానవీయ స్వభావాని కలిగి ఉంటారు. ప్రధానంగా, సింహరాశివారు స్వతంత్రంగా, ఆనందంగా, జాలిగుండెకలవారిగా మరియు ఉదాత్తంగా ఉంటారు, మరియు స్వీయవ్యక్తీకరణ, తెలివైనవరిగా మరియు విశాలమనస్కులై ఉంటారు. వారికి ఒక స్థిరమైన నిశ్చయం ఉంటుంది కానీ కొద్దిగా రెచ్చగొడితే కూడా విపరీతమైన కోపం వస్తుంది, కానీ అంతలోనే తగ్గిపోతుంది. వారికి అసూయ అనేది చాలా కాలంపాటు ఉంటుంది మరియు వారు స్వతంత్ర ఆలోచనాపరులు. వారు మతపరంగా సనాతన భావాలకు కట్టుబడి ఉంటారు కానీ ఇతర ధర్మసూత్రాలకు మరియు అభ్యాసాలను సహిస్తారు.#కన్యారాశి లగ్నం వారు బిడియస్తులు మరియు మర్యాదస్థులు మరియు మృదువుగా మాట్లాడతారు. తమ సామాజిక స్థితిని పెంచేందుకు సహాయపడే మిత్రులకొరకు వారు చూస్తారు. అడ్డంకులు ఎదురైనపుడు, వారు ప్రశాంతంగా మరియు హేతుబద్దంగా ఉంది పరిష్కారాన్ని కనుగొంటారు. ఈ ప్రశాంతత కొన్నిసార్లు నెమ్మదిగా ఉండి లెక్కించదగినట్టుగా కనబడుతుంది. వారు సంక్లిష్ట సమస్యలను చాలా వరకు విశ్లేషించి పరిష్కరించు సామర్థ్యాన్ని కలిగిఉంటారు. వారు వివరాలను నిశితంగా పరిశీలిస్తారు మరియు అందుకే తరచుగా సమస్యలను నిర్లక్ష్యం చేస్తారు. వారు తెలివైనవారు మరియు తరచుగా ఉన్న వాస్తవం యొక్క మలినమైన మరియు కలవరపెట్టు వాటిని స్వల్పంగానే చేస్తారు. కన్యారాశి లగ్నం వారు చాలా స్నేహపూర్వకంగా మరియు దాదాపు అన్ని విషయాలలో విజ్ఞానవంతులుగా ఉంటారు మరియు సాధారణంగా బాగాగమనించువారు, చురుకైన వారు, క్లిష్టమైన వారు మరియు సహనశీలురుగా ఉంటారు. వారు స్నేహం చేయడంలో చాలా నిర్ధిష్టంగా ఉంటారు మరియు చూడడం ఆధారంగానే వారి సంబంధబాంధ్యవాలను నడుపుతారు. కన్యారాశి లగ్నం వారు బాధపడడం మరియు రోగభ్రమను కలిగి ఉంటారు. వారు ఇతరులకు సహాయపడాలని అనుకుంటూ ఉంటారు, ఇది వారిని తరచుగా దురుపయోగం మరియు నిరాదరణకు గురిచేస్తుంది. కన్యారాశి లగ్నంవారు చిన్న విషయాలలో తప్పులు కనిపెట్టడం, పోట్లాడడం మరియు తన గురించి మరియు ఇతరులగురించి విమర్శనాత్మకంగా ఉంటారు.#తులారాశి లగ్నంవారు వాదనలలో వారు సరిగా ఉన్నప్పటికీ, మిగిలిన  సహకరించడానికి, రాజీపడడానికి దానిని అంతటితో వదలివేయడానికి, సిధ్దంగా ఉంటారు. ఇతరులతో విభేదం వారిని అసురక్షితంగా, అసౌకర్యంగా భావింపజేస్తుంది. వారు వారి జీవితాలలో సామరస్యాన్ని కోరుకుంటారు మరియు దానిని పొందడానికి ఏమైనా చేస్తారు. వారు నమ్మదగినవారు కాదు మరియు మొహమాటస్థులు, దినచర్య వలన అసహనంగా ఉంటారు, విసుగ్గా మరియు సిగ్గుపడు స్వభావం కలిగి ఉంటారు. తులారాశి లగ్నం వారికి కోపం నెమ్మదిగా వస్తుంది మరియు వారి ఆకస్మిక కోపాలతో తమ చుట్టూ ఉన్న ప్రతి ఒక్కరినీ ఆశ్చర్యంలో ముంచెత్తుతారు. వారు వాస్తవికుల కుంటే ఆదర్శవంతులుగానే ఉంటారు; తరచుగా గాలిలో మేడలు కట్టే పథకాల గురించి ఆలోచిస్తారు. ఒక విలక్షణమైన తులారాశి వారు కళాత్మకంగా మరియు శుద్ధంగా ఉండి సరి మరియు తప్పులలో నిర్ధిష్టమైన అభిప్రాయాన్ని కలిగి ఉంటారు మరియు  వారు యోగ్యులు కానీ ఆకర్షణీయులు మరియు నిబద్ధులు. వారు అమితమైనవారు మరియు సాధారణంగా శాంతికాముక స్వభావం కలిగినవారు; సులభంగా కలిసిపోయెడువారు మరియు సంఘజీవులు. తులారాశి లగ్నం వారు అత్యంత శుద్ధమైనవారిగా కూడా పరిగణింపబడతారు. మీరు అందమైన వారు మరియు కొంత ఆడంబరత, ఆకర్షణ మరియు మంచి అభిరుచి గలవారు. వారు సంఘంలో కలవడానికి ఎంతో ఇష్టపడతారు, దీనితో వారి సామాజిక స్థితి పెరుగుతుంది. ఒక నిర్ణయం తీసుకోవడంలో వారు ఉద్దేశపూర్వకంగా మరియు నిస్పాక్షికంగా వ్యవహరిస్తారు.#వృశ్చికరాశి లగ్నంవారు వారి లక్షణాలయిన స్వీయ-విమర్శ, అతిశ్రద్ధ మరియు మార్గదర్శకులుగా ఉండి, సంపూర్ణ విజయం లేదా దారుణ వైఫల్యాన్ని పొందుతారు. వారిని కొంచెం రెచ్చగొడితే కూడా వారికి అకారణ కోపంతో పాటుగా స్వీయనాశక రేఖ కూడా ఉంటుంది. వారు వారు ప్రేమించే వారి పట్ల తరచుగా చాలా అనుమానించతగ్గవారిగా మరియు అసూయాపరులుగా ఉంటారు. వారి భావోద్వేగం వారి కెరీర్ లో చాలా ఆశ్చర్యకరంగా ఉంటుంది, అది పరిస్థితులను బట్టి వారి బాగా లేదా దారుణంగా ఉంటుంది. విలక్షణమైన వృశ్చికరాశి లగ్నం వారు నిశితమైన మరియు శక్తివంతమైన స్వభావాలను కలిగిఉంటారు.  వారు మొడిగా, గర్వంగా మరియు ప్రశాంతంగా ఉంటారు. వారు ఎప్పుడూ స్థిరంగా ఉండరు మరియు వారికి జీవితం సంపూర్ణంగా జీవించాలి లేదా అసలు జీవించకూడదు అని అనిపిస్తుంది. క్రియాశీల చట్రంలో అరుదుగా కనిపిస్తారు కానీ ఎల్లప్పుడూ ఏమి జరుగుతుందో గమనిస్తూ ఉంటారు. వారి కరుణా గుణం వలన వారు అత్యుత్తమంగా ఉంటారు మరియు అత్యంత విశ్వాసం గల మిత్రునిగా ఉంటారు కానీ అదే గుణం కొన్నిసార్లు వారికి భయంకరమైన శత్రువులను కలిగిస్తుంది. వారు తమ సంపూర్ణ శక్తిని, ఆత్మవిశ్వాసాన్ని, కోరికను మరియు ఉదారతను తాము చేసే పనిలో ఉంచినపుడు వారు ప్రతి విషయంలోనూ మరియు ఏవిషయంలోనైనా కూడా అత్యుత్తమంగా ఉంటారు. వారి ఇతరులను దబాయించి అడుగుతారు కానీ వారు చేయలేని పనిని మాత్రం ఎప్పుడూ అడగరు.#విలక్షణమైన ధనూరాశి వారు ప్రకాశవంతంగా, సూర్య తేజస్సుతో మరియు భవిష్యత్తు పట్ల అలవికాని ఆశావద దృక్పథంతో ఉంటారు. సాధారణంగా వారు మంచిస్వభావం, అనియంత్రిత హాస్యప్రియులు మరియు స్పూర్తిదాయక ఆధ్యాత్మిక చింతన కలిగి ఉంటారు. ప్రతికూల పరిస్థితులలో, వారు అసహనంగా, బాధ్యపట్ల భయంగా, శాంతంగా, మూఢత్వం మరియు అభివృద్ధిని తిరస్కరించువారిగా ఉంటారు. వారిని ఇతరులు అనాలోచితంగా తప్పుగా అర్థంచేసుకుంటారు ఎందుకంటే సంభాషణలో వారి తొందరపాటువలన. వారికి జూదం పట్ల అనుబంధంకూడా ఉంటుంది. ఈ రాశిలో జన్మించినవారు ఆశావాదం, కాంక్ష, ప్రేరణ, ఉత్సాహం మరియు వ్యాప్తిని కలిగి ఉంటారు. ధనూరాశివారికి జీవితం పట్ల అనుకూల దృక్పథం ఉంటుంది, వారు సంపూర్ణ కార్యసాధన, శక్తి, బహుముఖ ప్రజ్ఞా, సాహసం మరియు తమ అనుభవాన్ని వీలయినంతగా వ్యాప్తి చేయడానికి ఉత్సాహం కలిగి ఉంటారు. వారు అనవసరంగా మాట్లాడరు, వారి వాగ్ధాతి తరచుగా ఇతరులను ఆకర్షిస్తుంది. వారు ప్రయాణాలు చేయుటను మరియు పరిసరాలను శోధించుటను ఆనందిస్తారు. వారు గౌరవం, నిజాయతీ, నమ్మకం, ఉదారం మరియు నిబద్దత, న్యాయంవైపు వ్యామోహాన్ని కలిగినవారు. వారు సాధారణంగా హుందాగా ఉండి, బలమైన నిజాయతీ భావనతో ఆధ్యాత్మికత వైపు దృష్టిని కలిగి ఉంటారు. ధనూరాశివారు బలమైన సంకల్పం మరియు కార్యాలు బాగా నిర్వహించు సామర్థ్యం కలిగి ఉండే ఈ కలియక ఏదైనా కార్యాన్ని విజయవంతంగా పూర్తి చేయగలదు.#మకరరాశి లగ్నంవారు తరచుగా తాము మతపరమైన వారిగా అందరికీ కనిపిస్తారు కానీ వాస్తవంగా వారు కనబడునట్లుగా మతపరమైన వారుకాదు. వారు స్వార్థపరులు,  జిత్తులమారులు, నిగూఢమైన వారు మరియు స్థిరమైనవారు. వారు వినడం కంటే ఎక్కువగా మాట్లాడతారు; అందుకే వారు మాట్లాడుతున్నదానిపై తరచుగా నియంత్రణ కోల్పోతారు మరియు ఇది ఇతరులు బాధపడడానికి దారితీస్తుంది. విలక్షణమైన మకరరాశివారికి మంచి నిర్వహణా నైపుణాలు ఉంటాయి, వారు శుభ్రంగా ఉంటారు, వారు వాస్తవంగా చాలా కఠినంగా ఉంటారు. వారికి శక్తివంతమైన నైతిక, ప్రాపంచిక ధోరణులు, సాంప్రదాయక రేఖలు, లోకాచారము మరియు అధికారానికి గౌరవమిచ్చుట ఉంటాయి. మకరరాశి లగ్నంవారు ఔత్సాహికులు, గంభీరమైన వారు మరియు బాధ్యతలకు అంకితమైనవారుగా ఉంటారు కానీ కొన్నిసార్లు ప్రతీకారంతీర్చుకుంటారు; వీరు క్రమశిక్షణ, భాధ్యత మరియు ఆచరణాత్మకంగా ఉంటారు, కానీ కొన్నిసార్లు, వారు తమపై తామే జాలి కలిగి ఉంటారు. వీరి వాదనాపటిమ అద్భుతంగా ఉంటుంది మరియు ఉద్దేశము మరియు దిశవైపు శక్తివంతంగా పనిచేస్తారు. మకరరాశివారు మిగిలినవారితో నడుచుకొనునపుడు, శాంతంగా మరియు బిడియంగా ఉన్నట్టు కనబడతారు, కానీ ఒకసారి నమ్మకం ఏర్పడితే వారు విశ్వాసం మరియు నమ్మకాన్ని కలిగిఉంటారు. వీరికి  వారికి సామజిక స్పృహ, వారు కోరుకున్న దానికొరకు పాటుపడడం మరియు ఆత్మస్థైర్యము అనేవి చాలా ముఖ్యము. వారికి దార్శనికత కంటే ఆచరణ విధానమే ఉంటుంది. వారి స్వీయ సంతోషం కొరకు వారు ప్రేమ లో పడడానికి సామర్థ్యం కలిగి ఉంటారు.#విలక్షణమైన కుంభరాశివారు సంభాషణ కొరకు తీవ్రమైన కోరికకలిగి ఉంటారు. సాంప్రదాయక దిశలో తమ అభిప్రాయాలు ఎక్కువగా ఉన్నవారి గురించి మీరు మీ స్థిరమైన ప్రసారణాన్ని నవీకరించలేకపోయినట్లయితే మీరు నేర్పులేని, మొరటు వారుగా ఉండిపోతారు. వారు ఆసక్తి కలవారు మరియు ఆకర్షణ కలవారు; సిగ్గరి, సున్నితమనస్కులు, హుందాతనం కలిగినవారు మరియు సహనశీలురు లేదా ఉత్సాహవంతులు మరియు ప్రదర్శనకారులు అవడానికి తగిన ధోరణికలిగినవారు. వారు బలమైన అభిప్రాయాలను కలిగి ఉంటారు మరియు వారు నమ్మినదానికొరకు పోరాడతారు; భావుకులు మరియు మార్గదర్శకులు. వారు సాధారణంగా పక్షపాతము లేనివారు మరియు ఇతరుల దృష్టికోణాన్ని సహించువారుగా ఉంటారు. వారు శ్రద్దగా వినువారు మరియు వారి మిత్రులను బాగా చూసుకొనువారుగా ఉంటారు. వారు దయాహృదయులు మరియు స్వచ్ఛంగా మరియు నిష్కపటిగా ఉంటారు. వారు నాగరికమైనవారు మరియు ఆదర్శవంతమైనవారు, శృంగారపరులు మరియు ఆచరణకారులు, సుందరమైన మరియు మనోహరమైన వ్యక్తులు. వారి వాస్తవ ఆలోచనలను నమ్మవచ్చు. వారు అవసరమైనపుడు వారి మార్గాన్ని దాటి సహాయపడతారు కానీ వారు ఎపుడూ భావోద్వేగం చెందరు.#మీనరాశి లగ్నంవారు ఆచరణకారులు కారు కానీ సున్నితమనస్కులు మరియు సహజసిద్ధమైనవారు. వారు బహుముఖ ప్రజ్ఞాశాలురు మరియు వారు విషయాలను తర్కముతో గాక  అర్థంచేసుకోగలరు. తమ నడవడిక యొక్క పరిశీలనలో మొండివారు మరియు వారి ఛాందసత్వం తప్ప దేనినైనా వదులుకుంటారు. మీనరాశివారు ఆత్మవిశ్వాసం గలవారు, విశ్వాసం గలవారు, గృహంపట్ల ఇష్టంగలవారు, దయగలవారు మరియు ఉదారులు. వారిని సులభంగా ఏమార్చవచ్చు. వారి కలలుకనే స్వభావం మరియు ఆచరణసాధ్యంకాని స్వభావం వారి సమీప వ్యక్తులకు బాధాకరంగ ఉంటుంది. ఆశావాది మరియు నిరాశావాది స్వభావాల కలయికతో, వారు ఏదైనా విషయంపై వారి మనసులను సరిగా లగ్నం చేయలేకపోతారు. విలక్షణ మీనరాశివారు సిగ్గరులు మరియు వారివద్దకు వచ్చువారందరికి ప్రేమాభిమాలానను పంచుతారు. వారు ఎల్లప్పుడూ హుందాభావనలో శృంగార పరులు మరియు వారిస్వంత భావనల కొరకు మంచి కీర్తిని కలిగి ఉంటారు. మీనరాశివారు అతీంద్రియ మరియు మతపరభావనలు కలిగి ఉంటారు. వారు హుందాతన, సహనశీల స్వభావాన్ని కలిగి ఉంటారు కానీ దానికి పోత అవసరం. వారు తమ పరిసరాలను, అవి మంచివైనా లేదా చెడ్డవైనా వాటిని అనుసరిస్తారు; వీరు ఉదారులు, స్నేహపూర్వకమైన వారు మరియు మంచి స్వభావం కలవారు. వీరికి కరుణ, జాలి వంటి నిజమైన భావనలు ఉంటాయి మరియు ఇతరులపట్ల మంచిభావనలతో పాటు, ప్రతిదానికి సున్నితంగా స్పందిస్తారు.
    PHYSICAL_APPEARANCE_PREDICTION         = మేషరాశి లగ్నంవారు బలమైన మరియు కండలుతిరిగిన లక్షణాలతో, చూపైన చుబుకం, ముక్కు మరియు నోరు కలిగి ఉంటారు. వారు దృఢంగా, సుమారు ఎత్తు మరియు ఆకారం కలిగి, రింగు రింగుల జుట్టు, వంపుతోకూడిన కనుబొమ్మలు, చామనఛాయతో, మగవారికొరకు శృంగారధోరణి, మరియు ఆడవారికొరకు హుషారుగా ఉంటారు.  మొత్తం శరీరాకృతిపై సామర్థ్యం మరియు బలమైన ముద్ర కనిపిస్తుంది. వారు సాధారణంగా గోధుమవర్ణం లేదా లేత నలుపురంగు రింగుల జుట్టును కలిగి ఉంటారు. వారికి తమ తలపై ఒక గుర్తు లేదా గాయం ఉంటుంది. చాలామందికి సిరలు ప్రముఖంగా కనిపిస్తాయి మరియు అవి వారి శరీరంపై గాయాల గుర్తులు.#వృషభరాశి లగ్నంవారు పొట్టిగా ఉండి, తరచుగా  మరియు వదులుగా ఉంటారు. సాధారణంగా వారు అందమైన ముఖంతో, పెద్దపెద్ద మెరిసే కళ్ళతో, చెవులు, ముక్కు తీర్చిదిద్దినట్లుగా ఉండి, దొండపండు పెదవులు కలిగి ఉంటారు. శరీర నిర్మాణంలో వారు వారి ముఖం అందంగా ఉన్నట్టుగా అదృష్టవంతులు కాదు, వారి శరీరం చతురస్రాకారంగా ఉంటుంది, కండలు తిరిగిన దేహం లాగా ఉండదు, వారికి వీపుపై లేదా పక్కలలో మచ్చలు ఉంటార్యి. వృషభరాశి లగ్నం వారు తరచుగా మంచి ఆకారాన్నే కలిగి ఉంటారు.#మిథునరాశి లగ్నం వారు మెరిసే కళ్ళను మరియు భావవ్యక్తీకరణ లక్షణాలు కలిగి ఉంటారు, అవి బాగా తెలియజేసేటట్టుగా ఉంటాయి. వారు సన్నని ఆకారం మరియు సుమారు ఎత్తును, మృదువైన, నాజూకైన మరియు నాడీకండరాలతో ఉంటారు. వారి అవయవములు ఫ్యాషన్ మాడల్స్ కు ఉన్నట్లుగా ఉంటాయి; మిథునరాశివారు కూడా అందమైన మరియు చూడదగిన రూపం కలిగి ఉంటారు. వారి అందమైన ముఖ్యం చిన్ని చుబుకంతో ఉండి మరియు తెల్లటి వర్చస్సు కలిగి ఉంటుంది. వారి ఆకర్షణీయమైన రూపానికి రింగుల జుట్టు అదనపు ఆకర్షణగా ఉంటుంది. వారికి విశాలమైన నుదురు మరియు ప్రకాశవంతమైన కళ్ళు ఉంటాయి. కానీ అలాంటి ఆకర్షణీయమైన లక్షణం మరియు రూపం ఉన్నప్పటికీ, వారు తరచుగా జబ్బును మరియు ఆరోగ్య సమస్యలను కలిగి ఉంటారు.#కర్కటరాశి లగ్నం వారు గుండ్రని రూప లక్షణాలను కలిగి ఉండి వారి ముప్పయ్యవ పదిలో లావుగా అయ్యే అవకాశం ఉంది. వారి జుట్టు నల్లగా మరియు పలుచగా లేదా దూరదూరంగా ఉంటుంది. ముక్కు చిన్నదిగా, కళ్ళు వెలుపలికి వచ్చినట్లుగా, మరియు చుబుకం గుండ్రంగా ఉంటుంది. ఈ రాశివారు వారి అందం పరంగా, వారి శరీర నిర్మాణం పరంగా అంతగా అదృష్టవంతులు కారు మరియు వారు చాలా ఎత్తుగా ఉండరు కానీ వారి శరీరం పైభాగం విశాలంగా ఉంటుంది. వారు సాధారణంగా తెల్లగా ఉండి, వారి ముక్కు చక్కగా ఉంటుంది.#సింహరాశి లగ్నంవారు ఆకర్షణీయమైన వ్యక్తిత్వం గలవారు, తరచుగా జనులపై ఒక మనోహరమైన మరియు అయస్కాంతం ఛాయను నిలుపుతారు. కానీ నిర్మాణ పరంగా వారు సుమారు ఎత్తును మరియు వారి శరీరం పైభాగం అందంగా మలచబడి ఉండి, అంతగా అందమైనవారిగా కనబడరు. సింహరాశివారి ముఖ్యం పెద్దగా కోడిగుడ్డు ఆకారంతో ఉండి, పసుపుపచ్చ రంగు కళ్ళను, చూపైన చుబుకాన్ని కలిగి ఉంటారు.  సింహారాశికి చెందిన పురుషుడు మరియు స్త్రీ, నియంత్రణలో ఉన్నట్లుగానే కనిపించినా కూడా వారు సులభంగా కయ్యానికి కాలు దువ్వుతారు. వేగంగా ప్రతిస్పందించడం మరియు దూకుడు అనేవి వీరికి సాధారణం, ఎందుకంటే ఇది వారికి బలము మరియు అభిరుచి కాబట్టి.#కన్యారాశి లగ్నంవారు తరచుగా తేలికగాతీసుకొను సంచారవాదం లేదా సామాన్య వైపరీత్య రూపును కలిగి ఉంటారు. కన్యారాశి యొక్క శరీర రూపం, ప్రత్యేకంగా ముఖం, బాగా ఉండకపోవచ్చు మరియు శరీరం కొంత “కురుచ” గా ఉంటుంది. వారి జాగ్రత్త నడక, అనురూపమైన శరీరాలు మరియు విలక్షణ యౌవనం, అమాయక లక్షణాలు వారి నడవడికను చెబుతాయి. వారికి మంచి నుదురు, చూపైన ముక్కు మరియు వెడల్పాటి చుబుకం ఉంటాయి.#తులారాశి లగ్నం వారు విభిన్నమైన మరియు విలక్షణమైనవారు, ఆకర్షణీయ శరీరాకృతి, అందమైన పెదవులు మరియు విముక్తిని ప్రేరేపించు మరియు ఆత్మవిశ్వాస నుదురు కలిగి ఉంటారు. ఈ కురుచ జాతి అవగాహన సాధారణంగా విసుగ్గా లేదా గోధుమరంగులో ఉండి, పరుషమైన మరియు సూటి దృష్టిని కలిగి ఉంటారు. తులారాశి లగ్నం వారు నిర్మాణాత్మక వంపులతో స్థిరమైన నిర్మాణం కలిగి ఉంటారు. తులారాశి లగ్నం వారి గురించిన హడావుడి మృదుస్వభావాన్ని హుందాతనంగా వివరించబడింది. తరచుగా, ఈ రాశి స్త్రీలు, చిన్న ఆకారంగా కాకుండా చూడడానికి అందంగా ఉంటారు, పురుషులు పిరికిగా, లావుగా ఉంటారు. మధ్యస్థ పరిమాణ నిర్మాణం లేదా కొన్ని సార్లు పొడవుగా ఉంటారు.#శారీరకంగా, వృశ్చికరాశి వారు బలిష్టంగా మరియు తరచూ విశాలమైన బలమైన భుజాలను కలిగి ఉంటారు. ఎలాగైతేనేం వారు మంచి నిర్మాణం కలిగి, మంచి నిరోధకతను కలిగి ఉంటారు. వారి ముఖం చతురస్రాకారంతో, స్పష్టమైన రూపురేఖలతో, చొచ్చుకుపోయే మరియు ఆకర్షణీయమైన కళ్లతో, మరియు అందమైన పెదవులతో ఉంటుంది. జుట్టు గోధుమరంగులో దట్టంగా ఉంటుంది. అందమైన, శక్తివంతమైన, గోప్యమైన మరియు గంభీరమైన లక్షణాలు ఒకేసారి వారి రూపంలో సాధారణంగా కనబడుతాయి.#శారీరకంగా, ధనూరాశి లగ్నంవారు చాలా బలంగా, పొడవుగా మరియు చాలా సందర్భాలలో చాలా పొడవుగా, సంపూర్ణ మరియు బహిరంగ లక్షణాలతో చిరునవ్వుతో కూడిన పెదవులతో, దట్టమైన జుట్టును కలిగి ఉంటారు. వారు శక్తిని మరియు ఆకర్షణను వ్యాపింపజేస్తారు. వారికి వయస్సు వచ్చే కొద్దీ లావుగా తయారవుతారు ఎందుకంటే వారి ముప్ఫై సంవత్సరాల వయస్సులో అన్ని రకాలుగా అధిక ఆనందం పొందుతారు కాబట్టి వారు బరువు పెరుగుతారు. వారి కండరాలు అంతగా దృఢంగా ఉండవు. ధనూరాశి సాధారణ రూపు ఆకర్షణీయమైనదిగా, ఉత్సాహభరితంగా మరియు శక్తివంతంగా కనిపిస్తుంది. వారు సరదాగా ఉంటుంది మరియు వారి వేషధారణ సాధారణంగా ఉంటుంది కానీ ఎప్పుడూ వారి ఉదాత్తమైన స్వభావం, సందర్భానికి తగినట్టుగా ఉంటుంది.#మకరరాశి లగ్నంవారు సన్నగా, పీలగా, అంతగా అందంగా లేకుండా, సుమారు ఎత్తును కలిగి ఉంటారు. వారి లక్షణాలు సూక్ష్మంగా, ఉలితో కొట్టినట్టుగా ఉండి, లోతైన, గంభీరమైన కళ్ళను కలిగి ఉంటాయి. వారికి వారి కనుబొమ్మలపై మరియు ఛాతీపై బిగుతైన జుట్టు ఉంటుంది. సాధారణంగా పెద్ద తల మరియు పెద్ద దంతాలను , కొన్నిసార్లు పెదవులపైకి ఎత్తుపళ్లలాగా వచ్చి ఉంటాయి. వారి సాధారణ రూపు, క్రూరత్వాన్ని, దృఢత్వాన్ని, గాంభీర్యాన్ని మరియు పరిపక్వతను కలిగి ఉంటుంది.  వారి చూపు తటస్థంగా, నిగ్రహంగా మరియు సాధారణంగా ఉంటుంది. వారి ఆందోళన వాస్తవంగా ఉంటుంది, కళాత్మకంగా కాదు, దీనికి వారు శ్రద్ధవహించరు. వారు తరచుగా ఒక శాస్త్రవేత్త లేదా తత్త్వవేత్త లేదా పండితుడు లేదా తెలివైన వ్యక్తి లాగా కనిపిస్తారు.#కుంభరాశి లగ్నంవారు తరచుగా సన్నగా, పొడవుగా ఉమ్టారు. వారి ముఖం, మెడ, వీపు, కడుపు, నడుము, తొడలు మరియు కాళ్ళు పెద్దవిగా కూడా ఉండవచ్చు. వారికి క్రమమైన, ఆహ్లాద లక్షణాలు ఉంటాయి, నల్లని దట్టమైన జుట్టు ఉండి వారి జుట్టు రూపం గంభీరంగా మరియు అసాధారణంగా ఉంటుంది. ముఖకవళికలు అందంగా, గంభీరంగా ఉంటాయి. కళ్ళు జీవం ఉట్టిపడేలాగా మెరుస్తుంటాఅయి మరియు ఏదైనా తప్పును వెతుకుతుంటాయా అన్నట్లు ఉంటాయి. వారి సంపూర్ణ రూపు చాకచక్యంగా మరియు వాస్తవికంగా కనిపిస్తుంది. వారి చూపు విపరీతంగా లేదా గంభీరంగా ఉంటుంది. ఏవిషయంలోనైనా అది ఎల్లప్పుడూ ఆశ్చర్యంగొలిపే విధంగా ఉంటుంది.#మీనరాశి లగ్నంవారు తరచుగా బొద్దుగా ఉంటారు మరియు సుమారైన నిర్మాణం కలిగి ఉంటారు, ఎందుకంటే వారి రాశి వ్యత్యాసయుతం కానేకాదు. ఇది రాశి చక్రంలో విభిన్న రూపాలలో ఉండే ఒకే ఒక రాశి. వీరి కళ్ళు పెద్దవిగా, ఆకర్షణీయంగా, స్థిరంగా లేదా నెమ్మదిగా, మరియు సమ్మోహకంగా ఉంటాయి. మొత్తం ఆకారం ఉన్నతమైనదిగా, రహస్యమైనదిగా, దయాళుస్వభావంగా మరియు ప్రశాంతంగా ఉంటుంది. వాస్తవంగా, మీనరాశివారి బాహ్య రూపం, వారి అంతుచిక్కని వ్యక్తిత్వం వలనే అంచనావేయడానికి సాధ్యంకాదు!
    WELLNESS                               = ఆరోగ్యం
    DISPOSITION_PERSONALITY                =  కొరకు స్వభావము & వ్యక్తిత్వం
    PHYSICAL_APPEARANCE                    = కొరకు భౌతిక రూపము
















 