
	FAV_PERIODS						= शुभ घड़ी
	FAV_MARRIAGE_HEAD					= विवाह के लिए शुभ समय
	FAV_MARRIAGE_DESC					= विवाह जीवन का एक महत्वपूर्ण पड़ाव है। कभी-कभी कुछ कारणों की वजह से विवाह में विलंब आते हैं। वहीं वैवाहिक जीवन में भी कुछ परेशानियां आती हैं। इस संबंध में हमने पूरी कोशिश की है कि आपको जन्म कुंडली के आधार पर सटीक जानकारी दी जाये। नीचे दी गई सारणी में सिलसिलेवार तरीके से उल्लेख किया है कि, आपके विवाह और वैवाहिक जीवन के लिए कौन सा समय सबसे अच्छा होगा? साथ ही इन मामलों में आपको कब-कब परेशानी का सामना करना पड़ सकता है, इसकी जानकारी भी आप ले सकते हैं
	FAV_BUSINESS_DESC					= करियर को लेकर हर व्यक्ति की एक महत्वाकांक्षा होती है। जीवन में हर कोई आगे बढ़ना चाहता है और कुछ करना चाहता है, लेकिन जीवन में कभी-कभी कुछ ऐसे मोड़ आते हैं जब करियर के क्षेत्र में परेशानी का सामना करना पड़ता है। वहीं दूसरी ओर कभी ऐसा संयोग भी बनता है जब हमें करियर के क्षेत्र में तरक्की भी मिलती है। हमारा प्रयास है कि आपकी जन्म कुंडली के आधार पर आपकी करियर लाइफ का सटीक विश्लेषण करें। इस टेबल के जरिए आप जान सकते हैं आपके करियर का बेहतर और कठिन समय
	FAV_BUSINESS_HEAD					= व्यापार के लिए शुभ अवधि
	FAV_CARRIER_DESC					= करियर को लेकर हर व्यक्ति की एक महत्वाकांक्षा होती है। जीवन में हर कोई आगे बढ़ना चाहता है और कुछ करना चाहता है, लेकिन जीवन में कभी-कभी कुछ ऐसे मोड़ आते हैं जब करियर के क्षेत्र में परेशानी का सामना करना पड़ता है। वहीं दूसरी ओर कभी ऐसा संयोग भी बनता है जब हमें करियर के क्षेत्र में तरक्की भी मिलती है। हमारा प्रयास है कि आपकी जन्म कुंडली के आधार पर आपकी करियर लाइफ का सटीक विश्लेषण करें। इस टेबल के जरिए आप जान सकते हैं आपके करियर का बेहतर और कठिन समय
	FAV_CARRIER_HEAD					= करियर के लिए शुभ समय
	FAV_HOUSE_DESC						= जीवन में अपना घर हर किसी का सपना होता है। हर व्यक्ति की इच्छा होती है कि उसके पास एक अच्छा घर और खुशहाल जीवन हो। इसके लिए हर व्यक्ति अपने स्तर पर भरपूर प्रयास करता है। हालांकि अपने इस सपने को पूरा करने में कुछ लोग जल्दी सफल हो जाते हैं और कुछ लोगों को लंबा इंतजार करना पड़ता है। नीचे दी गई सारणी के माध्यम से आप जान सकते हैं कि, कौन सा समय आपके गृह निर्माण के लिए उपयुक्त रहेगा
	FAV_HOUSE_HEAD						= गृह निर्माण के लिए शुभ अवधि
	MARRIAGE_ANALYSIS					= 18 से 45 वर्ष की आयु का विश्लेषण
	FAV_MISC_ANALYSIS					= 18 से 65 वर्ष की आयु का विश्लेषण
	FAV_HOUSE_ANALYSIS					= 18 से 75 वर्ष की आयु का विश्लेषण
