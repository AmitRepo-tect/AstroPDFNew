    
    ASTRO_SKETCH_DATA_MALE     = <p><b> એસ્ટ્રો સ્કેચ: </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>મેષનો પુરુષ જાતક નેતૃત્વની ગુણવત્તા ધરાવતો હોય છે અને નવી ચીજો માટે પહેલ કરવી તેને ગમે છે. તેને સરપ્રાઇઝિસ ગમે છે, આ એક ભારે સહનશક્તિવાળો પુરુષ છે અને તે કપરામાં કપરી સ્થિતિમાં આંતરિક શક્તિ દર્શાવે છે. તે સ્વતંત્ર છે અને ગમ્મત તથા સાહસ તેને ગમે છે. આ એક એવી વ્યક્તિ છે કે જે જીવનની ઉજળી બાજુઓ જોવાનું પસંદ કરે છે, તે આક્રમક અને બિન્દાસ્ત પણ બની શકે છે. તેને જૂઠી તારીફ ગમતી નથી અને તેને પોતાની ખોટી અસલિયત બદલ ચાહના મેળવવા કરતા અસલિયત માટે ધિક્કાર પામવાનું વધુ પસંદ છે. પોતાના પ્રિય પાત્ર સાથે હોવા છતાં પણ તેના માટે પોતાનું અંગત જીવન મહત્વપૂર્ણ છે. આ જાતક પોતાના પિર્યપાત્ર પ્રત્યે ટેકો આપનાર, દયાળુ, કાળજી લેનાર, અને પ્રેમાળ રહે છે. જાતક ઘણું કરીને વર્તમાનમાં જીવે છે, તેને ભૂતકાળમાંથી ગંભીરતાપૂર્વક બોધપાઠ લેવાનું ગમતું નથી. </p><p><b>મેષ રાશિના કેટલાક પ્રસિદ્ધ લોકો: </b><br/>જયાપ્રદા, મમતા કુલકર્ણી, રાણી મુખરજી, જીતેન્દ્ર </p><p><b>મેષ રાશિના સામાન્ય રીતે દેખાતા લક્ષણોઃ </b><br/><b>સકારાત્મક: </b>સાહસિક, ઉર્જાવાન, હિંમતવાન, ગતિશીલ અને ઝડપી વિનોદવૃત્તિ <br/><b>નકારાત્મકઃ </b>સ્વાર્થી, ઝડપી ગુસ્સો, આવેગી અને ધૈર્ય વિહીન </p><p><b>ચંદ્ર રાશિની દૃષ્ટિએ મેષ જાતકોની સાથે સુસંગત રાશિ:</b> મિથુન, સિંહ, ધન અને કુંભ </p>#<p><b>એસ્ટ્રો સ્કેચ: </b> જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ <br/>વૃષભ (ટૌરસ) રાશિનો પુરુષ મોહક અને છટાદાર વ્યક્તિત્વ ધરાવે છે. તેનું ઉચ્ચ વ્યક્તિત્વ જાતકને આકર્ષણનું કેન્દ્ર બનાવે છે અને તે જ્યાં જાય ત્યાં પ્રશંસકો વડે ઘેરાયેલો રહે છે. તે બોલવામાં પાવરધો હોય છે અને વાતચીતની પોતાની શ્રેષ્ઠ રીત દ્વારા પ્રભાવ પાડી શકે છે. તેની સૌથી મોટી તાકાત તેની ધીરજ હોય છે અને આ શક્તિ તેને નિર્ણય લેતી વખતે તથા કોઇ કટોકટીની પરિસ્થિતિનું સંચાલન કરતી વખતે મુઠ્ઠી ઉંચેરો બનાવે છે. જાતક પોતાની જે ભાવનાત્મક અને નૈતિક હિંમત દર્શાવે છે તેના માટે તેની પ્રશંસા થાય છે અને તે એક ભરોસાપાત્ર અને વિશ્વસનીય મિત્ર તરીકે હંમેશા તમારી તરફે જણાશે. આ બધા ગુણો હોવા છતાં આ જાતક ઘણી વાર ઘણો જ સ્વામિત્વ ભાવ વાળો, જિદ્દી અને તોફાની પણ હોય છે. </p><p><b> વૃષભ રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/>અંજલિ જઠાર, માધુરી દીક્ષિત, મૌસમી ચેટરજી, પુજા બેદી </p><p><b> વૃષભ રાશિના સામાન્ય રીતે દેખાતા લક્ષણોઃ </b><br/><b>સકારાત્મક: </b> ધૈર્ય, વિશ્વસનીય, સહાનુભૂતિવાળા, ખંતીલા અને શાંત  <br/><b>નકારાત્મકઃ </b> ઇર્ષ્યાળુ, સ્વામિત્વ ભાવ વાળા, અશાંત, સ્વદોષની ઉપેક્ષા કરનાર </p><p><b>ચંદ્ર રાશિ પ્રમાણે વૃષભના જાતકો માટે સુસંગત રાશિઓ: </b>કર્ક, કન્યા, મકર, મીન </p>#<p><b> એસ્ટ્રો સ્કેચ: </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>મિથુન (જેમિની) રાશિનો જાતક પુરુષ મોજીલો, જીવંત અને અત્યંત સક્રિય હોય છે. બોલકો સ્વભાવ આ જાતકને એક ઉત્તમ વાતચીત કરનાર બનાવી દે છે. બુદ્ધિમાન અને ગમ્મતશીલ એવો આ જાતક જીવન માટેના ઉત્સાહ અને જીવનશૈલીના કારણે જીવનમાં વાસ્તવિકતા હોય તેના કરતા ઘણો યુવાન દેખાશે. તેની પાસે બેચેન, જિજ્ઞાસુ, નિયમિત કાર્ય અને દૈનિક કામથી આસાનીથી કંટાળી જવાની અપેક્ષા રાખી શકાય. કાર્યરત અને સક્રિય રહેવા માટે તેને સતત એક નવા પડકારની આવશ્યક્તા હોય છે. નકારાત્મક બાજુએ જોઈએ તો તમને આ જાતક કુખ્યાતપણે બિનભરોસાપાત્ર લાગી શકે છે. પોતાના ફાયદા માટે પરિસ્થિતિનો ઉપયોગ કરવો, અંગત હિત આગળ વધારવા ષડયંત્ર રચવું અને માઇન્ડ ગેમ રમવી જેવા અવગુણોના લીધે તે બેવડો ચહેરો ધરાવતી વ્યક્તિ જણાઈ શકે છે. આ રાશિના જાતક પાસેથી પોતાના દિલને અનુસરતા તર્કહીન પ્રેમી બનવાની અપેક્ષા રાખવી નહીં, આ જાતક વ્યવહારિક હોય છે અને તેના નિર્ણયો પર મગજનું નિયંત્રણ હોય છે. </p><p><b>મિથુન રાશિમાં જન્મેલા  કેટલાક જાણીતા લોકો : </b><br/>ડિમ્પલ કાપડિયા, શિલ્પા શેટ્ટી, મિથુન ચક્રવર્તી, પરેશ રાવલ </p><p><b> મિથુન રાશિના સામાન્ય રીતે દેખાતા લક્ષણોઃ </b><br/><b>સકારાત્મક: </b> અનુકૂળ થઈ જાય એવા, બહુમુખી, મજાકિયા, યુવાન અને જીવંત<br/><b>નકારાત્મક:  </b>ગભરાયેલા, ગંભીરતા વિનાના, ચાલાક, અસંગત </p><p><b>મિથુન રાશિ સાથે સુસંગત રાશિઓ: </b> મેષ, સિંહ, તુલા, કુંભ રાશિ</p>#<p><b>એસ્ટ્રો સ્કેચ: </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>કર્ક (કેન્સર) રાશિનો જાતક સંવેદનશીલ, ભાવનાશીલ અને અંશતઃ નિર્બળ હોય છે. તે રોમેન્ટિક હોય છે અને પોતાના મોહક શબ્દો દ્વારા તમારા હૃદયને એક ધબકારો ચૂકવાડી શકે છે. આ જાતક જે તેમના પ્રત્યે સ્નેહ રાખે, કાળજી લે અને ટેકો આપે એવા દોસ્તો પસંદ કરે છે. તે અવિવેકી અને અસંવેદનશીલ લોકોને છોડી દે છે અને તે કડવા શબ્દો વડે દુભાય છે, તેથી તે ક્યારેય કોઇ અસભ્ય માણસ અથવા સ્ત્રી સાથે મિત્રની જેમ વર્તતો નથી. એક સંબંધ પ્રત્યેની તેની પ્રામાણિકતા, વફાદારી તેને ઇચ્છનીય બનાવે છે અ તેની ઊંડી રમૂજવૃત્તિ કરોડો દિલો જીતી શકે છે. આ જાતક મખ્ખીચૂસ કે ઉડાઉ હોતા નથી, પણ પોતાના પ્રિયજનોને સુંદર અને ભાવુક ભેટ દ્વારા કેવી રીતે લાડ લડાવવો એ સારી રીતે જાણતા હોય છે. તેમનો અનિયમિત વ્યવહાર અને મૂડમાં આવતા રહેતા ઉતાર ચડાવ ઘણી વખત આ જાતકોને અનુમાન ન થઈ શકે એવા બનાવી દે છે, પણ બધા જ જાતકો અવિશ્વસનીય હોતા નથી. તમે તેના ઇરાદાઓ પર ચોક્કસપણે ભરોસો કરી શકો છો. </p><p><b>કર્ક રાશિમાં જન્મેલા કેટલાક જાણીતા લોકો: </b><br/>પ્રિયંકા ચોપરા, જુલિયા રોબર્ટસ, ટોમ ક્રૂઝ, પ્રિન્સેસ ડાયેના, પામેલા એન્ડરસન </p><p><b>કર્ક રાશિના લોકોના સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મક: </b>ભાવનાશીલ, પ્રેમાળ, સહજ જ્ઞાન વાળા, કલ્પનાશીલ, ચતુર, સતર્ક, રક્ષણાત્મક, સહાનુભૂતિ ધરાવનારા <br/><b>નકારાત્મક:  </b>ચંચળ, મૂડી, વધારે પડતા લાગણીશીલ, ભાવુક, અક્કડ </p><p><b>ચંદ્ર રાશિની દૃષ્ટિએ કર્ક રાશિની સુસંગત રાશિઓ: </b>મેષ, વૃષભ, કર્ક, કન્યા, તુલા, મકર</p>#<p><b>એસ્ટ્રો સ્કેચ: </b>( જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>સિંહ (લિયો) જાતક બહારથી કડક પણ અંદરથી ભાવુક, લાગણીવશ અને ભાવનાત્મક હોય છે. પોતાની આસપાસની મહિલાઓ પ્રત્યે તે અત્યંત રક્ષણાત્મક હોય છે. ભલે દર્શાવે નહીં પણ સિંહ રાશિનો જાતક પોતાના પ્રિયજન માટે સ્વામિત્વનો ભાવ ધરાવતો હોય છે. તેને મોખરે રહેવું, ઘણાં બધાં લોકોનું ધ્યાન આકર્ષવું ગમતું હોય છે, તે સ્પોર્ટી, એથ્લેટિક અને અમુક વખત કુત્રિમ હોય છે. તે સ્થિતિઓ અને પોતાની આસપાસના લોકોને નિયંત્રણમાં લેવાનું પસંદ કરે છે. આ રાશિના લોકો જન્મજાત નેતૃત્વ શક્તિ ધરાવતા હોય છે, થોડાઘણાં સ્વામિત્વભાવ ધરાવનારા અને વર્ચસ્વપૂર્ણ હોય છે. તેનો ગુસ્સો અને આક્રમકતા તમને નાખુશ કરી શકે છે અને આ લોકો તમને કડક તથા અવ્યવહારિક લાગી શકે છે. સિંહ રાશિના જાતકો સરપ્રાઇઝિસના ખુબ શોખીન હોય છે, તેઓ હંમેશા પોતાના પ્રિયજનોને ખર્ચાળ ભેટસોગાદ અને સ્મૃતિચિહ્નોની વર્ષા કરતા રહે છે. દેખીતી રીતે જ, આ વૃત્તિ તેમને મોટી ઉડાઉ વ્યક્તિ બનાવી દે છે. પ્રશંસા માટેની તેમની ચાહત તેમને ખોખલી સ્તુતિ અને અર્થ વગરની ચાપલૂસીનો ચાહક બનાવી દે છે. તે મિત્રોનું એક વિશાળ વર્તુળ ધરાવતો હોય છે અને સામાજિક બાબતોમાં તે આગળ પડતો હોય છે.   </p><p><b>સિંહ રાશિ સાથે જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/>મનીષા કોઇરાલા, કાજોલ, રાખી, મનોજ કુમાર, ગુલઝાર </p><p><b>સિંહ રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મક: </b> કૂટનીતિક, રોમેન્ટિક, આકર્ષક, સમાધાની વૃત્તિ, આદર્શવાદી <br/><b>નકારાત્મક:  </b> દુવિધાયુક્ત, અસ્થિર અને ભોળા </p><p><b>ચંદ્ર રાશિની દૃષ્ટિએ સિંહ રાશિ સાથે સુસંગત રાશિઓ: </b>કર્ક, મીન </p>#<p><b> એસ્ટ્રો સ્કેચ: </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> કન્યા (વર્ગો) રાશિનો જાતક એક આદર્શવાદી હોય છે જેને પોતાના નાના અને મોટા, દરેક કાર્યમાં પરફેક્શન ગમે છે. જીવનમાં નિર્ણયો લેવા માટે આ જાતક દિમાગને અનુસરે છે, તે જીવન, કામ અને સંબંધમાં તે તાર્કિક અને વિશ્લેષણાત્મક અભિગમ ધરાવતો હોય છે. આ લોકો સામે શું કરવું અને શું કહેવું તે પહેલેથી નક્કી કરવું મહત્વપૂર્ણ હોય છે કેમ કે તેમને અશિષ્ટ, અસભ્ય અને અપમાનજનક ભાષા સામે તીવ્ર અણગમો હોય છે. તે તમારા વિશે દરેક ચીજ ધ્યાનમાં લેશે જેમ કે તમારો પોશાક, બોલવાની રીત, ચાલવાની રીત. કન્યા રાશિના જાતકો તમારી પાસે તમારા શિષ્ટાચારમાં સાવધ રહેવાની અપેક્ષા રાખે છે. આનો મતલબ એ નથી થતો કે તેઓ દંભી છે, બલકે એ લોકો અત્યંત વિનમ્ર હોય છે અને એક સરલ પણ શિસ્તસભર જીવન જીવતા હોય છે. તેઓ પોતાના નજીકના મિત્રો અને પ્રિયજનો પ્રત્યે અત્યંત પ્રેમાળ અને રક્ષણાત્મક વલણ ધરાવતા હોય છે. તેમનો દૃષ્ટિકોણ તર્કસંગત રહે છે, આ લોકો ક્યારેય કોઇ ચર્ચામાં હારતા નથી અને ચરમસીમાએ પહોંચેલા વિવાદનો ઉકેલ લાવે છે. પ્રામાણિક, સંગઠિત, સમર્પિત અને ઉપયોગી એવા કન્યા રાશિના જાતકો અત્યંત ભરોસાપાત્ર હોય છે, ક્યારેક કન્યા રાશિનો કોઇ આક્રમક જાતક મળી શકે છે. </p><p><b> કન્યા રાશિ સાથે જન્મેલા કેટલાક પ્રસિદ્ધ લોકો:  </b><br/>આશા ભોંસલે, રાકેશ રોશન, અગાથા ક્રિસ્ટી, ક્વીન એલિઝાબેથ, જોસેફ કેનેડી </p><p><b> કન્યા રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મક: </b> વિનમ્ર, સતર્ક, વિશ્વસનીય, વ્યવહારિક, મહેનતુ <br/><b>નકારાત્મક:</b>ધાંધલિયા, વધારે પડતા નિંદક, કઠોર, સંકુચિત </p><p><b> ચંદ્ર રાશિની દૃષ્ટિએ કન્યા રાશિ સાથે સુસંગત રાશિઓ: </b>વૃષભ, મકર</p>#<p><b> એસ્ટ્રો સ્કેચ:</b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> તુલા (લિબ્રા) રાશિનો પુરુષ એક હાર્ડકોર રોમેન્ટિક અ સર્જનાત્મક વ્યક્તિ હોય છે. તે પ્રેમ અને સન્માનનો હકદાર હોય છે અ તે સ્માર્ટ, આત્મવિશ્વાસુ તથા મોજીલા લોકો પ્રત્યે આકર્ષિત થાય છે. એક ભાગીદાર તરીકે તે તમને વ્યક્તિગત સ્પેસ આપે છે અને તમારી પાસે પણ એવી જ અપેક્ષા રાખે છે. આ જાતકને ખર્ચાળ વસ્ત્રો, ઘડિયાળો, પગરખા, બ્રાન્ડેડ પરફ્યુમ્સ, સંગીત, થિએટર અને કલા વગેરે પર ખર્ચ કરવો ગમે છે. આ જાતક વિચારસરણીમાં પ્રગતિશીલ અને અને પરિવર્તન માટે તૈયાર રહેતા હોય છે, તેથી આસપાસ રહેલા અન્ય લોકોના અભિપ્રાય અને વિચારો જો તર્કસંગત હોય તો તેને  સાંભળવા તથા સ્વીકારવામાં તેમને વાંધો હોતો નથી. અત્યંત બોલકા એવા આ રાશિના જાતક જ્યારે લોકો જ્યારે આશાવાદી અ જીવંતતાભર્યાં લોકો વડે ઘેરાયેલા હોય છે ત્યારે સૌથી વધુ ખુશ હોય છે, આ જાતકો કોઇ મજેદાર વાતમાં ઉંડાણપૂર્વક ઉતરી શકે છે. તેઓ આળસું હોતા નથી, તેઓ કોઇ નિર્ણય લેવામાં થઓડો સમય લગાડતા હોય છે. તેની કૂટનીતિ ઘણીવાર પાણીમાં જઈ શકે છે અ આસપાસ રહેલા લોકો તુલાના જાતકોને અસહજ બનાવી દે છે. </p><p><b> તુલા રાશિ સાથે જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/>કેટ વિન્સ્લેટ, રેખા, કરીના કપૂર, લતા મંગેશકર, અમિતાભ બચ્ચન, મહાત્મા ગાંધી </p><p><b> તુલા રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મક: </b>કૂટનીતિક, રોમેન્ટિક, આકર્ષક, સમાધાની વૃત્તિ ધરાવતા, આદર્શવાદી <br/><b>નકારાત્મક: </b> દુવિધાયુક્ત સ્થિતિ, અસ્થિર અને ભોળો </p><p><b> ચંદ્ર રાશિની દૃષ્ટિએ તુલા રાશિ સાથે સુસંગત રાશિઓ: </b>મેષ, કર્ક, સિંહ, તુલા, ધન, મકર </p>#<p><b> એસ્ટ્રો સ્કેચ:</b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>વૃશ્ચિક (સ્કોર્પિયો) રાશિનો જાતક ભાવુક, મજાકિયો, ચાલાક અને રહસ્યપ્રિય હોય છે. તેની ભાવુક પ્રકૃતિ અને આત્મવિશ્વાસુ વ્યક્તિત્વ તેને આકર્ષણનું કેન્દ્ર બનાવે છે. આ વ્યક્તિ તેની મહત્વાકાંક્ષાઓ વડે પ્રેરિત રહેતો હોય છે અને અમુક હદ સુધી બળવાખોર હોય છે, જે સમાજના પ્રસ્થાપિત નિયમોમાં માનતો નથી. આ જાતક અત્યંત કામુક, મૂડી, શાંત અને સ્વસ્થ હોય છે. આ જાતક કુત્રિમ, ખોખલી અને ઉપરછલ્લી ચીજોથી નફરત કરતો હોય છે. તેને ખુશ અ પૂર્ણ અનુભતિ માટે પોતાની આસપાસ વાસ્તવિક લોકો જોઈએ છે. આ લોકો હંમેશા કંઇક નવી અને રોમાંચક ચીજની તલાશમાં રહેતા હોય છે, તેથી તેમની સાથે તમને કંટાળો આવી શકે નહીં. વૃશ્ચિક રાશિના જાતક જ્યાં સુધી આસસપાસમાં હોય ત્યાં સુધી તમે પ્રવૃત્તિમય રાખે છે. આના લીધે તેઓ બોલકા બને છે. આ જાતકો મિત્રો અને પ્રિયજનોનું મોટું વર્તુળ ધરાવતા હોય છે. જોકે સંબંધમાં તેમની અપેક્ષાઓ વધારે હોય છે અને પોતાના પ્રિયજન પાસે પણ પોતાની જેટલા જ પ્રેમની અપેક્ષા રાખતા હોય છે. આ રાશિના જાતકોને વધુ નજીકથી ઓળખો તો તેના શાંત અને ગંભીર વ્યક્તિત્વમાં તમને એક માણસ એવો દેખાશે કે જે ચુંબકીય તથા બંધનકારી એવી એનિમલિસ્ટિક ઊર્જા ધરાવે છે. <p><b> વૃશ્ચિક રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/>ઐશ્વર્યા રાય, ઇન્દિરા ગાંધી, જવાહર લાલ નહેરુ, શાહરુખ ખાન, બિલ ગેટ્સ, બ્રાયન આદમ્સ, ડેમી મૂર </p><p><b> વૃશ્ચિક રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો:  </b><br/><b>સકારાત્મક:</b>ભાવનાત્મક, તીવ્ર, ગરિમામય, સંવેદનશીલ, સહજ જ્ઞાન ધરાવતા, કામુક, રહસ્યમય, જુસ્સાદાર <br/><b>નકારાત્મક: </b> ઇર્ષ્યાળુ, આક્રોશ, જબરદસ્તીથી કામ કરાવનારા, બાધ્ય કરનારા, ઝનૂની, ગુપ્ત, જિદ્દી </p><p><b> ચંદ્ર રાશિની દૃષ્ટિએ વૃશ્ચિક રાશિ સાથે સુસંગત રાશિઓ: </b> કર્ક અને મીન</p>#<p><b> એસ્ટ્રો સ્કેચ:</b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>ધન (સેજિટેરિયસ) રાશિનો પુરુષ હેપ્પી ગો લકી પ્રકારની વ્યક્તિ હોય છે. તેનામાં અતિ અપેક્ષિત કૂટનીતિનો અભાવ હોય છે અને તે ઘણીવાર બેધડક અને ઇમાનદાર હોય છે. જ્યારે તે પોતાના આપ્તજનોની સાથે હોય ત્યારે તે મૈત્રીપૂર્ણ, બોલકો અને આકર્ષક હોય છે. તે ભૂતકાળની વાતોને યાદનો ભાર રાખતો નથી અને વર્તમાનમાં તથા વ્યવહારિક વિશ્વમાં જીવે છે. જીવનના દુઃખદ અનુભવોથી તે નિરાશાવાદી બનતો નથી અને તેનો આશાવાદ તેને પ્રેરિત કરતો રહે છે. પરિસ્થિતિ જ્યારે પડકારજનક હોય ત્યારે પણ તે હથિયાર હેઠાં મૂકતો નથી અને છેવટ સુધી લડે છે. સામાન્ય રીતે આ રાશિનો જાતક દ્વેષભાવ રાખતો નથી, પણ જ્યારે કોઇ તેને નીચું દેખાડવાની કોશિશ કરે ત્યારે તે આસાનીથી વળતો જવાબ આપે છે. આ રાશિના જાતક પાસેથી આજ્ઞાનું પાલન કરવાની આશા ન રાખી શકાય, બલકે તેને ઉદાહરણ વડે પ્રેરિત કરવો અને કરુણા સાથે દોરવણી આપવી. આ રાશિના જાતકોનું આખાબોલાપણું ઘણી વાર તેને મુશ્કેલ પરિસ્થિતિમાં મૂકી દે છે અને તેની વફાદારીને આક્રમણ તરીકે જોવામાં આવે છે. તેને યાત્રા કરવાનું ગમે છે અને તે નિત્ય જીવન તથા બીબાઢાળ વસ્તુઓમાં ફસાવા માગતો નથી. </p><p><b> ધન રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/>ધર્મેન્દ્ર, શત્રુઘ્ન સિન્હા, દિલીપ કુમાર, વિન્સ્ટન ચર્ચિલ </p><p><b> ધન રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો:   </b><br/><b>સકારાત્મક :</b>આશાવાદી, ખુશહાલ, સ્વરમૂજી, પ્રામાણિક, દાર્શનિક <br/><b> નકારાત્મક: </b> લાપરવાહ, આંખો મિંચીને આશા બાંધી લેવી, ઉદ્વંડ, બેચેન </p><p><b>ચંદ્ર રાશિ પ્રમાણે ધન રાશિ સાથે સુસંગત રાશિઓ: </b>કર્ક, મીન</p>#<p><b> એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>મકર રાશિનો જાતક એક સામાન્ય માણસ હોય છે જે શરૂઆતમાં દૃષ્ટિકોણ કેળવવા માટે ખુબ જ મુશ્કેલ છે. તે એક કડક બાહ્ય છબિની અંદર પોતાની સંવેદનશીલ આંતરિક બાજુનું સલામત રીતે રક્ષણ કરતો હોય છે. તે અંતર્મુખી, ભીડમાં શરમ અનુભવનાર વ્યક્તિ છે અને માત્ર પોતાને જાણતા નજીકના મિત્રોની સામે અને પોતે જેની સાથે સૌથી વધુ અનુકૂળતા અનુભવતો હોય તેની સમક્ષ જ ખુલીને વાત કરે છે. આ રાશિના જાતકને જો તમારી સંગત ગમતી હોય તો તે પોતાની અસામાન્ય રમૂજવૃત્તિ અને વિનોદી ટિપ્પણીઓ વડે તમને આશ્ચર્યમાં મૂકી શકે છે. તેનું દિમાગ ચંચળ નથી, પણ તેનો મૂડ સતત બદલાતો રહે છે અને આ બાબત તમને જાતક અસંવેદનશીલ હોવાનું અને અમુક વખત તમને નુકસાન કરતો હોવાનું અર્થઘટન કરવા પ્રેરી શકે છે. જોકે અંદરથી તેનું હૃદય પોતાના પ્રિયજનો પ્રત્યે સંવેદનશીલ હોય છે. આ લોકો થોડા કરકસરિયા હોય છે અને પોતાના ખર્ચ ઉપર કાળજીપૂર્વક દેખરેખ રાખે છે તથા જરૂર વગરનો ખર્ચ કરતા નથી. મકર રાશિના લોકો મહત્વાકાંક્ષી હોય છે પણ ક્યારેય પોતાના પરિવારની ઉપેક્ષા કરતા નથી તેમજ તેમના પ્રત્યેની પોતાની જવાબદારીઓની અવગણના કરતા નથી.</p><p><b>મકર રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો:</b><br/>અનુ અગરવાલ, રીના રોય, સલમાન ખાન, અનિલ કપૂર, જાવેદ અખ્તર, નાના પાટેકર </p><p><b>મકર રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મકઃ </b> વ્યવહારિક, સમજદાર, મહત્વાકાંક્ષી, ધીરજવાળા, સાવધાન <br/><b>નકારાત્મક :</b> નિરાશાવાદી, પ્રારબ્ધવાદી, મખ્ખીચૂસ, વેરભાવના વાળા   </p><p><b> ચંદ્ર રાશિ પ્રમાણે મકર સાથે સુસંગત રાશિઓ: </b> વૃષભ, કન્યા </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>કુંભ (એક્વેરિયસ) રાશિનો પુરુષ અત્યંત સ્વતંત્ર, બુદ્ધિમાન અને સાથોસાથ એક સ્વપ્નદૃષ્ટા હોય છે. તેઓ મૂડી, અનુમાન ન થઈ શકે એવા અને સહેલાઈથી સમજવામાં અઘરાં હોય છે. તેઓ સમાજ દ્વારા લાદી દેવાયેલા નિયમોને અનુસરશે નહીં અને પોતે બનાવેલા નિયમો વડે જીવશે. તે અન્ય લોકોના જીવનમાં હસ્તક્ષેપ કરતો નથી અને બીજા પાસેથી પણ એવી જ અપેક્ષા રાખએ છે, કારણ કે તેને પોતાની રીતે જ જીવવું ગમે છે. ક્યારેક ક્યારેક અલગ અને અંતર જાળવતા આ રાશિના જાતકો અસંવેદનશીલ જણાઈ શકે છે, પણ એ સાચું નથી, આ જાતકો કાળજી લેનારા હોય છે. આ લોકો શબ્દમાં દરેક અર્થમાં સમાનતામાં વિશ્વાસ ધરાવે છે અને દરેક જણ સાથે યોગ્ય રીતે વર્તે છે. દિવસે સપના જોનારા આ લોકો ઘણીવાર અલગ અને ગાફેલ દેખાઈ શકે છે પણ તેઓ વર્તમાનમાં જ હોય છે અને ખુબ જ સચેત હોય છે. દુનિયા શું કહે છે તેમાં તેમને ખુબ જ ઓછો રસ હોય છે અને તેમની પાસેથી ઉન્માદપૂર્ણ વસ્તુઓની અને તમને મજેદાર એડવેન્ચર વડે તમને પ્રવૃત્ત રાખવાની અપેક્ષા રાખવી.</p><p><b>કુંભ રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/>ઉર્મિલા માતોંડકર, પ્રિટી ઝિન્ટા, વહીદા રેહમાન, સુભાષ ઘાઈ </p><p><b> કુંભ રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મકઃ </b> મૈત્રીપૂર્ણ, માનવીય, અસલ, શોધખોળ કરનારા, સ્વતંત્ર, બુદ્ધિમાન  <br/><b>નકારાત્મક :</b> અડિયલ, લાગણીવિહીન, અલગ, અનુમાન થઈ શકે નહીં એવા   </p><p><b>ચંદ્ર રાશિની દૃષ્ટિએ કુંભ રાશિ સાથે સુસંગત રાશિઓ: </b> મિથુન અને તુલા </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>મીન (પિસીઝ) રાશિનો જાતક વાસ્તવમાં પ્રભાવશાળી અને રચનાત્મક હોય છે. તે જાદુ-ટોણાં તતરફ એક કુદરતી ઝુકાવ ધરાવતો હોય છે અને તે પરિવર્તનને સહેલાઇથી અપનાવી શકે છે. તે પરિવર્તનને જીવનના એક સામાન્ય ભાગ તરીકે નિહાળે છે અને આ બાબત તેના અભિગમને સ્થિતિસ્થાપક બનાવે છે. આ જાતક લગભગ દરેક જણ સાથે સહજ હોય છે. મીન જાતક સંવેદનશીલ હોય છે અને ઘણીવાર સેલ્ફ-ઓબ્સેસ્ડ હોય છે. તે દરેક વસ્તુ માટે આશાવાદી દૃષ્ટિકોણ ધરાવે છે. તેની સફળતા અને નિષ્ફળતામાં કલ્પનાનું પરિબળ મુખ્ય હોય છે અને તેની સફળતા-નિષ્ફળતા જાતક પોતાની કલ્પનાનો કેવી રીતે ઉપયોગ કરે છે તેના પર જ નિર્ભર હોય છે. ઘણીવાર જાતક ઘણો તરંગી જણાશે અને સામાન્ય રીતે કોઇ કારણ હોય કે ન હોય, તેના મૂડમાં ઉતારચઢાવ આવતા જણાશે.  જાતક ઘણી અપેક્ષાઓ ધરાવતો હોય છે અને તેની સાથોસાથ તે ખુબ જ સમજદાર હોય છે. તેને દબાણપૂર્વક કરાવાતા કાર્ય સામે નફરત હોય છે અને પોતે ઇચ્છે એ પ્રમાણે કામ કરવું તેને ગમે છે. કોઇ આ જાતકોને પજવવાનો વિચાર કરી શકતુ નથી, કારણ કે આ જાતકને લોકોની માનસિકતા સમજવામાં સહેજ પણ વાર લાગતી નથી. </p><p><b> મીન રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/> પ્રિટી ઝિન્ટા, ચેલ્સિયા ક્લિન્ટન, આલ્બર્ટન આઇન્સ્ટેઇન, માઇકલએન્જેલો </p><p><b> મીન રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મકઃ </b> કલ્પનાશીલ, સંવેદનશીલ, દયાળુ, નિઃસ્વાર્થ સહાનુભૂતિ ધરાવનારા <br/><b>નકારાત્મક :</b> પલાયનવાદી, આદર્શવાદી, ગોપનીય, કમજોર ઇરાદા ધરાવનારા </p><p><b> ચંદ્ર રાશિ પ્રમાણે મીન રાશિ સાથે સુસંગત રાશિઓ:</b> વૃષભ, મિથુન, કન્યા, ધન, મકર, મીન </p>
    ASTRO_SKETCH_DATA_FEMALE   = <p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>મેષ (એરિઝ) રાશિની મહિલા જન્મજાત આગેવાન હોય છે, તે કોઇ પણ વસ્તુની પહેલ કરવામાં મોખરે હોય છે. તે કપરામાં કપરા સંજોગોમાં પણ ટકી શકે છે અને સૌથી દુઃખદ ઘટનાઓમાંથી બહાર આવી શકે છે. તે સ્વતંત્ર, બેફિકરી અને હિંમતવાન હોય છે. આ રાશિની મહિલા આક્રમક, આશાવાદથી ભરપૂર અ ભવિષ્યમાં રહેનારી હોય છે. તેને ખુશામત ગમતી નથી; તેના બદલે તેને પ્રામાણિક અભિવાદન પસંદ હોય છે. પોતાની પર શંકા થાય તે એને ગમતું નથી, આ રાશિની મહિલા સ્વામિત્વ ભાવ વાળી હોય છે પણ તેની પોતાના ઉપર કોઇ સ્વામી ગમતો નથી. સ્વભાવગત રીતે, તે અત્યંત દયાળુ, સંભાળ લેનાર, વફાદાર અને ટેકો આપનારી હોય છે. આ રાશિની મહિલાઓ લગ્ન બાદ પણ કારકિર્દી ચાલુ રાખે એવી શક્યતા સૌથી વધુ હોય છે. તેને પડકારો ગમે છે અ તે ચમત્કારોમાં વિશ્વાસ કરે છે. આ જાતક મહિલાઓ ભૂતકાળમાં ક્યારેય જીવતી નથી, તેથી તે એકની એક ભૂલ ફરીવાર કરે એવી શક્યતા રહે છે. </p><p><b> મેષ રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br /> જયાપ્રદા, મમતા કુલકર્ણી, રાણી મુખરજી, જિતેન્દ્ર </p><p><b> મેષ રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ </b> સાહસિક, ઊર્જાવાન, હિંમતવાન, ગતિશીલ અને ઝડપી રમૂજવૃત્તિ <br /><b>નકારાત્મક : </b> સ્વાર્થી, જલદી પિત્તો ગુમાવનારા, મનમૌજી અને ધીરજ વિનાના </p><p><b> ચંદ્ર રાશિ પ્રમાણે મેષ સાથે સુસંગત એવી રાશિઓ: </b> મિથુન, સિંહ, ધન અને કુંભ </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/>વૃષભ (ટૌરસ) રાશિની સ્ત્રી એક આકર્ષક અને મુગ્ધ કરી દે એવું વ્યક્તિત્વ ધરાવે છે, તે સમૂહના આકર્ષણનું કેન્દ્ર બની રહેશે. તે વાતચીત કરવાની મૈત્રીપૂર્ણ, સારી અને શ્રેષ્ઠ રીતભાત ધરાવે છે. તે પોતાના દેખાવની અત્યંત કાળજી રાખે છે અને વજનમાં આસાનીથી વધારો કરવાનું વલણ ધરાવતી હોઈ શકે છે. સામાન્ય રીતે તેનો સ્વભાવ બહુ શાંત હોય છે અને તે ધીરજપૂર્વક મુશ્કેલ પરિસ્થિતિઓને સંભાળી શકે છે. પોતાની મજબૂત ઇચ્છાશક્તિ માટે પ્રશંસા મેળવનારી આ જાતક સ્ત્રીઓ ઘણીવાર નૈતિક અને ભાવનાત્મક હિંમત દર્શાવે છે. આ જાતક મહિલાઓ વાસ્તવમાં ભરોસેમંદ અને વફાદાર હોય છે. તે પોતાના માટે ખુબ જ સ્વામિત્વભાવ ધરાવતી હોય છે. જાતક મહિલા જીવનને સરળતાથી જીવવાની વૃત્તિ ધરાવતી હોય છે અને અમુક હદ સુધી જિદ્દી હોય છે. </p><p><b>વૃષભ રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br />અંજલિ જઠાર, માધુરી દીક્ષિત, મૌસમી ચેટરજી, પુજા બેદી </p><p><b>વૃષભ રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ </b> ધૈર્ય ધરાવનારા, વિશ્વસનીય, સહાનુભૂતિ વાળા, ખંતીલા, શાંત <br/><b>નકારાત્મક : </b> ઇર્ષ્યાળુ, સ્વામિત્વ ભાવ વાળા, જડ, સેલ્ફ ઇન્ડલ્જન્ટ </p><p><b> ચંદ્ર રાશિ પ્રમાણે વૃષભની સાથે સુસંગત રાશિઓ: </b>કર્ક, કન્યા, મકર, મીન </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> મિથુન (જેમિની) રાશિની જાતક સ્ત્રી અત્યંત જીવંતતાભરી અને આકર્ષક હોય છે તથા તે શ્રેષ્ઠ રીતે વાતચીત કરી શકતી હોય છે. તે માનસિક રીતે સક્રિય હોય છે અને શારીરિક રીતે હકીકત કરતા ઓછી વયની એટલે કે યુવાન દેખાતી હોય છે. લાંબા સમય સુધી એકની એક ચીજ કરવાથી તે બેચેન થઈ જશે, તે સહેલાઇથી કંટાળી જશે અને એ ચીજ પર ધ્યાન કેન્દ્રિત કરી શકશે નહીં. જાતક મહિલા અતૂલ્ય જિજ્ઞાસાવૃત્તિ ધરાવતી હશે. નકારાત્મક પાસાઓ જોઈએ તો જાતક મહિલાનું મન હંમેશા બદલાતું રહેશે, જેના લીધે તે કુખ્યાતપણે અવિશ્વસનીય બની જાય છે. જાતક સ્ત્રી પોતાના હેતુઓ પાર પાડવા માટે અન્ય લોકોની સાથે ચાલાકીથી કામ લેવાની વૃત્તિ પણ ધરાવતી હોય છે. તેમ છતાં  પોતાની ચમકદાર ઉપસ્થિતિના કારણે જાતક સ્ત્રી આકર્ષણનું કેન્દ્ર બની રહે છે. જાતક સ્ત્રી પોતાના મોટા ભાગના નિર્ણયો દિલથી નહીં પણ દિમાગથી લેતી હોય છે અને કોઈ પણ બૌદ્ધિક કાર્ય તેના માટે મૂલ્યવાન હોય છે. </p><p><b> મિથુન રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br /> ડિમ્પલ કાપડિયા, મિથુન ચક્રવર્તી, પરેશ રાવલ, રાજેશ રોશન </p><p><b>મિથુન રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ </b>અનુકૂળ થઈ જાય એવા, બહુમુખી, મજાકિયા, યુવા, જીવંત <br/><b>નકારાત્મક : </b> ગભરાટિયા, કુત્રિમતા, ચાલાક, અસંગત </p><p><b>ચંદ્ર રાશિ પ્રમાણે મિથુન સાથે સુસંગત રાશિઓ:</b> મેષ, સિંહ, તુલા, કુંભ </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> કર્ક (કેન્સર) રાશિની મહિલા અત્યંત સંવેદનશીલ પ્રકૃતિ ધરાવતી હોય છે, આથી તે અંશતઃ નિર્બળ હોય છે. સામાન્ય અર્થમાં, જાતક મહિલાની ભાવુક પ્રકૃતિમાંથી બહાર આવતા લક્ષણો મુજબ આ મહિલાઓ રોમેન્ટિક હોય છે અને તેને પ્રેમ મળી રહ્યો છે તથા તે અપેક્ષિત છે તેવી ખાતરીની તેને સતત જરૂર હોય છે. તેને લોકોના ધ્યાનની આવશ્યક્તા હોય છે, તે મૂડી હોય છે, અત્યંત કાળજી લેનારી હોય છે. તે દયાળુ, સ્ત્રૈણ, ડરપોક અને વિનમ્ર હોય છે. તેને ટીકાટિપ્પણીઓ ગમતી નથી, તે અસ્વીકૃતિ સહન કરી શકતી નથી અને આકરા શબ્દોથી તેને ખુબ દુઃખ થાય છે તથા તેને કાળજીપૂર્વક સંભાળવી પડે છે. પોતે બાંધે એ પ્રત્યેક સંબંધમાં જાતક મહિલા જે તીવ્ર વફાદારી દર્શાવે છે તે જ તેનું સૌથી મોટું આકર્ષણ હોય છે. તે પોતાની ગર્મજોશી અને સમૃદ્ધ રમૂજવૃત્તિ વડે તમને ખુશ રાખશે. આ રાશિની જાતક મહિલાને રસોઇ કરતા ખુબ જ સારું આવડતું હોય છે, તે બહુ કંજૂસ હોતી નથી, કે પછી બહુ ઉડાઉ હોતી નથી. તે પોતાના પ્રેમ, સ્નેહ અને કાળજી વડે પોતાના નજીકના લોકોને લાડ લડાવવાનું તેને ગમે છે. જાતક મહિલા તેના મૂડમાં આવતા રહેતા ઉતારચડાવના કારણે અનુમાન ન થઈ શકે એ દેખાઈ શકે છે, પણ એ વાતની ખાતરી રાખો કે તેનું મન ચંચળ હોતું નથી અને તેનો હેતુ ક્યારેય કોઇને વેદના આપવાનો હોતો નથી. </p><p><b> કર્ક રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br /> પ્રિયંકા ચોપરા, જુલિયા રોબર્ટસ્, ટોમ ક્રૂઝ, પ્રિન્સેસ ડાયેના, પામેલા એન્ડરસન </p><p><b>કર્ક રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ </b> ભાવનાત્મક, પ્રેમાળ, સહજ જ્ઞાનયુક્ત, કલ્પનાશીલ, ચતુર, સતર્ક, સુરક્ષાત્મક, સહાનુભૂતિ ધરાવતા <br/><b>નકારાત્મક : </b> ચંચળ, મૂડી, વધારે પડતા ભાવુક, સહેજમાં ઉશ્કેરાઇ જાય એવા, જડ </p><p><b> ચંદ્ર રાશિ પ્રમાણે કર્કની સાથે સુસંગત રાશિઓ: </b> મેષ, વૃષભ, કર્ક, કન્યા, તુલા, મકર</p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> સિંહ (લિયો) રાશિની સ્ત્રી પોતાની આસપાસના લોકો પ્રત્યે અત્યંત સ્વામિત્વ ભાવ વાળી અને ભાવુક હોય છે. આ રાશિની સ્ત્રીને રમતગમત ગમતી હોઈ શકે છે, એથ્લેટિક હોઇ શકે છે અને તેને થોડાઘણાં અંશે કુત્રિમ અને લાર્જર ધેન લાઇફ ચીજો વડે મોહિત કરી શકાય છે. તે દરેક વસ્તુને અને કોઇ પણ વસ્તુના સ્વામિત્વભાવ વાળો સ્વભાવ ધરાવે છે અને આ બાબત તેને ઘણી વખત તેને મગરૂર બનાવે છે. તેનામાં નેતાગીરીના ગુણો જન્મજાત હોય ઠછે અને તેને પોતાનો જીવનસાથી પોતાના પર હાવિ થાય એ ગમતું નથી. તેનો ગુસ્સો તેને અલોકપ્રિય બનાવી દેશે. તે જ્યારે અપમાનિત થાય ત્યારે નારાજ થઈ શકે છે. તેને આલોચના, અવગણના થવી અથવા કોઇ તેની વાત ન માને તે ગમતું નથી. તેનો અહંકાર ખુબ મોટો હોય છે, જેના લીધે તે જડ અને અવ્યવહારિક દેખાય છે. દરેક જણ તેની પાછળ રહે એવી તેની ધારણા હોય છે. નાણાકીય બાબતોમાં, જાતક મહિલા ખુબ ઉડાઉ  હોઇ શકે છે, તે ચાપલૂસી વડે દોરાઈ શકે છે. તેને લોકો લાડ લડાવે તે ગમતું હોય છે. આ જાતક મહિલા એક પરફેક્ટ પરિચારિકા બની રહેશે, પોતાના તમામ મહેમાનો માટે આકર્ષક બની રહેશે. આ જાતક મહિલા ભાગ્યે જ પોતાની સંવેદનશીલ બાજુ પ્રગટ કરે છે અને ભાવનાહીન દેખાય છે. </p><p><b> સિંહ રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br />મનીષા કોઇરાલા, કાજોલ, રાખી, મનોજ કુમાર, ગુલઝાર </p><p><b>સિંહ રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ </b>કૂટનીતિક, પ્રેમપૂર્ણ, આકર્ષક, સમાધાનની વૃત્તિ વાળા, આદર્શવાદી <br><b>નકારાત્મક :</b> દુવિધઆની સ્થિતિ  ધરાવનારા, અસ્થિર અને ભોળા </p><p><b> ચંદ્ર રાશિ પ્રમાણે સિંહની સાથે સુસંગત રાશિઓ: </b> કર્ક અને મીન </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> કન્યા (વર્ગો) રાશિની સ્ત્રી પૂર્ણતાવાદી હોય છે અને તે દરેક કાર્ય, ઘરના કામ અને ખાસ કરીને તે જેના પ્રભારમાં હોય તેમાં સુક્ષ્મ ચિંતા કરવાની તેને આદત હોય છે. તે તાર્કિક અને વિશ્લેષણાત્મક હોય છે અને તે હંમેશા નહીં પણ ઘણી વાર સાચી હોય છે. તે અશિષ્ટ વર્તણૂક, અયોગ્ય ભાષાનો ઉપયોગ, જીર્ણ દેખાવ અથવા સ્નેહના જાહેર પ્રદર્શનની સરાહના કરતી નથી. આ જાતક મહિલામાં તમને સૌથી વધુ સારો વ્યવહાર અને વાસ્તવિક લોકો પૈકીની એક જણાઈ શકે છે. તેના અય ગુણોમાં મજબૂત બુદ્ધિ ક્ષમતાઓ, અત્યંત વિશ્લેષણાત્મક મન અને લાજવાબ યાદશક્તિનો સમાવેશ થાય છે. એક તાર્કિક વિચારક એવી આ રાશિની મહિલાઓ અત્યંત સક્રિય અને આરોગ્ય પ્રત્યે સાવધ હોય છે, તેનું આકર્ષક, મજાકિયા, યથાર્થવાદી, ઇમાનદાર, સંગઠિત, સમર્પિત, ઉપયોગી, કોમળ જેવા શબ્દો વડે વર્ણન કરી શકાય. જોકે તેનો ગર્જના કરતો સ્વભાવ ચિંતાનું એક કારણ બની શકે છે. </p><p><b>કન્યા રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો:</b><br/> આશા ભોંસલે, રાકેશ રોશન, અગાથા ક્રિસ્ટી, રાણી એલિઝાબેથ, જોસેફ કેનેડી </p><p><b> કન્યા રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મકઃ  </b> વિનમ્ર, સતર્ક, વિશ્વસનીય, વ્યવહારિક મહેનત <br/><b>નકારાત્મક :</b>  ધાંધલિયા, વધારે પડતી નિંદા કરનાર, કઠોર, સંકુચિત </p><p><b> ચંદ્ર રાશિ પ્રમાણે કન્યા સાથે સુસંગત રાશિઓ: </b>વૃષભ, મકર </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> તુલા (લિબ્રા) રાશિની મહિલા હૃદયથી સંપૂર્ણપણે રોમેન્ટિક હોય છે. તે પોતાના પુરુષને પ્રેમ કરે છે, હેત દર્શાવે છે અને સન્માન આપે છે. તે એક યોગ્ય વ્યક્તિને પોતાની ઉપર ખુશીથી હાવિ થવા દે છે. સ્વભાવની દૃષ્ટિએ આ રાશિની મહિલાઓ શંકાળું હોતી નથી અને તે લોકોની ગોપનીયતામાં હસ્તક્ષેપ કરવાનો ક્યારેય પ્રયાસ કરતી નથી. તેને પોતાની સ્વતંત્રતા ગમે છે અને અન્યોને પણ સ્થાન આપે છે. તે ખાસ કરીને પર્ફ્યુમ, ઠાઠમાઠભર્યાં વસ્ત્રો અને ક્લાસિક મ્યુઝિક જેવી ખર્ચાળ આઇટમ પર ભારે ખર્ચ કરી શકે છે. જો તમે પોતાના લોજિક વડે તેને મનાવી શકો તો આ રાશિની મહિલાઓ હાર સ્વીકારવા તૈયાર હોય છે. આ મહિલાઓ અત્યંત વાતોડિયણ, અત્યંત બુદ્ધિશાળી હોય છે તથા તેને બૌદ્ધિક વાર્તાલાપ ગમે છે. તેનું ગાલમાં ખંજન ધરાવતું સ્મિત તથા મન મોહી લેતો શિષ્ટાચાર લાખો હદય ચોરી શકે છે. તેને સમાજમાં ભળવું ગમે છે અને તે હકીકતમાં એક બહુ જ સારી મિત્ર હોય છે. જોકે તે કોઇ નિર્ણય લેવામાં ઘણો સમય લેતી હોય છે. ઘણી વાર જાતક મહિલાના આદર્શો પાણીમાં જઈ શકે છે અને આ બાબત લોકોને અસહજ બનાવી શકે છે. </p><p><b>તુલા રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br /> કેટ વિન્સ્લેટ, રેખા, કરીના કપૂર, લતા મંગેશકર, અમિતાભ બચ્ચન, મહાત્મા ગાંધી, </p><p><b> તુલા રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મકઃ </b> કૂટનીતિક, રોમેન્ટિક, આકર્ષક, સમાધાનની વૃત્તિ ધરાવનારા, આદર્શવાદી <br/><b> નકારાત્મક :</b> દુવિધાની સ્થિતિ ધરાવનારા, અસ્થિર અને ભોળાં </p><p><b>ચંદ્ર રાશિ પ્રમાણે તુલા સાથે સુસંગત રાશિઓ: </b> મેષ, કર્ક, સિંહ, તુલા, ધન, મકર </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> વૃશ્ચિક (સ્કોર્પિયો) રાશિની મહિલા ભાવુક, અતિ ગુપ્તતા જાળવનારી, ચાલાક અને શક્તિશાળી હોય છે. તેને સાહજિકતા, ભાવુકતા અને આત્મવિશ્વાસસભર વ્યક્તિત્વ મળેલું હોય છે, જે તેને રોકી ન શકાય એવી બનાવે છે. તેને રહસ્યો ખોલવા ગમે છે અને તે પોતાના રહસ્યો પ્રગટ કર્યા વિના સહેલાઇથી તમારા સૌથી ઊંડા રહસ્યો બહાર લાવી દેશે. અસીમપણે કામુક, મૂડી, શાંત અને સ્વસ્થ એવી આ જાતક મહિલાને કોઇ પણ કુત્રિમ અને છીછરી બાબતમાં રસ હોતો નથી. તે એક કુશળ વાર્તાલાપ કરનારી હોય છે અને તે યુક્તિપૂર્વક અન્યો સાથે જોડાઈ શકે છે, જે તેને મિત્રો તથા પરિવારમાં લોકપ્રિય બનાવે છે. ઘણી વાર સંબંધમાં તેની ડરામણી આવેશપૂર્ણ તીવ્રતા તેને બહુ બધી અપેક્ષા રાખનારી તરીકે પ્રદર્શિત કરી શકે છે. જોકે તેનો પ્રેમ લત સમાન હોઈ શકે છે. તે એક પ્રાણીજ ઊર્જા ધરાવતી હોય છે જે લલચાવી શકે છે અને દુઃખ આપી શકે છે. તેનો ક્રોધ ઘણી વાર વિસ્ફોટક બની શકે છે. આથી તેનો સંવેદનશીલ સ્વભાવ બેધારી તલવાર જેવી ભૂમિકા ભજવી શકે છે. આ રાશિની મહિલાઓ માટે વેદના અનુભવવી અને દુઃખ પામવું અત્યંત સ્વાભાવિક હોય છે. </p><p><b>વૃશ્ચિક રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/> ઐશ્વર્યા રાય, ઇન્દિરા ગાંધી, જવાહર લાલ નહેરુ, શાહરુખ ખાન, બિલ ગેટ્સ, બ્રાયન આદમ્સ, ડેમી મૂર </p><p><b>વૃશ્ચિક રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br/><b>સકારાત્મકઃ </b> ભાવનાત્મક, તીવ્ર, ગરિમામય, સંવેદનશીલ, સાહજિક જ્ઞાન ધરાવનારા, કામુક, રહસ્યમય, આવેશપૂર્ણ <br/><b>નકારાત્મક : </b> ઇર્ષ્યાળુ, આક્રોશ, બંધનકારી, ઝનૂની, ગુપ્ત, જિદ્દી </p><p><b> ચંદ્ર રાશિ પ્રમાણે વૃશ્ચિક સાથે સુસંગત રાશિઓ: </b> કર્ક અને મીન.</p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> ધન (સેજિટેરિયસ) રાશિની જાતક મહિલા ચાતુર્યનો અભાવ ધરાવે છે, અને મોઢે જ સીધેસીધું કહી દેવાની રીતથી તમને એનાથી દૂર જઈ રહ્યાં હોવાની લાગણી થઈ શકે છે. આ રાશિની જાતક મહિલાઓ મનોહર, મૈત્રીપૂર્ણ, વાતોડિયણ અને બહિર્મુખ હોય છે. તેનું સ્પષ્ટવક્તાપણું તેને વાસ્તવિક વિશ્વમાં જીવતી રાખે છે. તે અત્યંત આશાવાદી હોય છે, પણ અતાર્કિક નથી હોતી. તે હકીકતોના આધારે સમગ્ર પરિસ્થિતિનો નિર્ણય કરશે, સંભવિત પરિણામનું વિશ્લેષણ કરશે તેમ છતાં તેનું માનવું એ જ હશે કે  જે થશે એ સારું થશે. સામાન્ય રીતે જાતક મહિલા ખુબ જ શાંત અને સ્વસ્થ હોય છે. જોકે જ્યારે તમે તેના પ્રત્યે કઠોર બનો અથવા તેનું અપમાન કરો, ત્યારે તે વળતો પ્રહાર કરે છે. આ જાતક મહિલા સ્વતંત્ર હોય છે અને તેને પોતાની સ્વતંત્રતા ગમે છે. આ જાતક મહિલા પરિવાર સાથે જોડાયેલી હોય છે, પણ બહુ વધારે પ્રમાણમાં નહીં. તેનું આખાબોલાંપણું ઘણી વખત તેને ભારે નુકસાન કરી શકે છે, એટલે સુધી કે સંબંધનો અંત આવવાની નોબત પણ આવી શકે છે. તેની પ્રામાણિકતા અને અસભ્યતા તેના વિશેના નકારાત્મક અભિપ્રાયોમાં વધારો કરે છે તેમ છતાં આ જાતક મહિલા ક્યારેય પાખંડ કરતી નથી. તે કોમળ હૃદય ધરાવતી હોય છે અને અંદરથી તે નિરાશ્રયી હોય છે. </p><p><b> ધન રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br /> ધર્મેન્દ્ર, શત્રુઘ્ન સિન્હા, દિલીપ કુમાર, વિન્સ્ટન ચર્ચિલ </p><p><b> ધન રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ </b> આશાવાદી, ખુશહાલ, જાત પર જ હસનારા, પ્રામાણિક, તત્વજ્ઞાની <br/><b>નકારાત્મક :</b> બેદરકાર, આંખો બંધ કરીને આશા  બાંધી લેનારા, ઉદ્વંડ, બેચેન <p><b> ચંદ્ર રાશિ પ્રમાણે ધન સાથે સુસંગત રાશિઓ  : </b>કર્ક અને મીન </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> મકર (કેપ્રિકોર્ન) રાશિની મહિલા એક વિનમ્ર વ્યક્તિ હોય છે જે શરૂઆતમાં સહેલાઈથી મળી શકાય એવી જણાતી નથી. આ જાતક મહિલા પોતાન આચરણમાં વધુ સાવચેત હોય છે. તેના મિત્રો બહુ ઓછાં પણ નિકટના હોય છે, જેની સાથે તેની સોબત શ્રેષ્ઠ હોય છે. તે બહુ વાતોડિયણ જણાશે નહીં અને જ્યારે જરૂર હશે ત્યારે જ બોલશે, હકીકતમાં તે એક બાજુ શાંત તો બીજી બાજુ મજાકમસ્તી કરનારી લાગી શકે છે. તેના મૂડમાં અવારનવાર ઉતારચડાવ આવતા રહે છે અને તેને જો તમારી સાથે સલામતી અનુભવે તો પોતાનો સંપૂર્ણ પ્રેમ અને જુસ્સો વ્યક્ત કરે છે. આ જાતક મહિલા જક્કી હોય છે, પોતાના નાણાં માટે અત્યંત સચેત હોય છે, રોજબરોજાના ખર્ચ પ્રત્યે તેનો અભિગમ થોડો કરકસરિયો હોય છે. પોતે કારકિર્દી લક્ષી હોવા છતાં તે પોતાના પરિવારની સારી કાળજી લે છે અને પોતે એક શ્રેષ્ઠ ગૃહિણી હોય છે. </p><p><b> મકર રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br/> અનુ અગરવાલ, રીના રોય, સલમાન ખાન, અનિલ કપૂર, જાવેદ અખ્તર, નાના પાટેકર </p><p><b> મકર રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ </b> વ્યવહારિક, સમજદાર, મહત્વાકાંક્ષી, ધૈર્ય ધરાવનારા, સાવધાન <br/><b>નકારાત્મક :  </b> નિરાશાવાદી, નિયતિવાદી, મખ્ખીચૂસ, વેરભાવ ધરાવનારા </p><p><b> ચંદ્ર રાશિ પ્રમાણે મકરની સાથે સુસંગત રાશિઓ: </b>વૃષભ, કન્યા</p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> કુંભ (એક્વેરિયસ) રાશિની મહિલા પોતાની સ્વતંત્રતાને ચાહનારી હોય છે તથા અત્યંત વ્યક્તિવાદી, બુદ્ધિશાળી અને કલ્પનાશીલ હોય છે. તેની વર્તણૂંક આગાહી ન થઈ શકે એવી હોય છે, તેની ઘણી વાતોની અન્યોને ખબર હોતી નથી. ઘણી વાર તે એક સામાન્ય માણસની સમજથી પર હોય છે. આ જાતક મહિલા તેની પોતાની શરતોએ પોતાનું જીવન જીવે છે અને તે કોઇનો હસ્તક્ષેપ ચલાવતી નથી. આ જાતક મહિલા માનવતાવાદી અભિગમ ધરાવે છે, તેમ છતાં જ્યારે તેના અંગંત સંબંધોનો સવાલ હોય છે ત્યારે તે ઘણી દૂર અને અલગ હોઈ શકે છે. તમને આ જાતક મહિલા થોડી ઠંડી, અને અસંવેદનશીલ લાગી શકે છે પણ એ સાચું નથી. તમને આ જાતક મહિલાઓ ઘણીવાર એના એક આગવા વિશ્વમાં વિહરતી જણાશે, ઘણીવાર તે અળગી અને બેધ્યાન જણાશે, આનો મતલબ એ નથી કે તે સચેત નથી. ઘણી વાર તે કોઇ બાબત અથવા કોઇ વ્યક્તિ વિશે એવી ઝીણામાં ઝીણી ચીજ કહી શકે છે કે જે બીજા બધા નોંધવાનું ચૂકી ગયા હોઈ શકે છે. સ્વતંત્રતા માટેની તેની ચાહત તેને થોડી ગાંડપણભરી ચીજો કરવા તરફ પ્રેરી શકે છે અ તેને ખુશ રાખવા માટે તમારે તેને ખુબ અવકાશ આપવો પડે છે. </p><p><b> કુંભ રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br /> ઉર્મિલા માતોંડકર, પ્રિટી ઝીન્ટા, વહીદા રેહમાન, સુભાષ ઘાઈ </p><p><b> કુંભ રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ  </b> મૈત્રીપૂર્ણ, માનવતાવાદી, અસલ, શોધખોળકરનારા, સ્વતંત્ર, બુદ્ધિશાળી <br /><b>નકારાત્મક : </b> વિકૃત, અસંવેદનશીલ, અલગ, આગાહી ન થઈ શકે એવા </p><p><b> ચંદ્ર રાશિ પ્રમાણે કુંભ સાથે સુસંગત રાશિઓ:</b>મિથુન અને તુલા </p>#<p><b>એસ્ટ્રો સ્કેચ : </b>(જન્મની વિગત પર આધારિત એક ટૂંકી પ્રોફાઇલ)<br/> મીન (પિસીઝ) રાશિની જાતક મહિલા ગહન અને રહસ્યમય હોય છે તથા તેને સમજવા માટે આકરી મહેનત કરવી પડે છે. તે એક આહલાદક સ્ત્રી અને અવિશ્વસનીય રીતે સુંદર, નાજુક અને અત્યંત સ્ત્રૈણ હોય છે. આ જાતક મહિલાઓ બહુ જ ભાવુક હોય છે અ ઘણી વાર તે પોતાના અંગત વિશ્વમાં રાચતી હોય છે, જે તેને થોડી કલ્પનાશીલ બનાવે છે. લોકો માત્ર તેની સંગતથી જ અનુકૂળતા અનુભવે છે કેમકે આ જાતક મહિલા કોઇ પણ પરિસ્થિતિમાં ગૌરવપ્રદ રીતે ગોઠવાઈ જાય છે. તેનો સ્વભાવ શરમાળ છે, તેને પોતાના રક્ષણ માટે અને પ્રેમ માટે કોઇની આવશ્યક્તા રહે છે, તેથી તે ક્યારેય આક્રમક થતી નથી. ક્યારેક આ મહિલા વધારે પડતી વફાદાર બની શકે છે. તેને સતત લાડ લડાવવા પડે છે. આ જાતક મહિલા થોડીઘણી ભ્રામક હોય છે, તે કોઇની સામે સંપૂર્ણપણે ખૂલીને વાત કરતી નથી અને ઘણી વાર ગુસ્સે કરી દેનારી હોય છે. અત્યંત પ્રતિભાવાન હોવા છતાં તેનામાં મહત્વાકાંક્ષાનો અભાવ હોય છે, અને તે અનુમાન ન થઈ શકે એવી હોય છે તેમજ તેના મૂડમાં ઉતારચડાવ આવતા રહેતા હોય છે. </p><p><b> મીન રાશિમાં જન્મેલા કેટલાક પ્રસિદ્ધ લોકો: </b><br /> પ્રિતી ઝિંટા, ચેલ્સિયા ક્લિન્ટન, એલ્બર્ટ આઇન્સ્ટાઇન, માઇકલએન્જેલો </p><p><b>મીન રાશિના લોકોમાં સામાન્ય રીતે મળી આવતા લક્ષણો: </b><br /><b>સકારાત્મકઃ </b> કલ્પનાશીલ, સંવેદનશીલ, દયાળુ, નિઃસ્વાર્થ સહાનુભૂતિ <br/><b>નકારાત્મક :</b> પલાયનવાદી, આદર્શવાદી, ગોપનીય, કમજોર ઇરાદા ધરાવનારા </p><p><b> ચંદ્ર રાશિ પ્રમાણે મીન સાથે સુસંગત રાશિઓ: </b>વૃષભ, મિથુન, કન્યા, ધન, મકર, મીન </p>
