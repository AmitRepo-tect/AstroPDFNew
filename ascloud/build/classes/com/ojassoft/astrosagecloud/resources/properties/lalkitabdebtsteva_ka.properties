	 RinIntroduction                = ಲಾಲ್ ಕಿತಾಬ್ ಪ್ರಕಾರ, ಸಾಲಗಳನ್ನು ಜಾತಕದ ದೊಡ್ಡ ದೌರ್ಬಲ್ಯಗಳಲ್ಲಿ ಒಂದೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ಪೂರ್ವಜರ ಸಾಲಗಳೆಂದರೆ ವ್ಯಕ್ತಿಯು ಪೂರ್ವಜರು ಮತ್ತು ಹಿರಿಯರು ಮಾಡಿದ ಪಾಪಗಳ ಪರಿಣಾಮಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ ಎಂದರ್ಥ. ಅರ್ಥಾತ್, ಸಂಬಂಧಿಕರು ಬೇರೆಯವರು ಮಾಡಿದ ತಪ್ಪುಗಳ ಪರಿಣಾಮಗಳನ್ನು ಎದುರಿಸಬೆಕಾಗುತ್ತದೆ. ಒಬ್ಬರ ಜಾತಕದಲ್ಲಿ ತೋರಿಸಲಾದ ಸಾಲವನ್ನು ಸಂಬಂಧಿಗಳ ಜಾತಕದಲ್ಲೂ ತೋರಿಸಲಾಗುತ್ತದೆ. ಸಾಮಾನ್ಯವಾಗಿ ಇಡೀ ವಂಶವು ಸಾಲಗಳಿಂದ ವೇದನೆ ಅನುಭವಿಸುತ್ತದೆ ಹಾಗೂ ಹೀಗಾಗಿ ಇಡೀ ಪರಿಹಾರವನ್ನೂ ಇಡೀ ವಂಶದ ಸಹಾಯದಿಂದಲೇ ಮಾಡಲಾಗುತ್ತದೆ. ವ್ಯಕ್ತಿಯು ರಾಜಯೋಗವನ್ನು ಹೊಂದಿದ್ದರೂ ಸಾಲವಿರುವ ಅವರ ಗ್ರಹಗಳು ಕೆಟ್ಟ ಫಲಿತಾಂಶಗಳನ್ನೇ ನೀಡುತ್ತದೆ.
