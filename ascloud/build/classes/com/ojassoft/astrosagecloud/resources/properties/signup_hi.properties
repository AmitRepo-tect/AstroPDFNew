

	 USER_ID_SHOULD_BE_8_OR_MORE_THAN_8_CHARACTERS						= यूज़र आईडी 8 या 8 से अधिक अक्षरों की होनी चाहिए।
	 USER_ID_SHOULD_NOT_BE_BLANK										= यूज़र आईडी रिक्त नहीं होनी चाहिए।
	 PLEASE_ENTER_ONLY_DIGIT_ALPHABAT_CHARACTERS_IN_THE_USER_ID_FIELD	= यूज़र आईडी फील्ड में केवल अंक और अक्षर दर्ज करें।
	 PLEASE_ENTER_VALID_EMAIL_ADDRESS_FOR_REGISTRATION_INFORMATION		= पंजीकरण सूचना के लिए मान्य ईमेल पता दर्ज करें.
	 USER_ID_AVAILABLE													= यूज़र आईडी उपलब्ध है।
	 USER_ID_NOT_AVAILABLE												= यूज़र आईडी उपलब्ध नहीं है।
	 SIGNUP																= पंजीकरण
	 YOU_ARE_UNABLE_TO_SIGN_UP											= आप साइन अप करने में असमर्थ हैं।
	 EMAIL_ID_ALREADY_EXIST												= यह ईमेल आईडी पहले से मौजूद है। कृपया किसी अन्य ईमेल आईडी से साइन-अप करें।
	 USER_ID_ALREADY_EXIST_CHOOSE_DIFFERENT								= यह यूज़र आईडी पहले से मौजूद है। कृपया किसी अन्य यूज़र आईडी से साइन-अप करें।
	 YOU_HAVE_SIGN_UP_SUCCESSFULLY										= आपका पंजीकरण सफलतापूर्वक हो गया है।
	
