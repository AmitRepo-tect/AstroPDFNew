
 SERVICE_NAME_1                                     = प्रश्न पूछें
 SERVICE_DESC_1                                     = क्या कोई प्रश्न आपके दिमाग़ में लगातार घूम रहा है और आपको परेशान कर रहा है? आप हर क़ीमत पर उसका उत्तर जानना चाहते हैं? ज्योतिष से आपको मिल सकता है आपकी चिंताओं और डर का समाधान।

 SERVICE_NAME_7                                     = स्वास्थ्य व फ़िटनेस रिपोर्ट
 SERVICE_DESC_7                                     = क्या आप अपनी सेहत और फ़िटनेस को लेकर गंभीर हैं ? यदि आप अपनी सेहत के बारे में जानना चाहते हैं तो हमारे ज्योतिष विशेषज्ञ करेंगे आपकी पूरी मदद। पाएँ हेल्थ और फिटनेस से जुड़े सभी सवालों का जवाब।

 SERVICE_NAME_14                                    = फोन पर ज्योतिष परामर्श (15 मिनट)
 SERVICE_DESC_14                                    = अब आप हमारे अनुभवी ज्योतिषाचार्यों से फोन पर भी परामर्श कर सकते हैं। अपने जीवन से जुड़ी विभिन्न बातें, जैसे- करियर, स्वास्थ्य, व्यवसाय, प्रेम और विवाह आदि विषयों पर बात कर सकते हैं। इस संबंध में हमारे ज्योतिषी आपको कुछ आसान उपाय बताएंगे। जिनके प्रभाव से आपके जीवन में आ रही परेशानियां दूर हो जाएंगी और आपको सफलता व हर्ष की प्राप्ति होगी। 

 SERVICE_NAME_4                                     = करियर रिपोर्ट
 SERVICE_DESC_4                                     = करियर में चाहिए बड़ा मुकाम और अपार सफलता। हमारे ज्योतिष विशेषज्ञ करेंगे आपका मार्गदर्शन। वैदिक ज्योतिष के माध्यम से पाएँ अपनी करियर संबंधी रिपोर्ट।

 SERVICE_NAME_12                                    = आर्थिक भविष्यफल
 SERVICE_DESC_12                                    = क्या आप जीवन में आर्थिक परेशानियों का सामना कर रहे हैं? धन की कमी होने से सता रहा है आर्थिक संकट का डर। हमारे ज्योतिष विशेषज्ञों की मदद से पाएँ आर्थिक जीवन से संबंधित रिपोर्ट और संवारे अपना आने वाला कल।

 SERVICE_NAME_13                                    = रत्न एवं ज्योतिषीय उपाय
 SERVICE_DESC_13                                    = राशि से संबंधित रत्न हमारे जीवन में अहम भूमिका निभाते हैं। क्योंकि ये रत्न नकारात्मक विचारों का नाश कर सकारात्मक ऊर्जा प्रदान करते हैं। एस्ट्रोसेज पर ज्योतिष विशेषज्ञों की मदद से पाएँ राशि रत्न से संबंधित विभिन्न जानकारी और उपाय।

 SERVICE_NAME_6                                     = वैवाहिक रिपोर्ट 
 SERVICE_DESC_6                                     = क्या विवाह के लिए है आपको सच्चे जीवनसाथी की तलाश? आपकी कुंडली में लव या अरेंज किस शादी के हैं योग। जानें अपनी विवाह से संबंधित रिपोर्ट और वैवाहिक जीवन को बनाएं खुशहाल।

 SERVICE_NAME_5                                     = लाल किताब उपाय
 SERVICE_DESC_5                                     = लाल किताब के उपायों से करें अपनी समस्याओं का समाधान। एस्ट्रोसेज पर उपलब्ध लाल किताब में विभिन्न समस्याओं के समाधान के लिए दिए गए हैं आसान उपाय। इन उपायों को अपनाकर दूर करें अपनी परेशानियाँ।

 SERVICE_NAME_2                                     = जन्म समय संशोधन
 SERVICE_DESC_2                                     = क्या आप अपने जन्म के समय को लेकर असमंजस में हैं? क्या आप अपने जन्म का सही समय और तारीख़ जानना चाहते हैं ? वैदिक ज्योतिष के माध्यम से पाएं अपनी इस समस्या का समाधान और जानें अपनी सही जन्म तिथि और कुंडली।

 SERVICE_NAME_20                                    = कुंडली आधारित भविष्यफल @@currentyear$ 
 SERVICE_DESC_20                                    = पाएँ जन्म कुंडली पर आधारित अपना भविष्यफल। इस राशिफल की मदद से जानें अपने करियर, प्रेम, आर्थिक, शिक्षा एवं पारिवारिक जीवन से संबंधित भविष्य और वैदिक ज्योतिष के माध्यम से पाएँ अपनी समस्याओं के उपाय।
 
 SERVICE_NAME_3  									= एस्ट्रोसेज बृहत् कुंडली
 SERVICE_DESC_3  									= 250 पन्नों से भी अधिक कलरफुल बृहत् कुंडली में आप पाएंगे: इस कुंडली में आपके विवाह, करियर, आर्थिक, स्वास्थ्य, संतान, प्रॉपर्टी एवं परिवार से जुड़ी महत्वपूर्ण भविष्यवाणी है। इसके अलावा इस कुंडली में आपके लिए शुभ समय, दशाफल, पाँच वर्षों का वर्षफल, राजयोग की विस्तृत जानकारी, व अंकशास्त्र रिपोर्ट। साथ ही इस कुंडली में साढ़े साती, काल सर्प एवं मंगल जैसे दोषों की जानकारी व बचने के कारगर उपाय बताए गए हैं। भाव-फल और ग्रह फल। केपी, केसीआईएल, अंकज्योतिष कस्पल इंटरिलंक्स, नक्षत्र नाड़ी, जैमिनी, लाल किताब टेवा और ऋण आदि विस्तृत गणना है। हिन्दी और अंग्रेजी भाषा में उपलब्ध

 SERVICE_NAME_8  									= राजयोग रिपोर्ट
 SERVICE_DESC_8  									= हमारी इस सेवा के माध्यम से जानें क्या आपकी कुंडली में बन रहे हैं राज योग। आपकी जन्म कुंडली के विभिन्न भावों में स्थित कौन से ग्रह कर रहे हैं राज योग का निर्माण, जो जीवन में आपको उन्नति के शिखर तक लेकर जाएंगे। इन योगों के प्रभाव से क्या आपको मिलेगी सरकारी नौकरी, होगा मनचाहा प्यार, बिजनेस में मिलेगी सफलता, जीवन के किस वर्ष में होगा भाग्योदय? अपने मन में आने वाली इन तमाम जिज्ञासाओं को इस सेवा के माध्यम से जानें। क्या आपकी कुंडली में भी हैं रज्जू, मूसल, नल, वापी, गदा और शकट आदि योग? ऐसे तमाम योग और उनके प्रभावों के बारे में जानने के लिए पढ़ें रोचक जानकारी। जानें कैसे वापी योग में जन्म लेने वाला व्यक्ति होता है धनवान। मूसल योग में जन्म लेने वाले व्यक्ति कैसे मिलती है जीवन में आर्थिक संपन्नता और सम्मान। नल योग से संबंधित व्यक्ति क्यों होते हैं चतुर और बुद्धिमान? जानें राज योग से जुड़े ऐसे और भी कई तथ्य व उनकी व्याख्या।

 SERVICE_NAME_9  									= वार्षिक कुंडली 2020
 SERVICE_DESC_9  									= वैदिक ज्योतिष के प्राचीन सिद्धान्तों पर आधारित वार्षिक कुंडली 2020 विशेष रूप से आपके लिए तैयार की गई है, ताकि आप 2020 में सफलता और समृद्धि के रास्ते पर आगे बढ़ सकें। यह उन सपनों की कुंजी है जिन्हें आप खुली आँखों से हमेशा-से देखते रहे हैं–प्रसन्नता, उल्लास और सन्तोष से भरे वर्ष की कुंजी। इसमें आप पाएंगे प्रेम, विवाह, करिअर, परिवार, स्वास्थ्य और भी अनेक विषयों से जुड़ी भविष्यवाणियाँ। हम मानते हैं कि आप ख़ास हैं और इसीलिए वार्षिक कुंडली 2020 में हम आपको ऐसे सूक्ष्म विश्लेषण, सटीक भविष्यवाणियाँ और आसान उपाय देंगे, जो ख़ास तौर पर आपके लिए ही तैयार किए गए हैं। चुनें साल 2020 में दुःख-दर्द से आज़ादी, ख़ुशियों से भरा और एक बेहतर भविष्य, चुनें वार्षिक कुंडली 2020 अभी।
 
