
	PERSON												= ವ್ಯಕ್ತಿ   
	MANGLIK											= ಮಂಗಳಿಕ 
	PERSON_IS_MANGLIK									= Person is Manglik
	PERSON_IS_NOT_MANGLIK								= Person is not Manglik
	MANGLIK_DETAILS_PARAGRAPH1							= ಸಾಮಾನ್ಯವಾಗಿ ಮಂಗಳಿಕ ದೋಷವನ್ನು ಜನ್ಮ ಜಾತಕದಲ್ಲಿನ ಲಗ್ನ ಹಾಗೂ ಚಂದ್ರನಿಂದ ಪರಿಗಣಿಸಲಾಗುತ್ತದೆ
	MANGLIK_DETAILS_FIRST								= ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ಮಂಗಲ 
	MANGLIK_DETAILS_SECOND								=  ಲಗ್ನದಿಂದ ರ ಮನೆಯಲ್ಲಿರುತ್ತದೆ, ಹಾಗೂ ಚಂದ್ರ ಜಾತಕದಲ್ಲಿ ಮಂಗಲವು 
	MANGLIK_DETAILS_THIRD								=  ಮನೆಯಲ್ಲಿರುತ್ತದೆ.
	MANGLIK_DETAILS_HENCE_NOTE							= ಆದ್ದರಿಂದ ಮಂಗಲ ದೋಷವೆಂದರೆ
	PRESENT_NEITHER_IN_LAGNA_CHART_NOR_IN_MOON_CHART	= ಆದ್ದರಿಂದ ಮಂಗಳ ದೋಷವು ಲಗ್ನ ಚಾರ್ಟ್ ಮತ್ತು ಚಂದ್ರ ಚಾರ್ಟ್ ನಲ್ಲಿ ನೆಲೆಗೊಂಡಿಲ್ಲ 
	MANGLIK_DETAILS_HENCE_NOTE1						= ಆದ್ದರಿಂದ ಮಂಗಳ ದೋಷವು ಲಗ್ನ  ಜಾತಕ ಮತ್ತು ಚಂದ್ರ ಜಾತಕದಲ್ಲಿ  ಇದೆ. 
	MANGLIK_DETAILS_HENCE_NOTE2						= ಆದ್ದರಿಂದ ಮಂಗಳ ದೋಷವು ಲಗ್ನ ಜಾತಕದಲ್ಲಿ  ಇದೆ  ಮತ್ತು  ಚಂದ್ರ ಜಾತಕದಲ್ಲಿ ಇದೆ 
	MANGLIK_DETAILS_HENCE_NOTE3						= ಆದ್ದರಿಂದ ಮಂಗಳ ದೋಷವು ಲಗ್ನ ದೋಷದಲ್ಲಿ ಇಲ್ಲ  ಆದರೆ  ಚಂದ್ರ ಜಾತಕದಲ್ಲಿ ಇದೆ. 
	MANGLIK_DETAILS_PARAGRAPH4							= ಮಂಗಲ ದೋಷ ವ್ಯಕ್ತಿಯ ವೈವಾಹಿಕ ಜೀವನದಲ್ಲಿ ಅಡಚಣೆಗಳನ್ನು ಉಂಟುಮಾಡುತ್ತದೆಂದು  ಪರಿಗಣಿಸಲಾಗಿದೆ. ಕೆಲವರ ಪ್ರಕಾರ ಮಂಗಲ ದೋಷ ಆಗಾಗ್ಗೆ ಅನಾರೋಗ್ಯ ಅಥವಾ ಅಂತಿಮವಾಗಿ ಸಂಗಾತಿಯ(ಗಳ) ಸಾವಿಗೂ ಕಾರಣವಾಗಬಹುದು.
	MANGLIK_DETAILS_PARAGRAPH5							= ಒಬ್ಬ ಮಂಗಳಿಕ ದೋಷದ ವ್ಯಕ್ತಿ ಇನ್ನೊಬ್ಬ ಮಂಗಳಿಕ ದೋಷದ ವ್ಯಕ್ತಿಯ ಜೊತೆ ಮದುವೆಯಾದರೆ ನಂತರ ಮಂಗಳಿಕ ದೋಷ ನಕಾರಾತ್ಮಕವಾಗುತ್ತಿದ್ದು ಯಾವುದೇ ಪರಿಣಾಮ ಹೊಂದಿರುವುದಿಲ್ಲವೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ.
	MANGLIK_DETAILS_SUBHEADING1						= ಕೆಲವು ಪರಿಹಾರಗಳು (ಮಂಗಲ ದೋಷವಿದ್ದಲ್ಲಿ)
	MANGLIK_DETAILS_SUBHEADING2						= ಪರಿಹಾರಗಳು (ಮದುವೆಗೆ ಮುಂಚೆ ಮಾಡಬೇಕು)
	MANGLIK_DETAILS_SUBHEADING3						= ಪರಿಹಾರಗಳು (ಮದುವೆಯ ನಂತರ ಮಾಡಬಹುದಾಗಿದೆ)
	MANGLIK_DETAILS_PARAGRAPH6							= ಕುಂಭ ವಿವಾಹ, ವಿಷ್ಣು ವಿವಾಹ ಮತ್ತು ಅಶ್ವತ್ಥ ವಿವಾಹಗಳು ಮಂಗಲ ದೋಷಕ್ಕಾಗಿ ಅತ್ಯಂತ ಜನಪ್ರಿಯ ಪರಿಹಾರಗಳಾಗಿವೆ. ಅಶ್ವತ್ಥ ವಿವಾಹವೆಂದರೆ ಪೀಪಲ್ ಅಥವಾ ಬಾಳೆ ಮರದ ಜೊತೆ ವಿವಾಹ ನಡೆಸಿ ನಂತರ ಆ ಮರವನ್ನು ಕತ್ತರಿಸುವುದಾಗಿದೆ. ಘಟ ವಿವಾಹವೆಂದೂ ಕರೆಯುವ ಕುಂಭ ವಿವಾಹವೆಂದರೆ ಒಂದು ಮಡಕೆಯ ಜೊತೆ ಮದುವೆಯಾಗಿ ನಂತರ ಅದನ್ನು ಒಡೆದುಹಾಕುವುದಾಗಿದೆ.
	REMEDIES1											= ಕಿತ್ತಳೆ ಗಣಪತಿಯನ್ನು (ಕಿತ್ತಳೆ ವರ್ಣದ ಗಣೇಶ) ಕೊಠಡಿಯಲ್ಲಿಡಿ ಹಾಗೂ ದಿನವೂ ಪೂಜೆ ಮಾಡಿ. 
	REMEDIES2											= ದಿನವೂ ಹನುಮಾನ್ ಚಾಲೀಸಾ ಓದುವ ಮೂಲಕ ಹನುಮಂತನನ್ನು ಪೂಜಿಸಿ.
	REMEDIES3											= ಮೃತ್ಯುಂಜಯ ನಾಮಸ್ಮರಣೆ (ಮೃತ್ಯುಂಜಯ ಮಂತ್ರ ಪಠಣ).
	MANGLIK_DETAILS_SUBHEADING4						= ಪರಿಹಾರಗಳು (ಲಾಲ್ ಕಿತಾಬ್ ಆಧರಿಸಿ, ಮದುವೆಯ ನಂತರ ನಡೆಸಬಹುದಾಗಿದೆ)
	LK_REMEDIES1										= ಪಕ್ಷಿಗಳಿಗೆ ಏನಾದರೂ ಸಿಹಿ ತಿನ್ನಿಸಿ. 
	LK_REMEDIES2										= ಮನೆಯಲ್ಲಿ ಆನೆದಂತದವನ್ನಿಟ್ಟುಕೊಳ್ಳಿ (ಆನೆಯ ಹಲ್ಲು).
	LK_REMEDIES3										= ಏನಾದರೂ ಸಿಹಿಯನ್ನು ಮಿಶ್ರ ಮಾಡಿ ಹಾಲಿನ ಜೊತೆ ಆಲದ ಮರವನ್ನು ಪೂಜೆ ಮಾಡಿ.
	MANGLIK_DETAILS_NOTE								= ಈ ಪರಿಹಾರಗಳನ್ನು ನೀವೇ ಮಾಡುವ ಮೊದಲು ಒಬ್ಬ ಜ್ಯೋತಿಷಿಯನ್ನು ಸಂಪರ್ಕಿಸುವಂತೆ ನಾವು ಬಲವಾಗಿ ಶಿಫಾರಸು ಮಾಡುತ್ತೇವೆ.
