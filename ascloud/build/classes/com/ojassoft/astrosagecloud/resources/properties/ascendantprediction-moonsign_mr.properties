     HEALTH_PREDICTION                      = ज्यांचे द्विज मेष राशीत आहे, त्यांना डोकेदुखी, अर्धशिशी, चेतनी शूल व अवसादावस्था या प्रकारच्या व्याधी होण्याचा संभव असतो. अपचन व चेतीय विकृती, तसेच अपघात व इजा, आणी अधूनमधून मूळव्याध असे आजार होऊ शकतात. मेष राशीच्या बऱ्याच व्यक्तिंना जन्मतः डोक्यावर किंवा चेहऱ्यावर जन्माखूण असते. मेष राशीच्या व्यक्तिला उच्च रक्तदाबासारखे रक्ताभिसरणाचे विकार होऊ शक्तत. #वृषभ ही रास जरी बलवान, सुदृढ असली तरी या राशीचे काही दुर्बल घटक आहेत ज्यामुळे आयुष्यभर बारीक सारीक अडचणी उदभवू शकतात. मज्जा संस्थेशी निगडीत रोग होऊ शकतात. बरेच वृषभ राशीतले लोक स्थूल असतात, खास करून मे महिन्यात जन्मलेले असल्यास. लैंगिक आजार होण्याचा संभव असतो. मानेचा मणका, दात व खालचा जबडा, हनुवटी व टाळू यांचे विकार होऊ शकतात. वृषभ राशींच्या व्यक्तिंमध्ये मूत्रपिंड, गुप्तांग, मूत्राशयाचे विकार, मानेचे विकार व कानदुखी जास्त आढळून येते. #या राशीचे स्वभावधर्म आहेत विमनस्कता, निराशावाद व अधीरपणा. क्षयरोग, दमा व रक्तक्षय ही या राशीची सामाईक दुखणी. चेतीय विकृती व श्वसनाची दुखणी, खास करून श्रवण शक्तीची दुखणी व्हायचा संभव असतो.  श्वसनाचे व चेतीय विकार सहज आढळून येतात. #या राशीचे स्वभावधर्म आहेत विमनस्कता, निराशावाद व अधीरपणा. क्षयरोग, दमा व रक्तक्षय ही या राशीची सामाईक दुखणी. चेतीय विकृती व श्वसनाची दुखणी, खास करून श्रवण शक्तीची दुखणी व्हायचा संभव असतो.  श्वसनाचे व चेतीय विकार सहज आढळून येतात. #सिंह राशीची मुख्य व्याधि हृदयाशी निगडीत असते. खास करून हृदयातील धामणीन्चे अधिधारण होऊन रक्ताच्या गुठळ्या होणे, किंवा अधिधारणामुळे हृदयविकाराचा झटका येणे. चेताविभांजानामुळे हृदयावर परिणाम होऊन धडधड वाढण्याचा धोका असतो. सिंह राशिला पाठीत व फुफुसात कळ, मणक्याच्या तक्रारी, हृदय व रक्ताचे विकार, बरगड्यांचे दुखणे, डोळ्यांचे विकार, ताप व फेपरयाचे आचके यासारखी दुखणी लागण्याचा संभव असतो. #आतड्यांचे विकार व बद्धकोष्ठ हे कन्या राशिचे मुख्य विकार. कन्या राशीच्या लहरीपणामुळे व उद्वेगी प्रवृत्तीमुळे आजूबाजूच्यांना देखील क्लेष होऊ शकतो. कन्येत द्विज असलेल्या व्यक्तिंना लैंगिक अवयवांच्या तक्रारी असू शकतात. या व्यक्तिंनी आपल्या आहाराची काळजी घेणे गरजेचे असते. चमचमीत पदार्थ टाळावेत कारण त्यांनी पोटाला त्रास होऊ शकतो. #निद्रानाश, चमचमीत जेवण व अत्याधिक मद्यपानामुळे तूळ राशिच्या व्यक्तिंची त्वचा संवेदनशील झालेली असते. मलानिसारण अवयवांची कार्य तूळ रास नियंत्रित करते - जसे गुरदे व त्वचा, पाठीचा खालचा भाग व ढुंगण आणी मुत्रापिंदाजवळील ग्रन्थि. गुरदे, पाठीचा खालचा भाग व अंडाशय यावर तुळाचे राज्य असते. पाठदुखी व चमचमीत व गोड पदार्थांमुळे उद्भवलेले आजार तुळ राशित बघायला मिळतात. #पुनरुत्पादक अवयव व मलानिसारण अवयव यांवर व्रिश्चिक राशीचे वर्चस्व असते. व्रिश्चिक राज्य करतो नाक व सारावर, गुह्य रोम प्रदेशाचे क्षेत्र, गुप्तांग व रक्तद्रव्य यांवर. ओटीपोट, पुनरुत्पादक अवयव व मूत्रमार्ग यांवर व्रीश्चीकाचे वर्चस्व असल्यामुळे कलेजा व गुरदे यांचे विकार, तसेच मूत्राशयात खडे होण्याची शक्यता असते. व्रिश्चिकत द्विज असणाऱ्यांना बवासीर किंवा जठरा संबंधी व्रण होऊ शकतात. #जांघांचे व मांडीचे आजार धनु राशिच्या व्यक्तिंना पीडू शकतात. धनु राशिचा आणी पाठदुखीचा जुना संबंध आहे. तापाच्या व फुफुसंच्या तक्रारी देखील या राशित आढळून येतात. चमचमीत खाणे आणी मद्यपान यांमुळे संधिवाताचे विकार उद्भवू शकतात. #वाताचे विकार मकर राशिला पीडतात. द्विजात मकर रास असलेल्या व्यक्ति सहज आजारी पडत नाहीत परंतु, एकदा आजारी पडल्यानंतर आजाराची चिन्हे सोडायला तयार नसतात. मकर रास केस, दात, त्वचा, गंढ व मज्जासंस्था यावर राज्य करते. गुद्ग्याखालील अपघाती इजा जसे मुरगळ, हाडे तुटणे व सांधा निकळणे या राशित दिसून येतात. #कुंभ रास श्वासोश्वास, अभिसारण व डोळे, व शरीराच्या खालच्या भागातल्या हाडांवर राज्य करते. रक्त अशुद्धी ची शक्यता असते, तसेच रक्ताभिसारणाचे रोग उद्भवू शकतात. रक्तदाब व हृदय विकारांपासून सावध राहणे योग्य. कुंभाचे गिटटा, अभिसरण, आखडी व छापाकी, अनपेक्षित आजार व अपघात  यांवर  ताबा असतो. अनेक चिंताग्रस्त बंडाळी यांना देखील तोंड द्यावे लागू शकते. #मीन राशिचे अंतःस्त्राव प्रणालीवर राज्य असते त्यामुळे मधुमेहाचा त्रास पायांना व इतर अवयवांना होऊ शकतो. सूज, औषधांवर प्रतिक्रिया, पायांना दुखापत  व तत्सम आजार या राशित आढळतात. मीनाच्या भावूक स्वभावामुळे मानसिक आजारांचा धोका असतो.
     TEMPERAMENT_AND_PERSONALITY_PREDICTION = मेष राशिच्या व्यक्तींमध्ये भरपूर ताकत व उत्साह असतो, ज्यामुळे या व्यक्ति नेहमी पुढाकार घेण्यास तत्पर असतात. स्पष्टवक्तेपणा ही त्यांची मुख्य खुण. जन्मजात पुढारी असल्यामुळे मेष राशिला दुसऱ्यांकडून आदेश घेणे पटत नाही. त्यांच्या लहरीपणामुळे या व्यक्ति आकर्षक वाटतात परंतु अशा स्वभावामुळे ते आक्रमक आणी चंचल वाटू शकतात. नाही म्हणायला, या व्यक्ति पटकन पटतात व खूष होतात. स्पष्टवक्तेपणामुळे बऱ्याचदा वादविवादास  बळी पडतात. त्यांचा हट्टीपणा व चटकन राग येण्याची वृत्ती इतरांना संभ्रमात पाडू शकते, पण ही माणसे तितकीच लवकर शांत देखील होतात. त्यांचा लहरीपणा कधी कधी त्यांना गोत्यात आणू शकतो. मेष राशिला सौंदर्य, कला व दिमाख आवडतात पण पाण्यापासून ही माणसे लांब राहतात. या राशिला आराम सर्वात प्रिय असतो, पण ठरवलेले कार्य पार पडल्यानंतरच. मेष राशीची व्यक्ति समजूतदार व प्रेमळ असते, कधी कधी भावूक असली तरीही. #या राशीखाली जन्माला आलेली व्यक्ति अनोळखी माणसांसमोर बैलाप्रमाणेच वागतात.  नवीन नवीन माणसांना भेटणे त्यांना विशेष आवडत नाही,  ते त्यांच्या शांत अंतराभिमुख स्वभावात बसत नाही. वृषभ व्यक्ति संतप्त, जागृक व सनातनी होतात जेव्हा त्यांना नीट हाताळले जात नाहीत, जेव्हा कोणी त्यांचे ऐकत नाही. अशा संकोचशील स्वभावामुळे नवीन मैत्री करण्यास त्यांना वेळ लागतो. पण वृषभ रास विश्वासू व वास्तववादी असल्यामुळे धंद्यात यश मिळवू शकते. वृषभ एक इन्द्रियभोग्य रास आहे - वृषभ व्यक्तिंना सर्व क्षेत्रांत शारीरिक सुख घ्यायला आवडते. परंतु हातातले काम आपल्या सवडीने करतील. इतरांच्या कामाची व कौशल्याची दाद द्यायला ही विसरणार नाहीत. कधी कधी आपली हुकुमत गाजवतील. सहजासहजी कोणाकडे आकर्षित होत नाहीत, पण झालेच तर फार सावकाश आगेकूच करतील. आपल्या नीती तत्वांना वृषभ व्यक्ति सहज सोडणार नाही. तरीही, वृषभ व्यक्ति प्रेमळ असतात, सत्यनिष्ठ असतात व त्यांचे चुंबकीय व्यक्तिमत्व इतरांना सहज आकर्षित करते. वृषभ व्यक्ति आवेगात कामे करत नाहीत पण जास्त दाबल्यास बैलांप्रमाणेच चवताळू शकतात. कधी कधी पक्षपाती, हट्टी व अतार्किक वागतात. जोडीदाराची निवड करताना अत्यंत सावधगिरीने पाऊल उचलतात. त्यांना खोटे बोलायला आवडत नाही, पण त्यांचे कान भरणे देखील कठीण नसते. #मिथुन राशीची व्यक्ती खूपच मवाळ, मनमोहक व चैतन्यपूर्ण असते, संभाषणात निपुण असते. चुणचुणीत मन व तन ही त्यांची वैशिष्टे, व ह्या व्यक्ती असतात त्यापेक्षा बऱ्याच लहान दिसतात. सतत काहीतरी नाविन्यपूर्ण करत असतात. धोका हा की सारखी आपली मते बदलत राहिल्यामुळे ही माणसे चंचल असतात व सहज कंटाळतात, कुठल्या एका गोशितीवर फार काळ एकाग्र होऊ शकत नाहीत. आपले काम साधण्यासाठी दुसऱ्यांचा वापर करून घ्यायचा ही ह्यांचा पिंड असतो. परंतु ह्या उणीवा भरून निघतात निव्वळ त्यांच्या उपस्थितीने, त्यांच्या उत्साहाने व उस्फुर्त वागण्याने. त्यांच्यावर अवलंबून राहणे कठीण असते कारण ह्या व्यक्ती चंचल असून सतत आपले मत बदलत असतात. मिथुनाचा मती वर जोर असतो आणी सर्व बुद्धीजीवी वस्तूंवर विश्वास असतो. ज्ञान साठवण्यापेक्षा वाटण्यात त्यांना जास्त रस असतो. मिथुन ही सर्व राशींमध्ये सर्वगुण संपन्न अशी मानली जाते. परंतु, कुठलीही गोष्ट त्यांच्या साठी दगडावरची रेघ नसते. आज एक मत तर उद्या दुसरे. ही माणसे मुक्त विहार करतात, कुतूहल अंड ज्ञानाच्या शोधात. कोणत्याही एका कार्यात फार वेळ अडकून राहू शकत नाहीत आणि कोणतेही नवीन कार्य त्यांना लगेच आकर्षित करते. मनावरचा ताबा कमी असतो. #कर्क राशी स्वप्नाळू, अंतरज्ञानी, भावूक असते, हीला जोपासण्याची गरज असते. संभाषणिक व वाग्मायीन कला या माणसांमध्ये उपजत असतात. चतुर, उत्साही व डोकेबाज असतात, परंतु तितक्याच विसंगतही असू शकतात. त्यांचा आध्यात्माकाध्ये कल असतो तर काहींच्या मानसिक शक्ती विकसित असतात. स्मरणशक्ती उत्तम उत्तम असते. कनवाळू, संवेदनशील व करुणामयी असतात. कौटुंबिक बाबी त्यांना फार जवळच्या असतात व आपले घर सुशोभित करणे त्यांना फार आवडते. वय्यत्तिक नातेसंबंधांमध्ये कर्क रास कठोरता व मृदुपणा यांचे मिश्रण असते. जितकी ही माणसे भावूक व भावनाप्रधान असतात, तितकीच ती निष्ठावान व स्वमित्वावाचक असतात. हेवेदावे सहजासहजी विसरत नाहीत. 'झाले गेले विसरून जावे' ही म्हण त्यांच्या शब्दकोशात नसते - कोणाचीही चूक ते विसरत नाहीत. भावूक प्रवृत्तीचे असल्यामुळे ते जितके चांगले मित्र होऊ शकतात तितकेच वाईटही. चाणाक्ष असतात, तितकेच सावध आणी हाती घेतलेले काम चोख पार पाडून दाखवतात. #सिंह राशीतील माणसांचे व्यक्तिमत्व आकर्षक व गतिप्रेरक असते. सिंह व्यक्ती धडाडी, शूर, सकरात्मक, जिद्दी व  स्वावलंबी असते. अतिशय सडेतोड, ही माणसे आपल्याला हवे असलेले चोख ओळखून असतात व त्यासाठी उत्साहाने व सर्जनशील पद्धतीने काम करतात. कधी कधी लहरी असू शकतात, आणी जर कोणीही द्वेषाने  किंवा आक्रमक वागले तर सिंह व्यक्ती त्यांना फटकळपणे उत्तर देऊ शकतात. वयत्तिक टीका त्यांना पचत नाही आणी त्यांच्या अधिकाराला कोणी ललकारले तर त्यांचा राग उफाळून येऊ शकतो. हट्टी स्वभावामुळे आपले विश्वास ते बदलायला बिल्कुल तयार नसतात. मूलतः ध्येयवादी व दयाळू असतात. सिंह व्यक्ती आनंदी, बुद्धिमान, मनमिळाऊ, बोलकी  व सहिष्णू असते. त्यांचा निर्धार पक्का असतो - त्यांचा राग नाकावर असला तरी तो तितकाच लवकर शांतदेखील होतो. कधी कधी राग मनात धरून ठेऊ शकतात, पण ही माणसे स्वतंत्र विचाराची असतात . स्वतः धर्माच्या बाबतीत सनातनी असले तरी इतरांच्या धार्मिक श्रद्धांना तेवढाच मान देतात. #कन्या राशीची व्यक्ती मवाळ व मृदु असते, भिडस्त असते. सामाजिक वर्तुळानमध्ये वावरायला मदत करतील अशा व्यक्तींशी ही माणसे मैत्री करतात. शांत व तर्कशुद्ध पद्धतीने अडचणींना सामोरे जायची त्यांची प्रवृत्ती असते. हा शांतपणा कधी कधी लोकांना बर्फाळ किंवा हिशेबी वाटू शकतो. परंतु किचकट समस्यांचे विश्लेषण करून सोडवणे हे त्यांचे वैशिष्ट्य. बारीक तपशील त्यांच्या नीट ध्यानी राहतो, पण कधी कधी त्यामुळे मूळ चर्चेचा विषय त्यांच्या गावी नसतो. ही माणसे अत्यंत बुद्धिमान असतात व कटू वस्तुस्थितीची परवा करत नाहीत. कन्या रास मनमिळाऊ असते, तसेच बऱ्याच विषयात ज्ञानी असते, चाणाक्ष, कुशाग्र, चिकित्सक व धैर्यवान असतात. नीट पारखून मैत्री करतात पण ती खोलवर जाउ देत नाहीत. काळजी करत बसणे   व रोगविभ्रमात राहणे हे त्यांचे आणखीन एक वैशिष्ट्य. इतरांची मदत करण्यात कधी कधी इतके मग्न होतात की आपला दुरुपयोग करून घेतात. कन्या राशीची माणसे छिद्रान्वेषण करण्यात, स्वतःची व दुसऱ्यांची टीका करण्यात पटाईत असतात. #तुळ राशीच्या व्यक्ती विवादात पडण्यापेक्षा सहकार्य करून तडजोड करण्यास जास्त तयार असतात, जरी त्यांना आपली बाजू बरोबर वाटली तरी. दुसऱ्यांबरोबर वाद घालणे त्यांना असुखकर वाटते, असुरक्षतेची भावना देते. त्यांना आयुष्यात एकोपा सर्वात महत्वाचा वाटतो व त्यासाठी ते वाटेल ते करतील. ते डळमळीत असतात, अविश्वासू असतात, त्यांना नित्यकर्माची गोडी नसते, लाजरे असतेत व पारंपारिक विचारांचे असतात. सहज चिडत नाहीत परंतु कधी कधी इतरांना आपल्या उफाळलेल्या रागाने धक्का देतात. ही माणसे वास्तववादी नसून ध्येयवादी असतात, हवेत महाल बांधायला त्यांना आवडते. तुळ राशीची व्यक्ति कलात्मक व सुसंस्कृत असते, पक्क्या मताची असते, पण मनोहारी व प्रामाणिक असते. गैरवाजवी असली तरी ही माणसे शांतीप्रिय, संगतीप्रिय असतात. तुळ राशीला सर्वात सुसंस्कृत मानले जाते - ही माणसे दिसायला आकर्षक, सुविकसित असतात. समाजात मिसळायला यांना आवडते कारण त्यामुळे त्यांचे समाजातले स्थानही बळकावते. निर्णय घेताना ही माणसे वस्तुनिष्ठ व निःपक्षपाती असतात. #व्रीश्चिक रास स्व टीका, एकाग्रता, उत्कटता या गुणांसाठी नावाजलेली आहे - या गुणांमुळे उच्चकोटीचे यश नाहीतर अपयश हाती येते. सहज भडकणारा राग   व स्वतःचाच घात करून घ्यायची वृत्ती ह्या माणसांमध्ये दिसून येते. आपल्या आवडीच्या माणसाबद्दल संशयी व मत्सरी वागतात. त्यांच्या भावनिक जोषामुळे ही माणसे कोणत्याही व्यवसायात चमकू शकतात, परंतु त्याचे यशात किंवा अपयशात रुपांतर करणे फक्त त्यांच्याच हाती असते. व्रीश्चिक माणसे आत्यंतिक असतात, ताकदवान स्वभावाचे असतात. हट्टी, दिमाखदार पण शांत असतात. आयुष्यात तडजोड करणे त्यांना पसंत नसते. कार्यात स्वतः गुंतलेले नसले तरी काळजी पोटी त्यातले सर्व तपशील त्यांना माहित असतात. त्यांचा कनवाळूपणा त्यांना सुरेख मित्र बनवतो पण ही माणसे तितकीच दगाबाज दुश्मन बनू शकतात. बळ, आत्मविश्वास, उदारता व आकांक्षा एकत्र आणल्या तर व्रीश्चिक व्यक्ती कोणतीही कामगिरी उत्तम बजावतील. इतरांकडून उच्च महत्वाकांक्षा ठेवतील पण स्वतःला जमणार नाही ते इतरांकडून अपेक्षित करणार नाहीत. #धनु राशीची व्यक्ती नेहमी हसतमुख व भविष्यासाठी आशावादी असते. साधारणतः त्यांचा स्वभाव प्रेमळ असतो, त्यांच्यात अपार मौज करण्याची क्षमता असते तसेच अध्यात्मिक कुवतही असते. प्रतिकूल परिस्थितीमध्ये ते अधीर असतात, जबाबदारीला घाबरतात, माथेफिरू होतात व स्वतःच्याच जगात वावरतात. त्यांच्या साम्भाशानातल्या आतताईपणामुळे इतर त्यांच्याबद्दल गैरसमज करून घेऊ शकतात. त्यांना जुगाराचे ही वेड असू शकते. धनु राशीच्या माणसांची वैशिष्ट्ये असतात - आशावाद, उत्साह व स्फूर्ती. धनु राशीची माणसे नेहमी आशावादी असतात - उद्योगी, धाडसी व आपले जीवनातील  अनुभव रुंद कर करण्यास तत्पर असतात.  ते फार बोलत नाहीत, पण त्यांची वक्तृत्व शैली सर्वांना मोहीत करते. प्रवास करणे व परिसराचे अन्वेषण करणे त्यांना आवडते. धनु राशीची माणसे अब्रूदार, विश्वासू, प्रांजळ, उदार, प्रामाणिक व न्यायप्रेमी असतात. ती नम्र व इमानी असतात तसेच अध्यात्मिकही असतात. जिद्दी व संयोजन करण्यात निपुण असल्यामुळे कोणतेही कार्य सफलतेने पार पाडू शकतात. #मकर राशीची व्यक्ती धार्मिक असण्याचा मोठा दिखावा करते पण प्रत्यक्षात अजिबात धार्मिक नसते. स्वार्थी, लबाड, जिद्दी व आतल्या गाठीची - ही विशेषणे त्यांना लागू पडतात. ऐकण्यापेक्षा बोलण्यात त्यांना जास्त रस असतो, त्यामुळे कधी कधी त्यांचा ताबा सुटून ते इतरांना दुखवू शकतात. मकर राशीची व्यक्तीकडे चांगल्या संघटनात्मक कला असतात, ती नीटनेटकी असतात व त्यांच्याकडे उत्तम व्यावहारिकता असते. त्यांची काम करण्याची नितितत्वे, अधिकाराबद्दल आदर उत्तम असतात, पण त्यांचा इहवाद व सनातनी स्वभाव आड येऊ शकतो. या राशीची माणसे महत्वाकांक्षी व कर्तव्यनिष्ठ असतात पण खुनशी देखील असू शकतात. जबाबदार व वास्तववादी असतात पण स्वतःची दया करणेही त्यांना आवडते. त्यांचा युक्तीवाद उत्तम असतो व उद्धिष्ट आणी दिशा ही माणसे सोडत नाहीत. इतरांमध्ये ही माणसे तटस्थ व गंभीर वाटू शकतात पाण तुम्ही त्यांचा विश्वास जिंकलात तर ती आयुष्यभराची घट्ट मैत्री होऊ शकते. कोणत्याही कामास तत्पर, ह्या माणसांना स्वाभिमान खूप महत्वाचा असतो. त्यांचे विचार तत्वज्ञानी नसून वास्तविक असतात. स्वतःच्या सुखासाठी प्रेमात पडण्याची त्यांची तयारी असते. #कुंभ राशीचे वैशिष्ट्य आहे तिची संपर्क साधण्याची तीव्र इच्छा. ज्यांचे विचार थोडेफार सनातनी असतील त्यांच्यासमोर आपले ठाम विचार आडदांडपणे मांडणे उचित नसते हे कुंभाला बऱ्याच वेळा कळत नाही. कुंभ व्यक्ती आकर्षक व मोहक असतात, लाजरी, संवेदनशील, मृदु असतात किंवा अती उत्साही प्रदर्शनीय स्वभावाची असतात. निष्ठावान असतात व जे बरोबर आहे त्यासाठी लढण्यास तत्पर असतात, आद्यप्रवर्तक असतात. फार पूर्वग्रह मनात ठेवत नाहीत, इतरांच्या विचारांना मान द्यायची त्यांची तयारी असते. चांगले श्रोते असतात, मैत्रीला खूप मान देतात. प्रेमळ, परखड व प्रांजळ असतात. सुसंस्कृत, ध्येयवादी, भावनाप्रधान तरीही वास्तववादी, अशी ही कुंभ राशीची माणसे नवीन विचारांना खूपदा जन्म देतात. सढळ मदत करायला नेहमी तयार असतात पण भावनावश मात्र होत नाहीत. #मीन राशीची माणसे संवेदनशील व सहजप्रेरीत असतात पण वास्तववादी नसतात. तर्कशुद्ध पद्धातीपेक्षा त्यांचा आंतरिक श्रद्धेवर भर असतो. आपला सनातनी स्वभाव सोडून बाकी काहीही सोडायला ते तयार असतात. आत्मविश्वासपूर्ण, इमानी, घराबद्दल आस्था असलेले, उदार व प्रेमळ अशा या व्यक्ती सहज भुलवल्या जाऊ शकतात. त्यांच्या अवस्ताव्वादी व स्वप्नाळू वृत्तीमुळे जवळच्या व्यक्तींना त्रास होऊ शकतो. मीन रास आशावाद व निराशावाद यांचे मिश्रण असते त्यामुळे निर्णय घेण्यास त्यांना विलंब लागतो. मीन व्यक्ती लाजरी असते व सर्वांवर विश्वास व प्रेम दाखवते. सदैव भावनाप्रधान, ह्या व्यक्ती  खूपदा संकोचशील असतात. धार्मिक प्रवृत्तीच्या व अंधश्रद्धाळू असू शकतात. सोशिक व प्रेमळ असतात पण त्यांचा स्वभावधर्म घडवणे बऱ्याच वेळा दुसर्यांच्या हाती असते. त्यांची जुळवून घ्यायची वृत्ती असते, उदार, कनवाळू व इतरांच्या मनाचा विचार करणाऱ्या ह्या व्यक्ती मूलतः खूप संवेदनशील असतात.
     PHYSICAL_APPEARANCE_PREDICTION         = मेष राशीची माणसांची चेहऱ्याची ठेवण कोनीय असते - त्यांचे नाक, हनुवटी व जिवणी उठावदार असतात. ते सुदृढ बांध्याचे असतात, त्यांची उंची व अंगकाठी मध्यम प्रतीची असते. कुरळे केस, कमानदार भुवया, बदामी त्वचा, पुरुषांमध्ये बलवान शरीरयष्टी, व स्त्रियांमध्ये गतीप्रेरक शरीरयष्टी - कान्खार्तेचा व शक्तीचा अनुमान देतात. साधारणतः या व्यक्तींचे केस भुरे किंवा काळे, कुरळे असतात. बऱ्याच वेळा त्यांच्या डोक्यावर खुण किंवा वण असण्याची शक्यता असते. त्यांच्या रक्तवाहिन्या नजरेस दिसून येतात व जखमांचे वण देखील दिसून येतात. #वृषभ राशीच्या व्यक्तींची चण लहान असते व ते शिथिल प्रवृत्तीचे असतात. आकर्षक चेहरा, टपोरे डोळे, रेखीव कान व नाक तसेच सुंदर ओठ ही त्यांची वैशिष्ट्ये. अंग्काठीने मात्र ही माणसे चेहऱ्याच्या मानाने कमी पडतात - चौकोनाकार शरीर स्थूलतेकडे वळलेले असते. पाठीवर किंवा बाजूंवर खुणा असण्याचा संभव असतो. वृषभ माणसांचे व्यक्तिमत्व प्रसन्न असते. #चमकते डोळे, बोलके हावभाव ही मिथुन व्यक्तींची लक्षणे. सडपातळ बांध्याची ही माणसे मध्यम ते उंच असतात, लवचिक बांध्याची असतात. फेशन मोडेल  सारखे त्यांचे हात पाय सडपातळ व लांब असतात, ह्यांचेदेखील व्यक्तित्व आकर्षक असते. मोहक चेहरेपट्टी, नाजूक हनुवटी व गोरी कांती, त्यावर सुंदर कुरळे केस. रुंद कपाळ व स्वच्छ लक्ख डोळे हि त्यांची खुण. इतके मोहक व्यक्तित्व असूनसुद्धा बऱ्याच वेळा त्यांना आजारांना सामोरे जावे लागते. #कर्क राशीच्या माणसांची चेहरेपट्टी गोलाकार असते व त्यांचा तिशीमध्ये स्थूलपणाकडे कल असतो. त्यांचे केस काळेभोर परंतु विरळ, पातळ असतात. लहान नाक, गोलाकार हनुवटी व थोडेसे बाहेर आलेले डोळे ही त्यांची वैशिष्ट्ये. उंचीने ही माणसे ठेंगणी अथवा मध्यम उंचीची असतात. या राशीतील माणसे दिसायला फार देखणी नसतात. ती लहान चणीची असतात पण हात पाय लांब असतात. उंचीने फार नसले तरी शरीराचा वरचा भाग रुंद असतो. ही माणसे गोरी असतात पण नाकाच्या विशिष्ट आकारामुळे चेहरा मार खाऊ शकतो. #आपल्या मोहक व्यक्तिमत्वामुळे सिंह राशीची माणसे सर्वांना आपल्याकडे चुम्बाकाप्रमाणे आकर्षित करतात. शरीरयष्टीने मात्र ते थोडा मार खातात. मध्यम उंचीच्या ह्या माणसांच्या शरीराचा वरचा भाग आखीव रेखीव असतो. मोठा, अंडाकार चेहरा, पिवळट झाक असलेले डोळे आणी शानदार हनुवटी ही त्यांची वैशिष्ट्ये. सिंह राशीचे पुरुष व स्त्री दोन्ही स्वनियंत्रित वाटतात पण सहज चवताळू शकतात. चटकन प्रतिक्रिया व आक्रमक स्वभाव या राशीची लक्षणे. #कन्या राशीची माणसे कधी कधी विक्षिप्तपणाचे किंवा बेपर्वाहीचे सोंग घेऊ शकतात. शारीरिक दृष्ट्या ही माणसे लहान चणीची असतात, विशेषतः त्यांचे चेहरे लहान आकाराचे असतात. मोजून मापून चालणे, प्रमाणबद्ध शरीर व तरुण चेहरेपट्टी ही ह्या राशीची लक्षणे. रुंद कपाळ, सरळ नाक व रुंद गाल ही त्यांची इतर लक्षणे. #तुळ राशीची माणसे आगळी असतात - आकर्षक व्यक्तिमत्वाची, सुंदर ओठ व कपाळ असलेली. लहान चणीची ही माणसे तीक्ष्ण नजरेची, गहूवर्णी असतात. सुडौल शरीरयष्टीची असतात. घाईच्या कामान्माध्येदेखील त्यांची कमनीय चाल दिसून येते. तुळ स्त्रिया नाजूक नसल्या तरी आकर्षक शरीराच्या असतात तर तुळ पुरुष थोडे नेभळट असले तरी शरीराने सुदृढ असतात. उंचीने मध्यम किंवा उंच असतात. #शारीरिक दृष्ट्या वृश्चिक व्यक्ती रुंद खांद्यांची दणकट माणसे असतात. कणखर असतात, त्यांची प्रतिकारक शक्ती उत्तम असते. चौकोनाकार चेहरे, नाकीडोळी नीटस, मोहक डोळे व आकर्षक, कामुक ओठ ही त्यांची लक्षणे. भुरे, जाड केस हे त्यांचे वैशिष्ट्य. आविर्भावाने ही माणसे शक्ती, मोहकता, गुप्तता  व गंभीरता यांचे मिश्रण असतात. #धनु राशीची माणसांचा बांधा कणखर असतो, त्यांची उंची सरासरीपेक्षा जास्त असते, रेखीव ओठ, उत्तम चेहरेपट्टी व केस जाड असते. त्यांचा उत्साह व मोहकता सर्वांना आकर्षक करते. वयामानाने त्यांचे वजन वाढण्याचा संभाव असतो कारण तिशीमध्ये सर्वच गोष्टींचा अतिरेक करण्याकडे त्यांचा कल असतो. त्यांची स्नायुपट्टी सुदृढ देही नसते. धनु व्यक्तींच्या दिसण्यामध्ये उत्साह, चैतन्य व आकर्षकता स्पष्ट दिसून येते. सदैव आनंदी, त्यांचे कपडे साधे परंतु त्यांचा उदार स्वभावाशी संरेखीत असतात. #मकर राशीची माणसे सडपातळ, काटकुळी व उंचीने सरासरीची असतात. खोल बसलेले गंभीर डोळे आणी चेहरेपट्टी उत्कृष्ट - ही मकर राशीची वैशिष्ट्ये. त्यांचे भुवयांचे व छातीवरचे केस राठ असतात. मस्तक व दात मोठे असतात - कधी कधी दात पुढे आलेले असतात. उग्रपणा, स्तब्धपणा व परिपक्वता त्यांच्या चेहऱ्यावर झळकते. निःपाक्षता व गांभीर्य यांची छाप त्यांच्या व्यक्तित्वावर असते. सौन्दार्यामिमंसेपेक्षा व्यावहारिकता त्यांना जास्त प्रिय असते.चेहऱ्यावरून ही माणसे शास्त्रज्ञ किंवा तत्त्वज्ञ वाटतात - ज्ञाता किंवा पंडित वाटतात. #कुंभ राशीची माणसे सडपातळ, उंच, पोक काढून चालणारी असतात. त्यांचे चेहरे, मान, पाठ, पोट, कंबर, मांड्या व पाय सरासरीपेक्षा मोठे असतात. ह्या आनंददायी माणसांचे केस काळे जाड असतात व त्यांची केशरचना फारच साधी किंवा अती किचकट असते. त्यांची चर्या सदैव हसतमुख तरीही गंभीर असते.  त्यांचे चमकदार डोळे नेहमी काहीतरी वेगळे शोधण्यात गुंतलेले असतात. त्यांची मुद्रा उत्साही व नाविन्यपूर्ण असते - त्यातून तऱ्हेवाईकपणा तरी दिसून येतो किंवा गांभीर्य तरी दिसते. कधी कधी हे चमत्कारीक दिसू शकते. #मीन राशीची माणसे लठठ असतात व या राशीमध्ये विकलन शक्ती नसल्यामुळे यांची शरीरयष्टी सरासरीची असते. राशीचक्रातील ही एकाच रास आहे जी वेगवेगळे अविर्भाव दर्शवू शकते. त्यांचे डोळे मोठे, आकर्षक व चुंबकीय असतात. ही रास रहस्यमय, शांत व परोपकारी असते. खरे तर, मीन राशीचे रेखाटन करणे कठीण, कारण प्रत्येक मीन राशीच्या व्यक्तीचे व्यक्तित्व अवर्नानियाच असते!
