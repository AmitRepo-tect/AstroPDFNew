
	SMALL_PANOTI			= छोटी पानोती
	SADESATI_REPORT		= साडेसाती अहवाल
	SADESATI				= साडे साती
	PANOTI					= पानोती
	SHANI					= शनि
	START					= आरंभ
	END_DATE				= अंतिम तारीख
	PHASE					= कला 
	RISING					= आरोहित
	PEAK					= शिखर
	SETTING				= अस्त पावणारा
	SADESATIRISINGPHASE	= हा शनि साडेसातीचा आरंभ काल आहे. या काळात शनि चंद्रातून बाराव्या घरात संक्रमण करेल. ह्याची लक्षणे असतात आर्थिक नुकसान, लुप्त वैर्यांकडून धोके, दिशाहीन प्रवास, वाद आणी आर्थिक दुर्बल्य. ह्या कालावधीत तुमच्या गुप्त दुश्मन त्रास निर्माण करतील. सहकार्यांशी नाती बिघडतील, तुमच्या कार्यात सहकारी विघ्ने आणतील. कौटुंबिक पातळीवर देखील अडचणी येतील. याने ताण तणाव वाढेल. खर्चावर ताबा ठेवला नाही तर मोठी आर्थिक संकटे उद्भवतील. लांबचे प्रवास या काळात उपयुक्त ठरणार नाहीत. शनीचा स्वभाव विलंब व दुखः देणारा आहे परंतु अखेरीस फळ मिळेल त्यामुळे धीर बाळगून वात पहावी. ही शिकण्याची संधी समजून कार्य करत राहावे - सर्व काही ठीक होईल. या काळात धंद्यामध्ये अवास्तव जोखीम घेऊ नये.
	SADESATIPEAKPHASE		= हा शनि साडेसातीचा उच्च बिंदू आहे. साधारणतः शनिची ही दशा सर्वात कठीण असते. चंद्रातून संक्रमण करणाऱ्या शनिची लक्षणे आहेत - आरोग्य विकार, चरित्र्यहनन, नात्यांतील अडचणी, मानसिक तक्रारी व दुःखं. या कालावधीत यश मिळणे कठीण होईल. परिश्रमांचे फळ मिळणार नाही व कुचंबणा होईल. तुमची घडण व प्रतिकारशक्ती कमकुवत असेल. पहिले घर आरोग्याचे घर असल्यामुळे नियमित व्यायाम करणे व आरोग्याची काळजी घेणे आवश्यक आहे, अन्यथा दीर्घकालीन आजारांना बळी पडाल. अवसादावस्था, भिती व भयगंड यांना सामोरे जावे लगेल. चोख विचार, कार्य व निर्णय घेण्याच्या क्षमतेत पारदर्शकता राहणार नाही. तुमचा कल अध्यात्मिक बाबींकडे वळेल आणी निसर्गातील गूढ तुम्हाला आकर्षित करतील. सर्व स्वीकार करण्याची वृत्ती बाळगली तर या सर्वातून ताराल.
	SADESATISETTINGPHASE	= हा शनि साडेसातीची मावळती दशा आहे. शनि चंद्रातून दुसऱ्या घरात प्रवेश करेल, जेणेकरून आर्थिक व घरगुती संकटे उद्भवतील. साडेसातीच्या दोन दशा संपल्यानंतर काहीसा आराम मिळेल. तरीही, गैरसमज व आर्थिक तणाव कायम राहतील. खर्च वाढतच राहतील व तुम्हाला त्यावर ताबा ठेवावा लगेल. अचानक आर्थिक झटका बसण्याचा किंवा चोरी होण्याचा देखील संभव आहे. निराशावादी असाल, तर नैराश्य झटकून उत्साहाने व्यवहार करा. कुटुंबाकडे नीट लक्ष ठेवा अन्यथा मोठे त्रास उद्भवू शकतील. विद्यार्थ्यांसाठी - शिक्षणावर किंचित परिणाम होईल. पूर्वी सारखे गुण मिळवण्यासाठी अधिक परिश्रम घ्यावे लागतील. फळ मिळण्यास विलंब होईल. हा काळ धोक्याचा आहे - विशेष करून वाहन चालवताना काळजी घ्यावी. शक्य असल्यास, शनीला खूष ठेवण्यासाठी मासाहारी पदार्थ व मद्यपान टाळावे. समजुतदारपणे आर्थिक व कौटुंबिक बाबी हाताळल्यास ह्या काळातून सुखरूप पार पडाल.
	IMPNOTE				= वरील भाकिते साधारण स्वरुपाची आहेत व साडेसाती हानिकारक असते या समजुतीवर आधारित आहेत. खरे पाहता, आम्हाला असे दर वेळी काही आढळले नाही. हे वाचून पाहावे  <b><u><a href=http://www.astrocamp.com/vedicastrology/2008/09/shani-sade-sati.html>हा साडेसाती वरचा लेख</a></u></b>. फक्त साडेसातीवर आधारित निष्कर्ष चुकू शकतो. सध्य दशा व शनीचा स्वभाव, असे अंग देखील मोजमापात घ्यायला हवेत ज्यावरून साडेसातीचा काळ अनुकूल किंवा प्रतिकूल असेल ते ओळखता येते. आमचा सल्ला आहे की वरील भाकिते फार गंभीरपणे घेऊ नयेत व शंकानिरसनासाठी एखाद्या जाणत्या ज्योतिष्याचा सल्ला घ्यावा.
