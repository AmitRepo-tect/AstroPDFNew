
 CHANGES_SAVED_SUCCESSFULLY = কুষ্ঠি সফলভাবে শেয়ার করা হয়েছে
 CHANGES_NOT_SAVED = কুষ্ঠি শেয়ার হয় নি। দয়া করে পুনরায় চেষ্টা করুন।
 CHART_NAME_CAN_NOT_BE_START_WITH_DIGIT_HYPHEN = কুষ্ঠির নাম সংখ্যা বা হাইফেন দিয়ে শুরু করা যাবে না
 CHART_NAME_CAN_NOT_BE_END_WITH_HYPHEN = কুষ্ঠির নাম হাইফেন দিয়ে শেষ করা যাবে না
 PLEASE_ENTER_VALID_CHARTNAME = দয়া করে বৈধ কুষ্ঠির নাম দিন
 PLEASE_ADD_EMAIL_ADDRESS = দয়া করে ইমেল ঠিকানা যোগ করুন 

