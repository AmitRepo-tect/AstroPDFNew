	GEMINTRO							= शतकांपासून रत्नांचा वापर रोग निवारणासाठी व आध्यात्मिक विधींसाठी केला जात आहे. जरी ते सुंदर व अपरूप असले तरी ते मूल्यवान मानले जातात त्यांच्या शक्तीदायक गुणांसाठी. ते शक्तीचे भांडार असतात, जी शारीरिक संसर्गाने पसरते. रत्न आपली शक्ती उपकारिक किंवा आपकारिक पद्धतीने दर्शवितात - ते त्यांच्या वापरावर अवलंबून असते. सर्व रत्नांमध्ये थोड्याफार प्रमाणात चुंबकीय गुण असतात - व त्यातले बरेचसे त्यांच्या उपचाररार्थ गुणांनी उपकारक असतात. त्यांतून येणी स्पंदने व कंप्रता आपला अक्ख्या अंगावर मोठा प्रभाव करू शकतात. आपले रत्न भाकित असे आहे.
	STONE_DESCRIPTION					= जीवन रत्न हे लग्न अधिपतीसाठी असते. त्याची गूढ अनुभूती घेण्यासाठी ते आयुष्यभर वापरता येते. जीवन रत्न अडथळे बाजूला करून व्यक्तीला  सुख,यश व भरभराट देऊ शकते. एकंदर खुशालीसाठी हे रत्न सहसा वापरले जाते. त्यातील अंतरीक्ष किरण पूर्ण जीवनावर प्रभाव आणतात. # आयुष्य हे नियती व प्रयास यांचे परिपूर्ण मिश्रण असते. अपला भाग्यवान रत्न वापरून नियतीला आपल्या बाजूला करून घ्या. व्यक्तीचे भाग्य रत्न ते असते जे नशीब बलवत्तर ठेवते व आयुष्यात अनपेक्षित सुख आणत राहते. तुमच्या साठी आम्ही हे रत्न सुचवत आहोत : # भाग्य रत्न, ज्याला ऐश्वर्य रत्न देखील म्हणतात, नवव्या घराच्या अधिपतीच्या आधारे सुचविला जातो. हे रत्न आपल्याला हवे तेव्हा आपले नशीब बलवत्तर करू शकतो. वय्यत्तिक व व्यावसायिक आयुष्यात  चांगले भाग्य आणू शकतो. रस्त्यातील अडथळे दूर करून भरभराट आणतो.
	
