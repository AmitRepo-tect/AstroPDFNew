
SERVICE_NAME_1                                     = ક્વેશ્ચન રિપોર્ટ પૂછો 
SERVICE_DESC_1                                     = માનવજાતિની ઉક્રાંતિ માટે પ્રશ્નો આવશ્યક છે., એવું એરિસ્ટોટલનું પ્રસિદ્ધ કથન છે. કોઇના મનમાં જો કોઇ સમસ્યા અથવા ઊંડી મૂંઝવણ હોય, તો તે તેના વિકાસની તમામ સંભાવના પર હાવિ થઈ જાય છે. શું તમે કોઇ ખાસ ચીજને લઈને ચિંતિત છો? શું તમને અમુક ખાસ મુદ્દામાં ઘટનાક્રમ સર્જાવાનો ડર લાગે છે? <br /><br /> જ્યોતિષ એક દૈવી વિજ્ઞાન છે જેના વડે તમે પોતાના નસીબમાં શું છે તે જાણી શકો છો. જ્યોતિષ તમારી શંકા અને દહેશતો કાઢી શકે છે અને કારકિર્દી, લગ્ન, નાણાં અને જીવન વગેરે વિશેના તમારા પ્રશ્નોનો જવાબ આપી શકે છે. ચિંતા ઉપજાવે એવા પ્રશ્નોનો ઉકેલ મેળવવાની આ એક ચાવી છે.

SERVICE_NAME_7                                     = આરોગ્ય અને ચુસ્તતા અહેવાલ ($16)
SERVICE_DESC_7                                     = એવું કહેવાય છે કે આરોગ્ય એ જ સાચી સંપત્તિ છે. જો તમે ચુસ્ત અને આરોગ્યવાન ન હોવ, તો વૈભવ અને અન્ય દુનિયાભરની ચીજો નકામી બની જાય છે. જૂના સમયમાં જ્યોતિષ તથા તબીબી વિજ્ઞાન એટલે કે આયુર્વેદ એક બીજા સાથે સંપૂર્ણપણે જોડાયેલા હ તાં. પૌરાણિક ઋષિઓ લોકોની એકંદર સુખાકારીમાં તારાઓની ભૂમિકા જાણતા હતાં. ઘણીવાર દૈવી શક્તિઓના કારણે સર્જાતી અડિયલ પ્રકૃતિની બિમારીઓના લીધે ઔષધિઓ અને ઉપચાર કારગત થતી નથી. આથી તમારી સુધારણા માટે જ્યોતિષના જ્ઞાનને કામે લગાડવું જરૂરી છે. <br /><br /> જો તમે આરોગ્ય અને ચુસ્તતાની સાથે સંબંધિત પ્રશ્નોનો સામનો કરી રહ્યાં હોવ તો વહેલામાં વહેલી તક આગોતરા પગલા લેવા હંમેશા સલાહભર્યું હોય છે. અમારો સર્વગ્રાહી આરોગ્ય અહેવાલ તમને જણાવશે કે સમસ્યા શેના લીધે થઈ રહી છે અને ખરાબ આરોગ્યની સમસ્યામાંથી બહાર નીકળવા માટે જ્યોતિષ શાસ્ત્રના ક્યા પગલા વિચારણામાં લેવા જોઈએ.

SERVICE_NAME_14                                    = ફોન કન્સલ્ટ 
SERVICE_DESC_14                                    = અમારા અનુભવી જ્યોતિષીઓની સાથે ટેલિફોન પર પણ ચર્ચા કરી શકાય છે. કેન્યાની એક જૂની કહેવત છે કે  સારી ચર્ચા કરવી એ સમૃદ્ધ બન્યા બરાબર છે. જ્યારે કોઇ વ્યક્તિ વાત કરે છે ત્યારે તે માત્ર શબ્દો વડે જ વાતચીત કરતો નથી, પણ તેના અવાજનો સ્વર અને તેના કંપન પણ મહત્ત્વની ભૂમિકા ભજવે છે. જ્યોતિષશાસ્ત્ર અનુસાર બે વ્યક્તિઓ વાતચીત કરી રહ્યાં હોય તે ઘડી પણ જાતકની સમસ્યા વિશે મહત્વની માહિતી પૂરી પાડે છે. <br /><br /> કારકિર્દી, આરોગ્ય, કારોબાર, પ્રેમ અને લગ્ન વગેરે જેવી જીવન સાથે સંબંધિત કોઇ પણ ચીજની ચર્ચા થઈ શકે છે અને વ્યક્તિને બનાવ પાછળના જ્યોતિષશાસ્ત્રના કારણો જાણવા મળી શકે છે. તમારી સફળતા, સમૃદ્ધિ અને ખુશહાલીના રસ્તામાં અવરોધરૂપ કોઇ પણ સમસ્યામાંથી બહાર આવવા માટે વ્યવહારિક ઉપચારક નિરાકરણનું પણ સૂચન મળી શકે છે. અમારા જ્યોતિષીઓ તમને મદદ કરવા માટે માત્ર એક ફોન કોલ જેટલા જ અળગાં છે.

SERVICE_NAME_4                                     = કારકિર્દી અહેવાલ મેળવો 
SERVICE_DESC_4                                     = જીવનમાં સંપૂર્ણ સફળતા માટે એક સારી અને સંતોષજનક કારકિર્દી આવશ્યક છે. અમારા નિષ્ણાત જ્યોતિષીઓ આ સર્વગ્રાહી અહેવાલમાં તમને કહેશે કે તમારે કઇ કારકિર્દી અપનાવવી જોઈએ, વિવિધ ક્ષેત્રોમાં કેવું ભવિષ્ય છે, જો તમે પહેલેથી જ રોજગારી મેળવતા હોવ તો તમારી કારકિર્દીની સુધારણા માટે તમારે શું કરવું જોઈએ તેમજ તમારે કેવા લક્ષ્યાંકો સ્થાપવા જોઈએ વગેરે. આ ચીજોની સાથોસાથ, અમે ભવિષ્યમાં તમારી કારકિર્દીના પથનું પણ વિશ્લેષણ કરીશું અને તમારી નોકરી અથવા કારોબારમાં તમારી પ્રગતિને અસર કરી શકે એવા સંભવિત અંતરાયો વિશે તમને માહિતગાર કરીશું, તેમજ આ સમસ્યાઓમાંથી બહાર આવવા માટેની જ્યોતિષશાસ્ત્રના અસરકારક રસ્તાઓનું સૂચન પણ કરીશું. <br /><br /> આ વિગતવાર અહેવાલમાં ઊંડાણપૂર્વકના જ્યોતિષ વિશ્લેષણ અને આગામી 12 મહિના માટે તમારા કારોબાર અથવા નોકરીના દરેક પાસા માટેના ઉપચારક સૂચનોનો સમાવેશ થશે. આ અહેવાલ આગામી વર્ષમાં તમારી કારકિર્દીની વિગતવાર માર્ગદર્શિકા તરીકે પૂરવાર થશે. જ્યોતિષશાસ્ત્રના પૌરાણિક જ્ઞાનની મદદથી તમારી કારકિર્દીને વિકસાવો અને અમારા નિષ્ણાત જ્યોતિષીઓ દ્વારા તૈયાર કરાયેલો સર્વગ્રાહી કારકિર્દી અહેવાલ મેળવો.

SERVICE_NAME_12                                    = નાણાકીય બાબતોનો અહેવાલ મેળવો 
SERVICE_DESC_12                                    = આજના સ્પર્ધાત્મક વિશ્વમાં મજબૂત નાણાકીય સ્થિતિ માત્ર એક વૈભવની જ બાબત નથી, પણ તે ટકી રહેવા અને વિકસતા રહેવા માટેની એક જરૂરિયાત પણ છે. નાણાકીય સલામતી માત્ર કોઇ વ્યક્તિની જ નહીં, પણ જે લોકો વ્યક્તિની પત્ની, બાળકો અને સમગ્ર પરિવાર જેવા કોઇ વ્યક્તિ સાથે જોડાયેલા લોકોની સુખાકારી માટે પણ જરૂરી છે. નાણાકીય કટોકટી માત્ર વિકાસની સંભાવનાને જ અસર નથી કરતી, પણ તે માનસિક શાંતિ, ખુશી અને સ્થિરતાને પણ અસર કરે છે. જોન એફ. કેનેડીએ એક વાર પ્રસિદ્ધ કથન કર્યુ હતું કે, “ચીનના લોકો ‘ક્રાઇસિસ’ શબ્દ લખવા માટે બે બ્રશ સ્ટ્રોક્સનો ઉપયોગ કરે છે. એક બ્રશ સ્ટ્રોક જોખમ માટે, જ્યારે બીજો અવસર માટે હોય છે. ક્રાઇસિસમાં જોખમ માટે તૈયાર રહો, સાથોસાથ અવસરને પણ ઓળખી લો.” આ અત્યંત સાચી વાત છે. <br /><br />જ્યોતિષનું દૈવી જ્ઞાન તમને નાણાકીય સમસ્યાઓના કારણને શોધવા તથા વિશ્લેષણ કરવાનો અવસર પ્રદાન કરે છે, તથા જ્યોતિષ શાસ્ત્ર તમને સમસ્યામાંથી બહાર આવવા માટે જરૂરી એવા ઉપચારક પગલાઓ પણ સૂચવે છે. જ્યોતિષ એક એવું શાસ્ત્ર છે કે જે માત્ર કોઇ નાણાકીય બિમારીની સુધારણા માટે જ માર્ગદર્શન નથી આપતું, તમે તમારી પહેલેથી જ સારી નાણાકીય સ્થિતિમાં વધુ સુધારા માટે પણ આ જ્ઞાનનો લાભ મેળવી શકો છો. જો તમારો નાણાં સંબંધિત કોઇ પ્રશ્ન હોય, તો જ્યોતિષના પૌરાણિક જ્ઞાનને તમારી મદદ કરવા દો અને અમારા નિષ્ણાત જ્યોતિષીઓ તરફથી સર્વગ્રાહી નાણાકીય અહેવાલ મેળવો.

SERVICE_NAME_13                                    = રત્નો અને ઉપાય 
SERVICE_DESC_13                                    = જ્યોતિષ સમસ્યા શું છે તે જાણી શકે છે માત્ર એટલા માટે જ અસરકારક ગણાતું નથી, પણ તે આ સમસ્યાના ઉકેલ માટે વ્યવહારિક ઉપાય સૂચવીને તનો રસ્તો પણ કાઢી શકે છે. જ્યોતિષશાસ્ત્રના જ્ઞાન પ્રમાણે જો કોઇ ગંભીરતાપૂર્વક આ ઉપાયકારી પગલાઓને અનુસરે તો તે દૈવી શક્તિઓના લીધે થતી વિપરીત અસરોને નાબૂદ કરી શકે છે અને કપરા સમયમાંથી સહેલાઈથી બહાર આવી જઈ શકે છે. <br /><br /> જ્યોતિષ શાસ્ત્રની દૃષ્ટિએ રત્નો અત્યંત મહત્વપૂર્ણ મનાય છે, કારણ કે તે પ્રચંડ માત્રામાં કોસ્મિક એનર્જી વડે જાદુઈ અસર ઉપજાવી શકવાની ક્ષમતા ધરાવે છે, જો તેને યોગ્ય રીતે દિશા અપાય તો રત્નો તમારી તમામ સમસ્યાઓને નાબૂદ કરી શકે છે અને તમને જીવનના પ્રત્યેક ક્ષેત્રમાં શક્તિશાળી પીઠબળ પૂરું પાડી શકે છે. પરંતુ જો તેને ખોટી રીતે વાપરવામાં આવે, તો આ કોસ્મિક એનર્જી તમને વિપરીત અસર કરી શકે છે. આથી જો તમે જ્યોતિષનો ઉપાય ઇચ્છતા હોવ અને નાણાકીય બાબતો, પ્રેમ, લગ્ન, કારકિર્દી અને શિક્ષણ વગેરે ક્ષેત્રોમાં જેમસ્ટોન્સ તમને લાભ અપાવે એવું ઇચ્છતાં હોવ તો અમારા કાર્યદક્ષ જ્યોતિષીઓ તમને કેવા ઉપચારક પગલા તમારે લેવા જોઈએ, આ ઉપાયને કેવી રીતે હાથ ધરવા અને ક્યા રત્નો પહેરવા તેમજ તેનો મહત્તમ લાભ કેવી રીતે લેવો વગેરે જેવા પ્રશ્નો વિશે તમને માર્ગદર્શન આપી શકે છે.

SERVICE_NAME_6                                     = લગ્ન /પ્રેમ વિશ્લેષણ 
SERVICE_DESC_6                                     = એવું કહેવાય છે કે લગ્ન સ્વર્ગમાં રચાય છે. પરંતુ શું તમને ખાતરી છે કે તમે જેની સાથે તમારું જીવન વિતાવવા ઇચ્છઓ છો અથવા પોતાનું જીવન જેની સાથે વિતાવી ચૂક્યાં છો એ તમારી માટે જ સર્જાયેલ છે? તમારો પ્રિયજન તમારી માટે જ સર્જાયેલ છે કે નહીં તે જાણવું એ તમારા હાથની વાત છે. તમારે પોતાના માટે મિ. રાઇટ અથવા મિસ. રાઇટની પસંદગી કરવી કે નહીં. જો તમે યોગ્ય જીવનસાથીની પસંદગી કરો તો જીવન આસાન બની ગયેલું જણાય છે. પણ જો પસંદગી ખોટી હોય તો તે જીવનની મજા અને ઉત્સાહને વેરવિખેર કરી શકે છે. <br /><br /> યોગ્ય નિર્ણય લેવામાં જ્યોતિષ શાસ્ત્ર તમને મદદ કરી શકે છે. તમારી માટે જે તે વ્યક્તિ સુસંગત છે કે નહીં, તમારે એ વ્યક્તિ સાથે જીવનની યાત્રા શરૂ કરવી જોઈએ કે નહીં અને એક દંપતી તરીકે તમારું ભાવિ કેવું છે તેમજ જો તમે પહેલેથી જ પરીણિત હોવ અને લગ્ન જીવનમાં સમસ્યાઓ અનુભવતા હોવ, તો સમસ્યામાંથી બહાર આવવા માટે તમારે શું કરવું જોઈએ એ તમને કહી શકે છે.

SERVICE_NAME_5                                     = લાલ કિતાબના ઉપાયો 
SERVICE_DESC_5                                     = લાલ કિતાબ એ રહસ્યવાદ વડે ભરપૂર એવી જ્યોતિષીય સંધિ છે. તેમાં જ્યોતિષ, હસ્તરેખાવિદ્યા અને વાસ્તુની સૂક્ષ્મ સમજ રહેલી છે. પંડિત રુપચંદ જોષી દ્વારા ઉર્દૂના જૂના ઉચ્ચારણોમાં લાલ કિતાબ લખાઈ હોવાનું કહેવાય છે અને તે છંદ કાવ્ય આચરણના વિવિધ પ્રકરણો ધરાવે છે. લાલ કિતાબ અસ્પષ્ટતાના પડદા પાછળ રહેલી જ્યોતિષીય ગૂઢતાનાં મહત્વને આવરી લે છે. આ દસ્તાવેજના રહસ્યો ઉકેલવા માટે જ્યોતિષની ચતુર અને ઊંડી સમજની આવશ્યક્તા છે. <br /><br /> જે લોકો લાલ કિતાબને સમજી ગયા છે એમનું કહેવું છે કે લાલ કિતાબ વિશ્વની તમામ સમસ્યાઓ અને પીડાની ચાવીરૂપ છે. લાલ કિતાબના ઉપાયો અત્યંત શક્તિશાળી અને ઝડપી હોય છે, તે આધુનિક સમય સાથે સંબંધિત છે, જેમાં લોકો વિવિધ સમસ્યાઓ અને સમયના અભાવ વડે ઘેરાયેલા હોય છે. આ ઉપાયો માણસના દુઃખોનો ઉકેલ લાવે છે અને તમારી ભૌતિક, માનસિક અને આર્થિક સમસ્યાઓનું ઝડપી નિરાકરણ લાવે છે. જો તમે લાલ કિતાબના ઉપાયોનો ઉપયોગ કરીને સમસ્યાઓનો ઝડપી ઉકેલ મેળવવા ઇચ્છતા હોવ તો અમારા બાહોશ જ્યોતિષીઓને પૂછો.

SERVICE_NAME_2                                     = જન્મ તારીખમાં સુધારો 
SERVICE_DESC_2                                     = તમારી જન્મકુંડળી બનાવવા માટે જન્મનો સમય આવશ્યક છે. જન્મના સચોટ સમય વિના કોઇ બુદ્ધિશાળી જ્યોતિષી પણ તમારા ભવિષ્યની આગાહી કરી શકશે નહીં. જો તમે પોતાનો જન્મનો સમય જાણતા ન હોવ અથવા જન્મના સચોટ સમયને લઈને મુંઝવણ અનુભવતા હોવ તો ચિંતા કરવાની કોઈ જરૂર નથી. વેદિક જ્યોતિષ શાસ્ત્રમાં જન્મના ચોક્કસ સમયને સચોટપણે ઇંગિત કરવા માટેની પદ્ધતિ પ્રદાન કરાઈ છે. <br /><br /> સંત કાલીદાસ અ મહાન વારાહમિહીર જેવા ભારતીય સંતોએ ઘણી પદ્ધતિઓ સૂચવી છે. કેપી સિસ્ટમ પણ તમારા જન્મનો સમય શોધવા માટે એક નિરાળી પદ્ધતિ ધરાવે છે. આ ઉપરાંત જો કોઇ ચતુર જ્યોતિષી કોઇ વ્યક્તિના જવીનની મહત્વની ઘટનાઓ જાણતો હોય તો તે તમારા જીવનની ઘટનાઓના આધારે જાતકના જન્મના સચોટ સમયની ઉંધી ગણતરી કરી શકે છે. <br /><br /> આથી તમારા જન્મના સમયની સચોટ ગણતરી કરવા માટે તમારે તમારા જીવનની કેટલીક મહત્વની ઘટનાઓ વિશે અને આ ઘટનાઓ ક્યા સમયે બની હતી એ કહેવું પડશે, દાખલા તરીકે તમારા લગ્નની તારીખ, તમારા બાળકના જન્મની તારીખ, મોટી માંગી અને પહેલી નોકરી વગેરે. <br /><br /> અમને જન્મના અંદાજિત સમય અથવા જે દરમિયાન તમારો જન્મ થયો હોવાની શક્યતા હોય એ સમયગાળો; એટલે કે બપોરે બે વાગ્યાથી ચાર વાગ્યાની વચ્ચે વગેરે જેવા તમારા જન્મના સમયની અવધિની આવશ્યક્તા પડશે. અમે સાવધાનીપૂર્વક જન્મનો સમય ગણી કાઢીશું.

SERVICE_NAME_20                                    = નું વ્યવસાયિક જીવન @@currentyear$ 
SERVICE_DESC_20                                    = તમારા ભવિષ્યના વ્યવસાયિક જીવન – કારકિર્દીથી લઈને નોકરી, કારોબાર અને નાણાકીય બાબતો તથા અન્ય ક્ષેત્રોમાં ઊંડી સમજ સાથે વર્ષ 2013નો આગોતરો પરિચય મેળવવા તૈયાર થઈ જાવ. 2013માં ‘પિંક સ્લિપ’નું જ સામ્રાજ્ય છવાયેલું રહેશે કે પછી તમારા પગારમાં સકારાત્મક વૃદ્ધિ થશે? તમારા મનમાં જો આના જેવા પ્રશઅનો હોય તો તમને અમારા સર્વગ્રાહી અહેવાલમાં તેનો જવાબ મળશે. આ અહેવાલ માત્ર નોકરીઓ વિશે જ છે એવું નથી, તે કારોબાર અને સાહસસિકતા સાથે પણ સંબંધિત છે. નવા વર્ષમાં બજાર કેવું રહેશે અને તેના માટે કેવું આયોજન કરવું, આ બધું તમે પહેલેથી જ જાણી શકો છો. તમારે માત્ર અમારો સપંર્ક કરવાનો છે અને ‘આવતીકાલ’ નામનો કોયડો તમારા માટે માત્ર એક ક્રોસવર્ડ પઝલ બની જઈ શકે છે.

SERVICE_NAME_3  								   = એસ્ટ્રોસેજ બૃહત કુંડળી  
SERVICE_DESC_3                                     = 250 પૃષ્ટો થી પણ વધારે રંગીન બૃહત કુંડળી માં તમે મેળવશો: આ કુંડળી માં તમારા વિવાહ, કરિયર, આર્થિક, આરોગ્ય, સંતાન, પ્રોપર્ટી અને કુટુંબ થી સંકળાયેલી મહત્વપૂર્ણ આગાહીઓ છે. આના સિવાય આ કુંડળી માં તમારા માટે શુભ સમય, દશાફળ, પાંચ વર્ષો નું વર્ષફળ, રાજયોગ ની વિસ્તૃત માહિતી, તથા અંકશાસ્ત્ર રિપોર્ટ. સાથેજ આ કુંડળી માં સાડાસાતી, કાળ સર્પ દોષ અને મંગળ જેવા દોષો ની માહિતી અને તેના નિવારણ ના ઉપાય જાણવા માં આવેલા છે. ભાવ-ફળ અને ગ્રહ-ફળ. કેપી, કેસીઆઇએલ, અંક જ્યોતિષ, ક્સ્પલ ઇન્ટરલિંકસ, નક્ષત્ર નાડી, જેમિની, લાલ કિતાબ, ટેવા અને ઋણ વગેરે ની વિસ્તૃત ગણતરી છે.

SERVICE_NAME_8 									   = રાજ યોગ રિપોર્ટ 
SERVICE_DESC_8 									   = અમારી આ સેવા ના માધ્યમ થી જાણો શું તમારી કુંડળી માં બની રહ્યા છે રાજયોગ. તમારી જન્મ કુંડળી માં વિવિધ ભાવો માં સ્થિત કયા ગ્રહ કરી રહ્યા છે રાજયોગ નું નિર્માણ, જે જીવન માં તમને ઉન્નતિ ના શિખર સુધી લયી જશે. આ યોગો ના પ્રભાવ થી શું તમને મળશે સરકારી નોકરી, થશે મનગમતું પ્રેમ, વેપાર માં મળશે સફળતા, જીવન ના કયા વર્ષ માં થશે ભાગ્યોદય? તમારા મન આવનારી આ તમામ જિજ્ઞાસાઓ ને આ સેવા ના માધ્યમ થી જાણો. શું તમારી કુંડળી માં પણ છે રજ્જુ, મૂસળ, નળ, વાપી, ગદા અને શકટ વગેરે યોગ? આવા તમામ યોગ અને તેમના પ્રભાવ ના વિશે જાણવા માટે વાંચો રોચક માહિતી. જાણો કેમ વાપી યોગ જન્મ લેનાર વ્યક્તિ હોય છે ધનવાન. મૂસળ યોગ માં જન્મ લેનાર વ્યક્તિ ને કેવી રીતે મળે છે જીવન માં સંપન્નતા અને સમ્માન. નળ યોગ થી સંબંધિત વ્યક્તિ કેમ હોય છે ચતુર અને બુદ્ધિમાન? જાણો રાજયોગ થી સંકળાયેલા એવા ઘણા બધા તથ્ય અને તેમની વ્યાખ્યા.

SERVICE_NAME_9  								   = વાર્ષિક કુંડળી 2020
SERVICE_DESC_9 									   = વૈદિક જ્યોતિષ ના પ્રાચીન સિદ્ધાંતો પર આધારિત વાર્ષિક કુંડળી 2020 વિશેષરૂપ થી તમારા માટે તૈયાર કરવા માં આવી છે, જેથી તમે 2020 માં સફળતા અને સમૃદ્ધિ ના માર્ગ પર આગળ વધી શકો. આ તે સ્વપ્નો ની ચાવી છે જેને તમે ખુલ્લી આંખો થી હંમેશા થયો જુઓ છો- પ્રસન્નતા, ઉલ્લાસ અને સંતોષ થી ભરેલા વર્ષ ની ચાવી. આમ તમે મેળવશો પ્રેમ, વિવાહ, કરિયર, કુટુંબ, આરોગ્ય અને બીજા ઘણા બધા વિષયો ની આગાહી. અમે માનીએ છે કે તમે ખાસ છો અને એટલાજ માટે વાર્ષિક કુંડળી 2020 માં અમે એવા સૂક્ષ્મ વિશ્લેષણ, સટીક આગાહીઓ અને સરળ ઉપાય આપીશું, જે વિશેષરૂપે તમારા માટે તૈયાર કરેલા છે. પસંદ કરો 2020 માં દુઃખ દર્દ થી સ્વતંત્રતા, ખુશીઓ થી ભરેલું અને એક સારું ભવિષ્ય, ઓર્ડર કરો વાર્ષિક કુંડળી 2020 અત્યારે.

