
	 LK_Rin_TEXT						= Ancestral Debts
	 RINS								= Forefather's Debt#Self Debt#Mothers Debt#Woman's Debt#Brother or Relatives Debt#Daughter's Debt#Oppressor's Debt#Unborn Debt#Nature's Debt
	 LK_FOREFATHER_DEBTS_SYMPTOM		= According to Lal Kitab, when Venus, Mercury, Rahu are posited in the second, fifth, ninth or twelfth house of a horoscope then the native may be afflicted by forefather's debt.
	 LK_FOREFATHER_DEBTS_REASON		    = Elders would have changed family priest.
	 LK_FOREFATHER_DEBTS_INDICATION	    = Destruction of a neighboring temple or a peepal tree.
	 LK_FOREFATHER_DEBTS_REMEDY		    = 1. Collect rupee coin from all blood relatives and donate the collected amount to a temple in a single day.<br/>2. If you have a peepal tree in your house, water and serve it.
	 FATHER_DEBTS_FALSE				    = Your Horoscope is free from Forefather's Debts.
	 FATHER_DEBTS_TRUE					= Your horoscope can be affected by Forefather's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 LK_SELF_DEBTS_SYMPTOM				= According to Lal Kitab, when Venus, Saturn, Rahu, Ketu are posited in the fifth house of a horoscope then the native may be afflicted by self-debt.
	 LK_SELF_DEBTS_REASON				= Your forefathers and elders did not adhere to the traditional family customs and discarded their faith in the supreme almighty.
	 LK_SELF_DEBTS_INDICATION			= There may be fire-place beneath house or roof will have multiple holes for direct entrance for sun.
	 LK_SELF_DEBTS_REMEDY				= 1. Perform yagna from the contributions of equal money from all family members (blood relatives).
	 SELF_DEBTS_FALSE					= Your Horoscope is free from Self's Debts.
	 SELF_DEBTS_TRUE					= Your horoscope can be affected by Self's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 LK_MOTHER_DEBTS_SYMPTOM			= According to Lal Kitab, when Ketu is posited in the fourth house of a horoscope then the native may be afflicted by mother's debt.
	 LK_MOTHER_DEBTS_REASON			    = The reason for this could be due to the fact that your forefathers might have neglected or tortured mother or kept her away from her baby after birth of the baby, or just ignoring sadness of mother. 
	 LK_MOTHER_DEBTS_INDICATION		    = Neighboring well or river is being used for dirt and garbage rather than worshipping.
	 LK_MOTHER_DEBTS_REMEDY			    = 1. Take equal silver from all blood relatives and flow it in a river in a single day.
	 MOTHER_DEBTS_FALSE				    = Your Horoscope is free from Mothers's Debts.
	 MOTHER_DEBTS_TRUE					= Your horoscope can be affected by Mothers's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 LK_WOMAN_DEBTS_SYMPTOM			    = According to Lal Kitab, when Sun, Moon, Rahu are posited in the second or seventh house of a horoscope then the native may be afflicted by woman's debt.
	 LK_WOMAN_DEBTS_REASON				= The reason for this could be forefathers or elders murdering lady while pregnant due to some greed.
	 LK_WOMAN_DEBTS_INDICATION			= Household will have animals with teeth especially cow or believing in clan-hatred. 
	 LK_WOMAN_DEBTS_REMEDY				= 1. Take equal money from all blood relatives and feed 100 cows with tasty food using that money in a single day.
	 WOMAN_DEBTS_FALSE					= Your Horoscope is free from Woman's Debts.
	 WOMAN_DEBTS_TRUE					= Your horoscope can be affected by Woman's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 LK_RELATIVES_DEBTS_SYMPTOM		    = According to Lal Kitab, when Mercury, Ketu are posited in the first or Eighth house of a horoscope then the native may be afflicted by relative's debt.
	 LK_RELATIVES_DEBTS_REASON			= The reason for this could be due to the possibility that a forefather of yours must have set fire to ripe crops or house of someone, giving poison to someone, killing someone's buffalo during pregnancy.
	 LK_RELATIVES_DEBTS_INDICATION		= Hatred towards meeting relatives, Staying away from family during days of birtdays of kids, festivals and other happy moments.
	 LK_RELATIVES_DEBTS_REMEDY			= 1.Collect equal amount of money from all blood relatives and give a hakim or doctor to help others.<BR/>2. Collect equal amount of money from all blood relatives and donate medicines purchased with that money to some charitable institutions.
	 RELATIVES_DEBTS_FALSE				= Your Horoscope is free from Relative's Debts.
	 RELATIVES_DEBTS_TRUE				= Your horoscope can be affected by Relative's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 LK_DAUGHTER_DEBTS_SYMPTOM			= According to Lal Kitab, when Moon is posited in the third or sixth house of a horoscope then the native may be afflicted by daughter's debt.
	 LK_DAUGHTER_DEBTS_REASON			= The reason for this could be forefathers or elders murdering a girl or someone's sister or torturing her.
	 LK_DAUGHTER_DEBTS_INDICATION		= Selling lost kids or taking advantage of that.
	 LK_DAUGHTER_DEBTS_REMEDY			= 1. All blood relatives should purchase and burn some yellow colored cowdies (small seashells) to ashes and throw the ash the very same day in a river.
	 DAUGHTER_DEBTS_FALSE				= Your Horoscope is free from Daughter's Debts.
	 DAUGHTER_DEBTS_TRUE				= Your horoscope can be affected by Daughter's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 LK_OPPRESSOR_DEBTS_SYMPTOM		    = According to Lal Kitab, when Sun, Moon, Mars are situated in tenth and eleventh houses then the native may be afflicted by Oppressor debt.
	 LK_OPPRESSOR_DEBTS_REASON			= Reason could be forefathers or elders cheating and taking away someone's house and not paying him in any ways.
	 LK_OPPRESSOR_DEBTS_INDICATION		= Main gate of the house will be in south direction, or the land of the house will be taken from the one who doesn't have son, or the house is built on top of a road or a well.
	 LK_OPPRESSOR_DEBTS_REMEDY			= 1. Feed fishes of 100 different places OR feed 100 labors. 
	 OPPRESSOR_DEBTS_FALSE				= Your Horoscope is free from Oppressor's Debts.
	 OPPRESSOR_DEBTS_TRUE				= Your horoscope can be affected by Oppressor's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 LK_UNBORN_DEBTS_SYMPTOM			= According to Lal Kitab, when Sun, Venus, Mars are posited in the twelfth house of a horoscope then the native may be afflicted by unborn debt.
	 LK_UNBORN_DEBTS_REASON			    = The reason for this could be due to forefathers or elders betraying in-laws or a relative resulting in their family's destruction.
	 LK_UNBORN_DEBTS_INDICATION		    = Gutter flowing below doorstep, or destroyed cremation ground or furnace attached to southern wall of the house. 
	 LK_UNBORN_DEBTS_REMEDY			    = 1. Take one coconut each from all blood relatives and on the same day offer it to a river or flowing water.
	 UNBORN_DEBTS_FALSE				    = Your Horoscope is free from Unborn's Debts.
	 UNBORN_DEBTS_TRUE					= Your horoscope can be affected by Unborn's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 LK_NATURE_DEBTS_SYMPTOM			= According to Lal Kitab, when Moon, Mars are placed in the sixth house of a horoscope then the native may be afflicted by nature's debt.
	 LK_NATURE_DEBTS_REASON			    = Forefathers or elders destroyed somebody like a poor dog.
	 LK_NATURE_DEBTS_INDICATION		    = Killing of a dog by a bullet, killing other's son, or betraying a nephew to such an extent that he gets ruined.
	 LK_NATURE_DEBTS_REMEDY			    = 1. Feed 100 dogs in a day with milk sweets or kheer after collecting money from all blood relatives on the same day. <br/> 2. Serve a lady who lives nearby and got widowed at early age and keep obtaining her blessings.
	 NATURE_DEBTS_FALSE				    = Your Horoscope is free from Nature's Debts.
	 NATURE_DEBTS_TRUE					= Your horoscope can be affected by Nature's Debts. If above given indications are applicable on you and your blood relatives also have same combination in their horoscope, you should perform remedies give above.
	 ANCESTRAL_DEBTS					= Ancestral Debts
	 RinIntroduction					= According to Lal Kitab, debts are considered one of the biggest weaknesses of a horoscope. Ancestral Debts means that the person will have effects of the sins done by ancestors and elders. In other words, relatives have to borne results of the mistakes done by some other. Debts shown in one's horoscope will also be shown similarly in other relative's horoscope. Generally whole clan is suffered due to the debts and hence remedies are also done with the help of whole clan. Even if the person is having Rajyoga (royal combination), his planets ituting debt will give bad results only.
	 LK_REASON							= Reason
	 LK_INDICATION						= Indication
	 LK_REMEDY							= Remedy
