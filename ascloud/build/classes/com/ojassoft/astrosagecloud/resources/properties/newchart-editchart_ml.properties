
	ENTER_YOUR_BIRTH_DETAILS									= നിങ്ങളുടെ ജനന വിവരങ്ങൾ നൽകുക
	PLEASE_DO_NOT_ENTER_SPECIAL_CHARACTERS_SIGN_IN_NAME_FIELD  = ദയവായി\\' (സിംഗിൾ ക്വോട്ട്)\\', ?(ചോദ്യ ചിഹ്നം), & (ആബർസൻറ്റ്) ചിഹ്നം എന്നിവ പേര് കളത്തിൽ നൽകരുത്.
    PLEASE_DO_NOT_ENTER_MORE_THAN_50_CHARACTER_IN_NAME_FIELD   = ദയവായി 50 അക്ഷരങ്ങളിൽ കൂടുതൽ പേര് കളത്തിൽ നൽകരുത്.
    PLEASE_DO_NOT_ENTER_SPECIAL_CHARACTERS_SIGN_IN_PLACE_FIELD = ദയവായി \\' (സിംഗിൾ ക്വോട്ട്)\\', ?(ചോദ്യ ചിഹ്നം), &(ആബർസൻറ്റ്) ചിഹ്നം എന്നിവ സ്ഥലം കളത്തിൽ നൽകരുത്.
    PLEASE_ENTER_A_VALUE_FOR_THE_KP_HORARY_FIELD               = ദയവായി കെ.പി ഹൊരാരി സംഘ്യ വിവരം നൽകുക.
    THE_VALUE_FOR_KP_HORARY_SHOULD_BE_BETWEEN_0_AND_249        = കെ.പി ഹൊരാരി സംഘ്യ സംഘ്യകൾ 0 തിനും 249 തിനും ഇടയിൽ ഉള്ളവ ആയിരിക്കണം.
