	 KARKOTAK_KALSARPA_YOGA_REMEDY = <li> ನಿಮ್ಮ ಮಲಗುವ ಕೋಣೆಯಲ್ಲಿ ಕೆಂಪು ಬಣ್ಣದ ಪರದೆ, ಬೆಡ್ ಶೀಟ್ ಮತ್ತು ದಿಂಬಿನ ಕವರ್ ಬಳಸಿ. </ li> <li> ತಿಂಗಳ ಕಾಲು ಭಾಗದಲ್ಲಿ ಪಕ್ಷಿಗಳಿಗೆ ಜಾ ತಿನ್ನಿಸಿ ಮತ್ತು ಪ್ರತಿ ಶನಿವಾರ ಸಕ್ಕರೆ ಮತ್ತು ಸತ್ತುವಿನ ಮಿಶ್ರಣವನ್ನು ಚಿಮುಕಿಸಿ ಇರುವೆಗಳಿಗೆ ತಿನ್ನಿಸಿ. </ li> <li> ಹನುಮಾನ್ ಚಾಲೀಸಾವನ್ನು 108 ಬಾರಿ ಓದಿ ಮತ್ತು ಶನಿವಾರ ಚಮೇಲಿಯಲ್ಲಿ ಕಲೆಸಿದ ಕುಂಕುಮ ಮತ್ತು ಬುಂದಿ ಲಾಡುವಿನ ಮಿಶ್ರಣವನ್ನು ಅರ್ಪಿಸಿ ಉಪವಾಸ ಮಾಡಿ </ li> <li> ಶನಿವಾರ ಪೂರ್ಣ ಸಾಸಿವೆ ಎಣ್ಣೆಯಿರುವ ಒಂದು ಬಟ್ಟಲಿನಲ್ಲಿ ನಿಮ್ಮ ಚಿತ್ರವನ್ನು ನೋಡಿ, ಮತ್ತು ಒಂದು ನಾಣ್ಯ ತೆಗೆದುಕೊಂಡು ನಿಮ್ಮ ಹಣೆಯ ಮೇಲೆ ಮೂರು ಬಾರಿ ವೃತ್ತದ ಹಾಗೆ ಸುತ್ತು ಹಾಕಿ. ನಾಣ್ಯವನ್ನು ಪೂರ್ತಿ ತೈಲವಿರುವ ಒಂದು ಬಟ್ಟಲಿನಲ್ಲಿ ಹಾಕಿ ಮತ್ತು ಒಂದು ಭಿಕ್ಷುಕನಿಗೆ ನೀಡಿ ಅಥವಾ ಅದನ್ನು ಪೀಪಲ್ ಮರದ ಬೇರಿಗೆ ಅರ್ಪಿಸಿ. </ li> <li> ಒಂದು ಮಂಗಳಕರ ಮಹೂರ್ತದಲ್ಲಿ ಮೂರು ಬಾರಿ ಹರಿಯುವ ನೀರಿನಲ್ಲಿ ಒಣ ತೆಂಗಿನಕಾಯಿಗಳನ್ನು ತೇಲಿಬಿಡಿ. ಒಂದು ಶನಿವಾರ ಹರಿಯುವ ನೀರಿನಲ್ಲಿ ಮೂರು ಬಾರಿ ಕಲ್ಲಿದ್ದಲ್ಲನ್ನು ತೇಲಿಬಿಡಿ </ li><li>
	 SHANKACHOOD_KALSARPA_YOGA_REMEDY = ಒಂದು ಮಂಗಳಕರ ಮಹೂರ್ತದಲ್ಲಿ ಪ್ರಧಾನ ಬಾಗಿಲಿನ ಮೇಲೆ ಸ್ವಸ್ತಿಕವನ್ನು ಇರಿಸಿ ಮತ್ತು ಬಾಗಿಲಿನ ಎರಡೂ ಬದಿಯಲ್ಲಿ ಲೋಹದಲ್ಲಿ ಕೆತ್ತಲಾದ ನಿಮ್ಮ ಹೆಸರನ್ನು ಅಂಟಿಸಿ. </ li> <li> ಒಂದು ಮಹಾಮೃತ್ಯುಂಜಯ ಕವಚ ನಾಮಸ್ಮರಣೆ ಮಾಡಿ, ​​ಮತ್ತು ಪ್ರತಿ ಸೋಮವಾರ ಶಿವರುದ್ರಾಭಿಷೇಕ ಮಾಡಿ. </ li><li> ಒಂದು ಬೆಳ್ಳಿಯ ಅಷ್ಟಧಾತು ನಾಗ ವನ್ನು ಮಾಡಿಸಿಕೊಳ್ಳಿ ಮತ್ತು ಅದನ್ನು ನಿಮ್ಮ ನಡುಬೆರಳಿನಲ್ಲಿ ಧರಿಸಿ </ li><li>. ಒಂದು ತಿಂಗಳ ಮೊದಲ ಶನಿವಾರದಿಂದ 86 ಶನಿವಾರಗಳವರೆಗೆ ಈ ದೋಷದ ಪರಿಣಾಮವನ್ನು ಕಡಿಮೆ ಮಾಡಲು ಧೃಢಸಂಕಲ್ಪದಿಂದ ಉಪವಾಸ ಮಾಡಿ. ಉಪವಾಸದ ಸಮಯದಲ್ಲಿ ಕಪ್ಪು ಬಣ್ಣದ ಬಟ್ಟೆಗಳನ್ನು ಧರಿಸಿ ಮತ್ತು ಶನಿದೇವರಿಗೆ ತಿಲಾಭಿಷೇಕ ಮಾಡಿ. ಅಲ್ಲದೇ ರಾಹು ಬೀಜ ಮಂತ್ರದ ಜಪವನ್ನೂ ಮಾಡಿ. ಜಪದ ನಂತರ ಒಂದು ಪಾತ್ರೆಯಲ್ಲಿ ನೀರು ತುಂಬಿಕೊಂಡು ಧ್ರುವ ಮತ್ತು ಕುಶವನ್ನು ಬಳಸಿ ಅದನ್ನು ಪೀಪಲ್ ಮರದ ಬೇರುಗಳಲ್ಲಿ ಅರ್ಪಿಸಿ.</ li> <li> ನಿಮ್ಮ ಆಹಾರ ಸಿಹಿಯ ಮಿಶ್ರಣ, ಸಿಹಿ ಚಪಾತಿ, ರೇವರಿ ಮತ್ತು ತಿಲಕೂಟಗಳಂಥವನ್ನು ಒಳಗೊಂಡಿರಬೇಕು. ಇವುಗಳನ್ನು ಬಳಸುವ ಮೊದಲು ಅವುಗಳನ್ನು ದಾನ ಮಾಡಿ ಮತ್ತು ರಾತ್ರಿಯಲ್ಲಿ ತುಪ್ಪದ ದೀಪ ಹಚ್ಚಿ ಮತ್ತು ಪೀಪಲ್ ಮರದ ಬೇರಿಗೆ ಅರ್ಪಿಸಿ.</ li>
