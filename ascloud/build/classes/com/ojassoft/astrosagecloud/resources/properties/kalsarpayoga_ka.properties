	 INTRODUCTION_KALSARP_YOG = ಜನಪ್ರಿಯ ವ್ಯಾಖ್ಯಾನದ ಪ್ರಕಾರ, ಜನ್ಮ ಜಾತಕ ಅಥವಾ ಜಾತಕದಲ್ಲಿ ಎಲ್ಲಾ ಗ್ರಹಗಳೂ ರಾಹು ಮತ್ತು ಕೇತುವಿನ ನಡುವೆ ನೆಲೆಸಿದ್ದಾಗ ಜ್ಯೋತಿಷಿಗಳು ಅದನ್ನು ಕಾಳಸರ್ಪ ದೋಷವೆನ್ನುತ್ತಾರೆ. ಪ್ರಸ್ತುತ ದಿನಗಳಲ್ಲಿ, ಈ ದೋಷದ ಬಗೆಗಿನ ಚರ್ಚೆಗಳು ಭಾರತದ ಜ್ಯೋತಿಷಿಗಳು  ಅಥವಾ ಹಿಂದೂ ಜ್ಯೋತಿಷಿಗಳಲ್ಲಿ ಜೋರಾಗಿ ನಡೆಯುತ್ತಿದೆ. ಜೀವನದಲ್ಲಿನ ಅನೇಕ ತೊಂದರೆಗಳನ್ನು ಕಾಳಸರ್ಪ ದೋಷಕ್ಕೆ ಆಪಾದಿಸಲಾಗುತ್ತದೆ. ಜ್ಯೋತಿಷ್ಯದ ಇತರ ಅನೇಕ ಪ್ರದೇಶಗಳನ್ನು ವಿಶ್ಲೇಷಿಸದೇ ಬಹಳಷ್ಟು ಜ್ಯೋತಿಷಿಗಳು ಕಾಳಸರ್ಪ ದೋಷವನ್ನು ಸಮಸ್ಯೆಗಳ ಮುಖ್ಯ ಮೂಲವೆಂದು ಒಪ್ಪಿಕೊಳ್ಳುತ್ತಾರೆ. ಆದರೆ ವಾಸ್ತವದಲ್ಲಿ ಜಾತಕದಲ್ಲಿ ಎಲ್ಲಾ ಗ್ರಹಗಳು ಚೆನ್ನಾಗಿ ಪ್ರತಿಪಾದಿತವಾಗಿದ್ದಲ್ಲಿ ಕಾಳಸರ್ಪ ದೋಷ ಹಾನಿಕಾರಕವಾಗಿರದೇ ಉತ್ತಮ ಸ್ಥಾನಗಳಲ್ಲಿದ್ದು ಅನುಕೂಲಕರ ಫಲಿತಾಂಶಗಳನ್ನು ಕೊಡಬಹುದು. ಕಾಳಸರ್ಪ ದೋಷ ಜಾತಕದಲ್ಲಿನ ಇತರ ಗ್ರಹಗಳ ಸ್ಥಾನಗಳು ಪ್ರತಿಕೂಲವಾದಾಗ ಮಾತ್ರವೇ ಅಶುಭಕರವಾಗಿರುತ್ತವೆ.<br/> <br/> ಆದ್ದರಿಂದ, ಕೇವಲ ಕಾಳಸರ್ಪ ದೋಷ'ದ ಬಗ್ಗೆ ಕೇಳಿ ಹೆದರಿಕೊಳ್ಳುವುದು ಬುದ್ಧಿವಂತಿಕೆಯಲ್ಲ. ವಾಸ್ತವವಗಿ ಕಾಳಸರ್ಪ ದೋಷದ ಋಣಾತ್ಮಕ ಪ್ರಭಾವಗಳ ಬಗ್ಗೆ ಆಳವಾದ ವಿಶ್ಲೇಷಣೆಗಾಗಿ ಜ್ಯೋತಿಷಿಯ ಬಳಿ ಚರ್ಚಿಸಿದ ನಂತರವೇ ಪರಿಹಾರವನ್ನು ಹುಡುಕುವುದು ಉತ್ತಮ. ಕಾಳಸರ್ಪ ದೋಷದ ಪ್ರಭಾವ ವಿಭಿನ್ನ ಜನರಲ್ಲಿ ವಿಭಿನ್ನವಾಗಿದೆ. ಏಕೆಂದರೆ ಕಾಳಸರ್ಪ ದೋಷದ ಪ್ರಭಾವ ಅಂಕಗಳನ್ನು ಆಧರಿಸಿದೆ - ಯಾವ ರಾಶಿ ಯಾವ ಮನೆಯಲ್ಲಿದೆ, ಮತ್ತು ಇತರ ಯಾವ ಗ್ರಹಗಳು ಆ ಮನೆಯನ್ನು ಆಕ್ರಮಿಸಿವೆ, ಅವುಗಳ ಪ್ರಭಾವಗಳು ಮತ್ತು ಹೀಗೇ ಇನ್ನೂ.
	 ANNANT_KALSARPA_YOGA_INTRO_TEXT = ಈ ಕಾಳಸರ್ಪ ದೋಷ ಅಥವಾ ಯೋಗವನ್ನು ರಾಹು ಲಗ್ನದಲ್ಲಿದ್ದಾಗ ಕೇತು ಏಳನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಮತ್ತು ಎಲ್ಲಾ ಗ್ರಹಗಳೂ ಈ ಎರಡು ರಾಹು ಮತ್ತು ಕೇತುವಿನ ನಡುವೆ ಇದ್ದಾಗ ಗುರುತಿಸಲಾಗುತ್ತದೆ. ಲಗ್ನ ಜಾತಕದಲ್ಲಿ ಈ ದೋಷದ ಪ್ರಭಾವದಿಂದಾಗಿ ಜತಕನು ಪ್ರಭಾವಶಾಲಿ ವ್ಯಕ್ತಿಯಾಗಲು ಶ್ರಮಪಡಬೇಕಾಗುತ್ತದೆ. ಕಾಳಸರ್ಪ ದೋಷವಿರುವ ವ್ಯಕ್ತಿ ಹೆಚ್ಚು ವ್ಯಾಪಾರ ಮತ್ತು ಸಾಹಿತ್ಯದಲ್ಲಿ ಯಶಸ್ಸು ಕಾಣಲು ಹೆಚ್ಚು ಡ್ರಮವಹಿಸಬೇಕು ಮತ್ತು ಕಠಿಣ ಮಾರ್ಗಗಳನ್ನು ಆಯ್ದುಕೊಳ್ಳಬೇಕು. ಕ್ರಮೇಣ ಈ ವ್ಯಕ್ತಿಯು ಈ ದೋಷವು ತೋರುವ ಮಾನಸಿಕ ತೊಂದರೆಗಳಿಂದಾಗಿ ಜೀವನದ ವಸ್ತು ಸೌಕರ್ಯಗಳ ಕಡೆಗೆ ಪ್ರೀತಿಯಿಲ್ಲದ ಅಥವಾ ಕಹಿಯಾದ ಮನೋಭಾವವನ್ನು ಬೆಳೆಸಿಕೊಳ್ಳುತ್ತಾರೆ. ಅನಂತ ಕಾಳಸರ್ಪ ದೋಷವಿರುವ ವ್ಯಕ್ತಿ ಯಾವಾಗಲೂ ಅಪಾಯಗಳು ಮತ್ತು ಸಾಹಸಗಳ ಸಾಧ್ಯತೆಯನ್ನು ತೋರಿಸುವ ವ್ಯಾಪಾರಕ್ಕೆ ಕೈಹಾಕುತ್ತಾರೆ. ಜಾತಕರ ದೈಹಿಕ ಮತ್ತು ಆರ್ಥಿಕ ಪರಿಸ್ಥಿತಿಗಳು ಈ ದೋಷದೊದನೆ ಚೆನ್ನಾಗಿರುವುದಿಲ್ಲ. ಅವರು ತನ್ನ ತಂದೆ ಮತ್ತು ಪೂರ್ವಜರ ಆಸ್ತಿಗಳನ್ನು ಪಡೆಯಲು ಅಡೆತಡೆಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ಅವರು ಕಹಿಯಾದ ಕಾನೂನು ವ್ಯಾಜ್ಯಗಳು ಮತ್ತು ಮೋಸಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ಅವರ ಸಾಮಾಜಿಕ ಚಿತ್ರಣ ದುರ್ಬಲಗೊಳ್ಳಹುದು. ಆದಾಗ್ಯೂ, ಪ್ರತಿಕೂಲವಾದ ಘಟನೆಗಳನ್ನು ಎದುರಿಸಿಯೂ ಅನಂತ ಕಾಳಸರ್ಪ ದೋಷವಿರುವ ವ್ಯಕ್ತಿ ಅವರ ಎಲ್ಲಾ ಸಮಸ್ಯೆಗಳೂ ತಾನಾಗಿಯೇ ಕಣ್ಮರೆಯಾಗುವ ಒಂದು ಪವಾಡಮಯ ಸಮಯವನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ. ಮತ್ತು ಈ ಪವಾಡ ಪ್ರಯತ್ನಗಳಿಂದಲ್ಲದೇ ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಬರುತ್ತವೆ. ಆದಾಗ್ಯೂ ಈ ದೋಷವಿರುವ ವ್ಯಕ್ತಿ ಜೀವನದಲ್ಲಿ ಸಾಕಷ್ಟು ತೊಂದರೆಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರಿಗೆ ಜೀವನದಲ್ಲಿ ಯಾವುದಕ್ಕೂ ಕೊರತೆಯಾಗದು. ಯಾವುದೇ ವ್ಯಕ್ತಿ ಅನಂತ ಕಾಳಸರ್ಪ ದೋಷದಿಂದಾಗಿ ಜೀವನದಲ್ಲಿ ದೊಡ್ಡ ಸಮಸ್ಯೆಗಳನ್ನು ಎದುರಿಸುತ್ತಿದ್ದಲ್ಲಿ ಅವರು ಕೆಳಗಿನ ಪರಿಹಾರಗಳನ್ನು ಅನ್ವಯಿಸಬೇಕು:
	 KULIK_KALSARPA_YOGA_INTRO_TEXT = ರಾಹು 2ನೇ ಮನೆಯಲ್ಲಿರುವಾಗ, ಕೇತು 8ನೇ ಮನೆಯಲ್ಲಿರುವಾಗ, ಮತ್ತು ಎಲ್ಲಾ ಗ್ರಹಗಳೂ ರಾಹು ಮತ್ತು ಕೇತುವಿನ ಮಧ್ಯದಲ್ಲಿರುವಾಗ, ಅದು ಕುಳಿಕ ಕಾಳಸರ್ಪ ಯೋಗವಾಗಿರುತ್ತದೆ. ಈ ಯೋಗ ಮಾನನಷ್ಟ ಅಥವಾ ನಾಚಿಕೆಗೇಡಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ ಎಂದು ನಂಬಲಾಗಿದೆ. ಇದು ವ್ಯಕ್ತಿಯ ಅಧ್ಯಯನಗಳ ಮೇಲೂ ಪ್ರತಿಕೂಲ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಇದು ಅಸ್ಥಿರ ಅಥವಾ ದುರ್ಬಲ ಆರ್ಥಿಕ ಸ್ಥಿತಿಗೂ ಕಾರಣವಾಗುತ್ತಿದ್ದು ಇದು ವ್ಯಕ್ತಿಯ ವೈವಾಹಿಕ ಜೀವನದಲ್ಲಿ ವಿಚ್ಛೇದನವನ್ನು ತರಬಹುದು. ಅವರ ಸ್ನೇಹಿತರು ಅವರಿಗೆ ಮೋಸ ಮಾಡಬಹುದು. ಇದು ಮಾನಸಿಕ ಮತ್ತು ದೈಹಿಕ ಅಸಮತೋಲನ ಉಂಟುಮಾಡುತ್ತದೆ ಹಾಗೂ ಅವರ ಆ ವ್ಯಕ್ತಿಗೆ ವಯಸ್ಸಾಗುವ ಮೊದಲೇ ಅವರನ್ನು ವೃದ್ಧರನ್ನಾಗಿಸುತ್ತದೆ. ಈ ಕಾಳಸರ್ಪ ಯೋಗದಿಂದಾಗಿ ಅವರು ಉತ್ಸಾಹಹೀನರೂ ಮತ್ತು ಧೈರ್ಯಹೀನರೂ ಆಗಿರುತ್ತಾರೆ. ಆದಾಗ್ಯೂ ಈ ಯೋಗವರುವ ವ್ಯಕ್ತಿ ಶ್ರಮದ ಮೂಲಕ ಹಾಗೂ ಬದ್ಧತೆಯ ಮೂಲಕ ಯಶಸ್ಸು ಸಾಧಿಸಬಹುದಾದರೂ ಆದರೆ ಆ ಯಶಸ್ಸು ಕೆಲವೇ ಸಮಯದವರೆಗೆ ಮಾತ್ರ. ಇಂತಹ ಪರಿಸ್ಥಿತಿಯಲ್ಲಿ ವ್ಯಕ್ತಿಯು ಕೆಳಗಿನ ಪರಿಹಾರಗಳನ್ನು ಅನ್ವಯಿಸಬೇಕು:
	 VASUKI_KALSARPA_YOGA_INTRO_TEXT = ಕುಂಡಲಿ ಅಥವಾ ಜನನ ಜಾತಕದಲ್ಲಿ ರಾಹು 3ನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಕೇತು 9ನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಮತ್ತು ಇತರ ಎಲ್ಲ ಗ್ರಹಗಳು ಈ ಎರಡು ಮನೆಗಳ ನಡುವಿದ್ದಾಗ ವಾಸುಂಕಿ ಕಾಳಸರ್ಪ ಯೋಗವಿರುತ್ತದೆ. ಕುಂಡಲಿಯಲ್ಲಿ ಈ ಕಾಳಸರ್ಪ ಯೋಗದ ಇರುವಿಕೆ ಒಡಹುಟ್ಟಿದವರು ಮತ್ತು ಇತರ ಸಂಗಾತಿಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ಸಮಸ್ಯೆಗಳನ್ನು ಸೂಚಿಸುತ್ತದೆ. ಈ ಯೋಗವಿರುವ ವ್ಯಕ್ತಿ ಸ್ನೇಹಿತರು ಮತ್ತು ಇತರ ಹತ್ತಿರದವರಿಂದ ಮೋಸಗಳನ್ನು ಎದುರಿಸಬಹುದು. ಈ ವ್ಯಕ್ತಿಯ ಗೃಹ ಹಾಗೂ ಕೌಟುಂಬಿಕ ಜೀವನ ಪ್ರಕ್ಷುಬ್ಧತೆಗಳು ಮತ್ತು ಹಿಂಸೆಯಿಂದ ತುಂಬಿರುತ್ತದೆ. ಇಂತಹ ವ್ಯಕ್ತಿ ತನ್ನ ಸ್ಥಳೀಯ ಸ್ಥಳದಿಂದ ಹೊರಗಿರಲು ಅಥವಾ ಗಳಿಸಲು ಅಥವಾ ಬದುಕಲು ಆರಂಭಿಸಿದಲ್ಲಿ ಅವರು ಹೆಚ್ಚು ಯಶಸ್ವಿಯಾಗಬಹುದು. ಈ ವ್ಯಕ್ತಿ ತಡವಾಗಿ ಯಶಸ್ಸು ಪಡೆದರೂ ಖಂಡಿತವಾಗೂ ಅದನ್ನು ಪಡೆಯುತ್ತಾರೆ. ತೊಂದರೆಯ ಸಮಯದಲ್ಲಿ ಕೆಳಗಿನ ಪರಿಹಾರಗಳನ್ನು ಅನ್ವಯಿಸಬೇಕು:
	 SHANKPAAL_KALSARPA_YOGA_INTRO_TEXT = ಒಂದು ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ರಾಹು 4ನೇ ಮನೆಯಲ್ಲಿ ಮತ್ತು ಕೇತು 10ನೇ ಮನೆಯಲ್ಲಿರುವಾಗ ಹಾಗೂ ಉಳಿದ ಗ್ರಹಗಳು ಇವೆರಡರ ಮಧ್ಯೆಯಿರುವಾಗ ಅದನ್ನು ಶಂಖಫಲ ಕಾಳಸರ್ಪ ಯೋಗವೆನ್ನುತ್ತಾರೆ. ಈ ಕಾಳಸರ್ಪ ಯೋಗ ಜಾಗ ಅಥವಾ ತೋಟಮನೆ ಅಥವಾ ಕೋಟೆಗೆ ಸಂಬಂಧಿಸಿದ ಅಥವಾ ವಾಹನಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ಸಮಸ್ಯೆಗಳನ್ನು ಉಂಟುಮಾಡುತ್ತದೆ. ಈ ಕಾಳಸರ್ಪ ಯೋಗವಿರುವ ವ್ಯಕ್ತಿ ಒಂದು ಸಮಯದಲ್ಲಿ ಅನೇಕ ಕೆಲಸಗಳನ್ನು ಮಾಡಲು ಉದ್ದೇಶಿಸುತ್ತಾರೆ. ಮತ್ತು ಇದಕ್ಕಾಗಿಯೇ ಆ ವ್ಯಕ್ತಿಯ ಬಹುತೇಕ ಕೆಲಸಗಳು ಸಂಪೂರ್ಣವಾಗುತ್ತವೆ. ಈ ವ್ಯಕ್ತಿ ವಿವಾಹಿತ ಜೀವನದಲ್ಲೂ ಅಸಾಮರಸ್ಯವನ್ನು ಎದುರಿಸುತ್ತಾರೆ. ಹಣಕಾಸು ಕೊರತೆಗಳು ಈ ಯೋಗದ ಒಂದು ಪ್ರಮುಖ ಸೂಚನೆಯಾಗಿದೆ. ಆದರೂ ಈ ವ್ಯಕ್ತಿ ರಾಜಕೀಯ, ಸೇವೆಗಳು, ಮತ್ತು ವ್ಯಾಪಾರ ಕ್ಷೇತ್ರದಲ್ಲಿ ನ್ಯಾಯಯುತ ಸಾಧನೆಗಳನ್ನು ಮಾಡುತ್ತಾರೆ, ಮತ್ತು ಸಾಮಾಜಿಕ ಗೌರವ ಪಡೆಯುತ್ತಾರೆ. ಸಮಸ್ಯೆಗಳ ಸಮಯದಲ್ಲಿ ಪರಿಹಾರಗಳು ಈ ಕೆಳಗಿನಂತಿರುತ್ತವೆ:
	 PADAM_KALSARPA_YOGA_INTRO_TEXT = ಜನನ ಜಾತಕದಲ್ಲಿ, ರಾಹು 5ನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಮತ್ತು ಕೇತು 11ನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಮತ್ತು ಇತರ ಎಲ್ಲ ಗ್ರಹಗಳೂ ಈ ಎರಡು ಮನೆಗಳ ನಡುವಿರುವಾಗ ಇದು ಪದಮ ಕಾಳಸರ್ಪ ಯೋಗವಾಗಿರುತ್ತದೆ. ಐದನೇ ಮನೆಯ ಜೊತೆಗಿನ ಸಹಯೋಗದ ಕಾರಣ, ಈ ಕಾಳಸರ್ಪ ಯೋಗ ಅಧ್ಯಯನಗಳಲ್ಲಿ ಅಡ್ಡಿ, ಮಗುವಿನ ವಿಳಂಬಿತ ಜನ್ಮ, ಹಾಗೂ ಮಕ್ಕಳಿಗೆ ಸಂಬಂಧಿಸಿದ ತೊಂದರೆಗಳನ್ನು ಸೂಚಿಸುತ್ತದೆ. ಆಗಾಗ ಈ ಯೋಗದಿಂದಾಗಿ ಆರೋಗ್ಯ ಮತ್ತು ವೈವಾಹಿಕ ಜೀವನ ಏರುಪೇರಾಗುತ್ತದೆ. ಈ ಕಾಳಸರ್ಪ ಯೋಗವಿರುವ ವ್ಯಕ್ತಿ ಯಾವಾಗಲೂ ಕುಟುಂಬದಲ್ಲಿ ಅವಮಾನಗೊಳ್ಳುವ ಬಗ್ಗೆ ಆತಂಕ ಹೊಂದಿರುತ್ತಾನೆ. ಈ ಯೋಗವು ಆತಂಕಗಳನ್ನು ಹುಟ್ಟುಹಾಕುವುದರಿಂದ ಈ ವ್ಯಕ್ತಿಯ ಜೀವನ ಹೋರಾಟಮಯವಾಗುತ್ತದೆ. ಅವರ ಸ್ನೇಹಿತರು ಸ್ವಾರ್ಥಿಯಾಗುತ್ತಾರೆ. ಅನೇಕ ಸಮಸ್ಯೆಗಳನ್ನು ಎದುರಿಸಿಯೂ ಈ ವ್ಯಕ್ತಿಯು ಉತ್ತಮವಾದ ಮತ್ತು ಪ್ರಬಲವಾದ ಆರ್ಥಿಕ ಸ್ಥಿತಿಯನ್ನು ಹೊಂದುತ್ತಾರೆ, ಗೌರವಾನ್ವಿತ ಸಾಮಾಜಿಕ ಸ್ಥಿತಿಯನ್ನು ಹೊಂದುತ್ತಾರೆ, ಮತ್ತು ವ್ಯಾಪಾರ ಚೆನ್ನಾಗಿ ನಡೆಯುತ್ತದೆ. ಈ ಯೋಗವಿರುವ ವ್ಯಕ್ತಿ ತನ್ನ ನಡವಳಿಕೆ ಮತ್ತು ಸ್ವಭಾದಲ್ಲಿ ಉತ್ತಮರಾಗಿದ್ದಲ್ಲಿ ಅವರು ಮದ್ಯಪಾನ ಮಾಡದಿದ್ದಲ್ಲಿ ಮತ್ತು ಅವರು ತನ್ನ ಸ್ನೇಹಿತನ ಆಸ್ತಿಯನ್ನು ವಶಪಡಿಸಿಕೊಳ್ಳದಿದ್ದಲ್ಲಿ ಮೆಲೆ ಹೇಳಿದ ಪದಮ ಕಾಳಸರ್ಪ ಯೋಗದ ಕೆಟ್ಟ ಪ್ರಭಾವಗಳು ಪರಿಣಾಮಕಾರಿಯಾಗುವುದಿಲ್ಲ.
	 MAHAPADAM_KALSARPA_YOGA_INTRO_TEXT = ಜನನ ಜಾತಕದಲ್ಲಿ ರಾಹು 6ನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಹಾಗೂ ಕೇತು 12ನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಮತ್ತು ಇತರ ಎಲ್ಲ ಗ್ರಹಗಳು ಈ ಎರಡು ಮನೆಗಳ ನಡುವಿರುವಾಗ ಅದು ಮಹಾಪಾದಮ್ ಕಾಳಸರ್ಪ ಯೋಗವಾಗುತ್ತದೆ. ಈ ಯೋಗವಿರುವ ವ್ಯಕ್ತಿ ಶತ್ರು ವಿಜೇತರೂ ಮತ್ತು ವಿದೇಶಗಳಲ್ಲಿ ಭಾರೀ ಹಣ ಗಳಿಸುವವರೂ ಆಗಿರುತ್ತಾರೆ. ಆದರೆ ಅವರಿಗೆ ಮನೆಯಲ್ಲಿ ಯಾವತ್ತೂ ಶಾಂತಿಯಿರುವುದಿಲ್ಲ. ಈ ವ್ಯಕ್ತಿಯು ಸಾಕಷ್ಟು ಪ್ರಯಾಣ ಮಾಡುತ್ತಾರೆ, ಅವರ ಕೆಲವು ಪ್ರಯಾಣಗಳು ಯಶಸ್ವಿಯಾಗುತ್ತವೆ ಹಾಗೂ ಇನ್ನೂ ಕೆಲವು ಆಗುವುದಿಲ್ಲ. ಈ ವ್ಯಕ್ತಿ ಸಂಪತ್ತು ಅಥವಾ ಸಂತೋಷ ಎರಡರಲ್ಲಿ ಒಂದನ್ನು ಮಾತ್ರ ಪಡೆಯಬಹುದು. ಈ ಯೋಗವಿರುವ ವ್ಯಕ್ತಿಗೆ ರಾತ್ರಿಗಳಲ್ಲಿ ಭಯಾನಕ ಕನಸುಗಳು ಬೀಳುತ್ತವೆ. ಈ ವ್ಯಕ್ತಿ ಕೊನೆಗಾಲದಲ್ಲಿ ವೇದನೆಯನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ. ಆದರೆ, ಒಳ್ಳೆಯ ಸಮಯವೂ ಅವರ ಜೀವನದಲ್ಲಿ ಬರುತ್ತದೆ. ಈ ಕಾಳಸರ್ಪ ಯೋಗವಿರುವ ವ್ಯಕ್ತಿಗಳು ವಕೀಲರಾಗಿ ಅಥವಾ ರಾಜಕೀಯ ನಾಯಕರಾಗಿ ಹೆಚ್ಚಾಗಿ ಯಶಸ್ಸು ಹೊಂದುತ್ತಾರೆ . ತೊಂದರೆಯ ಸಮಯದಲ್ಲಿ ಕೆಳಗಿನ ಪರಿಹಾರಗಳನ್ನು ಅನ್ವಯಿಸಬಹುದು.
	 TAKSHAK_KALSARPA_YOGA_INTRO_TEXT = ಪ್ರಚಲಿತ ವ್ಯಾಖ್ಯಾನದ ಪ್ರಕಾರ, ಜಾತಕನ ಜಾತಕದಲ್ಲಿ ರಾಹು 7ನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಮತ್ತು ಕೇತು 1ನೇ ಮನೆಯಲ್ಲಿದ್ದು ಉಳಿದ ಎಲ್ಲ ಗ್ರಹಗಳು ಮೊದಲ ಮತ್ತು ಏಳನೇ ಮನೆಯ ಮಧ್ಯದಲ್ಲಿದ್ದಾಗ ಜನ್ಮ ಜಾತಕಕ್ಕೆ ತಕ್ಷಕ ಕಾಳಸರ್ಪ ದೋಷವಿದೆಯೆಂದು ಹೇಳಲಾಗುತ್ತದೆ. ಈ ಸಂದರ್ಭದಲ್ಲಿ ಜಾತಕನು ಪೂರ್ವಜರ ಆಸ್ತಿಯ ಆನುವಂಶಿಕತೆಯ ಸಂತೋಷವನ್ನು ಆನಂದಿಸುವುದಿಲ್ಲ, ಪ್ರೀತಿಯ ಸಂಬಂಧಗಳು ವಿಫಲಗೊಳ್ಳುತ್ತವೆ ಮತ್ತು ಜಾತಕನು ನಿಕಟ ಸಂಬಂಧಗಳಲ್ಲಿ ವಿಶ್ವಾಸಘಾತುಕತನವನ್ನು ಅನುಭವಿಸುತ್ತಾನೆ. ಇದಲ್ಲದೆ, ಜಾತಕನು ವೈವಾಹಿಕ ಜೀವನದಲ್ಲಿ ಅಡಚಣೆಯನ್ನು ಅನುಭವಿಸುತ್ತಿದ್ದು ಇದು ಇಬ್ಬರೂ ಪ್ರತ್ಯೇಕಗೊಳ್ಳಲೂ ಕಾರಣವಾಗಬಹುದು. ಜಾತಕನು ಬಹುಶಃ ಜೂಜು ಮತ್ತು ಲಾಟರಿಯಲ್ಲಿ ಆಸಕ್ತಿ ಹೊಂದಿರಬಹುದಾಗಿದ್ದು ಮತ್ತು ತನ್ನ ಮಕ್ಕಳು ಮತ್ತು ನೀಡಿದ ಹಣದ ಬಗ್ಗೆ ವಿಚಾರ ಮಾಡುತ್ತ ಯಾವಾಗಲೂ ಚಿಂತೆಯಲೇ ಮುಳುಗಿರುತ್ತಾರೆ. ಆದರೆ, ಜಾತಕನು ದರ್ಮಾರ್ಥ ಬುದ್ಧಿಯವನಾಗಿದ್ದು ಇತರರಿಗೆ ಗೌರವ ನೀಡುತ್ತಿದ್ದಲ್ಲಿ ಅವರು ಈ ಸಮಸ್ಯೆಗಳಿಂದ ಭಾಧಿತರಾಗಬೇಕಾಗಿಲ್ಲ. ನೀವು ಈ ಸಮಸ್ಯೆಯ ಪರಿಹಾರಕ್ಕೆ ಅನುಸರಿಸಬಹುದಾದ ಕೆಲವು ಪರಿಹಾರಗಳು ಇಲ್ಲಿವೆ:.
	 KARKOTAK_KALSARPA_YOGA_INTRO_TEXT = ಪ್ರಚಲಿತ ವ್ಯಾಖ್ಯಾನದ ಪ್ರಕಾರ ಜಾತಕನ ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ರಾಹು ಎಂಟನೆಯ ಮನೆಯಲ್ಲಿದ್ದು ಕೇತು ಮತ್ತು ಎರಡನೇ ಮನೆಯಲ್ಲಿದ್ದು ಉಳಿದ ಗ್ರಹಗಳು ರಾಹು ಮತ್ತು ಕೇತುವಿನ ನಡುವಿದ್ದಲ್ಲಿ ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ಕಾರ್ಕೋಟಕ ಕಾಳಸರ್ಪ ದೋಷವಿದೆಯೆಂದು ಹೇಳಲಾಗುತ್ತದೆ. ಈ ಸಂದರ್ಭದಲ್ಲಿ ಜಾತಕನು ಎಂದಿಗೂ ಅದೃಷ್ಟದ ನೆಚ್ಚಿನ ಪುತ್ರನಲ್ಲ, ಬಡ್ತಿಗಳು ಕಷ್ಟಕರ, ಪರಂಪರಾಗತ ಆಸ್ತಿ ಪಡೆಯುವಲ್ಲಿ ಅಡೆತಡೆಗಳಿರುತ್ತವೆ, ಸ್ನೇಹಿತರು ದ್ರೋಹ ಮಾಡುತ್ತಾರೆ ಮತ್ತು ಮಾಡಿದ ಎಲ್ಲಾ ಪ್ರಯತ್ನಗಳಿಗೆ ಅರ್ಧ ಮಾತ್ರವೇ ಪ್ರತಿಫಲ ಸಿಗುತ್ತದೆ. ಮಾನಸಿಕ ಮತ್ತು ದೈಹಿಕ ಸಮಸ್ಯೆಗಳಿಂದಾಗಿ ಇಂತಹ ಜಾತಕನು ಮನೆಯಲ್ಲಿ ಮತ್ತು ಸಂಬಂಧಿಕರಲ್ಲಿ ಅಡೆತಡೆಗಳನ್ನು ಎದುರಿಸುತ್ತಾನೆ. ಇವರು ಯಾವಾಗಲೂ ಕೋಪದಲ್ಲಿರುತ್ತಾರೆ ಮತ್ತು ಶಾಂತಿಭಂಗವಾದಂತಿರುತ್ತಾರೆ, ಅವರು ತೆಗೆದುಕೊಂಡ ಸಾಲದಿಂದಾಗಿ ಬಹಳಷ್ಟು ಬಳಲುತ್ತಾರೆ. ಆಕಸ್ಮಿಕ ಸಾವಿನ ಸಾಧ್ಯತೆಗಳು ಅವನ್ನು ಸುತ್ತುವರೆದಿರುತ್ತವೆ. ನೀವು ಇವುಗಳಿಂದ ನರಳುತ್ತಿದ್ದಲ್ಲಿ ಕೆಳಕಂಡ ಪರಿಹಾರಗಳನ್ನು ಅನುಸರಿಸಿ:
	 SHANKACHOOD_KALSARPA_YOGA_INTRO_TEXT = ಪ್ರಚಲಿತ ವ್ಯಾಖ್ಯಾನದ ಪ್ರಕಾರ ಒಬ್ಬ ಜಾತಕನ ಒಂಬತ್ತನೇ ಮನೆಯಲ್ಲಿ ರಾಹು ಮತ್ತು ಮೂರನೇ ಮನೆಯಲ್ಲಿ ಕೇತುವಿದ್ದು ನಡುವೆ ಉಳಿದ ಗ್ರಹಗಳಿದ್ದಲ್ಲಿ ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ಶಂಖಚೂಡ ಕಾಳಸರ್ಪ ದೋಷವಿದೆಯೆಂದು ಹೇಳಲಾಗುತ್ತದೆ. ಈ ಸಂದರ್ಭದಲ್ಲಿ ಜಾತಕನು ಅದೃಷ್ಟದ ಒಲವು ಪಡೆಯುವಲ್ಲಿ ಅಡೆತಡೆಗಳನ್ನು ಎದುರಿಸುತ್ತಾನೆ. ವ್ಯಾಪಾರವಾಗಲೀ, ಬಡ್ತಿಯಾಗಲೀ ಅಥವಾ ಶಿಕ್ಷಣವಾಗಲೀ, ಜಾತಕನು ಬೇಕಾದ ಫಲಿತಾಂಶವನ್ನು ಪಡೆಯುವಲ್ಲಿ ಹಲವು ಅಡೆತಡೆಗಳನ್ನು ಎದುರಿಸುತ್ತಾನೆ. ಅವರು ತಮ್ಮ ಅತಿಯಾದ ಆತ್ಮವಿಶ್ವಾಸ ಮತ್ತು ವಾದಮಾಡುವ ಪ್ರಕೃತಿಯಿಂದಾಗಿ ನಷ್ಟಗಳನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ. ತಂದೆಯ ಕಡೆಯಿಂದ ಸಂತೋಷದ ಕೊರತೆ, ಅಜ್ಜಅಜ್ಜಿಯ ಕಡೆಯಿಂದ (ತಾಯಿಯ ಕಡೆಯಿಂದ) ಮತ್ತು ಸಹೋದರಿಯ ಪತಿಯಿಂದ ವಿಶ್ವಾಸಘಾತುಕತನ ಈ ದೋಷದ ಪರಿಣಾಮವಾಗಿರುತ್ತದೆ. ವೈವಾಹಿಕ ಜೀವನ ಸಂಘರ್ಷಗಳ ಮತ್ತು ತಪ್ಪು ತಿಳಿವಳಿಕೆಗಳ ನಡುವೆ ಓಲಾಡುತ್ತದೆ, ಹಾಗೂ ಜಾತಕನು ಗೌರವ ಮತ್ತು ಮರ್ಯಾದೆಯನ್ನೂ ಆನಂದಿಸುವುದಿಲ್ಲ. ಇಂತಹ ಜಾತಕನು ಆಧ್ಯಾತ್ಮವಾದಿಯಾಗಲು ಪ್ರಯತ್ನಿಸಬೇಕು ಮತ್ತು ಈ ಪರಿಹಾರಗಳ ಜೊತೆಗೆ ತನ್ನ ಹೃದಯದಲ್ಲಿರುವ ಕೆಡುಕಿನ ವಿರುದ್ಧವೂ ಹೋರಾಟ ಮಾಡಬೇಕು:
	 GHATAK_KALSARPA_YOGA_INTRO_TEXT = ಪ್ರಚಲಿತ ವ್ಯಾಖ್ಯಾನದ ಪ್ರಕಾರ ಜಾತಕನ ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ಹತ್ತನೇ ಮನೆಯಲ್ಲಿ ರಾಹು ಹಾಗೂ ನಾಲ್ಕನೇ ಮನೆಯಲ್ಲಿ ರಾಹುವಿದ್ದಲ್ಲಿ ಹಾಗೂ ಉಳಿದ ಗ್ರಹಗಳು ಇವೆರಡರ ನಡುವಿದ್ದಲ್ಲಿ ಅದನ್ನು ಘಾತಕ ಕಾಳಸರ್ಪ ದೋಷ ಎಂದು ಹೇಳಲಾಗುತ್ತದೆ. ಜಾತಕನು ತನ್ನ ಇಡೀ ಜೀವನದಲ್ಲಿ ಸಂತೋಷವನ್ನು ಹುಡುಕಿಕೊಂಡು ಅಲೆದಾಡಿದರೂ ಅವರ ಜೀವನದಲ್ಲಿ ಏನೇ ಸಂತೋಷಗಳು ಹೋಗಿ ಬಂದರೂ ಜಾತಕನಿಗೆ ಅದು ಸಿಗಲಾರದು. ಜಾತಕನು ಅವರ ತಂದೆಯ ವಿಯೋಗವನ್ನುಎದುರಿಸುತ್ತಾನೆ. ವೈವಾಹಿಕ ಜೀವನ ಅತೃಪ್ತಿಯಲ್ಲಿರುತ್ತದೆ. ವ್ಯಾಪಾರದಲ್ಲಿ ಅಹಿತಕರ ಸಮಸ್ಯೆಗಳು ಮತ್ತು ಅಡೆತಡೆಗಳಿದ್ದರೂ ಸಂಪತ್ತು ಅಥವಾ ಹಣಕ್ಕೆ ಎಂದಿಗೂ ಕೊರತೆಯಿರುವುದಿಲ್ಲ. ಜಾತಕನು ಒಂದು ಕೆಲಸ ಅಥವಾ ಸೇವೆಯಲ್ಲಿದ್ದಲ್ಲಿ ಅಮಾನತು, ವಿಸರ್ಜನೆ ಮತ್ತು ಹಿಂಬಡ್ತಿಯ ಭಯ ಯಾವಾಗಲೂ ಕಾಡುತ್ತಿರುತ್ತದೆ. ಸ್ನೇಹಿತರೂ ಸಹ ಜಾತಕನಿಗೆ ಮೋಸ ಮಾಡುತ್ತಿರುತ್ತಾರೆ. ಜಾತಕನು ಲಂಚ ಅಥವಾ ಅಕ್ರಮ ಕಾರ್ಯಗಳಿಂದ ಹೊರಬಂದಲ್ಲಿ ಅವರು ಜೀವನದಲ್ಲಿ ಯಾವುದಕ್ಕೂ ಕೊರತೆ ಎದುರಿಸುವುದಿಲ್ಲ. ಜಾತಕನು ಸಾಮಾಜಿಕ ಮತ್ತು ರಾಜಕೀಯ ಖ್ಯಾತಿ ಪಡೆಯುತ್ತಾರೆ. ನಿಮ್ಮನ್ನು ನೀವೇ ರಕ್ಷಿಸಲು ಕೆಳಗಿನ ಪರಿಹಾರಗಳನ್ನು ಮಾಡಿ.
	 VISHDHAR_KALSARPA_YOGA_INTRO_TEXT = ಪ್ರಚಲಿತ ವ್ಯಾಖ್ಯಾನದ ಪ್ರಕಾರ ರಾಹು 11ನೇ ಮನೆಯಲ್ಲಿದ್ದು ಕೇತು 5ನೇ ಮನೆಯಲ್ಲಿದ್ದು ಉಳಿದ ಎಲ್ಲಾ ಗ್ರಹಗಳು ಮಧ್ಯದಲ್ಲಿದ್ದಲ್ಲಿ, ಅಂದರೆ ಉಳಿದ ಎಲ್ಲಾ ಗ್ರಹಗಳು 11ನೇ ಮತ್ತು 5ನೇ ಮನೆಯ ನಡುವಿದ್ದಲ್ಲಿ ಜಾತಕನ ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ವಿಷಧರ ಕಾಳಸರ್ಪ ದೋಷವಿದೆಯೆಂದು ಹೇಳಲಾಗುತ್ತದೆ. ಈ ಸಂದರ್ಭದಲ್ಲಿ ಜಾತಕನು ಶಿಕ್ಷಣ ಹಾಗೂ ಉನ್ನತ ಶಿಕ್ಷಣದಲ್ಲಿ ಸಮಸ್ಯೆಗಳನ್ನು ಎದುರಿಸುತ್ತಾನೆ ಮತ್ತು ಜಾತಕನಿಗೆ ಮನನ ಸಾಮರ್ಥ್ಯದಲ್ಲಿ ಅಡೆತಡೆಗಳಿರುತ್ತವೆ. ಚಿಕ್ಕಪ್ಪ ದೊಡ್ಡಪ್ಪಂದಿರ, ಅವರ ಮಗ ಮತ್ತು ಹಿರಿಯ ಸಹೋದರರ ಜೊತೆ ಸಂಘರ್ಷ ಉದ್ಭವಿಸಬಹುದು ಹಾಗೂ ದೂರದ ಪ್ರಯಾಣವೂ ಒಂದು ಸಮಸ್ಯೆಯಾಗಿ ಕಾಡಬಹುದು.  ಶಾರೀರಿಕ ಬೇನೆ ಮತ್ತು ಹೆರಿಗೆಗೆ ಸಂಬಂಧಿಸಿದ ಸಮಸ್ಯೆಗಳು ತೊಂದರೆಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು. ಈ ಸಮಸ್ಯೆಗಳನ್ನು ನಿಭಾಯಿಸಲು ಕೆಲವು ಪರಿಹಾರಗಳು ಇಲ್ಲಿವೆ:
	 SHESHNAG_KALSARPA_YOGA_INTRO_TEXT = ಪ್ರಚಲಿತ ವ್ಯಾಖ್ಯಾನದ ಪ್ರಕಾರ ರಾಹು ಜಾತಕನ ಜನ್ಮ ಜಾತಕದ 12ನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಮತ್ತು ಕೇತು 6ನೇ ಮನೆಯಲ್ಲಿದ್ದು ಉಳಿದ ಎಲ್ಲಾ ಗ್ರಹಗಳು ಮಧ್ಯದಲ್ಲಿದ್ದಾಗ, ಅಂದರೆ ಉಳಿದ ಎಲ್ಲಾ ಗ್ರಹಗಳೂ 12ನೇ ಮತ್ತು 6ನೇ ಮನೆಯ ಮಧ್ಯದಲ್ಲಿದ್ದಾಗ ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ಶೇಷನಾಗ ಕಾಳಸರ್ಪ ದೋಷವಿದೆಯೆಂದು ಹೇಳಲಾಗುತ್ತದೆ. ಈ ಸಂದರ್ಭದಲ್ಲಿ ಜಾತಕನ ಬದುಕಿನ ಅಪೇಕ್ಷೆಗಳು ಸುದೀರ್ಘ ಸಮಯದ ನಂತರ ಪೂರೈಸಲ್ಪಡುತ್ತವೆ, ಜೀವನ ನಡೆಸಲು ಅವರು ದೂರಕ್ಕೆ ಪ್ರಯಾಣಿಸಬೇಕಾಗುತ್ತದೆ, ಹಾಗೂ ಯಾವಾಗಲೂ ಹೆಸರು ಕೆಡಿಸಿಕೊಳ್ಳುವ ಮತ್ತು ಸಂಘರ್ಷದ ಭಯದಲ್ಲೇ ಜೀವಿಸುತ್ತಾರೆ. ಕೆಲವು ನಡವಳಿಕೆಗಳ ಕಾರಣದಿಂದಾಗಿ ಜಾತಕನು ಮೂದಲಿಕೆಯ ಬಲಿಪಶುವಾಗುತ್ತಾರೆ. ಆದಾಗ್ಯೂ ತನ್ನ ಜೀವಿತಾವಧಿಯಲ್ಲಿ ಒಮ್ಮೆ ಅವರು ಅಧಿಕಾರದ ಸ್ಥಾನ ಪಡೆಯುತಾರೆ ಮತ್ತು ಅವರು ಬಯಸಿದ ಖ್ಯಾತಿ ಗಳಿಸುತ್ತಾರೆ. ಈ ಸಮಸ್ಯೆಗಳನ್ನು ನಿಭಾಯಿಸಲು ಕೆಲವು ಪರಿಹಾರಗಳು ಇಲ್ಲಿವೆ:
	 ANNANT_KALSARPA_YOGA_REMEDY = <li> ಒಂದು ವರ್ಷದ ತನಕ ಅಧ್ಯಯನಗಳಲ್ಲಿ ತೊಂದರೆಯಿದ್ದಲ್ಲಿ ಸರಸ್ವತಿ ಬೀಜ ಮಂತ್ರವನ್ನು ಪಠಿಸಿ ಮತ್ತು ಸಂಪೂರ್ಣ ಧಾರ್ಮಿಕತೆ ಮತ್ತು ಭಕ್ತಿಯಿಂದ ಸರಸ್ವತಿಯ ಪ್ರಾರ್ಥನೆ ಮಾಡಿ. </ li><li> ಮಹಾ ಮೃತ್ಯುಂಜಯ ಮಂತ್ರವನ್ನು ಪಠಿಸಿ ಅಥವಾ ಇನ್ನೊಬ್ಬರಿಗೆ ಅದನ್ನು ಮಾಡುವಂತೆ ತಿಳಿಸಿ. </ li><li> 3 ಶುಭ ಕಾಲದಲ್ಲಿ ನೀರಿನಲ್ಲಿ ಕಲ್ಲಿದ್ದಲು ತೇಲಿಸಿ </ li> <li> ಹನುಮಾನ್ ಚಾಲೀಸಾವನ್ನು 108 ಬಾರಿ ಪಠಿಸಿ </ li> <li> ದೇವದಾರು, ಸಾಸಿವೆ ಹಾಗೂ ಲೋಹಾವನದ ಜೊತೆ ಕಲೆಸಿದ ಸ್ವಲ್ಪ ನೀರನ್ನು ತೆಗೆದುಕೊಳ್ಳಿ. ನಿಮ್ಮ ಸ್ನಾನದ ನೀರಿನಲ್ಲಿ ಈ ಬೇಯಿಸಿದ ನೀರಿನ್ನು ಮಿಶ್ರಣ ಮಾಡಿ 37 ದಿನಗಳವರೆಗೆ ಈ ನೀರನ್ನು ಬಳಸಿ ಸ್ನಾನ ಮಾಡಿ. </ li>
	 KULIK_KALSARPA_YOGA_REMEDY = ಸರಸ್ವತಿ ಬೀಜ ಮಂತ್ರವನ್ನು ಪಠಿಸಿ ಮತ್ತು ಸಂಪೂರ್ಣ ಧಾರ್ಮಿಕತೆ ಮತ್ತು ಭಕ್ತಿಯಿಂದ ಸರಸ್ವತಿಯ ಪ್ರಾರ್ಥನೆ ಮಾಡಿ </li><li> <li> ಹನುಮಾನ್ ಚಾಲೀಸಾವನ್ನು 108 ಬಾರಿ ಪಠಿಸಿ. </ li > 3 ಶುಭ ಕಾಲದಲ್ಲಿ ನೀರಿನಲ್ಲಿ ಕಲ್ಲಿದ್ದಲು ತೇಲಿಸಿ </li><li> ಶ್ರಾವಣದಲ್ಲಿ 30 ದಿನಗಳ ತನಕ ಮಹಾದೇವನಿಗೆ ಅಭಿಷೇಕ ಮಾಡಿ. </ li> ದೇವದಾರು, ಸಾಸಿವೆ ಹಾಗೂ ಲೋಹಾವನದ ಜೊತೆ ಕಲೆಸಿದ ಸ್ವಲ್ಪ ನೀರನ್ನು ತೆಗೆದುಕೊಳ್ಳಿ. ನಿಮ್ಮ ಸ್ನಾನದ ನೀರಿನಲ್ಲಿ ಈ ಬೇಯಿಸಿದ ನೀರಿನ್ನು ಮಿಶ್ರಣ ಮಾಡಿ 37 ದಿನಗಳವರೆಗೆ ಈ ನೀರನ್ನು ಬಳಸಿ ಸ್ನಾನ ಮಾಡಿ.</ li> <li> ಶನಿವಾರ ಮತ್ತು ಮಂಗಳವಾರದಲ್ಲಿ ಉಪವಾಸ ಮಾಡಿ ಮತ್ತು ಕೆಲಸದಲ್ಲಿ ಅಡೆತಡೆಗಳನ್ನು ಎದುರಿಸುತ್ತಿದ್ದಲ್ಲಿ ದೇವಾಲಯಗಳಿಗೆ ಭೇಟಿ ನೀಡಿ ಮತ್ತು ಶನಿದೇವರಿಗೆ ಸಾಸಿವೆ ಎಣ್ಣೆ ಅರ್ಪಿಸಿ. </ li> <li> ರಾಹುವಿನ ಪ್ರಭಾವದ ಅವಧಿಯಲ್ಲಿ, ದಿನವೂ ರಾಹು ಮಂತ್ರದ ಒಂದು ಸರಣಿಯನ್ನು ಪಠಿಸಿ ಮತ್ತು ಅದನ್ನು 18000 ಬಾರಿ ಪಠಿಸಿದ ಮೇಲೆ ರಾಹುವಿನ ಹವನ ಮಾಡಿ ಮತ್ತು ನಿರ್ಗತಿಕರಿಗೆ ಉದ್ದಿನ ಬೇಳೆ ಮತ್ತು ನೀಲಿ ಬಣ್ಣದ ಬಟ್ಟೆಯನ್ನು ದಾನ ಮಾಡಿ. ಇದನ್ನು ಮಾಡುವುದು ತುಂಬ ಶ್ರೇಯಸ್ಕರವಾಗಿದೆ. </ li>
	 VASUKI_KALSARPA_YOGA_REMEDY = <li>ಒಂದು ವರ್ಷದವರೆಗೆ ದಿನವೂ ನವ ನಾಗ ಸ್ತೋತ್ರವನ್ನು ಪಠಿಸಿ</ li> <li> ಯಾವುದೇ ಮಂಗಳಕರ ಸಮಯದಲ್ಲಿ ನಾಗ ಪಾಶ ಯಂತ್ರವನ್ನು ಹೊಂದಿ.</ li><li> ಪ್ರತಿ ಬುಧವಾರ ರಾಹು ಮಂತ್ರವನ್ನು ಜಪಿಸಿದ ನಂತರ ಒಂದು ಕಪ್ಪು ಬಟ್ಟೆಯೊಳಕ್ಕೆ ಒಂದು ಮುಷ್ಟಿ ಉದ್ದಿನ ಬೇಳೆ ಅಥವಾ ಹೆಸರುಬೇಳೆಯನ್ನು ಭಿಕ್ಷುಕರಿಗೆ ದಾನ ಮಾಡಿ. ನಿಮಗೆ ಯಾರೂ ಭಿಕ್ಷುಕರು ಸಿಗದಿದ್ದಲ್ಲಿ ಇದನ್ನು ನೀರಿನಲ್ಲಿ ತೇಲಿಬಿಡಬಹುದು. ಇದನ್ನು 72 ಬುಧವಾರಗಳವರೆಗೆ ಮಾಡುವುದು ಬಹಳ ಪ್ರಯೋಜನಕಾರಿಯಾಗಿದೆ. </li><li> ರಾಹು ದಶೆ ಅಥವಾ ಅಂತರ್ದಶೆಯ ಸಮಯದಲ್ಲಿ ದಿನವೂ ಮಹಾ ಮೃತ್ಯುಂಜಯ ಮಂತ್ರದ 11 ಸರಪಳಿಗಳನ್ನು ಪಠಿಸಿ. ಶನಿದೇವರಿಗೆ ಅಭಿಷೇಕ ಮಾಡಿ ಮತ್ತು ಮಂಗಳವಾರದಂದು ಹನುಮಂತನಿಗೆ ಬಟ್ಟೆ ನೀಡಿ. </ li>
	 SHANKPAAL_KALSARPA_YOGA_REMEDY = <li> ನಿಮ್ಮ ಮುಖ್ಯ ಗೇಟ್ ನಲ್ಲಿ ಬೆಳ್ಳಿಯ ಸ್ವಸ್ತಿಕವನ್ನು ಲಗತ್ತಿಸಿ. ಸ್ವಸ್ತಿಕದ ಎರಡು ಕಡೆ ಲೋಹದ ನಾಗವನ್ನು ಅಂಟಿಸಿ. </li><li>. ಶನಿವಾರಗಳಲ್ಲಿ ಶನಿದೇವರಿಗೆ ಸಾಸಿವೆ ಎಣ್ಣೆಯ ಅಭಿಷೇಕವನ್ನು ಅರ್ಪಿಸಿ. </li><li> ದಿನವೂ ಹನುಮಾನ್ ಚಾಲೀಸಾ ಪಠಿಸಿ ಮತ್ತು ಕೇವಲ ಭೋಜನಾಲಯದಲ್ಲಿ (ಊಟದ ಕೊಠಡಿ) ಮಾತ್ರ ನಿಮ್ಮ ದಿನದ ಊಟವನ್ನು ಮಾಡಿ. ಹನುಮಾನ್ ಚಾಲೀಸಾವನ್ನು 108 ಬಾರಿ ಪಠಿಸಿ ಮತ್ತು ಐದು ಮಂಗಳವಾರ ಉಪವಾಸ ಮಾಡಿ ಹಾಗೂ ಹನುಮಂತನಿಗೆ ಚಮೇಲಿ ತೈಲ, ಕುಂಕುಮ ಮತ್ತು ಬುಂದಿ-ಲಾಡುವಿನ ಮಿಶ್ರಣಗಳನ್ನು ಅರ್ಪಿಸಿ.</li><li> ಸಾಸಿವೆ ಎಣ್ಣೆಯಿರುವ ಒಂದು ಸಣ್ಣ ಬಟ್ಟಲಿನಲ್ಲಿ ನಿಮ್ಮ ಮುಖವನ್ನು ನೋಡಿಕೊಳ್ಳುತ್ತ, ನಿಮ್ಮ ತಲೆಯ ಮೇಲೆ ಒಂದು ನಾಣ್ಯವನ್ನು ಸುಮಾರು 3 ಬಾರಿ ತಿರುಗಿಸಿ ಹಾಗೂ ಅದನ್ನು ಒಬ್ಬ ಬಡ ಮನುಷ್ಯನಿಗೆ ದಾನ ಮಾಡಿ ಅಥವಾ ಪೀಪಲ್ ಮರದ ಬೇರಿಗೆ ಹಾಕಿ. </li><li> ಒಂದು ಮಂಗಳಕರ ಸಮಯದಲ್ಲಿ ಸರ್ವತೋಭಧ್ರಮಂಡಲ ಯಂತ್ರವನ್ನು ಪೂಜಿಸಿ ಹಾಗೂ ಪೂಜಿಸಿದ ನಂತರ ಅದನ್ನು ಧರಿಸಿ'. </li><li> ಒಂದು ಮಂಗಳಕರ ಸಮಯದಲ್ಲಿ ಒಂದು ಕಣ್ಣಿನ ತೆಂಗಿನ ಕಾಯಿಯನ್ನು ಏಳು ಬಾರಿ ನಿಮ್ಮ ಮೇಲ್ಭಾಗದಲ್ಲಿ ತಿರುಗಿಸಿ ಮತ್ತು ಏಳು ಬುಧವಾರಗಳ ತನಕ ಅದನ್ನು ಗಂಗಾ ಅಥವಾ ಜಮುನಾ ನದಿಯಲ್ಲಿ ತೇಲಿಬಿಡಿ. </li><li> 37 ದಿನಗಳವರೆಗೆ ಪಕ್ಷಿಗಳಿಗೆ ಜಾವ್ ದಾನಾ ಹಾಕಿ. </li>
	 PADAM_KALSARPA_YOGA_REMEDY = <li> ದಿನವೂ 11 ಬಾರಿ ಹನುಮಾನ್ ಚಾಲೀಸಾ ಪಠಿಸಿ. </ li> <li> ಪ್ರತಿ ಶನಿವಾರವೂ ನಿಮ್ಮ ಮುಂದೆ 8 ಮುಷ್ಟಿ ಒದ್ದೆ ಕಡಲೆಬೇಳೆ ಮತ್ತು 11 ಬಾಳೆಹಣ್ಣುಗಳನ್ನು ಇರಿಸಿಕೊಳ್ಳಿ  ಮತ್ತು ಹನುಮಾನ್ ಚಾಲೀಸಾವನ್ನು 108 ಬಾರಿ ಪಠಿಸಿ ಮತ್ತು ನಂತರ ಬಾಳೆಹಣ್ಣುಗಳನ್ನು ಕೋತಿಗಳಿಗೆ ನೀಡಿ. </ li> <li> ಹನುಮಂತನಿಗೆ ಬುಂದಿ ಲಾಡು ಚಮೇಲಿ (ಮಲ್ಲಿಗೆ) ತೈಲದಲ್ಲಿ ಕರಗಿಸಿದ ಕುಂಕುಮವನ್ನು ಅರ್ಪಿಸಿ ಅಲ್ಲದೇ ಶನಿದೇವರಿಗೆ ತೈಲದ ಜೊತೆಗಿನ ಅಭಿಷೇಕ ನೀಡಿ.</ li><li>  ನಿಮ್ಮ ಮುಖ್ಯ ಗೇಟ್ ನಲ್ಲಿ ಬೆಳ್ಳಿಯ ಸ್ವಸ್ತಿಕವನ್ನು ಲಗತ್ತಿಸಿ. ಸ್ವಸ್ತಿಕದ ಎರಡು ಕಡೆ ಲೋಹದ ನಾಗವನ್ನು ಅಂಟಿಸಿ.</ li><li>  ಶ್ರಾವಣ ತಿಂಗಳಲ್ಲಿ  ಸ್ನಾನದ ನಂತರ 'ಓಂ ನಮಃ ಶಿವಾಯ’ ಎನ್ನುವ ಪಂಚಾಕ್ಷರಿ ಮಂತ್ರವನ್ನು ಜಪಿಸಿ ಹಾಗೂ ಶಿವನಿಗೆ ಬಿಲ್ವ ಪತ್ರೆ, ಹಸುವಿನ ಹಾಲು ಮತ್ತು ಗಂಗಾಜಲವನ್ನು ಅರ್ಪಿಸಿ.</ li><li>  ಶುಕ್ಲಪಕ್ಷದ ಮೊದಲ ಶನಿವಾರದಿಂದ ಪ್ರಾರಂಭಿಸಿ 18ನೇ ಶನಿವಾರದವರೆಗೆ ಉಪವಾಸ ಮಾಡಿ ಹಾಗೂ ಕಪ್ಪು ಬಟ್ಟೆ ಧರಿಸಿ, ರಾಹುವಿನ ಬೀಜ ಮಂತ್ರದ 3 ಸರಪಳಿಗಳು ಅಥವಾ 18 ಸರಪಳಿಗಳನ್ನು ಪಠಿಸಿ. ನಂತರ ಒಂದು ಬಟ್ಟಲಿನಲ್ಲಿ ಜಲ್ ದೂರ್ವೆ ಮತ್ತು ಕುಶವನ್ನು ತೆಗೆದುಕೊಂಡು ಪೀಪಲ್ ಮರದ ಬೇರಿಗೆ ಅದನ್ನು ಅರ್ಪಿಸಿ. ನಿಮ್ಮ ಉಪವಾಸದ ಸಮಯದಲ್ಲಿ ಸಿಹಿಯಾದ ಆಹಾರ ತಿನ್ನಿ ಮತ್ತು ಅದನ್ನೇ ದಾನ ಮಾಡಿ. ತುಪ್ಪದ ದೀಪ ಹಚ್ಚಿ ಮತ್ತು ಅದನ್ನು ಪೀಪಲ್ ಮರದ ಬೇರಿನಲ್ಲಿಡಿ. </ li> <li> ನಾಗ ಪಂಚಮಿಯಲ್ಲೂ ಉಪವಾಸ ಮಾಡಿ. </ li>
