
YANTRA_SUGGESTION_REPORT =যন্ত্র প্রস্তাবনা রিপোর্ট আপনাকে উপযুক্ত যন্ত্র সম্পর্কে ধরপনা লাভ করতে সাহায্য করবে যা আপনার বাড়িতে রাখা দরকার। বাড়িতে এই যন্ত্র রাখলে তা খুবই শুভ বলে মানা হয় কারণ এর ফলে আপনার জীবনে সর্বপ্রকার সুখ ও সমৃদ্ধি বৃদ্ধি পাবে।
YANTRA_AND_ITS_IMPORTANCE = <a href="https://buy.astrosage.com/yantra"> যন্ত্র </a> মূলত একটি জিনিস যা প্রতিফলন, একাগ্রতা এবং ধ্যানের জন্য ব্যবহৃত হয়। এটি শক্তির একটি মহান ভান্ডার। যন্ত্র একটি সংস্কৃত শব্দ যা <a href="https://www.astrosage.com/meditation/"> ধ্যান </a> করার জন্য ব্যবহৃত হয়। এটি "যম" শব্দ থেকে উদ্ভূত হয়েছে, যার অর্থ " সমর্থন করা "। বৈদিক যন্ত্র মূলত মৌলিক শক্তির প্রতিনিধিত্ব করে পরিকল্পিত জ্যামিতিকভাবে নকশা করা বস্তু যা মৌলিক শক্তির প্রতিনিধিত্ব করে । এই পবিত্র প্রতীকগুলি পরিবেশের সাথে সাথে মানুষের শক্তি বৃদ্ধি এবং বিবর্তনের প্রতীক হিসাবে ব্যবহৃত হয়। এটা আমাদের খারাপ শক্তি থেকে রক্ষা করে এবং আমাদের জীবনে ভাগ্য, স্বাস্থ্য, শিক্ষা, ভালবাসা, সম্পর্ক এবং সম্পদ নিয়ে আসে। এতে সরল রেখা, একটি বর্গক্ষেত্র, একটি ক্রস বা একটি ত্রিভুজ ইত্যাদি জ্যামিতিক চিহ্ণ রয়েছে। প্রতিটি চিহ্নের  হিন্দুধর্মের নিজস্ব গুরুত্ব রয়েছে অথবা সংক্ষেপে, আমরা বলতে পারি যে যন্ত্রে এক বা অন্য শক্তি বা শক্তির প্রতিনিধিত্ব করা হয়। যন্ত্রগুলি বিভিন্ন মন্ত্রের গ্রাফিক্যাল উপস্থাপনা। বিভিন্ন বস্তুর ওপর তা আঁকা বা খোদাই করা হয়। <a href="https://www.astrosage.com/vastu/"> বাস্তু শাস্ত্র </a> ভারতীয় প্রাচীন বিজ্ঞানগুলির সাথে মিলিত ভাবে মহাজাগতিক বস্তুর ব্যবহার সম্পর্কে জনগণকে পরামর্শ দেয়, যা সাধারণভাবে যন্ত্র নামে  পরিচিত। যন্ত্রে স্বর্ণ, রূপা, তামা, স্ফটিক, বার্চ, হাড়, লুকোনো কোনো বস্তু (কোন ধরনের কাগজ অন্তর্ভুক্ত করা যায়) এবং বিষ্ণু পাথর হিসাবে প্রায়শই আটটি স্তর অন্তর্ভুক্ত করা হয়। হিন্দুধর্মের বৈদিক যন্ত্রের নিজস্ব গুরুত্ব রয়েছে। এটি বিভিন্ন প্রকারের অশুভ প্রভাব কাটানোর জন্য এবং তার প্রকোপকে কাটিয়ে শুভ ফল প্রাপ্তির জন্য যেমন সন্তান লাভ, ব্যাঙ্ক এ আর্থিক উন্নতির জন্য, রাগ বা মেজাজের ওপর নিয়ন্ত্রণ আনার জন্য বা কাজে উন্নতি করার জন্য এইসকল যন্ত্রের প্রয়োগ করা হয়। এটি একটি ধর্মীয় চিত্র যা ভারতীয় ধর্মে খুবই পবিত্র বলে গণ্য করা হয়। এটি "মণ্ডল" এর একটি প্রকার যা মহাবিশ্বের প্রতিনিধিত্বকারী আধ্যাত্মিক অগ্রগতির প্রতীক। মন্ত্র পাঠের মাধ্যমে আমাদের দেহ ও মনের ভারসাম্য বজায় থাকে, তেমনি যন্ত্রেও দৃশ্যমানভাবে ভারসাম্য প্রদান করে। এই যন্ত্র কোনো না কোনো দেবতা সম্পর্কিত এবং একে তালিসমান হিসাবেও পরা যেতে পারে। বাড়িতে যন্ত্র স্থাপন করলে তা আপনার ভালো স্বাস্থ্যের ও সমৃদ্ধির অনুকূলে কাজ করবে।

RECOMMENDATIONS=সবাই যন্ত্র স্থাপন করতে পারবেন না। প্রতিটি যন্ত্রের নিজস্ব উদ্দেশ্য রয়েছে, যেমন আমরা ইতিমধ্যেই বর্ণনা করেছি যে প্রতিটি যন্ত্র কোনো না কোনো দেবতার সাথে যুক্ত। সেই ক্ষেত্রে, আপনি যদি কোন দেবতার আরো বেশি অনুগ্রহ পেতে চান, কেবল সেই  দেবতার জন্য প্রস্তুত করা  যন্ত্রটি ইনস্টল করুন। মানুষের প্রয়োজন পরিস্থিতি অনুযায়ী পরিবর্তন হতে পারে। উদাহরণস্বরূপ, আপনি যদি আপনার সম্পদ বৃদ্ধি করতে চান তবে আপনাকে কুবের যন্ত্র ইনস্টল করার পরামর্শ দেওয়া হয়। আধ্যাত্মিকতার পরিপ্রেক্ষিতে, এটি আপনাকে ইতিবাচক শক্তির সাথে যুক্ত করে বা পরিবেশের ইতিবাচক শক্তিকে আকর্ষণ করে যার ফলে নিজের জীবনে সুখ ও সমৃদ্ধি সৃষ্টি হয়। শক্তির ইতিবাচক প্রবাহ নিজের দিকে আকৃষ্ট করার জন্য এই যন্ত্র গুলি উপযুক্ত মন্ত্রের সাহায্যে বাড়িতে ইনস্টল করা উচিত। আপনার জন্ম তালিকা অনুসারে আমরা আপনার জন্য উপযুক্ত যন্ত্রগুলি নীচে বর্ণনা করেছি। 


IMPORTANCE_OF_NATURAL_YANTRA=একটি সক্রিয় <a href="https://astrology.astrosage.com/2013/11/yantra-occult-key-of-success-door.html"> যন্ত্র </a> আজকের বাজারে পাওয়া খুবই দুস্কর। সাধারণত, একটি যন্ত্র কারখানাগুলিতে প্লাস্টিকের ফাইবার ব্যবহার করে তৈরি করা হয়। একটি সক্রিয় যন্ত্র হচ্ছে উপযুক্ত যন্ত্রপাতি দ্বারা সক্রিয় সিদ্ধ যন্ত্র এবং সেই কারণে তা খুবই সীমিত সংখ্যায় পাওয়া যেতে পারে। একটি নিষ্ক্রিয় যন্ত্র সক্রিয় যন্ত্রের অনুরূপ অনুরূপ চেহারার  হতে পারে, কিন্তু এটি জ্যোতিষিকভাবে কোন সুফল দেবে না। এই সমস্যার সমাধান করার জন্য, আমরা 100% সক্রিয় যন্ত্র আপনাদের জন্য নিয়ে এসেছি। আপনি এটি ইনস্টল করার পর সমস্ত জ্যোতির্বিদ্যাগত সুবিধা পাবেন। আমাদের যন্ত্রে বিশেষ মন্ত্র অন্তর্ভূক্ত করা হয়েছে এবং সেগুলি সম্পূর্ণ জেনুইন বলে পরিচিত।



SUN_YANTRA = <a href="https://www.astrosage.com/astrology/vedic-astrology-horoscopes.asp"> বৈদিক জ্যোতিষ</a>অনুসারে সবথেকে শক্তিশালী গ্রহ <a href="https://www.astrosage.com/planet/sun/"> সূর্য </a> আমরা সবাই জানি যে এটি কোনও গ্রহ নয়, জ্যোতির্বিজ্ঞান অনুসারে এটি একটি নক্ষত্র। তবে, এটি জ্যোতিষশাস্ত্র অনুসারে গ্রহ এবং অন্যান্য গ্রহের নেতা হিসাবে বিবেচিত হয়। <a href="https://buy.astrosage.com/navagrah-yantra/surya-yantra"> সূর্য যন্ত্র </a> হিন্দুধর্মের দেবতা সূর্যকে প্রতিনিধিত্ব করে। আপনার জন্ম তালিকায় যদি সূর্যের অবস্থান ভালো হয়, তা জীবনের বিভিন্ন গুরুত্ব পূর্ণ দিক যেমন ক্যারিয়ার বৃদ্ধি, মানসিক শক্তি এবং সাফল্যের মতো ভাল সুযোগ দেয়। এই যন্ত্রের বিকিরণ আপনাকে নেতৃত্বের গুণমান, বুদ্ধিমত্তা এবং কর্তৃত্ব প্রদান করবে। আপনি যদি আপনার কর্মক্ষেত্রে বিভিন্ন কষ্টের মধ্য দিয়ে যাচ্ছেন তবে তা কাটিয়ে ওঠার জন্য ও নিজের জীবনে ইতিবাচক প্রভাব বৃদ্ধির জন্য আপনাকে এই যন্ত্রটি ইনস্টল করতে হবে। অতএব আপনি মানসিক চাপ বোধ করবেন না এবং কর্মক্ষেত্রে কোনো বিপদের সম্মুখীন হবেন না। এটা আপনার আস্থা এবং আত্ম সম্মান বৃদ্ধি করতে সাহায্য করবে। এটি আপনার বাইরের এবং অভ্যন্তরীণ দৃষ্টিভঙ্গি উভয়কেই  উন্নত করবে। এটি আপনাকে সঠিক সময়ে সঠিক সিদ্ধান্ত নিতে সক্ষম করে। এটি আপনাকে আপনার শত্রুদের জয় করতে সক্ষম করবে।  এটি আপনাকে কর্মক্ষেত্রে প্রচার পেতে আপনার ব্যক্তিত্ব বিকাশ ঘটাতে সক্ষম করবে। এটি আপনাকে আপনার বাধাগুলি দূর করতে এবং আর্থিক স্থায়িত্ব লাভ করতে সহায়তা করবে। যারা সরকারি চাকরি পেতে ইচ্ছুক তাদের জন্য এটি  খুবই ভাগ্যশালী বলে বিবেচিত হবে এবং তারা সহজেই সরকারি চাকরির পরীক্ষায় উত্তীর্ণ হতে পারবেন।

MOON_YANTRA =এই যন্ত্রটি বৈদিক জ্যোতিষশাস্ত্রের গ্রহ "চাঁদ" কে বর্ণনা করে। এটি জ্যোতিষশাস্ত্রের সবচেয়ে গুরুত্বপূর্ণ গ্রহ কারণ এটি একজন ব্যক্তির মনকে  প্রতিনিধিত্ব করে। কখনও কখনও, আপনার পতন আপনার মনের অস্থিরতার কারণে ঘটে, এর মানে আপনি মানসিকভাবে সুস্থ নন। এটি মূলত আপনার মানসিক এবং অনুভাবিক শক্তি অর্জন করতে সাহায্য করে।  আপনার জন্ম চার্টে চাঁদের দুর্বল অবস্থানটি জলজ বস্তু (শারীরিক তরল), বিষণ্নতা, চাপ ইত্যাদি সম্পর্কিত সমস্যাগুলির সৃষ্টি করে। আপনি যদি মানসিকভাবে সুস্থ না হন তবে আপনার সর্বক্ষেত্রেই অসাফল্য লাভ করতে হতে পারে। । আপনি বিভিন্ন বস্তুর ওপর আপনার আস্থা এবং সাহস হারাবেন। এই যন্ত্রটি ইনস্টল করলে এটি আপনাকে চরিত্রে ইতিবাচক দিক গুলিকে জাগরিত করার জন্য সাহায্য করবে এবং এ কারণে মানসিক শান্তি বজায় থাকবে।  এটি আপনাকে চাঁদের খারাপ অবস্থানের কারণে নেতিবাচক প্রভাবগুলি অতিক্রম করতে সক্ষম করবে। জন্মের চার্টে যদি চাঁদের অবস্থান শুভ হয়, তবে এটি চাঁদের শক্তি বৃদ্ধি করবে, যার ফলে জীবনে এর সুপ্রভাব বৃদ্ধি পাবে। এটি অর্থ সংক্রান্ত বিষয়গুলির স্থিতিশীলতা বৃদ্ধি করবে এবং পারিবারিক জীবনকে নিরাপদ ও শান্তিপূর্ণ করে তুলবে, যা পরিশেষে জীবনে সন্তুষ্টি এবং মনের শান্তি লাভের পথ কে প্রশস্ত করবে।

VENUS_YANTRA =শুক্র জ্যোতির্বিদ্যা অনুসারে একটি স্ত্রী গ্রহ এবং এই যন্ত্রটি শুক্রর জন্য তৈরি। এটি খুব শক্তিশালী জ্যামিতিক প্যাটার্ন যা আপনার জীবনধারাকে পুনরুজ্জীবিত করে। এটি আপনাকে সমস্ত বিলাসবহুল সামগ্রী এবং সুবিধা প্রদান করার ক্ষমতা রাখে। এটা প্রেম, সম্পর্ক এবং সৌন্দর্য কে নির্দেশ করে। যদি আপনি এই যন্ত্রকে শক্তি দেন, তবে এটি সমস্ত জাগতিক সুখ ও আকাঙ্ক্ষার মাধ্যমে আপনাকে আশীর্বাদ করবে। যদি শুক্রগ্রহ আপনার কুষ্ঠিতে খারাপভাবে অবস্থান করে, তবে এই যন্ত্রটি আপনাকে সাহায্য করতে পারে। এটি শুক্র গ্রহের শক্তি বৃদ্ধি করবে, ইতিবাচক শক্তি ছড়িয়ে দেবে, যা আপনার জীবনের বড় কিছু অর্জন এবং সাফল্যের জন্য আপনার প্রচেষ্টাকে সঙ্গতি দেবে। শিল্প, সঙ্গীত, সিনেমা, নাট্য ইত্যাদি সম্পর্কিত মানুষের শুক্র গ্রহের আশীর্বাদ লাভ করা প্রয়োজন। তারা এই যন্ত্র ইনস্টল করলে বিশেষ ভাবে উপকৃত হবে। এটি জীবনের অন্যান্য দিকগুলিতেও আর্থিক উত্তোলন এবং সুরক্ষা প্রদান করতে পারে। এটি  দম্পতিদের মধ্যে সম্পর্ক উন্নতি করতে সাহায্য করবে, অর্থাৎ বলা যেতে পারে যে এর ফলে বৈবাহিক সম্পর্ক মজবুত হবে। এটি আর্থিক স্থায়িত্ব বাড়ায় এবং আপনাকে ঋণ থেকে মুক্ত করতে সহায়তা করে।এটি সমৃদ্ধি, আরাম, বিলাসিতা এবং সমস্ত জাগতিক আনন্দ বহন করে নিয়ে আসে এবং এর ফলে সুখ অর্জনের রাস্তা প্রসস্থ হয়। আপনার ব্যবসার অংশীদারদের সাথে কারবার করার সময় আপনি সদর্থক ভূমিকা পালন করতে পারবেন। এটি আপনাকে চোখের, পেট, ত্বক ইত্যাদি সম্পর্কিত রোগ থেকে রক্ষা করবে। এটি আপনার ক্যারিশমাকে বাড়িয়ে দেবে বা ব্যক্তিত্ব আকর্ষণীয় করে তুলবে, ফলে সমাজে আপনার জনপ্রিয়তা বৃদ্ধি পাবে।

MERCURY_YANTRA = জ্যোতির্বিদ্যাগতভাবে, <a href="https://www.astrosage.com/planet/Mercury/"> বুধ </a> একটি প্রভাবশালী গ্রহ। এটি আমাদের বুদ্ধিমত্তা, যোগাযোগ ক্ষমতা, বক্তৃতা, সাধারণ জ্ঞান, মানুষিক অবস্থা ইত্যাদি বোঝায়।স্বভাবতই আমরা বলতে পারি যে এটি একটি "দূত" হিসাবে কাজ করে। যদি কুষ্ঠিতে এর অবস্থান ভাল হয় তবে এটি দৃঢ় চিন্তাভাবনা, যৌক্তিক এবং চতুর মনের সাথে একজন ব্যক্তিকে আশীর্বাদ করবে, অপরদিকে বুধের অবস্থান শুভ না হলে আপনি বিভিন্ন সমস্যা যেমন খারাপ সিদ্ধান্ত গ্রহণ করা, ব্যবসায়ের ক্ষতি এবং হাত, কান, স্নায়ুতন্ত্র এবং ফুসফুস সম্পর্কিত রোগের স্বীকার হতে পারেন। এটি ইলেকট্রনিক্স, কম্পিউটারে সাফল্যের অর্জনের জন্য ভাল এবং এটি আয়নার মধ্যে হাস্যরসের সঞ্চার করে। এই যন্ত্রের শাসক গ্রহ বুধবার। এই যন্ত্রটি ইনস্টল করলে, এটি আপনার শারীরিক শক্তি, স্নায়ুতন্ত্র এবং ইন্দ্রিয়গুলির নিয়ন্ত্রণ করতে পারে। এটি আপনাকে ব্যবসায় উন্নতিএবং আপনার পরিবারের সম্পদ এবং আর্থিক উন্নয়নে সহায়তা করবে। কোনো ইভেন্ট, অনুষ্ঠান এবং ব্যবসা সংগঠিত করার জন্য এটি আপনাকে আরও সক্রিয় এবং অনলস হতে সহায়তা করবে। এটি আপনার সৃজনশীল ক্ষমতা বৃদ্ধি এবং আপনার কর্মক্ষমতাকে ভালো ভাবে প্রভাবিত করবে। এটি আপনার অনুধাবন ক্ষমতা বৃদ্ধি করবে এবং আপনি ব্যবসায় সঠিক সিদ্ধান্ত গ্রহণ করতে পারবেন।

MARS_YANTRA =মঙ্গল গ্রহটি একজন ব্যক্তির মধ্যে অন্তর্নিহিত শক্তির প্রতিনিধিত্ব করে। এটি আপনাকে কোন কাজ করতে সাহস, ধৈর্য, ​​ক্ষমতা এবং দৃঢ়তা প্রদান করে। এই যন্ত্র মঙ্গল গ্রহের প্রতিনিধিত্ব করে। এই মঙ্গল  যন্ত্র হলো মূলত এমন একটি শক্তিশালী যন্ত্র যা আপনার ভিতরের শক্তি কে পুনর্প্রতিষ্ঠা করে আপনার জীবনে প্রগতি আনে। এই যন্ত্রটি <a href="https://astrology.astrosage.com/2013/09/all-about-navagrahas.html"> নবগ্রহের </a> মধ্যে সবচেয়ে শক্তিশালী যন্ত্র।  মঙ্গলের মারাত্মক প্রভাব কমাতে এই যন্ত্রটি ব্যবহার করা হয়। মঙ্গলেরঅবস্থান কুষ্ঠিতে শুভ হলে তার সুপ্রভাব বৃদ্ধির জন্য জাতক কে এটি পরিধান করার সুপারিশ করা হয় যাতে সর্বোচ্চ ফলাফল পাওয়া যায়। মঙ্গল যন্ত্র স্থাপন করা হলে তা আপনার জন্য বিভিন্ন দিক থেকে ভালো বার্তা বহন করে নিয়ে আসবে। আমরা যদি মঙ্গলিক দশা "বা" কুজা দশা সম্পর্কে কথা বলি তবে এই যন্ত্রটির আরও বেশি গুরুত্ব আছে। এই দশা সরাসরি একজন ব্যক্তির বিয়ে এবং বিবাহিত জীবন সম্পর্কিত বিষয় গুলিকে ভালো ভাবে প্রভাবিত করতে পারে। বিবাহের সময়ে <a href="https://www.astrosage.com/free/mangal-dosha-report.asp"> মঙ্গলিক দশা </a> সম্পর্কিত বেশিরভাগ লোকের কাছে গুরুতর উদ্বেগ রয়েছে। মঙ্গল এবং বিবাহিত জীবনে মঙ্গলের খারাপ প্রভাবগুলি হ্রাস করার জন্য এই যন্ত্রটি তাদের জন্য সবচেয়ে ভাল সরঞ্জাম হতে পারে। মঙ্গলের যন্ত্র স্থাপনের মাধ্যমে, এটি আপনাকে আপনার ঋণ থেকে বেরিয়ে আসতে, আপনার দক্ষতা, একাগ্রতা এবং ইচ্ছাশক্তি উন্নত করতে, সহজে রেগে যাওয়া থেকে মুক্তি পেতে সহায়তা করে। এটি সাহস, জীবনে ঝুঁকি বৃদ্ধি, শক্তির সঞ্চার ইত্যাদি বিষয়ে আপনাকে সাহায্য করবে।

JUPITER_YANTRA = বৈদিক জ্যোতিষশাস্ত্রে "বৃহস্পতি যন্ত্র", <a href="https://buy.astrosage.com/navagrah-yantra/guru-yantra"> গুরুযন্ত্র </a> নামে পরিচিত, জাতকের কুষ্ঠিতে বৃহস্পতির অবস্থান অশুভ হলে এটি বৃহস্পতির নেতিবাচক প্রভাব কমাতে ব্যবহৃত হয়। কুষ্ঠিতে বৃহস্পতির অবস্থান শুভ হলেও তার সুপ্রভাব বৃদ্ধির জন্য এটিকে ব্যবহার করা হয়। আমরা বলতে পারি যে কোনও গ্রহের শক্তিগুলির ব্যালান্স করার জন্য যন্ত্রগুলি ব্যবহার করা যেতে পারে। এটি জ্ঞান অর্জনের জন্য আপনার ক্ষুদা বৃদ্ধি এবং আপনার সব প্রচেষ্টায সফলতা প্রদান করবে। যারা তাদের জাগতিক প্রাপ্তি, সুযোগ সুবিধা ও আরাম কে বজায় রেখে নিজেদেরকে আধ্যাত্মিকতার দিকে চালাতে চায় তাদের জন্য এটি সুপারিশ করা হয়। বৃহস্পতি এমন একটি গ্রহ যা একটি ব্যক্তির উভয় জীবনেই মধ্যে ভারসাম্য বজায় রাখে। এটি আপনাকে সামাজিক স্থিতিশীলতা এবং আর্থিক স্থিতিশীলতা প্রদান করবে যা সমৃদ্ধশালী জীবনযাপন করার জন্য খুবই আবশ্যক। এই যন্ত্রটি গৃহে স্থাপন করলে, এটি ধর্মীয় কাজের প্রতি আপনার আগ্রহ বৃদ্ধি করতে সহায়তা করবে। এটা আপনাকে আপনার জ্ঞানের বান্দ্রার কে বৃদ্ধি করতে সাহায্য করে। এটি আপনাকে আপনার নিজ কর্মস্থলে ও কর্মে সাফল্য অর্জনে সহায়তা করবে। যদি বৃহস্পতি আপনার <a href="https://www.astrosage.com/horoscope/"> জন্মপত্রিকা </a> তে ভাল স্থানে অবস্থান না করে, তবেও আপনি এই  যন্ত্রের স্থাপন দ্বারা উপকৃত হবেন। এটি আপনাকে খ্যাতি অর্জনের জন্য আপনার জ্ঞানকে ওপরের সাথে ভগবাহী করে নেয়ার দিকে ধাবিত করবে।
SATURN_YANTRA = শনি যন্ত্র শনির খারাপ প্রভাব কমানোর জন্য ব্যবহার করা হয়। শনি যদি আপনার জন্মপত্রিকাতে খারাপ ভাবে বিরাজ করে, তার খারাপ প্রভাব গুলি কাটানোর জন্য এই যন্ত্র ব্যবহার করা হয় এবং শনির সুফল পেতে শনির প্রভাবগুলিকে শক্তিশালী করে তোলে। শনির <a href="https://www.astrosage.com/free/sade-sati-report.asp"> সাড়ে সাতি </a> সম্পর্কিত ভয় যাদের আছে, তাদের এই যন্ত্রটি  সাড়ে সাতি এবং "ধৈর্য" সম্পর্কিত বিষয় গুলি থেকে মুক্তি দিতে পারে। অতএব, এটি আপনার জীবনের খারাপ পর্যায়কে  সুখে রূপান্তর করতে পারে। শনি একটি ধীর গতিতে চলমান গ্রহ, কিন্তু এটি অবশ্যই আপনাকে প্রাপ্ত সুখের দিকে আস্তে আস্তে ঠেলে দেবে, মূলত সেই সকল ক্ষত্রে যেখানে আপনি স্বাচ্ছন্দ বোধ করছেন না। এই যন্ত্রটি ইনস্টল করে, এটি আপনার কর্মজীবনের পরিপ্রেক্ষিতে উচ্চতর অবস্থান অর্জন করে, আপনার ব্যবসা এবং বাণিজ্যের উন্নতি হইব। এটি যারা পরীক্ষায় ভাল নম্বর অর্জন করতে চান তাদের বিশেষ ভাবে সাহায্য করে। এটি ভ্রমণ করার সময় আপনাকে রক্ষা করবে, বিষণ্ণতা হীন এবং চাপ মুক্ত জীবনের দিকে আপনাকে এগিয়ে দেবে। যাদের জন্ম তালিকায় শনির অশুভ প্রভাব রয়েছে তাদের জন্য এই যন্ত্র খুবই প্রয়োজনীয়।

RAHU_YANTRA =নবগ্রহ যন্ত্র গুলির মধ্যে এটি অত্যন্ত বহুল প্রচলিত একটি যন্ত্র।   এর স্বামী হলো রাহু, যা একটি ক্ষতিকারক গ্রহ হিসেবে পরিচিতি।   রাহু এমন একটি গ্রহ যা খারাপ বা মিশ্রিত ফলাফল দেয়।  এটির খারাপ চরিত্রের জন্য এটি কখনোই সম্পূর্ণ ভালো প্রভাব দেবে না।  এই কারণেই এই যন্ত্রটির বহুল প্রচলন রয়েছে।   রাহু আপনার কুষ্ঠিতে খারাপ ভাবে অবস্থান  করলে, আপনাকে তার খারাপ প্রভাব ভোগ করতে হবে।  এই অবস্থায় যদি আপনি আপনার ভাগ্যের খারাপ পরিণতি থেকে মুক্তি পেতে চান, তাহলে অবশ্যোই আপনার এই যন্ত্র গ্রহণ  করা উচিত। রাহু আপনার কুষ্ঠিতে ভালো  ভাবে অবস্থান  করলে আপনি তার মিশ্র ফলাফল পাবেন।   এমত অবস্থায়  আপনাকে এই যন্ত্র গ্রহণ করার সুপারিশ করা হয়, সেক্ষত্রে আপনার কুষ্ঠিতে এর অবস্থান আরো দৃঢ় হবে এবং আপনি তার সুফল পেতে শুরু করবেন।  এই যন্ত্র স্থাপন করে পানি আপনার জীবনে কোনো খারাপ পরিণতি থেকে রক্ষা পাবেন। এটি আপনাকে রোগমুক্ত ও শান্তি পূর্ণ জীবনের অধিকারী করে তুলবে।  এটি আপনাকে আপনার নেশা করার অভ্যাস থেকে বিরত করবে এবং লুকোনো শত্রুদের থেকে আপনাকে বাঁচাবে। যদি আপনার জন্ম পট্রিতে রাহু সবথেকে অশুভ বলে গণ্য হয়, তবে পানার এই যন্ত্র গ্রহণ করা অতি আবশ্যক।

KETU_YANTRA =রাহু যন্ত্রের ন্যায় এই যন্ত্রটিও বহুল প্রচলিত একটি যন্ত্র যা অঙ্ক স্পোঙ্খক মানুষের দ্বারা ঘ্রাণ যোগ্য হয়েছে।  এই যন্ত্রটি কেতুর কুপ্রভাব কাটানোর জন্য ব্যবহার করা হয়, যা একটাই ছায়া গ্রহ অর্থাৎ যার বাস্তবে কোনো অস্তিত্ব নেই।  এটি একটি অত্যন্ত শুভ ও কার্যকর তালিসমান, যা কেতুর খারাপ প্রভাব কাটানোর জন্য ব্যবহার করা হয়।  কেতু আপনার কুষ্ঠিতে অশুভ ভাবে অবস্থান করলে তার খারাপ প্রভাব কাটানোর জন্য এই যন্ত্র ব্যবহার করা খুবই আবশ্যক।  রাহুর ন্যায় এটিও সম্পূর্ণ ভালো প্রভাব দেখাবে না এবং এই কারণে যন্ত্রের প্রয়োগ খুবই আবশ্যক। এটি খুবই আধ্যাতিক প্রকৃতির গ্রহ যা মোক্ষ লাভের জন্য খুবই প্রয়োজনীয়।  আপনার অসুস্থতার কালে ও দরকারের সময়ে এই যন্ত্রের প্রভাবে আপনি খুবই ভালো ফল পাবেন।  এটি আপনাকে আপনার শত্রুদের থেকে রাখা করবে।  আপনি একটি শান্তিপূর্ণ জীবন লাভ করবেন। যন্ত্রের ব্যবহারের মাধ্যমে কেতুর খারাপ প্রভাব গুলি অপসারিত হবে।  আপনি এই যন্ত্রের প্রভাবে মোক্ষ প্রাপ্তির পথে এগিয়ে যাবেন। এটি আপনাকে ভালো স্বাস্থ, সম্পদ ও সমৃদ্ধি প্রদান করবে।



HOW_TO_INSTALL_SUN_YANTRA =<ul><li> সূর্য যন্ত্র সূর্য গ্রহকে নির্দেশ করে। এই যন্ত্র স্থাপন করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li> মহাদেব বা ভগবান বিষ্ণুকে লাল বা সাদা ফুল অর্পণ করুন ও সুগন্ধি ধুপ দান করুন।  </li><li> সূর্যের মন্ত্র ওম হ্রাম হ্রীম হ্রাউম সাঃ সূর্যায়ে নামঃ ( Oṃ Hrāṃ Hrīṃ Hrauṃ Saḥ Sūryāya Namaḥ) এই মন্ত্রটি ১০৮ বার জপ করুন।  </li><li> এই অনুষ্ঠানগুলি সম্পাদনের পরে, এটি রবিবার সকালে অথবা ক্রিটিকা, উত্তরা ফাল্গুনী এবং উত্তরাশাডা নক্ষত্রকালেও পরিধান করা যেতে পারে।</li></ul></b>
HOW_TO_INSTALL_MOON_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/chandra-yantra"> চন্দ্র যন্ত্র </a> চন্দ্র গ্রহকে নির্দেশ করে।  এই যন্ত্র ধারণ করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li> শিব-পার্বতীর চরণে সাদা  ফুল অর্পণ করুন, চাল ও সুগন্ধি ধুপ দান করুন। </li><li> যন্ত্রটিকে জাগরিত করার জন্য  চন্দ্রের মন্ত্র ওম শ্রাম শ্রীম শ্রাউম সাঃ চন্দ্রামাসে নমঃ (Oṃ Śrāṃ Śrīṃ Śrauṃ Saḥ Candramase Namaḥ) ১০৮ বার জপ করুন।  </li><li> এই অনুষ্ঠানগুলি সম্পাদনের পরে, এটি সোমবার বা পূর্ণ চন্দ্র দিবসে বা <a href="https://www.astrosage.com/planet/moon/nakshtra/hasta-nakshatra-moon-in-hasta.asp">হস্তা </a>, রোহিণী ও শ্রাবন নক্ষত্রের কালেও পড়া যেতে পারে।
HOW_TO_INSTALL_VENUS_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/shukra-yantra"> শুক্র যন্ত্র </a>  শুক্র গ্রহকে নির্দেশ করে।  এই যন্ত্র ধারণ করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li> ভগবান লক্ষীর চরণে সাদা ফুল অর্পণ করুন ও সুগন্ধি ধুপ দিন।  </li><li> শুক্রের মন্ত্র ওম দ্রাম ড্রিম ড্রাউম সাঃ শুক্রয়ে নমঃ (Oṃ Drāṃ Drīṃ Drauṃ Saḥ Śukrāya Namaḥ) ১০৮ বার জপ  করুন,  এর ফলে আপনার শুক্র যন্ত্রটি জাগরিত হবে। </li></ul> এই অনুষ্ঠানগুলি সম্পাদন করার পর, শুক্রবারে বা ভরাণী, <a href="https://www.astrosage.com/nakshatra/purva-phalguni-nakshatra-characteristics.asp">পূর্ব ফাল্গুনী </a> এবং পূর্বসাদা নক্ষত্রের কালে এটি পরতে পারেন।
HOW_TO_INSTALL_MERCURY_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/budh-yantra"> বুধ যন্ত্র </a> বুধ গ্রহকে নির্দেশ করে।  এই যন্ত্র ধারণ করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li> ভগবান বিষ্ণুর চরণে হলুদ ফুল অর্পণ করুন ও সুগন্ধি ধুপ দিন। </li><li> বুধের মন্ত্র ওম ব্রাম ব্রিম ব্রাউম সাঃ বুধায়ে নমঃ (Oṃ Brāṃ Brīṃ Brauṃ Saḥ Budhāya Namaḥ) ১০৮ বার জপ করুন এর ফলে আপনার বুধ যন্ত্রটি জাগরিত হবে। </li><li> এই অনুষ্ঠানগুলি সম্পাদন করার পরে বুধবার বা আশ্লেষা, জ্যেশথা এবং রেবতী নক্ষত্রের কালে এটি পরতে পারেন। </li></ul>
HOW_TO_INSTALL_MARS_YANTRA =<ul><li><a href="https://www.astrosage.com/planet/mars/mars-mantra-mars-puja-mars-remedy.asp">মঙ্গল যন্ত্র</a> মঙ্গল গ্রহকে নির্দেশ করে।  এই যন্ত্র ধারণ করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li> হনুমান জিকে লাল ফুল অর্পণ করুন ও সুগন্ধি ধুপ দান করুন।</li><li> মঙ্গলের মন্ত্র ওম ক্রাম ক্রিম ক্রাউম সাঃ ব্রম্হায়ে নমঃ (Oṃ Krāṃ Krīṃ Krauṃ Saḥ Bhaumāya Namaḥ) ১০৮ বার জপ করুন,  এর ফলে আপনার মঙ্গল যন্ত্রটি জাগরিত হবে। </li></ul> এই অনুষ্ঠানগুলি সম্পাদন করার পর, এটি মঙ্গলবার অথবা মৃগাশীর, <a href="https://www.astrosage.com/planet/moon/nakshtra/chitra-nakshatra-moon-in-chitra.asp"> চিত্রা </a> এবং ধানিষ্টা নক্ষত্রের কালেও পরিধান করা যেতে পারে।
HOW_TO_INSTALL_JUPITER_YANTRA =<ul><li> বৃহস্পতি যন্ত্র বৃহস্পতি গ্রহকে নির্দেশ করে।  এই যন্ত্র ধারণ করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li> ভগবান বিষ্ণুর চরণে হলুদ ফুল অর্পণ করুন ও সুগন্ধি ধুপ দিন। </li><li>  বৃহস্পতির মন্ত্র ওম গ্রাম গ্রিম গ্রাউম সাঃ গুড়াবে নমঃ ( Oṃ Grāṃ Grīṃ Grauṃ Saḥ Gurave Namaḥ)  ১০৮ বার জপ করুন, এর ফলে আপনার বৃহস্পতি যন্ত্রটি জাগরিত হবে। </li><li> এই অনুষ্ঠানগুলি সম্পাদন করার পর, এটি বৃহস্পতিবার বা পুনর্ভাসু, বিশাখা এবং পূর্বভাদ্রাপাদ নক্ষত্রের কালে এটি পরতে পারেন। </ li> </ ul>
HOW_TO_INSTALL_SATURN_YANTRA =<ul><li> শনি যন্ত্র শনি গ্রহকে নির্দেশ করে।  এই যন্ত্র ধারণ করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li>  ভগবান ভৈরবের চরণে কালো তিলের বীজ অর্পণ করুন ও সুগন্ধি ধুপ দিন।  </li><li> শনির মন্ত্র ওম প্রাম প্রিম প্রাউম সাঃ সানাইস্কারায় নমঃ ( Oṃ Prāṃ Prīṃ Prauṃ Saḥ Śanaiścarāya Namaḥ) ১০৮ বার জপ করুন, এর ফলে আপনার শনি যন্ত্রটি জাগরিত হবে। </ li> <li> এই অনুষ্ঠানগুলি সম্পাদন করার পরে, সূর্যাস্তের পরে কোনো শনিবার বা পুষ্য , অনুরাধা ও উত্তরা ভদ্রপাড় নক্ষত্রের কালে এটি পরতে পারেন। </ li> </ ul>
HOW_TO_INSTALL_RAHU_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/rahu-yantra">রাহু যন্ত্র </a> রাহু গ্রহকে নির্দেশ করে।  এই যন্ত্র ধারণ করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li> মা দূর্গা কে লাল চন্দন অর্পণ করুন ও সুগন্ধি ধুপ দিন।  </li><li> রাহুর মন্ত্র ওম ভ্রাম ভ্রিম ভ্রাউম সাঃ রাহবে নমঃ (Oṃ Bhrāṃ Bhrīṃ Bhrauṃ Saḥ Rāhave Namaḥ) ১০৮ বার জপ করুন, এর ফলে আপনার রাহু যন্ত্রটি জাগরিত হবে।</ li> <li> এই অনুষ্ঠানগুলি সম্পাদন করার পর, এটি শনিবার বা স্বাতী, সাতভিশা এবং অর্ধ নক্ষত্র কালেও পরিধান করা যেতে পারে।  । </ li> </ ul>
HOW_TO_INSTALL_KETU_YANTRA =<ul><li> কেতু যন্ত্র কেতু গ্রহকে নির্দেশ করে।  এই যন্ত্র ধারণ করার পূর্বে তার ওপর কাঁচা দুধ বা গঙ্গা জল ছেটাতে হবে। </li><li>  শ্রী গণেশ কে দূর্বা অর্পণ করুন ও সুগন্ধি ধুপ দিন।  </li><li>  কেতুর মন্ত্র ওম শ্রাম শ্রীম শ্রাউম শাহ কেতাবে নমো (Oṃ Srāṃ Srīṃ Srauṃ Saḥ Ketave Namaḥ) ১০৮ বার জপ করুন এর ফলে আপনার কেতু যন্ত্রটি জাগরিত হবে। </ li> <li> এই অনুষ্ঠানগুলি সম্পাদনের পরে, বুধবার বা শনিবারে বা <a href="https://www.astrosage.com/planet/moon/nakshtra/ashwini-nakshatra-moon-in-ashwini.asp"> অশ্বিনী </a>, মাঘ এবং মুল নক্ষত্র কালেও পরিধান করা যেতে পারে।
