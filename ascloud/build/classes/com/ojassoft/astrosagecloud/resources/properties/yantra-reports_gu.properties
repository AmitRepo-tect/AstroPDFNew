HOW_TO_INSTALL_MARS_YANTRA =<ul><li><a href="https://www.astrosage.com/planet/mars/mars-mantra-mars-puja-mars-remedy.asp">મંગલ યંત્ર</a> મંગલ ગ્રહ નો પ્રતિનિધિત્વ કરે છે. સ્થાપિત કરતા પહેલા આના ઉપર વગર ઉકાળેલા દૂધ અથવા ગંગા જળ દ્વારા છિડ઼કાવ કરવો પડશે. </li><li>ભગવાન હનુમાન ને લાલ ફૂલ અને સુગંધિત અગરબત્તીઓ અર્પિત કરો.</li><li>યંત્ર ને સક્રિય કરવા માટે મંગલ (મંગલ) માટે ના મંત્ર – Oṃ Krāṃ Krīṃ Krauṃ Saḥ Bhaumāya Namaḥ – નો ૧૦૮ વાર જાપ કરો. </li></ul>આ અનુષ્ઠાનો પૂર્ણ કર્યા પછી તમે આને મંગળવારે અથવા મૃગશિરા, <a href="https://www.astrosage.com/planet/moon/nakshtra/chitra-nakshatra-moon-in-chitra.asp">ચિત્રા</a> અને ધનિષ્ટા નક્ષત્ર દરમિયાન ધારણ કરી શકો છો.
HOW_TO_INSTALL_JUPITER_YANTRA =<ul><li>બ્રહસ્પતિ યંત્ર ગુરુ ગ્રહ નો પ્રતિનિધિત્વ કરે છે. સ્થાપિત કરતા પહેલા આના ઉપર વગર ઉકાળેલા દૂધ અથવા ગંગા જળ દ્વારા છિડ઼કાવ કરવો પડશે. </li><li>ભગવાન વિષ્ણુ ને પીળા ફૂલ અને સુગંધિત અગરબત્તીઓ અર્પિત કરો.</li><li>યંત્ર ને સક્રિય કરવા માટે બ્રહસ્પતિ (ગુરુ) માટે ના <a href="https://www.astrosage.com/planet/jupiter/guru-mantra-guru-puja-guru-remedy.asp">મંત્ર</a> – Oṃ Grāṃ Grīṃ Grauṃ Saḥ Gurave Namaḥ – નો ૧૦૮ વાર જાપ કરો. </li><li>આ અનુષ્ઠાનો પૂર્ણ કર્યા પછી તમે આને ગુરુવારે અથવા પુનર્વસુ, વિશાખા અને પૂર્વાભાદ્રપદ નક્ષત્ર દરમિયાન સ્થાપિત કરી શકો છો.</li></ul>
HOW_TO_INSTALL_SATURN_YANTRA =<ul><li>શનિ યંત્ર શનિ ગ્રહ નો પ્રતિનિધિત્વ કરે છે. સ્થાપિત કરતા પહેલા આના ઉપર વગર ઉકાળેલા દૂધ અથવા ગંગા જળ દ્વારા છિડ઼કાવ કરવો પડશે. </li><li>ભગવાન ભૈરવ ને કાળા તળ અને સુગંધિત અગરબત્તીઓ અર્પિત કરો. </li><li>યંત્ર ને સક્રિય કરવા માટે શનિ દેવ (શનિ) માટે ના <a href="https://www.astrosage.com/planet/saturn/shani-mantra-shani-puja-shani-remedy.asp">મંત્ર</a> – Oṃ Prāṃ Prīṃ Prauṃ Saḥ Śanaiścarāya Namaḥ – નો ૧૦૮  વાર જાપ કરો. </li><li>આ અનુષ્ઠાનો પૂર્ણ કર્યા પછી તને આને શનિવારે સૂર્યાસ્ત પછી અથવા પુષ્ય, અનુરાધા અને ઉત્તરા ભાદ્રપદ નક્ષત્ર દરમિયાન સ્થાપિત કરી શકો છો.</li></ul>
HOW_TO_INSTALL_RAHU_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/rahu-yantra">રાહુ યંત્ર</a> રાહુ ગ્રહ નો પ્રતિનિધિત્વ કરે છે. સ્થાપિત કરતા પહેલા આના ઉપર વગર ઉકાળેલા દૂધ અથવા ગંગા જળ દ્વારા છિડ઼કાવ કરવો પડશે. </li><li>દેવી દુર્ગા ને લાલ ચંદન અને સુગંધિત અગરબત્તીઓ અર્પિત કરો.</li><li>યંત્ર ને સક્રિય કરવા રાહુ (ઉત્તરી ગાંઠ) માટે ના મંત્ર – Oṃ Bhrāṃ Bhrīṃ Bhrauṃ Saḥ Rāhave Namaḥ – નો ૧૦૮ વાર જાપ કરો. </li><li>આ અનુષ્ઠાનો પૂર્ણ કર્યા પછી તમે આને શનિવારે અથવા સ્વાતિ, શતભિષા અને આર્દ્ર નક્ષત્ર દરમિયાન સ્થાપિત કરી શકો છો.</li></ul>
HOW_TO_INSTALL_KETU_YANTRA =<ul><li>કેતુ યંત્ર કેતુ ગ્રહ નો પ્રતિનિધિત્વ કરે છે. સ્થાપિત કરતા પહેલા આના ઉપર વગર ઉકાળેલા દૂધ અથવા ગંગા જળ દ્વારા છિડ઼કાવ કરવો પડશે. </li><li>ભગવાન ગણેશ ને દુર્વા ને સુગંધિત અગરબત્તીઓ અર્પિત કરો.</li><li>યંત્ર ને સક્રિય કરવા માટે કેતુ (દક્ષિણી ગાંઠ) ના મંત્ર – Oṃ Srāṃ Srīṃ Srauṃ Saḥ Ketave Namaḥ – નો ૧૦૮ વાર જાપ કરો. </li></ul>આ અનુષ્ઠાનો પૂર્ણ કર્યા પછી તમે આને બુધવારે અથવા શનિવારે અથવા <a href="https://www.astrosage.com/planet/moon/nakshtra/ashwini-nakshatra-moon-in-ashwini.asp">અશ્વિની</a>, માઘ and મૂળ નક્ષત્ર દરમિયાન સ્થાપિત કરી શકશો.
