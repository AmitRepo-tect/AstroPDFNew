LALKITAB_REMEDIES_RULES                = লাল কিতাবের প্রতিকারের সাথে সম্পর্কযুক্ত নিয়মাবলী
LALKITAB_REMEDIES_RULES1               = সমস্ত প্রতিকার দিনের আলোয় সঞ্চালিত করতে হবে অর্থাৎ সূর্যোদয়ের পর থেকে সূর্যাস্তের আগে পর্যন্ত এইসব প্রতিকার করতে হবে। যতক্ষণ না বিশেষ রুপে আপনাকে অন্য সময় প্রতিকার করতে বলা হচ্ছে না আপনাকে দিনের বেলাতেই প্রতিকার করতে হবে। কেউ কেউ বলেন মেঘলা দিনে লালকিতাব প্রতিকার করা উচিত নয়। কেননা মেঘলা দিনে অন্ধকার থাকে, আর অন্ধকার তথা রাতের স্বামী শনিকে মানা হয়। কিন্তু সেই সব দেশ বা জায়গা যেখানে বর্ষা বা শীতের সময় প্রায়ই দিনে অন্ধকার থাকে সেখানে এই ধরনের কোন সীমাবদ্ধতা থাকে না।
LALKITAB_REMEDIES_RULES2               = লম্বা সময়ের প্রতিকার অর্থাৎ ৬ দিন, ১০ দিন, ৪৩ দিন ইত্যাদি প্রতিকার বিরতি ছাড়া নিয়মিত সম্পন্ন করা উচিৎ। যদি কোনো কারণে প্রতিকার মধ্যে বিরতি পড়ে যাওয়ার সম্ভাবনা থাকে তো যেইদিন প্রতিকার বন্ধ করতে চান তার একদিন আগে অল্প চাল দুধ দিয়ে ধুয়ে সাদা কাপড়ে বেঁধে নিজের কাছে রাখুন, আর যখন প্রতিকার শুরু করবেন তখন ওই চাল ধর্মস্থানে বা বহমান জলে বা কোন ফাঁকা স্থানে ফেলে দিয়ে প্রতিকার শুরু করতে পারেন। ধরুন আপনি ৪৩ দিনের কোন প্রতিকার করছেন আর তার মাঝে আপনাকে কোন যাত্রা করতে হল তো উপরোক্ত বিধি দ্বারা প্রতিকার খণ্ডিত হওয়া থেকে বাঁচাতে পারেন।
LALKITAB_REMEDIES_RULES3               = একটি সময়ে একটি প্রতিকার করুন। পরবর্তী প্রতিকার নিন শুধুমাত্র তখন যখন প্রথম প্রতিকার সম্পূর্ণ হয়ে গেছে। যদি উল্লিখিত থাকে প্রতিকার ক্রম অনুসরণ করুন। যদি ইতিমধ্যেই উল্লিখিত না থাকে তবুও প্রতিকার ক্রম অনুসারেই করুন, প্রথমে কম দিনের প্রতিকার করুন এবং পরে লম্বা দিনের প্রতিকার করুন।
LALKITAB_REMEDIES_RULES4               = পরবর্তী প্রতিকার শুরু করার আগে কয়েক দিন বিরতি দিন। যদি সম্ভব হয়, একটি সপ্তাহ পরে এটা শুরু করুন। লালকিতাব প্রতিকার আপনার কোন রক্ত সম্পর্কের কোন আত্মীয়ও করতে পারেন, তবে প্রতিকার শুরু হবার পূর্বে আত্মীয়কে মানসিক সঙ্কল্প নিতে হবে যে উনি যা প্রতিকার করছেন "অমুক" ব্যাক্তির জন্য করছেন এবং এই প্রতিকারের ফল "অমুক" ব্যাক্তিই যেন পায়। এরকম না করলে ওই প্রতিকারের ফল যে ব্যাক্তি উপায় করছেন তিনি পাবেন যা অবাঞ্ছিত হবে।

