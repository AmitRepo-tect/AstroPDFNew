NAME_COMAPTIBILITY_USING_NUMEROLOGY_P1            = প্রেমে পড়া কোনো মানুষের ক্ষেত্রে সবচেয়ে সৌভাগ্যশীলতা। অনেকে প্রেমকে সহজ ভাষায় প্রকাশিত করতে চায় তবে পারে না। আপনি সবসময় প্রেমকে নিজস্ব উপলব্ধি দিয়ে দেখেন,যেটা আপনাকে খুশির শীর্ষে নিয়ে যায়। আমরা সকলেই প্রেমকে অন্যভাবে ব্যক্ত করে থাকি। আপনি কি কারো প্রেমে পাগল এবং তার সাথেই সারাজীবন অতিবাহিত করতে চান? তাহলে, আপনি প্রকৃতপক্ষেই সৌভাগ্যবান। কোনো প্রেমের সম্পর্কে সবথেকে বড় উপাদান যেটা সম্পর্কটাকে সারাজীবন জীবিত রাখে তা হলো 'সামঞ্জস্য'।  এখানে, এস্ট্রস্যাজ আপনাকে সাহায্য করবে আপনার নাম কি সুপারিশ করে শুধুমাত্র একটা ক্লিক এ। আপনাকে বেশি চিন্তা করার দরকার নেই বা আপনি অন্য প্রযুক্তি প্রয়োগ করতে পারেন আপনার সামঞ্জস্য জানার জন্য।  অঙ্কজ্যোতিষের নাম সামঞ্জস্যে, আপনি শুধু নিজের নাম দেবেন আর আপনার সামঞ্জস্য সাথে সাথে আপনার সামনে চলে আসবে। সামঞ্জস্য গণনা বিনা দ্বিধায় সঠিক এবং তাই এটি আপনাদের দুজনের মধ্যে সামঞ্জস্য নেওয়ার ক্ষেত্রে কোনো নির্ণয় নিতে আপনাকে সক্ষম করবে।  এটাই আপনার প্রেমের সম্পর্কে অনিশ্চয়তা দূর করার সঠিক সময় এবং নিশ্চিত ভাবে আগে যাবার সময়।
