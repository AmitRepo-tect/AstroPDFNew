COGNIASTRO_REPORT_TEN_GRADE = আপনার বাচ্ছাদের ভবিষ্যত নিয়ে চিন্তা থেকে মুক্তু হয়ে যান আর কগনিস্ট্রো রিপোর্ট (10 ম শ্রেণি পর্যন্ত) থেকে জানুন কোন বিষয় আর কোন কোর্স আপনার বাচ্চার জন্য সঠিক।
COGNIASTRO_REPORT_TWELVE_GRADE = পান ক্যারিয়ারের সাথে জড়িত জটিল প্রশ্ন, যেমন কোন কলেজে পড়বেন, কোন কোর্স এবং চাকরি করবেন তার সহজ উত্তর।
COGNIASTRO_REPORT_PROFESSIONAL = কগনিস্ট্রোর (পেশাদার) সাথে পান আপনার ক্যারিয়ারের সাথে জড়িত সমস্ত সমস্যার উত্তর, আর নিজের ব্যাক্তিত্বের অনুসারে পছন্দ করুন সব ক্ষেত্র আর চাকরি।
