
	MATCH_ME											= কুষ্ঠি মেলান
	ENTER_GIRLS_BIRTH_DETAILS							= মেয়ের জন্ম বিবরণ দিন
	ENTER_BOYS_BIRTH_DETAILS							= ছেলের জন্ম বিবরণ দিন
	MATCH_WITH_PUBLIC_CHART							= শেয়ার করা কুষ্ঠির সাথে মেলান
	ENTER_GIRLS_DETAILS								= মেয়ের বিবরণ দিন
	ENTER_BOYS_DETAILS									= ছেলের বিবরণ দিন
	ENTER_GIRLS_CHART_NAME								= মেয়ের তালিকা নাম দিন
	ENTER_BOYS_CHART_NAME								= ছেলের তালিকা নাম দিন
    UNKNOWN_ERROR_OCCURRED								= অপরিচিত ত্রুটি ঘটেছে।
	THERE_IS_NO_SAVED_CHART							= এখানে কোন কুষ্ঠি সংরক্ষিত নেই।
	YOU_ARE_NOT_LOGIN_OR_YOUR_SESSION_HAS_BEEN_EXPIRED = আপনি লগ ইন হন নি অথবা আপনার অধিবেশনের মেয়াদ শেষ।
	PLS_ENTER_CHART_NAME								= দয়া করে কুষ্ঠির নাম লিখুন।
	CHART_NAME_DOES_NOT_EXIST							= কুষ্ঠির নামের অস্তিত্ব নেই।
	DO_NOT_FIND_CHART_NAME								= কুষ্ঠির নাম খুঁজে পাওয়া যাচ্ছে না।
	SOME_ERR_OCCRR_IN_PROCESSING_YOUR_QRY_PLS_AGAIN	= অজ্ঞাত ত্রুটি। দয়া করে পুনরায় চেষ্টা করুন।
	SESSION_TIME_OUT_MSG								= আপনার সময়কাল অতিক্রান্ত হয়েছে। দয়া করে পুনরায় লগ ইন করুন।
	CLICK_RADIO_MATCH_DETAILS = আপনি যাঁর সাথে কুষ্ঠি-মিলান করতে চান তাঁর সামনে দেওয়া রেডিও বাটনে ক্লিক করুন।<br/><br/>
	MATCH_HOROSCOPE_SHARED_CHART = আপনি এখানে সকলের সাথে শেয়ার করা কুষ্ঠির সাথে কুষ্ঠি-মিলান করতে পারেন। আপনার সাথীর কুষ্ঠির নাম নিচের টেক্সট বাক্সতে লিখুন। অনুগ্রহ করে ধ্যান রাখবেন এই সুবিধাটি ব্যবহার করার জন্য আপনার সাথীর কুষ্ঠিটি সকলের সাথে শেয়ার(পাবলিক) প্রয়োজনীয়।<br><br>উদাহরণস্বরূপ - যদি কোনো ব্যাক্তি নিজের কুষ্ঠি-মিলান ক্যাটরিনা কাইফের সকলের সাথে শেয়ার করা কুষ্ঠির সাথে করতে চান, তো নীচে ""<b>ক্যাটরিনা</b>"" লিখুন।<br/><br/>
	
