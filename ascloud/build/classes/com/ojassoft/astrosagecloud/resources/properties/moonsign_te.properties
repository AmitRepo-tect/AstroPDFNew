	MOON_SIGN_INTRO	= వేద జ్యోతిషశాస్త్రము, జాతకాల కొరకు, సూర్యరాశులకుంటే జన్మరాశులకే ఎక్కువ ప్రాముఖ్యతను ఇస్తుంది. వాస్తవంగా, చంద్రుడు, లగ్నం కంటే బలంగా ఉన్న సందర్భంలో, లగ్నం లేదా ఉదయిస్తున్న సూర్యుని స్థానంలో పుట్టుక ఛార్ట్ యొక్క కేంద్రంగా జన్మరాశినే పరిగణించాలని వేద జ్యోతిషశాస్త్రం ప్రకటించింది. జన్మరాశి జాతకాలు, సూర్యరాశి ద్వారా కూడా తెలియని వ్యక్తిత్వ రహస్యాలను తెలుపుతాయి. 
