

     ZODIAC_SIGN                            = મેષ#વૃષભ#મિથુન#કર્ક#સિંહ#કન્યા#તુલા#વૃશ્ચિક#ધનુ#મકર#કુંભ#મીન
     HEALTH_PREDICTION                      = મેષ લગ્ન ધરાવતા લોકો મોટે ભાગે માથાના દુખાવા સંબંધિત બીમારીઓ ખાસ કરીને માઇગ્રેઇન, લૂ લાગવી, માથામાં ચસકા ઉપડવા, હતાશા વગેરેથી પીડાતા હોય છે. તેમને અપચા અને નર્વસ ડિસઓર્ડર જેવી વ્યાધિઓ પણ આવી શકે છે. વળી, તેમના અવિચારી સ્વભાવ તેમજ ભૌતિક લાલસાને કારણે અકસ્માત, શારીરિક ઈજા અને ક્યારેક પાઈલ્સ જેવા ગરમીના પ્રકોપનો પણ સામનો કરવો પડે છે. ઘણી મેષ વ્યક્તિઓ માથા કે ચહેરા પર કોઈક નિશાની સાથે જન્મે છે. મેષ રાશિમાં જન્મેલી વ્યક્તિઓને ઉચ્ચ રક્તચાપ, વગેરે જેવી રૂધિરાભિસરણ તંત્રને લગતી બીમારી થવાની શક્યતા વધારે છે.#વૃષભ મૂળભૂત રીતે મજબૂત, આરોગ્યપ્રદ રાશિ હોવા છતાં, તેનાં પણ કેટલાંક નબળાં પાસાં છે, જે આજીવન સમસ્યા ઊભી કરે છે. તેઓ મોટે ભાગે જ્ઞાનતંતુ સંબંધિત તકલીફનો સામનો કરતાં હોય છે. તેમાંના ઘણા, ખાસ કરીને મે મહિનામાં જન્મેલા લોકોનું વજન વધારે હોવાની શક્યતા છે. તેમને જાતીય રોગ પણ થઈ શકે છે. તેમને ગરદનના હાડકાં, નીચલા જડબા અને દાંત, હડપચી અને તાળવાને લગતી સમસ્યા થઈ શકે છે. વૃષભ રાશિની વ્યક્તિઓમાં કીડની, જનનાંગ તેમજ મૂત્રાશયને લગતી સમસ્યા, અકળાયેલી ગરદન, ગાળામાં સોજો, કાનમાં દુખાવો વગેરે સામાન્ય છે.#આ રાશિના સ્વભાવમાં હતાશા, નિરાશાવાદ, નીરસપણું, અને ક્યારેક અધીરાઈ પણ વણાયેલા હોય છે. ક્ષયરોગ, અસ્થમા અને પાંડુરોગ સામાન્ય સમસ્યાઓ છે. તેમને જ્ઞાનતંતુ અને શ્વસનતંત્ર તેમજ ખાસ કરીને શ્રવણેન્દ્રિયને લગતી સમસ્યા જલ્દી લાગુ પડી શકે છે. શ્વસનની સમસ્યા તેમજ વિવિધ જ્ઞાનતંતુની સમસ્યા સામાન્ય છે.#કર્ક લગ્ન ધરાવતી વ્યક્તિઓને કફ, અપચો, ગેસ અને પેટ, યકૃત તેમજ આંતરડાને લગતી સામાન્ય સમસ્યાઓ થવાની શક્યતા રહે છે. તેઓ વ્યક્તિ તરીકે અતિશય લાગણીશીલ હોય છે. તેમણે ઘણી વખત હતાશા, માનસિક વિષાદ અને ચિત્તભ્રમ જેવી બીમારીઓનો સામનો કરવો પડે છે. વધુ પડતા લાગણીશીલ હોવાને કારણે તેમને અપચો, જઠરમાં સોજો, અને પેટની સમસ્યાઓ આવી શકે છે. ઉપરાંત, તેમને ઉધરસ અને નબળી દૃષ્ટિનો પણ સામનો કરવો પડે છે.#સિંહ રાશિના જાતકો મોટે ભાગે હૃદયની બીમારીથી પીડાતા હોય છે, જેમાં હૃદયની ધમનીઓમાં લોહીના ગંઠાઈ જવાની કે તેને કારણે હાર્ટ એટેક આવવા જેવી ગંભીર સમસ્યા સર્જાઈ શકે છે. જ્ઞાનતંતુના તણાવને કારણે ધબકારા વધી જવા જેવી બીમારી થઈ શકે છે. સિંહ રાશિ સાથે સંબંધિત બીમારીઓમાં કમર અને ફેફસાંમાં દુખાવો, કરોડરજ્જુ અંગેની સમસ્યા, હૃદય અને લોહીના રોગ, પાંસળી અને પડખાંમાં દુખાવો, આંચકી, બળતરા સાથેના તાવ તેમજ થોડી ઘણી આંખની સમસ્યાનો સમાવેશ થાય છે.#કન્યા રાશિના જાતક સામાન્ય રીતે આંતરડાને લગતી તેમજ કબજીયાતની સમસ્યાથી પીડાતા હોય છે. તેમના બદલાતા રહેતા મનોભાવ કે વિષાદને કારણે આસપાસના લોકોને નકારાત્મક અસર પહોંચી શકે છે. કન્યા લગ્નના લોકોમાં જાતીય અંગોને લગતી તકલીફ જોવા મળે છે. પેટની સંભાળ લેવા માટે તેમણે ખોરાક બાબતે જાગૃત રહેવું જરૂરી બને છે. ભાતભાતના ભોજન લેવાની પોતાની લાલસા પર તેમણે નિયંત્રણ રાખવું જરૂરી છે.#મોટા ભાગના તુલા જાતકોની ચામડી સંવેદનશીલ હોય છે, જે અનિદ્રા, તામસી ખોરાક કે વધુ પડતા મદ્યપાનને કારણે વધુ સંવેદનશીલ થઈ શકે છે. કીડની અને ત્વચા, કટિપ્રદેશ, નિતંબ, મુત્રપિંડ તેમજ  વેસોમોટર સિસ્ટમ દ્વારા તુલા ઉત્સર્જનતંત્ર પર શાસન કરે છે. તુલા કીડની, કમરનો નીચેનો ભાગ તેમજ અંડાશય પર શાસન કરે છે. કમરના નીચેના ભાગમાં દુખાવો તેમજ વધારે પડતી ખાંડ કે તામસી ખોરાક લેવાથી થતી સમસ્યાઓ આ જાતકોમાં સામાન્યપણે જોવા મળે છે.#વૃશ્ચિક પ્રજનન અંગો તેમજ ઉત્સર્જન તંત્રનો સ્વામી છે. વૃશ્ચિક નાક અને નાકના હાડકાં, ઉદરની નીચેના વિસ્તાર, પ્રજનન અંગો તેમજ હેમોગ્લોબિનનો સ્વામી છે. વૃશ્ચિક યોનિમાર્ગ અને પ્રજોત્પત્તિ તંત્ર તેમજ મૂત્રાશય તંત્રનું સંચાલન કરે છે અને આથી, આ જાતકોને યકૃત, કીડની, મૂત્રપિંડ કે પ્રજનન અંગમાં પથરીની બીમારી થવાની શક્યતા રહે છે. વૃશ્ચિક લગ્નના જાતકોમાં પાઈલ્સ કે અલ્સરની બીમારી થવાની શક્યતા રહે છે.#ધન રાશિના જાતકોને નિતંબ અને જાંઘ સંબંધિત બીમારી થવાની શક્યતા રહે છે. કમરનો દુખાવો આ રાશિ સાથે ઘણા લાંબા સમયથી જોડાયેલો છે. તાવ જેવું લાગવાની ફરિયાદો તેમજ ફેફસાંની બીમારી પણ નોધવામાં આવી છે. તામસી ખોરાક અને મદ્યપાનને કારણે ક્યારેક નિતંબમાં સંધિવાનો રોગ લાગુ પડી શકે છે.#મકર રાશિના જાતકોને વાયુથી ઉત્પન્ન થતા રોગ થાય છે. મકર રાશિના જાતકોને ખુબ જલ્દી કોઈ રોગ લાગુ પડતો નથી, પરંતુ એક વખત બીમાર થતાં, બીમારીના લક્ષણ લાંબા સમય સુધી રહે છે અને ક્યારેક રોગ કરતા રોગનો ભ્રમ તેમને સતત સતાવ્યા કરે છે. મકર સાંધા, વાળ, દાંત, ત્વચા તેમજ ચેતાતંત્રનો સ્વામી છે. આ રાશિના જાતકોને હાડકાં તૂટવા, મચકોડ, ડિસલોકેશન તેમજ ઘૂંટણ અને કોણીની ઈજાઓ થઈ શકે છે.#કુંભ રુધિરાભિસરણ, શ્વસન અને દૃષ્ટિ તેમજ નીચલા અવયવોનો સ્વામી છે. આ રાશિના જાતકો મોટે ભાગે લોહી અને રુધિરાભિસરણ તંત્રને સંબંધિત બીમારીથી પીડાય છે, લોહીના વિકારની સમસ્યા પણ જોવા મળે છે. તેમને ઉચ્ચ રક્તચાપ અને હૃદયની બીમારી પણ થાય છે. કુંભ ઘૂંટીઓ, રુધિરાભિસરણ તંત્ર, સ્નાયુમાં ખેંચાણ, એલર્જી, અણધારી બીમારી, વિચિત્ર અકસ્માતનો સ્વામી છે. આ રાશિના જાતકોને જ્ઞાનતંતુની બીમારી થવાની પણ શક્યતા રહે છે.#મીન રાશિના જાતકોને અંતઃસ્ત્રાવી તંત્ર સંબંધિત સમસ્યા રહે છે તેમજ મધુપ્રમેહને કારણે પગની અને અન્ય ગંભીર સમસ્યા થવાની સંભાવના રહે છે. સોજા, દવાના એલર્જિક રિએક્શન, પગમાં ઈજા અને તેને સંબંધિત તકલીફો આ જાતકોમાં સામાન્ય રીતે જોવા મળે છે. મીન રાશિના જાતકોનો લાગણીશીલ સ્વભાવ તેમને ભાવનાત્મક બીમારીઓના પણ ભોગ બનાવી શકે છે.
     TEMPERAMENT_AND_PERSONALITY_PREDICTION = મેષ લગ્નના જાતકોમાં પ્રચંડ શક્તિ અને ઊર્જા હોય છે. વળી પહેલ કરવામાં તેઓ હંમેશા આગળ હોય છે. તેમના વ્યક્તિત્વનું સહુથી મહત્ત્વનું લક્ષણ તેમની સરળતા છે. તેમનામાં આગેવાનીના ગુણ કુદરતી રીતે જ રોપાયેલા હોય છે; તેમને કોઈ પાસેથી હુકમ મેળવી તેમ વર્તવું ગમતું નથી, કારણકે તેઓ પોતાની મરજીના માલિક છે. અણધાર્યું વર્તન કરવાના તેમના સ્વભાવને કારણે અન્યોને તેઓ આકર્ષી શકે છે; આ લક્ષણને કારણે તેઓ ક્યારેક અતિશય આક્રામક તેમ છતાં નબળું અને મિજાજી વર્તન પણ કરી બેસે છે. જોકે તેમને સમજાવી પણ જલ્દી શકાય છે અને ખુશ પણ જલ્દી કરી શકાય છે. મેષ લગ્નના જાતકો સ્પષ્ટ વાત કરવાવાળા હોય છે. વાત કરવામાં બિલકુલ વ્યવહાર કુશળ ન હોવાને કારણે તેમજ અતિશય સ્પષ્ટવકતા હોવાને કારણે તેઓ ઘણી વાર ઉગ્ર ચર્ચા કે વાદ-વિવાદમાં ઊતરી પડે છે. તેઓ જીદ્દી હોય છે અને તેમની અચાનક ગુસ્સે થઈ જવાની આદતને કારણે લોકોને આશ્ચર્ય થાય છે. જોકે સમજાવટથી તેમને શાંત પણ જલ્દી કરી શકાય છે. તેમનો આવેગ ક્યારેક તેમને ગંભીર મુશ્કેલીમાં મૂકી દે છે. પાણીથી તેમની ખસ લગાવ નથી તેમજ કળા અને લાવણ્યના તેઓ પ્રશંસક છે.  આ પ્રકારના મોટા ભાગના લોકોને આરામ કરવો પસંદ છે, જોકે ફક્ત નિશ્ચિત ધ્યેય પર પહોંચ્યા બાદ જ. આ રાશિ હેઠળ જન્મેલા જાતકો સમજુ, સહુને પ્રિય લાગે તેવા અને લાગણીશીલ હોય છે.#આ રાશિ હેઠળ જન્મેલા જાતકો અજાણી વ્યક્તિઓ પરત્વેના તેમના વર્તનમાં આખલા સમાન હોય છે. તેમને નવા લોકોને મળવું ખાસ ગમતું નથી, કારણકે તેમનો શાંત અને અંતર્મુખી સ્વભાવ તેમને મળતાવડા બનતા અટકાવે છે. જો તેમને કાળજીપૂર્વક સંભાળવામાં કે સાંભળવામાં ન આવે તો તેઓ અન્યો પરત્વે અણગમા, સાવચેતી તેમજ સંકુચિતતાનો અભિગમ કેળવી લે તેમ બની શકે છે. નવા લોકોને મળવામાં થતા ખચકાટને કારણે નવા મિત્રો બનાવવામાં તેમને મુશ્કેલી પડે છે. ભારોસાપાત્ર અને વ્યવહારુ હોવાને કારણે મોટે ભાગે ધંધામાં સફળ રહે છે. આ જાતકો વિષયાસક્ત હોય છે અને દરેક બાબતમાં ભૌતિક સુખ શોધતા રહે છે. જોકે પ્રયત્નશીલ હોવાને કારણે સોંપેલું કાર્ય પૂર્ણ કરે છે, પરંતુ પોતાની ઝડપે. અન્યના પ્રત્નોની પ્રશંસા કરે છે તેમજ તેમના કૌશલ્યને જાહેરમાં સ્વીકારે છે. ક્યારેક તેઓ ઘમંડી વર્તન પણ કરતા જોવા મળે છે. વૃષભ જાતકોને જલ્દી આકર્ષી શકાતા નથી, અને એક વાર આકર્ષાયા બાદ પણ તેઓ ઈચ્છિત વ્યક્તિ પરત્વે ઘણી સાવચેતીપૂર્વક આગળ વધે છે. મૂલ્ય અને સિદ્ધાંતો બાબતે વૃષભ જાતકો મક્કમ રહે છે અને તેમનો અભિગમ બદલવો સરળ નથી. છતાં તેઓ પ્રેમાળ, સત્યને ચાહનારા, તેમજ ચુંબકીય વ્યક્તિત્વના માલિક હોય છે જેને કારણે લોકો તેમના તરફ આકર્ષાય છે. તેઓ જલ્દી ઉશ્કેરતા નથી, તેમ છતાં, જો તેમને ઉશ્કેરવામાં આવે તો તેઓ આખલાની જેમ ક્રોધે ભરાઈ શકે છે. ક્યારેક તેઓ પૂર્વગ્રહયુક્ત, જીદ્દી અને અવ્યવહારુ પણ બની જાય છે. જીવનસાથીની પસંદગીની બાબતમાં તેઓ અતિશય ચીવટ રાખે છે. તેમને જુઠ્ઠું બોલવું ગમતું નથી, જોકે તેમને ખુબ સરળતાથી ભોળવી શકાય છે.#મિથુન જાતકો અતિશય જીવંત અને મોહક હોય છે, મીઠી વાણીને કારણે તેઓ સર્વોત્તમ વાર્તાલાપ કરી શકે છે. તેમનું મન અને શરીર ખુબ સક્રિય હોય છે, તેમજ તેમની ઉંમર કરતા તેઓ ઘણા નાના દેખાય છે. કંઈક નવીન કરવાની કળા તેમની મૂડી છે. વારંવાર બદલાતા રહેતા તેમના ચંચળ મનને કારણે તેઓ કોઈ એક વસ્તુને વળગી રહી શકતા નથી. અજંપો, જલ્દી કંટાળી જવું, લાંબા સમય સુધી કોઈ એક બાબત પર ધ્યાન કેન્દ્રિત ન કરી શકવું વગેરે તેમની નબળાઈઓમાં ગણી શકાય. પોતાનું હિત સાધવા માટે તેઓ અન્યને ભોળવી પણ જાણે છે. જોકે એક મિથુન વ્યક્તિ તેના ઝમકદાર વ્યક્તિત્વ થકી પોતાના કોઈ પણ નકારાત્મક લક્ષણોને વિસરાવી દે છે. તેમના અશાંત સ્વભાવ અને વારંવાર મન બદલવાની ટેવને કારણે તેમના પર કોઈ વિશ્વાસ રાખતું નથી. બુદ્ધિચાતુર્યનું મિથુન રાશિ પર આધિપત્ય હોય છે અને આથી, દરેક બૌદ્ધિક બાબતની તેમને મન ઘણી કિંમત હોય છે. વાર્તાલાપ પણ તેમના માટે અત્યંત મહત્ત્વનો હોવાથી તેઓ હંમેશા જ્ઞાન પ્રસરાવતા રહે છે. બધી જ સૂર્ય રાશિઓમાં મિથુન સહુથી વધુ સર્વતોમુખી છે. તેઓ આજે કોઈ એક વિકલ્પ પસંદ કરશે અને કાલે સંપૂર્ણ નિર્ણય બદલી નાંખશે. મિથુન જાતકો ક્યારેય આખરી નિર્ણય નહિ લઈ શકે. કુતૂહલ અને નવું જાણવાની ઈચ્છાથી દોરવાતું તેમનું મન મુક્તપણે વિહરતું રહે છે. તેઓ કોઈ એક કામમાં સંપૂર્ણ ઓતપ્રોત ન થઈ શકે અને પહેલા ક્યારેય ન કર્યું હોય તેવું કામ કરવા તેઓ પહેલાં લલચાશે. તેમનામાં આત્મ-નિયંત્રણનો અભાવ જોવા મળે છે.#કર્ક રાશિની વ્યક્તિ દિવાસ્વપ્નમાં રાચતી, અંતઃપ્રેરણા ધરાવતી, લાગણીશીલ તેમજ સલામત એકાંત ખોળતી જોવા મળશે. તેમનામાં વાતચીત તેમજ સાહિત્યનુ કૌશલ્ય સહજપણે જોવા મળે છે. તેમનામાં ત્વરિત વિનોદવૃત્તિ, બુદ્ધિચાતુર્ય, ઉત્સાહ તેમજ ચંચળતાનાં લક્ષણ જોવા મળે છે. તેમનામાં થોડે ઘણે અંશે આધ્યાત્મિકતા હોય છે, અને કેટલાંક આધ્યાત્મિકતા તરફ ઢળેલા જોવા મળે છે. તેમનામાં અદ્ભુત યાદશક્તિ રહેલી હોય છે. તેઓ માયાળુ, લાગણીશીલ તેમજ ઉદાર હોય છે. તેઓ ખુબ જ ઘરેલુ હોય છે અને પોતાને સંતોષ થાય તે રીતનું ઘરમાં સુદૃઢ વાતાવરણ બનાવવું તેમને ગમે છે. વ્યક્તિગત સંબંધોમાં કર્ક રાશિના જાતકો કઠોરતા અને કોમળતાના મિશ્રણ સમાન છે. એક બાજુએ લાગણીશીલ, રોમેન્ટિક અને સંવેદનશીલ એવા આ જાતકો બીજી બાજુએ જીદ્દી કહી શકાય તેટલી હદે માલિકીભાવ ધરાવતા અને નિષ્ઠાવાન હોય છે. તેઓ પ્રબળ યાદશક્તિ ધરાવે છે અને કોઈએ પહોંચાડેલી ઈજા બદલ મોટે ભાગે માફી આપતા નથી. કર્ક રાશિના જાતકો ""જતું કરવામાં"" માનતા નથી; કોઈની પણ ભૂલને ભૂલવી તેમના માટે સરળ નથી. લાગણીથી દોરવાતા હોવાને કારણે તેઓ સર્વોત્તમ અને સહુથી ખરાબ મિત્ર બને છે. તેઓ તેજસ્વી અને અતિશય કાળજીવાળા હોય છે. ઉપરાંત, તેમના કામમાં તેઓ ઘણા રચનાત્મક હોય છે.# આ રાશિના જાતકો ગતિશીલ અને આકર્ષક વ્યક્તિત્વના માલિક હોય છે. લાક્ષણિક સિંહ જાતક મહત્ત્વાકાંક્ષી, શૌર્યવાન, મજબૂત ઇચ્છાશક્તિ ધરાવનાર, હકારાત્મક, સ્વતંત્ર તેમજ આત્મ-વિશ્વાસુ હોય છે. તેઓ સરળ અને સ્પષ્ટ વ્યક્તિત્વ ધરાવે છે. પોતાને શું જોઈએ છે તે તેમને ખબર છે અને તે પ્રાપ્ત કરવા માટે સંપૂર્ણ ઉત્સાહ અને રચનાત્મક જુસ્સાથી તેઓ લાગી પડે છે. સામાન્ય રીતે મિજાજી સ્વભાવ ધરાવનાર આ જાતકોને જ્યારે અન્ય વ્યક્તિના દ્વેષ કે હુમલાને કારણે ઊંડું દુઃખ પહોંચે છે તે સમયે તેઓ નિષ્ઠુર અને અધમ વર્તન પણ કરી બેસે છે. વ્યક્તિગત નિંદા બાબતે અતિશય સંવેદનશીલ એવી આ વ્યક્તિઓને જ્યારે પોતાનું સામ્રાજ્ય હલતું દેખાય તે સમયે તેઓ આકસ્મિક ગુસ્સો કરવા લાગે છે. તેઓ ઘણા જીદ્દી હોય છે અને કોઈ પણ સંજોગોમાં પોતાની માન્યતા કે કામ કરવાની પદ્ધતિને વળગી રહે છે. તેમનો સ્વભાવ આદર્શવાદી અને માનવતાવાદી હોય છે. સામાન્ય રીતે સિંહ રાશિના જાતકો બહિર્મુખી, આનંદી, માયાળુ અને ઉદાર, પોતાને વ્યક્ત કરી શકનારા, બુદ્ધિશાળી તેમજ ખુલ્લા મનના હોય છે. તેઓ નક્કર નિર્ણય લઈ શકે છે પરંતુ જરા અમસ્તી ઉશ્કેરણીને લીધે અયોગ્ય કારણોએ ગુસ્સે થઈ જાય છે, વળી શાંત પણ તેટલા જ જલ્દી થઈ જાય છે. તેઓ લાંબા સમય સુધી દ્વેષભાવ પોષ્યા કરે છે તેમજ તેઓ સ્વતંત્ર વિચારક છે. તેઓ ધર્મના જુનવાણી સિદ્ધાંતોને વળગી રહે છે, જોકે અન્યોની માન્યતા તેમજ પદ્ધતિને માન પણ આપે છે.#કન્યા લગ્નના જાતકો પ્રમાણમાં અતડા રહે છે તેમજ તેઓ વિનમ્ર અને વાત કરવામાં નરમ હોય છે. સામાજિક સ્તરે આગળ વધવામાં મદદરૂપ થનાર લોકોને તેઓ મિત્ર બનાવે છે. અડચણોનો સામનો કરતી વખતે તેઓ શાંત અને વ્યવહારુ રહી ઉકેલ શોધવાના પ્રયત્ન કરે છે. તેમની આ સ્વસ્થતાને કારણે ઘણી વાર તેમને ઠંડા અને ગણતરીબાજ માની લેવામાં આવે છે. અત્યંત ગૂંચવણભરી સમસ્યાઓને પણ વિશ્લેષણ કરી ઉકેલવાની તેમનામાં ક્ષમતા હોય છે. તેઓ ઘણું જ સૂક્ષ્મ અવલોકન કરી શકે છે, જોકે તેને લીધે જ મોટે ભાગે સમગ્ર મુદ્દાને અવગણી બેસે છે. તેઓ ખુબ જ બુદ્ધિશાળી હોય છે અને વાસ્તવિકતાના ખરાબ કે ગેરમાર્ગે દોરનારા પહેલુ સાથે કોઈ પણ પ્રકારની બાંધછોડ કરવામાં માનતા નથી. કન્યા લગ્નના જાતકો મૈત્રીપૂર્ણ તેમજ લગભગ દરેક બાબતનું જ્ઞાન ધરાવતા હોય છે, વળી તેઓ સચેત, કુશાગ્ર, આલોચનાત્મક તેમજ ધૈર્યવાન હોય છે. મિત્રો પસંદ કરવામાં તેઓ ખુબ ધ્યાન રાખે છે તેમજ કોઈ દેખીતો આધાર હોય તો જ સંબંધો વિકસાવવામાં માને છે. કન્યા લગ્નના જાતકો ચિંતા અને માનસિક બીમારીનો શિકાર બની શકે છે. તેઓ અન્યોને મદદરૂપ થતા હોવાને કારણે તેમનો દુરુપયોગ થવાની કે તેમની સાથે ખરાબ વ્યવહાર થવાની શક્યતા વધી જાય છે. તેઓ પોતાની અને અન્યોની બાબતમાં પિષ્ટપેષણ કરનારા, દુરાગ્રહી તેમજ વાંકદેખા હોય છે.#તુલા લગ્નના જાતકો સહકાર અને સમાધાન કરવામાં માને છે. પોતે સાચા હોવાનું માનવા છતાં દલીલો નિવારવા તેઓ જતું કરવા તૈયાર રહે છે. બીજા લોકો સાથેના મતભેદ તેમને અસુરક્ષિત અને અસ્વસ્થ બનાવે છે. પોતાના જીવનમાં સંવાદિતા માટે તેઓ ઝંખ્યા કરે છે અને આ સંવાદિતા લાવવા માટે તેઓ કંઈ પણ કરી શકે છે. તેમના પર ભરોસો ન મૂકી શકાય. વળી તેઓ નબળા મનના, રોજીંદી ઘરેડમાં ધીરજ ખોઈ બેસનારા, કંટાળો ઉપજાવે તેટલી હદે રૂઢીચુસ્ત અને શરમાળ હોય છે. તુલા લગ્નના જાતકોને જલ્દી ગુસ્સો આવતો નથી. વળી, અચાનક ગુસ્સે ભરાઈ જવાની લાક્ષણિકતાને કારણે તેઓ આસપાસના લોકોને આંચકો આપી દે છે. તેઓ વાસ્તવવાદી નહિ પરંતુ આદર્શવાદી હોય છે; અને હંમેશા હવાઈ કિલ્લા ચણતા રહે છે. એક તુલા વ્યક્તિ કલાત્મક અને સંસ્કારી હોય છે, સત્ય અને અસત્ય બાબતે સ્પષ્ટ મત ધરાવે છે, તેમજ તેઓ જન્મજાત મુત્સદી હોય છે. તેઓ સ્વભાવે વિવેકહીન, શાંતિપ્રિય, સરળ અને જૂથમાં રહેવાનું પસંદ કરનારા હોય છે. તુલા લગ્નના જાતકો સહુથી વધુ શિષ્ટ હોવાનું મનાય છે. તેઓ દેખાવે સુંદર હોય છે, તેઓ આધુનિક, અન્યને આકર્ષનારા તેમજ સુંદર પસંદગી ધરાવનારા હોય છે. તેમને લોકો સાથે હળવું-ભળવું ગમે છે. પોતાનું સમાજિક સ્તર ઊંચું લાવવામાં તેમને અતિશય આનંદ આવે છે. વાસ્તવિક અને નિષ્પક્ષ બની તેઓ અંતિમ નિર્ણય પર આવી શકે છે.#વૃશ્ચિક લગ્નના જાતકો તેમની આત્મ-વંચના, તીવ્ર એકાગ્રતા અને પ્રખર જુસ્સાથી કામ કરવાની લાક્ષણિકતાઓ માટે જાણીતા છે. જે સંપૂર્ણ સફળતા કે ઘોર નિષ્ફળતામાં પરિણમે છે. તેમનું વલણ આત્મઘાતી હોવા ઉપરાંત જરા અમસ્તી ઉશ્કેરણીથી ગુસ્સે થઈ જવાનો તેમનો સ્વભાવ હોય છે. પોતાના પ્રિયજનો બાબતે તેઓ હંમેશા શંકાશીલ અને ઈર્ષાળુ બની રહે છે. તેમનો ભાવનાત્મક જુસ્સો કોઈ પણ કારકિર્દીમાં તેમના માટે અદ્ભુત પરિણામ લાવે છે, જોકે સંજોગોને આધારે આ પરિણામ સારું કે ખરાબ હોઈ શકે. વૃશ્ચિક લગ્નના જાતકો લાક્ષણિક રીતે ઉત્કટ અને સશક્ત પ્રકૃતિના હોય છે. તેઓ જીદ્દી, ઘમંડી અને શાંત હોય છે. તેઓ ક્યારેય સ્થાયી નહિ થાય અને તેઓ માને છે કે જીવન જીવવું તો સંપૂર્ણ જીવવું અને નહિતર બિલકુલ ન જીવવું. પ્રવૃત્તિની ધરીમાં ક્યાંયે ન દેખાતા હોવા છતાં, શું ચાલી રહ્યું છે તેનો તેમને પૂરો ખ્યાલ હોય છે. તેમની અનુકંપા તેમને સર્વોત્તમ અને સહુથી નિષ્ઠાવાન મિત્ર બનાવે છે, પરંતુ આ જ ગુણ ક્યારેક તેમને સહુથી વધુ વિશ્વાસઘાતી શત્રુ પણ બનાવે છે. પોતાના સંપૂર્ણ સામર્થ્ય, આત્મ-વિશ્વાસ, મહત્ત્વાકાંક્ષા અને ઔદાર્યના સંયોજન વડે તેઓ દરેક અને કોઈ પણ બાબતમાં ઉત્કૃષ્ટ નીવડી શકે છે. તેઓ બીજા પાસેથી અપેક્ષા જરૂર રાખે છે, પરંતુ પોતે ન કરી તેવું કામ કરવાનું તેઓ અન્યને ક્યરેય નહિ કહે.#તેજસ્વી, ચળકતો મિજાજ ધરાવનાર ધન લગ્નના જાતકો ભવિષ્ય બાબતે અનહદ કહી શકાય તેટલો આશાવાદી અભિગમ ધરાવે છે. સામાન્ય રીતે તેઓ ઉત્તમ સ્વભાવ, અનિયંત્રિત રમૂજી વૃત્તિ અને પ્રેરક આધ્યાત્મિક પાસું ધરાવતા હોય છે. પ્રતિકૂળ પરિસ્થિતિઓમાં તેઓ અધીર બની જતા હોય છે, તેમને જવાબદારીનો ભય લાગે છે, પોતાની જાત પર દયા ખવા લાગે છે, ધર્મઝનૂની બની બિલકુલ અપરિપક્વ વર્તન કરવા લાગે છે. તેમને જુગાર પ્રત્યે પણ આકર્ષણ હોય છે. આ રાશિમાં જન્મેલા લોકોમાં આશાવાદ, મહત્ત્વાકાંક્ષા, પ્રેરણા, ઉત્સાહ તેમજ પ્રસન્નતાનાં લક્ષણ જોવા મળે છે. ધન વ્યક્તિ જીવન પ્રત્યે હકારાત્મક અભિગમ ધરાવતી, કંઈક નવું શીખવા માટે  ઉદ્યમ, સામર્થ્ય, સર્વાતોમુખીતા, સાહસ તેમજ ઉત્સુકતાથી ભરી-ભરી હોય છે. તેઓ બિનજરૂરી વાર્તાલાપ કરતા નથી. તેમની વાક્છટા હંમેશા અન્યોને મોહી લે છે. પ્રવાસ કરવો અને આસપાસના વાતાવરણનું અન્વેષણ કરવું તેમને પસંદ છે. ન્યાયનો ઉત્કટતાથી પક્ષ લેનારી આ વ્યક્તિઓ પ્રતિષ્ઠિત, પ્રમાણિક, વિશ્વસનીય, સત્યનિષ્ઠ, ઉદાર અને નિષ્ઠાવાન હોય છે. તેઓ મોટે ભાગે વિનમ્ર હોય છે અને આધ્યાત્મિકતા તરફ તેઓ પ્રમાણિકતાથી ઢળેલા જોવા મળે છે. ધન લગ્નના જાતકો નક્કર ઇચ્છાશક્તિ ધરાવે છે અને વ્યવસ્થાપનમાં ઉત્તમ હોય છે, આ સંયોજનને કારણે કોઈ પણ કાર્યને તેઓ સફળતાપૂર્વક પાર પાડી શકે છે.#મકર રાશિના જાતકો ધર્મપરાયણ હોવાનો મોટો દેખાવ કરતા રહે છે, પરંતુ ખરેખર તેઓ દેખાવ કરતા હોય છે તેટલા ધાર્મિક હોતા નથી. તેઓ સ્વાર્થી, ચાલક, રહસ્યમય અને અડગ હોય છે. સાંભળવા કરતા વાતો વધુ કરનારા આ લોકો મોટે ભાગે પોતાના કથન પર નિયંત્રણ ખોઈ બેસે છે, જેને પરિણામે અન્યોને દુઃખ પહોંચે છે. એક મકર લગ્નની વ્યક્તિ લાક્ષણિક રીતે જ ઉતમ વ્યવસ્થાપન કૌશલ્ય ધરાવે છે, તેઓ ચોખ્ખા અને સુવ્યવસ્થિત, તેમજ અતિશય વ્યવહારકુશળ હોય છે. તેઓ નીતિપૂર્વક પોતાનું કામ કરે છે, ભૌતિક અને રૂઢીચુસ્ત વલણ ધરાવે છે. પરંપરાને ચાહનારી આ વ્યક્તિઓ સત્તાને માન આપે છે. મકર લગ્નના જાતકો મહત્ત્વાકાંક્ષી, ગંભીર અને ફરજ પરાયણ હોય છે પરંતુ ક્યારેક, વેરવૃત્તિ ધરાવતા થઈ જાય છે; તેઓ સ્વયં-શિસ્તમાં માનનારા, જવાબદાર અને વ્યવહારુ હોવા છતાં, ક્યારેક પોતાની જાત માટે દયાભાવ સેવવા લાગે છે. તેમનામાં અદ્ભુત તર્કક્ષમતા તેમજ હેતુ અને દિશાની નક્કર સમજ હોય છે. અન્ય વ્યક્તિઓ સાથે કામ કરતી વખતે મકર રાશિની વ્યક્તિ શાંત અને અતડી લાગી શકે છે, પરંતુ એક વખત સામેની વ્યક્તિ પર વિશ્વાસ બેસી ગયા બાદ તેઓ નિષ્ઠાવાન અને પ્રતિબદ્ધ મિત્ર બની રહેશે. સમાજ લક્ષી તેમજ ઈચ્છાપૂર્તિ માટે કોઈ પણ સાહસ ખેડવા તત્પર આ વ્યક્તિઓ માટે તેમનું સ્વમાન ઘણું મહત્ત્વનું છે. ફિલસુફીને બદલે તેઓ ભૌતિકતામાં માને છે. આત્મ સુખ માટે તેઓ પ્રેમમાં પડે તે શક્ય છે.#કુંભ વ્યક્તિ લાક્ષણિક રીતે વાતચીત કરવાની તીવ્ર ઉત્કંઠા ધરાવતી હોય છે. રૂઢીચુસ્ત ખ્યાલ ધરાવતી વ્યક્તિઓ સામે પણ સતત સંભાષણ કર્યા કરવાની તમારી ટેવ પર અંકુશ નહિ મુકો તો તમે અવિચારી અને અણઘડ દેખાશો. તેઓ રસપ્રદ અને આકર્ષક હોય છે; દરેકનું પોતાના તરફ ધ્યાન ખેંચવાની ઈચ્છા ધરાવનાર આ વ્યક્તિઓ શરમાળ, લાગણીશીલ, સૌમ્ય તેમજ ધૈર્યવાન અથવા ઉત્સાહી અને જીવંત હોઈ શકે છે. દૃઢ માન્યતા ધરાવતી અને પોતાની માન્યતા માટે લડત આપનારી આ વ્યક્તિઓ આધાર આપવા સક્ષમ છે; તેઓ સ્વપ્નદૃષ્ટા અને પ્રણેતા હોય છે. સામાન્ય રીતે પૂર્વગ્રહ મુક્ત આ વ્યક્તિઓ અન્યના દૃષ્ટિકોણને માન આપે છે. ઉત્તમ શ્રોતા એવો સિંહ જાતક મિત્રોની ખરી કાળજી લે છે. તેઓ દયાળુ હોય છે અને નિખાલસ તેમજ સ્પષ્ટવકતા તરીકે જાણીતા છે. તેઓ શિષ્ટ અને આદર્શવાદી, રોમેન્ટિક અને વ્યવહારુ, દેખાવડા અને મળતાવડા હોય છે. તેમની પાસેથી મૌલિક વિચારો મળી શકે છે. જરૂર પડે ત્યારે હદ ઉપરાંત મદદ કરનાર આ વ્યક્તિઓ ક્યારેય લાગણીથી સંકળાશે નહિ.#મીન લગ્નના જાતકો વ્યવહારુ નથી, તેઓ લાગણીશીલ અને સહજ છે. આ સર્વતોમુખી વ્યક્તિઓ કોઈ પણ બાબત સમજણથી સમજવા માંગે છે, નહીં કે તર્કથી. પ્રચલિત અભિગમને તેઓ દૃઢપણે વળગી રહેશે અને પોતાની રૂઢિચુસ્તતા ક્યારેય છોડી નહિ શકે. મીન જાતકો આત્મવિશ્વાસથી ભર્યા, નિષ્ઠાવાન, પોતાના ઘરને ચાહનારા, દયાળુ તેમજ ઉદાર હોય છે. તેમને સરળતાથી ગેરમાર્ગે દોરી શકાય છે. તેમના સ્વપ્નીલ અને અવ્યવહારુ સ્વભાવને કારણે સ્નેહીજનોને મુશ્કેલી પડી શકે છે. આશાવાદી અને નિરાશાવાદીના મિશ્રણ સમાન આ વ્યક્તિઓ કોઈ પણ બાબતે જલ્દી નિર્ણય લઈ શકતા નથી. મીન જાતક શરમાળ હોય છે અને તેમના સંપર્કમાં આવનારી દરેક વ્યક્તિને અપ્રતિમ પ્રેમ અને વિશ્વાસ આપે છે. પરિશુદ્ધ શૃંગારરસ ધરાવનાર આ જાતકોમાં આત્મબળ હોવા છતાં તેને નકારવા બાબતે પ્રસિદ્ધ હોય છે. તેઓ અતિશય અંધશ્રદ્ધાળુ અને ધર્મપરાયણ હોય છે. તેમના મૃદુ, ધૈર્યવાન સ્વભાવને ઘાટ આપવો જરૂરી બને છે. આસપાસના સારા કે ખરાબ વાતાવરણ સાથે તેઓ સામંજસ્ય સાધી લે છે; ઔદાર્ય અને સહાનુભૂતિની ખરી ભાવના ધરાવનાર આ જાતકો માયાળુ, મૈત્રીપૂર્ણ અને ઉત્તમ સ્વભાવના હોય છે. તેઓ પોતાની આસપાસની દરેક બાબતો માટે સંવેદનશીલ હોય છે અને અન્ય માટે ખરેખર લાગણી ધરાવે છે.
     PHYSICAL_APPEARANCE_PREDICTION         = મજબૂત અને કોણીય મુખાકૃતિ ધરાવતા મેષ લગ્નના જાતકોના ચહેરામાં હડપચી, નાક અને મોં ઉભરીને બહાર આવતા હોય છે. તેઓ ખડતલ, સરેરાશ ઊંચાઈ અને બાંધો ધરાવતા, વાંકડિયા વાળવાળા, કમાન આકારની બહાર નીકળતી ભ્રમરો ધરાવતા, પીળાશ પડતા રાતા રંગના હોય છે, જે  આ રાશિના પુરુષોને પૌરુષત્વ અને સ્ત્રીઓને આગવો દેખાવ આપે છે. સંપૂર્ણ શારીરિક બાંધો સામર્થ્ય અને કઠોરતાની અસર ઊભી કરે છે. સમાન્ય રીતે તેમને કત્થાઇ કે આછા ઘાટા વાંકડિયા વાળ હોય છે. મોટે ભાગે તેમના માથા પર કોઈ નિશાની કે ડાઘ જોવા મળે છે. શરીર પર આગવી દેખાતી નસો અને ઘાના નિશાન જોવા મળે છે.#વૃષભ જાતકો શીથીલતા તરફ ઢળતો ટૂંકો બાંધો ધરાવે છે. સમાન્ય રીતે તેઓ મોટી ચમકદાર આંખ, એકદમ યોગ્ય આકારના કાન-નાક અને મોહક હોઠ વાળો સુંદર ચહેરો ધરાવે છે. જોકે શારીરિક માળખાની બાબતમાં તેઓ ચહેરા જેટલે નસીબદાર નથી. તેમનો બાંધો કોઈ પણ પ્રકારના આકર્ષક વણાંકો વિનાનો, ભરાવદાર અને ચોરસ હોય છે. તેમને પીઠ પર કે બાજુઓમાં કોઈ નિશાની હોઈ શકે. વૃષભ લગ્નના જાતકો મોટે ભાગે એક રુચિકર દેખાવ ધરાવે છે.#મિથુન લગ્નના જાતકો ચમકદાર આંખો અને સુંદર, સ્પષ્ટ, ગતિશીલ શારીરિક લક્ષણો ધરાવતા હોય છે. તેમનો બાંધો પાતળો અને ઊંચાઈ સરેરાશ કે ઊંચી કહી શકાય તેવી હોય છે. તેમના સ્નાયુ લવચીક, નાજુક છતાં બળવાન હોય છે. મોટે ભાગે ફેશન મોડેલ જેવા લાંબા અવયવો ધરાવે છે: મિથુન જાતકનો દેખાવ પણ સુંદર અને રુચિકર હોય છે. તેમના આકર્ષક ચહેરામાં નાની હડપચી હોય છે અને ગોરો વાન હોવાની શક્યતા છે. વાંકડિયા વાળ તેમના વ્યક્તિત્વના આકર્ષણમાં ઉમેરો કરે છે. મોટે ભાગે તેઓ વિસ્તૃત કપાળ અને ચોખ્ખી આંખો ધરાવે છે. આટલો આકર્ષક દેખાવ અને વ્યક્તિત્વ હોવા છતાં તેઓ વારંવાર બીમાર પડે છે.#કર્ક લગ્નના જાતકો ગોળાકાર શારીરિક લક્ષણો ધરાવે છે અને ત્રીસની આયુએ પહોંચતા જાડા થઈ જતા હોય છે.વાળ કાળા અને પાતળા કે આછા હોય છે. નાનું નાક, બહાર નીકળતી આંખો અને ગોળ હડપચી હોય છે. નાની થી સરેરાશ ઊંચાઈ ધરાવે છે. આ રાશિના જાતકો દેખાવની બાબતો નસીબદાર હોતા નથી. ટૂંકો બાંધો અને લાંબી બાજુઓ ધરાવતા આ જાતકો ઊંચા નથી હોતા પરંતુ શરીરનો ઉપરનો હિસ્સો પહોળો હોય છે. જોકે સમાન્ય રીતે તેઓ ગોરો વાન અને આગળ તરી આવતું નાક ધરાવે છે.#સિંહ લગ્નના જાતકો પ્રભાવશાળી વ્યક્તિત્વના માલિક હોય છે. તેઓ લોકો પર જાજરમાન અને ચુંબકીય પ્રભાવ પાડે છે. જોકે તેમનો બાંધો તેમના વ્યક્તિત્વ જેટલો આકર્ષક નથી. તેઓ સરેરાશ ઊંચાઈ ધરાવે છે અને શરીરનો ઉપલો હિસ્સો એકદમ યોગ્ય આકારનો હોય છે. તેઓ મોટો અંડાકાર ચહેરો અને પીળા રંગના આભાસવાળી આંખો તેમજ અલગ તરી આવતી હડપચી ધરાવે છે. સ્ત્રી અને પુરુષ સિંહ જાતકો દેખાય છે નિયંત્રિત, પરંતુ તેઓ ખુબ જલ્દી વિચલિત કે ઝઘડવા તૈયાર થઈ જાય છે. ઉત્સાહ અને જુસ્સાની જેમ જ તરત પ્રતિભાવ આપી દેવો કે આક્રમક થઈ જવું પણ આ જાતકો માટે સામાન્ય છે.#કન્યા લગ્નના જાતકોનું વ્યક્તિત્વ એક સરળ સ્વૈરવિહારી કે સામાન્ય વિલક્ષણ એવા વ્યક્તિત્વની છબી ઉપસાવે છે. તેમના શારીરિક દેખાવ બાબતે હંમેશા કંઈક ""નાનું"" કે આછું લાગતું હોય છે, ખાસ કરીને તેમનો ચહેરો. તેમના માપીને મંડાતા ડગલાં, સપ્રમાણ શરીર અને યુવાન, નિર્દોષ દેખાવ ઘણું કહી જાય છે. તેઓ સુંદર કપાળ, સીધું નાક અને મોટી હડપચી ધરાવે છે.#તુલા લગ્નના જાતકો વૈવિધ્યસભર, વિશિષ્ટ હોય છે. આકર્ષક દેહયષ્ટિ ધરાવતા આ જાતકો સંકલ્પશીલ હોઠ તેમજ દોષમુક્ત, આત્મવિશ્વાસ ઝળકાવતું લલાટ ધરાવે છે. ટૂંકો બાંધો ધરાવતા આ જાતકો ધૂંધળી અથવા કત્થઇ આંખોવાળી ડંખીલી તેમજ વેધક દૃષ્ટિ ધરાવે છે. આ વ્યક્તિઓનો મક્કમ રચનાત્મક વણાંકો વાળો બાંધો હોય છે. તુલા લગ્નના જાતકોની હળવી ચપળતા તેમના વ્યક્તિત્વને લાવણ્ય બક્ષે છે. મોટે ભાગે આ રાશિની સ્ત્રીઓનો શારીરિક ઘાટ નાજુક ન હોવા છતાં સહુને ગમી જાય તેટલો આકર્ષક હોય છે તેમજ પુરુષોનો આત્મા સ્ત્રૈણ પરંતુ દેખાવ ખડતલ હોય છે. મધ્યમ કદનો અથવા ક્યારેક ઊંચો બાંધો હોય છે.#શારીરિક દૃષ્ટિએ વૃશ્ચિક જાતકો ઘણાં ખડતલ અને પહોળા મજબૂત ખભ્ભા ધરાવે છે. કોઈ પણ કિસ્સામાં, તેઓ સશક્ત અને પ્રતિકારક હોય છે. સ્પષ્ટ આકારવાળો ચોરસ ચહેરો, તીક્ષ્ણ અને ચુંબકીય આંખો, સુંદર આકારના મોહક હોઠ હોય છે. વાળ મોટે ભાગે કત્થાઇ અને જાડા હોય છે. તેમનો સરેરાશ દેખાવ આકર્ષણ, સામર્થ્ય, રહસ્ય અને ગાંભીર્યની છાપ છોડી જાય છે.#શારીરિક દૃષ્ટિએ ધન જાતકો ઘણાં મજબૂત, ઊંચા અને મોટે ભાગે ઘણાં ઊંચા, સંપૂર્ણ અને સ્પષ્ટ મુખાકૃતિ, હસતા હોઠ અને જાડા વાળ ધરાવે છે. તેઓ ઊર્જા અને આકર્ષણ પ્રસરાવતા રહે છે. વય વધતા તેઓ જાડા થઈ જાય છે. દરેક બાબતમાં અનહદ ભોગવિલાસને કારણે આયુની ત્રીસીમાં પહોંચતા તેમનું વજન વધી જાય છે. તેમનું સ્નાયુનું બંધારણ ખડતલ હોતું નથી. ધન જાતકોનો સરેરાશ દેખાવ આકર્ષણ, જીવંતતા અને ઊર્જાની અસર છોડી જાય છે. તેમનો દેખાવ આનંદી હોય છે તેમજ તેમનો પહેરવેશ અનૌપચારિક હોવા છતાં તેમના ઉદાર સ્વભાવ સાથે મેળ ખાય છે.#મકર લગ્નના જાતકો ઘણાં નાજુક, મોટા હાડકાંવાળા, બેડોળ દેહાકૃતિ અને ઓછી કે સરેરાશ ઊંચાઈના હોય છે. ટાંકણાં વડે ટંકાયેલી હોય તેવી બારીક મુખાકૃતિ ધરાવતી આ વ્યક્તિઓ ઊંડી ગંભીર આંખોવાળા હોય છે. ભવાં અને છાતી પર તેમને કડક વાળ હોય છે. મોટે ભાગે મોટું માથું અને મોટા દાંત - ક્યારેક હોઠની બહાર આવતા દાંત હોય છે. તેમનો સરેરાશ દેખાવ કઠોરતા, મજબૂતી, ઊંડાણ અને પરિપક્વતાની છાપ છોડી જાય છે. તેમનો દેખાવ તટસ્થ, સૌમ્ય અને સામાન્ય હોય છે. તેઓ કલાત્મક નહિ પણ વ્યવહારુ છે અને કલાત્મક પાસા પર તેઓ ધ્યાન પણ આપતા નથી. તેઓ મોટે ભાગે એક વૈજ્ઞાનિક કે ફિલસૂફ, એક વિદ્વાન કે શાણા વ્યક્તિ જેવા લાગે છે.#કુંભ લગ્નના જાતકો મોટે ભાગે પાતળા, આગળ નમી ગયેલા લાંબા બાંધાના હોય છે. તેમનો ચહેરો, ગળું, પીઠ, પેટ, કમર, જાંઘ અને પગ વિશાળ હોઈ શકે છે. તેમનો દેખાવ સામાન્ય અને રમણીય, વાળ કાળા અને જાડા, તેમજ વાળ ઓળવાની શૈલી સૌમ્ય અથવા અસામાન્ય હોય છે. ચહેરાના હાવભાવ સુંદર અને ગાંભીર્યની છાંટવાળા હોય છે. આંખોમાં જીવંતતાનો ચમકારો હોય છે અને હંમેશા કંઈક વિલક્ષણ ખોળતી જોવા મળે છે. સંપૂર્ણ દેખાવ ઉત્સાહપ્રચુર અને મૌલિક હોવાની છાપ છોડી જાય છે. તેમનો દેખાવ વિલક્ષણ અથવા ગંભીર હોઈ શકે. જોકે કોઈ પણ સંજોગોમાં તેઓ હંમેશા અદ્ભુત લાગે છે.#મીન રાશિમાં અસમાનતાનો બિલકુલ અભાવ હોવાને કારણે આ લગ્નના જાતકો મોટે ભાગે ભરાવદાર અને સરેરાશ બાંધો ધરાવે છે. રાશિચક્રની આ એક જ રાશિ એવી છે જે અનેક સ્વરૂપ લઈ શકે છે. તેમની આંખો મોટે ભાગે મોટી, આકર્ષક, સ્થિર અથવા ધીમી અને લગભગ વશમાં કરી લેનારી હોય છે. તેમનો શારીરિક બાંધો એક અસ્પષ્ટ, રહસ્યમય, પરમાર્થી અને શાંત હોવાની છાપ છોડી જાય છે. હકીકતે તો, મીન જાતકોના ગૂઢ વ્યક્તિત્વની જેમ જ તેમનો બાહ્ય દેખાવ પણ કોઈ એક વર્ગમાં મૂકી શકાતો નથી!
     WELLNESS                               = માટે આરોગ્ય
     DISPOSITION_PERSONALITY                = માટે સ્વભાવ ને વ્યક્તિત્વ
     PHYSICAL_APPEARANCE                    = માટે શારીરિક દેખાવ
