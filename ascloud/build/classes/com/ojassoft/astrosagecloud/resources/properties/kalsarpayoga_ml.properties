     INTRODUCTION_KALSARP_YOG               = പ്രസിദ്ധമായ നിർവചനം പ്രകാരം, ജനന-ചാർട്ടിലോ ജാതകത്തിലോ എല്ലാ ഗ്രഹങ്ങളും രാഹുവിന്‍റെയും കേതുവിന്‍റെയും ഇടയിലാണു സ്ഥിതി ചെയ്യുന്നതെങ്കിൽ, ജ്യോതിഷന്മാർ ഇതിനെ കാലസർപ്പ ദോഷമെന്നു പറയുന്നു. ഇപ്പോഴത്തെ ദിവസങ്ങളിൽ, ജ്യോതിഷികൾക്കും ഹിന്ദു ജ്യോത്സ്യന്മാർക്കും ഇടയിൽ ഈ ദോഷത്തെ കുറിച്ചുള്ള ചർച്ചകൾ പ്രചരിച്ചുകൊണ്ടിരിക്കുകയാണ്. ഒരാളുടെ ജീവിതത്തിലെ ഏറെ പ്രശ്നങ്ങൾക്കും കാരണം കാലസർപ്പ ദോഷമണ്. ജ്യോതിഷത്തിലെ മറ്റുള്ള മേഖലകൾ ഒന്നും തന്നെ വിശകലനം ചെയ്യാതെ തന്നെ, മിക്കവാറുമുള്ള ജ്യോത്സ്യന്മാർ, യഥാർത്ഥത്തിൽ, കാലസർപ്പ ദോഷമാണ് പ്രശ്നങ്ങളുടെ മൂലകാരണമെന്ന് വിശ്വസിക്കുന്നു. എന്നാൽ യഥാസ്ഥിതി എന്തെന്നാൽ ജാതകത്തിൽ ഗ്രഹങ്ങൾ നല്ല സ്ഥാനത്താണ് നിൽക്കുന്നതെങ്കിൽ, കാലസർപ്പദോഷം ഹാനികരമാകുകയില്ല, കൂടാതെ നല്ല സ്ഥാനത്ത് നിൽക്കുന്ന  ഗ്രഹങ്ങളാലുള്ള ഗുണങ്ങൾക്ക് തുണയായിരിക്കുകയും ചെയ്യും. ഒരാളുടെ ജാതകത്തിൽ മറ്റുള്ള ഗ്രഹങ്ങൾ അനുകൂലമല്ലെങ്കിൽ മാത്രമെ കാലസർപ്പദോഷം അശുഭകരമാകുകയുള്ളു.<br/> <br/>ആയതിനാൽ, ‘കാലസർപ്പദോഷം’ എന്നു കേട്ടാൽ പേടിക്കുന്നത് ബുദ്ധിയല്ല. കാലസർപ്പദോഷത്തിന്‍റെ വിപരീത സ്വാധീനങ്ങളെ കുറിച്ച്  ഒരു ജ്യോതിഷനുമായി ആഴത്തിൽ  വിശകലനം  ചെയ്തതിന് ശേഷം മാത്രം പരിഹാരങ്ങളിലേയ്ക്ക് പോകുന്നതായിരിക്കും നല്ലത്. രസകരമെന്തെന്നാൽ, കാലസർപ്പ ദോഷത്തിന്‍റെ  സ്വാധീനങ്ങൾ പല ആളുകളിൽ പലതരത്തിലായിരിക്കും. എന്തെന്നാൽ കാലസർപ്പ ദോഷത്തിന്‍റെ  സ്വാധീനങ്ങൾ ഏത് ചിഹ്നം ഏത് സ്ഥാനത്ത് നിൽക്കുന്നു, കൂടാതെ  ആ സ്ഥാനത്ത് നിൽക്കുന്ന മറ്റ് ഗ്രഹങ്ങൾ ഏതൊക്കെയാണ്, അവയുടെ സ്വാധീനങ്ങൾ എന്തൊക്കെയാണ് തുടങ്ങിയവയെ അടിസ്ഥാനപ്പെടുത്തിയുള്ളതായിരിക്കും. 
     ANNANT_KALSARPA_YOGA_INTRO_TEXT        = രാഹു ലഗ്നത്തിലായിരിക്കുമ്പോഴും, കേതു ഏഴാം ഭാവത്തിൽ നിൽക്കുമ്പോഴും കൂടാതെ എല്ലാ ഗ്രഹങ്ങളും ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും-രാഹുവിനും കേതുവിനും ഇടയിൽ നിൽക്കുമ്പോഴാണ് ഈ കാലസർപ്പദോഷം അല്ലെങ്കിൽ യോഗം ഉണ്ടാകുന്നത്. ലഗ്ന ചാർട്ടിൽ ഈ ദോഷത്തിന്‍റെ സ്വാധീനം മൂലം മതിപ്പുള്ള വ്യക്തി ആകുവാൻ ജാതകന് കഠിന പ്രയത്നം ചെയ്യേണ്ടിവരും. കാലസർപ്പ ദോഷം ഉള്ള ആളുകൾക്ക് കച്ചവടത്തിലും വിദ്യാഭ്യാസത്തിലും വിജയം നേടുവാൻ കൂടുതൽ പ്രാധാന്യം നൽകേണ്ടതായും കഠിന പരിശ്രമം ചെയ്യേണ്ടതായും വരും. ഈ ദോഷത്താലുള്ള മനസിക പ്രശ്നങ്ങളാൽ ജാതകൻ കാലക്രമേണ പ്രാപഞ്ചിക സുഖങ്ങളോടെ വികാല്പനികനും രൂക്ഷസ്വഭാവമുള്ളവനും ആയി മാറും. അനന്ത കാലസർപ്പ ദോഷമുള്ള ആളുകൾ എപ്പോഴും അപായ സാധ്യതയുള്ള അപകടവും സാഹസവും നിറഞ്ഞ കച്ചവടമോ വ്യാപാരമോ ഇഷ്ടപ്പെടുന്നു. ഈ ദോഷമുള്ളപ്പോൾ ജാതകന്‍റെ ശാരീരികവും സാമ്പത്തികവുമായ അവസ്ഥകൾ നല്ലതായിരിക്കുകയില്ല. പിതാവിന്‍റെയോ പൂർവ്വികരുടെയോ സ്വത്തുവകകൾ ലഭിക്കുന്നതിന് ജാതകന് പല തടസ്സങ്ങളും നേരിടേണ്ടിവരും. നിയമ നടപടികളും വഞ്ചനകളും ഇവർക്ക് വേദനയോടെ നേരിടേണ്ടി വരും. ഇവരുടെ സാമൂഹിക പ്രതിഛായ വളരെ ദുർബലമാകും. എന്നിരുന്നാലും അനുയോജ്യമല്ലാത്ത സംഭവങ്ങൾ കൂടാതെ, ഇവരുടെ പ്രശ്നങ്ങൾ യാന്ത്രികമായ് തന്നെ ഇല്ലാതാകുന്ന അത്ഭുതകരമായ സമയം അനന്ത കാലസർപ്പ ദോഷമുള്ള വ്യക്തിക്ക് അനുഭവവേദ്യമാകും. കൂടാതെ അത്ഭുതങ്ങൾ സംഭവിക്കുന്നത് പ്രയത്നം കൊണ്ടാകുകയില്ല എന്നാൽ അവ പെട്ടെന്നു തന്നെ സംഭവിക്കും. എന്നിരുന്നാലും ഈ ദോഷമുള്ള വ്യക്തിക്ക് ഒരു കുന്നു പ്രശ്നങ്ങൾ ഉണ്ടാകുമെങ്കിലും ജീവിതത്തിൽ ഒന്നിനും ഒരു കുറവും ഇവർക്ക് അനുഭവപ്പെടുകയില്ല. ഏതെങ്കിലും ഒരു വ്യക്തി അനന്ത കാലസർപ്പ ദോഷത്താൽ വലിയ പ്രശ്നങ്ങൾ അഭിമുഖീകരിക്കുന്നുണ്ടെങ്കിൽ ഇവർ താഴെ പറയുന്ന പരിഹാരങ്ങൾ ചെയ്യേണ്ടതാണ്:
     KULIK_KALSARPA_YOGA_INTRO_TEXT         = രാഹു 2ആം ഭാവത്തിലും കേതു 8ആം ഭാവത്തിലും കൂടാതെ എല്ലാ ഗ്രഹങ്ങളും ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും-രാഹുവിനും കേതുവിനും മധ്യത്തിൽ നിൽക്കുമ്പോഴുമാണ്, കുലിക് കാലസർപ്പ യോഗം. ഈ യോഗം അപഖ്യാദിക്കും വിയോജിപ്പിനും കാരണമാകുമെന്ന് വിശ്വസിക്കപ്പെടുന്നു. ഇത് അവരുടെ വിദ്യാഭ്യാസത്തിനെയും വിപരീതമായി ബാധിക്കും. ഇവരുടെ വിവാഹബന്ധം വേർപിരിയത്തക്ക രീതിയിലോ, വിയോജിപ്പുണ്ടാകുന്ന രീതിയിലോ ഉള്ള അസ്ഥിരവും ദുർബലവുമായ സാമ്പത്തിക സ്ഥിതിക്ക് ഇത് കാരണമാകും. ഇവരുടെ സുഹൃത്തുക്കൾ ഇവരെ ചതിക്കാം. അവരുടെ വയസ്സിനേക്കാൾ കൂടുതൽ പ്രായം തോന്നത്തക്കവിധം ശാരീരികവും മാനസ്സികവുമായ അസന്തുലിതാവസ്ഥയ്ക്കും ഇത് കാരണമാകാം. ഈ കാലസർപ്പ ദോഷത്താൽ ഇവർ ജിജ്ഞാസയിൽ നിന്നും ധൈര്യത്തിൽ നിന്നും വളരെ ദൂരെ ആയിരിക്കും. എന്നിരുന്നാലും ഈ യോഗമുള്ളവർക്ക് കഠിന പരിശ്രമവും ഭക്തിയും കൊണ്ട് വിജയം നേടുവാൻ കഴിയും എന്നാൽ ഈ വിജയം താത്കാലികമായിരിക്കും. ഈ സാഹചര്യത്തിൽ ഇവർ താഴെ പറയുന്ന പരിഹാരങ്ങൾ ചെയ്യേണ്ടതാണ്:
     VASUKI_KALSARPA_YOGA_INTRO_TEXT        =  ഒരാളുടെ ജാതകത്തിൽ അല്ലെങ്കിൽ ജനന-ചാർട്ടിൽ രാഹു 3ആം ഭാവത്തിലും കേതു 9ആം ഭാവത്തിലും കൂടാതെ എല്ലാ ഗ്രഹങ്ങളും ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും-രാഹുവിനും കേതുവിനും മധ്യത്തിൽ നിൽക്കുമ്പോൾ വസുങ്കി കാലസർപ്പ യോഗം ഉണ്ടാകുന്നു. ഒരാളുടെ ജാതകത്തിലുള്ള ഈ കാലസർപ്പ യോഗം കൂടപ്പിറപ്പുകളുമായും മറ്റ് പങ്കാളികളുമായും ബന്ധപ്പെട്ട പ്രശ്നങ്ങളെ ചൂണ്ടിക്കാണിക്കുന്നു. അടുപ്പമുള്ളവരിൽ നിന്നും സുഹൃത്തുക്കളിൽ നിന്നും വഞ്ചന അഭിമുഖീകരിക്കേണ്ടി വരും. ഇവരുടെ ഗാർഹികവും കുടുംബപരവുമായ ജീവിതം മാനസ്സിക പിരിമുറുക്കവും ലഹളയും നിറഞ്ഞതായിരിക്കും. ഇങ്ങനെയുള്ളവർ ജനന സ്ഥലത്തുനിന്നും പുറത്തുപോയി സമ്പാദിക്കുവാനോ ജീവിക്കുവാനോ തുടങ്ങിയാൽ കൂടുതൽ വിജയകരമായിരിക്കും. ഇവർക്ക് വിജയം വൈകിയാണെങ്കിലും ഉറപ്പായിരിക്കും. ഈ പ്രശ്ന കാലഘട്ടത്തിൽ താഴെ പറയുന്ന പരിഹാരങ്ങൾ അനുഷ്ഠിക്കാവുന്നതാണ്:
     SHANKPAAL_KALSARPA_YOGA_INTRO_TEXT     =  ഒരാളുടെ ജനന-ചാർട്ടിൽ, രാഹു 4ആം ഭാവത്തിലും കേതു 10ആം ഭാവത്തിലും കൂടാതെ മറ്റ് എല്ലാ ഗ്രഹങ്ങളും ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ ശംഖ പൽ കാലസർപ്പ യോഗം ഉണ്ടാകുന്നു. വസ്തു അല്ലെങ്കിൽ എസ്റ്റേറ്റ്, സൗധം എന്നിവ സംബന്ധിച്ച പ്രശ്നങ്ങൾക്കും വാഹന സംബന്ധമായ പ്രശ്നങ്ങൾക്കും ഈ കാലസർപ്പ ദോഷം കാരണമാകുന്നു. ഒരേ സമയം ഒന്നിലധികം ജോലികൾ ചെയ്യുവാനുള്ള പ്രവണത ഈ കാലസർപ്പ യോഗമുള്ളവർക്ക് ഉണ്ടാകും. ഇത്കൊണ്ടാണ് അവർ ചെയ്യുന്ന മിക്കവാറുമുള്ള ജോലികൾ പൂർത്തീകരിക്കപ്പെടും. ഇവരുടെ വിവാഹ ജീവിതത്തിൽ യോജിപ്പില്ലായ്മ ഉണ്ടാകും. സാമ്പത്തിക പരാധീനത ഈ യോഗത്തിന്‍റെ ഒരു പ്രധാന സൂചനയാണ്. എന്നിരുന്നാലും രാഷ്ട്രീയം, സേവനം കൂടാതെ വ്യാപാരം എന്നീ മേഖലകളിൽ ഇവർക്ക് മാന്യമായ നേട്ടം ഉണ്ടാവുകയും സാമൂഹിക മാന്യത നേടുകയും ചെയ്യും. പ്രശ്നകാലങ്ങളിൽ താഴെ പറയുന്ന പരിഹാരങ്ങൾ അനുഷ്ഠിക്കാവുന്നതാണ്: 
     PADAM_KALSARPA_YOGA_INTRO_TEXT         = ഒരാളുടെ ജനന-ചാർട്ടിൽ, രാഹു 5ആം ഭാവത്തിലും കേതു 11ആം ഭാവത്തിലും, കൂടാതെ മറ്റ് എല്ലാ ഗ്രഹങ്ങളും ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ പദം കാലസർപ്പ യോഗം ഉണ്ടാകുന്നു. അഞ്ചാം ഭാവവുമായി ബന്ധപ്പെട്ടിരിക്കുന്നതിനാൽ, ഈ കാലസർപ്പ യോഗം വിദ്യാഭ്യാസം, വളരെ വൈകി മക്കളുണ്ടാവുക, കൂടാതെ കുട്ടികളുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങൾ എന്നിവയെ സൂചിപ്പിക്കുന്നു. ഈ യോഗം മൂലം ആരോഗ്യവും വൈവാഹിക ജീവിതവും അസാധാരണമായി മാറും. ഈ കാലസർപ്പ യോഗമുള്ളവർക്ക് കുടുംബത്തിൽ ദുഷ്പേര് ഉണ്ടാകുമെന്ന ഭയം ഉണ്ടാകും. ഈ യോഗത്താലുണ്ടാകുന്ന സമ്മർദ്ദത്താൽ ഇവരുടെ ജീവിതം കഷ്ടപ്പാടുകൾ നിറഞ്ഞതാകും. ഇവരുടെ സുഹൃത്തുക്കൾ സ്വാർത്ഥരാകും. എണ്ണമറ്റ പ്രശ്നങ്ങൾ അഭിമുഖീകരിക്കുന്നു എന്നതൊഴിച്ചാൽ ശക്തമായ സാമ്പത്തിക സ്ഥിതി, ബഹുമാനിക്കപ്പെടുന്ന സാമൂഹിക നിലവാരം, മികച്ച രീതിയിലുള്ള വ്യാപാരം എന്നിവ ഇവർക്ക് ലഭിക്കും. ഈ യോഗമുള്ളവർ പെരുമാറ്റത്തിലും പ്രകൃതത്തിലും നല്ലവരായിരിക്കുകയും, മദ്യപാനം ഇല്ലാതിരിക്കുകയും, സുഹൃത്തിന്‍റെ വസ്തു കരസ്തമാക്കാതിരിക്കുകയും ചെയ്താൽ, കാലസർപ്പ യോഗത്തിന്‍റെ മുകളിൽ പറഞ്ഞ മോശമായ സ്വാധീനങ്ങൾ ഫലവത്താവുകയില്ല.
     MAHAPADAM_KALSARPA_YOGA_INTRO_TEXT     = ഒരാളുടെ ജനന-ചാർട്ടിൽ, രാഹു 6ആം ഭാവത്തിലും കേതു 12ആം ഭാവത്തിലും, കൂടാതെ മറ്റ് എല്ലാ ഗ്രഹങ്ങളും ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ മഹാപദം കാലസർപ്പ യോഗം ഉണ്ടാകുന്നു. ഈ യോഗമുള്ളവർ ശത്രുക്കളെ വിജയിക്കുന്നവരും വിദേശരാജ്യങ്ങളിൽ ധാരാളം പണം സമ്പാദിക്കുന്നവരും ആയിരിക്കും. എന്നാൽ ഇത് ഇവരുടെ കുടുംബ സമാധാനം നശിപ്പിക്കുന്നു. ഇവർ ഒരുപാട് യാത്ര ചെയ്യുന്നു, എന്നാൽ ചിലതൊക്കെ പരാജയപ്പെടുമെങ്കിലും മിക്കവാറുമുള്ള യാത്രകൾ വിജയിക്കും. ഇവർക്ക് സമ്പത്ത് അല്ലെങ്കിൽ സന്തോഷം ഇവയിൽ ഏതെങ്കിലും ഒന്ന് മാത്രമേ ലഭിക്കുകയുള്ളു. ഈ യോഗമുള്ളവർക്ക് ഭയാനകമായ രാക്കിനാവുകൾ ഉണ്ടാകും. വാർദ്ധക്യത്തിൽ ഇവർ പ്രശ്നങ്ങളാൽ ബുദ്ധിമുട്ടും. എന്നിരുന്നാലും, ഇവരുടെ ജീവിതത്തിൽ നല്ല സമയവും വരും. ഈ കാലസർപ്പ യോഗമുള്ളവർ ഒരു വക്കീൽ അല്ലെങ്കിൽ രാഷ്ട്രീയ നേതാവ് എന്ന നിലയിൽ വിജയിക്കും. പ്രശ്ന കാലഘട്ടത്തിൽ താഴെ പറയുന്ന പരിഹാരങ്ങൾ അനുഷ്ഠിക്കാവുന്നതാണ്:
     TAKSHAK_KALSARPA_YOGA_INTRO_TEXT       = പ്രചരിതമായ വിവരണ പ്രകാരം, ജാതകന്‍റെ ജനന ചാർട്ടിൽ രാഹു 7ആം ഭാവത്തിലും കേതു 1ആം ഭാവത്തിലും മറ്റ് ഗ്രഹങ്ങൾ ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ, അതായത് മറ്റ് എല്ലാ ഗ്രഹങ്ങളും ഒന്നും ഏഴും ഭാവങ്ങൾക്ക് മധ്യത്തിൽ നിൽക്കുമ്പോൾ ജനന ചാർട്ട് തക്ഷക കാലസർപ്പ ദോഷത്താൽ ബാധിക്കപ്പെട്ടിരിക്കുന്നു എന്ന് പറയുന്നു. ഈ സാഹചര്യത്തിൽ ജാതകന് പാരമ്പര്യമായി ലഭിക്കുന്ന പൈതൃക സ്വത്തുകളിൽ നിന്നുള്ള സന്തോഷം ആസ്വദിക്കുവാൻ കഴിയുകയില്ല, പ്രണയ ബന്ധങ്ങൾ പരാജയത്തിൽ അവസാനിക്കുകയും ജാതകന് അടുത്ത ബന്ധങ്ങളിൽ നിന്നും വഞ്ചന ഉണ്ടാവുകയും ചെയ്യും. കൂടുതലായി, വിവാഹ ബന്ധം വേർപെടത്തക്ക വിധം വൈവാഹിക ജീവിതത്തിൽ പ്രശ്നങ്ങൾ ഉണ്ടാകാം. ജാതകന് ചൂതാട്ടം ഭാഗ്യക്കുറി എന്നിവയിൽ താത്പര്യം ഉണ്ടാവുകയും കുട്ടികൾ കടംകൊടുത്ത പണം എന്നിവയെ കുറിച്ച് ചിന്തിച്ച് സ്ഥിരമായി അസ്വസ്ഥമായി ജീവിക്കുകയും ചെയ്യും. എന്നിരുന്നാലും, ജാതകൻ കാരുണ്യവാനും മറ്റുള്ളവരെ ബഹുമാനിക്കുന്നവനും ആയിരുന്നാൽ ഈ പ്രശ്നങ്ങൾ അഭിമുഖീകരിക്കേണ്ടി വരുന്നില്ല. ഈ പ്രശ്നങ്ങളെ തരണം ചെയ്യുവാൻ നിങ്ങൾ അനുഷ്ഠിക്കേണ്ട ചില പരിഹാര മാർഗ്ഗങ്ങൾ ഇവിടെ കൊടുക്കുന്നു:
     KARKOTAK_KALSARPA_YOGA_INTRO_TEXT      = പ്രചരിതമായ വിവരണ പ്രകാരം, ജാതകന്‍റെ ജനന ചാർട്ടിൽ രാഹു എട്ടാം ഭാവത്തിലും കേതു രണ്ടാം ഭാവത്തിലും മറ്റ് ഗ്രഹങ്ങൾ ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ, അതായത് മറ്റ് എല്ലാ ഗ്രഹങ്ങളും എട്ടും രണ്ടും ഭാവങ്ങൾക്ക് മധ്യത്തിൽ നിൽക്കുമ്പോൾ ജനന ചാർട്ട് കാർക്കോടക കാലസർപ്പ ദോഷത്താൽ ബാധിക്കപ്പെട്ടിരിക്കുന്നു എന്ന് പറയുന്നു. ഈ സാഹചര്യത്തിൽ ജാതകന് ഒരിക്കലും വിധി അനുകൂലമായിരിക്കുകയില്ല, ജോലിക്കയറ്റം ബുദ്ധിമുട്ടാകും, പാരമ്പര്യമായ വസ്തുക്കൾ ലഭിക്കുന്നതിന് തടസങ്ങൾ ഉണ്ടാകും, സുഹൃത്തുക്കളിൽ നിന്നും വഞ്ചനയുണ്ടാകും കൂടാതെ നിങ്ങളുടെ പരിശ്രമങ്ങൾക്ക് ലഭ്യമാകേണ്ടതിനേക്കാൾ പകുതി ഫലം മാത്രമേ ലഭിക്കുകയുള്ളു. ശാരീരികവും മാനസികവുമായ പ്രശ്നങ്ങളാൽ ഇത്തരത്തിലുള്ള ജാതകൻ വീട്ടിലും ബന്ധുക്കൾക്കിടയിലും തടസ്സങ്ങൾ അഭിമുഖീകരിക്കും, ഏറെക്കുറെ എല്ലായിപ്പോഴും പ്രകോപിതനും അസ്വസ്ഥനും ആയിരിക്കും, കടങ്ങളാൽ അവർ ഏറെ ബുദ്ധിമുട്ടും.അപകട മരണത്തിനുള്ള സാധ്യത അവർക്കു ചുറ്റും എപ്പോഴും ഉണ്ടാകും. അഥവ നിങ്ങൾ ഇവയാൽ ബുദ്ധിമുട്ടുകയാണെങ്കിൽ, താഴെ പറഞ്ഞിരിക്കുന്ന പരിഹാരങ്ങൾ പിൻതുടരുക:
     SHANKACHOOD_KALSARPA_YOGA_INTRO_TEXT   = പ്രചരിതമായ വിവരണ പ്രകാരം, ജാതകന്‍റെ ജനന ചാർട്ടിൽ രാഹു ഒൻപതാം ഭാവത്തിലും കേതു മൂന്നാം  ഭാവത്തിലും ബാക്കിയുള്ള മറ്റ് ഗ്രഹങ്ങൾ ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ, അതായത് മറ്റ് എല്ലാ ഗ്രഹങ്ങളും ഒൻപതും മൂന്നും ഭാവങ്ങൾക്ക് മധ്യത്തിൽ നിൽക്കുമ്പോൾ ജനന ചാർട്ട് ശംഖചൂട കാലസർപ്പ ദോഷത്താൽ ബാധിക്കപ്പെട്ടിരിക്കുന്നു എന്ന് പറയുന്നു. ഈ സാഹചര്യത്തിൽ വിധി അനുകൂലമാകുവാൻ ജാതകന് തടസ്സങ്ങൾ നേരിടേണ്ടി വരും. അത് വ്യവസായമോ, ജോലികയറ്റമോ, വിദ്യാഭ്യാസമോ എന്നിവയിൽ ഏതിലും ജാതകന് നിശ്ചിത ഫലം ലഭിക്കുവാനായി ഏറെ തടസ്സങ്ങൾ അഭിമുഖീകരിക്കേണ്ടി വരും. ഇവരുടെ അമിതമായ ആത്മവിശ്വാസത്താലും വിവാദസ്വഭാവത്താലും ഇവർ നഷ്ടത്താൽ ബാധിക്കപ്പെടും. അച്ഛന്‍റെ വശത്തുള്ളവരിൽ നിന്നും സന്തോഷമില്ലായ്മയും അതോടൊപ്പം അപ്പുപ്പനമ്മൂമ്മമാരിൽ(അമ്മയുടെ വശത്തുള്ള) നിന്നും പെങ്ങളുടെ ഭർത്താവിൽ നിന്നും ഉള്ള വിശ്വാസവഞ്ചനയും, ഈ ദോഷത്തിന്‍റെ ഫലങ്ങളായി കാണപ്പെടുന്നു. തർക്കങ്ങളാലും തെറ്റിധാരണകളാലും വൈവാഹിക ജീവിതം കീറിമുറിക്കപ്പെടാം, ജാതകന് ബഹുമാനവും ആദരവും ലഭിക്കുകയില്ല. ഇത്തരത്തിലുള്ള ജാതകൻ ആദ്ധ്യാത്മീകമായിരിക്കുവാൻ ശ്രമിക്കുകയും മനസ്സിലെ വിദ്വേഷത്തോട് പോരാടുകയും അതോടൊപ്പം ഈ പരിഹാരങ്ങൾ ചെയ്യുകയും വേണം:
     GHATAK_KALSARPA_YOGA_INTRO_TEXT        = പ്രചരിതമായ വിവരണ പ്രകാരം, ജാതകന്‍റെ ജനന ചാർട്ടിൽ രാഹു പത്താം ഭാവത്തിലും കേതു നാലാം  ഭാവത്തിലും ബാക്കിയുള്ള മറ്റ് ഗ്രഹങ്ങൾ ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ, അതായത് മറ്റ് എല്ലാ ഗ്രഹങ്ങളും പത്തും നാലും ഭാവങ്ങൾക്ക് മധ്യത്തിൽ നിൽക്കുമ്പോൾ ജനന ചാർട്ട് ഘടക കാലസർപ്പ ദോഷത്താൽ ബാധിക്കപ്പെട്ടിരിക്കുന്നു എന്ന് പറയുന്നു. ഈ ജാതകൻ തന്‍റെ ജീവിതത്തിൽ ഉടനീളം സന്തോഷത്തിനായി തിരയും എന്നാൽ ഇവരുടെ ജീവിതത്തിൽ എന്തൊക്കെ സന്തോഷങ്ങൾ വന്നാലും പോയാലും ഇവർ ഒരിക്കലും സന്തോഷവാന്മാർ ആവുകയില്ല. ജാതകൻ പിതാവിന്‍റെ വേർപാട് അഭിമുഖീകരിക്കും. വൈവാഹിക ജീവിതം അസന്തുഷ്ടകരമായിരിക്കും, വ്യവസായത്തിൽ അഹിതകരമായ പ്രശ്നങ്ങളും തടസങ്ങളും ഉണ്ടാകും എന്നാൽ സമ്പത്തിനോ പണത്തിനോ യാതൊരു ദാരിദ്ര്യവും ഉണ്ടാവുകയില്ല. അഥവാ ജാതകൻ ഏതെങ്കിലും ജോലിയിലോ സേവനത്തിലോ ആണെങ്കിൽ, ഉദ്യോഗത്തിൽ നിന്നും താത്കാലിക നീക്കം, പിരിച്ചുവിടൽ, പദവിതാഴ്ത്തൽ എന്നീ ഭയങ്ങൾ എല്ലായ്പ്പോഴും നിലനിൽക്കും. സുഹൃത്തുക്കളും ചതിച്ചുകൊണ്ടിരിക്കും. ജാതകൻ കൈക്കൂലി അല്ലെങ്കിൽ അനധികൃത പ്രവർത്തനങ്ങൾ എന്നിവയിൽ നിന്നും ഒഴിഞ്ഞു നിന്നാൽ, ജീവിതത്തിൽ ഒന്നിനും ദാരിദ്ര്യം ഉണ്ടാകുകയില്ല. ജാതകന് സാമൂഹികവിം രാഷ്ട്രീയവുമായ പ്രശസ്തി ലഭിക്കുന്നു. നിങ്ങളെ സ്വയം സംരക്ഷിക്കുന്നതിനായി താഴെ പറയുന്ന പരിഹാരങ്ങൾ അനുഷ്ഠിക്കുക :
     VISHDHAR_KALSARPA_YOGA_INTRO_TEXT      = പ്രചരിതമായ വിവരണ പ്രകാരം, ജാതകന്‍റെ ജനന ചാർട്ടിൽ രാഹു 11ആം ഭാവത്തിലും കേതു 5ആം  ഭാവത്തിലും ബാക്കിയുള്ള മറ്റ് ഗ്രഹങ്ങൾ ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ, അതായത് മറ്റ് എല്ലാ ഗ്രഹങ്ങളും 11ഉം 5ഉം ഭാവങ്ങൾക്ക് മധ്യത്തിൽ നിൽക്കുമ്പോൾ ജനന ചാർട്ട് വിഷധാര കാലസർപ്പ ദോഷത്താൽ ബാധിക്കപ്പെട്ടിരിക്കുന്നു എന്ന് പറയുന്നു. ഈ സാഹചര്യത്തി വിദ്യാഭ്യാസത്തിൽ പ്രശ്ങ്ങനങ്ങൾ ഉന്നത വിദ്യാഭ്യാസത്തിൽ തടസ്സങ്ങൾ എന്നിവ അഭിമുഖീകരിക്കുന്നു കൂടാതെ ഇത്തരത്തിലുള്ള ജാതകന് ഓർമ്മശക്തി വളരെ കുറവായിരിക്കും. അച്ഛന്‍റെ സഹോദരങ്ങൾ, അവരുടെ മക്കൾ കൂടാതെ മൂത്ത സഹോദരന്മാർ എന്നിവരുമായി തർക്കങ്ങളും അതോടൊപ്പം ദൂരയാത്രകളും ചില പ്രശ്നങ്ങൾ ഉണ്ടാക്കാം. ശാരീരിക വേദനകളും കുഞ്ഞു ജനിക്കുന്നതുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങളും ബുദ്ധിമുട്ടുകൾക്ക് കാരണമാകും. ഈ പ്രശ്നങ്ങൾ കൈകാര്യം ചെയ്യുന്നതിന്, ഇതാ ചില പരിഹാരങ്ങൾ:
     SHESHNAG_KALSARPA_YOGA_INTRO_TEXT      = പ്രചരിതമായ വിവരണ പ്രകാരം, ജാതകന്‍റെ ജനന ചാർട്ടിൽ രാഹു 12ആം ഭാവത്തിലും കേതു 6ആം  ഭാവത്തിലും ബാക്കിയുള്ള മറ്റ് ഗ്രഹങ്ങൾ ഈ രണ്ടു ഗ്രഹങ്ങൾക്കും മധ്യത്തിൽ നിൽക്കുമ്പോൾ, അതായത് മറ്റ് എല്ലാ ഗ്രഹങ്ങളും 12ഉം 6ഉം ഭാവങ്ങൾക്ക് മധ്യത്തിൽ നിൽക്കുമ്പോൾ ജനന ചാർട്ട് ശേഷനാഗ  കാലസർപ്പ ദോഷത്താൽ ബാധിക്കപ്പെട്ടിരിക്കുന്നു എന്ന് പറയുന്നു. ഈ സാഹചര്യത്തിൽ ജാതകന്‍റെ ആഗ്രഹങ്ങൾ വളരെ നാളുകൾക്ക് ശേഷം മാത്രമേ നിറവേറ്റപ്പെടുകയുള്ളു, ഉപജീവനത്തിനായി ദൂരത്തും അതിനപ്പുറവും യാത്ര ചെയ്യേണ്ടിവരും, കുപ്രസിദ്ധിയും തർക്കങ്ങളും പേടിച്ച് ജീവിക്കും. ചില പെരുമാറ്റങ്ങളാൽ ജാതകൻ പരിഹാസത്തിന് ഇരയാകും. എന്നിരുന്നാലും അവരുടെ ജീവിതകാലത്ത് ഒരിക്കൽ അവർ ആഗ്രഹിച്ച പ്രശസ്തിയും അധികാര സ്ഥാനവും അവർക്ക് ലഭിക്കും. ഈ പ്രശ്നങ്ങൾ കൈകാര്യം ചെയ്യുന്നതിന്, ഇതാ ചില പരിഹാരങ്ങൾ:
     ANNANT_KALSARPA_YOGA_REMEDY            = <li>പഠനത്തിൽ തടസ്സങ്ങളോ അറിവു നേടുന്നതിൽ പ്രശ്നങ്ങളോ ഉണ്ടായാൽ സരസ്വതീ ബീജ മന്ത്രം ഒരു വർഷം വരെ ജപിക്കുകയും പരിപൂർണ്ണ ആചാരനിഷ്ഠയോടേയും ഭക്തിയോടെയും സരസ്വതി ദേവിയെ ഭജിക്കുകയും ചെയ്യുക.</li><li> മഹാമൃത്യുജ്ജയ മന്ത്രം ഉരുവിടുകയോ അല്ലെങ്കിൽ മറ്റാരോടെങ്കിലും നിങ്ങൾക്കു വേണ്ടി ഉരുവിടുവാൻ പറയുകയോ ചെയ്യുക.</li><li>മംഗളകരമായ 3 സമയങ്ങളിൽ കൽക്കരി വെള്ളത്തിൽ ഒഴുക്കുക.</li><li>108 പ്രാവശ്യം ഹനുമാൻ ചാലിസ ഉരുവിടുക</li><li>ഒരു ലിറ്റർ വെള്ളത്തിൽ ദേവദാരു, കടുക്, ലോഹവൻ എന്നിവയിട്ട് തിളപ്പിക്കുക. തിളപ്പിച്ച ഈ വെള്ളം കുളിക്കുന്ന വെള്ളത്തിൽ ചേർക്കുക, 37 ദിവസം ഈ വെള്ളം ഉപയോഗിച്ച് കുളിക്കുക. </li>
     KULIK_KALSARPA_YOGA_REMEDY             = <li>വിദ്യയോ അറിവോ നേടുന്നതിൽ പ്രശ്നങ്ങൾ ഉണ്ടായാൽ സരസ്വതീ ബീജ മന്ത്രം ഒരു വർഷം വരെ ജപിക്കുകയും പരിപൂർണ്ണ ആചാരനിഷ്ഠയോടേയും ഭക്തിയോടേയും സരസ്വതി ദേവിയെ ഭജിക്കുകയും ചെയ്യുക.</li><li>108 പ്രാവശ്യം ഹനുമാൻ ചാലിസ ഉരുവിടുക</li><li>മംഗളകരമായ 3 സമയങ്ങളിൽ കൽക്കരി വെള്ളത്തിൽ ഒഴുക്കുക.</li><li>ശ്രാവണ മാസത്തിൽ 30 ദിവസം മഹാദേവന് അഭിഷേകം നടത്തുക.</li><li>ഒരു ലിറ്റർ വെള്ളത്തിൽ ദേവദാരു, കടുക്, ലോഹവൻ എന്നിവയിട്ട് തിളപ്പിക്കുക. തിളപ്പിച്ച ഈ വെള്ളം കുളിക്കുന്ന വെള്ളത്തിൽ ചേർക്കുക, 37 ദിവസം ഈ വെള്ളം ഉപയോഗിച്ച് കുളിക്കുക.</li><li>ശനിയാഴ്ചയും ചൊവ്വാഴ്ചയും വ്രതം അനുഷ്ഠിക്കുക കൂടാതെ ജോലിയിൽ എന്തെങ്കിലും പ്രതിബന്ധങ്ങൾ അഭിമുഖീകരിക്കേണ്ടി വന്നാൽ അമ്പലത്തിൽ പോയി ശനി ദേവന് കടുകെണ്ണ അർപ്പിക്കുക.</li><li>രാഹുവിന്‍റെ സ്വാധീനകാലത്ത്, ദിവസവും ഒരു ജപമാല രാഹു മന്ത്രം ഉരുവിടുകയും ഇത് നിങ്ങൾ 18000 പ്രാവശ്യം പൂർത്തിയാക്കുമ്പോൾ, രാഹുവിന് ഹവനം നടത്തുകയും ഉഴുന്നു പരിപ്പും നീല നിറത്തിലുള്ള വസ്ത്രവും നിർദ്ധനർക്ക് ദാനം ചെയ്യുക ചെയ്യുക. ഇത് അനുഷ്ഠിക്കുന്നത് വളരെ മംഗളകരമാണ്.</li>
     VASUKI_KALSARPA_YOGA_REMEDY            = </li> ഒരു വർഷം വരെ ദിവസവും നവ നാഗ സ്തോത്രം ഉരുവിടുക.</li><li>ഏതെങ്കിലും മംഗളകരമായ അവസരത്തിൽ നാഗ പാശ യന്ത്രം സ്വന്തമാക്കുക.</li><li>എല്ലാ ബുധനാഴ്ചയും രാഹു മന്ത്രം ഉരുവിട്ടതിനു ശേഷം ഒരു പിടി ഉഴുന്നു പരിപ്പ് അല്ലെങ്കിൽ പയറു പരിപ്പ് കറുത്ത തുണിയിൽ പൊതിഞ്ഞ് ഒരു ഭിക്ഷക്കാരനു നൽകുക. അഥവാ നിങ്ങൾക്ക് ഭിക്ഷക്കാരനെ കാണുവാൻ സാധിച്ചില്ലെങ്കിൽ അത് വെള്ളത്തിൽ ഒഴുക്കാവുന്നതാണ്. 72 ബുധനാഴ്ച ഈ പ്രവർത്തി ചെയ്യുന്നത് വളരെ ഗുണകരമാണ്. </li><li>രാഹുദശ അല്ലെങ്കിൽ അന്തർദശാ കാലത്ത് മഹാ മൃത്യുജ്ജയ മന്ത്രം 11 മാല ഉരുവിടുക. ചൊവ്വാഴ്ചകളിൽ ശനി ദേവന് എണ്ണകൊണ്ട് അഭിഷേകവും ഹനുമാന് വസ്ത്രവും അർപ്പിക്കുക. </li>
     SHANKPAAL_KALSARPA_YOGA_REMEDY         = <li>നിങ്ങളുടെ പ്രധാന കവാടത്തിൽ വെള്ളിയിലുള്ള സ്വാസ്തിക് സ്ഥാപിക്കുക. സ്വാസ്തിക്കിന് ഇരുവശവും ലോഹ നാഗങ്ങളെ ഒട്ടിക്കുക. </li><li>ശനിയാഴ്ചകളിൽ ശനി ദേവന് കടുകെണ്ണയാൽ അഭിഷേകം അർപ്പിക്കുക. </li><li>ദിവസവും ഹനുമാൻ ചാലീസ ഉരുവിടുക കൂടാതെ നിങ്ങളുടെ ആഹാരം ദിവസവും ഭക്ഷണമുറിയിൽ വച്ച് മാത്രം കഴിക്കുക. ഹനുമാൻ ചാലിസ 108 പ്രാവശ്യം ഉരുവിടുകയും ഹനുമാനു വേണ്ടി അഞ്ച് ചൊവ്വാഴ്ച വ്രതം അനുഷ്ഠിക്കുകയും കൂടാതെ മുല്ലപൂവിന്‍റെ എണ്ണ, കുഴമ്പ് രൂപത്തിലുള്ള സിന്ധൂരം, ലഡു എന്നിവ അർപ്പിക്കുക. </li><li>ഒരു ചെറിയ പാത്രത്തിലെ കടുകെണ്ണയിൽ നിങ്ങളുടെ മുഖം കാണുമ്പോൾ ഒരു നാണയം 3 പ്രാവശ്യം നിങ്ങളുടെ തലയ്ക്ക് ഉഴിയുക, ഈ നാണയം ഈ പ്രാത്രത്തിലിട്ട് പാവപ്പെട്ട ഒരാൾക്ക് ദാനം ചെയ്യുകയോ അല്ലെങ്കിൽ അരയാലിന്‍റെ ചുവട്ടിൽ അർപ്പിക്കുകയോ ചെയ്യുക. </li><li>മംഗളകരമായ സമയത്ത് ’സർവ്വതോഭദ്രമണ്ഡൽ യന്ത്രം’ പൂജിക്കുകയും അതിനു ശേഷം ധരിക്കുകയും ചെയ്യുക. </li><li>മംഗളകരമായ സമയത്ത് ഒറ്റക്കണ്ണുള്ള തേങ്ങ ഏഴു പ്രാവശ്യം നിങ്ങളുടെ മുകൾ ഭാഗത്ത് ഉഴിഞ്ഞ് ഏഴ് ബുധനാഴ്ചവരെ ഗംഗാ നദിയിലോ യമുന നദിയിലോ ഒഴുക്കുക. </li><li>37 ദിവസം വരെ പക്ഷികൾക്ക് ബാർലി തീറ്റയായി നൽകുക. </li>
     PADAM_KALSARPA_YOGA_REMEDY             = <li>ദിവസവും 11 പ്രാവശ്യം ഹനുമാൻ ചാലീസ ഉരുവിടുക. </li><li>എല്ലാ ശനിയാഴ്ചയും 8 പിടി നനഞ്ഞ കടലയും 11 പഴവും നിങ്ങളുടെ മുന്നിൽ വച്ചതിനു ശേഷം ഹനുമാൻ ചാലീസ 108 പ്രാവശ്യം ഉരുവിടുക, അതിനുശേഷം ഈ പഴങ്ങൾ കുരങ്ങന്മാർക്കു നൽകുക.</li><li> ലഡു, മുല്ലപൂവിന്‍റെ എണ്ണയിൽ അലിയിച്ച സിന്ധൂരം എന്നിവ ഹനുമാന് അർപ്പിക്കുക. അതോടൊപ്പം ശനി ദേവന് എണ്ണയാൽ അഭിഷേകം അർപ്പിക്കുക. </li><li>നിങ്ങളുടെ പ്രധാന കവാടത്തിൽ വെള്ളിയിലുള്ള സ്വാസ്തിക് സ്ഥാപിക്കുക. സ്വാസ്തിക്കിന് ഇരുവശവും ലോഹ നാഗങ്ങളെ ഒട്ടിക്കുക.</li><li>ശ്രാവണ മാസത്തിൽ, കുളി കഴിഞ്ഞതിനു ശേഷം, 11 ജപമാല ‘ഓം നമ: ശിവായ’ ഉരുവിടുക കൂടാതെ കൂവളത്തിന്‍റെ ഇല, പശുവിൻ പാൽ ഗംഗാ ജലം എന്നിവ ശിവന് അർപ്പിക്കുക.</li><li>ശുക്ല പക്ഷത്തിലെ 1-ആം ശനിയാഴ്ച മുതൽ 18-ആം ശനിയാഴ്ച വരെ വ്രതം അനുഷ്ഠിക്കുക കൂടാതെ കറുത്ത വസ്ത്രം ധരിക്കുകയും, 3 പ്രാവശ്യം അല്ലെങ്കിൽ 18 പ്രാവശ്യം രാഹുവിന്‍റെ  ബീജ മന്ത്രം ഉരുവുടുക. ദർവയും കുശയും ഒരു പാത്രത്തിൽ എടുത്ത് അരയാലിന്‍റെ ചുവട്ടിൽ അർപ്പിക്കുക. നിങ്ങളുടെ വ്രത കാലത്ത് മധുരമുള്ള ആഹാരങ്ങൾ കഴിക്കുകയും അതു തന്നെ ദാനം ചെയ്യുകയും ചെയ്യുക. നെയ്യ് ഒഴിച്ച് വിളക്ക് കത്തിച്ച് അരയാലിന്‍റെ ചുവട്ടിൽ വയ്ക്കുക. </li><li>അതോടൊപ്പം നാഗ പഞ്ചമി ദിവസത്തിലും വ്രതം അനുഷ്ഠിക്കുക.</li> 
     MAHAPADAM_KALSARPA_YOGA_REMEDY         = <li>ശ്രാവണ മാസത്തിൽ 30 ദിവസം ശിവന് അഭിഷേകം അർപ്പിക്കുക.</li><li>ഏതെങ്കിലും പുണ്യ നദിയുടെ സംഗമസ്ഥാനത്തുവെച്ച് നാഗകന്യകയുടെ വെള്ളിയിലുള്ള വിഗ്രഹം പൂർണ്ണമായ ആചാരാനുഷ്ഠാനങ്ങളോടെ പൂജിച്ച് അതേ നദിയിൽ ഒഴുക്കുക.</li><li>ഓരോ ശനിയാഴ്ചയും ചൊവ്വാഴ്ചയും രാമചരിത മാനസ്സിലെ സുന്ദര കാണ്ഡം 108 പ്രാവശ്യം ഉരുവിടുക. </li><li> ശുക്ല പക്ഷത്തിലെ 1-ആം ശനിയാഴ്ച മുതൽ 18-ആം ശനിയാഴ്ച വരെ വ്രതം അനുഷ്ഠിക്കുക കൂടാതെ കറുത്ത വസ്ത്രം ധരിക്കുകയും, 3 പ്രാവശ്യം അല്ലെങ്കിൽ 18 പ്രാവശ്യം രാഹുവിന്‍റെ  ബീജ മന്ത്രം ഉരുവുടുക. ദർവയും കുശയും ഒരു പാത്രത്തിൽ എടുത്ത് അരയാലിന്‍റെ ചുവട്ടിൽ അർപ്പിക്കുക. നിങ്ങളുടെ വ്രത കാലത്ത് മധുരമുള്ള ആഹാരങ്ങൾ കഴിക്കുകയും അതു തന്നെ ദാനം ചെയ്യുകയും ചെയ്യുക. നെയ്യ് ഒഴിച്ച് വിളക്ക് കത്തിച്ച് അരയാലിന്‍റെ ചുവട്ടിൽ വയ്ക്കുക. </li>
     TAKSHAK_KALSARPA_YOGA_REMEDY           = <li>മംഗളകരമായ മുഹൂർത്തത്തിൽ മൈസൂർ പരിപ്പ്  ഒഴുകുന്ന ജലത്തിൽ അർപ്പിക്കുക</li><li>അഞ്ച് ചൊവ്വാഴ്ചകളിൽ വ്രതം അനുഷ്ഠിക്കുക, കൂടാതെ മുല്ലപ്പൂവിന്‍റെ എണ്ണയിൽ കുഴച്ച സിന്ദൂരവും അതോടൊപ്പം ലഡ്ഡുവും ഹനുമാന് അർപ്പിക്കുകയും അത് വിതരണം ചെയ്യുകയും ചെയ്യുക. അവസാന ചൊവ്വാഴ്ച, കാൽ ഗ്രാം സിന്ദൂരവും കാൽ മീറ്റർ ചുവന്ന തുണിയും, കാൽ കിലോ ബതാഷയും, കാൽ കിലോ ലഡ്ഡുവും പ്രസാദമായി അർപ്പിക്കുകയും അതു തന്നെ വിതരണം ചെയ്യുകയും ചെയ്യുക.</li><li>കാൽ മാസം പക്ഷികൾക്ക് ചോളം തീറ്റയായി നൽകുക</li><li>ദേവദാരു, കടുക്, ലോഹവൻ എന്നിവ തിളപ്പിച്ച് അതിൽ കുളിക്കുക.</li>
     KARKOTAK_KALSARPA_YOGA_REMEDY          = <li>നിങ്ങളുടെ കിടപ്പു മുറിയിൽ ചുവന്ന നിറത്തിലുള്ള കർട്ടനുകൾ, കിടക്കവിരികൾ, തലയണ ഉറകൾ എന്നിവ ഉപയോഗിക്കുക.</li><li> കാൽ മാസം പക്ഷികൾക്ക് ചോളം തീറ്റയായി നൽകുക കൂടാതെ എല്ലാ ശനിയാഴ്ച്ചകളിലും ഉറുമ്പുകൾക്ക് പഞ്ചസാരയുടേയും സാട്ടുവിന്‍റേയും മിശ്രിതം തീറ്റയായി നൽകുക.</li><li> ഹനുമാൻ ചാലിസ 108 പ്രാവശ്യം വായിക്കുക കൂടാതെ മുല്ലപൂവിന്‍റെ എണ്ണയിൽ ചാലിച്ച സിന്ദൂരം, ലഡു എന്നിവ അർപ്പിച്ചുകൊണ്ട് അഞ്ച് ചൊവ്വാഴ്ചകളിൽ വ്രതം അനുഷ്ഠിക്കുക</li><li>ഒരു ശനിയാഴ്ച്ച, കടുകെണ്ണ നിറച്ച പാത്രത്തിൽ നിങ്ങളുടെ രൂപം കാണുക, അതിനുശേഷം ഒരു നാണയം നിങ്ങളുടെ തലയ്ക്കു മുകളിൽ മൂന്നു പ്രാവശ്യം ചുറ്റുക. ഈ നാണയം ആ പാത്രത്തിലെ എണ്ണയിൽ ഇട്ടതിനു ശേഷം ഒരു ഭിക്ഷക്കാരന് ദാനം ചെയ്യുകയോ  അല്ലെങ്കിൽ അരയാലിന്‍റെ ചുവട്ടിൽ അർപ്പിക്കുകയോ ചെയ്യുക.</li><li>ഒരു മംഗള മുഹൂർത്തത്തിൽ ഉണങ്ങിയ തേങ്ങ ഒഴുകുന്ന വെള്ളത്തിൽ മൂന്നു പ്രാവശ്യം അർപ്പിക്കുക.</li><li>ഒരു ശനിയാഴ്ച്ച കൽക്കരി ഒഴുകുന്ന വെള്ളത്തിൽ മൂന്നു പ്രാവശ്യം അർപ്പിക്കുക.</li>
     SHANKACHOOD_KALSARPA_YOGA_REMEDY       = <li>ഒരു മംഗള മുഹൂർത്തത്തിൽ, നിങ്ങളുടെ പ്രധാന കവാടത്തിൽ സ്വാസ്തിക് സ്ഥാപിക്കുക. കവാടത്തിന് ഇരുവശവും ലോഹ തകിടിൽ നിങ്ങളുടെ നാമം കൊത്തി ഒട്ടിക്കുക.</li><li>എല്ലാ തിങ്കളാഴ്ചകളിലും മഹാ മൃത്യുജ്ജയ കവച പാദം ചെയ്യുകയും ശിവ രുദ്ര അഭിഷേകം നടത്തുകയും ചെയ്യുക</li><li>വെള്ളിയിലുള്ള അസ്താതു നാഗം ചെയ്തു നിങ്ങളുടെ നടുവിരലിൽ ധരിക്കുക. </li><li>ഈ ദോഷത്തിന്‍റെ സ്വാധീനം കുറയ്ക്കുമെന്ന ദൃഡനിശ്ചയത്തോടു കൂടി ഒരു മാസത്തിലെ ആദ്യത്തെ ശനിയാഴ്ചമുതൽ 86 ശനിയാഴ്ച വരെ വ്രതം അനുഷ്ഠിക്കുക. വ്രതാനുഷ്ഠാന കാലത്ത് കറുത്ത നിറത്തിലുള്ള വസ്ത്രം ധരിക്കുകയും ശനി ദേവന് തിലാഭിഷേകം നടത്തുകയും ചെയ്യുക. ഇതോടൊപ്പം രാഹു ബീജ മന്ത്രജപം ചെയ്യുക. ജപത്തിനു ശേഷം പാത്രത്തിൽ വെള്ളം നിറയ്ക്കുക കൂടാതെ ദ്രുവും കുഷും ഉപയോഗിച്ച് ഇത് അരയാലിന്‍റെ ചുവട്ടിൽ അർപ്പിക്കുക.</li><li>നിങ്ങളുടെ ഭക്ഷണത്തിൽ മധുരമുള്ള മിച്ചർ, മധുരമുള്ള ചപ്പാത്തി, റവ്രി തിൽകൂട്ട് മുതലായവ ഉൾപ്പെടുത്തുക. ഇവ ഉപയോഗിക്കുന്നതിനു മുമ്പ് ഇതേ സാധനങ്ങൾ തന്നെ ദാനം ചെയ്യുക കൂടാതെ രാത്രിയിൽ നെയ്യ് വിളക്ക് കത്തിച്ച് അരയാലിന്‍റെ ചുവട്ടിൽ വയ്ക്കുക.</li>
     GHATAK_KALSARPA_YOGA_REMEDY            = <li>ഒരു വർഷം ഗണപതി അഥർവ്വശീർഷ പാദം നടത്തുക</li><li>ശനിയാഴ്ചകളിൽ വ്രതം അനുഷ്ഠിക്കുക കൂടാതെ ഒരു ശിവക്ഷേത്രത്തിൽ പോയി വെള്ളി നാഗപൂജ നടത്തുകയും കൂടാതെ നിങ്ങളുടെ പൂർവ്വികരെ മനസ്സിൽ ധ്യാനിച്ചുകൊണ്ട് ഭക്തിയോടെ ആ വെള്ളി നാഗത്തെ ഒഴുകുന്ന ജലത്തിൽ അർപ്പിക്കുകയും ചെയ്യുക.</li><li> എല്ലാ ചൊവ്വാഴ്ചകളിലും വ്രതം അനുഷ്ഠിക്കുകയും ഹനുമാൻ ചാലിസ വായിക്കുകയും കൂടാതെ മുല്ലപൂവിന്‍റെ എണ്ണയിൽ ചാലിച്ച സിന്ദൂരം, ലഡു എന്നിവ ഹനുമാന് ഭോജനമായി അർപ്പിക്കുക</li><li>ശനിയാഴ്ച വ്രതം അനുഷ്ഠിക്കുക, ശനി ദേവന് ‘തിലാഭിഷേകം’ നടത്തുക കൂടാതെ വൈഢൂര്യം, സ്വർണ്ണം, എള്ള്, ധാന്യങ്ങൾ, എണ്ണ, വസ്ത്രങ്ങൾ, ഉണങ്ങിയ തേങ്ങ, കമ്പിളി പുതപ്പുകൾ എന്നിവ പാവപ്പെട്ടവർക്ക് കാലാകാലങ്ങളിൽ ദാനം ചെയ്യുക.</li>
     VISHDHAR_KALSARPA_YOGA_REMEDY          = <li>കാൽ മാസം പക്ഷികൾക്ക് ചോളം തീറ്റയായി നൽകുക</li><li>ശ്രാവണമാസത്തിൽ മഹാദേവ അഭുഷേകം നടത്തുക</li><li>തിങ്കളാഴ്ച ദിവസം ശിവക്ഷേത്രത്തിൽ പോയി വെള്ളി നാഗപൂജ നടത്തുകയും കൂടാതെ നിങ്ങളുടെ പൂർവ്വികരെ മനസ്സിൽ ധ്യാനിച്ചുകൊണ്ട് ഭക്തിയോടെ ആ വെള്ളി നാഗത്തെ ഒഴുകുന്ന ജലത്തിൽ നിമഞ്ജനം ചെയ്ത് ഒഴുക്കുക.</li><li>‘ഓം ഹര ഹര മഹാദേവ’ എന്ന മന്ത്രം ജപിച്ചുകൊണ്ട്, എല്ലാ തിങ്കളാഴ്ചയും ശിവ ഭഗവാന് തൈര് കൊണ്ട് അഭിഷേകം നടത്തുക</li><li>ദേവദാരു, കടുക്, ലോഹവൻ എന്നിവ തിളപ്പിച്ച് അതെ വെള്ളത്തിൽ കുളിക്കുക.
     SHESHNAG_KALSARPA_YOGA_REMEDY          = <li>ഒരു മംഗള മുഹൂർത്തത്തിൽ, നിങ്ങളുടെ പ്രധാന കവാടത്തിൽ സ്വാസ്തിക് സ്ഥാപിക്കുക. കവാടത്തിന് ഇരുവശവും ലോഹ തകിടിൽ നിങ്ങളുടെ നാമം കൊത്തി ഒട്ടിക്കുക.</li><li> ഹനുമാൻ ചാലിസ 108 പ്രാവശ്യം വായിക്കുക കൂടാതെ മുല്ലപൂവിന്‍റെ എണ്ണയിൽ ചാലിച്ച സിന്ദൂരം, ലഡു എന്നിവ അർപ്പിച്ചുകൊണ്ട് അഞ്ച് ചൊവ്വാഴ്ചകളിൽ വ്രതം അനുഷ്ഠിക്കുക</li><li> കാൽ മാസം പക്ഷികൾക്ക് ചോളം തീറ്റയായി നൽകുക കൂടാതെ പുതുതായി എന്തെങ്കിലും ആരംഭിക്കുക</li><li>ഒരു മംഗള മുഹൂർത്തത്തിൽ, ഓം നമ: ശിവായ ഉരുവിട്ടുകൊണ്ട്, ഒരു 11 മണിയുള്ള ജപമാല ആരംഭിക്കുക, എന്നിട്ട് കുവളത്തിന്‍റെ ഇലയും പശുവിന്‍റെ പാലും ഉപയോഗിച്ച് ശിവലംഗത്തിൽ അഭിഷേകം നടത്തുക. ഈ ആചാരങ്ങൾക്കു ശേഷം ചെമ്പ് കൊണ്ടുള്ള നാഗം വച്ച് ശിവലിംഗത്തെ അലങ്കരിക്കുക.</li><li>അനുയോജ്യമായ അവസരത്തിൽ ഭിക്ഷക്കാർക്ക് തുവര പരിപ്പ് ദാനമായി നൽകുക കൂടാതെ നിങ്ങൾ വ്രതമനുഷ്ഠിച്ച് ആഹാരം കഴിക്കുക.</li><li> അനുയോജ്യമായ അവസരത്തിൽ ഈശ്വരസ്തുതിക്കുശേഷം നാഗ പാശ യന്ത്രം ധരിക്കുക. നിങ്ങളുടെ കിടക്കമുറിയിൽ ചുവന്ന നിറത്തിലുള്ള കർട്ടനുകളും കിടക്കവിരിയും ഉപയോഗിക്കുക.</li>
