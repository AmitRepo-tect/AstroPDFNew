
	RASI_ACCORDING_TO_VEDIC_ASTROLOGY_HINDI	= 
	RASI_ACCORDING_TO_VEDIC_ASTROLOGY			=  ವೇದ ಜ್ಯೋತಿಶ್ಶಾಸ್ತ್ರದ ಪ್ರಕಾರ ರಾಶಿ
	RASI_PREDICTION_1							= <p> ನೀವು ಕೆಂಪು ಅಥವಾ ಹಳದಿ ಬಣ್ಣದ ಉತ್ಪನ್ನಗಳಿಗೆ ಸಂಬಂಧ ವ್ಯಾಪಾರದಲ್ಲಿ ಲಾಭ ಹೊಂದುತ್ತೀರಿ. ಸ್ವಭಾವತಃ ನೀವು ಹಾಸ್ಯಪ್ರಜ್ಞೆಯವರೂ ಮತ್ತು ಕೆಂಪು ಬಣ್ಣದ ಪ್ರಕಾಶಮಾನವಾದ ಮುಖವುಳ್ಳವರೂ ಆಗಿದ್ದೀರಿ. ವಾರದಲ್ಲಿ ನಿಮ್ಮ ಅದೃಷ್ಟದ ದಿನಗಳು ಬುಧವಾರ, ಸೋಮವಾರ ಮತ್ತು ಮಂಗಳವಾರಗಳಾಗಿರುತ್ತವೆ. ನೀವು ಹಸುಗಳು, ಎಮ್ಮೆಗಳು ಮತ್ತು ಇತರ ಪ್ರಾಣಿಗಳ ಆರೈಕೆಯಲ್ಲಿ ಒಲವು ಹೊಂದಿರುತ್ತೀರಿ. ಸ್ವಭಾವತಃ ನೀವು ಸ್ವಲ್ಪ ಆಲಸಿಯಾದರೂ ಇತರರ ಕೆಲಸಗಳನ್ನು ಮಾಡಿಕೊದಲು ಯಾವಾಗಲೂ ಸಿದ್ಧರಾಗಿರುತ್ತೀರಿ. ನೀವು ಕನ್ಯಾ, ಕುಂಭ ಮತ್ತು ಮಿಥುನ ರಾಶಿಗೆ ಸೇರಿದ ಬಹಳಷ್ಟು ಸ್ನೇಹಿತರನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ನೀವು ಮಹತ್ವಾಕಾಂಕ್ಷೆಯವರೂ ಮತ್ತು ಪ್ರಗತಿಪರರೂ ಆಗಿರುತ್ತೀರಿ. 20, 26, 33ನೇಯ ವರ್ಷಗಳಲ್ಲಿ ನಿಮ್ಮನ್ನು ಜ್ವರ ಮತ್ತು ಶಸ್ತ್ರಾಸ್ತ್ರಗಳ ಭಯ ಕಾಡಬಹುದು. 45, 50, 55ನೆಯ ವರ್ಷಗಳು ಕಿರಿದಾದ ಜೀವನ ಮತ್ತು ಹಠಾತ್ ಸಾವಿನ ಭಯದಲ್ಲಿ ಕಳೆಯಬಹುದು. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p> 13, 1 ಮತ್ತು 7ನೆಯ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಜ್ವರದಿಂದ ಬಳಲುತ್ತೀರಿ. 3,12,5 ಮತ್ತು 16ನೆಯ ವರ್ಷಗಳು ಸರ್ಕಾರದ ಭಯವನ್ನು ತರುತ್ತವೆ. 32 ಹಾಗೂ 4ನೇ ವರ್ಷಗಳಲ್ಲಿ ಹಠಾತ್ ಸಾವಿನ ಭಯ ಕಾಡುತ್ತದೆ. ನಿಮ್ಮ 25ನೆಯ ವರ್ಷದಲ್ಲಿ ನೀವು ಮಗುವನ್ನು ಕಳೆದುಕೊಳ್ಳುವ ಸಾಧ್ಯತೆಗಳಿವೆ. 4ನೇ ಹಾಗೂ 8ನೇ ವರ್ಷದಲ್ಲಿ ವಾಹನಗಳ ಭಯವಿರುತ್ತದೆ 3, 12 ಹಾಗೂ 24ನೆಯ ವರ್ಷಗಳಲ್ಲಿ ವಿಷಪ್ರಾಶನದ ಮತ್ತು ಮುಳುಗುವ ಭಯವಿರುತ್ತದೆ. </p> <b style='padding-left:84%'>-Janmpradeep </ b>
	RASI_PREDICTION_2							= <p> ನೀವು ದೀರ್ಘವಾದ ಕೈಗಳಿರುವ ದಪ್ಪ ಶರೀರ ಹೊಂದಿರುತ್ತೀರಿ ಹಾಗೂ ಕೀಲುಗಳಲ್ಲಿ ಉರಿ ಮತ್ತು ಕೆಮ್ಮಿನ ಸಮಸ್ಯೆಗಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ವಾರದಲ್ಲಿ ನಿಮ್ಮ ಅದೃಷ್ಟದ ದಿನಗಳು ಶನಿವಾರ, ಬುಧವಾರ ಮತ್ತು ಶುಕ್ರವಾರಗಳಾಗಿರುತ್ತವೆ. ಭಾನುವಾರ ನಿಮಗೆ ದುರಾದೃಷ್ಟದ ದಿನ. ಕಹಿ ಮತ್ತು ಹುಳಿ ನಿಮಗೆ ಹೆಚ್ಚು ಹೊಂದುತ್ತದೆ ಹಾಗೂ ಡೈರಿ ಉತ್ಪನ್ನಗಳನ್ನು ತಿನ್ನುವುದು ನಿಮಗೆ ಇಷ್ಟವಾಗುತ್ತದೆ. ನಿಮ್ಮ ವ್ಯಾಪಾರ ಪಾಲುದಾರರು ಮಧ್ಯಮ ವರ್ಗದವರಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಜಿಪುಣ ಸ್ನೇಹಿತರಿಂದ ಸಂಕಟ ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ನೀವು ತೋಟಗಾರಿಕೆ ಮತ್ತು ಕೃಷಿಗ ಸಂಬಂಧಿಸಿದ ವ್ಯಾಪಾರದಿಂದ ಲಾಭ ಹೊಂದುತ್ತೀರಿ. ನೀವು ಮುಖ್ಯವಾಗಿ ತುಂಬ ಎತ್ತರದಂದ ಬೀಳುವ ಭಯ ಹೊಂದಿರುತ್ತೀರಿ ಮತ್ತು ಪ್ರತಿಸ್ಪರ್ಧಿಗಳ ಜೊತೆಗೂ ನಿರಾತಂಕವಾಗಿ ಮತ್ತು ಸಂತೋಷವಾಗಿರುತ್ತೀರಿ. ಮಧ್ಯಮ ಎತ್ತರವಿರುವ ಒಬ್ಬ ಮಧುರ ಪ್ರೇಮಿಯಾದ ನೀವು ಮೇಕ್ಅಪ್ ಮತ್ತು ಬಟ್ಟೆ ಧರಿಸುವುದರಲ್ಲಿ ಆಸಕ್ತಿ ಹೊಂದಿರುತ್ತೀರಿ. ನಿಮ್ಮ ಆರೋಗ್ಯ ಸಮಸ್ಯೆಗಳು ಪ್ರಾಥಮಿಕವಾಗಿ ನಿಮ್ಮ ಹೊಟ್ಟೆ ಮತ್ತು ಕತ್ತಿಗೆ ಸಂಬಂಧಿಸಿರುತ್ತವೆ. </p><p> 2, 4, 5, 7 ಹಾಗೂ 18ನೇ ವರ್ಷಗಳು  ನೋವನ್ನು ತರುತ್ತವೆ ಹಾಗೂ 32, 44, 40ನೇ ವರ್ಷಗಳು ರೋಗ ಮತ್ತು ನಷ್ಟವನ್ನು ತರುತ್ತವೆ. ನೀವು ಮಹಿಳೆಯರನ್ನು ಪ್ರೀತಿಸುತ್ತೀರಿ ಹಾಗೂ ಆಹಾರವನ್ನು ಅದು ಬೆಚ್ಚಗಿದ್ದಾಗ ತಿನ್ನಲು ಇಷ್ಟ ಪಡುತ್ತೀರಿ ಮತ್ತು ಕೆಮ್ಮು ಮತ್ತು ಶೀತದಿಂದ ಬಳಲುತ್ತೀರಿ. ನೀವು ಪುರಾತನ ಮತ್ತು ಸಂಗ್ರಾಹ್ಯ ವಸ್ತುಗಳ ಕಡೆಗೆ ಒಲವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p> ಸ್ತನ, ಕುತ್ತಿಗೆ ಮತ್ತು ಗಲ್ಲದ ಕಾಯಿಲೆಗಳು ನಿಮ್ಮನ್ನು ಕಾಡುತ್ತವೆ. ಮೂರನೇ ವರ್ಷದಲ್ಲಿ ಬೆಂಕಿಯ ಭಯವಿರುತ್ತದೆ. 19 ಮತ್ತು 32ನೇ ವರ್ಷಗಳು ಕೈ ಮತ್ತು ಕಾಲಿನಲ್ಲಿ ಗಾಯಗಳ ಜೊತೆಗೆ ಹಠಾತ್ ಸಾವಿನ ಸಾಧ್ಯತೆಗಳನ್ನು ತರುತ್ತದೆ. ನೀವು ಎರಡನೇ ಮದುವೆಯ ಸಾಕಷ್ಟು ಸಾಧ್ಯತೆಗಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ ಮತ್ತು ಸಾಮಾನ್ಯವಾಗಿ ಕೆಲವೇ ಒಡಹಟ್ಟಿದವರನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ಮಾಧವ ನವಮಿಯ ಶುಕ್ರವಾರ ಅಥವಾ ರೋಹಿಣಿ ನಕ್ಷತ್ರದಲ್ಲಿ ಸಾವು ಪ್ರಮುಖ ಸಾಧ್ಯತೆಗಳಾಗಿರುತ್ತವೆ. </p>-Yuvneshwar <p> ವರ್ಷದ 2, 5 ಮತ್ತು 9ರಲ್ಲಿ ನೀವು ಕಲ್ಲುಗಳು ಮತ್ತು ಸ್ತ್ರೀಯರ ಬಗ್ಗೆ ಎಚ್ಚರಿಕೆಯಿಂದಿರಬೇಕು. ನೀವು ನಿಮ್ಮ ಗುಪ್ತಾಂಗಗಳಲ್ಲಿ ರೋಗಗಳಿಂದಲೂ ಬಳಲುತ್ತೀರಿ. ನೀವು ದೊಡ್ಡ ಹಸಿವು ಹೊಂದಿರುತ್ತೀರಿ, ದಕ್ಷರಾಗಿರುತ್ತೀರಿ, ನೋವು ಅನುಭವಿಸುತ್ತೀರಿ, ಧಾರ್ಮಿಕ ಪ್ರವೃತ್ತಿಯವರಾಗಿರುತ್ತೀರಿ ಮತ್ತು ಶ್ರೀಮಂತರಾಗಿರುತ್ತೀರಿ. ಆರನೇ ಮತ್ತು 15ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ನೀರು, ಕೊಂಬಿರುವ ಪ್ರಾಣಿಗಳು, ವಿಷ, ಪರ್ವತ, ಕರಡಿಗಳು ಅಥವಾ ಪ್ರೇತಗಳಿಂದ ಬಳಲುತ್ತೀರಿ. 10, 25 ಮತ್ತು 45ನೇ ವರ್ಷಗಳು ಬೆಂಕಿಯ ಭಯ, ಗುಪ್ತ ಕಾಯಿಲೆಗಳು ಮತ್ತು ಭಾವನಾತ್ಮಕ ನಂಟಿನ ಭಯಗಳನ್ನು ತರುತ್ತವೆ. </p> <b style='padding-left:84%'>-Janmpradeep </ b> 
	RASI_PREDICTION_3							= <p>ನೀವು ಸಾರಗಳು ಮತ್ತು ನೋವಿನಿಂದ ಬಳಲುತ್ತೀರಿ. ಬುಧವಾರ, ಶುಕ್ರವಾರ ಮತ್ತು ಶನಿವಾರಗಳು ನಿಮ್ಮ ವಾರದ ಅದೃಷ್ಟದ ದಿನಗಳಾಗಿರುತ್ತವೆ. ನೀವು ಲೇಖಕ, ಸರ್ಕಾರೀ ಉದ್ಯೋಗಿಗಳು ಅಥವಾ ಬುದ್ಧಿಜೀವಿಗಳಾಗಿರುತ್ತೀರಿ. ನೀವು ಕಹಿ ಮತ್ತು ಹುಳಿಯನ್ನು ಇಷ್ಟಪಡುತ್ತೀರಿ. ಕಪ್ಪು ವಸ್ತುಗಳು ಅದೃಷ್ಟ ತರುತ್ತವೆ ಮತ್ತು ಬಿಳಿ ವಸ್ತುಗಳು ಕೆಟ್ಟ ಅದೃಷ್ಟ ತರುತ್ತವೆ. ನೀವು ಅಚ್ಚುಕಟ್ಟಾಗಿ ಸ್ವಚ್ಛವಾಗಿ ಮತ್ತು ಮುಂಗೋಪದವರಾಗಿರುತ್ತೀರಿ. ನೀವು ನಿಮ್ಮ ಸ್ವಂತ ವಾಹನ ಹೊಂದಿರುತ್ತೀರಿ ಮತ್ತು ಇತರರ ಹಣವನ್ನು ತೆಗೆದುಕೊಳ್ಳುವ ಜಾಣ್ಮೆ ಹೊಂದಿರುತ್ತೀರಿ. ನೀವು ಅನೇಕ ಮಹಿಳೆಯರ ಪುರುಷಾಗಿದ್ದು ... ಹೊಟ್ಟೆಯ ಕಾಯಿಲೆಗಳಿರುವ ಕಡಿಮೆ ಶ್ರೀಮಂತರಾಗಿರುತ್ತೀರಿ 5, 12,16 ಮತ್ತು 27ನೇ ವರ್ಷಗಳು ಬಹಳಷ್ಟು ವೇದನೆ ತರುತ್ತವೆ. ಜೀವನ 50ನೇ ವರ್ಷ ಹಠಾತ್ ಸಾವಿನ ಸಾಧ್ಯತೆಗಳನ್ನು ತರಬಹುದು </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p> ನಿಮ್ಮ ಭವಿಷ್ಯದ ಜೀವನಲ್ಲಿ ನೀವು ಒಬ್ಬ ಸಂತೃಪ್ತ ಮಧ್ಯಮ ವರ್ಗದವರಾಗಿರುತ್ತೀರಿ. ಜೀವನದ 16 ಹಾಗೂ18ನೇ ವರ್ಷಗಳು ನೀರಿನ ಭಯವನ್ನು ತರುತ್ತವೆ. 5ನೇ ವರ್ಷ ಕಿವಿಯ ಕಾಯಿಲೆಗಳನ್ನೂ ಮತ್ತು 24ನೇ ವರ್ಷ ನೋವಿನ ಭಯವನ್ನೂ ತರುತ್ತದೆ. 38ನೇ ವರ್ಷ ಹಠಾತ್ ಸಾವು ತರುತ್ತದೆ. ಒಂದು ದೀರ್ಘ ಜೀವನದ ನಂತರ ವೈಶಾಖದ 12ನೇ ವರ್ಷವಾದ ಹಸ್ತಾ ನಕ್ಷತ್ರದ 80ನೇ ವರ್ಷದಲ್ಲಿ ಬುಧವಾರ ಅಥವಾ ಶುಕ್ರವಾರ ನಿಮ್ಮ ಆತ್ಮ ನಿಮ್ಮ ದೇಹವನ್ನು ತ್ಯಜಿಸುತ್ತದೆ. ಜೀವನದ 3ನೇ, 10ನೇ ಮತ್ತು 6ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಮೂರು ಅಸಮತೋಲನಗಳಿಂದ ಬಳಲುತ್ತೀರಿ ಮತ್ತು ಪ್ರೇತ ಮತ್ತು ಉಪ್ಪಿನ ಭಯದಲ್ಲಿ ಜೀವನ ಮಾಡುತ್ತೀರಿ. 20ನೇ ಮತ್ತು 12ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಕುದುರೆಗಳು, ಹಾವು, ಆನೆ, ಪರ್ವತ ಮತ್ತು ನೀರಿನಿಂದ ಬಳಲುತ್ತೀರಿ. <br/> ಜೀವನದ 18ನೇ 9ನೇ 30ನೇ ಮತ್ತು 5ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಜ್ವರದಿಂದ ಬಳಲುತ್ತೀರಿ. ನೀವು ಹಾಸ್ಯಪ್ರಜ್ಞೆಯುಳ್ಳವರೂ ಶ್ರೀಮಂತರೂ, ತೆಳ್ಳಗಿರುವವರೂ ಆಗಿರುತ್ತೀರಿ ಮತ್ತು 8ನೇ ವರ್ಷದಲ್ಲಿ ಹೃದಯದ ಸಮಸ್ಯೆಗಳಿಂದ ಬಳಲುತ್ತೀರಿ. </p> <b style='padding-left:90%;'>-Yvan </ b> 
	RASI_PREDICTION_4							= <p> ಭಾನುವಾರ, ಸೋಮವಾರ, ಹಾಗೂ ಮಂಗಳವಾರ ಅದೃಷ್ಟಮಯವಾಗಿದ್ದರೆ ಬುಧವಾರ ದುರದೃಷ್ಟಕರವಾಗಿರುತ್ತದೆ. ಕೆಮ್ಮಿನ ಸಮಸ್ಯೆಗಳು, ಬಿಳಿಯ ಚರ್ಮ ಹಾಗೂ ಹಠಾತ್ ಸಾವಿನ ಮೂರು ಘಟನೆಗಳು. 2ನೇ 8ನೇ 21ನೇ ಮತ್ತು 29ನೇ ವರ್ಷಗಳು ರೋಗವನ್ನು ತರುತ್ತವೆ. ನೀವು ಡೊಂಕಾದ ತೆಳು ಕಾಲುಗಳು, ಇಬ್ಬರು ಹೆಂಡತಿಯರು ಮತ್ತು ನೀರಿನ ರೋಗವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ನೀವು ಸೊಂಟ, ತಲೆ ಮತ್ತು ಕಾಲುಗಳಲ್ಲಿ ನೋವು ಹೊಂದಿರುತ್ತೀರಿ, ಕಣ್ಣಿನ ದೃಷ್ಟಿಯ ದೌರ್ಬಲ್ಯ ಹೊಂದಿರುತ್ತೀರಿ, ಮತ್ತು ಕಳವರ್ಗದ ಜನರ ಜೊತೆ ಭಾವನಾತ್ಮಕ ಸಂಬಂಧವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ಶುಕ್ರವಾರ ನಿಮಗೆ ದುರಾದೃಷ್ಟದ ದಿನವಾಗಿರುತ್ತದೆ. ಕಪ್ಪು ಬಣ್ಣ ನಿಮಗೆ ದುರಾದೃಷ್ಟಕರವಾಗಿರುತ್ತದೆ ಮತ್ತು ಬಿಳಿ ಮತ್ತು ಕೆಂಪು ಅದೃಷ್ಟದ ಬಣ್ಣಗಳಾಗಿರುತ್ತವೆ. </ p><p> ನಿಮ್ಮ ಜೀವನದ 8ನೇ ವರ್ಷ ಮಳೆ, ನೀರು, ಗಾಳಿಯಿಂದ ಭಯ ತರುತ್ತದೆ. ನ ಸುಗಂಧಗಳಿಂದ ಲಾಭ ಹೊಂದುತ್ತೀರಿ. ನಿಮ್ಮ ಚಂದ್ರರಾಶಿ ಕಟಕ ಮಕರವಾಗಿರುವುದರಿಂದ ಸಂಕ್ರಾಂತಿಯ ದಿನದಂದು ನೀವು ಏನೇ ಖರೀದಿಸಿದರೂ ಅದು ದ್ವಿಗುಣಗೊಳ್ಳುತ್ತದೆ. ಗಾಳಿಯ-ಸಮಸ್ಯೆಗಳು ನಷ್ಟ ಧಾರಕರಾದ, ನೀವು 48 ಅಥವಾ 84ನೇ ವಯಸ್ಸಿನಲ್ಲಿ ಸಾಯುತ್ತೀರಿ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p> ನೀವು ನಿಮ್ಮ ಯೌವನದಲ್ಲಿ ಬಡವರಾಗಿದ್ದರೂ ಮಧ್ಯವಯಸ್ಸಿನಲ್ಲಿ ಸ್ಥಿತಿವಂತರಾಗಿರುತ್ತೀರಿ. ಜೀವನದ 3ನೇ ಮತ್ತು 7ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಜ್ವರದಂದ ಬಳಲುತ್ತೀರಿ. ಚಂದ್ರನು ವರ್ಷದ ಅಧಿಪತಿಯಾಗಿದ್ದಾಗ ನೀವು ನೀರಿನ ಭಯವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ ಹಾಗೂ ಸುಗಂಧವು ಅದೃಷ್ಟವನ್ನು ತರುತ್ತದೆ. ನಿಮ್ಮ ಜೀವನದ ಮೂರನೇ ವರ್ಷದಲ್ಲಿ ದೇಹದ ಎಡ ಭಾಗವು ಬೆಂಕಿಯ ಭಯವನ್ನು ಹೊಂದಿರುತ್ತದೆ. ಗುಪ್ತಾಂಗಗಳಲ್ಲಿ ರೋಗಗಳಿರುತ್ತವೆ, ತಲೆಯ ರೋಗ ಬರುತ್ತದೆ, ಹಾಗೂ ಇನ್ನುಳಿದಂತೆ ಸಂತೋಷದಿಂದಿರುತ್ತೀರಿ. ನೀವು 32 ವರ್ಷದವರಾಗಿದ್ದಾಗ ಹಠಾತ್ ಸಾವಿನ ಸಾಧ್ಯತೆಯಿರುತ್ತದೆ. 29ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಹಾವಿನ ಭಯ ಹೊಂದಿರುತ್ತೀರಿ. ನಿಮ್ಮ ಸಾವು ಮಾಘ ಶುಕ್ಲ ಅಥವಾ ಶುಕ್ಲ ನಕ್ಷತ್ರದ ಶುಕ್ರವಾರಕ್ಕೆ ಹತ್ತಿರವಾಗಿರುತ್ತದೆ. .<p> <b style='padding-left:90%;'>-Yvan</b> <p> ನಿಮ್ಮ ಜೀವನದ 4, 8, ಹಾಗೂ 12ನೇ ವರ್ಷ ನಿಮ್ಮ ತಲೆ, ಕಿವಿಗಳು ಮತ್ತು ಕಣ್ಣುಗಳು ಉರಿಯನ್ನು ಹೊಂದಿರುತ್ತವೆ. ಮೂರು ಗ್ರಹಗಳ ಅಸಮತೋಲನ  ಮೇಲುಗೈ ಸಾಧಿಸುತ್ತದೆ. ಜೀವನದ 16ನೇ ಮತ್ತು 24ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಮಹಿಳೆಯರು, ನೀರು, ಪ್ರೇತ, ಪರ್ವತಗಳ  ಮತ್ತು ಭಯ ಹೊಂದಿರುತ್ತೀರಿ ಹಾಗೂ ಗುಪ್ತಾಂಗಗಳಲ್ಲಿ ನೋವಿರುತ್ತದೆ. ನಿಮ್ಮ ಕೃಷಿ ಅಥವಾ ಹೊಲಗದ್ದೆಗಳನ್ನು ಹೊಂದಿದ್ದರೆ ನೀವು ಸಮರ್ಥರಾಗಿದ್ದೂ ಅಂಜುಬುರುಕರಾಗಿರುತ್ತೀರಿ. .</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_5							= <p> ವಾರದ ನಿಮ್ಮ ಅದೃಷ್ಟದ ದಿನಗಳೆಂದರೆ ಸೋಮವಾರ, ಮಂಗಳವಾರ ಮತ್ತು ಭಾನುವಾರಗಳಾಗಿದೆ. ನೀವು ತಿರುಳಿನ ರೋಗಗಳಿಂದ ಬಳಲುತ್ತೀರಿ, ಕಡಿಮೆ ಕೂದಲು ಹೊಂದಿರುತ್ತೀರಿ, ಯುದ್ಧದಿಂದ ಅದೃಷ್ಟ, ಇಬ್ಬರು ಪತ್ನಿಯರಿರುತ್ತಾರೆ ಹಾಗೂ ಒಬ್ಬಳು ಬಂಜೆಯಾಗಿರುತ್ತಾಳೆ. ಸೊಂಟದ ನೋವು, ಹೊಟ್ಟೆ ನೋವು, ಹಾಗೂ ಸಣ್ಣ ಹೃದಯದ ಸಮಸ್ಯೆಗಳಿರುತ್ತವೆ ಹಾಗೂ ತಲೆಯ ಗಾಯ ಮೇಲುಗೈ ಹೊಂದಿರುತ್ತವೆ. ಉನ್ನತ ಸೂರ್ಯನು ಬಹಳಷ್ಟು ಅದೃಷ್ಟ ತಂದರೆ ಕೆಳಮಟ್ಟದ ಸೂರ್ಯ ಮಹಿಳೆಯ ನಷ್ಟ, ನೀರಿನ ನಷ್ಟ ಲಾಭದ ಜೊತೆಗೆ ಭೂಮಿಯ ಲಾಭವನ್ನೂ ತರುತ್ತಾನೆ. ಜೀವನದ 4ನೇ ಮತ್ತು 8ನೇ ವರ್ಷದಲ್ಲಿ ಜ್ವರ ಬರುತ್ತದೆ. 28ನೇ ವರ್ಷದಲ್ಲಿ ಸರ್ಕಾರದ ಭಯವರುತ್ತದೆ. 51ನೇ ವರ್ಷ ನೋವು ತರುತ್ತದೆ. 30ನೇ ವರ್ಷ ನೋವುಭರಿತವಾಗಿರುತ್ತದೆ. ಸೂರ್ಯ ಅಧಿಪತಿಯಾಗಿರುವ ವರ್ಷಗಳು ಜೀವನದಲ್ಲಿ ಭಯ ತರುತ್ತವೆ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p> ಜೀವನದ ಮೊದಲ ವರ್ಷ ಕಾಮಾಲೆಯ ಭಯವನ್ನು ತರುತ್ತದೆ. 5ನೇ ವರ್ಷದಲ್ಲಿ ಪ್ರಾಣಿಗಳು ಮತ್ತು ಬೆಂಕಿಯ ಮೂಲಕ ಕೈ ಮತ್ತು ಕಾಲುಗಳಲ್ಲಿ ನೋವು ತರುತ್ತದೆ. 13ನೇ ವರ್ಷದಲ್ಲಿ  ಅತಿಸಾರದ ಭಯವಿರುತ್ತದೆ ಹಾಗೂ 32ನೇ ವರ್ಷದಲ್ಲಿ ವರ್ಷ ಹಠಾತ್ ಸಾವಿನ ಸಾಧ್ಯತೆಯಿರುತ್ತದೆ .7ನೇ ವರ್ಷದಲ್ಲಿ ಜ್ವರ ಆವರಿಸುತ್ತದೆ, 20ನೇ ವರ್ಷದಲ್ಲಿ ಹಾವುಗಳ ಭಯವಿರುತ್ತದೆ ಹಾಗೂ 21ರಲ್ಲಿ ರೋಗಗಳು ಬರುವ ಸಾಧ್ಯತೆಯಿರುತ್ತದೆ. ನೀವು ಯುದ್ಧದಲ್ಲಿ ಒಲವು ಹೊಂದಿರುತ್ತೀರಿ ಹಾಗೂ ನಿಮ್ಮನ್ನು ಕುಪ್ರಸಿದ್ಧರೂ ಹಾಗೂ ಹೋರಾಟಗಾರರೂ ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ. 28ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಗುಪ್ತಾಂಗಗಳ ನೋವಿನಿಂದ ಬಳಲುತ್ತೀರಿ. ನೀವು ಫಾಲ್ಗುಣ ಶುಕ್ಲದ ಐದನೇ ಸೋಮವಾರದಂದು ಅಶ್ವಿನಿ ನಕ್ಷತ್ರದಂದು ಸಾವನ್ನಪ್ಪುತ್ತೀರಿ. .</p> <b style='padding-left:90%;'>-Yvan</b> <p> 5ನೇ, 10ನೇ ಮತ್ತು 15ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಶಸ್ತ್ರಾಸ್ತ್ರಗಳು, ಅಗ್ನಿ, ನೀರು, ಉಸಿರಾಟ, ಮತ್ತು ಕಣ್ಣು ಮತ್ತು ಹೃದಯದ ನೋವಿನಿಂದ ಬಳಲುತ್ತೀರಿ. 30ನೇ ವರ್ಷದಲ್ಲಿ ಕಾಡು ಪ್ರಾಣಿಗಳ ಚೂಪಾದ ಹಲ್ಲು, ಚೂಪಾದ ಪಂಜದ ಭಯವಿರುತ್ತದೆ. 20ನೇ ವರ್ಷದಲ್ಲಿ ಹಾವುಗಳು, ಮಾಟ ಮಂತ್ರ, ಅಥವಾ ಜ್ವರದ ಭಯ ಕಾಡುತ್ತದೆ. ನೀವು ಧೈರ್ಯಸ್ಥರೂ, ಪ್ರಾಮಾಣಿಕರೂ, ನೇರವಂತರೂ, ಮಹಿಳಾ ವಿರೋಧಿಗಳೂ ಮತ್ತು ಕೆಲವೇ ಮಕ್ಕಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. .</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_6							= <p> ನೀವು ಸುಂದರವಾದ ಕಣ್ಣುಗಳು, ಉದ್ದನೆಯ ಕೂದಲು, ಹೆಚ್ಚುವರಿ ತಿರುಳು ಮತ್ತು ಬಿಳೀ ಮೈಬಣ್ಣವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ನೀವು ಇತರರಿಗೆ ಕೆಲಸ ಮಾಡುವಾಗ ಸೋಮಾರಿಗಳೂ ಮತ್ತು ನಿಮ್ಮ ಸ್ವಂತಕ್ಕೆ ಕೆಲಸ ಮಾಡುವಾಗ ಚುರುಕಾಗಿಯೂ ಇರುತ್ತೀರಿ. ನೀವು ಜನಪ್ರಿಯರಾಗಿರುತ್ತೀರಿ. </p> <p>. ಬರವಣಿಗೆ, ಕೃಷಿ, ಸಮಾಜ ಸೇವೆ ಸಂಪತ್ತು ತರುತ್ತದೆ. ಸೋಮವಾರ ದುರಾದೃಷ್ಟಕರವಾಗಿರುತ್ತದೆ. ಉನ್ನತ ಸ್ಥಾನ ನಾಶಕ್ಕೆ ಕಾರಣವಾಗಬಹುದು. </p><p> ಮೊದಲ ಪತ್ನಿ ನಜವಾಗಿಯೂ ಒಳ್ಳೆಯವಳಾಗಿರುತ್ತಾಳೆ. ಜೀವನದ 4ನೇ ಮತ್ತು 9ನೇ ವರ್ಷಗಳ ಕಣ್ಣಿನ ಸಮಸ್ಯೆಗಳನ್ನು ತರುತ್ತದೆ. ಜೀವನದ 50ನೇ, 28ನೇ, 30ನೇ ಮತ್ತು 47ನೇ ವರ್ಷಗಳು ನೋವುಂಟುಮಾಡುತ್ತವೆ. 50ನೇ ಮತ್ತು 60ನೇ ವರ್ಷಗಳು ಭೂಮಿ ಮತ್ತು ವಾಹನಗಳಿಂದ ಹಣ ತರುತ್ತವೆ. ಗುರು ಉನ್ನತ ಸ್ಥಾನದಲ್ಲಿದ್ದಲ್ಲಿ ನೀವು ಸ್ನೇಹಿತರಿಂದ ಒಳ್ಳೆಯ ಪ್ರಯೋಜನಗಳನ್ನು ಪಡೆಯುತ್ತೀರಿ. 30ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಮೂಲವ್ಯಾಧಿಯಿಂದ ಬಳಲುತ್ತೀರಿ. ನೀವು ಹೆಸರಾಂತ ಕುಟುಂಬದಲ್ಲಿ ಜನಿಸಿರುತ್ತೀರಿ. </p><p> ಜೀವನದ 5ನೇ ವರ್ಷ ಕಣ್ಣಿನಲ್ಲಿ ನೋವು ತರುತ್ತದೆ, 3ನೇ ವರ್ಷದಲ್ಲಿ ಬೆಂಕಿಯ ಭಯ ಕಾಡುತ್ತದೆ ಮತ್ತು 21ನೇ ವರ್ಷ ಗೋಡೆಗಳು ಅಥವಾ ಮರಗಳ ಭಯವನ್ನು ತರುತ್ತದೆ. ನಿಮ್ಮ ಗುಪ್ತಾಂಗಗಳು ಮತ್ತು ಕುತ್ತಿಗೆಯಲ್ಲಿ ಸಮಸ್ಯೆಗಳಿರುತ್ತವೆ. 13 ವರ್ಷದಲ್ಲಿ ವಾಂತಿ, 15ನೇ ವರ್ಷದಲ್ಲಿ ಹಾವುಗಳ ಭಯ, 30ನೇ ವರ್ಷದಲ್ಲಿ ಕಾಡುಗಳು, ಹಾವುಗಳು ಹಾಗೂ ಶಸ್ತ್ರಾಸ್ತ್ರಗಳು ಸಾವಿಗೆ ಕಾರಣರಾಗಬಹುದು. </ p> <p> ಜೀವನದ 18ನೇ, 12ನೇ ಮತ್ತು 6ನೇ ವರ್ಷಗಳು ನೋವು, ಕಲ್ಲುಗಳು, ಸ್ತ್ರೀಯರು, ಶಸ್ತ್ರಾಸ್ತ್ರಗಳು ಮತ್ತು ಬೆಂಕಿಯ ಭಯವನ್ನು ತರಬಹುದು. 36 ಮತ್ತು 24ನೇ ವರ್ಷಗಳು ಕಳ್ಳರು ಮತ್ತು ಬೆಂಕಿಯ ಭಯವನ್ನು ಉಂಟುಮಾಡಬಹುದು. ಕಣ್ಣುಗಳು ಮತ್ತು ಭಯವೂ ಕೂಡ. </p><p> ಜೀವಿತಾವಧಿ 90 ವರ್ಷಗಳಾಗಿದ್ದು ನೀವು ಧಾರ್ಮಿಕರೂ ಮತ್ತು ಪ್ರತಿಭಾವಂತರೂ ಆಗಿರುತ್ತೀರಿ. ಸುಂದರವಾದ ಕಣ್ಣುಗಳು, ಬಲವಾದ ಉಗುರುಗಳು, ಗೋಧಿ ಮೈಬಣ್ಣ, ಬೇರೆಯವರ ಸಂಪತ್ತಿನಲ್ಲಿ ಶ್ರೀಮಂತರಾದ ನೀವು ಪ್ರವಾಸಿಗರಾಗಿರುತ್ತೀರಿ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_7							= <p>ನೀವು ಸುಂದರವಾದ ಕಣ್ಣುಗಳು, ಮುಖ, ಗೋಧಿ ಮೈಬಣ್ಣ ಮತ್ತು ದೊಡ್ಡ ಗಡ್ಡವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ಸರ್ಕಾರಿ ನೌಕರರಿಗೆ ಪ್ರೀತಿ. ಬುಧವಾರ, ಶುಕ್ರವಾರ ಮತ್ತು ಶನಿವಾರ ಅದೃಷ್ಟದ ದಿನಗಳಾಗಿರುತ್ತವೆ. ಕೆಮ್ಮಿನಿಂದ ಬಳಲುತ್ತೀರಿ. ವಸ್ತುಗಳನ್ನು ಖರೀದಿಸುವುದರಿಂದ ಮತ್ತು ಮಾರಾಟ ಮಾಡುವುದರಿಂದ ಕಡಿಮೆ ಪ್ರಯೋಜನ ಹೊಂದಿರುತ್ತೀರಿ. ತಲೆ ಮತ್ತು ಮುಖಕ್ಕೆ ಗಾಯವಾಗುತ್ತದೆ. 8 ವರ್ಷದವರಾಗಿದ್ದಾಗ, ನೀವು ಎತ್ತರದಿಂದ ಬೀಳಬಹುದು ಹಾಗೂ ನೀವು ಒಳ್ಳೆಯ ಸ್ವಭಾವದವರೂ ಹಾಗೂ ಶ್ರೀಮಂತರೂ ಆಗಿರುತ್ತೀರಿ. ನೀವು ರಹಸ್ಯ ಪಾಪಿಗಳೂ ಇಬ್ಬರು ಪತ್ನಿಯರನ್ನು ಹೊಂದಿರುವವರೂ, ತೀರ್ಥಸ್ಥಳ ಸಂದರ್ಶಕರೂ, ಉತ್ತಮ ಸ್ವಭಾವದರೂ ಮತ್ತು ಪಂಡಿತರೂ ಆಗಿರುತ್ತೀರಿ. ಸೋಮಾರಿಯೂ, ಆಹಾರ ಧಾನ್ಯವನ್ನು ಸಂಗ್ರಹಿಸುವವರೂ ಮತ್ತು ಕೂದಲು ತುಂಬ ಬೇಗ ಬೆಳ್ಳಗಾಗುವವರೂ ಆಗಿರುತ್ತೀರಿ. ಶುಕ್ರನು ಉನ್ನತ ಸ್ಥಾನದಲ್ಲಿದ್ದಾಗ  ನೀವು ಸುಗಂಧದಿಂದ ಲಾಭ ಪಡೆಯುತ್ತೀರಿ. ನೀವು ಒಂದು ನದಿ ಅಥವಾ ಪರ್ವತದ ಬದಿಯಲ್ಲಿ ವಾಸಿಸಬಯಸುತ್ತೀರಿ. </p><p> 3ನೇ, 8ನೇ, 14ನೇ, 26ನೇ, 24ನೇ, 47ನೇ 55ನೇ ಹಾಗೂ 63ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಉಸಿರಾಟದ ಅಸ್ವಸ್ಥತೆಯಿಂದ ಬಳಲುತ್ತೀರಿ. ನೀವು ಕೆಮ್ಮಿನ ಸಮಸ್ಯೆಗಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. 84 ವರ್ಷದವರಾಗಿದ್ದಾಗಲೂ ನೀವು ಯುವಕರಂತೇ ಇರುತ್ತೀರಿ. 30ನೇ ವರ್ಷವು ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ಮತ್ತೊಂದು ಹೆಣ್ಣನ್ನು ತರುತ್ತದೆ. 12 ವರ್ಷ ನೀರಿನ ಭಯ, 18 ಬೆಂಕಿಯ ಭಯಗಳನ್ನು ತರುತ್ತದೆ. 21ರಲ್ಲಿ ಮರಗಳು ಅಥವಾ ವಾಹನಗಳಿಂದ ಸಮಸ್ಯೆಗಳು ಉಂಟಗುತ್ತವೆ. 20ನೇ ವರ್ಷದಲ್ಲಿ ಹಾವುಗಳ ಭಯ. ಸಾಮಾನ್ಯವಾಗಿ ಉದ್ಯಮಿ, ತೆಳ್ಳಗಿರುತ್ತೀರಿ ಮತ್ತು ಶ್ರೀಮಂತರಾಗಿರುತ್ತೀರಿ. ವೈಶಾಖ ಶುಕ್ಲ ದಶಮಿಯಂದು ಸಾವು. ಅಶ್ಲೇಷ ಮಂಗಳವಾರ. 7ನೇ, 14ನೇ ಮತ್ತು 20ನೇ ವರ್ಷಗಳಲ್ಲಿ ಸೂಕ್ಷ್ಮಜೀವಿಗಳ ಭಯ, ಕಟ್ಟಲ್ಪಡುವ ಭಯ ಅಥವಾ ಮೂರು ಅಂಶಗಳ ಭಯವನ್ನು ತರುತ್ತವೆ. 28ನೇ ಮತ್ತು 42ನೇ ವರ್ಷಗಳು ಆನೆಗಳ ಭಯ ಮತ್ತು ಕಲ್ಲುಗಳ ಭಯವನ್ನು ತರುತ್ತವೆ. 63ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಕೈ ಮತ್ತು ಕಾಲುಗಳ ನೋವಿನಿಂದ ಬಳಲುತ್ತೀರಿ. ನೀವು ಬಹಳಷ್ಟು ಗೌರವ ಪಡೆಯುತ್ತೀರಿ. ಉನ್ನತವಾದ ಕಣ್ಣುಗಳು, ದೊಡ್ಡ ಮುಖವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ, ದಾನಿಗಳ ಮತ್ತು ಉದ್ಯಮಿಗಳೂ ಅಗಿರುತ್ತೀರಿ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_8							= <p>ನೀವು ಹೆಚ್ಚುವರಿ ತಿರುಳು, ಒಂದು ಕೆಂಪು ವರ್ಣದ ಮೈಬಣ್ಣ ಹೊಂದಿರುತ್ತೀರಿ ಹಾಗೂ ಹಾಲು ಮತ್ತು ಹಾಲಿನ ಉತ್ಪನ್ನಗಳನ್ನು ಇಷ್ಟಪಡುತ್ತೀರಿ. ನಿಮ್ಮ ಅದೃಷ್ಟದ ದಿನಗಳು ಮಂಗಳವಾರ, ಹಾಗೂ ಸೋಮವಾರ ಮತ್ತು ದುರಾದೃಷ್ಟದ ದಿನ ಬುಧವಾರವಗಿರುತ್ತದೆ. </p> ಹುಳಿ ಮತ್ತು ಕಹಿಗಳು ಕೆಟ್ಟ ಅದೃಷ್ಟವನ್ನು ತರುತ್ತವೆ. ನೀವು ಯಾವಾಗಲೂ ನಿಮ್ಮ ಕನಸುಗಳನ್ನು ಮರೆಯುತ್ತೀರಿ. ದುರ್ಬಲರಾಗಿರುತ್ತೀರಿ ಸಮೃದ್ಧವಾದ ಪ್ರಾಣಿಗಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ, ಹಾಗೂ ಪೂರ್ವಜರು ಮತ್ತು ಯುದ್ಧ ಬಹಳಷ್ಟು ಹಣವನ್ನು ತರುತ್ತದೆ. ನೀವು ಕೆಟ್ಟದಾದ ದೇಹದ ವಾಸನೆ ಹೊಂದಿರುತ್ತೀರಿ, ಹಣ್ಣುಗಳಿಂದ ಲಾಭ ಮತ್ತು ನೀರಿನ ಭಯ ಹೊಂದಿರುತ್ತೀರಿ. </ p> <p> ಮಿಥುನ ಮತ್ತು ತುಲಾ ಅಧಿಪತ್ಯದ ತಿಂಗಳುಗಳು ನೋವನ್ನು ತರುತ್ತವೆ, ನೀವು  ತ್ವರಿತ ಏರಿಕೆ ಮತ್ತು ತ್ವರಿತ ಪತನವನ್ನು ಹೊಂದುತ್ತೀರಿ ಮತ್ತು ಪರಿಸ್ಥಿತಿಯನ್ನು ಬೇಗನೇ ಒಪ್ಪಿಕೊಳ್ಳುತ್ತೀರಿ. </ p><p> ನೀವು ತಪ್ಪು ಮಾಡುವವರಾಗಿದ್ದು ನಿಮ್ಮ ಸುತ್ತಲೂ ಶತ್ರುಗಳಿರುತ್ತಾರೆ. ವರ್ಷಗಳು 7 12, 14 ಮತ್ತು 28 ಉಸಿರಾಟದ ಸಮಸ್ಯೆಗಳನ್ನು ತರುತ್ತವೆ. 54ನೇ ವರ್ಷದಲ್ಲಿ. ಮತ್ತು ಗುರುವಿನ ವರ್ಷದಲ್ಲಿ ನೀವು ಪ್ರಮುಖ ನಷ್ಟದಿಂದ ಬಳಲುತ್ತೀರ. </ p><p> ನೀವು ಚಂದ್ರನನ್ನು ನೋಡಬಹುದಾದ ಸಮಯದ ಹತ್ತಿರದಲ್ಲಿ ನೀವು ಕೆಂಪು ಹಳದಿ ವಸ್ತುಗಳಿಂದ ಲಾಭ ಹಾಗೂ ಮಹಿಳೆಯರಿಂದ ಸಂತೋಷ ಪಡೆಯುತ್ತೀರಿ. 75 ವರ್ಷದವರಾಗಿದ್ದಾಗ ನಿಮಗೆ ಜ್ವರ ಬರುತ್ತದೆ. 25ನೇ ವರ್ಷ ಹಠಾತ್ ಸಾವಿನ ಭಯವನ್ನು ತರುತ್ತದೆ. 39ನೇ ವರ್ಷದ ಬೆಂಕಿಯ ಭಯವನ್ನು ತರುತ್ತದೆ. ನೀವು ಅನೇಕ ಮಕ್ಕಳನ್ನು ಹೊಂದುತ್ತೀರಿ. </ p><p> ನೀವು ಜಗಳ ಕಾಯುತ್ತೀರಿ, ಮಹಿಳೆಯರಿಂದ ದೂರ ಸರಿಯುತ್ತೀರಿ ಮತ್ತು ಸ್ನೇಹಿತರ ಜೊತೆ ವಿಶ್ವಾಸಘಾತುಕತನ ಮಾಡುತ್ತೀರಿ. ನೀವು, ಹಸ್ತಾ ನಕ್ಷತ್ರ ಬುಧವಾರ ಶುಕ್ಲಾ ದಶಮಿಯಲ್ಲಿ ಸಾವನ್ನಪ್ಪುತ್ತೀರಿ. </p><p> 8ನೇ, 16ನೇ, 24ನೇ ಹಾಗೂ 40ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಕಳ್ಳರು, ಬೆಂಕಿ, ವಿಷ, ಜ್ವರಗಳಿಂದ ಬಳಲುತ್ತೀರಿ. 32ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಬಂಧನ, ಗಾಯ ಮತ್ತು ಕ್ರಿಮಿಗಳ ಭಯ ಹೊಂದಿರುತ್ತೀರಿ. 72ರಲ್ಲಿ ನೀವು ನೀರಿನಿಂದ ಬಳಲುತ್ತೀರಿ. ಧೃಢಮನಸ್ಸಿನವರಾದ ನೀವು, ಗುಂಡಗಿನ ಎದೆ ಹೊಂದಿದ್ದು ನೀವು ಗೌರವಾನ್ವಿತರಾಗಿರುತ್ತೀರಿ ಹಾಗೂ ತಿರುಳಿನಿಂದ ಮುಕ್ತವಾಗಿರುತ್ತೀರಿ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_9							= <p>ನೀವು ತಿರುಳಿನಿಂದ ಬಳಲುತ್ತೀರಿ, ಬಿಳೀ ಬಣ್ಣ, ಕಂದು ಕೂದಲು, ಸುಂದರ ಕಣ್ಣುಗಳು, ಮೊಣಕಾಲಿನಲ್ಲಿ, ಮತ್ತು ಮೊಣಕಾಲಿನ ಹಿಂಭಾಗದಲ್ಲಿ ನೋವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ನೀವು ನಿಮ್ಮ ಸ್ವಂತ ಜನರೊಡನೆ ಜಗಳ ಮಾಡುತ್ತೀರಿ, ದೊಡ್ಡ ಆಹಾರಪ್ರಿಯರೂ ಪ್ರಾಣಿ ಹತ್ಯೆ ಮಾಡುವವರೂ ಹಾಗೂ ತೀರ್ಥಯಾತ್ರೆಗೆ ಭೇಟಿ ನೀಡುವವರೂ ಆಗಿರುತ್ತೀರಿ. 18ನೇ 24ನೇ 30ನೇ ಮತ್ತು 40ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ರೋಗದಿಂದ ಬಳಲುತ್ತೀರಿ. ಗುರುವಾರ, ಮಂಗಳವಾರ ಮತ್ತು ಸೋಮವಾರ ಅದೃಷ್ಟಕರವಾಗಿರುತ್ತದೆ ಹಾಗೂ ಶನಿವಾರ ಪ್ರತಿಕೂಲವಾಗಿರುತ್ತದೆ. ನೀವು ಮೂರು ಪತ್ನಿಯರನ್ನು ಹೊಂದುತ್ತೀರಿ. ಮಾಘ ತಿಂಗಳು ನಿಮಗೆ ಹೊಂದುತ್ತದೆ, ಕರ್ಕ ತಿಂಗಳು ಪ್ರತಿಕೂಲವಾಗಿರುತ್ತದೆ. .</p> <p> ಗುರು ಅನುಕೂಲಕರವಾಗಿದ್ದಲ್ಲಿ ಕಡಿಮೆ ಕಷ್ಟಗಳಿರುತ್ತವೆ. ನಿಮ್ಮ ತಾಯಿ ಕಷ್ಟವನ್ನನುಭವಿಸುತ್ತಾರೆ ನೀವು ಬಹಳಷ್ಟು ಹಣ ಕಳೆದುಕೊಳ್ಳುತ್ತೀರಿ ಮತ್ತು ನೀವು ಏನಾದರೂ ಮಾಡುವುದರಲ್ಲಿ ತೊಂದರೆಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. </p> <p> ಮೂಲಾ ನಕ್ಷತ್ರವಾಗಿದ್ದಾಗ ಮನಸ್ಸಿನ ಸಮಸ್ಯೆಗಳು ಉದ್ಭವಿಸುತ್ತವೆ ಸೂರ್ಯ ಕರ್ಕದಲ್ಲಿದ್ದಾಗ ನೋವು ಮತ್ತು ಚರ್ಮ ರೋಗ ಬರುತ್ತದೆ. ವರ್ಷಗಳು 7, 14 16 20, 35 ಮತ್ತು 25 ಗಾಯ ಮತ್ತು ನೋವು ತರುತ್ತವೆ. </p><p> ಕೆಂಪು, ಹಳದಿ ಮತ್ತು ಬಿಳಿ ಉತ್ಪನ್ನಗಳು ಅದೃಷ್ಟ ತರುತ್ತವೆ. 64 ವರ್ಷಗಳು ಗರಿಷ್ಠ ವಯಸ್ಸಾಗಿದೆ. ಇದಲ್ಲದೆ ಮೊದಲ ವರ್ಷ ರೋಗದ ವರ್ಷವಾಗಿದೆ. 13ನೆಯದು ಹಠಾತ್ ಸಾವನ್ನು ತರಬಹುದು. ಯುವಕರಾಗಿದ್ದಾಗ ನೀವು ಕಡಿಮೆ ಶ್ರೀಮಂತರಾಗಿರುತ್ತೀರಿ, ಕಡಿಮೆ ಮಕ್ಕಳನ್ನ ಹೊಂದಿರುತ್ತೀರಿ, ಕುಟುಂಬದ ಸದಸ್ಯರ ರೋಗಗಳ ಬಗ್ಗೆ ಯಾವಾಗಲೂ ಚಿಂತೆ ಮಾಡುತ್ತಿರುತ್ತೀರಿ, ಕಾಮಾಸಕ್ತಿಯುಳ್ಳವರಾಗಿರುತ್ತೀರಿ ಹಾಗೂ ಚರ್ಮ ರೋಗಗಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ, ಮತ್ತು ತಿನ್ನುಬಾಕನಾಗಿರುವುದಿಲ್ಲ. ನೀವು ಆಷಾಢ ಕೃಷ್ಣ ಪಂಚಮಿಯ ಶುಕ್ರವಾರ ಸಾವನ್ನಪ್ಪುತ್ತೀರಿ. 18, 27, 9ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಉಸಿರಾಟದ ಕಾಯಿಲೆಗಳು, ಬೆಂಕಿಯ ಭಯ, ಕೊಂಬಿನ ಪ್ರಾಣಿಗಳು ಮತ್ತು ಮುಳ್ಳಿನ ಪ್ರಾಣಿಗಳ ಭಯವನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. </ P><p> 54 ಮತ್ತು 36ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಮೂಲವ್ಯಾಧಿ ಅಥವಾ ಮೂರು ಅಸಮತೋಲನಗಳಿಂದ ಬಳಲುತ್ತೀರಿ. ರಕ್ತದ ತೊಂದರೆಗಳು, ತಲೆ ಕಾಯಿಲೆಗಳ ಮೇಲುಗೈ ಮುಂದುವರಿಯುತ್ತದೆ. ನೀವು ಬುದ್ಧಿವಂತರಾಗಿದ್ದು ಯಜ್ಞಗಳನ್ನು ಮಾಡುತ್ತಿದ್ದರೂ ಜೀವನ ಕಠಿಣವಾಗಿರುತ್ತದೆ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_10							= <p> ನೀವು ತಿರುಳಿನಿಂದ ಬಳಲುತ್ತೀರಿ. ಕೈ ಮತ್ತು ಮೊಣಕಾಲುಗಳಲ್ಲಿ ನೋವು, ಸೊಂಟದ ತೊಂದರೆಗಳ ಜೊತೆ ಧೈರ್ಯಶಾಲಿಗಳಾಗಿರುತ್ತೀರಿ. ನಿಮಗೆ ಅದೃಷ್ಟದ ದಿನಗಳು ಬುಧವಾರ, ಶನಿವಾರ ಮತ್ತು ಶುಕ್ರವಾರಗಳಾಗಿದ್ದು ದುರಾದೃಷ್ಟದ ದಿನ ಭಾನುವಾರವಾಗಿರುತ್ತದೆ. </p> <p> ಮಾಘ ಭಾದ್ರಪದ ತಿಂಗಳಿನಲ್ಲಿ ಮತ್ತು ಚಂದ್ರನು ಸಿಂಹದಲ್ಲಿದ್ದಾಗ ನಷ್ಟ ಮತ್ತು ಕಾಯಿಲೆಗಳ ದೊಡ್ಡ ಸಾಧ್ಯತೆಗಳಿರುತ್ತವೆ. 8, 16, 20, 30, 34ನೇ ವರ್ಷಗಳು ಬಹಳಷ್ಟು ನೋವು ತರುತ್ತವೆ. </ p><p>  ವರ್ಷ 44 ಮತ್ತು 59 ನೋವಿನಿಂದ ತುಂಬಿರುತ್ತವೆ. ನೀವು ಎರಡು ಕುರೂಪಿ ಪತ್ನಿಯರನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ಶನಿಯ ಆಳ್ವಿಕೆಯ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಕಪ್ಪು ವಸ್ತುಗಳಿಂದ ಲಾಭ ಪಡೆಯುತ್ತೀರಿ. ಸ್ವಲ್ಪ ಎತ್ತರವಿರುವ ನೀವು ಏಳನೇ ವರ್ಷದಲ್ಲಿ ಗೌರವ ಪಡೆಯುತ್ತೀರಿ ಹಾಗೂ ನೀರಿನ ಭಯ ಹೊಂದಿರುತ್ತೀರಿ. ನೀವು ಬುದ್ಧಿವಂತರಾಗಿದ್ದೀರಿ. 21ನೇ ವರ್ಷ ಜ್ವರ ತರುತ್ತದೆ ಮತ್ತು 32ನೇ ಮತ್ತು 5ನೇ ವರ್ಷಗಳು ಜ್ವರ ತರುತ್ತವೆ. 25ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಎಡಬದಿಗೆ ಬೆಂಕಿ ಭಯವನ್ನು ಹೊಂದುತ್ತೀರಿ. 35ರಲ್ಲಿ ಇತರ ಸ್ತ್ರೀಯರನ್ನು ಕಾಮಿಸುತ್ತೀರಿ ಮತ್ತು ಶತ್ರುಗಳ ಭಯ ಹೊಂದಿರುತ್ತೀರಿ. 10-20 ವರ್ಷಗಳಲ್ಲಿ ದೃಷ್ಟಿ ಸಮಸ್ಯೆಗಳು, ಚರ್ಮದ ಕಾಯಿಲೆ, ನೀರು ಮತ್ತು ವಿಚಿತ್ರಜೀವಿಗಳು, ಮತ್ತು ಶಸ್ತ್ರಾಸ್ತ್ರಗಳ ಭಯವಿರುತ್ತದೆ. 30 ವರ್ಷಗಳಾಗಿದ್ದಾಗ ಕಣ್ಣಿನ ಸಮಸ್ಯೆಗಳಿರುತ್ತವೆ. 40ರಿಂದ60 ವರ್ಷಗಳಾಗಿದ್ದಾಗ, ಅಂಟುಗಂತಿ ಮತ್ತು ಮಹಿಳೆ ಮತ್ತು ವಿಷದ ಭಯ. ನೀವು ಕಡಿಮೆ ಹಣವಿರುವ ಒಬ್ಬ ಜೂಜುಕೋರರಾಗಿರುತ್ತೀರಿ ಜಿಪುಣರಾಗಿರುತ್ತೀರಿ ಮತ್ತು ಯಾವಾಗಲೂ ಕೆಟ್ಟ ಜನರ ಸಂಗದಲ್ಲಿರುತ್ತೀರಿ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_11							= <p>ನೀವು ಹೊಟ್ಟೆಯ ಸಮಸ್ಯೆಗಳು, ಹೊಟ್ಟೆಯಲ್ಲಿ ಗಡ್ಡೆಗಳು, ಕೆಮ್ಮು ಮತ್ತು ಶೀತವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ಪ್ರತಿಕೂಲ ದಿನಗಳು ಶುಕ್ರವಾರ, ಬುಧವಾರ ಮತ್ತು ಭಾನುವಾರವಾಗಿರುತ್ತವೆ. ನೀವು ಬಿಳೀ ಮೈಬಣ್ಣ, ಸುಂದರ ಕಣ್ಣುಗಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ ಮತ್ತು ಶ್ರೀಮಂತರೂ ಮತ್ತು ಸಂತೃಪ್ತರೂ ಆಗಿರುತ್ತೀರಿ. </ p> <p> ನೀವು ಸತ್ಭೀಷ ನಕ್ಷತ್ರ ಅಥವಾ ದ್ವಿತೀಯ ತಿಥಿಯಂದು ಸಾವನ್ನಪ್ಪುತ್ತೀರಿ. ನೀವು ಇಬ್ಬರು ಪತ್ನಿಯರು ಮತ್ತು ಸಣ್ಣ ಜೀವಿತಾವಧಿಯನ್ನು ಹೊಂದಿದ್ದು ವಸ್ತುಗಳನ್ನು ಸಂಗ್ರಹಿಸಲು ಇಷ್ಟಪಡುತ್ತೀರಿ. </p> <p> ನೀವು ಕುಟುಂಬದಲ್ಲಿ ಹಿರಿಯರಾಗಿರುತ್ತೀರಿ, ಗೋಧಿ ಮೈಬಣ್ಣ ಹೊಂದಿರುತ್ತೀರಿ, ಪ್ರೀತಿಯ ಪತ್ನಿ, ಮಕ್ಕಳಿಲ್ಲದ ಪತ್ನಿಯಾಗಿದ್ದು ನಿಮ್ಮ ಸೊಂಟದ ಮೇಲೆ ಒಂದು ಗುರುತಿರುತ್ತದೆ. </ p><p> ನೀವು ಸಮುದ್ರದಿಂದ ಹಣ ಮಾಡುತ್ತೀರಿ. ಅದೃಷ್ಟದ ದಿನಗಳು ಸೋಮವಾರ, ಗುರುವಾರ, ಹಾಗೂ ಮಂಗಳವಾರವಾಗಿರುತ್ತದೆ ಮತ್ತು ಶುಕ್ರವಾರ ಆಷ್ಟೇನೂ ಅದೃಷ್ಟಕರವಲ್ಲ. ನಿಮ್ಮ ಗುರು ದುರ್ಬಲನಾಗಿದ್ದಲ್ಲಿ ಅಥವಾ ಪಾಪಿಯಾಗಿದ್ದಲ್ಲಿ ನೀವು ಪ್ರಾರ್ಥನೆ ಮಾಡಬೇಕು. ಗುರು ಕೆಳಮಟ್ಟದಲ್ಲಿದ್ದಲ್ಲಿ ವ್ಯವಹಾರದಲ್ಲಿ ನಷ್ಟ. ನಿಮಗೆ ಪುತ್ರಪ್ರಾಪ್ತಿಯಾಗುತ್ತದೆ. 2, 4, 9, 12ನೇ ವರ್ಷಗಳಲ್ಲ ನೀವು ಹೊಟ್ಟೆಯ ಕಾಯಿಲೆಗಳಿಂದ ಬಳಲುತ್ತೀರಿ. ಈ ವರ್ಷಗಳು ನೋವು ತರುತ್ತವೆ ಮತ್ತು ನೀವು ವಿಫಲರಾಗುತ್ತೀರಿ. </ p> <p> ನಿಮಗೆ ಸಹಾಯ ಮಾಡುವ ಬುದ್ಧಿಯಿದ್ದು ನಿಮ್ಮ ಕೆಲಸದಲ್ಲಿ ಸೋಮಾರಿಯಾಗಿರುತ್ತೀರಿ. 32, 19 ಕಾಯಿಲೆಗಳನ್ನು ತರುತ್ತವೆ. ಕಹಿ ಅಥವಾ ಹುಳಿ ಔಷಧಿಗಳು ನಿಮಗೆ ಒಳ್ಳೆಯದು. </p> <p> ಸೂರ್ಯನು ಕುಂಭ ರಾಶಿಯಲ್ಲಿದ್ದಾಗ ನೀವು ಸಿಹಿಯನ್ನು ಇಷ್ಟಪಡುತ್ತೀರಿ ಹಾಗೂ ಕ್ಷಯರೋಗದಿಂದ ಬಳಲುತ್ತೀರಿ. ನೀವು ಚೆನ್ನಾಗಿ ಮಾತನಾಡುತ್ತೀರಿ ಹಾಗೂ ವೃತ್ತಿಪರ ಜೀವನದಲ್ಲಿ ಪ್ರಕ್ಷುಬ್ಧರಾಗಿರುತ್ತೀರಿ. ಮೊದಲ ವರ್ಷದಲ್ಲಿ ರೋಗ ಹೊಂದಿದ್ದು ಮೂರು ಸಹೋದರರಿರುತ್ತಾರೆ ಮತ್ತು ನಿಮ್ಮ ಎಡಗೈ ಮೇಲೆ ಗುರುತಿರುತ್ತದೆ. ನೀವು ಇಬ್ಬರು ಪತ್ನಿಯರನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. 5 ಮತ್ತು 6ನೇ ವರ್ಷಗಳಲ್ಲಿ ನೀವು ಬಡತನವನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. 15ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ಬೆಂಕಿ, 12ನೇ ವರ್ಷದಲ್ಲಿ ನೀರು ಮತ್ತು ಹಾವುಗಳ ಭಯವನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ಶೀಘ್ರ ಕೋಪಿ, ಲಂಪಟರು, ಸ್ವಾರ್ಥಿಗಳು, ಭಾರೀ ಕಾಯದವರು ಮತ್ತು ಕೆಲಸದಲ್ಲಿ ಪ್ರಕ್ಷುಬ್ಧರು ಹಾಗೂ ಹಠಮಾರಿಗಳು. ನೀವು ಉದ್ದನೆಯ ಕತ್ತು ಎತ್ತರದ ನಿಲುವು ಮತ್ತು ಕೂದಲನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ಚಂದ್ರನ ಮೇಲೆ ದೃಷ್ಟಿಯಿದ್ದಲ್ಲಿ ನೀವು 80 ವರ್ಷದವರೆಗೆ ಜೀವಿಸುತ್ತೀರಿ. ನೀವು ಕೃಷ್ಣ ಭದ್ರಪದ ನವಮಿ ರೋಹಿಣಿಯಂದು ಸಾವನ್ನಪ್ಪುತ್ತೀರಿ </ p><p> 11ನೇ ವರ್ಷ ದಲ್ಲಿ ನೀವು ನೀರಿನಿಂದ ನೋವು ಅನುಭವಿಸುತ್ತೀರಿ.; ಸಾಮಾನ್ಯವಾಗಿ ನೀವು ಯಾವಾಗಲೂ ನೀರಿಗೆ ಭಯಪಡುತ್ತೀರಿ. 16ರಲ್ಲಿ ದುಷ್ಟ ಮಹಿಳೆಯರು ಅಥವಾ ಶಸ್ತ್ರಾಸ್ತ್ರಗಳ ಭಯ. 21ರಲ್ಲಿ ಹಾವುಗಳು ಮತ್ತು ಅಗೌರವದ ಆತಂಕಗಳು. 25ರಲ್ಲಿ ನೀವು ಮೂರು ಅಸಮತೋಲನಗಳನ್ನು ಎದುರಿಸುತ್ತೀರಿ ಮತ್ತು 11, 22, 33ರಲ್ಲಿ ನೀವು ಉರಿ ಮತ್ತು ಕಾಡು ಪ್ರಾಣಿಗಳ ಭಯವನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. 66 ಮತ್ತು 44ರಲ್ಲಿ ನೀವು ನಿಮ್ಮ ಹಲ್ಲು, ಕಣ್ಣು, ಕಿವಿಯ ಸಮಸ್ಯೆಗಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. ನಿಮ್ಮ ಸೊಂಟದ ಮತ್ತು ಕೈ ಮೇಲೆ ಗುರುತಿರುತ್ತದೆ. ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ಇತರರ ಹಣದಲ್ಲಿ ಬದಕು ಸಾಗಿಸುತ್ತೀರಿ ಮತ್ತು ಜೂಜುಕೋರರಾಗಿರುತ್ತೀರಿ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_12							= <p> ನೀವು ಶಸ್ತ್ರಚಿಕಿತ್ಸೆಗಳು ಅಥವಾ ಅಪಘಾತಗಳಿಂದಾಗಿ ಸಾಕಷ್ಟು ರಕ್ತಸ್ರಾವವನ್ನು ಎದುರಿಸುತ್ತೀರಿ. ಐಷಾರಾಮಿತನವನ್ನು ಇಷ್ಟಪಡುವ ನೀವು, ಒಂದು ಉಜ್ಜ್ವಲವಾದ ಮೈಬಣ್ಣ, ಸುಂದರವಾದ ಕಣ್ಣುಗಳನ್ನು ಹೊಂದಿರುತ್ತೀರಿ ಬಟ್ಟೆ ಧರಿಸುವುದನ್ನು ಹಾಗೂ ಸಂಗೀತವನ್ನು ಪ್ರೀತಿಸುತ್ತೀರಿ ಹಾಗೂ ಕಾಮಾಸಕ್ತಿಯುಳ್ಳವರಾಗಿರುತ್ತೀರಿ ಮತ್ತು ನಿಮ್ಮ ದೇಹದ ಎಡಭಾಗದಲ್ಲಿ ನೋವು ಅನುಭವಿಸುತ್ತೀರಿ. ನೀವು ಶ್ರೀಮಂತರೂ ಉತ್ತಮ ಸ್ವಭಾವದವರೂ ಮತ್ತು ಸಂತೃಪ್ತರೂ ಆಗಿರುತ್ತೀರಿ, ಅತಿಥಿಯನ್ನು ಪ್ರೀತಿಸುತ್ತೀರಿ, ಕರ್ತವ್ಯಬದ್ಧ ಮಗನಾಗಿರುತ್ತೀರಿ ಮೊದಲ ವರ್ಷದಲ್ಲಿ ನೀರಿನ ಭಯ 8 ವರ್ಷಗಳಾಗಿದ್ದಾಗ ಜ್ವರ ಮತ್ತು 32ರಲ್ಲಿ ಹಠಾತ್ ಸಾವಿನ  ಭಯವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. .</p> <p> ನಿಮ್ಮ ಕಷ್ಟದ ವರ್ಷಗಳಲ್ಲಿ ಉತ್ತಮ ಗ್ರಹಗಳು ಬಂದು ಹೋಗುತ್ತಿದ್ದಲ್ಲಿ ನೀವು 100 ವರ್ಷಗಳ ದೀರ್ಘ ಜೀವನ ನಡೆಸುತ್ತೀರಿ. ಉನ್ನತ ಮುಖ, ದೊಡ್ಡ ತಲೆ, ಸುಂದರ ದೃಷ್ಟಿ, ತನ್ನ ಅಚ್ಚುಮೆಚ್ಚಿನವರನ್ನು ಅನುಸರಿಸುವರು, ಬುದ್ಧಿಜೀವಿಗಳು, ಶ್ರೀಮಂತರು, ಜಲಪ್ರೇಮಿಗಳು, ಮುಂಗೋಪಿಗಳು, ಲಂಪಟರು, ಧರ್ಮಾರ್ಥರೂ ಆದ ನೀವು ಏಳು ಸಹೋದರ ಸಹೋದರಿಯರನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. </ p><p> 20ನೇ ವರ್ಷ ಸಾವಿನ ಭಯವನ್ನು ತರುತ್ತದೆ. ಅಶ್ವಿನ್ ಕೃಷ್ಣ ಚತುರ್ಥಿ, ಗುರುವಾರ, ರೋಹಿಣಿ ನಕ್ಷತ್ರದಂದು ಒಂದು ನದಿಯ ದಡದಲ್ಲಿ ಸಾವು ಬರುತ್ತದೆಂದು ಊಹಿಸಲಾಗಿದೆ. </ p><p> 12ನೇ ವರ್ಷ ಜ್ವರ, 18ನೇ ವರ್ಷ ಹಾವುಗಳ ಭಯ, 22ರಲ್ಲಿ ವಿದೇಶದ  ಭಯ ಮತ್ತು 24ರಲ್ಲಿ ಹಠಾತ್ ಸಾವಿನ ಭಯ ಬರುತ್ತದೆ. 27ರಲ್ಲಿ ನೀರಿನ ಭಯ, 32ರಲ್ಲಿ ಹಾವು ಮತ್ತು ಶಸ್ತ್ರಾಸ್ತ್ರದ ಭಯ. </ p><p>. ನಿಮ್ಮ 12ನೇ, 24ನೇ, 40ನೇ ಮತ್ತು 48ನೇ ವರ್ಷದಲ್ಲಿ ನೀವು ನಾಯಿಗಳು ಪಂಜಗಳಿರುವ ಪ್ರಾಣಿಗಳು ಮತ್ತು ಕೈಕೋಳಗಳ ಭಯವನ್ನು ಹೊಂದಿರುತ್ತೀರಿ. .</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>

	WHAT_IS_RASI								= Your Rashi As Per Astrology Classics