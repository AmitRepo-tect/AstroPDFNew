HOW_TO_INSTALL_MARS_YANTRA =<ul><li>ಮಂಗಳ ಯಂತ್ರವನ್ನು ಸ್ಥಾಪಿಸುವ ಮೊದಲು ಯಂತ್ರವನ್ನು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ ಹಾಲಿನಿಂದ ಶುದ್ಧೀಕರಿಸಬೇಕು. </li><li>ತದನಂತರ ಹನುಮಂತನಿಗೆ ಕೆಂಪು ಹೂವು, ಕಡ್ಡಿ ದೀಪವನ್ನು ಅರ್ಪಿಸಿ, "ಓಂ ಕ್ರಾಂ ಕ್ರೀಂ ಕ್ರೌಂ ಸಃ ಭೌಮಾಯ ನಮಃ" ಮಂತ್ರವನ್ನು 108 ಬಾರಿ ಜಪಿಸಬೇಕು. </li></ul>ಈ ವಿಧಾನವನ್ನು ಅನುಸರಿಸಿದ ನಂತರ ಮಂಗಳ ಯಂತ್ರವನ್ನು ಮಂಗಳವಾರ ಅಥವಾ  <a href="http://astrosage.com/hindi/nakshatra/mrigasira-nakshatra-characteristics.asp">ಮೃಗಶಿರಾ</a>, <a href="http://astrosage.com/hindi/nakshatra/chitra-nakshatra-characteristics.asp">ಚಿತ್ರ</a>, <a href="http://astrosage.com/hindi/nakshatra/dhanishta-nakshatra-characteristics.asp">ಧನಿಷ್ಠ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಸ್ಥಾಪಿಸುವದು ಅತ್ಯಂತ ಉತ್ತಮವಾಗಿರುತ್ತದೆ.
HOW_TO_INSTALL_JUPITER_YANTRA =<ul><li>ಗುರು ಯಂತ್ರವನ್ನು ಸ್ಥಾಪಿಸುವ ಮೊದಲು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ ಹಾಲಿನಿಂದ ಯಂತ್ರವನ್ನು ಶುದ್ಧೀಕರಿಸಬೇಕು. </li><liತದನಂತರ ವಿಷ್ಣು ದೇವರಿಗೆ ಹಳದಿ ಹೂವು, ಕಡ್ಡಿ, ಸಾಂಬ್ರಾಣಿ ಮತ್ತು ದೀಪವನ್ನು ಅರ್ಪಿಸಿ "ಓಂ ಗ್ರಾಂ ಗ್ರೀಂ ಗ್ರೌಂ ಸಃ ಗುರವೇ ನಮಃ" ಮಂತ್ರವನ್ನು ಜಪಿಸಬೇಕು.  </li></ul>ಈ ವಿಧಾನವನ್ನು ಪೂರ್ಣಗೊಳಿಸಿದ ನಂತರ ಗುರುವಾರ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/punarvasu-nakshatra-characteristics.asp">ಪುನರ್ವಸು</a>, <a href="http://astrosage.com/hindi/nakshatra/vishakha-nakshatra-characteristics.asp">ವಿಶಾಖ</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-bhadra-nakshatra-characteristics.asp">ಪೂರ್ವಪದ  ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಈ ಯಂತ್ರವನ್ನು ಸ್ಥಾಪಿಸಬಹುದು.
HOW_TO_INSTALL_SATURN_YANTRA =<ul><li>ಶನಿ ಯಂತ್ರವನ್ನು ಗಂಗಾಜಲ ಮತ್ತು ಹಸಿ ಹಾಲಿನಿಂದ ಶುದ್ಧೀಕರಿಸಬೇಕು. </li><li>ಇದರ ನಂತರ ಭೈರವ ದೇವರಿಗೆ ಕಪ್ಪು ಎಳ್ಳು, ಕಡ್ಡಿ, ದೀಪವನ್ನು ಅರ್ಪಿಸಿ, "ಓಂ ಪ್ರಾಂ ಪ್ರೀಂ ಪ್ರೌಂ ಸಃ ಶನೈಶ್ಚರಾಯ ನಮಃ" ಮಂತ್ರವನ್ನು 108 ಬಾರಿ ಜಪಿಸಬೇಕು. </li></ul>ಇದರ ನಂತರ ಶನಿವಾರದಂದು ಸೂರ್ಯಾಸ್ತದ ನಂತರ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/pushya-nakshatra-characteristics.asp">ಪುಷ್ಯ</a>, <a href="http://astrosage.com/hindi/nakshatra/anuradha-nakshatra-characteristics.asp">ಅನುರಾಧ</a>, <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">ಉತ್ತರಾಭಾದ್ರಪದಾ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಈ ಯಂತ್ರವನ್ನು ಸ್ಥಾಪಿಸುವುದು ಶುಭಕರ. 
HOW_TO_INSTALL_RAHU_YANTRA =<ul><li>ರಾಹು ಯಂತ್ರವನ್ನು ಸ್ಥಾಪಿಸುವ ಮೊದಲು ಯಂತ್ರವನ್ನು ಹಸಿ ಹಾಲು ಅಥವಾ ಹಸಿ ಹಾಲಿನಿಂದ ಶುದ್ಧೀಕರಿಸಬೇಕು. </li><li>ಇದರ ನಂತರ ತಾಯಿ ದುರ್ಗೆಗೆ ಕೆಂಪು ಶ್ರೀಗಂಧ, ಕಡ್ಡಿ, ಸಾಂಬ್ರಾಣಿ ಮತ್ತು ದೀಪವನ್ನು ಬೆಳಗಿಸಿ  "ಓಂ ಭ್ರಾಂ ಭ್ರೀಂ ಭ್ರೌಂ ಸಃ ರಾಹವೇ ನಮಃ" ರಾಹು ಮಂತ್ರವನ್ನು 108 ಬಾರಿ ಜಪಿಸಬೇಕು. </li></ul>ಮೇಲಿನ ವಿಧಾನವನ್ನು ಪೂರ್ಣಗೊಳಿಸಿದ ನಂತರ ಶನಿವಾರ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/swati-nakshatra-characteristics.asp">ಸ್ವಾತಿ</a>, <a href="http://astrosage.com/hindi/nakshatra/satabishak-nakshatra-characteristics.asp">ಶತಭಿಷಾ</a>, <a href="http://astrosage.com/hindi/nakshatra/ardra-nakshatra-characteristics.asp">ಆರ್ದರಾ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ರಾಹು ಯಂತ್ರವನ್ನು ಸ್ಥಾಪಿಸುವುದು ತುಂಬಾ ಉತ್ತಮ. 
HOW_TO_INSTALL_KETU_YANTRA =<ul><li>ಕೇತು ಯಂತ್ರವನ್ನು ಸ್ಥಾಪಿಸುವ ಮೊದಲು ಯಂತ್ರವನ್ನು ಹಸಿ ಹಾಲು ಅಥವಾ ಗಂಗಾಜಲದಿಂದ ಶುದ್ಧೀಕರಿಸಬೇಕು. </li><li>ಇದರ ನಂತರ ಗಣೇಶ ದೇವರಿಗೆ ದುರ್ವಾ, ಕಡ್ಡಿ, ಸಾಂಬ್ರಾಣಿಯನ್ನು ಅರ್ಪಿಸಿ ಅವರ ಮುಂದೆ ದೀಪವನ್ನು ಬೆಳಗಿಸಿ "ಓಂ ಸ್ರಾಂ ಸ್ರೀಂ ಸ್ರೌಂ ಸಃ ಕೇತವೇ ನಮಃ" ಕೇತು ಮಂತ್ರವನ್ನು 108 ಬಾರಿ ಜಪಿಸಬೇಕು. </li></ul>ಮೇಲಿನ ವಿಧಾನವನ್ನು ಪೂರ್ಣಗೊಳಿಸಿದ ನಂತರ  ಶನಿವಾರದಂದು ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/ashwini-nakshatra-characteristics.asp">ಅಶ್ವಿನಿ</a>, <a href="http://astrosage.com/hindi/nakshatra/magha-nakshatra-characteristics.asp">ಮಘಾ</a>, <a href="http://astrosage.com/hindi/nakshatra/moola-nakshatra-characteristics.asp">ಮೂಲ  ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಈ ಯಂತ್ರವನ್ನು ಷ್ಠಾಪಿಸಬೇಕು.



