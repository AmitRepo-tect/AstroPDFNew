	RASI_PREDICTION_1							= <p>आपल्याला लाल आणि पिवळ्या रंगाशी संबधित उत्पादनाच्या व्यवसायातून फायदा मिळू शकतो. स्वभावाने आपण विनोदी प्रवृत्तीचे असता आणि लालसर छटेचा तेजपुंज चेहरा लाभलेला असतो. बुधवार, सोमवार आणि मंगळवार हे दिवस आपल्यासाठी लाभदायक ठरतात. प्राणीमात्र, गाय म्हैस यांची काळजी घेण्याकडे आपला कल असू शकतो. मुलत: स्वभावाने आपण काहीसे आळशी असला तरी दुसऱ्यांकडून काम करून घेण्यात आपण तरबेज असतात. कन्या, कुंभ आणि मिथुन राशींच्या मित्रांची संख्या बरीच असते. आपण महत्वाकांक्षी आणि प्रगती करणारे असता. २०, २६ आणि ३३ ही वर्षे आपणास ज्वरपीडा आणि शस्त्रापासून त्रास देणारी ठरू शकतात. ४०, ५० आणि ५५ हे आपल्या आयुष्यातील टप्पे आकस्मिक मृत्यू आणि आयुष्य कमी होण्याच्या गडद छायेत असू शकतात.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>वयाच्या १, ७ आणि १३व्या वर्षी आपणास ज्वरपीडेचा त्रास होऊ शकतो. तर ३,५, १२ आणि १६ ही वर्षे आपणास शासनाकडून भीती उत्पन्न करणारी आहेत. ८ आणि ३२व्या वर्षी आकस्मिक मृत्यूचे भय  आपल्यावर अंमल गाजवू शकतो. तर वयाच्या २५ वर्षी आपणास आपले मुल हरविण्याचा त्रास संभवतो. तसेच चौथ्या आणि आठव्या वर्षी आपणास वाहन त्रास, वयाच्या ३, १२ आणि २४ ही वर्षे विषबाधा आणि बुडून मृत्यू या घटनांच्या अंमलाखाली असतील.</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_2							= <p> तुम्हाला सर्दी खोकल्याचा त्रास असू शकतो. बुधवार, शुक्रवार आणि शनिवार हे दिवस आपल्याला लाभकारक आहेत. रविवार तुमच्यासाठी प्रतिकूल आहे. कडू आंबट गोष्टी तुम्हाला हितकारक ठरतात. तुम्हाला दुग्धजन्य पदार्ध आवडतात. तुमचे व्यावसायिक भागीदार हे मध्यमवर्गीय असतात. तुमचे मित्र हे तुमच्या त्रासाचे दुखाचे कारण ठरू शकतात. बागकाम आणि शेती संबधित व्यवसाय तुम्हाला फायदेशीर ठरतात. उच्च स्थानावरून खाली येणाची तुम्हाला प्रामुख्याने भीती असते. तुम्ही प्रतिस्पर्धीच्या सहवासात देखील आनंदाने आणि मोकळेपणाने वावरू शकता. तुम्ही एक प्रेमळ, मध्यम उंचीचे आणि कपड्यांची आणि टापटीपीची आवड असणारे गृहस्थ असू शकता. तुमच्या आरोग्याच्या तक्रारी या प्राथमिकपणे पोटाच्या आणि मानेच्या आजाराशी निगडीत असतात.</p> <p>वय वर्षे २, ४, ५, ७ आणि १८ या काळात तुमच्या आयुष्यात दु:ख, धोके सामावलेले असतात. स्त्रियांविषयी तुम्हाला आवड असते. तुम्हाला गरम खाद्य आवडते. तुम्हाला सर्दी आणि खोकल्याचा त्रास होऊ शकतो. जुन्यापुराण्या आणि पुरातन मौल्यवान वस्तू जमा करण्याकडे तुमचा कल असतो.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>छाती, मान, आणि हनुवटीचे आजार तुम्हाला छळू शकतात. वयाच्या तिसऱ्या वर्षी आगीपासून धोका संभवतो तर हाताला आणि पायाला दुखापतीची शक्यता असते. वय वर्षे १९ आणि ३२ या काळात आकस्मिक मृत्यू येण्याचा संभव आहे. तुमच्या आयुष्यात दुसऱ्या विवाहाची शक्यता खूप दाट असते. आपणास खूप कमी भावंडे असतात. माधव नवमी, शुक्रवार किंवा रोहिणी नक्षत्रावर मृत्यूयोग असतो.</p> -Yuvneshwar <p>वय वर्षे २, ५ आणि ९ या काळात तुम्हाला स्त्रियांपासून काळजी घेणे गरजेचे आहे. तुम्हाला गुप्तांगाचे विकार देखील होऊ शकतात. तुमची भूक खूप दांडगी असते. तुम्ही खूप कार्क्षम असता, अनेक त्रास सहन करण्याची तयारी असते, सामाजिक कामात मदत करणरे असता आणि श्रीमंतदेखील. वयाच्या १५व्या आणि १६व्या वर्षी तुम्हाला पाणी, शिंग असणारे प्राणी, विषबाधा, डोंगर, अस्वल आणि भूत पिशाच्चापासून त्रास, धोका उत्पन्न होऊ शकतो. वय वर्षे १०, २५ आणि ४५ तुमच्या आयुष्यात अग्नी, गुप्त आजार आणि भावनिक गुलामीचा धोका उत्पन्न करणारे आहेत.</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_3							= <p>तुम्हाला वेदनांचा त्रास होऊ शकतो. बुधवार, शुक्रवार, आणि शनिवार हे आपले शुभ दिवस आहेत. तुम्ही लेखक होऊ शकता, तसेच बुद्धिवंत असता, सरकारी नोकरीत असू शकता. तुम्हाला कडू आणि आंबट गोष्टींची आवड असते. काळ्या रंगाच्या गोष्टी तुम्हाला लाभदायक आहेत, तर तुमच्यासाठी पांढऱ्या गोष्टी या अशुभ असतात. तुम्ही स्वच्छता आणि टापटीप प्रिय असता पण तसेच शीघ्रकोपी असता. तुमच्याकडे तुमचे स्वत:चे वाहन असते. तुम्हाला लोकांच्या पैशाचा वापर करण्याची हातोटी लाभलेली असते. तुम्हाला कदाचित अनेक पत्नी किंवा प्रेयसी असू शकतात. तुम्ही कमी श्रीमंती आणि पोटाच्या विकारांनी त्रस्त असता. ५, १२, १६ आणि २७ ही वर्षे तुमच्या आयुष्यात त्रासदायक असू शकतात. आयुष्याच्या ५० व्या वर्षी कदाचित तुम्हाला आकस्मिक मृत्यूची शक्यता नाकारता येत नाही. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>तुमचे भविष्य हे सुखी मध्यमवर्गीय असू शकते. १६ आणि १८ या वर्षी तुम्हाला पाण्यापासून धोका संभवतो. वयाच्या पाचव्या वर्षी कानाचे विकार, तर २४व्या वर्षी वेदनाचा त्रास देऊ शकतो. ३८ व्या वर्षी आपला आकस्मिक मृत्यू ओढवू शकतो. ८० वर्षाच्या प्रदीर्घ आयुष्यानंतर वैशाखातील हस्त नक्षत्रात बुधवारी अथवा शुक्रवारी तुमचे प्राण पंच तत्वात विलीन होतील. आयुष्याच्या तिसऱ्या, दहाव्या आणि सहाव्या वर्षी तुम्हाला तीन प्रकारच्या असंतुलनाचा त्रास होऊ शकतो आणि भूत खेत आणि मीठाच्या धोक्यात जगावे लागू शकते. २० आणि १२व्या वर्षी घोडा, साप, हत्ती, डोंगर आणि पाणी यापासून त्रास संभवतो. <br/> वयाच्या ५, ९, १८ आणि ३०व्या वर्षी तुम्हाला ज्वर पीडा होऊ शकते. तुम्ही श्रीमंत असू शकता. तसेच सडपातळ बांध्याचे असला तरी आठव्या वर्षी हृद्यविकाराची पीडा निर्माण होऊ शकते.</p> <b style='padding-left:90%;'>-Yvan</b>
	RASI_PREDICTION_4							= <p> रविवार, सोमवार, मंगळवार हे दिवस शुभदायी तर गुरुवार हा अशुभ दिवस आहे. गोरेपणाकडे झुकणाऱ्या या व्यक्तींना खोकल्याचा त्रास असतो. तसेच यांच्या आयुष्यात आकस्मिक मृत्यू ओढविण्याच्या तीन घटना घडतात. २, ८, २१ आणि २९ व्या वर्षी त्यांना आजार उद्भवू शकतात. अशा व्यक्तींचे पाय तिरकस आणि पातळ असू शकतात आणि पाण्याचे रोग संभवतात. त्यांना दोन बायका असू शकतात. अशा व्यक्तींना कंबर दु:खीचे विकार, डोके, पाय, दृष्टी दोष होऊ शकतो. खालच्या दर्जाच्या लोकांशी यांची भावनिक जवळीक असते. शुक्रवार हा तुमच्यासाठी अशुभ दिवस असू शकतो. काळा रंग हा तुमच्यासाठी लाभदायक नाही, तर लाल आणि पांढरा रंग लाभदायी सिद्ध होऊ शकतो.</p> <p>आठव्या वर्षी तुम्हाला पाऊस, हवा आणि पाणी यापासून धोका उत्पन्न होऊ शकतो. सुगंधी वस्तूपासून तुम्हाला फायदा होऊ शकतो. तुमची चंद्र रास ही कर्क असल्यामुळे संक्रातीला जे काही खरेदी कराल ते दुपट्टीने वाढेल. हवेचा त्रास, नुकसान सहन करणरे असतात.वयाच्या ४८ व्या अथवा ८४ व्या वर्षी तुम्हाला मृत्यू ओढवू शकतो. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>तारुण्यात तुम्ही गरीब असता मात्र आयुष्याच्या मध्यावर तुम्ही स्थिर स्थावर झालेले असता. वयाच्या तिसऱ्या आणि सातव्या वर्षी तुम्हाला ज्वर पीडेचा सामना करावा लागेल. जेव्हा चंद्र वर्षाचा स्वामी असतो तेव्हा तुम्हाला पाण्यापासून धोका संभवतो, मात्र सुगंधी वस्तू त्यांच्या आयुष्यात लाभ / शुभ ठरू शकतात. वयाच्या तिसऱ्या वर्षी तुमच्या शरीराच्या डाव्या भागाला आगीपासून धोका संभवतो. ३२व्या वर्षी तुम्हाला आकस्मिक मृत्यूची शक्यता आहे. वयाच्या २९ वर्षी तुम्हाला सर्पदंशाचा धोका आहे. माघ शुक्ल अथवा शुक्रवारी शुक्र नक्षत्राच्या दरम्यान मृत्यू तुमच्या नजीक असेल.<p> <b style='padding-left:90%;'>-Yvan</b> <p>आयुष्याच्या चौथ्या, आठव्या, बाराव्या वर्षी तुम्हाला डोके, कान आणि डोळे या अवयवावर गळू  येऊ शकतात. तीन ग्रहांच्या असमतोल होऊ शकतो. वयाच्या सोळाव्या आणि चोविसाव्या वर्षी तुम्हाला स्त्री, पाणी, भूत पिश्चाच, डोंगर आणि गुप्तांगावर वेदनाचा भीती संभवते. जर तुम्ही शेती अथवा शेतीविषयक क्षेत्रात असाल तर तुम्ही सक्षम असता मात्र तरीदेखील बुजरेच राहता.</p> <b style='padding-left:84%'>-Janmpradeep</b>
