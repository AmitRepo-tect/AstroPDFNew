
	PERSON												= ব্যাক্তি   
	MANGLIK											= মাঙ্গলিক  
	PERSON_IS_MANGLIK									= ব্যক্তি মাঙ্গলিক
	PERSON_IS_NOT_MANGLIK								= ব্যক্তি মাঙ্গলিক নয়
	MANGLIK_DETAILS_PARAGRAPH1							= সাধারণত মঙ্গল দোষ জন্ম-কুষ্ঠির লগ্ন এবং চন্দ্রের অবস্থান থেকে বিবেচনা করা হয়।
	MANGLIK_DETAILS_FIRST								= আপনার কুষ্ঠিতে মঙ্গল লগ্ন থেকে 
	MANGLIK_DETAILS_SECOND								=  ঘর এবং চন্দ্র থেকে 
	MANGLIK_DETAILS_THIRD								=  ঘরে আছে।
	MANGLIK_DETAILS_HENCE_NOTE							= অতঃ মঙ্গল দোষ 
	PRESENT_NEITHER_IN_LAGNA_CHART_NOR_IN_MOON_CHART	=অত: মঙ্গল দোষ না লগ্ন চার্টে আর না চন্দ্র চার্টে উপস্থিত। 
	MANGLIK_DETAILS_HENCE_NOTE1						= অত: মঙ্গল দোষ লগ্ন কুষ্ঠি আর চন্দ্র কুষ্ঠিতে উপস্থিত। 
	MANGLIK_DETAILS_HENCE_NOTE2						=অত: মঙ্গল দোষ লগ্ন কুষ্ঠিতে উপস্থিত রয়েছে আর চন্দ্র কুষ্ঠিতে উপস্থিত নেই। 
	MANGLIK_DETAILS_HENCE_NOTE3						=অত: মঙ্গল দোষ লগ্ন কুষ্ঠিতে উপস্থিত নেই কিন্তু চন্দ্র কুষ্ঠিতে উপস্থিত রয়েছে। 
	MANGLIK_DETAILS_PARAGRAPH4							= মঙ্গল দোষ একজন ব্যক্তির বিবাহিত জীবনে বাধা সৃষ্টি করে বলে মনে করা হয়।
	MANGLIK_DETAILS_PARAGRAPH5							= যদি একজন মাঙ্গলিক ব্যাক্তি অন্য মাঙ্গলিক ব্যাক্তিকে বিয়ে করে তবে মাঙ্গলিক দোষ কোনো প্রভাব ফেলে না।
	MANGLIK_DETAILS_SUBHEADING1						= কিছু প্রতিকার (মঙ্গল দোষের উপস্থিতিতে)
	MANGLIK_DETAILS_SUBHEADING2						= প্রতিকার (বিয়ের আগে সম্পন্ন করা প্রয়োজন)
	MANGLIK_DETAILS_SUBHEADING3						= প্রতিকার (বিয়ের পর সম্পাদনা করা যেতে পারে)
	MANGLIK_DETAILS_PARAGRAPH6							= কুম্ভ বিবাহ,বিষ্ণু বিবাহ,অশ্বত্থ  বিবাহ এর জনপ্রিয় প্রতিকার হিসাবে বলা যেতে পারে।অশ্বত্থ বিবাহ মানে হচ্ছে অশ্বত্থ গাছ বা কলা গাছের সাথে বিয়ে করে গাছটিকে কেটে ফেলতে হবে। কুম্ভ বিবাহ মানেটা হচ্ছে ঘটের সাথে বিয়ে করে ঘটটাকে ভেঙ্গে ফেলা।
	REMEDIES1											= কেসরিয়া গণেশ রাখুন (কমলা রঙের গণেশ এর প্রতিমা) পূজার ঘরে এবং নিত্য পুজা করুন। 
	REMEDIES2											= নিত্য হনুমান চালিশা পাঠ করুন।
	REMEDIES3											= মহামৃত্যুঞ্জয় পাঠ (মহামৃত্যুঞ্জয় মন্ত্র পাঠ)
	MANGLIK_DETAILS_SUBHEADING4						= প্রতিকার (লাল কিতাবের উপর ভিত্তি করে, বিয়ের পরে সম্পাদনা করা যেতে পারে)
	LK_REMEDIES1										= পাখিদের মিষ্টি কিছু খাওয়ান। 
	LK_REMEDIES2										= বাড়িতে গজদন্ত রাখুন (হাতির দাঁত) 
	LK_REMEDIES3										= মিষ্টি কিছু সঙ্গে মিশ্রিত দুধ দিয়ে অশ্বত্থ গাছে দিন।
	MANGLIK_DETAILS_NOTE								= তাও আমরা বলব প্রতিকার মূলক কাজ করার আগে একজন বিশিষ্ট জ্যোতিষীর পরামর্শ নিন।
