

	 THANKS							= ధన్యవాదములు

	 THANK_YOU_FOR_RECOMMENDATION	= సిఫారసు చేసినందుకు ధన్యవాదములు.
	 REFER_FRIEND					= ఒక మిత్రుని సూచించండి
	 RECOMMEND_THIS_WEBSITE			= ఈ వెబ్ సైట్ ను సిఫారసు చేయండి
	 INTROTEXT						= మీరు చూపుతున్న ప్రేమాభిమానాల వలన మేము అంతర్జాలంలో అత్యంత ప్రామఖ్యత గలిగిన వేదిక్ అస్ట్రాలజీ వెబ్ సైట్ గా ఉన్నాము. వీలయినంత మందికి జ్యోతిషం వలన ప్రయోజనం కలిగించుటకు, మేము మా సేవలన్నింటినీ ఉచితంగా అందిస్తున్నాము. మరియు ఈ పవిత్రమైన పనికి, మేము ఒక చిన్నసహాయాన్ని కోరుతున్నాము, మీరు మీ మిత్రులు మరియు కుటుంబసభ్యులకు ఈ వెబ్ సైట్ ను సూచించండి.  దయచేసి ఈ వెబ్ సైట్ గురించిన సమాచారాన్ని ఈ క్రింద ఇవ్వబడిన పత్రం ద్వారా పంపండి. మీరు మీ మిత్రులకు మరియు కుటుంబసభ్యులకు ఈ వెబ్ సైట్ ను సూచించవచ్చు.
