
	#'***********************new_SadeSatiReport.asp**************************************************'

	SMALL_PANOTI			= స్వల్ప పనోతి
	SADESATI_REPORT		= సాడే సాతి నివేదిక
	SADESATI				= సాడే సాతి
	PANOTI					= పనోతి
	SHANI					= శని
	START					= ప్రారంభం తేది
	END_DATE				= ముగింపు తేది
	PHASE					= దశ
	RISING					= వృద్ధిచెందుతున్నది
														PEAK = అత్యున్నత శిఖరము
	SETTING				= సెట్టింగ్
	SADESATIRISINGPHASE	= ఇది శని యొక్క సాడే సాతి ప్రారంభ కాలము. ఈ కాలంలో శని, చంద్రుని నుండి 12 వ గదిలోనికి సంక్రమణం చెందుతాడు. ఇది సాధారణంగా ఆర్థికనష్టాలను, కనబడని శత్రువుల వలన సమస్యలను, గమ్యంలేని ప్రయాణం, కొట్లాటలు, మరియు దరిద్రాన్ని సూచిస్తుంది. ఈ కాలములో, మీకు కనబడని శత్రువులవలన సమస్యలు కలుగవచ్చు. మీ సహోద్యోగులతో సంబంధబాంధవ్యాలు సరిగా ఉండవు మరియు వారు మీరు పనిచేయు చోట సమస్యలను సృష్టిస్తారు. మీరు మీ గృహంలో కూడా సవాళ్ళను ఎదుర్కొనవచ్చు. దీనివలన ఒత్తిడి మరియు ఉద్రిక్తత కలుగవచ్చు. మీరు మీ ఖర్చులను అదుపుచేయాల్సిన అవసరం ఉంది లేకపోతే అది పెద్ద ఆర్థిక చిక్కులకు దారితీస్తుంది. ఈ కాలంలో దూరప్రయాణాలు ఫలప్రదం కాకపోవచ్చు. శని స్వభావం, ఆలస్యాన్ని కలిగించడం మరియు విచారాన్ని కలిగించడం, కానీ సాధారణంగా మీకు ఫలితాలు ఆఖరున వస్తాయి, కాబట్టి, ఓపిక వహించండి మరియు మీ సమయంకొరకు వేచి ఉండండి. ఈ కాలాన్ని శిక్షణా కాలంగా తీసుకోండి, కొంచెం కష్టపడితే అవే సర్దుకుంటాయి. ఈ కాలంలో వ్యాపార విషయాలలో ఎక్కువగా రిస్క్ తీసుకోకండి.
	SADESATIPEAKPHASE		= ఇది శని యొక్క సాడే సాతి యొక్క అతిఎక్కువ దశ. సాధారణంగా ఈ శని దశ చాలా కష్టమైనది. జన్మసంబంధ చంద్రునిపై శని సంక్రమణం, ఆరోగ్య సమస్యలను, నడవడిక నాశనము, సంబంధాలలో సమస్యలు, మనోవేదనలు, మరియు బాధలను సూచిస్తుంది. ఈ కాలంలో మీరు విజయం సాధించడం కష్టమని భావిస్తారు. మీరు మీ కష్టానికి తగిన ఫలితాన్ని పొందలేకపోవచ్చు మరియు నిర్బంధించబడినట్టుగా భావిస్తారు. మీ శరీర వ్యవస్థ మరియు రోగనిరోధక శక్తి బలంగా ఉండదు. మొదటి గది ఆరోగ్య గది కాబట్టి, మీరు వ్యాయామం చేయడం మరియు మీఆరోగ్యం గురించి జాగ్రత్త వహించడం ప్రారంభించాలి, లేకపోతే మీకు దీర్ఘకాలిక వ్యాధులు కలుగుతాయి. మీరు వ్యాకులత, తెలియని భయం లేదా విపరీతమైన భీతి నుండి బాధపడవచ్చు. మీ మనసు ఆలోచించడంలో స్వచ్ఛతను, చర్యలను మరియు నిర్ణయాలను తీసుకోవడాన్ని కోల్పోవచ్చు. మీరు  ఆధ్యాత్మికమార్గంలో నడవచ్చు మరియు ప్రకృతి చిక్కులకు ఆకర్షింపబడవచ్చు. ఈ పరిస్థితిని అంగీకరించుట వలన మరియు ప్రధానమైనవి సరిగా చేయుటవలన మీరు ఈ గడ్డుకాలం నుండి బయటపడవచ్చు.
	SADESATISETTINGPHASE	= ఇది శని యొక్క సాడే సాతి ’సెట్టింగ్” కాలము. శని, జన్మసంబంధ చంద్రుని నుండి 2 వ గదిలోనికి సంక్రమణం చెందుతాడు, ఇది ఆర్థిక మరియు గృహసంబంధ కష్టాలకు సూచన.  మీరు సాడే సాతి యొక్క రెండు కష్టమైన దశలు అనుభవించిన తరువాత కొద్దిగా ఉపశమనాన్ని పొందడం ప్రారంభిస్తారు. అయినప్పటికినీ, ఈ కాలంలో అపార్థాలు మరియు ఆర్థిక ఒత్తిడులు కలుగుతాయి. ఖర్చులు ఆకాశాన్ని అంటుతాయి మరియు మీరు నియంత్రణను కొనసాగించాలి.  ఆకస్మిక ఆర్థిక నష్టాలు మరియు చోరభయం కూడా కలగవచ్చు. మీరు నిరాశావాదులుగా ఉంటారు, మీరు పనులను ఉత్సాహంగా నిర్వహించాలని సలహా ఇవ్వడమైనది. మీరు మీ కుటుంబం పట్ల మరియు వ్యక్తిగతంగా బాగా శ్రద్ధ వహించాల్సి ఉంటుంద, లేకపోతే అవి కూడా పెద్ద సమస్యకు దారితీయవచ్చు. విద్యార్థులకు, చదువుపై కొద్దిగా ప్రభావం కలుగుతుంది, వారు వారి ప్రస్తుత స్థాయిలో ఉండడానికి చాలా కష్టపడాల్సి ఉంటుంది.  ఫలితాలు నిదానంగా ఉంటాయి మరియు దాదాపు ఆలస్యంగానే నడుస్తాయి. ఈ కాలం ప్రమాదానికి సంకేతం మరియు ఇతరవిషయాలు కాకుండా, మీరు వాహనం నడుపునపుడు జాగ్రత్త వహించాలి. శనిని ఆనందపరచడానికి, వీలయితే, మాంసాహారం మరియు మీ త్రాగుడు అలవాట్లనుండి దూరంగా ఉండండి. మీరు మీ గృహసంబంధ మరియు ఆర్థిక విషయాలను తెలివిగా నిర్వహించడం ద్వారా ఈ కాలం నుండి బయటపడవచ్చు.
	IMPNOTE				= పైన తెలిపిన జోస్యాలు సాధారణ స్వభావం కలిగి ఉన్నవి మరియు సాడే సాతి హానికలిగిస్తుందనే సాధారణ నమ్మకం ఆధారంగా ఉన్నవి.  నిజం చెప్పాలంటే, అది ఎల్లప్పుడూ అలా ఉండదు మరియు మేము దీనిని చదవాలని సిఫారసు చేస్తున్నాము <b><u><a href=http://www.astrocamp.com/vedicastrology/2008/09/shani-sade-sati.html> ఏలినాటి శనిపై ఈ వ్యాసము</a></u></b>. సాడే సాతి పై మాత్రమే ఒక నిర్ణయానికి రావడం సరికాదు మరియు వైఫల్యానికి అవకాశాలు ఉన్నాయి.  సాడే సాతి హానికరమైనదా లేదా లాభకరమైనదా అని నిర్ణయించే ముండుగా, ప్రస్తుతం నడుస్తున్న దశ మరియు శని స్వభావం వంటి కొన్ని అంశాలను కూడా విశ్లేషించాలి. మీరు పైన తెలిపిన జోస్యాలను గంభీరంగా తీసుకోరాదని సూచించడమైనది మరియు ఏదైనా అనుమానం ఉంటే, ఒక మంచి జోతిష్యుని సంప్రదించండి.
