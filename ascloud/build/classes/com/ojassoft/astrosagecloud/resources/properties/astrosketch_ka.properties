
ASTRO_SKETCH_DATA_MALE = <p><b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b>(ಜನನ ಮಾಹಿತಿಯನ್ನು ಆಧರಿಸಿದ ಒಂದು ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್)<br/>ಮೇಷ (ಮೇಷ) ಪುರುಷನು ನಾಯಕತ್ವದ ಗುಣಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಹೊಸ ವಿಷಯಗಳಲ್ಲಿ ಮುಂದಾಳತ್ವ ವಹಿಸಲು ಇಷ್ಟಪಡುತ್ತಾರೆ. ಅವರಿಗೆ ಆಶ್ಚರ್ಯಗಳೆಂದರೆ ಇಷ್ಟ, ಅವರು ಗಟ್ಟಿ ಮನುಷ್ಯರಾಗಿದ್ದಾರೆ ಮತ್ತು ಕಷ್ಟದ ಪರಿಸ್ಥಿತಿಗಳಲ್ಲಿ ಅಂತಃಸತ್ವವನ್ನು ತೋರಿಸುತ್ತಾರೆ. ಅವರು ಸ್ವತಂತ್ರರೂ ವಿನೋದ ಪ್ರಿಯರೂ ಮತ್ತು ಸಾಹಸಿಗಳೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಜೀವನದ ಹೊಳೆಯುವ ಬದಿಯನ್ನು ನೋಡಬಯಸುತ್ತಾರೆ ಹಾಗೂ ಆಕ್ರಮಣಕಾರಿಗಳೂ ಮತ್ತು ಮೊಂಡು ಸ್ವಭಾವದವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಸುಳ್ಳು ಅಭಿನಂದನೆಗಳನ್ನು ದ್ವೇಷಿಸುತ್ತಾರೆ ಮತ್ತು ಅವರಲ್ಲಿ ಇಲ್ಲದ ಗುಣಗಳಿಗೆ ಹೊಗಳಿಕೆ ಪಡೆಯುವುದಕ್ಕಿಂತ ಇರುವ ಗುನಗಳಿಗೆ ದ್ವೇಷಿಸಲ್ಪಡುವುದನ್ನು ಇಷ್ಟಪಡುತ್ತಾರೆ. ಅವರು ಒಂದು ಸಂಬಂಧದಲ್ಲಿದ್ದಾಗಲೂ ಅವರ ವೈಯಕ್ತಿಕ ಸ್ಥಳ ಅವರಿಗೆ ಮುಖ್ಯ. ಒಂದು ಸಂಬಂಧದಲ್ಲಿದ್ದಾಗ ಅವರು ಅದಕ್ಕೆ ಬೆಂಬಲ ನೀಡುವವರೂ, ಮೃದು ಧೋರಣೆಯವರೂ ಹಾಗೂ ಪ್ರೇಮಮಯಿಗಳೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಇಂದಿನಲ್ಲಿ ಎಷ್ಟು ಮಗ್ನರಾಗಿರುತ್ತಾರೆಂದರೆ ಅವರು ಹಿಂದಿನ ಪಾಠಗಳನ್ನು ಗಂಭೀರವಾಗಿ ತೆಗೆದುಕೊಳ್ಳುವುದೇ ಇಲ್ಲ. </p><p><b> ಮೇಷ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು:</b><br/> ಜಯಪ್ರದಾ, ಮಮತಾ ಕುಲಕರ್ಣಿ, ರಾಣಿ ಮುಖರ್ಜಿ, ಜಿತೇಂದ್ರ</p><p><b> ಮೇಷ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು </b><br/><b> ಧನಾತ್ಮಕ: </b> ಸಾಹಸಿಗಳು, ಶಕ್ತಿಶಾಲಿಗಳು, ಧೈರ್ಯಶಾಲಿಗಳು, ಕ್ರಿಯಾಶೀಲರು ಮತ್ತು ಬುದ್ಧಿಚಾತುರ್ಯದವರು ಹಾಗೂ ಹಾಸ್ಯಪ್ರಜ್ಞೆಯವರು <br /> <b> ನಕಾರಾತ್ಮಕ: </b> ಸ್ವಾರ್ಥಿಗಳು, ಶೀಘ್ರ ಕೋಪಿಗಳು, ಹಠಾತ್ ಪ್ರವೃತ್ತಿಯವರು ಮತ್ತು ತಾಳ್ಮೆಯಿಲ್ಲದವರು </p><p><b> ಮೇಷ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಮಿಥುನ, ಸಿಂಹ, ಧನು, ಮತ್ತು ಕುಂಭ ರಾಶಿ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/>  ವೃಷಭ  ಪುರುಷನು ಒಂದು ಆಕರ್ಷಕ, ನಿರರ್ಗಳ ವ್ಯಕ್ತಿತ್ವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರ ಅತ್ಯುನ್ನತವಾದ ವ್ಯಕ್ತಿತ್ವದಿಂದ ಅವರಿಗೆ ಎಲ್ಲೇ ಹೋದರೂ ಬಹಳಷ್ಟು ಗಮನ ಮತ್ತು ಅವರು ಅಭಿಮಾನಿಗಳಿಂದ ಸುತ್ತುವರಿಯಲ್ಪಡುತ್ತಾರೆ. ಅವರು ಪದಗಳಲ್ಲಿ ಶ್ರೀಮಂತರಾದವರು ಮತ್ತು ತನ್ನ ಅತ್ಯುತ್ತಮ ಸಂವಹನದ ಮೂಲಕ ಪ್ರಭಾವ ಬೀರುತ್ತಾರೆ. ಅವರ ಮಹತ್ತರ ಬಲವೆಂದರೆ ಅವರ ತಾಳ್ಮೆಯಾಗಿದೆ ಮತ್ತು ಒಂದು ಬಿಕ್ಕಟ್ಟಿನ ಪರಿಸ್ಥಿತಿಯಲ್ಲಿ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಾಗ ಇದು ಅವರನ್ನು ಸಮಚಿತ್ತರನ್ನಾಗಿ ಮಾಡುತ್ತದೆ. ನೀವು ಅವರು ತೋರುವ ಭಾವನಾತ್ಮಕ ಹಾಗೂ ನೈತಿಕ ಧೈರ್ಯಕ್ಕೆ ಅವರನ್ನು ಶ್ಲಾಘಿಸುತ್ತೀರಿ ಹಾಗೂ ಅವರು ಎಲ್ಲ ಸಮಯದಲ್ಲೂ ಒಬ್ಬ ವಿಶ್ವಾಸಾರ್ಹ ಹಾಗೂ ನಿಷ್ಠಾವಂತ ಸ್ನೇಹಿತರಾಗಿ ನಿಮ್ಮ ಪಕ್ಕದಲ್ಲಿರುತ್ತಾರೆ. ಆದರೆ ಅವರೆಲ್ಲ ಸದ್ಗುಣಗಳ ಹೊರತಾಗಿಯೂ ಅವರು ಬಹಳವೇ ಅಸೂಯಾಪರರೂ, ಮೊಂಡುವಾದದವರೂ ಹಾಗೂ ಹಠವಾದಿಗಳೂ ಆಗಿರುತ್ತಾರೆ. </p><p><b> ವೃಷಭ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: ಅಂಜಲಿ ಜಾಥರ್, ಮಾಧುರಿ ದೀಕ್ಷಿತ್, ಮೌಸಮಿ ಚಟರ್ಜಿ, ಪೂಜಾ ಬೇಡಿ </b><br/><b> ಸಕಾರಾತ್ಮಕ </b>  ಸಹಿಷ್ಣು, ವಿಶ್ವಾಸಾರ್ಹ, ಸದ್ಗುಣದ, ಕಾರ್ಯಸಾಧಕ, ಪ್ರಸನ್ನವಾದ <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಅಸೂಯೆ, ಒಡೆತನ ಸಾಧಿಸುವಿಕೆ, ಬಗ್ಗದ, ಸ್ವಯಂ ಸಂತೋಷದ</p><p><b> ವೃಷಭ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ </b> ಕರ್ಕ, ಕನ್ಯಾ, ಮಕರ, ಮೀನ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) ಮಿಥುನ (ಮಿಥುನ) ಪುರುಷರು, ಹರ್ಷಚಿತ್ತರೂ ಉತ್ಸಾಹಭರಿತರೂ ಮತ್ತು ಅತ್ಯಂತ ಸಕ್ರಿಯವಾದವರೂ ಆಗಿರುತ್ತಾರೆ. ಸ್ವಭಾವತಃ ಬಹಿರ್ಮುಖಿಯಾದ ಅವರು ಅತ್ಯುತ್ತಮ ಮಾತುಗಾರರಾಗಿರುತ್ತಾರೆ. ಜಾಣರೂ ಮತ್ತು ಕ್ರೀಡಾ ಮನೋಭಾವದವರೂ ಆಗಿರುವ ಅವರು ತಮ್ಮ ಜೀವನಪ್ರೀತಿಯಿಂದಾಗಿ ಅವರು ಇರುವುದಕ್ಕಿಂತಲೂ ಹೆಚ್ಚು ಕಿರಿಯರಾಗಿ ಕಾಣುತ್ತಾರೆ. ಅವರು ಪ್ರಕ್ಷುಬ್ಧರೂ, ಜಿಜ್ಞಾಸೆಯವರೂ, ದಿನನಿತ್ಯದ ಕೆಲಸಗಳು ಮತ್ತು ಮನೆಗೆಲಸಗಳಿಂದ ಸುಲಭವಾಗಿ ಬೇಸರಗೊಳ್ಳುವುದನ್ನೂ ನಿರೀಕ್ಷಿಸಬಹುದು. ಅವರು ವ್ಯಸ್ತವಾಗಿರಲು ಅವರಿಗೆ ಒಂದು ಹೊಸ ಸವಾಲು ಬೇಕಿರುತ್ತದೆ. ಇದರ ದುಷ್ಪರಿಣಾಮವೆಂದರೆ ಅವರನ್ನು ನಂಬಲು ಸಾಧ್ಯವೇ ಇಲ್ಲದಿರಬಹುದು. ಸಂದರ್ಭಗಳನ್ನು ತನ್ನ ಅನುಕೂಲಕ್ಕೆ ತಕ್ಕಂತೆ ಬಳಸಿಕೊಳ್ಳುವುದು, ವೈಯಕ್ತಿಕ ಕಾರಣಗಳನ್ನು ಸಾಧಿಸಲು ಪಿತೂರಿ ಮಾಡುವುದು ಮತ್ತು ಮನಸ್ಸಿನಲ್ಲಿ ಆಟಗಳನ್ನು ಆಡುವುದು ಅವರಿಗೆ ಎರಡು ಮುಖಗಳಿರುವಂತೆ ತೋರಿಸಬಹುದು. ಅವರನ್ನು ತನ್ನ ಹೃದಯವನ್ನು ಅನುಸರಿಸುವ ವಿವೇಚನಾರಹಿತ ಪ್ರೇಮಿಯೆಂದು ನಿರೀಕ್ಷಿಸಬೇಡಿ, ಅವರು ಪ್ರಾಯೋಗಿಕರಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಅವರ ನಿರ್ಧಾರಗಳನ್ನು ಬುದ್ಧಿ ಆಳುತ್ತದೆ. </p> <p> <b> ಮಿಥುನ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು:. </b> <br/> ಡಿಂಪಲ್ ಕಪಾಡಿಯಾ, ಶಿಲ್ಪಾ ಶೆಟ್ಟಿ, ಮಿಥುನ್ ಚಕ್ರವರ್ತಿ, ಪರೇಶ್ ರಾವಲ್ </p> <p> <b> ಮಿಥುನ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಹೊಂದಿಕೊಳ್ಳಬಲ್ಲ, ಬಹುಮುಖಿ, ಹಾಸ್ಯಪ್ರಜ್ಞೆಯ, ತಾರುಣ್ಯದ, ಉತ್ಸಾಹಭರಿತ <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಗಾಬರಿಯ, ಕೃತಕ, ಕುತಂತ್ರದ, ಅನಿರಂತರ </p> <p> <b> ಮಿಥುನ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಮೇಷ, ಸಿಂಹ, ತುಲಾ, ಕುಂಭ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) ಕರ್ಕ ಪುರುಷರು ಸೂಕ್ಷ್ಮಜ್ಞರೂ ಭಾವನಾಜೀವಿಗಳೂ ಮತ್ತು ಸುಲಭವಾಗಿ ನೋವಿಗೊಳಗಾಗುವವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಪ್ರಣಯಭಾವದವರು ಮತ್ತು ತನ್ನ ಆಕರ್ಷಕ ಪದಗಳಿಂದ ನಿಮ್ಮ ಹೃದಯ ಕದಿಯಬಹುದು. ಅವರು ಪ್ರೀತಿ, ಆರೈಕೆ ಮತ್ತು ಬೆಂಬಲ ನೀಡುವ ಸ್ನೇಹಿತರನ್ನು ಆಯ್ಕೆ ಮಾಡುತ್ತಾರೆ. ಅವರು ಮನೆಯಲ್ಲಿ ತನ್ನ ಆಪ್ತರ ಜೊತೆಗಿದ್ದಾಗ ಅತ್ಯಂತ ಸಂತೋಷದಿಂದಿರುತ್ತಾರೆ. ಅವರು ಸೂಕ್ಷ್ಮವಲ್ಲದ ಹಾಗೂ ಒರಟು ಜನರನ್ನು ದ್ವೇಷಿಸುತ್ತಾರೆ ಹಾಗೂ ಅವರು ಎಂದಿಗೂ ಒರಟಾದ ಸ್ತ್ರೀ ಅಥವಾ ಪುರುಷರ ಸ್ನೇಹ ಮಾಡುವುದಿಲ್ಲ. ಅವರ ಪ್ರಾಮಾಣಿಕತೆ, ನಿಷ್ಠೆ ಅವರನ್ನು ಅಪೇಕ್ಷಣೀಯವಾಗಿಸುತ್ತದೆ ಹಾಗೂ ಅವರ ಸಮೃದ್ಧ ಹಾಸ್ಯಪ್ರಜ್ಞೆ ಸಾವಿರ ಹೃದಯಗಳನ್ನು ಕದಿಯಬಹುದು. ಅವರು ತುಂಬಾ ಕೃಪಣರೂ ಅಲ್ಲ ಅಥವಾ ದುಂದುಗಾರರೂ ಅಲ್ಲದಿದ್ದರೂ ತನ್ನ ಹತ್ತಿರದವರ ಮನಸ್ಸನ್ನು  ಒಂದು ಮುದ್ದಾದ ಉಡುಗೊರೆಯಿಂದ ಗೆಲ್ಲುವುದು ಅವರಿಗೆ ತಿಳಿದಿದೆ. ಅವರ ವಿಚಿತ್ರ ವರ್ತನೆ ಮತ್ತು ಹೊಯ್ದಾಟ ಅವರನ್ನು ಆಗಾಗ ಅನಿರೀಕ್ಷಿತವಾಗಿಸಿದರೂ ಅಂದಿಗೂ  ಅವಿಶ್ವಾಸಿಗಳಲ್ಲ, ನೀವು ಅವರ ಉದ್ದೇಶಗಳಲ್ಲಿ ಪ್ರಶ್ನಾತೀತವಾಗಿ ಭರವಸೆಯಿಡಬಹುದು. </p> <p> <b> ಕರ್ಕ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಪ್ರಿಯಾಂಕಾ ಚೋಪ್ರ, ಜೂಲಿಯಾ ರಾಬರ್ಟ್ಸ್, ಟಾಮ್ ಕ್ರೂಸ್, ಪ್ರಿನ್ಸೆಸ್ ಡಯಾನಾ, ಪಮೇಲಾ ಆಂಡರ್ಸನ್. </p> <p> <b>  ಕರ್ಕ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಜನರ ಸಾಮಾನ್ಯ ಗುಣಗಳು: </b> <br/> ಧನಾತ್ಮಕ ಭಾವನಾತ್ಮಕ, ಪ್ರೀತಿಯ, ಅಂತರ್ಬೋಧೆಯ, ಕಾಲ್ಪನಿಕ, ಚಾಣಾಕ್ಷ, ಎಚ್ಚರಿಕೆಯ, ರಕ್ಷಣಾತ್ಮಕ, ಸಹಾನುಭೂತಿಯ <br/><b> ನಕಾರಾತ್ಮಕ </b> ಪರಿವರ್ತನಶೀಲ, ಭಾವುಕ, ಅತಿಭಾವುಕತೆಯ, ಅತೀ ಸೂಕ್ಷ್ಮತೆಯ, ಒಂದಕ್ಕೇ ಅಂಟಿಕೊಳ್ಳುವ </p> <p> <b>  ಕರ್ಕ ಚಂದ್ರರಾಶಿಯ ಹೊಂದಾಣಿಕೆಗಳು: </b> ಮೇಷ, ವೃಷಭ, ಕರ್ಕ, ಕನ್ಯಾ, ತುಲಾ, ಮಕರ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) ಸಿಂಹ ಪುರುಷರು ಕಠಿಣವಾದ ಬಾಹ್ಯ ಸ್ವರೂಪವನ್ನು ಹೊಂದಿದ್ದರೂ ಅಂತರಂಗದಲ್ಲಿ, ಭಾವನಾತ್ಮಕರೂ, ತೀವ್ರ ಸ್ವರೂಪದವರೂ ಮತ್ತು ಭಾವಜೀವಿಗಳೂ ಆಗಿರುತ್ತಾರೆ. ಅವರ ಸುತ್ತಲಿರುವ ಮಹಿಳೆಯರ ಬಗ್ಗೆ ಅತ್ಯಂತ ರಕ್ಷಣೆಯ ಭಾವ ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ತನ್ನ ಪ್ರೀತಿಪಾತ್ರರ ಬಗ್ಗೆ ತಂಬ ಒಡೆತನದ ಭಾವ ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಮುಂಚೂಣಿಯಲ್ಲಿರಲು ಬಹಳಷ್ಟು ಗಮನ ಪಡೆಯಲು ಇಷ್ಟಪಡುತ್ತಾರೆ ಕ್ರೀಡಾ ಮನೋಭಾವ ಹೊಂದಿರುತ್ತಾರೆ ಸದೃಢ ಶರೀರ ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಕೆಲವು ಬಾರಿ ಕೃತಕವಾಗಿರುತ್ತಾರೆ. ಅವರು ಸನ್ನಿವೇಶಗಳ ಹಾಗೂ ಕೆಲವೊಮ್ಮೆ ಅವರ ಸುತ್ತಲಿರುವವರ ಮೇಲೂ ಹಿಡಿತ ಹೊಂದಲು ಇಷ್ಟಪಡುತ್ತಾರೆ. ಅವರ ಉದ್ವೇಗ ಮತ್ತು ಆಕ್ರಮಣಶೀಲತೆ ನಿಮ್ಮನ್ನು ಅಸಂತುಷ್ಟಗೊಳಿಸಬಹುದು ಹಾಗೂ ಅವರು ಜಗ್ಗದವರೂ ಮತ್ತು ಅಪ್ರಾಯೋಗಿಕರೂ ಎಂದು ತಪ್ಪು ತಿಳಿದುಕೊಳ್ಳುವಂತೆ ಮಾಡಬಹುದು. ಅವರಿಗೆ ಅಚ್ಚರಿಗಳೆಂದರೆ ತುಂಬ ಇಷ್ಟ, ಹಾಗೂ ಅವರು ತನ್ನ ಪ್ರೀತಿಪಾತ್ರರಿಗೆ ಪ್ರೀತಿಯ ಸುರಿಮಳೆ ಹಾಗೂ ದುಬಾರಿ ಉಡುಗೊರೆಗಳನ್ನು ನೀಡುತ್ತಾರೆ. ನಿಸ್ಸಂಶಯವಾಗಿ ಇದು ಆತನನ್ನು ಸ್ವಲ್ಪ ದುಂದುಗಾರನನ್ನಾಗಿ ಮಾಡುತ್ತದೆ. ಮೆಚ್ಚುಗೆಯ ಅವರ ಪ್ರೀತಿ ಅವರನ್ನು ಮಿಥ್ಯಾ ಪ್ರಶಂಸೆ ಮತ್ತು ಅರ್ಥಹೀನ ಹೊಗಳಿಕೆಯಿಂದ ಮೋಸಹೋಗುವಂತೆ ಮಾಡುತ್ತದೆ. ಅವರು ಸ್ನೇಹಿತರ ಒಂದು ದೊಡ್ಡ ವಲಯವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಜನರ ಮಧ್ಯದಲ್ಲಿರಲು ಇಷ್ಟಪಡುತ್ತಾರೆ. </p> <p> <b> ಸಿಂಹ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಮನಿಷಾ ಕೊಯಿರಾಲಾ, ಕಾಜೋಲ್, ರಾಖೀ, ಮನೋಜ್ ಕುಮಾರ್, ಗುಲ್ಜಾರ್ </p> <p> <b> ಸಿಂಹ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: < / b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಸಜ್ಜನರು, ಪ್ರಣಯಿಗಳು, ಆಕರ್ಷಕರು, ಜೊತೆಗಿರಲು ಸುಲಭ, ಆದರ್ಶವಾದಿಗಳು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ನಿರ್ಣಯಕ್ಕೆ ಬರಲಾಗದ, ಬದಲಾಯಿಸಬಹುದಾದ ಹಾಗೂ ಮೋಸಹೋಗಬಹುದಾದ</p> < p> <b> ಸಿಂಹ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಕರ್ಕ, ಮೀನ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) ಕನ್ಯಾ ರಾಶಿಯ ಪುರುಷರು ಆದರ್ಶವಾದಿಗಳಾಗಿದ್ದು ದೊಡ್ಡದಾಗಿರಲಿ ಅಥವಾ ಸಣ್ಣದಾಗಿರಲಿ ಅವರು ಮಾಡುವದರೆಲ್ಲದರಲ್ಲೂ ಪರಿಪೂರ್ಣತೆಯನ್ನು ಬಯಸುತ್ತಾರೆ. ಜೀವನದಲ್ಲಿ ನಿರ್ಧಾರಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಲ್ಲಿ ತನ್ನ ಬುದ್ಧಿಯ ಮಾತನ್ನು ಕೇಳುವ ಅವರು, ಅವರು ತನ್ನ ಜೀವನ, ಕೆಲಸ ಮತ್ತು ಸಂಬಂಧಗಳಲ್ಲಿ ತರ್ಕಬದ್ಧರೂ ಮತ್ತು ವಿಶ್ಲೇಷಣಾತ್ಮಕರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಅಸಭ್ಯ, ಅವಿನಯಶೀಲ ಮತ್ತು ನಿಂದನಾ ಭಾಷೆಯನ್ನು ಅದ್ಭುತವಾಗಿ ದ್ವೇಷಿಸುವುದರಿಂದ ನೀವು ಅವರಿಗೆ ಏನು ಹೇಳುತ್ತೀರೆನ್ನುವುದನ್ನು ಅಳೆದು ಸುರಿದು ಮಾತನಾಡುವುದು ಮುಖ್ಯವಾಗಿರುತ್ತದೆ. ಅವರು ನಿಮ್ಮ ಬಗ್ಗೆ ಎಲ್ಲವೂ, ಅಂದರೆ ನೀವು ಬಟ್ಟೆ ಧರಿಸುವ ಹಾಗೂ ಮಾತನಾಡುವ ಶೈಲಿಯನ್ನೊಳಗೊಂಡು ಎಲ್ಲವನ್ನೂ ಗಮನಿಸುತ್ತಾರೆ, ಮತ್ತು ನೀವು ಎಚ್ಚರಿಕೆಯಿಂದ ನಡೆದುಕೊಳ್ಳುತ್ತೀರಿ ಎಂದು ನಿರೀಕ್ಷಿಸುತ್ತಾರೆ. ಇದರರ್ಥ ಅವರಿಗೆ ಅಹಂಕಾರವೆಂದಲ್ಲ ಆದರೆ ಬದಲಾಗಿ ಅವರು ಅತ್ಯಂತ ವಾಸ್ತವವಾದಿಗಳಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಸರಳ ಹಾಗೂ ಶಿಸ್ತಿನ ಜೀವನವನ್ನು ನಡೆಸುತ್ತಾರೆ. ಅವರು ತನ್ನ ಪ್ರೀತಿಪಾತ್ರರು ಮತ್ತು ಅವರ ಆಪ್ತ ಸ್ನೇಹಿತರ ಬಗ್ಗೆ ಪ್ರೀತಿ ಹಾಗೂ ರಕ್ಷಣಾ ಭಾವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರ ದೃಷ್ಟಿಕೋನ ತರ್ಕಬದ್ಧವಾಗಿರುವುದರಿಂದ ಅವರು ಚರ್ಚೆಯಲ್ಲಿ ಯಾವತ್ತೂ ಸೋಲುವುದಿಲ್ಲ ಮತ್ತು ತಂಬ ಸುಲಭವಾಗಿ ವ್ಯಾಜ್ಯಗಳನ್ನು ಕೊನೆಗೊಳಿಸುತ್ತಾರೆ. ಪ್ರಾಮಾಣಿಕರೂ, ಸಂಘಟಿತರೂ, ಬದ್ಧರೂ ಮತ್ತು ಸಹಾಯ ಮಾಡುವವರೂ ಆದ ಅವರು ಕೆಲವು ಬಾರಿ ಆಕ್ರಮಣಶಾಲಿಗಳಾಗಬಹುದು </p> <p> <b> ಕನ್ಯಾ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು:. </b> <br/> ಆಶಾ ಭೋಂಸ್ಲೆ, ರಾಕೇಶ್ ರೋಶನ್, ಅಗಾಥಾ ಕ್ರಿಸ್ಟಿ, ರಾಣಿ ಎಲಿಜಬೆತ್, ಜೋಸೆಫ್ ಕೆನಡಿ </p> <br/> <b> ಕನ್ಯಾ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡುಬರುವ ಗುಣಗಳು</b><br/><b>  ಧನಾತ್ಮಕ:: </b> ವಿನಯಶಾಲಿಗಳು, ಕರಾರುವಕ್ಕಾದವರು, ವಿಶ್ವಾಸಾರ್ಹ, ಪ್ರಾಯೋಗಿಕರು ಹಾಗೂ ಪರಿಶ್ರಮಿಗಳು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಚಡಪಡಿಕೆಯ, ವಿಮರ್ಶಾತ್ಮಕ, ಕಠಿಣ, ಸಂಪ್ರದಾಯವಾದಿಗಳು </p> <p> <b> ಕನ್ಯಾ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ವೃಷಭ, ಮಕರ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) ತುಲಾ ರಾಶಿಯ ಪುರುಷರು ತುಂಬ ಪ್ರಣಯಭಾವದವರೂ ಮತ್ತು ಸೃಜನಶೀಲರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಪ್ರೀತಿ, ಗೌರವಕ್ಕೆ ಪಾತ್ರರಾಗಿರುತ್ತಾರೆ  ಹಾಗೂ ಆಕರ್ಷಣೀಯ, ಆತ್ಮವಿಶ್ವಾಸದ ಮತ್ತು ಮೋಜನ್ನು ಪ್ರೀತಿಸುವವರೆಡೆಗೆ ಆಕರ್ಷಿತರಾಗುತ್ತಾರೆ. ಒಬ್ಬ ಸಂಗಾತಿಯಾಗಿ ಅವರು ನಿಮಗೆ ನಿಮ್ಮ ವೈಯಕ್ತಿಕ ಸ್ಥಳವನ್ನು ನೀಡುತ್ತಾರೆ ಹಾಗೂ ನೀವೂ ಅದನ್ನೇ ಮಾಡಬೇಕೆಂದು ನಿರೀಕ್ಷಿಸುತ್ತಾರೆ. ಅವರು ದುಬಾರಿ ಬಟ್ಟೆಗಳು, ವಾಚುಗಳು, ಶೂಗಳು, ಬ್ರಾಂಡೆಡ್ ಸುಗಂಧಗಳು, ಸಂಗೀತ, ನಾಟಕ ಹಾಗೂ ಕಲೆಯನ್ನು ಪ್ರೀತಿಸುತ್ತಾರೆ. ಅವರು ತನ್ನ ಚಿಂತನೆಯಲ್ಲಿ ಪ್ರಗತಿಪರರಾಗಿದ್ದು ಬದಲಾವಣೆಗೆ ಹೊಂದಿಕೊಳ್ಳುವರಾದ್ದರಿಂದ ಅವರು ತಮ್ಮ ಸುತ್ತಲೂ ಇರುವ ಜನರ ಅಭಿಪ್ರಾಯಗಳು ಮತ್ತು ಆಲೋಚನೆಗಳು ತಾರ್ಕಿಕವಾಗಿದ್ದಲ್ಲಿ ಅವುಗಳನ್ನು ಆಲಿಸುವಲ್ಲಿ ಯಾವುದೇ ಸಮಸ್ಯೆ ಹೊಂದಿರುವುದಿಲ್ಲ. ಅತ್ಯಂತ ವಾಚಾಳಿಯಾದ ಇವರು ಆಶಾವಾದಿಗಳೂ ಮತ್ತು ಉತ್ಸಾಹಭರಿತರೂ ಆದ ಜನರ ಜೊತೆ ಆಸಕ್ತಿದಾಯಕ ಸಂಭಾಷಣೆಯಲ್ಲಿ ಸುದೀರ್ಘವಾಗಿ ಪಾಲ್ಗೊಳ್ಳುವುದನ್ನು ಇಷ್ಟಪಡುತ್ತಾರೆ. ಅವರು ಸೋಮಾರಿಯಲ್ಲದಿದ್ದರೂ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳಲು ಸ್ವಲ್ಪ ಸಮಯ ತೆಗೆದುಕೊಳ್ಳುತ್ತಾರೆ. ಅವರ ಶಿಷ್ಟಾಚಾರ ಕಲವೊಮ್ಮೆ ಅತಿರೇಕಕ್ಕೆ ಹೋಗಬಹುದು ಮತ್ತು ಇದು ಅವರ ಸುತ್ತಲಿರುವ ಜನರಿಗೆ ಅಹಿತಕರವಾಗಬಹುದು. </p> <p> <b> ತುಲಾ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಕೇಟ್ ವಿನ್ಸ್ಲೆಟ್, ರೇಖಾ, ಕರೀನಾ ಕಪೂರ್, ಲತಾ ಮಂಗೇಶ್ಕರ್, ಅಮಿತಾಭ್ ಬಚ್ಚನ್, ಮಹಾತ್ಮಾ ಗಾಂಧಿ </p> <p> <b> ತುಲಾ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಶಿಷ್ಟಾಚಾರದವರು, ಪ್ರಣಯಭಾವದವರು, ಆಕರ್ಷಕ, ಸುಲಭ ನಡವಳಿಕೆಯವರು, ಆದರ್ಶವಾದಿಗಳು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ನಿರ್ಣಯಕ್ಕೆ ಬರಲಾಗದವರು, ಬದಲಿಸಬಹುದಾದವರು ಮತ್ತು ಮೋಸಹೋಗಬಹುದಾದವರ </p> <p> <b> ತುಲಾ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಮೇಷ, ಕರ್ಕ, ಸಿಂಹ, ತುಲಾ, ಧನು, ಮಕರ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) ವೃಶ್ಚಿಕ ಪ್ರುರುಷರು ಭಾವೋದ್ರಿಕ್ತರೂ ಹಾಸ್ಯಪ್ರವೃತ್ತಿಯವರೂ, ಸೂಕ್ಷ್ಮಜ್ಞರೂ ಮತ್ತು ಅತ್ಯಂತ ರಹಸ್ಯಮಯಿಗಳೂ ಆಗಿರುತ್ತಾರೆ. ಅವರ ಭಾವೋದ್ರಿಕ್ತ ಪ್ರಕೃತಿ ಮತ್ತು ಆತ್ಮವಿಶ್ವಾಸದ ವ್ಯಕ್ತಿತ್ವ ಅವರನ್ನು ಆಕರ್ಷಣೆಯ ಕೇಂದ್ರಬಿಂದುವಾಗಿಸುತ್ತದೆ. ಅವರ ಮಹಾತ್ವಾಕಾಂಕ್ಷೆಯೇ ಅವರಿಗೆ ಪ್ರೇರಣೆ ಮತ್ತು ಅವರು ಸಮಾಜದ ವ್ಯವಸ್ಥೆಯ ನಿಯಮಗಳಲ್ಲಿ ನಂಬಿಕೆಯಿಲ್ಲದ ಒಬ್ಬ ಬಂಡಾಯ ಪ್ರವೃತ್ತಿಯವರಾಗಿರುತ್ತಾರೆ. ಅವರು ಎಣೆಯಿಲ್ಲದಷ್ಟು ಮಾದಕವಾಗಿ, ಭಾವಚಿತ್ತದವರಾಗಿ, ಅರಾಮವಾಗಿ ಮತ್ತು ಅಚಲವಾಗಿರುತ್ತಾರೆ. ಅವರು ಕೃತಕವಾದ, ಟೊಳ್ಳಾದ ಮತ್ತು ತೀವ್ರತೆಯಿಲ್ಲದ ಎಲ್ಲವನ್ನೂ ದ್ವೇಷಿಸುತ್ತಾರೆ. ಅವರು ಸಂಪೂರ್ಣರೆಂದೆನಿಸಲು ಅವರ ಸುತ್ತಲೂ ನೈಜ ಜನರ ಒಂದು ಗುಂಪು ಬೇಕು. ಅವರಲ್ಲಿ ಯಾವತ್ತೂ ಏನೋ ಹೊಸತು ಮತ್ತು ಆಸಕ್ತಿದಾಯಕವಿದ್ದು ಅವರು ನಿಮ್ಮ ಜೊತೆಯಿದ್ದಷ್ಟು ಹೊತ್ತು ನಿಮಗೆ ಬೇಸರ ಬರುವುದಿಲ್ಲ. ಇದು ಅವರನ್ನು ಒಂದು ಬಹಿರರ್ಮುಖಿಯಾಗಿ ಮಾಡುತ್ತದೆ ಹಾಗೂ ಅವರು ಸ್ನೇಹಿತರು ಮತ್ತು ನಿಕಟವರ್ತಿಗಳ ಒಂದು ದೊಡ್ಡ ಗುಂಪನ್ನೇ ಹೊಂದಿರುತ್ತಾರೆ. ಆದರೆ ಅವರು ಒಂದು ಸಂಬಂಧದಲ್ಲಿ ಬಹಳವೇ ನಿರೀಕ್ಷಿಸುತ್ತಾರೆ ಮತ್ತು ಅವರ ಪ್ರೀತಿಯನ್ನು ಅದೇ ತೀವ್ರತೆಯಿಂದ ಮರಳಿ ನೀಡಲಾಗುತ್ತದೆ  ಎಂದು ನಿರೀಕ್ಷಿಸುತ್ತಾರೆ. ಈ ಶಾಂತ, ಸ್ಥಿರ ಪುರುಷನಲ್ಲಿ ನೀವು ಅಗಾಧ ಶಕ್ತಿಯನ್ನು ಕಾಣುತ್ತಿದ್ದು ಅದು ಕಾಂತೀಯ ಮತ್ತು ಗೀಳಿನಂತಿರುತ್ತದೆ.</p><p> <b> ವೃಶ್ಚಿಕ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಐಶ್ವರ್ಯ ರೈ, ಇಂದಿರಾ ಗಾಂಧಿ, ಜವಾಹರ್ ಲಾಲ್ ನೆಹರು, ಶಾರುಖ್ ಖಾನ್, ಬಿಲ್ ಗೇಟ್ಸ್, ಬ್ರಿಯಾನ್ ಆಡಮ್ಸ್, ಡೆಮಿ ಮೂರ್ </p> <p><b>ವೃಶ್ಚಿಕ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಲಕ್ಷಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಭಾವನಾತ್ಮಕರು, ತೀವ್ರಭಾವನೆಯವರು, ಘನತೆಯುಳ್ಳವರು, ಸೂಕ್ಷ್ಮಜ್ಞರು, ಅಂತರ್ಬೋಧೆಯವರು, ಮಾದಕತೆಯುಳ್ಳವರು, ರಹಸ್ಯಮಯಿಗಳು, ಭಾವೋದ್ರಿಕ್ತರು <br/> <b> ನಕಾರಾತ್ಮಕ: </b>, ಅಸೂಯಾಪರರು ಕೋಪಿಷ್ಟರು, ಒತ್ತಡ ಹೇರುವ ಧೋರಣೆಯವರು, ಗೀಳು ಹತ್ತಿಸಿಕೊಳ್ಳುವವರು, ರಹಸ್ಯಮಯಿಗಳು, ಹಠವಾದಿಗಳು </p> <p> <b> ವೃಶ್ಚಿಕ ಚಂದ್ರರಾಶಿಯ ಹೊಂದಾಣಿಕೆಯವರು: </b> ಕರ್ಕ ಮತ್ತು ಮೀನ. </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) ಧನು ರಾಶಿಯ ಪುರುಷರು ಒಂದು ಸಂತೋಷಕರ ಸ್ವಭಾವದ ವ್ಯಕ್ತಿಯಾಗಿರುತ್ತಾರೆ. ಅವರಲ್ಲಿ ಶಿಷ್ಟಾಚಾರದ ಕೊರತೆಯರುತ್ತದೆ ಮತ್ತು ಬಹಳಷ್ಟು ಬಾರಿ ಮುಚ್ಚುಮರೆಯಿಲ್ಲದಂತೆ ನೇರವಾಗಿರುತ್ತಾರೆ. ತನ್ನ ಆಪ್ತರ ಜೊತೆಯಿದ್ದಾಗ ಅವರು ಸ್ನೇಹಪರರೂ ಮತ್ತು ಮುಕ್ತ ಮಾತಿನವರೂ ಆಕರ್ಷಕವಾಗಿಯೂ ಇರುತ್ತಾರೆ. ಅವರು ಕಳೆದುಹೋದದ್ದರ ಬಗ್ಗೆ ಚಂತಿಸುವುದಿಲ್ಲ ಹಾಗೂ ಪ್ರಸ್ತುತದಲ್ಲಿ ಪ್ರಾಯೋಗಿಕವಾಗಿ ಬದುಕುತ್ತಾರೆ. ಜೀವನದ ಅಸಂತೋಷಕರ ಅನುಭವಗಳು ಅವರನ್ನು ನಿರಾಶಾವಾದಿಗಳಾಗಿಸುವುದಿಲ್ಲ ಹಾಗೂ ಅವರ ಆಶಾವಾದವೇ ಅವರಿಗೆ ಪ್ರೇರಣೆಯಾಗಿರುತ್ತದೆ. ಸವಾಲಿನ ಪರಿಸ್ಥಿತಿಯಲ್ಲೂ ಕೂಡ ಅವರು ಶರಣಾಗದೇ ಕೊನೆಯ ತನಕ ಹೋರಾಡುತ್ತಾರೆ. ಸಾಮಾನ್ಯವಾಗಿ ಅವರು ಸೇಡಿನ ಮನೋಭಾವ ಹೊಂದಿರದಿದ್ದರೂ ಯಾರಾದರೂ ಅವರನ್ನು ಕೆಳಗೆಳೆಯಲು ಪ್ರಯತ್ನಿಸಿದಾಗ ಅವರು ಸರಾಗವಾಗಿ ಅದನ್ನು ಮರಳಿ ನೀಡುತ್ತಾರೆ. ನೀವು ಅವರು ಆಜ್ಞಾಧಾರಕರಾಗಿರುತ್ತಾರೆಂದು ನಿರೀಕ್ಷಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ. ಅದರ ಬದಲಿಗೆ ಅವರನ್ನು ಉದಾಹರಣೆಯಿಂದ ಪ್ರೇರೇಪಿಸಬೇಕು ಮತ್ತು ಸಹಾನುಭೂತಿಯಿಂದ ಗೆಲ್ಲಬೇಕು. ಅವರ ನೇರತನ ಅನೇಕ ಬಾರಿ ಅವರನ್ನು ಕಠಿಣ ಸಂದರ್ಭಗಳಲ್ಲಿ ಸಿಲುಕಿಸಬಹುದು ಮತ್ತು ಅವರ ಪ್ರಾಮಾಣಿಕತೆ ಆಕ್ರಮಣಕಾರಿಯೆಂದು ಕಾಣಬಹುದು. ಅವರು ಪ್ರಯಾಣವನ್ನು ಇಷ್ಟಪಡುತ್ತಾರೆ ಮತ್ತು ದಿನನಿತ್ಯದ ಜೀವನ ಮತ್ತು ಏಕತಾನತೆಯ ವಿಷಯಗಳಲ್ಲಿ ಸಿಲುಕಿಕೊಳ್ಳುವುದನ್ನು ದ್ವೇಷಿಸುತ್ತಾರೆ. </p> <p> <b> ಧನು ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಧರ್ಮೇಂದ್ರ, ಶತ್ರುಘ್ನ ಸಿನ್ಹಾ, ದಿಲೀಪ್ ಕುಮಾರ್, ವಿನ್ ಸ್ಟನ್ ಚರ್ಚಿಲ್ </p> <p> <b> ಧನು ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಆಶಾವಾದಿಗಳು, ಖುಷಿಯ ಪ್ರವೃತ್ತಿಯವರು, ಸ್ವಯಂ ವಿನೋದಿಗಳು, ಪ್ರಾಮಾಣಿಕರು, ತಾತ್ವಿಕರು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಅಸಡ್ಡೆಯವರು, ಅತಿ ಆಶಾವಾದಿಗಳು, ಯೋಜನೆಯಿಲ್ಲದವರು, ಅವಿಶ್ರಾಂತರು </p> <p> <b> ಧನು ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಕರ್ಕ, ಮೀನ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: ಮಕರ ಪುರುಷರು </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/> ಆರಂಭದಲ್ಲಿ ಸಮೀಪಿಸಲು ಅತ್ಯಂತ ಕಷ್ಟವಾದ ಒಬ್ಬ ಸೌಮ್ಯ ಮನುಷ್ಯರಾಗಿರುತ್ತಾರೆ. ಅವರು ಒಂದು ಕಠಿಣವಾದ ಬಾಹ್ಯ ರೂಪದಡಿಯಲ್ಲಿ ತನ್ನ ನೈಜ ಸೂಕ್ಷ್ಮ ಸ್ವರೂಪವನ್ನು ಸುರಕ್ಷಿತವಾಗಿ ಕಾಯ್ದುಕೊಳ್ಳುತ್ತಾರೆ. ಅವರು ಅಂತರ್ಮುಖಿಯಾಗಿದ್ದು ಜನಜಂಗುಳಿಯಲ್ಲಿ ನಾಚಿಕೆ ಹೊಂದಿರುತ್ತಾರೆ, ಮಾತ್ರ ಅವರನ್ನು ತಿಳಿದ ನಿಜವಾಗಿಯೂ ಆಪ್ತರಾದ ಸ್ನೇಹಿತರ ಮುಂದೆ ಹಾಗೂ ಅವರು ಸಂತೋಷದಿಂದಿರುವವರ ಮುಂದೆ ಮಾತ್ರ ತೆರೆದುಕೊಳ್ಳುತ್ತಾರೆ. ಅವರು ನಿಮ್ಮ ಸಂಗದಲ್ಲಿ ಆರಾಮವಗಿದ್ದಾಗ ಅವರ ಅಸಾಮಾನ್ಯ ಹಾಸ್ಯಪ್ರಜ್ಞೆಯಿಂದ ನಿಮ್ಮನ್ನು ಅಚ್ಚರಿಗಳಿಸಬಲ್ಲರು. ಅವರು ಚಂಚಲ ಮನಸ್ಸಿನವಲ್ಲವಾದರೂ ಪದೇ ಪದೇ ಉಂಟಾಗುವ ಅವರ ಮನಸ್ಸಿನ ಹೊಯ್ದಾಟ ನೀವು ಅವರು ಸೂಕ್ಷ್ಮವಲ್ಲದವರು ಎಂದು ತಿಳಿದುಕೊಳ್ಳುವಂತೆ ಮಾಡಬಹುದು ಹಾಗೂ ನಿಮ್ಮನ್ನು ನೋಯಿಸಬಹುದು. ಆದರೆ, ಅವರ ಹೃದಯದ ಆಳದಲ್ಲಿ ಅವರ ಪ್ರೀತಿಪಾತ್ರರೆದುರು ಅವರು ನಿಸ್ಸಹಾಯಕರಾಗಿರುತ್ತಾರೆ. ಅವರು ಮಿತವ್ಯಯಕಾರಿಗಳಾಗಿರುತ್ತಾರೆ ಮತ್ತು ತಮ್ಮ ವೆಚ್ಚಗಳನ್ನು ಗಮನಿಸುತ್ತಿರುತ್ತಾರೆ ಮತ್ತು ವ್ಯರ್ಥವಾಗಿ ಖರ್ಚು ಮಾಡುವುದಿಲ್ಲ. ಅವರು ನಿಸ್ಸಂದೇಹವಾಗಿಯೂ ಮಹತ್ವಾಕಾಂಕ್ಷಿಗಳಾದರೂ ಅವರು ಎಂದಿಗೂ ತನ್ನ ಕುಟುಂಬವನ್ನು ಹಾಗೂ ಅದರೆಡೆಗಿನ ತನ್ನ ಜವಾಬ್ದಾರಿಗಳನ್ನು ನಿರ್ಲಕ್ಷಿಸುವುದಿಲ್ಲ. </p> <p> <b> ಮಕರ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಅನು ಅಗರ್ವಾಲ್, ರೀನಾ ರಾಯ್, ಸಲ್ಮಾನ್ ಖಾನ್, ಅನಿಲ್ ಕಪೂರ್, ಜಾವೇದ್ ಅಖ್ತರ್, ನಾನಾ ಪಾಟೇಕರ್ </p> <p> <b>ಮಕರ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಲಕ್ಷಣಗಳು  </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ವಾಸ್ತವಾದಿಗಳು, ಜಾಗರೂಕರು, ಮಹತ್ವಾಕಾಂಕ್ಷೆಯವರು, ಸಹಿಷ್ಣುಗಳು, ಎಚ್ಚರಿಕೆಯಿಂದಿರುವವರು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ನಿರಾಶಾವಾದಿಗಳು, ವಿಧಿವಾದಿಗಳು, ಕೃಪಣರು, ಸೇಡಿನ ಮನೋಭಾವದವರು</p> <p> <b> ಮಕರ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ವೃಷಭ, ಕನ್ಯಾ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/> ಕುಂಭ ರಾಶಿಯ ಪುರುಷರು ತುಂಬ ಸ್ವತಂತ್ರರೂ, ಬುದ್ಧಿವಂತರೂ ಹಾಗೂ ಅದೇ ಸಮಯದಲ್ಲಿ ಒಬ್ಬ ಕನಸುಗಾರರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಚಿತ್ತ ಬದಲಾವಣೆಯವರು, ಅನಿರೀಕ್ಷಿತರು ಮತ್ತು ಸುಲಭವಾಗಿ ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಕಷ್ಟವಾದವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಸಮಾಜದ ನೀತಿನಿಯಮಗಳನ್ನು ಲೆಕ್ಕಿಸದೇ ತನ್ನದೇ ನಿಯಮಗಳ ಪ್ರಕಾರ ಬದುಕುತ್ತಾರೆ. ಅವರು ಜೀವನವನ್ನು ತನ್ನಿಷ್ಟದ ಪ್ರಕಾರ ಬದುಕಲು ಇಷ್ಟಪಡುವುದರಿಂದ ಬೇರೆಯವರ ಜೀವನದಲ್ಲಿ ಹಸ್ತಕ್ಷೇಪ ಮಾಡುವುದಿಲ್ಲ ಮತ್ತು ಇತರರಿಂದಲೂ ಅದನ್ನೇ ನಿರೀಕ್ಷಿಸುತ್ತಾರೆ. ಕೆಲವೊಮ್ಮೆ ಅವರು ನಿರ್ಲಿಪ್ತರಾಗಿರುತ್ತಾರೆ, ಅವರಿಗೆ ಕಾಳಜಿಯೇ ಇಲ್ಲವೇನೋ ಎಂಬಂತಿದ್ದರೂ ಅವರಿಗೆ ಕಾಳಜಿಯಿರುತ್ತದೆ. ಅವರಿಗೆ ಸಮಾನತೆಯಲ್ಲಿ ಪದಶಃ ನಂಬಿಕೆಯಿರುತ್ತದೆ ಹಾಗೂ ಅವರು ಎಲ್ಲರನ್ನೂ ಸಮಾನವಾಗಿ ನಡೆಸಿಕೊಳ್ಳುತ್ತಾರೆ. ಕನಸುಗಾರನಾದ ಅವರು ನಿರ್ಲಿಪ್ತರಂತೆ ಕಾಣಿಸಬಹುದಾದರೂ ಎಲ್ಲವನ್ನೂ ಗಮನಿಸುತ್ತಿರುತ್ತಾರೆ. ಅವರು ಲೋಕ ಹೇಳುವುದರ ಬಗ್ಗೆ ತಲೆಕೆಡಿಸಿಕೊಳ್ಳುವುದಿಲ್ಲವಾದ್ದರಿಂದ ಅವರು ವಿಚಿತ್ರವಾದ ಕೆಲಸಗಳನ್ನು ಮಾಡಿ ನಿಮ್ಮನ್ನು ರಂಜಿಸುತ್ತಾರೆಂದು ನಿರೀಕ್ಷಿಸಬಹುದು. </p> <p> <b> ಕುಂಭ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಊರ್ಮಿಳಾ ಮಾತೊಂಡ್ಕರ್, ಪ್ರೀತಿ ಜಿಂಟಾ, ವಹೀದಾ ರೆಹಮಾನ್, ಸುಭಾಷ್ ಘಾಯ್ </p> <p> <b> ಕುಂಭ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಸ್ನೇಹಪರರು, ಮಾನವೀಯ ಮೌಲ್ಯದವರು, ಸ್ವೋಪಜ್ಞರು, ಸೃಜನಶೀಲರು, ಸ್ವತಂತ್ರರು, ಬುದ್ಧಿಜೀವಿಗಳು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ದುರಾಗ್ರಹದವರು, ಭಾವಶೂನ್ಯರು, ನಿರ್ಲಿಪ್ತರು, ಅನಿರೀಕ್ಷಿತರು </p> <p> <b> ಕುಂಭ ಚಂದ್ರರಾಶಿಯ ಹೊಂದಾಣಿಕೆ: </b> ಮಿಥುನ ಮತ್ತು ತುಲಾ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/>  ಮೀನರಾಶಿಯ ಪುರುಷರು ಪ್ರತಿಭಾವಂತರು ಮತ್ತು ಸೃಜನಾತ್ಮಕರಾಗಿರುತ್ತಾರೆ. ಅವರು ಅತೀಂದ್ರಿಯ ವಿಜ್ಞಾನದ ಕಡೆಗೆ ಸಹಜ ಆಕರ್ಷಣೆ ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಬದಲಾವಣೆಗಳಿಗೆ ಸುಲಭವಾಗಿ ಹೊಂದಿಕೊಳ್ಳುತ್ತಾರೆ. ಅವರು ಬದಲಾವಣೆಯನ್ನು ಜೀವನದ ಸಹಜ ವಿಧಾನವೆಂದು ಪರಿಗಣಿಸುತ್ತಾರೆ ಮತ್ತು ಇದು ಅವರ ಜೊತೆಗಿರಲು ಸುಲಭವಾಗಿಸುತ್ತದೆ. ಅವರು ಸೂಕ್ಷ್ಮಜ್ಞರೂ ಮತ್ತು ಸಾಮಾನ್ಯವಾಗಿ ಸ್ವಯಂ ಗೀಳು ಹೊಂದಿರುವವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಎಲ್ಲದಕ್ಕೂ ಒಂದು ಆಶಾಭಾವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರ ಯಶಸ್ಸು ಹಾಗೂ ಅವನತಿಗಳೆರಡಕ್ಕೂ ಅವರು ಅದನ್ನು ಹೇಗೆ ಬಳಸುತ್ತಾರೆನ್ನುವುದನ್ನು ಆಧರಿಸ ಕಲ್ಪನೆಯೇ ಕೀಲಿಕೈಯಾಗಿರುತ್ತದೆ. ಅವರು ಬಹಳಷ್ಟು ಬಾರಿ ಚಿತ್ತ ಬದಲಾವಣೆಯವರಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಕಾರಣದ ಜೊತೆ ಅಥವಾ ಅದಿಲ್ಲದೇ ಚಿತ್ತ ಬದಲಾವಣೆಗಳನ್ನು ಹೊಂದುತ್ತಿರುತ್ತಾರೆ. ಅವರು ಇತರರಿಂದ ಬಹಳ ನಿರೀಕ್ಷೆ ಮಾಡಿದರೂ ಅದೇ ಸಮಯದಲ್ಲಿ ಅವರನ್ನು ತುಂಬಾ ಚೆನ್ನಾಗಿ ಅರ್ಥ ಮಾಡಿಕೊಳ್ಳುತ್ತಾರೆ. ಅವರಿಗೆ ಇಷ್ಟವಿರದದ್ದನ್ನು ಬಲವಂತವಾಗಿ ಮಾಡುವುದನ್ನು ಅವರು ದ್ವೇಷಿಸುತ್ತಾರೆ ಮತ್ತು ಅವರು ಮಾಡಲು ಬಯಸುವುದನ್ನು ಪ್ರೀತಿಸುತ್ತಾರೆ. ಅವರು ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಮನಸ್ಥಿತಿಯನ್ನು ಬಹಳ ಶೀಘ್ರವಾಗಿ ಅರ್ಥ ಮಾಡಿಕೊಳ್ಳುವುದರಿಂದ ಅವರನ್ನು ಮೋಸ ಮಾಡಲು ಸಾಧ್ಯವಿಲ್ಲ. </p> <p> <b> ಮೀನ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ  ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಪ್ರೀತಿ ಜಿಂಟಾ, ಚೆಲ್ಸಿಯಾ ಕ್ಲಿಂಟನ್, ಆಲ್ಬರ್ಟ್ ಐನ್ಸ್ಟೈನ್, ಮೈಕೆಲ್ಯಾಂಜೆಲೊ </p> <p> <b> ಮೀನ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಕಾಲ್ಪನಿಕರು, ಸೂಕ್ಷ್ಮಜ್ಞರು, ಸಹಾನುಭೂತಿಯುಳ್ಳವರು, ನಿಸ್ವಾರ್ಥಿಗಳು, ಸಹಾನುಭೂತಿಯುಳ್ಳವರು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಪಲಾಯನವಾದಿಗಳು, ಆದರ್ಶವಾದಿಗಳು, ರಹಸ್ಯ ಸ್ವಭಾವದವರು - ದುರ್ಬಲ ಇಚ್ಛಾಶಕ್ತಿಯುಳ್ಳವರು </p> <p> <b> ಮೀನ ಚಂದ್ರರಾಶಿಯ ಹೊಂದಾಣಿಕೆ: </b> ವೃಷಭ, ಮಿಥುನ, ಕನ್ಯಾ, ಧನು, ಮಕರ, ಮೀನ </p> 
ASTRO_SKETCH_DATA_FEMALE = <p><b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b>(ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್)<br/>ಮೇಷ ಮಹಿಳೆಯರು ಜನ್ಮತಃ ನಾಯಕಿಯಾಗಿದ್ದು ಯಾವುದನ್ನಾದರೂ ಆರಂಭಿಸುವಲ್ಲಿ ಮೊದಲಿಗಳಾಗಿರುತ್ತಾಳೆ. ಅವಳು ಅತ್ಯಂತ ಕಷ್ಟಕರ ಸಂದರ್ಭಗಳಲ್ಲೂ ಬಾಳುತ್ತಾಳೆ ಮತ್ತು ಅತ್ಯಂತ ಭಯಂಕರ ದುರಂತಗಳಿಂದಲೂ ಹೊರಬರುತ್ತಾಳೆ. ಅವಳು ಸ್ವತಂತ್ರಳೂ ನಿರಾತಂಕಳೂ ಮತ್ತು ಧೈರ್ಯಸ್ಥಳೂ ಆಗಿರುತ್ತಾಳೆ.  ಅವಳಿಗೆ ಭಟ್ಟಂಗಿತನ ಇಷ್ಟವಿಲ್ಲ ಬದಲಿಗೆ ಪ್ರಾಮಾಣಿಕ ಹೊಗಳಿಕೆ ಅವಳಿಗೆ ಇಷ್ಟ. ಅವಳು ಆಕ್ರಮಣಕಾರಿಯೂ, ಭವಿಷ್ಯದಲ್ಲಿ ಬದುಕುವವಳೂ ಆಶಾವಾದಿಯೂ ಮತ್ತು ಜೀವನವನ್ನು ಪೂರ್ಣವಾಗಿ ಬದುಕುವವಳೂ ಆಗಿರುತ್ತಾಳೆ;. ಅವಳ ಮೆಲೆ ಅನುಮಾನಪಡುವುದನ್ನು ಅವಳು ದ್ವೇಷಿಸುತ್ತಾಳೆ ಶಂಕಿತ, ಹಾಗೂ ಅವಳಿಗೇ ಒಡೆತನದ ಭಾವನೆಯಿದ್ದರೂ ಅವಳ ಮೇಲೆ ಯಾರಾದರೂ ಒಡೆತನ ಸಾಧಿಸುವುದು ಅವಳಿಗೆ ಇಷ್ಟವಿರುವುದಿಲ್ಲ. ಸ್ವಭಾವತಃ ಅವಳು ಅತ್ಯಂತ ದಯಾಳು, ಕೋಮಲ, ನಿಷ್ಠಾವಂತೆ ಮತ್ತು ಬೆಂಬಲ ನೀಡುವವಳಾಗಿರುತ್ತಾಳೆ. ಅವಳು ಮದುವೆಯ ನಂತರವೂ ತನ್ನ ವೃತ್ತಿಜೀವನವನ್ನು ಮುಂದುವರಿಸುವ ಗರಿಷ್ಠ ಸಾಧ್ಯತೆಯಿದೆ. ಅವಳು ಭೂತಕಾಲದ ಬಗ್ಗೆ ತಲೆಕೆಡಿಸಿಕೊಳ್ಳದಿರುವುದರಿಂದ ಅವಳು ಮತ್ತೆ ಮತ್ತೆ ಅದೇ ತಪ್ಪುಗಳನ್ನು ಮಾಡುವ ಸಾಧ್ಯತೆಯಿದೆ </p> <p> <b> ಮೇಷ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು:. </b> <br/> ಜಯಪ್ರದಾ, ಮಮತಾ ಕುಲಕರ್ಣಿ, ರಾಣಿ ಮುಖರ್ಜಿ, ಜಿತೇಂದ್ರ </p> <p> <b> ಮೇಷ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಲಕ್ಷಣಗಳು: </b> <br/><b> ಧನಾತ್ಮಕ : </b> ಸಾಹಸಿಗಳು, ಶಕ್ತಿವಂತರು, ಧೈರ್ಯಸ್ಥರು, ಕ್ರಿಯಾಶೀಲರು, ಬುದ್ಧಿಚಾತುರ್ಯದವರು ಹಾಗೂ ಹಾಸ್ಯಪ್ರಜ್ಞೆಯಿರುವವರು <p/> <b> ನಕಾರಾತ್ಮಕ: </b> ಸ್ವಾರ್ಥಿಗಳು, ಶೀಘ್ರ ಕೋಪಿಗಳು, ಹಠಾತ್ ಪ್ರವೃತ್ತಿಯವರು ಮತ್ತು ತಾಳ್ಮೆಯಿಲ್ಲದವರು </p><p><b> ಮೇಷ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಮಿಥುನ, ಸಿಂಹ, ಧನು, ಮತ್ತು ಕುಂಭ ರಾಶಿ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b>  (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/> ವೃಷಭ ರಾಶಿಯ ಸ್ತ್ರೀಯರಿಗೆ ಒಂದು ಆಕರ್ಷಕವಾದ ಮತ್ತು ಆಸಕ್ತಿಕರ  ವ್ಯಕ್ತಿತ್ವದ ಆಶೀರ್ವಾದವಿರುತ್ತದೆ. ಅವರ ಕಾಂತೀಯ ವ್ಯಕ್ತಿತ್ವದಿಂದಾಗಿ. ಅವರು ಗುಂಪಿನಲ್ಲಿ ಕೇಂದ್ರಬಿಂದುವಾಗಿರುತ್ತಾರೆ. ಅವಳು ಒಂದು ಸ್ನೇಹಪರವಾದ, ಸಂತೋಷಕರವಾದ ಮತ್ತು ಅತ್ಯುತ್ತಮವಾದ ಸಂವಹನವನ್ನು ಹೊಂದಿರುತ್ತಾಳೆ. ಅವಳು ತಾನು ಹೇಗೆ ಕಾಣುತ್ತಾಳೆನ್ನುವುದರ ಬಗ್ಗೆ ಜಾಗರೂಕಳಾಗಿರುತ್ತಾಳೆ ಮತ್ತು ಸುಲಭವಾಗಿ ತೂಕ ಹೆಚ್ಚಾಗುವ ಪ್ರವೃತ್ತಿಯನ್ನು ಹೊಂದಿರಬಹುದು. ಅವರು ಸ್ವಭಾವತಃ ಬಹಳ ಶಾಂತ ಪ್ರಕೃತಿಯವಳಾಗಿರುತ್ತಾಳೆ ಮತ್ತು ವಾಸ್ತವವಾಗಿ ಕಷ್ಟಕರ ಸಂದರ್ಭಗಳನ್ನು ತಾಳ್ಮೆಯಿಂದ ನಿಭಾಯಿಸುತ್ತಾಳೆ. ಅವಳ ಬಲವಾದ ಮಾನಸಿಕ ಸ್ಥೈರ್ಯವನ್ನು ಎಲ್ಲರೂ ಮೆಚ್ಚುತ್ತಾರೆ ಹಾಗೂ ಅವಳು ಆಗಾಗ್ಗೆ ನೈತಿಕ ಹಾಗೂ ಭಾವನಾತ್ಮಕ ಧೈರ್ಯವನ್ನು ಪ್ರದರ್ಶಿಸುತ್ತಾಳೆ. ಅವಳು ನಿಜವಾಗಿಯೂ ವಿಶ್ವಾಸಾರ್ಹಳೂ ಮತ್ತು ನಿಷ್ಠಾವಂತಳೂ ಆಗಿರುತ್ತಾಳೆ. ಅವಳು ತನ್ನ ವಸ್ತುಗಳ ಬಗ್ಗೆ ಬಹಳವೇ ಸ್ವಾಮ್ಯದ ಭಾವನೆ ಹೊಂದಿರುತ್ತಾಳೆ, ಜೀವನವನ್ನು ಸುಲಭ ರೀತಿಯಲ್ಲಿ ವಾಸಿಸುವ ಪ್ರವೃತ್ತಿ ಹೊಂದಿರುತ್ತಾಳೆ ಮತ್ತು ಸ್ವಲ್ಪ ಹಠಮಾರಿ ಧೋರಣೆಯನ್ನು ಹೊಂದಿರುತ್ತಾಳೆ</p> <p> <b> Vrishabh ರಾಶಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು:. </b> <br /> ಅಂಜಲಿ Jathar, ಮಾಧುರಿ ದಿಕ್ಷಿತ್, Moushami ಚಟರ್ಜಿ, ಪೂಜೆ ಬೇಡಿ </p><p><b> ವೃಷಭ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: ಅಂಜಲಿ ಜಾಥರ್, ಮಾಧುರಿ ದೀಕ್ಷಿತ್, ಮೌಸಮಿ ಚಟರ್ಜಿ, ಪೂಜಾ ಬೇಡಿ </b><br/><b> ಸಕಾರಾತ್ಮಕ </b>  ಸಹಿಷ್ಣು, ವಿಶ್ವಾಸಾರ್ಹ, ಸದ್ಗುಣದ, ಕಾರ್ಯಸಾಧಕ, ಪ್ರಸನ್ನವಾದ <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಅಸೂಯೆ, ಒಡೆತನ ಸಾಧಿಸುವಿಕೆ, ಬಗ್ಗದ, ಸ್ವಯಂ ಸಂತೋಷದ</p><p><b> ವೃಷಭ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ </b> ಕರ್ಕ, ಕನ್ಯಾ, ಮಕರ, ಮೀನ </ p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/>  ಮಿಥುನ ರಾಶಿಯ ಸ್ತ್ರೀಯರು ಉತ್ಸಾಹಭರಿತರೂ ಮತ್ತು ಆಕರ್ಷಕರೂ ಮತ್ತು ಅತ್ಯುತ್ತಮ ಮಾತುಗಾರರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಮಾನಸಿಕವಾಗಿ ಮತ್ತು ದೈಹಿಕವಾಗಿ ಸಕ್ರಿಯವಾಗಿರುವುದರಿಂದ ಅವರು ಇರುವುದಕ್ಕಿಂತಲೂ ಹೆಚ್ಚು ಕಿರಿಯರಾಗಿ ಕಾಣುತ್ತಾರೆ. ಅವರು ಪ್ರಕ್ಷುಬ್ಧರೂ, ಸುಲಭವಾಗಿ ಬೇಸರಗೊಳ್ಳುವವಳೂ ಮತ್ತು ಧೀರ್ಘ ಕಾಲದವರೆಗೆ ಒಂದೇ ವಿಷಯದ ಮೇಲೆ ಗಮನ ಹರಿಸಲು ಅಸಾಧ್ಯವಾದವಳೂ ಆಗಿರುತ್ತಾಳೆ. ಅವಳು ಎಣೆಯಿಲ್ಲದ ಕುತೂಹಲ ಹೊಂದಿರುತ್ತಾಳೆ. ಇದರ ದುಷ್ಪರಿಣಾಮವೆಂದರೆ ಅವಳು ನಿರಂತರವಾಗಿ ಮನಸ್ಸು ಬದಲಿಸುತ್ತಿರುತ್ತಾಳೆ ಹಾಗೂ ಅವಳನ್ನು ನಂಬಲು ಸಾಧ್ಯವೇ ಇಲ್ಲದಿರಬಹುದು. ಅವಳು ತನ್ನ ಉದ್ದೇಶಗಳನ್ನು ಪೂರೈಸಲು ಇತರರನ್ನು ಬಳಸಿಕೊಳ್ಳುವ ಪ್ರವೃತ್ತಿ ಹೊಂದಿರುತ್ತಾಳೆ. ಅವಳು ಆಕರ್ಷಣೀಯ ಪ್ರಸ್ತುತಿಯಿಂದ ಅವಳು ಆಕರ್ಷಣೆಯ ಕೇಂದ್ರಬಿಂದುವಾಗಿರುತ್ತಾಳೆ. ಅವರು ತನ್ನ ಬಹಳಷ್ಟು ನಿರ್ಧಾರಗಳನ್ನು ಬೌದ್ಧಿಕವಾಗಿ ತೆಗೆದುಕೊಳ್ಳುತ್ತಾಳೆ ಹಾಗೂ ಬೌದ್ಧಿಕವಾದದ್ದೆಲವನ್ನೂ ಅವಳು ಬಹಳವಾಗಿ ಗೌರವಿಸುತ್ತಾಳೆ </p> <p> <b> ಮಿಥುನ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು:. </b> <br/> ಡಿಂಪಲ್ ಕಪಾಡಿಯಾ, ಶಿಲ್ಪಾ ಶೆಟ್ಟಿ, ಮಿಥುನ್ ಚಕ್ರವರ್ತಿ, ಪರೇಶ್ ರಾವಲ್ </p> <p> <b> ಮಿಥುನ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಹೊಂದಿಕೊಳ್ಳಬಲ್ಲ, ಬಹುಮುಖಿ, ಹಾಸ್ಯಪ್ರಜ್ಞೆಯ, ತಾರುಣ್ಯದ, ಉತ್ಸಾಹಭರಿತ <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಗಾಬರಿಯ, ಕೃತಕ, ಕುತಂತ್ರದ, ಅನಿರಂತರ </p> <p> <b> ಮಿಥುನ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಮೇಷ, ಸಿಂಹ, ತುಲಾ, ಕುಂಭ </ p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/>  ಕರ್ಕ ಮಹಿಳೆಯರು ಸ್ವಭಾವತಃ ಅತೀಸೂಕ್ಷ್ಮವಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಆದ್ದರಿಂದ ಸುಲಭವಾಗಿ ನೋವಿಗೊಳಗಾಗುತ್ತಾರೆ. ಸಾಮಾನ್ಯವಾಗಿ ಅವಳು ಪ್ರೀತಿ ಮನೋಭಾವದವಳಾಗಿರುತ್ತಾಳೆ ಹಾಗೂ ಅವಳನ್ನು ಬಯಸುತ್ತಾರೆ ಎನ್ನುವುದರ ಬಗ್ಗೆ ಅವಳಿಗೆ ನಿರಂತರ ಭರವಸೆಯ ಅಗತ್ಯವಿರುತ್ತದೆ. ಅವಳಿಗೆ ಆರೈಕೆಯ ಅಗತ್ಯವಿರುತ್ತದೆ. ಅವಳು ಚಿತ್ತಬದಲಾವಣೆಯವಳೂ, ಅತಿ ಕಾಳಜಿಯುಳ್ಳವಳೂ ಆಗಿದ್ದು ಈ ಗುಣಗಳು ಅವಳ ಭಾವನಾತ್ಮಕ ಪ್ರಕೃತಿಯಿಂದ ಜನಿಸುತ್ತವೆ. ಅವಳು ಮೃದು ಕೋಮಲೆ ಹಾಗೂ ಭಯದ ಸ್ವಾಭವದವಳಾಗಿರುತ್ತಾಳೆ. ಅವಳಿಗೆ ಟೀಕೆಗಳು ಇಷ್ಟವಾಗುವುದಿಲ್ಲ ಹಾಗೂ ನಿರಾಕರಣೆಯನ್ನು ಸಹಿಸಿಕೊಳ್ಳಲಾಗುವುದಿಲ್ಲ ಹಾಗೂ ಕಠಿಣ ಪದಗಳಿಂದ ತುಂಬ ನೋವನ್ನು ಅನುಭವಿಸುತ್ತಾಳೆ ಮತ್ತು ಇವಳನ್ನು ಜಾಗರೂಕತೆಯಿಂದ ನೋಡಿಕೊಳ್ಳಬೇಕು. ಅವಳ ದೊಡ್ಡ ಆಸ್ತಿಯೆಂದರೆ ಅವಳು ಹೊಂದುವ ಪ್ರತಿ ಸಂಬಂಧದಲ್ಲೂ ತನ್ನ ತೀವ್ರ ನಿಷ್ಠೆಯನ್ನು ಪ್ರದರ್ಶಿಸುವುದಾಗಿದೆ. ಅವಳು ಬೆಚ್ಚಗಿನ ಮತ್ತು ಶ್ರೀಮಂತ ಹಾಸ್ಯದಿಂದ ನಿಮ್ಮನ್ನು ಸಂತೋಷವಾಗಿಡುತ್ತಾಳೆ. ಅವಳೊಬ್ಬ ಅದ್ಭುತ ಪಾಕಪ್ರವೀಣೆ. ತುಂಬ ಜಿಪುಣಳೂ ಅಲ್ಲ ಅಥವಾ ತುಂಬ ಖರ್ಚು ಮಾಡುವವಳೂ ಅಲ್ಲ. ತನ್ನ ಪ್ರೀತಿಪಾತ್ರರನ್ನು, ಪ್ರೀತಿಯಿಂದ ಮತ್ತು ಕಾಳಜಿಯಿಂದ ನೋಡಿಕೊಳ್ಳುತ್ತಾಳೆ. ಅವಳು ತನ್ನ ಚಿತ್ತಬದಲಾವಣೆಯಿಂದಾಗಿ ಅನಿರೀಕ್ಷಿತವಾಗಿ ತೋರಬಹುದಾದರೂ ಅವಳ ಮನಸ್ಸು ಚಂಚಲವಲ್ಲ ಮತ್ತು ಅವಳು ಎಂದಿಗೂ ಯಾರಿಗೂ ತೊಂದರೆ ಕೊಡುವ ಉದ್ದೇಶ ಹೊಂದಿರುವುದಿಲ್ಲ. </p> <p> <b> ಕರ್ಕ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಪ್ರಿಯಾಂಕಾ ಚೋಪ್ರ, ಜೂಲಿಯಾ ರಾಬರ್ಟ್ಸ್, ಟಾಮ್ ಕ್ರೂಸ್, ಪ್ರಿನ್ಸೆಸ್ ಡಯಾನಾ, ಪಮೇಲಾ ಆಂಡರ್ಸನ್. </p> <p> <b>  ಕರ್ಕ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಜನರ ಸಾಮಾನ್ಯ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ ಭಾವನಾತ್ಮಕ, ಪ್ರೀತಿಯ, ಅಂತರ್ಬೋಧೆಯ, ಕಾಲ್ಪನಿಕ, ಚಾಣಾಕ್ಷ, ಎಚ್ಚರಿಕೆಯ, ರಕ್ಷಣಾತ್ಮಕ, ಸಹಾನುಭೂತಿಯ <br/><b> ನಕಾರಾತ್ಮಕ </b> ಪರಿವರ್ತನಶೀಲ, ಭಾವುಕ, ಅತಿಭಾವುಕತೆಯ, ಅತೀ ಸೂಕ್ಷ್ಮತೆಯ, ಒಂದಕ್ಕೇ ಅಂಟಿಕೊಳ್ಳುವ </p> <p> <b>  ಕರ್ಕ ಚಂದ್ರರಾಶಿಯ ಹೊಂದಾಣಿಕೆಗಳು: </b> ಮೇಷ, ವೃಷಭ, ಕರ್ಕ, ಕನ್ಯಾ, ತುಲಾ, ಮಕರ </ p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/>  ಸಿಂಹ ರಾಶಿಯ ಸ್ತ್ರೀಯರು ತುಂಬ ಭಾವನಾತ್ಮಕರೂ ಮತ್ತು ಒಡೆತನದ ಭಾವನೆಯವರೂ ಆಗಿರುತ್ತಾರೆ. ತನ್ನ ಸುತ್ತಲಿನ ಜನರೊಂದಿಗೆ ಅವಳು ವಿನಯಶೀಲಳೂ ಮತ್ತು ಶಾಂತಳೂ ಆಗಿರುತ್ತಾಳೆ. ಅವಳು, ಕ್ರೀಡೆಯನ್ನು ಆನಂದಿಸಬಹುದು, ಸಧೃಢ ಶರೀರ ಹೊಂದಿರಬಹುದು ಸ್ವಲ್ಪ ಕೃತಕವಾಗಿರಬಹುದು ಮತ್ತು ಜೀವನದಲ್ಲಿನ ದೊಡ್ಡ ವಿಷಯಗಳಿಂದ ಆಕರ್ಷಿಸಲ್ಪಡಬಹುದು. ಅವಳು ಏನನ್ನಾದರೂ ಮತ್ತು ಎಲ್ಲದರಲ್ಲೂ ನಾಯಕತ್ವ ವಹಿಸುವ ಪ್ರವೃತ್ತಿ ಹೊಂದಿರುತ್ತಾಳೆ ಹಾಗೂ ಇದು ಅವಳನ್ನು ದಬ್ಬಾಳಿಕೆಯ ಮನೋಭಾವದವಳಂತೆ ತೋರಿಸಬಹುದು. ನಾಯಕತ್ವ ಅವಳಿಗೆ ಸ್ವಾಭಾವಿಕವಾಗಿ ಬರುತ್ತದೆ ಮತ್ತು ಅವಳು ತನ್ನ ಸಂಗಾತಿಯ ಪ್ರಾಬಲ್ಯವನ್ನು ದ್ವೇಷಿಸುತ್ತಾಳೆ. ಅವಳ ಕೋಪ ಅವಳ ಜನಪ್ರಿಯತೆಯನ್ನು ಕಡಿಮೆ ಮಾಡಬಹುದು. ಅವಳಿಗೆ ಅವಮಾನವಾದರೆ ಅವಳು ಅದನ್ನು ಸಹಿಸಲಾರಳು. ಅವಳನ್ನು ಟೀಕಿಸುವುದಾಗಲೀ. ಕಡೆಗಣಿಸುವುದಾಗಲೀ ಅಥವಾ ಅವಳ ಆದೇಶ ಮೀರುವುದಾಗಲೀ ಅವಳಿಗೆ ಇಷ್ಟವಾಗುವುದಿಲ್ಲ. ಅವಳು ಬೃಹತ್ ಅಹಂ ಹೊಂದಿದ್ದು ಇದು ಅವಳನ್ನು ಬಗ್ಗದವಳಾಗಿಯೂ ಮತ್ತು ಅಪ್ರಾಯೋಗಿಕಳಾಗಿಯೂ ತೋರಿಸುತ್ತದೆ. ಅವಳು ಎಲ್ಲರೂ ತಾನು ಹೇಳಿದಂತೆ ಕೇಳಬೇಕೆಂದು ನಿರೀಕ್ಷಿಸುತ್ತಾಳೆ. ಹಣಕಾಸಿನ ವಿಷಯದಲ್ಲಿ ಅವಳು ದೊಡ್ಡ ದುಂದುಗಾರಳಾಗಿರಬಹುದು, ಹಾಗೂ ಹೊಗಳಿಕೆಯ ಹಳ್ಳಕ್ಕೆ ಬೀಳಬಹುದು. ಅವಳನ್ನು ಮುದ್ದು ಮಾಡುವುದು ಅವಳಿಗಿಷ್ಟ. ಅವಳು ಪರಿಪೂರ್ಣ ಅತಿಥೇಯಳಾಗಿದ್ದು ಎಲ್ಲ ಅತಿಥಿಗಳನ್ನೂ ಆಕರ್ಷಿಸುತ್ತಾಳೆ. ಅವಳು ತನ್ನ ಸೂಕ್ಷ್ಮ ಸ್ವಭಾವವನ್ನು ಅಡಗಿಸುತ್ತಾಳೆ ಮತ್ತು ಭಾವನಾರಹಿತಳಂತೆ ತೋರುತ್ತಾಳೆ </p> <p> <b> ಸಿಂಹ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಮನಿಷಾ ಕೊಯಿರಾಲಾ, ಕಾಜೋಲ್, ರಾಖೀ, ಮನೋಜ್ ಕುಮಾರ್, ಗುಲ್ಜಾರ್ </p> <p> <b> ಸಿಂಹ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಸಜ್ಜನರು, ಪ್ರಣಯಿಗಳು, ಆಕರ್ಷಕರು, ಜೊತೆಗಿರಲು ಸುಲಭ, ಆದರ್ಶವಾದಿಗಳು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ನಿರ್ಣಯಕ್ಕೆ ಬರಲಾಗದ, ಬದಲಾಯಿಸಬಹುದಾದ ಹಾಗೂ ಮೋಸಹೋಗಬಹುದಾದ</ p> < p> <b> ಸಿಂಹ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಕರ್ಕ, ಮೀನ </ p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/> ಕನ್ಯಾ ಸ್ತ್ರೀಯರು ಪರಿಪೂರ್ಣತಾವಾದಿಗಳಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಅವಳು ಮಾಡುವ ಎಲ್ಲ ಕೆಲಸ, ಪ್ರಯತ್ನ ಹಾಗೂ ವಿವರಗಳ ಬಗೆಗೂ ಚಿಂತಿಸುವ ಪ್ರವೃತ್ತಿಯವಳಾಗಿರುತ್ತಾಳೆ, ಹಾಗೂ ಇದು ಅವಳು ಉಸ್ತುವಾರಿ ವಹಿಸಿದ್ದಾಗ ಹೆಚ್ಚಿರುತ್ತದೆ. ಅವಳು ತಾರ್ಕಿಕಳೂ ಮತ್ತು ವಿಶ್ಲೇಷಣಾತ್ಮಕಳೂ ಆಗಿರುತ್ತಾಳೆ ಮತ್ತು ಹೆಚ್ಚಾಗಿ ಯಾವಾಗಲೂ ಸರಿಯಾಗಿಯೇ ಇರುತ್ತಾಳೆ. ಅವಳು ಅಸಭ್ಯ ವರ್ತನೆ, ಅನುಚಿತ ಭಾಷೆ ಅಸ್ತವುಅಸ್ತವಾಗಿ ಕಾಣುವುದು ಅಥವಾ ಪ್ರೀತಿಯ ಸಾರ್ವಜನಿಕ ಪ್ರದರ್ಶನವನ್ನು ಮೆಚ್ಚುವುದಿಲ್ಲ. ಅವಳು ನೀವು ನೋಡಬಹುದಾದ ಅತ್ಯಂತ ಸನ್ನಡತೆಯ ಮತ್ತು ಪ್ರಾಯೋಗಿಕ ಜನರಲ್ಲಿ ಒಬ್ಬಳು. ಅವಳಿಗಿರುವ ಇತರೆ ಗುಣಗಳು ಬಲವಾದ ಬುದ್ಧಿಶಕ್ತಿ, ಹೆಚ್ಚು ವಿಶ್ಲೇಷಣಾತ್ಮಕವಾದ ಮನಸ್ಸು ಮತ್ತು ಅತ್ಯುತ್ತಮ ಜ್ಞಾಪಕ ಶಕ್ತಿಗಳಾಗಿವೆ. ಒಂದು ತರ್ಕಬದ್ಧ ಚಿಂತಕಳಾದ ಅವಳು, ಅವಳು ಇತರರ ವ್ಯಾಜ್ಯಗಳನ್ನು ಸುಲಭವಾಗಿ ಪರಿಹರಿಸುವ ಒಬ್ಬ ಒಳ್ಳೆಯ ಸಂಗಾತಿಯಾಗಬಹುದು. ಅವಳು ಸಾಕಷ್ಟು ಸಕ್ರಿಯಳಾಗೂ ಮತ್ತು ಆರೋಗ್ಯ ಪ್ರಜ್ಞೆಯುಳ್ಳವಳಾಗೂ ಇರುತ್ತಾಳೆ, ಹಾಗೂ ಅವಳನ್ನು ಆಕರ್ಷಕಳೂ, ಹಾಸ್ಯಪ್ರಜ್ಞೆಯವಳೂ, ವಾಸ್ತವವಾದಿಯೂ, ಪ್ರಾಮಾಣಿಕಳೂ, ಸಂಘಟಿತಳೂ, ಬದ್ದಳೂ, ಉಪಯುಕ್ತಳೂ, ಹಾಗೂ ಶಾಂತಳೂ ಎಂದು ವಿವರಿಸಬಹುದು. ಆದರೂ, ಅವಳ ಉಕ್ಕೇರುವ ಕೋಪ ಚಿಂತೆಗೆ ಒಂದು ಕಾರಣವಾಗಬಹುದು. </p> <p> <b> ಕನ್ಯಾ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು:. </b> <br/> ಆಶಾ ಭೋಂಸ್ಲೆ, ರಾಕೇಶ್ ರೋಶನ್, ಅಗಾಥಾ ಕ್ರಿಸ್ಟಿ, ರಾಣಿ ಎಲಿಜಬೆತ್, ಜೋಸೆಫ್ ಕೆನಡಿ </ p </b> <br/> <b> ಕನ್ಯಾ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡುಬರುವ ಗುಣಗಳು</b><br/><b>  ಧನಾತ್ಮಕ:: </b> ವಿನಯಶಾಲಿಗಳು, ಕರಾರುವಕ್ಕಾದವರು, ವಿಶ್ವಾಸಾರ್ಹ, ಪ್ರಾಯೋಗಿಕರು ಹಾಗೂ ಪರಿಶ್ರಮಿಗಳು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಚಡಪಡಿಕೆಯ, ವಿಮರ್ಶಾತ್ಮಕ, ಕಠಿಣ, ಸಂಪ್ರದಾಯವಾದಿಗಳು </p> <p> <b> ಕನ್ಯಾ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ವೃಷಭ, ಮಕರ </ p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/> ತುಲಾ ಸ್ತ್ರೀ ಸಂಪೂರ್ಣ ಪ್ರಣಯಿಯಾಗಿರುತ್ತಾಳೆ. ಅವಳು ತನ್ನ ಪುರುಷನನ್ನು ಪ್ರೀತಿಸುತ್ತಾಳೆ, ಪೋಷಿಸುತ್ತಾಳೆ ಮತ್ತು ಗೌರವಿಸುತ್ತಾಳೆ. ಅವಳು ಒಬ್ಬ ಅರ್ಹ ಪುರುಷನು ಅವಳನ್ನು ಆಳಲು ಸಂತೋಷದಿಂದ ಅನುಮತಿಸುತ್ತಾಳೆ. ಅವಳು ಸ್ವಭಾವತಃ ಸಂಶಯ ಸ್ವಭಾವದವಳಲ್ಲ ಮತ್ತು ಎಂದಿಗೂ ಜನರ ಖಾಸಗಿತನವನ್ನು ಉಲ್ಲಂಘಿಸಲು ಪ್ರಯತ್ನಿಸುವುದಿಲ್ಲ. ಅವಳಿಗೆ ತನ್ನ ಸ್ವಾತಂತ್ರ್ಯ ಪ್ರಿಯವಾಗಿರುತ್ತದೆ ಮತ್ತು ಇತರರಿಗೂ ಅವರ ಸ್ಥಳವನ್ನು ನೀಡುತ್ತಾಳೆ. ಅವಳು ದುಬಾರಿ ವಸ್ತುಗಳ ಮೇಲೆ ವಿಶೇಷವಾಗಿ ಇವುಗಳ ಮೇಲೆ ಖರ್ಚು ಮಾಡಬಹುದು;. ಸುಗಂಧ ದ್ರವ್ಯಗಳು, ದುಬಾರಿ ಬಟ್ಟೆಗಳು ಮತ್ತು ಶಾಸ್ತ್ರೀಯ ಸಂಗೀತ. ನೀವು ನಿಮ್ಮ ತರ್ಕದಂದ ಅವಳ ಮನವೊಲಿಸಲು ಸಾಧ್ಯವಿದ್ದಲ್ಲಿ ಅವಳು ಸೋಲಿನ ಸ್ವೀಕರಿಸಲು ಸಿದ್ಧಳಿರುತ್ತಾಳೆ. ಅವಳು ಅತ್ಯಂತ ವಾಚಾಳಿಯೂ, ಅತ್ಯಂತ ಬೌದ್ಧಿಕಳೂ, ಮತ್ತು ಚತುರ ಸಂಭಾಷಣೆಯನ್ನು ಪ್ರೀತಿಸುವವಳೂ ಆಗಿರುತ್ತಾಳೆ. ಆಕೆಯ ಗುಳಿ ಬೀಳುವ ನಗು ಮತ್ತು ಹಿತಕರ ಶಿಷ್ಟಾಚಾರಗಳು ಸಾವಿರ ಹೃದಯಗಳನ್ನು ಕದಿಯಬಹುದು. ಅವಳಿಗೆ ಜನರ ಒಡನಾಟವೆಂದರೆ ಇಷ್ಟ ಮತ್ತು ಅವಳು ಅಗತ್ಯವಿದ್ದಾಗ ಒಬ್ಬ ಉತ್ತಮ ಸ್ನೇಹಿತೆಯಾಗಿರುತ್ತಾಳೆ. ಆದೆ ಅವಳು ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಲ್ಲಿ ಬಹಳಷ್ಟು ಸಮಯ ತೆಗೆದುಕೊಳ್ಳುತ್ತಾಳೆ. ಕೆಲವೊಮ್ಮೆ ಅವಳು ತನ್ನ ಆದರ್ಶಗಳು ಮತ್ತು ನ್ಯಾಯೋಚಿತವಾಗಿರುವ ಅಗತ್ಯಗಳನ್ನು ಅತಿರೇಕಕ್ಕೆ ಕೊಂಡೊಯ್ಯಬಹುದು ಮತ್ತು ಇದು ಜನರಿಗೆ ಕಿರಿಕಿರಿಯುಂಟುಮಾಡಬಹುದು. </p> <p> <b> ತುಲಾ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಕೇಟ್ ವಿನ್ಸ್ಲೆಟ್, ರೇಖಾ, ಕರೀನಾ ಕಪೂರ್, ಲತಾ ಮಂಗೇಶ್ಕರ್, ಅಮಿತಾಭ್ ಬಚ್ಚನ್, ಮಹಾತ್ಮಾ ಗಾಂಧಿ </p> <p> <b> ತುಲಾ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಶಿಷ್ಟಾಚಾರದವರು, ಪ್ರಣಯಭಾವದವರು, ಆಕರ್ಷಕ, ಸುಲಭ ನಡವಳಿಕೆಯವರು, ಆದರ್ಶವಾದಿಗಳು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ನಿರ್ಣಯಕ್ಕೆ ಬರಲಾಗದವರು, ಬದಲಿಸಬಹುದಾದವರು ಮತ್ತು ಮೋಸಹೋಗಬಹುದಾದವರ </p> <p> <b> ತುಲಾ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಮೇಷ, ಕರ್ಕ, ಸಿಂಹ, ತುಲಾ, ಧನು, ಮಕರ </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/> ವೃಶ್ಚಿಕ ಮಹಿಳೆ ಒಬ್ಬ ಭಾವೋದ್ವೇಗದ, ತುಂಬ ರಹಸ್ಯಮಯಿಯಾದ, ಸೂಕ್ಷ್ಮಜ್ಞಳಾದ ಮತ್ತು ಪ್ರಬಲಳಾದ ಮಹಿಳೆಯಾಗಿರುತ್ತಾಳೆ. ಅವಳು ಒಂದು ಅಂತರ್ಬೋಧೆಯ, ಭಾವೋದ್ರಿಕ್ತವಾದ ಆತ್ಮವಿಶ್ವಾಸದ ವ್ಯಕ್ತಿತ್ವವನ್ನು ಹೊಂದಿದ್ದು ಇದು ಅವಳನ್ನು ತುಂಬ ಆಕರ್ಷಣೀಯವಾಗಿಸುತ್ತದೆ. ಅವಳಿಗೆ ರಹಸ್ಯಗಳನ್ನು ಬಯಲಾಗಿಸುವುದೆಂದರೆ ಪ್ರೀತಿ ಮತ್ತು ಅವಳು ತುಂಬ ಸುಲಭವಾಗಿ ಅವಳ ರಹಸ್ಯಗಳನ್ನು ಬಯಲುಮಾಡದೇ ನಿಮ್ಮ ಆಳವಾದ ರಹಸ್ಯಗಳನ್ನು ಬಯಲು ಮಾಡುತ್ತಾಳೆ. ಎಣೆಯಿಲ್ಲದ ಮಾದಕತೆ, ಚಿತ್ತಬದಲಾವಣೆ, ತಣ್ಣಗಿನ ಮತ್ತು ಸಮಚಿತ್ತದ ನಡವಳಿಕೆಯ ಅವಳು ಕೃತಕವಾದದ್ದರಲ್ಲಿ ಹಾಗೂ ಖಾಲಿಯಾದದ್ದರಲ್ಲಿ ಅಸಕ್ತಿ ಹೊಂದಿರುವುದಿಲ್ಲ. ಅವಳು ನುರಿತ ಸಂವಹನಕಾರಳು ಮತ್ತು ಇತರರೊದನೆ ಕುಶಲತಯಿಂದ ವ್ಯವಹರಿಸಬಲ್ಲಳು ಹಾಗೂ ಇದು ಅವಳನ್ನು ಸ್ನೇಹಿತರು ಮತ್ತು ಕುಟುಂಬದಲ್ಲಿ ಜನಪ್ರಿಯಳನ್ನಾಗಿಸುತ್ತದೆ. ಕೆಲವೊಮ್ಮೆ ಒಂದು ಸಂಬಂಧದಲ್ಲಿ ಅವಳ ಭಯಾನಕ ಭಾವೋದ್ರಿಕ್ತ ತೀವ್ರತೆ ಅವಳು ಅತಿಯಾಗಿ ನಿರೀಕ್ಷಿಸುತ್ತಾಳೆಂದು ಅನಿಸುವಂತೆ ಮಾಡಬಹುದಾದರೂ ಅವಳ ಪ್ರೀತಿಯ ಚಟ ಅಷ್ಟು ಸುಲಭವಾಗಿ ಬಿಡಲಾರದು. ಅವಳು ಆಮಿಷಕ್ಕೊಳಗಾಗಿಸುವ ಮತ್ತು ಅಕರ್ಷಣೀಯವೆನಿಸುವ ಪ್ರಾಣಿಸಹಜ ಶಕ್ತಿಯನ್ನು ಹೊಂದಿದ್ದು ಕೆಲವೊಮ್ಮೆ ಅವಳ ಕೋಪ ಸ್ಫೋಟಕವಾಗಿರಬಹುದು. ಅವಳ ಸೂಕ್ಷ್ಮ ಸ್ವಭಾವ ಎರಡು ಅಲುಗಿನ ಕತ್ತಿಯಾಗಿರಬಹುದು. ಏಕೆಂದರೆ ಅವಳು ತ್ವರಿತವಾಗಿ ಘಾಸಿಗೊಳ್ಳುತ್ತಾಳೆ  <p> <b> ವೃಶ್ಚಿಕ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಐಶ್ವರ್ಯ ರೈ, ಇಂದಿರಾ ಗಾಂಧಿ, ಜವಾಹರ್ ಲಾಲ್ ನೆಹರು, ಶಾರುಖ್ ಖಾನ್, ಬಿಲ್ ಗೇಟ್ಸ್, ಬ್ರಿಯಾನ್ ಆಡಮ್ಸ್, ಡೆಮಿ ಮೂರ್ </p> <p><b> ವೃಶ್ಚಿಕ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಲಕ್ಷಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಭಾವನಾತ್ಮಕರು, ತೀವ್ರಭಾವನೆಯವರು, ಘನತೆಯುಳ್ಳವರು, ಸೂಕ್ಷ್ಮಜ್ಞರು, ಅಂತರ್ಬೋಧೆಯವರು, ಮಾದಕತೆಯುಳ್ಳವರು, ರಹಸ್ಯಮಯಿಗಳು, ಭಾವೋದ್ರಿಕ್ತರು <br/> <b> ನಕಾರಾತ್ಮಕ: </b>, ಅಸೂಯಾಪರರು ಕೋಪಿಷ್ಟರು, ಒತ್ತಡ ಹೇರುವ ಧೋರಣೆಯವರು, ಗೀಳು ಹತ್ತಿಸಿಕೊಳ್ಳುವವರು, ರಹಸ್ಯಮಯಿಗಳು, ಹಠವಾದಿಗಳು </p> <p> <b> ವೃಶ್ಚಿಕ ಚಂದ್ರರಾಶಿಯ ಹೊಂದಾಣಿಕೆಯವರು: </b> ಕರ್ಕ ಮತ್ತು ಮೀನ. </p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/>  ಧನು ಸ್ತ್ರೀಗೆ ಕೌಶಲ್ಯ ತಿಳಿದಿಲ್ಲ ಹಾಗೂ ಅವಳ ನೇರವಾದ, ಮುಖಕ್ಕೆ ಬಡಿದಂತೆ ಆಡುವ ಮಾತುಗಳು ನಿಮಗೆ ಅವಳಿಂದ ದೂರ ಓಡಿಹೋಗಬೇಕೆನ್ನುವ ಭಾವನೆ ನೀಡಬಹುದು. ಅವಳು ಆಹ್ಲಾದಕರಳೂ ಸ್ನೇಹಪರಳೂ, ಮುಚ್ಚುಮರೆಯಿಲ್ಲದವಳೂ ಮತ್ತು ಅತ್ಯಂತ ವಾಚಾಳಿಯೂ ಆಗಿರುತ್ತಾಳೆ. ಆಕೆಯ ನೇರತನ ಅವಳು ಪ್ರಾಯೋಗಿಕ ಜಗತ್ತಿನಲ್ಲಿ ಬದುಕುವಂತೆ ಮಾಡುತ್ತದೆ. ಅವಳು ಬಹಳ ಆಶಾವಾದಿಯಾದರೂ ಅತಾರ್ಕಿಕಳಲ್ಲ. ಅವಳು ಇಡೀ ಪರಿಸ್ಥಿತಿಯನ್ನು ಸತ್ಯದ ಪ್ರಕಾರ ನಿರ್ಣಯಿಸುತ್ತಾಳೆ, ಅದರ ಸಂಭಾವ್ಯ ಫಲಿತಾಂಶವನ್ನು ವಿಶ್ಲೇಷಿಸುತ್ತಾಳೆ ಹಾಗೂ ಈಗಲೂ ಪರಿಸ್ಥಿತಿ ಒಳ್ಳೆಯದಕ್ಕೆ ಬದಲಾಗುತ್ತದೆ ಎಂದು ಭಾವಿಸುತ್ತಾಳೆ. ಸಾಮಾನ್ಯವಾಗಿ, ಅವಳು ಬಹಳ ಶಾಂತಳೂ ಹಾಗೂ ಸಮಚಿತ್ತದವಳೂ ಆಗಿರುತ್ತಾಳೆ. ಆದರೆ ನೀವು ಅವಳೊಡನೆ ಅಸಭ್ಯತೆಯಿಂದ ವರ್ತಿಸಿದಾಗ ಅಥವಾ ಅವಳನ್ನು ನೋಯಿಸಿದಾಗ ಅವಳು ಅದನ್ನು ತಿರುಗಿ ನೀಡುತ್ತಾಳೆ. ಅವಳು ಸ್ವತಂತ್ರ ಪ್ರವೃತ್ತಿಯವಳಾಗಿದ್ದು ತನ್ನ ಸ್ವಾತಂತ್ರ್ಯವನ್ನು ಪ್ರೀತಿಸುತ್ತಾಳೆ. ಅವಳು ಕುಟುಂಬದೆಡೆಗೆ ಸೆಳೆತ ಹೊಂದಿದ್ದರೂ ಅದು ಬಹಳವೇನಾಗಿರುವುದಿಲ್ಲ. ಆಕೆಯ ನೇರವಂತಿಕೆ ಕೆಲವೊಮ್ಮೆ ಒಂದು ಸಂಬಂಧ ಕೊನೆಗೊಳ್ಳುವ ಹಂತದವರೆಗೆ ಅವಳಿಗೆ ದುಬಾರಿಯಾಗಬಹುದು. ಅವಳು ಎಂದಿಗೂ ಕಪಟಿಯಲ್ಲದಿದ್ದರೂ ಅವಳ ಪ್ರಾಮಾಣಿಕತೆ ಮತ್ತು ನಯನಾಜೂಕಿಲ್ಲದ ನಡವಳಿಕೆ ಅವಳ ಬಗ್ಗೆ ಮತ್ತಷ್ಟು ನಕಾರಾತ್ಮಕ ಅಭಿಪ್ರಾಯಗಳನ್ನು ಉಂಟುಮಾಡಬಹುದು. ತನ್ನ ಹೃದಯದಲ್ಲಿ ಅವಳು ದುರ್ಬಲಳೂ ಮತ್ತು ಅಸಹಾಯಕಳೂ ಆಗಿರುತ್ತಾಳೆ </p> <p> <b> ಧನು ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಧರ್ಮೇಂದ್ರ, ಶತ್ರುಘ್ನ ಸಿನ್ಹಾ, ದಿಲೀಪ್ ಕುಮಾರ್, ವಿನ್ ಸ್ಟನ್ ಚರ್ಚಿಲ್ </p> <p> <b> ಧನು ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಆಶಾವಾದಿಗಳು, ಖುಷಿಯ ಪ್ರವೃತ್ತಿಯವರು, ಸ್ವಯಂ ವಿನೋದಿಗಳು, ಪ್ರಾಮಾಣಿಕರು, ತಾತ್ವಿಕರು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಅಸಡ್ಡೆಯವರು, ಅತಿ ಆಶಾವಾದಿಗಳು, ಯೋಜನೆಯಿಲ್ಲದವರು, ಅವಿಶ್ರಾಂತರು </p> <p> <b> ಧನು ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ಕರ್ಕ, ಮೀನ </ p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/>  ಮಕರ ಸ್ತ್ರೀ ಒಬ್ಬ ಸಾಧಾರಣ ವ್ಯಕ್ತಿಯಾಗಿದ್ದು ಆರಂಭದಲ್ಲಿ ಇವಳನ್ನು ಸಮೀಪಿಸುವುದು ಬಹಳ ಸುಲಭವಲ್ಲವೆಂದು ತೋರುತ್ತದೆ. ಅವಳು ತನ್ನ ವರ್ತನೆಯಲ್ಲಿ ಸಾಕಷ್ಟು ಎಚ್ಚರಿಕೆ ವಹಿಸುತ್ತಾಳೆ. ಅವಳು ಅದ್ಭುತ ಒಡನಾಟದ ಹಂಚಿಕೊಳ್ಳುವ ಕೆಲವೇ ನಿಕಟ ಸ್ನೇಹಿತರಿರಬಹುದು. ಅವಳು ತುಂಬಾ ವಾಚಾಳಿಯಾಗಿರುವುದಿಲ್ಲ ಮತ್ತು ಅಗತ್ಯವಾದಾಗ ಮಾತ್ರ ಮಾತನಾಡಬಹುದು. ಅವಳು ಒಂದೆಡೆ ಮೌನಿಯೂ ಇನ್ನೊಂದೆಡೆ ಹಾಸ್ಯ ಪ್ರಜ್ಞೆಯಿರುವವಳೂ ಅಗಿರಬಹುದು. ಅವಳು ಪದೇ ಪದೇ ಚಿತ್ತ ಬದಲಾವಣೆಗಳನ್ನು ಹೊಂದುತ್ತಾಳೆ ಹಾಗೂ ಅವಳು ನಿಮ್ಮ ಜೊತೆ ಸುರಕ್ಷಿತವೆಂದು ಅವಳಿಗನ್ನಿಸಿದ ಮೇಲೆ ತನ್ನೆಲ್ಲ ಪ್ರೀತಿ ಮತ್ತು ಉತ್ಸಾಹವನ್ನು ತೋರಿಸುತ್ತಾಳೆ. ಅವಳು ಬಲವಾದ ಅಭಿಪ್ರಾಯಗಳನ್ನು ಹೊಂದಿರುವವಳಾಗಿದ್ದು ತನ್ನ ಹಣದ ಬಗ್ಗೆ ಸಾಕಷ್ಟು ಎಚ್ಚರಿಕೆ ಹೊಂದಿರುತ್ತಾಳೆ, ಹಾಗೂ ದೈನಂದಿನ ವೆಚ್ಚದ ಕಡೆಗೆ ಸಾಕಷ್ಟು ಎಚ್ಚರ ವಹಿಸುತ್ತಾಳೆ. ವೃತ್ತಿ ಮನೋಭಾವದವಳಾದರೂ ಅವಳು ತನ್ನ ಕುಟುಂಬದ ಉತ್ತಮ ಆರೈಕೆ ಮಾಡುತ್ತಾಳೆ ಮತ್ತು ಅತ್ಯುತ್ತಮ ಗೃಹಿಣಿಯಾಗಿರುತ್ತಾಳೆ </p> <p> <b> ಮಕರ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಅನು ಅಗರ್ವಾಲ್, ರೀನಾ ರಾಯ್, ಸಲ್ಮಾನ್ ಖಾನ್, ಅನಿಲ್ ಕಪೂರ್, ಜಾವೇದ್ ಅಖ್ತರ್, ನಾನಾ ಪಾಟೇಕರ್ </p> <p> <b>ಮಕರ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಲಕ್ಷಣಗಳು  </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ವಾಸ್ತವಾದಿಗಳು, ಜಾಗರೂಕರು, ಮಹತ್ವಾಕಾಂಕ್ಷೆಯವರು, ಸಹಿಷ್ಣುಗಳು, ಎಚ್ಚರಿಕೆಯಿಂದಿರುವವರು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ನಿರಾಶಾವಾದಿಗಳು, ವಿಧಿವಾದಿಗಳು, ಕೃಪಣರು, ಸೇಡಿನ ಮನೋಭಾವದವರು</p> <p> <b> ಮಕರ ಚಂದ್ರರಾಶಿ ಹೊಂದಾಣಿಕೆ: </b> ವೃಷಭ, ಕನ್ಯಾ </ p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್:. </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/>  ಕುಂಭ ರಾಶಿಯ ಸ್ತ್ರೀಯರು ಸ್ವಾತಂತ್ರ್ಯ ಪ್ರಿಯರೂ ಮತ್ತು ಹೆಚ್ಚು ಖಾಸಗಿ ವ್ಯಕ್ತಿತ್ಯ್ವ ಹೊಂದಿರುವವರೂ ಬುದ್ಧಿವಂತರೂ ಮತ್ತು ಸ್ವಪ್ನಶೀಲರೂ ಆಗಿರುತ್ತಾರೆ. ಅವಳು ತನ್ನ ನಡವಳಿಕೆಯಲ್ಲಿ ಅತ್ಯಂತ ಅನಿರೀಕ್ಷಿತವಾಗಿದ್ದು ಇತರರಿಗೆ ರಹಸ್ಯಮಯವೆನಿಸುತ್ತಾಳೆ. ಅವಳು ಆರಿಸಿಕೊಳ್ಳುವ ಜೀವನಶೈಲಿ ಸಾಮಾನ್ಯ ವ್ಯಕ್ತಿಯ ತಿಳುವಳಿಕೆಯನ್ನು ಮೀರಿರಬಹುದು. ಅವಳು ತನ್ನ ಸ್ವಂತ ಶರತ್ತುಗಳ ಮೇಲೆ ಜೀವನ ನಡೆಸುತ್ತಾಳೆ ಮತ್ತು ಇತರರ ಜೀವನದಲ್ಲಿ ಹಸ್ತಕ್ಷೇಪ ಮಾಡುವುದಿಲ್ಲ. ತನ್ನ ಮಾನವೀಯ ದೃಷ್ಟಿಕೋನದವಳಾಗಿದ್ದರೂ ತನ್ನ ವೈಯಕ್ತಿಕ ಸಂಬಂಧಗಳ ವಿಷಯದಲ್ಲಿ ನಿರ್ಲಿಪ್ತಳಾಗಿರಬಹುದು. ನೀವು ಅವಳು ತಣ್ಣನೆಯ ಸ್ವಭಾವದವಳೂ ಮತ್ತು ಸೂಕ್ಷ್ಮವಲ್ಲದವಳೂ ಎಂದುಕೊಳ್ಳಬಹುದಾದರೂ ಅದು ನಿಜವಲ್ಲ. ನೀವು ಅವಳನ್ನು ಅವಳದೇ ಲೋಕದಲ್ಲಿ ನೋಡುತ್ತೀರಿ, ಹಾಗೂ ಸಾಮಾನ್ಯವಾಗಿ ಅವಳು ಪ್ರತ್ಯೇಕಸಲ್ಪಟ್ಟಂತೆ ಮತ್ತು ಯಾವುದೋ ಆಲೋಚನೆಯಲ್ಲಿದ್ದಂತೆ ಕಾಣುತ್ತದೆ, ಅದರೆ ಇದು ಅವಳು ನಿರ್ಲಕ್ಷ್ಯದಿಂದ್ದಾಳೆಂದು ಅರ್ಥವಲ್ಲ. ಕೆಲವೊಮ್ಮೆ ಅವಳು ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಬಗ್ಗೆ ಉಳಿದವರೆಲ್ಲರೂ ನೋಡದಿರದ ಸೂಕ್ಷ್ಮ ವಿವರಗಳನ್ನು ಹೇಳಬಹುದು. ಸ್ವಾತಂತ್ರ್ಯದೆಡೆಗಿನ ಅವಳ ಪ್ರೀತಿ ಅವಳನ್ನು ವಿಚಿತ್ರ ವಿಷಯಗಳನ್ನು ಮಾಡುವಂತೆ ಪ್ರೇರೇಪಿಸಬಹುದು ಹಾಗೂ ಅವಳನ್ನು ಸಂತೋಷವಾಗಿರಿಸಿಕೊಳ್ಳಲು ನೀವು ಅವಳಿಗೆ ಸಾಕಷ್ಟು ಸ್ವಾತಂತ್ರ್ಯ ನೀಡಬೇಕು. </p> <p> <b> ಕುಂಭ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> ಊರ್ಮಿಳಾ ಮಾತೊಂಡ್ಕರ್, ಪ್ರೀತಿ ಜಿಂಟಾ, ವಹೀದಾ ರೆಹಮಾನ್, ಸುಭಾಷ್ ಘಾಯ್ </p> <p> <b> ಕುಂಭ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಸ್ನೇಹಪರರು, ಮಾನವೀಯ ಮೌಲ್ಯದವರು, ಸ್ವೋಪಜ್ಞರು, ಸೃಜನಶೀಲರು, ಸ್ವತಂತ್ರರು, ಬುದ್ಧಿಜೀವಿಗಳು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ದುರಾಗ್ರಹದವರು, ಭಾವಶೂನ್ಯರು, ನಿರ್ಲಿಪ್ತರು, ಅನಿರೀಕ್ಷಿತರು </p> <p> <b> ಕುಂಭ ಚಂದ್ರರಾಶಿಯ ಹೊಂದಾಣಿಕೆ: </b> ಮಿಥುನ ಮತ್ತು ತುಲಾ </ p>#<p> <b> ಆಸ್ಟ್ರೋ ಸ್ಕೆಚ್: </b> (ಜನನ ಮಾಹಿತಿ ಆಧಾರಿತ ಸಂಕ್ಷಿಪ್ತ ಪ್ರೊಫೈಲ್) <br/> ಮೀನರಾಶಿಯ ಸ್ತ್ರೀಯರು ಆಳವಾದ ಮತ್ತು ನಿಗೂಢವಾದ  ವ್ಯಕ್ತಿತ್ವ ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಅವಳನ್ನು ಅರ್ಥ ಮಾಡಿಕೊಳ್ಳಲು ತುಂಬ ಕಷ್ಟಪಡಬೇಕಾಗುತ್ತದೆ. ಅವಳು ಅದ್ಭುತವಾದ ಹೆಣ್ತನ ಹೊಂದಿರುತ್ತಾಳೆ ಮತ್ತು ವಿಸ್ಮಯವಾಗುವಷ್ಟು ಸುಂದರಳಾಗಿರುತ್ತಾಳೆ, ಮೃದು ಮತ್ತು ಬಹಳ ಸ್ತ್ರೀಸಹಜ ನಡವಳಿಕೆಯುಳ್ಳವಳಾಗಿರುತ್ತಾಳೆ. ಅವಳು ಅತ್ಯಂತ ಭಾವನಾತ್ಮಕಳೂ ಹಾಗೂ ತನ್ನದೇ ಲೋಕದಲ್ಲಿರುವವಳೂ ಆಗಿದ್ದು ಇದು ಅವಳನ್ನು ಕನಸುಗಾರಳನ್ನಾಗಿಸುತ್ತದೆ. ಅವಳು ಯಾವುದೇ ಪರಿಸ್ಥಿತಿಗೂ ಚೆನ್ನಾಗಿ ಹೊಂದಿಕೊಳ್ಳುವುದರಿಂದ ಜನರಿಗೆ ಅವಳ ಸಂಗ ಹಿತವೆನಿಸುತ್ತದೆ. ಅವಳು ನಾಚಿಕೆಯ ಸ್ವಭವದವಳಾಗಿರುತ್ತಾಳೆ ಹಾಗೂ ಯಾರಾದರೂ ಅವಳನ್ನು ಪ್ರೀತಿಸುವ ಮತ್ತು ರಕ್ಷಿಸುವ ಅಗತ್ಯವಿರುತ್ತದೆ. ಕೆಲವೊಮ್ಮೆ ಅವಳು ಬಹಳವೇ ಅಂಟಿಕೊಳ್ಳುವ ಸ್ವಭಾವದವಳಾಗಬಹುದು. ಅವಳನ್ನು ನಿರಂತರವಾಗಿ ಮುದ್ದು ಮಾಡಬೇಕು. ಸ್ವಲ್ಪ ಮೋಸಮಾಡುವ ಪ್ರವೃತ್ತಿಯವಳಾದ ಅವಳು ತನ್ನನ್ನು ತಾನು ಸಂಪೂರ್ಣವಾಗಿ ತೆರೆದುಕೊಳ್ಳುವುದಿಲ್ಲ ಮತ್ತು ಇದು ಕೆಲವೊಮ್ಮೆ ಕಿರಿಕಿರಿಯುಂಟುಮಾಡಬಹುದು. ಅವಳು ಪ್ರತಿಭಾವಂತಳಾದರೂ ಮಹತ್ವಾಕಾಂಕ್ಷೆಯ ಕೊರತೆಯಿರುತ್ತದೆ, ಅವಳು ಅನಿರೀಕ್ಷಿತಳು ಮತ್ತು ಚಿತ್ತಬ್ಲಾವಣೆಯನ್ನು ಹೊಂದಿರುತ್ತಾಳೆ </ p> <p> <b> ಮೀನ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ  ಕೆಲವು ಪ್ರಸಿದ್ಧ ಜನರು: </b> <br/> <b> ಪ್ರೀತಿ ಜಿಂಟಾ, ಚೆಲ್ಸಿಯಾ ಕ್ಲಿಂಟನ್, ಆಲ್ಬರ್ಟ್ ಐನ್ಸ್ಟೈನ್, ಮೈಕೆಲ್ಯಾಂಜೆಲೊ </p> <p> <b> ಮೀನ ರಾಶಿಯವರಲ್ಲಿ ಸಾಮಾನ್ಯವಾಗಿ ಕಂಡು ಬರುವ ಗುಣಗಳು: </b> <br/> <b> ಧನಾತ್ಮಕ: </b> ಕಾಲ್ಪನಿಕರು, ಸೂಕ್ಷ್ಮಜ್ಞರು, ಸಹಾನುಭೂತಿಯುಳ್ಳವರು, ನಿಸ್ವಾರ್ಥಿಗಳು, ಸಹಾನುಭೂತಿಯುಳ್ಳವರು <br/> <b> ನಕಾರಾತ್ಮಕ: </b> ಪಲಾಯನವಾದಿಗಳು, ಆದರ್ಶವಾದಿಗಳು, ರಹಸ್ಯ ಸ್ವಭಾವದವರು - ದುರ್ಬಲ ಇಚ್ಛಾಶಕ್ತಿಯುಳ್ಳವರು </ p> <p> <b> ಮೀನ ಚಂದ್ರರಾಶಿಯ ಹೊಂದಾಣಿಕೆ: </b> ವೃಷಭ, ಮಿಥುನ, ಕನ್ಯಾ, ಧನು, ಮಕರ, ಮೀನ </p>

