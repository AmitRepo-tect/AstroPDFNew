
SERVICE_NAME_1                                     = একটি প্রশ্ন জিজ্ঞাসা করার রিপোর্ট 
SERVICE_DESC_1                                     = প্রশ্ন মানবজাতির বিবর্তনের জন্য অপরিহার্য, বিখ্যাত অ্যারিস্টটল বলেছেন। প্রশ্ন শুধুমাত্র মানুষের বিবর্তনের জন্য গুরুত্বপূর্ণ নয়, কিন্তু তারা ব্যক্তিদের উন্নয়নের জন্য খুব গুরুত্বপূর্ণ। যদি কারো মনে কোথাও লুকোনো কোনও একটি সমস্যা বা গভীর বিভ্রান্তি থাকে, এটি তাকে/তার জন্য বৃদ্ধির সব সম্ভাবনা থেকে বাধা দেয়। আপনি কি বিশেষ কিছু নিয়ে চিন্তিত আছেন? আপনি কিছু নির্দিষ্ট বিষয়ে জায়গা নিতে যাওয়ার জিনিসের ভয় অনুভব করেন? <br /><br />জ্যোতিষ হয় ঐশ্বরিক বিজ্ঞান যার জন্য আপনি জানতে পারেন আপনার ভাগ্যে কি রয়েছে। এটা আপনার সন্দেহ ও ভয় নিশ্চিহ্ন করতে পারে, এবং সামগ্রিকভাবে কর্মজীবন, বিবাহ, অর্থ এবং জীবন ইত্যাদি সম্পর্কে আপনার প্রশ্নের উত্তর দিতে পারেন। এটা ঝামেলাপূর্ণ প্রশ্ন থেকে পরিত্রাণ পাবার চাবিকাঠি।

SERVICE_NAME_7                                     = স্বাস্থ্য এবং সুস্থ থাকার রিপোর্ট 
SERVICE_DESC_7                                     = এটি বলা হয় যে স্বাস্থ্য হল প্রকৃত সম্পদ। যদি আপনি সুস্থ এবং স্বাস্থ্যবান, বিলাসবহুল না হন এবং অন্যান্য পার্থিব সম্পদ অখাদ্য হয়। পুরাতন কালে, আয়ুর্বেদ অর্থাৎ জ্যোতিষ এবং চিকিৎসা বিজ্ঞানের সম্পূর্ণরূপে একে অপরের সঙ্গে বিজড়িত করা হয়। প্রাচীন সের জানত একের সামগ্রিক ভালো থাকার মধ্যে শুরুর ভূমিকা। অনেক সময় ওষুধ ও থেরাপির মাত্র কারণে স্বর্গীয় সংস্থা দ্বারা ঘটিত অসুস্থতা অন্তরায় প্রকৃতি কাজ করে না। সুতরাং, এটি আপনার উন্নতি জন্য জ্যোতির্বিদ্যা জ্ঞানের কাজ দেওয়া অত্যন্ত গুরুত্বপূর্ণ।<br /><br />আপনি আপনার স্বাস্থ্য এবং ফিটনেস সংক্রান্ত সমস্যার সম্মুখীন হন যদি, এটা সবসময় যত তাড়াতাড়ি সম্ভব সতর্কতামূলক ব্যবস্থা গ্রহণের প্রস্তাব করা হয়। আমাদের ব্যাপক স্বাস্থ্য প্রতিবেদনে আপনাকে বলতে হবে আপনার সমস্যার কারন কি এবং জ্যোতিষ শাস্ত্রে কি ব্যবস্থা গ্রহণ করা উচিত বিবেচনা করে বার করতে হবে খারাপ স্বাস্থ্যের দুর্ভাগ্যদায়ক রাস্তা।

SERVICE_NAME_14                                    = ফোনে যোগাযোগ করুন 
SERVICE_DESC_14                                    = এছাড়াও আমাদের অভিজ্ঞ জ্যোতিষীদের সাথে টেলিফোনে আলোচনা করা যেতে পারে। একটি ভালো আলোচনা হচ্ছে ধনী থাকার মতো, একটি পুরানো কেনিয়ান প্রবাদ বলেছেন। যখন একজন বলেন, তিনি/সে শুধুমাত্র শব্দের মাধ্যমে যোগাযোগ করে না, কিন্তু গলার স্বর এবং এর কম্পন খুব গুরুত্বপূর্ণ ভূমিকা পালন করে। এ ছাড়াও, জ্যোতিষশাস্ত্র অনুযায়ী, দুই ব্যক্তির কথা বলার মুহুর্ত জাতকের সমস্যা সম্পর্কে গুরুত্বপূর্ণ তথ্য প্রস্তুত করে রাখে।<br /><br />জীবনের সাথে সম্পর্কিত কোন মাত্রা যেমন পেশা, স্বাস্থ্য, ব্যবসা, প্রেম এবং বিবাহ ইত্যাদি, আলোচনা করা যাবে এবং একটি ঘটনার পিছনে জ্যোতির্বিদ্যার কারণ জানতে পারেন। এছাড়াও ব্যবহারিক নিরাময়কারী সমাধান সাফল্য, সমৃদ্ধি এবং সুখ আপনার পথে প্রতিরোধক কোন সমস্যা পরাস্ত করার জন্য প্রস্তাব করা যেতে পারে। আমাদের জ্যোতিষীদের একটি ফোন করুন আপনাকে সাহায্য করতে।

SERVICE_NAME_4                                     = পেশাগত রিপোর্ট জানুন 
SERVICE_DESC_4                                     = একটি ভাল এবং পরিপূরক পেশা জীবনে সামগ্রিক সাফল্যের জন্য অপরিহার্য। আমাদের বিশেষজ্ঞ জ্যোতিষীদের, এই ব্যাপক প্রতিবেদনে, কোন পেশায় আপনার যাওয়া উচিৎ, বিভিন্ন অঞ্চলে আপনার সম্ভাবনা কি রকম, এবং যদি কোন কারনে ইতিমধ্যে আপনি চাকুরিতে নিযুক্ত হন, আপনার পেশার উন্নতির জন্য আপনার কি করা উচিৎ ও কি ধরনের লক্ষ্যের জন্য আপনার পরিকল্পনা করা উচিৎ ইত্যাদি আপনাকে জানানো হবে। এই জিনিস বরাবর, আমরা ভবিষ্যতে আপনার পেশা অবশ্যই বিশ্লেষণ করব এবং আপনি আপনার কাজ বা ব্যবসায় আপনার অগ্রগতি ব্যাহত করতে পারে সম্ভবত potholes সম্পর্কে জানতে পারবেন, এবং এছাড়াও এই সমস্যা অতিক্রম করতে আপনাকে কার্যকর জ্যোতির্বিদ্যা প্রতিকার সুপারিশ করবে।<br /><br />এই বিবরণী প্রতিবেদন গভীরতর জ্যোতির্বিদ্যা বিশ্লেষণ এবং পরের বারো মাসের জন্য আপনার ব্যবসা বা কাজের প্রতি দৃষ্টিভঙ্গির নিরাময়কারী পরামর্শ গঠন করবে। এই প্রতিবেদনটি সামনের বছরের জন্য আপনার কর্মজীবনের একটি বিস্তারিত পথপ্রদর্শক হিসাবে প্রমাণিত হবে। প্রাচীন জ্যোতির্বিদ্যা জ্ঞানের সাহায্যে আপনি আপনার কর্মজীবন উন্নত করবেন এবং আমাদের বিশেষজ্ঞ জ্যোতিষীদের দ্বারা ব্যাপক কর্মজীবন প্রতিবেদন পাবেন।

SERVICE_NAME_12                                    = অর্থনৈতিক রিপোর্ট পান 
SERVICE_DESC_12                                    = আজকের প্রতিযোগিতামূলক বিশ্বে, একটি শক্তিশালী আর্থিক অবস্থা একটি বিলাসিতা মাত্র নয় কিন্তু বেঁচে থাকতে এবং ক্রমবর্ধমান রাখতে এটির অপরিহার্যতা রয়েছে। আর্থিক নিরাপত্তা শুধু একটি ব্যাক্তির মঙ্গলের জন্য অপরিহার্য নয়, কিন্তু তার সাথে সম্পর্কিত তার নিজের স্ত্রী, শিশু এবং সমগ্র পরিবারের পছন্দও আবশ্যক। আর্থিক সংকট শুধুমাত্র বৃদ্ধির সম্ভাবনা ব্যাহত করে না, কিন্তু মানসিক শান্তি, সুখ ও স্থিতিশীলতা আরও আঁকড়ে ধরে। একদা বিখ্যাত জন এফ কেনেডি বলেন, চীনা  'সংকট' শব্দটি লিখতে দুটি বুরুশ স্ট্রোক ব্যবহার করেন। এক বুরুশ স্ট্রোক বিপদের জন্য; অন্যান্যটি সুযোগের জন্য। একটি সঙ্কটের মধ্যে, বিপদ থেকে সচেতন হতে হবে-কিন্তু সুযোগটি চিনতে হবে। এবং এটা সত্যিই।<br /><br />ঐশ্বরীক জ্যোতির্বিদ্যার জ্ঞানী আপনাকে সূক্ষ্ম বিষয়ের সুযোগ এবং আর্থিক সমস্যার কারণ বিশ্লেষণ করতে দেয়, এবং এছাড়াও নিরাময়কারী ব্যবস্থা প্রস্তাব গ্রহণ করার জন্য গরম জল নেওয়ার প্রয়োজন রয়েছে। জ্যোতিষ হয় বিজ্ঞান যেটি কিছু আর্থিক সামান্য অসুস্থতার উন্নতির পরামর্শ শুধু নয়, কিন্তু আপনি আপনার আগে থেকে ভালো আর্থিক অবস্থার উন্নতি জন্য জ্ঞান থেকে উপকৃত হতে পারেন। আপনার কোন অর্থ সংক্রান্ত প্রশ্ন থাকে, প্রাচীন জ্যোতির্বিদ্যা জ্ঞান আপনাকে সাহায্য করবে এবং আমাদের বিশেষজ্ঞ জ্যোতিষীদের থেকে ব্যাপক আর্থিক প্রতিবেদন পাবেন।

SERVICE_NAME_13                                    = রত্ন পাথর ও প্রতিকার
SERVICE_DESC_13                                    = জ্যোতিষ কার্যকর বলে বিবেচনা করা হয় কারণ এটি সমস্যার শুধুমাত্র তুচ্ছ বিষয় নয়, কিন্তু এটিকে আটকানো যায় পরামর্শ দ্বারা যন্ত্রণার আরোগ্য করতে ব্যবহারিক প্রতিকার রয়েছে। যদি কেউ গম্ভীরভাবে জ্যোতির্বিদ্যা জ্ঞান অনুযায়ী এই নিরাময়কারী ব্যবস্থা অনুসরণ করে, তিনি/সে স্বর্গীয় সংস্থা দ্বারা সৃষ্ট বিরূপ ফল সমূলে উত্পাটন এবং বেশ সহজেই কঠিন সময় থেকে বেরিয়ে আসতে পারবেন।<br /><br />বহুমূল্য পাথর জ্যোতিষ শাস্ত্রে খুবই গুরুত্বপূর্ণ হিসেবে পরিগণিত হয়, কারণ মহাজাগতিক শক্তির অপরিমেয় পরিমাণ ভেলকি দেখানোর ক্ষমতা রয়েছে, এটি যদি সঠিকভাবে পরিচালিত হয়, আপনার সব সমস্যার উন্নতি সাধন হতে পারে এবং আপনি জীবনের প্রতিটি মাত্রার মধ্যে শক্তিশালী বুস্ট দিতে পারেন। কিন্তু যদি অনিয়ন্ত্রিত, এই মহাজাগতিক শক্তির বিরূপতা আপনাকে প্রভাবিত করতে পারে। সেইজন্য, যদি আপনি জ্যোতির্বিদ্যার প্রতিকার চান এবং বহুমূল্য পাথর আপনাকে অর্থ, প্রেম, বিবাহ, পেশা এবং শিক্ষা ইত্যাদি সংক্রান্ত বিষয়ে উপকৃত করবে, তাহলে আমাদের চতুর জ্যোতিষীরা পরামর্শ দিতে পারেন কি নিরাময়কারী পরিমাপ আপনাকে নিতে হবে, সঠিকভাবে এই প্রতিকার কিভাবে সঞ্চালন করবেন, আপনি কি রত্ন পাথর নেবেন, এবং তার অধিকাংশই কিভাবে পাবেন ইত্যাদি।

SERVICE_NAME_6                                     = বিবাহ/প্রেমের বিশ্লেষণ 
SERVICE_DESC_6                                     = এটা বলা হয় যে বিবাহ স্বর্গে তৈরি হয়। কিন্তু আপনি নিশ্চিত হন যে আপনার সাথে আপনার জীবন কাটাতে বা ইতিমধ্যে আপনার জীবনের সঙ্গে কাটানো আপনার জন্য তৈরি বিশেষ একজন কাটাতে চান? এটা খুঁজে বের করা আপনার হাতে থাকে যেহেতু সে আপনার জন্য ধার্য যেমন যেহেতু আপনি শ্রী রাইট বা শ্রীমতি রাইটকে নির্বাচন করেন আপনার জন্য বা নয়। যদি আপনি সঠিক সঙ্গী নির্বাচন করেন, জীবন একটি সহজ কাজ বলে মনে হয়। কিন্তু যদি আপনার নির্বাচন ভুল হয়, এটি এমনকি মাধুর্য এবং জীবনের সুস্বাদ ধ্বংস করতে পারে।<br /><br />জ্যোতিষ সঠিক সিদ্ধান্ত গ্রহণে সাহায্য করতে পারে। এটা আপনাকে বলতে পারে যদি আপনি একজন ব্যক্তির সঙ্গে সামঞ্জস্যপূর্ণ হন, আপনি যে ব্যক্তির সাথে জীবন যাত্রা পোতারূঢ বা নন এবং ভবিষ্যতে দম্পতি হিসাবে আপনাদের দুজনের জন্য কি রয়েছে। এবং যদি আপনি ইতিমধ্যে বিবাহিত হন এবং আপনার বৈবাহিক জীবনে সমস্যার সম্মুখীন হন, আপনার গরম জলে নামার জন্য কি করা উচিৎ।

SERVICE_NAME_5                                     = লাল কিতাব প্রতিকার 
SERVICE_DESC_5                                     = লাল কিতাব হল রহস্যে পূর্ণ একটি জ্যোতির্বিদ্যা চুক্তি। এটা জ্যোতিষশাস্ত্র, হস্তরেখা শাস্ত্র এবং বাস্তুর মধ্যে গভীর অন্তর্দৃষ্টি রয়েছে। লাল কিতাব পণ্ডিত রূপচাঁদ জোশী দ্বারা উর্দু পুরোনো উপভাষায় লেখা হতে বলা হয় এবং এটা কাব্যিক হাবভাব বিভিন্ন আয়াত নিয়ে গঠিত। লাল কিতাব বিশাল আয়তনের অন্তর্ভুক্ত জ্যোতির্বিদ্যার গভীরতার পিছনে অস্পষ্টতার পর্দা রয়েছে। এটি একটি চতুর এবং তীক্ষ্ন জ্যোতির্বিদ্যা বুজতে সঙ্কেত লিপির অর্থোদ্ধার করা প্রয়োজন।<br /><br />লাল কিতাব যারা বোঝেন তাঁরা ঘোষণা করেন যে এটি সব পার্থিব সমস্যা এবং কষ্টের চাবি হবেন। ​​লাল কিতাবের প্রতিকার খুব শক্তিশালী এবং চটপটে, আধুনিক সময় অধিকারে থাকে যখন মানুষের বিভিন্ন সমস্যার সঙ্গে দখল করে এবং তাদের সময়ের অভাব থাকবে। এই প্রতিকার আচিলসের গোড়ালি চিন্তা করে এবং এইভাবে, দ্রুত আপনার শারীরিক, মানসিক ও অর্থনৈতিক সমস্যা আরোগ্য লাভ করতে পারবেন। যদি আপনি আপনার সমস্যার দ্রুত সমাধান চান তবে লাল কিতাবের প্রতিকার ব্যবহার করবেন, আমাদের অন্তর্দৃষ্টিপূর্ণ জ্যোতিষীদের জিজ্ঞাসা করুন।

SERVICE_NAME_2                                     = জন্ম সময় সংশোধন 
SERVICE_DESC_2                                     = আপনার জন্ম সময় জন্মপত্রিকা তৈরীর জন্য অত্যাবশ্যক। জন্মের সঠিক সময় ছাড়া, এমনকি একটি সুবুদ্ধিসম্পন্ন জ্যোতিষী ভবিষ্যত বানী করতে পারবেন না আপনার জন্য ভবিষ্যতে কি পূর্বাভাস রয়েছে। যদিও আপনি জানেন না বা আপনার সঠিক জন্ম সময় সম্পর্কে বিভ্রান্ত হন, চিন্তা করার কোন প্রয়োজন নেই। কারণ বৈদিক জ্যোতিষ সঠিকভাবে জন্মের সঠিক সময় তুচ্ছ বিষয় পদ্ধতি প্রস্তুত করেন।<br /><br />ঋষি কালিদাস এবং মহান বরাহমিহিরের মতো ভারতীয় ঋষিদের দ্বারা প্রস্তাবিত পদ্ধতি অনেক আছে। এছাড়াও কেপি পদ্ধতি একটি অনুপম পদ্ধতি যা আপনার সঠিক জন্ম সময় খুঁজে বের করবে। এটির উপরে, যদি একটি চতুর জ্যোতিষী একজনের জীবনের প্রধান ঘটনা সম্পর্কে জানে, তিনি/সে আপনার জীবনের ঘটনার ভিত্তিতে একটি জাতকের জন্মের সঠিক সময়ের প্রকৌশলী বিপরীত দিকে ঘোরাতে পারেন।<br /><br />তাই, অবিকল আপনার জন্ম সময় ক্রম অনুযায়ী গণনা করতে, আপনি আপনার জীবনের কয়েকটি প্রধান ঘটনা আমাদের জানাবেন এবং সময়ের চারিদিকে যেটি এই ঘটনাগুলি জায়গা নেবে যেমন আপনার বিয়ের তারিখ, আপনার সন্তানদের জন্মতারিখ, প্রধান অসুস্থতা এবং প্রথম চাকুরী ইত্যাদি।<br /><br />আমাদের আরও আনুমানিক জন্মের সময় অথবা সময়কাল যেটি প্রয়োজন হবে, আপনি গণনা করুন, আপনার জন্ম সময় পড়তে পারে; যেমন –অপরাহ্ন ২ থেকে ৪ পর্যন্ত ইত্যাদি ইত্যাদি। আমাদের নিখুঁতভাবে আকৃতির বাইরে জন্ম সময় হবে।

SERVICE_NAME_20                                    = @@currentyear$ এর পেশাদারী জীবন
SERVICE_DESC_20                                    = আপনার পেশাদারী জীবনে অন্তর্দৃষ্টি দিয়ে @@currentyear1$ তে প্রবেশ করার জন্য প্রস্তুত হয়ে যান- পেশা থেকে চাকরি, ব্যবসা এবং অর্থনৈতিক এবং অন্যান্য বিষয় যা আপনার পেশাদারী জীবনে ছাপ ফেলে। আপনি কি চাকরি ছাড়বেন @@currentyear2$ অথবা বেতন বাড়বে কি না? যদি আপনার মনের মধ্যে এই ধরনের প্রশ্ন থাকে, তো আমাদের বিস্তৃত রিপোর্ট এ সেসব পাবেন। এটা শুধুমাত্র চাকরির জন্য নয়, ব্যবসা-বানিজ্যের জন্যও উপযোগী। বাজার নতুন বছরে কেমন আচরণ করবে এবং আপনি কি পরিকল্পনা করবেন, আপনি আগে থেকেই তা জানতে পারবেন। আপনাকে শুধু আমাদের সাথে যুক্ত থাকতে হবে এবং 'আগামীকালের' রহস্য আপনার কাছে উদঘাটন হয়ে যাবে।

SERVICE_NAME_3  								   = এস্ট্রসেজ বৃহৎ কুন্ডলী  
SERVICE_DESC_3                                     = 250 পৃষ্ঠারও অধিক রঙিন বৃহৎ কুষ্ঠিতে পাবেন: এই কুষ্ঠিতে আপনার বিবাহ, কেরিয়ার, আর্থিক, স্বাস্থ্য, সন্তান, প্রপার্টি এবং পরিবারের সাথে জড়িত গুরুত্বপূর্ণ ভৰিস্সৎবাণী। এছাড়া এই কুষ্ঠিতে আপনার জন্য শুভ সময়, দশাফল, পাঁচ বর্ষের বর্ষফল, রাজ যোগের বিস্তৃত জানকারী, এবং  অঙ্কশাস্ত্র রিপোর্ট। তার সাথেই এই কুষ্ঠিতে পড়ুন সাড়ে সাতি, কাল সর্প এবং মঙ্গলের মতো দোষের জানকারী এবং বাঁচার কারিগরের উপায় বলা হয়েছে। ভাব-ফল আর গ্রহ ফল। কেপি, কেসিআইএল, অঙ্কযোতিষ কোস্পল ইন্ট্রিকলস, নক্ষত্র নাড়ী, যামিনী, লাল কিতাব টেব আর ঋণ আদি বিস্তৃত গণনা।

SERVICE_NAME_8 									   = রাজযোগ ফল  
SERVICE_DESC_8 									   = আমাদের এই সেবার মাধ্যমে জানুন আপনার কুষ্ঠিতে তৈরি হওয়া যোগ। আপনার জন্ম কুষ্ঠিতে বিভিন্ন ভাবে স্থিত কোন গ্রহ করছে রাজ যোগের নির্মাণ, যা জীবনে আপনাকে উন্নতির শিখরে পৌছে দিবে। এই যোগের প্রভাবে আপনি কি পাবেন সরকারি চাকরী, হবে মনপছন্দ ভালোবাসা, ব্যবসাতে পাবেন সফলতা, জীবনের কোন বর্ষে হবে ভাগ্যোদয়? নিজের মনে আসা এই অনেক প্রশ্নের উত্তর এই সেবার মাধ্যমে জানুন। আপনার কুষ্ঠিতেও কি রয়েছে রজ্জু, মুসল, নল, বাপী, গদা আর স্কট আদি যোগ ? এরকম অনেক যোগ আর তার প্রভাবের ব্যাপারে জানার জন্য পড়ুন রোচক জানকারী। জানুন কেমন করে বাপী যোগে জন্ম নেওয়া ব্যাক্তি হয় ধনবান। মুসল যোগে জন্ম নেওয়া ব্যাক্তি কেমন করে পাই আর্থিক সম্পন্নতা আর সম্মান। নল যোগের সাথে সম্বন্ধিত ব্যাক্তি কেন হয় চতুর আর বুদ্ধিমান? জানুন রাজ্ যোগের সাথে জড়িত এমন আরও কিছু তথ্য এবং উনার ব্যাখ্যা। 

SERVICE_NAME_9  								   = বার্ষিক কুষ্ঠি 2020
SERVICE_DESC_9 									   = বৈদিক জ্যোতিষের প্রাচীন সিদ্ধান্তে উপর নির্ভর করে “বার্ষিক কুষ্ঠি 2020’ বিশেষ করে আপনার জন্য তৈরি করা হয়েছে, যাতে আপনি 2020 তে সফলতা আর সম্মৃদ্ধির পথে এগিয়ে যেতে পারেন। এটি সেইসব স্বপ্নের কুঞ্জি যা আপনি খোলা চোখে সর্বদা দেখে আসছেন-প্রসন্নতা, উল্লাস আর সন্তোষের সাথে ভরা বর্ষের কুঞ্জি। এতে আপনি পাবেন প্রেম, বিবাহ, কেরিয়ার,পরিবার, স্বাস্থ্য আরও অনেক বিষয়ের সাথে জড়িত ভবিষৎবাণী। আমরা এটা মানি যে আপনি বিশেষ একজন সেইজন্যে বার্ষিক কুষ্ঠি 2020 তে আমরা আপনাকে সুক্ষম বিশ্লেষণ, সঠিক ভবিষ্যৎবাণী আর সহজ উপায় দিবো, যা বিশেষ করে আপনার জন্যেই তৈরি করা হয়েছে। চুস করুন 2020 তে দুঃখ-ব্যাথা থেকে স্বতন্ত্রতা, খুশির সাথে ভরা আরও একটি ভালো ভবিষ্যৎ, চুস করুন বার্ষিক কুষ্ঠি 2020’ এক্ষনি।

