	IMPORTANT_INFO						= <p>రత్నాన్ని ధరించునపుడు దయచేసి కొన్ని విషయాలు గుర్తుంచుకోండి. అసలైన రత్నాలనే ధరించండి, నకిలీలు ధరిస్తే ఎలాంటి ప్రభావం ఉండదు. మీరు సూచించబడిన బరువు, అంటే "రత్తి" అని పిలువబడే కొలతగల రత్నాలనే ధరించాలి. ఈరోజుల్లో మార్కెట్ లో నకిలీ రత్నాలు విరివిగా దొరుకుతాయి. మా చదువరులకు అసలైన రత్నాల గురించి తెలుసుకోవడానికి సహాయపడడానికి  ఆస్ట్రోకాంప్ / ఆస్ట్రోసేజ్  మీకొరకు మా ప్రత్యేక రత్నాల సముదాయాన్ని తీసుకువచ్చింది. దీని గురించి మరింత తెలుసుకోవడానికి, ఇక్కడ క్లిక్ చేయండి.</p> <p><b>రత్నాలను కొనుగోలు చేయడానికి, దయచేసి <a href=http://www.astrocamp.com/products.asp><u>లో రత్నాల కొనుగోలు కొరకు మా ఆస్ట్రో షాపును చూడండి</u></a></b>.</p> <p><b>మా నిపుణుని ద్వారా సూచించబడిన మీ "రత్నాల సిఫారసులను" ఆర్డర్ చేయుటకు, దయచేసి సందర్శించండి <a href=http://www.astrocamp.com/service.asp?service_id=84&prtnr_id=1><u>జాతి రత్నముల సలహా పేజీ </u></a></b>.</p>
