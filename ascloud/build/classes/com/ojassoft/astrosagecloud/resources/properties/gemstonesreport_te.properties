	WHAT_IS_GEMESTONES					= రత్నం అంటే ఏమిటి?	
	GEMINTRO							= గతమంతా ఉపశమనానికి మరియు ఆచార సంబంధమైన కార్యాలకు, రత్నాలను ప్రధానంగా ఉపయోగించేవారు. రత్నాలు అరుదుగా దొరికినప్పటికినీ, అందంగా ఉన్నప్పటికినీ, అవి ధరించువారిలో అవి చూపు గొప్ప శక్తి వలన అవి చాలా విలువైనవిగా మారాయి. అవి శరీరాన్ని తాకుట ద్వారా ప్రసరించు సాధికారము యొక్క నిలువలు. రత్నాలు తమ శక్తిని ఒక లాభకారకమైన లేదా నష్టకారమైన మార్గంలో ప్రదర్శిస్తాయి – అవి ఎలా ఉపయోగించుకోబడతాయో దానిని బట్టి. అన్ని రాళ్ళు మరియు రత్నాలు విభిన్నమైన స్థాయిలలో తమ ఆకర్షణ శక్తిని కలిగి ఉంటాయి, మరియు వాటిలో చాలమటుకు వాటి చికిత్సాపరమైన ఉపశమనాలకు లాభదాయకమైనవి. అవి మన సంపూర్ణ బాగోగులపై సంభావ్య ప్రభావం చూపు ప్రకంపనాలను మరియు తరచుదనాలను ప్రసరిస్తాయి. మీ రత్నాల జోస్యం ఎలా ఉంటుందో ఇక్కడ చూపించబడింది.
	STONE_DESCRIPTION					= ఒక జీవరాయి అనేది లగ్నాధిపతి కొరకు ఒక రత్నం. దానిలో ఇమిడి ఉన్న అద్భుత శక్తులను అనుభవించేందుకు దానిని జీవితమంతా ధరించవచ్చు. జీవరాయిని ధరించుటవలన తమ జీవితంలో అడ్డకుంలు తొలగి, సౌభాగ్యం కలుగుతుంది. ఇది సామాన్యంగా సంపూర్ణ బాగోగుల కొరకు ధరిస్తారు. ఆ వ్యక్తి యొక్క సంపూర్ణ ఉనికిని దీని విశ్వకిరణాలు ప్రభావితం చేస్తాయి. #జీవితం అనేది ప్రయత్నాలు మరియు విధి యొక్క సరియైన కలయిక. మీ అదృష్ట రత్నాన్ని ధరించి విధిని మీ వశం చేసుకోండి. ఒకవ్యక్తి ధరించు అదృష్ట రత్నం అతని జీవితంలో ఆనందకరమైన విషయాలకు అదృష్టాన్ని ఇస్తుంది. మీకొరకు మేము సిఫారసు చేయు అదృష్ట రత్నం:# అదృష్టరత్నం అనికూడా పిలువబడే భాగ్యరత్నం అనేది తొమ్మిదవ గదికి అధిపతి ఆధారంగా నిర్ణయించబడుతుంది. మీకు వాస్తవంగా అదృష్టం అవసరమైనపుడు ఈ రత్నం ఆ అదృష్టాన్ని కలిగిస్తుంది. మీ వ్యక్తిగత మరియు ఉద్యోగ జీవితాలలో అదృష్టం కలుగుతుంది. మీ సౌభ్యాగ్యానికి అడ్డంకిగా ఉన్న దేనితోనైనా పోరాడడానికి ఇది మీకు సహాయపడుతుంది.	
