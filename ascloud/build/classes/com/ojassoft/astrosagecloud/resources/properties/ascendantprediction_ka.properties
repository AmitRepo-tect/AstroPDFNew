

	 WHAT_IS_ASCENDANT				= ಲಗ್ನವೆಂದರೇನು?
	 ASCENDANT_PREDICTION			= ವೇದ ಜ್ಯೋತಿಷ್ಯದಲ್ಲಿ ಲಗ್ನಕ್ಕೆ ಬಹಳ ಮಹತ್ವ ನೀಡಲಾಗಿದೆ. ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಜನನದ ಸಂದರ್ಭದಲ್ಲಿ, ಆಗಸದಲ್ಲಿ ಏರುವ ಚಿಹ್ನೆಯನ್ನು ಲಗ್ನವೆಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಹಾಗೂ, ಈ ಮನೆಯಲ್ಲಿ ಬರುವ ಚಿಹ್ನೆಯನ್ನು ಲಗ್ನರಾಶಿಯೆಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಲಗ್ನವು ಜ್ಯೋತಿಷ್ಯದ ಮೂಲಕ ವ್ಯಕ್ತಿಯ ಜೀವನದ ಅತ್ಯಂತ ಚಿಕ್ಕ ಘಟನೆಗಳನ್ನೂ ಊಹಿಸಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. ದೈನಂದಿನ, ಸಾಪ್ತಾಹಿಕ ಹಾಗೂ ವಾರ್ಷಿಕ ಭವಿಷ್ಯಗಳನ್ನು ಚಂದ್ರರಾಶಿ ಹಾಗೂ ಸೂರ್ಯರಾಶಿಯ ಆಧಾರದ ಮೇಲೆ ಮಾಡಲಾಗುತ್ತದೆ.
