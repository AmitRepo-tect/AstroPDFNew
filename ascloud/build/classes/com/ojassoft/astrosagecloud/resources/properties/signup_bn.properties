

	 USER_ID_SHOULD_BE_8_OR_MORE_THAN_8_CHARACTERS						= ইউজার আইডি ৮ অক্ষরের বা ৮-এর অধিক হওয়া দরকার।
	 USER_ID_SHOULD_NOT_BE_BLANK										= ইউজার আইডি ফাঁকা রাখা যাবে না।
	 PLEASE_ENTER_ONLY_DIGIT_ALPHABAT_CHARACTERS_IN_THE_USER_ID_FIELD	= ইউজার আইডিতে শুধুমাত্র ডিজিট বা বর্ণমালা দিন। 
	 PLEASE_ENTER_VALID_EMAIL_ADDRESS_FOR_REGISTRATION_INFORMATION		= নিবন্ধন ইনফরমেশনের জন্য বৈধ ইমেল ঠিকানা লিখুন।
	 USER_ID_AVAILABLE													= উপলব্ধ ইউজার আইডি
	 USER_ID_NOT_AVAILABLE												= ইউজার আইডি অপ্রাপ্য
	 SIGNUP																= সাইন আপ
	 YOU_ARE_UNABLE_TO_SIGN_UP											= আপনি সাইন আপ করতে অক্ষম।
	 EMAIL_ID_ALREADY_EXIST												= ইমেল আইডি ইতিমধ্যেই বিদ্যমান। ভিন্ন ইমেল আইডি দিয়ে সাইন আপ করুন।
	 USER_ID_ALREADY_EXIST_CHOOSE_DIFFERENT								= ইউজার আইডি ইতিমধ্যেই বিদ্যমান। ভিন্ন ইউজার আইডি চয়ন করুন।
	 YOU_HAVE_SIGN_UP_SUCCESSFULLY										= আপনি সফলভাবে সাইন আপ করেছেন।
