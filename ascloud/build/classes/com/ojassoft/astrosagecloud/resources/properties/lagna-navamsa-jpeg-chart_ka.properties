SAVE_CHART_INTRO_PARA = ಕೆಲವೊಮ್ಮೆ ನಮಗೆ ಆನ್ ಲೈನ್ ಹಂಚಿಕೊಳ್ಳುವಿಕೆ ಅಥವಾ ಮುದ್ರಣಕ್ಕಾಗಿ ಜಾತಕದ ಅವಶ್ಯಕತೆಯುಂಟಾಗುತ್ತದೆ. ಈ ಪುಟ ಇದೇ ಉದ್ದೇಶಕ್ಕಾಗಿದೆ. ಕೆಲಗಿನ ಜಾತಕಗಳ ಮೇಲೆ ಬಲ ಕ್ಲಿಕ್ ಮಾಡಿ ಹಾಗೂ ''save picture as ..'' ಅಥವಾ ''save image as ..'' ಎನ್ನುವುದನ್ನು ಆರಿಸಿ ಹಾಗೂ ಜಾತಕ ಫೈಲ್ ಅನ್ನು ನಿಮಗೆ ಸ್ಥಳೀಯ ಮಶೀನ್ ನಲ್ಲಿ ಉಳಿಸಿ. ಇದು ಚಿತ್ರವನ್ನು ಇಂಟರ್‌ನೆಟ್ ನಲ್ಲಿ ಒಂದು ಅತ್ಯಂತ ಜನಪ್ರಿಯ ಚಿತ್ರ ನಮೂನೆಯಾದ JPEG ನಮೂನೆಯಲ್ಲಿ ಉಳಿಸುತ್ತದೆ. ಈ ಉಳಿಸಿದ ಜಾತಕವನ್ನು ಸಾಮಾಜಿಕ ಜಾಲತಾಣಗಳಾದ ಫೇಸ್ ಬುಕ್ ಹಾಗೂ ಟಿಟ್ಟರ್ ಗಳಲ್ಲೂ ಹಂಚಿಕೊಳ್ಳಬಹುದು, ಅಥವಾ ನಿಮ್ಮ ವೆಬ್ ಸೈಟ್ ಅಥವಾ ಬ್ಲಾಗ್ ನಲ್ಲೂ ಪ್ರಕಟಿಸಬಹುದು.
