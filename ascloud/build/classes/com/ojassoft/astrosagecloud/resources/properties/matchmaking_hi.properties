
	MATCH_ME											= कुण्डली मिलान
	ENTER_GIRLS_BIRTH_DETAILS							= लड़की का जन्म विवरण
	ENTER_BOYS_BIRTH_DETAILS							= लड़के का जन्म विवरण
	MATCH_WITH_PUBLIC_CHART							= शेयर कुण्डली से कुण्डली मिलान
	ENTER_GIRLS_DETAILS								= लड़की का विवरण
	ENTER_BOYS_DETAILS									= लड़के का विवरण
	ENTER_GIRLS_CHART_NAME								= लड़की की कुण्डली का नाम
	ENTER_BOYS_CHART_NAME								= लड़के की कुण्डली का नाम

	UNKNOWN_ERROR_OCCURRED								= Unknown Error Occurred.
	THERE_IS_NO_SAVED_CHART							= आपने कोई भी कुण्डली नही सहेजी हैं।
	
	YOU_ARE_NOT_LOGIN_OR_YOUR_SESSION_HAS_BEEN_EXPIRED = आपकी समय सीमा समाप्त हो गयी हैं या आप लोगिन नही हैं। कृपया पुन: लोगिन करें। 
	PLS_ENTER_CHART_NAME								= कृपया कुण्डली नाम दर्ज करें।
	CHART_NAME_DOES_NOT_EXIST							= कुण्डली नाम उपलब्ध नहीं है।
	DO_NOT_FIND_CHART_NAME								= कुण्डली नाम नहीं मिला।
	SOME_ERR_OCCRR_IN_PROCESSING_YOUR_QRY_PLS_AGAIN	= अज्ञात त्रुटि। कृपया पुन: प्रयास करें।
	SESSION_TIME_OUT_MSG								= आपकी समय सीमा समाप्त हो चुकी हैं। कृपया पुन: लोगिन करें।
	CLICK_RADIO_MATCH_DETAILS = आप जिस व्यक्ति के साथ कुण्डली मिलान करना चाहते हैं उस व्यक्ति के सामने दिये गए रेडियो बटन पर क्लिक करें।<br/><br/>
	MATCH_HOROSCOPE_SHARED_CHART = आप यहाँ सभी के साथ शेयर की गयी कुण्डली के साथ कुण्डली-मिलान कर सकते हैं। अपने साथी की कुण्डली का नाम नीचे टेक्स्ट बॉक्स में दर्ज करें। कृपया ध्यान रखें कि इस सुविधा का उपयोग करने के लिये साथी की कुण्डली सभी के साथ शेयर (पब्लिक) होनी चाहिए।<br><br>उदाहरणार्थ - यदि कोई लड़का अपना कुण्डली-मिलान कैटरीना कैफ़ की शेयर की हुई कुण्डली के साथ करना चाहता है, तो नीचे ""<b>कैटरीना</b>"" दर्ज करें।<br/><br/>
	
