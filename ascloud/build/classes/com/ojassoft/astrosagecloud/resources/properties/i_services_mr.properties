

 SERVICE_NAME_1                                     = Ask a Question Report 
 SERVICE_DESC_1                                     = मानवजातीच्या उत्क्रांतीसाठी प्रश्न पडणे अतिशय आवश्यक ठरते’, असे सुप्रसिद्ध तत्त्ववेत्ता ऑरिस्टॉटलचे प्रसिद्ध वाक्य आहे. मानवी प्रगतीसाठी, उत्क्रांतीसाठी प्रश्न पडणे फार आवश्यकच आहे एवढेच नव्हे तर वैयक्तिक प्रगती व विकासासाठीही महत्त्वाचे असते. एखादा पुरुष/स्त्रीच्या मनात गोंधळ निर्माण झाला तर तो त्याच्या/तिच्या प्रगतीमध्ये अडसर ठरतो. तुम्ही कोणत्या तरी चिंतेने ग्रस्त आहात? काही गोष्टी विशिष्ट पद्धतीने घडतील अशी तुम्हाला भीती वाटते का? <br /><br />  ज्योतिष हे दैवी शास्त्र आहे. त्यानुसार तुमच्या नशिबात काय आहे याचा अंदाज येतो. तुमच्या मनातील शंका आणि भीती याचे निरसन होऊ शकते. तुमचे करिअर, विवाह, पैसा आणि एकूण जीवन याविषायीच्या प्रश्नांवर उत्तरे मिळू शकतात. चिंतेच्या प्रश्नांवर मात करण्यासाठीचा हा मार्ग आहे.

 SERVICE_NAME_7                                     = आरोग्य आणि फिटनेस अहवाल
 SERVICE_DESC_7                                     = आरोग्य हीच खरी संपत्ती असते’ असे म्हटले जाते. तुमचे आरोग्य सुदृढ नसेल तर आरामदायी सोयीसुविधा असूनही त्याचा काही उपयोग होत नाही. जुन्या काळात, ज्योतिष आणि वैद्यकीय शास्त्र म्हणजेच आयुर्वेद हे दोन्ही एकमेकांना पूरक होते.  एखाद्या व्यक्तीच्या एकूण सुखसमृद्धीसाठी प्राचीन भविष्यद्रष्टय़ांची मते हितकारी ठरतात. अनेकदा औषधोपचार आणि उपचार पद्धती एखाद्या गंभीर आजारावर मात करू शकत नाहीत. म्हणूनच तुमच्या उन्नतीसाठी ज्योतिषविद्येचा सल्ला महत्त्वाची भूमिका बजावू शकतो. <br /><br /> तुमचे आरोग्य चांगले राखण्यासाठी प्रतिबंधक उपाययोजना केली पाहिजे आहे असे सुचविले जाते. व्यापकदृष्टीने आपला आरोग्य अहवाल आपल्याला नेमक्या काय अडचणी आहेत आणि प्रकृती बिघडू नये यासाठी काय करायला पाहिजे याचे मार्गदर्शन ज्योतिष उपाय करता येतात.

 SERVICE_NAME_14                                    = दूरध्वनीवरून सल्ला
 SERVICE_DESC_14                                    = आमचे तज्ज्ञ ज्योतिषी तुम्हाला दूरध्वनीद्वारेही तुम्हाला सल्ला मार्गदर्शन करू शकतात. ‘चांगली चर्चा होणे हे श्रीमंत बनण्यासारखे असते’, असा प्राचीन केनियन वाक्प्रचार आहे. जेव्हा एखादा पुरुष/स्त्री शाब्दिक संवाद साधतात तेव्हा ते फक्त शब्द नसतात तर त्यांचा आवाजाचा पोत आणि त्यातून बाहेर पडणाऱ्या लहरी याही महत्त्वाची भूमिका बजावतात. ज्योतिषानुसार, जेव्हा दोन व्यक्ती एकमेकांशी बोलू लागतात तेव्हा स्वाभाविक मूळ समस्यांबद्दल महत्त्वाची माहिती मिळते. <br /><br /> जीवनाच्या प्रत्येक बिंदूचा म्हणजेच करिअर, आरोग्य, व्यवसाय, प्रेम व विवाह इत्यादी विषयांची चर्चा आणि घडणाऱया घटनांमागची ज्योतिष कारणे तुम्हाला समजू शकतात. तुम्हाला मिळणारे यश, समृद्धी आणि आनंद याच्या मार्गात अडथळा निर्माण करणाऱया गोष्टींवर व्यावहारिक उपाय ज्योतिष सुचविते. आमचे तज्ज्ञ ज्योतिषी यांना फक्त एक फोन करा आणि त्याची मदत घ्या.

 SERVICE_NAME_4                                     = कार्यक्षेत्र (करिअर) अहवाल घ्या
 SERVICE_DESC_4                                     = आयुष्यात अंतिमत: यशस्वी होण्यासाठी चांगले आणि करिअर आवश्यक असते. आमच्या तज्ज्ञ ज्योतिषांचा सर्वसमावेशक अहवाल तुम्हाला तुम्ही कोणते करिअर निवडावे, वेगवेगळ्या क्षेत्रात मार्गक्रमण करण्यासाठी तुम्हाला किती गती आहे, आणि तुम्ही जर आधीपासूनच एखाद्या क्षेत्रात नोकरी करीत असाल तर त्या करिअरमध्ये अधिक चांगले घडण्यासाठी काय करायला हवे आणि तुमच्या करिअरमध्ये तुम्ही कोणते लक्ष्य ठरवायला हवे याबाबतही हे अहवाल तुम्हाला मार्गदर्शन करतील. याचबरोबर, आम्ही तुमचे भविष्यातील करिअर याचेही विश्लेषण करून देतो. त्याआधारे तुमच्या नोकरी किंवा व्यवसायात तुम्हाला कोणते अडथळे येण्याची शक्यता आहे ते सांगून तुम्ही प्रभावी ज्योतिषी उपाय योजून त्या समस्यांवर कशी मात करू शकता याचेही मार्गदर्शन आम्ही करतो.  हे सविस्तर अहवाल तुम्हाला पुढील बारा महिन्यांत तुमचय उद्योग-व्यवसायात किंवा नोकरीतील समस्या आणि प्रगतीमधील अडचणी यांचे साद्यंत ज्योतिष विश्लेषण करू त्यावरचे उपया आम्ही सुचवितो. आगामी काळातील तुमच्या करिअरमधील वाटचालीविषयी तुम्हाला हा अहवाल मार्गदर्शक, दिशादर्शक ठरेल. प्राचीन ज्योतिषविद्येतील शहाणपण तुम्हाला तुमचे करिअर आणि आयुष्य घडविण्यासाठी आमच्य तज्ज्ञ ज्योतिषांचा सर्वसमावेशक अहवाल सहाय्यभूत ठरतो.

 SERVICE_NAME_12                                    = अर्तविषयक अहवाल मिळवा 
 SERVICE_DESC_12                                    = अर्थविषयक अहवाल मिळवा आजच्या स्पर्धात्मक जगात, सशक्त आर्थिक स्थिती असणे ही चैनीची नव्हे तर चांगले जीवन जगण्यासाठी आणि प्रगतीसाठी अतिशय आवश्यक बाब ठरते. आर्थिक सुरक्षा फक्त एका व्यक्तीच्या एकूण सुखासाठी अनिवार्य असे नव्हे तर त्या व्यक्तीशी संबंधित त्याचे जोडीदार, मुले आणि संपूर्ण कुटुंबासाठीही आवश्यक असते. आर्थिक समस्या केवळ प्रगतीलाच अडसर ठरतात असे नव्हे तर माणसाचे स्थैर्य, आनंद आणि मानसिक शांततेलाही बाध आणतात. जॉन एफ केनेडी एकदा म्हणाले होते, ‘क्रायसिस हा शब्द लिहिताना चीनी लोक दोन ब्रशचा वापर करतात. एक ब्रश धोक्यांचा असतो आणि दुसरा ब्रश असतो संधीचा. समस्या निर्माण होते तेव्हा धोक्यांपासून सावध राहा परंतु त्यातच संधी दडलेली आहे हेही ओळखा’. आणि हे खरे आहे. .<br /><br /> दैवी ज्योतिषविद्या तुम्हाला आर्थिक समस्येची कारणे यांचे विश्लेषण, आणि नेमकी समस्या काय आहे याचे विश्लेषण करण्याची संधी देते. त्याचबरोबरीने ज्योतिषविद्या तुम्हाला या समस्यांमधून बाहेर पडण्यासाठी कोणत्या उपाययोजना कराव्यात याचेही स्पष्ट सूचन करते. ज्योतिष हे असे शास्त्र आहे जे फक्त आर्थिक विकार सुधारण्याचेच मार्गदर्शन करते असे नव्हे तर तुमची अगोदरपासून चांगली आर्थिक स्थिती असेल तर त्यातही सुधारणा कशी करायची याचेही ज्ञान देते. तुम्हाला अर्थविषयक प्रश्न असतील तर प्राचीन ज्योतिष तो प्रश्न कशाप्रकारे सोडवायचा याचे मार्गदर्शन निश्चिपणे करील. त्यासाठी आमच्या तज्ज्ञ ज्योतिषांकडून अर्थविषयक सर्वसमावेशक अहवाल मिळवा.

 SERVICE_NAME_13                                    = रत्न आणि उपाय
 SERVICE_DESC_13                                    = फक्त आयुष्यात भेडसावणाऱया समस्या प्रभावीपणे दाखवून देणे एवढेच ज्योतिषविद्या करीत नाही तर समस्यांवर, त्रासावर व्यावहारिक उपाययोजनाही करते. ज्योतिषविद्येच्या सल्ल्यानुसार एखाद्या व्यक्तीने उपायोजना केली तर आयुष्यात सहजपणे यशस्वी होण्याचा मार्ग सापडतो.  .<br /><br /> ज्योतिषविद्येनुसार रत्ने महत्त्वाची भूमिका बजावतात. कारण वैश्विक ऊर्जा मोठय़ा प्रमाणात तुमच्या चांगल्यासाठी वळविण्याची ताकद रत्नांमध्ये असते. रत्ने दिशादिग्दर्शन करू शकतात. रत्ने तुमच्या सुखाच्या, सुधारणेच्या दृष्टीने हितकारी ठरतात. जीवनाच्या प्रत्येक कोनामध्ये प्रगतीसाठी रत्नांमुळे शक्ती मिळते. परंतु, रत्नांचा वापर योग्य रितीने केला नाही तर वैश्विक ऊर्जा तुमच्या बाबतीत अपायकारकही ठरू शकतात. म्हणूनच तुम्हाला ज्योतिषविद्येचे उपाय आणि रत्नांचे फायदे हवे असतील आणि त्याचा अर्थ, प्रेम, विवाह, करिअर व शिक्षण यातील प्रगतीच्या दृष्टीने चांगला उपयोग करून घ्यायचा असेल तर आमचे तज्ज्ञ ज्योतिषी तुमच्या मदतीसाठी सदैव तत्पर आहेत. कोणते उपाय अवलंबावे आणि त्या उपायांची अंमलबजावणी कशी करायची, कोणती रत्ने तुम्हाला योग्य ठरणारी आहेत, त्याचा फायदा कसा होऊ शकतो इत्यादीची सविस्तर माहिती आमचे तज्ज्ञ ज्योतिषी देतील.

 SERVICE_NAME_6                                     = विवाह/प्रेमाविषयी विश्लेषण
 SERVICE_DESC_6                                     = विवाह / प्रेम विश्लेषण - ‘विवाह स्वर्गात जुळतात’ असे म्हटले जाते. परंतु, तुम्हाला ज्या व्यक्तीला आयुष्यभर जोडीदार बनवायचे आहे किंवा सध्या तुमचा जोडीदार जो आहे तो तुमच्यासाठी खास आहे असे तुम्हाला वाटते का?  वास्तविक तुमचा जोडीदार कोण असावा हे ठरविण्याचा अधिकार तुम्हाला आहे. म्हणजेच मिस्टर राईट किंवा मिस राईट तुमच्यासाठी निवडता की नाही हे पाहणे अगत्याचे ठरते. जर तुम्ही योग्य जोडीदार निवडलात याचा अर्थ तुमचे आयुष्य सहज सुखकर ठरते. परंतु, जर तुमची निवड चुकली तर आयुष्यात तुम्ही पाहिलेल्या स्वप्नांचा चुराडाही होऊ शकतो. .<br /><br /> ज्योतिषविद्या तुम्हाला अचूक निवड करण्यासाठी मदत करू शकते. तुमचा संभाव्य जोडीदार तुम्हाला अनुरूप आहे किंवा नाही हे सांगू शकते. तुमच्या संभाव्य जोडीदारासोबत तुम्ही आयुष्याची सफर सुरू करावी किंवा नाही हे सांगण्याबरोबरच तुम्हा दोघांचे एकत्रित भविष्य काय असेल हेही ज्योतिषविद्या तुम्हाला सांगू शकते. आणि जर तुम्ही विवाहबद्ध दाम्पत्य असाल तर तुमच्या वैवाहिक आयुष्यात तुम्हाला कोणत्या संभाव्य अडीअडचणी येणार आहेत, त्यातून मार्ग काढून सुखी वैवाहिक आयुष्य जगण्यासाठी तुम्ही काय करायला हवे याचेही मार्गदर्शन ज्योतिषविद्या करते.

