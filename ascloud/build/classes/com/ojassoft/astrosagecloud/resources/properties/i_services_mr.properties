 SERVICE_NAME_2                                     = जन्म वेळेतील दोषांचे शुद्धीकरण 
 SERVICE_DESC_2                                     = "जन्मराशीफळ किंवा जन्मकुंडलीसाठी जन्म वेळ सर्वाधिक महत्त्वाची ठरते. अचूक व नेमकी जन्मवेळ नसेल तर हुशार चाणाक्ष ज्योतिषीसुद्धा भविष्य अचूकपणे सांगू शकत नाही. पण जर तुम्हाला तुमची जन्मवेळ माहीत नसेल किंवा अचूक जन्मवेळ सांगणाऱया पद्धतीबाबत तुम्ही गोंधळात पडलेले असाल तरी चिंतेचे काहीच कारण नाही. कारण वेदिक ज्योतिषशास्त्र तुम्हाला तुमची अचूक जन्मवेळ सांगण्यासाठी सिद्ध आहे. .<br /><br />  ऋषी कालिदास आणि महान वराहमिहीर यांच्यासारख्या भारतीय ऋषींनी अचूक जन्मवेळ सांगणाऱया अनेक पद्धती तयार केल्या आहेत. केपी सिस्टिमनुसारही अचूक जन्मवेळ काढण्याची वैशिष्टय़पूर्ण पद्धत उपलब्ध आहे. त्याउपरही हुशार आणि निष्णात ज्योतिषी तुमच्या आयुष्यात घडणाऱया महत्त्वाच्या घटनांच्या आधारेही तुम्हाला तुमची अचूक जन्मवेळ सांगू शकतो. <br /><br />  म्हणूनच, तुमच्या आयुष्यातील घटना आणि ज्या वेळी या घटना घडल्या त्याचा तपशील तुम्ही सांगायला हवा. उदाहरणार्थ तुमच्या विवाहाची तारीख, तुमच्या अपत्यांची जन्मतारीख, मोठे आजार आणि तुमची पहिली नोकरी इत्यादी. <br /><br /> त्याचबरोबर तुमच्या जन्म वेळेबाबतचा अंदाज किंवा साधारण अमूक एका काळात तुमचा जन्म झाला ती वेळ आम्हाला सांगा. समजा तुमची जन्मवेळ साधारणपणे दुपारी 2 ते दुपारी 4 या दरम्यानची आहे वगैरे. याचा अभ्यास करून अतिशय बारकाईने सर्व गोष्टी विचारात घेऊन तुमची अचूक जन्मवेळ सांगू शकतो.

