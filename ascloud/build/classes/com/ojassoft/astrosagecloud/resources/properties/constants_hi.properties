<!-- LalKitab-Remedies-Rules.asp -->
LALKITAB_REMEDIES_RULES                =  लाल किताब उपाय नियम
LALKITAB_REMEDIES_RULES1               =  सभी उपाय दिन के समय करने चाहिए अर्थात सूर्योदय के बाद से लेकर और सूर्यास्त के पहले पहले इन उपायों को करना चाहिए। जब तक विशेष रूप से आपको अन्य समय में उपाय करने के लिए न कहा जाय आपको दिन के समय ही उपाय करने चाहिए। कुछ लोगों का कहना है कि उन दिनों में जबकि आसमान में बादल हों लालकिताब के उपाय नहीं करने चाहिए। क्योंकि उन दिनों में अंधेरा होता है और अंधेरे तथा रात का स्वामी शनि ग्रह माना गया है। लेकिन उन देशों या इलाकों में जहां बरसात या सर्दियों के दौरान अक्सर दिन में बादल छाए रहते हों या दिन में भी अंधेरा रहता हों वहां पर ऐसा कोई प्रतिबंध नहीं होना चाहिए.
LALKITAB_REMEDIES_RULES2               =  लंबी अवधि वाले उपाय जैसे कि 6 दिन, 10 दिन, 43 दिन वाले उपायों को नियमित रूप से करना चाहिए अर्थात बीच में एक भी दिन नागा (ब्रेक) नहीं करना चाहिए। यदि किसी कारण उपाय बीच में बंद करना पड़ जाय तो जिस दिन उपाय बन्द करना है उससे एक दिन पहले थोड़े से चावल दूध से धोकर सफेद कपड़े में बांध कर पास रख लें और जब दुवारा उपाय शुरू करना हो वह चावल धर्म स्थान में या चलते पानी में या किसी बाग-बगीचे आदि में गिरा कर उपाय फिर शुरू कर दें। ऐसा करने से उपाय अधूरा नहीं माना जाएगा और पूरा फल मिलेगा। जैसे कि आप 43 दिन वाला उपाय कर रहे हैं और आपको बीच में ही किसी यात्रा पर जाना पड़ा तो आप उपरोक्त बिधि से अपने उपाय को खंडित होने से बचा सकेंगे।
LALKITAB_REMEDIES_RULES3               =  एक बार में एक ही उपाय करना चाहिए। दूसरा उपाय करना तभी शुरू करें जब पहला वाला पूरा हो गया हो। यदि कहा गया हो तो उपायों को क्रमानुसार करें। यदि न भी कहा गया हो तो भी उपायों को क्रमानुसार ही करें। कम दिनों वाले उपायों को पहले करें और लम्बें दिनों तक चलने वाले उपायों को बाद में करना शुरू करें।
LALKITAB_REMEDIES_RULES4               =  पहला उपाय करने के बाद और अगले उपाय को शुरू करने से पहले बीच में कुछ दिनों का गैप करें। यदि संभव हो तो अगला एक सप्ताह बाद शुरू करें। लाल किताब का उपाय आपका कोई सगा सम्बंधी (खून का रिश्ता रखने वाला) भी कर सकता है लेकिन उपाय शुरू करने से पहले रिश्तेदार को मानसिक संकल्प लेना चाहिए कि वह जो भी उपाय कर रहा है अपने “अमुक” व्यकित के लिए कर रहा है और इन उपायों का फल “अमुक” व्यकित को ही मिलना चाहिए। ऐसा न करने की स्थिति में उपायों का फल उपाय कर रहे व्यक्ति को मिलने लगता है जो कि अवांछनीय है। 

