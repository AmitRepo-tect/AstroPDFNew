ASTRO_SKETCH_DATA_MALE = <p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>மேஷம் (Aries)  இந்த ராசியில் பிறந்த ஆண் தலைமைத்துவ பண்புகள் உடையவர் மற்றும் புதிய விஷயங்களை கண்டுபிடிக்க முயற்சி எடுப்பவர். அவர், ஆச்சரியங்களை நேசிப்பவர் மற்றும் ஒரு கடினமான மனிதராகத் திகழ்பவர்,   மிகக் கடினமான சூழ்நிலையிலும் தனது உள் வலிமையை காட்டுபவராக இருப்பவர். அவர் சுதந்திரமானவர், வேடிக்கை மிக்கவர் மற்றும் சாகசங்கள் செய்ய விரும்பம் உள்ளவர். பிறரைப் போல் இல்லாது, வாழ்க்கையில் எப்போதும் பிரகாசமான பக்கத்தையே காண விரும்புபவர் ஆதலால் சற்று ஆக்கிரமிப்புடனும் மற்றும் மழுங்கிய தன்மையுடன் காணப்படுவர். அவர் தவறான பாராட்டுக்களை ஏற்பதில்லை.  போலியாக, யார் யாரோ தங்களை நேசிக்கிறேன் என்று கேட்பதை விட தங்களை வெறுக்கிறேன் என்று கூறுவதையே விரும்புவார். முக்கியமாக தங்களுக்கென்று எதிலும் சொந்த தனி இடம் வேண்டும் என்று விருப்பம் உள்ளவர் அதிலும் கூட உறவு என்பது அவருக்கு மிகவும் முக்கியமானதாகும். எப்போது ஒரு உறுதிப்பாட்டை ஏற்க வேண்டியுள்ளதோ, அப்பொழுது அவர் தங்களின் அன்பு, ஆதரவுடன் மென்மையான முறையில்  வழ்க்கைத்துணை மற்றும் கூட்டாளிகளுடன் விருப்பத்துடன் செயல்படுவர். அவர் கடந்தகாலத்தில் ஏற்பட்ட படிப்பினைகளை மிகத் தீவிரமாக கருத்தில் கொள்ளாமல் தற்போது உள்ள நிலையிலேயே கவனத்துடன் வாழ்பவராவர். </p><p><b>மேஷ ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>ஜெயப்பிரதா, மம்தா குல்கர்னி, ராணி முகர்ஜி, ஜிதேந்திரா</p><p><b>மேஷ ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை: </b>சாகசம், சுறுசுறுப்பு,  தைரியம், செயலில் ஈடுபாடு  மற்றும் மிக்க சாமர்த்தியமான குணம் மிக்கவர்கள்<br/><b>பாதகமானவை:</b>சுயநலம், முன் கோபம், மனக்கிளர்ச்சி  மேலும் பொறுமையற்றவர்கள் </p><p><b>மேஷ ராசியுடன்  பொருந்தக்கூடிய பிற சந்திர ராசிகள்:</b> மிதுனம், சிம்மம், தனுசு, மற்றும் கும்பம் முதலியன</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>ரிஷப ராசி ( Taurus) மனிதரிடம்  வசீகரமான தோற்றத்துடன் , தேனொழுகப் பேசும் தனித் தன்மையுடன் இருக்கும் பண்புகள் உண்டு. அவரது  உன்னதமான தன்நிலையிலேயே இருக்கச் செய்யும் பண்புகள் அவர்பால் அனைவருடைய கவனத்தையும்  ஈர்க்கும்.  அவர் எங்கு போனாலும் பாராட்டுபவர்களால் சூழப்படுவார்கள். அவர் சொல்வாக்கு நிறைந்த செல்வாக்குடைய ஒரு மனிதன். ஆதலால் அவரது சிறந்த பேச்சுத்திறமையால் செல்வாக்குடன் மற்றவர்களை எளிதாக  கட்டுப்படுத்த முடியும். அவரது மிகப் பெரிய பலம் அவரது பொறுமை. இதனால் அவர் எப்போது எடுக்கும் முடிவுகள் மற்றும் ஒரு நெருக்கடி நிலைமையை கையாளும் போதோ அவருடைய தீர்ப்பு சிறந்த முறையில் அமைகிறது. அவர் காட்டுகிற உணர்ச்சி மற்றும் தார்மீக தைரியம் ஆகியவைகளால் எப்போதும் நீங்கள் அவரைப் பாராட்டி ஒரு நம்பகமான மற்றும் விசுவாசமான நண்பனாக உங்கள் சார்பாக இருக்கச் செய்ய முடியும். எனினும் இந்த அளவு நற்பண்புகள் இருந்தபோதும் அவர் சில நேரங்களில் மிகவும் சொந்தமான, நெகிழ்வற்ற மற்றும் பிடிவாத குணத்துடன் இருப்பார். </p><p><b>ரிஷப ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>அஞ்சலி, ஜதார், மாதுரி தீட்சித்,  மோஷமி சாட்டர்ஜி, பூஜா பேடி</p><p><b>ரிஷப ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள் : </b><br/><b>சாதகமானவை: </b> பொறுமை, நம்பகமானவர், இளகிய மனமுடையவர், உறுதியானவர், மற்றும் மிக அமைதியானவர்<br/><b>பாதகமானவை: <b>  பொறாமை, சுயநலம், , நெகிழ்வற்ற தன்மை , மிக்க தயாள குணமுடையவர்</p><p><b>ரிஷப ராசியுடன்  பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>கடகம், கன்னி, மகரம், மீனம் முதலியன </p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>மிதுன (Gemini)  ராசியில் பிறந்த ஒரு மனிதன்,  மகிழ்ச்சியான உற்சாகமுடைய மற்றும் மிகவும் சுறுசுறுப்பாக இருப்பார். இயற்கையிலேயே ஒரு விதமான வெளி நோக்கு உடையவர்.  ஆதலால் அவர் ஒரு சிறந்த பேச்சுத்திறமை உடையவராகிறார்.  அறிவார்ந்தவர் மற்றும் எதையும் நல்லதாகவே எடுத்துக் கொள்பவர்,    அவர் தோற்றம், உண்மையில் காணப்பட வேண்டிய  தோற்றத்தை விட மிகவும்  இளைமையாகக் தோன்றும்  ஏனெனில் வாழ்க்கை மற்றும் வாழ்வதில் அவர் பேரார்வம் மிக்கவர்.  அமைதியற்ற முறையில் எதையும் அறிய ஆர்வம் மிக்கவர்,   வழக்கமான பணிகள் மற்றும் அன்றாட வேலைகளை மீண்டும் மீண்டும் திரும்பச்செய்வதில் வெறுப்புண்ர்ச்சியுடன் இருப்பவர் என எதிர்பார்க்கலாம்.அவரைத் தக்க வைத்துக்கொள்ள அவருக்கு கொடுக்கும் வேலையானது ஒரு புதிய சவாலாக இருக்க வேண்டும்.   அவரைப் பற்றி எதிர்மாறக, நீங்கள்அனைவரிடமும் தீய பெயருடன் நம்பிக்கை அற்றவராகக் கருதலாம்.  தனக்கு சாதகமான சூழ்நிலைகளைப் பயன்படுத்தி ஒரு தனிப்பட்ட செயல் மூலம் சுயமுன்னேற்றம் அடைய அதற்கான மனநிலையுடன் இரட்டை முகத்துடன் விளையாடும் ஒரு மனிதராகக் காணப்படுவர். அவரைத் தன் மனதைப் பின்பற்றி தன் போக்கின் படி செல்லும் பகுத்தறிவற்ற காதலன் என எதிர்பார்க்க வேண்டாம். அவர் எப்பொழுதும் நடைமுறைப்படிதான்  செயல்படுவர் மற்றும் அவரது முடிவுகளை அவர் மனமே ஆட்சி செய்கிறது. </p><p><b>மிதுன ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>டிம்பிள் கபாடியா, ஷில்பா ஷெட்டி, மிதுன் சக்கரவர்த்தி, பரேஷ் ராவல் </p><p><b>மிதுன ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை:</b> இணங்கிச் செல்லல்,  பல துறைகளிலும் திறமை,  நகைச்சுவைமிக்க தன்மை, மற்றும் இளமை, உற்சாகத்துடன் காணல்<br/><b>பாதகமானவை:</b>பதட்ட நிலை, மேற்போக்கான தன்மை, தந்திரமான குணம்,  நிலை மாறுதல் முதலியன </p><p><b>மிதுன ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </ font> மேஷம், சிம்மம், துலாம், கும்பம் முதலியன </p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>கடகம் (Cancer) ராசியில் பிறந்த ஒரு மனிதன், உணர்ச்சி மிக்கவர், மற்றும் உணர்ச்சி வயப்பட்டவர், பாதுகாப்பு இல்லாமை ஆகியவகளால்  பாதிக்கப்படக்கூடியவர்கள்.  அவரருடைய விசித்திரமான தூண்டப்பட்டவார்த்தைகள் மூலம் உங்களுடைய இதயத் துடிப்பு  ஒருமுறை  துடிக்க மறக்கும் அளவிற்கு அமைந்திருக்கும். அவர் தன்மேல் பாசம், பாதுகாப்பு மற்றும் ஆதரவு பொழியும் நண்பர்களைத் தேர்ந்தெடுப்பார். அவர் வீட்டிலும்,  மற்றும் அவருடைய மிக  நெருங்கிய உறவுடையவர்களுடன் அல்லது அன்புக்குரியவர்களுடன் கூடும்போது  அவர்களுடன் இணைந்து  மிக்க மகிழ்ச்சியாக இருப்பார். அவர் பிறர் உணர்வுகளைப் பற்றி சிந்திக்காத, முன்யோசனையற்ற மக்களை வெறுக்கிறார் மற்றும் அவர்களின் கடுமையான வார்த்தைகள் மூலம் மனதில் காயம் அடைகிறார். அதனால் அவர் பிறரை அவமரியாதை செய்யும் ஒரு முரட்டுத்தனமான மனிதர் அல்லது பெண்மணியுடன்  நண்பராக இருப்பதில்லை. அவரது நேர்மை, உறவு நோக்கும் விசுவாசமானது அவரை விரும்பத்தக்கதாக செய்கிறது மற்றும் அவரது மிக அதிக அளவு உணர்வுள்ள நகைச்சுவை மூலம் கோடிக்கணக்கான இதயங்களை திருட முடியும்.  அவர் மிகவும் கஞ்சத்தனமாகவோ அல்லது ஊதாரியாகவோ இருப்பவர் அல்ல, ஆனால் தனது நெருங்கியவர்களுக்கு  அதிக சலுகை காட்டி எப்படி அழகான, மற்றும் மனதிற்கேற்றபடி பரிசுகளை வாங்குவது என்பது தெரியும். அவரது இயல்பு மாறிய நடத்தை மற்றும் மனநிலை ஊசலாடும் நேரங்களில் அவர் முன்னறிந்து கூறமுடியாதவராகிவிடுவார். ஆனால் இதனால் அவர் நம்பமுடியாதவர் இல்லை,  நீங்கள் கேள்விக்கிடமின்றி அவரது உள்நோக்கங்களை நம்ப முடியும். </p><p><b>கடக ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/> பிரியங்கா சோப்ரா, ஜூலியா ராபர்ட்ஸ், டாம் குரூஸ், இளவரசி டயானா, பமீலா ஆண்டர்சன்</p><p><b>கடக ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை:</b>உணர்ச்சி, அன்பு, உள்ளுணர்வு, கற்பனைத்திறன், புத்திசாலித்தனம், கவனம், பாதுகாப்பு, அனுதாபம் முதலியன<br/><b>பாதகமானவை:</b> மாறக்கூடிய சிடுசிடுப்பான, உணர்ச்சிவசப்படுதல்,  ஒட்டிக்கொள்ளல்</p><p><b>கடக ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </ font> மேஷம், ரிஷபம், கடகம், கன்னி, துலாம், மகரம் முதலியன</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>சிம்ம (Leo) ராசியில் பிறந்த ஆண் ஒரு உறுதியான வெளிப்புற தோற்றத்தை பெற்றிருப்பர் ஆனால் அவர் , உணர்ச்சி வயப்படுகிறவர்,  பட்சாதாபம் மற்றும் உணர்வுபெருக்கை மையமாக கொண்டவர்.  அவரை சுற்றி இருக்கும் பெண்பாலரிடம் மிகவும் அன்பாதரவுடையவர்   ,  அதை வெளிக் கட்டிக் கொள்ளாதவராக இருக்கலாம் ஆனால்  அவர் விரும்புபவரை தனக்கே சொந்தமாக கருதுபவர்.அவருக்கு, முன்னணியில் இருப்பது பிடிக்கும் ஏனெனில்  அதனால் மற்றவர்களின் கவனத்தை பெற முடிகிறது. விளையாட்டுத் தன்மை, உடல் வலிமை நிறைந்தவர்  மற்றும் எதிலும் மேலோட்டமாக இருப்பர்.அவர் எந்த சூழ்நிலைகளிலும்  கட்டுப்பாட்டை செயல்படுத்தப் பிடிக்கும் மற்றும்  அவரை சுற்றி இருக்கும் மக்களையும் கூட.  இது ஏனெனில்  அவர் பிறவியிலேயே  ஒரு தலைவருக்கான தகுதியுடன் பிறந்தவர். ஓரளவு அதிகார தோரணையுடன்  பிறரை ஆதிக்கம் செலுத்தும் மனிதர். அவருடைய நிதானம் மற்றும் ஆக்கிரமிப்பு உங்களுக்கு மன வருத்தைதை அளிப்பதுடன் தப்பாக புரிந்துகொள்ளத் தோன்றும்.  ஏனெனில் அவரது நெகிழ்வற்ற மற்றும் சாத்தியமற்ற பக்குவ முறையே அதற்கு காரணம் ஆகும். ஆச்சரியங்கள் மிகவும் பிடிக்கும், அவர் தனது அன்பிற்கு பாத்திரமானவர்களுக்கு  விலையுயர்ந்த பரிசுகள், மற்றும்  நினைவுப் பொருள்களையே வழங்குவர்.  வெளிப்படையாக இது அவரை ஒரு பெரிய ஊதாரியாக்குகிறது பிறரது அன்பை வியந்துபாராட்டும் தன்மையானது, இவரை வெற்று பாராட்டுடன் மற்றும் அர்த்தமற்ற போலிப்புகழ்ச்சியில் தள்ளிவிடுகிறது.  அவருக்கு நிறைய நண்பர்கள் இருப்பார்கள் மற்றும் பிறருடன் விரும்பிப் பழகுவதில் சிறந்தவர் ஆவார்: சிம்ம ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்:</b><br/>மனிஷா கொய்ராலா, கஜோல், ராக்கி, மனோஜ் குமார், குல்ஸார்</p><p><b>சிம்ம ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை:</b> சாமர்த்தியமான, கவர்ச்சியான, சுகமாக இருக்க விரும்பும், உயர்ந்த எண்ணம் மிகுந்தவர் ஆகியவை<br/><b>பாதகமானவை:</b> சந்தேகமுள்ள, மாற்றமுடைய, மற்றும் எளிதில் ஏமாற்றப்படும் இயல்புள்ளவர் ஆகியவை</p><p><b>சிம்ம ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்:</b>கடகம், மீனம் முதலியனவ</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>கன்னி (Virgo) ராசியில் பிறந்த ஆண்  உயரிய பண்புடையவர். அவர் மேற்கொள்ளும் பெரிய அல்லது சிறிய  காரியங்கள் எதுவாயினும்    முழுமையாக இருக்க விரும்பும் குணமுடையவர். வாழ்க்கையின் முடிவுகளை எடுக்க தனது மனசாட்சியின் உதவியுடன் செயல்படும் இவர்கள், தர்க்க ரீதியான மற்றும் பகுப்பாய்வுடன் வாழ்க்கை, வேலை மற்றும் உறவுகளை தனது அணுகுமுறையுடன் செயல் படுத்துகிறார்கள்  அவரிடம் என்ன  செய்ய வேண்டும் மற்றும்  அவர்முன் என்ன சொல்ல வேண்டும் என சீர்தூக்கிப்பார்ப்பது மிக முக்கியமாகும், ஏனெனில் முரட்டுத்தனமான, மரியாதையற்ற ,  மற்றும் தவறான மொழி ஆகியவையின் மீது அவருக்கு ஒரு பெரிய வெறுப்பு உண்டு அவர் உங்களைப்பற்றி எல்லாவற்றையும் கவனிப்பார். நீங்கள் உடுத்தும் விதம், பேசும் விதம் மற்றும்  எதையும் எடுத்து  செல்லும் விதம்முதலியன. உங்கள் நடத்தை பற்றி கவனமாக இருக்க வேண்டும் என எதிர்பார்ப்பார். இதற்கு அவருக்குப் போலித்தனம் கொண்டவர் என்று அர்த்தம் அல்ல.  ஆனால் அதற்கு பதிலாக அவர் கீழே பூமியில் எளிய இன்னும் ஒழுக்கமான வாழ்க்கை வாழ்கிறார். அவர், அவரது நெருங்கிய நண்பர்கள் மற்றும் அன்பிற்குரியவர்கள் சார்பாக மிகவும் அன்புள்ளம் மற்றும் பாதுகாப்பு நோக்கங்கொண்டவர். அவரது அணுகுமுறை பகுத்தறிவுடன் காணப்படுவதால், அவர் எந்த ஒரு விவாதத்தையும்  இழக்க மாட்டார் மற்றும் மிக எளிதாக சர்ச்சைகளை தீர்த்து விடுவார். நேர்மையான, ஒழுங்கமைக்கப்பட்ட, அர்ப்பணிப்பு மற்றும் உதவி மனப்பான்மை ஆகியவைகளில் அவர் மிகவும் நம்பத்தக்கவர், சில நேரங்களில் அவருடைய கடுமையான குணத்தை பார்க்க முடியும். </p><p><b>கன்னி ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்:</b><br/>ஆஷா போஸ்லே, ராகேஷ் ரோஷன், அகதா கிறிஸ்டி, ராணி எலிசபெத், ஜோசப் கென்னடி</p><p><b>கன்னி ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை:</b> கண்ணியமான, உன்னிப்பாக, நம்பகமான, நடைமுறை விடாமுயற்சி முதலியன<br/><b>பாதகமானவை:</b>முன்கோபியான,  மிகத்  தீவிர பராமரிப்பு  முக்கியமான, கடுமையான, பழமைவாத</p><p><b> கன்யா ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>ரிஷபம், மகரம்</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>துலா (Libra) ராசியில்  பிறந்த ஒரு ஆண் ,  வளைக்கமுடியாத காதல் வசப்பட்டவர். மற்றும் படைப்பாற்றல் மிக்க ஒரு தனிநபர் ஆகும்.  அவர் மீது வைத்துள்ள மரியாதை மற்றும் அன்பிற்கு தகுதி வாய்ந்தவர், ஏனெனில் புத்திசாலித்தனமான, நம்பிக்கையான மற்றும் ஜாலியாக இருக்கும் மக்கள் மீது ஈர்க்கப்பட்டுள்ளார்.ஒரு துணைவராக  அவர் உங்களுக்கு தன் தனிப்பட்ட இடத்தை கொடுப்பார்  அதேபோல உங்களிடமிருந்து அதை  எதிர்பார்ப்பார். அவர் விலையுயர்ந்த ஆடைகள், கடிகாரங்கள், காலணி, பிராண்டட் வாசனை திரவியங்கள்,  இசை, நாடகம் மற்றும் கலை ஆகியவைகளின் மீது தன் செலவினங்களை செலுத்துவார். அவர் தனது முற்போக்கு சிந்தனை குணம் மற்றும் மாற்றத்தை விரும்பும் நெகிழ்வான தன்மை உடையவர் என்பதால் அவரைச் சுற்றி இருப்போரின் கருத்து மற்றும் எண்ணங்கள் சரியான காரணங்ககளுடன் அமைந்திருந்தால் அதைக் கேட்டு ஏற்றுக்கொள்ள கவலைப்பட மாட்டார். அவர் மக்களுடன் சூழப்பட்ட போது நம்பிக்கை மற்றும் உயிரோட்டமுள்ள மற்றும் ஒரு சுவாரஸ்யமான உரையாடலில் நீண்ட நேரம் ஈடுபடும் போது மிகவும் மிகுதியாக பேசுகிற அவர் மிகவும் மகிழ்ச்சியான முறையில் இருப்பார்.அவர் ஒரு முடிவை எடுக்க சாதரணமாக சிறிது காலம் எடுக்கும், ஆனல் சோம்பேறி அல்ல.  தனது பொதுநல ஈடுபாடு ஏதேனும் நேரங்களில் அதிக அளவு  சென்று அவரைச் சுற்றியுள்ள  மக்களுக்கு சங்கடமான நிலையை உண்டாக்கும்.</p><p><b>துலா ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>கேட் வின்ஸ்லெட், ரேகா, கரீனா கபூர், லதா மங்கேஷ்கர், அமிதா பச்சன், மகாத்மா காந்தி </p><p><b>துலா ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை:</b>அரசாங்க , திடமான காதல், கவர்ச்சிமிக்க, எதிலும் அமைதியானவராக, சிறந்தவராக<br/><b>:பாதகமானவை:</b>முடிவற்ற நிலை, மாற்றத்தை விரும்பும், மற்றும் ஏமாறக்கூடிய தன்மை</p><p><b>துலா ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </ font> மேஷம், கடகம், சிம்மம், துலாம், தனுசு, மகரம் ஆகியன</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>விருச்சிக (Scorpio) ராசியில் பிறந்த மனிதன், உணர்ச்சி நகைச்சுவை,  தனிமை மற்றும் மிகவும் இரகசியமான தன்மை வாய்ந்தவர். அவரது உணர்ச்சிவசப்பட்ட தன்மை மற்றும் சுய நம்பிக்கை மனோபாவம் அவருக்கு ஈர்ப்பு மையமாக ஆகின்றனஅவரது பேராவல் அவரை தூண்டப்பட்டு வைத்திருக்கிறது அவர் ஓரளவு சமூகத்தில் நிலைநாட்டப்பட்ட விதிமுறைகள்  மேல் நம்பிக்கை இல்லாத ஒரு போராளிதான். அவர் எண்ணிக்கை அற்ற அளவில் கவர்ச்சி,  மனநிலைமாற்றம், பரபரப்பற்ற மற்றும் ஆயத்த நிலையில் இருப்பார். அவர் செயற்கையில் அமைந்த, திடமற்ற மற்றும் தீவிரம் இல்லாத எதையும் வெறுக்கிறார்.  அவர் மகிழ்ச்சியாக இருக்க மற்றும் முழுமையானதாக உணர அவர்களை சுற்றி உண்மையான மக்கள் தேவை.  அவர் புதியதாக மற்றும் சுவாரஸ்யமான ஏதாவது ஒன்றை எப்போதும் கைவசம் வைத்திருப்பதால் உங்களுக்குச் சலிக்காத வகையில்  உங்களை நீண்ட நேரம் அவரைச் சுற்றி தான் அங்கே இருக்கும் வரையில் இருக்கச் செய்வார். பிறரிடம் சகஜமாகப் பழகுபவராதலால் இது அவரை பெரிய கும்பலடங்கிய நண்பர்கள் மற்றும் நெருங்கியவர்களுடன் இணக்கிறது.எனினும் அவர் ஒரு உறவு கோரி அதே தீவிரத்துடன்  மற்றவர்களிடமிருந்து அந்த அன்பைத்  திரும்ப  எதிர்பார்க்கிறார் ஆழமான இந்த அமைதி வாய்ந்த, தணிந்த மனிதரை காணும் உங்களுக்கு,  யாருக்கு காந்தசக்தி மற்றும் போதைப்பொருளைக்கு அடிமைப்படுத்தும் மற்றும் விலங்குத்தன்மையுடைய ஆற்றலுடன் உள்ளாரோ அவர்  போல் இருப்பார்.<p><b>விருச்சிக ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>ஐஸ்வர்யா ராய், இந்திரா காந்தி, ஜவஹர் லால் நேரு, ஷாருக் கான், பில் கேட்ஸ், பிரையன் ஆடம்ஸ், டெமி மூர்</p><p><b>விருச்சிக  ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை: </ font> உணர்ச்சிவயப்பட்ட, தீவிரமான, கௌரமுள்ள, உணர்திறன், உள்ளுணர்வு, சிற்றின்ப சம்பந்தமான, விசித்திரமான, அதீத ஆர்வமுடைய<br/><b>பாதகமானவை:</b>பொறாமை, கோபம் மிகுந்திருக்கிற, கட்டயப்படுத்தும் ஆற்றல் உடைய, மிகைவிருப்புடைய, இரகசியமாக மற்றும் பிடிவாதமாக </p><p><b>விருச்சிக ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>கடகம் மற்றும் மீனம்.</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>தனுசு (Sagittarius) ராசியில் பிறந்த ஆண் தனது வாழ்க்கையில் மகிழ்ச்சியுடன் செல்லும் ஒரு அதிர்ஷ்டசாலி.  அவரிடம் மிகவும் தேவைப்படும் இராஜதந்திரம் இல்லாதிருப்பதால் அடிக்கடி அப்பட்டமான மற்றும் நேர்மையான முறையிலேயே செயல்படுவார். எப்போது அவர் நெருக்கமான பிரியம்கொண்டவர்களுடன்  இருக்கிறாரோ அப்போது அவருடைய நட்பு வெளிப்படையாகவும் மற்றும் அவர்கள் பால் ஈடுபாட்டையும் ஏற்படுத்திவிடும். அவர் கடந்தகால வாழ்க்கைச் சுமையை உடன் சுமந்து செல்லாமல், தற்போதைய மற்றும் நடைமுறை உலகில் மட்டும் வாழ வேண்டும் என செயல்படுபவர். வாழ்க்கையில் ஏற்பட்ட மகிழ்ச்சியற்ற அனுபவங்கள் அவரை ஒரு கவலையையே காண்பவர் என ஆக்காது மற்றும் அவர் எதிலும் வைத்திருக்கும் உறுதியான நம்பிக்கை அவரை ஊக்கப்படுத்துகிறது. ஏதேனும் சூழ்நிலை ஒரு சவாலானதாக அமைந்த போதும், அவர் அதற்கு சரணடையாமல்  அதனை எதிர்த்து இறுதி வரை போராட முற்படுவார். பொதுவாக அவர் எந்த ஒரு மனஸ்தாபத்தையும்  மனதில் தக்க வைப்பதில்லை, ஆனால் யாராவது அவரை கீழே தள்ள முயற்சிக்கும் போது அவர் எளிதாக அதனை திருப்பி கொடுத்துவிடுவார். நீங்கள் அவர் உத்தரவுகளை ஏற்பார் என எதிர்பார்க்க முடியாது அதற்கு பதிலாக ஒரு எடுத்துக்காட்டு மூலம் அவரை ஊக்குவிக்க பணிவுடன் வழிவகுக்கலாம். அவரது வெளிப்படையான பேச்சுத்திறன் சமயங்களில் கடுமையான சூழ்நிலைகளில் அவரை உட்படுத்தி அவரது நேர்மையான தாக்குதல் எனவும் காணப்படுகிறது அவர் பயணம் செய்ய விரும்புபவர் மற்றும் வழக்கமான வாழ்க்கை மற்றும் மாறுதலே இல்லாத விஷயங்களை செய்ய முற்படும்போது அதில் மாட்டிக் கொண்டு அவைகளை வெறுக்கிறார். </p><p><b>தனுசு ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>தர்மேந்திரா, ஷத்ருக்கன் சின்ஹா, திலீப் குமார், வின்ஸ்டன் சர்ச்சில்</p><p><b>தனுசு ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை: </b> நன்னம்பிக்கையுடைய, மகிழ்ச்சியுடைய, சுய மனம், நேர்மையுடைய, தத்துவரீதியான<br/><b>பாதகமானவை: </b> கவனக்குறைவாக, கண்மூடித்தனமான நம்பிக்கை, திறமை அற்ற, அமைதியற்ற</p><p><b>தனுசு ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>கடகம் மற்றும் மீனம் </p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>மகர (Capricorn)ராசியில் பிறந்த ஆண் ஒரு பணிவுள்ள மனிதர். தொடக்கத்தில் அவரை அணுகுவது மிகவும் கடினமாகும். அவர் தனது உண்மையான சுய உணர்வுகளை பாதுகாப்பாக ஒரு கடினமான வெளிப்புறத்தில் காத்துவருகிறார்.அவர் எப்போதும் தன்னைப் பற்றியே எண்ணுபவர், கூட்டத்தில் கூச்ச சுவாவம் உடையவர் ஆனால் உண்மையான நெருங்கிய நண்பர்களில் அவரை யாருக்கு தெரியுமோ அவர்களில் அவர் யார் யாரிடம் மிகவும் செளகரியத்தை விரும்புகின்றாரோ அவர்களிடம்  மட்டுமே உரையாடுவார்.அவர் உங்களுடன் சுமூகமாகக் கூடிவாழும் போது தனது தனிப்பட்ட நகைச்சுவை மற்றும் கூர்மையான கருத்துக்கள் பறிமாற்றம் மூலம் தங்களை ஆச்சரியத்தில் மூழ்கடித்து விடுவார்.அவர் எண்ணம் நிலையற்றது அல்ல ஆனால் அவரது உணர்ச்சி அடிக்கடி ஊசலாடும் தன்மை உடையதாகையால் தாங்கள் அவரை உணர்வற்ற நிலையை உடையவர் என நினைக்கத் தோன்றும் மற்றும் சில சமயங்களில் தங்கள் மனதை இது காயப்படுத்தி விடும். எனினும், ஆழமான அவரது இதயத்தின் உள்ளே அவர் யார் யாரை நேசிக்கிறாரோ அவர்கள் மூலம் பாதிப்பு அடைகிறார். அவர் மிகவும் சிக்கனமான முறையில் மற்றும் கவனமாக தனது செலவுகளை கண்காணித்து தேவையில்லாமல் செலவு செய்வது இல்லை.அவர் ஒரு லட்சியவாதி ஆனால் அவரது குடும்பதையோ மற்றும் தனது பொறுப்புகளையோ புறக்கணிப்பதில்லை. </p><p><b>மகர ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>அனு அகர்வால், ரீனா ராய், சல்மான் கான், அனில் கபூர், ஜாவேத் அக்தர், நானா படேகர்</p><p><b>மகர ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை: </b> நடைமுறை, விவேகமுடைய, லட்சிய, பொறுமையுள்ள, ஜாக்கிரதையான<br/><b>பாதகமானவை: </b>அவநம்பிக்கை, கண் மூடித்தனமாக விதியை நம்புகின்ற, கஞ்சத்தனமாக, பொறாமை</p><p><b>மகர ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>ரிஷபம், கன்னி</p> #<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>கும்ப (Aquarius)ராசியில் பிறந்த ஆண் மிகவும் சுதந்திரமானவர், அறிவார்ந்தவர் மற்றும் அதே நேரத்தில் ஒரு கனவுலகில் சஞ்சரிப்பவர். அவர் திடமனம் இல்லாத மற்றும் கணிக்க முடியாத, எளிதில் புரிந்து கொள்ள கடினமாக உள்ளவர். அவர் சமூகத்தின் மூலம் உருவாக்கி பயன்படும் விதிமுறைகளை பின்பற்ற மாட்டார், ஆனால் தனது சொந்தமான முறையில் தொகுத்த விதிமுறைப்படி வாழ முற்படுவார்.அவர் மற்ற மக்கள் வாழ்க்கையில் தலையிட மாட்டார் அதேபோல மற்றவரிடமிருந்து இந்த குணத்தை எதிர்பார்ப்பார், ஏனெனில் அவர் தனது இஷ்டப்படி வாழும் வாழ்க்கையை விரும்புவர் என்பதால்.சில நேரங்களில் விலகியிருப்பதாலோ மற்றும் தொலைவிலிருப்பதாலோ, அவர் உணர்வற்றவர் போல கருதப்படலாம் ஆனால் இது உண்மை அல்ல,அவர் அக்கறை காட்டுவார். ஆனால் இது உண்மை அல்ல,அவர் அக்கறை காட்டுவார். அவரின் ஒவ்வொரு வார்த்தையின் அர்த்தத்திலும் சமத்துவத்தில் நம்பிக்கை மற்றும் அனைவரையும் நியாயமான முறையில் நடத்த வேண்டும் என்பது தெரியவரும். ஒரு பகல் கனவு காண்பவர், அவர் பெரும்பாலும் தனியே காணப்படுவதால் மற்றும் நினைவற்றவராகத் தோன்றலாம் ஆனால் அவர் தற்போதைய நிலையை மிகவும் விழிப்போடு கவனித்துக் கொண்டிருப்பார். அவர் உலகம் சொல்வதைப் பற்றி மிகவும் அக்கறை கொள்ளமட்டார் எனவே அவர் மனம் போன போக்கில் விசித்திரமான செயல்களை செய்யமுற்படுவார். அவரை சந்தோசமாக வைத்துகொள்ள நீங்கள் எப்போதும் உங்களது குதுகலமான செயல்களில் அவரை ஈடுபடித்தியிருக்க வேண்டும் . </p><p><b>கும்ப ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>ஊர்மிளா மடோன்கரை, ப்ரீத்தி ஜிந்தா, வஹீதா ரஹ்மான், சுபாஷ் கைய்</p><p><b>கும்ப ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்:  </b><br/><b>சாதகமானவை: </b> நட்பு, மனிதாபிமான, அசல், கண்டுபிடிப்பு, சுதந்திரமான, அறிவார்ந்த<br/><b>பாதகமானவை: </b>   வக்கிரமமான, உணர்ச்சிவயப்படாத,  பிரிக்கப்பட்ட, கணிக்க இயலாத,</p><p><b>கும்ப ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b> ஜெமினி மற்றும் துலாம் </p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>மீன (Pisces) ராசியில் பிறந்த ஆண் உண்மையில் திறமையான மற்றும் ஆக்கத்திறன் உள்ளவர். அவர் புதிரான அறிவியல் மீது  இயற்கையிலேயே மனப்பற்று கொண்டவர் மற்றும் எளிதில் மாற்றங்களுக்கு ஏற்ற முறைகளை பின்பற்றி  தன்னை மாற்றி அமைத்துக் கொள்ள முடியும். அவர் வாழ்க்கையில் ஏற்படும் மாற்றத்தை ஒரு சாதாரண நிகழ்வாக காண்கிறார். இது அவரை அணுகுமுறையில் இசைந்து கொடுக்கச் செய்கிறது மற்றும் கிட்டத்தட்ட அனைவரிடமும் இவரால் எளிதான முறையில் பழக முடிகிறது.  அவர் மட்டுமீறிய உணர்ச்சிவசப்படக்கூடியவர் மற்றும் நிறைந்த பாசமுடையவர். அனைத்தையும் ஒரு நன் நம்பிக்கை அணுகுமுறையிலேயே  எடுத்துக் கொண்டிருப்பார். கற்பனை அவரது வெற்றிக்கும் அத்துடன் வீழ்ச்சிக்கும் திறவுகோலாக பெற்றுள்ளது மற்றும் இது முற்றிலும் அவர் அதை எப்படிப் பயன்படுத்துவார் என்பதைப் பொறுத்தே மாறுபடும். அவர் சில சமயங்களில் மிகவும் மந்தமாக மற்றும் பொதுவாக எந்த காரணத்தினாலோ அல்லது காரணம் இல்லாமலோ சாதகமான மனச்சாய்வுடைய  மன நிலை ஊசலாடும்படி இருப்பார்.  அவர் மிகவும் அதிகாரத்துடன் கோரிக்கை செய்பவர், அதே நேரத்தில் மற்றவரை மிகவும் புரிந்து கொள்ளும் ஆற்றல் மிக்கவர்.  அவரை வலுக்கட்டாயப் படுத்தினால் எந்த விஷயங்களையும் வெறுக்கிறார்.  ஆனால் எந்த விஷயங்களை அவராகவே செய்ய நினைக்கிறாரோ அவற்றை மிகவும் நேசிக்கிறார். ஒரு நபரின் மனநிலையை வினாடியில் புரிந்து கொள்வார் ஆகையால்  யாரும் அவரை சாதாரணமாக ஏய்க்க நினைக்க முடியாது.</p><p><b>மீன ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>ப்ரீத்தி ஜிந்தா, செல்சியா கிளிண்டன், ஆல்பர்ட் ஐன்ஸ்டீன், மைக்கேலேஞ்சலோ</p><p><b>மீன ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்:</b><br/><b>சாதகமானவை: </b> கற்பனை, உணர்ச்சி, இறக்கம், தன்னலமற்ற அனுதாபம்<br/><b>பாதகமானவை: </b>தப்பித்து செல்லும் மனப்பாங்கு, குறிக்கோள் நிலையை எய்த விரும்புகிற, இரகசியமான,தள்ளாட்டம் </p><p><b>மீன ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்:</b> ரிஷபம், ஜெமினி, கன்னி, தனுசு,மகரம், மீனம்</p>
ASTRO_SKETCH_DATA_FEMALE = <p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்) மேஷ (Aries) ராசியில் பிறந்த பெண் பிறவியிலேயே ஒரு தலைவராவார்.  எதையும் முதலில் தொடங்க முற்படுவார் <br/>. அவளால் எந்த  கடினமான சூழ்நிலையிலும் வாழ முடியும் மற்றும் மிகவும் வெறுப்பூட்டும் சோகங்களை கூட சமாளிக்க முடியும். அவள் சுதந்திரமான, கவலையற்ற மற்றும் தைரியமுள்ள பெண்.  அவள் ஆக்கிரமிப்பு மற்றும் நம்பிக்கை உள்ளவளாதலால் எப்பொழுதும் எதிர்கால வாழ்க்கையைப் பற்றியே நோக்கி இருப்பாள். அவளுக்கு புகழ்ச்சி பிடிக்காது  அதற்கு பதிலாக நேர்மையை  நேசித்து வாழ்த்துகிறாள். அவளுக்கு சந்தேகப்படுதல், தனக்கேயென சொந்தம் கொண்டாடல் போன்றவை பிடிக்காது. இயல்பில் அவள் மிகவும் அன்பான, மென்மையான, விசுவாசமான மற்றும் ஆதரவு உள்ளவள்.  பெரும்பாலும் அவள் திருமணத்திற்கு பிறகும் தனது வேலையில் தொடர்ந்து செயல்படுவாள். அவள் சவால்களை நேசிக்கிறாள் மற்றும் அற்புதங்களை நம்புகிறாள். அவளுக்கு கடந்த வாழ்க்கை அனுபவமில்லாததால்,  மீண்டும் மீண்டும் மேலே அதே தவறை செய்ய வாய்ப்பு உள்ளது.</p><p><b>மேஷ ராசியில் பிறந்த சில புகழ்பெற்ற நபர்கள்: </b><br />ஜெயப்பிரதா, மம்தா குல்கர்னி, ராணி முகர்ஜி, ஜிதேந்திரா </p><p><b>மேஷ ராசி மக்களிடம் பொதுவாக காணப்படும் பண்புகள்: </b><br /><b>சாதகமானவை:</b>சாகசம், சுறுசுறுப்பு,  தைரியம், செயலில் ஈடுபாடு  மற்றும் மிக்க சாமர்த்தியமான குணம் மிக்கவர்கள் <br /><b>பாதகமானவை:</b>சுயநலம், முன் கோபம், மனக்கிளர்ச்சி  மேலும் பொறுமையற்றவர்கள் </p><p><b>மேஷ ராசியுடன்  பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>மிதுனம், சிம்மம், தனுசு, மற்றும் கும்பம் முதலியன</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரத்தை) ரிஷபத்தில்  (Taurus) பிறந்த பெண் ஒரு கவர்ச்சியான மற்றும் வசீகரிக்கும் ஆளுமையை பெற்று இருக்கிறாள். காந்த சக்தியின் ஆளுமையின் காரணமாக, அவள் எந்த ஒரு கூட்டத்திலும் பிறரின் கவனத்திற்கு மையமாக இருப்பாள். அவள் பிறருடன் தகவல்தொடர்பு ஏற்படுத்தும் போது ஒரு நட்புடன், அழகானதாக மற்றும் சிறந்த முறையில் அமைந்திருக்கும்.  அவள் தமது தோற்றம் பற்றி மிகவும் கவனத்துடன் இருப்பாள் மற்றும் எளிதாக பருமன்  அடையக்கூடிய ஒரு உடல் அமைப்புடன் இருப்பாள். அவள் பொதுவாக இயற்கையிலேயே மிகவும் அமைதியான குணத்துடன் காணப்படுவாள் ஆதலால் உண்மையில் கஷ்டமான சூழ்நிலைகளில் கூட பொறுமையைக் கையாள முடியும். பிறரால் தனது வலுவான மன வலிமையை பெரிதும் போற்றப்படுவதால், அவள் அடிக்கடி தார்மீக மற்றும் உணர்ச்சி தைரியத்தை வெளிப்படுத்துவாள்.அவள் உண்மையில் நம்பகமான மற்றும் நம்பிக்கைக்கு பாத்திரமானவள். அவள், தமது உடமைகளை பற்றி சொந்தம் கொண்டாடிக்கொண்டே இருப்பாள் மற்றும் வாழ்க்கை சுலபமான வழியில் வாழ ஒரு போக்கு வேண்டும் என நினைப்பவள், ஓரளவு பிடிவாத குணத்துடன் இருப்பாள்.</p><p><b>ரிஷப ராசியில் பிறந்த சில புகழ்பெற்ற நபர்கள்:</b><br />அஞ்சலி ஜதார், மாதுரி தீட்சித், மோஷ்மி சாட்டர்ஜி, பூஜா பேடி</p><p><b>ரிஷப ராசி மக்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்:</b><br /><b>சாதகமானவை: </b>பொறுமை, நம்பகமானவர், இளகிய மனமுடையவர், உறுதியானவர், மற்றும் மிக அமைதியானவர்<br/><b>பாதகமானவை:  </b>பொறாமை, சொந்தம் கொண்டாடல், வளைந்துகொடுக்காத, சுய விருப்பமுள்ள </p><p><b>ரிஷப ராசியுடன்  பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>கடகம், கன்னி, மகரம், மீனம் முதலியன</p>#<p> <b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்) மிதுன ராசியில் (Gemini) பிறந்த பெண் மிகவும் கலகலப்பான மற்றும் வசீகரமான தோற்றத்துடன் ஒரு சிறந்த உரையாடல் வல்லுநர் ஆவார். அவள் மனநிலை மிகவும் சுறுசுறுப்புடன் இருக்கும் மற்றும் தோற்றத்திற்கு உடல் மிகவும் அழகாக அமைந்து உண்மையான வயதை விட பார்க்க இளவயதாக தோற்றமளிப்பாள்.  அவள் அமைதியின்றி, எளிதில் சலிப்படையக்கூடியதனால் மற்ற எந்த ஒன்றிலும் நீண்ட நேரம் கவனம் செலுத்த முடிவதில்லை. அவள் ஒரு ஒப்பற்ற ஆர்வத்தை கொண்டிருக்க வேண்டும். மறுபக்கத்தில் அவள் மன நிலை எப்போதும் மாற்றம் ஏற்படுவதனால் அதன் காரணமாக குறிப்பிடதக்க வகையில் நம்பமுடியாதவளாக  இருப்பாள். அவள் தனது சொந்த நோக்கங்களுக்காக மற்றவர்களை கையாள ஒரு மனப்போக்கைப் பெற்றிருப்பாள். மரியாதைமிக்க அவளது அளவு கடந்த அறிவுக்கூர்மையானது பலர் முன்னிலையில் ஈர்ப்பு மையமாக இருக்கும் என்றாலும் அவள் மனதில் இருந்தே பெரும்பன்மையான தனது முடிவுகளை மேற்கொள்வாள் ஆனால் இதயத்தில் இருந்து அல்ல. மற்றும் ஏதாவது செயல் அறிவார்ந்ததாக அமைந்திருந்தால் அது அவளால் பெரிதும் மதிக்கப்படும். மிதுன ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்:. </ font> <br /> டிம்பிள் கபாடியா, மிதுன் சக்கரவர்த்தி, பரேஷ் ராவல், ராஜேஷ் ரோஷன். </ p > <p> <b> மிதுன ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </ font> <br /> <b> சாதகமானவை : </ font> இணங்கிச் செல்லல்,  பல துறைகளிலும் திறமை,  நகைச்சுவைமிக்க தன்மை, மற்றும் இளமை, உற்சாகத்துடன் காணல் <b> <br/>பாதகமானவை: </b>பதட்ட நிலை, மேற்போக்கான தன்மை, தந்திரமான குணம்,  நிலை மாறுதல் முதலியன </p><p><b>மிதுன ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </ font> மேஷம், சிம்மம், துலாம், கும்பம் முதலியன </p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் சுருக்கமான விவரம்) <br/>கடக (Cancer) ராசியில் பிறந்த பெண் இயற்கையிலேயே மிகுந்த உணர்ச்சிவசப்படக்கூடிய தன்மை உடையவள் எனவே மிகவும் பலவீனமாக இருப்பாள்  பொதுவாக அவள் விசித்திரமான மன நிலையை உடையவள் என்பதால் நிலையான மன நிம்மதிக்காக அவள் மீதான அன்பையும் அக்கறையும் காட்டி அவளது மனநிலையை திரும்பவும் உறுதிப்படுத்த வேண்டி இருக்கிறது.  உணர்ச்சிவசப்படுவதால் எழும் அடிப்படை பண்புகளான சிடுசிடுப்பு மற்றும் மிகவும் அக்கறையுள்ள குணத்தை கொண்டுள்ளதால் அவள் மீது பிறரின் கவனம் தேவைப்படுகிறது. அவள் நெகிழ்வான உள்ளம், மற்றும் பெண்மை,  பயந்த சுபாவம் மற்றும் எளிமையான தன்மையுடன்  இருப்பாள்.  அவள் விமர்சனங்களை விரும்ப மாட்டாள் மற்றும் நிராகரிப்பை தாங்க முடியாது. ஆழ்ந்த கடுமையான வார்த்தைகளால் பாதிக்கப் படுகிறாள். ஆகவே அவளை கையாள மிகுந்த கவனத்துடன் செயல்படவேண்டியிருக்கிறது. அவளுடைய மிகப் பெரிய கவர்ச்சியானது ஒவ்வொரு உறவு முறைக்கும் அவள் கடைப்பிடிக்கும் தீவிர விசுவாசமே காரணமாகும். அவள் திடீரென வளமான நகைச்சுவையை உங்களுக்கு வழங்கி மகிழ்ச்சியில் ஆழ்த்துவாள். அவள் சமையல் செய்வதில் சிறந்து விளங்குவாள், ஆனல் மிகவும் கஞ்சத்தனம்கொண்டவளல்ல, அல்லது முற்றிலும் ஊதாரி குணமுள்ள பெண்ணும் அல்ல. அவள் தனது நெருக்கமானவர்களுக்கு காதல், பாசம் மற்றும் பராமரிப்புக்காக சலுகையை வழங்க விரும்புவாள் அவளை யாரும் புரிந்துகொள்ளமுடியாதபடி தோன்றும் ஏனெனில் அவளது நிலையற்ற மனமாற்றமே அதற்கு காரணமாகும் தவிர அவள் பலவீனமான மன நிலையில் இல்லாததாலும் எப்போதும் யாரையும் காயப்படுத்த விரும்பாததாலும்  மற்ற செயல்களுக்கு உறுதியுடன் காணப்படுவர்.</p><p><b>கடக ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br />பிரியங்கா சோப்ரா, ஜூலியா ராபர்ட்ஸ், டாம் குரூஸ், இளவரசி டயானா, பமீலா ஆண்டர்சன்</p><p><b>கடக ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br /><b>சாதகமானவை: </b>உணர்ச்சி, அன்பு, உள்ளுணர்வு, கற்பனை, புத்திசாலி, கவனமாக, பாதுகாப்பு, அனுதாபம்<br/><b>பாதகமானவை: </b>மாறக்கூடிய,  மனக்கிளர்ச்சி,  அதிகமான மன உணர்வுகள், உணர்ச்சிவசப்படுதல், உறுதியுடன் இருத்தல்</p><p><b>கடக ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>மேஷம், ரிஷபம், கடகம், கன்னி, துலாம், மகரம்</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் சுருக்கமான விவரம்)<br/>சிம்ம (Leo) ராசியில் பிறந்த பெண் மிகவும் உணர்ச்சி வசப்படுபவள் மற்றும் சொந்தம் கொண்டாடுபவள். அவளை சுற்றியுள்ள மக்களிடம் அவள் மிகவும் தோழமையுடனும் மற்றும் மரியாதை உள்ள நற்குணம் வாய்ந்த முறையிலும் பழகுவாள். அவள் விளையாட்டுகளை அனுபவிப்பவராக இருக்கலாம், மற்றும்  தடகள விளையாட்டையும் அனுபவிப்பவராக இருக்க முடியும்,  வாழ்க்கையை விட பெரிதாக தோன்றும் எல்லா விஷயங்களிலும் ஓரளவு மேம்போக்குடன் தனது ஈடுபாட்டை தெரிவிப்பாள். அவள் எதையும் ஏற்றுக்கொண்டு எல்லாவற்றையும் தலைமை தாங்கும் இயல்பான திறமை பெற்றவள். சமயங்களில் இந்த முறை அவளை தேவையில்லாமல் அதிகார தோரணையுடன் தலைமையாக செயல்படுத்துகிறது. இயற்கையாகவே அவளுக்கு தலைமைப் பொறுப்பு  வருதல் மற்றும் அவள் தன்னை வாழ்க்கை துணைவர் ஆதிக்கம் செய்வதை  வெறுக்கிறாள். தனது உறுதியான தன்மை என்ற குணாதிசயம் அவளை ஆதரவில்லாமல் ஆக்கி விடுகிறது.அவளை அவமானப்படுத்தி இருந்தால் அவள் சீற்றம் பெற முடியும். பிறர் தன்னை விமர்சனம் செய்வதையோ அல்லது அலட்சியம் செய்வதையோ மற்றும் அவமதிப்பததையோ விரும்ப மாட்டாள்.அவளது நான் என்னும் பெரிய அகங்காரமானது அவளை உறுதியாகவும் மற்றும் நடைமுறைக்கு சாத்தியமற்றதாகவும் தோன்ற செய்கிறது. எல்லோரும் அவள் கூப்பிட்ட குரலுக்கோஅல்லது அவளது  சைகை செய்து  அழைப்பு விடுத்ததும்  உடனடியாக இருக்க வேண்டும் என்று எதிர்பார்ப்பாள். பொருளாதாரத்தில், அவள் மற்றவர்கள் புகழ்ச்சி மூலம் மெய்மறந்து அதிகமாக செலவு செய்வதில் ஒரு பெரிய ஊதாரியாக இருக்க முடியும். அவள் மிகவும் சுகமாக இருக்க வேண்டுமென விரும்புகிறாள். அவள் விருந்தினரை நன்றாக உபசரிக்கும் பெண், ஆகவே வசீகரமான முறையுடன் அவளுடைய எல்லா விருந்தினர்களையும் உபசரிப்பாள். அவள் விருந்தினர்கள் முன்பு மிக அறிதாக உணர்திறனை வெளிகாட்டுவாள் மற்றும் சமயங்களில் உணர்வற்றபடி செயல்படுபவாள்.</p><p><b>சிம்ம ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br />மனிஷா கொய்ராலா, கஜோல், ராக்கி, மனோஜ் குமார், குல்ஸார்</p><p><b>சிம்ம ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்:</b><br /><b>சாதகமானவை: </b>சாமர்த்தியமான, கவர்ச்சியான, சுகமாக இருக்க விரும்பும், உயர்ந்த எண்ணம் மிகுந்தவர் ஆகியவை<br><b>பாதகமானவை: </b>சந்தேகமுள்ள, மாற்றமுடைய, மற்றும் எளிதில் ஏமாற்றப்படும் இயல்புள்ளவர் ஆகியவை</p><p><b>சிம்ம ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>கடகம், மீனம்</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>கன்னி (Virgo) ராசியில் பிறந்த பெண் சமயத்திலும் ஒழுக்கத்திலும் நிறைவடைய முடியும் என்ற கொள்கையுடையவர்  மற்றும் அவள் மனம் குறிப்பாக அவள் பொறுப்பில் இருக்கும்  இடைக்கால வேலை, மற்றும் அதன் விவரங்கள் குறித்து ஒவ்வொரு பணியைப் பற்றியும் கவலைப்பட முனைகிறது . அவள் தர்க்கரீதியான மற்றும் பகுப்பாய்வு சார்ந்தவள் அதனால் அவள் எப்போதும் சரியான தன்மையுடன் இருப்பதில்லை முரட்டுத்தனமான நடத்தை,  முறையற்ற மொழியை பயன்படுத்துதல் மற்றும் பார்வைக்கு அவலட்சணமான முறையில் இருத்தல், அல்லது எல்லார் முன்னிலையிலும் உள்ளன்பை காட்டுதல் போன்றவற்றை அவள் விரும்புவதில்லை. அவளை சமுதாயத்தில் மிக மரியாதைக்கும், நடைமுறைக்கும் ஒப்பானவர்களில் ஒருவளாகவும் மற்றும் சரியான காரணங்களையும், தீர்ப்புகளையும் உடையவளாகவும் காண முடியும். வலுவான அறிவு திறன், மிகவும் பகுப்பாய்வு கொண்ட மனம் மற்றும் ஒரு சிறந்த நினைவாற்றல் போன்ற குணங்கள் அவளுடைய உறுதியான மற்ற குணநலன்களாகும் என்று கூறலாம்.  ஒரு அறிவார்ந்த சிந்தனையாளி என்பதால், அவள் மற்றவர்களின் தகராறுகளை சுலபமாக தீர்த்து நிலைநிறுத்த ஒரு நல்ல துணையாக இருப்பாள். அவளை மிகவும் சுறுசுறுப்பாகவும் மற்றும் சுகாதார விழிப்புணர்வுடனும், கவர்ச்சிமிக்கவளாகவும், நகைச்சுவை தன்மையாகவும், இயல்பானவளாகவும், நேர்மையானவளாகவும், ஒழுங்கமைக்கப்பட்டவளாகவும், அர்ப்பணிக்கப்பட்டவளாகவும், உதவிசெய்பவளாகவும், மற்றும் நற்பண்புகள் கொண்டவளாகவும் விவரிக்க முடியும் இருப்பினும், அவளது உறுமும் சுபாவத்திற்கு கவலை ஒரு காரணமாக இருக்கலாம்.</p><p><b>கன்னி ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்:</b><br/>ஆஷா போஸ்லே, ராகேஷ் ரோஷன், அகதா கிறிஸ்டி, ராணி எலிசபெத், ஜோசப் கென்னடி</p><p><b>கன்னி ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br/><b>சாதகமானவை:</b> கண்ணியமான, உன்னிப்பாக, நம்பகமான, நடைமுறை விடாமுயற்சி <br/><b>பாதகமானவை:</b> கவலைப்படாத, அளவிற்கு மீறி குற்றம் காண்கிற, கடுமையான, பழமைவாதம்</p><p><b> கன்னி ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்:: </b> ரிஷபம், மகரம்</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் சுருக்கமான விவரம்)<br/>துலா (Libra) ராசியில் பிறந்த பெண் அவளின் பிறவியின் அடிப்படையின் படி முழு விசித்திரமான உணர்வுகளை உடையவள். அவள் தனது நாயகனிடம் சந்தோஷம், விருப்பம் மற்றும் மரியாதையை பகிர்ந்து கொள்வாள். அவள் மகிழ்ச்சியுடன் தகுதியான ஒரு நபரை அவளை ஆதிக்கம் செலுத்த அனுமதிப்பாள். அவள் இயற்கையிலேயே சந்தேகத்திற்கிடமற்றவள் மற்றும் தனிப்பட்ட மக்களின் அந்தரங்க செயல்களில் ஊடுருவ விரும்பமாட்டாள். அவள் அவளது சுதந்திரத்தை மிகவும் நேசிக்கிறாள் மற்றும் மற்றவர்களுக்கும் அந்த இடத்தை அளிக்கிறாள். அவள் குறிப்பாக விலையுயர்ந்த பொருட்களான வாசனை திரவியங்கள், புதுப்பாணியான ஆடைகள் மற்றும் பழங்காலத்திய இசை ஆகியவற்றின் மீது அதிக ஈர்ப்பு இருக்கலாம். உங்கள் தர்க்கம் அவளை நம்பவைக்க முடியும் என்றால் அவள் தோல்வியை ஏற்றுக் கொள்ள தயாராக இருப்பாள். அவள் மிகச் சிறந்த பேச்சாளராகவும் மிகவும் அறிவார்ந்தவளாகவும்,  இருப்பாள் மற்றும் அவள் அறிவார்ந்த உரையாடலை நேசிப்பாள். அவள் கன்ன குழியுடன் புன்னகை மற்றும் மகிழ்வளிக்கும் நடத்தையானது லட்சக்கணக்கான வெப்ப அளவைக் கூட கவர முடியும். அவள் மக்களுடன் பழகுவதை நேசிக்கிறார் மற்றும் தேவையானால் ஒரு பெரிய நண்பராகிவிடுவாள் எனினும் அவள் ஒரு முடிவை எடுக்க நிறைய நேரம் எடுக்கும். ஏதேனும் சமயங்களில் கொள்கைகளின் மீது அவள் அதிக  நேரம் செயலாற்றினாலும் மற்றும் அது நியாயமானதாக இருந்தாலும் அவரைச் சுற்றியுள்ள  மக்களுக்கு சங்கடமான நிலையை உண்டாக்கும்.</p><p><b>துலா ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்:</b><br />கேட் வின்ஸ்லெட், ரேகா, கரீனா கபூர், லதா மங்கேஷ்கர், அமிதா பச்சன், மகாத்மா காந்தி </p><p><b>துலா ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்:</b><br/><b>சாதகமானவை:  </b>  அரசாங்க , திடமான காதல், கவர்ச்சிமிக்க, எதிலும் அமைதியானவராக, சிறந்தவராக<br/><b>பாதகமானவை: </b>முடிவற்ற நிலை, மாற்றத்தை விரும்பும், மற்றும் ஏமாறக்கூடிய தன்மை</p><p><b>துலா ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>மேஷம், கடகம், சிம்மம், துலாம், தனுசு, மகரம் ஆகியன</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் சுருக்கமான விவரம்). <br/> விருச்சிக(Scorpio) ராசியில் பிறந்த பெண், உணர்ச்சி, மிகவும் இரகசியமான தன்மை, தனிமை மற்றும் சக்தி வாய்ந்தவள். அவளுக்கு கிடைத்திருக்கும்  உள்ளுணர்வு உணர்ச்சி மற்றும் சுய நம்பிக்கை ஆளுமையானது அவளை எதிர்க்க முடியாத நிலையை செய்கிறது. அவள் மறைக்கப்படாத இரகசியங்களை நேசிக்கிறார் மற்றும் அவளுடைய ரகசியங்களை வெளிப்படுத்தாமல் ஒரு எளிதான கலை மூலம் உங்களின் ஆழ்ந்த இரகசியங்களை வெளி வருமாறு செய்கிறாள். எண்ணற்ற கவர்ச்சியானவள் சிடுசிடுப்பானவள், சாந்த குணம் மற்றும் கம்பீரமான தோற்றம் உடையவள், அவள்  மேலோட்டமான மற்றும் ஆழமற்ற செயல்கள் எதிலும் ஆர்வமற்றே காணப்படுவாள். அவள் ஒரு தேர்ச்சி பெற்ற தொடர்பாளர் மற்றும்  சூழ்ச்சித் திறமையால் மற்றவர்களுடன் தன்னை தொடர்புபடுத்திக் கொள்ள முடியும், இது நண்பர்கள் மற்றும் குடும்பத்தினர் மத்தியில் அவளை பாராட்டிற்குரியவளாகச் செய்கிறது. சில சமயங்களில் தனது பயங்கரமான தீவிர ஆர்வத்துடன்,  தான் உண்மையிலேயே ஒரு உறவு கோருவது போல தோன்றச் செய்யலாம்; எனினும் அவர் காதலில் அடிமைத்தனத்துடன் இருக்க முடியும். அவளது விலங்குத்தன்மையுடைய ஆற்றல் மூலம் வசியப்படுத்தி மற்றும் நம்பிக்கையூட்டி அதை அடைய விடாது ஏங்க வைக்கும் சமயங்களில் தனது நிதானமானது வெடிக்கக்கூடியதாக இருக்கலாம். அவளது நுட்பமான தன்மை இரண்டு முனை உடைய வாள் போல செயல்படலாம்;  ஆகவே அவள் அதை உணர்வதும்  மற்றும்  காயம் அடைவதும்  மிகவும் இயற்கையானது.</p><p><b>விருச்சிக ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்:</b><br/>ஐஸ்வர்யா ராய், இந்திரா காந்தி, ஜவஹர் லால் நேரு, ஷாருக் கான், பில் கேட்ஸ், பிரையன் ஆடம்ஸ், டெமி மூர்</p><p><b>விருச்சிக ராசியில் பிறந்தவர்களின் பொதுவாக காணப்படும் சிறப்பியல்புகள்:</b><br/><b>சாதகமானவை:</b> உணர்ச்சிவயப்பட்ட, தீவிரமான, கௌரமுள்ள, உணர்திறன், உள்ளுணர்வு, சிற்றின்ப சம்பந்தமான, விசித்திரமான, அதீத ஆர்வமுடைய<br/><b>பாதகமானவை:</b> பொறாமை, கோபம் மிகுந்திருக்கிற, கட்டாடாயப்படுத்தும் ஆற்றல் உடைய, மிகைவிருப்புடைய, இரகசியமாக மற்றும் பிடிவாதமாக</p><p><b>விருச்சிக ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்:</b>கடகம் மற்றும் மீனம்.</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் சுருக்கமான விவரம்)<br/>தனுசு (Sagittarius) ராசியில் பிறந்த பெண்ணின் திறமை இல்லாத, சுவையற்ற குணாதிசயங்கள் மற்றும் அவளது மேம்போக்கான அறிக்கைகளால் நீங்கள் அவளை விட்டு விலகி ஓடி விடலாம் போன்ற உணர்வுடன் இருக்கலாம். அவள் இனிமையான, நட்புமுறையுடன், வெளிப்படையாக பேசுவதுடன் சிறந்த பேச்சாளராகவும் விளங்குகிறாள். அவள் கடைப்பிடிக்கும் நேர்மையான குணங்கள் அவளை நடைமுறை உலகில் வாழச் செய்கிறது. அவள் மிகவும் நன்நம்பிக்கை உள்ளவள், ஆனால் பகுத்தறிவுக்கு ஒவ்வாதவள் அல்ல. அவள், முழு சூழ்நிலையையும் உண்மையான நிலையின் மூலம் தீர்மானம் செய்து, அதன் சாத்தியமான முடிவுகளை ஆராய்ந்து, விஷயங்கள் நல்லதுக்காக மாற்றமடையும் என்று இன்னும் நம்புகிறாள். பொதுவாக, அவள் மிகவும் அமைதியானவள் மற்றும் நன்றாக உருவாக்கப்பட்டவள் எனினும், நீங்கள் அவளிடம் முரட்டுத்தனமாகவோ அல்லது அவளை புண்படுத்தும்படியோ நடக்கும்போது, அவள் அதைத் தங்களுக்கு அதேபோல் திருப்பி கொடுப்பாள். அவள் சுதந்திரமானவள் மற்றும் அவளது சுதந்திரத்தை விரும்புகிறாள். அவள் குடும்பத்துடன் இணைக்கப்பட்டுள்ளவள், ஆனால் அதிகமான அளவில் அல்ல. அவளது மறைப்பின்மை அதிக அளவில் அவளைத் தாக்கக்கூடும் சமயங்களில் உறவு முடிவுக்குக் கூட காரணமாகி விடும். அவளது நேர்மை மற்றும் நயமற்ற தன்மைகளினால் மேலும் எதிர்மறை கருத்துக்களை சேர்க்கும் என்றாலும் அவள் ஒருபோதும் பாசாங்குக்காரியாக இருக்க மாட்டாள்.  மனதளவில் அவள் பாதிக்கப்படக்கூடியவள் மற்றும் பாதுகாப்பற்ற நிலையுடன் இருப்பவள்.</p><p><b>தனுசு ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br />தர்மேந்திரா, ஷத்ருக்கன் சின்ஹா, திலீப் குமார், வின்ஸ்டன் சர்ச்சில்</p><p><b>தனுசு ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்: </b><br /><b>சாதகமானவை: </b>நன்னம்பிக்கையுடைய, மகிழ்ச்சியுடைய, சுய மனம், நேர்மையுடைய, தத்துவரீதியான<br/><b>பாதகமானவை: </b>கவனக்குறைவாக, கண்மூடித்தனமான நம்பிக்கை, திறமை அற்ற, அமைதியற்ற<p><b>தனுசு ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்: </b>கடகம் மற்றும் மீனம்</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>மகர (Capricorn) ராசியில் பிறந்த பெண் ஒரு சாதாரணமானவள் ஆனல் தொடக்கத்தில் அணுகுமுறையானது மிகவும் எளிதாக இல்லாமல் இருக்கலாம்.  அவள் நடத்தை மிகவும் எச்சரிக்கையாக இருக்கும். எந்த ஒருசிலருடன் மட்டும் தனது தோழமையை பகிர்ந்து கொள்வாளோ அவர்கள் அவளுக்கு நெருங்கிய நண்பர்களாக இருக்க முடியும். அவள் பேச்சில் சிறந்த விருப்பமுடையவளாகத் தோன்றவில்லையெனில் தேவையானால் மட்டுமே பேச முற்படுவாள். உண்மையில் ஒரு பக்கம் நகைச்சுவையாகவும் மற்றொறு பக்கம் அமைதியுடனும்  காணப்படலாம். அவள் மனது அடிக்கடி ஊசலாடுகிறது மற்றும் அவள் ஒருவரைப் பாதுகாப்பவனாக நினைக்கும் போது அவளது காதல் மற்றும் வெறி உணர்ச்சி, போன்ற அனைத்தையும் வெளிக்காட்டுகிறாள். அவள் தினசரி செலவுகள் மீதான தனது அணுகுமுறையை மிகவும் சிக்கனமாகவும், தன் பணத்தை பற்றி முற்றிலும் எச்சரிக்கையுடனும், மற்றும் முரட்டு பிடிவாதம் கொண்டவளாகவும் இருக்கிறாள்.தொழிலில் நோக்கம் இருந்தாலும் அவள் தனது குடும்பம் மீது மிகுந்த அக்கறை காட்டுபவளாகவும் மற்றும் ஒரு சிறந்த இல்லத்தரசியாகவும்  விளங்குவாள்.</p><p><b>மகர ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்:</b><br/>அனு அகர்வால், ரீனா ராய், சல்மான் கான், அனில் கபூர், ஜாவேத் அக்தர், நானா படேகர்</p><p><b>மகர ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்:</b><br/><b>சாதகமானவை:</b> நடைமுறை, விவேகமுடைய, லட்சிய, பொறுமையுள்ள, ஜாக்கிரதையான<br/><b>பாதகமானவை:</b>அவநம்பிக்கை, கண் மூடித்தனமாக விதியை நம்புகின்ற, கஞ்சத்தனமாக, பொறாமை</p><p><b>மகர ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்:</b>ரிஷபம், கன்னி</p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>கும்ப (Aquarius)ராசியில் பிறந்த பெண் சுதந்திரத்தை விரும்புபவள், மிகவும் தனித்தன்மையுடையவள்,புத்திசாலி மற்றும் தெளிவற்ற மன நிலையில் உள்ளவள். அவளுடைய நடவடிக்கை மற்றவர்களுக்கு முன்கணிக்க முடியாத அளவில் பெரும்பாலும் ஒரு ரகசியமிக்கதாக  அமைந்திருக்கும். ஒரு சாதாரண நபர் புரிந்து கொண்டதிற்கு அப்பாற்பட்ட வழிகளில் அவள் தான் வாழும் வாழ்க்கையை பின்பற்றுவதாக இருக்கலாம். அவள் தன் இஷ்டப்படி வாழும் வாழ்க்கைமுறையானது பிறர் குறுக்கீடு அல்லாத வகையில் இருக்கும். அவள் அணுகுமுறை மனிதாபிமானதாக இருக்கும் ஆனால் அவளது அந்தரங்க உறவுகள் என்று வரும்போது அவள் இன்னும் மிகவும் தள்ளி மற்றும் மற்றவருடன் பிரிந்து காணப்பட முடியும். அவள் கொஞ்சம் நட்பார்வமில்லாத மற்றும் உணர்வற்றதாகவும் நீங்கள் அவளை நினைக்கலாம் ஆனால் உண்மை அது அல்ல. நீங்கள் அவளுடைய சொந்த உலகில் அவளை பார்க்கலாம். பெரும்பாலும் நினைவற்ற நிலையில் தனியே இருப்பதாக தோன்றினாலும், எந்த நிலையிலும் அவள் கவனக்குறைவுடன்  இருக்க மாட்டாள். ஒரு விஷயம் அல்லது ஒரு நபர் பற்றிய விவரங்களை மற்றவர்கள் தவறவிடலாம் ஆனால், சமயங்களில் அவளால் அதைப்பற்றி குறிப்பான சிறிய விவரங்களைக் கூட தெளிவாகச் சொல்ல முடியும். அவளுடைய சுதந்திர விரும்பத்தினால் மனம் பித்துபிடித்தது போல சில விஷயங்களைச் செய்ய முற்படுவாள் எனவே அவளை சந்தோஷமாக வைத்துக் கொள்ள நீங்கள் அவளுக்கு மகத்தான இடத்தை கொடுக்க தேவைப்படும்.</p><p><b>கும்ப ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்</b><br/> ஊர்மிளா மடோன்கர், ப்ரீத்தி ஜிந்தா, வஹீதா ரஹ்மான், சுபாஷ் கைய்</p><p><b>கும்ப ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்:</b><br/><b> சாதகமானவை:</b> நட்பு, மனிதாபிமான, அசல், கண்டுபிடிப்பு, சுதந்திரமான, அறிவார்ந்த<br/><b> பாதகமானவை: </b>வக்கிரமமான, உணர்ச்சிவயப்படாத,  பிரிக்கப்பட்ட, முன்னறிந்து கூறமுடியாத,</p><p><b>கும்ப ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்:</b> ஜெமினி மற்றும் துலாம் </p>#<p><b>சுருக்கமான ஜாதக வடிவம்:</b>(பிறந்த நேர  அடிப்படையில் ஒரு சுருக்கமான விவரம்)<br/>மீன (Pisces) ராசியில் பிறந்த பெண் ஆழமான மற்றும் மர்மமுடையவளாதலால் அவளைப் புரிந்து கொள்ள ஒருவர் கடினமாக செயலாற்ற வேண்டியிருக்கும். அவள் மகிழ்ச்சி நிரம்பும் பெண்மை, நம்பமுடியாத அழகு, மற்றும் மிகவும் மென்மையான பெண்போன்று இருப்பாள். அவள் மிகவும் உணர்ச்சிமிக்க மற்றும் அடிக்கடி தனது சொந்த உலகில் சஞ்சரிப்பாள் ஆகவே ஒரு வகையில் கனவு காண்பவராவாள். மக்கள் அவளுடன் சேர்ந்திருப்பது வசதியாக இருக்கும் என நினைப்பார்கள் ஏனெனில் அவளால் மனதார எந்த சூழ்நிலையிலும் அனுசரித்து இருக்க முடியும். தன்மேல்  அன்பு செலுத்தவும் பாதுகாக்கவும் மற்றவர் தேவைப்படுவதால் அவள் ஒருபோதும் கடுமையாக இருப்பதில்லை. சில நேரங்களில் அவளும் கூட மிகவும் உணர்ச்சிவசப்படகூடியவள் . எனவே அவளிடம் யாரவது தொடர்ந்து அதிக செல்லமாக நடந்துகொள்ள வேண்டியிருக்கும். ஓரளவு ஏமாற்றக்கூடிய தன்மை மிக்க அவள் யாருடனும் திறந்த மனதுடன் தாராளமாய் பேசுவதில்லை  இதனால் சமயங்களில் இது எரிச்சலூட்டும் செயலாக அமைந்து விட முடியும். உண்மையிலேயே திறமை மிக்கவள் என்றாலும் அவளிடம் எந்தவித இலட்சியமும் இல்லாததால் எதையும் முன்னறிந்து கூறமுடியாத மனநிலை மாற்றத்தைப் பெற்றவள்.</p><p><b>மீன ராசியில் பிறந்த சில புகழ்பெற்ற மக்கள்: </b><br/>ப்ரீத்தி ஜிந்தா, செல்சியா கிளிண்டன், ஆல்பர்ட் ஐன்ஸ்டீன், மைக்கேலேஞ்சலோ</p><p><b>மீன ராசி மக்களிடம் பொதுவாக காணப்படும் சிறப்பியல்புகள்:</b><br/><b>சாதகமானவை: </b> கற்பனை, உணர்ச்சி, இறக்கம், தன்னலமற்ற அனுதாபம்<br/><b>பாதகமானவை: </b>தப்பித்து செல்லும் மனப்பாங்கு, குறிக்கோள் நிலையை எய்த விரும்புகிற, இரகசியமான,தள்ளாட்டம் </p><p><b>மீன ராசியுடன் பொருந்தக்கூடிய பிற சந்திர ராசிகள்:</b> ரிஷபம், ஜெமினி, கன்னி, தனுசு,மகரம், மீனம்</p>
