
	RASI_ACCORDING_TO_VEDIC_ASTROLOGY_HINDI	= 
	RASI_ACCORDING_TO_VEDIC_ASTROLOGY			= ராசி வேத ஜோதிடப்படி
	RASI_PREDICTION_1							= <p> நீங்கள் சிவப்பு அல்லது மஞ்சள் நிற பொருட்கள் வியாபாரம் செய்து அதன் மூலம் இலாபம் அடைவீர்கள்.  இயல்பாக நீங்கள் நகைச்சுவையான மற்றும் சிவாப்பான தொனியுடனும் பிரகாசமான முகத்துடன் காணப்படுவீர்கள். வாரத்தில் உங்கள் அதிர்ஷ்டமான நாட்கள் புதன் , திங்கள் மற்றும் செவ்வாயாக அமைந்திருக்கும். நீங்கள் மாடுகள், எருமைகள் மற்றும் பிற விலங்குகளின் மீது கவனம் செலுத்துவீர்கள்.  இயல்பாக நீங்கள் கொஞ்சம் சோம்பேறித்தனத்துடன் காணப்படுவீர்கள் ஆனால் எப்போதும் மற்ற மக்களின் வேலையைச் செய்ய தயாராக இருப்பீர்கள். தங்களின் பெரும்பாலான நண்பர்கள் கன்னி , கும்பம் மற்றும் மிதுன ராசியைச் சார்ந்தவர்களாக இருப்பார்கள். நீங்கள் வாழ்வில் முன்னேற்றமடைய பேராவல் மிக்கவர் மற்றும் முற்போக்கான கொள்கையை உடையவர். பின்வரும் வருடங்களாகிய 20 , 26 , 33 வயதுகளில் காய்ச்சலால் ஏற்படும் பயம் மற்றும் ஆயுதங்களால் விபத்துக்குள்ளாவீர்கள். தங்களின் 45 , 50 , 55 வயதுகளில் குறுகிய வாழ்க்கையினால் திடீர் மரணம் சம்பவிக்கமோ என்கிற காரணத்தினால் ஏற்படும் பயம் தங்களை ஆதிக்கம் செலுத்தும். </p> <b style='padding-left:60%;'>-ரொமுக் கண்ணோட்டம்</b> <p> தங்களின் 13 , 1 மற்றும் 7 வயதுகளில், நீங்கள் காய்ச்சலால் பாதிக்கப்படுவீர்கள்.  அதேசமயம் 3, 12, 5 மற்றும் 16 வயதுகளில் அரசாங்கத்தின் மூலம் பயத்திற்கு ஆளாவீர்கள்.  உங்கள் 32, 8 வயதுகளில் திடீர் மரணம் சம்பவிக்கமோ என்கிற காரணம் தங்களைஆதிக்கம் செலுத்தும். தங்களின் 25ம் ஆண்டு நீங்கள் குழந்தை இழப்பினால் பாதிக்கப்பட வாய்ப்பு பெற்றுள்ளீர்கள். வாழ்க்கையின் 4 வது மற்றும் 8 வது ஆண்டுகளில் வாகனங்களினால் பாதிப்பு மற்றும் 3,12, 24 வது ஆண்டுகளில் நச்சுப் பொருட்களினாலோ அல்லது தண்ணீரில் மூழ்குவதினாலோ பாதிக்கப்படுவோமோ என்கிற பயம் தங்களை ஆதிக்கம் செலுத்தும். </p> <b style='padding-left:84%'>-ஜன்மப்ரதீப்</b>
	RASI_PREDICTION_2							= <p> நீங்கள் பருமனான உடலுடன் நீண்ட கைகளைப் பெற்றிருப்பீர்கள்.  முக்கியமாக மூட்டுகளில் கட்டிகள் மற்றும் இருமல் பிரச்சினைகள் ஆகியவைகளுடன் இருக்க நேரிடும். வாரத்தில் உங்கள் அதிர்ஷ்டமான நாட்கள் சனி, புதன் , மற்றும் வெள்ளியாக அமைந்திருக்கும். ஞாயிறு தங்களின் ஒரு துரதிர்ஷ்டமான நாளாகும். கசப்பு மற்றும் புளிப்பு சுவை தங்களுக்கு பொருத்தமாக இருக்கும், பால் பொருட்கள் அடங்கிய உணவுகளின் மீது அதிக விருப்பம் உண்டாகும் . உங்களுடன் வர்த்தகத்தில் பங்குபெருபவர்கள் நடுத்தர வர்க்கத்தைச் சார்ந்தவர்களாக இருப்பார்கள் இதனால் ஆதாயமற்ற நண்பர்கள் பாதிக்கபட ஒரு வாய்ப்பாக அமைந்து விடும். நீங்கள் தோட்டக்கலை மற்றும் வேளாண்மை தொழில் செய்வதின் மூலம் பயனடைவீர்கள். பெரும்பாலும் நீங்கள் ஒரு பெரிய உயரத்தில் இருந்து கீழே விழ அஞ்சுவீர்கள் மாறாக தங்களின் போட்டியாளருடன் சேர்ந்து ஓய்வாக இருந்தால் கூட மிகவும் சந்தோஷமாக இருப்பீர்கள். நீங்கள் இனிமையான காதல் கொண்டவர் , நடுத்தர உயரம் உடையவர், ஒப்பனை ஆர்வம் மற்றும் அலங்காரத்தில் அதிக ¿¡ð¼õ காட்டுபவர். உங்கள் வயிறு மற்றும் கழுத்தில் ஏற்படும் உடல்நல பிரச்சினைகள் முக்கியமாக உங்களுக்கு கவலையை உண்டாக்கும். </p> <p> ஆண்டுகள் 2 , 4 , 5 , 7 மற்றும் 18 ஆனது கடுந்துன்பத்தை கொண்டு வரும். அதேசமயம் ஆண்டுகள் 32 , 44 , 40 ஆனது நோய் மற்றும் பிற இழப்புகளை கொண்டு வந்து சேர்க்கும். பெண்மீது விருப்பமுடைய தங்களுக்கு சூடான உணவு பிடிக்கும் மற்றும் இருமல் மற்றும் சளி தொல்லைகளால் பாதிக்கப்படுவீர்கள். நீங்கள் பழைய மற்றும் பழங்கால பொருட்களை சேகரிப்பதில் மனவிருப்பம் கொண்டவராய் இருப்பீர்கள்.</p> <b style='padding-left:60%;'>-ரொமுக் கண்ணோட்டம்</b> <p>மார்பகம், கழுத்து மற்றும் தாடை சம்பந்தமான வியாதிகள் தங்களுக்கு கடும் துன்பத்தைக் கொடுக்கும். மூன்றாவது ஆண்டில் தீயினால் பயம் இருக்கும்.  கை மற்றும் கால்களில் ஏற்படும்  காயங்கள், மற்றும் 19 மற்றும் 32 ம் ஆண்டுகளில் திடீர் மரணம் ஏற்பட வாய்ப்புகள் அதிகம். தங்களுக்கு இரண்டாவது திருமணத்திற்கான ஒரு வாய்ப்பு மிகவும் வலுவான ¿¢¨ÄÂ¢ø அமையப் பெற்றிருக்கிறது. பொதுவாக தங்களுக்கு ஒரு சில உடன்பிறப்புகளுக்கான வாய்ப்புகள் மட்டுமே இருக்கும். மாதவ் ¿ÅÁ¢யுடன் கூடிய வெள்ளிக்கிழமை அல்லது ரோகிணி நட்சத்திரத்தன்று மரணத்தைத் தழுவ ஒரு பெரிய வாய்ப்பாக அமைந்துள்ளது. </p> -Yuvneshwar <p>ஆண்டுகள் 2 , 5 , 9 ல் நீங்கள் கற்கள் மற்றும் பெண்களின் மீது கவனமாக இருக்க அவசியப்படுகிறது. இத்துடன் உங்களின் தனிப்பட்ட அந்தரங்க பகுதிகளில் நோய்களினால் பாதிப்பை உண்டாக்கும். தாங்கள் பெரும் பசியை கொண்டவர்களாக இருப்பீர்கள் மற்றும் திறமை வாய்ந்தவராகவும், பாதிப்புக்கு உட்படுபவராகவும், இரக்க குணம் மிக்கவராகவும், பணம் படைத்தவராகவும் காணப்படுவீர்கள். 15வது மற்றும் 6வது ஆண்டுகளில் நீங்கள் தண்ணீர் , கொம்புள்ள விலங்குகள் , விஷம் , மலை , கரடி அல்லது பேய்கள் ஆகியவைகளினால் பாதிக்கப்பட வாய்ப்பு உள்ளது. ஆண்டுகள் 10 , 25 மற்றும் 45ல் தீயினால் பயம், புறக்கணிக்கப்பட்ட வியாதிகள் மற்றும் உணர்ச்சிக் கட்டுப்பாடுகளால் ஏற்படும் பயத்தினால் பாதிக்கப்பட வாய்ப்பு உள்ளது. </p> <b style='padding-left:84%'>-ஜன்மப்ரதீப்</b>
	RASI_PREDICTION_3							= <p> வலியினாலும் அழுத்தத்தினாலும் அவதிப்படுவீர்கள். வாரத்தில் புதன், வெள்ளி மற்றும் சனிக்கிழமைகள் உங்களுக்கு சாதகமான நாட்களாகும். நீங்கள் ஒரு தொழில்நுட்பவியலாளர், அரசுப் பணியாளர் அல்லது எழுத்தாளராக இருப்பீர்கள். புளிப்பு, கசப்பு சுவைகள்  கொண்ட உணவை விரும்புவீர்கள். கருப்பு நிறம் அதிர்ஷ்டத்தைக் கொண்டுவருவதாகவும் வெள்ளை நிறம் உங்களுக்கு துரதிர்ஷ்டமானதாகவும் இருக்கும். தூய்மையான சுத்தமான தோற்றம் தருபவராகவும் எளிதில் கோபப் படுபவராகவும் இருப்பீர்கள். உங்களுக்குச் சொந்தமான வாகனம் கிடைப்பதோடு மற்றவர்களின் பணத்தை உங்கள் பைக்குக் கொண்டு வந்து சேர்க்கும் வித்தை அறிந்திருப்பீர்கள். பல பெண்கள் உங்களை விரும்புவார்கள். குறைந்த பணமே உங்களிடம் சேரும்.  வயிறு தொடர்பான பிரச்சினைகள் இருக்கும். 5, 12, 16, 27 ஆகிய வயதுகளில் நிறைய துன்பங்கள் வந்து சேரும். வாழ்க்கையின் 50வது வருடத்தில் திடீர் இறப்பு ஏற்படும் வாய்ப்பு உள்ளது.  </p> <b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b> <p> உங்கள் எதிர்கால வாழ்க்கையில் ஒரு சந்தோஷமான நடுத்தர வாழ்க்கை நடத்துவீர்கள். 16, 18 வயதுகளில் தண்ணீர் குறித்த அச்சம் ஏற்படும். 5வது வயதில் காது தொடர்பான பிரசினைகளும் 24வது வருடத்தில் வலி குறித்த பயமும் இருக்கும். 38வது வயதில் உங்கள் ஆயுள் ஸ்தானத்தில் ஆபத்து உள்ளது. நீண்ட வாழ்க்கைக்குப் பிறகு 80வது வயதில் விசாகம், ஹஸ்த நட்சத்திரத்தில் புதன் அல்லது வெள்ளிக் கிழமையில் உங்கள் ஆத்மா உடலை விட்டுப் பிரியும். 3, 6, 10 வயதுகளில் மூன்று விதமான ஏற்றத்தாழ்வுகளினால் பாதிக்கப்பட்டு உப்பு மற்றும் பேய் குறித்த பயத்துடன் வாழ்வீர்கள். 12, 20 வயதுகளில் குதிரை, பாம்பு, யானை, மலை மற்றும் தண்ணீர் ஆகியவற்றின் மூலம் துன்பம் ஏற்படும். நீங்கள் நகைச்சுவையும், நல்ல பணவசதியும்,மெலிந்த தோற்றமும் கொண்டவராக இருப்பீர்கள். 8வது வயதில் இருதயம் தொடர்பான பிரச்சினைகள் வரும்.</p> <b style='padding-left:84%'>-ஜன்ம ப்ரதீபம்</b>
	RASI_PREDICTION_4							= <p> ஞாயிறு, திங்கள், செவ்வாய் ஆகியவை அதிர்ஷ்ட தினங்கள்.  ஆனால் புதன்கிழமை உங்களுக்கு உகந்த நாள் அல்ல.  இருமல் தொந்தரவுகள் இருக்கும்.  சிவந்த நிறம் உடையவராக இருப்பீர்கள்.  உங்கள் ஆயுள் ஸ்தானத்தில் மூன்று ஆபத்துக்கள் இருக்கின்றன. 2, 8, 21, மற்றும் 29வது வயதில் நோய்வாய்ப்படும் வாய்ப்பு உள்ளது.  மெலிந்து வளைந்த கால்கள் கொண்டவராக இருப்பீர்கள். இரண்டு மனைவிகள் ஏற்பட வாய்ப்பு உள்ளது. நீர் தொடர்பான வியாதிகள் வரக்கூடும். இடுப்பு, தலை, கால்கள், கண்பார்வை ஆகியவற்றில் பாதிப்பு ஏற்பட வாய்ப்பு உள்ளது. சமுதாயத்தில் கீழ்மட்டத்தில் உள்ளவர்களிடம் அன்பு பாராட்டுவீர்கள். வெள்ளிக்கிழமை உங்களுக்கு ஏற்ற நாள் அல்ல. கருப்பு நிறத்தை விலக்க வேண்டும். சிவப்பு மற்றும் வெள்ளை நிறங்கள் அதிர்ஷ்டத்தைக் கொண்டுவரும். </p> <p> உங்களின் 8வது வயதில் மழை, நீர், காற்று ஆகியவை குறித்து பயப்படுவீர்கள். நறுமணப் பொருட்கள் உங்களுக்கு அதிர்ஷ்டம் தரும். உங்கள் சந்திர ராசி கடகம் அல்லது மகரமாக இருந்தால் நீங்கள் சங்கராந்தி நாளில் எதை வாங்கினாலும் அது இரட்டிப்பாக பெருகும். வாயுத் தொந்தரவுகள் இருக்கும். நஷ்டங்களைத் தாங்கி சமாளித்து வெளிவருவீர்கள்.  உங்களுக்கு 48 அல்லது 84வது வயதில் இறப்பு நேரும். </p> <b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி </b> <p> உங்கள் இளமைக் காலத்தில் வறுமையில் வாடினாலும் மத்திய வயதில் நல்ல நிலைமைக்குச் செல்வீர்கள். 3,7 வயதுகளில் காய்ச்சல் தொந்தரவு உண்டு. சந்திரன் எந்த ஆண்டுக்கான கடவுளாக வருகிறாரோ அந்த ஆண்டில் உங்களுக்கு நீர் தொடர்பான பயம் ஏற்படுவதோடு நறுமணப் பொருட்களின் மூலம் அதிர்ஷ்டமும் வந்து சேரும். மூன்றாவது வயதில் உங்கள் உடலின் இடது புறம் தீ தொடர்பான பாதிப்புக்கு உள்ளாக வாய்ப்பு உள்ளது. உடலில் மச்சங்கள் இருக்கும். தலை தொடர்பான பிரச்ச்சினைகள் உருவாகக் கூடும். மற்றபடி மகிழ்ச்சியான வாழ்க்கையாக இருக்கும். 32வது வயதில் உங்கள் ஆயுள் ஸ்தானத்தில் ஒரு ஆபத்து உள்ளது. 29வது வயதில் பாம்பு தொடர்பான பயம் ஏற்படக் கூடும். மகம் சுக்கிலத்திற்கு நெருக்கத்தில் அல்லது சுக்கிர நட்சத்திரம் உள்ள வெள்ளிக்கிழமையில் உங்கள் இறப்பு நேரும். <p> <b style='padding-left:90%;'>-யுவான் </b> <p> 4, 8, 12வது வயதுகளில் தலை, காதுகள் மற்றும் கண்களில் கட்டிகள் வரக்கூடும். மூன்று கிரகங்களின் ஏற்றத்தாழ்வுகள் நிலவும்.  16, மற்றும் 24வது வயதுகளில் பெண்கள், தண்ணீர், பேய்மலைகள் பற்றிய அச்சமும் அந்தரங்கக் பாகங்களில் வலியும் உண்டாகும். நீங்கள் விவசாயியாக இருந்தால் திறமையானவராக இருப்பீர்கள்.  ஆனாலும் பயந்த சுபாவம் உள்ளவராக இருப்பீர்கள். </p> <b style='padding-left:84%'>-ஜன்ம ப்ரதீபம் </b>
	RASI_PREDICTION_5							= <p> வார நாட்களில் உங்களுடைய அதிர்ஷ்ட தினங்கள் திங்கள், செவ்வாய் மற்றும் ஞாயிறு. சோர்வு மற்றும் அழுத்தத்தினால் பாதிக்கப்படுவீர்கள்.  உங்களுக்குக் குறைவான முடியே இருக்கும். யுத்தங்களில் அதிர்ஷ்டம் கிட்டும். உங்களுக்கு இரண்டு மனைவி கிடைக்கவும் அதில் ஒருவர் குழந்தை பெற இயலாதவராகவும் இருப்பார். இடுப்பு வலி, வயிற்று வலி, சிறிய இருதய நோய்கள் மற்றும் தலையில் காயம் ஆகியவை ஏற்படும். உயர்ந்த இடத்திலிருக்கும் சூரியன் நிறைய அதிர்ஷ்டத்தையும் தாழ்ந்த இடத்திலிருக்கும் சூரியன் பெண் இழப்பு, நீர் இழப்பு ஆகியவையும் ஏற்படுத்தும். நிலத்தினால் ஆதாயம் உண்டு. 4, 8ஆம் வருடங்கள் பயத்தை ஏற்படுத்தும். 28வது வயதில் அரசாங்கத் தரப்பின் மூலம் அச்சம் ஏற்படும். 30, 51வது வருடங்கள் வலிநிறைந்ததாக இருக்கும். சூரியனின் ஆட்சி நடக்கும் வருடங்கள் எல்லாமே வாழ்க்கையில் அச்சமூட்டும் வருடங்களாக இருக்கும். </p> <b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b> <p>வாழ்க்கையின் முதல் வருடத்தில் மஞ்சள் காமாலை குறித்த பயம் ஏற்படும். 5வது வருடத்தில் கையிலும் காலிலும் மிருகங்கள் மற்றும் நெருப்பினால் வலி ஏற்படும். 13வது வருடத்தில்  வயிற்றுப் போக்கு ஏற்படுவதுடன் 32வது வயதில் ஆயுள் ஸ்தானத்திலும் ஆபத்து உள்ளது. 7வது வயதில் காய்ச்சலும், 20வது வயதில் பாம்புகள் குறித்து அச்சமும், 21வது வயதில் நோய்களும் வரக்கூடும். போரில் ஆர்வம் கொண்டவராகவும் போர் வீரனாகவும் இருக்கும் அதே நேரத்தில் புகழ் பெற முடியாதவராகவும் இருப்பீர்கள். 28வது வயதில் உங்கள் அந்தரங்க உறுப்புகளில் வலி ஏற்படும். அஸ்வினி நட்சத்திரத்தில், இளவேனிற்கால சுக்கிலத்தின் 5வது திங்கட்கிழமையில் நீங்கள் இறப்பைச் சந்திப்பீர்கள். <p> <b style='padding-left:90%;'>-யுவான் </b><p>வாழ்க்கையின் 5வது, 10வது மற்றும் 15வது வருடங்களில் நீங்கள், ஆயுதங்கள், நெருப்பு, நீர், சுவாசம் ஆகியவற்றாலும் கண் மற்றும் இருதய வலிகளாலும் பாதிக்கப் படுவீர்கள். 20வது வயதில் பில்லி சூன்யம் மற்றும் காய்ச்சல் குறித்த அச்சமும் ஏற்படும். நீங்கள் தைரியமானவராகவும், அப்பட்டமான நேர்மையாளராகவும், பெண்களுக்கு எதிர்கருத்து உடையவராகவும் இருப்பீர்கள். உங்களுக்கு சில ஆண்பிள்ளைகள் இருப்பார்கள். </p> <b style='padding-left:84%'>-ஜன்ம ப்ரதீபம் </b>
	RASI_PREDICTION_6							= <p> அழகான கண்களும், நீளமான தலைமுடியும், சிவந்த நிறமும் கொண்டவராக இருப்பீர்கள். அழுத்தமுடையவராக இருப்பீர்கள். மற்றவர்களுக்காக வேலை செய்யும்போது சோம்பேறியாகவும் உங்களுக்காக வேலை செய்யும் போது சுறுசுறுப்பாகவும் இருப்பீர்கள். நீங்கள் புகழ் பெற்றவராக மாறுவீர்கள். </p><p>  எழுதுவது, விவசாயம் செய்வது, சமூக சேவைகள் செய்வது ஆகியவற்றின் மூலம் வசதியான வாழ்க்கை கிடைக்கும். திங்கட்கிழமைகள் அதிர்ஷ்டமானவையல்ல. உயர்ந்த பதவிகள் அழிவிற்கு வழிவகுக்கும்.  </p><p> உங்கள் முதல் மனைவி மிகவும் நல்லவராக இருப்பார். வாழ்க்கையில் 4வது, 9வது வயதில் கண் தொடர்பான பிரச்சினைகள் வரும். 28, 30, 47, 50வது வருடங்களில் வலிகள் ஏற்படும். 50, 60வது வயதில் உங்களுக்கு நிலம் மற்றும் வாகனம் மூலம் பணம் கிடைக்கும். வியாழன் உச்சத்தில் இருக்கும்போது உங்கள் நண்பர்களிடம் இருந்து மிகப் பெரிய ஆதாயங்கள் கிடைக்கும். 30வது வயதில் மூல வியாதி ஏற்படும். உங்கள் குடும்பம் புகழ் பெற்ற குடும்பமாக இருக்கும். </p><p>  5வது வருடத்தில் கண்வலியும், 3வது வயதில் நெருப்பு குறித்த அச்சமும், 21வது வயதில் மரங்கள் மற்றும் சுவர்கள் குறித்த அச்சமும் ஏற்படும். அந்தரங்கப் பகுதியிலும் கழுத்திலும் மச்சம் இருக்கும். 13வது வயதில் வாந்தியினாலும், 15வது வயதில் பாம்புகள் குறித்த அச்சத்தினாலும் 30வது வயதில் காடுகள், பாம்புகள், ஆயுதங்களால் மரணம் ஏற்படுமோ என்ற அச்சமும் ஏற்படும். </p><p>  6வது, 12வது மற்றும் 18வது  வருடங்களில் கற்கள், பெண்கள், ஆயுதங்கள் மற்றும் நெருப்பினால் உண்டாகும் வலிகள் குறித்து அச்சம் ஏற்படும். 24வது மற்றும் 36வது வருடங்களில் நெருப்பு மற்றும் திருட்டு பயமும் கண்கள் தொடர்பான பயமும் ஏற்படும். </p><p> உங்கள் ஆயுட்காலம் 90 வருடங்கள். நீங்கள் தீவிர மத நம்பிக்கை உள்ளவராகவும் திறமைசாலியாகவும் இருப்பீர்கள். அழகான கண்களும், உறுதியான நகங்களும், மாநிறம் கொண்டவராகவும், மற்றவர்களின் பணம் உங்களைத் தேடி வரக்கூடிய செல்வந்தராகவும் அதிகமாகப் பயணங்கள் மேற்கொல்பவராகவும் இருப்பீர்கள். </p> <b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b>
	RASI_PREDICTION_7							= <p> அழகான கண்களும், மாநிறமும், அடர்த்தியான தாடியும் கொண்டவராக இருப்பீர்கள்.  அரசுப் பணியை விரும்புவீர்கள். புதன், வெள்ளி மற்றும் சனிக்கிழமைகள் உங்களுக்கு அதிர்ஷ்ட தினங்கள். இருமலினால் அவதிப்படுவீர்கள். பொருட்கள் வாங்குவதிலும் விற்பதிலும் உங்களுக்குக் குறைவான ஆதாயமே கிடைக்கும். தலை மற்றும் முகப்பகுதியில் காயங்கள் ஏற்படக்கூடும். 8வது வயதில் உயரமான இடத்திலிருந்து விழக்கூடிய ஆபத்து உள்ளது. உங்களுக்கு இயற்கையிலேயே நல்ல குணமும் அதிக செல்வந்தராகவும் இருப்பீர்கள். ரகசியமாகப் பாவகாரியங்களில் ஈடுபடுபவராக இருப்பீர்கள். இரண்டு மனைவிகள் ஏற்பட வாய்ப்புண்டு. புனித யாத்திரைகள் மேற்கொள்பவராகவும் அதிகம் கற்றவராகவும் இருப்பீர்கள். சோம்பேறித்தனம் மிகுந்தவராகவும், உணவு தானியங்களை சேகரித்து வைப்பவராகவும் இளநரை உள்ளவராகவும் இருப்பீர்கள். சுக்கிரன் உச்சத்தில் இருக்கும்போது  புகழும் ஆதாயமும் சேரும். ஆற்றங்கரையோரம் அல்லது மலையடிவாரத்தில் வசிக்க விரும்புவீர்கள்.  </p> <p> 3, 8, 14, 24, 26, 47, 55, 63 ஆகிய வயதுகளில் உங்களுக்குச் சுவாசப் பிரச்சினை ஏற்படும். இருமல் தொந்தரவுகள் ஏற்படும். 84வது வயதிலும் நீங்கள் இளமையாக இருப்பீர்கள். 30வது வயதில் உங்கள் வாழ்க்கையில் மற்றொரு பெண் நுழைவார். 12வது வயதில் தண்ணீரிலும், 18வது வயதில் நெருப்பிலும், 20வது வயதில் பாம்புகள் மூலமும்  21வது வயதில் மரங்கள் அல்லது வாகனங்கள் மூலமும் ஆபத்தும் அச்சமும் ஏற்பட வாய்ப்புள்ளது. பொதுவாக நீங்கள் ஒரு வியாபாரியாகவும் மெலிந்த தோற்றமுடையவராகவும் செல்வந்தராகவும் இருப்பீர்கள். விசாக சுக்ல தசமியில் அஷ்லேஷ செவ்வாய்க் கிழமையில் உங்கள் மரணம் நிகழும். 7வது, 14வது மற்றும் 20வது வருடங்களில் கிருமிகள் குறித்த பயமும், கட்டப்படுவது போன்ற பயமும், பஞ்ச பூதங்களில் மூன்றைக் குறித்த பயமும் நிலவும். 28வது மற்றும் 42வது வயதில் யானைகள் மற்றும் கற்கள் குறித்த பயம் உருவாகும். 63வது வயதில் கை கால்களில் வலியினால் தொந்தரவு உண்டாகும். மற்றவர்களிடம் அதிகமான மரியாதை கிடைக்கும். உயர்வான பார்வையும், அகன்ற முகமும் உடையவராகவும் தாராளமாக மற்றவர்களுக்கு உதவிகள் செய்பவராகவும் வியாபாரியாகவும் இருப்பீர்கள். </p> <b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b>
	RASI_PREDICTION_8							= <p> அதிக சோர்வு உடையவராகவும், சிவந்த நிறமுடையவராகவும், பால் மற்றும் பால் பொருட்களை விரும்புபவர்களாகவும் இருப்பீர்கள். செவ்வாய், திங்கள் ஆகியவை உங்களுக்கு அதிர்ஷ்டமான நாட்கள். புதன்கிழமை உங்களுக்கு உகந்த தினமல்ல. </p> புளிப்பும் கசப்பும் நிறைந்த உணவுப் பொருட்கள் உங்களுக்கு துரதிர்ஷ்டத்தைக் கொண்டுவரும். உங்கள் கனவுகளை எப்போதும் நீங்கள் மறந்துவிடுவீர்கள்.  பலவீனமானவராக இருப்பீர்கள். அதிக மிருக வகை சொத்துக்கள் சேரும். மூதாதையர்கள் மற்றும் போர்கள் மூலம் உங்களுக்குப் பெரும் பணம் சேரும். உங்களுக்கு இயற்கையிலேயே உடல் துர்நாற்றம் வீசும் அமைப்பு உள்ளது. பழவகைகளினால் ஆதாயம் கிடைக்கும். தண்ணீர் குறித்த அச்சம் ஏற்படும். </p> <p> மிதுனம் மற்றும் துலாமின் ஆட்சி நடக்கும் மாதங்களில் துன்பங்கள் ஏற்படும். நீங்கள் விரைவான வளர்ச்சியும் விரைவான வீழ்ச்சியும் அடையக் கூடியவர். விஷயங்களை வேகமாக கிரகித்து ஏற்றுக்கொள்ளக் கூடியவர். </p> <p> தவறுகள் இழைக்கும் தன்மை உடையவராக இருப்பதால் உங்களை எதிரிகள் சூழ்ந்திருப்பார்கள். 7, 12, 14 மற்றும் 28வது வருடங்களில் சுவாசப் பிரச்சினைகள் ஏற்படும். 54வது வயதிலும் வியாழன் கிரகத்தின் வருடத்திலும் உங்களுக்குப் பெரிய இழப்புகள் ஏற்படும். </p> <p> சந்திரனின் ஆட்சி நடக்கும் சமயங்களில் உங்களுக்கு சிவப்பு மற்றும் மஞ்சள் நிறப் பொருட்களின் மூலம் லாபமும் பெண்களின் மூலம் சந்தோஷமும் கிடைக்கும். 75 வயதில் காய்ச்சலினால் அவதிப்படுவீர்கள். 25வது வயதில் திடீர் இறப்பு குறித்த அச்சம் ஏற்படும். 39வது வயதில் நெருப்பு குறித்த அச்சம் ஏற்படும். உங்களுக்கு நிறைவான குழந்தை பாக்கியம் உண்டு. </p> <p> சண்டை இழுப்பதை விரும்புவீர்கள். பெண்களிடமிருந்து கூச்சத்தினால் ஒதுங்கி இருப்பீர்கள். நண்பர்களுக்குத் துரோகம் செய்யத் தயங்கமாட்டீர்கள். சுக்ல தசமி புதன் கிழமையில் ஹஸ்த நட்சத்திரத்தில் உங்கள் இறப்பு நேரும். </p> <p> 8, 16, 24, 40வது வருடங்களில் திருடர்கள், நெருப்பு, விஷம், காய்ச்சல் ஆகியவற்றால் பாதிக்கப் படுவீர்கள். 32வது வயதில் நீங்கள் அடிமைத்தனம், காயங்கள், கிருமிகள் ஆகியவை குறித்து பயப்படுவீர்கள். 72வது வயதில் நீங்கள் நீரினால் பாதிக்கப் படுவீர்கள். குறிக்கோள் உடையவராகவும் மரியாதைக்குறியவராகவும் சோர்வற்றவராகவும் வட்ட மார்புடையவராகவும் இருப்பீர்கள். </p> <b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b>
	RASI_PREDICTION_9							= <p> சோர்வினால் பாதிக்கப்படக்கூடிய நீங்கள், நல்ல நிறத்துடனும், பழுப்பு நிற முடியுடனும், அழகான கண்களுடனும் இருப்பீர்கள். உங்கள் முழங்கால் அல்லது பின்னங்கால் வலியினால் அவதியுருவீர்கள். உங்கள் சொந்த மக்களுடனேயே நீங்கள் சண்டை பிடிப்பீர்கள். அளவுக்கதிகமாக உணவு உண்பீர்கள். மிருகங்களைக் கொல்லத் தயங்க மாட்டீர்கள். யாத்திரைகள் செல்ல விரும்புவீர்கள். 18, 24, 30, 40வது வருடத்தில் நீங்கள் வியாதியினால் பாதிக்கப்படுவீர்கள். வியாழன், செவ்வாய் மற்றும் திங்கள் கிழமைகள் சாதகமானவை. சனிக்கிழமை உங்களுக்கு உகந்ததல்ல. உங்களுக்கு மூன்று மனைவிகள் ஏற்பட வாய்ப்பு உள்ளது. மகம் தொடர்பான மாதம் உங்களுக்கு சாதகமானது. ஆனால் கடகம் தொடர்பான மாதம் உங்களுக்குச் சாதகமானதல்ல. </p> <p> வியாழன் உச்சத்தில் இருக்கும் போது உங்களுக்கு பாதிப்பு குறைவாக இருக்கும். உங்கள் தாயாருக்கு பாதிப்புகள் உண்டாகும். உங்களுக்கு பெருத்த பண நஷ்டம் ஏற்படும். எடுத்த காரியத்தை முடிப்பதில் உங்களுக்குப் பல சங்கடங்கள் உருவாகும். </p> <p> மூல நட்சத்திரமாக இருக்கும் பட்சத்தில் மனதில் பிரச்சினைகள் தோன்றும். சூரியன் கடகத்தில் இருக்கும் போது வலியும் தோல் வியாதியும் உண்டாகும். 7, 14, 16, 20, 25 மற்றும் 35வது வருடங்களில் காயமும் வலியும் உண்டாகும். </p> <p>சிவப்பு, மஞ்சள் மற்றும் வெள்ளை நிறப் பொருட்கள் அதிர்ஷ்டத்தைக் கொண்டுவரும். உங்களுடைய அதிக பட்ச வயது 64. முதல் வருடத்தில் வியாதிகளால் தொந்தரவும் 13வது வயதில் உயிருக்கு ஆபத்தான சூழ்நிலையும் வரக்கூடும். இளவயதில் நீங்கள் செல்வந்தராகவும், அளவான குழந்தைகளுடன் இருந்தாலும் குடும்ப உறுப்பினர்களின் நடத்தை, தோல் வியாதிகள், உணவுப் பழக்க வழக்கங்கள் மற்றும் உடல் நலக் குறைவினால் கவலையுடனும் இருப்பீர்கள். ஆஷாட கிருஷ்ண பஞ்சமியில் வெள்ளிக்கிழமையன்று உங்கள் இறப்பு நேரும். 9, 18, 27ஆம் வருடங்களில் சுவாசப் பிரச்சினைகளும், நெருப்பு பற்றிய பயமும், கொம்புள்ள மற்றும் முள் உள்ள மிருகங்களைப் பற்றிய அச்சமும் தோன்றும். </p><p> 36, 54வது வருடங்களில் மூல வியாதி அல்லது மூன்று விதமான ஏற்றத்தாழ்வுகளைச் சந்திப்பீர்கள். இரத்த சம்பந்தமான பிரச்சினைகளும், தலை தொடர்பான தொந்தரவுகளும் இருக்கும். நீங்கள் புத்திசாலியாகவும் யக்ஞங்களில் ஈடுபாடு உள்ளவராகவும் இருந்தாலும் வாழ்க்கை உங்களுக்குக் கடினமானதாகவே இருக்கும். . </p><b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b>
	RASI_PREDICTION_10							= <p> சோர்வினால் நீங்கள் பாதிக்கப்படுவீர்கள். தைரியமுள்ளவரான நீங்கள் கைகள் கால்கள் மற்றும் இடுப்பில் வலி வருவதால் அவதிப்படுவீர்கள். புதன், சனி மற்றும் வெள்ளிக் கிழமைகள் உங்களுக்கு அதிர்ஷ்டமானவை. ஆனால் ஞாயிற்றுக்கிழமை உங்களுக்கு உகந்ததல்ல. </p> <p>மக பத்ரபாதம் உள்ள மாதத்தில் சந்திரன் சிம்மத்தில் இருந்தால் உங்களுக்கு மிகப் பெரிய நஷ்டங்களும் பிரச்சினைகளும் உண்டாகும். 8, 16, 20, 30, 34வது வருடங்களில் உங்களுக்கு அதிக வலி உண்டாகும். </p> <p> 44 மற்றும் 59ஆம் வருடங்களில் மிகுந்த வலி இருக்கும். உங்களுக்கு அழகில்லாத இரண்டு மனைவிகள் இருப்பார்கள். சனியின் ஆட்சி நடக்கும் வருடங்களில் கருப்பு வண்ணப் பொருட்களினால் ஆதாயம் உண்டாகும். வாய்க்கு வந்ததைப் பேசினாலும் மற்றவர்களால் மதிக்கப் படுவீர்கள். ஏழாவது வருடத்தில் தண்ணீரினால் அச்சம் உண்டாகும். நீங்கள் புத்திசாலியானவர். 5, 21, 32 ஆகிய வயதுகளில் உங்களுக்குக் காய்ச்சல் உண்டாகும். 25வது வயதில் உங்கள் இடது பக்கத்தில் நெருப்பு தொடர்பான ஆபத்து ஏற்பட வாய்ப்புள்ளதால் எச்சரிக்கை தேவை. 35வது வயதில் பிற பெண்களின் மேல் ஆசையும் அதனால் எதிரிகளின் மூலம் ஆபத்தும் அச்சமும் ஏற்படும். 10, 20வது வருடங்களில் கண் பிரச்சினைகளும், தோல் தொந்தரவுகளும் ஏற்படும். தண்ணீர், பிராணிகள், ஆயுதங்கள் ஆகியவற்றின் மேல் அச்சம் ஏற்படும். 30வது வயதில் கண் பிரச்சினைகள் ஏற்படும். 40லிருந்து 60 வயது வரையிலான கால கட்டத்தில் குடல்வால் பிரச்சினைகள், பெண்களால் ஆபத்துக்கள் மற்றும் விஷம் ஆகியவற்றால் பாதிக்கப் படும் வாய்ப்பு உள்ளது. நீங்கள் ஒரு சூதாடியாக இருந்து பெரும் பணத்தை அழிப்பீர்கள். ஒரு கஞ்சனாக இருப்பதோடு உங்களுடைய சேர்க்கையும் மோசமானதாக இருக்கும். </p><b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b>
	RASI_PREDICTION_11							= <p> உங்களுக்கு வயிறு தொடர்பான பிரச்சினைகளும், வயிற்றில் கட்டிகளும், இருமல் மற்றும் சளி பிரச்சினைகளும் இருக்கும். வெள்ளி, புதன் மற்றும் ஞாயிறு ஆகிய கிழமைகள் உங்களுக்கு சாதகமானவையல்ல. நீங்கள் சிவந்த நிறத்தோடும், அழகிய கண்களோடும், செல்வந்தராகவும் மகிழ்ச்சி நிறைந்தவராகவும் இருப்பீர்கள். </p> <p> சப்திஷ நட்சத்திரம் அல்லது த்விதியை திதியில் உங்களுக்கு இறப்பு நேரும். பொருட்களை சேகரிப்பதில் ஆர்வமுடையவர் நீங்கள். இரண்டு மனைவிகளுக்குக் கணவராகும் வாய்ப்புள்ள உங்கள் வாழ்க்கை குறுகிய கால அளவைக் கொண்டதாக இருக்கும். </p> <p>குடும்பத்தில் மூத்தவராகவும், ஏழைக் குடும்பத்தில் பிறந்தவராகவும், மாநிறமுள்ள அன்பான மனைவி ஒருவரும், குழந்தை பெற இயலாத இடுப்பில் தழும்புள்ள இன்னொரு மனைவியும் அமைவார்கள். </p> <p> கடல் தொடர்பான விஷயங்களில் நீங்கள் பணம் சம்பாதிப்பீர்கள். திங்கள், செவ்வாய், வியாழன் ஆகியவை சிறப்பான தினங்கள். வெள்ளி மிதமான தினம். உங்கள் குரு பலவீனராக இருந்தால் அல்லது பாவத்தில் இருந்தால் நீங்கள் பிரார்த்திக்க வேண்டும். குரு வலிமை குன்றி இருந்தால் வியாபாரத்தில் நஷ்டம் ஏற்படும். உங்களுக்கு ஒரு ஆண் குழந்தை பிறக்கும் ஆசீர்வாதம் உண்டு. 2,4,9, மற்றும் 12வது வயதில் வயிற்றுப் பிரச்சினைகளால் பாதிக்கப்படுவீர்கள். இந்த வருடங்கள் உங்களுக்கு வலியைக் கொண்டுவருவதோடு உங்களைத் தோல்வியாளராக மாற்றும். </p> <p> நீங்கள் மற்றவர்களுக்கு உதவக் கூடியவராகவும் உங்கள் சொந்த வேலையில் சோம்பேறியாகவும் இருப்பீர்கள். 19, 32 ஆகிய வருடங்கள் பிரச்சினைகளைக் கொண்டுவரும். கசப்பு மற்றும் புளிப்பு மருந்துகள் உங்களுக்கு நன்மை பயக்கும். </p><p>சூரியன்  கும்ப ராசியில் இருக்கும்போது, இனிப்பு வகைகளை விரும்பி சாப்பிடுபவராக இருப்பீர்கள். டிபி நோயினால் பாதிக்கப்படும் வாய்ப்பு உள்ளது. நீங்கள் இனிமையாகப் பேசுபவராக இருப்பீர்கள். உங்கள் தொழில் வாழ்க்கையில் நிம்மதியில்லாமல் இருப்பீர்கள். உங்கள் முதல் வயதில் நோய்வாய்ப்படுவீர்கள். உங்களுக்கு மூன்று சகோதரர்கள் இருப்பார்கள். உங்கள் இடது கையில் தழும்புகள் இருக்கும். உங்களுக்கு இரண்டு மனைவிகள் இருப்பார்கள்.  5, 6வது வயதில் ஏழ்மையான சூழ்நிலை நிலவும். 15வது வயதில் நெருப்பைக் குறித்தும் 12வது வயதில் தண்ணீர் மற்றும் பாம்புகள் குறித்தும் அச்சப்படுவீர்கள். எளிதில் கோபப்படுபவராகவும், பெண்கள் விஷயத்தில் சபலத்தன்மை உள்ளவராகவும், சுயநலம் மிக்கவராகவும், உடல் பெருத்தவராகவும், நிம்மதியில்லாதவராகவும், வேலையில் பிடிவாதம் உள்ளவராகவும் இருப்பீர்கள். நீளமான கழுத்தும், உயரமான தோற்றமும் அடர்த்தியான முடியும் கொண்டவராக இருப்பீர்கள். சந்திரனின் மேல் திருஷ்டி இருக்கும் பட்சத்தில் நீங்கள் 80 வயது வரை வாழுவீர்கள். கிருஷ்ண பத்ர பாதத்தில் நவமி ரோகிணியில் நீங்கள் இறப்பைச் சந்திப்பீர்கள். </p> <p> 11வது வயதில் நீங்கள் தண்ணீர் பிரச்சினைகளைச் சந்திப்பீர்கள். பொதுவாகவே தண்ணீர் குறித்த அச்சம் உங்களுக்கு எப்போதும் இருக்கும். 16வது வயதில் தீங்கான மற்றும் ஆயுதங்கள் குறித்து அச்சம் ஏற்படும். 21வது வயதில் பாம்புகள் மற்றும் அவமரியாதை குறித்த அச்சம் ஏற்படும். 25வது வயதில் மூன்று ஏற்றத் தாழ்வுகளும் 11, 22, 33 ஆகிய வயதுகளில் உங்களுக்குக் கட்டிகள் ஏற்படுவதோடு காட்டு விலங்குகள் குறித்து பயம் ஏற்படும். 44, 66 ஆகிய வயதுகளில் பற்கள், கண்கள், காதுகள் தொடர்பான பிரச்சினைகள் உண்டாகும். கையிலும் இடுப்பிலும் தழும்புகள் ஏற்படும். நீங்கள் மற்றவர் பணத்தில் வாழ்பவராகவும் ஒரு சூதாடியாகவும் இருப்பீர்கள். </p><b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b>
	RASI_PREDICTION_12							= <p> அறுவை சிகிச்சைகளாலோ அல்லது விபத்துக்களாலோ அதிக இரத்த இழப்பு ஏற்படும் வாய்ப்பு உள்ளது. நீங்கள் ஒரு ஆடம்பரப் பிரியர். ஒளிவீசும் நிறத்துடனும் அழகிய கண்களுடனும் இருக்கும் நீங்கள் இசையை விரும்புபவராக இருப்பீர்கள். சபல குணம் உடையவராகவும் உடலின் இடப்பக்கத்தில் வலிகளால் பாதிக்கப்பட்டவராகவும் இருப்பீர்கள். நீங்கள் செல்வந்தராக இருப்பீர்கள். இயற்கையிலேயே நல்ல குணமும் போதும் என்ற மனம் கொண்டவராகவும், விருந்தினர்களை நேசிப்பவராகவும் இருப்பீர்கள். உங்களுக்கு கீழ்ப்படியும் ஒரு மகன் இருப்பான். உங்கள் முதல் வயதில் தண்ணீர் பற்றிய பயமும், 8 வயதில் காய்ச்சலும், 32 வயதில் உயிருக்கு ஆபத்தான சூழ்நிலையும் வரக்கூடும். </p> <p> நல்ல கிரக நிலைகள் வருவதும் போவதுமாக இருக்கும். உங்களுடைய கடினமான ஆண்டுகளில் இப்படி நல்ல கிரக நிலைகள் வருவதும் போவதுமாக இருந்தால் உங்களுக்கு 100 வயது வரையிலான நீண்ட ஆயுள் உண்டு. உயர்வான முகமும், பெரிய தலையும் , அழகான கண்பார்வையும் கொண்டவராகவும், நேசிப்பவரைப் பின்தொடர்பவராகவும், புத்திசாலியாகவும், வசதியானவராகவும், தண்ணீரை விரும்புவராகவும், எளிதில் கோபப்படுபவராகவும், பெண்கள் விஷயத்தில் பலவீனமானவராகவும், மற்றவர்களுக்கு உதவக் கூடியவராகவும் இருப்பீர்கள். உங்களுக்கு ஏழு சகோதர, சகோதரிகள் இருப்பார்கள்.  </p> <p> 20வது வயதில் இறப்பு குறித்த அச்சம் ஏற்படும். அஸ்வினி கிருஷ்ண சதுர்த்தியில், ரோகிணி நட்சத்திரத்தில் ஒரு ஆற்றங்கரையில் வியாழக்கிழமையன்று உங்கள் இறப்பு நேரும். </p> <p> 12வது வயதில் காய்ச்சலும், 18வது வயதில் பாம்புகளைக் குறித்த அச்சமும், 22வது வயதில் அந்நிய தேசத்தைக் குறித்த அச்சமும் 24வது வயதில் திடீர் மரணம் குறித்த அச்சமும் ஏற்படும். 27வது வயதில் தண்ணீர் குறித்த பயமும், 32வது வயதில் பாம்புகள் மற்றும் ஆயுதங்கள் குறித்த பயமும் ஏற்படும். 12வது, 24வது, 40வது, 48வது வயதுகளில் உங்களுக்கு நாய்கள், நகமுடைய மிருகங்கள், கைவிலங்குகள் குறித்த பயமும் உண்டாகும். </p><b style='padding-left:50%;'>ரோம்காக் அல்லது ரோமுக் கருத்தின்படி</b>

	WHAT_IS_RASI								= Your Rashi As Per Astrology Classics