
	 WHAT_IS_NAKSHATRA							= নক্ষত্র কি?
	 NAKSHATRA_INTRO							= হিন্দু জ্যোতিষে নক্ষত্রের বিশেষ ভূমিকা আছে। আকাশকে যদি বরাবর 27 (কখনো আবার 28) ভাগে ভাগ করা হয়, তাহলে প্রতিটা ভাগকে এক একটি নক্ষত্র বলা হয়। প্রতিটা নক্ষত্রকে আবার বরাবর চারটি পদে ভাগ করা হয়। জ্যোতিষের ধারণা অনুসারে প্রতিটি পদ একটি অক্ষরকে ইঙ্গিত করে। সাধারণত জন্মের সময় কোনো ব্যক্তির চন্দ্র যে পদে অবস্থিত থাকে, তার সাথে যুক্ত অক্ষর থেকে ঐ ব্যক্তির নাম রাখা হয়।
