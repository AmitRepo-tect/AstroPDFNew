

     ZODIAC_SIGN                            = মেষ#বৃষ#মিথুন#কর্কট#সিংহ#কন্যা#তুলা#বৃশ্চিক#ধনু#মকর#কুম্ভ#মীন
	 HEALTH_PREDICTION                      = মেষরাশি লগ্নস্থ ব্যাক্তিসাধারণ বিভিন্ন রোগে আক্রান্ত হবেন যেমন মাথাব্যাথা,সানস্ট্রোক, মায়গ্রেইনস, ফিক্ এবং বিষণ্নতা ইত্যাদি। তাঁরা আরো চিকিৎসাবিদ্যা বিষয়ক অবস্থায় যেমন অজীর্ণতা,দুর্বল স্নায়ু,ফুসকুড়ি ইতাদিতে প্রবৃত্ত হবেন এবং শারীরিক উৎসর্গ তাদেরকে বাধ্য করে দুর্ঘটনা এবং শারীরিক ক্ষতি, কখনও কখনও অর্শ রোগের মতো গরম অভিযোগ দমন করতে। অনেক মেষ ব্যক্তি মাথা বা মুখের অংশে একটি জড়ুল নিয়ে জন্মগ্রহন করে। মেষরাশির ব্যাক্তিরা বিভিন্ন যন্ত্রণা নিয়ে জন্মগ্রহন করে যেমন উচ্চ রক্তচাপ ইত্যাদি। #যদিও বৃষরাশি মূলত একটি শক্তিশালী সুস্থ চিহ্ন, কিন্তু তাদের জীবনের দুর্বল চিত্তগুলো জীবনে সমস্যা সৃষ্টি করবে। এরা প্রায়শই স্নায়ুতন্ত্রের সম্পর্কিত রোগে ভুগবে। তাদের মধ্যে অনেকে মোটা হয়ে জন্মাবে বিশেষ করে যারা মে মাসে জন্ম নেবে। তারা যৌন রোগে আক্রান্ত হতে পারে। সাধারণত তারা নিম্ন চোয়াল এবং দাঁত, চিবুক ও তালু সমস্যায় ভুগবে। কিডনি, যৌনাঙ্গ,গলাব্যাথা,কালশিটে ভাব বৃষরাশির ব্যাক্তিদের ক্ষেত্রে নিত্যসঙ্গি হয়ে উঠবে। #সাধারণত ভয় হতাশা এমনকি অধৈর্য এই রাশিটিকে ঘিরে থাকবে। যক্ষ্মা, হাঁপানি এবং রক্তাল্পতা সাধারণ সমস্যা হয়ে দাঁড়াবে। বিশেষ অর্থে স্নায়বিক এবং শ্বাসযন্ত্রের রোগের প্রবনতা রয়েছে। শ্বাস প্রশ্বাসের সমস্যা এবং বিভিন্ন স্নায়বিক সমস্যা সাধারণ হয়ে দাঁড়াবে।#কর্কটরাশির অধীনস্থরা সাধারণত বদহজম, গ্যাস, এবং পেট, যকৃত এবং আঁতের রোগের সম্মুখিন হবেন। তারা প্রায়ই বিষণ্নতা, চিত্তোন্মাদ হিস্টিরিয়া এবং মানসিক রোগে আক্রান্ত হবেন। সংবেদনশীলতা হজমের অভাব, পাকাশয়ের দুর্বলতা এবং অন্যান্য পেট রোগ এবং  দৃষ্টি দুর্বলতার প্রবণতা রয়েছে। #সিংহরাশির ক্ষেত্রে হৃদরোগে আক্রান্ত্য হওয়ার সম্ভাবনা বেশি। স্নায়বিক টান বুক ধড়ফড় সঙ্গে হার্ট এবং মত প্রভাবিত করতে পারে। সিংহরাশি সম্পর্কিত লোকেরা সাধারণত ফুসফুস,হৃদয় রোগ,রক্ত রোগ,পাঁজর,পক্ষের মধ্যে ব্যথা ঢামালি  জ্বর, এবং চোখের কিছু সমস্যার সম্মুখিন হবে। #অন্ত্র ও কোষ্ঠকাঠিন্য কন্যারাশির নিত্য সঙ্গি। মেজাজ এবং হতাশা অন্যদের প্রভাবিত করবে। কন্যারাশির লগ্নস্থ মানুষদের যৌন অঙ্গ সমস্যা থাকতে পারে. খাদ্য সম্পর্কে সচেতন হওয়া তাদের প্রয়োজন খাদ্য সম্পর্কে সচেতন হওয়া বহিরাগত খাবার না খাওয়াই ভাল। #বিভিন্ন কারণে তুলারাশি ব্যক্তিদের চামড়া খুবই সংবেদনশীল হয় যেমন অনিদ্রা, সমৃদ্ধ খাদ্য এবং অত্যধিক মদ খাওয়া।তুলা রাশি কিডনি এবং ত্বক,বাজে অঞ্চল,পাছা,মূত্র গ্রন্থি এবং স্নায়ু ও পেশী তন্ত্রের মাধ্যমে রেচন তন্ত্রকে প্রভাবিত করে। তুলারাশি কিডনি, পিঠ এবং ডিম্বকোষকে প্রভাবিত করে। পীঠে ব্যাথা, সমৃদ্ধ খাদ্য এবং সুগার এই রাশির নিত্যঘটনা।#বৃশ্চিকরাশি জননাঙ্গ ও রেচন তন্ত্রকে প্রভাবিত করে। বৃশ্চিকরাশি নাক এবং অনুনাসিক হাড়,গণ এলাকা, চিবুক অঙ্গ ও হিমোগ্লোবিনকে প্রভাবিত করে।  বৃশ্চিকরাশি শ্রোণীচক্র ও প্রজনন এবং প্রস্রাব পদ্ধতি এবং লিভার ও কিডনি,মূত্রাশয়ের মধ্যে পাথর এবং নুড়ির মতো সামান্য রোগে ভোগার প্রবনতা থাকে। পাইলস এবং আলসারের মতো সামান্য রোগে ভোগে বৃশ্চিক রাশির ব্যাক্তিরা। #ধনুরাশির ব্যাক্তিরা সাধারণত উরু এবং পাছার রোগে ভোগে। পীঠে ব্যাথা এই রাশির নিত্যসঙ্গী।এছাড়াও ফুসফুস সংক্রান্ত অভিযোগ এবং জ্বরাক্রান্ত  প্রবণতা  লক্ষণীয় । সমৃদ্ধ খাদ্য ও পানীয় আপনার পাছার যন্ত্রণার কারণ হবে। #মকররাশির ব্যাক্তিরা উঠা রোগে আক্রান্ত হবেন(বায়ু)। মকররাশি ব্যাক্তি তৎক্ষণাৎ রোগ উৎপন্ন করেনা কিন্ত একবার রোগের লক্ষণ দেখা দিলে hypochondriacs হওয়ার সম্ভাবনা রয়েছে। মকররাশি সন্ধি, চুল, দাঁত এবং বিশেষ করে চামড়া এবং স্নায়ুতন্ত্রকে প্রভাবিত করে। এই চিহ্নে দুর্ঘটনার কারনে ভাঙা হাড়,মচকানো,হাঁটুতে ও নীচে স্থানচ্যুত এবং আঘাত পাবেন। #কুম্ভরাশি সঞ্চালন, শ্বাস এবং দৃষ্টিশক্তি; নিম্ন অঙ্গপ্রত্যঙ্গের হাড়ের সাথে জড়িত। প্রায়শই এরা অশুদ্ধ রক্ত এবং রক্ত সঞ্চালন সম্পর্কিত রোগ ভোগেন। কুম্ভরাশির ব্যাক্তিরা  উচ্চ রক্তচাপ ও হার্টের সমস্যায় পড়েন। কুম্ভরাশি  আক্কেল, সংবহনতন্ত্র, বাধা, এলার্জি, অপ্রত্যাশিত অসুস্থতা এবং খামখেয়াল দুর্ঘটনার দ্বারা প্রভাবিত। এছাড়া তারা বিভিন্ন স্নায়বিক রোগেও আক্রান্ত হন। #মীনরাশির ক্ষেত্রে অন্তঃস্রাবী পদ্ধতি এবং ডায়াবেটিসের কারনে কঠোর পায়ের সমস্যা এছাড়াও অন্যান্য সমস্যা সৃষ্টি হবে। ফুলে যাওয়া,ড্রাগের প্রতিক্রিয়া,পায়ে ক্ষত এবং সম্পর্কযুক্ত সমস্যা হচ্ছে নিত্য অভিযোগ,কিন্তু মীন রাশি আবেগময় প্রকৃতি তাকে আবেগময় অসুস্থতার আঘাত দেবে।
     TEMPERAMENT_AND_PERSONALITY_PREDICTION = মেষ রাশির ব্যাক্তিরা শক্তিশালী হয় এবং এরা যেকোন ঝুঁকি নিতে প্রস্তুত। তাদের ব্যক্তিত্বের ক্ষেত্রে সবচেয়ে গুরুত্বপূর্ণ বৈশিষ্ট্য হল সোজা ধৃষ্টতা। তারা একটু নেতা প্রকৃতির তারা কারও কথা শোনে না নিজের মালিক তারা নিজেই। তারা একটু স্বাধীনচেতা: এই চরিত্র কখনও কখনও আক্রমনাত্মক এবং দুর্বল একই সময়ে এবং অত্যন্ত মেজাজী কিন্তু উল্টো দিকে তারা সহজেই প্ররোচিত বা সন্তুষ্ট হয়ে যায়। মেষরাশির মানুষেরা স্পষ্টভাষী এবং কূটনীতিবিরূদ্ধ হয়; যারজন্য তারা অনেকের কাছে খারাপ হয়। তাদের আচমকা ধমকে যে কেউ রেগে যেতে পারে আবার তাদের বোঝানোর শক্তিতে কাছেও টানতে পারেন। তাদের আবেগপ্রবণতা কখনও কখনও কিছু গুরুতর সমস্যায় ফেলে দেয়। তারা শিল্পের কদর করতে যানে। লক্ষ্যে পৌছানোর পরে শক্তিসঞ্চয় তাদের অধিকাংশরই মত। এই লগ্নস্থ ব্যক্তি স্নেহসঞ্চারক, ইন্দ্রিয়গ্রাহ্য হয়। #এই লগ্নস্থ ব্যাক্তিরা নতুন লোকের সাথে ব্যবহার ভাল করে থাকে। তাদের আচার আচরণ সবার কাছে তাদেরকে প্রিয় করতে সাহায্য করে। যদি তারা নিজেদের আয়ত্ত করতে না পারে এবং তার কথা যত্ন সহকারে কেউ না শোনে তখন অন্যদের প্রতি তারা বিরক্ত,সতর্ক,রক্ষণশীল ব্যবহার করে। নতুন লোকের সাথে মিশতে না পারলে তাদের জীবন দুর্দশাগ্রস্ত হবে। তারা ব্যবসার ক্ষেত্রেও  উন্নতি করবে।এই ব্যক্তিরা যৌন ব্যক্তিত্ব এবং যদিও অন্য দিকে তারা প্রচেষ্টা করে সব এলাকায় শারীরিক পরিতোষ চাইতে এবং সময়ে দেওয়া কাজ সম্পূর্ণ করে কিন্তু তাদের নিজের গতি অনুসারে। তারা অন্যদের প্রতিভা এবং প্রচেষ্টাকে কদর করতে জানে। সময়ে তারা কর্তৃত্বপ্রি়য় কাজও করে। বৃষরাশি সহজে আকৃষ্ট হয় না এবং খুব সাবধানতার সাথে তাদের ব্যাক্তিসাধারনের কাছে পৌছতে হয়। বৃষরাশির ব্যক্তিরা তাদের মান ও নীতি সম্পর্কে খুব দৃঢ় হয় এবং তাদের পদ্ধতির পরিবর্তন করা খুব কঠিন। তবু তাদের দরদী সত্যতা এবং চুম্বকীয় ব্যক্তিত্বে অনেকে প্রভাবিত হয়। তারা আবেগপ্রবণ নয় কিন্তু তাদের অগ্নিশর্মা হতেও সময় লাগে না। তারা একগুঁয়ে এবং অযৌক্তিকও হতে পারে। তারা বন্ধু চয়নের ব্যাপারে অত্যন্ত সতর্ক। তারা মিথ্যে বলা পছন্দ করে না তাই তাদের ব্যবহার করা খুব সহজ। #মিথুনরাশির ব্যক্তিসাধারন খুবই প্রানবন্ত নমনীয় এবং সদালাপী হয়। তারা সক্রিয় মনের এবং দেহ আবিষ্ট হয় দেখতেও খুব সুন্দর হয়। আবিষ্কার করার প্রবনতাও আছে। অন্যদিকে এদের মন চঞ্চল হওয়ার জন্য খুব সহজে উদাস হয়ে পড়ে এবং যেকোনো কাজ মনোযোগ সহকারে করতে অক্ষম। অন্যদের দিয়ে কাজ করানোরও এদের একটা উদ্দেশ্য থাকে। But a Gemini will be more than make up for any negative qualities though the sheer scintillating entertainment value of their very presence.  কিন্তু একটি মিথুন তাদের উপস্থিতি নিছক scintillating বিনোদন মান যদিও কোনো নেতিবাচক গুণাবলী জন্য গঠন করা বেশী হতে হবে। তারা অস্থির এবং তাদের মন পরিবর্তিত হয়, তারা কুখ্যাতিপূর্ণভাবে নির্ভরশীল হন না। মিথুন রাশির বুদ্ধি প্রাধান্য পায় এবং বুদ্ধিগত সব জিনিস তাদের দ্বারা ব্যাপকভাবে মূল্যবান হয়। যোগাযোগের ব্যবস্থা হিসেবে তাদের কাছে গুরুত্বপূর্ণ, জ্ঞান কখনও একটি জিনিস নয় মজুত করার।  মিথুন রাশির সকল সূর্য লক্ষণের অধিকাংশই বহুমুখী। তারা একটি বিকল্প সিদ্ধান্ত নেন এবং পরের দিন সম্পূর্ণভাবে তাদের মন পরিবর্তন করেন। মিথুন রাশি দ্বারা কিছুই কখনও পাথরে লেখা যায় না। তাদের আত্মা মুক্ত হয়, তারা কৌতূহল ও জানার ইচ্ছা দ্বারা চালিত হন। মিথুন রাশি তাদের কোনো একটি নির্দিষ্ট কাজ খুব কমই গভীরভাবে গ্রহন করেন এবং তাদের কোনও ষড়যন্ত্র স্পর্শ করে না। তাদের স্ব-নিয়ন্ত্রণের অভাব। #কর্কটরাশির স্বপ্নাবিষ্ট, অনুভূতি, আবেগ বৈশিষ্ট্য রয়েছে এবং একটি নিরাপদ পশ্চাদপসরণের প্রয়োজন হয়। তারা চমৎকার কথোপকথন এবং আক্ষরিক দক্ষতার সঙ্গে সহজাতভাবে সৌভাগ্যশালী হন। তারা উপস্থিতবুদ্ধিসম্পন্ন, প্রতিভাশালী, প্রাণবন্ত এবং অসামঞ্জস্য হন। তাদের আধ্যাত্মিকতার একটি নির্দিষ্ট ডিগ্রী আছে, তাদের কিছু মানসিক প্রবণতার সঙ্গে সৌভাগ্যশালী হন। তাদের চমৎকার স্মৃতি ধরে রাখার দক্ষতা থাকে। তারা দয়ালু, সংবেদনশীল ও সহানুভূতিশীল হন। তারা খুব ঘরোয়া এবং তাদের নিজেদের সন্তুষ্টিতে তাদের বাড়ির পরিবেশকে দৃঢ় ভালোবাসেন। ব্যক্তিগত সম্পর্কে, কর্কট রাশি এক দিকে কঠোরভাব এবং কোমলভাবের মিশ্রণ, আবেগপ্রবণতা, কল্পনাপ্রবণ এবং ভাবপ্রবণ, অন্য দিকে যখন একগুঁয়েমি সম্বন্ধসূচক এবং বিশ্বস্ত হয়। তাদের একটি স্মৃতি ধরে রাখার ক্ষমতা থাকে এবং খুব কমই অবহেলা ও আঘাতকে ক্ষমা করেন। একটি কর্কট রাশি শব্দগুচ্ছের সাথে পরিচিত হয় না, ""অতীতে অতীতের ঘটনায় হস্তক্ষেপ না করা"": তাঁরা কখনও একজনের ভুল কখনও ভোলেন না। মানসিক প্রকৃতি দ্বারা চালিত হয়ে, তারা বন্ধুদের সবচেয়ে ভাল এবং খারাপ হতে পারে। তারা উজ্জ্বল এবং অত্যন্ত সতর্ক এবং সমানভাবে উত্পাদনশীল তাদের করার মধ্যে। #এই রাশিচক্রের চিহ্নের আওতায় পড়া মানুষ গতিশীল ও আকর্ষণীয় ব্যক্তিত্বের মালিক হন। একটি আদর্শ সিংহ রাশি, উচ্চাভিলাষী, সাহসী, উদ্দাম শক্তিশালী, ইতিবাচক, স্বাধীন ও আত্মবিশ্বাসী হন। তারা ​​সহজবোধ্য এবং সরল বিশেষ হন তারা খুব ভাল জানেন তারা কি চান এবং সম্পূর্ণ উদ্যম ও একটি সৃজনশীল উৎসাহের সঙ্গে এটির পশ্চাদ্ধাবন করেন। সাধারণত তারা মেজাজী, কখনো কখনো ভোঁতা এবং কদর্য হন যখন প্রকাশ্যে অপমানিত হন অসূয়া বা আগ্রাসন দ্বারা তখন গভীরভাবে আঘাত পান। ব্যক্তিগত সমালোচনায় খুবই সংবেদনশীল এবং যখন তাদের শাসক ভয় দেখান, তারা হঠাৎ রাগ করতে পারেন। তারা একগুঁয়ে এবং মোটা বা পাতলা মাধ্যমে কর্মের একটি ধারাতে একটি বিশ্বাস বা লাঠি সম্মুখে রাখা হবে। আদর্শবাদী ও মানবিক প্রকৃতি অধিকার করেন। মূলত সিংহ রাশি বহির্গামী, শুভ, দয়ালু এবং উদার, স্ব-ভাবপূর্ণ, বুদ্ধিমান এবং বড় মনের হন। তার একটি নির্দিষ্ট সংকল্প আছে কিন্তু নামমাত্র বিরক্তিতে একটি খারাপ মেজাজের মধ্যে অসমর্থনীয়রূপে পাবেন কিন্তু রাগ দ্রুত গলে যাবে। তারা দীর্ঘ দিনের জন্য বিদ্বেষ রাখেন এবং একটি স্বাধীন ভাবুক হতে পারেন। তারা ধর্মীয় সনাতন নীতিতে লেগে থাকেন কিন্তু অন্যান্য আদেশ এবং অনুশীলনের প্রতি বিশেষভাবে সহনশীল হন। #কন্যারাশি লগ্নের মানুষেরা অপেক্ষাকৃত সংরক্ষিত এবং ভদ্র এবং নরম কথা বলেন। তারা তাদের বন্ধুদের খুঁজে যারা তাঁকে সামাজিক স্তর থেকে উপরে উঠতে সাহায্য করছেন। যখন বাধার মুখোমুখি, তারা শান্ত এবং জ্ঞানী থাকেন এবং একটি সমাধান খুঁজে বের করার কাজ করেন। এই নিস্তব্ধতা কখনও কখনও ঠান্ডা এবং হিসাবী হিসাবে দেখায়। তাদের সবচেয়ে জটিল সমস্যা বিশ্লেষণ ও সমাধানের ক্ষমতা থাকে। তাদের বিস্তারিত জানার জন্য বিস্ময়কর নজর থাকে এবং এইভাবে প্রায়ই সামগ্রিক বিষয় অবহেলা করেন।  তারা খুব বুদ্ধিজীবী এবং যেকোনো কিছু করার ধারা থাকে, প্রকৃতির বাস্তবতার প্রায়ই সুবিধা ময়লা এবং বিক্ষেপী।  কন্যারাশি লগ্নের মানুষেরা খুব বন্ধুত্বপূর্ণ এবং প্রায় সব কিছু সম্পর্কে বুদ্ধিমান এবং সাধারণত পর্যবেক্ষণশীল, ধারালো, সমালোচনামূলক এবং সহিষ্ণু হন। তাদের বন্ধুত্ব খুব নির্বাচনী এবং আপাত ভিত্তিতে সম্পর্ক রাখতে পছন্দ করেন। কন্যারাশি লগ্নের মানুষেরা চিন্তা এবং চিত্তোন্মাদ প্রবণ। তারা তাদের নিজেদের অন্যদের উপযোগী করে তুলে প্রায়ই অপব্যবহার এবং অপচিকিৎসার আঘাত তাদের ত্যাগ করবে। কন্যা লগ্নের মানুষ হন নিট-পিকার, নিয়মানুবর্তিতা এবং নিজের ও অন্যদের সমালোচনা করেন। #তুলা লগ্নের মানুষ সহযোগিতা, আপস ও ছেড়ে দেওয়া বেশি পছন্দ করেন,এমনকি যখন তারা সঠিকের তুলনায় বরং একটি যুক্তির তীব্র যন্ত্রণা নিয়ে নির্বাণ  বোধ করেন। অন্যদের সঙ্গে মতানৈক্য তাদের অসুরক্ষিত, এবং অস্বস্তিকর করে তোলে। তারা তাদের জীবনের সাদৃশ্যের জন্য প্রার্থনা করেন এবং এমনকি এটি নেওয়ার কাজ করতে পারেন। তারা অবিশ্বস্ত এবং দ্বিধাগ্রস্ত, নিত্যকর্মে অধীর, বিরক্তিকর রক্ষণশীল এবং লাজুক হতে পারে। তুলা লগ্নের মানুষের রাগ ধীর হয় এবং রাগে উন্মত্ত হয়ে তাদের আকস্মিক সশব্দ বিদারণের সঙ্গে সবাই চারপাশে ধাক্কা দিতে পারে। তারা একটি বাস্তববাদীর থেকে একটি আদর্শবাদী বেশি হন; প্রায়ই বাতাসে দিবাস্বপ্ন নির্মাণের মত পরিকল্পের উপর চিন্তা করেন। একটি আদর্শ তুলারাশি শৈল্পিক এবং পরিশ্রুত, ভালমন্দ সংক্রান্ত খুব দৃঢ় মতামত থাকে, এবং তারা একটি জন্মগত উপাধিপত্র, কিন্তু মনোহর এবং আন্তরিক। তারা অযৌক্তিক এবং সাধারণত শান্তি প্রেমময় প্রকৃতির হন; চিন্তাভাবনাহীন এবং দলপ্রিয়। তুলা লগ্নের মানুষ সবচেয়ে পরিশ্রুত বলে মনে করা হয়। আপনি ভাল দেখতে এবং কিছু বাস্তববুদ্ধি, আবেদন এবং সূক্ষ্ম স্বাদ থাকে। তারা খুব বেশি সামাজিক এটি তাদের সামাজিক স্তর ধাপে ধাপে বৃদ্ধি করার জন্য অপরিমেয় আনন্দ দেয়। তারা উদ্দেশ্যের সাথে ভাল করে পরিচিত এবং উপসংহার তৈরীতে নিরপেক্ষ হন। #বৃশ্চিক লগ্নের মানুষেরা তাদের আত্ম-সমালোচনা, তীব্র একাগ্রতা ও এক আবেগ বাহানো বৈশিষ্ট্যের জন্য পরিচিত, সম্পূর্ণ সাফল্য বা ব্যর্থতার মধ্যে যা সাজানো। তাদের যুক্তিহীন মেজাজ বরাবর একটি শক্তিশালী স্ব-ধ্বংসাত্মক কষ থাকে যাতে একটি নামমাত্র আলোড়ন সৃষ্টি করা যেতে পারে। তারা প্রায়ই তাদের ভালোবাসার মানুষের জন্য খুবই সন্দেহজনক এবং ঈর্ষান্বিত হন। তাদের মানসিক জীবনীশক্তি তাদের বিস্ময়কর করে তোলে তাদের খোঁজা যেকোনো কর্মজীবনের জন্য, পরিস্থিতির উপর নির্ভর করে ভাল বা খারাপের জন্য কিনা। আদর্শ বৃশ্চিক লগ্নের মানুষ তীব্র হন এবং শক্তিশালী প্রকৃতি থাকে। তারা একগুঁয়ে, গর্বিত এবং শান্ত হন। তারা স্থায়ীভাবে বসবাস করেন না এবং তাদের জীবনের জন্য সব সময়ে পূর্ণ বসবাস করা বা না করা বোঝায় না। দুর্লভ ভাবে কার্যকলাপের অক্ষের মধ্যে খোঁজেন কিন্তু সবসময় জানেন উদ্বেগের বাইরে যাওয়া ঠিক কিনা। তাদের সমবেদনা তাদের ভাল এবং সবচেয়ে বিশ্বস্ত বন্ধু তোলে কিন্তু একই মানের কখনো কখনো তাদের শত্রুদের সবচেয়ে বিশ্বাসঘাতক করে তোলে। তারা সবকিছু এবং যেকোনো কিছুর সীমা অতিক্রম করেন, যখন তারা একত্রে তাদের সমগ্র শক্তি, আত্মবিশ্বাস, উচ্চাকাঙ্ক্ষা ও মহত্ত্ব রাখেন। তারা অন্যদের দাবি করেন কিন্তু কখনও কাউকে জিজ্ঞাসা করবেন না যে সে নিজের কাজ করতে সক্ষম কিনা। #একটি আদর্শ ধনুরাশি একটি উজ্জ্বল, হাসিখুশি স্বভাব এবং ভবিষ্যতের দিকে একটি প্রায় দুরারোগ্য আশাবাদী পদ্ধতি আছে। সাধারণত তারা ভাল স্বভাবের,নিয়ন্ত্রণের বাইরে আজব ধারনা এবং একটি উত্সাহব্যঞ্জক আধ্যাত্মিক পার্শ্বের অধিকারী হয়। বিরূপ পরিস্থিতিতে,তারা অধীর হয়,দায়িত্ব,স্ব - অসংযত,ধর্মান্ধতার ভয় আছে এবং বড় করতে অস্বীকার করে। তারা অন্যদের অনিচ্ছাকৃত দ্বারা ভুল বুঝা প্রবণ কারণ আলাপচারিতায় ত্বরা তাদের প্রবৃত্তি। এছাড়াও জুয়া দিকে সম্বন্ধ আছে। এই চিহ্নের অধীনে জন্মগ্রহণ যারা ​​আশাবাদ,শ্বাসাঘাত,অনুপ্রেরণা,উৎসাহ ও ব্যয়বহুল দ্বারা চিহ্নিত করা হয়। একটি ধনুরাশির জীবনের উপর একটি ইতিবাচক মনোভাব রয়েছে,পূর্ণ উদ্যম,শক্তি,বহুমুখিতা,দুঃসাহসিকতা এবং উৎসুক যতদূর সম্ভব অভিজ্ঞতা প্রসারিত করতে পারে। তারা অকারণে কথা বলেন না,তাদের ভাষার বাগ্মিতা প্রায়ই অন্যদের প্রলুব্ধ করে। তারা চারপাশে ভ্রমণের আনন্দ উপভোগ করেন এবং তাদের পারিপার্শ্বিক অবস্থা অন্বেষণ করেন। তারা সম্মানিত,সৎ,বিশ্বস্ত,সত্যবাদী,উদার ও ন্যায় বিচারের একটি আবেগের সঙ্গে আন্তরিক হন। তারা সাধারণত বিনয়ী এবং সততার একটি শক্তিশালী অনুভূতির সাথে অধ্যাত্মবাদের দিকে মনের ঝোঁক আছে। ধনুরাশির শক্তিশালী ইচ্ছা এবং ভাল সংগঠন থাকে,একটি সমবায় যা আপনাকে কোনো প্রকল্পের একটি সফল উপসংহার আনার ক্ষমতা দেয়। #মকর লগ্নের মানুষেরা প্রায়ই ধর্মীয় বড় সভা করে থাকেন কিন্তু বাস্তবে তারা হিসাবে ধর্মীয় নন তারা ধার্মিক হওয়ার ভান করেন। তারা আত্মকেন্দ্রিক, ধূর্ত, গোপনীয় এবং দৃঢ় হন। তারা শোনার থেকে বলে বেশী; এই কারনে প্রায়ই তাদের হালকা নিয়ন্ত্রনের জন্য কথা বলার ফলে অন্যদের আঘাত করে। একটি আদর্শ মকর রাশির ভাল সাংগঠনিক দক্ষতা থাকে, ঝরঝরে এবং পরিপাটি হন, কঠিন নেতৃত্বের বাস্তবতা থাকে। তাদের শক্তিশালী কাজের নীতি, জড়বাদী প্রবণতা, একটি রক্ষণশীল কষ, সামাজিকতা এবং কর্তৃপক্ষের জন্য মহান সম্মান থাকে। মকর লগ্নের মানুষেরা উচ্চাভিলাষী, গুরুতর এবং দায়িত্বের প্রতি উৎসর্গীকৃত কিন্তু কখনও কখনও প্রতিহিংসাপরায়ণ হন; আত্মশৃঙ্খল, দায়িত্বশীল এবং বাস্তববাদী হন তবে সময়ের ক্ষেত্রে, আত্মকরুণা তাঁকে বিপদের মধ্যে ফেলতে পারে। বিচার ক্ষমতা চমৎকার এবং উদ্দেশ্য ও নির্দেশের শক্তিশালী অনুভূতি থাকে। একজন মকর প্রশান্ত এবং অন্যদের সঙ্গে তাদের লেনদেনের মধ্যে সংরক্ষিত প্রতীয়মান হতে পারে, কিন্তু তারা আস্থা দিতে পারেন একবার, তারা একটি বিশ্বস্ত এবং অঙ্গীকারবদ্ধ বন্ধু হন। সামাজিকভাবে প্রাচীন, ইচ্ছুক যেকোনো তাদের ইচ্ছার জন্য কাজের চেষ্টা, এবং তাদের আত্মসম্মান অত্যন্ত গুরুত্বপূর্ণ। তাদের বরং দার্শনিক অপেক্ষা জড়বাদী পদ্ধতি থাকে। তারা তাদের নিজের আনন্দের জন্য প্রেমে পড়তে সক্ষম। #একটি আদর্শ কুম্ভরাশির যোগাযোগ করার তীব্র ইচ্ছার স্বাভাবিক গুণ থাকে। আপনি একটু কৌশলহীন ও অভদ্র হন যদি আপনি আপনার ধ্রুবক সম্প্রচার চারিদিকে মধ্যস্থতা করতে শেখেন নি যার মতামত রক্ষণশীল দিকে কিছুটা হতে পারে। তারা কৌতূহলী এবং আকর্ষণীয় হন; লাজুক, সংবেদনশীল, মৃদু এবং সহিষ্ণু বা উত্সাহী এবং প্রদর্শনকারী হওয়ার একটা প্রবণতার সঙ্গে প্রাণবন্ত হতে পারে। তারা  শক্তিশালী দৃঢ় বিশ্বাসের সাথে খুব সমর্থন করেন এবং তারা বিশ্বাস করেন কি জন্য সংগ্রাম করা হয়; স্বপ্নদর্শী এবং নেতা হন।  সাধারণত তারা কুসংস্কার ছাড়া এবং অন্যদের দৃষ্টিকোণে বেশ সহনশীল হন। তারা ভালো শ্রোতা, এবং তাদের বন্ধুদের গভীরভাবে যত্ন নেন।  তারা দয়ালু এবং অকপট ও স্পষ্টভাষী হতে জানেন। তারা পরিশ্রুত এবং আদর্শবাদী, কল্পনাপ্রবণ এবং বাস্তববাদী, সুন্দর ও বন্ধুভাবাপন্ন ব্যক্তি। তারা মূল ধারণা নিয়ে আসা গণনা করতে পারে। তারা প্রয়োজন হলে তাদের সাহায্যের পথে যাবেন কিন্তু কখনও আবেগের সাথে জড়িত হবেন না। #মীনরাশি লগ্নস্থ মানুষেরা বাস্তববাদী মানুষ নন কিন্তু সংবেদনশীল এবং স্বভাবজাত হন। তারা বহুমুখী এবং যুক্তির থেকে বরং বোঝাপড়া দ্বারা যত্ন নিয়ে কিছু বুঝতে চায়। অতি প্রচলিত মনোভাবের রীতিনীতির মধ্যে অনমনীয় এবং তাদের গোঁড়ামি কিন্তু কিছু ত্যাগ করতে পারেন। মীনরাশি আত্মবিশ্বাসী, অনুগত, গৃহপ্রেমী, দয়ালু এবং উদার হন। তারা সহজেই বিপথগামী হতে পারেন। তাদের স্বপ্নমাখা এবং অকার্যকর প্রকৃতি আপনার কাছের এবং প্রিয় মানুষদের থেকে মর্মপীড়ার একটি উৎস। একটি আশাবাদী এবং একটি দুঃখবাদীর মিশ্রণ হবে, তারা কোনো বিষয়ে তাদের মনের কাঠিন্যকে খুঁজে কাটিয়ে ওঠে। একটি আদর্শ মীনরাশি লাজুক এবং তাদের সংস্পর্শে আসে যারা তাদের জন্য ​​একটি মান্যকারী ভালবাসা এবং বিশ্বাস থাকে। তারা উচ্চ শ্রেণির সনাতনী কল্পনাপ্রিয় হন এবং তাদের নিজস্ব পায়ের উপর দ্বিধাগ্রস্তের জন্য ভাল উপযুক্ত খ্যাতি পান। মীনরাশি অত্যন্ত কুসংস্কারাচ্ছন্ন ও ধর্মীয় হন। তারা মৃদু, সহিষ্ণু প্রকৃতির হন কিন্তু কারো ছাঁচের প্রয়োজন। তাঁরা চারপাশের ভালো বা খারাপ পরিবেশের সাথে খাপ খাওয়াতে পারেন, উদারপ্রকৃতি, বন্ধুত্বপূর্ণ এবং দয়া ও সহানুভুতির একটি সত্য অনুভুতির সাথে ভালো প্রকৃতি হবেন এবং এমনকি চারপাশের অন্যদের অনুভূতি বরাবর সবকিছু সংবেদনশীল হবে।
     PHYSICAL_APPEARANCE_PREDICTION         = মেষ লগ্ন মানুষের একটি সুস্পষ্ট চিবুক,নাক ও মুখের শক্তিশালী এবং কৌণিক বৈশিষ্ট্য আছে। তারা গড় উচ্চতা এবং গঠনে হন ক্রীড়াবিদ,সাথে কোঁকড়া চুল,ভ্রু টির একটি উদ্গত খিলান,কষা গাত্রবর্ণ,পুরুষদের পুরুষোচিত হাভভাব, এবং নারীর জন্য যেকোনো একটি গতিশীল। পুরো দৈহিক গঠন একটি শক্তির ধারণা এবং এবড়োখেবড়োযুক্ত। তাদের সাধারণত বাদামী বা হালকা কালো কোঁকড়ানো চুল থাকে। প্রায়ই তাদের মাথায় একটি চিহ্ন বা খুঁত থাকে। বেশিরভাগ ক্ষেত্রে সুস্পষ্ট শিরা থাকে এবং তাদের শরীরের উপর ক্ষতের উদ্ভূত চিহ্ন বেরিয়ে থাকে। #বৃষ লগ্ন প্রায়ই স্বল্প গঠন প্রায়ই যত্ন শৈথিল্যের দিকে। সাধারণত তারা পবিত্র,সুন্দর মুখের সঙ্গে  বড় দীপ্তিময় চোখ,কান নাক এবং ইন্দ্রি়পরায়ণতাপূর্ণ ঠোঁট সম্পূর্ণভাবে কেটে বসানো। শরীরের গঠনের নিরিখে সৌভাগ্যবান হিসাবে তাদের সম্ভাবনা কম নয় তাদের মুখ,তারা বর্গক্ষেত্র আকৃতির শরীরের অধিকারী হয়,একটি পূর্ণ গোলগাল দৈহিক গঠন নিয়ে কোন মর্মস্পর্শী রেখাচিত্রর সঙ্গে  পিছনে বা পাশে কিছু চিহ্ন থাকতে পারে। বৃষ লগ্ন প্রায়ই একটি মনোজ্ঞ হাভভাব নিক্ষেপ করে। #মিথুন লগ্ন মানুষের ঝিলিমিলি চোখ ও ভাবপূর্ণ চলনশীল বৈশিষ্ট্যগুলো আছে যা সুন্দর এবং উত্তমরুপে সংজ্ঞায়িত। তাদের ছিপছিপে গঠন এবং লম্বা উচ্চতার গড়, সঙ্গে নমনীয় সরু এবং স্নায়বিক পেশীতন্তু। অঙ্গপ্রত্যঙ্গ ফ্যাশন মডেলের মত প্রায়ই দীর্ঘ; একটি মিথুন ব্যক্তি খুব ভাল এবং অমায়িক উপস্থিতি কম নিক্ষেপ করে। তাদের কল্পিত মুখের বৈশিষ্ট্য একটি ছোট চিবুক এবং সম্ভবত সুন্দর গাত্রবর্ণ। কোঁকড়া চুল তাদের আকর্ষণীয় ব্যক্তিত্বের আরো বৈশিষ্ট্যগুলো যোগ করে। তাদের প্রায়ই স্পষ্ট চোখের সাথে বিস্তৃত কপাল থাকে। কিন্তু এই ধরনের আকর্ষণীয় বৈশিষ্ট্য এবং ব্যক্তিত্ব থাকা সত্বেও তারা প্রায়ই অসুস্থতা ও স্বাস্থ্য সমস্যার সম্মুখীন হতে পারে। #কর্কট লগ্ন মানুষের বৃত্তাকার আকৃতির বৈশিষ্ট্য থাকে এবং যখন তারা তাদের ত্রিশে পৌঁছায় তখন স্থুলকায় হয়ে থাকে। চুল কালো এবং পাতলা বা বিক্ষিপ্ত থাকে। নাকটি ছোট,চোখ বার করা,এবং চিবুক বৃত্তাকার হয়। উচ্চতা গড়ে ছোট। মানুষ এই চিহ্নের ক্ষেত্রে খুব সৌভাগ্যবান নয়  সৌন্দর্য পরিপ্রেক্ষিতে তারা দীর্ঘ বাহুর সঙ্গে পেতিতে কাঠামো অধিকার করে এবং খুব লম্বা হতে পারে না কিন্তু সাধারণত তাদের শরীরের  উপরের অংশ বিস্তৃত হয়। যদিও তারা সাধারণত সুন্দর গাত্রবর্ণ থাকে অপমানিত নাক উঁচুর সঙ্গে একটি বিস্তৃতি পর্যন্ত। #সিংহ লগ্ন সহজাত ব্যক্তিত্বের মালিক তারা প্রায়ই মানুষের উপর সৌম্য এবং চৌম্বক ছাপ নিক্ষেপ করে। কিন্তু কাঠামোর পরিপ্রেক্ষিতে তারা পবিত্র নয় তাদের ব্যক্তি হিসেবে তারা সাধারণত গড় উচ্চতার সঙ্গে পুরোপুরি উত্কীর্ণ শরীরের উপরের অংশ। সিংহ বিশিষ্ট চিবুকের সঙ্গে হরিদ্রাভ আমেজ সহ চোখ দিয়ে বড় ডিম্বাকৃতি মুখের অধিকারী হয়। পুরুষ এবং মহিলা সিংহ নিয়ন্ত্রিত হতে পারে, কিন্তু সহজেই সরানো যায় এবং যুদ্ধরত হয়। প্রাণশক্তি এবং আবেগ হিসাবে দ্রুত সংবেদনশীলতা এবং হামলাদারিতা সাধারণ হয়। #কন্যারাশি লগ্নের মানুষ প্রায়ই অলস ছন্নছাড়াভাব বা সাধারণ খামখেয়ালিভাবের একটি ছবি পরিকল্পনা করে। প্রায়ই কিছু '' পেতিতে '' এবং কন্যারাশির চেহারার আকৃতি, বিশেষ করে মুখ সম্পর্কে অতিরিক্ত হয়। তাদের সাবধানে মাপা হাঁটা,প্রতিসম শরীর এবং আদর্শ তরুণ বয়স্ক,নির্দোষ বৈশিষ্ট্য ফলপ্রদ হয়। তারা সোজা নাক এবং বৃহদায়তন গাল নিয়ে একটি ভাল কপালের অধিকারী হয়। #তুলারাশি লগ্নের মানুষেরা বৈচিত্র্যময় এবং স্বতন্ত্র হয়,আন্তরিক ঠোঁট সঙ্গে আকর্ষণীয় দেহ হচ্ছে ,এবং কপালের মুক্তিদান এবং আস্থা  চালিত করে। এই ছোটো জাতি উপলব্ধি সাধারণত হয় বিরক্ত বা বাদামি,একটি যন্ত্রণাদায়ক ও অন্তর্ভেদী দৃষ্টির অধিকারী হয়। তুলারাশি লগ্নের মানুষেরা একটি নির্ধারিত গঠনমূলক বাঁকানোর সঙ্গে নির্মিত বিদ্যমান রয়েছে। তুলারাশি লগ্নের মানুষেরা ত্বরার সঠিক নমনীয় লাবণ্য হিসাবে বর্ণনা করা হয়। প্রায়শই,এই লগ্নের নারীদের,বরং পেতিতের চেয়ে একটি গ্রহণযোগ্য ফলপ্রদ আকৃতি থাকে,যেহেতু পুরুষরা বরং ইন্দ্রিয়পরতন্ত্র উৎসাহ দুর্বল এবং মোটাসোটা হয়। আপনি মধ্যম মাপের গঠন বা কখনও কখনও লম্বা হতে পারে। #শারীরিকভাবে বলতে,বৃশ্চিক লগ্নের মানুষ বেশ বলিষ্ঠ হয় এবং প্রায়ই চওড়া দৃঢ় কাঁধ থাকে। যে কোন ক্ষেত্রে,তারা ভাল নির্মিত এবং খুব প্রতিরোধী হন। মুখ বর্গক্ষেত্র হয় সুস্পষ্ট বৈশিষ্ট্যর সঙ্গে,তীক্ষ্ন এবং চৌম্বক চোখ, এবং উত্তমরূপে সংজ্ঞায়িত কামুক ঠোঁট। চুল প্রায়ই বাদামী এবং পুরু হয়। সাধারণ হাভভাব একই সময়ে আকর্ষণ,ক্ষমতা,নির্জনতা এবং গম্ভীরতার একটি ছাপ বহন করে। #শারীরিকভাবে বলতে,ধনু লগ্নের মানুষেরা পূর্ণ এবং খোলা বৈশিষ্ট্যর সঙ্গে,খুব শক্তিশালী,লম্বা বা অধিকাংশ ক্ষেত্রে খুব লম্বা,প্রায়ই স্মিত ঠোঁট এবং পুরু চুল থাকে। তাদের আলোকিত শক্তি এবং আকর্ষণ থাকে। তারা তাদের বয়স হিসাবে বলিষ্ঠ হয়ে থাকে কারণ সমস্ত প্রকারের তাদের ওজন বাড়ার কারণকে তাঁরা অতিরিক্ত প্রশ্রয় দেন যখন তারা ত্রিশে পৌঁছান। তাদের পেশীতন্ত্র বিশেষ খেলাধুলোর হয় না। ধনু' সাধারণ চেহারা সহজাত দক্ষতা,চপলতা এবং একটি শক্তির ছাপ দেয়। তাদের চেহারা প্রফুল্ল এবং তাদের বেশভূষা হালকা কিন্তু সবসময় তাদের উদার প্রকৃতি এবং প্রসঙ্গের সঙ্গে সঙ্গতিপূর্ণ হয়। #মকর লগ্নের মানুষেরা অত্যন্ত লম্বা ও সরু, অস্থিময়,বিশ্রী উপস্থিতি এবং গড় উচ্চতার মধ্যে ছোট হন। গভীরভাবে সাজানো এবং গম্ভীর চোখের সাথে বৈশিষ্ট্যগুলি সুন্দর এবং একটি বাটালি দিয়ে কাটা মনে হয়। তাদের ভ্রু এবং বুকের ওপর শক্ত চুল থাকে।  সাধারণত বড় মাথা এবং বড় দাঁত থাকে,কখনো কখনো ঠোঁট বাইরে বেরিয়ে থাকে। সাধারণ চেহারা কঠোরতা,ঘনত্ব,গভীরতা এবং পরিপক্কতার একটি ছাপ দিয়ে থাকে।  তাদের চেহারা নিরপেক্ষতা,গাম্ভীর্য এবং সাধারণত্ব দ্বারা চিহ্নিত করা হয়ে থাকে তাদের উদ্বেগ বাস্তব এবং রুচিসম্পন্ন নয়,যেটির ওপর তারা কোন মনোযোগ দেয় না। তারা প্রায়ই একজন বিজ্ঞানী বা দার্শনিক,একটি পণ্ডিত বা একজন বিজ্ঞ ব্যক্তির অনুরূপ দেখতে হয়ে থাকে। #কুম্ভরাশি লগ্নের মানুষেরা প্রায়ই চিহ্নিত পাতলা এবং লম্বা ঝোঁকান উচ্চতা হয়ে থাকে। তাদের বড় মুখ,ঘাড়,পিঠ,পাকস্থলী,কোমর,উরু ও পায়ের পাতা থাকতে পারে। তাদের নিয়মিত এবং আনন্দদায়ক বৈশিষ্ট্যগুলো,কালো এবং পুরু চুল, এবং তাদের চুলের স্টাইল হয় প্রশান্ত বা অস্বাভাবিক হয়ে থাকে। মুখের ভাব একটি গম্ভীরতা ছায়ার সঙ্গে চমৎকার। চোখ জীবনের সঙ্গে ঝিলিমিলি এবং অদ্ভুত কিছুর জন্য Lookout হবে বলে মনে করা হয়। সমগ্র চেহারায় চপলতা এবং মৌলিকত্বের একটি ছাপ থাকে। তাদের চেহারা হয় অদ্ভুত বা গম্ভীর হতে পারে। যে কোন ক্ষেত্রে,এটি সর্বদা বিস্ময়কর হয়। #মীনরাশি লগ্নের মানুষেরা প্রায়ই হৃষ্টপুষ্ট এবং গড় উচ্চতার কারণ তারা বিভেদের পরম অভাবের একটি চিহ্ন। এটি বিভিন্ন উপস্থিতি নিতে পারেন যা রাশিচক্রের একমাত্র চিহ্ন। চোখ প্রায়ই বড়,আকর্ষণীয়, খুবই নির্দিষ্ট বা ধীর এবং প্রায় সম্মোহিত হয়। পুরো দেহ একটি ছাপ দেয় যা একরকম কুয়াশাচ্ছন্ন,রহস্যময়,হিতৈষী এবং শান্ত হয়ে থাকে। বাস্তবিক,মীনরাশি' বাহ্যিক চেহারা শ্রেণীভুক্ত করা অসম্ভব,যা সম্পূর্ণ অধরা রয়ে যায়,একভাবে তাদের ব্যক্তিত্বের জন্য!
