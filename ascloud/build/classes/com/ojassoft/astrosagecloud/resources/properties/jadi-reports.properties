
JADI_SUGGESTION_REPORT=Everyone wants a happy life. For that, we undergo many activities and do hard work to obtain prosperous results. We consult astrologers, wear gemstones and perform many other remedies. The natural remedy among all is Tree Root. We will suggest the suitable Jadi or Tree Root for you by analysing your kundli and evaluating the planetary alignments in your birth chart.
JADI_AND_ITS_IMPORTANCE=Plants play a vital role in our daily lives. These are the sources to create life on planet earth. Astronomically, plants and trees release oxygen gas and take carbon dioxide while breathing, which is the main source of human life. As we all know, we can\u2019t live without oxygen gas. If there will not be any tree or plant, we won\u2019t be able to breathe, hence causing the end of human life. Likewise, we should also consider the importance of plants and trees in holistic way. There are lots of concerns resolved through herbs. It is also used for medicinal purposes. Tree Root is one of them. <a href="http://astrology.astrosage.com/2013/11/jadi-roots-to-reach-planets-hearts.html"> Tree Root </a> is the sub part of herbs. Tree Root has its own significance in Astrology. It can be used as a remedy if there is a bad placement of planet in your horoscope. There are different types of Tree Roots defined to signify a specific planet. As we all know that there are seven major planets defined in Astrology and two nodes, namely Rahu and Ketu. Each one has a specific Tree Root to balance the environmental energies. It will be wise if you first analyse your horoscope and then wear Tree Root accordingly.Tree Root is considered as the best substitute of stone. If it is worn with an advice of an astrologer after performing important Kriyas, then it proves to be more beneficial. It can work even better than stone. Stone is much more costly and not everyone\u2019s cup of tea to wear. In that case, Tree Root is the best option for them to wear in order to achieve desired results and reduce malefic effects of any planet. You can find it easily at a cheaper price.
RECOMMENDATIONS=It is recommended for you to wear a suitable Tree Root. There are many types of jadis found in the environment. You need to find out which one suits you. It can only be done based on your planetary alignment in your birth chart or <a href="http://www.astrosage.com/freekphorary/instantchart.asp?charttype=kp"> natal chart </a>. You can consult any astrologer regarding Tree Roots. By wearing or placing jadis, your weak areas will improve. We have mentioned different types of roots based on your planetary alignment in your natal chart:
IMPORTANCE_OF_NATURAL_JADI=A natural jadi or root can seldom be found in markets these days. Usually, Tree Roots are being manufactured artificially and distributed throughout the world. A natural root is basically a root of a tree and, therefore, can be found in limited numbers. Also, unforeseen things like weather plays an important role and, at times, hamper the production. Artificially made Tree Roots may look quite similar to original one, but it is of no use astrologically. In order to solve this problem, we have brought 100% natural Tree Roots. You will get all the astrologically expected benefits after wearing it. These Tree Roots have undergone strict procedures in laboratory and found to be completely genuine.

TREE_ROOT_OF_BEL=It signifies Sun, a royal planet. Sun is a hot planet in astrology representing an authoritative position, leader and government. If your Sun is placed badly in your horoscope, you can wear it. The energy of planet <a href="http://www.astrosage.com/planet/sun/"> Sun </a> can be increased through the spicy and fiery herbs. The malefic effects of this planet can be reduced by wearing this. If you are struggling with the reputation, position and social status, then it can provide you the positive energy to rise high in your life.
TREE_ROOT_OF_KHIRNI=This Root signifies the planet Moon in Vedic Astrology. This planet is considered to be very important among all. It represents the mind of a person. As quoted here, \u201CIf your mind is happy, then everything seems to be happy\u201D. To have a happy and healthy life, we should be free from mental instability or illness. In short, we can say that we should have stress free life to achieve bigger success in our life. If you will wear this root, you will be free from mental tensions, depressions and anxiety. Ultimately, you will be driven towards the happy life.
TREE_ROOT_OF_ANANTMOOL	= This Tree Root signifies the planet Mars in Vedic Astrology. It is considered as the planet for energy, courage, enthusiasm and determination. Mars represents the army, soldier, policeman or anyone, who is on administrative position or holding a gun. Mars provides you the energy to fight from your enemies and the power to attain success in competitive exams. If your Mars is badly placed in your horoscope, you can wear this Tree Root. It will strengthen your qualities. You will be able to do any task without any fear. Your confidence and energy will boost up. If you do any work or if you have courage to do any work, then only you would be able to receive the result. Hence it will provide you that power to perform any task. It is highly recommended to those who wants to do better in competitive exams.
TREE_ROOT_OF_VIDHARA=This Tree Root signifies the planet <a href="http://www.astrosage.com/planet/mercury/"> Mercury </a>. Mercury is a prince in Vedic Astrology. It is considered that the logical ability comes through the planet Mercury. Mercury represents communication, reasoning, logical mind, mathematics, calculations etc. Therefore, if you are facing issues related to these areas, it is recommended you highly to wear this Tree Root. It doesn\u2019t  have any side effects like gemstones. If you wear this, it can improve your communicative ability, speech and reasoning power. In case, mercury is placed badly in your horoscope then it is recommended to you first consult with an astrologer and make him analyse your birth chart, then you can wear this Tree Root.
TREE_ROOT_OF_BANANA=This Tree Root signifies the planet Jupiter. Jupiter is the Guru among all in Vedic Astrology and considered as the most benefic planet. It represents our wisdom, family and children. If Jupiter is badly placed in your horoscope, you need to have this Tree Root in order to reduce any malefic results. Only Jupiter is the planet which doesn\u2019t do bad with the person even if it is badly placed. If it is afflicted, it will be neither good nor bad. If you are facing issues related to marriage, children, knowledge then it is recommended to you. Hence to get rid of inauspicious or bad results of Brihaspati, you should use this Tree Root. Bharangi ki Jad can also be used for Jupiter.
TREE_ROOT_OF_SHARPUNKHA=Planet Venus signifies this root. Venus is the planet which represents love, beauty, art, relationships, girlfriend and marriage within a horoscope. If Venus is badly placed in your horoscope, you probably would be facing issues related to these areas. In that case, you can wear this Tree Root. If the placement of Venus is good in your horoscope, you can use this Tree Root in order to increase the strength of Venus. It can be used as an alternative of Diamond. Though, Diamond can be recommended only to those who have positive placement of planet Venus in their natal chart. Wearing Diamond can have side effects also. So you need to first consult with an astrologer before wearing this, whereas Tree Root has no side effects. The Tree Root of Arand Mool can also be used for Venus.
TREE_ROOT_OF_BICHUA=This Tree Root signifies the planet \u201CSaturn\u201D. Saturn is the planet known for its judgment. Saturn is a slow moving planet. It provides results to the person during the later part of life. It is all about delay due to its slowness. It is associated with restrictions and limits. It is considered as the malefic planet in Vedic Astrology. It results in fear, anxiety, depression and other negative aspects related to growth, career, education in the native. If Saturn is placed badly, it would show its complete malefic nature to the native. Tree Root is the natural remedy to overcome the bad phases caused due to Saturn. If in case Saturn is placed positively, it can bless the person. You can use this Tree Root to increase the strength of Saturn in order to attain quick and better results. Dhature ki Tree Root can also be used to balance the effects of Saturn.
TREE_ROOT_OF_CHANDAN=This Tree Root signifies the planet Rahu. Rahu is not a planet but basically the North node of Moon. However, It can be considered as a planet in Vedic Astrology. Rahu is the planet which inflicts the cravings about worldly desires. It represents the cleverness, Information technology, politics etc. It always wants the attention of the public. It wants all kind of comforts and luxuries items. If it is placed badly in your horoscope, you can wear this Tree Root in order to reduce the malefic effects of Rahu. Rahu is the malefic planet, it will not always bless to the person with everything. Hence to reduce the malefic effects of Rahu, it is recommended to you.  If it is placed positively, you can use this Tree Root in order to increase the strength of Rahu. Nagarmotha Jad can also be used for planet Rahu.
TREE_ROOT_OF_ASHWAGANDHA=This Tree Root signifies the planet Ketu. Ketu is not a planet. Like Rahu, it is also a south lunar node. However, it is considered as a planet in Vedic Astrology. <a href="http://www.astrosage.com/planet/ketu/"> Ketu </a> is the planet which doesn\u2019t like all the materialistic comforts. It wants to stay away from all kind of materialistic things. It is a very spiritual planet and wants Moksha. However, it is a malefic planet, which still causes struggle for a person due to its natural malefic nature. If it is placed badly in your horoscope, this Tree Root is recommended to you in order to reduce the malefic effects of Ketu. Even if it is placed positively in your horoscope, it is recommended in order to increase the strength of planet Ketu.
TREE_ROOT_OF_ARAND=Planet Venus signifies this root. Venus is the planet which represents love, beauty, art, relationships, girlfriend and marriage within a horoscope. If Venus is badly placed in your horoscope, you probably would be facing issues related to these areas. In that case, you can wear this Tree Root. If the placement of Venus is good in your horoscope, you can use this Tree Root in order to increase the strength of Venus. It can be used as an alternative of Diamond. Though, Diamond can be recommended only to those who have positive placement of planet Venus in their natal chart. Wearing Diamond can have side effects also. So you need to first consult with an astrologer before wearing this, whereas Tree Root has no side effects. The Tree Root of Sharpunkha can also be used for Venus.
TREE_ROOT_OF_DHATURE=This Tree Root signifies the planet “Saturn”. Saturn is the planet known for its judgment. Saturn is a slow moving planet. It provides results to the person during the later part of life. It is all about delay due to its slowness. It is associated with restrictions and limits. It is considered as the malefic planet in Vedic Astrology. It results in fear, anxiety, depression and other negative aspects related to growth, career, education in the native. If Saturn is placed badly, it would show its complete malefic nature to the native. Tree Root is the natural remedy to overcome the bad phases caused due to Saturn. If in case Saturn is placed positively, it can bless the person. You can use this Tree Root to increase the strength of Saturn in order to attain quick and better results. Bichua can also be used to balance the effects of Saturn.

HOW_TO_USE_TREE_ROOT_OF_BEL=<ul>     <li>       <a href="http://buy.astrosage.com/jadi-tree-roots/belmool">Bel</a>, the Root for planet Sun, can be worn around a neck or tied in an arm. </li>     <li>       It should be immersed in unboiled milk or Ganga water before it is worn. </li>     <li>       Offer Lord Shiva or Lord Vishnu white or red flowers and fragrance of incense sticks while chanting Mantra for Surya (Sun) – Oṃ Hrāṃ Hrīṃ Hrauṃ Saḥ Sūryāya Namaḥ – 108 times to energize it. </li>     <li>       After performing these rituals, it may be worn either on a Sunday morning or during Krittika, Uttara Phalguni and UttaraShada Nakshatras.</li>  </ul>
HOW_TO_USE_TREE_ROOT_OF_KHIRNI=<ul>     <li>       Khirni, the Root for planet Moon, can be worn around a neck or tied in an arm. </li>     <li>       It should be immersed in unboiled milk or Ganga water before it is worn. </li>     <li>       Offer Shiva-Parvati white flowers, rice and fragrance of incense sticks while chanting Mantra for Chandra (Moon) – Oṃ Śrāṃ Śrīṃ Śrauṃ Saḥ Candramase Namaḥ – 108 times to energize it. </li>     <li>       After performing these rituals, it may be worn either on a Monday or a full moon day or during Hasta, Rohini and Shravana Nakshatras.</li>  </ul>
HOW_TO_USE_TREE_ROOT_OF_ANANTMOOL=<ul><li><a href="http://buy.astrosage.com/jadi-tree-roots/anantmool">Anantmool</a>, the Root for planet Mars, can be worn around a neck or tied in an arm. </li><li>It should immersed in unboiled milk or Ganga water before it is worn. </li><li>Offer Lord Hanuman red flowers and fragrance of incense sticks while chanting Mantra for Mangala (Mars) – Oṃ Krāṃ Krīṃ Krauṃ Saḥ Bhaumāya Namaḥ –  108 times to energize it. </li><li>After performing these rituals, it may be worn either on a Tuesday or during Mrigashira, Chitra and Dhanishta Nakshatras.</li></ul>
HOW_TO_USE_TREE_ROOT_OF_VIDHARA=<ul>     <li>       <a href="http://buy.astrosage.com/jadi-tree-roots/vidhara-mool">Vidhara</a>, the Root for planet Mercury, can be worn around a neck or tied in an arm. </li>     <li>       It should be immersed in unboiled milk or Ganga water before it is worn. </li>     <li>       Offer Lord Vishnu yellow flower and fragrance of incense sticks while chanting Mantra for Budh (Mercury) – Oṃ Brāṃ Brīṃ Brauṃ Saḥ Budhāya Namaḥ – 108 times to energize it. </li>     <li>       After performing these rituals, it may be worn either on a Wednesday or during Ashlesha, Jyeshtha and Revati Nakshatras.</li>  </ul>
HOW_TO_USE_TREE_ROOT_OF_BANANA=<ul>     <li>       Haldi, the Root for planet Jupiter, can be worn around a neck or tied in an arm. </li>     <li>       It should be immersed in unboiled milk or Ganga water before it is worn. </li>     <li>       Offer Lord Vishnu yellow flowers and fragrance of incense sticks while chanting Mantra for Brihaspati (Jupiter) – Oṃ Grāṃ Grīṃ Grauṃ Saḥ Gurave Namaḥ –  108 times to energize it. </li>     <li>       After performing these rituals, it may be worn either on a Thursday or during Punarvasu, Vishakha and PurvaBhadrapada Nakshatras.</li> </ul>
HOW_TO_USE_TREE_ROOT_OF_SHARPUNKHA=<ul>     <li>       Sharpunkha, the Root for planet Venus, can be worn around a neck or tied in an arm.</li>     <li>       It should be immersed in unboiled milk or Ganga water before it is worn. </li>     <li>       Offer Goddess Laxmi white flowers and fragrance of incense sticks while chanting Mantra for Shukra (Venus) – Oṃ Drāṃ Drīṃ Drauṃ Saḥ Śukrāya Namaḥ – 108 times to energize it. </li>     <li>      After performing these rituals, it may be worn either on a Friday or during Bharani, Purva Phalguni and PurvaShada Nakshatras.</li>  </ul>
HOW_TO_USE_TREE_ROOT_OF_BICHUA=<ul>     <li>       Bichua, the Root for planet Saturn, can be worn around a neck or tied in an arm. </li>     <li>       It should be immersed in unboiled milk or Ganga water before it is worn. </li>     <li>       Offer Lord Bhairav black sesame seeds and fragrance of incense sticks while chanting Mantra for Shani Dev (Saturn) – Oṃ Prāṃ Prīṃ Prauṃ Saḥ Śanaiścarāya Namaḥ – 108 times to energize it. </li>     <li>       After performing these rituals, it may be worn either on a Saturday after sunset or during Pushya, Anuradha and Uttara Bhadrapada Nakshatras.</li>  </ul>
