
	WHAT_IS_MOON_SIGN	= ಚಂದ್ರರಾಶಿ ಎಂದರೇನು?
	MOON_SIGN_INTRO	= ವೈದಿಕ ಜ್ಯೋತಿಷ್ಯವು ಜಾತಕಕ್ಕೆ ಸೂರ್ಯರಾಶಿಗಳಿಗಿಂತ ಚಂದ್ರರಾಶಿಗಳಿಗೆ ಹೆಚ್ಚು ಪ್ರಾಮುಖ್ಯತೆಯನ್ನು ನೀಡುತ್ತದೆ. ವಾಸ್ತವವಾಗಿ, ವೈದಿಕ ಜ್ಯೋತಿಷ್ಯವು ಹುಟ್ಟಿದ ಜಾತಕದಲ್ಲಿ ಚಂದ್ರರಾಶಿಯು ಲಗ್ನಕ್ಕಿಂತ ಬಲವಾಗಿರುವ ಸಂದರ್ಭದಲ್ಲಿ ಚಂದ್ರರಾಶಿಯನ್ನೇ ಜಾತಕದ ಕೇಂದ್ರವಾಗಿ ಪರಿಗಣಿಸಬೇಕು ಎಂದು ಘೋಷಿಸುತ್ತದೆ. ಚಂದ್ರರಾಶಿಯ ಜಾತಕಗಳು ಸೂರ್ಯರಾಶಿಗಳಿಂದ ಬಹಿರಂಗಪಡಿಸಲು ಸಾಧ್ಯವಿಲ್ಲದ ವ್ಯಕ್ತಿತ್ವದ ಬಗೆಗಿನ ಅನೇಕ ಗುಪ್ತ ರಹಸ್ಯಗಳನ್ನು ಬಹಿರಂಗಪಡಿಸುತ್ತದೆ.
