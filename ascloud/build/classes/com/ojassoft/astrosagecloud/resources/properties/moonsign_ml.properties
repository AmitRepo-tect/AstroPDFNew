
	WHAT_IS_MOON_SIGN	= എന്താണ് ചാന്ദ്ര ചിഹ്നം
	MOON_SIGN_INTRO	= വേദിക് ആസ്ട്രോളജി ജാതകത്തിൽ സൂര്യ ചിഹ്നത്തിനേക്കാൾ പ്രാധാന്യം ചാന്ദ്ര ചിഹ്ന്ത്തിന് നൽകുന്നു. യഥാർത്ഥത്തിൽ, ചന്ദ്രൻ ലഗ്നത്തേക്കാൾ ശക്തമാണെങ്കിൽ, ലഗ്നത്തിന് അല്ലെങ്കിൽ ഉന്നതിയുടെ ചിഹ്നത്തിനു പകരം ചാന്ദ്രചിഹ്നത്തെ ജനന ചാർട്ടിന്‍റെ കേന്ദ്രമായി പരിഗണിക്കണമെന്ന് വേദിക് ആസ്ട്രോളജി പ്രസ്താവിക്കുന്നു. സൂര്യ ചിഹ്നത്താൽ വെളിപ്പെടുത്തുവാൻ കഴിയാത്ത ഒളിഞ്ഞിരിക്കുന്ന പല വ്യക്തിത്വ രഹസ്യങ്ങളും ചാന്ദ്ര ചിഹ്ന ജാതകം വെളിപ്പെടുത്തുന്നു.
