

	 WHAT_IS_ASCENDANT				= લગ્ન શું છે?
     ASCENDANT_PREDICTION           = વેદિક જ્યોતિષમાં લગ્ન હાઉસને ઘણું મહત્ત્વનું માનવામાં આવે છે. વ્યક્તિના જન્મ સમયે આકાશમ ઉગતી રાશિને તે વ્યક્તિનું લગ્ન કહે છે. અને આ ભાવમાં આવતી રાશિને લગ્ન રાશિ કહે છે. જ્યોતિષ વડે વ્યક્તિના જીવનમાં બનતી નાનામાં નાની ઘટનાની ગણતરીમાં લગ્ન મદદરૂપ થાય છે.  જ્યારે દૈનિક, અઠવાડિક, માસિક અને વાર્ષિક આગાહીઓ ચંદ્ર અને સૂર્ય રાશિ પરથી થાય છે.
