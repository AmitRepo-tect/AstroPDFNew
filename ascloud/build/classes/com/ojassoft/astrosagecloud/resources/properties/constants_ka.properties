LALKITAB_REMEDIES_RULES                =  ಲಾಲ್ ಕಿತಾಬ್ ಪರಿಹಾರಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ನಿಯಮಗಳು
LALKITAB_REMEDIES_RULES1               = ನಿರ್ದಿಷ್ಟವಾಗಿ ಇತರ ಸಮಯದಲ್ಲಿ ಮಾಡಲು ಹೇಳದ ಹೊರತು ಎಲ್ಲಾ ಪರಿಹಾರಗಳನ್ನು ದಿನ ಬೆಳಕಿನ ಸಮಯದಲ್ಲಿ ಸೂರ್ಯನಿದ್ದಾಗ ಮಾತ್ರ ಕೈಗೊಳ್ಳಬೇಕು. ಕೆಲವರು ಪರಿಹಾರಗಳನ್ನು ಮೋಡ ಮುಸುಕಿದ ದಿನದಂದು ಮಾಡಬಾರದೆನ್ನುತ್ತಾರೆ. ಮೋಡ ಮುಸುಕಿದ ದಿನ ಹಾಗೂ ರಾತ್ರಿಗಳು ಶನಿಗೆ ಸೇರಿರುತ್ತವೆ. ಆದರೆ ಚಳಿಗಾಲಗಳು ಕಪ್ಪಾಗಿದ್ದು ಮತ್ತು ಬಹಳಷ್ಟು ಸಮಯ ಮಂದವಾಗಿರುವ ಪಶ್ಚಿಮದಲ್ಲಿ ಇಂಥ ಯಾವುದೇ ನಿರ್ಬಂಧಗಳಿರುವುದಿಲ್ಲ.
LALKITAB_REMEDIES_RULES2               = ಧೀರ್ಘ ಕಾಲ, ಅಂದರೆ 6 ದಿನ, 10 ದಿನ, 43 ದಿನಗಳ ಕಾಲ ಮಾಡಲಾಗುವ ಪರಿಹಾರಗಳನ್ನು ಯಾವುದೇ ವಿರಾಮವಿಲ್ಲದೇ ನಿರಂತರವಾಗಿ ಮಾಡಬೇಕು. ಪರಿಹಾರದಲ್ಲಿ ಅಂತರ ಬರಬಹುದೆನ್ನುವ ಯಾವುದೇ ಅನುಮಾನ ಬಂದಲ್ಲಿ ಮನೆಯಲ್ಲಿ ಹಾಲಿನಲ್ಲಿ ತೊಳೆದ ಸ್ವಲ್ಪ ಅಕ್ಕಿಯನ್ನು ಇಟ್ಟುಕೊಳ್ಳುವುದು ಒಳ್ಳೆಯದು. ಅದು 43 ದಿನಗಳ ಪರಿಹಾರವಾಗಿದ್ದಲ್ಲಿ ಹಾಗೂ ನೀವು ನಾಲ್ಕು ದಿನಗಳ ಕಾಲ ಪ್ರಯಾಣಕ್ಕಾಗಿ ಹೋಗಬೇಕಾಗಿದ್ದು ಪರಿಹಾರ ಮಾಡಲು ಸಾಧ್ಯವಾಗದಿದ್ದಲ್ಲಿ ನೀವು ಮರಳಿ ಬಂದ ಮೇಲೆ ಪರಿಹಾರವನ್ನು ಪುನಃ ಪ್ರಾರಂಭಿಸಬಹುದು. 
LALKITAB_REMEDIES_RULES3               = ಒಂದು ಸಮಯದಲ್ಲಿ ಒಂದೇ ಪರಿಹಾರ ಮಾಡಿ. ಮೊದಲ ಪರಿಹಾರ ಮುಗಿದ ನಂತರ ಮುಂದಿನ ಪರಿಹಾರ ತೆಗೆದುಕೊಳ್ಳಿ. ಪ್ರಸ್ತಾಪಿಸಿದ್ದಲ್ಲಿ ಪರಿಹಾರದ ಅನುಕ್ರಮವನ್ನು ಅನುಸರಿಸಿ. ಈಗಾಗಲೇ ಹೇಳಿರದಿದ್ದಲ್ಲಿ ಪರಿಹಾರದ ಅನುಕ್ರಮದ ಅತ್ಯುತ್ತಮ ವಿಧಾನವೆಂದರೆ ಮೊದಲು ಒಂದು ದಿನದ ಪರಿಹಾರ ಮಾಡಿ ನಂತರ ಸುದೀರ್ಘ ಪರಿಹಾರ ಮಾಡುವುದಾಗಿದೆ. 
LALKITAB_REMEDIES_RULES4               = ಮುಂದಿನ ಪರಿಹಾರ ಪ್ರಾರಂಭಿಸುವ ಮೊದಲು ಕೆಲವು ದಿನಗಳ ವಿರಾಮ ನೀಡಿ. ಸಾಧ್ಯವಾದರೆ, ಒಂದು ವಾರದ ನಂತರ ಆರಂಭಿಸಿ. ಮತ್ತು ಅಂತಿಮವಾಗಿ ಜಾತಕನ ಪರವಾಗಿ ರಕ್ತ ಸಂಬಂಧಿಯು ಪರಿಹಾರ ಕೈಗೊಳ್ಳುತ್ತಿದ್ದಲ್ಲಿ ಅವರು ತಾನು ಈ ಪರಿಹಾರವನ್ನು ಇವರಿಗಾಗಿ ಕೈಗೊಳ್ಳುತ್ತಿದ್ದೇನೆ ಎಂದು ಒಂದು ಮಾನಸಿಕ` ಸಂಕಲ್ಪ' ಕೈಗೊಳ್ಳಬೇಕು. ಇಲ್ಲದಿದ್ದರೆ ಅದು ಅವರ ಪರಿಹಾರವಾಗುತ್ತದೆ ಮತ್ತು ಅದು ಅಪೇಕ್ಷಣೀಯವಲ್ಲ

