BIRT_HDATE_COMAPTIBILITY_P1                       = ಜನನ ದಿನಾಂಕ ಹೊಂದಾಣಿಕೆ ಕ್ಯಾಲ್ಕುಲೇಟರ್ ನಿಮ್ಮ ಪ್ರೀತಿಯ ಪಾಲುದಾರರೊಂದಿಗೆ ನಿಮ್ಮ ಹೊಂದಾಣಿಕೆಯ ಸ್ಕೋರ್ಗಳನ್ನು ಕಂಡುಹಿಡಿಯಲು ಅತ್ಯಂತ ಉಪಯುಕ್ತವಾದ ಅಪ್ಲಿಕೇಶನ್ ಆಗಿದೆ. ಈ ಕ್ಯಾಲ್ಕುಲೇಟರ್ನ ಉತ್ತಮ ಭಾಗವೆಂದರೆ ಅದರ ಲೆಕ್ಕವು ಸಂಖ್ಯಾಶಾಸ್ತ್ರವನ್ನು ಆಧರಿಸಿದೆ; ಆದ್ದರಿಂದ ನೀವು ಇದನ್ನು ನ್ಯೂಮರಾಲಜಿ ಲವ್ ಹೊಂದಾಣಿಕೆ ಕ್ಯಾಲ್ಕುಲೇಟರ್ ಎಂದು ಕರೆಯಬಹುದು. ಸಂಖ್ಯಾಶಾಸ್ತ್ರವು ಹುಸಿವಿಜ್ಞಾನದ ಒಂದು ಭಾಗವಾಗಿದೆ, ಇದನ್ನು ಪ್ರಾಚೀನ ಕಾಲದಲ್ಲಿ ಒಮ್ಮೆ ಗಣಿತಶಾಸ್ತ್ರದ ಭಾಗವಾಗಿ ಬಳಸಲಾಗುತ್ತಿತ್ತು. ಸಮಯದೊಂದಿಗೆ, ವಿಜ್ಞಾನಿಗಳು ಮತ್ತು ಗಣಿತಜ್ಞರು ಇತರ ಗಣಿತದ ಅಧ್ಯಾಯಗಳು ಮತ್ತು ಸಂಖ್ಯಾಶಾಸ್ತ್ರದ ನಡುವಿನ ವ್ಯತ್ಯಾಸಗಳ ನಡುವೆ ವ್ಯತ್ಯಾಸವನ್ನು ಹೊಂದಿದ್ದರು. ಆದ್ದರಿಂದ, ಸಂಖ್ಯಾಶಾಸ್ತ್ರವು ಮತ್ತೊಂದು ವಿಜ್ಞಾನವಾಗಿ ಮಾರ್ಪಟ್ಟಿದೆ ಅಥವಾ ನಿಗೂಢ ವಿಜ್ಞಾನವೆಂದು ಹೇಳುತ್ತದೆ. ಅಲ್ಲಿಂದೀಚೆಗೆ, ನಾಮಕರಣವನ್ನು ನಮಗೆ ಎಲ್ಲರಿಗೂ ಭವಿಷ್ಯವನ್ನು ಕಂಡುಹಿಡಿಯಲು ಬಳಸಲಾಗುತ್ತಿದೆ.
