

	 THANKS							= നന്ദി

	 THANK_YOU_FOR_RECOMMENDATION	= നിർദ്ദേശങ്ങൾക്ക് നന്ദി
	 REFER_FRIEND					= ഒരു സുഹൃത്തിനെ നിർദ്ദേശിക്കുക 
	 RECOMMEND_THIS_WEBSITE			= ഈ വെബ്സൈറ്റിനെ ശിപാർശ ചെയ്യുക
	 INTROTEXT						= നിങ്ങളുടെ സ്നേഹം ഞങ്ങളെ ഇൻറ്റർനെറ്റിലെ ഏറ്റവും പ്രശസ്തമായ വേദിക്ക് ജ്യോതിഷ വെബ്സൈറ്റാക്കി മാറ്റിയിരിക്കുന്നു. സാധ്യമാകുന്ന അത്രയും ജനങ്ങളിലേക്ക് ജ്യോതിഷത്തിന്‍റെ പ്രയോജനങ്ങൾ എത്തിക്കുവാനായി ഞങ്ങൾ ഞങ്ങളുടെ എല്ലാ സേവനങ്ങളും സൗജന്യമാക്കിയിരിക്കുന്നു. കൂടാതെ ഈ ധാർമ്മികമായ കാര്യത്തിൽ, നിങ്ങളുടെ സുഹൃത്തുക്കളോടും കുടുബാംഗങ്ങളോടും ഈ വെബ്സൈറ്റിനെ കുറിച്ച് നിർദ്ദേശിക്കുക എന്ന ഒരു ചെറിയ സഹായം നിങ്ങളിൽ നിന്നും വേണം. താഴെ കൊടുത്തിരിക്കുന്ന ഫോം പൂരിപ്പിച്ചുകൊണ്ട് ഈ വെബ്സൈറ്റിനെ കുറിച്ചുള്ള വിവരം മറ്റുള്ളവരിലേക്കു ദയവായി കൈമാറുക. നിങ്ങൾക്ക് നിങ്ങളുടെ സുഹൃത്തുക്കളോടും ബന്ധുക്കളോടും ഈ സൈറ്റിനെ നിർദ്ദേശിക്കുവാൻ താത്പര്യപ്പെടാം.
	 YOUR_NAME						= നിങ്ങളുടെ പേര്
	 YOUR_EMAIL_ID					= നിങ്ങളുടെ ഈമെയിൽ ഐ.ഡി
	 YOUR_FRIENDS					= നിങ്ങളുടെ സുഹൃത്തുക്കൾ
	 EMAIL_ID						= ഈമെയിൽ ഐ.ഡി
	 SEND							= Send
	 BACK_TO_REFER_FRIEND_PAGE		= പിറകിലോട്ട് സുഹൃത്തിനെ നിർദ്ദേശിക്കുന്നതിനുള്ള പേജിലേക്ക് പോവുക

