

	 LK_Rin_TEXT					= లాల్ కితాబ్ ఋణాలు (అప్పులు) మీ లాల్ కితాబ్ కుండలిపై ఆధారపడి ఉంటాయి
	 RINS							= పూర్వీకుల ఋణం#స్వీయ ఋణం#తల్లి ఋణం#మహిళఋణం#సోదరుడు లేదా బంధువుల ఋణం#కుమార్తె ఋణం#పీడించువాని ఋణం#గర్భస్థ శిశువు ఋణం#ప్రకృతి ఋణం
	 LK_FOREFATHER_DEBTS_SYMPTOM	= లాల్ కితాబ్ ప్రకారం, శుక్రుడు, బుధుడు, రాహువు రెండవ, ఐదవ, తొమ్మిదవ లేదా పన్నెండవ గదిలో ఉంటే ఆవ్యక్తి పూర్వీకుల ఋణాలతో బాధపడతాడు.
	 LK_FOREFATHER_DEBTS_REASON		= పెద్దవారు కుటుంబ పురోహితుని మార్చి ఉండవచ్చు.
	 LK_FOREFATHER_DEBTS_INDICATION = పక్కనే ఉన్న దేవాలయం లేదా రావి చెట్టును నాశనం చేసి ఉండవచ్చు.
	 LK_FOREFATHER_DEBTS_REMEDY		= 1. ఒకేరోజులో రక్తసంబంధీకులందరి నుండి రూపాయ నాణాన్ని సేకరించి, ఒక దేవాలయంలో దానంగా ఇవ్వాలి.<br/>2. మీ ఇంటిలో రావి చెట్టు ఉంటే, దానికి నీరు పోసి సేవచేయాలి.
	 FATHER_DEBTS_FALSE				= మీ జాతకంలో పూర్వీకుల ఋణాలు లేవు.
	 FATHER_DEBTS_TRUE				= మీ జాతకం మీ పూర్వీకుల ఋణాలద్వారా ప్రభావితం కావచ్చు. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే, మీ రక్త సంబంధీకులకు కూడా వారి జాతకాలలో అలాంటి కలయిక ఉంటే, మీరు పైన ఇవ్వబడిన పరిహారాలను చేయాలి.
	 LK_SELF_DEBTS_SYMPTOM			= లాల్ కితాబ్ ప్రకారం, శుక్రుడు, శని, రాహువు, కేతువు, ఒక జాతకంలో ఐదవ గదిలో ఉంటే, ఆవ్యక్తి స్వీయ ఋణంతో బాధపడుతుంటాడు. 
	 LK_SELF_DEBTS_REASON			= మీ పూర్వీకులు మరియు పెద్దవారు, సాంప్రదాయక కుటుంబ ఆచారాలకు నిబద్ధులు కాకపోతే మరియు దేవుని పై నమ్మకాన్ని కోల్పోయి ఉండవచ్చు.
	 LK_SELF_DEBTS_INDICATION		= ఇంటి కింద ఫైర్-ప్లేస్ ఉండినా లేదా పైకప్పులో ఎక్కువ రంధ్రాలు ఉండి సూర్యకాంతి నేరుగా లోపలికి వచ్చినా.
	 LK_SELF_DEBTS_REMEDY			= 1. కుటుంబ సభ్యులందరి (రక్త సంబంధీకులు) నుండి సమానమైన మొత్తాన్ని చందాలుగా సేకరించి యజ్ఞం నిర్వహించండి.
	 SELF_DEBTS_FALSE				= మీ జాతకంలో స్వీయ-ఋణాలు లేవు.
	 SELF_DEBTS_TRUE				= మీ జాతకంలో స్వీయ-ఋణాల ద్వారా ప్రభావితం కావచ్చు. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే, మీ రక్త సంబంధీకులకు కూడా వారి జాతకాలలో అలాంటి కలయిక ఉంటే, మీరు పైన ఇవ్వబడిన పరిహారాలను చేయాలి.
	 LK_MOTHER_DEBTS_SYMPTOM		= లాల్ కితాబ్ ప్రకరం, జాతకంలోని నాలుగవ గదిలో కేతువు ఉన్నపుడు, ఆ వ్యక్తికి తల్లి ఋణ ప్రభావం ఉండవచ్చు.
	 LK_MOTHER_DEBTS_REASON			= మీ పూర్వీకులు తమ తల్లిని నిర్లక్ష్యం చేసి ఉండవచ్చు లేదా హింసించి ఉండవచ్చు లేదా బిడ్డ పుట్టిన తరువాత ఆమెను ఆ బిడ్డనుండి వేరు చేసి ఉండవచ్చు, లేదా తల్లి దు:ఖాన్ని పట్టించుకోకపోయి ఉండవచ్చు. 
	 LK_MOTHER_DEBTS_INDICATION		= దగ్గరలోని బావి లేదా నదిని పూజించుటకు బదులుగా, మురికి మరియు చెత్త కొరకు ఉపయోగించి ఉండవచ్చు.
	 LK_MOTHER_DEBTS_REMEDY			= 1. రక్తసంబంధీకులందరి వద్ద నుండి సమానమైన వెండిని తీసుకొని, ఒకేరోజులో నదిలోనికి వేయాలి.
	 MOTHER_DEBTS_FALSE				= మీ జాతకంలో తల్లి ఋణాలు లేవు.
	 MOTHER_DEBTS_TRUE				= మీ జాతకం, మీ తల్లి ఋణాల ద్వారా ప్రభావితం కావచ్చు. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే, మీ రక్త సంబంధీకులకు కూడా వారి జాతకాలలో అలాంటి కలయిక ఉంటే, మీరు పైన ఇవ్వబడిన పరిహారాలను చేయాలి.
	 LK_WOMAN_DEBTS_SYMPTOM			= లాల్ కితాబ్ ప్రకారం, రవి, చంద్రుడు, రాహువు, జాతకంలోని రెండవ లేదా ఏడవ గదిలో ఉన్నపుడు, ఆవ్యక్తి స్త్రీ ఋణంతో బాధపడుతూ ఉండవచ్చు.
	 LK_WOMAN_DEBTS_REASON			= దీనికి కారణం, మీ పూర్వీకులు లేదా పెద్దవారు పగతో గర్భిణీ స్త్రీని హత్య చేసి ఉండవచ్చు.
	 LK_WOMAN_DEBTS_INDICATION		= ఇంటిలో దంతాలతో కూడిన జంతువులు, అంతే ఆవు ఉండాలి లేదా పశువులపై అసహ్యం ఉన్నవారు. 
	 LK_WOMAN_DEBTS_REMEDY			= 1. రక్తసంబంధీకులందరినుండి సమానమైన మొత్తాన్ని సేకరించి ఆ ధనంతో ఒకేరోజులో 100 ఆవులకు రుచికరమైన ఆహారాన్ని తినిపించండి.
	 WOMAN_DEBTS_FALSE				= మీ జాతకంలో స్తీ ఋణాలు లేవు.
	 WOMAN_DEBTS_TRUE				= మీ జాతకం, స్తీ ఋణాలద్వారా ప్రభావితం కావచ్చు. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే, మీ రక్త సంబంధీకులకు కూడా వారి జాతకాలలో అలాంటి కలయిక ఉంటే, మీరు పైన ఇవ్వబడిన పరిహారాలను చేయాలి.
	 LK_RELATIVES_DEBTS_SYMPTOM		= లాల్ కితాబ్ ప్రకారం, బుధుడు, కేతువు, జాతకంలో మొదటి లేదా ఎనిమిదవ గదిలో ఉంటే, ఆవ్యక్తి బంధువుల ఋణంతో బాధపడుతున్నట్టు అర్థం.
	 LK_RELATIVES_DEBTS_REASON		= దీనికి కారణం, మీ పూర్వీకులలో ఒకరు, పండిన పొలానికి లేదా ఇంటికి నిప్పంటించి ఉండవచ్చు, గర్భంతో ఉన్న ఎవరిదైనా దున్నపోతును చంపి ఉండవచ్చు.
	 LK_RELATIVES_DEBTS_INDICATION	= బంధువులను కలవడానికి అసహ్యం, పిల్లల పుట్టినరోజులకు, పండుగలకు మరియు ఇతర ఆనందకర క్షణాలకు రాకుండా దూరంగా నివసించడం.
	 LK_RELATIVES_DEBTS_REMEDY		= 1.రక్తసంబంధీకులందరి నుండి సమానమైన ధనాన్ని సేకరించి, దానిని ఇతరులకు సహాయం కొరకు ఒక హకీము లేదా వైద్యునికి ఇవ్వాలి.<BR/>2. రక్తసంబంధీకులందరి నుండి సమానమైన ధనాన్ని సేకరించి, ఆధనంతో కొనుగోలు చేయబడిన ఔషధాలను కొన్ని దాతృత్వసేవా సంస్థలకు దానం చేయాలి.
	 RELATIVES_DEBTS_FALSE			= మీ జాతకంలో బంధువుల ఋణాలు లేవు.
	 RELATIVES_DEBTS_TRUE			= మీ జాతకం, మీ బంధువుల ఋణాల ద్వారా ప్రభావితం కావచ్చు. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే, మీ రక్త సంబంధీకులకు కూడా వారి జాతకాలలో అలాంటి కలయిక ఉంటే, మీరు పైన ఇవ్వబడిన పరిహారాలను చేయాలి.
	 LK_DAUGHTER_DEBTS_SYMPTOM		= లాల్ కితాబ్ ప్రకారం, జాతకంలో చంద్రుడు, మూడవ లేదా ఆరవ గదిలో ఉన్నపుడు, ఆవ్యక్తి కుమార్తె ఋణంతో బాధపడుతూ ఉండవచ్చు.
	 LK_DAUGHTER_DEBTS_REASON		= దీనికి కారణం, పూర్వీకులు లేదా పెద్దవారు ఒక అమ్మాయిని లేదా ఎవరి సోదరినైనా హత్య చేసి ఉండవచ్చు లేదా ఆమెను హింసించి ఉండవచ్చు.
	 LK_DAUGHTER_DEBTS_INDICATION	= తప్పిపోయిన పిల్లలను అమ్మడం లేదా దానివల్ల లాభం పొందడం.
	 LK_DAUGHTER_DEBTS_REMEDY		= 1. రక్తసంబంధీకులందరూ కొనుగోలు చేయాలి మరియు పసుపుపచ్చని రంగు గల గవ్వలను కాల్చి బూడిద చేసి, అదేరోజు నదిలో ఆ బూడిదను పారవేయాలి.
	 DAUGHTER_DEBTS_FALSE			= మీ జాతకంలో కుమార్తె ఋణాలు లేవు.
	 DAUGHTER_DEBTS_TRUE			= మీ జాతకం కుమార్తె ఋణంతో ప్రభావితం కావచ్చు. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే మరియు మీ రక్త సంబంధీకులు కూడా వారి జాతకంలో అదే కలయికను కలిగి ఉంతే, మీరు పైన తెలిపిన పరిహారాలను చేయాలి.
	 LK_OPPRESSOR_DEBTS_SYMPTOM		= లాల్ కితాబ్ ప్రకారం, రవి, చంద్రుడు, బుధుడు, పదవ మరియు పదకొండవ గదులలో ఉంటే, ఆ వ్యక్తి పీడించు ఋణంతో బాధపడతాడు.
	 LK_OPPRESSOR_DEBTS_REASON		= దీనికి కారణం పూర్వీకుల లేదా పెద్దవారి మోసం మరియు ఎవరిదైనా ఇంటిని తీసేసుకోవడం మరియు ఏరకంగానూ అతని చెల్లించక పోవడం అయి ఉండవచ్చు.
	 LK_OPPRESSOR_DEBTS_INDICATION	= ఇంటి ప్రధాన ద్వారం దక్షిణ దిక్కున ఉంటుంది, లేదా ఆ భూమి, కుమారుడు లేని వారి వద్దనుండి తీసుకోబడి ఉంటుంది, లేదా ఆ ఇల్లు ఒక రోడ్డుపై లేదా బావిపై నిర్మించబడి ఉంటుంది.
	 LK_OPPRESSOR_DEBTS_REMEDY		= 1. 100 విభిన్న ప్రాంతాలలోని చేపలకు ఆహారం అందివ్వండి లేదా 100 కార్మికులకు ఆహారం అందివ్వండి. 
	 OPPRESSOR_DEBTS_FALSE			= మీ జాతకంలో పీడించువారి ఋణాలు లేవు.
	 OPPRESSOR_DEBTS_TRUE			= మీ జాతకం పీడించువారి ఋణాలతో ప్రభావితం అయి ఉండవచ్చు. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే, మీ రక్త సంబంధీకులకు కూడా వారి జాతకాలలో అలాంటి కలయిక ఉంటే, మీరు పైన ఇవ్వబడిన పరిహారాలను చేయాలి.
	 LK_UNBORN_DEBTS_SYMPTOM		= లాల్ కితాబ్ ప్రకారం, రవి, శుకుడు, బుధుడు, ఒక జాతకంలోని పన్నెండవ గదిలో ఉంటే, అవ్యక్తి ఇంకా పుట్టని ఋణతో బాధపడుతూ ఉంటాడు.
	 LK_UNBORN_DEBTS_REASON			= దీనికి కారణం, పూర్వీకులు లేదా పెద్దవారు వారి అత్తమామలకు లేదా ఒక బంధువుకు నమ్మకద్రోహం చేసిన ఫలితంగా వారి కుటుంబం నాశనం కావడం అయిఉండవచ్చు.
	 LK_UNBORN_DEBTS_INDICATION		= తలుపు మెట్టు క్రింద మురుగుకాలువ ప్రవహించడం లేదా నాశనం చేయబడిన శ్మశానం లేదా ఇంటి దక్షిణం గోడకు కలుపబడిన పొయ్యి ఉండడం. 
	 LK_UNBORN_DEBTS_REMEDY			= 1. రక్తసంబంధీకులందరినుండి ఒక్కొక్క టెంకాయను తీసుకుని, వాటిని అదే రోజున ఒక నదికి లేదా ప్రవహించు నీటికి సమర్పించాలి.
	 UNBORN_DEBTS_FALSE				= మీ జాతకంలో, ఇంకా పుట్టని ఋణాలు లేవు.
	 UNBORN_DEBTS_TRUE				= మీ జాతకం, ఇంకా పుట్టని ఋణాల ద్వారా ప్రభావితం అయింది. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే, మీ రక్త సంబంధీకులకు కూడా వారి జాతకాలలో అలాంటి కలయిక ఉంటే, మీరు పైన ఇవ్వబడిన పరిహారాలను చేయాలి.
	 LK_NATURE_DEBTS_SYMPTOM		= లాల్ కితాబ్ ప్రకారం, చంద్రుడు, బుధుడు, ఒక జాతకంలోని ఆరవ గదిలో ఉన్నపుడు, ఆవ్యక్తి ప్రకృతి ఋణంతో బాధపడుతూ ఉండవచ్చు.
	 LK_NATURE_DEBTS_REASON			= పూర్వీకులు లేదా పెద్దవారు, నిస్సహాయులైవరినైనా నాశనం చేసి ఉండవచ్చు.
	 LK_NATURE_DEBTS_INDICATION		= ఒక కుక్కను బుల్లెట్ ద్వారా చంపడం, వేరొకరి కుమారుని చంపండం, లేదా మేనల్లుడు నాశనం అయ్యేంతమటుకు అతని మోసం చేయడం.
	 LK_NATURE_DEBTS_REMEDY			= 1. రక్తసంబంధీకులందరి నుండి డబ్బుని సేకరించిన తరువాత అదేరోజు, పాల మిఠాయిలు లేదా పాయసంతో ఒక్కరోజులోనే 100 కుక్కలకు ఆహారం అందించండి<br/> 2. దగ్గరలో నివసిస్తూ ఉన్న, చిన్నవయస్సులోనే విధ అయిన ఒక మహిళకు సేవ చేసి ఆమె ఆశీర్వాదాలు పొందుతూ ఉండండి.
	 NATURE_DEBTS_FALSE				= మీ జాతకంలో ప్రకృతి ఋణాలు లేవు.
	 NATURE_DEBTS_TRUE				= మీ జాతకం ప్రకృతి ఋణాల ద్వారా ప్రభావితం కావచ్చు. పైన తెలుపబడిన సూచనలు మీకు వర్తిస్తే, మీ రక్త సంబంధీకులకు కూడా వారి జాతకాలలో అలాంటి కలయిక ఉంటే, మీరు పైన ఇవ్వబడిన పరిహారాలను చేయాలి.
	 ANCESTRAL_DEBTS				= పూర్వీకుల ఋణాలు
	 RinIntroduction				= లాల్ కితాబ్ ప్రకారం, ఋణాలు అనేవి ఒక జాతకం యొక్క అతిపెద్ద బలహీనతగా పరిగణించబడతాయి. పూర్వీకుల ఋణాలు అంటే పూర్వీకుల పాపాలు చేయడం వలన అతనికి ప్రభావం ఉంటుంది. మరోరకంగా, వేరొకరి ద్వారా చేయబడిన తప్పులను బంధువులు సహించాల్సి ఉంటుంది. వ్యక్తి జాతకంలో చూపబడిన ఋణాలు ఇతర బంధువు యొక్క జాతకంలో కూడా చూపబడుతుంది. సాధారణంగా మొత్తం కుటుంబమంతా ఋణాల వలన బాధపడతారు మరియు పరిహారాలు కూడా మొత్తం కుటుంబం సహాయంతో చేయాలి. రాజయోగం (రాజస కలయిక) ఉన్న వ్యక్తి కూడా, తన ఋణాలు ఉన్న గ్రహాలు చెడు ఫలితాలు మాత్రమే ఇస్తాయి.
	 LK_REASON						= కారణం
	 LK_INDICATION					= సూచన
