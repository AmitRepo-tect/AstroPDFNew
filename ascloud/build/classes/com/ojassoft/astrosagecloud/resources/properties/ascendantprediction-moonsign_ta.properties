    HEALTH_PREDICTION                          = மேஷ ராசியை லக்னமாகக் கொண்ட நபர்கள் அடிக்கடி தலைவலி, குறிப்பாக ஓற்றைத்தலைவலி, வெயிலால் வெப்பத்தாக்குதல் முகம் சம்பந்தப்பட்ட நரம்பு வலி, மனத்தாழ்வு நிலை போன்ற நோய்களின் பாதிப்புக்கு உள்ளாவார்கள்.  அவர்கள் அசீரணம், நரம்புக் கோளாறு போன்ற நோய்களால் மருந்துவ சிகிச்சைக்கு உள்ளாக நேரிடும் மற்றும் அவர்களின் முன்பின் ஆராயாமை, எதிலும் முழு உடல் ஈடுபாடு போன்ற குணங்கள் விபத்து மற்றும் உடலில் காயங்கள் வருவதற்கான சூழ்நிலையில் கொண்டு விடும். உடல் சூட்டினால் எப்போதாவது மூல நோய் போன்றவை ஏற்படலாம்.  மேஷராசியில் பிறந்த பலருக்கு பிறவியிலேயே தலைப்பகுதியிலோ அல்லது முகப் பகுதியிலோ மச்சம் காணப்படலாம். மேலும் அதிக இரத்த அழுத்தம் போன்ற இரத்த ஓட்ட சம்பந்தமான குறைபாடுகளை உண்டுபண்ணி விடும்.#ரிஷப ராசி  அடிப்படையில் ஒரு வலுவான , ஆரோக்கியமான ராசி என்றாலும் இந்த ராசியில் வாழ்நாள் முழுவதும் பிரச்சினைகளை ஏற்படுத்தும் பலவீனமான புள்ளிகள் இடம் பெற்றுள்ளன. பெரும்பாலும் நரம்பு மண்டலம் தொடர்பான நோய்களாலேயே பாதிக்கப்படுகின்றனர்.  குறிப்பாக அவர்களில்  மே மாதத்தில் பிறந்த  பலரை , அதிக எடையுள்ளவர்களாக  காண முடியும்.  அவர்கள் பாலியல் நோய்க்கு  இரையாகலாம்.  இந்த ராசியை லக்னமாக உடையவர்கள், வாய் முதுகெலும்பு, கீழ் தாடை மற்றும் பற்கள், தாடை மற்றும்  சுவைப்புலன் ஆகிய பிரச்சினைகளுக்கு உள்ளாகின்றனர்.   இத்துடன் சிறுநீரகங்கள், பிறப்புறுப்புகள் மற்றும் சிறுநீர்ப்பை, கழுத்துப் பிடிப்பு,  தொண்டையில் புண்  மற்றும் காது வலி  ஆகிய  சிக்கல்கள்  ரிஷப ராசியில் பிறந்தவர்களுக்கு பொதுவானதாக இருக்கிறது.#பதட்டம், அவநம்பிக்கைத்தனம், சாதுவான, அல்லது  அத்துடன் கூட பொறுமையற்ற தன்மை  ஆகியவை இந்த  ராசியின் இயல்பாகும்.   காசநோய், ஆஸ்துமா மற்றும் இரத்த சோகை முதலியன பொதுவான பிரச்சினைகளாகும். இந்த ராசிக்காரர்களுக்கு நரம்பு மற்றும் சுவாச கோளாறுகள், குறிப்பாக கேட்கும் உணர்வில் குறைபாடுகள்  ஏற்பட வாய்ப்புகள் அதிகமுள்ளன.  இத்துடன் சுவாச பிரச்சனைகள் மற்றும்  நரம்பு நிலைகளில்  பல்வேறு விதமான  கோளாறுகள் பொதுவாக காணப்படும்.#கடக ராசியை லக்னமாகக் கொண்டவர்களுக்கு  இருமல், அஜீரணம், வாயு, மற்றும் வயிற்றுப் பகுதியில் பொதுவான பிரச்சினைகள், கல்லீரல் மற்றும் குடல்கள் ஆகியவற்றில் சிக்கல்கள் ஏற்பட வாய்ப்புகள் இருக்கின்றன. அவர்கள் அடிக்கடி உணர்ச்சி வசப்படுவதால் ஏற்படும் மனவாட்டம் மற்றும் வெறி, மன தளர்ச்சி போன்ற உணர்ச்சி கோளாறுகளால் மிகவும் பாதிப்பு அடைந்த நபர்களாக இருப்பார்கள். அவர்களது  அதிகப்படியான உணர்திறனானது பலவீனமான செரிமானம், இரைப்பை அழற்சி மற்றும் மற்ற வயிற்று நோய்களை ஏற்படுத்தும், மற்றும் மனப்பாங்கானது  இருமல்கள்  மற்றும் பார்வை பலவீனமடைந்த மனப்போக்கிலேயே காணப்படும்.#சிம்ம ராசியை லக்னமாகக் கொண்டவர்களுக்கு  முக்கியமாக இதயம் சம்பந்தப்பட்ட நோய்களினால் இடையூறுக்கு உள்ளாவார்கள் மற்றும் இரத்த உறைவு அல்லது மற்ற இடையூறுகள் மூலம் மிக தீவிரமாக தடை செய்யப்படுவதால்  அவை மாரடைப்புக்கு வ்ழிகாட்டிவிடும்.  நரம்பு பதற்றம் இதயத்தை பாதிக்கும் படபடப்பு போன்றவைகளில் கொண்டு சேர்த்து விடும்.  முதுகு மற்றும் நுரையீரலில் வலி, முதுகுப் பகுதியில் பிரச்சனைகள், இதயம் மற்றும் இரத்த நோய்கள், விலா மற்றும் பக்கங்களில் உடல் நல பாதிப்பு, வலிப்பு போன்ற உணர்விழப்பு, கடுமையான முறையில் எரியும் காய்ச்சல், மற்றும் கண்களில் சில பிரச்சனைகள் ஆகியவை சிம்ம லக்ன தொடர்பான நோய்களாகும்.#குடல்கள் மற்றும் மலச்சிக்கல் ஆகிய பிரச்சினைகள் பொதுவாக கன்னி லக்னத்தில் பிறந்தவர்களின் புகார்களாகும்.  மனநிலை ஊசலாட்டம் மற்றும் அவ்வப்போது ஏற்படும் மனச்சோர்வானது சுற்றியுள்ள பகுதியில் மற்றவர்களை மோசமாக பாதிக்கும். இத்துடன் கன்னியை லக்னமாக கொண்டவர்களுக்கு  தமது பாலியல் உறுப்புக்களில் சிக்கல் இருக்கலாம். அவர்களின் வயிறுகள் அவர்களது உணவு முறை பற்றி கவனமாக இருக்க வேண்டும் என எச்சரிக்கும் ஏனெனில் விருந்தோம்பும் சமயத்தில் வழக்கத்துக்கு மாறான கவர்ச்சியான உணவுகள் அவர்களின்ஆர்வத்தை  தூண்டும் போது தீவிர கவனத்துடன் செயல்படவேண்டியது அவசியமாகும்.#பெரும்பாலான துலாம் லக்னத்தில் பிறந்தவர்கள், புறத்தூண்டுதலினால் தூக்கமின்மை, விருந்துணவு மற்றும் மது அதிகமாக உட்கொள்ளுவதிலேயே கவனம் செலுத்துபவர்களாக இருக்கக் கூடும்.  துலாம் சிறுநீரகங்கள் மற்றும் தோல் மூலம் கழிவுப் பொருள்கள் வெளியே செல்வதற்கான செயல்பாடுகள் மீது ஆதிக்கம் செலுத்துகிறது மற்றும் இடுப்பு பகுதி, தொடை, சிறுநீரகச்சுரப்பிகள், இரத்த நாளங்கள் ஆகிய உடல் பகுதிகள் மீது ஆதிக்கம் செலுத்துகிறது. இத்துடன் துலாம் சிறுநீரகங்கள், முதுகு மற்றும் கருப்பைகள் மீதும் ஆதிக்கம் செலுத்துகிறது.  இவர்களுக்கு கீழ் முதுகில் வலி, மற்றும் அதிகமான சர்க்கரை நோய் அல்லது விருந்துணவு மூலம் ஏற்படும் பிரச்சினைகள் பொது உடல்நிலை உபாதைகளாக அமையும்.#விருச்சிகம் இனப்பெருக்க உறுப்புகள் மற்றும் கழிவுறுப்பு பகுதிகளை ஆதிக்கம் செய்கிறது.  இத்துடன் விருச்சிகம் மூக்கு மற்றும் நாசி எலும்புகள், அந்தரங்க பகுதிகள், பிறப்புறுப்புகள் மற்றும் ஹீமோகுளோபின் ஆகியவற்றையும் ஆதிக்கம் செய்வதுடன், இடுப்பு மற்றும் இனப்பெருக்கம் மற்றும் சிறுநீர் அமைப்புகளையும் நிர்வாகிக்கிறது.  சிறுநீர்ப்பை கற்கள் அல்லது பிறப்புறுப்புக்கள், கல்லீரல், சிறுநீரகங்கள் மீது நோய்களின் மூலம் பாதிப்பை உள்ளாக்குகிறது. மூலம், புண்கள் ஆகியவை விருச்சிக லக்ன மக்கள் அனுபவிக்கும் வியாதிகளாக உள்ளன.#தனுசு லக்ன நோய்கள் குறிப்பாக இடுப்பு மற்றும் தொடைகளை உள்ளடக்கியது.  இந்த ராசியுடன் முதுகு வலி நீண்ட தொடர்புடையதாக  இருந்து வருகிறது.  நுரையீரல் தொடர்பான வியாதிகள் மற்றும் காய்ச்சல் வரும் அறிகுறிகள்  ஆகியவைகள் கூட குறிப்பிடத்தக்கவைகளாக  உள்ளன. அளவுக்கதிகமான விருந்துணவு மற்றும் மதுபானம் அருந்துதல் போன்றவை சில நேரங்களில் இடுப்புப் பகுதியில் மூட்டு வலிகளுக்கு வழிவகுக்கின்றது.#மகர  மக்கள்  காற்று மூலம் எழும் நோயினால்  பாதிக்கப்படுகின்றனர்.  மகர லக்ன மக்கள் நோய் விளைவிற்கு வளைந்து கொடுக்க தயாராக இருப்பதில்லை. ஆனால் அவர்கள் உடம்பானது  ஒரு முறை வியாதியை மேற்கொண்டால் அந்த அறிகுறிகளை கருத்திற்கொண்டு எப்பொழுதும்  காரணமின்றி ஒருவித அச்சம் தழுவிய மனத்துடன் செயலாற்றிக்கொண்டிருக்க முடியும்.  மகரம் மூட்டுகள், முடி, பல் மற்றும் தோல்  குறிப்பாக, மற்றும் நரம்பு மண்டலம் ஆகியவற்றை ஆதிக்கம் செலுத்துகிறது.  இந்த லக்னத்தில் பிறந்தவர்களுக்கு விபத்துக்கள் விளைந்தால் அவை உடைந்த எலும்புகள், சுளுக்கு, இடப்பிசகல் மற்றும் முழங்காலில் இருந்து கீழே காயப்படுத்துபவைகளாக இருக்கும்.#கும்பம் லக்னம் இரத்த ஓட்டம், மூச்சு மற்றும் கண்பார்வை ஆகியவற்றை ஆட்சி செலுத்துகிறது; மேலும் கீழ் மூட்டு எலும்புகளைக் கூட.  பெரும்பாலும் தூய்மையில்லாத  இரத்தத்தின் போக்கினால்  இரத்தம் மற்றும் இரத்த ஒட்டம் சார்ந்த நோயினால் பாதிக்கப்படுகின்றனர்.  கும்ப லக்ன மக்களுக்கு உயர்ந்த இரத்த அழுத்தம் மற்றும் இதய பிரச்சினைகள் வருவதற்கு வாய்ப்புகள் இருக்கின்றது.  கும்பம்  கணுக்கால், இரத்த ஓட்ட அமைப்பு, பிடிப்புகள், ஒவ்வாமை, எதிர்பாராத நோய் மற்றும் ஏறுமாறான நடத்தையினால் ஏற்படும் விபத்துக்கள் ஆகியவற்றை ஆட்சி செய்கிறது. அவர்கள் பல்வேறு நரம்பு கோளாறுகளால் பாதிக்கப்படுகின்றனர்.#மீனம் நாளமில்லா சுரப்பியின் அமைப்பு மற்றும் நீரிழிவு ஆகியவற்றை  செயல்படுத்துகிறது.  இந்த லக்னம் நீரிழிவு நோயினால் கால் பிரச்சினைகள் மற்றும் பிற சிக்கல்களை ஏற்படுத்தி விட முடியும்.  வீக்கம், மருந்துகளின் ஒவ்வாமையால் ஏற்படும் விளைவுகள்,  பாதத்தில் உண்டாகும் காயங்கள் மற்றும் தொடர்புடைய பிரச்சினைகள் ஆகியவை பொதுவானவை, ஆனால் மீன லக்ன மக்கள் உணர்ச்சி வசப்படுவதால் அவர்கள் உணர்ச்சி நோயால் பாதிக்கப்பட முடியும் 
    TEMPERAMENT_AND_PERSONALITY_PREDICTION     = மேஷ லக்ன மக்கள் பெரும் வலிமை மற்றும் ஆற்றல் மிகுந்தவர்கள், அவர்கள் எப்போதும் எதையும் தொடங்கி வைக்க முயற்சி எடுக்க தயாராக இருப்பார்கள். நேர்மையாக செயல்படும் தனிப்பட்ட பண்பு அவர்களின் மிக முக்கியமான அம்சமாகும். அவர்கள் இயற்கையிலேயே தலைவர்கள் ஆவர்;  அவர்கள் மற்றவரிடமிருந்து  வரும் கட்டளைகளை விரும்ப மாட்டார்கள். ஏனெனில் அவர்கள் தங்களுக்கு தாங்களே மேம்பட்டவர்கள் என நினைப்பவர்கள். அவர்களின் கவர்ச்சி அளிக்கும் திறன் என்பது அவர்களுடைய எந்த செயல்களையும் எதிர்பார்க்க இயலாத காரணமேயாகும். இந்த பண்பு சில நேரங்களில் தீவிரமான மற்றும் பலவீனமானதாகத் தோன்றும்  அதே நேரத்தில் மிகுந்த  உணர்ச்சிவசப்படக்கூடியதாகவும் இருக்கும்.ஆனால் மாறாக அவர்களை எளிதில் இணங்க வைக்கவோ அல்லது மன நிறைவுடன் மகிழ்ச்சி செய்யவோ முடியும். மேஷ லக்ன மக்களின் பேச்சு நேரடியாகவும் மற்றும் பெரும்பாலும் மிக வெளிப்படையாகவும் ஆனால் பேச்சு சாதுர்யமின்றியும் காணப்படும்.  எனவே அவர்கள் பேசும் பேச்சு பெரும்பாலும் சீற்றத்துடன் தெளிவான உச்சரிப்புடன் தோன்றுவதால் மிக எளிதாக சர்ச்சைகள் உண்டாக காரணமாகிறார்கள். அவர்கள் பிடிவாத குணமுடையவர்கள் மற்றும் அவர்களது கோபமானது திடீர் என்று எழுச்சியுடன் தோன்றுவதால் பெரும்பாலும் மக்களுக்கு ஆச்சர்யமுடையதாக காணப்படும். ஆனால் அவர்கள் அவரை நம்ப வைப்பதன் மூலம் எளிதில் இணங்க வைக்க முடியும் அவர்கள் திடீர் உணர்ச்சிக்கு ஆளாகும் இயல்பினால் சில நேரங்களில் தீவிர பிரச்சனைகளுக்கு ஆளாகிறார்கள். தண்ணீரை அதிகம் விரும்பாத அவர்கள் மற்றும் அழகு கலை மற்றும் நேர்த்தி ஆகியவற்றைப் பாராட்டுவார்கள். தன்னுடைய இலட்சிய இலக்கை முடித்த பின்பே ஓய்வெடுத்தல் போன்ற பெரும்பாலான நடவடிக்கைகளில் ஈடுபடுவார்கள். இந்த ராசியின் கீழ் பிறந்தவர்கள், விவேகமான பாச உணர்வு  மிக்கவர்கள் மற்றும்  இன்னும் சமயங்களில் உணர்ச்சி வசப்பட்டவர்களாக இருப்பார்கள்#இந்த லக்னத்தில் பிறந்தவர்களை புதிதாகப் பார்க்கும் மக்களுக்கு அவர்களின் நடத்தை காளை போன்று செயல்படுபவது போல தோன்றும்.  புதிய மக்களைச் சந்திப்பதில் அவர்களுக்கு விருப்பம் இருப்பதில்லை, ஏனெனில் இயற்கையிலேயே அமைதியான குணம் படைத்த அவர்கள் எந்த ஒரு செய்கையையும் அமைதியுடன்  செயல் படுத்துவதாலும் மற்றும்  பொதுமக்களிடம்  பழகுவதைக் குறைத்துக் கொண்டு தனது சொந்த உள் நினைவுகளுடன் செயல்பட விருப்புவதாலும்  இவை நட்புறவிற்கு தடையாக விளங்குகின்றன.  அவர்களை கையாளப்படும்போதோ அல்லது அவர்கள் சொல்வதைக் கேட்கும் போதோ கவனமாக செயல்படவில்லை எனில்  மற்றவர்களிடம் தனது சீற்றம், எச்சரிக்கை மற்றும் பழமைவாத அணுகுமுறை ஆகிய செயல்பாடுகளை பயன் படுத்திக் கொண்டிருக்க முடியும். அவர்கள் புதிய மக்களைச் சந்திக்க தயக்கம் கொள்வதால் அவர்களுக்கு பெரும்பாலும் புதிய நண்பர்கள் கிடைப்பது என்பது மிகவும் சிரமமாக அமைகிறது.  அவர்கள் நம்பகமானவர்கள் மற்றும் நடைமுறைக்கு ஒத்து நடப்பதால் பெரும்பாலும் வணிகத் தொழிலில்  நல்ல முறையில் சிறந்து செயல்படுவார்கள். இந்த மக்கள் சிற்றின்பத்தில் அதிக நாட்டமுள்ள பிரமுகர்களாக இருப்பார்கள் மற்றும் அனைத்துப் பகுதியிலும்  உடல் இன்பம் பெற நினைப்பவர்கள்.  எனினும் மறுபுறம் அவர்கள் சமயங்களில் தங்கள் சொந்த வேகத்திற்கு தக்கபடி பெருமுயற்சியுடன் கொடுக்கப்பட்ட பணியை முடிப்பார்கள். அவர்கள் மற்றவர்களுக்கு மேற்கொண்ட முயற்சிகளை பாராட்டுவதுடன் அவரவர் திறமைகளுக்கு வெளிப்படையாக மதிப்புக் கொடுப்பார்கள். சில சமயங்களில் தேவையற்ற அதிகாரத்துடன் செயல்பட முடியும். அவர்கள் விரும்பும் நபருடன் தீவிர எச்சரிக்கையுடன்  செயல் படுவதினால் மற்றவர்கள் அவர்களை விரும்பினால் கூட ரிஷபம் எளிதில் கவரக்கூடிய ராசி அல்ல. ரிஷப லக்ன நபர்கள் தங்கள் மதிப்பு மற்றும் கொள்கைகள் பற்றி மிகவும் உறுதியாக இருப்பதினால் தங்கள் அணுகுமுறையை மாற்றிக்கொள்ள மிகவும் கடினமாக இருக்கும்.  ஆயினும் அவர்களின், பாச உணர்வு, உண்மையை பாராட்டும் தன்மை, மற்றும் தங்களுக்கே உரிய தனிப்பட்ட காந்த சக்தி ஆகியவை பெரும்பாலும் மற்றவர்களைக் கவர்கிறது. அவர்கள் திடீர் உணர்ச்சிக்கு ஆளாகும் இயல்பு உள்ளவர்கள் அல்ல ஆனால் அவர்களை யரேனும் கடினமான முறையில் தள்ள முற்பட்டால் அவர்களால் எருதுகள் போன்ற சீற்றத்துடன் செயல்பட முடியும். சில நேரங்களில் அவர்கள் குணம் பாரபட்சம், பிடிவாதம் மற்றும் உண்மைக்குப் புறம்பான தோற்றத்துடன் உள்ளதாக இருக்க முடியும். அது அவர்களின் தோழர்களைத் தேர்வு செய்ய நேரம் வரும் போது மிகவும் கவனமாக இருப்பார்கள்.  அவர்களை எளிதாக மாற்ற முடியும் என்றாலும் பொய் பேசுதலை விரும்ப மாட்டார்கள்.#மிதுன லக்ன மக்கள் வழக்கம்போல மிகவும் சுறுசுறுப்பு, கவர்ச்சி மிக்க தோற்றம் ஆகியவற்றுடன் சிறந்த நாவாற்றல் பெற்ற மென்மையான பேச்சுத் திறன் மிக்கவர்கள்.  அவர்கள் மிகவும் சுறுசுறுப்புமிக்க மனநிலையையும்,  உடல் நிலையும் பெற்றிருப்பார்கள், மற்றும் அவர்கள் பிறர் பார்வைக்கு  உண்மையான தோற்றத்தை விட பெரும்பாலும் இளைமையாகவே காட்சி அளிப்பார்கள்.  அவர்கள் புதியன கண்டுபிடிப்பில் ஒரு இயந்திரமாகவே செயல்படுவார்கள்.  தங்கள் மனம் மாறும் குணத்தினால் எந்த விவகாரத்திலும் எப்போதும் ஒட்டிக்கொள்வதில்லை.  மேலும் அமைதியற்ற காரணத்தினால் எதிலும் எளிதாக சலிப்பு அடைகின்றனர் மற்றும் அவர்களால் எப்போதும் எந்த ஒரு விஷயத்திலும் நீடித்த காலம் கவனம் செலுத்த முடிவதில்லை.  தங்கள் சொந்த நோக்கங்களுக்காக மற்றவர்களை கையாளும் போக்கு அவர்களிடம் காணப்படும். அவர்களது மதிப்பு அவர்கள் தோற்றத்தின் மூலம் வெளிப்படையான ப்ரகாசத்துடனும் மன மகிழ்ச்சியுடனும் காணப்பட்டாலும்,  மிதுன லக்ன மக்கள் தங்களை எதிர்மறை குணங்களில் ஈடுபாடு செய்து விடுவார்கள் அவர்களது மனம் ஓய்வில்லாமல் மாறிக்கொண்டே இருக்கும் என்பதால்,  பிறருக்கு அவர்களின் தீய வழிமுறையானது நம்பிக்கையற்றவர்களாக ஆக்கிவிடும். இந்த அறிவாற்றல் மிதுன லக்ன மக்களை மேலாதிக்கம் செய்வதினால் அறிவாற்றல் சார்ந்த எல்லாமே அவர்களிடம் மேலும் சிறந்த மதிப்பைப் பெறுகின்றன.  தகவல் பரிமாற்றும் திறன் அவர்களுக்கு முக்கியமான ஒன்றாக உள்ளதால் , தங்களது அறிவாற்றலை பெருக்குவது அவர்களுக்கு ஒரு விசயமாக இருக்காது.  மிதுனலக்னம் அனைத்து ராசிகளை விட அடிக்கடி மிகவும் மாற்றமடைவதாக விளங்குகிறது. அவர்கள் இன்று ஒரு விருப்பத்தை முடிவு செய்த போதிலும்  மறுநாள் அவர்கள் எடுத்த முடிவில் முற்றிலுமாக மன மாற்றத்தைக் காணலாம். மிதுன லக்ன மக்களால் எதுவும் கல்லின் மீது ¿¢¨ÄÂ¡É¾¡¸ எழுதப்படவில்லை. அவர்கள் ஆன்மா சுதந்திரமயமானது ,மற்றும் எதையும் அறிய வேண்டுமென ஆர்வம் மிக்கது.  மிதுன லக்ன மக்கள் எந்த ஒரு வேலையையும் மிக அரிதாகவே முழு ஈடுபாட்டுடன் செயல்படுவார்கள். ஆனால் அவர்கள் தொடாத வேலையின் மேல் செயல்பட அவர்களுக்கு மிக அதிகமான முறையில் மன ஆர்வலைத் தூண்டும். அவர்களுக்கு சுய கட்டுப்பாடு இல்லை.#கடக லக்ன மக்களிடம் மனக்கோட்டை கட்டுதல், உள்ளுணர்வு, உணர்ச்சி மற்றும் பாதுகாப்பிற்காக பின்வாங்குதல் போன்ற தேவையான பண்புகள் நிறைந்திருக்கும். அவர்கள் இயல்பிலேயே சிறந்த உரையாடல் மற்றும் துல்லியமான திறமைகள் ஆகியவற்றை அருளாகப் பெற்றிருப்பார்கள்.  அவர்கள்,  எதையும் எளிதில் புரிந்து கொள்ளும் தன்மை, வேலயில் மிகவும் திறமை,  சுறுசுறுப்பு மற்றும் திடீரென எதிர்பாரத வகையில் மாறும் இயல்புடையவர்களாக இருப்பார்கள்.  இவைகளுடன் குறிப்பிட்ட அளவில் ஆன்மீகத்தன்மை மிகுந்தவர்களாக இருப்பார்கள்.  சிலர் ஆன்மீக அருள் உடையவர்களாகத் திகழ்வார்கள். அவர்களிடம் நினைவாற்றல் வைத்துக்கொள்ளும் திறன் மிகச்சிறந்த அளவில் இருக்கும்.  அன்பு, உணர்ச்சி மற்றும் கருணை  உள்ளம்  கொண்டவர்கள்.  குடும்ப வேலைகளில் மிகவும் ஈடுபாடு கொண்டவர்களான அவர்கள் மற்றும் அவர்களின் சொந்த திருப்திக்காக தங்கள் வீட்டின் சூழல் வலுவடைய விருப்பப்படுவார்கள்.  தனிப்பட்ட உறவில், கடக லக்ன மக்களிடம்  ஒரு பக்கம் பிடிவாத  குணம், இரக்க சிந்தனை இரண்டும் கலந்து  காணப்படுவதுடன்  உணர்ச்சி, காதல்,  எளிதில் உணர்ச்சி வசப்படக்கூடிய தன்மை மிகுந்து காணப்படும் அதே சமயம் மறுபுறம் யாருக்கும்  கீழ்படியாத குணம், எதையும் பெற வேண்டும் என விருப்பம்,  மற்றும் விசுவாசம்  ஆகிய குணநலங்கள் மிகுந்து காணப்படும்.  அவர்கள்  எதையும் விடாது நினைவில் வைத்துக்கொள்ளும் திறன் பெற்றவர்கள் மற்றும்  பிறரின் ஏளனங்களையும்  மன வேதனைகளையும்  மிக அரிதாகவே  மன்னிப்பார்கள். கடக லக்ன மக்கள்  வழக்கமாக உபயோகத்தில் உள்ள சொற்றொடராகிய "" நடந்தவைகளை மன்னித்து மறந்து விடு"" என்பதை தெரிந்து கொள்வதில்லை: அவர்களால் எப்போதும் ஒரு பிழையை மறக்க முடியாது. உணர்ச்சி இயல்புகளால் இயக்கப்படும் அவர்கள் சிறந்த நண்பர்களாகவோ அல்லது நண்பர்களிலேயே மிகவும் மோசமானவர்களாகவோ இருக்க முடியும். அவர்கள் செய்யும் செயல்கள் தெளிவுடனும் மற்றும் மிகவும் கவனத்துடனும் சமமான அளவில் அமைந்து உருவாகும்.#இந்த இராசி மண்டலத்தை லக்னமாக கொண்ட மக்கள்  ஆற்றல் மற்றும் கவர்ச்சிகரமான ஆளுமைக்கு உரிமையாளர் ஆவார்கள்.  எதையும் அடைய மேற்கொள்ளும் பேரார்வம், தைரியமான, உறுதிப்பாடு, உடன்பாடு, சுதந்திரமான மற்றும் தன்னம்பிக்கை  முதலிய தனிப்பட்ட பண்புகள் சிம்ம லக்னத்திற்குரிய எடுத்துக் காட்டாக விளங்கும். அவர்கள் நேர்மையானவர்கள் மற்றும் சிக்கலற்ற தனிச்சிறப்புடையவர்கள் மற்றும் தங்களுக்கு என்ன தேவை என்பதைப் பற்றி நன்றாக அறிந்து அதை முழுமையான உற்சாகத்துடன் தொடர்ந்து ஒரு ஊக்கத்துடன் உருவாக்க செயல் படுவார்கள்.  வழக்கமாக உணர்ச்சி வசப்பட்ட மனப்பாங்கிற்கு ஆளாகக்கூடியவர்கள்,  சில நேரங்களில் எதையும் மூடி மறைக்காமல் பேசும் ஆற்றல் உடையவர்கள் மற்றும் வெடுவெடுப்பானவர்கள், அவர்கள் அவமதிக்கபடும்பொழுதும் தொந்தரவுதரப்படும் பொழுதும் அல்லது  அராஜகமான செயலின் பொழுதும் மிகவும் மனம் புண்படுகிறார்கள். தனிப்பட்ட விமர்சனங்களால் மனம் மிகவும் புண்படக்கூடியவர்கள் மற்றும் அவர்களின் ஆளுமை அச்சுறுத்தப்படும்போது போது, அவர்களை திடீர் என்று கோபம் ஆட்டிப் படைக்க முடியும். அவர்கள் பிடிவாதமானவர்கள் மற்றும் ஒருவித நம்பிக்கையுடன் இருப்பவர்கள் அல்லது இறுக்கமான அல்லது மென்மையான செய்கையின் முலம் ஒரு நடவடிக்கையை கடைப்பிடிப்பவர்கள். உயர்ந்த குறிக்கோள் மற்றும் மனிதாபிமான தன்மைகளை தன்னகத்தே கொண்டிருப்பவர்கள். அடிப்படையில் சிம்ம லக்னமானது, வெளியேசெல்லுதல், மகிழ்ச்சி, இரக்க மனப்பான்மை, தாராளம், சுய உணர்ச்சிகள், அறிவார்ந்தவர்கள் மற்றும் பரந்த உள்ளம் கொண்டதாக அமையும். அவர்கள் ஒரு நிலையான மனஉறுதியைப்  பெற்றிருப்பார்கள் ஆனால்  சில தூண்டுதல்களால் நேர்மையை நிலை நாட்ட இயலாத ஒரு சூழ்நிலையினால் தீய மனநிலைக்கு உள்ளாவார்கள் ஆனால் கோபத்தை விரைவில் சமாதானப்படுத்த முடியும். அவர்கள் நீண்ட காலம்  மன வெறுப்புடன் இருக்கலாம் மற்றும் அவர்கள் ஒரு சுயாதீன சிந்தனையாளராகத் திகழ்வார்கள். அவர்கள் மதக் கட்டுப்பாடான கொள்கைகளை மிகவும் உறுதியாக கடைப்பிடிப்பவர்கள் ஆனால்  பிறரின் மற்ற கட்டளைகள் மற்றும் நடைமுறைகளுக்கு முன்னுரிமை அளித்து சகிப்புத்தன்மையுடன் செயல்படுவார்கள்.#கன்னி லக்னத்தில் பிறந்த மக்கள் மற்ற லக்னங்களுடன் ஒப்பிட்டுப் பார்க்கும் போது இவர்கள் மனம் விட்டுப் பேசாத தன்மை இத்துடன் பணிவான தன்மை மற்றும்  மென்மையான பேச்சுடன் செயல்படுவார்கள். அவர்கள் யார் தங்களை சமூக அந்தஸ்து மூலம் உயர் நிலைக்கு கொண்டு செல்ல உதவுவார்களோ அவர்களையே தங்கள் நண்பர்களாக தேர்ந்தெடுக்கிறார்கள்.  தடைகளை எதிர்கொள்ளும் போது, அவர்கள் அதற்கான தீர்வு காணும் வகையில் அமைதியாகவும் மற்றும் அறிவார்ந்த முறையிலும் செயல்படுகின்றனர். இந்த அமைதியானது சில நேரங்களில் அமைதியற்ற முறையிலும் திட்டமிட்டு செயல்படும் வகையில் அமைந்திருப்பதாகக் கருதப்படுகிறது.  அவர்கள் மிகவும் சிக்கலான பிரச்சினைகளை ஆராய்ந்து தீர்வு செய்யும் திறன் பெற்றவர்கள். அவர்கள் எல்லா விவரங்களையும் அறிய அற்புதமான கண்ணோட்டதைப் பெற்றுள்ளதால்  எப்பொழுதும் ஏற்படும் ஒட்டுமொத்த பிரச்சினைகளைப் பொருப்படுத்துவதில்லை.அவர்கள் மிகவும் அறிவுத்திறன் வாய்ந்தவர்கள்  மற்றும் சமயங்களில் அவர்கள் தூய்மையில்லாததும்  உண்மைக்கு புறணானதுமான  போக்கிற்கு  ஒத்துபோகும் மனப்பான்மையுள்ளவர்கள் கன்னி லக்ன மக்கள் மிகவும் நட்பு உணர்வு உள்ளவர்கள் மேலும்  பெரும்பாலும் அனைத்து விசயங்களையும் பற்றிய அறிவு உள்ளவர்களாகவும் இருப்பார்கள். பொதுவாக விழிப்புணர்வுகூடிய,   கூர்மையான, குற்றம் கண்டறிகின்ற மற்றும் அமைதியான மனப்பாங்கு உள்ளவர்கள்.அவர்கள் மிகவும் தேர்ந்தெடுக்கப்பட்ட மற்றும் வெளிப்படையான அடிப்படை முறையில் நட்பு உறவுகளை வைத்து கொள்ள விரும்புகிறார்கள். கன்னி லக்ன மக்கள் மனம், கவலைப்படுவதுடன்  மற்றும் தன் உடல் நலத்தை பற்றி காரணமின்றி அச்சம் கொள்ளும் தன்மையால் ஏற்படும் மனவாட்டத்தை நோக்கி  செல்கின்றன.  அவர்கள் மற்றவர்களுகாக தங்களையே பயனுள்ளதாக அற்பணிக்கின்றனர்.  இது சமயங்களில் தவறான முறையில் செயல்படுத்தப்படுவதால் பாதிக்கப்படக்கூடியதாகிறது.  கன்னி லக்ன மக்கள் தெளிவற்ற முறையில் சிறிய விமரிசனங்களை மேற்கொள்வார்கள் தவிர அற்ப விஷயங்களுக்காக பிடிவாதம் செய்பவர்கள் இதன் மூலம் தங்களுக்கும்  பிறருக்கும் இடையே தொந்தரவை உண்டாக்க வழி செய்யும்.#துலாம் லக்ன மக்கள், அவர்களின் பக்கம் சரியானதாக இருப்பதாக உணர்ந்தாலும் அதற்காக வீண் விவாதங்கள் செய்யாமல் , பிறருடன் ஒத்துழைத்து மற்றும் விட்டுகொடுத்து,  சமரசம்  செய்துகொள்ள விரும்பும் தன்மையை உடையவர்கள்  மற்றவர்களுடன் உண்டாகும் கருத்து வேறுபாடு அவர்களுக்கு பாதுகாப்பற்றதாகச் செய்கிறது, தவிர மன உளைச்சலையும் ஏற்படுத்துகிறது. அவர்கள் வாழ்க்கையில் அமைதியைப் பெறுவதற்காக மிகவும்  மன்றாடுவார்கள் மற்றும் அதை அடைவதற்காக என்ன செய்ய வேண்டுமோ அவற்றை  செய்து பெறமுடியும். அவர்கள் நம்பமுடியாத மற்றும் தயக்கமுடைய தன்மையுடன், வழக்கமான வேலைமுறைகளில் பொறுமையற்ற தன்மை, ஆர்வமில்லாத பெரிய திடீர் மாறுதலை விரும்பாத மற்றும் வெட்கப்படும் தன்மை வாய்ந்தவர்களாக இருக்க முடியும். துலா லக்ன மக்கள் சதாரணமாக கோபம் அடைய மாட்டார்கள் மற்றும் அவர்களின் திடீர் வெடிப்புடன் கூடிய கடுஞ்சீற்றமானது சுற்றியுள்ள அனைவரையும் அதிர்ச்சிக்கு உள்ளாக்கலாம். அவர்கள் ஒரு யதார்த்தவாதியாக இன்னும் அதைவிட ஒரு இலட்சியவாதியாக இருப்பார்கள்; அடிக்கடி பகற்கனவாக காற்றில் கோட்டை கட்டுதல் போன்ற திட்டங்களை நினைத்து சிந்தனையில் ஆழ்ந்திருப்பார்கள். துலா லக்னம் மக்கள் கலைத்திறன் வாய்ந்த மற்றும்  நாகரீகமான மற்றும் எது சரி எது தவறு என்ற எடைபோடும் மிகவும் உறுதியான கருத்துக்களையும் சிறப்பம்சமாக கொண்டிருப்பார்கள்,  மற்றும் அவர்கள் பிறப்பிலேயே சாதுர்யமானவர்கள், ஆனால் கவர்ச்சி மற்றும் உண்மையான தன்மை மிக்கவர்கள்.  பொய்யான மற்றும் இயல்பாக அமைதியை விரும்புபவர்கள்; சொகுசான வாழ்க்கை மற்றும் மற்றவர்களுடன் இணைந்து வாழும் குணநலம் மிக்கவர்கள். துலாம் லக்ன மக்கள் மிகவும்  நாகரீகமானவர்களாக கருதப்படுகின்றனர்.  அவர்கள் கவர்ச்சி மிக்கவர்கள் மற்றும் செயற்கை பண்பாடு, மனப்பூர்வமான வேண்டுகோள் மற்றும் நல்ல சுவை உணர்வுகளைப் பெற்றிருப்பார்கள். அவர்கள் சமுதாயத்துடன்  சார்ந்து செல்வதில் மிகவும் விருப்பமுடையவர்கள் ஏனெனில் அவர்களுக்கு அது மிகவும் மகத்தான சந்தோஷத்தை தருகிறது.  அவர்கள் நல்ல குறிக்கோளுடன் செயல்படுவர் மற்றும் அவர்கள் எடுக்கும் முடிவுகள் பாரபட்சமற்றதாக இருக்கும் என அறியப்படுகிறது.#விருச்சிக லக்ன மக்கள் தனது சுய விமர்சனம்,  தீவிர கவனம் மற்றும் அவர்களின் அறிவுக்கு ஒவ்வாத நிதானத்தை செலுத்தி அவற்றை  முழு வெற்றி அல்லது முழு தோல்வியின் தரங்களாகப்  பிரித்து அவர்களின் பண்புகளை அறியப் பெயர்போனவர்கள். அவர்களின் வலுவான சுய அழிவு சாதனை கொண்ட ஒரு தன்மை, பகுத்தறிவால் அறியப்படாத உணர்ச்சி ஆகியவை ஒரு சிறு தூண்டுதலாக தூண்டப்பட முடியும். அவர்கள் பெரும்பாலும் மிகவும் சந்தேகத்திற்கிடமான மற்றும் தமது அன்புக்குரியவர்கள் பற்றிய பொறாமையுள்ளவர்களாக இருப்பார்கள். அவர்களின் உணர்ச்சிவசப்பட்ட ஆற்றல், சூழ்நிலையைப் பொறுத்து அவர்கள் பின் தொடரும் எந்த வழ்க்கையையும் சிறப்பானதாகவோ அல்லது மோசமானதாகவோ திகைப்படையச் செய்கிறது. வழக்கமாக விருச்சிக லக்ன மக்கள் வலுவான மற்றும் சக்திவாய்ந்த உயிராற்றல் பெற்றிருப்பார்கள்.   இத்துடன் பிடிவாதமான தன்மை, பெருமை மற்றும் அமைதியாக இருக்கும் சக்தி வாய்ந்த தன்மையுடன் இருப்பார்கள். அவர்கள் ஒருபோதும் ஒரு இடத்திலேயே குடியேறுவதில்லை மற்றும் அவர்களுக்கு வாழ்க்கை என்றால் எல்லாம் முழுமையாக வாழ்ந்து விட வேண்டும் அல்லது அது வாழ்வே இல்லை எனலாம்.  மிக அரிதாகவே செயல்பாட்டில் ஈடுபடுவர்கள் . ஆனால் எப்பொழுதும் வெளியில் என்ன நடக்கிறது என்று அறிவார்கள். அவர்களின் கருணை மிகச்சிறந்த மற்றும் மிகவும் விசுவாசமான நண்பராக ஆக்குகிறது ஆனால் அதே சுபாவம் சில நேரங்களில் அவர்களை எதிரிகளிடம் மிகத் துரோகியாக ஆக்குகிறது.  தங்கள் முழு ஆற்றல், சுய நம்பிக்கை, லட்சியம் மற்றும் தாராள மனப்பான்மை  ஆகியவை ஒன்றாகச் சேரும் போது அவர்கள் எல்லாவற்றிலும் மற்றும் ஏதாவதிலும் மற்றவர்களைக் காட்டிலும் மேம்பட்டு விளங்குகின்றனர்.  அவர்கள் அதிகத்திறமைக்காக மற்றவர்களை கோருகின்றனர் ஆனால்  எதை தங்களால் சுயமாக செய்ய முடியவில்லையோ அதை மற்றவர்களிடம்  நீ செய்ய வேண்டும் என கேட்க மாட்டார்கள்.#பொதுவாக தனுசு லக்ன மக்கள் தெளிவான மகிழ்ச்சி நிறந்த மன நிலையுடன் எதிர்காலத்தை அணுகும் போது நன்மையே விளையும் என்ற தீராத நம்பிக்கை கொண்டவர்கள். பொதுவாக அவர்கள் நல்ல இயல்புடன்  அளவிற்கு அதிகமான வேடிக்கை மற்றும் ஒரு எழுச்சியூட்டும் தெய்வீக உணர்வு பெற்றவர்கள். தவிர்க்க இயலாத கடமை உணர்வு என்ற மன பயம் பெற்றவர்கள், தன் விருப்பின்ப நுகர்வுக்கு ஆளாகும் தன்மை, மட்டு மீறிய உணர்ச்சி ஆர்வம், முழு வளர்ச்சியை ஏற்றுக்கொள்ள மறுத்தல் போன்ற பாதகமான சூழ்நிலைகளில்,  அவர்கள் பொறுமையற்று இருக்கிறார்கள். அவர்கள் தற்செயலாக மற்றவர்களால் கருத்து வேறுபாட்டிற்கு ஆளாகின்றனர் ஏனெனில் அவசரத் தன்மை மிக்க அவர்களது உரையாடலே அதற்கு காரணமாகிறது. இத்துடன் கூட சூதாட்டம் போன்றவற்றில் விருப்பம் மிக்கவர்கள். இந்த லக்னத்தின் கீழ் பிறந்தவர்கள் வெற்றியில் திடமான நம்பிக்கை, விழைவு, உத்வேகம், உற்சாகம் மற்றும் பறந்த மனப்பான்மை போன்ற தன்மைகளால் வகைப்படுத்தப்படுகின்றனர். தனுசு லக்ன மக்கள்   துணிகரச் செயல், ஆற்றல்மிகுந்த, பல்திறப் புலமை,  துணிகரமான மனப்பான்மை மற்றும் முடிந்த அளவுக்கு அனுபவ அறிவை நீட்டிக்க முழுஆர்வம் படைத்த  தன்மைகளை பெற்றுள்ளதால் தங்கள் வாழ்க்கையைப் பற்றி உறுதியான மனோபாவத்துடன் இருப்பார்கள். அவர்கள் அடிக்கடி தேவையில்லாமல் பிறரை கவர்ச்சியூட்டி மயக்கி இழுக்கும் தனது பேச்சுத்திறனை உபயோகப்படுத்த மாட்டார்கள். அவர்கள் எல்லா திசைகளிலும் பயணம் அனுபவித்து மற்றும் அவற்றின் சூழலில் ஆய்வில் ஈடுபட விரும்புவர். அவர்கள் கெளரவமான, நேர்மையான, நம்பிக்கையான, உண்மையான, தாராளமான மற்றும் சொல்லிலும் செயலிலும் நீதி மேல் பேரார்வம் கொண்டவர்களாக இருப்பார்கள்.  அவர்கள் பொதுவாக அடக்க ஒடுக்கமானவர்கள் மற்றும் ஆன்மீகத்தில் மிக உறுதியுடன்  நேர்மையான உணர்வு கொண்டவர்கள்.  தனுசு லக்ன மக்கள் வலுவான மன உறுதி படைத்தவர்கள் மற்றும் எதையும் சிறந்த முறையில் அமைக்கும் ஆற்றல் மிக்கவர் ஆகையால் செயல்முறைக்கு ஏற்றுக்கொண்ட எந்த ஒரு பணியையும் தங்களுக்கு வெற்றிகரமான முடிவுக்கு கொண்டு வரும் திறன் படைத்தவர்களாக ஆக்குகின்றது.#மகர லக்ன மக்கள் பெரும்பாலும் சமய நெறிகளைப் பற்றிய நிகழ்ச்சிகளைப் பெரிய அளவில் பின்பற்றுவது போன்று காட்டிக்கொள்வார்கள் ஆனால் உண்மையில் அவர்கள் பிறர் நினைப்பது போல மத நெறிகளைப் போற்றுவது இல்லாமல் பாசாங்குடனேயே செயல்படுகிறார்கள். அவர்கள் தன் நலமே கருதுபவர்கள், மற்றும் தந்திரமானவர்கள், இரகசியமான மற்றும்  உறுதியான மனம் படைத்தவர்கள். அவர்கள் பிறர் சொல்வதைக் கேட்பதை விட அதிகம் பேசும் சக்தி உடையவர்கள்; இதனால் அடிக்கடி பேச்சில் வழி மாற்றம் ஏற்படுவதால் மற்றவர்களுக்கு இதன் முடிவு மனதைப் புண் படுத்துமாறு அமையும். பொதுவான மகர லக்ன மக்களிடம்  நல்ல முறையில்  நிறுவனத்தை நடத்தும் திறன்கள் பெற்றுள்ளனர்.  மேலும் சுத்தமாகவும், நேர்த்தியாகவும் காணப்படுவர், நடைமுறையில் எதற்கும் எளிதாக தலைசாய்க்க மாட்டார்கள். அவர்கள் வலிமையான பணி நெறிமுறைகளைப் பெற்று இருப்பார்கள். பொருள்சார்ந்த போக்குகள் மற்றும் திடீர் என்று ஏற்படும் மாற்றத்தை விரும்பாதவர், மரபுமுறையை தழுவும் நிலைமையை கையாள்பவர் மற்றும் அதிகாரத்தின் மேல் மிகுந்த மதிப்பு வைத்திருப்பவர்கள் ஆவார்கள். மகர லக்ன மக்கள்  லட்சியம், உள்ளார்வமிக்கவர்  மற்றும் கடமைக்காக தங்களை அர்ப்பணித்துக்கொள்பவர்கள் ஆனால் சில நேரங்களில் அவர்களிடம் பழிவாங்கும் குணாதிசயம் அமைந்திருக்கும்; சுய ஒழுக்கமுள்ளவர்கள், பொறுப்பு மற்றும் நடைமுறைக்கு ஏற்றவர்கள். சில சமயங்களில் திக்கற்ற நிலைமையில் சுய இரக்கத்தில் சென்று முடியும். விவாதிக்கும் திறன் உயர்தரமாகவும் மற்றும் அவர்களது நோக்கம் மற்றும் இலக்கு வலிமையான உணர்வுடனும் இருக்கும்.  மகர லக்ன மக்கள் மற்றவர்களிடம் விவகாரம் செய்யும் பொழுது தன்னடக்கம் உள்ளவர்களாகவும் மற்றும் மெளனம் சாதிப்பவர்களாகவும் பார்வைக்குத் தோன்றலாம் ஆனால் ஒரு தடவை அவர்கள் முழுமனதான நம்பிக்கையுடன் செயல்பட்டால்  ஒரு விசுவாசமான மற்றும் ஈடுபாடுடைய தோழனாக விளங்குவார்கள். சமுதாயம் சார்ந்தவர்கள், விரும்பும் எந்த வேலையையும் பெருமுயற்சியுடன் செய்ய தயாராக இருப்பார்கள், மற்றும் அவர்களின் சுய மரியாதையை மிகவும் முக்கியமானதாக கருதுவார்கள்.  மெய்யறிவை விட பொருள்சார்ந்த நோக்குடன் அவர்களது அணுகுமுறை இருக்கும். அவர்கள் தங்கள் சொந்த மகிழ்ச்சிக்காகவே  காதலில் ஈடுபடுவார்கள்.#ஒரு  சரியான கும்ப லக்னம் எல்லா தொடர்புகளையும் தீவிரமான ஆசையுடன் பரிமாறிக்கொள்ள முற்படும்.  பழமைவாதம்  மிக்கவர்களுடன்  உங்களது கருத்து பரிமாற்றுவதில் ஒரு கட்டுப்பாட்டினை மேற்கொள்ளவில்லையெனில்,  நீங்கள் திறமையற்றவராகவும், முரட்டுதனமானவராகவும் கருதப்படுவீர்கள் இது உங்களுக்கு கொஞ்சம் திறமையற்ற மற்றும் பண்பில்லாத நிலையை ஏற்படுத்திவிடும்.  அவர்கள் ஆர்வமிக்கவர்கள் மற்றும் கவர்ச்சிமிக்கவர்கள்; கூச்சம், உணர்வு, மென்மையான மற்றும் பொறுமை அல்லது உற்சாகமான மற்றும் சுறுசுறுப்புடன் பகட்டிக்கொள்ளும் பாங்குடைய தன்மையுடன் இருப்பார்கள். அவர்கள் மிகவும் வலுவான நம்பிக்கைகளுடன் ஆதரவு அளிப்பார்கள் மற்றும் அவர்கள் கருதுவதை போராட்டத்தின் மூலம் தெரிவிப்பார்கள்; இது தவிர அவர்கள் கற்பனையில் சஞ்சரிப்பவர்கள் மற்றும் முன்னோடிகள்.அவர்கள் மனத்தோற்றத்திற்கு பொதுவாக எந்தவித பாரபட்சமும் இல்லாமல் முற்றிலும் சகிப்புத்தன்மை வாய்ந்தவர்கள். அவர்கள் மற்றவர் சொல்வதை நன்கு கவனிப்பவர்கள் மற்றும் அவர்களது நண்பர்களுக்காக ஆழ்ந்த அக்கறை செலுத்துவர்..  அவர்கள் அன்பு மிக்கவர் தவிர கபடமற்றவர் மற்றும் கருத்தைக் கூறுவதில் அச்சமில்லாதவராகத்  தெரிகின்றவர். அவர்கள் நாகரீகமானவர்கள் மேலும் உயர்ந்த குறிக்கோளை எய்த விரும்புகிறவர்கள்;விசித்திரமான மற்றும்  நடைமுறையானவர்கள்; நல்ல தோற்றமுடையவர்கள் மற்றும் இனிய இயல்புள்ளவர்கள். புதிய கருத்துக்களை உருவாக்கும் யோசனைகளை கொண்டு வர அவர்களை கணக்கில் எடுத்துக் கொள்ள முடியும். எப்போது பிறருக்கு உதவி தேவைப்படுகிறதோ அப்போது அவர்கள் தனி வழியில் செல்வார்கள் ஆனால் உணர்ச்சி வசப்பட்டு தங்களை ஈடுபடுத்திக் கொள்ள மாட்டார்கள்.#மீனம் லக்ன மக்கள் நடைமுறைக்கு ஏற்ற மக்கள் இல்லை ஆனால் உணர்ச்சி மற்றும் இயல்பு ஊக்கத்துக்குரிய தன்மைகள் உள்ளவர்கள். அவர்கள் பல்துறை அறிவு வாய்ந்தவர்கள் தர்க்கவியல் மூலம் எதையும் தெரிந்து கொள்வதை விட புரிந்து கொள்ளும் ஆற்றல் மூலமே விஷயங்களை புரிந்து கொள்ள முற்படுகின்றனர். நடைமுறையில் உள்ள  மனப்பான்மையை விட்டுக் விடாமல் கடைபிடிப்பதுடன் மற்றும் அவர்கள் பழைமையைக் கடைபிடிப்பதை தவிர எதையும் விட்டுவிட முடியும். மீனம் லக்ன மக்கள் நம்பிக்கை, விசுவாசம், குடும்ப வேலைகளில் ஈடுபாடு, அன்பு மற்றும் தாராளமான மனப்பான்மை உடையவர்கள். அவர்களை எளிதில் தவறாக நடக்கும்படி செய்யமுடியும். அவர்களின் தெளிவற்ற மற்றும் சாத்தியமற்ற தன்மையானது தங்களுக்கு வேண்டியவர்களை கடுந்துயரத்தில் ஆழ்த்திவிடுகிறது. இவர்கள்  நன்னம்பிக்கையுடைய மற்றும் நம்பிக்கையற்ற ஆகிய இரண்டும் கலந்த தன்மையுடன் இருப்பதால், அவர்களுடன் தொடர்பு கொள்ளவரும் அனைவருக்கும் எந்த பிரச்சினையையும் தங்கள் மனதில் சரிசெய்ய கடினமாக தோன்றுகிறது. மீனம், வெட்கம் மற்றும் பணிவான அன்பு மற்றும் நம்பிக்கை ஆகிய தன்மைகளுடன் எடுத்துக் காட்டாக தெரியவரும். அவர்களின் எல்லையற்ற உணர்வு உன்னதமான உணர்வு நிலை  மிகவும் தகுதிவாய்ந்த தனிச்சிறப்பு  ஆகியவை  அவர்களின் சொந்த காலின் மேல் செயல்பட தயக்கமான நிலையில் இருக்கும். மீன லக்ன மக்கள் அளவிற்கு அதிகமான முறையில் மூட நம்பிக்கையுடையவர்கள் மற்றும் மதத்தில் ஈடுபாடு உள்ளவர்கள். அவர்கள் மென்மையான மற்றும் பொறுமையான இயல்பு தன்மைகளை சொந்தமாக பெற்றிருக்கிறார்கள் ஆனல் இவைகளுக்கு இன்னும் சிறிதளவு மாற்றம் தேவைப்படுகின்றன, அவர்கள் நல்லதோ அல்லது கெட்டதோ சூழலுக்கு ஏற்ப தங்களை மாற்றிக்கொள்வார்கள். பெருந்தன்மை வாய்ந்தவர்கள், நண்பருக்குகந்த, மற்றும் நல்இயல்புகளுடன் இணைந்த அன்புள்ளம் மற்றும் இரக்கம் கொண்டவர்கள்; இன்னும் சுற்றியுள்ள எல்லாவற்றிக்கும் மற்றவர்கள் உணர்ச்சிகளுடன் தன் உணர்வு மிக்கவர்கள் 
    PHYSICAL_APPEARANCE_PREDICTION             = மேஷத்தை லக்னமாக கொண்ட மக்கள் வலிமையுடன், உருவத்தில் மெலிந்தவர்களாகவும் மற்றும் அகண்ட தாடை, மூக்கு, வாய் கொண்ட அம்சங்கள் மிக்கவர்களாகவும் காணப்படுவர். அவர்கள் சராசரி உயரம், நல்ல உடல் வாகு, திடமான உடல் உறுதி வாய்ந்தவர்களாகவும் மற்றும், சுருள் முடி, நீண்ட மற்றும் அகண்ட புருவங்கள், பழுப்பு நிறம், ஆண்மை மிகுந்த நடத்தையுள்ள ஆண்களாகவோ அல்லது ஆற்றல்வாய்ந்த பெண்களுக்கான தோற்றத்துடனோ காணப்படுவார்கள். அவர்களது முழு உடலமைப்பு பலத்தையும், மிக வலிமையையும், கொண்ட ஒரு நம்பிக்கை உணர்வை கொடுக்கிறது. அவர்கள் பொதுவாக பழுப்பு அல்லது  லேசான கருமையுடன் கூடிய சுருண்ட முடிகளைப் பெற்றிருப்பார்கள். தங்கள் தலையில் ஒரு அடையாளக்குறி அல்லது வடு அமையப்பெற்றிருப்பார்கள். பெரும்பாலும் அவர்களின் நரம்புகள் வெளியில் காணக்கூடியதாக இருக்கும் மற்றும் தங்கள் உடலில் காயங்களினால் ஏற்பட்ட தழும்பு போன்ற அடையாளங்களுடன் காணப்படுவார்கள்.#ரிஷப லக்னத்தில் பிறந்த மக்கள் பெரும்பாலும் குட்டையான அமைப்புடனும்  தவிர உடலில் சக்தி குறைந்த போக்குடனும் காணப்படுவர். வழக்கமாக அழகான முகத்துடனும் பிரகாசமான கண்களுடனும் சரியான முறையில் அமையப்பட்ட காது மூக்கு, மற்றும் சிற்றின்பத்தை விளைவிக்கக் கூடிய உதடுகள் ஆகியவை அவர்களுக்கு இறைவன் அளித்த கருணையாகும். அவர்களின் உடல் அமைப்பு  அவர்கள் முகத்தைப் போல அதிர்ஷ்டசாலிக்கான சாத்தியமாக அமையவில்லை. அவர்கள் முழு உடலமைப்பு சதுர வடிவில் அமைந்து  எந்தவிதமான கவர்ச்சியான வளைவுகளும் இல்லாமல் பருமனான உருவத்துடன் இருக்கும்.  உடலின் பின்புறமோ அல்லது பக்கங்களிலோ சில அடையாள குறிகளை கொண்டிருக்கலாம்.  ரிஷப லக்ன மக்கள் பெரும்பாலும் ஏற்கத்தக்க ஒரு தோற்றத்துடன் காணப்படுவார்கள்.#மிதுன லக்ன மக்கள் பளிச்சிடும் கண்களையும் நல்ல உணர்ச்சியுடன் கூடிய பண்புகளையும் நன்கு வரையறுக்கப்பட்ட முறையில் பெற்றிருப்பார்கள். அவர்கள் மிருதுவான, மெல்லிய, நரம்பு தசை கொண்ட, மெலிதான உருவத்துடன் மற்றும் சராசரி உயரம் முதல் சற்று உயரமான உயரத்தையும் பெற்று இருப்பர்.  அவர்கள் கை கால்கள் பெரும்பாலும் ஃபேஷன் மாடல்கள் போன்று நீண்டு இருக்கும்; மிதுன நபர் பிறரால் மிகவும் ஏற்றுக்கொள்ளக் கூடிய தன்மைமிக்கவர்களாய் இருப்பார்கள். அவர்களின் அற்புதமான முகத்தில் அமைந்த சிறிய தாடையுடன் பெரும்பாலும் சிகப்பு நிறம் கூடிய அம்சங்களை பெற்றிருப்பார்கள். அவர்களின் கவர்ச்சிகரமான ஆளுமையுடன் சுருள் முடியானது  இன்னும் பல பண்புகளை சேர்க்கிறது. அவர்கள் பெரும்பாலும் பரந்த நெற்றியுடன் தெளிவான கண்களையும் பெற்றிருப்பார்கள். ஆனால் இது போன்ற கவர்ச்சிகரமான அம்சங்கள் இருந்த போதிலும் அவர்கள் பெரும்பாலும் நோய் மற்றும் சுகாதார பிரச்சினைகளை எதிர்கொள்ள நேரிடும்.#கடக லக்ன மக்கள் உடல் அமைப்பில் வட்ட வடிவ அம்சங்களை பெற்றிருப்பார்கள் மற்றும் அவர்கள் முப்பது வயதை அடையும் போது தடித்த உடலை உடையவராக இருப்பர். முடி கருமையுடன் மெல்லியதாகவோ அல்லது அடர்த்தியற்றதாகவோ காணப்படும். சிறிய மூக்குடன் கண்கள் முன்னால் நீண்டு இருக்கும் மற்றும் தாடை வட்ட வடிவத்துடன் காணப்படும். உயரம் சற்று குள்ளமாகவோ அல்லது சராசரியான அளவிலோ அமைந்திருக்கும்.  இந்த லக்னத்தில் உதித்த மக்களின் உடல் கட்டமைப்பு சிறிய அளவில் அமைந்து கைகள் நீண்டு இருப்பதால் பார்வைக்கு மிகவும் அதிருஷ்டம் அற்றவர்களாக இருப்பார்கள்.  உயரமில்லாமல் இருக்கலாம் ஆனால் பொதுவாக அவர்களின் உடலின் மேல் பகுதி பரந்த  தோற்றத்துடன் இருக்கும். வழக்கமாக அவர்கள் கவர்ச்சியாக காணப்பட்ட போதிலும் அவர்களின் மூக்கானது அவர்களை அவமதிப்புக்கு உள்ளாக்கிவிடும்.#சிம்ம லக்ன மக்கள் பெரும்பாலும் பிறரை கவர்ந்திழுக்கும் தனிப்பட்ட பண்பிற்கு உரிமையாளர் ஆவார்கள் ஏனெனில் கம்பீரத்துடன் மக்கள் மீது காந்த உணர்வை ஏற்படுத்தும் அவர்களது உணர்ச்சிகளே இதற்கு காரணமாகும்.  ஆனால் அவர்களின் உடல் கட்டமைப்பானது அவர்களுக்கு தங்களுடைய தனிப்பட்ட பண்புகள் போன்ற பாக்கியமாக அமைவதில்லை. பொதுவாக அடிப்படையில் உடல் சராசரி உயரத்துடன் காணப்படும் மற்றும் அவர்களுக்கு உடலின் மேல் பகுதி செதுக்கப்பட்டது போல பரந்த  தோற்றத்துடன் இருக்கும். சிம்ம லக்ன மக்கள் முட்டை வடிவ பெரிய முகத்துடனும் மஞ்சள் சாயங்களை பூசியுள்ளது போன்ற கண்களையும் பிறரை கவனத்தில் ஈர்க்கும் படியான முகவாய்கட்டையையும் பெற்றிருப்பார்கள். இந்த லக்னத்தில் பிறந்த ஆண் மற்றும் பெண் கட்டுப்பாட்டில் இருப்பது போல் தோன்றினாலும், எளிதாக நகர்ந்து பிறருடன் சண்டையில் ஈடுபட மிகவும் தீவீரமாக இருப்பார்கள். வீரியம் மற்றும் உணர்வு போன்ற விரைவில் அக்கறை மற்றும் தீவிரம் காட்டும் உணர்வுகள் அவர்களுக்கு பொதுவாக அமைந்திருக்கும்.#கன்னி லக்ன மக்கள் பெரும்பாலும் சாந்தமான நடத்தையுடனோ அல்லது பொதுவாக இயல்பான தன்மையிலிருந்து விலகிய  நடத்தை உள்ள ஒரு மன நிலையுடனோ  திட்டப்படி செயல்படுவார்கள். பெரும்பாலும் கன்னி மக்கள் தங்களது உடல் உருவம் பற்றி  அடிக்கடி'' மிக சிறிய'' அளவில் கவனம் கொள்வர், குறிப்பாக அவர்களின்முகத்தைப் பற்றி. அவர்களின் கவனமான அளவிடப்பட்ட நடைப்பயிற்சி, சமச்சீர் உடல்கள் பொதுவாக இளமைப்பருவம் சார்ந்த உடல், அப்பாவித்தனமான அம்சங்களாக சொல்லப்படுகின்றன. அவர்கள் நல்ல நெற்றியையும் நேராக அமைந்த மூக்கையும் மற்றும் பளுவான கன்னத்தையும் கொண்டிருப்பார்கள்.#துலாம் லக்ன மக்கள் பலவேறு தனித்தன்மையுடன் ஆர்வம் கலந்த உதடுகள்கொண்ட கவர்ச்சிகரமான உடலமைப்பு மற்றும் கட்டாயப்படுத்தி செயலாற்றும் தூண்டுததலில் இருந்து மன்னிப்பு அளித்தல் மற்றும் தன்னம்பிக்கை மிக்க பெரிய நெற்றியையும்  பெற்றிருப்பார்கள்.  இந்த புலன் அறிவு உணரும் குறுகிய போட்டியில் கடுமையான மற்றும் ஊடுருவும் உணர்வை கூர்ந்து நோக்கும் விழிகள் பொதுவாக சோர்வடையவோஅல்லது பழுப்பு நிறத்தையோ அடையலாம் .   துலாம் லக்ன மக்களின் உடல் அமைப்பு ஏற்கனவே உள்ள உறுதியான ஆக்கபூர்வமான வளைவுகள் கொண்ட உடலமைப்புகளுடன் உருவாக்கப்படுகின்றன.  இந்த மக்களுக்கு, சிரமம் ஏதும் இன்றி சரியாக எளிதில் வளைந்து கொடுக்கக் கூடிய தன்மை ஒரு  சிறப்புத்தகுதியாக அமைந்துள்ளது.  இந்த  லக்னத்தில்  பிறந்த பெண்கள் மிகச் சிறிய அளவு உருவத்திற்கு மாறாக ஏற்கக்கூடியாதாக சொல்லத்தக்க ஒரு உடல் தோற்றத்தை பெற்றிருப்பார்கள் அதேசமயம் பெரும்பாலும் ஆண்கள் ஆண் தன்மை அற்ற மன நிலையுடனும் மற்றும் பருமனான உடல் அமைப்புடனும் இருப்பார்கள். நீங்கள் நடுத்தர உயரம் பெற்றவர்களாகவோ அல்லது மற்றும் ஏதோ ஒரு சிலர் உயரமானவர்களாகவோ அமையப் பெற்றவர்களாக இருக்கலாம்.#உடல் கூறு பற்றி பேசும்பொழுது விருச்சிக லக்னத்தில் பிறந்த மக்கள், பெரும்பாலும் மிகவும் உறுதியான மற்றும் பரந்த வலுவான தோள்களை பெற்றிருப்பார்கள்.  இத்துடன் மேலும்  அவர்களின்  நல்ல உடல் கட்டானது எல்லா வகையிலும் எதிர்ப்பு சக்தியுடன் விளங்கும். முகம் சதுர வடிவுடனும் மற்றும் தெளிவான அம்சங்களுடனும், ஊடுருவும் தன்மையுள்ள காந்த கண்களுடனும்,  மற்றும் நன்கு வரையறுக்கப்பட்ட சிற்றின்ப உதடுகளுடனும் அமைந்து இருக்கும். முடி பெரும்பாலும் பழுப்பாகவும் மற்றும் தடித்தும் இருக்கும்.  பொது தோற்றம், அழகையும், சக்தியையும், ரகசியத்தன்மையையும் வெளிப்படுத்தும் மற்றும் அதே நேரத்தில் தீவிரத்தையும் தெரிவிக்கிறது.#உடல் கூறு பற்றி பேசும்பொழுது தனுசு லக்னத்தில் பிறந்த மக்கள் மிகவும் உடல் வலிமை மிக்கவராகவும் பெரும்பாலான சந்தர்ப்பங்களில் உயரமானவர்களாகவோ அல்லது மிக உயரமானவர்களாகவோ இருப்பதுடன் முழுமையான மற்றும் வெளிப்படையான அம்சங்களுடன், பெரும்பாலும் புன்னகை தவிழும் உதடுகளுடனும் மற்றும் தடித்த முடியுடனும் இருப்பார்கள்.  அவர்கள்  ஆற்றல் மற்றும் கவர்ச்சி என்கிற ஒளிக்கதிர்களை பரப்புவார்கள். அவர்களின் உடல் பருமனாகிறது ஏனெனில்  எல்லா வித செய்கைகளிலும் அளவிற்கு அதிகமான முறையில் தன் விருப்பப்படி ஈடுபடுவதால் முப்பது வயதை அடையும் போது அவர்கள் உடல் எடை அதிகரிக்க காரணமாக உள்ளது. அவர்களின் உடலில் தசைப்பகுதி குறிப்பாக  வலிமை வாய்ந்தது அல்ல. தனுசு லக்னத்தின் பொது தோற்றமானது தெய்வீக சக்தி, உற்சாகம், மற்றும் ஆற்றல் அடங்கிய ஒரு உணர்வுடன் இருக்கும்.  அவர்களின் தோற்றத்தில் எப்போதும் மகிழ்ச்சி நிறைந்திருக்கும், மற்றும் அவர்கள் அணியும் உடை தற்செயலானது. ஆனால் அவை எப்போதும் தங்கள் தாராள தன்மை மற்றும் சூழலுக்கு ஏற்ப  அமைந்திருக்கும்.#மகர லக்ன மக்கள் மிகவும் மெல்லிய தேகத்தையும், எலும்புகள் நிறைந்த மற்றும் அருவருக்கத்தக்க உடல் தோற்றத்தையும்  குள்ளமானது முதல் சராசரி உயரம் வரை வளர்ச்சி பெற்றிருப்பார்கள். அவர்களுடைய அம்சங்கள் நன்றாக இருக்கும்.  ஒரு உளி கொண்டு வெட்டும் ஆழ்ந்த தீவிரமான கண்களுடன் காட்சி அளிப்பார்கள். அவர்களது புருவங்களிலும் மற்றும் மார்பு மீதும்  முடி விறைப்பாக அமைந்திருக்கும்.  பொதுவாக பெரிய தலை மற்றும் நீண்ட பற்களை உடையவர்களாக இருப்பார்கள்,  சில நேரங்களில் உதடுகளின் வெளியே பற்கள் முன்பக்கம் நீட்டியவாறு அமைந்திருக்கும். பொது தோற்றம் கடுமை, உறுதி, ஆழம் மற்றும் முதிர்ச்சி ஆகிய உணர்வுகளை கொடுக்கிறது. அவர்களின் தோற்றம் நடுநிலை, தெளிந்த அறிவுள்ள நிலை, மற்றும் பொதுவான தன்மைகளால் குறிப்பிடப்படுகிறது. அவர்களின் கவலை நடைமுறை உபயோகத்தைப் பற்றியது ஆகும் அழகுணர்ச்சி மற்றும் கலை அழகு ஆகியவற்றில் அவர்கள் எந்த விதமான கவனமும் செலுத்துவதில்லை. அவர்கள் பெரும்பாலும் ஒரு விஞ்ஞானியாகவோ அல்லது ஒரு தத்துவ ஞானியாகவோ, ஒரு அறிஞராகவோ அல்லது மதி நுட்பமுள்ள ஒரு நபர் போல இருக்கக் கூடும்.#கும்பம் லக்ன மக்கள் பெரும்பாலும் மெலிந்த தேகத்துடனும், உயரமானவர்களாகவும் அத்துடன் பணிந்து செல்லும் பண்புடனும் காணப்படுவார்கள். அவர்களின் முகம், கழுத்து, முதுகு, வயிறு, இடுப்பு, தொடைகள் மற்றும் கால்கள் சற்று பெரியதாக அமைந்திருக்கலாம். அவர்கள் இருண்ட மற்றும் தடித்த முடியுடன் வழக்கமான மற்றும் இனிமையான பண்புகளைப் பெற்றிருப்பார்கள். அவர்களது சிகைஅலங்காரம்  மந்தமானதாகவோ அல்லது அசாதாரணமாகவோ இருக்கும்.  அன்பான முக தோரணையில் செயலின் முக்கியத்துவம் என்கிற ஒரு நிழலும் சேர்ந்து காணப்படும். கண்கள் உயிர்துடிப்புடன் கூடிய பிரகாசத்துடனும் மற்றும் விழிப்புடனும் புதுமையானவற்றை காண்பதற்கு தேடுவது போலத் தோன்றும். இந்த முழு தோற்றமானது சுறுசுறுப்பு மற்றும் அசலான உண்மை உணர்வு என்ற எண்ணங்களை கொடுக்கிறது. அவர்களின் தோற்றம் சற்று விசித்திரமானதாகவோ அல்லது உள்ளார்ந்த அக்கறையுடனோ இருக்கலாம். எல்லா விஷயங்களிலும் அது எப்போதும் திகைப்படையச் செய்யும்.#மீனம் லக்ன மக்கள் பெரும்பாலும் பருத்த உடலையும், சராசரியான உயரத்தையும் கொண்டவர்கள் ஏனெனில் அவர்கள் வேறுபாடு காண்பதில் முழுமை இல்லாததே இதற்கான காரணமாகும். இராசி மண்டலத்தில் இந்த மீனம் ராசி மட்டுமே பல்வேறு தோற்றங்களை எடுக்க முடியும். கண்கள் பெரும்பாலும் பெரியதாகவும்,  கவர்ச்சிமிக்கதாகவும், முற்றிலும் நிலையான அல்லது மெதுவான பார்வையானது  கிட்டத்தட்ட பிறரை வசப்படுத்தும் தன்மை வாய்ந்தவை. மொத்த உடலமைப்பு ஏதோ ஒரு வகையில் தெளிவற்றதாகவும், மர்மமான முறையிலும், இரக்க மனப்பான்மை கொண்டதாகவும், அமைதியானதாகவும் மனதில் ஏற்பட்ட கருத்தாக விளங்குகிறது.  உண்மையில், மீன லக்னத்தின் 'வெளித்தோற்றத்தை முற்றிலுமாக வரிசைப்படுத்த இயலாது. இது போலவே அவர்களின் தனிப்பட்ட பண்புகள் முற்றிலும் ஏமாற்றும் தன்மை வாய்ந்த காரணங்களால் வகைப்படுத்த முடியாது!
