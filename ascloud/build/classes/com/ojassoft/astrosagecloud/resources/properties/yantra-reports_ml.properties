HOW_TO_INSTALL_JUPITER_YANTRA =<ul><li>വ്യാഴയന്ത്രം വ്യാഴഗ്രഹത്തെ പ്രതിനിധാനം ചെയ്യുന്നു.ഈ യന്ത്രം സ്ഥാപിക്കുന്നതിന് മുമ്പ് തിളപ്പിക്കാത്ത പാല് അല്ലെങ്കിൽ ഗംഗാ ജലം തളിക്കുക. </li><li> വിഷ്ണു ഭഗവാന് മഞ്ഞ പൂക്കളും, ചന്ദനത്തിരിയും സമർപ്പിക്കുക. </li><li> ചൊല്ലുക <a href="https://www.astrosage.com/planet/jupiter/guru-mantra-guru-puja-guru-remedy.asp"> മന്ത്രം </a> വ്യാഴഗ്രഹത്തിനായി - ഓം ഗ്രം ഗ്രിം ഗ്രോമ് സ ഗുരവേ നമഃ ( Oṃ Grāṃ Grīṃ Grauṃ Saḥ Gurave Namaḥ) - 108 തവണ ചൊല്ലുന്നത് യന്ത്രത്തെ ഊർജ്ജിതമാക്കും. </li><li> ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് വ്യാഴാഴ്ച അല്ലെങ്കിൽ പുണർതം, വിശാഖം, പുരോരുട്ടാതി നക്ഷത്രങ്ങളിലോ സ്ഥാപിക്കാം. </li></ul>
HOW_TO_INSTALL_SATURN_YANTRA =<ul><li> ശനിയന്ത്രം ശനിഗ്രഹത്തെ പ്രതിനിധാനം ചെയ്യുന്നു. ഈ യന്ത്രം സ്ഥാപിക്കുന്നതിന് മുമ്പ് തിളപ്പിക്കാത്ത പാല് അല്ലെങ്കിൽ ഗംഗാ ജലം തളിക്കുക. </li><li> ഭഗവാൻ ഭൈരവന് കറുത്ത എള്ള്, ചന്ദനത്തിരി എന്നിവ സമർപ്പിക്കുക. </li><li> ചൊല്ലുക <a href="https://www.astrosage.com/planet/saturn/shani-mantra-shani-puja-shani-remedy.asp"> മന്ത്രം </a> ശനിദേവനായി (ശനി) - ഓം പ്രം പ്രിം പ്രോം സ സനൈശ്ചരായ നമഃ ( Oṃ Prāṃ Prīṃ Prauṃ Saḥ Śanaiścarāya Namaḥ) - 108 തവണ ചൊല്ലുന്നത് യന്ത്രത്തെ ഊർജ്ജിതമാക്കും. </li><li> ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് ശനിയാഴ്ച്ച സൂര്യൻ അസ്തമിച്ച ശേഷം അല്ലെങ്കിൽ പൂയ്യം, അനിഴം, ഉത്രട്ടാതി എന്നി നക്ഷത്രങ്ങളിലോ സ്ഥാപിക്കാം. .</li></ul>
HOW_TO_INSTALL_RAHU_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/rahu-yantra"> രാഹു യന്ത്രം </a>രാഹുവിനെ പ്രതിനിധാനം ചെയ്യുന്നു. ഈ യന്ത്രം സ്ഥാപിക്കുന്നതിന് മുമ്പ് തിളപ്പിക്കാത്ത പാല് അല്ലെങ്കിൽ ഗംഗാ ജലം തളിക്കുക. </li><li> ദുർഗ്ഗാ ദേവിക്ക് ചുവപ്പ് ചന്ദനവും, ചന്ദന തിരിയും സമർപ്പിക്കുക. </li><li> രാഹുവിന്റെ മന്ത്രം ചൊല്ലുക (ഉത്തര പൂർവ്വം) - ഓം ഭ്രം ഭ്രിമ് ഭ്രോമ് സ രഹവേ നമഃ (Oṃ Bhrāṃ Bhrīṃ Bhrauṃ Saḥ Rāhave Namaḥ) - 108 തവണ ചൊല്ലുന്നത് യന്ത്രത്തെ ഊർജ്ജിതമാക്കും. </li><li> ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് ശനിയാഴ്ച അല്ലെങ്കിൽ ചോതി, ചതയം, തിരുവാതിര നക്ഷത്രങ്ങളിലോ സ്ഥാപിക്കാം. </li></ul>
HOW_TO_INSTALL_KETU_YANTRA =<ul><li>കേതു യന്ത്രം കേതുഗ്രഹത്തിനെ പ്രതിനിധാനം ചെയ്യുന്നു. ഈ യന്ത്രം സ്ഥാപിക്കുന്നതിന് മുമ്പ് തിളപ്പിക്കാത്ത പാല് അല്ലെങ്കിൽ ഗംഗാ ജലം തളിക്കുക. </li><li> ഭഗവാൻ ഗണപതിക്ക് കറുക, ചന്ദനത്തിരി എന്നിവ അർപ്പിക്കുക.</li><li> കേതുവിന്റെ മന്ത്രം ചൊല്ലുക (ദക്ഷിണ പൂർവ്വം) - ഓം ശ്രം ശ്രിമ് സ്രൊമ് സ കേതവേ നമഃ (Oṃ Srāṃ Srīṃ Srauṃ Saḥ Ketave Namaḥ)- 108 തവണ ചൊല്ലുന്നത് യന്ത്രത്തെ ഊർജ്ജിതമാക്കും. </li></ul> ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് ഒരു ബുധനാഴ്ചയോ ശനിയാഴ്ചയോ അല്ലെങ്കിൽ അശ്വതി </a> മക, മൂല നക്ഷത്രങ്ങളിലോ <a href="https://www.astrosage.com/planet/moon/nakshtra/ashwini-nakshatra-moon-in-ashwini.asp">സ്ഥാപിക്കാം</a>.
