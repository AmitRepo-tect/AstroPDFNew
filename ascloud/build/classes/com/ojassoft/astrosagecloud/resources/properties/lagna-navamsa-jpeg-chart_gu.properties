SAVE_CHART_INTRO_PARA = ક્યારેક આપણને ઓનલાઈન મોકલવા કે પ્રિન્ટ લેવા માટે કુંડળીની જરૂર પડે છે. આ પૃષ્ઠ પરની સુવિધા આ હેતુ માટે જ છે. નીચેની કુંડળીઓ પર રાઈટ ક્લિક કરી સેવ પિક્ચર એઝ.. અથવા સેવ ઈમેજ એઝ.. પસંદ કરો અને કુંડળીની ફાઈલને તમારા સ્થાનિક મશીન પર સાચવો. તે ફાઈલને જેપીઈજી સ્વરૂપમાં સાચવશે, જે ઈન્ટરનેટ પરનું સહુથી પ્રચલિત ઈમેજ સ્વરૂપ છે. આ રીતે સચવાયેલી કુંડળી ફેઈસબુક કે ટ્વિટર જેવી સામાજિક  નેટવર્કની સાઈટ્સ પર શેર કરી શકાય અથવા તમારી વેબસાઈટ કે બ્લોગ પર પ્રકાશિત કરી શકાય.
