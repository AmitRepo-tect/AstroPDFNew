	 LK_DHARMI_TEVA				= சில ஜாதகங்கள் லால் கிதாப் முறையில் தர்மி ஜாதகம் என கருதப்படுகின்றன. லால் கிதாப் முறைப்படி , ராகு, கேது மற்றும் சனி  ஆகியவை தீமை தருகின்ற கிரகங்கள் என கருதப்படுகின்றன.  ஒரு ஜாதகத்தில் தர்மி இருந்தால், சனி, ராகு மற்றும் கேது தீயவிளைவு முடிவுகளை கொடுக்காமல் நிறுத்திவிடும்.  நல்லது செய்யும் முடிவுகளை கொடுக்க வேண்டும் என்று அவசியம் இல்லை என்றாலும்   இவை குறைந்தது தீயவிளைவு முடிவுகளை கொடுக்காமல் நிறுத்தி விடும்.  <br/>ராகு மற்றும் கேது நான்காவது வீட்டிலோ அல்லது வேறு எந்த வீட்டிலோ சந்திரனுடன் ஜாதகத்தில் இணைந்து காணப்படும் போது  தர்மி ஆகிறது.  சனியானது பதினோராம் வீட்டிலோ அல்லது வேறு எந்த வீட்டிலோ வியாழனுடன் ஜாதகத்தில் இணைந்து காணப்படும் போது தர்மி ஆகிறது.  இந்த இரண்டு நிபந்தனைகளும் பூர்த்தி அடைந்தால் தான், ஜாதகம் தர்மி தேவா  என அழைக்கப்படுகிறது.
	 LK_NIGHT_BLIND_HOROSCOPE	= லால் கிதாப்  முறையில்  Ratandh ( இரவில் குருடு ) கிரகங்கள் பற்றி ஒரு தனிப்பட்ட கருத்து இருக்கும். இது 7 வது வீட்டில்  சனி மற்றும் 4வது வீட்டில் சூரியன் உள்ள ஒரு ஜாதகமானது இரவில் கண் மறைவுக்கு (குருடு) காரணம் என அழைக்கப்படுகிறது.  ஒரு குருட்டு ஜாதகம் போன்ற நிலையில், இரவில் கண் மறைவு நிலை அமைந்த நபர் போகிற திசைவழி  அறிய இயலாமல் மற்றும் அவரது சொந்த முடிவையும் எடுக்க முடியாமல் தடுமாற்றத்துடன் செயல்படுவர். அவர் ஒரு இரவு நபர் போல் செயல்படுவர்.
	 LK_BLIND_HOROSCOPE			= ஒரு ஜாதகத்தில் , பத்தாவது வீடு ஜாதகத்தின் அடித்தளமாகும். ஏனெனில் அது  தொழில் , வேலை , அந்தஸ்து , புகழ் மற்றும் அரசு சலுகைகளைக் குறிக்கும் வீடாகும்.  பத்தாவது வீட்டில் கிரகங்கள் ஒருவருக்கொருவர் விரோதமான கிரகங்களாக இருந்தால்,  அல்லது மோசமாக அமைந்த கிரகங்கள் போன்ற வலுவிழந்த கிரகங்களாக இருந்தால், அனைத்து கிரகங்களாலும் நல்ல முடிவை  கொடுக்க முடியாது. இது போன்ற ஒரு கலவை கொண்ட ஜாதகம் கண்மூடி ஜாதகம் எனப்படும்.   எந்த ஒரு ஜாதகமானது இப்படி அமைகிறதோ அந்த நபர் குருடன் போல அல்லது திசைவழி அறிய இயலாமல் செயல்படுவான்.  
	 LK_MINOR_HOROSCOPE			= லால் கிதாப் முறையின் படி,  சில நிபந்தனைகளுக்கு உட்பட்ட ஜாதகங்கள் 12  வயது வரை சிறிய  ஜாதகங்களாக  கருதப்படுகின்றன  இந்த சிறிய ஜாதகம் அதில் அமைந்துள்ள கிரகங்களுக்கு ஏற்ப முடிவுகளைக் கொடுக்காமல் மற்றும் கணிக்க முடியாத நடத்தையைக் காட்டும். இது போன்ற ஜாதகம் கொண்ட நபரின் விதி  வயது 12 ஆண்டு வரை நம்பமுடியாமல் இருக்கும்.
