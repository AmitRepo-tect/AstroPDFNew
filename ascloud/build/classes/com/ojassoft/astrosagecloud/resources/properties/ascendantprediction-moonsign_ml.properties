

     ZODIAC_SIGN                            = മേടം#ഇടവം#മിഥുനം#കർക്കിടകം#ചിങ്ങം#കന്നി#തുലാം#വൃശ്ചികം#ധനു#മകരം#കുംഭം#മീനം
     HEALTH_PREDICTION                      = മേടം രാശിയിലുള്ളവർക്ക് തലവേദന സംബന്ധമായ, പ്രത്യേകിച്ച് മൈഗ്രേൻ, സൂര്യാഘാതം, ന്യൂറാൾജിയ, വിഷാദം എന്നീ രോഗങ്ങളാൽ ബുദ്ധിമുട്ടും. ദഹനക്കേട് നാഡി സംബന്ധമായ രോഗങ്ങൾ എന്നിവ പിടിപെടുവാനുള്ള സാധ്യതയും കൂടാതെ അവയുടെ തിടുക്കവും ശാരീരിക ആസക്തിയും അപകടവും  ഇടയ്ക്കിടെ ഉണ്ടാകാവുന്ന മൂലക്കുരു പോലുള്ള ശാരീരിക പ്രശ്നങ്ങളും ഉണ്ടാകാം. തലയിലോ മുഖഭാഗത്തോ ജനനചിഹ്നത്തോടെയാണ് കൂടുതലും മേടരാശിയിലുള്ള വ്യക്തികൾ ജനിക്കുന്നത്. മേടം ചിഹ്നത്തിൽ ജനിക്കുന്ന ആളുകൾക്ക് ഉയർന്ന രക്ത സമ്മർദ്ധത്തിനും രക്ത  പര്യയന വ്യവസ്ഥയിലെ  പ്രശ്നങ്ങൾക്കുമുള്ള സാധ്യതയുണ്ട്.#ഇടവ രാശി അടിസ്ഥാനപരമായി ആരോഗ്യ കാര്യത്തിൽ ബലവത്തായ രാശി ആണെങ്കിലും, ജീവിതകാലം മുഴുവൻ അലട്ടുവാൻ കാരണമാകുന്ന ദുർബല ഭാഗങ്ങളും അവർക്കുണ്ട്. നാഡീസംബന്ധമായ വേദനകളാൽ മിക്കപ്പോഴും ബുദ്ധിമുട്ടിയേക്കാം. കൂടുതൽ പേരും അമിതഭാരമുള്ളവരായിരിക്കും, പ്രത്യേകിച്ചും മെയ് മാസത്തിൽ ജനിച്ചവർ. അവർ മിക്കപ്പോഴും ലൈംഗിക രോഗങ്ങൾക്ക് ഇരയായേക്കാം. പിടലിക്കും, കീഴ്താടിക്കും പല്ലുകൾക്കും, താടിക്കും അണ്ണാക്കിനും പ്രശ്നങ്ങൾ ഉണ്ടാകുവാനുള്ള സാധ്യതയുണ്ട്. വൃക്കയ്ക്കും, ഉൽപാദനേന്ദ്രിയങ്ങൾക്കും മൂത്രാശയത്തിനും പ്രശ്നങ്ങളും, കഴുത്തിന് ഉളുക്കും, വരണ്ട തൊണ്ടയും ചെവിവേദനയും ഉണ്ടാകുവാനുള്ള പ്രവണത സാധാരണയായി ഇടവ രാശിക്കാർക്കുണ്ട്.#പരിഭ്രമം, അശുഭപ്രതീക്ഷ, വിധേയത്വം, അല്ലെങ്കിൽ ചിലപ്പോൾ അസഹനീയത്വം എന്നിവയാണ് ഈ രാശിയുടെ പ്രകൃതം. ശ്വാസകോശരോഗം, ആസ്ത്മ, വിളർച്ച എന്നിവ പൊതുവായ പ്രശ്നങ്ങളാണ്. നാഡീസംബന്ധമായതും ശ്വസന സംബന്ധമായതും പ്രത്യേകിച്ചും ശ്രവണശേഷി സംബന്ധമായ അസുഖങ്ങളും എളുപ്പത്തിൽ പിടിപെടാം. ശ്വസന പ്രശ്നങ്ങളും നാഡിയുടെ വിവിധ അവസ്ഥകളും സാധാരണമാണ്.#കർക്കിടക രാശിയിലുള്ളവർക്ക് ചുമ, ദഹനക്കേട്, വായുസംബന്ധമായ പ്രശ്നങ്ങൾക്കും കൂടാതെ ആമാശയം, കരൾ, കുടൽ എന്നിവ സംബന്ധിച്ച പൊതുവായ പ്രശ്നങ്ങളും ഉണ്ടാകാം. ഒരു വ്യക്തിയെന്ന നിലയിൽ വൈകാരിക ക്രമക്കേടുകളായ വിഷാദം, രോഗഭയം, അപസ്മാരം എന്നിവ ഇവർക്ക് എളുപ്പത്തിൽ പിടിപെടും. അമിത സംവേദനക്ഷമത മൂലം ദഹനക്കേട്, ആമാശയവീക്കം കൂടാതെ മറ്റ് ആമാശയ രോഗങ്ങൾ എന്നിവ ഉണ്ടാകാം കൂടാതെ ചുമയ്ക്കും കാഴ്ച്ചക്കുറവിനും സാധ്യതയുണ്ട്.#ചിങ്ങ രാശിയിൽ ഉള്ളവർക്ക് പ്രധാനമായും ഹൃദയരോഗങ്ങൾ ആയിരിക്കും ഉണ്ടാവുക, രക്തം കട്ടിയാകുന്നതു മൂലം ഹൃദയ ധമനികൾ അടയുന്നതോ അല്ലെങ്കിൽ ഇതു മൂലമുള്ള ഹൃദയ സ്തംഭനമോ ആണ് ഏറ്റവും ഗുരുതരം. നാഡീ സമ്മർദ്ദം ഹൃദയ സ്തംഭനത്തിനോ അല്ലെങ്കിൽ അതുപോലുള്ള ഏതെങ്കിലും തരത്തിലോ ഹൃദയത്തെ ബാധിക്കാം. നടുവിനും ശ്വാസകോശത്തിനും വേദന, നട്ടെല്ലിന് പ്രശ്നങ്ങൾ, ഹൃദയ-രക്ത രോഗങ്ങൾ, വാരിയെല്ലുകൾക്കും വശങ്ങൾക്കും ഉള്ള രോഗങ്ങൾ, അപസ്മാരം, നർമ്മോക്തി, ചുട്ടുപൊള്ളുന്ന പനി ഉൾപ്പെടെ, നേത്രങ്ങൾക്ക് ചില പ്രശ്നങ്ങൾ എന്നീ രോഗങ്ങളാണ് ചിങ്ങ രാശിയിലുള്ളവരുമായി ബന്ധപ്പെട്ടിരിക്കുന്നത്.#കുടലിലുള്ള പ്രശ്നങ്ങളും മലബന്ധവുമാണ് കന്നി രാശിയിലുള്ളവർക്ക് പൊതുവായ പ്രശ്നങ്ങൾ. സമയാസമയങ്ങളിലുള്ള മാനസിക ചാഞ്ചാട്ടവും വിഷാദവും നിങ്ങൾക്ക് ചുറ്റുമുള്ളവരെ പ്രതികൂലമായി ബാധിക്കാം. കന്നി രാശിയിലുള്ളവർക്ക് ലൈംഗിക അവയവങ്ങളുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങളും ഉണ്ടായേക്കാം. ആഹാരകാര്യത്തിൽ ശ്രദ്ധിക്കണമെന്ന് അവരുടെ ആമാശയം ആവശ്യപ്പെടുന്നു, വിദേശീയമായ ആഹാരസാധനങ്ങളോട് അവർക്കുള്ള ആകർഷണത്തെ അമിത ശ്രദ്ധയോടെ കൈകാര്യം ചെയ്യണം.#ഉറക്കമില്ലായ്മ, കൊഴുപ്പു നിറഞ്ഞ ഭക്ഷണം കൂടാതെ അമിതമായ മദ്യത്തിന്‍റെ  ഉപയോഗം എന്നിവ മൂലം മിക്കവാറും തുലാം രാശിയിലുള്ളവരുടെ ത്വക്ക് സംവേദനക്ഷമമാകും. കിഡ്നി ത്വക്ക് എന്നിവയിലൂടെയുള്ള വിസർജ്ജന പ്രവർത്തനം, നടുവിന്‍റെഭാഗം, പൃഷ്ടഭാഗം, വൃക്കയോട് അടുത്തുള്ള ഭാഗം, നടുവ് ഭാഗം,നിതംബം, അധിവൃക്ക് ഗ്രന്ധി, ചലന വ്യവസ്ത എന്നിവയിൽ തുലാം രാശിക്കാർ ആധിപത്യം നേടുന്നു. കിഡ്നികൾ, നടുവിന് കീഴ്ഭാഗം, അണ്ഡാശയം എന്നിവയിൽ തുലാം രാശിക്കാർ അധിപരാകും. നടുവിന്‍റെ  കീഴ്ഭാഗത്തിനു വേദന, അമിതമായ മധുരത്തിന്‍റെ അല്ലെങ്കിൽ കൊഴുപ്പു നിറഞ്ഞ ആഹാരത്തിന്‍റെ ഉപയോഗം മൂലമുള്ള പ്രശ്നങ്ങൾ എന്നിവ സാധാരണയായുള്ള ആരോഗ്യ പ്രശ്നങ്ങളാണ്.#വൃശ്ചിക രാശിക്കാർ പ്രത്യുത്പാദന അവയവങ്ങളുടെയും വിസർജ്ജന സംവിധാനത്തിന്‍റെയും അധിപരാകുന്നു. മൂക്ക് കൂടാതെ മൂക്കിലെ എല്ല്, പൊതുവായ ഭാഗങ്ങൾ, ജനനേന്ദ്രിയങ്ങൾ ഹീമോഗ്ലോബിൻ എന്നിവയിൽ വൃശ്ചിക രാശിക്കാർ ആധിപത്യം സ്ഥാപിക്കുന്നു. വൃശ്ചിക രാശിക്കാർ ഇടുപ്പ്, പ്രത്യുത്പാദന സംവിധാനം, മൂത്രാശയം എന്നിവയെ നിയന്ത്രിക്കും കൂടാതെ കരളിനും കിഡ്നിക്കും ഉള്ള രോഗങ്ങളും, മൂത്ര സഞ്ചിയിലും പ്രത്യുത്പാദന അവയവങ്ങളിലും കല്ല്, ഗ്രാവൽ എന്നിവയും ഉണ്ടാകുവാനുള്ള സാധ്യതയും വൃശ്ചിക രാശിക്കാർക്കുണ്ട്. വൃശ്ചിക രാശിക്കാർ മൂലക്കുരു അൾസർ എന്നീ രോഗങ്ങളാൽ ബുദ്ധിമുട്ടാം.#ഇടുപ്പിനെയും തുടയേയും ബാധിക്കുന്ന അസുഖങ്ങളാണ് ധനു രാശിക്കാർക്ക് ഉണ്ടാകാവുന്നത്. ഈ ചിഹ്നത്തിലുള്ളവരെ ബാധിക്കുന്ന മറ്റൊരു അസുഖമാണ് നീണ്ടു നിൽക്കുന്ന നടുവേദന. പനിപോലുള്ള പ്രശ്നങ്ങൾക്കും ശ്വാസകോശങ്ങളുമായി ബന്ധപ്പെട്ട അസുഖങ്ങൾക്കും ഉള്ള പ്രവണത ശ്രദ്ധേയമാണ്. കൊഴുപ്പു നിറഞ്ഞ ഭക്ഷണ പാനീയങ്ങളുടെ അമിതമായ ഉപയോഗം ഇടുപ്പിലെ സന്ധികൾക്ക് വേദന ഉണ്ടാക്കിയേക്കാം.#കാറ്റിനാൽ ഉണ്ടാകാവുന്ന അസുഖങ്ങളാൽ മകരം രാശിക്കാർ ബുദ്ധിമുട്ടിയേക്കാം. മകരം രാശിയിലുള്ളവർ അസുഖങ്ങൾക്ക് പെട്ടെന്ന് കീഴ്പ്പെടുകയില്ല, പക്ഷെ ഒരിക്കൽ അസുഖം പിടിപെട്ടാൽ ആ രോഗലക്ഷണങ്ങളിൽ മുറുകെ പിടിക്കുന്നതിനാൽ മിഥ്യാരോഗഭയം ഉണ്ടാവുകയും ചെയ്യാം. സന്ധികൾ, മുടി, പല്ലുകൾ, ത്വക്ക് പ്രത്യേകിച്ച് നാഡീ സംവിധാനം എന്നിവയിൽ മകര രാശിക്കാർ ആധിപത്യം സ്ഥാപിക്കുന്നു. ഒടിഞ്ഞ എല്ലുകൾ, ഉളുക്ക്, സന്ധികളുടെ സ്ഥാനം തെറ്റൽ കൂടാതെ മുട്ടിനും അതിന് താഴേക്കുമുള്ള വേദന എന്നിവ ഈ ചിഹ്നക്കാർക്ക് ഉണ്ടായേക്കാവുന്ന അപകടങ്ങളാണ്.#രക്തചംക്രമണം, ശ്വാസം കൂടാതെ കാഴ്ച്ച; കാലിലെ എല്ലുകൾ എന്നിവയിൽ കുംഭ രാശിക്കാർക്ക് ആധിപത്യമുണ്ട്. രക്തവും രക്തചംക്രമണവുമായി ബന്ധപ്പെട്ട അസുഖങ്ങൾ, രക്തം അശുദ്ധമാകുവാനുള്ള പ്രവണത എന്നിവയാൽ കുഭ രാശിക്കാർ ബുദ്ധിമുട്ടിയേക്കാം. കുംഭ രാശിക്കാർക്ക് അമിത സമ്മർദ്ദത്തിനും ഹൃദയ സംബന്ധമായ പ്രശ്നങ്ങൾക്കും സാധ്യതയുണ്ട്. കുംഭ രാശിക്കാർക്ക് കാൽക്കുഴ, രക്തചംക്രമണ സംവിധാനം, മാംസപേശികളുടെ വലിവ്, അലർജികൾ, അപ്രതീക്ഷിത രോഗങ്ങൾ കൂടാതെ വിചിത്രമായ അപകടങ്ങൾ എന്നിവ ഉണ്ടാകുവാനുള്ള സാധ്യതയുണ്ട്. കൂടാതെ വിവിധ നാഡീ രോഗങ്ങളാൽ അവർ ബുദ്ധിമുട്ടും.#മീന രാശിക്കാരുടെ അന്തസ്രാവി വ്യവസ്ഥയും പ്രമേഹവും മാരകമായ പാദ പ്രശ്നങ്ങൾക്കും അതുപോലെ തന്നെ മറ്റു ബുദ്ധിമുട്ടുകൾക്കും കാരണമാകും. നീര്, മരുന്നുകളോടുള്ള അലർജി, പാദത്തിലുണ്ടാകുന്ന മുറിവും അതുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങളും സാധാരണ പരാതികളാണ്, എന്നാൽ മീന രാശിക്കാരുടെ വൈകാരിക പ്രകൃതം അവരെ വൈകാരിക രോഗങ്ങൾക്ക് അടിമയാക്കുന്നു.
     TEMPERAMENT_AND_PERSONALITY_PREDICTION = മേടം രാശിയിൽ ജനിച്ചവർ വളരെ കരുത്തും ഊർജവും പ്രാപിക്കും, കൂടാതെ ഇവർ എപ്പോഴും എല്ലാത്തിലും മുൻകൈ എടുക്കും. നേർവഴിക്കു പോവുക എന്നത് ഇവരുടെ ഏറ്റവും സവിശേഷമായ ലക്ഷണമാണ്. ഇവർ സാധാരണയായി നേതാക്കൻമാരാണ്; ഇവർ സ്വയമേ മേധാവി ആയതിനാൽ മറ്റാരിൽ നിന്നും ആജ്ഞകൾ സ്വീകരിക്കുന്നത് ഇവർക്ക് ഇഷ്ടമല്ല. ഇവരെ മുൻകൂട്ടി കാണുവാൻ കഴിയില്ല എന്നതാണ് ഇവരുടെ ആകർഷണം. ചില സമയങ്ങളിൽ ഈ സ്വഭാവം ഓരേസമയം തീവ്രവും ദുർബലവും കൂടാതെ അതിയായ ചിത്തവൃത്തിയുള്ളതുമായിരിക്കും എന്നാൽ വിപരീതമായി ഇവയെ എളുപ്പത്തിൽ വശീകരിക്കുവാനും സന്തുഷ്ടമാക്കുവാനും കഴിയും. മേടം രാശിയിൽ ഉള്ളവർ നിഷ്കപടമായ് സംസാരിക്കുന്നവരും തുറന്നു സംസാരിക്കുന്ന കൂട്ടരും ആണ്. അവർ വളരെ പിടിവാശിയുള്ളവരും കോപത്താൽ പെട്ടെന്നുള്ള ഇവരുടെ പൊട്ടിത്തെറി മിക്കവാറും ആളുകളെ അതിശയിപ്പിക്കാം എന്നാലും അനുനയിപ്പിക്കുന്നതു വഴി ഇവ എളുപ്പത്തിൽ കുറയ്ക്കാവുന്നതുമാണ്. അവരുടെ ആവേശം ചിലസമയങ്ങളിൽ പല ആപത്കരമായ പ്രശ്നങ്ങളിലും കൊണ്ടെത്തിച്ചേക്കാം. ജലത്തെ അത്രയ്ക്ക് ഇഷ്ടമല്ലെങ്കിലും ഇവർ സൗന്ദര്യ കലയെയും രമണീയതെയും ആരാധിക്കുന്നു. മിക്കവാറും ഉള്ള ഇവർ ആശ്വാസകരമായിരിക്കുവാൻ ആഗ്രഹിക്കുന്നു, പക്ഷെ അത് ഒരു നിശ്ചിത ലക്ഷ്യം കൈവരിച്ചതിനു ശേഷം മാത്രം. ഈ ചിഹ്നത്തിൽ ജനിച്ചവർ വിവേകശാലികളായിരിക്കും, ഇവർ സ്നേഹസമ്പന്നർ ആണെങ്കിലും ചില സമയങ്ങളിൽ വികാരാധീനരാകാറുണ്ട്.#ഈ ചിഹ്നത്തിൽ ജനിച്ചവർ അപരിചിതരോട് പെട്ടെന്ന് അടുക്കാറില്ല. പുതിയ ആളുകളുമായി ഒത്തുച്ചേരുന്നതിൽ ഇവർക്ക് വലിയ താത്പര്യമില്ല എന്തെന്നാൽ ഇവരുടെ ശാന്തവും, ഒതുക്കവും അന്തർമുഖത്വ പ്രകൃതവും സൗഹൃദജീവിയായിരിക്കുന്നതിൽ നിന്നും ഇവരെ തടയുന്നു. ഇവരെ വളരെ ശ്രദ്ധാപൂർവ്വം ശ്രദ്ധിക്കുകയും കൈകാര്യം ചെയ്യുകയും ചെയ്തില്ലെങ്കിൽ നീരസവും, ജാഗ്രതയും നിറഞ്ഞ യാഥാസ്ഥിതിക മനോഭാവത്തോടേയും മറ്റുള്ളവരോട് പെരുമാറും. പുതിയ ആളുകളുമായി ഒത്തുച്ചേരുന്നതിൽ മടിക്കുന്നതിനാൽ സുഹൃത്തുക്കളെ നേടുന്നതിന് ഇവർ ബുദ്ധിമുട്ട് നേരിടും. ഇവർ വിശ്വസ്തരും പ്രായോഗികതയുള്ളവരും ആയതിനാൽ വ്യാവസായിക സംരംഭങ്ങളിൽ വിജയിക്കും. ഇവർ ലൗകിക വ്യക്തിത്വമുള്ളവരും കൂടാതെ എല്ലാ മേഖലയിലും ശാരീരിക ആനന്ദം തേടുകയും ചെയ്യും എന്നിരുന്നാലും മറുവശത്ത് ഇവർ അദ്ധ്വാനിക്കുന്നവരും അവരുടേതായ ഗതിയിൽ ഏൽപ്പിച്ചിരിക്കുന്ന ചുമതലകൾ നിറവേറ്റുകയും ചെയ്യും. മറ്റുള്ളവരുടെ പ്രയത്നങ്ങളെ പ്രശംസിക്കുകയും അവരുടെ കഴിവിനെ തുറന്ന് മതിക്കുകയും ചെയ്യും. ചില സമയങ്ങളിൽ ഇവർ മേധാവി എന്ന നിലയിൽ പെരുമാറിയേക്കാം. ഇടവം രാശിക്കാർ അങ്ങനെ എളുപ്പത്തിൽ ആകർഷിക്കപ്പെടുന്നവരല്ല, അഥവാ അങ്ങനെ ആയാൽ, അവർ ആഗ്രഹിക്കുന്ന വ്യക്തിയോട് അങ്ങേയറ്റം ജാഗ്രതയോട് കൂടി മാത്രമേ അടുക്കുകയുള്ളു. ഇടവം രാശിക്കാർ അവരുടെ വൈശിഷ്ട്യത്തിലും സിദ്ധാന്തത്തിലും ഉറച്ചു നിൽക്കും അതിൽ നിന്നും അവരെ പിന്തിരിപ്പിക്കുക എന്നത് വളരെ പ്രയാസകരവുമാണ്. എന്നാലും അവർ സ്നേഹമുള്ളവരും, സത്യത്തെ അഭിനന്ദിക്കുന്നവരും മറ്റുള്ളവരെ ആകർഷിക്കുവാൻ തക്ക കാന്തിക വ്യക്തിത്വമുള്ളവരുമാണ്. ഇവർ ആവേശമുള്ളവരല്ല പക്ഷെ ശക്തമായി പ്രേരിപ്പിക്കുകയാണെങ്കിൽ ഇവർ വളരെ രോഷാകുലരായി മാറും. ചില സമയങ്ങളിൽ ഇവർ എതിരഭിപ്രായക്കാരും പിടിവാശിക്കാരും യുക്തിരഹിതരും ആയിരിക്കും. പങ്കാളിയെ കണ്ടെത്തുന്ന കാര്യത്തിൽ ഇവർ വളരെ ശ്രദ്ധാലുക്കൾ ആയിരിക്കും. ഇവരെ എളുപ്പത്തിൽ തെറ്റിദ്ധരിപ്പിക്കുവാൻ കഴിയുമെങ്കിലും കള്ളം പറയുന്നത് ഇവർക്ക് ഇഷ്ടമല്ല.#മിഥുനം രാശിക്കാർ വളരെ ചുണയും ചൈതന്യമുള്ളവരുമാണ്, കൂടാതെ മികച്ച സംഭാഷണചതുരരും സൗമ്യമായി സംസാരിക്കുന്നവരുമാണ്. വളരെ പ്രസരിപ്പുള്ള മനസ്സിനും ശരീരത്തിനും ഉടമയാണ് കൂടാതെ യഥാർത്ഥത്തിൽ ആണെങ്കിൽ തന്നെയും കാഴ്ച്ചയിൽ അവർ വളരെ ചെറുപ്പമായിരിക്കും. നിർമ്മാണം ആയിരിക്കും ഇവരുടെ കൈമുതൽ. മറുവശത്ത്, മനസ്സ് എല്ലായ്പ്പോഴും മാറ്റുക എന്നത് വളരെ നിസ്സാരമായ കാര്യവും ഇവർ ഒന്നിലും ഉറച്ചു നിൽക്കുകയില്ല കൂടാതെ വിശ്രമരഹിതരും എളുപ്പത്തിൽ മുഷിയുന്നതും, ഉടനീളം ഒരു കാര്യത്തിൽ തന്നെ ശ്രദ്ധചെലുത്താൻ കഴിയാത്തവരും ആണ്. സ്വന്തം ആവശ്യങ്ങൾക്കായി മറ്റുള്ളവരെ ഉപായങ്ങളാൽ താത്പര്യപ്പെടുത്തുക എന്ന പ്രവണതയും നിലനിൽക്കുന്നു. ഇവരുടെ തികച്ചും ഉജ്ജ്വലമായ വിനോദ മൂല്യങ്ങളാൽ ഇവരുടെ സമീപ്യം ആഗ്രഹിക്കുമെങ്കിലും   ദുസ്വഭാവം എന്നത് മിഥുന രാശിക്കർക്ക് കെട്ടിച്ചമയ്ക്കുന്നതിനേക്കാൾ ഏറെയാണ്. അശാന്തരും സ്ഥിരതയില്ലാത്ത മനസ്സുമുള്ളതിനാൽ, ഇവർ കുപ്രസിദ്ധമായി പ്രവചനാധീതരാണ്. ബുദ്ധിശക്തി മിഥുനത്തിൽ ആധിപത്യം സ്ഥാപിച്ചിരിക്കുന്നതിനാൽ ബുദ്ധിപരമായ ഏതൊരു കാര്യത്തെയും വളരെ ബൃഹത്തായാണ് ഇവർ കാണുന്നത്. ആശയവിനിമയവും ഇവർക്ക് വളരെ പ്രധാനപ്പെട്ടതായതിനാൽ, അറിവ് പൂഴ്ത്തിവയ്ക്കാവുന്ന ഒന്നും അല്ല. മറ്റ് സൂര്യ ചിഹ്നങ്ങളെ അപേക്ഷിച്ച് മിഥുനം വളരെ വൈദഗ്ദ്ധ്യമുള്ളതാണ്. ഇക്കൂട്ടർ ഒരു തീരുമാനം എടുക്കുകയും പിറ്റേന്നാൾ അതിൽ അത് മൊത്തത്തിൽ മാറുകയും ചെയ്യും. മിഥുനത്തിൽ പിറന്നവർക്ക് ഒന്നിലും ഉറച്ച തീരുമാനങ്ങളില്ല. അറിയുവാനുള്ള ജിജ്ഞാസയാലും ആഗ്രഹത്താലും നയിക്കപ്പെടുന്ന ഒരു സ്വതന്ത്രാത്മാവാണ് ഇവർ. വളരെ വിരളമായി മാത്രമേ ഇവർ ഏതെങ്കിലും ഒരു ദൗത്യത്തിൽ അഗാധമായി ആഗിരണം ചെയ്യുകയുള്ളു കൂടാതെ ഇവർ തൊടാത്തതായ ഏതൊരുകാര്യവും ഇവർക്ക് വളരെ താത്പര്യ ജനകമാണ്. ഇവർക്ക് ആത്മനിയന്ത്രണത്തിന്‍റെ അഭാവവും ഉണ്ട്.#കർക്കിടകകാർക്ക് ഭ്രമാവസ്ഥ, ഉള്ളുണർവ്വ്, ക്ഷോഭം എന്നീ സ്വഭാവവിശേഷതകൾ ഉള്ളതിനാൽ ധ്യാനം ആവശ്യമാണ്. മികച്ച സംഭാഷണ ചാതുര്യത്താലും എഴുതുവാനുള്ള കഴിവിനാലും ഇവർ പാരമ്പര്യമായി അനുഗ്രഹീതരാണ്. ശീഘ്രബുദ്ധിമാൻമാരും, സാമർത്ഥ്യമുള്ളവരും, പരിശ്രമശാലികളും, അസ്ഥിരത ഉള്ളവരുമായിരിക്കും. ഇവർ ഒരളവു വരെ ആത്മീയതയുള്ളവരും ഇവരിൽ ചിലർ അതീന്ദ്രിയ പ്രവണതകളാൽ അനുഗ്രഹീതരുമാണ്. ഇവർക്ക് മികച്ച ഓർമ്മ ശക്തിയുണ്ട്. ഇവർ ദയയുള്ളവരും ലോലഹൃദയരും അനുകമ്പയുള്ളവരുമാണ്. ഇവർ വളരെ സ്വകാര്യത ഉള്ളവരും അവരുടെ സംതൃപ്തിക്ക് അനുസൃതമായി ഗൃഹാന്തരീക്ഷം സ്നേഹം കൊണ്ട് ബലപ്പെടുത്തുകയും ചെയ്യും. സ്വകാര്യ ബന്ധത്തെ കുറിച്ചു പറയുകയാണെങ്കിൽ, കർക്കിടകക്കാർ ഒരു വശത്ത്, ദൃഢത, ആദ്രത, വികാരാധീനത, ശുദ്ധസാങ്കൽപികത, വൈകാരികത എന്നിവയുടെ മിശ്രണവും, എന്നാൽ മറുവശത്ത് കൈവശപ്പെടുത്തുവാനുള്ള പിടിവാശിയും ആത്മാർത്ഥതയും ഉള്ളവരുമാണ്. ഇവർക്ക് അതീവ ഓർമ്മശക്തിയുണ്ടായിരിക്കും കൂടാതെ അവർക്കുണ്ടാകുന്ന അവഗണനകളും മനോവേദനകളും വളരെ വിരളമായി മാത്രമേ മറക്കുകയുള്ളു. കഴിഞ്ഞു പോയവ പോകട്ടെ: എന്ന ചൊല്ല് കർക്കിടക രാശിക്കാർക്ക് ശീലമില്ല കൂടാതെ ഒരാളുടെ തെറ്റ് അവർ ഒരിക്കലും മറക്കുകയില്ല. വൈകാരികതയാൽ നയിക്കപ്പെടുന്നതിനാൽ, സുഹൃത്തുക്കളിൽ ഇവരായിരിക്കും ഏറ്റവും നല്ലതും മോശവും. അവർ ചെയ്യുന്ന കാര്യങ്ങളിൽ സമർത്ഥരും അതീവ ശ്രദ്ധയുള്ളവരും അതേ അളവിൽ തന്നെ ഉത്പാദനക്ഷമത ഉള്ളവരും ആയിരിക്കും.#ഈ രാശിയിൽ പെടുന്നവർ ഊർജ്ജസ്വലതയും ആകർഷകത്വവുമുള്ള വ്യക്തിത്വത്തിന് ഉടമകൾ ആയിരിക്കും. ഉത്കർഷേച്ഛ, ധൈര്യം, ഉറച്ച തീരുമാനം, അനുകൂല മനോഭാവം, സ്വതന്ത്രത, ആത്മവിശ്വാസം എന്നിവ ഈ രാശിക്കാരുടെ പ്രത്യേകതകളാണ്. ഇവർ സത്യസന്ധതയുള്ളവരും സങ്കീർണ്ണതയില്ലാത്ത വ്യക്തികളും തങ്ങൾക്ക് എന്താണ് ആവശ്യമെന്ന് വ്യക്തമായി അറിയാവുന്നവരും പൂർണ്ണമായ ആവേശത്തോടു കൂടെയും സൃഷ്ടിപരമായ ഉത്സാഹത്തോടെയും അതിനായി പ്രയത്നിക്കുന്നവരും ആയിരിക്കും. സാധാരണയായി ഇവർ എളുപ്പത്തിൽ ക്ഷോഭിക്കുന്നവരും, വിദ്വേഷത്താലോ കൈയ്യേറ്റത്താലോ അവഹേളിക്കപ്പെടുമ്പോൾ ചിലസമയങ്ങളിൽ പരുഷമായും അപ്രിയമായും സംസാരിക്കുന്നവരും ആയിരിക്കും. വ്യക്തിഗത വിമർശനങ്ങളിൽ അതീവ സംവേദനക്ഷമതയുള്ളവരും തങ്ങളുടെ അധികാരങ്ങൾക്ക് ഭീഷണിയാണെന്ന് തോന്നിയാൽ വളരെ പെട്ടെന്നു തന്നെ കോപാകുലർ ആകുന്നതുമാണ്. അവർ പിടിവാശിക്കാരും അവരുടെ വിശ്വാസത്തെ മുറുകെ പിടിക്കുന്നവരും അല്ലെങ്കിൽ കഠിനവും സരളവുമായ ഏതൊരു മാർഗ്ഗത്തിലൂടെയും തങ്ങളുടെ പ്രവർത്തനത്തിൽ ഉറച്ചു നിൽക്കുന്നവരും ആയിരിക്കും. ആദർശവാദവും ദയാലുത്വ പ്രകൃതവും ഉള്ളവരാണ്. സിംഹ രാശിക്കാർ അടിസ്ഥാനപരമായി പ്രസന്നമായ പ്രകൃതക്കാരും, സന്തോഷവാന്മാരും, ദയാലുവും ഉദാരമനസ്കരും, തുറന്ന് പ്രകടിപ്പിക്കുന്നവരും, ബുദ്ധിയുള്ളവരും വിശാല മനസ്കരുമാണ്. ഇവർക്ക് വളരെ ഉറച്ച തീരുമാനം ഉണ്ട് പക്ഷെ വളരെ ചെറിയ പ്രകോപനത്താൽ നീതീകരിക്കുവാൻ പറ്റാത്ത തരത്തിൽ ഇവർ ക്ഷോഭിക്കും എന്നാൽ ഇത് വളരെ പെട്ടെന്നു തന്നെ ശമിപ്പിക്കുവാനും സാധിക്കും. ഇവർ വിദ്വേഷം വളരെ നാൾ മനസിൽ സൂക്ഷിക്കുന്നവരും സ്വതന്ത്ര ചിന്താഗതിക്കാരുമാണ്. ഇവർ മതപരമായ ഇടുങ്ങിയ ചിന്താഗതികളെ മുറുകെ പിടിക്കുന്നവരാണ് എന്നാൽ മറ്റുള്ളവരുടെ ആചാരാനുഷ്ഠാനങ്ങളെ മികച്ച രീതിയിൽ വിലകൽപ്പിക്കുന്നവരുമാണ്.#കന്നി രാശിക്കാർ പൊതുവെ മിതഭാഷികളും വിനയമുള്ളവരും മൃദുഭാഷികളും ആയിരിക്കും. സമൂഹത്തിന്‍റെ  മുൻനിരയിലേക്കിറങ്ങി തങ്ങളുടെ ആവശ്യങ്ങൾ സാധിച്ചു തരുവാൻ കഴിയുന്നവരിൽ നിന്നായിരിക്കും ഇവർ തങ്ങളുടെ സുഹൃത്തുക്കളെ കണ്ടെത്തുന്നത്. പ്രശ്നങ്ങളെ നേരിടേണ്ടി വരുമ്പോൾ ഇവർ ശാന്തതയോടേയും വിവേകത്തോടേയും നിലകൊള്ളുകയും പരിഹാരം കണ്ടെത്തുന്നതിനായി ശ്രമിക്കുകയും ചെയ്യും. ഈ ശാന്തത ചിലസമയങ്ങളിൽ നിരുത്സാഹപരമെന്നോ കുശാഗ്രബുദ്ധിയെന്നോ തോന്നാം. അതീവ ഗുരുതരമായ പ്രശ്നങ്ങളെ പോലും വിശകലനം ചെയ്യുവാനും പരിഹരിക്കുവാനുമുള്ള കഴിവ് ഇവർക്കുണ്ട്. വിശദാംശങ്ങൾ കാണുവാൻ അത്ഭുതകരമായ കഴിവുള്ളതിനാൽ മൊത്തത്തിലുള്ള പ്രശ്നങ്ങളെ അവഗണിക്കാറുണ്ട്. ഇവർ അതീവ ബുദ്ധിശാലികളായതിനാൽ യാഥാർത്ഥ്യങ്ങൾക്ക് ഏതെങ്കിലും തരത്തിൽ അസ്വസ്ഥവും അശുദ്ധവുമായ പ്രകൃതം ഉണ്ടെങ്കിൽ ചിലപ്പോഴൊക്കെ അവയ്ക്ക് ഇളവ് നൽകാറുണ്ട്. കന്നി രാശിക്കാർ മിക്കവാറും സഹൃദയതയുള്ളവരും മിക്കവാറും എല്ലാ കാര്യങ്ങളെ കുറിച്ചും അറിവുള്ളവരും സാധാരണയായി ശ്രദ്ധ, സൂക്ഷ്മബുദ്ധി, നിരൂപണത, ക്ഷമ എന്നിവയുള്ളവരും ആണ്. ഇവർ സുഹൃത്തുക്കളെ സൂക്ഷിച്ചു മാത്രം തിരഞ്ഞെടുക്കുന്നവരും ബന്ധങ്ങൾ സ്പഷ്ടതയുടെ അടിസ്ഥാനത്തിൽ നിലനിറുത്തുന്നവരും ആണ്. കന്നി രാശിക്കാർക്ക് ക്ലേശം, വിഷണ്ണത എന്നിവയ്ക്കുള്ള പ്രവണതയുണ്ട്. ഇവർ മറ്റുള്ളവർക്ക് ഉപകാരികളാണ് ഇത് ഇവരെ ദുരുപയോഗം ചെയ്യുന്നതിനും ഇവരോട് മോശമായി പെരുമാറുന്നതിനും കാരണമാകാം. കന്നി രാശിക്കാർ വളരെ ചെറിയ കാര്യങ്ങളെ പോലും വിമർശിക്കുന്നവരും, മർക്കടമുഷ്ടിക്കാരും അതുപോലെ തന്നെ സ്വയമേയും മറ്റുള്ളവരെയും വിമർശിക്കുന്നവരുമാണ്.#തുലാം രാശിക്കാർ സഹകരണ മനോഭാവമുള്ളവരും, അനുരഞ്ജനമുള്ളവരും കൂടാതെ ഒരു വാദപ്രതിവാദത്തിൽ തുടരുന്നതിൽ അർത്ഥമില്ലെന്നു മനസിലാക്കിയാൽ അതു വിട്ടുകൊടുക്കുവാൻ തയ്യാറുള്ളവരുമാണ്. മറ്റുള്ളവരുമായുള്ള അഭിപ്രായ വ്യത്യാസം അവരെ അരക്ഷിതരും അസ്വസ്ഥരും ആക്കുന്നു. ജീവിതത്തിൽ യോജിപ്പുണ്ടാകുവാൻ വേണ്ടി അവർ ശ്രമിക്കുകയും അതിനു വേണ്ടി എന്തും ചെയ്യുകയും ചെയ്യും. ഇവർ വിശ്വസിക്കുവാൻ കഴിയാത്തവരും ശങ്കിക്കുന്നവരും, ദൈനംദിനമുള്ള ഒരേ കര്യങ്ങളിൽ അക്ഷമരും മടുപ്പിക്കുന്നതരത്തിൽ യാഥാസ്ഥിതികരും ലജ്ജാശീലരുമാണ്. തുലാം രാശിക്കാർ വളരെ പതുക്കെ മാത്രം കോപിക്കുന്നവരാണ് കൂടാതെ കോപം മൂലമുള്ള ഇവരുടെ പൊട്ടിത്തെറി ചുറ്റും നിൽക്കുന്നവരെ ഞെട്ടിപ്പിക്കും. ഇവർ യാഥാസ്ഥിതികവാദിയെക്കാൾ കൂടുതൽ ആദർശവാദികളാണ്; മിക്കപ്പോഴും ആകാശക്കൊട്ടാരം പണിയുന്നതിൽ വ്യാപൃതരാണ്. തുലാം രാശിക്കാർ പൊതുവേ കലാപ്രേമികളും നിർമ്മലതയുള്ളവരും, ശരിയെയും തെറ്റിനെയും കുറിച്ച് ഉറച്ച അഭിപ്രായങ്ങളുള്ളവരും, ജന്മനാ ഒരു നയതന്ത്രജ്ഞരും എന്നാൽ ഉത്സാഹവും ആത്മാർത്ഥതയും ഉള്ളവരും ആണ്. ഇവർ യുക്തിരഹിതരും പൊതുവെ സമാധാന പ്രേമികളും; സുഖപ്രിയരും സഹവാസം ഇച്ഛിക്കുന്നവരുമാണ്. തുലാം രാശിക്കാർ ഏറ്റവും നിർമ്മലത ഉള്ളവരായി കരുതപ്പെടുന്നു. നിങ്ങൾ കാഴ്ച്ചയിൽ ഭംഗിയും, സഭ്യതയും, വശ്യതയും നല്ല അഭിരുചികളും ഉള്ളവരുമാണ്. സാമുഹിക ജീവിയാകുന്നത് ഇവർ ഇഷ്ടപ്പെടുന്നു, ആയതിനാൽ സാമൂഹിക നില ഉയർത്തുന്നതിൽ അതീവ സന്തോഷം ഉണ്ടാകുന്നു. വസ്തുനിഷ്ഠവും നീതിയുക്തവുമായ രീതിയിൽ തീർപ്പുകൽപ്പിക്കുന്നതിൽ ഇവർ അറിയപ്പെടുന്നു.#വൃശ്ചികം രാശിയിലുള്ള ആളുകൾ സ്വയം വിമർശനം, അതീവ ശ്രദ്ധ, ഉത്കടമായ മാർഗ്ഗനിർദ്ദേശം എന്നിവയ്ക്ക് പ്രസിദ്ധരാണ്, ഇത് പൂർണ്ണ വിജയത്തിനോ അല്ലെങ്കിൽ പരിപൂർണ്ണ പരാജയത്തിനോ കാരണമാകും. കൂടാതെ ഇവർക്ക് സ്വയം നശിക്കുവാനുള്ള ശക്തമായ പ്രവണതയും അതോടൊപ്പം വളരെ ചെറിയ പ്രകോപനത്താൽ തന്നെ പൊട്ടിപ്പുറപ്പെടാവുന്ന അകാരണമായ ദേഷ്യവും ഉണ്ടാകും. സാഹചര്യങ്ങൾക്ക് അനുസൃതമായി ഏറ്റവും നല്ലതിനോ മോശപ്പെട്ടതിനോ ഇവരുടെ വൈകാരിക ഊർജ്ജസ്വലത അവർ ആഗ്രഹിക്കുന്ന ഔദ്യോഗിക ജീവിതത്തിൽ എത്തിച്ചേരുന്നതിന് ആശ്ചര്യകരമാം വിധം അവരെ രൂപപ്പെടുത്തുന്നു. വൃശ്ചിക രാശിയിൽ ഉള്ളവർ സൂക്ഷ്മതയും ദൃഢതയുമുള്ള പ്രകൃതക്കാരാണ്. ഇവർ പിടിവാശിക്കാരും, അഭിമാനികളും, ശാന്തരുമാണ്. ഇവർ ജീവിതത്തിൽ സ്ഥിരപ്പെടുകയില്ല ജീവിതമെന്നാൽ പൂർണ്ണമായി സന്തോഷിക്കുവാനുള്ളതാണ് അല്ലെങ്കിൽ ജീവിക്കാതിരിക്കുക എന്നതാണ് ഇവരുടെ മനോഭാവം. പ്രവർത്തന കേന്ദ്രത്തിൽ ഇവരെ വിരളമായി മാത്രമേ കാണുകയുള്ളു എന്നാൽ എന്താണ് നടക്കുന്നതെന്ന് ഇവർ എപ്പോഴും അറിയുകയും ചെയ്യും. ഇവരുടെ സഹാനുഭൂതി ഇവരെ സുഹൃത്തുക്കളിൽ വച്ച് ഏറ്റവും വിശ്വസ്തനാക്കി മാറ്റുന്നു എന്നാൽ ഇതേ സ്വഭാവം ഇവരെ ശത്രുക്കൾക്ക് വിശ്വാസഘാതിയാക്കി മാറ്റുന്നു. ഇവരുടെ ഊർജ്ജം, ആത്മവിശ്വാസം, ആഗ്രഹം, മാഹാത്മ്യം എന്നിവ ഒരുമിച്ചും പൂർണ്ണമായും ഉപയോഗിച്ചാൽ എന്തിലും ഏതിലും ഇവർ ശ്രേഷ്ഠരായിരിക്കും. ഇവർക്ക് മറ്റുള്ളവരെ ആവശ്യമായി വരും എന്നാൽ തനിക്ക് ചെയ്യുവാൻ കഴിയാത്ത കാര്യങ്ങൾ ചെയ്യുവാനായി മറ്റുള്ളവരോട് ആവശ്യപ്പെടുകയില്ല.#ധനു രാശിക്കാർ സുദീപ്തവും പ്രസന്നവുമായ പ്രകൃതക്കാരാണ് കൂടാതെ ഇവർക്ക് ഭാവിയെക്കുറിച്ച് ശമിക്കാത്ത ശുഭാപ്തി വിശ്വാസവും ഉണ്ട്. സാധാരണയായി ഇവർ നല്ല പ്രകൃതക്കാരും, നിയന്ത്രണാധീതമായ നേരമ്പോക്കു പറയുവാനുള്ള ശേഷിയും കൂടാതെ പ്രചോദിപ്പിക്കും വിധം ആത്മീയ വശവും ഉള്ളവരാണ്. പ്രതികൂല സാഹചര്യങ്ങളിൽ ഇവർ അക്ഷമരും, ഉത്തരവാദിത്തങ്ങളെ ഭയക്കുന്നവരും, ഭോഗാസക്തരും, ഉന്മത്തരും, ഉയർച്ചയെ എതിർക്കുന്നവരുമാണ്. സംഭാഷണത്തിൽ ശീഘ്രതയ്ക്കുള്ള പ്രവണത അപ്രതീക്ഷിതമായി മറ്റുള്ളവരാൽ അവർ തെറ്റിദ്ധരിക്കപ്പെടാൻ കാരണമാകും. ചൂതുകളിയിൽ ഇവർക്ക് അഭിനിവേശം ഉണ്ടാകും. ശുഭാപ്തിവിശ്വാസം, ഉത്കടമായ ആഗ്രഹം, പ്രചോദനം, ഉത്സാഹം, മഹാമനസ്കത എന്നീ സ്വഭാവ സവിശേഷതകൾ ഈ രാശിയിൽ ജനിച്ചവരുടെ പ്രത്യേകതകളാണ്. ധനു രാശിക്കാർക്ക് ജീവിതത്തോട് അനുകൂല കാഴ്ച്ചപ്പാടാണുള്ളത്, പരിശ്രമം, ഊർജ്ജം, സാഹസികത, വൈദഗ്ദ്ധ്യം, സാധ്യമാകുന്നിടത്തോളം അനുഭവ സമ്പത്ത് വിപുലീകരിക്കുന്നതിനുള്ള ഉത്സുകത എന്നിവ നിറഞ്ഞതാണ് ഇവരുടെ ജീവിതം. ഇവർ ആവശ്യമില്ലതെ സംസാരിക്കുകയില്ല, ഇവരുടെ വാചാലത മിക്കപ്പോഴും മറ്റുള്ളവരെ വശീകരിക്കും. യാത്രചെയ്യുന്നതും ചുറ്റുപാടുകളിൽ പര്യവേക്ഷണം നടത്തുന്നതും ഇവർ ആസ്വദിക്കുന്നു. ഇവർ ബഹുമാന്യരും, ആത്മാർത്ഥതയുള്ളവരും, വിശ്വാസയോഗ്യരും, സത്യസന്ധരും, മഹാമനസ്കതയുള്ളവരും, നിഷ്കളങ്കരും നീതിന്യായത്തോട് അഭിനിവേശം ഉള്ളവരുമാണ്. ഇവർ സാധാരണയായി മാന്യത ഉള്ളവരും ദൃഢമായ സത്യസന്ധതാ ബോധത്തോടെ ആത്മീയതയ്ക്ക് പ്രവണത ഉള്ളവരുമാണ്. ധനു രാശിക്കാർ ദൃഢനിശ്ചയമുള്ളവരും നല്ല സംഘാടകരുമാണ്, ഈ സമ്മിശ്രണം ഏതൊരു പദ്ധതിയും വിജയകരമായി പൂർത്തീകരിക്കുവാനുള്ള കഴിവു നൽകുന്നു.#മകരം രാശിയിലുള്ള ആളുകൾ മിക്കവാറും വലിയ ഈശ്വരവിശ്വാസികളാണെന്ന് കാണിക്കുമെങ്കിലും യഥാർത്ഥത്തിൽ ഇവർ ഭാവിക്കുന്ന അത്രയ്ക്കും വിശ്വാസികളൊന്നും ആയിരിക്കില്ല. ഇവർ അഹംബുദ്ധി, സമർത്ഥത, സ്വകാര്യത, ദൃഢനിശ്ചയം എന്നിവ ഉള്ളവരാണ്. കേൾക്കുന്നതിനേക്കൾ ഏറെ ഇവർ സംസാരിക്കുന്നു, അതിനാൽ മിക്കവാറും വാവിട്ട് പറയുകയും അത് മറ്റുള്ളവരെ വേദനിപ്പിക്കുകയും ചെയ്യുന്നു. സവിശേഷമായ മകരം രാശിക്കാർ സംഘടനാപരമായ നല്ല കഴികും, വൃത്തിയും വെടിപ്പും ഉള്ളവരും, പ്രായോഗികമായി വ്യാമോഹങ്ങൾ ഇല്ലത്തവരും ആയിരിക്കും. തൊഴിൽപരമായി ശക്തമായ നീതിശാസ്ത്രമുള്ളവരും, ഭൗതീകമായ പ്രവണതയുള്ളവരും, യാഥാസ്ഥിതിക ചിന്താഗതിയും, വ്യവസ്ഥാനുരൂപമായതും പ്രാമാണികത്വത്തോട് വളരെ അധികം ബഹുമാനമുള്ളവരും ആണ്. മകരം രാശിക്കാർ അതിമോഹമുള്ളവരും, ഗൗരവമുള്ളവരും ജോലിയിൽ സ്വയം സമർപ്പിക്കുന്നവരും ആണ് എന്നാൽ ചില സമയം പ്രതികാരശീലമുള്ളവരും ആണ്; ആത്മശിക്ഷണം ഉള്ളവരും, ഉത്തരവാദിത്വവും പ്രാഗോഗികതയും ഉള്ളാവരാണ് എന്നാൽ ചില സമയത്ത്, ആത്മാനുകമ്പയാം വിധം ദുർഘടാവസ്ഥയിൽ എത്തിയേക്കാം. അനുമാനിക്കുവാനുള്ള കഴിവ് വളരെ മികച്ച രീതിയിലുണ്ട് കൂടാതെ ഉദ്ധിഷ്ടകാര്യത്തെയും കാര്യനിർവ്വഹണത്തെയും കുറിച്ച് ശക്തമായ അവബോധം ഉണ്ടായിരിക്കും. മകരം രാശിക്കാർ സമചിത്തതയുള്ളാവരും മറ്റുള്ളാവരുമായി ഇടപഴകുമ്പോൾ മിതഭാഷിയായി കാണാം എങ്കിലും, ഒരിക്കൽ ഇവരുടെ വിശ്വാസിയത ലഭിച്ചാൽ ഇവർ ആത്മാർത്ഥതയും പ്രതിബദ്ധതയും ഉള്ള സുഹൃത്തായിരിക്കും. സാമൂഹികപരമായി അഭക്വിന്യാസമുള്ളതും, ആഗ്രഹിക്കുന്ന എന്തിനും വേണ്ടി പരിശ്രമിക്കുവാനുള്ള മനസ്സും, കൂടാതെ ഇവരുടെ ആത്മാഭിമാനം അങ്ങേയറ്റം പ്രാധാന്യമുള്ളതുമാണ്. തത്ത്വചിന്തയേക്കാൾ ഭൗതീകമായ സമീപനമാണ് ഇവർക്കുള്ളത്. ഇവരുടെ സ്വന്തം ആനന്ദത്തിനു വേണ്ടി പ്രണയത്തിൽ ഏർപ്പെടുവാനുള്ള കഴിവ് ഇവർക്കുണ്ട്.#സവിശേഷമായ കുംഭ രാശിക്കാരുടെ വിശേഷണത്തിൽ ആശയവിനിമയം നടത്തുവാനുള്ള തീക്ഷ്ണമായ ആഗ്രഹം ഉണ്ട്. യാഥാസ്ഥിതികമായി ആരുടെ അഭിപ്രായങ്ങളാണോ കുറച്ച് അധികമായുള്ളത്, അവരുമായുള്ള നിങ്ങളുടെ സ്ഥിരമായ പ്രക്ഷപണത്തെ പരിമിതമാക്കുവാൻ നിങ്ങൾ പഠിച്ചില്ലായെങ്കിൽ നിങ്ങൾ അൽപം നയരഹിതരും പ്രാകൃതരും ആയിരിക്കും. ഇവർ വളരെ താത്പര്യമുണർത്തുന്നവരും ആകർഷണീയരും ആണ്; ലജ്ജയുള്ളവർ ആയേക്കാം, ലോലമായ മനസുള്ളവരും, കുലീനവും ക്ഷമാശീലവും അല്ലെങ്കിൽ പ്രകടനപ്രിയർ എന്ന പ്രവണതയോടു കൂടിയ ആവേശപൂർണ്ണവും സന്തോഷപൂർണ്ണവും ആയവരാണ്. ഇവർ സുശക്തമായ ശിക്ഷാവിധികളെ വളരെ പിൻതാങ്ങുന്നവരും വിശ്വസിക്കുന്ന എന്തിനും വേണ്ടി പോരാടുന്നവരുമാണ്; സ്വപ്നജീവികളും മാർഗ്ഗം തെളിക്കുന്നവരുമാണ്. ഇവർ പൊതുവെ എതിരഭിപ്രായം ഇല്ലാത്തവരും മറ്റുള്ളവരുടെ കാഴ്ച്ചപ്പാടിനോട് വളരെ സഹിഷ്ണതയുള്ളവരുമാണ്. ഇവർ നല്ല കേൾവിക്കാരും സുഹൃത്തുക്കളെ വളരെ അഗാധമായി പരിചരിക്കുന്നവരുമാണ്. ഇവർ അനുകമ്പയുള്ളവരും നിഷ്കപടതയ്ക്കും വെട്ടിതുറന്നു പറയുന്നതിനും അറിയപ്പെടുന്നവരാണ്. ഇവർ പരിശുദ്ധരും ആദർശവാദികളുമാണ്, കാൽപനികതയും പ്രായോഗികതയും, കാണാൻ കൊള്ളാവുന്നതും സൗഹൃദപൂണ്ണവുമായ വ്യക്തികളാണ്. യഥാർത്ഥ ആശയങ്ങൾ കൊണ്ടു വരുന്നതിൽ നമുക്ക് ഇവരെ പരിഗണിക്കാവുന്നതാണ്. മറ്റുള്ളവരെ സഹായിക്കുന്നതിനായി ഇവർ ഏതു മാർഗ്ഗവും സ്വീകരിക്കും എന്നാൽ വൈകാരികമായി ഉൾപ്പെടുകയില്ല.#മീന രാശിയിലുള്ള ആളുകൾ പ്രായോഗികത ഉള്ളവരല്ല എന്നാൽ ലോലഹൃദയരും വാസനാപ്രേരിതരുമാണ്. ഇവർ ബഹുമുഖപ്രതിഭകളാണ് കൂടാതെ കാര്യങ്ങളെ യുക്തിപൂർവ്വമെന്നതിനേക്കാൾ ഉപരി മനസിലാക്കും. നിലവിലുള്ള മനോഭാവത്തെ കർക്കശമായി നിരീക്ഷിക്കുകയും കൂടാതെ അവരുടെ ഇടുങ്ങിയ ചിന്താഗതികൾ അല്ലാതെ മറ്റെന്തും ക്ഷമിക്കുവാൻ തയ്യാറാവുകയും ചെയ്യും. മീന രാശിക്കാർ ആത്മവിശ്വാസികളും, ആത്മാർത്ഥതയുള്ളവരും, ഗൃഹാന്തരീക്ഷം ഇഷ്ടപ്പെടുന്നവരും, ദയാലുക്കളും, ഉദാരമതികളും ആയിരിക്കും. ഇവരെ വളരെ വേഗം തെറ്റിദ്ധരിപ്പിക്കാം. സുഖലോലുപതയും അപ്രായോഗികതയും നിറഞ്ഞ പ്രകൃതം ഇവരോട് ഏറ്റവും അടുപ്പമുള്ളവർക്കും പ്രിയപ്പെട്ടവർക്കും അസ്വസ്ഥതയ്ക്ക് കാരണമാകും. ശുഭാപ്തിവിശ്വാസത്തിന്‍റേയും അശുഭാപ്തിവിശ്വാസത്തിന്‍റേയും മിശ്രണമായതിനാൽ പ്രശ്നങ്ങളിൻമേൽ മനസുറപ്പിക്കുവാൻ ഇവർക്ക് ബുദ്ധിമുട്ട് അനുഭവപ്പെടും. മീന രാശിക്കാർ പൊതുവേ ലജ്ജാശീലരും ശാശ്വത സ്നേഹമുള്ളവരും ഇവരുമായി ബന്ധപ്പെടുന്ന എല്ലാവരേയും വിശ്വസിക്കുന്നവരും ആണ്. ഇവർ ഉത്കൃഷ്ടബോധത്താൽ ശാശ്വത കാല്പനീകതയുള്ളവരും കൂടാതെ സ്വന്തം കാലിൽ നിൽക്കുവാനുള്ള അധൈര്യപ്പെടാത്തതിനാൽ പ്രസിദ്ധിക്ക് വളരെ അധികം അർഹരുമാണ്. മീന രാശിക്കാർ അങ്ങേയറ്റം അന്ധവിശ്വാസികളും ഈശ്വരവിശ്വാസികളും ആണ്. ഇവർ ശാന്തവും സൗമ്യവുമായ പ്രകൃതത്തിന് ഉടമയാണ് എന്നാൽ അത് രൂപപ്പെടുത്തി എടുക്കേണ്ടത് ആവശ്യമാണ്. നല്ലതായതും മോശമായതും ആയ സാഹചര്യങ്ങളുമായി ഇവർ ഒത്തുപോകും; ഉദാരതയുള്ളവരും, സഹൃദയരും, കൂടാതെ ദയയുടേയും സഹാനുഭൂതിയുടേയും ശരിയായ അവബോധത്തോടേയുള്ള നല്ല പ്രകൃതക്കാരും ആണ് എന്നിരുന്നാലും ചുറ്റുമുള്ള എല്ലാത്തിനോടും സംവേദനക്ഷമതയുള്ളവരും അതോടൊപ്പം മറ്റുള്ളാവരോട് സഹാനുഭൂതിയുള്ളവരുമാണ്.
     PHYSICAL_APPEARANCE_PREDICTION         = ഉത്തമമായ താടി, മൂക്ക്, വായ് എന്നിവയോടുകൂടി ശക്തവും മെലിഞ്ഞതുമായ പ്രകൃതമാണ് മേട രാശിയിലുള്ള ആളുകൾക്കുള്ളത്. ശരാശരി ഉയരവും ശരീരഘടനയും, ചുരുണ്ട മുടിയും, ഇരുണ്ട നിറവും, ഉന്തിനിൽക്കുന്ന വില്ലുപോലെ വളഞ്ഞ പുരികവും, പുരുഷന്മാർ ആണെങ്കിൽ പൗരുഷ പെരുമാറ്റ രീതിയും സ്ത്രീകൾ ആണെങ്കിൽ ഊർജ്ജസ്വലതയും ഉള്ള ബലവത്തായ ശരീരഘടനയായിരിക്കും ഇവർക്ക്. മൊത്തത്തിലുള്ള ശരീരപ്രകൃതം ശൗര്യവും കഠിനവും ആണെന്ന മതിപ്പ് ഉളവാക്കുന്നു. ഇവർക്ക് സാധാരണയായി തവിട്ടുനിറത്തിലുള്ളത് അല്ലെങ്കിൽ കറുപ്പുനിറം കുറവായ ചുരുണ്ടമുടി ആയിരിക്കും. ഇവർക്ക് മിക്കവാറും തലയിൽ ഒരു അടയാളമോ മറുകോ ഉണ്ടാകും. മിക്കവാറും സ്പഷ്ടമായ ഞരമ്പുകളായിരിക്കും കൂടാതെ ശരീരത്തിൽ മുറിവിനാലുള്ള പാടുകൾ ഉണ്ടായിരിക്കുകയും ചെയ്യും.#ഇടവ രാശിക്കാർ ആലസ്യത്തിനു മിക്കപ്പോഴും പ്രവണതയുള്ളതും പൊക്കം കുറഞ്ഞതുമായ ശരീരപ്രകൃതം ഉള്ളവരായിരിക്കും. തിളങ്ങുന്ന വലിയ കണ്ണുകളും മികച്ച രീതിയിൽ വാർത്തെടുത്ത ചെവികളും മൂക്കും കാമിയായ ചുണ്ട് എന്നിവയുള്ള മനോഹരമായ മുഖത്താൽ അനുഗ്രഹീതരായിരിക്കും ഇവർ. ശരീരഘടനയിൽ ഇവർ മുഖത്തിന്‍റെ അത്ര ഭാഗ്യശാലികൾ ആയിരിക്കുകയില്ല കൂടാതെ ഇവർക്ക് ചതുരാകൃതിയിലുള്ള ആകർഷണമില്ലാത്ത കൊഴുത്ത ശരീരപ്രകൃതി ആയിരിക്കും, ചിലപ്പോൾ പുറകു വശത്തോ വശങ്ങളിലോ അടയാളങ്ങൾ ഉണ്ടാകും. മിക്കപ്പോഴും അംഗീകരിക്കുന്ന വിധത്തിലുള്ള ബാഹ്യരൂപമായിരിക്കും ഇടവ രാശിക്കാരുടേത്.#മിഥുന രാശിയിലുള്ള ആളുകൾക്ക് മനോഹരവും വ്യക്തമായി നിർവചിച്ചിട്ടുള്ളതുമായ തിളങ്ങുന്ന കണ്ണുകളും പ്രകടനപരമായി ചലിക്കുന്ന സ്വഭാവസവിശേഷതകളും ഉണ്ട്. വഴങ്ങുന്ന, മെലിഞ്ഞ, പേശീ വ്യൂഹമുള്ള ഇവർ മെലിഞ്ഞ ശരീരപ്രകൃതമുള്ളവരും ശരാശരി മുതൽ വളരെ നീളമുള്ളവരും, ഫാഷൻ മോഡലുകളെ പോലെ നീളമുള്ള കാലുകളായിരിക്കും; മിഥുന രാശിയിലുള്ളവരുടെ സാന്നിദ്ധ്യം നല്ലതും സ്വീകാര്യവും ആയിരിക്കും. ഇവരുടെ അതിശയകരമായ മുഖലക്ഷണമാണ് ചെറിയ താടി കൂടാതെ വെളുത്ത നിറമായിരിക്കുവാനുള്ള സാധ്യതയും ഉണ്ട്. ഇവരുടെ ആകർഷകത്വമുള്ള വ്യക്തിത്വത്തെ ചുരുണ്ട മുടി കൂടുതൽ സവിശേഷമാക്കുന്നു. ഇവർക്ക് മിക്കപ്പോഴും തിളക്കമുള്ള കണ്ണുകളോടുകൂടിയ വിശലമായ നെറ്റിയും ഉണ്ടാകും. ഇന്നാൽ ഇത്തരത്തിൽ ആകർഷണമുള്ള സവിശേഷതകളും വ്യക്തിത്വവും ഉണ്ടെങ്കിലും മിക്കപ്പോഴും അസുഖങ്ങളെയും ആരോഗ്യ പ്രശ്നങ്ങളേയും നേരിടേണ്ടി വരാം.#കർക്കിടക രാശിക്കാരുടെ ലക്ഷണങ്ങൾ ഉരുണ്ട ആകൃതിയിലുള്ളതാണ് കൂടാതെ മുപ്പത് വയസാകുമ്പോഴേക്കും ഇവർ വണ്ണിക്കുവാനുള്ള സാധ്യതയുണ്ട്. മുടി ഇരുണ്ടതും കട്ടി കുറഞ്ഞതും വിരളവും ആയിരിക്കും. മൂക്ക് ചെറുതും, കണ്ണുകൾ പുറത്തേക്ക് തള്ളിയതും, താടി ഉരുണ്ടതും ആയിരിക്കും. ഉയരം കുറവിൽ നിന്നും ശരാശരി വരെ ആകാം. ഈ ചിഹ്നത്തിൽ ജനിച്ചവർ കാഴ്ച്ചയിൽ അത്ര ഭാഗ്യവാന്മാർ ആയിരിക്കുകയില്ല ഇവർക്ക് നീണ്ട കൈകളോടുകൂടിയ ഒതുങ്ങിയ ശരീര പ്രകൃതമായിരിക്കും കൂടാതെ വളരെ ഉയരം ഇല്ലെങ്കിലും മുകളിലോട്ട് പരന്ന ശരീരപ്രകൃതമായിരിക്കും. വെളുത്ത നിറമാണെങ്കിലും മൂക്ക് ഭംഗിയുള്ളത് ആയിരിക്കുകയില്ല.#ചിങ്ങ രാശിയിലുള്ളവർ ഊർജ്ജപ്രഭാവമുള്ള വ്യക്തിത്വത്തിന് ഉടമകൾ ആയിരിക്കും ഇവർ മറ്റുള്ളവരിൽ മാന്ത്രികവും കാന്തികവുമായ തോന്നൽ ഉണ്ടാക്കും. എന്നാൽ ഇവർ ഘടനയിൽ വ്യക്തിത്വത്തിന്‍റെ അത്ര അനുഗ്രഹീതരല്ല ഇവർ ശരാശരി ഉയരമുള്ളവരും ശരീരത്തിന്‍റെ  മുകൾ വശം പൂർണ്ണമായ രൂപഭംഗി ഉള്ളവരും ആയിരിക്കും. ചിങ്ങ രാശിയിലുള്ളവർക്ക് മഞ്ഞനിറം കലർന്ന കണ്ണുകളോടും സ്പഷ്ടമായ താടിയോടും കൂടിയ ദീഘവൃത്താകൃതിയിലുള്ള വലിയ മുഖമാണ് ഉള്ളത്. ചിങ്ങ രാശിയിലുള്ള സ്ത്രീയും പുരുഷനും നിയന്ത്രണമുള്ളവരായി കാണപ്പെടുന്നു, എന്നാൽ വളരെ പെട്ടെന്നു തന്നെ ഇവരെ മാറ്റുവാൻ കഴിയും കൂടാതെ യോദ്ധാക്കളുമാണ്. കായബലവും കോപപാരവശ്യവും ഉള്ളതിനാൽ, പെട്ടെന്നുള്ള പ്രതികരണവും ആക്രമണവും സാധാരണമാണ്.#കന്നി രാശിയിലുള്ള ആളുകൾ മിക്കപ്പോഴും അലസനായ സാമുദായിക ആചാരലംഘകൻ അല്ലെങ്കിൽ പൊതുവേ വിലക്ഷണപ്രകൃതം എന്ന പ്രതീതി ഉണ്ടാക്കുന്നു. കന്നി രാശിക്കാർക്ക് ‘’ഒതുങ്ങിയ’’ ശരീരഘടന കൂടാതെ, പ്രത്യേകിച്ചും മുഖം മെലിഞ്ഞതും ആയിരിക്കും. ഇവരുടെ ശ്രദ്ധയോടെ അളന്നുള്ള നടത്തയും, അനുരൂപമായ ശരീരവും സവിശേഷമായ യുവത്വവും, നിഷ്കളങ്കമായ പ്രകൃതവും എടുത്തു പറയാവുന്നതാണ്. ഇവർ നല്ല നെറ്റിത്തടവും, നീണ്ട മൂക്കും വിപുലമായ കവിളും ഉള്ളവരായിരിക്കും.#തുലാം രാശിയിലുള്ള ആളുകൾക്ക് വൈവിധ്യമുള്ളവരും സവിശേഷതയുള്ളവരും, മനോഹരമായ ചുണ്ടുകളോടു കൂടിയ ആകർഷണീയമായ ശരീരപ്രകൃതവും കൂടാതെ പാപമുക്തനും ആത്മവിശ്വാസമുള്ള പ്രതിരൂപവും ഉണ്ട്. ഈ ന്യൂനവംശം കാഴ്ച്ചയിൽ സാധാരണ മങ്ങിയ നിറമോ തവിട്ടു നിറമോ ഉള്ളവരായിരും, അമിതവും തീക്ഷ്ണവുമായ അവലോകനശക്തി ഉള്ളവരുമാണ്. തുലാം രാശിക്കാർ നിശിതമായ ആകാരരൂപം ഉള്ളവരാണ്. തുലാം രാശിക്കാർക്ക് തിടുക്കം നിയന്ത്രിക്കുവാനുള്ള മികച്ച കഴിവുണ്ട്, ഇത് മഹത്തരമെന്ന് വിശേഷിപ്പിക്കപ്പെടുന്നു. പൊതുവേ, ഈ രാശിയിലുള്ള സ്ത്രീകളിൽ കൂടുതലും ഒതുങ്ങിയ ശരീരമുള്ളവരേക്കാൾ പറയത്തക്ക ആകർഷണീയതയോടു കൂടിയ ആകാരമുള്ളവരായിരിക്കും, എന്നാൽ പുരുഷന്മാർ ധൈര്യമില്ലാത്തവരും പൊണ്ണത്തടിയന്മാരും ആയിരിക്കും. ഇവർക്ക് ഇടത്തെരം പൊക്കം അല്ലെങ്കിൽ ചിലപ്പോൾ നല്ല നീളം ഉണ്ടാകും.#ശാരീരികമായി പറഞ്ഞാൽ, വൃശ്ചിക രാശിയിലുള്ള ആളുകൾ തീർത്തും ദൃഢഗാത്രരും കൂടാതെ മിക്കപ്പോഴും ശക്തമായ ഷോൾഡറുകളോടും കൂടിയവരാണ്. ഏതു തരത്തിലായാലും, ഇവർ ദൃഢഗാത്രരും ശക്തരുമാണ്. വ്യക്തമായ ആകാരങ്ങളോടു കൂടിയ ചതുര മുഖത്തോടു കൂടിയവരും, സൂക്ഷ്മദർശനമുള്ള ആകർഷണീയമായ നേത്രങ്ങളും, നല്ലരീതിയിൽ വർണ്ണിച്ചിരിക്കുന്ന കാമാതുരമായ ചുണ്ടുകളും ഇവർക്കുണ്ട്. മുടി സാധാരണയായി തവിട്ടു നിറമുള്ളതും കട്ടിയുള്ളതും ആയിരിക്കും. പൊതുവെയുള്ള കാഴ്ച്ചപ്പാട് ആകർഷണത, കരുത്ത്, പ്രച്ഛന്നത, അതേസമയം ഗൗരവവും ഉള്ളതായി തോന്നിപ്പിക്കുന്നു.#ശാരീരികമായി പറഞ്ഞാൽ, ധനു രാശിയിലുള്ള ആളുകൾ നല്ല ബലവാനും, ഉയരമുള്ളവർ അല്ലെങ്കിൽ മിക്കവാറും വളരെ ഉയരമുള്ളവരും, തുറന്നതും മുഴുവൻ വിശേഷണതകൾ ഉള്ളവരും, മിക്കവാറും ചിരിക്കുന്ന ചുണ്ടുകളും കൂടാതെ കട്ടിയുള്ള മുടിയോടു കൂടിയവരും ആയിരിക്കും. ഇവർ ഊർജ്ജവും ആകർഷണീയതും പ്രസരിപ്പിക്കുന്നു.  മുപ്പതാം വയസ്സുകളിൽ അമിത ഭോഗാസക്തിയാൽ ഉണ്ടാകുന്ന ഭാരത്താൽ ഇവർ പ്രായമാകുന്തോറും വണ്ണിക്കുകയും ചെയ്യും. ഇവരുടെ മാംസപേശികൾ പ്രത്യേകിച്ചും കായിക ക്ഷമതയുള്ളവ ആയിരിക്കില്ല. ധനു രാശിക്കരുടെ പൊതുവെയുള്ള ബാഹ്യരൂപം വ്യക്തിപ്രഭാവം, പ്രസരിപ്പ്, ഊർജ്ജസ്വലത എന്നീ മതിപ്പു നൽകുന്നവയാണ്. ഇവർ കാഴ്ച്ചയിൽ സന്തോഷവാന്മാരായിരിക്കും, ഇവരുടെ വസ്ത്രധാരണം സാധാരണമായിരിക്കും എന്നാൽ അവരുടെ ഉദാരമായ പ്രകൃതവും പാശ്ചാത്തലവും എപ്പോഴും ക്രമീകരിക്കപ്പെട്ടതായിരിക്കും.#മകരം രാശിക്കാർ പൊതുവെ മെലിഞ്ഞതും, അസ്ഥിമാത്രനും, വിലക്ഷണത്തോടു കൂടിയവരും കൂടാതെ കുറവിൽ കവിഞ്ഞ് ശരാശരി ഉയരം ഉള്ളവരും ആയിരിക്കും. ശരീര പ്രകൃതം നല്ലതും തച്ചുളിയാൽ ചെത്തിയതും പോലെ കാണപ്പെടും, കൂടാതെ ആഴത്തിൽ നിലകൊള്ളുന്ന ഗൗരവപൂർണ്ണമായ നേത്രങ്ങളുമാണ്. ഇവർക്ക് കൺപുരികത്തിലും നെഞ്ചിലും കട്ടിയുള്ള രോമങ്ങളുണ്ട്. സാധാരണ വലിയ തലയും ചിലസമയം പുറത്തേക്ക് തള്ളിനിൽക്കുന്നവലിയ പല്ലുകളും ഉണ്ട്. പൊതുവെയുള്ള കാഴ്ച്ചയിൽ ദൃഢത, ഖനത്വം, തീവ്രത, പക്വത എന്നീ മതിപ്പ് നൽകുന്നു. നിഷ്പക്ഷത, സമചിത്തത, കൂടാതെ സാമാന്യത എന്നിവയാൽ ശ്രദ്ധിക്കപ്പെടുന്നവരാണ് ഇവർ. ഇവരുടെ താത്പര്യം പ്രായോഗികതയിലാണ് സൗന്ദര്യശാസ്ത്രത്തിൽ അല്ല, ഇതിൽ ഇവർ  ഒരിക്കലും ശ്രദ്ധകൊടുക്കുകയില്ല. ഇവർ മിക്കപ്പോഴും ശാസ്ത്രജ്ഞനെയോ തത്ത്വചിന്തകനെയോ ഒരു പണ്ഡിതനേയോ അല്ലെങ്കിൽ ഒരു ജ്ഞാനിയേയോ പോലെ കാണപ്പെടും.#കുഭം രാശിക്കാർ പൊതുവേ മെലിഞ്ഞതും നീളത്തിന് അനുയോജ്യമായ ഉയരത്തിലും കാണപ്പെടുന്നു. ഇവർക്ക് വലിയ മുഖം, കഴുത്ത്, പിൻഭാഗം, ആമാശയം, അരക്കെട്ട്, തുടകളും കാലുകളും ഉണ്ടാകും. ഇവർക്ക് സ്ഥിരവും ഹൃദ്യവുമായ ലക്ഷണവും, കറുത്തതും കട്ടിയുള്ളതുമായ മുടിയും, കൂടാതെ ഇവരുടെ കേശാലങ്കാരശൈലി സമചിത്തമോ അസാധാരണമോ ആയിരിക്കും. ഗൗരവത്തിന്‍റെ  മറയോടുകൂടിയ നല്ല മുഖഭാവം ആയിരിക്കും ഇവരുടേത്. ജീവൻ തുടിക്കുന്ന നേത്രങ്ങൾ എന്തെങ്കിലും അസാധാരണമായത് ഉറ്റുനോക്കുന്നതു പോലെ കാണപ്പെടും. മൊത്തത്തിലുള്ള ഇവരുടെ കാഴ്ച്ചപ്പാട് ഊർജ്ജസ്വലതയും അഭിനവത്വവും നൽകുന്നു. അസാധാരണമോ ഗൗരവമോ ആയി ഇവർ കാണപ്പെടുന്നു. ഏതുരീതിയിൽ ആയാലും, ഇത് എപ്പോഴും ആശ്ചര്യകരമാണ്.#മീനം രാശിക്കാർ പൊതുവെ കൊഴുത്തതും ശരാശരി ഉയരം ഉള്ളവരും ആയിരിക്കും കാരണം ഒട്ടുംതന്നെ വ്യതിരിക്തം ഇല്ലാത്ത ചിഹ്നമാണിത്. വിവിധ ബാഹ്യരൂപം എടുക്കുവാൻ കഴിയുന്ന രാശിചക്രത്തിലെ ഒരേ ഒരു ചിഹ്നമാണിത്. ഇവരുടെ നേത്രങ്ങൾ പൊതുവേ വലുതും, ആകർഷണീയവും, നല്ലതുപോലെ ഉറച്ചതും മന്ദമായതും, കൂടാതെ മിക്കവാറും സമ്മോഹനമായതും ആയിരിക്കും. മൊത്തത്തിൽ ഏതാണ്ട് അവ്യക്തവും, ഗൂഢവും, ഉദാരവും ശാന്തവുമായ ലക്ഷണമാണ് ശരീരഘടന നൽകുന്നത്. യഥാർത്ഥത്തിൽ, മീനരാശിക്കരുടെ പുറമേയുള്ള ലക്ഷണങ്ങൾ തരം തിരിക്കുവാൻ ബുദ്ധിമുട്ടുള്ളതാണ്, അതുപോലെതന്നെ മൊത്തത്തിൽ പിടികൊടുക്കാത്ത വിധം നിലകൊള്ളുന്നതാണ് അവരുടെ വ്യക്തിത്വവും!
     WELLNESS                               = ആരോഗ്യം എന്തിനു വേണ്ടി
     DISPOSITION_PERSONALITY                = പ്രകൃതവും വ്യക്തിത്ത്വവും എന്തിനു വേണ്ടി
     PHYSICAL_APPEARANCE                    = ബാഹ്യരൂപം എന്തിനു വേണ്ടി
