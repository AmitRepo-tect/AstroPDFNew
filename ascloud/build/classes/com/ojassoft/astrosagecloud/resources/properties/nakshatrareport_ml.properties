

	 WHAT_IS_NAKSHATRA							= നക്ഷത്രമെന്നാൽ എന്താണ്?
	 NAKSHATRA_INTRO							= ഹൈന്ദവ ജ്യോതിഷത്തിൽ ചന്ദ്രസൗധത്തിനുള്ള പദമാണ് നക്ഷത്രം. ഗ്രഹമണ്ഡലത്തിലെ 27ൽ(ചിലപ്പോൾ 28) ഒന്നാണ് നക്ഷത്രം. ഇവയുടെ നാമങ്ങൾ യഥാക്രമമുള്ള മണ്ഡലങ്ങളിലെ ഏറ്റവും പ്രധാനപ്പെട്ട താരസഞ്ചയവുമായി ബന്ധപ്പെട്ടിരിക്കുന്നു. സംസ്കൃതത്തിൽ ചിത്ര എന്നു പറയുന്ന സ്പൈക നക്ഷത്രത്തിന് നേരേ എതിരെയുള്ള ബിന്ദുവാണ് നക്ഷത്രങ്ങളുടെ ആരംഭ ബിന്ദു (മറ്റ് വ്യത്യസ്തങ്ങളായ വിശദീകരണങ്ങളും നിലവിലുണ്ട്). ഇതിനെ മേടം അല്ലെങ്കിൽ “ഏരീസിന്‍റെ ആരംഭം എന്ന് പറയുന്നു”. ഈ ബിന്ദുവിൽ നിന്നും കിഴക്കു ഭാഗത്തേക്ക് തുടങ്ങുന്ന ഓരോ നക്ഷത്രങ്ങളായി ഗ്രഹമണ്ഡലത്തെ വിഭജിച്ചിരിക്കുന്നു. ഒരു നക്ഷത്ര മാസത്തിലെ ദിവസങ്ങളുടെ എണ്ണത്തെയാണ് നക്ഷത്രങ്ങളുടെ എണ്ണം പ്രതിഫലിപ്പിക്കുന്നത് (ആധുനിക മൂല്യം: 27.32 ദിവസങ്ങൾ), അതായത് ഒരു ദിവസം കൊണ്ട് ചന്ദ്രൻ തരണം ചെയ്യുന്ന നക്ഷത്രത്തിന്‍റെ വ്യാപ്തി. ഓരോ നക്ഷത്രത്തേയും നാലിൽ ഒന്നായി(അല്ലെങ്കിൽ പദങ്ങളായി) വീണ്ടും അംശാംശമായി വിഭജിച്ചിട്ടുണ്ട്. പ്രസിദ്ധമായ ഹൈന്ദവ ജ്യോതിഷത്തിൽ ഇവ പ്രധാന ഭാഗം ആകുന്നു, ജനിച്ച കുഞ്ഞിനു നൽകുന്ന പേരിന്‍റെ ആദ്യാക്ഷരം പോലെ ചന്ദ്രൻ അനുയോജ്യമായ പദത്തിലായിരിക്കുമ്പോൾ, ഓരോ പദങ്ങളും ഒരു അക്ഷരവുമായി ബന്ധപ്പെട്ടിരിക്കുന്നു.
