
	PERSON						                        = വ്യക്തി  
	MANGLIK					                        = മങ്ലിക്ക് 
	PERSON_IS_MANGLIK			                        = Person is Manglik
	PERSON_IS_NOT_MANGLIK		                        = Person is not Manglik
	MANGLIK_DETAILS_PARAGRAPH1	                        = ജനന ചാർട്ടിലെ ലഗ്നത്തിന്‍റേയും ചന്ദ്രന്‍റേയും സ്ഥാനത്തിൽ നിന്നാണ് മൻഗ്ലിക് ദോഷം എന്നാണ് കണക്കാക്കപ്പെടുന്നത്.
    MANGLIK_DETAILS_FIRST                              = ജനന ചാർട്ടിൽ, മംഗലം വച്ചിരിക്കുന്നത് 
    MANGLIK_DETAILS_SECOND                             =  ലഗ്നത്തിൽ നിന്നുള്ള ഭാവം, എന്നാൽ ചന്ദ്ര ചാർട്ടിൽ മംഗലം വച്ചിരിക്കുന്നത് 
    MANGLIK_DETAILS_THIRD                              =  ഭാവം
	MANGLIK_DETAILS_HENCE_NOTE                         = ആയതിനാൽ മംഗല്യ ദോഷമെന്നാൽ 
	PRESENT_NEITHER_IN_LAGNA_CHART_NOR_IN_MOON_CHART   = അതിനാൽ ചൊവ്വ ദോഷം നിങ്ങളുടെ ലഗ്ന ചാർട്ടിലോ ചന്ദ്ര ചാർട്ടിലോ ഇല്ല. 
    MANGLIK_DETAILS_HENCE_NOTE1                        = അതിനാൽ  ചൊവ്വ ദോഷം നിങ്ങളുടെ ലഗ്ന ചാർട്ടിലും ചന്ദ്ര ചാർട്ടിലും ഉണ്ട്.
    MANGLIK_DETAILS_HENCE_NOTE2                        = അതിനാൽ  ചൊവ്വ ദോഷം നിങ്ങളുടെ ലഗ്ന ചാർട്ടിൽ ഉണ്ട്  എന്നാൽ ചന്ദ്ര ചാർട്ടിൽ ഇല്ല.  
    MANGLIK_DETAILS_HENCE_NOTE3                        = അതിനാൽ  ചൊവ്വ ദോഷം നിങ്ങളുടെ ലഗ്ന ചാർട്ടിൽ ഇല്ല എന്നാൽ ചന്ദ്ര ചാർട്ടിൽ ഉണ്ട്. 
	MANGLIK_DETAILS_PARAGRAPH4                         = മംഗല്യ ദോഷം ഒരു വ്യക്തിയുടെ വൈവാഹിക ജീവിതത്തിൽ തടസ്സങ്ങൾ സൃഷ്ടിക്കുമെന്ന് കണക്കാക്കപ്പെടുന്നു. ചിലരെ സംബന്ധിച്ച്, മംഗല്യ ദോഷത്താൽ തുടർച്ചയായ അസുഖങ്ങൾക്കും അല്ലെങ്കിൽ ആത്യന്തികമായി പങ്കാളിയുടെ(കളുടെ) മരണത്തിനും കാരണമാകും.
    MANGLIK_DETAILS_PARAGRAPH5                         = ഒരു മൻഗ്ലിക്ക് വ്യക്തി മറ്റൊരു മൻഗ്ലിക്ക് വ്യക്തിയെ വിവാഹം കഴിക്കുകയാണെങ്കിൽ മൻഗ്ലിക്ക് ദോഷം ഇല്ലാതാവുകയും അവയ്ക്ക് ഫലം ഇല്ലതാവുകയും ചെയ്യുമെന്നാണ് കണക്കാക്കപ്പെടുന്നത്.
    MANGLIK_DETAILS_SUBHEADING1                        = ചില പരിഹാരങ്ങൾ (അഥവ മംഗല്യ ദോഷം ഉണ്ടെങ്കിൽ)
    MANGLIK_DETAILS_SUBHEADING2                        = പരിഹാരങ്ങൾ (വിവാഹത്തിനു മുമ്പ് ചെയ്തിരിക്കേണ്ടത്)
    MANGLIK_DETAILS_SUBHEADING3                        = പരിഹാരങ്ങൾ (വിവാഹത്തിനു ശേഷം ചെയ്യാവുന്നത്)
	MANGLIK_DETAILS_PARAGRAPH6                         = കുംഭ വിവാഹം, വിഷ്ണു വിവാഹം കൂടാതെ അശ്വധ വിവാഹം എന്നിവയാണ് പ്രചാരത്തിലുള്ള മംഗല്യ ദോഷ പരിഹാരങ്ങൾ. അശ്വധ വിവാഹം എന്നത് അരയാലിനെയോ വാഴയേയോ വിവാഹം ചെയ്തതിനുശേഷം അവയെ വെട്ടിമുറിക്കുക എന്നതാണ്. കുംഭ വിവാഹം ഖാട്ട വിവാഹമെന്നും അറിയപ്പെടുന്നു, ഒരു കുടത്തെ വിവാഹം ചെയ്തതിനുശേഷം അത് പൊട്ടിക്കുക എന്നാണ് ഇത് അർഥമാക്കുന്നത്.
    REMEDIES1                                          = പൂജാമുറിയിൽ കേസരീയ ഗണപതിയെ(ഗണപതി ഭഗവാന്‍റെ ഓറഞ്ച് നിറത്തിലുള്ള വിഗ്രഹം) വയ്ക്കുകയും ദിവസവും പൂജിക്കുകയും ചെയ്യുക. 
    REMEDIES2                                          = ഹനുമാൻ ചാലിസ ദിവസവും ഉരുവിട്ട് കൊണ്ട് ഹനുമാൻ ഭഗവാനെ പൂജിക്കുക.
    REMEDIES3                                          = മഹാമൃത്യുജ്ജയ പഥ് (മഹാമൃത്യുജ്ജയ മന്ത്രം ഉരുവിടുക).
	MANGLIK_DETAILS_SUBHEADING4                        = പരിഹാരങ്ങൾ (ലാൽ കിതാബിനെ അടിസ്ഥാനമാക്കിയുള്ളത്, വിവാഹത്തിനു ശേഷം ചെയ്യാവുന്നത്)
    LK_REMEDIES1                                       = എന്തെങ്കിലും മധുരം പക്ഷികൾക്ക് തീറ്റയായി നൽകുക
    LK_REMEDIES2                                       = ഗൃഹത്തിൽ ആനക്കൊമ്പ് വയ്ക്കുക.
    LK_REMEDIES3                                       = പാലിൽ എന്തെങ്കിലും മധുരം കലക്കി വാഴയെ പൂജിക്കുക.
	MANGLIK_DETAILS_NOTE                               = ഈ പരിഹാര ക്രിയകൾ സ്വന്തമായി നടത്തുന്നതിനു മുൻപേ നിങ്ങൾ ഏതെങ്കിലും ജ്യോതിഷനെ സന്ദർശിക്കണമെന്ന് ഞങ്ങൾ ശക്തമായി നിർദ്ദേശിക്കുന്നു.
