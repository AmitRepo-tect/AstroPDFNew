	SADESATIRISINGPHASE	= ഏഴര ശനിയുടെ ആരംഭമാണ് ഈ കാലഘട്ടം. ഈ കാലയളവിൽ ശനി 12-ആം ഭാവത്തിൽ നിന്നും ചന്ദ്രമണ്ഡലത്തിലേക്ക് നീങ്ങുന്നു. ഇത് സാധാരണയായി സാമ്പത്തിക നഷ്ടം, ഒളിഞ്ഞിരിക്കുന്ന ശത്രുക്കളിൽ നിന്നുള്ള പ്രശ്നങ്ങൾ, ലക്ഷ്യമില്ലാത്ത യാത്രകൾ, തർക്കങ്ങൾ, ദാരിദ്ര്യം എന്നിവയെ സൂചിപ്പിക്കുന്നു. ഈ കാലയളവിൽ, ഒളിഞ്ഞിരിക്കുന്ന ശത്രുക്കളിൽ നിന്നുള്ള പ്രശ്നങ്ങൾ നിങ്ങൾ അഭിമുഖീകരിക്കേണ്ടിവരും. സഹപ്രവർത്തകരുമായുള്ള നിങ്ങളുടെ ബന്ധം നല്ലരീതിയിൽ ആയിരിക്കുകയില്ല കൂടാതെ അത് നിങ്ങൾ ജോലിചെയ്യുന്ന ചുറ്റുപാടിൽ പ്രശ്നങ്ങൾ സൃഷ്ടിച്ചേക്കാം. കുടുംബപരമായ പ്രശ്നങ്ങൾ നിങ്ങൾ അഭിമുഖീകരിക്കേണ്ടിവരും. ഇത് നിങ്ങൾക്ക് സമ്മർദ്ദവും മാനസിക പിരിമുറുക്കവും ഉണ്ടാക്കും. പണം ചിലവാക്കുന്നതിൽ നിങ്ങൾ നിയന്ത്രണം ഏർപ്പെടുത്തണം അല്ലെങ്കിൽ അത് നിങ്ങളെ വലിയ സാമ്പത്തിക പ്രശ്നങ്ങളിലേക്ക് നയിക്കും. ഈ കാലയളവിൽ ദീർഘദൂര യാത്രകൾ ഫലപ്രദമാവുകയില്ല. ശനിയുടെ പ്രകൃതം കാലവിളംബത്തേയും വിഷണ്ണതയേയും സൂചിപ്പിക്കുന്നു, പക്ഷെ പൊതുവായി കാലക്രമേണ ഫലങ്ങൾ നിങ്ങൾക്ക് അനുകൂലമാകും, അതുകൊണ്ട് ക്ഷമയോടെ നിങ്ങളുടെ അവസരത്തിനായി കാത്തിരിക്കുക. ഈ കാലയളവ് പഠനത്തിനുള്ള സമയമായി എടുക്കുക, കഠിനാധ്വാനം ചെയ്യുക കാര്യങ്ങൾ ശരിയായിക്കൊള്ളും. ഈ കാലയളവിൽ വ്യവസായ രംഗത്ത് വലിയ സാഹസങ്ങൾക്ക് മുതിരരുതെന്ന് നിങ്ങളോട് അഭിപ്രായപ്പെടുന്നു.
	SADESATIPEAKPHASE		= ഏഴര ശനി ഉച്ചസ്ഥായിയിൽ നിൽക്കുന്ന സമയമാണിത്. പൊതുവായി ഏഴര ശനിയുടെ  ഏറ്റവും പ്രയാസമേറിയ ഘട്ടമാണിത്. ചന്ദ്രമണ്ഡലത്തിലൂടെയുള്ള ശനിയുടെ സഞ്ചാരം ആരോഗ്യ പ്രശ്നങ്ങൾ, സ്വഭാവഹത്യ, ബന്ധങ്ങളിലുള്ള പ്രശ്നങ്ങൾ, മാനസിക സമ്മർദ്ദം, വ്യാകുലതകൾ എന്നിവയെ സൂചിപ്പിക്കുന്നു. നിങ്ങളുടെ കഠിനാധ്വാനത്തിന്‍റെ  ഫലം നിങ്ങൾക്ക് ലഭിക്കാതിരിക്കുകയും കൂടാതെ പ്രതിബന്ധം അനുഭവപ്പെടുകയും ചെയ്യും. നിങ്ങളുടെ ശരീരഘടനയും പ്രതിരോധ സംവിധാനവും ശക്തിമത്തായിരിക്കുകയില്ല. ഒന്നാം ഭാവം ആരോഗ്യത്തിന്‍റെ  ഭാവമായതിനാൽ, നിങ്ങൾ വ്യായാമം ചെയ്യുവാൻ ആരംഭിക്കേണ്ടതും ആരോഗ്യകാര്യത്തിൽ ശ്രദ്ധ ചെലുത്തേണ്ടതുമാണ്, അല്ലെങ്കിൽ നിങ്ങൾക്ക് മാരക രോഗങ്ങൾ പിടിപെട്ടേക്കാം. വിഷാദം, അജ്ഞാതമായ ഭയം അല്ലെങ്കിൽ അസാധാരണ ഭീതി എന്നിവയാൽ നിങ്ങൾ ബുദ്ധിമുട്ടിയേക്കാം. ചിന്ത, പ്രവർത്തി, തീരുമാനമെടുക്കൽ എന്നിവയിൽ നിങ്ങൾക്ക് അവ്യക്തത അനുഭവപ്പെടാം. നിങ്ങൾ ആദ്ധ്യാത്മികതയിലേക്ക് തിരിയുകയും പ്രകൃതിയുടെ സങ്കീർണതകളാൽ ആകർഷിക്കപ്പെടുകയും ചെയ്യും. അംഗീകരിക്കുന്നതും മൗലിക അവകാശങ്ങൾ ചെയ്യുന്നതും ഈ കാലയളവ് തരണം ചെയ്യുവാൻ നിങ്ങളെ സഹായിക്കും
	SADESATISETTINGPHASE	= ഏഴര ശനിയുടെ  ‘അസ്തമയ’ കാലഘട്ടമാണിത്. ചന്ദ്രമണ്ഡലത്തിൽ നിന്നും ശനി രണ്ടാം ഭാവത്തിൽ സഞ്ചരിക്കുന്നു, ഇത് സാമ്പത്തികവും കുടുംബപരവുമായ ബുദ്ധിമുട്ടുകളെ സൂചിപ്പിക്കുന്നു. ഏഴര ശനിയുടെ  ബുദ്ധിമുട്ടുള്ള രണ്ട് ഘട്ടങ്ങൾ കഴിയുമ്പോൾ നിങ്ങൾക്ക് നേരിയ ആശ്വാസം അനുഭവപ്പെടും. എന്നിരുന്നാലും, ഈ കാലയളവിൽ തെറ്റിദ്ധാരണകളും സാമ്പത്തിക പ്രതിസന്ധികളും കാണപ്പെടാം. ചിലവുകൾ അധികരിക്കാം അതിനാൽ നിയന്ത്രണം ഏർപ്പെടുത്തുന്നത് തുടരുക. പെട്ടെന്ന് ഉണ്ടാകുന്ന സാമ്പത്തിക നഷ്ടത്തിനും മോഷണ ഭയത്തിനുമുള്ള സാധ്യതയുണ്ട്. ചിന്തകളിൽ നിങ്ങൾ അശുഭാപ്തി വിശ്വാസി ആയിരിക്കും, കാര്യങ്ങളെ അത്യുത്സാഹത്തോടെ കാണുവാൻ നിങ്ങളോട് അഭിപ്രായപ്പെടുന്നു. കുടുംബപരമായും വ്യക്തിപരമായും നിങ്ങൾ കൂടുതൽ ശ്രദ്ധ ചെലുത്തേണ്ടത് ആവശ്യമായി വരും, അല്ലെങ്കിൽ അത് വളരെ വലിയ പ്രശ്നങ്ങൾക്ക് കാരണമായേക്കാം. വിദ്യാർത്ഥികൾക്ക്, വിദ്യാഭ്യാസത്തെ നേരിയതായി ബാധിക്കാം. അവരുടെ ഇപ്പോഴുള്ള നിലവാരം നിലനിറുത്തുന്നതിന് കഠിനാധ്വാനം ആവശ്യമായി വരും. ഫലങ്ങൾ മന്ദഗതിയിലും കാലവിളബം ഉള്ളതുമായിരിക്കും. ഇത് അപകടങ്ങളെ സൂചിപ്പിക്കുന്ന കാലയളവാണ്, മറ്റുള്ളവയെ അപേക്ഷിച്ച് വാഹനം ഓടിക്കുന്നതിൽ നിങ്ങൾ അതീവ ശ്രദ്ധ ചെലുത്തേണ്ടത് ആവശ്യമാണ്. ശനിയെ പ്രീതിപ്പെടുത്തുന്നതിനായി സാധ്യമെങ്കിൽ മാംസാഹാരത്തിൽ നിന്നും നിങ്ങളുടെ മദ്യപാനത്തിൽ നിന്നും ഒഴിഞ്ഞു നിൽക്കുക. കുടുംബപരമായും സാമ്പത്തികപരമായും ഉള്ള കാര്യങ്ങളെ ബുദ്ധിപരമായി കൈകാര്യം ചെയ്യുന്നതിലൂടെ ഈ കാലഘട്ടം തരണം ചെയ്യുവാൻ നിങ്ങൾക്ക് സാധിക്കും.
	IMPNOTE				= മുകളിൽ പറഞ്ഞിരിക്കുന്ന പ്രവചനങ്ങൾ പൊതുവായതും ശനിയുടെ അപഹാരം ദോഷമാണെന്ന പൊതുവായ വിശ്വാസത്തിൽ അടിസ്ഥാനപ്പെടുത്തിയുള്ളതുമാണ്. സത്യസന്ധമായി പറയുകയാണെങ്കിൽ, എല്ലായ്പ്പോഴും അത് ഒരുപോലെ അല്ലയെന്ന് ഞങ്ങൾ കാണുന്നു, കൂടാതെ <b><u><a href=http://www.astrocamp.com/vedicastrology/2008/09/shani-sade-sati.html>ഏഴര ശനിയുടെ ലേഖനം</a></u></b> ഇത് വായിക്കുവാൻ ഞങ്ങൾ ശുപാർശ ചെയ്യുന്നു. ശനിയുടെ അപഹാരത്തെ കുറിച്ച് മാത്രമുള്ള നിർണ്ണയം ശരിയായിരിക്കുകയില്ല കൂടാതെ തെറ്റുവാനുള്ള സാധ്യതയും ഉണ്ട്. ഏഴര ശനിയുടെ കാലഘട്ടം അപകാരമോ ഉപകാരമോ എന്ന് നിർണ്ണയിക്കുന്നതിനു മുമ്പ് നിലവിലുള്ള ദശ ശനിയുടെ പ്രകൃതം എന്നിവ വിശകലനം ചെയ്യേണ്ടത് ആവശ്യമാണ്, മുകളിൽ പറഞ്ഞിരിക്കുന്ന പ്രവചനങ്ങൾ ഗൗരവപൂർവ്വം എടുക്കരുതെന്ന് നിങ്ങളെ ഉപദേശിക്കുന്നു കൂടാതെ എന്തെങ്കിലും സംശയമുണ്ടെങ്കിൽ ഒരു നല്ല ജ്യോതിഷനെ സമീപിക്കുക.
