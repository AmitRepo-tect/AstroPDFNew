	PRESENT_NEITHER_IN_LAGNA_CHART_NOR_IN_MOON_CHART	=  కావున మంగళ దోషము  లగ్న చార్టులోకాని చంద్ర చార్టులోకాని ఉన్నది . 
	MANGLIK_DETAILS_HENCE_NOTE1						= కావున మంగళ దోషము లగ్న చార్టులో మరియు చంద్ర చార్టు రెండింటిలో ఉన్నది . 
	MANGLIK_DETAILS_HENCE_NOTE2						= కావున మంగళ దోషము లగ్న చార్టులో ఉన్నది మరియు చంద్ర చార్టులో లేదు. 
	MANGLIK_DETAILS_HENCE_NOTE3						= కావున మంగళ దోషము లగ్న చార్టులో లేదు మరియు చంద్ర చార్టు ఉన్నది . 
	MANGLIK_DETAILS_PARAGRAPH4							= కుజదోషం అనేది ఒక వ్యక్తి వివాహ జీవితంలో అడ్డకుంలు కలిగిస్తుందని పరిగణిస్తారు. కొంతమంది ప్రకారం, కుజదోషం అనేది భాగస్వామి(ముల)కు తరచుగా వచ్చు అస్వస్థత లేదా మరణానికి దారి తీయవచ్చని చెప్పబడుతుంది.
	MANGLIK_DETAILS_PARAGRAPH5							= ఒకవేళ కుజదోషం ఉన్న వ్యక్తి, కుజదోషం ఉన్న మరొక వ్యక్తిని వివాహం చేసుకున్నట్లయితే, అపుడు ఈ కుజదోషం రద్దయిపోయి, ఎలాంటి ప్రభావం చూపదని పరిగణించబడింది.
	MANGLIK_DETAILS_SUBHEADING1						= కొన్ని పరిహారాలు (కుజదోషం ఉన్న సందర్భంలో)
	MANGLIK_DETAILS_SUBHEADING2						=  పరిహారాలు (వివాహం ముందు చేయాల్సిన అవసరం ఉంది)
	MANGLIK_DETAILS_SUBHEADING3						=  పరిహారాలు (వివాహం తరువాత చేయగలిగినవి)
	MANGLIK_DETAILS_PARAGRAPH6							= కుంభ వివాహం, విష్ణు వివాహం మరియు అశ్వత్థ వివాహం అనేవి కుజదోషానికి, అత్యంత ప్రసిద్ధి చెందిన పరిహారాలు. అశ్వత్థ వివాహం అంటే రావి లేదా అరటి చెట్టుతో వివాహం జరిపించి, ఆతర్వాత ఆ చెట్టును నరకడం. కుంభ వివాహం, ఘట వివాహం అని కూడా పిలువబడుతుంది, అనేది కుండతో వివాహం, ఆతరువాత దానిని విరగ గొట్టడం.
	REMEDIES1											= కేసరి రంగులోని గణపతిని (గణేశుని యొక్క నారింజరంగు ప్రతిమ) పూజగదిలో ఉంచి, ప్రతిరోజూ పూజ చేయాలి. 
	REMEDIES2											= ప్రతిరోజూ హనుమాన్ చాలీసా పఠిస్తూ ఆంజనేయస్వామికి పూజ చేయాలి.
