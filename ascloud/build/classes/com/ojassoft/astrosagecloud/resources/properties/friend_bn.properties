

	 THANKS							= আপনাকে ধন্যবাদ

	 THANK_YOU_FOR_RECOMMENDATION	= বন্ধুদের সুপারিশ করার জন্য আপনাকে ধন্যবাদ।
	 REFER_FRIEND					= বন্ধুদের আমন্ত্রিত করুন
	 RECOMMEND_THIS_WEBSITE			= এই ওয়েবসাইট সুপারিশ করুন
	 INTROTEXT						= আপনার ভালবাসা আমাদের বৈদিক জ্যোতিষ ওয়েবসাইটকে ইন্টারনেটে সবচেয়ে জনপ্রিয় করেছে। জ্যোতিষ সুবিধার যতটা সম্ভব মানুষের কাছে পৌঁছে যাওয়ার জন্য আমরা বিনামূল্যে আমাদের সব পরিষেবা তৈরি করেছি। এবং এর জন্য আপনার একটু সাহায্য চাইছি যাতে আমরা আপনার বন্ধু এবং পরিবারের কাছে পৌছতে পারি। দয়া করে নিচে দেওয়া ফর্ম পূরণ করে অন্যদের এই ওয়েবসাইট সম্পর্কে তথ্য দিন এবং আপনি আপনার পরিবার ও বন্ধুদের আমাদের ওয়েবসাইট সম্পর্কে বলুন।
	 YOUR_NAME						= আপনার নাম
	 YOUR_EMAIL_ID					= আপনার ইমেল আইডি
	 YOUR_FRIENDS					= আপনার বন্ধুদের 
	 EMAIL_ID						= ইমেল আইডি
	 SEND							= পাঠান
	 BACK_TO_REFER_FRIEND_PAGE		= বন্ধুদের আমন্ত্রিত করার পৃষ্ঠায় পুনরায় যান

