	GEMINTRO							= प्राचीन काल से रत्नों का उपयोग आध्यात्मिक क्रियाकलापों और उपचार के लिए किया जाता रहा है। हालाँकि रत्न कठिनाई से मिलते थे और बहुत सुन्दर होते थे, लेकिन उनके बहुमूल्य होने का प्रमुख कारण पहनने वाले को उनसे हासिल होने वाली शक्तियाँ थीं। रत्न शक्तियों के भण्डार की तरह हैं, जिनका असर स्पर्श के माध्यम से शरीर में जाता है। रत्नों का असर धारण करने वाले पर सकारात्मक या नकारात्मक रूप से हो सकता है – यह इस बात पर निर्भर करता है कि उन्हें किस तरह उपयोग में लाया जाता है। सभी रत्नों में अलग-अलग परिमाण में चुम्बकीय शक्तियाँ होती हैं, जिनमें से कई उपचार के दृष्टिकोण से हमारे लिए बेहद लाभदायक हैं। ये रत्न ऐसे स्पन्दन पैदा करते हैं, जिनका हमारे पूरे अस्तित्व पर बहुत गहरा असर होता है। आइए, देखें कि आपके लिए रत्न-विचार किस प्रकार है।
	STONE_DESCRIPTION					= जीवन-रत्न लग्न के स्वामी का रत्न है। इस रत्न की रहस्यमयी शक्तियों का अनुभव करने के लिए इसे जीवन भर धारण किया जा सकता है। जीवन रत्न धारण करना सारी बाधाएँ मिटा सकता है और जातक को प्रसन्न, सफल व समृद्ध कर सकता है। सामान्यतः इसे व्यक्ति की सर्वांगीण उन्नति के लिए धारण किया जाता है। इसके ब्रह्माण्डीय तरंगें व्यक्ति के सम्पूर्ण अस्तित्व को प्रभावित करती हैं।#जीवन परिश्रम और भाग्य का बढ़िया सम्मिश्रण है। अपना पुण्य-रत्न धारण करके भाग्य को अपने हित में कार्य करने दें। व्यक्ति का पुण्य-रत्न वह होता है, जो उस व्यक्ति के सौभाग्य को आकर्षित करके उसके जीवन में सुखद आश्चर्य घोलता रहता है। हमारे अनुसार आपका पुण्य-रत्न है -#भाग्य-रत्न का निर्धारण नवम भाव के स्वामी के आधार पर किया जाता है। जब आपको वाक़ई भाग्य की आवश्यकता होती है, यह रत्न उस समय नियति को आपके पक्ष में करता है। व्यक्तिगत और व्यावसायिक जीवन में यह सकारात्मकता प्रवाहित करता है। आपकी समृद्धि के मार्ग में जो भी बाधाएँ हों, भाग्य-रत्न उन्हें दूर करने का कार्य करता है।
	
