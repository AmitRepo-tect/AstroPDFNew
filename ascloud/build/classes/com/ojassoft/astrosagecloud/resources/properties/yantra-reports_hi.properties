YANTRA_AND_ITS_IMPORTANCE= <a href="http://buy.astrosage.com/navagrah-yantra?&language=hi"> यंत्र  </a> एक ऐसा साधन है जिसके द्वारा व्यक्ति को अपनी आत्मशक्ति का आभास होता है। इसके द्वारा वह अपनी एकाग्रता और ध्यान क्रिया को मजबूत करता है। वैदिक शास्त्रों के अनुसार, यंत्र ब्रह्माण्डीय शक्तियों का संवाहक है। यंत्र मूल रूप से संस्कृत का शब्द है जिसका अर्थ साधना क्रिया को सिद्ध करने वाला साधन है। इस शब्द की उत्पत्ति ‘यम’ शब्द से हुई है जिसका अर्थ है - सहयोग करना। वैदिक यंत्रों में ज्यामितीय रेखाएँ उकरी या बनी हुई होती हैं जो वातावरण और मनुष्य को ऊर्जावान बनाती हैं। यंत्रों के प्रभाव से व्यक्ति का जीवन धन्य हो जाता है। क्योंकि यंत्र जीवन में भाग्य, स्वास्थ्य लाभ, शिक्षा, प्रेम और धन-समृद्धि को लेकर आता है। यंत्र में सीधी-तिरछी रेखाएँ, वर्गाकार और त्रिकोण जैसी ज्यामितीय आकृतियाँ बनी होती हैं। हिन्दू धर्म में इन आकृतियों का विशेष महत्व होता है। इसलिए किसी भी यंत्र में एक अथवा एक से अधिक शक्ति समाहित होती हैं। यंत्र को मंत्रों का चित्रात्मक रूप भी कहते हैं। भारतीय प्राचीन विज्ञान द्वारा वास्तु शास्त्र में दैवीय ऊर्जा को प्राप्त करने के लिए जिन साधनों के प्रयोग करने की सलाह दी गई है उन्हें सामान्य भाषा में यंत्र कहते हैं। यंत्रों के लिए निम्न चीजों का प्रयोग किया जाता है। इनमें सोना, चाँदी, तांबा, क्रिस्टल, भोज पत्र, हड्डी, पेज और विष्णु पत्थर शामिल हैं। जैसा कि हमने बताया है कि हिन्दू धर्म में वैदिक यंत्रों का विशेष महत्व होता है। यंत्र व्यक्ति के जीवन से नकारात्मक प्रभावों को नष्ट करते हैं। इनके प्रभाव से साधक की साधना सिद्ध होती है और निःसंतान दंपति को संतान प्राप्ति का आशीर्वाद प्राप्त होता है। इसके अलावा यंत्र कार्य और पारिवारिक जीवन में तालमेल बनाने में मददगार होते हैं और व्यक्ति को आर्थिक रूप से संपन्न बनाते हैं।  जिस प्रकार मंत्र हमारे शरीर और मन के बीच तालमेल बनाते हैं ठीक उसी प्रकार यंत्र भी हमारे शरीर और मन को नियंत्रण में रखते हैं। इन यंत्रों का संबंध किसी न किसी देवी/देवाताओं और ग्रहों से होता है जिन्हें धारण करने पर व्यक्ति को उनका आशीर्वाद मिलता है। हालाँकि यंत्र को धारण करने से पूर्व इनको विधि-विधान से स्थापित किया जाता है जिसके बाद व्यक्ति को इसके लाभ प्राप्त