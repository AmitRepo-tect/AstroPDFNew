HOW_TO_INSTALL_VENUS_YANTRA =<ul><li>शुक्र यंत्र को स्थापित करने से पूर्व यंत्र को पहले गंगा जल अथवा कच्चे दूध से शुद्ध कर लें। </li><li>इसके पश्चात माँ लक्ष्मी जी को सफ़ेद पुष्प, धूप-दीप, अगरबत्ती अर्पित करते हुए "ॐ द्रां द्रीं द्रौं सः शुक्राय नमः" मंत्र का 108 बार जाप करना चाहिए। </li></ul>इस विधान को करने के बाद शुक्र यंत्र को शुक्रवार अथवा <a href="http://astrosage.com/hindi/nakshatra/bharani-nakshatra-characteristics.asp">भरणी</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-phalguni-nakshatra-characteristics.asp">पूर्वाफाल्गुनी</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-shadha-nakshatra-characteristics.asp">पूर्वाषाढ़ा नक्षत्र</a> में स्थापित करना चाहिए।
HOW_TO_INSTALL_MERCURY_YANTRA =<ul><li>बुध यंत्र को स्थापित करने से पूर्व कच्चे दूध या गंगाजल से यंत्र को शुद्ध करना चाहिए। </li><li>फिर विष्णु जी को पीला पुष्प, धूप-दीप, अगरबत्ती अर्पित करते हुए बुध मन्त्र "ॐ ब्रां ब्रीं ब्रौं सः बुधाय नमः" का 108 बार जाप करना चाहिए। </li></ul>ऐसा करने के पश्चात बुधवार को अथवा <a href="http://astrosage.com/hindi/nakshatra/ashlesha-nakshatra-characteristics.asp">अश्लेषा</a>, <a href="http://astrosage.com/hindi/nakshatra/jyeshta-nakshatra-characteristics.asp">ज्येष्ठा</a>, <a href="http://astrosage.com/hindi/nakshatra/revati-nakshatra-characteristics.asp">रेवती नक्षत्र</a> में यंत्र को स्थापित किया जा सकता है।
HOW_TO_INSTALL_MARS_YANTRA =<ul><li>मंगल यंत्र को स्थापित करने से पूर्व यंत्र को गंगाजल अथवा कच्चे दूध से धोकर पवित्र कर लें। </li><li>फिर हनुमान जी को लाल पुष्प, धूप-दीप, अगरबत्ती अर्पित करते हुए "ॐ क्रां क्रीं क्रौं सः भौमाय नमः" का 108 बार जाप करना चाहिए। </li></ul>इस विधि को करने के बाद मंगल यंत्र को मंगलवार अथवा <a href="http://astrosage.com/hindi/nakshatra/mrigasira-nakshatra-characteristics.asp">मृगशिरा</a>, <a href="http://astrosage.com/hindi/nakshatra/chitra-nakshatra-characteristics.asp">चित्रा</a>, <a href="http://astrosage.com/hindi/nakshatra/dhanishta-nakshatra-characteristics.asp">धनिष्ठा नक्षत्र</a> में स्थापित करना श्रेष्ठकर होता है।
HOW_TO_INSTALL_JUPITER_YANTRA =<ul><li>बृहस्पति यंत्र को स्थापित करने से पूर्व गंगाजल या कच्चे दूध से यंत्र को शुद्ध करना चाहिए। </li><li>उसके पश्चात विष्णु जी को पीले पुष्प, धूप-दीप, अगरबत्ती अर्पित करते हुए गुरु मन्त्र "ॐ ग्रां ग्रीं ग्रौं सः गुरवे नमः" का जाप करना चाहिए। </li></ul>इस विधि को संपन्न करने के बाद गुरुवार अथवा <a href="http://astrosage.com/hindi/nakshatra/punarvasu-nakshatra-characteristics.asp">पुनर्वसु</a>, <a href="http://astrosage.com/hindi/nakshatra/vishakha-nakshatra-characteristics.asp">विशाखा</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-bhadra-nakshatra-characteristics.asp">पूर्वाभाद्रपद नक्षत्र</a> में इस यंत्र को स्थापित करना चाहिए।
HOW_TO_INSTALL_SATURN_YANTRA =<ul><li>शनि यंत्र को गंगाजल अथवा कच्चे दूध से शुद्ध करना चाहिए।</li><li>भैरव जी को काले तिल, धूप-दीप, अगरबत्ती अर्पित करते हुए शनि मन्त्र "ॐ प्रां प्रीं प्रौं सः शनैश्चराय नमः" का 108 बार जाप करना चाहिए। </li></ul>इसके पश्चात शनिवार को सूर्यास्त के बाद अथवा <a href="http://astrosage.com/hindi/nakshatra/pushya-nakshatra-characteristics.asp">पुष्य</a>, <a href="http://astrosage.com/hindi/nakshatra/anuradha-nakshatra-characteristics.asp">अनुराधा</a>, <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">उत्तराभाद्रपद नक्षत्र</a> में शनि यंत्र को स्थापित करना शुभ होता है।
HOW_TO_INSTALL_RAHU_YANTRA =<ul><li>राहु यंत्र को स्थापित करने से पूर्व यंत्र को कच्चे दूध या गंगाजल से शुद्ध करना चाहिए।</li><li>इसके बाद माँ दुर्गा जी को लाल चंदन, धूप-दीप, अगरबत्ती अर्पित करते हुए राहु मन्त्र "ॐ भ्रां भ्रीं भ्रौं सः राहवे नमः" का 108 बार जाप करना चाहिए। </li></ul>उपरोक्त विधान को करने के पश्चात शनिवार अथवा <a href="http://astrosage.com/hindi/nakshatra/swati-nakshatra-characteristics.asp">स्वाति</a>, <a href="http://astrosage.com/hindi/nakshatra/satabishak-nakshatra-characteristics.asp">शतभिषा</a>, <a href="http://astrosage.com/hindi/nakshatra/ardra-nakshatra-characteristics.asp">आर्द्रा नक्षत्र</a> में राहु यंत्र को स्थापित करना शुभ होता है।
HOW_TO_INSTALL_KETU_YANTRA =<ul><li> केतु यंत्र को स्थापित करने से पूर्व यंत्र को कच्चे दूध या गंगाजल से शुद्ध करना चाहिए।</li><li>अब गणेश जी को दूर्वा, धूप-दीप, अगरबत्ती अर्पित करते हुए केतु मन्त्र "ॐ स्रां स्रीं स्रौं सः केतवे नमः" का 108 बार जाप करना चाहिए। </li></ul>उपरोक्त विधि को करने के पश्चात बुधवार या शनिवार को अथवा <a href="http://astrosage.com/hindi/nakshatra/ashwini-nakshatra-characteristics.asp">अश्विनी</a>, <a href="http://astrosage.com/hindi/nakshatra/magha-nakshatra-characteristics.asp">मघा</a>, <a href="http://astrosage.com/hindi/nakshatra/moola-nakshatra-characteristics.asp">मूल नक्षत्र</a> में इस यंत्र को स्थापित करना चाहिए।



