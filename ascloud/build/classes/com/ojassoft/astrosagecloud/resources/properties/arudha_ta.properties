

SUBMIT= சமர்ப்பிக்கவும்
USE_EXCEPTION = விதிவிலக்கு பயன்படுத்தவும்
NOTE_ARUDHA=  குறிப்பு:- இங்கு நாம் ராகு மற்றும் கேது வலுவானவர் என்று கருதவில்லை.  
ARUDHA_CHART= ஆருட கட்டம் 
NOTE_JHORA =இந்த விதிவிலக்குகளைப் பயன்படுத்த ஸ்ரீ. ஜெகந்நாத் மையம் பரிந்துரைக்கிறது,ஸ்ரீ கே என் ராவ் அவர்களை பரிந்துரைக்கவில்லை.
NOTE_JHORA_ASTRO = ஸ்ரீ கே என் ராவ்  சிந்தனையின் விதிவிலக்குகளைப் பயன்படுத்த பரிந்துரைக்கவில்லை, இன்னும் பலர் விதிவிலக்குகளைப் பயன்படுத்துகின்றனர். ஆஸ்ட்ரோசேஜில், விதிவிலக்குகளைப் பயன்படுத்த பரிந்துரைக்கிறோம். 
DO_NOT_USE = விதிவிலக்கு உபயோகம் செய்யாதீர்கள் 
