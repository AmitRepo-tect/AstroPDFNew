

	 TEVA						= ধর্মী কুষ্ঠি #রাতান্ধ কুষ্ঠি#অন্ধ কুষ্ঠি#নাবালক কুষ্ঠি
	 DHARMI_TEVA_FALSE			= আপনার কুষ্ঠি ধর্মী কুষ্ঠি নয়
	 DHARMI_TEVA_TRUE			= আপনার কুষ্ঠি ধর্মী কুষ্ঠি
	 RATAANDHA_TEVA_FALSE		= আপনার কুষ্ঠি রাতান্ধ কুষ্ঠি নয়
	 ANDHA_TEVA_TRUE			= আপনার কুষ্ঠি অন্ধ কুষ্ঠি
	 ANDHA_TEVA_FALSE			= আপনার কুষ্ঠি অন্ধ কুষ্ঠি নয়
	 RATAANDHA_TEVA_TRUE		= আপনার কুষ্ঠি রাতান্ধ কুষ্ঠি
	 NABALIG_TEVA_TRUE			= আপনার কুষ্ঠি নাবালক কুষ্ঠি
	 NABALIG_TEVA_FALSE			= আপনার কুষ্ঠি কোন নাবালক কুষ্ঠি নয়
	 LK_DHARMI_TEVA				= কিছু রাশিফল ​​লাল কিতাবের মধ্যে ধর্মী রাশিফল ​​হিসেবে বিবেচিত হয়। লাল কিতাবের মতে, রাহু, কেতু এবং শনি ক্ষতিকর গ্রহ হিসেবে বিবেচিত হয়। যদি একটি জন্মপত্রিকা ধর্মী, শনি, রাহু এবং কেতু হয় তবে ক্ষতিকর ফলাফল প্রদান বন্ধ হবে। যদিও এটা প্রয়োজনীয় নয় যে তারা লাভদায়ক ফলাফল দেবে কিন্তু অন্তত ক্ষতিকর ফলাফল প্রদান বন্ধ করবে।<br/>রাহু এবং কেতু ধর্মী হয় যখন তারা চতুর্থ ঘরে স্থাপিত হয় বা যেকোন স্থানে চাঁদের সাথে জন্মপত্রিকা থাকে। শনি ধর্মী হয় যখন সে একাদশ ঘরে স্থাপিত হয় বা যেকোন স্থানে বৃহস্পতির সাথে জন্মপত্রিকা থাকে। যদি উভয় শর্ত পূর্ণ হয়, তবে জন্মপত্রিকাকে ধর্মী টেবা বলা হয়।
	 LK_NIGHT_BLIND_HOROSCOPE	= রাতান্ধ (নাইট ব্লাইন্ড) গ্রহ লাল কিতাবের একটি অনন্য ধারণা। একটি কুষ্ঠিকে রাতান্ধ হিসাবে বলা হয় যখন শনি ৭ম ঘরে এবং সূর্য ৪র্থ ঘরে থাকে। একটি অন্ধ কুষ্ঠিতে, রাতান্ধ ব্যক্তির কুষ্ঠি দিকহীন হয় এবং তার নিজের সিদ্ধান্ত গ্রহণ করতে পারেন না। তিনি একটি রাত ব্যক্তির মত ভদ্র হন।
	 LK_BLIND_HOROSCOPE			= একটি কুষ্ঠিতে, দশম ঘর পেশা, কাজ, অবস্থা, খ্যাতি এবং সরকারের পক্ষপাতীর ঘর হিসাবে একটি কুষ্ঠির একটি ভিত্তি হবে। যদি দশম ঘরে একে অপরকে শত্রুভাবাপন্ন গ্রহ থাকে, বা নির্বল গ্রহের মতো খারাপভাবে স্থাপিত গ্রহ থাকে ইত্যাদি, সব গ্রহের ভাল ফলাফল দিতে পারবে না। সংমিশ্রণ থাকার কুষ্ঠিকে অন্ধ কুষ্ঠি বলা হয় এবং এই ধরনের একটি কুষ্ঠির ব্যক্তি অন্ধ অথবা দিকহীন হিসাবে আচরণ করেন।
	 LK_MINOR_HOROSCOPE			= লাল কিতাবের মতে, নিশ্চিত অবস্থার কিছু রাশিফল ১২ বছর বয়স পর্যন্ত নাবালক হিসাবে বিবেচিত হয়। কুষ্ঠিতে গ্রহের স্থাপন অনুযায়ী নাবালক কুষ্ঠি ফলাফল দিতে পারে না এবং অনির্দেশ্য আচরণ দেখা যেতে পারে। কুষ্ঠি হিসাবে ব্যক্তির ভাগ্য ১২ বছর বয়স পর্যন্ত অবিশ্বস্ত হয়।
