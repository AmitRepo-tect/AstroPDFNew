SORYY_YOU_CAN_NOT_SAVE_MORE_CHARTS_PLEASE_UPGRADE_YOUR_PLAN_FOR_TOOLBAR		= आपका प्लान फ्री प्लान है जिसमें अधिकतम 10 कुण्डलियाँ सुरक्षित (सेव) की जा सकती हैं। 10 फ्री कुंडलियो को सुरक्षित करने की सीमा समाप्त हो गयी है। या तो आप पुरानी कुंडली को डिलीट करके नई कुंडली सुरक्षित कर सकते है या फिर 10 से अधिक कुंडलियो को सुरक्षित करने के लिए आप अपने प्लान को उन्नत कर सकते हैं। <br />अपना प्लान अपडेट करने के लिए <a onclick=popupvisibility(); class="waves-effect wave-light text-orange">यहाँ क्लिक करें।</a>
CHART_NOT_SAVED_YET															= आपने अभी तक कुण्डली सुरक्षित नही की है। क्या आप अभी कुण्डली सुरक्षित करना चाहते है?
PLEASE_WAIT																	= कृपया प्रतीक्षा करें
UPGRADE_YR_PLAN																= प्लान अपडेट करें
