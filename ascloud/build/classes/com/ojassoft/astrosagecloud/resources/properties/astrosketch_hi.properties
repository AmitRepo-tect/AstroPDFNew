ASTRO_SKETCH_DATA_MALE= <p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)<br/> मेष  (Aries) राशि के पुरुषों में किसी भी नए कार्य को आरंभ करने और नेतृत्व करने की क्षमता काफ़ी प्रबल होती है। इस राशि के जातक मज़बूत इरादे वाले होते हैं और किसी भी कठिन परिस्थिति से ख़ुद को साबित करने का माद्दा रखते हैं। आप आत्मनिर्भर और ज़िंदादिल हैं तथा हैरतअंगेज़ कारनामे आपको बेहद पसंद हैं। आप जीवन के सकारात्मक पहलु को देखना पसंद करते हैं।आप स्पष्टवादी हैं और कभी-कभी क्रोधित भी हो जाते हैं। झूठी तारीफ़ इन्हेें कतई पसंद नहीं है और  वैसे लोगों से भी इन्हें सख़्त नफ़रत है जिनकी फितरत पल-पल बदलने वाली होती है। आप अपने जीवन-साथी के प्रति संवेदनशीलता, प्यार, और वफ़ादारी से पेश आते हैं। आप अपने बीते हुए कल से बेपरवाह होकर वर्तमान समय का आनन्द उठाते हैं। आपके लिए यह अति-आवश्यक है कि यदि आप किसी के साथ रिश्ते निभा रहे हैं तो आप अपने ओहदे को कायम रखें। </p><p><b>मेष राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>जयाप्रदा, ममता कुलकर्णी, रानी मुखर्जी, जितेन्द्र </p><p><b>मेष राशि के जातकों में पाई जाने वाली कुछ सामान्य प्रवृत्तियाँ</b><br/><b>सकारात्मक</b>साहसिक व्यक्तित्व, स्फूर्ति, तेज़ दिमाग<br/><b>नकारात्मक </b> स्वार्थी, आवेगी, और अधीर</p><p><b>मेष राशि की अनुकूल राशियाँ</b>  मिथुन, सिंह, धनु और कुम्भ</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)<br/>वृषभ (Taurus) राशि के पुरुष दिलकश और अच्छे वक्ता होते हैं। ऐसे लोग ऊँचे व्यक्तित्व वाले होते हैं और अपने इसी व्यक्तित्व के कारण लोगों का ध्यान अपनी ओर आकर्षित करने में कामयाब रहते हैं। इस राशि के लोेग शब्दों के धनी होते हैं और लोगों को अपने भाषण से मंत्रमुग्ध करने की क्षमता रखते हैं। इनकी सहनशक्ति क़ाबिले तारीफ़ होती है जिनकी वजह से ये किसी भी परिस्थिति को संभालने और उससे उबरने में सफल होते हैं। वृषभ राशि के जातक अपनी मानवीय भावनाओं और दोस्तों के प्रति वफ़ादारी की वजह से अक्सर चर्चा में रहते हैं। हालांकि इन सभी सदगुणों के बावजूद वे कभी-कभी ज़िद्दी, अड़ियल और ज़बरदस्ती हक़ जताने वाले होते हैं। </p><p><b>वृषभ राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>अंजली जाथर, माधुरी दीक्षित, मौसमी चटर्जी, पूजा बेदी</p><p><b>वृषभ राशि के जातकों की विशेषताएँ </b><br/><b>सकारात्मक </b> विश्वसनीय, धैर्यवान, सह्रदय, दृढ़, गंभीर<br/><b>नकारात्मक </b>  ईर्ष्यालु, स्वयं कृपालू, आवेगी </p><p><b>वृषभ राशि की अनुकूल राशियाँ </b>कर्क, कन्या, मकर, मीन</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़े पर आधारित एक संक्षिप्त रूपरेखा)<br/> मिथुन (Gemini) राशि के पुरुष ज़िन्दादिल, हँसमुख और काफ़ी सक्रिय होते हैं। इस राशि के लोग बहिर्मुखी, चतुर, बातूनी और मनचले स्वभाव के होते हैं। ऐसे लोग अपनी वास्तविक उम्र से कम नज़र आते  हैं क्योंकि ये लोग अपने स्वास्थ्य के प्रति हमेशा सजग रहते हैं। इस राशि के जातक अपनी दिनचर्या और जिज्ञासा को लेकर अक्सर बेचैन नज़र आते हैं। मिथुन राशि वाले ख़ुद को व्यस्त रखने के लिए नई चुनौंतियों को स्वीकार करते हैं। बूरे दौर में भी किसी के आगे झुकना आपको पसंद नहीं है।  ऐसे लोग मौके का भरपूर फ़ायदा उठाते हैं, व्यक्तिगत फ़ायदे तथा अपने आप को दोहरे रूप में प्रकट करने के लिए साज़िश भी रच सकते हैं। इस राशि के लोग अपने स्व-विवेक से फ़ैसला लेते हैं। </p><p><b>मिथुन राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>डिम्पल कपाड़िया, शिल्पा शेट्टी, मिथुन चक्रवर्ती, परेश रावल</p><p><b>मिथुन राशि के लोगों में देखी जाने वाली कुछ सामान्य विशेषताएँ</b><br/><b>सकारात्मक </b> चंचल, अनुकूलनीय, तीक्ष्ण बुद्धि वाले, हष्ट-पुष्ट <br/><b>नकारात्मक </b> बेचैन, शातिर, परस्पर विरोधी, अगंभीर</p><p><b>मिथुन राशि की अनुकूल राशियाँ </b>मेष, सिंह, कन्या, कुम्भ</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़े पर आधारित एक संक्षिप्त रूपरेखा) <br/> कर्क(Cancer) राशि वाले संवेदनशील, भावुक और नाज़ुक होते हैं। इस राशि के जातक बड़े ही रोमांटिक होते हैं और अपनी मनमोहक बातों से थोड़ी देर के लिए आपको अचंभित भी कर सकते हैं। इन्हें ऐसे दोस्तों की तलाश रहती है जो इनका ख़याल रखें, सहयोग करें और प्रेम-पूर्वक व्यवहार करें। आप सबसे ज़्यादा खुश अपने प्रियजनों के साथ घर पर रहते हैं। आप ऐसे लोगों से दूर रहना पसंद करते हैं, जिन्हें बोलने की तहज़ीब नहीं होती है। आपकी वफ़ादारी, नेक-नीयत तथा दरियादिली के सभी लोग कायल होते हैं। अपनी हँसमुख प्रवृत्ति के कारण आप लोगों का दिल जीत लेते हैं। आप न मितव्ययी है और न ही अतिव्ययी हैं, लेकिन मनमोहक उपहारों से लोगों को संतुष्ट करने के लिए आप जाने जाते हैं। आपका मनमौजी रवैया कभी-कभी आपको विचलित करता है। आप अपने इरादों पर यकीन करते हैं और उन्हें पूरा करने का हर-संभव प्रयास करते हैं। </p><p><b> कर्क राशि में जन्म लेनें वाली कुछ शख़्सियत</b><br/>प्रियंका चोपड़ा, जूलिया रोबर्ट, टॉम क्रूज, राजकुमारी डायना, पामेला एंडरसन</p><p><b>कर्क राशि में पाए जाने वाली कुछ विशेषताएँ</b><br/><b>सकारात्मक </b> भावुक, मासूम, दयालु,  बुद्धिमान, कल्पनाशील, सज़ग <br/><b>नकारात्मक  </b>मनमौजी, बेचैन, भावुक, अडिग </p><p><b>कर्क राशि की अनुकूल राशियाँ </b>मेष, कर्क, कन्या, वृषभ, मकर, तुला</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म आँकड़ो पर आधारित संक्षिप्त रूपरेखा)<br/>सिंह(Leo) राशि के पुरुष जातक बाहर से तो काफ़ी चुस्त-दुरुस्त लेकिन अंदर से भावुक और नरम दिल वाले होते हैं। महिलाओं के साथ आप सदाचार के साथ पेश आते हैं। आप भले ही इसे प्रकट करना नहीं चाहते, लेकिन आप जिससे प्यार करते हैं उस पर अपना हक जताने की कोशिश करते हैं। आप हमेशा चर्चा में रहना, लोगों का ध्यानाकर्षण पाना, और वाहवाही बटोरना पसंद करते हैं। सभी परिस्थितियों और यहाँ तक कि अपने आस-पास रहने वाले लोगों पर भी नियंत्रण पाना पसंद करते हैं। आप जन्म से ही नेतृत्व क्षमता के धनी हैं, कभी-कभी किसी बात को लेकर आप लोगों पर हावी भी हो जाते हैं। कभी-कभी आपकी उत्तेजना और गुस्सा लोगों को परेशान करते हैं तथा इसी कारण आपकी छवि एक अड़ियल और अव्यवहारिक व्यक्ति के रूप में बन जाती है। तोहफ़े देकर आश्चर्य चकित करने के शौकीन होने के कारण आप अपनी प्रेमिका को खूब सारे महंगे तोहफ़े तथा निशानियाँ भेंट में देंगे। इससे यह साफ ज़ाहिर होता है कि आप अतिव्ययी हैं। अपनी तारीफ़ सुनने के लिए आप किसी भी हद तक जा सकते हैं भले ही वह झूठी ही क्यों न हो। आपके बहुत सारे दोस्त होंगे और सामाजिक कार्यों में आप सक्रीय रहेंगे। </p><p><b>सिंह राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>मनिषा कोईराला, काजोल, राखी, मनोज कुमार, गुलज़ार साहब</p><p><b>सिंह राशि के जातकों में पाई जाने वाली कुछ सामान्य विशेषताएँ</b><br/><b>सकारात्मक </b> व्यवहार-कुशल, रोमांटिक, आकर्षक, मिलनसार , आदर्शवादी<br/><b> नकारात्मक  </b> अनिर्णायक, परिवर्तनशील और ज़़ल्दी बातों में आने वाला</p><p><b>सिंह राशि की अनुकूल राशियाँ</b>कर्क, मीन</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म आँकड़ो पर आधारित संक्षिप्त रूपरेखा)<br/>कन्या राशि(virgo) के जातक आदर्शवादी होते हैं। ऐसे लोग किसी भी काम को पूरी तन्मयता के साथ करते हैं, चाहे वह काम छोटा या बड़ा ही क्यों न हो। ऐसे लोग अपनी ज़िन्दगी, पेशे या रिश्तों से सम्बंधित फ़ैसले लेते समय तार्किक और विश्लेषणात्मक दृष्टिकोण अपनाते हैं। कन्या राशि के लोगों को अभद्र भाषा का प्रयोग और दुर्वव्यवहार बिलकुल पसंद नहीं है। आप दूसरे लोगों के पहनावे, भाषा, और व्यवहार पर अधिक गौर करते हैं, और उनसे अच्छे व्यवहार की उम्मीद भी करते हैं। इसका मतलब यह नहीं है कि आप घमंडी हैं, बल्कि आप बहुत ही दयालू हैं तथा साधारण और अनुशासित जीवन जीना पसंद करते हैं। आप अपने दोस्तों और प्रियजनों के प्रति बेहद ही रक्षात्मक और प्रेमपूर्ण रवैया अपनाते हैं। तर्कसंगत दृष्टिकोण के कारण आप किसी भी बहस में पराजित नहीं होते और झगड़ों को आसानी से सुलझा लेते हैं। आपकी ईमानदारी, अनुशासन, समर्पण का भाव आपको भरोसे के लायक बनाता है, लेकिन कभी-कभी आप आक्रामक रूख़ अपना लेते हैं। </p><p><b>कन्याराशि में जन्म लेनें वाली कुछ शख़्सियत</b><br/>आशा भोसले, राकेश रौशन, रानी एलिज़ाबेथ, अगाथा क्रिस्टी , जोसेफ़ कैनेडी</p><p><b>कन्या राशि के जातकों की कुछ सामान्य विशेषताएँ </b><br/><b>सकारात्मक </b> भरोसेमंद, शर्मीले, कुशल, व्यावहारिक, कर्मठ<br/><b>नकारात्मक  </b>  हड़बड़ाहट भरे, ज़्यादा समीक्षात्मक, निष्ठुर, रूढ़िवादी</p><p><b>कन्या राशि की अनुकूल राशियाँ </b> वृषभ, मकर</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म आँकड़ो पर आधारित संक्षिप्त रूपरेखा)<br/>तुला(Libra) राशि के पुरुष जातक बड़े ही आशिक-मिज़ाज और सृजनात्मक प्रवृत्ति के होते हैं। इस राशि के लोग प्यार और आदर पाने के योग्य  होते हैं। तुला के जातकों को बुद्धिमान, आत्मविश्वासी और प्यार करने वाले लोग बेहद पसंद हैं। अपने जीवन-साथी पर आपको बंदिशें लगाना पसंद नहीं और उससे भी आप यही उम्मीद करते हैं। आप महंगे कपड़ों, घड़ी, जूते, ब्रांडेड परफ़्यूम, संगीत, थिएटर और कला की वस्तुओं पर पैसे ख़र्च करना पसंद करते हैं। आपके विचार प्रगतिशील एवं लचीले हैंं। आप अपने आसपास के लोगों की बातों को ध्यानपूर्वक सुनते हैं और उनके द्वारा सुझाए गए विचारों तथा तर्क-पूर्ण तथ्यों को स्वीकार करते हैं। आपको ख़ूब बातें करना तथा आशावादी और खुशमिज़ाज लोगों के साथ रहना पसंद है। आप आलसी नहीं हैं, लेकिन किसी निर्णय को लेनें में थोड़ा समय लगाते हैं। आपकी कूटनीति की प्रवृत्ति कभी-कभी लोगों को परेशान कर सकती है। </p><p><b>तुला राशि में जन्म लेनें वाली कुछ शख़्सियत</b><br/>काटे विंस्लेट, रेखा, करीना कपूर, लता मंगेशकर, अमिताभ बच्चन, महात्मा गांधी </p><p><b>तुला राशि के जातकों की कुछ सामान्य प्रवृत्तियाँ</b><br/><b>सकारात्मक </b> व्यवहार कुशल, आशिक मिज़ाज़, लुभावने, सीधे-सादे, आदर्शवादी <br/><b>नकारात्मक </b> अनिर्णायक, परिवर्तनशील और भोले-भाले </p><p><b>तुला राशि की अनुकूल राशियाँ </b> मेष, कर्क, सिंह, तुला, धनु, मकर,</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म आँकड़ो पर आधारित संक्षिप्त रूपरेखा)<br/>वृश्चिक( Scorpio) राशि के पुरुष तीव्र बुद्धि, जोशीले, जटिल, और रहस्यपूर्ण  होते हैं। आपकी प्रखर बुद्धि और आत्मविश्वास की प्रवृत्ति आपको हमेशा चर्चा के केन्द्र में रखती है। आप समाज की परम्पराओं में यकीन नहीं करते हैंं। आपकी महत्वकांक्षाएँ आपको प्रेरित करती हैं। आप बेहद ही कामुक, मनमौजी, शांत हैं और हर वक्त सजग रहते हैं। आपको कृत्रिम, खोखले और गहनता के अभाव वाली किसी भी चीज़ से नफ़रत है। आप खुश रहने और पूर्णता की प्राप्ति के लिए यथार्थवादी लोगों  के साथ रहना पसंद करते हैं। आपकी संगत में लोग कभी उदास नहीं होते क्योंकि आप हमेशा ही नये और दिलचस्प कार्यों में सक्रीय रहते हैे। आप बहुर्मुखी प्रतिभा के धनी हैे और आपके पास दोस्तों या चाहने वालों की कमी नहीं है। आप ऐसे लोगों के साथ रिश्ते निभाना चाहते हैं, जो रिश्तों की क़द्र करना जानता हो। ऊपर से चाहे आप जितने भी शांत नज़र आएँ, परन्तु आपके भीतर एक ऐसी ऊर्जा विद्यमान है जो लोगों को आपकी ओर खींचती है और लोग आपके आदी हो जाते हैं।  <p><b>वृश्चिक राशि में जन्म लेनें वाली कुछ शख़्सियत</b><br/>ऐश्वर्या राय, इंदिरा गांधी, जवाहरलार नेहरू, शाहरूख़ खान,बिल गेट्स, ब्रायन एडम, डेमि मूरे</p><p><b>वृश्चिक राशि के लोगों की कुछ सामान्य विशेषताएँ </b><br/><b>सकारात्मक</b> भावुक, तेज़, संवेदनशील, गरिमापूर्ण, अंतर्ज्ञानी, कामुक, रहस्यपूर्ण, तीक्ष्ण<br/><b>नकारात्मक </b>  ज़िद्दी, जुनूनी, ईर्ष्यालु, क्रोधी, संकोची </p><p><b>वृश्चिक राशि वाले जातकों की अनुकूल राशियाँ </b> कर्क और मीन </p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित संक्षिप्त रूपरेखा)<br/> धनु( Sagittarius) राशि के पुरुष जातक बहुत ही ख़ुशमिज़ाज होते हैं। इस राशि के जातकों में कूटनीति का आभाव होता है, वे बहुत ही स्पष्टवादी और ईमानदार होते हैं। आप प्रियजनों और दोस्तों के साथ दोस्ताना, स्पष्टवादी तथा लुभावने होते हैं। आप बीती बातों को ढ़ोना पसंद नहीं करते हैं। आप वर्तमान और व्यावहारिकता में विश्वास रखते हैं। आप जीवन के दुःखद अनुभवों से निराश नहीं होते हैे बल्कि आप उन से प्रेरित होते हैं। आप विषम परिस्थितियों का डटकर सामना करते हैं। आमतौर पर आप किसी बात का बूरा नहीं मानते, परंतु जब कोई आपको नीचे गिराने की कोशिश करता है तो आप उसे बड़े ही सुगम तरीके से सबक सिखाते हैं। किसी के आदेशों का पालन करना आपके लिए कठिन होता है, बल्कि आप किसी चीज़ से प्रेरित होकर बेहतरीन प्रदर्शन करते हैं। आपकी स्पष्टवादिता आपको कभी-कभी परेशानी में डाल देती है। आप यात्रा करना पसंद करते हैं और एक समान जीवनशैली से आप ऊब जाते हैं। </p><p><b>धनु राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>धर्मेंद्र, शत्रूघ्न सिन्हा, दिलीप कुमार, विंस्टन चर्चिल</p><p><b>धनु राशि के जातकों की कुछ विशेषताएँ </b><br/><b>सकारात्मक </b> आशावादी, प्रसन्नचित, सुशील, ईमानदार, दार्शनिक <br/><b> नकारात्मक </b> लापरवाह, बेचैन, उद्दंड </p><p><b>धनु राशि की अनुकूल राशियाँ </b>कर्क, मीन</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आधार पर संक्षिप्त रूपरेखा)<br/> मकर राशि के लोग( Capricorn) बेहद ही शालीन होते हैं जिन्हें शुरूआत में समझ पाना कठिन होता है। आप बाहर से ख़ुद को कठोर दिखाते हैं लेकिन भीतर से अति संवेदनशील होते हैं। आप बेहद ही शर्मीले स्वभाव के हैंं। भीड़ में आप अपनी भावनाओं को प्रकट नहीं कर पाते परंतु दोस्तों के साथ सहज होकर वार्तालाप करते हैं। इस राशि के लोग आपकी संगति में कार्य करते हुए अपनी असाधारण और तीक्ष्ण टिप्पणियों से आपको आश्चर्यचकित कर सकते हैं। आप चंचल दिमाग के नहीं है लेकिन आप कभी-कभी अपने असंवेदनशील व्यवहारों से लोगों को ठेस पहुँचा सकते हैं। परन्तु, आप जिनसे प्यार करते हैं उनके लिए बेहद संवेदनशील होते हैं। आप अपने दैनिक ख़र्चों को लेकर हमेशा सतर्क रहते हैं तथा फ़िज़ूल के ख़र्चों से परहेज़ करते हैं। इसमें कोई संदेह नहीं है कि आप महत्वाकांक्षी हैं परंतु आप अपने परिवार की कभी उपेक्षा नहीं करते और उनके प्रति अपनी जिम्मेदारियों से कभी नहीं भागते।</p><p><b>मकरराशि में जन्म लेनें वाली कुछ शख़्सियत</b><br/>अनु अग्रवाल, रीना रॉय, सलमान खान, अनिल कपूर, ज़ावेद अख़्तर, नाना पाटेकर</p><p><b>मकर राशि के लोगों में की सामान्य विशेषताएँ </b><br/><b>सकारात्मक </b>व्यावहारिक, सजग, विवेकी, धैर्यवान <br/><b>नकारात्मक </b>  कंजूस, निराशावादी, भाग्यवादी </p><p><b>मकर राशि की अनुकूल राशियाँ </b>वृषभ और कन्या</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)<br/>कुम्भ(Aquarius) राशि के पुरुष जातक तेज़-तर्रार, आत्मनिर्भर और कल्पनाशील होते हैं। इस राशि के लोग मनमौजी, अप्रत्याशित प्रवृति वाले होते हैं और इन्हें समझना भी मुश्किल होता है। ऐसे लोग समाज द्वारा बनाए गए नियमों का पालन नहीं करते, बल्कि वे अपने उसूलों के साथ जीते हैं। आप न किसी की ज़िन्दगी में दख़ल-अंदाज़ी करते हैं और न ही आपको अपने काम में किसी की दख़ल-अंदाज़ी पसंद है। कभी कभी ये पृथक रहते हैं लेकिन इसका यह मतलब नहीं है कि यह किसी की परवाह नहीं करते। ऐसे लोग सभी के साथ एक समान व्यवहार करना पसंद करते हैं। ऐसे लोगों को दुनिया की बातों की परवाह नहीं होता है। ऐसे लोग ख़ुद को मौज-मस्ती में व्यस्त रखना पसंद करते हैं। सपनों में खोए रहने के कारण आप अक्सर ग़ैरहाज़िर नज़र आते हैं, लेकिन आप हमेशा उपस्थित तथा चौकस रहने वाले हैं। दुनिया आपके बारे में क्या कहती है इसके प्रति आप बहुत कम ध्यान देते हैं और ख़ुद को अपने कामों में व्यस्त रखते हैं। </p><p><b>कुम्भ राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>उर्मिला मांतोडकर,प्रीति जिंटा,वहीदा रहमान, सुभाष घई,</p><p><b> कुम्भ राशि के जातकों की कुछ सामान्य विशेषताएँ </b><br/><b>सकारात्मक </b> मिलनसार, मानवतावादी, वास्तविक, खोजी, स्वतंत्र, बुद्धिमान<br/><b>नकारात्मक </b>  उद्दंड, पृथक रहने वाला, मनमौजी </p><p><b>कुुम्भ राशि की अनुकूल राशियाँ </b> मिथुन और तुला</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित संक्षिप्त रूपरेखा)<br/>मीन(Pisces) राशि के पुरुष वास्तव में प्रतिभावान और सृजनात्मक होते हैं। ऐसे लोग स्वभाव से तंत्र विद्या में रूची रखने वाले होते हैं। इस राशि के लोग आसानी से किसी भी माहौल में ख़ुद को स्थापित करने में सक्षम होते हैं। इसी प्रवृति  के कारण ये बहुत ही मिलनसार होते हैं। ये लोग संवेदनशील तथा स्वयंकृपालु होते हैं। इस राशि के लोग आशावादी दृष्टिकोण रखते हैं। आपकी कल्पनाशक्ति ही आपके सफलता और विफलता का निर्धारण करती है, यह पूर्णतः आपके ऊपर निर्भर करता है कि आप इसका इस्तेमाल कैसे करते हैं। आप अकारण ही कभी कभी मनमौज़ी व्यवहार करने लगते हैं। आपकी माँगे बहुत अधिक होती हैं लेकिन साथ ही साथ आप काफ़ी समझदार भी होते हैं। आपको ऐसे कार्य करना पसंद नहीं जिनके प्रति आपका लगाव ना हो या जिस काम के लिए आप पर दबाव बनाया जा रहा हो। आप लोगों की मानसिकता को तुरंत ही ताड़ लेते हैं। .</p><p><b>मीन राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>चेल्सिया क्लिंटन, अल्बर्ट आइंसटीन, माइकल एंजलो</p><p><b>मीन राशि के जातकों की कुछ विशेषताएँ</b><br/><b>सकारात्मक </b> कल्पनाशील, संवेदनशील, दयावान, निःस्वार्थ, सहानुभूतिपूर्ण <br/><b>नकारात्मक </b>अस्थिर, आदर्शवादी, कमज़ोर इच्छाशक्ति </p><p><b>मीन राशि की अनुकूल राशियाँ</b> मिथुन, वृषभ, कन्या, धनु, कुम्भ, मीन</p>
ASTRO_SKETCH_DATA_FEMALE = <p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा) <br/>मेष राशि की महिलाएँ जन्म से ही नेतृत्व-क्षमता की धनी होती हैं, किसी भी कार्य को आरंभ करने में सक्षम होती हैं। आप किसी भी कठिन हालातों में गुज़ारा कर सकती हैं और भीषण विपदाओं से बाहर आ सकती हैं। आप आत्मनिर्भर, बेपरवाह और साहसी हैं। ये आशावादी, आक्रामक और भविष्य की योजना बनाकर चलने वाली होती हैं। आपको ख़ुशामद करना पसंद नहीं है। आप उन लोगों को पसंद करती हैं जो खुशामद करने की बजाय सादगी से पेश आते हैं। आपको कोई शक़ की नज़र से देखे यह आपको पसंद नहीं। आपके ऊपर कोई हक़ जताए तो आपको पसंद नहीं पर आप दूसरों पर हक़ जताना पसंद करती हैं। व्यवहार से आप नेक-दिल, संवेदनशील, वफ़ादार और मदद करने वाली हैं। शादी के बाद भी आपको अपने करियर को आगे बढ़ाने में दिलचस्पी रहती है। आप चुनौतियों से प्यार करती हैं तथा चमत्कारों में यकीन करती हैं। आपको  बीते हुए कल में जीना पसंद नहीं इसलिए कई बार आप एक ही ग़लती को दोहरा देती हैं।</p><p><b>मेष राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>जयाप्रदा, ममता कुलकर्णी, रानी मुखर्जी, जितेन्द्र </p><p><b>मेष राशि में की कुछ सामान्य विशेषताएँ </b><br/><b>सकारात्मक</b> साहसी, ऊर्जावान, तीक्ष्ण बुद्धि, क्रियाशील <br/><b>नकारात्मक  </b>स्वार्थी, आवेगी, क्रोधी, अधीर </p><p><b> मेष राशि की अनुकूल राशियाँ </b>मिथुन, सिंह, धनु और कुम्भ </p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)<br/> वृषभ(Taurus ) राशि की महिला जातक सुन्दर और आकर्षक व्यक्तित्व की धनी होती हैं। अपने लुभावने व्यक्तित्व के कारण ही आप लोगों के बीच आकर्षण का केन्द्र बनी रहती हैं। आप स्नेहशील, विनम्र और संप्रेषण कला के धनी हैं। आप अपने रूप-रंग को लेकर काफ़ी सजग रहती हैं, लेकिन आपका वज़न जल्दी बढ़ जाता है। आप स्वभाव से बेहद ही शांत हैं और कठिन परिस्थितियों का सामना धैर्य-पूर्वक करती हैं। दृढ़ इच्छाशक्ति के कारण आपकी तारीफ़ होती है। आप अक्सर नैतिक और भावनात्मक साहस का प्रदर्शन करती हैं। आप वास्तव में भरोसेमंद और वफ़ादार हैं।  आप अपने संपत्तियों  को लेकर ज़्यादा सजग़ रहती हैं तथा आरामदायक ज़िन्दगी जीना आपको पसंद है।</p><p><b> वृषभ राशि में जन्म लेनें वाली कुछ शख़्सियत </b><b