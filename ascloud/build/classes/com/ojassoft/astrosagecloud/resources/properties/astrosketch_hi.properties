 आपको फ़िज़ूलख़र्ची बिल्कुल पसंद नहीं है। आप अपने उन प्रियजनों से बेहद प्यार करती हैं और उनका ख़याल रखती हैं। आप कभी-कभी अपनी मनमौजी रवैये की वजह से अप्रत्याशित नज़र आती हैं, परंतु किसी को ठेस पहुँचाना नहीं चाहती हैं।</p><p><b>कर्क राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br />प्रियंका चोपड़ा, जूलिया रोबर्ट, टॉम क्रूज, रानी डायना, पामेला एंडरसन</p><p><b>कर्क राशि के जातकों की कुछ सामान्य विशेताएँ</b><br /><b>सकारात्मक </b> भावुक, सहानुभूतिपूर्ण, कल्पनाशील, सहज, सतर्क, चतुर<br/><b>नकारात्मक </b>मनमौजी, बेचैन, अतिभावुक, चिड़चिड़ा</p><p><b>कर्क राशि की अनुकूल राशियाँ </b>मेष, कर्क, कन्या, वृषभ, तुला, मकर</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)<br/>सिंह राशि की महिला जातक बहुत ज़्यादा भावुक और संबंधो को लेकर गंभीर रहती हैं। आप अपने आसपास के लोगों के साथ बेहद ही अदब के साथ पेश आती हैं। आप खेलों में रुची रखती है, आप ऐथलेटिक बन सकती हैं। आप महंगी और विलासिता वाली वस्तुओं की तरफ आकर्षित होती हैं। नेतृत्व क्षमता आपमें प्राकृतिक रूप से विद्यमान है जिसके कारण आप कभी-कभी प्रभुत्ववादी रवैया अपना लेती हैं। आपको वर्चस्व जमाने वाले जीवनसाथी पसंद नहीं। अपने क्रोध के कारण आप अपमानित हो सकती हैं। अपमानित होने पर आप अतिक्रुद्ध हो सकती हैं। आपकी कोई आलोचना करे, नज़रअंदाज़ करे या आपकी बात कोई ना माने, यह आपको क़तई पसंद नहीं है। आपका अहंकार आपको अड़़ियल और अव्यावहारिक बनाता हैं। आप सभी लोगों से यह अपेक्षा करती हैं कि वह आपकी आज्ञा का पालन करे। आर्थिक क्षेत्रों में आप बेहद ही अपव्ययी हैं। आपको चापलूसी पंसद है। आप मेहमानों के सामने बेहद ही सलीकेदार रूप से पेश आती हैं। आप अपनी संवेदनशीलता को ज़ाहिर नहीं करती। </p><p><b>सिंह राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br /> मनिषा कोइराला, काजोल, राखी, मनोज कुमार, गुलज़ार साहब</p><p><b>सिंह राशि की महिलाओं की सामान्य पहचान </b><br /><b> सकारात्मक</b>व्यवहार कुशल, रोमानी, आकर्षक, आदर्शवादी, मिलनसार<br><b>नकारात्मक </b>सीधा-सादा, दुविधा-युक्त, बेचैन </p><p><b>सिंह राशि की अनुकूल राशियाँ </b>कर्क, मीन</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)<br/> कन्या(Virgo) राशि की महिला जातक पूर्णतावादी और अपने प्रत्येक काम के ब्योरे को लेकर चिंतित रहती हैं, ख़ासकर जब काम की ज़िम्मेदारी इनके ऊपर हो। आप तर्कपूर्ण और विश्लेषनात्मक है लेकिन कई बार आप ग़लत साबित होती हैं। आप  अशिष्ट व्यवहार और अनुपयुक्त भाषा का प्रयोग पसंद नहीं करती। आप साफ़-सुथरा रहना पसंद करती हैं। आप व्यवहार-कुशल लोगों में से एक हैं और आपको जमीन से जुड़े लोगों की तरह नज़र आती हैं। आप विलक्षण बुद्धि, तीव्र विश्लेषण और तेज़ दिमाग की धनी हैं। तर्कसंगत विचारक होने की वजह से आप अपने जीवन-साथी के साथ विवादों को आराम से निपटा सकती हैं। आप शांत, सक्रिय और स्वास्थ्य के प्रति सज़ग रहती हैं ताकि ख़ुद को आकर्षक, विवेकपूर्ण, ईमानदार, व्यवस्थित, नेक, यथार्थवादी, मददगार औऱ निष्ठावान रूप में साबित कर सकें। आपका चीख़ना और गुस्सा होना एक चिंता का विषय है।</p><p><b>कन्या राशि में जन्म लेनें वाली कुछ शख़्सियत</b><br/>आशा भोसले, रानी एलिज़ाबेथ, राकेश रौशन, अगाथा क्रिस्टी, जोसेफ कैनेडी</p><p><b>कन्या राशि के जातकों की कुछ सामान्य विशेषताएं</b><br/><b>सकारात्मक </b> व्यवहारकुशल, भरोसेमंद, अति-सावधान शालिन, कर्मठ/><b>नकारात्मक</b>रूढ़िवादी, बात का बतंगड़ बनाने वाली, नाज़ुक, निष्ठुर </p><p><b> कन्या राशि की अनुकूल राशियाँ </b> वृषभ और मकर</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)<br/>तुला राशि की महिलाएँ (Libra) पूरी तरह से रोमांटिक होती हैं।  अपने प्रेमी के लिए आपके दिल में बहुत जगह है। काबिल लोगों की बातों की आप कद्र करती हैं।  आप व्यवहार से शकी-मिज़ाज की नहीं है और ना ही किसी की निजी ज़िन्दगी में दख़लअंदाज़ी करने की कोशिश करती हैं। आप ना ही किसी प्रकार की बंदिशों में रहना चाहती है और न ही किसी अन्य को बंदिशों में देखना पसंद करती हैं। आप कीमती सामानों जैसे- परफ्यूम, फैशनेबल कपड़े और शास्त्रीय संगीत पर खूब पैसे ख़र्च करती हैं। तर्कपूर्ण तथ्यों को आप स्वीकार करती हैं। आप अत्यधिक मुखर, बुद्धिमान हैं और बुद्धिमतापूर्ण बातचीत को पसंद करती हैं। आपकी डिम्पल वाली मुस्कान और शिष्टाचार करोड़ों दिलों की धड़कनें चुरा लेती है। आपको समाज में घुल-मिलकर रहना पसंद है तथा ज़रूरत के समय आप अच्छे दोस्त के रूप में साबित होती हैं। आप किसी निर्णय को लेनें में काफ़ी वक्त लगाती हैं। कभी-कभी आप अपने आदर्शों का पालन कुछ ज़्यादा ही करने लगती हैं जिससे लोग आपके साथ असहज़ महसूस करते हैं।</p><p><b>तुला राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br />केट विंसलेट, रेखा, करीना कपूर, लता मंगेशकर,अमिताभ बच्चन, महात्मा गाँधी </p><p><b>तुला राशि की कुछ सामान्य पहचान</b><br/><b>सकारात्मक  </b> रोमांटिक, आकर्षक, मिलनसार, आदर्शवादी <br/><b>नकारात्मक </b>दुविधा में रहने वाला, सीधा-सादा</p><p><b> तुला राशि की अनुकूल राशियाँ</b>मेष, कर्क, सिंह, तुला, धनु, मकर</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)/> वृश्चिक राशि की महिला जातक प्रभावशाली, संकोची, संवेदी और तेज़-तर्रार होती हैं। आपका सहजज्ञान, तीव्र बुद्धि और आत्मविश्वास आपको अथक बनाता है। आप दूसरे लोगों के रहस्यों से पर्दा उठाने में काफ़ी दिलचस्पी रखती हैं जबकि अपने राज को आप कभी उजागर नहीं करती। आप बेहद ही कामुक, मनमौजी, संतुलित और शांत स्वभाव की हैं। बेकार की और ओछी बातों में आपकी रूचि नहीं है। आप एक कुशल संप्रेषक हैं और आसानी से दूसरों के साथ घुल-मिल जाती हैं, आपकी ये कला आपको परिवार और दोस्तों के बीच लोकप्रिय बनाती है। आपके अत्यधिक भावपूर्ण स्वभाव के कारण लोग आपको ज़्यादा मांग करने वाला समझ सकते हैं, हालांकि वे आपके प्यार के आदी भी हो जाते हैं। आप कभी-कभी ज़्यादा ही आक्रामक हो जाती हैं। आपकी भावुकता कभी-कभी दो-धारी तलवार की तरह काम करती है जिससे आप ख़ुद भी आहत होती हैं और दूसरों को भी करती हैं। </p><p><b> वृश्चिक राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/> ऐश्वर्या राय बच्चन, इंदिरा गांधी, डेमि मूरे, जवाहरलाल नेहरू, शाहरूख खान, बिल गेट्स, ब्रायन एडम </p><p><b>वृश्चिक राशि के जातकों की सामान्य पहचान</b><br/><b>सकारात्मक</b> भावुक, संवेदनशील, सहज, कामुक, गरिमामय, रहस्यपूर्ण, <br/><b>नकारात्मक </b> ईष्यालु, जुनूनी, हठी, क्रोधी </p><p><b>वृश्चिक राशि की अनुकूल राशियाँ </b>कर्क और मीन</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा))<br/>धनु(Sagittarius)  राशि की महिला जातकों में चातुर्य का अभाव रहता है और कभी-कभी आपके रूखे स्वभाव के कारण लोग आपसे दूरी बना लेते हैं। आप मिलनसार, मुखर और व्यहारकुशल हैं। अपनी स्पष्टवादी प्रवृत्ति के कारण आप व्यवहारिक दुनिया में यकीन करती  हैं। आप बेहद ही आशावादी और विवेकशील हैं। आप तथ्यों के आधार पर परिस्थिति का विश्लेषण करती हैं, उसके परिणामों के पूर्वानुमान से अवगत होने के बावजूद भी आप एक अच्छे बदलाव की उम्मीद करती हैं। सामान्यतः, आप शांतचित रहना पसंद करती हैं। हालांकि जब आपके साथ कोई अभद्र व्यवहार करता है तो आप भी उसके साथ उसी तरह से पेश आती हैं। आपको बंदिशों में रहना पसंद नहीं। आपको परिवार से लगाव है परन्तु अधिक नहीं। आपकी स्पष्टवादिता आपके लिए घातक हो सकती है, यहाँ तक की आपके संबंध भी ख़राब हो सकते हैं। आप कभी भी ढ़ोंगी या पाखंडी विचार की नहीं हो सकती, लेकिन आपकी स्पष्टवादिता और रूखापन आपके नकारात्मक रवैये को बयां करता है। आप दिल से कमज़ोर और निःसहाय हैं।</p><p><b>धनु राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br /> धर्मेंन्द्र, शत्रुघ्न सिन्हा, दिलिप कुमार,  विंसटन चर्चिल</p><p><b>धनु राशि के जातक की कुछ सामान्य विशेषताएँ </b><br /><b>सकारात्मक </b>आशावादी, ईमानदार, दार्शनिक, प्रसन्नचित, सुशील<br/><b>नकारात्मक </b> लापरवाह, बेचैन, बेअदब <p><b> धनु राशि की अनुकूल राशियाँ </b>कर्क और मीन</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आधार पर संक्षिप्त रूपरेखा)<br/> मकर(Capricorn) राशि की महिलाएँ विनम्र होती हैं जिन्हें शुरुआत में समझना आसान नहीं होता। आप अपने आचरणों को लेकर हमेशा सजग रहती हैं। आपके मित्रों की संख्या बेशक़ कम है परंतु जो हैं उनके आप बेहद करीब हैं। आप ज़्यादा बातूनी नहीं हैं, आप बोलना तभी पसंद करती है जब आवश्यक हो। आप हाज़िर जवाब और मज़ाकिया स्वभाव की हैं। आपका स्वभाव मनमौजी है। आप उनके प्रति बेहद ही प्रेम-पूर्वक व्यवहार करती हैं जिनके साथ ख़ुद को सुरक्षित महसूस करती हैं। आप दैनिक व्यय को लेकर काफ़ी गंभीर रहती हैं और सोच-विचार कर पैसे ख़र्च करती हैं। आप एक कुशल गृहणी हैं। आप अपने करियर के साथ-साथ परिवार का भी पूरा ख़याल रखती हैं। </p><p><b>मकर राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br/>रीना रॉय, अनु अग्रवाल, सलमान खान, अनिल कपूर, जावेद अख़्तर, नाना पाटेकर</p><p><b>मकर राशि की कुछ विशेषताएँ </b><br/><b>सकारात्मक </b>व्यावहारिक, सजग, विवेकशील, महत्त्वाकांक्षी, धैर्यवान <br/><b>नकारात्मक</b>कंजूस, निराशावादी, भाग्यवादी, ईर्ष्यालु  </p><p><b>मकर राशि की अनुकूल राशियाँ </b>वृषभ और कन्या</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आधार पर एक संक्षिप्त रूपरेखा) <br/>कुंभ (Aquarius) राशि की महिलाएँ अत्यधिक व्यक्तिपरक, स्वतंत्रता प्रेमी, बुद्धिमान और कल्पनाशील होती हैं।  आपके स्वभाव का अंदाज़ा लगाना अक्सर लोगों के लिए मुश्किल हो जाता है। आप अक्सर ज़िन्दगी जीने के ऐसे रास्ते का चुनाव करती हैं जो एक साधारण व्यक्ति की समझ से परे है। आप ज़िन्दगी अपनी शर्तों पर जीना पसंद करती हैं और किसी दूसरे के जीवन में भी दखलंदाज़ी नहीं करती। आप बहुत ही मानवीय दृष्टिकोण वाली है परंतु आपको अपने निजी रिश्तों से उतना लगाव नहीं है। लोग आपको शांत और असंवेदनशील समझ सकते हैं जो जबकि आप ऐसी नहीं है। आप अपनी दुनिया में व्यस्त रहती हैं तथा अक्सर दिमागी रूप से गैरहाजिर नज़र आती हैं लेकिन इसका मतलब ये नहीं है कि आप किसी बात को लेकर गंभीर नहीं रहती हैं। कई बार आप लोगों के ऐसे स्वभाव को नोटिस करती हैं जो अन्य नहीं कर पाते। आप अपनी स्वतंत्रता पाने के लिए हर संभव प्रयास कर सकती हैं।</p><p><b>कुंभ राशि में जन्म लेनें वाली कुछ शख़्सियत </b><br />उर्मिला मांतोडकर, प्रीति जिंटा, वहीदा रहमान, सुभाष घई</p><p><b>कुंभ राशि के जातको की कुछ सामान्य पहचान</b><br /><b>सकारात्मक </b> मिलनसार, मानवतावादी, नेकदिल,  बुद्धिमान, खोजी  <br /><b>नकारात्मक</b>अप्रत्याशित, अलग-थलग, उद्दंड,</p><p><b>कुंभ राशि की अनुकूल राशियाँ </b>मिथुन और तुला</p>#<p><b>एस्ट्रो स्केच: </b>(जन्म के आँकड़ों पर आधारित एक संक्षिप्त रूपरेखा)<br/>मीन(Pisces) राशि की महिला जातक बड़ी ही गूढ़ और रहस्यमय प्रवृत्ति की होती हैं। आपको समझाना टेढ़ी खीर है। आप अविश्वसनीय रूप से सुंदर, कोमल दिल की महिला हैं। आप अति-भावुक हैं तथा अपनी कल्पनाओं की दुनिया में खोई रहती हैं। लोग आपकी संगत में सहज महसूस करते हैं क्योंकि आप किसी भी परिस्थिति में आराम से ढ़ल जाती हैं। आप स्वभाव से काफ़ी शर्मीली हैं। आप कभी गुस्सा नहीं करती, आपको ऐसे लोगों के साथ रहना अच्छा लगता है जो आपको प्यार करें और आपका ख़याल रखें। आपको हमेशा लाड़-प्यार की ज़रूरत होती है। आप खुलकर अपनी बातों को सामने नहीं रखती जो कभी-कभी दूसरे लोगों को परेशान कर देता है। हालांकि वास्तव में आप प्रतिभाशाली हैं लेकिन आपके अंदर महत्वाकांक्षाओं की कमी है और आप मनमौजी प्रवृत्ति की हैं। </p><p><b>मीन राशि में जन्म लेनें वाली कुछ शख़्सियत</b><br />प्रीति जिन्टा, चेल्सिया क्लिंटन, अलबर्ट आइंस्टीन, माइकल ऐंजलो</p><p><b>मीन राशि के जातकों की कुछ पहचान </b><br /><b>सकारात्मक</b>कल्पनाशील, संवेदनशील, दयालु, निःस्वार्थी, आदर्शवादी <br/><b>नकारात्मक</b> पलायनवादी, कमज़ोर इच्छाशक्ति, संकोची </p><p><b>मीन राशि की अनुकूल राशियाँ </b> वृषभ, मिथुन, कन्या, धनु, मकर, मीन</p>
