
	 WHAT_IS_NAKSHATRA							= નક્ષત્ર શું છે?
	 NAKSHATRA_INTRO							= હિંદુ જ્યોતિષશાસ્ત્રમાં ચંદ્રના નિવાસસ્થાનને નક્ષત્ર કહે છે. સૂર્યની કક્ષાને સમાંતર 27 (કે ક્યારેક 28) વિભાગોમાંના દરેક વિભાગને એક નક્ષત્ર કહે છે. તેમનાં નામ જે-તે વિભાગનાં પ્રધાન તારામંડળ સાથે સંબંધિત હોય છે. ચિત્રા તારાની વિરુદ્ધ દિશામાં આવેલું સૂર્યની કક્ષાનું બિંદુ, નક્ષત્રનું આરંભિક બિંદુ ગણાય છે (અન્ય થોડી ભિન્ન વ્યાખ્યાઓ પણ છે). તેને મેષાદી અથવા મેષનો આરંભ કહેવાય છે. આ બિંદુથી શરૂ કરીને પૂર્વ દિશામાં દરેક નક્ષત્રમાં સૂર્યની કક્ષા વિભાજીત છે. નક્ષત્રની સંખ્યા એક તારા માસના દિવસોની સંખ્યા જેટલી છે, એટલે કે ચંદ્ર લગભગ એક દિવસમાં એક નક્ષત્રની પહોળાઈ જેટલું અંતર કાપે છે. દરેક નક્ષત્ર ચાર ચરણ (કે પદ) માં વિભાજીત થાય છે. હિંદુ જ્યોતિષશાસ્ત્રમાં દરેક પદને એક અક્ષર આપવામાં આવ્યો છે અને પરંપરાગત રીતે, બાળકના જન્મ સમયે ચંદ્ર જે પદમાં હોય તેના અક્ષર પરથી બાળકનું નામ પાડવામાં આવે છે.
