	SADESATIRISINGPHASE	= இப்பொழுது ஏழரை நாட்டு சனியின் தொடக்க காலமாகும். இந்த காலத்தில் ஒருவரது ஜாதகத்தில் கோசாரத்தில் சனி கிரகமானது சந்திரன் இருக்கும் வீட்டிலிருந்து  பன்னிரெண்டாம் வீட்டில்  சஞ்சாரம் செய்வார். இது பொதுவாக நிதி இழப்பு , மறைமுக எதிரிகள் மூலம் பிரச்சினைகள், குறிக்கோள் இல்லாத பயணம், பூசல்கள் , மற்றும் வறுமை ஆகியவற்றை குறிக்கிறது. இந்த காலகட்டத்தில் , உங்கள் மறைமுக எதிரிகள் மூலம்  பிரச்சினைகளை எதிர்கொள்ளக் கூடும் . உங்கள் உடன் பணிபுரிபவர்களுடன் உறவுமுறை சாதகமானதாக அமையாது மற்றும் அவர்கள் உங்கள் பணி சூழலில் பிரச்சினைகளை உருவாக்குவார்கள் . இத்துடன் தாங்கள் குடும்பத்தினரின்  குற்றச்சாட்டுகளைக் கூட எதிர்கொள்ள கூடும் . இதனால் இடர்பாடுகள்  மற்றும் பதற்றம் ஆகியவை உருவாகலாம் . நீங்கள் செலவுகள் செய்யும்போது மிகுந்த கட்டுப்பாடுடன் செயல்பட வேண்டும் இல்லையென்றால் அதன் மூலம் பெரிய அளவில் நிதி நிலையில் பிரச்சினைகளை  ஏற்படுத்திவிடும். இந்த காலங்களில் நீண்ட தூர பயணம் பயனுள்ளதாக அமையாது. சனியின் தன்மை தாமதம் மற்றும் மனவருத்தம் போன்றவற்றை  உள்அடக்கியது. ஆனால் பொதுவாக தங்களுக்கு இறுதியில் முடிவு கிடைக்கும், எனவே உங்கள் தருணத்திற்காக  பொறுமையாக காத்திருக்கவும். இந்த குறிப்பிட்ட காலத்தை அனுபவ காலமாக எடுத்துக் கொள்ளவும் , செயல்களில் கடின உழைப்பை செலுத்தினால்  அனைத்து செயல்களும்  உங்களிடத்தில் தானாகவே வந்து அடையும். இந்த காலத்தில் வணிக விஷயங்களில் அதிக அளவில் துணிந்து செயல்படுவது சாதகமாக அமையாது என்று அறிவுறுத்தப்படுகிறார்கள்.
	SADESATIPEAKPHASE		= இது ஏழரை நாட்டு சனியின் உச்ச காலமாகும். பொதுவாக ஏழரை நாட்டு சனியின் இந்த கட்டமானது மிக கடினமான ஒன்றாகும். பிறந்த போது அமைந்த சந்திரன் மீது சனி கிரகமானது கோச்சாரத்தில் பயணம் செய்யும்போது உடல் நிலை பிரச்சினைகள், பண்பு நலங்கள் மற்றும் குண இயல்புகள் ஆகியவற்றிற்கு பங்கம், அவமானம் உண்டாகுதல், உறவில் சிக்கல்கள், மன வேதனைகள், மற்றும் கவலைகள் ஆகியவற்றை செயல்படுத்துகிறது. இந்த காலகட்டத்தில் வெற்றி அடைவது  என்பது மிகவும் கடினமாக தோன்றும். உங்கள் கடின உழைப்புக்குத் ஏற்ப தகுந்த முடிவுகளை பெற முடியாமல் கட்டுப்படுத்தப்பட்டிருப்பதை உணர்வீர்கள். உங்கள் உடல் அமைப்பு மற்றும் நோய் எதிர்ப்பு சக்தியின் அமைப்பு வலுவானதாக இருக்க முடியாது. முதல் வீடு என்பது உடல் நலம் சார்ந்த வீடு என்று கருதப்படுவதால் , நீங்கள்  உடல் நலத்தை சரிவர பார்த்துக் கொள்ள தொடங்க வேண்டும், இல்லையெனில் தங்களுக்கு நாள்பட்ட நோய்களால் தாக்குதலுக்கு உள்ளாகலாம். இது சமயம் தங்களுக்கு தாழ்வு மனப்பான்மை, காரணமின்றி பயம்  மற்றும் மன வெறுப்புக் கோளாறு ஆகியவற்றினால் பாதிக்கப்பட வாய்ப்பு அதிகம் உள்ளது. உங்கள் சிந்தனை, நடவடிக்கை , மற்றும் முடிவெடுத்தல் போன்ற செயல்களில்  தங்களின் தெளிவு தேவையான அளவிற்கு சற்று குறைவாகவே காணப்படும். நீங்கள் ஆன்மீகத்தில் ஈடுபாட்டுடன் செயல்படுவீர்கள் மற்றும் இயற்கையின் கடுஞ்சிக்கல்களை எதிகொள்ள நேரிடும். இந்த காலகட்டத்தில் எதையும் மனதளவில் ஏற்றுகொள்ளுதல் மற்றும் அடிப்படை செயல்களை சரியான முறையில் செய்வதின் மூலம்  இந்த கடினமான தருணத்திலிருந்து தங்களை வெளியே கொண்டு வந்து விடும்.
	SADESATISETTINGPHASE	= இது ஏழரை நாட்டு சனியின் முடிவு பெறும்  காலமாகும்.  பிறந்த போது சந்திரன் அமைந்த இடத்திலிருந்து சனி கிரகம் 2 வது வீட்டில் கோசாரத்தில் பயணம் செய்து கொண்டிருக்கும். எனவே நிதி நிலை மற்றும் குடும்ப சூழ்நிலைகளில் கடினமான கட்டங்களை காண வேண்டியிருக்கும்.  ஏழரை நாட்டு சனியின் இரண்டு பெரிய கட்டங்களை தாண்டி விட்டதால் தங்களுக்கு தற்சமயம் சிறிதளவு நிவாரணமாக இருப்பதை உணர்வீர்கள். இருந்த போதிலும் இந்த சமயத்தில் மனஸ்தாபங்கள், மற்றும் நிதி நிலை போன்றவற்றில் கடுந்துன்பம் விளைவிக்கும் நிலையில் இருப்பதைப் பார்க்க முடியும். செலவுகள் அதிகமாக உயரும் வகையில் இருப்பதால்  நீங்கள் செலவு செய்வதை தொடர்ந்து கட்டுப்பாட்டுக்குள் வைக்க வேண்டும் . திடீர் நிதி இழப்புகள் மற்றும் திருட்டு பயம் ஏற்பட ஒரு வாய்ப்பு உள்ளது . நீங்கள் நம்பிக்கை இல்லாத எண்ணங்கள் உடையவராய் இருக்கலாம் , எனவே ஆர்வத்துடன் எல்லா விஷயங்களையும் சமாளிக்க தங்களை அறிவுறுத்தப்படுகிறார்கள். நீங்கள் குடும்பம் மற்றும் உங்களது தனிப்பட்ட விசயங்களில்  நல்ல கவனம் செலுத்தி வர  வேண்டியிருக்கும், இல்லை எனில் அவை கூட ஒரு பெரிய பிரச்சனையை ஏற்படுத்தலாம்.  மாணவர்களுக்கு , கல்வி பயிற்சி மேற்கொள்வதில் சற்று பாதிப்பு உண்டாகலாம் மற்றும் அவர்கள் இருக்கும் பழைய நிலையை திரும்பப் பெறுவதற்கு மிகவும் கடினமாக உழைக்க வேண்டி இருக்கும். முடிவுகள் எப்போதும் மெதுவாகவும் , தாமதத்துடனும் காணப்படும் . இந்த கால கட்டம் ஆபத்தை குறிக்கும் ஒரு காலம் ஆகும், எனவே மற்ற விஷயங்களைத் தவிர  நீங்கள் வாகனம் செலுத்தும் போது சற்று அதிக கவனத்துடன் செயல்பட வேண்டியிருக்கும் . சனியை மகிழ்ச்சியாக வைத்திருக்க அசைவ உணவு மற்றும் உங்கள் குடி பழக்கம் ஆகியவற்றை தவிர்த்து அதிலிருந்து விலகியிருப்பது  நன்மை தரும். நீங்கள் புத்திசாலித்தனமாக உங்கள் குடும்ப நலன்  மற்றும் நிதி விவகாரங்களைக்  கையாளுவதன் மூலம் இந்த காலத்தை எளிதாக பயணம் செய்து சமாளிக்க முடியும்.
	IMPNOTE				= மேலே கூறப்பட்ட கணிப்புகள் பொதுவானவை. ஏழரை ஆண்டு சனி எப்போதும் தீங்கு விளைவிக்கும் என்ற பொது நம்பிக்கையை அடிப்படையாக கொண்டது. உண்மையில், இது எப்போதும் அப்படி செயற்படுவதில்லை என்று கண்டறியப்பட்டது.  நாம் இது குறித்து படிக்க பரிந்துரைக்கிறோம் <b><u><a href=http://www.astrocamp.com/vedicastrology/2008/09/shani-sade-sati.html>ஏழரை ஆண்டு சனி பற்றிய கட்டுரையை</a></u></b>. ஏழரை ஆண்டு சனி அடிப்படையில் தனியாக எந்த முடிவையும் எடுப்பது சரியாக அமையாது. தற்போது இயங்கும் தாசா புத்தி மற்றும் சனியின் தன்மை போன்ற காரணிகளையும் பகுப்பாய்வு  செய்து  அதன் பின்னர் ஏழரை ஆண்டு சனி தீயவிளைவு செய்கிறதா அல்லது  நல்லது செய்கிறதா என்பதை முடிவு செய்ய வேண்டும். நீங்கள் மேலே கூறிய கணிப்புகளை தீவிரமாக மனதில் எடுத்துக் கொள்ள வேண்டாம் என அறிவுறுத்தப்படுகிறார்கள். தங்களுக்கு  ஏதெனும் சந்தேகம் ஏற்பட்டால் ஒரு நல்ல ஜோசியரிடம் ஆலோசனைக்கு அணுகவும்.
