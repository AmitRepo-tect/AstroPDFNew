

	 TEVA				    = ధరిమి జాతకం#రాత్రి అంధత్వ జాతకం#అంధత్వ జాతకం#మైనర్ జాతకం
	 DHARMI_TEVA_FALSE			= మీ జాతకం ధర్మి జాతకం కాదు
	 DHARMI_TEVA_TRUE			= మీ జాతకం ధర్మి జాతకం
	 RATAANDHA_TEVA_FALSE		= మీ జాతకం రాతాంధ జాతకం కాదు
	 ANDHA_TEVA_TRUE			= మీ జాతకం అంధ జాతకం
	 ANDHA_TEVA_FALSE			= మీ జాతకం అంధ జాతకం కాదు
	 RATAANDHA_TEVA_TRUE		= మీ జాతకం రాతాంధ జాతకం
	 NABALIG_TEVA_TRUE			= మీ జాతకం మైనర్ జాతకం
	 NABALIG_TEVA_FALSE			= మీ జాతకం మైనర్ జాతకం కాదు
	 LK_DHARMI_TEVA				= లాల్ కితాబ్ లో కొన్ని జాతకాలను ధర్మి జాతకాలుగా పరిగణించబడ్డాయి. లాల్ కితాబ్ ప్రకారం, రాహువు, కేతువు & శని గ్రహాలను చెడు గ్రహాలుగా పరిగణించడతాయి. ఒకవేళ జాతకం, ధర్మి అయితే, శని, రాహు మరియు కేతువు కూడా చెడు ఫలితాలు అందించడం ఆపేస్తారు. వారు లాభఫలితాలు ఇవ్వాల్సిన అవసరం లేకపోయినప్పటికినీ, వారు కనీసం చెడు ఫలితాలను ఆపేస్తారు.<br/>రాహువు మరియు కేతువు నాలుగవ గదిలో ఉన్నప్పుడు లేదా చంద్రునితో పాటు జాతకంలో ఏ స్థానంలో ఉన్నప్పటికీ వారు ధర్మి అవుతారు. శని పదకొండవ గది లేదా గురువు తో పాటుగా జాతకంలో ఏ స్థానంలో ఉన్నా కూడా ధర్మి అవుతారు. రెండు నిబంధనలు పూర్తయితే, అవుడు ఆ జాతకం ధర్మి తేవ అని పిలువబడుతుంది.
	 LK_NIGHT_BLIND_HOROSCOPE	= రాతంధ్ (రాత్రి అంధత్వం) గ్రహాలు లాల్ కితాబ్ యొక్క ఒక ప్రత్యేక అంశము. ఒక జాతకంలో శని 7వ గదిలో మరియు రవి 4 వ గదిలో ఉన్నపుడు, ఆ జాతకం రాత్రి-అంధత్వం అని పిలువబడుతుంది. అంధత్వ జాతకం లాగా, రాత్రి బ్లింగ్ జాతకం గల వ్యక్తి, దిశానిర్దేశనం లేనివాడిగా మరియు స్వీయనిర్ణయం తీసుకోలేనివాడిగా ఉంటాడు. అతను ఒక చీకటివ్యక్తిగా ప్రవర్తిస్తాడు
	 LK_BLIND_HOROSCOPE			= ఒక జాతకంలో, జాతకానికి పునాది దాని పదవ గది, ఈ గదిలో వృత్తి, ఉద్యోగం, స్థానం, ప్రఖ్యాతి మరియు ప్రభుత్వం నుండి అనుకూలాంశాలు ఉంటాయి. పదవగదిలో గ్రహాలు ఒకదానికొకటి వ్యతిరేకంగా ఉంటే లేదా దుర్బలమైన గ్రహాల వంటి చెడుస్థానంలో ఉన్న గ్రహాలు మొ.వి ఉంటే, అన్ని గ్రహాలు మంచి ఫలితాలను ఇవ్వలేవు. అలాంటి కలయిక ఉన్న జాతకం అంధత్వ జాతకం అని పిలువబడుతుంది మరియు అలాంటి జాతకం కలిగిన వ్యక్తి ఒక అంధునిగా లేదా దిశానిర్దేశనం లేని వాడిగా ప్రవర్తిస్తాడు.
	 LK_MINOR_HOROSCOPE			= లాల్ కితాబ్ ప్రకారం, 12 సంవత్సరాల వయస్సు వరకు, కొన్ని నిబంధనలను అల్పంగా పరిగణిస్తారు. జాతకంలోని గ్రహాల స్థితిగతుల వలన మైనర్ జాతకం ఫలితాలను ఇవ్వకపోవచ్చు మరియు అంచనావేయని నడవడికను చూపవచ్చు. అలాంటి వ్యక్తి యొక్క తలరాత 12 సంవత్సరాల వయస్సు వరకు నమ్మదగినది కాదు.
