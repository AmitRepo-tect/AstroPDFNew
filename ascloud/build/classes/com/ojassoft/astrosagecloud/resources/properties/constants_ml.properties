LALKITAB_REMEDIES_RULES                = ലാൽ കിതാബ് പരിഹാരങ്ങളുമായി ബന്ധപ്പെട്ട നിയമങ്ങൾ
LALKITAB_REMEDIES_RULES1               = മറ്റൊരു സമയം പ്രത്യേകിച്ച് പറഞ്ഞിട്ടില്ലാത്തിടത്തോളം, എല്ലാ പരിഹാരങ്ങളും പകൽ വെളിച്ചത്തിൽ സൂര്യൻ ഉദിച്ചു നിൽക്കുമ്പോൾ ആവണം ചെയ്യേണ്ടത്. ചിലർ മേഘാവൃതമായ ദിവസം പരിഹാരങ്ങൾ നടത്തികൂടായെന്ന് അഭിപ്രായപ്പെടുന്നു. രാത്രിയെന്നത് പോലെ മേഘാവൃത ദിവസവും ശനിക്കു സ്വന്തമാണ്. എന്നാൽ, മിക്ക സമയത്തും ശീതകാലം ഇരുണ്ടതും നിറമില്ലാത്തതും ആയിരിക്കുന്ന പടിഞ്ഞാറൻ പ്രദേശങ്ങളിൽ,  ഇങ്ങനെയുള്ള പ്രതിബന്ധങ്ങൾ ഒന്നും തന്നെയില്ല.
LALKITAB_REMEDIES_RULES2               = 6 ദിവസം, 10 ദിവസം, 43 ദിവസം എന്നിങ്ങനെ നീണ്ട നാൾ ചെയ്യേണ്ട പരിഹാരങ്ങൾ, കൃത്യമായി മുടങ്ങാതെ ചെയ്യേണ്ടതാണ്. എന്തെങ്കിലും കാരണത്താൽ ഈ പരിഹാര ക്രിയയിൽ മുടക്കം വരാം എന്ന് ധാരണയുണ്ടെങ്കിൽ, പാലിൽ കഴുകിയ കുറച്ച് അരി വീട്ടിൽ സൂക്ഷിക്കുക എന്നതാണ് ഈ സാഹചര്യത്തിൽ ചെയ്യുവാൻ കഴിയുന്ന ഏറ്റവും മികച്ച കാര്യം. അഥവ ഇത് 43 ദിവസത്തെ പരിഹാരമാണെങ്കിൽ, ഈ പരിഹാരം ചെയ്യുവാൻ കഴിയാത്ത വിധം നാലു ദിവസത്തേക്ക് നിങ്ങൾക്ക് പുറത്തു യാത്ര പോകേണ്ടി വന്നാൽ, നിങ്ങൾ തിരിച്ചു വന്നതിനു ശേഷം നിറുത്തിയ ഇടത്തുവച്ചു തന്നെ ഈ പരിഹാരങ്ങൾ തുടങ്ങാവുന്നതാണ്.
LALKITAB_REMEDIES_RULES3               = ഒരു സമയത്ത് ഒരു പരിഹാരം മാത്രം ചെയ്യുക. ഒന്നാമത്തെ പരിഹാരം തീർന്നതിനു ശേഷം മാത്രം അടുത്തത് തുടങ്ങുക. പരാമർശിച്ചിട്ടുണ്ടെങ്കിൽ, പരിഹാരങ്ങളുടെ ക്രമം പാലിക്കുക. പരാമർശിച്ചിട്ടില്ലയെങ്കിൽ, പരിഹാരങ്ങൾ ക്രമപ്പെടുത്തുവാനുള്ള മികച്ച വഴിയാണ്, ഒരു ദിവസത്തെ പരിഹാരം ആദ്യം ചെയ്യുക നീണ്ട പരിഹാരങ്ങൾ പിന്നീട് ചെയ്യുക എന്നത്
LALKITAB_REMEDIES_RULES4               = അടുത്ത പരിഹാരം തുടങ്ങുന്നതിനു മുമ്പ് കുറച്ചു ദിവസത്തെ ഇടവേള നൽകുക, ഒരാഴ്ച്ചയ്ക്കു ശേഷം തുടങ്ങുക. കൂടാതെ അവസാനമായി ജാതകനു വേണ്ടി രക്ത ബന്ധമുള്ള ഒരാളാണ് ആണ് പരിഹാരം ചെയ്യുന്നതെങ്കിൽ, ഞാൻ ഈ പരിഹാരം ചെയ്യുന്നത് ഇന്ന ആൾക്കുവേണ്ടിയാണ് എന്ന് മാനസിക സങ്കൽപ്പം അയാൾ ഉണ്ടാക്കിയെടുക്കണം അല്ലെങ്കിൽ ഇത് അയാളുടെ പരിഹാരമാവുകയും അത് ഉചിതമാകുകയും ഇല്ല


