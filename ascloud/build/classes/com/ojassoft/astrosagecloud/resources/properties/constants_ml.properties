BIRT_DATE_COMPATIBILITY                           = ജനന തീയതി പൊരുത്തം (ന്യൂമറോളജി)
BIRT_HDATE_COMAPTIBILITY_P1                       = നിങ്ങളുടെ പ്രണയ പങ്കാളിയുമായി നിങ്ങളുടെ പൊരുത്തത്തിന്റെ സ്കോ കണ്ടെത്തുന്നതിനുള്ള വളരെ ഉപയോഗപ്രദമായ ഒരു ആപ്ലിക്കേഷനാണ് ബത്ത് ഡേറ്റ് കോംപറ്റബിലിറ്റി കാക്കുലേറ്റ. ഈ കാക്കുലേറ്ററിന്റെ കണക്കുകൂട്ട ന്യൂമറോളജി അടിസ്ഥാനമാക്കിയുള്ളതാണ് എന്നതാണ് ഇതിന്റെ മികച്ച ഭാഗം; അതിനാ നിങ്ങക്ക് ഇതിനെ ന്യൂമറോളജി ലൗ കോംപറ്റബിലിറ്റി കാക്കുലേറ്റ എന്നും വിളിക്കാം. പുരാതന കാലത്തെ ഗണിതശാസ്ത്രത്തിന്റെ ഭാഗമായി ഉപയോഗിച്ചിരുന്ന സ്യൂഡോ സയസിറെ ഭാഗമാണ് ന്യൂമറോളജി. കാലക്രമേണ മറ്റു ഗണിതശാഖകളുടെയും സംഖ്യാശാസ്ത്രത്തിന്റെയും വിവിധ വശങ്ങളി ശാസ്ത്രജ്ഞരും ഗണിത ശാസ്ത്രജ്ഞരും തമ്മി ഭിന്നിച്ചു. അതിനാ ന്യൂമറോളജി മറ്റൊരു ശാസ്ത്രശാഖയായി അല്ലെങ്കി ഗുപ്ത ശാസ്ത്രമായി മാറി എന്ന് പറയാം. അന്നുമുത, ന്യൂമറോളജി നമ്മ എല്ലാവരുടെയും പ്രവചനങ്ങൾ കണ്ടെത്തുന്നതിനായി ഉപയോഗിക്കുന്നു.
