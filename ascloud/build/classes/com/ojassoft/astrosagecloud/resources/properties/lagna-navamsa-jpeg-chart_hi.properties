
SAVE_CHART_AS_IMAGE_FILE_JPEG = चित्र (जेपीईजी) के रूप में कुण्डली सहेजें 
PRINT_EMBED_OR_SHARE_CHART_ON_FACEBOOK_TWITTER = कुण्डली फेसबुक या ट्विटर पर प्रकाशित की जा सकती है
SAVE_CHART_INTRO_PARA = कभी-कभी हम ऑनलाइन शेअर करने अथवा प्रिंट करने के लिए चार्ट (कुण्डली) चाहते हैं। इस पेज की उपयोगिता उसी कार्य के लिए है। तो बस नीचे दिए गए चार्ट पर दाहिनी ओर (राइट) क्लिक करें और ''चित्र के रूप में सुरक्षित करें...'' अथवा ''छवि के रूप में सुरक्षित करें...'' का चयन करें और चार्ट (कुण्डली) अपने स्थानीय मशीन में सुरक्षित करें। यह फाइल JPEG प्रारूप में (जो कि इंटरनेट पर सबसे लोकप्रिय छवि प्रारूप है) सुरक्षित हो जाएगी। यह सुरक्षित कुण्डली सामाजिक नेटवर्किंग वेबसाइटों जैसे कि फ़ेसबुक और ट्विटर अथवा आपके अपने ब्लाग या वेबसाइट पर प्रकाशित की जा सकती है।
