	 SHESHNAG_KALSARPA_YOGA_INTRO_TEXT = প্রচলিত সংজ্ঞা অনুযায়ী, একটি জাতকের জন্ম তালিকায় যখন রাহু দ্বাদশ ঘরে বর্তমান,কেতু ষষ্ঠ ঘরে থাকে,তার সাথে রাহু এবং কেতুর মধ্যে যে অবশিষ্ট গ্রহ থাকে তা যদি দ্বাদশ ও ষষ্ঠ ঘরের মধ্যে থাকে তখন জন্মতালিকায় শেষনাগ কালসর্প দশা দেখা দেবে। এই ক্ষেত্রে জাতক দীর্ঘ সময় পরে ইচ্ছা পূর্ণ করবেন,জীবিকার জন্য তিনি অনেক দূরে এবং তার পরেও ভ্রমণ করবেন,নিন্দা ও সংঘাতের ভয়ে বসবাস করবেন। নির্দিষ্ট আচরণের দরুন জাতক উপহাসের শিকার হবেন। তবে একদা তাঁর জীবদ্দশায় তিনি কর্তৃপক্ষের একটি অবস্থান গ্রহণ করেন এবং কাঙ্ক্ষিত খ্যাতি অর্জন করেন। এই সমস্যার সঙ্গে মোকাবিলা করার জন্য,এখানে কিছু প্রতিকার রয়েছে:
