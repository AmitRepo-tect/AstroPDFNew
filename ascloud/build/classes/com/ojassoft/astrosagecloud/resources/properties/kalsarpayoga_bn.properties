	 INTRODUCTION_KALSARP_YOG = জনপ্রিয় সংজ্ঞা হিসেবে বলা যায়, সমস্ত গ্রহ যখন জন্মতালিকা বা কুষ্ঠিতে রাহু এবং কেতুর মধ্যে অবস্থিত, জ্যোতিষীরা একে কালসর্প দশা বলে।বর্তমান দিনে ভারতবর্ষের হিন্দু জ্যোতিষীদের মধ্যে এই দশা প্রথা হিসাবে আলোচিত হয়।একজনের জীবনে নানা সমস্যা নিয়ে আসে কালসর্প দোষ।অন্যান্য এলাকার জ্যোতিষীরা বিশ্লেষণ না করেই কালসর্প দোষকে সমস্যার মূল রাস্তা বলে গ্রহন করেছে।কিন্তু বাস্তবটা হল যে যদি সমস্ত গ্রহ ভালো অবস্থানে থাকে কুষ্ঠীতে, তবে কালসর্প দোষ ক্ষতিকারক হবে না এবং সমর্থনমূলক উপকারী ফল পাওয়া যেতে পারে গ্রহের ভালো অবস্থানের দ্বারা। কারো কুষ্ঠীতে কালসর্প দোষ হয় অশুভ যখন অন্যান্য গ্রহের অবস্থান হয় প্রতিকূল। <br/> <br/> সেইজন্য ‘কালসর্প দোষ’এর কথা শুনে ভয় পাবার কিছু নেই। কালসর্প দোষের নেতিবাচক প্রভাবের গভীর বিশ্লেষণের জন্য একমাত্র জ্যোতিষীর পরামর্শ নিয়ে সর্বদা ভালো প্রতিকারে পৌঁছনো যাবে। কৌতূহলজনকভাবে, বিভিন্ন মানুষের ক্ষেত্রে কালসর্প দোষের প্রভাব বিভিন্ন রকম। কারন কালসর্প দোষের প্রভাব কতগুলি বিষয় কে ভিত্তি করে- কোন চিহ্ন কোন ঘরে অবস্থিত এবং অন্যান্য গ্রহরা কিভাবে পূর্ণ করে এই ঘর, কি তাদের প্রভাব এবং কি ভাবে চলবে।
	 ANNANT_KALSARPA_YOGA_INTRO_TEXT = যখন রাহু থাকে লগ্নে,কেতু সপ্তম ঘরে অবস্থিত এবং সমস্ত গ্রহ রাহু এবং কেতুর মাঝখানে অবস্থান করে তখন কালসর্প দোষ বা যোগ হয়। লগ্ন তালিকায় দোষ থাকার ফলে চিত্তাকর্ষক ব্যক্তি হতে গেলে কঠোর পরিশ্রম করতে হবে জাতককে। ব্যবসা এবং সাহিত্যে উন্নতির জন্য কালসর্প দোষের সাথে ব্যাক্তি সাফল্যকে কাছে আনার জন্য একটু বেশি ঝোঁক রাখতে হবে এবং একটু বেশি পরিশ্রম করতে হবে। সাধারনত ব্যাক্তি এই দোষের ফলে  ধীরে ধীরে আটপৌরে বা ব্যঙ্গাত্মক হয়ে ওঠে। অনন্ত কালসর্প দোষের ব্যাক্তিদের ব্যাবসা বানিজ্যে ক্ষতিগ্রস্ত হওয়ার সম্ভাবনা থাকে। জাতকের শারীরিক এবং আর্থিক অবস্থা ভাল হয় না এই দশায়।  তিনি তার পিতা ও পিতৃপুরুষদের সম্পত্তি প্রাপ্তির ক্ষেত্রে বাধার সম্মুখীন হবেন। তিনি তীব্র ভাবে আইনি ঘটনা এবং প্রতারনার সম্মুখীন হতে পারেন। তাঁর সামাজিক চিত্র দুর্বল হয়ে পড়তে পারে। তবে, প্রতিকূল ঘটনা থাকা সত্বেও, অনন্ত কালসর্প দশার ব্যক্তি অবশ্যই একটি অলৌকিক সময় অভিজ্ঞতা পার করবে যখন তার সব সমস্যা স্বয়ংক্রিয়ভাবে অদৃশ্য হবে। এবং অলৌকিক ঘটনা চেষ্টা দ্বারা আসবে না কিন্তু হঠাৎই ঘটবে। তবে এই দশার সাথে ব্যক্তির সমস্যার আয়তন আছে তিনি জীবনের যেকোনো ঘাটতি অনুভব করেন কখনও। যদি কোনো ব্যক্তি জীবনে বিশাল সমস্যার সম্মুখীন হয় অনন্ত কালসর্প দোষের কারণে তবে তাঁর নিম্নলিখিত প্রতিকারগুলি প্রয়োগ করা উচিৎ:
	 KULIK_KALSARPA_YOGA_INTRO_TEXT = যখন রাহু দ্বিতীয় ঘরে,কেতু অষ্টম ঘরে থাকে এবং সমস্ত গ্রহ রাহু এবং কেতুর  মাঝখানে উপবিষ্ট হয়,এটা কুলিক কালসর্প যোগ হয়। এটা বিশ্বাসযোগ্য যে এই যোগ  মানহানি বা মর্যাদাহানি ঘটায়। এটি  ব্যক্তির পড়াশুনার ওপর বিরূপ প্রভাব ফেলে। এটা অস্থির বা দুর্বল আর্থিক অবস্থানের আরো কারণ যা ব্যক্তির বিবাহিত জীবনে বিরোধ,বিচ্ছেদ আনতে পারে। তার বন্ধু তাকে ছলোনা করতে পারেন। এটা মানসিক এবং শারীরিক ভারসাম্যের কারন যা ব্যক্তিকে তার বয়সের আগে বৃদ্ধ করে তোলে। এই কালসর্প যোগের কারনে তিনি উদ্যম ও সাহস থেকে দূরে হন। তবে এই যোগের সঙ্গে ব্যক্তি কঠোর এবং উৎসর্গ দ্বারা সাফল্য অর্জন করতে পারে কিন্তু এই সাফল্য শুধুমাত্র কিছু সময়ের জন্য। এমন পরিস্থিতিতে ব্যক্তির নিম্নলিখিত প্রতিকার প্রয়োগ করা উচিৎ:
	 VASUKI_KALSARPA_YOGA_INTRO_TEXT = যখন কারো কুষ্ঠী বা জন্ম তালিকায় রাহু তৃতীয় ঘরে থাকে, কেতু নবম ঘরে থাকে, এবং সমস্ত অন্যান্য গ্রহ এই দুটি ঘরের মধ্যে থাকে তখন বাসুকি কালসর্প দোষ হয়। এই কালসর্প যোগ কারো কুষ্ঠীতে ভাইবোন এবং অন্যান্য বন্ধুদের থেকে সংশ্লিষ্ট সমস্যা নির্দেশ করে। এই যোগের ব্যক্তিরা বন্ধু এবং অন্যান্য কাছাকাছি মানুষের প্রতারণার সম্মুখীন হতে পারেন। এই ব্যক্তির বাড়ি এবং পারিবারিক জীবন উত্তেজনা ও সহিংসতা পূর্ণ। যদি কিছু ধরনের ব্যক্তি অর্থ উপার্জন শুরু করে বা তার জন্মভূমিতে থেকে বাইরে বেঁচে থাকে তবে আরো সফল হতে পারে। তবে এই ব্যক্তি দেরীতে সাফল্য পায় কিন্তু নিশ্চিত পায়। সমস্যাগ্রস্থ সময়ে নিম্নলিখিত প্রতিকার প্রয়োগ করা যেতে পারে:
	 SHANKPAAL_KALSARPA_YOGA_INTRO_TEXT = যখন একটি জন্ম তালিকায়, রাহু চতুর্থ ঘরে থাকে, কেতু দশম ঘরে থাকে, এবং বাকি গ্রহরা এই ঘরের মধ্যে থাকে তখন শঙ্খপাল কালসর্প যোগ হয়। এই কালসর্প যোগের কারনে প্লট বা এস্টেট, দুর্গের সাথে সমস্যা সম্পর্কিত এবং যানবাহনের সাথে যন্ত্রণা সম্পর্কিত। এই কালসর্প যোগের সঙ্গে ব্যক্তি এক সময়ে একাধিক কাজ করার ইচ্ছা আছে। এবং যে ব্যক্তির কাজের সবচেয়ে গুরুত্ব রয়েছে সেই ব্যক্তি সম্পূর্ণ। এছাড়াও এই ব্যক্তি  বিবাহিত জীবনে বিরোধের সম্মুখীন হবে।  আর্থিক ঘাটতি এই যোগের এক প্রধান লক্ষণ। যদিও এই ব্যক্তি রাজনীতি, সেবা, এবং ব্যবসার ক্ষেত্রে ন্যায্য সাফল্য পায়, এবং সামাজিক একতা অর্জন করে। সমস্যার সময় নিম্নলিখিত প্রতিকারগুলি প্রয়োগ করা যেতে পারে:
	 PADAM_KALSARPA_YOGA_INTRO_TEXT = যখন কারো জন্ম তালিকায় রাহু পঞ্চম ঘরে অবস্থিত, কেতু একাদশ ঘরে অবস্থিত, এবং সমস্ত অন্যান্য গ্রহ এই দুটি ঘরের মধ্যে থাকে তখন পদম কালসর্প যোগ হয়। পঞ্চম ঘরের সঙ্গে সংগঠনের দরুন, এই কালসর্প যোগ পড়াশুনায় বাধা, শিশুর দেরিতে জন্ম, এবং শিশুদের সম্পর্কিত যন্ত্রণা নির্দেশ করে। প্রায়ই স্বাস্থ্য এবং বিবাহিত জীবন অসাধারণ হয় এই যোগের কারণে। এই কালসর্প যোগের সঙ্গে ব্যক্তি সবসময় পরিবারের মর্যাদাহানি সম্পর্কে ভয় করে। এই ব্যক্তির জীবন সংগ্রামময় হবে কারণ এই যোগ থেকে দুশ্চিন্তা উৎপন্ন হয়। তাঁর বন্ধুরা স্বার্থপর হয়। সমস্যার সংখ্যার সম্মুখীনের পাশাপাশি এই ব্যক্তির ভাল এবং শক্তিশালী আর্থিক অবস্থান,সম্মানীয় সামাজিক অবস্থা, এবং ব্যবসা ভালো চলবে।  এই যোগের সাথে ব্যক্তি যদি তার আচরণ এবং প্রকৃতি দ্বারা ভাল থাকেন,যদি তিনি মদ্য পান না করেন এবং যদি তিনি তার বন্ধুর সম্পত্তি বাজেয়াপ্ত না করেন, তাহলে উপরে  উল্লিখিত পদম কালসর্প যোগের খারাপ প্রভাব কার্যকরী হবে না।
