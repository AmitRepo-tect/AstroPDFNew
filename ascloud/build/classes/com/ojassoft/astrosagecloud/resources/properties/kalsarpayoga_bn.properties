	 GHATAK_KALSARPA_YOGA_INTRO_TEXT = প্রচলিত সংজ্ঞা অনুযায়ী, একটি জাতকের জন্ম তালিকায় যদি রাহু দশম ঘরে থাকে,কেতু চতুর্থ ঘরে থাকে,তার সাথে রাহু এবং কেতুর মধ্যে যে অবশিষ্ট গ্রহ থাকে তা যদি দশম ও চতুর্থ ঘরের মধ্যে থাকে তখন জন্মতালিকায় ঘাতক কালসর্প দোষ দেখা দেবে। জাতক তার জীবনের সবটা সুখ সন্ধানে কাটিয়ে দেবেন কিন্তু তিনি কোন ব্যাপারে কখনও সুখী হবেন না যা কিছু আনন্দ তাঁর জীবনে আসবে ও যাবে। জাতক তার বাবার প্রস্থান সম্মুখীন হবেন। বিবাহিত জীবন অসুখী থাকবে,ব্যবসায় অপ্রীতিকর সমস্যা ও বাধা থাকবে কিন্তু সম্পদ বা অর্থের একটি ঘাটতি কখনও থাকবে না। এই অবস্থায় জাতক কাজ বা চাকরির মধ্যে প্রায় সবসময় বরখাস্ত,কর্মচ্যুত ও পদাবনতির ভয় প্রবল হয়। বন্ধুরা ঠকাবে। জাতক যদি ঘুষ বা অবৈধ কার্যকলাপে জড়িত থাকে তাহলে তাঁর জীবনে কোন কিছুর ঘাটতি থাকে না। জাতক সামাজিক এবং রাজনৈতিক খ্যাতি পায়। নিজেকে রক্ষা করতে নিম্নলিখিত প্রতিকারগুলি সম্পাদন করুন:
