
JADI_SUGGESTION_REPORT=દરેક વ્યક્તિ ખુશ જીવન ઈચ્છે છે. તે માટે અમે ઘણી બધી પ્રવૃતિઓ અને સખત મેહનત કરીને સમૃદ્ધ પરિણામો મેળવીએ છે. અમે જ્યોતિષીઓ ની સલાહ લઈએ છે, રત્નો પહેરીએ છે, અને ઘણા બીજા ઉપાયો કરીએ છે. આ બધા નો કુદરતી ઉપાય ઝાડ ના મૂળ માં છે. અમે તમને તમારા જન્માક્ષર ના વિશ્લેષણ દ્વારા અને ગ્રહો ની રૂપરેખા નો ઉપયોગ કરીને કયો મૂળ કે પછી ઝાડ નો મૂળ તમારા માટે યોગ્ય રહેશે તેની માહિતી આપીશું.
JADI_AND_ITS_IMPORTANCE=આપણા દૈનિક જીવન માં છોડ એક મહત્વ ની ભૂમિકા ભજવે છે. પૃથ્વી ગ્રહ પર જીવન બનવાનો આ એક સ્ત્રોત્ર છે. ખગોળ શાસ્ત્ર ના પ્રમાણે છોડ અને ઝાડ શ્વાસ લેતી વખતે ઓક્સિજન બહાર છોડે છે અને કાર્બન ડાઇ ઓક્સાઇડ અંદર લે છે. જેમકે આપણે બધા જાણીએ છે કે આપણે ઓક્સિજન વાયુ વગર જીવી નથી શકતા. જો ત્યાં ઝાડ કે છોડ ના હોય તો આપણે શ્વાસ ના લઇ શકીએ અને માનવ જીવન નો અંત થઇ જાય. એજ પ્રમાણે વૃક્ષો અને છોડ ના મહત્વ ને આપણે ધાર્મિક તરીકે લેવું જોઈએ. ઘણી બધી સમસ્યાઓ જડીબુટ્ટી દ્વારા ઉકેલાઈ છે. તે ઔષધીય ઉપયોગ માટે પણ વપરાય છે. વૃક્ષ મૂળ તેમાં થી એક છે. <a href="http://astrology.astrosage.com/2013/11/jadi-roots-to-reach-planets-hearts.html"> વૃક્ષ મૂળ </a > આ જડીબુટ્ટીઓ નો પેટાભાગ છે. જ્યોતિષ વિદ્યા માં વૃક્ષ મૂળ નો પોતાનું મહત્વ છે. જો તમારા જન્માક્ષર માં ગ્રહો ની દશા ખરાબ હોય તો તમે એનો ઉપયોગ ઉપાય તરીકે કરી શકો છો. દરેક ગ્રહ ને સૂચવવા માટે અલગ અલગ પ્રકાર ના વૃક્ષ મૂળ હોય છે. જેમ કે આપણે જાણીયે છે કે જ્યોતિષ માં કુલ ૭ ગ્રહો અને અને ૨ ગાંઠો રાહુ અને કેતુ છે. દરેક ની પાસે વિશિષ્ટ વૃક્ષ મૂળ છે પર્યાવરણ ની શક્તિ ને સંતુલિત કરવા માટે. સારું રહશે કે પહેલા તમે તમારા જન્માક્ષર નો વિશ્લેષણ કર્યા પછી એના અનુસાર વૃક્ષ મૂળ ધારણ કરો. વૃક્ષ મૂળ ને રત્ન નો શ્રેષ્ઠ વિકલ્પ માનવા માં આવે છે. જો આને એક જ્યોતિષ ની સલાહ અનુસાર મહત્વપૂર્ણ ક્રિયાઓ કર્યા પછી ધારણ કરવામાં આવે તો તેના પરિણામો વધારે સારા મળે છે.  આ રત્ન કરતા વધારે સરસ કામ કરે છે. રત્ન ઘણા મોંઘા હોય છે અને દરેક વ્યક્તિ ની પહોંચ માં નથી હોતું. તે સ્થિતિ માં ઈચ્છીત પરિણામ પ્રાપ્ત કરવા માટે અને કોઈપણ ગ્રહ ની અસર નબળી કરવા માટે વૃક્ષ મૂળ શ્રેષ્ઠ વિકલ્પ છે. તમે એને સરળતા થી સસ્તી કિંમત માં શોધી શકો છો.
RECOMMENDATIONS=તમારા માટે જરૂરી છે કે તમે એક યોગ્ય વૃક્ષ મૂળ પહેરો. પર્યાવરણ માં ઘણા બધા મૂળ જોવા મળે છે. તમારે શોધવું પડશે કે કયો તમને યોગ્ય રહેશે. તે ફક્ત તમારા જન્માક્ષર માં તમારા ગ્રહો ની દશા ઉપર નિર્ભર કરે છે. <a href="https://www.astrosage.com/freekphorary/instantchart.asp?charttype=kp"> જન્માક્ષર </a>. વૃક્ષ મૂળ માટે તમે કોઈપણ જ્યોતિષ ની સલાહ લઇ શકો છો. મૂળ ને પહેરવાથી કે સ્થાપિત કરવા થી તમારા નબળા વિસ્તારો માં સુધારો થશે. તમારા જન્મજાત ચાર્ટ માં તમારા ગ્રહો ની દિશા પ્રમાણે અમે અલગ અલગ પ્રકાર ના વૃક્ષ મૂળ નો ઉલ્લેખ કર્યો છે.
IMPORTANCE_OF_NATURAL_JADI=હાલ ના દિવસો માં કુદરતી જડી કે મૂળ બજાર માં ભાગ્યે જ જોવા મળે છે. સામાન્ય રીતે વૃક્ષ મૂળ ને કૃતિમ વિધિ દ્વારા બનાવી ને વિશ્વ માં વિતરિત કરવા માં આવે છે. કુદરતી મૂળ એ વૃક્ષ નો મૂળ હોય છે, એટલે એ મર્યાદિત સંખ્યા માં મળે છે. ઉપરાંત, હવામાન જેવી અણધારી વસ્તુઓ ની આમાં મહત્વપૂર્ણ ભૂમિકા હોય છે જેના લીધે ઉત્પાદન બાધિત થાય છે. કૃતિમ રીતે બનાવેલા વૃક્ષ મૂળ વાસ્તવિક વૃક્ષ મૂળ ની સરખામણી માં એક જેવા લાગે છે, પરંતુ જ્યોતિષ વિદ્યા માટે એ કોઈ કામ ના નથી હોતા. આ મુશ્કેલી ને હલ કરવા માટે અમે લાયા છે તમારા માટે ૧૦૦% કુદરતી વૃક્ષ મૂળ. આને ધારણ કાર્ય પછી તમે તમારા અપેક્ષિત જ્યોતિષીય લાભ મેળવી શકશો. આ વૃક્ષ મૂળો પ્રયોગશાળા માં સખત નિગરાની માં ચકાસેલા છે અને સંપૂર્ણતઃ વાસ્તવિક છે.

TREE_ROOT_OF_BEL=આ સૂર્ય ને ચિન્હિત કરે છે, એક શાહી ગ્રહ. જ્યોતિષ વિદ્યા માં સૂર્ય એક ગરમ ગ્રહ છે જે અધિકારીક સ્થિતિ માં નેતા અને સરકાર નું પ્રતિનિધિત્વ કરે છે. જો સૂર્ય ખરાબ તરીકે તમારા જન્માક્ષર માં મૂકેલું હોય, તો તમે આને ધારણ કરી શકો છો. ગ્રહ <a href="http://www.astrosage.com/planet/sun/"> સૂર્ય </a> ની જે ઉર્જા છે તે ચટપટી અને મસાલેદાર ઔષધિઓ દ્વારા વધારી શકાય છે. આને ધારણ કરીને ગ્રહ ની ખરાબ આડઅસરો ને દૂર કરી શકાય છે. જો તમે પ્રતિષ્ઠા, સ્થિતિ અને સામાજિક સ્થિતિ માટે સંઘર્ષ કરી રહ્યા છો, તો આ તમને તમારા જીવન માં ઉંચે જવા માટે સકારાત્મક ઉર્જા પ્રદાન કરી શકે છે.
TREE_ROOT_OF_KHIRNI=વૈદિક જ્યોતિષ વિદ્યા માં આ મૂળ ચંદ્ર ગ્રહ ને સૂચવે છે. બધા ગ્રહો ની વચ્ચે આનો ઘણો મહત્વ માનવા માં આવે છે. જેમકે કહેવાયું છે, " કે જો તમારું મગજ ખુશ હોય, તો બધી વસ્તુઓ સરસ થાય છે."  એક તંદુરુસ્ત અને ખુશાલ જીવન માટે અમને બીમારીઓ અને માનસિક અસ્થિરતા થી મુક્ત થવું પડશે. ટૂંક માં આપણે કહી શકીએ કે આપણા જીવન માં તણાવમુક્ત થયા પછીજ મોટી સફળતા પ્રાપ્ત કરી શકીએ છે. જો તમે આ મૂળ ધારણ કરશો તો તમે માનસિક તણાવ, ઉદાસીનતા અને ચિંતા થી મુક્ત થશો. આખિરકાર તમે સુખી જીવન તરફ અગ્રસર થશો.
TREE_ROOT_OF_ANANTMOOL	= વૈદિક જ્યોતિષ વિદ્યા માં આ મૂળ મંગલ ગ્રહ ને સૂચવે છે. આ ગ્રહ ઉર્જા, હિમ્મત, ઉત્સાહ અને નિર્ણય માટે ગણવા માં આવે છે. મંગલ ગ્રહ લશ્કર, સેનિક, પોલીસ અથવા દરેક એ વ્યક્તિ જે બંદૂક કે પછી અધિકારીક સ્થિતિ ધરાવે છે એનો પ્રતિનિધિત્વ કરે છે. મંગલ તમને શત્રુ સામે લડવાની અને પ્રતિયોગી પરીક્ષા માં સફળ થવા ની શક્તિ આપે છે. જો તમારો મંગલ તમારા જન્માક્ષર માં ખરાબ હોય તો તમે આ મૂળ ને ધારણ કરી શકો છો. આ તમારી ગુણવત્તા ને મજબૂતી આપશે. તમે કોઈપણ કાર્ય ભય વગર કરી શકશો. તમારી શક્તિ અને વિશ્વાસ વધી જશે. જો તમે કોઈ કાર્ય કરો અથવા કોઈ કાર્ય કરવાનો સાહસ કરો ત્યારેજ તમે કોઈ પરિણામ પ્રાપ્ત કરી શકશો. એના માટે જ આ તમને કોઈપણ કાર્ય કરવાની તાકાત આપે છે. આ એ લોકો માટે ખુબ આગ્રહણીય છે જે લોકો પ્રતિયોગી પરીક્ષાઓ માં સારા પરિણામ ઈચ્છે છે.
TREE_ROOT_OF_VIDHARA=આ વૃક્ષ મૂળ <a href="http://www.astrosage.com/planet/mercury/"> બુધ </a> ગ્રહ ને સૂચવે છે. બુધ જ્યોતિષ વિદ્યા નો રાજકુમાર છે. એવું માનવા માં આવે છે કે તાર્કિક કાબિલિયત બુધ ગ્રહ માં થી આવે છે. બુધ ગ્રહ સંદેશવ્યવહાર, તર્ક, તાર્કિક મન, ગણિતશાસ્ત્ર, ગણતરીઓ વગેરે નો પ્રતિનિધિત્વ કરે છે. તેથી જો તમે આ બધા વિસ્તાર સંબંધી મુશ્કેલીઓ નો સામનો કરતા હોય તો આ વૃક્ષ મૂળ ધારણ કરવું તમારા માટે ખુબ આગ્રહણીય છે. રત્નો ની જેમ આની કોઈ આડ અસરો નથી. જો તમે આને ધારણ કરશો તો આ તમારી સંચાર ક્ષમતા, ભાષા અને તર્ક શક્તિ ને સુધારી શકે છે. જો તમારા જન્માક્ષર માં બુધ ગ્રહ ખરાબ હોય તો તમારે સૌપ્રથમ જ્યોતિષ દ્વારા તમારા જન્મ ચાર્ટ નો વિશ્લેષણ કરાયા પછી આ મૂળ ને ધારણ કરી શકો છો.
TREE_ROOT_OF_BANANA=આ વૃક્ષ મૂળ ગુરુ ગ્રહ ને સૂચવે છે. ગુરુ આખી જ્યોતિષ વિદ્યા નો ગુરુ છે અને ઘણો લાભદાયી ગ્રહ છે. તે અમારી સમજદારી, પરિવાર અને બાળકો નો પ્રતિનિધિત્વ કરે છે.  જો તમારા જન્માક્ષર માં ગુરુ ગ્રહ ખરાબ હોય તો તમને એની ખરાબ અસરો દૂર કરવા માટે આ વૃક્ષ મૂળ લેવો જોઈએ. માત્ર ગુરુ એવો ગ્રહ છે જે ક્યારેક પણ વ્યક્તિ જોડે ખરાબ નથી કરતો અગર તે ખરાબ તરીકે મુકેલો હોય તો પણ. જો તે તે પીડિત હશે તો તે ખરાબ પણ નહિ કરે અને સારું પણ નહિ કરે. જો તમે શાદી, બાળકો કે પછી જ્ઞાન માટે મુશ્કેલી અનુભવતા હો તો આ તમારા માટેજ છે. બ્રિહસ્પતિ ના અશુભ કે ખરાબ પરિણામો થી બચવા માટે આ વૃક્ષ મૂળ નો ઉપયોગ કરવો જોઈએ. ગુરુ માટે તમે ભારંગી ના મૂળ નો પણ પ્રયોગ કરી શકો છો.
TREE_ROOT_OF_SHARPUNKHA=આ મૂળ શુક્ર ગ્રહ ને સૂચવે છે. તમારા જન્માક્ષર માં શુક્ર એ ગ્રહ છે જે પ્રેમ, સુંદરતા, કલા, સંબંધો, પ્રેમિકા અને લગ્ન નો પ્રતિનિધિત્વ કરે છે. જો તમારા જન્માક્ષર માં શુક્ર ગ્રહ ખરાબ જગ્યા હોય તો આ વિસ્તારો માં તમે મુશ્કેલી આવતી હશે. તેથી તમારે આ વૃક્ષ મૂળ ધારણ કરવો જોઈએ. જો તમારા જન્માક્ષર માં શુક્ર ગ્રહ સારી જગ્યા માં હોય તો પણ તમે શુક્ર ની મજબૂતી વધારવા માટે આ વૃક્ષ મૂળ નો ઉપયોગ કરી શકો છો. તમે આને હીરા ની જગ્યા વાપરી શકો છો, હીરા ની સલાહ એ લોકો ને અપાય છે જેમના જન્માક્ષર માં શુક્ર સારી જગ્યાએ હોય છે. હીરા ધારણ કરવા ની આડ અસરો પણ હોય છે. એટલે એને ધારણ કરતા પહેલા જ્યોતિષ ના પરામર્શ ની આવશ્યકતા હોય છે. જયારે વૃક્ષ મૂળ ની કોઈપણ આડ અસર નથી હોતી. શુક્ર ગ્રહ માટે તમે અરંદ મૂળ નો ઉપયોગ પણ કરી શકો છો.
TREE_ROOT_OF_BICHUA=આ વૃક્ષ મૂળ "શનિ" ગ્રહ ને સૂચવે છે. શનિ ગ્રહ ન્યાય માટે જાણીતો છે. શનિ એક મંદ ગતિ માં ફરવા વાળો ગ્રહ છે. આ વ્યક્તિ ના પાછલા ભાગ માં પરિણામો આપે છે. આ બધી દેરી એની મંદ ગતિ ના કારણે છે. આ અવરોધો અને મર્યાદા થી સંકળાયેલો છે. વૈદિક જ્યોતિષ વિદ્યા માં આને નરક ગ્રહ ગણવા માં આવે છે. આના થી મૂળ ને જે પરિણામો મળે છે તે છે ભય, ચિંતા, ઉદાસીનતા અને બીજા નકારાત્મક પાંસાઓ જે વિકાસ, કેરીઅર અને શિક્ષા થી સંબંધિત છે. જો શનિ ખરાબ જગ્યા માં હોય તો તે મૂળ ને સંપૂર્ણ નરક પ્રકૃતિ દેખાડશે. શનિ અને તેની શૃંખલાઓ ની ખરાબ અસરો દૂર કરવા માટે વૃક્ષ મૂળ કુદરતી ઉપાય છે. જો કે શનિ અગર સકારાત્મક જગ્યા માં હોય તો તે વ્યક્તિ ને આશીર્વાદ પણ આપી શકે છે. તમે આ વૃક્ષ મૂળ નો ઉપયોગ કરી શનિ ની મજબૂતી વધારી શકો ચી વહેલા અને સારા પરિણામો માટે. શનિ ની અસરો ને સંતુલિત કરવા માટે ધતુરા ની મૂળ નો પ્રયોગ પણ કરી શકાય છે.
TREE_ROOT_OF_CHANDAN=આ વૃક્ષ મૂળ રાહુ ગ્રહ ને સૂચવે છે. રાહુ એક ગ્રહ નથી મૂળતઃ આ ચંદ્ર ની ઉત્તરી ગાંઠ છે. જોકે વૈદિક જ્યોતિષ વિદ્યા માં તેને એક ગ્રહ માનવા માં આવ્યો છે. રાહુ એ ગ્રહ છે જે સાંસારિક ઇચ્છાશક્તિ બદલ જાગૃકતા નો નિર્માણ કરે છે. આ ચતુરાઈ, માહિતી તકનીક અને રાજનીતિ ઇત્યાદિ નો પ્રતિનિધિત્વ કરે છે. તેને હંમેશા લોકો નું ધ્યાન જોઈએ છે. તેને બધા આરામ અને ભોગવિલાસ ની વસ્તુઓ જોઈએ છે. જો તમારા જન્માક્ષર માં આ ખરાબ જગ્યાએ હોય તો આ વૃક્ષ મૂળ દ્વારા તમે રાહુ ની નકારાત્મક અસરો ઘટાડી શકો છો. રાહુ એક નકામો ગ્રહ છે, તે ક્યારેય પણ વ્યક્તિ ને બધી વસ્તુઓ નો આશીર્વાદ નથી આપતો. તેથી એની ખરાબ અસરો ઘટાડવા માટે આ તમારા માટે આગ્રહણીય છે. જો આ સારી જગ્યા માં હોય તો તમે આ વૃક્ષ મૂળ નો પ્રયોગ કરી રાહુ ની મજબૂતી વધારી શકો છો. રાહુ ગ્રહ માટે તમે નગરમોથા ની જળ પણ વાપરી શકો છો.
TREE_ROOT_OF_ASHWAGANDHA=આ વૃક્ષ મૂળ કેતુ ગ્રહ ને સૂચવે છે. કેતુ એક ગ્રહ નથી રાહુ ની જેમ આ ચંદ્ર ની દક્ષિણી ગાંઠ છે. જોકે વૈદિક જ્યોતિષ વિદ્યા માં તેને એક ગ્રહ માનવા માં આવ્યો છે. <a href="http://www.astrosage.com/planet/ketu/"> કેતુ </a> એ ગ્રહ છે જે કોઈપણ પ્રકાર ના ભૌતિક સુખો ને પસંદ નથી કરતો. તે હંમેશા ભૌતિક સુખો જેવી વસ્તુઓ થી દૂર રહેવા માંગે છે. આ એક આધ્યાત્મિક ગ્રહ છે અને તે મોક્ષ માંગે છે. જો કે તે અશુદ્ધ ગ્રહ છે જેના કુદરતી દુષણ ના લીધે માનવ માટે સંઘર્ષ નો કારણ બને છે. જો તમારા જન્માક્ષર માં આ ખરાબ જાગ્યો હોય તો તમારે આ વૃક્ષ મૂળ નો ઉપયોગ કરવાથી કેતુ ની ખરાબ અસર ઘટાડી શકાય છે. અને જો કેતુ ગ્રહ સારી જગ્યા માં હોય તો આ વૃક્ષ મૂળ થી તેની મજબૂતી વધારી શકાય છે.
TREE_ROOT_OF_ARAND=આ મૂળ શુક્ર ગ્રહ ને સૂચવે છે. તમારા જન્માક્ષર માં શુક્ર એ ગ્રહ છે જે પ્રેમ, સુંદરતા, કલા, સંબંધો, પ્રેમિકા અને લગ્ન નો પ્રતિનિધિત્વ કરે છે. જો તમારા જન્માક્ષર માં શુક્ર ગ્રહ ખરાબ જગ્યા હોય તો આ વિસ્તારો માં તમે મુશ્કેલી આવતી હશે. તેથી તમારે આ વૃક્ષ મૂળ ધારણ કરવો જોઈએ. જો તમારા જન્માક્ષર માં શુક્ર ગ્રહ સારી જગ્યા માં હોય તો પણ તમે શુક્ર ની મજબૂતી વધારવા માટે આ વૃક્ષ મૂળ નો ઉપયોગ કરી શકો છો. તમે આને હીરા ની જગ્યા વાપરી શકો છો, હીરા ની સલાહ એ લોકો ને અપાય છે જેમના જન્માક્ષર માં શુક્ર સારી જગ્યાએ હોય છે. હીરા ધારણ કરવા ની આડ અસરો પણ હોય છે. એટલે એને ધારણ કરતા પહેલા જ્યોતિષ ના પરામર્શ ની આવશ્યકતા હોય છે. જયારે વૃક્ષ મૂળ ની કોઈપણ આડ અસર નથી હોતી. શુક્ર ગ્રહ માટે તમે શરપુંખ વૃક્ષ મૂળ નો ઉપયોગ પણ કરી શકો છો.
TREE_ROOT_OF_DHATURE=આ વૃક્ષ મૂળ "શનિ" ગ્રહ ને સૂચવે છે. શનિ ગ્રહ ન્યાય માટે જાણીતો છે. શનિ એક મંદ ગતિ માં ફરવા વાળો ગ્રહ છે. આ વ્યક્તિ ના પાછલા ભાગ માં પરિણામો આપે છે. આ બધી દેરી એની મંદ ગતિ ના કારણે છે. આ અવરોધો અને મર્યાદા થી સંકળાયેલો છે. વૈદિક જ્યોતિષ વિદ્યા માં આને નરક ગ્રહ ગણવા માં આવે છે. આના થી મૂળ ને જે પરિણામો મળે છે તે છે ભય, ચિંતા, ઉદાસીનતા અને બીજા નકારાત્મક પાંસાઓ જે વિકાસ, કેરીઅર અને શિક્ષા થી સંબંધિત છે. જો શનિ ખરાબ જગ્યા માં હોય તો તે મૂળ ને સંપૂર્ણ નરક પ્રકૃતિ દેખાડશે. શનિ અને તેની શૃંખલાઓ ની ખરાબ અસરો દૂર કરવા માટે વૃક્ષ મૂળ કુદરતી ઉપાય છે. જો કે શનિ અગર સકારાત્મક જગ્યા માં હોય તો તે વ્યક્તિ ને આશીર્વાદ પણ આપી શકે છે. તમે આ વૃક્ષ મૂળ નો ઉપયોગ કરી શનિ ની મજબૂતી વધારી શકો છો વહેલા અને સારા પરિણામો માટે. શનિ ની અસરો ને સંતુલિત કરવા માટે બિછુઆ નો પ્રયોગ પણ કરી શકાય છે.

