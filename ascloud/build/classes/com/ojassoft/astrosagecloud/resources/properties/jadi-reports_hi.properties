HOW_TO_USE_TREE_ROOT_OF_ARAND= <ul>     <li>       जड़ को गले अथवा बाजू में धारण कर सकते हैं। </li>     <li>       जड़ को धारण करने से पूर्व इसे गंगाजल अथवा कच्चे दूध से शुद्ध करें। </li>     <li>       इसके पश्चात माँ लक्ष्मी जी को सफ़ेद पुष्प, धूप-दीप, अगरबत्ती अर्पित करते हुए "ॐ द्रां द्रीं द्रौं सः शुक्राय नमः" मंत्र का 108 बार जाप करना चाहिए। </li>  </ul>   इस विधान को करने के बाद जड़ को शुक्रवार अथवा <a href="http://astrosage.com/hindi/nakshatra/bharani-nakshatra-characteristics.asp">भरणी</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-phalguni-nakshatra-characteristics.asp">पूर्वाफाल्गुनी</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-shadha-nakshatra-characteristics.asp">पूर्वाषाढ़ा नक्षत्र</a> में धारण करना चाहिए।
HOW_TO_USE_TREE_ROOT_OF_DHATURE= <ul>     <li>       जड़ को गले अथवा बाजू में धारण कर सकते हैं। </li>     <li>       जड़ को धारण करने से पूर्व इसे गंगाजल अथवा कच्चे दूध से शुद्ध करें। </li>     <li>       इसके पश्चात भैरव जी को काले तिल, धूप-दीप, अगरबत्ती अर्पित करते हुए शनि मन्त्र "ॐ प्रां प्रीं प्रौं सः शनैश्चराय नमः" का 108 बार जाप करना चाहिए। </li>  </ul>   अब शनिवार को सूर्यास्त के बाद अथवा <a href="http://astrosage.com/hindi/nakshatra/pushya-nakshatra-characteristics.asp">पुष्य</a>, <a href="http://astrosage.com/hindi/nakshatra/anuradha-nakshatra-characteristics.asp">अनुराधा</a>, <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">उत्तराभाद्रपद नक्षत्र</a> में जड़ को धारण करना शुभ होता है।


