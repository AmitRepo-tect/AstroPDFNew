
JADI_SUGGESTION_REPORT=इस दुनिया में प्रत्येक व्यक्ति हँसी-ख़ुशी जीवन व्यतीत करना चाहता है और आपकी भी यही ख़्वाहिश होगी। अपने इस सपने को पूरा करने के लिए आप न जाने क्या-क्या जतन करते हैं। इसके बावजूद भी आपकी कामना अधूरी ही रहती है। लेकिन हमारे पास आपकी इस इच्छा को पूरा करने का बड़ा ही कारगर उपाय है - जड़ी सुझाव रिपोर्ट, इस रिपोर्ट के माध्यम से हम आपको बताएंगे कि किस जड़ी से आपकी समस्या का समाधान संभव है।
JADI_AND_ITS_IMPORTANCE=हमारे जीवन में वृक्ष और पौधों की महत्वपूर्ण भूमिका होती है। क्योंकि इन्हीं पेड़-पौधों के कारण पृथ्वी पर जीवन संभव है। विज्ञान के अनुसार पेड़-पौधे ऑक्सीजन गैस का उत्सर्जन करते हैं और कार्बन डाईऑक्साइड ग्रहण करते हैं। हम जानते हैं कि ऑक्सीजन हमारे लिए प्राण वायु है, लिहाज़ा इसके बिना हमारा जीवन अंसभव है। वृक्षों के इस व्यापक महत्व को समझते हुए हिन्दू जीवन पद्धति में इन्हें धर्म से जोड़ा गया है। अतः हिन्दू धर्म में कई पेड़-पौधों को पवित्र मानकर उनकी पूजा-अर्चना की जाती है। चिकित्सा क्षेत्र में प्राचीन काल से ही पेड़-पौधों की जड़ी बूटियों को प्रयोग होता रहा है। इसलिए ज्योतिष शास्त्र में जड़ियों का बहुत महत्व है। ज्योतिष में जड़ियों का प्रयोग विभिन्न ग्रहों के उपाय के रूप में होता है। यदि आपकी <a href="http://hindi.astrosage.com/free/hindi-kundli.asp"> जन्म कुंडली </a> में किसी ग्रह की दशा अशुभ हो तो जड़ी के माध्यम से उसके नकारात्मक प्रभावों से बचा जा सकता है। वैदिक ज्योतिष में नौ ग्रहों के लिए नौ अलग-अलग पेड़-पौधों की जड़ियाँ निर्धारित हैं। ज्योतिष में मुख्य रूप से सात बड़े ग्रह हैं जबकि राहु और केतु दोनों छाया ग्रह की श्रेणी में आते हैं। जड़ियाँ वातावरण में व्याप्त ऊर्जा में संतुलन बनाने का कार्य करती हैं। इसको धारण करने से व्यक्ति को चमत्कारिक लाभ मिलते हैं। हालाँकि जड़ी को जन्म कुंडली के आधार पर ही धारण करना चाहिए।हिन्दू ज्योतिष में जड़ियों को <a href="http://horoscope.astrosage.com/hindi/ratna-jyotish/"> रत्न </a> का विकल्प माना जाता है। यदि जड़ी को ज्योतिषीय क्रिया विधि के अनुसार धारण किया जाए तो जातक को इसके अनेकों लाभ प्राप्त होते हैं। जड़ियाँ रत्न से अधिक प्रभावशाली होती हैं। जबकि रत्न अधिक क़ीमती भी होते हैं जिन्हें धारण करना सबके बस में नहीं होता है। ग्रहों के अशुभ प्रभावों को कमज़ोर करने तथा मनवांछित परिणाम पाने के लिए जड़ियों को धारण किया जा सकता है।
RECOMMENDATIONS=हमारे वातावरण में कई प्रकार की जड़ियाँ पाई जाती हैं जिनको विशेष उद्देश्य और लाभ के लिए धारण किया जाता है। इनमें से आपके लिए कौनसी जड़ी उपयुक्त होगी? इस प्रश्न का उत्तर आपकी जन्म कुंडली के अध्ययन के पश्चात ही मिल सकता है। इसके लिए आपको ज्योतिषीय परामर्श लेने की आवश्यकता होगी। जड़ी को धारण करने के पश्चात आपको उसका प्रभाव दिखने लगेगा। यहाँ हम आपको बताएंगे कि कौनसी जड़ किस ग्रह के लिए प्रयोग में लाई जाती है।
IMPORTANCE_OF_NATURAL_JADI =आजकल बाज़ार में बिरले ही प्राकृतिक जड़ियाँ मिलती हैं। क्योंकि मार्केट में नकली जड़ियों की भरमार है। ध्यान रहे, नकली जड़ी और असली जड़ी में आम इंसान के लिए इनके बीच के अंतर को पहचान पाना मुश्किल होता है और ज्योतिषीय दृष्टिकोण से नकली जड़ियों का कोई महत्व नहीं है। लेकिन हमारे पास 100 फीसदी प्राकृतिक एवं शुद्ध जड़ियाँ उपलब्ध हैं जिसे धारण कर आप इसके ज्योतिषीय लाभ प्राप्त कर सकते हैं। हमारे जड़ियों की वास्तविकता को लैब द्वारा प्रमाणित किया जाता है।


TREE_ROOT_OF_BEL= <a href="http://buy.astrosage.com/jadi-tree-roots/belmool?&language=hi"> बेल मूल </a> का संबंध <a href="http://www.astrosage.com/hindi/planet/sun/"> सूर्य </a> ग्रह से है। ज्योतिष के अनुसार सभी ग्रहों में सूर्य का प्रमुख स्थान होता है। इसे आत्मा, लीडर, सरकारी एवं निजी क्षेत्र में उच्च पद की प्राप्ति का कारक माना जाता है। यदि आपकी कुंडली में सूर्य अशुभ स्थान पर बैठा हो तो इसके नकारात्मक प्रभाव से बचने के लिए बेल मूल को धारण करना चाहिए। इसके प्रभाव सूर्य की स्थिति मजबूत होती है और जातक को इसके शुभ परिणाम प्राप्त होते हैं। यदि आप समाज में मान, सम्मान, पद-प्रतिष्ठा पाना चाहते हैं तो इस जड़ के माध्यम से आपको मनवांछित परिणाम प्राप्त होंगे।
TREE_ROOT_OF_KHIRNI=वैदिक ज्योतिष के अनुसार खिरनी की जड़ <a href="http://www.astrosage.com/hindi/planet/moon/"> चंद्र ग्रह </a> की शांति के लिए धारण की जाती है। ज्योतिष में चंद्रमा हमारे मन का कारक होता है। इसलिए यह ग्रह हमारे लिए बहुत अधिक महत्वपूर्ण ग्रह है। कहते हैं यदि जिस व्यक्ति का मन ख़ुश होता है तो वह दुनिया की प्रत्येक वस्तु में ख़ुशी ढूँढ़ लेता है। अतः ख़ुशहाल जीवन को व्यतीत करने के लिए हमें मानसिक रूप से स्वस्थ होने की आवश्यकता होती है। यदि आप इस जड़ को धारण करेंगे तो आप मानसिक रूप से स्वस्थ्य रहेंगे और आपके मन में किसी तरह का भटकाव नहीं होगा। मन की स्थिरता कायम रखने के लिए खिरनी की जड़ बहुत ही लाभकारी होती है। इसके प्रभाव से आपको मानसिक तनाव, डिप्रेशन आदि से छुटकारा मिलेगा। 
TREE_ROOT_OF_ANANTMOOL=वैदिक ज्योतिष के अनुसार <a href="http://buy.astrosage.com/jadi-tree-roots/anantmool?&language=hi"> अनंत मूल </a> का संबंध <a href="http://www.astrosage.com/hindi/planet/mars/"> मंगल ग्रह </a> से है। मंगल ग्रह को ऊर्जा, साहस, जोश और दृढ़शक्ति का कारक माना जाता है। मंगल ग्रह सेना, पुलिस तथा अाधिकारिक पद को दर्शाता है। मंगल ग्रह आपको शत्रुओं से लड़ने की ताक़त प्रदान करता है तथा प्रतियोगिता में सफलता दिलाता है। यदि आपकी जन्म कुंडली में मंगल अशुभ स्थान पर बैठा हो तो उसके नकारात्क प्रभाव से बचने के लिए अनंतमूल की जड़ को धारण किया जाता है। यह जड़ी मंगल के शुभ प्रभावों में वृद्धि करती है। जड़ी को धारण करने के बाद व्यक्ति का साहस बढ़ता है और वह निडर होकर कार्य करता है। यदि आप किसी प्रतियोगी परीक्षा की तैयारी कर रहे हैं तो यह जड़ी आपके लिए बहुत मददगार साबित होगी।
TREE_ROOT_OF_VIDHARA=<a href="http://buy.astrosage.com/jadi-tree-roots/vidhara-mool?&amp;language=hi">विधारा मूल</a> का संबंध <a href="http://www.astrosage.com/hindi/planet/mercury/">बुध</a> ग्रह से है। ज्योतिष शास्त्र के अनुसार बुध ग्रह संचार, तर्क, बुद्धि, गणना, गणित आदि का कारक होता है। इसलिए यदि आप उपरोक्त क्षेत्र में किसी प्रकार की दिक्कत का सामना कर रहे हैं तो आपको विधारा मूल को धारण करना चाहिए। रत्न की तरह जड़ियों के साइड इफेक्ट्स नहीं होते हैं। इस जड़ी के प्रभाव से आपकी संवाद शैली में ज़बरदस्त सुधार होगा और आपकी तार्किक शक्ति में वृद्धि होगी। यदि आपकी जन्म कुण्डली में बुध कमज़ोर अवस्था में हो तो उसके नकारात्मक प्रभावों से बचने के लिए विधारा की जड़ बहुत कारगर है। 
TREE_ROOT_OF_BANANA=वैदिक ज्योतिष के अनुसार केले का वृक्ष <a href="http://www.astrosage.com/hindi/planet/jupiter/">बृहस्पति</a> ग्रह का प्रतीक होता है। बृहस्पति ग्रह बुद्धि, परिवार एवं संतान का कारक होता है। यदि आपकी जन्म कुंडली में गुरु की स्थिति कमज़ोर हो तो केले की जड़ आपको उसके बुरे प्रभाव से बचाएगी। हालाँकि केवल बृहस्पति ही एक ऐसा ग्रह है जिसके कमज़ोर होने पर व्यक्ति के ऊपर इसके नकारात्मक प्रभाव नहीं पड़ते हैं। यदि आप विवाह, संतान और ज्ञान आदि से संबंधित समस्या का सामना करना कर रहे हैं तो आप केले की जड़ को धारण कर सकते हैं। 
TREE_ROOT_OF_SHARPUNKHA=शरपुंखा की जड़ का संबंध <a href="http://www.astrosage.com/hindi/planet/venus/"> शुक्र </a> ग्रह से है। वैदिक ज्योतिष के अनुसार शुक्र ग्रह प्रेम, रोमांस, सुंदरता, कला, रिलेशनशिप का कारक होता है। यदि आपकी जन्मपत्री में शुक्र की स्थिति नीच हो तो आपको उपरोक्त क्षेत्र में समस्याओं का सामना करना पड़ेगा। ऐसे में शरपुंखा की जड़ आपको शुक्र के बुरे प्रभावों से सुरक्षित रखेगी और यदि जन्म पत्रिका में सूर्य की स्थिति मजबूत होती है तो यह जड़ उसके शुभ परिणामों में वृद्धि करेगी। हालाँकि जड़ी को धारण करने से पूर्व किसी अच्छे ज्योतिषीय से परामर्श अवश्य लें।
TREE_ROOT_OF_BICHUA=ज्योतिष शास्त्र के अनुसार बिछुआ और धतूरे की जड़ का संबंध  <a href="http://www.astrosage.com/hindi/planet/saturn/"> शनि </a> ग्रह से है। शनि अपने न्याय और धीमी चाल के लिए जाना जाता है। इसलिए जातकों को इसके परिणाम देर से प्राप्त होते हैं। ज्योतिष में इसे क्रूर ग्रह की संज्ञा दी गई है। शनि के नकारात्मक प्रभावों से व्यक्ति को करियर और शिक्षा में हानि का सामना करना पड़ता है। इसके अलावा व्यक्ति को किसी प्रकार का भय सताता है। मानसिक रूप से भी उसे कष्टों का सामना करना पड़ता है। यदि आपकी कुंडली में शनि अशुभ स्थान पर बैठा हो तो आपको उसके नकारात्मक परिणाम मिलेंगे। ऐसे यह बिछुआ की जड़ या फिर धतूरे की जड़ को धारण कर उसके बुरे प्रभावों से बच सकते हैं। जड़ी के प्रभाव से आपको शनि देव का आशीर्वाद प्राप्त होगा तथा आपको इसके शुभ परिणाम प्राप्त होंगे।
TREE_ROOT_OF_CHANDAN=चंदन और नागरमोथा की जड़ का संबंध <a href="http://www.astrosage.com/hindi/planet/rahu/"> राहु </a> ग्रह से होता है। ये जड़ियाँ राहु ग्रह की शांति के लिए धारण की जाती हैं। ज्योतिष शास्त्र के अनुसार राहु सांसारिक इच्छा के प्रति व्यक्ति के मन गंभीरता पैदा करता है। यह जीवन में चतुरता, सूचना, तकनीकी और राजनीति आदि को प्रदर्शित करता है। यह हमेशा लोगों का ध्यान अपनी ओर चाहता है और सभी प्रकार की भौतिक सुख-सुविधाओं को भोगने की ओर लालायित करता है। यदि कुंडली में राहु की स्थिति ख़राब हो तो व्यक्ति को इसके नकारात्मक प्रभाव से बचने के लिए नागरमोथा या चंदन की जड़ को धारण करना चाहिए। ज्योतिष विज्ञान में राहु को क्रूर ग्रह माना गया है। इसलिए इसके बुरे प्रभावों से बचने के लिए ये जड़ें बहुत ही कारगर हैं।
