	 OPPRESSOR_DEBTS_TRUE			= आपकी कुण्डली जालिमाना ऋण से पीडित हो सकती है। अगर उपर दिए हुए संकेत आप पर लागू हो रहे हों और आपके अन्‍य खून के रिश्‍तेदारों की कुण्‍डली में भी यह ऋण हो तो दिए गए उपाय करें।
	 LK_UNBORN_DEBTS_SYMPTOM		= लाल किताब के अनुसार जब किसी कुण्डली में सूर्य, शुक्र, मंगल बारहवें भाव में हो, तो जातक इस अजात-ऋण का भागी कहलाता है।
