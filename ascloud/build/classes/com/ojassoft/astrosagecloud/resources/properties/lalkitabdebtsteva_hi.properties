	 LK_RELATIVES_DEBTS_REMEDY		= 1. अपने सभी रक्त (सगे) संबंधियों से बराबर-बराबर मात्रा में पैसे लेकर उसे दूसरों की मदद के लिए किसी चिकित्सक को दें। 2. अपने सभी रक्त (सगे) संबंधियों से बराबर-बराबर मात्रा में पैसे लेकर उससे दवाएं खरीद कर धर्मार्थ संस्थाओं को दें।
