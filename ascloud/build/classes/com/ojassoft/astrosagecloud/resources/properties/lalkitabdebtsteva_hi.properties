	 LK_NATURE_DEBTS_REMEDY			= 1. एक दिन में सभी परिजनों के सहयोग से सौ कुत्तों को मीठा दूध या खीर खिलानी चाहिए।<br/>2. अपने पास में रहने वाली उस विधवा स्त्री की सेवा करके उससे आशीर्वाद प्राप्त करना करें जो कम उम्र में ही विधवा हुई हो।
	 NATURE_DEBTS_FALSE				= आपकी कुण्डली कुदरती ऋण से मुक्त है।
	 NATURE_DEBTS_TRUE				= आपकी कुण्डली कुदरती ऋण से पीडित हो सकती है। अगर उपर दिए हुए संकेत आप पर लागू हो रहे हों और आपके अन्‍य खून के रिश्‍तेदारों की कुण्‍डली में भी यह ऋण हो तो दिए गए उपाय करें।
	 ANCESTRAL_DEBTS                = पूर्वजों के ऋण
	 RinIntroduction                = लाल किताब के अनुसार ऋण कुण्डली की बहुत बडी कमजोरी माने जाते हैं। पूर्वजों का ऋण मतलब अपने पूर्वजों और पितरों के द्वारा किए गए पापों से प्रभावी होगा। दूसरे शब्दों में किसी और के द्वारा की गई गलतियों की सजा रिश्तेदारों को भुगतनी या वहन करनी पडती। यदि किसी की कुण्डली में वास्तव में ऋण होते हैं तो जैसे किसी एक की कुण्डली में दिखता है वैसे ही अन्य रिश्तेदारों की कुण्डली में भी पाया जाता है।<br/> सामान्यत: पूरा परिवार ही ऋण से प्रभावित होता है। इसलिए इनके उपाय पूरे परिवार के सहयोग से करेने पडते हैं। यदि किसी की कुण्डली में ग्रह राजयोग का निर्माण कर रहे हों और वही ग्रह ऋण संबंधी योग का गठन भी कर रहे हों तो केवल बुरे फल ही मिलते हैं।
