	 UNBORN_DEBTS_TRUE				= आपकी कुण्डली अजन्मा ऋण से पीडित हो सकती है। अगर उपर दिए हुए संकेत आप पर लागू हो रहे हों और आपके अन्‍य खून के रिश्‍तेदारों की कुण्‍डली में भी यह ऋण हो तो दिए गए उपाय करें।
	 LK_NATURE_DEBTS_SYMPTOM		= लाल किताब के अनुसार जब चन्द्रमा, मंगल कुण्डली के छठे भाव में स्थित हों, तो जातक इस कुदरती ऋण से ग्रसित माना जाता है।
