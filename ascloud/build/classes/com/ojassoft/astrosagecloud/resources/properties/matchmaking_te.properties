	MATCH_WITH_PUBLIC_CHART							= పబ్లిక్ ఛార్ట్ తో జతపరచండి
	ENTER_GIRLS_DETAILS								= ఆడపిల్ల వివరాలు ఎంటర్ చేయండి
	ENTER_BOYS_DETAILS									= మగపిల్లవాని వివరాలు ఎంటర్ చేయంది
	ENTER_GIRLS_CHART_NAME								= ఆడపిల్ల ఛార్ట్ పేరు ఎంటర్ చేయండి
	ENTER_BOYS_CHART_NAME								=  మగపిల్లవాని ఛార్ట్ పేరు ఎంటర్ చేయండి

