	YOU_ARE_NOT_LOGIN_OR_YOUR_SESSION_HAS_BEEN_EXPIRED = మీరు లాగిన్ కాలేదు లేదా మీ సెషన్ గడువు తీరిపోయింది.
	PLS_ENTER_CHART_NAME								= దయచేసి ఛార్ట్ పేరు ఎంటర్ చేయండి.
	CHART_NAME_DOES_NOT_EXIST							= ఛార్ట్ పేరు అమలులో లేదు.
	DO_NOT_FIND_CHART_NAME								= ఛార్ట్ పేరు దొరకలేదు.
	SOME_ERR_OCCRR_IN_PROCESSING_YOUR_QRY_PLS_AGAIN	= మీ సమస్య ప్రాసెస్ చేయడంలో తప్పిదం జరిగింది. దయచేసి తిరిగి ప్రయత్నించండి.
	SESSION_TIME_OUT_MSG								= మీ సెషన్ గడువు తీరిపోయింది. దయచేసి తిరిగి లాగిన్ అవండి.
	CLICK_RADIO_MATCH_DETAILS = మీరు మీ జాతకాన్ని ఎవరితో అయితే జతపరచాలనుకుంటున్నారో వారి ముందు రేడియో మీటను క్లిక్ చేయండి.<br/><br/>
	MATCH_HOROSCOPE_SHARED_CHART = మీరు ఇక్కడ పంచుకోబడిన (బహిరంగ) ఛార్ట్ తో ఒక జాతకం జతపరచవచ్చు. క్రింది టెక్స్ట్ బాక్సులో మీ భాగస్వామి ఛార్ట్ పేరు ఎంటర్ చేయండి. ఈ అంశాన్ని ఉపయోగించడానికి మీ భాగస్వామి ఛార్ట్ బహిరంగంగా ఉండాలని దయచేసి గమనించండి.<br /><br />ఉదాహరణకు, మీరు మగపిల్లవాడయితే మరియు మీ కుండలిని కత్రినాకైఫ్ యొక్క షేర్ చేయబడిన ఛార్టుతో జతపరచాలనుకుంటే, ఇలా ఎంటర్ చేయాలి <b>కత్రినా</b> క్రింద.<br /><br /> 
	
