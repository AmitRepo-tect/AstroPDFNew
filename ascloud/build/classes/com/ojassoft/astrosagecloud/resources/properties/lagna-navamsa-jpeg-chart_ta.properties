
SAVE_CHART_AS_IMAGE_FILE_JPEG = ஜாதக வரைபடத்தை இமேஜ் ஃபைல் (ஜேபெக்)-ஆக சேமிக்கவும்
PRINT_EMBED_OR_SHARE_CHART_ON_FACEBOOK_TWITTER = அச்சடிக்க (அ) எம்பெட் செய்ய (அ ) ஃபேஸ்புக் மற்றும் ட்வீடர்-இல்  ஜாதக வரைபடத்தை பகிர்ந்துகொள்ள”
SAVE_CHART_INTRO_PARA = சில நேரங்களில் நமக்கு ஆன்லைன் பகிர்வு அல்லது அச்சிடுதலுக்காக ஜாதக வரைபடம் தேவைப்படும். இந்த பக்கத்தில் உள்ள பயன்பாட்டு முறை அதற்கு பயன்படுகிறது. கீழே ஜாதக வரைபடங்களில் வலதுபுற கிளிக் செய்து ''படமாக சேமிக்க'' அல்லது ''படத்தை அப்படியே''  என்பதை தேர்வு செய்து ஜாதகவரைபடத்தை ஒரு கோப்பாக  உங்கள் கணினியில் சேமிக்கவும். அது இணையத்தில் மிகவும் பிரபலமான பட வடிவங்களில் ஒன்றான JPEG வடிவில் கோப்பை சேமிக்கும். இவ்வாறு ஜாதகவரைபடங்களை ஃபேஸ்புக் மற்றும் ட்விட்டர் போன்ற சமூக வலைப்பின்னல் தளங்களில் பகிர்ந்து கொள்ள முடியும்  அல்லது உங்கள் இணையத்தளம் அல்லது வலைப்பதிவில் வெளியிட முடியும்.  
