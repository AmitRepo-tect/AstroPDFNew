 YANTRA_TEXT6 = ಶುಕ್ರವು ನೀವು ಜನಿಸಿದ ರೂಟ್ ನಂಬರ್ 6 ರ ಅಧಿಪತಿ. ಆದ್ದರಿಂದ,  ಭರನಿ, ಪುರ್ವ ಫಲ್ಗುನಿ, ಮತ್ತು ಪುರ್ವ ಆಷಾಢ ಇವುಗಳು, ಭಗವಂತನನ್ನು ಸಮಾಧಾನಗೊಳಿಸುವ ಮತ್ತು ಅನುಕೂಲಕರ ಫಲಿತಾಂಶಗಳನ್ನು ಪಡೆಯುವ ಸಲುವಾಗಿ ನೀವು ಶುಕ್ರನ ಹೊರಾ ಮತ್ತು ನಕ್ಷತ್ರಗಳ ಕೆಳಗೆ ಶುಕ್ರವಾರ ಶುಕ್ರ ಯಂತ್ರವನ್ನು ಸಾಗಿಸಲು ಪ್ರಾರಂಭಿಸಬೇಕು. 
 YANTRA_TEXT7 = ಕೇತು ರೂಟ್ ನಂಬರ್ 7 ರ ಅಡಿಯಲ್ಲಿ ಹುಟ್ಟಿದ ಸ್ಥಳೀಯರ ಒಡೆಯ. ಆದ್ದರಿಂದ, ದೈವಿಕ ಅನುಗ್ರಹದಿಂದ ಮತ್ತು ಲಾರ್ಡ್ನಿಂದ ಅನುಕೂಲಕರವಾದ ಫಲಿತಾಂಶಗಳನ್ನು ಪಡೆಯುವುದಕ್ಕಾಗಿ, ನೀವು ಕೇತು ನಕ್ಷತ್ರಗಳಾದ ಅಶ್ವಿನಿ, ಮಾಘ ಮತ್ತು ಮೂಲ್ ಅಡಿಯಲ್ಲಿ ಮಂಗಳವಾರ ಕೇತು ಯಂತ್ರವನ್ನು ಸಾಗಿಸಬೇಕು.
 YANTRA_TEXT8 = ನಿಮ್ಮ ರೂಟ್ ನಂಬರ್ 8 ರಂತೆ, ಶನಿಯು ನಿಮ್ಮ ದೇವ ಗ್ರಹ. ಪವಿತ್ರ ಆಶೀರ್ವಾದ ಮತ್ತು ದೇವರಿಂದ  ಅನುಕೂಲಕರ ಫಲಿತಾಂಶಗಳನ್ನು ಪಡೆಯಲು, ಶನಿಯ ಹೊರಾ ಮತ್ತು ನಕ್ಷತ್ರಗಳಲ್ಲಿ (ಪುಷ್ಯ, ಅನುರಾಧ, ಉತ್ತರ ಭಾದ್ರಪದ), ನೀವು ಶನಿ ಯಂತ್ರವನ್ನು ನಿಮ್ಮೊಂದಿಗೆ ಸಾಗಿಸಬೇಕಾಗುತ್ತದೆ.
 YANTRA_TEXT9 = ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆ ಸಮಗ್ರ 9 ಆಗಿದೆ, ಇದರ ಅರ್ಥ ನಿಮ್ಮ ದೇವ ಗ್ರಹವು ಮಂಗಳ . ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆ ಸಮಗ್ರ 9 ಆಗಿದೆ, ಇದರ ಅರ್ಥ ನಿಮ್ಮ ದೇವ ಗ್ರಹವು ಮಂಗಳ . ಇಲ್ಲಿ ನಕ್ಷತ್ರಗಳು, ಮೃಗಿಶಿರಾ, ಚಿತ್ರಾ, ಮತ್ತು ಧನಿತಾ. ಅನುಕೂಲಕರವಾದ ಫಲಿತಾಂಶಗಳ ಸಾಧನೆ ಮತ್ತು ದೈವಿಕ ಆಶೀರ್ವಾದಕ್ಕಾಗಿ , ಮಂಗಳದ ನಕ್ಷತ್ರಗಳಲ್ಲಿ ಮಂಗಳದ ಯಂತ್ರ ನೀವು ಸಾಗಿಸಬೇಕಾಗಿದೆ,
 MASTER_NUMBER_TEXT = ಸಂಖ್ಯಾಶಾಸ್ತ್ರದ ವಿಜ್ಞಾನದ ಪ್ರಕಾರ, ತಮ್ಮೊಳಗೆ ವಿಶೇಷ ಶಕ್ತಿ ಹೊಂದಿರುವ ಎರಡು ರೀತಿಯ ಸಂಖ್ಯೆಗಳು ಮಾತ್ರ ಇವೆ. ಅವುಗಳನ್ನು ಮಾಸ್ಟರ್ ಸಂಖ್ಯೆಗಳು ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ, ಮತ್ತು 11 ಮತ್ತು 22 ಇವೆ. ಅಂತಹ ಜನರಿಗೆ ಅವುಗಳಲ್ಲಿ ಅಚ್ಚರಿಯ ಶಕ್ತಿ ಮತ್ತು ಸಾಮರ್ಥ್ಯವಿದೆ.
 MASTER_NUMBER_TEXT11 = ನಿಮ್ಮ ಮಾಸ್ಟರ್ ಸಂಖ್ಯೆ 11, ಅದರ ಕಾರಣದಿಂದಾಗಿ, ನಿಮ್ಮ ಅಂತರ್ಬೋಧೆಯ ಸಾಮರ್ಥ್ಯಗಳು ದಿಗ್ಭ್ರಮೆಯುಂಟುಮಾಡುತ್ತದೆ. ಕೇವಲ ನೀವು ಕಾಲ್ಪನಿಕ ಮತ್ತು ಸೃಜನಾತ್ಮಕ,  ಆದರೆ ನೀವು ದೊಡ್ಡ ಚಿತ್ರವನ್ನು ನೋಡಬಹುದಾಗಿದೆ. ಇದರ ಜೊತೆಗೆ, ನೀವು ಒಂದು ನಿರ್ದಿಷ್ಟ ಮಟ್ಟಕ್ಕೆ ಅಪ್ರಾಯೋಗಿಕವಾದುದು. ನೀವು ಉತ್ತಮ ನಾಯಕತ್ವ ಕೌಶಲಗಳನ್ನು ಹೊಂದಿದ್ದೀರಿ ಮತ್ತು ಇತರರನ್ನು ಪ್ರೋತ್ಸಾಹಿಸುವ ಮೂಲಕ ಉತ್ತಮವಾಗಿರುತ್ತೀರಿ. ಆದರೆ, ನಿಮ್ಮ ಗುರಿಗಳ ಕಡೆಗೆ ನೀವು ಗಮನ ಕೊಡದಿದ್ದರೆ, ನಂತರ ಭಯದ ವಾತಾವರಣವು ನಿಮ್ಮ ಜೀವನವನ್ನು ಸುತ್ತುವರೆದಿರುತ್ತದೆ. ನಿಮ್ಮ ಸಾಮರ್ಥ್ಯಗಳಲ್ಲಿ ನಂಬಿಕೆ ಮತ್ತು ಸಾಮಾಜಿಕ ಕಲ್ಯಾಣಕ್ಕಾಗಿ ಕೆಲಸ ಮಾಡಿ , ಮತ್ತು ನೀವು ಹೆಚ್ಚು ಪಾತ್ರವನ್ನು ಉತ್ತಮವಾಗಿ ಹೊಂದಿಲ್ಲವೆಂದು ನೀವು ತಿಳಿದುಕೊಳ್ಳುತ್ತೀರಿ. ಈ ಸಂಖ್ಯೆ ಮಾನಸಿಕ ಸಂಖ್ಯೆ. 
 MASTER_NUMBER_TEXT22 = ನಿಮ್ಮ ಮಾಸ್ಟರ್ ಸಂಖ್ಯೆ 22, ಇದು ಸಂಖ್ಯಾಶಾಸ್ತ್ರದ ವಿಜ್ಞಾನದಲ್ಲಿ ಅತ್ಯಂತ ಶಕ್ತಿಶಾಲಿ ಸಂಖ್ಯೆಯೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ನಿಮ್ಮ ಕನಸುಗಳು ಮತ್ತು ಬಯಕೆಗಳನ್ನು ನಿಜವಾಗಿ ಪರಿವರ್ತಿಸುವ ಸಾಮರ್ಥ್ಯವಿದೆ. ದೊಡ್ಡ ಆಲೋಚನೆಗಳು, ಉನ್ನತ ಆಲೋಚನೆಗಳು, ಉತ್ತಮ ನಿರ್ಧಾರ ಮಾಡುವ ಸಾಮರ್ಥ್ಯಗಳು ಮತ್ತು ನಾಯಕತ್ವ ಗುಣಗಳ ಜೊತೆಗೆ, ನಿಮ್ಮ ಒಳಗಿನ ಒಳನೋಟ ಮತ್ತು ಪ್ರಾಯೋಗಿಕತೆಯನ್ನು ಸಹ ನೀವು ಹೊಂದಿದ್ದೀರಿ. ನೀವು ಹೆಚ್ಚಾಗಿ ನಿಮ್ಮ ಬಗ್ಗೆ ಹೆಚ್ಚು ಗಮನ ಕೊಡಬೇಕಾದರೆ, ನೀವು ದೊಡ್ಡ ಉದ್ದೇಶಕ್ಕಾಗಿ ಹುಟ್ಟಿರುವಿರಿ ಮತ್ತು ಸಮಾಜಕ್ಕಾಗಿ ಮಾಡಲು ಸಾಕಷ್ಟು ಹೊಂದಿದ್ದೀರಿ ಎಂಬುದನ್ನು ನೀವು ನೆನಪಿಸಿಕೊಳ್ಳಬೇಕು. ನಿಮ್ಮ ಜೀವನದ ಆರಂಭದ ಹಂತಗಳಲ್ಲಿ ನೀವು ಹಲವು ಅಡೆತಡೆಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗಿತ್ತು, ಆದರೆ ಅವರು ನಿಮ್ಮನ್ನು ಬಲಪಡಿಸಿಕೊಳ್ಳಲು ಇದ್ದರು. ಆದ್ದರಿಂದ, ನೀವು ನಿಮಗಾಗಿ ಹೊಂದಿಸಿದ ಯಾವುದೇ ಗುರಿ, ವೈಯಕ್ತಿಕ ಮಹತ್ವಾಕಾಂಕ್ಷೆಗಳ ಮೇಲೆ ಏರಿರಬೇಕು ಮತ್ತು ಸಮಾಜದ ಸುಧಾರಣೆಗಾಗಿರಬೇಕು. ಈ ಯುಗದಲ್ಲಿ ಶಕ್ತಿಶಾಲಿ ಬದಲಾವಣೆಗಳಿಗೆ ವೇಗವರ್ಧಕರಾಗಿರುವ ಯಾರಾದರೂ ನೀವು. 
 KARMIC_NUMBER_TEXT = ಸಂಖ್ಯಾಶಾಸ್ತ್ರ ನಮ್ಮ ಹಿಂದಿನ ಜೀವನದ ಕಾರ್ಯಗಳನ್ನು ಸೂಚಿಸುವ ಕೆಲವು ಸಂಖ್ಯೆಗಳನ್ನು ಗುರುತಿಸುತ್ತದೆ. ನಾವು ನಮ್ಮ ನಿರ್ದಿಷ್ಟ ಸಂಖ್ಯೆಗಳ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ ಕಾರಣ ನಮ್ಮ ಈ ಕ್ರಿಯೆಗಳು. ಅಂತಹ ಜನರ ಮುಖ್ಯ ಉದ್ದೇಶವೆಂದರೆ ಅವರ ಕರ್ಮ ಮತ್ತು ಹಿಂದಿನ ಕೆಲಸಗಳ ಸಾಲಗಳನ್ನು ಮರುಪಾವತಿಸುವುದು. ಈ ಕರ್ಮಿಕ ಸಂಖ್ಯೆಗಳು 13, 14, 16, ಮತ್ತು 19.
 KARMIC_NUMBER_TEXT13 = ಈ ಸಂಖ್ಯೆಯ ಅಡಿಯಲ್ಲಿ ಹುಟ್ಟಿದ ಕಾರಣ, yಯಶಸ್ಸನ್ನು ಸಾಧಿಸಲು ನೀವು ಜೀವನದಲ್ಲಿ ಕಷ್ಟಪಟ್ಟು ಕೆಲಸ ಮಾಡಬೇಕಾಗುತ್ತದೆ. ಕರ್ಮಿಕ ಸಂಖ್ಯೆ 13 ರ ನೇರ ಪ್ರಭಾವದಂತೆ, ನೀವು ನಿರಂತರವಾಗಿ ನಿಮ್ಮ ಹಾದಿಯಲ್ಲಿ ಅಡಚಣೆಯನ್ನು ಎದುರಿಸುತ್ತೀರಿ. ಈ ಕಾರಣದಿಂದಾಗಿ, ನಿಮ್ಮ ಪ್ರಯತ್ನಗಳು ವ್ಯರ್ಥವಾಗುವಂತೆ ನೀವು ಆಗಾಗ್ಗೆ ಅಸಮಾಧಾನವನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ,ನೀವು ಸಮಸ್ಯೆಗಳ ಮುಖಾಂತರ ಬಿಟ್ಟುಕೊಡುತ್ತೀರಿ ಮತ್ತು ಈ ಸವಾಲುಗಳನ್ನು ಜಯಿಸಲು ನಿಮಗೆ ಸಾಧ್ಯವಾಗುವುದಿಲ್ಲ ಎಂದು ಯೋಚಿಸುತ್ತೀರಿ .ನೀವು  ನಿರಾಶಾವಾದಿ ಸೋಮಾರಿಯಾಗಿದ್ದೀರಿ. ಆದರೆ, ಎಲ್ಲವೂ ತೋರುತ್ತಿಲ್ಲ ಎಂದು ಯಾವಾಗಲೂ ನೆನಪಿನಲ್ಲಿಟ್ಟುಕೊಳ್ಳಬೇಕು.  ನಿಮ್ಮ ಪ್ರಯತ್ನಗಳು ವ್ಯರ್ಥವಾಗಿ ಹೋಗುತ್ತಿಲ್ಲ, ಆದರೆ ನೀವು ದುರ್ಬಲರಾಗಲು ಮತ್ತು ಹಾರ್ಡ್ ಕೆಲಸ ಮಾಡಬೇಕಾಗುತ್ತದೆ ಏಕೆಂದರೆ ಇದು ನಿಮ್ಮ ಕರ್ಮ ಸಾಲವಾಗಿದೆ.  ನಿಮ್ಮ ಈ ಪ್ರಯತ್ನದಲ್ಲಿ ನೀವು ಯಶಸ್ವಿಯಾದರೆ, ನೀವು ಜೀವನದ ವಿವಿಧ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ಹೆಚ್ಚಿನ ಎತ್ತರವನ್ನು ಸ್ಪರ್ಶಿಸಲು ಸಾಧ್ಯವಾಗುತ್ತದೆ.
 KARMIC_NUMBER_TEXT14 = ಈ ಸಂಖ್ಯೆಯ ಅಡಿಯಲ್ಲಿ ಹುಟ್ಟಿದ ಕಾರಣ, ಜೀವನದಲ್ಲಿ ನಿಮ್ಮ ಜೀವನಶೈಲಿಯನ್ನು ಬದಲಿಸುವಂತಹ ಜೀವನದಲ್ಲಿ ಹಠಾತ್ ಅನಿರೀಕ್ಷಿತ ಬದಲಾವಣೆಗಳನ್ನು ನೀವು ಅನುಭವಿಸುತ್ತೀರಿ. ನೀವು ಆಲ್ಕೋಹಾಲ್, ದ್ರಾವಣ ಚಟುವಟಿಕೆಗಳು, ಇತ್ಯಾದಿಗಳಂತಹ ವಿವಿಧ ವಿಚಾರಗಳಿಗೆ ಆಸಕ್ತಿ ಹೊಂದಿದ್ದೀರಿ. ಮತ್ತು ಇದು ನಿಮಗೆ ಸಮಸ್ಯೆಗಳಿಗೆ ಕಾರಣವಾಗುತ್ತದೆ. ಎಲ್ಲವನ್ನೂ ತಪ್ಪಿಸಲು, ನೀವು ನಿಮಗಿರುವ ಬದ್ಧತೆಯನ್ನು ಮಾಡಬೇಕು. ನಿಮ್ಮ ಜೀವನವು ರೋಲರ್ ಕೋಸ್ಟರ್ ರೈಡ್ ಆಗಿದ್ದರೂ, ನೀವು ಸ್ಟ್ಯಾಂಡ್ ತೆಗೆದುಕೊಂಡು ಬಲವಾದ ಇನ್ನೂ ಕಷ್ಟಕರ ಗುರಿಯತ್ತ ಹೋರಾಟ ಮಾಡುತ್ತಿದ್ದರೆ, ಈ ಸಮಸ್ಯೆಗಳಿಂದ ನೀವು ಸುರಕ್ಷಿತರಾಗಿರುತ್ತೀರಿ ಮತ್ತು ಅಪೇಕ್ಷಿತ ಯಶಸ್ಸನ್ನು ಸಾಧಿಸುವಿರಿ.
 KARMIC_NUMBER_TEXT16 =  ಈ ಸಂಖ್ಯೆಯ ಅಡಿಯಲ್ಲಿ ಹುಟ್ಟಿದ ಕಾರಣ, ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ನಿಮ್ಮ ಅಹಂಕಾರವನ್ನು ಬಿಟ್ಟುಬಿಡಬೇಕು, ಮತ್ತು ಈ ಜೀವನದಲ್ಲಿ ನೀವು ಕಲಿಯಬೇಕಾಗಿರುವುದು ನಿಖರವಾಗಿ. ಒಂದು ರೀತಿಯಲ್ಲಿ, ಈ ಪ್ರಕ್ರಿಯೆಯು ನಿಮಗೆ ಶುದ್ಧೀಕರಣದ ಭಾಗವಾಗಿದೆ. ನಿಮ್ಮ ಅಹಂ ಸಮಯ ಮತ್ತು ಮತ್ತೆ ನೀವು ರಾಜಿ ಮಾಡಬೇಕು, ಮತ್ತು ಇದು ನಿಮ್ಮನ್ನು ಅಸಮಾಧಾನ ಮಾಡುವಾಗ, ಈ ಹೋರಾಟ ಈಗ ಏಕೆಂದರೆ ನೀವು ನಿರಾಶೆ ಮಾಡಬಾರದು, ಭವಿಷ್ಯದಲ್ಲಿ ನಿಮಗೆ ಯಶಸ್ಸು ತರುತ್ತದೆ. ಇತರರು ಇನ್ನೂ ಎದುರಿಸುತ್ತಿರುವ ಸಮಸ್ಯೆಗಳನ್ನು ನೀವು ತಿಳಿದುಕೊಳ್ಳುವ ಮತ್ತು ಅರ್ಥೈಸಿಕೊಳ್ಳುವ ಸಾಮರ್ಥ್ಯವನ್ನು ಹೊಂದಿದ್ದೀರಿ, ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ನಿಮ್ಮನ್ನು ಮಾತ್ರ ಅಥವಾ ಏಕಾಂಗಿಯಾಗಿ ನೋಡುತ್ತೀರಿ. ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ನಂಬಿಕೆ, ಕೃತಜ್ಞತೆ ಮತ್ತು ಶಾಂತಿಗೆ ನೀವು ಸ್ಥಳವನ್ನು ಕೊಟ್ಟರೆ, ನಂತರ ನೀವು ಆಧ್ಯಾತ್ಮಿಕವಾಗಿ ಬೆಳೆಯಲು ಸಾಧ್ಯವಾಗುತ್ತದೆ.
 KARMIC_NUMBER_TEXT19 = ಈ ಸಂಖ್ಯೆಯ ಅಡಿಯಲ್ಲಿ ಹುಟ್ಟಿದ ಕಾರಣ,  ನೀವು ಮುಖ್ಯವಾಗಿ ಜೀವನದಲ್ಲಿ ಎರಡು ವಿಷಯಗಳನ್ನು ಕಲಿಯಬೇಕಾಗುತ್ತದೆ - ಅಧಿಕಾರದ ಸರಿಯಾದ ಬಳಕೆ ಒಂದಾಗಿದೆ, ಮತ್ತು ಸ್ವಾತಂತ್ರ್ಯ ಇತರವು. ಜೀವನದಲ್ಲಿ ನೀವು ಅನೇಕ ಸಂದರ್ಭಗಳಲ್ಲಿ ನಿಮ್ಮ ನಿಲುವನ್ನು ತೆಗೆದುಕೊಳ್ಳಬೇಕಾಗುತ್ತದೆ,  ಒಂಟಿಯಾಗಿ, ವೈಯಕ್ತಿಕ ಜೀವನದಲ್ಲಿ ನಡೆಯುತ್ತಿರುವ ಕೆಲವು ಸಮಸ್ಯೆಗಳಿಂದಾಗಿ. ನಿಮ್ಮ ಸುತ್ತಲಿರುವ ಜನರನ್ನು ಕೇಳಲು ನಿಮಗೆ ಇಷ್ಟವಿಲ್ಲ,  ಮತ್ತು ಅವರ ಸಲಹೆಯನ್ನು ಸ್ವೀಕರಿಸುವುದಿಲ್ಲ. ಆದರೆ ನೀವು ಅವರನ್ನು ಗಮನದಲ್ಲಿರಿಸಿಕೊಳ್ಳಬೇಕು, ಏಕೆಂದರೆ ಜೀವನದಲ್ಲಿ ಮುಂದಕ್ಕೆ ಮತ್ತು ಮೇಲಕ್ಕೆ ಸಾಗಲು ನೀವು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಬೇಕು, ನಿಮಗೆ ಕೆಲವು ಜನರ ಸಹಾಯ ಬೇಕಾಗುತ್ತದೆ. ಇದು ಈ ಜೀವನದಲ್ಲಿ ನಿಮ್ಮ ಕಲಿಕೆಯಾಗಿದೆ.
 MULANK_DESC_TEXT1 = ಮೂಲಭೂತ 1 ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ ಕಾರಣ ನೀವು ಅತ್ಯಂತ ಮಹತ್ವಾಕಾಂಕ್ಷೆಯವರಾಗಿದ್ದೀರಿ ಮತ್ತು ನೀವು ಇತರರ ನಿರ್ಬಂಧಗಳನ್ನು ಇಷ್ಟಪಡುವುದಿಲ್ಲ,  ಇತರರಿಂದ  ಕೆಲಸ  ಮಾಡಿಸುವುದು ಮತ್ತು ಅವರ  ಮೇಲೆ ನಿಮ್ಮ  ನೇತೃತ್ವವನ್ನು  ನಡೆಸುವುದು  ನಿಮ್ಮ  ಮೊದಲ  ಗುಣವಾಗಿದೆ. ಸೂರ್ಯನು ನಿಮ್ಮ ಮೇಲೆ ವಿಶೇಷ ಪರಿಣಾಮವನ್ನು ಬೀರುತ್ತಾನೆ. ನಿಮ್ಮ ಸಿದ್ಧಾಂತವು ಸ್ಥಿರವಾಗಿದೆ ಮತ್ತು ನಿಮ್ಮ ನಿರ್ಣಯದ ಬಗ್ಗೆ ದೃಢವಾಗಿರುತ್ತೀರಿ. ನೀವು  ಯಾವುದೇ  ಸಂಭದದಲ್ಲಿ ಅದು ಪ್ರೀತಿಯ ವಿಷಯವಾಗಲಿ ಅಥವಾ ಮಿತ್ರನಾಗಿರಲಿ  ಧೀರ್ಘಕಾಲದ  ವರೆಗೂ ಉಳಿಯುತ್ತಿರಿ. ನೀವು ಒಬ್ಬ ದಯಾಲು  ವ್ಯಕ್ತಿ ಮತ್ತು ಇತರರಿಗೆ ಕೃತಜ್ಞತೆ ಸಲ್ಲಿಸುವ ವ್ಯಕ್ತಿ. ನೀವು  ಗೌರವವನ್ನು  ಹೆಚ್ಚಾಗಿ ಮೆಚ್ಚುತ್ತಯಿರಿ. ನಿಮ್ಮ ಕಠಿಣ  ಪರಿಶ್ರಮದಿಂದ  ನೀವು ಉತ್ತಮ ಹೆಸರನ್ನು ಪಡೆಯುತ್ತೀರಿ. ಸರ್ಕಾರದ ವಲಯದಲ್ಲಿನ ನಿಮ್ಮ ಸಾಧನೆ ಶ್ಲಾಘನೀಯವಾಗಿದೆ. ನೀವು ತಾಳ್ಮೆಯಿಂದ ಇರುವವರು  ಮತ್ತು ನಿಮ್ಮ ಅಧ್ಯಯನಕ್ಕೆ ಸಂಪೂರ್ಣ ಗಮನ ಕೊಡುತ್ತೀರಿ. ವಿರುದ್ಧ ಲೈಂಗಿಕ ವ್ಯಕ್ತಿಗಳ ಕಡೆಗೆ ನೀವು ಹೆಚ್ಚು ಆಕರ್ಷಿಸುತ್ತೀರಿ ಮತ್ತು ಕೆಲವೊಮ್ಮೆ ಈ ಕಾರಣದಿಂದಾಗಿ ಅವರು ಮೋಸ ಗೊಂಡಿದ್ದಿರಾ.  ಸಾಮಾಜಿಕ ಸೇವಾ ರಾಜಕೀಯ ಕೆಲಸ ಅಥವಾ ಧರ್ಮ ಸಂಬಂಧಿತ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ನೀವು ವಿಶೇಷ ಅನುಭವವನ್ನು ಪಡೆಯುತ್ತೀರಿ.
 MULANK_DESC_TEXT2 = ಮುಖ್ಯವಾಗಿ ಚಂದ್ರನಿಂದ ಪೀಡಿತರಾಗಿದ್ದರಿಂದ ನೀವು ತುಂಬಾ ಭಾವನಾತ್ಮಕವರಾಗಿದ್ದೀರಿ. ಯಾರೊಂದಿಗೂ ಯಾವುದೇ ಕೆಲಸವನ್ನು ಮಾಡಲು ನೀವು ಇಷ್ಟ ಪಡುತ್ತೀರಿ. ಸಾಮಾನ್ಯವಾಗಿ ಜೀವನದ ಪ್ರತಿಯೊಂದು ಪ್ರದೇಶದಲ್ಲಿ ನಿಮಗೆ  ಪಾಲುದಾರರ ಅಗತ್ಯ ಇರುತ್ತದೆ . ಕೆಲವೊಮ್ಮೆ ನೀವು ಬಹಳಷ್ಟು ಕೆಲಸವನ್ನು ಒಂದೇ  ಸಾರಿ  ಪ್ರಾರಂಭಿಸುತ್ತೀರಿ. ಆದರೆ ಮನಸ್ಸಿನ ಬದಲಾವಣೆಯಿಂದ, ಹಲವು ಬಾರಿ ಮಧ್ಯದಲ್ಲಿ ಅವುಗಳನ್ನು ಬಿಟ್ಟು ಬಿಡುತ್ತೀರಾ, ಇದರಿಂದಾಗಿ ನೀವು ನಷ್ಟವನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ಕಲೆಯನ್ನು  ಇಷ್ಟ ಪಡುವವರು ಮತ್ತು ಕಲ್ಪನಾತ್ಮಕದವರು  ಮತ್ತು ಜನರನ್ನು ಪ್ರೀತಿಸುವವರು. ನೀವು ನುರಿತ ಪ್ರೇಮಿಯಾಗಬಹುದು. ತಮ್ಮ ಕುಟುಂಬಕ್ಕೆ ಸಮರ್ಪಣೆಯಾಗಿ ಇರುವವರು. ನೀವು ಸಹಿಷ್ಣುತೆ ಹೊಂದಿರುವುದಿಲ್ಲ. ನಿಮ್ಮ ಸಾಮಾಜಿಕ ಸ್ಥಿತಿ ಒಳ್ಳೆಯದು ಮತ್ತು ನೀವು ಸಮಾಜದಲ್ಲಿ ಜನಪ್ರಿಯರಾಗಿದ್ದೀರಿ. ನೀವು   ಒಳ್ಳೆಯ ಸ್ನೇಹಿತ ತನಿಖಾ ಪ್ರವೃತ್ತಿವವರು. ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ಹಲವಾರು ಏರಿಳಿತಗಳಿವೆ ಮತ್ತು ಇದರಿಂದಾಗಿ ನೀವು ಅನೇಕ ಯೋಜನೆಗಳ ಮಧ್ಯದಲ್ಲಿ ಅಂಟಿಕೊಳ್ಳುತ್ತೀರಿ. ನೀವು  ನಿಮ್ಮ ಆತ್ಮ ವಿಶ್ವಾಸವನ್ನು ಬಲಪಡಿಸಬೇಕು.
 MULANK_DESC_TEXT3 = ಮೂಲಭೂತ ಸಂಖ್ಯೆ 3 ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ ಮತ್ತು ಗುರು ಗ್ರಹದ ಪ್ರಭಾವದಿಂದ, ನೀವು ಮೃದು ಹೃದಯದ, ಸತ್ಯವಾದ ಮತ್ತು ಶಾಂತಿ-ಪ್ರೀತಿಯ ವ್ಯಕ್ತಿ. ನೀವು ಮಹತ್ವಾಕಾಂಕ್ಷಿ ಮತ್ತು ಹೆಚ್ಚಿನ ಸರ್ಕಾರಿ ಉದ್ಯೋಗಗಳಲ್ಲಿ ಚೆನ್ನಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತೀರಿ. ಹೇಗಾದರೂ, ಸಾಮಾನ್ಯವಾಗಿ ಸರ್ವಾಧಿಕಾರ ಪ್ರಕೃತಿ ನಿಮ್ಮ ಒಳಗೆ ಕಾಣಬಹುದು. ಶಿಸ್ತುಬದ್ಧ, ನಿಮ್ಮ ಅಧೀನದಲ್ಲಿರುವವರಲ್ಲಿ ನೀವು ಹೆಚ್ಚಾಗಿ ಕಷ್ಟವಾಗಬಹುದು. ಅಂತರ್ಭೋದೆಯಾ  ಜ್ಞಾನದ  ಪೂರ್ಣ , ನೀವು ಎರಡು ಕಲಿಕೆ ಮತ್ತು ಭೋದನೆ ಆನಂದಿಸಿ,  ಇದರಿಂದಾಗಿ ನೀವು ಬುದ್ಧಿವಂತಿಕೆಯ ಕ್ಷೇತ್ರದಲ್ಲಿ ಹಲವಾರು ಸಾಧನೆಗಳನ್ನು ಸಾಧಿಸಬಹುದು. ನೀವು ಮಾನಸಿಕವಾಗಿ ಪ್ರಬಲರಾಗಿದ್ದೀರಿ ಮತ್ತು ನಿಮ್ಮ ತಾರ್ಕಿಕ ಮತ್ತು ಜ್ಞಾನ ಶಕ್ತಿ ತುಂಬಾ ಒಳ್ಳೆಯದು. ಚಾರಿಟಿ ಮತ್ತು ಲೋಕೋಪಕಾರದ ಕೃತಿಗಳ ನಿಮ್ಮ ಪ್ರೀತಿ ಅದ್ಭುತವಾಗಿದೆ, ಆದಾಗ್ಯೂ, ನೀವು ಕೆಲವೊಮ್ಮೆ ಒಂದು ವಿಷಯವನ್ನು ದುರ್ಬಳಕೆಯಿಂದ ಅನುಸರಿಸಬಹುದು ಮತ್ತು ಇದು ನಿಮ್ಮನ್ನು ಆಕ್ರಮಣಕಾರಿ ವ್ಯಕ್ತಿಯಾಗಿ ಮಾಡುತ್ತದೆ. ಆದರೂ, ನೀವು ಸ್ವಾಭಿಮಾನವನ್ನು ಹೊಂದಿದ್ದೀರಿ ಎಂಬುದು ಸತ್ಯ.
 MULANK_DESC_TEXT4 = ನೀವು ಹರ್ಷಲ್ ಅಥವಾ ರಾಹು ಗ್ರಹದಿಂದ ಹೆಚ್ಚು ಪ್ರಭಾವಿತರಾಗಿದ್ದೀರಿ. ಪರಿಣಾಮವಾಗಿ, ನಿಮಗೆ ಚಿಂತನೆಯ ಪೆಟ್ಟಿಗೆಯಲ್ಲಿ ಹೊರಹೊಮ್ಮಿದೆ ಮತ್ತು ಹೊಸ ಮತ್ತು ಹೊಸತನದ ಏನಾದರೂ ಮಾಡಬಹುದು. ನಿಮ್ಮ ಅಭಿಪ್ರಾಯವು ಇತರ ಜನರ ನಂಬಿಕೆಗೆ ಸುಲಭವಾಗಿ ಹೊಂದಾಣಿಕೆಯಾಗುವುದಿಲ್ಲವಾದ್ದರಿಂದ, ಅನೇಕವೇಳೆ ನಿಮ್ಮನ್ನು ಅನೇಕ ಬಾರಿ ವಿರೋಧಿಸುತ್ತಾರೆ. ನಿಮ್ಮ ವಿನೋದದಲ್ಲಿ ಸಂತೋಷ ಮತ್ತು ಮುಳುಗುವುದರ ಬದಲಿಗೆ, ಸಂಪತ್ತು ನೀವು ಇಷ್ಟಪಡುವ ವಿಷಯವಲ್ಲ. ನಿಮ್ಮ ಸಮಯಕ್ಕಿಂತ ಮುಂಚೆಯೇ ನೀವು ಯೋಚಿಸುತ್ತೀರಿ ಮತ್ತು ಬಹಿರಂಗವಾಗಿ ನಿಮ್ಮ ಭಿನ್ನಾಭಿಪ್ರಾಯಗಳನ್ನು ವ್ಯಕ್ತಪಡಿಸಬಹುದು. ಆದಾಗ್ಯೂ, ನೀವು ಅನಿರೀಕ್ಷಿತ ಸ್ವಭಾವವನ್ನು ಹೊಂದಿದ್ದೀರಿ ಅದು ಯಾರನ್ನಾದರೂ ಸುಲಭವಾಗಿ ಗುರುತಿಸಲು ಸಾಧ್ಯವಿಲ್ಲ. ಅದೇ ಧಾಟಿಯಲ್ಲಿ, ನೀವು ಮುಂದಿನದನ್ನು ಏನು ಮಾಡಬೇಕೆಂದು ಯಾರೂ ತಿಳಿಯುವುದಿಲ್ಲ, ಮತ್ತು ನಿಮ್ಮ ಈ ಗುಣಲಕ್ಷಣವು ನಿಮ್ಮನ್ನು ಇನ್ನಷ್ಟು ವಿಶೇಷಗೊಳಿಸುತ್ತದೆ. ಒಳ್ಳೆಯ ಕೆಲಸ ಮಾಡುವ ಅಭ್ಯಾಸವನ್ನು ನೀವು ಹೊಂದಿದ್ದರೂ, ಜನರು ನಿಮ್ಮ ಈ ಒಳ್ಳೆಯತನವನ್ನು ಶ್ಲಾಘಿಸಲು ಸಹ ನೀವು ಬಯಸುತ್ತೀರಿ. ನೀವು ತುಂಬಾ ಸಂವೇದನಾಶೀಲರಾಗಿರುತ್ತೀರಿ ಮತ್ತು ಆಗಾಗ್ಗೆ ನೀವು ಏಕಾಂಗಿಯಾಗಿರುತ್ತೀರಿ. ನಿಮ್ಮ ಸ್ನೇಹಿತರ ಸಂಖ್ಯೆ ಕಡಿಮೆಯಾಗಬಹುದು ಆದರೆ ಅವರೆಲ್ಲರೂ ಪ್ರಾಮಾಣಿಕ ಮತ್ತು ನಿಷ್ಠಾವಂತರಾಗಿದ್ದಾರೆ.
 MULANK_DESC_TEXT5 = ಮೂಲಭೂತ ಸಂಖ್ಯೆ 5 ರ ಅಡಿಯಲ್ಲಿ ಹುಟ್ಟಿದ ಮತ್ತು ಬುಧದ ಪ್ರಭಾವದಿಂದಾಗಿ, ನೀವು ಬಹಳಷ್ಟು ಸ್ನೇಹಿತರೊಂದಿಗಿನ ವ್ಯಕ್ತಿ. ಸ್ನೇಹಕ್ಕಾಗಿ ನೀವು ಉತ್ಸಾಹ ಹೊಂದಿದ್ದೀರಿ, ನಿಮ್ಮ ಸ್ನೇಹಿತ ವೃತ್ತದಲ್ಲಿ ಅನೇಕ ಜನರಿದ್ದಾರೆ. ಒಳ್ಳೆಯ ವ್ಯಾಪಾರಿ ವ್ಯಕ್ತಿಯಾಗಿದ್ದ ಎಲ್ಲಾ ಗುಣಲಕ್ಷಣಗಳು ನಿಮ್ಮೊಳಗೆ ನೈಸರ್ಗಿಕವಾಗಿ ಇರುತ್ತವೆ. ನೀವು ಅನೇಕವೇಳೆ ಲಾಭದ ಕಡೆಗೆ ಆಕರ್ಷಿತರಾಗುತ್ತೀರಿ ಮತ್ತು ಆದ್ದರಿಂದ ತೀವ್ರವಾಗಿ ಅನೇಕ ಕೆಲಸಗಳನ್ನು ಮಾಡುತ್ತೀರಿ, ಆದರೆ ನೀವು ಅದೇ ಬಳಲುತ್ತಿದ್ದಾರೆ ಮಾಡಬೇಕು. ನಿಮ್ಮೊಳಗೆ ನೀವು ಅದ್ಭುತವಾದ ಚುರುಕುತನವನ್ನು ಹೊಂದಿದ್ದೀರಿ. ಅದೇ ಧಾಟಿಯಲ್ಲಿ, ನೀವು ದೀರ್ಘಕಾಲ ಏನಾದರೂ ಸಿಕ್ಕಿಕೊಳ್ಳುವುದಿಲ್ಲ ಮತ್ತು ಆದ್ದರಿಂದ ದೀರ್ಘಾವಧಿಯವರೆಗೆ ಅಸಮಾಧಾನವಾಗಿ ಉಳಿಯಬೇಡ. ಕೆಲಸಕ್ಕಿಂತಲೂ ನೀವು ವ್ಯವಹಾರಕ್ಕೆ ಹೆಚ್ಚು ಆದ್ಯತೆಯನ್ನು ನೀಡುತ್ತೀರಿ. ತ್ವರೆ, ತ್ವರಿತ ಕೋಪ, ಮತ್ತು ನಿಮ್ಮೊಳಗೆ ಸಿಡುಕುತನದ ಉತ್ತಮ ಸಾಧ್ಯತೆಯಿದೆ. ಆದಾಗ್ಯೂ, ಫ್ಲಿಪ್ ಸೈಡ್ನಲ್ಲಿ, ನಿಮ್ಮ ವಾದಗಳು ಒಳ್ಳೆಯದು ಮತ್ತು ನಿಮ್ಮ ಮಾತುಗಳು ಸಹ ಪರಿಣಾಮಕಾರಿ.ನೀವು ಹೃದಯದಲ್ಲಿ ಚಂಚಲರಾಗಿದ್ದೀರಿ ಮತ್ತು ಮಿದುಳುಗಳು ಮತ್ತು ಬುದ್ಧಿಗೆ ಸಂಬಂಧಿಸಿದ ಕೃತಿಗಳಲ್ಲಿ ಯಶಸ್ಸನ್ನು ಪಡೆಯಬಹುದು. ಹೆಚ್ಚುವರಿಯಾಗಿ, ನೀವು ಬೌದ್ಧಿಕ ಕೆಲಸವನ್ನು ಬಯಸುತ್ತೀರಿ, ಯಾವುದೇ ಭೌತಿಕ ಶ್ರಮಗಳಿಗಿಂತ ಹೆಚ್ಚು. ಯಾವುದೇ ತೊಂದರೆಯಿಂದ ಹೊರಬರುವ ನಿಮ್ಮ ಸಾಮರ್ಥ್ಯವು ತ್ವರಿತವಾಗಿ ನಿಮ್ಮ ಅತ್ಯುತ್ತಮ ಗುಣಲಕ್ಷಣಗಳಲ್ಲಿ ಒಂದಾಗಿದೆ. ಆದಾಗ್ಯೂ, ನಿಮ್ಮ ಮಾನಸಿಕ ಶಕ್ತಿಯನ್ನು ದುರ್ಬಳಕೆ ಮಾಡುವುದನ್ನು ನೀವು ತಪ್ಪಿಸಬೇಕು.
