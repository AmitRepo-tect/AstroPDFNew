 MULANK_DESC_TEXT9 = ಈ ಸಂಖ್ಯೆಯ ಅಡಿಯಲ್ಲಿ ಹುಟ್ಟಿದ ಕಾರಣದಿಂದಾಗಿ, ಮಂಗಳನಿಂದ  ನಿಮ್ಮ ಶಕ್ತಿಯನ್ನು ಮತ್ತು ಅಧಿಕಾರವನ್ನು ನೀವು ಪಡೆಯುತ್ತೀರಿ, ಮೂಲಭೂತ ಸಂಖ್ಯೆ 9 ರ ಅಧಿಪತಿಯಾಗಿದ್ದು, ಅದು ನಿಮಗೆ ಧೈರ್ಯ ಮತ್ತು ಕಷ್ಟಗಳ ಬಗ್ಗೆ ಹೆದರುವುದಿಲ್ಲ. ಜನರ ಆಡಳಿತ ಅಥವಾ ನಾಯಕತ್ವವನ್ನು ನೀವು ಮಾಸ್ಟರಿಂಗ್ ಮಾಡಿದ್ದೀರಿ.  ಹೇಗಾದರೂ, ನೀವು ಸ್ವಲ್ಪ ಉದ್ವೇಗವನ್ನು ಹೊಂದಬಹುದು, ಏಕೆಂದರೆ ನೀವು ಆಗಾಗ್ಗೆ ಪ್ರತಿಕೂಲ ಪರಿಸ್ಥಿತಿಯನ್ನು ಎದುರಿಸಬಹುದು. ಚುರುಕುತನ ಮತ್ತು ತ್ವರೆ ನಿಮ್ಮೊಳಗಿರುತ್ತದೆ.  ನಿಮ್ಮ ಜೀವನವು ತುಂಬ ಕಠಿಣ  ಪರಿಶ್ರಮಗಳಿಂದ ಮತ್ತು ನಿಮ್ಮ ಶತ್ರುಗಳ ಸಂಖ್ಯೆಯು ಹೆಚ್ಚಾಗಿದೆ. ಆದಾಗ್ಯೂ, ನಿಮ್ಮ ಧೈರ್ಯದ ಗುಣದಿಂದ ನೀವು ಇವುಗಳನ್ನು ಎದುರಿಸಬಹುದು.  ನೀವು ಸ್ವತಂತ್ರರಾಗಬೇಕೆಂದು ಬಯಸುತ್ತೀರಿ ಮತ್ತು ಇತರರು ಸುಲಭವಾಗಿ ಪ್ರಭಾವ ಬೀರುವುದಿಲ್ಲ.  ನೀವು ಸ್ಮಾರ್ಮಿ ಜನರ ಬಗ್ಗೆ ಜಾಗರೂಕರಾಗಿರಿ ಎಂದು ಸಲಹೆ ನೀಡಲಾಗಿದೆ. ನೀವು ಪ್ರೀತಿ ಮತ್ತು ಸಹಾನುಭೂತಿಯನ್ನು ಪಡೆಯುವ ಸಲುವಾಗಿ, ಎಲ್ಲಾ ತುದಿಗಳಿಗೆ ಹೋಗಬಹುದು, ಆದರೆ, ನಿಮ್ಮ ಟೀಕೆಯನ್ನು ನೀವು ಸಹಿಸಲಾಗುವುದಿಲ್ಲ . ಆದ್ದರಿಂದ, ನೀವು ನಿಮ್ಮನ್ನು ನಿಯಂತ್ರಿಸಲು ಪ್ರಯತ್ನಿಸಬೇಕು ಏಕೆಂದರೆ ನೀವು ತೀವ್ರ ಕೋಪದಲ್ಲಿ ಯಾವುದೇ ಮಟ್ಟಕ್ಕೆ ಹೋಗಬಹುದು.  ನಿಮ್ಮ ಸ್ವಭಾವವನ್ನು ನಿಯಂತ್ರಿಸುವಲ್ಲಿ ನೀವು ಯಶಸ್ವಿಯಾಗಿದ್ದರೆ, ನೀವು ಜೀವನದಲ್ಲಿ ಬಹಳ ಅದೃಷ್ಟ ಮತ್ತು ಯಶಸ್ವಿಯಾಗುತ್ತೀರಿ.
