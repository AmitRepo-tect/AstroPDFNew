 NAMANK_DESC_TEXT2 = <p>ಈ ಸಂಖ್ಯೆ ಹೆಚ್ಚಿನ ಕಲ್ಪನೆಯನ್ನು ತೋರಿಸುತ್ತದೆ, ಆದರ್ಶವಾದ ಮತ್ತು ಒಂದು ಸ್ವಪ್ನಮಯ ಸ್ವಭಾವ, ಅವರ ಕಲ್ಪನೆಯ ಜಗತ್ತಿನಲ್ಲಿ ವಾಸಿಸುತ್ತಿದ್ದಾರೆ. ಮೊದಲನೇಯಂತಲ್ಲದೆ ಅವರು ಯೋಜನೆಗಳ ಕಾರ್ಯನಿರ್ವಾಹಕರಾಗಿದ್ದಾರೆಮತ್ತು ಇತರರು ಆಯೋಜಿಸಿದ ಯೋಜನೆಗಳು. ಸ್ವಭಾವದಿಂದ ಪರಿಗಣಿಸಿ ,ನಿಜವಾಗಿಯೂ ಯುದ್ಧದ ವ್ಯಕ್ತಿಗಳಂತೆ ನೀವು ಬರುವ ಇತರರ ಯೋಗಕ್ಷೇಮದ ಬಗ್ಗೆ ನಿಸ್ವಾರ್ಥ ಮತ್ತು ಯಾವಾಗಲೂ ಚಿಂತನಶೀಲರಾಗಿರುತ್ತೀರಿ.</p><p><b>Career: </b>ಹುಟ್ಟಿದ ಸಂಖ್ಯೆ 2 ಜನರು ಉತ್ತಮ ಪಾಲುದಾರ ಮತ್ತು ಸಹಯೋಗಿ, ಅವರು ಪಾಲುದಾರಿಕೆಯ ವ್ಯಾಪಾರದಲ್ಲಿ ಉತ್ತಮವಾಗಿ ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತಾರೆ. ನೀವು ಬಹಳ ಪ್ರಕ್ಷುಬ್ಧ ಮತ್ತು ಪ್ರೇಮಿ ಬದಲಾವಣೆ, ಆದ್ದರಿಂದ ಯಾವಾಗಲೂ ಪ್ರಯಾಣ ಬಯಸುವ,ಮತ್ತು ಇದು ಬಹಳಷ್ಟು ಪ್ರಯಾಣವನ್ನು ಒಳಗೊಂಡಿರುವ ಉದ್ಯೋಗಗಳಲ್ಲಿ ನಿಮ್ಮನ್ನು ಅತ್ಯುತ್ತಮವಾಗಿಸುತ್ತದೆ .ಸ್ವಭಾವತಃ ಕಾಲ್ಪನಿಕವಾಗಿರುವುದರಿಂದ ನೀವು ಸೃಜನಶೀಲ ಕ್ಷೇತ್ರಗಳಲ್ಲಿಯೂ ಉತ್ತಮವಾಗಿರುತ್ತೀರಿ. </p>
 NAMANK_DESC_TEXT3 = <p>ಜನನ ಸಂಖ್ಯೆ 3 ನೈತಿಕತೆಯನ್ನು ಸೂಚಿಸುತ್ತದೆ, ದೈವಿಕ ಪ್ರೀತಿ ಮತ್ತು ನ್ಯಾಯದೊಂದಿಗೆ ನ್ಯಾಯ ಮತ್ತು ಮಹಾನ್ ಅಪ್ ಲಿಫ್ಟ್ಗಳು ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ನಿಮ್ಮ ಜೀವನದ ನಿಮ್ಮ ನೆರೆಯಲ್ಲಿ ನಿಮಗೆ ನಿರ್ದಿಷ್ಟ ಸ್ಥಾನವಿದೆ.ಇದು ನಿಮ್ಮ ಜೀವನಕ್ಕೆ ಒಳ್ಳೆಯದು ಎಂದು ಆಕರ್ಷಿಸುವ ನಿಮ್ಮ ಸಂಖ್ಯೆಯ ಕಂಪನವಾಗಿದೆ ಮತ್ತು ನೀವು ಪರಿಣಾಮವಾಗಿ ಹೊಳೆಯುತ್ತಿರುವುದು.ಅಪಾರ ಪ್ರಯಾಸಕರ ಕೆಲಸ ನೀವು ಕೆಲಸವನ್ನು ಪಡೆಯಲು ಇಷ್ಟಪಡುತ್ತೀರಿಒಬ್ಬ ನಾಯಕನಾಗಿ  ಜನಿಸಿ  , ಆಜ್ಞೆಗಳನ್ನು ಗೌರವಿಸುವುದು ಮತ್ತು ನಿಮ್ಮ ಗುರಿ ಅತ್ಯುತ್ತಮವಾಗಿರುತ್ತದೆ. </p><p><b>Career: </b>ನೀವು ಬುದ್ಧಿವಂತ ನ್ಯಾಯಾಧೀಶರನ್ನು, ಕುಶಲತೆಯಿಂದ, ವಿಶ್ವದ ಶಿಕ್ಷಕರು ಮತ್ತು ತತ್ವಜ್ಞಾನಿಗಳನ್ನು ಮಾಡುತ್ತಾರೆ.</p>
 NAMANK_DESC_TEXT4 = <p>ಜನನ ಸಂಖ್ಯೆ 4 ಜನರು ಶಕ್ತಿ, ಶಕ್ತಿ ಮತ್ತು ಪ್ರಗತಿಯನ್ನು ಪ್ರದರ್ಶಿಸುತ್ತಾರೆ. ಅವರು ಮನಸ್ಸಿನ ಹೆಚ್ಚಿನ ಬೋಧನೆಯನ್ನು ಹೊಂದಿರುವವರು.ಈ ಸಂಖ್ಯೆಯ ವಿಶಿಷ್ಟ ಸ್ವಭಾವವು ಜೀವನ ಮತ್ತು ಸಮಾಜದಲ್ಲಿನ ಬದಲಾವಣೆಗಳನ್ನು ನಿರಂತರವಾಗಿ ಗುರಿಪಡಿಸುತ್ತದೆಈ ಸಂಖ್ಯೆಯ ವಿಶಿಷ್ಟ ಸ್ವಭಾವವು ಜೀವನ ಮತ್ತು ಸಮಾಜದಲ್ಲಿನ ಬದಲಾವಣೆಗಳನ್ನು ನಿರಂತರವಾಗಿ ಗುರಿಪಡಿಸುತ್ತದೆ  ಮತ್ತು ಮನಸ್ಸಿನ ವಿಮೋಚನೆಯ ನಂತರ ಪರಿಸರ ಮತ್ತು ಸಮಾಜದ ಬಂಧನದಿಂದ. ನೀವು  ನಿಮ್ಮ ವಯಸ್ಸನ್ನು ಮೀರಿ ಪ್ರಬುದ್ಧರಾಗಿರುತ್ತೀರಿ. ಸಂಖ್ಯೆ ನಾಲ್ಕು ಜನರು ಅಸಾಮಾನ್ಯ ಆಕರ್ಷಿಸಲ್ಪಡುತ್ತವೆ ಮತ್ತು ವಿವಿಧ ಮತ್ತು ಕೆಲವೊಮ್ಮೆ ನಿಯಮಗಳ ವಿರುದ್ಧ ಬಂಡಾಯ ಅಗತ್ಯ ಭಾವಿಸುತ್ತಾರೆ.</p><p><b>Career: </b>ಜನನ ನಾಲ್ಕನೆಯವರು ಅತ್ಯುತ್ತಮ ಬರಹಗಾರರಾಗಿದ್ದಾರೆ, ಉದ್ಯಮಿ ಮತ್ತು ರಾಜಕಾರಣಿಗಳು.</p>
 NAMANK_DESC_TEXT5 = <p>ಜೀವನದ ಅತೀಂದ್ರಿಯ ನಿಗೂಢತೆಗಳಲ್ಲಿ ನೀವು ಆಳವಾಗಿ ಆಸಕ್ತಿ ಹೊಂದಿದ್ದೀರಿ. ಸ್ವಭಾವತಃ ನೀವು ತುಂಬಾ ಪ್ರಕ್ಷುಬ್ಧವಾಗಿರುತ್ತೀರಿಮತ್ತು ಯಾವಾಗಲೂ ನಿಮ್ಮ ಹೊಸ ಮೂಲಭೂತ ಅವಶ್ಯಕತೆಯಾಗಿ ಹೊಸ ಗುರಿ ತಲುಪಲು ಯಾವಾಗಲೂ ಸಾರ್ವಕಾಲಿಕ ಚಲಿಸುತ್ತದೆ. ಒಬ್ಬ ವ್ಯಕ್ತಿಯಂತೆ ನಿಮ್ಮಲ್ಲಿ ಒಳ್ಳೆಯ ಮತ್ತು ಕೆಟ್ಟ ಎರಡೂ ಭಾಗಗಳಿವೆ.ನೀವು ಮಕ್ಕಳೊಂದಿಗೆ ಸಮಯ ಕಳೆಯಲು ಇಷ್ಟಪಡುತ್ತೀರಿ ಮತ್ತು ಕುಟುಂಬ ಕಾಳಜಿಗಳನ್ನು ಮೊದಲ ಸ್ಥಾನದಲ್ಲಿ ಇರಿಸಿ. ಆಧ್ಯಾತ್ಮಿಕತೆಗೆ ನೀವು ಒಲವನ್ನು ಹೊಂದಿದ್ದೀರಿ ಮತ್ತು ಧಾರ್ಮಿಕ ವ್ಯಕ್ತಿ ಕೂಡ.</p><p><b>ವೃತ್ತಿಜೀವನ: </b>ನೀವು ಕ್ರೀಡೆಗಳನ್ನು ಆನಂದಿಸುತ್ತೀರಿ ಮತ್ತು ಅದನ್ನು ವೃತ್ತಿಯಾಗಿ ತೆಗೆದುಕೊಳ್ಳಬಹುದು.ನಿಮ್ಮ ಬೌದ್ಧಿಕ ಮನಸ್ಸು ನಿಮಗೆ ಶೈಕ್ಷಣಿಕವಾದಿ ಮತ್ತು ಸಂಶೋಧಕರಂತೆ ಅತ್ಯುತ್ತಮವಾಗಿ ಹೊಂದಿಕೊಳ್ಳುತ್ತದೆ.</p>
 NAMANK_DESC_TEXT6 = <p>ನೀವು ಕಲಾವಿದ ಮತ್ತು ಸೌಂದರ್ಯವನ್ನು ಹುಟ್ಟುತ್ತಿರುವಿರಿ ಮತ್ತು ಕಲೆ ನಿಮ್ಮನ್ನು ಹೆಚ್ಚು ಆಕರ್ಷಿಸುತ್ತದೆ. ಸುಂದರಿಯರು ಕೇವಲ ಶಬ್ಧದ ಅರ್ಥದಲ್ಲಿಲ್ಲ ಆದರೆ ನೀವು ಸಂಬಂಧಗಳಲ್ಲಿ ಸೌಂದರ್ಯವನ್ನು ಪ್ರೀತಿಸುತ್ತೀರಿ. ನೀವು ಮುಖಾಮುಖಿಗಳನ್ನು ಪ್ರಯತ್ನಿಸಿ ಮತ್ತು ತಪ್ಪಿಸಲು ಕಾರಣ ಅಪಶ್ರುತಿ ಅಥವಾ ಭಿನ್ನಾಭಿಪ್ರಾಯವು ನಿಮ್ಮನ್ನು ಅನಾನುಕೂಲಗೊಳಿಸುತ್ತದೆ. ನಿಮ್ಮ ಪ್ರೀತಿಯ ಸ್ವಭಾವವು ನಿಮ್ಮನ್ನು ಬೆಚ್ಚಗಿನ, ಪ್ರಮುಖ ಮತ್ತು ಸುಂದರ ವ್ಯಕ್ತಿಯಾಗಿ ಕಾಣುವಂತೆ ಮಾಡುತ್ತದೆ. ನೀವು ಇತರರನ್ನು ಮೆಚ್ಚಿಸಲು ಬಯಸುತ್ತೀರಿ. ನೀವು ಸ್ವಭಾವತಃ ಇಷ್ಟಪಡುವ ಮತ್ತು ಆಶಾವಾದಿ.</p><p><b>ವೃತ್ತಿಜೀವನ: </b>ಸಂಗೀತ, ನೃತ್ಯ ಕವನ ಮತ್ತು ಸೃಜನಾತ್ಮಕತೆಯೊಂದಿಗೆ ಏನು ಮಾಡಬೇಕೆಂದು ನೀವು ಆಸಕ್ತಿ ಹೊಂದಿದ್ದೀರಿ.</p>
 NAMANK_DESC_TEXT7 = <p>ನೀವು ನಿಮ್ಮ ವ್ಯಕ್ತಿತ್ವ ಮೂಲತೆ ಮತ್ತು ಸ್ವಾತಂತ್ರ್ಯಕ್ಕಾಗಿ ಹೆಸರುವಾಸಿಯಾಗಿದ್ದೀರಿ. ನೀವು ಸಾಂಪ್ರದಾಯಿಕ ಬಂಧನ ಮತ್ತು ಸಮಾಜದ ನಿರ್ಬಂಧಗಳನ್ನು ಮತ್ತು ನಿರ್ಬಂಧಗಳನ್ನು ಮುರಿಯಲು ಇಷ್ಟಪಡುವ ಹಕ್ಕಿಗಳಂತೆಯೇ ಉಚಿತ ಮನೋಭಾವ.ಜನರು ನಿಮ್ಮನ್ನು ನಿಗೂಢವಾಗಿ ಕಾಣುತ್ತಾರೆ ಮತ್ತು ನಿಮ್ಮ ಗೈರುಹಾಜರಿಯಿಲ್ಲದ ಅನೇಕ ಬಾರಿ.ಸಂಖ್ಯೆ 7 ಜನರು ಸಾಮಾನ್ಯವಾಗಿ ಸಂಪನ್ಮೂಲ ಮತ್ತು ವಿಶ್ಲೇಷಣಾತ್ಮಕ ಮತ್ತು ಸಂದರ್ಭಗಳಲ್ಲಿ ಮತ್ತು ಸಮಸ್ಯೆಗಳಲ್ಲಿ ಕಾರಣ ಮತ್ತು ಪರಿಣಾಮವನ್ನು ನಿರ್ಧರಿಸಬಹುದು.ಜೀವನದಲ್ಲಿ, ನೀವು ಸರಿಯಾದ ಭಾವನೆ ಮತ್ತು ನಿಮಗಾಗಿ ಸಾಧಿಸಲು ಅನೇಕ ವೈಯಕ್ತಿಕ ತ್ಯಾಗಗಳನ್ನು ಮಾಡುತ್ತೀರಿ.</p><p><b>ವೃತ್ತಿಜೀವನ:</b> ನೀವು ಅತ್ಯಂತ ಧೈರ್ಯಶಾಲಿ ಮತ್ತು ಸಾಹಸಮಯವರಾಗಿದ್ದೀರಿ, ಇದರಿಂದಾಗಿ, ನೀವು ಹೊಸ ಮತ್ತು ವಿಲಕ್ಷಣವಾಗಿ ಪ್ರಯತ್ನಿಸಲು ಮನೆಯಿಂದ ದೂರವಿರಬಹುದು. ಹೆಚ್ಚುವರಿಯಾಗಿ, ನಿಮ್ಮ ಅಂತರ್ಬೋಧೆಯ ಸ್ವಭಾವದ ಕಾರಣದಿಂದಾಗಿ ನೀವು ಡೇಜಾ ವುಗೆ ಹೆಚ್ಚು ಒಳಗಾಗುವಿರಿ. ಆದ್ದರಿಂದ, ಸಾಹಸಕ್ಕಾಗಿ ನಿಮ್ಮ ದಾಹವನ್ನು ತೃಪ್ತಿಪಡಿಸುವ ಯಾವುದೇ ವೃತ್ತಿಯನ್ನು ಸೇರುವುದು ಅತ್ಯುತ್ತಮ ಆಯ್ಕೆಯಾಗಿದೆ.</p>
 NAMANK_DESC_TEXT8 = <p>ಜನ್ಮ ಸಂಖ್ಯೆ 8 ವ್ಯಕ್ತಿ ಗಂಭೀರ ಮತ್ತು ತಾತ್ವಿಕ. ಸಂಖ್ಯೆ 8 ನಿರ್ಣಯ, ನಿರಂತರತೆ ಮತ್ತು ಪರಿಶ್ರಮದ ಸಂಕೇತವಾಗಿದೆ. ಕಠಿಣವಾದ ಹೊರಗಿನಿಂದ, ನೀವು ಒಳಗೆ ಬೆಚ್ಚಗಿನ ಮತ್ತು ಕಾಳಜಿಯ ವ್ಯಕ್ತಿ.ಭವಿಷ್ಯದ ಬಗ್ಗೆ ನೀವು ತುಂಬಾ ಜಾಗರೂಕರಾಗಿದ್ದೀರಿ ಮತ್ತು ಯಾವಾಗಲೂ ಎಚ್ಚರಿಕೆಯಿಂದ ನಿರ್ಧರಿಸಬಹುದು.ನಿಮ್ಮ ಗುರಿಗಳನ್ನು ತಲುಪಲು ನೀವು ಹೆಚ್ಚಿನ ಪ್ರಯಾಸದ ಮೂಲಕ ಹೋಗಬಹುದು. </p><p><b>ವೃತ್ತಿಜೀವನ: </b>ನೀವು ಸಾರ್ವಜನಿಕ ಕಣ್ಣಿನಲ್ಲಿ ಮಹತ್ವಾಕಾಂಕ್ಷೆಯ ಮತ್ತು ಸಾಮಾನ್ಯವಾಗಿ ಯಶಸ್ವಿಯಾಗಿದ್ದಾರೆ.ನೀವು ಇತರರಿಗೆ ಸ್ಫೂರ್ತಿ ನೀಡುವುದು. ಪರಿಣಾಮವಾಗಿ ನೀವು ಮಹಾನ್ ವ್ಯವಸ್ಥಾಪಕರು, ನಿರ್ವಾಹಕರು ಮತ್ತು ವ್ಯಾಪಾರಿಸರ್ಕಾರಿ ಉದ್ಯೋಗಗಳು ಮತ್ತೊಂದು ಉತ್ತಮ ಆಯ್ಕೆಯಾಗಿದೆ.</p>
 NAMANK_DESC_TEXT9 = <p>ಸ್ವಭಾವತಃ ನೀವು ಬಲವಾದ ಇಚ್ಛೆ ಮತ್ತು ಧೈರ್ಯಶಾಲಿ ವ್ಯಕ್ತಿ. ನೀವು ತುಂಬಾ ಬಿಸಿ ತಲೆಯವರು  ಆದರೆ ಕಲಹ ಮತ್ತು ವಿರೋಧವನ್ನು ಜಯಿಸಬಹುದು. ಇತರರು ನಿನಗೆ ವಿರುದ್ಧವಾಗಿ ನಿಂತರೂ ಸಹ ನೀವು ನಿಮ್ಮನ್ನು ಪ್ರೀತಿಸುತ್ತೀರಿ  ಮತ್ತು ಗರವಿಸುತ್ತೀರಿ . ನಿಮ್ಮ ಸ್ವಂತ ಭಾಗ್ಯಕ್ಕೆ ನೀವು ಮುಖ್ಯಸ್ಥರಾಗಬೇಕೆಂದು ಬಯಸುತ್ತೀರಿ ಮತ್ತು ಆದ್ದರಿಂದ ನೀವು ಸುಲಭವಾಗಿ ಉತ್ತಮ ನಾಯಕರಾಗಬಹುದು. ನೀವು ತುಂಬಾ ಮಾನವೀಯ ವ್ಯಕ್ತಿಯಾಗಿದ್ದು ನಿಮ್ಮೊಂದಿಗೆ ನಿಮ್ಮ ಸ್ನೇಹಿತರನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಲ್ಲಿ ನಂಬಿ. ನೀವು ಯಾವಾಗಲೂ ಇತರರಿಗೆ ಸಹಾಯ ಮಾಡುವ ಅವಕಾಶ ನೀಡಲಾಗಿದೆ. ನಿಮ್ಮ ಕುಟುಂಬ ಮತ್ತು ಮನೆಯೊಂದಿಗೆ ಬಲವಾಗಿ ಸಂಪರ್ಕ ಸಾಧಿಸಿ ಮತ್ತು ಅವರೊಂದಿಗೆ ಸಮಯ ಕಳೆಯಲು ಆನಂದಿಸಿ.</p><p><b>ವೃತ್ತಿಜೀವನ: </b>ಮಿಲಿಟರಿ, ರಾಜಕೀಯ, ಬೋಧನೆ ಮತ್ತು ಸಾಮಾಜಿಕ ಸೇವೆಗಳು ನಿಮಗಾಗಿ ಕೆಲಸ ಮಾಡುತ್ತವೆ.</p>
