 NAMANK_TEXT = ಬ್ರಹ್ಮಾಂಡದ ಶಕ್ತಿ ನಿಮ್ಮ ಹೆಸರು ಸಂಖ್ಯೆಯನ್ನು ಪರಿಗಣಿಸಿ ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಜೀವನ ರಚನೆಯನ್ನು ನಿರ್ಧರಿಸುತ್ತದೆ. ನಾಮಾಂಖ ಹೆಸರು ಸಂಖ್ಯೆ ನಿಮ್ಮ ಪೂರ್ಣ ಜನನ ಹೆಸರಿನಲ್ಲಿರುವ ಎಲ್ಲಾ ಅಕ್ಷರಗಳಿಂದ ವ್ಯುತ್ಪನ್ನವಾಗಿದೆ ಅಥವಾ ಅಭಿವ್ಯಕ್ತಿ ಅಥವಾ ಹೆಸರು ಸಂಖ್ಯೆ ಎಂದು ಕರೆಯಲ್ಪಡುತ್ತದೆ. ಈ ಜೀವಿತಾವಧಿಯಲ್ಲಿ ನಿಮ್ಮ ವಿಲೇವಾರಿಗಳಲ್ಲಿ ಪ್ರತಿಭೆ ಮತ್ತು ವರ್ತನೆಗಳನ್ನು ವಿವರಿಸುವ ಸಂಖ್ಯೆ ಇದು, ನೀವು ಅವುಗಳನ್ನು ಅಭಿವೃದ್ಧಿಪಡಿಸಲು ಮತ್ತು ಬಳಸಲು ಆರಿಸಿದರೆ. ನಿಮ್ಮ ಹೆಸರು ನಿಮ್ಮ ನಿಜವಾದ ಕಂಪನ,ನಿಮ್ಮ ಆತ್ಮದ ಮಧುರ ಸಮಯದಲ್ಲಿ ಅದು ಆ ಬಾಗಿಲನ್ನು ಹಾದುಹೋಗಿ ಈ ಜಗತ್ತಿನಲ್ಲಿ ಪ್ರವೇಶಿಸಿತು. \n\nನಿಮ್ಮ ಹೆಸರಿನ ವಿಶ್ಲೇಷಣೆ @@userName$, ನಿಮ್ಮ ನಾಮಂಕ್ ಅಥವಾ ಹೆಸರು ಸಂಖ್ಯೆ @@namamkNumber$ ಎಂದು ಸೂಚಿಸುತ್ತದೆ. ಹೆಸರು ಸಂಖ್ಯೆ @@namamkNumber$ ಯ ಕೆಲವು ಮೂಲಭೂತ ಗುಣಲಕ್ಷಣಗಳ ಮೂಲಕ ನಾನು ನಿಮ್ಮನ್ನು ನೋಡೋಣ .
 MULANK_TEXT = @@userName$, ಸಂಖ್ಯಾಶಾಸ್ತ್ರದಲ್ಲಿ ನಿಮ್ಮ ಪ್ರಮುಖ ಸಂಖ್ಯೆ ನೀವು ಜನಿಸಿದ ತಿಂಗಳ ದಿನಾಂಕವಾಗಿದೆ. ಈ ಸಂಖ್ಯೆ ನಿಮ್ಮ ಪಾತ್ರ, ವ್ಯಕ್ತಿತ್ವ, ಮತ್ತು ಪ್ರತ್ಯೇಕತೆಯ ಪ್ರಮುಖ ಅಂಶಗಳನ್ನು ಗುರುತಿಸುತ್ತದೆ. ಈ ಸಂಖ್ಯೆ ನಿಮ್ಮ ಒಟ್ಟಾರೆ ಇರುವಿಕೆಯ ಮೂಲ ಅಂಶಗಳನ್ನು ನಿರ್ಧರಿಸುತ್ತದೆ.ನೀವು ಗಂಭೀರ ಅಥವಾ ನಾಚಿಕೆಯಾಗಿದ್ದೀರಾ, ಒಬ್ಬ ನಾಯಕ ಅಥವಾ ಅನುಯಾಯಿಯಾಗಿದ್ದೀರಾ. ಇದಕ್ಕೆ ಕಾರಣವೆಂದರೆ ಪ್ರತಿ ಸಂಖ್ಯೆಯು ತನ್ನ ಸ್ವಂತ ಸ್ವಭಾವ ಮತ್ತು ವೈಯಕ್ತಿಕ ಕಂಪನವನ್ನು ಹೊಂದಿದೆ. ಎಚ್ಚರಿಕೆಯಿಂದ ವಿಶ್ಲೇಷಣೆ ಮಾಡಿದ ನಂತರ, ನಾವು ನಿಮ್ಮ ಸಂಖ್ಯಾಶಾಸ್ತ್ರದ ಜನನ ಸಂಖ್ಯೆಯನ್ನು ಕೆಳಗಿನಂತೆ ಮಾಡಿದ್ದೇವೆ:ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆ @@radicalNumber$ ಆಗಿದೆ.
 DESTINY_TEXT1 = ನೀವು ಮಹಾನ್ ನಾಯಕತ್ವ ಕೌಶಲಗಳನ್ನು ಹೊಂದಿರುವ ಮಹತ್ವಾಕಾಂಕ್ಷಿ ವ್ಯಕ್ತಿ. ಪರಿಣಾಮವಾಗಿ, ನೀವು ಜನರೊಂದಿಗೆ ಚೆನ್ನಾಗಿ ಇರುತ್ತೀರಾ , ಅವರ ಬೆಂಬಲವನ್ನು ಪಡೆಯುವುದು, ಮತ್ತು ನಿಮ್ಮ ಗುರಿಗಳನ್ನು ಪೂರೈಸುವ ಸಾಮರ್ಥ್ಯವನ್ನು ಹೊಂದಿವೆ. ಸೀಮಿತವಾಗಿರುವುದನ್ನು ನೀವು ಇಷ್ಟಪಡುತ್ತೀರಿ ಮತ್ತು ಯಾವಾಗಲೂ ನಿಮ್ಮ ಸಹಾಯಕ್ಕಾಗಿ ಅನೇಕ ಸ್ನೇಹಿತರು ಇರುತ್ತಾರೆ. ಆರ್ಥಿಕವಾಗಿ, ನೀವು ಏಳಿಗೆ, ಆದರೆ ನೀವು ಖುಷಿ ಮತ್ತು ಖುಷಿಗಳನ್ನು ಪ್ರೀತಿಸುತ್ತಾಳೆ ಮತ್ತು ವಾಸಿಸುತ್ತಿದ್ದಾರೆ. ರಾಜಕೀಯ ಕ್ಷೇತ್ರದಲ್ಲಿ ಯಶಸ್ಸು ನಿಮಗೆ ಸಾಧ್ಯವಿದೆ ಮತ್ತು ಸರ್ಕಾರಿ ಕ್ಷೇತ್ರದಿಂದ ಪ್ರಯೋಜನ ಪಡೆಯುವ ಉತ್ತಮ ಸಾಧ್ಯತೆಯಿದೆ. ಭಾಗ್ಯಾಂಕ ಸಂಖ್ಯೆ 1 ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ್ದರಿಂದ , ನೀವು ಜನರಿಂದ ಗೌರವವನ್ನು ಪಡೆಯಲು ಬಯಸುತ್ತೀರಿ ಮತ್ತು ನೀವು ಅದನ್ನು ಪಡೆಯುತ್ತೀರಿ. ಹೇಗಾದರೂ, ನೀವು ಅತಿಯಾದ ಖರ್ಚು ತಪ್ಪಿಸಲು ಮತ್ತು ಜೂಜಿನ ಅಥವಾ ಬೆಟ್ಟಿಂಗ್ ತೊಡಗಿಸಿಕೊಳ್ಳಿ ಮಾಡಬೇಕು. ನಿಮ್ಮ ಸ್ವಾತಂತ್ರ್ಯವನ್ನು ಬಳಸಿಕೊಳ್ಳುವಲ್ಲಿ ಎಚ್ಚರಿಕೆಯಿಂದ ವ್ಯಾಯಾಮ ಮಾಡಿ, ಹೆಚ್ಚು ಅಪಾಯವನ್ನು ತೆಗೆದುಕೊಳ್ಳಬೇಡಿ, ಮತ್ತು ನಿಮ್ಮ ನೀತಿಗಳು ಮತ್ತು ನೈತಿಕತೆಯನ್ನು ಅನುಸರಿಸಬೇಡಿ.
 DESTINY_TEXT2 = ನೀವು ಪಾಲುದಾರಿಕೆಯಲ್ಲಿ ಕೆಲಸ ಮಾಡಲು ಇಷ್ಟಪಡುವ ಬಹಳ ಶಾಂತ, ಸ್ನೇಹಪರ ಮತ್ತು ಚೆನ್ನಾಗಿ ಇಷ್ಟಪಡುವ ವ್ಯಕ್ತಿ. ಒಂದು ಕಾಲ್ಪನಿಕ, ಪ್ರಣಯ ಮತ್ತು ಸೃಜನಾತ್ಮಕ ವ್ಯಕ್ತಿ,ನೀವು ಯಾವಾಗಲೂ ಮಹಿಳೆಯರಿಗೆ ಗೌರವಿಸಬೇಕು. ಹೇಗಾದರೂ, ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ಬಲವಾದ ಮಾನಸಿಕ ಸಾಮರ್ಥ್ಯದ ಕೊರತೆಯನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ, ಈ ಕಾರಣದಿಂದಾಗಿ ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ನಿಮ್ಮ ಕಾರ್ಯಗಳನ್ನು ಅಪೂರ್ಣವಾಗಿ ಬಿಡಬಹುದು. ದೈಹಿಕವಾಗಿ, ನೀವು ಸ್ವಲ್ಪ ದುರ್ಬಲರಾಗಿದ್ದೀರಿ ಮತ್ತು ಇತರರು ಸುಲಭವಾಗಿ ನಿಮ್ಮಿಂದ ಲಾಭ ಪಡೆಯುತ್ತಾರೆ. ಆದ್ದರಿಂದ, ನಿಮ್ಮನ್ನು ನಿಭಾಯಿಸಲು ಮತ್ತು ನಿಮ್ಮ ಆತ್ಮ ವಿಶ್ವಾಸವನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಲು ನೀವು ಕಲಿತುಕೊಳ್ಳಬೇಕು. ಅದೇ ಧಾಟಿಯಲ್ಲಿ, ನೀವು ಕೈಯಲ್ಲಿ ತೆಗೆದುಕೊಳ್ಳುವ ಎಲ್ಲಾ ಕಾರ್ಯಗಳನ್ನು ಪೂರ್ಣಗೊಳಿಸಿ ಮತ್ತು ಸಮಸ್ಯೆಗಳ ಮುಖಾಂತರ ಶಾಂತವಾಗಿ ಉಳಿಯಿರಿ. ಅದಕ್ಕೂ ಹೆಚ್ಚುವರಿಯಾಗಿ, ನೀವು ಸುತ್ತುವರಿಯುವ ಜನರನ್ನು ಎಚ್ಚರಿಸಬೇಕು.
 DESTINY_TEXT3 = ನೀವು ಇತರರಿಗೆ ಸ್ಫೂರ್ತಿಯಾಗಿದ್ದೀರಿ ಮತ್ತು ನಿಮ್ಮ ಸಂವಹನ ಕೌಶಲ್ಯವು ನಿಮ್ಮ ಅತ್ಯುತ್ತಮ ಗುಣಲಕ್ಷಣವಾಗಿದೆ. ಬಹುಮುಖ ಪ್ರತಿಭೆಗಳನ್ನು ನಿಮ್ಮೊಳಗೆ ಸಂಯೋಜಿಸಲಾಗಿದೆ, ಮತ್ತು ಅದಕ್ಕಾಗಿಯೇ ನೀವು ಒಬ್ಬರ ಸಹಾಯಕರಾಗಿರಲು ಇಷ್ಟವಿಲ್ಲ. ನೀವು ಶಿಸ್ತಿನ ಮತ್ತು ಬುದ್ದಿವಂತರಾಗಿದ್ದೀರಿ, ನಿಮ್ಮ ಪ್ರೀತಿಯು ಶುದ್ಧ, ಮತ್ತು ನೀವು ಯಾವಾಗಲೂ ನ್ಯಾಯವನ್ನು ಮೆಚ್ಚುತ್ತೀರಿ. ಇದಲ್ಲದೆ, ನೀವು ಒಂದು ಕಾಲ್ಪನಿಕ ವ್ಯಕ್ತಿ, ಯಾರು ಉತ್ತಮ ಹಾಸ್ಯ ಪ್ರಜ್ಞೆ ಮತ್ತು ಪ್ರಾಯೋಗಿಕ ದೃಷ್ಟಿಕೋನವನ್ನು ಹೊಂದಿದ್ದಾರೆ. ನೀವು ವಿಪರೀತ ಖರ್ಚುಗಳನ್ನು ತಪ್ಪಿಸಬೇಕು, ಅಸೂಯೆ ಸ್ವಭಾವವನ್ನು ತಪ್ಪಿಸಲು ಪ್ರಯತ್ನಿಸಿ, ಮತ್ತು ಶ್ರೀಮಂತ ಅಥವಾ ಬುದ್ಧಿವಂತರಾಗಲು ಏನನ್ನಾದರೂ ಹೊರದಬ್ಬಬೇಡಿ. ಇದಲ್ಲದೆ, ನಿಮ್ಮ ಕೋಪ ಮತ್ತು ದ್ವಿರೂಪದ ವ್ಯಕ್ತಿತ್ವವನ್ನು ನೀವು ನಿಯಂತ್ರಿಸಬೇಕಾಗುತ್ತದೆ, ಹಾಗೆಯೇ ತಪ್ಪು ಕಂಪೆನಿಯಿಂದ ದೂರವಿರಿ ಏಕೆಂದರೆ ಅವರು ನಿಮಗಾಗಿ ಹಾನಿಕಾರಕವೆಂದು ಸಾಬೀತುಪಡಿಸುತ್ತಾರೆ.
 DESTINY_TEXT4 = ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ಸಾಕಷ್ಟು ಏರಿಳಿತಗಳು ಇವೆ, ಮತ್ತು ಅನೇಕ ಹಠಾತ್ ಘಟನೆಗಳು ಹಾಗೆಯೇ ಸಂಭವಿಸುತ್ತವೆ, ನಿಮಗಾಗಿ ಒಳ್ಳೆಯ ಮತ್ತು ಕೆಟ್ಟ ಫಲಿತಾಂಶಗಳನ್ನು ಅವರೊಂದಿಗೆ ಉಂಟುಮಾಡುತ್ತದೆ. ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ಯಶಸ್ಸಿನ ಮಹತ್ವದ ಮಟ್ಟವನ್ನು ನೀವು ಸುಲಭವಾಗಿ ತಲುಪಬಹುದು, ಆದರೆ ಮತ್ತೊಂದೆಡೆ ಪಿತೂರಿಗಳೂ ಸಹ ನಿಮ್ಮನ್ನು ಕೆಳಗೆ ತರಬಹುದು. ನಿಮ್ಮ ದೃಷ್ಟಿಕೋನವು ನಿಮ್ಮನ್ನು ಆಕರ್ಷಣೆಯ ಕೇಂದ್ರವಾಗಿ ಮಾಡುವ ಇತರರಿಂದ ಭಿನ್ನವಾಗಿದೆ.  ಬಂಡಾಯಗಾರನೊಬ್ಬ, ನೀವು ನಿರಂತರ ಕಾನೂನು ಮತ್ತು ಸಂಪ್ರದಾಯಗಳನ್ನು ವಿರೋಧಿಸುತ್ತೀರಿ ಮತ್ತು ನಿರಂತರವಾಗಿ ಹೊಸ ನಿಯಮಗಳನ್ನು ರಚಿಸಲು ಪ್ರಯತ್ನಿಸುತ್ತಿದ್ದೀರ. ನೀವು ತೀಕ್ಷ್ಣ ಮನಸ್ಸಿನಿಂದ ಬುದ್ಧಿವಂತ ವ್ಯಕ್ತಿಯಾಗಿದ್ದೀರಿ, ಆದ್ದರಿಂದ ನೀವು ತುಂಬಾ ಸೂಕ್ಷ್ಮ ಮತ್ತು ಭಾವನಾತ್ಮಕವಾಗಿರುವುದನ್ನು ತಪ್ಪಿಸಬೇಕು, ಜೊತೆಗೆ ನಿರಾಶಾವಾದಿ ಚಿಂತನೆಯಿಂದ ದೂರವಿರಿ. ಕೇವಲ ಅವಕಾಶಗಳನ್ನು ಗುರುತಿಸಲು ನೀವು ಕಲಿತುಕೊಳ್ಳಬೇಕು, ಆದರೆ ನಿಮ್ಮ ಆಕ್ರಮಣಶೀಲತೆಯನ್ನು ನಿಯಂತ್ರಣದಲ್ಲಿಟ್ಟುಕೊಳ್ಳಬೇಕು. 
 DESTINY_TEXT5 = ಉತ್ತಮ ಸ್ನೇಹಿತ ಮತ್ತು ಮಾನಸಿಕ ಬಲವಾದ ವ್ಯಕ್ತಿ, ನೀವು ಬೆಟ್ಟಿಂಗ್, ಮಾರುಕಟ್ಟೆಗಳು, ಜೂಜಿನ ಮತ್ತು ವಹಿವಾಟಿನಲ್ಲಿ ಆಸಕ್ತಿಯನ್ನು ಹೊಂದಬಹುದು, ಮತ್ತು ನೀವು ವ್ಯಾಪಾರವನ್ನು ತುಂಬಾ ಯಶಸ್ವಿಯಾಗಿ ಚಲಾಯಿಸಬಹುದು. ಇತರರ ಮನವೊಲಿಸಲು ಮತ್ತು ನಿಮ್ಮ ಕೆಲಸಗಳನ್ನು ಪೂರೈಸಲು ಸಹಾಯ ಮಾಡುವಂತಹ ಮಾತನಾಡುವ ಅಭ್ಯಾಸವನ್ನು ನೀವು ಹೊಂದಿದ್ದೀರಿ. ಆದಾಗ್ಯೂ, ಹಣವನ್ನು ಗಳಿಸುವ ಸಲುವಾಗಿ ನಿಮ್ಮ ನೈತಿಕತೆಗಳ ಕಡೆಗೆ ನೀವು ಕುರುಡನನ್ನಾಗಿ ಮಾಡಬಹುದು. ನಿಮ್ಮ ಶಕ್ತಿಯನ್ನು ಉಪಯೋಗಿಸಲು ನೀವು ಗಮನಹರಿಸಬೇಕು ಮತ್ತು ಯಾವುದೇ ಅಸಂತೋಷದಿಂದ ದೂರವಿರಿ.  ನಿಮ್ಮ ಗುಪ್ತಚರ ಮತ್ತು ಬುದ್ಧಿವಂತಿಕೆಯಿಂದಾಗಿ ನಿಮ್ಮ ಆರ್ಥಿಕ ಸ್ಥಿತಿ ಉತ್ತಮವಾಗಿರುತ್ತದೆ, ಮತ್ತು ನೀವು ವಿಶೇಷವಾಗಿ ಯಾವುದೇ ಉದ್ಯಮ ಪ್ರಯತ್ನಗಳಲ್ಲಿ ಪ್ರಗತಿ ಹೊಂದುತ್ತೀರಿ.
 DESTINY_TEXT6 = ಭಾಗ್ಯನಕ  6 ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ ನಂತರ, ನೀವು ಪ್ರತಿಯೊಬ್ಬರ ಕಣ್ಣಿನ ಆಪಲ್ ಮತ್ತು ಸೌಮ್ಯತೆ ಸದ್ಗುಣ ನಿಮ್ಮೊಳಗೆ ಇರುತ್ತದೆ. ಒಬ್ಬ ಸಹಾನುಭೂತಿಯ ವ್ಯಕ್ತಿ, ನೀವು ಇತರರನ್ನು ನೋಡಿಕೊಳ್ಳಲು ಮತ್ತು ಕಲಾತ್ಮಕವಾಗಿರುವುದರ ಜೊತೆಗೆ ನೀವು ಸೃಜನಶೀಲರಾಗಿದ್ದೀರಿ. ಬಹುಮುಖ ರೀತಿಯಲ್ಲಿ ನೀವು ಆಕರ್ಷಕವಾಗಿರುತ್ತೀರಿ, ಆದರೆ, ಕೆಲವೊಮ್ಮೆ ನೀವು ನಿಮ್ಮ ಕೆಲಸದ ಕಡೆಗೆ ಮೀಸಲಾಗಿಲ್ಲ,  ಕಾರಣ ನೀವು ತುಂಬಾ ಬಳಲುತ್ತಿದ್ದಾರೆ ಮಾಡಬೇಕು. ಹುಟ್ಟಿನಿಂದಲೇ ರೋಮ್ಯಾಂಟಿಕ್, ಸುಂದರ ವಸ್ತುಗಳ ಮತ್ತು ಮನರಂಜನೆಗಾಗಿ ನೀವು ಪ್ರೀತಿಯನ್ನು ಹೊಂದಿದ್ದೀರಿ. ಹೇಗಾದರೂ, ನೀವು ಯಾರನ್ನಾದರೂ ಕುರುಡು ನಂಬಿಕೆಯನ್ನು ಹೊಂದಿರಬಾರದು ಅಥವಾ ಬೇಗನೆ ವರ್ತಿಸುವುದನ್ನು ತಡೆಯಬೇಕು. ಇದಲ್ಲದೆ, ಮದ್ಯ ಮತ್ತು ಮಾದಕ ಪದಾರ್ಥಗಳಿಂದ ದೂರವಿರಿ ಮತ್ತು ಸಾಮಾಜಿಕ ಚಟುವಟಿಕೆಯಲ್ಲಿ ಹೆಚ್ಚಿನ ಆಸಕ್ತಿಯನ್ನು ತೋರಿಸಬೇಡಿ.
 DESTINY_TEXT7 = ನೀವು ಸಾಕಷ್ಟು ಆಧ್ಯಾತ್ಮಿಕರಾಗಿರಬಹುದು ಮತ್ತು ಸತ್ಯದ ಹುಡುಕಾಟವನ್ನು ನಡೆಸುವ ಮತ್ತು ಯಾವುದೇ ಕೆಲಸವನ್ನು ವಿಶ್ಲೇಷಿಸುವ ಯಾರೋ ಆಗಿರಬಹುದು. ದೈವಿಕ ದೃಷ್ಟಿಯ ಮಾಲೀಕರಾಗಿ, ನೀವು ಸುಲಭವಾಗಿ ಅರ್ಥಮಾಡಿಕೊಳ್ಳಬಹುದು ಮತ್ತು ಇತರರಿಗೆ ಸಹಾಯ ಮಾಡಬಹುದು. ನೀವು ಜೀವನದ ಮೌಲ್ಯಗಳನ್ನು ಇತರರಿಗೆ ವಿವರಿಸುವ ಕಡೆಗೆ ಕೆಲಸ ಮಾಡಬಹುದು ಮತ್ತು ಹಲವಾರು ಉತ್ತಮ ಸ್ಥಳಗಳು ಮತ್ತು ದೇಶಗಳಿಗೆ ಪ್ರಯಾಣಿಸಬಹುದು. ಸುತ್ತಮುತ್ತಲಿನ ಸಕಾರಾತ್ಮಕ ಶಕ್ತಿಯ ವಾತಾವರಣದೊಂದಿಗೆ, ನೀವು ಇತರರನ್ನು ಹೆಚ್ಚು ಪ್ರಭಾವ ಬೀರಲು ಸಾಧ್ಯವಾಗುತ್ತದೆ. ಹೇಗಾದರೂ, ನೀವು ಪ್ರಕ್ಷುಬ್ಧ ಭಾವನೆ  ಮತ್ತು ಎಲ್ಲಾ ಬಗ್ಗೆ  ತುಂಬಾ ಆಳವಾಗಿ ಯೋಚಿಸುವುದನ್ನು ನೀವು ತಪ್ಪಿಸುವ ಕೆಲಸ ಮಾಡಬೇಕು. ಭೌತಿಕ ಸಂತೋಷಗಳನ್ನು ಕಡೆಗೆ ನೀವು ಅಸಹಜವಾಗಿರಬಾರದು ಎಂಬುದು ಸೂಕ್ತವಲ್ಲ ಮತ್ತು ನಿಮ್ಮ ಕೆಲಸ ಮತ್ತು ಚಿಂತನೆಯಲ್ಲಿ ನೀವು ಸಕ್ರಿಯರಾಗಿರಬೇಕಾಗುತ್ತದೆ. 
 DESTINY_TEXT8 = ನಿಮ್ಮ ಜೀವನದ ದೈಹಿಕ ಮತ್ತು ಆಧ್ಯಾತ್ಮಿಕ ಅಂಶಗಳಲ್ಲಿ ಉತ್ತಮ ಸಮತೋಲನವಿದೆ. ಪ್ರಬಲ ಮಹತ್ವಾಕಾಂಕ್ಷೆಯ ಗುರು, ನೀವು ಕ್ಷಮಿಸುವ ಮತ್ತು ದಾರ್ಶನಿಕರಾಗಿದ್ದೀರಿ. ನಿಮಗೆ ದೊಡ್ಡ ಹೃದಯವಿದೆ ಆದರೆ ನೀವು ಆಗಾಗ್ಗೆ ದುಃಖ ಮತ್ತು ಏಕಾಂಗಿತನವನ್ನು ಕಂಡುಕೊಳ್ಳುತ್ತೀರಿ, ಮತ್ತು ಪರಿಣಾಮವಾಗಿ, ನೀವು ತುಂಬಾ ಸೂಕ್ಷ್ಮವಾಗಿರುತ್ತೀರಿ. ಈ ಜೀವನದಲ್ಲಿ, ಭಾಗ್ಯಾಂಕ  ಸಂಖ್ಯೆ  8 ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ,  ನೀವು ತುಂಬಾ ಯಶಸ್ವಿಯಾಗಬಹುದು ಅಥವಾ ಅತ್ಯಂತ ಯಶಸ್ವಿಯಾಗುತ್ತೀರಿ. ಸ್ವಯಂ-ನೀತಿವಂತ ವ್ಯಕ್ತಿ, ಸಮರ್ಪಣೆಯ ಗುಣವು ನಿಮಗೆ ಒಂದು ಪ್ರಮುಖ ಸಾಧನೆಯಾಗಿದೆ. ನೀವು ಒತ್ತಡದ ಮುಂದೆ ಮೊಣಕಾಲು ಬಾಗದಿದ್ದರೂ, ನಿಮ್ಮ ಕೆಲಸಕ್ಕೆ ಸಂಬಂಧಿಸಿದ ವಿಷಯಗಳಲ್ಲಿನೀವು ನಿಮ್ಮನ್ನು ವ್ಯಕ್ತಪಡಿಸಬೇಕು. ಆದರೂ, ಯಾವಾಗಲೂ ನಿಮ್ಮ ಹಂತದಲ್ಲಿ ಸಿಕ್ಕಿಹಾಕಿಕೊಳ್ಳುವುದು ಮಾತ್ರ ತಪ್ಪು ಆಗಿರಬಹುದು. ಜೊತೆಗೆ  ಇತರರನ್ನು ಸಹ ಕೇಳಿ  ಮತ್ತು ನೀವು ಎಲ್ಲಿಯಾದರೂ ತಪ್ಪು ಎಂದು ಭಾವಿಸಿದರೆ, ಅದನ್ನು ಅಂಗೀಕರಿಸಿ. ನಿಮ್ಮ ಭವಿಷ್ಯದ ಬಗ್ಗೆ ಎಲ್ಲ ನಿರಾಶಾವಾದಿ ಆಲೋಚನೆಗಳು ತೊಡೆದುಹಾಕಲು ಮತ್ತು ಒಂಟಿತನಕ್ಕೆ ಕಾರಣವಾಗುವ ಸಂದರ್ಭಗಳಲ್ಲಿ ದೂರವಿರಿ. 
 DESTINY_TEXT9 = ನಿಮ್ಮ ಜೀವನದ ಆರಂಭದಲ್ಲಿ ನೀವು ತೊಂದರೆಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗಬಹುದು, ಆದರೆ ನೀವು ಒಳ್ಳೆಯ ರಾಜಕಾರಣಿಯಾಗಲು ಹೊರಬರಬಹುದು. ನೀವು ಸಾಕಷ್ಟು ಕಲಾತ್ಮಕ ಮತ್ತು ಮುಕ್ತ ಆಲೋಚನೆ ಮಾಡಬಹುದು ಮತ್ತು ನೀವು ಶೀಘ್ರವಾಗಿ ಕೆಲಸ ಮಾಡುತ್ತೀರಿ. ನೀವು ಮಹಾನ್ ಸಾಂಸ್ಥಿಕ ಕೌಶಲ್ಯ ಮತ್ತು ಶಕ್ತಿಯನ್ನು ಹೊಂದಿರುವಾಗ, ಆದರೆ ಏನಾದರೂ ದೀನತೆ ಸರಿಯಾಗಿಲ್ಲ.ಆಗಾಗ ಸಂಭವಿಸುವ ವಿಷಯಗಳ ಬಗ್ಗೆ ನೀವು ಒಂದು ಇಚ್ಛೆ ಅಥವಾ ಅಂತಃಪ್ರಜ್ಞೆಯನ್ನು ಪಡೆಯುತ್ತೀರಿ. ನೀವು ಪ್ರಯೋಜನಕಾರಿ ಮತ್ತು ಪ್ರಕೃತಿಯಲ್ಲಿ ಉದಾರವಾಗಿದ್ದರೂ, ನಿಮ್ಮ ಕೋಪವನ್ನು ನೀವು ಪರೀಕ್ಷಿಸಬೇಕಾಗುತ್ತದೆ. ಹೆಚ್ಚುವರಿಯಾಗಿ, ನಿಮ್ಮ ಹಿರಿಯ ಅಧಿಕಾರಿಗಳನ್ನು ನೀವು ತೊಂದರೆಗೊಳಿಸುವುದಿಲ್ಲ ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ. ನೀವು ಆರ್ಥಿಕವಾಗಿ ವೃದ್ಧಿಯಾಗುತ್ತೀರಿ, ಆದರೆ ಪ್ರತಿಕೂಲ ಪರಿಸ್ಥಿತಿಯನ್ನು ತಪ್ಪಿಸಲು ಅಥವಾ ಎದುರಿಸಲು ನೀವು ಯಾವಾಗಲೂ ಸಿದ್ಧರಾಗಿರಬೇಕು.
 PLACE_TEXT1 = ಪೂರ್ವ ದಿಕ್ಕಿನಲ್ಲಿ ನಿಮಗೆ ಯಶಸ್ಸು ಮತ್ತು ಪುರಸ್ಕಾರಗಳು ದೊರೆಯುತ್ತವೆ. ಆದ್ದರಿಂದ, ನಿಮ್ಮ ಮನೆಯ ಮುಖ್ಯ ಬಾಗಿಲು ಈ ನಿರ್ದೇಶನವನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ ಎಂದು ಖಚಿತಪಡಿಸಿಕೊಳ್ಳಿ. ಅಲ್ಲದೆ, ನಿಮ್ಮ ಕೆಲಸ ಕೂಡ ಈ ದಿಕ್ಕಿನಲ್ಲಿರಬಹುದು, ನಂತರ ಸಮೃದ್ಧಿ ಖಂಡಿತವಾಗಿಯೂ ನಿಮ್ಮ ಜೀವನವನ್ನು ಪ್ರವೇಶಿಸುತ್ತದೆ. ಭಾರತ, ಪಾಕಿಸ್ತಾನ, ಟರ್ಕಿ, ಬರ್ಮಾ, ಅಫಘಾನಿಸ್ತಾನ ಮತ್ತು ಹಾಂಗ್ ಕಾಂಗ್ ದೇಶಗಳು ಎಲ್ಲಾ ಸಂದರ್ಭಗಳಲ್ಲಿ ನಿಮಗೆ ಅನುಕೂಲಕರವೆಂದು ಸಾಬೀತುಪಡಿಸುತ್ತವೆ. 
 PLACE_TEXT2 = ವಾಯವ್ಯ ದಿಕ್ಕಿನಲ್ಲಿ (ವಾಯ್ಯ್ಯ ಕೊನೆ) ನಿಮಗೆ ಉತ್ತಮವೆಂದು ಸಾಬೀತುಪಡಿಸುತ್ತದೆ, ಮತ್ತು ಈ ದಿಕ್ಕಿನಲ್ಲಿ ಮಾಡಿದ ಯಾವುದೇ ಪ್ರಯತ್ನಗಳು ನಿಮಗೆ ಉತ್ತಮವಾದ ಸಾಧನೆಗಳನ್ನು ತರುತ್ತವೆ ಮತ್ತು ನಿಮ್ಮನ್ನು ಹೊಸ ಯಶಸ್ಸಿನ ಎತ್ತರಕ್ಕೆ ತರುತ್ತವೆ. ಅನುಕೂಲಕರವಾಗಿರುವ ಸ್ಥಳಗಳಿಗೆ ಬರುತ್ತಿದೆ; ಲಂಡನ್, ಟಿಬೆಟ್, ಫ್ರಾನ್ಸ್, ಜರ್ಮನಿ, ಶ್ರೀಲಂಕಾ, ದೆಹಲಿ, ಮತ್ತು ಕಾಬುಲ್ ನಿಮಗೆ ಪ್ರಯೋಜನಕಾರಿ ಎಂದು ಸಾಬೀತುಪಡಿಸುತ್ತದೆ. 
 PLACE_TEXT3 = ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆ 3 ಆಗಿರುವುದರಿಂದ, ಈಶಾನ್ಯ ದಿಕ್ಕಿನಲ್ಲಿ (ಇಶನ್ ಕೋನ್) ನಿಮಗೆ ಉತ್ತಮ ಅದೃಷ್ಟ, ಸಮೃದ್ಧಿ ಮತ್ತು ಸಂಪತ್ತನ್ನು ತರುವುದು. ಹೆಚ್ಚುವರಿಯಾಗಿ, ಯುಕೆ, ನೇಪಾಳ, ಹಾಲೆಂಡ್, ಡೆನ್ಮಾರ್ಕ್, ಭೂತಾನ್ ಮುಂತಾದ ಸ್ಥಳಗಳಲ್ಲಿ ವಾಸಿಸುವ ಅಥವಾ ಕೆಲಸ ಮಾಡುವುದು ನಿಮಗೆ ಯಶಸ್ಸನ್ನು ತರುತ್ತದೆ.
 PLACE_TEXT4 = ನೀವು ಕೆಲಸ ಮಾಡುವ ಅಥವಾ ದಕ್ಷಿಣದ ದಿಕ್ಕಿನಲ್ಲಿ (ನಾಯರ್ತ್ಯ ಕೋಣ ) ವಾಸಿಸುವ ಪ್ರಯತ್ನಗಳನ್ನು ಮಾಡಬೇಕಾಗಿದೆ ಏಕೆಂದರೆ ಅದು ನಿಮಗೆ ಹೆಚ್ಚು ಪ್ರಯೋಜನಕಾರಿಯಾಗಿದೆ. ಅದೇ ಧಾಟಿಯಲ್ಲಿ, ಇಟಲಿ, ಕುವೈತ್, ಹಂಗೇರಿ, ವಾಷಿಂಗ್ಟನ್, ಮುಂಬೈಗಳು ನಿಮಗಾಗಿ ಮಂಗಳಕರವಾಗಿರುತ್ತವೆ ಮತ್ತು ನಿಮಗೆ ಅನುಕೂಲಕರವಾದ ಫಲಿತಾಂಶಗಳನ್ನು ತರುತ್ತವೆ. 
 PLACE_TEXT5 = ನೀವು ರೂಟ್ ಸಂಖ್ಯೆ 5 ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದಂತೆ ಉತ್ತರ ನಿಮಗೆ ಹೆಚ್ಚು ಅನುಕೂಲಕರವಾದ ದಿಕ್ಕಿನಲ್ಲಿದೆ. ಆದ್ದರಿಂದ, ಈ ದಿಕ್ಕಿನಲ್ಲಿ ಕೆಲಸ ಮಾಡುವುದು ನಿಮಗೆ ಯಶಸ್ಸು, ಸಂತೋಷ, ಮತ್ತು ಸಮೃದ್ಧಿಯನ್ನು ತರುವುದು. ವಿಶೇಷವಾಗಿ, ಕೊರಿಯಾ, ಸೌದಿ ಅರೇಬಿಯಾ, ಸ್ಪೇನ್, ಅಮೇರಿಕಾ, ಗೋವಾ ಮತ್ತು ಪ್ರೇಗ್ಗಳು ನಿಮಗೆ ಬಹಳ ಮಂಗಳಕರವಾದ ಸ್ಥಳಗಳಾಗಿವೆ. 
 PLACE_TEXT6 = ಅಗ್ನಿಯಾ ಕೋಣೆ , ಅಂದರೆ, ಆಗ್ನೇಯ ದಿಕ್ಕಿನಲ್ಲಿ ನಿಮಗೆ ಯಶಸ್ಸು ಮತ್ತು ಅನುಕೂಲಕರ ಫಲಿತಾಂಶಗಳು ದೊರೆಯುತ್ತವೆ. ಆದ್ದರಿಂದ, ನಿಮ್ಮ ಕೆಲಸವನ್ನು ಈ ದಿಕ್ಕಿನಲ್ಲಿ ವಿಸ್ತರಿಸುವ ಪ್ರಯತ್ನಗಳನ್ನು ನೀವು ಮಾಡಬೇಕು. ಇದಲ್ಲದೆ, ಭಾರತ, ಇಂಡೋನೇಷ್ಯಾ, ವಿಯೆಟ್ನಾಂ, ಥೈಲ್ಯಾಂಡ್, ಸಿಂಗಾಪುರ್, ಮಲೇಶಿಯಾಗಳು ನಿಮಗೆ ಲಾಭ ಮತ್ತು ಪ್ರಶಂಸೆಯನ್ನು ತರುತ್ತವೆ.
 PLACE_TEXT7 = ಇಶನ್ ಕೋಣೆ ಅಥವಾ ಈಶಾನ್ಯ ದಿಕ್ಕಿನಲ್ಲಿ ನಿಮ್ಮ ರೂಟ್ ನಂಬರ್ 7 ರಂತೆ ನಿಮಗೆ ತುಂಬಾ ಅನುಕೂಲಕರವಾಗಿರುತ್ತದೆ. ಈ ದಿಕ್ಕಿನಲ್ಲಿರುವ ವ್ಯವಹಾರವನ್ನು ಕೆಲಸ ಮಾಡುವುದು ಅಥವಾ ಮಾಡುವುದು ನಿಮಗೆ ಯಶಸ್ಸನ್ನು ತರುತ್ತದೆ ಮತ್ತು ನಿಮಗಾಗಿ ಸಾಧನೆಗಳನ್ನು ಸಾಧಿಸುತ್ತದೆ. ಸ್ಥಳಗಳು ಗ್ರೀಸ್, ಸ್ಕಾಟ್ಲೆಂಡ್, ರೋಡ್ಸಿಯಾ, ಕಾಶ್ಮೀರ, ಮಾಸ್ಕೊ ಮತ್ತು ಬ್ಯಾಂಕಾಕ್ಗಳು ನಿಮಗೆ ಪ್ರಯೋಜನಕಾರಿ ಮತ್ತು ಮಂಗಳಕರವಾಗಿವೆ.
 PLACE_TEXT8 = ಜೀವನದಲ್ಲಿ ಮುಂದುವರಿಯಲು ಮತ್ತು, ಪಶ್ಚಿಮ ದಿಕ್ಕಿನಲ್ಲಿ ನಿಮಗೆ ಉತ್ತಮವಾಗಿದೆ. ನಿಮ್ಮ ಸ್ವಂತ ವ್ಯವಹಾರ ನಡೆಸಲು ನೀವು ಆಸಕ್ತಿ ಹೊಂದಿದ್ದರೆ, ನಂತರ ನೀವು ಈ ದಿಕ್ಕಿನಲ್ಲಿ ಅದನ್ನು ವಿಸ್ತರಿಸುವ ಪ್ರಯತ್ನಗಳನ್ನು ಮಾಡಬೇಕು ಮತ್ತು ಯಶಸ್ಸು ನಿಮ್ಮದಾಗಲಿದೆ. ಹೆಚ್ಚುವರಿಯಾಗಿ, ಚೀನಾ, ಮಲಾಶಿಯಾ, ಆಸ್ಟ್ರಿಯಾ, ಆಡಿಸ್ ಅಬಾಬಾ ನಿಮಗೆ ಪ್ರಮುಖ ಲಾಭದಾಯಕ ಸ್ಥಳಗಳಾಗಿವೆ, ಅದು ನಿಮಗೆ ಅದೃಷ್ಟ ಮತ್ತು ಸಾಧನೆ ತರುವುದು.
 PLACE_TEXT9 = ಜೀವನದಲ್ಲಿ ಯಶಸ್ಸು, ಸಂತೋಷ, ಮತ್ತು ಪ್ರಶಾಂತತೆಯನ್ನು ನಿಮಗೆ ತರುವ ನಿರ್ದೇಶನ ದಕ್ಷಿಣವಾಗಿದೆ. ಆದ್ದರಿಂದ, ನೀವು ನಿಮ್ಮ ವ್ಯವಹಾರವನ್ನು ವಿಸ್ತರಿಸಲು ಅಥವಾ ಜೀವನದಲ್ಲಿ ಪ್ರಗತಿ ಸಾಧಿಸಲು ಬಯಸುತ್ತಿದ್ದರೆ, ನಿಮ್ಮ ಹುಟ್ಟಿದ ಸ್ಥಳದಿಂದ ಈ ದಿಕ್ಕಿನಲ್ಲಿ ನೀವು ಅದೇ ಪ್ರಯತ್ನಗಳನ್ನು ಮಾಡಬೇಕು. ನಿಮ್ಮ ದಕ್ಷಿಣದ ಇಂಡೋನೇಷಿಯಾದಂತೆ ದೇಶಗಳು, ನಗರಗಳು ಮತ್ತು ರಾಜ್ಯಗಳು ನಿಮಗೆ ಅನುಕೂಲಕರವಾದ ಫಲಿತಾಂಶಗಳನ್ನು ತರುತ್ತವೆ. 
 TIME_TEXT1 = ಸೂರ್ಯನು ನಿಮ್ಮ ದೇವ ಗ್ರಹವಾಗಿದ್ದಾಗ, ಏಪ್ರಿಲ್ನಿಂದ ಮೇ ಮತ್ತು ಆಗಸ್ಟ್ನಿಂದ ಸೆಪ್ಟೆಂಬರ್ ವರೆಗೆ, ಪ್ರತಿ ವರ್ಷವೂ, ನಿಮಗೆ ಅನುಕೂಲಕರವಾಗಿರುತ್ತದೆ. ಈ ಅವಧಿಯಲ್ಲಿ ನೀವು ಕೈಯಲ್ಲಿ ತೆಗೆದುಕೊಳ್ಳುವ ಯಾವುದೇ ಕೆಲಸ, ನೀವು ಖಂಡಿತವಾಗಿಯೂ ಅವುಗಳಲ್ಲಿ ಯಶಸ್ಸನ್ನು ಪಡೆಯುವಿರಿ. ಈ ಅವಧಿಯು ನಿಮ್ಮ ಗೌರವ, ಹೆಸರು, ಮತ್ತು ಖ್ಯಾತಿಯ ಹೆಚ್ಚಳವನ್ನು ತರುತ್ತದೆ.
 TIME_TEXT2 = ಚಂದ್ರ ನಿಮ್ಮ ದೇವ ಗ್ರಹನಾಗಿದ್ದು , ಪ್ರತಿ ವರ್ಷಕ್ಕೆ ಮೇ ಮತ್ತು ಜೂನ್ ಅವಧಿಯನ್ನು, ನಿಮಗಾಗಿ ಬಹಳ ಮಂಗಳಕರ ಸಮಯ ಇದು . ನಿಮ್ಮ ಪ್ರಯತ್ನಗಳಲ್ಲಿ ಯಶಸ್ವಿಯಾಗುವ ಸಾಧ್ಯತೆಗಳು ಈ ಅವಧಿಗೆ ಹೆಚ್ಚಾಗುತ್ತದೆ. ಆದ್ದರಿಂದ, ನೀವು ಜೀವನದಲ್ಲಿ ಯಶಸ್ಸನ್ನು ಸಾಧಿಸಲು ಈ ಕಾಲಾವಧಿಯ ಸಂಪೂರ್ಣ ಬಳಕೆಯನ್ನು ಮಾಡಬೇಕಾಗಿದೆ.
 TIME_TEXT3 = ಗುರು ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆಯ ದೇವರು , ಆದ್ದರಿಂದ, ಡಿಸೆಂಬರ್ ನಿಂದ ಜನವರಿ ಸಮಯ, ಮಾರ್ಚ್ ಮತ್ತು ಏಪ್ರಿಲ್, ಪ್ರತಿ ವರ್ಷವೂ ನಿಮಗೆ ಪ್ರಯೋಜನಕಾರಿ. ಈ ಅವಧಿಯಲ್ಲಿ ನೀವು ಕೈಗೊಳ್ಳುವ ಯಾವುದೇ ಕೆಲಸವನ್ನು ನೀವು ಅದರಲ್ಲಿ ಯಶಸ್ವಿಯಾಗುತ್ತೀರಿ, ಇದರಿಂದಾಗಿ ಈ ಸಮಯವು ನಿಮಗೆ ಯಾವುದಾದರೂ ಪ್ರಮುಖ ಕಾರ್ಯಗಳನ್ನು ಪ್ರಾರಂಭಿಸಲು ಉತ್ತಮವಾಗಿದೆ. 
 TIME_TEXT4 = ಹರ್ಷಲ ಗ್ರಹ  ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆಯಾ  ದೇವರು. ಮತ್ತೊಂದು ಮೂಲ / ಅಭಿಪ್ರಾಯದ ಪ್ರಕಾರ, ರಾಹು ಈ ಮೂಲಭೂತ ಸಂಖ್ಯೆಯ ದೇವ ಗ್ರಹವೆಂದು ಕೂಡಾ ಪರಿಗಣಿಸಲ್ಪಟ್ಟಿದ್ದಾರೆ. ಪರಿಣಾಮವಾಗಿ, ಪ್ರತಿ ವರ್ಷ ಜುಲೈನಿಂದ ಸೆಪ್ಟೆಂಬರ್ ವರೆಗಿನ ಅವಧಿಯು ನಿಮಗೆ ಬಹಳ ಮಂಗಳಕರವಾಗಿರುತ್ತದೆ. ನೀವು ಈಗ ಕೈಯಲ್ಲಿ ತೆಗೆದುಕೊಳ್ಳುವ ಯಾವುದೇ ಕಾರ್ಯವು ಯಶಸ್ವಿಯಾಗುತ್ತದೆ. 
 TIME_TEXT5 = ಬುಧ ನಿಮ್ಮ ದೇವ ಗ್ರಹವಾಗಿದ್ದು, ಆದ್ದರಿಂದ, ಜೂನ್ ನಿಂದ ಜುಲೈ ಮತ್ತು ಸೆಪ್ಟೆಂಬರ್ನಿಂದ ಅಕ್ಟೋಬರ್ ವರೆಗೆ ನಿಮಗೆ ಅನುಕೂಲಕರವಾಗಿರುತ್ತದೆ. ನೀವು ಬಯಸುವ ಯಾವುದೇ ಕಾರ್ಯಗಳನ್ನು ನೀವು ಪ್ರಾರಂಭಿಸಿದರೆ, ಈ ಸಮಯದಲ್ಲಿ ನೀವು ಹಾಗೆ ಮಾಡುವುದರಿಂದ ನಿಮಗೆ ಯಶಸ್ಸನ್ನು ತರುವ ಹೆಚ್ಚಿನ ಅವಕಾಶವಿದೆ.
 TIME_TEXT6 = ಶುಕ್ರವು ನಿಮ್ಮ ಸಂಖ್ಯೆಯ ದೇವರು, ಪರಿಣಾಮವಾಗಿ, ಮಾರ್ಚ್ ನಿಂದ ಏಪ್ರಿಲ್, ಮೇ ಜೂನ್ ಮತ್ತು ಅಕ್ಟೋಬರ್ ನಿಂದ ನವೆಂಬರ್ ಸಮಯಗಳು ನಿಮಗೆ ಅನುಕೂಲಕರವಾಗಿರುತ್ತದೆ. ಈ ಅವಧಿಯಲ್ಲಿ ನೀವು ಕೈಗೊಳ್ಳುವ ಅಥವಾ ಪ್ರಾರಂಭಿಸುವ ಯಾವುದೇ ಕಾರ್ಯಗಳು ಯಶಸ್ವಿಯಾಗಲು ಹೆಚ್ಚಿನ ಅವಕಾಶವನ್ನು ಹೊಂದಿರುತ್ತವೆ ಮತ್ತು ನೀವು ಜೀವನದಲ್ಲಿ ಸಂತೋಷ, ಸಮೃದ್ಧಿ ಮತ್ತು ಇತರ ಐಷಾರಾಮಿಗಳನ್ನು ಪಡೆಯುತ್ತೀರಿ.
 TIME_TEXT7 = ಕೇತು ನಿಮ್ಮ ದೇವರು  ಆಗಿರುವುದರಿಂದ, ಜುಲೈ ನಿಂದ ಆಗಸ್ಟ್ ಅವಧಿಯು ನಿಮಗೆ ಬಹಳ ಮಹತ್ವದ್ದಾಗಿದೆ.ಜುಲೈ ನಿಂದ ಆಗಸ್ಟ್ ಅವಧಿಯು ನಿಮಗೆ ಬಹಳ ಮಹತ್ವದ್ದಾಗಿದೆ,   ಮತ್ತು ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ನೀವು ಉತ್ತಮ ಸಾಮರಸ್ಯವನ್ನು ಅನುಭವಿಸಬಹುದು. ಜೀವನದಲ್ಲಿ ಮುಂದಕ್ಕೆ ಚಲಿಸಲು ನೀವು ಈ ಸಮಯದಲ್ಲಿ ಉತ್ತಮ ಬಳಕೆ ಮಾಡಬಹುದು.
 TIME_TEXT8 = ಶನಿಯು ನಿಮ್ಮ ಸಂಖ್ಯೆಯ ಆಡಳಿತಗಾರ ಕರ್ತನು. ಆದ್ದರಿಂದ, ಜನವರಿಯಿಂದ ಮಾರ್ಚ್ ವರೆಗೆ ಮತ್ತು ಅಕ್ಟೋಬರ್ ನಿಂದ ನವೆಂಬರ್ ವರೆಗಿನ ಅವಧಿಯು ನಿಮಗೆ ತುಂಬಾ ಪ್ರಯೋಜನಕಾರಿಯಾಗಿದೆ. ಈ ಅವಧಿಯು ನಿಮಗಾಗಿ ಯಶಸ್ಸನ್ನು ತರುತ್ತದೆ, ಮತ್ತು ನೀವು ಈಗ ಯಾವುದೇ ಮಂಗಳಕರ ಅಥವಾ ಪ್ರಮುಖ ಕಾರ್ಯಗಳನ್ನು ಪ್ರಾರಂಭಿಸಬಹುದು. 
 TIME_TEXT9 = ಮಂಗಳ ನಿಮ್ಮ ಮನೆಯ ಲಾರ್ಡ್ ಎಂದು, ಆದ್ದರಿಂದ, ಜನವರಿಯಿಂದ ಫೆಬ್ರವರಿ, ಏಪ್ರಿಲ್ ನಿಂದ ಮಾರ್ಚ್, ಮತ್ತು ನವೆಂಬರ್ನಿಂದ ಡಿಸೆಂಬರ್ವರೆಗಿನ ಅವಧಿಯು ನಿಮಗೆ ಮಂಗಳಕರವಾಗಿರುತ್ತದೆ. ಈ ಅವಧಿಯಲ್ಲಿ ಕೈಗೊಂಡಿರುವ ಯಾವುದೇ ಕಾರ್ಯಗಳು ನಿಮಗೆ ಯಶಸ್ಸಿನ ಹೊಸ ಎತ್ತರವನ್ನು ತಲುಪಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ ಮತ್ತು ಪರಿಣಾಮವಾಗಿ ನೀವು ಜೀವನದಲ್ಲಿ ಪ್ರಗತಿ ಹೊಂದುತ್ತಾರೆ.
 HEALTH_TEXT1 = ರೂಟ್ ನಂಬರ್ 1 ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದರೆ, ನೀವು ಕುದುರೆ  ತರಹ  ಆರೋಗ್ಯವಂತರಾಗಿರುತ್ತೀರಿ, ಆದರೆ ಕೆಲವು ರೋಗಗಳ ಸಾಧ್ಯತೆಗಳು ಉಳಿಯುತ್ತವೆ. ಮುಖ್ಯವಾಗಿ, ನೀವು ಹೃದಯ-ಸಂಬಂಧಿತ ರೋಗಗಳು, ಪಂಪ್ ಮಾಡುವಿಕೆ, ರಕ್ತದೊತ್ತಡ, ರಕ್ತ-ಸಂಬಂಧಿತ ಕಾಯಿಲೆಗಳು, ವೃದ್ಧಾಪ್ಯದಲ್ಲಿ ಅಧಿಕ ರಕ್ತದೊತ್ತಡ, ಮತ್ತು ಕಣ್ಣಿನ ಸಂಬಂಧಿತ ಸಮಸ್ಯೆಗಳಿಂದ ನರಳಬಹುದು. ನೀವು ಇವುಗಳ ಬಗ್ಗೆ ಜಾಗರೂಕರಾಗಿರಬೇಕು, ಆದರೆ ನಿಮ್ಮ ಆರೋಗ್ಯಕರ ಜೀವನಶೈಲಿಯನ್ನು ಆನಂದಿಸಿರಿ. 
 HEALTH_TEXT2 = ನಿಮಗೆ ತುಂಬಾ ಚಿಂತನೆಯ ಅಭ್ಯಾಸವಿದೆ, ಅಥವಾ ವಿಷಯಗಳ ಬಗ್ಗೆ ಆಸಕ್ತಿ ಪಡೆಯುವುದು, ಇದು ನಿಮ್ಮ ಎಲ್ಲ ಸಮಸ್ಯೆಗಳ ಮೂಲವಾಗಿದೆ. ಇದು ಹೊಟ್ಟೆ ಸಮಸ್ಯೆಗಳು, ಜೀರ್ಣಾಂಗ ತೊಂದರೆಗಳು, ಅನಿಲ ಸಮಸ್ಯೆ, ಕರುಳಿನ ಸಮಸ್ಯೆಗಳು, ಗೆಡ್ಡೆಗಳು ಮುಂತಾದ ರೋಗಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು. ಆದ್ದರಿಂದ ನೀವು ಚಿಂತೆಗಳಿಂದ ದೂರ ಉಳಿಯಬೇಕು. ನೀವು ಆಲ್ಕೋಹಾಲ್ ಸೇವಾಭಿಸಬಾರದು ಅಥವಾ ಯಾವುದೇ ಔಷಧಿಗಳನ್ನು ಅಥವಾ ಮಾದಕ ಪದಾರ್ಥಗಳನ್ನು ತಗೆದುಕೊಳ್ಳಬಾರದು ಎಂದು ಸಲಹೆ ನೀಡಲಾಗಿದೆ .ಇದಲ್ಲದೆ, ನೀವು ಬೇಯಿಸಿದ ಆಹಾರ ತಿನ್ನುವುದು ಮತ್ತು ಸಾಕಷ್ಟು ನೀರು ಕುಡಿಯಬೇಕು.
 HEALTH_TEXT3 = ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ಹೆಚ್ಚು ಚಿಂತಿಸದಿರುವ ಕಾರಣದಿಂದಾಗಿ ದೈವಿಕ ಅನುಗ್ರಹದಿಂದ ಭಗವಂತ ಗುರು  ನಿಮ್ಮನ್ನು ಆಶೀರ್ವದಿಸುತ್ತಿದ್ದಾನೆ. ಹೇಗಾದರೂ, ನೀವು ಕೆಲವೊಮ್ಮೆ ನಿಮ್ಮ ಆರೋಗ್ಯದ ಬಗ್ಗೆ ಅನಾವಶ್ಯಕವಾದ ಕಾರಣದಿಂದಾಗಿ ನೀವು ನರಗಳ ಉರಿಯೂತ (ಸೋರಿಯಾಸಿಸ್), ಸಿಯಾಟಿಕಾ (ಕಾಲು ಅಥವಾ ಹಿಂಭಾಗ), ಚರ್ಮದ ಕಾಯಿಲೆಗಳಂತಹ ಸಮಸ್ಯೆಗಳನ್ನು ಎದುರಿಸಬಹುದು. ಆದ್ದರಿಂದ, ನೀವು ಜಾಗರೂಕರಾಗಿರಿ ಮತ್ತು ನಿಮ್ಮ ಯೋಗಕ್ಷೇಮವನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಬೇಕು. 
 HEALTH_TEXT4 = ರಾಹುವಿನ ಪ್ರಭಾವದಿಂದಾಗಿ, ನೀವು ನಿಮ್ಮ ಮಿದುಳುಗಳನ್ನು ಸಕ್ರಿಯವಾಗಿ ಬಳಸುತ್ತೀರಿ, ಆದರೆ ಯಾವುದಾದರೂ ಹೆಚ್ಚಿನವುಗಳು ಯಾವಾಗಲೂ ಕೆಟ್ಟದ್ದನ್ನು ನೀವು ನೆನಪಿನಲ್ಲಿಟ್ಟುಕೊಳ್ಳಬೇಕು. ಪರಿಣಾಮವಾಗಿ, ನೀವು ಕೆಲವು ವಿಧದ ಆಘಾತ, ಮಾನಸಿಕ ಅಶಾಂತಿ, ರಕ್ತ ಸಂಬಂಧಿ ಸಮಸ್ಯೆಗಳು, ತಲೆ ಮತ್ತು ಬೆನ್ನು ನೋವು, ಮೂತ್ರದ ತೊಂದರೆಗಳು ಮತ್ತು ಅಂತಹ ಸಮಸ್ಯೆಗಳಿಂದ ಬಳಲುಬಹುದು . ಆದ್ದರಿಂದ, ಒಂದು ಆರೋಗ್ಯಕರ ಜೀವನಶೈಲಿಯನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಿ ಮತ್ತು ಧ್ಯಾನ ಮತ್ತು ಯೋಗದ ಸಹಾಯದಿಂದ ಉತ್ತಮ ಜೀವನವನ್ನು ನಡೆಸಿಕೊಳ್ಳಿ. 
 HEALTH_TEXT5 = ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ಬುಧದ ಪರಿಣಾಮಗಳ ಕಾರಣದಿಂದಾಗಿ, ನೀವು ತೀಕ್ಷ್ಣವಾದ ಮನಸ್ಸನ್ನು ಹೊಂದಿರುತ್ತೀರಿ ಮತ್ತು ನೀವು ಹೆಚ್ಚು ಕಿರಿಯರಾಗಿ ಕಾಣಿಸಿಕೊಳ್ಳುತ್ತೀರಿ. ಆದರೆ ಮತ್ತೊಂದೆಡೆ, ನಿಮ್ಮ ಜೀವಿತಾವಧಿಯಲ್ಲಿ ನರಗಳ (ನರದ ಉರಿಯೂತ), ಬಾಯಿ ಹುಣ್ಣುಗಳು, ಕಣ್ಣುಗಳು ಮತ್ತು ಕೈಗಳು, ನಿದ್ರಾಹೀನತೆ, ಪಾರ್ಶ್ವವಾಯು (ಪಾರ್ಶ್ವ ಅಥವಾ ಪಾರ್ಶ್ವವಾಯು) ಅಥವಾ ಪೋಲಿಯೊ ಇತ್ಯಾದಿಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ಸಮಸ್ಯೆಗಳನ್ನು ನೀವು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ಆದ್ದರಿಂದ, ನೀವು ಶಿಸ್ತಿನ ಜೀವನವನ್ನು ನಡೆಸಬೇಕು ಮತ್ತು ನಿಮ್ಮ ಯೋಗಕ್ಷೇಮದ ಬಗ್ಗೆ ಅನಾವಶ್ಯಕರಾಗಿರಬಾರದು
 HEALTH_TEXT6 = ಶುಕ್ರ, ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆಯ ದೇವ, ಎಲ್ಲಾ ಐಷಾರಾಮಿಗಳ ಪ್ರಾಮುಖ್ಯತೆಯಾಗಿದೆ, ಹೀಗಾಗಿ, ನೀವು ತಿನ್ನುವುದು, ಕುಡಿಯುವುದು, ಧರಿಸುವುದು, ಮತ್ತು ಇತರ ಲೋಕ ಸೌಲಭ್ಯಗಳಲ್ಲಿ ಆನಂದವನ್ನು ಆನಂದಿಸುತ್ತೀರಿ. ಸಾಮಾನ್ಯವಾಗಿ, ಇದು ನಿಮ್ಮನ್ನು ಸಮಸ್ಯೆಗಳ ವೆಬ್ನಲ್ಲಿ ಇರಿಸಬಹುದು. ಮುಖ್ಯವಾಗಿ, ಇವು ಗಂಟಲು ಅಥವಾ ಮೂಗು ಮತ್ತು ನಾಲಿಗೆ, ಎದೆ ಸಂಬಂಧಿತ ರೋಗಗಳು, ಅಥವಾ ಹೃದಯರಕ್ತನಾಳದ ಕಾಯಿಲೆಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ಕಾಯಿಲೆಗಳನ್ನು ಒಳಗೊಂಡಿವೆ. ಆದ್ದರಿಂದ, ನೀವು ಅದರ ಬಗ್ಗೆ ವಿಶೇಷವಾಗಿ ಜಾಗರೂಕರಾಗಿರಬೇಕು ಮತ್ತು ಯಾವುದೇ ಆರೋಗ್ಯ ಸಂಬಂಧಿ ಸಮಸ್ಯೆಗಳನ್ನು ಎಂದಿಗೂ ನಿರ್ಲಕ್ಷಿಸಬಾರದು. 
 HEALTH_TEXT7 = 7 ನೇ ಸಂಖ್ಯೆಯಡಿಯಲ್ಲಿ ಹುಟ್ಟಿದವರು ಇತರರೊಂದಿಗೆ ಹೋಲಿಸಿದಾಗ ನಿಮ್ಮ ರೋಗನಿರೋಧಕ ವ್ಯವಸ್ಥೆಯು ದುರ್ಬಲವಾಗಿರುವುದರಿಂದ ನೀವು ಕೆಲವು ಅಥವಾ ಇತರ ಅನಾರೋಗ್ಯದ ಹಿಡಿತಗಳಲ್ಲಿ ಉಳಿಯಬಹುದೆಂದು ಸೂಚಿಸುತ್ತದೆ. ಪರಿಣಾಮವಾಗಿ, ನೀವು ಸುಲಭವಾಗಿ ಅನಾರೋಗ್ಯ ಪಡೆಯಬಹುದು, ಮತ್ತು ನೀವು ಇದ್ದಕ್ಕಿದ್ದಂತೆ ಮಸುಕಾದ, ತಲೆನೋವು ಪಡೆಯಬಹುದು , ಮತ್ತು  ಕೆಲವೊಮ್ಮೆ ಹೃದಯರಕ್ತನಾಳದ ರೋಗಗಳಿಂದ ಬಳಲುತ್ತಿದ್ದಾರೆ, ಮಾನಸಿಕ ಶಕ್ತಿಯ ನಷ್ಟ, ಭಾಷೆ ಮತ್ತು ಶ್ವಾಸಕೋಶದ ರೋಗಗಳು, ಹೀಗೆ  ಬಳಲುಬಹುದು .
 HEALTH_TEXT8 = ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ಶಿಸ್ತಿನ ವ್ಯಕ್ತಿಯಾಗಿದ್ದು, ಜೀವನದ ಎಲ್ಲಾ ಕ್ಷೇತ್ರಗಳಲ್ಲಿಯೂ ನಿಮಗಾಗಿ ಸಾಕಷ್ಟು ಪ್ರಾಮುಖ್ಯತೆಯನ್ನು ನೀಡುತ್ತೀರಿ. ಪರಿಣಾಮವಾಗಿ, ನೀವು ಉತ್ತಮ ಆರೋಗ್ಯವನ್ನು ಆನಂದಿಸಬಹುದು, ಆದರೆ ನಿಮ್ಮ ದಿನನಿತ್ಯದ ಮತ್ತು ಶಿಸ್ತಿನಿಂದ ನಿಮ್ಮಿಂದ ಹೊರಬರುವ ಕಾರಣ ಗಂಭೀರವಾದ ಅನಾರೋಗ್ಯದ ಭಯ ಯಾವಾಗಲೂ ಹಾರಿಜಾನ್ನಲ್ಲಿ ಉಳಿಯುತ್ತದೆ. ಇವುಗಳಲ್ಲಿ ಮುಖ್ಯವಾಗಿ ನಿಮ್ಮ ಮೂತ್ರಪಿಂಡಗಳು, ಕರುಳಿನ, ತಲೆನೋವು, ಮತ್ತು ರಕ್ತ ಸಂಬಂಧಿ ಕಾಯಿಲೆಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ಕಾಯಿಲೆಗಳು ಸೇರಿವೆ.
 HEALTH_TEXT9 = ನೀವು ಸಂಪೂರ್ಣ ಸಂಖ್ಯೆ 9 ರ ಅಡಿಯಲ್ಲಿ ಹುಟ್ಟಿ, ಅದು ನಿಮ್ಮನ್ನು ಸ್ವಾಭಾವಿಕವಾಗಿ ಶಕ್ತಿಯುತಗೊಳಿಸುತ್ತದೆ. ಪರಿಣಾಮವಾಗಿ ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ಆರೋಗ್ಯಕರವಾಗಿದ್ದರೂ, ಮತ್ತೊಂದೆಡೆ ನೀವು ನಿಮ್ಮ ಕೆಲಸವನ್ನು ಸುಲಭವಾಗಿ ಅಥವಾ ಹೆಚ್ಚಾಗಿ ಕೋಪಗೊಳ್ಳುತ್ತೀರಾ , ನಂತರ ನಿಮ್ಮ ಆರೋಗ್ಯವನ್ನು ಪರಿಣಾಮ ಬೀರುತ್ತದೆ. ಮುಖ್ಯವಾಗಿ, ನೀವು ರಕ್ತ ಸಂಬಂಧಿ ಸಮಸ್ಯೆಗಳು, ಗಾಯಗಳು, ಸಿಡುಬು, ಕೋಳಿ ಪಾಕ್ಸ್, ಅಥವಾ ಕೆಲವು ವಿಧದ ಶಸ್ತ್ರಚಿಕಿತ್ಸೆ ನಿಮಗೆ ಸಹ ಸಾಧ್ಯವಿದೆ ಎಂದು ಸಹ ಚಾಕಿಯ ಕೆಳಗೆ ಇರಬೇಕು.
 CAREER_TEXT1 = ನೀವು ಕಷ್ಟಪಟ್ಟು ಕೆಲಸ ಮಾಡುವಾಗ, ಅತ್ಯಂತ ಭಕ್ತಿಯೊಂದಿಗೆ, ನೀವು ನಿಮ್ಮ ವೃತ್ತಿಯನ್ನು ಅಭಿವೃದ್ಧಿಪಡಿಸುತ್ತೀರಿ ಮತ್ತು ಸುಧಾರಿಸುತ್ತೀರಿ. ವಿದ್ಯುನ್ಮಾನ, ಬೆಂಕಿ, ವಿಜ್ಞಾನ ಮತ್ತು ತಂತ್ರಜ್ಞಾನ, ಸಂಶೋಧನೆ, ಆಭರಣ ಮತ್ತು ರತ್ನದ ಕಲ್ಲುಗಳು, ಕೆಲವು ರೀತಿಯ ಶಸ್ತ್ರಚಿಕಿತ್ಸೆ, ದೇಶಕ್ಕೆ ರಾಯಭಾರಿಯಾಗಿ ಮಾರ್ಪಟ್ಟ ಕ್ಷೇತ್ರ, ರಾಜಕಾರಣಿ, ಸೈನ್ಯದ ಅಧಿಕಾರಿಗಳು ನಿಮಗೆ ಉತ್ತಮ . ನಿಮ್ಮ ವ್ಯವಹಾರ ಅಥವಾ ಈ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ಯಾವುದಾದರೂ ಆಯ್ಕೆ ಮಾಡಬಹುದು. 
 CAREER_TEXT2 = ಆಮೂಲಾಗ್ರ ಸಂಖ್ಯೆ 2 ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ ಜನರಿಗೆ ಆಶೀರ್ವಾದ ಮತ್ತು ಚಂದ್ರನ ದೈವಿಕ ಅನುಗ್ರಹವಿದೆ, ಮತ್ತು ಅವರು ನೀರಿನ ಮತ್ತು ದ್ರವ ವಸ್ತುಗಳ ಪ್ರಾಮುಖ್ಯತೆ ಏಕೆಂದರೆ, ಆದ್ದರಿಂದ ನಿಮ್ಮ ವ್ಯಾಪಾರವನ್ನು ಒಂದೇ ಆಯ್ಕೆ ಮಾಡಿಕೊಳ್ಳಿ, ಅದು ನಿಮಗೆ ಹೆಚ್ಚು ಪ್ರಯೋಜನಕಾರಿಯಾಗಿದೆ. ನಿರ್ದಿಷ್ಟವಾಗಿ, ದ್ರವ ಮತ್ತು ರಸವತ್ತಾದ ವಸ್ತುಗಳ ಜೊತೆ ಕೆಲಸ, ಪ್ರಯಾಣ ಸಂಬಂಧಿತ ಕೆಲಸ, ಯಾವುದೇ ಕ್ಷೇತ್ರದಲ್ಲಿ ದಲ್ಲಾಳಿ, ಹೋಟೆಲ್ ವ್ಯವಹಾರ, ಪತ್ರಿಕೋದ್ಯಮ, ಹಾಡುಗಾರಿಕೆ, ನೃತ್ಯ, ಕವನ ಬರವಣಿಗೆ, ಕಥಾವಸ್ತುವಿನ ಕೆಲಸ, ಐಸ್ಗೆ ಸಂಬಂಧಿಸಿದ ಕೆಲಸ, ಮತ್ತು ಬೆಳ್ಳಿ ಅಥವಾ ಅಕ್ಕಿಗೆ ಸಂಬಂಧಿಸಿದ ವ್ಯವಹಾರವು ನಿಮಗೆ ಅನುಕೂಲಕರವಾಗಿರುತ್ತದೆ. 
 CAREER_TEXT3 = ಮೂಲಭೂತ  ಸಂಖ್ಯೆ 3 ಅಡಿಯಲ್ಲಿ ಜನಿಸಿ ಮತ್ತು ಗುರುವಿನ ವಿಶೇಷ ಆಶೀರ್ವಾದ, ಆದ್ದರಿಂದ, ಅವನಿಗೆ ಸಂಬಂಧಿಸಿದ ಯಾವುದೇ ಕಾರ್ಯಗಳನ್ನು ಕೈಗೊಳ್ಳುವುದು ನಿಮಗೆ ಯಶಸ್ಸನ್ನು ತರುತ್ತದೆ. ಆದ್ದರಿಂದ, ಬೋಧನೆಯ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ತೊಡಗುವುದು, ಸೇವೆ ಕೆಲಸ, ನ್ಯಾಯ ಸಂಬಂಧಿತ ಕೆಲಸ, ನ್ಯಾಯಾಧೀಶ, ಅರ್ಜಿದಾರ, ಕಾರ್ಯದರ್ಶಿ, ಪೊಲೀಸ್, ತಾತ್ವಿಕ ವಿದ್ಯಾರ್ಹತೆಗೆ ಸಂಬಂಧಿಸಿದ ಕೆಲಸ, ಬ್ಯಾಂಕಿಂಗ್ ಅಥವಾ ಯಾವುದೇ ಹಣಕಾಸು ಕಂಪನಿ, ಅಥವಾ ಜಾಹೀರಾತು ಇಲಾಖೆ ನಿಮಗೆ ಸಮೃದ್ಧಿಯ ಹೆಚ್ಚಿನ ಅವಕಾಶವನ್ನು ತರುತ್ತವೆ ಮತ್ತು ನೀವು ಜೀವನದಲ್ಲಿ ಪ್ರಗತಿಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ.
 CAREER_TEXT4 = ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆ 4 ರಂತೆ, ಆದ್ದರಿಂದ ನಿಮ್ಮ ವ್ಯಕ್ತಿತ್ವವು ರಾಹುವಿನ ಹಲವಾರು ಗುಣಲಕ್ಷಣಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಅದಕ್ಕಾಗಿಯೇ ನೀವು ಕಠಿಣವಾದ ಕಾರ್ಯಗಳನ್ನು ಸಹ ಸುಲಭವಾಗಿ ಪರಿಹರಿಸಬಹುದು. ರೈಲ್ವೆ, ಹಡಗು, ಗಣಿಗಾರಿಕೆ, ಇತರ ತಾಂತ್ರಿಕ ಕೆಲಸ, ಸ್ಟೆನೊಗ್ರಾಫರ್, ಹೇಳಿ, ಎಂಜಿನಿಯರ್, ಜ್ಯೋತಿಷಿ, ಜಾದೂಗಾರ ಮತ್ತು ಉಪನ್ಯಾಸಕ, ಇತ್ಯಾದಿಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ವ್ಯವಹಾರ ಮಾಡುವುದನ್ನು ಅಥವಾ ಮಾಡುವುದನ್ನು ನೀವು ಜೀವನದಲ್ಲಿ ಶ್ಲಾಘನೀಯ ಯಶಸ್ಸನ್ನು ತರುವಿರಿ. ಆದ್ದರಿಂದ, ಈ ಕ್ಷೇತ್ರಗಳಿಂದ ಅಥವಾ ಸಂಬಂಧಿತ ಡೊಮೇನ್ಗಳಿಂದ ನಿಮ್ಮ ವೃತ್ತಿಜೀವನವನ್ನು ಆಯ್ಕೆಮಾಡುವುದು ಸೂಚಿಸಲಾಗುತ್ತದೆ, ಇದರಿಂದಾಗಿ ನಿಮ್ಮ ಎಲ್ಲ ಹೋರಾಟಗಳಿಗೆ ಅಂತ್ಯವನ್ನು ತರಲು.
 CAREER_TEXT5 = ನಿಮ್ಮ ಮೂಲ ಸಂಖ್ಯೆಯ ದೇವರು ಬುಧ. ಇದರಿಂದಾಗಿ, ಈ ಸಂಖ್ಯೆ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ ನೀವು ಗ್ರಹದ ವಿಶೇಷ ಪ್ರಭಾವವನ್ನು ಪಡೆಯುತ್ತೀರ, ಇದು ನಿಮಗೆ ಬುದ್ಧಿವಂತಿಕೆಯೊಂದಿಗೆ ನಿಮ್ಮ ಎಲ್ಲ ಕಾರ್ಯಗಳನ್ನು ಸಾಧಿಸಲು ಅನುವು ಮಾಡಿಕೊಡುತ್ತದೆ. ಆದ್ದರಿಂದ, ನಿಮ್ಮ ದೈಹಿಕ ಸಾಮರ್ಥ್ಯದ ಬದಲಾಗಿ ನಿಮ್ಮ ಮಾನಸಿಕ ಶಕ್ತಿ ಅಗತ್ಯವಿರುವ ವೃತ್ತಿಜೀವನವನ್ನು ನೀವು ಆರಿಸಬೇಕಾಗುತ್ತದೆ. ಎಂಜಿನಿಯರಿಂಗ್ ಕ್ಷೇತ್ರಗಳು, ಮಾರಾಟ ಸಂಬಂಧಿ ಕೆಲಸ, ಲೆಕ್ಕಶಾಸ್ತ್ರ, ರೈಲ್ವೆ, ಟೆಲಿಗ್ರಾಫ್, ಪತ್ರಿಕೋದ್ಯಮ, ತಂಬಾಕು, ರೇಡಿಯೊ ವ್ಯವಹಾರ, ದಲ್ಲಾಳಿ, ಕಮೀಶನ್ ಮತ್ತು ಅದಕ್ಕೆ ಸಂಬಂಧಿಸಿದ ಕ್ಷೇತ್ರಗಳು ನಿಮಗೆ ಹೆಚ್ಚು ಅನುಕೂಲಕರವೆಂದು ಸಾಬೀತಾಗಿದೆ. 
 CAREER_TEXT6 = ಈ ಸಂಖ್ಯೆಯು ನಿಮಗೆ ಶುಕ್ರ ಗ್ರಹದ ವಿಶೇಷ ಅನುಗ್ರಹವನ್ನು ತರುತ್ತದೆ, ಇದು ಸೌಂದರ್ಯ ಮತ್ತು ಗ್ಲಾಮರ್ ಪ್ರದೇಶಗಳನ್ನು ನಿಮಗಾಗಿ ಅತ್ಯುತ್ತಮವೆಂದು ವರ್ಣಿಸುತ್ತದೆ. ಇವುಗಳೊಂದಿಗೆ ಸಂಯೋಜಿತವಾಗಿರುವ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ಕೆಲಸ ಮಾಡುವುದು ನಿಮಗೆ ಯಶಸ್ಸಿನ ಹೆಚ್ಚಿನ ಎತ್ತರವನ್ನು ತರುತ್ತದೆ. ಇವುಗಳಿಗೆ ಹೆಚ್ಚುವರಿಯಾಗಿ, ನೀವು ಆಭರಣದ , ಎಂಜಿನಿಯರಿಂಗ್, ವಾಸ್ತುಶಿಲ್ಪ, ಆಹಾರ ಇನ್ಸ್ಪೆಕ್ಟರ್, ಹೋಟೆಲ್, ನಿರ್ಮಾಣ, ಕಾದಂಬರಿ ಬರಹಗಾರ, ಮ್ಯೂಸಿಯಂ, ಕಲಾವಿದ ಡೊಮೇನ್ಗಳಲ್ಲಿ ನಿಮ್ಮ ಕೈ ಪ್ರಯತ್ನಿಸಬಹುದು, 
 CAREER_TEXT7 = ನೀವು ಈ ಸಂಖ್ಯೆಯ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ ಕಾರಣ, ನೀವು ಜೀವನದಲ್ಲಿ ಬಹಳಷ್ಟು ಹೋರಾಟವನ್ನು ಹೊಂದಿದ್ದೀರಿ, ಇದು ನೀವು ಜೀವನದ ವಿವಿಧ ಪಾಠಗಳನ್ನು ಕಲಿಯಲು ಸಹಾಯ ಮಾಡಿತು. ಪರಿಣಾಮವಾಗಿ, ನಿಮಗೆ ಯಶಸ್ಸು, ಉತ್ತಮ ಅದೃಷ್ಟ ಮತ್ತು ಸಂಪತ್ತನ್ನು ತರುವ ಅನೇಕ ವೃತ್ತಿಗಳು ಇವೆ. ಇವುಗಳಲ್ಲಿ ಚಲನಚಿತ್ರೋದ್ಯಮ, ಪ್ರಯಾಣ, ಏರ್ ಹೊಸ್ಟೆಸ್, ಡೈರಿ ಫಾರ್ಮ್, ಚಾಲಕ, ಮೀನು ಮಾರಾಟಗಾರ, ರಸಾಯನಶಾಸ್ತ್ರಜ್ಞ, ಆಸ್ಪತ್ರೆ, ಸಿಐಡಿ, ದೇಹದ ಬಿಲ್ಡರ್, ಮತ್ತು ಇವುಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ಇತರ ಕ್ಷೇತ್ರಗಳು ಸೇರಿವೆ.
 CAREER_TEXT8 = ನೀವು ಶನಿಗ್ರಹದ ಪ್ರಭುತ್ವದೊಂದಿಗೆ  ಜನಿಸಿದಂತೆ, ಆದ್ದರಿಂದ ಪ್ರಗತಿ ಮತ್ತು ಪ್ರಚಾರ ಸಮಯ ತೆಗೆದುಕೊಳ್ಳಬಹುದು, ಆದರೆ ಅವರು ಖಂಡಿತವಾಗಿಯೂ ನಿಮ್ಮ ಬಳಿಗೆ ಬರುತ್ತಾರೆ. ಕೆಲವು ಜಾಗಗಳು ನಿಮಗೆ ಎತ್ತರದ ಎತ್ತರವನ್ನು ತಲುಪಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ, ಮತ್ತು ಈ ನಿರ್ದಿಷ್ಟ ಕ್ಷೇತ್ರಗಳಿಂದ ನಿಮ್ಮ ವೃತ್ತಿಯನ್ನು ಆರಿಸುವುದರಿಂದ ಯಶಸ್ಸನ್ನು ಹೆಚ್ಚು ಪ್ರಾಮಾಣಿಕವಾಗಿ ಸಾಧಿಸಲು ಸಹ ನಿಮಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ,  ಮತ್ತು ಹಣ ಸಂಪಾದಿಸುವ ಮತ್ತು ಸಂಪತ್ತನ್ನು ಸಂಗ್ರಹಿಸಿಕೊಳ್ಳುವ ಉತ್ತಮ ಅವಕಾಶಗಳನ್ನು ಸಹ ತರುತ್ತದೆ . ಇವುಗಳು ಪ್ರಾಥಮಿಕವಾಗಿ ಒಬ್ಬ ಆಟಗಾರ, ಇಂಜಿನಿಯರ್, ಪೊಲೀಸ್, ನಗರದ ಮೇಯರ್, ತೂಕ ಮಾಪನ, ಗುತ್ತಿಗೆದಾರ, ಜೈಲು, ಕಾರ್ಮಿಕ ಕೆಲಸ ಮತ್ತು ಸಂಗೀತ ಇತ್ಯಾದಿಗಳನ್ನು ಒಳಗೊಂಡಿವೆ.
 CAREER_TEXT9 = ನಿಮ್ಮ ಸಂಖ್ಯೆಯು ಕೆಂಪು ಗ್ರಹದಿಂದ ಪ್ರಭಾವಿತವಾಗಿದೆ, ಆದ್ದರಿಂದ ಮಂಗಳ, ನಾಯಕತ್ವ ಗುಣಗಳೊಂದಿಗೆ ನೀವು ಪೂರ್ಣವಾಗಿರುವುದರಿಂದ ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ನೀವು ಹೆಚ್ಚು ಪ್ರೀತಿಯನ್ನು ಸ್ವೀಕರಿಸಿದ್ದೀರಿ ಮತ್ತು ನಿಮ್ಮೊಳಗೆ ಒಂದು ನಿರ್ದಿಷ್ಟ ಜೀವನಶೈಲಿಯನ್ನು ಹೊಂದಿದ್ದೀರಿ, ಇದು ಜೀವನದ ವಿವಿಧ ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ನಿಮ್ಮನ್ನು ಮುಂದಕ್ಕೆ ತರುತ್ತದೆ.
