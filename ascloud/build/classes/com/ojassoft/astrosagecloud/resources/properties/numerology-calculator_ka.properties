 MULANK_DESC_TEXT7 = ಮೂಲಭೂತ  ಸಂಖ್ಯೆ  7ರ ಅಡಿಯಲ್ಲಿ ಜನಿಸಿದ್ದರಿಂದ ನಿಮ್ಮ ಮೇಲೆ ಕೇತು ಅಥವಾ ನೆಪ್ಚೂನ್ನ ಮುಖ್ಯ ಪರಿಣಾಮ ಬೀರುತ್ತದೆ . ಅಂತರ್ಗತವಾಗಿ ಧಾರ್ಮಿಕತೆಯು ನಿಮ್ಮೊಳಗೆ ಅಸ್ತಿತ್ವದಲ್ಲಿದೆ. ನೀವು ಕವಿತೆ ಮತ್ತು ಚಿತ್ರಕಲೆಗಳನ್ನು ಇಷ್ಟಪಡುತ್ತೀರಿ. ಧಾರ್ಮಿಕ ವಿಷಯಗಳಲ್ಲಿ ನೀವು ತುಂಬಾ   ಸಾಕಷ್ಟು ಮತಾಂಧರಾಗಿರಬಹುದು. ಯಾವುದೇ ಘಟನೆಯ ಮುನ್ಸೂಚನೆಯು ನಿಮ್ಮ ದೊಡ್ಡ ಶಕ್ತಿಯಾಗಿದೆ ಮತ್ತು ನೀವು ಇತರರ ಮನಸ್ಸನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವಲ್ಲಿ ಪರಿಣತಿಯನ್ನು ಹೊಂದಿದ್ದೀರಿ. ಆದರೆ, ಇದಕ್ಕೆ ವಿರುದ್ಧವಾಗಿ ಜನರು ನಿಮ್ಮನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳುವುದು ತುಂಬಾ ಸುಲಭವಲ್ಲ.  ಪಿಕ್ನಿಕ್ ಮಾಡುವುದನ್ನು ನೀವು ಆನಂದಿಸುತ್ತೀರಿ, ಸುತ್ತಲೂ ನಡೆದುಕೊಂಡು ಅನೇಕ ಪ್ರವಾಸಗಳನ್ನು ಮಾಡುತ್ತಿರುವಿರಿ. ನಿಮ್ಮ ಜೀವನದಲ್ಲಿ ಭೌತಿಕ ವಸ್ತುಗಳ ಕೊರತೆ ಇರಬಹುದು.  ನಿಮ್ಮ ಮೂಲ ವಿಚಾರಗಳನ್ನು ಆಧರಿಸಿ ನೀವು ಹಣವನ್ನು ಗಳಿಸಬಹುದು  ಮತ್ತು ದಾನ ಸಹ ಸದ್ಗುಣ ಮಾಡುತ್ತೀರಾ . ನೀವು  ಭವಿಷ್ಯದ ಬಗ್ಗೆ ನೀವು ಚಿಂತಿಸುತ್ತೀರಿ, ಆದ್ದರಿಂದ ನೀವು ಒಳ್ಳೆಯ ಕೆಲಸವನ್ನು ಮಾಡಲು ಬಯಸುತ್ತೀರಿ. ಕಲ್ಪನಾ ಶಕ್ತಿ ನಿಮ್ಮೊಳಗೆ ಒಳ್ಳೆಯದು  ಮತ್ತು ಜನರನ್ನು  ನಿಮ್ಮ ಕಡೆ  ಆಕರ್ಷಿಸಲು ವಿಶೇಷ  ಶಕ್ತಿಯನ್ನು ಹೊಂದಿರುತ್ತೀರಿ . ನೀವು ಉತ್ತಮ ವ್ಯಾಪಾರಿ ಆಸ್ತಿ ಹೊಂದಿದ್ದೀರಿ ಮತ್ತು ಒಳ್ಳೆ  ವಿಚಾರಗಳನ್ನು  ನಿಮ್ಮೊಳಗೆ  ಹೊಂದಿದ್ದೀರಿ . ಮತ್ತು ನೀವು ಅವುಗಳನ್ನು ಬಳಸಿದರೆ, ನೀವು ಯಶಸ್ವಿ ಉದ್ಯಮಿ ಆಗಬಹುದು. ಇತರರ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುವ ಕಲೆ ಕಲೆಯ ದೊಡ್ಡ ವಿಶೇಷತೆಯಾಗಿದೆ.
