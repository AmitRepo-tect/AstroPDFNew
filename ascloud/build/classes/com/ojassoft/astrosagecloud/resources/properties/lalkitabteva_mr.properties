

	 TEVA						= धर्मी कुंडली#रातंध कुंडली#अंध कुंडली#अल्पवयीन कुंडली
	 DHARMI_TEVA_FALSE			= तुमची कुंडली धर्मी कुंडली नाही
	 DHARMI_TEVA_TRUE			= तुमची कुंडली धर्मी कुंडली आहे
	 RATAANDHA_TEVA_FALSE		= तुमची कुंडली रातंध कुंडली नाही
	 ANDHA_TEVA_TRUE			= तुमची कुंडली अंध कुंडली आहे
	 ANDHA_TEVA_FALSE			= तुमची कुंडली अंध कुंडली नाही
	 RATAANDHA_TEVA_TRUE		= तुमची कुंडली रातंध कुंडली आहे
	 NABALIG_TEVA_TRUE			= तुमची कुंडली अल्पवयीन कुंडली आहे
	 NABALIG_TEVA_FALSE			= तुमची कुंडली अल्पवयीन कुंडली नाही
	 LK_DHARMI_TEVA				= लाल किताब में कुछ कुण्डलियों को धर्मी टेवा कहा जाता है। लाल किताब के अनुसार राहू, केतू और शनि को अशुभ ग्रह कहा गया है। यदि कोई कुण्डली धर्मी होती है तो राहू, केतू अशुभ फळ नहीं देते। यद्यपि यह जरूरी नहीं कि वो शुभ फळ देंगे लेकिन अशुभफळ देना बंद जरूर कर देते हैं।<br/>राहू और केतू तब धर्मी हो जाते हैं जब वें चौथे भाव में बैठे होते हैं, अथवा किसी भी भाव में चन्द्रमा के साथ स्थित हों। शनि तब धर्मी होता है जब वह ग्यारहवें भाव में स्थित हो अथवा किसी भी भाव में बॄहस्पति के साथ बैठा हो। यदि दोनो स्थितियां लागू होती हो तो कुण्डली धर्मी टेवा कहलाती है।
	 LK_NIGHT_BLIND_HOROSCOPE	= रातंध ग्रह हे लाल किताबाचे अनाण्यावर्ती संकल्पना आहे. शनी सातव्या घरात व सूर्य चौथ्या घरात असल्यास कुंडलीस रातंध कुंडली म्हणतात. रातंध कुंडलीप्रमाणेच अशा कुंडलीची व्यक्ती दिशाहीन असते व निर्णय घेण्यात कमकुवत असते. रातंध माणसासारखीच ही व्यक्ती वागते
	 LK_BLIND_HOROSCOPE			= कुंडलीचे दहावे घर कुंडलीचा पाया असतो कारण हे घर व्यवसाय, नोकरी, सामाजिक स्तर, कीर्ती व शासकीय अनुग्रह यांच्यावर स्वामित्व करते.  दहाव्या घरात जर परस्पर विरोधी ग्रह असले तर किंवा दुर्बल ग्रह असले तर सर्व ग्रह चांगले निकाल देऊ शकणार नाहीत. अशा कुंडलीस आंधळी कुंडली मानली जाते व अशी व्यक्ती आंधळ्यासारखी किंवा दिशाहीन वागते.
	 LK_MINOR_HOROSCOPE			= लाल किताबानुसार काही परिस्थितींमध्ये बाराव्या वर्षापर्यंत कुंडलीस अल्पवयीन मानले जाते. अल्पवयीन कुंडलीतले ग्रह आपल्या निर्देशानुसार वागत नाहीत व आकस्मिक स्वभाव दर्शवतात. अशा व्यक्तीची नियती बाराव्या वर्षापर्यंत बेभरवशाची मानली जाते.
