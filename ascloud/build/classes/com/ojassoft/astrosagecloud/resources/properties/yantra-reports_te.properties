JUPITER_YANTRA = వేద జ్యోతిషశాస్త్రంలో "<a href="https://buy.astrosage.com/navagrah-yantra/guru-yantra"> గురు యంత్రం </a>" అని కూడా పిలువబడే బృహస్పతి యంత్రం, బృహస్పతి యొక్క ప్రతికూల ప్రభావాలు తగ్గించడానికి ధరిస్తారు. ఇది మీ జ్యోతిష్యంలో సానుకూలంగా ఉంచబడితే అది బృహస్పతి గ్రహం యొక్క శక్తిని బలోపేతం చేస్తుంది. ఒక గ్రహం యొక్క శక్తులను సమతుల్యం చేయడానికి యంత్రాలను ఉపయోగించవచ్చు అని చెప్పవచ్చు. ఇది జ్ఞానం కోసం మీ దాహం పెంచుతుంది మరియు మీ ప్రయత్నాలను విజయవంతం చేస్తుంది. వారి ప్రాపంచిక సౌకర్యాలను విడిచిపెట్టకుండా ఆధ్యాత్మికత వైపు తమని తాము నడిపించాలని కోరుకునే వారికి ఇది సిఫార్సు చేయబడింది. బృహస్పతి ఒక వ్యక్తి కోసం రెండు జీవితాలను సమతుల్యం చేస్తుంది. ఇది మీకు సంపన్న జీవితానికి దారితీసే సాంఘిక స్థితి మరియు ఆర్థిక స్థిరత్వం అందిస్తుంది. ఈ యంత్రాన్ని స్థాపించడం ద్వారా, మతపరమైన కార్యాలకు మీ ఆసక్తిని పెంచడానికి ఇది మీకు సహాయపడుతుంది. మీ జ్ఞానాన్ని ఎలా విస్తరించాలో మీకు తెలుస్తుంది. ఇది మీ అన్ని సంబంధిత ప్రాంతాల్లో విజయం సాధించడంలో మీకు సహాయపడుతుంది. మీ బృహస్పతి మీ <a href="https://www.astrosage.com/horoscope/"> జాతకం </a> లో చక్కగా ఉంచబడకపోయినా మీరు ప్రయోజనం పొందుతారు. కీర్తి పొందడానికి మీ జ్ఞానం గురించి ప్రతి ఒక్కరికి బోధించటానికి ఇది మీకు సహాయం చేస్తుంది.
SATURN_YANTRA = శని యంత్రం, "<a href="https://buy.astrosage.com/navagrah-yantra/shani-yantra">శని యంత్రం</a>" ఒక వేళా మీ జాతకం లో శని యొక్క అనుగ్రహం సరిగ్గా లేకపోతే, శని యంత్రాన్ని ధరించాలి. శని యంత్రం ధరించడం ద్వారా సానుకూల పరిస్థితులను పొందవచ్చు. అందరికి శని వెంటాలుండేమో అన్న భయం సహజంగా ఉంటుంది <a href="https://www.astrosage.com/free/sade-sati-report.asp"> ఏలినాటి శని </a>, అందుకోసం ఈ యంత్రం మిమ్ములను ఏలినాటి శని నుంచి ఈ యంత్రం రక్షిస్తుంది. అందువల్ల మీ దుఃఖం కూడా ఆనందంగా మారుతుంది. శనిగ్రహం నెమ్మదిగా కదిలే గ్రహం, ఇది ఫలితాలను ఆలస్యం చేస్తుంది, కానీ జీవితంలోని మీ సంబంధిత ప్రాంతాల్లో ఎక్కువగా సాధించి విజయాలను సాధించడానికి మిమ్మల్ని ఆశీర్వదిస్తుంది. ఈ యంత్రాన్ని ధరించడం ద్వారా మీ వృత్తిలో, వ్యాపారంలో మంచి ఫలితాలను పొందవచ్చు. విద్యార్థులకు మంచి ఫలితాలు అందుకోవడం కోసం మీకు సహాయం చేస్తుంది. మీరు ప్రయాణం చేసే సమయంలో మిమ్మల్ని కాపాడుతుంది, మీ ఒత్తిడిని మరియు శ్రమ నుంచి విముక్తి కల్పిస్తుంది. శని యొక్క అనుగ్రహం సరిగా లేని వారికి ఈ యంత్రాన్ని బలంగా సూచిస్తారు.

RAHU_YANTRA =ఈ యంత్రాన్ని మిగిలిన నవగ్రహ యంత్రాల కన్నా ఎక్కువగా ధరిస్తారు. ఈ యంత్రానికి రాహు దేవిని అనుగ్రహం ఉన్నందువల్ల రాహు యంత్రం అని పిస్తారు, ఈ యంత్రాన్ని పుంలింగ యంత్రం అని కూడా పిస్తారు.  రాహు గ్రాహం ప్రతికూల ఫలితాలను లేదా మిశ్రమ  ఫలితాలు ఇచ్చే గ్రహం. ఎప్పుడూ కూడా పూర్తి సానుకూల ఫలితాలని అనుగ్రహించాదు. అందుచేత ఈ యంత్రాన్ని ఎక్కువగా ధరిస్తారు.  మీ జాతకము లో రాహు యొక్క అనుగ్రహం సరిగ్గా లేకపోతే ఈ రకమైన ప్రతికూల ఫలితాలను పొందుతారు. ఈ పరిస్థితిని సమతుల్యపరచడానికి, రాహు యంత్రాన్ని ధరించాలి. రాహువు జన్మ పఠంలో అనుకూలంగా అనుగ్రహిస్తే, అది మిశ్రమ ఫలితాలను ప్రతిబింబిస్తుంది, అందువలన రాహువు యొక్క శక్తిని పెంచుకోవడానికి యంత్రాన్ని ధరించవచ్చు, తద్వారా మీరు గరిష్ట ఫలితాలను పొందుతారు. ఈ యంత్రాన్ని ధరించడం ద్వారా, మీ ప్రాణాలను ఏ విధమైన ప్రమాదం నుండి రక్షించటానికి ఇది మీకు సహాయం చేస్తుంది. ఇది ఒక వ్యాధి రహిత జీవితం మరియు ఒక ప్రశాంతమైన జీవితంతో మిమ్మల్ని ఆశీర్వదిస్తుంది. Iఇది మీ వ్యసనాలు వదిలిస్తుంది మరియు దాగి ఉన్న శత్రువులు నుండి రక్షించడానికి మీకు సహాయం చేస్తుంది.  మీ జన్మ పఠంలో రాహు చాలా అసౌకర్యంగా ఉంటే, మీరు ఈ యంత్రాన్ని ధరించాలి.

KETU_YANTRA =ఈ యంత్రం కూడా రాహు యంత్రం లాగా, ప్రజలచే విస్తృతంగా ఉపయోగించబడుతుంది.  ఇది భౌగోళికంగా లేని ఒక నీడ గ్రహం కేతు చేత పాలించబడుతుంది. కేతు యంత్రం, కేతుగ్రహం కోసం ధరించే ఒక పవిత్రమైన అదృష్టపు తాయత్తు. ఒకవేళ కేతువు యొక్క అనుగ్రహం మీకు సరిగ్గా లేకపోతే, మీరు ఈ యంత్రాన్ని ధరించండి. రాహు గ్రాహం లాగా ఈ గ్రహము కూడా మీకు పూర్తి సానుకూల ఫలితాలను ఇవ్వదు. ఇది మోక్షం వైపు దారితీసే చాలా ఆధ్యాత్మిక గ్రహం. ఈ యాత్రను ధరించడం ద్వారా, అనారోగ్య మరియు పేదరికం సందర్భాలలో మీకు ఇది సహాయపడుతుంది.  ఇది మీ శత్రువుల నుండి మిమ్మల్ని రక్షిస్తుంది.  మీరు శాంతియుత జీవితంతో ఆశీర్వదించబడతారు.  కెతు యొక్క దుష్ప్రభావాలు సరిదిద్దబడతాయి. మోక్షానికి సంబంధించి మీరు ప్రేరేపించబడతారు. ఇది మీకు మంచి ఆరోగ్యం, సంపద మరియు శ్రేయస్సు కలిగిస్తుంది.



HOW_TO_INSTALL_SUN_YANTRA =<ul><li>సూర్య యంత్రం సూర్య గ్రాహం యొక్క ప్రాతినిధ్యం వహిస్తుంది. ది ధరించడానికి ముందు ఈ యంత్రాన్ని పచ్చి పాలు లేదా గంగా జలాలతో చల్లి ధరించాలి. </li><li> శివుడు లేదా విష్ణువు కు తెలుపు లేదా ఎర్రటి పువ్వులు మరియు సువాసన కలిగిన సుగంధ చెక్కలను సువాసన అందివ్వండి –"ఓం హ్రామ్ హ్రిమ్ హరౌమ్ సూర్యాయ నమః" – 108 సార్లు పఠించండి యంత్రాన్ని ఉత్తేజ పరచడానికి. </li><li>ఈ ఆచారాలను ప్రదర్శించిన తరువాత, ఇది సూర్యోదయం తర్వాత లేదా కృత్తికా, ఉత్తర ఫాల్గుణి , మరియు ఉత్తర ఆషాడ నక్షత్రాల సమయంలో ఆదివారం నాడు ధరించవచ్చు.</li></ul></b>
HOW_TO_INSTALL_MOON_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/chandra-yantra">చంద్ర యంత్రం</a> చంద్ర గ్రాహం యొక్క ప్రతినిది. ఈ యంత్రాన్ని  ధరించడానికి ముందు ఈ యంత్రాన్ని పచ్చి పాలు లేదా గంగా జలాలతో చల్లి ధరించాలి. </li><li>శివ పార్వతులకు  తెలుపు రంగు పూలు,  సువాసన కలిగిన గంధపు చెక్కలను అందించండి.</li><li>"ఓం శ్రామ్ శ్రిమ్ శ్రౌమ్ చంద్రమాసే నమః" మంత్రాన్ని 108 పఠించండి యంత్రాన్ని ఉత్తేజపరచడానికి. </li></ul>ఈ ఆచారాలను పాటించిన తరువాత పౌర్ణమి లేదా  సోమవారం నాడు <a href="https://www.astrosage.com/planet/moon/nakshtra/hasta-nakshatra-moon-in-hasta.asp">హస్త</a>, రోహిణి and శ్రావణ  సమయము లో ధరించవచ్చు.
HOW_TO_INSTALL_VENUS_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/shukra-yantra">శుక్ర యంత్రం</a> శుక్ర గ్రాహం యొక్క ప్రతినిది . ఈ యంత్రాన్ని  ధరించడానికి ముందు ఈ యంత్రాన్ని పచ్చి పాలు లేదా గంగా జలాలతో చల్లి ధరించాలి. </li><li> లక్ష్మి దేవికి తెలుపు రంగు పూలు,  సువాసన కలిగిన గంధపు చెక్కలను అందించండి.</li><li>Chant Mantra for Shukra (Venus) – "ఓం ధరమ్ ధ్రిమ్ ద్రౌమ్ శుక్రాయ నమః" – మంత్రాన్ని 108 సార్లు పఠించండి. </li></ul>ఈ ఆచారాలను పాటించిన తరువా, శుక్రవారం నాడు లేదా భరణి , <a href="https://www.astrosage.com/nakshatra/purva-phalguni-nakshatra-characteristics.asp">పూర్వ ఫాల్గుణి</a> మరియు పూర్వాషాఢ  సమయాలలో ధరించవచ్చు.
HOW_TO_INSTALL_MERCURY_YANTRA =<ul><li><a href="https://buy.astrosage.com/navagrah-yantra/budh-yantra">బుధగ్రహ యంత్రం</a> ఈ యంత్రం బుధగ్రహాన్ని సూచిస్తుంది. ఈ యంత్రం ధరించే ముందు పచ్చి పాలు లేదా గంగా జాలం లో ముంచాలి. </li><li>మహావిష్ణువుకు ఎరుపు లేదా తెలుపు రంగు పూలను మరియు శుఘంధ పరిమళాలు కలిగిన చెక్కలను అందించి "ఓం భ్రమ్ భ్రిమ్ భ్రౌమ్ సహా భూదాయ నమః " 108 పాటించండి యంత్రాన్ని ఉత్తేజపరచడానికి. </li><li>   ఈ ఆచారాలను పాటించిన తరువాత బుధవారం నాడు ఆశ్లేష జేష్ఠ రేవతి నక్షత్ర సమయం లో ధరించాలి
HOW_TO_INSTALL_MARS_YANTRA =<ul><li><a href="https://www.astrosage.com/planet/mars/mars-mantra-mars-puja-mars-remedy.asp">బుధ గ్రహ యంత్రం</a> బుధ గ్రహాన్ని సూచిస్తుంది.ఈ యంత్రాన్ని రించే ముందు పచ్చి పాలు లేదా గంగా జాలం లో ముంచాలి. </li><li> హనుమంతునికి ఎరుపు లేదా తెలుపు రంగు పూలను మరియు శుఘంధ పరిమళాలు కలిగిన చెక్కలను అందించి </li><li>"ఓం క్రామ్ క్రీం క్రౌమ్ సహా భౌమయ నమః " 108 పాటించండి యంత్రాన్ని ఉత్తేజపరచడానికి. </li></ul>>ఈ ఆచారాలను పాటించిన తరువాత మృగశిర, <a href="https://www.astrosage.com/planet/moon/nakshtra/chitra-nakshatra-moon-in-chitra.asp">చైత్ర</a>ధనిష్ఠ నక్షత్రాల సమయంలో సమయంలో మంగళవారం నాడు ధరించాలి.
HOW_TO_INSTALL_JUPITER_YANTRA =<ul><li> గురు గ్రహ యంత్రం, గురు గ్రహాన్ని సూచిస్తుంది.   ధరించే ముందు పచ్చి పాలు లేదా గంగా జాలం లో ముంచాలి. </li><li>   మహావిష్ణువుకు ఎరుపు లేదా తెలుపు రంగు పూలను మరియు శుఘంధ పరిమళాలు కలిగిన చెక్కలను అందించి, </li><li>Chant <a href="https://www.astrosage.com/planet/jupiter/guru-mantra-guru-puja-guru-remedy.asp">మంత్రం</a> "ఓం గ్రామ్ గ్రిమ్ గ్రౌమ్ సహా గురవే నమః " 108 సార్లు పఠించండి  యంత్రాన్ని ఉత్తేజపరచడానికి. </li><li>ఈ ఆచారాలను పాటించిన తరువాత గురువారం నాడు   పునర్వసు, వైశాఖ, పూర్వభాద్రపద నక్షత్ర సమయం లో ధరించాలి.</li>  </ul>
HOW_TO_INSTALL_SATURN_YANTRA =<ul> <li> శని యుంత్రం శని గ్రహంని సూచిస్తుంది. అది ధరించడానికి ముందు ఈ యంత్రాన్ని పచ్చి పాలు లేదా గంగా జలాలతో చల్లి ధరించాలి. </li> <li>  భైరవ్  దేవుడికి నల్ల ఎరుపు నువ్వుల గింజలు మరియు సువాసన కలిగిన సుగంధ చెక్కలను అందించండి </li> <li> చాంత్ <a href="https://www.astrosage.com/planet/saturn/shani-mantra-shani-puja-shani-remedy.asp">Mantra</a> శని దేవుని కోసం ప్రాం ప్రిమ్ ప్రౌమ్ శనైశ్చరాయ నమః 108 సార్లు పఠించండి యంత్రాన్ని ఉత్తేజ పరచడానికి. </ li> <li> ఈ ఆచారాలను ప్రదర్శించిన తరువాత, ఇది సూర్యాస్తమయం తర్వాత లేదా పుష్య, అనురాధ మరియు ఉత్తర భద్రాపద నక్షత్రాల సమయంలో శనివారం నాడు ధరించవచ్చు. </ li> </ ul>
HOW_TO_INSTALL_RAHU_YANTRA =<ul> <li> <a href="https://buy.astrosage.com/navagrah-yantra/rahu-yantra">రాహు యంత్రం</a> ఈ యంత్రాన్ని ధరించడానికి ముందు ఈ యంత్రాన్ని పాలు లేదా గంగా జలాలతో చల్లి ధరించాలి. </ li> <li>  దుర్గా దేవికి సుగంధ చెక్కల సువాసన అందివ్వండి. </ li> <li> రాహు (ఉత్తర దిక్కు) కోసం శాంతి మంత్రం - బ్రామ్ బ్రిమ్ బ్రోవుము సాహః రాహువే నమః 108 - యంత్రాన్ని ఉత్తేజ పరచడానికి 108 సార్లు పఠించండి. </ li> <li> ఈ ఆచారాలను ప్రదర్శించిన తరువాత, అది శనివారం లేదా స్వాతి, సతభైషా మరియు అర్ధ నృత్త్రాల్లోని ధరించవచ్చు. </ li> </ ul>
HOW_TO_INSTALL_KETU_YANTRA =<ul> <li> కేతు యంత్రం కేతు గ్రహాన్ని సూచిస్తుంది. ఈ యంత్రాన్నిధరించడానికి ముందు ఈ యంత్రాన్ని పాలు లేదా గంగా జలాలతో చల్లి ధరించాలి. </ li> <li>  గణేశునికి  సుగంధ చెక్కల సువాసన అందివ్వండి. </ li> <li> కేతు (దక్షిణ దిక్కు) కోసం శాంతి మంత్రం - "ఓ శం శ్రామ్ శ్రీమ్ శ్రౌమ్ సాహ్ కేతవే నమః" 108 సార్లు పఠించండి, యంత్రాన్ని ఉత్తేజ పరచడానికి. </ li> </ ul> ఈ ఆచారాలను ప్రదర్శించిన తర్వాత, ఇది బుధవారం లేదా శనివారంనాటిలో లేదా <a href="https://www.astrosage.com/planet/moon/nakshtra/ashwini-nakshatra-moon-in-ashwini.asp"> ashwini </a>, మాఘ మరియు మూలా నక్షత్రాల సమయము లో ధరించవచ్చు.
