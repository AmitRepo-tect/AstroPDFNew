	IMPORTANT_INFO                     = <p>ರತ್ನವನ್ನು ಧರಿಸುವಾಗ ಕೆಲವು ವಿಷಯಗಳನ್ನು ದಯವಿಟ್ಟು ಮನಸ್ಸಿನಲ್ಲಿಟ್ಟುಕೊಳ್ಳಿ. ಅಸಲಿಯಲ್ಲದ್ದನ್ನು ಧರಿಸಿದಲ್ಲಿ ಅವು ಯಾವುದೇ ಪರಿಣಾಮ ಬೀರದಿರುವುದರಿಂದ ಅಸಲಿ ರತ್ನವನ್ನೇ ಖರೀದಿಸಿ. ನೀವು ಸಾಮಾನ್ಯವಾಗಿ ರತ್ತಿ ಎಂದು ಕರೆಯಲ್ಪಡುವ ಶಿಫಾರಸು ಮಾಡಿದ ತೂಕವನ್ನೇ ಧರಿಸಬೇಕು. ಇತ್ತೀಚಿನ ದಿನಗಳಲ್ಲಿ ಮಾರುಕಟ್ಟೆಗಯಲ್ಲಿ ನಕಲಿ ರತ್ನಗಳು ತುಂಬಿವೆ. ನಮ್ಮ ಓದುಗರಿಗೆ ಸರಿಯಾದ ನೆರವು ನೀಡಲು ಆಸ್ಟ್ರೋಕ್ಯಾಂಪ್ / ಆಸ್ಟ್ರೋಸೇಜ್ ನಿಮಗೆ ರತ್ನಶಿಲೆಗಳ ನಮ್ಮ ಅನನ್ಯವಾದ ಹಾಗೂ ನೈಜವಾದ ಸಂಗ್ರಹವನ್ನು ಪ್ರಸ್ತುತಪಡಿಸುತ್ತದೆ. ಇದರ ಬಗ್ಗೆ ಇನ್ನಷ್ಟು ತಿಳಿದುಕೊಳ್ಳಲು ಇಲ್ಲಿ ಕ್ಲಿಕ್ ಮಾಡಿ. .</p> <p><b> ರತ್ನಶಿಲೆಗಳನ್ನು ಖರೀದಿಸಲು, ದಯವಿಟ್ಟು <a href=http://www.astrocamp.com/products.asp><u> ಅನ್ನು ಪರಿಶೀಲಿಸಿ ನಮ್ಮ ರತ್ನಶಿಲೆಗಳ ಆಸ್ಟ್ರೋ ಮಳಿಗೆಯನ್ನು ಪರಿಶೀಲಿಸಿ </u></a></b>.</p> <p><b> ನಮ್ಮ ತಜ್ಞ ಜ್ಯೋತಿಷಿಗಳಿಂದ ನಿಮ್ಮ  ರತ್ನಶಿಲೆಗಳ ಶಿಫಾರಸುಗಳನ್ನು ಪಡೆಯಲು <a href=http://www.astrocamp.com/service.asp?service_id=84&prtnr_id=1><u>ನಲ್ಲಿನ ರತ್ನಶಿಲೆಗಳ ಶಿಫಾರಸು ಪುಟಕ್ಕೆ ಭೇಟಿ ನೀಡಿ </u></a></b>.</p>
