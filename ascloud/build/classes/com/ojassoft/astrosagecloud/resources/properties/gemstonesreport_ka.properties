	WHAT_IS_GEMESTONES					= ರತ್ನದ ಹರಳು ಎಂದರೇನು?
	GEMINTRO							= ಇತಿಹಾಸದುದ್ದಕ್ಕೂ ರತ್ನಗಳ ಮುಖ್ಯ ಬಳಕೆ ಚಿಕಿತ್ಸೆ ಮತ್ತು ಆಧ್ಯಾತ್ಮಿಕ ಆಚರಣೆಗಳಿಗಾಗಿದೆ. ರತ್ನಗಳು ವಿರಳವಾಗಿದ್ದು ಅದ್ಭತವಾದ ಸೌಂದರ್ಯ ಹೊಂದಿದ್ದರೂ, ಅವು ಅಷ್ಟೊಂದು ಅಮೂಲ್ಯವಾದ ಕಾರಣವೆಂದರೆ ಅವುಗಳನ್ನು ಧರಿಸಿದವರಿಗೆ ಅವುಗಳು ನೀಡುವ ಶಕ್ತಿಯಾಗಿದೆ. ಅವುಗಳು ಸಬಲೀಕರಣದ ಸಂಗ್ರಹಾಗಾರವಾಗಿದ್ದು, ಅವುಗಳು ದೇಹದ ಸಂಪರ್ಕಕ್ಕೆ ಬರುವುದರಿಂದ ಅವು ಹರಡುತ್ತವೆ. ರತ್ನಗಳು ಅವುಗಳನ್ನು ಹೇಗೆ ಬಳಸಲಾಗುತ್ತದೆನ್ನುವುದನ್ನು ಅವಲಂಬಿಸಿ ಲಾಭದಾಯಕ ಅಥವಾ ಹಾನಿಕರ ರೀತಿಯಲ್ಲಿ ಅವುಗಳ ಶಕ್ತಿಯನ್ನು ಪ್ರದರ್ಶಿಸುತ್ತವೆ. ಎಲ್ಲಾ ಕಲ್ಲುಗಳು ಅಥವಾ ರತ್ನಗಳು ವಿವಿಧ ಮಟ್ಟಗಳಲ್ಲಿ ಕಾಂತೀಯ ಶಕ್ತಿಗಳನ್ನು ಹೊಂದಿವೆ, ಮತ್ತು ಅವುಗಳಲ್ಲಿ ಹಲವು ಅವುಗಳ ಚಿಕಿತ್ಸಕ ಪರಿಹಾರದಿಂದ ನಮಗೆ ಉಪಯುಕ್ತವಾಗಿರುತ್ತವೆ. ಅವುಗಳು ಕಂಪನಗಳು ಮತ್ತು ತರಂಗಗಳನ್ನು ಹೊರಸೂಸುತ್ತಿದ್ದು ಅವು ನಮ್ಮ ಇಡೀ ಜೀವನದ ಮೇಲೆ ಬಲವಾದ ಸಂಭಾವ್ಯ ಪ್ರಭಾವ ಹೊಂದಿರುತ್ತವೆ. ನಿಮ್ಮ ರತ್ನದ ಹರಳಿನ ಭವಿಷ್ಯ ಇಲ್ಲಿದೆ. 
	STONE_DESCRIPTION					= ಒಂದು ಜೀವಶಿಲೆ ಲಗ್ನಾಧಿಪತಿಯ ರತ್ನವಾಗಿದೆ. ತನ್ನ ಜೀವನದ ಅತೀಂದ್ರಿಯ ಶಕ್ತಿಗಳನ್ನು ಅನುಭವಿಸಲು ನೀವು ಜೀವನದುದ್ದಕ್ಕೂ ಅವುಗಳನ್ನು ಧರಿಸಬಹುದು. ಜೀವಶಿಲೆಯನ್ನು ಧರಿಸುವುದು ಅಡೆತಡೆಗಳನ್ನು ನಿವಾರಿಸಿ ವ್ಯಕ್ತಿಗೆ ಸಂತೋಷ, ಯಶಸ್ಸು ಮತ್ತು ಸಮೃದ್ಧಿಯ ಗುಣಗಳನ್ನು ಆಶೀರ್ವದಿಸಬಹುದು. ಇದನ್ನು ಸಾಮಾನ್ಯವಾಗಿ ವ್ಯಕ್ತಿಯೊಬ್ಬನ ಯೋಗಕ್ಷೇಮವನ್ನು ಒಟ್ಟಾರೆಯಾಗಿ ಚೆನ್ನಾಗಿರಿಸಲು ಬಳಸಲಾಗುತ್ತದೆ. ಇದರ ಬ್ರಹ್ಮಾಂಡ ಕಿರಣಗಳು ವ್ಯಕ್ತಿಯ ಇಡೀ ಅಸ್ತಿತ್ವದ ಮೇಲೆ ಪ್ರಭಾವ ಬೀರುತ್ತದೆ. #ಜೀವನವು ಪ್ರಯತ್ನಗಳು ಮತ್ತು ಹಣೆಬರಹದ ಒಂದು ಪರಿಪೂರ್ಣ ಮಿಶ್ರಣವಾಗಿದೆ. ನಿಮ್ಮ ಅದೃಷ್ಟದ ಕಲ್ಲನ್ನು ಧರಿಸಿ ನಿಮ್ಮ ಹಣೆಬರಹ ನಿಮಗೆ ಕೆಲಸ ಮಾಡುವಂತೆ ಮಾಡಿ. ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಅದೃಷ್ಟದ ಕಲ್ಲು ಅದೃಷ್ಟವನ್ನು ಚಾಲ್ತಿಯಲ್ಲಿಟ್ಟು ಜೀವನದಲ್ಲಿ ಆಹ್ಲಾದಕರ ಅಚ್ಚರಿಗಳನ್ನು ತರುತ್ತದೆ. ಒಂದು ನಾವು ನಿಮಗೆ ಶಿಫಾರಸು ಮಾಡುವ ಅದೃಷ್ಟದ ಕಲ್ಲೆಂದರೆ: #ಅದೃಷ್ಟದ ಕಲ್ಲು ಎಂದೂ ಕರೆಯಲಾಗುವ ಭಾಗ್ಯದ ಕಲ್ಲಿನ ಶಿಫಾರಸ್ಸನ್ನು ಒಂಬತ್ತನೇ ಮನೆಯನ್ನು ಆಳುವ ಅಧಿಪತಿಯ ಆಧಾರದ ಮೇಲೆ ಮಾಡಲಾಗುತ್ತದೆ. ಈ ಕಲ್ಲು ನಿಮಗೆ ನಿಜವಾಗಿಯೂ ಅಗತ್ಯವಿದ್ದಾಗ ನಿಮಗೆ ಅಗಾಧಾದ ಅದೃಷ್ಟ ತರುತ್ತದೆ. ಒಳ್ಳೆಯ ಅದೃಷ್ಟ ವೈಯಕ್ತಿಕ ಮತ್ತು ವೃತ್ತಿಪರ ಜೀವನದಲ್ಲಿ ನಿಮ್ಮೆಡೆಗೆ ಬರುತ್ತವೆ. ಇದು ಉನ್ನತಿಯ ಮಾರ್ಗದಲ್ಲಿ ನಿಮಗೆ ಅಡ್ಡವಾಗಿರುವ ಯಾವುದೇ ಅಡ್ಡಿಯನ್ನು ಎದುರಿಸಲು ಸಹಾಯವಾಗುತ್ತದೆ. 
	
