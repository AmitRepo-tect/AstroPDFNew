HOW_TO_USE_TREE_ROOT_OF_ASHWAGANDHA=<ul>     <li>  <a href=""http://buy.astrosage.com/jadi-tree-roots/ashwagandha-mool-asgandh-mool"">ಅಶ್ವಗಂಧ</a , ಕೇತು ಗ್ರಹಕ್ಕಾಗಿ ಅಶ್ವಗಂಧ ಗಿಡಮೂಲಿಕೆಯನ್ನು ಕುತ್ತಿಗೆಯ ಸುತ್ತಲೂ ಧರಿಸಬಹುದು ಅಥವಾ ಇದನ್ನು ತೋಳಿನಲ್ಲೂ ಕಟ್ಟಬಹುದು.  </li>     <li> ಇದನ್ನು ಧರಿಸುವ ಮೊದಲು ಇದನ್ನು ಹಾಲು ಅಥವಾ ಗಂಗಾಜಲದಿಂದ ಶುದ್ಧೀಕರಿಸಬೇಕು. </li> <li>  ಭಗವಂತ ಗಣೇಶ ದೇವರಿಗೆ ದುರ್ವಾ, ಕಡ್ಡಿಯನ್ನು ಅರ್ಪಿಸಿ ಕೇತು ಮಂತ್ರವನ್ನು 108 ಬಾರಿ ಜಪಿಸಿ ""ಓಂ ಸ್ರಾಂ ಸ್ರೀಂ ಸ್ರೌಂ ಸಃ ಕೇತವೇ ನಮಃ""  </li>     <li> ಈ ಎಲ್ಲಾ ನಿಯಮಗಳನ್ನು ಅನುಸರಿಸಿದ ನಂತರ, ನೀವು ಇದನ್ನು ಬುಧವಾರ ಅಥವಾ ಶನಿವಾರ ಅತಃವ ಅಶ್ವಿನಿ, ಮಘಾ ಮತ್ತು ಮೂಲ ನಕ್ಷತ್ರದಲ್ಲಿ ಧರಿಸಬಹುದು. </li> </ul>
HOW_TO_USE_TREE_ROOT_OF_ARAND= <ul>     <li>       ಮೂಲವನ್ನು ಕುತ್ತಿಗೆ  ತೋಳಿನಲ್ಲಿ ಧರಿಸಬಹುದು.  </li>     <li>       ಮೂಲಕೆಯನ್ನು ಧರಿಸುವ ಮೊದಲು ಇದನ್ನು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ ಹಾಲಿನಿಂದ ಶುದ್ಧೀಕರಿಸಿ. </li>     <li>       इसके पश्चात माँ लक्ष्मी जी को सफ़ेद पुष्प, धूप-दीप, अगरबत्ती अर्पित करते हुए "ॐ द्रां द्रीं द्रौं सः शुक्राय नमः" मंत्र का 108 बार जाप करना चाहिएಇದರ ನಂತರ ತಾಯಿ ಲಕ್ಷ್ಮಿಗೆ ಬಿಳಿ ಹೂವು, ಕಡ್ಡಿ, ಸಾಂಬ್ರಾಣಿ ಮತ್ತು ದೀಪವನ್ನು ಅರ್ಪಿಸಿ ಇದರೊಂದಿಗೆ "ಓಂ ದ್ರಾಂ ದ್ರೀಂ ದ್ರೌಂ ಸಃ ಶುಕ್ರಾಯ ನಮಃ" ಮಂತ್ರವನ್ನು 108 ಬಾರಿ ಜಪಿಸಬೇಕು. </li>  </ul>   ಈ ವಿಧಾನವನ್ನು ಪೂರ್ಣಗೊಳಿಸಿದ ನಂತರ ಶುಕ್ರವಾರ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/bharani-nakshatra-characteristics.asp">ಭರಣಿ</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-phalguni-nakshatra-characteristics.asp">ಪೂರ್ವಾಫಾಲ್ಗುಣಿ</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-shadha-nakshatra-characteristics.asp">ಪೂರ್ವಾಷಾಢಾ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಈ ಮೂಲವನ್ನು ಧರಿಸುವುದು ಅತ್ಯಂತ ಶುಭಕರ. 
