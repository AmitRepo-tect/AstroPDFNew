
JADI_SUGGESTION_REPORT=ಈ ಪ್ರಪಂಚದಲ್ಲಿ ಪ್ರತಿಯೊಬ್ಬ ವ್ಯಕ್ತಿಯು ಸಂತೋಶದದಿಂದ ಜೀವನ ಕಳೆಯಲು ಬಯಸುತ್ತಾನೆ ಮತ್ತು ನೀವು ಕೂಡ ಇದನ್ನೇ ಬಯಸುತ್ತಿರಿ. ತಮ್ಮ ಈ ಕನಸನ್ನು ಈಡೇರಿಸಲು ನೀವು ಅನೇಕ ರೀತಿಯಲ್ಲಿ ಪ್ರಯತ್ನಿಸುತ್ತೀರಿ. ಇದರ ಹೊರೆತಾಗಿಯೂ ನಿಮ್ಮ ಆಸೆ ಅಪೂರ್ಣವಾಗಿರುತ್ತದೆ. ಆದರೆ ನಮ್ಮ ಬಳಿ ನಿಮ್ಮ ಈ ಆಸೆಯನ್ನು ಈಡೇರಿಸಲು ತುಂಬಾ ಪ್ರಯೋಜನಕಾರಿ ಪರಿಹಾರವಿದೆ - ಗಿಡಮೂಲಿಕೆ ಸಲಹೆ ರಿಪೋರ್ಟ್. ಈ ರಿಪೋರ್ಟ್ ಮೂಲಕ ಯಾವ ಗಿಡಮೂಲಿಕೆಗಳಿಂದ ನಿಮ್ಮ ಸಮಸ್ಯೆಯ ಪರಿಹಾರ ಸಾಧ್ಯವೆಂದು ನಾವು ನಿಮಗೆ ತಿಳಿಸುತ್ತೇವೆ. 
JADI_AND_ITS_IMPORTANCE=ನಮ್ಮ ಜೀವನದಲ್ಲಿ ಗಿಡ ಮತ್ತು ಮರಗಳ ತುಂಬಾ ಪ್ರಾಮುಖ್ಯತೆ ಇದೆ. ಏಕೆಂದರೆ ಈ ಸಸ್ಯಗಳಿಂದಾಗಿ ಭೂಮಿಯ ಮೇಲೆ ಜೀವನ ಸಾಧ್ಯ. ವಿಜ್ಞಾನದ ಪ್ರಕಾರ, ಸಸ್ಯಗಳು ಆಮ್ಲಜನಕ ಅನಿಲವನ್ನು ಹೊರಸೂಸುತ್ತವೆ ಮತ್ತು ಕಾರ್ಬನ್ ಡೈ ಆಕ್ಸೈಡ್ ಅನ್ನು ತೆಗೆದುಕೊಳ್ಳುತ್ತವೆ. ಆಮ್ಲಜನಕ ನಮಗೆ ಜೀವನ ಎಂದು ನಮಗೆ ತಿಳಿದಿದೆ. ಆದ್ದರಿಂದ ಇದಿಲ್ಲದೆ ನಮ್ಮ ಜೀವನ ಅಸಾಧ್ಯ. ಸಸ್ಯಗಳ ಈ ಸಮಗ್ರ ಮಹತ್ವವನ್ನು ಅರ್ಥಮಾಡಿಕೊಂಡು ಹಿಂದೂ ಜೀವನ ಪದ್ಧತಿಯಲ್ಲಿ ಇದನ್ನು ಧರ್ಮಕ್ಕೆ ಸೇರಿಸಲಾಗಿದೆ. ಆದ್ದರಿಂದ ಹಿಂದೂ ಧರ್ಮದಲ್ಲಿ ಯಾವುದೇ ಸಸ್ಯವನ್ನು ಪವಿತ್ರವೆಂದು ನಂಬಿ ಅದನ್ನು ಪೂಜಿಸಲಾಗುತ್ತದೆ. ವೈದ್ಯಕೀಯ ಕ್ಷೇತ್ರದಲ್ಲಿ ಪ್ರಾಚೀನ ಕಾಲದಿಂದಲೇ ಸಸ್ಯಗಳ ಮೂಲಿಕೆ/ಬೇರುಗಳನ್ನು ಬಳಸಲಾಗುತ್ತದೆ. ಆದ್ದರಿಂದ ಜ್ಯೋತಿಷ್ಯ ಶಾಸ್ತ್ರದಲ್ಲಿ ಗಿಡಮೂಲಿಕೆಗಳಿಗೆ ಅತ್ಯಂತ ಪ್ರಾಮುಖ್ಯತೆ ನೀಡಲಾಗಿದೆ. ಜ್ಯೋತಿಷ್ಯ ಶಾಸ್ತ್ರದಲ್ಲಿ ಗಿಡಮೂಲಿಕೆಗಳನ್ನು ವಿವಿಧ ಗ್ರಹಗಳ ಪರಿಹಾರವಾಗಿ ಬಳಸಲಾಗುತ್ತದೆ. ನಿಮ್ಮ <a href="http://hindi.astrosage.com/free/hindi-kundli.asp"> ಜನ್ಮ ಜಾತಕ </a> ದಲ್ಲಿ ಯಾವುದೇ ಗ್ರಹವು ದುರುದ್ವೇಷಪೂರಿತವಾಗಿದ್ದರೆ, ಗಿಡಮೂಲಿಕೆಗಳ ಮೂಲಕ ಅದರ ನಕಾರಾತ್ಮಕ ಪರಿಣಾಮದಿಂದ ರಕ್ಷಿಸಲಾಗುತ್ತದೆ. ವೈದಿಕ ಶಾಸ್ತ್ರದಲ್ಲಿ ಗ್ರಹಗಳಿಗಾಗಿ ಒಂಬತ್ತು ವಿಭಿನ್ನವಾದ ಗಿಡಮೂಲಿಕೆಗಳನ್ನು ನಿರ್ಧರಿಸಲಾಗಿದೆ. ಜ್ಯೋತಿಷ್ಯದಲ್ಲಿ, ಪ್ರಮುಖವಾಗಿ ಏಳು ದೊಡ್ಡ ಗ್ರಹಗಳಿವೆ, ಆದರೆ ರಾಹು ಮತ್ತು ಕೇತು ಎರಡೂ ನೆರಳು ಗ್ರಹದ ವರ್ಗಕ್ಕೆ ಬರುತ್ತಾರೆ. ವಾತಾವರಣದಲ್ಲಿ ಪರಿಚಲನೆಗೊಳ್ಳುವ ಶಕ್ತಿಯನ್ನು ಸಮತೋಲನಗೊಳಿಸಲು ಬೇರುಗಳು ಕಾರ್ಯನಿರ್ವಹಿಸುತ್ತವೆ. ಇವುಗಳನ್ನು ಧರಿಸುವುದರಿಂದ ವ್ಯಕ್ತಿಯು ಅದ್ಭುತ ಫಲಿತಾಂಶಗಳನ್ನು ಪಡೆಯುತ್ತಾನೆ. ಆದಾಗ್ಯೂ ಜನ್ಮ ಜಾತಕದ ಆಧಾರದ ಮೇಲೆ ಗಿಡಮೂಲಿಕೆಗಳನ್ನು ಧರಿಸಬೇಕು. ಹಿಂದೂ ಜ್ಯೋತಿಷ್ಯದಲ್ಲಿ ಗಿಡಮೂಲಿಕೆಗಳನ್ನು <a href="http://horoscope.astrosage.com/hindi/ratna-jyotish/"> ರತ್ನ </a> ದ ಪರ್ಯಾಯವೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ಗಿಡಮೂಲಿಕೆಯನ್ನು ಜ್ಯೋತಿಷ್ಯ ವಿಧಾನದ ಪ್ರಕಾರ ಧರಿಸಿದರೆ, ಸ್ಥಳೀಯನು ಇದರ ಅನೇಕ ಫಲಿತಾಂಶವನ್ನು ಪಡೆಯುತ್ತಾನೆ. ಗಿಡಮೂಲಿಕೆಗಳು ರತ್ನ ಕಲ್ಲುಗಳಿಗಿಂತ ಹೆಚ್ಚು ಪರಿಣಾಮಕಾರಿ. ರತ್ನ ಕಲ್ಲುಗಳು ಹೆಚ್ಚು ಮೌಲ್ಯಯುತವಾಗಿರುತ್ತವೆ ಮತ್ತು ಅವುಗಳನ್ನು ಧರಿಸುವುದು ಪ್ರತಿಯೊಬ್ಬರ ವಶದಲ್ಲಿಲ್ಲ. ಗ್ರಹಗಳ ದುರುದ್ವೇಷಪೂರಿತ ಪರಿಣಾಮಗಳನ್ನು ದುರ್ಬಲಗೊಳಿಸಲು ಮತ್ತು ಬಯಸುವ ಫಲಿತಾಂಶವನ್ನು ಪಡೆಯಲು ಗಿಡಮೂಲಿಕೆಗಳನ್ನು ಧರಿಸಬಹುದು. 
RECOMMENDATIONS=ನಮ್ಮ ವಾತಾವರಣದಲ್ಲಿ ಅನೇಕ ರೀತಿಯ ಗಿಡಮೂಲಿಕೆಗಳು ಸಿಗುತ್ತವೆ, ಅವುಗಳನ್ನು ಗಮನಾರ್ಹ ಉದ್ದೇಶ ಮತ್ತು ಲಾಭಕ್ಕಾಗಿ ಧರಿಸಲಾಗುತ್ತದೆ. ಅವುಗಳಲ್ಲಿ ನಿಮಗಾಗಿ ಯಾವ ಬೇರುಗಳು ಪ್ರಯೋಜನಕಾರಿ? ಈ ಪ್ರಶ್ನೆಯ ಉತ್ತರವು ನಿಮ್ಮ ಜನ್ಮ ಜಾತಕದ ಅಧ್ಯಯನ ಮಾಡಿದ ನಂತರ ಮಾತ್ರ ಪಡೆಯಬಹುದು. ಇದಕ್ಕಾಗಿ ನೀವು ಜ್ಯೋತಿಷ್ಯ ಸಮಾಲೋಚನೆ ತೆಗೆದುಕೊಳ್ಳುವ ಅಗತ್ಯವಿದೆ. ಗಿಡಮೂಲಿಕೆಯನ್ನು ಧರಿಸಿದ ನಂತರ ನೀವು ಅದರ ಪರಿಣಾಮವನ್ನು ನೋಡಲಾಗುತ್ತದೆ. ಯಾವ ಗ್ರಹಕ್ಕೆ ಯಾವ ಮೂಲವನ್ನು ಬಳಸಲಾಗುತ್ತದೆ ಎಂಬುದನ್ನು ಇಲ್ಲಿ ನಾವು ನಿಮಗೆ ತಿಳಿಸುತ್ತೇವೆ. 
IMPORTANCE_OF_NATURAL_JADI =ಇತ್ತೀಚಿನ ದಿನಗಳಲ್ಲಿ ನೈಸರ್ಗಿಕ ಬೇರುಗಳು ಮಾತ್ರ ಮಾರುಕಟ್ಟೆಯಲ್ಲಿ ಕಂಡುಬರುತ್ತವೆ. ಏಕೆಂದರೆ ಮಾರುಕಟ್ಟೆಯು ನಕಲಿ ಬೇರುಗಳಿಂದ ತುಂಬಿದೆ. ನೆನಪಿನಲ್ಲಿಡಿ, ಒಬ್ಬ ಸಾಮಾನ್ಯ ವ್ಯಕ್ತಿಗೆ ನಕಲಿ ಗಿಡಮೂಲಿಕೆ ಮತ್ತು ನಿಜವಾದ ಗಿಡಮೂಲಿಕೆಯ ನಡುವಿನ ವ್ಯತ್ಯಾಸವನ್ನು ಗುರುತಿಸುವುದು ಕಷ್ಟ ಮತ್ತು ಜ್ಯೋತಿಷ್ಯ ದೃಷ್ಟಿಕೋಣದಿಂದ ನಕಲಿ ಗಿಡಮೂಲಿಕೆಗಳ ಯಾವುದೇ ಮಹತ್ವವಿಲ್ಲ. ಆದರೆ ನಮ್ಮ ಬಳಿ 100% ನೈಸರ್ಗಿಕ ಮತ್ತು ಶುದ್ಧ ಗಿಡಮೂಲಿಕೆ ಲಭ್ಯವಿದೆ. ಇದನ್ನು ಧರಿಸಿ ನೀವು ಜ್ಯೋತಿಷ್ಯ ಲಾಭವನ್ನು ಪಡೆಯಬಹುದು. ಎಲ್ಲಾ ಬೇರುಗಳ ವಾಸ್ತವತೆಯನ್ನು ಲ್ಯಾಬ್ ಮೂಲಕ ಪ್ರಮಾಣೀಕರಿಸಲಾಗಿದೆ. 


TREE_ROOT_OF_BEL= <a href="http://buy.astrosage.com/jadi-tree-roots/belmool?&language=hi"> ಬಿಲ್ಪತ್ರೆ ಬೇರು </a> ಸಂಬಂಧವು <a href="http://www.astrosage.com/hindi/planet/sun/"> ಸೂರ್ಯ </a> ಗ್ರಹದೊಂದಿಗೆ ಇದೆ. ಜ್ಯೋತಿಷ್ಯದ ಪ್ರಕಾರ, ಎಲ್ಲಾ ಗ್ರಹಗಳಲ್ಲಿ ಸೂರ್ಯನ ಮುಖ್ಯಸ್ಥ ಸ್ಥಾನವಿದೆ. ಇದನ್ನು ಆತ್ಮ, ನಾಯಕ, ಸರ್ಕಾರಿ ಮತ್ತು ವೈಯಕ್ತಿಕ ಕ್ಷೇತ್ರದಲ್ಲಿ ಉನ್ನತ ಸ್ಥಾನ ಪಡೆಯುವ ಅಂಶವೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ನಿಮ್ಮ ಜಾತಕದಲ್ಲಿ ಸೂರ್ಯನು ದುರುದ್ವೇಷಪೂರಿತ ಸ್ಥಾನದಲ್ಲಿ ಕುಳಿತಿದ್ದರೆ, ಇದರ ನಕಾರಾಂತಕ ಪರಿಣಾಮದಿಂದ ತಪ್ಪಿಸಲು ಬಿಲ್ಪತ್ರೆಯ ಬೇರನ್ನು ಧರಿಸಬೇಕು. ಇದರ ಪರಿಣಾಮದಿಂದ ಸೂರ್ಯನ ಸ್ಥಾನವು ಬಲಗೊಳ್ಳುತ್ತದೆ ಮತ್ತು ಸ್ಥಳೀಯನು ಇದರ ಶುಭ ಫಲಿತಾಂಶವನ್ನು ಪಡೆಯುತ್ತಾನೆ. ನೀವು ಸಮಾಜದಲ್ಲಿ ಗೌರವ, ಸ್ಥಾನಮಾನ, ಪ್ರತಿಷ್ಠೆ ಪಡೆಯಲು ಬಯಸಿದರೆ ಈ ಗಿಡಮೂಲಿಕೆಯ ಮೂಲಕ ನೀವು ಬಯಸಿದ ಫಲಿತಾಂಶಗಳನ್ನು ಪಡೆಯುತ್ತೀರಿ. 
TREE_ROOT_OF_KHIRNI=ವೈದಿಕ ಜ್ಯೋತಿಷ್ಯದ ಪ್ರಕಾರ ಬಕುಲಾ ಬೇರು <a href="http://www.astrosage.com/hindi/planet/moon/"> ಚಂದ್ರ ಗ್ರಹ </a> ವನ್ನು ಶಾಂತಗೊಳಿಸಲು ಧರಿಸಲಾಗುತ್ತದೆ. ಜ್ಯೋತಿಷ್ಯದಲ್ಲಿ ಚಂದ್ರ ನಮ್ಮ ಮನಸ್ಸಿನ ಅಂಶ.ಆದ್ದರಿಂದ ಈ ಗ್ರಹವು ನಮಗಾಗಿ ಬಹಳ ಮುಖ್ಯವಾದ ಗ್ರಹವಾಗಿದೆ. ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಮನಸ್ಸು ಸಂತೋಷವಾಗಿದ್ದರೆ ಆ ವ್ಯಕ್ತಿಯು ಪ್ರಪಂಚದ ಪ್ರತಿಯೊಂದು ವಸ್ತುವಿನಲ್ಲಿ ಸಂತೋಷವನ್ನು ಪಡೆಯುತ್ತಾನೆ ಎಂದು ಹೇಳಲಾಗುತ್ತದೆ. ಆದ್ದರಿಂದ ಸಂತೋಷಕರ ಜೀವನವನ್ನು ಕಳೆಯಲು ನಾವು ಮಾನಸಿಕವಾಗಿ ಅರ್ಗ್ಯವಾಗಿರುವ ಅಗತ್ಯವಿರುತ್ತದೆ. ನೀವು ಈ ಗಿಡಮೂಲಿಕೆಯನ್ನು ಧರಿಸಿದರೆ, ಮಾನಸಿಕವಾಗಿ ಆರೋಗ್ಯವಾಗಿರುತ್ತಿರಿ ಮತ್ತು ನಿಮ್ಮ ಮನಸ್ಸಿನಲ್ಲಿ ಯಾವುದೇ ರೀತಿಯ ದಿಗ್ಭ್ರಮೆ ಉಂಟಾಗುವುದಿಲ್ಲ. ಮನಸ್ಸಿನ ಸ್ಥಿರತೆಯನ್ನು ಕಾಪಾಡಿಕೊಳ್ಳಲು ಬಕುಲಾ ಮೂಲವನ್ನು ಧರಿಸುವುದು ಪ್ರಯೋಜನಕಾರಿ. ಇದರ ಪರಿಣಾಮದಿಂದ ನೀವು ಮಾನಸಿಕ ಒತ್ತಡ, ಡಿಪ್ರೆಶನ್ ಇತ್ಯಾದಿಗಳಿಂದ ಮುಕ್ತಿ ಪಡೆಯಲು ಸಾಧ್ಯವಾಗುತ್ತದೆ. 
