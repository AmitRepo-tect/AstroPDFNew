TREE_ROOT_OF_BICHUA=ಜ್ಯೋತಿಷ್ಯದ ಪ್ರಕಾರ, ತೋರಿಕೆ ಬೇರು ಮತ್ತು ಉಮ್ಮತ್ತಿ ಬೇರಿನ ಸಂಬಂಧವು <a href="http://www.astrosage.com/hindi/planet/saturn/"> ಶನಿ </a> ಗ್ರಹದೊಂದಿಗೆ ಇದೆ. ಶನಿ ದೇವರು ನ್ಯಾಯ ಮತ್ತು ನಿಧಾನಗತಿಯ ಚಲನೆಗೆ ಹೆಸರುವಾಸಿಯಾಗಿದ್ದಾರೆ. ಆದ್ದರಿಂದ ಸ್ಥಳೀಯರು ಇದರ ಫಲಿತಾಂಶಗಳನ್ನು ತಡವಾಗಿ ಪಡೆಯುತ್ತಾರೆ. ಜ್ಯೋತಿಷ್ಯದಲ್ಲಿ ಇದನ್ನು ಕ್ರೂರ ಗ್ರಹವೆಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಶನಿಯ ನಕಾರಾತ್ಮಕ ಪರಿಣಾಮಗಳಿಂದ ವ್ಯಕ್ತಿಯು ತನ್ನ ವೃತ್ತಿಪರ ಮತ್ತು ಶಿಕ್ಷಣದಲ್ಲಿ ಹಾನಿಯನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ಇದಲ್ಲದೆ ವ್ಯಕ್ತಿಯು ಒಂದು ರೀತಿಯ ಭಯವನ್ನು ಅನುಭವಿಸುತ್ತಾನೆ. ಮಾನಸಿಕವಾಗಿ ಸ್ಥಳೀಯರು ಕಷ್ಟಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ನಿಮ್ಮ ಜಾತಕದಲ್ಲಿ ಶನಿ ದುರುದ್ವೇಷಪೂರಿತ ಸ್ಥಾನದಲ್ಲಿದ್ದರೆ, ನೀವು ಅದರ ನಕಾರಾತ್ಮಕ ಫಲಿತಾಂಶವನ್ನು ಪಡೆಯುತ್ತೀರಿ. ಅಂತಹ ಸಂದರ್ಭದಲ್ಲಿ ಉಮ್ಮತ್ತಿ ಬೇರು ಅಥವಾ ತುರಿಕೆ ಮೂಲವನ್ನು ಧರಿಸಿ ಅದರ ಕೆಟ್ಟ ಪ್ರಭಾವದಿಂದ ತಪ್ಪಿಸಬಹುದು. ಗಿಡಮೂಲಿಕೆಯ ಪರಿಣಾಮದಿಂದ ನೀವು ಶನಿ ದೇವರ ಆಶೀರ್ವಾದವನ್ನು ಪಡೆಯುತ್ತೀರಿ ಮತ್ತು ನೀವು ಇದರ ಉತ್ತಮ ಫಲಿತಾಂಶಗಳನ್ನು ಪಡೆಯುತ್ತೀರಿ. 
TREE_ROOT_OF_CHANDAN=ಶ್ರೀಗಂಧ ಮತ್ತು ನಾಗರ್ಮೋತ ಬೇರಿನ ಸಂಬಂಧವು <a href="http://www.astrosage.com/hindi/planet/rahu/"> ರಾಹು </a> ಗ್ರಹದೊಂದಿಗೆ ಇದೆ. ಈ ಗಿಡಮೂಲಿಕೆಯನ್ನು ರಾಹು ಗ್ರಹದ ಶಾಂತಿಗಾಗಿ ಧರಿಸಲಾಗುತ್ತದೆ. ಜ್ಯೋತಿಷ್ಯದ ಪ್ರಕಾರ, ರಾಹುವು ಲೌಕಿಕ ಬಯಕೆಯ ಕಡೆಗೆ ವ್ಯಕ್ತಿಯ ಮನಸ್ಸಿನಲ್ಲಿ ಗಂಭೀರತೆಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತಾನೆ. ಇದು ಜೀವನದಲ್ಲಿ ಜಾಣತನ, ಮಾಹಿತಿ, ತಾಂತ್ರಿಕ ಮತ್ತು ರಾಜಕೀಯ ಇತ್ಯಾದಿಯನ್ನು ತೋರಿಸುತ್ತದೆ. ಇದು ಯಾವಾಗಲು ಜನರ ಗಮನವನ್ನು ತನ್ನ ಕಡೆಗೆ ಬಯಸುತ್ತದೆ ಮತ್ತು ಎಲ್ಲಾ ರೀತಿಯ ಭೌತಿಕ ಸಂಪನ್ಮೂಲಗಳನ್ನು ಅನುಭವಿಸಲು ಲವಲವಿಕೆ ಮಾಡುತ್ತದೆ. ಜಾತಕದಲ್ಲಿ ರಾಹುವಿನ ಸ್ಥಾನವು ಕೆಟ್ಟದಾಗಿದ್ದರೆ, ವ್ಯಕ್ತಿಯು ಇದರ ನಕಾರಾತ್ಮಕ ಪ್ರಭಾವದಿಂದ ತಪ್ಪಿಸಲು ನಾಗರ್ಮೋತ ಅಥವಾ ಶ್ರೀಗಂಧದ ಮೂಲವನ್ನು ಧರಿಸಬೇಕು. ಜ್ಯೋತಿಷ್ಯ ವಿಜ್ಞಾನದಲ್ಲಿ ರಾಹುವನ್ನು ಕ್ರೂರ ಗ್ರಹವೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ಇದರ ಕೆಟ್ಟ ಪರಿಣಾಮದಿಂದ ತಪ್ಪಿಸಲು ಈ ಗಿಡಮೂಲಿಕೆಗಳು ಬಹಳ ಪ್ರಯೋಜನಕಾರಿ. 
