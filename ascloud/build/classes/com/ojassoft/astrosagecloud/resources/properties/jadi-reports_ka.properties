TREE_ROOT_OF_DHATURE=ಜ್ಯೋತಿಷ್ಯ ಶಾಸ್ತ್ರದ ಪ್ರಕಾರ <a href="http://buy.astrosage.com/jadi-tree-roots/dhaturekijad?&amp;language=hi">ಉಮ್ಮತ್ತಿ</a> ಮೂಲದ ಸಂಬಂಧವು <a href="http://www.astrosage.com/hindi/planet/saturn/">ಶನಿ</a> ಗ್ರಹದೊಂದಿಗೆ ಇದೆ. ಶನಿ ದೇವರು ತನ್ನ ನ್ಯಾಯ ಮತ್ತು ನಿಧಾನಗತಿಯ ಚಲನೆಗೆ ಹೆಸರುವಾಸಿಯಾಗಿದ್ದಾರೆ. ಆದ್ದರಿಂದ ಸ್ಥಳೀಯರು ಇದರ ಫಲಿತಾಂಶಗಳನ್ನು ತಡವಾಗಿ ಪಡೆಯುತ್ತಾರೆ. ಜ್ಯೋತಿಷ್ಯದಲ್ಲಿ ಇದನ್ನು ಕ್ರೂರ ಗ್ರಹವೆಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಶನಿಯ ನಕಾರಾತ್ಮಕ ಪ್ರಭಾವದಿಂದ ವ್ಯಕ್ತಿಯು ವೃತ್ತಿಪರ ಮತ್ತು ಶಿಕ್ಷಣದಲ್ಲಿ ಹಾನಿಯನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ಇದಲ್ಲದೆ ವ್ಯಕ್ತಿಯು ಒಂದು ರೀತಿಯ ಭಯವನ್ನು ಸಹ ಅನುಭವಿಸುತ್ತಾನೆ. ಮಾನಸಿಕವಾಗಿ ಅವನು ಕಷ್ಟಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗುತ್ತದೆ. ನಿಮ್ಮ ಜಾತಕದಲ್ಲಿ ಶನಿಯು ದುರುದ್ವೇಷಪೂರಿತ ಸ್ಥಾನದಲ್ಲಿದ್ದರೆ ನೀವು ಅದರ ನಕಾರಾತ್ಮಕ ಫಲಿತಾಂಶವನ್ನು ಪಡೆಯುತ್ತೀರಿ. ಅಂತಹ ಪರಿಸ್ಥಿತಿಯಲ್ಲಿ ನೀವು ಉಮ್ಮತ್ತಿಯ ಮೂಲವನ್ನು ಧರಿಸಿ ಅದರ ಕೆಟ್ಟ ಪರಿಣಾಮಗಳಿಂದ ತಪ್ಪಿಸಬಹುದು. ಗಿಡಮೂಲಿಕೆಯ ಪರಿಣಾಮದಿಂದಾಗಿ ಶನಿ ದೇವರ ಆಶೀರ್ವಾದವನ್ನು ಪಡೆಯುತ್ತೀರಿ ಮತ್ತು ನೀವು ಅದರ ಶುಭ ಪರಿಣಾಮವನ್ನು ಪಡೆಯುತ್ತೀರಿ. 



HOW_TO_USE_TREE_ROOT_OF_BEL= <ul>     <li>       ಗಿಡಮೂಲಿಕೆಯನ್ನು ಕುತ್ತಿಗೆ ಅಥವಾ ತೋಳಿನಲ್ಲಿ ಧರಿಸಬಹುದು.  </li>     <li>        ಮೂಲವನ್ನು ಧರಿಸುವ ಮೊದಲು ಇದನ್ನು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ  ಶುದ್ಧೀಕರಿಸಿ.  </li>     <li>      ಇದರ ನಂತರ ಭಗವಂತ ಶಿವನಿಗೆ ಬಿಳಿ ಅಥವಾ ಕೆಂಪು ಹೂವು, ಕಡ್ಡಿ, ಸಾಂಬ್ರಾಣಿ ಅರ್ಪಿಸಿ ಮತ್ತು ದೀಪವನ್ನು ಬೆಳಗಿಸಿ ಪೂಜಿಸಬೇಕು. ಸೂರ್ಯನ ಬೀಕ ಮಂತ್ರ "ಓಂ ಹ್ರಾಂ ಹ್ರೀಂ ಹ್ರೌಂ ಸಃ ಸೂರ್ಯಾಯ ನಮಃ"  ಅನ್ನು 108 ಬಾರಿ ಜಪಿಸಿ. </li>  </ul>ಮೇಲಿನ ವಿಧಾನವನ್ನು ಪೂರ್ಣಗೊಳಿಸಿದ ನಂತರ ಭಾನುವಾರ ಬೆಳಿಗ್ಗೆ ಅಥವಾ  <a href="http://astrosage.com/hindi/nakshatra/krittika-nakshatra-characteristics.asp">ಕೃತಿಕಾ</a>, <a href="http://astrosage.com/hindi/nakshatra/uttara-phalguni-nakshatra-characteristics.asp">ಉತ್ತರಾಫಾಲ್ಗುಣಿ</a> ಮತ್ತು <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">ಉತ್ತರಾಷಾಢಾ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಧರಿಸಬಹುದು. 
HOW_TO_USE_TREE_ROOT_OF_KHIRNI=<ul><li>ಗಿಡಮೂಲಿಕೆಯನ್ನು ಕುತ್ತಿಗೆ ಅಥವಾ ತೋಳಿನಲ್ಲಿ ಧರಿಸಬಹುದು.</li><li>ಮೂಲವನ್ನು ಧರಿಸುವ ಮೊದಲು ಇದನ್ನು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ  ಶುದ್ಧೀಕರಿಸಿ. </li><li>ನಂತರ ಶಿವ ಪಾರ್ವತಿಗೆ ಬಿಳಿ ಹೂವು, ಅಕ್ಕಿ, ಕಡ್ಡಿ, ಸಾಂಬ್ರಾಣಿ, ದೀಪವನ್ನು ಬೆಳಗಿಸಿ "ಓಂ ಶ್ರಾಂ ಶ್ರೀಂ ಶ್ರೌಂ ಸಃ ಚನ್ದ್ರಮಸೇ ನಮಃ" </li><li>ಮೇಲಿನ ವಿಧಾನವನ್ನು ಪೂರ್ಣಗೊಳಿಸಿದ ನಂತರ ಸೋಮವಾರದಂದು ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/hasta-nakshatra-characteristics.asp">ಹಸ್ತ</a>, <a href="http://astrosage.com/hindi/nakshatra/rohini-nakshatra-characteristics.asp">ರೋಹಿಣಿ</a>, <a href="http://astrosage.com/hindi/nakshatra/sravana-nakshatra-characteristics.asp">ಶ್ರಾವಣ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಈ ಮೂಲವನ್ನು ಧರಿಸಬೇಕು ।</li></ul>
HOW_TO_USE_TREE_ROOT_OF_ANANTMOOL=<ul><li>ಗಿಡಮೂಲಿಕೆಯನ್ನು ಕುತ್ತಿಗೆ ಅಥವಾ ತೋಳಿನಲ್ಲಿ ಧರಿಸಬಹುದು. । </li><li>ಗಿಡಮೂಲಿಕೆಯನ್ನು ಧರಿಸುವ ಮೊದಲು ಇದನ್ನು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ ಹಾಲಿನಿಂದ ಶುದ್ಧೀಕರಿಸಿ.</li><li>ತದನಂತರ ಹನುಮಂತನಿಗೆ  ಕೆಂಪು ಹೂವು, ಕಡ್ಡಿ, ದೀಪವನ್ನು ಬೆಳಗಿಸಿ "ಓಂ ಕ್ರಾಂ ಕ್ರೀಂ ಕ್ರೌಂ ಸಃ ಭೌಮಾಯ ನಮಃ" ಮಂತ್ರವನ್ನು 108 ಬರಿ ಜಪಿಸಿ. </li></ul>ಈ ವಿಧಾನವನ್ನು ಪೂರ್ಣಗೊಳಿಸಿದ ನಂತರ ಮೂಲವನ್ನು ಮಂಗಳವಾರ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/mrigasira-nakshatra-characteristics.asp">ಮೃಗಶಿರಾ</a>, <a href="http://astrosage.com/hindi/nakshatra/chitra-nakshatra-characteristics.asp">ಚಿತ್ರ</a>, <a href="http://astrosage.com/hindi/nakshatra/dhanishta-nakshatra-characteristics.asp">ಧನಿಷ್ಠ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಇದನ್ನು ಧರಿಸುವುದು ಅತ್ಯಂತ ಪ್ರಯೋಜನಕಾರಿ.
