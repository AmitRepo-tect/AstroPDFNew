
RUDRAKSH_SUGGESTION_REPORT=ருத்ரக்ஷ் பரிந்துரை அறிக்கையின் உதவினால் நீங்கள் உங்களுக்கான சரியான ருத்ரக்ஷ் தேர்வு செய்ய முடியும். சரியான ருத்ரக்ஷ் அணிந்த பிறகு உங்களுக்கு ஒவ்வொரு துறைகளிலும் நேர்மறையான பலன் கிடைக்கும். ஏனென்றால் ருத்ரக்ஷ் எதிர்மறையான உணர்வுகளை செயல் இழக்க செய்கிறது.
RUDRAKSHA_AND_ITS_IMPORTANCE= <a href="http://buy.astrosage.com/rudraksha?language=hi"> ருத்ரக்ஷ் </a> முக்கியமாக ஒரு விதை உள்ளது, இது ருத்ரக்ஷ் மரத்திலிருந்து பெறப்படுகிறது. இது அடிப்படையில் இரண்டு 'ருத்ரங்கள்' மற்றும் 'அக்ஷங்கள்' இணைப்பதன் மூலம் உருவான சமஸ்கிருத வார்த்தையாகும். இதில் ருத்ரா என்றால் சிவன், அக்ஷ என்றால் சிவபெருமான்  கண்ணீர் துளி (கண்ணீர்) என்று பொருள். அதாவது, ருத்ரக்ஷ்த்தின் ஒருங்கிணைந்த பொருள் 'சிவனின் கண்'. மத நூல்களின்படி, சிவபெருமானின் கண்ணீர் துளிகளிலிருந்து ருத்ரக்ஷ் தோன்றியது.
RECOMMENDATIONS=பல்வேறு வகையான ருத்ரக்ஷ்களின் முக்கியத்துவம் பண்டைய மத நூல்களில் கூறப்பட்டுள்ளது. எந்த ருத்ரக்ஷ் உங்களுக்கு பொருத்தமாக இருக்கும்? இதற்கு ஜோதிட ஆலோசனை அவசியம். இதன் மூலம் நீங்கள் அதன் முழு நன்மைகளையும் பெற முடியும். ஏனென்றால் ஒரு அறிஞர் ஜோதிடர்<a href="http://hindi.astrosage.com/free/hindi-kundli.asp">பிறப்பு ஜாதகம்</a> மட்டுமே உங்களைப் படிக்க முடியும், இதை சரியாகச் சொல்ல முடியும். நினைவில் கொள்ளுங்கள், ருத்ராக்ஷின் அதிகபட்ச நன்மைகளைப் பெற, அதை முழுமையான முறையுடன் அணிய வேண்டியது அவசியம். எனவே, இந்த அறிக்கையில் ருத்ரக்ஷ் வகை மற்றும் ருத்ரக்ஷ் அணியும் முறை ஆகியவற்றை நாங்கள் உங்களுக்கு சொல்லப்போகிறோம்.
IMPORTANCE_OF_NATURAL_RUDRAKSHA=இப்போதெல்லாம் இயற்கை ருத்ரக்ஷ் சந்தையில் அரிதாகவே காணப்படுகிறது. ஏனெனில் சந்தையில் பிளாஸ்டிக் மற்றும் ஃபைபர் செய்யப்பட்ட செயற்கை ருத்ரக்ஷ் நிறைந்திருக்கிறது. இவை சீனாவில் பெரிய அளவில் தொழிற்சாலையில் தயாரிக்கப்பட்டு உலக சந்தையில் விற்கப்படுகின்றன. உண்மையான ருத்ரக்ஷ் மிக குறைந்த அளவில் உள்ளது. வானிலை அவற்றின் உற்பத்தியிலும் ஒரு தாக்கத்தை ஏற்படுத்துகிறது. நினைவில் கொள்ளுங்கள், செயற்கை ருத்ரக்ஷைப் பார்ப்பது உண்மையான ருத்ரக்ஷ் போன்றது, எனவே அவற்றுக்கிடையே  வித்தியாசத்தை சாதாரண மனிதர்கள் அங்கீகரிப்பது கடினம் மற்றும் ஜோதிட பார்வையில், செயற்கை ருத்ராக்ஷுக்கு எந்த முக்கியத்துவமும் இல்லை. ஆனால் எங்களிடம் 100% இயற்கை ருத்ரக்ஷ் கிடைக்கிறது, அதை அணிவதன் மூலம் அதன் ஜோதிட நன்மைகளைப் பெறலாம். எங்கள் ருத்ரக்ஷ்த்தின் உண்மை ஆய்வகத்தால் சான்றளிக்கப்பட்டது.




RUDRAKSHA_ONE_FACED =<a href="http://buy.astrosage.com/rudraksha/ek-1-mukhi-rudraksha?&amp;language=hi">ஒன்று முகம் ருத்ரக்ஷ்</a> உங்கள் கர்மாவை நேர்மறை வடிவமாக மாற்றுகிறது. சிவபெருமானின் அடையாளமாக இருப்பதால் ஒன்று முகம் ருத்ரக்ஷ் மிகவும் புனிதமானதாக கருதப்படுகிறது. அதை அணிந்த நபர் தீய சக்திகளிடமிருந்து பாதுகாக்கப்படுகிறார், அது எப்போதும் சூரிய உதயத்தின் பாதையில் நடக்கிறது. இந்த விளைவின் மூலம், நபரின் உள் சக்திகள் விழித்துக் கொள்ளப்படுகின்றன. எனவே, நீங்கள் ஆன்மீக அறிவைப் பெற விரும்பினால், இந்த ருத்ரக்ஷ் உங்களுக்கு பயனுள்ளதாக இருக்கும். ஒன்று முகம் ருத்ரக்ஷ் பகவான் <a href="http://www.astrosage.com/hindi/planet/sun/">சூரியன்</a> கிரக இருக்கும் இதனால் இது நமது ஆத்மவிற்கு விழிப்புணர்வை ஏற்படுத்துகிறது.  ஞாபக சக்திக்கு இது மிகவும் மதிப்பு மிக ருத்ரக்ஷ் ஆகும் <a href="http://horoscope.astrosage.com/hindi/ek-mukhi-rudraksha-ke-labh/">இன்று முகம் ருத்ரக்ஷின் சிறப்பான குணம் </a> தற்போதாகும். இது அதிக வெப்பநிலை மற்றும் ரத்தம் அழுத்தம் போன்ற பிரச்சனையை விலக்குகிறது. ஒன்று முகம் ருத்ரக்ஷ் சூரியனை உங்கள் ஆளுமையை குறிக்கிறது மற்றும் இது வழியில் வருகின்ற சவால்களை எதிர் கொள்கிறது.
HOW_TO_WEAR_ONE_FACED  = ஒன்று முகம் ருத்ரக்ஷ் தங்கம் அல்லது வெள்ளியில் பொருத்தி அல்லது பொருத்தமலும் அணியலாம். இந்த ருத்ரக்ஷத்தை சிவப்பு அல்லது கருப்பு அல்லது தங்கம் அல்லது வெள்ளி சங்கிலிகளால் மட்டுமே அணிய வேண்டும். ருத்ரக்ஷ் அணிவதற்கு முன், கங்கை நீர் அல்லது காய்ச்சாத பால் அதன் மீது தெளித்து புனிதமாக்கவும். அதன் பிறகு, சிவன் அல்லது விஷ்ணுவை வெள்ளை அல்லது சிவப்பு பூக்கள், தூபம், ஆகாரவர்தி கொண்டு வணங்குங்கள் மற்றும் சூரியன் பீஜ் மந்திரம் "ௐ ஹ்ராஂ ஹ்ரீஂ ஹ்ரௌஂ ஸஃ ஸூர்யாய நமஃ" 108 முறை உச்சரிக்கவும். மேற்கண்ட விதிமுறை செய்தபின், ருத்ரக்ஷ் ஞாயிற்றுக்கிழமை பெறவும் அல்லது <a href="http://astrosage.com/hindi/nakshatra/krittika-nakshatra-characteristics.asp">கார்த்திகை</a>, <a href="http://astrosage.com/hindi/nakshatra/uttara-phalguni-nakshatra-characteristics.asp">உத்திராடம்</a> மற்றும் <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">உத்திராடம் நட்சத்திரம்</a> த்தில் அணிய வேண்டும். 

RUDRAKSHA_TWO_FACED	=<a href="http://buy.astrosage.com/rudraksha/do-2-mukhi-rudraksha?&amp;language=hi">இரண்டு முகம் ருத்ரக்ஷ்</a> கணவன் மனைவிக்கு இடையில் ஒரு நல்ல  ஒற்றுமை இருக்கும். மத நூல்கள் படி இந்த ருத்ரக்ஷ் சிவன் பகவான் அர்தநாரீஸ்வர் உருவம் உடையதாகும். சிவன் பாகனின் இந்த உருவத்தில் சுயமாகவே பகவான் ஈஸ்வரன் மற்றும் பார்வதி அம்மை உருவம் தோன்றுகிறது. வேத ஜோதிட சாஸ்திரப்படி இரண்டு முகம் ருத்ரக்ஷ் பகவான் <a href="http://www.astrosage.com/hindi/planet/moon/">சந்திர கிரக</a> ஆகும். எனவே ஒரு நபரின் பிறப்பு ஜாதகத்தில் சந்திர கிரகம் பலவீனமான சூழ்நிலையில் இருந்தால், அவர்கள் இரெண்டு முகம் ருத்ரக்ஷ் அணிய வேண்டும். இதை அணிவதன் மூலம் ஒரு நபரின் வாழ்க்கையில் அணைத்து துன்பம் வலிகள் விலக கூடும். முக்கியமாக கர்ப்பணி பெண் இவற்றை அணிய வேண்டும். இவற்றை அணிவதன் மூலம் ஒரு நபரின் வாழ்க்கையில் செல்வம் மற்றும்  கிடைக்கும். இது இதயம், நுரையீரல், மூளை மற்றும் வலது கண் போன்றவற்றின் வலிகள் குணமடைய லாபகரமாக இருக்கும். 
