	RASI_PREDICTION_11						= <p>You will have stomach problems, lumps in stomach, cough and cold. Unlucky days are Friday, Wednesday and Sunday. You will have a fair complexion, beautiful eyes and will be rich and happy.</p> <p>You will meet death in Satbhisha nakshatra or Dwitiya Tithi. You will like collecting things,with two wives and short life span.</p> <p>You will be the eldest in family,poor, wheatish in complexion,a loving wife, a childless wife with a mark on your waist.</p> <p>You will make money from sea. Lucky days include Monday, Thursday, Tuesday and Friday not that lucky. If your guru is weak or sinned you must pray. If guru is of low order then loss in business. You be blesses with a son. Years 2, 4, 9, and 12 you suffer from stomach ailments. These years bring pain and you'll be unsuccessful.</p> <p>You will be very helpful, lazy in your work. Years 32, 19 bring ailments. Bitter or sour medicines are good for you.</p> <p>When the suns in Aquarius rasi , you will have a sweet tooth, suffer from TB. You will be sweet spoken, restless in professional life. In the first year diseased, with three brothers and your left hand will have marks. You will have two wives. In the 5th and 6th year you will face poverty. In the 15th year you will fear fire, 12th year fear water and snakes. Hot tempered, womanizer, selfish heavy bodied, restless and stubborn in work. You will have a long neck, tall height and hairy. If the drishti's on Moon you live life till 80yrs. You will meet death on Krishna bhadrpad navmi rohini.</p> <p>In the 11th year you have pain from water; generally you will fear water always. When 16 then fear of evil women or weapons. When 21 fears of snakes and disrespect. At 25 you will face three imbalances and when11, 22, 33 you will have boils and will fear wild animals. When 66 and 44 you will have problems in your teeth, eyes, ears. there will be a mark present on your waist and hand. You generally live on other people's money and are a gambler.<