	RASI_PREDICTION_5							= <p>You're lucky days of the week will be Monday, Tuesday and Sunday. You will suffer from Pith diseases, have less hair, luck from war, dual wife and one will infertile. Waist pain, stomach ache, minor heart problems and head injury will prevail. The high order sun brings a lot of luck while the sun of low order brings woman loss, water loss gains but land gains. The 4th and 8th year of life brings fever. 28th year brings government fear. 51st year brings pain. 30th year will be painful. The years that are ruled by the sun will bring in fear of life.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>The first year of life brings fear of jaundice. 5th year sees pain in hand and leg through animals and fire. 13th year sees fear of diarrhea and 32nd year will see chances of sudden death. 7th year will see you feverish,20th fear of snakes,21st disease. You will be inclined towards war and labeled infamous and a fighter. 28th year will see you suffer from pain in private parts. You will see death on Ashwini Nakshatra, 5th Monday of  Falgun Shukla.</p> <b style='padding-left:90%;'>-Yvan</b> <p>5th, 10th and 15th year of life sees you suffer from weapons, fire, water, breathing, and eye and heart pain. In the 30th year fear from sharp teeth, sharp claw wild animals. 20th year will see fear of snakes. Fear of black magic or fever. You will be courageous, honest blunt, anti woman and have few sons.</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_6							= <p>You will have beautiful eyes, long hair, excess Pith and fair complexion. You'll be lazy when working for others and fast when working for yourself. You will be popular.</p><p> Writing, farming, social service will bring in wealth. Mondays will prove unlucky. Higher position can lead to destruction.</p> <p>First wife is going to be really nice. 4th and 9th year of life will bring eye problems. 50th, 28th, 30th and 47th year of life will bring pain. 50th and 60th year will bring money from land and vehicle. If you Jupiter is on a high you will have great benefits from friends. 30th year you suffer from piles. You will be from a renowned family.</p> <p>5th year of life brings pain in the eye, 3rd year sees fear of fire and the 21st year sees fear of trees of walls. Moles will be present in your gentiles and neck. 13th year sees you suffer from vomit, 15th fear of snakes,30th fear of forests, snakes weapons could cause death.</p> <p>18th, 12th and 6th years bring fear of pain, stones, woman, weapons and fire. 36th and 24th year bring fear of thief and fire. Eyes and- fear too.</p> <p>Life-span till 90years, you will be religious and talented. Beautiful eyes, strong nails, wheatish complexion, rich with other people's wealth and you'll be a traveler.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_7							= <p>You will have beautiful eyes, face, wheatish complexion and heavy beard. Love for government employees. Wednesday, Friday and Saturday will be lucky days. Suffer from cough. Will have less advantage from buying and selling of goods. Head and face will be injured. When 8 year old, you might suffer falling from height, and will be good natured and wealthy. A secret sinner, with two wives a pilgrimage maker and learned. One who is lazy, stores food grain and one whose hair turns white very soon. When Venus is on high then you gain from fragrance. You will prefer to stay beside a river or mountain.</p> <p>The 3rd, 8th, 14th, 26th, 24th, 47th 55th -63rd year you will suffer from breathing disorder. Will have cough problems. Even when 84 years old you will be young. 30th year brings in another woman in your life. 12th year sees fear of water, 18th fear of fire. 21st problems from trees or vehicle. 20th year fear of snakes. Generally a businessman, thin and rich. Death on Vaishakha Shukla Dashmi. Ashlesha Tuesday. 7th, 14th and 20th years  brings fear of germs, fear of being tied or fear of three elements prevail. 28th  and 42nd year bring fear of elephants and stones. 63rd year see you suffer from pain in hand and leg. You will get a lot of respect. Will have High placed eyes, large face, will be a giver and a businessman.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_8							= <p>You will have excess pith, a reddish tone complexion, love for milk and dairy products. Your lucky days will be Tuesday, Monday and unlucky will be Wednesday. </p>Things that are sour and bitter will bring bad luck. You will always forget your dreams .Will be weak, rich with animals, ancestors and war bring in a lot of money. You will have bad body odour , will benefit from fruits and fear water.</p> <p>The months that are ruled by Gemini and Libra will bring suffering, one who shows quick rise and quick fall and someone who accepts things quickly.</p> <p>You will be a wrong doer, surrounded by enemies. Years 7th, 12th 14th and 28th bring breathing issues. In the 54th year and the year of Jupiter you suffer a major loss.</p> <p>Close to the time when you can see the moon you gain from red yellow things, happiness from women. When 75 years old you will suffer from fever. 25th year brings fear of sudden death. 39th year brings fear of fire. You are blessed with many children.</p> <p>You love picking up fights, shy away from woman and will betray friends. You will meet death in Hastra nakshatra, Wednesday of Shukla Dashmi.</p> <p>In years 8th, 16th, 24th 40th you suffer from thief, fire, posion, fever. In the 32nd year you fear bondage, injury and germs. At 72 you suffer from water. Determined, respected with round chest you will be free from Pith.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_9							= <p>You will suffer from Pith, will be fair complexioned, with brown hair, beautiful eyes, pain in the knee, and back of the knee. You will pick fights with your own people, great foodie, and animal killer pilgrimage visitor. In the 18th, 24th 30th and 40th year you suffer from disease. Thursday, Tuesday and Monday are favorable. While Saturday's unfavorable. You will have three wives. Magh month will suit you, month of cancer unfavourable.</p> <p>If Jupiter is on high then there is less suffering. Your mother will suffer, you'll loose a lot of money and you will face difficulties in getting things done.</p> <p>When it's Mool Nakshatra then problems of mind arise. When the sun is in cancer then pain and skin disease. Years 7th, 14th 16th 20th, 35th and 25th bring injury and pain.</p> <p>Red, yellow and white products bring luck. 64 years is the maximum age limit. Moreover the first year is that of disease, 13th could bring sudden death. When Young you will be rich, with less children, always worried about disease of family members, lustful, with skin diseases, not a foodie. You will meet death on Friday of Ashaad Krishna Panchami. In years 18, 27, 9 you will face breathing ailments, fear of fire, fear of horned animals and thorny animals.</p> <p>In years 54 and 36 you suffer from piles or three imbalances. Problems in blood, head ailments prevail. You will be clever and engaged in yagnas but will have a difficult life.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
