	RASI_PREDICTION_1							= <p>You will profit from business that's got to do with red or yellow colour products. By nature you are humorous and reddish tone bright faced. You're lucky days in a week will be Wednesday, Monday and Tuesday. You will be inclined towards care taking of cows, buffaloes and other animals. By nature you are a little lazy but will always be ready to get other peoples jobs done. You will have a lot of friends belonging to signs virgo, aquarius and Gemini. You will be ambitious and progressive. The following years 20, 26, 33 will endanger you with fear of fever and weapons. Years 45, 50, 55 will be dominated with fear of shortened life and sudden death.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>In the years 13, 1 and 7, you will suffer from fever. Whereas years 3,12,5 and 16 will bring fear from government. Fear from sudden death will dominate years 32 and 8.Your 25th year holds chances of you suffering child loss. While 4th and 8th year of life will bring suffering from vehicle and years 3,12 and 24 is dominated with fear of poisoning and drowning.</p> <b style='padding-left:84%'>-Janmpradeep</b>
