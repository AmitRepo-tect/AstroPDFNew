	SADESATIRISINGPHASE	= यह शनि साढ़े साती का आरम्भिक दौर है। इस दौरान शनि चन्द्र से बारहवें भाव में स्थित होगा। आम तौर पर यह आर्थिक हानि, छुपे हुए शत्रुओं से नुक़सान, नुरुद्देश्य यात्रा, विवाद और निर्धनता को दर्शाता है। इस कालखण्ड में आपको गुप्त शत्रुओं द्वारा पैदा की हुई समस्याओं का सामना करना पड़ सकता है। सहकर्मियों से संबंध अच्छे नहीं रहेंगे और वे आपके कार्यक्षेत्र में बाधाएँ खड़ी कर सकते हैं। घरेलू मामलों में भी आपको चुनौतियों का सामना करना पड़ सकता है, जिसके चलते तनाव और दबाव की स्थिति पैदा होगी। आपको अपने ख़र्चों पर नियन्त्रण करने की आवश्यकता है, अन्यथा आप अधिक बड़े आर्थिक संकट में फँस सकते हैं। इस दौरान लम्बी दूरी की यात्राएँ फलदायी नहीं रहेंगी। शनि का स्वभाव विलम्ब और तनाव पैदा करने का है। हालाँकि अन्ततः आपको परिणाम ज़रूर मिलेगा। इसलिए धैर्य रखें और सही समय की प्रतीक्षा करें। इस दौर को सीखने का समय समझें और कड़ी मेहनत करें, परिस्थितियाँ स्वतः सही होती चली जाएंगी। इस समय व्यवसाय में कोई भी बड़ा ख़तरा या चुनौती न मोल लें।
	SADESATIPEAKPHASE		= यह शनि साढ़े साती का चरम है। प्रायः यह दौर सबसे मुश्किल होता है। इस समय चन्द्र पर गोचर करता हुआ शनि स्वास्थ्य-संबंधी समस्या, चरित्र-हनन की कोशिश, रिश्तों में दरार, मानसिक अशान्ति और दुःख की ओर संकेत करता है। इस दौरान आप सफलता पाने में कठिनाई महसूस करेंगे। आपको अपनी कड़ी मेहनत का परिणाम नहीं मिलेगा और ख़ुद को बंधा हुआ अनुभव करेंगे। आपकी सेहत और प्रतिरक्षा-तन्त्र पर्याप्त सशक्त नहीं होंगे। क्योंकि पहला भाव स्वास्थ्य को दर्शाता है इसलिए आपको नियमित व्यायाम और अपनी सेहत का ख़ास ख़याल रखने की ज़रूरत है, नहीं तो आप संक्रामक रोगों की चपेट में आ सकते हैं। साथ ही आपको मानसिक अवसाद और अज्ञात भय या फ़ोबिया आदि का सामना भी करना पड़ सकता है। संभव है कि इस काल-खण्ड में आपकी सोच, कार्य और निर्णय करने की क्षमता में स्पष्टता का अभाव रहे। संतोषपूर्वक परिस्थितियों को स्वीकार करना और मूलभूत काम ठीक तरह से करना आपको इस संकट की घड़ी से निकाल सकता है।
	SADESATISETTINGPHASE	= यह शनि साढ़े साती का अन्तिम चरण है। इस समय शनि चन्द्र से दूसरे भाव में गोचर कर रहा होगा, जो व्यक्तिगत और वित्तीय मोर्चे पर कठिनाइयों को इंगित करता है। साढ़े साती के दो मुश्किल चरणों से गुज़रने के बाद आप कुछ राहत महसूस करने लगेंगे। फिर भी इस दौरान ग़लतफ़हमी आर्थिक दबाव देखा जा सकता है। व्यय में वृद्धि होगी और आपको इसपर लगाम लगाने की अब भी ज़रूरत है। अचानक हुई आर्थिक हानि और चोरी की संभावना को भी इस दौरान नहीं नकारा जा सकता है। आपकी सोच नकारात्मक हो सकती है। आपको उत्साह के साथ परिस्थितियों का सामना करना चाहिए। आपको व्यक्तिगत और पारिवारिक तौर पर अधिक ध्यान देने की आवश्यकता है, नहीं तो बड़ी परेशानियाँ पैदा हो सकती हैं। विद्यार्थियों के लिए पढ़ाई-लिखाई पर थोड़ा नकारात्मक प्रभाव पड़ सकता है और उन्हें पिछले स्तर पर बने रहने के लिए अधिक परिश्रम की ज़रूरत होगी। परिणाम धीरे-धीरे और प्रायः हमेशा विलम्ब से प्राप्त होंगे। यह काल-खण्ड ख़तरे को भी दर्शाता है, अतः गाड़ी चलाते समय विशेष सावधानी अपेक्षित है। यदि संभव हो तो मांसाहार और मदिरापान से दूर रहकर शनि को प्रसन्न रखें। यदि आप समझदारी से काम लेंगे, तो घरेलू व आर्थिक मामलों में आने वाली परेशानियों को भली-भांति हल करने में सफल रहेंगे।
	IMPNOTE				= उपर्युक्त भविष्यवाणियाँ सामान्य प्रकृति की हैं और आम धारणाओं पर आधारित हैं, जिसके अनुसार साढ़े साती अनिष्टकारक होती है। किन्तु हमारे अनुभव के अनुसार प्रत्येक स्थिति में ऐसा नहीं होता है और हम पाठकों से यह आलेख पढ़ने का अनुरोध करते हैं। सिर्फ़ साढ़े साती के आधार पर कोई भी निष्कर्ष निकालना सही नहीं है और उसके ग़लत होने की काफ़ी संभावना रहती है। साढ़े साती की अवधि अच्छी रहेगी या बुरी, यह तय करने से पहले कुछ अन्य चीज़ों जैसे वर्तमान में चल रही दशा और शनि के स्वभाव आदि के विश्लेषण की भी आवश्यकता होती है। आपको सलाह दी जाती है कि उपर्युक्त फलकथन को गंभीरता से न लें और यदि आपके मन में कुछ शंका है, तो किसी अच्छे ज्योतिषी से परामर्श लें।
