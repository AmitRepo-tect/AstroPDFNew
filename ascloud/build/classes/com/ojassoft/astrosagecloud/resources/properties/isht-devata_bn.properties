ISHT_DEVTA_LORD_GANESH6 = <b>Chant Lord Ganesha Mantra</b><br />These are the Lord Ganesha mantras which can be recited to worship your Ishta Devta Lord Ganesha. However, you can recite these mantras to gain the blessings of Lord Ganesha:<br /><br /><b><i>1. “ऊँ श्री गणेशाय नम:" “ūm̐ śrī gaṇeśāya nama:"<br /><br />2. "ऊँ गं गणपतये नम:।”  "ūm̐ gaṃ gaṇapataye nama:।”<br /><br />3. “ऊँ वक्रतुण्डाय नम:" “ūm̐ vakratuṇḍāya nama:"</i></b><br /><br />In order to appease your Ishta Devta Lord Ganesha, you must worship him with devotion and follow all the rituals  and puja vidhi.
