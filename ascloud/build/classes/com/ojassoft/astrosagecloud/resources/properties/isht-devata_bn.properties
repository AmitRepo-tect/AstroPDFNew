ISHT_DEVTA_LORD_MAA_DURGA6 = <b>Recite Goddess Durga Mantra</b><br />Goddess Durga mantras can be recited to appease your Ishta Devi Goddess Durga. However, you can chant the below mantras to seek the blessings of Goddess Durga:<br /><br /><b><i>1. “सर्वमंगल मांगल्ये शिवे सर्वार्थ साधिके।<br />शरण्ये त्र्यंबके गौरी नारायणि नमोऽस्तुते”<br /><br />“sarvamaṃgala māṃgalye śive sarvārtha sādhike।<br />śaraṇye tryaṃbake gaurī nārāyaṇi namo'stute”<br /><br />2. “ॐ जयन्ती मंगला काली भद्रकाली कपालिनी।<br />दुर्गा क्षमा शिवा धात्री स्वाहा स्वधा नमोऽस्तुते”<br /><br />“oṃ jayantī maṃgalā kālī bhadrakālī kapālinī।<br />durgā kṣamā śivā dhātrī svāhā svadhā namo'stute”<br /><br />3. “या देवी सर्वभूतेषु शक्तिरूपेण संस्थिता,<br />नमस्तस्यै नमस्तस्यै नमस्तस्यै नमो नमः”<br /><br />“yā devī sarvabhūteṣu śaktirūpeṇa saṃsthitā,<br />namastasyai namastasyai namastasyai namo namaḥ”</i></b><br /><br />In order to appease your Ishta Devi Goddess Durga,, you must worship her with devotion and follow all the rituals  and puja vidhi.

ISHT_DEVTA_LORD_GANESH1 = <b><u>Ishta Devta:  Lord Ganesha</u></b><br />According to the planet Ketu, your Ishta Devta is Lord Ganesha. In order to attain his blessings, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_GANESH2 = <b>Worship Lord Ganesha to Attain Auspicious Results</b><br />According to Hindu mythology, Lord Ganesha is worshiped as a specially devout God. Due to his specific appearance, he looks different in all the deities. He is also called Gajanan because of his elephant shaped head. People who practice Hindu religion, must worship him to get auspicious results. Since, your Ishta Devta is Lord Ganesha, then you must worship him with devotion and follow all the rites and rituals.<br /><br />
ISHT_DEVTA_LORD_GANESH3 = <b>Brief Introduction of Lord Ganesha</b><br />Lord Ganesh was born as the son of Goddess Parvati and Lord Shiva. As per Hinduism, one must worship Lord Ganesha before commencing any auspicious task. It is believed that Goddess Parvati did not give birth to Lord Ganesha from her womb, but created his childlike form. The head of Lord Ganesha was not always as the elephant, but once Goddess Parvati went to the bath and she ordered Ganesha not to allow anyone to enter the house.<br /><br />At the same time, Shiva reached there, but Ganesha did not allow him to enter. Out of arrogance, Lord Shiva cut off Ganesha’s head. Seeing the death of her son, Ganesha, Goddess Parvati got very upset. Then, Lord Shiva demanded the elephant's head and resurrected him and gave a boon that Lord Ganesha would be worshipped first among all the Gods. Therefore even today, he is the only god who is worshipped before commencing any auspicious task.<br /><br />
ISHT_DEVTA_LORD_GANESH4 = <b>Appease Lord Ganesha on this Day!</b><br />During the festival of Ganesh Chaturthi, Lord Ganesha is worshipped in all parts of India especially in Maharashtra. This ten day festival is celebrated with great fanfare and enthusiasm around the whole world. During this festival, people bring the idol of Lord Ganesha in their homes and welcome him with great pomp and show. In Maharashtra, Lord Ganesha is worshiped in the name of Bappa. Siddhi Vinayak Temple in Mumbai is one of the most popular temples dedicated to Lord Ganesha. Apart from this, Wednesday is considered to be an auspicious day to appease/worship Lord Ganesha.  Along with this, Lord Ganesha is worshiped before starting any auspicious task.<br /><br />
