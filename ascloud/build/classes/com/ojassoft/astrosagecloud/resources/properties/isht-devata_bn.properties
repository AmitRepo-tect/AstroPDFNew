ISHT_DEVTA_LORD_MAA_DURGA3 = <b>Brief Introduction of Goddess Durga</b><br />According to the Hindu mythology, a demon named Mahishasura waged a war against all the Gods and captured the heaven. No god had the power to defeat him. Dejected by the defeat, all the gods went to Trideva - Brahma, Vishnu and Mahesh and together they gave birth to supreme power, Goddess Durga, who led war against Mahishasura. That is why, she is described as Shakti (power) and Adi Shakti. Goddess Durga killed the demon, Mahishasura and gave back the heaven to the gods.<br /><br />
ISHT_DEVTA_LORD_MAA_DURGA4 = <b>Auspicious Day to Worship Goddess Durga</b><br />Goddess Durga is greatly worshipped during the nine days of Navratri. All the nine incarnation of goddess Durga are appeased during the festival of Navratri. People belonging to Hindu religion, worship this festival with great devotion. The festival of Navratri is observed twice in a year, which are known as Chaitra Navratri and Shardiya Navratri. Goddess Durga can be worshipped on any given day. Since, your Ishta Devi is Goddess Durga, therefore you must worship her with devotion and follow all the rites and rituals.<br /><br />
