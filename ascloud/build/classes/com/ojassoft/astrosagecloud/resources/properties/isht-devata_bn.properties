ISHT_DEVTA_LORD_BRAHMA4 = <b>Worship Lord Brahma on this Day!</b><br />According to Hinduism, there is no special day to worship Lord Brahma. Like other Gods & Goddesses, you will not see many temples for Lord Brahma. There is only one Brahma temple in India, which is situated in Pushkar, Rajasthan. It is believed that this temple is about two thousand years old. Since, your Ishta Devta is Lord Brahma, therefore, you can worship him in any given day.<br /><br />
