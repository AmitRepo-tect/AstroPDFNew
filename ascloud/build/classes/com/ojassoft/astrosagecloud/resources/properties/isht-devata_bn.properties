ISHT_DEVTA_LORD_MAA_DURGA1 = <b><u>Ishta Devta:  Goddess Durga</u></b><br />According to the planet Rahu, your Ishta Devi is Goddess Durga. In order to attain her blessings, you must worship her with devotion and follow all the rituals and puja vidhi.<br /><br />
