ISHT_DEVTA_LORD_RAMA1 = <b><u>Ishta Devta: Lord Ram</u></b><br />According to the planet Sun, your Ishta Devta is Lord Ram, also known as Maryada Purushottam. In order to gain his blessings, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />Lord Ram has taught a lesson about how to live life with morality, dutifully, and with sincerity while following religious customs. This is why it is stated that it isn’t easy to walk on the foot-steps of Lord Rama, as the path he chose is difficult. As he is your Ishta Devta, you must try your best to follow his learnings. For this, you need to know the correct way to worship the Lord and what puja rituals must be carried out.<br /><br />
ISHT_DEVTA_LORD_RAMA2 = <b>Gain Lord Vishnu’s Blessings By Worshipping Lord Rama</b><br />Lord Shri Ram is the seventh incarnation of Lord Vishnu. In the Treta Yuga, he was born to King Dashrath and Queen Kaushalya as their first son in the kingdom of Ayodhya, near Saryu river. Respecting the orders and promises made by his father, Lord Rama gave up the kingdom and went into exile with his better-half Lady Sita and younger brother Laxman for 14 years. In order to fight the Lankapati Ravana, he united an army of Vanars or Monkeys and other forest dwellers and slayed the Demon King, hereby glorifying the victory of good over evil.<br /><br />Sage Valmiki has composed a scripture named Ramayana based on the life of Lord Rama. Apart from this, Tulsidas has also written about the life of the great Lord in Ramcharitmanas. The ideal lifestyle of Lord Ram is what has kept him alive for ages. According to the Shastras, by worshipping Lord Ram with sheer dedication, one gets rid of several problems in life, such as delay in marriage, obstacles in love life, children-related issues, loss in business etc.<br /><br />
ISHT_DEVTA_LORD_RAMA3 = <b>Worship Lord Ram On This Day!</b><br />The day of Ram Navami is dedicated to Lord Shri Ram, as he was born on this very day. This day is observed on the Navami tithi during Chaitra Shukla. Special rituals are followed on this day to appease Lord Ram. Fasting is a prominent activity to be observed on this day. Also, the idols of Shri Ram, Lady Sita & Lord Hanuman are kept in the front and worshipped with devotion.<br /><br />
ISHT_DEVTA_LORD_RAMA4 = <b>Rituals To Appease Lord Ram</b><br /><ul><li>One must wake up early in the morning and wear fresh clothes.</li><li>Offer yellow clothes and flowers to Lord Ram.</li><li>It is said that when worshipping Lord Vishnu or any avatar of him, Tulsi leaves must be used.</li><li>After this, light the diya using Ghee or clarified butter or oil and do the aarti. After this, offer Naivedyam to the Lord.</li><li>On the auspicious occasion of Ram Navami, MIlk-based Kheer or any sweets made of milk must be used as Naivedyam.</li><li>After this, apologize for any mistake made in the worship.</li><li>After carrying out the Lord’s puja, offer food and clothes to Brahmins.</li></ul><br />
ISHT_DEVTA_LORD_RAMA5 = <b>Note: </b>The puja rituals for Lord Shri Ram aren’t that difficult. You can follow them on a regular basis when doing your morning puja. Especially on Thursday, chant the Shri Ram Stotram or <b><i>‘ॐ श्री रामाय नम: / oṃ śrī rāmāya nama:’</i></b> 108 times for fruitful result.<br /><br />
ISHT_DEVTA_LORD_RAMA6 = <b>Shri Ram Mantra</b><br />The name of the Lord itself is a divine mantra, which when chanted generates powerful energy from within. However, you can chant the below mantras as well to seek the blessings of Lord Rama:<br /><br /><b><ul><li>“श्रीराम जय राम जय जय राम” / “śrīrāma jaya rāma jaya jaya rāma”</li><li>“हरे राम हरे राम राम राम हरे हरे, हरे कृष्ण हरे कृष्ण कृष्ण कृष्ण हरे हरे” / “hare rāma hare rāma rāma rāma hare hare, hare kṛṣṇa hare kṛṣṇa kṛṣṇa kṛṣṇa hare hare”</li><li>“ॐ श्री रामाये नम:’ या‘ॐ रामाय नमः।” / “oṃ śrī rāmāye nama:’ yā‘oṃ rāmāya namaḥ।”</li></ul></b><br />

ISHT_DEVTA_LORD_SHIVA1 = <b><u>Ishta Devta: Lord Shiva</u></b><br />According to the planet Sun, your Ishta Devta is Lord Shiva. In order to gain his blessings, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_SHIVA2 = <b>Lord Shiva Will Bless You With Prosperity</b><br />Lord Shiva is called the Destroyer in Hindu mythology, and hailed as the Mahadev. He is a significant part of the Trinity, who created this Universe, and popular for his calm demeanor and aggressive avatar. In the Shastras, Shiv possesses the virtue of rhythm and annihilation within him. The Lord is also known by the name Neelkanth, BHolenath, Mahesh, Rudra etc.<br /><br />
ISHT_DEVTA_LORD_SHIVA3 = <b>Lord Shiva: The Creator Of The Entire Universe</b><br />According to the Vedic scriptures, Kailash Parbat or mountain is the humble abode of the Lord Shiva with his better half or Ardhangini, Maa Parvati, the daughter of Himalaya. They both have three children together, Lord Kartikeya, Lord Ganesh, and Goddess Ashok Sundari. Lord Shiva differs in appearance from other Gods. Ganga and Crescent Moon resides in the matter hair of Lord Shiva, whereas his neck is adorned with garlands of snakes. He holds a Damru or small drum and Trident or Trishul and his mount is Nandi bull. The Lord, just like the Universe, is infinite, and there's nothing beyond him. The whole world resides within him. Shiv is also known as the Mahakaal, and this avatar is extremely propitious for the devotees.<br /><br />
ISHT_DEVTA_LORD_SHIVA4 = <b>Worship Lord Shiva On This Day</b><br />The day of Monday is dedicated to Lord Shiva. That is why he is worshipped on this day. Apart from this, the day of Shivratri and Maha Shivratri is also dedicated to Lord Shiva, and devotees worship him with passion and devotion. On this occasion, worshippers fast and wish for fulfilment of their desires. Along with that, the month of Sawan is dear to Lord Shiva. In order to please him, his devotees embark on the Kavad Yatra and offer Gangajal to the Lord Shiva.<br /><br />
ISHT_DEVTA_LORD_SHIVA5 = <b>Rituals To Appease Lord Shiva</b><br /><ul><li>To appease Lord Shiva, wake up early in the morning on Monday, take a bath and wear white clothes.</li><li>For puja, visit a Shiv temple or worship Lord Shiva and Parvati at home only.</li><li>Firstly, do the Jal Abhishek of Lord Shiva and then, bathe him with raw milk. Mix Gangajal in it as well.</li><li>You can do the abhishek using Panchamrit. After this, offer him Belwa leaves, Akhde or Madar flowers, fruits, and Yagyopaveet etc.</li><li>Place Lord Shiva and Goddess Parvati together, do a Gathbandhan between them and offer him the sacred bhog.</li><li>Apart from this, recite or listen to the story or katha related to the kind of fast or vrat you are observing.</li><li>Devotees must chant the mantra <b><i>“ॐ नमः शिवाय / oṃ namaḥ śivāya”.</i></b></li></ul><br />
ISHT_DEVTA_LORD_SHIVA6 = <b>Note: </b>Before starting to fast, conclude on how many days you wish to fast. For Eg. if you wish to fast for 16 Mondays or Solah Somvar, then after the 16th Somvar vrat ends, vow to conclude your fast on the seventeenth Monday. Mainly, fast can be concluded on any Monday during the month of Kartik, Sawan, Jyeshta, Vaishakh or Margashirsha. If you are specifically keen on fasting, then you have to observe this fast for 14 years. Organize an Hawan and puja for Lord Shiva and Goddess Parvati and Lord Moon collectively after concluding the fast. You can consult an expert Brahmin for this act.

ISHT_DEVTA_LORD_KRISHNA1 = <b><u>Ishta Devta: Lord Shri Krishna</u></b><br />According to the planet Moon, your Ishta Devta is Lord Shri Krishna. In order to gain his blessings, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />Lord Shri Krishna is the eighth incarnation of Lord Vishnu. Krishna is said to be the epitome of innocence and also known by the names Kanhaiya, Shyam, Makhan Chor, Gopal, Bansi Wale etc. Shri Krishna is known for his beautiful relationship with Radha. Even today, apart from Mathura-Vrindavan, songs of Falgun related to Radha-Krishna's love are sung in Uttar Pradesh on the occasion of Holi and Janmashtami. Worshipping Radha-Krishna flourishes the love life of the natives.<br /><br />
ISHT_DEVTA_LORD_KRISHNA2 = <b>Seek The Blessings of Shri Krishna, Your Ishta Devta</b><br />According to the mythological beliefs, Lord Krishan was the eighth child of Vasudev and Devaki. He was born during the month of Bhadrapada on the Ashtami tithi in jail confinement of Mathura, but raised in Gokul Dham by Yashoda and Nand. Shri Krishna killed his maternal uncle, King Kansa in Mathura and then established the city of Dwaraka. Lord Shri Krishna supported the Pandavas in the war of Mahabharata and counselled Arjuna on the battlefield of Kurukshetra. It is said that after Dwapar Yug, Kalyug began after the death of Lord Shri Krishna. The birthday of Lord Shri Krishna is celebrated on the day of Janmashtami every year.<br /><br />
ISHT_DEVTA_LORD_KRISHNA3 = <b>Rituals To Worship Lord Shri Krishna:</b><br />If Shri Krishna is your Ishta Devta, then you must follow the below mentioned rituals:<br /><br /><ul><li>Wake up early and take a bath.</li><li>Foremost, worship Shri Ganesha.</li><li>Bathe the idol of Ganesha, and offer him clothes.</li><li>Worship him using incense, flowers, diya, akshat etc.</li><li>Now, worship Lord Krishna.</li><li>Bathe his idol firstly with water, then Panchamrit nd then again water.</li><li>Offer him clothes and jewellery.</li><li>Now, offer him a flower garland and apply tilak on his idol.</li><li>While chanting the mantra <b><i>‘‘ॐ नमो भगवते वासुदेवाय नमः / oṃ namo bhagavate vāsudevāya namaḥ’’</i></b>, apply Ashta Gandhak Tilak on Lord Shri Krishna.</li><li>Now, offer him incense, diya using oil or ghee and flowers.</li><li>Now, sing the aarti and circumambulate around his idol.</li><li>Offer Naivedya, flowers, sweets etc.</li><li>Chant the mantra <b><i>‘‘ॐ नमो भगवते वासुदेवाय नमः / oṃ namo bhagavate vāsudevāya namaḥ’’</i></b> continuously during the puja.</li></ul><br />
ISHT_DEVTA_LORD_KRISHNA4 = <b>Benefits From Worshipping Lord Shri Krishna</b><br /><ul><li>The mere name of Shri Krishna itself energizes the speaker in a positive manner.</li><li>One gets rid of his/her sins if he/she dedicates his/her life towards worshipping the Nand Gopal.</li><li>Those who desire for grandeur can offer Butter-Mishri to Lord Krishna and do his Abhishek using raw Lassi in order to appease him.</li><li>Devotees can get rid of diseases and illness by doing the Abhishek of Lord Krishna’s idol using raw milk.</li><li>Offer a flute made of silver to Lord Krishna if you seek prosperity and success in love life.</li></ul><br />

ISHT_DEVTA_LORD_SARASWATI1 = <b><u>Ishta Devi: Maa Saraswati</u></b><br />According to the planet Moon, your Ishta Devi is Maa Saraswati. In order to gain her blessings, you must worship her with devotion and follow all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_SARASWATI2 = <b>Brief Introduction of Mata Saraswati</b><br />The goddess of knowledge, Maa Saraswati is also known as Maa Sharda. She is the daughter of Lord Brahma. Worshipping the Goddess of Wisdom and Intelligence makes one wise, intelligent and smart. She is hailed as the goddess of knowledge, literature, music, and art. Vasant Panchami is celebrated on Panchami tithi during Shukla Paksha in the month of Magha and dedicated to Maa Saraswati. The goddess is worshipped on this day. The divine goddess has four arms and holds a Veena (a musical instrument), Vedas and Mala. Her face emits positive light, and Veena in both of her hands and the harp or Veena in her hands is considered a symbol of communication and artistry. The book represents knowledge and mala denotes passion, devotion and purity. Her mount is Peacock, which is a symbol of beauty and sweetness.<br /><br />Saraswati is also known as Veena Pustak Dharini. She possesses the perfect blend of emotions, thoughts and feelings. Veena symbolizes music, books represents thoughts and Peacock expresses art.<br /><br />
ISHT_DEVTA_LORD_SARASWATI3 = <b>Rituals To Worship Goddess Saraswati:</b><br /><ul><li>Wake up early in the morning, bathe and meditate.</li><li>Bathe the idol of Maa Saraswati with Panchamrit.</li><li>Place the idol of Maa Saraswati on a yellow-coloured asan or platform.</li><li>Offer her yellow-coloured clothes and jasmine or marigold flowers.</li><li>Apply Chandan tika and light the incense.</li><li>Mix jasmine perfume in pure ghee and light a diya using that.</li><li>Offer her sweet yellow rice. Donating sweet yellow rice represents one’s guru or teacher and planet Moon.</li><li>Distribute this prasad to the masses.</li></ul><br />
ISHT_DEVTA_LORD_SARASWATI4 = <b>Saraswati Mantra</b><br />Chanting Saraswati Mantra while worshipping the goddess appeases her, and one attains her blessings. Below mentioned mantra must be chanted 108 times:<br /><br /><center><b><i>“ॐ श्री सरस्वती शुक्लवर्णां सस्मितां सुमनोहराम्।।<br />कोटिचंद्रप्रभामुष्टपुष्टश्रीयुक्तविग्रहाम्।<br />वह्निशुद्धां शुकाधानां वीणापुस्तकमधारिणीम्।।<br />रत्नसारेन्द्रनिर्माणनवभूषणभूषिताम्।<br />सुपूजितां सुरगणैब्रह्मविष्णुशिवादिभि:।। वन्दे भक्तया वन्दिता च मुनीन्द्रमनुमानवै:।”<br /><br />“oṃ śrī sarasvatī śuklavarṇāṃ sasmitāṃ sumanoharām।।<br />koṭicaṃdraprabhāmuṣṭapuṣṭaśrīyuktavigrahām।<br />vahniśuddhāṃ śukādhānāṃ vīṇāpustakamadhāriṇīm।।<br />ratnasārendranirmāṇanavabhūṣaṇabhūṣitām।<br />supūjitāṃ suragaṇaibrahmaviṣṇuśivādibhi:।। vande bhaktayā vanditā ca munīndramanumānavai:।”</i></b></center><br />Those who are unable to chant the difficult Saraswati Mantra can recite the below mentioned ashtakshar mantra, which seems easy. Reciting this mantra daily helps to improve knowledge, intellect and wisdom.<br /><br /><b><i><ul><li>“शारदा शारदाभौम्वदना। वदनाम्बुजे। / śāradā śāradābhaumvadanā। vadanāmbuje।”</li><li>“सर्वदा सर्वदास्माकमं सन्निधिमं सन्निधिमं क्रिया तू।” / “sarvadā sarvadāsmākamaṃ sannidhimaṃ sannidhimaṃ kriyā tū।”</li><li>“श्रीं ह्रीं सरस्वत्यै स्वाहा।” / “śrīṃ hrīṃ sarasvatyai svāhā।”</li><li>“ॐ ह्रीं ऐं ह्रीं सरस्वत्यै नमः।” / “oṃ hrīṃ aiṃ hrīṃ sarasvatyai namaḥ।”</li></ul></i></b><br />
ISHT_DEVTA_LORD_SARASWATI5 = <b><u>Benefits of Saraswati Puja</u></b><br />Worshipping Maa Saraswati can prove to be beneficial, as it helps to enhance one’s intellectual capacity and knowledge. One gets rid of heart-mind related diseases. Apart from this, diseases such as insomnia, headache, tension and cold also get eliminated. Anyone who wishes to enhance his/her imagination or needs to fix his/her voice in music must worship Maa Saraswati.

ISHT_DEVTA_LORD_HANUMAN1 = <b><u>Ishta Devta: Lord Hanuman</u></b><br />According to the planet Mars, your Ishta Devta is the ever powerful Anjani Putra Lord Hanuman. In order to gain his blessings, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_HANUMAN2 = <b>Appease Lord Hanuman With Right Puja Rituals</b><br />Lord Hanuman, who is said to be the biggest devotee of Lord Ram, is known as the destroyer of all misery and sorrow in the world. He burned down the Golden Lanka with his tail and helped Lord Ram in attaining victory against the demon king Ravana. Known to be a symbol of power and intellect, Lord Hanuman dedicated all his life in worshipping Lord Ram and has practiced Brahmacharya or Celibacy. It is seen that worshipping Lord Hanuman with a pure heart helps to attain fruitful results. Along with that, following the rules of Brahmacharya when worshipping him helps to eliminate fear and sorrows from the life. As Lord Hanuman is your Ishta Devta, you must be well-versed with all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_HANUMAN3 = <b>Brief Introduction of Lord Hanuman</b><br />The powerful Mahavir Lord Hanuman is believed to be the eleventh incarnation of Lord Shiva, and also said to be his Rudra avatar. He is the son of the Vanar King Kesari and Anjana, hence the name Kesari Nandan and Anjani Putra in scriptures. He spent all his life worshipping Lord Ram, and came to be known as his biggest devotee. With the help of his army of vanars, he helped Lord Ram in crossing the ocean and fighting against Ravana to bring Lady Sita back. He also goes by the name Maruti and Pavan Putra. It is believed that Lord Vayu played an important role with his upbringing, which is why he got the name Pavan Putra. It is mentioned in the religious scriptures that Lord Hanuman was born with the blessings of Lord Shiva and Vayudeva. The life of Hanuman ji has been described in the epic Ramayana, composed by Valmiki and Ramcharitmanas, created by Tuslidas. One attains Lord Hanuman’s blessings if s/he worships him with a truthful heart and intentions.<br /><br />
ISHT_DEVTA_LORD_HANUMAN4 = <b>Worship Anjani Putra Hanuman On This Day!</b><br />Though, you can worship Lord Hanuman on any day, but the day of Hanuman Jayanti is said to bring special benefits. This day holds high significance since Lord Hanuman was born on this day. Along with this, one attains blessings of the Vayu Putra if s/he worships him on Tuesday with full devotion. Since Lord Hanuman was born on Tuesday during the Treta Yug, therefore this day is known to be the day of Lord Hanuman.<br /><br />
ISHT_DEVTA_LORD_HANUMAN5 = <b>Puja Rituals For Shri Hanuman</b><br /><ul><li>Take special care of cleanliness and purity before worshiping Hanuman ji.</li><li>During the puja, you must sit on a red coloured asan or platform while facing the idol of Lord Hanuman.</li><li>Mix vermilion or sindoor in sesame oil and apply the mixture on the idol of Lord Hanuman.</li><li>Light up a diya using mustard oil along with incense sticks.</li><li>Applying the coating of saffron and red sandalwood is also beneficial.</li><li>Use specifically red coloured flowers, and marigold flowers can be offered too.</li><li>You can offer Jaggery, Ladoos, Coconut, Banana and Churma as prasad.</li><li>Keep in mind to cook the prasad in pure ghee.</li><li>During the puja, keep white rice and jaggery in your hands and worship Mahavir Hanuman with faith and devotion.</li><li>Reciting Hanuman Chalisa eleven times helps to attain desired results.</li><li>Consume the prasad offered to the Lord after the puja is over.</li><li>It is important to follow celibacy during the period of Hanuman Puja.</li><li>Put tulsi leaves on top of the offered prasad.</li><li>Gain special benefits by offering him a garland made of red roses.</li><li>End the puja by reciting the Hanuman Aarti.</li></ul><br />Worshipping Lord Hanuman isn’t a difficult task. You must worship him within your house or in a temple, in case he is your Ishta Devta. If you are unable to follow the rituals on a regular basis, then try to do the same on Tuesday.<br/><br/>
ISHT_DEVTA_LORD_HANUMAN6 = <b>Hanuman Mantra</b><br />Chanting the below mantra helps to attain the blessings of Lord Hanuman:<br /><br /><center><b><i>“ॐ नमो हनुमते रुद्रावताराय विश्वरूपाय अमित विक्रमाय प्रकटपराक्रमाय महाबलाय सूर्य कोटिसमप्रभाय रामदूताय स्वाहा।”<br /><br />“oṃ namo hanumate rudrāvatārāya viśvarūpāya amita vikramāya prakaṭaparākramāya mahābalāya sūrya koṭisamaprabhāya rāmadūtāya svāhā।”</i></b></center><br />Along with it, chanting Hanuman Chalisa in odd or worse situations can prove to be advantageous, as it eliminates any kind of sorrow or misery.<br /><br />Chant <b>“श्री हनुमंते नमः / śrī hanumaṃte namaḥ”</b> mantra 108 times on a rudraksha mala to attain special profits.<br /><br />Get rid of your fear by chanting the mantra, <b>“हं हनुमंते नम: / haṃ hanumaṃte namaḥ“.</b><br /><br />Chanting this special mantra of Lord Hanuman helps to eliminate fear, illness or misery from your life:<br /><br /><center><b><i>“ऊँ नमो हनुमते रूद्रावताराय सर्वशत्रुसंहारणाय सर्वरोग हराय<br /> सर्ववशीकरणाय रामदूताय स्वाहा”</i></b></center><br />However, you can also get special blessings by worshiping your Ishta Devta Mahavir Hanuman.<br /><br />

ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN1 = <b><u>Ishta Devta: Kartikeya/Murugan</u></b><br />According to the planet Mars, your Ishta Devta is Lord Kartikeya or Lord Murugan. In order to gain his blessings, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />Followers of Hinduism know him by the name of Kartikeya, whereas Tamil speaking natives and others living in different Southern states worship him by the name of Murugan. People living in Tamil Nadu in India and Sri Lanka, Singapore and Malaysia are the worshipers of Kartikeya or Murugan. The people of South India worship and hail Lord Kartikeya or Lord Murugan as the protector of their tribe.<br /><br />
ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN2 = <b>Attain Desirable Results by Worshipping Lord Kartikeya / Lord Murugan</b><br />Lord Kartikeya is also known as Murugan, Subramaniam and Skanda. As per the Puranas, he killed a demon named Tarkasur and freed all the Gods and Goddesses from his clutch. He was mainly born to slaughter the demon Tarkasur. In different regions, he is worshiped with different names. Hence, by worshipping your Ishta Devta Murugan or Kartikeya, you can easily overcome obstacles and gain his blessings.<br /><br />
ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN3 = <b>Brief Introduction of Lord Kartikeya / Lord Murugan</b><br />One can find detailed description about Kartikeya or Murugan in the “Skanda Puranas”. According to the Skanda Puranas, a demon named Tarkasur become powerful after attaining the blessings of Lord Shiva. Blinded by his ego, he started bullying and using his powers on humankind as well as Gods. As a result, his terror and atrocities began increasing on Earth as well as in Heaven. In order to escape his horror, all the Gods gathered and consulted Brahma ji and demanded a remedy for this trouble. He revealed that the end of the demon Tarakasura is possible only by the hands of Shiva. Nevertheless, Lord Kartikeya was born after the marriage of Lord Shiva and Goddess Parvati, who grew up to kill the demon Tarakasura and liberated all the Gods from his terror.<br /><br />
ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN4 = <b>Special Day To Worship Kartikeya or Murugan</b><br />Although there’s no specific day dedicated to Lord Kartikeya or Murugan, but since he was born on the Sashti tithi, he is worshipped on this date every month. Worshipping the Lord with esteem faith and devotion helps to eliminate or dominate opponents.<br /><br />
ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN5 = <b>Puja Rituals For Kartikeya or Murugan</b><br /><ul><li>Lord Kartikeya or Murugan resides in the south direction, because he went on to circumambulate around the Earth since he was upset with his parents. During this time, he started residing in South India.</li><li>To get rid of your enemies and attain the blessings of Lord Murugan, fast on the Sashti tithi and worship the Kartikeya/Murugan.</li><li>Since his residence is in the South, therefore you must worship him while facing South to gain profitable outcomes.</li><li>During the puja, light a diya with pure ghee.</li><li>Offer fragrant flowers and offer him arghya using fresh water.</li><li>Chant the mantra dedicated to Kartikeya/Murugan.</li><li>In case you are fasting on the Sashti tithi, then you can sleep on the ground at night after the puja is over to achieve desired wishes.</li></ul><br/>
ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN6 = <b>Mantra for Lord Kartikeya or Murugan</b><br />When worshiping the Lord, it is beneficial to chant specific mantra for desired outcome. Below is the mantra to chant:<br /><br /><center><b><i>“देव सेनापते स्कंद कार्तिकेय भवोद्भव। कुमार गुह गांगेय शक्तिहस्त नमोस्तु ते॥”<br /><br />“deva senāpate skaṃda kārtikeya bhavodbhava। kumāra guha gāṃgeya śaktihasta namostu te॥”</i></b></center><br />You can attain the blessings of your Ishta Devta Kartikeya or Murugan by worshipping him devotedly.

ISHT_DEVTA_LORD_VISHNU1 = <b><u>Ishta Devta: Lord Vishnu</u></b><br />According to the planet Jupiter, your Ishta Devta is Lord Vishnu. In order to attain prosperity in life, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />Lord Vishnu is known as the Preserver of the world and rules the planet Jupiter. Followers of Hinduism strongly believe in and worship Lord Vishnu with utter faith and devotion. His worshippers also know him by the name “Narayan”, although he has about 108 names. According to the mythological beliefs, he is depicted reclining on the top of Sheshnaag in the Kshir Sagar with his beloved consort, Laxmi. Follow the rituals and puja vidhi to attain the blessings of your Ishta Devta, Lord Vishnu.<br /><br />
ISHT_DEVTA_LORD_VISHNU2 = <b>Brief Introduction of Lord Vishnu</b><br />The Trinity: Brahma, Vishnu and Mahesh; is responsible for creating and preserving this Universe. Where on one hand Lord Brahma is known to be the Creator of this life, Lord Vishnu is the Preserver, whereas Lord Shiva is the Destroyer. It is evident in the history that whenever sins and darkness increases on Earth and chaos prevails, Lord Vishnu have taken various incarnations to protect mankind. In this sequence, his incarnation as Lord Rama was to bring an end to the demon king Ravana and his atrocities. Similarly, he took birth as Lord Krishna in Mahabharata period to end the reign of Kauravas.<br /><br />
ISHT_DEVTA_LORD_VISHNU3 = <b>Special Day To Worship Lord Vishnu</b><br />Although Lord Vishnu can be worshipped any day of the week, but Thursday is said to be most beneficial for devotees to carry out the puja. Adhering to all the religious rituals and provisions on Thursday, Lord Vishnu can be worshipped to attain success and profits in different sectors. Other than this, the day of “Anant Chaturdashi” and “Devotthana Ekadashi” is also significantly dedicated towards Lord Vishnu.<br /><br />
ISHT_DEVTA_LORD_VISHNU4 = <b>Rituals To Appease Lord Vishnu</b><br /><ul><li>If you worship Lord Vishnu on Thursday, it is recommended to use yellow colour.</li><li>After bathing in the morning, wear yellow clothes and conclude to worship the Lord.</li><li>Offer water to Lord Vishnu’s idol and begin the puja.</li><li>After this, offer flowers to the idol of the Lord.</li><li>You can offer fruits as Prasad, but Jaggery (Gud) and Chana would be preferable in case you’re worshipping the Lord on Thursday,</li><li>Recite the Vishnu Aarti after finishing up the puja rituals.</li><li>During the worship, do not forget to chant the Vishnu Mantras.</li><li>Janeu or White Sacred Thread is also offered to the Lord during the period of worship.</li><li>Use sesame instead of white rice while venerating him.</li></ul><br />
ISHT_DEVTA_LORD_VISHNU5 = <b>Vishnu Mantras</b><br />You can attain benefits and desired results if you chant the below mentioned Vishnu Mantras with full devotion:<br /><br /><b>“1. "ॐ नमोः नारायणाय. ॐ नमोः भगवते वासुदेवाय" / "oṃ namoḥ nārāyaṇāya. oṃ namoḥ bhagavate vāsudevāya"<br />2. “ऊँ नारायणाय विद्महे।वासुदेवाय धीमहि। तन्नो विष्णु प्रचोदयात्” / “ūm̐ nārāyaṇāya vidmahe।vāsudevāya dhīmahi। tanno viṣṇu pracodayāt”</b><br /><br />You can attain the blessings of your Ishta Devta Vishnu by worshipping him devotedly.<br /><br />

ISHT_DEVTA_LORD_THIRUMAL1 = <b><u>Ishta Devta: Tirupati Balaji (Tirumala)</u></b><br />According to the planet Jupiter, your Ishta Devta is Lord Tirupati or Tirumala. In order to attain peace and prosperity in life, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_THIRUMAL2 = <b>Shri Balaji or Tirumala Is The Avatar of Lord Vishnu</b><br />Shri Balaji or Tirumala is said to be the divine incarnation of Lord Vishnu. South Indians dominantly worship this deity with devotion. Balaji Temple, situated at Tirupati, is said to be one of the most famous religious destinations of India. This temple of Tirumala is mainly popular among the crowd for its preternatural and miraculous powers. Worshipping Lord Tirupati as your Ishta Devta helps you to become powerful and fearless.<br /><br />
ISHT_DEVTA_LORD_THIRUMAL3 = <b>Brief Introduction of Lord Tirupati</b><br />Mythological Hindu beliefs state that the Lord Balaji is an incarnation of Lord Vishnu, and also known by the names Venkateshwar, Balaji and Tirumala. According to another belief, a part of Goddess Lakshmi resides in Lord Balaji. Devotees from around the globe visit this sacred place to worship the Lord and seek his blessings. Shri Balaji climbed the seven mountains of Tirupati, due to which Lord Shrinivas blessed him with special powers. It is believed that Shri Balaji remained alive for 120 years. The hair on the Lord’s idol in the Balaji temple, Tirupati is said to be real. Also, the idol of Balaji is said to sweat, according to various beliefs. However, it is stated that Shri Balaji is still present for his devotees, which is why the number of devotees visiting the location always increases.<br /><br />
ISHT_DEVTA_LORD_THIRUMAL4 = <b>Special Day To Worship Lord Balaji or Tirumala</b><br />Though there isn't a specific time or day to worship Shri Balaji, but millions of devotees visit the Tirupati Temple on the day of Vaikunth Ekadashi to get a glimpse of the divine deity. It is believed that by worshipping the Lord on this day, one gets rid of all his/her sins and s/he gets liberated from the concept of birth or death.<br /><br />
ISHT_DEVTA_LORD_THIRUMAL5 = <b>Rituals To Appease Lord Balaji or Tirumala</b><br /><ul><li>Wake up early and take a bath when worshipping Lord Balaji or Tirumala.</li><li>Now, remember Lord Balaji with a devoted heart.</li><li>First of all, apply a Chandan tilak on his forehead. Every Friday, the idol of Lord Tirupati is smeared with coating of Chandan.</li><li>Offer him flowers and then water.</li><li>Then, light an incense and diya in front of him.</li><li>As Prasad, offer him ladoos made from flour, sugar, jaggery and dry fruits.</li><li>Now, chant the mantras dedicated to Lord Balaji.</li></ul><br />
ISHT_DEVTA_LORD_THIRUMAL6 = <b>Mantra for Shri Balaji or Tirumala</b><br />One appeases his/her Ishta Devta by chanting the special mantras. Reciting these mantras help a devotee to resolve his/her sins. Below is the mantra:<br /><br /><center><b><i>“ॐ श्री वेंकटेश्वराये नमो नमः<br />श्रीमन नारायण नमो नमः<br />तिरुमला तिरुपति नमो नमः<br />जय बालाजी नमो नमः”<br /><br />“oṃ śrī veṃkaṭeśvarāye namo namaḥ<br />śrīmana nārāyaṇa namo namaḥ<br />tirumalā tirupati namo namaḥ<br />jaya bālājī namo namaḥ”</i></b></center><br />Reciting this mantra helps to get rid of any fear. You can attain the blessings of your Ishta Devta Shri Balaji by chanting this mantra and worshipping him devotedly.

ISHT_DEVTA_LORD_SRI_VAMANA1 = <b><u>Ishta Devta: Lord Vamana</u></b><br />According to the planet Jupiter, your Ishta Devta is Lord Vamana. As per Hinduism, he is considered to be an incarnation of Lord Vishnu. In order to gain his blessings, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_SRI_VAMANA2 = <b>Lord Vishnu Took the Vamana Avatar to Save the Earth</b><br />According to mythological texts, God Vishnu took the incarnation of Lord Vamana in order to save the Earth from the growing terror of the demons. Lord Vishnu disguised himself as Vamana to save the Gods from the wrath of King Bali. The King of Asuras, Bali attacked the heaven and captured all the Gods, including Indra Dev. Seeing this cruelty to the Gods, Lord Vishnu took the Vamana avatar and went to Raja Bali's house for begging.<br /><br />Firstly, Lord Vishnu (as Vamana) asked for three paces of land. King Bali agreed to his wish and Vamana covered the Earth in one step and covered the sky in the second step. When there was nothing left to measure the third pace of land, Raja Bali asked him to put the third step on his head and this way, Gods got rid of Raja Bali.<br /><br />
ISHT_DEVTA_LORD_SRI_VAMANA3 = <b>Brief Introduction of Lord Vamana</b><br />Lord Vamana was born in the house of the famous sage, Kashyap and his wife Aditi. Mother Aditi had observed a tapasya for Lord Vishnu to protect the Brahmins and the Gods from the wrath of the demons. Pleased with her tapasya, Lord Vishnu took birth as Vamana in the lap of Mother Aditi. Vamana took the kingdom of Gods from the King Bali and gave it back to Gods. He taught this lesson to the whole world that the egoistic people have lost in the end. Without any war or weapon, he gave salvation to all the Gods from the terror of King Bali. That is why, God Vishnu as Lord Vamana is worshipped in India, and the people of South India worship him in the name of Upendra Dev.<br /><br />
ISHT_DEVTA_LORD_SRI_VAMANA4 = <b>Auspicious Day to Worship Lord Vamana</b><br />Lord Vamana took the incarnation of God Vishnu in the Treta Yuga during the Shukla Paksha of Dwadashi. That’s why, Vamana Jayanti is celebrated on Shukla Paksha of Dwadashi every year. This day is auspicious to worship Lord Vamana with great devotion. This day is also celebrated as Vamana Dwadashi. According to experts, one needs to follow the rituals and puja vidhi to attain the blessings of your Ishta Devta, Lord Vamana.<br /><br />
ISHT_DEVTA_LORD_SRI_VAMANA5 = <b>Puja Vidhi to Worship Lord Vamana</b><br />If Lord Vamana is your Ishta Devta, then you must follow the below mentioned rituals:<br /><br /><ul><li>Take a bath early in the morning and worship Lord Vamana on the day of Vamana Jayanti.</li><li>Offer rice, sugar and yogurt to a poor brahmin on this day, proves to be beneficial for you</li><li>A fast should be observed in the afternoon hours with proper rites and rituals while offering water and flowers to Lord Vamana</li><li>People who observe a fast should also take a bath in the evening and worship Lord Vamana</li><li>After the puja, listen to Lord Vamana story</li><li>After performing the puja vidhi, a devotee should offer food to the brahmins</li><li>Devotees should eat fruits this day</li></ul><br />You can attain the blessings of your Ishta Devta Lord Vamana by observing a fast on and worshipping him devotedly. In order to appease him, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />

ISHT_DEVTA_LORD_DATTATREYA1 = <b><u>Ishta Devta: Lord Dattatreya</u></b><br />According to the planet Jupiter, your Ishta Devta is Lord Dattatreya. As per Hinduism, he is considered to be an incarnation of the three Hindu Gods, Lord Brahma, Vishnu and Mahesh. In order to gain his blessings, you must worship him with devotion and follow all the rituals and puja vidhi.<br /><br />Lord Dattatreya was the fifth incarnation of the three Hindu gods Brahma, Vishnu and Mahesh. One attains Lord Dattatreya’s blessings if s/he worships him with a truthful heart and intentions. It is said that worshiping this lord would help you to achieve the blessings of all the three lords, who rule the universe. After the demolition of religious traditions and Vedic karma, Lord Dattatreya took the initiative to restore them.<br /><br />
ISHT_DEVTA_LORD_DATTATREYA2 = <b>Brief Introduction of Lord Dattatreya</b><br />Lord Dattatreya, who followed lifelong celibacy, took birth in the house of Sage Atri and Mata Anasuya. He spent his whole life in doing social work. There is a belief in Hindu religion that Lord Dattatreya used to come for Ganga bath, this is the reason why the people worship Datta Paduka at Ganga Ghat. Lord Dattatreya, who adorns the power of three Gods should be worshipped with devotion and all the rites and rituals. Chandra Deva (Moon) and the famous sage Durvasa were his brothers. In India, especially in Maharashtra,worship of Lord Dattatreya is done with great fanfare. It is believed that he senses the grief of the devotees very quickly and as a result, he is the God who will soon give desired results to his devotees.<br /><br />
ISHT_DEVTA_LORD_DATTATREYA3 = <b>Worship Lord Dattatreya on this Day!</b><br />In Hindu religion, the birthday of Lord Dattatreya is celebrated as Dattatreya Jayanti. However, his worship is done with great joy every year on his birth anniversary. Talking about the other day, because Dattatreya was the incarnation of God Vishnu, therefore, Thursday is considered to be an auspicious day to worship Lord Dattatreya. However, there is no special day for appeasing your Ishta Devta, so you can worship him regularly with devotion and follow all the rites and rituals.<br /><br />
ISHT_DEVTA_LORD_DATTATREYA4 = <b>Puja Rituals for Lord Dattatreya</b><br /><ul><li>Margashirsha Purnima is celebrated as Dattatreya Jayanti every year.</li><li>This day is especially important for bathing before sunrise in the river Ganga.</li><li>After bathing, you need to start appeasing Lord Dattatreya following all the rituals and puja vidhi.</li><li>Firstly, offer flowers on the idol of Lord Dattatreya.</li><li>Then, light an incense in front of him.</li><li>As prasad, offer him fruits and sweets.</li><li>Worshiping Datta Paduka has a great significance. In view of this importance, Manikarnika Ghat in Banaras and Belgaum city in Karnataka are famous to worship his Paduka.</li><li>Regular chanting of Dattatreya Chalisa and Sri Guru Dattatreya charitra can be helpful to attain desired results.</li><li>Gain special benefits by chanting his mantras and stotras.</li><li>End the puja by reciting the Shri Dattatreya Aarti.</li></ul><br />
ISHT_DEVTA_LORD_DATTATREYA5 = <b>Mantra & Stotra for Shri Dattatreya</b><br />Along with appeasing your Ishta Devta Lord Dattatreya, one needs to chant the mantras and stotra for desired results. However, you can chant the below mantra to seek the blessings of Sri Dattatreya<br /><br /><center><b>“ॐ द्रां दत्तात्रेयाय नम:”<br /><br />“oṃ drāṃ dattātreyāya nama:”</b></center><br />Along with this, chanting the Dattatreya Stotram also proves to be fruitful.<br /><br />In order to appease your Ishta Devta Lord Dattatreya, you must worship him with devotion and follow all the rituals  and puja vidhi.<br /><br />

ISHT_DEVTA_LORD_MAHA_LAKSHMI1 = <b><u>Ishta Devi: Goddess Mahalakshmi</u></b><br />According to the planet Venus, your Ishta Devi is Goddess Lakshmi. She is the Hindu goddess of wealth, fortune and prosperity. In order to gain her blessings, you must worship her with devotion and follow all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI2 = <b>Worship Goddess Lakshmi to Keep Poverty at Bay!</b><br />Goddess Lakshmi is considered to be the Hindu Goddess of wealth, fortune and prosperity. The devotees worship Goddess Lakshmi in order to keep poverty at bay and bring unlimited wealth in their lives. There are eight forms of Goddess Lakshmi, which are known as Ashtalakshmi. It is a belief that if Goddess Lakshmi resides in a house then, there is an abundance of wealth, prosperity, joy and happiness. Along with the wealth, she is also considered to be the ‘Goddess of Beauty’.<br /><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI3 = <b>Brief Introduction of Goddess Lakshmi</b><br />Goddess Lakshmi was born at the time of sea churning. However, according to other mythological legends, Goddess Laxmi took birth in the house of Sage Bhrigu and Mata Khyati. She was born on the day of Sharad Purnima. She resides with her husband, God Vishnu on the lotus flower in the Kshir Sagar (milk of ocean). Goddess Lakshmi  is seen in two forms, the first is Sri, in which she sits on the lotus flower and the second form is Lakshmi, in which she is with Lord Vishnu. The vehicle of Lakshmi form is owl and the vehicle of Mahalakshmi form is the elephant. The eight forms of Goddess Lakshmi: Adi Lakshmi, Dhana Lakshmi, Dhanya Lakshmi, Dhairya Lakshmi, Gaja Lakshmi, Santan Lakshmi, Vijay Lakshmi and Vidya Lakshmi.<br /><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI4 = <b>Worship Goddess Lakshmi on this Day!</b><br />The worship of Goddess Lakshmi is done every Friday. On this day, people observe a fast and listen to Vaibhav Lakshmi Katha in the evening. Along with that, the worship of Mahalaxmi is specially done on the day of Sharad Purnima. Special significance has been mentioned in the scriptures of this day. It is believed that by worshiping Goddess Lakshmi with full devotion and following all the rites and rituals helps to fulfill all desires. Also, Lakshmi Pujan has a great significance on the festival of Deepavali/Diwali. On this day, people worship the Goddess Laksmi for unlimited health, wealth and happiness.<br /><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI5 = <b>Rituals to Worship Goddess Lakshmi</b><br /><ul><li>Firstly, install a picture or idol of Goddess Lakshmi.</li><li>Start the puja vidhi by sprinkling gangajal on the idol of Goddess Lakshmi.</li><li>After that, offer rose or lotus flower on the idol.</li><li>Then, offer kheer, halwa, water chestnut (singada), ber and sweets made of kesar on the idol.</li><li>During the puja, light up a diya with pure ghee.</li><li>If possible, light up a diya using sesame oil or peanut oil.</li><li>To get special benefits, recite Mahalakshmi mantra.</li><li>During the puja, Kalash Sthapna is very important.</li><li>Observe a Vaibhav Lakshmi fast every Friday for desired results.</li><li>It is important to listen Vaibhav Lakshmi Katha (Story) on this day.</li></ul><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI6 = <b>Mahalakshmi Mantra</b><br />These are the Mahalakshmi mantras which can be chanted to appease your Ishta Devi Goddess Lakshmi. However, you can chant the below mantras to seek the blessings of Goddess Lakshmi:<br /><br /><center><b><i>“ऊँ अपवित्रो पवित्रो वा सर्वावस्थां गतोsपिवा।<br />यः स्मरेतपुण्डरीकाक्षं स बाह्याभ्यन्तरः शुचिः।।”<br /><br />“ūm̐ apavitro pavitro vā sarvāvasthāṃ gatospivā।<br />yaḥ smaretapuṇḍarīkākṣaṃ sa bāhyābhyantaraḥ śuciḥ।।”<br /><br />and<br /><br />“ऊँ श्रीं श्रियै नमः।श्रीं ह्रीं क्लीं ऐं कमलवासिन्यै स्वाहा।<br />ऊँ श्रीं ह्रीं श्रीं कमले कमलालये प्रसीद प्रसीद श्रीं ह्रीं<br />श्रीं ऊँ महालक्ष्म्यै नमः।”<br /><br />“ūm̐ śrīṃ śriyai namaḥ।śrīṃ hrīṃ klīṃ aiṃ kamalavāsinyai svāhā।<br />ūm̐ śrīṃ hrīṃ śrīṃ kamale kamalālaye prasīda prasīda śrīṃ hrīṃ<br />śrīṃ ūm̐ mahālakṣmyai namaḥ।”</i></b></center><br />Hence, this way you can appease your Ishta Devi Goddess Lakshmi in order to attain desired results.<br /><br />

ISHT_DEVTA_LORD_MAA_GOURI1 = <b><u>Ishta Devi: Goddess Mahagauri</u></b><br />According to the planet Venus, your Ishta Devi is Goddess Mahagauri. In order to gain her blessings, you must worship her with devotion and follow all the rituals and puja vidhi.<br /><br />
ISHT_DEVTA_LORD_MAA_GOURI2 = <b>Goddess Gauri: Wife of Lord Shiva</b><br />According to the traditions of Hindu religion, worshiping MahaGauri helps to eradicate the misery of a person and get rid of all previous sins. Mahagauri is considered to be the eighth incarnation of Goddess Durga, and her age is just eight years old. Matagauri, who fulfills all your desires, had observed a tapasya in order to marry Lord Shiva. Pleased with her tapasya, God Shiva accepted her as his wife. Worshiping your Ishta Devi Goddess Mahagauri with reverence, can prove to be fruitful for you.<br /><br />
ISHT_DEVTA_LORD_MAA_GOURI3 = <b>Brief Introduction of Goddess Mahagauri</b><br />Mahagauri originated in the eighth form of Goddess Durga and also known by the names Uma, Parvati, Gauri, etc. According to legendary beliefs, she took birth as the eighth incarnation of Goddess Durga in the house of King Himavan. She was a great devotee of Lord Shiva since her childhood, and spent most of her time worshiping Lord Shiva. The thought of marrying Lord Shiva was deeply seeded in her mind since her childhood, and therefore, went through deep austerity for Lord Shiva.<br /><br />It is said her body turned black while observing tapasya for Lord Shiva. In the end, Lord Shiva was pleased with her devotion and accepted her as his devoted wife. Known for her benevolent nature, Goddess Mahagauri wears white clothes and her vehicle is bull.<br /><br />
ISHT_DEVTA_LORD_MAA_GOURI4 = <b>Worship Mahagauri on this Day!</b><br />The worship of Mahagauri is specially done on the eighth day of Navratri i.e. on the occasion of the Maha Ashtami. Since, her age is considered to be eight years old, hence kanya pujan holds a great importance on this day. However, if your Ishta Devi is Mahagauri then, you can worship her on any given day. Unmarried girls worship Goddess Mahagauri in order to find a suitable husband. If there is any obstacle in the marriage, then worshiping Mahagauri can help you overcome that obstacle.<br /><br />
ISHT_DEVTA_LORD_MAA_GOURI5 = <b>Puja Rituals to Appease Goddess Mahagauri</b><br /><ul><li>After taking an early bath, wear yellow clothes to worship Goddess Mahagauri.</li><li>Firstly, light up a diya using pure ghee or oil in front of the idol of Mahagauri.</li><li>Now, offer yellow or white flowers on the idol.</li><li>As prasad, offer her kheer and sweets and if puja is performed on the day of Maha Aashtami, then offer her halwa, kheer, puri and chana.</li><li>To get the blessings of Mahagauri, offer coconut on the day of Maha Ashtami.</li><li>Offering the same coconut in the flowing water can help you get desired results.</li><li>During the puja, recite Mahagauri mantra</li><li>For special blessings, offer perfume on the idol</li><li>On the day of Maha Ashtami, after the puja, feed girls from two to eleven years old.</li><li>Recite Mahagauri mantra <b><i>“मां महागौरी मंत्रः ओम महागौरियेः नमः” / “māṃ mahāgaurī maṃtraḥ oma mahāgauriyeḥ namaḥ”</i></b> for 108 times.</li></ul><br />
