	RASI_ACCORDING_TO_VEDIC_ASTROLOGY			=  వేద జోతిష్యం ప్రకారం రాశి అంటే
	RASI_PREDICTION_1							= <p>మీరు ఎరుపు లేదా పసుపుపచ్చ ఉత్పత్తులతో చేయు వ్యాపారం నుండి లాభాన్ని పొందుతారు. స్వభావరీత్యా మీరు హాస్యపరులు మరియు ఎరుపురంగు స్వరం కలిగిన ప్రకాశవంతమైన ముఖం గలవారు. వారంలో మీ అదృష్ట రోజులు బుధవారం, సోమవారం మరియు మంగళవారం. మీకు ఆవులు, దున్నపోతులు మరియు ఇతర జంతువులను శ్రద్ధగా చూసుకోవడం పట్ల ఇష్టం ఉంటుంది. స్వభావరీత్యా మీరు కొంత సోమరులు కానీ ఇతర వ్యక్తుల పనులను చేయడానికి ఎప్పుడూ సిద్ధంగా ఉంటారు. మీకు కన్యా, కుంభం మరియు మిథునరాశి మిత్రులు చాలా మంది ఉంటారు. మీరు ఔత్సాహికులు మరియు పురోగతి గలవారు.  20, 26, 33 సంవత్సరాలలో మీరు జ్వర భయం మరియు ఆయుధాల భయంతో ఉంటారు.  45, 50, 55 సంవత్సరాలలో జీవితం స్వల్పకాలికంగా మరియు ఆకస్మిక మరణంతో ఉంటుంది.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>13, 1 మరియు 7 సంవత్సరాలలో, మీరు జ్వరంతో బాధ పడతారు. 3,12,5 మరియు 16 సంవత్సరాలు మీకు ప్రభుత్వం నుండి భయం ఉంటుంది. 32 మరియు 8 సంవత్సరములలో ఆకస్మిక మరణ భయానిదే పైచేయి అవుతుంది. మీ 25 వ సంవత్సరం మీ పిల్లవాడు తప్పిపోవడానికి కూడా అవకాశం ఉంటుంది.  జీవితంలోని 4వ మరియు 8వ సంవత్సరంలో వాహనం నుండి బాధ వస్తుంది మరియు 3,12 మరియు 24 సంవత్సరాలలో విష భయం మరియు మునిగిపోవు భయాలదే పైచేయి అవుతుంది.</p> <b style='padding-left:84%'>-జనమ్ప్రదీప్</b>
	RASI_PREDICTION_2							= <p>మీరు ప్రధానంగా కీళ్ళలో బొబ్బలతో కూడిన పొడవైన చేతులతో బొద్దుగా మరియు దగ్గు సమస్యలతో ఉంటారు. వారంలో మీ అదృష్ట రోజులు శనివారాలు, బుధవారం మరియు శుక్రవారం. మీకు ఆదివారం దురదృష్టకరమైన రోజు. చేదు మరియు పులుపు మీకు బాగా తగినవి, మీరు పాల ఉత్పత్తులను తినడం ఇష్టపడతారు. మీ వ్యాపార భాగస్వాములు, మధ్యతరగతి నుండి ఉంటారు మరియు సన్నని మిత్రులు మీకు సమస్య కారణంగా ఉంటారు. మీరు తోటపని మరియు సేద్యం సంబంధ వ్యాపారం నుండి లాభాన్ని పొందుతారు. ముఖ్యంగా మీరు ఎక్కువ ఎత్తునుండి పడిపోతారనే భయాన్ని కలిగి ఉంటారు మరియు మీ శత్రువుల సాంగత్యంలో నెమ్మదిగా ఆనందంగా ఉంటారు. ఒక అందమైన ప్రేమికుడు, మధ్యస్థ ఎత్తును కలిగిన మీరు అలంకరణ మరియు దుస్తులు ధరించడాన్ని ఇష్ట పడతారు. మీ ఆరోగ్య సమస్యలు ప్రధానంగా మీ కడుపు మరియు మెడకు సంబంధించి ఉంటాయి.</p> <p> 2 , 4, 5, 7 మరియు 18 సంవత్సరాలు బాధలను కలిగి ఉంటాయి. 32, 44, 40 సంవత్సరాలు జబ్బులను మరియు నష్టాలను తెస్తాయి. స్త్రీ ప్రేమికుడైన మీరు వెచ్చని ఆహారం తీసుకోవడానికి ఇష్టపడతారు మరియు దగ్గు మరియు జలుబులతో బాధపడతారు. మీరు పాత మరియు పురాతన వస్తువులను సేకరించడం పట్ల ఆసక్తిని కలిగి ఉంటారు.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>ఛాతీ, మెడ మరియు చుబుకానికి సంబంధించిన వ్యాధుల వలన మీరు బాధపడతారు. మూడవ సంవత్సరంలో అగ్ని భయం ఉంటుంది. చేయి మరియు కాలి గాయాలు, 19 మరియు 32 సంవత్సరాలలో ఆకస్మిక మరణాన్ని తీసుకువచ్చే అవకాశాలున్నాయి. మీకు రెండవ వివాహం తప్పనిసరిగా జరుగు అవకాశం ఉంది మరియు సాధారణంగా మీకు చాలా కొంతమంది తోబుట్టువులు ఉండు అవకాశం ఉంది. మధ్వనవమి లేదా రోహిణీ నక్షత్రంలో మరణం సంభవించు అవకాశం ఎక్కువ.</p> -యువనేశ్వర్ <p> 2, 5 మరియు 9 సంవత్సరంలో మీరు రాళ్ళు మరియు స్త్రీలతో జాగ్రత్తగా ఉండాలి. మీరు మీ మర్మాయవాలలో వ్యాధులతో కూడా బాధపడతరు. మీకు ఎక్కువ ఆకలి ఉంటుంది, మీరు నిష్ణాతులు, బాధపడువారు, దానశీలురు, మరియు ధనవంతులుగా ఉంటారు. 15వ మరియు ఆరవ సంవత్సరాలలో మీరు నీరు, కొమ్ముగల జంతువులు, విషం, పర్వతం, ఎలుగులు లేదా దయాలతో బాధపడతారు. 10, 25 మరియు 45 సంవత్సరాలలో అగ్ని, దాగిన రోగాలు మరియు భావోద్వేగ బంధాల భయం ఉంటుంది.</p> <b style='padding-left:84%'>-జనమ్ప్రదీప్</b>
	RASI_PREDICTION_3							= <p>మీరు బెండు మరియు నొప్పితో బాధపడతారు. బుధవారం, శుక్రవారం మరియు శనివారాలు మీకు అదృష్ట రోజులు. మీరు ఒక రచయిత, ప్రభుత్వోద్యోగి లేదా ఒక తెలివైన వ్యక్తిగా ఉంటారు. మీకు చేదుగా మరియు పుల్లగా ఉన్న వస్తువులు ఇష్టం. నల్లని వస్తువులు మీకు లాభాన్నిస్తాయి మరియు తెలుపురంగు మీకు దురదృష్టాన్ని కలిగిస్తాయి. మీరు శుభ్రమైన, వ్యక్తం చేయగల మరియు కోపం గల వ్యక్తిగా ఉంటారు. మీకు మీ స్వంత వాహనం ఉంటుంది మరియు ఇతరుల ధనాన్ని నేర్పుగా తీసుకుంటారు. మీరు బహు స్త్రీలను కలిగి ఉంటారు మరియు ఉదరబాధలు ఎక్కువగా ఉంటాయి. 5, 12,16 మరియు 27 సంవత్సరాలలో మీకు చాలా బాధలు ఉంటాయి.  జీవితం యొక్క 50వ సంవత్సరంలో మీకు ఆకస్మిక మరణం సంభవించవచ్చు.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>మీ భవిష్య్త్తులో మీరు ఆనందకర మధ్యతరగతిలో జీవిస్తారు. 6 మరియు 18 సంవత్సారాలలో జలగండం ఉంటుంది. 5వ సంవత్సరంలో చెవి వ్యాధులు మరియు 24వ సంవత్సరంలో నొప్పి భయం ఉంటాయి. 38వ సంవత్సరంలో ఆకస్మిక మరణం సంభవించవచ్చు. దీర్ఘకాలిక జీవితం తరువాత 80వ సంవత్సరంలో వైశాఖం యొక్క 12 వ సంవత్సరం, హస్తా నక్షత్రం, బుధవారం లేదా శుక్రవారం మీ ఆత్మ మీ దేహాన్ని వదలివేస్తుంది. జీవితం యొక్క 3వ, 10వ మరియు 6వ సంవత్సరంలో మీరు మూడు అసమతుల్యాలతో బాధపడతారు మరియు దయ్యం మరియు ఉప్పు భయంతో జీవిస్తారు. 20వ మరియు 12వ సంవత్సరంలో మీరు గుర్రాలు, పాము, ఏనుగు, పర్వతం మరియు నీటి వలన భయపడతారు.<br/> జీవితం యొక్క 18వ 9వ 30వ మరియు 5వ సంవత్సరంలో మీరు జ్వరం నుండి బాధపడతారు. మీరు హాస్యపరులు, ధనవంతులు మరియు బక్కపలుచని వారుమరియు 8 వ సంవత్సరంలో గుండె సమస్యలనుండి బాధపడతారు.</p> <b style='padding-left:90%;'>-యువన్</b>
	RASI_PREDICTION_4							= <p>ఆదివారం, సోమవారం, మంగళ వారం మీకు అదృష్టకరం,అయితే బుధవారం దురదృష్టకరం. దగ్గు సమస్యలు, ఆకస్మిక మరణ మూడు ఘటనలతో అందమైన చర్మం ఉంటుంది. 2వ 8వ 21వ మరియు 29వ  సంవత్సరాలు వ్యాధులను తెస్తాయి. మీకు పలుచని కాళ్లు, ఇద్దరు భార్యలు, మరియు నీటి జబ్బులు ఉంటాయి. నడుము, తల మరియు కాళ్ళలో నొప్పి, మరియు కంటిచూపు బలహీనత మరియు క్రింది తరగతి ప్రజలతో భావోద్వేగ ప్రమేయం కలిగి ఉంటారు. శుక్రవారం మీకు దురదృష్టకరం. మీకు నలుపురంగు దురదృష్టకరం మరియు తెలుపు మరియు ఎరుపు అదృష్టకరం.</p> <p>మీ జీవితంలోని 8వ సంవత్సరంలో వాన, నీరు, గాలి నుండి భయం ఉంటుంది. సువాసన నుండి మీరు లాభాన్ని పొందుతారు. మీ జన్మరాశి కర్కాటకం అయినందున మకరరాశి చంద్రుడు లేదా సంక్రాంతి రోజు మీరు దేనిని కొనుగోలు చేసినా కూడా అది రెట్టింపవుతుంది. వాయు సమస్యలు, భరించువారి నష్టం వలన మీరు 48 లేదా 84 వయస్సులో మరణిస్తారు.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>మీరు మీ యౌవనంలో బీదవారిగ ఉంటారు కానీ మధ్యవయస్సులో మంచి స్థితిలో ఉంటారు. జీవితంలో 3వ మరియు 7వ సంవత్సరంలో జ్వరం నుండి బాధపడతారు.  సంవత్సరానికి చంద్రుడు అధిపతి అయినపుడు మీరు నీటి గండం ఎదుర్కొంటారు మరియు సువసన మీకు అదృష్టాన్ని తెస్తుంది. మీ జీవితంలోని మూడవ సంవత్సరంలో మీ శరీరంలోని ఎడమభాగం అగ్ని భయం కలిగి ఉంటుంది. మర్మాయవాలపై మచ్చలు ఉంటాయి, తలకు సంబంధించిన వ్యాధి కలగవచ్చు, లేదా మిగిలినదంతా ఆనందకరంగా ఉంటుంది. మీరు 32 సంవత్సరాల వయస్సులో ఆకస్మిక మరణం సంభవించవచ్చు. 29వ సంవత్సరంలో మీకు పాము గండం ఉంటుంది. మీ మరణం మాఘ శుక్ల లేదా శుక్ర నక్షత్రం యొక్క శుక్రవారం సంభవిస్తుంది.<p> <b style='padding-left:90%;'>-యువన్</b> <p>మీ జీవితంలోని 4వ, 8వ, 12వ సంవత్సరంలో మీ తల, చెవులు మరియు కళ్ళపై బొబ్బలు కలుగుతాయి. మూడు గ్రహాల అసమతుల్యం ఉంతుంది. మీ జీవితంలో 16వ మరియు 24వ సంవత్సరంలో మీరు స్త్రీ, నీటి, దయ్యం మరియు పర్వత గండాలను చూస్తారు మరియు మీ మర్మాయవాలలో నొప్పి ఉంటుంది. మీరు వ్యయసాయం లేదా సేద్యంలో ఉంటే మీరు నిష్ణాతులుగా ఉంటారు కానీ పిరికివారుగా ఉంటారు.</p> <b style='padding-left:84%'>-జనమ్ప్రదీప్</b>
	RASI_PREDICTION_5							= <p>వారంలో మీ అదృష్టరోజులు సోమవారం, మంగళ వారం మరియు ఆదివారం. మీరు బెండు వ్యాధులతో బాధపడాతారు, తక్కువ జుట్టును కలిగి ఉంటారు, యుద్ధం వలన లాభం పొందుతారు, ఇద్దరు భార్యలను కలిగి ఉంటారు వారిలో ఒకరు గొడ్రాలుగా ఉంటారు. నడుము నొప్పి, కడుపునొప్పి మరియు స్వల్ప గుండె సమస్యలు మరియు తలకు గాయం కలగడం ఉంటాయి. అధిక శ్రేణి రవి మీకు చాలా అదృష్టాన్ని తెస్తాడు మరియు తక్కువ శ్రేణి వలన స్త్రీ నష్టం, నీటి నష్టం లాభాలు కానీ భూమి లాభాలు కలుగుతాయి. జీవితంలో 4వ మరియు 8వ సంవత్సరం జ్వరం తెస్తుంది. 28వ సంవత్సరంలో ప్రభుత్వ భయం ఉంటుంది. 51వ సంవత్సరంలో నొప్పి ఉంటుంది. 30వ సంవత్సరం బాధాకరంగా ఉంటుంది. రవి అధిపతిగా ఉన్న సంవత్సరాలు జీవితంపట్ల భయాన్ని కలుగజేస్తాయి.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>జీవితంలో మొదటి సంవత్సరం కామెర్లు కలుగుతాయి. 5వ సంవత్సరంలో జంతువులు మరియు అగ్ని ద్వారా  చేయి మరియు కాలిలో నొప్పి ఉంటుంది. 13వ సంవత్సరంలో నీళ్లవిరేచనాల భయం మరియు 32వ సంవత్సరంలో ఆకస్మిక మరణం ఉండు అవకాశాలను మీరు చూస్తారు. 7వ సంవత్సరంలో మీకు జ్వరంగా,20వ సంవత్సరంలో పాముల గండం, 21వ సంవత్సరంలో వ్యాధి కలగ వచ్చు. మీరు యుద్దం పట్ల ఆసక్తి కలిగి ఉంటారు మరియు ఒక అప్రసిద్ధ మరియుఒక యోధునిగా ఉంటారు. 28వ సంవత్సరంలో మీరు మీ మర్మాయవాలలో నొప్పితో బాధ పడతారు. మీరు అశ్విని నక్షత్రం రోజు, ఫాల్గుణ శుక్ల, 5 వ సోమవారం మరణాన్ని చూస్తారు.</p> <b style='padding-left:90%;'>-Yvan</b> <p>5వ, 10వ మరియు 15వ సంవత్సరంలో మీరు ఆయుధాలు, అగ్ని, నీరు, శ్వాసతీసుకోవడం మరియు గుండె నొప్పి భయాన్ని కలిగి ఉంటారు. 30వ సంవత్సరంలో చూపైన దంతాలు, చూపైన కోరలు కలిగిన క్రూర జంతువుల గండం ఉంటుంది. 20వ సంవత్సరంలో పాముల గండం ఉంటుంది. చేతబడి మరియు జ్వర భయం ఉంటుంది. మీరు ధైర్యవంతులు, నిజాయతీ మొదుబారినవారు, స్త్రీవ్యతిరేకులు మరియు కొంతమంది కుమారులను కలిగి ఉంటారు.</p> <b style='padding-left:84%'>-జనమ్ప్రదీప్</b>
	RASI_PREDICTION_6							= <p>మీకు అందమైన కళ్ళు, పొడవాటి జుట్టు, అధిక బెండు మరియు అందమైన రూపురేఖలు ఉంటాయి. మీరు ఇతరుల కొరకు పనిచేయడంలో సోమరిగానూ, మీకొరకు పనిచేయుటలో చురుగ్గానూ ఉంటారు. మీరు పేరుప్రఖ్యాతులు కలిగి ఉంటారు.</p><p> రచనలు, తోటపని, సామాజిక సేవ మీకు సంపదలను తెస్తాయి. మీకు సోమవారాలు దురదృష్టకరం. ఉన్నా స్థితి వినాశనానికి దారితీయవచ్చు.</p> <p>మొదటి భార్య బాగుంటుంది. 4వ మరియు 9వ సంవత్సరంలో కంటి సమస్యలుంటాయి. 50వ, 28వ, 30వ మరియు 47వ సంవత్సరంలో బాధ ఉంటుంది. 50వ మరియు 60వ సంవత్సరంలో భూమినుండి మరియు వాహనం నుండి ధనం అందుతుంది. గురువు ఉచ్ఛస్థితిలో ఉంటే మీకు స్నేహితులద్వారా అధిక లాభాలు కలుగుతాయి. 30వ సంవత్సరంలో మీరు మూలవ్యాధినుండి బాధపడతారు. మీరు ఒక గొప్ప కుటుంబం నుండి వచ్చి ఉంటారు.</p> <p>జీవితంలోని 5వ సంవత్సరంలో మీ కంటిలో నొప్పి కలుగుతుంది, 3వ సంవత్సరంలో అగ్ని మరియు 21 వ సంవత్సరంలో గోడల ఒక్క చెట్ల గండం కలుగుతుంది. మీ మర్మాయవాలపై మరియు మెడపై పుట్టుమచ్చలు ఉంటాయి. 13వ సంవత్సరంలో మీరు వాంతులనుండి బాధ పడవచ్చు, 15వ సంవత్సరంలో పాముల వలన, 30వ సంవత్సరంలో అడవుల వలన గండం ఉంటుంది, పాముల ఆయుధాలు మరణాన్ని కలిగించవచ్చు.</p> <p>18వ, 12వ మరియు 6వ సంవత్సరాలలో నొప్పి, రాళ్లు, స్త్రీ, ఆయుధాలు మరియు అగ్ని మీకు భయాన్ని కలిగించవచ్చు. 36వ మరియు 24వ సంవత్సరంలో దొంగతనం మరియు అగ్ని యొక్క భయం ఉండవచ్చు. కళ్ళు మరియు భయం కూడా.</p> <p>జీవితకాలం 90సంవత్సరాల వరకు ఉంటుంది, మీఉ మతపరమైనవరు మరియు ప్రతిభావంతులు. అందమైన కళ్ళు, బలమైన గోళ్ళు, గోధుమ వర్ణం కలవారు, ఇతరుల సంపదతో ఉన్నతులు మరియు యాత్రీకులు.</p> <b style='padding-left:60%;'>-రోమక లేక  రోముక్ దృష్టీ కోణము</b>
	RASI_PREDICTION_7							= <p>మీకు అందమైన కళ్ళు, ముఖం గోధుమవర్ణ రూపం మరియు ఎక్కువ గడ్డం ఉంటాయి. ప్రభుత్వ ఉద్యోగుల పట్ల ప్రేమ ఉంటుంది. బుధవారం, శుక్రవారం మరియు శనివారం అదృష్టరోజులు. దగ్గుతో  బాధ పడతారు. కొనడం అమ్మడంలలో తక్కువ లాభాన్ని పొందుతారు. తల మరియు ముఖం గాయపడతాయి. 8 సంవత్సరాల వయస్సులో, మీరు పైనుండి పడిపోవు బాధను కలిగి ఉంటారు మరియు మీరు బాగా పోషించబడి ఉంటారు మరియు ధనవంతులుగా ఉంటారు. మీరు ఒక గోప్యమైన పాపిగా ఉండి ఇద్దరు భార్యలను కలిగి ఉంటారు మరియు యాత్రలను ఏర్పాటుచేయువారు మరియు విజ్ఞానవంతులు. సోమరిపోతులు, ఆహారధాన్యాలను దాచుతారు మరియు మీ జుట్టు త్వరగా తెల్లబడుతుంది. శుక్రుడు ఉచ్ఛస్థానంలో ఉన్నపుడు సుగంధద్రవ్యాల వలన లాభాన్ని పొందుతారు. మీరు ఒక నది లేదా పర్వతం పక్కన నివాసం ఉండడానికి ఇష్టపడతారు.</p> <p>3వ, 8వ, 14వ, 26వ, 24వ, 47వ 55వ -63వ సంవత్సరంలో మీరు శ్వాసకోశ రుగ్మతతో బాధపడతారు. మీకు దగ్గు సమస్యలు ఉంటాయి. 84 సంవత్సాల వయస్సులో కూడా మీరు యౌవనంగా ఉంటారు. 30వ సంవత్సరంలో మీజీవితంలో మరొక స్త్రీ ప్రవేశిస్తుంది.  12వ సంవత్సరంలో నీటి గండం, 18వ సంవత్సరంలో అగ్ని గండం ఉంటాయి. 21వ సంవత్సరంలో చెట్లు లేదా వాహనాల సమస్యలు ఉంటాయి. 20వ సంవత్సరం పాము గండం ఉంటుంది. సాధారణంగా వ్యాపారి, సన్నగా మరియు సంపదతో ఉంటారు. వైశాఖ శుక్ల దశమి నాడు మరణం సంభవిస్తుంది. ఆశ్లేష మంగళవారం. 7వ, 14వ మరియు 20వ సంవత్సరాలలో పురుగుల గండం, బిగుతు గండం లేదా మూడు వస్తువుల గండం ఉంటుంది.. 28వ మరియు 42వ సంవత్సరం ఏనుగుల మరియు రాళ్ల గండం తెస్తుంది. 63వ సంవత్సరంలో మీరు చేయి మరియు కాళ్ల నొప్పిని చూస్తారు. మీకు చాలా గౌరవం ఉంటుంది. మీకు ఎత్తైన స్థితిలో కళ్ళు, పెద్ద ముఖం ఉంటుంది, మీరు దానం ఇచ్చువారు మరియు ఒక వ్యాపారవేత్త.</p> <b style='padding-left:60%;'>-రోమక లేక  రోముక్ దృష్టీ కోణము</b>
	RASI_PREDICTION_8							= <p>\మీకు అధిక బెండు, ఎరుపురంగు రూపం ఉండి, పాలు మరియు పాల ఉత్పత్తులను ఇష్టపడతారు. మీ అదృష్ట రోజులు, మంగళవారం, సోమవారం  మరియు దురదృష్ట రోజు బుధవారం. </p>పులుపు మరియు చేదు వస్తువులు దురదృష్టాన్ని తెస్తాయి. మీరు ఎల్లప్పుడూ మీకలలను మరచిపోతారు. మీరు బలహీనంగా ఉంటారు, జంతువులు, పూర్వీకులతో సమృద్ధిగా ఉంటారు మరియు యుద్ధం చాలా ధనాన్ని తెస్తుంది. మీ శరీరం చెడువాసన కలిగి ఉంటుంది, మీకు పండ్లు లాభాన్నిస్తాయి మరియు నీటి గండం ఉంటుంది.</p> <p>మిథునరాశి మరియు తులా రాశి అధిపతిగా ఉన్న నెలలు బాధలను తెస్తాయి, కొంతమంది త్వరిత ఎదుగుదల మరియు త్వరిత తరుగుదల కలిగి ఉంటే మరొకరు విషయాలను త్వరగా సమ్మతిస్తారు.</p> <p>మీరు తప్పుపనిచేయువారు, శత్రువులమధ్య ఉంటారు. 7వ, 12వ 14వ మరియు 28వ సంవత్సరాలు శ్వాస సమస్యలను తెస్తాయి.  54వ సంవత్సరంలో మరియు గురుగ్రహ సంవత్సరంలో మీరు అతిపెద్ద నష్టంతో బాధపడతారు.</p> <p>చంద్రుణ్ణి మెరు చూసిన దగ్గరి సమయంలో మీరు ఎరుపు పసుపుపచ్చ వస్తువులనుండి లాభాన్ని, స్త్రీల నుండి ఆనందాన్ని పొందుతారు. 75 సంవత్సరాల వయస్సులో ఉండగా, మీరు జ్వరంతో బాధపడతారు. 25వ సంవత్సరంలో మీరు ఆకస్మిక మరణాన్ని పొందుతారు. 39వ సంవత్స్రంలో అగ్ని గండం ఉంటుంది. మీకు చాలామంది పిల్లలు ఉంటారు.</p> <p>మీకు కొట్లాడడం అంటే ఇష్టం, స్తీల నుండి దూరంగా ఉంటారు మరియు స్నేహితులకు ద్రోహం చేస్తారు. మీరు హస్తా నక్షత్రం శుక్ల దశమి బుధవారం మరణాన్ని పొందుతారు.</p> <p>8వ, 16వ, 24వ 40వ సంవత్సరలలో మీరు దొంగతనం, అగ్ని, విషం, జ్వరంతో బాధపడతారు. 32వ సంవత్సరంలో మీకు బాంధవ్యం, గాయం మరియు పురుగుల గండం ఉంటుంది. 72 సంవత్సరంలో మీకు నీటిగండం ఉంటుంది. స్థిరమైన, గుండ్రని ఛాతీతో గౌరవించబదిన మీరు బెండు నుండి స్వేచ్ఛగ ఉంటారు.</p> <b style='padding-left:60%;'>-రోమక లేక  రోముక్ దృష్టీ కోణము</b>
	RASI_PREDICTION_9							= <p>మీరు వంగడంతో బాధపడతారు, అందమైన రూపాన్ని గోధుమ వర్ణ జుట్టు, అందమైన కళ్ళతో కలిగి ఉంటారు, మోకాలి మరియు మోకాలి వెనుక నొప్పితో ఉంటారు. మీ స్వంత వ్యక్తులతోనే మీరు కొట్లాడతారు, బాగా తినువారు మరియు జంతువులను వేటాడు యాత్రీకులు. 18వ, 24వ 30వ మరియు 40వ సంవత్సరంలో మీరు వ్యాధితో బాధ పడతారు. గురువారం, మంగళవారం మరియు సోమవారం అనుకూలం. శనివారాలు అనానుకూలం. మీకు ముగ్గురు భార్యలుంటారు. మాఘమాసం మీకు అనుకూలం, కర్కాటక నెల అనానుకూలం.</p> <p>గురువు ఉచ్ఛస్థితిలో ఉన్నప్పుడు తక్కువ బాధ ఉంటుంది. మీ తల్లి బాధపడుతుంది, మీరు చాలా ధనాన్ని కోల్పోతారు మరియు మీకు పనులను చేయించుకోవడంలో కష్టాలు కలుగుతాయి.</p> <p>మూలా నక్షత్రంలో మనసుకు సంబంధించిన సమస్యలు వస్తాయి. రవి కర్కాటక రాశిలో ఉన్నప్పుడు నొప్పి మరియు చర్మరోగాలు ఉంటాయి. 7వ, 14వ 16వ 20వ, 35వ మరియు 25వ సంవత్సరాలలో గాయం మరియు నొప్పి కలుగుతుంది.</p> <p>ఎరుపు, పసుపుపచ్చ మరియు తెలుపురంగు ఉత్పత్తులు అదృష్టాన్ని తెస్తాయి. గరిష్ట వయస్సు 64 సంవత్సరాలు. అంతే కాకుండా మొదటి సంవత్సరం వ్యాధి సంవత్సరం, 13 వ సంవత్సరంలో మరణం సంభవించవచ్చు. యువకులుగా ఉన్నపుడు మీరు ధనవంతులు, తక్కువ పిల్లలను కలిగి, ఎల్లప్పుడూ కుటుంబ సభ్యుల వ్యాధుల గురించి చింతతో ఉంటారు, బాగా తినువారు కాదు. మీరు ఆషాఢ కృష్ణ పంచమి శుక్రవారం మరణిస్తారు. 18, 27, 9 సంవత్సరాలలో మీ ముఖం శ్వాస వ్యాధులు, అగ్ని గండం, కొమ్ములు కలిగిన మరియు ముళ్ళు కలిగిన జంతువుల గండం ఉంటాయి.</p> <p> 54 మరియు 36 సంవత్సరాలలో మీరు మూలవ్యాధి మరియు మూడు అసమతుల్యాలతో బాధ పడతారు. రక్తంలో సమస్యలు, తలకు సంబంధించిన వ్యాధులుంటాయి. మీరు తెలివైన వారు మరియు యజ్ఞాలు చేస్తూంటారు కానీ కష్టమైన జీవితాన్ని కలిగిఉంటారు.</p> <b style='padding-left:60%;'>-రోమక లేక  రోముక్ దృష్టీ కోణము</b>
	RASI_PREDICTION_10							= <p>మీరు వంగడంతో బాధపడతారు. ధైర్యవంతులు, చేతులు మరియు మోకాళ్ళ నొప్పులు కలిగి ఉంటారు, నడుము సమస్యలు కలిగి ఉంటారు. అదృష్టరోజులు బుధవారాలు, శనివారం మరియు శుక్రవారం మరియు దురదృష్టరోజు ఆదివారం.</p> <p>మాఘ భాద్రపద నెలలో మరియు సింహరాశిలో చంద్రుడు ఉన్నప్పుడు నష్ట  కలుగు మరియు వ్యాధులు కలుగు అవకాశం ఉంటుంది. 8, 16, 20, 30, 34 సంవత్సరాలు చాలా నొప్పిని కలిగిస్తాయి.</p> <p> 44 మరియు 59 సంవత్సరాలు ఎక్కువ బాధను కలిగిస్తాయి. మీకు ఇద్దరు అందవికారులైన భార్యలు ఉంటారు. శని అధిపతిగా ఉన్న సంవత్సరాలలో మీకు నలుపు వస్తువులనుండి లాభం కలుగుతుంది. మీరు మాటకారి, గౌరవించదగిన వారు, ఏడవ సంవత్సరంలో నీటి గండం ఉంటుంది. మీరు తెలివైనవారు. 21వ సంవత్సరంలో జ్వరం వస్తుంది మరియు 32వ మరియు 5వ సంవత్సరంలో జ్వరం వస్తుంది.  25వ సంవత్సరంలో మీకు ఎడమవైపు అగ్ని గండం ఉంటుంది. 35 సంవత్సరంలో ఇతర స్త్రీ కొరకు కామం ఉంటుంది మరియు శత్రుభయం ఉంటుంది. 10-20 సంవత్సరాలు, కళ్లలో సమస్యలు, చర్మ రుగ్మత, నీటి గండం మరియు కీటకాలు మరియు ఆయుధాల గండం ఉంటాయి. 30సంవత్సరాల వయస్సులో కంటి సమస్యలుంటాయి. 40-60సంవత్సరాల మధ్య, అపెండిక్స్ మరియు స్తీ మరియు విష గండం ఉంటుంది. మీరు తక్కువ ధనంతో జూదరిగా ఉంటారు మరియు పిసినారి మరియు చెడుసావాసాలను ఎల్లప్పుడూ కలిగి ఉంటారు.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_11							= <p>మీకు ఉదరసమస్యలు, కడుపులో గడ్డలు, దగ్గు మరియు జలుబు ఉంటాయి.దురదృష్టరోజులు శుక్రవారం, బుధవారం మరియు ఆదివారం. మీకు అందమైన రూపం, అందమైన కళ్ళు ఉండి మీరు ధనవంతులుగా మరియు ఆనందంగా ఉంటారు.</p> <p>మీరు శతభిష నక్షత్రం రోజు లేదా ద్వితీయ తిథినాడు మరణాన్ని కలుసుకుంటారు. మీరు వస్తువుల సేకరణను ఇష్టపడతారు, ఇద్దరు భార్యలను కలిగి ఉంటారు మరియు తక్కువ జీవనాన్ని కలిగి ఉంటారు.</p> <p>మీరు మీ కుటుంబంలో పెద్దవరు, పేలవమైన రూపం, గోధుమ వర్ణంతో, ప్రేమించు భార్యను, గొడ్రాలి భార్యను కలిగి ఉండి మీ నడుముపై ఒక గుర్తును కలిగి ఉంటారు.</p> <p>మీరు సముద్రం నుండి ధనాన్ని సంపాదిస్తారు. అదృష్టరోజులు సోమవారం, గురువారం, మంగళవారం మరియు శుక్రవారం దురదృష్టకర రోజు. మీ గురువు బలహీనంగా ఉంటే లేదా పాపంచేసిఉంటే మీరు తప్పనిసరిగా ప్రార్థించాలి. మీ గురువు నీచస్థితిలో ఉంటే మీకు వ్యాపారంలో నష్టం వస్తుంది. మీకు ఒక కుమారుడు ఉంటాడు.  2, 4, 9, మరియు 12 సంవత్సరాలలో మీరు కడుపుకు సంబంధించిన వ్యాధులతో బాధపడతారు. ఈ సంవత్సాఅలు మీకు బాధను కలిగిస్తాయి మరియు మీరు సఫలీకృతులు కాలేరు.</p> <p>మీరు చాలా సహాయకారిగా ఉంటారు, మీ పనిలో సోమరులు.  32, 19 సంవత్సరాలు వ్యాధులను తెస్తాయి. చేదు మరియు పుల్లని ఔషధాలు మీకు మంచివి.</p> <p>రవి కుంభరాశిలో ఉన్నపుడు, మీకు మధుమేహం, క్షయ కలుగవచ్చు. మీరు తియ్యగా మాట్లాడతారు, ప్రొఫెషనల్ జీవితంలో అసహనంగా ఉంటారు. మొదటి సంవత్సరంలో వ్యాధితో ఉంటారు, ముగ్గురు సోదరులను కలిగి ఉంటారు మరియు మీ ఎడమ చేతిపై గుర్తులు ఉంటాయి. మీకు ఇద్దరు భార్యలు ఉంటారు. 5వ మరియు 6వ సంవత్సరంలో మీరు బీదరికాన్ని ఎదుర్కొంటారు. 15వ సంవత్సరంలో అగ్ని గండం, 12వ సంవత్సరంలో నీటి గండం మరియు పాముల గండం ఉంటాయి.  కోపిష్టి, స్త్రీవ్యసన పరుడు, స్వార్థపరుడు, భారీకాయం, అసహనంతో మరియు పనిలో మొండివాడుగా ఉంటారు. మీకు పొడవాటి మెడ ఉండి, పొడవుగా మరియు జుట్టు ఉంటుంది. చంద్రునిపై దృష్టి ఉంటే మీరు 80 సంవత్సరాలవరకు జీవిస్తారు.  మీరు కృష్న భాద్రపద నవమి రోహిణి నాడు మరణిస్తారు.</p> <p>11వ సంవత్సరంలో మీకు నీటి బాధ ఉంటుంది; సాధారణంగా మీకు నీటిగండం ఎల్లప్పుడూ ఉంటుంది.  16వ సంవత్సరంలో ఉన్నప్పుడు క్షుద్ర స్త్రీ లేదా ఆయుధాల గండం ఉంటుంది.  21 వ సంవత్సరంలో పాముల గండం మరియు అగౌరవం ఉంటుంది.  25 వ సంవత్సరంలో, మీకు మూడు అసమానతలు కలుగుతాయి మరియు 11, 22, 33 వ సంవత్సరాలలో మీకు బొబ్బలు కలుగుతాయి మరియు కౄరజంతువుల గండం ఉంటుంది. 66 మరియు 44 సంవత్సరాలలో మీకు మీ దంతాలు, కళ్ళు, చెవుల సమస్యలు ఉంటాయి. మీ నడుము మరియు చేతిపై గుర్తు ఉంటుంది. మీరు సాధారణంగా ఇతర వ్యక్తుల సంపాదనపై ఆధారపడి ఉంటారు మరియు ఒక జూదరిగా ఉంటారు.</p> <b style='padding-left:60%;'>-రోమక లేక  రోముక్ దృష్టీ కోణము</b>
	RASI_PREDICTION_12							= <p>కార్యాచరణలు లేదా ప్రమాదాల వలన మీరు అధిక రక్తాన్ని కోల్పోబోతారు. విలాసప్రేమికులుగా, మీరు ప్రకాశవంతమైన రూపురేఖలు, అందమైన కళ్ళు కలిగి ఉండి, అలంకార దుస్తులను ధరించుటను, సంగీతాన్ని, కామాన్ని ఇష్టపడతారు మరియు మీ శరీరంలో ఎడమవైపు నొప్పితో బాధపడతారు. మీరు మంచి స్వభావం మరియు సంతృప్తిని కలిగి ఉంటారు, అతిథులను ప్రేమిస్తారు, ఒక నిబద్ధమైన కుమారుడుగా ఉంటారు, మొదటి సంవత్సరంలో నీటి గండం, 8 వ సంవత్సరంలో జ్వరం మరియు 32 వ సంవత్సరంలో ఆకస్మిక మరణ భయం కలిగి ఉంటారు.</p> <p>మంచి గ్రహాల దశలు రాకపోకలతో మరియు మీరు కష్టాల దశలలో ఉన్నప్పుడు మంచి గ్రహాల దశలు వస్తూఉంటాయి మరియు అప్పుడు మీకు ఒక దీర్ఘకాలిక జీవితం ఉండి 100 సంవత్సరాలు జీవిస్తారు. ఎత్తైన స్థితిలీని ముఖం, పెద్ద తల, అందమైన చూపు, తన ప్రేమికుని అనుసరణ,తెలివైన వారు, నీటి ప్రేమికులు, కోపిష్టి, స్తీలోలుడు, దానశీలి అయిన మీకు ఏడుమంది సోదరసోదరీమణులుంటారు.</p> <p>20వ సంవత్సరంలో మీకు మరణగండం ఉంటుంది, అశ్వినీ కృష్ణ చతుర్థి, గురువారం, రోహిణీ నక్షత్రంలో, ఒక నది ఒడ్డున మీ మరణం సంభవించవచ్చు.</p> <p>12 వ సంవత్సరంలో జ్వరం, 18 వ సంవత్సరంలో పాముల గండం, 22 వ సంవత్సరంలో విదేశ గండం మరియు 24 వ సంవత్సరంలో ఆకస్మిక మరణ గండం ఉంటాయి. 27 వ సంవత్సరంలో నీటి గండం, 32 వ సంవత్సరంలో పాము మరియు ఆయుధ గండం ఉంటాయి. మీ  12వ, 24వ, 40వ మరియు 48 వ సంవత్సరంలో కుక్కల, కోరల జంతువుల మరియు అరదండాల గండం ఉంటుంది.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>

	WHAT_IS_RASI								= Your Rashi As Per Astrology Classics