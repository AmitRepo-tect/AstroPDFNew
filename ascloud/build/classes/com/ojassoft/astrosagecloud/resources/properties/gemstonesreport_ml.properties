
	GEMSTONE_PREDICTION				= രത്നകല്ല് പ്രവചനം
	WHAT_IS_GEMESTONES					= എന്താണ് രത്നകല്ല്?
	GEMINTRO							= ചരിത്രത്തിൽ ഉടനീളം രത്നങ്ങളുടെ പ്രഥമ ഉപയോഗം സുഖപ്പെടുത്തുവാനും ആദ്ധ്യാത്മിക അനുഷ്ഠാനങ്ങൾക്കും വേണ്ടി ആയിരുന്നു. രത്നങ്ങൾ വിരളവും മികച്ച ഭംഗിയും പ്രദർശിപ്പിക്കുന്നു എന്നിരുന്നാലും, ഇവ ധരിക്കുന്നവർക്കു ഇത് പ്രദാനം ചെയ്യുന്ന ശക്തിയാണ് ഇവയെ ഇത്രയ്ക്കും മതിപ്പുള്ളതാക്കുന്നത്. ഒരാളുടെ ശരീരവുമായി ബന്ധപ്പെടുന്നതു വഴി പ്രസരണം ചെയ്യുന്ന അധികാരത്തിന്‍റെ കലവറയാണ് ഇവ. ഇവയെ ഉപയോഗിക്കുന്ന രീതിയുടെ അടിസ്ഥാനത്തിൽ രത്നങ്ങൾ അവയുടെ ശക്തി ഉപകാരപ്രദമോ ഉപദ്രവകരമോ ആയി രീതിയിൽ പ്രദർശിപ്പിക്കുന്നു. എല്ലാ കല്ലുകൾക്കും രത്നങ്ങൾക്കും വിവിധ അവസ്ഥയിലുള്ള കാന്തികശക്തി ഉണ്ടാകും, ഇതിൽ കൂടുതലും നമുക്ക് രോഗം ശമിപ്പിക്കുന്നതിന് ഉപകാരപ്രദമാണ്. മൊത്തത്തിൽ നമ്മളിൽ ശക്തവും പ്രബലവുമായി സ്വാധീനം ചെലുത്തുന്ന അനുചലനമാത്രയേയും തരംഗദൈർഘ്യത്തേയും പുറപ്പെടുവിക്കുന്നു. ഇവിടെയാണ് നിങ്ങളുടെ രത്നക്കല്ല് പ്രവചനം എങ്ങനെ ആയിരിക്കും എന്നറിയുന്നത്.
	STONE_DESCRIPTION					= ജീവ രത്നം ലഗ്ന ദേവന്‍റെ രത്നം ആണ്. ജീവിതകാലം മുഴുവൻ ധരിക്കുന്നതു വഴി അതിന്‍റെ യോഗാത്മക ശക്തി അനുഭവിക്കുവാൻ സാധിക്കും. വിഘ്നങ്ങളെ തരണം ചെയ്യുവാനും ഒരു വ്യക്തിയെ സന്തോഷത്താലും, വിജയത്താലും, സമൃദ്ധിയാലും അനുഗ്രഹീതമാക്കുവാൻ ഒരു ജീവ രത്നം ധരിക്കുന്നതു വഴി സാധിക്കും. ഒരു വ്യക്തിയുടെ ആകെയുള്ള ക്ഷേമത്തിനായാണ് പൊതുവെ ഇത് ധരിക്കുന്നത്. ഇതിൽ നിന്നുള്ള പ്രാപഞ്ചിക രശ്മികൾ അയാളുടെ മൊത്തത്തിലുള്ള ജീവിതരീതിയെ സ്വാധീനിക്കുന്നു.#ജീവിതമെന്നാൽ പ്രയത്നത്തിന്‍റെയും വിധിയുടേയും പൂർണ്ണമായ മിശ്രണം ആണ്. നിങ്ങളുടെ ഭാഗ്യ രത്നം ധരിന്നുന്നതുവഴി വിധിയെ നിങ്ങൾക്ക് അനുകൂലമാക്കു. ഒരു വ്യക്തിയുടെ ഭാഗ്യ രത്നമാണ് ജീവിതത്തിൽ ഹൃദ്യമായ അത്ഭുതങ്ങൾ കൊണ്ടുവരും വഴി ഭാഗ്യത്തെ നിലനിർത്തുന്നത്. ഞങ്ങൾ നിങ്ങൾക്ക് നിർദ്ദേശിക്കുന്ന ഭാഗ്യ രത്നം ഇതാണ്:#യോഗ രത്നം എന്നും അറിയപ്പെടുന്ന ഭാഗ്യ രത്നം നിർദ്ദേശിക്കുന്നത് ഒൻപതാം ഭാവത്തെ നിയന്ത്രിക്കുന്ന ദേവന്‍റെ അടിസ്ഥാനത്തിലാണ്. നിങ്ങൾക്ക് ആവശ്യമുള്ളപ്പോൾ ഭാഗ്യം നൽകുന്നതിന് ഈ രത്നം പ്രശസ്തമാണ്. നിങ്ങളുടെ വ്യക്തിപരവും ഔദ്യോഗികപരവുമായ ജീവിതത്തിൽ ഭാഗ്യം ഉണ്ടാകുന്നു. നിങ്ങളുടെ പുരോഗതിയുടെ മാർഗ്ഗത്തിൽ നിൽക്കുന്ന വിഘ്നങ്ങളെ എതിരിടുവാൻ ഇത് നിങ്ങളെ സഹായിക്കുന്നു.
	
