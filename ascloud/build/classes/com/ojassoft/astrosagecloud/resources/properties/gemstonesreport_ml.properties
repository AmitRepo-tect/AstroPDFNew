	IMPORTANT_INFO                     = <p>ഒരു രത്നം ധരിക്കുമ്പോൾ ദയവായി ചില കാര്യങ്ങൾ മനസ്സിൽ വയ്ക്കുക. ധരിക്കുവാനായി യഥാർത്ഥത്തിലുള്ള രത്നങ്ങൾ തന്നെ വാങ്ങുക അല്ലാത്തവയ്ക്ക് ഫലം ഉണ്ടാവുകയില്ല. റാറ്റി എന്ന് പൊതുവേ അറിയപ്പെടുന്ന, നിർദ്ദേശിച്ചിരിക്കുന്ന ഭാരത്തിലുള്ളവ തന്നെ നിങ്ങൾ ധരിക്കണം. ഞങ്ങളുടെ വായനക്കാർക്ക് കളങ്കമറ്റ സഹായം നൽകുന്നതിന് ആസ്ട്രോക്യാമ്പ്/ആസ്ട്രോസേജ് അതുല്യമായ കളങ്കമറ്റ രത്നങ്ങളുടെ ശേഖരം നിങ്ങൾക്കായി നൽകുന്നു. ഇതിനെ കുറിച്ച് കൂടുതൽ അറിയുവാനായി ഇവിടെ ക്ലിക്ക് ചെയ്യുക.</p> <p><b>രത്നങ്ങൾ വാങ്ങുന്നതിനായി, ദയവായി<a href=http://www.astrocamp.com/products.asp><u> ഞങ്ങളുടെ രത്നങ്ങളുടെ ആസ്ട്രോ ഷോപ്പ് സന്ദർശിക്കുക</u></a></b>.</p> <p><b>ഞങ്ങളുടെ വിദഗ്ദ്ധരായ ജ്യോതിഷന്മാരിൽ നിന്നും നിങ്ങളുടെ ഭാഗ്യ രത്ന നിർദ്ദേശങ്ങൾ ഓർഡർ ചെയ്യുന്നതിനായി, ദയവായി സന്ദർശിക്കുക<a href=http://www.astrocamp.com/service.asp?service_id=84&prtnr_id=1><u> ഭാഗ്യ രത്ന നിർദ്ദേശങ്ങളുടെ പേജ്</u></a></b>.</p>
