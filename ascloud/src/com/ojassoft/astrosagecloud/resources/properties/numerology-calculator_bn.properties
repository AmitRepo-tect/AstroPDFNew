 CAREER_TEXT7 = যেহেতু আপনি এই সংখ্যাটির অধীনে জন্মেছিলেন, তাই আপনাকে জীবনের অনেক সংগ্রাম করতে হবে এবং  আপনাকে জীবনের বিভিন্ন পাঠ শিখতে সাহায্য করবে। ফলস্বরূপ, এমন অনেক ক্যারিয়ার রয়েছে যা আপনাকে সফলতা, ভাল ভাগ্য এবং সম্পদ লাভ করতে সাহায্য করবে। এর মধ্যে রয়েছে চলচ্চিত্র শিল্প, ভ্রমণ, বিমান সেবক বা সেবিকা, দুগ্ধ খামার, মাছ বিক্রেতা, রসায়নবিদ, হাসপাতাল, সিআইডি, শরীরের নির্মাতা, এবং অন্যান্য ক্ষেত্র।
