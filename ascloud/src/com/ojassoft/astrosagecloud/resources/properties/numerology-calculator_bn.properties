 CAREER_TEXT5 = আপনার রুট নম্বরের পালনকর্তা বুধ হয়। এই কারণে, এই সংখ্যাটির অধীনে জন্মগ্রহণ করা আপনাকে গ্রহ থেকে বিশেষ প্রভাব দেয়, যা আপনাকে বুদ্ধির সাথে আপনার সমস্ত কাজ সম্পাদন করতে সাহায্য করে। অতএব, আপনাকে এমন একটি পেশা বেছে নিতে হবে যেখানে আপনার শারীরিক শক্তির পরিবর্তে আপনার মানসিক শক্তির প্রয়োজন। প্রকৌশল, বিক্রয় সম্পর্কিত কাজ, হিসেবে-নিকেশ, ​​রেলওয়ে, টেলিগ্রাফ, সাংবাদিকতা, তামাক, রেডিও ডিলিং, ব্রোকিং, কমিশন এবং তাদের সাথে সম্পর্কিত ক্ষেত্রগুলি আপনার জন্য আরও উপকারী হবে।
