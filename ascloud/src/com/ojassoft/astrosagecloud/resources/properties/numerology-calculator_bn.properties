 TIME_TEXT2 = চাঁদ আপনার পালনকর্তা গ্রহ, প্রতি বছর মে থেকে জুন সময়কাল, আপনার জন্য একটি খুব শুভ সময়। আপনার প্রচেষ্টায় সফল হওয়ার সম্ভাবনা এই সময়ের মধ্যে বেশি। অতএব, জীবনের সফলতা অর্জনের জন্য আপনাকে এই সময়কালের সম্পূর্ণ ব্যবহার করা উচিত।
 TIME_TEXT3 = বৃহস্পতিবার আপনার রুটি নম্বরের প্রভু, তাই ডিসেম্বর থেকে জানুয়ারীর সময়সীমা এবং মার্চ থেকে এপ্রিল পর্যন্ত প্রতি বছর আপনার জন্য উপকারী। এই সময়ের মধ্যে আপনি যে কাজ করেন, তাতে আপনি সফল হবেন, তাই কোনও গুরুত্বপূর্ণ কাজ শুরু করার জন্য এই সময়টি সেরা আপনার জন্য।
 TIME_TEXT4 = গ্রহ হর্ষাল আপনার রুট নম্বর এর পালনকর্তা। আরেকটি সূত্র / মতামতের মতে, রাহুকে এই রেডিকাল নম্বরের স্বামী গ্রহ বলেও মনে করা হয়। ফলস্বরূপ, প্রতি বছর জুলাই থেকে সেপ্টেম্বরের মধ্যে সময়কাল আপনার জন্য খুবই শুভ।  তাই কোনও গুরুত্বপূর্ণ কাজ শুরু করার জন্য এই সময়টি সেরা আপনার জন্য।
 TIME_TEXT5 = যেহেতু বুধ গ্রহ আপনার পালনকর্তা, তাই জুন থেকে জুলাই এবং সেপ্টেম্বর থেকে অক্টোবর পর্যন্ত সময় আপনার পক্ষে খুব উপকারী। আপনি যদি এই সময় কোনও কাজ শুরু করেন, তবে এই সময়কালের মধ্যে এটি করার জন্য আপনার পক্ষে সফলতা অর্জনের একটি উচ্চতর সুযোগ থাকবে।
 TIME_TEXT6 = শুক্র আপনার নাম্বারের প্রভু, ফলস্বরূপ, মার্চ থেকে এপ্রিল, মে থেকে জুন, এবং অক্টোবর থেকে নভেম্বরের সময়কাল আপনার পক্ষে উপকারী। এই সময়কালের মধ্যে যে কোনও কাজ সূচনা করলে তা সফল হওয়ার সম্ভাবনা বেশি এবং আপনি জীবনে সুখ, সমৃদ্ধি এবং অন্যান্য বিলাসিতা অর্জন করবেন।
 TIME_TEXT7 = যেহেতু কেতা আপনার পালনকর্তা গ্রহ, জুলাই থেকে আগস্টের সময়কাল আপনার জন্য খুবই গুরুত্বপূর্ণ। আপনি যে সমস্ত কাজগুলি করেন তা এই সময়ের মধ্যে সফল হবে এবং আপনি আপনার জীবনে আরও ভাল সাদৃশ্য উপভোগ করবেন। আপনি জীবনে এগিয়ে যেতে এই সময় ভাল ব্যবহার করতে পারেন।
 TIME_TEXT8 = শনি আপনার সংখ্যার পালনকর্তা বা স্বামী। অতএব, জানুয়ারী থেকে মার্চ এবং সেইসাথে অক্টোবর থেকে নভেম্বর পর্যন্ত সময়কাল আপনার জন্য অত্যন্ত উপকারী। এই সময়কাল আপনার জন্য সাফল্য আনবে, এবং আপনি এই সময় কোন সুখী বা গুরুত্বপূর্ণ কাজ শুরু করতে পারেন।
 TIME_TEXT9 = মঙ্গলের আপনার বাড়ির প্রভু, তাই জানুয়ারী থেকে ফেব্রুয়ারি, এপ্রিল থেকে মার্চ এবং নভেম্বর থেকে ডিসেম্বরের সময়কাল আপনার জন্য মঙ্গলজনক। এই সময়ের মধ্যে গৃহীত কোনও কাজ আপনাকে সাফল্যের নতুন উচ্চতা অর্জন করতে সহায়তা করবে এবং ফলস্বরূপ আপনি জীবনে অগ্রগতি অর্জন করবেন।
 HEALTH_TEXT1 = রুট নম্বর 1 এর অধীনে জন্মগ্রহণ করা, আপনি একটি সুস্থ ঘোড়া হিসাবে স্বাস্থ্যবান, কিন্তু কিছু রোগের সম্ভাবনা রয়ে যায়। মূলত, আপনি হৃদরোগ, পাম্পিং, রক্তচাপ, রক্ত ​​সম্পর্কিত রোগ, বৃদ্ধ বয়সে উচ্চ রক্তচাপ, এবং চোখের সম্পর্কিত সমস্যাগুলি ভোগ করতে পারেন। আপনি এই দিকে সতর্ক থাকতে হবে, এবং আপনার সুস্থ জীবনধারা উপভোগ করতে হবে।
 HEALTH_TEXT2 = আপনার খুব বেশি চিন্তা করার অভ্যাস আছে, বা আপনার সমস্ত সমস্যাগুলির মূল বিষয়গুলির বিষয়ে উদ্বিগ্ন হোন। এটি পেট সমস্যা, পাচক সমস্যা, গ্যাস সমস্যা, অন্ত্র সমস্যা, টিউমার প্রভৃতি রোগের কারণ হতে পারে। অতএব, আপনাকে উদ্বেগ থেকে দূরে থাকতে হবে। উপরন্তু, এটি আপনাকে উপদেশ দেওয়া হয়েছে যে আপনি মদ পান করবেন না বা কোনও মাদকদ্রব্য বা মাদক গ্রহণ করবেন না। তাছাড়া, আপনি ভালো মানের খাবার খাবেন ও বার বার জল পান করবেন। 
 HEALTH_TEXT3 = প্রভু বৃহস্পতির তাঁর ঐশ্বরিক অনুগ্রহের দ্বারা আপনাকে আশীর্বাদ করেন যার কারণে আপনি সাধারণত বেশি চিন্তা করেন না। যাইহোক, আপনি কখনও কখনও আপনার স্বাস্থ্য সম্পর্কে উদাসীন হতে পারেন যার ফলে আপনি নিউরাইটিস, শিয়াটিকা (পা বা পিঠের ব্যাথা), ত্বক রোগের সমস্যাগুলির মুখোমুখি হতে পারেন। অতএব, আপনাকে সতর্ক থাকতে হবে এবং আপনার স্বাস্থ্যের যত্ন নিতে হবে।
 HEALTH_TEXT4 = রাহুর প্রভাবের কারণে, আপনি সক্রিয়ভাবে আপনার মস্তিষ্ক ব্যবহার করেন, কিন্তু আপনার মনে রাখা উচিত যে অতিরিক্ত কিছুই সর্বদা খারাপ। আপনি কোন ধরনের আঘাত, মানসিক অস্থিরতা, রক্ত ​​সম্পর্কিত সমস্যা, মাথা এবং পিঠে ব্যথা, মূত্রনালীর সমস্যা এবং এই ধরনের সমস্যাগুলি থেকে ভুগতে পারেন। অতএব, একটি সুস্থ জীবনধারা বজায় রাখুন, এবং ধ্যান ও যোগব্যায়ামের সাহায্যে সর্বোত্তম জীবনযাপন করুন।
 HEALTH_TEXT5 = আপনার জীবনের বুধের প্রভাবগুলির কারণে, আপনার ধারালো তীব্র মন থাকবে এবং আপনি আপনার বয়সের চেয়ে ছোট দেখবেন। কিন্তু অন্যদিকে, আপনার জীবনে আপনার নিউরাইটিস (স্নায়ু প্রদাহ), মুখের আলসার, চোখ এবং হাত, অনিদ্রা, প্যারালাইসিস (প্যারালাইসিস), অথবা পোলিও ইত্যাদি সম্পর্কিত সমস্যা হতে পারে। অতএব, আপনি একটি সুশৃঙ্খল জীবনশৈলী গ্রহণ করা উচিত এবং আপনার স্বাস্থ্য  সম্পর্কে উদাসীন হলে চলবে না।  
 HEALTH_TEXT6 = শুক্র আপনার ৰূট নম্বরের স্বামী যা  সব বিলাসিতাগুলির জন্য তাত্পর্যপূর্ণ, তাই আপনি খাওয়া, পান করা, পোশাক পরা, এবং অন্যান্য বিশেষ সুযোগের পরিতোষ উপভোগ করবেন। প্রায়শই, এটি আপনাকে সমস্যার মধ্যে রাখতে পারেন। প্রধানত,  গলা সম্পর্কিত সমস্যা, নাক এবং জিহ্বা, বুক সম্পর্কিত রোগ, বা কার্ডিওভাসকুলার অসুস্থতা সঙ্গে সংযুক্ত রোগ আপনার হতে পারে। অতএব আপনাকে এই সকল বিষয় সম্পর্কে বিশেষভাবে সতর্ক থাকতে হবে, এবং কোনও স্বাস্থ্য সংক্রান্ত সমস্যাগুলি উপেক্ষা করবেন না।
 HEALTH_TEXT7 = সংখ্যা 7 এর অধীনে জন্মগ্রহণ করলে বোঝা যায় যে আপনি কিছু অসুস্থতার স্বীকার হতে পারেন, কারণ অন্যদের সাথে তুলনা করলে আপনার অনাক্রম্যতা ব্যবস্থা দুর্বল। ফলস্বরূপ, আপনি প্রায়শই অসুস্থ হয়ে পড়তে পারেন এবং আপনি হঠাৎ হতাশ হয়ে পড়তে পারেন, মাথা ব্যাথা হতে পারে এবং কার্ডিওভাসকুলার রোগ, মানসিক শক্তি, জিহ্বা এবং ফুসফুসের রোগে ভুগতে পারেন মাঝে মাঝে।
 HEALTH_TEXT8 = আপনি সাধারণভাবে একজন শৃঙ্খলাবদ্ধ ব্যক্তি এবং আপনি জীবনের সমস্ত ক্ষেত্রে নিজের জন্য পর্যাপ্ত গুরুত্ব দেন। ফলস্বরূপ, আপনি ভাল স্বাস্থ্য উপভোগ করতে পারবেন, তবে আপনার রুটিন এবং শৃঙ্খলা থেকে বিচ্ছিন্ন হয়ে যাওয়ার কারণে একটি গুরুতর অসুস্থতায় ভুগতে পারেন। এগুলি মূলত আপনার কিডনি, অন্ত্র, মাথাব্যাথা এবং রক্ত ​​সম্পর্কিত অসুস্থতার সাথে সম্পর্কিত রোগগুলি অন্তর্ভুক্ত করে।
 HEALTH_TEXT9 = আপনি সম্পূর্ণ সংখ্যা 9 অধীনে জন্মগ্রহণ করেন, এবং এটি আপনাকে স্বাভাবিকভাবেই অনলস করে তোলে। ফলস্বরূপ আপনি সাধারণত স্বাস্থ্যকর, কিন্তু অন্যদিকে আপনি সহজে রেগে যান অথবা প্রায়ই আপনার কাজগুলিকে দ্রুত  সম্পন্ন করার চেষ্টা করেন যা আপনার স্বাস্থ্যকে প্রভাবিত করে। বেশির ভাগ ক্ষেত্রে রক্তের সমস্যা, আঘাত, উচ্চ রক্তচাপ  ইত্যাদির মুখোমুখি হতে পারেন আপনি বা এমনকি আপনার অস্ত্রোপচার হওয়ার সম্ভাবনা রয়েছে । 
