 NAMANK_TEXT = কসমিক শক্তি একজন ব্যক্তির নামের সংখ্যা কে বিশ্লেষণ করে তার জীবনের ধারাকে ও জীবনের বিশেষ বিশেষ দিক গুলিকে নির্দেশ করে।  আপনার সম্পূর্ণ নাম এর সকল অক্ষৰ গুলি থেকে আপনার নামাঙ্ক বা নামের সংখ্যা পাওয়া যায়। এর মাধ্যমে কোনো এক ব্যক্তির নামের সঠিক তাৎপর্য জানা যায় এবং তার নামাঙ্ক সেই ব্যক্তির ব্যাপারে অনেক কিছু বলতে পারে। এই নম্বর এর সাহায্যে আপনার ভিতরে কি কি গুণাবলি রয়েছে তা জানা যায় এবং সারাজীবন ধরে আপনার দ্বারা কি কি কার্য সম্পন্ন হওয়া সম্ভব তা জানা যায়।  আপনার নাম আপনার জীবনের সঠিক কম্পনকে প্রকাশ করে যার মাধ্যমে আপনার অন্তর্নিহিত শক্তি গুলিকে সঠিক ভাব জানা যায় এবং যার মাধ্যমে আপনি কোন কোন ক্ষেত্রে ভালো কাজ করবেন তা বোঝা যায়। বিশেষ কিছু গুণাবলী আপনার নামের অক্ষরগুলির সংযোজনের মধ্যে লুকিয়ে আছে যা আপনার নামাঙ্ক সংখ্যা প্রকাশ করে। \n\nআপনার নামের বিশ্লেষণ @@userName$, অনুসারে আপনার নামাঙ্ক হলো @@namamkNumber$ । এবার আমরা আপনাকে আপনার নামের কিছু বিশেষ গুণাবলী সম্পর্কে জানাতে চাই  @@namamkNumber$। 
 MULANK_TEXT = @@userName$,সংখ্যাতত্ত্ব অনুসারে আপনার জীবনের সবথেকে গুরুত্বপূর্ণ নম্বর হলো মাসের সেই তারিখ টি যেদিন আপনার জন্ম হয়েছে। এই সংখ্যাটি আপনার ব্যক্তিত্ব, চরিত্র ও চরিত্রের স্বতন্ত্রতা সম্পর্কে গুরুত্বপূর্ণ তথ্য প্রকাশ করে।   এই সংখ্যাটি আপনার জীবনের মূল প্রভাবশালী দিক গুলিকে নির্দেশ করে। কিছু কিছু জিনিস যেমন আপনি উদ্ধত না শান্ত প্রকৃতির, একজন নেতা না শিষ্য, তা জানতে পারবেন এই নম্বর থেকে। এর মূল কারণ হলো প্রতিটি সংখ্যার নিজস্ব কিছু বৈশিষ্ট এবং কম্পাঙ্ক রয়েছে। আমরা ক্রমাগত বিশ্লেষণ ও নিরীক্ষণের পর সংখ্যাতত্বের গণনা অনুসারে আপনার জন্ম সংখ্যাটি চিহ্নিত করতে পেরেছি। আপনার মূলাঙ্ক বা রেডিকাল নম্বর হলো  @@radicalNumber$ ।
 DESTINY_TEXT1 = আপনার বিশেষ নেতৃত্ব দেয়ার দক্ষতা রয়েছে এবং আপনি খুবই উচ্চাকাঙ্ক্ষী ব্যক্তি। ফলস্বরূপ, আপনি মানুষের সাথে ভালভাবে মিশতে পারবেন ও তাদের সমর্থন অর্জন করেন এবং আপনার লক্ষ্যগুলি পূরণ করতে সক্ষম হন। আপনি সীমিত স্বভাব বা সংকীর্ণতা অপছন্দ করেন এবং এমন  বন্ধুদের  সাথে থাকতে চান,  যারা সবসময় আপনাকে  সাহায্য করার জন্য প্রস্তুত থাকে। অর্থনৈতিকভাবে, আপনি সমৃদ্ধ হবেন এবং আপনি বিলাসিতা এবং রাজকীয় জীবন ভোগ করবেন। আপনি রাজনীতির ক্ষেত্রে সাফল্য অর্জন করবেন এবং সরকারি খাত থেকে সুবিধা পাওয়ার সম্ভাবনাও রয়েছে। ভাগ্য নম্বর 1 এর অধীনে জন্মগ্রহণ করার দরুন আপনি মানুষের কাছ থেকে সম্মান পেতে চান এবং আপনি এটি পেতে সক্ষম হবেন। যাইহোক, আপনি অত্যধিক খরচ করা এড়িয়ে চলুন এবং জুয়া বা বাজি ধরা এড়ানো উচিত আপনার। আপনার স্বাধীনতা ব্যবহারে সতর্কতা অবলম্বন করুন, অত্যধিক ঝুঁকি নেবেন না এবং আপনার নৈতিকতা এবং নীতিবোধ অনুসরণ করুন।
