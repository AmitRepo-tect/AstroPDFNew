 MASTER_NUMBER_TEXT22 = আপনার মাস্টার নম্বর 22, যা সংখ্যাসূচক বিজ্ঞানের সবচেয়ে শক্তিশালী সংখ্যা বলে মনে করা হয়। আপনার স্বপ্ন এবং ইচ্ছা বাস্তবে রূপান্তর করার ক্ষমতা আপনার আছে। বড় ধারনা, উচ্চ চিন্তা, ভাল সিদ্ধান্ত নেওয়ার দক্ষতা এবং নেতৃত্বের গুণাবলীর পাশাপাশি আপনার মধ্যে অন্তর্দৃষ্টি এবং তা কার্যকার করার শক্তি রয়েছে। আপনি প্রায়ই নিজের প্রতি আরো মনোযোগ দিতে চাইবেন, তবে আপনি মনে রাখবেন যে আপনি একটি মহান উদ্দেশ্যে জন্মগ্রহণ করেছেন এবং সমাজের জন্য অনেক কিছু করার আছে আপনার। আপনার জীবনের প্রথম পর্যায়ে আপনাকে অনেক বাধা ভোগ করতে হয়েছিল, কিন্তু তারা আপনাকে একই সাথে শক্তিশালী করে তুলতে সাহায্য করেছে। অতএব, আপনি যে লক্ষ্যটি নিজের জন্য সেট করেন তা নিশ্চিত করা উচিত, আপনাকে ব্যক্তিগত উচ্চাকাঙ্ক্ষাগুলির উপরে উঠতে হবে এবং সমাজের উন্নতির জন্য কাজ করতে হবে। আপনি এই যুগে একটি শক্তিশালী সামাজিক বা অন্য গুরুত্বপূর্ণ বিষয়ে পরিবর্তন ঘটনার জন্য দায়ী হতে পারেন।
 KARMIC_NUMBER_TEXT = সংখ্যাসূচক তত্ত্ব আমাদের অতীতের জীবনের কর্মগুলিকে চিহ্নিত করে নির্দিষ্ট সংখ্যাকে চিহ্নিত করে। আমাদের পূর্ব জীবনের কর্মের জন্যই আমরা  নির্দিষ্ট সংখ্যার অধীনে জন্মগ্রহণ করি। সেই সকল মানুষের প্রধান উদ্দেশ্য তাদের কর্মফল এবং অতীত কাজের ঋণ পরিশোধ করা । এই কর্মিক সংখ্যা গুলি হলো 13, 14, 16, এবং 19।
 KARMIC_NUMBER_TEXT13 = এই নম্বর নিয়ে জন্মগ্রহণের জন্য আপনাকে জীবনে কোনো কিছু লাভ করার জন্য কঠোর পরিশ্রম করতে হবে। কর্ম সংখ্যা ১৩ হওয়ার জন্য আপনাকে জীবনে কোনো কিছু লাভ করার জন্য অনেক বাধা বিঘ্ন অতিক্রম করতে হবে।  এই কারণে আপনি কোনো কোনো সময় আপনি কিছুটা বিমর্ষ হয়ে পড়তে পারেন ও আপনার মনে হতে পারে যে আপনার প্রচেষ্টা বিফলে যাচ্ছে। এমন অবস্থায় আপনি মাঝপথে কাজ ছেড়ে চলে আস্তে পারেন ও আপনি সেই চ্যালেঞ্জের মুখোমুখি হতে পারবেন না।  আপনি এমন অবস্তাহয় কিছুটা কুরে এবং নিজের প্রতি অবিস্বাসী হতে পারেন। কিন্তু, আপনাকে মনে রাখতে হবে যে এটি সর্বদা বাইরে থেকে যেমন দেখায় তেমন হয়না। আপনার প্রচেষ্টার অপচয় হবে না, তবে আপনাকে কঠোর পরিশ্রম করতে হবে এবং কঠোর পরিশ্রম আপনার কর্মফলের ঋণ। আপনি যদি আপনার এই প্রচেষ্টায় সফল হন, তবে আপনি জীবনের বিভিন্ন ক্ষেত্রে মহান উচ্চতা স্পর্শ করতে সক্ষম হবেন।
 KARMIC_NUMBER_TEXT14 = এই সংখ্যার অধীন জন্মগ্রহণের কারণে, আপনি প্রায়ই আপনার জীবনে অপ্রত্যাশিত পরিবর্তনগুলি অনুভব করেন যা আপনার জীবনযাত্রার পরিবর্তনও করে। আপনি অ্যালকোহল, যৌন কার্যক্রম ইত্যাদি বিষয়ে আসক্ত হবেন এবং এটি আপনার জন্য সমস্যার একটি কারণ হয়ে ওঠে। এই সব থেকে বিরত থাকার জন্য আপনার নিজেকে একটি প্রতিশ্রুতি দেওয়া উচিত। যদিও আপনার জীবনটি একটি রোলার কোস্টার যাত্রা হবে, আপনি যদি দৃঢ় এবং কঠিন লক্ষ্যের দিকে তাকিয়ে এগিয়ে যান তবে আপনি এই সমস্যাগুলি থেকেমুক্ত হতে পারবেন এবং পছন্দসই সাফল্য অর্জন করবেন।
 KARMIC_NUMBER_TEXT16 =  এই সংখ্যার অধীনে জন্মগ্রহণ করার কারণে, আপনাকে প্রায়ই আপনার আহমবোধ ছেড়ে দিতে হবে এবং এই জীবনে আপনার এটি শিখতে হবে। একটি উপায়, এই প্রক্রিয়াটি আপনার জন্য পরিশোধন একটি অংশ। আপনার বার বার আপনার অহংকারের সাথে আপস করতে হবে, এবং এটি আপনাকে বিরক্ত করবে, কিন্তু এখন এই সংগ্রামের কারণে আপনাকে হতাশ হতে হবে না, ভবিষ্যতে সফল হবে। আপনি প্রতিটি সমস্যা সঠিক ভাবে বুঝতে পারবেন যা অন্যদের জন্য বৃহত্তর সমস্যা বলে বিবেচিত হয়, যদিও বহু ক্ষেত্রে আপনি  নিজেকে একাকী মনে করেন। আপনি যদি আপনার জীবনে বিশ্বাস, কৃতজ্ঞতা ও শান্তি স্থাপন করতে চান, তাহলে আপনি আধ্যাত্মিকতার দিকে ঝুঁকুন।
 KARMIC_NUMBER_TEXT19 = এই সংখ্যার অধীনে জন্মগ্রহণ করার কারণে, আপনাকে প্রধানত জীবনে দুটি জিনিস শিখতে হবে - ক্ষমতার সঠিক ব্যবহার এবং জীবনে স্বাধীনতা। জীবনে অনেক সময় আসবে   যেখানে ব্যক্তিগত জীবনে নির্দিষ্ট চলমান সমস্যাগুলির কারণে আপনাকে নির্দিষ্ট অবস্তাহন নিতে হবে। আপনি আপনার চারপাশের মানুষদের কথা শুনতে চান না, এবং তাদের পরামর্শ গ্রহণ করবেন না। কিন্তু আপনাকে তাদের মনোযোগ দিতে হবে, কারণ আপনাকে বুঝতে হবে যে জীবনের অগ্রগতিতে এগিয়ে যাওয়ার জন্য আপনার  নির্দিষ্ট মানুষের সহায়তার প্রয়োজন হবে। আপনার জীবনে এটাই শিক্ষণীয় হবে।  
 MULANK_DESC_TEXT1 = আপনার মূলাঙ্ক ১ হওয়ার কারণে আপনি খুবই উচ্চাকাঙ্খী প্রকৃতির হবেন এবং আপনি কোনো বাধা বা আপনার কাজে ওপরের কারো হস্তক্ষেপ মেনে নেবেন না।  এর পরিবর্তে আপনি অন্যকে নির্দেশ দিতে বা সঠিক রাস্তা দেখতে পছন্দ করবেন। আপনার ওপর সূর্যের নিজস্ব প্রভাব রয়েছে যা খুবই লাভ দায়ক হবে আপনার জন্য। আপনি নিজের কাজের প্রতি খুবই নিষ্ঠাবান হবেন এবং আপনি সর্বদা সততার সাথে নিজের কর্মকে প্রাধান্য দিয়ে এগিয়ে যেতে চান। প্রেম ও বন্ধুত্বের সম্পর্কে আপনি খুবই নিষ্ঠাবান এবং এবং আপনি এরূপ সম্পর্ককে দীর্ঘকাল ধরে এগিয়ে নিয়ে যেতে পছন্দ করেন। আপনি খুবই দয়ালু ব্যক্তি যে সকলের উপকার করতে পছন্দ করেন এবং আপনি যোগ্য সন্মান লাভের জন্য আসা করেন। সরকারি ক্ষেত্রে আপনার অবদান খুবই প্রশংসনীয় হবে।  আপনি খুবই ধৈর্যশীল এবং আপনার পড়াশোনা বা কাজে সম্পূর্ণ মনোযোগ আপনি দিতে পারেন। আপনি বিপরীত লিঙ্গের  মানুষের প্রতি আরো আকৃষ্ট হবেন এবং এই কারণে, তারা কখনও কখনও প্রতারণা করেত পারে আপনাকে। আপনি সামাজিক সেবা, রাজনীতি বা ধর্ম সংক্রান্ত কাজে বিশেষ অগ্রগতি করবেন।
 MULANK_DESC_TEXT2 = আপনি চাঁদের দ্বারা প্রধানত প্রভাবিত হয়, আপনি বেশ সংবেদনশীল এবং আপনি কারো সাথে মিলিত ভাবে কাজ করতে পছন্দ করেন।আপনি জীবনের প্রতিটি ক্ষেত্রে একজন সচছরকে খুঁজে পেতে চান। কখনও কখনও আপনি একসাথে অনেক কাজ শুরু করেন তবে মন পরিবর্তনের কারণে অনেক সময় তা মাঝখানে ছেড়ে চলে যান, যার ফলে আপনি ক্ষতি ভোগ করতে পারেন। আপনি শিল্প ভালবাসেন এবং কল্পনাপ্রসূত এবং লোকেদের ভালবাসেন। আপনি একজন ভালো প্রেমিক বা প্রেমিকা হতে পারেন এবং আপনি পরিবারের প্রতি নিবেদিত থাকবেন। আপনার জীবনে ধৈর্য্যর অভাব হতে পারে। আপনার সামাজিক অবস্থা ভাল এবং আপনি সমাজে জনপ্রিয়। আপনি শুধু মাত্র একজন ভালো বন্ধুই হতে পারেন তা নয়, আপনি সর্বদা নতুন বন্ধু লাভের আসা করেন।  আপনার জীবনে অনেক ভালো ও খারাপ সময় চলতে থাকবে, এবং এই কারণে আপনার অনেক পরিকল্পনা মাঝখানে আটকে আটকে যেতে পারে।  আপনার আত্মবিশ্বাসকে জোরদার করতে হবে।
 MULANK_DESC_TEXT3 = বৃহস্পতি গ্রহের দ্বারা প্রভাবিত হওয়ার কারণে এবং মূলাঙ্ক 3 হওয়ার কারণে, আপনি একজন কোমল হৃদয়ের ব্যক্তি এবং সত্যবাদী এবং শান্তি প্রিয় ব্যক্তি। আপনি উচ্চাকাঙ্ক্ষী এবং বেশিরভাগ সরকারি চাকরিতে ভাল কাজ করেন। যদিও আপনার মধ্যে একনায়কতন্ত্র বোধ দেখা দিতে পারে। আপনি শৃঙ্খলা প্রিয়, তাই আপনার অধস্তন মানুষের প্রতি কিছুটা কঠোর হতে পারেন। আপনার দূরদৃষ্টি ও বিশেষ জ্ঞান আছে এবং আপনি পড়ার এবং শিক্ষা দানের মতো সম্পর্কিত বিষয়ে সাফল্য অর্জনে সফল হবেন। আপনি মানসিকভাবে শক্তিশালী এবং আপনার যুক্তি এবং জ্ঞান শক্তি বেশ ভাল। দাতব্য এবং দান মূলক কাজের জন্য আপনার ভালবাসা খুবই বেশি, তবে আপনি মাঝে মাঝে একটি নির্দিষ্ট বিষয়কে অনুসরণ করতে গিয়ে কিছুটা আগ্রাসী পৃকৃতির হয়ে ওঠেন। তবুও, এটা সত্য যে আপনি স্ব-সম্মানিত ব্যক্তি।
 MULANK_DESC_TEXT4 = আপনি মূলত হর্ষাল বা রহুর দ্বারা প্রভাবিত। ফলস্বরূপ, আপনি অন্যের থেকে ভিন্ন এবং কিছু নতুন চিন্তা করতে পারেন। আপনার মতামত অন্য লোকেদের ভালো না লাগতে পারে তাই বেশীরভাগ লোকেরা আপনার বিরোধিতা করতে শুরু করে। আপনি অর্থ সংগ্রহের জন্য বিশেষ আগ্রহী নন পরিবর্তে আপনি একটি সুখী জীবন লাভ করতে চান এবং জীবনে আনন্দ উপভোগ করতে চান। আপনি সময় থেকে এগিয়ে চিন্তা করেন এবং খোলাখুলিভাবে আপনার বিরোধী প্রকাশ করেন দরকার মতো। যদিও আপনার একটি অনির্দেশ্য প্রকৃতি আছে যা সহজে কেউ সনাক্ত করতে পারবে না। একই ভাব কেউ জানেন না যে আপনি এরপর কি করতে চলেছেন এবং আপনার এই বৈশিষ্ট্যটি আপনাকে আরও বিশেষ করে তোলে। আপনি সকল অনুষ্ঠানের মধ্যমণি।  যদিও আপনার ভাল কাজ করার অভ্যাস রয়েছে, তবে আপনিও চান যে লোকেরা আপনার এই দিকটির প্রশংসা করুক। আপনি খুবই সংবেদনশীল এবং আপনি জীবনে কিছুটা একা।  আপনার বন্ধুদের সংখ্যা কম হতে পারে কিন্তু তারা সব খুব সৎ এবং অনুগত।
 MULANK_DESC_TEXT5 = আপনার মূলাঙ্ক সংখ্যা 5 এবং বুধের প্রভাবের অধীনে জন্মগ্রহণ করার ফলে, আপনি অনেক বন্ধু থাকা একজন ব্যক্তি। বন্ধুত্বের জন্য আপনার আবেগ আছে, আপনার বন্ধুর বৃত্তে অনেক লোক আছে। একটি ভাল ব্যবসা কর্তার বা ভালো ব্যবসায়ী হওয়ার মতো সব গুণাবলী আপনার মধ্যে উপস্থিত। আপনি প্রায়শই লাভের দিকে আকৃষ্ট হন এবং অতএব তাড়াতাড়ি করে অনেকগুলি কাজ করেন, এরূপ করার ফলে আপনার তার জন্য কষ্ট ভোগ করতে হয় পরবর্তী কালে। আপনি আপনার মধ্যে একটি আশ্চর্যজনক ক্ষিপ্রতা আছে। তাই কোনো কাজে আপনি দীর্ঘ সময়ের জন্য আটকে থাকবেন না এবং একই কারণে তাই দীর্ঘ সময়ের জন্য বিরক্ত থাকবেন না। আপনি চাকুরীর পরিবর্তে ব্যবসা করতে বেশি পছন্দ করেন। রাগ ও মেজাজ আপনার মধ্যে বেশি থাকার একটি ভাল সম্ভাবনা আছে। আপনি নিকোনো বিষয়ে ভালো যুক্তি খাড়া করতে পারেন ও আপনার কথা বলার দক্ষতা বেশি। আপনি কিছুটা চঞ্চল হৃদয়ের ও আপনি মনের কথা খুলে বলার কারণে অনেক কাজ আপনি সহজে করে উঠতে পারেন। উপরন্তু, আপনি মানসিক কাজ পছন্দ করেন, শারীরিক পরিশ্রমের চেয়ে।  আপনার অসুবিধা বা কোন সমস্যা থেকে দ্রুত বেরিয়ে আসতে পারেন, এটি আপনার অন্যতম গুন্। তবে, আপনার মানসিক শক্তি অপব্যবহার এড়াতে হবে।
 MULANK_DESC_TEXT6 = শুক্রের প্রভাবের কারণে, আপনি সৌন্দর্যর প্রতি খুবই আকৃষ্ট হবেন। শুধু এই নয়, আপনার কোন ধরনের শিল্প, বিনোদন, সাহিত্য, পোশাক এবং সঙ্গীত ইত্যাদির প্রতি আকৃষ্ট হবেন। আপনি সকল কাজ কে খুবই সুন্দর ভাবে সম্পন্ন কোর্টে সক্ষম কারণ আপনার কাজে সর্বদা একটি বাহ্যিক সৌন্দর্য বজায় থাকে। আপনার ব্যক্তিত্ব চৌম্বকীয়, যা মানুষের মনোযোগ আকর্ষণ করে। আপনার মনে রাগ বা ঈর্ষা জনিত বিষয় গুলি বেশি থাকার কারণে আপনি জীবনে কিছু কষ্ট পেতে পারেন। আপনিবিরোধ সহ্য করতে পারবেন না। আপনি কাউকে শীঘ্রই আপনার বন্ধু করে তুলতে চান। বাড়িতে আসা অতিথিদের খুবই উন্নত মানের সেবা ও যত্ন প্রদান করেন আপনি। আপনি কখনও কখনও আত্মগ্লানি তে ভোগেন এবং মানসিক চাপের সম্মুখীন হতে পারেন। বিপরীত লিঙ্গের মানুষের প্রতি আপনার আকৃষ্ট হওয়ার প্রবণতা বেশি। আপনার সবচেয়ে বড় শক্তি হলো আপনি খুব দ্রুত কাউকে নিজের করে নিতে পারেন।
 MULANK_DESC_TEXT7 = মূলাঙ্ক  7 এর অধীনে জন্মগ্রহণ হয়েছে আপনার এবং  আপনার উপর কেতু বা নেপচুনের প্রধান প্রভাব রয়েছে। স্বতঃস্ফূর্তভাবে ধর্মীয়তা আপনার মধ্যে বিদ্যমান। আপনি কবিতা এবং পেইন্টিং খুব পছন্দ করেন। কোনও ঘটনাতে আপনি ধর্মীয় দিকটি আগে দেখতে পান। আপনার কোনো ঘটনাকে সহজে বুঝতে পারা  আপনার সবচেয়ে বড় শক্তি এবং আপনি অন্যদের মন বুঝতে বিশেষ অসুবিধা হয় না। আপনার বিরোধীরা আপনাকে সহজে বুঝতে পারবে না।  আপনার প্রায় হাঁটা এবং অনেক ভ্রমণ করার সুযোগ হবে। আপনার জীবনে শারীরিক বস্তুর অভাব থাকতে পারে। আপনি শুধুমাত্র আপনার মৌলিক ধারণার ভিত্তিতে অর্থ উপার্জন করতে পারবেন এবং দান কর্মও করতে পারবেন। আপনি ভবিষ্যতের ব্যাপারে চিন্তিত, তাই আপনি ভাল কাজ করতে উপভোগ করেন। কল্পনা করার প্রবণতা আপনার মধ্যে ভাল এবং লোকেদের নিজের প্রতি আকৃষ্ট করার বিশেষ ক্ষমতা রয়েছে আপনার। আপনি ভাল মানের এবং আপনি সফল ব্যবসায়ী হতে পারেন। অন্যদের প্রভাবিত করার দক্ষতা আপনার  সবচেয়ে বড় বৈশিষ্ট্য।
 MULANK_DESC_TEXT8 = আপনি পরিশ্রমী প্রকৃতির এবং আপনার শক্তির গোপন এই মালিকের হলো শনি যা মূলাঙ্ক ৮ এর স্বামী। আপনি কোন সংস্থায় সবচেয়ে গুরুত্বপূর্ণ পদ পেতে পারেন তবে আপনার কঠোর পরিশ্রমের অনেক সময়ই অবমূল্যায়ন হবে।  আপনি একাকীত্ব এবং বিষণ্নতা ভোগ করতে পারেন। আপনি জীবনে ধীরে ধীরে অগ্রগতি করবেন কিন্তু আপনার অগ্রগতি নিশ্চিত। আপনি বাইরে লোক জনকে বেশি দেখিয়ে কাজ করতে অপছন্দ করেন তাই অনেক সময় লোকেরা আপনাকে নিচু দেখতে পারে। আপনি আপনার কাজ শেষ করার প্রতি মনোনিবেশ করুন এবং আপনি এটি পূরণ করতে সর্ব শক্তি প্রয়োগ করুন। আপনি খুব উচ্চাভিলাষী এবং কোন উচ্চাকাঙ্ক্ষা অর্জন করার জন্য কঠিন পরিশ্রম করেন। আপনি খুব দয়ালু এবং উত্সাহী প্রকৃতির। আপনি ভাগ্যফলে বিশ্বাসী এবং আপনার মধ্যে ধর্মীয় প্রবণতা আছে। আপনি প্রায়ই উচ্চ অবস্থান পৌঁছনোর জন্য প্রস্তুত এবং যেকোনো  আত্মাহুতি দিতে সর্বদা প্রস্তুত। আপনি এমন কাজ করতে পছন্দ করেন যাতে আপনার কোনো স্বার্থ জড়িত নেই কিন্তু অন্যের জন্য তা উপকারী হবে।
 MULANK_DESC_TEXT9 = আপনি এই মূলাঙ্কের অধীনে জন্ম গ্রহণ করেছেন ও আপনার নিয়ন্ত্রক গ্রহটি হলো মঙ্গল। আপনি জনগণকে  শাসন বা নেতৃত্বের দক্ষতা অর্জন করতে পারেন।  কিন্তু কখনও কখনও আপনি রাগান্বিত হন, যার ফলে আপনার সামনে অনেক ধরণের সমস্যা উপস্থিত হয়।   আপনি খুবই চটপটে প্রকৃতির এবং আপনার জীবন দ্বন্দ্ব চলতে থাকে এবং আপনার শত্রু আরও বেশি হয়। যাইহোক, আপনি আপনার সাহস ও শক্তি দিয়ে এসবের মুখোমুখি হন।  আপনি স্বাধীন হতে পছন্দ করেন এবং আপনি অন্যের দ্বারা প্রভাবিত হবেন না। আপনাকে  নির্বোধ মানুষের থেকে সতর্ক হতে হবে। প্রেম এবং সহানুভূতি পেতে আপনি অনেক কিছু করতে পারেন। আপনি আপনার সমালোচনা সহ্য করেন না, তাই আপনাকে নিজেকে নিয়ন্ত্রণ করার চেষ্টা করা উচিত কারণ আপনি চরম আবেগে যে কোনও পর্যায়ে যেতে পারেন। আপনি যদি আপনার রাগ নিয়ন্ত্রণ করতে সক্ষম হন, তবে আপনি জীবনে খুব সৌভাগ্যবান হবেন এবং সফল হবেন।
 NAMANK_DESC_TEXT1 = <p>যদি আপনার জন্ম সংখ্যা 1 হয় তবে সংখ্যাবিজ্ঞান অনুসারে আপনি অনলস, সক্রিয়, অহংকারী এবং শিল্পের প্রতি অনুরাগী হবেন। একটি জন্ম সংখ্যা 1 ব্যক্তি হিসাবে, আপনি সাধারণত অপরকে অনুসরণ করতে পছন্দ করেন না কিন্তু তার পরিবর্তে আপনি অপরকে নেতৃত্ব দিতে পছন্দ করেন। আপনার স্বজ্ঞাত ক্ষমতা সবসময় কাজে লাগবে। আপনি সৎ প্রকৃতির এবং  আপনি নিজের ভুল স্বীকার করে নেন সবসময়। প্রাকৃতিক আধ্যাত্মিকতার মধ্যে আপনি সবসময় খুশি থাকেন এবং আপনার জীবন পরিকল্পনা সম্পর্কে আশাবাদী। </p> <p> <b> পেশা: </b> আপনি শারীরিক কাজের তুলনায় মনস্তাত্ত্বিক কাজের প্রতি আগ্রহী। আপনি ভ্রমণ এবং পর্যবেক্ষণ করতে পছন্দ করেন। জন্ম সংখ্যা 1 এমন ব্যক্তি ভাল লেখক হয়ে পারে এবং একজন ভাল সাংবাদিক হতে পারেন এবং এটি একটি সক্রিয় এবং সৃষ্টিশীল মন লাভ করেন তারা। </p> 
 NAMANK_DESC_TEXT2 = <p>এই সংখ্যাটি উচ্চ কল্পনা, আদর্শবাদ এবং একটি কল্পনাপ্রসূত মনকে নির্দেশ করে, এরা নিজের কল্পনা করা একটি জগতে বসবাস করে। এরা অন্যদের দ্বারা সংগঠিত পরিকল্পনা এবং প্রকল্প নির্বাহক। এরা নিঃস্বার্থ এবং অন্যের মঙ্গলের প্রতি সর্বদা চিন্তাশীল থাকেন, অন্যের জন্য উপকার করা ওদের জীবনের অন্যতম লক্ষ্য। </p> <p> <b> পেশা: </b> জন্ম সংখ্যা 2 এর ব্যক্তিরা ভাল পার্টনার এবং সহযোগী, তারা অংশীদারি ব্যবসা ভাল করতে পারবে। আপনি খুব অস্থির এবং পরিবর্তন পছন্দ করেন, তাই সর্বদা ভ্রমণ করতে চান, এবং এর কারণে আপনি প্রচুর ভ্রমণের সাথে জড়িত কাজগুলিতে চমৎকার ভাবে করতে পারবেন। আপনার চিন্তাশীল মনের জন্য আপনি সৃজনশীল ক্ষেত্রগুলিতে ভাল ভাবে কাজ করতে পারবেন। </p>
 NAMANK_DESC_TEXT3 = <p>জন্ম সংখ্যা 3 এর ব্যক্তিরা নৈতিকতা, ঐশ্বরিক প্রেম এবং অপরকে মাফ করে দেওয়ার প্রবৃত্তি নিয়ে জন্মায় এবং অপরকে জীবনে এগিয়ে যেতে সাহায্য করে।আপনার এই সংখ্যার গুণাবলীর কারণে আপনার জীবনে বিভিন্ন ভালো জিনিস সংঘটিত হবে এবং আপনি আপনার প্রচেষ্টার পরিপ্রেক্ষিতে সুফল পাবেন। আপনার ভাগ্য সর্বদা আপনার পশে আছে। আপনি অত্যন্ত পরিশ্রমী প্রকৃতির এবং এর ফলে আপনি সকল কাজে নিজের সর্বোচ শ্রম অর্পণ করবেন। আপনি জন্ম থেকেই একজন নেতার চরিত্র লাভ করবেন এবং আপনি সবথেকে ভালো কাজ করার চেষ্টা করবেন। </p> <p> <b> ক্যারিয়ার: </b> আপনি বিশেষ বুদ্ধির সাহায্যে কার্যকর সিদ্ধান্ত গ্রহণে সক্ষম হবেন একজন বসমানের শিক্ষক ও দার্শনিক প্রকৃতির হবেন। </p>
 NAMANK_DESC_TEXT4 = <p>জন্ম সংখ্যা 4 এর মানুষ শক্তি, স্ফূর্তি ও অগ্রগতি প্রদর্শন করে। তারা মানুষের উচ্চতর অনুষদের সঙ্গে মানুষ। এই সংখ্যাটির অদ্ভুত প্রকৃতি হল যে এটি ক্রমাগত জীবন এবং সমাজের পরিবর্তনগুলি লক্ষ্য করে এবং পরিবেশ ও সমাজের দাসত্ব থেকে মনকে মুক্তি দিতে পরে। আপনি আপনার বয়সের তুলনায় অধিক পরিপক্ক হবেন মানুষিক দিক থেকে। ৪ সংখ্যার মানুষেরা অস্বাভাবিক এবং কিছুটা ভিণ্ণ স্বাদের জিনিসের প্রতি আকৃষ্ট হয় এবং কখনও কখনও নিয়মগুলির বিরুদ্ধে যাওয়ার প্রয়োজনীয়তা অনুভব করে। </p> <p> <b> ক্যারিয়ার: </b> জন্ম সংখ্যা ৪ হলে আপনি চমৎকার লেখক, ব্যবসায়ী এবং রাজনীতিবিদহতে পারেন। </p>
 NAMANK_DESC_TEXT5 = <p>আপনি জীবনের আকস্মিক রহস্যের প্রতি গভীরভাবে আগ্রহী। আপনি খুবই অস্থির এবং সর্বদা একটি নতুন গন্তব্যে যেতে চাইবেন এবং একটি নতুন লক্ষ্যর দিকে এগিয়ে যাওয়ার জন্য প্রানপন চেষ্টা করবেন। একজন ব্যক্তির হিসাবে আপনার একটি ভাল এবং মন্দ উভয় দিক রয়েছে। আপনি বাচ্চাদের সঙ্গে সময় কাটাতে পছন্দ করেন এবং পরিবারের উদ্বেগগুলি অগ্রাধিকারে রাখেন। আপনার আধ্যাত্মিকতার প্রতি ঝোক রয়েছে এবং এছাড়াও আপনি একজন ধর্মীয় ব্যক্তি। </p> <p> <b> পেশা: </b> আপনি খেলাধুলা উপভোগ করেন এবং তাই এটি ক্যারিয়ার হিসাবে গ্রহণ করতে পারেন। আপনার বুদ্ধিবৃত্তিক মন আপনাকে শিক্ষাবিদ এবং গবেষক হিসাবে প্রতিষ্ঠিত করতে পারে। </p>
 NAMANK_DESC_TEXT6 = <p>আপনি একজন শিল্পী এবং সৌন্দর্য এবং শিল্প আপনাকে বিষেশ ভাব আকর্ষিত করে। সৌন্দর্য শুধু শব্দগত অর্থে না কিন্তু আপনি সম্পর্কের মধ্যে সৌন্দর্য কেও খুঁজে পেতে চান। আপনি দ্বন্দ্ব বা মতানৈক্য এড়িয়ে চলতে চান, কারণ এটি আপনাকে অস্বস্তির মধ্যে ফেলবে, এই কারণে বিরোধ এরিয়েবে চলার চেষ্টা করুন। আপনার প্রেমময় প্রকৃতি আপনাকে একজপন আকর্ষণীয় ও সুন্দর ব্যক্তি হিসাবে প্রতিষ্ঠিত করবে। আপনি অন্যদের দয়া করতে ইচ্ছুক। আপনাকে সকলেই পছন্দ করবে এবং আপনি খুবই আশাবাদী প্রকৃতির হবেন। </p> <p> <b> ক্যারিয়ার: </b> আপনি সঙ্গীত, নাচ, কবিতা এবং সৃজনশীলতার প্রতি বিশেষ ভাবে আগ্রহী হবেন। </p>
 NAMANK_DESC_TEXT7 = <p>আপনি আপনার ব্যক্তিত্বের মৌলিকত্ব এবং স্বাধীনতার জন্য পরিচিত হবেন। আপনি সকল বন্ধন থেকে মুক্ত থাকতে চান এবং কোনো বন্ধন ছাড়াই সকল বিষয়ের থেকে নিজেকে মুক্ত রাখতে চান এবং প্রতিষ্ঠিত নিয়ম এবং সমাজের সীমাবদ্ধতা ভাঙ্গতে চান। মানুষ আপনাকে একজন রহস্যময় মানুষ হিসেবে ভাববে এবং আপনার অনুপস্থিত মনকে সহজে কেউ বুঝতে পারবে না। সংখ্যা 7 সাধারণত সকল বিষয়ে পরিপূর্ণ এবং বিশ্লেষণাত্মক এবং পরিস্থিতি এবং সমস্যাগুলির কারণ এবং প্রভাব নির্ধারণ করতে পারে। জীবনে, আপনি যা মনে করেন আপনার জন্য ঠিক হবে তা অর্জনের জন্য আপনি অনেক ব্যক্তিগত বলিদান করেন। </p> <p> <b>ক্যারিয়ার : </b> আপনি অত্যন্ত সাহসী এবং নির্ভীক প্রকৃতির, যার ফলে, আপনি বাড়ি থেকে দূরে  থাকতে পারেন এবং নতুন ও  উত্তেজনামূলক কিছু চেষ্টা করবেন। উপরন্তু, আপনি আপনার স্বজ্ঞাত প্রকৃতির কারণে বার বার স্মৃতিরোমন্থন করতে পারেন। অতএব,  আপনার সাহসিকতার তৃষ্ণা মিটবে এমন কোনো পেশা আপনার জন্য যোগ্য হবে।</p>
 NAMANK_DESC_TEXT8 = <p>জন্ম সংখ্যা 8 এর ব্যক্তি গুরুগম্ভীর এবং দার্শনিক প্রকৃতির। সংখ্যা 8 দৃঢ়সংকল্প, অধ্যবসায় এবং পরিশ্রমের  প্রতীক। যদিও বাইরে শক্ত, ভিতরে আপনি একজন ভালো এবং যত্নশীল ব্যক্তি। ভবিষ্যতের বিষয়ে আপনি খুব সতর্ক এবং সবসময় সতর্কতার সঙ্গে সিদ্ধান্ত নিতে পছন্দ করেন। আপনি আপনার লক্ষ্যতে পৌঁছানোর জন্য যথেষ্ট চাপ সহ্য করতে সক্ষম হবেন। </p> <p> <b> পেশা: </b> আপনি উচ্চাকাঙ্ক্ষী এবং জনসমক্ষে সফল বলে পরিচিত।   আপনি অন্যদের অনুপ্রাণিত করবেন।  ফলস্বরূপ আপনি মএকজন দক্ষ ম্যানেজার, অ্যাডমিনিস্ট্রেটর এবং ব্যবসায়ী হতে পারেন। সরকারি চাকরি অন্য দুর্দান্ত বিকল্প আপনার জন্য। </p>
 NAMANK_DESC_TEXT9 = <p>আপনি দৃঢ় ইচ্ছাশক্তি এবং সাহসী ব্যক্তি রূপে বিবেচিত হবেন। আপনি কিছুটা রাগী ও মেজাজি হলেও বিরোধিতা এবং সংঘর্ষকে আপনি পরাস্ত করতে পারেন। অন্যরা যদি আপনার বিরুদ্ধে দাঁড়ায় তবেও আপনি নিজেকে ভালোবাসেন এবং সম্মান করেন। আপনি আপনার নিজের নিয়তি নিয়তি নিজে লিখতে চান এবং আপনি সহজেই একজন মহান নেতা হতে পারেন। আপনি একজ খুবই মানবিক ব্যক্তি এবং আপনার সাথে আপনার বন্ধুদের নিয়ে চলিতে বিশ্বাস করেন আপনি। আপনি সবসময় অন্যদের সাহায্য করতে চান। আপনার পরিবার এবং বাড়ির সাথে ভালো সম্পর্ক বজায় রাখবেন এবং তাদের সাথে সময় কাটানো উপভোগ করবেন। </p> <p> <b> পেশা: </b> সামরিক, রাজনীতি, শিক্ষণ এবং সামাজিক কাজ এই সব ক্ষেত্রে আপনি ভালো কাজ করবেন। </p>
