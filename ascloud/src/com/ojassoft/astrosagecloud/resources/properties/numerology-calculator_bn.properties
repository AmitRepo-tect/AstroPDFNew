 CAREER_TEXT2 = রেডিকাল সংখ্যা 2 এর অধীন জন্মগ্রহণকারী ব্যক্তিরা তাদের উপর চাঁদের আশীর্বাদ ও ঐশ্বরিক অনুগ্রহ পেয়ে থাকে এবং যেহেতু চাঁদ  জল ও অন্যান্য তরল জিনিসকে নির্দেশ করে সুতরাং এর সাথে সংযুক্ত ক্ষেত্র থেকে আপনার কর্মজীবন বেছেনিলে আপনি বিশেষ ভাবে উপকৃত হবেন।  বিশেষত, তরল এবং রসাসূচক উপকরণ, ভ্রমণ সম্পর্কিত কাজ, কোনও ক্ষেত্রে দালালি করা, হোটেলের ব্যবসায়, সাংবাদিকতা, গান, নাচ, কবিতা লেখা, প্লটের কাজ, বরফ সম্পর্কিত কাজ এবং রৌপ্য বা চাল সম্পর্কিত ব্যবসা আপনার জন্য উপকারী হবে। 
