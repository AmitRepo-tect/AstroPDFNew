 FAST_TEXT1 = আপনি রোববার উপবাস করা উচিত এবং শুক্লা পক্ষের  একটি রবিবার আপনার বেঁচে নেওয়া উচিত। আদিত্য হৃদয় স্তুতি রোজ রোজ জপ করুন এবং উপবাস করার সময় দিনে একবার খাবার গ্রহণ করুন। আপনি সূর্য বীজ মন্ত্র পাঠ করতে পারেন। যদি সম্ভব হয়, এই দিনে লবণ খাওয়া থেকে বিরত থাকার চেষ্টা করুন, লাল রঙের জামাকাপড় পরুন, এবং তামার পাত্রে জল রাখার পর তা সূর্যকে অর্পণ করুন করুন। 
