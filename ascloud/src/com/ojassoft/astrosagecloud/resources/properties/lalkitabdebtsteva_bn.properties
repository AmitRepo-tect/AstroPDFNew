

	 LK_Rin_TEXT					= আপনার লাল কিতাব কুষ্ঠির উপর ভিত্তি করে ঋণ (ঋণ)
	 RINS							= পিতৃ ঋণ#স্বয়ং ঋণ#মাতৃ ঋণ#পত্নী ঋণ#ভাই বা আত্মীয় ঋণ#কন্যা ঋণ#উৎপীড়ক ঋণ#অজাত ঋণ#প্রকৃতি ঋণ	
	 LK_FOREFATHER_DEBTS_SYMPTOM    = লাল কিতাবের মতে, কুষ্ঠীতে যখন শুক্র,বুধ,রাহু দ্বিতীয়,পঞ্চম,নবম বা দ্বাদশ ঘরে অবস্থিত তখন জাতক পিতৃ ঋণের দ্বারা ক্ষতিগ্রস্ত হতে পারেন।
	 LK_FOREFATHER_DEBTS_REASON     = প্রবীণরা পরিবারের পুরোহিত পরিবর্তিত করে থাকবেন।
	 LK_FOREFATHER_DEBTS_INDICATION = ঘরের পাশে কোন মন্দির বা কোন অশ্বথ গাছ ধ্বংস হয়ে থাকবে।
	 LK_FOREFATHER_DEBTS_REMEDY     = ১. সব রক্তের সম্পর্কের আত্মীয়দের থেকে রুপি মুদ্রা সংগ্রহ করুন এবং একটি দিনে একটি মন্দিরে সংগৃহীত মুদ্রা দান করুন।<br/>২. যদি আপনার বাড়িতে একটি অশ্বথ গাছ আছে তো জল দিন এবং এটি সেবা করুন।
	 FATHER_DEBTS_FALSE             = আপনার কুষ্ঠি পিতৃ ঋণ থেকে মুক্ত।
	 FATHER_DEBTS_TRUE              = আপনার কুষ্ঠি পিতৃ ঋণ দ্বারা প্রভাবিত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার এবং আপনার রক্তের সম্পর্কের আত্মীয়ের উপর প্রযোজ্য হয় এছাড়া তাদের কুষ্ঠিতে একই সমন্বয় থাকে, আপনি উপরে দেওয়া প্রতিকারগুলি সম্পাদন করা উচিত।
	 LK_SELF_DEBTS_SYMPTOM          = লাল কিতাবের মতে, যখন শুক্র, শনি, রাহু, কেতু একটি কুষ্ঠির পঞ্চম ঘরে অবস্থান করে তখন জাতক স্ব-ঋণের দ্বারা পীড়িত হতে পারে।
	 LK_SELF_DEBTS_REASON           = আপনার পূর্বপুরুষরা ঐতিহ্যগত পারিবারিক রীতিনীতি মেনে চলেন নি এবং পরমাত্মার ওপর বিশ্বাস করেননি।
	 LK_SELF_DEBTS_INDICATION       = বাড়ির নিচে অগ্নি স্থান থাকতে পারে বা বাড়ির ছাদের সূর্যের প্রবেশের জন্য একাধিক গর্ত থাকবে।
	 LK_SELF_DEBTS_REMEDY           = ১. পরিবারের সব সদস্যদের (রক্তের সম্পর্কের আত্মীয়) থেকে সমান টাকার চাঁদা নিয়ে যজ্ঞ সঞ্চালন করুন।
	 SELF_DEBTS_FALSE               = আপনার কুষ্ঠি স্ব-ঋণ থেকে মুক্ত।
	 SELF_DEBTS_TRUE                = আপনার কুষ্ঠি স্ব-ঋণ দ্বারা ক্ষতিগ্রস্ত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার উপর প্রযোজ্য হয় এবং আপনার রক্তের সম্পর্কের আত্মীয়ের কুষ্ঠিতে একই সমন্বয় থাকে, তবে উপরে দেওয়া প্রতিকারগুলি আপনার সম্পাদন করা উচিত।
	 LK_MOTHER_DEBTS_SYMPTOM		= লাল কিতাবের মতে, যখন কেতু একটি কুষ্ঠির চতুর্থ ঘরে অবস্থান করে তখন জাতক মাতৃ-ঋণের দ্বারা নিপীড়িত হতে পারে।
	 LK_MOTHER_DEBTS_REASON			= এই ঋণের পেছনে কারন হতে পারে যে আপনার পূর্বপুরুষরা কোন মাকে অবহেলিত বা নির্যাতিত করছেন বা কোন মায়ের শিশুর জন্মের পর শিশুকে মায়ের থেকে দূরে রেখেছেন, বা মায়ের বিষণ্ণতা উপেক্ষা করেছেন।
	 LK_MOTHER_DEBTS_INDICATION		= পাশের কুয়া বা নদীর পুজা না করে নোংরা এবং আবর্জনা ফেলার জন্য বেশি ব্যবহার করা হয়ে থাকে।
	 LK_MOTHER_DEBTS_REMEDY			= সব রক্ত আত্মীয়দের থেকে সমান রূপা নিন এবং একটি দিনে একটি নদীতে তা প্রবাহিত করুন।
	 MOTHER_DEBTS_FALSE				= আপনার কুষ্ঠি মাতৃ ঋণ থেকে মুক্ত।
	 MOTHER_DEBTS_TRUE				= আপনার কুষ্ঠি মাতৃ ঋণ দ্বারা প্রভাবিত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার উপর প্রযোজ্য হয় এবং আপনার রক্তের সম্পর্কের আত্মীয়ের কুষ্ঠিতে একই সমন্বয় থাকে, তবে উপরে দেওয়া প্রতিকারগুলি আপনার সম্পাদন করা উচিত।
	 LK_WOMAN_DEBTS_SYMPTOM			= লাল কিতাবের মতে যখন সূর্য, চাঁদ, রাহু আপনার জন্মপত্রিকার দ্বিতীয় বা সপ্তম ঘরে অবস্থিত হয় তখন জাতক পত্নী ঋণ দ্বারা পীড়িত হতে পারেন।
	 LK_WOMAN_DEBTS_REASON			= এর কারণ আপনার পূর্বপুরুষ বা গুরুজনরা কিছু লোভের জন্য গর্ভবতী মহিলাকে হত্যা করছেন হতে পারে।
	 LK_WOMAN_DEBTS_INDICATION		= পরিবারে দাঁত যুক্ত প্রাণী বিশেষ করে গরু বা এমন কোন প্রাণী যে সমুহে থাকে না থাকবে।
	 LK_WOMAN_DEBTS_REMEDY			= ১. সব রক্ত আত্মীয়দের থেকে সমান টাকা নিয়ে এবং সেই অর্থ ব্যবহার করে ১০০টি গরুকে একটি দিনে সুস্বাদু চারা খাওয়ান।
	 WOMAN_DEBTS_FALSE				= আপনার কুষ্ঠি পত্নী ঋণ থেকে মুক্ত।
	 WOMAN_DEBTS_TRUE				= আপনার কুষ্ঠি পত্নী ঋণ দ্বারা প্রভাবিত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার উপর প্রযোজ্য হয় এবং আপনার রক্তের সম্পর্কের আত্মীয়ের কুষ্ঠিতে একই সমন্বয় থাকে, তবে উপরে দেওয়া প্রতিকারগুলি আপনার সম্পাদন করা উচিত।
	 LK_RELATIVES_DEBTS_SYMPTOM		= লাল কিতাবের মতে, যখন বুধ, কেতু কুষ্ঠির প্রথম বা অষ্টম ঘরে অবস্থিত তখন জাতক আত্মীয় ঋণ দ্বারা পীড়িত হতে পারেন।
	 LK_RELATIVES_DEBTS_REASON		= এর কারণ এটা হতে পারে যে আপনার পূর্বপুরুষরা কারো পাকা ফসলে বা বাড়িতে আগুন লাগিয়েছেন, কাউকে বিষ দিয়েছেন, গর্ভাবস্থার কোন মহিষের প্রাণনাশ করেছেন।
	 LK_RELATIVES_DEBTS_INDICATION	= বাচ্চাদের জন্মদিন, উৎসব এবং অন্যান্য শুভ মুহুর্তের দিনে পরিবার থেকে দূরে থাকা অথবা আত্মীয়দের সাথে সাক্ষাত না হওয়া এই দোষের সঙ্কেত হতে পারে।
	 LK_RELATIVES_DEBTS_REMEDY		= ১. সমান পরিমাণ টাকা সব রক্ত আত্মীয়দের থেকে সংগ্রহ করুন এবং অন্যদের সাহায্য করার জন্য একটি হাকিম বা ডাক্তারকে টাকাটি দিন।<BR/>২. সব রক্ত আত্মীয়দের কাছ থেকে টাকা সমান পরিমাণ সংগ্রহ করুন এবং এই টাকা দিয়ে ওষুধ কিনে কিছু দাতব্য প্রতিষ্ঠানে দান করুন।
	 RELATIVES_DEBTS_FALSE			= আপনার কুষ্ঠি আত্মীয় ঋণ থেকে মুক্ত।
	 RELATIVES_DEBTS_TRUE			= আপনার কুষ্ঠি আত্মীয় ঋণ দ্বারা প্রভাবিত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার উপর প্রযোজ্য হয় এবং আপনার রক্তের সম্পর্কের আত্মীয়ের কুষ্ঠিতে একই সমন্বয় থাকে, তবে উপরে দেওয়া প্রতিকারগুলি আপনার সম্পাদন করা উচিত।
	 LK_DAUGHTER_DEBTS_SYMPTOM		= লাল কিতাবের মতে, যখন চন্দ্র একটি কুষ্ঠির তৃতীয় বা ষষ্ঠ ঘরে অবস্থিত তখন জাতক কন্যা ঋণ দ্বারা নিপীড়িত হতে পারেন।
	 LK_DAUGHTER_DEBTS_REASON		= এর কারণ পূর্বপুরুষ বা গুরুজনদের দ্বারা কোন মেয়ে বা কারো বোনকে হত্যা বা তার ওপর নির্যাতন হতে পারে।
	 LK_DAUGHTER_DEBTS_INDICATION	= হারিয়ে যাওয়া বাচ্চাদের বিক্রী বা এটা থেকে লাভ ওঠানোর প্রয়াস হয়ে থাকতে পারে।
	 LK_DAUGHTER_DEBTS_REMEDY		= ১. সব রক্তের আত্মীয় কিছু হলুদ রঙের কড়ি (ছোট্ট ঝিনুক) কিনে, সেটাকে জ্বালিয়ে তার ছাইকে সেই দিনেই কোনো নদীতে ফেলুন।
	 DAUGHTER_DEBTS_FALSE			= আপনার কুষ্ঠি কন্যা ঋণ থেকে মুক্ত।
	 DAUGHTER_DEBTS_TRUE			= আপনার কুষ্ঠি কন্যা ঋণ দ্বারা প্রভাবিত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার উপর প্রযোজ্য হয় এবং আপনার রক্তের সম্পর্কের আত্মীয়ের কুষ্ঠিতে একই সমন্বয় থাকে, তবে উপরে দেওয়া প্রতিকারগুলি আপনার সম্পাদন করা উচিত।
	 LK_OPPRESSOR_DEBTS_SYMPTOM		= লাল কিতাবের মতে, যখন সূর্য, চন্দ্র, মঙ্গল দশম ও একাদশ ঘরে অবস্থিত তখন জাতক উৎপীড়ক ঋণ দ্বারা পীড়িত হতে পারেন।
	 LK_OPPRESSOR_DEBTS_REASON		= এর কারন এটা হতে পারে যে আপনার পূর্বপুরুষ বা গুরুজনরা কাউকে ঠকিয়েছেন অথবা তাকে ঘর থেকে বের করে দিয়েছেন এবং তাকে দিনযাপনের জন্য কিছু দেন নি।
	 LK_OPPRESSOR_DEBTS_INDICATION	= বাড়ির প্রধান দরজা দক্ষিণ দিকে হবে, বা বাড়ির জমি যার ছেলে নেই তার ​​থেকে নেওয়া হবে, অথবা একটি রাস্তা বা একটি কুয়োর উপরে ঘর নির্মান করা হয়ে থাকতে পারে।
	 LK_OPPRESSOR_DEBTS_REMEDY		= ১. বিভিন্ন স্থানের ১০০টি মাছ অথবা শ্রমিকদের সব পরিজন ধন একত্রিত করে একদিন খাওয়ান।
	 OPPRESSOR_DEBTS_FALSE			= আপনার কুষ্ঠি উৎপীড়ক ঋণ থেকে মুক্ত। 
	 OPPRESSOR_DEBTS_TRUE			= আপনার কুষ্ঠি উৎপীড়ক ঋণ দ্বারা প্রভাবিত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার উপর প্রযোজ্য হয় এবং আপনার রক্তের সম্পর্কের আত্মীয়ের কুষ্ঠিতে একই সমন্বয় থাকে, তবে উপরে দেওয়া প্রতিকারগুলি আপনার সম্পাদন করা উচিত।
	 LK_UNBORN_DEBTS_SYMPTOM		= লাল কিতাবের মতে, যখন সূর্য, শুক্র, মঙ্গল একটি জন্মপত্রিকার দ্বাদশ ঘরে অবস্থিত তখন জাতক অজাত ঋণ দ্বারা পীড়িত হতে পারেন।
	 LK_UNBORN_DEBTS_REASON			= এর কারণ এটা হতে পারে যে আপনার পূর্বপুরুষ বা গুরুজনরা শশুর-পক্ষের সাথে বিশ্বাসঘাতকতা করেছেন বা কোন আত্মীয়ের পরিবারের বিনাশে ভুমিকা নিয়েছেন।
	 LK_UNBORN_DEBTS_INDICATION		= নর্দমা দোরগোড়ার নীচে প্রবাহিত, অথবা শবদাহ স্থল ধ্বংস বা বাড়ির দক্ষিণ দেয়ালে সংযুক্ত চুল্লি থাকবে।
	 LK_UNBORN_DEBTS_REMEDY			= সব রক্ত আত্মীয়দের প্রত্যেকের কাছ থেকে একটি করে নারিকেল নিয়ে এবং একই দিনে একটি নদীতে এগুলিকে প্রবাহিত করুন ।
	 UNBORN_DEBTS_FALSE				= আপনার কুষ্ঠি অজাত ঋণ থেকে মুক্ত।
	 UNBORN_DEBTS_TRUE				= আপনার কুষ্ঠি অজাত ঋণ দ্বারা প্রভাবিত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার উপর প্রযোজ্য হয় এবং আপনার রক্তের সম্পর্কের আত্মীয়ের কুষ্ঠিতে একই সমন্বয় থাকে, তবে উপরে দেওয়া প্রতিকারগুলি আপনার সম্পাদন করা উচিত।
	 LK_NATURE_DEBTS_SYMPTOM		= লাল কিতাবের মতে, যখন চাঁদ, ​​মঙ্গল একটি জন্মপত্রিকার ষষ্ঠ ঘরে স্থাপিত হয় তখন জাতক প্রকৃতি ঋণ দ্বারা পীড়িত হতে পারেন।
	 LK_NATURE_DEBTS_REASON			= এর কারন এটা হতে পারে যে আপনার পূর্বপুরুষ বা গুরুজনরা কাউকে দরিদ্র কুকুরের মত ধ্বংস করেছেন।
	 LK_NATURE_DEBTS_INDICATION		= বুলেট দ্বারা কুকুর হত্যা, অন্যের পুত্রের প্রাণনাশ, অথবা ভাইপোর সাথে এতটা বিশ্বাসঘাতকতা করা যে সে পুরো ধ্বংস হয়ে যাবে।
	 LK_NATURE_DEBTS_REMEDY			= ১. একই দিনে সব রক্ত আত্মীয়দের কাছ থেকে অর্থ সংগ্রহের পর মিষ্টি দুধ বা ক্ষীর ১০০টি কুকুরকে খাওয়ান।<br/>২. আপনার পাশাপাশি বসবাসকারি সেই বিধবা স্ত্রীর সেবা করুন এবং আশিরবাদ নিন যিনি অল্প বয়সে বিধবা হয়েছেন।
	 NATURE_DEBTS_FALSE				= আপনার কুষ্ঠি প্রকৃতি ঋণ থেকে মুক্ত।
	 NATURE_DEBTS_TRUE				= আপনার কুষ্ঠি প্রকৃতি ঋণ দ্বারা প্রভাবিত হতে পারে। যদি উপরে দেওয়া ইঙ্গিত আপনার উপর প্রযোজ্য হয় এবং আপনার রক্তের সম্পর্কের আত্মীয়ের কুষ্ঠিতে একই সমন্বয় থাকে, তবে উপরে দেওয়া প্রতিকারগুলি আপনার সম্পাদন করা উচিত।
	 ANCESTRAL_DEBTS                = পূর্বপুরুষের ঋণ
	 RinIntroduction                = লাল কিতাবের মতে, ঋণ একটি কুষ্ঠীর সবচেয়ে বড় দুর্বলতা হিসেবে বিবেচনা করা হয়। পূর্বপুরুষের ঋণ মানে পূর্বপুরুষ ও প্রবীণদের দ্বারা কৃত পাপের প্রভাব ব্যক্তির ওপর পড়বে। অন্য কথায়,আত্মীয়রা অন্যের করা ভুলের ফলাফল বহন করবে। একজনের কুষ্ঠীতে যা ঋণ দেখাবে যা অন্যান্য আত্মীয়ের কুষ্ঠীতে সমান ঋণ দেখাবে। <br/> সাধারণত পুরো বংশ ঋণের কারণে প্রভাবিত হয় এবং এই কারনে প্রতিকার রয়েছে যা পুরো বংশের সাহায্যে সম্পন্ন হয়ে থাকে। এমনকি যদি কোন ব্যক্তির কুষ্ঠিতে গ্রহ রাজযোগ (রাজকীয় সমন্বয়) সৃষ্টি করছে,এবং সেই গ্রহ ঋণ সম্বন্ধীয় যোগ গঠন করছে তখন শুধুমাত্র খারাপ ফলাফল পাওয়া যায়।
