
	 WHAT_IS_NAKSHATRA							= नक्षत्र  क्या है?
	 NAKSHATRA_INTRO							= हिन्दू ज्योतिष में नक्षत्रों का विशेष महत्व है। आकाश को यदि 27 (कभी-कभी 28) बराबर भागों में विभाजित किया जाए, तो प्रत्येक भाग एक नक्षत्र कहलाता है। हर नक्षत्र को बराबर-बराबर चार पदों में भी विभाजित किया गया है। ज्योतिष की अवधारणा के अनुसार हर पद एक अक्षर को इंगित करता है। प्रायः किसी व्यक्ति के जन्म के समय चन्द्रमा जिस पद में होता है, उससे जुड़े अक्षर से उस व्यक्ति का नाम रखा जाता है।
