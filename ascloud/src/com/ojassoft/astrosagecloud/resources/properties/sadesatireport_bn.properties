	SADESATIRISINGPHASE	= এটাই হচ্ছে শনির সাড়ে সাতি প্রারম্ভের সময়কাল। এই সময়ের মধ্যে শনি চন্দ্র থেকে ১২নং ঘরে গমন করবে। সাধারণভাবে লুকানো শত্রু, উদ্দেশ্যহীন ভ্রমণ, বিরোধ ও দারিদ্র্য দ্বারা আর্থিক ক্ষতি প্রভৃতি সমস্যা নির্দেশ করে এই সময়। এই সময়কালে, আপনি আপনার লুকানো শত্রুদের দ্বারা সমস্যার সম্মুখীন হতে পারেন। আপনার সহকর্মীদের সাথে সম্পর্ক ভাল থাকবে না এবং তারা আপনার কাজের পরিবেশে সমস্যা তৈরি করতে পারে। এছাড়াও আপনি আপনার গার্হস্থ্য জীবনেও চ্যালেঞ্জের সম্মুখীন হতে পারেন। যাতে আপনি চাপ ও চাপা উত্তেজনা অনুভব করবেন। আপনাকে নিয়মিত খরচ নিয়ন্ত্রন করতে হবে, অন্যথায় এটি বড় আর্থিক সমস্যা ধারণ করতে পারে। দূরে ভ্রমনের জন্য সময়টা ফলপ্রসূ নয়। শনির প্রকৃতি বিলম্ব এবং নিরাশা হলেও, ধৈর্য ধরবেন আপনি ফলাফল পাবেন।সময়টাকে জানার কাজে লাগান এবং দক্ষভাবে কর্ম করে যান, সবকিছুই ঠিকঠাক জায়গায় থাকবে। ব্যবসার বিষয়ে এই সময় কোন ঝুঁকি নেবেন না।
	SADESATIPEAKPHASE		= এই সময় শনির সাড়েসাতি শিখরে রয়েছে। সাধারনত এই সময় শনির প্রকোপটা বেশ কঠিন হবে। শনি চন্দ্রের ওপর রয়েছে বলে স্বাস্থ্য সমস্যা, চরিত্র হত্যা, সম্পর্ক নষ্ট,মানসিক  সমস্যা প্রভৃতি দুঃখজনিত ব্যাপার ঘটতে পারে। সাফল্যর ক্ষেত্রে সময়টা কঠিন হতে পারে। পরিশ্রমের সঠিক মূল্য আপনি পাবেন না।  আপনার সংবিধান এবং অনাক্রম্যতা শক্তিশালী হবে না। যেহেতু কুণ্ডলীর প্রথম ঘর হচ্ছে স্বাস্থ্যের ঘর, তাই স্বাস্থ্যের প্রতি নিয়মিত যত্ন নিন, তা নাহলে দুরারোগ্যের শিকার হতে পারেন। আপনি বিষণ্নতা, অজানা ভয় বা বিতৃষ্ণাতে  ভুগতে  পারেন। চিন্তা, কর্ম, এবং সিদ্ধান্ত নেওয়ার ক্ষেত্রে আপনার  স্বচ্ছতার অভাব দেখা দেবে। আপনি আধ্যাত্মিকত্যে আকৃষ্ট হয়ে পড়বেন। স্বীকৃত বুনিয়াদির মূলসূত্র বিসর্জিত হবে।
	SADESATISETTINGPHASE	= এটা শনির সাড়েসাতির ‘অস্ত’ যাবার সময়।শনি চন্দ্র থেকে ২নং ঘরে যাওয়ায় আর্থিক এবং গার্হস্থ্যে অসুবিধে দেখা দেবে। সাড়েসাতির দুটো পর্যায়ের পর আপনি কিছুটা শান্তি অনুভব করবেন। যদিও ভুল বোঝাবুঝি এবং আর্থিক চাপ এই সময়ের মধ্যে দেখা যাবে। খরচ উচ্চ সম্পন্ন হলেও আপনাকে নিয়মিত নিয়ন্ত্রন চালিয়ে যেতে হবে। আর্থিক লোকসান ও চুরির ভয়ের সম্ভাবনা আছে। হতাশাপূর্ণ চিন্তা হলেও আপনাকে যেকোনো লেনদেন এর ব্যাপারে উদ্যমী থাকতে হবে। আপনাকে পরিবার বা ব্যাক্তিগত জীবনে মনোনিবেশ করতে হবে অন্যথায় আপনাকে এক্ষেত্রেও সমস্যার সম্মুখীন হতে হবে। ছাত্রদের ক্ষেত্রে সময়টা একটু প্রভাবিত হলেও বিদ্যবান স্তরটা ঠিক রাখতে হবে। ফলাফলের দিকটা সবসময় একটু ধীর বা বিলম্ব হতে পারে। এই সময়টাতে বিপদের আশঙ্কা রয়েছে বলে গাড়ী চালানোর সময় সচেতনতা বজায় রাখবেন। শনিকে খুশি রাখতে মদ্যপান বা আমিষ জাতীয় জিনিসকে দূরে রাখবেন। আপনি বুদ্ধির জোরে গার্হস্থ বা আর্থিক বিষয়টাতে উতরে যাবেন।
	IMPNOTE				= ওপরের ভবিষ্যৎবাণী থেকে সাধারনত ধারণা জন্মায় যে সাড়েসাতি ক্ষতিকারক। সত্যি বলতে সবসময়ই তা হয় না, এবং আমরা চর্চা করছি <b><u><a href=http://www.astrocamp.com/vedicastrology/2008/09/shani-sade-sati.html> সাড়েসাতির বিষয়বস্তু</a></u></b>. সাড়েসাতির ওপর ভিত্তি করে কোন সিদ্ধান্তে উপনীত হওয়া ঠিক নয়। সাড়েসাতির সময়টা ক্ষতিকর না লাভদায়ক তা জানতে গেলে বর্তমান শনির দশা প্রকৃতির ওপর দৃষ্টিপাত করা প্রয়োজন। ওপরের পূর্বাভাসকে গম্ভীর ভাবে না নিয়ে একজন বিশিষ্ট জ্যোতিষীর পরামর্শ নিন।
