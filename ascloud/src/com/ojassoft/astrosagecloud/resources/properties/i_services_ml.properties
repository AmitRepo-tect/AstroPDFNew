
    SERVICE_NAME_1  = ഒരു ചോദ്യം ചോദിക്കുന്നതിന്‍റെ റിപ്പോർട്ട് 
    SERVICE_DESC_1  = മനുഷ്യരാശിയുടെ വികസനത്തിന് ചോദ്യങ്ങൾ സർവ്വപ്രധാനമാണ്, അരിസ്റ്റോട്ടിൽ പ്രസിദ്ധമായി പറഞ്ഞു. ചോദ്യങ്ങൾ മനുഷ്യരാശിക്ക് മാത്രം നിർണ്ണായകമായ ഒന്നല്ല, എന്നാൽ അതോടൊപ്പം വ്യക്തിഗത വികസനത്തിനും വളരെ പ്രധാനപ്പെട്ട ഒന്നാണ്. ഒരാൾക്ക് എന്തെങ്കിലും പ്രശ്നമോ അല്ലെങ്കിൽ ഒരാളുടെ മനസ്സിൽ അഗാധമായ വിഭ്രാന്തി പതുങ്ങി ഇരിപ്പുണ്ടെങ്കിൽ, അത് അയാളുടെ/അവരുടെ എല്ലാ പ്രത്യാശയോടും കൂടിയ വളർച്ചയ്ക്ക് വിഘ്നം വരുത്തുന്നു. നിങ്ങൾ പ്രത്യേകിച്ച് എന്തിനെയെങ്കിലും കുറിച്ച് അസ്വസ്ഥരാണോ? ഏതെങ്കിലും പ്രത്യേക വിഷയത്തിൽ സംഭവിക്കുവാൻ പോകുന്ന കാര്യങ്ങളെ കുറിച്ച് നിങ്ങൾക്ക് ഭയം അനുഭവപ്പെടുന്നുണ്ടോ? <br /><br /> നിങ്ങൾക്ക് എന്താണ് വിധിച്ചിട്ടുള്ളത് എന്ന് അറിയുവാൻ കഴിയുന്ന ദിവ്യമായ ശാസ്ത്രമാണ് ജ്യോതിഷം. ഇതിന് നിങ്ങളുടെ സംശയത്തെയും ഭയത്തെയും ഇല്ലായ്മ ചെയ്യുവാനും, ഔദ്യോഗികം, വിവാഹം, സാമ്പത്തികം കൂടാതെ ജീവിതം ഇത്യാദി ഏതൊരു കാര്യത്തെയും കുറിച്ചുള്ള ചോദ്യങ്ങൾക്ക് ഉത്തരം നൽകുവാൻ കഴിയും. അസ്വസ്ഥമായ ചോദ്യങ്ങളെ ദൂരീകരിക്കുന്ന പ്രശ്നപരിഹാരമാണിത്.
    
    SERVICE_NAME_7  = ആരോഗ്യവും ശാരീരിക സ്വാസ്ഥ്യവും സംബന്ധിച്ച റിപ്പോർട്ട് 
    SERVICE_DESC_7  = ആരോഗ്യമാണ് യഥാർത്ഥ സമ്പത്ത് എന്നാണ് പറയുന്നത്. നിങ്ങൾക്ക് ശാരീരിക സ്വാസ്ഥ്യവും ആരോഗ്യവും ഇല്ലെങ്കിൽ, ആഡംബരവും മറ്റ് ലൗകികമായ സമ്പാദ്യവും വിലയില്ലാത്തതാകും. പുരാതന കാലഘട്ടങ്ങളിൽ ജ്യോതിഷവും വൈദ്യശാസ്ത്രവും അതായത് ആയൂർവേദവും മൊത്തത്തിൽ ഒന്നിന് ഒന്നോട് സങ്കീർണ്ണീകരിക്കപ്പെട്ടിരുന്നു. പുരാതന ഋഷിമാർക്ക് ഒരാളുടെ പൂർണ്ണ സ്വസ്ഥിതിക്ക് നക്ഷത്രങ്ങളുടെ പങ്ക് അറിയാമായിരുന്നു. ജ്യോതിർഗോളങ്ങളാൽ ഉണ്ടാകാവുന്ന പ്രതിരോധ പ്രകൃതമുളള അസുഖമായതിനാൽ കൂടുതൽ തവണയും മരുന്നുകളും ചികിത്സകളും ഫലിക്കുകയുല്ല. അതിനാൽ, നിങ്ങളുടെ അഭിവൃദ്ധിക്കായി ജ്യോതിഷികമായ അറിവിനെ ഉപയോഗപ്പെടുത്തേണ്ടത് വളരെ അത്യന്താപേക്ഷിതമാണ്. <br /><br /> ആരോഗ്യവും ശാരീരിക സ്വാസ്ഥ്യവുമായി ബന്ധപ്പെട്ടുള്ള പ്രശ്നങ്ങൾ നിങ്ങൾ അഭിമുഖീകരിക്കുന്നു എങ്കിൽ, കഴിയുന്നത്ര പെട്ടെന്നു തന്നെ മുൻകരുതലുകൾ എടുക്കണമെന്ന് അഭിപ്രായപ്പെടുന്നു. ഞങ്ങളുടെ വിശദമായ ആരോഗ്യ റിപ്പോർട്ടിൽ നിങ്ങൾക്ക് ഈ പ്രശ്നം ഉണ്ടാകുവാൻ കാരണമെന്താണെന്നും മോശമായ ആരോഗ്യ സ്ഥിതിഗതികളുടെ നിർഭാഗ്യാവസ്ഥയിൽ നിന്നും രക്ഷപെടുന്നതിനായി എന്ത് ജ്യോതിഷ നടപടികളാണ് കൈക്കൊള്ളേണ്ടതെന്നും പറയുന്നു.

    SERVICE_NAME_14 = ഫോൺ കൺസൾട്ട്. 
    SERVICE_DESC_14 = ഞങ്ങളുടെ അനുഭവസമ്പന്നരായ ജ്യോതിഷരോട് ടെലിഫോണിലൂടെയും ബന്ധപ്പെടാവുന്നതാണ്.  ഒരു നല്ല സംവാദം നടത്തുന്നത് സമ്പദ്സമൃദ്ധം ആകുന്നതു പോലെയാണ്, എന്നാണ് ഒരു കെനിയൻ പഴഞ്ചൊല്ല് പറയുന്നത്. ഒരാൾ സംസാരിക്കുമ്പോൾ, അയാൾ/അവർ വാക്കുകൾ വഴി ആശയവിനിമയം മാത്രമല്ല നടത്തുന്നത്, എന്നാൽ അവരുടെ സംഭാഷണത്തിലെ രീതിയും സ്വരഭേദവും പ്രധാന പങ്ക് വഹിക്കുന്നു. കൂടാതെ, ജ്യോതിശാസ്ത്ര പ്രകാരം, രണ്ട് ആളുകൾ സംസാരിക്കുന്ന സന്ദർഭവും അന്തർജാതമായ പ്രശ്നങ്ങളെ കുറിച്ചുള്ള വിവരം ലഭ്യമാക്കുന്നതിൽ പ്രധാന പങ്ക് വഹിക്കുന്നു.<br /><br />ഔദ്യോഗികം, ആരോഗ്യം, വ്യവസായം, പ്രണയം, വിവാഹം മുതലായ ജീവിതത്തിന്‍റെ ഏതു തലങ്ങളുമായി ബന്ധപ്പെട്ട കാര്യങ്ങളെ കുറിച്ചും ചർച്ച ചെയ്യാം കൂടാതെ ഓരോ സംഭവങ്ങൾക്കു പിന്നിലുള്ള ജ്യോതിശാസ്ത്ര കാരണങ്ങൾ അറിയുവാനും കഴിയും. നിങ്ങളുടെ വിജയത്തിനും, സമൃദ്ധിക്കും, സന്തോഷത്തിനും തടസമായി എന്തെങ്കിലും ഉണ്ടെങ്കിൽ അത് തരണം ചെയ്യുവാൻ വേണ്ടി പ്രായോഗികമായി പരിഹരിക്കുവാൻ കഴിയുന്ന പ്രതിവിധിയും നിർദ്ദേശിക്കുന്നു. ഞങ്ങളുടെ ജ്യോതിഷർ നിങ്ങളെ സഹായിക്കുന്നതിനായി വെറും ഒരു ഫോൺകോൾ അകലെയാണ്.

    SERVICE_NAME_4  = തൊഴിൽപരമായ റിപ്പോർട്ട് ലഭ്യമാകാൻ 
    SERVICE_DESC_4  = ജീവിതത്തിന്‍റെ മൊത്തത്തിലുള്ള വിജയത്തിന് ഒരു സന്തുഷ്ടമായ ഉദ്യോഗം അത്യന്താപേക്ഷിതമാണ്. ഞങ്ങളുടെ വിദഗ്ദ്ധ ജ്യോതിഷന്മാർ, വിശദമായ ഈ റിപ്പോർട്ടിൽ, നിങ്ങൾ ഏതു ജോലിക്കു പോകണമെന്നും, വിവിധ മേഖലകളിൽ നിങ്ങളുടെ പുരോഗതി എന്താണെന്നും, അഥവാ നിങ്ങൾക്ക് ഇപ്പോൾ ജോലിയുണ്ടെങ്കിൽ, ജോലിയിൽ ഉയർച്ച ഉണ്ടാകുവാൻ നിങ്ങൾ എന്ത് ചെയ്യണമെന്നും കൂടാതെ ഏതു തരത്തിലുള്ള ലക്ഷ്യമാണ് നിങ്ങൾ ആസൂത്രണം ചെയ്യേണ്ടതെന്നും മറ്റും നിങ്ങൾക്ക് പറഞ്ഞുതരും. ഇക്കാര്യങ്ങളോടോപ്പം, ഭാവിയിൽ നിങ്ങളുടെ ജോലിയുടെ ഗതിയെ കുറിച്ച് ഞങ്ങൾ വിശകലനം ചെയ്യുകയും ജോലിയിലോ വ്യവസായത്തിലോ നിങ്ങൾ മുന്നേറുന്നതിനു തടസമാകാൻ  സാദ്ധ്യതയുള്ള എല്ലാ അപയങ്ങളെക്കുറിച്ചും നിങ്ങളെ അറിയിക്കുകയും ചെയ്യും, കൂടാതെ ഈ പ്രശ്നങ്ങൾ തരണം ചെയ്യുവാൻ ഫലവത്തായ ജ്യോതിശാസ്ത്ര പരിഹാരമാർഗ്ഗങ്ങൾ നിർദ്ദേശിക്കുകയും ചെയ്യും .<br /><br /> നിങ്ങളുടെ വ്യാപാരത്തിന്‍റെ അല്ലെങ്കിൽ ജോലിയുടെ വിവിധ തലങ്ങളുടെ അടുത്ത പന്ത്രണ്ട് മാസത്തേക്കുള്ള ആഴത്തിലുള്ള വിശകലനവും പരിഹാര മാർഗ്ഗങ്ങളുമാണ് വിശദമായ  ഈ റിപ്പോർട്ടിൽ ഉൾക്കൊള്ളിച്ചിരിക്കുന്നത്. വരും വർഷത്തിൽ നിങ്ങളുടെ ജോലിയുടെ വിശദമായ വഴികാട്ടിയാണെന്ന് ഈ റിപ്പോർട്ട് തെളിയിക്കും. പുരാതനമായ ജ്യോതിശാസ്ത്ര അറിവ്  ജോലിയിൽ ഉന്നതിയിൽ എത്തുവാൻ നിങ്ങളെ സഹായിക്കുവാൻ അനുവദിക്കുക കൂടാതെ ഞങ്ങളുടെ വിദഗ്ദ്ധരായ ജ്യോതിഷന്മാരിൽ നിന്ന് ജോലിയെക്കുറിച്ചുള്ള സുഗ്രഹമായ റിപ്പോർട്ട് നേടുക.

    SERVICE_NAME_12 = സാമ്പത്തിക റിപ്പോർട്ട് ലഭിക്കുവാൻ 
    SERVICE_DESC_12 = ഇന്നത്തെ മത്സരലോകത്ത്, മികച്ച സാമ്പത്തിക സ്ഥിതി ഒരു ആഡംബരമല്ല എന്നാൽ നിലനിൽക്കുവാനും മുന്നോട്ടുപോകുവാനും ഉള്ള ഒരു ആവശ്യമാണ്. ഒരു വ്യക്തിയുടെ മാത്രമല്ല പങ്കാളി, കുട്ടികൾ, മുഴുവൻ കുടുംബവും എന്നിവരെപോലെ അയാളുമായി ബന്ധപ്പെട്ടിരിക്കുന്നവരുടേയും ക്ഷേമത്തിന് സാമ്പത്തിക സുരക്ഷിതത്വം ആവശ്യമാണ്. സാമ്പത്തിക പ്രതിസന്ധി വളർച്ചയുടെ പ്രതീക്ഷയ്ക്കു തടസമാകുന്നു എന്ന് മാത്രമല്ല മാനസ്സിക സമാധാനം, സന്തോഷം, സ്ഥിരത എന്നിവയേയും ബാധിക്കുന്നു. ജോൺ എഫ് കെന്നഡി പ്രശസ്തമായി ഒരിക്കൽ പറഞ്ഞു, രണ്ട് ബ്രഷുകളാണ് ചീനന്മാർ ‘പ്രതിസന്ധി’ എന്ന വാക്ക് എഴുതുവാൻ ഉപയോഗിച്ചിരുന്നത്. ഒന്ന് അപായത്തെ പ്രതിനിധീകരിക്കുവാനും; മറ്റേത് അവസരത്തേയും. ഒരു പ്രതിസന്ധിയിൽ അപായത്തെ സൂക്ഷിക്കുക-എന്നാൽ അവസരത്തെ തിരിച്ചറിയുക. ഇത് വളരെ ശരിയാണ്.<br /><br />ദിവ്യമായ ജ്യോതിശാസ്ത്ര ജ്ഞാനം സാമ്പത്തിക പ്രശ്നങ്ങളുടെ കാരണങ്ങളെ ചൂണ്ടിക്കാണിക്കുവാനും വിശകലനം ചെയ്യുവാനും നിങ്ങൾക്ക് അവസരം നൽകുന്നു കൂടാതെ ഇത് പ്രശ്നങ്ങളിൽ നിന്നും പുറത്തു വരുവാനുള്ള പരിഹാര മാർഗ്ഗങ്ങൾ നിർദ്ദേശിക്കുകയും ചെയ്യുന്നു. ചില സാമ്പത്തിക പ്രശ്നങ്ങൾ തരണം ചെയ്യുവാനുള്ള ഉപദേശം നൽകുക മാത്രമല്ല ഈ അറിവ് നിലവിലുള്ള നിങ്ങളുടെ നല്ല സാമ്പത്തിക സ്ഥിതി മെച്ചപ്പെടുത്തുവാനും ഉപകാരപ്രദമായ ശാസ്ത്രമാണ് ജ്യോതിഷം. നിങ്ങൾക്ക്  സാമ്പത്തിക സംബന്ധമായി എന്തെങ്കിലും ചോദിക്കുവാൻ ഉണ്ടെങ്കിൽ, പുരാതനമായ ജ്യോതിശാസ്ത്ര അറിവ്  നിങ്ങളെ സഹായിക്കും കൂടാതെ ഞങ്ങളുടെ വിദഗ്ദ്ധരായ ജ്യോതിഷന്മാരിൽ നിന്ന് സാമ്പത്തികത്തെക്കുറിച്ചുള്ള സുഗ്രഹമായ റിപ്പോർട്ട് നേടുക.

    SERVICE_NAME_13 = രത്നക്കല്ലുകളും പരിഹാരങ്ങളും 
    SERVICE_DESC_13 = പ്രശ്നങ്ങളെ ചൂണ്ടിക്കാണിക്കുക മാത്രമല്ല, പ്രശ്നങ്ങൾ ഇല്ലാതാക്കുവാൻ പ്രായോഗികമായ പരിഹാര മാർഗ്ഗങ്ങൾ നിർദ്ദേശിക്കുകയും ചെയ്യുന്നതിനാലാണ് ജ്യോതിഷം ഫലപ്രദമാണെന്ന് കരുതുന്നത്. ജ്യോതിഷ ജ്ഞാനപ്രകാരം ഒരാൾ ഈ പരിഹാരമാർഗ്ഗങ്ങളെ ഗൗരവമായി പിൻതുടർന്നാൽ, അവൻ/അവൾക്ക് ജ്യോതിർഗോളങ്ങൾ കാരണമുള്ള പ്രതികൂല ഫലങ്ങളെ ഇല്ലായ്മ ചെയ്യുവാനും പ്രയാസമേറിയ കാലഘട്ടത്തെ വളരെ എളുപ്പം തരണം ചെയ്യുവാനും കഴിയും.<br /><br />ജ്യോതിശാസ്ത്രപരമായി രത്നക്കല്ലുകൾക്ക് വളരെ പ്രാധാന്യം കൽപ്പിക്കുന്നു, എന്തുകൊണ്ടെന്നാൽ, ശരിയായ രീതിയിൽ നയിക്കുകയാണെങ്കിൽ, നിങ്ങളുടെ എല്ലാ പ്രശ്നങ്ങളേയും ഇല്ലായ്മ ചെയ്യുവാനും ജീവിതത്തിലെ വിവിധ തലങ്ങളിൽ നിങ്ങൾക്ക് ശക്തമായ ഉയർച്ച നൽകുവാനും കഴിവുള്ള, പ്രാപഞ്ചിക ഊർജ്ജത്തെ ആവാഹിക്കുവാൻ ഇവയ്ക്ക് കഴിവുണ്ട്. എന്നാൽ മോശമായി കൈകാര്യം ചെയ്താൽ, ഈ പ്രാപഞ്ചിക ഊർജ്ജം നിങ്ങൾക്ക് വിപരീതമായി ഫലിക്കും. ആയതിനാൽ, സാമ്പത്തികം, പ്രണയം, വിവാഹം, ഉദ്യോഗം, വിദ്യാഭ്യാസം എന്നീ കാര്യങ്ങളിൽ അനുകൂല ഫലങ്ങൾ ലഭിക്കുവാൻ നിങ്ങൾക്ക് ജ്യോതിഷ പരിഹാര മാർഗ്ഗങ്ങളോ രത്നക്കല്ലുകളോ വേണമെങ്കിൽ, നിങ്ങൾ കൈക്കൊള്ളേണ്ട പരിഹാര മാർഗ്ഗങ്ങളെ കുറിച്ചും, ഈ പരിഹാര മാർഗ്ഗങ്ങൾ ശരിയായി എങ്ങനെ ആചരിക്കണമെന്നും, നിങ്ങൾ ഏതു രത്നക്കല്ല് ധരിക്കണമെന്നും, അവയിൽ നിന്നും മികച്ചത് എങ്ങനെ ലഭിക്കുമെന്നും വിദഗ്ദ്ധരായ ഞങ്ങളുടെ ജ്യോതിഷന്മാർക്ക് നിർദ്ദേശിക്കുവാൻ കഴിയും.

    SERVICE_NAME_6  = വിവാഹം/പ്രണയ വിശകലനം 
    SERVICE_DESC_6  = വിവാഹം സ്വർഗ്ഗത്തിൽ വെച്ച് നടക്കുന്നുവെന്ന് പറയപ്പെടുന്നു. നിങ്ങൾ ജീവിതം ചിലവഴിക്കുവാൻ ആഗ്രഹിക്കുന്ന വ്യക്തിയെ അല്ലെങ്കിൽ നിങ്ങൾ ജീവിതം ചിലവഴിച്ചുകൊണ്ടിരിക്കുന്ന വ്യക്തിയെ നിങ്ങൾക്കു വേണ്ടി സൃഷ്ടിച്ചതാണെന്നു നിങ്ങൾക്ക് ഉറപ്പുണ്ടോ? അവൻ അല്ലെങ്കിൽ അവൾ നിങ്ങൾക്കു വേണ്ടി ഉള്ളതാണോയെന്ന് കണ്ടുപിടിക്കുവാനുള്ള മാർഗ്ഗം നിങ്ങളുടെ കൈയിലുണ്ട് അതായത് നിങ്ങൾ തിരഞ്ഞെടുത്തത് ശരിയായ ശ്രീമാനേയോ ശ്രീമതിയേയോ ആണോ എന്ന് അറിയുവാൻ. നിങ്ങൾ തിരഞ്ഞെടുത്തത് ശരിയായ പങ്കാളിയെ ആണെങ്കിൽ, ജീവിതം ഒരു അനായാസ വിജയമായി കാണപ്പെടും. എന്നാൽ നിങ്ങളുടെ തിരഞ്ഞെടുപ്പ് തെറ്റാണെങ്കിൽ, ജീവിതത്തിന്‍റെ മനോഹാരിതയും സന്തോഷവും അത് ചിന്നഭിന്നമാക്കും.<br /><br />ശരിയായ തീരുമാനം എടുക്കുവാൻ ജ്യോതിഷത്തിനു നിങ്ങളെ സഹായിക്കുവാൻ കഴിയും. നിങ്ങൾക്ക് ഒരാളുമായി പൊരുത്തമുണ്ടോ എന്നും, നിങ്ങൾ ആ വ്യക്തിയുമായി ജീവിതം ആരംഭിക്കണമോ വേണ്ടയോ എന്നും ഒരു ജോഡിയെന്ന നിലയിൽ ഭാവി നിങ്ങൾക്കായി എന്ത് കരുതിയിരിക്കുന്നു എന്നും പറയുവാൻ അതിനു കഴിയും. അഥവാ നിങ്ങൾ വിവാഹിതരാണെങ്കിലും വൈവാഹിക ജീവിതത്തിൽ പ്രശ്നങ്ങൾ നേരിടുന്നുണ്ടെങ്കിലും, പ്രശ്നങ്ങളിൽ നിന്നും തരണം ചെയ്യുവാൻ നിങ്ങൾ എന്ത് ചെയ്യണമെന്നും പറയുന്നു.

    SERVICE_NAME_5  = ലാൽ കിതാബ് പരിഹാരങ്ങൾ 
    SERVICE_DESC_5  = ആദ്ധ്യാത്മിക ദർശനം നിറഞ്ഞ ജ്യോതിഷ പ്രബന്ധമാണ് ലാ‌ൽ കിതാബ്. ഇതിൽ ജ്യോതിഷം, ഹസ്തരേഖ, വാസ്തു എന്നിവ സംബന്ധിച്ച ദീർഘദൃഷ്ടിയോടെയുള്ള അന്തർദർശനം ഉൾക്കൊള്ളുന്നു. പണ്ഡിറ്റ് രൂപ്ചന്ദ് ജോഷി ഉറുദുവിന്‍റെ പുരാതന പ്രാദേശിക ഭാഷയിൽ ലാൽ കിതാബ് രചിച്ചു എന്ന് പറയപ്പെടുന്നു, പദ്യരൂപത്തിലുള്ള നിരവധി ഈരടികൾ ഇതിൽ ഉൾക്കൊള്ളുന്നു. ലാൽ കിതാബിൽ അസ്പഷ്ടതയുടെ ആവരണത്തിനു പിന്നിൽ ജ്യോതിഷത്തിന്‍റെ അഗാധതയുടെ തികഞ്ഞ  വ്യാപ്തി ഉൾക്കൊള്ളുന്നു. അത് നിർവചിക്കുവാൻ സൂക്ഷ്മവും തീക്ഷ്ണവുമായ ജ്യോതിഷ ജ്ഞാനം ആവശ്യമാണ്. <br /><br />ലാൽ കിതാബ് മനസ്സിലാക്കുവാൻ കഴിയുന്നവർ അതിനെ  ലൗകിക പ്രശ്നങ്ങളുടെയും ക്ലേശങ്ങളുടേയും താക്കോലായി പ്രഖ്യാപിക്കും.ലാൽ കിതാബിലെ പരിഹാര മാർഗ്ഗങ്ങൾ വളരെ ശക്തവും സമർത്ഥവുമാണ്, നിരവധി പ്രശ്നങ്ങൾ നിറഞ്ഞവരും സമയക്കുറവുള്ളവരും ആയ ആളുകൾ നിറഞ്ഞ ആധുനിക ലോകത്തിന് ഉചിതവുമാണ്. ഈ പരിഹാര മാർഗ്ഗങ്ങൾ ദൗർബ്ബല്യങ്ങളെ ചൂണ്ടിക്കാട്ടുകയും അങ്ങനെ നിങ്ങളുടെ ശാരീരികവും, മാനസികവും, സാമ്പത്തികവുമായ പ്രശ്നങ്ങളെ വളരെ വേഗം സൗഖ്യമാക്കുകയും ചെയ്യുന്നു. ലാൽ കിതാബ് പരിഹാര മാർഗ്ഗങ്ങൾ ഉപയോഗിച്ച് നിങ്ങളുടെ പ്രശ്നങ്ങൾക്ക് വളരെ വേഗം പരിഹാരം കണ്ടെത്തുവാൻ നിങ്ങൾ ആഗ്രഹിക്കുന്നുവെങ്കിൽ, ഉൾക്കാഴ്ച്ചയുള്ള ഞങ്ങളുടെ ജ്യോതിഷന്മാരോട് ചോദിക്കുക.

    SERVICE_NAME_2  = ജനന സമയം തിരുത്തൽ 
    SERVICE_DESC_2  = നിങ്ങളുടെ ജാതകം ഉണ്ടാക്കുന്നതിന് ജനന സമയം അത്യന്താപേക്ഷിതമാണ്. കൃത്യമായ ജനന സമയം ഇല്ലാതെ, എത്ര ബുദ്ധിയുള്ള ജ്യോതിഷൻ വിചാരിച്ചാലും ഭാവി നിങ്ങൾക്കായി എന്താണ് കരുതി വച്ചിരിക്കുന്നതെന്ന് പ്രവചിക്കുവാൻ കഴിയുകയില്ല. എന്നിരുന്നാലും, നിങ്ങളുടെ ശരിയായ ജനന സമയം നിങ്ങൾക്ക് അറിയില്ലെങ്കിലോ സംശയമുണ്ടെങ്കിലോ, വിഷമിക്കേണ്ട ആവശ്യമില്ല. എന്തെന്നാൽ യഥാർത്ഥ ജനന സമയം കൃത്യമായി പറയുവാനുള്ള മാർഗ്ഗങ്ങൾ വേദിക് ജ്യോതിഷം നൽകുന്നു.<br /><br /> കാളിദാസമഹർഷിയേയും മഹാനായ വരാഹമിഹിരനെയും പോലെയുള്ള ഭാരതീയ സന്യാസിമാർ നിരവധി രീതികൾ നിർദ്ദേശിച്ചിട്ടുണ്ട്. കെപി സംവിധാനത്തിന് നിങ്ങളുടെ യഥാർത്ഥ ജനന സമയം കണ്ടുപിടിക്കുവാനുള്ള അതുല്യമായ ഒരു രീതിയുണ്ട്. അതിനുപരി, നിങ്ങളുടെ ജീവിതത്തിലെ പ്രധാന സംഭവങ്ങളുടെ അടിസ്ഥാനത്തിൽ പ്രതിലോമപ്രവർത്തനം വഴി വിദഗ്ദ്ധനായ ഒരു ജ്യോതിഷന് നിങ്ങളുടെ യഥാർത്ഥ ജനന സമയം കണ്ടുപിടിക്കുവാൻ കഴിയും.<br /><br />ആയതിനാൽ, നിങ്ങളുടെ യഥാർത്ഥ ജനന സമയം കണ്ടുപിടിക്കുന്നതിനായി, നിങ്ങളുടെ ജീവിതത്തിലെ ചില പ്രധാന സംഭവങ്ങളെ കുറിച്ചും അവ സംഭവിച്ച ഏകദേശ സമയത്തെ കുറിച്ചും ഞങ്ങളെ അറിയിച്ചാൽ മാത്രം മതി ഉദാഹരണത്തിന് നിങ്ങളുടെ വിവാഹ തിയതി, നിങ്ങളുടെ കുട്ടികളുടെ ജനന ദിവസം, വലിയ രോഗങ്ങൾ, ആദ്യത്തെ ജോലി മുതലായവ.<br /><br />നിങ്ങളുടെ ജനന സമയം ആകുവാൻ സാധ്യത്യയുണ്ടെന്ന് നിങ്ങൾക്ക് തോന്നുന്ന സമയവും കൂടി ഞങ്ങളെ അറിയിക്കുക; അതായത് ഉച്ചയ്ക്ക് 2 മണിക്കും 4 മണിക്കും ഇടയിൽ എന്നതു പോലെ. ഞങ്ങൾ സസൂക്ഷ്മം നിങ്ങളുടെ ജനന സമയം കണ്ടെത്തുന്നതാണ്.

