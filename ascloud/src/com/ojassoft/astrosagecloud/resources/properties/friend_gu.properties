

	 THANKS							= આભાર

	 THANK_YOU_FOR_RECOMMENDATION	= ભલામણ બદલ આભાર.
	 REFER_FRIEND					= મિત્રને સંદર્ભ આપો
	 RECOMMEND_THIS_WEBSITE			= આ વેબસાઇટની ભલામણ કરો
	 INTROTEXT						= આપના પ્રેમને કારણે ઈન્ટરનેટ પર અમારી વેબસાઈટ વેદિક જ્યોતિષ માટેની સહુથી વધુ પ્રચલિત વેબસાઈટ્સમાંની બની શકી છે. અમે અમારી બધી જ સેવાઓ નિઃશુલ્ક બનાવી છે, જેથી શક્ય તમામ લોકો સુધી જ્યોતિષના લાભ પહોંચી શકે. અને આ પવિત્ર કામમાં, અમને તમારી મદદની જરૂર છે. તમારા મિત્રો અને કુટુંબીઓને આ સાઈટનો સંદર્ભ આપો. નીચે આપેલું પત્રક ભરી આ વેબસાઈટ વિશેની માહિતી અન્યોને પહોંચાડવા વિનંતી. આ સાઈટ વિષે તમારા મિત્રો અને કુટુંબીઓને જણાવવું તમને ગમશે.
	 YOUR_NAME						= તમારું નામ
	 YOUR_EMAIL_ID					= તમારું ઇમેઇલ આઇડી
	 YOUR_FRIENDS					= તમારા મિત્રનું
	 EMAIL_ID						=  ઇમેઇલ આઇડી
	 SEND							= મોકલો
