	 LK_DHARMI_TEVA				= ಲಾಲ್ ಕಿತಾಬ್ ನಲ್ಲಿ ಕೆಲವು ಜಾತಕಗಳನ್ನು ಧರ್ಮಿ ಜಾತಕಗಲೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ಲಾಲ್ ಕಿತಾಬ್ ಪ್ರಕಾರ, ರಾಹು, ಕೇತು ಮತ್ತು ಶನಿ ಗ್ರಹಗಳನ್ನು ಉಪದ್ರವಕಾರಿಯೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ಒಂದು ಜಾತಕ ಧರ್ಮಿಯಾಗಿದ್ದಲ್ಲಿ, ಶನಿ, ರಾಹು ಮತ್ತು ಕೇತುಗಳು ಉಪದ್ರವಕಾರಿ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡುವುದು ನಿಲ್ಲುತ್ತವೆ. ಅವುಗಳು ಒಳ್ಳೆಯ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡಲೇಬೇಕೆಂದಿರದಿದ್ದರೂ ಅವುಗಳು ಕನಿಷ್ಠ ಉಪದ್ರವಕಾರಿ ಫಲಿತಾಂಶವನ್ನು ನೀಡುವುದನ್ನು ನಿಲ್ಲಿಸುತ್ತವೆ. <br/> ರಾಹು ಮತ್ತು ಕೇತುಗಳು ನಾಲ್ಕನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಅಥವಾ ಚಂದ್ರನ ಜೊತೆ ಎಲ್ಲಿಯಾದರೂ ಇದ್ದಾಗ ಅವುಗಳನ್ನು ಧರ್ಮಿಯೆಂದು ಪರಿಗಣಿಸಲಾಗುತ್ತದೆ. ಶನಿಯು ಹನ್ನೊಂದನೇ ಮನೆಯಲ್ಲಿದ್ದಾಗ ಅಥವಾ ಗುರುವಿನ ಜೊತೆಗೆ  ಜಾತಕದಲ್ಲಿ ಎಲ್ಲಿಯಾದರೂ ಇದ್ದಾಗ ಅದು ಧರ್ಮಿಯಾಗುತ್ತದೆ. ಎರಡೂ ನಿಯಮಗಳು ಪೂರೈಸಲ್ಪಟ್ಟಲ್ಲಿ ಜಾತಕವನ್ನು ಧರ್ಮಿ ತೇವೆ ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ.
	 LK_NIGHT_BLIND_HOROSCOPE	= ರಾತಾಂಧ (ಇರುಳುಕುರುಡು) ಗ್ರಹಗಳು ಲಾಲ್ ಕಿತಾಬ್ ನ ಒಂದು ಅನನ್ಯ ಪರಿಕಲ್ಪನೆಯಾಗಿವೆ. ಒಂದು ಜಾತಕದಲ್ಲಿ 7ನೇ ಮನೆಯಲ್ಲಿ ಶನಿ ಹಾಗೂ 4ನೇ ಮನೆಯಲ್ಲಿ ಸೂರ್ಯನಿದ್ದಲ್ಲಿ ಆ ಜಾತಕವನ್ನು ರಾತ್ರಿ ಕುರುಡು ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಒಂದು ಕುರುಡು ಜಾತಕದಂತೆ ರಾತ್ರಿಕುರುಡು ಜಾತಕವಿರುವ ವ್ಯಕ್ತಿ ದಿಗ್ದರ್ಶನವಿಲ್ಲದವನಾಗುತ್ತಾನೆ ಹಾಗೂ ತನ್ನ ಸ್ವಂತ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳಲು ಸಾಧ್ಯವಿಲ್ಲ. ಅವರು ರಾತ್ರಿ ವ್ಯಕ್ತಿಯಂತೆ ನಡೆದುಕೊಳ್ಳುತ್ತಾರೆ.
	 LK_BLIND_HOROSCOPE			= ಒಂದು ಜಾತಕದಲ್ಲಿ ಹತ್ತನೇ ಮನೆ ವೃತ್ತಿ, ಕೆಲಸ, ಸ್ಥಾನಮಾನ, ಕೀರ್ತಿ ಮತ್ತು ಸರ್ಕಾರದ ಕೃಪೆಗಳ ಮನೆಯಾಗಿರುವುದರಿಂದ ಅದನ್ನು ಜಾತಕದ ಬುನಾದಿಯೆಂದು ಪರಿಗಣಿಸಲಾಗುತ್ತದೆ. ಹತ್ತನೇ ಮನೆಯಲ್ಲಿ ಪರಸ್ಪರ ವೈರದ ಗ್ರಹಗಳಿದ್ದಲ್ಲಿ, ಅಥವಾ ಕೆಟ್ಟದಾಗಿರುವ ಅಥವಾ ದುರ್ಬಲವಾಗಿರುವ ಗ್ರಹಗಳಿದ್ದಲ್ಲಿ ಎಲ್ಲಾ ಗ್ರಹಗಳು ಉತ್ತಮ ಫಲಿತಾಂಶಗಳನ್ನು ನೀಡಲು ಸಾಧ್ಯವಾಗುವುದಿಲ್ಲ. ಇಂತಹ ಸಂಯೋಜನೆಯನ್ನು ಹೊಂದಿರುವ ಜಾತಕವನ್ನು ಕುರುಡು ಜಾತಕವೆಂದು ಕರೆಯಲಾಗುತ್ತದೆ ಹಾಗೂ ಮತ್ತು ಇಂತಹ ಜಾತಕವನ್ನು ಹೊಂದಿರುವ ವ್ಯಕ್ತಿ ಕುರುಡಾಗಿ ಅಥವಾ ದಿಕ್ಕಿಲ್ಲದಂತೆ ವರ್ತಿಸುತ್ತಾನೆ
	 LK_MINOR_HOROSCOPE			= ಲಾಲ್ ಕಿತಾಬ್ ಪ್ರಕಾರ, ಕೆಲವು ಪರಿಸ್ಥಿತಿಗಳಲ್ಲಿ ಕೆಲವು ಜಾತಕಗಳನ್ನು 12 ವರ್ಷ ವಯಸ್ಸಿನ ತನಕ ಅಪ್ರಾಪ್ತವೆಂದು ಪರಿಗಣಿಸಲಾಗುತ್ತದೆ. ಅಪ್ರಾಪ್ತ ಜಾತಕಗಳು ಅವುಗಳಲ್ಲಿರುವ ಗ್ರಹಗಳ ಪ್ರಕಾರ ಫಲಿತಾಂಶಗಳನ್ನು ಹಾಗೂ ಅವು ಊಹಿಸಲಾಗದ ವರ್ತನೆಯನ್ನು ತೋರಿಸುತ್ತವೆ. ಇಂತಹ ಜಾತಕವನ್ನು ಹೊಂದಿರುವ ವ್ಯಕ್ತಿಯ ಅದೃಷ್ಟ 12 ವರ್ಷ ವಯಸ್ಸಿನವರೆಗೆ ವಿಶ್ವಾಸಾರ್ಹವಾಗಿರುವುದಿಲ್ಲ.
