HOW_TO_USE_TREE_ROOT_OF_BICHUA=<ul> <li> শনির জন্য প্রতিকারমূলক মূল হলো বিছুয়া, এই গাছের মূলটি গলায় পরিধান করা যেতে পারে বা একে হাতেও বাঁধা যেতে পারে। </ li> <li> এটি পরিধান করার আগে কাঁচা দুধ বা গঙ্গার জলে ডুবিয়ে রাখা  উচিত। </ li> <li> শনির মন্ত্র ওম প্রাম প্রিম প্রাউম সাঃ সানাইস্কারায় নমঃ (Oṃ Prāṃ Prīṃ Prauṃ Saḥ Śanaiścarāya Namaḥ )১০৮ বার জপ করতে করতে ভগবান ভৈরবের চরণে কালো তিলের বীজ অর্পণ করুন ও সুগন্ধি ধুপ দিন, এর ফলে আপনার শনি জাগরিত হবে।</ li> <li> এই অনুষ্ঠানগুলি সম্পাদন করার পরে, সূর্যাস্তের পরে কোনো শনিবার বা পুষ্য অনুরাধা ও উত্তরা ভদ্রপাড় নক্ষত্রের কালে এটি পরতে পারেন। </ li> </ ul>
HOW_TO_USE_TREE_ROOT_OF_CHANDAN=<ul> <li> রাহুর প্রতিকার মূলক মূল হলো চন্দন, এই গাছের মূলটি গলায় পরিধান করা যেতে পারে বা একে হাতেও বাঁধা যেতে পারে। </ li> <li> এটি পরিধান করার আগে কাঁচা দুধ বা গঙ্গার জলে ডুবিয়ে রাখা  উচিত। </ li> <li> শনির মন্ত্র ওম ভ্রাম ভ্রিম ভ্রাউম সাঃ রাহবে নমঃ  (Oṃ Bhrāṃ Bhrīṃ Bhrauṃ Saḥ Rāhave Namaḥ)১০৮ বার জপ করতে করতে মা দূর্গা কে লাল চন্দন অর্পণ করুন ও সুগন্ধি ধুপ দিন, এর ফলে আপনার রাহু জাগরিত হবে। </ li> <li> এই অনুষ্ঠানগুলি সম্পাদন করার পর, এটি শনিবার বা স্বাতী, সাতভিশা এবং অর্ধ নক্ষত্র কালেও পরিধান করা যেতে পারে।  । </ li> </ ul>
