
JADI_SUGGESTION_REPORT=সবাই একটি সুখী জীবন চায়। এর জন্য আমরা অনেক ক্রিয়াকলাপ এবং কঠোর পরিশ্রম করি যাতে সুফল পেতে পারি। আমরা জ্যোতিষবিদদের সাথে পরামর্শ করি, রত্ন পরিধান করি এবং বিভিন্ন প্রতিকারমূলক রাস্তা অনুসরণ করি। বিভিন্ন প্রকার প্রতিকার গুলির গাছের শিকড় অন্যতম। আপনার কুণ্ডলী বিশ্লেষণ করে এবং আপনার জন্ম তালিকাতে গ্রহ নক্ষত্রের সারিবদ্ধকরণগুলি বা অবস্থান গুলি মূল্যায়ন করে আমরা আপনার জন্য উপযুক্ত মূল বা গাছের শিকড় প্রস্তাব করব।
JADI_AND_ITS_IMPORTANCE=বিভিন্ন গাছ আমাদের দৈনন্দিন জীবনের একটি গুরুত্বপূর্ণ ভূমিকা পালন। গাছ হলো পৃথিবীতে প্রাণের সঞ্চারের উত্স। জ্যোতির্বিদ্যাগতভাবে, উদ্ভিদ ও গাছ অক্সিজেন গ্যাস তৈরি করে এবং শ্বাস নেওয়ার সময় কার্বন ডাই অক্সাইড গ্রহণ করে, যা মানব জীবনের মূল উৎস। আমরা সবাই জানি, আমরা অক্সিজেন গ্যাস ছাড়া বাঁচতে পারি না। যদি কোন গাছ বা উদ্ভিদ না থাকে, আমরা শ্বাস নিতে সক্ষম হব না, ফলে মানুষের জীবন শেষ হয়ে যাবে। একইভাবে, আমাদের সামগ্রিকভাবে উদ্ভিদ ও গাছের গুরুত্ব বিবেচনা করা উচিত। উদ্ভিদের মাধ্যমে অনেক সমস্যার সমাধান সম্ভব। এটি ঔষধি হিসেবে ব্যবহার করা হয়। গাছের শিকড় তাদেরই মধ্যে বিশেষ গুরুত্বপূর্ণ। <a href="http://astrology.astrosage.com/2013/11/jadi-roots-to-reach-planets-hearts.html"> গাছের শিকড় </a> সমগ্র গাছের একটি অংশ।  জ্যোতিষশাস্ত্রে বৃক্ষের শিকড়ের এর নিজস্ব তাত্পর্য রয়েছে। আপনার জন্মপত্রিকায় গ্রহ নক্ষত্রের অবস্থান খারাপ হলে এটি একটি প্রতিকার হিসাবে ব্যবহার করা যেতে পারে। একটি নির্দিষ্ট গ্রহকে চিহ্নিত করতে সংজ্ঞায়িত বিভিন্ন ধরনের গাছের শিকড় আছে। আমরা সবাই জানি যে জ্যোতিষশাস্ত্রের মধ্যে সাতটি প্রধান গ্রহ সংজ্ঞায়িত রয়েছে এবং দুটি ছায়া গ্রহ যেমন রাহু ও কেতু। প্রতিটি গ্রহের পরিবেশগত শক্তি ভারসাম্য রাখার জন্য একটি নির্দিষ্ট গাছের শিকড় আছে। আপনার কুষ্ঠি বিচার করার পর দরকার মতো কোনো গাছের শিকড় আপনার পরিধান করা উচিত। গাছের শিকড় পাথরের সেরা বিকল্প হিসাবে বিবেচিত হয়।  জ্যোতিষবিদের পরামর্শ নিয়ে গুরুত্বপূর্ণ ক্রিয়া সম্পাদনের পর এটি পরিধান করলে হলে এটি আরও উপকারী হতে পারে। এটা পাথরের চেয়ে এমনকি ভাল কাজ করতে পারে। স্টোন অনেক বেশি ব্যয়বহুল এবং প্রত্যেকের জন্য তার ব্যয় বহন করা সম্ভব নাও হতে পারে।  সেই ক্ষেত্রে, বৃক্ষের শিকড় তাদের পছন্দসই ফলাফল অর্জনের জন্য এবং কোনও গ্রহের ক্ষতিকারক প্রভাবগুলি কমানর জন্য জন্য সর্বোত্তম বিকল্প। আপনি সহজেই এটি একটি সস্তা মূল্যে খুঁজে পেতে পারেন।
RECOMMENDATIONS=আপনাকে একটি উপযুক্ত গাছের শিকড় পরিধান করার জন্য এটি সুপারিশ করা হয়। পরিবেশে প্রচুর ধরণের শিকড়/মূল পাওয়া যায়। আপনাকে খুঁজে বের করতে হবে কোনটি আপনার জন্য উপযুক্ত। এটা শুধুমাত্র আপনার জন্ম তালিকাতে আপনার গ্রহাণু সারিবদ্ধকরণের উপর ভিত্তি করে বা <a href="https://www.astrosage.com/freekphorary/instantchart.asp?charttype=kp"> জন্ম তালিকার </a> ওপর ভিত্তি করা যেতে পারে। আপনি গাছের শিকড় সম্পর্কে কোনো জ্যোতিষবিদ সাথে পরামর্শ করতে পারেন। শিকড়/মূল  বা শিকড় পরিধান করলে আপনার জীবনের দুর্বলতা গুলির উন্নতি হবে। আমরা আপনার জন্মতালিকাতে আপনার গ্রহাণু সারিবদ্ধকরণের ভিত্তিতে বিভিন্ন ধরণের শিকড় উল্লেখ করেছি।
IMPORTANCE_OF_NATURAL_JADI=প্রাকৃতিক জাদি বা শিকড় আজকের দিনে বাজারে পাওয়া খুবই দুর্লভ। সাধারণত, গাছের মূলগুলি কৃত্রিমভাবে তৈরি করা হচ্ছে এবং সারা বিশ্বে বিতরণ করা হচ্ছে। একটি প্রাকৃতিক রুটি মূলত একটি গাছের একটি মাত্র মূল এবং তাই, সীমিত সংখ্যায় পাওয়া যাবে। এছাড়াও, আবহাওয়ার মত অনিশ্চিত জিনিস একটি গুরুত্বপূর্ণ ভূমিকা পালন করে এবং মাঝে মাঝে উৎপাদনে বাধা দেয়। কৃত্রিমভাবে তৈরি করা গাছের মূলগুলি মূলটির অনুরূপ দেখতে হতে পারে তবে এটি জ্যোতিষিকভাবে ব্যবহার করা হয় না। এই সমস্যার সমাধান করার জন্য, আমরা 100% প্রাকৃতিক গাছের মূল নিয়ে এসেছি। এটি পরিধান করলে আপনি সমস্ত প্রত্যাশিত জ্যোতির্বিদ্যাগত সুবিধা পাবেন। এই গাছের শিকড় পরীক্ষাগারে সঠিক পদ্ধতিতে পরীক্ষা করা হয়েছে এবং তা সম্পূর্ণ জেনুইন পাওয়া গেছে।

TREE_ROOT_OF_BEL=এটি সূর্য, একটি রাজকীয় গ্রহ হিসেবে চিহ্নিত। সূর্য একটি আধিকারিক অবস্থান বা উচ্চ নেতৃত্ব বা সরকারের প্রতিনিধিত্বকে নির্দেশ করে এবং তাই জ্যোতিষশাস্ত্র একটি গুরুত্বপূর্ণ গ্রহ হিসেবে বিবেচিত হয়। আপনার সূর্য খারাপ ভাবে কুষ্ঠিতে অবস্থান করলে, আপনি এটা পরতে পারেন। <a href="http://www.astrosage.com/planet/sun/">  সূর্যের শক্তি </a> স্পাইসি এবং অগ্নিসদৃশ উদ্ভিদের মাধ্যমে বাড়ানো যেতে পারে। সঠিক শিকড় পরিধান করলে এই গ্রহের নৃশংস প্রভাব হ্রাস করা সম্ভব হবে।  আপনি যদি খ্যাতি, যশ এবং সামাজিক অবস্থানের সাথে সংগ্রাম করছেন, তবে এটি আপনার জীবনে উচ্চতর হওয়ার জন্য ইতিবাচক শক্তি সরবরাহ করতে পারে।
TREE_ROOT_OF_KHIRNI=এই শিকড় বৈদিক জ্যোতিষশাস্ত্র অনুসারে চাঁদকে নির্দেশ করে। এই গ্রহ অন্য গ্রহের মধ্যে খুব গুরুত্বপূর্ণ বলে মনে করা হয়। এটি একটি ব্যক্তির মন প্রতিনিধিত্ব করে। এখানে উদ্ধৃত করা হয়েছে, "যদি আপনার মন সুখী হয়, তবে সবকিছু সুখী বলে মনে হবে"। সুখী এবং সুস্থ জীবন লাভ করার জন্য, আমাদের মানসিক অস্থিরতা বা অসুস্থতা থেকে মুক্ত হওয়া উচিত। সংক্ষেপে, আমরা বলতে পারি যে আমাদের জীবনে বড় সাফল্য অর্জনের জন্য আমাদের চাপ মুক্ত জীবন কাটাতে হবে। যদি আপনি এই শিকড় গ্রহণ করেন, আপনি মানসিক উত্তেজনা, বিষণ্নতা এবং উদ্বেগ থেকে মুক্ত হবেন।  অবশেষে, আপনি সুখী জীবনের দিকে চালিত হবেন।
TREE_ROOT_OF_ANANTMOOL	= এই বৃক্ষের শিকড় বৈদিক জ্যোতিষশাস্ত্রে মঙ্গল গ্রহকে নির্দেশ করে। এটি শক্তি, সাহস, উত্সাহ এবং দৃঢ়তার জন্য দায়ী  গ্রহ হিসাবে বিবেচিত হয়। মঙ্গল সেনা, সৈনিক, পুলিশ অথবা অন্য কোনো ব্যক্তিকে প্রতিনিধিত্ব করে, যারা প্রশাসনিক অবস্থান বা বন্দুক ধারণ করে। মঙ্গল আপনার শত্রুদের সাথে যুদ্ধ করার রসদ সরবরাহ করে ও শক্তি প্রদান করে এবং প্রতিযোগিতামূলক পরীক্ষায় সাফল্য অর্জনের শক্তি সরবরাহ করে। আপনার মঙ্গল খারাপভাবে অবস্থান করলে আপনি এই গাছের  শিকড় পরতে পারেন। এর ফলে আপনার গুণাবলী জোরদার হবে। আপনি কোন ভয় ছাড়া কাজ করতে সক্ষম হবে। আপনার আস্থা এবং শক্তি বৃদ্ধি হবে। যদি আপনি কোন কাজ করেন বা যদি আপনার কোন কাজ করার সাহস থাকে, তবেই শুধুমাত্র আপনি ফলাফল পেতে সক্ষম হবেন। তাই এটি আপনাকে যে কোন কার্য সম্পাদন করার ক্ষমতা সরবরাহ করবে। যারা প্রতিযোগিতামূলক পরীক্ষায় ভাল করতে চায় তাদের জন্য এটি প্রবল ভাবে সুপারিশ করা হয়।
TREE_ROOT_OF_VIDHARA=এই গাছের মূলটি <a href="http://www.astrosage.com/planet/mercury/"> বুধ </a> গ্রহটিকে চিহ্নিত করে। বুধ গ্রহ বৈদিক জ্যোতিষশাস্ত্রের একজন রাজকুমারী। এটা বিবেচনা করা হয় যে যৌক্তিক ক্ষমতা বুধ গ্রহের মাধ্যমে আসে। বুধ যোগাযোগ, যুক্তি, যৌক্তিক মন, গণিত, গণনা ইত্যাদির প্রতিনিধিত্ব করে। অতএব, যদি আপনি এই সম্পর্কিত বিষয়গুলির মুখোমুখি হন, তবে আপনাকে এই গাছের শিকড় পরিধান করার সুপারিশ করা হয়। এর কোন পার্শ্ব প্রতিক্রিয়া নেই। আপনি যদি এটি পরেন, এটি আপনার যোগাযোগগত ক্ষমতা, বক্তৃতা এবং যুক্তি ক্ষমতাকে উন্নত করতে পারে। যদি আপনার বুধটি খারাপ ভাবে অবস্থান করে তবে প্রথমে জ্যোতিষ দের সাথে পরামর্শ করুন এবং আপনার জন্ম তালিকাটি তাকে দিয়ে বিশ্লেষণ করিয়ে নিন,  তাহলে আপনি এই গাছের শিকড় পরিধান করতে পারবেন।
TREE_ROOT_OF_BANANA=এই গাছের শিকড়টি গ্রহ বৃহস্পতির প্রতীক। বৃহস্পতি বৈদিক জ্যোতিষশাস্ত্রের অনুসারে গুরু এবং সবচেয়ে উপকারী গ্রহ হিসেবে বিবেচিত। এটা আমাদের জ্ঞান, পরিবার এবং শিশুদের প্রতিনিধিত্ব করে। যদি বুধ আপনার কুষ্ঠিতে খারাপভাবে অবস্থান করে তাহলেও তা  আপনার সাথে খারাপ কাজ করে না। যদি এটি দরিদ্র হয়, এটি ভাল বা খারাপ প্রভাব দেখাবে না। বিবাহ, শিশু, জ্ঞান সম্পর্কিত সমস্যার মুখোমুখি হলে এটি (গাছের শিকড়) আপনাকে সুপারিশ করা হয়। তাই বৃহস্পতির অশুভ বা খারাপ ফলাফল থেকে পরিত্রাণ পেতে, আপনার এই গাছের মূল ব্যবহার করা উচিত। বৃহস্পতির জন্য ভারাঙ্গির শিকড়/মূল ব্যবহার করা যেতে পারে।
TREE_ROOT_OF_SHARPUNKHA=এই মূলটি গ্রহ শুক্রকে চিহ্নিত করে। শুক্র গ্রহটি প্রেম, সৌন্দর্য, শিল্প, সম্পর্ক, বান্ধবী এবং জন্মপত্রিকাযা বিবাহকে প্রতিনিধিত্ব করে। শুক্র আপনার কুষ্ঠিতে যদি খারাপভাবে অবস্থান করে, তবে সম্ভবত আপনি এর কুপ্রভাবের সাথে সম্পর্কিত বিষয়গুলির মুখোমুখি হবেন। এই ক্ষেত্রে, আপনি এই গাছের শিকড় পরতে পারেন। শুক্র গ্রহের অবস্থান আপনার জন্মপত্রিকাতে ভাল হলেও শুক্রের শক্তি বাড়ানোর জন্য আপনি এই বৃক্ষের মূলটি ব্যবহার করতে পারেন। এটি হীরার বিকল্প হিসাবে ব্যবহার করা যেতে পারে। যদিও, হীরা শুধুমাত্র তাদেরই পরা উচিত যাদের জন্ম তালিকায় গ্রহ শুক্র ইতিবাচক অবস্থানে আছে। হীরা পরার পার্শ্ব প্রতিক্রিয়াও থাকতে পারে। সুতরাং আপনাকে এটি পরার আগে জ্যোতিষ এর সাথে প্রথম পরামর্শ করতে হবে, তবে গাছের মূলের কোন পার্শ্ব প্রতিক্রিয়া নেই। আরান্ড মুলের গাছের মূল শুক্রবারও ব্যবহার করা যেতে পারে।
TREE_ROOT_OF_BICHUA=এই গাছের মূল গ্রহ শনি কে চিহ্নিত করে। শনি গ্রহ তার রায এর জন্য পরিচিত হয়। শনি একটি ধীর চলন্ত গ্রহ। এটা জীবনের শেষের দিকের পর্যায়ে ফলাফল প্রদান করে। এটা তার ধীরুতার কারণে দেরিতে ফল প্রদর্শন করে। এটা সীমাবদ্ধতা এবং গন্ডীবদ্ধতার সাথে সম্পর্কিত। এটি বৈদিক জ্যোতিষশাস্ত্রের অশুভ গ্রহ হিসাবে বিবেচিত হয়। এটা ভয়, উদ্বেগ, বিষণ্নতা এবং পেশা, শিক্ষা সম্পর্কিত বৃদ্ধির ক্ষেত্রে নেতিবাচক দিককে নির্দেশ করে। কুষ্ঠিতে শনির অবস্থান খারাপ হলে তা জাতকের জীবনে খুবই খারাপ পরিণতি বহন করে নিয়ে আসবে। শনির কারণে সৃষ্ট জীবনের খারাপ পর্যায়গুলি অতিক্রম করার জন্য গাছের মূল খুবই লাভজনক প্রতিকার। যদি শনি ইতিবাচকভাবে অবস্থান করে তবে এটি জাতক কে সাহায্য করতে পারে। আপনি দ্রুত এবং ভাল ফলাফল অর্জন করার জন্য ও শনির শক্তি বৃদ্ধি করতে এই গাছের মূল ব্যবহার করতে পারেন। শনির প্রভাবগুলির ভারসাম্য বজায় রাখতে ধুতরা গাছের মূল ব্যবহার করা যেতে পারে
TREE_ROOT_OF_CHANDAN=এই গাছের মূল রাহু গ্রহকে চিহ্নিত করে। রাহুকে গ্রহ হিসেবে গণ্য করা হয়না, এটি মূলত চাঁদের উত্তর নোড বলে বিবেচিত হয়। তবে, এটি বৈদিক জ্যোতিষশাস্ত্রে গ্রহ হিসাবে বিবেচিত হতে পারে। রহুর প্রভাবে মানুষের মধ্যে জাগতিক সুখ ও চাহিদার বৃদ্ধি হয়। এটি চতুরতা, তথ্য প্রযুক্তি, রাজনীতি ইত্যাদির প্রতিনিধিত্ব করে। এটি সর্বদা জনগণের মনোযোগ চায়। এটা সব ধরনের আরাম এবং বিলাসিতার বস্তু চায়। আপনার জন্মপত্রিকাতে এটি যদি খারাপভাবে স্থাপন করা হয় তবে আপনি রাহুর এর মারাত্মক প্রভাবগুলি হ্রাস করার জন্য এই বৃক্ষের মূল পরিধান করতে পারেন। রাহু অশুভ গ্রহ, এটির প্রভাবে একজন ব্যক্তি সর্ব প্রকার সুখ ও সুবিধা লাভ করতে পারবে না। তাই রাহুর এর মারাত্মক প্রভাব কমাতে, এই মূল আপনার জন্য সুপারিশ করা হয়। রাহুর অবস্থান শুভ হলেও তার শক্তি বৃদ্ধি করার জন্য আপনি এই গাছের মূল ব্যবহার করতে পারেন। রাহুর গ্রহের জন্য নগরমথা জাদ বা মূল ও ব্যবহার করা যেতে পারে।
TREE_ROOT_OF_ASHWAGANDHA=এই গাছের মূল কেতুকে চিহ্নিত করে। কেতু একটি গ্রহ নয়। রাহুর মতো, এটিও একটি চন্দ্রের দক্ষিণে অবস্থিত নোড। তবে, এটি বৈদিক জ্যোতিষশাস্ত্রের গ্রহ হিসাবে বিবেচিত হয়। <a href="http://www.astrosage.com/planet/ketu/"> কেতু </a> এমন গ্রহ যা কোনো বস্তুগত আরামকে পছন্দ করে না। এটা সব ধরণের বস্তুগত জিনিস থেকে দূরে থাকতে চায়। এটি খুবই আধ্যাত্মিক গ্রহ এবং মোক্ষ লাভ করতে চায়। যাইহোক, এটি একটি অশুভ গ্রহ, যা তার প্রাকৃতিক কারণের জন্যই জাতকের জীবনে সংগ্রামের আবির্ভাব ঘটাবে। আপনার জন্মপত্রিকাতে এটি খারাপভাবে স্থাপন করা হলে, কেতুর ক্ষতিকারক প্রভাবগুলি হ্রাস করার জন্য এই বৃক্ষের মূলটি আপনাকে সুপারিশ করা হয়। এমনকি যদি আপনার জন্মপত্রিকাতে এটি ইতিবাচকভাবে স্থাপন করা হয় তবে কেতু গ্রহকে শক্তিশালী করার জন্য এই মূল পরিধান করার সুপারিশ করা হয়।
TREE_ROOT_OF_ARAND=শুক্র গ্রহ এই গাছের মূল কে চিহ্নিত করে। শুক্র গ্রহটি প্রেম, সৌন্দর্য, শিল্প, সম্পর্ক, বান্ধবী এবং বিবাহ - এই সকল বিষয়ের প্রতিনিধিত্ব করে।আপনার কুষ্ঠিতে শুক্র খারাপ হলে, আপনি এর খারাপ প্রভাবের সাথে সম্পর্কিত বিষয় গুলির মুখোমুখি হবেন। এই ক্ষেত্রে, আপনি এই গাছের মূল পরতে পারেন। শুক্রর প্রভাব যদি আপনার জন্মপত্রিকাতে ভাল হয় তবে শুক্রের শক্তি বাড়ানোর জন্য আপনি এই বৃক্ষের মূল ব্যবহার করতে পারেন। এটি হীরার বিকল্প হিসাবেও ব্যবহার করা যেতে পারে। যদিও, হীরা শুধুমাত্র তাদেরই উপকার করবে যাদের জন্ম তালিকায় শুক্রর অবস্থান ইতিবাচক। হীরার অনেক পার্শ্ব প্রতিক্রিয়াও থাকতে পারে। সুতরাং আপনাকে এটি পরা করার আগে জ্যোতিষ দেড়  সাথে প্রথম পরামর্শ করতে হবে, তবে গাছের মূলের কোন পার্শ্ব প্রতিক্রিয়া নেই। শরপুনখা গাছের মূলও শুক্রর জন্য ব্যবহার করা যেতে পারে।
TREE_ROOT_OF_DHATURE=এই গাছের মূল গ্রহ শনি কে চিহ্নিত করে। শনি গ্রহ তার রায দেবার জন্য বা বিচার করার ক্ষমতার জন্য পরিচিত । শনি একটি ধীর চলন্ত গ্রহ। এটা জীবনের শেষের দিকের পর্যায়ে ফলাফল প্রদান করে। এটা তার ধীরুতার কারণে দেরিতে ফল প্রদর্শন করে। এটা সীমাবদ্ধতা এবং গন্ডীবদ্ধতার সাথে সম্পর্কিত। এটি বৈদিক জ্যোতিষশাস্ত্রের অশুভ গ্রহ হিসাবে বিবেচিত হয়। এটা ভয়, উদ্বেগ, বিষণ্নতা এবং পেশা, শিক্ষা সম্পর্কিত বৃদ্ধির ক্ষেত্রে নেতিবাচক দিককে নির্দেশ করে। কুষ্ঠিতে শনির অবস্থান খারাপ হলে তা জাতকের জীবনে খুবই খারাপ পরিণতি বহন করে নিয়ে আসবে। শনির কারণে সৃষ্ট জীবনের খারাপ পর্যায়গুলি অতিক্রম করার জন্য গাছের মূল খুবই লাভজনক প্রতিকার। যদি শনি ইতিবাচকভাবে অবস্থান করে তবে এটি জাতক কে সাহায্য করতে পারে। আপনি দ্রুত এবং ভাল ফলাফল অর্জন করার জন্য ও শনির  শক্তি বৃদ্ধি করতে এই গাছের মূল ব্যবহার করতে পারেন। শনির প্রভাবগুলির ভারসাম্য বজায় রাখতে বিছুয়া গাছের মূল ব্যবহার করা যেতে পারে।

