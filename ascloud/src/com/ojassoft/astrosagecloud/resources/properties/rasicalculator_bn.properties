	RASI_PREDICTION_12							= <p>আপনি অপারেশন বা দুর্ঘটনার কারণে অনেক রক্ত ক্ষয়ের সম্মুখীন হবেন। বিলাসিতার একটি প্রেমিকা, আপনি  একটি প্রদীপ্ত গাত্রবর্ণ, সুন্দর চোখ থাকবে, ড্রেসিং আপ করতে ভালবাসবেন, গান ভালবাসবেন, অভীক এবং আপনার শরীরের বাম দিকে ব্যথায় ক্ষতিগ্রস্ত হবেন। আপনি সমৃদ্ধি ভাল প্রকৃতি এবং সন্তুষ্ট হবেন, অতিথিদের ভালবাসবেন, একটি অনুগত পুত্র থাকবে, প্রথম বছরে জল ভয়, ৮ বছরে জ্বর ভয় এবং ৩২ বছরে আকস্মিক মৃত্যুর ভয় থাকবে।</p> <p>ভালো অস্থিরমতি পর্যায়ক্রমে রেখে আসছে এবং যাচ্ছে এবং যদি আপনার কঠিন বছরে ভাল অস্থিরমতি সময়সীমা আসছে এবং যাচ্ছে, তাহলে আপনি ১০০ বছরের একটি দীর্ঘ জীবন লাভ করবেন। উচ্চ স্থাপিত মুখ, বড় মাথা, সুন্দর দৃষ্টি , দয়িতের অনুগামী, বুদ্ধিজীবী, সমৃদ্ধ , জল প্রেমিক, স্বল্প মেজাজ, অসচ্চরিত্র ব্যক্তি, দাতব্য, আপনার সাত ভাই ও বোন থাকবে।</p> <p>২০ বছরে মৃত্যু ভয় আনবে, মৃত্যু আশ্বিন কৃষ্ণ চতুর্থী, বৃহস্পতিবার পূর্বাভাস দেয়, একটি নদীর কিনারায় রোহিণী নক্ষত্র থাকে।</p> <p>১২ তম বছর জ্বর আনবে, ১৮ তম বছর সাপের ভয়, ২২ তম বছরে বিদেশী দেশের ভয় এবং ২৪ বছর আকস্মিক মৃত্যুর ভয় আনবে। ২৭ তম বছরে জলের ভয়, ৩২ তম বছরে সর্প ও অস্ত্র ভয় আনবে। আপনার ১২ তম, ২৪ তম, ৪০ তম এবং ৪৮ তম বছরে আপনি কুকুরে ভয়, নখযুক্ত প্রাণী ও হাতকড়া দেখবেন।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>-রম্যাক বা রমুক দর্শন বিন্দু</b>

