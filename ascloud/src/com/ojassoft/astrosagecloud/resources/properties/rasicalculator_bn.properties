	RASI_PREDICTION_1							= <p>আপনি লাল বা হলুদ রঙের পণ্যের সাথে সম্পর্কযুক্ত ব্যবসা থেকে মুনাফা পাবেন। প্রকৃতির দ্বারা আপনার রসাত্মক এবং হালকা লাল আভা বিশিষ্ট উজ্জ্বল মুখ। আপনার এক সপ্তাহের মধ্যে ভাগ্যবান দিন হবে বুধবার, সোমবার ও মঙ্গলবার। আপনার গরু, মোষ ও অন্যান্য প্রাণীর তদারকির প্রতি ঝোঁক থাকবে। প্রকৃতি দ্বারা আপনি একটু অলস হবেন কিন্তু সবসময় অন্যান্য মানুষের কাজ করতে প্রস্তুত থাকবেন। আপনার কন্যারাশি, কুম্ভরাশি এবং মিথুন রাশির লক্ষণ যুক্ত অনেক বন্ধু থাকবে। আপনি উচ্চাভিলাষী ও প্রগতিশীল হবেন। নিম্নলিখিত বছরে ২০, ২৩, ৩৩ আপনি জ্বর ও অস্ত্র ভয়ের সাথে বিপন্ন হবেন। বছর ৪৫, ৫০, ৫৫ সংক্ষিপ্ত জীবন এবং আকস্মিক মৃত্যু ভয়ের সাথে আধিপত্য হবে।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>-রম্যাক বা রমুক দর্শন বিন্দু</b> <p>১৩, ১ এবং ৭ বছর, আপনি জ্বর থেকে ক্ষতিগ্রস্ত হবেন। যেহেতু বছর ৩, ১২, ৫ এবং ১৬ সরকার থেকে ভয় আনবে। আকস্মিক মৃত্যু থেকে ভয় বছর ৩২ এবং ৮ নিয়ন্ত্রিত হবে। আপনার ২৫তম বছরে সন্তান হারানোর সম্ভাবনা থাকবে। যখন চতুর্থ এবং অষ্টম বছরের জীবনে গাড়ী থেকে ক্ষতিগ্রস্ত হবেন এবং ৩, ১২, ও ২৪ বছরে বিষক্রিয়া এবং জলে ডোবার ভয়ে প্রভাবিত হবেন।</p> <b শৈলী='প্যাডিং-বাম:৮৪%'>-জন্মপ্রদীপ</b>
	RASI_PREDICTION_2							= <p>আপনি দীর্ঘ হাতের সঙ্গে হৃষ্টপুষ্ট হবেন প্রাথমিকভাবে সন্ধি এবং সর্দির সমস্যায় জর্জরিত হবেন। সপ্তাহে আপনার ভাগ্যবান দিন শনিবার, বুধবার ও শুক্রবার। রবিবার আপনার জন্য একটি দুর্ভাগ্য দিন। তিক্ত এবং টক আপনার জন্য আরো উপযুক্ত হবে, দুগ্ধজাত খাবার খেতে ভালবাসবে। আপনার ব্যবসায়িক সঙ্গী মধ্যবিত্ত থেকে হতে পারে এবং কৃশ বন্ধু যাতনার একটি কারণ হবে। আপনি বাগান এবং কৃষিকাজের ব্যবসায় উপকৃত হবেন। প্রধানত আপনি একটি মহান উচ্চতা থেকে পতনের ভয় করবেন এবং সহজ হবেন এবং এমনকি একটি প্রতিদ্বন্দ্বী প্রতিষ্ঠানের মধ্যে খুশি হবেন। একটা মিষ্টি প্রেমিকা, মাঝারি উচ্চতার আপনি মেকআপ এবং ড্রেসিং আপে আগ্রহী হবেন। আপনার স্বাস্থ্য সমস্যা প্রাথমিকভাবে আপনার পাকস্থলী এবং ঘাড়কে সচেতন করবে।</p> <p>বছর ২, ৪, ৫, ৭ এবং ১৮ কষ্ট আনবে। যেহেতু ৩২, ৪৪, ৪০ বছর রোগ এবং ক্ষতি আনবে। একটি নারী প্রেমিকা আপনি যখন গরম খাবার খাওয়ার অনুরাগী হন এবং কাশি ও ঠান্ডায় ভোগেন। আপনি পুরানো এবং সেকেলে জিনিস সংগ্রহে ইচ্ছুক হন।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>->-রম্যাক বা রমুক দর্শন বিন্দু</b> <p> বুক, ঘাড় ও চিবুকের সামান্য রোগে আপনি ভুগবেন। তৃতীয় বছরে আগুনের ভয় থাকবে। হাত ও পায়ে আঘাতে, ১৯ এবং ৩২ বছরে আকস্মিক মৃত্যু হবার সম্ভাবনা থাকবে। আপনার দ্বিতীয় বিয়ের বেশ শক্তিশালী একটি সুযোগ আছে এবং সাধারণত খুব অল্প ভাইবোন থাকবে। মৃত্যুর একটি প্রধান সম্ভাবনা হয় মাধব নবমী শুক্রবার বা রোহিণী নক্ষত্র।</p> -ইয়ুভনেশ্বার <p>২, ৫ এবং ৯ বছরে আপনার পাথর ও মহিলার সতর্কতা অবলম্বন করা আবশ্যক হবে। এছাড়াও আপনি আপনার ব্যক্তিগত অংশের রোগ থেকে ক্ষতিগ্রস্ত হবেন। আপনার একটি বড় রুচি থাকবে, দক্ষ, একটি রোগী, দাতব্য, এবং সমৃদ্ধ হবেন। ১৫ তম এবং ষষ্ঠ বছরে আপনি জল, শৃঙ্গযুক্ত প্রাণী, বিষ, পর্বত, ভল্লুক বা ভুত থেকে ক্ষতিগ্রস্ত হবেন। ১০, ২৫ এবং ৪৫ বছরে আগুনের ভয়, লুকানো রোগ এবং মানসিক দাসত্বের ভয় থাকবে।</p> <b শৈলী='প্যাডিং-বাম:৮৪%'>-জন্মপ্রদীপ</b>
	RASI_PREDICTION_3							= <p>মজ্জা এবং ব্যথা থেকে আপনি ক্ষতিগ্রস্ত হবেন। বুধবার, শুক্রবার এবং শনিবার সপ্তাহের ভাগ্য দিন হবে। আপনি একজন লেখক, একজন সরকারী বুদ্ধিজীবী কর্মচারী হবেন। আপনি তিক্ত এবং টক জিনিসের অনুরাগী হবেন। কালো জিনিস ভাগ্য আনবে এবং সাদা জিনিস দুর্ভাগ্য আনবে। আপনি ঝরঝরে পরিষ্কার থাকবেন এবং অল্পে রেগে যাবেন। আপনার নিজের গাড়ী থাকবে এবং অন্যান্য ব্যক্তিদের অর্থ গ্রহণের উপর একটি দক্ষতা থাকবে। আপনি পাকস্থলীর রোগের সঙ্গে একটি কম সমৃদ্ধ, অনেক নারী পুরুষ হতে চান। ৫, ১২, ১৬ ও ২৭ বছর অনেকটা দুর্ভোগ আনবে। জীবনের ৫০ তম বছরে আকস্মিক মৃত্যু হবার সম্ভাবনা থাকতে পারে।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>রম্যাক বা রমুক দর্শন বিন্দু</b> <p>আপনার ভবিষ্যত জীবনে আপনি মধ্যম শ্রেণিতে খুশি থাকবেন। জীবনের ১৬ ও ১৮ বছরে জল থেকে ভয় আসবে। ৫ তম বছরে কানের রোগ এবং ২৪ তম বছরে ব্যাথার ভয় দেখা দেবে। ৩৮ তম বছরে আকস্মিক মৃত্যু আসবে। দীর্ঘ জীবনের পর ৮০ বছরে বৈশাখের ১২ বছর, হাস্ত্র নক্ষত্র, বুধবার বা শুক্রবারের মধ্যে আপনার আত্মা শরীর ছেড়ে চলে যাবে। জীবনের ৩য়, ১০ম এবং ৬ষ্ঠ বছরে আপনি তিনটি ভারসাম্যহীনতা এবং ভুত ও লবণ ভয়ের মধ্যে বাস করা থেকে ক্ষতিগ্রস্ত হবেন। ২০ এবং ১২ বছরে আপনি ঘোড়া, সাপ, হাতি, পর্বত ও জল থেকে ক্ষতিগ্রস্ত হবেন।<br/>জীবনের ১৮, ৯, ৩০ ও ৫ বছরে আপনি জ্বরে ভুগবেন। আপনি রসাত্মক, সমৃদ্ধ, পাতলা এবং ৮ম বছরে হার্টের সমস্যায় ভুগবেন।</p> <b শৈলী='প্যাডিং-বাম:৯০%;'>-ইয়ভান</b>
	RASI_PREDICTION_4							= <p>রবিবার, সোমবার, মঙ্গলবার ভাগ্যবান দিন হবে যেহেতু বুধবার দুর্ভাগ্য দিন হবে। সর্দির সমস্যা, আকস্মিক মৃত্যুর তিনটি ঘটনার সঙ্গে সুন্দর মুখ। ২য়, ৮ম, ২১ এবং ২৯ বছর রোগ আনবে। আপনার কুটিল পাতলা পা, দুই স্ত্রী, এবং জল রোগ থাকবে। কোমর, মাথা ও পায়ে ব্যাথা, চোখের দৃষ্টিশক্তির দুর্বলতা, এবং নিম্ন শ্রেণীর মানুষের সঙ্গে মানসিক সম্পৃক্ততা থাকবে। শুক্রবার আপনার জন্য একটি দুর্ভাগ্য দিন হবে। কালো আপনার জন্য একটি দুর্ভাগ্য রঙ এবং সাদা ও লাল ভাগ্যবান রঙ হিসাবে প্রমাণিত।</p> <p>আপনার জীবনের ৮ম বছরে বৃষ্টি, জল, বায়ু থেকে ভয় আনবে। আপনি সুবাস থেকে উপকৃত হবেন। যেহেতু আপনার চাঁদ চিহ্ন কর্কট মকর চাঁদ বা একটি সংক্রান্তি দিনে যাই হোক না কেন আপনার কেনা দ্বিগুণ হয়ে যাবে। বায়ু-সমস্যা, ক্ষতির বাহক আপনি ৪৮ বা ৮৪ র মধ্যে একটি বয়সে মারা যাবেন।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>রম্যাক বা রমুক দর্শন বিন্দু</b> <p>আপনি আপনার যৌবনে দরিদ্র হবেন কিন্তু প্রতিষ্ঠিত হবেন যখন মধ্যম বয়েসে পোঁছাবেন। জীবনের ৩য় ও ৭ম বছরে আপনি জ্বরে ভুগবেন। যখন চাঁদ বছরের অধিপতি তখন আপনি জল ভয়ের সম্মুখীন হবেন যখন সুবাস ভাগ্য আনবে। আপনার জীবনের তৃতীয় বছরে শরীরের বাম অংশে আগুনের ভয় থাকবে। জাতকের আঁচিল থাকবে, মাথার রোগ ঘটবে, অন্যথায় সুখী থাকবে। যখন ৩২ বছর বয়স হবে তখন আকস্মিক মৃত্যুর সম্ভাবনা থাকবে। ২৯ বছর বয়সে আপনার সাপের ভয় থাকবে। মাঘ শুক্লা বা শুক্র নক্ষত্রের শুক্রবারের কাছাকাছি আপনার মৃত্যু হবে।<p> <b শৈলী='প্যাডিং-বাম:৯০%;'>-ইয়ভান</b> <p>আপনার জীবনের ৪ঠা, ৮ম, ১২তম বছর আপনার মাথা, কান এবং চোখের রোগে ভুগবেন। তিনগুন গ্রহের ভারসাম্যহীনতা শক্তিশালী হবে। জীবনের ১৬ এবং ২৪ বছরে আপনি স্ত্রীলোক, জল, ভুত, পর্বত এবং গোপন অংশে ব্যাথার ভয় থাকবে। যদি আপনার কৃষিকাজ বা কৃষিক্ষেত্রে আপনি দক্ষ হন তবুও ভীরু হবেন।</p> শৈলী='প্যাডিং-বাম:৮৪%'>-জন্মপ্রদীপ</b>
	RASI_PREDICTION_5							= <p>সপ্তাহে আপনার ভাগ্যবান দিন সোমবার, মঙ্গলবার এবং রবিবার। আপনি মজ্জা রোগে ভুগবেন, কম চুল, যুদ্ধ থেকে ভাগ্য, দ্বৈত স্ত্রী ও একজন বন্ধ্যা হবেন।  কোমর ব্যথা, পাকস্থলীর অনবরত ব্যাথা, ছোটখাট হার্টের সমস্যা এবং মাথায় আঘাত ব্যাপক হবে। সূর্যের উচ্চ আদেশ অনেক ভাগ্য আনে যখন সূর্যের নিম্ন আদেশ মহিলার ক্ষতি করে, জলের ক্ষতি হয় কিন্তু জমির লাভ ঘটে। জীবনের ৪র্থ ও ৮ম বছরে জ্বর ঘটবে। ২৮ তম বছর সরকারে ভয় আনবে। ৫১ বছরে ব্যাথা আনবে। ৩০ বছর যন্ত্রণাদায়ক হবে। সূর্য দ্বারা শাসিত বছরটি জীবনে ভয় আনবে।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>রম্যাক বা রমুক দর্শন বিন্দু</b> <p>জীবনের প্রথম বছরে জন্ডিসের ভয় থাকবে। ৫ম বছরে পশুপাখি ও আগুনের জন্য হাত এবং পায়ের ব্যাথা হবে। ১৩ বছরে পেটের রোগের ভয় এবং ৩২ বছরে আকস্মিক মৃত্যুর সম্ভাবনা থাকবে। ৭ বছরে জ্বরভাবযুক্ত থাকবে, ২০ বছরে সাপের ভয়, ২১ বছরে রোগের ভয় থাকবে। আপনি যুদ্ধের দিকে আনত ইচ্ছুক এবং লেবেলে আঁটা অখ্যাত ও একজন যুদ্ধবীর হবেন। ২৮ বছরে গোপন অংশে ব্যাথায় ভুগবে। অশ্বিনী নক্ষত্র, ফাল্গুনী শুক্লার ৫ম সোমবার আপনি মৃত্যু দেখবেন।</p> <b শৈলী='প্যাডিং-বাম:৯০%;'>-ইয়ভান</b> <p>জীবনের ৫ম, ১০ তম এবং ১৫ তম বছরে অস্ত্র, আগুন, জল, শ্বাস-প্রশ্বাস, চোখ এবং হার্টের ব্যাথায় ভুগবেন। ৩০ বছরে বন্য পশুপাখির ধারালো দাঁত, ধারালো নখ থেকে ভয় থাকবে। ২০ বছরে সাপের ভয় থাকবে। কালো জাদু বা জ্বরের ভয় থাকবে। আপনার সাহসী, সৎ ভোঁতা, বিরোধী নারী এবং কয়েকটি ছেলে থাকবে।</p> <b শৈলী='প্যাডিং-বাম:৮৪%'>-জন্মপ্রদীপ</b>
	RASI_PREDICTION_6							= <p>আপনার সুন্দর চোখ, লম্বা চুল, বাড়তি মজ্জা এবং ফর্সা গায়ের রঙ থাকবে। আপনি অলস হবেন যখন অন্যদের জন্য কাজ করবেন এবং দ্রুত হবেন যখন নিজের জন্য কাজ করবেন। আপনি জনপ্রিয় হবেন।</p><p> লিখন, খামার, সমাজ সেবা সম্পদ আনবে। সোমবার দুর্ভাগা প্রমাণিত। উচ্চ অবস্থান ধ্বংস হতে পারে।</p> <p>প্রথম স্ত্রী সত্যিই চমৎকার হবে। জীবনের ৪র্থ এবং ৯ম বছরে চোখের সমস্যা দেখা দ্দেবে। জীবনের ৫০ তম, ২৮ তম, ৩০ তম এবং ৪৭ তম ব্যাথায় ভুগবে। ৫০ এবং ৬০ বছরে জমি ও গাড়ী থেকে অর্থ আসবে। যদি আপনার বৃহস্পতি উপরে থাকে তবে আপনি বন্ধু থেকে লাভবান হবেন। ৩০ বছরে আপনি অর্শে ভুগবেন। আপনি বিখ্যাত পরিবার থেকে হবেন।</p> <p>জীবনের ৫ম বছরে চোখের ব্যাথা, ৩য় বছরে আগুনে ভয় এবং ২১ বছরে গাছের দেওয়াল থেকে ভয় থাকবে। আপনার gentiles এবং ঘাড়ে আঁচিল বর্তমান থাকবে। ১৩ বছরে বমির সমস্যায় ভুগবেন, ১৫ বছরে সাপের ভয়, ৩০ বছরে জঙ্গলে ভয়, সাপের অস্ত্র মৃত্যুর কারন হতে পারে।</p> <p>১৮ তম, ১২ তম এবং ৬ষ্ঠ  বছরে ব্যাথা, পাথর, মহিলা, অস্ত্র এবং আগুনে ভয় থাকবে। ৩৬ এবং ২৪ বছরে চোর ও আগুনে ভয় থাকবে। চোখেও হালকা ভয় থাকবে।</p> <p>৯০ বছর জীবন পর্যন্ত, আপনি ধার্মিক এবং প্রতিভাবান হবেন। সুন্দর চোখ, শক্তিশালী নখ, ফর্সা গায়ের রঙ, ধনী ব্যাক্তির সাথে অন্যান্য মানুষের সম্পদ এবং আপনি ভ্রাম্যমাণ হবেন।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>রম্যাক বা রমুক দর্শন বিন্দু</b>
	RASI_PREDICTION_7							= <p>আপনার সুন্দর চোখ, মুখ, উজ্জ্বল গাত্রবর্ণ এবং ভারী দাড়ি থাকবে। সরকারি কর্মচারীদের জন্য প্রেম। বুধবার, শুক্রবার এবং শনিবার ভাগ্যবান দিন হবে। সর্দি-কাশিতে ভুগবেন। পণ্যের ক্রয় এবং বিক্রয় থেকে কম সুবিধা হবে। মাথা এবং মুখ আহত হবে। যখন ৮ বছর বয়স, আপনি উচু থেকে পড়ে যেতে পারেন, এবং ভাল প্রকৃতি এবং সম্পদ  হবে। একটি গোপন পাপী, দুই স্ত্রীর সাথে একটি তীর্থযাত্রার সৃষ্টিকর্তা এবং শিক্ষিত। একজন যিনি অলস, খাদ্য শস্য মজুত করেন এবং একজন যার চুল খুব তাড়াতাড়ি সাদা হয়। যখন শুক্র থাকে উপরে তখন আপনি সুবাস লাভ করেন। আপনি একটি নদী বা পর্বতের পাশে থাকতে পছন্দ করবেন।</p> <p>আপনি ৩য়, ৮ম, ১৪, ২৬, ২৪, ৪৭, ৫৫-৬৩ বছরে শ্বাস কষ্টে ভুগবেন। সর্দি-কাশির সমস্যা থাকবে। এমনকি যখন ৮৪ বছর বয়স তখন আপনাকে তরুণ লাগবে। ৩০ তম বছরে আপনার জীবনে অন্য মহিলা আসবে। ১২ বছরে জল ভয়, ১৮ বছরে আগুনের ভয় থাকবে। ২১ বছরে গাছ বা গাড়ী থেকে সমস্যা হবে। ২০ বছরে সাপের ভয়। সাধারণত একজন ব্যবসায়ী পাতলা এবং সমৃদ্ধ হন। বৈশাখ শুক্লা দশমী, আশ্লেষ মঙ্গলবারে মৃত্যু হবে। ৭ম, ১৪ তম এবং ২০ বছরে জীবাণু ভয়, আবদ্ধ হওয়ার ভয় বা তিনটি উপাদান ভয় ব্যাপক থাকবে। ২৮ তম এবং ৪২ তম বছরে হাতি ও পাথরের ভয় থাকবে। ৬৩ তম বছরে আপনি হাত ও পা ব্যথায় ভুগবেন। আপনি অনেক সম্মান পাবেন। একটি দাতা এবং একজন ব্যবসায়ীর উচ্চে অবস্থিত চোখ, বড় মুখ থাকবে।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>-রম্যাক বা রমুক দর্শন বিন্দু</b>
	RASI_PREDICTION_8							= <p>আপনার বাড়তি মজ্জা, একটি লাল আভাযুক্ত গাত্রবর্ণ, দুধ ও দুগ্ধজাত জিনিসের জন্য ভালবাসা থাকবে। আপনার ভাগ্যবান দিন মঙ্গলবার, সোমবার এবং বুধবার দুর্ভাগ্য দিন হবে।</p>টক এবং তিক্ত জিনিস দুর্ভাগ্য আনবে। আপনি সবসময় আপনার স্বপ্ন ভুলে যাবেন। দুর্বল, সমৃদ্ধ প্রাণীদের সঙ্গে, পূর্বপুরুষ এবং যুদ্ধ অনেক টাকা আনতে পারে। আপনার শরীরে দুর্গন্ধ থাকবে, ফল থেকে লাভবান হবেন এবং জল থেকে ভয় পাবেন।</p> <p>মিথুন এবং তুলারাশি দ্বারা শাসিত মাসগুলি ক্ষতি হবে, একজন যে দেখবে দ্রুত বৃদ্ধি ও দ্রুত পতন এবং কেউ যে দ্রুত জিনিস গ্রহণ করবে।</p> <p>আপনি শত্রুদের দ্বারা বেষ্টিত একটি ভুল কার্যকর্তা হবেন। ৭ম, ১২ তম, ১৪ তম ও ২৮ তম বছর শ্বাস বিষয় আনবে। ৫৪ বছরে এবং বৃহস্পতির বছরের মধ্যে আপনার একটি প্রধান ক্ষতি হবে।</p> <p>সময়ের কাছাকাছি যখন আপনি চাঁদ দেখতে পারেন তখন আপনি লাল হলুদ জিনিস থেকে লাভ, নারী থেকে সুখ পাবেন। আপনি ৭৫ বছর বয়সে জ্বর থেকে ক্ষতিগ্রস্ত হবেন। ২৫ বছর আকস্মিক মৃত্যু ভয় আনবে। ৩৯ বছর আগুনের ভয় আনবে। আপনি অনেক শিশুর সঙ্গে সুখী হবেন।</p> <p>আপনি মারামারি করতে ভালোবাসবেন, মহিলার থেকে লজ্জা এবং বন্ধুরা বিশ্বাসঘাতকতা করবে। আপনি হাস্ত্রা নক্ষত্র, শুক্লা দশমীর বুধবার মৃত্যুর দেখা পাবেন।</p> <p>৮ম, ১৬ তম, ২৪ তম, ৪০ বছরে আপনি চোর, অগ্নি, বিষ, জ্বর দ্বারা ক্ষতিগ্রস্ত হবেন। ৩২ বছরে আপনি দাসত্ব, আঘাত এবং জীবাণু থেকে ভয় পাবেন। ৭২ বছরে জল থেকে ক্ষতিগ্রস্ত হবেন। বৃত্তাকার বুকের সাথে দৃঢ়প্রতিজ্ঞ, সম্মান নিয়ে আপনি মজ্জা থেকে মুক্ত হবেন।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>-রম্যাক বা রমুক দর্শন বিন্দু</b>
	RASI_PREDICTION_9							= <p>আপনি মজ্জা থেকে ক্ষতিগ্রস্ত হবেন, বাদামী চুল, সুন্দর চোখের সঙ্গে উজ্জ্বল গায়ের রঙ থাকবে, হাঁটু এবং হাঁটুর পিছনে ব্যথা হবে। আপনি আপনার নিজের লোকের সাথে মারামারি করবেন, মহান ভোজন রসিক, এবং পশু হত্যাকারী, তীর্থযাত্রা পরিদর্শক হবেন। ১৮ তম, ২৪ তম, ৩০ তম এবং ৪০ বছরে রোগে ভুগবেন। বৃহস্পতিবার, মঙ্গলবার এবং সোমবার অনুকুল হবে। যেখানে শনিবার প্রতিকূল হবে। আপনার তিনটি স্ত্রী থাকবে। মাঘ মাস আপনার উপযুক্ত, কর্কটের মাস প্রতিকূল।</p> <p>বৃহস্পতি যদি উচ্চে থাকে তবে কম ক্ষতি হবে। আপনার মায়ের ক্ষতি হবে, আপনি অনেক টাকা মুক্ত করবেন এবং আপনি কিছু কাজ পেতে অসুবিধার সম্মুখীন হবেন।</p> <p>যখন মূল নক্ষত্র থাকে তখন মনের সমস্যা উঠে। কর্কটের মধ্যে যখন সূর্য থাকে তখন ব্যাথা ও চামড়ার রোগ হয়। ৭ম, ১৪ তম, ১৬ তম, ২০ তম, ৩৫ এবং ২৫ বছর আঘাত ও ব্যাথা আনবে।</p> <p>লাল, হলুদ এবং সাদা পণ্য ভাগ্য আনবে। ৬৪ বছর সর্বোচ্চ বয়স সীমা। তাছাড়া প্রথম বছরে রোগ, ১৩ বছরে আকস্মিক মৃত্যু আনতে পারে। যখন আপনি যুবক তখন আপনি কম শিশুর সঙ্গে সমৃদ্ধ, পরিবারের সদস্যদের রোগ সম্পর্কে সর্বদা চিন্তিত, ত্বকের রোগের সাথে লোভপূর্ণ, ভোজন রসিক নন। আপনি আশাদ কৃষ্ণ পঞ্চমীর শুক্রবার মৃত্যু দেখবেন। ১৮, ২৭, ৯ বছর আপনি নিঃশ্বাসের সামান্য অসুস্থতা, আগুনের ভয়, শৃঙ্গযুক্ত প্রাণী এবং সমস্যাসঙ্কুল প্রাণীর ভয়ের সম্মুখীন হবেন।</p> <p>৫৪ ও ৩৬ বছরে আপনি অর্শ বা তিন ভারসাম্য রোগে ভুগবেন। রক্তের সমস্যা, মাথার সামান্য অসুখ শক্তিশালী হবে। আপনি চতুর এবং yagnas নিযুক্ত হবেন কিন্তু একটি কঠিন জীবন থাকবে।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>-রম্যাক বা রমুক দর্শন বিন্দু</b>
	RASI_PREDICTION_10							= <p>আপনি মজ্জা থেকে ক্ষতিগ্রস্ত হবেন। হাত এবং হাঁটু ব্যথা, কোমরে সমস্যার সঙ্গে সাহসী হন। বুধবার, শনিবার এবং শুক্রবার  আপনার জন্য ভাগ্যবান দিন, যখন রবিবার দুর্ভাগ্য দিন হবে।</p> <p>যখন মাঘ ভাদ্রপদ মাস এবং সিংহরাশির মধ্যে চাঁদ থাকে তখন বড় ক্ষতির সম্ভাবনা এবং সামান্য অসুস্থতা থাকবে। ৮, ১৬, ২০, ৩০,৩৪ বছর অনেক ব্যাথা আনবে।</p> <p>৪৪ ও ৫৯ বছর ব্যাথায় পূর্ণ থাকে। আপনার দুটি কুৎসিত স্ত্রী থাকবে। শনি প্রভাবিত বছরে আপনি কালো জিনিস থেকে লাভবান হবেন।একটি tattle দর্জি সম্মানিয়, সপ্তম বছরে আপনার জল ভয় থাকবে। আপনি বুদ্ধিমান হবেন। ২১ তম, ৩২ তম এবং ৫ম বছরে জ্বর হবে। ২৫ বছরে আপনি বাম দিকে আগুনের ভয় পাবেন। যখন ৩৫ বছর তখন অন্য মহিলার প্রতি আকৃষ্ট হন এবং শত্রুর ভয়ে ভীত হন। ১০-২০ বছরে চোখের সমস্যা, ত্বকের রোগ, জলের ভয় এবং প্রাণী ও অস্ত্র ভয় থাকবে। যখন ৩০ বছর তখন চোখের সমস্যা থাকবে। ৪০-৬০ বছরের মধ্যে অ্যাপেন্ডিক্স এবং মহিলা ও বিষের ভয় থাকবে। আপনি কম টাকা দিয়ে একটি জুয়াড়ি, একটি কৃপণ এবং সবসময় খারাপ লোকের সঙ্গে থাকবেন।</p> <b শৈলী='প্যাডিং-বাম:৬০%;'>-রম্যাক বা রমুক দর্শন বিন্দু</b>
	RASI_PREDICTION_11							= <p>আপনার পাকস্থলীর সমস্যা, পাকস্থলীতে পাথর, কাশি এবং সর্দি হবে। দুর্ভাগ্য দিন শুক্রবার, বুধবার ও রবিবার হবে। আপনার একটি উজ্জ্বল গাত্রবর্ণ, সুন্দর চোখ থাকবে এবং সমৃদ্ধ এবং সুখী হবেন।</p> <p>আপনি শতভিষা নক্ষত্র বা দ্বিতীয়া তিথিতে মৃত্যুর দেখা পাবেন। আপনি জিনিস সংগ্রহ করতে পছন্দ করবেন, দুটি স্ত্রী এবং স্বল্প আয়ু নিয়ে।</p> <p>আপনি পরিবারের জ্যেষ্ঠ হবেন, দরিদ্র, উজ্জ্বল গাত্রবর্ণ, একটি প্রেমময় স্ত্রী, আপনার কোমর উপর একটি চিহ্নের সাথে একটি নিঃসন্তান স্ত্রী থাকবে।</p> <p>আপনি সমুদ্র থেকে অর্থ উপার্জন করবেন। ভাগ্যবান দিনের অন্তর্ভুক্ত সোমবার, বৃহস্পতিবার, মঙ্গলবার এবং শুক্রবার ভাগ্যবান দিন না। যদি আপনার গুরু দুর্বল বা পাপ করেন তবে আপনাকে প্রার্থনা করতে হবে। যদি গুরু কম আদেশের হয় তাহলে ব্যবসায় ক্ষতি হবে। আপনি একটি ছেলের সাথে সৌভাগ্যশালী হবেন। ২, ৪, ৯ ও ১২ বছরে আপনি পাকস্থলীর সামান্য রোগে ভুগবেন। এই বছর ব্যথা আনবে এবং আপনি অসফল হবেন।</p> <p>আপনি আপনার কাজে খুব সহায়ক, অলস হবেন। ৩২, ১৯ বছর সামান্য অসুস্থতা আনবে। তিক্ত বা টক ওষুধ আপনার জন্য ভালো।</p> <p>কুম্ভরাশির মধ্যে যখন সূর্য থাকে, আপনার মিষ্টি দাঁত থাকবে, টিবিতে ভুগবেন। আপনি মিষ্টি কথা বলতে পারেন, পেশাদারী জীবনে বিশ্রামহীন হবেন। প্রথম বছরে তিনটি ভাইদের সাথে অসুস্থ হবেন এবং আপনার বাম হাতে চিহ্ন থাকবে। আপনি দুটি স্ত্রী থাকবে। ৫ম ও ৬ষ্ঠ বছরে আপনি দারিদ্র্যের সম্মুখীন হবেন। ১৫ তম বছরে আপনার অগ্নিতে ভয়, ১২ বছরে জলের এবং সাপের ভয় থাকবে। বদমেজাজি, অসচ্চরিত্র ব্যক্তি, স্বার্থপর ভারী সাকার, বিশ্রামহীন এবং কাজের মধ্যে একগুঁয়ে হবেন। আপনি একটি লম্বা ঘাড়, লম্বা উচ্চতা এবং লোমশ হবেন। চাঁদের দৃষ্টির ওপর আপনি ৮০ বছর পর্যন্ত জীবন যাপন করবেন। আপনি কৃষ্ণ ভাদ্রপদ নবমী রোহিণীতে মৃত্যুর দেখা পাবেন।</p> <p>১১ তম বছরে আপনি জল থেকে ব্যথা পাবেন; সাধারণত আপনি সবসময় জলের ভয় করবেন। যখন ১৬ বছর তখন মন্দ নারী বা অস্ত্র ভয় থাকবে। যখন ২১ বছর তখন সাপ ও অসম্মান ভয়  থাকবে। ২৫ বছরে আপনি তিনটি ভারসাম্যের সম্মুখীন হবেন এবং যখন ১১, ২২, ৩৩ বছর আপনার থাকতে হবে boils এবং বন্য প্রাণীর ভয় থাকবে। যখন ৬৬ ও ৪৪ বছর তখন আপনার দাঁত, চোখ, কানের মধ্যে সমস্যা হবে। আপনার কোমর এবং হাতের মধ্যে একটি চিহ্ন বর্তমান থাকবে। আপনি সাধারণত অন্যের 