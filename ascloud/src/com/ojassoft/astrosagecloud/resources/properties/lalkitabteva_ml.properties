
	 TEVA                       = ധർമ്മി ജാതകം#നിശാന്ധ ജാതകം #അന്ധ ജാതകം#ലഘു ജാതകം
	 DHARMI_TEVA_FALSE          = നിങ്ങളുടെ ജാതകം ധർമ്മി ജാതകമല്ല
	 DHARMI_TEVA_TRUE           = നിങ്ങളുടെ ജാതകം ധർമ്മി ജാതകമാണ്
	 RATAANDHA_TEVA_FALSE       = നിങ്ങളുടെ ജാതകം നിശാന്ധ ജാതകമല്ല
	 ANDHA_TEVA_TRUE            = നിങ്ങളുടെ ജാതകം അന്ധജാതകമാണ്
     ANDHA_TEVA_FALSE           = നിങ്ങളുടെ ജാതകം അന്ധജാതകമല്ല
	 RATAANDHA_TEVA_TRUE        = നിങ്ങളുടെ ജാതകം നിശാന്ധ ജാതകമാണ്
	 NABALIG_TEVA_TRUE          = നിങ്ങളുടെ ജാതകം ലഘു ജാതകമാണ്
     NABALIG_TEVA_FALSE         = നിങ്ങളുടെ ജാതകം ലഘു ജാതകമല്ല
     LK_DHARMI_TEVA             = ലാൽ കിതാബിൽ ചില ജാതകങ്ങളെ ധർമ്മി ജാതകങ്ങളായി കരുതുന്നു. ലാൽ കിതാബ് പ്രകാരം, രാഹു, കേതു, ശനി എന്നിവയെ അപകാരക ഗ്രഹങ്ങളായി കരുതപ്പെടുന്നു. ഒരു ജാതകം ധർമ്മിയാണെങ്കിൽ, ശനി, രാഹു, കേതു എന്നിവ പ്രതികൂല ഫലങ്ങൾ നൽകുന്നത് നിർത്തും. അവ ഗുണകരമായ ഫലങ്ങൾ തന്നില്ലെങ്കിൽ പോലും പ്രതികൂല ഫലങ്ങൾ നൽകുന്നത് നിർത്തും. <br/> നാലാം ഭാവത്തിലോ അല്ലെങ്കിൽ ജാതകത്തിൽ എവിടെയെങ്കിലും ചന്ദ്രനോടൊപ്പം രാഹുവും കേതുവും വന്നാൽ രാഹുവും കേതുവും ധർമ്മിയായി മാറും.പതിനൊന്നാം ഭാവത്തിലോ അല്ലെങ്കിൽ ജാതകത്തിൽ മറ്റെവിടെയെങ്കിലും ചന്ദ്രനോടൊപ്പമോ വന്നാൽ ശനി ധർമ്മിയായി മാറും. ഈ രണ്ടു വ്യവസ്ഥകളും നിറവേറ്റപ്പെട്ടാൽ, ആ ജാതകത്തെ ധർമ്മി റ്റേവ എന്നു പറയും.
     LK_NIGHT_BLIND_HOROSCOPE   = ലാൽ കിതാബിലെ അതുല്യമായ ആശയമാണ് നിശാന്ധത(മാലക്കണ്ണ്) ഗ്രഹങ്ങൾ.ഒരു ജാതകത്തിൽ ശനി ഏഴാം ഭാവത്തിലും സൂര്യൻ നാലാം ഭാവത്തിലും നിന്നാൽ ആ ജാതകത്തെ നിശാന്ധത എന്നു പറയും. അന്ധത ജാതകം പോലെ, നിശാന്ധത ജാതകമുള്ള ആൾ ലക്ഷ്യമില്ലാത്ത ആളായി മാറുകയും സ്വന്തമായി തീരുമാനം എടുക്കാൻ കഴിയാതിരിക്കുകയും ചെയ്യും. അയാൾ ഒരു അന്ധനെപ്പോലെ പെരുമാറും.
     LK_BLIND_HOROSCOPE         = ഒരു ജാതകത്തിൽ, പത്താം ഭാവം ഉദ്യോഗത്തിന്‍റെയും, ജോലിയുടെയും, പദവിയുടെയും, സർക്കാരിൽ നിന്നുള്ള പ്രശസ്തിയുടെയും ആനുകൂല്യങ്ങളുടെയും ഭാവമായതിനാൽ അത് ജാതകത്തിന്‍റെ അടിസ്ഥാന ഭാവമാണ്. പരസ്പര വിരുദ്ധമായ ഗ്രഹങ്ങൾ അല്ലെങ്കിൽ മോശമായി സ്ഥിതി ചെയ്യുന്ന ബലക്ഷയമുള്ള ഗ്രഹങ്ങൾ തുടങ്ങിയവ പത്താം ഭാവത്തിൽ ഉണ്ടെങ്കിൽ, എല്ലാ ഗ്രഹങ്ങൾക്കും അനുകൂല ഫലങ്ങൾ നൽകുവാൻ കഴിയുകയില്ല. ഇത്തരത്തിൽ സമ്മിശ്രണമുള്ള ജാതകത്തെ അന്ധ ജാതകം എന്നു പറയുന്നു കൂടാതെ ഇത്തരത്തിൽ ജാതകമുള്ള ആളുകൾ അന്ധനെ പോലെ അല്ലെങ്കിൽ ലക്ഷ്യമില്ലാത്തവരെ പോലെ പെരുമാറുകയും ചെയ്യും.
     LK_MINOR_HOROSCOPE         = ലാൽ കിതാബ് പ്രകാരം, ചില സാഹചര്യങ്ങളിൽ ചില ജാതകങ്ങളെ 12 വയസ്സു വരെ ബാല്യ ജാതകമായി കണക്കാക്കും. ബാല്യ ജാതകങ്ങൾ ജാതകത്തിലെ ഗ്രഹങ്ങളുടെ സ്ഥാനമനുസരിച്ചുള്ള ഫലങ്ങൾ നൽകുകയില്ല കൂടാതെ പ്രവചനാധീതമായ പെരുമാറ്റങ്ങൾ കാണിക്കുകയും ചെയ്യും. ഇത്തരത്തിൽ ജാതകമുള്ളവരുടെ ഭാവിഫലസൂചകങ്ങൾ 12 വയസ്സുവരെ വിശ്വാസയോഗ്യമായിരിക്കുകയില്ല.
