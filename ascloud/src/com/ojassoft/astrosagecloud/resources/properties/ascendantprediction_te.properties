

	 WHAT_IS_ASCENDANT				= లగ్నము అంటే ఏమిటి?
	 ASCENDANT_PREDICTION			= వేద జోతిష్యంలో లగ్న గది అనేది చాలా ముఖ్యమైనదిగా పరిగణించబడుతుంది. ఒక వ్యక్తి జనన సమయంలో, ఆకాశంలో పైకి వెళ్ళే సంకేతాన్ని లగ్నం అంటారు. మరియు, ఈ గదిలోని వచ్చు సంకేతాన్ని లగ్న సంకేతం అంటారు. ఈ లగ్నం, ఒక వ్యక్తి యొక్క వ్యక్తిగత జీవితాన్ని జ్యోతిష్యం ద్వారా సూక్ష్మాతిసూక్ష్మమైన సంఘటనలను కూడా లెక్కించుటకు సహాయపడుతుంది.  దినసరి, వారంవారం, నెలసరి మరియు సంవత్సర జోస్యాలను జన్మరాశి మరియు సూర్యరాశి ఆధారంగా చేయబడతాయి.
