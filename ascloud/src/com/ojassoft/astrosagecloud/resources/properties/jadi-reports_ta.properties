TREE_ROOT_OF_ARAND=<a href="http://buy.astrosage.com/jadi-tree-roots/arand-mool-eranda-mool?&language=hi">அரண்ட மூல்</a> தொடர்புடைய <a href="http://www.astrosage.com/hindi/planet/venus/">சுக்கிரன்</a> கிரகமாகும். வேத ஜோதிடபடி சுக்கிர கிரகம் அன்பு, பாசம், அழகு, கலை, உறவு போன்றவற்றை காரணியாக கூடும். எனவே உங்கள் ஜாதகத்தில் சுக்கிரன் நிலை கீழ் இருந்தால், நீங்கள் உயர் துறை பிரச்சனைகள் எதிர்கொள்ள வேண்டியிருக்கும். எனவே அரண்ட மூல் வேர் உங்களை சுக்கிரன் கஷ்ட்ட காலகட்டத்தில் பாதுகாப்பாக வைக்கும் மற்றும் எனவே பிறப்பு ஜாதகத்தில் சூரியன் நிலை வலுவாக இருந்தால், இந்த வேர் அதன் நல்ல பலன் விருத்தியடையும். இருப்பினும் வேர்அணிவதற்கு முன் பூர்விக எதாவது ஜோதிடரின் ஆலோசனை அவசியம் கேட்கவும். 
TREE_ROOT_OF_DHATURE=ஜோதிட சாஸ்திரப்படி<a href="http://buy.astrosage.com/jadi-tree-roots/dhaturekijad?&amp;language=hi">தாத்தூர் </a>தொடர்புடைய<a href="http://www.astrosage.com/hindi/planet/saturn/">சனி </a>கிரகமாகும். சனி  தனது நியாயம் மற்றும் மெதுவான தந்திரத்திற்கு அறிந்ததாகும். இதனால் ஜாதகக்காரருக்கு இதன் பலன் மிகவும் தாமதமாக கிடைக்கும். ஜோதிடத்தில் இவற்றை தீய கிரகம் என்று கூறப்படுகிறது.  சனி பகவனின் எதிர்மறையான காரணத்தால் ஒரு நபரின்  தொழில் மற்றும் கல்வி இழப்பு எதிர் கொள்ள வேண்டி இருக்கும். இதுமட்டுமின்றி ஒரு நபருக்கு எதாவது விசியங்களில் பயம் ஏற்பட கூடும். மனதளவில் அவர்கள் கஷ்டங்களை எதிர் கொள்ள வேண்டி இருக்கும். எனவே உங்கள் ஜாதகத்தில் சனிபகவான் நன்மை இல்லாத இடத்தில்  அமர்ந்திருந்தாள், உங்கள் அதன் விளைவான எதிர்மறையான பலன் கிடைக்கும். எனினும் இங்கு தாத்தூர் வேர் அணிவதால் அதன் தீமையான விளைவ தவிர்க்கலாம். வேரின் விளைவால் உங்களுக்கு சனி பகவானின் ஆசிர்வாதம் கிடைக்கும் அல்லது உங்களுக்கு இவற்றின் நல்ல பலன் கிடைக்கும்.



HOW_TO_USE_TREE_ROOT_OF_BEL= <ul>     <li>       வேர் கழுத்தில் அல்லது கையில் மேல் பகுதியில் அணியலாம் </li>     <li>       வேர் அணிவதற்கு முன் இவற்றை கங்கை நீர் அல்லது காய்ச்சாத பாலில்  நனைத்து புனித படுத்த வேண்டும் </li>     <li>      அதற்கு  பிறகு பகவான் சிவன் அல்லது விஷ்ணு பகபவனுக்கு வெள்ளை அல்லது சிவப்பு பூ, துவம், அகர்வார்த்தியுடன் வழிபட வேண்டும் மற்றும் சூரிய பகவானின் பீஜ் மந்திரம் "ௐ ஹ்ராஂ ஹ்ரீஂ ஹ்ரௌஂ ஸஃ ஸூர்யாய நமஃ" 108 முறை உச்சரிக்க  வேண்டும். </li>  </ul>மேற்கண்ட விதி முறை செய்தபின், வேர் ஞாயிற்றுக்கிழமை கிடைக்கும் அல்லது <a href="http://astrosage.com/hindi/nakshatra/krittika-nakshatra-characteristics.asp">கிருத்திகா </a>, <a href="http://astrosage.com/hindi/nakshatra/uttara-phalguni-nakshatra-characteristics.asp">உத்தரபால்குனி</a> மற்றும் <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">உத்தர அஸ்தா நட்சத்திரம்</a> அணியலாம்.
HOW_TO_USE_TREE_ROOT_OF_KHIRNI=<ul><li> வேர் கழுத்தில் அல்லது கையில் மேல் பகுதியில் அணியலாம் </li><li> வேர் அணிவதற்கு முன் இவற்றை கங்கை நீர் அல்லது காய்ச்சாத பாலில் நனைத்து புனித படுத்த வேண்டும் </li><li> அத்தகு பிறகு சிவன் பார்வதி கடவுளுக்கு வெள்ளை பூ, துவம், விளக்கு, அகரவர்தி வழிபட்டு சந்திர மந்திரம் "ௐ ஶ்ராஂ ஶ்ரீஂ ஶ்ரௌஂ ஸஃ சந்த்ரமஸே நமஃ" 108 முறை உச்சரிக்க வேண்டும். </li><li>மேற்கண்ட விதி முறை செய்தபின் திகள்கிழமை மற்றும் பூர்ணிமா அன்று அல்லது <a href="http://astrosage.com/hindi/nakshatra/hasta-nakshatra-characteristics.asp">ஹஸ்த</a>, <a href="http://astrosage.com/hindi/nakshatra/rohini-nakshatra-characteristics.asp">ரோகினி</a>, <a href="http://astrosage.com/hindi/nakshatra/sravana-nakshatra-characteristics.asp">சரவண நட்சத்திரம்</a> வேர் அணிய வேண்டும்</li></ul>
HOW_TO_USE_TREE_ROOT_OF_ANANTMOOL=<ul><li>வேர் கழுத்தில் அல்லது கையில் மேல் பகுதியில் அணியலாம் </li><li>வேர் அணிவதற்கு முன் இவற்றை கங்கை நீர் அல்லது காய்ச்சாத பாலில் நனைத்து புனித படுத்த வேண்டும் </li><li>இதற்கு பிறகு ஹனுமான் பகவானுக்கு சிவப்பு பூ, துவம், விளக்கு, அகரவர்தி வழிபட்டு "ௐ க்ராஂ க்ரீஂ க்ரௌஂ ஸஃ பௌமாய நமஃ" மந்திரம் 108 முறை உச்சரிக்க வேண்டும்</li></ul>இந்த  விதி முறை செய்த பின் வேரை செவ்வாய் கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/mrigasira-nakshatra-characteristics.asp">மிருகசீருடம்</a>, <a href="http://astrosage.com/hindi/nakshatra/chitra-nakshatra-characteristics.asp">சித்திரை</a>, <a href="http://astrosage.com/hindi/nakshatra/dhanishta-nakshatra-characteristics.asp">அவிட்டம்</a>அதை அணிவது நல்லது.
