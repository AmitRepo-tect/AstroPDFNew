HOW_TO_USE_TREE_ROOT_OF_SHARPUNKHA=<ul><li>வேர் கழுத்தில் அல்லது கையில் மேல் பகுதியில் அணியலாம் </li><li>வேர் அணிவதற்கு முன் இவற்றை கங்கை நீர் அல்லது காய்ச்சாத பாலில் நனைத்து புனித படுத்த வேண்டும் </li><li>அதற்கு பிறகு லக்ஷ்மி தேவிக்கு வெள்ளை பூ, விளக்கு, அகரவர்தி வழிபட்டு "ௐ த்ராஂ த்ரீஂ த்ரௌஂ ஸஃ ஶுக்ராய நமஃ" மந்திரத்தை 108 முறை உச்சரிக்க வேண்டும் </li><li>இதைச் செய்து முடித்த பின் வெள்ளிக்கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/bharani-nakshatra-characteristics.asp">பரணி</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-phalguni-nakshatra-characteristics.asp">பூரம்</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-shadha-nakshatra-characteristics.asp">பூராடம் நட்சத்திரம்</a> அணிய வேண்டும் </li></ul>
HOW_TO_USE_TREE_ROOT_OF_BICHUA=<ul><li>வேர் கழுத்தில் அல்லது கையில் மேல் பகுதியில் அணியலாம் </li><li>வேர் அணிவதற்கு முன் இவற்றை கங்கை நீர் அல்லது காய்ச்சாத பாலில் நனைத்து புனித படுத்த வேண்டும் </li><li>இதற்கு  பிறகு பைரவ பகவானுக்கு கருப்பு எள், துவம், அகரவர்தி வழிபட்டு சனி மந்திரம் "ௐ ப்ராஂ ப்ரீஂ ப்ரௌஂ ஸஃ ஶநைஶ்சராய நமஃ" 108 முறை  உச்சரிக்க வேண்டும் </li></ul>பிறகு சனி கிழமை சூரிய அஸ்தமனத்திற்கு பிறகு அல்லது<a href="http://astrosage.com/hindi/nakshatra/pushya-nakshatra-characteristics.asp">பூசம்</a>, <a href="http://astrosage.com/hindi/nakshatra/anuradha-nakshatra-characteristics.asp">அனுஷம்</a>, <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">உத்திராடம் நட்சத்திரம்</a> வேர் அணிவதால் நன்மை தரும்.
HOW_TO_USE_TREE_ROOT_OF_CHANDAN=<ul><li>வேர் கழுத்தில் அல்லது கையில் மேல் பகுதியில் அணியலாம் </li><li>வேர் அணிவதற்கு முன் இவற்றை கங்கை நீர் அல்லது காய்ச்சாத பாலில் நனைத்து புனித படுத்த வேண்டும்</li><li>இதற்கு பிறகு துர்கா தேவிக்கு சிவப்பு சந்தானம் வெள்ளை பூ, விளக்கு, அகரவர்தி வழிபட்டு ராகு மந்திரத்தை "ௐ ப்ராஂ ப்ரீஂ ப்ரௌஂ ஸஃ ராஹவே நமஃ" 108 முறை உச்சரிக்க வேண்டும்</li></ul>இதைச் செய்து முடித்த பின் சனிக்கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/swati-nakshatra-characteristics.asp">சுவாதி</a>, <a href="http://astrosage.com/hindi/nakshatra/satabishak-nakshatra-characteristics.asp">சதயம்</a>, <a href="http://astrosage.com/hindi/nakshatra/ardra-nakshatra-characteristics.asp">திருவாதிரை நட்சத்திரம்</a> வேரை அணிவது உங்களுக்கு நன்மை தரும்.
HOW_TO_USE_TREE_ROOT_OF_ASHWAGANDHA=<ul>   <li>  <a href=""http://buy.astrosage.com/jadi-tree-roots/ashwagandha-mool-asgandh-mool"">அஸ்வகங்கா </a>, கேது கிரகத்திற்காக அஸ்வகங்கா வேர் கழுத்தை சுற்றி அணிவது அல்லது காலில் கட்டலாம் </li>     <li> வேர் அணிவதற்கு முன் இவற்றை கங்கை நீர் அல்லது காய்ச்சாத பாலில் மூழ்க வைக்க வேண்டும் </li> <li>  கணேஷ் பகவானுக்கு துருவ மற்றும் அகர்பத்தி வழிபாட்டு கேதுவின் இந்த மந்திரத்தை 108 முறை உச்சரிக்கவும் ""ஓம் ஸ்ராஂ ஸ்ரீஂ ஸ்ரௌஂ ஸஃ கேதவே நமஃ"" </li>     <li> இவை அனைத்தும் செய்த பின் ,நீங்கள் இவற்றை புதன்கிழமை அல்லது சனிக்கிழமை அல்லது அஷ்வினி, மாக மற்றும் வேர் நட்சத்திரம் நேரத்தில் அணியலாம் </li> </ul>
