
JADI_SUGGESTION_REPORT=இந்த உலகத்தில் ஒவ்வொரு  நபரும் மகிழ்ச்சிகவும் மற்றும் புன்னகையுடன் வாழ விரும்புகிறார்கள் மற்றும் உங்களின் விருப்பமும் இதுவாக தான் இருக்கும். உங்கள் இந்த கனவு  முழுமையாக நிறைவேற நீங்கள் என்ன என்ன முயற்சி செய்கிறீர்கள். இதற்கு பிறகும் உங்கள் கனவு நிறைவேறாமல்இருக்கும். ஆனால் எங்களிடம் உங்கள் கனவுகள் நிரந்தரமாக முழுமையடைய பரிகாரம்   இருக்கிறது - வேர் பரிந்துரைஅறிக்கை, இந்த அறிக்கையின் மூலம் நங்கள் உங்களுக்கு எந்த வேரை பயன் படுத்துவதால் உங்கள் பிரச்சனைக்கு தீர்வு கிடைக்கும் என்று கூறுகிறோம்.                   
JADI_AND_ITS_IMPORTANCE=  நமது வாழ்க்கையில் வேர் மற்றும் செடி முக்கியமானது ஒன்றாகும். ஏனென்றால் இந்த செடி மற்றும் மரத்தின் காரணத்தால் தான் உலகத்தில் வாழ்வது சாத்தியமாகும். அறிவியல் படி மரம் மற்றும் செடி பிராணவாயு (ஆக்ஸிஜன்) தருகிறது மற்றும்  கரிவளி (கார்பன் டை ஆக்சைடு) எடுத்து கொள்கிறது. நாம் அறிவோம் ஆக்ஸிஜன் நமக்கு பிராணவாயு, இவற்றை இல்லாமல் நாம் உயிர்வாழ முடியாது. வேரின் இந்த முக்கியத்துவத்தை அறிந்து இந்து மத வாழ்க்கையின் தொடரப்பட்டது. இந்து மதத்தினர் மரம் மற்றும் செடிகள் புனிதமானதாக கருதி பூஜைவழிபாடுகள் செய்கிறார்கள்.  மருத்துவத்திற்கும் பண்டை காலத்திலிருந்து மரம் மற்றும் செடி கொடிகளை பயன்பாடுத்தி வருகின்றனர். இதனால் ஜோதிட சாஸ்திரத்தில் வேர்களுக்கு முக்கியத்துவம் கொடுக்க படுகிறது. ஜோதிடத்தில் வேர் வெவ்வேறு கிரகத்தின் பரிகாரமாக இருக்கிறது. எனவே உங்களுடைய<a href="http://hindi.astrosage.com/free/hindi-kundli.asp"> பிறப்பு ஜாதகம்</a> எதாவது கிரகத்தின் தசா தீமையாக இருந்தால் வேரின் மூலம் அவர்களின் எதிர்மறையான விளைவை தவிர்க்கலாம்.  வேத ஜோதிடப்படி ஒன்பது கிரகத்தின் ஒன்பது விதமான மரத்தின் வேர்களை கொண்டது. ஜோதிடத்தில் முக்கியமாக ஏழு பெரிய கிரகமாகும், இருப்பினும் ராகு மற்றும் கேது இரண்டும் நிழல் கிரகத்தின் வகையில் வருகின்றன.  வேர்கள் சுற்று சூழலை பசுமையாக இருக்க உதவுகிறது. இவற்றை அணிவதால் ஒருநபரின் அதிர்ஷ்டமான லாபம் பெறுகின்றனர். இருப்பினும் வேர் பிறப்பு ஜாதகத்தின் அடிப்படையில் அணிய வேண்டும். இந்து ஜோதிடத்தில் வேர் <a href="http://horoscope.astrosage.com/hindi/ratna-jyotish/"> ரத்தினம் </a>  மாற்றமாக கருதப்படுகிறது. எனவே வேர் ஜோதிட விதி அடிப்படையில் அணிவதால் ஜாதகக்காரர்களுக்கு இவற்றின் ஒவ்வொரு விதமான பலன் அடைவிரகள். வேர் ரத்தினத்தை விட அதிகமாக சக்திவாய்ந்தக இருக்கும். இருப்பினும் ரத்தினம் அதிக விலை கொண்டதாகும், இவற்றைஅணிவது அனைவராலும் முடியாது. கிரகத்தின் தீய விளைவின் காரணத்தால் பலவீனமாக அல்லது மனதில் நினைத்த பலன் அடைவதற்கு வேரை அணியலாம்.  
RECOMMENDATIONS=நமது சுற்று சூழலில் பலவிதமான வேர்கள் கண்டு பிடிக்க பட்டுள்ளது, அவற்றை சிறப்பான நோக்கம் மற்றும் லாபத்திற்காக அணியபடுகிறது. இவற்றில் உங்களுக்கு எந்த வேர் உபயோகமாக இருக்கும்? இந்த கேள்விக்கு பதில் உங்கள் பிறப்பு ஜாதகத்தின் அடிப்படையில் உங்களுக்கு கிடைக்கும். இதற்காக நீங்கள் ஜோதிட  ஆலோசனை பெற அவசியமகும். வேர் அணிவதற்கு ஆலோசனை பெறுவதால் உங்களுக்கு அவற்றின் விளைவை அறிவீர்கள். நாங்கள் உங்களுக்கு எந்த வேர் எந்த கிரகத்திற்கு பயன்படுகிறது என்று தெரியபடுத்துகிறோம். 
IMPORTANCE_OF_NATURAL_JADI = இன்றய காலகட்டத்தில் சந்தையில் தரமற்ற வேர்கள் கிடைக்கின்றன. ஏனென்றால் சந்தையில் போலியான வேர் விற்க்கப்படுகிறது. கவனத்தில் கொள்ளவும், போலியான வேர் மற்றும் உண்மையான வேர் நடுத்தர மக்களால் அவற்றின் தரத்தை கண்டுபிடிப்பது மிகவும் கடினமாகும் மற்றும் ஜோதிட பார்வையில் போலியான வேர்களுக்கு எந்த முக்கியத்துவமும் கிடையாத. ஆனால் எங்களிடம் 100 சதவீதம் தரமான மற்றும் சுத்தமான வேர் உள்ளது, இவற்றை அணிவதால் நீங்கள் ஜோதிடத்தின் லாபம் பலன்கள் அடையக்கூடும். எங்கள் வேரை ஆராய்ச்சி கூடத்தில் தரமானதாக அங்கீகாரம் வழங்கபட்டுள்ளது. 


TREE_ROOT_OF_BEL= <a href="http://buy.astrosage.com/jadi-tree-roots/belmool?&language=hi"> பெல் மூல்</a> का संबंध <a href="http://www.astrosage.com/hindi/planet/sun/"> சூரியன்</a> கிரகத்தின். ஜோதிட படி அணைத்து கிரகத்திலும் சூரியன் முக்கியமான இடம் வகிக்கிறது. இதனால் ஆத்ம, ஆளுமை, அரசாங்கம் மற்றும் கீழ் உள்ளவர்களுக்கு உயர் காரணியாக நம்பப்படுகிறது. எனவே உங்கள் ஜாதகத்தில் சூரியன் தீமையான இடத்தில் அமர்ந்திருந்தாள், இதன் எதிர்மறையான விளைவை தவிர்க்க பெல் மூல் அணிய வேண்டும். இதன் விளைவால் சூரியன் நிலை மிகவும் வலுவாக இருக்கும் மற்றும் ஜாதகக்கரர்களுக்கு நல்ல பலன் கிடைக்கும். எனவே நீங்கள் சமூகத்தில் மரியாதை, கவுரவமான பதவி பெற விரும்பினால், இந்த வேரின் மூலம் நீங்கள் மனதில் நினைத்த பலன் அடைவீர்கள். 
TREE_ROOT_OF_KHIRNI=வேத ஜோதிடபடி கிராணி வேர்<a href="http://www.astrosage.com/hindi/planet/moon/"> சந்திர கிரக </a> அமைதிக்காக அணிய படுகிறது. ஜோதிடத்தில் சந்திரன் நமது மனதின் காரணியாகும். இதனால் இந்த கிரகம் நமக்கு மிகவும் முக்கியமான கிரகமாகும். எனவே எந்த நபரின் மனம் மகிழ்ச்சியாக இருக்க, அவர்கள் உலகத்தில் ஒவ்வொரு விசியங்களிலும் மகிழ்ச்சி தேடி கொள் இருக்கிறார்கள் என கூறப்படுகிறது. ஒரு நபரின்  வாழ்கை மகிழ்ச்சிக இருக்க ஆரோக்கியமாக இருக்க அவசியம். எனவே நீங்கள் இந்த வேரை அணிந்தால், நீங்கள் மனதளவில் மிகவும் அரேயோக்கியமாக இருப்பீர்கள் மற்றும் உங்கள் மனதில் எந்தவிதமான மன உளைச்சலும் இருக்காது. உங்கள் மனதை மிகவும் உறுதியாக வைத்து கொள்ள கிராணி வேர் மிகவும் லாபகரமாக இருக்கும். இதன் விளைவாக உங்களுக்கு மன அழுத்தம், அழுத்தம் போன்றவற்றில் விடை கிடைக்கும். 
TREE_ROOT_OF_ANANTMOOL=வேத ஜோதிட படி<a href="http://buy.astrosage.com/jadi-tree-roots/anantmool?&language=hi"> ஆனந்ட் மூல்</a>தொடர்புடைய<a href="http://www.astrosage.com/hindi/planet/mars/"> செவ்வாய் கிரக </a> இருந்து. செவ்வாய் கிரகத்தின் உற்சாகம், தைரியம், ஆர்வம் மற்றும் பலசாலியன காரணியாக நம்பப்படுகிறது. செவ்வாய் கிரகம் இராணுவம், காவலர் மற்றும் உயர்அதிகாரி பதவியை குறிப்பிடுகிறது. செவ்வாய் கிரகம் ஆரம்பத்திலிருந்து உங்களுக்கு சண்டையிடும் சக்தியை கொடுக்கிறது அல்லது போட்டிகளில் வெற்றியை தருகிறது. எனவே உங்கள் பிறப்பு ஜாதகம் தீமையான இடத்தில் அமர்ந்திருந்தாள், அவற்றின் எதிர்மறையான விளைவை தவிர்க ஆனந்ட் மூல் வேர் அணிய வேண்டும். இந்த வேர் செவ்வாயிக்கு நன்மையான விளைவை ஏற்படுத்துகிறது. இந்த வேரை அணிவதால் ஒரு நபரின் திறமை அதிகரிக்கிறது மற்றும் மிக தைரியமாக வேலை செய்கிறார்கள். எனவே நீங்கள் எதாவது போட்டி தேர்வுக்கு தயாராகி கொண்டு இருக்கிறீர்கள் என்றால், இந்த வேர் உங்களுக்கு மிகவும் உதவிகரமாக இருக்ககூடும். 
TREE_ROOT_OF_VIDHARA=<a href="http://buy.astrosage.com/jadi-tree-roots/vidhara-mool?&amp;language=hi">விதர மூல்</a> தொடர்புடைய<a href="http://www.astrosage.com/hindi/planet/mercury/">புதன்</a> கிரகத்திலிருந்து. ஜோதிட சாஸ்திரப்படி புதன் கிரகம் தொழிநுட்ப, புத்திசாலி, கணிப்பு, கணக்கு போன்றவற்றின் காரணியாகும். இதனால் எனவே நீங்கள் உயர் பதவியில் எதாவது பிரச்சனைகள் எதிர் கொண்டிருந்தாள், நீங்கள் விதர மூல் அணிய வேண்டும். ரத்தினம் போலவே வேரும் இடையூறு ஏற்படுத்தாது. இந்த வேர் விளைவால் உஙகள் சுய நடைமுறையில் மிகவும் மாற்றம் காணப்படும் மற்றும் மிகவும் அதிகமான முன்னேற்ற சக்தி விருத்தியடையும். எனவே உங்கள் பிறப்பு ஜாதகத்தில் புதன் பலவீனமன நிலையில் இருந்தால், அதன் எதிர்மறையான விளைவை தவிர்க விதர மூல் வேரை அணிவது மிகவும் அவசியம்.   
TREE_ROOT_OF_BANANA=வேத ஜோதிடபடி வாழையின் வேர்<a href="http://www.astrosage.com/hindi/planet/jupiter/">குரு</a> கிரகத்தின் சின்னமாக கூறப்படுகிறது. குரு கிரகம் புத்திசாலி, குடும்பம் மற்றும் குழந்தைகளின் காரணியாகும். எனவே உங்கள் பிறப்பு ஜாதகத்தில் குருவின் இருப்பிடம் பலவீனமாக இருந்தால், வாழை வேர் உங்கள் கஷ்ட கலகட்டத்திலிருந்து காப்பாற்றும்.  இருப்பினும் குரு கிரக மட்டும்தான்  பலவீனமாக இருந்தாலும் ஒரு நபரின் மீது இதன் எதிர்மறையான விளைவு ஏற்படுத்தாது. எனவே  நீங்கள் திருமணம் ஆனவராக, குழந்தைகள் மற்றும் அறிவு போன்ற பிரச்சனைகள் எதிர்கொண்டிருந்தாள் நீங்கள் வாழை வேர் அணியலாம். 
TREE_ROOT_OF_SHARPUNKHA=ஷார்ப்புங்க வேர் தொடர்பு<a href="http://www.astrosage.com/hindi/planet/venus/"> சுக்கிரன்</a> கிரகத்தில் இருக்கிறது. வேத ஜோதிடபடி சுக்கிர கிரகம் அன்பு, பாசம், அழகு, கலை, உறவு போன்றவற்றை காரணியாக கூடும். எனவே உங்கள் ஜாதகத்தில் சுக்கிரன் நிலை கீழ் இருந்தால், நீங்கள் உயர் துறை பிரச்சனைகள் எதிர்கொள்ள வேண்டியிருக்கும். எனவே ஷார்ப்புங்க வேர் உங்களை சுக்கிரன் கஷ்ட்ட காலகட்டத்தில் பாதுகாப்பாக வைக்கும் மற்றும் எனவே பிறப்பு ஜாதகத்தில்சூரியன் நிலை வலுவாக இருந்தால், இந்த வேர் அதன் நல்ல பலன் விருத்தியடையும். இருப்பினும் வேர்அணிவதற்கு முன் பூர்விக எதாவது ஜோதிடரின் ஆலோசனை அவசியம் கேட்கவும். 
TREE_ROOT_OF_BICHUA=ஜோதிட சாஸ்திரப்படி பீச்சு மற்றும் தத்தூர் வேர் தொடர்புடைய <a href="http://www.astrosage.com/hindi/planet/saturn/"> சனி </a> கிரகமாகும். சனி  தனது நியாயம் மற்றும் மெதுவான தந்திரத்திற்கு அறிந்ததாகும். இதனால் ஜாதகக்காரருக்கு இதன் பலன் மிகவும் தாமதமாக கிடைக்கும். ஜோதிடத்தில் இவற்றை தீய கிரகம் என்று கூறப்படுகிறது.  சனி பகவனின் எதிர்மறையான காரணத்தால் ஒரு நபரின்  தொழில் மற்றும் கல்வி இழப்பு எதிர் கொள்ள வேண்டி இருக்கும். இதுமட்டுமின்றி ஒரு நபருக்கு எதாவது விசியங்களில் பயம் ஏற்பட கூடும். மனதளவில் அவர்கள் கஷ்டங்களை எதிர் கொள்ள வேண்டி இருக்கும். எனவே உங்கள் ஜாதகத்தில் சனிபகவான் நன்மை இல்லாத இடத்தில்  அமர்ந்திருந்தாள், உங்கள் அதன் விளைவான எதிர்மறையான பலன் கிடைக்கும். எனினும் இங்கு பீச்சு வேர் அல்லது தாத்தூர் வேர் அணிவதால் அதன் தீமையான விளைவ தவிர்க்கலாம். வேரின் விளைவால் உங்களுக்கு சனி பகவானின் ஆசிர்வாதம் கிடைக்கும் அல்லது உங்களுக்கு இவற்றின் நல்ல பலன் கிடைக்கும்.         
