 YANTRA_TEXT6 = നിങ്ങളുടെ മൂലസംഖ്യ 6 ആയതിനാൽ, ശുക്രനാണ് നിങ്ങളുടെ അധിപ ഗ്രഹം. ശുക്രനെ പ്രീതിപ്പെടുത്തുന്നതിനും, അനുകൂലഫലങ്ങൾ നേടുന്നതിനുമായി വെള്ളിയാഴ്ച ശുക്ര ഹോറ മുഹൂർത്തത്തിൽ, ഭരണി, ഉത്രം, പൂരാടം തുടങ്ങിയ നക്ഷത്രത്തിലും ശുക്ര യന്ത്രം ധരിക്കുക.
 YANTRA_TEXT7 = കേതുവാണ് മൂല സംഖ്യ 7ന്റെ അധിപൻ. അതിനാൽ, കേതുവിന്റെ കൃപക്കും, അനുകൂലമായ ഫലങ്ങൾ കൈവരിക്കുന്നതിനുമായി കേതു യന്ത്രം, ചൊവ്വാഴ്ച, കേതു നക്ഷത്രമായ അശ്വതി, മകം, മൂലം നക്ഷത്രങ്ങളിൽ കൈയിൽ സൂക്ഷിക്കുക. 
 YANTRA_TEXT8 = നിങ്ങളുടെ മൂല സംഖ്യ 8 ആണെങ്കിൽ, ശനിയാണ് നിങ്ങളുടെ ഗ്രഹം. ശുഭകരമായ അനുഗ്രഹങ്ങളും, അനുകൂലമായ നേട്ടങ്ങളും കൈവരിക്കുന്നതിന്, ശനി യന്ത്രം, ഹോറ മുഹൂർത്തത്തിലും, പൂയം, അനിഴം, ഉത്രട്ടാതി നക്ഷത്രങ്ങളിലും കൈയിൽ സൂക്ഷിക്കുക.
 YANTRA_TEXT9 = നിങ്ങളുടെ മൂല സംഖ്യ സമഗ്രമായ 9 ആണ്, അതായത് നിങ്ങളുടെ അധിപ ഗ്രഹം ചൊവ്വ ആണ്. അനുകൂലമായ ഫലങ്ങൾ കൈവരിക്കുന്നതിനും കൃപക്കുമായി ചൊവ്വ യന്ത്രം ഹോറ മുഹൂർത്തത്തിൽ, ചൊവ്വയുടെ നക്ഷത്ര ദിവസങ്ങളിലും അതായത് മകയീരം, ചിത്തിര, അവിട്ടം എന്നി ദിവസം കൈയിൽ സൂക്ഷിക്കേണ്ടതാണ്.
 MASTER_NUMBER_TEXT = സംഖ്യാശാസ്ത്ര പഠനമനുസരിച്ച് രണ്ട് പ്രത്യേക സംഖ്യക്കുള്ളിൽ പ്രത്യേക ഊർജ്ജം അടങ്ങിയിരിക്കുന്നു. അവയെ മാസ്റ്റർ നമ്പറുകൾ എന്ന് അറിയപ്പെടുന്നു, അവ 11 ഉം 22 ഉം ആണ്. അത്തരം ആളുകൾക്ക് വിസ്‌മയിപ്പിക്കുന്ന ശക്തിയും കഴിവും ഉണ്ടായിരിക്കും.
 MASTER_NUMBER_TEXT11 = നിങ്ങളുടെ മാസ്റ്റർ നമ്പർ 11 ആണ്, അതിനാൽ, നിങ്ങളുടെ അന്തര്‍ജ്ഞാന കഴിവുകൾ അദ്ഭുതകരമാണ്. നിങ്ങൾക്ക് ഭാവനയും സർഗാത്മകതയും മാത്രമല്ല, നിങ്ങൾക്ക് വലിയ കാര്യങ്ങളും നോക്കികാണാനുള്ള കഴിവുണ്ടാവുന്നതാണ്. അതിനുപുറമേ, നിങ്ങൾ ഒരു നിശ്ചിത അളവിൽ അപ്രായോഗികമാണ്. നിങ്ങൾക്ക് നല്ല നേതൃഗുണം ഉണ്ട്, മറ്റുള്ളവരെ പ്രോത്സാഹിപ്പിക്കുന്നതിന് നിങ്ങൾക്ക് കഴിവുണ്ടായിരിക്കും. എന്നാൽ, നിങ്ങളുടെ ലക്ഷ്യങ്ങളിൽ സ്വയം ശ്രദ്ധ കേന്ദ്രീകരിച്ചിട്ടില്ലെങ്കിൽ, നിങ്ങളുടെ ജീവിതത്തിൽ ഭീതിയുടെ ഒരു പരിതസ്ഥിതി ചുറ്റുമുണ്ടാകും. നിങ്ങളുടെ കഴിവുകളിൽ വിശ്വസിക്കുകയും സാമൂഹ്യ ക്ഷേമത്തിനായി പ്രവർത്തിക്കുകയും ചെയ്യുക, ഈ കഥാപാത്രത്തിലേക്ക് നിങ്ങളല്ലാതെ വേറെ ആരും യോജിക്കില്ല എന്ന് നിങ്ങൾക്ക് സ്വയം മനസ്സിലാവും. ഈ നമ്പർ ഒരു മാനസിക സംഖ്യയാണ്.
 MASTER_NUMBER_TEXT22 = നിങ്ങളുടെ മാസ്റ്റർ നമ്പർ 22 ആണ്, അത് സംഖ്യ ശാസ്ത്രത്തിലെ ഏറ്റവും ശക്തമായ സംഖ്യയാണ്. നിങ്ങളുടെ സ്വപ്നങ്ങളെയും ആഗ്രഹങ്ങളെയും യാഥാർത്ഥ്യത്തിലേക്ക് പരിവർത്തനം ചെയ്യാനുള്ള കഴിവ് നിങ്ങൾക്കുണ്ട്. വലിയ ആശയങ്ങൾ, ഉയർന്ന ചിന്തകൾ, നല്ല തീരുമാനമെടുക്കാനുള്ള കഴിവുകൾ, നേതൃത്വ ഗുണങ്ങൾ, അന്തര്‍ജ്ഞാന കഴിവും, പ്രായോഗികതയും നിങ്ങൾക്കുള്ളിൽ ഉണ്ട്. നിങ്ങൾ പലപ്പോഴും നിങ്ങളിൽ കൂടുതൽ ശ്രദ്ധ ചെലുത്തേണ്ടതുണ്ട്, എന്നിരുന്നാലും, നിങ്ങൾ ഒരു മഹത്തായ ഉദ്ദേശ്യത്തിനായി ജനിച്ചതാനെന്നും സമൂഹത്തിന് വേണ്ടി ഒരുപാട് കാര്യങ്ങൾ ചെയ്യാനുണ്ടെന്നും ഓർക്കേണ്ടതാണ്. നിങ്ങളുടെ ജീവിതത്തിലെ ആദ്യഘട്ടങ്ങളിൽ അനേകം തടസ്സങ്ങൾ നേരിടേണ്ടിവന്നു, എന്നാൽ നിങ്ങളെ ശക്തരാക്കാനായിരുന്നു.  അതുകൊണ്ടു തന്നെ, നിങ്ങളുടെ  വ്യക്തിപരമായ ലക്ഷ്യങ്ങൾക്കും, മോഹങ്ങൾക്കും മീതെ ഉയരുമെന്നും അത് സമൂഹത്തിന്റെ മെച്ചത്തിന് വേണ്ടിയായിരിക്കുമെന്നും നിങ്ങൾ ഉറപ്പുവരുത്തണം. ഈ യുഗത്തിലെ ശക്തമായ ഒരു മാറ്റത്തിന് ഉത്തേജനം നൽകുന്ന ഒരാളാണ് നിങ്ങൾ.
 KARMIC_NUMBER_TEXT = നമ്മുടെ ഭൂതകാലജീവിതത്തിന്റെ പ്രവർത്തനങ്ങളെ സൂചിപ്പിക്കുന്ന ചില നമ്പറുകൾ സംഖ്യാശാസ്ത്രത്തിൽ സൂചിപ്പിക്കുന്നു. നമ്മുടെ ഈ പ്രവൃത്തികളാണ് നമ്മുടെ നാല് പ്രത്യേക നമ്പറുകളിലെ ജനനത്തിന് കാരണമാകുന്നത്. അത്തരം ആളുകളുടെ പ്രധാന ലക്ഷ്യം അവരുടെ കർമ്മത്തിന്റെയും കടപ്പാടിന്റെയും കടം തിരിച്ചടയ്ക്കുക എന്നതാണ്. ഈ കർമ്മ സംഖ്യകൾ 13, 14, 16, 19 എന്നിവയാണ്.
 KARMIC_NUMBER_TEXT13 = ഈ നമ്പറനുസരിച്ച് ജനിച്ചതുകൊണ്ട്, വിജയം നേടാനായി നിങ്ങൾ ജീവിതത്തിൽ കൂടുതൽ കഠിനമായി പ്രവർത്തിക്കേണ്ടതുണ്ട്. കർമ്മ സംഖ്യ 13 ന്റെ നേരിട്ടുള്ള സ്വാധീനം എന്ന നിലയിൽ, നിങ്ങളുടെ വഴിയിൽ തടസ്സങ്ങളെ നിങ്ങൾ തുടർച്ചയായി നേരിടും. ഇതുമൂലം നിങ്ങൾ പലപ്പോഴും അസ്വസ്ഥനാകുകയും നിങ്ങളുടെ പരിശ്രമങ്ങൾ പാഴായിപ്പോകുകയാണെന്ന് തോന്നുകയും ചെയ്യും. നിങ്ങൾ പ്രശ്നങ്ങളെ നേരിടാതെ തന്നെ ഈ വെല്ലുവിളികളെ തരണം ചെയ്യാൻ തനിക്ക് കഴിയുകയില്ല എന്ന് വിചാരിച്ചിരിക്കും. നിങ്ങൾ അലസനും അശുഭാപ്തി വിശ്വസ്തരും ആയിത്തീരും. എന്നാൽ, എല്ലായ്പോഴും എല്ലാ കാര്യവും ഒരേരീതിയിൽ തുടരില്ല എന്നത് നിങ്ങൾ ഓർക്കേണ്ടതാണ്. നിങ്ങളുടെ പരിശ്രമങ്ങൾ പാഴാകാൻ പോകുന്നില്ല, പക്ഷേ നിങ്ങൾ കഠിനമായി അദ്ധ്വാനിക്കുകയും, പരിശ്രമിക്കുകയും ചെയ്യേണ്ടതാണ് കാരണം ഇത് നിങ്ങളുടെ കർമ്മത്തിന്റെ കടം ആണ്. നിങ്ങളുടേതായ പ്രയത്നത്തിൽ നിങ്ങൾ വിജയിക്കുകയാണെങ്കിൽ, ജീവിതത്തിന്റെ വിവിധ മേഖലകളിൽ നിങ്ങൾക്ക് ഉന്നത ഉയരം തൊടാൻ കഴിയും.
 KARMIC_NUMBER_TEXT14 = ഈ നമ്പരിനനുസരിച്ച് ജനിച്ചതുകൊണ്ട്, നിങ്ങളുടെ ജീവിതരീതിയെ പെട്ടെന്ന് മാറ്റിമറിക്കുന്ന അനുഭവങ്ങൾ  ഉണ്ടാവുകയും അത് നിങ്ങളുടെ ജീവിതത്തിൽ മാറ്റങ്ങൾ കൊണ്ടുവരുകയും ചെയ്യും. മദ്യം, കാമാസക്തി തുടങ്ങിയ പ്രവർത്തനങ്ങൾ നിങ്ങൾ താൽപ്പര്യം പ്രകടിപ്പിക്കുകയും , ഇത് നിങ്ങൾക്ക് പ്രശ്നങ്ങൾക്ക് കാരണമാകുകയും ചെയ്യും. ഇവയെല്ലാം മറികടക്കാൻ, നിങ്ങൾ സ്വയം ഒരു പ്രതിബദ്ധത ഉണ്ടാക്കണം. നിങ്ങളുടെ ജീവിതം ഒരു കളിക്കളമാണെന്ന ഒരു നിലപാട് സ്വീകരിച്ച് ശക്തമായതും വിഷമകരവുമായ അവസ്ഥക്കെതിരെ പൊരുതുകയാണെങ്കിൽ, നിങ്ങൾഈ പ്രശ്നങ്ങളിൽ നിന്ന് സുരക്ഷിതരായിത്തീരുകയും ആവശ്യമുള്ള വിജയം കൈവരിക്കുകയും ചെയ്യും.
 KARMIC_NUMBER_TEXT16 = ഈ നമ്പരിനനുസരിച്ച് ജനിച്ചതിനാൽ, നിങ്ങളുടെ അഹന്ത പലപ്പോഴും നിങ്ങൾ ഉപേക്ഷിക്കേണ്ടിവരും, ഈ ജീവിതത്തിൽ നിങ്ങൾ പഠിക്കേണ്ട പാഠമാണിത്. ഈ പ്രക്രിയ, നിങ്ങൾക്കായി ശുദ്ധീകരണത്തിന്റെ ഒരു ഭാഗമാണ്. നിങ്ങളുടെ അഹന്ത നിയന്ത്രിക്കുക, ഇത് നിങ്ങളെ നിരാശപ്പെടുത്തുമ്പോൾ നിരാശപ്പെടരുത്, കാരണം ഈ പോരാട്ടം നിങ്ങൾക്ക് ഭാവിയിൽ വിജയം കൈവരിക്കാൻ ഉതകും. മറ്റുള്ളവരെ നേരിടുന്ന പ്രശ്നങ്ങൾ  മനസിലാക്കാനുമുള്ള ശേഷി നിങ്ങൾക്കുണ്ട്. നിങ്ങളുടെ ജീവിതത്തിൽ വിശ്വാസം, നന്ദിയും സമാധാനവും എന്നിവക്കിടം നൽകിയാൽ, നിങ്ങൾ ആത്മീയമായി വളരാൻ സാധിക്കും. 
 KARMIC_NUMBER_TEXT19 = ഈ നമ്പരിനനുസരിച്ച് ജനിച്ചതിനാൽ, പ്രധാനമായും നിങ്ങൾ രണ്ടു കാര്യങ്ങൾ പഠിക്കേണ്ടതുണ്ട് - ഒന്നാമത്തേത് അധികാരത്തിന്റെ ശരിയായ ഉപയോഗം,  മറ്റൊന്ന് സ്വാതന്ത്ര്യം. വ്യക്തിപരമായ ജീവിതത്തിൽ ചില പ്രശ്നങ്ങളുണ്ടാകുമ്പോൾ, നിങ്ങൾക്കൊരു നിലപാട് സ്വീകരിക്കേണ്ടതുള്ള പല സന്ദർഭങ്ങളിലും ജീവിതത്തിൽ നിരവധി അവസരങ്ങൾ ഉണ്ടാകും. നിങ്ങൾക്ക് ചുറ്റുമുള്ളവരെ കേൾക്കാൻ നിങ്ങൾ ഇഷ്ടപ്പെടുന്നില്ല, കൂടാതെ അവരുടെ ഉപദേശം സ്വീകരിക്കില്ല. എന്നാൽ നിങ്ങൾ ശ്രദ്ധിക്കേണ്ടതാണ്, കാരണം നിങ്ങൾ ജീവിതത്തിൽ മുന്നോട്ടു നീങ്ങാൻ മുന്നോട്ട് പോകണമെങ്കിൽ, ചില ആളുകളുടെ സഹായം ആവശ്യമാണ്. ഇതാണ് ജീവിതത്തിൽ നിങ്ങൾ പഠിക്കുന്നത്.
 MULANK_DESC_TEXT1 = നിങ്ങൾ മൂല സംഖ്യ 1 ൽ ജനിച്ചതിനാൽ, നിങ്ങൾ ആഗ്രഹങ്ങൾ വെച്ചുപുലർത്തുന്നവരും, മറ്റുള്ളവർ നിങ്ങളുടെമേൽ നിയന്ത്രണങ്ങൾഏർപ്പെടുത്തുന്നത് ഇഷ്ടമില്ലാത്തവരുമായിരിക്കും. പകരം, മറ്റുള്ളവരെ ജോലി ചെയ്യുപ്പിക്കുകയും അവരെ നയിക്കാനുമുള്ള ഗുണം നിങ്ങൾക്കുണ്ട്. സൂര്യന്റെ അനുഗ്രഹ വർഷം നിങ്ങൾക്കുണ്ടായിരിക്കും. ഒരു സുസ്ഥിരമായ പ്രത്യയശാസ്ത്രത്തിൽ, നിങ്ങളുടെ തീരുമാനങ്ങളിൽ നിശ്ചയദാർഢ്യത്തോടെ  ഉറച്ചു നിൽക്കും. സ്നേഹബന്ധങ്ങൾ, സൗഹൃദം എന്നിവയെല്ലാം നിങ്ങൾ ദീർഘകാലമായി ബന്ധം പുലർത്തും. മറ്റുള്ളവരെ സഹായിക്കുന്നവരും, മറ്റുള്ളവരിൽ നിന്ന് ആദരവ് ആഗ്രഹിക്കുന്നവരുമായിരിക്കും. നിങ്ങളുടെ കഠിനാധ്വാനത്തിന്റെ അടിസ്ഥാനത്തിൽ നിങ്ങൾ നല്ല പേര് സമ്പാദിക്കുകയും, സർക്കാർ മേഖലയിലുള്ളവർ അവരുടെ നല്ല പ്രകടനത്താൽ അഭിനന്ദനത്തിനർഹരാവും. നിങ്ങൾ എതിർലിംഗത്തോട് കൂടുതൽ ആകർഷിക്കപ്പെടുകയും പലപ്പോഴും അവർ ചതിക്കുക്കയും ചെയ്യും. നിങ്ങൾക്ക് സാമൂഹ്യസേവനം, രാഷ്ട്രീയം, ജോലി, മതം സംബന്ധമായ മേഖലകളിൽ പ്രത്യേക അനുഭവം ഉണ്ട്.
 MULANK_DESC_TEXT2 = നിങ്ങൾ കൂടുതലും ചന്ദ്രന്റെ സ്വാധീനമുള്ളവരായതിനാൽ, നിങ്ങൾ വളരെ മൃദുവും, ചുമതലകളിൽ മറ്റുള്ളവർക്കൊപ്പം പ്രവർത്തിക്കാൻ താല്പര്യപ്പെടുകയും ചെയ്യുന്നവരായിരിക്കും.ജീവിതത്തിന്റെ എല്ലാ തലങ്ങളിലും നിങ്ങൾക്ക് ഒരു പങ്കാളിയെ വേണം. മിക്കപ്പോഴും, നിങ്ങൾ പല ജോലികളിലുമായി ഒരുമിച്ചു പ്രവർത്തിക്കുകയും ഇടക്ക് മനസ്സുമാറി എല്ലാം അവസാനിപ്പിക്കുകയും, ഫലമായി ജോലികൾ അപൂർണമാകുകയും, പിന്നീട് അതുമായി ബന്ധപ്പെട്ട്  നഷ്ടം സഹിക്കേണ്ടി വരുകയും ചെയ്യും. നിങ്ങളിൽ കലാ സ്നേഹിവും, സർഗ്ഗാത്മകതയും ഉണ്ടായിരിക്കും. നിങ്ങൾ ആളുകളെ സ്നേഹിക്കും. നിങ്ങൾക്ക് വിദഗ്ദ്ധമായി പ്രേമിക്കാൻ കഴിയും, കുടുംബത്തോട് അർപ്പണ മനോഭാവം വെച്ചുപുലർത്തും. എന്നിരുന്നാലും നിങ്ങളുടെ ക്ഷമ നഷ്ടമാകും. നല്ല സാമൂഹ്യ പദവി കൂടാതെ, നിങ്ങൾ സമൂഹത്തിൽ ജനപ്രിയമാകും. നിങ്ങൾ ഒരു നല്ല സുഹൃത്ത് മാത്രമല്ല ചൂഷണം ചെയ്യാനുള്ള  പ്രവണ്യവും  നിങ്ങൾക്കുണ്ട്. നിങ്ങളുടെ ജീവിതത്തിലെ നിരവധി ഉയർച്ചകളും താഴ്വുകളും ഉണ്ടാവുകയും നിങ്ങളുടെ നിരവധി പദ്ധതികൾ മധ്യത്തിൽ തടസ്സപ്പെടും ചെയ്യും. നിങ്ങളുടെ ആത്മവിശ്വാസത്തെ ശക്തിപ്പെടുത്തണം.
 MULANK_DESC_TEXT3 = വ്യാഴ ഗ്രഹത്തിന്റെ സ്വാധീനമുള്ള 3 സംഖ്യയിൽ ജനിച്ചതുകൊണ്ട്,  നിങ്ങൾ സൗമ്യ  ഹൃദയമുള്ളവരും, സത്യസന്ധരും, സമാധാന പ്രിയരുമായിരിക്കും. നിങ്ങൾ അഭിലഷണീയരും, സർക്കാർ ജോലികളിൽ നന്നായി പ്രവർത്തിക്കാൻ കഴിയുന്നവരുമായിരിക്കും. പലപ്പോഴും നിങ്ങളിൽ സ്വേച്ഛാധിപത്യം കാണാനാകും. നിങ്ങളുടെ അച്ചടക്ക സ്വഭാവം നിങ്ങളുടെ കീഴുദ്യോഗസ്ഥർക്ക് ചില ബുദ്ധിമുട്ടുകൾ ഉണ്ടാക്കാം. നിങ്ങൾ അന്തർജ്ഞാനമുള്ളവരും, വായിക്കാനും, പഠിപ്പിക്കാനും ഇഷ്ടമുള്ളവരുമായിരിക്കും. അതിനാൽ ബുദ്ധിയെ സംബന്ധിക്കുന്ന മണ്ഡലവുമായി ബന്ധപ്പെട്ട് നിരവധി നേട്ടങ്ങൾ ഉണ്ടാവും. നിങ്ങൾ മനകരുത്തുള്ളവരായിരിക്കും, നിങ്ങളുടെ ന്യായവാദവും അറിവും വളരെ നല്ലതാണ്. നിങ്ങൾ ദാന ധർമ്മങ്ങളും അതുമായി ബന്ധപ്പെട്ട പ്രവർത്തനങ്ങളും കൂടുതൽ ഇഷ്ടപെടും. ചിലപ്പോൾ ചില കാര്യങ്ങളിൽ നിങ്ങൾ അക്രമാസക്തമായേക്കാം. നിങ്ങൾ സ്വയം ആദരവുള്ളവരാണെന്നത് സത്യമാണ്.
 MULANK_DESC_TEXT4 = നിങ്ങൾ ഹർഷൽ അല്ലെങ്കിൽ രാഹുവിന്റെ പ്രധാന പ്രഭാവം ഉള്ളവരാണ്. തത്ഫലമായി, നിങ്ങൾക്ക് ലോകത്തെക്കുറിച്ച് ചിന്തിക്കാനും പുതിയ എന്തെങ്കിലും ചെയ്യാനും കഴിയും. നിങ്ങളുടെ അഭിപ്രായം മറ്റുള്ളവരിൽ എളുപ്പത്തിൽ അംഗീകരിക്കാം കഴിയാത്തതുകൊണ്ടുതന്നെ മിക്ക ആളുകളും നിങ്ങളെ എതിർക്കാൻ സാധ്യത കാണുന്നു. കൂടുതൽ പണം ശേഖരിക്കുന്നതിൽ നിങ്ങൾക്ക് താല്പര്യം കാണില്ല, നിങ്ങളുടെതായ വിനോദങ്ങൾ നിങ്ങൾ ആസ്വദിക്കുകയും അതിൽ സന്തോഷം കണ്ടെത്തുകയും ചെയ്യും. നിങ്ങൾ മുൻകൂട്ടി ചിന്തിക്കുകയും നിങ്ങളുടെ എതിർപ്പ് പരസ്യമായി പ്രകടിപ്പിക്കുകയും ചെയ്യും. നിങ്ങളുടെ സ്വഭാവം പ്രവചനാതീതമാണ്, അടുത്ത നിമിഷം നിങ്ങൾ ഏതു ചെയ്യുമെന്ന് ആർക്കും പ്രവചിക്കാനാവില്ല ഒപ്പം തന്നെ നിങ്ങളെ മനസ്സിലാക്കാൻ അത്ര എളുപ്പത്തിൽ ആർക്കും കഴിയുകയില്ല ഈ സവിശേഷത നിങ്ങളെ മറ്റുള്ളവരിൽ നിന്ന് വ്യത്യസ്തമാക്കുന്നു. നിങ്ങൾ മറ്റുള്ളവരുടെ ഇടയിൽ ശ്രദ്ധിക്കപ്പെടും. നിങ്ങൾ നല്ല പ്രവൃത്തികൾ ചെയ്യാനിഷ്ടപ്പെടുന്നവരാണ് എന്നാൽ നിങ്ങൾ ചെയ്യുന്ന നന്മക്ക് നിങ്ങൾ ബഹുമതി ആഗ്രഹിക്കും.നിങ്ങൾ വളരെ ലോല മനോഭാവം വെച്ചുപുലർത്തുന്ന ആളായിരിക്കും, പലപ്പോഴും ഏകാന്തത അനുഭവിക്കും. നിങ്ങളുടെ സുഹൃത്തുക്കളുടെ എണ്ണം കുറവായിരിക്കും, പക്ഷേ ഉള്ള സുഹൃത്തുക്കൾ വളരെ സത്യസന്ധരും വിശ്വസ്തരും ആയിരിക്കും.
 MULANK_DESC_TEXT5 = ബുധന്റെ സ്വാധീനത്താൽ നിങ്ങൾ കൂടുതൽ സുഹൃത്തുക്കളുള്ള ഒരു വ്യക്തിയായിരിക്കും. നിങ്ങൾ സൗഹൃത്ത് വലയം ഇഷ്ടപെടുന്നവരായിരിക്കും അതുകൊണ്ടു തന്നെ നിങ്ങൾക്ക് ഒരുപാട് സുഹൃത്തുക്കൾ ഉണ്ടായിരിക്കും.  നിങ്ങളുടെ ഉള്ളിൽ ഒരു വ്യാപാരിയുടെ ഗുണഗണങ്ങൾ ഉണ്ട്. നിങ്ങൾ ലാഭത്തോട് ആകൃഷ്ടരായിരിക്കും, നിങ്ങൾ വേഗത്തിൽ വളരെയധികം കാര്യങ്ങൾ ചെയ്യുകയും ചെയ്യും പക്ഷെ ഇത് മൂലം തന്നെ നിങ്ങൾ വേദന അനുഭവിക്കും . നിങ്ങൾ അത്യധികം ഉത്സാഹികളായിരിക്കും. അതുപോലെ, ഒരു കാര്യം ദീർഘകാലം മനസ്സിൽ സൂക്ഷിക്കുകയില്ല, അതുകൊണ്ട് തന്നെ ദീർഘകാലം നിരാശരായി ഇരിക്കേണ്ടിവരില്ല. നിങ്ങൾ ജോലിയെക്കാളും കൂടുതൽ താല്പര്യം വ്യാപാരത്തിൽ കാണിക്കും. നിങ്ങൾക്കുള്ളിൽ ദ്രിതിയും, ക്ഷിപ്രകോപവും, ദേഷ്യവും ഉണ്ടാവും. മറ്റൊരുവിധത്തിൽ നിങ്ങളുടെ വാദം ഫലപ്രദവും പ്രഭാഷണം പ്രയോജനപ്രദവുമായിരിക്കും.നിങ്ങൾ വൈകാരികപരമായി ചാഞ്ചല്യമുണ്ടാവും,, മിക്കപ്പോഴും തലച്ചോറും ബുദ്ധിയുടെ ബന്ധപ്പെട്ട പ്രവൃത്തികളിൽ വിജയിക്കുകയും ചെയ്യും. കൂടാതെ, കായിക പ്രവർത്തനങ്ങളെക്കാളും ഉപരി ബുദ്ധിപരമായ പ്രവർത്തനങ്ങൾ നിങ്ങൾ ഇഷ്ടപ്പെടുന്നു. ഏതെങ്കിലും ബുദ്ധിമുട്ടിൽ നിന്ന് പുറത്തുവരാനുള്ള നിങ്ങളുടെ കഴിവ് ഏറ്റവും മികച്ച ഒരു ഗുണവിശേഷങ്ങളിൽ ഒന്നാണ്. എന്നിരുന്നാലും, നിങ്ങളുടെ മാനസിക ശക്തി ദുർവിനിയോഗം ചെയ്യാതിരിക്കുക.
 MULANK_DESC_TEXT6 = ശുക്രന്റെ സ്വാധീനത്തിന്റെ ഫലമായി, നിങ്ങൾ സൗന്ദര്യത്തോട് ആകൃഷ്ടരാകും. മാത്രമല്ല, കല, വിനോദ സാഹിത്യം, വസ്ത്രം, സംഗീതം എന്നിവയിൽ നിങ്ങൾക്ക് പ്രവന്യമുണ്ടാവും. നിങ്ങൾ അലങ്കാര പ്രവർത്തികൾ ഇഷ്ടപെടുന്നു, അതുകൊണ്ടു തന്നെ എല്ലാ പ്രവർത്തിയും വളരെ മനോഹരമായി ചെയ്യാണ് ശ്രമിക്കുന്നു. ആളുകളുടെ ശ്രദ്ധ ആകർഷിക്കുന്ന ഒരു  കാന്തിക വ്യക്തിത്വം നിങ്ങൾക്കുണ്ട്. നിങ്ങളിലെ അസൂയ ശാട്യം തുടങ്ങിയവതിയാൽ നിങ്ങൾക്ക് ചില പ്രശ്നങ്ങൾ നേരിവേണ്ടിവരും. നിങ്ങൾക്ക് കൂടുതൽ പ്രതിരോധം സഹിക്കാനാവില്ല. നിങ്ങൾ ആരെയും വളരെ എളുപ്പത്തിൽ നിങ്ങളുടെ സുഹൃത്താക്കും. വീട്ടിൽ വരുന്ന അതിഥികളെ നിങ്ങൾ നല്ല രീതിയിൽ സൽക്കരിക്കും. ചിലപ്പോഴൊക്കെ നിങ്ങൾക്ക് സ്വയം കുറ്റബോധവും മാനസിക സമ്മർദ്ദവും നേരിടേണ്ടി വരും. എതിർ ലിംഗത്തോടുള്ള നിങ്ങളുടെ ആകര്ഷകത്ത്വം വളരെ ഉയർന്നതാണ്. നിങ്ങൾക്ക് എല്ലാവരുടെയും മനസ്സ് കീഴടക്കാൻ കഴിയുമെന്നത്  നിങ്ങളുടെ ഒരു കഴിവാണ്.
 MULANK_DESC_TEXT7 = മൂല സംഖ്യ 7 ൽ ജനിച്ചതിനാൽ കെതുവിന്റെയും നെപ്ട്യൂണിന്റെയും പ്രധാന സ്വാധീനമുണ്ടാവും. മതബോധം നിങ്ങളിൽ നിലനിൽക്കുന്നു. കവിതയും ചിത്രകലയും നിങ്ങൾ ഇഷ്ടപ്പെടുന്നു. നിങ്ങൾ ആത്മജ്ഞാനമുള്ളവരായിരിക്കും, മറ്റുള്ളവരെ മനസ്സിലാക്കാൻ കഴിയും. പക്ഷെ മറ്റുള്ളവർക്ക് നിങ്ങളെ മനസ്സിലാക്കാൻ അത്ര എളുപ്പമായിരിക്കുകയില്ല. നിങ്ങൾ യാത്രകൾ ചെയ്യാൻ ഇഷ്ടപ്പെടുന്നു. നിങ്ങളുടെ ജീവിതത്തിലെ ഭൌതിക സന്തോഷത്തിന്റെ അഭാവം ഉണ്ടാകും. നിങ്ങളുടെ അടിസ്ഥാന ആശയങ്ങളുടെ അടിസ്ഥാനത്തിൽ മാത്രം പണം സമ്പാദിക്കുന്നു, അതുപോലെതന്നെ ധന ധർമ്മ പ്രവർത്തനങ്ങളും ചെയ്യും. ഭാവി സംബന്ധിച്ച് നിങ്ങൾക്ക് ആശങ്കയുണ്ടാവും അതിനാൽ നല്ല ജോലികൾ ആസ്വദിച്ച് ചെയ്യാൻ കഴിയും. നിങ്ങൾക്ക് നല്ല ഭാവനാവൈദഗ്ദ്ധ്യം ഉണ്ടായിരിക്കും, ആളുകളെ ആകർഷിക്കുന്നതിനുള്ള പ്രത്യേക കഴിവും നിങ്ങൾക്കുണ്ട്. ഒരു നല്ല കച്ചവടക്കാരന്റെ നല്ല ഗുണങ്ങളിലും ചിന്തകളിലും നിങ്ങൾ ഉൾക്കൊള്ളുന്നു, നിങ്ങൾ അവ ഉപയോഗിച്ചാൽ നിങ്ങൾ ഒരു വിജയകരമായ ബിസിനസ്സുകാരനാകാം. മറ്റുള്ളവരെ സ്വാധീനിക്കുന്ന കല നിങ്ങളുടെ ഏറ്റവും വലിയ പ്രത്യേകതയാണ്.
 MULANK_DESC_TEXT8 = നിങ്ങളുടെ സംഖ്യ 8 ആണ് അത് നിങ്ങളുടെ കഠിനാധ്വാനത്തെ സൂചിപ്പിക്കുന്നു, അതിന്റെ രഹസ്യം 8 സംഖ്യയുടെ അധിപനായ ശനി ഗ്രഹമാണ്. നിങ്ങൾ സ്ഥാപനത്തിലെ ഏറ്റവും പ്രധാനപ്പെട്ട കണ്ണിയാണ്, എന്നാൽ പലപ്പോഴും നിങ്ങളുടെ കഠിനാധ്വാനത്തെ ആളുകൾ നല്ല രീതിയിൽ വിലയിരുത്തണമെന്നില്ല. ഒറ്റപ്പെടൽ, വിഷാദം എന്നിവ നിങ്ങളെ ആശങ്കയിലാക്കാം. നിങ്ങൾ ജീവിതത്തിൽ സാവധാനം പുരോഗമിക്കുന്നു, പക്ഷേ നിങ്ങളുടെ പുരോഗതി ഉറപ്പാണ്. നിങ്ങളുടെ സമൂഹത്തിൽ പ്രദർശിപ്പിക്കാത്ത സ്വഭാവം മൂലം സമൂഹത്തിൽ നിങ്ങൾക്ക് വേണ്ടത്ര പ്രാധാന്യം ലഭിക്കണമെന്നില്ല. നിങ്ങളുടെ ജോലി ആത്മാർത്ഥമായി നിവർത്തിച്ചതിനുശേഷമേ നിങ്ങൾ വിശ്രമിക്കുകയുള്ളു. നിങ്ങൾ വളരെ അഭിമാനമുള്ളവരാണ്, ഏതെങ്കിലും അഭിലാഷം നേടാൻ കഠിനമായി അധ്വാനിക്കാൻ നിങ്ങൾക്ക് കഴിയും. നിങ്ങൾ വളരെ വികാരാധീനമുള്ളവരായിരിക്കും. നിങ്ങൾ വിധിയിൽ വിശ്വസിക്കുന്നവരായിരിക്കും. നിങ്ങൾ പലപ്പോഴും ഉയർന്ന സ്ഥാനങ്ങളിലേക്ക് എത്തുന്നത് കഠിനാധ്വാനം ചെയ്യും, നിങ്ങളിൽ ത്യാഗ മനോഭാവം ഉണ്ടായിരിക്കും. നിങ്ങൾക്ക് ആളുകളുടെ മനസ്സിൽ ഇടം നേടാൻ കഴിയും. നിങ്ങൾ ജീവിതത്തിൽ ഒന്നുകിൽ ഉയർന്ന വിജയം പ്രാപ്തമാക്കും അല്ലെങ്കിൽ തോൽവി, 
 MULANK_DESC_TEXT9 = ഈ സംഖ്യയിൽ ജനിച്ചതുകൊണ്ട് നിങ്ങൾക്ക് ചൊവ്വയുടെ ഊർജ്ജവും ശക്തിയും ലഭിക്കുന്നു, അതിനാലാണ് നിങ്ങൾ ധൈര്യശാലികളാകുന്നത്, ബുദ്ധിമുട്ടുകളെ നിങ്ങൾ ഭയമില്ല. നിങ്ങൾ ജനങ്ങളുടെ നേതൃത്വം കൈയടക്കിയിരിക്കാം. എന്നാൽ നിങ്ങൾ ചിലപ്പോഴൊക്കെ രോഷാകുലമാകും, അതിലൂടെ നിങ്ങൾക്ക് പ്രയാസങ്ങൾ ഉണ്ടാവാം. നിങ്ങളുടെ ജീവിതത്തിൽ ശത്രുക്കളുഡി സ്വാധീനം ഉണ്ടാവും. എന്നിരുന്നാലും, നിങ്ങളുടെ ധൈര്യത്തിന്റെ ശക്തിയാൽ ഇവയെല്ലാം നിങ്ങൾ അഭിമുഖീകരിക്കുന്നു. നിങ്ങൾ സ്വതന്ത്രരായിരിക്കാൻ ആഗ്രഹിക്കുന്നു, നിങ്ങൾക്ക് എളുപ്പത്തിൽ സ്വാധീനം കിട്ടില്ല. ആളുകളുടെ ഇടയിൽ നിങ്ങൾ ജാഗ്രത പാലിക്കേണ്ടതുണ്ട്. സ്നേഹവും സഹാനുഭൂതിയും നേടാൻ നിങ്ങൾക്ക് എന്തും ചെയ്യാൻ കഴിയും. നിങ്ങളുടെ കോപം നിങ്ങൾ സ്വയം നിയന്ത്രിക്കാൻ ശ്രമിക്കണം. നിങ്ങളുടെ കോപത്തെ നിയന്ത്രിക്കാൻ നിങ്ങൾക്ക് കഴിയുമെങ്കിൽ, നിങ്ങൾ ജീവിതത്തിൽ വളരെ ഭാഗ്യവാന്മാരാകും, വിജയം നേടുകായും ചെയ്യും.
 NAMANK_DESC_TEXT1 = <p>നിങ്ങളുടെ ജനന സംഖ്യാ 1 ആണെങ്കിൽ, ന്യൂമറൈസജി അനുസരിച്ച്, നിങ്ങൾ ഊർജ്ജം, സജീവം, മത്സരം, കലയിൽ താല്പര്യം എന്നിവയുണ്ടാവും. ഒരു ജനന നമ്പർ 1 ആയ എന്ന നിലയിൽ, നിങ്ങൾ സാധാരണയായി താഴെപറയുന്ന താൽപ്പര്യമുണ്ടാകില്ല എങ്കിലും നേതൃത്വമെടുക്കും. നിങ്ങളുടെ അവബോധ ശക്തികൾ എപ്പോഴും പ്രവർത്തിക്കുന്നു. സത്യസന്ധരായിരിക്കുക, നിങ്ങളുടെ തെറ്റുകൾ സത്യസന്ധമായി സ്വീകരിക്കുക. സ്വാഭാവികമായ ആത്മീയതയും, സന്തോഷവും, എല്ലായ്പ്പോഴും പുഞ്ചിരിക്കുന്നതും, നിങ്ങളുടെ ജീവിത പദ്ധതികൾ സംബന്ധിച്ച് വളരെ ശുഭാപ്തിവിശ്വാസവുമുണ്ടായിരിക്കും. </p> <p> <b> തൊഴിൽ : </b> ശാരീരിക പ്രവർത്തനത്തെക്കാൾ മാനസിക പ്രവർത്തനങ്ങളിലേക്കാണ് നിങ്ങൾക്ക് താത്പര്യം. യാത്രയിലും നിരീക്ഷണങ്ങളിലൂടെയും നിങ്ങൾക്ക് അറിവുണ്ട്. ജനന നമ്പർ 1 ആയ ആളുകൾ നല്ല എഴുത്തുകാർ,ഒരു നല്ല റിപ്പോർട്ടർ ആകാം ഒരു സജീവ അല്ലെങ്കിൽ സൃഷ്ടിപരമായ മനസ്സാൽ അനുഗ്രഹിക്കപ്പെടട്ടവരാകും.</p>
 NAMANK_DESC_TEXT2 = <p>ഈ നമ്പർ ഉയർന്ന ഭാവന, ആദര്ശനിഷ്ഠ, സ്വപ്ന സ്വഭാവം, അവരുടെ ഭാവനയുടെ ലോകത്തിൽ ജീവിക്കുന്ന സ്വഭാവക്കാരായിരിക്കും. ഒന്നാം നമ്പർ പോലെയല്ല അവർ സംഘടിപ്പിക്കുകയും, മറ്റുള്ളവരാൽ നിർവഹിക്കുകയും ചെയ്യും. സ്വഭാവത്തെ ആസ്പദമാക്കി, നിങ്ങളുടെ നിസ്വാർത്ഥസ്വഭാവവും, മറ്റുള്ളവരുടെ ക്ഷേമത്തിലുള്ള ശ്രദ്ധയും തന്നെയാവും നിങ്ങളുടെ പ്രശ്നവും </p> <b> തൊഴിൽ : </b><p> ജനന നമ്പർ 2 ആയ ആളുകൾ നല്ല പങ്കാളിയും സഹകാരിയും ആയതിനാൽ, പങ്കാളിത്ത ബിസിനസ്യിൽ നന്നായി പ്രവർത്തിക്കും. നിങ്ങൾ വളരെ അസ്വസ്ഥനാകുകയും ഇണയെ മാറ്റുകയും ചെയ്യും, അതിനാൽ എപ്പോഴും യാത്രചെയ്യാൻ ആഗ്രഹിക്കുകയും, ധാരാളം യാത്രകൾ ഉൾക്കൊള്ളുന്ന ജോലികളിൽ നിങ്ങൾക്ക് മികച്ചതായിത്തീരുന്നു. നിങ്ങളുടെ സാങ്കല്‌പികമായ പ്രകൃത്യാ സ്വഭാവം നിങ്ങൾ സൃഷ്ടിപരമായ മേഖലയിൽ നല്ലതാകും. </p>
 NAMANK_DESC_TEXT3 = <p>ജൻമ നമ്പർ 3 എന്നത് ധാർമികത, ദിവ്യസ്നേഹം, കാരുണ്യത്തോടെയുള്ള നീതി എന്നീ കാര്യങ്ങൾക്കായാണ്. നിങ്ങളുടെ ജീവിതത്തിൽ നിങ്ങളുടെ ഭാഗത്ത് വിധി ഉണ്ട്. ഇത് നിങ്ങളുടെ ജീവിതത്തിന്റെ നല്ല വശങ്ങളെ ആകർഷിക്കുന്ന നിങ്ങളുടെ സംഖ്യയുടെ സ്പന്ദനം നിങ്ങൾ ഫലമായി പ്രകാശിക്കും. ജോലി പൂർത്തിയാക്കാൻ നിങ്ങൾക്ക് ശരിക്കും കഠിനാധ്വാനം ചെയ്യും. ആദരവും ഉത്തരവും കല്പിക്കുന്ന ഒരു നേതാവിന്റെ മികവുണ്ടാവും </p> <p> <b> തൊഴിൽ : </b> നിങ്ങൾ യുക്തിപരമായ ന്യായവും, കഴിവും, ലോകത്തിലെ അദ്ധ്യാപകരും, തത്ത്വചിന്തകരും. </p>
 NAMANK_DESC_TEXT4 = <p>ജനന നമ്പർ 4 ആയ ആളുകൾ ഊർജ്ജം, ശക്തി, പുരോഗതി എന്നിവ പ്രതിനിധാനം ചെയ്യുന്നു. മനസ്സിന്റെ ഉന്നത വ്യക്തിത്വമുള്ള ആളുകളാണ് അവർ. ജീവന്റെയും സമൂഹത്തിന്റെയും മാറ്റങ്ങളെയാണ് ലക്ഷ്യമിടുന്നതെന്നും, പരിസ്ഥിതിക്കും സമൂഹത്തിനും അടിമത്തത്തിൽ നിന്ന് മനസ്സിനെ മോചിപ്പിക്കുകയും ചെയ്യുന്നതാണ് ഈ സംഖ്യയുടെ പ്രത്യേകത. നിങ്ങൾ പ്രായത്തേക്കാൾ പക്വതയുള്ളവരായിരിക്കും. നാല് സംഘ്യയുള്ള ആളുകൾ അസാധാരണങ്ങളായ വ്യത്യസ്തതയിലേക്ക് ആകർഷിക്കപ്പെടുന്നു, പലപ്പോഴും ചിലപ്പോൾ നിയമങ്ങൾക്കെതിരെ മത്സരിക്കേണ്ടതായിട്ടുണ്ട്.</p><p><b>തൊഴിൽ : </b> 4 ജനന നമ്പറിൽ മികച്ച എഴുത്തുകാരനും വ്യവസായിയും രാഷ്ട്രീയക്കാരും ഉണ്ടാവും </p>
 NAMANK_DESC_TEXT5 = <p>ജീവന്റെ രഹസ്യാത്മക ശാസ്ത്രങ്ങളിൽ നിങ്ങൾക്ക് വളരെ താല്പര്യമുണ്ട്. സ്വഭത്താൽ നിങ്ങൾ അസ്വസ്ഥരും, പുതിയ ലക്ഷ്യങ്ങളും, നിങ്ങളുടെ അടിസ്ഥാനാവശ്യം എപ്പോഴും യാത്ര ചെയ്യുക എന്നതായിരിക്കും. ഒരു വ്യക്തി എന്ന നിലയിൽ നല്ല വശവും മോശവശവും ഉണ്ടായിരിക്കും. നിങ്ങൾ കുട്ടികളുമായി സമയം ചെലവഴിക്കുന്നതിനെ ഇഷ്ടപ്പെടുന്നു, ഒപ്പം കുടുംബവും പ്രധാനപെട്ടത്തായിരിക്കും. നിങ്ങൾ ആത്മീയതയിലേക്ക് ചായ്വുള്ളവരും മതപരവുമായ വ്യക്തികളാണ്. </p> <p> <b> തൊഴിൽ : </b> നിങ്ങൾ കായിക വിനോദങ്ങൾ ആസ്വദിക്കുന്നു, അതിനാൽ ഇത് ഒരു തൊഴിൽ മേഖലയായി തിരഞ്ഞെടുക്കാം. നിങ്ങളുടെ ബുദ്ധിശക്തി നിങ്ങളെ വിദ്യാഭ്യാസവിദഗ്‌ദ്ധനും ഗവേഷകരുമാക്കും. </p>
 NAMANK_DESC_TEXT6 = <p>നിങ്ങൾ ജന്മനാ ഒരു കലാകാരനും, സൗന്ദര്യവും, കലയും നിങ്ങളെ ഏറ്റവും ആകർഷിക്കുന്നു. വാക്കാലുള്ള അർത്ഥത്തിൽ മാത്രമല്ല സൗന്ദര്യം,ബന്ധത്തിലുമുള്ള സൗന്ദര്യം നിങ്ങൾ ആസ്വദിക്കും. ഏറ്റുമുട്ടൽ ഒഴിവാക്കുക, കാരണം വിദ്വേഷവും, തർക്കങ്ങളും നിങ്ങളെ അസ്വസ്ഥമാക്കും. നിങ്ങളുടെ സ്നേഹനിർഭരമായ സ്വഭാവം ഊഷ്മളവും, സുപ്രധാനവും, മനോഹരവുമായ ഒരു വ്യക്തിയായി നിങ്ങളെ കാണിക്കും. മറ്റുള്ളവരെ പ്രീതിപ്പെടുത്താൻ നിങ്ങൾ ആഗ്രഹിക്കുന്നു. നിങ്ങൾക്ക് ശുഭാപ്തി വിശ്വാസമുള്ള സ്വഭാവമുള്ളവരായിരിക്കും. </p> <p> <b> തൊഴിൽ : </b> നിങ്ങൾക്ക് സംഗീതം, നൃത്തം, കവിത തുടങ്ങിയവ സർഗ്ഗാത്മകതയിൽ താൽപ്പര്യം പ്രകടിപ്പിക്കുന്നു. </p>
 NAMANK_DESC_TEXT7 = <p>നിങ്ങളുടെ വ്യക്തിത്വവും, മൗലികത്വം, സ്വാതന്ത്യം നിങ്ങൾക്കറിയാം. ഒരു സ്വതന്ത്ര പക്ഷിയെപ്പോലെ പാരമ്പര്യമായ അടിമത്തവും സമൂഹത്തിന്റെ നിയന്ത്രണവും വ്യവസ്ഥകളും തകർക്കാൻ നിങ്ങൾ ആഗ്രഹിക്കാം. ആളുകൾ പലപ്പോഴും നിങ്ങളെ ഗൂഡസ്വഭാവമായവരായി കാണാം, പലപ്പോഴും നിങ്ങൾക്ക് പരിസരബോധം ഉണ്ടാവില്ല. നമ്പർ 7 ആളുകൾ സാധാരണയായി വിഭവകരവും വിശകലനപരവുമാണ്, കൂടാതെ സാഹചര്യങ്ങളിലും പ്രശ്നങ്ങളിലും ഉള്ള വ്യതിയാനവും സ്വാധീനവും നിർണയിക്കാനും കഴിയും. ജീവിതത്തിൽ, നിങ്ങൾ ശരിയായതുമായിട്ടുള്ളത് നേടാൻ നിങ്ങൾ പല പല ത്യാഗങ്ങളും ചെയ്യാം. </p> <p><b> ഉദ്യോഗം : </b> നിങ്ങൾ വളരെയധികം ധൈര്യവും സാഹസികവുമാണ്, അതിന്റെ ഫലമായി, പുതിയതും ആകർഷകവുമായ രീതി പരീക്ഷിക്കുന്നതിനായി നിങ്ങൾക്ക് വീട്ടിൽ നിന്ന് അകന്നു നിൽക്കാം. കൂടാതെ, നിങ്ങളുടെ അന്തര്‍ജ്ഞാനപരമായ സ്വഭാവം കാരണം നിങ്ങൾക്ക് ചില അനുഭവങ്ങൾ അത്‌ നേരത്തേ അനുഭവിച്ച ഒരു തോന്നൽ ഉണ്ടാവും. സാഹസികതയുമായി ബന്ധപ്പെട്ട ഏതെങ്കിലും ഉദ്യോഗത്തിൽ ചേരുന്നത് അഭികാമ്യമാണ്.</p>
 NAMANK_DESC_TEXT8 = <p>ജനന നമ്പർ 8 വ്യക്തി ഗുരുതരവും, തത്ത്വചിന്താപരവുമായിരിക്കും. നമ്പർ 8 നിശ്ചയദാർഢ്യത്തിന്റെ ലക്ഷണങ്ങളെ സൂചിപ്പിക്കുന്നു. പുറത്ത് കാഠിന്യമുണ്ടെങ്കിലും, നിങ്ങൾക്കുള്ളിൽ സ്നേഹവും, കരുതലും ഉള്ള വ്യക്തിയാണ്. ഭാവി സംബന്ധിച്ച് നിങ്ങൾ വളരെ ജാഗരൂകരായിരിക്കുകയും എപ്പോഴും ജാഗ്രതയോടെ തീരുമാനിക്കുകയും ചെയ്യും. നിങ്ങളുടെ ലക്ഷ്യങ്ങളിൽ എത്താൻ നിങ്ങൾക്ക് വലിയ ബുദ്ധിമുട്ട് നേരിടേണ്ടി വരും. </p> <p> <b> തൊഴിൽ : </b> ആളുകളുടെ കണ്ണിൽ നിങ്ങൾക്ക് ആഗ്രഹശാലിയും, പലപ്പോഴും വിജയകരവുമായിരിക്കും. നിങ്ങൾ മറ്റുള്ളവരെ പ്രചോദിപ്പിക്കും. ഫലമായി, നിങ്ങൾ വലിയ മാനേജർ</p>
 NAMANK_DESC_TEXT9 = <p>നിങ്ങൾ സ്വയമേവയുള്ള നിശ്ചയ ദാർഢ്യവും, ധൈര്യശാലിയുമായ വ്യക്തിയാണ്. നിങ്ങൾ ക്ഷിപ്രകോപിയാണെങ്കിലും കലഹങ്ങളും എതിർപ്പുകളും തരണം ചെയ്യാൻ കഴിയും. നിങ്ങൾക്കെതിരായി നിലകൊള്ളുന്നതായാൽ പോലും നിങ്ങൾ സ്വയം സ്നേഹിക്കുകയും ബഹുമാനിക്കുകയും ചെയ്യും. നിങ്ങളുടെ സ്വന്തം വിധി മാസ്റ്ററാക്കാൻ ആഗ്രഹിക്കുന്നു, അതിനാൽ നിങ്ങൾക്ക് എളുപ്പത്തിൽ ഒരു മഹത്തായ നേതാവായിത്തീരാനാവും. നിങ്ങൾ ഒരു മാനുഷിക വ്യക്തിയാണ്, നിങ്ങളോടൊപ്പം നിങ്ങളുടെ സുഹൃത്തുക്കളെ കൊണ്ടുപോകുന്നതിൽ വിശ്വസിക്കുന്നു. നിങ്ങൾ മറ്റുള്ളവരെ സഹായിക്കാൻ ഒരു അവസരം ആഗ്രഹിക്കുന്നു. നിങ്ങൾ കുടുംബാംഗങ്ങളുമായും മികച്ച രീതിയിൽ ബന്ധം പുലർത്തുകയും അവരോടൊപ്പം സമയം ചെലവഴിക്കുകയും ചെയ്യുന്നു. </p> <p> <b> തൊഴിൽ : </b> സൈനികം, രാഷ്ട്രീയം, അധ്യാപനം, സാമൂഹ്യസേവനം എന്നിവ നിങ്ങൾക്ക് അനുയോജ്യ മേഖലയായിരിക്കും . </p>
