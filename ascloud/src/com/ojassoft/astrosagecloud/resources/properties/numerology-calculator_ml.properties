 NAMANK_TEXT = പ്രപഞ്ച ശക്തി, നിങ്ങളുടെ പേര് സംഖ്യ പരിഗണിച്ച് ഒരു വ്യക്തിയുടെ ജീവാത്മക ഘടന നിർണ്ണയിക്കുകയാണ്. നിങ്ങളുടെ മുഴുവൻ പേരിലെ എല്ലാ അക്ഷരങ്ങളിലും കൂടി ഉദ്ധരിക്കപ്പെടുന്നു സംഖ്യയെ പേര് സംഖ്യ എന്ന് വിളിക്കുന്നു. നിങ്ങൾ അവ വികസിപ്പിക്കാനും ഉപയോഗിക്കാനും തിരഞ്ഞെടുക്കുകയാണെങ്കിൽ, ഈ ആയുസ്സിൽ നിങ്ങളുടെ കഴിവുകളും മനോഭാവങ്ങളും വിവരിക്കുന്ന ഒരു സംഖ്യയാണിത്. നിങ്ങളുടെ പേര് നിങ്ങളുടെ ശരിയായ സ്‌പന്ദനമാണ്, നിങ്ങളുടെ ആത്മാവിന്റെ സംഗീതമാണ്, അത് കാലാകാലം ഈ പ്രപഞ്ചത്തിൽ പ്രതിധ്വനിക്കുന്നു. \n\nനിങ്ങളുടെ പേര് വിശകലനം ചെയ്യുന്നത്  @@userName$, നിങ്ങളുടെ പേരിന്റെ നമ്പർ നിര്‍ദ്ദേശിക്കൂ @@namamkNumber$. പേരുമായി ബന്ധപ്പെട്ട സംഖ്യയുടെ ചില അടിസ്ഥാന സ്വഭാവങ്ങളിലേക്ക് ഞങ്ങൾ നിങ്ങളെ നയിക്കാം @@namamkNumber$.
 MULANK_TEXT = @@userName$, സംഖ്യാശാസ്ത്രത്തിലെ ഏറ്റവും പ്രധാനപ്പെട്ട നമ്പർ നിങ്ങൾ ജനിച്ച മാസത്തെ തിയതി ആണ്. നിങ്ങളുടെ സ്വഭാവം, വ്യക്തിത്വം, സവിശേഷത തുടങ്ങിയ പ്രധാന ഘടകങ്ങൾ ഈ സംഖ്യയിലൂടെ തിരിച്ചറിയാൻ കഴിയും. ഈ സംഖ്യ നിങ്ങളുടെ അടിസ്ഥാന ഘടകങ്ങളെ നിർണ്ണയിക്കുന്നു. നിങ്ങൾ ആധിപത്യം പുലർത്തുന്നവരാണോ, ലജ്ജയുള്ളവരാണോ, അതോ നേതൃത്വ സ്വഭാവമാണോ  അല്ലെങ്കിൽ മാറ്റുള്ളവരെ പിന്തുടരുന്നവരാണോ പോലെയുള്ള കാര്യങ്ങൾഇതിലൂടെ മനസ്സിലാക്കാൻ കഴിയും. ഓരോ സംഖ്യക്കും അതിന്റേതായ സ്വന്തം സ്വഭാവവും വ്യക്തിഗത സ്പന്ദനവും ഉണ്ടെന്നുള്ളതാണ് ഇതിന് കാരണം. ശ്രദ്ധാപൂർവമായ വിശകലനത്തിനു ശേഷം, സംഖ്യാശാസ്ത്രപരമായിട്ടുള്ള നിങ്ങളുടെ ജനന സംഖ്യ താഴെ ചേർത്തിട്ടുണ്ട്: നിങ്ങളുടെ മൂല സംഖ്യ @@radicalNumber$ ആണ്.
 DESTINY_TEXT1 = നിങ്ങൾ മഹത്തായ നേതൃത്വപാടവമുള്ള ഒരു പ്രതിഭയുള്ള വ്യക്തിയാണ്. ഫലമായി, നിങ്ങൾ ആളുകളുമായി നല്ല രീതിയിൽ പ്രവർത്തിക്കുകയും അവരുടെ പിന്തുണ നേടുകയും നിങ്ങളുടെ ലക്ഷ്യങ്ങൾ നിറവേറ്റാൻ പ്രാപ്തരാകുകയും ചെയ്യുന്നു. നിങ്ങളുടെ അനിഷ്ടങ്ങൾ പരിമിതമായിരിക്കുകയും പല സുഹൃത്തുക്കളും നിങ്ങളുടെ സഹായത്തിനായി എപ്പോഴും ഉണ്ടായിരിക്കുകയും ചെയ്യുന്നതാണ്. സാമ്പത്തികമായി, നിങ്ങൾക്ക് അഭിവൃദ്ധിയുണ്ടാകുകയും, നിങ്ങൾക്ക് സുഖസൗകര്യങ്ങളും, രാജകീയമായ ജീവിതശൈലിയും ആസ്വദിക്കുകയും ചെയ്യും. രാഷ്ട്രീയരംഗത്ത് നിങ്ങൾക്ക് വിജയം കൈവരിക്കാനും സർക്കാർ മേഖലയിൽ നിന്നുള്ള ആനുകൂല്യങ്ങൾ കിട്ടാൻ വളരെ സാധ്യതയുണ്ട്. വിധി നമ്പർ 1 പ്രകാരം ജനിച്ചതിനാൽ, നിങ്ങൾ ആളുകളിൽ നിന്ന് ആദരവ് സ്വീകരിക്കാൻ ആഗ്രഹിക്കുകയും, നിങ്ങൾക്ക് അത് ലഭിക്കുകയും ചെയ്യും. എന്നിരുന്നാലും, അമിതമായ ചെലവും അതുപോലെ ചൂതാട്ടം പന്തയം വെയ്പ്പ് എന്നിവ ഒഴിവാക്കണം. നിങ്ങളുടെ സ്വാതന്ത്ര്യത്തെ ഉപയോഗപ്പെടുത്തുന്നതിൽ ജാഗ്രത പുലർത്തുക, വളരെ അപകടസാധ്യതയുള്ള കാര്യങ്ങൾ ചെയ്യാതിരിക്കുക, നിങ്ങളുടെ ധാർമികതയും നീതിശാസ്‌ത്രവും പിന്തുടരുക.
 DESTINY_TEXT2 = പങ്കാളിത്തത്തോടെ പ്രവർത്തിക്കാൻ ഇഷ്ടപ്പെടുന്ന, വളരെ സൗമ്യരും, സൗഹൃദപരവും, മറ്റുള്ളവർ ഇഷ്ടപെടുന്നതുമായ വ്യക്തിയാണ്. നിങ്ങൾ ഭാവന, പ്രണയം, സർഗ്ഗാത്മക എന്നിവയുള്ള വ്യക്തിയും, സ്ത്രീകളെ ബഹുമാനിക്കുന്നവരും ആയിരിക്കും. എന്നിരുന്നാലും, നിങ്ങൾക്ക് പലപ്പോഴും ശക്തമായ മാനസിക ശേഷിയുടെ അഭാവം മൂലം, പലപ്പോഴും നിങ്ങളുടെ ടാസ്ക്കുകൾ പൂർത്തീകരിക്കപ്പെടാതെ പോകുന്നു. ശാരീരികമായി, നിങ്ങൾ അല്പം ദുർബലരാണ്, മറ്റുള്ളവർ നിങ്ങളെ എളുപ്പത്തിൽ പ്രയോജനപ്പെടുത്തുന്നു. അതുകൊണ്ട്, സ്വയം കൈകാര്യം ചെയ്യാനും ആത്മവിശ്വാസം നിലനിർത്താനും നിങ്ങൾ പഠിക്കേണ്ടതുണ്ട്. അതേപോലെ, നിങ്ങൾ നേരിടുന്ന എല്ലാ ജോലികളും പൂർത്തിയാക്കുക, പ്രശ്നങ്ങൾക്ക് നേരെ ശാന്തത പാലിക്കുക. അതിനുപുറമേ, നിങ്ങൾക്ക് ചുറ്റുമുള്ള അമിതാദരവ് കാണിക്കുന്ന ആളുകളെ നിങ്ങൾ സൂക്ഷിക്കേണ്ടതുണ്ട്.
 DESTINY_TEXT3 = നിങ്ങൾ മറ്റുള്ളവർക്ക് പ്രചോദനം നൽകുന്നു, നിങ്ങളുടെ ആശയവിനിമയ കഴിവ് നിങ്ങളുടെ മികച്ച ഗുണമാണ്. നിങ്ങളുടെ ഉള്ളിലെ കഴിവുകളാൽ നിങ്ങൾ ആരുടേയും കീഴിൽ ജോലിചെയ്യാൻ നിങ്ങൾക്ക് ആഗ്രമുണ്ടാവില്ല. നിങ്ങൾ അച്ചടക്കവും ബുദ്ധിശക്തിയും ഉള്ളവരാണ്, നിങ്ങളുടെ സ്നേഹം ശുദ്ധമാണ്, നിങ്ങൾ എല്ലായ്പ്പോഴും നീതി പുലർത്തും. ഇതുകൂടാതെ, നിങ്ങൾ നല്ല വീക്ഷണവും, നർമ്മബോധവും, പ്രായോഗിക കാഴ്ചപ്പാടും ഉള്ള  വ്യക്തിയാണ്. അമിതമായ ചെലവുകൾ ഒഴിവാക്കാനും അസൂയയുള്ള സ്വഭാവം ഒഴിവാക്കാനും ശ്രമിക്കുക. ധനികനോ ജ്ഞാനിയോ ആയിത്തീരാൻ ധൃതിപ്പെടരുത്. മാത്രമല്ല, നിങ്ങളുടെ കോപവും ദ്വൈതസ്വഭാവവും നിങ്ങൾ നിയന്ത്രിക്കേണ്ടതുണ്ട്, അതുപോലെ തന്നെ തെറ്റായ കൂട്ടുകെട്ടിൽ നിന്നും അകന്നു നിൽക്കുക, ​​കാരണം അവ നിങ്ങൾക്ക് ഹാനികരമായിത്തീരും.
 DESTINY_TEXT4 = നിങ്ങളുടെ ജീവിതത്തിൽ ധാരാളം കയറ്റങ്ങളും ഇറക്കങ്ങളും ഉണ്ട്, കൂടാതെ പെട്ടെന്നുള്ള നിരവധി സംഭവങ്ങൾ ഉണ്ടാവുകയും, അവ നിങ്ങൾക്ക് നല്ലതും മോശവുമായ ഫലങ്ങൾ നൽകുകയും ചെയ്യും. നിങ്ങൾക്ക് നിങ്ങളുടെ ജീവിതത്തിലെ മഹത്തായ ഉയരത്തിൽ എളുപ്പത്തിൽ എത്തിക്കാനാകും, എന്നാൽ ഗൂഢാലോചനകൾ നിങ്ങളുടെ ഇറക്കത്തിന് കാരണമാകും. നിങ്ങളുടെ മറ്റുള്ളവരിൽ നിന്നും വ്യത്യസ്തമായ കാഴ്ചപ്പാട് നിങ്ങളെ എവിടെയും ആകർഷണീയത സൃഷ്ടിക്കും. വഴക്കാളിയും, നിങ്ങൾ നിലനിൽക്കുന്ന നിയമങ്ങളും ആചാരങ്ങളും എതിർക്കുകയും, നിരന്തരം പുതിയ നിയമങ്ങൾ സൃഷ്ടിക്കാൻ ശ്രമിക്കുകയും ചെയ്യുന്നു. ബുദ്ധിശാലിയായ ബുദ്ധികൂർമ്മതയുള്ള  ഒരാൾ വളരെ മൃദുലസ്വഭാവവും വൈകാരികതയും ഒഴിവാക്കുകയും, അശുഭചിന്താപരമായ ചിന്തയിൽ നിന്ന് അകന്നുനിൽക്കുകയും ചെയ്യുക. നിങ്ങൾ അവസരങ്ങൾ തിരിച്ചറിയുകയും ദേഷ്യം നിയന്ത്രിക്കേണ്ടതും ആവശ്യമാണ്.
 DESTINY_TEXT5 = നല്ല സുഹൃത്തും, നല്ല മാനസിക ശക്തിയും ഉള്ള വ്യക്തിയും, നിങ്ങൾക്ക് പന്തയം, വിപണി, ചൂതാട്ടം, കച്ചവടം എന്നിവയിൽ താത്പര്യമുണ്ടാകും, കൂടാതെ നിങ്ങൾക്ക് ബിസിനസ്സ് വിജയകരമായി നടത്താനും കഴിയും. മറ്റുള്ളവരെ പ്രേരിപ്പിക്കാനും നിങ്ങളുടെ ചുമതലകൾ നിറവേറ്റാനും സഹായിക്കുന്ന ഒരു സംസാരശൈലിയുണ്ട്. എന്നിരുന്നാലും, പണം സമ്പാദിക്കാനായി ധാർമ്മികതയ്ക്ക് എതിരെ കണ്ണടയ്ക്കാൻ പോലും നിങ്ങൾക്ക് കഴിയും. നിങ്ങളുടെ ഊർജ്ജത്തെ പ്രയോജനപ്പെടുത്തുന്നതിൽ ശ്രദ്ധ കേന്ദ്രീകരിക്കുകയും അസന്തുഷ്ടിതമായ അന്തരീക്ഷത്തിൽ നിന്ന് നിങ്ങൾ നിങ്ങളെത്തന്നെ അകറ്റിനിർത്തുകയും വേണം. നിങ്ങളുടെ ബുദ്ധി, സാമർത്ഥ്യം തുടങ്ങിയ കാരണങ്ങളാൽ നിങ്ങളുടെ സാമ്പത്തിക സ്ഥിതി മികച്ചതായിരിക്കും, കൂടാതെ ഏത് ബിസിനസ്സ് സംരംഭങ്ങളിലും നിങ്ങൾക്ക് പുരോഗതി കൈവരിക്കും.
 DESTINY_TEXT6 = വിധി സംഖ്യ 6 ൽ ജനിച്ചതുകൊണ്ട് നിങ്ങൾ എല്ലാവരുടെയും കണ്ണിലെ ആപ്പിൾ ആണ്, സൗഹാര്‍ദ്ദം നിങ്ങൾക്കുള്ളിൽ തന്നെ ഉണ്ടാവും. നിങ്ങൾ അനുകമ്പയുള്ളതും, മറ്റുള്ളവരെ പരിചരിക്കാൻ താത്പര്യമുള്ളതും, കലാസൃഷ്ടിയും കൂടാതെ ക്രിയാത്മകതയുമുള്ള വ്യക്തിയാണ്. പല വഴികളിലും നിങ്ങൾക്ക് ആകർഷണീയരാണ്, എന്നിരുന്നാലും, ചിലപ്പോൾ നിങ്ങൾ നിങ്ങളുടെ ജോലിയോട് സമർപ്പണമനോഭാവം വെച്ചുപുലർത്തില്ല, അതുമൂലം നിങ്ങൾ കഷ്ടം അനുഭവിക്കേണ്ടുവരും. ജനന സമയത്തുള്ള പ്രണയാത്മകത, നിങ്ങൾക്ക് മനോഹരമായ കാര്യങ്ങളോടും, വിനോദങ്ങളോടും സ്നേഹമുണ്ടാവും. എന്നിരുന്നാലും, ആരെയെങ്കിലും അന്ധതയോടെ വിശ്വാസിക്കുന്നതും, അശ്രദ്ധമായി പ്രവർത്തിക്കുകയോ ചെയ്യാതിരിക്കുക. മാത്രമല്ല, മദ്യം, ലഹരി ഉത്പന്നങ്ങൾ എന്നിവയിൽ നിന്ന് അകന്ന് നിൽക്കണം, സാമൂഹ്യ പ്രവർത്തനങ്ങളിൽ അമിതമായ താൽപര്യം കാണിക്കരുത്.
 DESTINY_TEXT7 = നിങ്ങൾ തികച്ചും ആത്മീയരും, സത്യത്തിനുവേണ്ടിയുള്ള തിരച്ചിൽ നടത്തുകയും എന്തെങ്കിലും പ്രവൃത്തി വിശകലനം ചെയ്യുന്നതുമായ ഒരാളായിരിക്കും. ദൈവിക ദർശനത്തിന്റെ ഉടമ എന്ന നിലയിൽ, നിങ്ങൾക്ക് എളുപ്പം മനസ്സിലാക്കാനും മറ്റുള്ളവരെ സഹായിക്കാനും കഴിയും. മറ്റുള്ളവരുടെ ജീവിതത്തിന്റെ മൂല്യങ്ങൾ വിശദീകരിക്കുന്നതിനായി നിങ്ങൾക്ക് പ്രവർത്തിക്കാനും, വ്യത്യസ്ത സ്ഥലങ്ങളിലും രാജ്യങ്ങളിലും യാത്ര ചെയ്യാനും കഴിയും. നിങ്ങൾക്ക് ചുറ്റുമുള്ള അന്തരീക്ഷത്തിൽ നല്ല ഊർജ്ജത്താൽ നിങ്ങൾക്ക് മറ്റുള്ളവരെ സ്വാധീനക്കാൻ കഴിയും. എന്തെങ്കിലും ബുദ്ധിമുട്ട് ഉളവാക്കുന്ന തോന്നലും എന്തെങ്കിലും അഗാധമായി ചിന്തിക്കുന്നതും നിങ്ങൾ ഒഴിവാക്കേണ്ടതാണ്. ഭൗതികസുഖങ്ങളോട് അനാദരവു കാണിക്കാതിരിക്കുന്നത് ഉചിതമല്ല. നിങ്ങളുടെ പ്രവൃത്തിയിലും ചിന്തയിലും നിങ്ങൾ ചലനാത്മകത പുലർത്തേണ്ടതുണ്ട്.
 DESTINY_TEXT8 = നിങ്ങളുടെ ജീവിതത്തിന്റെ ശാരീരികവും ആത്മീയവുമായ കാര്യങ്ങളിൽ സന്തുലിതത്വം ഉണ്ട്. ശക്തമായ ആഗ്രഹവും, നിങ്ങൾ ക്ഷമിക്കുന്നവരും ദീര്ഘവീക്ഷണമുള്ളവരും ആയിരിക്കും. നിങ്ങൾക്ക് ഒരു വലിയ ഹൃദയം ഉണ്ട്, പക്ഷേ പലപ്പോഴും നിങ്ങക്ക് സ്വയം ദുഃഖവും ഏകാന്തതയും അനുഭവപ്പെടും, ഫലമായി, നിങ്ങൾ വളരെ മൃദുല ഹൃദയരായിരിക്കും. ഈ ജീവിതത്തിൽ, 8 സംഖ്യയിൽ ജനിച്ചവർക്ക്, നിങ്ങൾ ഒന്നുകിൽ അങ്ങേയറ്റം വിജയകരമാവും അല്ലെങ്കിൽ അങ്ങേയറ്റം പരാജയമാകും. സ്വധര്‍മ്മമുള്ള വ്യക്തി, സമർപ്പണമനോഭാവവും നിങ്ങളുടെ ഒരു പ്രധാന നേട്ടമാണ്. സമ്മർദത്തിനു മുമ്പിൽ നിങ്ങൾ മുട്ടു മടക്കുകയില്ലെങ്കിൽ, നിങ്ങളുടെ ജോലിയുമായി ബന്ധപ്പെട്ട കാര്യങ്ങളിൽ നിങ്ങൾ വളരെ വ്യക്തമായി സംസാരിച്ചു കാണിക്കണം.  എല്ലായ്പ്പോഴും നിങ്ങളുടെ പോയിന്റിൽ ഉറച്ചുനിൽക്കുന്നത് തെറ്റാണ്. മറ്റുള്ളവരെകൂടി ശ്രദ്ധിക്കുക, നിങ്ങളുടെ ഭാഗത്താണ് തെറ്റ് എങ്കിൽ അത് അംഗീകരിക്കുക. നിങ്ങളുടെ ഭാവിയെക്കുറിച്ചുള്ള എല്ലാ അശുഭ ചിന്തകളെയും ഒഴിവാക്കുകയും ഏകാന്തതയിലേക്ക് നയിക്കുന്ന സാഹചര്യങ്ങളിൽ നിന്നും അകന്ന് നിൽക്കുകയും ചെയ്യുക.
 DESTINY_TEXT9 = നിങ്ങളുടെ ജീവിതത്തിന്റെ പ്രാരംഭത്തിൽ നിങ്ങൾക്ക് ബുദ്ധിമുട്ട് നേരിടേണ്ടിവരുന്നതിനാൽ നിങ്ങൾക്ക് നല്ല രാഷ്ട്രീയക്കാരനായി മാറും. നിങ്ങൾനല്ല കലാകാരും,   സ്വതന്ത്ര ചിന്താഗതിയും,  തിടുക്കത്തിൽ പ്രവർത്തിക്കുന്നവരുമായിരിക്കും. നിങ്ങൾക്ക് മികച്ച സംഘാധിപത്യ വൈദഗ്ദ്ധ്യവും ശക്തിയും ഉള്ളവരാണ് എന്നിരുന്നാലും ദൃതിപിടിച്ച് കാര്യങ്ങൾ ചെയ്തുതീർക്കാനുള്ള ശ്രമം ഫലപ്രാപ്തിയിലെത്തണമെന്നില്ല. നിങ്ങൾ പലപ്പോഴും സംഭവിക്കാൻ പോകുന്ന കാര്യങ്ങളെക്കുറിച്ച് മനസ്സിൽ ഒരു ഉൾവിളിയാൽ അറിഞ്ഞിരിക്കും. നിങ്ങൾ സഹായകരവും ഉദാരമനസ്കതയുമാണെങ്കിലും, നിങ്ങളുടെ കോപം നിങ്ങൾ നിയന്ത്രിക്കേണ്ടതുണ്ട്. കൂടാതെ, നിങ്ങളുടെ മുതിർന്ന ഉദ്യോഗസ്ഥരെ ബുദ്ധിമുട്ടിക്കുന്നില്ലെന്ന് ഉറപ്പാക്കുക. സാമ്പത്തികമായി നിങ്ങൾ വിജയിക്കും, എന്നാൽ പ്രതികൂല സാഹചര്യങ്ങൾ ഒഴിവാക്കാനോ നേരിടാനോ നിങ്ങൾ ഒരുങ്ങിയിരിക്കേണ്ടതാണ്.
 PLACE_TEXT1 = കിഴക്കൻ ദിശ നിങ്ങൾക്ക് വിജയവും പ്രശംസയും നൽകും. അതിനാൽ, നിങ്ങളുടെ വീടിന്റെ പ്രധാന വാതിൽ ഈ ദിശയിലാണെന്ന് ഉറപ്പാക്കണം. കൂടാതെ, നിങ്ങളുടെ ജോലി ഈ ദിശയിൽ ഉണ്ടെങ്കിൽ, പിന്നെ സമൃദ്ധി നിങ്ങളുടെ ജീവിതത്തിൽ പ്രവേശിക്കും. ഇന്ത്യ, പാക്കിസ്ഥാൻ, തുർക്കി, ബർമ, അഫ്ഗാനിസ്ഥാൻ, ഹോങ്കോംഗ് എന്നിവ നിങ്ങൾക്ക് എല്ലാ സാഹചര്യങ്ങളിലും നിങ്ങൾക്ക് അനുകൂലമായിരിക്കും.
 PLACE_TEXT2 = വടക്ക്-പടിഞ്ഞാറ് ദിശ (വായവ്യ കോണ) നിങ്ങൾക്കായി ഏറ്റവും മികച്ചതായിരിക്കും,  ഈ ദിശയിൽ നടത്തുന്ന ഏതു ശ്രമവും നിങ്ങൾക്ക് വലിയ നേട്ടങ്ങൾ കൈവരുത്തുകയും വിജയത്തിന്റെ പുതിയ ഉയരങ്ങളിലേക്ക് നിങ്ങളെ നയിക്കുകയും ചെയ്യും. അനുകൂലമായിരുന്ന സ്ഥലങ്ങളെക്കുറിച്ച് പറയുമ്പോൾ; ലണ്ടൻ, ടിബറ്റ്, ഫ്രാൻസ്, ജർമ്മനി, ശ്രീലങ്ക, ഡൽഹി, കാബൂൾ തുടങ്ങിയവ നിങ്ങൾക്ക് അനുകൂലമായിരിക്കും.
 PLACE_TEXT3 = നിങ്ങളുടെ മൂല സംഖ്യ 3 ആണെന്നതിനാൽ, വടക്കു-കിഴക്ക് ദിശ (ഇഷാൻ കോണ) നിങ്ങൾക്ക് ഭാഗ്യം, സമൃദ്ധി, സമ്പത്ത് എന്നിവ കൊണ്ടുവരും. കൂടാതെ, യുകെ, നേപ്പാൾ, ഹോളണ്ട്, ഡെൻമാർക്ക്, ഭൂട്ടാൻ തുടങ്ങിയ സ്ഥലങ്ങളിൽ ജീവിക്കുകയോ ജോലി ചെയ്യുകയോ ചെയ്യുന്നത് വിജയം കൊണ്ടുവരും.
 PLACE_TEXT4 = തെക്ക് പടിഞ്ഞാറൻ ദിശയിൽ (നൈരിത്യ കോണ) ജോലി ചെയ്യുകയോ ജീവിക്കുകയോ ചെയ്യുന്നത് നിങ്ങൾ അനുകൂലമായിരിക്കും. അതേപോലെ, ഇറ്റലി, കുവൈറ്റ്, ഹംഗറി, വാഷിങ്ടൺ, മുംബൈ തുടങ്ങിയ സ്ഥലങ്ങൾ നിങ്ങൾക്ക് ശുഭപ്രകരവും അനുകൂലഫലങ്ങൾ പ്രധാനം ചെയ്യുകയും ചെയ്യും. 
 PLACE_TEXT5 = നിങ്ങൾ മൂല സംഖ്യ 5 ൽ ജനിച്ചതുപോലെ വടക്ക്‌ ഏറ്റവും നിങ്ങൾക്കു അനുകൂലമായ ദിശ ആയിരിക്കും. അതുകൊണ്ട്, ഈ ദിശയിൽ ജോലിചെയ്യുമ്പോൾ നിങ്ങൾക്ക് വിജയവും സന്തോഷവും സമൃദ്ധിയും കൈവരും. പ്രത്യേകിച്ച്, കൊറിയ, സൗദി അറേബ്യ, സ്പെയിന്, അമേരിക്ക, ഗോവ, പ്രാഗ് എന്നിവ വളരെ ശുഭകരമാണ്.
 PLACE_TEXT6 = ആഗ്നേയ കോണ, അതായത്, തെക്ക്-കിഴക്ക് ദിശകൾ നിങ്ങൾക്ക് വിജയവും അനുകൂലഫലങ്ങളും കൈവരിത്തും. അതിനാൽ, നിങ്ങളുടെ പ്രവർത്തിമേഖല  ഈ ദിശയിൽ വിപുലീകരിക്കാൻ നിങ്ങൾ ശ്രമിക്കണം. കൂടാതെ ഇന്ത്യ, ഇൻഡോനേഷ്യ, വിയറ്റ്നാം, തായ്ലാന്റ്, സിംഗപ്പൂർ, മലേഷ്യ എന്നീ രാജ്യങ്ങൾ നിങ്ങൾക്ക് ആനുകൂല്യങ്ങളും പ്രശംസകളും നൽകുന്നു.
 PLACE_TEXT7 =  നിങ്ങളുടെ മൂലസംഖ്യ 7 ആണ്, അതിനാൽ തന്നെ ഇഷാൻ കോണ അല്ലെങ്കിൽ വടക്കുകിഴക്കൻ ദിശകൾ നിങ്ങൾക്ക് ഏറ്റവും അനുകൂലമായതാകും. ഈ ദിശയിൽ ജോലി ചെയ്യുകയോ ബിസിനസ് ചെയ്യുകയോ ചെയ്യുന്നത് നിങ്ങൾക്ക് വിജയവും നേട്ടവും കൈവരുത്തും. ഗ്രീസ്, സ്കോട്ട് ലാൻഡ്, റോഡെഷ്യ, കാശ്മീർ, മോസ്കോ, ബാങ്കോങ്ങ് എന്നിവയും നിങ്ങൾക്ക് പ്രയോജനപ്രദവും ഗുണപ്രദായകവുമായ സ്ഥലങ്ങളാണ്.
 PLACE_TEXT8 = ജീവിതത്തിൽ അഭിവൃദ്ധിക്കും ഉയരങ്ങളിലേക്ക് നീങ്ങാനും, പടിഞ്ഞാറ് ദിശ നിങ്ങൾക്ക് നല്ലതാണ്. നിങ്ങളുടെ സ്വന്തം ബിസിനസ്സ് പ്രവർത്തിപ്പിക്കാൻ താല്പര്യമുണ്ടെങ്കിൽ, ഈ ദിശയിൽ അതിനെ വികസിപ്പിക്കുന്നതിന് ശ്രമങ്ങൾ നടത്തിയാൽ നിങ്ങൾക്ക് വിജയം കൈവരിക്കാൻ കഴിയും. കൂടാതെ, ചൈന, മാലസിയ, ഓസ്ട്രിയ, അഡിസ് അബാബ തുടങ്ങിയവ നിങ്ങൾക്ക് പ്രയോജനകരമാണ്, അത് നിങ്ങൾ ഭാഗ്യവും നേട്ടവും കൈവരുത്തും.
 PLACE_TEXT9 = ജീവിതത്തിൽ വിജയം, സന്തോഷം, പ്രശാന്തത എന്നിവ കൊണ്ടുവരുന്ന ദിശയാണ് തെക്ക്. അതുകൊണ്ടുതന്നെ, നിങ്ങൾ നിങ്ങളുടെ ബിസിനസ്സ് വിപുലീകരിക്കാനോ, ജീവിതത്തിൽ പുരോഗതി നേടാനോ ആയി, നിങ്ങളുടെ ജനന സ്ഥലം മുതൽ ഈ ദിശയിലേക്ക് നിങ്ങൾ ശ്രമിക്കും. ഇൻഡോനേഷ്യ പോലെയുള്ള താങ്കളുടെ തെക്കുഭാഗത്തുള്ള രാജ്യങ്ങളും നഗരങ്ങളും സംസ്ഥാനങ്ങളും നിങ്ങൾക്ക് അനുകൂല ഫലങ്ങൾ നൽകുന്നു.
 TIME_TEXT1 = സൂര്യൻ നിങ്ങളുടെ ഭരണ ഗ്രഹമാണ്, അതിനാൽ, എല്ലാ വർഷവും ഏപ്രിൽ തൊട്ട് മെയ് വരെയും, ഓഗസ്റ്റ്  തൊട്ട് സെപ്റ്റംബർ വരെയും അനുകൂലമായ ഫലങ്ങൾ ലഭിക്കും.  ഈ കാലഘട്ടത്തിൽ നിങ്ങൾഏറ്റെടുക്കുന്ന ഏത് ചുമതലയിലും നിങ്ങൾ തീർച്ചയായും വിജയം കൈവരിക്കാൻ കഴിയും. ഈ കാലഘട്ടവും നിങ്ങളുടെ സമൂഹത്തിലുള്ള ബഹുമാനവും, നാമത്തിലും, പ്രശസ്തിയിലും വർദ്ധനവുണ്ടാക്കും.
 TIME_TEXT2 = ചന്ദ്രൻ നിങ്ങളുടെ അധിപ ഗ്രഹമാണ്, വർഷം തോറും മെയ് മുതൽ ജൂൺ വരെ, നിങ്ങൾക്ക് ശുഭ സമയമായിരിക്കും. നിങ്ങളുടെ പരിശ്രമങ്ങളിൽ വിജയിക്കാനുള്ള അവസരം ഈ കാലഘട്ടത്തിൽ കൂടുതലാണ്. അതുകൊണ്ടുതന്നെ ജീവിത്തത്തിൽ വിജയം നേടുന്നതിന് ഈ സമയം നിങ്ങൾ പൂർണ്ണമായി പ്രയോജനപ്പെടുത്തണം.
 TIME_TEXT3 = നിങ്ങളുടെ മൂല നമ്പറിന്റെ അധിപൻ വ്യാഴമാണ് , അതുകൊണ്ട് എല്ലാ വർഷവും ഡിസംബർ മുതൽ ജനുവരിവരെയുള്ള കാലയളവും മാർച്ച് മുതൽ ഏപ്രിൽ വരെയും, എല്ലാ വർഷവും നിങ്ങൾക്ക് പ്രയോജനകരമാണ്. ഈ കാലയളവിൽ നിങ്ങൾ ഏറ്റെടുക്കുന്ന ഏത് ചുമതലയിലും നിങ്ങൾ വിജയം കൈവരിക്കും, അതിനാൽ എന്തെങ്കിലും പ്രധാനപ്പെട്ട ജോലികൾ ആരംഭിക്കാൻ നിങ്ങൾക്ക് ഈ സമയം ഏറ്റവും മികച്ചതായി കാണപ്പെടുന്നു.
 TIME_TEXT4 = നിങ്ങളുടെ മൂല നമ്പറിൻറെ ഉടമ ഹർഷൽ ഗ്രഹമാണ്. മറ്റൊരു സ്രോതസ്സ് അല്ലെങ്കിൽ അഭിപ്രായമനുസരിച്ച്, ഈ മൂല നമ്പറിന്റെ അധിപതിയായി രാഹുവിനെ കണക്കാക്കുന്നു. ഫലമായി, എല്ലാ വർഷവും ജൂലൈ മുതൽ സെപ്തംബർ വരെയുള്ള കാലയളവ് നിങ്ങൾക്ക് വളരെ ശുഭകരമായിരിക്കും. ഇപ്പോൾ നിങ്ങൾ കൈക്കൊള്ളുന്ന  ഏത് കാര്യവും വിജയിക്കും.
 TIME_TEXT5 = ബുധൻ നിങ്ങളുടെ ഭരണ ഗ്രഹമായതിനാൽ, ജൂൺ മുതൽ ജൂലായ് വരെയും, സെപ്തംബർ മുതൽ ഒക്ടോബർ വരെയും നിങ്ങൾക്ക് അനുകൂലമാണ്. നിങ്ങൾ ആഗ്രഹിക്കുന്ന ഏതെങ്കിലുമൊരു ചുമതലകൾ ആരംഭിച്ചാൽ, ഈ സമയത്ത് നിങ്ങൾക്ക് വിജയം കൈവരിക്കാൻ കൂടുതൽ അവസരം ലഭിക്കും.
 TIME_TEXT6 = ശുക്രനാണ് നിങ്ങളുടെ സംഖ്യയുടെ ഉടമ, അതിന്റെ ഫലമായി, മാർച്ച് മുതൽ ഏപ്രിൽ വരെയുള്ള മാസങ്ങളും, മെയ് മുതൽ ജൂൺ വരെയും ഒക്ടോബർ മുതൽ നവംബർ വരെയും നിങ്ങൾക്ക് പ്രയോജനകരമാണ്. നിങ്ങൾ ഈ കാലയളവിൽ ഏറ്റെടുക്കുകയോ അല്ലെങ്കിൽ ആരംഭിക്കുകയോ ചെയ്യുന്ന ഏതൊരു ജോലിയിലും വിജയസാധ്യത കൂടുതലായിരിക്കും. നിങ്ങൾ ജീവിതത്തിൽ സന്തോഷവും സമൃദ്ധിയും മറ്റു സുഖസൗകര്യങ്ങളും കൈവരിക്കുന്നതായിരിക്കും.
 TIME_TEXT7 = കേതു നിങ്ങളുടെ നാഥനായതുകൊണ്ട് തന്നെ, ജൂലൈ മുതൽ ആഗസ്റ്റ് വരെയുള്ള കാലയളവ് നിങ്ങൾക്ക് വളരെ പ്രാധാന്യമുള്ളതായിരിക്കും. നിങ്ങൾ ഏറ്റെടുക്കുന്ന എല്ലാ ജോലികളും ഈ കാലഘട്ടത്തിൽ വിജയകരമാകും, നിങ്ങളുടെ ജീവിതത്തിൽ നിങ്ങൾക്ക് കൂടുതൽ ഐക്യത അനുഭവപ്പെടും. ജീവിതത്തിൽ മുന്നോട്ടു നീങ്ങാനായി ഈ സമയം നിങ്ങൾക്ക് നന്നായി വിനിയോഗിക്കാൻ കഴിയും.
 TIME_TEXT8 = ശനി നിങ്ങളുടെ സംഖ്യയുടെ ഭരണകർത്താവാണ്. അതുകൊണ്ട് വർഷത്തിലെ ജനുവരി മുതൽ മാർച്ച് വരെയുള്ള കാലവും ഒക്ടോബർ മുതൽ നവംബർ വരെയുള്ള കാലയളവും നിങ്ങൾക്കായി വളരെ പ്രയോജനകരമാണ്. ഈ കാലഘട്ടം നിങ്ങൾക്ക് വിജയം കൈവരുത്തും, ഈ സമയത്ത് നിങ്ങൾക്ക് ശുഭകരമായ അല്ലെങ്കിൽ പ്രധാനപ്പെട്ട ജോലികൾ ആരംഭിക്കാൻ കഴിയും.
 TIME_TEXT9 = നിങ്ങളുടെ സംഖ്യയുടെ നാഥൻ ചൊവ്വ ആണ്, അതുകൊണ്ടു തന്നെ ജനുവരി മുതൽ ഫെബ്രുവരി വരെയും, ഏപ്രിൽ മുതൽ മാർച്ച് വരെയും, നവംബർ മുതൽ ഡിസംബർ വരെയും, നിങ്ങൾക്ക് ശുഭകരമാണ്. ഈ കാലഘട്ടത്തിൽ ഏറ്റെടുക്കുന്ന പ്രവർത്തനങ്ങളിൽ നിങ്ങൾക്ക് പുതിയ തലങ്ങളിൽ വിജയം നേടാൻ കഴിയുകയും, തൽഫലമായി നിങ്ങൾ ജീവിതത്തിൽ പുരോഗതി പ്രാപിക്കുകയും ചെയ്യും.
 HEALTH_TEXT1 = മൂല സംഖ്യ 1 പ്രകാരം ജനിക്കുന്നതിനാൽ നിങ്ങൾ കുതിരയെപ്പോലെ ആരോഗ്യമുള്ളവരാണ്, പക്ഷേ ചില രോഗങ്ങളുടെ സാധ്യതയും നിലനിൽക്കുന്നു. ഹൃദയസംബന്ധമായ രോഗങ്ങൾ, പമ്പിങ്, രക്തസമ്മർദം, രക്തബന്ധമുള്ള അസുഖങ്ങൾ, വാർദ്ധക്യത്തിൽ ഉയർന്ന രക്തസമ്മർദം, കണ്ണുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങൾ എന്നിവയാൽ നിങ്ങൾക്ക് വിഷമമുണ്ടാവാം. നിങ്ങൾ ഇവയോട് ശ്രദ്ധാലുക്കളായിരിക്കണം, ഒപ്പം നിങ്ങളുടെ ആരോഗ്യകരമായ ജീവിത ശൈലി നിലനിർത്തുകയുംചെയ്യുക.
 HEALTH_TEXT2 = നിങ്ങൾക്ക് വളരെയധികം ചിന്തിക്കുന്ന ഒരു ശീലം ഉണ്ട്, അല്ലെങ്കിൽ പ്രശ്നങ്ങളെക്കുറിച്ച് ഉത്കണ്ഠാകുലനാകാം, അതുതന്നെയാണ് എല്ലാ പ്രശ്നങ്ങളുടെയും മൂലകാരണം. ഇത് വയറുവേദന പ്രശ്നങ്ങൾ, ദഹനസംവിധാനത്തിലെ പ്രശ്നങ്ങൾ, ഗ്യാസ് പ്രശ്നം, കുടൽ പ്രശ്നങ്ങൾ, മുഴകൾ തുടങ്ങിയ രോഗങ്ങൾക്ക് ഇടയാക്കും. അതിനാൽ, നിങ്ങൾ ആശങ്കകൾ ഒഴിവാക്കണം. നിങ്ങൾ മദ്യം കഴിക്കുകയോ ലഹരിമരുന്നോ അല്ലെങ്കിൽ മയക്കുമരുന്നോ ഉപയോഗിക്കരുത്. മാത്രമല്ല, നന്നായി പാകം ചെയ്ത ഭക്ഷണം കഴിക്കുകയും, ആവശ്യത്തിന് വെള്ളം കുടിക്കുകയും ചെയ്യണം.
 HEALTH_TEXT3 = വ്യാഴത്തിന്റെ അനുഗ്രഹമുള്ളതിനാൽ സാധാരണയായി നിങ്ങൾക്ക് അധികം വിഷമങ്ങൾ ഉണ്ടാവില്ല. എന്നിരുന്നാലും, ചിലപ്പോഴൊക്കെ നിങ്ങളുടെ അശ്രദ്ധമൂലം, നിങ്ങൾക്ക്  ഞരമ്പുമായി ബന്ധപ്പെട്ട അസുഖം (ചൊറിച്ചിൽ), സന്ധിവാതം (കാൽപ്പാദം അല്ലെങ്കിൽ പിന്നിൽ വേദന), ചർമ്മരോഗങ്ങൾ തുടങ്ങിയ പ്രശ്നങ്ങൾ ഉണ്ടാകാം. അതിനാൽ, നിങ്ങൾ ജാഗ്രത പുലർത്തേണ്ടതും നിങ്ങളുടെ ക്ഷേമത്തെ പരിപാലിക്കേണ്ടതുമാണ്.
 HEALTH_TEXT4 = രാഹുവിന്റെ സ്വാധീനത്താൽ നിങ്ങൾ നിങ്ങളുടെ തലച്ചോറ് സജീവമായി ഉപയോഗപ്പെടുത്തുന്നു, എന്നാൽ എന്തിന്റെയും അമിതോപയോഗം എല്ലായ്പ്പോഴും മോശമാണ് എന്ന് നിങ്ങൾ ഓർക്കണം. തത്ഫലമായി, ചിലതരം ട്രോമ, മാനസിക അസ്വസ്ഥതകൾ, രക്ത സംബന്ധിയായ പ്രശ്നങ്ങൾ, തല - മുട്ടുവേദനയും, മൂത്രപ്രശ്നങ്ങളും അത്തരം പ്രശ്നങ്ങളും നിങ്ങൾക്ക് അനുഭവിക്കേണ്ടതായി വരും. അതിനാൽ, ആരോഗ്യകരമായ ജീവിതനിലവാരം നിലനിർത്തുകയും, ധ്യാനത്തിന്റെയും യോഗയുടെയും സഹായത്തോടെ ഏറ്റവും മികച്ച ജീവിതം നയിക്കുകയും ചെയ്യുക.
 HEALTH_TEXT5 = നിങ്ങളുടെ ജീവിതത്തിൽ ബുധന്റെ സ്വാധീനം മൂലം നിങ്ങൾക്ക് മൂർച്ചയേറിയ ബുദ്ധിയുണ്ടാകും, നിങ്ങളുടെ പ്രായത്തേക്കാൾ ചെറുപ്പമായി കാണപ്പെടും. എന്നാൽ മറുവശത്ത്, നിങ്ങളുടെ ജീവിതകാലത്തിനായുള്ള ന്യൂറൈറ്റിസ് (ഞരമ്പ് വീക്കം), വായിൽ അൾസർ, കണ്ണുകൾ, കൈകൾ, ഉറക്കമില്ലായ്മ, പക്ഷാഘാതം (പക്ഷാഘാതം അല്ലെങ്കിൽ സ്ട്രോക്ക്), പോളിയോ തുടങ്ങിയവയുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങൾ നിങ്ങൾക്ക് ഉണ്ടാകാനിടയുണ്ട്. അതുകൊണ്ട് നിങ്ങൾ ഒരു അച്ചടക്കമുള്ള ജീവിതം നയിക്കണം, നിങ്ങളുടെ ക്ഷേമത്തെക്കുറിച്ച് അശ്രദ്ധമായിരിക്കരുത്.
 HEALTH_TEXT6 = ശുക്രൻ, നിങ്ങളുടെ മൂല നമ്പറിന്റെ കർത്താവ്, എല്ലാ സുഖസൗകര്യങ്ങളുടേയും സൂചകമാണ്, അതിനാൽ നിങ്ങൾ തിന്നുകയും, കുടിക്കുകയും, വസ്ത്രധാരണം ചെയ്യുകയും മറ്റ് ലോകോത്തര സുഖങ്ങളിൽ സന്തോഷം ആസ്വദിക്കുകയും ചെയ്യുന്നു. പലപ്പോഴും, ഇത് പ്രശ്നങ്ങളുടെ ഒരു വലയം നിങ്ങൾക്ക് നൽകാം. പ്രധാനമായും, തൊണ്ട, മൂക്ക്, നാവ്, നെഞ്ച് സംബന്ധമായ അസുഖങ്ങൾ, ഹൃദയ സംബന്ധമായ അസുഖങ്ങൾ എന്നിവയുമായി ബന്ധപ്പെട്ട രോഗങ്ങളാണ്. അതിനാൽ, നിങ്ങൾ ഇവയെക്കുറിച്ച് പ്രത്യേകിച്ച് ജാഗ്രത പുലർത്തേണ്ടതുണ്ട്, ആരോഗ്യ പ്രശ്നങ്ങളൊന്നും അവഗണിക്കരുത്.
 HEALTH_TEXT7 = ഏഴാം നമ്പറിൽ ജനിക്കുന്നത്, മറ്റുള്ളവരെ അപേക്ഷിച് നിങ്ങളുടെ രോഗപ്രതിരോധവ്യവസ്ഥ ദുർബലവും, അതിനാൽ ചില അസുഖങ്ങളുടെ പിടിയിലകപ്പെടുന്നതിനെ സൂചിപ്പിക്കുന്നു. തത്ഫലമായി, നിങ്ങൾക്ക് പലപ്പോഴും അസുഖം പിടിപെടാം, പലപ്പോഴായി തലകറക്കം, പെട്ടെന്ന് തലവേദന, തലവേദന, ഹൃദയ സംബന്ധമായ അസുഖങ്ങൾ, മാനസികശേഷി നഷ്ടപ്പെടുക, നാവും ശ്വാസകോശ രോഗങ്ങളും ഉണ്ടാവാം.
 HEALTH_TEXT8 = നിങ്ങൾ പൊതുവായി ഒരു അച്ചടക്കമുള്ള വ്യക്തിയാണ്, ജീവിതത്തിന്റെ എല്ലാ മേഖലകളിലും നിങ്ങൾ ആവശ്യമായ പ്രാധാന്യം ഉണ്ട്. ഫലമായി, നിങ്ങൾ നല്ല ആരോഗ്യം ആസ്വദിക്കാൻ കഴിയും, എന്നിരുന്നാലും നിങ്ങളുടെ ഗുരുതരമായ രോഗ ഭീതി നിങ്ങളുടെ പതിവും,വ്യവസ്ഥിതികളെയും ബാധിക്കാം. നിങ്ങളുടെ വൃക്ക, കുടൽ, തലവേദന, രക്തവുമായി ബന്ധപ്പെട്ട അസുഖങ്ങൾ എന്നിവയുമായി ബന്ധപ്പെട്ടിരിക്കുന്നു.
 HEALTH_TEXT9 = പൂർണ്ണ സംഖ്യ 9 ൽ നിങ്ങൾ ജനിച്ചതിനാൽ, നിങ്ങൾ സ്വാഭാവികമായും ഊർജ്ജസ്വലരായിരിക്കും. ഫലമായി നിങ്ങൾ പൊതുവെ ആരോഗ്യമുള്ളവരാണ്, എന്നാൽ മറുവശത്ത് നിങ്ങൾ എളുപ്പത്തിൽ ദേശ്യമുണ്ടാവുന്നു അല്ലെങ്കിൽ പലപ്പോഴും തിദുഃഖത്തിൽ ജോലി ചെയ്തു തീർക്കുന്നത് നിങ്ങളുടെ ആരോഗ്യത്തെ ബാധിക്കും. രക്തസംബന്ധ പ്രശ്നങ്ങൾ, മുറിവുകൾ, വസൂരി, ചിക്കൻപോക്സ്, അല്ലെങ്കിൽ ചില തരത്തിലുള്ള ശസ്ത്രക്രിയ നിങ്ങൾക്ക് സാധ്യതയുള്ളതിനാൽ ശ്രദ്ധാലുവായിരിക്കുക.
 CAREER_TEXT1 = അങ്ങേയറ്റം ഭക്തിയോടെ, നിങ്ങൾ കഠിനാധ്വാനം ചെയ്യുമ്പോൾ, നിങ്ങൾ നന്നായി പുരോഗമിക്കുകയും നിങ്ങളുടെ ഉദ്യോഗത്തിൽ ഉയർച്ച നേടുകയും ചെയ്യും. വൈദ്യുതി, തീ, സയൻസ്, ടെക്നോളജി, ഗവേഷണം, ആഭരണങ്ങൾ, രത്നങ്ങൾ, ചില ശസ്ത്രക്രിയകൾ, രാജ്യത്തിന്റെ അംബാസിഡർ ആവുക, രാഷ്ട്രീയക്കാരൻ, പട്ടാളം സൈന്യത്തിലെ ഉദ്യോഗസ്ഥൻ എന്നിവയുമായി ബന്ധപ്പെട്ട മേഖലകൾ നിങ്ങൾക്ക് ഏറ്റവും മികച്ചതാണ്. ഇവയിൽ ഏതിലെങ്കിലുമോ അല്ലെങ്കിൽ ഇവയുമായി ബന്ധപ്പെട്ട മേഖലയുമായി നിന്നോ നിങ്ങളുടെ തൊഴിൽ തിരഞ്ഞെടുക്കാവുന്നതാണ്.
 CAREER_TEXT2 = മൂല സംഖ്യ 2 ന് ജനിക്കുന്നവർക്ക് ചന്ദ്രന്റെ ദിവ്യ കൃപയും ദിവ്യാനുഭൂതിയും ഉണ്ടാവും, അത് വെള്ളത്തിന്റെയും ദ്രാവകത്തിന്റെയും സൂചകമായതിനാൽ, അതുമായി ബന്ധിപ്പിക്കപ്പെട്ട ഒരു മേഖല  നിങ്ങളുടെ ഔദ്യോഗിക മേഖലയായി തിരഞ്ഞെടുക്കുന്നത്, കൂടുതൽ പ്രയോജനകരമാകും. പ്രത്യേകിച്ചും ദ്രവക വസ്തുക്കൾ, യാത്രപരമായ ജോലി, ഏതെങ്കിലും മേഖലയിലെ ദല്ലാൾ, ഹോട്ടൽ വ്യാപാരം, പത്രപ്രവർത്തനം, പാട്ട്, നൃത്തം, കവിത എഴുതുക, ഭൂമി ഇടപാട്, ഐസുമായി ബന്ധപ്പെട്ട ജോലി, വെള്ളി, അരി എന്നിവയുമായി ബന്ധപ്പെട്ട വ്യവസായം തുടങ്ങിയവ നിങ്ങൾക്ക് അനുകൂലമായിരിക്കും. 
 CAREER_TEXT3 = മൂലസംഖ്യ 3 ൽ ജനിച്ചവർക്ക് ദിവ്യ കൃപയും വ്യാഴത്തിന്റെ പ്രത്യേക അനുഗ്രഹങ്ങളും ലഭിക്കുന്നു, അതുകൊണ്ട് വ്യാഴ ഗ്രഹവുമായി ബന്ധപെട്ട ഏതെങ്കിലും ജോലികൾ നിങ്ങളെ വിജയത്തിലേക്ക് നയിക്കും.ടീച്ചർ, സേവന ജോലികൾ, നിയമപരമായ ജോലികൾ, ജഡ്ജ്,  ഹര്‍ജി സമര്‍പ്പിക്കുന്ന ആള്‍, സെക്രട്ടറി, പോലീസ്, തത്വശാസ്ത്ര യോഗ്യതപരമായ ജോലികൾ, ബാങ്കിങ്, ഏതെങ്കിലും സാമ്പത്തിക കമ്പനികൾ അല്ലെങ്കിൽ പരസ്യ വകുപ്പുമായി ബന്ധപ്പെട്ട പ്രവൃത്തി, എന്നിവയെല്ലാം നിങ്ങളുടെ ജീവിതത്തിൽ കൂടുതൽ അഭിവൃദ്ധി കൈവരുത്തും.
 CAREER_TEXT4 = നിങ്ങളുടെ മൂല സഖ്യ  4 ആയതിനാൽ, നിങ്ങളുടെ വ്യക്തിത്വത്തിൽ രാഹുവിന്റെ പല സ്വഭാവസവിശേഷതകളും ഉൾക്കൊള്ളുന്നു, അതിനാലാണ് നിങ്ങൾ ഏറ്റവും കൂടുതൽ കഠിനമായ ജോലികൾ പോലും വളരെ എളുപ്പത്തിൽ പരിഹരിക്കാൻ കഴിയുക. റെയിൽവേ, കപ്പൽ ഗതാഗതം, ഖനനം, മറ്റ് സാങ്കേതിക പ്രവർത്തനങ്ങൾ, സംക്ഷേപലേഖകന്‍ (സ്റ്റെനോഗ്രാഫർ), തയ്യൽ, എൻജിനീയർ, ജ്യോതിഷകൻ, മാന്ത്രികൻ, അദ്ധ്യാപനം തുടങ്ങിയവയുമായി ബന്ധപ്പെട്ട മേഖലയിൽ ജോലി ചെയ്യുകയോ ബിസിനസ്സ് ചെയ്യുകയോ ചെയ്യുക, ഇത് നിങ്ങൾക്ക് വിജയം കൊണ്ടുവരും. അതിനാൽ, ഈ മേഖലയുമായി ബന്ധപ്പെട്ട ജോലി തിരഞ്ഞെടുക്കേണ്ടതാണ്,അതുമൂലം നിങ്ങളുടെ എല്ലാ വൈഷമ്യവും അവസാനിക്കുന്നതാണ്.
 CAREER_TEXT5 = നിങ്ങളുടെ മൂല നമ്പറിന്റെ കർത്താവു ബുധനാണ്. ഇതുമൂലം, ഈ സംഖ്യ പ്രകാരം ജനിച്ചവർക്ക് ഗ്രഹത്തിന്റെ പ്രത്യേക സ്വാധീനം ഉണ്ടാവും, നിങ്ങളുടെ എല്ലാ ജോലികളും ബുദ്ധിപരമായി നിവർത്തിക്കാൻ ഇത് നിങ്ങളെ സഹായിക്കും. അതിനാൽ, നിങ്ങളുടെ ശാരീരിക ശക്തിക്കുപകരം നിങ്ങളുടെ മാനസിക ശക്തി ആവശ്യമുള്ള ഒരു ജോലി തിരഞ്ഞെടുക്കേണ്ടതുണ്ട്. എഞ്ചിനീയറിങ്, വില്പന സംബന്ധിച്ചുളള ജോലി, അക്കൌണ്ടൻസി, റെയിൽവേ, ടെലിഗ്രാഫ്, പത്രപ്രവർത്തനം, പുകയില, റേഡിയോ ഇടപാടുകൾ, ഏജന്‍റ്, കമ്മീഷൻ എന്നീ മേഖലകൾ  നിങ്ങൾക്ക് കൂടുതൽ പ്രയോജനപ്രദമാകും.
 CAREER_TEXT6 = ഈ സംഖ്യ ശുക്രന്റെ പ്രത്യേക കൃപ നിങ്ങൾക്ക് നൽകുന്നു, സൗന്ദര്യവും ആകര്‍ഷകത്വവും നിങ്ങളിൽ ഏറ്റവും മികച്ചതായി തീരുന്നു. ഇവയുമായി ബന്ധപ്പെട്ട മേഖലകളിൽ ജോലിചെയ്യുന്നത്തിലൂടെ നിങ്ങൾക്ക് വിജയം നേടാൻ കഴിയും. കൂടാതെ, നിങ്ങൾക്ക് ആഭരണങ്ങൾ, എൻജിനീയറിങ്, വാസ്‌തുശൈലി, ഭക്ഷണത്തിന്റെ ഗുണമേന്മ പരിശോധിക്കുന്നയാൾ,ഹോട്ടൽ, നിർമ്മാണം, നോവൽ എഴുത്തുകാരൻ, മ്യൂസിയം, കല എന്നീ മേഖലകളിലും ശ്രമിക്കാവുന്നതാണ്.
 CAREER_TEXT7 = നിങ്ങൾ ഈ സംഖ്യയിൽ ജനിച്ചതിനാൽ, ജീവിതത്തിൽ ധാരാളം പോരാടേണ്ടതുണ്ടായിരുന്നു, അത് നിങ്ങൾ ജീവിതത്തിലെ വ്യത്യസ്ത പാഠങ്ങൾ പഠിക്കാൻ സഹായിച്ചു. ഫലമായി, നിങ്ങൾക്ക് വിജയം, നല്ല ഭാഗ്യം, സമ്പത്ത് എന്നിവ കൊണ്ടുവരുന്ന ഇത്തരം നിരവധി ഉദോഗ മേഖലകൾ ഉണ്ട്. സിനിമാ വ്യവസായം, യാത്ര, എയർഹോസ്റ്റസ്, പാൽ ഉല്പാദന കേന്ദ്രം, ഡ്രൈവർ, മത്സ്യ വിൽപനക്കാരൻ, രസതന്ത്രജ്ഞൻ, ഹോസ്പിറ്റൽ, സിഐഡി, ബോഡി ബിൽഡർ തുടങ്ങിയ മേഖലകൾ ഇതിൽ പെടുന്നവയാണ്. 
 CAREER_TEXT8 = നിങ്ങൾ ശനിയുടെ ആധിപത്യത്തോടൊപ്പം ജനിച്ചതായതിനാൽ, പുരോഗതിക്കും ജോലികയറ്റത്തിനും സമയമെടുത്തേക്കാം, പക്ഷേ അവ തീർച്ചയായും നിങ്ങളിലേക്ക് വരും. ചില മേഖലകൾ മികച്ച ഉയരം നേടാൻ നിങ്ങളെ സഹായിക്കും, കൂടാതെ ഈ നിർദ്ദിഷ്ട മേഖല നിങ്ങളുടെ ഉദ്യോഗ മേഖലയായി തിരഞ്ഞെടുക്കുന്നതിലൂടെ നിങ്ങൾ  പെട്ടെന്ന് വിജയിക്കാൻ സഹായിക്കും, ഒപ്പം പണം സമ്പാദിക്കുന്നതിനും സംഭരിക്കുന്നതിനും നല്ല അവസരങ്ങൾ ലഭിക്കും. പ്രധാനമായും ഒരു കളിക്കാരൻ, എൻജിനീയർ, പോലീസ്, മേയർ, ഭാരം അളക്കൽ, കോൺട്രാക്ടർ, ജയിൽ, ലേബർ വർക്ക്, സംഗീതം തുടങ്ങിയ മേഖല അനുകൂലമായിരിക്കും.
 CAREER_TEXT9 = ചുവന്ന ഗ്രഹവും, ചൊവ്വയുമായി നിങ്ങളുടെ സംഖ്യക്ക് സ്വാധീനമുണ്ട്, ജീവിതത്തിൽ വളരെയധികം സ്നേഹം നിങ്ങൾക്ക് ലഭിച്ചിട്ടുണ്ട്, നിങ്ങൾ നേതൃത്വം  ഗുണങ്ങളാൽ സമ്പുഷ്ടമായതിനാൽ, നിങ്ങളുടെ ഉള്ളിൽ ഒരു ജീവന്റെ ഊർജ്ജം ഉണ്ടായിരിക്കും, അത് ജീവിതത്തിൻറെ വിവിധ മേഖലകളിൽ നിങ്ങളെ മുന്നോട്ടു നയിക്കും.
 FAST_TEXT1 = ഞായറാഴ്ചകളിൽ ഉപവാസം അനുഷ്ഠിക്കുക, അത് ശുക്ല പക്ഷത്തിൽ ഞായറാഴ്ച തുടങ്ങണം. ഉപവാസം അനുഷ്ടിച്ചുക്കുന്ന ദിവസം ഒരു നേരം മാത്രം ഭക്ഷണം  കഴിക്കുകയും ആദിത്യ ഹൃദയ സ്തോത്രം ചൊല്ലുകയും ചെയ്യുക. നിങ്ങൾക്ക് സൂര്യ ഭീജ മന്ത്രയും ജപിക്കാവുന്നതാണ്. സാധ്യമെങ്കിൽ, ഉപ്പ്  ഒഴിവാക്കുക, ചുവന്ന നിറമുള്ള വസ്ത്രങ്ങൾ ധരിക്കുക, ഒരു ചെമ്പ് പാത്രത്തിൽ വെള്ളം സൂക്ഷിച്ച ശേഷം അത് സൂര്യന് സമർപ്പിക്കുക.
 FAST_TEXT2 = തിങ്കളാഴ്ച, 7 അല്ലെങ്കിൽ 16, അല്ലെങ്കിൽ 54 ദിവസമെങ്കിലും നിങ്ങൾ തിങ്കളാഴ്ച വ്രതമനുഷ്ഠിക്കണം. തിങ്കളാഴ്ച  പൂർണിമ ദിവസമോ (പൂർണ്ണചന്ദ്രനിൽ) അല്ലെങ്കിൽ ചിത്തിര നക്ഷത്രത്തിലോ ആയാൽ അത് ഒരു ശുഭമുഹൂർത്തമായി കണക്കാക്കുന്നു, ഈ ദിവസം വ്രതമനുഷ്ഠിക്കുന്നത് വളരെ ഗുണപ്രദമാണ്.  വെളുത്ത നിറമുള്ള വസ്ത്രങ്ങൾ ധരിച്ച് ശിവന് പാൽ സമർപ്പിക്കുക. വ്രത ദിവസത്തിൽ ഒരിക്കൽ മാത്രം കഴിക്കുകയും, ചന്ദ്രന്റെ ബീജ മന്ത്രം ചൊല്ലുകയും ചെയ്യുക.
