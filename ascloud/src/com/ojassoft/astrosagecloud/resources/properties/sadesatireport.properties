	SADESATIRISINGPHASE	= This is starting period of Shani's Sade Sati. In this period Saturn will be transiting in 12th house from the Moon. It generally indicates financial loss, problems by hidden enemies, aimless travel, disputes, and poverty. During this period, you may face problems created by your hidden enemies. Relationship with your colleagues will not good enough and they will create problems in your work environment. You may also face challenges on your domestic front. This may create pressure and tension. You need to exercise control over your spending otherwise it be lead to bigger financial problems. Long distance travels may not be fruitful during this period. Saturn’s nature is of delay and dejection, but generally you will get results eventually, so be patient and wait for your turn. Take this period as learning period, put your hard work and things will fall in place. You are advised not to take high risks in business matters in this period.
	SADESATIPEAKPHASE		= This is the peak of Shani's Sade Sati. Generally this phase of Saturn is the most difficult one. Saturn transiting over natal Moon indicates health problems, character assassination, problems in relationship, mental afflictions, and sorrows. You will find it difficult to achieve success in this period. You may not get results of your hard work and feel restricted. Your constitution and immune system will not be strong. As first house is the house of health, you should start exercising and taking care of your health, otherwise you can be caught by chronic diseases. You may suffer from depression, unknown fear or phobia. Your will lack clarity in thinking, action, and decision making. You will be spiritually inclined and will be attracted by intricacies of nature. Acceptance and doing basics right will sail you out of this period.
	SADESATISETTINGPHASE	= This is 'setting' period of Shani's Sade Sati. Saturn will be transiting in the 2nd house from the natal Moon, which indicates difficulty on financial and domestic front. You will start feeling slight relief after having two difficult phases of Sade Sati. Still, misunderstandings and financial stress can be seen during this period. Expenses may keep soaring high and you need to continue exercising control. Sudden financial losses and fear of theft is also a possibility. You may be pessimistic in thinking, you are advised to deal with matters enthusiastically. You will require paying good attention to family and personal front, otherwise those can also lead to a bigger problem. For students, education may be slightly affected and they will have to work harder to hold on to their existing level. Results will be slow and almost always with the delay. This is a period which indicates danger and apart from other things, you need to be careful while driving. If possible, stay away from non-veg and your drinking habits to keep Saturn happy. You will be able to sail through this period by intelligently handling your domestic and financial matters.
	IMPNOTE				= Above predictions are of general nature and are based on general belief that Sade Sati is harmful. Truly speaking, we found that it is not always the case and we recommend reading <b><u><a href=http://www.astrocamp.com/vedicastrology/2008/09/shani-sade-sati.html>this article on Sade Sati</a></u></b>. Any conclusion based on Sade Sati alone is not correct and has good chances of failing. Certain factors like current running dasa and nature of Saturn also needs to be analyzed before we can conclude whether Sade Sati period will be malefic or benefic. You are advised not to take above forecasts seriously and in case of any doubt, consult a good astrologer.
