	GEMINTRO							= ইতিহাস জুড়ে প্রাথমিক ভাবে রত্নের ব্যবহার নিরাময় এবং আধ্যাত্মিক ধর্মানুষ্ঠানের জন্য হয়ে এসেছে। রত্নের সৌন্দর্য এবং দুর্লভ বলে এটি ধারন করার পর এক অদ্ভুত ক্ষমতা অনুভব হয়। তারা শরীরের বিভিন্ন অংশে যোগাযোগের মাধ্যমে ক্ষমতা প্রেরণ করে থাকে। রত্ন ধারণ উপকারী না ক্ষতিকর তা ধারণ করার ভিত্তিতেই বোঝা যায়। সমস্ত পাথর বা রত্নের মধ্যে আকর্ষণ থাকে যা আমাদের উপকারই করে। তাদের মধ্য থেকে এক শক্তিশালী কম্পন বা স্পন্দন নির্গত হয়। এখানে আপনার রত্ন পাথর ভবিষ্যদ্বাণীর মতো দেখতে কি।
	STONE_DESCRIPTION					= লগ্ন প্রভু হিসাবে জীবন একটা মণি। অতীন্দ্রিয় ক্ষমতার অভিজ্ঞতার জন্য এটা ধারণ করতে পারেন। পাথর ধারণে আপনার বাধা অপসারণ হবে এবং জীবনে সুখ, সাফল্য ও সমৃদ্ধি পাবেন। সর্বসাধারণের ক্ষেত্রেই এটা বেশ লাভদায়ক। এর মহাজাগতিক রশ্মি তার অস্তিত্বকে প্রভাবিত করে।# জীবন প্রচেষ্টা এবং নিয়তির নিখুঁত মিশ্রন। পাথর আপনার জীবনের ভাগ্যও বদলে দেয়। যেকোনো একটা পাথর আপনার জীবনের চমক ধরে রাখে। তাই পাথর ধারণ করার আপনাকে পরামর্শ দেব:#পাথর ভাগ্য পাথর নামেও পরিচিত যেটি নবম ঘরের পালনকর্তা হিসাবে কাজ করে।আপনার প্রয়োজন অনুযায়ী পাথর নিজের কাজ করে। সৌভাগ্য আপনার ব্যক্তিগত ও পেশাগত  উপায়ে আসে। আপনার সমৃদ্ধির বাধানিষেধ হিসাবে এটা কাজ করে।
	
