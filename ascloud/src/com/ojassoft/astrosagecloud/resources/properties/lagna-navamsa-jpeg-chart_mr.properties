SAVE_CHART_INTRO_PARA = कधी कधी ऑन लाईन शेरिंग किंवा छपाई करीता आलेखांची गरज पडते. हे पृष्ठ त्याचकरिता उपयुक्त आहे. खालील आलेखांवर राईट क्लिक करा व आणी निवडा - 'प्रतिमा याप्रमाणे वाचवा ' किंवा 'चित्र याप्रमाणे वाचवा'. आलेखाची फाईल आपल्या लोकल मशीन वर वाचवा. ही फाईल जे पेग फोर्मेट मध्ये वाचवली जाईल , जो  इंटरनेट मधला लोकप्रिय इमेज फोर्मेट आहे. हा वाचाविलेला आलेख फेसबुक व ट्विटर सारख्या सोशल नेट्वर्किंग वेब साईट वर श्येर केला जाऊ शकतो किंवा तुमच्या वेब साईट वा ब्लोग वर प्रकाशित केला जाऊ शकतो.
