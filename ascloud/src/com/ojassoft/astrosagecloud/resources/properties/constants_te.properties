#'LalKitab-Remedies-Rules.asp

LALKITAB_REMEDIES_RULES    =  లాల్ కితాబ్ పరిష్కారాలకు సంబంధించిన నియమాలు
LALKITAB_REMEDIES_RULES1   =  ఇతర సమయాలలో చేయాలని సూచించబడితే తప్ప, పరిష్కారాలన్నీ సూర్యోదయం తరువాత, పగటి పూట చేయాల్సి ఉంటుంది. పరిహారాలను మబ్బులు ముసురుకున్నపుడు చేయకూడదని కొంతమంది  చెబుతారు. మబ్బులు ముసురుకున్నరోజు, రాత్రి పూటలాగా శనికి సంబంధించిన రోజు. కానీ పశ్చిమంలో, చాలావరకు చలికాలం దట్టంగా మరియు చీకటిగా ఉన్నప్పుడు, ఇలాంటి నిర్బంధాలు ఉండవు.
LALKITAB_REMEDIES_RULES2   =  దీర్ఘకాలం పాటూ చేసిన పరిహారాలు, ఉదా 6 రోజుల, 10 రోజుల, 43 రోజుల మొ.నవి, క్రమంతప్పకుండా అంతరాయం కలుగకుండా చేయాలి. ఒకవేళ ఏదైనా కారణం చేత పరిష్కారానికి అంతరాయం కలుగవచ్చని అనుమానం ఉంటే, అలాంటి పరిస్థితులలో మీ ఇంట్లో పాలలో కడిగిన బియ్యం ఉంచడం ఉత్తమమైన పని. ఒకవేళ అది 43 రోజుల పరిష్కారమయితే, మీరు ఎక్కడికైనా నాలుగు రోజులపాటూ ప్రయాణం చేయాల్సి వచ్చి, ఆ పరిష్కారాన్ని మీరు చేయలేని పరిస్థితి వచ్చినపుడు, మీరు తిరిగి వచ్చినపుడు ఆ పరిష్కారాన్ని మీరు వదలివేసినప్పటి నుండి తిరిగి ప్రారంభించవచ్చు.
LALKITAB_REMEDIES_RULES3   =  ఒక పరిష్కారాన్ని ఒకే సమయంలోనే చేయండి. మొదటి పరిహారం పూర్తయినపుడు రెండవ పరిష్కారాన్ని చేయండి. ఒకవేళ పరిష్కార క్రమం తెలుపబడితే, అలాగే అనుసరించండి. ఇదివరకే పరిష్కార క్రమం తెలుపబడక పోయినట్లయితే, ఒకరోజు పరిష్కారాన్ని ముందుగా చేసి, తరువాత దీర్ఘమైన పరిష్కారాన్ని చేయడం ఉత్తమమైన పద్ధతి.
LALKITAB_REMEDIES_RULES4   =  తదుపరి పరిహారం ప్రారంభించేముందు కొన్ని రోజుల విరామాన్ని ఇవ్వండి. వీలయితే ఒక వారం తరువాత దానిని ప్రారంభించండి. మరియు చివరగా, దేశీయుని తరపున రక్తసంబంధీకుడు పరిష్కారాన్ని చేస్తున్నట్లయితే, అతను ఫలానా వారికొరకు మరియు వారి తరపున ఈ పరిష్కారాన్ని చేస్తున్నట్లుగా మనసులో ’సంకల్పం’ చేసుకోవాలి, లేకపోతే అది అతనికి పరిహారం అవుతుంది మరియు ఇది కోరదగినది కాదు.

