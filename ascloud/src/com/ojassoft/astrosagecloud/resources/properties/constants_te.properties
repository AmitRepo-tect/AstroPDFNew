NAME_COMAPTIBILITY_USING_NUMEROLOGY_P1            = ప్రేమించ బడుట అనేది ఒక గొప్ప వరము వంటిది. ప్రేమను నిర్వచించుటకు ఎందరో ప్రయత్నించిరి కానీ వైఫల్సమైరి. ప్రేమను దర్శించుటలో మీదైన శైలిని కలిగి ఉందురు, ప్రేమ మీ మనసును ఊహాలోకములలో విహరింప చేయును. మనమందరం ప్రేమను విభిన్నముగా అవగతము చేసుకొందుము. మీరు ఏవరినైనా గాఢముగా ప్రేమిస్తూ వారితోనే జీవితమంతా ఉండ దలిచారా? అయునచో మీరు అద్రుష్ట వంతులు. ఏ ప్రేమ బంధమైనా చిరస్థాయిగా ఉండాలంటే దానికి కావలసినది సారూప్యత. ఆస్ట్రో సేజ్ మీకు మీ పేరు ఏమి తెలుపుతోందో సత్వరమే తెలియచెసే బహుమతి ఇస్తోంది. మీరు సారూప్యత తెలుసుకొనుటలో చింతించవలసిన అవసరములేదు లేక వివిధ పద్ధతులలో ప్రయత్నించవలసిన అవసరము లేదు. సంఖ్యాశాస్త్ర నామ సారూప్యత క్రింద కేవలము మీ పేరును తెలియజేసిన వెంటనే మీ సారూప్యతా వివరములు మీ ముందుండును. ఈ సారూప్యతా గణన నిర్దిష్టముగా ఉండును కావునా మీకు ముఖ్యమైన నిర్ణయములు తీసుకోనుటలో మరియు మీ ఇరువురి మధ్య సరూప్యత విషయములో ఉపకరించును. మీ మనసులో ఉన్న సందేహములనే మబ్బులను తొలగించి మీ ప్రేమ బంధమును ధైర్యముగా ముందుకు తీసుకువెళ్ళే సమయము ఆసన్నమయినది.
