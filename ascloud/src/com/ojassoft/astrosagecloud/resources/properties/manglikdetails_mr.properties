
	PERSON												= व्यक्ति   
	MANGLIK											= मंग्लिक 
	PERSON_IS_MANGLIK									= व्यक्ती मांगळीक
	PERSON_IS_NOT_MANGLIK								= व्यक्ती मांगळीक नाही
	MANGLIK_DETAILS_PARAGRAPH1							= साधारणतः मांगलिक दोष जन्म पत्रिकेतील लग्न व चंद्राच्या स्थानांवरून मांडले जातात.
	MANGLIK_DETAILS_FIRST								= जन्मपत्रिकेत मंगळ आहे 
	MANGLIK_DETAILS_SECOND								=  घर लग्नापासून, व चंद्र आलेखात मंगळ आहे 
	MANGLIK_DETAILS_THIRD								=  घर.
	MANGLIK_DETAILS_HENCE_NOTE							= मंगळ दोष आहे
	PRESENT_NEITHER_IN_LAGNA_CHART_NOR_IN_MOON_CHART	= अत: मंगळ दोष न लग्न चार्ट मध्ये आणि ना ही चंद्र चार्ट मध्ये उपस्थित है।
	MANGLIK_DETAILS_HENCE_NOTE1						= अत: मंगळ दोष लग्न कुंडली आणि चंद्र कुंडली मध्ये उपस्थित आहे. 
	MANGLIK_DETAILS_HENCE_NOTE2						= अत: मंगळ दोष लग्न कुंडली मध्ये उपस्थित आणि चंद्र कुंडली मध्ये उपस्थित नाही.
	MANGLIK_DETAILS_HENCE_NOTE3						= अतः मंगळ दोष लग्न कुंडली मध्ये उपस्थित नाही परंतु चंद्र कुंडली मध्ये उपस्थित आहे.  
	MANGLIK_DETAILS_PARAGRAPH4							= मंगळ दोष व्यक्तीच्या वैवाहिक जीवनात अडथळे आणू शकतो. काहींचे मानणे आहे की मंगळ दोषामुळे जोडीदारास वरचेवर आजारपण किंवा मृत्यू देखील येऊ शकतो.
	MANGLIK_DETAILS_PARAGRAPH5							= असे मानले जाते की मांगलिक व्यक्तीचे दुसऱ्या मांगलिक व्यक्तीबरोबर लग्न झाल्यास मंगळ दोषाचा प्रभाव नष्ट होतो.
	MANGLIK_DETAILS_SUBHEADING1						= काही इलाज (मंगळ दोष असल्यास)
	MANGLIK_DETAILS_SUBHEADING2						= इलाज (विवाह पूर्वीचे)
	MANGLIK_DETAILS_SUBHEADING3						= इलाज (विवाह नंतरचे)
	MANGLIK_DETAILS_PARAGRAPH6							= कुंभ विवाह, विष्णु विवाह व अश्वथ विवाह हे मंगळ दोषावर लोकप्रिय इलाज आहेत. अश्वथ विवाह म्हणजे पिंपळ किंवा केळीच्या झाडाशी लग्न करून त्यानंतर ते झाड कापून टाकणे. कुंभ विवाह, ज्याला घट विवाह देखील म्हणतात, म्हणजेच एखाद्या मडक्याशी विवाह करून ते मडके फोडून टाकणे.
	REMEDIES1											= केशरिया गणपती (शेंदरी रंगाची गणेशाची प्रतिमा) देव्हाऱ्यात ठेऊन तिची रोज पूजा करावी. 
	REMEDIES2											= हनुमान चालीसाचा जप करून रोज हनुमानाची आराधना करावी.
	REMEDIES3											= महामृत्युंजय पाठ करावा (महामृत्युंजय मंत्राचे पठण करावे).
	MANGLIK_DETAILS_SUBHEADING4						= इलाज (लाल किताब वर आधारित विवाहानंतरचे)
	LK_REMEDIES1										= पक्ष्यांना गोड खाऊ घालावे. 
	LK_REMEDIES2										= (हस्तिदंत) हाथी दांत घरी ठेवावा.
	LK_REMEDIES3										= वडाच्या झाडाची दुध व गोड पदार्थाने पूजा करावी.
	MANGLIK_DETAILS_NOTE								= आमचा सल्ला आहे की आपण ज्योतिष्याशी सल्लामसलत करून मगच हे इलाज स्वतः करावेत.
