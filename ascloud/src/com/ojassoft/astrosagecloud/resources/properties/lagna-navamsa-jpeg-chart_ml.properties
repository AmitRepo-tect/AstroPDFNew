   
    SAVE_CHART_AS_IMAGE_FILE_JPEG                  = ചാർട്ട് ചിത്രം ആക്കി സേവ് ചെയ്യുക(jpeg) 
    PRINT_EMBED_OR_SHARE_CHART_ON_FACEBOOK_TWITTER = ഫേസ്ബുക്ക് / ട്വീറ്ല്രിൽ ചാർട്ട് പ്രിൻറ്റോ, സമ്യോജിപ്പിക്കുകയോ, ഷെയറൊ ചെയ്യുക
    SAVE_CHART_INTRO_PARA                          = ചില സമയങ്ങളിൽ നമുക്ക് ഓൺലൈൻ ആയി പങ്കു വയ്ക്കുവാനോ പ്രിൻറ്റ് ചെയ്യുവാനോ ചാർട്ട് ആവശ്യമായി വരും. ഈ പേജിലുള്ള സൗകര്യങ്ങൾ ഇതിന് ഉപകരിക്കുന്നു. താഴെയുള്ള ചാർട്ടിൽ റൈറ്റ് ക്ലിക്ക് ചെയ്ത് ''save picture as ..'' അല്ലെങ്കിൽ ''save image as ..'' തിരഞ്ഞെടുത്ത് ചാർട്ട് ഫയൽ നിങ്ങളുടെ കമ്പ്യൂട്ടറിൽ സേവ് ചെയ്യുക. ഇത് ഇൻറ്റർനെറ്റിൽ വളരെ പ്രമുഖമായ ചിത്ര രീതിയായ JPEG രീതിയിൽ സേവ് ചെയ്യുന്നു. ഇങ്ങനെ സേവ് ചെയ്തിരിക്കുന്ന ചാർട്ട് സോഷ്യൽ നെറ്റ് വർക്കുകളായ ഫേസ്ബുക്കിലോ ട്വീറ്ററിലോ പങ്കു വയ്ക്കാവുന്നതും അല്ലെങ്കിൽ നിങ്ങളുടെ വെബ്സൈറ്റിലോ ബ്ലോഗിലോ പ്രചരിപ്പിക്കാവുന്നതും ആണ്.
