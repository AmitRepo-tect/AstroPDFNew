SAVE_CHART_INTRO_PARA = অনেক সময় তালিকাকে আমরা বিতরন বা ছাপার জন্য ব্যবহার করে থাকি। এই পাতায় সব পাবেন। শুধু তালিকাতে রাইট ক্লিক করে সিলেক্ট করুন ''সেভ পিকচার এস.''  অথবা  ''সেভ ইমেজ 
এস ..'' এবং আপনার মেশিনে তালিকার ফাইল টি সংরক্ষিত করুন। এই ফাইল টি ইন্টারনেট জগতের জনপ্রিয় ফরম্যাট জেপিইজি তে সেভ হবে। এই সংরক্ষিত কুষ্ঠি ফেসবুক ও টুইটার এর মত সোশ্যাল নেটওয়ার্কিং ওয়েবসাইটে বিতরন 

করা যাবে, অথবা আপনার ওয়েবসাইট বা ব্লগে প্রকাশ করা যাবে।
