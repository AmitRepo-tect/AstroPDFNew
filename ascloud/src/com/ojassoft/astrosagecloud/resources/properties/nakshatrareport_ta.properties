

	 WHAT_IS_NAKSHATRA							= நட்சத்திரம் என்றால் என்ன ?
	 NAKSHATRA_INTRO							= ஜோதிஷத்தில் நக்ஷத்திரங்களை சந்திர மாளிகை என்று சொல்வார்கள். ஒரு நக்ஷத்திரம் கதிரவன் பாதையில் உள்ள  27 (சில முறை 28) தொகுப்புகளின் ஒரு பகுதி. ஒரு நக்ஷத்திரம் மேலும் 4 பாதங்களில் பிரிக்கப்பட்டது. இவை சாமானிய ஜோதிஷ நடைமுறையில் பின்பற்ற பட்டவை. இதில் ஒவ்வொரு பாதமும் ஒரு அக்ஷரத்தால் இணைக்கப்பட்டுள்ளது மற்றும் பிறந்த சிசுவின் சந்திரன் எந்த நக்ஷத்திர பாதத்தில் இருக்கிறதோ அதன் பெயர் அந்த அக்ஷரத்தில் ஆரம்பிக்கும்.
