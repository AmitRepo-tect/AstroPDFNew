
     LK_Rin_TEXT                        = നിങ്ങളുടെ ലാൽ കിതാബ് ജാതകം അടിസ്ഥാനമാക്കിയുള്ള ലാൽ കിതാബ് കടങ്ങൾ (ഋണങ്ങൾ)
     RINS                               = പൂർവ്വികന്മാരുടെ കടം#സ്വന്തം Debt#അമ്മയാലുള്ള കടം #സ്ത്രീയാലുള്ള കടം #സഹോദരൻ അല്ലെങ്കിൽ ബന്ധുക്കളാലുള്ള കടം #മകളാലുള്ള കടം #ചൂഷകന്മാരലുള്ള കടം #ജനിച്ചിട്ടില്ലാത്തവരുടെ  കടം #പ്രകൃതിയുടെ കടം 
     LK_FOREFATHER_DEBTS_SYMPTOM        = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ രണ്ടാമത്തെ, അഞ്ചാമത്തെ, ഒൻപതാമത്തെ അല്ലെങ്കിൽ പന്ത്രണ്ടാമത്തെ ഭാവത്തിൽ ശുക്രൻ, ബുധൻ, രാഹു എന്നിവ നിന്നാൽ ജാതകൻ പൂർവ്വികരുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_FOREFATHER_DEBTS_REASON         = മുതിർന്നവർ കുടുംബ പുരോഹിതനെ മാറ്റിയിട്ടുണ്ടാകാം
     LK_FOREFATHER_DEBTS_INDICATION     = സമീപത്തുള്ള ഒരു അമ്പലത്തിന്‍റെയോ അരയാലിന്‍റെയോ നാശം
     LK_FOREFATHER_DEBTS_REMEDY         = 1. രക്തബന്ധമുള്ളവരിൽ നിന്നും നാണയങ്ങൾ ശേഖരിക്കുകയും ശേഖരിച്ച പണം ഒരു ദിവസം തന്നെ അമ്പലത്തിന് സംഭാവന ചെയ്യുകയും ചെയ്യുക.<br/>2. നിങ്ങളുടെ വീട്ടിൽ അരയാലുണ്ടെങ്കിൽ അതിന് വെള്ളമൊഴിക്കുകയും പരിപാലിക്കുകയും ചെയ്യുക.
     FATHER_DEBTS_FALSE                 = നിങ്ങളുടെ ജാതകം പൂർവ്വികരുടെ കടബാധ്യതയിൽ നിന്നും മുക്തമാണ്.
     FATHER_DEBTS_TRUE                  = നിങ്ങളുടെ ജാതകം പൂർവ്വികരുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടാം. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     LK_SELF_DEBTS_SYMPTOM              = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ അഞ്ചാമത്തെ ഭാവത്തിൽ ശുക്രൻ, ശനി, രാഹു, കേതു എന്നിവ നിന്നാൽ ജാതകൻ സ്വന്തം കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_SELF_DEBTS_REASON               = നിങ്ങളുടെ പൂർവ്വികൻമാരും മുതിർന്നവരും പരമ്പരാഗതമായ കുടുംബ ആചാരങ്ങൾ കർക്കശമായിം പാലിക്കുകയില്ല കൂടാതെ പരമോന്നതനായ സർവ്വശക്തനിലുള്ളാ വിശ്വാസം നിരസിക്കുകയും ചെയ്യും.
     LK_SELF_DEBTS_INDICATION           = വീടിന്‍റെ പിന്നിൽ അടുപ്പോ സൂര്യപ്രകാശം നേരിട്ടു കടക്കുന്നതിനായി മേൽക്കൂരയിൽ ഒന്നിലധികം ദ്വാരങ്ങൾ ഉണ്ടായിരിക്കുകയോ വേണം.
     LK_SELF_DEBTS_REMEDY               = 1. എല്ലാ കുടുംബാംഗങ്ങളിൽ നിന്നും തുല്യമായ പണം പിരിച്ച് യജ്ഞം നടത്തുക.
     SELF_DEBTS_FALSE                   = നിങ്ങളുടെ ജാതകം സ്വന്തം കടങ്ങളിൽ നിന്നും മുക്തമാണ്.
     SELF_DEBTS_TRUE                    = നിങ്ങളുടെ ജാതകം സ്വന്തം കടങ്ങളാൽ ബാധിക്കപ്പെടാം. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     LK_MOTHER_DEBTS_SYMPTOM            = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ  നാലാം ഭാവത്തിൽ കേതു നിന്നാൽ ജാതകൻ മാതാവിന്‍റെ കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_MOTHER_DEBTS_REASON             = ഇതിനു കാരണമെന്തെന്നാൽ നിങ്ങളുടെ പൂർവ്വികർ  അമ്മയെ അവഗണിക്കുകയോ അല്ലെങ്കിൽ പീഡിപ്പിക്കുകയോ അല്ലെങ്കിൽ ഒരു കുഞ്ഞിന്‍റെ  ജനനശേഷം അമ്മയെ കുഞ്ഞിൽ നിന്നും അകറ്റി നിർത്തുകയോ അല്ലെങ്കിൽ അമ്മയുടെ ദുഖങ്ങളെ അവഗണിക്കുകയോ ചെയ്തിട്ടുണ്ടാകാം.
     LK_MOTHER_DEBTS_INDICATION         = സമീപത്തുള്ള കിണറോ പുഴയോ ആരാധിക്കുന്നതിനു പകരം അഴുക്കും മാലിന്യങ്ങളും കളയുവാൻ ഉപയോഗിച്ചിരിക്കാം.
     LK_MOTHER_DEBTS_REMEDY             = 1. രക്തബന്ധമുള്ള എല്ലാവരിൽ നിന്നും  തുല്യമായ അളവിൽ വെള്ളി എടുത്ത് ഒരു ദിവസം തന്നെ അതൊരു പുഴയിൽ ഒഴുക്കുക.
     MOTHER_DEBTS_FALSE                 = നിങ്ങളുടെ ജാതകം അമ്മയുടെ കടങ്ങളിൽ നിന്നും മുക്തമാണ്.
     MOTHER_DEBTS_TRUE                  = നിങ്ങളുടെ ജാതകം മാതാവിന്‍റെ കടങ്ങളാൽ ബാധിക്കപ്പെടും. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     LK_WOMAN_DEBTS_SYMPTOM             = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ  രണ്ടാമത്തെ അല്ലെങ്കിൽ ഏഴാമത്തെ ഭാവത്തിൽ സൂര്യൻ, ചന്ദ്രൻ, രാഹു എന്നിവ നിന്നാൽ ജാതകൻ സ്ത്രീകളുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_WOMAN_DEBTS_REASON              = ഇതിനുകാരണം നിങ്ങളുടെ പൂർവ്വികരോ മുതിർന്നവരോ ഏതെങ്കിലും തരത്തിലുള്ള അത്യാഗ്രഹം മൂലം ഗർഭിണിയായ സ്ത്രീയെ കൊലചെയ്തിരിക്കാം.
     LK_WOMAN_DEBTS_INDICATION          = വീട്ടിൽ പല്ലുള്ള മൃഗങ്ങൾ പ്രത്യേകിച്ച് പശു ഉണ്ടായിരിക്കുകയോ അല്ലെങ്കിൽ ഗോത്രവിദ്വേഷത്തിൽ വിശ്വസിക്കുകയോ ചെയ്യാം.
     LK_WOMAN_DEBTS_REMEDY              = 1. എല്ലാ കുടുംബാംഗങ്ങളിൽ നിന്നും തുല്യമായ പണം എടുത്ത് ആ പണം ഉപയോഗിച്ച് ഒരു ദിവസം തന്നെ 100 പശുക്കൾക്ക് രുചിയുള്ള ഭക്ഷണം നൽകുക.
     WOMAN_DEBTS_FALSE                  = നിങ്ങളുടെ ജാതകം സ്ത്രീകളുടെ കടങ്ങളിൽ നിന്നും മുക്തമാണ്.
     WOMAN_DEBTS_TRUE                   = നിങ്ങളുടെ ജാതകം സ്ത്രീകളുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     LK_RELATIVES_DEBTS_SYMPTOM         = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ  ഒന്നാമത്തെ അല്ലെങ്കിൽ എട്ടാമത്തെ ഭാവത്തിൽ ബുധൻ, കേതു എന്നിവ നിന്നാൽ ജാതകൻ ബന്ധുക്കളുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_RELATIVES_DEBTS_REASON          = ഇതിനു കാരണം നിങ്ങളുടെ ഒരു പൂർവ്വികൻ   ഒരാളുടെ പാകമായ വിളകൾക്കോ അല്ലെങ്കിൽ വീടിനോ തീയിടുകയോ, ആർക്കെങ്കിലും വിഷം നൽകുകയോ, ആരുടെയെങ്കിലും ഗർഭിണിയായ എരുമയെ കൊല്ലുകയൊ ചെയ്തിരിക്കാം.
     LK_RELATIVES_DEBTS_INDICATION      = ബന്ധുക്കളെ കണ്ടുമുട്ടുന്നതിൽ വെറുപ്പ്, കുട്ടികളുടെ ജന്മദിനം, ഉത്സവങ്ങൾ, മറ്റ് സന്തോഷങ്ങൾ എന്നീ അവസരങ്ങളിൽ കുടുംബത്തിൽ നിന്നും മാറി നിൽക്കുക.
     LK_RELATIVES_DEBTS_REMEDY          = 1. രക്തബന്ധമുള്ള എല്ലാ അംഗങ്ങളിൽ നിന്നും തുല്യമായ പണം എടുത്ത് ഒരു ഹക്കിമിന് നൽകുകയോ അല്ലെങ്കിൽ മറ്റുള്ളവരെ സഹായിക്കുവാനായി ഒരു ഡോക്ടറിന് നൽകുകയോ ചെയ്യുക.<BR/>2. രക്തബന്ധമുള്ള എല്ലാ അംഗങ്ങളിൽ നിന്നും തുല്യമായ പണം എടുത്ത് മരുന്നുകൾ വാങ്ങി ഏതെങ്കിലും കാരുണ്യ സ്ഥാപനങ്ങൾക്ക് സംഭാവന നൽകുക.
     RELATIVES_DEBTS_FALSE              = നിങ്ങളുടെ ജാതകം ബന്ധുക്കളുടെ കടങ്ങളിൽ നിന്നും മുക്തമാണ്.
     RELATIVES_DEBTS_TRUE               = നിങ്ങളുടെ ജാതകം ബന്ധുക്കളുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     LK_DAUGHTER_DEBTS_SYMPTOM          = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ  മൂന്നാമത്തെ അല്ലെങ്കിൽ ആറാമത്തെ ഭാവത്തിൽ ചന്ദ്രൻ നിന്നാൽ ജാതകൻ മകളുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_DAUGHTER_DEBTS_REASON           = ഇതിനുകാരണം നിങ്ങളുടെ പൂർവ്വികരോ മുതിർന്നവരോ ഒരു പെൺകുട്ടിയെയോ അല്ലെങ്കിൽ ആരുടെയെങ്കിലും സഹോദരിയെയോ കൊല്ലുകയോ അല്ലെങ്കിൽ പീഢിപ്പിക്കുകയോ ചെയ്തിരിക്കം.
     LK_DAUGHTER_DEBTS_INDICATION       = കളഞ്ഞു കിട്ടിയ കുട്ടികളെ വിൽക്കുകയോ അല്ലെങ്കിൽ അതു വഴി നേട്ടം ഉണ്ടാക്കുകയോ ചെയ്താൽ
     LK_DAUGHTER_DEBTS_REMEDY           = 1. രക്തബന്ധമുള്ള എല്ലാവരും മഞ്ഞ നിറത്തിലുള്ള കവടികൾ (ചെറിയ ചിപ്പികൾ) വാങ്ങി കത്തിച്ച് ചാരമാക്കി അതേ ദിവസം തന്നെ പുഴയിലൊഴുക്കുക.
     DAUGHTER_DEBTS_FALSE               = നിങ്ങളുടെ ജാതകം മകളുടെ കടങ്ങളിൽ നിന്നും മുക്തമാണ്.
     DAUGHTER_DEBTS_TRUE                = നിങ്ങളുടെ ജാതകം മകളുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     LK_OPPRESSOR_DEBTS_SYMPTOM         = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ  പത്താമത്തെ അല്ലെങ്കിൽ പതിനൊന്നാമത്തെ ഭാവത്തിൽ സൂര്യൻ, ചന്ദ്രൻ, ചൊവ്വ എന്നിവ നിന്നാൽ ജാതകൻ ചൂഷകന്‍റെ കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_OPPRESSOR_DEBTS_REASON          = ഇതിനുകാരണം നിങ്ങളുടെ പൂർവ്വികരോ മുതിർന്നവരോ  ആരുടെയെങ്കിലും വീട് ചതിച്ച് സ്വന്തമാക്കുകയോ ഒരുതരത്തിലും അതിന് വില കൊടുക്കാതിരിക്കുകയോ ചെയ്തിരിക്കാം.
     LK_OPPRESSOR_DEBTS_INDICATION      = വീടിന്‍റെ  പ്രധാന പ്രവേശന കവാടത്തിന്‍റെ ദർശനം തെക്കോട്ട് ആയിരിക്കും, അല്ലെങ്കിൽ വീടിരിക്കുന്ന സ്ഥലം വാങ്ങിയിരിക്കുന്നത് മക്കളില്ലാത്ത ആരുടെയെങ്കിലും കൈയ്യിൽ നിന്നായിരിക്കും, അല്ലെങ്കിൽ വീട് വച്ചിരിക്കുന്നത് ഒരു റോഡിന്‍റെയോ അല്ലെങ്കിൽ കിണറിന്‍റെയോ  മുകളിലായിരിക്കാം.
     LK_OPPRESSOR_DEBTS_REMEDY          = 1. വ്യത്യസ്ഥങ്ങളായ 100 സ്ഥലങ്ങളിലുള്ള മത്സ്യങ്ങൾക്ക് തീറ്റ നൽകുക അല്ലെങ്കിൽ 100 തൊഴിലാളികൾക്ക് ആഹാരം നൽകുക.
     OPPRESSOR_DEBTS_FALSE              = നിങ്ങളുടെ ജാതകം ചൂഷകന്‍റെ കടങ്ങളിൽ നിന്നും മുക്തമാണ്.
     OPPRESSOR_DEBTS_TRUE               = നിങ്ങളുടെ ജാതകം ചൂഷകന്‍റെ കടങ്ങളാൽ ബാധിക്കപ്പെടും. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     LK_UNBORN_DEBTS_SYMPTOM            = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ  പന്ത്രണ്ടാമത്തെ ഭാവത്തിൽ സൂര്യൻ, ശുക്രൻ, ചൊവ്വ എന്നിവ നിന്നാൽ ജാതകൻ ജനിച്ചിട്ടില്ലാത്തവരുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_UNBORN_DEBTS_REASON             = ഇതിനുകാരണം നിങ്ങളുടെ പൂർവ്വികരോ മുതിർന്നവരോ  ഭാര്യയുടെയോ ഭർത്താവിന്‍റെയോ ബന്ധുക്കളുടെയോ അല്ലെങ്കിൽ മറ്റേതെങ്കിലും ആരുടെയെങ്കിലും ബന്ധുക്കളുടെയോ കുടുംബം നശിച്ചു പോകുന്ന രീതിയിൽ അവരെ ചതിച്ചിട്ടുണ്ടാകാം. 
     LK_UNBORN_DEBTS_INDICATION         = ഇതിനുകാരണം നിങ്ങളുടെ പൂർവ്വികരോ മുതിർന്നവരോ  ഭാര്യയുടെയോ ഭർത്താവിന്‍റെയോ ബന്ധുക്കളുടെയോ അല്ലെങ്കിൽ മറ്റേതെങ്കിലും ആരുടെയെങ്കിലും ബന്ധുക്കളുടെയോ കുടുംബം നശിച്ചു പോകുന്ന രീതിയിൽ അവരെ ചതിച്ചിട്ടുണ്ടാകാം. 
     LK_UNBORN_DEBTS_REMEDY             = 1. രക്തബന്ധമുള്ള എല്ലാ ബന്ധുക്കളിൽ നിന്നും ഓരോ തേങ്ങ വീതം എടുത്ത് ഒരേ ദിവസം ഒരു നദിയിലോ അല്ലെങ്കിൽ ഒഴുകുന്ന വെള്ളത്തിലോ അർപ്പിക്കുക.
     UNBORN_DEBTS_FALSE                 = നിങ്ങളുടെ ജാതകം ജനിച്ചിട്ടില്ലാത്തവരുടെ കടങ്ങളിൽ നിന്നും മുക്തമാണ്.
     UNBORN_DEBTS_TRUE                  = നിങ്ങളുടെ ജാതകം ജനിച്ചിട്ടില്ലാത്തവരുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     LK_NATURE_DEBTS_SYMPTOM            = ലാൽ കിതാബ് പ്രകാരം, ഒരു ജാതകത്തിന്‍റെ  ആറാമത്തെ ഭാവത്തിൽ ചന്ദ്രൻ, ചൊവ്വ എന്നിവ നിന്നാൽ ജാതകൻ ജനിച്ചിട്ടില്ലാത്തവരുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും.
     LK_NATURE_DEBTS_REASON             = ഇതിനുകാരണം നിങ്ങളുടെ പൂർവ്വികരോ മുതിർന്നവരോ  പാവപ്പെട്ട നായയെയോ മറ്റോ നശിപ്പിച്ചിരിക്കാം.
     LK_NATURE_DEBTS_INDICATION         = നായയെ വെടിവച്ചു കൊല്ലുകയോ, മറ്റൊരാളുടെ മകനെ കൊല്ലുകയോ, അല്ലെങ്കിൽ ഉന്മൂലനാശം വരത്തക്കവണ്ണം ഒരു അനന്തരവനെ ചതിക്കുകയോ ചെയ്തിരിക്കാം.
     LK_NATURE_DEBTS_REMEDY             = 1. രക്തബന്ധമുള്ള എല്ലാ അംഗങ്ങളിൽ നിന്നും ഒരേ ദിവസം പണം എടുത്ത് പാലുകൊണ്ടുണ്ടാക്കിയ മധുര പലഹാരങ്ങളോ നെയ്യോ 100 നായകൾക്ക് തീറ്റയായി നൽകുക. <br/>2. സമീപ പ്രദേശത്തു വസിക്കുന്ന വളരെ ചെറിയ പ്രായത്തിൽ തന്നെ വിധവയായ ഒരു സ്ത്രീയെ സേവിക്കുകയും അവരുടെ അനുഗ്രഹങ്ങൾ നേടുകയും ചെയ്യുക.
     NATURE_DEBTS_FALSE                 = നിങ്ങളുടെ ജാതകം പ്രകൃതിയുടെ കടങ്ങളിൽ നിന്നും മുക്തമാണ്.
     NATURE_DEBTS_TRUE                  = നിങ്ങളുടെ ജാതകം പ്രകൃതിയുടെ കടങ്ങളാൽ ബാധിക്കപ്പെടും. മുകളിൽ കൊടുത്തിരിക്കുന്ന സൂചനകൾ നിങ്ങൾക്ക് ബാധകമാണെങ്കിലോ കൂടാതെ നിങ്ങളുമായി രക്തബന്ധം ഉള്ളവരുടെ ജാതകത്തിൽ ഇതേ സംയോഗം തന്നെ ഉണ്ടെങ്കിലോ, നിങ്ങൾക്ക് മുകളിൽ കൊടുത്തിരിക്കുന്ന പരിഹാര മാർഗങ്ങൾ തന്നെ അനുഷ്ഠിക്കാവുന്നതാണ്.
     ANCESTRAL_DEBTS                    = പൂർവ്വീകരുടെ കടങ്ങൾ
	 RinIntroduction                    = ലാൽ കിതാബ് പ്രകാരം, കടം ഒരു ജാതകത്തിന്‍റെ ഏറ്റവും വലിയ ദൗർബ്ബല്യങ്ങളിൽ ഒന്നായി കണക്കാക്കപ്പെട്ടിരിക്കുന്നു.. പൈതൃകമായ കടം എന്ന് ഉദ്ദേശിക്കുന്നത് പിതൃക്കളും മുതിർന്നവരും ചെയ്തിട്ടുള്ള പാപത്തിന്‍റെ ഫലം ആ വ്യക്തിക്ക് ഉണ്ടാകുമെന്നാണ്. മറ്റൊരു തരത്തിൽ പറഞ്ഞാൽ, മറ്റാരെങ്കിലും ചെയ്ത തെറ്റിന്‍റെ അനന്തരഫലം ബന്ധുക്കൾ വഹിക്കേണ്ടി വരുമെന്നാണ്. ഒരാളുടെ ജാതകത്തിൽ കാണിച്ചിരിക്കുന്ന കടം അതേപോലതന്നെ മറ്റു ബന്ധുക്കളുടേയും ജാതകത്തിൽ കാണിച്ചിരിക്കും. പൊതുവേ വംശം മുഴുവൻ കടത്തിന്‍റെ പേരിൽ ബുദ്ധിമുട്ടുകയും അതിനാൽ വംശത്തിന്‍റെ  മുഴുവൻ സഹായത്താലാകണം പരിഹാരങ്ങൾ ചെയ്യുവാൻ. ഈ ആൾക്ക് രാജയോഗം ഉണ്ടെങ്കിൽ പോലും(രാജകീയ സംയോഗം), കടത്തെ സൂചിപ്പിക്കുന്ന ഗ്രഹങ്ങൾ മോശമായ ഫലങ്ങൾ മാത്രമേ നൽകുകയുള്ളു.
