I_DESC=As a <b>Thinker</b>, you like to work with <b>''information''</b>. Curious, analytical, and independent, you plan things with your "observation and understanding".  Science, technology, theory, and information are your interest areas.
R_DESC=As a <b>Doer</b>, you like to work with <b>''things''</b>. Practical and competitive, you approach problem solving "by doing something rather than sitting or thinking about it." Working on physical, outdoor and mechanical tasks interests you the most.
C_DESC=As an <b>Organizer</b>, you like to work with <b>''data''</b>. Efficient, logical, and unimaginative, you like to manage data with precision and accuracy. You like structure and order and dislike unstructured or unclear work.
E_DESC=As a <b>Persuader</b>, you like to work with <b>''people and data''</b>. Energetic, ambitious and confident, you use your communication skills to persuade/lead others. You like working in positions of power to add value & reputation.
A_DESC=As a <b>Creator</b>, you like to work with <b>''ideas''</b>. Imaginative, emotional, and impractical, you  like to "explore different things and try new ways of experimenting it." Rebel against rules and structure, you prefer "creativity over orders".
S_DESC=As a <b>Helper</b>, you like to work with <b>''people''</b>. Working in cooperative environments, you like to improve the lives of other people. Friendly, cooperative, and sociable, you build social connections with other people.