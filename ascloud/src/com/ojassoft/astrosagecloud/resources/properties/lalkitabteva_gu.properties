

	 TEVA						= ધર્મી જન્મકુંડળી#રતાંધ જન્મકુંડળી#અંધ જન્મકુંડળી#સગીર જન્મકુંડળી
	 DHARMI_TEVA_FALSE			= તમારી જન્મકુંડળી ધર્મી જન્મકુંડળી નથી.
	 DHARMI_TEVA_TRUE			= તમારી જન્મકુંડળી ધર્મી જન્મકુંડળી છે.
	 RATAANDHA_TEVA_FALSE		= તમારી જન્મકુંડળી રતાંધ જન્મકુંડળી નથી.
	 ANDHA_TEVA_TRUE			= તમારી જન્મકુંડળી અંધ જન્મકુંડળી છે.
	 ANDHA_TEVA_FALSE			= તમારી જન્મકુંડળી અંધ જન્મકુંડળી નથી.
	 RATAANDHA_TEVA_TRUE		= તમારી જન્મકુંડળી રતાંધ જન્મકુંડળી છે.
	 NABALIG_TEVA_TRUE			= તમારી જન્મકુંડળી સગીર જન્મકુંડળી છે.
	 NABALIG_TEVA_FALSE			= તમારી જન્મકુંડળી સગીર જન્મકુંડળી નથી.
	 LK_DHARMI_TEVA				= લાલ કિતાબમાં કેટલીક જન્મકુંડળી ધર્મી કુંડળી ગણાય છે. લાલ કિતાબમાં જણાવ્યા અનુસાર રાહુ, કેતુ અને શનિ હાનિકારક ગ્રહો ગણાય છે. જો જન્મકુંડળી ધર્મી હોય તો શનિ, રાહુ અને કેતુ હાનિકારક પરિણામ આપશે નહીં. આ ગ્રહો લાભદાયી પરિણામ આપે એ આવશ્યક નથી, તેમ છતાં આ ગ્રહો છેવટે હાનિકારક પરિણામ આપવાનું બંધ કરી જ દેશે. <br/> રાહુ અને કેતુ જ્યારે ચોથા ગૃહમાં અથવા જન્મકુંડળીમાં કોઇ પણ સ્થળે ચંદ્ર સાથે હોય ત્યારે ધર્મી બને છે. શનિ જ્યારે અગિયારમાં ગૃહમાં અથવા જન્મકુંડળીમાં કોઇ પણ સ્થળે ગુરુ સાથે હોય ત્યારે ધર્મી બને છે. જો આ બંને શરત પરિપૂર્ણ થતી હોય, તો જન્મકુંડળી ધર્મી તેવા કહેવાય છે.
	 LK_NIGHT_BLIND_HOROSCOPE	= રતાંધ (નાઇટ બ્લાઇન્ડ) ગ્રહો એ લાલ કિતાબનો એક અનોખો કન્સેપ્ટ છે. જન્મકુંડળીમા શનિ જો સાતમાં ગૃહમાં અને સૂર્ય ચોથા ગૃહમાં હોય તો એ જન્મકુંડળી નાઇટ બ્લાઇન્ડ કહેવાય છે. એક અંધ જન્મકુંડળીની જેમ નાઇટ બ્લાઇન્ડ કુંડળી ધરાવતી વ્યક્તિ દિશા વિહીન બને છે અને તે પોતાની જાતે નિર્ણય લઈ શકતો નથી. તે એક રાત્રીએ જ જોઈ શકતા વ્યક્તિની જેમ વર્તે છે.
	 LK_BLIND_HOROSCOPE			= કોઇ પણ જન્મકુંડળીમાં દસમું ગૃહ એ જન્મકુંડળીનો આધાર હોય છે, કેમ કે તે વ્યવસાય, નોકરી, મોભો, ખ્યાતિ અને સરકારી લાભાલાભનું ગૃહ છે. દસમાં ગૃહમાં રહેલા ગ્રહ જો એકબીજાના વિરોધી હોય કે પછી નબળા ગ્રહની જેમ અયોગ્ય સ્થાન ધરાવતા હોય તો તમામ ગ્રહો મળીને પણ સારું પરિણામ આપી શકશે નહીં. આ પ્રકારનું સંયોજન ધરાવતી જન્મકુંડળીને અંધ કુંડળી કહેવાય છે અને આ પ્રકારની જન્મકુંડળી ધરાવતી વ્યક્તિ એક અંધ અથવા દિશા વિહીન વ્યક્તિની જેમ વર્તે છે.
	 LK_MINOR_HOROSCOPE			= લાલ કિતાબ અનુસાર કેટલીક જન્મકુંડળી 12 વર્ષની વય સુધી સગીર ગણાય છે. આ બાબત કેટલીક શરતોને આધિન હોય છે. સગીર જન્મકુંડળી તેની અંદર ગ્રહોના સ્થાન પ્રમાણે પરિણામ આપી શકે નહીં અને અણધારી વર્તણૂક દર્શાવી શકે છે. આ પ્રકારની જન્મકુંડળી ધરાવતી વ્યક્તિનું ભવિષ્ય 12 વર્ષની વય સુધી અવિશ્વસનીય હોય છે.
