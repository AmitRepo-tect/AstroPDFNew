 NAMANK_DESC_TEXT2 = <p>हा अंक उच्च कल्पना शक्ती, आदर्शवाद आणि स्वप्न स्वभावाला दर्शवते. अशे व्यक्ती संसारात आपल्या कल्पनां सोबत जगतात. असे जातक आपल्या योजनांचे क्रियान्वयन आणि कुठल्या कार्यासाठी दुसर्यांसोबत चालणारे असतात. हे जातक स्वभावाने निस्वार्थी आणि दुसऱ्यांचे चांगले करणारे असतात. </p><p><b>करिअर: </b> दोन अंकाचे व्यक्ती चांगले पार्टनर आणि चांगले सहयोगी असतात. अशे व्यक्ती भागीदारीत व्यवसाय चांगला करतात. तुम्ही अशांत आणि परिवर्तन प्रिय आहे. म्हणून यात्रा करणे तुम्हाला पसंत आहे म्हणून तुम्ही प्रवास असलेल्या कामात अधिक रुची दाखवतात. प्रकृतीच्या प्रति तुमची कल्पना तुम्हाला रचनात्मक बनवते. </p>
 NAMANK_DESC_TEXT3 = <p>जन्मांक तीन असणारे व्यक्ती नैतिक मूल्य, दैवीय प्रेम आणि न्याय साठी सदैव पुढे राहतात. आयुष्यात भाग्य यांचा साथ देतो. प्रत्येक चांगल्या गोष्टीला हा जातक आपल्याकडे आकर्षित करण्यात यशस्वी राहतो. कठीण परिश्रम करणे यांना फार आवडते. हे एक लीडरच्या स्वरूपात निर्माण होतात आणि आपल्या धैर्याला मिळवण्यास यशस्वी राहतात. </p><p><b>करिअर: </b>असे व्यक्ती चांगले न्यायधीश, कुशल, शिक्षक आणि दार्शनिक असू शकतात. </p>
 NAMANK_DESC_TEXT4 = <p>ज्या जातकांचा जन्मांक चार असतो ते आपल्या ऊर्जा, ताकद आणि उन्नतीचे प्रदर्शन करतात. त्यांची मानसिक शांती खूप तीव्र असते. या जातकाची विशेषता अशी असते की, ते निरंतर आपले धैर्य आणि आपल्या सोसायटी मध्ये  परिवर्तन करतात आणि समाजाचे बनवलेले नियम आणि आदर्शांना आपल्या मनातून मुक्त करू इच्चीतात. असे व्यक्ती नियमांच्या विरुद्ध चालणे पसंत करतात. </p><p><b>करिअर: </b>जन्मांक चार असणारे जातक चांगले लेखक, व्यावसायिक आणि राजनेता असतात.</p>
 NAMANK_DESC_TEXT5 = <p>जीवनाच्या गूढ गोष्टींमध्ये तुम्ही रुची ठेवतात. स्वभावाने तुम्ही खूप अशांत आणि जशी वेळेनुसार आपल्या मूलभूत गरजा बदलतात तसेच तुम्ही नवीन धैर्यासोबत नवीन गोष्ट करण्यास उत्सुक असतात. तुमच्यात नकारात्मक आणि सकारात्मक दोन्ही पैलू पाहायला मिळतात. मुलांसोबत वेळ घालवणे तुम्हाला आवडते आणि कुटुंब तुमची प्राथमिकता आहे. अध्यात्म आणि धर्म जश्या क्षेत्रात आपले करिअर जश्या क्षेत्रात तुमचा कल पहायला मिळतो. </p><p><b>करिअर: </b>तुमचा काळ स्पोर्ट्स मध्ये अधिक राहतो म्हणून तुम्ही या क्षेत्रात आपले करिअर बनवू शकतात. तुमचे बौद्धिक ज्ञान तुम्हाला एक उत्तम शोधार्थी आणि शिक्षण शास्त्री बनवतो.</p>
 NAMANK_DESC_TEXT6 = <p>तुम्ही कला आणि सुंदरता सोबत जन्म घेतात. कलेच्या प्रति तुमचे अधिक प्रेम पहायला मिळते. सुंदरता तुमच्यासाठी एक शब्द नाही, तर तुम्ही नात्यामध्ये सुंदरतेला पसंत करतात. तुम्ही असहमती, खंडन इत्यादी सोबत थोडे असहज पहायला मिळतात म्हणून तुम्ही दुसऱ्यांचा सामना करण्यास घाबरतात. तुमचा प्रिय स्वभाव तुम्हाला एक चांगला व्यक्ती बनवतो. तुम्ही लोकांना आनंदी ठेवण्याची इच्छा ठेवतात. तुम्ही लोकप्रिय आणि आशावादी स्वभावाचे आहेत. </p><p><b>करिअर: </b>संगीत, नृत्य, कविता आणि अन्य रचनात्मक कार्यात तुम्हाला आवड असते.</p>
 NAMANK_DESC_TEXT7 = <p>तुम्ही तुमच्या व्यक्तित्वाची मौलिकता आणि स्वतंत्रतेसाठी जाणले जाणारे आहेत. तुम्ही एक स्वतंत्र पक्षी सारखे समाजाच्या बंधनाला न मानता उडण्याची इच्छा ठेवतात. लोक तुम्हाला एक रहस्यमयी रूपाने पाहतात आणि बऱ्याच वेळा ते तुम्हाला रिकाम्या डोक्याचे बोलतात. अंक सात लोक सामान्यतः संसाधन आणि विशेषनात्मक असतात आणि स्थिती तसेच समस्येच्या कारणाने अधिक प्रभावाला निर्धारित करू शकतात. आयुष्यात तुम्हाला जे काही वाटते, त्याला मिळवण्यासाठी बरेच व्यक्तिगत बलिदान करतात, जे तुमच्यासाठी योग्य आहे. </p><p><b>करिअर: </b> तुम्ही खूप साहसी आहात, जसे की घरापासून दूर नवीन आणि आपल्या सहज स्वभावाच्या कारणाने आधी होणाऱ्या घटनेच्या परिणामासाठी अधिक प्रवण आहे. अशामध्ये तुम्हाला कुठल्या पेशामध्ये जोडायची इच्छा आहे जो की, रोमांचक आणि तुमची तहान संतृष्ट करणारा हवा.</p>
 NAMANK_DESC_TEXT8 = <p>जन्म क्रमांक आठ चे व्यक्ती गंभीर आणि दार्शनिक आहे. संख्या आठ दृढनिश्चय आणि अभ्यासाचे प्रतीक आहे. बाहेरील असली तरीही तुम्ही उबदार आणि काळजी घेणारी व्यक्ती आहे. भविष्याबद्दल आपण सावधगिरी बाळगा आणि नेहमीच सतर्कता बाळगा. आपण आपल्या ध्येय गाठण्यास उत्कृष्ट असू शकतात. </p><p><b> करिअर: </b> आपण महत्वाकांक्षी आणि सार्वजनिक व्यक्तीमध्ये यशस्वी होतात. तुम्ही इतरांना प्रेरणा देतात. याचा परिणाम म्हणून आपण उत्कृष्ट व्यवस्थापक, प्रशासक आणि व्यावसायिक व्यक्ती बनवा. सरकारी नोकरी आणखी एक चांगला पर्याय आहे. </p>
 NAMANK_DESC_TEXT9 = <p>तुम्ही साहसी आणि इच्छाशक्तीच्या प्रबळ असतात. तुम्ही गरम स्वभावाचे आहेत आणि आपल्या विरोधींवर वरचढ असतात. तुम्ही स्वतःवर प्रेम करतात आणि आत्म सन्मानाला वरती ठेवतात. मग लोक तुमच्या विरोधात जरी उभे राहिले तरी तुम्ही तुमचे भाग्य स्वतः बनवतात.  तुमच्यामध्ये उत्तम लीडरशिप गुण पहायला मिळतात म्हणून तुम्ही सहजरित्या उत्तम लीडर बनतात. तुम्ही एक चांगले व्यक्ती आहेत आणि मित्रांवर विश्वास ठेवतात. दुसऱ्याच्या भलाईसाठी तुम्ही नेहमी पुढे राहतात. तुम्ही तुमच्या कुटुंबा सोबत आत्मिक रूपाने जोडलेले असाल. त्यांच्या सोबत वेळ घालवणे तुम्हाला आवडते. </p><p><b>करियर: </b> सेना, राजकारण, शिक्षण आणि समाजसेवा</p>
