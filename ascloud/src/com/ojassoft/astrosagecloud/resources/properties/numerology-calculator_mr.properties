 MULANK_DESC_TEXT7 = मूलांक 7 च्या अंतर्गत जन्म घेतल्याने तुमच्यावर केतू अथवा नेपच्युन चा मुख्य प्रभाव आहे. तुमच्या मध्ये सहज रूपात धार्मिकता आहे. तुम्हाला कविता आणि चित्रकला अधिक प्रिय आहे. तुम्ही धार्मिक गोष्टींमध्ये बरेच कट्टर आहात. कुठल्याही घटनेचा पूर्वाभास तुमची सर्वात मोठी ताकद आहे आणि दुसऱ्यांच्या मनातील गोष्ट समजण्यात तुम्ही निपुण आहेत. तथापि याच्या विपरीत लोकांद्वारे तुम्हाला समजणे इतके सोपे नाही. तुम्हाला सैर करणे, फिरणे गिरणे आणि विविध यात्रा करण्यात खूप आनंद येतो. तुमच्या जीवनात भौतिक वस्तूंची कमतरता असू शकते. तुम्ही आपल्या मौलिक विचारांच्या आधारांवर ही धन अर्जित करतात आणि दान पुण्य ही करतात. तुम्ही भविष्याच्या बाबतीत चिंता करतात, म्हणून चांगले कार्य करणे तुम्हाला पसंत आहे. तुमच्या मध्ये कल्पनाशीलता चांगली असते आणि लोकांना आपल्याकडे आकर्षित करण्याची विशेष शक्ती असते. तुम्ही एक चांगल्या व्यापाराचे गुण आणि विचार आपल्या मध्ये समाहित करतात आणि जर तुम्ही याचा प्रयोग केला तर तुम्ही एक यशस्वी व्यवसायी बनू शकतात. दुसऱ्यांना प्रभावित करण्याची कला सर्वात मोठे वैशिष्ट्य आहे.
