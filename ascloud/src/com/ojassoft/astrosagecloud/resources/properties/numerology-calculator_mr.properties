 NAMANK_TEXT = ब्रह्मांडीय बळ तुमच्या नाव संख्येवर विचार करतांना एका व्यक्तीची जीवन संरचना निर्धारित करते. नामांक किंवा नाव संख्या तुमच्या पूर्ण जन्म नावाच्या सर्व अक्षराने बनलेले आहे ज्याला अभिव्यक्ती किंवा नाव संख्या ही सांगितले जाते. ही, ती संख्या आहे जी या जीवन काळात तुमच्या प्रतिभेला आणि दृष्टिकोनाचे वर्णन करते, तुम्ही त्याला विकसित केले आणि त्याचा उपयोग करण्याचा प्रयत्न केल्यास योग्य असेल. तुमचे नाव तुमचे खरे कंपन आहे, तुमच्या आत्म्याचे माधुर्य, जसे त्या काली त्या दारातून आले आणि या दुनियेत प्रवेश केले. \n\nतुमच्या नावाचे विश्लेषण @@userName$, सल्ला देतो की तुमचे नामांक किंवा नाव संख्या @@namamkNumber$ आहे. मला आपल्या नाव क्रमांक @@namamkNumber$ ची काही मूलभूत वैशिष्ट्ये घेऊ द्या.
 MULANK_TEXT = @@userName$, अंक शास्त्रात तुमची सर्वात महत्वपूर्ण संख्या त्या महिन्याची तारीख आहे ज्या दिवशी तुम्ही जन्म घेतला होता. ही संख्या आपल्या चरित्र, व्यक्तित्व आणि स्वभावात्मक च्या महत्वपूर्ण तत्वांची ओळख करू शकते. ही संख्या आपल्या समग्र होण्याच्या मूळ तत्वांना निर्धारित करते. तुम्ही रुबाबदार असा किंवा लाजाळू, नेता किंवा अनुयायी. याचे कारण हे आहे कारण हे आहे कारण प्रत्येक संख्येची आपली प्रकृती आणि व्यक्तिगत कंपन आहे. सावधान पुर्वक विश्लेषणा नंतर, आम्ही तुमच्या अंक ज्योतिष संख्येला खालील प्रमाणे काम केले गेले आहे: आपला मूलांक क्रमांक @@radicalNumber$ आहे.
 DESTINY_TEXT1=तुम्ही अति महत्वाकांक्षी आहे आणि कुशल नेतृत्व क्षमता ठेवतात, या कारणाने तुम्हाला लोकांची साथ मिळते आणि तुम्ही आपल्या लक्ष्याची पूर्ती करतात. तुम्ही कुठल्या सीमेमध्ये बांधून राहू शकत नाही. तुमचे भरपूर मित्र असतील जे प्रत्येक कामात तुमची मदत करतील. आर्थिक रूपात तुम्ही समृद्ध असाल, परंतु अधिक भोग विलास आणि राहसी थाट तुम्हाला अधिक प्रिय आहे. तुम्हाला राजकारणाच्या क्षेत्रात चांगले यश मिळेल आणि सरकारी क्षेत्राने लाभ मिळण्याची शक्यता आहे. तुम्ही लोकांकडून सन्मान प्राप्त करू इच्छितात आणि तुम्हाला तो मिळेल. तुम्हाला अत्याधिक खर्च करण्यापासून वाचले पाहिजे आणि सोबतच जुगार किंवा सट्टेबाजी पासून दूर राहिले पाहिजे. आपल्या आझादीचा उपयोग सांभाळून करणे तुमच्यासाठी योग्य असेल. जास्त जोखीम उचलू नका आणि नैतिकतेचे पालन करा. 
 DESTINY_TEXT2=तुम्ही अत्याधिक सौम्य आणि सुशिल आहेत तसेच भागीदारीत कार्य करणे तुम्हाला पसंत आहे. तुम्ही महिलांचा सन्मान करतात आणि तुम्ही कल्पनाशील होण्यासोबतच रोमँटिक आणि कलात्मक ही आहे. तुम्हाला नेहमी दृढ मानसिक क्षमतांची कमतरता वाटेल आणि म्हणून बऱ्याच वेळा काम सुरु केल्यानंतर त्याला अर्धात सोडून देतात. शारीरिक रूपात तुम्ही थोडे कमजोर असू शकतात. दुसरे लोक तुमचा सहजरित्या फायदा उचलतात. तुम्हाला स्वतःला सांभाळण्याची सवय लावणे गरजेचे आहे आणि आपला आत्मविश्वास कायम ठेवला पाहिजे. जे कार्य सुरु कराल, त्याला पूर्ण ही करा. प्रत्येक कठीण परिस्थितीचा सामना थंड डोक्याने करा आणि आजूबाजूच्या गुप्त लोकांपासून दूर राहा.  
 DESTINY_TEXT3=तुम्ही अन्य लोकांसाठी एक प्रेरणा स्रोत आहे आणि संवाद तुमचा मुख्य गुण आहे. तुमच्यामध्ये चौमुखी प्रतिमा आहे आणि कदाचित म्हणून तुम्ही कुणाचा सहायक बनणे पसंत करत नाही तथापि तुम्ही अनुशासित आहे आणि तुमचे प्रेम विशुद्ध होते. तुम्ही न्याय पक्ष घेतात आणि बरेच बुद्धिवान असतात. सोबतच तुमची दूर दृष्टी असते तसेच हास्याची गजब क्षमता ही तुमचा गुण आहे. तुम्ही व्यावहारिक दृष्टिकोन ठेवतात. तुम्हाला अत्याधिक खर्चापासून बचाव केला पाहिजे आणि इर्षेपासून लांब राहण्याचा प्रयत्न केला पाहिजे. धनी किंवा ज्ञानी बनण्यासाठी घाई गर्दी करू नका. द्विस्वभाव व्यक्तित्व आणि रागावर नियंत्रण ठेवणे आवश्यक असेल तसेच वाईट लोकांची संगती ही तुमच्यासाठी खराब सिद्ध होईल.  
 DESTINY_TEXT4=तुमच्या जीवनात बऱ्याच चढ उताराच्या स्थिती येतात आणि बऱ्याच घटना अचानक होतात ज्या तुमच्यासाठी चांगल्या आणि वाईट दोन्ही प्रकारचे परिणाम आणते. तुम्ही आपल्या जीवनात उन्नतीच्या शिखरावर सहजरित्या पोहचू शकतात, परंतु दुसरीकडे लोकांच्या षड्यंत्रच्या कारणाने खुर्चीच्या खाली ही येऊ शकतात. तुमचा दृष्टिकोन दुसर्यांपेक्षा भिन्न असते आणि तुम्ही कुठल्याही मेहफिलची शान असतात. तुम्ही बनवलेले कायदे आणि परंपरांचा विरोध करतात आणि स्वतः नवे नियम बनवण्यासाठी प्रयत्नशील राहतात. तुम्ही अत्याधिक बुद्धिमान असतात आणि तुमची बुद्धी तीक्ष्ण असते. तुम्हाला अत्याधिक संवेदनशील आणि भावुक होण्यापासून स्वतःचा बचाव केला पाहिजे आणि निराशावादी विचारांनी स्वतःला दूर ठेवले पाहिजे. तुम्हाला संधींना ओळखणे शिकले पाहिजे तसेच सोबतच आपल्या आक्रमकतेला काबूत ठेवा.   
 DESTINY_TEXT5=तुम्ही एक चांगले मित्र सिद्ध होतात आणि मानसिक रूपात बरेच मजबूत होतात. तुमची रुची सट्टा बाजार, जुगार आणि ट्रेडिंग मध्ये असू शकते. तुम्ही एक चांगला व्यवसाय चालवू शकतात. तुम्हाला बोलण्याची सवय आहे आणि याच कारणाने आपले काम तुम्ही काढून घेऊ शकतात. तथापि बऱ्याच वेळा पैसा कमावण्यासाठी नैतिकता सोडून देतात. तुम्हाला आपल्या ऊर्जेचा सदुपयोग करण्यावर लक्ष दिले पाहिजे आणि स्वतःला दुखी करण्याच्या वातावरणापासून दूर राहिले पाहिजे. तुमची आर्थिक स्थिती आपली बुद्धी आणि चतुरतेच्या कारणाने उत्तम राहील आणि विशेष रूपात तुम्ही व्यवसायात उन्नती कराल.   
 DESTINY_TEXT6=तुम्ही सर्वांचे प्रिय आहात आणि तुमच्या मध्ये सौहार्यताचे गुण उपस्थित आहे. तुम्ही दयाळू आहे आणि दुसऱ्यांची काळजी घेणे तुम्ही पसंत करतात तसेच कलात्मक होण्या-सोबतच सृजनशील ही आहे. तुमच्या व्यक्तित्वात चौमुखी आकर्षण असते, तथापि बऱ्याच वेळा तुम्ही तुमच्या कामाच्या प्रति समर्पित होत नाही, त्याचे नुकसान ही उचलावे लागते. आपल्यामध्ये रोमान्सचा गुण जन्मजात असतो आणि सुंदर वस्तूंवर तुम्ही प्रेम करतात. सोबतच मनोरंजन तुम्हाला पसंत आहे.  तुम्हाला कुणावर डोळे झाकून विश्वास करणे किंवा घाई गर्दीत काम करण्यापासून बचाव केला पाहिजे. दारू आणि नशेच्या पदार्थांपासून दूर राहा तसेच अत्याधिक सामाजिक गोष्टींमध्ये आवड दाखवू नका.  
 DESTINY_TEXT7=तुम्ही सर्वात अधिक आध्यत्मिक होऊ शकतात आणि सत्याचा शोध करणारे तसेच कुठल्याही कार्याचे विश्लेषण करणारे आहेत. तुमच्या जवळ दिव्य दृष्टी आहे जे की, तुम्हाला दुसऱ्यांना समजण्यात मदत करेल. तुम्ही दुसर्यांना जीवन मूल्य समजावण्याचे कार्य करू शकतात तसेच तुम्ही चांगले स्थान आणि देश विदेशाची यात्रा करतात. तुमचा दुसऱ्यांवर गहन प्रभाव पडतो आणि तुमच्या चारही बाजूंनी सकारात्मक ऊर्जेचे वातावरण राहते. तुम्हाला तुमच्या मनाची बैचेनी आणि अत्याधिक विचार करण्यापासुन थोडे सावध झाले पाहिजे. भौतिक सुखांच्या प्रति उदासीन न होणे तुमच्यासाठी योग्य नाही तसेच तुम्हाला आपल्या कार्य आणि विचारात गतिशील झाले पाहिजे.  
 DESTINY_TEXT8=तुमच्या भौतिक आणि आध्यत्मिक जीवनात उत्तम संतुलन आहे. तुम्ही शक्तिशाली महत्वाकांक्षेची स्वामी आहे आणि तुम्ही क्षमाशील ही आहे. तुमचे हृदय मोठे आहे. सोबतच तुमच्यात दूरदर्शिता आहे. तुम्हाला नेहमी दुःखी आणि एकटे वाटू शकते आणि या कारणाने तुम्ही अत्याधिक संवेदनशील आहे. तुम्ही एकतर खूप यशस्वी व्हाल अथवा खूप अपयश तुम्हाला मिळेल. तुम्ही नीतिमत्व असाल तसेच कर्तव्य परायणतेचा गुण तुमची मुख्य उपलब्धी आहे. तुम्ही तणावा पासून हार मानत नाही आणि तुम्ही काम संबंधित बाबतीत स्पष्टपणे आपले मत ठेवले पाहिजे. परंतु आपल्या गोष्टीवर अडून राहणे चुकीचे आहे म्हणून जिथे चूक वाटेल, तिथेच तिचा स्वीकार करा आपल्या भविष्याच्या प्रति निराशावादी होऊ नका तसेच एकटे पणा पासून लांब राहा. 
 DESTINY_TEXT9=तुम्हाला जीवनाच्या सुरवातीमध्ये समस्यांचा सामना करावा लागू शकतो, परंतु तुम्ही एक चांगले राजकारणी होऊ शकतात. तुम्ही कलात्मक असाल तसेच घाई गर्दीत काम करणारे आणि मोकळ्या मनांचे ही असू शकतात. तुमच्यामध्ये जबरदस्त संघटनात्मक शक्ती आहे, परंतु प्रत्येक गोष्टीत घाई गर्दी योग्य नाही. तुम्हाला जीवनात गोष्टींचा आभास आधीपासून होऊ शकतो. तुम्ही मदतशीर आणि उदार स्वभावाचे आहेत. तुम्हाला आपल्या क्रोधावर नियंत्रण ठेवले पाहिजे. सोबतच आपल्या अधिकाऱ्यांना चिंतीत करू नका. विपरीत परिस्थिती पासून बचाव करण्यासाठी सदैव तयार राहा तथापि आर्थिक रूपात तुम्ही समृद्ध होऊ शकतात.
 PLACE_TEXT1=तुमच्यासाठी पूर्व दिशा यशस्वी राहील. म्हणून या दिशेमध्ये आपल्या घरातील मुख्य द्वार ठेवल्याने तुम्हाला यश मिळेल आणि करिअरच्या क्षेत्रात ही या प्रयत्न केल्यास तुम्हाला उत्तम यश प्राप्त होईल. भारत, पाकिस्तान, तुर्की, बर्मा, अफ़ग़ानिस्तान तथा हॉंग कॉंग तुमच्यासाठी प्रत्येक दृष्टीने अनुकूल राहील. 
 PLACE_TEXT2=तुमच्यासाठी वायव्य कोण अर्थात उत्तर पश्चिम दिशा सर्वोत्तम राहील. या दिशेत प्रयत्न केल्यास तुम्ही यशाच्या शिखरावर पोहचू शकतात. जर स्थाना बद्दल बोलले तर  लंदन, तिब्बत, फ्रांस, जर्मनी, श्रीलंका, दिल्ली, काबुल तुमच्यासाठी अनुकूल स्थान राहील. 
 PLACE_TEXT3=तुमच्यासाठी ईशान्य कोण अर्थात उत्तर पूर्वाची दिशा सौभाग्य आणि संपत्ती दायक सिद्ध होईल. या व्यतिरिक्त ब्रिटेन, नेपाल, हॉलैंड, डेनमार्क, भूटान इत्यादी असे स्थान आहे जिथे काम केल्याने किंवा राहिल्याने तुम्ही यश प्राप्त कराल.  
 PLACE_TEXT4=तुमच्यासाठी नैऋत्य कोण (दक्षिण - पश्चिम) प्रत्येक दृष्टीत उपयोगी सिद्ध होईल म्हणून तुम्हाला या दिशेमध्ये आपले करिअर बनवण्याचे आत्म निवास करण्याचा प्रयत्न केला पाहिजे. जर अनुकूल स्थानाची गोष्ट केली तर इटली, कुवैत, हंगरी, वॉशिंगटन, मुंबई तुमच्यासाठी शुभ स्थान राहील. 
 PLACE_TEXT5=उत्तर दिशा तुमच्यासाठी सर्वाधिक अनुकूल दिशा सिद्ध होईल म्हणून तुम्ही या दिशेत जाऊन प्रयत्न केल्यास कामामध्ये यश आणि सुख समृद्धी प्राप्त होईल. तुमच्यासाठी विशेष रूपात कोरिया, सउदी अरब, स्पेन, अमेरिका, गोवा, प्राग अत्यंत शुभ राहील.
 PLACE_TEXT6=तुमच्यासाठी आग्नेय कोण अर्थात दक्षिण पूर्व दिशा सर्वात शुभ राहील. म्हणून तुम्ही या दिशेमध्ये आपल्या कार्याचा विस्तार केला पाहिजे. याच्या अतिरिक्त भारत, इंडोनेशिया, वियतनाम, थाईलैंड, सिंगापुर, मलेशिया आपले शुभ स्थान असतील. 
 PLACE_TEXT7=तुमच्यासाठी ईशान्य कोण अर्थात उत्तर पूर्व दिशा सर्वात अधिक उपयुक्त राहील. जर तुम्ही या दिशेमध्ये प्रयत्न केला तर तुमच्या व्यापारात ही यश हातात येईल आणि या दिशेत राहिल्याने तुम्ही यश प्राप्त कराल. ग्रीस, स्कॉटलैंड, रोडेशिया, कश्मीर, मॉस्को, बैंकॉक आपल्यासाठी शुभ स्थान आहे.  
 PLACE_TEXT8=तुमच्या जीवनात उन्नतीसाठी पश्चिम दिशा सर्वात चांगली राहील. जर तुम्हाला व्यापार करायची इच्छा आहे तर या दिशेत पुढे जाऊन प्रयत्न केले पाहिजे. याच्या अतिरिक्त तुमच्यासाठी शुभ स्थानात चीन, मलाया, ऑस्ट्रिया, पेकिंग, अदीस अबाबा मुख्य आहे. 
 PLACE_TEXT9=तुमच्या जीवनात शांतता आणि यश संपादन करण्यासाठी दक्षिण दिशेपेक्षा अधिक चांगली दिशा कुठलीच नाही. म्हणून आपल्या व्यापाराचा विस्तार करू इच्छितात किंवा जीवनात प्रगती करायची इच्छा आहे, तर जन्म स्थानापासून दक्षिण दिशेकडे प्रयत्न करा यश नक्कीच मिळेल. दक्षिण देश आणि शहर शहर, मेडागास्कर, इंडोनेशिया इत्यादी तुमच्यासाठी अत्यंत शुभ राहील.  
 TIME_TEXT1=तुमचे मुख्य ग्रह सुर्य आहे. प्रत्येक वर्षी एप्रिल पासून मे आणि ऑगस्ट पासून सप्टेंबर तुमच्या साठी अत्यंत शुभ सिद्ध होईल. या काळात तुम्ही ज्या कामात हात टाकाल त्यात तुम्हाला यश प्राप्त होईल. या काळात आपल्या मान सन्मानात ही वृद्धी होईल. 
 TIME_TEXT2=तुमचे मुख्य ग्रह चंद्र आहे. प्रतिवर्षी मे पासून जून ची वेळ तुमच्यासाठी अत्यंत शुभ राहील. या काळात तुम्ही जे ही कार्य कराल त्यात तुम्हाला यश मिळण्याची अधिक शक्यता आहे. म्हणून जीवनात यश मिळवण्यासाठी तुम्ही या वेळचा पूर्ण सदुपयोग करू शकतात. 
 TIME_TEXT3=तुमचे मुख्य ग्रह बृहस्पती आहे. सप्टेंबर पासून जानेवारी तसेच मार्च पासून एप्रिल पर्यंतचा वेळ तुमच्यासाठी प्रति वर्षी अत्यंत उपयोगी सिद्ध होईल. या काळात तुम्हाला जे ही कार्य करायचे आहे त्यात तुम्हाला यश मिळण्याची अधिक शक्यता राहील म्हणून हेच तुमच्यासाठी सर्वात शुभ वेळ आहे.
 TIME_TEXT4=तुमचा मुख्य ग्रह हर्षल आहे. एक अन्य मतानुसार राहू मूलांक 4 अधिपति मानले जाते. प्रति वर्षी जुलै पासून सप्टेंबर पर्यंतचा वेळ तुमच्या साठी अत्यंत शुभ राहील आणि या काळात तुम्ही कुठलेही शुभ कार्य करू शकतात.  
 TIME_TEXT5=तुमचा मुख्य ग्रह बुध आहे. तुमच्यासाठी जून पासून जुलै तसेच सप्टेंबर पासून ऑक्टोबर ची वेळ अत्यंत फळदायी राहू शकते म्हणून, या काळात तुम्हाला जे काही कार्य करण्याची इच्छा आहे त्याला प्रारंभ करू शकतात. त्यात तुम्हाला यश मिळण्याची अधिक शक्यता राहील.  
 TIME_TEXT6=तुमचा मुख्य ग्रह शुक्र आहे. प्रत्येक वर्षाच्या काळात मार्च पासून एप्रिल, मे पासून जून तसेच ऑक्टोबर पासून नोव्हेंबर पासूनची वेळ तुमच्यासाठी उत्तम राहील. या काळात तुमच्या सर्व कार्यात यश मिळण्याची शक्यता राहील आणि तुम्हाला सुख सुविधांची प्राप्ती होईल. 
 TIME_TEXT7=तुमचा मुख्य ग्रह केतू आहे. प्रत्येक वर्षी जुलै पासून ऑगस्टची वेळ तुमच्यासाठी बरीच महत्वपूर्ण राहील. या काळात तुम्हाला प्रत्येक कार्यात यश मिळेल, सोबतच जीवनात एक चांगले सामंजस्य ही पाहायला मिळेल. तुम्हाला या वेळेचा जितका सदुपयोग करायचा आहे तितका करू शकतात.
 TIME_TEXT8=तुमचा मुख्य ग्रह शनी आहे. तुमच्यासाठी प्रत्येक वर्षी जानेवारी पासून मार्च पर्यंतचा वेळ आणि त्यानंतर ऑक्टोबर पासून नोव्हेंबर पर्यंतचा वेळ अत्यंत शुभ तसेच यशदायी सिद्ध होईल म्हणून, तुम्हाला जे काही कार्य करायचे आहे, या काळा दरम्यान तुम्ही करू शकतात.  
 TIME_TEXT9=तुमचा मुख्य ग्रह मंगळ आहे. प्रत्येक वर्षी जानेवारी पासून फेब्रुवारी, एप्रिल पासून मे तसेच नोव्हेंबर पासून डिसेंबर पर्यंतचा वेळ तुमच्यासाठी अत्यंत शुभ राहील. या काळात तुमच्या कार्यात यश मिळेल आणि तुम्ही आयुष्यात उचत्व प्राप्त करण्याकडे अधिक अग्रेसर व्हाल. 
 HEALTH_TEXT1=तुम्ही एक चांगल्या स्वास्थ्याचे स्वामी आहे परंतु तुम्हाला असे काही आजार आहे, ज्याने होण्याची शक्यता टिकून राहील. यात मुख्य रूपात हृदय संबंधित समस्या, पंपिंग, ब्लड प्रेशर, रक्त संबंधीत समस्या, वृद्धावस्था मध्ये उच्च रक्तदाब तसेच डोळ्याच्या संबंधित समस्यांचा समावेश आहे. म्हणून याच्या प्रति सजग राहा आणि उत्तम आरोग्याचा आनंद घ्या.
 HEALTH_TEXT2=तुम्हाला जास्त विचार करणे किंवा जास्त गहन जाऊन चिंता करण्याची सवय आहे आणि हेच तुमच्या सर्व समस्यांचे मूळ आहे. यामुळे तुम्हाला पोटा संबंधित समस्या, पचन क्रियेत समस्या, गैस संबंधित समस्या, आतड्या संबंधित समस्या, ट्युमर इत्यादी आजार चिंतीत करू शकतात. तथापि स्वतःला चिंतेपासून दूर ठेवण्याचा प्रयत्न करा. तुम्हाला दारू किंवा कुठलेही मादक पदार्थ सेवन न करण्याचा सल्ला दिला जातो आणि बॉइल केलेले भोजन ग्रहण करा तथा पर्याप्त प्रमाणात जल सेवन करा.   
 HEALTH_TEXT3=तुमच्यावर देव गुरु बृहस्पतीची छत्र छाया आहे, ज्यामुळे तुम्ही सामान्यतः जास्त चिंतीत होत नाही, तरीही बऱ्याच वेळा आपल्या स्वास्थ्य प्रति निष्काळजी होऊ शकतात आणि याच्या परिणाम स्वरूप तुम्हाला  न्युरैटिस (स्नायु-प्रदाह),  साइटिका (पाय किंवा पाठ दुखी), चर्म रोग इत्यादी होण्याची शक्यता असेल. म्हणून सजग राहा आणि आपल्या स्वास्थ्याची काळजी घ्या.
 HEALTH_TEXT4=राहूच्या प्रभावाच्या कारणाने तुम्ही आपल्या बुद्धीचा अधिक वापर करतात, परंतु अति कुठलीही गोष्ट वाईट असते. तुम्हाला कुठल्या प्रकारचा ट्रॉमा, मानसिक अशांति, रक्त संबंधीत समस्या, डोके व पाठ दुखी, मूत्र संबंधित समस्या इत्यादी त्रास देऊ शकते. म्हणून उत्तम दिनचर्या बनवा आणि ध्यान तसेच योग याची मदत घेऊन एक उत्तम जीवन व्यतीत करा.  
 HEALTH_TEXT5=बुध ग्रहाच्या प्रभावाने आपली बुद्धी अत्यंत तीक्ष्ण असेल आणि तुम्ही आपल्या वयाने कमी दिसाल. परंतु  तुम्हाला आपल्या जीवन काळात  न्युरैटिस (स्नायु-प्रदाह), तोंडात छाले, डोळे आणि हात, अनिद्रा, पॅरालिसिस किंवा पोलिओ इत्यादी आजार होण्याची शक्यता राहील. म्हणून स्वतःला अनुशासित ठेवा आणि स्वास्थ्य प्रति निष्काळजीपणा करू नका. 
 HEALTH_TEXT6=तुमच्या अंकाचे स्वामी ग्रह शुक्र आहे जे समस्त सुखाचे कारक आहे म्हणून तुम्हाला खाणे पिणे, सजणे आणि सुख सुविधांचा आनंद घेण्यात अधिक आनंद येतो. याच कारणाने तुम्ही अनेक वेळा समस्यांमध्ये अडकू शकतात. तुम्हाला मुख्य रूपात गळ्यात समस्या, नाक आणि जीभ तसेच छातीच्या संबंधित रोग किंवा हृदय संबंधित रोग होण्याची शक्यता अधिक असते. म्हणून विशेषतः अश्या रोगांपासून सावध राहा, आणि कुठलीही स्वास्थ्य समस्या असेल त्याकडे अजिबात दुर्लक्ष करू नका. 
 HEALTH_TEXT7=या अंकात जन्म घेण्याच्या कारणाने तुम्ही अधिकतर कुठल्या न कुठल्या रोगाने पीडित राहू शकतात, तुमची रोग प्रतिकार शक्ती अन्य लोकांच्या तुलनेत काही प्रमाणात कमी असू शकते. म्हणून तुम्ही कुठल्याही आजाराच्या गर्तेत लवकर येतात. अचानक अचेतन होणे, डोकेदुखी होणे, हृदय आणि मन संबंधित रोग, मानसिक शक्तीची हानी, जीभ आणि फुफुस संबंधित रोग समस्या तुम्हाला वेळो वेळी त्रास देऊ शकते. 
 HEALTH_TEXT8=तुम्ही तसे एक अनुशासित व्यक्ती आहेत जे जीवनाच्या प्रत्येक क्षेत्रात स्वतःला समुचित महत्व ही देते आणि याच कारणाने तुम्ही नेहमी चांगल्या आरोग्याचा आनंद घेतात, परंतु तुम्हाला काही गंभीर रोग होण्याचा खतरा नेहमी राहतो जे कि, भोजनाची नियमितता किंवा अनुशासन न पाळल्याच्या कारणाने संभव आहे. यात मुख्य रूपात तुम्हाला किडनी, आतडे, डोके दुखी आणि रक्त संबंधित रोग समाविष्ट आहे जे तुम्हाला त्रास देऊ शकतात. 
 HEALTH_TEXT9=या अंकात जन्म घेण्याच्या कारणाने तुम्ही स्वाभाविक रूपात उर्जावान आहे म्हणून तुम्ही नेहमी निरोगी राहतात, परंतु याचे दुसरे पक्ष हे आहे कि तुम्ही शिग्र राग करतात या घाई गर्दीत बरेच काम करतात ज्यामुळे तुमच्या आरोग्यावर त्याचा परिणाम होतो. तुम्हाला मुख्य स्वरूपात रक्त संबंधित समस्या, दुखापत होणे, छोटी माता, चिकन पॉक्स, किंवा कुठल्या प्रकारची सर्जरी होण्याची शक्यता राहते. 
 CAREER_TEXT1=तुम्ही एकनिष्ठ होऊन मेहनत कराल तर आपल्या करिअर मध्ये खूप प्रगती प्राप्त कराल. तुमच्यासाठी विजेच्या संबंधित कार्य करणे, कुठल्या प्रकारची सर्जरी, कुठल्या देशात राजदूत बनणे, आगी संबंधित कार्य, विज्ञान आणि प्रौद्योगिक, शोध करणे, कुठल्या पार्टीचा नेता बनणे, सशस्त्र सेनेमध्ये ऑफिसर बनणे तसेच दागिने आणि जेवरचे काम करणे उत्तम राहील. याच्या अतिरिक्त याने मिळते जुळत्या क्षेत्रात ही तुम्ही उन्नती कराल म्हणून, आपल्या प्रोफेशनल विचारपूर्वक निवडा.    
 CAREER_TEXT2=या मूलांकाच्या अंतर्गत जन्म घेण्याच्या कारणाने तुमच्यावर चंद्र देवाची विशेष कृपा राहील आणि चंद्र देव सर्व प्रकारच्या तरल पदार्थांवर आपले प्रभाव ठेवतात म्हणून तुमच्यासाठी त्या संबंधित व्यवसाय निवडणे उत्तम असेल. सामान्यतः तरल आणि जुसी मटेरियल, यात्रा संबंधित कार्य, कुठल्याही कामात दलाली, हॉटेल व्यवसाय, पत्रकारिता, गायन, नृत्य करणे, कविता लेखन, प्लॉट वर्क, बर्फ संबंधित कार्य तसेच चांदी अथवा तांदूळ संबंधित व्यवसाय करणे तुमच्यासाठी बरेच फायदेशीर राहील. 
 CAREER_TEXT3=या मुल्क मध्ये जन्म घेतल्याने तुमच्यावर बृहस्पतीची विशेष कृपा आहे आणि म्हणून त्या संबंधित कुठलेही कार्य तुम्ही हातात घेतले त्यात तुम्हाला यश प्राप्त कराल. जर तुम्ही अध्यापन कार्य, सेवा कार्य, न्याय संबंधित कार्य न्यायधीश, याचिकाकर्ता, सचिव, पोलीस, दार्शनिक योग्यते संबंधित काम, बँक किंवा फाइनेंशियल कंपनी मध्ये काम करणे किंवा विज्ञान विभागात काम कराल तर तुम्हाला उत्तम यश मिळण्याचे योग बनतील.
 CAREER_TEXT4=अंक 4 च्या अंतर्गत जन्म घेतल्याच्या कारणाने राहूची वैशिष्ट्ये तुमच्या मध्ये ठासून ठासून भरलेली आहे म्हणून, तुम्ही कुठलेही कठीण मधील कठीण काम सहजरित्या सोडवणे जाणतात. तुमच्यासाठी रेल्वे, जहाज, खोदकाम करणे, अन्य तांत्रिक कार्य, आशु लिपिक, दर्जी, अभियंता, ज्योतिषी, जादूगार, लेक्चरर इत्यादी संबंधित नोकरी अथवा व्यवसाय करणे उत्तम यश दायक सिद्ध होईल. म्हणून तुम्ही आपल्या करिअरला घेऊन चिंतेत आहे या क्षेत्रात काम करा म्हणजे तुमच्या समस्यांचा अंत होऊ शकते.   
 CAREER_TEXT5=या अंकाच्या वैशिष्ट्यच्या रूपात बुध देवाची विशेष प्रभावात प्राप्ती होईल. ज्यामुळे तुम्ही आपल्या बुद्धिमानी ने सर्व कार्य यशस्वी करू शकतात. तुम्हाला असे कार्य केले पाहिजे ज्यात शरीराची ताकद नाही, तर डोक्याच्या ताकदीचे काम जास्त हवे. म्हणून आपल्यासाठी उत्तम कार्य क्षेत्रात इंजिनिअर बनणे, सेल्स संबंधित कार्य, लेखाकार, रेल्वे, टेलिग्राफ, पत्रकारिता, तंबाखू, रेडिओ डीलर, ब्रोकर, आयोगाच्या संबंधित कार्य तुमच्यासाठी उत्तम सिद्ध होतील. 
 CAREER_TEXT6=तुमच्या शुक्र देवाची विशेष कृपा आहे ते सुंदर आणि ग्लॅमरच्या क्षेत्राला प्रभावित करतात. म्हणून या क्षेत्रात विशेष रूपात तुम्हाला उच्च यश प्राप्त होऊ शकते. याच्या अतिरिक्त तुम्हाला ज्या क्षेत्रात आपले हात टाकले पाहिजे त्यात मुख्य रूपात आभूषण, अभियंता, वास्तुकला, खाद्य निरीक्षक, हॉटेल उत्पादकता, उपन्यास लेखक, संग्रहालय, कलाकार बनणे समाविष्ट आहे. 
 CAREER_TEXT7=अंकाच्या अंतर्गत जन्म घेण्याच्या कारणाने तुम्हाला जीवनात संघर्ष करण्याची बरीच संधी मिळेल. ज्यामुळे तुम्हाला बरेच काही शिकण्यास मिळेल. तुमच्या साठी असे अनेक कार्य आहे ज्यांना तुम्ही लाभ मिळवू शकतात आणि पैसा ही कमाऊ शकतात. विशेष रूपात तुमच्यासाठी फिल्म, यात्रा, हवाई सुंदरी, डेअरी फार्म, ड्रायवर, मासे विक्रेता, केमिस्ट, हॉस्पिटल, सी.आई.डी., बॉडी बिल्डर. 
 CAREER_TEXT8=या अंकात जन्म घेण्याच्या कारणाने शनी देवाचे दायित्व प्राप्त आहे. तुमच्या जीवनात प्रगती निश्चित रूपात होईल. काही  विशेष कार्य क्षेत्र असे आहे ज्यात तुम्ही चांगले नाव कमाऊ शकतात आणि तुम्हाला तुमच्या आयुष्यात तुमच्या प्रोफेशन मध्ये अधिक यश मिळेल आणि लवकर मिळेल सोबतच तुम्ही यशस्वी व्हाल. या कार्यात विशेष रूपात खेळाडू बनणे, अभियंता, पोलीस, शहराचा मेयर बनणे, वजन आणि भार, कॉन्ट्रॅक्टर, पार्थी, जेल, मजुरी करणे, संगीत इत्यादी संबंधित कार्य करणे समाविष्ट आहे.  
 CAREER_TEXT9=मंगळाने प्रभावित होणारा हा अंक आहे, तुम्हाला आयुष्यात स्नेह प्राप्त झालेले आहे कारण तुम्ही नेतृत्व क्षमतेने परिपूर्ण आहेत तुमच्या मध्ये विशेष रूपात जीवन ऊर्जा आहे जी तुम्हाला आपल्या कार्य क्षेत्रात पुढे घेऊन जाईल. तुम्हाला विशेष रूपात जे क्षेत्र चालणारे आहे त्यात सेनेचा अधिकारी बनणे, नेता बनणे, पोलीस, कमांडर, फायर वर्क, डॉक्टर, बँक, केमिस्ट, मशीनरी कामाच्या संबंधित कार्य तुम्हाला जीवनात उन्नती देणारे सिद्ध होतील. 
