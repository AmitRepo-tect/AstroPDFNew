 MASTER_NUMBER_TEXT = अंक शात्रानुसार केवळ दोन अंक असे आहे जे सर्वात विशेष ऊर्जा आपल्या मध्ये समाहित ठेवतात याला मास्टर अंक सांगितले जाते. 11 आणि 22 मास्टर अंक आहे. या मध्ये उल्लेखनीय शक्ती आणि क्षमता असते. 
 MASTER_NUMBER_TEXT11 = आपला मास्टर अंक 11 आहे आणि याच कारणाने तुमच्यामध्ये कुठल्याही घटनेचे पूर्वाभास करण्याची गजब क्षमता आहे. तुम्ही कल्पनाशील होण्या-सोबतच दूरचे विचार ठेवतात आणि काही-काही अव्यावहारिक आहे. तुमच्या मध्ये कुशल नेतृत्व क्षमता आहे आणि तुम्ही लोकांना प्रोत्साहित करू शकतात. जर तुम्ही आपल्या धैयावर लक्ष केंद्रित केले नाही तर, तुमच्या मनात भयाचे वातावरण निर्माण होऊ शकते. तुम्ही आपल्या क्षमतांवर विश्वास ठेऊन आपल्या सामाजिक हिताची काळजी घ्या आणि यामुळे तुम्हाला असे वाटेल की तुमच्यापेक्षा उत्तम कोणीच नाही. हे एक आत्मिक अंक आहे.  
 MASTER_NUMBER_TEXT22 = तुमचा मास्टर अंक 22 आहे. या अंकाची सर्वात मोठी विशेषता ही आहे की, हे सर्व अंकात सर्वात अधिक शक्तिशाली मानले जाते. तुम्ही आपल्या स्वप्न आणि अभिलाषेला खऱ्या प्रकारे बदल्याची क्षमता ठेवतात. तुमच्या मध्ये मोठे आणि उच्च विचार , चांगली निर्णय क्षमता, नेतृत्वाची क्षमता तसेच पूर्वाभासाची शक्ती आणि व्यावहारिकता ठासून भरलेली आहे. तुम्ही सहसा स्वतःवर अधिक लक्ष देतात परंतु तुम्ही हे मानून चला की तुमचे जीवन कुठल्या छोट्या उद्धेश्यसाठी नाही तर विशाल उद्धिष्टांसाठी झाले आहे. तुम्हाला समाजासाठी खूप काही करायचे आहे. तुम्ही जीवनाच्या सुरवातीच्या काळात अनेक समस्यांचा सामना केला आहे त्यामुळे तुम्ही मजबूत बनलेले आहे. तुम्ही या गोष्टीकडे लक्ष दिले पाहिजे की जीवनात असे लक्ष निर्धारित करा जे तुमच्या स्वयंच्या महत्वाकांक्षेने वरती असेल आणि समाजाच्या हितासाठी असेल. तुम्ही युग परिवर्तनकारी बनू शकतात.
 KARMIC_NUMBER_TEXT = अंक शास्त्रानुसार काही असे अंक होतात जे आपल्या पूर्व जन्माच्या कर्माच्या ऋणाला प्रदर्शित करतात आणि याच कारणाने या जन्मात आपण त्या अंकांच्या अंतर्गत जन्म घेतो तसेच त्या जुन्या कर्माच्या ऋणांना फेडणे आपल्या जीवनाचे मुख्य उद्धेश असते. 13, 14, 16 आणि 19 कार्मिक अंक सांगितले जाते.
 KARMIC_NUMBER_TEXT13 = या अंकाच्या कारणाने तुम्हाला जीवनात यश मिळवण्यासाठी अत्याधिक परिश्रम करावे लागते कारण, तुमच्या रस्त्यात अनेक बाधा येते. तुम्ही बऱ्याच वेळा खिन्न होतात तुम्हाला वाटते की तुमचे प्रयत्न व्यर्थ जात आहे. बऱ्याच वेळा असे होते की तुम्ही समस्यांच्या पुढे गुढगे टेकतात आणि असे मानून घेतात कि, या समस्यांमधून पार पडणे तुमच्या कौशल्यात नाही. काही वेळा तुम्ही आळशी आणि निराशावादी होऊन जातात. परंतु जे दिसते ते सदैव सत्य नसते. तुमचे प्रयत्न व्यर्थ जात नाही परंतु तुम्हाला कठीण परिश्रम करत राहावे लागेल हेच तुमचे कर्म ऋण आहे. जर तुम्ही असे करण्यात यशस्वी होतात तर तुम्ही जीवनाच्या विभिन्न क्षेत्रात उच्चता प्राप्त करू शकतात.     
 KARMIC_NUMBER_TEXT14 = या अंकाच्या कारणाने तुमच्या जीवनात अचानक मोठे बदल येतात जे तुमचे जीवन जगण्याच्या दिशेत परिवर्तन घेऊन येतात. तुम्हाला विभिन्न प्रकाराचे व्यसन जसे दारू, वासनात्मक गोष्टी इत्यादी संबंधित रुची होते आणि हेच तुमच्या जीवनात समस्येचे कारण बनते. तुम्हाला सर्वांमधून बाहेर निघण्यासाठी जीवनात कमिटमेंट ठेवली पाहिजे. तुमच्यासाठी आयुष्य चढ उताराने भरलेले राहील परंतु जर तुम्ही तटस्थ राहिले आणि आपल्या जीवनासाठी काही कठीण धैर्य बनवून चालले तर या समस्यां पासून वाचून राहाल आणि आपल्या जीवनात अशातीत यश प्राप्त कराल.   
 KARMIC_NUMBER_TEXT16 = या अंकाच्या कारणाने तुम्हाला जीवनात बऱ्याच वेळा आपल्या अहंकाराला सोडावे लागते आणि आणि हेच तुम्हाला या जीवनात शिकायचे आहे. ही एक प्रकारची शुद्धी आहे. तुम्हाला आपल्या अहंकारासोबत बऱ्याच वेळा समजूतदारी करावी करावी लागेल आणि तुम्हाला दुःख ही मिळेल परंतु तुम्हाला अजिबात निराश होण्याची आवश्यकता नाही कारण तुमचे हेच संघर्ष भविष्यात तुम्हाला यश देईल. तुमच्या मध्ये दुसऱ्यांची समस्या जाणण्याची आणि समजण्याची क्षमता आहे याच्या व्यतिरिक्त तुम्हाला बऱ्याच वेळा स्वतःला एकटे वाटेल. जर तुम्ही तुमच्या जीवनात विश्वास, कृतज्ञता आणि शांतीला स्थान दिले तर तुम्ही अद्यात्मिकतेच्या रूपात ही चांगली उन्नती करू शकाल. 
 KARMIC_NUMBER_TEXT19 = या अंकाच्या अंतर्गत जन्म घेण्याच्या कारणाने तुम्हाला या जीवनात मुख्य रूपात तुम्हाला दोन गोष्टी शिकावी लागेल, एक शक्तीचा सदुपयोग आणि  दुसरे स्वतंत्रता. तुम्हाला बऱ्याच वेळा अशी संधी मिळेल की तुम्हाला एकटे आपल्यासाठी उभे राहावे लागेल कारण तुमच्या निजी आयुष्यात समस्या येत राहतील. तुम्ही नेहमी लोकांना ऐकणे पसंत करणार नाही आणि त्यांचा सल्ला मानणार नाही. परंतु तुम्हाला असे केले पाहिजे आणि हे समजून घेतले पाहिजे जीवनात आपल्यासाठी उभे राहण्यासाठी ही तुम्हाला काही लोकांची आवश्यकता असेल आणि हीच तुमच्या जीवनाची शिकवण असेल.
 MULANK_DESC_TEXT1 = मूलांक 1 च्या अंतर्गत जन्म घेण्याच्या कारणाने तुम्ही अत्यंत महत्वाकांक्षी आहेत आणि तुम्हाला कुणाचा प्रतिबंध आवडत नाही तर, तुम्ही दुसऱ्यांकडून काम करवून घेणे आणि त्यांचे नेतृत्व करणे तुम्ही पहिली आवड आहे. तुमच्यावर सूर्याचा विशेष प्रभाव राहतो. तुमची विचार सरणी स्थिर असते आणि आपल्या निश्चयावर तुम्ही दृढ राहतात. तुम्ही कुठल्याही संबंधात मग ते प्रेम संबंध असो अथवा मित्र असो हे लांब काळापर्यंत टिकून राहते. तुम्ही एक दयाळू आणि दुसऱ्यांवर उपकार करणारे व्यक्ती आहेत. तुम्हाला मान सन्मानाची अधिक इच्छा असते. आपल्या मेहनतीच्या बळावर तुम्ही चांगले नाव कमावतात. सरकारी क्षेत्रात तुमचे प्रदर्शन कौतुकास्पद असते. तुम्ही धैर्यवान आहात आणि आपल्या अध्ययनावर पूर्ण लक्ष देतात. तुम्ही विपरीत लिंगी जातकांकडे अधिक आकर्षित होतात आणि याच्या कारणाने बऱ्याच वेळा धोका मिळवतात. तुम्हाला समाज आणि राजकारणी नोकरी अथवा श्रम संबंधित क्षेत्रामध्ये विशेष अनुभव प्राप्त होते.
 MULANK_DESC_TEXT2 = चंद्र देवाने मुख्य रूपात प्रभावित होण्याच्या कारणाने तुम्ही बरेच भावुक होतात आणि कुठल्याही कार्याला कुणासोबत मिळून करणे पसंत करतात. जीवनाच्या प्रत्येक क्षेत्रात नेहमी तुम्हाला कुठल्या एक जोडीदाराची आवश्यकता असते. कधी कधी तुम्ही एक सोबत बरेच काम सुरु करतात परंतु मन बदलण्याच्या कारणाने बऱ्याच वेळा त्याला मध्यात सोडून देतात, ज्यामुळे तुम्हाला नुकसान उचलावे लागते. तुम्ही कलेला पसंत करणारे आणि कल्पनाशील असतात आणि लोकांवर प्रेम करतात. तुम्ही एक कुशल प्रेमी असू शकतात आणि आपल्या कुटुंबाच्या प्रति समर्पित होतात. आपल्या संयमात कमतरता होऊ शकते. आपली सामाजिक स्थिती चांगली असते आणि तुम्ही समाजात लोकप्रिय असतात. तुम्ही एक चांगले मित्र असतात. शोध/ रिसर्च प्रवृत्तीचे असतात. तुमच्या जीवनात अनेक चढ उतार येतात आणि याच कारणाने तुम्ही ही काही योजनेमध्ये अडकतात. तुम्हाला आपल्या आत्मविश्वासाला मजबूत बनवले पाहिजे.
 MULANK_DESC_TEXT3 = बृहस्पती ग्रहाने प्रभावित अंक 3 मध्ये जन्म घेण्याच्या कारणाने तुम्ही कोमल हृदयाचे व्यक्ती आहेत आणि सत्य वक्ता तसेच शांती प्रिय आहेत. तुम्ही महत्वाकांक्षी आहेत आणि अधिक तर सरकारी नोकरी मध्ये चांगले प्रदर्शन करतात. तुमच्यामध्ये नेहमी तानशाही प्रवृत्ती पहिली जाऊ शकते. तुम्ही अनुशासन प्रिय व्यक्ती आहात म्हणून आपल्या जवळच्या लोकांच्या प्रति थोडे कठोर ही होऊ शकतात. तुमच्यामध्ये सहज ज्ञान असते आणि तुम्हाला शिकणे आणि शिकवणे दोन्ही आवडते, म्हणून बौद्धिक क्षेत्राच्या संबंधित अनेक संधी प्राप्त होते. तुम्ही मानसिक रूपात सबळ आहेत आणि तुमचा तर्क आणि ज्ञान शक्ती बरीच चांगली आहे. तुम्हाला दान पुण्य करणे आणि परोपकाराचे कार्य करणे अधिक पसंत आहे. कधी कधी कुठल्या गोष्टीच्या मागे लागून तुम्ही भांडण प्रवृत्तीचे होऊ शकतात. परंतु हे सत्य आहे की तुम्ही स्वाभिमानी आहेत.
 MULANK_DESC_TEXT4 = तुमच्या मध्ये हर्षल अथवा राहू चा मुख्य प्रभाव आहे. याच्या परिणाम स्वरूप तुम्ही जगाच्या वेगळे विचार ठेवतात आणि काही नवीन करू शकतात. कारण तुमचा सल्ला अन्य लोकांसोबत सहजरित्या मिळत नाही, म्हणून अधिकतर लोक तुमचा विरोध करतात. तुम्हाला अधिक धन संचय करण्याचा शोक नसतो तर, तुम्हाला आनंदी राहणे आणि आपल्या धुंदीत जगणे अधिक पसंत आहे. तुम्ही जगाच्या पुढचे विचार ठेवतात आणि आपला विरोध ही मोकळे पणाने प्रकट करतात. तुमचा स्वभाव अप्रत्यक्षिक आहे ज्याला सहजरित्या कोणी ओळखू शकत नाही आणि पुढच्या क्षणी तुम्ही काय करतात कुणाला कानोकान खबर लागत नाही हेच तुमचे विशेषत्व सर्वात स्पेशल तुम्हाला बनवते. तुम्ही कुठल्याही कार्यक्रमाचे मुख्य आकर्षण असतात. तुम्हाला काही चांगले कार्य करण्याची सवय असते परंतु तुम्हाला असे वाटते की तुमच्या या गोष्टीची लोकांनी स्तुती केली पाहिजे. तुम्ही अधिक संवेदशील असतात आणि तुम्हाला नेहमी स्वतः एकटे वाटते. तुमच्या मित्रांची संख्या कमी असते परंतु ते सर्व खूप इमानदार आणि निष्ठावान असतात.
