
RUDRAKSH_SUGGESTION_REPORT=രുദ്രാക്ഷ നിർദേശ റിപ്പോർട്ട് നിങ്ങൾക്ക് അനുയോജ്യമായ രുദ്രാക്ഷം ഏതെന്ന് മനസ്സിലാക്കി ധരിക്കാൻ സഹായിക്കും. ഇത് ധരിക്കുന്നതിലൂടെ, നിങ്ങളുടെ ജീവിതത്തിലെ അനുകൂല സാഹചര്യത്തെ നിലനിർത്താൻ കഴിയുകയും, മണികളുടെ അനുകൂല ഫലങ്ങൾ നിരീക്ഷിക്കാൻ സാധിക്കുകയും ചെയ്യും.
RUDRAKSHA_AND_ITS_IMPORTANCE= <a href="http://buy.astrosage.com/rudraksha"> രുദ്രാക്ഷം </a> അടിസ്ഥാനപരമായി ഒരു മരത്തിന്റെ വിത്താണ്, ഈ വൃക്ഷത്തെ "രുദ്രാക്ഷ വൃക്ഷം" എന്നറിയപ്പെടുന്നു. "രുദ്ര" "അക്ഷ" എന്നീ രണ്ടു വാക്കുകളുള്ള ഒരു സംസ്‌കൃതം വാക്കാണിത്. രുദ്ര എന്നാൽ ശിവ ഭഗവാനേയും അക്ഷ എന്നാൽ കണ്ണുനീർ തുള്ളിയേയും അർത്ഥമാക്കുന്നു. ഈ വാക്കിന്റെ സമ്മിശ്രമായ അർത്ഥം "ഭഗവാൻ ശിവന്റെ കണ്ണുകൾ" എന്നാണ്. ഇത് ഒരു വ്യക്തിയെ ധർമ്മ, അർത്ഥ, കാമ, മോക്ഷത്താൽ അനുഗ്രഹിക്കും എന്ന് വേദഗ്രന്ഥങ്ങളിൽ പ്രതിപാദിക്കുന്നു. എന്നിരുന്നാലും, ശാസ്‌ത്രപരമായി പറയുമ്പോൾ ഇത് വൈദ്യുതകാന്തിക, പാരാമാഗ്നെറ്റിക്, ന്യൂട്രോപിക് ഘടകങ്ങൾ പുറത്തുവിടുന്നതു മൂലം ശ്വാസകോശ വ്യവസ്ഥയേയും മനുഷ്യശരീരത്തിലെ രക്തചംക്രമണത്തേയും മെച്ചപ്പെടുത്താൻ ഇത് സഹായിക്കും. രണ്ടു ശാസ്ത്രത്തിലും പ്രതിപാദിക്കുന്ന ഫലം ഒന്നുതന്നെയാണ്. രുദ്രാക്ഷം ധരിക്കുന്നതുവഴി നിങ്ങളുടെ സമ്മർദ്ദം കുറയും, ഊർജ്ജ നിലകൾ ഉയർത്തപ്പെടുകയും, മനസ്സിന് സമാധാനത്തിലേക്ക് നയിക്കപ്പെടുകയും ചെയ്യും. രുദ്രാക്ഷം ധരിക്കുന്നത്, ശിവനുമായി നിങ്ങളെ ബന്ധിക്കുന്നതിന് സഹായിക്കും. ഹിന്ദു പുരാണത്തിൽ "രുദ്രാക്ഷം" എന്ന വാക്കിന് വലിയ പ്രാധാന്യം ഉണ്ട്. രുദ്രാക്ഷം ധരിക്കുന്ന ആൾ ശിവനെ മാത്രമല്ല ദുർഗ്ഗാ ദേവിയേയും, ഇന്ദ്രനേയും, ബ്രഹ്‌മാവിനേയും, വിഷ്ണുവിനേയും, ഗണപതിയേയും, സുബ്രഹ്മണ്യനേയും, സൂര്യനേയും, സൗരയൂഥത്തിൽ വ്യത്യസ്ത ഗ്രഹങ്ങൾക്ക് അധിപനായ ദൈവങ്ങളേയും സന്തോഷിപ്പിക്കും എന്ന് വിശ്വസിക്കപ്പെടുന്നു. ഇത് ധരിക്കുന്നവർക്ക് വ്യത്യസ്തമായ രീതിയിൽ അനുകൂല ഫലങ്ങൾ നൽകും <a href="http://www.astrosage.com/gemstones/"> രത്‌നങ്ങൾ </a>. ഇത് ശിവന് വളരെ പ്രിയപ്പെട്ടതാണ്, അതുകൊണ്ട് തന്നെ രുദ്രാക്ഷം ധരിക്കാത്ത ശിവനെ സങ്കല്പിക്കാൻ പോലും ആവില്ല. രുദ്രാക്ഷം കാണുകയോ, ചൊല്ലുകയോ, ആരാധിക്കുകയോ ചെയ്യന്നത് മൂലം നിങ്ങളുടെ പാപങ്ങൾ കത്തി ചാമ്പലാവുന്നതാണ്. ഒരു മനുഷ്യൻ രുദ്രാക്ഷം കാണുന്നതിലൂടെ മാത്രം അനന്തമായ സന്തോഷം അനുഭവിക്കുമെന്ന് വിശ്വസിക്കപ്പെടുന്നു. ശിവൻറെ ഭക്തന്മാർ വിവിധ വേദനകളും ദുഃഖങ്ങളും ദുരന്തങ്ങളും ഒഴിവാക്കാൻ വേണ്ടി രുദ്രാക്ഷം ധരിക്കണം. ധരിക്കുന്നവന്റെ ആഗ്രഹങ്ങൾ ഇത് നിറവേറ്റും. ഇത് ധരിക്കുന്നതിനാൽ, മരണസമയത്ത് നിങ്ങൾക്ക് ശിവനെക്കുറിച്ചുള്ള യഥാർത്ഥ ജ്ഞാനം ലഭിക്കും. ഇത് ധരിക്കുന്നയാൾക്ക് മറ്റുള്ളവരെ സ്വാധീനിക്കാനുള്ള കഴിവും ഉണ്ടാവും. ഇത് നിങ്ങളിലെ ഉണർത്താൻ സഹായിക്കുന്നു <a href=""> ജാതകം </a> അല്ലെങ്കിൽ ആത്മീയത ഉയർത്തുന്ന പ്രക്രിയ. ഇത് ജീവശാസ്ത്ര വസ്തുതകളാൽ അതായത് സമ്മർദം, രക്ത സമ്മർദ്ദം എന്നിവയെ നിയന്ത്രിക്കുന്നതിൽ പ്രസിദ്ധമാണ്.
RECOMMENDATIONS=നിങ്ങളുടെ ജീവിതത്തിൽ അനുകൂലിസ്ഥിതി ഉണ്ടാവുന്നതിന് പ്രത്യേക രുദ്രാക്ഷം തിരഞ്ഞെടുക്കേണ്ടത് അത്യാവശ്യമാണ്. പുരാതന ഗ്രന്ഥങ്ങളിൽ വ്യത്യസ്ത തരത്തിലുള്ള രുദ്രാക്ഷങ്ങൾ പ്രതിപാദിക്കുന്നുണ്ട്. എന്നിരുന്നാലും, നിങ്ങൾക്ക് ആദ്യമായി ലഭ്യമാക്കേണ്ടതുണ്ട് <a href="http://www.astrosage.com/freekphorary/instantchart.asp?charttype=kp"> ജാതകം </a> നിങ്ങളുടെ ബലഹീനമായ വശം മെച്ചപ്പെടുത്തുന്നതിനായി വിശകലനം ചെയ്ത് ശേഷം അതനുസരിച്ചുവേണം രുദ്രാക്ഷം ധരിക്കേണ്ടത്. വ്യത്യസ്ത തരത്തിലുള്ള രുദ്രാക്ഷങ്ങളിൽ നിങ്ങൾക്ക് ഏതാവാം അനുയോജ്യമാകുന്നത്.
IMPORTANCE_OF_NATURAL_RUDRAKSHA = ഈ ദിവസങ്ങളിൽ പ്രകൃതിദത്ത രുദ്രാക്ഷം വളരെ ദുർലഭമായി മാത്രമേ കാണുകയുള്ള. ഫാക്ടറിയിൽ പ്ലാസ്റ്റിക് നൂലുകൾ ഉപയോഗിച്ചാണ് സാധാരണയായി രുദ്രാക്ഷ മുത്തുകൾ നിർമ്മിക്കുന്നത്. പ്രത്യേകിച്ചും, കൃത്രിമ രുദ്രാക്ഷങ്ങൾ വലിയ അളവിൽ ചൈനയിൽ നിർമ്മിക്കപ്പെടുകയും, പിന്നീട് ലോകമെമ്പാടും വിതരണം ചെയ്യപ്പെടുകയുമാണ് ചെയ്യുന്നത്. സ്വാഭാവിക രുദ്രാക്ഷം ഒരു ചെടിയുടെ ഫലമാണ് അതുകൊണ്ട് തന്നെ വളരെ പരിമിതമായ അളവിൽ മാത്രമേ ഇത് കാണുകയുള്ളു. കാലാവസ്ഥാ പോലുള്ള മുൻകൂട്ടി കാണാനാകാത്ത വസ്തുതകൾ കാരണം ചില സമയങ്ങളിൽ ഇതിന്റെ ഉത്പാദനത്തിന് തടസ്സം സംഭവിക്കാറുണ്ട്. കൃത്രിമമായി നിർമ്മിച്ച രുദ്രാക്ഷം, യഥാർത്ഥ രുദ്രാക്ഷം പോലെയിരിക്കുമെങ്കിലും ഇതിന് ജ്യോതിഷപരമായി ഒരു ഉപയോഗവും ഇല്ല. ഈ പ്രശ്നം പരിഹരിക്കാനായി, ഞങ്ങൾ നൂറു ശതമാനം സ്വാഭാവികമായ രുദ്രാക്ഷം കൊണ്ടുവന്നിട്ടുണ്ട്. ജ്യോതിഷപരമായി പ്രതീക്ഷിക്കുന്ന എല്ലാ ആനുകൂല്യങ്ങളും നിങ്ങൾക്ക് ഇത് ധരിച്ച ശേഷം ലഭിക്കുന്നതായിരിക്കും. ഈ രുദ്രാക്ഷം ഗവേഷണശാലയിൽ കർശ്ശനമായി വിലയിരുത്തപ്പെട്ടതും പരിശുദ്ധമാണെന്നു തെളിഞ്ഞതുമാണ്.



RUDRAKSHA_ONE_FACED                   = ഇത് നിങ്ങളുടെ കർമ്മത്തെ വളരെ തീഷ്ണമായും, വേഗത്തിലും മാറ്റുകയും സുഖപ്പെടുത്തുകയും ചെയ്യും. ശിവന്റെ പാവന ചിഹ്നമായാണ് ഇതിനെ കരുതപ്പെടുന്നത്. ഇത് നിങ്ങളെ എല്ലാ നെഗറ്റിവിറ്റിയിൽ നിന്നും സംരക്ഷിക്കുകയും നല്ല വഴി കാണിച്ചുതരുകയും നയിക്കുകയും ചെയ്യുന്നു. നിങ്ങളുടെ ഇച്ഛാശക്തി വർദ്ദിപ്പിക്കുവാൻ ഇതിന്റെ ശക്തി നിങ്ങളെ പ്രാപ്തരാക്കും. നിങ്ങൾ ആത്മീയതയുടെ യഥാർഥത തേടുന്നയാളാണെങ്കിൽ ഇത് നിങ്ങൾക്കായി ശുപാർശ ചെയ്യപ്പെടുന്നു. ഇതിന്റെ അധിപഗ്രഹം <a href="https://www.astrosage.com/planet/sun/"> സൂര്യൻ </a>, നിങ്ങളുടെ അന്തര്‍ബോധത്തെ പ്രകാശിപ്പിക്കുമെന്ന് വിശ്വസിക്കപ്പെടുന്നു. ഇതിന് ധ്യാനം ഗുണം ചെയ്യും. ശരീരത്തിന്റെ ചൂട്, രക്തസമ്മർദം തുടങ്ങിയവ നിയന്ത്രിക്കാൻ ഇത് സഹായിക്കുന്നു. നിങ്ങളുടെ വഴികളിൽ വരുന്ന സകല പ്രശ്നങ്ങളെയും അതിജീവിക്കാൻ ഇത് നിങ്ങളെ സഹായിക്കും. ഇതു നിങ്ങളുടെ നേതൃത്വ നൈപുണ്യം വികസിപ്പിക്കുകയും, ആത്മവിശ്വാസം നിങ്ങളിൽ നിറയ്ക്കുകയും ചെയ്യും.
HOW_TO_WEAR_ONE_FACED                 = ഏകമുഖീ രുദ്രാക്ഷം, സൂര്യനായുള്ള വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. ഇത് അണിയുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിൽ അല്ലെങ്കിൽ ഗംഗാജലത്തിൽ മുക്കുക. ശിവന് അല്ലെങ്കിൽ വിഷ്ണുവിന് വെള്ള അല്ലെങ്കിൽ ചുവപ്പ് പൂക്കളും, ചന്ദനത്തിരിയും പ്രാർത്ഥിക്കുമ്പോൾ അർപ്പിക്കുക <a href="https://www.astrosage.com/planet/sun/surya-mantra-surya-puja-surya-remedy.asp"> മന്ത്രം </a> സൂര്യനായി - ഓം ഹ്രാമ് ഹ്രീമ് ഹ്‌റോമ് സ സുര്യായ നമഃ (Oṃ Hrāṃ Hrīṃ Hrauṃ Saḥ Sūryāya Namaḥ) - 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് ഞായറാഴ്ച രാവിലെ അല്ലെങ്കിൽ <a href="https://www.astrosage.com/planet/moon/nakshtra/krittika-nakshatra-moon-in-krittika.asp"> കാർത്തിക </a>, ഉത്രം, ഉത്രാടം നക്ഷത്രങ്ങളിലോ ധരിക്കാം.

RUDRAKSHA_TWO_FACED                   = ഇത് നിങ്ങളും നിങ്ങളുടെ പങ്കാളിയും തമ്മിലുള്ള ഊർജ്ജത്തെ സമതുലിതമാക്കുന്നു. ഇത് പരസ്പര പിന്തുണയെ പ്രോത്സാഹിപ്പിക്കുകയും ദമ്പതികൾ തമ്മിലുള്ള ഐക്യത നിലനിർത്തുകയും ചെയ്യുന്നു. ഇത് അർദ്ധനാരീശ്വരനെ (പകുതി ശിവനും, പകുതി പാർവതിയും )പ്രധിനിധാനം ചെയ്യുന്നു. ഇത് അടിസ്ഥാനപരമായി ആൺ-പെൺ ഊർജ്ജത്തെ പ്രതിനിധാനം ചെയ്യുന്നു. വൈദിക ജ്യോതിഷപ്രകാരം ചന്ദ്രനാണ് ഇതിന്റെ അധിപഗ്രഹം. ദുർബലമായ സ്ഥാനത്ത് നിൽക്കുന്ന വ്യക്തിക്ക് ഇത് ശുപാർശ ചെയ്യപ്പെടുന്നു <a href="https://www.astrosage.com/planet/moon/"> ചന്ദ്രൻ </a> അവന്റെ ജനന ചാർട്ടിൽ. ഈ രുദ്രാക്ഷം ആരാധിക്കുന്നതിലൂടെ, നിങ്ങളുടെ ജീവിതത്തിലെ എല്ലാ വേദനകളിൽ നിന്നും നിങ്ങൾക്ക് ആശ്വാസം ലഭിക്കും. നിങ്ങളുടെ കുടുംബത്തിനുള്ളിൽ സമാധാനവും ഐക്യവും ഉണ്ടാകും. നിങ്ങളുടെ ജീവിതത്തിൽ നിന്നുള്ള എല്ലാ ദുഃഖങ്ങളെയും ഇത് നീക്കം ചെയ്യും. ഗർഭിണിയായ സ്ത്രീകൾ രണ്ടു മുഖമുള്ള രുദ്രാക്ഷം പൂജിക്കുന്നത് ഉത്തമമായിരിക്കും. ഇതു നിങ്ങൾക്ക് സമ്പത്തും സമൃദ്ദിയും നല്കും. ഹൃദയങ്ങൾ, ശ്വാസകോശങ്ങൾ, തലച്ചോറ്, ഇടതു കണ്ണു തുടങ്ങിയവയുമായി ബന്ധപ്പെട്ട രോഗങ്ങളെ ഇല്ലാതാക്കാൻ സഹായിക്കും. ജീവിതത്തിൽ കൂടുതൽ അടുപ്പം കാത്തുസൂക്ഷിക്കുന്നവർക്ക് ഇത് ശുപാർശ ചെയ്യപ്പെടുന്നു.
HOW_TO_WEAR_TWO_FACED                 = ദ്വിമുഖീ രുദ്രാക്ഷം ചന്ദ്രന്റെ വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. ഇത് അണിയുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിൽ അല്ലെങ്കിൽ ഗംഗാജലത്തിൽ മുക്കുക. ശിവപാർവ്വതിക്ക് വെള്ളപ്പൂക്കൾ, അരി, ചന്ദനത്തിരി എന്നിവ സമർപ്പിക്കുക, മന്ത്രം ജപിച്ച് കൊണ്ട് <a href="https://www.astrosage.com/planet/moon/chandra-mantra-chandra-puja-chandra-remedy.asp"> ചന്ദ്രൻ </a> - ഓം സ്രാമ് സ്രീമ് സ്രോമ് സ ചന്ദ്രമസേ നമഃ (Oṃ Śrāṃ Śrīṃ Śrauṃ Saḥ Candramase Namaḥ) - 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് തിങ്കളാഴ്ച അല്ലെങ്കിൽ പൗർണമി ദിവസം അല്ലെങ്കിൽ അത്തം, <a href="https://www.astrosage.com/planet/moon/nakshtra/rohini-nakshatra-moon-in-rohini.asp"> രോഹിണി </a> തിരുവോണം <a href="https://www.astrosage.com/nakshatra-calculator.asp"> നക്ഷത്രങ്ങളിലോ ധരിക്കാം </a>.

RUDRAKSHA_THREE_FACED                 = ത്രിമുഖീ രുദ്രാക്ഷം, ത്രിമൂർത്തികളായ - ബ്രഹ്മ, വിഷ്ണു, മഹേശ്വരന്റെ ശക്തിയാൽ നിങ്ങളെ അനുഗ്രഹിക്കും. ഇത് ധരിച്ചുകഴിഞ്ഞാൽ പിന്നെ നിങ്ങൾ ഒരു സാധാരണ മനുഷ്യനാകില്ല. മൂന്ന് മൂർത്തികളുടെയും ശക്തികൾ നിങ്ങൾക്ക് ലഭിക്കുകയും ജീവിതത്തിന്റെ എല്ലാ ഘട്ടത്തിലും ഇത് സഹായകമാവുകയും ചെയ്യും. നിങ്ങളുടെ മുൻകാല കർമ്മങ്ങളിൽ നിന്ന് നിങ്ങളെ മോചിപ്പിക്കുകയും, ശക്തിയും, മനഃശക്തിയും, മനശ്ശുദ്ധിയും പ്രധാനം ചെയ്യുകയും ചെയ്യും. നിങ്ങളുടെ എല്ലാ പരിശ്രമങ്ങളിലും ദൈവിക വിശ്വാസത്തിനും, വ്യക്തമായ രൂപാന്തരത്തിനും സഹായിക്കുന്നു. അഗ്നി ദേവനാണ് ഈ രുദ്രാക്ഷത്തിന്റെ അധിപൻ. ഇത് നിങ്ങളുടെ ജീവിതത്തിലെ പ്രതികൂലാവസ്ഥയെ തീർക്കുകയും നിങ്ങളുടെ എല്ലാ ആഗ്രഹങ്ങളെയും നിറവേറ്റുകയും ചെയ്യുന്നു. ഇതിന്റെ അധിപ ഗ്രഹം ചൊവ്വയാണ്. ഇത് നിങ്ങളുടെ ജീവിതത്തിൽ ചൊവ്വയുടെ നീച ഫലങ്ങൾ ഇല്ലാതാക്കുകയാണ്. സമ്മർദ്ദം, ഉത്കണ്ഠ എന്നിവയിൽ നിന്ന് നിങ്ങളെ മോചിപ്പിക്കും. ആത്മവിശ്വാസമില്ലായ്‌മ, ഉത്കണ്ഠ, സ്വയം വിശ്വാസ കുറവ്, ഭയം, കുറ്റബോധം, അയോഗ്യത്വം എന്നിവയുള്ളവർക്ക് ഇത് വളരെ ഉത്തമമാണ്.
HOW_TO_WEAR_THREE_FACED				  = ത്രിമുഖീ രുദ്രാക്ഷം ചൊവ്വക്കായുള്ള വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. ഇത് അണിയുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിൽ അല്ലെങ്കിൽ ഗംഗാജലത്തിൽ മുക്കുക.ഭഗവാൻ ഹനുമാനെ പ്രാർഥിക്കുമ്പോൾ ചുവന്ന പൂക്കളും ചന്ദനത്തിരിയും സമർപ്പിക്കുക <a href="https://www.astrosage.com/planet/mars/mars-mantra-mars-puja-mars-remedy.asp"> മന്ത്രം </a> ചൊവ്വക്കായി - ഓം ക്രാം ക്രീം ക്രോം സ ഭൗമായ നമഃ (Oṃ Krāṃ Krīṃ Krauṃ Saḥ Bhaumāya Namaḥ) - 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് ചൊവ്വാഴ്ചയോ അല്ലെങ്കിൽ മകയീരം, ചിത്ര, <a href="https://www.astrosage.com/planet/moon/nakshtra/dhanishta-nakshatra-moon-in-dhanishta.asp"> അവിട്ടം </a> നക്ഷത്രങ്ങളിലോ ധരിക്കാം. 

RUDRAKSHA_FOUR_FACED                  = ഈ രുദ്രാക്ഷം ഭഗവാൻ ബ്രഹ്‌മാവുമായി ബന്ധപ്പെട്ടിരിക്കുന്നു. ഈ രുരുദ്രാക്ഷം ധരിക്കുന്നവർക്ക് എല്ലാ നാലു വേദങ്ങളിലും അതായത് ധർമ്മ, അർത്ഥ, കാമ, മോക്ഷ വേദങ്ങളിൽ മികവു തെളിയിക്കും. നിങ്ങളുടെ സൃഷ്ടിപരമായ കഴിവുകളും ഓർമ്മയും മെച്ചപ്പെടുത്താൻ ഇത് നിങ്ങളെ സഹായിക്കുന്നു. ഇത് നാലു ദിശകളെ പ്രതിനിധാനം ചെയ്യുന്നു. ഈ രുദ്രാക്ഷത്തിന്റെ ആധിപത്യ ഗ്രഹം <a href="https://www.astrosage.com/planet/mercury/"> ബുധൻ </a>, എന്നിരുന്നാലും വ്യാഴ ദേവന്റെ ഊർജ്ജത്തെ ഇത് സൂചിപ്പിക്കുന്നു. ഭാരതീയ ഇതിഹാസമായ മഹാഭാരത പ്രകാരം ഇത് ധരിക്കുന്ന ആൾ തികച്ചും വ്യത്യസ്തമായ രീതിയിൽ രൂപാന്തരപ്പെടും.. ഇത് നിങ്ങളെ മോക്ഷത്തിലേക്ക് നയിക്കും. ഇതു വൃക്ക, തൈറോയ്ഡ് സംബന്ധമായ പ്രശ്നങ്ങൾക്ക് ഉത്തമമാണ്. ഉദാസീനത, അമിത ഉറക്കം, അനാവശ്യ സ്വപ്‌നങ്ങൾ എന്നിവ ഒഴിവാക്കുകയും മാനസികാരോഗ്യം ഉണ്ടാവുകയും ചെയ്യും. ഇത് തിങ്കളാഴ്ച ധരിക്കാനായി ശുപാർശ ചെയ്യുന്നു. വിദ്യാർത്ഥികൾ, ശാസ്ത്രജ്ഞർ, കലാകാരന്മാർ, എഴുത്തുകാർ, രാഷ്ട്രീയക്കാർ, അല്ലെങ്കിൽ പഠന വൈകല്യമുള്ളവർ എന്നിവർക്കായി ശുപാർശ ചെയ്യുന്നു.

HOW_TO_WEAR_FOUR_FACED				  =ചതുർമുഖീ രുദ്രാക്ഷം, ബുധനായുള്ള വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. വിഷ്ണുഭഗവാന് മഞ്ഞ പൂക്കളും ചന്ദനത്തിരിയും അർപ്പിച്ചു പ്രാർഥിക്കുക <a href="https://www.astrosage.com/planet/mercury/budha-mantra-budha-puja-budha-remedy.asp"> മന്ത്രം </a> ബുധനായി - ഓം ബ്രം ബ്രിമ് ബ്രോം സ ബുധായ നമഃ (Oṃ Brāṃ Brīṃ Brauṃ Saḥ Budhāya Namaḥ) - 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് ബുധനാഴ്ച അല്ലെങ്കിൽ ആയില്യം <a href="https://www.astrosage.com/planet/moon/nakshtra/jyeshta-nakshatra-moon-in-jyeshta.asp"> തൃക്കേട്ട </a> രേവതി നക്ഷത്രങ്ങളിലോ ധരിക്കാം.

RUDRAKSHA_FIVE_FACED				=ഈ രുദ്രാക്ഷം മനസ്സമാധാനവും നല്ല ആരോഗ്യവും പ്രധാനം ചെയ്യുന്നു. ഇത് പ്രതികൂല സാഹചര്യങ്ങളിൽ സഹിഷ്ണുത വർദ്ധിപ്പിക്കുന്നു. ഇത് നിങ്ങളുടെ പിരിമുറുക്കം കുറയ്ക്കുകയും ഓജസ്സ്, ദീർഘായുസ്സ്, ശാന്തത എന്നിവ കൂട്ടുകയും ചെയ്യും. അനുഗ്രഹങ്ങൾ തേടുന്നവർക്ക് ഇത് വളരെ ഉചിതമാണ്. ഏത് സാഹചര്യവുമായും പെട്ടെന്ന് ഇണങ്ങിച്ചേരാനും, പെട്ടെന്ന് പ്രതികരണം ലഭിക്കാനും ഇത് സഹായിക്കുന്നു. ഈ രുദ്രാക്ഷം ശിവന്റെ അഞ്ചു രൂപങ്ങളായ സദ്യോജത്, തത്പുരുഷ്, അഘോർ, വാമദേവ്, ഇഷാൻ എന്നിവയാൽ അനുഗ്രഹീതമാണ്. ഇത് നിങ്ങളെ രോഗങ്ങളിൽ നിന്ന് സംരക്ഷിക്കുകയും മാനസിക സമാധാനം നൽകുകയും അതുവഴി നിങ്ങളുടെ ജീവിതത്തിൽ സന്തോഷം ഉണ്ടാക്കുകയും ചെയ്യുന്നു. ഇതിന്റെ ആധിപത്യഗ്രഹം <a href="https://www.astrosage.com/planet/jupiter/"> വ്യാഴം </a>. പഞ്ചമുഖീ രുദ്രാക്ഷം അപകട മരണത്തിൽ നിന്ന് രക്ഷിക്കും എന്ന് പറയപ്പെടുന്നു. ഇത് പഞ്ചപാണ്ഡവന്മാരെ പ്രതിനിധീകരിക്കുന്നു. അഗ്നി, ജലം, വായു, ആകാശം, ഭൂമി എന്നീ അഞ്ച് സുപ്രധാന ഘടകങ്ങളെ ഇത് നിയന്ത്രിക്കുന്നു. വ്യാഴത്തിന്റെ നീചഫലങ്ങൾ ഇത് ധരിക്കുന്നത് വഴി കുറയും.
HOW_TO_WEAR_FIVE_FACED				=പഞ്ചമുഖീ രുദ്രക്ഷം, വ്യാഴത്തിനായുള്ള വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. ഇത് അണിയുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിൽ അല്ലെങ്കിൽ ഗംഗാജലത്തിൽ മുക്കുക. ഭഗവാൻ വിഷ്ണുവിന് മഞ്ഞ പൂക്കളും ചന്ദനത്തിരിയും പ്രാർത്ഥിക്കുമ്പോൾ സമർപ്പിക്കുക <a href="https://www.astrosage.com/planet/jupiter/guru-mantra-guru-puja-guru-remedy.asp"> മന്ത്രം </a> വ്യാഴത്തിനായി - ഓം ഗ്രം ഗ്രിം ഗ്രോമ് സ ഗുരവേ നമഃ (Oṃ Grāṃ Grīṃ Grauṃ Saḥ Gurave Namaḥ) - 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. ഈ ചടങ്ങുകൾക്ക് ശേഷം, വ്യാഴാഴ്ച അല്ലെങ്കിൽ പുണർതം, <a href="https://www.astrosage.com/planet/moon/nakshtra/vishakha-nakshatra-moon-in-vishakha.asp"> വിശാഖം, </a> പുരോരുട്ടാതി നക്ഷത്രങ്ങളിലോ ധരിക്കാം.

RUDRAKSHA_SIX_FACED					=ഈ രുദ്രാക്ഷം ആറ് ദർശനവുമായി ബന്ധപ്പെട്ടിരിക്കുകയും ഭഗവാൻ കാർത്തികേയന്റെ ശക്തിയാൽ അനുഗ്രഹീതമാണ്. ഈ രുദ്രാക്ഷത്തിന്റ കർത്താവ് ഭഗവാൻ കാർത്തികേയനും ഗണപതിയുമാണ്. ഇതിന്റെ ആധിപത്യം പുലർത്തുന്ന ഗ്രഹം <a href="https://www.astrosage.com/planet/venus/"> ശുക്രൻ </a>, സ്നേഹത്തിന്റെയും സൗന്ദര്യത്തിന്റെയും വാൽസല്യത്തിന്റേയും നാഥൻ, അതിനാൽ നിങ്ങളുടെ കലാപരമായ കഴിവുകളെ മെച്ചപ്പെടുത്തുന്നു. കാര്യങ്ങൾ പ്രകടിപ്പിക്കാനുള്ള നിങ്ങളുടെ കഴിവ്‌ വർദ്ധിപ്പിക്കും. കണ്ണു, മൂത്രം, കഴുത്ത് തുടങ്ങിയവയുമായി ബന്ധപ്പെട്ട രോഗങ്ങൾക്ക് ഇത് ആശ്വാസം നൽകും. ഏത് കാര്യവും നേടിയെടുക്കാൻ ആവശ്യമായ മനഃശക്തിയും അറിവും പ്രധാനം ചെയ്യുന്നു. നിങ്ങളുടെ ജീവിതത്തിന്റെ എല്ലാ വശങ്ങളിലും സന്തോഷം കൈവരും. നിങ്ങൾക്ക് മറ്റുള്ളവരിൽ സ്വാധീനം ചെലുത്താനുള്ള പ്രഭാവം വർദ്ധിക്കുകയും, നിങ്ങളുടെ സംസാരവും, അവതരണവും മറ്റുള്ളവരെ നല്ലരീതിയിൽ സ്വാധീനിക്കുകയും ചെയ്യും. നിങ്ങളുടെ ആത്മവിശ്വാസം വർദ്ധിപ്പിക്കുന്നു, ഇത് അഭിനേതാക്കൾക്കും, അധ്യാപകർക്കും, രാഷ്ട്രീയക്കാർക്കും, കൂടുതൽ ഉത്തരവാദിത്തമുള്ളവർക്കും (സമൂഹത്തിൽ ) ശുപാർശ ചെയ്യപ്പെടുന്നു.
HOW_TO_WEAR_SIX_FACED				=ഷണ്മുഖീ രുദ്രാക്ഷം, ശുക്രനായുള്ള വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. ഇത് അണിയുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിൽ അല്ലെങ്കിൽ ഗംഗാജലത്തിൽ മുക്കുക. ലക്ഷ്മി ദേവിക്ക് വെള്ള പൂക്കളും ചന്ദനത്തിരിയും അർപ്പിച്ചു പ്രാർഥിക്കുക <a href="https://www.astrosage.com/planet/venus/shukra-mantra-shukra-puja-shukra-remedy.asp"> മന്ത്രം </a> ശുക്രനായി - ഓം ദ്രം ദൃം ദ്രോമ് സ ശുക്രായ നമഃ (Oṃ Drāṃ Drīṃ Drauṃ Saḥ Śukrāya Namaḥ) - 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് വെള്ളിയാഴ്ച അല്ലെങ്കിൽ ഭരണി, <a href="https://www.astrosage.com/nakshatra/purva-phalguni-nakshatra-characteristics.asp"> പൂരം </a> പൂരാടം നക്ഷത്രങ്ങളിലോ ധരിക്കാം.

RUDRAKSHA_SEVEN_FACED				=ഇത് മഹാലക്ഷ്മിയുടെ അടയാളമാണ്, സമ്പത്തിന്റെ ദേവതയേയും ആനന്ദ ശിവ ഭഗവാനേയും പ്രധിനിതീകരിക്കുന്നു. സപ്ത മാതാവിനേയും കൂടി ഇത് പ്രധിനിതീകരിക്കുന്നു. ബ്രഹ്മ പുരാണ പ്രകാരം സപ്തമുഖീ രുദ്രാക്ഷം ആനന്ദത്തേയും, പരമമായ ബ്രഹ്‌മാവിനേയും പ്രധിനിതീകരിക്കുന്നു. ഇതിന്റെ ഭരണ ഗ്രഹം "<a href="https://www.astrosage.com/planet/saturn/"> ശനി </a>" ഈ മണിക്കായി. ഇതു നല്ല ആരോഗ്യത്താലും സമ്പത്താലും നിങ്ങളെ അനുഗ്രഹിക്കും. ഇത് നിങ്ങളുടെ പേര്, പ്രശസ്തി, ജീവിതത്തിൽ പുരോഗതി ഉണ്ടാകുന്നതിന് സഹായിക്കുകയും നിർഭാഗ്യത്തെ നീക്കം ചെയ്യുകയും ചെയ്യും. ഇതു സമാധാനം, സമൃദ്ധി, സമ്പത്ത്, നല്ല ഭാഗ്യം എന്നിവ കൊണ്ടുവരും. ഇത് നിങ്ങളുടെ സമയത്ത് ഇത് ശുപാർശ ചെയ്യാവുന്നതാണ് <a href="https://www.astrosage.com/free/sade-sati-report.asp"> ഏഴരശ്ശനി </a> അല്ലെങ്കിൽ ശനിയുടെ രണ്ടര ഘട്ടത്തിലെ നീചഫലം കുറക്കുന്നതിന്. ഇത് നിങ്ങളുടെ സമ്മർദ്ദം, ഉത്കണ്ഠ, വിരുദ്ധ സ്വഭാവം എന്നിവ കുറയ്ക്കും. നിങ്ങളുടെ സാമ്പത്തിക പ്രതിസന്ധിയിൽ നിന്ന് പുറത്തു വരുന്നതിനും കൂടുതൽ നേട്ടങ്ങൾക്കായി നിങ്ങളുടെ ഉദ്യോഗ ചുമതലകൾ ഏറ്റെടുക്കുന്നതിനും ഇത് നിങ്ങളെ പ്രാപ്തരാക്കും. ആസ്തമ, ദഹനേന്ദ്രിയ രോഗങ്ങൾ എന്നിവക്ക് ഇത് ഗുണം ചെയ്യും. ഇത് നിങ്ങളുടെ ചുറ്റുപാടിൽ നിന്ന് പ്രതികൂലാവസ്ഥയെ ഇല്ലാതാക്കുന്നു, എല്ലാവരുമായുള്ള ഐക്യത കാരണം നിങ്ങൾക്ക് എല്ലാ സമയത്തും ഉണർവ് തോന്നും. സംഖ്യശാസ്ത്രപ്രകാരം " 8 " അനുസരിച്ച് പ്രവർത്തിക്കുന്ന ആളുകൾ ഈ രുദ്രാക്ഷം ധരിക്കാൻ ശുപാർശ ചെയ്യപ്പെടുന്നു. പണം, ഉദ്യോഗ പ്രശ്നങ്ങൾ, ജീവിതത്തിന്റെ ആവശ്യകത എന്നിവകൊണ്ട് പോരാടുന്നവർക്ക് ഇത് വളരെ ഉത്തമമാണ്.
HOW_TO_WEAR_SEVEN_FACED				=സപ്തമുഖീ രുദ്രാക്ഷം, ശനിയുടെ വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. ഇത് അണിയുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിൽ അല്ലെങ്കിൽ ഗംഗാജലത്തിൽ മുക്കുക. ഭഗവാൻ ഭൈരവന് കറുപ്പ് എള്ളും ചന്ദനത്തിരിയും സമർപ്പിക്കുക, ശനിദേവനായി മന്ത്രം ചൊല്ലുക - ഓം പ്രം പ്രിം പ്രോം സ ശനൈശ്ചരായ നമഃ (Oṃ Prāṃ Prīṃ Prauṃ Saḥ Śanaiścarāya Namaḥ)- 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് ശനിയാഴ്ച സൂര്യാസ്തമനത്തിന് ശേഷം അല്ലെങ്കിൽ പൂയ്യം, <a href="https://www.astrosage.com/planet/moon/nakshtra/anuradha-nakshatra-moon-in-anuradha.asp"> അനിഴം </a> ഉത്രട്ടാതി നക്ഷത്രങ്ങളിലോ ധരിക്കാം.

RUDRAKSHA_EIGHT_FACED				=അഷ്ടമുഖീ രുദ്രാക്ഷത്തിന്റെ കർത്താവ് "ഗണപതി ഭഗവാൻ" ആണ്. ഭഗവാൻ ഗണപതിയുടെ അനുഗ്രഹമായി കരുതി ഇത് ധരിക്കുകയാണെങ്കിൽ ജീവിതത്തിൽ നിങ്ങൾ പരാജയപ്പെടുകയില്ല. രാഹു ഇതിനെ നിയന്ത്രിക്കുന്നു, ഇത് തിങ്കളാഴ്ച ധരിപ്പിക്കാനായി ഉപദേശിക്കുപ്പെടുന്നു. ഇതു കഴുത്തിന് ചുറ്റുമായി അണിയുകയോ അല്ലെങ്കിൽ ആരാധനാലയത്തിൽ സൂക്ഷിക്കുകയോ വേണം.ഇതു ജീവിതത്തിലെ തടസ്സങ്ങളെ നീക്കുകയും മികച്ച വിജയം നൽകുകയും ചെയ്യുന്നു. ഇത് നിങ്ങൾക്ക് പേരും പ്രശസ്തിയും, അഭിവൃദ്ദിയും പ്രധാനം ചെയ്യും. ഇത് പഠിപ്പിക്കൽ, എഴുത്ത്, പഠിക്കുന്നവർ എന്നിവർക്ക് അനുയോജ്യമാണ്. ഇത് ചർമ്മവും, അസ്ഥിസംബന്ധവുമായ രോഗങ്ങൾ നീക്കം ചെയ്യാൻ നിങ്ങളെ സഹായിക്കും. ഇതു പരിസ്ഥിതിയിൽ നിന്ന് നിഷേധാത്മകതയെ നീക്കം ചെയ്യുകയും എല്ലാ തരത്തിലുമുള്ള നേട്ടങ്ങളോടൊപ്പം സമാധാനവും സ്ഥിരതയും നൽകുകയും ചെയ്യും. അറിയാത്ത ശക്തികളിൽ നിന്നുമുള്ള പേടിയും, ഉത്കണ്ഠയും, നിർഭാഗ്യവാൻ / നിർഭാഗ്യവതി ആണെന്ന തോന്നലുള്ളവർക്ക് ഇത് വളരെ ഉചിതമാണ്. ഇത് ഒരു തടസവുമില്ലാത്ത വിജയകരമായ ഒഴുക്ക് കാരണമാവുകയും അങ്ങനെ ജീവിതത്തിൽ വലിയ നേട്ടത്തിലേക്ക് നയിക്കുകയും ചെയ്യും.
HOW_TO_WEAR_EIGHT_FACED				=അഷ്ടമുഖീ രുദ്രാക്ഷം, രാഹുവിനായുള്ള വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. ഇത് അണിയുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിൽ അല്ലെങ്കിൽ ഗംഗാജലത്തിൽ മുക്കുക. ദുർഗ്ഗാദേവിയെ പ്രാർത്ഥിക്കുമ്പോൾ ചുവപ്പ് ചന്ദനവും, ചന്ദനത്തിരിയും അർപ്പിക്കുക. <a href="https://www.astrosage.com/planet/saturn/shani-mantra-shani-puja-shani-remedy.asp"> മന്ത്രം </a> രാഹുവിനായി (ഉത്തരപൂർവ്വം) - ഓം ഭ്രം ഭ്രിമ് ബ്രൗമ് സ രാഹവേ നമഃ (Oṃ Bhrāṃ Bhrīṃ Bhrauṃ Saḥ Rāhave Namaḥ) - 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. ഈ ചടങ്ങുകൾക്ക് ശേഷം,ഇത് ശനിയാഴ്ച അല്ലെങ്കിൽ ചോതി, ചതയം, തിരുവാതിര നക്ഷത്രങ്ങളിലോ ധരിക്കാം.

RUDRAKSHA_NINE_FACED				=നവമുഖീ രുദ്രാക്ഷത്തിന്റെ കർത്താവ് ദുർഗ്ഗാ ദേവിയും ഒമ്പത് തലയുള്ള സർപ്പവുമാണ്. ദേവി ദുർഗ്ഗയുടെ ഒമ്പത് രൂപങ്ങളാൽ ഇത് നിങ്ങളെ അനുഗ്രഹിക്കും. ഭരിക്കുന്ന ഗ്രഹം <a href="https://www.astrosage.com/planet/ketu/"> കേതു </a>. തിങ്കളാഴ്ച ഈ കല്ല് ധരിക്കുന്നത് നല്ലതാണ്. ഇതു കേതുവിന്റെ നീച ഫലങ്ങൾ കുറയ്ക്കും. ഇത് ആശ്വാസം നൽകും <a href="https://www.astrosage.com/free/kaalsarp-yog.asp"> കാല സർപ്പ ദോഷം </a> നിലവിലുള്ള ജാതകത്തിലേയും മുൻജന്മത്തേയും പാപങ്ങളിൽ നിന്നും മുക്തി നൽകുന്നു. ഇത് ആത്മവിശ്വാസം വർദ്ധിപ്പിക്കുകയും നിങ്ങളെ സമ്മർദ്ദത്തിൽ നിന്നും മുക്തമാക്കുകയും, ഭയരഹിതമാക്കുകയും ചെയ്യുന്നു. ഇതു ശരീര വേദനയിൽ നിന്നും തലവേദനയിൽനിന്നും നിങ്ങൾക്ക് ആശ്വാസം തരും. ഏത് പ്രതികൂല സാഹചര്യത്തെയും നേരിടാനുള്ള ആത്മധൈര്യവും, നേതൃത്വ ഗുണവും പ്രധാനം ചെയ്യും. നിങ്ങളുടെ ഹൃദയ ചക്രം തുറക്കാൻ സഹായിക്കും, മോശമായ ഏത് സംഭവങ്ങളിൽ നിന്ന് നിങ്ങൾക്ക് അറിവും ജ്ഞാനവും സംരക്ഷണവും നൽകും. ആത്മീയ പ്രവൃത്തിയും ധ്യാനങ്ങളും ചെയ്യുന്നവർക്ക് ഇത് വളരെ ഉചിതമാണ്.
HOW_TO_WEAR_NINE_FACED				=നവമുഖീ രുദ്രാക്ഷം, കേതുവിനായുള്ള വിശുദ്ധ മുത്തുകൾ, വെള്ളിയുടെയോ, സ്വർണ്ണത്തിന്റെയോ പതക്കത്തിൽ അണിയാം. ഇത് അണിയുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിൽ അല്ലെങ്കിൽ ഗംഗാജലത്തിൽ മുക്കുക. ഭഗവാൻ ഗണപതിയെ പ്രാർത്ഥിക്കുമ്പോൾ കറുകയും ചന്ദനത്തിരിയും അർപ്പിക്കുക <a href="https://www.astrosage.com/planet/ketu/ketu-mantra-ketu-puja-ketu-remedy.asp"> മന്ത്രം </a> കേതുവിനായി (ദക്ഷിണ പൂർവ്വം) - ഓം സ്രം സ്രിമ് സ്റോം സ കേതവേ നമഃ (Oṃ Srāṃ Srīṃ Srauṃ Saḥ Ketave Namaḥ) - 108 തവണ ചൊല്ലുന്നത് പതക്കത്തെ ഊർജ്ജിതമാക്കും. </li><li> ഈ ചടങ്ങുകൾക്ക് ശേഷം, ഇത് ബുധനാഴ്ചയോ അല്ലെങ്കിൽ ശനിയാഴ്ചയോ അല്ലെങ്കിൽ <a href="https://www.astrosage.com/planet/moon/nakshtra/ashwini-nakshatra-moon-in-ashwini.asp"> അശ്വതി </a>, മകം <a href="https://www.astrosage.com/nakshatra/moola-nakshatra-characteristics.asp"> മൂലം </a> നക്ഷത്രങ്ങളിലോ ധരിക്കാം.




RECOMMENDED_RUDRAKSHA=ശുപാർശചെയ്ത രുദ്രാക്ഷം
BUY_NOW										        = ഇപ്പോൾ വാങ്ങുക
RUDRAKSHA_ONE_FACED_HEADING=ഏകമുഖീ രുദ്രാക്ഷം (പരിവർത്തനവും ശക്തിയും)
RUDRAKSHA_TWO_FACED_HEADING=ദ്വിമുഖീ രുദ്രാക്ഷം (ഒരുമയും ഐക്യവും)
