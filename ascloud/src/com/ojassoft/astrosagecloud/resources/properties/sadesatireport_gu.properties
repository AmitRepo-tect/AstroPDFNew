	SADESATIRISINGPHASE	= આ શનિની સાડાસાતીનો પ્રારંભિક સમયગાળો છે. આ સમયમાં શનિ ચંદ્રથી બારમાં સ્થાનમાં પસાર થતો હશે. તે સામાન્ય રીતે નાણાકીય નુકસાન, ગુપ્ત દુશ્મનોથી તકલીફ, ધ્યેય વિનાનો પ્રવાસ, ઝઘડા અને ગરીબી દર્શાવે છે. આ સમયગાળા દરમિયાન, તમારે છુપા દુશ્મનો દ્વારા ઊભી કરાયેલી તકલીફોનો સામનો કરવો પડે તેવી શક્યતા છે. સહકર્મચારીઓ સાથેના સંબંધો બગડશે અને તેઓ કાર્યસ્થળે તમારા માટે સમસ્યા ઊભી કરશે. કૌટુંબિક મોરચે પણ પડકારોનો સામનો કરવો પડે તેવી શક્યતા છે. તેને કારણે તણાવ ઊભો થઈ શકે. તમારે તમારા ખર્ચ પર અંકુશ રાખવો પડશે, નહિંતર તે મોટી નાણાકીય સમસ્યાઓમાં પરિણમી શકે. આ સમયગાળા દરમિયાન લાંબા અંતરનો પ્રવાસ ફળદાયી ન નીવડે તેવી શક્યતા છે. શનિનો સ્વભાવ વિલંબ અને હતાશા લાવવાનો છે, પરંતુ સામાન્ય રીતે અંતે પરિણામ મળતું જ હોય છે. આથી થોડું ધૈર્ય રાખી તમારા વારાની પ્રતીક્ષા કરો. આ સમયગાળા દરમિયાન બની શકે તેટલું શીખો, સખત મહેનત કરો અને ધીરે ધીરે બધું બરાબર થઈ જશે. આ સમયગાળા દરમિયાન ધંધાકીય બાબતોમાં વધુ જોખમ ન લેવાની તમને સલાહ છે.
	SADESATIPEAKPHASE		= અત્યારે શનિની સાડાસાતી તેની ટોચ પર છે. સામાન્ય રીતે શનિનો આ તબક્કો સહુથી વધુ મુશ્કેલ હોય છે. જન્મના ચંદ્ર પરથી પસાર થતો શનિ આરોગ્યલક્ષી સમસ્યાઓ, ચારિત્ર્યખંડન, સંબંધોમાં સમસ્યા, માનસિક સંતાપ, તેમજ દુઃખ દર્શાવે છે. આ સમયગાળામાં સફળતા મેળવવી તમારા માટે અઘરી બનશે. તમારા પરિશ્રમનું ફળ તમને નહિ મળે તેમજ નિયંત્રિત થયાની લાગણી થશે. તમારું બંધારણ અને રોગપ્રતિકારક તંત્ર સ્વસ્થ રહેશે નહિ. પ્રથમ સ્થાન આરોગ્યનું સ્થાન હોવાને કારણે, તમારે કસરત કરવાનું તેમજ આરોગ્યની સંભાળ લેવાનું શરૂ કરવું જોઈએ, નહિતર તમને કોઈ લાંબા ગાળાની માંદગી લાગુ પડે શકે છે. તમને હતાશા, અજાણ્યો ડર કે ફોબિયા સતાવી શકે છે. તમારાં વિચાર, ક્રિયા તેમજ નિર્ણય લેવામાં સ્પષ્ટતાનો અભાવ જણાશે. તમે આધ્યાત્મિક બાજુએ ઢળશો તેમજ તમને કુદરત તરફ આકર્ષણ થશે. આ સમયગાળાનો સ્વીકાર અને પાયાની બાબતોને યોગ્ય રીતે અનુસરવાથી તમે આ સમયને શાંતિપૂર્વક પસાર કરી શકશો.
	SADESATISETTINGPHASE	= આ શનિની સાડાસાતી આથમવાનો સમય છે. જન્મના ચંદ્ર પરથી શની હવે દ્વિતીય ભાવમાં આવશે, જે નાણાકીય અને ઘરેલૂ મોરચે સમસ્યાઓ દર્શાવે છે. સાડાસાતીના બે મુશ્કેલ તબક્કા પસાર કર્યા બાદ તમને થોડી રાહત અનુભવાશે. છતાં, આ સમયગાળા દરમિયાન અણસમજ અને નાણાકીય તણાવ જોઈ શકાય છે. વધુ પડતા ખર્ચ કરવા પડશે, તમારે ખર્ચ પર નિયંત્રણ રાખવાનું ચાલુ રાખવું પડશે. નાણાકીય ક્ષેત્રે આકસ્મિક નુકસાન તેમજ ચોરીની પણ શક્યતા રહે છે. તમારા વિચાર કદાચ નિરાશાવાદી બનતા જશે, પરંતુ તમને ઉત્સાહ જાળવી રાખવાની સલાહ છે. વ્યક્તિગત તેમજ કૌટુંબિક મોરચે વધુ ધ્યાન આપવું જરૂરી બનશે, આમ ન થતાં મોટી સસ્યાઓ આવવાની શક્યતા રહે છે. વિદ્યાર્થી માટે, તેમના અભ્યાસને થોડી-ઘણી અસર પહોંચી શકે છે. વર્તમાન સ્તરે ટકી રહેવા માટે તેમણે વધુ મહેનત કરવી જરૂરી બનશે. તમારા પ્રયત્નોનાં પરિણામ ધીમા અને વિલંબિત હશે. આ સમયગાળો જોખમ સૂચવે છે અને બીજી બાબતોની સાથે વાહન ચલાવવામાં તમારે કાળજી રાખવી પડશે. શક્ય હોય તો, શનિને ખુશ રાખવા માટે બિન-શાકાહારી ખોરાક તેમજ મદિરા સેવનથી દૂર રહો. તમારી ઘરેલૂ અને નાણાકીય બાબતોને ચતુરાઈપૂર્વક નિયંત્રણમાં રાખીને તમે આ સમયમાંથી પાર ઊતરી શકશો.
	IMPNOTE				= ઉપરનાં અનુમાન સાડાસાતી નુકસાનકારક છે તેવી સામાન્ય માન્યતાને આધારે આપેલાં છે. હકીકતે, અમે જોયું છે કે હંમેશા આમ થતું નથી અને આ માટે અમે <b><u>સાડાસાતી પરનો લેખ <a href=http://www.astrocamp.com/vedicastrology/2008/09/shani-sade-sati.html></a></u></b> વાંચવાની ભલામણ કરીશું. ફક્ત સાડાસાતી પર આધારિત હોય તેવો કોઈ પણ નિષ્કર્ષ સાચો ન હોઈ શકે, અને તે ખોટો પડવાની પૂરતી શક્યતા છે. સાડાસાતીનો સમયગાળો અશુભ રહેશે કે શુભ તે અંગેનું તારણ કાઢતી વખતે તે સમયે ચાલી રહેલી દશા તેમજ શનિની પ્રકૃત્તિ જેવા પરિબળોનું પણ વિશ્લેષણ કરવું પડે છે. ઉપરનાં અનુમાનને ગંભીરતાપૂર્વક ન લેવાની તમને સલાહ છે અને કોઈ સંશય હોય તો, એક સારા જ્યોતિષીની સલાહ લો.
