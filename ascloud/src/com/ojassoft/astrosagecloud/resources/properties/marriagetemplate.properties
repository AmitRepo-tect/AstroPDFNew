USER_HOROSCOPE=I have analyzed your horoscope as per the principles of Vedic Astrology. These time-tested principles give profound insight about love and marriage. # Astrologically speaking, alignment of the planets in the sky tell a lot about an individual. It also reveals how love life or married life is going to be.#The events in life of each person take place according to the movement of stars in the sky. These movement also shed light on love and marriage in great detail.
LOVE_MARRIAGE=Marriage, according to astrology, is an important aspect of an individual\u2019s life. It also decides the path one would tread with one\u2019s life-partner. The placement of Venus in your chart indicates there are strong chances of love marriage. Although, there might be some minor hurdles in your way.#Venus, in astrology, is known for art, craft, luxuries, and conjugal bliss. If we look at this planet in detail, it reveals that your chart is comparatively better for love marriage. It does not mean that arranged marriage would not be good. Still, I can give more points to love marriage in your case.
ARRANGE_MARRIAGE=Now, if I am to analyze the placement of Venus in your birth-chart minutely, it shows that going for love marriage may not be that suitable for you. Arranged marriage would prove to be more beneficial in your case.#As far as planet Venus is concerned, it can be said that both arranged marriage and love marriage are equally suitable for you. But in-depth analysis reveals that arranged marriage will be slightly better. You need not worry and choose anyone as per your own inclination.
SAMEPERSONORDIFFERENT=A birth-chart is also a powerful tool that tells about all spheres of one\u2019s life including who you would spending your life with. As per your question, favorable alignment of planets show that you may get married to the person who you are seeing presently. However, you may face some resistance from the family.#Who one may spend life with is an important question and astrology tells about it. The stars emphasize there may be a lot of difficulties with the person you are presently interested in. In order to get married to that person, ego issues should be avoided strictly. Also, option of moving on can be considered if required changes are not possible in both persons.#Who one is going to spend life with is a question that decides course of one\u2019s life. Astrology can shed some light on it, so that you can understand what is beneficial for you. Planetary considerations indicate that you may get married to the person you are currently interested in. However, there can be some problems and misunderstandings owing to difference in personalities and opposition from family. If you keep faith in other person, it is going to prove good in long run for sure.
LIFEAFTERRELATINSHIP=Your married life is going to be good and fulfilling. Minor disputes cannot be ruled out, but you will definitely feel that it has been a good decision.#You will certainly enjoy nuptial bliss and feel positive about your married life. There might be some rough patches at times, but with good bonding and unshakable faith in each other, things will get better soon.#Marriage in your life, according to Vedic Astrology, is going to be good. Ups and downs are part and parcel of conjugal life and, therefore, cannot be avoided. All in all, it will be a positive experience for you.
DIRECTION=If we analyze the 7th house in your natal chart, your spouse is going to be good-looking, conscientious, warm, having home in @firstdirection or @seconddirection direction from your place, and genuine.#The 7th house shows that your spouse will be scrupulous, loving, friendly, graceful, living toward @firstdirection or @seconddirection direction, and fond of arts and music.#As per the 7th house in your birth-chart, your spouse will be of average-built, down-to-earth, caring, elegant, from @firstdirection or @seconddirection direction from your place, and would cherish your presence in life.
SURVIVALHESHE=Long term togetherness is something everyone wants, but eludes many in modern times. Astrologically speaking, there is Yoga for survival of your relationship and, even after some minor issues, things are going to be smooth. Some efforts for understanding each other have to be there.#Relationships are tender and need to be nurtured. The lord of 7th house shows that there are some possibilities of clashes and these sort of things can be avoided if maturity in behavior is cultivated. If handled wisely, relationship can be prolonged even after such problems.#In astrology, 7th house and its lord signify longevity of a relationship. In your case, things look good, but some troubles can also be seen. Therefore, you must respect and try to understand different perspectives of each other.
TRUSTHESHE=Other than this, placement of @planet in your birth chart shows that you might have faced some health issues during @noofyears years ago from present year.#@planet in your chart indicates that you would have faced some wealth related problems around @noofyears years ago from present year.#Position of @planet in your natal chart might have given you trouble in your love life around @noofyears years ago from present year.
