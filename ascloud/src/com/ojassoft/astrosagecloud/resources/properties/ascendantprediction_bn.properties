

	 WHAT_IS_ASCENDANT				= লগ্ন কি?
	 ASCENDANT_PREDICTION			= বৈদিক মতে লগ্নস্থ ঘর গুরুত্বপূর্ণ ভুমিকা পালন করে। ব্যাক্তির জন্মের সময় আকাশে যে রাশি উদিত থাকে তাকে ব্যাক্তিটির লগ্ন বলে এবং এই ঘরে যে রাশি দেখা যায় তাকে লগ্নস্থ রাশি বলা হয়ে থাকে। জ্যোতিষ অনুযায়ী লগ্ন যেকোনো ব্যাক্তির ক্ষুদ্র ক্ষুদ্র বিষয়ে সাহায্য করে। যেখানে দৈনিক, সাপ্তাহিক, মাসিক ও বাৎসরিক ভবিষ্যৎবাণী চন্দ্ররাশি এবং সূর্যরাশির ভিত্তিতে তৈরি করা হয়।
