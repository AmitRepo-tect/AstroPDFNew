	 SHESHNAG_KALSARPA_YOGA_REMEDY =	<li> એક શુભ મુરતમાં મુખ્ય દરવાજા પર એક સાથિયો મુકો અને લોખંડમાં કોતરેલું તમારું નામ દરવાજાની બંને બાજુએ લગાવો. </li><li> પાંચ મંગળવાર સુધી ઉપવાસ રાખી 108 હનુમાન ચાલીસાનો પાઠ કરો, હનુમાનજીને ચમેલીના તેલમાં ભેળવેલું હિંગોળ અને બુંદીના લાડુ ચડાવો.</li><li> કોઈ પણ નવું કામ શરૂ કરતા પહેલા પક્ષીઓને મહિનાના ચોથા ભાગ જેટલા સમય માટે જવનો ચારો નાંખો</li><li>એક શુભ પ્રસંગે ઓમ નમઃ શિવાય મંત્રની 11 માળાનો જાપ કરવાનું શરૂ કરો, ત્યાર બાદ ગાયના દૂધ અને બીલીપત્રથી શિવલિંગ પર અભિષેક કરો. વિધિ પૂર્ણ થયા બાદ શિવલીંગને તાંબાના નાગથી અલંકૃત કરો.</li><li>યોગ્ય પ્રસંગે ભિખારીઓને મસૂરની દાળનું દાન કરો અને તમે પોતે સંયમિત ભોજન લો.</li><li>શુભ પ્રસંગે પૂજા કર્યા બાદ, નાગ પાશ યંત્ર પહેરો. તમારા શયનખંડમાં લાલ પડદા અને લાલ ઓછાળનો ઉપયોગ કરો. </li>
