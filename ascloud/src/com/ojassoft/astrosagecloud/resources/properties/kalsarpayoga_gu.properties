     INTRODUCTION_KALSARP_YOG = પ્રચલિત વ્યાખ્યા પ્રમાણે, જ્યારે જન્મ-કુંડળી કે જન્માક્ષરમાં બધા જ ગ્રહો રાહુ અને કેતુની વચ્ચે આવેલા હોય ત્યારે તેને કાલસર્પ દોષ કહે છે. હાલમાં, ભારતીય જ્યોતિષીઓ વચ્ચે આ દોષ અંગેની ચર્ચા પ્રચલિત બની છે. વ્યક્તિના જીવનની ઘણી મુશ્કેલીઓ કાલસર્પ દોષને પરિણામે હોય છે. જ્યોતિષના અન્ય પાસાંનું વિશ્લેષણ કર્યા વિના જ મોટા ભાગના જ્યોતિષીઓ કાલસર્પ દોષને સમસ્યાના મૂળ તરીકે સ્વીકારી લે છે. જોકે હકીકતે, જન્માક્ષરમાં બધા જ ગ્રહ યોગ્ય રીતે ગોઠવાયેલા હોય તો કાલસર્પ દોષ હાનીકારક બનતો નથી, અને ગ્રહોની સારી સ્થિતિને કારણે મળતા લાભમાં મદદરૂપ થાય છે. જન્માક્ષરમાં અન્ય ગ્રહોની સ્થતિ પ્રતિકૂળ હોય ત્યારે જ કાલસર્પ દોષ અશુભ બને છે.<br/> <br/>આમ, ફક્ત કાલસર્પ દોષ વિષે સાંભળીને જ ડરી જવાનું યોગ્ય નથી. કાલસર્પ દોષની નકારાત્મક અસરોના ઊંડા અભ્યાસ માટે કોઈ જ્યોતિષીનો સંપર્ક સાધ્યા બાદ જ તેના ઉપાયો કરવા યોગ્ય રહેશે. અહીં રસપ્રદ બાબત એ છે કે, દરેક વ્યક્તિને કાલસર્પ દોષની જુદી-જુદી અસર થાય છે. કારણ કે કાલસર્પ દોષની અસર અનેક મુદ્દાઓ પર આધારિત છે, જેમકે - કઈ રાશિ કયા ભાવમાં છે, તે ભાવમાં બીજા કયા ગ્રહો છે, તેમની શી અસરો છે, વગેરે.
	 ANNANT_KALSARPA_YOGA_INTRO_TEXT    = જ્યારે રાહુ લગ્નમાં, કેતુ સાતમાં ભાવમાં અને અન્ય બીજા ગ્રહો રાહુ અને કેતુની વચ્ચે આવેલા હોય ત્યારે આ કાલસર્પ યોગ કે દોષ બને છે. લગ્ન કુંડળી પર આ દોષની અસર હોવાને કારણે જાતકે પ્રભાવશાળી વ્યક્તિ બનવા માટે સખત મહેનત કરવી પડે છે. ધંધા અને સાહિત્યમાં સફળતા મેળવવા માટે આ કાલસર્પ દોષ ધરાવતી વ્યક્તિએ વધુ મહેનત અને કઠીન માર્ગ અપનાવવા પડશે. આ દોષને કારણે પડેલી માનસિક તકલીફો બાદ ભૌતિક સુખ બાબતે વ્યક્તિ ધીરે-ધીરે નીરસ કે કટાક્ષયુક્ત બની જાય છે. અનંત કાલસર્પદોષ ધરાવતી વ્યક્તિને હાનિની શક્યતાવાળા જોખમી અને સાહસિક ધંધા-વેપાર કરવા પસંદ પડે છે. આ દોષવાળા જાતકોની શારીરિક અને નાણાકીય સ્થિતિ સારી નથી હોતી. પોતાના પિતા અને પૂર્વજોની સંપત્તિ મેળવવામાં તેમને નડતર આવશે. કાનૂની મુકદમા અને કપટનો તેમણે સામનો કરવો પડશે. તેમની સામાજિક છબી નબળી પડી શકે છે. જોકે પ્રતિકૂળ ઘટનાઓ છતાં, બધી જ સમસ્યાઓ સમાપ્ત થઈ ગયા બાદ અનંત કાલસર્પ દોષ ધરાવતી વ્યક્તિના જીવનમાં પણ ચમત્કારિક સમય આવે છે. આવા ચમત્કાર પ્રયત્ન થકી નહિ અચાનક જ બનતા હોય છે. અનેક સમસ્યાઓ છતાં આ દોષ ધરાવતી વ્યક્તિઓને જીવનમાં કોઈ બાબતની કમી અનુભવાશે નહિ. અનંત કાલસર્પ દોષને કારણે જીવનમાં સમસ્યાઓ આવતી હોય તેવી વ્યક્તિએ નીચેના ઉપાય કરવા જોઈએ: 
	 KULIK_KALSARPA_YOGA_INTRO_TEXT     = જ્યારે રાહુ બીજા ભાવમાં, કેતુ આઠમા ભાવમાં અને અન્ય ગ્રહો રાહુ અને કેતુની વચ્ચે આવેલા હોય ત્યારે કુલિક કાલસર્પ યોગ બને છે. એવું માનવામાં આવે છે કે આ યોગ બદનામી અને કલંક સર્જે છે. વ્યક્તિના અભ્યાસ પર પણ તેની અવળી અસર થાય છે. આ દોષને કારણે વ્યક્તિની નાણાકીય પરિસ્થિતિ નબળી કે અસ્થાયી રહે છે, જે વૈવાહિક જીવનમાં વિસંવાદ કે વિચ્છેદમાં પરિણમે છે. તેના મિત્રો તેને છેતરી શકે છે. આ દોષને કારણે થતા માનસિક અને શારીરિક અસંતુલનને કારણે વ્યક્તિ ઉંમર કરતા વહેલો વૃદ્ધ બની જાય છે. આ કાલસર્પ યોગને કારણે વ્યક્તિ નિરુત્સાહી અને નાહિંમત રહે છે. સખત મહેનત અને નિષ્ઠા થકી આ વ્યક્તિ સફળતા તો મેળવી શકે છે, પરંતુ તે પણ થોડા સમય માટે જ ટકે છે. આ પરિસ્થિતિમાં વ્યક્તિએ નીચે મુજબના ઉપાય કરવા જોઈએ:
