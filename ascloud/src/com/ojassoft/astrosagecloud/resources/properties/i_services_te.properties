

SERVICE_NAME_1  = ఒక ప్రశ్నా నివేదికను అడగండి 
SERVICE_DESC_1 = మానవ మనుగడకు ప్రశ్నలు ఆవశ్యకరం"", అని చెప్పారు అరిస్టాటిల్ గారు. ప్రశ్నలు మానవ మనుగడకు మాత్రం ముఖ్యమే గాక, అవి మానవ అభివృద్ధికి కూడా ముఖ్యమే. ఒకరి మనసులో ఒక సమస్య లేదా తికమక తిరుగుతున్నపుడు, అది అతని/ఆమె అభివృద్ధిని అడ్డుకుంటుంది. మీరు దేనిగురించైనా ప్రత్యేకంగా బాధపడుతున్నారా? ఒక ప్రత్యేకవిషయంలో కొన్ని విషయాలు జరుగుతాయని భయపడుతున్నారా? <br /><br />జ్యోతిషం అనేది దైవ శాస్త్రము, దీనివలన మీ విధి ఏంచెబుతుందో తెలుసుకోగలరు. అది మీ అనుమానాలు మరియు భయాలను తొలగించగలదు, మరియు మీ కెరీర్, వివాహం, ధనం, మరియు సంపూర్ణ జీవితం, మొ.గు వాటి గురించిన ప్రశ్నలకు సమాధానాన్ని ఇస్తుంది. మీకు బాధకలిగించే ప్రశ్నలను అధిగమించడానికి ఇది ఒక పరిష్కారం.

SERVICE_NAME_7  = ఆరోగ్య & అమరిక నివేదిక 
SERVICE_DESC_7  = ఆరోగ్యమే మహాభాగ్యం అని చెప్పబడింది. మీరు దృఢంగా మరియు ఆరోగ్యంగా లేకపోతే, విలాసాలు మరియు ఇతర ప్రాపంచిక ఆస్తులన్నీ నిరర్థకములే. పాతకాలంలో, జ్యోతిష శాస్త్రం మరియు వైద్య శాస్త్రం అనగా ఆయుర్వేదం ఒకదానితో ఒకటి మమేకం అయి ఉండేవి. ఒక వ్యక్తి యొక్క సంపూర్ణ బాగోగులకు నక్షత్రాల పాత్ర గురించి మునులకు తెలుసు. దైవిక శక్తుల ద్వారా కలుగు అస్వస్థత స్వభావ అడ్డంకులకు మందులు మరియు చికిత్సలు చాలా సార్లు పనిచేయవు. అపుడు, మీ ఉపశాంతి కొరకు జ్యోతిష్య శాస్త్రం పనిచేయుట ముఖ్యమవుతుంది. <br /><br />మీ ఆరోగ్యం మరియు అమరికకు సంబంధించిన సమస్యలను మీరు ఎదుర్కొంటే, వీలయినంత తొందరగా ముందస్తు జాగ్రత్తలు తీసుకోవడం ఎల్లవేళలా మంచిది. మా సమగ్ర ఆరోగ్య నివేదిక, మీ సమస్యను ఏది కలిగిస్తోందో మరియు ఆ అనారోగ్య నష్టకారిని తప్పించుకొనుటకు జ్యోతిష్యం ప్రకారం గల పరిష్కారలేవో తెలుపుతుంది.

SERVICE_NAME_14 = ఫోన్ సంప్రదింపు. 
SERVICE_DESC_14 = మా అనుభవజ్ఞులైన జ్యోతిష్యులను ఫోన్ ద్వారా కూడా సంప్రదించవచ్చు. ""మంచి చర్చ కలిగి ఉండడం అంటే మంచి భాగ్యాన్ని కలిగి ఉండడం"", అనేది ఒక పాత కెన్యా సామెత. ఒక వ్యక్తి మాట్లాడునపుడు, అతను/ఆమె పదాల ద్వారా సంభాషించడమేకాకుండా, స్వర స్థాయి మరియు దాని తరంగాలు కూడా ఒక విలువైన పాత్రను పోషిస్తాయి. అంతేకాకుండా, జ్యోతిష శాస్త్ర ప్రకారం, ఇద్దరు మాట్లాడుకోవడం అనేది అతని సమస్యను తెలుసుకోవడానికి ముఖ్యమైనదిగా ఉంటుంది.<br /><br />జీవితానికి సంబంధించిన ఏ కోణమైనా, అంటే కెరీర్, ఆరోగ్యం, వ్యాపారం, ప్రేమ మరియు వివాహం మొ.వాటిని చర్చించవచ్చు మరియు అలాంతి సంభ్యావ్యతల వెనుక గల జ్యోతిష శాస్త్ర కారణాలను తెలుసుకోవచ్చు. విజయాన్ని, సంపదను మరియు ఆనందాన్ని ఆటంకపరచే ఏ సమస్యనైనా అధిగమించుటకు అవసరమైన వాస్తవ ఉపశమన పరిష్కారాలను కూడా సూచించవచ్చు. మా జ్యోతిష్యులు మీకు సహాయపడడానికి కేవలం ఒక ఫోన్ కాల్ దూరంలో ఉన్నారు.

SERVICE_NAME_4  = కెరీర్ నివేదిక పొందండి 
SERVICE_DESC_4  = జీవితంలో సంపూర్ణ విజయానికి సఫలీకృత మరియు మంచి కెరీర్ ఆవశ్యకం. మా నైపుణ్య జ్యోతిష్యులు, ఈ సమగ్ర నివేదికలో, మీకు ఏ కెరీర్ మంచిదో, విభిన్న క్షేత్రాలలో మీ ఉన్నతులు ఏవో, మరియు మీరు ఇదివరకే ఉద్యోగం చేస్తున్నట్లయితే, మీ కెరీర్ లో ఉన్నత స్థితికి మీరు ఏమి చేయాలి మరియు మీకు ఎలాంటి లక్ష్యాలుండాలి మొ.గునవి ప్రణాళిక చేసుకోవడానికి, చెబుతారు. ఈ విషయాలతో పాటుగా, భవిష్యత్తులో మీ కెరీర్ గురించి కూడా మేము విశ్లేషిస్తాము మరియు మీ ఉద్యోగం లేదా వ్యాపారంలో మీ పురోగతిలో గల ఏవైనా సంభావ్య అడ్డంకుల గురించి తెలుపుతాము మరియు ఈ సమస్యలను అధిగమించడానికి ప్రభావవంతమైన జ్యోతిష్యశాస్త్ర పరిష్కారాలను చెబుతాము.<br /><br />ఈ వివరమైన నివేదికలో తదుపరి పన్నెండు నెలలలో మీ వ్యాపారం లేదా ఉద్యోగంలో ప్రతి విషయంలోనూ, జ్యోతిష్యశాస్త్రం యొక్క లోతైన విశ్లేషణ మరియు పరిష్కార సలహాలు, ఈ నివేదికలో పొందుపరచబడి ఉంటాయి. ఈ నివేదిక రాబోవు సంవత్సరంలో మీ కెరీర్ కు మార్గదర్శకంగా ఉంటుంది. మీ కెరీర్ ఫలించుటలో పురాతన జ్యోతిష్యశాస్త్ర విజ్ఞానం తోడ్పడుతుంది మరియు మా నైపుణ్య జ్యోతిష్యుల ద్వారా సమగ్ర కెరీర్ నివేదిక పొందండి.

SERVICE_NAME_12 = ఆర్థిక నివేదికను పొందండి 
SERVICE_DESC_12 = నేటి పోటీ ప్రపంచంలో, ఒక శక్తివంతమైన ఆర్థిక స్థితి అనేది కేవలం విలాసం కాదు, కానీ జీవించడానికి మరియు అభివృద్ధిచెందడానికి ఒక అవసరం. ఆర్థిక భద్రత అనేది వ్యక్తి బాగోగులకొరకు మాత్రమే కాకుండా వారికి సంబంధించిన వారు అంటే అతని/ఆమె జీవిత భాగస్వామి, పిల్లలు మరియు సంపూర్ణ కుటుంబానికి భద్రతను ఇస్తుంది. ఆర్థిక ఇబ్బందులు అభివృద్ధిని కుంటుపరచడమే కాకుండా, మనశ్శాంతిని, ఆనందాన్ని మరియు స్థిరత్వాన్ని కూడా అడ్డుకుంటాయి. జాన్ ఎఫ్ కెన్నెడీ ఒక సారి ఇలా చెప్పారు, ""చైనీయులు ’క్రైసిస్’ అనే పదాన్ని రెండు బ్రష్ స్ట్రోక్స్ తో వ్రాస్తారు. ఒక బ్రష్ స్ట్రోక్, ప్రమాదానికి; మరొకటి అవకాశానికి సంకేతం. సంక్లిష్ట పరిస్థితిలో ప్రమాదం గురించి తెసుకొండి – కానీ అవకాశాన్ని కూడా గుర్తించండి."" ఇది సత్యము కూడా.<br /><br />దైవిక జ్యోతిషశాస్త్ర విజ్ఞానం, మీ ఆర్థిక సమస్యలకు కారణాలను తెలిపి, విశ్లేషించు అవకాశాన్ని అందిస్తుంది మరియు ఆ ఇబ్బందులనుండి బయటకు వచ్చు ఉపశాంతి పరిష్కారాలను కూడా సూచిస్తుంది. జ్యోతిష్యశాస్తమనేది, ఆర్థిక ఇబ్బందుల ఉపశాంతి కొరకు సలహాలను ఇవ్వడమే కాకుండా, మీకిదివరకే ఉన్న ఉన్నత ఆర్థిక స్థితినుండి మీరు ప్రయోజనం పొందుటకు కూడా సహాయపడుతుంది. మీకేదైనా ఆర్థిక సమస్య ఉన్నపుడు, దానికి ప్రాచీన జ్యోతిష్యశాస్త్ర విజ్ఞానం తోడ్పడుతుంది మరియు మా నైపుణ్య జ్యోతిష్యుల ద్వారా సమగ్ర ఆర్థిక నివేదిక పొందండి.

SERVICE_NAME_13 = రత్నాలు & పరిష్కారాలు 
SERVICE_DESC_13 = జ్యోతిష్యం చాలా ప్రభావవంతమైనదిగా పరిగణిస్తారు ఎందుకంటే అది సమస్యను సరిగ్గా చూపడమే కాకుండా, ఆ సమస్యలను ఉపశమింపజేయుటకు వాస్తవ పరిష్కారాలను కూడా సూచిస్తూ వాటిని అణచివేస్తుంది. ఈ ఉపశమన పరిష్కారాలను జ్యోతిష్యం ప్రకారం తీవ్రంగా అనుసరిస్తే,  అతడు/ఆమె దైవిక శక్తులచే కల్పింపబడిన ప్రతికూల పరిణామాలను తుడిచివేయవచ్చు మరియు కష్టసమయాల నుండి త్వరగా సులభంగా బయటపడవచ్చు.<br /><br />రత్నాలు జ్యోతిష్య పరంగా చాలా ప్రాముఖ్యతను కలిగి ఉన్నాయి, ఎందుకంటే విశ్వ శక్తి యొక్క తీవ్ర శక్తిని సమీకరించే సామర్థ్యం ఉండడం వలన, వాటిని సరియైన దిశలో పంపినట్లయితే, మీ అన్ని సమస్యలకు ఉపశాంతిని కలుగజేస్తాయి మరియు జీవితం యొక్క ప్రతి అంశంలో మీకు శక్తివంతమైన స్పూర్తినిస్తాయి. కానీ దానిని సరిగా నిర్వహించకపోతే, ఈ విశ్వ శక్తి మీకు ప్రతికూలతను చేకూరుస్తుంది. అందుచేత, ఆథిక, ప్రేమ, వివాహ, కెరీర్, విద్య మొ.గు విషయాలలో, మీకు జ్యోతిష్య పరిష్కారాలు కావాలనుకుంటే మరియు రత్నాలు మీకు లాభాన్ని కలిగించాలనుకుంటే మా జ్యోతిష్య నిపుణులు మీరు పాటించవలసిన ఉపశమన పరిష్కారాలను, వాటిని సరిగా ఎలా పాటించాలో, ఏ రత్నాలను ధరించాలో మరియు దానినుండి అధికంగా లాభాన్ని ఎలా పొందాలో మొ.వాటిని సూచిస్తారు.

SERVICE_NAME_6  = వివాహము/ప్రేమ విశ్లేషణ
SERVICE_DESC_6  = వివాహాలు స్వర్గంలో జరుగుతాయని చెబుతరు. కానీ మీరు మీ జీవితాన్ని పంచుకోవాలనుకుంటున్నవారు మరియు మీ జీవితాన్ని ఇదివరకే పంచుకున్న వారు మీకు సరియైన వారేనని అనుకుంటున్నారా? అతను లేదా ఆమె మీకొరకే పుట్టారని చూసుకోవడం మీ చేతిలోనే ఉంది అనగా, మీరు మిస్టర్. రైట్ లేదా మిస్. రైట్ ను ఎంచుకుంటున్నారా లేదా అని. మీరు సరియైన భాగస్వామిని ఎంచుకుంటే, మీ జీవితం నల్లేరుమీద బండి నడకలాగా ఉంతుంది. కానీ మీరు ఎంపిక తప్పయితే, అది మీ జీవిత అందాన్ని మరియు జీవాన్నే హరిస్తుంది.<br /><br />జ్యోతిష్యం మీరు సరియైన నిర్ణయం తీసుకోవడానికి సహాయ పడుతుంది. మీరు ఒకవ్యక్తితో సానుకూలతను కలిగిఉన్నారా, ఆ వ్యక్తితో జీవన ప్రయాణం చేయగలరా లేదా మరియు మీ ఇద్దరూ జంటగా మీ భవిష్యతు ఎలా ఉంటుందో, అది చెప్పగలదు. మీకు ఇదివరకే వివాహం జరిగి ఉంటే మరియు మీ వైవాహిక జీవితంలో సమస్యలను ఎదుర్కొంటూ ఉంటే, మీరు ఆ సమస్యలనుండి బయటపడడానికి ఏమిచేయాలో అది తెలుపుతుంది.

SERVICE_NAME_5  = లాల్ కితాబ్ పరిహారాలు 
SERVICE_DESC_5  = లాల్ కితాబ్ అనేది మర్మమైన జ్యోతిష శాస్త్ర సంపూర్ణ ఒడంబడిక. అది జ్యోతిష శాస్త్రం, హస్తసాముద్రికం మరియు వాస్తు శాస్త్రాలలో లోతైన ప్రభావాన్ని కలిగి ఉంటుంది. లాల్ కితాబ్ అనేది పండిట్ రూప్ చంద్ జోషి ద్వారా ఉర్దూ భాష యొక్క పురాతన లిపిలో వ్రాయబడి ఉందని చెప్పబడింది, మరియు అది కవితారూపంలో వివిధ పాదములు కలిగి ఉంది. లాల్ కితాబ్ లో సందిగ్ధ ముసుగుల వెనుక లోతైన జ్యోతిష్యం యొక్క పరిపూర్ణ పరిమాణం ఉంది. దానిని డీకోడ్ చేయడానికి జ్యోతిష్యశాస్త్రంలో సూక్ష్మబుద్ధి, చొచ్చుకుపోవు అవగాహన అవసరం.<br /><br />లాల్ కితాబ్ ను అర్థం చేసుకును వారు, అది ప్రాపంచిక సమస్యలు మరియు బాధలన్నింటికీ కీలకమైనదని నొక్కివక్కాణిస్తారు. లాల్ కితాబ్ పరిహారాలన్నీ చాలా శక్తివంతమైనవి మరియు చురుకైనవి, ఆధునిక కాలంలో ప్రజలు వివిధరకాల సమస్యలతో ఉన్నపుడు మరియు వారికి సమయం లేనపుడు ఇవి బాగా ఉపయోగపడతాయి. ఈ పరిహారాలన్నీ అచిల్లీస్ హీల్ ను సూచిస్తాయి మరియు అవి మీ శారీరక, మానసిక మరియు ఆర్థిక సమస్యలను త్వరగా ఉపశమింపజేస్తాయి. మీరు మీ సమస్యను లాల్ కితాబ్ పరిహారాల ద్వారా త్వరగా పరిష్కరించుకోవాలనుకుంటే, మా సూక్ష్మదృష్టిగల జ్యోతిష్యులను అడగండి.

SERVICE_NAME_2  = పుట్టుక సమయం సవరణ 
SERVICE_DESC_2  = మీ జాతకం తయారుచేయడానికి పుట్టుక సమయం చాలా ముఖ్యం. ఖచ్చితమైన పుట్టుక సమయం లేకుండా, ఒక తెలివైన జ్యోతిష్యుడు కూడా మీ భవిష్యత్తును అంచనా వేయలేడు. అయినా, ఖచ్చితమైన మీ పుట్టుక సమయం మీకు తెలియకపోతే లేదా దానిగురించి తికమక పడితే, ఆందోళన చెందాల్సిన అవసరం లేదు. ఎందుకంటే ఖచ్చితమైన పుట్టుక సమయాన్ని తెలుసుకోవడానికి తగిన పద్ధతులను వేదిక్ జ్యోతిష్యం అందిస్తుంది.<br /><br />భారతీయ విజ్ఞానులయిన కాళిదాసు మరియు వరాహమిహిరుడు వంటి వారు సూచించిన ఎన్నో పద్ధతులున్నాయి. KP పద్ధతి కూడా ఖచ్చితమైన మీ పుట్టుక సమయాన్ని కనుగొనడానికి ఒక ప్రత్యేకమైన పద్ధతిని కలిగి ఉంది. ఒక తెలివైన జ్యోతిష్యుడు మీ జీవితంలోని అతిపెద్ద సంఘటనలను తెలుసుకుంటే, అతను/ఆమె మీ జీవితంలోని ఘటనల ఆధారంగా మీ పుట్టుక ఖచ్చితమైన సమయాన్ని తెలుసుకోగలడు.<br /><br />కాబట్టి, మీ పుట్టుక సమయాన్ని సరిగ్గా లెక్కించడానికి, మీరు మీ జీవితం యొక్క కొన్ని అతిపెద్ద సంఘటనలను మరియు ఆ సంఘటనలు జరిగిన కాలాన్ని మాకు తెలపాల్సి ఉంటుంది ఉదా. మీ పెళ్ళి తేది, మీ పిల్లల పుట్టుక తేదీలు, అతిపెద్ద జబ్బు మరియు మొదటి ఉద్యోగం మొ.నవి.<br /><br />మీ పుట్టుక సమయం సుమారుగా లేదా మీ పుట్టుక సమయం ఎప్పుడు ఉండవచ్చు అంటే – మధ్యాహ్నం 2 నుండి 4 గంటల మధ్య మొ.నవి మాకు కావాలి. మేము సూక్ష్మంగా మీ పుట్టుక సమయాన్ని కనుగొంటాము.

SERVICE_NAME_20 = @@currentyear$ లో ప్రొఫెషనల్ జీవితం
SERVICE_DESC_20 = మీ ముందున్న ప్రొఫెషనల్ జీవితం – కెరీర్ నుంది ఉద్యోగాల వరకు, వ్యాపారం మరియు ఆర్థికలాభాలు మరియు ఇతర క్షేత్రాలలో సూక్ష్మ దృష్టితో మీ ప్రొఫెషనల్ జీవితంపై ప్రభావం చూపు @@currentyear1$ సంవత్సరానికి వెళ్లడానికి సిద్ధంకండి.  'పింక్ స్లిప్స్' అనేవి ఇంకా @@currentyear2$ సంవత్సరంలో రాజ్యమేలుతాయా లేదా మీ జీతాలు పెరుగుతాయా? ఇలాంటి ప్రశ్నలు మీ మనసులో ఉంటే, మీరు వాటిని మీ సమగ్ర నివేదికలో పొందుతారు. అది మీ ఉద్యోగం గురించి మాత్రమే కాదు, అది మీ వ్యాపారం మరియు వాణిజ్యానికి కూడా సంబంధించినది కూడా.  కొత్త సంవత్సరంలో మార్కెట్ ఎలా ఉండబోతోంది మరియు దానికి మీరు ఎలా ప్రణాళిక చేసుకోవాలి, మీరు ముందుగానే తెలుసుకోవచ్చు. మీరు కేవలం మాతో టచ్ లో ఉంటే చాలు, మరియు ’రేపు’ అనే రహస్యం మీకు కేవలం ఒక గళ్లనుడికట్టుగా ఉంటుంది.

SERVICE_NAME_3  = ఆస్ట్రోసేజ్ బృహత్ కుండలి
SERVICE_DESC_3  = 250+ రంగుల పేజీలుగల బృహత్ జాతకములో మీరు ఏమి పొందుతారు : సమగ్ర వివాహ ఫలితాలు, కెరీర్, ఆర్ధికము, ఆరోగ్యము, సంతానము, స్థిరాస్థులు, కుటుంబము మొదలగునవి.అనుకూల సమయములతో తెలుసుకొనవచును. జీవితములో దశల ఫలితాలు.5 సంవత్సరాల వరకు వార్షిక ఫలాలు.రాజయోగ విషయములు, సంఖ్యాశాస్త్ర నివేదికలు పొందవచ్చును.జాతిరత్నల సలహాలు, కాలసర్పదోష నివేదిక, ఈలినాటిశని నివేదిక, పరిహారములు పొందవచ్చును.భవ ఫలాలు మరియు గ్రహ ఫలాలు మరియు కేపి, కేసిఐయల్, క్యూస్పల్ ఇంటెర్లింక్స్, 4- స్టెప్, నక్షత్రనాడి, జైమిని, లాల్ కితాబ్,తేవా మరియు అప్పులు మొదలగునవి తెలుసుకొనవచ్చును. 

SERVICE_NAME_8  = రాజయోగ నివేదిక
SERVICE_DESC_8  = మాయొక్క సహకారముతో, మీరు రాజయోగములో జన్మించారో లేదో తెలుసుకోండి.ఏ గ్రహములు మీయొక్క జాతకములో వివిధ స్థానములలో రాజయోగమునకు కారణమవుతున్నాయో తెలుసుకోండి.ఈ రాజయోగములు మీకు ఉద్యోగ, ప్రేమ, వివాహ మరియు వ్యాపార విజయాలలో ఉపయోగ పడతాయా? రాజయోగము యొక్క ప్రాముఖ్యతను తెలుసుకోండి.ఒక జాతకములో రాజాయోగము ఎలా ఏర్పడుతుంది మరియు దాని ప్రభావముమనిషిపై ఎలా ఉంటుందో తెలుసుకోండి.మీ జాతకములో అనేక రాజాయోగములు అనగా,రజ్జు, మూసల్, నల్, వాపి, గద, శకట రాజయోగములు లోనగుతున్నాయా? రాజయోగ రహస్యములు మరియు దాని ప్రభావములు తెలుసుకోండి. వాపి రాజయోగములో పుట్టినవారు ఎలాధనవంతులు అవుతారో తెలుసుకోండి.మూసల్ రాజయాగమువలన వ్యక్తి ఎలా అధికముగా డబ్బు సంపాదిస్తారో తెలుసుకోండి. నల రాజయోగములో జన్మించినవారు ఎలాతెలివిగలవారీగా ఉంటారు?వాటియొక్క రహస్యములు మరియు ప్రాముఖ్యత తెలుసుకోండి.

SERVICE_NAME_9  = సంవత్సర జాతకము 2020
SERVICE_DESC_9  = వేద జ్యోతిష్యశాస్త్ర పురాతన పద్ధతలు అనుసరించి, “వ్యక్తిగతీకరించబడిన జాతకము 2020” మీకు ఒక వ్యక్తిగత మార్గదర్శిగా, మీయొక్క విజయాల్లో మీకుసహకరిస్తుంది.ఇది 2020లో మీయొక్క కలలను సాకారం చేసుకునేందుకు మరియు విజయము, సంతృప్తి మరియు ఆనందము అందుకునేందుకు మీకు సహకరిస్తుంది.ఇది మీ జీవితములోని అన్ని దశలను అనగా ప్రేమ, వివాహము, కెరీర్, కుటుంబము, ఆరోగ్యము మరియు ఇంకెన్నో దశల గురించి తెలుపుతుంది.ఇదిమీకు సమగ్ర సమాచారమును అందిస్తుంది.కచ్చితమైన ఫలితాలను అందిస్తుంది తద్వారా మీకు సలహాలు మరియు పరిష్కార మార్గాలను పొందవచ్చును.ఇప్పుడే ఆనందకర, సమస్యలులేని 2020ని ఎంచుకోండి. “వ్యక్తిగతీకరించబడిన జాతకము 2020”ని ఎంచుకోండి.

BRIHAT_HORO_DESC_1 = అత్యంత ఖచితమైన, రంగుల సమగ్రమైన నివేదిక
BRIHAT_HORO_DESC_2 = రాజయోగము, పరిహారములు మరియుసలహాలు
BRIHAT_HORO_DESC_3 = 5సం వరకు సమగ్ర సంవత్సర ఫలాలు
BRIHAT_HORO_DESC_4 = 24గంటల లోపు డెలివరీ!
BRIHAT_HORO_DESC_5 = ఆస్ట్రోసేజ్ యొక్క ఖచ్చితమైన మరియు నమ్మకమైన నివేదిక 
