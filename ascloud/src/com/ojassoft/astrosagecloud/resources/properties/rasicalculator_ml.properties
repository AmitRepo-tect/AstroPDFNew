
	RASI_ACCORDING_TO_VEDIC_ASTROLOGY_HINDI	= 
	RASI_ACCORDING_TO_VEDIC_ASTROLOGY			= വേദിക്ക് ആസ്ടോളജി അനുസരിച്ചുള്ള രാശി
	RASI_PREDICTION_1							= <p>ചുവപ്പും മഞ്ഞയുമായ ഉല്പന്നങ്ങളുമായി ബന്ധപ്പെട്ട വ്യാപാരത്തിൽ നിങ്ങൾക്ക് ലാഭം ഉണ്ടാകും. പ്രകൃതത്താൽ നിങ്ങൾ ഫലിതരും കൂടാതെ ചുവപ്പ് വർണ്ണത്തോടെയുള്ള തെളിഞ്ഞ മുഖവും ഉള്ളവരായിരിക്കും. ഒരു വാരത്തിലെ നിങ്ങളുടെ ഭാഗ്യ ദിവസങ്ങൾ ബുധൻ, തിങ്കൾ, ചൊവ്വ എന്നിവയാണ്. നിങ്ങൾക്ക് പശുക്കളെയും, പോത്തുകളെയും കൂടാതെ മറ്റ് മൃഗങ്ങളെയും പരിചരിക്കുവാനുള്ള പ്രവണതയുണ്ട്. പ്രകൃതത്താൽ നിങ്ങൾ വളരെ മടിയുള്ളവരാണ് എന്നിരുന്നാലും മറ്റുള്ളവരുടെ ജോലി ചെയ്തുതീർക്കുവാൻ നിങ്ങൾ എപ്പോഴും സന്നദ്ധരാണ്. നിങ്ങൾക്ക് കന്നി,കുംഭം, മിഥുനം എന്നീ ചിഹ്നങ്ങളിലുള്ള സുഹൃത്തുക്കൾ വളരെ അധികം ഉണ്ടാകും. നിങ്ങൾ ഉത്കർഷേച്ഛയും പുരോഗമന ചിന്താഗതിയും ഉള്ളവരാണ്. 20, 26, 33 എന്നീ വയസുകളിൽ പനിയോടും ആയുധത്തോടും ഉള്ള ഭയം നിങ്ങളിൽ ഉളവാകും. 45, 50, 55 എന്നീ വയസുകളിൽ ജീവിത ദൈർഘ്യം കുറയുമോ, പെട്ടെന്നു മരണം സംഭവിക്കുമോ എന്നീ ഭയങ്ങൾ നിങ്ങളിൽ പ്രബലമാകും.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>13, 1, 7 എന്നീ വയസുകളിൽ നിങ്ങൾ പനിയാൽ ബുദ്ധിമുട്ടും. എന്നാൽ 3, 12, 5, 16 എന്നീ വയസുകളിൽ സർക്കാരിൽ നിന്നുമുള്ള ഭയം നേരിടും. 32 ഉം 8 ഉം വയസുകളിൽ പെട്ടെന്നു മരണം സംഭവിക്കുമോ എന്ന ഭയം നിങ്ങളിൽ പ്രബലമാകും. നിങ്ങളുടെ 25 ആമത്തെ വയസ്സിൽ കുട്ടിയെ നഷ്ടപ്പെടുന്നതു മൂലമുള്ള വേദന അനുഭവിക്കുവാനുള്ള സാധ്യതയുണ്ട്. എന്നാൽ 4, 8 വയസുകളിൽ വാഹനത്താലുള്ള ദുരിതങ്ങൾ അനുഭവിച്ചേക്കാം കൂടാതെ 3, 12, 24 എന്നീ വയസുകളിൽ വിഷബാധ, വെള്ളത്തിൽ മുങ്ങിപോകൽ എന്നീ ഭയങ്ങൾ നിങ്ങളിൽ പ്രബലമാകും.</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_2							= <p>വണ്ണമുള്ളതും പ്രഥമമായി സന്ധികളിൽ കുരുക്കളോടു കൂടിയ നീളമുള്ള കൈകളും കൂടാതെ ചുമയുടെ പ്രശ്നവും ഉള്ളവരാണ് നിങ്ങൾ. ഒരു വാരത്തിലെ നിങ്ങളുടെ ഭാഗ്യ ദിവസങ്ങൾ ശനി, ബുധൻ, വെള്ളി എന്നിവയാണ്. ഞായറാഴ്ച നിങ്ങൾക്ക് അശുഭമാണ്. കയ്പ്പും പുളിപ്പും നിങ്ങൾക്ക് അനുയോജ്യമാണ്, ക്ഷീരോൽപന്നങ്ങൾ കഴിക്കുന്നത് നിങ്ങൾ ഇഷ്ടപ്പെടുന്നു. നിങ്ങളുടെ വ്യവഹാര പങ്കാളികൾ മധ്യവർഗ്ഗത്തിൽ നിന്നുള്ളവരായിരിക്കും കൂടാതെ മെലിഞ്ഞ സുഹൃത്തുക്കൾ ക്ലേശത്തിനു കാരണമാകുന്നു. തോട്ടങ്ങളും കൃഷിയുമായി ബന്ധപ്പെട്ട വ്യവസായത്തിൽ നിങ്ങൾ നേട്ടങ്ങൾ കൈവരിക്കും. മുഖ്യമായും നിങ്ങൾ വളരെ ഉയരത്തെ ഭയപ്പെടുകയും കൂടാതെ സ്വാസ്ഥ്യകരമായിരിക്കുകയും, പ്രതിയോഗിയുടെ പോലും കൂട്ടത്തിൽ സന്തോഷവാനായിരിക്കുകയും ചെയ്യും. മധുരമായ കാമിതാവ്, സാമാന്യ ഉയരം കൂടാതെ ചമഞ്ഞ് ഒരുങ്ങുന്നതിലും വസ്ത്രധാരണത്തിലും താത്പര്യമുള്ളവരും ആണ്. നിങ്ങളുടെ ശാരീരിക പ്രശ്നങ്ങൾ പ്രഥമമായി സംബന്ധിക്കുന്നത് നിങ്ങളുടെ ആമാശയത്തിലും കഴുത്തിലുമാണ്.</p> <p>2,4, 5, 7, 18 എന്നീ വയസുകൾ ക്ലേശങ്ങൾ കൊണ്ടുവരും. എന്നാൽ 32, 44, 40 രോഗങ്ങളും നഷ്ടങ്ങളും കൊണ്ടുവരുകയും ചെയ്യും. സ്ത്രീ ആരാധകരായ നിങ്ങൾ ഇളംചൂടുള്ള ഭക്ഷണം കഴിക്കുവാൻ ഇഷ്ടപ്പെടുകയും ജലദോഷത്താലും ചുമയാലും ക്ലേശിക്കുകയും ചെയ്യും. പഴയതും പുരാതനവുമായ സാധനങ്ങൾ ശേഖരിക്കുന്നതിൽ നിങ്ങൾക്ക് പ്രത്യേക താത്പര്യമുണ്ട്.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>സ്തനം, കഴുത്ത്, താടി എന്നിവിടങ്ങളിലെ രോഗങ്ങൾ നിങ്ങളെ ബുദ്ധിമുട്ടിക്കും. മൂന്നാം വർഷം അഗ്നിയോട് ഭയം ഉണ്ടാകും. കാലിനും കൈക്കും പരിക്കുണ്ടാകുവാനും, 19 ഉം 32 ഉം വയസുകളിൽ പെട്ടെന്നുളള മരണത്തിനും സാധ്യതയുണ്ട്. രണ്ടാം വിവാഹത്തിന് വളരെ ശക്തമായ സാധ്യതയും വളരെ കുറച്ചുമാത്രം കൂടപ്പിറപ്പുകളുമായിരിക്കും നിങ്ങൾക്ക് ഉണ്ടാവുക. മാധവ നവമി വെള്ളിയാഴ്ചയോ രോഹിണി നക്ഷത്രത്തിലോ മരണം സംഭവിക്കുവാനുള്ള സാധ്യതയുണ്ട്.</p> -Yuvneshwar <p> 2, 5, 9 വയസുകളിൽ കല്ലുകളെയും സ്ത്രീകളെയും നിങ്ങൾ സൂക്ഷിക്കേണ്ടതാണ്. സ്വകാര്യ സ്ഥലങ്ങളിലുള്ള രോഗത്താൽ നിങ്ങൾ ബുദ്ധിമുട്ടും. മികച്ച അഭിരുചിയും, കാര്യപ്രാപ്തിയും, സഹനശക്തിയും, ദാനശീലനും പണക്കാരനുമായിരിക്കും നിങ്ങൾ. 15 ഉം 16 ഉം വയസുകളിൽ നിങ്ങൾ ജലം, കൊമ്പുള്ള മൃഗങ്ങൾ, വിഷം, പർവ്വതം, കരടി അല്ലെങ്കിൽ പ്രേതങ്ങൾ എന്നിവയാൽ ബുദ്ധിമുട്ടും. 10, 25, 45 എന്നീ വയസുകളിൽ അഗ്നിഭയം, ഒളിഞ്ഞിരിക്കുന്ന പ്രശ്നങ്ങൾ കൂടാതെ വൈകാരിക ബന്ധങ്ങളാലുള്ള ഭയം എന്നിവ ഉണ്ടാകും.</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_3							= <p>മജ്ജാ തന്തുവിനാലും വേദനയാലും നിങ്ങൾ ബുദ്ധിമുട്ടും. ഒരു വാരത്തിലെ നിങ്ങളുടെ ഭാഗ്യ ദിവസങ്ങൾ ബുധൻ, വെള്ളി, ശനി എന്നിവയാണ്. നിങ്ങൾ എഴുത്തുകാരനും, സർക്കാർ ജീവനക്കാരനും ബുദ്ധിമാനും ആയിരിക്കും. കയ്പ്പും പുളിപ്പും ഉള്ളവ നിങ്ങൾക്ക് ഇഷ്ടമാണ്. കറുത്ത വസ്തുക്കൾ ഭാഗ്യം കൊണ്ടുവരും വെളുത്ത വസ്തുക്കൾ നിർഭാഗ്യം കൊണ്ടുവരും. നിങ്ങൾ വൃത്തിയും വെടിപ്പും ആകർഷകത്വവും ക്ഷിപ്രകോപവും ഉള്ളവരാണ്. നിങ്ങൾക്ക് സ്വന്തമായി വാഹനമുണ്ടാകും കൂടാതെ മറ്റുള്ളവരിൽ നിന്നും പണം നേടുവാനുള്ള മിടുക്കും ഉണ്ടാകും. നിങ്ങൾ പല സ്ത്രീകളുമായി ബന്ധമുള്ള പുരുഷനായിരിക്കും, ആമാശയ സുഖക്കേടോടു കൂടിയ സമ്പത്ത് കുറഞ്ഞവനും ആയിരിക്കും. 5, 12, 16, 27 എന്നീ വയസുകൾ ഒരുപാട് പ്രശ്നങ്ങൾ കൊണ്ടുവരും. ജീവിതത്തിന്‍റെ  50 ആം വർഷത്തിൽ പെട്ടെന്നുള്ള മരണത്തിന് സാധ്യതയുണ്ട്.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>ഭാവിയിൽ നിങ്ങൾ സന്തോഷമുള്ള മധ്യവർഗ്ഗക്കാരനായിരിക്കും. ജീവിതത്തിലെ 16 ഉം 18 ഉം വർഷങ്ങൾ ജലഭയം നൽകും. 5 ആമത്തെ വയസിൽ ചെവിക്ക് അസുഖങ്ങളും 24 ആമത്തെ വയസിൽ വേദനയാലുള്ള ഭയവും ഉണ്ടാകാം. 38 ആമത്തെ വയസ്സിൽ പെട്ടെന്നുള്ള മരണം സംഭവിക്കാം. ഒരു നീണ്ട ജീവിതത്തിനു ശേഷം 80 ആം വയസ്സിൽ വൈശാഖത്തിന്‍റെ 12 ആം വർഷത്തിൽ, അത്തം നക്ഷത്രത്തിൽ ബുധനാഴ്ച അല്ലെങ്കിൽ വെള്ളിയാഴ്ച ആത്മാവ് നിങ്ങളുടെ ശരീരം വെടിയും. ജീവിതത്തിന്‍റെ  3ഉം, 10ഉം, 6ഉം വർഷങ്ങളിൽ മൂന്ന് അസന്തുലിതാവസ്ഥകളാൽ നിങ്ങൾ ബുദ്ധിമുട്ടും കൂടാതെ  പ്രേതത്താലും ഉപ്പിനാലും ഉള്ള ഭയത്താൽ ജീവിക്കും. 20 ആമത്തേയും 12 ആമത്തേയും വയസ്സിൽ നിങ്ങൾ കുതിരകൾ, പാമ്പ്, ആന, പർവ്വതം കൂടാതെ ജലം എന്നിവയാൽ ബുദ്ധിമുട്ടും.<br/> ജീവിതത്തിന്‍റെ 18ഉം, 9ഉം, 30ഉം, 5ഉം വർഷങ്ങളിൽ നിങ്ങൾ പനിയാൽ ബുദ്ധിമുട്ടുന്നത് കാണാം. നിങ്ങൾ ഫലിതപ്രിയനും, ധനികനും, മെലിഞ്ഞവനും ആണ് കൂടാതെ 8ആം വയസ്സിൽ ഹൃദയ സംബന്ധിയായ പ്രശ്നങ്ങളാൽ ബുദ്ധിമുട്ടും.</p> <b style='padding-left:90%;'>-Yvan</b>
	RASI_PREDICTION_4							= <p> ഞായർ, തിങ്കൾ, ചൊവ്വ എന്നിവ ഭാഗ്യ ദായകങ്ങളാണ് എന്നാൽ ബുധനാഴ്ച നിർഭാഗ്യകരമാണ്. ചുമ, വെളുപ്പ് നിറം അതോടൊപ്പം പെട്ടെന്ന് മരണം സംഭവിക്കുവാനുള്ള മൂന്ന് ആകസ്മികതകളും ഉണ്ട്. 2ഉം, 8ഉം, 21ഉം 29ഉം വയസ്സുകൾ അസുഖങ്ങൾ നൽകും. നിങ്ങൾക്ക് വളഞ്ഞ മെലിഞ്ഞ കാലുകളും രണ്ട് ഭാര്യമാരും ജലജന്യ രോഗങ്ങളും ഉണ്ടാകാം. അരക്കെട്ട്, തലയും കാലുകളും എന്നിവിടങ്ങളിൽ വേദന, കാഴ്ച്ചക്കുറവ്, താഴ്ന്ന നിലവാരത്തിലുള്ളവരുമായി വൈകാരിക ബന്ധം എന്നിവ ഉണ്ടാകാം. ശനിയാഴ്ച നിങ്ങൾക്ക് നിർഭാഗ്യകരമായ ദിവസമാണ്. കറുപ്പു നിങ്ങൾക്ക് ദൗർഭാഗ്യകരമായ നിറമാണ് കൂടാതെ വെള്ളയും ചുവപ്പും ഭാഗ്യമെന്ന് തെളിയുന്നു.</p> <p>നിങ്ങളുടെ ജീവിതത്തിന്‍റെ  8ആം വർഷം മഴ, ജലം, വായു എന്നിവയാലുള്ള ഭയം നൽകുന്നു. വാസനയിൽ നിന്നും നിങ്ങൾക്ക് നന്മ ഉണ്ടാകുന്നു. നിങ്ങളുടെ ചാന്ദ്ര ചിഹ്നം കർക്കിടകം ആയതിനാൽ മകര ചാന്ദ്ര ചിഹ്നത്തിലോ സംക്രാന്തി ദിവസമോ നിങ്ങൾ വാങ്ങുന്നതെന്തും ഇരട്ടിയാകും. വായു പ്രശ്നങ്ങളും, നഷ്ടവാഹകനും ആയതിനാൽ 48ആം വയസ്സിലോ 84ആം വയസ്സിലോ മരണപ്പെടും.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>നിങ്ങളുടെ ചെറുപ്പകാലത്ത് നിങ്ങൾ ദരിദ്രനായിരിക്കും എന്നാൽ മധ്യവയസാകുമ്പോഴേക്കും നിങ്ങൾ നല്ല സ്ഥാനത്തെത്തും. 3ഉം 7ഉം വയസ്സുകളിൽ നിങ്ങൾ പനിയാൽ ബുദ്ധിമുട്ടുന്നത് കാണാം. നിങ്ങളുടെ ചിഹ്നം വർഷത്തിന്‍റെ അധിപനാകുമ്പോൾ നിങ്ങൾക്ക് ജലഭയം അഭിമുഖീകരിക്കേണ്ടി വരും എന്നാൽ വാസനയിൽ നിന്നും നിങ്ങൾക്ക് നന്മ ഉണ്ടാകുന്നു. നിങ്ങളുടെ ജീവിതത്തിന്‍റെ  3ആം വർഷത്തിൽ ശരീരത്തിന്‍റെ  ഇടതു ഭാഗത്ത് അഗ്നിഭയം ഉണ്ടാകും. ആഭിജാതന്മാർക്ക് മറുകുണ്ടാകും, തല സംബന്ധമായ അസുഖങ്ങൾ ഉണ്ടാകും, അല്ലെങ്കിൽ സന്തോഷവാനാണ്. നിങ്ങൾക്ക് 32 വയസ്സാകുമ്പോൾ പെട്ടെന്നുള്ള മരണത്തിന് സാധ്യതയുണ്ട്. 29 ആമത്തെ വയസ്സിൽ നിങ്ങൾക്ക് നാഗഭയം ഉണ്ടാകും. മകം ശുക്ലപക്ഷത്തിനടുത്തോ അല്ലെങ്കിൽ ശുക്ര നക്ഷത്രത്തിലുള്ള വെള്ളിയാഴ്ചയിലോ നിങ്ങളുടെ മരണം സംഭവിക്കാം.<p> <b style='padding-left:90%;'>-Yvan</b> <p> നിങ്ങളുടെ ജീവിതത്തിന്‍റെ 4ഉം, 8ഉം, 12ഉം വർഷങ്ങളിൽ തല, ചെവി, കണ്ണ് എന്നിവിടങ്ങളിൽ കുരുക്കൾ ഉണ്ടാകും. ത്രൈ നക്ഷത്ര അസന്തുലിതാവസ്ഥ നിലനിൽക്കും. ജീവിതത്തിന്‍റെ 16ഉം 24ഉം വർഷങ്ങളിൽ സ്ത്രീ, ജലം, പ്രേതം, പർവ്വതങ്ങൾ എന്നിവയാലുള്ള ഭയവും ഗുഹ്യഭാഗങ്ങളിലെ വേദനയും നിങ്ങൾക്കുണ്ടാകും. നിങ്ങൾ കൃഷിയിലോ കൃഷിയുമായി ബന്ധപ്പെട്ട തൊഴിലിലോ ഏർപ്പെട്ടിരിക്കുകയാണെങ്കിൽ, ശൗര്യമില്ലെങ്കിലും നിങ്ങൾ സമർത്ഥൻ ആയിരിക്കും.</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_5							= <p>വാരത്തിലെ നിങ്ങളുടെ ഭാഗ്യ ദിനങ്ങളാണ് തിങ്കൾ, ചൊവ്വ, ഞായർ എന്നിവ. നിങ്ങൾ മജ്ജ സംബന്ധമായ അസുഖങ്ങളാൽ ബുദ്ധിമുട്ടാം, മുടി കുറവായിരിക്കാം, യുദ്ധത്തിൽ നിന്നും ഭാഗ്യവും, രണ്ടു ഭാര്യമാരിൽ ഒന്ന് വന്ധ്യയുമായിരിക്കും. ഇടുപ്പ് വേദന, ആമാശയ വേദന, ഹൃദയ സംബന്ധിയായ ചെറിയ പ്രശ്നങ്ങൾ, തലയ്ക്ക് പരുക്ക് എന്നിവ ഉണ്ടാകാം. ഉച്ചസ്ഥാനത്തു നിൽക്കുന്ന സൂര്യൻ ധാരാളം ഭാഗ്യങ്ങൾ കൊണ്ടുവരുമെങ്കിലും നീചസ്ഥാനത്തുള്ള സൂര്യൻ സ്ത്രീ നഷ്ടം, ജല നഷ്ടം, എന്നാൽ ഭൂസ്വത്ത് കൊണ്ടുവരികയും ചെയ്യും. ജീവിതത്തിന്‍റെ  4ഉം 8ഉം വർഷങ്ങൾ പനി കൊണ്ടുവരും. 28ആം വയസ്സിൽ സർക്കാർ ഭീതി ഉണ്ടാകും. 51ആം വയസ്സ് വേദന കൊണ്ടുവരും. 30ആം വയസ്സ് വേദനാജനകമായിരിക്കും. സൂര്യൻ അധിപനായി നിൽക്കുന്ന വയസ്സുകളിൽ ജീവിതത്തോട് ഭയം ഉണ്ടാകും.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>ജീവിതത്തിന്‍റെ ആദ്യ വർഷം മഞ്ഞപിത്തത്തിന്‍റെ ഭയം ഉണ്ടാകും. 5ആം വയസ്സിൽ മൃഗങ്ങളോ അഗ്നിയോ വഴി കൈക്കോ കാലിനോ വേദന അനുഭവപ്പെടാം. 13ആം വയസ്സിൽ അതിസാരത്താലുള്ള ഭയം കാണുകയും 32ആം വയസ്സിൽ പെട്ടെന്നുള്ള മരണം സംഭവിക്കുവാനുള്ള സാധ്യതയും കാണുന്നു. 7ആം വയസ്സിൽ നിങ്ങൾ പനിയുള്ളവരായി കാണപ്പെടും, 20ൽ നാഗഭയം, 21ൽ അസുഖം. നിങ്ങൾക്ക് യുദ്ധത്തോട് ചായ്‌വ് ഉണ്ടാവുകയും അപകീർത്തിപ്പെടുകയും ചെയ്യും കൂടാതെ നിങ്ങൾ ഒരു യോദ്ധാവുമാണ്. 28ആം വയസ്സിൽ ഗുഹ്യഭാഗങ്ങളിലുള്ള വേദനയാൽ നിങ്ങൾ ബുദ്ധിമുട്ടും. അശ്വതി നക്ഷത്രത്തിൽ ഫാൽഗുണ ശുക്ലപക്ഷത്തിലെ 5ആം തിങ്കളാഴ്ച നിങ്ങൾ മരണം കാണും.</p> <b style='padding-left:90%;'>-Yvan</b> <p>5ഉം, 10ഉം, 15ഉം വയസ്സുകളിൽ ആയുധങ്ങൾ, അഗ്നി, ജലം, ശ്വാസോച്ഛ്വാസം, കണ്ണ് കൂടാതെ ഹൃദയ സംബന്ധമായ വേദന എന്നിവയാൽ നിങ്ങൾ ബുദ്ധിമുട്ടും. 30ആം വയസ്സിൽ കൂർത്ത പല്ലുകൾ കൂർത്ത നഖങ്ങളുള്ള വന്യമൃഗങ്ങൾ എന്നിവയാലുള്ള ഭയം ഉണ്ടാകും. 20ആം വയസ്സിൽ നാഗഭയം നിങ്ങൾക്കു കാണാം. ദുർമന്ത്രവാദത്തെ കുറിച്ചുള്ള ഭയം അല്ലെങ്കിൽ പനി. നിങ്ങൾ ധൈര്യശാലികളും സത്യസന്ധമായി തുറന്നു സംസാരിക്കുന്നവരും സ്ത്രീ വിരുദ്ധരും സന്താനങ്ങൾ കുറഞ്ഞവരും ആയിരിക്കും.</p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_6							= <p> നിങ്ങൾക്ക് മനോഹരമായ കണ്ണുകളും, നീണ്ട മുടിയും അമിത വണ്ണവും വെളുത്ത നിറവും ഉണ്ടായിരിക്കും. മറ്റുള്ളവർക്കു വേണ്ടി ജോലി ചെയ്യുമ്പോൾ നിങ്ങൾ അലസരും എന്നാൽ നിങ്ങൾക്കു വേണ്ടി ആകുമ്പോൾ പെട്ടെന്നു ചെയ്യുന്നവരും ആയിരിക്കും. നിങ്ങൾ പ്രശസ്തരായിരിക്കും.</p><p>എഴുത്ത്, കൃഷി, സാമൂഹ്യസേവനം എന്നിവ സമ്പത്ത് കൊണ്ടുവരും. തിങ്കളാഴ്ചകൾ നിർഭാഗ്യകരങ്ങളാണ്. ഉയർന്ന സ്ഥാനം നാശത്തിലേക്ക് വഴിയൊരുക്കാം.</p> <p>ഒന്നാം ഭാര്യ വളരെ നല്ലതായിരിക്കും. 4ഉം 9ഉം വയസ്സുകളിൽ കണ്ണിനു പ്രശ്നങ്ങൾ ഉണ്ടാകാം. ജീവിതത്തിലെ 50ഉം, 28ഉം, 30ഉം, 47ഉം വർഷങ്ങൾ വേദന കൊണ്ടുവരാം. 50ഉം 60ഉം വയസ്സുകളിൽ വസ്തുവിൽ നിന്നും വാഹനത്തിൽ നിന്നും പണം ലഭ്യമാകാം. വ്യാഴം ഉച്ചസ്ഥാനത്താണെങ്കിൽ സുഹൃത്തുക്കളിൽ നിന്നും മഹത്തായ ആനുകൂല്യങ്ങൾ ലഭിക്കും. 30ആം വയസ്സിൽ മൂലക്കുരുവിനാൽ നിങ്ങൾ ബുദ്ധിമുട്ടും. നിങ്ങൾ വിഖ്യാതമായ കുടുംബത്തിൽ നിന്നുള്ളവരായിരിക്കും.</p> <p>ജീവിതത്തിലെ 5ആം വർഷം കണ്ണിന് വേദന കൊണ്ടുവരും, 3ആം വയസ്സിൽ അഗ്നിഭയം കാണുന്നു. 21ആം വയസ്സിൽ മരങ്ങൾ ഭിത്തികൾ എന്നിവയാലുള്ള ഭയം കാണുന്നു. അവയവങ്ങളിലും കഴുത്തിലും മറുകുകളുണ്ടാകാം. 13ആം വയസ്സിൽ ഛർദ്ദിയാൽ ബുദ്ധിമുട്ടാം, 15ൽ നാഗഭയം, 30ൽ വനഭയം, നാഗങ്ങളും ആയുധങ്ങളും മരണത്തിനു കാരണമാകാം.</p> <p>18ഉം, 12ഉം, 6ഉം വയസ്സുകളിൽ വേദന, കല്ലുകൾ, സ്ത്രീ, ആയുധങ്ങൾ കൂടാതെ അഗ്നി എന്നിവയാലുള്ള ഭയം ഉണ്ടാകാം. 36ഉം 24ഉം വയസ്സുകൾ മോഷ്ടാവിനാലും അഗ്നിയാലും ഭയമുണ്ടാകാം. നേത്രഭയവും ഉണ്ടാകാം.</p> <p>ജീവിത ദൈർഘ്യം 90 വയസ്സു വരെയാണ്, നിങ്ങൾ മതവിശ്വാസിയും കഴിവുള്ളവനും ആയിരിക്കും. ഭംഗിയുള്ള കണ്ണുകൾ, ദൃഢതയുള്ള നഖങ്ങൾ, തവിട്ടുനിറം, മറ്റുള്ളവരുടെ സ്വത്തിനാൽ സമ്പന്നൻ കൂടാതെ നിങ്ങളൊരു സഞ്ചാരിയുമായിരിക്കും.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_7							= <p>നിങ്ങൾക്ക് സൗന്ദര്യമുള്ള കണ്ണ്, മുഖം, തവിട്ടുനിറം കട്ടിയുള്ള താടി എന്നിവ ഉണ്ടായിരിക്കും. സർക്കാർ ജീവനക്കാരോട് ഇഷ്ടം. ബുധൻ, വെള്ളി, ശനി എന്നിവ ഭാഗ്യ ദിവസങ്ങളാണ്. ചുമയാൽ ക്ലേശികും. സാധനങ്ങൾ വാങ്ങുകയും വിൽക്കുകയും ചെയ്യും വഴി വളരെ കുറച്ച് പ്രയോജനം മാത്രമേ ഉണ്ടാവുകയുള്ളു. തലയ്ക്കും മുഖത്തിനും പരിക്കേൽക്കാം. 8ആം വയസ്സിൽ ഉയരങ്ങളിൽ നിന്നും വീഴുവാനുള്ള സാധ്യതയുണ്ട്, കൂടാതെ നല്ല പ്രകൃതവും സമ്പന്നനുമാണ്. രണ്ടു ഭാര്യമാരോടു കൂടിയ ഒരു രഹസ്യ അധർമ്മി, തീർത്ഥയാത്രയും പഠനവും നടത്തുന്നയാൾ. അലസനും, ഭക്ഷണ പാനീയങ്ങൾ സംഭരണം ചെയ്യുകയും കൂടാതെ വളരെ പെട്ടെന്നു മുടിയും നരയ്ക്കുന്നയാൾ. ശുക്രൻ ഉച്ചസ്ഥാനത്തു നിൽക്കുമ്പോൾ സുഗന്ധത്തിൽ നിന്നും നിങ്ങൾക്ക് നേട്ടം ലഭിക്കുന്നു. നിങ്ങൾ ഒരു പർവ്വതത്തിന്‍റെയോ നദിക്കരയിലോ താമസിക്കുവാൻ ആഗ്രഹിക്കുന്നു.</p> <p>3ഉം, 8ഉം, 14ഉം, 26ഉം, 24ഉം, 47ഉം, 55ഉം, 63ഉം വയസ്സുകളിൽ നിങ്ങൾ ശ്വസന രോഗത്താൽ ബുദ്ധിമുട്ടും. ചുമ ഉണ്ടാകും. 84 വയസ്സായാലും നിങ്ങൾ ചെറുപ്പമായിരിക്കും. 30ആം വയസ്സിൽ മറ്റൊരു സ്ത്രീ നിങ്ങളുടെ ജീവിതത്തിൽ കടന്നുവരും. 12ആം വയസ്സിൽ ജലത്താലുള്ള ഭയവും 18ആം വയസ്സിൽ അഗ്നിയാലുള്ള ഭയവും കാണുന്നു. 21ആം വയസ്സിൽ വൃക്ഷത്താലും വാഹനത്താലും ഉള്ള പ്രശ്നങ്ങൾ ഉണ്ട്. 20ആം വയസ്സിൽ നാഗഭയം ഉണ്ടാകും. പൊതുവെ ഒരു വ്യവസായി, മെലിഞ്ഞ സമ്പന്നൻ. വൈശാഖ ശുക്ല ദശമിയിൽ ആശ്ലേഷ ചൊവ്വാഴ്ച മരണം. 7ഉം, 14ഉം 20ഉം വയസ്സിൽ രത്നങ്ങളോടുള്ള ഭയം, കെട്ടിയിടുമെന്ന ഭയം അല്ലെങ്കിൽ വ്യാപകമായ 3 ഘടകങ്ങളോടുള്ള ഭയം. 63ആം വയസ്സിൽ കൈകാലുകൾക്കുള്ള വേദനയാൽ നിങ്ങൾ ക്ലേശിക്കുന്നത് കാണാം. നിങ്ങൾക്ക് വളരെ അധികം ആദരവ് ലഭിക്കും. ഉയർന്നു നിലകൊള്ളുന്ന കണ്ണുകളും, വലിയ മുഖവും, ദാതാവും കൂടാതെ ഒരു വ്യവസായിയും ആയിരിക്കും.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_8							= <p>നിങ്ങൾക്ക് അമിത വണ്ണമുണ്ടായിരിക്കും, ചുവന്ന നിറത്തോടുകൂടിയ ശരീരവർണ്ണം, പാലിനോടും ക്ഷീരോൽപന്നങ്ങളോടും ഇഷ്ടം. നിങ്ങളുടെ ഭാഗ്യ ദിവസം ചൊവ്വയും, തിങ്കളും കൂടാതെ ബുധൻ അശുഭവും ആണ്. </p> പുളിപ്പും കയ്പ്പും ഉള്ളവ ദുർഭാഗ്യം കൊണ്ടുവരുന്നു. നിങ്ങൾ നിങ്ങളുടെ സ്വപ്നങ്ങൾ എപ്പോഴും മറക്കും. ദുർബലവും, മൃഗങ്ങളാൽ സമ്പുഷ്ടവും, പിതൃക്കളും യുദ്ധങ്ങളും വഴി ധാരാളം പണം വരികയും ചെയ്യും. നിങ്ങൾക്ക് ശരീര ദുർഗന്ധം ഉണ്ട്, ഫലങ്ങളിൽ നിന്നും നേട്ടങ്ങളും ജലത്തെ ഭയക്കുകയും ചെയ്യും.</p> <p>മിഥുനം തുലാം എന്നിവ ഉച്ചസ്ഥാനത്തു നിൽക്കുന്ന മാസം നിങ്ങൾക്ക് ക്ലേശകരമായിരിക്കും, പെട്ടെന്നുള്ള ഉയർച്ചയും പെട്ടെന്നുള്ള വീഴ്ച്ചയും കണിക്കുന്ന ആളും കൂടാതെ ഏതൊരു കാര്യവും എളിപ്പത്തിൽ അംഗീകരിക്കുന്ന ആളുമാണ്.</p> <p>ചിറ്റും ശത്രുക്കളോടു കൂടിയ,ഒരു അധാർമ്മികനാണ് നിങ്ങൾ. 7ഉം, 12ഉം, 14ഉം, 28ഉം വസ്സുകൾ ശ്വസന പ്രശ്നങ്ങൾ കൊണ്ടുവരും. 54ആം വയസ്സിലും വ്യാഴം അധിപനായുള്ള വർഷം നിങ്ങളെ പ്രധാനമായ ഒരു നഷ്ടം ബാധിക്കും.</p> <p>ചന്ദ്രനെ അറുത്തു കാണുവാൻ കഴിയുന്ന സമയങ്ങളിൽ നിങ്ങൾ ചുവപ്പും മഞ്ഞയുമായ കാര്യങ്ങളിൽ നിന്നും നേട്ടവും, സ്ത്രീകളിൽ നിന്നും സന്തോഷവും കൈവരിക്കുകയും. 75ആം വയസ്സിൽ നിങ്ങൾ പനിയാൽ ബുദ്ധിമുട്ടും. 25ആം വയസ്സ് പെട്ടെന്നുള്ള മരണമെന്ന ഭയം കൊണ്ടുവരും. 39ആം വയസ്സിൽ അഗ്നിയുടെ ഭയം ഉണ്ടാകും. ഒരുപാട് കുട്ടികളാൽ നിങ്ങൽ അനുഗ്രഹീതരാണ്.</p> <p>വഴക്കുകൾ ഉണ്ടാക്കുവാൻ നിങ്ങൾ ഇഷ്ടപ്പെടുന്നു, സ്ത്രീകളാൽ ലജ്ജാവഹരും, സുഹൃത്തുക്കളെ ചതിക്കുകയും ചെയ്യും. ശുക്ല ദശമിയിലെ അത്തം നക്ഷത്രത്തിൽ മരണം സംഭവിക്കും.</p> <p>8ഉം, 16ഉം, 24ഉം, 40ഉം വസ്സുകളിൽ മോഷ്ടാക്കൾ, അഗ്നി, വിഷം, പനി എന്നിവയാൽ ക്ലേശിക്കും. 32ആം വയസ്സിൽ തടങ്കൽ, പരുക്ക് കൂടാതെ രോഗാണുക്കൾ എന്നിവയെ ഭയപ്പെടും. 72ആം വയസ്സിൽ ജലത്തെ ഭയപ്പെടും. ദൃഢനിശ്ചയം, ആദരവ് ഉരുണ്ട നെഞ്ചോടുകൂടിയ നിങ്ങൾക്ക് വണ്ണം കാണുകയില്ല.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_9							= <p>അമിത വണ്ണത്താൽ നിങ്ങൾ ബുദ്ധിമുട്ടും, വെളുത്ത നിറവും, തവിട്ടു നിറത്തിലുള്ള മുടിയും, മനോഹരമായ കണ്ണുകളും ഉണ്ടാകും, മുട്ടിലും മുട്ടിന്‍റെ പിൻഭാഗത്തും വേദനയും അനുഭവപ്പെടും. നിങ്ങളുടെ സ്വന്തം ആളുകളോടു തന്നെ നിങ്ങൾ വഴക്കിടും, വളരെ ഭക്ഷണപ്രിയരും, മൃഗങ്ങളെ കൊല്ലുന്ന പരദേശ സന്ദർശകനുമാണ്. 18ഉം, 24ഉം, 30ഉം, 40ഉം വയസ്സുകളിൽ നിങ്ങൾ രോഗങ്ങളാൽ ബാധിക്കപ്പെടും. വ്യാഴം, ചൊവ്വ, തിങ്കൽ എന്നിവ അനുകൂലമാണ്. എന്നാൽ ശനിയഴ്ച അനുകൂലമല്ല. നിങ്ങൾക്ക് മൂന്ന് ഭാര്യമാർ ഉണ്ടാകും. മകം മാസം നിങ്ങൾക്ക് അനുയോജ്യമാണ്, കർക്കിടകം മാസം പ്രതികൂലമാണ്.</p> <p>വ്യാഴം ഉച്ചസ്ഥാനത്താണെങ്കിൽ നിങ്ങൾക്ക് ബുദ്ധിമുട്ടുകൾ കുറവായിരിക്കും. നിങ്ങളുടെ മാതാവ് ബുദ്ധിമുട്ടുകൾ അനുഭവിക്കുകയും, നിങ്ങൾക്ക് ധാരാളം പണം ചിലവാവുകയും കൂടാതെ കാര്യങ്ങൾ സാധിക്കുവാനായി വളരെ പ്രയാസങ്ങൾ അഭിമുഖീകരിക്കേണ്ടിയും വരും.</p> <p> മൂലം നക്ഷത്രമെങ്കിൽ മാനസ്സിക പ്രശ്നങ്ങൾ ഉടലെടുക്കും. സൂര്യൻ കർക്കിടക രാശിയിലാണെങ്കിൽ വേദനയും ത്വക്ക് രോഗങ്ങളും പിടിപെടും. 7ഉം, 14ഉം, 16ഉം, 20ഉം, 35ഉം, 25ഉം വയസ്സുകൾ വേദനകൾ കൊണ്ടുവരും.</p> <p>ചുവപ്പ്, മഞ്ഞ, വെള്ള എന്നീ നിറങ്ങളുള്ള ഉൽപന്നം ഭാഗ്യം കൊണ്ടുവരും. 64 വയസ്സാണ് പരമാവധി പ്രായം. എന്തുതന്നെ ആയാലും ആദ്യ വർഷം രോഗങ്ങളാലും, 13ആം വയസ്സ് പെട്ടെന്നുള്ള മരണവും കൊണ്ടുവരും. ചെറുപ്പത്തിൽ നിങ്ങൾ ധനികനും, കുട്ടികൾ കുറവും, കുടുമ്പാംഗങ്ങളുടെ രോഗങ്ങളാൽ വ്യാകുലതയും, മോഹം നിറഞ്ഞതും, ത്വക്ക് രോഗങ്ങളും, നിങ്ങൾ ഭക്ഷണപ്രിയർ ആയിരിക്കുകയും ഇല്ല. ആശാദ് കൃഷ്ണ പഞ്ചമി വെള്ളിയാഴ്ചയിൽ നിങ്ങൾ മരണപ്പെടും. 18, 27, 9 എന്നീ വയസ്സുകളിൽ ശ്വസന രോഗങ്ങളും, അഗ്നി ഭയവും, കൊമ്പും മുള്ളും ഉള്ള മൃഗങ്ങളെയും ഭയപ്പെടും.</p> <p>54ഉം 36ഉം വയസ്സുകളിൽ മൂലക്കുരുവോ അല്ലെങ്കിൽ മൂന്ന് അസന്തുലിതാവസ്ഥയാൽ ബുദ്ധിമുട്ടും. രക്ത പ്രശ്നങ്ങളും, തലയ്ക്ക് രോഗങ്ങളും പ്രബലപ്പെടും. നിങ്ങൾ സമർത്ഥരും യഗ്നങ്ങളിൽ ഉഴുകുകയും എന്നാൽ പ്രയാസകരമായ ജീവിതവും ആയിരിക്കും.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_10							= <p>നിങ്ങൾ വണ്ണത്താൽ ബുദ്ധിമുട്ടും. നിങ്ങൾ കൈയിലും മുട്ടിലും വേദനയും, ഇടുപ്പിന് പ്രശ്നങ്ങളും ഉള്ള ധൈര്യശാലി ആയിരിക്കും. നിങ്ങളുടെ ഭാഗ്യ ദിവസങ്ങൾ ബുധൻ, ശനി, വെള്ളി എന്നിവയും ദൗർഭാഗ്യ ദിവസം ഞായറും ആണ്.</p> <p>മേട മാസത്തിൽ ഗ്രഹങ്ങൾ ചിങ്ങരാശിയിൽ എത്തുമ്പോൾ നഷ്ടങ്ങൾക്കും അസുഖങ്ങൾക്കുമുള്ള സാധ്യത ഏറെയാണ്. 8, 16, 20, 30, 34 എന്നീ വയസ്സുകളിൽ വളരെ വേദനകൾ ഉണ്ടാകും.</p> <p>44ഉം, 59 വയസ്സ് വേദനാജനകമായിരിക്കും. നിങ്ങൾക്ക് രണ്ട് അവലക്ഷണമുള്ള ഭാര്യമാർ ഉണ്ടാകും. ശനി അധിപനായിരിക്കുന്ന വർഷങ്ങളിൽ നിങ്ങൾക്ക് കറുപ്പ് നിറമുള്ള സാധനങ്ങളാൽ പ്രയോജനം ഉണ്ടാകും. ജല്പനങ്ങൾ കേൾക്കുന്നവൻ, ഏഴാം വയസ്സിൽ ബഹുമാനിക്കപ്പെടുകയും ജലഭയം ഉണ്ടാവുകയും ചെയ്യും. നിങ്ങൾ ബുദ്ധിമാനാണ്. 21ആം വയസ്സിൽ പനി ബാധിക്കും കൂടാതെ 32, 5 എന്നീ വയസ്സുകളിലും പനിയുണ്ടാകും. 25ആം വയസ്സിൽ നിങ്ങളുടെ ഇടതുവശം അഗ്നിയാൽ ബാധിക്കപ്പെടാം. 35ആം വയസ്സിൽ അന്യസ്ത്രീകളോട് ആസക്തി തോന്നുകയും ശത്രുഭയം ഉണ്ടാകുകയും ചെയ്യും. 10-20 വയസ്സുവരെ നേത്ര പ്രശ്നങ്ങളും, ത്വക്ക് രോഗങ്ങളും, ജലം, ജീവികൾ, ആയുധങ്ങൾ എന്നിവയാലുള്ള ഭയവും ഉണ്ടാകാം. 30 വയസ്സാകുമ്പോൾ നേത്ര പ്രശ്നങ്ങൾ ഉണ്ടാകും. 40ഉം 60ഉം വയസ്സിനിടയിൽ, അപ്പെൻഡിക്സ്, സ്ത്രീ ഭയം, വിഷബാധ എന്നിവ ഉണ്ടാകാം. പണം കുറഞ്ഞ ഒരു ചൂതാട്ടകാരനും പിശുക്കനും ആയിരിക്കും കൂടാതെ നിങ്ങൾ എപ്പോഴും ചീത്ത കൂട്ടുകെട്ടിലും ആയിരിക്കും.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_11							= <p>നിങ്ങൾക്ക് ആമാശയ പ്രശ്നങ്ങൾ ഉണ്ടാകും, ആമാശയത്തിൽ മുഴകൾ, ചുമ ജലദോഷം എന്നിവയും ഉണ്ടാകാം. വെള്ളി, ബുധൻ, ഞായർ എന്നിവ നിർഭാഗ്യ ദിവസങ്ങളാണ്. നിങ്ങൾക്ക് വെളുത്ത നിറവും, മനോഹരമായ കണ്ണുകളും ഉണ്ടാകും കൂടാതെ ധനികനും സന്തോഷവാനും ആയിരിക്കും.</p> <p>ചതയം നക്ഷത്രത്തിലോ അല്ലെങ്കിൽ ദ്വിതീയ തിഥിയിലോ നിങ്ങൾ മരണം സംഭവിക്കാം. നിങ്ങൾ വസ്തുക്കൾ ശേഖരിക്കുവാൻ ഇഷ്ടപ്പെടുന്നു, രണ്ട് ഭാര്യമാർ ഉണ്ടായിരിക്കും കൂടാതെ ജീവിത ദൈർഘ്യം കുറവായിരിക്കും.</p> <p>നിങ്ങൾ കുടുംബത്തിലെ ഏറ്റവും മൂത്ത ആളായിരിക്കും, പാവപ്പെട്ടവനും, ഗോതമ്പിന്‍റെ  നിറവും, സ്നേഹമുള്ള ഒരു ഭാര്യയും, കുട്ടികളില്ലാത്ത ഒരു ഭാര്യയും നിങ്ങളുടെ ഇടുപ്പിൽ മറുകും ഉണ്ടായിരിക്കും.</p> <p>നിങ്ങൾ സമുദ്രത്തിൽ നിന്നും പണം സമ്പാദിക്കും. തിങ്കൾ, വ്യാഴം, ചൊവ്വ എന്നിവ ഭാഗ്യ ദിനങ്ങളാണ് കൂടാതെ വെള്ളിയാഴ്ച അത്ര ഭാഗ്യകരമല്ല. നിങ്ങളുടെ ഗുരു ദുർബലം അല്ലെങ്കിൽ പാപകരമാണെങ്കിൽ നിങ്ങൾ പ്രാർത്ഥിക്കണം. ഗുരു നീചസ്ഥാനതാണെങ്കിൽ വ്യാപാരത്തിൽ നഷ്ടം ഉണ്ടാകും. നിങ്ങൾ ഒരു മകനാൽ അനുഗ്രഹിക്കപ്പെടും. 2ഉം, 4ഉം, 9ഉം, 12ഉം, വയസ്സുകളിൽ നിങ്ങൾ ആമാശയ അസുഖങ്ങളാൽ ബുദ്ധിമുട്ടും. ഈ വർഷങ്ങൾ വേദനകൾ നൽകുകയും പരാജയം ഉണ്ടാവുകയും ചെയ്യും.</p> <p>നിങ്ങൾ വളരെ സഹായമനോഭാവമുള്ളവരും, ജോലിയിൽ അലസരും ആണ്. 32ഉം, 19ഉം വയസ്സുകൾ അസുഖങ്ങൾ കൊണ്ടുവരും. കൈപ്പുള്ളതോ പുളിരസമുള്ളതോ ആയ മരുന്നുകൾ നിങ്ങൾക്ക് നല്ലതാണ്.</p> <p>സൂര്യൻ കുംഭ രാശിയിൽ ആയിരിക്കുമ്പോൾ, നിങ്ങൾക്ക് നല്ല പല്ലുകളുണ്ടാകും, ക്ഷയത്താൽ ബുദ്ധിമുട്ടാം. നിങ്ങൾ മധുര ഭാഷികളും, ഔദ്യോഗിക ജീവിതത്തിൽ വിശ്രമ രഹിതരും ആയിരിക്കും. ആദ്യ വർഷം നിങ്ങൾ രോഗിയായിരിക്കും, മൂന്ന് സഹോദരന്മാർ ഉണ്ടായിരിക്കുകയും, ശരീരത്തിന്‍റെ ഇടതു ഭാഗത്ത് മറുക് ഉണ്ടായിരിക്കുകയും ചെയ്യും. നിങ്ങൾക്ക് രണ്ട് ഭാര്യമാർ ഉണ്ടായിരിക്കും. 5ഉം, 6ഉം വയസ്സുകളിൽ നിങ്ങൾ ദാരിദ്ര്യത്തെ അഭിമുഖീകരിക്കും. 15ആം വയസ്സിൽ അഗ്നി ഭയവും, 12ആം വയസ്സിൽ ജല ഭയം, നാഗ ഭയം എന്നിവ ഉണ്ടാകാം. മുൻകോപിയും, പരസ്ത്രീബന്ധം പുലർത്തുന്നവനും, സ്വാർത്ഥനും അമിതവണ്ണമുള്ളവനും, ജോലിയിൽ വിശ്രമരഹിതനും പിടിവാശിക്കാരനുമാണ്. നീണ്ട കഴുത്തും, ഉയരവും ഉണ്ട് കൂടാതെ രോമാശ്രിതനുമാണ്. ദൃഷ്ടി ചന്ദ്രനിലാണെങ്കിൽ നിങ്ങൾ 80 വയസ്സുവരെ ജീവിക്കും. കൃഷ്ണ ഭദ്രപഥ നവമി രോഹിണിയിൽ നിങ്ങൾ മരണം നേരിടും.</p> <p> 11ആം വയസ്സിൽ നിങ്ങൾക്ക് ജല ഭയം ഉണ്ടാകും, പൊതുവേ നിങ്ങൾ ജലത്തെ ഭയക്കുന്നു. 16ആം വയസ്സിൽ നിങ്ങൾക്ക് ദുഷ്ട സ്ത്രീകളാലോ ആയുധങ്ങളാലോ ഉള്ള ഭയം ഉണ്ടാകും. 21ആം വയസ്സിൽ നാഗഭയവും പേരുദോഷവും ഉണ്ടാകും. 25ആം വയസ്സിൽ 3 അസന്തുലിതാവസ്ഥകൾ നിങ്ങൾ നേരിടും കൂടാതെ 11ഉം, 22ഉം, 33ഉം വയസ്സുകളിൽ നിങ്ങൾക്ക് കുരുക്കളും വന്യമൃഗങ്ങളാലുള്ള ഭയവും ഉണ്ടാകും. 66ഉം, 44ഉം വയസ്സുകളിൽ ചെവി, നേത്രം, ദന്തം എന്നിവയിൽ നിങ്ങൾക്ക് പ്രശ്നമുണ്ടാകാം. ഇടുപ്പിലും കൈയിലും മറുകുകൾ ഉണ്ടാകും. നിങ്ങൾ പൊതുവേ മറ്റുള്ളവരുടെ ചിലവിൽ ജീവിക്കുന്നവരും ചൂതാട്ടക്കാരനും ആണ്.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_12							= <p>ശസ്ത്രക്രിയകളോ അപകടങ്ങളോ വഴി രക്ത നഷ്ടം നേരിടേണ്ടിവരും. ആഢംബര പ്രേമിയാണ്, നിങ്ങൾക്ക് തിളങ്ങുന്ന നിറവും, മനോഹരമായ നേത്രങ്ങളും ഉണ്ട്, നന്നായി വസ്ത്രം ധരിക്കുവാൻ ഇഷ്ടപ്പെടുന്നു, സംഗീത പ്രേമിയാണ്, ആസക്തിയുള്ളവനാണ് കൂടാതെ നിങ്ങളുടെ ശരീരത്തിന്‍റെ ഇടതുവശം വേദനകളാൽ ബുദ്ധിമുട്ടും. നിങ്ങൾ ധനികനും, നല്ല പ്രകൃതമുള്ളവനും, സന്തുഷ്ടനും, അതിഥികളെ ഇഷ്ടപ്പെടുന്നവനും, ആത്മാർത്ഥതയുള്ള മകനും ആയിരിക്കും, ആദ്യവർഷം ജല ഭയവും 8ആം വയസ്സിൽ പനിയും 32ൽ പെട്ടെന്നുള്ള മരണത്താലുള്ള ഭയവും ഉണ്ടാകും.</p> <p>ഗ്രഹങ്ങളുടെ നല്ലഘട്ടം വന്നും പോയും ഇരിക്കും കൂടാതെ നിങ്ങൾക്ക് പ്രയാസമേറിയ വർഷങ്ങളിൽ ഗ്രഹങ്ങളുടെ നല്ല കാലയളവ് വന്നും പോയും ഇരിക്കും അപ്പോൾ നിങ്ങൾക്ക് 100 വർഷത്തോളം നീണ്ട ജീവിതം ഉണ്ടായിരിക്കും. ആത്മാഭിമാനം, വലിയ തല, മികച്ച കാഴ്ച്ചശക്തി, പ്രിയപ്പെട്ടവരുടെ അനുഗാമി, ബുദ്ധിമാൻ, ധനികൻ, ജല പ്രേമി, മുൻകോപി, പരസ്ത്രീ ബന്ധം, കരുണയുള്ളവൻ, ഇങ്ങനെയുള്ള നിങ്ങൾക്ക് ഏഴ് സഹോദരന്മാരും സഹോദരികളും ഉണ്ടാകും.</p> <p>20ആം വയസ്സിൽ മരണഭയം ഉണ്ടാകും, അശ്വതി കൃഷ്ണ ചതുർത്ഥിയിൽ, വ്യാഴാഴ്ച, രോഹിണി നക്ഷത്രത്തിൽ നദിക്കരയിലായിരിക്കും നിങ്ങളുടെ മരണം എന്ന് പ്രവചിച്ചിരിക്കുന്നു.</p> <p>12ആം വയസ്സ് പനി കൊണ്ടുവരും, 18ൽ നാഗഭയം, 22ൽ വിദേശ രാജ്യത്താലുള്ള ഭയം, 24ൽ പെട്ടെന്നുള്ള മരണമെന്ന ഭയം. 27ആം വയസ്സിൽ ജയഭയം, 32ൽ ആയുധ ഭയവും, നാഗ ഭയവും. നിങ്ങളുടെ 12ഉം, 24ഉം, 40ഉം, 48ഉം വയസ്സുകളിൽ നായ്ക്കളോടും നഖങ്ങളുള്ള മൃഗങ്ങളോടും കൂടാതെ വിലങ്ങുകളോടും ഉള്ള ഭയം.</p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>

	WHAT_IS_RASI								= Your Rashi As Per Astrology Classics