<!-- 'LalKitab-Remedies-Rules.asp -->

LALKITAB_REMEDIES_RULES                =  लाल किताब उपाययोजने संदर्भातील नियम
LALKITAB_REMEDIES_RULES1               =  सर्व उपाययोजना या जोपर्यंत अन्य कोणत्याही वेळेस करण्यास सांगितल्या जात नाही तोपर्यंत सुर्य वर असेल तेव्हा दिवसाच्या प्रकाशात कराव्यात, ढगाळ वातावरणात या उपाय योजना करू असे देखील सांगितले जाते. ढगाळ वातावरणाचे दिवस हे शनीच्या अधिपत्याखाली असतात. पण पश्चिमेकडील देशात जेथे हिवाळ्याचे दिवस बहुतांशवेळा गडद आणि उदास असतात, अशा ठिकाणी हे बंधन लागू पडत नाही.
LALKITAB_REMEDIES_RULES2               =  प्रदीर्घ काळासाठी केल्या जाणाऱ्या उपाय योजना जशा ६ दिवस, १० दिवस, ४३ दिवस इ. या शक्यतो मध्ये कोणताही व्यत्यय न घेता सलग कराव्यात. जर आपणास उपयोजनेचा सलग क्रम तुटण्याची धास्ती असेल तर अशा प्रसंगी आपल्या घरात थोडासा भात दुधात भिजवून ठेवावा. समजा आपली उपाययोजना ४३ दिवसांची आहे, आणि आपणास मध्येच चार दिवस बाहेर जावे लागणार आहे, त्या चार दिवसात तुम्ही उपाययोजना करू शकत नसाल तर अशा वेळेस तुम्ही परत आल्यानंतर ज्या टप्प्यावर उपाय योजना थांबविली आहे तेथून पुन्हा सुरु करू शकता
LALKITAB_REMEDIES_RULES3               =  एकावेळी एकच उपाययोजना करावी. पहिली संपल्यावरच दुसऱ्या उपायाला हात घालावा. उपाययोजनांचा काही विविक्षित क्रम ठरविला असेल तर तो पाळावा. जर क्रम दिला नसेल तर सर्वात सोपा पर्याय म्हणजे कमी दिवसाचा उपाय आधी करावा आणि अधिक दिवसांचे उपाय नंतर करावेत.
LALKITAB_REMEDIES_RULES4               =  पुढील उपाय योजना सुरु करण्यापूर्वी मध्ये थोडे थांबावे. शक्य असेल तर एक आठवड्याने नवीन उपाय सुरु करावा. जर रक्ताच्या नात्यातील व्यक्ती आपल्यावतीने उपाय योजना करत असेल तर तिने मनात एक संकल्प कायम ठेवावा की ही उपाय योजना मी अमुक अमुक यांच्या वतीने करत आहे. असे न केल्यास ती उपाययोजना त्याच्या स्वत:साठीची ठरू शकते आणि त्याचे इष्ट फळ मिळत नाही.

