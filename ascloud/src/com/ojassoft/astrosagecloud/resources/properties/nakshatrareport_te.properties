

	 WHAT_IS_NAKSHATRA							= నక్షత్రం అంటే ఏమిటి?
	 NAKSHATRA_INTRO							= నక్షత్రం అనేది హిందూ జ్యోతిషంలో చంద్రమాన గది. నక్షత్రం అనేది కాంతిమండలంలోని 27 విభాగాలలో (కొన్నిసార్లు 28 కూడా) ఒకటి. వారి పేర్లు వారికి సంబంధించిన అత్యంత ప్రాముఖ్య తారాగణములకు సంబంధించినవి. నక్షత్రాలకు ఆరంభం బిందువు,  స్పైకా, సంస్కృతభాషలో చిత్ర అని పిలువబడే నక్షత్రానికి నేరుగా ఎదురుగా నక్షత్రకక్ష్య పైన ఉన్న బిందువే (కొద్దిగా వేరుగా ఉన్న ఇతర నిర్వచనాలు ఉన్నాయి). ఇది మేషాది లేద “మేషం యొక్క ప్రారంభం” అని పిలువబడుతుంది. కాంతి కక్ష్య, ఈ బిందువునుండి ఆరంభమయి తూర్పువైపున నక్షత్రాలలో ఒక్కొక్కటిగా విభజించబడింది. నక్షత్రాల సంఖ్య, ఒక వాస్తవ నెలలోని రోజుల సంఖ్యను సూచిస్తుంది (ఆధునిక విలువ 27.32 రోజులు), ఇది సుమారుగా ఒకరోజులో చంద్రుని ద్వారా ప్రయాణించిన ఒక నక్షత్రపు వెడల్పు.  ఒక్కొక్క నక్షత్రం పావుభాగాలుగా (లేక పాదాలు) మరింత విభజించబడి ఉంటాయి. ఇవి ప్రఖ్యాతి గాంచిన హిందూ జ్యోతిషంలో ఒక పాత్రను పోషిస్తాయి, ఒక్కొక్క పాదం ఒక పదాశంతో కలిసి ఉండి, చంద్రుడు తత్సంబంధిత్గ పాదంలో ఉన్నపుడు జన్మించిన ఒక శిశువు పేరు లాగా మొదటి పదాశం సాంప్రదాయకంగా ఎంచుకోబడుతుంది.
