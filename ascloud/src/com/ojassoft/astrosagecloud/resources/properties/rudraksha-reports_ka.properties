HOW_TO_WEAR_SEVEN_FACED=ಏಳು ಮುಖ ರುದ್ರಾಕ್ಷವನ್ನು ಚಿನ್ನ/ಬೆಳ್ಳಿಯ ಧಾತುವಿನಲ್ಲಿ ತಯಾರಿಸಿ ಅಥವಾ ಹಾಗೆಯೆ ತಯಾರಿಸಿ ಧರಿಸಬಹುದು. ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಕೆಂಪು/ಕಪ್ಪು ದರದಲ್ಲಿ ಧರಿಸುವ ವಿಧಾನವಿದೆ ಅಥವಾ ನೀವು ಇದನ್ನು ಚಿನ್ನ/ಬೆಳ್ಳಿಯ ಸರಪಳಿಯಲ್ಲಿ ತಯಾರಿಸಿ ಧರಿಸಬಹುದು. ಅದಕ್ಕೆ ಮೊದಲು ರುದ್ರಾಕ್ಷವನ್ನು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ ಹಾಲಿನಿಂದ ಶುದ್ಧೀಕರಿಸಬೇಕು. ತದನಂತರ ಭೈರವ ದೇವರಿಗೆ ಕಪ್ಪು ಎಳ್ಳು, ಕಡ್ಡಿ , ದೀಪವನ್ನು ಹಚ್ಚಿಸಿ ಶನಿ ಮಂತ್ರ "ಓಂ ಪ್ರಾಂ ಪ್ರೀಂ ಪ್ರೌಂ ಸಃ ಶನೈಶ್ಚರಾಯ ನಮಃ" 108 ಬಾರಿ ಜಪಿಸಬೇಕು. ಈಗ ಶನಿವಾರದಂದು ಸೂರ್ಯಾಸ್ತದ ನಂತರ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/pushya-nakshatra-characteristics.asp">ಪುಷ್ಯ</a>, <a href="http://astrosage.com/hindi/nakshatra/anuradha-nakshatra-characteristics.asp">ಅನುರಾಧ</a>, <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">ಉತ್ತರಾಭಾದ್ರಪದ ನಕ್ಷತ್ರ</a> ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಧರಿಸುವುದು ಶುಭಕರ. 

RUDRAKSHA_EIGHT_FACED=<a href="http://buy.astrosage.com/rudraksha/aath-8-mukhi-rudraksha?&amp;language=hi">ಎಂಟು ಮುಖ ರುದ್ರಾಕ್ಷ</a> ಗಣೇಶ ಇದರ ಸ್ವಾಮಿ. ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಧರಿಸುವುದರಿಂದ ವ್ಯಕ್ತಿಗೆ ಇಂದಿಗೂ ವೈಫಲ್ಯವಾಗುವುದಿಲ್ಲ. ಜ್ಯೋತಿಷ್ಯ ಶಾಸ್ತ್ರದ ಪ್ರಕಾರ, <a href="http://www.astrosage.com/hindi/planet/rahu/">ರಾಹು </a> ಗೆ ಎಂದು ಮುಖ ರುದ್ರಾಕ್ಷದ ಅಧಿಪತ್ಯ ಸಿಕ್ಕಿದೆ. ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಕುತ್ತಿಗೆಯಲ್ಲಿ ಧರಿಸಬೇಕು ಅಥವಾ ಇದನ್ನು ಪೂಜೆ ಮಾಡುವ ಸ್ಥಳದಲ್ಲೂ ಇಡಬಹುದು. ಇದರ ಆರಾಧನೆ ಅಥವಾ ಇದನ್ನು ಧರಿಸುವುದರಿಂದ ವ್ಯಕ್ತಿಯ ಎಲ್ಲಾ ಅಡೆತಡೆಗಳನ್ನು ದೂರವಾಗುತ್ತವೆ. ಇದರ ಮೂಲಕ ವ್ಯಕ್ತಿ ಖ್ಯಾತಿ, ಸಮೃದ್ಧಿ ಮತ್ತು ಯಶಸ್ಸು ಪಡೆಯುತ್ತಾನೆ. ಶಿಕ್ಷಕರು, ವಿದ್ಯಾರ್ಥಿಗಳು ಮತ್ತು ಲೇಖಕರು ಯಶಸ್ಸು ಪಡೆಯಲು ಎಂಟು ಮುಖ ರುದ್ರಾಕ್ಷವನ್ನು ಧರಿಸವಿಬೇಕು. ಇದು ಚರ್ಮ ಮತ್ತು ಮೂಳೆಗಳಿಗೆ ಸಂಬಂಧಿಸಿದ ರೋಗಗಳನ್ನು ದೂರಗೊಳಿಸಲು ಬಹಳ ಪ್ರಯೋಜನಕಾರಿ. ಇದರ ಪರಿಣಾಮಾಡಿದಾಗಿ, ಪರಿಸರದಲ್ಲಿ ಹರಡಿರುವ ನಕಾರಾತ್ಮಕ ಶಕ್ತಿಗಳು ನಾಶವಾಗುತ್ತವೆ ಮತ್ತು ಮನುಷ್ಯನ ಜೀವನದಲ್ಲಿ ಮಾನಸಿಕ ಶಾಂತಿ ಮತ್ತು ಸ್ಥಿರತೆ ಮೇಲಗೈ ಸಾಧಿಸುತ್ತದೆ. 
