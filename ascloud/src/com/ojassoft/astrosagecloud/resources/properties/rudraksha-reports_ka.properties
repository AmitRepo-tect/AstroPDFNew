
RUDRAKSH_SUGGESTION_REPORT=ರುದ್ರಾಕ್ಷ  ಸಲಹೆ ರಿಪೋರ್ಟ್  ಸಹಾಯದಿಂದ   ನಿಮಗಾಗಿ ಸರಿಯಾದ ರುದ್ರಾಕ್ಷವನ್ನು ಆಯ್ಕೆ ಮಾಡಲು ನಿಮಗೆ ಸಾಧ್ಯವಾಗುತ್ತದೆ. ಸರಿಯಾದ ರುದ್ರಾಕ್ಷವನ್ನು ಧರಿಸಿದ ನಂತರ ನೀವು ಪ್ರತಿಯೊಂದು ಕ್ಷೇತ್ರದಲ್ಲಿ ಸಕಾರಾತ್ಮಕ ಫಲಿತಾಂಶವನ್ನು ಪಡೆಯುತ್ತೀರಿ. ರುದ್ರಾಕ್ಷವು ನಕಾರಾತ್ಮಕ ಶಕ್ತಿಯನ್ನು ನಾಶಪಡಿಸುತ್ತದೆ. 
RUDRAKSHA_AND_ITS_IMPORTANCE= <a href="http://buy.astrosage.com/rudraksha?language=hi"> ರುದ್ರಾಕ್ಷ </a> ಮುಖ್ಯವಾಗಿ ಇದು ಒಂದು ಬೀಜ, ಇದನ್ನು ರುದ್ರಾಕ್ಷ ಮರದಿಂದ ಪಡೆಯಲಾಗುತ್ತದೆ. ಮೂಲತಃ ಇದು ಸಂಸ್ಕೃತ ಪದ, ‘ರುದ್ರ’ ಮತ್ತು ‘ಅಕ್ಷ’ ಎರಡು ಪದಗಳನ್ನು ಸೇರಿಸಿ ಉಂಟಾಗಿದೆ. ಇದರಲ್ಲಿ ರುದ್ರ ಎಂದರೆ ಭಗವಂತ ಶಿವ ಎಂದರ್ಥ, ಅಕ್ಷ ಎಂದರೆ ಭಗವಂತ ಶಿವನ ಕಣ್ಣೀರಿನ ಹನಿ. ಅಂದರೆ ರುದ್ರಾಕ್ಷ ಎಂದರೆ ಭಗವಂತ ಶಿವನ ಕಣ್ಣು ಎಂದರಥ. ಧಾರ್ಮಿಕ ಗ್ರಂಥಗಳ ಪ್ರಕಾರ, ರುದ್ರಾಕ್ಷವು ಭಗವಂತ ಶಿವನ ಕಣ್ಣೀರಿನ ಹನಿಗಳಿಂದ ಹುಟ್ಟಿಕೊಂಡಿತು.
RECOMMENDATIONS=ಪ್ರಾಚೀನ ಧರ್ಮ ಗ್ರಂಥಗಳಲ್ಲಿ ವಿವಿಧ ರೀತಿಯ ರುದ್ರಾಕ್ಷಗಳ ಪ್ರಾಮುಖ್ಯತೆಯನ್ನು ತಿಳಿಸಲಾಗಿದೆ. ಆದ್ದರಿಂದ ನಿಮಗಾಗಿ ಯಾವ ರುದ್ರಾಕ್ಷ ಸರಿಯಾಗಿರುತ್ತದೆ? ಎಂಬುದಕ್ಕಾಗಿ ಜ್ಯೋತಿಷ್ಯ ಸಮಾಲೋಚನೆ ಅವಶ್ಯಕವಾಗದೆ. ಇದರಿಂದ ನೀವು ಅದರ ಸಂಪೂಣ ಪ್ರಯೋಜನವನ್ನು ಪಡೆಯಲಾಗುತ್ತದೆ. ಏಕೆಂದರೆ ಒಬ್ಬ ಕಲಿತ ಜ್ಯೋತಿಷಿ ಮಾತ್ರ ನಿಮ್ಮ <a href="http://hindi.astrosage.com/free/hindi-kundli.asp"> ಜನ್ಮ ಜಾತಕದ </a> ಅಧ್ಯಯನ ಮಾಡಿ ನಿಮಗೆ ಸರಿಯಾಗಿ ಹೇಳಬಲ್ಲರು. ರುದ್ರಾಕ್ಷದ ಹೆಚ್ಚಿನ ಲಾಭವನ್ನು ಪಡೆಯಲು ಅದನ್ನು  ವಿಧಿ ವಿಧಾನದಿಂದ ಧರಿಸುವುದು ಅಗತ್ಯ ಎಂಬುದನ್ನು ನೆನಪಿನಲ್ಲಿಡಿ. ಆದ್ದರಿಂದ ಈ ರಿಪೋರ್ಟ್ ನಲ್ಲಿ ರುದ್ರಾಕ್ಷದ ರೀತಿ ಮತ್ತು ರುದ್ರಾಕ್ಷವನ್ನು ಧರಿಸಲಾಗುವ ವಿಧಾನವನ್ನು ತಿಳಿಯೆಸಲಿದ್ದೇವೆ. 
IMPORTANCE_OF_NATURAL_RUDRAKSHA=ಇತ್ತೀಚಿನ ದಿನಗಳಲ್ಲಿ ನೈಸರ್ಗಿಕ ರುದ್ರಾಕ್ಷ ಮಾತುಕಟ್ಟೆಯಲ್ಲಿ ವಿರಳವಾಗಿ ಕಂಡುಬರುತ್ತದೆ. ಏಕೆಂದರೆ ಮಾರುಕಟ್ಟೆಯಲ್ಲಿ ಪ್ಲಾಸ್ಟಿಕ್ ಮತ್ತು ಫೈಬರ್ ಮೂಲಕ ತಯಾರಿಸಲಾಗಿರುವ ರುದ್ರಾಕ್ಷಗಳು ಬಹಳ ಸುಲಭವಾಗಿ ಸಿಗುತ್ತವೆ. ಇವುಗಳನ್ನು ಚೈನಾ ಮೂಲಕ ಬಹಳ ದೊಡ್ಡ ಪ್ರಮಾಣದಲ್ಲಿ ಫ್ಯಾಕ್ಟರಿಯಲ್ಲಿ ತಯಾರಿಸಲಾಗುತ್ತದೆ ಮತ್ತು ಜಾಗತಿಕ ಮಾರುಕಟ್ಟೆಯಲ್ಲಿ ಮಾರಾಟ ಮಾಡಲಾಗುತ್ತಿದೆ. ರಿಯಲ್ ರುದ್ರಾಕ್ಷವು ಬಹಳ ಸೀಮಿತ ಪ್ರಮಾಣದಲ್ಲಿದೆ. ಹವಾಮಾನವು ಅವುಗಳ ಉತ್ಪಾದನೆಯ ಮೇಲು ಪರಿಣಾಮ ಬೀರುತ್ತವೆ. ಕೃತಕ ರುದ್ರಾಕ್ಷಯವು ನೋಡುವುದರಲ್ಲಿ ನಿಜವಾದ ರುದ್ರಾಕ್ಷದಂತಿದೆ ಎಂಬುದರ ಬಗ್ಗೆ ಗಮನ ಹರಿಸಿ. ಸಾಮಾನ್ಯ ವ್ಯಕ್ತಿಯು ಇವುಗಳ ನಡುವಿನ ವ್ಯತ್ಯಾಸವನ್ನು ಕಂಡುಹಿಡಿಯಲು ಕಷ್ಟವಾಗುತ್ತದೆ ಮತ್ತು ಜ್ಯೋತಿಷ್ಯ ದೃಷ್ಟಿಕೋನದಿಂದ ಕೃತಕ ರುದ್ರಾಕ್ಷಕ್ಕೆ ಯಾವುದೇ ಪ್ರಾಮುಖ್ಯತೆ ಇಲ್ಲ. ಆದರೆ  ಬಳಿ 100 % ನೈಸರ್ಗಿಕ ರುದ್ರಾಕ್ಷ ಲಭ್ಯವಿದೆ.  ಇದನ್ನು ಧರಿಸಿ ನೀವು ಜ್ಯೋತಿಷ್ಯ ಪ್ರಯೋಜನವನ್ನು ಪಡೆಯಬಹುದು. ನಮ್ಮ ರುದ್ರಾಕ್ಷದ ವಾಸ್ತವತೆಯನ್ನು ಲ್ಯಾಬ್ನಿಂದ ಪ್ರಮಾಣೀಕರಿಸಲಾಗಿದೆ. 




RUDRAKSHA_ONE_FACED =<a href="http://buy.astrosage.com/rudraksha/ek-1-mukhi-rudraksha?&amp;language=hi">ಒಂದು ಮುಖ ರುದ್ರಾಕ್ಷ</a> ನಿಮ್ಮ ಕರ್ಮವನ್ನು ಸಖಾರಾಂತ್ಮಕ ರೂಪದಲ್ಲಿ ಪರಿವರ್ತಿಸುತ್ತದೆ. ಭಗವಂತ ಶಿವನ ಸಂಕೇತವಾಗಿರುವ ಕಾರಣದಿಂದಾಗಿ ಒಂದು ಮುಖ ರುದ್ರಾಕ್ಷವನ್ನು ಬಹಳ ಪವಿತ್ರ ಎಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ಇದನ್ನು ಧರಿಸುವ ವ್ಯಕ್ತಿಯನ್ನು ದುಷ್ಟ ಶಕ್ತಿಗಳಿಂದ ರಕ್ಷಿಸಲಾಗುತ್ತದೆ ಮತ್ತು ಅವನು ಯಾವಾಗಲು ಒಳ್ಳೆಯ ಹಾದಿಯಲ್ಲಿ ನಡೆಯುತ್ತಾನೆ. ಇದರ ಪರಿಣಾಮದಿಂದಾಗಿ ವ್ಯಕ್ತಿಯ ಆಂತರಿಕ ಶಕ್ತಿಗಳು ಜಾಗೃತಗೊಳ್ಳುತ್ತವೆ. ಆದ್ದರಿಂದ ನೀವು ಆಧ್ಯಾತ್ಮಿಕ ಜ್ಞಾನವನ್ನು ಪಡೆಯಲು ಬಯಸುತ್ತಿದ್ದರೆ, ಈ ರುದ್ರಾಕ್ಷವು ನಿಮಗಾಗಿ ಉಪಯುಕ್ತವಾಗಿರುತ್ತದೆ. ಒಂದು ಮುಖ ರುದ್ರಾಕ್ಷದ ಅಧಿಪತಿ <a href="http://www.astrosage.com/hindi/planet/sun/">ಸೂರ್ಯ</a> ಗ್ರಹವಾಗಿದೆ ಆದ್ದರಿಂದ ನಮ್ಮ ಆತ್ಮ ಚೇತನವನ್ನು ಜಾಗೃತಗೊಳಿಸುತ್ತದೆ. ಧ್ಯಾನದ ಕ್ರಿಯೆಗಾಗಿ ಇದು ಬಹಳ ಪ್ರಯೋಜನಕಾರಿ. <a href="http://horoscope.astrosage.com/hindi/ek-mukhi-rudraksha-ke-labh/">ಒಂದು  ಮುಖ ರುದ್ರಾಕ್ಷದಲ್ಲಿ ಪವಾಡದ ಗುಣಗಳು</a> ಅಸ್ತಿತ್ವದಲ್ಲಿವೆ. ಇದು ಅಧಿಕ ತಾಪಮಾನ ಮತ್ತು ರಕ್ತದೊತ್ತಡದಂತಹ ಸಮಸ್ಯೆಗಳನ್ನು ದೂರಮಾಡುತ್ತದೆ. ಒಂದು ಮುಖ ರುದ್ರಾಕ್ಷವು ಸೂರ್ಯನಂತೆ ನಿಮ್ಮ ನಾಯಕತ್ವದ ಸಾಮರ್ಥ್ಯವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ  ಮತ್ತು ಇದು ದಾರಿಯಲ್ಲಿ ಬರಲಾಗುವ ಸವಾಲುಗಳನ್ನು ಸಹ ದೂರವಾಗಿಸುತ್ತದೆ. 
HOW_TO_WEAR_ONE_FACED  =ಒಂದು ಮುಖ ರುದ್ರಾಕ್ಷವನ್ನು ಚಿನ್ನ ಅಥವಾ ಬೆಳ್ಳಿಯಲ್ಲಿ ತಯಾರಿಸಿ ಅಥವಾ ಹಾಗೆಯೆ ಧರಿಸಬಹುದು. ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಕೆಂಪು, ಕಪ್ಪು ಅಥವಾ ಚಿನ್ನ - ಬೆಳ್ಳಿಯ ಸರಪಳಿಯೊಂದಿಗೆ ಧರಿಸುವ ವಿಧಾನವಿದೆ. ರುದ್ರಾಕ್ಷವನ್ನು ಧರಿಸುವ ಮೊದಲು ಇದನ್ನು ಶುದ್ಧೀಕರಿಸಲು ಇದರ ಮೇಲೆ ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ ಹಾಲನ್ನು ಸಿಂಪಡಿಸಿ. ಅದರ ನಂತರ ಭಗವಂತ ಶಿವ ಅಥವಾ ಭಗವಂತ ವಿಷ್ಣುವಿಗೆ ಬಿಳಿ ಅಥವಾ ಕೆಂಪು ಹೂವು ಅರ್ಪಿಸಿ ಮತ್ತು ಕಡ್ಡಿಗಳೊಂದಿಗೆ ಆರಾಧಿಸಿ. 108 ಬಾರಿ ಸೂರ್ಯ ಬೀಜ ಮಂತ್ರವನ್ನು "ಓಂ ಹ್ರಾಂ ಹ್ರೀಂ ಹ್ರೌಂ ಸಃ ಸೂರ್ಯಾಯ ನಮಃ" ಪಠಿಸಿ. ಮೇಲಿನ ವಿಧಾನವನ್ನು ಅನುಸರಿಸಿದ ನಂತರ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/krittika-nakshatra-characteristics.asp">ಕೃತಿಕಾ</a>, <a href="http://astrosage.com/hindi/nakshatra/uttara-phalguni-nakshatra-characteristics.asp">ಫಾಲ್ಗುಣಿ</a> ಮತ್ತು <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">ಉತ್ತರಾಷಾಢಾ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಧರಿಸಬಹುದು.

RUDRAKSHA_TWO_FACED	=<a href="http://buy.astrosage.com/rudraksha/do-2-mukhi-rudraksha?&amp;language=hi">ಎರಡು ಮುಖ ರುದ್ರಾಕ್ಷ</a> ಗಂಡ-ಹೆಂಡತಿಯ ನಡುವೆ ಉತ್ತಮ ಸಾಮರಸ್ಯವನ್ನು ಉಂಟುಮಾಡುತದೆ. ಧರ್ಮ ಗ್ರಂಥಗಳ ಪ್ರಕಾರ, ಈ ರುದ್ರಾಕ್ಷವು ಭಗವಂತ ಶಿವನ ಅರ್ಧನರೇಶ್ವರ ರೂಪದ ಸಂಕೇತವಾಗಿದೆ. ಶಂಕರನ ಈ ರೂಪದಲ್ಲಿ ಸ್ವತಃ ಭೋಲೇನಾಥ ಮತ್ತು ತಾಯಿ ಪಾರ್ವತಿಯ ಸಮಾನವಾದ ನೋಟವನ್ನು ನೋಡಲಾಗುತ್ತದೆ. ವೈದಿಕ ಜ್ಯೋತಿಷ ಶಾಸ್ತ್ರದ ಪ್ರಕಾರ ಎರಡು ಮುಖ ರುದ್ರಾಕ್ಷದ ಅಧಿಲಾತಿ <a href="http://www.astrosage.com/hindi/planet/moon/">ಚಂದ್ರ ಗ್ರಹ</a> ವಾಗಿದೆ. ಒಬ್ಬ ವ್ಯಕ್ತಿಯ ಜನ್ಮ ಜಾತಕದಲ್ಲಿ ಚಂದ್ರ ಗ್ರಹವು ದುರ್ಬಲ ಸ್ಥಾನದಲ್ಲಿದ್ದರೆ, ಅಂತಹ ವ್ಯಕ್ತಿಯು ಎರಡು ಮುಖ ರ್ದ್ರಾಕ್ಷವನ್ನು ಧರಿಸಬೇಕು. ಇದನ್ನು ಆರಾಧಿಸುವುದರಿಂದ ವ್ಯಕ್ತಿಯ ಜೀವನದಿಂದ ಎಲ್ಲಾ ನೋವುಗಳು ದೂರವಾಗುತ್ತವೆ. ವಿಶೇಷವಾಗಿ  ಗರ್ಭಿಣಿಯರು ಇದನ್ನು ಆರಾಧಿಸಬೇಕು. ಇದನ್ನು ಧರಿಸುವುದರಿಂದ ವ್ಯಕ್ತಿಯು ಜೀವನದಲ್ಲಿ ಹಣಕಾಸು ಮತ್ತು ಸಮೃದ್ಧಿಯನ್ನು ಪಡೆಯುತ್ತಾನೆ. ಇದು ಹೃದಯ, ಶ್ವಾಸಕೋಶಗಳು, ಮೆದುಳು ಮತ್ತು ಎಡಗಣ್ಣಿಗೆ ಸಂಬಂಧಿಸಿದ ರೋಗಗಳನ್ನು ನಿರ್ಮೂಲನೆ ಮಾಡಲು ಪ್ರಯೋಜನಕಾರಿಯಾಗಿದೆ. 
HOW_TO_WEAR_TWO_FACED	=ಎರಡು ಮುಖ ರುದ್ರಾಕ್ಷವನ್ನು ಚಿನ್ನ ಅಥವಾ ಬೆಳ್ಳಿಯಲ್ಲಿ ತಯಾರಿಸಿ ಅಥವಾ ಹಾಗೆಯೆ ಧರಿಸಬಹುದು. ಇದನ್ನು ಸೋಮವಾರ, ಗುರುವಾರ ಅಥವಾ ಶಿವರಾತ್ರಿಯ ದಿನದಂದು ಧರಿಸಬಹುದು. ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಕೆಂಪು ಅಥವಾ ಕಪ್ಪು ದಾರ, ಚಿನ್ನ - ಬೆಳ್ಳಿಯ ಸರಪಳಿಯಲ್ಲಿ ತಯಾರಿಸಿ ಧರಿಸುವ ವಿಧಾನವಿದೆ. ಆದರೆ ಧರಿಸುವ ಮೊದಲು ರುದ್ರಾಕ್ಷವನ್ನು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ ಹಾಲಿನಿಂದ ಶುದ್ಧೀಕರಿಸಿ ನಂತರ ಶಿವ-ಪಾರ್ವತಿಗೆ ಬಿಳಿ ಹೂವೂ, ಅಕ್ಕಿ, ಸಾಂಬ್ರಾಣಿ ಮತ್ತು ಕಡ್ಡಿಯನ್ನು ಅರ್ಪಿಸುತ್ತ ಚಂದ್ರ ಮಂತ್ರವನ್ನು ಓಂ ಶ್ರಾಂ ಶ್ರೀಂ ಶ್ರೌಂ ಸಃ ಚನ್ದ್ರಮಸೇ ನಮಃ" 108 ಬರಿ ಜಪಿಸಬೇಕು. ಮೇಲಿನ ವಿಧಾನದ ನಂತರ ಸೋಮವಾರ, ಪೂರ್ಣಿಮೆ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/hasta-nakshatra-characteristics.asp">ಹಸ್ತ</a>, <a href="http://astrosage.com/hindi/nakshatra/rohini-nakshatra-characteristics.asp">ರೋಹಿಣಿ</a>, <a href="http://astrosage.com/hindi/nakshatra/sravana-nakshatra-characteristics.asp">ಶ್ರವಣ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಧರಿಸಿ. 

RUDRAKSHA_THREE_FACED	=<a href="http://buy.astrosage.com/rudraksha/teen-3-mukhi-rudraksha?&amp;language=hi">ಮೂರು ಮುಖ ರುದ್ರಾಕ್ಷ</a> ವನ್ನು ಧರಿಸುವುದರಿಂದ ವ್ಯಕ್ತಿಯು ಭಗವಂತ ಬ್ರಹ್ಮ, ವಿಷ್ಣು ಮತ್ತು ಮಹೇಶ್ವರನ ಅನುಗ್ರಹವನ್ನು ಪಡೆಯುತ್ತಾನೆ. ಇದರ ಪರಿಣಾಮದಿಂದಾಗಿ ವ್ಯಕ್ತಿಯಲ್ಲಿ ಅಸಾಧಾರಣ ಗುಣಲಕ್ಷಣಗಳು ಬೆಳೆಯುತ್ತವೆ. ವ್ಯಕ್ತಿಯು ತನ್ನಲ್ಲಿ ಅದ್ಭುತವಾದ ಶಕ್ತಿಯನ್ನು ಅನುಭವಿಸುತ್ತಾನೆ ಮತ್ತು ಆ ಶಕ್ತಿಯಿಂದ ಅವನ ಜೀವನದ ಕಷ್ಟಗಳು ದೂರವಾಗುತ್ತವೆ. ಇದು ಮನುಷ್ಯನ ಎಲ್ಲಾ ಕಷ್ಟಗಳು ಮತ್ತು ಪಾಪಗಳನ್ನು ನಾಶಪಡಿಸುತ್ತದೆ ಮತ್ತು ದೇಹ ಮತ್ತು ಮನಸ್ಸಿನಿಂದ  ವ್ಯಕ್ತಿಯನ್ನು ಶುದ್ಧೀಕರಿಸುತ್ತದೆ. ಇದರ ಪರಿಣಾಮದಿಂದಾಗಿ ವ್ಯಕ್ತಿಯ ಆತ್ಮವಿಷ್ಯವಾಸವು ಬೆಳೆಯುತ್ತದೆ. ಈ ರುದ್ರಾಕ್ಷದ ಮಾಲೀಕ ಅಗ್ನಿ ದೇವ.ಆದ್ದರಿಂದ ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಧರಿಸುವ ವ್ಯಕ್ತಿಯ ಜೀವನದ ನಕಾರಾತ್ಮಕತೆ ಸುಟ್ಟುಹೋಗುತದೆ ಮತ್ತು ವ್ಯಕ್ತಿಯು ಬಯಸಿದ ಫಲಿತಾಂಶಗಳನ್ನು ಪಡೆಯುತ್ತಾನೆ. <a href="http://www.astrosage.com/hindi/planet/mars/">ಮಂಗಳ ಗ್ರಹ</a> ಮೂರು ಮುಖ ರುದ್ರಾಕ್ಷದ ಅಧಿಪತಿ. ಇದನ್ನು ಧರಿಸುವುದರಿಂದ ವ್ಯಕ್ತಿಯ ಜಾತಕದಿಂದ <a href="http://hindi.astrosage.com/free/mangal-dosha-report.asp">ಮಂಗಳ ದೋಷ</a> ದೂರವಾಗುತ್ತದೆ.  ಇದು ಸ್ಥಳೀಯನನ್ನು ಮಾನಸಿಕ ಒತ್ತಡ, ಸಾಲ, ಆಂತಕ, ಭಯ ಇತ್ಯಾದಿ ಸಮಸ್ಯೆಯಿಂದ ರಕ್ಷಿಸುತ್ತದೆ. 
