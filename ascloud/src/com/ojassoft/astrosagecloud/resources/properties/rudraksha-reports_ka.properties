HOW_TO_WEAR_SIX_FACED	=ಆರು ಮುಖ ರುದ್ರಾಕ್ಷವನ್ನು ಚಿನ್ನ/ಬೆಳ್ಳಿಯ ಧಾತುವಿನಲ್ಲಿ ತಯಾರಿಸಿ ಧರಿಸಬಹುದು. ಈ ರುದ್ರಾಕ್ಷವನ್ನು ಕೆಂಪು/ ಕಪ್ಪು ದಾರದೊಂದಿಗೆ ಧರಿಸುವ ವಿಧಾನವಿದೆ  ಅಥವಾ ಇದನ್ನು ನೀವು ಚಿನ್ನ ಅಥವಾ ಬೆಳ್ಳಿಯ ಸರಪಳಿಯಲ್ಲಿ ತಯಾರಿಸಿ ಧರಿಸಬಹುದು. ಆದರೆ ಇದನ್ನು ಧರಿಸುವ ಮೊದಲು ಗಂಗಾಜಲ ಅಥವಾ ಹಸಿ ಹಾಲಿನಿಂದ ಶುದ್ದೀಕರಿಸಬೇಕು. ಇದರ ನಂತರ ತಾಯಿ ಲಕ್ಷ್ಮಿಗೆ ಬಿಳಿ ಹೂವು ಅರ್ಪಿಸಿ ಅವರನ್ನು ಪೂಜಿಸಿ "ಓಂ ದ್ರಾಂ ದ್ರೀಂ ದ್ರೌಂ ಸಃ ಶುಕ್ರಾಯ ನಮಃ" ಮಂತ್ರವನ್ನು 108 ಬಾರಿ ಜಪಿಸಬೇಕು. ಈ ವಿಧಾನವನ್ನು ಅನುಸರಿಸಿದ ನಂತರ ರುದ್ರಾಕ್ಷವನ್ನು ಶುಕ್ರವಾರ ಅಥವಾ <a href="http://astrosage.com/hindi/nakshatra/bharani-nakshatra-characteristics.asp">ಭರಣಿ</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-phalguni-nakshatra-characteristics.asp">ಪೂರ್ವಾಫಾಲ್ಗುಣಿ</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-shadha-nakshatra-characteristics.asp">ಪೂರ್ವಾಷಾಢಾ ನಕ್ಷತ್ರ</a> ದಲ್ಲಿ ಧರಿಸಬೇಕು

