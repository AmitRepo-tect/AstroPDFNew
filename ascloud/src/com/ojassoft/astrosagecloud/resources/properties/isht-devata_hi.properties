ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN6 = <b>कार्तिकेय/मुरुगन देव का मंत्र</b><br />कार्तिकेय या मुरुगन देव की पूजा अर्चना के समय उनके विशेष मंत्रों का जाप करने से लाभ मिलता है। इस दौरान आप इस मंत्र का जाप कर सकते हैं।<br /><br /><center><b><i>“देव सेनापते स्कंद कार्तिकेय भवोद्भव।<br />कुमार गुह गांगेय शक्तिहस्त नमोस्तु ते॥”</i></b></center><br />अपने इष्ट देव कार्तिकेय या मुरुगन देव की पूजा अर्चना कर आप उनका आशीर्वाद प्राप्त कर सकते हैं।

ISHT_DEVTA_LORD_VISHNU1 = <b><u>भगवान विष्णु</u></b><br />बृहस्पति ग्रह के अनुसार आपके इष्ट देवता भगवान विष्णु हैं। जीवन में सुख शांति प्राप्त करने के लिए अपने इष्ट देव की पूजा अर्चना अवश्य रूप से करनी चाहिए।<br /><br />भगवान विष्णु को संसार के पालन हार के रूप में भी जाना जाता है। सभी नव ग्रहों में से एक, बृहस्पति ग्रह का प्रतिनिधित्व भी भगवान विष्णु जी को ही प्राप्त है। हिन्दू धर्म को माने वाले लोग विष्णु जी की पूजा अर्चना विशेष रूप से करते हैं। विष्णु जी के उपासक उन्हें नारायण के नाम से भी पुकारते हैं। समस्त संसार के पालन कर्ता भगवान विष्णु के करीब 108 नाम हैं। पौराणिक मान्यताओं अनुसार विष्णु जी क्षीर सागर में शेषनाग के ऊपर विराजमान रहते हैं। अपने इष्ट देव विष्णु जी की पूजा अर्चना संपूर्ण विधि से करके आप भी उनका आशीर्वाद प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_VISHNU2 = <b>भगवान विष्णु का संछिप्त परिचय</b><br />इस संपूर्ण संसार को चलाने का भार मुख्य रूप से तीन देवों के ऊपर है: ब्रह्मा, विष्णु और महेश। ब्रह्मा जी ने जहाँ संसार की उत्पत्ति की, वहीं विष्णु जी इसके पालन हार बने, तो भगवान शिव को संहारक के रूप में जाना जाता है। चूंकि इस संसार के लोगों का पालन करने का भार विष्णु जी को दिया गया है, इसलिए उन्हें पालन हार भी कहते हैं। इसके अलावा इतिहास गवाह है कि जब-जब धरती लोक में पाप बढ़ा है और जन-जीवन अस्त-व्यस्त हुआ है, तब-तब उन्होनें विभिन्न अवतार लेकर पृथ्वी और उसके जन-मानस की रक्षा की है। इसी क्रम में त्रेता युग में उन्होनें श्रीराम का अवतार लेकर रावण का वध किया। इसी प्रकार से महाभारत काल में उन्होनें श्री कृष्ण का अवतार लेकर कौरवों का वध किया।<br /><br />
ISHT_DEVTA_LORD_VISHNU3 = <b>विष्णु जी के पूजा अर्चना का विशेष दिन</b><br />भगवान विष्णु की पूजा अर्चना वैसे तो किसी भी दिन की जा सकती है लेकिन विशेष लाभ प्राप्त करने के लिए बृहस्पति वार के दिन खासतौर से विष्णु जी की पूजा अर्चना की जानी चाहिए। गुरुवार के दिन संपूर्ण विधि विधान के साथ यदि विष्णु जी पूजा अर्चना की जाए तो इससे जीवन के सभी क्षेत्रों में सफलता के साथ लाभ की प्राप्ति होती है। इसके साथ ही हिन्दू धर्म में “अनंत चतुर्दशी” और “देवोत्थान एकादशी” के दिन को भगवान विष्णु जी की उपासना का दिन माना जाता है। इस दिन भी विशेष विधि अनुसार विष्णु जी की पूजा अर्चना की जाती है।<br /><br />
ISHT_DEVTA_LORD_VISHNU4 = <b>विष्णु जी की पूजा अर्चना की ख़ास विधि</b><br /><ul><li>भगवान विष्णु की पूजा अर्चना यदि आप बृहस्पति वार के दिन करते हैं तो इस दिन खासतौर से पीले रंग का इस्तेमाल अवश्य करें।</li><li>सुबह स्नान करने के बाद पीले रंग के वस्त्र धारण करें और उसके पश्चात भगवान विष्णु की पूजा अर्चना का संकल्प लें।</li><li>विष्णु जी की मूर्ती को जल अर्पित करें और पूजा की विधि आरंभ करें।</li><li>इसके बाद विष्णु जी की मूर्ती पर फूलों की माला चढ़ाएं।</li><li>प्रसाद के रूप में वैसे तो फल आदि भी चढ़ाएं जा सकते हैं लेकिन यदि आप बृहस्पति वार के दिन पूजा अर्चना कर रहे हैं तो खासतौर से चना और गुड़ प्रसाद स्वरुप चढ़ाएं।</li><li>पूजा विधि संपन्न करने के बाद विष्णु जी की आरती करें।</li><li>पूजा के दौरान विष्णु मंत्रों का उच्चारण करना ना भूलें।</li><li>पूजा के दौरान विष्णु जी को जेनऊ भी चढ़ाया जाता है।</li><li>पूजन विधि करते समय सफ़ेद चावल की जगह तिल का प्रयोग करें।</li></ul><br />
ISHT_DEVTA_LORD_VISHNU5 = <b>भगवान विष्णु के विशेष मंत्रों का उच्चारण करें</b><br />अपने इष्ट देवता भगवान विष्णु की पूजा अर्चना के क्रम में कुछ विशेष विष्णु मंत्रों का उच्चारण करने से भी लाभ की प्राप्ति होती है। ये विशेष मंत्र निम्लिखित हैं।<br /><br /><b>1. "ॐ नमोः नारायणाय. ॐ नमोः भगवते वासुदेवाय"<br />2. “ऊँ नारायणाय विद्महे।वासुदेवाय धीमहि। तन्नो विष्णु प्रचोदयात्”</b><br /><br />इस प्रकार से आप भी अपने इष्ट देव भगवान श्री विष्णु की पूरी विधि विधान से पूजा अर्चना कर लाभ की प्राप्ति कर सकते हैं।<br /><br />

ISHT_DEVTA_LORD_THIRUMAL1 = <b><u>तिरुपति बालाजी (तिरुमला)</u></b><br />बृहस्पति ग्रह के अनुसार आपके इष्ट देव तिरुपति बालाजी या तिरुमलाा हैं। जीवन को शांतिपूर्ण और सुखमय बनाये रखने के लिए खासतौर से आपको अपने इष्ट देव तिरुपति बालाजी या तिरुमला की पूजा अर्चना अवश्य करनी चाहिये।<br /><br />
ISHT_DEVTA_LORD_THIRUMAL2 = <b>विष्णु जी के अवतार हैं श्री बालाजी या तिरुमला</b><br />श्री बालाजी या तिरुमला को मुख्य रूप से विष्णु जी का अवतार माना जाता है। दक्षिण भारत में रहने वाले लोग इनकी विशेष रूप से पूजा करते हैं। तिरुपति स्थित बालाजी मंदिर भारत के प्रसिद्ध धार्मिक स्थलों में से एक है। तिरुमला का ये मंदिर मुख्यतः अपने अलौकिक और चमत्कारिक शक्तियों के लिए अपनी ख़ास पहचान रखता है। आपके इष्ट देव होने की वजह से भगवान तिरुमला या बालाजी की पूजा अर्चना कर आप भी उनकी अलौकिक शक्ति से लाभ प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_THIRUMAL3 = <b>भगवान बालाजी का संछिप्त परिचय</b><br />पौराणिक हिन्दू मान्यताओं के अनुसार भगवान बालाजी को विष्णु जी का प्रतिरूप माना जाता है। इन्हें भगवान वेंकेटेश्वर, बालाजी और तिरुमला के नाम से भी जाना जाता है। एक अन्य मान्यता के अनुसार भगवान बालाजी में लक्ष्मी माता का अंश भी माना गया है। अपने अलौकिक महिमा की वजह से देश विदेश से भक्त तिरुपति श्री बालाजी के दर्शन के लिए आते हैं। उन्होनें तिरुपति के सात पहाड़ों की चढ़ाई की थी, जिस वजह से भगवान श्रीनिवास ने उन्हें विशेष आशीर्वाद और शक्ति प्रदान की। ऐसा माना जाता है कि श्री बालाजी करीब 120 वर्षों तक जीवित थे। तिरुपति स्थित बालाजी मंदिर में स्थापित इनके मूर्ति में लगे बाल को असली माना जाता है। इसके साथ ही साथ लोगों की मानें तो बालाजी की मूर्ति से पसीना भी निकलता है। बहरहाल ऐसा माना जाता है कि श्री बालाजी आज भी अपने भक्तों के लिए मौजूद रहते हैं और इसलिए तिरुपति मंदिर में आने वाले भक्तों की संख्या भी काफी ज्यादा रहती है।<br /><br />
ISHT_DEVTA_LORD_THIRUMAL4 = <b>भगवान बालाजी या तिरुमला के पूजा का विशेष दिन</b><br />वैसे तो भगवान श्री बालाजी की पूजा का कोई विशेष दिन नहीं है लेकिन वैकुंठ एकादशी के मौके पर विशेष तौर से श्री बालाजी या तिरुमला के दर्शन के लिए लाखों की संख्या में भक्त तिरुपति मंदिर में उनके दर्शन के लिए आते हैं। ऐसी मान्यता है कि इस दिन तिरुमला भगवान के दर्शन करने से व्यक्ति को उनके सभी पापों से मुक्ति मिलती है और वो जन्म मृत्यु के बंधन से मुक्त हो जाते हैं। आप अपने इष्ट देव श्री बालाजी की विशेष पूजा आराधना कर उनसे ख़ास आशीर्वाद प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_THIRUMAL5 = <b>भगवान बालाजी या तिरुमला के पूजा की ख़ास विधि</b><br /><ul><li>भगवान बालाजी या तिरुमला की पूजा अर्चना के लिए विशेष रूप से सुबह के वक़्त उठकर स्नान करें।</li><li>इसके बाद सच्चे मन से श्री बालाजी का सच्चे मन से ध्यान करें।</li><li>सबसे पहले उन्हें चंदन का टीका लगाएँ। विशेष रूप से तिरुपति मंदिर में हर शुक्रवार के दिन बालाजी को चंदन का लेप लगाया जाता है।</li><li>सबसे पहले श्री बालाजी को फूल चढ़ाएं, उसके बाद उन्हें जल चढ़ाएं।</li><li>इसके बाद उन्हें धूप दीप दिखाए।</li><li>श्री बालाजी या तिरुमला को प्रसाद के रूप में आटा, चीनी, गुड़ और मेवे आदि के मिश्रण से बना लड्डू चढ़ाएं।</li><li>श्री बालाजी के विशेष मंत्रों का जाप करें।</li></ul><br />
ISHT_DEVTA_LORD_THIRUMAL6 = <b>श्री बालाजी या तिरुमला के इस मन्त्र का करें जाप</b><br />अपने इष्ट देव के मंत्रों का जाप करने से उनकी विशेष कृपा दृष्टि प्राप्त होती है। खासतौर से बालाजी के इन मंत्रों का उच्चारण करने से सभी पापों से मनुष्य को मुक्ति मिलती है। श्री बालाजी या तिरुमला के ये विशेष मंत्र निम्नलिखित हैं।<br /><br /><center><b><i>“ॐ श्री वेंकटेश्वराये नमो नमः<br />श्रीमन नारायण नमो नमः<br />तिरुमला तिरुपति नमो नमः<br />जय बालाजी नमो नमः”</i></b></center><br />इस मंत्र का उच्चारण करने से हर प्रकार के भय से भी मुक्ति मिलती है। बहरहाल आप भी अपने इष्ट देव श्री बालाजी के इन मंत्रों का उच्चारण कर उन्हें प्रसन्न कर सकते हैं और उनका आशीर्वाद प्राप्त कर सकते हैं।

ISHT_DEVTA_LORD_SRI_VAMANA1 = <b><u>वामन देव</u></b><br />बृहस्पति ग्रह के अनुसार आपके इष्ट देव वामन देव हैं। हिन्दू धार्मिक प्रमाणों के अनुसार वामन देव को भगवान विष्णु का ही अवतार माना जाता है। अपने इष्ट देव को प्रसन्न करने के लिए यदि आप अपने इष्ट देव की पूजा अर्चना सही विधि-विधान से करते हैं तो इससे आपको विशेष लाभ की प्राप्ति होती है।<br /><br />
ISHT_DEVTA_LORD_SRI_VAMANA2 = <b>पृथ्वी को बचाने के लिए भगवान विष्णु ने लिया था वामन अवतार</b><br />पौराणिक ग्रंथों अनुसार देवताओं पर दैत्यों के बढ़ते आतंक को देखते हुए विष्णु जी ने पृथ्वी पर वामन अवतार लिया था। उन्होनें ब्राह्मण रूप धारण कर राजा महा अभिमानी बलि के चंगुल से देवताओं को मुक्ति दिलाई थी। दैत्य राज बलि ने स्वर्ग लोक पर हमला कर इंद्र देव सहित समस्त देवताओं को बंदी बना लिया था। देवताओं पर होने वाली इस क्रूरता को देखते हुए भगवान विष्णु जी ने वामन के रूप में अवतार लिया था। वो राजा बलि के घर ब्राह्मण रूप में भिक्षा मांगने गए थे। भिक्षा के तौर पर उन्होनें राजा बलि से महज तीन पग ज़मीन मांगी थी जो बलि ने उन्हें दे दी थी। वामन देव ने महज एक पग में पूरी धरती, दूसरे पग में स्वर्ग और जब तीसरे पग के लिए जगह नहीं बची तो राजा बलि ने अपना सर आगे कर दिया।<br /><br />
ISHT_DEVTA_LORD_SRI_VAMANA3 = <b>वामन देव का संछिप्त परिचय</b><br />वामन देव ने प्रसिद्द ऋषि कश्यप और उनकी पत्नी अदिति के घर जन्म लिया था। माता अदिति ने दैत्यों के प्रकोप से ब्राह्मणों और देवताओं की रक्षा के लिए भगवान विष्णु की सच्ची भावना से कठोर तपस्या की थी। उनकी तपस्या से प्रसन्न होकर विष्णु जी ने वामन रूप में माता अदिति की गोद से जन्म लिया। इसके साथ ही वामन देव के रूप में ही अहंकारी राजा बलि के कब्जे से उन्होनें स्वर्ग लोक को वापिस लेकर देवताओं को सौंपा था। उन्होनें राजा बलि के माध्यम से पूरी दुनिया को ये पाठ पढ़ाया कि अहंकारी लोगों की अंत में हार ही होती है। वामन देव ने बिना किसी युद्ध और हथियार का प्रयोग कर सभी देवताओं को राजा बलि के आतंक से मुक्ति दिलाई थी। इसी लिए आज भगवान विष्णु रूपी वामन देव की पूजा अर्चना समस्त भारत में की जाती है, दक्षिण भारत के लोग उन्हें उपेंद्र देव के नाम से भी पूजते हैं।<br /><br />
ISHT_DEVTA_LORD_SRI_VAMANA4 = <b>वामन देव की पूजा अर्चना का विशेष दिन</b><br />वामन देव ने त्रेतायुग में भगवान विष्णु के अवतार के रूप में शुक्ल पक्ष की द्वादशी को जन्म लिया था। इसलिए हर साल शुक्ल पक्ष की द्वादशी वामन जयंती के रूप में मनाई जाती है। इस दिन मुख्य रूप से वामन देव की पूजा अर्चना का ख़ासा महत्व है। इस दिन को वामन द्वादशी के रूप में भी मनाया जाता है। विशेषज्ञों अनुसार इस दिन संपूर्ण विधि विधान के साथ यदि वामन देव की पूजा की जाए तो इससे वामन देव का आशीर्वाद प्राप्त होता है।<br /><br />
ISHT_DEVTA_LORD_SRI_VAMANA5 = <b>वामन देव की पूजा की विधि</b><br /><ul><li>वामन जयंती के दिन विशेष रूप से सुबह जल्दी उठकर स्नान करने के बाद वामन देव की पूजा और व्रत का संकल्प लें।</li><li>इस दिन गरीब ब्राह्मण को चावल, शक्कर और दही का दान करना आपके लिए फलदायी साबित हो सकता है।</li><li>व्रत रखकर दोपहर के वक्त वामन देव को संपूर्ण विधि के साथ जल, पुष्प अर्पित करते हुए ही पूजा जाना चाहिए।</li><li>शाम के समय व्रत धारी को फिर से स्नान करने के बाद वामन देव की पूजा अर्चना करनी चाहिए।</li><li>पूजा के बाद वामन देव व्रत कथा अवश्य सुनें।</li><li>पूजन विधि के समापन के बाद व्रती को खासतौर से ब्राह्मणों को भोजन करवाना चाहिए।</li><li>इसके साथ ही व्रती को इस दिन फलाहार ही ग्रहण करना चाहिए।</li></ul><br />विशेष रूप से वामन जयंती के दिन यदि व्रत रखकर पूजा अर्चना की जाए तो इससे वामन देव प्रसन्न होते हैं और व्यक्ति को मनवांछित फल की प्राप्ति होती है। इष्ट देव के रूप में वामन देव की पूजा अर्चना करना कदापि ना भूलें।<br /><br />

ISHT_DEVTA_LORD_DATTATREYA1 = <b><u>दत्तात्रेय</u></b><br />बृहस्पति ग्रह के अनुसार इष्ट देवता दत्तात्रेय हैं। हिन्दू धार्मिक मान्यता के अनुसार भगवान दत्तात्रेय को ब्रह्मा, विष्णु और महेश का समस्त एक अद्भुद रूप माना जाता है।<br /><br />
ISHT_DEVTA_LORD_DATTATREYA2 = <b>ब्रह्मा, विष्णु और महेश का समस्त रूप हैं दत्तात्रेय</b><br />भगवान दत्तात्रेय यूँ तो विष्णु जी के छठे अवतार थे लेकिन उनमें तीनों देवता के सभी गुण समाहित थे। इष्ट देवता दत्तात्रेय की पूजा आराधना करने से व्यक्ति को जीवन में सफलता के साथ ही जल्द ही मन चाहे फल की प्राप्ति होती है। ऐसा कहा जा सकता है कि इनकी पूजा अर्चना करने से ही संसार को चलाने वाले तीनों देवता का आशीर्वाद प्राप्त किया जा सकता है। धार्मिक मान्यताओं और वैदिक कर्मों के हरण के बाद दत्तात्रेय ने उनकी फिर से पुनर्स्थापना करवाई थी।<br /><br />
ISHT_DEVTA_LORD_DATTATREYA3 = <b>भगवान दत्तात्रेय का संछिप्त परिचय</b><br />समस्त जीवन ब्रह्मचर्य का पालन करने वाले भगवान दत्तात्रेय ने ऋषि अत्रि और माता अनसुइया के घर जन्म लिया था। उन्होनें अपना संपूर्ण जीवन लोक कल्याण के कार्यों में बीता दिया था। हिन्दू धर्म में ऐसी मान्यता है कि भगवान दत्तात्रेय विशेष रूप से प्रतिदिन गंगा स्नान के लिए आते थे, यही कारण है कि गंगा घाट पर दत्त पादुका की लोग पूजा करते हैं। तीनों देवों की ईश्वरीय शक्ति से पूर्ण श्री दत्तात्रेय का इष्ट देवता के रूप में विधि पूर्वक पूजा अर्चना की जानी चाहिए। चंद्र देव और प्रसिद्ध ऋषि दुर्वाशा उनके भाई थे। भारत में खासतौर से महाराष्ट्र में भगवान दत्तात्रेय की पूजा बहुत ही धूमधाम से की जाती है। माना गया है कि उन्हें भक्तों के दुःख का अंदाजा काफी जल्दी लग जाता है और उसके फलस्वरूप वो भक्तों को जल्द ही परिणाम देने वाले देवता हैं।<br /><br /><b>भगवान दत्तात्रेय की पूजा का विशेष दिन</b><br />हिन्दू धर्म में भगवान दत्तात्रेय का जन्म जिस दिन हुआ था उस दिन को दत्तात्रेय जयंती के रूप में मनाया जाता है। बहरहाल भगवान दत्तात्रेय की पूजा अर्चना मुख्य रूप से हर साल उनकी जयंती पर काफी हर्षोउल्लास के साथ की जाती है। अन्य दिनों की बात करें तो, चूँकि दत्तात्रेय विष्णु जी के अवतार थे इसलिए उनकी आराधना के लिए गुरुवार के दिन का विशेष महत्व है। हालाँकि, इष्ट देवता की पूजा के लिए कोई विशेष दिन नहीं होता है, लिहाजा आप उनकी उपासना नियमित रूप से रोज़ाना भी सच्चे मन और सच्ची भक्ति से कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_DATTATREYA4 = <b>भगवान दत्तात्रेय की पूजा विधि</b><br /><ul><li>मार्ग शीर्ष पूर्णिमा के दिन प्रत्येक वर्ष दत्तात्रेय जयंती के रूप में मनाई जाती है।</li><li>इस दिन खासतौर से गंगा नदी में सूर्योदय से पूर्व स्नान करने का ख़ासा महत्व है।</li><li>स्नान के बाद भगवान दत्तात्रेय की पूजा अर्चना की विधि शुरू की जाती है।</li><li>सबसे पहले उन्हें पुष्प अर्पित किये जाते हैं और उसके बाद धूप दिखा कर उनकी आराधना की जाती है।</li><li>प्रसाद के रूप में श्री दत्तात्रेय या दत्ता महाराज को फल और मिठाई का भोग लगाया जाता है।</li><li>दत्त पादुका की पूजा भी विशेष अहमियत रखती है। इसी महत्व को देखते हुए बनारस के मणिकर्णिका घाट और कर्नाटक के बेलगाम में उनकी पादुका की खासतौर से पूजा की जाती है।</li><li>दत्तात्रेय चालीसा और श्री गुरु दत्तात्रेय चरित्र का नियमित रूप से पाठ करने से मनवांछित फल की प्राप्ति होती है।</li><li>उनके श्लोकों एवं भजन का पाठ करने से किसी भी कार्य का फल जल्द प्राप्त होता है।</li><li>पूजा की समाप्ति श्री दत्तात्रेय आरती के साथ की जानी चाहिए।</li></ul><br />
ISHT_DEVTA_LORD_DATTATREYA5 = <b>श्री दत्तात्रेय के विशेष मंत्र और श्लोक का जाप करें</b><br />अपने इष्ट देव श्री दत्तात्रेय की पूजा अर्चना के साथ ही उनके स्रोत और मंत्रों का जाप करने से भी विशेष लाभ की प्राप्ति होती है। श्री दत्तात्रेय महाराज का विशेष मंत्र इस प्रकार हैं।<br /><br /><center><b><i>“ॐ द्रां दत्तात्रेयाय नम:”</i></b></center><br />इसके साथ ही दत्तात्रेय श्रोत का पाठ करना भी फलदायी साबित होता है।<br /><br />अपने इष्ट देव दत्तात्रेय महाराज को प्रसन्न करने के लिए आपको नियमित रूप से उनकी पूजा अर्चना करनी चाहिए।<br /><br />

ISHT_DEVTA_LORD_MAHA_LAKSHMI1 = <b><u>महालक्ष्मी</u></b><br />शुक्र ग्रह के अनुसार आपकी इष्ट देवी धन की देवी माता लक्ष्मी हैं। जीवन में उनकी कृपा दृष्टि बनाये रखने और धन की प्राप्ति के लिए आपको विशेष तौर से इनकी पूजा अर्चना करनी चाहिए।<br /><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI2 = <b>माता लक्ष्मी को खुश कर करें दरिद्रता दूर</b><br />माता लक्ष्मी को विशेष रूप से धन, समृद्धि और संपदा की देवी माना जाता है। दरिद्रता को दूर करने और जीवन और सुखमय बनाने की मनोकामना से भक्त लक्ष्मी माता की आराधना करते हैं। देवी लक्ष्मी के कुल आठ रूप हैं और उनके आठ स्वरूपों को अष्टलक्ष्मी कहते हैं। ऐसी मान्यता ही कि जिस घर में लक्ष्मी माँ का वास होता है वहां हर्ष और उल्लास का वातावरण रहता है। उन्हें धन की देवी के साथ ही सौंदर्य की देवी भी माना जाता है।<br /><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI3 = <b>माता लक्ष्मी का संछिप्त वर्णन</b><br />लक्ष्मी माता की उत्पति समुद्र मंथन के समय हुई थी। हालाँकि अन्य पौराणिक गाथा के अनुसार लक्ष्मी जी का जन्म ऋषि भृगु और माता ख्याति के घर हुआ था। उनका जन्म शरद पूर्णिमा के दिन हुआ था। श्री हरी विष्णु जी उनके पति हैं और उनका वास क्षीर सागर में श्री हरी के साथ कमल के फूल पर होता है। लक्ष्मी जी को दो रूपों में देखा जाता है, पहला श्री रूप, जिसमें वो कमल के फूल पर विराजमान रहती हैं और दूसरा लक्ष्मी रूप, जिसमें वो भगवान विष्णु के साथ होती हैं। उनके लक्ष्मी रूप का वाहन उल्लू है और महालक्ष्मी रूप का वाहन हाथी है। लक्ष्मी माता के आठ रूपों के नाम हैं : आदिलक्ष्मी, धान्यलक्ष्मी, संतानलक्ष्मी, वीरलक्ष्मी,धनलक्ष्मी,विद्यालक्ष्मी और विजयलक्ष्मी।<br /><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI4 = <b>माता लक्ष्मी की पूजा का विशेष दिन</b><br />लक्ष्मी माता की उपासना प्रत्येक शुक्रवार के दिन की जाती है। इस दिन विशेष रूप से माँ के वैभव लक्ष्मी रूप की पूजा की जाती है। इस दिन लोग व्रत रखकर माँ की उपासना करते हैं और शाम के वक़्त वैभव लक्ष्मी की कथा सुनते हैं। इसके साथ ही महालक्ष्मी की पूजा खासतौर से शरद पूर्णिमा के दिन की जाती है। इस दिन का शास्त्रों में विशेष महत्व बताया गया है। ऐसी मान्यता है कि इस दिन महालक्ष्मी की पूजा अर्चना और व्रत रखने से माँ सभी मनोकामना की पूर्ती करती हैं और जीवन को सुखमय बनाने में सहायक होती हैं। इसके साथ ही दीपावली के दिन भी लक्ष्मी पूजा का ख़ास महत्व है, इस दिन सभी हिन्दू घरों में मुख्य रूप से धन की देवी लक्ष्मी की पूजा अवश्य की जाती है।<br /><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI5 = <b>महालक्ष्मी पूजा की विधि</b><br /><ul><li>सबसे पहले माता महालक्ष्मी की मूर्ती या चित्र स्थापित करें।</li><li>अब पूजा विधि आरंभ करें, सबसे पहले हाथों में गंगाजल लेकर मूर्ति पर छिड़कते हुए उसे शुद्ध करें।</li><li>इसके बाद महालक्ष्मी को गुलाब या कमल का फूल अर्पित करें।</li><li>महालक्ष्मी की पूजा के दौरान प्रसाद के रूप में उन्हें खीर, केसर मिठाई, हलवा, सिंघाड़ा, बेर आदि चढ़ा सकते हैं।</li><li>महालक्ष्मी पूजन के दौरान खासतौर से घी का दीया जलाएं।</li><li>अगर मुमकिन हो तो तिल के तेल या मूंगफली के तेल का दीया भी जलाया जा सकता है।</li><li>पूजा के दौरान महालक्ष्मी मंत्र का उच्चारण जरूर करें।</li><li>इस पूजा के समय कलश स्थापना का भी ख़ास महत्व है।</li><li>प्रत्येक शुक्रवार को वैभव लक्ष्मी व्रत रखकर माँ की पूजा करें।</li><li>इस दिन वैभव लक्ष्मी व्रत कथा सुनना अनिवार्य माना जाता है।</li></ul><br />
ISHT_DEVTA_LORD_MAHA_LAKSHMI6 = <b>महालक्ष्मी के इन मंत्रों का करें जाप</b><br />इष्ट देवी महालक्ष्मी की पूजा के दौरान कुछ विशेष मंत्रों का जाप करने से ख़ासा लाभ मिलता है। माता लक्ष्मी के मंत्र कुछ इस प्रकार हैं:<br /><br /><center><b><i>“ऊँ अपवित्रो पवित्रो वा सर्वावस्थां गतोsपिवा।<br />यः स्मरेतपुण्डरीकाक्षं स बाह्याभ्यन्तरः शुचिः।।”<br /><br />और<br /><br />“ऊँ श्रीं श्रियै नमः।श्रीं ह्रीं क्लीं ऐं कमलवासिन्यै स्वाहा।<br />ऊँ श्रीं ह्रीं श्रीं कमले कमलालये प्रसीद प्रसीद श्रीं ह्रीं<br />श्रीं ऊँ महालक्ष्म्यै नमः।”</i></b></center><br />इस प्रकार से आप भी अपनी इष्ट देवी महालक्ष्मी की उपासना कर उन्हें प्रसन्न कर जीवन को सुखमय बना सकते हैं।<br /><br />

ISHT_DEVTA_LORD_MAA_GOURI1 = <b><u>महागौरी</u></b><br />शुक्र ग्रह के अनुसार आपकी इष्ट देवी महागौरी हैं। इष्ट देवी महागौरी का विशेष आशीर्वाद प्राप्त करने के लिए खासतौर से उनकी पूजा अर्चना की जानी चाहिए।<br /><br />
ISHT_DEVTA_LORD_MAA_GOURI2 = <b>भगवान शिव की अर्धांग्नी हैं माँ गौरी</b><br />हिन्दू धार्मिक मान्यताओं के अनुसार महागौरी की उपासना करने से व्यक्ति के हर दुःख का नाश होता है और सभी पापों से मुक्ति मिलती है। महागौरी को माता दुर्गा का आठवां रूप माना जाता है, और उनकी आयु महज आठ वर्ष है। बहुफलदायिनी माता गौरी ने शिव जी से विवाह करने के लिए कठिन तप किया था। उनकी तपस्या से प्रसन्न होकर ही शिव जी ने उन्हें पत्नी के रूप में स्वीकार किया था। अपनी इष्ट देवी महागौरी की श्रद्धा भाव के साथ पूजा अर्चना करना आपके लिए विशेष फलदायी साबित हो सकता है।<br /><br />
ISHT_DEVTA_LORD_MAA_GOURI3 = <b>महागौरी की संछिप्त परिचय</b><br />महागौरी की उत्पत्ति दुर्गा माँ के आठवें रूप में हुई थी। उन्हें उमा, पार्वती और गौरी आदि उप नामों से भी जाना जाता है। पौराणिक मान्यताओं के अनुसार देवी दुर्गा के आठवें अवतार के रूप में उनका जन्म राजा हिमवन के घर हुआ था। वो बचपन से ही शिव जी की बहुत बड़ी भक्त थीं, उनका ज्यादातर समय शिव भक्ति में ही बीतता था। बचपन में ही उनके मन में शिव जी से विवाह का ख्याल आ गया, इसलिए शिव को वर के रूप में पाने के लिए उन्होनें घोर तपस्या की थी। ऐसा कहा जाता है कि भगवान शिव की तपस्या के दौरान उनका पूरा शरीर काला पड़ गया था। अंत में शिव जी ने उनकी इस तपस्या से प्रसन्न होकर उन्हें अपनी अर्धांग्नी के रूप में स्वीकार किया था। सफ़ेद वस्त्र धारण करने वाली अति दयालु महागौरी की सवारी बैल है।<br /><br />
ISHT_DEVTA_LORD_MAA_GOURI4 = <b>महागौरी की पूजा का विशेष दिन</b><br />महागौरी की पूजा अर्चना विशेष रूप से नवरात्र के आठवें दिन यानि कि महा अष्टमी के दिन की जाती है। चूँकि उनकी आयु महज आठ वर्ष की मानी जाती है, इसलिए इस दिन खासतौर से कन्या पूजन का बेहद महत्व है। हालाँकि, यदि आपकी इष्ट देवी महागौरी हैं तो आप उनकी पूजा अर्चना किसी भी दिन कर सकते हैं। कुंवारी कन्या मनवांछित वर की प्राप्ति के लिए महागौरी की उपासना करती हैं। यदि किसी के विवाह में कोई बाधा आती है तो महागौरी की पूजा अर्चना कर आप उस बाधा को दूर कर सकते हैं।<br /><br />
