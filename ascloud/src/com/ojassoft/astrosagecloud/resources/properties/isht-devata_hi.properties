ISHT_DEVTA_LORD_HANUMAN6 = <b>हनुमान मन्त्र</b><br />हनुमान जी का विशेष आशीर्वाद प्राप्त करने के लिए यदि आप इस मंत्र का जाप करते हैं तो इससे विशेष लाभ की प्राप्ति होती है।<br /><br /><center><b><i>“ॐ नमो हनुमते रुद्रावताराय विश्वरूपाय अमित विक्रमाय प्रकटपराक्रमाय महाबलाय सूर्य कोटिसमप्रभाय रामदूताय स्वाहा।”</i></b></center><br /><br />इसके साथ ही किसी भी विषम परिस्थिति में हनुमान चालीसा का जाप करने से भी लाभ मिलता है और सभी दुखों और भयों का अंत होता है।<br /><br />सच्चे मन से <b>“श्री हनुमंते नमः”</b> मन्त्र का जाप 108 बार रुद्राक्ष की माला से करने पर विशेष लाभ की प्राप्ति होती है।<br /><br />इसके साथ ही भय से मुक्ति के लिए <b>“हं हनुमंते नम:“</b> मन्त्र का जाप करना काफी प्रभावी साबित हो सकता है।<br /><br />हनुमान जी के इस विशेष मन्त्र का जाप करने से जीवन में आने वाले भय और विभिन्न रोगों से मुक्ति मिलती है:<br /><br /><center><b><i>“ऊँ नमो हनुमते रूद्रावताराय सर्वशत्रुसंहारणाय सर्वरोग हराय सर्ववशीकरणाय रामदूताय स्वाहा”</i></b></center><br />बहरहाल आप भी अपने इष्ट देव महावीर हनुमान की इस विधि से पूजा अर्चना कर विशेष आशीर्वाद प्राप्त कर सकते हैं।<br /><br />

ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN1 = <b><u>कार्तिकेय/मुरुगन</u></b><br />मंगल ग्रह के अनुसार आपके इष्ट देवता कार्तिकेय या मुरुगन देव हैं। जीवन में अपने इष्ट देवता की विशेष कृपा दृष्टि पाने के लिए उनकी पूजा अर्चना अवश्य करें।<br /><br />जहाँ एक तरफ हिन्दू धर्म को मानने वाले उन्हें भगवान कार्तिकेय के नाम से जानते हैं, वहीं तमिल और दक्षिण राज्यों के लोग उन्हें मुरुगन के रूप में पूजते हैं। भारत में तमिलनाडु और बाहर देशों में श्रीलंका, सिंगापुर और मलेशिया के रहने वाले लोग कार्तिकेय या मुरुगन देव के उपासक हैं। दक्षिण भारत के लोग उनकी पूजा अर्चना अपने कुल के रक्षक देवता के रूप में करते हैं।<br /><br />
ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN2 = <b>कार्तिकेय/मुरुगन को खुश कर पाएं मनोवांछित फल</b><br />भगवान कार्तिकेय को मुरुगन, सुब्रमण्यम और स्कंद के नाम से भी जाना जाता है। पुराणों अनुसार उन्होनें तारकासुर नाम के राक्षस का वध कर देवताओं को उसके चंगुल से बचाया था और समस्त देवी-देवताओं को उनकी जगह दिलाई थी। उनका जन्म ही मुख्य रूप से तारकासुर नाम के राक्षस के वध के लिए हुआ था। विभिन्न क्षेत्रों में उन्हें भिन्न नामों से पूजा जाता है। ऐसे में अपने इष्ट देव मुरुगन या कार्तिकेय देव की पूजा अर्चना कर आप जीवन में आने वाली सभी कठिनाईओं का सामना कर सकते हैं और उनका विशेष आशीर्वाद प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_KARTIKEYA_MURUGAN3 = <b>कार्तिकेय/मुरुगन का संछिप्त परिचय</b><br />कार्तिकेय या मुरुगन देव का वर्णन उन पर आधारित पुराण “स्कंद पुराण” में विस्तृत रूप से मिलता है। स्कंद पुराण के अनुसार भगवान शिव से वरदान पाकर तारकासुर नाम का राक्षस काफी बलशाली हो गया था। अहंकार में अंधे होकर अपने इस बल का प्रयोग उसने संसार के समस्त मनुष्यों के साथ-साथ देवताओं पर भी करना शुरू कर दिया था। जिसके चलते धरती लोक के साथ ही देव लोक में भी तारकासुर का आतंक दिन प्रतिदिन बढ़ता ही जा रहा था। तारकासुर के आतंक से बचने के लिए सभी देवता एकत्रित होकर ब्रह्मा जी के पास पहुंचे और उनसे इस मुसीबत का उपाय माँगा। ब्रह्मा जी ने बताया कि तारकासुर का अंत केवल शिव पुत्र के हाथों ही संभव है। बहरहाल इसके बाद शिव पार्वती के विवाह के बाद कार्तिकेय का जन्म हुआ। जिसके पश्चात कार्तिकेय ने ही तारकासुर नाम के राक्षस का वध कर उसके आतंक से देवताओं को मुक्ति दिलाई।<br /><br />
