ISHT_DEVTA_LORD_HANUMAN4 = <b>अंजनी पुत्र हनुमान की पूजा अर्चना का विशेष दिन</b><br />यूँ तो हनुमान जी की पूजा अर्चना आप किसी भी दिन कर सकते हैं। लेकिन विशेष फल प्राप्ति के लिए हनुमान जयंती के दिन उनकी पूजा अर्चना अवश्य की जानी चाहिए। चूँकि इस दिन हनुमान जी का जन्म हुआ था लिहाजा इस दिन का अपना ख़ास महत्व है। इसके साथ ही साथ प्रत्येक सप्ताह मंगलवार के दिन हनुमान मंदिर जाकर श्रद्धा भाव से पूजा की जाए तो इससे भी पवन पुत्र का विशेष आशीर्वाद प्राप्त होता है। चूँकि त्रेता युग में महावीर हनुमान का जन्म मंगलवार के दिन ही हुआ था, इसलिए इस दिन को हनुमान जी का दिन भी माना जाता है।<br /><br />
