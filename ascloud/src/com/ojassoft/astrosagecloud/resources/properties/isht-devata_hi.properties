ISHT_DEVTA_LORD_AYYAPPA2 = <b>मलयाली समुदाय के सबसे प्रसिद्ध इष्ट देवता है अयप्पा स्वामी</b><br />भारत में अय्यपा स्वामी की पूजा विशेष रूप से दक्षिण भारत में की जाती है। केरल के मलयाली समुदाय के लोग खासतौर से उनकी पूजा अर्चना करते हैं। अय्यप्पा देव को शिव और विष्णु जी का पुत्र माना जाता है। केरल के सबरीमलाई में उनका विशाल मंदिर है जहाँ देशभर से लोग उनके दर्शन के लिए आते हैं। अपने इष्ट देवता अयप्पा स्वामी की विधि पूर्वक पूजा पाठ कर आप भी उनका आशीर्वाद प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_AYYAPPA3 = <b>अयप्पा स्वामी का संछिप्त वर्णन</b><br />हिन्दू पौराणिक मान्यता के अनुसार समुद्र मंथन के समय विष्णु जी ने दानवों का ध्यान आकर्षित करने के लिए मोहिनी रूप धारण किया था। अय्यप्पा स्वामी को विष्णु के मोहिनी अवतार और शिव जी का पुत्र माना जाता है। एक अन्य मान्यता के अनुसार अयप्पा स्वामी को पंडालम के राजा राज शेखर ने गोद लिया था। लेकिन आगे जाकर उन्हें महल का जीवन रास नहीं आया लिहाजा उन्होनें महल छोड़कर जंगल में जाकर रहने का फैसला किया। केरला के सबरीमाला मंदिर में अय्यापा स्वामी की विशाल मूर्ती हैं, इस मंदिर के पट केवल मकर संक्रांति के दौरान ही खोले जाते हैं। लाखों करोड़ों श्रद्धालु हर साल सबरीमाल मंदिर में उनके दर्शन के लिए आते हैं।<br /><br />
ISHT_DEVTA_LORD_AYYAPPA4 = <b>अय्यप्पा स्वामी के पूजा का विशेष दिन</b><br />अयप्पा स्वामी की पूजा अर्चना मुख्य रूप से जनवरी माह की 14 तारीख़ से शुरू की जाती है। 14 जनवरी के दिन ही मकर संक्रांति का त्यौहार मनाया जाता है और इस दिन से ही सबरीमाला के इस विशेष उत्सव की शुरुआत होती है और मंदिर के पट श्रद्धालुओं के लिए खोल दिए जाते हैं। इस माह में तक़रीबन पांच दिनों तक ये त्यौहार चलता है। इसके बाद नवंबर के माह के मध्य से लेकर दिसंबर के माह तक मंडलम के दौरान इस मंदिर के द्वार खोले जाते हैं। स्वामी अयप्पा के इस मंदिर में आने वाले श्रद्धालुओं को स्वामी तत्वमसी के नाम से पुकारा जाता है।<br /><br />
ISHT_DEVTA_LORD_AYYAPPA5 = <b>अय्यप्पा स्वामी के पूजा की विधि</b><br /><ul><li>अयप्पा स्वामी के दर्शन के लिए आने वाले श्रद्धालु सबसे पहले घी से अयप्पा स्वामी की मूर्ति का अभिषेक करते हैं।</li><li>हर साल यहाँ दर्शन के लिए आने वाले भक्त जनों के लिए विशेष रूप से इस दौरान मांसाहार का सेवन करना वर्जित होता है।</li><li>इस दौरान किसी भी प्रकार के तामसिक भोजन और शराब आदि का सेवन नहीं किया जाना चाहिए।</li><li>उन्हें चढ़ावे के रूप में सफ़ेद फूल अर्पित करें और प्रसाद के रूप में चावल की खीर चढ़ाएं।</li><li>अयप्पा देव की पूजा से मानसिक रोगों और मानसिक तनाव से मुक्ति मिलती है एवं बिज़नेस और कार्य क्षेत्र में सफलता प्राप्त होती है।</li><li>दर्शन के दौरान भगवान अय्यपा स्वामी के विशेष मंत्र का उच्चारण भी अवश्य करना चाहिए।</li></ul><br />
ISHT_DEVTA_LORD_AYYAPPA6 = <b>अयप्पा स्वामी के विशेष मंत्र इस प्रकार हैं</b><br />इष्ट देव अयप्पा स्वामी के पूजा के दौरान यदि आप उनके ख़ास मंत्रों का जाप करें तो आपको अयप्पा स्वामी का विशेष आशीर्वाद प्राप्त हो सकता है। ये मंत्र इस प्रकार है :<br /><br /><center><b><i>“ॐ भूता नाथाय विद्धमहे भावा-पुत्राय धीमहि, तन्नो शास्ता प्रचोदयात”</i></b></center><br />
ISHT_DEVTA_LORD_AYYAPPA7 = इस प्रकार से आप भी अपने इष्ट देव अयप्पा स्वामी की पूजा अर्चना कर उनसे विशेष आशीर्वाद प्राप्त कर सकते हैं।

ISHT_DEVTA_LORD_MAA_DURGA1 = <b><u>माँ दुर्गा</u></b><br />राहु ग्रह के अनुसार आपकी इष्ट देवी दुर्गा हैं। अपनी इष्ट देवी की पूजा अर्चना कर आप उन्हें प्रसन्न कर उनसे विशेष आशीर्वाद प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_MAA_DURGA2 = <b>माँ दुर्गा ने किया था महिषासुर नमक राक्षस का वध</b><br />हिन्दू धर्म में देवी दुर्गा को सबसे शक्तिशाली और प्रमुख देवी का दर्जा प्राप्त है। पौराणिक धार्मिक कथाओं के अनुसार उनका जन्म महिषासुर नमक राक्षस के वध के लिए हुआ था। हिन्दू धार्मिक मान्यताओं के अनुसार उन्हें आदि शक्ति के रूप में पूजा जाता है। उन्हें अम्बा, काली, जगदम्बा, शेरोवाली आदि उपनामों से जाना जाता है। उनकी पूजा उपासना विशेष रूप से भारत और नेपाल के विभिन्न शक्ति पीठ मंदिरों में की जाती है। आप भी इष्ट देवी दुर्गा की विधिवत पूजा अर्चना कर उनका आशीर्वाद प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_MAA_DURGA3 = <b>माँ दुर्गा का संछिप्त परिचय</b><br />हिन्दू पौराणिक कथा के अनुसार महिषासुर नामक राक्षस ने स्वर्ग लोक में आतंक फैलाकर सभी देवताओं को वहां से निकालकर स्वयं स्वर्ग पर कब्ज़ा कर लिया था। उसे युद्ध में हराना किसी भी देवता के वश में नहीं था। इसका हल निकालने के लिए सभी देवता त्रिवेद के पास पहुंचे, ब्रह्मा, विष्णु और महेश ने मिलकर एक ऐसी शक्ति को जन्म दिया जो अकेले ही महिषासुर का वध करने के लिए सक्षम थी। इसी शक्ति का नाम देवी दुर्गा है, उनके अंदर सभी देवताओं की शक्ति समाहित है। इसलिए उन्हें शक्ति का रूप माना गया है और उन्हें आदिशक्ति का उपनाम प्राप्त है। देवी दुर्गा ने महिषासुर का वध कर देवताओं को उनका स्वर्ग लोक वापिस दिलाया था।<br /><br />
ISHT_DEVTA_LORD_MAA_DURGA4 = <b>माँ दुर्गा की पूजा का विशेष दिन</b><br />माँ दुर्गा की उपासना का विशेष रूप से नवरात्र के नौ दिनों के दौरान की जाती है। उन नौ दिनों में प्रत्येक दिन देवी के सभी रूपों की पूजा की जाती है। हिन्दू धर्म को मानने वाले सभी लोग हर साल पूरी श्रद्धा भक्ति से नवरात्र का त्यौहार मनाते हैं। नवरात्र का पर्व साल में दो बार मनाया जाता है जिसे चैत्र नवरात्र और शारदीय नवरात्र कहते हैं। हालाँकि इसके अलावा देवी दुर्गा की पूजा आम दिन भी की जा सकती है। खासकर के जब वो आपकी इष्ट देवी हैं तो आपको प्रतिदिन देवी की आराधना करनी चाहिए।<br /><br />
ISHT_DEVTA_LORD_MAA_DURGA5 = <b>माँ दुर्गा की पूजा विधि</b><br /><ul><li>सबसे पहले सुबह के समय स्नान करने के बाद देवी दुर्गा की उपासना के लिए पूजा स्थल पर आसान लगाकर बैठे।</li><li>सभी पूजन सामग्रियों पर मंत्र जाप करते हुए गंगाजल का छिड़काव करें।</li><li>अब माँ दुर्गा के आगे पवित्र ज्योत जलाएं। इसमें तेल और घी दोनों का प्रयोग किया जा सकता है।</li><li>इसके बाद माता को अगरबत्ती और धूप दिखाएं।</li><li>अब अक्षत और फूल का प्रयोग करते हुए श्रद्धा भाव के साथ देवी की पूजा करें। देवी की पूजा के लिए लाल रंग के फूल का प्रयोग अवश्य करें।</li><li>माँ को नए वस्त्र और आभूषण अर्पित करके भी उनका विशेष आशीर्वाद प्राप्त किया जा सकता है।</li><li>नवरात्र के दौरान पूजा के पहले दिन माता के सामने जल से भरे हुए कलश की स्थापना भी की जानी चाहिए।</li><li>प्रसाद के रूप में माँ को फलों का भोग लगाएं। इसके लिए आप सेब, केला या चीकू का प्रयोग कर सकते हैं।</li><li>पवित्र मन से दुर्गा चालीसा का पाठ करें।</li><li>दुर्गा श्रोत का जाप करना भी फलदायी साबित होता है।</li><li>पूजन क्रिया के बाद माता की आरती करें और अंत में जल का छिड़काव करते हुए पूजा विधि समाप्त करें।</li></ul><br />
ISHT_DEVTA_LORD_MAA_DURGA6 = <b>माँ दुर्गा के इन मंत्रों का करें उच्चारण</b><br />देवी दुर्गा की पूजा के दौरान उनके ख़ास मंत्रों का उच्चारण अवश्य करना चाहिए। देवी के कुछ विशेष मंत्र इस प्रकार हैं:<br /><br /><b><i>1. “सर्वमंगल मांगल्ये शिवे सर्वार्थ साधिके।<br />शरण्ये त्र्यंबके गौरी नारायणि नमोऽस्तुते”<br /><br />2. “ॐ जयन्ती मंगला काली भद्रकाली कपालिनी।<br />दुर्गा क्षमा शिवा धात्री स्वाहा स्वधा नमोऽस्तुते”<br /><br />3. “या देवी सर्वभूतेषु शक्तिरूपेण संस्थिता,<br />नमस्तस्यै नमस्तस्यै नमस्तस्यै नमो नमः”</i></b><br /><br />इस प्रकार से आप भी अपनी इष्ट देवी माता दुर्गा की पूजा अर्चना कर उनका विशेष आशीर्वाद प्राप्त कर सकते हैं।

ISHT_DEVTA_LORD_GANESH1 = <b><u>गणेश जी</u></b><br />केतु ग्रह के अनुसार आपके इष्ट देवता गणेश जी हैं। अपने इष्ट देव श्री गणेश की उपासना कर आप उनका आशीर्वाद प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_GANESH2 = <b>शुभ फल प्राप्ति के लिए करें भगवान गणेश की पूजा</b><br />हिन्दू धार्मिक मान्यता के अनुसार सभी देवताओं में गणेश जी को खासतौर से शुभ फल देने वाले देव के रूप में पूजा जाता है। विशिष्ट शारीरिक रचना होने की वजह से वो सभी देवताओं में सबसे अलग नजर आते हैं। उनका सर हाथी का होने की वजह से उन्हें गजानन भी कहा जाता है। हिन्दू धर्म को मानने वाले लोग शुभ लाभ प्राप्त करने के लिए उनकी उपासना करते हैं। अपने इष्ट देवता श्री गणेश की आराधना कर आप भी उनका आशीर्वाद प्राप्त कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_GANESH3 = <b>गणेश जी का संछिप्त परिचय</b><br />गणेश जी का जन्म शिव जी और पार्वती के बेटे के रूप में हुआ था। हिन्दू पौराणिक मान्यताओं के अनुसार किसी भी शुभ काम की शुरुआत करने से पहले गणेश जी की पूजा अर्चना अवश्य की जाती है। ऐसा माना जाता है कि पार्वती जी ने उन्हें अपनी कोख से जन्म नहीं दिया था बल्कि उन्हें बालक स्वरुप देकर उनका सृजन किया था। गणेश जी का सर हमेशा से ही हाथी का नहीं था बल्कि एक बार माता पार्वती स्नान करने गयी और उन्होनें गणेश जी को आदेश दिया की किसी को घर में प्रवेश ना करने दें। उसी वक़्त शिव जी वहां पहुंचे लेकिन गणेश जी ने माता पार्वती के आदेश का पालन करते हुए उन्हें अंदर प्रवेश नहीं करने दिया। इस बात से गुस्से में आकर शिव जी ने उनका सर धर से अलग कर दिया। गणेश जी को मृत पड़ा देख माता पार्वती काफी परेशान हो उठी, उनकी ये हालत देख शिव जी ने तुरंत ही हाथी का सर मंगवाकर उन्हें फिर से जीवित कर दिया और वरदान दिया की किसी भी देवता की पूजा से पहले उनकी पूजा की जायेगी। इसलिए आज भी सभी देवताओं से पहले उनकी पूजा की जाती है।<br /><br />
ISHT_DEVTA_LORD_GANESH4 = <b>गणेश जी की पूजा का विशेष दिन</b><br />गणेश जी पूजा भारत में महाराष्ट्र सहित पूरे देश में गणेश चतुर्थी के दौरान की जाती है। दस दिन का ये पर्व खासतौर से महाराष्ट्र में मनाया जाता था लेकिन आजकल पूरा देश इस त्यौहार को हर्षोउल्लास के साथ मनाता है। गणेश चतुर्थी के दौरान लोग उनकी मूर्ती अपने घरों में स्थापित करते हैं और बड़ी धूमधाम के साथ उनका स्वागत करते हैं। महाराष्ट्र में उन्हें बाप्पा के नाम से पूजा जाता है। मुंबई स्थित सिद्धि विनायक मंदिर पूरे देश में गणेश जी का एक मात्र सबसे बड़ा मंदिर है। इसके आलावा यदि विशेष दिन की बात करें तो गणेश जी की पूजा खासतौर से बुध वार के दिन की जाती है। इसके साथ ही किसी भी शुभ काम की शुरुआत करने से पहले विशेष रूप से गणेश जी की पूजा अर्चना की जाती है।<br /><br />
ISHT_DEVTA_LORD_GANESH5 = <b>गणेश जी की पूजा विधि</b><br /><ul><li>सर्वप्रथम सूर्योदय से पूर्व उठकर स्नान करें और गणेश पूजन का संकल्प लें।</li><li>पूजा स्थल पर गणेश जी की मूर्ती स्थापित कर वहां गंगाजल का छिड़काव करें।</li><li>अब अक्षत और फूल हाथों में लेकर गणेश जी की मूर्ती पर अर्पित करें।</li><li>घी का दीया जलाएं और गणेश जी को धूप दिखाएं।</li><li>इसके बाद प्रसाद के रूप में गणेश जी को मोदक, मोतीचूर के लड्डू और फलों का भोग लगाया जा सकता है।</li><li>यदि आप गणेश चतुर्थी के दौरान पूजा कर रहे हैं तो, इस दौरान आप व्रत भी रख सकते हैं।</li><li>गणेश चतुर्थी के दौरान मुख्य रूप से गणेश जी मूर्ती आप एक दिन, तीन दिन, पांच दिन और नौ दिनों के लिए स्थापित कर सकते हैं।</li><li>दसवें दिन गणेश जी मूर्ति को विसर्जित कर दी जाती है।</li><li>गणेश पूजा मुख्य रूप से किसी भी शुभ कार्य की शुरुआत से पहले ज़रूर की जाती है।</li><li>इस दौरान उनके पवित्र मंत्रों का उच्चारण करना भी फलदायी साबित होता है।</li></ul><br />
ISHT_DEVTA_LORD_GANESH6 = <b>गणेश जी के इन मंत्रों का करें उच्चारण</b><br />इष्ट देवता गणेश जी की पूजा अर्चना के समय उनके विशेष मंत्रों का उच्चारण भी अवश्य किया जाना चाहिए। गणेश जी के प्रमुख मंत्र इस प्रकार हैं:<br /><br /><b><i>1. “ऊँ श्री गणेशाय नम:"<br />2. "ऊँ गं गणपतये नम:।”<br />3. “ऊँ वक्रतुण्डाय नम:"</i></b><br /><br />इस प्रकार से आप भी अपने इष्ट देव गणेश जी की पूजा अर्चना कर उनका विशेष आशीर्वाद प्राप्त कर सकते हैं।
