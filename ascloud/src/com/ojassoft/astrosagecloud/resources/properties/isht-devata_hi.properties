ISHT_DEVTA_LORD_BRAHMA2 = <b>चार वेदों के रचयिता है ब्रह्मा</b><br />ब्रह्मा जी को संपूर्ण संसार का सृजन कर्ता माना जाता है। उन्होनें ही इस संसार की रचना की और वो समस्त जीव जंतुओं के सृजन कार कहलाएं। उन्होनें इस संसार की रचना के साथ ही चार वेदों की रचना भी की थी। ब्रह्मा जी को देव दानव और समस्त जीवों के पिता के रूप में जाना जाता है। भगवत पुराण में ब्रह्मा देव का वर्णन विस्तार से देखने को मिलता है। इष्ट देव ब्रह्मा को प्रसन्न करने और उनका आशीर्वाद पाने के लिए विधि पूर्वक उनकी पूजा अर्चना की जानी चाहिए।<br /><br />
