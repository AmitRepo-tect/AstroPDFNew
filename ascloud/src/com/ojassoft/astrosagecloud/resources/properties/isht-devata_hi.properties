ISHT_DEVTA_LORD_SARASWATI5 = <b>सरस्वती पूजा के लाभ</b><br />माँ सरस्वती की आराधना करने से कई तरह के लाभ मिलते हैं। माँ की आराधना से जातक की बौद्धिक क्षमता और ज्ञान में वृद्धि होती है। मन-मस्तिष्क से संबंधित सभी रोग दूर होते हैं। इसके अलावा अनिद्रा, सिर दर्द, तनाव एवं जुकाम जैसे रोगों से मुक्ति मिलती है। जिस व्यक्ति को अपनी कल्पना शक्ति बढ़ानी है या संगीत में अपने स्वर को ठीक करना है तो उसे अवश्य ही माँ सरस्वती की पूजा करनी चाहिए।

ISHT_DEVTA_LORD_HANUMAN1 = <b><u>हनुमान जी</u></b><br />मंगल ग्रह के अनुसार, आपके इष्ट देवता महाशक्तिशाली अंजनी पुत्र भगवान श्री हनुमान हैं। आपको अपने इष्ट देव की कृपा दृष्टि पाने के लिए पूरी श्रद्धा भाव के साथ उनकी पूजा अर्चना करनी होगी। इष्ट देव का आशीर्वाद प्राप्त करना बेहद अहम माना जाता है।<br /><br />
ISHT_DEVTA_LORD_HANUMAN2 = <b>सही पूजा साधना से करें भगवान बजरंगबली को खुश</b><br />राम भक्त श्री महावीर हनुमान को संसार में सभी दुखों को हरने वाला माना जाता है। हनुमाना जी ने अपनी पूछ से रावण की संपूर्ण सोने की लंका को जला कर भगवान श्री राम को लंकापति रावण पर विजय प्राप्त करने में मदद की थी। महावीर हनुमान को बल और बुद्धि का देवता माना जाता है, उन्होनें अपना संपूर्ण जीवन राम भक्ति में गुजार दिया। हनुमान जी ने अपने जीवन काल में बर्ह्मचर्य का पालन किया है। ऐसे में देखा गया है कि यदि साफ़ मन से उनकी पूजा अर्चना की जाए तो इससे व्यक्ति को विशेष फल की प्राप्ति होती है। इसके साथ ही साथ हनुमान जी की साधना करते वक़्त यदि बर्ह्मचर्य का पालन किया जाए तो जीवन में किसी भी प्रकार का दुःख और भय नहीं रहता है। चूँकि हनुमान जी आपके इष्ट देव हैं इसलिए आपके लिए बेहद महत्वपूर्ण है कि आप हनुमान जी की पूजा अर्चना की संपूर्ण विधि की जानकारी रखें।<br /><br />
