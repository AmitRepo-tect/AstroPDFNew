ISHT_DEVTA_LORD_BRAHMA4 = <b>भगवान ब्रह्मा जी की पूजा का विशेष दिन</b><br />धार्मिक मान्यताओं के अनुसार ब्रह्मा जी की पूजा का कोई ख़ास विशेष दिन नहीं है। अन्य देवी देवताओं की तरह आपको ब्रह्मा जी के मंदिर न के बराबर ही देखने को मिलेंगे। भारत में ब्रह्मा जी का एकमात्र मंदिर राजस्थान के पुष्कर में है। ऐसी मान्यता है कि उनका ये मंदिर करीबन दो हजार साल पुराना है। चूँकि ब्रह्मा जी आपके इष्ट देव हैं इसलिए उनकी पूजा अर्चना आप श्रद्धा भक्ति के साथ किसी भी दिन कर सकते हैं।<br /><br />
ISHT_DEVTA_LORD_BRAHMA5 = <b>ब्रह्म देव की पूजा विधि</b><br /><ul><li>इष्ट देव भगवान ब्रह्मा की पूजा अर्चना करने के लिए सबसे पहले सूर्योदय से पहले उठे।</li><li>स्नान क्रिया के बाद ब्रह्मा देव की मूर्ति या चित्र के समीप आसान लगाकर बैठे।</li><li>अब सबसे पहले हाथों में गंगाजल लेकर उसका छिड़काव करते हुए स्थान और प्रतिमा को शुद्ध करें।</li><li>किसी भी सफ़ेद फूल से आप ब्रह्म देव की पूजा अर्चना कर सकते हैं।</li><li>फूल अर्पित करने के बाद, ब्रह्मा जी को आप धूप एवं दीप दिखाएं।</li><li>ब्रह्म देव की पूजा के समय उन्हें प्रसाद के रूप में फल और मिठाई का भोग लगाया जा सकता है।</li><li>पूजा के दौरान ब्रह्मा मंत्र या ब्रह्मा गायत्री मंत्र का जाप करने से भी विशेष लाभ की प्राप्ति होती है।</li></ul><br />
