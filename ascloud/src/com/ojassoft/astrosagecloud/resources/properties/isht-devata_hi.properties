ISHT_DEVTA_LORD_SARASWATI2 = <b>माता सरस्वती का संक्षिप्त परिचय</b><br />ज्ञान की देवी माँ सरस्वती को माँ शारदा भी कहा जाता है। वे भगवान ब्रह्मा जी की मानस पुत्री हैं। ज्ञान की देवी की पूजा आराधना करने से अज्ञानी भी ज्ञानी हो जाते हैं। माता सरस्वती को समस्त ज्ञान, साहित्य, संगीत, कला की देवी माना जाता है। माघ मास के शुक्ल पक्ष की पंचमी तिथि को वसंत पंचमी का पर्व मनाया जाता है। यह पर्व माँ सरस्वती को समर्पित है। इस दिन विद्या की देवी सरस्वती की पूजा की जाती है। अगर माँ के स्वरूप को देखा जाए तो उनकी चार भुजाएँ हैं। इनके हाथों में वीणा, वेद और माला है। उनके मुख से उल्लास, दो हाथों में वीणा-भाव संचार एवं कलात्मकता का प्रतीक माना जाता है। पुस्तक से ज्ञान और माला से ईशनिष्ठा-सात्त्विकता का बोध होता है। उनका वाहन मयूर है जो सौंदर्य एवं मधुर स्वर का प्रतीक है।<br /><br />सरस्वती को वीणापुस्तक धारिणी कहा गया है। उनमें भाव, विचार एवं संवेदना का त्रिविध संगम है। जहाँ वीणा संगीत की, पुस्तक विचारों की, और मयूर वाहन कला की अभिव्यक्ति है। वैदिक साहित्य में छह वेदांग की बात कही गई है और उन वेदांगों में शिक्षा का भी स्थान है और उस शिक्षा पर माँ सरस्वती का पूर्ण अधिकार है। शिक्षा के बिन व्यक्ति पशु के समान होता है।<br /><br />
