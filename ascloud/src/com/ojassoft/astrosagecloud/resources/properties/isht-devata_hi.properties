ISHT_DEVATA_HEADING = इष्ट देवता

ISHT_DEVATA_PARA	= इष्ट देवता की पूजा सफलता व मोक्ष दिलाती है। आपकी कुंडली के अनुसार {0} आपके इष्ट देवता हैं।

ISHT_DEVATA1 		= भगवान राम और शिव
ISHT_DEVATA2 		= भगवान कृष्ण और माँ सरस्वती
ISHT_DEVATA3 		= भगवान हनुमान, कार्तिकेय / मुरुगन
ISHT_DEVATA4 		= भगवान विष्णु और थिरुमल
ISHT_DEVATA5 		= भगवान श्री वामन और दत्तात्रय
ISHT_DEVATA6 		= माँ लक्ष्मी और पार्वती
ISHT_DEVATA7 		= भगवान ब्रह्मा और अयप्पा
ISHT_DEVATA8 		= माँ दुर्गा
ISHT_DEVATA9 		= भगवान गणेश

ISHT_DEVATA_NEW_FEATURE	= नई सुविधा
ISHT_DEVATA_KNOW	= अपने इष्ट देवता को जानें

ISHT_DEVTA_LORD_RAMA1 = <b><u>इष्ट देवता भगवान राम</u></b><br />सूर्य ग्रह के अनुसार, आपके इष्ट देवता मर्यादा पुरुषोत्तम राम हैं। अपने इष्ट देवता की कृपा दृष्टि पाने के लिए इनकी सच्चे मन और पूर्ण विधि विधान से पूजा करनी चाहिए।<br /><br />भगवान राम ने समस्त संसार को नैतिक, कर्तव्य, ईमानदारी और धर्म की मर्यादा का पालन कर एक सांसारिक जीवन का कैसे निर्वाह करना है, इसका पाठ पढ़ाया है। इसलिए ऐसा कहा जाता है कि भगवान राम के पद-चिन्हों पर चलना आसान नहीं है। उनका मार्ग बेहद कठिन है। चूंकि भगवान राम आपके इष्ट देवता है, इसलिए आपको उनके पद-चिन्हों पर चलने का प्रयास करना चाहिए। इसके लिए आपको यह जानना आवश्यक है कि भगवान राम की आराधना कैसे की जाति है? उनकी पूजा विधि क्या है?<br /><br />
ISHT_DEVTA_LORD_RAMA2 = <b>भगवान श्री राम की आराधना से मिलेगा भगवान विष्णु का भी आशीर्वाद</b><br />श्री राम भगवान विष्णु जी के सातवें अवतार हैं। उन्होंने त्रेतायुग में सरयू नदी के किनारे बसे अयोध्या नगरी के राजा दशरथ और माता कौशल्या के यहाँ जन्म लिया था। श्री राम अपने पिता के वचन के सम्मान के लिए राज-पाठ को त्याग कर 14 वर्षों के लिए पत्नी सीता और अनुज लक्ष्मण के साथ वनवास को चले गए थे। उन्होंने लंका पति रावण के विरुद्ध युद्ध के लिए जंगल में रहने वाले वन वासियों को संगठित किया और अंत में उन्होंने रावण का वध कर बुराई पर अच्छाई की जीत का संदेश दिया।<br /><br />वाल्मीकि ऋषि ने भगवान श्री राम के जीवन पर आधारित रामायण नामक ग्रंथ की रचना की है। इसके अलावा तुलसीदास जी ने भी रामचरित मानस में मर्यादा पुरुषोत्तम के जीवन के बारे में लिखा है। भगवान श्री राम का आदर्श जीवन ही उन्हें युगों-युगों तक जीवंत रखे हुए है। शास्त्रों में ऐसा कहा जाता है कि श्री राम की सच्चे मन से आराधना करने से शादी में देरी, प्रेम में आ रही बाधाएँ, संतान प्राप्ति की समस्या, व्यापार में घाटा एवं अन्य प्रकार की समस्त समस्याएँ दूर हो जाती हैं।<br /><br />
ISHT_DEVTA_LORD_RAMA3 = <b>इस विशेष दिन करें श्री राम जी की पूजा</b><br />रामनवमी का दिन भगवान राम को समर्पित है, क्योंकि इसी दिन श्री राम जी का जन्म हुआ था। यह विशेष दिन चैत्र शुक्ल की नवमी तिथि को पड़ता है। इस दिन राम जी की विशेष पूजा की जाती है। जैसे इस दिन व्रत रखने का विधान है। राम नवमी के दिन ही श्री राम, माता सीता और हनुमान जी की प्रतिमा के समक्ष पूजा अर्चना की जाती है।<br /><br />
ISHT_DEVTA_LORD_RAMA4 = <b>भगवान राम को प्रसन्न करने की पूजा-विधि</b><br /><ul><li>प्रातः सुबह जल्दी उठकर स्वच्छ वस्त्र धारण करने चाहिए।</li><li>भगवान राम को पीले वस्त्र और फूल अर्पित करने चाहिए।</li><li>ऐसा कहा जाता है कि, विष्णु जी या विष्णु जी के किसी भी अवतार की पूजा में तुलसी के पत्तों का अवश्य प्रयोग करना चाहिए।</li><li>इसके बाद श्रद्धानुसार घी या तेल का दीपक जलाएं और आरती करें। फिर आरती के पश्चात भगवान श्री राम को नैवैद्य अर्पित करें अर्थात भोग लगाएँ।</li><li>श्री रामनवमी के दिन दूध से बनी खीर या सफेद मीठाई का प्रसाद विशेष रूप से नैवैद्य के रूप में रखना चाहिए।</li><li>इसके बाद पूजा में हुई किसी भूल चूक के लिए क्षमा याचना करें।</li><li>भगवान राम की पूजा के बाद ब्राह्मणों को भोजन कराएं और उन्हें वस्त्र आदि देकर विदा करें।</li></ul><br />
ISHT_DEVTA_LORD_RAMA5 = <b><u>सूचना:</u></b> यूँ तो भगवान राम जी की पूजा विधि इतनी कठिन नहीं है। इसलिए आप घर पर सामान्य तरीके से प्रतिदिन उनकी आराधना कर सकते हैं। लेकिन गुरुवार के दिन अवश्य श्री राम स्तोत्र या <b><i>‘ॐ श्री रामाय नम:’</i></b> मंत्र का 108 बार जाप करे। ऐसा करना आपके लिए काफी लाभदायक रहेगा।<br /><br />
ISHT_DEVTA_LORD_RAMA6 = <b>श्री राम मंत्र</b><br />भगवान श्री राम का नाम ही भक्तों के लिए एक ऐसा मंत्र है जिसके उच्चारण मात्र से हीउनके अंदर ऊर्जा का संचरण होने लगता है। हालाँकि आप निम्नलिखित मंत्रों का उच्चारण भगवान राम की कृपा दृष्टि पाने के लिए भी कर सकते हैं-<br /><br /><b><ul><li>“श्रीराम जय राम जय जय राम”</li><li>“हरे राम हरे राम राम राम हरे हरे, हरे कृष्ण हरे कृष्ण कृष्ण कृष्ण हरे हरे”</li><li>“ॐ श्री रामाये नम: ’या‘ ॐ रामाय नमः।”</li></ul></b><br />

ISHT_DEVTA_LORD_SHIVA1 = <b><u>भगवान शिव</u></b><br />सूर्य ग्रह के अनुसार, आपके इष्ट देवता भगवान शिव हैं। ऐसे में आपको अपने इष्ट देवता की कृपा दृष्टि पाने के लिए इनकी सच्चे मन और पूर्ण विधि विधान से पूजा करनी होगी।<br /><br />
ISHT_DEVTA_LORD_SHIVA2 = <b>भगवान शिव करेंगे आपका कल्याण</b><br />भगवान शिव सृष्टि के संहारक हैं। भगवान शिव को देवों का महादेव की कहा जाता है। शिव त्रिदेवों में से एक हैं। उनका सौम्य रूप और रौद्र रूप दोनों ही विख्यात हैं। शास्त्रों में शिव का अर्थ कल्याणकारी माना गया है लेकिन वे अपने अंदर लय और प्रलय दोनों ही समाए हुए हैं। भगवान शिव को भोलेनाथ, महेश, नीलकंठ, रुद्र आदि नाम से भी जाना जाता है।<br /><br />
ISHT_DEVTA_LORD_SHIVA3 = <b>भगवान शिव है संपूर्ण सृष्टि के विधाता</b><br />वैदिक शास्त्रों अनुसार ये माना गया है कि भगवान शिव कैलाश पर्वत में वास करते हैं। शिव की अर्धांगिनी हिमालय की पुत्री माँ पार्वती हैं। शिव-पार्वती की तीन संतान है। इनके पुत्र कार्तिकेय और गणेश हैं तथा पुत्री अशोक सुंदरी हैं। भगवान शिव का स्वरूप अन्य देवताओं से बिल्कुल भिन्न है। शिव जी की जटा में गंगा एवं चंद्र देव विराजमान है। गले में नाग देवता हैं। जबकि उनके हाथों में त्रिशूल और डमरू होता है। नंदी भगवान शिव की सवारी है। ऐसा कहते हैं कि जिस प्रकार ब्रह्माण्ड का न आदि न अंत उसी प्रकार भगवान शिव भी अनादि हैं। संपूर्ण सृष्टि भगवान शिव के अंदर समायी हुई है। शिव को महाकाल भी कहा जाता है। शिव का यह स्वरूप भक्तों के लिए अत्यंत कल्याणकारी है। क्योंकि सृष्टि का आधार ही शिव के महाकाल स्वरूप पर ही टिका हुआ है।<br /><br />
ISHT_DEVTA_LORD_SHIVA4 = <b>इस विशेष दिन करें भगवान शिव जी की पूजा</b><br />भगवान शिव को सोमवार का दिन समर्पित होता है। इसलिए इसी दिन भगवान की उपासना की जाती है। इसके अलावा शिवरात्रि और महाशिवरात्रि भी भोलेनाथ की पूजा के लिए विशेष दिन होते हैं। इस अवसर पर भक्त जन अपनी-अपनी मनोकामनाओं की पूर्ति के लिए भगवान शिव के नाम का व्रत रखकर उनकी पूजा आराधना करते हैं। साथ ही सावन का विशेष महीना भी भगवान शिव को बेहद प्रिय है। इस दौरान शिव को प्रसन्न करने के लिए उनके भक्त काँवड़ यात्रा के दौरान काँवड़ में गंगाजल भरकर फिर भगवान शिव को चढ़ाते हैं।<br /><br />
ISHT_DEVTA_LORD_SHIVA5 = <b>भगवान शिव जी को प्रसन्न करने की पूजा विधि</b><br /><ul><li>भगवान शिव जी को खुश करने के लिए सोमवार की सुबह जल्दी उठें और स्नान से पवित्र होकर सफेद वस्त्र पहनें।</li><li>पूजा हेतु भगवान शिव के मंदिर जाएं अथवा घर पर ही भगवान शिव और माता पार्वती की पूजा करें।</li><li>सबसे पहले शिव जी का जल से अभिषेक करें और उसके बाद श्रद्धा भाव से कच्चे दूध से उनका अभिषेक करें। इसमें थोड़ा गंगाजल भी मिला लें।</li><li>आप पंचामृत से भी स्नान करा सकते हैं। इसके बाद बिल्वपत्र, आंकड़े के फूल, फल, यज्ञोपवीत आदि चढ़ाएं।</li><li>भगवान शंकर और माता पार्वती के मध्य गठबंधन करें और फिर भगवान को भोग लगाएँ। इसके अतिरिक्त तीनों में से जिस प्रकार का व्रत आप रख रहे हैं उस व्रत की कथा अवश्य पढ़नी या सुननी चाहिए क्योंकि तीनों व्रतों की अलग-अलग कथा है।</li><li>इस दिन मुख्य रूप से भक्तों को <b><i>“ॐ नमः शिवाय”</i></b> मंत्र का जाप करना चाहिए।</li></ul><br />
ISHT_DEVTA_LORD_SHIVA6 = <b><u>सूचना:</u></b> व्रत प्रारंभ करने से पहले संकल्प लें कि आप कितने व्रत करना चाहते हैं। जैसे यदि आप सोलह सोमवार का व्रत करते हैं तो सोलह सोमवार व्रत पूरे होने पर सत्रहवें सोमवार को उद्यापन करना चाहिए। मुख्य रूप से कार्तिक, सावन, ज्येष्ठ, वैशाख या मार्गशीर्ष महीने के किसी भी सोमवार को व्रत का उद्यापन किया जा सकता है। यदि आप विशिष्ट रूप से यह व्रत करना चाहते हैं तो आपको यह व्रत लगातार चौदह वर्ष तक करना चाहिए। उद्यापन के अंत में भगवान शंकर माता पार्वती और चंद्र देव का संयुक्त रूप से हवन और पूजन करें। आप इस हेतु किसी योग्य ब्राह्मण की भी सहायता ले सकते हैं।

ISHT_DEVTA_LORD_KRISHNA1 = <b><u>भगवान श्री कृष्ण</u></b><br />चंद्र ग्रह के अनुसार, आपके इष्ट देवता भगवान कृष्ण हैं। ऐसे में आपको अपने इष्ट देवता की कृपा दृष्टि पाने के लिए इनकी सच्चे मन और पूर्ण विधि विधान से पूजा करनी होगी।<br /><br />श्रीकृष्ण भगवान विष्णु जी के आठवेें अवतार हैं। कृष्ण की बाल लीलाएँ अमर हैं। उन्हें कन्हैया, श्याम, माखन चोर, गोपाल, बंसी वाले आदि नामों से भी जाना जाता है। भगवान कृष्ण के साथ उनकी प्रेमिका राधा का भी नाम लिया है। आज भी मथुरा-वृंदावन के अलावा उत्तर भारत में होली और जन्माष्टमी के मौके पर राधा-कृष्ण के प्रेम से संबंधित फाल्गुन के गीत गाए जाते हैं। राधा-कृष्ण की पूजा करने से जातक के प्रेम संबंध में मधुरता आती है।<br /><br />
ISHT_DEVTA_LORD_KRISHNA2 = <b>इष्ट देवता भगवान श्री कृष्ण का पाए आशीर्वाद</b><br />पौराणिक मान्यताओं के अनुसार भगवान श्री कृष्ण वसुदेव और देवकी की आठवीं संतान थी। उनका जन्म भाद्रपद मास में कृष्ण पक्ष की अष्टमी तिथि को मथुरा के कारावास में हुआ था, जबकि उनका लालन-पालन गोगुल धाम में यशोदा और नंद के यहाँ हुआ। श्रीकृष्ण ने मथुरा में अपने मामा कंस का वध किया और फिर द्वारका नगर की स्थापना की। भगवान श्री कृष्ण ने महाभारत के युद्ध में कौरवों के विरुद्ध पांडवों का साथ दिया। इसी दौरान कुरुक्षेत्र की रणभूमि में अर्जुन को गीता का उपदेश दिया। ऐसा कहा जाता है कि द्वापरयुग में भगवान श्रीकृष्ण की मृत्यु के पश्चात ही कलयुग का प्रारंभ हुआ था। भगवान कृष्ण जी का जन्म हर साल कृष्ण जन्माष्टमी के रूप में देशभर में मनाया जाता है।<br /><br />
