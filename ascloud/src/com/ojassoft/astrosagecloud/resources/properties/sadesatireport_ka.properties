	SADESATIRISINGPHASE	= ಇದು ಶನಿಯ ಸಾಡೇಸಾತಿಯ ಪ್ರಾರಂಭದ ದಿನಾಂಕ. ಈ ಅವಧಿಯಲ್ಲಿ ಶನಿಯು ಚಂದ್ರನ 12ನೇ ಸ್ಥಾನದಿಂದ ಹಾದುಹೋಗುತ್ತಾನೆ. ಇದು ಸಾಮಾನ್ಯವಾಗಿ ಹಣಕಾಸಿನ ನಷ್ಟ, ಗುಪ್ತ ಶತ್ರುಗಳಿಂದ ತೊಂದರೆಗಳು, ಗುರಿಯಿಲ್ಲದ ಪ್ರಯಾಣ, ವ್ಯಾಜ್ಯಗಳು ಹಾಗೂ ಬಡತನದಿಂದ ಪ್ರತಿನಿಧಿಸಲ್ಪಡುತ್ತವೆ. ಈ ಅವಧಿಯಲ್ಲಿ ನೀವು ನಿಮ್ಮ ಗುಪ್ತ ಶತ್ರುಗಳಿಂದ ತೊಂದರೆಗಳನ್ನು ಅನುಭವಿಸಬಹುದು. ನಿಮ್ಮ ಸಹೋದ್ಯೋಗಿಗಳ ಜೊತೆಗಿನ ಸಂಬಂಧಗಳು ಒಳ್ಳೆಯದಿರುವುದಿಲ್ಲ ಹಾಗೂ ಅವರು ನಿಮ್ಮ ಕೆಲಸದ ವಾತಾವರಣದಲ್ಲಿ ಸಮಸ್ಯೆಯನ್ನು ಸೃಷ್ಟಿಸುತ್ತಾರೆ. ನೀವು ನಿಮ್ಮ ಗೃಹಕಾರ್ಯಗಳಲ್ಲೂ ಸಮಸ್ಯೆಯನ್ನು ಎದುರಿಸಬಹುದು. ಇದು ಒತ್ತಡವನ್ನು ಸೃಷ್ಟಿಸಬಹುದು. ನೀವು ನಿಮ್ಮ ಖರ್ಚನ್ನು ನಿಯಂತ್ರಿಸಬೇಕು, ಇಲ್ಲದಿದ್ದಲ್ಲಿ ಅದು ಇನ್ನೂ ದೊಡ್ಡ ಹಣಕಾಸಿನ ತೊಂದರೆಗಳಿಗೆ ದಾರಿ ಮಾಡಿಕೊಡುತ್ತದೆ. ಈ ಅವಧಿಯಲ್ಲಿ ಧೀರ್ಘ ಅಂತರದ ಪ್ರಯಾಣಗಳು ಫಲಪ್ರದವಾಗದಿರಬಹುದು. ಶನಿಯ ಸ್ವಭಾವ ವಿಳಂಬ ಹಾಗೂ ತಿರಸ್ಕಾರದ್ದಾದರೂ ಸಾಮಾನ್ಯವಾಗಿ ನಿಮಗೆ ಕೊನೆಗೆ ಫಲಿತಾಂಶಗಳು ದೊರಕುವುದರಿಂದ ಸಹನೆಯಿಂದಿರಿ ಹಾಗೂ ನಿಮ್ಮ ಬಾರಿಗಾಗಿ ಕಾಯಿರಿ. ಈ ಅವಧಿಯನ್ನು ಕಲಿಕೆಯ ಅವಧಿಯನ್ನಾಗಿ ತೆಗೆದುಕೊಳ್ಳಿ, ಶ್ರಮವಹಿಸಿ ಕೆಲಸ ಮಾಡಿ ಹಾಗೂ ಪರಿಸ್ಥಿತಿಗಳು ಹೊಂದಿಕೆಯಾಗುತ್ತವೆ. ನಿಮಗೆ ಈ ಅವಧಿಯಲ್ಲಿ ಹೆಚ್ಚಿನ ಅಪಾಯಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳದಂತೆ ಸಲಹೆ ನೀಡಲಾಗುತ್ತದೆ
	SADESATIPEAKPHASE		= ಇದು ಶನಿಯ ಸಾಡೇಸಾತಿಯ ತುತ್ತತುದಿ. ಸಾಮಾನ್ಯವಾಗಿ ಶನಿಯ ಈ ಹಂತ ಅತ್ಯಂತ ಕಷ್ಟಕರವಾಗಿರುತ್ತದೆ. ಜಾತಕದ ಚಂದ್ರನ ಮೇಲೆ ಹಾದುಹೋಗುವ ಶನಿಯು ಆರೋಗ್ಯ ಸಮಸ್ಯೆಗಳು, ಅಪಖ್ಯಾತಿ, ಸಂಬಂಧದಲ್ಲಿ ಸಮಸ್ಯೆಗಳು, ಮಾನಸಿಕ ತೊಂದರೆಗಳು, ಹಾಗೂ ದುಃಖಗಳನ್ನು ತರುತ್ತದೆ. ಈ ಅವಧಿಯಲ್ಲಿ ಯಶಸ್ಸು ಕಷ್ಟಸಾಧ್ಯ. ನಿಮ್ಮ ಶ್ರಮಕ್ಕೆ ನಿಮಗೆ ಪ್ರತಿಫಲ ಸಿಗದಿರಬಹುದು ಹಾಗೂ ನಿಮ್ಮನ್ನು ನಿರ್ಬಂಧಿಸಿದಂತೆನಿಸಬಹುದು. ನಿಮ್ಮ ದೇಹ ಹಾಗೂ ಪ್ರತಿರಕ್ಷಣಾ ವ್ಯವಸ್ಥೆ ಗಟ್ಟಿಯಾಗಿರದಿರಬಹುದು. ಮೊದಲ ಮನೆ ಸಂಪತ್ತಿನ ಮನೆಯಾಗಿರುವುದರಿಂದ, ನೀವು ವ್ಯಾಯಾಮ ಮಾಡಬೇಕು ಹಾಗೂ ನಿಮ್ಮ ಆರೋಗ್ಯದ ಬಗ್ಗೆ ಗಮನ ಹರಿಸಬೇಕು, ಇಲ್ಲದಿದ್ದಲ್ಲಿ ನಿಮ್ಮನ್ನು ಗಂಭೀರ ರೋಗಗಳು ಆವರಿಸಬಹುದು. ನೀವು ಖಿನ್ನತೆ, ಅಜ್ಞಾತ ಭಯ ಹಾಗೂ ಹೆದರಿಕೆಯಿಂದ ಬಳಲಬಹುದು. ನೀವು ಆಲೋಚನೆ, ಕಾರ್ಯ ಹಾಗೂ ನಿರ್ಧಾರ ಕೈಗೊಳ್ಳುವಲ್ಲಿ ಅಸ್ಪಷ್ಟತೆಯನ್ನು ಅನುಭವಿಸುತ್ತೀರಿ. ನೀವು ಧಾರ್ಮಿಕ ಮನೋಭಾವ ಹೊಂದಿರುತ್ತೀರಿ ಹಾಗೂ ಸೃಷ್ಟಿಯ ವೈವಿಧ್ಯತೆಯಿಂದ ಆಕರ್ಷಿತರಾಗುತ್ತೀರಿ. ಸ್ವೀಕಾರಾರ್ಹತೆ ಹಾಗೂ ಮೂಲಭೂತ ವಿಷಯಗಳನ್ನು ಸರಿಯಾಗಿ ಮಾಡುವುದು ನಿಮ್ಮನ್ನು ಈ ಅವಧಿಯಿಂದ ಪಾರು ಮಾಡುತ್ತದೆ
	SADESATISETTINGPHASE	= ಇದು ಶನಿಯ ಸಾಡೇ ಸಾತಿಯ ’ಹೊಂದಿಕೊಳ್ಳುವ’ ಅವಧಿ. ಶನಿಯು ಜಾತಕದ ಚಂದ್ರದ 2ನೇ ಮನೆಯಿಂದ ಹಾದುಹೋಗುತ್ತಿದ್ದು, ಇದು ಹಣಕಾಸು ಹಾಗೂ ಗೃಹಕಾರ್ಯಗಳಲ್ಲಿನ ತೊಂದರೆಯನ್ನು ಸೂಚಿಸುತ್ತದೆ. ಸಾಡೇ ಸಾತಿಯ ಎರಡು ಕಷ್ಟಕರ ಅವಧಿಗಳನ್ನು ಹೊಂದಿದ ನಂತರ ಸ್ವಲ್ಪ ಆರಾಮವಾದಂತೆ ನಿಮಗೆ ಅನಿಸುತ್ತದೆ. ಆದರೂ ತಪ್ಪು ತಿಳುವಳಿಕೆಗಳು ಹಾಗೂ ಹಣಕಾಸಿನ ಒತ್ತಡಗಳನ್ನು ಈ ಅವಧಿಯಲ್ಲಿ ನೋಡಬಹುದು. ಖರ್ಚುಗಳು ಗಗನಕ್ಕೇರಬಹುದು ಹಾಗೂ ನೀವು ನಿಯಂತ್ರಣ ಹೊಂದುವುದು ಮುಖ್ಯ. ಅನಿರೀಕ್ಷಿತ ಹಣಕಾಸಿನ ನಷ್ಟ ಹಾಗೂ ಕಳ್ಳತನದ ಭಯದ ಸಂಭವನೀಯತೆಯೂ ಇದೆ. ನಿಮ್ಮ ಆಲೋಚನೆ ನಕಾರಾತ್ಮಕವಾಗಿರಬಹುದು, ಹಾಗೂ ನಿಮಗೆ ಉಲ್ಲಾಸಭರಿತವಾಗಿ ವಿಷಯಗಳನ್ನು ನಿರ್ವಹಿಸುವಂತೆ ಸಲಹೆ ಮಾಡಲಾಗಿದೆ. ನೀವು ಕುಟುಂಬ ಹಾಗೂ ವೈಯುಕ್ತಿಕ ಬದಿಯಲ್ಲಿ ಹೆಚ್ಚು ಗಮನ ಹರಿಸಬೇಕು, ಇಲ್ಲದಿದ್ದಲ್ಲಿ ಅವುಗಳೂ ದೊಡ್ಡ ಸಮಸ್ಯೆಯನ್ನು ತಂದೊಡ್ಡಬಹುದು. ವಿದ್ಯಾರ್ಥಿಗಳಿಗೆ ಶಿಕ್ಷಣ ಸ್ವಲ್ಪ ತೊಂದರೆಯಾಗಬಹುದು ಹಾಗೂ ಅವರು ತಮ್ಮ ಈಗಿರುವ ಸ್ಥಿತಿಯನ್ನು ಕಾಯ್ದುಕೊಳ್ಳಲು ಇನ್ನೂ ಶ್ರಮವಹಿಸಬೇಕು. ಫಲಿತಾಂಶಗಳು ನಿಧಾನವಾಗಿರುತ್ತವೆ ಹಾಗೂ ಹೆಚ್ಚೂಕಡಿಮೆ ಯಾವತ್ತೂ ವಿಳಂಬಗೊಳ್ಳುತ್ತವೆ. ಇದು ಅಪಾಯವನ್ನು ಸೂಚಿಸುವ ಕಾಲ ಹಾಗೂ ಇತರ ವಿಷಯಗಳನ್ನು ಹೊರತುಪಡಿಸಿ ನೀವು ವಾಹನ ಚಲಾಯಿಸುವಾಗ ಎಚ್ಚರಿಕೆಯಿಂದಿರಬೇಕು. ಸಾಧ್ಯವಾದಲ್ಲಿ ಶನಿಯನ್ನು ಸಂತೋಷದಿಂದಿಡಲು ಮಾಂಸಾಹಾರ ಹಾಗೂ ಮದ್ಯಪಾನದಿಂದ ದೂರವಿರಿ. ನೀವು ನಿಮ್ಮ ಹಣಕಾಸು ಹಾಗೂ ಗೃಹಕಾರ್ಯಗಳನ್ನು ಬುದ್ಧಿವಂತಿಕೆಯಿಂದ ನಿರ್ವಹಿಸುವ ಮೂಲಕ ಈ ಅವಧಿಯಿಂದ ಪಾರಾಗುತ್ತೀರಿ
	IMPNOTE				= ಮೇಲಿನ ಜ್ಯೋತಿಷ್ಯಗಳು ಸಾಮಾನ್ಯ ಸ್ವರೂಪದ್ದಾಗಿದ್ದು ಇವುಗಳು ಸಾಡೆ ಸಾತಿ ಅಪಾಯಕಾರಿ ಎನ್ನುವ ನಂಬಿಕೆಯನ್ನು ಆಧರಿಸಿವೆ. ನಿಜವಾಗೂ ಹೇಳಬೇಕೆಂದರೆ ಇದು ಯಾವಾಗಲೂ ಹೀಗೇ ಇರುವುದಿಲ್ಲವೆಂದು ನಾವು ಕಂಡುಕೊಂಡಿದ್ದೇವೆ ಹಾಗೂ ನಾವು <b><u><a href=http://www.astrocamp.com/vedicastrology/2008/09/shani-sade-sati.html> ಎನ್ನುವ ಸಾಡೆ ಸಾತಿಯ ಬಗೆಗಿನ  ಲೇಖನವನ್ನು ಓದುವಂತೆ ಶಿಫಾರಸ್ಸು ಮಾಡುತ್ತೇವೆ.</a></u></b> ಕೇವಲ ಸಾಡೆ ಸಾತಿಯನ್ನಷ್ಟೇ ಆಧರಿಸಿದ ಯಾವುದೇ ನಿರ್ಧಾರಗಳು ಸಮರ್ಪಕವಾಗಿರುವುದಿಲ್ಲ ಹಾಗೂ ಇವುಗಳು ವಿಫಲವಾಗುವ ಹೆಚ್ಚಿನ ಸಾಧ್ಯತೆ ಹೊಂದಿರುತ್ತವೆ. ಸಾಡೆ ಸಾತಿ ಅವಧಿ ಲಾಭಕರವೇ ಅಥವಾ ನಷ್ಟಕರವೇ ಎಂದು ನಿರ್ಧರಿಸುವ ಮೊದಲು ಈಗ ನಡೆಯುತ್ತಿರುವ ದಶೆ ಹಾಗೂ ಶನಿಯ ಸ್ವರೂಪದಂಥ ಕೆಲವು ಅಂಶಗಳನ್ನೂ ಮೌಲ್ಯಮಾಪನ ಮಾಡಬೇಕಾಗುತ್ತದೆ. ಮೇಲಿನ ಜ್ಯೋತಿಷ್ಯಗಳನ್ನು ಗಂಭೀರವಾಗಿ ತೆಗೆದುಕೊಳ್ಳದಂತೆ ಹಾಗೂ ಅನುಮಾನಗಳಿದ್ದಲ್ಲಿ ಯಾರಾದರೂ ಒಳ್ಳೆಯ ಜ್ಯೋತಿಷಿಗಳನ್ನು ಸಂಪರ್ಕಿಸುವಂತೆ ನಾವು ಸಲಹೆ ಮಾಡುತ್ತೇವೆ.
