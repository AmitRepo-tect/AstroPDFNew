
JADI_SUGGESTION_REPORT=सर्व जणांना सुखी जीवन हवे असते. त्यासाठी आपण काही गतिविधींमधून जातो आणि समृद्ध परिणाम भेटण्यासाठी कठीण मेहनत करतो. आपण ज्योतिषांकडून सल्ला घेतो, रत्न घालतो किंवा अजून काही उपचार करतो. सगळ्यांमध्ये प्राकृतिक उपचार झाडांचे मुळ आहे. आम्ही तुमच्या कुंडलीचे विश्लेषण करून आणि तुमच्या जन्म तक्त्याच्या ग्रहांचे संरेखनचे मूल्यांकन करून तुमच्यासाठी उपयुक्त मुळे किंवा झाडांची मुळे यांचा सल्ला देतो.
JADI_AND_ITS_IMPORTANCE=वनस्पती आपल्या दैनंदिन दिवसात महत्वाची भुमिका निभावतात. हे ग्रह पृथ्वीवर जीवन बनवण्याचे स्रोत आहे. ऍस्ट्रॉनॉमी च्या दृष्टीने वनस्पती आणि झाडे ऑक्सिजन गॅस सोडतात आणि श्वास घेताना कार्बनडाइऑक्साइड घेतात, जो मानवी जीवनाचा मुख्य स्रोत आहे. जसे कि आपल्याला माहिती आहे आपण ऑक्सिजन गॅस शिवाय राहू शकत नाही. जर वनस्पती आणि झाडे नसतील तर आपण श्वास घेऊ शकत नाही, म्हणून मानवी आयुष्य संपून जाईल. म्हणून आपल्याला समग्र रूपाने वनस्पती आणि झाडे यांच्या महत्वावर विचार केला पाईजे. औषधी वनस्पतीच्या मध्यमातून खूप साऱ्या काळजींचे समाधान केले जाते. याचा उपयोग औषधी प्रयोजनासाठी ही केले जाते. झाडाचे मुळ हे त्यापैकी एक आहे. <a href="https://astrology.astrosage.com/2013/11/jadi-roots-to-reach-planets-hearts.html">  झाडांचे मुळ  </a> औषधी वनस्पती चा उप भाग आहे. ज्योतिष शास्त्रामध्ये झाडाच्या मुळाचे स्वतःचे महत्व आहे. हे एक उपायांच्या दृष्टीने वापरले जाते. जर तुमच्या कुंडलीमध्ये ग्रहांची स्तिथी खराब आहे. कुठले विशिष्ट ग्रह दर्शवण्यासाठी वेगवेगळ्या झाडांचे मुळ निश्चित केले जाते. जसे कि आपल्याला माहिती आहे ज्योतिष मध्ये सात प्रमुख ग्रह निश्चित आहे आणि दोन राशी आहेत जसे, राहू आणि केतू. पर्यावरणीय उर्जेला संतुलित करण्यासाठी प्रत्येकामध्ये एक विशिष्ट झाडाचे मुळ असते.हे मूळ दगडाचे सर्वोत्तम पर्याय मानले जाते. जर हा महत्वपूर्ण क्रिया केल्यानंतर कुणी ज्योतिषीच्या सल्ल्याने घातले जाते तर तो जास्त फायदेशीर होतो. हा दगडापेक्षाही चांगले काम करू शकतो. दगड खुप महाग आहे आणि प्रत्येक जनाला घालण्यासाठी चहाचा कप नाही. त्या स्तिथीमध्ये झाडाचे मुळ सर्वात चांगला पर्याय आहे म्हणजे इच्छित परिणाम भेटू शकेल आणि कुठल्याही ग्रहाचे पुरुष प्रभाव कमी करू शकतो. तुम्ही याला स्वस्त किमतीमध्ये मिळवु  शकतात.
RECOMMENDATIONS=तुमच्यासाठी उपयुक्त झाडांचे मुळ घालण्याचा सल्ला दिला जातो. पर्यावरणामध्ये काही प्रकारची वनस्पती मिळवली जाते. तुम्हाला हे जाणून घ्यायची गरज आहे कि कोणते तुम्हाला सूट करते. हे फक्त तुमच्या जन्म कुंडलीमध्ये तुमच्या ग्रह संरेखनाच्या आधारावर केले जाऊ शकते. किंवा <a href="https://www.astrosage.com/freekphorary/instantchart.asp?charttype=kp"> नेटल तक्ता </a>. झाडांच्या मुळासंबंधीत तुम्ही कुठल्या ज्योतिषाचा सल्ला घेऊ शकतात. मुळ घातल्याने किंवा जवळ ठेवल्याने तुमच्या दुर्बल क्षेत्रामध्ये सुधारणा होईल. आम्ही तुमच्या जन्माच्या तक्त्यामध्ये तुमच्या ग्रह संरेखनाच्या आधारावर वेगवेगळ्या प्रकारच्या मुळांचा उल्लेख केला आहे.
IMPORTANCE_OF_NATURAL_JADI=आजकाल नैसर्गिक मुळ कदाचितच बाजारात मिळते. सहसा झाडाचे मुळ कृत्रिम रूपाने बनवले जाते आणि जगामध्ये वाटले जाते. एक प्रकृतीला मुळ मूळरूपाने एका झाडाचे मुळ आहे आणि म्हणुनच मर्यादित संख्येमध्ये आढळू शकते. याच्या व्यतिरिक्त, हवामानासारख्या अनपेक्षित गोष्टी महत्त्वाची भूमिका बजावतात आणि अनेक वेळा उत्पादनात अडथळे आणतात. कृत्रिम रूपाने बनलेले झाडाच्या मुळ सारखे/ सामान दिसू शकतात परंतु, ते ज्योतिषीय रूपाने काहीच कामाचे नाही. या समस्या दूर करण्यासाठी आम्ही  १००% प्राकृतिक मुळ आणलेले आहेत. याला घातल्यानंतर तुम्हाला सर्व प्रकारे ज्योतिषीय लाभ मिळतील. ह्या झाडांच्या मुळाचे प्रयोगशाळेमध्ये कठोर परीक्षण केले आहे आणि पूर्णपणे वास्तविक असल्याचे आढळले आहे.

TREE_ROOT_OF_BEL=सुर्य, एक शाही ग्रहाचा प्रतीक आहे. सुर्य ज्योतिषमध्ये एक गरम ग्रह आहे. जो एक अधिकारी स्थिती, नेता आणि सरकारचे प्रतिनिधित्व करते. जर तुमच्या कुंडलीमध्ये सुर्य खराब आहे तर तुम्ही याला घालू शकतात. मसालेदार आणि उग्र औषधी वनस्पतीच्या माध्यमाने ग्रह <a href="https://www.astrosage.com/planet/sun/"> सुर्य </a> ची वाढवली जाऊ शकते. याला घातल्याने या ग्रहाचे पुरुष प्रभाव कमी केले जाऊ शकते. जर तुम्ही प्रतिष्ठा, स्थिती आणि सामाजिक स्थितीसोबत संघर्ष करत असाल, तर तुम्हाला तुमच्या जीवनामध्ये वरती उठण्यासाठी एक सकारात्मक ऊर्जा प्राप्त करते.
TREE_ROOT_OF_KHIRNI=हे मुळ वैदिक ज्योतिष मध्ये चंद्र ग्रह दर्शवितो. हे ग्रह सर्वांत महत्वाचे मानले जाते. हे एखाद्या व्यक्तीचे मन दर्शवते. जसे येथे उद्धृत केल्याप्रमाणे, आपले मन आनंदी असल्यास, सर्वकाही आनंदी असल्याचे दिसते. आनंदी आणि स्वस्थ जीवन जगण्यासाठी आपण मानसिक अस्थिरता किंवा आजारांपासून मुक्त असावे. थोडक्यात, आपण असे म्हणू शकतो की आपल्या आयुष्यात मोठ्या प्रमाणावर यश मिळविण्यासाठी आपले तणावमुक्त जीवन असावे. जर तुम्ही ही मुळे परिधान कराल तर तुम्ही मानसिक तणाव, उदासीनता आणि चिंता सोडुन मुक्त व्हाल. शेवटी, तुम्हाला आनंदी जीवनाकडे वळविले जाईल.
TREE_ROOT_OF_ANANTMOOL	= ह्या झाडाचे मुळ वैदिक ज्योतिषमध्ये मंगळ ग्रह दर्शवतो. याला ऊर्जा, साहस, उत्साह आणि दृढ संकल्पासाठी ग्रह मानले जाते. मंगळ सेना, सैनिक, पोलीस किंवा कोणाचेही प्रतिनिधित्व करते. जो प्रशासकीय पदावर आहे किंवा बंदूक ठेवतो. मंगळ तुम्हाला तुमच्या  दुश्मनांशी लढण्याची ऊर्जा आणि स्पर्धा परीक्षा यामध्ये यश मिळवण्यासाठी शक्ती देईल. जर तुमच्या कुंडलीमध्ये मंगळ खराब असेल तर, तुम्ही या झाडाच्या मुळाला परिधान करू शकतात. हे तुमच्या गुणांना मजबुत करेल. तुम्ही तुमचे कुठलेही कार्य कुठल्याही भीतीशिवाय करू शकतात. तुमचा आत्मविश्वास आणि ऊर्जा वाढेल. जर तुम्ही कोणतेही काम कराल किंवा जर तुम्ही कुठले कार्य करण्यासाठी धैर्य करतात तर फक्त तुम्हालाच याचे परिणाम भेटेल म्हणून, हे तुम्हाला कुठलेही कार्य करण्याची शक्ती देईल. हे त्या लोकांसाठी अतिशय गरजेचे आहे जे स्पर्धा परीक्षेमध्ये चांगले यश मिळवु इच्छिता.
TREE_ROOT_OF_VIDHARA=ह्या झाडाचे मुळ <a href="https://www.astrosage.com/planet/mercury/"> बुध </a> दर्शवते. वैदिक ज्योतिषमध्ये बुध एक राजकुमार आहे. असे मानले जाते की, तार्किक क्षमता बुध ग्रहाच्या माध्यमातुन येते. बुध संचार, तर्क, तार्किक डोके, गणित, गणना इत्यादींचे प्रतिनिधित्व करते. म्हणुन जर तुम्ही या संबंधित क्षेत्राच्या मुद्यांचा सामना करत असाल तर, तुम्हाला या झाडाचे मुळ घालण्याची जास्त शिफारस केली जाते. यामध्ये रत्नासारखे कुठलेच वाईट परिणाम नाहीत. जर तुम्ही याला घातले तर हे तुमची संचार क्षमता, भाषण आणि तर्क शक्तीमध्ये सुधार आणु शकतात. जर तुमच्या कुंडलीमध्ये बुधला वाईट ठिकाणी ठेवलेले असेल तर पहिले तुम्हाला कुठल्या ज्योतिषाचा सल्ला घ्यावा लागेल आणि तुमचा जन्म तक्त्याचे विश्लेषण करण्याचा सल्ला दिला जातो. मग तुम्ही या झाडाच्या मुलाला घालू शकतात.
TREE_ROOT_OF_BANANA=ह्या झाडाचे मुळ बृहस्पती ग्रह दर्शवते. वैदिक ज्योतिषमध्ये बृहस्पती सगळ्यांच्या मध्ये गुरु आहे आणि सगळ्यात जास्त लाभकारी ग्रह मानले जाते. हे आपले ज्ञान, परिवार आणि मुलांचे प्रतिनिधित्व करते. जर तुमच्या कुंडलीमध्ये बृहस्पती वाईट ठिकाणी ठेवला गेला असेल, तर तुम्हाला कुठल्याही पुरुष परिणामांना कमी करण्यासाठी या झाडाच्या मुलांची गरज आहे. फक्त बृहस्पती हा असा ग्रह आहे जो वाईट ठिकाणी ठेवला गेला असेल तरी व्यक्तीच्या आयुष्यात वाईट करत नाही. जर हा पीडित असला तरी काही चांगले होणार नाही आणि वाईट ही होणार नाही.जर तुम्ही लग्न, मुले, ज्ञानाच्या संबंधित गोष्टीचा सामना करत असाल तर तो तुमच्यासाठी हे गरजेचे आहे. म्हणून बृहस्पतीच्या अशुभ आणि वाईट परिणामां पासून लांब जाण्यासाठी तुम्हाला या झाडाच्या मुळाचा उपयोग केला पाहिजे. भारंगी च्या मुळाचा उपयोग बृहस्पतीसाठीही करू शकतात.
TREE_ROOT_OF_SHARPUNKHA=ग्रह शुक्राच्या मुळांना दर्शवते. शुक्र ग्रह आहे जो एका कुंडलीमध्ये प्रेम, सौंदर्य, कला, नाते, प्रेमिका आणि विवाहाचे प्रतिनिधित्व करते. जर तुमच्या कुंडलीमध्ये शुक्र वाईट ठिकाणी ठेवला गेला आहे तर कदाचित तुम्ही या क्षेत्रा संबंधित मुद्यांचा सामना करत आहात. त्या स्थितीमध्ये तुम्ही या झाडाच्या मुलाला परिधान करू शकतात. याला हिऱ्याच्या विकल्प रूपामध्ये वापरले जाऊ शकते. जसे कि हिऱ्याची शिफारस फक्त त्या लोकांसाठी केली जाऊ शकते ज्याच्या शुक्र ग्रहावर सकारात्मक प्रभाव आहे. हिरा घातल्याने साइड इफेक्ट/ विपरीत परिणाम ही होऊ शकतात. यासाठी याला घालण्यासाठी पहिले ज्योतिषाचा सल्ला घ्यायला पाहिजे जरी, झाडांच्या मुळांचा काहीही साइड इफेक्ट / वाईट परिणाम नसेल तरीही. अरंध मुळांचा उपयोग शुक्रासाठीही केला जाऊ शकतो.
TREE_ROOT_OF_BICHUA=ह्या झाडाचे मुळ "शनी" ग्रहाला दर्शवतो. शनी ग्रह आपल्या निर्णयासंबंधीत जाणले जाते. शनी मंद गतीने चालणारा ग्रह आहे. हा जीवनाच्या हिश्यानंतर व्यक्तीला परिणाम देतो. याच्या सुस्तीच्या कारणाने यामध्ये उशीर होतो आहे. हा प्रतिबंध आणि सिमांनी जोडलेला आहे. याला वैदिक ज्योतिष मध्ये पुरुष ग्रह मानले जाते. याने मूळात विकास, करिअर, शिक्षणाच्या संबंधित भय, चिंता, उदासीनता आणि अन्य नकारात्मक गोष्टी समोर येतात. जर शनीला वाईट दृष्ट्या ठेवल्या गेले तर, हा मूळ राहणारा आपली पूर्ण प्रकृती दाखवेल. झाडाचे मुळ, शनीमुळे होणाऱ्या वाईट गोष्टींपासून लांब जाण्याचा प्राकृतिक उपचार आहे. जर कुठल्याही गोष्टींमध्ये शनीला सकारात्मकतेने ठेवल्यास तो व्यक्तीला आशीर्वाद देऊ शकतो. त्वरित आणि चांगले परिणाम भेटण्यासाठी आणि शनीची ताकद वाढवण्यासाठी झाडाच्या मुळांचा उपयोग करू शकतात. शनीच्या प्रभावाला संतुलित करण्यासाठी धोतरा च्या मुळांचा ही उपयोग केला जातो.
