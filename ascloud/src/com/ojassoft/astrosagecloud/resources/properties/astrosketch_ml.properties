
    ASTRO_SKETCH_DATA_MALE     = <p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങൾ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>മേട രാശിയിലുള്ള (മേടം) പുരുഷന്മാർക്ക് നേതൃത്വഗുണം ഉണ്ടാകും കൂടാതെ ഇവർ പുതിയ കാര്യങ്ങൾക്ക് മുൻകൈ എടുക്കുവാൻ ഇഷ്ടപ്പെടുന്നു. ആശ്ചര്യങ്ങളെ അവർ ഇഷ്ട്പ്പെടുന്നു, ഇവർ ദൃഢതയുള്ളവരും ഏറ്റവും ദുഷ്ക്കരമായ അവസരങ്ങളിൽ ആന്തരിക ശക്തി പ്രകടിപ്പിക്കുന്നവരുമാണ്. ഇവർ സ്വതന്ത്രനും, വിനോദങ്ങളെ ഇഷ്ട്പ്പെടുന്നവരും, സാഹസികനുമാണ്. ജീവിതത്തിന്‍റെ തെളിമയുള്ള വശം കാണുവാൻ ആഗ്രഹിക്കുന്ന ഇവർ ആക്രമണ സ്വഭാവമുള്ളവരും പാരുഷ്യമുള്ളവരും ആയിരിക്കും. കപടമായ അഭിനന്ദനങ്ങളെ ഇവർ ഇഷ്ട്പ്പെടുന്നില്ല. തന്‍റെ ഇല്ലാത്ത ഗുണങ്ങൾക്ക് പ്രശംസിക്കപ്പെടുന്നതിനേക്കാൾ ഉള്ള ഗുണങ്ങൾക്ക് വെറുക്കപ്പെടുന്നതാണ് ഇവർക്ക് ഇഷ്ടം. അവൻ ഒരു ബന്ധത്തിൽ ആയിരിക്കുമ്പോഴും  വ്യക്തി സ്ഥാനത്തിന് പ്രാധാന്യം നൽകുന്നു. ഒരു ചുമതല ഏറ്റാൽ അവൻ തന്‍റെ  പങ്കാളിയ്ക്ക് തുണയായിരിക്കുകയും, പങ്കാളിയോട് മൃദുലതയും, സ്നേഹവും ഉണ്ടായിരിക്കുകയും ചെയ്യും. അവൻ കൂടുതലും വർത്തമാനകാലത്തിൽ ജീവിക്കുന്നു ആയതിനാൽ ഭൂതകാലത്തു നിന്നുള്ള പാഠങ്ങളെ  ഗൗരവമായി എടുക്കുകയില്ല. </p><p><b> മേട രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>ജയപ്രധ, മംമ്ത കുൽക്കർണി, റാണി മുഖർജി, ജിതേന്ദ്ര</p><p><b>മേടം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>സാഹസികത, ഊർജ്ജസ്വലത, ധൈര്യം, ശക്തി, ശീഘ്രബുദ്ധി<br/><b>പ്രതികൂലം:  </b>സ്വാർത്ഥത, മുൻകോപം, ആവേഗശീലവും അക്ഷമയും</p><p><b>മേടത്തിന്‍റെ  ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മിഥുനം, ചിങ്ങം, ധനു, കൂടാതെ കുംഭം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>വൃഷഭ രാശിയിലുള്ള (ഇടവം) പുരുഷന്മാർക്ക് മനോഹരവും വശ്യവുമായ വ്യക്തിത്വം ഉണ്ടാകും. ഇവരുടെ  അത്യുന്നതമായ വ്യക്തിത്വം ഇവർക്ക് വളരെയധികം ശ്രദ്ധ നേടിക്കൊടുക്കും കൂടാതെ ഇവർ എവിടെ പോയാലും ആരാധകരാൽ ചുറ്റപ്പെടുകയും ചെയ്യും. വാക്കുകളാൽ സമ്പന്നരായ ഇവർ മികച്ച ആശയ വിനിമയ രീതിയാൽ എല്ലാവരെയും സ്വാധീനിക്കും. ഇവരുടെ ഏറ്റവും വലിയ ശക്തി ഇവരുടെ  ക്ഷമയാണ് കൂടാതെ പ്രതികൂല സാഹചര്യങ്ങളെ കൈകാര്യം ചെയ്യുമ്പോഴും തീരുമാനങ്ങൾ എടുക്കുമ്പോഴും തല ഉയർത്തി നിൽക്കുവാൻ ഇത് ഇവരെ സഹായിക്കുന്നു. ഇവർ കാണിക്കുന്ന വൈകാരികവും ധാർമ്മികവുമായ ധൈര്യത്തെ നിങ്ങൾ അഭിനന്ദിക്കും കൂടാതെ വിശ്വസ്ഥനും ആശ്രയിക്കവുന്നതുമായ ഒരു സുഹൃത്തായി നിങ്ങൾ ഇവരെ ചേർത്തു നിർത്തും. ഈ ഗുണഗണങ്ങൾ എല്ലാം ഉണ്ടെങ്കിൽ പോലും ചില സമയങ്ങളിൽ ഇവർ കൈവശപ്പെടുത്തുന്നവരും, മർക്കടമുഷ്ടിക്കാരും പിടിവാശിക്കാരും ആയിരിക്കും. </p><p><b> ഇടവ രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>അഞ്ജലി ജാതർ, മാധുരി ദീക്ഷിത്, മൗഷ്മി ചാറ്റർജി, പൂജ ബേഡി</p><p><b>ഇടവം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>ക്ഷമ,വിശ്വാസ്യത, ഊഷ്മളത, സ്ഥിരത, സൗമ്യത <br/><b>പ്രതികൂലം:  </b>അസൂയ, കൈവശപ്പെടുത്തൽ, പിടിവാശി, ഭോഗാസക്തി</p><p><b>ഇടവത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>കർക്കിടകം, കന്നി, മകരം, മീനം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>മിഥുന രാശിയിലുള്ള (മിഥുനം)പുരുഷന്മാർ ഉന്മേഷവാന്മാരും, ഉത്സാഹവാന്മാരും വളരെയധികം പ്രവർത്തന ക്ഷമതയുള്ളവരും ആയിരിക്കും. ബഹിർമ്മുഖ പ്രകൃതം, ഇവരെ മികച്ച സംഭാഷണചാതുര്യമുള്ള ആളാക്കി മാറ്റുന്നു. ബുദ്ധിമാനും ഉല്ലാസപ്രിയനുമാണ്, ജീവനോടും ജീവിതത്തോടുമുള്ള  ആവേശം ഇവരെ  ഇവരുടെ യഥാർത്ഥപ്രായത്തേക്കാൾ  ചെറുപ്പമാക്കി വയ്ക്കുന്നു. ഇവരെ വിശ്രമമില്ലാത്തവർ,   ജിജ്ഞാസു എന്നീ നിലകളിൽ പ്രതീക്ഷിക്കാവുന്നതും, ദൈനംദിനമുള്ള ഒരേ കാര്യങ്ങളിൽ മുഷിയുന്നവരുമാണ്. മുന്നോട്ടു പോകുന്നതിനും വ്യാപൃതനായിരിക്കുന്നതിനും എപ്പോഴും പുതിയ കാര്യങ്ങൾ ഇവർക്ക് ആവശ്യമാണ്. എന്നാൽ മറുവശത്ത്, ഇവർ അപകീർത്തികരമാം വിധം അവിശ്വസനീയരാണെന്നു കാണാം. സാഹചര്യങ്ങളെ തനിക്ക് അനുകൂലമായി മാറ്റിക്കൊണ്ട്, വ്യക്തിഗത കാര്യങ്ങൾക്കായി ഗൂഢാലോചന നടത്തുന്നതും ബുദ്ധിപരമായ കളികൾ കളിക്കുന്നതും ഇവരെ ഒരു ദ്വിമുഖനായി മാറ്റുന്നു.  തന്‍റെ ഹൃദയത്തെ പിന്തുടരുന്ന ഒരു യുക്തി ഹീനനായ സുഹൃത്തായി ഇവരെ കാണരുത്, ഇവർ പ്രയോഗിക ബുദ്ധിയുള്ളവരാണ് കൂടാതെ ഇവരുടെ തീരുമാനങ്ങളെ നിയന്ത്രിക്കുന്നത് ബുദ്ധിയാണ്. </p><p><b> മിഥുന രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/> ഡിമ്പിൾ കപഡിയ, ശില്പ ഷെട്ടി, മിഥുൻ ചക്രവർത്തി, പരേഷ് രവാൽ </p><p><b>മിഥുനം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>പരിസ്ഥിതികളോടുള്ള ഇണക്കം, വൈദഗ്ദ്ധ്യം, ഫലിതചതുരത, യുവത്വം, ഉന്മേഷം<br/><b>പ്രതികൂലം:  </b>ക്ഷോഭം, അന്തസാരമില്ലായ്മ, കൗശലം, അസ്ഥിരത </p><p><b>മിഥുനത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മേടം, ചിങ്ങം, തുലാം, കുംഭം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>കർക്കിടക രാശിയിലുള്ള(കാൻസർ) പുരുഷന്മാർ ലോലഹൃദയരും, വികാരാധീനരും, കരുതലില്ലാത്തവരുമാണ്. ഇവർ വളരെ കാവ്യത്മികതയുള്ളവരും വശീകരണ ശക്തിയുള്ള വാക്കുകളാൽ നിങ്ങളുടെ ഹൃദയമിടിപ്പിനെ പിടിച്ചു നിർത്താൻ കഴിവുള്ളവരുമാണ്. സ്നേഹവും, ശ്രദ്ധയും, സഹായവും ഇവർക്കുമേൽ വാരിച്ചൊരിയുന്നവരെയാണ് ഇവർ സുഹൃത്തായി തിരഞ്ഞെടുക്കുന്നത്. വീട്ടിൽ, ഇവന് ഏറ്റവും പ്രിയപ്പെട്ടവരുടെ അടുത്തിരിക്കുമ്പോഴാണ് അവൻ ഏറ്റവും കൂടുതൽ സന്തോഷിക്കുന്നത്. അന്യരുടെ വികാരങ്ങളെ മാനിക്കാത്തവരേയും, നിർവ്വികാരപരമായി പെരുമാറുന്നവരേയും  കഠിനമായ വാക്കുകളാൽ വേദനിപ്പിക്കുന്നവരേയും ഇവർ  വെറുക്കുന്നു, ആയതിനാൽ മര്യാദയില്ലാത്ത സ്ത്രീയുമായോ പുരുഷനുമായോ ഇവർ ഒരിക്കലും കൂട്ടുകൂടുകയില്ല. ഇവരുടെ  വിശ്വാസ്യത, ബന്ധങ്ങളിലുള്ള ആത്മാർത്ഥത എന്നിവ ഇവരെ അനുഗുണനാക്കുന്നു. കൂടാതെ ഇവരുടെ സമ്പുഷ്ട്മായ നർമ്മബോധം ആയിരക്കണക്കിന് ഹൃദയങ്ങളെ കവരുന്നു. ഇവർ പിശുക്കരോ ധാരാളിയോ അല്ല എന്നാൽ ഏറ്റവും വേണ്ടപ്പെട്ടവരെ ഭംഗിയുള്ളതും സ്പർശിയുമായ സമ്മാനങ്ങൾ കൊണ്ട് എങ്ങനെ ലാളിക്കാം എന്ന് ഇവർക്ക് അറിയാം. ഇവരുടെ  മാറിമാറിയുള്ള പെരുമാറ്റവും മാനസികാവസ്ഥയിലുള്ള ചഞ്ചലതയും ഇവരെ പ്രവചനാധീതമാക്കുമെങ്കിലും അവിശ്വസനീയനാക്കുകയില്ല, ഇവരുടെ   ലക്ഷ്യങ്ങളെ നിങ്ങൾക്ക് നിസ്സംശയം വിശ്വസിക്കാം.</p><p><b> കർക്കിടക രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/> പ്രിയങ്ക ചോപ്ര, ജൂലിയ റോബർട്സ്, റ്റോം ക്രൂസ്, ഡയാന രാജകുമാരി, പമീല ആൻഡേഴ്സൺ</p><p><b>കർക്കിടക രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>വികാരാധീനത, ആർദ്രത, അവബോധം, ഭാവന, വിവേകം, ജാഗ്രത, സംരക്ഷകത, അനുകമ്പ <br/><b>പ്രതികൂലം:  </b>സ്ഥിരതയില്ലായ്മ, വിഷണ്ണത, അമിത വികാരാധീനത, മുൻകോപം, മുറുകെ പിടിച്ചിരിക്കുന്നതുമായ </p><p><b>കർക്കിടകത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മേടം, ഇടവം, കർക്കിടകം, കന്നി, തുലാം, മകരം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>സിംഹ രാശിയിലുള്ള(ചിങ്ങം) പുരുഷന്മാർക്ക്  പുറമേ ശാഠ്യ സ്വഭാവമാണ് എന്നാൽ ഉള്ളിൽ അവർ കാല്പനികതയുള്ളവരും, അതിശ്രദ്ധയുള്ളവരും, പെട്ടെന്ന് വികാരാധീനരാകുന്നവരുമാണ്. തനിക്ക് ചുറ്റുമുള്ള സ്ത്രീകളെ വളരെയധികം ബഹുമാനിക്കുന്നവനും, പുറമെ കാണിച്ചില്ലെങ്കിലും തനിക്ക് പ്രിയപ്പെട്ടവർ  തന്‍റേതു മാത്രമായിരിക്കണമെന്ന് ആഗ്രഹിക്കുന്നവരുമാണ്. മുൻനിരയിൽ നിൽക്കുവാൻ ഇഷ്ട്പ്പെടുകയും, ധാരാളം ശ്രദ്ധ ലഭിക്കുന്നത് ആസ്വദിക്കുകയും ചെയ്യുന്നവരും, ഉല്ലാസപ്രിയനും, കായികാഭ്യാസിയും കൂടാതെ ചില സമയങ്ങളിൽ അന്തസ്സാരമില്ലാത്തവരും ആയിരിക്കും. സാഹചര്യങ്ങളുടേയും തനിക്ക് ചുറ്റുമുള്ള ആളുകളുടെ പോലും നിയന്ത്രണം ഏറ്റെടുക്കുവാൻ ഇവർ ഇഷ്ട്പ്പെടുന്നു. ഇത് എന്തുകൊണ്ടെന്നാൽ ഇവർ ജന്മനാ നേതാവും, തലവനും, സമുന്നതനുമാണ്. ഇവരുടെ  മുൻകോപവും സമാധാനലംഘനവും നിങ്ങളെ അസന്തുഷ്ടരാക്കുകയും നിങ്ങൾ ഇവരെ മർക്കട മുഷ്ടിക്കാരെന്നും അപ്രായോഗികരെന്നും തെറ്റിദ്ധരിക്കുവാൻ കാരണമാകുകയും ചെയ്യും. ആകസ്മികതയെ അങ്ങേയറ്റം ഇഷ്ടപ്പെടുന്നു, തന്‍റെ പ്രിയപ്പെട്ടവളെ വിലപ്പെട്ട സമ്മാനങ്ങളും, സ്മാരകവസ്തുക്കളും കൊണ്ട് പൊതിയും. ഇത് ഇവരെ ഒരു ധൂർത്തനാക്കി മാറ്റുന്നു എന്നതിൽ സംശയമില്ല. പ്രശംസിക്കപ്പെടുന്നതിലുള്ള ഇഷ്ടം ഇവർ പൊള്ളയായ പുകഴ്ത്തലുകളിലും, അർത്ഥമില്ലാത്ത മുഖസ്തുതികളിലും വീഴുവാൻ കാരണമാകും. ഇവർക്ക് ഒരു ബൃഹത്തായ സുഹൃത് വലയമുണ്ടാകും കൂടാതെ മികച്ച സാമൂഹിക ബന്ധം ഉണ്ടാക്കുകയും ചെയ്യും.</p><p><b> ചിങ്ങ രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>മനീഷ കൊയ് രാള, കാജോൾ, രാഖീ, മനോജ് കുമാർ, ഗുൽസാർ</p><p><b>ചിങ്ങ രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>നയതന്ത്രത, കാല്പനികത, വശ്യത, ആദർശവാദിത്വം <br/><b>പ്രതികൂലം:  </b>തീരുമാനമില്ലായ്മ, അസ്ഥിരത, എളുപ്പം കബളിപ്പിക്കപ്പെടുവാനുള്ള സാദ്ധ്യത</p><p><b>ചിങ്ങത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>കർക്കിടകം, മീനം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>കന്നിരാശിയിലുള്ള(വെർഗോ) പുരുഷന്മാർ അവർ ചെയ്യുന്ന വലുതോ ചെറുതോ ആയ ഏതു കാര്യത്തിലും പൂർണ്ണത ആഗ്രഹിക്കുന്ന ആദർശവാദികളാണ്. ജീവിതത്തിൽ എടുക്കേണ്ട തീരുമാനങ്ങളെ ബുദ്ധിയാൽ ഭരിച്ചു കൊണ്ട്, യുക്തിപരമായും അപഗ്രഥനപരമായും ജീവിതത്തെയും, ജോലിയേയും, ബന്ധങ്ങളേയും സമീപിക്കുന്നു. തീക്ഷ്ണവും മര്യാദയില്ലാത്തതുമായ അധിക്ഷേപ ഭാഷ ഇവർ വെറുക്കുന്നതിനാൽ, നിങ്ങൾ ഇവരുടെ മുന്നിൽ കാര്യങ്ങളെ വിവേചിച്ചു മാത്രമേ ചെയ്യുകയും പറയുകയും ചെയ്യാവൂ എന്നത് വളരെ പ്രധാനമാണ്. ഇവർ നിങ്ങളെക്കുറിച്ചുള്ള എല്ലാക്കാര്യങ്ങളും ശ്രദ്ധിക്കും, നിങ്ങളുടെ വസ്ത്ര ധാരണം, സംസാരം,നിങ്ങൾ നിങ്ങളെ തന്നെ വഹിക്കുകയും നിങ്ങളുടെ പെരുമാറ്റ രീതികളെ ശ്രദ്ധിക്കുകയും ചെയ്യുമെന്ന് പ്രതീക്ഷിക്കുന്നു. ഇവർ പൊങ്ങച്ചക്കാരാണെന്ന് ഇതിന് അർത്ഥമില്ല എന്നാൽ  ഇവർ അങ്ങേയറ്റം ഭവ്യതയുള്ളവരും കൂടാതെ ലളിതമെങ്കിലും അച്ചടക്കമുള്ള ജീവിതം നയിക്കുന്നവരുമാണ്. പ്രിയപ്പെട്ടവരോടും അടുത്ത സുഹൃത്തുക്കളോടും അങ്ങേയറ്റം സ്നേഹമുള്ളവരും അവർക്ക് സംരക്ഷണം നൽകുന്നവരുമാണ്. യുക്തിപൂർവ്വമുള്ള സമീപനമായതിനാൽ, ഇവർ ഒരിക്കലും വാദപ്രതിവാദത്തിൽ പരാജയപ്പെടുകയില്ല കൂടാതെ തർക്കങ്ങളെ അങ്ങേയറ്റം എളുപ്പത്തിൽ പരിഹരിക്കുകയും ചെയ്യും. സത്യസന്ധമായതും, ക്രമപ്പെടുത്തിയതും, അർപ്പണമനോഭാവമുള്ളതും, ഉപകാരപ്രദമായതും ആകയാൽ ഇവരെ അങ്ങേയറ്റം ആശ്രയിക്കാവുന്നതാണ്, എന്നാൽ ചില സമയങ്ങളിൽ വിരുദ്ധമാകാറുമുണ്ട്. </p><p><b> കന്നി രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>ആശ ഭോസ് ലെ, രാകേഷ് റോഷൻ, അഗതാ ക്രിസ്റ്റി, എലിസബത്ത് രാജ്ഞി, ജോസഫ് കെന്നഡി.</p><p><b>കന്നി രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>മര്യാദ, അതിസൂക്ഷ്മത, വിശ്വാസ്യത, പ്രായോഗികത, അദ്ധ്വാനശീലം<br/><b>പ്രതികൂലം:  </b>പരാതിപറയൽ, അമിത  വിമർശനം, നിഷ്ഠുരത, യാഥാസ്ഥിതികത</p><p><b>കന്നിയുടെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>ഇടവം, മകരം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>തുലാം രാശിയിലുള്ള(ലിബ്ര) പുരുഷന്മാർ ദൃഢചിത്തതയും, കാല്പനികതയും, സർഗ്ഗശക്തിയുമുള്ള വ്യക്തികളായിരിക്കും. സ്നേഹിക്കപ്പെടുവാനും ബഹുമാനിക്കപ്പെടുവാനും അർഹതയുള്ളവനും സമർത്ഥരും വിശ്വസ്തരും വിനോദം ഇഷ്ട്പ്പെടുന്നതുമായ ആളുകളാൽ ആകർഷിക്കപ്പെടുന്നവരുമാണ്. ഒരു പങ്കാളി എന്ന നിലയിൽ ഇവർ നിങ്ങൾക്ക് വ്യക്തിപരമായ സ്ഥാനം നൽകുകയും കൂടാതെ അത് നിങ്ങളിൽ നിന്നും പ്രതീക്ഷിക്കുകയും ചെയ്യും. വിലകൂടിയ വസ്ത്രങ്ങൾ, വാച്ചുകൾ, ഷൂസുകൾ, പ്രമുഖ കമ്പനികളുടെ സുഗന്ധദ്രവ്യങ്ങൾ, സംഗീതം, സിനിമ, കല എന്നിവയ്ക്കായി പണം ചിലവഴിക്കുവാൻ ഇവർ ഇഷ്ടപ്പെടുന്നു. ചിന്തകൾ പുരോഗമനോന്മുഖമായതിനാലും മാറ്റങ്ങൾക്ക് പെട്ടെന്ന് വഴങ്ങുമെന്നതിനാലും , തനിക്ക് ചുറ്റുമുള്ളവരുടെ അഭിപ്രായങ്ങളോ ചിന്തകളോ കേൾക്കുകയോ സ്വീകരിക്കുകയോ ചെയ്യുകയില്ല, അങ്ങനെ വേണമെങ്കിൽ അവ പ്രായോഗികമാകണം. അങ്ങേയറ്റം വാചാലരായതിനാൽ, ശുഭാപ്തി വിശ്വാസവും ഉന്മേഷവുമുള്ള ആളുകളാൽ ചുറ്റപ്പെട്ടിരിക്കുമ്പോൾ സന്തോഷവാനായിരിക്കുകയും താത്പര്യമുള്ള സംഭാഷണത്തിൽ വളരെ നേരം മുഴുകുവാനുള്ള പ്രവണത കാണിക്കുകയും ചെയ്യും. ഇവർ അലസരല്ല, ഒരു തീരുമാനം എടുക്കുവാൻ കുറച്ചു സമയം എടുക്കുമെന്നു മാത്രം. കാലം കഴിയുംതോറും ഇവരുടെ നയതന്ത്രത വെള്ളത്തിലാകുകയും ചുറ്റുമുള്ളവരെ അസ്വസ്ഥരാക്കുകയും ചെയ്യും. </p><p><b> തുലാം രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/> കെയ്റ്റ് വിൻസ് ലറ്റ്, രേഖ,  കരീന കപൂർ, ലത മങ്കേഷ്ക്കർ, അമിതാഭ് ബച്ചൻ, മഹാത്മ ഗാന്ധി </p><p><b>തുലാം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>നയതന്ത്രത, വശ്യത, കാല്പനികത, സുഖപ്രിയത, ആദർശവാദിത്വം <br/><b>പ്രതികൂലം:  </b>സങ്കോചം, അസ്ഥിരത, എളുപ്പത്തിൽ കബളിപ്പിക്കപ്പെടൽ</p><p><b>തുലാമിന്‍റെ  ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മേടം, കർക്കിടകം, ചിങ്ങം, തുലാം, ധനു, മകരം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>വൃശ്ചിക രാശിയിലുള്ള(സ്കോർപിയോ) പുരുഷന്മാർ അത്യാവേശമുള്ളവരും, ഫലിത ചതുരനും, സൂക്ഷ്മബുദ്ധിയുള്ളവരും, അതിയായി രഹസ്യം സൂക്ഷിക്കുന്നവരുമാണ്. ഇവരുടെ അത്യാവേശ പ്രകൃതവും ആത്മവിശ്വാസമുള്ള വ്യക്തിത്വവും ഇവരെ ആകർഷണ കേന്ദ്രമാക്കിമാറ്റുന്നു. ഇവരുടെ  ആഗ്രഹങ്ങൾ ഇവരെ  പ്രചോദിതരാക്കി നിലനിർത്തുന്നു  കൂടാതെ സമൂഹത്തിലെ സ്ഥാപിത നിയമങ്ങളിൽ വിശ്വസിക്കാത്ത ഇവർ, ഏറെക്കുറെ നിഷേധിയാണ്. ഇവർ അനന്തമാം വിധം കാമഭാവമുള്ളവരും, വിഷണ്ണരും, പ്രശാന്തരും, പെരുമാറ്റത്തിൽ ഇരുത്തം വന്നവരും ആണ്. കൃതൃമമായതും, പൊള്ളയായതും, ആത്മാർത്ഥതയില്ലാത്തതും ആയ കാര്യങ്ങളെ ഇവർ വെറുക്കുന്നു. സന്തോഷമായിരിക്കുവാനും, പൂർണ്ണത അനുഭവിക്കുവാനും നിഷ്കപടമായ ആളുകൾ ഇവർക്ക് ചുറ്റും ആവശ്യമാണ്. ഇവർ എപ്പോഴും പുതിയതും ഹൃദയഹാരിയായതുമായ കാര്യങ്ങളിൽ ആയതിനാലും ഇവർ ചുറ്റുമുള്ളിടത്തോളം നിങ്ങളെ വ്യാപൃതനാക്കി നിർത്തുന്നതിനാലും ഇവരുമായുള്ള കൂട്ട്കെട്ട് നിങ്ങൾക്ക് ഒരിക്കലും മുഷിച്ചിൽ ഉണ്ടാക്കുകയില്ല. ഇത് ഇവരെ ഒരു വലിയ സംഘം സുഹൃത്തുക്കളും അടുപ്പമുള്ളവരും ഉള്ള ബഹിർമുഖനാക്കി മാറ്റുന്നു. എന്നിരുന്നാലും ഇവർ നൽകുന്ന സ്നേഹം അതേ തീവ്രതയിൽ തന്നെ തിരികെ ലഭിക്കണമെന്ന്  ഒരു ബന്ധത്തിൽ നിന്നും ഇവർ ആവശ്യപ്പെടുകയും പ്രതീക്ഷിക്കുകയും ചെയ്യുന്നു. ഇത്രയും പ്രസന്നവും ശാന്തവുമായ ഇവരുടെ ഉള്ളിൽ ആകർഷകവും കീഴ്പെടുത്തുന്നതുമായ മൃഗീയമായ ഊർജ്ജത്തോടുകൂടിയ ഒരാളെ നിങ്ങൾക്ക് കാണുവാൻ കഴിയും.</p><p><b> വൃശ്ചിക രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>ഐശ്വര്യ റായ്, ഇന്ദിര ഗാന്ധി, ജവഹർ ലാൽ നെഹ്രു, ഷാറൂഖ് ഖാൻ, ബിൽ ഗേറ്റ്സ്, ബ്രയാൻ ആഡംസ്, ഡെമി മൂർ</p><p><b>വൃശ്ചിക രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>വൈകാരികത, തീവ്രത, മാന്യത, മൃദുലത, അന്തർജ്ഞാനം, ലൗകികത, ഗൂഢത, തീക്ഷണത <br/><b>പ്രതികൂലം:  </b>അസൂയ, കോപം, നിർബന്ധം, ഉപദ്രവം</p><p><b> വൃശ്ചികത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>കർക്കിടകം, മീനം. </p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങൾ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>ധനു രാശിയിലുള്ള(സഗിറ്റേറിയസ്) പുരുഷന്മാർ സന്തോഷവാന്മാരും ഭാഗ്യശാലികളും ആയിരിക്കും. ഏറ്റവും ആവശ്യമായ നയതന്ത്രത ഇവർക്ക് കുറവായിരിക്കും കൂടാതെ പാരുഷ്യമുള്ളവരും സത്യസന്ധരും ആയിരിക്കും. ഇവർക്ക് അടുപ്പമുള്ളവരും പ്രിയപ്പെട്ടവരുമായി ഇരിക്കുമ്പോൾ ഇവർ സൗഹൃദപരവും, തുറന്നു സംസാരിക്കുന്നവരും, വ്യാപൃതരുമായിരിക്കും. ഇവർ ഒരിക്കലും ഭൂതകാലത്തിന്‍റെ  മാറാപ്പ് പേറി നടക്കുകയില്ല, വർത്തമാന കാലത്തിലും പ്രായോഗിക ലോകത്തിലും  ജീവിക്കുകയും ചെയ്യും. ജീവിതത്തിലെ ദുഖകരമായ സംഭവങ്ങൾ ഇവരെ ഒരിക്കലും അശുഭാപ്തി വിശ്വാസികളാക്കി മാറ്റുകയില്ല കൂടാതെ ഇവരുടെ ശുഭാപ്തി വിശ്വാസം ഇവരെ പ്രചോദിതരായി നിർത്തുകയും ചെയ്യും. വെല്ലുവിളി നേരിടുന്ന ഒരു സാഹചര്യം ഉണ്ടായാൽ, കീഴടങ്ങാതെ അവസാനം വരെ പോരാടുകയും ചെയ്യും. സാധാരണയായി ഇവർ വിരോധം മനസ്സിൽ വയ്ക്കാറില്ല, എന്നാൽ ഇവരെ ആരെങ്കിലും ഇടിച്ചു താഴ്ത്തുവാൻ ശ്രമിച്ചാൽ ഇവർ വളരെ അനായാസം തിരിച്ചു നൽകും. ഇവരെക്കൊണ്ട് നിർദേശങ്ങൾ അനുസരിപ്പിക്കാമെന്ന് നിങ്ങൾ പ്രതീക്ഷിക്കരുത് എന്നാൽ ഇവരെ ഉദാഹരണങ്ങൾ കൊണ്ട് പ്രചോദിപ്പിക്കുകയും സഹാനുഭൂതിയാൽ നയിക്കുകയും ചെയ്യാം. ചില സമയങ്ങളിൽ ഇവരുടെ പാരുഷ്യത ഇവരെ ദുഷ്ക്കരമായ സാഹചര്യങ്ങളിൽ കൊണ്ടെത്തിക്കും കൂടാതെ ഇവരുടെ സത്യസന്ധത അനിഷ്ടകരമായി തോന്നുകയും ചെയ്യാം. ഇവർ യാത്ര ചെയ്യുവാൻ ഇഷ്ടപ്പെടുന്നു കൂടാതെ ഒരേ ദിനചര്യകളും ഒരേ പോലെയുള്ള കാര്യങ്ങൾ ചെയ്യുന്നതും ഇവർ വെറുക്കുന്നു. </p><p><b> ധനു രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/> ധർമ്മേന്ദ്ര, ശത്രുഘൻ സിൻഹ, ദിലിപ് കുമാർ,വിൻസ്റ്റൻ ചർച്ചിൽ</p><p><b>ധനു രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: ശുഭാപ്തിവിശ്വാസം, ഉത്സാഹം, പ്രസന്നത, സത്യസന്ധത, തത്വജ്ഞാനം <br/><b>പ്രതികൂലം:  അശ്രദ്ധ, അന്ധമായ ശുഭാപ്തിവിശ്വാസം, നയരാഹിത്യം,വിശ്രമഹീനത </p><p><b>ധനുവിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>കർക്കിടകം, മീനം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>മകര രാശിയിലുള്ള(കാപ്രികോൺ) പുരുഷന്മാർ വളരെയധികം ഒതുക്കമുള്ളവരായതിനാൽ തുടക്കത്തിൽ ഇവരെ സമീപിക്കുവാൻ വളരെയധികം പ്രയാസമായിരിക്കും. ഇവർ തങ്ങളുടെ യഥാർത്ഥത്തിലുള്ള ലോലഭാവം ദൃഢതയെന്ന പുറംചട്ടയാൽ സുരക്ഷിതമാക്കിയിരിക്കുന്നു. ഇവർ അന്തർമുഖികളാണ്, ആൾക്കൂട്ടത്തിൽ ലജ്ജാശീലരാണ് കൂടാതെ ഇവരെ നന്നായി അറിയാവുന്നതും ആരുടെ അടുത്ത് എത്തുമ്പോഴാണോ ഇവർ കൂടുതൽ ആശ്വാസകരമായിരിക്കുന്നതും അങ്ങനെയുള്ള ഏറ്റവും അടുത്ത സുഹൃത്തുക്കളോട് മാത്രമേ ഇവർ മനസ്സു തുറന്നു സംസാരിക്കാറുള്ളു. നിങ്ങളുടെ കൂട്ടുകെട്ട് ഇവർക്ക് സുഖപ്രദമാണെങ്കിൽ, ഇവരുടെ അനന്യസാധാരണമായ ഫലിതചാതുര്യവും തമാശ നര്രഞ്ഞ അഭിപ്രായപ്രകടനങ്ങളും കൊണ്ട് ഇവർ നിങ്ങളെ ആശ്ചര്യപ്പെടുത്തും. ഇവർ ചഞ്ചല മനസ്ക്കരല്ല എന്നാൽ ഇവരുടെ മനോഭാവത്തിൽ തുടരെ തുടരെ മാറ്റം ഉണ്ടാകും ഇത് ഇവർ നിർവ്വികാരരാണെന്ന് നിങ്ങൾ ചിന്തിക്കുവാൻ കാരണമാകുകയും ചിലപ്പോൾ നിങ്ങളെ വേദനിപ്പിക്കുകയും ചെയ്തേക്കാം. ഇവർ തീർത്തും മിതവ്യയശീലമുള്ളവരും ചിലവുകളെ ശ്രദ്ധാപൂർവ്വം നിരീക്ഷിക്കുന്നവരും ആവശ്യമില്ലാതെ ചിലവഴിക്കത്തവരുമാണ്. ഇവർ തീവ്രമായ ഉത്കർഷേച്ഛ നിറഞ്ഞവരാണെന്നതിൽ സംശയമില്ല എന്നാൽ ഇവർ കുടുംബത്തെ അവഗണിക്കുകയോ അവരോടുള്ള ഉത്തരവാദിത്വങ്ങൾ വിസ്മരിക്കുകയോ ചെയ്യുകയില്ല.</p><p><b> മകര രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>അനു അഗർവാൾ, റീന റോയ്, സൽമാൻ ഖാൻ, അനിൽ കപൂർ, ജവേദ് അക്തർ, നാനാ പടേക്കർ</p><p><b>മകര രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>പ്രായോഗികത, വിവേകം, ഉത്കർഷേച്ഛ,ക്ഷമ, ശ്രദ്ധ <br/><b>പ്രതികൂലം:  </b>അശുഭാപ്തി വിശ്വാസം, വിധി വിശ്വാസി, പിശുക്ക്,പക വച്ച് പുലർത്തൽ </p><p><b>മകരത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>ഇടവം, കന്നി</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങൾ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>കുംഭ രാശിയിലുള്ള(അക്വാറിയസ്) പുരുഷന്മാർ ഉന്നതമായ രീതിയിൽ സ്വതന്ത്രരും, ബുദ്ധിയുള്ളവരും കൂടാതെ അതേ സമയം സ്വപ്നജീവിയുമാണ്. ഇവർ വിഷണ്ണരും, പ്രവചനാധീതരും കൂടാതെ പെട്ടെന്ന് മനസ്സിലാക്കാൻ ബുദ്ധിമുട്ടുള്ളവരുമാണ്. സാമൂഹിക നിയമങ്ങളെ ഇവർ പിന്തുടരുകയില്ല എന്നാൽ തങ്ങളുടെ തന്നെ നിയമങ്ങളിൽ ജീവിക്കുകയും ചെയ്യും. ഇവർ മറ്റാരുടേയും ജീവിതത്തിൽ ഇടപെടുകയില്ല കൂടാതെ ഇത് മറ്റുള്ളവരിൽ നിന്നു പ്രതീക്ഷിക്കുകയും ചെയ്യും, എന്തെന്നാൽ ഇവർ തങ്ങളുടെ വ്യവസ്ഥകളിൽ ജീവിക്കുവാൻ ആഗ്രഹിക്കുന്നു. ചിലപ്പോൾ ബന്ധമറ്റതോ വിദൂരത്തിലുള്ളതോ എന്നപോലെ നിർവ്വികാരരായി തോന്നാം, എന്നാൽ ഇത് സത്യമല്ല, ഇവർ നല്ല കരുതൽ ഉള്ളവരാണ്. ഇവർ തുല്യതയെ ആ വാക്കിന്‍റെ പൂർണ്ണ അർത്ഥത്തിൽ വിശ്വസിക്കുന്നവരും കൂടാതെ എല്ലാവരോടും നല്ല രീതിയിൽ പെരുമാറുന്നവരുമാണ്. ഒരു ദിവാ സ്വപ്നാടകൻ, മറ്റുള്ളവരിൽ നിന്നും അകന്ന് നിൽക്കുന്നവനെന്നും അശ്രദ്ധയുള്ളവനെന്നും മിക്കപ്പോഴും തോന്നാം എന്നാൽ അവർ ശ്രദ്ധയുള്ളവരും കൂടാതെ ജാഗരൂകരുമാണ്. ലോകമെന്താണ് പറയുന്നത് എന്നതിനെക്കുറിച്ച് വളരെക്കുറച്ചുമാത്രം ശ്രദ്ധിക്കുന്നവരായതിനാൽ ഇവരിൽ നിന്നും അമിതാവേശമുള്ള പ്രവർത്തികൾ പ്രതീക്ഷിക്കാവുന്നതും കൂടാതെ തമാശ നിറഞ്ഞ സാഹസികതകളാൽ നിങ്ങളെ വ്യാപൃതരാക്കുന്നതും ആണ്.</p><p><b> കുംഭ രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>ഊർമിള മറ്റോദ്കർ, പ്രീതി സിന്‍റ,  വഹീദ റഹ് മാൻ, സുഭാഷ് ഘൈ</p><p><b>കുംഭം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>സഹൃദയത, മനുഷ്യത്വം, യാഥാർത്ഥ്യത, നിർമ്മാണ ശക്തി, സ്വതന്ത്രത, ബുദ്ധി<br/><b>പ്രതികൂലം:  </b> വിപരീത ബുദ്ധി, നിർവ്വികാരത, വിരക്തി, പ്രവചനാധീതം</p><p><b>കുംഭത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മിഥുനം,തുലാം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>മീന രാശിയിലുള്ള(പിസസ്സ്) പുരുഷന്മാർ നൈപുണ്യമുള്ളവരും സർഗ്ഗശക്തിയുള്ളവരുമാണ്. ഇവർ ഗുപ്ത ശാസ്ത്രത്തിൽ പ്രകൃത്യാ തന്നെ താത്പര്യമുള്ളവരാണ് കൂടാതെ മാറ്റങ്ങളുമായി വളരെ വേഗം പൊരുത്തപ്പെടുകയും ചെയ്യും. ജീവിതത്തിന്‍റെ ഒരു ഭാഗമായി മാറ്റങ്ങളെ ഇവർ കാണുന്നു. ഇത് ഇവരെ സമീപനങ്ങളിൽ അയവുള്ളവരാക്കി മാറ്റുകയും എല്ലാവരുമായും ചേർന്നു പോകുവാൻ സഹായിക്കുകയും ചെയ്യുന്നു. ഇവർ ലോലഹൃദയരും മിക്കപ്പോഴും ആത്മപീഡകരുമാണ്. ഇവർക്ക് എല്ലാത്തിനോടും ശുഭാപ്തി സമീപനമാണ് ഉള്ളത്. ഇവരുടെ സർഗ്ഗശക്തി വിജയത്തിന്‍റേയും അതുപോലെ തന്നെ പരാജയത്തിന്‍റേയും താക്കോലാണ്, ഇത് എങ്ങനെ ഉപയോഗിക്കുന്നു എന്നതിനെ പൂർണ്ണമായി ആശ്രയിച്ചിരിക്കുന്നു. ഇവർ ചില സമയങ്ങളിൽ വിഷണ്ണരാകാറുണ്ട് കൂടാതെ കാരണം ഉണ്ടെങ്കിലും ഇല്ലെങ്കിലും പൊതുവെ മനചാഞ്ചല്യത്തിനുള്ള പ്രവണത ഉണ്ട്. ഇവർ വളരെ നിഷ്കർഷയുള്ളവരാണ്, അതേ സമയം മനസ്സിലാക്കുന്നവരുമാണ്. കാര്യങ്ങൾ നിർബന്ധിച്ച് ചെയ്യിക്കുന്നത് ഇവർ വെറുക്കുന്നു എന്നാൽ ആഗ്രഹിക്കുന്ന കാര്യങ്ങൾ ചെയ്യുവാൻ ഇഷ്ടപ്പെടുന്നു. ആളുകളുടെ മനോഭാവം ഇവർ നിമിഷങ്ങൾക്കകം മനസ്സിലാക്കുന്നതിനാൽ, ഇവരെ സവാരിക്കായി കൊണ്ടുപോകുന്ന കാര്യം ആർക്കും ചിന്തിക്കുവാൻ പോലും കഴിയുകയില്ല.</p><p><b> മീന രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>പ്രീതി സിന്‍റ,  ചെൽസിയ ക്ലിന്‍റൺ, ആൽബർട്ട് ഐൻസ്റ്റീൻ, മൈക്കലാഞ്ചലോ</p><p><b>മീന രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>സർഗ്ഗശക്തി, ലോലഹൃദയത, സഹാനുഭൂതി, നിസ്വാർത്ഥത, ആർദ്രത<br/><b>പ്രതികൂലം:  </b>വഴുതി പോകൽ, ആദർശവാദി, രഹസ്യം സൂക്ഷിക്കൽ, ദുർബ്ബലമായ ആത്മസം യമനം</p><p><b>മീനത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>ഇടവം, കന്നി, ധനു,മകരം, മീനം</p>
    ASTRO_SKETCH_DATA_FEMALE   = <p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>മേട രാശിയിലുള്ള (മേടം) സ്ത്രീകൾക്ക് ജന്മനാ നേതൃത്വഗുണം ഉണ്ടാകും, ഇവർ പുതിയ കാര്യങ്ങൾക്ക് മുൻകൈ എടുക്കും. ജീവിതത്തിലെ ഏറ്റവും ദുഷ്ക്കരമായ അവസരങ്ങൾ പോലും അതിജീവിക്കുവാനും കൂടാതെ ഏറ്റവും ഭയാനകമായ വിപത്തുകളെ  തരണം ചെയ്യുവാനും ഇവർക്ക് കഴിയും. ഇവർ സ്വതന്ത്രരും, അല്ലലില്ലാത്തവരും, ധൈര്യം ഉള്ളവരുമാണ്. ഇവർ അക്രമണ സ്വഭാവമുള്ളവരും,ശുഭാപ്തി വിശ്വാസം നിറഞ്ഞവരും, ഭാവിയിൽ ജീവിക്കുന്നവരുമാണ്. കപടമായ അഭിനന്ദനങ്ങളെ ഇവർ ഇഷ്ട്പ്പെടുന്നില്ല. എന്നാൽ ആത്മാർത്ഥമായ പ്രശംസ ഇവർ ഇഷ്ടപ്പെടുന്നു. സംശയിക്കപ്പെടുന്നത് ഇവർ വെറുക്കുന്നു, സ്വന്തമാക്കി വയ്ക്കും എന്നാൽ സ്വന്തമായിരിക്കുവാൻ ആഗ്രഹിക്കുന്നില്ല. അങ്ങേയറ്റം ദയയും, മൃദുലതയും, വിശ്വസ്തതയും, ധാർമ്മിക പിന്തുണയുമുള്ള പ്രകൃതമാണ് ഇവരുടേത്. വിവാഹത്തിന് ശേഷവും ജോലിയിൽ തുടരുവാനുള്ള പരമാവധി സാധ്യതയുണ്ട്. ഇവർ വെല്ലുവിളികളെ ഇഷ്ടപ്പെടുകയും അത്ഭുതങ്ങളെ ഇഷ്ടപ്പെടുകയും ചെയ്യുന്നു. ഇവർ ഒരിക്കലും ഭൂതകാലത്തിൽ ജീവിക്കത്തതിനാൽ, തെറ്റുകൾ ആവർത്തിച്ചു കൊണ്ടിരിക്കും. </p><p><b> മേട രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>ജയപ്രധ, മംമ്ത കുൽക്കർണി, റാണി മുഖർജി, ജിതേന്ദ്ര</p><p><b>മേടം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>സാഹസികത, ഊർജ്ജസ്വലത, ധൈര്യം, ശക്തി, ശീഘ്രബുദ്ധി<br/><b>പ്രതികൂലം:  </b>സ്വാർത്ഥത, മുൻകോപം, ആവേഗശീലവും അക്ഷമയും</p><p><b>മേടത്തിന്‍റെ  ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മിഥുനം, ചിങ്ങം, ധനു, കൂടാതെ കുംഭം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>വൃഷഭ രാശി (ഇടവം) സ്ത്രീകൾക്ക് മനോഹരവും വശ്യവുമായ വ്യക്തിത്വം ഉണ്ടാകും. ഇവരുടെ  അത്യുന്നതമായ വ്യക്തിത്വം ഇവർക്ക് വളരെയധികം ശ്രദ്ധ നേടിക്കൊടുക്കും. ഇവർക്ക് സൗഹൃദ പരവും, മൃദുലവും,  മികച്ചതും ആയ  ആശയ വിനിമയ രീതി ഉണ്ട്. തങ്ങളുടെ രൂപത്തിൽ ഇവർ വളരെയധികം ശ്രദ്ധാലുക്കളായിരിക്കും കൂടാതെ വളരെ വേഗം വണ്ണം വയ്ക്കുവാനുള്ള സാധ്യതയുണ്ട്. ഇവർ ശാന്ത സ്വഭാവമുള്ളവരും പ്രയാസമേറിയ അവസരങ്ങളേ വളരെ ക്ഷമയോടെ കൈകാര്യം ചെയ്യുന്നവരുമാണ്. ഇവരുടെ മനോധൈര്യം അഭിനന്ദനാർഹമാണ് ഇവർ മിക്കപ്പോഴും വൈകാരികവും ധാർമ്മികവുമായ ധൈര്യം കാണിക്കും. ഇവർ വിശ്വസ്ഥരും ആശ്രയിക്കവുന്നതുമായ ഒരു സുഹൃത്തായിരിക്കും.ഈവരുടെ സാധനങ്ങളെക്കുറിച്ച് വളരെയധികം ഉടമസ്ഥതാ ബോധമുള്ളവരും വളരെ അലസമായി ജീവിതം നയിക്കുവാൻ പ്രവണതയുള്ളവരും ഏറെക്കുറെ പിടിവാശിക്കാരും ആയിരിക്കും. </p><p><b> ഇടവ രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>അഞ്ജലി ജാതർ, മാധുരി ദീക്ഷിത്, മൗഷ്മി ചാറ്റർജി, പൂജ ബേഡി</p><p><b>ഇടവം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>ക്ഷമ,വിശ്വാസ്യത, ഊഷ്മളത, സ്ഥിരത, സൗമ്യത <br/><b>പ്രതികൂലം:  </b>അസൂയ, കൈവശപ്പെടുത്തൽ, പിടിവാശി, ഭോഗാസക്തി</p><p><b>ഇടവത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>കർക്കിടകം, കന്നി, മകരം, മീനം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>മിഥുന രാശി(മിഥുനം)സ്ത്രീകൾ ഉന്മേഷമുള്ളവരും ,വശ്യതയുള്ളവരും സംഭാഷണചതുരരും ആയിരിക്കും. ഇവർ മാനസികമായി വളരെയധികം പ്രവർത്തന ക്ഷമതയുള്ളവരും ശാരീരികമായി യഥാർത്ഥപ്രായത്തേക്കാൾ  ചെറുപ്പമായി കാണുന്നവരുമാണ്. ഇവർ  വിശ്രമമില്ലത്തവരും, വളരെ വേഗം മുഷിച്ചിൽ അനുഭവപ്പെടുന്നവരും   ഒരു കാര്യത്തിനു വേണ്ടി ദീർഘനാൾ ശ്രദ്ധചെലുത്താൻ കഴിയാത്തവരുമാണ്. ഇവർ താരതമ്യം ചെയ്യാൻ കഴിയാത്ത വിധം ജിജ്ഞാസ ഉള്ളവരാണ്. എന്നാൽ മറുവശത്ത്, ഇവർ തങ്ങളുടെ മനോഭാവത്തെ മാറ്റിക്കൊണ്ടിരിക്കുന്നതിനാൽ അപകീർത്തികരമാം വിധം അവിശ്വസനീയരാണെന്നു കാണാം. വ്യക്തിഗത കര്യങ്ങൾക്കായി മറ്റുള്ളവരിൽ കൗശലം പ്രയോഗിക്കുവാനുള്ള് പ്രവണത ഇവർക്കുണ്ട്. എന്നിരുന്നാലും വിനയം കൊണ്ടും ഉജ്ജ്വലമായ സാനിധ്യം കൊണ്ടും ഇവർ ആകർഷണ കേന്ദ്രമയി മാറുന്നു.ഇവർ തങ്ങളുടെ മിക്കവാറും ഉള്ള തീരുമാനങ്ങൾ എടുക്കുന്നത് ബുദ്ധിയുപയോഗിച്ചാവും ഹൃദയം കൊണ്ടാവില്ല കൂടാതെ ബൗദ്ധികമായ എന്തിനും ഇവർ മഹത്തായ വില കൽപ്പിക്കുന്നു. </p><p><b> മിഥുന രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/> ഡിമ്പിൾ കപഡിയ, ശില്പ ഷെട്ടി, മിഥുൻ ചക്രവർത്തി, പരേഷ് രവാൽ </p><p><b>മിഥുനം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>പരിസ്ഥിതികളോടുള്ള ഇണക്കം, വൈദഗ്ദ്ധ്യം, ഫലിതചതുരത, യുവത്വം, ഉന്മേഷം<br/><b>പ്രതികൂലം:  </b>ക്ഷോഭം, അന്തസാരമില്ലായ്മ, കൗശലം, അസ്ഥിരത </p><p><b>മിഥുനത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മേടം, ചിങ്ങം, തുലാം, കുംഭം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>കർക്കിടക രാശിയിലുള്ള(കാൻസർ) സ്തീകൾ അതീവ  ലോലഹൃദയ പ്കൃതമുഌഅവരാണായതിനാൽ കരുതലില്ലാത്തവരുമാണ്. പൊതുവെ, ഇവർ വൈകാരികതയുള്ളവരും സ്നേഹിക്കപ്പെടുന്നുണ്ടെന്നും ആവശ്യമുണ്ടെന്നും നിരന്തരം സ്ഥിരീ്രണം ആവശ്യമുള്ളവരുമാണ്. ഇവർ ശ്രദ്ധ ആവശ്യമുള്ളവരും, വിഷണ്ണരും, വളരെ ജാഗ്രതയുള്ളവരും, ആണ് ഇത് ഇവരുടെ വൈകാരിക പ്രകൃതത്തിന്‍റെ ലക്ഷണങ്ങളാണ്. ഇവർ മൃദുലവും, സ്ത്രീസഹജതയുള്ളവരും ഭീരുക്കളും, വിനയമുള്ളവരും ആയിരിക്കും. വിമർശനങ്ങളെ ഇവർ ഇഷ്ടപ്പെടുന്നില്ല. നിരസിക്കപ്പെടുന്നത് ഉൾക്കൊള്ളുവാൻ കഴിയുകയില്ല പരുഷമായ വാക്കുകളാൽ മറിവേൽക്കപ്പെടാം ആയതിനാൽ വളരെ ശ്രദ്ധയോടെ കൈകാര്യം ചെയ്യേണ്ടത് ആവശ്യമാണ്. ഇവർ ഉൾപ്പെടുന്ന ഏത് ബന്ധത്തിലും ഇവർ കാണിക്കുന്ന അങ്ങേയറ്റമുള്ള മര്യാദയാണ് ഇവരുടെ ആകർഷണം.ഊഷ്മളവും ശ്രേഷ്ഠവുമായ ഫലിതങ്ങളാൽ ഇവർ നിങ്ങളെ സന്തോഷിപ്പിക്കും. ഇവർ മികച്ച പാചകക്കാരാണ്, ഇവർ വലിയ പിശുക്കരോ വലിയ ധാരാളികളോ അല്ല. ഇവരുടെ സ്നേഹവും, സഹാനുഭൂതിയും, ശ്രദ്ധയും കൊണ്ട് അടുപ്പമുള്ളവരെ ലാളിക്കുവാൻ ഇവർ ഇഷ്ടപ്പെടുന്നു. ഇവരുടെ മനോഭാവത്തിലുള്ള ചാഞ്ചല്യം ഇവരെ പ്രവചനാധീതരാക്കി മാറ്റുന്നു എന്നാൽ മറ്റുള്ളവ ഇവർ ചഞ്ചലമസ്കർ അല്ലെന്നും മറ്റാരേയും വേദനിപ്പിക്കുകയില്ലെന്നും സ്ഥിരീകരിക്കുന്നു. </p><p><b> കർക്കിടക രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/> പ്രിയങ്ക ചോപ്ര, ജൂലിയ റോബർട്സ്, റ്റോം ക്രൂസ്, ഡയാന രാജകുമാരി, പമീല ആൻഡേഴ്സൺ</p><p><b>കർക്കിടക രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>വികാരാധീനത, ആർദ്രത, അവബോധം, ഭാവന, വിവേകം, ജാഗ്രത, സംരക്ഷകത, അനുകമ്പ <br/><b>പ്രതികൂലം:  </b>സ്ഥിരതയില്ലായ്മ, വിഷണ്ണത, അമിത വികാരാധീനത, മുൻകോപം, മുറുകെ പിടിച്ചിരങ്ക്കുന്നതുമായ</p><p><b>കർക്കിടകത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മേടം, ഇടവം, കർക്കിടകം, കന്നി, തുലാം, മകരം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>സിംഹ രാശിയിലുള്ള(ചിങ്ങം) സ്ത്രീകൾ  വൈകാരികതയുള്ളവരും തനിക്ക് പ്രിയപ്പെട്ടവർ  തന്‍റേതു മാത്രമായിരിക്കണമെന്ന് ആഗ്രഹിക്കുന്നവരുമാണ്. ഇവർ തനിക്ക് ചുറ്റുമുള്ളവരോട് വളരെയധികം  ഉപചാരമുള്ളവരും സൗമ്യതയുള്ളവരുമാണ്. ഇവർ കായികമത്സരങ്ങൾ ആസ്വദിക്കുന്നവരാണ്, കായികാഭ്യാസിയാകാം, ഏറെക്കുറെ അന്തസാരമില്ലാത്തവരും കൂടാതെ ജീവിതത്തേക്കാൾ വലിയ കാര്യങ്ങളാൽ ഭ്രമിപ്പിക്കപ്പെടുന്നവരുമാണ്. എന്തിനേയും ഏതിനേയും നയിക്കുവാനുള്ള താത്പര്യം ഇവർക്കുണ്ട് ഇത് ഇവരെ ചിലപ്പോഴൊക്കെ പൊങ്ങച്ചക്കാരാക്കി മാറ്റുന്നു. നേതൃത്വം സ്വഭാവിന്മായി ഇവരിൽ വന്നു ചേരും കൂടാതെ പങ്കാളി ഇവരേക്കാൾപ്രബലരാകുന്നത് ഇവർ വെറുക്കുന്നു. ഇവരുടെ കോപമാണ് ഇവരെ അപ്രിയരാക്കുന്ന ഒരു കാര്യം. അപമാനിക്കപ്പെട്ടാൽ ഇവർ ക്രുദ്ധരാകും. അനുസരിക്കപ്പെടാതിരിക്കുന്നതോ, അവഗണിക്കപ്പെടുന്നതോ, വിമർശിക്കപ്പെടുന്നതോ ഇവർ ഇഷ്ടപ്പെടുന്നില്ല.  ഇവരെ മർക്കടമുഷ്ടിക്കാരും അപ്രായോഗികരുമാക്കി മാറ്റുന്ന അതിയായ അഹംഭാവം ഇവർക്കുണ്ട്. എല്ലാവരും ഇവരുടെ പൂർണ്ണ നിയന്ത്രണത്തിലായിരിക്കണമെന്ന് ഇവർ പ്രതീക്ഷിക്കുന്നു. സാമ്പത്തിക കാര്യത്തിൽ, വ്യാജസ്തുതികളാൽ പ്രചോദിപ്പിക്കപ്പെടുന്ന, ഇവർ ഒരു വലിയ ധാരാളിയാണ്. ലാളിക്കപ്പെടുവാൻ ഇവർ ആഗ്രഹിക്കുന്നു. അതിഥികളെ സന്തോഷിപ്പിക്കുന്ന ഒരു ഉത്തമ ആതിഥേയ ആയിരിക്കും ഇവർ. ഇവരുടെ മൃദുലവശം പുറത്തുകാണിക്കാതെ നിർവ്വികാരരായി പുറത്തു വരും.</p><p><b> ചിങ്ങ രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>മനീഷ കൊയ് രാള, കാജോൾ, രാഖീ, മനോജ് കുമാർ, ഗുൽസാർ</p><p><b>ചിങ്ങ രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>നയതന്ത്രത, കാല്പനികത, വശ്യത, ആദർശവാദിത്വം <br/><b>പ്രതികൂലം:  </b>തീരുമാനമില്ലായ്മ, അസ്ഥിരത, എളുപ്പം കബളിപ്പിക്കപ്പെടുവാനുള്ള സാദ്ധ്യത</p><p><b>ചിങ്ങത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>കർക്കിടകം, മീനം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>കന്നിരാശിയിലുള്ള(വെർഗോ) സ്തീകൾ പൂർണ്ണതാവാദികളാണ് കൂടാതെ ഇവർ ഓരോ പ്രവർത്തിയുടേയും ചെറുതും വിശദവുമായ കര്യങ്ങളെക്കുറിച്ച് ഓർത്ത് വിഷമിക്കുകയും ചെയ്യും, പ്രത്യേകിച്ച് അവർ നേതൃത്വം നൽകിയാൽ. ഇവർ പ്രായോഗികതയും അപഗ്രഥന ശീലവും ഉള്ളവരാണ് എപ്പോഴും അല്ലെങ്കിലും മിക്കപ്പോഴും ശരിയുമായിരിക്കും. പരുക്കൻ പെരുമാറ്റം, അനുചിതമായ ഭാഷയുടെ ഉപയോഗം, വൃത്തിഹീനമായി കാണപ്പെടുന്നത്, അല്ലെങ്കിൽ പരസ്യമായ സ്നേഹ പ്രകടനം എന്നിവയെ ഇവർ അഭിനന്ദിക്കുകയില്ല. നിങ്ങൾക്ക് കണ്ടെത്തുവാൻ പറ്റുന്നതിൽ വച്ച് ഏറ്റവും മര്യാദയുള്ളവരും വിനയമുള്ളവരും ആയിരിക്കും ഇവർ. ഇവരെ തിളക്കമുള്ളതക്കുന്ന മറ്റു ഗുണങ്ങളാണ് ശക്തമായ ബൗദ്ധിക കഴിവുകൾ, ഉയർന്ന അപഗ്രഥന മനസ്സ്, കൂടാതെ മികച്ച ഓർമ്മശക്തി. യുക്തിപൂർവ്വമുള്ള ചിന്തയായതിനാൽ, ഇവർ തർക്കങ്ങളെ അങ്ങേയറ്റം എളുപ്പത്തിൽ പരിഹരിക്കുന്ന നല്ല പങ്കാളികളായിരിക്കും. ഇവർ തീർത്തും പ്രവർത്തനക്ഷമത ഉള്ളവരും ആരോഗ്യത്തിൽ ശ്രദ്ധയുള്ളവരുമാണ്, ഇവരെ വശ്യത, ബുദ്ധി, യാഥാസ്ഥിതികത, സത്യസന്ധത, പ്രവർത്തനക്ഷമത, ആത്മാർത്ഥത, സഹായത, വിനയം എന്നിവയുള്ളവരായി വിശദീകരിക്കാം. എന്നിരുന്നാലും ഇവരുടെ അലറുന്ന കോപം ഉത്കണ്ഠയ്ക്കു കരണമായേക്കാം.</p><p><b> കന്നി രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>ആശ ഭോസ്‌ലെ, രാകേഷ് റോഷൻ, അഗതാ ക്രിസ്റ്റി, എലിസബത്ത് രാജ്ഞി, ജോസഫ് കെന്നഡി.</p><p><b>കന്നി രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>മര്യാദ, അതിസൂക്ഷ്മത, വിശ്വാസ്യത, പ്രായോഗികത, അദ്ധ്വാനശീലം<br/><b>പ്രതികൂലം:  </b>പരാതിപറയൽ, അമിത  വിമർശനം, നിഷ്ഠുരത, യാഥാസ്ഥിതികത</p><p><b>കന്നിയുടെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>ഇടവം, മകരം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>തുലാം രാശിയിലുള്ള(ലിബ്ര) സ്ത്രീകൾ പരമാവധി കാല്പനികതയുള്ളവരാണ്. ഇവർ ഇവരുടെ പുരുഷനെ സ്നേഹിക്കുകയും, സന്തോഷിപ്പിക്കുകയും, ബഹുമാനിക്കുകയും ചെയ്യും. അർഹതയുള്ളവർ പ്രബലർ ആകുവാൻ ഇവർ സന്തോഷത്തോടെ അനുവദിക്കും. ഇവർ സംശയ പ്രകൃതക്കാർ അല്ല കൂടാതെ ആളുകളുടെ സ്വകാര്യതയിലേക്ക് കടന്നു കയറുവാൻ ഒരിക്കലും ശ്രമിക്കുകയും ഇല്ല. ഇവർ ഇവരുടെ സ്വാതന്ത്ര്യം ഇഷ്ടപ്പെടുന്നു അതുപോലെ തന്നെ മറ്റുള്ളവർക്കും അത് തിരിച്ചു നൽകുന്നു. വിലകൂടിയ വസ്തുക്കളിൽ ഇവർക്ക് ആഗ്രഹമുണ്ട് പ്രത്യേകിച്ച്; സുഗന്ധദ്രവ്യങ്ങൾ, ചേലുള്ള വസ്ത്രങ്ങൾ, ക്ലാസിക് സംഗീതം എന്നിവ. പ്രായോഗികതയാൽ ബോദ്ധ്യപ്പെടുത്തുവാൻ നിങ്ങൾക്കു കഴിഞ്ഞാൽ പരാജയം സ്വീകരിക്കുവാൻ ഇവർ തയ്യാറാകും. ഇവർ അങ്ങേയറ്റം സംസാര പ്രിയരാണ്, ഉയർന്ന ബുദ്ധിയുള്ളവരും കൂടാതെ ബുദ്ധിപരമായ സംഭാഷണം ഇഷ്ട്പ്പെടുന്നവരുമാണ്. ഇവരുടെ നുണക്കുഴി ചിരിയും ഹൃദ്യമായ പെരുമാറ്റവും ലക്ഷക്കണക്കിന് ഹൃദയം കവരുവാൻ കഴിവുള്ളവയാണ്. സാമൂഹികമായി ഇടപഴകുവാൻ ഇവർ ഇഷ്ടപ്പെടുകയും കൂടാതെ ആവശ്യത്തിന് ഉപകരിക്കുന്ന മികച്ച സുഹൃത്തുമാണ്. എന്നിരുന്നാലും ഒരു തീരുമാനം എടുക്കുവാൻ ഇവർ കുറച്ചു സമയം എടുക്കും. കാലം കഴിയുംതോറും ഇവരുടെ ആശയങ്ങൾ വെള്ളത്തിലാകുകയും ന്യായമായിരിക്കേണ്ട് ആവശ്യം വരുകയും ഇത് മറ്റുള്ളവരെ അസ്വസ്ഥരാക്കുകയും ചെയ്യും. </p><p><b> തുലാം രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/> കെയ്റ്റ് വിൻസ് ലറ്റ്, രേഖ,  കരീന കപൂർ, ലത മങ്കേഷ്ക്കർ, അമിതാഭ് ബച്ചൻ, മഹാത്മ ഗാന്ധി </p><p><b>തുലാം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>നയതന്ത്രത, വശ്യത, കാല്പനികത, സുഖപ്രിയത, ആദർശവാദിത്വം <br/><b>പ്രതികൂലം:  </b>സങ്കോചം, അസ്ഥിരത, എളുപ്പത്തിൽ കബളിപ്പിക്കപ്പെടൽ</p><p><b>തുലാമിന്‍റെ  ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മേടം, കർക്കിടകം, ചിങ്ങം, തുലാം, ധനു, മകരം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>വൃശ്ചിക രാശിയിലുള്ള(സ്കോർപിയോ) സ്ത്രീകൾ സഹാനുഭൂതിയുള്ളവരും, അതിയായി രഹസ്യം സൂക്ഷിക്കുന്നവരും, സൂക്ഷ്മബുദ്ധിയുള്ളവരും, ഫലിത ചതുരരും ആണ്. ഇവർ അന്തർജ്ഞാനം, സഹാനുഭൂതി, ആത്മവിശ്വാസമുള്ള വ്യക്തിത്വം എന്നിവയാൽ അനുഗ്രഹീതരാണ്, ഇത് ഇവരെ അത്യാകർഷകമാക്കി മാറ്റുന്നു. രഹസ്യങ്ങളുടെ ചുരുളഴിക്കുവാൻ ഇവർ ഇഷ്ടപ്പെടുന്നു കൂടാതെ ഇവർ ഇവരുടെ രഹസ്യങ്ങൾ വെളിപ്പെടുത്താതെ അനായാസം കലാപരമായി നിങ്ങളുടെ രഹസ്യങ്ങളുടെ മറ നീക്കും. ഇവർ അനന്തമാം വിധം കാമഭാവമുള്ളവരും, വിഷണ്ണരും, പ്രശാന്തരും, പെരുമാറ്റത്തിൽ ഇരുത്തം വന്നവരും ആണ്, അന്തസാരമില്ലാത്തതും പൊള്ളയായതും, ആയ കാര്യങ്ങളിൽ ഇവർക്ക് താത്പര്യമുണ്ടായിരിക്കുകയില്ല. ഇവർ നിപുണതയുള്ള സംഭാഷകരായിരിക്കും കൂടാതെ  മറ്റുള്ളവരുമായി ചാതുര്യപൂർവ്വം ഇടപഴകുകയും ചെയ്യും, ഇത് ഇവരെ സുഹൃത്തുക്കൾക്കും കുടുംബാംഗങ്ങൾക്കും ഇടയിൽ സമ്മതരാക്കുന്നു. ചില സമയത്ത് ഇവരുടെ സംഭ്രമജനകമായ വികാര തീവ്രത ഇവർ ബന്ധങ്ങളിൽ നിർബന്ധം പിടിക്കുവാൻ കാരണമാകും; എന്നിരുന്നാലും ഇവരുടെ സ്നേഹം വശീകരിക്കത്തക്കതാണ്. വശ്യതയുള്ളതും കൊതിപ്പിച്ചു വശം കെടുത്തുന്നതുമായ ഊർജ്ജമാണ് ഇവർക്കുള്ളത് എന്നാൽ ചില സമയങ്ങളിൽ കോപം പൊട്ടിത്തെറിക്കാം. ഇവരുടെ ലോല പ്രകൃതം ചിലപ്പോൾ ഇരുതല മൂർച്ചയുള്ള വാളിനെപ്പോലെ പ്രവർത്തിക്കാം അതിനാൽ; ഇവർ പെട്ടെന്നു തന്നെ സ്പർശിക്കപ്പെടുകയും മനോവേദന ഉണ്ടാകുകയും ചെയ്യുക  എന്നത്  സ്വാഭാവികമാണ്.</p><p><b> വൃശ്ചിക രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>ഐശ്വര്യ റായ്, ഇന്ദിര ഗാന്ധി, ജവഹർ ലാൽ നെഹ്രു, ഷാറൂഖ് ഖാൻ, ബിൽ ഗേറ്റ്സ്, ബ്രയാൻ ആഡംസ്, ഡെമി മൂർ</p><p><b>വൃശ്ചിക രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>വൈകാരികത, തീവ്രത, മാന്യത, മൃദുലത, അന്തർജ്ഞാനം, ലൗകികത, ഗൂഢത, തീക്ഷണത <br/><b>പ്രതികൂലം:  </b>അസൂയ, കോപം, നിർബന്ധം, ഉപദ്രവം</p><p><b> വൃശ്ചികത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>കർക്കിടകം, മീനം. </p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങൾ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>ധനു രാശിയിലുള്ള(സഗിറ്റേറിയസ്) സ്ത്രീകൾക്ക് നയതന്ത്രത കുറവായിരിക്കും കൂടാതെ വിരസവുമായിരിക്കും, പ്രഥമ പ്രസ്താവന തന്നെ ഐവരിൽ നിന്നും ഓടിപോകുവാനുള്ള പ്രവണത നിങ്ങളിൽ ഉണ്ടാക്കും. ഇവർ പ്രസന്നരും, സഹൃദയരും, തുറന്നു സംസാരിക്കുന്നവരും,സംസാരപ്രിയരുമാണ്. ഇവരുടെ സ്പഷ്ടത പ്രായോഗിക ലോകത്ത് ജീവിക്കുവാൻ ഇവരെ സജ്ജരാക്കുന്നു. ഇവർ ശുഭാപ്തി വിശ്വാസികളാണ്, എന്നാൽ യുക്തി ഹീനരല്ല. ഇവർ വസ്തുതകളുടെ അടിസ്ഥാനത്തിൽ സാഹചര്യങ്ങളെ വിലയിരുത്തുകയും, സാധ്യമായ അനന്തരഫലങ്ങളെ കുറിച്ച് വിശകലനം ചെയ്യുകയും എന്നിട്ടും കാര്യങ്ങൾ നല്ലതിനായി മാറുമെന്ന് വിശ്വസിക്കുകയും ചെയ്യും. സാധാരണയായി, ഇവർ പ്രസന്നരും ശാന്തരും ആണ്. എന്നിരുന്നാലും,നിങ്ങൾ അവരോട് പരുക്കനാകുകയോ  അല്ലെങ്കിൽ അവരെ എതിർക്കുകയോ ചെയ്താൽ, അവർ അത് തിരിച്ചു തരും. ഇവർ സ്വതന്ത്രരും സ്വാതന്ത്ര്യം ഇഷ്ടപ്പെടുന്നവരുമാണ്. ഇവർ കുടുംബത്തോട് ഇഴുകിച്ചേർന്നു നിൽക്കുന്നു, എന്നാൽ അധികമായല്ല.  ചില സമയങ്ങളിൽ ഇവരുടെ പാരുഷ്യത്താൽ ഇവർ വലിയ വില നൽകേണ്ടി വരും, ചിലപ്പോൾ ബന്ധം അവസാനിപ്പിക്കുന്നതു വരെ എത്താം. ഇവർ കപടനാട്യക്കാരല്ല എന്നിരുന്നാലും ഇവരുടെ സത്യസന്ധതയും പാരുഷ്യവും വിരുദ്ധാഭിപ്രായങ്ങൾക്ക് ആക്കം കൂട്ടുന്നു. ഹൃദയത്തിൽ ഇവർ കരുതലില്ലാത്തവരും പ്രതിരോധശക്തിയില്ലാത്തവരുമാണ്.</p><p><b> ധനു രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/> ധർമ്മേന്ദ്ര, ശത്രുഘൻ സിൻഹ, ദിലിപ് കുമാർ,വിൻസ്റ്റൻ ചർച്ചിൽ</p><p><b>ധനു രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: ശുഭാപ്തിവിശ്വാസം, ഉത്സാഹം, പ്രസന്നത, സത്യസന്ധത, തത്വജ്ഞാനം <br/><b>പ്രതികൂലം:  അശ്രദ്ധ, അന്ധമായ ശുഭാപ്തിവിശ്വാസം, നയരാഹിത്യം,വിശ്രമഹീനത </p><p><b>ധനുവിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>കർക്കിടകം, മീനം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>മകര രാശിയിലുള്ള(കാപ്രികോൺ) സ്ത്രീകൾ വളരെയധികം ഒതുക്കമുള്ളവരായതിനാൽ തുടക്കത്തിൽ ഇവരെ സമീപിക്കുന്നത് അത്ര എളുപ്പമായിരിക്കുകയില്ല. ഇവർ തങ്ങളുടെ പെരുമാറ്റത്തിൽ ഏറെക്കുറെ ശ്രദ്ധ ചെലുത്തുന്നു. ഇവർക്ക് വളരെ കുറച്ചും, എന്നാൽ തങ്ങളുടെ കാര്യങ്ങൾ പങ്കു വയ്ക്കുന്ന അടുത്ത സുഹൃത്തുക്കളുടെ ഒരു മഹത്തായ കൂട്ട്കെട്ടുണ്ട്. ഇവർ വളരെയധികം സംസാരശീലമുള്ളവരല്ല കൂടാതെ ആവശ്യമുള്ളപ്പോൾ മാത്രമേ സംസാരിക്കുകയുള്ളു, ഒരുവശത്ത് ഇവർ ബുദ്ധിമാന്മാരും മറുവശത്ത് തീർത്തും ശാന്തരുമാണ്. ഇവരുടെ മനോഭാവത്തിൽ തുടരെ തുടരെ മാറ്റം ഉണ്ടാകും കൂടാതെ നിങ്ങളാൽ സംരക്ഷിക്ക പെട്ടതായി തോന്നിയാൽ ഒരിക്കൽ അവർക്ക് അനുഭവപ്പെട്ട സ്നേഹവും വികാരവും അവർ പ്രകടിപ്പിക്കുന്നു. അവർ തലയെടുപ്പുള്ളവരാണ്, അവരുടെ പണത്തെക്കുറിച്ച് തീർത്തും ശ്രദ്ധയുള്ളവരാണ്, ദൈനംദിന ചിലവുകളിൽ മിതവ്യയ സമീപനമുള്ളവരാണ്. ഔദ്യോഗിക ജീവിതത്തിൽ ശ്രദ്ധയുള്ള വരാണെങ്കിലുംകുടുംബത്തെ നല്ലതുപോലെ ശ്രദ്ധിക്കുന്നവരും നല്ലൊരു ഗാർഹികജീവിത പരിപാലകയും ആയിരിക്കും. </p><p><b> മകര രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>അനു അഗർവാൾ, റീന റോയ്, സൽമാൻ ഖാൻ, അനിൽ കപൂർ, ജവേദ് അക്തർ, നാനാ പടേക്കർ</p><p><b>മകര രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>പ്രായോഗികത, വിവേകം, ഉത്കർഷേച്ഛ,ക്ഷമ, ശ്രദ്ധ <br/><b>പ്രതികൂലം:  </b>അശുഭാപ്തി വിശ്വാസം, വിധി വിശ്വാസി, പിശുക്ക്,പക വച്ച് പുലർത്തൽ </p><p><b>മകരത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>ഇടവം, കന്നി</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങൾ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>കുംഭ രാശിയിലുള്ള(അക്വാറിയസ്) സ്ത്രീകൾ സ്വാതന്ത്ര്യം ഇഷ്ടപ്പെടുന്നവരും ഉന്നതമായ രീതിയിൽ വ്യക്തിവാദികളും, ബുദ്ധിയുള്ളവരും കൂടാതെ സ്വപ്നജീവികളുമാണ്. ഇവരുടെ പെരുമാറ്റത്തിൽ ഇവർ പ്രവചനാധീതരാണ്, മിക്കപ്പോഴും മറ്റുള്ളവർക്ക് ഒരു നിഗൂഢതയായി തോന്നാം. ഇവർ സാധാരണക്കാർക്ക് മനസിലാക്കുവാൻ കഴിയുന്നതിലും അപ്പുറമുള്ള ജീവിതരീതികൾ തിരഞ്ഞെടുക്കും. തങ്ങളുടെ തന്നെ രീതിയിൽ ജീവിക്കുന്ന ഇവർ മറ്റാരുടേയും ജീവിതത്തിൽ ഇടപെടുകയില്ല. ഇവർ മനുഷ്യത്വപരമായ സമീപനം ഉള്ളവരാണ് എന്നാൽ ഇവരുടെ വ്യക്തിബന്ധങ്ങളിൽ വരുമ്പോൾ ബന്ധമറ്റതോ വിദൂരത്തിലുള്ളതോ എന്നതുപോലെയാകാം. ഇവർ നിരുത്സാഹരെന്നും നിർവ്വികാരരെന്നും നിങ്ങൾക്കു തോന്നാം എന്നാൽ ഇത് സത്യമല്ല. ഇവരെ ഇവരുടെ ലോകത്ത് നിങ്ങൾക്കു കാണാം, മറ്റുള്ളവരിൽ നിന്നും അകന്ന് നിൽക്കുന്നവരെന്നും, അശ്രദ്ധയുള്ളവരെന്നും മിക്കപ്പോഴും തോന്നാം, ഇതിന് ഇവർ നിരീക്ഷണശക്തിയില്ലാത്തവരാണെന്ന് അർത്ഥമില്ല. ചില സമയങ്ങളിൽ ഒരു കാര്യത്തിന്‍റെയോ വ്യക്തിയുടെയോ മറ്റുള്ളവർ വിട്ടുപോകാവുന്ന, വിശദാംശങ്ങളിൽ ഏറ്റവും ചെറുത് പോലും ഇവർക്ക് പറയുവാൻ കഴിയും. സ്വാതന്ത്ര്യത്തോടുള്ള ഇവരുടെ ഇഷ്ടം അമിതാവേശമുള്ള പ്രവർത്തികൾ ചെയ്യുവാൻ ഇവരെ സജ്ജരാക്കും കൂടാതെ ഇവരെ സന്തോഷമായി വയ്ക്കുവാൻ നിങ്ങൾ ഇവർക്ക് അത്യന്തം സ്വാതന്ത്ര്യം നൽകണം.</p><p><b> കുംഭ രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>ഊർമിള മറ്റോദ്കർ, പ്രീതി സിന്‍റ,  വഹീദ റഹ്‌മാൻ, സുഭാഷ് ഘൈ</p><p><b>കുംഭം രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>സഹൃദയത, മനുഷ്യത്വം, യാഥാർത്ഥ്യത, നിർമ്മാണ ശക്തി, സ്വതന്ത്രത, ബുദ്ധി<br/><b>പ്രതികൂലം:  </b> വിപരീത ബുദ്ധി, നിർവ്വികാരത, വിരക്തി, പ്രവചനാധീതം</p><p><b>കുംഭത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>മിഥുനം,തുലാം</p>#<p><b>ആസ്ട്രോ സ്കെച്ച്: </b>(ജനന വിവരങ്ങളുടെ അടിസ്ഥാനത്തിലുള്ള വിവര സംഗ്രഹം) <br/>മീന രാശിയിലുള്ള (പിസസ്സ്) സ്ത്രീകൾ അഗാധവും നിഗൂഢവും ആയിരിക്കുകയും ഒരാൾക്ക് ഇവരെ മനസിലാക്കുവാൻ കഠിനമായി പ്രയത്നിക്കേണ്ടിവരും. ഇവർ മനോഹരമാം വിധം സ്ത്രൈണതയുള്ളവരും അവിശ്വസിക്കാനാവാത്തവിധം സുന്ദരികളും, മൃദുത്വമുള്ളവരും സ്ത്രീസഹജരുമാണ്. ഇവർ വളരെ വൈകാരികതയുള്ളവരാണ് മിക്കപ്പോഴും സ്വന്തം ലോകത്തായതിനാൽ ഇവരെ സ്വപ്നജീവികളായി കണക്കാക്കുന്നു.   മാറ്റങ്ങളുമായി വളരെ പ്രസന്നതയോടെ പൊരുത്തപ്പെടുവാൻ ഇവർക്കു കഴിയുന്നതിനാൽ ഇവരുമായി കൂട്ടുകൂടുന്നത് മറ്റുള്ളവർക്ക് ആനന്ദപ്രദമായിരിക്കും. ഇവർ ലജ്ജാശീല പ്രകൃതമുള്ളവരാണ്, സ്നേഹിക്കുവാനും സംരക്ഷിക്കുവാനും ഇവർക്ക് ആരെങ്കിലും വേണമെന്നതിനാൽ അക്രമസ്വഭാവം ഒരിക്കലും കാണിക്കുകയില്ല. ചിലപ്പോൾ ഇവർ വളരെ വൈകാരികമായി ആശ്രയിക്കുന്നവരായിരിക്കും. ഇവർ സ്ഥിരമായി ലാളിക്കപ്പെടുവാൻ ആഗ്രഹിക്കുന്നു. ഏറെക്കുറെ തെറ്റിദ്ധരിക്കപ്പെടാം, ഇവർ പൂഋണ്ണമായി തുറന്നു സംസാരിക്കുകയില്ല ഇത് ചിലപ്പോഴൊക്കെ അലോസരമുണ്ടാക്കാം. യഥാർത്ഥത്തിൽ കഴിവുള്ളവരാണെങ്കിലും ഇവർക്ക് ഉത്കർഷേച്ഛ കുറവായിരിക്കും, ഇവർ പ്രവചനാധീതരും മനചാഞ്ചല്യമുള്ളവരും ആണ്.</p><p><b> മീന രാശിയിൽ ജനിച്ച ചില പ്രശസ്തരായ വ്യക്തികൾ: </b><br/>പ്രീതി സിന്‍റ,  ചെൽസിയ ക്ലിന്‍റൺ, ആൽബർട്ട് ഐൻസ്റ്റീൻ, മൈക്കലാഞ്ചലോ</p><p><b>മീന രാശിയിലുള്ള ആളുകളിൽ പൊതുവായി കണ്ടുവരുന്ന സവിശേഷതകൾ: </b><br/><b>അനുകൂലം: </b>സർഗ്ഗശക്തി, ലോലഹൃദയത, സഹാനുഭൂതി, നിസ്വാർത്ഥത, ആർദ്രത<br/><b>പ്രതികൂലം:  </b>വഴുതി പോകൽ, ആദർശവാദി, രഹസ്യം സൂക്ഷിക്കൽ, ദുർബ്ബലമായ ആത്മസം യമനം</p><p><b>മീനത്തിന്‍റെ ചാന്ദ്ര ചിഹ്ന പൊരുത്തം:</b>ഇടവം, കന്നി, ധനു,മകരം, മീനം</p>

