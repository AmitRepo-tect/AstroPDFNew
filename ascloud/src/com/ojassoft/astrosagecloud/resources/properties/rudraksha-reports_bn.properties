
RUDRAKSH_SUGGESTION_REPORT=রূদ্রক্ষ পরামর্শের রিপোর্ট আপনাকে সঠিক রুদ্রাক্ষ গুলির বিষয়ে বুঝতে সাহায্য করবে  এবং আপনি সহজেই বুঝতে পারবেন কোনটি আপনার পরিধান করা উচিত।  এটি পরার পর, আপনি জীবনের ইতিবাচকতা বজায় রাখতে পারেন এবং রুদ্রাক্ষের উপকারী প্রভাবগুলি পর্যবেক্ষণ করতে পারেন।
RUDRAKSHA_AND_ITS_IMPORTANCE= <a href="http://buy.astrosage.com/rudraksha"> রুদ্রাক্ষ </a> মূলত একটি গাছের বীজ, যা "দ্রাক্ষ বৃক্ষ" নামে পরিচিত। এটি একটি সংস্কৃত শব্দ এবং এর মধ্যে দুটি শব্দ রয়েছে, যথা "রুদ্র" এবং "অক্ষ"। রুদ্র মানে শিব এবং অক্ষ মানে "চোখের জল"। এই শব্দগুলির যৌথ অর্থ "শিবের চোখ"। শাস্ত্র বলে যে এটি একজন ব্যক্তিকে  ধর্ম, অর্থ, কাম এবং মোকশা  প্রাপ্তির জন্য আশীর্বাদ করে। যাই হোক, বিজ্ঞান বিশ্বাস করে যে এটি ইলেক্ট্রোম্যাগনেটিক, প্যারাম্যাগনেটিক, নুট্রপিক বৈশিষ্ট্যগুলিকে বহন করে যা মানব দেহে শ্বাসযন্ত্র এবং রক্ত ​​সঞ্চালনের উন্নতি করতে সহায়তা করে। ফলাফল উভয় বিজ্ঞানেই প্রমতিতো ও গৃহীত। ফলস্বরূপ, রুদ্রাক্ষ পরলে, আপনার মানুষিক চাপ কমে যাবে, শক্তির মাত্রা বৃদ্ধি পাবে, অবশেষে মনের শান্তি লাভ করবেন। রুদ্রাক্ষ ধারণ করলে আপনি নিজেকে দেবাদিদেব মহাদেব শিবের সাথে যুক্ত হতে পারবেন। হিন্দু পৌরাণিক কাহিনীতে "রুদ্রক্ষ" শব্দটি মহান গুরুত্ব বহন করে। বিশ্বাস করা হয় যে রূদ্রক্ষার পরিধানকারী শুধুমাত্র ভগবান শিবকেই নয় বরং সৌরজগতের বিভিন্ন দেবদেবীর যেমন দুর্গা, ভগবান ইন্দ্র, ভগবান ব্রহ্মা, ভগবান বিষ্ণু, ভগবান গণেশ, ভগবান কার্তিক , ভগবান আদিত্য এবং অন্যান্য দেবতাদেরও পছন্দের পাত্র হন। এটি সবসময় পরিধানকারীদের ইতিবাচক ফলাফল দেয় <a href="http://www.astrosage.com/gemstones/"> রত্ন পাথর </a> এর ন্যায় কোনো খারাপ প্রভাব দেবে না । এটি শিবের কাছে খুবই প্রিয়, এই কারণে আপনি রুদ্রাক্ষের অলঙ্কার ছাড়া শিবকে কল্পনা করতে পারবেন না। আপনার পাপগুলি জ্বলে পুড়ে রাখ হয়ে যাবে এর দর্শনে, মন্ত্রোচ্চারণ করলে ও আরাধনা করলে। বিশ্বাস করা হয় যে, একজন মানুষ শুধুমাত্র রুদ্রক্ষাকে দেখে সীমাহীন পরিমাণে আনন্দ অনুভব করতে পারে। বিভিন্ন শোক, দুঃখ ও দুর্যোগ থেকে পরিত্রাণ পেতে, শিবের ভক্তদের অবশ্যই রুদ্রাক্ষ পরতে হবে। এটা পরিধান করলে মনের সবরকম কামনা পূর্ণ হবে।  এটি পরিধান করে, আপনি মৃত্যুর সময় শিব সম্পর্কিত মহান জ্ঞান লাভ করতে পারেন। এটি পরিধানকারীর ক্যারিশমা ক্রমাগত বৃদ্ধি পাবে। এটি আপনাকে আপনার <a href=""> কুণ্ডলিনী </a> বা আধ্যাত্মিক জাগরণ প্রক্রিয়া জাগ্রত করতে সহায়তা করে। স্ট্রেস, হাইপারটেনশন এবং রক্তচাপ নিয়ন্ত্রণের জন্যও এটি অত্যন্ত সুপরিচিত।
RECOMMENDATIONS=আপনার জীবনে ইতিবাচকতা অর্জনের জন্য আপনার নির্দিষ্ট রুদ্রাক্ষের সন্ধানের করা এবং তা পরিধান করা অত্যন্ত প্রয়োজনীয়। প্রাচীন গ্রন্থে সংজ্ঞায়িত রুদ্রাক্ষ বিভিন্ন ধরনের হয়। যদিও, আপনার প্রথমে আপনার <a href="http://www.astrosage.com/freekphorary/instantchart.asp?charttype=kp"> জন্ম তালিকা </a> বিশ্লেষণ করে তার দুর্বল দিক গুলি মেপে দেখতে হবে এবং তার উপর ভিত্তি করে আপনাকে রুদ্রাক্ষ পরিধান করতে হবে। চলুন বিভিন্ন ধরণের রুদ্রাক্ষ সম্পর্কে জানা যাক এবং আপনার জন্য কোনটি উপযুক্ত হতে পারে দেখুন :
IMPORTANCE_OF_NATURAL_RUDRAKSHA = আজকের দিনে বাজারে প্রাকৃতিক রুদ্রাক্ষ পাওয়া খুবই দুস্কর একটি ঘটনা। সাধারণত, কারখানা গুলিতে প্লাস্টিকের ফাইবার ব্যবহার করে রুদ্রাক্ষ তৈরি করা হয়। বিশেষত, কৃত্রিম রুদ্রাক্ষ গুলি চীনে বড় আকারে তৈরি হচ্ছে এবং তারপরে সেগুলি সারা বিশ্বের বাজারে বিক্রি করা হচ্ছে। একটি প্রাকৃতিক রুদ্রাক্ষ, একটি গাছের ফল এবং তাই সীমিত সংখ্যায় পাওয়া যেতে পারে। এছাড়াও, আবহাওয়ার  মত অনিশ্চিত ও পরিবর্তনশীল জিনিস একটি গুরুত্বপূর্ণ ভূমিকা পালন করে এবং  মাঝে মাঝে উৎপাদনে বাধা দেয়। কৃত্রিমভাবে তৈরি রুদ্রাক্ষ একই রকম দেখতে হতে পারে তবে এটি জ্যোতিষিকভাবে ব্যবহার করা হয় না। এই সমস্যার সমাধান করার জন্য, আমরা 100% প্রাকৃতিক রুদ্রাক্ষ নিয়ে এসেছি। এটি পরে আপনি সমস্ত জ্যোতির্বিদ্যার প্রত্যাশিত সুবিধা বা ফলাফল পাবেন। এই রুদ্রাক্ষ গবেষণাগারে কঠোর পদ্ধতি অনুসরণ করে পরীক্ষা করা হয়েছে এবং এটি পুরোপুরি জেনুইন বলে মনে হয়েছে।



RUDRAKSHA_ONE_FACED                   = এটি দ্রুত এবং গভীরভাবে আপনার কর্ম কে পরিবর্তন ও নিরাময় করবে। এটি মহাদেব শিবের পূজ্য প্রতীক হিসাবে বিবেচিত হয়। এটি শিব উকারের অন্তর্গত এবং খুব পবিত্র বলে মনে করা হয়। এটি আপনাকে সমস্ত ধরনের নেতিবাচকতা এবং নির্দেশিকা থেকে রক্ষা করবে এবং আপনাকে গভীরতম সত্য প্রদর্শন করবে। তার শক্তি আপনি আপনার ইচ্ছা শক্তিকে বৃদ্ধি করতে সাহায্য করবে। আপনি যদি আধ্যাত্মিকতার সত্যিকারের সন্ধানী হন তবে এটি আপনার জন্য বিশেষ ভাবে সুপারিশ করা হচ্ছে। এটি <a href="https://www.astrosage.com/planet/sun/"> সূর্য </a> দ্বারা শাসিত, যা আপনার চেতনাকে আলোকিত করবে। ধ্যান করার সময় এটি সহায়ক। এটি শরীরের তাপ জনিত সমস্যা, রক্তচাপ ইত্যাদি নিয়ন্ত্রণে আপনাকে সহায়তা করে। এটি আপনাকে আপনার রাস্তায় আসা সমস্ত সমস্যাকে অতিক্রম করতে সহায়তা করবে। এটি আপনার নেতৃত্ব দেয়ার দক্ষতা বিকাশ করবে এবং আপনার নিজের প্রতি বিশ্বাস বৃদ্ধি পাবে।
HOW_TO_WEAR_ONE_FACED                 = এক মুখী রুদ্রাক্ষ, সূর্যের পবিত্র কণা, সোনা বা রুপো দিয়ে পরিধান করা যেতে পারে। এটি পরিধান করার পূর্বে কাঁচা দুধ বা গঙ্গা জলে নিমজ্জিত করা উচিত। <a href="https://www.astrosage.com/planet/sun/surya-mantra-surya-puja-surya-remedy.asp"> মন্ত্র </a> সূর্যের ওম হ্রাম হ্রীম হ্রাউম সাঃ সূর্যায়ে নামঃ (Oṃ Hrāṃ Hrīṃ Hrauṃ Saḥ Sūryāya Namaḥ) এই মন্ত্রটি ১০৮ বার জপ করযে রুদ্রাক্ষটি জাগরিত হবে। এই অনুষ্ঠানগুলি সম্পাদন করার পরে, এটি রবিবার সকালে বা <a href="https://www.astrosage.com/planet/moon/nakshtra/krittika-nakshatra-moon-in-krittika.asp"> ক্রিতিকা </a>, উত্তরাফালগনি এবং উত্তরাশক্ষ নক্ষত্র কালে পরিধান করতে হবে।

RUDRAKSHA_TWO_FACED                   = এটি আপনার এবং আপনার সঙ্গীর মধ্যে শক্তির ভারসাম্য রাখা করে। এটা দাম্পত্য জীবনে পারস্পরিক মিল ও সাদৃশ্য বজায় রাখে। এটি অর্ধনারীশ্বরকে প্রতিনিধিত্ব করে, যিনি অর্ধেক শিব এবং অর্ধক দেবী পার্বতী। এটি মূলত পুরুষ এবং মহিলার উভয়ের শক্তিকেই প্রতিনিধিত্ব করে। এটি বৈদিক জ্যোতিষশাস্ত্র অনুসারে চাঁদের দ্বারা শাসিত। জন্ম তালিকাতে <a href="https://www.astrosage.com/planet/moon/"> চাঁদ </a> এর দুর্বল অবস্থানের জন্য এটি পরিধানের সুপারিশ করা হয়। এই রুদ্রাক্ষের পূজা করে, আপনি আপনার জীবনের প্রতিটি কষ্ট থেকে মুক্তি পেতে পারেন। এটা আপনার পরিবারের মধ্যে শান্তি এবং ঐক্য আনতে সাহায্য করবে।  এটা আপনার জীবনের সব দুঃখকে মুছে ফেলবে। গর্ভবতী নারীদের জন্য দুমুুখী রুদ্রাক্ষের পূজা করার সুপারিশ করা হয়। এটি সমৃদ্ধি এবং সম্পদ লাভ করার জন্য আপনাকে আশীর্বাদ করবে। এটি আপনার হৃদয়, ফুসফুস, মস্তিষ্ক এবং বাম চোখ সম্পর্কিত রোগ থেকে আপনাকে রাখা করবে। যারা জীবনের ঘনিষ্ঠতার অভাব বোধ করছেন, এটি তাদের জন্য সুপারিশ করা হয়।
HOW_TO_WEAR_TWO_FACED                 = দুমুখী রুদ্রাক্ষ হলো চাঁদের পবিত্র কণা, এটি সোনা বা রুপো দিয়ে পরিধান করা যেতে পারে। এটি পরিধান করার পূর্বে কাঁচা দুধ বা গঙ্গা জলে নিমজ্জিত করা উচিত। চন্দ্রের মন্ত্র ওম শ্রাম শ্রীম শ্রাউম সাঃ চন্দ্রামাসে নমঃ ১০৮ বার জপ করতে করতে শিব-পার্বতীর চরণে সাদা  ফুল অর্পণ করুন, চাল ও সুগন্ধি ধুপ দান করুন, এর ফলে রুদ্রাক্ষটি জাগরিত হবে।এই অনুষ্ঠানগুলি সম্পাদন করার পরে, এটি সোমবার বা পূর্ণ চাঁদ দিবসে বা হস্তা, রোহিনী ও শ্রাবণ নক্ষত্রের কালে এটি পরিধান করা যেতে পারে।

RUDRAKSHA_THREE_FACED                 = ত্রিমুখী রুদ্রাক্ষ আপনাকে ত্রিদেব-ব্রহ্ম, বিষ্ণু এবং মহেশের শক্তি দিয়ে আশীর্বাদ করবে। এই রুদ্রাক্ষ পরিধান করলে, আপনি আর একটি সাধারণ মানুষ থাকবেন না। আপনি আপনার মধ্যে এই সব শক্তি পাবেন, যা আপনার জীবনের প্রতিটি পদে আপনাকে সাহায্য করবে। এটি আপনাকে আপনার অতীতের খারাপ কাজের থেকে মুক্ত করবে, এবং আপনাকে ইচ্ছা শক্তি সরবরাহ করবে ও মানুষিক শান্তি প্রদান করবে। এটি আপনাকে নিজের প্রতি বিশ্বাস করতে সাহায্য করবে এবং আপনার সমস্ত প্রচেষ্টাকে বাস্তবে রূপান্তর করতে সাহায্য করে। এই রুদ্রাক্ষের ওপর অগ্নি দেবের আশীর্বাদ রয়েছে ও এটিকে তিনি নিয়ন্ত্রণ করেন।  এটি আপনার জীবনে নেতিবাচক বিষয় গুলির নাশ করবে এবং আপনার সমস্ত ইচ্ছা পূরণ সম্ভব হবে। এর শাসক গ্রহটি হলো মঙ্গল। এটি আপনার জীবনে মঙ্গলের অশুভ প্রভাবগুলি নির্মূল করবে। এটি আপনাকে মানুষিক চাপ এবং বিষণ্নতা থেকে মুক্ত থাকতে সাহায্য করবে। যাদের মধ্যে আত্মবিশ্বাসের অভাব, উদ্বেগ, আত্মসন্দেহ, ভয়, অপরাধবোধ এবং অযোগ্যতা - এই সকল বিষয় গুলি অত্যন্ত প্রকট, তাদের জন্য এটি অত্যন্ত লাভদায়ক প্রতিকার বলে বিবেচনা করা হয়।
HOW_TO_WEAR_THREE_FACED				  = ত্রিমুখী রুদ্রাক্ষ হলো মঙ্গলের পবিত্র কণা, এটি সোনা বা রুপো দিয়ে পরিধান করা যেতে পারে। এটি পরিধান করার পূর্বে কাঁচা দুধ বা গঙ্গা জলে নিমজ্জিত করা উচিত। <a href="https://www.astrosage.com/planet/mars/mars-mantra-mars-puja-mars-remedy.asp"> মঙ্গলের মন্ত্র </a> ওম ক্রাম ক্রিম ক্রাউম সাঃ ব্রম্হায়ে নমঃ (Oṃ Krāṃ Krīṃ Krauṃ Saḥ Bhaumāya Namaḥ) ১০৮ বার জপ করতে করতে হনুমান জিকে লাল ফুল অর্পণ করুন ও সুগন্ধি ধুপ দান করুন, এর ফলে এই রুদ্রাক্ষ জাগরিত হবে। এই অনুষ্ঠানগুলি সম্পাদন করার পর, এটি মঙ্গলবার অথবা মৃগাশীর, চিত্রা এবং <a href="https://www.astrosage.com/planet/moon/nakshtra/dhanishta-nakshatra-moon-in-dhanishta.asp"> ধানিষ্টা </a> নক্ষত্রের কালেও পরিধান করা যেতে পারে।

RUDRAKSHA_FOUR_FACED                  = এই রুদ্রাক্ষ ভগবান ব্রহ্মমার প্রতিনিধিত্ব করে।  এই রুদ্রাক্ষ পরিধানকারী চারটি বেদ, অর্থাৎ ধর্ম, অর্থ, কাম এবং মোকশা - সবকটিতেই শ্রেষ্ঠত্ব অর্জন করবে। এটি সৃজনশীল দক্ষতা এবং স্মরণশক্তি উন্নতিতে আপনাকে সাহায্য করে। এটি চার দিককে নির্দেশ করে। এই রুদ্রাক্ষটি গ্রহ <a href="https://www.astrosage.com/planet/mercury/"> বুধ </a> দ্বারা শাসিত হয়, তবে, এটি বৃহস্পতি দেবের শক্তিকেও নির্দেশ করে। ভারতীয় মহাকাব্য মহাভারত অনুসারে, যিনি এটি পরেন, তিনি দ্বিজ অর্জন করবেন এবং নিজেকে সম্পূর্ণ ভিন্ন ভূমিকায় রূপান্তরিত করবেন। এটি আপনাকে মোক্ষ লাভের দিকে পরিচালিত করবে। এটা কিডনি এবং থাইরয়েড সমস্যা সমাধানের জন্য লাভদায়ক হবে। আপনি মানসিক শক্তি লাভ করবেন এবং আলস্য সম্পর্কিত সমস্যা, অতিরিক্ত ঘুম এবং অবাঞ্ছিত স্বপ্ন এইসব থেকে মুক্তি পাবেন। এই রুদ্রাক্ষ সোমবারে পরার সুপারিশ করা হয়। এটি শিক্ষার্থীদের, বিজ্ঞানী, শিল্পী, লেখক এবং রাজনীতিবিদদের পরিধান করা উচিত বা এমন ব্যক্তি যে শিক্ষা লাভে অক্ষম।

HOW_TO_WEAR_FOUR_FACED				  =চার মুখী রুদ্রাক্ষ, বুধের পবিত্র কোনা, এটি সোনা বা রূপোর সাহায্যে পরিধান করা যেতে পারে। এটি পরিধান করার পূর্বে কাঁচা দুধ বা গঙ্গা জলে নিমজ্জিত করা উচিত। <a href="https://www.astrosage.com/planet/mercury/budha-mantra-budha-puja-budha-remedy.asp"> বুধের মন্ত্র </a> ওম ব্রাম ব্রিম ব্রাউম সাঃ বুধায়ে নমঃ ১০৮ বার জপ করতে করতে ভগবান বিষ্ণুর চরণে হলুদ ফুল অর্পণ করুন ও সুগন্ধি ধুপ দিন, এর ফলে রুদ্রাক্ষটি জাগরিত হবে। এই অনুষ্ঠানগুলি সম্পাদন করার পরে বুধবার বা আশ্লেষা <a href="https://www.astrosage.com/planet/moon/nakshtra/jyeshta-nakshatra-moon-in-jyeshta.asp"> জ্যেশথা </a> এবং রেবতী নক্ষত্রের কালে এটি পরতে পারেন।

RUDRAKSHA_FIVE_FACED				=এই রুদ্রাক্ষ মনের শান্তি এবং ভাল স্বাস্থ্য প্রদান করে। এটা প্রতিকূল পরিস্থিতিতে ধৈর্য বৃদ্ধি। এটা আপনার চাপ কমাতে এবং জীবনীশক্তি, দীর্ঘায়ু এবং মানের শান্ত ভাব বৃদ্ধিতে সাহায্য করবে। এটি আপনাকে প্রাপ্য বা কাম্য আশীর্বাদ পেতে সাহায্য করবে। যেকোন পরিস্থিতির সাথে মোকাবিলা করার সময় এটি আপনাকে সহজেই অভিযোজিত হতে  এবং দ্রুত প্রতিক্রিয়া দিতে সাহায্য করে। এই রুদ্রাক্ষ মহাদেবের পাঁচটি রূপ যথা সদ্যজাত, ততপুরুষ, আঘোর, ভামদেব ও ঈশানের আশীর্বাদপ্রাপ্ত। এটি আপনাকে রোগ থেকে রক্ষা করে এবং মানসিক শান্তি প্রদান করে, যা আপনার জীবনে সুখ বহন করে আনবে। এর শাসক গ্রহটি <a href="https://www.astrosage.com/planet/jupiter/"> বৃহস্পতি </a>। বলা হয় যে পঞ্চমুখী রোধক্ষাক্স আপনাকে আকস্মিক মৃত্যু থেকে রক্ষা করবে। এটি পঞ্চ পণ্ডবের প্রতিনিধিত্ব করে। এটি অগ্নি, জল, বায়ু, আকাশ এবং পৃথিবী এই পাঁচটি প্রধান উপাদানকে নিয়ন্ত্রণ করে। বুধ গ্রহের খারাপ প্রভাবগুলি এই রুদ্রাক্ষ পরিধান করলে হ্রাস করা হবে।
HOW_TO_WEAR_FIVE_FACED				=পঞ্চমুখী রুদ্রাক্ষ, বৃহস্পতির পবিত্র কণা, একটি সোনা বা রুপোর মাধ্যমে পরিধান করা যেতে পারে। এটি পরিধান করার আগে কাঁচা দুধ বা গঙ্গার জলে ডুবিয়ে রাখা  উচিত।  <a href="https://www.astrosage.com/planet/jupiter/guru-mantra-guru-puja-guru-remedy.asp"> মন্ত্র </a> বৃহস্পতির মন্ত্র ওম গ্রাম গ্রিম গ্রাউম সাঃ গুড়াবে নমঃ (Oṃ Grāṃ Grīṃ Grauṃ Saḥ Gurave Namaḥ) ১০৮ বার জপ করতে করতে ভগবান বিষ্ণুর চরণে হলুদ ফুল অর্পণ করুন ও সুগন্ধি ধুপ দিন, এর ফলে রুদ্রাক্ষটি জাগরিত হবে। এই অনুষ্ঠানগুলি সম্পাদন করার পর, এটি বৃহস্পতিবার বা পুনর্ভাসু,<a href="https://www.astrosage.com/planet/moon/nakshtra/vishakha-nakshatra-moon-in-vishakha.asp"> বিশাখা </a> এবং পূর্বভাদ্রাপাদ নক্ষত্রের কালে এটি পরতে পারেন।

RUDRAKSHA_SIX_FACED					=এই রুদ্রাক্ষ ছয় দর্শনের সাথে সম্পর্কিত এবং ভগবান কার্তিক্যের শক্তি লাভের অনুরূপ আশীর্বাদপ্রাপ্ত। এই রুদ্রাক্ষ টির শাসনকর্তা ভগবান কার্তিক্য এবং ভগবান গণেশ। এর শাসক গ্রহটি <a href="https://www.astrosage.com/planet/venus/"> শুক্র </a> প্রেম, সৌন্দর্য এবং স্নেহকে নির্দেশ করে এবং এ কারণে এটি আপনার শৈল্পিক প্রতিভা উন্নত করে। এটি আপনার কোনো বিষয়কে প্রকাশ করার ক্ষমতা বৃদ্ধি হবে। এটি আপনাকে চোখের রোগ, প্রস্রাব, ঘাড় ইত্যাদি সম্পর্কিত সমস্যার থেকে পরিত্রান দিতে পারে। কিছু জয় করার জন্য ইচ্ছাশক্তি সরবরাহ করে তার অন্তিম পরিণতি লাভের জন্য এটি খুবই সহায়ক হবে। আপনি আপনার জীবনের সব দিক থেকে আনন্দ ও সুখ অর্জন করবে। এটি আপনার ক্যারিশমা বৃদ্ধি করবে এবং আপনি ইতিবাচকভাবে বাক্য ও দেহভঙ্গীর মাধ্যমে অন্যদের প্রভাবিত করতে পারবেন। এটি আপনাকে আপনার আস্থা বৃদ্ধিতে সহায়তা করবে এবং এটি অভিনেতা, শিক্ষক, রাজনীতিবিদ বা উচ্চ দায়িত্বের অধিকারীদের জন্য বিশেষ ভাবে সুপারিশ করা হয়।
HOW_TO_WEAR_SIX_FACED				=ছয় মুখী রুদ্রাক্ষ শুক্রর পবিত্র কণা, একটি সোনা বা রুপোর মাধ্যমে পরিধান করা যেতে পারে। এটি পরিধান করার আগে কাঁচা দুধ বা গঙ্গার জলে ডুবিয়ে রাখা উচিত। শুক্রর <a href="https://www.astrosage.com/planet/venus/shukra-mantra-shukra-puja-shukra-remedy.asp">  মন্ত্র </a> ওম দ্রাম ড্রিম ড্রাউম সাঃ শুক্রয়ে নমঃ (Oṃ Drāṃ Drīṃ Drauṃ Saḥ Śukrāya Namaḥ) ১০৮ বার জপ করতে করতে ভগবান লক্ষীর চরণে সাদা ফুল অর্পণ করুন ও সুগন্ধি ধুপ দিন, এর ফলে আপনার শুক্র জাগরিত হবে। এই অনুষ্ঠানগুলি সম্পাদন করার পর, শুক্রবারে বা ভরাণী, <a href="https://www.astrosage.com/nakshatra/purva-phalguni-nakshatra-characteristics.asp"> পূর্বফাল্গুনী </a> এবং পূর্বসাদা নক্ষত্রের কালে এটি পরতে পারেন।

RUDRAKSHA_SEVEN_FACED				=এটি মহালক্ষীর প্রতীক, তিনি সম্পদের দেবী এবং আনাং শিবেরও প্রতিনিধিত্ব করে । এটি সপ্ত মাতৃকারো প্রতিনিধিত্ব করে যথা সাত জন মাতা । পুরাণ অনুসারে, সাত মুখী রুদ্রাক্ষ অ্যানান্তা, মহিমান্বিত পরম পিত ব্রম্হা সম্পর্কিত বস্তু। এর শাসক গ্রহটি "<a href="https://www.astrosage.com/planet/saturn/"> শনি </a>"। এটি আপনাকে ভাল স্বাস্থ্য এবং সম্পদ দিয়ে আশীর্বাদ করবে। এটি আপনাকে নাম, খ্যাতি, জীবনে অগ্রগতি দেবে এবং আপনার দুর্ভাগ্যর অবসান হবে।  এটি শান্তি, সমৃদ্ধি, সম্পদ এবং সৌভাগ্য আনবে। আপনার <a href="https://www.astrosage.com/free/sade-sati-report.asp"> সাড়ে সাতি </a> বা শনি ধাইয়া পর্যায়গুলির সময় ক্ষতিকারক প্রভাব কমিয়ে দিতে পারে। এটি আপনার চাপ, উদ্বেগ এবং আগ্রাসন হ্রাস করবে। এটি আপনাকে আপনার আর্থিক সংকট থেকে বেরিয়ে আসতে এবং আরও লাভের জন্য আপনার পেশাগত জীবনে মন দিয়ে কাজ করার জন্য অনুপ্রাণিত করবে। হাঁপানি ও পাচক রোগের সমস্যায় যারা ভুগছেন তাদের জন্য এটি বিশেষ ভাবে উপকারী হবে। এটি আপনার আশেপাশ থেকে নেতিবাচকতা সরিয়ে দেয় এবং আপনি সর্বদা সতেজ বোধ করবেন, এর ফলে প্রত্যেকের সাথে আপনার সুসম্পর্ক বজায় থাকবে। নিউমেরোলজি অনুসারে যাদের সংখ্যা ৮ তাদের এটি পরিধান করার জন্য সুপারিশ হয়। যারা আর্থিক সংকটের মধ্যে দিয়ে যাচ্ছে, ক্যারিয়ার সম্পর্কিত সমস্যায় ভুগছেন ও জীবনের উদ্দেশ্য খুঁজছেন, তাদের জন্য এটি পরিধান করা  আবশ্যক।
HOW_TO_WEAR_SEVEN_FACED				=সাতমুখী রুদ্রাক্ষ শনির পবিত্র কণা, একটি সোনা বা রুপোর মাধ্যমে পরিধান করা যেতে পারে। এটি পরিধান করার আগে কাঁচা দুধ বা গঙ্গার জলে ডুবিয়ে রাখা  উচিত। শনির মন্ত্র ওম প্রাম প্রিম প্রাউম সাঃ সানাইস্কারায় নমঃ (Oṃ Prāṃ Prīṃ Prauṃ Saḥ Śanaiścarāya Namaḥ) ১০৮ বার জপ করতে করতে ভগবান ভৈরবের চরণে কালো তিলের বীজ অর্পণ করুন ও সুগন্ধি ধুপ দিন, এর ফলে আপনার শনি জাগরিত হবে।</ li> <li> এই অনুষ্ঠানগুলি সম্পাদন করার পরে, সূর্যাস্তের পরে কোনো শনিবার বা পুষ্য , <a href="https://www.astrosage.com/planet/moon/nakshtra/anuradha-nakshatra-moon-in-anuradha.asp"> অনুরাধা </a> ও উত্তরা ভদ্রপাড় নক্ষত্রের কালে এটি পরতে পারেন।

RUDRAKSHA_EIGHT_FACED				=অষ্ট মুখী রুদ্রাক্ষের শাসক দেবতা "প্রভু গণেশ"। যদি আপনি এই রুদ্রাক্ষ পরেন তবে আপনার জীবনে অসফলতার মুখোমুখি হবে না কারণ এর সাথে ভগবান গণেশের আশীর্বাদ রয়েছে। রাহু এই রুদ্রাক্ষটিকে নিয়ন্ত্রণ করে এবং এটি সোমবার পরিধান করার পরামর্শ দেওয়া হয়। এটি গলায় পরিধান করা বা পূজা স্থানে রাখা উচিত। এটা জীবনের বাধা সরিয়ে সাফল্য নিয়ে আসে। এটি আপনাকে নাম, খ্যাতি এবং সমৃদ্ধি দেবে। এটি শিক্ষক, লেখক এবং পড়ুয়াদের জন্য পরিধান করা খুবই লাভদায়ক। এটা আপনাকে চামড়া এবং হাড় সম্পর্কিত রোগ থেকে মুক্তি পেতে করতে সাহায্য করবে। এটি আপনার জীবন থেকে নেতিবাচকতা সরিয়ে দেবে এবং সমস্ত ধরণের প্রাপ্তির রাস্তা প্রসারিত করবে এবং জীবনে শান্তি, স্থিতিশীলতা প্রদান করবে। এটি তাদের জন্য আদর্শ যারা বিনা কারণে ভীত, নিজেদের অপয়া মনে করেন এবং যারা সর্বদা চঞ্চল থাকেন।  এটি জীবনে নিরবচ্ছিন্ন সাফল্য সৃষ্টি করবে এবং এর ফলে জীবনের অনেক কিছু অর্জন করতে পারবেন।
HOW_TO_WEAR_EIGHT_FACED				=আট মুখী রুদ্রাক্ষ রাহুর জন্য খুব ভালো প্রতিকার, এটি সোনা বা রূপোয় পরিধান করা যেতে পারে। এটি পরিধান করার আগে কাঁচা দুধ বা গঙ্গার জলে ডুবিয়ে রাখা  উচিত। শনির <a href="https://www.astrosage.com/planet/saturn/shani-mantra-shani-puja-shani-remedy.asp"> মন্ত্র </a>  ওম ভ্রাম ভ্রিম ভ্রাউম সাঃ রাহবে নমঃ (Oṃ Bhrāṃ Bhrīṃ Bhrauṃ Saḥ Rāhave Namaḥ) ১০৮ বার জপ করতে করতে মা দূর্গা কে লাল চন্দন অর্পণ করুন ও সুগন্ধি ধুপ দিন, এর ফলে আপনার রাহু জাগরিত হবে। এই অনুষ্ঠানগুলি সম্পাদন করার পর, এটি শনিবার বা স্বাতী, সাতভিশা এবং অর্ধ নক্ষত্র কালেও পরিধান করা যেতে পারে।

RUDRAKSHA_NINE_FACED				=নয় মুখী রুদ্রাক্ষের শাসক দেবী মা দুর্গা এবং নও কুলি নাগ (নয় কোবরা)। এটা আপনাকে মা দুর্গা নয়টি রূপ দিয়ে আশীর্বাদ করবে। শাসক গ্রহটি <a href="https://www.astrosage.com/planet/ketu/"> কেতু </a>। এটা সোমবারপরিধান করার সুপারিশ করা হয়। এটি কেতুর ক্ষতিকর প্রভাব কমাবে। এটি আপনার জন্ম তালিকাতে <a href="https://www.astrosage.com/free/kaalsarp-yog.asp">কাল সার্প দশা</a> থেকে পরিত্রান দেবে এবং আপনার আগের জীবনের পাপ গুলি থেকে আপনাকে মুক্তি দেবে। এটি নিজের প্রতি আপনার আস্থা বাড়িয়ে দেবে এবং আপনাকে মানুষিক চাপ মুক্ত এবং নির্ভীক করে তুলবে। এটি আপনাকে শরীরের যন্ত্রণা ও মাথাব্যাথা থেকেও আপনাকে পরিত্রান দেবে। এটি আপনাকে অনেক সাহসের দ্বারা কাজ করার জন্য অনুপ্রাণিত করবে এবং নেতিবাচক পরিস্থিতির মোকাবেলা করার বা নেতৃত্ব দেয়ার জন্য প্রয়োজনীয় গুণাবলীর লাভ করার জন্য আপনাকে আশীর্বাদ করবে। এটি আপনাকে আপনার হৃদয় চক্রগুলি খুলতে সহায়তা করবে এবং আপনাকে কিছু খারাপ ঘটনার প্রভাব থেকে রাখে করার জন্য দরকারি জ্ঞান এবং সুরক্ষা সরবরাহ করবে। এটি আধ্যাত্মিক অনুশীলনকারী এবং মধ্যস্থতাকারীদের জবাব বিশেষ ভাবে সুপারিশ করা হয়।
HOW_TO_WEAR_NINE_FACED				=নয় মুখী রুদ্রাক্ষ কেতুর জন্য খুবই পবিত্র প্রতিকার, এটি সোনা বা রূপোয় পরিধান করা যেতে পারে। এটি পরিধান করার আগে কাঁচা দুধ বা গঙ্গার জলে ডুবিয়ে রাখা উচিত। কেতুর <a href="https://www.astrosage.com/planet/ketu/ketu-mantra-ketu-puja-ketu-remedy.asp"> মন্ত্র </a> ওম শ্রাম শ্রীম শ্রাউম শাহ কেতাবে নমো (Oṃ Srāṃ Srīṃ Srauṃ Saḥ Ketave Namaḥ) ১০৮ বার জপ করতে করতে শ্রী গণেশ কে দূর্বা অর্পণ করুন ও সুগন্ধি ধুপ দিন, এর ফলে আপনার কেতু জাগরিত হবে। এই অনুষ্ঠানগুলি সম্পাদনের পরে, বুধবার বা শনিবারে বা <a href="https://www.astrosage.com/planet/moon/nakshtra/ashwini-nakshatra-moon-in-ashwini.asp">  অশ্বিনী, </a>  মাঘ <a href="https://www.astrosage.com/nakshatra/moola-nakshatra-characteristics.asp"> এবং মুল </a>  নক্ষত্র কালেও পরিধান করা যেতে পারে।




