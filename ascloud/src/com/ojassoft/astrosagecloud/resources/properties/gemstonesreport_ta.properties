	GEMINTRO							= வரலாற்றை நோக்கும் போது, இரத்தினகற்கள் பெரும்பாலும் மருத்துவ உபயோகங்களுக்கும் , ஆன்மீக சடங்குகளுக்கும் பயன்படுத்தப்பட்டு வந்துள்ளன. இரத்தின கற்கள் அரிதாகவும் பெரும் அழகுப் பொருளாகவும் காட்சி அளித்தன  என்றாலும், அவை விலைமதிப்பற்ற பொருளாக இருந்ததற்கு காரணம்  அவற்றை அணிபவர்களுக்கு அவற்றின் மூலம் கிடைத்த சக்தி தான் காரணமாக இருந்தது. இரத்தின கல் தன்னுள் அந்த அதீத சக்தியை சேமித்துக் கொண்டு , அதை அணிபவருக்கு அந்த சக்தியை அவரின் உடலில் தொடுவதன் மூலம் செலுத்துகிறது . இரத்தினகற்கள் எவ்வாறு பயன்படுத்த படுகின்றன என்பதை பொறுத்து, அவை நல்ல அல்லது தீய பலன்களை தருகின்றன.  எல்லா இரத்தின கற்களும் வெவ்வேறு அளவுகளில் காந்த சக்தியை தன்னுள் கொண்டுள்ளன. அவைகளில் பல நமக்கு மருத்துவ நலன்களுக்காக  பயன்படுகின்றன. அவை  வெளியிடும் உள்ளாற்றல் கொண்ட அதிர்வுகள்  மற்றும் அதிர்வெண்கள் நம் உடல் முழுதும்  பரவி நமக்கு வலிமையான ஆற்றலை அளிக்கின்றன.இங்கே  உங்களின் இரத்தினத்திற்கான கணிப்பு எவ்வாறு இருக்கிறது என்று இனி காணலாம்
	STONE_DESCRIPTION					= ஒரு வாழ்க்கைக்கான ரத்தினம் என்பது அதன் லக்னாதிபதிற்குறியது.   வாழ்நாள்  முழுதும் இதை அணிந்தால் ஒருவர் அவரது வாழ்க்கையில் அமைந்துள்ள எல்லா மறைபொருள் சக்திகளையும்  அனுபவிக்க  முடியும்.  வாழ்க்கைக்கான கல் அணிவதால்  தனிப்பட்ட  ஒருவரின் தடைகளை நீக்கி  அதன் மூலம் கிடைக்கும்  நன்மைகளான  மகிழ்ச்சி, வெற்றியுடன் சுபீட்சத்தையும் பெற முடியும். இது பொதுவாக ஒரு தனிப்பட்டவரின்  ஒட்டுமொத்த நலனை பெறுவதற்காக அணியப்படுகிறது. இதன் அண்டக்கதிர்கள் அவரது வாழ்நாள் முழுதும் விளைவை உண்டு படுத்திக்கொண்டே இருக்கும்.#வாழ்க்கை என்பது முயற்சிகள் மற்றும் விதியுடன் கூடிய  ஒரு நிறைவான ஒருங்கிணைப்பாகும். நீங்கள் அதிர்ஷ்டக் கல்லை அணிவதன் மூலம் தங்கள் சார்பாக விதி வேலை செய்யும். ஒரு தனிநபரின் அதிர்ஷ்டக் கல்லானது அவரது வாழ்க்கையில் சரியான சமயத்தில் இனிமையான ஆச்சரியங்களைக் கொடுத்து செயல்படும்.  நாங்கள் உங்களுக்காக பரிந்துரைக்கும் அதிர்ஷ்டக் கல்லானது:#பாக்யமயமான கல் என்று சொல்லப்படும் அதிர்ஷ்டக் கல்லைத் தேர்ந்தெடுத்து அணிவது  ஒருவர்  ஜாதகத்தில்  பாக்ய ஸ்தானதிபதி என்று அழைக்கப்படும் ஒன்பதாவது வீட்டின் ராசி அதிபதியைப் பொறுத்தே பரிந்துரைக்கப் படுகிறது. தங்களுக்கு உண்மையில் அதிர்ஷ்டம்  தேவைப்படும் போது  இந்தக் கல் தங்களின் விருப்பத்திற்கு ஏற்ப அதிர்ஷ்டமான முறையில்  செயல் படுத்துவதாக அறியப்படுகிறது . தனிப்பட்ட மற்றும் தொழில்முறை வாழ்க்கையில் உங்கள் நோக்கப்படி நல்வாய்ப்பை ஏற்படுத்தும். இது தங்களது முன்னேற்றப் பதையில் வரும் எந்த தடையையும் எதிர்த்துப் போராட உதவி செய்கிறது.
