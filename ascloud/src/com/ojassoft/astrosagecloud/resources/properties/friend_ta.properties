	 INTROTEXT						= உங்கள் அன்பும் ஆதரவும் தான் எங்களை இணையதளத்தின் புகழ்பெற்ற வேத அடிப்படையிலான ஜோதிடத் தளமாக ஆக்கியுள்ளது. எங்கள் எல்லாச் சேவைகளையும் நாங்கள் இலவசமாகவே தருவதன் காரணம், அதன் மூலம் ஜோதிடத்தின் நன்மைகளை அதிகமான மக்கள் பெற்றுக் கொள்ள வேண்டும் என்பதே. இந்த தெய்வீகப் பணியில், நீங்கள் எங்களுக்குச் செய்யக் கூடிய உதவி, இந்தத் தளத்தைப் பற்றி உங்கள் நண்பர்களுக்கும் குடும்ப உறுப்பினர்களுக்கும் தெரியப்படுத்துவதே. கீழே கொடுக்கப்பட்டுள்ள படிவத்தில் தகவல்களை நிரப்புவதன் மூலம் மற்றவர்களுக்கு இந்தத் தளத்தைப் பற்றிய தகவல்களைத் தயவுசெய்து  தெரியப் படுத்துங்கள். உங்கள் நண்பர்கள் மற்றும் குடும்பத்தினருக்கு இந்த தளத்தைப் பற்றி எடுத்துச் சொல்லுங்கள்.
