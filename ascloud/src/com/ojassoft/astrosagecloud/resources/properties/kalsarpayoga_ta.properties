	 KULIK_KALSARPA_YOGA_REMEDY = <li>ஏதெனும் அறிவு வளர்ச்சி மற்றும் எழுத்தறிவு  சம்பந்தப்பட்ட தடைகளை நிவர்த்தி செய்ய ஒரு வருட காலத்திற்கு சரஸ்வதி பீஜ மந்திரம் ஜெபத்தை பாராயணம் செய்யவும். தேவி சரஸ்வதியை முழு மனதுடன் அவரவர்கள் சமய சடங்குகளுக்கேற்ற முறையில் வழிபாடு செய்யவும். </li><li> ஹனுமான் சாலிசா 108 முறை பாராயணம் செய்யவும். </li><li>3 நல்ல காலங்களில் தண்ணீரில் நிலக்கரியை மிதக்கவைக்கவும். </li><li> ஆவணி மாதத்தில் 30 நாட்கள் வரை மகாதேவருக்கு (சிவ பெருமான்) அபிஷேகம் மற்றும் அலங்காரம் ( முடிசூட்டு ) செய்து வரவும். </li><li> ஒரு லிட்டர் அளவு கொண்ட தண்ணீருடன்  தேவதரம் (துனு மரம்), கடுகு , மற்றும் சாம்பிராணி ஆகியவைகளுடன் கலந்து கொதிக்க வைக்கவும். இந்த வேக வைத்த சுடு நீரை தாங்கள் குளிக்கும் தண்ணீருடன் கலந்து உபயோகப்படுத்தி 37  ¿¡ðகள் குளித்து வரவும். </li><li> சனிக்கிழமை மற்றும் செவ்வாய் கிழமைகளில் விரதத்தை கடைப்பிடியங்கள், மற்றும் வேலையில்  ஏதெனும் தடைகளை எதிர்கொண்டால்  நிவர்த்திக்காக கோயில்களுக்கு சென்று அங்கே சனி பகவானை தரிசனம் செய்வதுடன் அவருக்கு கடுகு எண்ணெயை மனமாற கொடுக்கவும். </li><li>ராகு காலத்தின் போது, தினசரி ராகு மந்திரத்தை தங்களால் இயன்ற அளவிற்கு தொடர்ச்சியாக பாராயணம் செய்து, அது எப்போது 18,000 முறை முடிகிறதோ, அப்போது  ராகுவிற்கு ஹோமம் வளர்த்து அத்துடன் உளுத்தம் பருப்பு மற்றும் நீல நிற துணியை தேவைப்படும் நபருக்கு தானமாக அளிக்கவும். இதன்படி  செய்தால் மிகவும் சாதகமாக அமையும். </li>
	 VASUKI_KALSARPA_YOGA_REMEDY = <li> ஒரு வருடம் வரை தினசரி நவநாக ஸ்தோத்திரம் பாராயணம் செய்யவும். </li><li> நாகபாஷ இயந்திரத்தை சாதகாமான எந்த நேரத்திலும் உடன் வைத்திருக்கலாம் . </li><li> ஒவ்வொரு புதன் கிழமையும் ராகு மந்திரம் பாராயணம் செய்த பின்னர் ஒரு கருப்புத் துணியில் ஒரு கைப்பிடி அளவு உளுத்தம் பருப்பு அல்லது பாசிப் பருப்பை வைத்து வறுமையினால் பிச்சை  எடுப்பவர்களுக்குத் தானமாகக் கொடுக்கவும்.  ஒருவேளை பிச்சை எடுப்பவர்களை அணுகுவதற்கு சாத்தியப்படவில்லை என்றால் இந்த முடிச்சை  நீரில் மிதக்க விடலாம். இந்த செயலை 72 புதன்கிழமைகள் முடியும் வரை செய்தால் மிகவும்  சாதகமாக அமையும் . </li><li>ராகு தசையிலோ அல்லது அதன் புத்தி நடைபெறும் தருணங்களிலோ,  மகா ம்ருத்யுஞ்ஜய மந்திரத்தை தினசரி 11 தடவை தொடர்ச்சியாக பாராயணம் செய்து வரவும். செவ்வாய் கிழமைகளில் சனி பகவானுக்கு எண்ணெயால் அபிஷேகம் செய்து  முடிசூட்டு அலங்காரம் (coronation) செய்யவும் மற்றும் பகவான் ஹனுமானுக்கு மனப்பூர்வமாக துணியைக் கொடுக்கவும். </li>  
	 SHANKPAAL_KALSARPA_YOGA_REMEDY = <li> உங்கள் பிரதான வாயிலில் வெள்ளியால் ஆன ஸ்வஸ்திக்கை இணைக்கவும். அந்த ஸ்வஸ்திக்கின் இருபுறத்திலும் உலோகத்தால் ஆன நாகங்களை ஒட்டவும். </li><li> சனிக்கிழமைகளின் போது சனி பகவானுக்கு கடுகு எண்ணெய் கொடுத்து அபிஷேகம் செய்து முடிசூட்டவும். </li><li> ஹனுமான் சாலிசா தினமும் பாராயணம் செய்தபின் உங்கள் தினசரி  சாப்பாட்டை, சாப்பாட்டு அறையில் மட்டுமே உட்கொள்ளவும். ஹனுமான் சாலிசா 108 முறை பாராயணம் செய்து பகவான் ஹனுமான் அவர்களுக்கு ஐந்து செவ்வாய்கிழமை விரதம் இருந்து மல்லிகைப்பூ எண்ணெய் மற்றும்  கேசரிப்பவுடருடன் கலந்த பூந்தியாலான லட்டு ஆகியவைகளை அளிக்கவும். </li><li>கடுகு எண்ணெயை ஒரு சிறிய கிண்ணத்தில் எடுத்து அந்த எண்ணெயில் உங்கள் முகத்தை பார்க்கும் சமயத்தில் ஒரு நாணயத்தின் மூலம் உங்கள் தலையை 3 முறை சுற்றவும். அதன் பின்னர் அதே கிண்ணத்தில் இந்த நாணயத்தை வைத்து  ஒரு ஏழை மனிதருக்கு தானமாக வழங்கவும் அல்லது அந்த நாணயத்தை ஒரு அரசமரத்தின் வேர் பகுதியில் வைத்து விடவும். </li><li> ஒரு நல்ல நேரத்தில்   சர்வதோபத்ரமண்டல (Sarvtobhadramandal) இயந்திரத்தை வணங்கவும். அதன் பிறகு அதை அணியவும். </li><li> ஏழு புதன்கிழமைகளில், ஒரு நல்ல நேரத்தில் உங்கள் உடலின் மேல் பகுதியில் ஒரு கண்ணை உடைய தேங்காயைக் கொண்டு ஏழு தடவை சுற்றவும்.  அதன் பின்பு அதை கங்கை அல்லது யமுனை ஆற்றில் மிதக்க விடவும். </li><li> பறவைகளுக்கு  37 நாட்கள் முடியும் வரை jau Dana  உணவு அளிக்கவும். </li>
	 PADAM_KALSARPA_YOGA_REMEDY = <li>தினசரி ஹனுமான் சாலிசா ஒரு நாளைக்கு 11 முறை பாராயணம் செய்யுங்கள். </li><li> ஒவ்வொரு சனிக்கிழமை தோரும் 8 கைபிடி அளவு கொண்ட ஈரமான பருப்புகளையும் மற்றும் 11 வாழைப்பழங்களையும் உங்கள் முன்னால் வைத்து ஹனுமான் சாலிசா 108 முறை பாராயணம் செய்யவும். அதன் பின்னர் குரங்குகளுக்கு இந்த வாழைப்பழங்களை வழங்கவும். </li><li>பூந்தி லட்டு மற்றும் கேசரிப் பவுடரை மல்லிகைப் பூ எண்ணெயில் (jasmine) கரைத்து பகவான் ஹனுமானுக்கு வழங்கவும்.  சனி பகவானுக்கும் எண்ணெய் அபிஷேகம் செய்து முடிசூட்டவும். </li><li>உங்கள் பிரதான வாயிலில் வெள்ளியால் ஆன ஸ்வஸ்திக்கை இணைக்கவும். அந்த ஸ்வஸ்திக்கின் இருபுறத்திலும் உலோகத்தால் ஆன நாகங்களை ஒட்டவும். </li><li>ஆவணி மாதத்தில், குளித்த பிறகு, தொடர்ச்சியாக 11 முறை ‘ ஓம் நமச்சிவாய ’ பாராயணம் செய்யவும். மற்றும் வில்வ பத்ரம், பசுவின் பால், கங்காஜலம் ஆகியவற்றை சிவ பெருமானுக்கு வழங்கவும். </li><li> சுக்ல பட்சம் முதல் சனிக்கிழமை அன்று விரதத்தை ஆரம்பிக்கத் தொடங்கவும். அது முதல்   கருப்பு உடை அணிந்து 18 சனிக்கிழமை வரை விரதத்தை மேற்கொள்ளவும்.  ராகுவின் பீஜ மந்திரத்தை தொடர்ச்சியாக 3 முறையோ அல்லது 18 முறையோ பாராயணம் செய்யவும். பிறகு ஒரு கிண்ணத்தில் ஜால் durva மற்றும் kusha எடுத்து அரசமரத்தின் வேர் பகுதியில்  அதை ஊற்றவும். உங்கள் விரதத்தின் போது இனிப்பு (ஸ்வீட்) உணவு சாப்பிடவும் மற்றும் அதை பிறருக்கு தானமாக வினியோகம் செய்யவும். நெய் விளக்கு ஏற்றி அரச மரத்தின் வேர் பகுதியில் அதை வைக்கவும் . </li><li> நாக பஞ்சமியின் போது கூட விரதம் அனுசரிக்கவும். </li>  
	 MAHAPADAM_KALSARPA_YOGA_REMEDY = <li> ஆவணி மாதத்தில் 30 நாட்கள் வரை மகாதேவருக்கு (சிவ பெருமான்) அபிஷேகம் மற்றும் அலங்காரம் ( முடிசூட்டு ) செய்து வரவும். வெள்ளியால்  செய்யப்பட்ட ஆண்நாகம்- பெண்நாகம் சிலைகளுக்கு முழு சடங்குகளுடன் புனித நதிகள் எங்கே ஒன்று சேர்ந்து சங்கமம் ஆகின்றனவோ அங்கே வழிபாடு செய்யவும். பின்னர் அதை அந்த புனிதமான ஆற்றில் மிதக்க விடவும். </li><li> ராமாயணத்தில் அமைந்துள்ள சுந்தர காண்டப் பகுதியை 108 முறை ஒவ்வொரு சனிக்கிழமை மற்றும் செவ்வாய் கிழமைகளில் பாராயணம் செய்யவும். </li><li>சுக்ல பட்சம் முதல் சனிக்கிழமை அன்று விரதத்தை ஆரம்பிக்கத் தொடங்கவும். அது முதல்   கருப்பு உடை அணிந்து 18 சனிக்கிழமை வரை விரதத்தை மேற்கொள்ளவும்.  ராகுவின் மூல மந்திரத்தை தொடர்ச்சியாக 3 முறையோ அல்லது 18 முறையோ பாராயணம் செய்யவும்.பிறகு ஒரு கிண்ணத்தில் ஜலம், அருகம் புல் மற்றும் தர்ப்பை ஆகியவற்றை எடுத்து அரசமரத்தின் வேர் பகுதியில்  அதை ஊற்றவும். உங்கள் விரதத்தின் போது இனிப்பு (ஸ்வீட்) உணவு சாப்பிடவும் மற்றும் அதை பிறருக்கு தானமாக வினியோகம் செய்யவும். நெய் விளக்கு ஏற்றி அரச மரத்தின் வேர் பகுதியில் அதை வைக்கவும்.
