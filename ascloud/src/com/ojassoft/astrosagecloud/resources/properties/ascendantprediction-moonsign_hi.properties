     HEALTH_PREDICTION                      = मेष लग्न के लोगों को सिरदर्द पीड़ा,विशेष रूप से सिरदर्द,लू लगना,नसों का दर्द,और अवसाद जैसे रोग शीघ्र प्रभावित कर सकते है। इसके अलावा आपको अपच और स्नायु संबंधी विकार भी कष्ट दे सकते हैं। उतावलापन और शारीरिक समर्पण के कारण दुर्घटना और शारीरिक छोटो की संभावना भी आपके साथ बनी रहती है। कभी कभी बवासीर की शिकायत आपके कष्ट का कारण बनती है। आपके सिर या चेहरे पर पैदाइशी निशान हो सकते हैं। आपको उच्च रक्तचाप आदि जैसे रोगों के प्रति सावधान रहना चाहिए। #वृषभ लग्न आपको एक मजबूत और उत्तम स्वास्थ्य प्रदान कर रहा है। लेकिन कुछ शारीरिक समस्याओं का सामना आपको जीवन भर करना पड़ सकता है। विशेष रूप से आप तंत्रिका तंत्र से संबंधित बीमारियों से ग्रसित हो सकते हैं। यदि आपका जन्म मई मास में हुआ है तो आपको अधिक वजन की भी समस्या हो सकती है। कभी कभी यौन रोग आपको अपने प्रभाव में ले सकते है। इसके अलावा जीवन में ग्रीवा कशेरुक,निचले जबड़े, दांत,ठोड़ी और तालु की समस्याएं होने की संभावनाएं भी बनती है। गुर्दे,गुप्तांग, मूत्राशय,गर्दन और गले में होने वाले रोगों से आपको सतर्क रहना चाहिए। #मिथुन लग्न के प्रभाव से आपमें कभी कभी घबराहट,निराशावाद,दब्बूपन और अधीरता की प्रवृति आ सकती है। तथा क्षय रोग,दमा और एनीमिया जैसे रोग आपकी समस्याएं बन सकते है। साथ ही तंत्रिका तंत्र और श्‍वांस से संबंधित, खासकर सुनने की समस्या आप पर प्रभावी हो सकती है। श्‍वांस संबंधी समस्या और कई तरह की घबराहट की समस्या आपको आमतौर पर दिक्कत दे सकती है।#कर्क लग्न आपको कफ, अपच, गैस,पेट, लीवर और आंतों से संबंधित सामान्य समस्याएं होने की संभावना बना रहा है। लग्न के प्रभाव से आपको भावनात्मक समस्या जैसे अवसाद,हाइपोकोनड्रिया और हिस्टीरिया आदि जैसे रोग हो सकते है। आपका अति संवंदनशील होना आपकी पाचन शक्ति को कमजोर कर, आपको गैस्ट्रिक और अन्य पेट सम्बंधित रोग होने की संभावनाएं बना रहा है। साथ ही कफ और आंख की कमजोरी की समस्या भी आपको  रोगग्रस्त कर सकती है।#सिंह लग्न के स्वामी होने के कारण आपको हृदय सम्बन्धी समस्या खासकर धमनियों में खून का थक्का जमने से दिल का दौरा पड़ने की संभावना जैसे रोग होने का खतरा बन रहा है। पीठ में दर्द, फेंफडे संबधी समस्‍याएं, रीढ की हड्डी से जुडी हुई समस्‍याएं, बुखार, जलन, पसली आदि की समस्‍या आमतौर पर हो सकती हैं। तथा मानसिक तनाव से आपके हृदय को नुकसान पहुंच सकता है और कभी कभी आंखों के विकार भी हो सकते हैं।#आंत और कब्ज की शिकायत आप कन्या लग्न वालों के लिए आम होती है। समय - समय पर आपके विचारों में बदलाव से आपके आसपास के दूसरों व्यक्तियों पर भी प्रतिकूल प्रभाव पड़ता है। कन्या लग्न के फलस्वरूप आपको यौन अंगों में परेशानी हो सकती है। आपको अपने खान पान के प्रति सावधानी बरतनी चाहिए। आप मिर्च मसालेदार खाना खाने से बचे और विदेशी भोजन के प्रति अपने आकर्षण पर भी नियंत्रण बनाये रखे। #तुला लग्न आपकी त्वचा को अत्यधिक संवेदनशील बना रहा है। इस संवेदनशीलता का कारण अनिद्रा, गरिष्ठ भोजन और शराब का अत्यधिक सेवन हो सकता हैं। आपको पीठ के निचले हिस्से और अंडाशय के निचले हिस्से में दर्द जैसी समस्याएं परेशान कर सकती है। तथा आपको अत्यधिक शक्कर और भारी भोजन के सेवन से बचना चाहिए।   #वृश्चिक लग्न का होने के कारण आपको प्रजनन अंगों, नाक और नाक की हड्डियों, हिमोग्लोबीन और जननांग से सम्बंधित रोगों से पीड़ा हो सकती है। इसके अलावा आपको प्रजनन और पेशाब की समस्या, जिगर और गुर्दे के रोग भी परेशान कर सकते है। वृश्चिक लग्न आपको बवासीर और अल्सर जैसे रोग की दिक्कतें दे सकते है।  #धनु लग्न के प्रभाव से आपको विशेष रुप से कूल्हों और जांधों के रोग हो सकते हैं। आपकी राशि के लोगों में पीठ दर्द की समस्या अधिक होती है। बुखार के लक्षण और फेफड़े से जुड़ी समस्या भी पाई जाती है। अत्यधिक वसायुक्त भोजन के खान-पान से आपके जोड़ों में दर्द की समस्या हो सकती है। #मकर लग्न का स्वामी होने के कारण आपको हवा से होने वाली बीमारियां, श्‍वांस और आंखो की बीमारी प्रभावित कर सकती है। इसके अतिरिक्त आपको कभी न कभी उच्‍च रक्‍त चाप की परेशानी भी कष्ट दे सकती है। तथा सावधानी न बरतने पर आपको जोड़ो, बाल दांत, चर्म रोग, और तंत्रिका जैसे रोग भी पीड़ित कर सकते हैं। आपकी लग्न  के लोगों को दुर्घटना होने पर हड्डियों का टूटना और घुटने में चोट की समस्या विशेष रूप से परेशान कर सकती है। #कुंभ लग्न आपको श्‍वांस और दृष्टि दोष, शरीर के निचले अंगों की हड्डियों में अक्सर रक्त और रक्त संवहन की समस्या से ग्रसित कर सकता है। आप में उच्च रक्तचाप और दिल की समस्याएं होने की प्रबल संभावनाएं भी बन रही है। कुम्भ राशि का प्रभाव आपको एड़ियों, संचार प्रणाली, ऐंठन, एलर्जी, अप्रत्याशित बीमारी और दुर्घटनाओं का शिकार बना सकता है। कई तरह के तंत्रिका सम्बन्धी रोगों से पीड़ा की संभावनाएं भी बन रही है। #मीन लग्न के स्वामित्व में होने के कारण आपको मधुमेह का सामना करना पड़ सकता। मधुमेह से आपको पैर की गंभीर समस्या तथा साथ ही साथ अन्य समस्याएं भी हो सकती है। सूजन दवाओं से होने वाली एलर्जी और पैर से संबंधित समस्या आपके लिए आम बात हो सकती है। तथा आपका भावनात्मक स्वभाव आपको भावनात्क रोगों की चपेट में ले सकता है।
     TEMPERAMENT_AND_PERSONALITY_PREDICTION = मेष लग्न आपको ऊर्जावान और ताकतवर बना रही है। आपमें गजब की नेतृत्व शक्ति पाई जाती है। आप हमेशा पहल करने को तैयार रहते है। आपका सबसे खास गुण आपकी शक्ति और किसी कार्य की पहल करने को हमेशा तैयार रहना है। आपके व्यक्तित्व की सबसे महत्वपूर्ण विशेषता, आपका निर्भीक होना है। आप जन्मजात नेतृत्व क्षमता रखते है। आपकी लग्न के लोग दूसरों के आदेश को पसंद नहीं करते यहां तक की अपने बॉस को भी नहीं। किसी के सामने ना झुकना ही आपका आकर्षण है। इन लक्ष्यों के कारण आपके व्यवहार में कभी कभी आक्रामकता तो कभी दयालुपन की भावना पैदा हो सकती है। इसके विपरीत कभी कभी आपको आसानी से मनाया या फुसलाया जा सकता है। आपमें एक स्पष्ट वक्ता और अक्सर बड़बोलेपन की प्रवृति सामने आती है। कुछ अवधि के लिए आपमें अव्यवहारिकता का भाव भी आ सकता है। जिसके कारण आप आसानी से किसी भी बहस या झगडें के शिकार हो सकते है। आपकी लग्न के लोग काफी जिद्दी होते है और अचानक क्रोधित होने के कारण लोगों को अक्सर आश्चर्य में डाल देते है,लेकिन आपको आसानी से बहला फुसलाकर मनाया या शांत किया जा सकता है। आवेग में आ जाने के कारण  कभी कभी आपको कुछ गंभीर परेशानियों का सामना भी करना पड़ता है। आपको पानी के बहुत शौकीन नहीं होते है, परन्तु कला और कोमलता के बड़े प्रशंसक हो सकते है। आप तब तक आराम नहीं करते जब तक आप निश्चित लक्ष्य को पाने में सफल नहीं हो जाते है। इस लग्न के अंतर्गत जन्म लेने के कारण आप समझदार, लुभावने यहां तक की कई बार भावनात्मक प्रकृति के भी हो सकते है। #वृषभ लग्न के अंतर्गत जन्म लेने के कारण आप कुछ अव्यवहारिक हो सकते है। जिसके कारण नए लोगों को आप न भाये। अपने शांत और अंतर्मुखी व्यवहार, के कारण नए लोगों से मिलना जुलना पसंद नहीं करते है। अगर आपके साथ ठीक से व्यवहार नहीं किया जाता और समझा भी नहीं जाता, तो आपमें दूसरों के प्रति आक्रोश और रूढ़िवादिता की भावना उत्पन्न हो सकती है। आपको अक्सर नए दोस्त बनाने में कठिनाइयों का सामना करना पड़ता है जिसके कारण आप नए लोगों से मिलने में संकोच करते हैं। आप विश्वसनीय और व्यवहारिक प्रकृति के हो सकते है। आपका यह स्वभाव आपको कारोबार में आपको अच्छी सफलता दिला सकता है। आपके व्यक्तित्व में कामुकता का भाव भी हो सकता है। इसके कारण आप सभी क्षेत्रों में भौतिक सुख प्राप्ति के लिए प्रयासरत रहते हैं और आप काफी उद्यमी प्रकृति के भी हो सकते है। आप अपने कार्यों को अपने अनुसार निश्चित समय में पूरा करते है। व दूसरे लोगों द्वारा किए गए प्रयासों की सराहना भी करते है तथा उनकी प्रतिभा की भी खुलकर तारीफ करते हैं। उस समय आपका व्यवहार  किसी बॉस के समान भी हो सकता है। आपकी राशि के व्यक्तियों को आसानी से आकर्षित नहीं किया जा सकता और अगर ऐसा किया भी जाता है तो काफी सावधानी बरतनी पड़ती है। आप लोग अपने मूल्य और सिद्धांतों के प्रति काफी अडिग रहते हैं, और आपके दृष्टिकोण को बदलना आसान नहीं होता है। आपकी स्नेही प्रकृति और सच्चाई की सराहना करने का गुण, दूसरों को आपकी और आकर्षित करता है। इसी के कारण आप एक चुम्बकीय व्यक्तित्व के स्वामी है। आप स्वभाव से आवेगी नहीं होंगे लेकिन लेकिन अगर आप के साथ जबदस्ती का व्यवहार किया जाए तो आप उग्र हो सकते हैं। कई बार आप पूर्वाग्रही और जिद्दी भी हो सकते है। आप काफी सावधानी से अपने दोस्तों का चयन करते हैं। तथा आप झूठ बोलना पसंद नहीं करते हैं हालांकि आपको आसानी से मनाया जा सकता है।  #मिथुन लग्न के प्रभाव क्षेत्र में आने के कारण आप बहुत ही लुभावने, आकर्षक और मृदुभाषी होंगे। साथ ही आपके शारिरिक और मानसिक तौर पर काफी मजबूत प्रकृति के होने की सम्भावना बन रही है। आपका व्यक्तित्व ऐसा होता है की आप अपनी आयु से छोटे प्रतीत होते है। आपमें कुछ नया करने की प्रवृति पाई जाती है। आप किसी एक विचार पर स्थिर नहीं रह पाते है और जल्द ही अपने कामों से ऊब जाते है। यही कारण है की आप लम्बे समय तक किसी एक मसले पर ध्यान केंद्रित नहीं कर पाते है। आप लोगों में अपने फायदे के लिए दूसरों को इस्तेमाल करने की प्रवृति भी पाई जाती है। चूंकि आपका मन लगातार बदलता रहता है इसलिए आप पर भरोसा करना खतरनाक होता है। आपकी राशि के लोग बौद्धिक बातों को अधिक महत्व देते हैं, आपके लिए संचार का काफी महत्व होता है। इसलिए आप ज्ञान को जमा करने की पूंजी नहीं मानते। सभी सौर राशियों में मिथुन राशि बहुत बहुमुखी प्रतिभा वाली राशि मानी जाती है। आप जब किसी एक मुद्दे पर निर्णय लेते है तो अगले ही क्षण उसे बदल देते हैं। आपकी लग्न के लोग खुले विचार और अधिक जिज्ञासु प्रवृति के होते हैं। आपने शायद ही कभी किसी लक्ष्य पर गहराई से सोचा हो और हर प्रकार के षड़यंत्रों से आप दूर रहते है। साथ ही आप स्वयं पर नियंत्रण नहीं रख पाते है। #कर्क लग्न के प्रभाव से आपमें अंतरज्ञान, भावनाएं, और सपने देखने की प्रवृति हो सकती है। आपमें भाषा और संवाद कौशल का विशेष गुण हो सकता है। इसके अतिरिक्त आपके तीक्ष्णबुद्धि, सहृदयी, चंचल स्वभाव का होने की संभावनाएं भी बन रही है। आपकी लग्न के व्यक्तियों में कुछ आध्यात्मिक गुण भी पाए जाते हैं और कुछ लोगों में पागलपन के लक्षण भी पाए जाते हैं। आप लोगों की स्मरण शक्ति काफी मजबूत होती है। आप स्वभाव से सरल, संवेदनशील, दयालु और घरेलू प्रवृति के हो सकते है। व्यक्तिगत संबंधों में एक ओर आप ढृढ़स्नेही, कोमल, भावुक और रोमांटिक होते है जबकि दूसरी और आप हठी, अधिकार भावना और वफादारी के भावों से युक्त भी होते है। आप संबंधों को लेकर काफी जबाबदेह होते हैं। आपके मजबूत स्मरण शक्ति के स्वामी होने की संभावना बन रही है और आप किसी सदमें को कभी भूला नहीं पाते है। भावनात्मक प्रवृति का होने के कारण आप किसी की गलती को कभी नहीं भूलते है। जिसके कारण आप दोस्तों के लिए अच्छे और बुरे दोनों साबित हो सकते है। आप उज्जवल प्रवृति, अत्यंत सावधानी रखने वाले व समान रूप से उत्पादक भी साबित हो सकते है। #आपकी लग्न के लोग गतिशील और आकर्षक व्यक्तित्व के मालिक होते हैं। तथा आपके महत्वाकांक्षी, साहसी, मजबूत इच्छाशक्ति, सकारात्मक, स्वतंत्र और आत्म विश्वास से ओतप्रोत होने की संभावनाएं बन रही हैं। आपका स्वभाव खरी खरी बात करने का सकता है और आपको अच्छी तरह पता होता है कि आपको क्या चाहिए और आप उसे पाने के लिए पूरे मन और रचनात्मक तरीके से उसे पूरा करते हैं।हालांकि आप गुस्सैल और कभी कभी किसी बात पर दुखी होने पर आक्रामक होने की प्रवृति रखने वाले भी हो सकते है। आप निजी आक्षेप के प्रति काफी संवेदनशील होते है और जब आपके आदर्शों की आलोचना होती है तो आप काफी गुस्से में आ जाते हैं। आप स्वभाव से जिद्दी हो सकते है और इस बात में यकीन करते हो कि आपके द्वारा उठाया गया कदम सही है। वह सही या गलत हो आप अंत समय तक उसपर अड़े रहते हैं। आपके मानवीय गुणों से संपन्न होने की संभावना बन रही हैं। आपकी लग्न के लोग सहज, खुश रहने वाले बुद्धिमान और खुले विचार वाले होते हैं। तथा आप धर्म में रूढ़िवादी सिद्धांतों का पालन करते है लेकिन दूसरे के उपदेशों के प्रति संवदेनशील भी होते हैं।#कन्या लग्न के लोग अपेक्षाकृत अपने आप में रहने वाले, विनम्र और मृदुभाषी होते हैं। आप ऐसे लोगों को दोस्त मानते हैं जो आपको सामाजिक ढांचे में ऊपर आने में मदद करते हैं। जब किसी बाधा से सामना होता है तो आप संयमित रहते हैं और उसके समाधान के लिए तर्कसंगत उपाय में लग जाते हैं। इस विनम्रता को ही कभी कभी आपकी कमजोरी और जोड़तोड़ वाला मान लिया जाता है। आपमें इतनी क्षमता होती है कि आप किसी मुद्दे को समझ सकें और सबसे कठिन से कठिन समस्या का हल कर सकें। आपकी लग्न के लोग काफी बुद्धिमान होते हैं और गलत कामों में कम ही संलग्न होते हैं। आपकी लग्न के लोगों का व्यवहार दोस्ताना होता है और आप आमतौर पर सावधान, तेज संयमित और आसपास के बारे में जानकारी रखने वाले होते हैं। आप सोचसमझकर दोस्ती करना पसंद करते हैं। आपमें दूसरों की सहायता करने की ललक का गुण ही आपके लिए हानि का कारण बन जाता है।#तुला लग्न के लोग सहयोगी और समझौता करने में रूचि रखते है और उन्हें जब लगता है कि यह सही है तो वे बिना बहस के उसे स्वीकार करना भी पसंद करते हैं। दूसरों की असहमति से उनमें असुरक्षा की भावना पैदा हो जाती है। तथा आप जिंदगी में सदभावना के लिए लालायित रहते है। और इसके लिए कुछ भी करने को तैयार रहते हैं। आपकी लग्न के लोग अविश्वासी, संकोची, दिनचर्या के प्रति असहज, रूढिवादी और शर्मीले स्वाभाव के होते हैं। आपको जल्द क्रोध नहीं आता लेकिन जल्द उग्र होने की संभावना प्रबल बनी रहती है। आप यथार्थवाद के बजाय आदर्शवादी होते हैं और कभी- कभी ऐसी योजना बनाते हैं जो हवा में महल बनाने के समान होती है। क्या सही है और क्या गलत इसके बारे में आप लोगों की राय बिल्कुल स्पष्ट होती है। आपकी लग्न के लोग आम तौर पर शांतिप्रिय प्रकृति के और किसी काम को आसान तरीके से करने वाले माने जाते है। आप देखने में आकर्षक हो सकते हैं। तुला लग्न के प्रभाव से आपके बहुत सामाजिक प्रवति के होने की संभावनाएं बन रही है जिससे आपको काफी खुशी मिलती है।#वृश्चिक लग्न के लोग स्वयं की आलोचना में विश्वास, एकाग्रता और अपने काम के प्रति लगनशील होते है जिसमें आपको या तो पूरी तरह सफलता मिलती है या आप पूरी तरह से असफल रहते हैं। आप छोटी बातों पर भी भड़क जाते हैं जो आपको काफी नुकसान पहुंचा सकता है। आप कभी कभी अपने करीबी पर शंका और उनके प्रति ईर्ष्या रखते हैं। आपकी भावनात्मक शक्ति आपको मनचाहे क्षेत्रों में अपना कैरियर बनाने में काफी मदद करती है। आप स्वभाव से सख्त, जिद्दी, घमंडी और शांत होते है। आप अपनी जिंदगी अपने अंदाज से जीना चाहते हैं और उससे कम पे आपको कुछ भी स्वीकार नहीं। आपकी दया आपको सबसे अच्छा और सबसे वफादार दोस्त बनती है, लेकिन यह गुण कभी कभी विश्वासधात का बड़ा कारण बन जाता है। आप जब पूरी ऊर्जा, आत्मविश्वास, चाहत और उदारता को एकसाथ ले कर कार्य करते है तो सभी जगह सफल होते हैं।#धनु राशि के लोग प्रभावी, चमकदार और भविष्य के प्रति आशावादी नजरिए वाले होते हैं। साधारणतया आप की लग्न के लोग अच्छे स्वाभाव, हंसमुख स्वाभाव और आध्यात्मिक प्रवृति के होते हैं। प्रतिकूल परिस्थितियों में आप असंयमित हो सकते हैं और जबाबदेही के प्रति आपमें आशंका बनी रहती है। दूसरे लोग अनजाने में आपको गलत समझ लेते हैं क्योंकि आप बातचीत में जल्दबाजी करते हैं। आपमें जुआ खेलने के प्रति लगाव हो सकता है। आपकी लग्न में जन्म लेने वाले लोग आशावादी, महत्वाकांक्षी, प्रेरणादायक, उत्साही और खर्चीले होते हैं। आपका जीवन के प्रति नजरिया सकारात्मक, ऊर्जा से ओतप्रोत, साहसी, अपने अनुभव को दूसरों से अधिक से अधिक बांटने वाले होता हैं। आप अनावश्यक भाषण से दूसरों को लुभाना पसंद नहीं करते। आप लोग यात्रा करना पसंद करते है और आसपास के बारे में जानकारी इकट्ठा करना भी पसंद करते हैं। आपकी लग्न के लोग सम्मानित, ईमानदार, विश्वासी, उदार और न्याय के प्रति वफादार होते हैं। आप आम तौर पर फैशन की चाह रखने वाले, और ईमानदारी की एक मजबूती भावना के साथ अध्यात्म की और झुकाव रखने वाले होते है। आपकी लग्न के लोग मजबूत इच्छा शक्ति वाले होते हैं और वे किसी भी कार्य को सफलता पूर्वक अंजाम देने का इरादा रखते हैं।#मकर लग्न के लोग अक्सर धार्मिक होने का दिखावा करते है। लेकिन हकीकत में आप धार्मिक नहीं होते, जैसा की आप दिखाना चाहते है। आप स्वभाव से आत्मकेंद्रित और जिद्दी भी हो सकते हैं। आप दूसरों की बात सुनने की बजाय अपनी बात रखना पसंद करते है इसलिए कभी कभी आप अपना नियंत्रण खो देते हैं और दूसरों को काफी चोट पहुंचा देते है। आपकी लग्न के लोगों में अच्छी संगठनात्क क्षमता होती है,आप काम के प्रति जूनूनी, भौतिकवादी, रूढ़िवादी और अधिकार को सम्मान देने वाले होते हैं। आपकी लग्न के लोग महत्वाकांक्षी, गंभीर और काम के प्रति समर्पित होते हैं। साथ ही आप आत्म अनुशासित, जिम्मेवार, और व्यवहारिक प्रकृति के भी होते है। लेकिन समय समय पर अपने आप को असहाय महसूस करते हैं। तार्किक क्षमता आपमें बेहद प्रबल होती है। दूसरों से व्यवहार के दौरान आप शांत और आत्मकेंन्द्रित नजर आते हो लेकिन एक बार विश्वास जमने पर आप दोस्तों के प्रति प्रतिबद्ध होते हैं। आपका सामाजिक, प्रयासों के लिए तैयार रहना, काम के लिए सब कुछ करना तथा अपना आत्मसम्मान सबसे अधिक महत्वपूर्ण होता है। आपमें भौतिकवादी दृष्टिकोण के बजाय दार्शनिकता का भाव अधिक होता है।  आप स्वयं के सुख के लिए प्यार में पड़ने के लिए तैयार रहते है।  #कुंभ लग्न के लोगों में एक दूसरे से संवाद करने कि प्रबल इच्छा नहीं पाई जाती है। आप लोग दूसरों की बात को सुनना पसंद नहीं करते और ऐसा करने पर कभी कभी आप उदंड और अमर्यादित भी कहलाते है।  वैसे आप लोग काफी लुभावने और आकर्षक स्वाभाव वाले होते हैं। इसके अलावा आप कुछ शर्मिले संवेदनशील, कोमल, और अपने को दिखाने के लिए काफी उत्साही रहते हैं। काफी मजबूत इच्छाशक्ति और जो आपको उचित लगता है उसके लिए अतिम क्षण तक लड़ने को तैयार रहते हैं। आप लोग दूरदर्शी और मार्गदर्शक होते हैं। किसी अन्य के प्रति आपके मन में कोई अन्य भावना नहीं होती और दूसरों के विचारों के प्रति भी आप सहनशील होते हैं। आप अच्छे श्रोता होते है और अपने दोस्तों का बहुत ख्याल रखते हैं। आपकी लग्न के लोग आदर्शवादी, रोमांटिक, व्यवहारिक, लुभावने और मिलनसार स्वाभाव वाले होते हैं। आपकी प्रकृति के लोग अपने दायरे से बाहर जाकर भी लोगों की मदद करते हैं लेकिन आपमें भावनात्क सहयोग का अभाव होता है।#मीन लग्न के लोग व्यावहारिक नहीं होते बल्कि संवेदनशील और दूर की सोच रखने वाले होते हैं। आप बहुमुखी प्रतिभा के स्वामी और तर्क के बजाय समझ के द्वारा बातें समझ जाते हैं। मौजूदा परिदृश्य में आपका रवैया काफी कठोर होता है, आप किसी भी चीज को भुला सकते है लेकिन आप काफी कट्टरवादी होते हैं। आपकी लग्न के लोग विश्वासी और वफादार होते हैं। आपको आसानी से भ्रमित किया जा सकता है।  आपका गैर व्यवहारिक स्वाभाव करीबी लोगों के लिए परेशानी का सबब बन जाता है। आशावादी और निराशावादी के मिश्रित स्वाभाव वाले आपकी लग्न के लोग किसी एक मसले पर अपनी राय नहीं बना पाते। आपकी लग्न के लोग शर्मिले होते है और जो भी आपके संम्पर्क में आता है। आप उनके प्रति विश्वासी होते हैं। आप लोग अति धार्मक और अंधविश्वासी होते हैं। आपका स्वभाव उदार, मैत्रीपूर्ण होता है। कोई माहौल अच्छा हो या बुरा वो आप उसमें अपना सामंजस्य बिठा लेते हैं, आप उदार दोस्ताना और अच्छे स्वाभाव के होते हैं और दूसरों की भावनाओं के प्रति भी संवेदनशील होते हैं।
     PHYSICAL_APPEARANCE_PREDICTION         = मेष लग्न आपको मजबूत और आकर्षक शरीर का बना रहा है। आपके सुन्‍दर नाक नख्‍श व स्‍पष्‍ट ठोड़ी, नाक और मुंह वाले होने की संभावनाएं बन रही है। आपकी लग्न के लोग औसत ऊंचाई और घुंघरीले बाल वाले और शारिरिक रूप से मजबूत होते हैं। आपकी शारीरिक बनावट से आपकी ताकत का अंदाजा लगाया जा सकता है। साधारणतया आपके बाल भूरे होते हैं। आपके माथे पर कोई निशान जरूर होता है। अधिकांशतया आपकी नसें स्‍पष्‍ट दिखने वाली होती है और आपके शरीर पर चोटों के निशान पाए जाते हैं।#वृषभ लग्न के लोगों में कम उचाई वाले और कभी कभी दुबले कद काठी के होते हैं। आमतौर पर आप लोग सुंदर कद काठी, ऊंची नाक, चमकदार आँख और कामुक होठ वाले होते हैं। आपका जितना  चेहरा सुंदर देखने में होता है उतना आप भाग्यशाली नहीं होते है। आपकी शारीरिक संरचना चौकोर आकार ही होती है। आप लोगों के पीठ पर कुछ निशान भी होते हैं। वृषभ लग्न के लोग मेलजोल वाले होते हैं।#मिथुन लग्न के लोग चमकदार आँखें और अपनी बातों से लुभाने वाले होते हैं। आप लोग दुबले कद काठी के, औसत लंबी ऊचाई वाले होते हैं। आप कई बार माडल्‍स की तरह आकर्षक नजर आते हैं। गोरे रंग, छोटे टोढी,सुन्दर चेहरे, और घुंघरीले बाल से आपका व्यक्तित्व काफी लुभावना लगता है। आपका ललाट चौड़ा होता है और आंखे भी सुंदर दिखाई देती है। लेकिन आकर्षक व्यक्तित्व होने का बावजूद आपको रोग और स्वास्थ्य समस्याओं का सामना करना पड़ता हैं।#कर्क लग्न के लोगों की शारिरिक बनावट गोल होती है और तीस साल की उम्र में भी उम्रदराज दिखने लगते हैं। आपके बाल काले और कम हो सकते है, छोटी नाक, आंख बाहर को निकली हुई और टोढी गोल होती है। और आपकी ऊचाई औसत से छोटी होती है। आपकी लग्न के लोग अपने आकर्षक व्यक्तित्व के मामले में भाग्यशाली नहीं होते। आपकी शारीरिक बनावट ठीक-ठाक होती है, आपके शरीर का ऊपरी हिस्सा चौड़ा होता है। सामान्यता: आप गोरे रंग के होते है। #सिंह लग्न के लोग करिश्माई व्यक्तित्व के मालिक होते हैं और आपके व्यक्तित्व से लोग काफी आकर्षित होते हैं। व्यक्तित्व के मुकाबले शारीरिक बनावट के मामले में वे उतने भाग्यशाली नहीं होते, आप औसत ऊचाई वाले और शरीर का उपरी हिस्सा बेहतर बनावट वाला होता है। आपकी लग्न के लोगों की आँखे हल्की पीली और चेहरा अंडाकार होता हैं। आपकी लग्न के पुरूष या महिला भले ही नियंत्रित दिखे लेकिन आसानी से उन्हें मनाया जा सकता है। जोश और जूनुन आपमें आम होती है।#कन्या लग्न के लोग अक्सर अल्हड़ प्रवृति के होते हैं। आपकी अक्सर शारीरिक बनावट खासकर चेहरा खूबसूरत होता है। आपके चलने का अंदाज, शारीरिक बनावट, मासूम चेहरा काफी लुभावने दिखता हैं। आपके नाक और गाल काफी आकर्षक होते हैं।#तुला लग्न लोग विविध और विशिष्ट होते हैं, आपकी शारीरिक बनावट खासकर होंठ और ललाट से आत्मविश्वास झलकता हैं। आपके बारे में आम धारणा होती है कि आप कम ऊचाई वाले होते हैं, और काफी चालाक प्रवृति के भी होते हैं। आपकी लग्न की महिलाएं काफी आकर्षक होती हैं जबकि पुरूष भी काफी जोशीले होंते हैं। आपकी लग्न के लोगों की ऊचाई औसत या इससे अधिक होती है।#आपकी लग्न के लोग शरीर से काफी मजबूत और इनका कंधा काफी चौड़ा होता है और किसी भी हालात में आपकी शारीरिक बनावट काफी अच्छी होती है और चेहरा चौकोर आंखे लुभावनी और होठ सुंदर होते हैं। आपके  बाल भूरे रंग के होते हैं।  व आपकी शारीरिक बनावट से ताकत, गोपनीयता और गंभीरता साफ साफ दिखाई देती है।#धनु लग्न के लोग काफी मजबूत लंबे, होते हैं। आपके होठ काफी लुभावने और घने बाल वाले होते हैं। आपका व्यक्तित्व ऊर्जवान और लुभावना होता है। तीस साल की उम्र में ही अधिक उम्र के दिखने लगते हैं क्योंकि ये अधिक वजन बढ़ाने के बहुत सारे उपाय करते हैं। धनु लग्न के व्यक्ति सामान्य रूप से करिश्माई, आकर्षक और ऊर्जावान व्यक्तित्व के होते हैं। आपकी नजरे प्रसन्नचित, और पोशाक सामान्य होती हैं।#मकर लग्न के लोग काफी दुबले, हड्डी दिखने वाले और औसत उंचाई वाले होते हैं। आपकी भोहें और छाती पर बडे बडे बाल पाये जाते हैं। आपका माथा सामान्यता बड़ा और लंबे दांतवाले होते है, जो कभी कभी होठ के बाहर भी दिखाई देते हैं। आपके व्यक्तित्व से परिपक्वता और मजबूती का आभास होता है। आपकी नज़र में तटस्थता,संयम, और सर्वसाधारण द्वारा चिह्नित गुण साफ झलकता है। आप कभी कभी वैज्ञानिक दार्शनिक, बुद्धिमान व्यक्ति जैसे दिखते हैं। #कुंभ लग्न के लोग अक्सर पतले और लम्बे कद के देखे जाते है। आपका चेहरा बड़ा, गर्दन, पीठ, पेट, कमर, जांघों, और पैर लम्बे हो सकते है। लम्बे और घने बाल तथा आपका हेयर स्टाईल साधारण होता है। आपके चेहरे की बनावट सुंदर होती है जिससे गंभीरता का आभास होता है। आपकी आंखे चमकदार होती है और ऐसा प्रतीत होता कि किसी अजीब खोज में लगी हुई हैं। आपके पूरे व्यक्तित्व से लगता है कि आपमें किसी प्रकार का दिखावा नहीं है।#मीन लग्न के लोग अक्सर मोटे और औसत कद के होते हैं, अक्‍सर सामान्‍य दिखने वाले होते हैं। आपकी लग्न  के लोगों की कई अलग अलग कद काठी होती हैं। आपकी आंखे बड़ी और सुंदर होती है। आपकी शारीरिक बनावट से आभास होता है कि आप बहुत रहस्यमय और शांत स्वाभाव के हैं। आप लोगों के चेहरे की बनावट को समझना भी आपके मन को समझने जैसा मुश्किल होता है।
