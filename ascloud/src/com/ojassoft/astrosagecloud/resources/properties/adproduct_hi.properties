

	 ASTROSAGE_ONLINE_SHOPPING_STORE	= हमारा विशेष धार्मिक सामग्री स्टोर
	 YANTRAS							= यंत्र
	 YANTRAS_DATA						= एस्ट्रोसेज द्वारा उपलब्ध कराए जाने वाले यंत्र सौ प्रतिशत वास्तविक हैं जो पूर्ण रूप से सक्रिय और उच्च गुणवत्ता के हैं।
	 GEMSTONES							= रत्न
	 GEMSTONES_DATA						= एस्ट्रोसेज पर एकदम असली, नैचुरल और उच्च क्वालिटी के रत्न उपलब्ध हैं जो भारत की प्रतिष्ठित लैब द्वारा प्रमाणित हैं।
	 RUDRAKSH							= रुद्राक्ष
	 RUDRAKSH_DATA						= आप एस्ट्रोसेज पर 100 प्रतिशत असली और सर्वश्रेष्ठ क्वालिटी के रुद्राक्ष किफायती दाम पर प्राप्त कर सकते हैं।
