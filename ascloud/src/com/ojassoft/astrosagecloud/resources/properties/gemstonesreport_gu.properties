	IMPORTANT_INFO                     = <p> રત્ન પહેરતી વખતે કેટલીક બાબતો ધ્યાનમાં રાખવા વિનંતી. ફક્ત અસલી રત્નો જ ખરીદો, કારણકે નકલી રત્નની કોઈ અસર થશે નહિ. તમારે સુચવેલા વજનનું જ રત્ન પહેરવું જોઈએ. રત્નનું વજન રત્તી તરીકે ઓળખાય છે. આજકાલ બજારમાં ઘણા બનાવટી રત્નો મળે છે. વાંચકોને યોગ્ય સહાય કરવા માટે એસ્ટ્રોકેમ્પ/એસ્ટ્રોસેજ તમારા માટે રત્નોનો અનન્ય તેમજ વ્યાજબી સંગ્રહ લાવે છે. તેને વિષે વધુ જાણવા માટે અહીં ક્લિક કરો. </p> <p><b>રત્ન ખરીદવા માટે, <a href=http://www.astrocamp.com/products.asp><u> અમારી જેમસ્ટોન એસ્ટ્રો શોપ જોવા વિનંતી </u></a></b>.</p> <p><b> અમારા વિદ્વાન જ્યોતિષીઓ પાસેથી તમારા રત્નના સૂચનો ખરીદવા માટે, <a href=http://www.astrocamp.com/service.asp?service_id=84&prtnr_id=1><u> રત્ન સૂચનોનું પૃષ્ઠ </u></a> જોવા વિનંતી </b>.</p>
