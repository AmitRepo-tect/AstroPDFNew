
	GEMSTONE_PREDICTION				= રત્નોની આગાહી
	WHAT_IS_GEMESTONES					= રત્ન શું છે?
	GEMINTRO							= ઇતિહાસમાં રત્નનો ઉપયોગ મુખ્યત્વે સારવાર અને આધ્યાત્મિક વિધિ માટે કરવામાં આવતો. રત્નો અલભ્ય અને અત્યંત સુંદર હોવા ઉપરાંત તેમના આટલા કિંમતી હોવાનું મુખ્ય કારણ તેમને ધારણ કરનારને મળતા સામર્થ્યમાં છુપાયેલું છે. વ્યક્તિના શરીરના સંપર્ક થકી મળતી ઊર્જાના સંગ્રહસ્થાન સમાન છે. રત્નનો ઉપયોગ કઈ રીતે થાય છે તેના આધારે તેમની લાભદાયી અથવા વિનાશક શક્તિ બહાર આવે છે. બધા જ પત્થર કે રત્નમાં વિવિધ માત્રામાં ચુંબકીય શક્તિ રહેલી હોય છે, અને તેમાંના ઘણા તેમની રોગનિવારક શક્તિને કારણે આપણને ઉપયોગી છે. રત્નો દ્વારા ઉત્સર્જિત આંદોલનો અને આવર્તનોમાં આપણા સમગ્ર અસ્તિત્વને અસર પહોંચાડવાનું સામર્થ્ય હોય છે. તમારી રત્ન સંબંધિત આગાહી કંઈક આવી છે. 
	STONE_DESCRIPTION					=  લગ્નના સ્વામી માટેના રત્નને જીવન રત્ન કહે છે. તેની રહસ્યમય શક્તિઓ પ્રાપ્ત કરવા માટે વ્યક્તિ તેને જીવનપર્યંત પહેરી શકે છે. જીવન રત્ન પહેરવાથી વ્યક્તિના જીવનની અડચણો દૂર થશે તેમજ તેને ખુશી, સફળતા અને સમૃદ્ધિ મળશે. સમાન્ય રીતે વ્યક્તિની એકંદર સુખાકારી માટે તેને પહેરવામાં આવે છે. તેના બ્રહ્માંડીય કિરણો વ્યક્તિના સમગ્ર અસ્તિત્વને અસર પહોંચાડે છે. #જીવન પ્રયત્ન અને નસીબના સંયોજન સમાન છે. તમારું ભાગ્ય રત્ન પહેરીને નસીબને તમારી દિશામાં વાળો. વ્યક્તિનું ભાગ્ય રત્ન તેના ભાગ્યને જીવંત રાખે છે અને જીવનમાં સુખદ આશ્ચર્યો સર્જે છે. અમે તમારા માટે આ ભાગ્ય રત્નની ભલામણ કરીએ છીએ: #ભાગ્ય રત્ન કે નસીબ રત્નની ભલામણ નવમા ભાવના સ્વામીને આધારે કરવામાં આવે છે. આ રત્ન થકી તમને ખરેખર જરૂર હોય ત્યારે નસીબ તમારો સાથ આપશે. વ્યક્તિગત અને વ્યવસાયિક જીવનમાં સારું નસીબ તમારી સહાય કરશે. સમૃદ્ધિમાં નડતરરૂપ બનતી કોઈ પણ અડચણનો સામનો કરવામાં આ રત્ન તમારી મદદે આવશે. 
		
