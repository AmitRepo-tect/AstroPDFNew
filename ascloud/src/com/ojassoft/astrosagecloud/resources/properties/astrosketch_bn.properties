
ASTRO_SKETCH_DATA_MALE = <p><b>অ্যাস্ট্র স্কেচ: </b> (জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল) <br/>মেষ (মেষ রাশি) পুরুষের নেতৃত্বের গুণাবলী আছে এবং নতুন জিনিসের জন্য উদ্যোগ গ্রহণ করা পছন্দ করেন। তিনি চমক ভালবাসেন, একটি শক্ত মানুষ এবং কঠিন পরিস্থিতিতে ভেতরের শক্তি দেখান। তিনি স্বাধীন, মজা ভালবাসেন এবং দুঃসাহসিক হন। তিনি জীবনের উজ্জ্বল দিকে আক্রমনাত্মক এবং ভোঁতা হতে পারেন যাকে কেউ দেখতে পছন্দ করে। তিনি মিথ্যা অভিনন্দন পছন্দ করেন না এবং ভালবাসার থেকে ঘৃণিত হতে তিনি বেশী পছন্দ করেন। তার ব্যক্তিগত স্থান থাকা তার জন্য গুরুত্বপূর্ণ, এমনকি যখন একটি সম্পর্ক থাকে। একটি প্রতিশ্রুতির মধ্যে যখন থাকেন তখন তিনি সহায়ক, স্নেহপূর্ণ এবং তার সহযোগীর দিকে প্রেমময় হবেন। তিনি খুব বর্তমানে বসবাস করেন যেটা তিনি খুব গুরুত্বের সাথে অতীত থেকে শিক্ষা গ্রহণ করে না।</p><p><b>কিছু বিখ্যাত ব্যক্তি মেষ রাশির সঙ্গে জন্ম নেন: </b><br />জয়াপ্রদা, মমতা কুলকর্নি, রানী মুখার্জি, জিতেন্দ্র </p><p><b>সাধারণত মেষ রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br /><b>ইতিবাচক: </b>দুঃসাহসিক, উদ্যমী, সাহসী, গতিশীল এবং দ্রুত উপস্থিতবুদ্ধিসম্পন্ন <br /><b>নেতিবাচক:  </b>স্বার্থপর, দ্রুত বদমেজাজি, আবেগপ্রবণ এবং অধীর </p><p><b>মেষ চাঁদ চিহ্ন সামঞ্জস্য: </b>মিথুন, সিংহ, ধনু, এবং কুম্ভরাশি </p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>বৃষভ (বৃষ রাশি) পুরুষ মানুষের একটি মনোহর, বাকপটু ব্যক্তিত্ব থাকে। তাঁর অত্যুচ্চ ব্যক্তিত্ব তাকে অনেক মনোযোগ দেবে এবং তিনি যেখানেই যান গুণমুগ্ধ ব্যাক্তি দ্বারা বেষ্টিত হন। তিনি কথায় ধনী একজন মানুষ এবং যোগাযোগে তার চমত্কার উপায় দ্বারা প্রভাবিত হতে পারেন। তাঁর সর্বশ্রেষ্ঠ শক্তি হল তার ধৈর্য এবং এটি তাকে তৈরি করে উচ্চস্তরে যখন সিদ্ধান্ত গ্রহণ করতে হয় এবং একটি সঙ্কটময় পরিস্থিতি সামলাতে হয়। আপনি মানসিক ও নৈতিক সাহস দেখানোর জন্য তাকে উৎসাহিত করবেন এবং সবসময় একটি নির্ভরযোগ্য ও বিশ্বস্ত বন্ধু হিসেবে আপনার পক্ষ থেকে তাকে খুঁজতে হবে। তবে তার সব গুণাবলী সত্ত্বেও তিনি সময়ে খুব সম্বন্ধসূচক, অনমনীয় ও একগুঁয়ে হন।হবেন।</p><p><b>কিছু বিখ্যাত ব্যক্তি জন্মান বৃষভ রাশির সঙ্গে: </b><br />অঞ্জলি জঠর,মাধুরী দীক্ষিত,মৌসুমি চ্যাটার্জী,পূজা বেদি</p><p><b>সাধারণত বৃষভ রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br /><b>ইতিবাচক: </b> সহিষ্ণু, নির্ভরযোগ্য, অকপট, জেদি, প্রশান্ত<br/><b>নেতিবাচক:  </b>  হিংসুটে, সম্বন্ধসূচক, অনমনীয়, স্ব প্রশয়দাতা</p><p><b>বৃষভ চাঁদ চিহ্ন সামঞ্জস্য: </b>কর্কট রাশি, কন্যারাশি, মকর রাশি, মীনরাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>মিথুন(মিথুন রাশি) পুরুষ হন একজন মানুষ যিনি প্রফুল্ল, প্রাণবন্ত এবং খুব সক্রিয় হন। প্রকৃতি দ্বারা একটি বহির্মুখী, তিনি একটি চমৎকার সদালাপী তৈরি করেন। বুদ্ধিমান এবং ক্রীড়াবিদ, জীবন ও জীবনযাত্রার মানের জন্য তাকে আসলের তুলনায় অনেক কম বয়েসি মনে হয়। বিশ্রামহীন, সন্ধানী, নিয়মমাফিক কাজে এবং দৈনন্দিন কাজকর্মে সহজে বিরক্ত হওয়া তার কাছ থেকে আশা করা যায়। তার একটি নতুন চ্যালেঞ্জের প্রয়োজন যে যাচ্ছে, যে শর্তে নিযুক্ত তাকে জড়িয়ে রাখতে। নিচের দিকে, আপনি তাকে কুখ্যাতিপূর্ণভাবে অনির্ভরযোগ্যভাবে খুঁজে পেতে পারে। তার সুবিধাজনক পরিস্থিতিকে ব্যবহার করে, একটি ব্যক্তিগত কারণের অগ্রবর্তী চক্রান্ত এবং মনোযোগের খেলা খেলে তিনি দ্বৈত মুখবিশিষ্ট হতে পারেন। যারা তার হৃদয় অনুসরণ করেন তারা ​​অযৌক্তিক প্রেমিকা বলে আশা করবেন না, তিনি বাস্তববাদী এবং তার সিদ্ধান্ত মন দ্বারা শাসিত হয়।</p><p><b>মিথুন রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ডিম্পল কাপাডিয়া, শিল্পা শেঠি, মিঠুন চক্রবর্তী, পরেশ রাওয়াল</p><p><b>সাধারণত মিথুন রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> অভিযোজ্য, বহুমুখী, বিদগ্ধ, তেজী, জীবন্ত<br/><b>নেতিবাচক:  </b>  স্নায়বিক, ভাসা ভাসা, ধূর্ত, অসঙ্গত</p><p><b>মিথুন চাঁদ চিহ্ন সামঞ্জস্য: </b> মেষ রাশি, সিংহ রাশি, তুলারাশি , কুম্ভরাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>কর্ক (কর্কট রাশি) পুরুষেরা সংবেদনশীল আবেগপ্রবণ এবং আঘাতপ্রাপ্ত হন। তিনি কল্পনাপ্রিয় হন এবং আপনার হৃদয় তার প্রলুব্ধ শব্দ দ্বারা একটি আঘাতে লাফালাফি করতে পারেন। তিনি স্নেহ, যত্ন এবং সমর্থন দিয়ে তাকে বর্ষিত করে বন্ধু নির্বাচন করবেন। তিনি যখন বাড়ি, তার কাছের এবং প্রিয় মানুষের কাছাকাছি হন তখন সুখী হবেন। তিনি অবিবেচক এবং অসংবেদী মানুষদের অবজ্ঞা করেন এবং কঠোর শব্দ দ্বারা আঘাত করা হয়, তাই তিনি কখনও একটি অভদ্র ছেলে বা মেয়ের বন্ধু হবে না। তাঁর আন্তরিকতা, আনুগত্য তাকে একটি সম্পর্কের প্রতি আকাঙ্খিত তোলে এবং রসবোধে সমৃদ্ধ একটি অপরিমেয় অন্তর চুরি করতে পারেন। তিনি হয় খুবই দুঃখজনক নাহলে অপব্যায়ী হন, কিন্তু বুদ্ধিমান, অভিমানী উপহারের সঙ্গে তার ঘনিষ্ঠকে বেশী প্রশয় দিতে জানে। তার অদ্ভুত আচরণ এবং দোলায়মান মেজাজ সময়ে তাকে অনির্দেশ্য করে তোলে কিন্তু এ সব অবিশ্বস্ত হয় না, আপনি নিঃসন্দেহে তার উদ্দেশ্য বিশ্বাস করতে পারেন।</p><p><b>কর্ক রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>প্রিয়ঙ্কা চোপড়া, জুলিয়া রবার্টস, টম ক্রুজ, প্রিন্সেস ডায়ানা, পামেলা অ্যান্ডারসন</p><p><b>>সাধারণত কর্ক রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b>আবেগপ্রবণ, প্রেমময়, স্বজ্ঞাত, কল্পনাপ্রবণ, বিচক্ষণ, সতর্ক, প্রতিরক্ষামূলক, সহানুভূতিশীল<br/><b>নেতিবাচক:  </b>পরিবর্তনশীল, খামখেয়ালি, অতিরিক্ত আবেগপ্রবণ, অভিমানী, সংলগ্ন</p><p><b>কর্ক চাঁদ চিহ্ন সামঞ্জস্য: </b>মেষ রাশি, বৃষ রাশি, কর্কট রাশি, কন্যা রাশি, তুলা রাশি, মকর রাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>সিংহ (সিংহ) পুরুষের একটি কঠিন বাহ্যিক থাকে কিন্তু তিনি ভাবপ্রবণ, তীব্র এবং অন্তঃস্থলে আবেগপ্রবণ হন। মেয়েদের চারিদিকের সঙ্গে তিনি অত্যন্ত সাহসী হন, তিনি তা দেখাতে পারেন না কিন্তু তার প্রিয়জন সম্পর্কে সম্বন্ধসূচক হন। তিনি সামনের সারিতে থাকতে পছন্দ করেন, অনেক মনোযোগ পাবার ক্ষমতা ভোগ করেন, খেলাধুলাপ্রি়য়, ক্রীড়াবিদ এবং সময়ে ভাসা ভাসা হয়। তিনি পরিস্থিতি এবং এমনকি তার চারপাশের মানুষের নিয়ন্ত্রণে নিতে পছন্দ করেন। এটি হয় কারন তিনি একটি জন্মগত নেতা, কিছুটা কর্তৃত্বপ্রি়য় এবং জাহাঁবাজ হন। তার মেজাজ এবং আগ্রাসন আপনাকে অসন্তুষ্ট করবে এবং তাকে অনমনীয় ও অকার্যকর হিসাবে ভুল বুঝা থেকে আপনাকে চালনা করবে। চমকের অত্যন্ত অনুরাগী, তিনি দামী উপহার এবং স্যুভেনির সঙ্গে তার প্রিয়জন বর্ষিত হবে। অবশ্যই এটা তাকে একটি বড় অপব্যায়ী করে তোলে। প্রশংসার জন্য তাঁর প্রেম তাকে তৈরি করে ফাঁপা প্রশংসা এবং অর্থহীন চাটুর জন্য পতিত হওয়া। তার বন্ধুদের একটি বিশাল বৃত্ত থাকে এবং সামাজিকীকরণে মহান হবেন।</p><p><b>সিংহ রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>মনীষা কৈরালা, কাজল, রাখী, মনোজ কুমার, গুলজার</p><p><b>সাধারণত সিংহ রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> কূটনৈতিক, কল্পনাপ্রিয়, মনোহর, চিন্তাভাবনাহীন, আদর্শবাদী<br/><b>নেতিবাচক:  </b> অনিশ্চিত, পরিবর্তনশীল এবং অতিসরল</p><p><b>সিংহ চাঁদ চিহ্ন সামঞ্জস্য: </b>কর্কট রাশি, মীনরাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে একটি সংক্ষিপ্ত প্রোফাইল)<br/>কন্যা (কন্যা রাশি) পুরুষ একটি আদর্শবাদী হন যিনি বড় বা ছোট সবকিছুর মধ্যে পরিপূর্ণতা ভালবাসেন যেটা তিনি পরিচালনার দায়িত্বপ্রাপ্ত হন। জীবনে সিদ্ধান্ত গ্রহণে তার মন দ্বারা শাসিত, তিনি যুক্তিসঙ্গত এবং বিশ্লেষিত হন তার জীবন, কাজ এবং সম্পর্কের প্রবেশ পথে। এটা গুরুত্বপূর্ণ যে আপনি ওজন করবেন আপনি কী করবেন এবং তাকে বলার আগে, তার অভদ্র, অসভ্য ও অবমাননাকর ভাষার জন্য বড় অপছন্দ থাকার হিসাবে। তিনি আপনার সম্পর্কে সবকিছু লক্ষ্য করবেন, আপনার  পোশাক, কথা বলা, নিজেকে বহন করা এবং আপনি আপনার আচরণ সম্পর্কে সচেতন হবেন আশা করা যায়। এই মানে নয় তিনি উন্নাসিক কিন্তু পরিবর্তে তিনি পৃথিবীতে অত্যন্ত নিচে এবং একটি সহজ তবুও শৃঙ্খলাবদ্ধ জীবন যাপন করবেন। তিনি অত্যন্ত স্নেহময় এবং তার ঘনিষ্ঠ বন্ধু ও প্রিয়জনের প্রতি প্রতিরক্ষামূলক হন। তার পদ্ধতির মধ্যে যুক্তি রয়েছে, তিনি কখনও একটি বিতর্কে হারেন না এবং চরম আরামের সঙ্গে বিরোধ নিষ্পত্তি হবে। সৎ, সংগঠিত, উৎসর্গিত এবং সহায়ক তিনি অত্যন্ত নির্ভরযোগ্য হন, ঠিক যে সময়ে আক্রমনাত্মক হতে পারেন।</p><p><b>কন্যা রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>আশা ভোঁশলে, রাকেশ রোশন, অগাথা ক্রিস্টি, রানী এলিজাবেথ, জোসেফ কেনেডি</p><p><b>সাধারণত কন্যা রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b>   শালীন, অতিসতর্ক, নির্ভরযোগ্য, বাস্তব পরিশ্রমী<br/><b>নেতিবাচক:  </b>   ব্যস্তবাগীশ, অতি সমালোচনামূলক, কঠোর, রক্ষণশীল</p><p><b>কন্যা চাঁদ চিহ্ন সামঞ্জস্য: </b>বৃষ রাশি, মকর রাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে একটি সংক্ষিপ্ত প্রোফাইল)<br/>তুলা (তুলারাশি) পুরুষ একটি শক্ত প্রয়োজনীয় কল্পনাপ্রিয় এবং সৃজনশীল ব্যক্তি হন। তিনি ভালবাসতে এবং সম্মানিত হতে পছন্দ করেন এবং সপ্রতিভ, আত্মবিশ্বাসী এবং মজা প্রিয় মানুষের প্রতি আকৃষ্ট হন। একটি অংশীদার হিসেবে তিনি আপনাকে আপনার ব্যক্তিগত স্থান দেবে এবং আপনার কাছ থেকে একই জিনিস আশা করবেন। তিনি দামী কাপড়, ঘড়ি, জুতা, ব্র্যান্ডেড পারফিউম, সঙ্গীত, থিয়েটার এবং শিল্পের উপর খরচ করতে ভালবাসবেন। যেহেতু তিনি তার চিন্তাধারায় প্রগতিশীল এবং পরিবর্তনে নমনীয় হন  তিনি শুনতে এবং চারপাশের মতামত ও চিন্তাধারা গ্রহণ করতে কিছু মনে করেন না, যদি এটা যুক্তিসম্মত হয়ে থাকে। অত্যন্ত বাচাল হন, তিনি সুখী হন যখন আশাবাদী ও প্রাণবন্ত এবং একটি আকর্ষণীয় আলাপচারিতার দ্বারা ইচ্ছাপূরণ করতে পারে এমন ব্যক্তিদের দ্বারা বেষ্টিত হন। তিনি অলস নন, শুধু তিনি একটি সিদ্ধান্ত নিতে একটু সময় নেন। তাঁর কূটনীতি সময়ে জলে যায় এবং তার চারপাশের মানুষকে অস্বস্তিতে ফেলে।</p><p><b>তুলারাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ক্যাট উইন্সলেট, রেখা, কারিনা কাপুর, লতা মঙ্গেশকর, অমিতাভ বচ্চন, মহাত্মা গান্ধী</p><p><b>সাধারণত তুলারাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b>কূটনৈতিক, কল্পনাপ্রিয়, মনোহর, চিন্তাভাবনাহীন, আদর্শবাদী<br/><b>নেতিবাচক:  </b> অনিশ্চিত, পরিবর্তনশীল এবং অতিসরল</p><p><b>তুলা চাঁদ চিহ্ন সামঞ্জস্য: </b>মেষ রাশি, কর্কট রাশি, সিংহ রাশি, ধনু রাশি, মকর রাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>বৃশ্চিক (বৃশ্চিক রাশি) মানুষ কামুক, বিদগ্ধ, সূক্ষ্ম এবং অত্যন্ত গোপনীয় হন। তার কামুক প্রকৃতি এবং আত্মবিশ্বাসী ব্যক্তিত্ব তাকে আকর্ষণের কেন্দ্র করে। তার উচ্চাকাঙ্ক্ষা তাকে উদ্দেশ্যমূলক রাখে এবং তিনি কিছুটা বিদ্রোহী, যিনি সমাজের প্রতিষ্ঠিত নিয়মে বিশ্বাস করেন না। তিনি অসীম কামুক, খামখেয়ালি, শান্ত এবং সমান ভারি হন। তিনি ঠালা, কৃত্রিম এবং তীব্রতার অভাব রয়েছে যেকোনো কিছুতে ঘৃণা করেন। তিনি খুশি থাকতে এবং সম্পূর্ণ অনুভব করতে তার চারপাশে বাস্তববাদী মানুষের প্রয়োজন রয়েছে। তিনি সবসময় নতুন এবং আকর্ষণীয় কিছু অবধি এবং আপনি আপনার চারপাশের লম্বা হিসেবে তিনি নিযুক্ত রাখা হিসাবে আপনি আপনার সংস্থার প্রতি বিরক্ত হতে পারেন না। এটি তাকে ​​একটি বহির্মুখী করে তোলে যার বন্ধু এবং নিকটদের একটি বড় গ্যাং থাকে। তবে তিনি সম্পর্কের দাবি করেন এবং তার প্রেম একই তীব্রতার সঙ্গে পরস্পর আদান প্রদান করবে আশা করেন। এই দাবিকে শান্ত করতে এবং মানুষ রচনা করতে আপনি কাউকে খুজবেন যার জৈবিক শক্তি  রয়েছে যেটা চৌম্বক এবং আসক্ত হয়।<p><b>বৃশ্চিক রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ঐশ্বর্য রাই, ইন্দিরা গান্ধী, জওহরলাল নেহেরু, শাহরুখ খান, বিল গেটস, ব্রায়ান অ্যাডামস, ডেমি মুর</p><p><b>সাধারণত বৃশ্চিক রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক:</b>আবেগময়, তীব্র, মহৎ, সংবেদনশীল, স্বজ্ঞাত, ভোগবিলাসী, রহস্যময়, আবেগপ্রবণ<br/><b>নেতিবাচক: </b>  কুচুটে, বিরক্ত, অমোঘ, অত্যধিক, গোপনীয়, একগুঁয়ে</p><p><b>বৃশ্চিক চাঁদ চিহ্নের সামঞ্জস্য: </b>কর্কটরাশি এবং মীনরাশি। </p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>ধনু (ধনু রাশি) পুরুষ একটি সুখী ভাগ্যবান ব্যক্তি হন। তার অনেক প্রয়োজনীয় কূটনীতির অভাব থাকে এবং প্রায়ই ভোঁতা ও ন্যায়পরায়ণ হন। যখন তার কাছের প্রিয় মানুষদের সাথে থাকেন তখন তিনি বন্ধুত্বপূর্ণ, স্পষ্টভাষী এবং নিযুক্ত হন। তিনি অতীত থেকে জিনিস বহন করবেন না এবং বর্তমান এবং বাস্তব পৃথিবীতে বাস করবেন। জীবনের অসুখী অভিজ্ঞতা তাকে একটি দুঃখবাদী করে না এবং তার আশাবাদ তাকে উদ্দেশ্যমূলক রাখে। এমনকি যখন একটি প্রতিদ্বন্দ্বী অবস্থা, তখন তিনি আত্মসমর্পণ করবেন না কিন্তু খুব শেষ পর্যন্ত এটা যুদ্ধ করবেন। সাধারণত তিনি অনিচ্ছাকৃত দান করা ধরে রাখতে পারেন না, কিন্তু যখন কেউ তাকে চূর্ণ করতে চেষ্টা করে তিনি আরামের সঙ্গে এটি ফিরিয়ে দেন। আপনি তার কাছ থেকে আদেশের পরিবর্তে উদাহরণ দ্বারা অনুপ্রাণিত এবং সমবেদনার সঙ্গে নেতৃত্ব মান্য করবে আশা করতে পারেন না। তাঁর ভোঁতামো কঠিন পরিস্থিতির সময়ে তাকে রাখতে পারে এবং তার সততা আপত্তিকর হিসাবে দেখাবে। তিনি ভ্রমণ করতে ভালবাসেন এবং নিয়মমাফিক জীবনে বাধা পাওয়া এবং একঘেঁয়ে জিনিসকে ঘৃণা করেন।</p><p><b>ধনু রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ধর্মেন্দ্র, শত্রুঘ্ন সিনহা, দিলীপ কুমার, উইনস্টন চার্চিল</p><p><b>সাধারণত ধনু রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> আশাবাদী, প্রফুল্ল, আত্ম রসবোধ, সৎ, দার্শনিক<br/><b>নেতিবাচক: </b> উদ্বেগহীন, অন্ধভাবে আশাবাদী, কৌশলহীন, বিশ্রামহীন</p><p><b>ধনু চাঁদ চিহ্নের সামঞ্জস্য: </b>কর্কটরাশি, মীনরাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>মকর (মকর রাশি) পুরুষ ​​একটি লাজুক মানুষ যার শুরুতে কাছে আসা অত্যন্ত কঠিন। তিনি নিজের অধীনে তার আসল সংবেদনশীল একটি কঠিন বাহ্যিক নিরাপদ পাহারা রয়েছে। তিনি একটি অন্তর্মূখী, ভিড়ে লাজুক এবং বাস্তব ঘনিষ্ঠ বন্ধুদের সামনে উন্মোচন শুধুমাত্র তাকে জানতে এবং যাদের মধ্যে তিনি অত্যন্ত আরামদায়ক। আপনার সংস্থার যখন আরামদায়ক মেজাজ এবং বিদগ্ধ মন্তব্য তার অসাধারণ অনুভূতি দ্বারা আপনি আশ্চর্য হন। তিনি সংস্কারমুক্ত চপল নন কিন্তু তখন তার ঘন মেজাজ দোলায়মান থাকে এবং এর ফলে আপনি তাকে যেমন অসংবেদী ব্যাখ্যা করেন এবং সময়ে এমনকি আপনি আঘাত করতে পারেন। তবে, তার হৃদয়ের গভীরে আগে যাকে তিনি ভালবাসতেন তার থেকে আঘাত পান। তিনি বেশ লাভজনক হয় এবং সাবধানতার সাথে তার ব্যয় নিরীক্ষণ করেন এবং অপ্রয়োজনে ব্যয় করেন না। তিনি নিঃসন্দেহে উচ্চাভিলাষী কিন্তু তিনি কখনও তার পরিবারকে অবহেলা করেন না এবং তাদের প্রতি তার দায়িত্ব উপেক্ষা করেন না।</p><p><b>মকর রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>অনু আগরওয়াল, রীনা রায়, সালমান খান, অনিল কাপুর, জাভেদ আখতার, নানা পাটেকর</p><p><b>সাধারণত মকর রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> বাস্তববাদী, বিচক্ষণ, উচ্চাভিলাষী, সহিষ্ণু, সাবধানী<br/><b>নেতিবাচক: </b>হতাশাপূর্ণ, অদৃষ্টবাদী, কৃপণ, অনিচ্ছাপূর্বক দান</p><p><b>মকর চাঁদ চিহ্নের সামঞ্জস্য: </b>বৃষরাশি, কন্যারাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>কুম্ভ (কুম্ভরাশি) পুরুষ অত্যন্ত স্বাধীন, বুদ্ধিমান এবং একই সময় একটি স্বপ্নদর্শী হন। তিনি মেজাজি, অনির্দেশ্য এবং সহজে বোঝা কঠিন। তিনি সমাজ দ্বারা ত্যাগ করা আদর্শ অনুসরণ করেন না কিন্তু তার নিজের সাজানো নিয়ম দ্বারা বাস করবেন। তিনি অন্য লোকের জীবনে হস্তক্ষেপ করবেন না এবং অন্যদের থেকে একই আশা করবেন, কারণ তিনি তার নিজের শর্তের ওপর জীবন্ত জীবন পছন্দ করবেন। কখনও কখনও বিচ্যুত এবং দূরবর্তী, তিনি অসংবেদী হিসাবে অতিক্রম করতে পারেন কিন্তু এটি সত্য নয়, তিনি সতর্ক থাকেন। তিনি শব্দের প্রতি অর্থে সমতা বিশ্বাস করেন এবং সবাই ন্যায্য একইরূপে। একদিন স্বপ্নদর্শী, তিনি প্রায়ই নির্লিপ্ত কিন্তু প্রদর্শিত এবং অনমনস্ক কিন্তু তারা অনেক বর্তমান এবং এছাড়াও পর্যবেক্ষণশীল হন। তিনি বিশ্ব কি বলছে সে সম্পর্কে খুব সামান্য সতর্ক থাকেন এবং তাই তার কাছে পাগলামোর জিনিস আশা করেন এবং আপনি মজায় ভরা দুঃসাহসিক কর্মে নিযুক্ত থাকেন।</p><p><b>কুম্ভ রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ঊর্মিলা মাতন্ডকর, প্রীতি জিন্তা, ওয়াহিদা রেহমান, সুভাষ ঘাই</p><p><b>সাধারণত কুম্ভ রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> বন্ধুত্বপূর্ণ, মানবিক, আসল, উদ্ভাবক, স্বাধীন, বুদ্ধিজীবী<br/><b>নেতিবাচক: </b>   ন্যায়ভ্রষ্ট, আবেগবর্জিত, বিচ্ছিন্ন, অনির্দেশ্য</p><p><b>কুম্ভ চাঁদ চিহ্নের সামঞ্জস্য: </b> মিথুন এবং তুলারাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>মীন (মীন  রাশি) পুরুষ সত্যিই প্রতিভাবান ও সৃজনশীল হন। তিনি অতিপ্রাকৃত বিজ্ঞানের দিকে একটি প্রাকৃতিক বাঁক থাকে এবং সহজেই পরিবর্তনে মানিয়ে নেবে। তিনি জীবনের একটি স্বাভাবিক স্তর হিসাবে পরিবর্তন সূচিত হয় এবং এই পদ্ধতি তাকে নমনীয় করে তোলে এবং সহজে প্রায় সবার সাথে যায়। তিনি সংবেদনশীল এবং প্রায়ই আত্ম অন্ধকারাচ্ছন্ন হন। তিনি সবকিছু করতে একটি আশাবাদী মনোভাব থাকে। কল্পনা তার সাফল্যের চাবিকাঠি হিসেবে পতিত হয়, এবং এটি সম্পূর্ণই তিনি কিভাবে এটা ব্যবহার করবেন তার উপর নির্ভর করে। এছাড়াও তিনি সময়ে খুব মেজাজি এবং সাধারণত মেজাজ দোলায়মানের সাথে বা কোনো কারণ ছাড়াই প্রবণ হবেন। তিনি খুব দাবিদার, এবং একই সময়ে খুব বুঝতে পারেন। তিনি কিছু করতে ঘৃণা করবেন যেটা জোর করে করতে বলা হবে এবং যেটা তিনি চান সেটা ভালোবেসে করবেন। তিনি কোন সময়ে একজন ব্যক্তির মানসিকতা বোঝেন সেই হিসাবে একজন সত্যিই অশ্বারোহণের জন্য তাকে গ্রহণ করতে পারেন না।</p><p><b>মীন রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>প্রীতি জিন্তা, চেলসিয়া ক্লিনটন, আলবার্ট আইনস্টাইন, মাইকেল অ্যাংলো</p><p><b>সাধারণত মীন রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা:</b><br/><b>ইতিবাচক: </b> কল্পনাপ্রবণ, সংবেদনশীল, দয়াশীল, নিঃস্বার্থ সহানুভূতিশীল<br/><b>নেতিবাচক: </b>পলায়নী প্রবৃত্তিপূর্ণ, আদর্শবাদী, গোপনীয়তা, দুর্বল-ইচ্ছুক</p><p><b>মীন চাঁদের চিহ্নের সামঞ্জস্য:</b> বৃষ রাশি, মিথুন রাশি, কন্যারাশি, ধনু রাশি, মকর রাশি, মীনরাশি</p>
ASTRO_SKETCH_DATA_FEMALE = <p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে একটি সংক্ষিপ্ত প্রোফাইল)<br/>মেষটি (মেষ রাশি) মহিলা একটি জন্মগত নেতা হন, কোন কিছু শুরু করতে তিনিই প্রথম। তিনি বেঁচে থাকতে পারেন এমনকি কঠিন পরিস্থিতিতেও এবং সবচেয়ে ভয়ানক বিয়োগান্তককেও অতিক্রম করতে পারেন। তিনি স্বাধীন, ভাবনাহীন ও সাহসী হন। তিনি আক্রমনাত্মক, আশাবাদ পূর্ণ এবং ভবিষ্যতে বসবাস করেন। তিনি স্তাবকতা পছন্দ করেন না ; তিনি পরিবর্তে আন্তরিক প্রশংসা ভালবাসেন। তিনি সন্দেহবাতিককে ঘৃণা করেন, সম্বন্ধসূচক হন কিন্তু তিনি অধিকার করতে পছন্দ করেন না। প্রকৃতি দ্বারা তিনি অত্যন্ত দয়ালু, কোমল, বিশ্বস্ত এবং অনুগত হন। সর্বোচ্চ সম্ভাবনা হল বিয়ের পর তার কর্মজীবন চলতে থাকবে। তিনি চ্যালেঞ্জ ভালবাসেন এবং অলৌকিকে বিশ্বাস করেন। যেহেতু তিনি কখনও অতীতে বসবাস করেন না, তিনি সম্ভবত একই ভুল করেন এবং আবার করেন।</p><p><b>কিছু বিখ্যাত ব্যক্তি মেষ রাশির সঙ্গে জন্ম নেন: </b><br />জয়াপ্রদা, মমতা কুলকর্নি, রানী মুখার্জি, জিতেন্দ্র </p><p><b>সাধারণত মেষ রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br /><b>ইতিবাচক: </b>দুঃসাহসিক, উদ্যমী, সাহসী, গতিশীল এবং দ্রুত উপস্থিতবুদ্ধিসম্পন্ন <br /><b>নেতিবাচক:  </b>স্বার্থপর, দ্রুত বদমেজাজি, আবেগপ্রবণ এবং অধীর </p><p><b>মেষ চাঁদ চিহ্ন সামঞ্জস্য: </b>মিথুন, সিংহ, ধনু, এবং কুম্ভরাশি </p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>বৃষভ (বৃষ রাশি) মহিলা একটি মনোহর এবং আকর্ষক ব্যক্তিত্বের সঙ্গে সুখী হয়। তার চুম্বকীয় ব্যক্তিত্বের দরুন, তিনি ভিড়ের মধ্যে মনোযোগের কেন্দ্রস্থল হবেন। তার যোগাযোগের একটি বন্ধুত্বপূর্ণ, সুন্দর এবং চমত্কার উপায় থাকে। তিনি তাদের চেহারা সম্পর্কে খুব সতর্কতা অবলম্বন করেন এবং সহজে ওজন বজায় রাখার একটা প্রবণতা থাকতে পারে। তিনি সাধারণত প্রকৃতি দ্বারা খুব শান্ত এবং আসলে অকাতরে কঠিন পরিস্থিতিতে সব ব্যবস্থা করতে সক্ষম। তার দৃঢ় ইচ্ছাশক্তির জন্য প্রশংসিত তিনি প্রায়ই নৈতিক ও মানসিক সাহস দেখান। তিনি সত্যিই নির্ভরযোগ্য ও বিশ্বস্ত হন। তিনি তাদের জিনিসপত্র সম্পর্কে খুব সম্বন্ধসূচক হবেন, জীবনে সহজ উপায়ে বেঁচে থাকার একটা প্রবণতা থাকবে এবং কিছুটা একগুঁয়ে হবেন।</p><p><b>কিছু বিখ্যাত ব্যক্তি জন্মান বৃষভ রাশির সঙ্গে: </b><br />অঞ্জলি জঠর,মাধুরী দীক্ষিত,মৌসুমি চ্যাটার্জী,পূজা বেদি</p><p><b>সাধারণত বৃষভ রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br /><b>ইতিবাচক: </b>সহিষ্ণু, নির্ভরযোগ্য, অকপট, জেদি, প্রশান্ত<br/><b>নেতিবাচক:  </b>হিংসুটে, সম্বন্ধসূচক, অনমনীয়, স্ব প্রশয়দাতা</p><p><b>বৃষভ চাঁদ চিহ্ন সামঞ্জস্য: </b>কর্কট রাশি, কন্যারাশি, মকর রাশি, মীনরাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>মিথুন(মিথুন রাশি) মহিলা খুব জীবন্ত ও মনোহর এবং একটি চমৎকার আলাপচারী হন। তিনি সক্রিয় হবেন মানসিক এবং শারীরিকভাবে চেহারা তিনি সত্যিই যা তার থেকে অনেক কম বয়সি মনে হবে। তিনি বিশ্রামহীন, সহজে উদাস এবং দীর্ঘায়িত সময়সীমার জন্য কোন এক জিনিস মনোযোগ দিয়ে করতে অক্ষম হবেন। তার একটি অনুপম কৌতূহল থাকবে। নিচের দিকে তিনি চিরতরে তার মন পরিবর্তন করবেন যা তাকে কুখ্যাতিপূর্ণভাবে অনির্ভরযোগ্য করে তুলবে। তিনি তার নিজের উদ্দেশ্যে অন্যদের নিপূণভাবে পরিবেশন করার একটা প্রবণতা থাকবে। যদিও তার scintillating উপস্থিতির সৌজন্যে তিনি আকর্ষণের কেন্দ্র হবেন। তিনি তার অধিকাংশ সিদ্ধান্ত মন থেকে নেবেন হৃদয় থেকে নয় এবং যেকোনো বুদ্ধিজীবী তার দ্বারা ব্যাপকভাবে মূল্যায়িত হবেন।</p><p><b>মিথুন রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ডিম্পল কাপাডিয়া, মিঠুন চক্রবর্তী, পরেশ রাওয়াল, রাজেশ রোশন</p><p><b>সাধারণত মিথুন রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> অভিযোজ্য, বহুমুখী, বিদগ্ধ, তেজী, জীবন্ত<br/><b>নেতিবাচক:  </b>  স্নায়বিক, ভাসা ভাসা, ধূর্ত, অসঙ্গত</p><p><b>মিথুন চাঁদ চিহ্ন সামঞ্জস্য: </b> মেষ রাশি, সিংহ রাশি, তুলারাশি , কুম্ভরাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>কর্ক (কর্কট রাশি) মহিলা প্রকৃতিতে অতি সংবেদনশীল এবং সেইজন্য খুব আঘাত পান। সাধারণভাবে, তিনি কল্পনাপ্রিয় হন এবং ভালোবাসার জন্য অনবরত পুনঃআশ্বাস প্রয়োজন ও তিনি চানও। তার মনোযোগ প্রয়োজন, মেজাজি হন, খুব যত্নশীল, তার আবেগময় প্রকৃতি থেকে যে বৈশিষ্ট্যগুলো পাওয়া যায়।  তিনি কোমল, নারীসুলভ, ভীরু ও বিনয়ী হবেন। তিনি সমালোচনা পছন্দ করেন না, প্রত্যাখ্যান সহ্য করতে পারেন না এবং গভীরভাবে কঠোর শব্দ দ্বারা আঘাত পান এবং সতর্কতার সাথে পরিচালনা করা প্রয়োজন। তার সর্বশ্রেষ্ঠ আকর্ষণ প্রতিটি সম্পর্কের প্রতি তার চরম আনুগত্য তিনি যার মধ্যে পান। তিনি তার উষ্ণ এবং সমৃদ্ধ মেজাজের সাথে সন্তুষ্ট থাকেন। তিনি একটি বড় রাঁধুনি, হয় তিনি খুব কৃপণ, কিংবা একেবারে অপব্যয়ী হন। তিনি তার ভালবাসা, স্নেহ ও যত্নের সঙ্গে তার ঘনিষ্ঠদের বেশী লাই দিতে ভালবাসেন। তিনি অনির্দেশ্য প্রদর্শিত হতে পারেন কারণ তার মেজাজ দোলায়মান কিন্তু তখন আশ্বস্ত করেন যে তিনি খামখেয়ালী মনের হন না এবং তিনি অন্য কাউকে আঘাত করবেন ভাবেন না।</p><p><b>কর্ক রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>প্রিয়ঙ্কা চোপড়া, জুলিয়া রবার্টস, টম ক্রুজ, প্রিন্সেস ডায়ানা, পামেলা অ্যান্ডারসন</p><p><b>>সাধারণত কর্ক রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b>আবেগপ্রবণ, প্রেমময়, স্বজ্ঞাত, কল্পনাপ্রবণ, বিচক্ষণ, সতর্ক, প্রতিরক্ষামূলক, সহানুভূতিশীল<br/><b>নেতিবাচক:  </b>পরিবর্তনশীল, খামখেয়ালি, অতিরিক্ত আবেগপ্রবণ, অভিমানী, সংলগ্ন</p><p><b>কর্ক চাঁদ চিহ্ন সামঞ্জস্য: </b>মেষ রাশি, বৃষ রাশি, কর্কট রাশি, কন্যা রাশি, তুলা রাশি, মকর রাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>সিংহ (সিংহ) মহিলা খুব ভাবপ্রবণ এবং সম্বন্ধসূচক হন। তিনি খুব বিনীত এবং তার চারপাশের মানুষের সঙ্গে শান্ত হন। তিনি খেলাধুলায় আনন্দ পেতে পারেন, ক্রীড়াবিদ হতে পারেন, জীবনের চেয়ে বড় জিনিস রয়েছে যার দ্বারা কিছুটা অগভীর এবং মুগ্ধ হতে পারেন। তার কিছু এবং সব নেতৃস্থানীয় জন্য একটি বিচক্ষণতা থাকে এবং এটি সময়ে তার কর্তৃত্বপ্রি়য় করে তোলে। নেতৃত্ব তার স্বাভাবিকভাবেই আসে এবং তিনি তার সঙ্গী দ্বারা প্রভাবিত হওয়া ঘৃণা করেন। তিনি তার মেজাজের কারনে জনপ্রিয় হন না। যদি তিনি অপমানিত হন তবে তিনি অগ্নিশর্মা হন। তিনি সমালোচনা করা পছন্দ করেন না, উপেক্ষা বা অমান্য করা হলে। তার বিপুল অহং থাকে যেটা তাকে অনমনীয় ও অকার্যকর করে তোলে। তিনি সবাইকে তার beck and call হতে আশা করেন। আর্থিক এলাকায়, তিনি একটি বড় অপব্যায়ী হতে পারেন, স্তাবকতা দ্বারা আসক্ত হতে পারেন। তিনি অতিরিক্ত প্রশয় দিয়ে ভালবাসেন। তিনি তার সমস্ত অতিথিদের কাছে একটি নিখুঁত অতিথিসেবিকা, মনোহর হন। তিনি কমই তার সংবেদনশীল পার্শ্ব প্রদর্শন করেন এবং উচ্ছ্বাসহীন হিসাবে সম্মুখীন হন।</p><p><b>সিংহ রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>মনীষা কৈরালা, কাজল, রাখী, মনোজ কুমার, গুলজার</p><p><b>সাধারণত সিংহ রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> কূটনৈতিক, কল্পনাপ্রিয়, মনোহর, চিন্তাভাবনাহীন, আদর্শবাদী<br/><b>নেতিবাচক:  </b> অনিশ্চিত, পরিবর্তনশীল এবং অতিসরল</p><p><b>সিংহ চাঁদ চিহ্ন সামঞ্জস্য: </b>কর্কট রাশি, মীনরাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে একটি সংক্ষিপ্ত প্রোফাইল)<br/>কন্যা (কন্যা রাশি) মহিলা একজন নিখুঁত মানুষ এবং প্রতিটি কাজ সম্পর্কে চিন্তিত থাকেন, টুকিটাকি কাজ এবং বিশদ চিন্তা করতে থাকেন, বিশেষত যদি তিনি দায়িত্বপ্রাপ্ত হন। তিনি যুক্তিসম্মত এবং বিশ্লেষিত হন এবং প্রায়ই সবসময় সঠিক হন না। তিনি অভদ্র আচরণ প্রশংসা করেন না, ভ্রান্ত ভাষা ব্যবহার করেন, জীর্ণ দেখতে বা এমনকি স্নেহের একটি প্রকাশ্য দেখা থাকে। আপনি খুঁজে পেতে পারেন সবচেয়ে ভাল আচরণবিশিষ্ট এবং down-to-earth মানুষ। অন্য গুণগুলি হল যে তার লাবণ্য শক্তিশালী বৌদ্ধিক ক্ষমতা, একটি অত্যন্ত বিশ্লেষণাত্মক মন এবং চমৎকার স্মৃতি থাকে। একটি মূলদ ভাবুক হয়ে, তিনি অন্যদের বিরোধ প্রতিষ্ঠাপনের জন্য একটি আরামের সঙ্গে ভাল অংশীদার হতে পারেন। তিনি বেশ সক্রিয় এবং স্বাস্থ্য সচেতন, মনোহর, বিদগ্ধ, বাস্তবসম্মত, সৎ, সংগঠিত, নিবেদিত, সহায়ক, মৃদু হিসাবে বর্ণনা করা যায়। যদিও তার অট্ট মেজাজ উদ্বেগের একটি কারণ হতে পারে।</p><p><b>কন্যা রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>আশা ভোঁশলে, রাকেশ রোশন, অগাথা ক্রিস্টি, রানী এলিজাবেথ, জোসেফ কেনেডি</p><p><b>সাধারণত কন্যা রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b>   শালীন, অতিসতর্ক, নির্ভরযোগ্য, বাস্তব পরিশ্রমী<br/><b>নেতিবাচক:  </b>   ব্যস্তবাগীশ, অতি সমালোচনামূলক, কঠোর, রক্ষণশীল</p><p><b>কন্যা চাঁদ চিহ্ন সামঞ্জস্য: </b>বৃষ রাশি, মকর রাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে একটি সংক্ষিপ্ত প্রোফাইল)<br/>তুলা (তুলারাশি) মহিলা তার অস্তিত্বের মধ্যে সম্পূর্ণ কল্পনাপ্রিয়। তিনি ভালোবাসবেন, লালন করবেন এবং তার মানুষের প্রতি সম্মান জানাবেন। তিনি সানন্দে একটি যোগ্য ব্যক্তিকে তার আয়ত্তে করার অনুমতি দেবেন। তিনি প্রকৃতি দ্বারা সন্দেহজনক নন এবং মানুষের গোপনীয়তা নষ্ট করার চেষ্টা করবেন না। তিনি তার স্বাধীনতা ভালবাসেন এবং অন্যদেরও স্থান দেন। তার বিশেষ করে দামী জিনিসের ওপর উদ্যম থাকতে পারে; পারফিউম, চটকদার কাপড় এবং ধ্রুপদী সঙ্গীত। তিনি পরাজয় গ্রহণ করতে ইচ্ছুক যদি আপনি আপনার যুক্তি দিয়ে তাকে বোঝাতে পারেন। তিনি অত্যন্ত বাচাল, অত্যন্ত মেধা এবং বুদ্ধিমান কথোপকথন ভালবাসেন। তার dimpled হাসি এবং আনন্দদায়ক আচরণ এক মিলিয়ন heats চুরি করতে পারে। তিনি সামাজিকীকরণ ভালবাসেন এবং একটি মহান বন্ধুর প্রয়োজন। তবে তার একটি সিদ্ধান্ত গ্রহণে অনেক সময় লাগে। সময়ে তিনি তার আদর্শের সঙ্গে জলে যেতে পারেন এবং পরিষ্কার হওয়া প্রয়োজন এবং এটি মানুষের পক্ষে অস্বস্তিকর হতে পারে।</p><p><b>তুলারাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ক্যাট উইন্সলেট, রেখা, কারিনা কাপুর, লতা মঙ্গেশকর, অমিতাভ বচ্চন, মহাত্মা গান্ধী</p><p><b>সাধারণত তুলারাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b>কূটনৈতিক, কল্পনাপ্রিয়, মনোহর, চিন্তাভাবনাহীন, আদর্শবাদী<br/><b>নেতিবাচক:  </b> অনিশ্চিত, পরিবর্তনশীল এবং অতিসরল</p><p><b>তুলা চাঁদ চিহ্ন সামঞ্জস্য: </b>মেষ রাশি, কর্কট রাশি, সিংহ রাশি, ধনু রাশি, মকর রাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>বৃশ্চিক (বৃশ্চিক রাশি) মহিলা উত্সাহী, অত্যন্ত গোপনীয়, সূক্ষ্ম এবং শক্তিশালী হন। তিনি স্বজ্ঞাত, আবেগপ্রবণ এবং আত্মবিশ্বাসী ব্যক্তিত্বের সঙ্গে সুখী হন যা তাঁকে অনিবার্য করে তোলে। তিনি উন্মোচন গোপনীয়তা ভালবাসেন এবং একটি অনায়াস শিল্পের সঙ্গে তার প্রকাশক ছাড়া আপনার গভীরতম গোপনীয়তা স্পষ্ট হবে। অসীম কামনা, মেজাজি, শান্ত এবং সমতা, তিনি ভাসা ভাসা এবং অগভীর কিছুর মধ্যে অনাগ্রহী হবেন। তিনি একজন দক্ষ যোগাযোগকারী এবং শৈল্পিকভাবে অন্যদের সঙ্গে সম্পর্কযুক্ত হতে পারেন, যা তাঁকে বন্ধু এবং পরিবারের মধ্যে জনপ্রিয় করে তোলে। সময়ে তার ভয়ের আবেগের তীব্রতা তাকে সত্যিই একটি সম্পর্কের দাবিতে প্রদর্শিত করতে পারে; তবে তার প্রেমে আসক্তি হতে পারে। তার জৈবিক শক্তি থাকে যেটা প্রলুব্ধ এবং বিশ্বাস জাগিয়ে প্রতারণা করে এবং তার মেজাজ সময়ে বিস্ফোরক হতে পারে। তার সংবেদনশীল প্রকৃতি যেহেতু একটি দ্বৈত নিরাপদ্ তলোয়ার হিসাবে কাজ করতে পারে; তার অনুভব ও দ্রুত আঘাত পাওয়ার জন্য এটা খুব স্বাভাবিক হয়।<p><b>বৃশ্চিক রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ঐশ্বর্য রাই, ইন্দিরা গান্ধী, জওহরলাল নেহেরু, শাহরুখ খান, বিল গেটস, ব্রায়ান অ্যাডামস, ডেমি মুর</p><p><b>সাধারণত বৃশ্চিক রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক:</b>আবেগময়, তীব্র, মহৎ, সংবেদনশীল, স্বজ্ঞাত, ভোগবিলাসী, রহস্যময়, আবেগপ্রবণ<br/><b>নেতিবাচক: </b>  কুচুটে, বিরক্ত, অমোঘ, অত্যধিক, গোপনীয়, একগুঁয়ে</p><p><b>বৃশ্চিক চাঁদ চিহ্নের সামঞ্জস্য: </b>কর্কটরাশি এবং মীনরাশি। </p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>ধনু (ধনু রাশি) মহিলার বিচক্ষণতা এবং তার স্পষ্টতার অভাব রয়েছে, সামনের বিবৃতিতে আপনি তার থেকে দূরে যাওয়ার মত অনুভব করতে পারেন। তিনি সুন্দর, বন্ধুত্বপূর্ণ, স্পষ্টভাষী এবং খুব বাচাল হন। তার forthrightness তাকে ব্যবহারিক পৃথিবীতে বাস করার যোগ্য করে তোলে। তিনি খুবই আশাবাদী, কিন্তু তিনি অযৌক্তিক নন। তিনি ঘটনা অনুযায়ী সমগ্র পরিস্থিতি বিচার করেন, তার সম্ভাব্য ফলাফল বিশ্লেষণ করেন এবং এখনও জিনিস ভালোর জন্য পরিবর্তন হবে বিশ্বাস করেন। সাধারণত, তিনি খুব শান্ত এবং স্থিরীকৃত হন। তবে, যখন আপনি তার প্রতি অভদ্র হন বা অসন্তুষ্ট হন, তখন তিনি তা ফেরত দেন। তিনি হন স্বাধীন এবং তার স্বাধীনতা ভালবাসেন। তিনি পরিবারের সাথে সংযুক্ত, কিন্তু খুব বেশী না। তার বোকামোর জন্য সময়ে প্রচন্ডভাবে তার খরচ হতে পারে, এমনকি সম্পর্কের শেষ বিন্দু পর্যন্ত। তিনি কখনও একটি ভণ্ড হবেন না যদিও তার সততা ও বেহায়াপনা আরও নেতিবাচক মতামত যোগ করে। হৃদয়ে তিনি আঘাতপ্রবন এবং অসহায় হন।</p><p><b>ধনু রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ধর্মেন্দ্র, শত্রুঘ্ন সিনহা, দিলীপ কুমার, উইনস্টন চার্চিল</p><p><b>সাধারণত ধনু রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> আশাবাদী, প্রফুল্ল, আত্ম রসবোধ, সৎ, দার্শনিক<br/><b>নেতিবাচক: </b> উদ্বেগহীন, অন্ধভাবে আশাবাদী, কৌশলহীন, বিশ্রামহীন</p><p><b>ধনু চাঁদ চিহ্নের সামঞ্জস্য: </b>কর্কটরাশি, মীনরাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>মকর (মকর রাশি) মহিলা ​​একটি শালীন ব্যক্তি যিনি প্রারম্ভে খুব সহজে কাছে আসতে পারেন না। তিনি তার হাবভাবের মধ্যে বরং সতর্ক হন। একটি মহান সাহচর্য্য অংশীদারির সঙ্গে তার কয়েকটি কিন্তু ঘনিষ্ঠ বন্ধু থাকতে পারে। তিনি খুব বাচাল বলে মনে হয় না এবং যখন প্রয়োজন তখন শুধুমাত্র কথা বলবেন, অন্যের ওপর এক হাত শান্তভাবে সত্যিই বিদগ্ধ হতে পারেন। তার ঘন মেজাজ দোলায়মান এবং তার ভালবাসা ও আবেগের সব প্রদর্শন একদা তিনি আপনার সাথে নিরাপদ মনে করেন। তিনি উদ্ধত, তার অর্থ সম্পর্কে বেশ সতর্ক, দৈনিক ব্যয়ের দিকে তার পদ্ধতির মধ্যে বেশ লাভজনক হয়। যদিও কর্মজীবন সংস্কারমুক্ত তিনি তার পরিবারের ভাল যত্ন নেবেন এবং একটি চমৎকার গৃহকর্ত্রী হবে।</p><p><b>মকর রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>অনু আগরওয়াল, রীনা রায়, সালমান খান, অনিল কাপুর, জাভেদ আখতার, নানা পাটেকর</p><p><b>সাধারণত মকর রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> বাস্তববাদী, বিচক্ষণ, উচ্চাভিলাষী, সহিষ্ণু, সাবধানী<br/><b>নেতিবাচক: </b>হতাশাপূর্ণ, অদৃষ্টবাদী, কৃপণ, অনিচ্ছাপূর্বক দান</p><p><b>মকর চাঁদ চিহ্নের সামঞ্জস্য: </b>বৃষরাশি, কন্যারাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>কুম্ভ (কুম্ভরাশি) মহিলা স্বাধীনতা প্রেমী এবং অত্যন্ত ব্যক্তিতাবাদী, বুদ্ধিমান এবং স্বপ্নমাখা হন। তিনি তার আচরণ মধ্যে খুব অনির্দেশ্য হন, অন্যদের প্রায়ই একটি গোপন করেন। তিনি একজন সাধারণ ব্যক্তির বোঝার পরেও জীবনযাত্রার ধরনের উপায় অবলম্বন করতে পারেন। তিনি তার নিজের পদের জীবন যাপন করবেন এবং কোন ধরনের হস্তক্ষেপ করবেন না। তিনি তার পদ্ধতির মধ্যে মানবিক হন তবুও যখন এটি তার ব্যক্তিগত সম্পর্কের মধ্যে আসে তখন তিনি বেশ দূরবর্তী এবং বিচ্ছিন্ন হতে পারেন। আপনার একটু ঠান্ডা এবং অবশ হিসাবে তার চিন্তা হতে পারে কিন্তু এটি সত্য নয়। আপনি তার নিজস্ব জগতে তাকে দেখবেন, প্রায়ই নির্লিপ্ত ও অন্যমনস্ক বলে মনে হয়, এটা কোন ভাবেই তাঁকে অমনোযোগী প্রমান করে না। সময়ে তিনি একটি জিনিস বা একজন ব্যক্তি সম্পর্কে সূক্ষ্মতম বিবরন বলতে পারেন, যেটি অন্য সবাই বাদ দিতে পারেন। স্বাধীনতার জন্য তার প্রেমে তিনি কিছু পাগলামো জিনিস করতে পারেন এবং আপনি নিজেকে সুখী রাখতে তাকে অপরিমেয় স্থান দেবার প্রয়োজন রয়েছে।</p><p><b>কুম্ভ রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>ঊর্মিলা মাতন্ডকর, প্রীতি জিন্তা, ওয়াহিদা রেহমান, সুভাষ ঘাই</p><p><b>সাধারণত কুম্ভ রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা: </b><br/><b>ইতিবাচক: </b> বন্ধুত্বপূর্ণ, মানবিক, আসল, উদ্ভাবক, স্বাধীন, বুদ্ধিজীবী<br/><b>নেতিবাচক: </b>   ন্যায়ভ্রষ্ট, আবেগবর্জিত, বিচ্ছিন্ন, অনির্দেশ্য</p><p><b>কুম্ভ চাঁদ চিহ্নের সামঞ্জস্য: </b> মিথুন এবং তুলারাশি</p>#<p><b>অ্যাস্ট্র স্কেচ: </b>(জন্ম তথ্যের উপর ভিত্তি করে সংক্ষিপ্ত প্রোফাইল)<br/>মীন (মীন  রাশি) মহিলা গভীর এবং রহস্যময় হন এবং তাকে বুঝাতে একটি কঠিন কাজ করতে হবে। তিনি মনোরম মেয়েলি এবং অবিশ্বাস্যভাবে সুন্দর, নরম এবং খুব নারীসুলভ হন। তিনি খুব ভাবপ্রবণ এবং প্রায়ই তার নিজের জগতে যেটি তাকে একটি স্বপ্নদর্শীর একটি অংশ করে তোলে। মানুষ আরাম বোধ করেন শুধু তার সংস্থার হিসাবে অনুগ্রহপূর্বক কোনো পরিস্থিতি নিয়ন্ত্রন করতে পারেন। তিনি প্রকৃতি দ্বারা লাজুক, তার প্রয়োজন কাউকে রক্ষা করা এবং তাঁকে ভালবাসা হিসাবে তিনি কখনও আক্রমনাত্মক হন না। কখনও কখনও তিনি খুব দৃঢ় ভাবে জড়িয়ে থাকতে পারেন। তাকে ক্রমাগত অনেক প্রশয় দেওয়া প্রয়োজন। কিছুটা কূট, তিনি সম্পূর্ণরূপে খোলেন না এবং এই সময় বিরক্তিকর হতে পারে। যদিও সত্যিই প্রতিভাবান তার উচ্চাকাঙ্ক্ষার অভাব হবে, অনির্দেশ্য এবং মেজাজ দোলায়মান থাকবে।</p><p><b>মীন রাশির সঙ্গে জন্ম কিছু বিখ্যাত ব্যক্তি: </b><br/>প্রীতি জিন্তা, চেলসিয়া ক্লিনটন, আলবার্ট আইনস্টাইন, মাইকেল অ্যাংলো</p><p><b>সাধারণত মীন রাশির সঙ্গে মানুষের বৈশিষ্ট্য স্থাপন করা:</b><br/><b>ইতিবাচক: </b> কল্পনাপ্রবণ, সংবেদনশীল, দয়াশীল, নিঃস্বার্থ সহানুভূতিশীল<br/><b>নেতিবাচক: </b>পলায়নী প্রবৃত্তিপূর্ণ, আদর্শবাদী, গোপনীয়তা, দুর্বল-ইচ্ছুক</p><p><b>মীন চাঁদের চিহ্নের সামঞ্জস্য:</b> বৃষ রাশি, মিথুন রাশি, কন্যারাশি, ধনু রাশি, মকর রাশি, মীনরাশি</p>
