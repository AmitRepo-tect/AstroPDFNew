

	 WHAT_IS_ASCENDANT				= लग्न क्या है?
	 ASCENDANT_PREDICTION			= वैदिक ज्योतिष में लग्न का बहुत महत्वपूर्ण स्थान है। बालक के जन्म के समय में जो राशि पूर्वीय क्षितिज पर उदित होती है। वह राशि लग्न राशि कहलाती है। तथा यह राशि जिस भाव में पड़ती है। वह भाव लग्न भाव कहलाता है। लग्न ज्योतिष से एक व्यक्ति के जीवन की सूक्ष्मतम घटनाओं का अध्ययन करने में सहायता मिलती है। जबकि दैनिक, साप्ताहिक, मासिक और वार्षिक भविष्वाणियां चन्द्र राशि और सूर्य राशि पर आधारित होती है।
	 YOUR_ASCENDANT_IS				= आपका लग्न  है:
