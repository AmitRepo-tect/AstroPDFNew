	DYNAMIC_TEMP_PERSONALITY_PRED		= @@signname$ लग्न  के लिए स्वभाव व व्यक्तित्व
	DYNAMIC_PHYSICAL_APPEARANCE_PRED   =  @@signname$ लग्न  के लिए शारीरिक रूप-रंग
