

	 WHAT_IS_NAKSHATRA							= नक्षत्र म्हणजे काय?
	 NAKSHATRA_INTRO							= हिंदू ज्योतीश्शास्त्रामध्ये चंद्र नक्षत्रास 'नक्षत्र' असे म्हणतात. अयान्वृत्तावरील २७ (कधी कधी २८) क्षेत्रातील प्रत्येक क्षेत्रास नक्षत्र मानले जाते. त्यांची नावे आपापल्या क्षेत्रातील प्रमुख  तारापुंज चिन्हाशी निगडीत असतात. नक्षत्रांची सुरुवात अयान्वृत्तावारीन स्पिका नामक ताऱ्याच्या (जिला संस्कृत मध्ये चित्रा म्हणतात) बरोबर विमुख टोकापासून होते. (ह्याची इतर वेगळी व्याख्या देखील सापडू शकते). याला 'मेषाची सुरुवात' अथवा 'मेषादि' म्हणतात. ह्या टोकापासून अयान्वृत्त पूर्वेकडे नक्षत्रांमध्ये विभागले जाते. नक्षत्रांची संख्या नाक्षत्रिक मासाच्या दिवसांशी जुळते (आधुनिक माप - २७.३२ दिवस) - नक्षत्राची रुंदी चंद्र साधारण एका दिवसात ओलांडतो. प्रत्येक नक्षत्र चातुर्थांशामध्ये (किंवा पदांमध्ये) परत विभागले जाते. ही पदे हिंदू लोकप्रिय ज्योतीष्यामध्ये प्रमुख भूमिका गाजवतात - प्रत्येक पद एका अक्षराशी जुळलेले असते. चंद्र त्या पदात असताना जन्मलेल्या मुलाचे नाव या अक्षरापासून सुरु होते.
	 YOUR_NAKSHATRA_PADA						= आपले नक्षत्र पद
