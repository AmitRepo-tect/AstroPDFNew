
 SERVICE_NAME_1 = ஒரே ஒரு கேள்வி அறிக்கை 
 SERVICE_DESC_1 = மனித குலத்தின் பரிணாம வளர்ச்சிக்கு கேள்விகள் அவசியம் என்று அரிஸ்டாட்டில் பிரபலமாக கூறினார்.  கேள்விகள் மனித பரிணாம வளர்ச்சிக்கு மட்டுமே முக்கியமானதாக மட்டுமில்லாமல் அவை தனிநபர்கள் வளர்ச்சிக்கும் கூட மிகவும் முக்கியம் வாய்ந்ததாக உள்ளன.ஒரு பிரச்சினை அல்லது ஆழமான குழப்பம் ஒருவரின் மனதில் எங்கோ பதுங்கி இருந்தால் மட்டுமே, அதன் காரணத்தினால் அவனின் / அவளின் வளர்ச்சி மற்றும் அனைத்து வாய்ப்புகளும் தடுக்கப்படுகின்றன. தங்களுக்கு குறிப்பிடும்படி எதைப் பற்றி கவலை? நடக்க இருக்கும் சில குறிப்பிட்ட விஷயங்களின் மீது தங்களுக்கு பயம் இருக்கிறதா? <br /><br /> ஜோதிடம் என்ற தெய்வீக அறிவியல் மூலம் தங்களுக்கு விதி என்ன செய்யக் காத்திருக்கிறது என்று தெரியப்படுத்த முடியும். இத்துடன் உங்கள் சந்தேகம் மற்றும் அச்சத்தை அழித்து, மற்றும் தொழில்,திருமணம், பணம் மற்றும் மேலும் மற்ற முழு வாழ்க்கை நிலை பற்றி உங்கள் கேள்விகளுக்கு பதில் அளிக்கிறது. இது கவலைமிக்க கேள்விகளை ஒழிக்க முக்கிய காரணமாய்த் திகழ்கிறது."

 SERVICE_NAME_7 = உடல்நிலை பற்றிய அறிக்கை
 SERVICE_DESC_7 = உடல் சுகாதாரம் உண்மையான செல்வம் என்று கூறப்படுகிறது.  தங்கள் உடல் தகுதி மற்றும் ஆரோக்கியமான சூழ்நிலை குறைவாக அமைந்திருப்பின், ஆடம்பரங்களும் மற்றும் பிற உலக சொத்துக்களும் இருந்தும் அவை மதிப்பற்றவையாகும். பழைய காலங்களில், ஜோதிடம் மற்றும் மருத்துவ அறிவியல் அதாவது ஆயுர்வேதம் இவை இரண்டும் ஒன்றுக்கொன்று முழுமையாக பின்னி இருந்தன. பண்டைய முனிவர்களுக்கு ஒருவரின் ஒட்டுமொத்த நன்மைக்கான பங்கு  எங்கு துவங்குகிறது எனத்தெரியும்.  பல முறை நோய்க்கான மருந்து மற்றும் சிகிச்சைகள் வான்கோள்களின் மூலம் ஏற்பட்ட தடைத்தன்மைகளின் காரணங்களால் பலன் அளிக்க வில்லை.இதனால், இதில் அவர்களின் தேர்ச்சிக்கு ஜோதிட ஞானத்தின் செயல் மிகவும் முக்கியமாக கருதப்பட்டது. <br /><br /> தாங்கள் எதேனும் உடல் நலம் மற்றும் உடல் தகுதி தொடர்பான பிரச்சினைகளை  எதிர்கொள்ளும் படி இருந்தால், எப்போதும் அதற்கான முன்னெச்சரிக்கை நடவடிக்கைகளை விரைவில் எடுக்க அறிவுறுத்தபடுகிறது. எங்கள் விரிவான சுகாதார அறிக்கை மூலம் தங்களுக்கு உடல் நலகுறைவு ஏற்பட என்ன காரணம் என்பதையும்  மற்றும் அந்த தீய செயல் உண்டாவதிலிருந்து ஒருவர் மீண்டு வெளிவர  என்ன ஜோதிட நடவடிக்கைகளை மேற்கொள்ள வேண்டும் என்றும் சொல்லப்படும்.

 SERVICE_NAME_14 =  தொலைபேசி மூலம் ஆலோசனை. 
 SERVICE_DESC_14 = எங்கள் அனுபவம் வாய்ந்த ஜோதிடர்களை ஆலோசனைக்காக தொலைபேசி மூலம் கூட தாங்கள் அழைக்கலாம்.   "" ஒரு நல்ல விவாதமானது செல்வம் போன்றது ""  என்று கென்யா நாட்டின் ஒரு பழைய பழமொழி கூறுகிறது.  ஒருவர் பேசும்போது அந்தபேச்சு, அவரின் வார்த்தைகள் மூலம் மட்டும் தொடர்பு கொள்ளவில்லை, ஆனால் பேசும்குரல் மற்றும் அதன் அதிர்வுகள் தொனி ஆகியவை மிக முக்கிய பங்கை வகிக்கின்றன. மேலும், ஜோதிடப் படி, எப்போது எந்த தருணத்தில் இரண்டு தனிப்பட்ட மனிதர்கள் பேச ஆரம்பிக்கிறார்களோ, அப்பொழுதே ஒரு ஜாதகரின் முக்கியமான தகவல்கள்  வெளிவருகின்றன.<br /><br />வாழ்க்கை தொடர்பான வாழ்க்கை, சுகாதாரம், தொழில், காதல் மற்றும் திருமணம் போன்ற எந்த பரிமாணத்தையும் விவாதிக்க முடியும் மற்றும் அதன் பின்னால் உள்ளடங்கிய  அந்த நிகழ்வுகளுக்கான ஜோதிட காரணங்களைத் தெரிந்து கொள்ள முடியும். வெற்றி, செழிப்பு மற்றும் மகிழ்ச்சிப் பாதைக்கு தடையாக உள்ள தடங்கலை சமாளிக்க நடைமுறையில் தேவையான மாற்று தீர்வுகள்  மூலம் சரிசெய்ய ஆலோசனை செய்ய முடியும்.  எங்கள் ஜோதிடர்கள் உங்களுக்கு உதவ தங்கள் தொலைபேசி அழைப்பை எதிர்நோக்கியுள்ளனர்.

 SERVICE_NAME_4 = தொழில் நிலை பற்றிய அறிக்கை
 SERVICE_DESC_4 = ஒரு நல்ல மற்றும் நிறைவாக அமைந்த தொழிலானது வாழ்க்கையில் ஒட்டுமொத்த வெற்றியை அடைய  மிகவும் இன்றியமையாததாக இருக்கிறது. இந்த விரிவான அறிக்கையில், எங்கள் ஜோதிட நிபுணர்கள்,  நீங்கள் எந்த தொழிலுக்கு செல்ல வேண்டும் ; வெவ்வேறு பகுதிகளில் உங்கள் வாய்ப்புக்கள் என்னவாக உள்ளன  அல்லது  நீங்கள் ஏற்கனவே வேலை செய்கிறீர்கள் என்றால் தொழிலில் நீங்கள் மேம்பட்ட நிலையை அடைய என்ன செய்ய வேண்டும், மற்றும் மேலும் முன்னேற்றம் அடைய எந்த மாதிரி  இலக்குகள் தேவை என திட்டமிட விளக்கமாக எடுத்து உரைத்திருப்பார்கள்.  இந்த விஷயங்களை சேர்த்து,   நாங்கள் எதிர்காலத்தில் உங்கள் தொழிலின் போக்கை ஆய்வு செய்து  உங்கள் வேலை அல்லது வணிகத்தில் தங்களின் முன்னேற்றத்திற்கு  இடையூறு  உண்டாக்கும் சாத்தியமான  காரணிகள் தங்களுக்கு எவ்வாறு இடையூறு செய்யலாம் என்றும்,  மேலும் இந்த சிக்கல்களை தீர்க்க பயனுள்ள ஜோதிட  பரிகார முறைகளைப் பற்றியும் ஆலோசனை கூறப்படும்.<br /><br /> இந்த விவரங்கள் அடங்கிய அறிக்கை அடுத்த பன்னிரண்டு மாதங்கள் உங்கள் வணிக அல்லது வேலையின் ஒவ்வொரு அம்சத்தையும் பற்றிய ஆழ்ந்த ஜோதிட பகுப்பாய்வு மற்றும் பரிகார ஆலோசனைகளையும் கொண்டிருக்கும்.  உங்கள் தொழில் பற்றி வரும் ஆண்டுக்கான  ஒரு விரிவான வழிகாட்டியாக அமைய இந்த அறிக்கை அமையும். பண்டைய ஜோதிட ஞானம் மூலம் உங்கள் தொழில் வளம் பெற, நம் ஜோதிட நிபுணர்களின் விரிவான தொழில் அறிக்கையை  தயார் செய்ய தேர்ந்தெடுக்கவும்.

 SERVICE_NAME_12 = நிதிநிலை பற்றிய அறிக்கை 
 SERVICE_DESC_12 = இன்றைய போட்டி மயமான உலகில், ஒரு வலுவான நிதி நிலை ஆடம்பர வாழ்வு மட்டுமல்லாது ஒவ்வொருவரின் அன்றாட உயிர்வாழ அத்தியாவசியமாக இருப்பதுடன் மேன்மேலும் வளர்ச்சி அடையவும் தேவைப்படுகிறது.  நிதி பாதுகாப்பு என்பது ஒரு தனிப்பட்ட நபரின் நன்மைக்காக மட்டும் அல்ல.  ஆனாலும் கூட அவரை / அவளைச் சார்ந்த ஒரு துணை, குழந்தைகள் மேலும் அவர்களைச் சார்ந்த குடும்பத்தினரின் நன்மைக்காகவும் வேண்டியிருக்கிறது.  நிதி நெருக்கடியானது, வளர்ச்சி வாய்ப்புக்களை மட்டும் இடையூறு செய்யாமல், மேலும் மன அமைதி, மகிழ்ச்சி மற்றும் ஸ்திரத்தன்மை ஆகியவற்றையும்  ஸ்தம்பிக்க வைக்கிறது.  நெருக்கடி' என்று எழுத சீனர்கள் பயன்படுத்திய  இரண்டு குறிப்பு முறை பற்றி ஜான் எஃப் கென்னடி ஒருமுறை பிரபலமான வார்த்தையை கூறினார்.  ஒன்று  அது ஆபத்தைக் குறிப்பிடுவது மற்றது அதன் மூலம் ஏற்படும் வாய்ப்பைப் பற்றியது. ஒரு நெருக்கடி வரும்போது  அந்த ஆபத்தைப் பற்றி கவனமாக இருக்கவேண்டும் ஆனால் அது  ஒரு வாய்ப்பின் அடையாளம் ஆகும்.""அது மிகவும் உண்மை. <br /><br />தெய்வீக ஜோதிட ஞானமானது நிதி பிரச்சனைகளுக்கு என்ன காரணம் என்று சரியாக பார்வையிட உதவுகிறது. மற்றும் அதைப் பற்றி ஆய்வு செய்ய ஒரு வாய்ப்பும் கிடைக்கிறது மேலும் கொதிப்பான இந்த இக்கட்டான சூழ்நிலையிலிருந்து வெளியேறுவதற்காக எடுக்க வேண்டிய அவசியமான மாற்று நடவடிக்கைகளையும் காட்டுகின்றன.  ஜோதிடம் என்ற அறிவியல்,  நிதி நிலை பாதிப்பு என்கிற நோயை சீர்செய்தலுக்கான அறிவுரைகளை மட்டும் வழங்காமல்,  மற்றும் உங்களுக்கு ஏற்கனவே அமைந்த நல்ல நிதி நிலைமையின்  நன்மைகளுக்காகவும் அறிவுரையை பெறலாம். தங்களுக்கு நிதி மற்றும் பொருளாதாரத் தொடர்பான கேள்வி இருந்தால், பண்டைய ஜோதிட ஞானம் மூலம் உங்கள் நிதிநிலை வளம் பெற,  நம் ஜோதிட நிபுணர்களின்  விரிவான நிதிநிலை அறிக்கையை தயார் செய்ய தேர்ந்தெடுக்கவும்.

 SERVICE_NAME_13 = ரத்தினக்கல் மற்றும் பரிகாரங்கள்  
 SERVICE_DESC_13 = ஜோதிடம் மிகவும் பயனுள்ளதாக கருதப்படுகிறது ஏனெனில் அது பிரச்சினைகளை சரியாக கண்ணோட்டத்துடன் பார்வையிட உதவுகிறது அது மட்டும் இல்லாமல் அத்துடன் பிரச்சினைகள் ஆணித்தரமாக குணமடைய நடைமுறை தீர்வுகளையும் பரிந்துரைக்கிறது. ஒருவர் ஜோதிட ஞானப்படி தீவிரமாக இந்த மாற்று நடவடிக்கைகளைப் பின்பற்றினார் என்றால், அவர் கிரகங்களினால் ஏற்படும் பாதகமான விளைவுகளை ஒழிக்கவும் மற்றும் கடினமான நேரத்திலிருந்து மிகவும் எளிதான முறையில் மீளவும் முடியும்.<br /><br />ரத்தினக் கற்கள், மிகவும் முக்கியமானவை என கணக்கிடப்படுகின்றன ஏனெனில் அவை பிரபஞ்சத்தில் உள்ள அதிக அளவு சக்தியை இழுக்கும் ஆற்றலை பெற்றவை. அவைகளை ஒழுங்காக செயல்படுத்தினால் உங்கள் பிரச்சினைகள் சீர்அடைவதற்கு உதவுகிறது  மற்றும் வாழ்வின் ஒவ்வொரு பரிமாணத்திற்கும் சக்திவாய்ந்த ஊக்கத்தை அளிக்கிறது. அதை தவறான முறையில் உபயோகப்படுத்தினால் இந்த அண்ட ஆற்றலானது மோசமான பாதிப்பை உண்டாக்கி விடும். ஆகவே நீங்கள் ஜோதிட பரிகாரம் மற்றும் ரத்தினக்கற்கள் மூலம் நிதி, காதல், திருமணம், தொழில் மற்றும் கல்வி போன்ற விஷயங்களில் நன்மை பெற விரும்பினால் எங்கள் திறமை வாய்ந்த ஜோதிடர்கள் இந்த பாதிப்பை சரியான முறையில் பரிசீலனை செய்து  இதற்கான மாற்று நடவடிக்கை மூலம் பரிகாரம் செய்வது எப்படி,  அதை நீங்கள் எப்படி அனுசரிக்க வேண்டும், என்ன ரத்தினக்கல் அணிய வேண்டும்,  எப்படி அதனால் மிக அதிக அளவில் நன்மைகளைப் பெறலாம் என்று ம் பரிந்துரைக்க முடியும்.

 SERVICE_NAME_6 = திருமணம் / காதல் பற்றிய அறிக்கை 
 SERVICE_DESC_6 = திருமணங்கள் சொர்க்கத்தில் நிச்சயிக்கப்படுகின்றன என்று கூறப்படுகிறது.  ஆனால் நீங்கள் உங்கள் வாழ்க்கையை அனுபவிக்க விரும்பும் துணை  அல்லது ஏற்கனவே உங்கள் வாழ்க்கையில் அனுபவித்துக் கொண்டிருக்கும் துணையானது  தங்களுக்காகவே  அமைந்த சிறப்பான ஒன்று என்று நிச்சயமாக கூறப்படலாமா?  அவன் அல்லது அவள் எனக்காகத்தான் விதிப்படி அமையப்பட்டுள்ளது என்று கண்டுபிடித்து  தேர்ந்தெடுக்கும் செயல் முறை உங்கள் கையில் தான் உள்ளது. அதாவது நீங்களாகவே திரு ரைட் அல்லது திருமதி ரைட் தேர்வு செய்கிறீர்களா அல்லது இல்லையா என்பதாகும். நீங்கள் சரியான துணையை தேர்வு செய்தால், வாழ்க்கையானது சாதனை மிக்கதாக அமையும்.  உங்கள் தேர்வு முறையில் தவறு இருந்தால், அது வசீகரம் மற்றும் வாழ்க்கையின் பேரார்வத்தை கூட உடைத்து எறிய முடியும்.<br /><br />ஜோதிடம் மூலம் சரியான முடிவை எடுத்துக்கூறி உங்களுக்கு உதவ முடியும். நீங்கள் ஒரு நபருடன் இணக்கமாக இருந்தால் அந்த நபருடன் தாங்கள் வாழ்க்கைப்  பயணத்தை தொடங்க  முடியுமா அல்லது இல்லையா  அதற்காக எதிர்காலம் என்ன செய்யப் போகிறது உங்கள் இரண்டு பேரையும் துணைவர்களாக எப்போது மேற்கொள்ளவேண்டும் என்பதைச் சொல்ல முடியும்.  ஒரு வேளை நீங்கள் ஏற்கனவே திருமணம் ஆகி உங்கள் திருமண வாழ்க்கையில் பிரச்சினைகளை சந்திக்கிறீர்கள் என்றால் நீங்கள் இந்த பிரச்சினை என்கிற சூடான நீரிலிருந்து வெளியேறுவதற்காக என்ன செய்ய வேண்டும் என்பதையும் சொல்ல முடியும்.

 SERVICE_NAME_5 = லால் கிதாப் பரிகார முறைகள்
 SERVICE_DESC_5 = லால் கிதாப் ஒரு விசித்திரமான  ஜோதிடநம்பிக்கையை உள்ளடக்கியாதாக உள்ளது.  இது ஜோதிடம், கைரேகை ஜோதிடம் மற்றும் வாஸ்து பற்றிய ஆழமான உட்பார்வையைக் கொண்டுள்ளது. லால் கிதாப் பண்டிட் ரூப்சந்த் ஜோஷி  என்பவர் மூலம் பழைய பேச்சுவழக்கில் இருந்த பிரதேச மொழியாகிய உருதில் எழுதப்பட்டது என்று கூறப்படுகிறது.  அது கவிதை அணுகுமுறையில் பல்வேறு வசனங்களை கொண்டுள்ளது.  லால் கிதாப்  தெளிவின்மை என்ற திரைக்குப் பின்னால் ஜோதிட ஆழத்தை வெளிப்படையான அளவில் கொண்டுள்ளது அதை அறிய மிகுந்த புத்தி கூர்மையும் மற்றும் ஜோதிடத்தை சற்று கூர்ந்து  புரிந்துகொள்ளும் திறமையும் தேவைப்படுகிறது. .<br /><br /> லால் கிதாப்பை புரிந்தவர்கள் அதில் அனைத்து உலக பிரச்சினைகளுடன் வேதனைகளும் முக்கியமாக இடம் பெற்று இருப்பதை பற்றி அறிவிக்கின்றனர். லால் கிதாப் பரிகாரம் மிகவும் சக்தி வாய்ந்த மற்றும் விரைவானதுமாக உள்ளது. இன்று மக்கள் பல்வேறு பிரச்சினைகளில் ஆக்கிரமித்து அவர்களுக்கு நேரம் இல்லாத காரணத்தினால் இது  நவீன காலத்திற்கு ஏற்கத்தக்கதுமாகும். இந்த பரிகாரமானது அச்சிளிஸின் பிரச்சினையை கண்டுபிடித்து குணப்படுத்தியதால் உங்கள் உடல், மன மற்றும் பொருளாதார பிரச்சினைகளை இதன் மூலம் விரைவில் குணப்படுத்த முடியும்.  நீங்கள் லால் கிதாப் பரிகாரத்தை பயன்படுத்தி விரைவாக உங்கள் பிரச்சினையை தீர்த்து கொள்ள விரும்பினால், எங்கள் உள்ளார்ந்த ஜோதிடர்களின் அறிவுரைகளுக்கு   அணுகவும்.

