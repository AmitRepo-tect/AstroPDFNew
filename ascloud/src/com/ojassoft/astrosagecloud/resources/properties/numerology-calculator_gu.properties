 NAMANK_TEXT = બ્રહ્માંડ દળો તમારા નામ નંબર ને ધ્યાન માં રાખી ને વ્યક્તિગત જીવન નું નિર્માણ નક્કી કરે છે. નામાંક અથવા નામ સંખ્યા તમારા સંપૂર્ણ જન્મ નામ ના બધા અક્ષરો માં થી જે પ્રાપ્ત થાય છે તે અભિવ્યક્તિ અથવા નામ નંબર કહેવાશે. આ એ સંખ્યા છે જે આ જીવન કાળ માં તમારી પ્રતિભા અને વલણ નું વર્ણન કરે છે, જો તમે તેનો વિકાસ અને ઉપયોગ કરવા નું પસંદ કરો છો. તમારું નામ તમારું સાચું કંપન છે, તે તમારા આત્મા ની અવાજ છે કારણ કે તે દરવાજા માંથી પસાર થઈ તમે આ દુનિયા માં પ્રવેશ્યા છો. \n\nતમારા નામ @@userName$ નું વિશ્લેષણ સૂચવે છે કે તમારું નામાંક અથવા નામ નંબર @@radicalNumber$ છે. ચાલો અમે તમને નામ નંબર @@radicalNumber$ ની કેટલીક મૂળભૂત લાક્ષણિકતાઓ વિશે જણાવું છુ.
 MULANK_TEXT = @@userName$, ન્યુમેરોલોજી માં તમારો સૌથી મહત્વપૂર્ણ નંબર એ છે કે તમે જે મહિને જન્મેલા તેની તારીખ છે. આ નંબર તમારા અક્ષર, વ્યક્તિત્વ અને વ્યક્તિત્વ ના મહત્વપૂર્ણ ઘટકો ને ઓળખી શકે છે. આ સંખ્યા તમારા એકંદર હોવા ના મૂળ તત્વો ને નિર્ધારિત કરે છે. તમે ઉગ્ર અથવા શરમાળ છો, કોઈ નેતા અથવા અનુયાયી છો  તે જેવી વસ્તુઓ નું. આનું કારણ એ છે કે દરેક નંબર ની પોતાની સ્વભાવ અને અંગત કંપન હોય છે. કાળજી પૂર્વક વિશ્લેષણ પછી, અમે તમારા આંકડાશાસ્ત્ર નો જન્મ નંબર નીચે પ્રમાણે કાર્ય કર્યો છે: તમારો મૂલાંક @@radicalNumber$ છે.
 DESTINY_TEXT1 = તમે મહાન નેતૃત્વ કુશળતા ધરાવતા મહત્વાકાંક્ષી વ્યક્તિ છો. પરિણામે, તમે લોકો સાથે સારી રીતે મેળ બેસાડો છો, તેમના સમર્થન પ્રાપ્ત કરો છો અને તમારા ધ્યેયો ને પરિપૂર્ણ કરવા માં સક્ષમ છો. તમે મર્યાદિત હોવા ને નાપસંદ કરો છો અને ઘણા મિત્રો છે જે હંમેશા તમારી સહાય માટે ત્યાં રહેશે. આર્થિક રીતે, તમે સમૃદ્ધ થશો, પરંતુ તમે વૈભવી અને શાસનશીલ જીવન નો આનંદ માણશો અને પ્રેમ કરશો. તમે રાજકારણ માં સફળતા મેળવી શકશો અને સરકારી ક્ષેત્ર તરફ થી લાભ મેળવવા ની સારી શક્યતા છે. કિસ્મત નંબર 1 હેઠળ જન્મેલા, તમે લોકો પાસે થી માન મેળવવા માંગો છો અને તમને તે મળશે પણ. જો કે, તમારે વધારે પડતા ખર્ચ તેમજ જુગાર અથવા સટ્ટાબાજી થી બચવા નો પ્રયાસ કરવો જોઈએ. તમારી સ્વતંત્રતા નો ઉપયોગ કરવા માં સાવચેતી રાખો, ખૂબ જ જોખમ ન લો અને તમારા નૈતિકતા અને નીતિ શાસ્ત્ર ને અનુસરો.
    DESTINY_TEXT2 = તમે ખૂબ નમ્ર, આદરણીય અને સારી રીતે ગમતા વ્યક્તિ છો, જે ભાગીદારી માં કામ કરવા નું પસંદ કરે છે. કાલ્પનિક, રોમેન્ટિક તેમજ સર્જનાત્મક વ્યક્તિ, તમે હંમેશાં સ્ત્રીઓ ને માન આપો છો. જો કે, તમે વારંવાર મજબૂત માનસિક ક્ષમતા ના અભાવ અનુભવો છો, જેના કારણે તમે સામાન્ય રીતે તમારા કાર્યો ને અપૂર્ણ કરી શકો છો. શારિરીક રીતે, તમે થોડા નબળા છો, અને અન્યો તમારો સહેલાઈ થી લાભ લે છે. તેથી, તમારે પોતાને સંભાળવા અને આત્મવિશ્વાસ જાળવી રાખવા ની જરૂર છે. તે જ રીતે, તમે હાથ માં લીધેલા બધા કાર્યો ને પૂર્ણ કરો અને સમસ્યાઓ પર શાંત રહો. તે ઉપરાંત, તમારે તમારા આજુ બાજુ ના ચાપલુસી કરનારા લોકો થી પણ સાવચેત રહેવા ની જરૂર છે.
    DESTINY_TEXT3 = તમે અન્ય લોકો માટે એક પ્રેરણા છો અને તમારી સંચાર કુશળતા એ તમારી શ્રેષ્ઠ વિશેષતા છે. બહુમુખી પ્રતિભા તમારા માં સમાવિષ્ટ છે, અને તેથી તમે કોઈ ના સહાયક બનવા માંગતા નથી. તમે શિસ્ત અને બુદ્ધિમાન છો, તમારું પ્રેમ શુદ્ધ છે, અને તમે હંમેશા ન્યાય ની તરફેણ કરો છો. આ ઉપરાંત, તમે એક સ્વપ્નદ્રષ્ટા વ્યક્તિ છો, જેમની રમૂજ સારી છે અને વ્યવહારુ પરિપ્રેક્ષ્ય છે. તમારે વધારે પડતા ખર્ચ થી બચવું જોઈએ, એક ઈર્ષ્યા ભાવ થી દૂર રહેવા નો પ્રયત્ન કરવો જોઈએ, અને શ્રીમંત બનવા માટે ક્યાંક પણ ધસી જવું નહીં. તદુપરાંત, તમારે તમારા ક્રોધ અને દ્વૈત વ્યક્તિત્વ ને નિયંત્રિત કરવા ની જરૂર પડશે, તેમજ ખોટી સંગતિ થી દૂર રહેવું પડશે કારણ કે તે તમારા માટે નુકસાનકારક સાબિત થશે.
    DESTINY_TEXT4 = તમારા જીવન માં ઘણી બધી વધ ઘટ છે, અને ઘણી અચાનક ઘટનાઓ પણ થાય છે, જે તમારા માટે સારા અને ખરાબ બંને પરિણામો લાવે છે. તમે સરળતા થી તમારા જીવન માં સફળતા ની મહાન ઊંચાઈ સુધી પહોંચી શકો છો, પરંતુ બીજી તરફ કાવતરું પણ તમને નીચે લાવી શકે છે. તમારો પરિપ્રેક્ષ્ય તમને ગમ્મે ત્યાં આકર્ષણ નું કેન્દ્ર બનાવે જે બીજા લોકો થી અલગ છે. બળવાખોર વ્યક્તિ, તમે કાયમી કાયદાઓ અને રિવાજો નો વિરોધ કરો છો અને સતત નવા નિયમો બનાવવા નો પ્રયાસ કરી રહ્યા છો. તમે એક બુદ્ધિશાળી વ્યક્તિ છો જે તીવ્ર મન થી છે, અને તેથી તે ખૂબ સંવેદનશીલ અને લાગણીશીલ હોવા ઉપરાંત, નિરાશાવાદી વિચારસરણી થી દૂર રહેવું જોઈએ. તમારે તકો ને ઓળખવા ની જ જરૂર નથી, પણ તમારી આક્રમકતા ને નિયંત્રણ માં રાખવા ની જરૂર છે.
    DESTINY_TEXT5 = તમે એક સારા મિત્ર અને માનસિક રૂપે મજબૂત વ્યક્તિ છો, તમને સટ્ટાબાજી, બજારો, જુગાર અને વેપાર માં રસ હોઈ શકે છે અને તમે વ્યવસાય ને પણ ખૂબ સફળતાપૂર્વક ચલાવી શકો છો. તમારી પાસે વાત કરવા ની આદત છે જે તમને અન્ય લોકો ને સમજાવવા અને તમારા કાર્યો કરવા માટે મદદ કરે છે. જો કે, પૈસા કમાવવા માટે તમે તમારી નૈતિકતા તરફ અંધ આંખ પણ ફેરવી શકો છો. તમારે સારા માટે તમારી શક્તિ નો ઉપયોગ કરવા પર ધ્યાન કેન્દ્રિત કરવું જોઈએ અને કોઈપણ નાખુશ વાતાવરણ માં થી પોતાને દૂર રાખવું જોઈએ. તમારી ગુપ્ત માહિતી અને હોશિયારતા ને લીધે તમારી નાણાકીય સ્થિતિ ઉત્તમ રહેશે, અને તમે ખાસ કરી ને કોઈપણ વ્યવસાય ના પ્રયત્નો માં પ્રગતિ કરશો.
    DESTINY_TEXT6 = કિસ્મત નંબર 6 હેઠળ જન્મેલા, તમે દરેક ની આંખ ના તારા છો અને સૌમ્યતા ના ગુણ તમારા માં છે. એક દયાળુ વ્યક્તિ, તમે બીજાઓ ની કાળજી લેવા નું અને કલાત્મક હોવા ઉપરાંત, તમે સર્જનાત્મક પણ છો. તમે બહુમુખી રીતે આકર્ષક છો, જો કે, કેટલીકવાર તમે તમારા કામ પ્રત્યે સમર્પિત હોતા નથી, જેના કારણે તમને પણ સહન કરવું પડે છે. જન્મ થી ભાવના પ્રધાન, તમારી પાસે સુંદર વસ્તુઓ અને મનોરંજન માટે નો પ્રેમ છે. જો કે, તમારે કોઈક માં અંધશ્રદ્ધા રાખવા અથવા તુરંત જ અભિનય કરવા થી દૂર રહેવું જોઈએ. તદુપરાંત, દારૂ અને મદ્યપાન થી દૂર રહો અને સામાજિક પ્રવૃત્તિઓ માં વધારે રસ બતાવશો નહીં.
    DESTINY_TEXT7 = તમે તદ્દન આધ્યાત્મિક હોઈ શકો છો અને તે કોઈ છે જે સત્ય ની શોધ માં જાય છે અને કોઈપણ કાર્ય નું વિશ્લેષણ કરે છે. દૈવી દ્રષ્ટિ ના માલિક હોવા થી, તમે સરળતા થી સમજી શકો છો અને તેથી અન્ય ને મદદ કરી શકો છો. તમે જીવન ના મૂલ્યો ને અન્ય લોકો ને સમજાવી શકો છો અને વિવિધ સરસ સ્થળો અને દેશો માં પણ મુસાફરી કરી શકો છો. તમારા આસ પાસ ના હકારાત્મક ઊર્જા ના વાતાવરણ સાથે, તમે બીજાઓ ને ખૂબ પ્રભાવિત કરી શકો છો. જો કે, તમારે અસ્વસ્થ ભાવના થી દૂર રહેવા અને કંઇપણ વિશે વધુ ઊંડાણપૂર્વક વિચારવા ની અવગણના કરવા ની જરૂર છે. ભૌતિક સુખ પ્રત્યે ઉદાસીન રહેવા નું તમારા માટે યોગ્ય નથી અને તમારે તમારા કાર્ય અને વિચારસરણી માં સક્રિય રહેવા ની જરૂર છે.
    DESTINY_TEXT8 = તમારા જીવન ના શારીરિક અને આધ્યાત્મિક પાસાઓ માં સારી સંતુલન છે. શક્તિશાળી મહત્વાકાંક્ષા ના માસ્ટર, તમે ક્ષમાશીલ તેમજ સ્વપ્નશીલ છો. તમારી પાસે એક મોટું હૃદય છે પરંતુ તમે ઘણીવાર પોતાને દુઃખ અને એકલા જુઓ છો, અને પરિણામે, તમે પણ ખૂબ સંવેદનશીલ છો. આ જીવન માં, કિસ્મત નંબર 8 હેઠળ જન્મેલા, તમે ક્યાં તો ખૂબ સફળ અથવા અત્યંત અસફળ હશો. આત્મ-સદાચારી વ્યક્તિ, સમર્પણ નું ગુણ તમારા માટે એક મોટી સિદ્ધિ છે. જ્યારે તમે તાણ સામે ઘૂંટણ ને વળાંક આપતા નથી, ત્યારે તમારે તમારા કાર્ય સંબંધિત બાબતો માં, પોતા ને પ્રમાણિક રીતે વ્યક્ત કરવું જોઈએ. તેમ છતાં, હંમેશા તમારા બિંદુ પર અટવાઇ જવું પણ ખોટું હોઈ શકે છે. અન્ય ને પણ સાંભળો, અને જો તમને લાગે કે તમે ક્યાંય દોષિત છો, તો તેને સ્વીકારો. તમારા ભવિષ્ય વિશે ના તમામ નિરાશાવાદી વિચારો ને છુટકારો મેળવો અને એકલતા તરફ દોરી જતી પરિસ્થિતિઓ થી દૂર રહો.
    DESTINY_TEXT9 = જ્યારે તમને તમારા જીવન ની શરૂઆત માં મુશ્કેલીઓ નો સામનો કરવો પડે છે, પરંતુ તમે સારા રાજકારણી બનવા માટે પણ બહાર આવી શકો છો. તમે તદ્દન કલાત્મક અને મુક્ત વિચારસરણી વાળા હોઈ શકો છો, અને તમે ઉતાવળ માં પણ કામ કરો છો. જ્યારે તમારી પાસે મોટી સંગઠનાત્મક કુશળતા અને શક્તિ હોય છે, પરંતુ કાંઈપણ માં અસ્વસ્થતા કાં તો યોગ્ય નથી. તમે વારંવાર બનેલી વસ્તુઓ વિશે ઝલક અથવા અંતઃકરણ મેળવો છો. જો કે તમે પ્રકૃતિ માં મદદરૂપ અને ઉદાર છો, તેમ છતાં, તમારે તમારા ક્રોધ ને નિયંત્રણ માં રાખવા ની જરૂર છે. વધુ માં, ખાતરી કરો કે તમે તમારા વરિષ્ઠ અધિકારીઓ ને ચિંતિત ન કરો. તમે નાણાકીય રીતે સમૃદ્ધ થશો, પરંતુ તમારે હજી પણ પ્રતિકૂળ પરિસ્થિતિઓ ને ટાળવા અથવા સામનો કરવા માટે હંમેશાં તૈયાર રહેવા ની જરૂર છે.

    PLACE_TEXT1 = પૂર્વ દિશા તમને સફળતા અને પ્રશંસા લાવશે. તેથી, તમારે ખાતરી કરવી જોઈએ કે તમારા ઘર નો મુખ્ય દરવાજો આ દિશા માં છે. ઉપરાંત, જો તમારી નોકરી પણ આ દિશા માં હોઈ શકે છે, તો સમૃદ્ધિ તમારા જીવન માં ચોક્કસપણે દાખલ થશે. દેશો ભારત, પાકિસ્તાન, તૂર્કી, બર્મા, અફઘાનિસ્તાન અને હોંગકોંગ તમામ પરિસ્થિતિઓ માં તમારા માટે અનુકૂળ સાબિત થશે.
    PLACE_TEXT2 = ઉત્તર-પશ્ચિમ દિશા (વાયવ્ય કોણ) તમારા માટે શ્રેષ્ઠ પુરવાર થશે, અને આ દિશા માં કરવા માં આવેલ કોઈપણ પ્રયત્નો તમને મહાન સિદ્ધિઓ આપશે અને તમને સફળતા ની નવી ઊંચાઈ પર લઈ જશે. અનુકૂળ સ્થાનો પર આવીયે તો લંડન, તિબેટ, ફ્રાંસ, જર્મની, શ્રીલંકા, દિલ્હી અને કાબુલ તમારા માટે ફાયદાકારક સાબિત થશે.
    PLACE_TEXT3 = તમારી મૂલાંક 3 હોવા થી, ઉત્તર - પૂર્વ દિશા (ઇશાન કોણ) તમને સારૂ નસીબ, સમૃદ્ધિ અને સંપત્તિ લાવશે. વધુ માં, યુકે, નેપાળ, હોલેન્ડ, ડેનમાર્ક, ભુતાન, વગેરે જેવા સ્થળોએ રહેતા અથવા કામ કરતા તમને સફળતા લાવશે.
    PLACE_TEXT4 = તમારે દક્ષિણ પશ્ચિમ દિશા (નેઋત્ય કોણ) માં કામ કરવા નો અથવા વસવાટ કરવા નો પ્રયાસ કરવો જોઈએ કારણ કે તે તમારા માટે સૌથી વધુ ફાયદાકારક સાબિત થશે. તે જ રીતે ઇટલી, કુવૈત, હંગરી, વૉશિંગ્ટન, મુંબઈ જેવી જગ્યા તમારા માટે શુભ રહેશે અને તમને અનુકૂળ પરિણામો લાવશે.
    PLACE_TEXT5 = ઉત્તર તમારા માટે સૌથી અનુકૂળ દિશા હશે, કારણ કે તમે મૂલાંક 5 હેઠળ જન્મ્યા હતા. તેથી, આ દિશા માં કામ કરવા થી તમને સફળતા, સુખ અને સમૃદ્ધિ મળશે. ખાસ કરી ને, કોરિયા, સઉદી અરેબિયા, સ્પેન, અમેરિકા, ગોવા અને પ્રાગ તે સ્થાનો છે જે તમારા માટે ખૂબ જ શુભ હશે.
    PLACE_TEXT6 = આગ્નેય કોણ, એટલે, દક્ષિણ-પૂર્વ દિશા તમને સફળતા અને અનુકૂળ પરિણામો આપશે. તેથી, તમારે આ દિશા માં તમારા કાર્ય ને વિસ્તૃત કરવા નો પ્રયાસ કરવો જોઈએ. તદુપરાંત, ભારત, ઇન્ડોનેશિયા, વિયેતનામ, થાઈલેન્ડ, સિંગાપોર, મલેશિયા તમને લાભ આપશે.
    PLACE_TEXT7 = ઇશાન કોણ અથવા ઉત્તર-પૂર્વ દિશા તમારા માટે સૌથી વધુ અનુકૂળ રહેશે, કારણ કે તમારો મૂલાંક 7 છે. આ દિશા માં કામ કરવું અથવા વ્યવસાય કરવું એ તમારા માટે સફળતા અને સિદ્ધિઓ લાવશે, જ્યારે અહીં રહેતા તમને પ્રગતિ કરવા માં પણ મદદ કરશે. સ્થાન ગ્રીસ, સ્કોટલેન્ડ, રોહડેશિયા, કશ્મીર, મોસ્કો અને બેંગકોક તમારા માટે ફાયદાકારક અને શુભ છે.
    PLACE_TEXT8 = જીવન માં પ્રગતિ અને આગળ વધવા માટે, પશ્ચિમ દિશા તમારા માટે શ્રેષ્ઠ છે. જો તમે તમારા પોતાના વ્યવસાય માં રસ ધરાવો છો, તો તમારે આ દિશા માં તે કરવા નો પ્રયાસ કરવો જોઈએ કારણ કે તે પછી સફળતા તમારી રહેશે. વધુ માં, ચાઇના, મલેશિયા, ઑસ્ટ્રિયા, આદિસ અબાબા તમારા માટે ફાયદાકારક સ્થળો છે, જે તમને નસીબ અને સિદ્ધિ લાવશે.
    PLACE_TEXT9 = દક્ષિણ એ દિશા છે જે તમને જીવન માં સફળતા, સુખ અને શાંતિ આપે છે. તેથી, જો તમે તમારા વ્યવસાય ને વિસ્તૃત કરવા માંગતા હો અથવા જીવન માં પ્રગતિ કરવા માંગતા હો, તો તમારે તમારા જન્મસ્થળ થી આ દિશા માં  તેના માટે પ્રયાસ કરવો જોઈએ. તમારા દક્ષિણ માં ઇન્ડોનેશિયા જેવા દેશો, શહેરો અને રાજ્યો તમને અનુકૂળ પરિણામો લાવશે.

    HEALTH_TEXT1 = હેઠળ જન્મેલા, તમે અશ્વ ની જેમ તંદુરસ્ત છો, પરંતુ ચોક્કસ રોગો ની શક્યતા રહે છે. મોટા ભાગે, તમે હૃદય સંબંધિત રોગો, પંપીંગ, બ્લડ પ્રેશર, લોહી સંબંધિત રોગો, વૃદ્ધાવસ્થા માં ઊંચા બ્લડ પ્રેશર અને આંખ સંબંધિત સમસ્યાઓ થી પીડાઓ છો. તમારે આ પ્રત્યે સાવચેત રહેવા ની જરૂર છે, અને તંદુરસ્ત જીવનશૈલી નો આનંદ માણો.
    HEALTH_TEXT2 = તમારી પાસે ઘણી બધી વિચારવા ની ટેવ છે, અથવા તમારી બધી સમસ્યાઓ ના મૂળ રૂપે ચિંતિત થવા ની ટેવ છે. આના થી પેટ ની સમસ્યાઓ, પાચન તંત્ર માં સમસ્યાઓ, ગેસ ની સમસ્યા, આંતરડા ની સમસ્યાઓ, ગાંઠ વગેરે જેવા રોગો થઈ શકે છે. તેથી, તમારે ચિંતાઓ થી દૂર રહેવા ની જરૂર છે. વધુ માં, તે પણ સલાહ આપે છે કે તમે આલ્કોહોલ પીતા નથી અથવા કોઈ ડ્રગ અથવા નશો લેતા નથી. તદુપરાંત, તમારે બાફેલી ખોરાક ખાવું જોઈએ અને પૂરતું પાણી પીવું જોઈએ.
    HEALTH_TEXT3 = ભગવાન ગુરુ તમને તેમની દિવ્ય કૃપા થી આશીર્વાદ આપે છે જેના કારણે તમે સામાન્ય રીતે ચિંતા કરતા નથી. જો કે, તમે હજી પણ તમારા સ્વાસ્થ્ય વિશે નિરાશાજનક હોઈ શકો છો જેના કારણે તમને ન્યુરિટિસ (સૉરાયિસિસ), સાયટીકા (પગ અથવા પીઠ નો દુખાવો), ત્વચા ની રોગો જેવી સમસ્યાઓ નો સામનો કરવો પડે છે. તેથી, તમારે સાવચેત રહેવું અને તમારી સુખકારી ની કાળજી લેવા ની જરૂર છે.
    HEALTH_TEXT4 = રાહુ ના પ્રભાવ ને કારણે, તમે સક્રિયપણે તમારા મગજ નો ઉપયોગ કરો છો, પરંતુ તમારે યાદ રાખવું જોઈએ કે કોઈપણ વસ્તુ ની વધારે પડતી ખોટ છે. તમે કોઈ પ્રકાર નાં આઘાત, માનસિક અશાંતિ, રક્ત સંબંધિત સમસ્યાઓ, માથા અને પીઠ નો દુખાવો, પેશાબ ની સમસ્યાઓ અને આવા રોગો થી પીડાઓ છો. તેથી, સ્વસ્થ જીવનશૈલી જાળવો અને ધ્યાન અને યોગ ની મદદ થી શ્રેષ્ઠ જીવન જીવો.
    HEALTH_TEXT5 = તમારા જીવન પર બુધ ની અસરો ને લીધે, તમારી પાસે તીવ્ર મન હશે અને તમે તમારા કરતા નાના દેખાશો. પરંતુ બીજી તરફ, તમને તમારા જીવનકાળ દરમિયાન ન્યુરિટિસ (સ્નાયુ સોજા), મોઢા માં ચાંદી, આંખો અને હાથ, અનિદ્રા, લકવો (પેરાલીસીસ), અથવા પોલિયો વગેરે સંબંધિત સમસ્યાઓ નો સામનો કરવો પડી શકે છે. તેથી, તમારે શિસ્તબદ્ધ જીવન જીવવું જોઈએ અને તમારી સુખકારી વિશે નિરાશ ન થવું જોઈએ.
    HEALTH_TEXT6 = શુક્ર, તમારા મૂલાંક નો ભગવાન, બધી વૈભવી વસ્તુઓ નો કારક છે, તેથી, તમે ખાવું, પીવું, ડ્રેસિંગ કરવું અને અન્ય સંસ્કારી સુવિધાઓ નો આનંદ લેશો. ઘણીવાર, આ તમને સમસ્યાઓ ઘર માં મૂકી શકે છે. મુખ્યત્વે, તેમાં ગળા ની સમસ્યાઓ, નાક અને જીભ, છાતી સંબંધિત રોગો, અથવા કાર્ડિયોવેસ્ક્યુલર બીમારીઓ સાથે સંકળાયેલી રોગો શામેલ છે. તેથી, તમારે આ વિશે સાવચેત રહેવું જરૂરી છે, અને કોઈપણ સ્વાસ્થ્ય સંબંધિત સમસ્યાઓ ને અવગણશો નહીં.
    HEALTH_TEXT7 = હેઠળ જન્મેલા સૂચવે છે કે તમે કેટલીક અથવા અન્ય માંદગી ના કબ્જા માં રહી શકો છો, કેમ કે તમારી રોગ પ્રતિકારક શક્તિ અન્ય લોકો ની સરખામણી માં નબળી છે. પરિણામે, તમે ઘણી વાર સરળતા થી બીમાર થઈ શકો છો, અને તમે અચાનક અસ્પષ્ટ થઈ શકો છો, માથા નો દુખાવો મેળવી શકો છો, અને ક્યારેક ક્યારેક તમે કાર્ડિયોવેસ્ક્યુલર રોગો, માનસિક શક્તિ ગુમાવવી, જીભ અને ફેફસા ના રોગો થી પીડાઓ છો.
    HEALTH_TEXT8 = તમે સામાન્ય રીતે એક શિસ્તબદ્ધ વ્યક્તિ છો અને જીવન ના તમામ ક્ષેત્રો માં તમે પોતાને માટે અગત્ય નું મહત્વ આપો છો. પરિણામ સ્વરૂપે, તમે સારા સ્વાસ્થ્ય નો આનંદ માણવા માં સક્ષમ છો, જો કે, તમારી રોજિંદા અને શિસ્ત થી ભટકી જવા ને કારણે ગંભીર બીમારી નો ભય હંમેશા ક્ષિતિજ પર રહે છે. આમાં મુખ્યત્વે તમારા કિડની, આંતરડા, માથા નો દુખાવો અને રક્ત સંબંધિત બિમારીઓ થી સંકળાયેલી રોગો શામેલ છે.
    HEALTH_TEXT9 = તમે સંપૂર્ણ મૂલાંક 9 હેઠળ જન્મેલા છો, અને તે તમને કુદરતી રીતે ઉત્સાહી બનાવે છે. પરિણામ સ્વરૂપે તમે સામાન્ય રીતે તંદુરસ્ત છો, પરંતુ બીજી બાજુ તમે સરળતા થી ગુસ્સે થાઓ છો અથવા ઘણી વાર તમારા કાર્યો ને ઉતાવળ માં પૂર્ણ કરો છો જે પછી તમારા સ્વાસ્થ્ય ને અસર કરે છે. મોટાભાગે, તમે લોહી સંબંધિત મુદ્દાઓ, ઇજાઓ, ઓરી, અછબડા નો સામનો કરી શકો છો, અથવા છરી હેઠળ હોવા જોઈએ કારણ કે કેટલીક પ્રકાર ની શસ્ત્રક્રિયા તમારા માટે સંભવિત છે.

    TIME_TEXT1 = જેમ કે સૂર્ય તમારું શાસક ગ્રહ છે, તેથી એપ્રિલ થી મે અને ઓગસ્ટ થી સપ્ટેમ્બર સુધી ના સમયગાળા દર વર્ષે તમારા માટે અનુકૂળ રહેશે. આ સમયગાળા દરમિયાન તમે જે પણ કાર્ય કરો છો, તેમાં તમે ચોક્કસપણે સફળ થશો. આ અવધિ તમારા સન્માન, નામ અને ખ્યાતિ માં પણ વધારો કરશે.
    TIME_TEXT2 = ચંદ્ર તમારૂ શાસક ગ્રહ હોવા થી, દર વર્ષે મે થી જૂન નો સમયગાળો તમારા માટે ખૂબ જ શુભ સમય છે. તમારા માટે આ અવધિ માં તમારા પ્રયત્નો માં સફળ થવા ની શક્યતા વધારે છે. તેથી, તમારે જીવન માં સફળતા પ્રાપ્ત કરવા માટે આ સમયગાળા ના સંપૂર્ણ ઉપયોગ ની જરૂર છે.
    TIME_TEXT3 = ગુરુ તમારા મૂલાંક નો પ્રભુ છે, તેથી ડિસેમ્બર થી જાન્યુઆરી અને માર્ચ થી એપ્રિલ નો સમયગાળો, દર વર્ષે તમારા માટે ફાયદાકારક છે. આ સમયગાળા દરમિયાન તમે જે પણ કાર્ય કરો છો, તેમાં તમે સફળ થશો, કોઈપણ મહત્વપૂર્ણ કાર્યો શરૂ કરવાઆ માટે આ સમય તમારા માટે શ્રેષ્ઠ છે.
    TIME_TEXT4 = ગ્રહ હર્ષલ તમારા મૂલાંક નો ભગવાન છે. અન્ય સ્રોત / મંતવ્ય અનુસાર, રાહુ ને આ મૂલાંક ના ભગવાન ગ્રહ પણ ગણવા માં આવે છે. પરિણામે, જુલાઈ થી સપ્ટેમ્બર વચ્ચે નો સમયગાળો દર વર્ષે તમારા માટે ખૂબ જ શુભ છે. તમે જે કાર્ય કરો છો તે હવે સફળ થશે.
    TIME_TEXT5 = બુધ એ તમારું ભગવાન ગ્રહ હોવા થી, જૂન થી જુલાઇ અને સપ્ટેમ્બર થી ઑક્ટોબર ના સમયગાળા તમારા માટે ખૂબ અનુકૂળ છે. જો તમે ઇચ્છો તે કોઈપણ કાર્યો શરૂ કરો છો, તો આ સમયગાળા દરમિયાન આવું કરવા થી તમારા માટે સફળતા લાવવા માં વધુ તક મળશે.
    TIME_TEXT6 = શુક્ર તમારા મૂલાંક નો સ્વામી છે, પરિણામે, માર્ચ થી એપ્રિલ, મે થી જૂન અને ઓક્ટોબર થી નવેમ્બર નો સમયગાળો તમારા માટે ફાયદાકારક છે. આ અવધિ માં તમે જે કાર્ય કરો છો અથવા શરૂ કરો છો તે સફળ થવા માટે વધુ તક હશે અને તમે જીવન માં સુખ, સમૃદ્ધિ અને અન્ય વૈભવ પ્રાપ્ત કરશો.
    TIME_TEXT7 = કેમકે કેતૂ તમારો ભગવાન છે, જુલાઈ થી ઓગસ્ટ નો સમયગાળો તમારા માટે ખૂબ જ મહત્વપૂર્ણ છે. તમે જે કાર્યો કરો છો તે આ અવધિ માં સફળ થશે, અને તમે તમારા જીવન માં બહેતર સુમેળ અનુભવશો. જીવન માં આગળ વધવા માટે તમે આ સમય નો સારો ઉપયોગ કરી શકો છો. 
    TIME_TEXT8 = શનિ તમારા મૂલાંક નો શાસક ભગવાન છે. તેથી, જાન્યુઆરી થી માર્ચ દરમિયાન તેમજ ઑક્ટોબર થી નવેમ્બર દરિમયાન નો સમયગાળો તમારા માટે અત્યંત ફાયદાકારક છે. આ અવધિ તમારા માટે સફળતા લાવશે, અને તમે હવે કોઈપણ શુભ અથવા મહત્વપૂર્ણ કાર્યો શરૂ કરી શકો છો.
