    MASTER_NUMBER_TEXT = ન્યુમેરોલોજી ના વિજ્ઞાન અનુસાર, ફક્ત બે જ સંખ્યા છે જેમાં તેમની અંદર વિશેષ શક્તિ હોય છે. તેઓ માસ્ટર નંબર્સ તરીકે ઓળખાય છે, અને તે 11 અને 22 છે. આવા લોકો માં આશ્ચર્યજનક શક્તિ અને તેમની અંદર સંભવિત શક્તિ હોય છે.
    MASTER_NUMBER_TEXT11 = તમારું માસ્ટર નંબર 11 છે, જેના કારણે, તમારી સાહજિક ક્ષમતાઓ આશ્ચર્યજનક છે. તમે કલ્પનાશીલ અને સર્જનાત્મક નથી, પરંતુ તમે પણ વિશાલ ચિત્ર ને જોઈ શકો છો. તે ઉપરાંત, તમે ચોક્કસ સ્તર પર અવ્યવહારુ છો. તમારી પાસે મહાન નેતૃત્વ કુશળતા છે અને અન્ય ને પ્રોત્સાહિત કરવા માટે પણ સારી છે. પરંતુ, જો તમે તમારા ધ્યેયો તરફ ધ્યાન કેન્દ્રિત કરશો નહીં, તો ભય નો વાતાવરણ તમારા જીવન ને ઘેરી શકે છે. તમારી ક્ષમતાઓ પર વિશ્વાસ રાખો અને સામાજિક કલ્યાણ માટે કાર્ય કરો, અને તમને ખ્યાલ આવશે કે તમારી કરતાં ભૂમિકા માટે વધુ સારી કોઈ યોગ્ય નથી. આ નંબર એક આત્મિક નંબર છે.
    MASTER_NUMBER_TEXT22 = તમારો માસ્ટર નંબર 22 છે, જે ન્યુમેરોલોજી ના વિજ્ઞાન માં સૌથી શક્તિશાળી નંબર ગણાય છે. તમારી પાસે તમારા સપના અને ઇચ્છાઓ ને વાસ્તવ માં રૂપાંતરિત કરવા ની ક્ષમતા છે. મોટા વિચારો, ઉચ્ચ વિચારસરણી, સારી નિર્ણય લેવા ની ક્ષમતાઓ અને નેતૃત્વ ગુણો સાથે, તમારી પાસે અંતર્જ્ઞાન અને તમારી અંદર ની વ્યવહારિક શક્તિ પણ છે. તમે વારંવાર તમારા માટે વધારે ધ્યાન આપતા હોય છે, જો કે, તમારે યાદ રાખવું જોઈએ કે તમે એક મહાન હેતુ માટે જન્મેલા છે અને સમાજ માટે ઘણું કરવા નું છે. તમારે તમારા જીવન ના શરૂઆત ના તબક્કા માં ઘણી અવરોધો નો સામનો કરવો પડ્યો હતો, પરંતુ તે તમને મજબૂત બનાવવા માટે ત્યાં હતા. તેથી, તમારે ખાતરી કરવી જોઈએ કે તમે જે પણ લક્ષ્ય તમારા માટે સેટ કરો છો, તે વ્યક્તિગત મહત્ત્વાકાંક્ષાઓ થી ઉપર વધવું જોઈએ અને સમાજ ની સુધારણા માટે હોવું જોઈએ. તમે એવા કોઈ છો જે આ યુગ માં એક શક્તિશાળી પરિવર્તન માટે ઉત્પ્રેરક બની શકે છે.
    KARMIC_NUMBER_TEXT = અંકશાસ્ત્ર એ ચોક્કસ સંખ્યાઓ ને ઓળખે છે જે આપણા ભૂતકાળ ના જીવન ના કાર્યો સૂચવે છે. આપણી આ ક્રિયાઓ એ છે કે આપણે ચાર વિશિષ્ટ નંબરો હેઠળ જન્મ લે છે. આવા લોકો નો મુખ્ય હેતુ તેમના કર્મ અને ભૂતકાળ ના કાર્યો નું ઋણ ચૂકવવા નું છે. આ કર્મિક સંખ્યા 13, 14, 16, અને 19 છે.
    KARMIC_NUMBER_TEXT13 = આ નંબર હેઠળ જન્મેલા હોવા થી, તમારે સફળતા પ્રાપ્ત કરવા માટે જીવન માં સખત મહેનત કરવી પડશે. કર્મિક નંબર 13 ની સીધી અસર તરીકે, તમે સતત તમારા પથ માં અવરોધો નો સામનો કરશો. આના કારણે, તમે વારંવાર અસ્વસ્થ થાઓ છો અને એવું લાગે છે કે તમારા પ્રયાસો કચરાઈ જશે; તમે મુશ્કેલીઓ નો સામનો કરો છો અને વિચારો છો કે તમે આ પડકારો નો સામનો કરી શકશો નહીં. તમે આળસ અને નિરાશાવાદી બનો છો. પરંતુ, તમારે યાદ રાખવા ની જરૂર છે કે એવું લાગે છે કે બધું હંમેશાં જેવું નથી. તમારા પ્રયત્નો બગાડશે નહીં, પરંતુ તમારે મહેનત કરવી અને સખત મહેનત કરવી પડશે કારણ કે આ તમારું કર્મ નું દેવું છે. જો તમે તમારા પ્રયત્નો માં સફળ છો, તો તમે જીવન ના વિવિધ ક્ષેત્રો માં મહાન ઊંચાઈઓ ને સ્પર્શ કરી શકશો.
    KARMIC_NUMBER_TEXT14 = આ સંખ્યા હેઠળ જન્મેલા, તમે જીવન માં અચાનક અનપેક્ષિત ફેરફારો અનુભવો છો જે તમારા જીવનશૈલી માં ફેરફાર કરે છે. તમે દારૂ, મુક્તિ ની પ્રવૃત્તિઓ, વગેરે જેવા વિવિધ અનિચ્છાઓ માં રસ લો છો, અને આ તમારા માટે સમસ્યાઓ નું કારણ બને છે. આ બધું અવગણવા માટે, તમારે તમારી પ્રતિબદ્ધતા કરવી જોઈએ. જો કે તમારું જીવન વધઘટ ભર્યું હશે, જો તમે કોઈ સ્ટેન્ડ લો અને મજબૂત પરંતુ મુશ્કેલ ધ્યેય તરફ લડતા રહો, તો તમે આ મુદ્દા થી સુરક્ષિત રહેશો અને ઇચ્છિત સફળતા પ્રાપ્ત કરી શકશો.
    KARMIC_NUMBER_TEXT16 = આ સંખ્યા હેઠળ જન્મેલા હોવા ને કારણે, તમારે ઘણી વખત તમારી અહંકાર છોડી દેવી પડે છે, અને આ જ જીવન માં તમારે જે શીખવું છે તે જ છે. એક રીતે, આ પ્રક્રિયા તમારા માટે શુદ્ધિકરણ નો એક ભાગ છે. તમારે તમારા અહંકાર સાથે વારંવાર સમાધાન કરવું પડશે, અને જ્યારે આ તમને અસ્વસ્થ કરશે, તમારે નિરાશ થવું જોઈએ નહીં કારણ કે આ સંઘર્ષ હવે, ભવિષ્ય માં તમને સફળતા આપશે. તમારી પાસે સમસ્યાઓ અનુભવી અને સમજવા ની ક્ષમતા છે જે અન્ય લોકો નો સામનો કરી રહી છે પરંતુ તમે વારંવાર તમારી જાત ને એકલા અથવા અલગ પાઓ છો. જો તમે તમારા જીવન માં શ્રદ્ધા, કૃતજ્ઞતા અને શાંતિ માટે સ્થાન આપો છો, તો તમે આધ્યાત્મિક વિકાસ પણ કરી શકશો.
    KARMIC_NUMBER_TEXT19 = કર્મિક આ સંખ્યા હેઠળ જન્મેલા હોવા ના કારણે, તમારે મુખ્યત્વે જીવન માં બે બાબતો શીખવી પડશે - એક શક્તિ નો સાચો ઉપયોગ, અને સ્વાતંત્ર્ય બીજો છે. જીવન માં અસંખ્ય પ્રસંગો હશે જ્યાં વ્યક્તિગત જીવન માં કેટલીક સમસ્યાઓ ચાલુ હોવા ને લીધે તમારે એકલા પોતાને માટે એક સ્ટેન્ડ લેવું પડશે. તમે તમારી આસપાસ ના લોકો સાંભળવા નું પસંદ કરશો નહીં, અને તેમની સલાહ સ્વીકારીશું નહીં. પરંતુ તમારે તેમને ધ્યાન આપવું જોઈએ, કારણ કે તમારે સમજવા ની જરૂર છે કે જીવન માં આગળ વધવા માટે, તમારે ચોક્કસ લોકો ની સહાય ની જરૂર પડશે. આ તમારા જીવન માં આ શીખ છે.

    MULANK_DESC_TEXT1 = એક હેઠળ જન્મ કારણે તમે ખૂબ મહત્વાકાંક્ષી છો અને તમને બીજા ના બંધનો ન ગમે પણ તમારા માં બીજા લોકો જોડે કામ કરાવવા માં અને અને તેમનું નેતૃત્વ કરવા ની ખૂબી છે. સૂર્ય ની તમારી વિશેષ અસર છે. તમારી વિચારધારા સ્થિર છે અને તમે તમારા નિર્ણય પર દૃઢ છો. તમે કોઈ પણ સંબંધ અથવા લાંબા સમય ના મિત્ર સાથે સંબંધ માં રહો છો. તમે એક દયાળુ વ્યક્તિ છો અને એક વ્યક્તિ જે બીજાઓ ને મદદ આપે છે. તમે આદર માટે વધુ આદર ઇચ્છો છો. તમે તમારા મહેનત પર સારું નામ કમાઓ છો. સરકારી ક્ષેત્ર માં તમારું પ્રદર્શન પ્રશંસા પાત્ર છે. તમે ધીરજ રાખો છો અને તમારા અભ્યાસ પર સંપૂર્ણ ધ્યાન આપો છો. તમે વિપરીત જાતીય લોકો તરફ વધુ આકર્ષિત છો અને આ કારણે, તેઓ કેટલીક વખત દગો કરે છે. તમને સામાજિક સેવા રાજકારણ ની નોકરી અથવા ધર્મ સંબંધિત ક્ષેત્રો માં વિશેષ અનુભવ મળે છે.
    MULANK_DESC_TEXT2 = મુખ્યત્વે ચંદ્ર દ્વારા પ્રભાવિત થવા થી, તમે ખૂબ ભાવનાત્મક છો અને કોઈ ની સાથે મળી ને કામ કરવા નું પસંદ કરો છો. જીવન ના દરેક ક્ષેત્ર માં તમારે ભાગીદાર ની જરૂર પડે છે. કેટલીકવાર તમે એકસાથે ઘણા બધા કામ શરૂ કરો છો પરંતુ મન ની બદલાવ ને લીધે ઘણીવાર તેઓ તેમને મધ્ય માં છોડી દે છે, જેના કારણે તમારે નુકસાન સહન કરવું પડે છે. કલા થી પ્રેમ કરનારા અને કલ્પના શીલ હોય છે અને લોકો થી પ્રેમ કરે છે. તમે એક કુશળ પ્રેમી બની શકો છો અને તમારા પરિવાર ને સમર્પિત છો. તમારા માં ધીરજ ની અછત હોઈ શકે છે. તમારી સામાજિક સ્થિતિ સારી છે અને તમે સમાજ માં લોકપ્રિય છો. તમે અન્વેષણ કરવા ની વલણ ના અને સારા મિત્ર છો. તમારા જીવન માં ઘણા બઘી વધ ઘટ છે, અને આ કારણે તમારી ઘણી યોજનાઓ મધ્ય માં અટવાઇ જાય છે. તમારે આત્મવિશ્વાસ મજબૂત કરવો જ જોઇએ.
    MULANK_DESC_TEXT3 = ગુરુ ગ્રહ દ્વારા પ્રભાવિત મૂલાંક 3 માં જન્મેલા, તમે એક નમ્ર હૃદય ના વ્યક્તિ છો અને સાચા વક્તા અને શાંતિ પ્રિય છો. તમે મહત્વાકાંક્ષી છો અને મોટા ભાગ ની સરકારી નોકરીઓ માં સારી કામગીરી કરો છો. તમે વારંવાર પોતાની અંદર એક સરમુખત્યાર શાહી જોઈ શકો છો. તમે શિસ્ત પ્રિય છો, તેથી, તમારા અધીનસ્થ લોકો પ્રત્યે અમુક કઠિન હોઈ શકે છો. તમારી પાસે સાહજિક જ્ઞાન છે અને તમે બન્ને વાંચન અને શિક્ષણ ગમે છે, તેથી બૌદ્ધિક ક્ષેત્ર માં સંબંધિત ઘણી સિદ્ધિઓ તમારી જોડે છે. તમે માનસિક રૂપે મજબૂત છો અને તમારી તર્ક અને જ્ઞાન શક્તિ ખૂબ સારી છે. તમે દાન પુણ્ય અને પરોપકાર કાર્ય પસંદ કરો છો. કેટલીક વાર તમે કંઈક પાછળ આવી ને આક્રમક થઈ શકો છો. પરંતુ તે સાચું છે કે તમે સ્વાભિમાની છો.
    MULANK_DESC_TEXT4 =  તમારી અંદર હર્ષલ અથવા રાહુ નો મુખ્ય પ્રભાવ છે. પરિણામે તમે સંસાર થી જુદી સોચ રાખો છો અને કૈંક નવું કરી શકો છો. જોકે તમારી વિચારધારા બીજા લોકો જોડે સરળતા થી નથી મળતી એટલે લોકો તમારો વિરોધ કરે છે. તમને ધન સંચય નો શોખ નથી પરંતુ ખુશ રહેવું અને પોતાની મસ્તી માં ડૂબ્યા રહેવું વધારે પસંદ છે. તમે સંસાર થી આગળ ની સમજ રાખો છો અને પોતાનો વિરોધ પણ ખુલ્લા પણે પ્રકટ કરો છો. તમારો સ્વભાવ અપ્રત્યાશિત છે અને એના લીધે કોઈ તમને સરળતા થી સમજી શકતો નથી અને આવતા ક્ષણે તમે શું કરશો તેની કોઈ ને ખબર નથી તમારી આ ખૂબી તમને વિશિષ્ટ બનાવે છે. તમે કોઈપણ મહેફિલ નું આકર્ષણ હોઈ શકો છો. તમને સારા કાર્યો કરવા ની ટેવ હોય છે પરંતુ તમે ઈચ્છો છો કે લોકો તમારી આ બાલામાં ની પ્રશંસા કરે. તમે ઘણા સંવેદન શીલ છો અને પોતાને એકલવાયું અનુભવો છો. તમારા મિત્રો ની સંખ્યા ઓછી હોય છે પરંતુ તે બધા ઘણા પ્રામાણિક અને નિષ્ઠાવાન હોય છે.
    MULANK_DESC_TEXT5 = ગ્રહ બુધ થી પ્રભાવિત થવા થી, તમે વધુ મિત્રો સાથે ના વ્યક્તિ છો. તમે મિત્રતા ના શોખીન છો અને તમારા મિત્ર વર્તુળ માં વધુ લોકો હશે. તમારા અંદર વેપારી બનવા ની ગુણવત્તા સહજ જ ઉપલબ્ધ છે. તમે ઘણીવાર નફા તરફ આકર્ષિત થાઓ છો. ઘણી વખત અંદર ટેવાયેલા હોવા છતાં ઉતાવળ માં વસ્તુઓ કરો છો. તમે આ વસ્તુ ને લાંબા સમય સુધી રાખતા નથી, અને તેથી ખૂબ નિરાશ થતા નથી. તમે નોકરી કરતા વ્યવસાયને વધુ પ્રાધાન્ય આપો છો. તમે ઉતાવળ, ઉતાવળ માં કરો અને ખીજપન હોઈ . તમારી શક્તિ સારી હોય છે અને તમારી વાણી વધુ સારી હોય છે. મન રમતિયાળ હોય છે અને તે ઘણી વખત બુદ્ધિ થી સંબંધિત કાર્ય માં સફળતા મેળવે છે. તમારે શારીરિક મહેનત કરતા વધારે કામ કરવા ની જરૂર નથી. તમારી સૌથી મોટી શક્તિ એ છે કે તમે કોઈ પણ મુશ્કેલીઓ થી ઝડપ થી બહાર આવો છો. તમારે તમારી માનસિક શક્તિ નો દુરુપયોગ કરવા નું ટાળવું જોઈએ.
    MULANK_DESC_TEXT6 =  શુક્ર ની અસર ને કારણે, તમે સૌંદર્ય ના પ્રતિ સૌથી વધુ આકર્ષણ રાખો છો. ફક્ત આ જ નહીં, તમારી પાસે કોઈપણ પ્રકાર ના કલા, મનોરંજન સાહિત્ય, કપડાં અને સંગીત તરફ વલણ છે. તમને સુશોભિત અને સુશોભન ઘણું ગમે છે, તેથી ખૂબ જ સુંદર રીતે કામ કરો છો. તમારું વ્યક્તિત્વ ચુંબકીય છે, જે લોકો નું ધ્યાન આકર્ષિત કરે છે. તમારી પાસે હઠ અથવા ઈર્ષ્યા ની ભાવના હોઈ શકે છે, જે તમને કેટલીક મુશ્કેલીઓ નો સામનો કરાવી શકે છે. તમે વધુ પ્રતિકાર સહન કરી શકતા નથી. તમે કોઈ ને તમારા મિત્ર તરત જ બનાવો છો. ઘરે આવતા મહેમાનો નો આદર કરવો કોઈ તમારા થી શીખે. તમે ક્યારેક આત્મગ્લાનિ ધરાવો છો અને તમારે માનસિક તાણ નો સામનો કરવો પડે છે. વિપરીત જાતીય લોકો તરફ તમારી વલણ ઊંચી છે. તમારી સૌથી મોટી શક્તિ એ છે કે તમે કોઈને પણ ઝડપ થી પોતાનું બનાવો છો.
    MULANK_DESC_TEXT7 = મૂલાંક 7 હેઠળ જન્મેલા એ તમારા પર કેતુ અથવા નેપ્ચ્યુન નો મુખ્ય પ્રભાવ છે. સ્વાભાવિક રીતે તમારી અંદર ધાર્મિકતા અસ્તિત્વ ધરાવે છે. તમને કવિતા અને પેઇન્ટિંગ ખૂબ ગમે છે. તમે ધાર્મિક બાબતો માં ખૂબ કટ્ટર હોઈ શકો છો. કોઈપણ ઘટના નો પૂર્વાભાસ તમારી સૌથી મોટી તાકાત છે અને તમે બીજાઓ ના મન ને સમજવા માં કુશળ છો. જો કે, અને થી વિપરીત લોકો ને તમને સમજવું તે એટલું સહેલું નથી. તમે મુસાફરી કરવા, ફરવું અને ઘણી મુસાફરી કરવા થી આનંદ માણો છો. તમારા જીવન માં ભૌતિક વસ્તુઓ ની અછત હોઈ શકે છે. તમે ફક્ત તમારા મૂળભૂત વિચારો ના આધારે પૈસા કમાવો છો અને દાન આપો છો. તમે ભવિષ્ય વિશે ચિંતા કરો છો, તેથી તમે સારું કામ કરવા નો આનંદ માણો છો. કલ્પના શક્તિ તમારા માં સારી છે અને લોકો ને પોતાની બાજુ આકર્ષિત કરવા ની વિશેષ શક્તિ ધરાવે છે. તમારા માં સારા વેપારી ના ગુણો અને વિચારો માં સમાઈ ગયા છે અને જો તમે તેનો ઉપયોગ કરો છો તો તમે સફળ ઉદ્યોગપતિ બની શકો છો. અન્ય ને પ્રભાવિત કરવા ની કલા એ સૌથી મોટી વિશેષતા છે.
    MULANK_DESC_TEXT8 =  તમે કુદરતી વધુ મહેનતુ છો અને તમારી આ ખૂબી નો રહસ્ય છે મૂલાંક 8 ના સ્વામી શનિ દેવ. તમે કોઈપણ સંસ્થા માં સૌથી મહત્વપૂર્ણ માણસ છો પરંતુ ઘણી વખત લોકો તમારી સખત મહેનત દ્વારા ઓછો અંદાજ કાઢે છે. તમને એકલતા અને ઉદાસીનતા બગાડી શકે છે. તમે જીવન માં ધીમે ધીમે વિકાસ કરો છો, પરંતુ તમારી પ્રગતિ નિશ્ચિત છે. તમારી પાસે ઓછું બાહ્ય દેખાવ છે, તેથી ઘણી વાર સમાજ માં તમારા મહત્વ ને ઓછું સમજી શકાય છે. તમે તમારા કામ થી કામ રાખો છો અને એને પૂરું કરી ને જે મુકો છો. તમે ખૂબ મહત્વાકાંક્ષી છો અને કોઈપણ મહત્વાકાંક્ષા પ્રાપ્ત કરવા માટે સખત મહેનત કરતાં પાછા ફરતા નથી. તમે ખૂબ દયાળુ અને ભાવુક છો. તમે નસીબ માં વિશ્વાસ રાખનાર અને અમુક હદે ધાર્મિક હોવ છો. તમે ઘણીવાર ઉચ્ચ પદ પર પહોંચો છો અને કોઈપણ બલિદાન આપવા માટે હંમેશાં તૈયાર છો. જ્યારે તમે ત્યાં ન હો ત્યારે પણ તમે ઘણીવાર એવી વસ્તુઓ કરો છો જે લોકો ની યાદ માં તમને જીવંત રાખે છે. તમે ક્યાં તો જીવન માં ખૂબ જ સફળ છો અથવા ખૂબ અસફળ છો અને તે તમે જે આશાવાદી છો તેના પર નિર્ભર છે.
    MULANK_DESC_TEXT9 =  આ મૂલાંક હેઠળ જન્મેલા, તમને મંગળ દેવ ની ઉર્જા અને શક્તિ મળે છે, જેના કારણે તમે બહાદુર છો અને મુશ્કેલીઓ થી ડરતા નથી. તમે લોકો ના શાસન અથવા નેતૃત્વ માં પ્રભુત્વ મેળવી શકો છો. પણ ક્યારેક તમે ગુસ્સે થાઓ છો, જેના કારણે તમારી સામે ઘણી મુશ્કેલીઓ આવે છે. તમારી અંદર ચપળ અને ઉતાવળ હોય છે. તમારું જીવન સંઘર્ષ માં હોય છે અને તમારા દુશ્મનો પણ વધુ છે. જો કે, તમે આ બધા ને તમારી હિંમત ની તાકાત પર સામનો કરો છો. તમે સ્વતંત્ર થવા નું પસંદ કરો છો અને તમારા પર કોઈ ની અસર થતી નથી. તમારે મૂર્ખ લોકો થી સાવચેત રહેવું જોઈએ. પ્રેમ અને સહાનુભૂતિ મેળવવા માટે તમે કંઇ પણ કરી શકો છો. તમે તમારી ટીકા સહન કરી શકતા નથી, તેથી તમારે પોતાને નિયંત્રણ માં લેવાનો પ્રયત્ન કરવો જોઈએ કારણ કે તમે આત્યંતિક લાગણી માં કોઈપણ હદ સુધી જઈ શકો છો. જો તમે તમારા ક્રોધ ને અંકુશ માં રાખવા સક્ષમ છો, તો તમે જીવન માં ખૂબ નસીબદાર બનશો અને સફળ થશો.

    NAMANK_DESC_TEXT1 = <p>જો તમારો જન્મ નંબર 1 છે, તો આંકડા વિજ્ઞાન મુજબ તમે ઊર્જા સભર, સક્રિય, અહંકારવાદી અને કલા માટે ઉત્કટ છો. જન્મ નંબર 1 વ્યક્તિ તરીકે, તમે સામાન્ય રીતે તમે અનુસરવા નું પસંદ નથી કરતા પરંતુ તેના બદલે આગેવાની લેવા નું પસંદ કરો છો. તમારી સાહજિક શક્તિ હંમેશાં કામ પર હોય છે. પ્રકૃતિ અનુસાર પ્રામાણિકતા પૂર્વક તમારી ભૂલો સ્વીકારો છો. આધ્યાત્મિકતા માં ઘેરાયેલા અને પ્રકૃતિ અનુસાર તમે ખુશ છો, હંમેશાં હસતાં અને તમારી જીવન યોજનાઓ વિશે ખૂબ આશાવાદી છો. </p> <p> <b> કારકિર્દી: </b> તમે શારીરિક કરતાં માનસિક કાર્ય તરફ વળ્યા છો. તમે મુસાફરી અને અવલોકનો દ્વારા જાણો છો. જન્મ નંબર 1 લોકો સારા લેખકો બનાવે છે અને સારા રિપોર્ટર બની શકે છે અને સક્રિય અને રચનાત્મક મન વાળા હોય છે. </p>
    NAMANK_DESC_TEXT2 = <p>આ સંખ્યા ઉચ્ચ કલ્પના, આદર્શવાદ અને એક કલ્પનાશીલ સ્વભાવ, જે તેમની કલ્પના ની દુનિયા માં રહે છે ને દર્શાવે છે. નંબર એક થી વિપરીત તે અન્ય લોકો દ્વારા યોજાયેલી યોજનાઓ અને પ્રોજેક્ટ્સ પર કામ કરે છે. સ્વાભાવિક, નિઃસ્વાર્થ અને હંમેશાં વિચારશીલ લોકો ની વિચારણા કરો જે તમે ખરેખર યુદ્ધ વ્યક્તિઓ તરીકે આવો છો </p> <p> <b> કારકિર્દી: </b> જન્મ નંબર 2 લોકો સારા ભાગીદાર અને સહયોગી છે, તેથી તેઓ ભાગીદારી વ્યવસાય માં સારી કામગીરી કરશે. તમે ખૂબ જ અસ્વસ્થ અને પ્રેમાળ પરિવર્તન છો, તેથી હંમેશાં મુસાફરી કરવા માંગો છો, અને આ તમને ઘણી બધી મુસાફરી માં ઉત્તમ બનાવે છે જે ઘણી મુસાફરી નો સમાવેશ કરે છે .પ્રકૃતિ દ્વારા કલ્પનાશીલ બનવું તમે સર્જનાત્મક ક્ષેત્રો માં પણ સારા હશો. </p>
    NAMANK_DESC_TEXT3 = <p>જન્મ નંબર 3 નૈતિકતા, દિવ્ય પ્રેમ અને દયા સાથે નો ન્યાય છે અને તે મહાન આગળ વધારનાર તરીકે ઓળખાય છે. તમારી પાસે તમારા જીવન માં તમારી બાજુ કિસ્મત છે. તે તમારા નંબર નો સ્પંદન છે જે તમારા જીવન માટે બધું સારુ આકર્ષે છે અને પરિણામે તમે ચમકતા રહો છો. અત્યંત મહેનતુ તમે કામ પૂર્ણ કરવા માંગો છો. એક આગેવાન જન્મે છે જે આદર આપે છે અને તમારો ધ્યેય શ્રેષ્ઠ છે. </p> <p> <b> કારકિર્દી: </b> તમે સમજદાર ન્યાયાધીશો, કુશળ, વિશ્વ નાં શિક્ષકો અને દાર્શનિક બનાવો. </p>
    NAMANK_DESC_TEXT4 = <p>જન્મ નંબર 4 લોકો ઊર્જા, બળ અને પ્રગતિ દર્શાવે છે. તે એવા લોકો છે જે મન ની ઉચ્ચ શક્તિ ધરાવે છે. આ નંબર ની અજોડ પ્રકૃતિ એ છે કે તે સતત જીવન અને સમાજ માં ફેરફારો નું લક્ષ્ય રાખે છે અને મન ને વાતાવરણ અને સમાજ ની ગુલામી માં થી મુક્તિ થશે. તમે તમારા વર્ષો થી પરિપકવ છો. સંખ્યા ચાર લોકો પણ અસામાન્ય અને અલગ થી આકર્ષાય છે અને કેટલીકવાર નિયમો સામે બળવો કરવા ની જરૂર લાગે છે. </p> <p> <b> કારકિર્દી: </b> જન્મ નંબર ચાર ઉત્તમ લેખક, ઉદ્યોગપતિ અને રાજકારણીઓ બનાવે છે. </p> 
    NAMANK_DESC_TEXT5 = <p>તમે જીવન ના રહસ્યો માં ઊંડો રસ ધરાવો છો. પ્રકૃતિ દ્વારા તમે ખૂબ જ અસ્વસ્થ છો અને હંમેશાં કોઈ નવા ગંતવ્ય પર જવા નું એક નવું લક્ષ્ય છે કારણ કે તમારી એકમાત્ર મૂળભૂત જરૂરિયાત હંમેશાં ચાલે છે. વ્યક્તિ તરીકે તમારી એક સારી અને ખરાબ બાજુ બંને છે. તમે બાળકો સાથે સમય પસાર કરવા નું પસંદ કરો અને કુટુંબ ની ચિંતાઓ ને પ્રથમ સ્થાને મૂકો. તમે આધ્યાત્મિકતા તરફ વળ્યા છો અને ધાર્મિક પણ છો. </p> <p> <b> કારકિર્દી: </b> તમે રમત નો આનંદ માણો છો અને તેથી તેને કારકિર્દી તરીકે લઈ શકો છો. તમારા બૌદ્ધિક મન થી તમે શિક્ષક અને સંશોધક ની જેમ અત્યંત તંદુરુસ્ત છો.</p>
    NAMANK_DESC_TEXT6 = <p>તમે એક કલાકાર અને સૌંદર્ય તરીકે જન્મ્યા છો અને કલા તમને આકર્ષે છે. સૌંદર્ય માત્ર શબ્દશઃ અર્થ માં નથી પરંતુ તમે સંબંધો વચ્ચે સૌંદર્ય ને પણ પ્રેમ કરો છો. તમે સંઘર્ષો નો પ્રયાસ કરો અને ટાળો કારણ કે વિવાદ અથવા મતભેદ તમને અસ્વસ્થ બનાવે છે. તમારી પ્રેમાળ પ્રકૃતિ તમને ગરમ, આવશ્યક અને સુંદર વ્યક્તિ તરીકે જુએ છે. તમે બીજાઓ ને ખુશ કરવા માંગો છો. તમે કુદરત દ્વારા આનંદપ્રદ અને આશાવાદી છો. </p> <p> <b> કારકિર્દી: </b> તમે સંગીત, નૃત્ય કવિતા અને સર્જનાત્મકતા સાથે જે કાંઈ કરવા નું છે તેમાં રસ છે. </p>
    NAMANK_DESC_TEXT7 = <p>તમે તમારી વ્યક્તિત્વ મૌલિક્તા અને સ્વતંત્રતા માટે જાણીતા છો. તમે જે પક્ષી ની જેમ પરંપરાગત બંધન તોડવા અને સમાજ ના ધોરણો અને પ્રતિબંધો સ્થાપિત કરવા માંગો છો તેવો મુક્ત ઉત્સાહ છે. લોકો તમને રહસ્ય નો થોડો ભાગ અને તમારી ગેરહાજર માનસિકતા ઘણી વાર શોધે છે. સંખ્યા 7 લોકો સામાન્ય રીતે કોઠાસૂઝ ધરાવનાર અને વિશ્લેષણાત્મક છે અને પરિસ્થિતિઓ અને સમસ્યાઓ માં કારણ અને અસર નિર્ધારિત કરી શકે છે. જીવન માં, તમે જે અનુભવો છો તે હાંસલ કરવા માટે તમે ઘણી વ્યક્તિગત બલિદાન કરો છો અને તમારા માટે જ છે. </p><p><b> કારકિર્દી: </b>તમે ઘણા સાહસી છો, ઘરે થી દૂર નવા અને અદભુત નો શોધ માટે જશો. પોતાના સહજ સ્વભાવ ના કારણે પૂર્વ માં થનારી ઘટના ના આભાસ માટે વધારે પ્રવીણ છો. તમે એવા કોઈ વ્યવસાય થી જોડાવા માંગો છો જે રોમાંચકારી અને તમારી તૃષ્ણા સંતુષ્ટ કરવા વાળો હોય.</p>
    NAMANK_DESC_TEXT8 = <p>જન્મ નંબર 8 વ્યક્તિ ગંભીર અને દાર્શનિક છે. સંખ્યા 8 નિશ્ચિતતા, સતતતા અને અધ્યયન ની પ્રતીક કરે છે. બહાર ખડતલ હોવા છતાં, તમારા અંદર એક ગરમ અને સંભાળ રાખનાર વ્યક્તિ છે. ભવિષ્ય વિશે તમે સાવચેત રહો છો અને હંમેશા સાવચેતી સાથે નિર્ણય કરો. તમે તમારા ધ્યેયો સુધી પહોંચવા માટે ભારે તાણ માં થી પસાર થઈ શકો છો. </p> <p> <b> કારકિર્દી: </b> તમે મહત્વાકાંક્ષી છો અને લોકો ની આંખ માં ઘણી વાર સફળ છો. તમે અન્ય લોકો ને પ્રેરણા આપો છો. પરિણામે તમે મહાન મેનેજર, પ્રશાસનિક અધિકારી અને વ્યવસાયી માણસ બનાવો છો. સરકારી નોકરીઓ એ એક વધુ સારો વિકલ્પ છે. </p>
    NAMANK_DESC_TEXT9 = <p>સ્વભાવ થી તમે મજબૂત ઇચ્છા ધરાવતા અને હિંમતવાન વ્યક્તિ છો. તમે હળવા નેતૃત્વ કરો છો પરંતુ સંઘર્ષ અને વિરોધ ને દૂર કરી શકો છો. જો તમે બીજા લોકો સામે ઊભા રહો છો, તો પણ તમે પ્રેમ કરો છો અને તેનો આદર કરો છો. તમે તમારી પોતાની નસીબ ના માલિક બનવા માંગો છો અને તેથી તમે સરળતા થી એક મહાન નેતા બની શકો છો. તમે ખૂબ જ માનવીય વ્યક્તિ છો અને તમારા મિત્રો ને તમારી સાથે લઈ જવા માં વિશ્વાસ કરો છો. તમે હંમેશાં અન્ય લોકો ને મદદ કરવા માંગો છો તે તક આપવા માં આવે છે. તમે કુટુંબ અને ઘર સાથે મજબૂત રીતે જોડાઓ અને તેમની સાથે સમય વિતાવવા નો આનંદ માણો. </p> <p> <b> કારકિર્દી: </b> લશ્કરી, રાજકારણ, શિક્ષણ અને સામાજિક સેવાઓ તમારા માટે કાર્ય કરે છે. </p>
