
ASTRO_SKETCH_DATA_MALE = <p><b> अॅस्ट्रो स्केच: </b> जन्म तपशिलावर आधारित छोटी रूपरेखा. <br/> मेष पुरुषाच्या अंगी नेतृत्वाचे गुण असतात व त्याला सर्व गोष्टीत पुढाकार घ्यायला आवडते. त्याला अनपेक्षित कृती आवडतात, तो कणखर असतो व कठीण प्रसंगी आपली आत्मीय शक्ती दाखवतो. स्वाभिमानी, गमतीशीर व धडाडी असतो. जीवनाची उज्वल बाजू बघणे पसंद करतो,  आक्रमक व फतकल असतो. खोटी प्रशंसा त्याला आवडत नाही - जसा आहे त्यासाठी कोणी त्याचा द्वेष केला तरी चालेल पण जे तो नाही त्याबद्दल त्याच्यावर प्रेम करणे त्याला पसंद नाही. नातेसंबंधात त्याला मोकळा श्वास घ्यायला थोडी जागा असलेली आवडते. वायात्तिक संबंधात तो प्रेमळ व पोषक असेल. वर्तमानात जगतो त्यामुळे भूतकाळातल्या अनुभवांची जाण ठेवत नाही. </p><p><b>मेष राशीखाली जन्मलेल्या काही प्रसिद्ध व्यक्ती : </b><br/>जया प्रदा, ममता कुलकर्णी, राणी मुखर्जी, जितेंद्र</p><p><b>मेष राशीच्या व्यक्तींची साधारण लक्षणे : </b><br/><b>सकारात्मक : </b>धडाडी, उत्साही, शूर व हजरजबाबी <br/><b>नकारात्मक :  </b>मतलबी, रागीट, अवेगशील व अधीर</p><p><b>मेष व चंद्र राशी अनुरूपता:</b> मिथुन, सिंह, धनु व कुंभ</p>#<p><b> अॅस्ट्रो स्केच: </b> जन्म तपशिलावर आधारित छोटी रूपरेखा. <br/>वृषभ पुरुषाचे व्यक्तिमत्व आकर्षक व बोलके असते. स्वतःकडे ध्यान ओढून घ्यायची क्षमता त्याच्यात असते व सर्वत्र त्याच्या सभोवती त्याचे प्रशंसक असतात. संवाद साधणे त्याला सहज जमते व आपल्या शैलीने तो सहज मने जिंकून घेतो. त्याची सर्वात मोठी देणी आहे त्याचा सोशिकपणा - कोणत्याही बिकट परिस्थितीत शांत मानाने तो तोड काढू शकतो. तुम्हाला त्याची भावनिक व नैतिक शक्ती आवडेल, तो नेहमी तुमची साथ देईल. त्याचे चांगले गुण असले तरी त्याची अधिकारवृत्ती व हट्टीपणा त्रास देऊ शकतो. </p><p><b>वृषभ राशीखाली जन्मलेल्या काही प्रसिद्ध व्यक्ती : </b><br/>अंजली जठार, माधुरी दिक्षित, मौशमी चटर्जी, पूजा बेदी</p><p><b>वृषभ राशी व्यक्तीची साधारण लक्षणे : </b><br/><b>सकारात्मक:</b> सोशिक, दिलदार, कनवाळू, चिकाटीचा, शांत<br/><b>नकारात्मक :  </b>  मत्सरी, ताठर, अधिकारवृत्तीचा </p><p><b>वृषभ चंद्र रास अनुरूपता : </b>कर्क, कन्या, मकर, मीन</p>#<p><b> अॅस्ट्रो स्केच: </b> जन्म तपशिलावर आधारित छोटी रूपरेखा. <br/>मिथुन पुरुष आनंदी व चपळ असतो. बहिर्मुख असतो, त्यामुळे उत्तम संवाद साधू शकतो. चतुर व खेळाडू वृत्तीचा असल्यामुळे, असतो त्यापेक्षा वयाने लहान दिसतो, त्यातून त्याचा आयुष्याबद्दलचा उत्साह देखील दिसून येतो. चंचल, जिज्ञासू व रटाळ कामांना कंटालणारा, त्याला रोज नवे आव्हान लागते. असे असले तरी, कधी कधी भलतेच अविश्वसनीय असू शकतो. आपला डाव साधून घेणे व मानसिक डावपेच करणे यामुळे तो दुतोंडी वाटू शक्तो. भावनांनी वाहून जाणारा प्रेमी हा नव्हे, तो शांत मानाने सर्व कामे उरकतो. </p><p><b>मिथुन राशी खाली जन्मलेल्या काही प्रसिद्ध व्यक्ती : </b><br/>डिम्पल कापडिया, शिल्पा शेट्टी, मिथुन चक्रवर्ती, परेश रावल</p><p><b>मिथुन राशीची साधारण लक्षणे : </b><br/><b>सकारात्मक: </b>चतुर , आनंदी, जुळवून घेणारा<br/><b>नकारात्मक :  </b>  अस्वस्थ, उथळ, चलाख, असंगत</p><p><b>मिथुन चंद्र रास अनुरूपता : </b> मेष, सिंह, तुळ, कुंभ</p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> कर्क राशीचा पुरुष हा संवेदनशील, भावनिक आहे.  रोमॉण्टिक असतो आणि आपल्या बोलण्याने तो अन्य व्यक्तींवर भुरळ पाडू शकतो. त्याच्यावर प्रेम करणारे, त्याची काळजी घेणारे आणि वेळोवेळी पाठिंबा देणऱ्या व्यक्तींना कर्क राशीचा पुरुष आपले मित्र बनवतो. आपले घर, घरातील प्रियजन यांच्या सहवासात ही व्यक्ती नेहमीच सर्वाधिक आनंदी राहते. असंवेदनशील आणि दुसऱ्यांची काळजी न घेणाऱ्या व्यक्तींचा ही माणसे तिरस्कार करतात. कडक,अप्रिय बोलले की ही माणसे लगेच दुखावली जातात. अशिष्ट पद्धतीने वागणारे पुरुष आणि स्त्रिया यांच्याशी ही माणसे कधीच मैत्री करीत नाहीत. ही माणसे मनापासून, निष्ठेने नातेसंबंध जपणारी असतात. त्यामुळे सगळ्यांना हवीहवीशी असतात. त्याचबरोबर या माणसांची विनोदबुद्धी सतत जागृत असते त्यायोगे अनेकांची मने ते जिंकून घेतात. हे लोक कंजूष किंवा खर्चाची उधळपट्टी करणारे नसले तरी जवळच्या व्यक्तींना सुंदर भेटवस्तू देऊन त्यांचे लाड कसे पुरवायचे हे यांना चांगलेच ठाऊक असते. क्वचितप्रसंगी यांचे वर्तन विचित्र आणि अचानक बदलण्याची शक्यता असते. परंतु,या व्यक्तींवर भरोसा ठेवता येतो आणि त्यांच्या हेतूंबद्दल कधीच शंका घेऊ नये</p><p><b> कर्क राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> प्रियांका चोप्रा, ज्युलिया रॉबर्ट्स, टॉम क्रूझ, प्रिन्सेस डायना, पामेला अॅण्डरसन.</p><p><b>कर्क राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> भावनिक, प्रेमळ, उत्स्फूर्त व अंतर्ज्ञानी, कल्पनाशील,  धूर्त, सजग, संरक्षक, सहानुभूतीपूर्ण. <br /><b> नकारात्मक गुणविशेष: </b> सतत बदलणारे, मनोदशेवर अवलंबून वागणारे, अति भावनिक, शीघ्रकोपी, लगट करणारे. </p><p><b> कर्क या चंद्रराशीची अनुरूप असणाऱ्या राशी: </b> मेष, वृषभ, कर्क, कन्या, तूळ आणि मकर </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> सिंह राशीचे पुरुष हे वरून कडक स्वभावाचे दिसतात परंतु  मुळात भावूक वृत्तीचे असतात. विशेषत: अवतीभवती महिला असतील तर ते खूपच उदारपणे वागतात. कदाचित ते या महिलांना तसे दर्शविणार नाहीत परंतु आपल्या जवळच्या महिलांशी ते स्त्रीदाक्षिण्य ठेवून वागतात. नेहमी चर्चेत राहणे यांना आवडते. लोकांचे लक्ष आपल्याकडे वेधून घेणे त्यांना खूप आवडते. त्याचबरोबर ही माणसे खिलाडूवृत्तीची आणि काही वेळा अंधश्रद्धाळू असतात. परिस्थिती आपल्या हातात ठेवणे यांना आवडते आणि त्याचप्रमाणे आपल्या अवतीभवतीच्या लोकांनाही ताब्यात ठेवणे हा यांचा स्वभाव असतो. याचे महत्त्वाचे कारण म्हणजे जन्मत:च ही माणसे नेतृत्व करणारी असतात, दुसऱ्यांवर वर्चस्व गाजविणे आणि त्यांना आपल्या अमलाखाली ठेवण्याचा प्रयत्न करतात. त्यांचे विभ्रम आणि सतत दुसऱ्यांना ताब्यात ठेवण्याचा प्रयत्न करणे यामुळे दुसऱ्याला त्रास होऊ शकतो आणि त्यामुळे या व्यक्तींबाबत गैरसमजही होतात. अव्यवहारी, ताठर वागण्यामुळे अनेकदा गैरसमज होतात. अचानक अद्भूत गोष्टी यांना सांगितल्या तर त्यांना ते खूप आवडते. मग ते अशी आश्चर्यवार्ता देणाऱ्या आपल्या प्रियजनांवर भेटवस्तूंचा वर्षाव करतात. त्यामुळे अनेकदा ही माणसे अतिखर्च करणारी ठरतात. यांचे फुकाचे कौतुक करणाऱया लोकांवरही ही प्रेमाचा, भेटवस्तुंचा वर्षाव करतात. या माणसांचे मित्र खूप असतात आणि लोकांमध्ये मिसळणारी ही माणसे असतात. </p><p><b> सिंह राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> मनिषा कोईराला, काजोल, राखी, मनोज कुमार, गुलजार. .</p><p><b>कर्क राशीच्या व्यक्तीमध्ये आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> डावपेचात्मक, रोमॉण्टिक, आकर्षक, शांत, आदर्शवादी.  <br /><b> नकारात्मक गुणविशेष: </b> निर्नायकी, सतत बदलणारी आणि सहज भुलणारी किंवा साधीभोळी. </p><p><b> सिंह या चंद्र राशीशी अनुकूल असणाऱ्या राशी: </b> कर्क, मीन </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> कन्या राशीच्या पुरुषाला प्रत्येक बारीकसारीक गोष्टींत परिपूर्णता हवी असते. आयुष्यात प्रत्येक निर्णय घेताना तो त्याच्या मनाचाच कौल घेतो. तर्कसुसंगत आणि विश्लेषणात्मक पद्धतीने जीवनाकडे पाहण्याचा दृष्टिकोन बाळगणारा असतो. आयुष्य, काम आणि नातेसंबंध याबाबतीतही हाच दृष्टिकोन तो नेहमी बाळगतो. या व्यक्तीशी बोलताना तुम्ही तोलूनमापून बोलावे. कारण अडाणीपणे बोलणे, अशिष्ट पद्धतीने वागणे आणि निंदात्मक बोलणे यांना अजिबात आवडत नाही. तुमच्याशी बोलताना या व्यक्ती नेहमीच तुमचे कपडे, वागणेबोलणे, तुम्ही स्वत:ला कसे पेश करता ते निरखून पाहतात आणि तुमची देहबोली, हालचाली तुम्ही काळजीपूर्वक शिष्टसंमत पद्धतीने कराव्यात अशी यांची अपेक्षा असते. याचा अर्थ हे लगेच चिडतात, किंवा नाटकी असतात असा मात्र नव्हे. उलट अशी माणसे सरळ व्यवहारी, सरळसाधेपणाने जगणारी परंतु शिस्तबद्ध जगणारी असतात. जवळचे मित्र आणि प्रियजन यांना जपणे, त्यांच्याशी प्रेमाने वागणारी ही माणसे असतात. दृष्टिकोन विवेकाने वागण्याचा असल्यामुळे ही माणसे कधीही वादविवादात हरत नाहीत आणि अनेक वितंडवाद अगदी सहजतेने सोडवू शकतात. प्रामाणिक, सुनियोजित, समर्पित अशी ही माणसे असून यांच्यावर अवलंबून राहता येते, ती मदत करण्यास तत्पर असतात. अर्थात अनेकदा ती आक्रमक आग्रही होऊ शकतात. </p><p><b> कन्या राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> आशा भोसले, राकेश रोशन, अगाथा ख्रिस्ती, राणी एलिझाबेथ, जोसेफ केनेडी. </p><p><b>कन्या राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> विनम्र, सावध, सतर्क, विश्वसनीय, परिश्रम घेणारी, व्यावहारिक स्वभावाची माणसे असतात.  <br /><b> नकारात्मक गुणविशेष: </b> अति टीका करणारी, रूढीवादी, भडकपणे व्यक्त होणारी किंवा अतिचिकित्सक आणि कटू. </p><p><b> कन्या या चंद्रराशीशी अुनुरूप असलेल्या: </b> वृषभ, मकर </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> तूळ राशीचा पुरुष हा अतिशय रोमॉण्टिक, स्वच्छंदी आणि कलात्मक असतो. इतरांकडून प्रेम आणि आदर मिळण्यास पात्र असतो आणि चतुर, हुशार, आत्मविश्वासी आणि जिंदादिल व्यक्तींकडे लगेच आकर्षित होतो. जोडीदाराला तो स्वत:चे अवकाश देतो आणि असेच स्वतंत्र अवकाश आपल्यालाही मिळावे अशी त्याची अपेक्षा असते. महागडे कपडे, घड्याळे, बूट, ब्रॉण्डेड परफ्यूम्स, संगीत, सिनेमा आणि कला यासाठी खर्च करणे त्याला आवडते. अतिशय प्रगतीशील विचार करण्याची वृत्ती असून प्रसंगी आपल्या अवतीभवतीच्या लोकांची मते स्वीकारून आपल्या विचारात बदल करणेही यांना पसंत असते. फक्त हे विचार तर्कसुसंगत असले पाहिजेत अशी यांची अपेक्षा असते. या व्यक्ती अतिशय गप्पीष्ट असतात. सकारात्मक दृष्टिकोन असलेल्या व्यक्तींचा सहवास यांना आवडतो आणि चांगल्या विषयांवर या व्यक्ती खूप वेळ गप्पा मारू शकतात. अजिबात आळशी नसलेली ही माणसे निर्णय घेताना थोडा वेळ घेतात. कधीकधी या माणसांचे डावपेच त्यांच्या सोबतच्या माणसांना बुचकळ्यात टाकतात. </p><p><b> तूळ राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br />  करिना कपूर, केट विन्स्लेट, रेखा, लता मंगेशकर, अमिताभ बच्चन, महात्मा गांधी. </p><p><b>तूळ राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> व्यवहारचतुर, रोमॉण्टिक, आकर्षक, साधीभोळी, सहजतेने वागणारी माणसे असतात. <br /><b> नकारात्मक गुणविशेष: </b> निर्णय न घेणारी, सहज बदलणारी, कुणीही फसवू शकेल अशी माणसे असतात. </p><p><b> तूळ चंद्र राशीशी अुनुरूप असलेल्या राशी: </b> मेष, कर्क, सिंह, तूळ, धनु आणि मकर </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> वृश्चिक राशीचा माणूस भावूक, हजरजबाबी, हळुवार आणि अतिशय गुप्तता बाळगणारा असतो. भावूक स्वभाव आणि आत्मविश्वासपूर्ण व्यक्तिमत्वामुळे सर्वांचे आकर्षण ठरतात. या माणसांना त्यांची महत्त्वाकांक्षा सतत प्रेरणा देत राहते आणि ही माणसे अनेकदा बंडखोर ठरतात. समाजाने स्थापित केलेले निकष यांना मान्य नसतात. कमालीची देखणे व्यक्तिमत्व असते. थंड स्वभावाची पण भावविभोर, संयमी असतात. कोणतीही कृत्रिम गोष्ट यांना आवडत नाही.  ज्यात काही गम्य नाही अशा रिकामटेकड्या गोष्टीत रमणे यांना रुचत नाही. परिपूर्णतेची आवड असणारी खरीखुरी माणसे यांना आपल्या अवतीभवती असणे आवडते, किंबहुना गरजेचे वाटते. सतत नवं आणि मन रमेल असे यांच्याकडे नेहमी काहीतरी सांगण्यासारखे असते. त्यामुळे यांच्या सहवासात तुम्ही कंटाळत नाही. ही माणसे अवतीभवती असतील तिथले वातावरण कंटाळवाणे होत नाही. त्यामुळे या व्यक्ती मिळूनमिसळून वागणाऱ्या असतात. म्हणूनच यांच्याभोवती नेहमी मित्रांचा, प्रियजनांचा गराडा असतो. परंतु, काहीवेळा नातेसंबंधांमध्ये या व्यक्ती अपेक्षा ठेवतात आणि त्यांना समोरच्या व्यक्तींकडूनही त्याच पद्धतीचे प्रेम अपेक्षित असते. अतिशय शांत आणि परिपूर्ण असलेल्या या व्यक्तींकडे प्रचंड ऊर्जा असते जी चुंबकीय असते आणि या ऊर्जेचे यांना व्यसन जडलेले असते. </p><p><b> वृश्चिक राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> जवाहरलाल नेहरू, इंदिरा गांधी, शाहरूख खान, बिल गेट्स, ब्रायन अॅडम्स, डेमी मूर. </p><p><b>वृश्चिक राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> भावनिक, तीव्र, स्वत:बद्दल व दुसऱ्यांबद्दल आदर बाळगणारी, संवेदनशील, अंतर्ज्ञानी, मादक, गूढतावादी, भावूक.  <br /><b> नकारात्मक गुणविशेष: </b> मत्सरी, क्रोधी, जबरदस्ती करणारी, विक्षिप्त, हट्टी, आतल्या गाठीच्या व्यक्ती. </p><p><b> वृश्चिक या चंद्रराशीची राशीशी अनुरूप असलेल्या राशी: </b> कर्क आणि मीन </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> धनु राशीचे पुरुष सदासुखी राहणारे असतात. डावपेचात्मक धूर्त पद्धतीने वागणे यांना जमत नाही. सरळ, स्पष्टवक्ती ही माणसे असतात. प्रियजन असतील तेव्हा ही माणसे मित्रत्वाने वागतात, मनमोकळेपणे आणि दुसऱ्याने ऐकत राहावे असे बोलतात. भूतकाळाचे ओझे वाहणे यांना पसंत नसते आणि सदोदित ही माणसे वर्तमानकाळात जगतात, व्यवहारी जगात वावरतात. जीवनातील दु:खदायक खेदजनक प्रसंग उद्भवले तरी ही माणसे निराशावादी होत नाहीत आणि त्यांच्याजवळ असलेला सकारात्मक दृष्टिकोन कायम त्यांना प्रेरित करीत राहतो. परिस्थिती आव्हानात्मक असेल तरी हे शरण जात नाहीत, शेवटपर्यंत लढत राहतात.  कोणत्याही बाबतीत तक्रार, कुरकूर करण्याचा यांचा स्वभाव नसतो. परंतु कोणी त्यांना खेचण्याचा प्रयत्न केला तर अगदी सहजपणे त्यांच्यावर मात देतात. आज्ञाधारकपणे वागत राहण्यापेक्षा चांगली उदाहरणे यांना दाखवून दिली तर या व्यक्तींना प्रेरणा मिळते. सरळ थेटपणे बोलण्यामुळे काही वेळा या व्यक्ती कठीण परिस्थितीला सामोरे जातात आणि त्यांचा सरळपणा, प्रामाणिकपणा अनेकदा त्यांचा गुन्हा ठरतो. या माणसांना प्रवासाची आवड असते व दैनंदिन जीवनाच्या रहाटगाडग्यात घुटमळत राहणे अजिबात आवडत नाही. तसेच रोजचा तोचतोचपणा याचा यांना कंटाळा येतो. </p><p><b> धनु राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> दिलीप कुमार, शत्रुघ्न सिन्हा, विन्स्टन चर्चिल, धर्मेन्द्र. </p><p><b>धनु राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> आशावादी, प्रसन्न, स्वत:वरही विनोद करणारी, प्रामाणिक, तत्वज्ञानी.  <br /><b> नकारात्मक गुणविशेष: </b> बेफिकीर, आंधळेपणाने आशावाद बाळगणारी, चातुर्याचा अभाव, अधीर. </p><p><b> धनू या चंद्रराशीची राशीशी अनुरूप असलेल्या राशी: </b> कर्क, मीन राशी </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> मकर राशीचे पुरुष विनम्र असले तरी सुरुवातीला या व्यक्तींशी संवाद साधणे कठीण असते. मनातून संवेदनशील असले तरी आपण असे आहोत हे दाखवून न देणे हा यांचा स्वभाव असतो. अंतर्मुख, लाजाळू स्वभावाची ही माणसे जवळच्या मित्रांजवळच व्यक्त होतात, खुलून बोलतात. अतिशय चांगल्या ओळखीच्या असलेल्या मित्रांमध्येच ही माणसे रमतात. अतिशय चांगली विनोदबुद्धी असलेली ही माणसे, तुमचा सहवास त्यांना आवडत असेल तर आपल्या हजरजबाबीपणाची झलक दाखवतात. खरेतर चंचल स्वभाव नसला तरी अनेकदा यांचा मूड बदलला तर तुम्ही या व्यक्तींना असंवेदनशील मानता आणि क्वचितप्रसंगी यांच्या अशा स्वभावामुळे लोक दुखावाले जातात. परंतु, मुळात मनातून या व्यक्ती कमजोर असतात. विशेषत: प्रिय व्यक्तीच्या बाबतीत असुरक्षिततेची भावना यांना अधिक जाणवते. पैसे वाचविणे आणि खर्च करताना अतिशय काळजीपूर्वक खर्च करण्याकडे यांचा कल असतो. अतिशय निकड असेल तरच खर्च करतात. नि:संशयपणे ही माणसे महत्त्वाकांक्षी असतात पण त्यासाठी स्वत:चे कुटुंब आणि त्यांच्याप्रती असलेली जबाबदारी ही माणसे कधीच विसरत नाहीत. </p><p><b> मकर राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> अनु अग्रवाल, रीना रॉय, सलमान खान, अनिल कपूर, जावेद अख्तर, नाना पाटेकर. </p><p><b>मकर राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> व्यवहारी, महत्त्वाकांक्षी, सहनशील, काळजी घेणारी, बुद्धिमान. <br /><b> नकारात्मक गुणविशेष: </b> निराशावादी, दैववादी, कंजूष, अनिच्छेने वागणारी माणसे. </p><p><b> मकर चंद्रराशीची राशीशी अनुरूप असलेल्या राशी: </b> वृषभ व कन्या </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> कुंभ राशीचा पुरुष हा अतिशय स्वावलंबी, हुशार आणि स्वप्नाळू असतो. भावविभोर, अननुमेय आणि समजावून घेण्यासाठी अतिशय कठीण अशा स्वभावाचा असतो. समाजाने घालून दिलेले निकष तो मानत नाही तर स्वत: नियम घालून देतो. इतरांच्या आयुष्यात ढवळाढवळ न करणारा हा माणूस इतरांनीही तसेच वागावे अशी अपेक्षा ठेवतो. कारण त्याला स्वत:च्या पद्धतीने आयुष्य जगायला आवडते. काही वेळा अनासक्त आणि रुक्ष वाटणारी ही माणसे असल्यामुळे अनेकांना असंवेदनशील वाटतात. परंतु हे खरे नाही, उलट ही माणसे इतरांची काळजी घेणारी असतात. प्रत्येकाला समानतेने वागविणे याकडे यांचा कल असतो. दिवसाढवळ्याही स्वप्नं पाहणारी ही माणसे अलिप्त राहणे पसंत करणारी असतात. अनेकदा तंद्रीत आहेत असे वाटणारी माणसे अतिशय सजग, निरीक्षण करणारी असतात. जग काय म्हणते याची हे फारशी फिकीर बाळगत नाहीत आणि विवक्षित गोष्टी करताना जगानेही आपल्याकडे लक्ष देऊ नये अशी अपेक्षा बाळगून असतात. त्याचबरोबर तुम्हाला गमतीदार गोष्टींमध्ये गुंगवून ठेवणे याकडे यांचे लक्ष असते. </p><p><b> कुंभ राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> ऊर्मिला मातोंडकर, प्रीती झिंटा, वहिदा रहमान, सुभाष घई. </p><p><b>कुंभ राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b>मैत्रीपूर्ण वागणारी, मानवतावादी, अस्सल, स्वावलंबी, बुद्धिमान, नव्याचा शोध घेणाऱया व्यक्ती. <br /><b> नकारात्मक गुणविशेष: </b> अजिबान भावनिक नसलेली, अनासक्त, अननुमेय, जिद्दी, भावहीन स्वभावची माणसे.  </p><p><b> कुंभ चंद्रराशीची राशीशी अनुरूप असलेल्या राशी: </b> मिथुन व तूळ </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/>मीन राशीचे पुरुष अतिशय हुशार आणि कलात्मक असतात. गुप्त, गूढ विज्ञानाकडे यांचा नैसर्गिकदृष्ट्याच ओढा असतो. बदल सहजपणे स्वीकारतात. जीवनाकडे पाहण्याचा सर्वसमावेशक व लवचिक दृष्टिकोन बाळगतात. संवेदनशील व स्वत:बद्दल आग्रही अशी ही माणसे असतात. प्रत्येक बाबतीत आशावादी दृष्टिकोन बाळगणारी असतात. कल्पनाशक्ती हाच यांच्या यशाचा आणि अपयशाचा मुख्य घटक असतो. अनेकदा भावविभोर होतात. विनाकारण यांचा मूड बदलतो. आग्रही असतात. अनेकदा एकाचवेळी आग्रही आणि समजूदारही असतात. कोणतीही गोष्ट लादली की यांना आवडत नाही आणि आपल्याला हवे तेच करणे याकडे यांचा कल दिसून येतो. एखाद्या व्यक्तीला भेटल्यानंतर अल्पावधीत त्या माणसाची मानसिकता यांना चटकन समजते. </p><p><b>मीन राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> प्रीती झिंटा, चेल्सा क्लिंटन, अल्बर्ट आईन्स्टाईन, मायकलेन्जेलो. </p><p><b>मीन राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> सर्जनशील, गुप्तता बाळगणे आवडणारी, दयाळू, निस्वार्थी, सहानुभूती दाखवणे.  <br /><b> नकारात्मक गुणविशेष: </b> पलायनवादी, आदर्शवादी, गुप्तता बाळगणारी, कमकुवत इच्छाशक्ती असलेली. </p><p><b> मीन या चंद्रराशीची राशीशी अनुरूप असलेल्या राशी: </b> वृषभ, मिथुन, कन्या, धनु, मकर, मीन</p>
ASTRO_SKETCH_DATA_FEMALE = <p><b> अॅस्ट्रो स्केच: </b> जन्म तपशिलावर आधारित लघु रूपरेखा. <br/> मेष राशीच्या स्त्रिया या जन्मत:च नेतृत्वगुण असणाऱ्या आणि कोणतीही गोष्ट सुरू करण्यास पुढाकार घेणाऱ्या असतात. अत्यंत कठीण परिस्थितीत देखील टिकून राहतात आणि भयंकर अशा दुखद घटनांवर त्या मात करतात. मेष राशीची स्त्री ही स्वतंत्र विचारांची, चिंतामुक्त आणि धाडसी विचारांची असते. ती करारी आक्रमक असून कायम सकारत्मक विचारांमुळे भविष्याकडे पाहत असते. तिला खुशामत आवडत नाही, मात्र मनापासून केलेलं कौतुक आवडत. संशयीपणाचा ती तिरस्कार करते. ती पझेसिव्ह असते,  कोणाच्या अधिपत्याखाली राहणे तिला जमत नाही. तिच्या मूळ स्वभावानुसार ती खूप प्रेमळ, कोमल हळुवार, निष्ठावंत आणि आश्वासक विचारांची असते. बहुतांशपणे लग्नानंतर देखील मेष राशीच्या स्त्रिया करिअर सुरू ठेवतात. आव्हाने तिला आवडतात आणि ती चमत्कारावर विश्वास ठेवते. या स्त्रिया भूतकाळात फारशा रमत नाहीत, त्यामुळे तिच्याकडून भविष्यात भूतकाळातील चुका वारंवार होण्याच्या संभव असतो. </p><p><b> मेष राशीतील काही प्रसिद्ध व्यक्तिमत्वे: </b><br /> जयाप्रदा, ममता कुलकर्णी, राणी मुखर्जी, जितेंद्र</p><p><b>मेष राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b> धाडसी, उत्साही, निर्भयता, चैतन्यशील आणि हजरजबाबी <br /><b> नकारात्मक गुणविशेष: </b>स्वार्थी,शीघ्रकोपी, चालढकल करणारा आणि उतावीळ </p><p><b> मेष या चंद्रराशीची राशीशी अनुरूप असलेल्या राशी: </b>मिथुन, सिंह, धनु आणि कुंभ</p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> वृषभ राशीच्या स्त्रियांना आकर्षक आणि भुरळ पाडणाऱ्या व्यक्तिमत्वाचे वरदान लाभलेले असते. सहजगत्या मोहिनी पाडणाऱ्या व्यक्तिमत्वामुळे चारचौघांमध्ये त्या कायमच लक्ष वेधून घेणाऱ्या ठरतात. मैत्रीपूर्ण आणि उत्तम संवाद साधण्याची कला त्यांच्याकडे असते. स्वत:च्या अस्तित्वाबद्दल त्या खूप जागरूक असतात. वृषभ राशीची स्त्री ही सर्वसाधारणपणे शांत स्वभावाची असते आणि कठीण परिस्थिती अतिशय संयमाने हाताळते. प्रभावी अशा इच्छाशक्तीमुळे ती कायमच नैतिक आणि भावनिक धैर्य तिच्या अंगी दिसून येते. वृषभ राशीची स्त्री ही विश्वास ठेवण्याजोगी आणि विसंबून राहण्यायोग्य असते. स्वत:च्या वस्तुंबद्दल ती खूप पझेसिव्ह असते. आयुष्य सहज सोप्या मार्गाने जगण्याकडे तिचा कल असतो, तर कधी कधी तिच्या वागण्यात दुराग्रहीपणा डोकावतो. p><p><b>वृषभ राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती: </b><br />अंजली जठार, माधुरी दीक्षित, मौसमी चटर्जी, पुजा बेदी </p><p><b>वृषभ राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुण वैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b>संयम,विश्वसनीय, मायाळू, चिकाटी, शांत<br/><b>नकारात्मक गुणविशेष: </b>द्वेष, पझेसिव्ह, ताठरपणा, self indulgent</p><p><b> या चंद्रराशीची राशीशी अनुरूप असलेल्या राशी: </b>कर्क, कन्या, मकर, मीन </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> मिथुन राशीतील स्त्रिया या आनंदी, आकर्षक आणि संभाषणचतुर असतात.  त्या मानसिकदृष्ट्या खूप सक्रीय असतात आणि त्यांच्या वयापेक्षा त्या खूप तरूण दिसतात. त्यांचा स्वभाव चंचल असून एखाद्या गोष्टीचा त्यांना लगेच कंटाळा येतो. तसेच कोणत्याही एखाद्या गोष्टीवर त्या फार काळ लक्ष केंद्रित करू शकत नाहीत. त्यांना सतत कोणत्या कोणत्या गोष्टीचे कुतूहल असते. तर दुसरीकडे मनातील विचारामध्ये सतत अस्थिरता असल्यामुळे त्यांच्यावर चटकन विश्वास ठेवला जात नाही.  स्वत:चा हेतू साध्य करण्यासाठी दुसऱ्याच्या आयुष्यात, घटनांमध्ये ढवळाढवळ करण्याचा त्यांचा स्वभाव असतो. मोहक वागण्यामुळे अशा व्यक्ती कायमच सर्वांच्या आकर्षणाचे केंद्र ठरतात.  मिथुन राशीतील स्त्रिया त्यांचे सारे निर्णय बहुतांशपणे व्यावहारिकपणे मनाचा कौल घेऊन घेतात. कोणत्याची बौद्धिक गोष्टीचे तिच्या लेखी खूप महत्व असते. </p><p><b>मिथुन राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती: </b><br />डिम्पल कपाडिया, मिथुन चक्रवर्ती, परेश रावल, राजेश रोशन</p><p><b>मिथुन राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b>परिस्थितीशी जुळवून घेणारा, अष्टपैलू, विनोदी, तारुण्य, आनंदी चैतन्यशील <br/><b>नकारात्मक गुणविशेष: </b>चिंतातूर, अंधश्रद्धाळू, कावेबाज, चंचल </p><p><b>मिथुन या चंद्रराशीची राशीशी अनुरूप असलेल्या राशी: </b> मेष, सिंह, तूळ, कुंभ </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> कर्क राशीच्या स्त्रिया या अतिशय हळुवार नाजूक स्वभावाच्या असतात आणि म्हणूनच त्या सहज दुखावल्या जातात.  सर्वसाधारणपणे कर्क राशीचे स्त्री ही रोमँटिक स्वभावाची असते आणि तिला प्रेमाची अपेक्षा असते. तिला सतत आपल्याकडे लक्ष दिलेले हवे असते. टीका तिला सहन होत नाही, नकार पचवू शकत नाही आणि कठोर शब्दांमुळे तिच्या मनावर खोलवर आघात होतात, त्यामुळे कर्क स्त्रीला खूप हळुवारपणे सांभाळावे लागते. स्वीकारलेल नातं अतिशय निष्ठेने सांभाळणे हा तिच्या आत्यंतिक आनंदाचा विषय असतो. तिच्या नर्मविनोदाने ती तुम्हाला कायम आनंदी ठेवू शकते. आपल्या जवळच्या व्यक्तीच्या प्रेमापोटी काळजीने तिचे कोडकौतुक पुरविणे तिला आवडते. तिच्या मूड बदलण्यामुळे कधी कधी तिचे वागणे अचानक नेहमीच्या अंदाज वर्तविण्यापलीकडे जाते, मात्र ती चंचल नाही, तिला कोणालाही दुखवायचे नाही हे आपण लक्षात ठेवायला हवे. </p><p><b>कर्क राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती: </b><br />प्रियांका चोप्रा, ज्युलिया रॉबर्ट्स, टॉम क्रूझ, प्रिन्सेस डायना, पामेला ऑण्डरसन </p><p><b>कर्क राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष : </b> भावनाप्रधान प्रेमळ, उत्स्फूर्त व अंतर्ज्ञानी, कल्पनाशील,  धूर्त, सजग, संरक्षक, सहानुभूतीपूर्ण <br/><b>नकारात्मक गुणविशेष: </b>सतत बदलणारे, मनोदशेवर अवलंबून वागणारे, अतिभावनाप्रधान, तापट, भावनिकदृष्ट्या गळ्यात पडणारे </p><p><b>कर्क या चंद्रराशीशी अनुरूप असणाऱ्या राशी ः </b>मेष, वृषभ, कर्क, कन्या, तूळ, मकर </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> सिंह राशीची स्त्री ही अतिशय संवेदनशील आणि पझेसिव्ह (हक्काविषयी अतिसंवेदनशील) असते.  तिचे वागणे अतिशय शालीन असते आणि सभोवतालच्या व्यक्तींशी ती खूप सभ्यतेने वागते.  तिला खेळात रुची असू शकते, कधी कधी ती मैदानी खेळात प्रावीण्य मिळवू शकते. त्याचबरोबर खूप मोठ्या भव्यदिव्य गोष्टीबद्दल तिला अंधश्रद्धाळू आकर्षण असते. तिच्या निसर्गदत्त शैलीमुळे ती कोठेही, कधीही नेतृत्व करू शकते. त्यामुळेच अशा स्त्रिया वरिष्ठ पदावर पोहचतात. नेतृत्व हे तिच्या स्वभावातच असल्यामुळे कोणा दुसरऱ्याकडून, जोडीदाराकडू होणारे वर्चस्व तिला आजिबात आवडत नाही. तिचा काहीसा संतापाकडे झुकणाऱ्या स्वभावामुळे तिला फारशी लोकप्रियता मिळत नाही. तिचा अपमान होतो तेव्हा ती अतिशय रागावते, संतापते. तिच्यावर केलेली टीका तिला सहन होत नाही. तिच्याकडे दुर्लक्ष आणि तिच्या आज्ञेचे पालन न करणे तिला अजिबात अजिबात आवडत नाही.  तिच्या अहंभावामुळे तिचे वागणे ताठरपणाचे आणि अव्यावहारिक  ठरते. तिच्या प्रत्येक गोष्टीला सर्वानी मान डोलवावी असे तिला वाटते. आर्थिक बाबींचा विचार करता अशा स्त्रिया खूप खर्चिक असू शकतात. खुशामातखोरीवर भाळून खूप खर्च करण्याची शक्यता असते. लोकांनी तिचे फाजील लाड केलेले तिला आवडतात. सिंह राशीच्या स्त्रिया उत्तम यजमान असतात. बहुतांशपणे या स्त्रिया भावनाविरहीत असल्याचे दर्शवितात आणि आपली भावनिक बाजू सहसा उघड करत नाहीत. </p><p><b>सिंह राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती: </b><br />मनीषा कोईराला, काजोल, राखी, मनोज कुमार, गुलजार </p><p><b>सिंह राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b>धोरणी, आकर्षक, शांत, आदर्शवादी, रोमॉण्टिक, <br><b>नकारात्मक गुणविशेष: </b> निर्नायकी, सतत बदलणारी आणि सहज फसणारी किंवा साधीभोळी </p><p><b>सिंह या चंद्रराशीशी अनुरूप असणाऱ्या राशी ः </b>कर्क, मीन </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा.)<br/> कन्या राशीच्या महिला या आपले काम अतिशय चोख बजावणाऱ्या असतात. प्रत्येक कामात अचूकपणा येण्यासाठी त्यांची धडपड असते. विशेषत: अशी स्त्री जेव्हा प्रमुख असते तेव्हा अगदी छोट्या छोट्या कामात देखील तपशीलवारपणा आणि काळजी घेताना दिसतात. ती अतिशय तर्कशुद्ध आणि चिकीत्सक विचारांची असते. उद्धटपणाने वागणे, अयोग्य भाषा वापरणे,  अव्यवस्थित पद्धतीने वागणे आणि चारचौघात प्रेम, स्नेहभाव व्यक्त करणे या गोष्टी तिला अजिबात आवडत नाही. कन्या राशीच्या व्यक्ती या तोलून मापून बोलणाऱ्या वागणाऱ्या असतात. त्यांचा स्वभाव अत्यंत साधा असतो. कुशाग्र बुद्धिमत्ता, उच्च दर्जाचा तार्कीकपणा आणि तीव्र स्मरणशक्ती या गुणांमुळे तिच्या व्यक्तिमत्वाला वेगळीच धार चढते. सम्यक विचारसरणीमुळे कोणताही तंटा-वाद ती सहजपणे योग्य प्रकारे मिटवू शकते. ती अत्यंत कार्यक्षम असते आणि आरोग्याविषयी सजग असते. दुसऱ्यावर गुरगुरणारा स्वभाव जरी चिंतेचे कारण असला तरी तिचे आनंदी आकर्षक वागणे, विनोदी, प्रामाणिक, सुसंघटीत, मदतीस तत्पर आणि कोणत्याही घटनेचा जमिनीवर राहून विचार करणारी महिला असे वर्णन करता येईल. </p><p><b>कन्या राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती:</b><br/>आशा भोसले, राकेश रोशन, अगाथा ख्रिस्ती, राणी एलिझाबेथ, जोसेफ केनेडी </p><p><b>कन्या राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br/><b>सकारात्मक गुणविशेष: </b> सदाचारी विनम्र, सतर्क, विश्वसनीय, परिश्रम घेणारी व्यावहारिक <br/><b>नकारात्मक गुणविशेष: </b> भडकपणे व्यक्त होणारी, अति चिकित्सक, रुढीवादी, कटू </p><p><b> कन्या या चंद्रराशीशी अनुरूप असणाऱ्या राशी </b>वृषभ, मकर</p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> प्रेम व्यक्त करणे हा तूळ राशीच्या महिलेच्या जीवनाचा गाभा असतो. तिच्या जोडीदारावर ते निरातिशय प्रेम करते, त्याची काळजी घेते आणि त्याला पुरेपूर मान देते. तिला हव्या असणाऱ्या व्यक्तीला अतिशय आनंदाने ती स्वत:वर हक्क गाजवू देते. ती शंकेखोर स्वभावाची नसते, आणि इतरांच्या खाजगीपणावर ती कधीच अतिक्रमण करायचा प्रयत्न करत नाही. ती स्वत:चे अवकाश तर जपतेच पण दुसऱ्याला देखील अवकाश देते. उंची अत्तरे, डोळ्यात भारतील असे उंची कपडे, शास्त्रीय संगीत अशा माध्यमातून ती आपल्या संपतीचे प्रदर्शन करू शकते. जर तुम्ही तिला तार्किकपणे स्वत:चा मुद्दा पटवून देऊ शकलात तर ती आपली हार मान्य करते. ती प्रचंड बडबडी असली तरी तिला उच्च दर्जाची बौद्धिक आणि बुद्धिमान लोकांशी केलेली चर्चा आवडते. तिचे मोहक स्मित आणि तोलून मापून असते मात्र तिचे हसतखेळत वागणे अनेकांना जिकू शकते. तिला चारचौघात वावरायला आवडते, तसेच वेळप्रसंगी गरजेला धावून येणारी ती मैत्रीण असते. मात्र कोणताही निर्णय घेताना तिला नेहमीच खूप वेळ लागतो. कधी कधी ती तिच्या आदर्शांशी तडजोड करते आणि अधिक सोयीस्कर मार्ग स्वीकारते. अर्थात त्यामुळे लोकांना तिच्याबद्दल उगाचच संशय वाटू शकतो.</p><p><b>तूळ राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती: </b><br />केट विन्स्लेट, रेखा, लता मंगेशकर, करीना कपूर, अमिताभ बच्चन, महात्मा गांधी,  </p><p><b>तूळ राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये:</b><br/><b>सकारात्मक गुणविशेष: </b> धोरणी, प्रेम व्यक्त करण्याचा स्वभाव (रोमँटिक), साधीभोळी, आदर्शवादी <br/><b>नकारात्मक गुणविशेष: </b>निर्णय न घेणे, सहज बदलणे, कुणीही फसवू शकेल असे</p><p><b>तूळ या चंद्रराशीशी अनुरूप असणाऱ्या राशी </b>मेष, कर्क, सिंह, तूळ, धनु आणि मकर </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> वृश्चिक राशीची महिला ही अतिशय गुप्तता बाळगणारी, सक्षम  असते. स्वत:वर असणारा ठाम विश्वास, अंतर्ज्ञान यामुळे तिला विरोध करणे शक्य होत नाही. स्वत:चे गुपित अजिबात न सांगता दुसऱ्याच्या पोटात शिरून त्याचे गुपित उलगडणे हे तिला आवडते. अत्यंत कामुक, मुडी, थंड आणि तरी देखील समतोल अशा व्यक्तीमत्वाच्या वृश्चिक राशीच्या स्त्रीला अंधश्रद्धा आणि उथळ गोष्टीत अजिबात इंटरेस्ट नसतो. अतिशय कुशलतेने संपर्क साधते आणि संबध जोडण्याची तिची कला अजोड असते. त्यामुळे मित्र मंडळी, आणि कुटुंबीय यामध्ये ती लोकप्रिय असते. तिच्या धडकी भरविणाऱ्या आग्रहीपणामुळे मुळे नातेसंबंधात ती खूप हट्टी असू शकते, तसेच तिचे प्रेमाचे व्यसन लागू शकते. तिच्यातील प्रचंड उर्जा, आमिष, दुःख, निराशा आणि तिचा संतापी स्वभाव याचा परिणाम स्फोटक होऊ शकतो. तिचा हा संवेदनशील स्वभाव हा दुधारी तलवारी सारखा आहे. एखाद्या गोष्टीमुळे दुखावणे हे तिच्यासाठी एकदम नैसर्गिक आहे. </p><p><b>वृश्चिक राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती:</b><br/>ऐश्वर्या राय, इंदिरा गांधी, जवाहरलाल नेहरू, शाहरुख खान, बिल गेट्स, ब्रायन अडमस, डेमी मूर </p><p><b>वृश्चिक राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये:</b><br/><b>सकारात्मक गुणविशेष: </b> भावनिक, तीव्र, स्वतःबद्दल आणि दुसऱ्याबद्दल आदर बाळगणारी, संवेदनशील, अंतर्ज्ञानी, मादक, गुढतावादी, भावूक<br/><b>नकारात्मक गुणविशेष: </b> मत्सर, क्रोधी, जबरदस्ती करणारी, संकी, हट्टी, रहस्य बाळगणारी</p><p><b>वृश्चिक या चंद्रराशीशी अनुरूप असणाऱ्या राशी </b>कर्क, मीन.</p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> धनु राशीच्या महिलांचे व्यक्तिमत्व आनंददायी, मैत्रीपूर्ण असते. या राशीच्या महिला बडबड्या असल्या तरी स्पष्टवक्त्या असतात. त्याच्या या थेट बोलण्यामुळे त्या व्यावहारिकपणे जगतात. त्या आशावादी असतात मात्र असमंजस नसतात. एखाद्या प्रसंगी त्या सर्व घटकांचा अभ्यास करतात, त्याच्या शक्य परिणामांची चिकित्सा करता आणि चांगल्यासाठीच बदल होण्याची अपेक्षा करतात. सर्वसाधारणपणे धनु राशीच्या महिला शांत असतात. पण जर तुम्ही तिच्याशी उद्धटपणे वागून तिचे मन दुखावले तर मात्र ती त्याची सव्याज परतफेड करते. तिचे व्यक्तिमत्व अत्यंत स्वतंत्र असते आणि तिचे स्वातंत्र्य तिला अत्यंत प्रिय असते. कुटुंबाशी जवळीक असते मात्र त्यांत त्या फारसे गुंतत नाहीत. धनु राशीच्या महिलांचे परिणामाची पर्वा न करता बोलणे कधी कधी त्यांना महागात पडू शकते इतके की त्याचीच परिणीती नातेसंबध दुरावण्यात देखील होऊ शकते. त्यांच्या प्रामाणिक आणि थेट बोलण्यातून नकारत्मक सूर उमटत असला तरी अशा व्यक्तींच्या बोलण्यात दांभिकपणा नसतो. त्यांच्या पटकन दुखवले जाऊ शकते आणि त्या स्वतःचा बचाव करू शकत नाहीत. </p><p><b>धनु राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती: </b><br />धर्मेंद्र, शत्रुघ्न सिन्हा, दिलीप कुमार, विन्स्टन चर्चिल</p><p><b>धनु राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b>आशावादी, प्रसन्न, स्वत:वरही विनोद करणारी, प्रामाणिक, तत्वज्ञानी, <br/><b>नकारात्मक गुणविशेष: </b>बेफिकीर, आंधळेपणाने आशावादी, चातुर्याचा अभाव, अधीर, <p><b>धनु  या चंद्रराशीशी अनुरूप असणाऱ्या राशी </b>कर्क, मीन </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> मकर राशीच्या महिला या स्वत:ला एका मर्यादेत बांधून घेणाऱ्या असतात, त्यामुळेच सुरवातीस त्यांच्याशी चटकन संवाद साधणे सोपे नसते. स्वत:च्या आचरणाबद्दल त्या खूप जागरूक असतात. त्यांचे मित्र मंडळ मोजकेच पण अतिशय जवळचे असते, ज्यांच्या सोबत त्या उत्तम प्रकारे मैत्री / साहचर्य जपतात. मकर राशीच्या महिला या मोजकेच आणि जेव्हा गरज असेल तेव्हाच बोलतात. वाचाळपणा अजिबात नसतो. त्यामुळे एकाच वेळी त्यांचे बोलणे विनोदी, थट्टेखोर पणाचे आणि तितकेच शांत संयमी असते. त्यांचा मूड वारंवार बदलू शकतो आणि एकदा का तुमच्या सोबत सुरक्षित वाटले तर त्या आपले प्रेम आणि आवड मोकळेपणाने व्यक्त करतात. स्वत:च्या पैशाबद्दल अतिशय जबाबदारीने वागतात. विचार करून खर्च करतात. त्याचबरोबर काहीशा हट्टीदेखील. मकर राशीच्या व्यक्ती जरी स्वत:च्या करिअर बद्दल जागरूक असल्या तरी आपल्या कुटुंबाची चांगलीच काळजी घेतात आणि उत्तम गृहिणी देखील असतात.</p><p><b>मकर राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती: </b><br/>अनु अग्रवाल, रीना रॉय, सलमान खान, अनिल कपूर, जावेद अख्तर, नाना पाटेकर</p><p><b>धनु राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b>व्यवहारी, महत्वाकांक्षी, सहनशील, काळजी घेणारी, बुद्धीमान<br/><b>नकारात्मक गुणविशेष: </b>निराशावादी, दैववादी, कंजूष, अनिच्छेने वागणारी </p><p><b>धनु या चंद्रराशीशी अनुरूप असणाऱ्या राशी </b>वृषभ, कन्या </p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/> कुंभ राशीच्या महिला या मुक्तपणाच्या प्रेमात असतात. त्या स्वकेंद्रित असून बुद्धिमान आणि स्वप्नाळू असतात. त्यांचे वर्तन इतरांसाठी कायमच एक गुपित असून त्यांचे वर्तनाच अंदाज बंधने अवघड असते. त्या कधी कधी सामान्य माणसाच्या बुद्धीच्या आकलना पलीकडची असणारी जीवन शैली निवडतात. त्या स्वत:चे आयुष्य स्वत:च्या पद्धतीने जगतात, त्यांत त्यांना कोणाचीही लुडबुड चालत नाही. त्यांचा दृष्टीकोन मानवतावादी असला तरी त्या योग्य अंतर राखून असतात, आणि जेव्हा त्याचा संबध व्यक्तिगत नाते संबधांशी येतो तेव्हा त्या सहजपणे स्वत:ला वेगळे करतात. त्यामुळेच तुम्ही अशा महिला थंड/शांत असंवेदनशील आहेत असा विचार करता पण प्रत्यक्षात तसे नसते. अशा व्यक्ती स्वत:च्या जगात बऱ्याच वेळा अलिप्त, अनावधानी वाटत असल्या तरी त्या दुर्लक्ष करणाऱ्या नसतात. वेळ आलीच तर अशा व्यक्ती इतरांना न जाणवलेले अगदी बारीकसारीक तपशील देखील सांगू शकतात. तिच्या मुक्तपणाच्या प्रेमापोटी त्या अनेक अतर्क्यपणे वागू शकतात. अशा महिलांना सुखी ठेवण्यासाठी त्यांना मुक्तपणा द्यावा लागतो. </p><p><b>कुंभ राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती: </b><br />उर्मिला मातोंडकर, प्रीती झिंटा, वहिदा रेहमान, सुभाष घई</p><p><b>कुंभ राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष:  </b>मैत्रीपूर्ण स्वभाव, मानवतावादी, ओरिजिनल, नवीन शोधण्याची धडपड, मुक्त विचारसरणी, मुक्तपणा, बुद्धिमान<br /><b>नकारात्मक गुणविशेष: </b>प्रतिकूल, भावनिकरहित, अलिप्त, अंदाज वर्तविण्यास कठीण</p><p><b>धनु या चंद्रराशीशी अनुरूप असणाऱ्या राशी </b>मिथुन आणि तूळ</p>#<p><b>अॅस्ट्रो स्केच: </b>(जन्म तपशिलावर आधारित लघु रूपरेखा. )<br/>मीन राशीच्या महिला या काहीशा गुढ असतात, त्यांना समजून घेण्यासाठी कठोर परिश्रम करावे लागतात. मीन राशीच्या स्त्रिया अतुलनीय सौंदर्य असणाऱ्या असतात, आणि अतिशय हळूवार आणि प्रेमळ वागणारी उत्तम स्त्री असते. या महिला खुपच संवेदनशील असल्यामुळे स्वत:च्या जगात हरवलेल्या असतात, त्यामुळेच काहीशा स्वप्नाळूदेखील असतात. मीन राशीच्या महिला कोणत्याही परिस्थितीशी सहज जुळवून घेतात त्यमुळे तिच्या सहवासात लोकांना मोकळेपणा जाणवतो. स्वभावत: त्या लाजाळू तर असतातच, पण कोणीतरी सतत प्रेम करावे आणि काळजी घ्यावी, असे त्यांना वाटत असते. कधी कधी त्या अती लगटदेखील करतात. सतत कोडकौतुक पुरवून घेणे ही त्यांची गरज असते. त्यांच्या अशा वागणुकीमुळे कधीकधी फसवे पणाची भावना देखील निर्माण होते. तिचे मोकळेपणाने न बोलणे हे त्यामुळे त्रासदायक ठरू शकते. त्यांच्यात हुशारी असली तरी महत्वाकांक्षेचा अभाव असतो. सतत मूड बदलण्यामुळे त्यांच्याबद्दल कोणताही अंदाज करणे शक्य नसते. </p><p><b>मीन राशीत जन्मलेल्या काही प्रसिद्ध व्यक्ती : </b><br />प्रीती झिंटा, चेलसा क्लिंटन, अल्बर्ट आईनस्टाईन, मायकेल एंजलो </p><p><b>मीन राशीच्या व्यक्तीत आढळणारी सर्वसाधारण गुणवैशिष्ट्ये: </b><br /><b>सकारात्मक गुणविशेष: </b>सर्जनशील ,संवेदनशील, कनवाळू, निस्वार्थी, सहानभूती दाखविणारी <br/><b>नकारात्मक गुणविशेष: </b>पलायनवादी, आदर्शवादी, गुप्तता, कमकुवत, निग्रही वृत्ती </p><p><b>मीन या चंद्रराशीशी अनुरूप असणाऱ्या राशी </b>वृषभ, मिथुन, कन्या, धनु, मकर</p>
