

	 TEVA						= धर्मी कुण्डली#रतांध कुण्डली#अंधी कुण्डली#नाबालिग कुण्डली
	 DHARMI_TEVA_FALSE			= आपकी कुण्डली, धर्मी कुण्डली नहीं है।
	 DHARMI_TEVA_TRUE			= आपकी कुण्डली, धर्मी कुण्डली है।
	 RATAANDHA_TEVA_FALSE		= आपकी कुण्डली, रतांध कुण्डली नहीं है।
	 ANDHA_TEVA_TRUE			= आपकी कुण्डली, अंधी कुण्डली है।
	 ANDHA_TEVA_FALSE			= आपकी कुण्डली, अंधी कुण्डली नहीं है।
	 RATAANDHA_TEVA_TRUE		= आपकी कुण्डली, रतांध कुण्डली  है।
	 NABALIG_TEVA_TRUE			= आपकी कुण्डली, नाबालिग कुण्डली है।
	 NABALIG_TEVA_FALSE			= आपकी कुण्डली, नाबालिग कुण्डली नहीं है।
	 LK_DHARMI_TEVA				= लाल किताब में कुछ कुण्डलियों को धर्मी टेवा कहा जाता है। लाल किताब के अनुसार राहू, केतू और शनि को अशुभ ग्रह कहा गया है। यदि कोई कुण्डली धर्मी होती है तो राहू, केतू अशुभ फल नहीं देते। यद्यपि यह जरूरी नहीं कि वो शुभ फल देंगे लेकिन अशुभफल देना बंद जरूर कर देते हैं।<br/>राहू और केतू तब धर्मी हो जाते हैं जब वें चौथे भाव में बैठे होते हैं, अथवा किसी भी भाव में चन्द्रमा के साथ स्थित हों। शनि तब धर्मी होता है जब वह ग्यारहवें भाव में स्थित हो अथवा किसी भी भाव में बॄहस्पति के साथ बैठा हो। यदि दोनो स्थितियां लागू होती हो तो कुण्डली धर्मी टेवा कहलाती है।
	 LK_NIGHT_BLIND_HOROSCOPE	= रतांध ग्रह लाल किताब की एक अनूठी अवधारणा है। कोई कुण्डली तब रतांध कही जाती है जब उसमें शनि सातवें भाव में हो और सूर्य चौथे भाव में।<br/>अंधी कुण्डली की तरह, रतांध कुण्डली वाला जातक दिग्भ्रमित हो जाता है और अपने से अपना कोई निर्णय नही ले पाता। जातक किसी रतौंधी ग्रस्त व्यक्ति की तरह व्यवहार करता है।
	 LK_BLIND_HOROSCOPE			= कुण्डली का दशम भाव कुण्डली की नीव की तरह होता है। क्योंकि भाव व्यवसाय, रोजगार, प्रतिष्ठा, प्रसिद्धि और सरकार से मिलने वाले सहयोग का है। यदि दशम भाव में एक दूसरे के शत्रु ग्रह बैठे हों अथवा पीडित अवस्था के ग्रह, जैसे अस्त ग्रह आदि हो तो सभी ग्रह अच्छे परिणाम नहीं देते। जिस कुण्डली में ऐसी युतियां हो वह अंधी कुण्डली (टेवा) कहलाती है और ऐसा जातक किसी अंधे या दिग्भ्रमित व्यक्ति की तरह व्यवहार करता है।
	 LK_MINOR_HOROSCOPE			= लाल किताब के अनुसार कुछ स्थितियों में कुछ कुण्डलियों को 12 साल की उम्र तक नाबालिग कुण्डली माना जाता है। नाबालिग कुण्डली, कुण्डली में बैठे ग्रहों के अनुसार परिणाम नहीं दे सकती है और अप्रत्याशित व्यवहार प्रदर्शित करती है। ऐसी कुण्डली वाले जातक का भाग्य 12 साल की उम्र तक अविश्वसनीय रहता है।
