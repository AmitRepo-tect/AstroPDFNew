 NAMANK_TEXT = @@userName$, cosmic forces determine an individual\'s life structure considering your name number. Namank or Name Number is derived from all of the letters in your FULL BIRTH NAME. They all together, make up what is called the Expression or Name Number. This is the number that describes the talents and attitudes at your disposal in this lifetime, if you choose to develop and use them. Your name is your true vibration, the melody of your soul as it passed through that door in time and entered this world.\n\nAn Analysis of your name @@userName$, suggests that your Namank or Name Number is @@namamkNumber$. Let us take you through some basic characteristics of Name Number @@namamkNumber$.
 MULANK_TEXT = @@userName$, your most important number in Numerology is the date of the month on which you were born. This number can identify important elements of your character, personality, and individuality. This number determines the core elements of your overall being. Things like whether you are domineering or shy, a leader or a follower. The reason for this is because each number has its own nature and personal vibration. After careful analysis, we have worked out your numerology birth number as follows: Your Radical Number is @@radicalNumber$.
 DESTINY_TEXT1 = You are an ambitious person with great leadership skills. As a result, you get along well with people, attain their support, and are capable of fulfilling your goals. You dislike being limited and have many friends who will always be there for your help. Economically, you will prosper, but you also enjoy and love luxuries and regal living. Success in the field of politics is probable for you and there is also a good possibility of getting benefits from the government sector. Being born under the destiny number 1, you wish to receive respect from people and you will get it too. However, you should avoid excessive spending as well as getting into gambling or betting. Exercise caution in utilizing your independence, do not take too much risk, and follow your morals and ethics.
 DESTINY_TEXT2 = You are a very gentle, affable, and well-liked person, who likes to work in partnership. An imaginative, romantic as well as a creative person, you always respect women. However, you often experience a lack of strong mental ability due to which, you can usually leave your tasks unfinished. Physically, you are a little weak, and others take advantage of you easily. Hence, you need to learn to handle yourself and maintain your self-confidence. In the same vein, complete all the tasks that you take in hand and remain calm in the face of problems. In addition to that, you also need to be wary of smarmy people surrounding you.
 DESTINY_TEXT3 = You are an inspiration for others and your communication skills is your best attribute. Versatile talents are incorporated within you, and maybe that is why you do not like to be someone\'s assistant. You are disciplined and intelligent, your love pure, and you always favor justice. In addition to all this, you are a visionary person, who has a good sense of humor, and a practical perspective. You should avoid excessive spending, try to avoid being of an envious nature, and do not rush into anything to become wealthy or wise. Moreover, you will need to control your anger and dualistic personality, as well as stay away from the wrong company because they will prove to be harmful for you.
 DESTINY_TEXT4 = There are a lot of ups and downs in your life, and many sudden incidents occur as well, bringing with them both good and bad results for you. You can easily reach the great heights of success in your life, but on the other hand conspiracies can bring you down too. Your perspective is different from others making you the centre of attraction anywhere. A rebellious person, you oppose the persisting laws and customs, and are constantly trying to create new rules. You are an intelligent person with a sharp mind, and therefore should avoid being too sensitive and emotional, as well as keep away from pessimistic thinking. Not only do you need to learn to recognize opportunities, but need to keep your aggressiveness under control as well.
 DESTINY_TEXT5 = A good friend and a mentally strong person, you can have an interest in betting, markets, gambling, and trading, and you can run a business quite successfully too. You have a habit of talking which helps you persuade others and get your tasks done. However, you can also turn a blind eye towards your ethics in order to earn money. You should focus on utilizing your energy for the good and keep yourself away from any unhappy environment. Your financial status will be excellent due to your intelligence and cleverness, and you will especially progress in any business endeavours.
 DESTINY_TEXT6 = Being born under the destiny number 6, you are the apple of the eye of everyone and the virtue of cordiality is within you. A compassionate person, you love to take care of others and in addition to being artistic, you are creative as well. You are attractive in versatile ways, however, sometimes you are not devoted towards your work, due to which you have to suffer too. Romantic from birth, you have a love for beautiful things and entertainment. However, you should refrain from having a blind faith in someone or ever acting hastily. Moreover, stay away from alcohol and intoxicants and do not show excessive interest in social activities.
 DESTINY_TEXT7 = You can be quite spiritual and are someone who goes on a search for the truth and analyze any work. Being the owner of a divine vision, you can easily understand and therefore help others. You can work towards explaining the values of life to others and can also travel to various nice places and countries. With an atmosphere of positive energy surrounding you, you are able to greatly influence others. However, you need to work on avoiding feeling restless and thinking too deeply about anything. It is not appropriate for you to not be indifferent towards materialistic pleasures and you need to be active in your work and thinking.
 DESTINY_TEXT8 = There is a good balance in the physical and spiritual aspects of your life. The master of powerful ambition, you are forgiving as well as visionary. You have a big heart but you often find yourself sad and lonely, and as a result, you are highly sensitive too. In this life, being born under the destiny number 8, you will either be highly successful or extremely unsuccessful. A self-righteous person, the virtue of dedication is a major accomplishment for you. While you do not bend the knee in front of stress, you should also express yourself frankly, in matters related to your work. Yet, always bring stuck on your point only can also be wrong. Listen to others as well, and if you think that you are at fault anywhere, acknowledge it. Get rid of all pessimistic thoughts concerning your future and stay away from situations leading to loneliness.
 DESTINY_TEXT9 = While you may have to face difficulties in the beginning of your life, but you can also come out to be a good politician. You can be quite artistic and of free thinking, and you work in haste as well. While you have great organizational skills and power, but rashness in anything is not right either. You often get an inclination or intuition about things about to happen, early on. Though you are helpful and generous in nature, however, you need to keep your anger in check. Additionally, ensure that you do not bother your senior officials. You will prosper financially, but you still need to always be prepared to avoid or face adverse conditions.
 PLACE_TEXT1 = The East direction will bring you success and accolades. Therefore, you should ensure that the main door of your house faces this direction. Also, if your job can be in this direction as well, then prosperity will definitely enter your life. The countries India, Pakistan, Turkey, Burma, Afghanistan, and Hong Kong will prove to favorable for you, in all situations.
 PLACE_TEXT2 = The North-West direction (Vayavya Kone) will prove to be the best for you, and any efforts made in this direction will bring you great accomplishments and take you to new heights of success. Coming to the places that will be favourable; London, Tibet, France, Germany, Sri Lanka, Delhi, and Kabul will prove to be beneficial for you.
 PLACE_TEXT3 = As your root number is 3, therefore, the North-East direction (Ishan Kone) will bring you good luck, prosperity, and wealth. Additionally, living or working in places like UK, Nepal, Holland, Denmark, Bhutan, etc. will bring you success.
 PLACE_TEXT4 = You should make attempts of working or living in the South West direction (Nairitya Kone) as it will prove to be the most beneficial for you. In the same vein, the places Italy, Kuwait, Hungary, Washington, Mumbai will be auspicious for you and will bring you favourable results.
 PLACE_TEXT5 = North will be the most favourable direction for you, as you were born under the root number 5. Therefore, working in this direction will bring you success, happiness, and prosperity. Especially, Korea, Saudi Arabia, Spain, America, Goa, and Prague are the places that will be very auspicious for you.
 PLACE_TEXT6 = The Agneya Kone, i.e., South-East direction will bring you success and favorable results. Therefore, you should make attempts of extending your work in this direction. Moreover, the places India, Indonesia, Vietnam, Thailand, Singapore, Malaysia will bring you benefits and accolades.
 PLACE_TEXT7 = Ishan Kone or the North-East direction will be most favorable for you, as your root number is 7. Working or doing business in this direction will bring in success and accomplishments for you, while living here will also help you progress. The places Greece, Scotland, Rhodesia, Kashmir, Moscow, and Bangkok are beneficial and auspicious for you.
 PLACE_TEXT8 = To progress and move ahead in life, the West direction is the best for you. If you are interested in running your own business, then you should make attempts of expanding it in this direction and success will be yours then. Additionally, China, Malasiya, Austria, Addis Ababa are the major beneficial places for you, that will bring you luck and accomplishment
 PLACE_TEXT9 = South is the direction which will bring you success, happiness, and serenity in life. Therefore, if you are looking to expand your business or want to progress in life, you should make attempts for the same in this direction from your place of birth. The countries, cities, and states to your south like Indonesia will bring you favorable results.
 TIME_TEXT1 = As the Sun is your Lord planet, therefore, the time periods of April to May and August to September, every year, will be rather favorable for you. Whatever task you take in hand in this duration, you will definitely attain success in them. This duration will also bring an increase in your respect, name, and fame.
 TIME_TEXT2 = With Moon being your Lord planet, the duration of May to June, per year, is a very auspicious time for you. The chances of succeeding in your endeavours is higher in this duration for you. Therefore, you should make complete utilization of this time period to attain success in life.
 TIME_TEXT3 = Jupiter is the Lord of your root number, therefore, the time duration of December to January, and March to April, every year are beneficial for you. Any task you undertake, during this period, you will be successful in it, which is why this time is the best for you, to begin any important tasks.
 TIME_TEXT4 = The planet Harshal is the Lord of your root number. According to another source/opinion, Rahu is also considered to be the Lord planet of this radical number. As a result, the time period between July to September, each year, is very auspicious for you. Any task that you take in hand now, will be successful.
 TIME_TEXT5 = Since Mercury is your Lord planet, therefore, the periods of June to July and September to October are very favorable for you. If you commence any tasks that you wish to, then doing so in this time duration will have a higher chance of bringing in success for you.
 TIME_TEXT6 = Venus is the lord of your number, as a result, the time periods of March to April, May to June, and October to November are rather beneficial for you. Any tasks that you undertake or begin in this duration will have a higher chance of being successful and you will attain happiness, prosperity, and other luxuries in life.
 TIME_TEXT7 = Since Ketu is your Lord, the time period of July to August is very significant for you. All tasks that you undertake will be successful in this duration, and you will experience a better harmony in your life. You can make good use of this time to move ahead in life.
 TIME_TEXT8 = Saturn is the ruling Lord of your number. Therefore, the time period between January to March as well as from October to November each year, is extremely beneficial for you. This duration will bring success for you, and you can commence any auspicious or important tasks now.
 TIME_TEXT9 = As Mars is the Lord of your number, hence, the time duration of January to February, March to April, and November to December are rather auspicious for you. Any tasks undertaken during this period will help you attain new heights of success and you will progress in life, as a result.
 HEALTH_TEXT1 = Being born under the root number 1, you are healthy as a horse, but the likelihood of certain diseases remain. Majorly, you can suffer from heart-related diseases, pumping, blood pressure, blood-related diseases, high blood pressure in old age, and eye related problems. You need to remain cautious towards these, but keep on enjoying your healthy lifestyle.
 HEALTH_TEXT2 = You have a habit of thinking too much, or getting anxious about things, which is the root of all your problems. This can lead to diseases like stomach problems, problems in the digestive tract, gas problem, intestinal problems, tumors etc. Therefore, you need to stay away from worries. It also advised that you do not drink alcohol or take any drugs or intoxicants. Moreover, you should prefer eating boiled food and drink sufficient water.
 HEALTH_TEXT3 = The Lord Jupiter is blessing you with his divine grace owing to which you generally do not worry much. However, you can still sometimes be careless about your health due to which you can face problems like Neuritis (psoriasis), sciatica (foot or backache), skin diseases. Hence, you need to remain cautious and take care of your wellbeing as well.
 HEALTH_TEXT4 = Due to the influence of Rahu, you actively use your brains, but you should remember that the excess of anything is always bad. As a result, you can suffer from some kind of trauma, mental unrest, blood related problems, head and back pain, urinary problems, and such issues. Therefore, maintain a healthy lifestyle, and live the best life with the help of meditation and yoga.
 HEALTH_TEXT5 = Due to the effects of Mercury on your life, you will have a sharp mind and you will appear younger than you are. But on the other hand, you may have to face problems pertaining to neuritis (nerve inflammation), mouth ulcers, eyes and hands, insomnia, paralysis (palsy or stroke), or polio etc. in your lifetime. Therefore, you should lead a disciplined life and not be careless about your wellbeing.
 HEALTH_TEXT6 = Venus, the Lord of your root number, is the significator of all luxuries, hence, you enjoy eating, drinking, dressing up, and taking pleasure in other worldly amenities. Often, this can put you in a web of problems. Mainly, these include diseases connected with throat or nose and tongue, chest related diseases, or cardiovascular illnesses. Therefore, you need to be especially vigilant about these, and never ignore any health related issues.
 HEALTH_TEXT7 = Being born under the number 7 indicates that you may remain within the grips of some or other illness, as your immune system is weaker when compared with others. As a result, you can often get sick easily, and you can suddenly faint, get headaches, and suffer from cardiovascular diseases, loss of mental power, tongue and lung diseases, and so on, occasionally.
 HEALTH_TEXT8 = You are a disciplined person in general and you give adequate importance to yourself, in all fields of life. As a result, you are able to enjoy good health, however the fear of a serious illness always remains on the horizon due to your getting deviated from your routine and discipline. These mainly include diseases connected with your kidneys, intestines, headaches, and blood related illnesses.
 HEALTH_TEXT9 = You are born under the complete number 9, and that makes you naturally energetic. As a result you are generally healthy, but on the other hand you get angry easily or often complete your tasks in haste which then affects your health. Majorly, you can face blood-related issues, injuries, smallpox, chicken pox, or even have to be under the knife as some type of surgery is also probable for you.
 CAREER_TEXT1 = When you work hard, with utmost devotion, you will progress well and attain promotions in your career. Fields related to electricity, fire, science and technology, research, jewelry and gemstones, some sort of surgery, becoming an ambassador for the country, a politician, an officer in the army are the best for you. You can choose your profession from any of these or from domains pertaining to these fields.
 CAREER_TEXT2 = People born under the radical number 2 have the blessings and divine grace of the Moon on them, and since he is the significator of water and liquid things, therefore choosing your career from a field connected with the same, then that would be more beneficial for you. Specifically, working with liquid and juicy materials, travel related work, brokering in any field, hotel business, journalism, singing, dancing, poetry writing, plot work, work pertaining to ice, and a business related to silver or rice will be favorable for you.
 CAREER_TEXT3 = Being born under the radical number 3 brings you the divine grace and special blessings of Jupiter, therefore undertaking any tasks related to him will bring you success. Therefore, getting into fields of teaching, service work, justice related work, Judge, petitioner, secretary, police, work pertaining to philosophical qualifications, banking or any financial company, or advertisement department will bring you a greater chance of prosperity and help you progress in life.
 CAREER_TEXT4 = As your root number is 4, therefore your personality incorporates several traits of Rahu, which is why you can resolve even the hardest tasks with much ease. Working or doing business in fields pertaining to railways, shipping, mining, other technical work, stenographer, tailor, engineer, astrologer, magician, and lecturer, etc. will bring you commendable success in life. Therefore, choosing your career from these fields or related domains is advised, so as to bring an end to all your struggles.
 CAREER_TEXT5 = The Lord of your root number is Mercury. Due to this, being born under this number offers you special influence from the planet, which allows you to accomplish all your tasks with intellect. Hence, you need to choose a career that requires your mental strength instead of your physical might. The domains of engineering, sales related work, accountancy, railways, telegraph, journalism, tobacco, radio dealing, brokering, commission, and fields related to them will prove to be more beneficial for you.
 CAREER_TEXT6 = This number brings you the special grace of the planet Venus, which defines the areas of beauty and glamour to be the best for you. Working in fields connected with these will bring you great heights of success. In addition to these, you can also try your hand at the domains of jewelry, engineering, architecture, food inspector, hotel, production, novel writer, museums, artists, and so on.
 CAREER_TEXT7 = Since you were born under this number, therefore, you have had to struggle a lot in life, which helped you learn different lessons of life. As a result, there are several such careers that will bring you success, good fortune, and wealth. These include film industry, travelling, air hostess, dairy farm, driver, fish seller, chemist, hospital, CID, body builder, and other fields pertaining to these.
 CAREER_TEXT8 = As you were born under the number with Lordship of planet Saturn, therefore progress and promotion may take time, but they will definitely come to you. Certain fields will help you attain great heights, and choosing your profession from these specific domains will also help you achieve success more promptly, and will also bring good chances of earning money and accumulating wealth. These, primarily include becoming a player, engineer, police, the mayor of the city, weight measurement, contractor, prison, labour work, and music, etc.
 CAREER_TEXT9 = Your number is influenced by the red planet, Mars therefore, you have received much love in your life as you are replete with leadership qualities and you have a certain life energy inside you, which will take you forward in various fields of life.
 FAST_TEXT1 = You should fast on Sundays and begin the same on a Sunday falling in the Shukla Paksha. Eat only once a day while fasting and recite the Aditya Hridya Strotra. You can also chant the Surya Beej Mantra. If possible, attempt abstinence from salt this day, wear red colored clothes, and after keeping water in a copper vessel, offer it to the Sun.
 FAST_TEXT2 = You should fast on Monday, for at least 7 or 16, or even 54 days. If a Monday is falling on a Purnima (full moon) or during the Chitra Nakshatra then that is considered especially auspicious and commencing your fasts from this day will be rather beneficial. Wear white colored clothes and offer milk to Lord Shiva. You should eat only once during the day and chant the Beej Mantra of the Moon.
 FAST_TEXT3 = You should fast for 16 Thursdays, commencing from the one falling under the Shukla Paksha of a month. You can also keep this fast for one to three  years, continuously. On this day, wear yellow colored clothes and apply a tilak of turmeric or sandalwood on your forehead. Offer water to a banana tree and do the same for a peepal tree, but without touch the tree. Give food to brahmins as per your ability, and chant the Jupiter Beej Mantra.
 FAST_TEXT4 = You should fast for 19 or 51 Saturdays, beginning from the one falling in Shukla Paksha. Wearing black or blue clothes on this day will be beneficial for you. Donate balck gram (sabut kali urad), black sesame, and mustard oil on this day. You can also chant the Rahu Beej Mantra.
 FAST_TEXT5 = Beginning with a Wednesday falling in Shukla Paksha, you should fast for about 17 or 45 Wednesdays regularly. While fasting, it will be better if you eat only once a day, and chanting the Mercury Beej Mantra will be rather beneficial. Wear green colored clothes and the emerald gemstone. Consume green grams/whole moong (sabut moong daal) on this day, and take blessings from eunuchs. You should also try to gift some green colored things to your sister, maternal aunt (mausi), paternal aunt (bua), wife of maternal uncle (chachi), etc.
 FAST_TEXT6 = You should fast on Fridays, beginning from the one falling in Shukla Paksha of the month, and continuing for 21 or 31 Fridays. On this day, wear white colored clothes, touch the feet of little girls (kanya) and take their blessings, and offer them a white sweet. You can also chant the Venus Beej Mantra.
 FAST_TEXT7 = Beginning from a Tuesday falling during the Shukla Paksha of the month, you should fast for 19 or 21 Tuesdays. Eat only once on this day and having sweet food will be even better. Wear red colored clothes, chant the Ketu Beej Mantra, and offer prasad of jaggery and grams/chickpeas (chana) to little kids. Furthermore, you can also go to a Hanuman Temple and place a red flag there.
 FAST_TEXT8 = You should keep fasts for about 19 or 51 Saturdays, beginning from a Saturday falling in Shukla Paksha. Eating only once a day and consuming black gram (urad dal), on the day of the fast will be rather beneficial for you. Worship Lord Saturn (Shani Deva) and light a lamp (diya) of mustard oil under a tree in the evening. Chant the Shani Mantra as per your convenience.
 FAST_TEXT9 = Beginning from a Tuesday falling in Shukla Paksha, you should fast for 19 or 21 Tuesdays. Eat only once on this day and having something sweet will be more beneficial. Wear red colored clothes and chant the Mars Beej Mantra. Also, you should offer prasad of jaggery and grams/chickpeas (chana) to little kids on this day.
 YANTRA_TEXT1 = Since your root number is 1, your lord planet is the Sun. Hence, in order to attain his divine grace and favorable results, you should start carrying the Surya Yantra, on Sunday, in Sun’s hora and nakshatras (Krittika, Uttara Falguni, Uttara Ashadha).
 YANTRA_TEXT2 = The Moon is the Lord of your root number 2. For attaining his favor and divine grace, you need to carry the Chandra Yantra with you on Monday, under the Moon’s hora and nakshatras, which are Rohini, Hasta, and Shravan.
 YANTRA_TEXT3 = Being born under the root number 3, your lord planet is Jupiter. Hence, you should begin carrying the Guru Yantra on Thursday, in Jupiter’s hora and nakshatra (Punarvasu, Vishakha, Purva Bhadrapada), so as to attain your lord planet’s divine grace and therefore favorable results.
 YANTRA_TEXT4 = With your root number being 4, Rahu is your lord planet. Therefore, in order to appease the planet and attain favorable results, you need to start carrying the Rahu Yantra on Wednesday under its nakshatras (Ardra, Swati, Shatabishak).
 YANTRA_TEXT5 = With 5 being your root number, Mercury is your lord planet. In order to attain the divine grace and favorable results from this planet, you need to carry the Buddha Yantra with you on Wednesday, under Mercury’s hora and nakshatras (Ashlesha, Jyeshtha, Revathi).
 YANTRA_TEXT6 = Venus is the lord of the root number 6, under which you were born. Therefore, you should start carrying the Shukra Yantra on Friday, under Venus’s hora and nakshatras, which are Bharani, Purva Phalguni, and Purva Ashadha, in order to appease the lord and attain favorable results.
 YANTRA_TEXT7 = Ketu is the lord of natives born under the root number 7. Hence, so as to attain divine grace and favorable results from the lord, you should carry the Ketu Yantra on Tuesday, under the Ketu nakshatras, namely, Ashwini, Magha, and Mool.
 YANTRA_TEXT8 = With your root number being 8, Saturn is your lord planet. For attaining the auspicious blessings and favorable results from the lord, you need to carry the Shani Yantra with you, in the hora and nakshatras (Pushya, Anuradha, Uttara Bhadrapada) of Saturn.
 YANTRA_TEXT9 = Your root number is the comprehensive 9, which means that your lord planet is Mars. For the attainment of favorable results and divine blessings from the lord, you need to carry the Mangal Yantra in the hora and nakshatras of Mars, where the nakshatras are, Mrigashira, Chitra, and Dhanishta.
 MASTER_NUMBER_TEXT = According to the science of Numerology, there are only two such numbers that contain special energy within themselves. They are known as Master numbers, and are 11 and 22. Such people have astounding power and potential within them.
 MASTER_NUMBER_TEXT11 = Your master number is 11, due to which, your intuitive abilities are astounding. Not only are  you imaginative and creative, but you can look at the big picture as well. In addition to that however, you are impractical to a certain level. You have great leadership skills and are good at encouraging others as well. But, if you do not focus yourself towards your goals, then an environment of fear can surround your life. Have trust in your capabilities and work for social welfare, and you will realize that there is no one better suited for the role, than you. This number is a psychic number.
 MASTER_NUMBER_TEXT22 = Your master number is 22, which is considered to be the most powerful number in the science of Numerology. You have the ability to convert your dreams and desires into reality. Along with big ideas, high thinking, good decision making capabilities, and leadership qualities, you also have the power of intuition and practicality within you. You often tend to pay more attention to yourself, however, you should remember that you were born for a great purpose and have a lot to do for the society. You have had to face many obstacles in the beginning phases of your life, but they were there to make you stronger. Therefore, you should ensure that whatever goal you set for yourself, it should rise above personal ambitions and should be for the betterment of the society. You are somebody who can be the catalyst for a powerful change in this era.
 KARMIC_NUMBER_TEXT = Numerology identifies certain numbers that signify the deeds of our past lives. These actions of ours are the reason why we take birth under four specific numbers. The main purpose of such people is to repay the debts of their karma and past deeds. These karmic numbers are 13, 14, 16, and 19.
 KARMIC_NUMBER_TEXT13 = Due to being born under this number, you will have to work harder in life in order to achieve success. As direct impact of Karmic Number 13, you will continuously face obstacles in your path. Due to this, you often become upset and feel as if your efforts are going to waste; you give up in the face of problems and think that you will not be able to overcome these challenges. You turn lazy and pessimistic. But, you need to remember that not everything is always as it seems. Your efforts are not going to waste, but you will need to keep toiling and working hard because this is your Karma debt. If you are successful in this endeavour of yours, you will  be able to touch great heights in various fields of life.
 KARMIC_NUMBER_TEXT14 = Due to being born under this number, you often experience sudden unexpected changes in life that alter your way of living as well. You take an interest in various indulgences like alcohol, libidinous activities, etc., and this becomes a cause of problems for you. To evade all this, you should make a commitment to yourself. Even though your life will be a roller coaster ride, if you take a stand and keep fighting towards a strong yet difficult goal, you will be safe from these issues and will achieve desired success.
 KARMIC_NUMBER_TEXT16 = Due to being born under this number, you often have to give up on your ego, and this is exactly what you have to learn in this life. In a way, this process is a part of purification for you. You will have to compromise with your ego time and again, and while this will upset you, you should not be disappointed because this struggle now, will bring you success in the future. You have the capability of knowing and understanding the problems that others are facing yet you often find yourself alone or lonely. If you give place to faith, gratitude, and peace in your life, then you will also be able to grow spiritually.
 KARMIC_NUMBER_TEXT19 = Due to being born under this number, you will mainly have to learn two things in life – the correct utilization of power being one, and independence being the other. There will be numerous occasions in life where you will have to take a stand for yourself, all alone, due to certain ongoing problems in personal life. You will not like to listen to the people around you, and won’t accept their advice either. But you should heed them, because you need to understand that in order to move ahead and above in life, you will require the assistance of certain people. This will be your learning in this life.
 MULANK_DESC_TEXT1 = Since you were born under the radical number 1, you are rather ambitious, and dislike any restrictions imposed upon you by others. Instead, getting others to work and leading them is your first quality. You have the divine grace of Lord Sun with you. Having a stable ideology, you remain firm and determined in your decisions. You stay in any relationship for a long time, whether love affairs or friendship. A kind person and someone who always helps others, you are someone who desires for respect more. You earn good name on the basis of your hard work while your performance in the government sector is commendable. You get more attracted towards the opposite sex people and because of this, they often cheat. You have special experience in social service, politics, job, or religion related areas.
 MULANK_DESC_TEXT2 = As you are majorly influenced by the Moon, you are quite sensitive and prefer to work on your tasks with someone. You need a partner in every aspect of life. Often, you begin working on several tasks together, but end up changing your mind in the middle, and leave them all, incomplete as a result, and then you have to suffer losses. An art-lover and creative person, you love people. You can be a skilled lover and are devoted to your family. However, you may lack patience. In addition to having a good social status, you are popular in society as well. Not only are you a good friend but you have a tendency to explore. There are many ups and downs in your life and many plans of yours get stuck in the middle. You must strengthen your self-confidence.
 MULANK_DESC_TEXT3 = Born under the radical number 3 and influenced by the planet Jupiter, you are a soft-hearted, truthful, and peace-loving person. You are ambitious and do well in most government jobs. However, often a dictatorship nature can be seen within you. A disciplinarian, you can often be rather hard on your subordinates. Full of intuitive knowledge, you enjoy learning and teaching both, which is why you can attain several achievements in the field of intellect. You are mentally strong and your reasoning and knowledge power is quite good. Your love for charity and philanthropic works is great, however, you can sometimes follow a topic doggedly which makes you an aggressive person. Yet, it is true that you are self-respecting.
 MULANK_DESC_TEXT4 = You are mainly affected by the planet Harshal or Rahu. As a result, you have an out of the box thinking and can do something new and innovative. Since your opinion does not easily match other people’s beliefs, thus, many often oppose you. Wealth accumulation is not something you are fond of, and rather prefer being happy and immersed in your fun. You think ahead of your time and openly express your disagreements. However, you have an unpredictable nature that cannot be easily identified by anyone. In the same vein, nobody can know what you do next, and this attribute of yours, makes you more special. You are the life of the party. While you have a habit of doing good work, however, you also want people to praise this goodness of yours. You are quite sensitive and often yourself lonely. The number of your friends may be low but they are all very honest and loyal.
 MULANK_DESC_TEXT5 = Being born under the radical number 5, and the influence of Mercury, you are a person with lots of friends. You have a passion for friendship, there are many people in your friend circle. All attributes of being a good business person are present, naturally, within you. You are often attracted towards profit and hence do many things in haste, but you then have to suffer for the same. You have an amazing agility within you. In the same vein, you do not stay stuck on something for long and therefore do not remain upset for too long. You give more preference to business than job. There is a good possibility of hastiness, quick temper, and irritability being within you. However, on the flip side, your arguments are good and your speech is also effective. You are fickle at heart and often attain success in works related to brains and wit. Additionally, you prefer intellectual work, more than any physical exertions. Your ability to come out of any difficulty, quickly is one of your greatest attributes. However, you should avoid misusing your mental strength.
 MULANK_DESC_TEXT6 = Being born with the influence of Venus over you, you are most attracted to beauty. Not only that, you are also inclined towards any type of art, including, entertainment, literature, clothing, and music. You love makeup, decoration, and things related to the same which is why you complete all your tasks beautifully. The owner of a magnetic personality, you effortlessly attract others towards you. However, you can often be rather stubborn or jealous due to which you can also face some problems. You cannot tolerate excessive resistance. As a person, you can easily befriend someone, and the art of being a host is unparalleled in you. However, you can sometimes feel guilty and struggle with mental stress. Your inclination towards the opposite gender is quite high. Your ability of winning people’s heart is your best attribute.
 MULANK_DESC_TEXT7 = As you were born under the radical number 7, the influence of Ketu or Neptune is majorly on you. Religiousness naturally exists within you, and you can be rather hardcore in matters related to it. You enjoy poetry and painting. Your intuitiveness is your biggest strength and you are skilled at understanding others. However, on the other hand, it is not so easy for other people to understand you. You enjoy travelling, going on excursions and trips, and vacations. There can be a lack of worldly pleasures and amenities in your life. You earn money on the basis of your fundamental ideas and do charity work as well. You worry about the future, therefore enjoy doing good work. Imagination is good within you and you have the speciality of attracting people towards you. All the good qualities and thoughts of being a good business person are within you, and on making good use of the same, you can rise as a successful entrepreneur. The art of influencing others is your greatest attribute.
 MULANK_DESC_TEXT8 = You are quite diligent and hardworking in nature, and the secret behind this is Shani (Saturn), the lord of your radical number, 8. You are the most important link in any institute but often people underestimate your hard work. Loneliness and depression can often bother you. Though you progress slowly in life, but this growth is certain. Showing off is something that you do not incorporate within you much, due to which people often do not understand your importance. You mind your own business and rest only after completing it. A very ambitious, you do not retreat from the prospect of working hard to achieve the same. You are very kind and passionate, and a believer in fate as well as of religious nature to a certain level. You often reach high positions and are always ready to make any sacrifices. Often, you accomplish such tasks that keep you alive in the memories of people even when you are not there. You will be either very successful in life or highly unsuccessful, and this depends entirely on how optimistic you can be.
 MULANK_DESC_TEXT9 = Due to being born under this number, you get your energy and powers from Mars, the lord of radical number 9, which makes you brave and unafraid of difficulties. You have mastered the art of governance or leadership of the people. However, you can have a short temper, because of which you can often face adverse conditions. Agility and hastiness is within you. Your life is full of struggles and the number of your enemies is also high. However, you can face all these by the virtue of your courage. You prefer being independent and are not easily influenced by others. It is advised that you remain wary of smarmy people. While you can go to all ends, in order to get love and sympathy, however, you cannot tolerate your criticism. Hence, you should try to control yourself because you can go to any extent in extreme anger. If you are successful in controlling your temper, then you will be very fortunate and successful in life.
 NAMANK_DESC_TEXT1 = <p>If your birth number is 1 then according to numerology you are an energetic, active, egoistic, person with a passion for art. As a Birth Number 1 person, you generally don\'t like following but prefer to take the lead instead. Your intuitive powers are always at work. Honest by nature, you gracefully accept your mistakes. Grounded in spirituality by nature you are happy, always smiling, and are very optimistic regarding your life plans. </p><p><b>Career: </b>You are more inclined towards mental work than psychical. You knowledge is through travel and observations. Birth Number 1 people make good writers and can be good reporters. They are blessed with an active and creative mind.</p>
 NAMANK_DESC_TEXT2 = <p>This number shows high imagination, idealism, and a dreamy nature living in a world of their own creation. Unlike number one, they are the executors of the plans and projects organized by others. Considerate by nature, unselfish, and always thoughtful of the well being of others you come across as really warm individuals. </p><p><b>Career: </b>As birth number 2 people are good partners and collaborators, they will do well in partnership businesses. You are very restless and love change, therefore always want to travel, and this makes you excellent in jobs that involve a lot of travelling. Being imaginative by nature, you will do good in creative fields as well. </p>
 NAMANK_DESC_TEXT3 = <p>The Birth Number 3 stands for morality, divine love, and justice with mercy, and people born under this are known as great uplifters. You have destiny on your side in your life. It\'s the vibration of your number that attracts all that is good for your life, and you shine out as a result. Immensely hardworking, you like to get the job done. Born a leader who commands respect, your goal is to be the best. </p><p><b>Career: </b>You make Wise judges, the world\'s teachers and philosophers.</p>
 NAMANK_DESC_TEXT4 = <p>Birth number 4 people exhibit energy, force, and progress. They are people with higher faculties of understanding. The peculiar nature of this number is that it continually aims at changes in life and society, and is after the liberation of the mind from the bondage of the surroundings and community. You are mature beyond your years. Number four people also are attracted to the unusual and the different, and at times feel the need to rebel against the rules. </p><p><b>Career: </b>Birth number four makes excellent writers, businessmen, and politicians.</p>
 NAMANK_DESC_TEXT5 = <p>You are much interested in the occult mysteries of life. By nature, you are very restless and always on-the-go, to some new destination, a new goal; as your only basic need, is to move all the time. There is both a good and evil side of you as a person. You love spending time with kids and put the family concerns on top priority. You are inclined towards spirituality and are also a religious person. </p><p><b>Career: </b>You enjoy sports and hence can take this up as a career. Your intellectual mind makes you a great fit as educationalists and researchers.</p>
 NAMANK_DESC_TEXT6 = <p>You are born an artist, and beauty and art attracts you the most. Beauty, not just in the practical sense, but you love beauty in relationships as well. You try and avoid confrontations because discord or disagreement makes you uncomfortable. Your loving nature makes you come across as a warm, lively, and beautiful person, and you desire to please others. You are likeable and optimistic. </p><p><b>Career: </b>You are interested in music, dance, poetry and anything that has to do with creativity, and will do well in these fields.</p>
 NAMANK_DESC_TEXT7 = <p>You\'re known for your individuality, originality, and independence – free spirited like a bird you like to break the traditional boundations, established norms, and restrictions of society. People find you to be a bit of a mystery and many times you can be absent-minded. Number 7 people are usually resourceful and analytical, and can determine the cause and effect in all situations and problems. In life, you make many personal sacrifices to achieve what you feel is right and just for you. </p><p><b>Career: </b>You are extremely courageous and adventurous, as a result of which, you can stay far from home to try the new and exotic. Additionally, you are more prone to déjà vu due to your intuitive nature. Hence, joining any profession that satisfies your thirst for adventure is a great choice.</p>
 NAMANK_DESC_TEXT8 = <p>A birth number 8 person is serious and philosophical. Number 8 symbolizes determination, persistence, and studiousness. Though tough outside, you are a warm and caring person on the inside. You are very cautious and accordingly take decision concerning your future. You can go through great struggles to reach your goals. </p><p><b>Career: </b>You are ambitious and often successful in the public eye as you tend to inspire others. As a result, you make great managers, administrators, and businesspeople. Government jobs are another great option.</p>
 NAMANK_DESC_TEXT9 = <p>By nature, you are a strong-willed and courageous person. You are hot-headed but can overcome discords and opposition with ease. You love and respect yourself even if others stand up against you. You want to be the master of your own destiny and so you can easily be a great leader. You are a very humane individual and believe in taking your friends along with you. Given a chance, you always want to help others. You connect well with your family and home, and enjoy spending time with them. </p><p><b>Career: </b>Military, politics, teaching, and social services work are some good options for you.</p>
