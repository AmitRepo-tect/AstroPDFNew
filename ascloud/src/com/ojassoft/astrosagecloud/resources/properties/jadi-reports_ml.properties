
JADI_SUGGESTION_REPORT=എല്ലാവരും സന്തുഷ്ട ജീവിതം ആഗ്രഹിക്കുന്നു അതിനുവേണ്ടി, ധാരാളം പ്രവർത്തനങ്ങളും കഠിനാധ്വാനം ഫലപ്രദമായ ഫലങ്ങൾക്കായി ചെയ്യുന്നു.നാം ജ്യോതിഷരെ സമീപിക്കുകയും, രത്‌നക്കല്ലുകൾ ധരിക്കുകയും, മറ്റ് അനേകം പരിഹാര ക്രിയകളും ചെയ്യുന്നു. ഇതിൽ പ്രകൃതിദത്ത പരിഹാരം ചെടിയുടെ വേരുപയോഗിച്ചുള്ളതാണ്. നിങ്ങളുടെ ജനന ചാർട്ട് പ്രകാരം ഗ്രഹങ്ങളുടെ സ്ഥാനവും, ജാതകവും വിശകലനം ചെയ്തശേഷം ഞങ്ങൾ നിങ്ങൾക്ക് അനുയോജ്യമായ ജെഡി അല്ലെങ്കിൽ വൃക്ഷത്തിന്റെ വേര് നിർദ്ദേശിക്കുന്നതാണ്.
JADI_AND_ITS_IMPORTANCE=ദൈനംദിന ജീവിതത്തിൽ സസ്യങ്ങൾ നിർണായക പങ്ക് വഹിക്കുന്നു. ഭൂമിയിൽ ജീവനെ സൃഷ്ടിക്കുന്നതിനുള്ള ഉറവിടങ്ങളാണ് ഇവ. ജ്യോതിശാസ്ത്രപരമായി, സസ്യങ്ങളും, വൃക്ഷങ്ങളും ഓക്സിജൻ വാതകം പുറത്തുവിടുകയും കാർബൺ ഡയോക്സൈഡ് ശ്വസിക്കുകയും ചെയ്യുന്നു, ഇത് മനുഷ്യജീവിതത്തിന്റെ മുഖ്യ ഉറവിടമാണ്. നമുക്കെല്ലാം അറിയാവുന്നതാണ്, ഓക്സിജൻ ഇല്ലാതെ നമുക്ക് ജീവിക്കാൻ കഴിയുകയില്ല എന്നത്. വൃക്ഷമോ ചെടികളോ ഇല്ലെങ്കിൽ നമുക്ക് ശ്വസിക്കാൻ കഴിയുകയില്ല, അതുമൂലം ജീവൻ ഇല്ലാതാവും. അതുപോലെ, സസ്യങ്ങൾക്കും മരങ്ങൾക്കും കർശനമായി  പ്രാധാന്യം നൽകേണ്ടതാണ്. ഒരുപാട് പ്രശ്നങ്ങൾ ഔഷധ സസ്യങ്ങളാൽ പരിഹരിക്കപ്പെട്ടിട്ടുണ്ട്. ഇത് ഔഷധ ആവശ്യങ്ങൾക്കും ഉപയോഗിക്കുന്നു.വൃക്ഷത്തിന്റെ വേരും അവയിലൊന്നാണ്. <a href="http://astrology.astrosage.com/2013/11/jadi-roots-to-reach-planets-hearts.html"> വൃക്ഷത്തിന്റെ വേര് </a> ഔഷധിയുടെ ഭാഗമാണ്. ജ്യോതിഷത്തിൽ വേരിന് അതിന്റേതായ പ്രാധാന്യമുണ്ട്. നിങ്ങളുടെ ജാതകത്തിൽ ഗ്രഹം ദുർബലസ്ഥാനത്താണെങ്കിൽ ഇത് പരിഹാരമായി ഉപയോഗിക്കാൻ കഴിയും. പ്രത്യേക ഗ്രഹത്തെ സൂചിപ്പിക്കാൻ വ്യത്യസ്ത തരം വൃക്ഷങ്ങളുടെ വേരുകളുണ്ട്. ജ്യോതിഷത്തിൽ ഏഴ് പ്രധാന ഗ്രഹങ്ങളെ കുറിച്ചും, രണ്ട് പൂർവ്വങ്ങൾ അതായത് രാഹുവിനേയും, കേതുവിനേയും, കുറിച്ചും  പ്രതിപാദിച്ചിട്ടുണ്ടെന്ന് നമുക്കറിയാം. പാരിസ്ഥിതിക ഊർജ്ജങ്ങളെ സമീകരിക്കുന്നതിന് ഓരോരുത്തർക്കും നിശ്ചിത വൃക്ഷങ്ങളുടെ വേരുകൾ നിർവജ്ജിക്കുന്നുണ്ട്. നിങ്ങളുടെ ജാതകം ആദ്യം വിശകലനം ചെയ്തശേഷം അതുപ്രകാരമുള്ള വൃക്ഷത്തിന്റെ വേര് ധരിക്കുന്നതായിരിക്കും നല്ലത്. വൃക്ഷത്തിന്റെ വേരുകൾ രത്നങ്ങൾക്ക് പകരമായി കണക്കാക്കപ്പെടുന്നു. ഒരു ജ്യോതിഷന്റെ ഉപദേശപ്രകാരം പ്രത്യേക ക്രിയകൾക്ക് ശേഷം ധരിക്കുകയാണെങ്കിൽ ഇത് മെച്ചപ്പെട്ട ഗുണം പ്രധാനം ചെയ്യും. രത്നക്കല്ലിനെക്കാൾ മെച്ചപ്പെട്ട രീതിയിൽ ഇത് വർത്തിക്കും.  രത്നകല്ല് വളരെ വില കൂടിയതാണ്, അതുകൊണ്ട് തന്നെ എല്ലാവർക്കും അത് താങ്ങാൻ കഴിയുകയില്ല. ആ സാഹചര്യത്തിൽ, ആവശ്യമുള്ള ഫലങ്ങൾ കൈവരിക്കാനും ഏതെങ്കിലും ഗ്രഹത്തിന്റെ നീചഫലങ്ങൾ കുറയ്ക്കാനും വൃക്ഷത്തിന്റെ വേര് ധരിക്കുന്നത് നല്ലതായിരിക്കും. കുറഞ്ഞ വിലയ്ക്ക് നിങ്ങൾക്ക് എളുപ്പത്തിൽ കണ്ടെത്താനും കഴിയും.
RECOMMENDATIONS=നിങ്ങൾക്ക് അനുയോജ്യമായ വൃക്ഷത്തിന്റെ വേര് ധരിക്കാൻ ശുപാർശ ചെയ്യപ്പെടുന്നു. പരിസ്ഥിതിയിൽ പലതരം വേരുകൾ ഉണ്ട്. ഇതിൽ നിന്ന് നിങ്ങൾക്ക് അനുയോജ്യമായത് കണ്ടെത്തേണ്ടതുണ്ട്. നിങ്ങളുടെ ജനന ചാർട്ടിലെ ഗ്രഹങ്ങളുടെ സ്ഥാനത്തെ അടിസ്ഥാനമാക്കി മാത്രമേ ഇത് ചെയ്യാൻ കഴിയൂ അല്ലെങ്കിൽ <a href="http://www.astrosage.com/freekphorary/instantchart.asp?charttype=kp"> ജാതകം </a>. വൃക്ഷത്തിന്റെ വേരിനെ സംബന്ധിച്ച് ജ്യോതിഷരെ സമീപിക്കാൻ നിങ്ങൾക്ക് കഴിയും. വേരുകൾ ധരിക്കുന്നത്തിലൂടെ നിങ്ങളുടെ ദുർബലമായ മേഖലകൾ മെച്ചപ്പെടും. നിങ്ങളുടെ ജാതകത്തിലെ ഗ്രഹങ്ങളുടെ സ്ഥാനമനുസരിച്ചുള്ള വിവിധ വേരുകൾ ഞങ്ങൾ പരാമർശിച്ചിട്ടുണ്ട്:
IMPORTANCE_OF_NATURAL_JADI=പ്രകൃതിദത്തമായ വേരുകൾ ഇന്ന് വിപണിയിൽ വളരെ ദുർലഭമായി മാത്രമേ കാണുന്നുള്ള. സാധാരണയായി വൃക്ഷങ്ങളുടെ വേര് കൃത്രിമമായി നിർമ്മിക്കുകയും അവ ലോകമെമ്പാടും വിതരണം ചെയ്യുകയും ചെയ്യുന്നു. പ്രകൃതിദത്തമായ വേര് അടിസ്ഥാനപരമായി ഒരു വൃക്ഷത്തിന്റെ മൂലമാണ്, ഇത് പരിമിതമായ എണ്ണം മാത്രമേ കാണുന്നുള്ളൂ. ചില സമയങ്ങളിൽ കാലാവസ്ഥാ പോലുള്ള മുൻകൂട്ടി കാണാനാകാത്ത കാര്യങ്ങൾ ഇവയുടെ ഉത്പാദനത്തിന് തടസ്സം നിൽക്കുന്നു.കൃത്രിമമായി നിർമ്മിച്ച വൃക്ഷത്തിന്റെ വേര് യഥാർത്ഥമായി തോന്നിയേക്കാം എന്നിരുന്നാലും ജ്യോതിഷപരമായി ഇതിന് ഒരു ഉപയോഗവും ഇല്ല. ഈ പ്രശ്നം പരിഹരിക്കാനായി, ഞങ്ങൾ നൂറു ശതമാനം സ്വാഭാവികമായ വേര് നിങ്ങൾക്കായി കൊണ്ടുവന്നിട്ടുണ്ട്. ജ്യോതിഷപരമായി പ്രതീക്ഷിക്കുന്ന എല്ലാ ആനുകൂല്യങ്ങളും നിങ്ങൾക്ക് ഇത് ധരിച്ച ശേഷം ലഭിക്കുന്നതായിരിക്കും. ഈ വേരുകൾ ഗവേഷണശാലയിൽ കർശ്ശനമായി വിലയിരുത്തപ്പെട്ടതും പരിശുദ്ധമാണെന്നു തെളിഞ്ഞതുമാണ്.

TREE_ROOT_OF_BEL=ഇത് സൂര്യനെ, ഒരു രാജകീയ ഗ്രഹമായി സൂചിപ്പിക്കുന്നു. ഒരു ആധികാരിക പദവിയും നേതാവിനേയും, ഭരണകൂടത്തേയും പ്രതിനിധീകരിക്കുന്ന ജ്യോതിഷത്തിലെ ഒരു ചൂടൻ ഗ്രഹമാണ് സൂര്യൻ. സൂര്യൻ നിങ്ങളുടെ ജാതകത്തിൽ ദുർബലമാണെങ്കിൽ, ഇത് നിങ്ങൾക്ക് ധരിക്കാവുന്നതാണ്. ഗ്രഹത്തിന്റെ ഊർജ്ജം <a href="http://www.astrosage.com/planet/sun/"> സൂര്യൻ </a> സുഗന്ധ ദ്രവ്യങ്ങളാലും, ഔഷധികളാലും വർദ്ധിപ്പിക്കാം. ഇത് ധരിക്കുന്നതിലൂടെ ഈ ഗ്രഹത്തിന്റെ നീചഫലങ്ങൾ കുറയുന്നതാണ്. നിങ്ങൾ പ്രശസ്തിയും, സ്ഥാനവും, സാമൂഹിക പദവിയുമായി ബന്ധപ്പെട്ട് പ്രശ്നങ്ങൾ അഭിമുഖീകരിക്കുകയാണെങ്കിൽ, ഇത് നിങ്ങളുടെ ജീവിതത്തിലെ നിലവാരം ഉയർത്താൻ ഉദകുന്ന വിധത്തിൽ നിങ്ങൾക്ക് നല്ല ഊർജ്ജം പ്രധാനം ചെയ്യും.
TREE_ROOT_OF_KHIRNI=വൈദിക ജ്യോതിഷ പ്രകാരം ഈ വേര് ചന്ദ്ര ഗ്രഹത്തെ പ്രതിനിധാനം ചെയ്യുന്നു. ഈ ഗ്രഹം വളരെ പ്രധാനപ്പെട്ട ഒന്നാണ്. അത് ഒരു വ്യക്തിയുടെ മനസ്സിനെ പ്രതിനിധാനം ചെയ്യുന്നു. ഇവിടെ ഉദ്ധരിച്ചതുപോലെ, "നിങ്ങളുടെ മനസ്സ് സന്തുഷ്ടമാണെങ്കിൽ, എല്ലാം സന്തോഷകരമാണെന്ന് തോന്നും". സന്തുഷ്ടവും ആരോഗ്യകരവുമായ ജീവിതം നയിക്കാൻ, മാനസിക അസ്ഥിരതയോ അസുഖമോ കൂടാതെ സ്വതന്ത്രരായിരിക്കണം. ചുരുക്കത്തിൽ, നമ്മുടെ ജീവിതത്തിലെ വലിയ വിജയത്തിനായി സമ്മർദ്ദം ഇല്ലാത്ത ഒരു മനസ്സുണ്ടായിരിക്കണം. നിങ്ങൾ ഈ വേര് ധരിക്കുന്നത് വഴി മാനസിക പിരിമുറുക്കം, സമ്മർദ്ദം, ഉത്കണ്ഠ എന്നിവയിൽ നിന്ന് നിങ്ങൾ സ്വതന്ത്രരാകും. ആത്യന്തികമായി, സന്തുഷ്ട ജീവിതത്തിലേക്ക് നിങ്ങൾ നയിക്കപ്പെടും.
TREE_ROOT_OF_ANANTMOOL	= വൈദിക ജ്യോതിഷപ്രകാരം ഈ വൃക്ഷത്തിന്റെ വേര് ചൊവ്വ ഗ്രഹത്തെ പ്രതിനിധാനം ചെയ്യുന്നു. ഊർജ്ജം, ധൈര്യം, ഉത്സാഹം, നിർണയം എന്നിവയുമായി ഈ ഗ്രഹം ബന്ധപ്പെട്ടിരിക്കുന്നു. ഒരു സൈന്യം, സൈനികോദ്യോഗസ്ഥൻ, പോലീസുകാരൻ അല്ലെങ്കിൽ ഭരണപരമായ സ്ഥാനത്തുള്ളവർ അല്ലെങ്കിൽ തോക്ക് കൈവശമുള്ള ആൾ എന്നിവയെ പ്രതിനിധാനം ചെയ്യുന്നു. നിങ്ങളുടെ ശത്രുക്കൾക്കെതിരെ പോരാടാനുള്ള ഊർജ്ജവും, മത്സരാധിഷ്ഠിത പരീക്ഷകളിൽ വിജയം നേടുന്നതിനുള്ള ശക്തിയും ചൊവ്വ നൽകുന്നു. നിങ്ങളുടെ ജാതകത്തിൽ ചൊവ്വ ദുർബലസ്ഥാനത്താണെങ്കിൽ, ഈ വൃക്ഷത്തിന്റെ വേര് നിങ്ങൾക്ക് ധരിക്കാവുന്നതാണ്. നിങ്ങളുടെ ഗുണങ്ങൾ ശക്തിപ്പെടുത്തും. യാതൊരു ഭയവും കൂടാതെ നിങ്ങൾക്ക് ദൌത്യം നിർവ്വഹിക്കാനാകും. നിങ്ങളുടെ ആത്മവിശ്വാസവും ഊർജ്ജവും വർദ്ധിക്കും. എന്തെങ്കിലും ജോലി ചെയ്യുകയോ, എന്തെങ്കിലും ജോലി ചെയ്യാൻ ധൈര്യമുണ്ടെങ്കിലോ, മാത്രമേ നിങ്ങൾക്ക് ഫലം ലഭിക്കുകയുള്ളൂ. അതുകൊണ്ട്തന്നെ ജോലി ചെയ്യാനുള്ള ശക്തി അത് നിങ്ങൾക്ക് നൽകും. മത്സരാധിഷ്ഠിത പരീക്ഷകളിൽ മികവു പുലർത്താൻ ആഗ്രഹിക്കുന്നവർക്ക് ഇത് വളരെ ഉചിതമാണ്.
TREE_ROOT_OF_VIDHARA=ഈ വൃക്ഷം പ്രതിനിധാനം ചെയ്യുന്ന ഗ്രഹം <a href="http://www.astrosage.com/planet/mercury/"> ബുധൻ </a>. വൈദിക ജ്യോതിഷത്തിൽ ഒരു രാജകുമാരനാണ് ബുധൻ. ബുധ ഗ്രഹത്തിലൂടെ യുക്തിപരമായ ചിന്താശേഷി ഉണ്ടാകുമെന്ന് കരുതപ്പെടുന്നു. ബുധൻ ആശയവിനിമയം, വിശകലനം, യുക്തിചിന്ത, ഗണിതശാസ്ത്രം, കണക്കുകൂട്ടലുകൾ എന്നിവയെ പ്രതിനിധാനം ചെയ്യുന്നു. അതിനാൽ, ഈ മേഖലകളുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങൾ നിങ്ങൾ നേരിടുന്നുവെങ്കിൽ, ഈ വൃക്ഷത്തിന്റെ വേര് ധരിക്കാൻ ഉപദ്ദേശിക്കപ്പെടുന്നു. രത്നങ്ങളേ പോലുള്ള ഒരു പാർശ്വഫലങ്ങളും ഇതിന് ഇല്ല. നിങ്ങൾ ഇത് ധരിക്കുകയാണെങ്കിൽ, നിങ്ങളുടെ ആശയവിനിമയ കഴിവ്, സംഭാഷണം, ന്യായവാദം എന്നിവ മെച്ചപ്പെടും. ബുധൻ നിങ്ങളുടെ ജാതകത്തിൽ മോശമായസ്ഥാനത്താണെങ്കിൽ, ഒരു ജ്യോത്സ്യനോട് ചോദിച്ച് നിങ്ങളുടെ ജനന ചാർട്ട് പരിശോധിച്ച ശേഷം ഈ വൃക്ഷത്തിന്റെ വേര് ധരിക്കാവുന്നതാണ്.
TREE_ROOT_OF_BANANA=ഈ വൃക്ഷത്തിന്റെ വേര് വ്യാഴ ഗ്രഹത്തെ പ്രതിനിധീകരിക്കുന്നു. വൈദിക ജ്യോതിഷത്തിൽ വ്യാഴത്തെ ഗുരുവായും ശുഭ ഗ്രഹമായും കണക്കാക്കപ്പെടുന്നു. ഇത് നമ്മുടെ ജ്ഞാനത്തെയും കുടുംബത്തെയും കുട്ടികളെയും പ്രതിനിധാനം ചെയ്യുന്നു. വ്യാഴം നിങ്ങളുടെ ജാതകത്തിൽ ദുർബല സ്ഥാനത്താണ് സ്ഥിതിചെയ്യുന്നത് എങ്കിൽ അതിന്റെ നീചഫലങ്ങൾ കുറക്കുന്നതിന് ഈ വൃക്ഷത്തിന്റെ വേര് ധരിക്കാവുന്നതാണ്. നീചസ്ഥാനത് സ്ഥിതിചെയ്യുന്നെങ്കിലും നീചഫലങ്ങൾ നൽകാത്ത ഒരേ ഒരു ഗ്രഹമാണ് വ്യാഴം. ഇത് നീചസ്ഥാനത്താണെങ്കിലും ഇത് നല്ലതോ ചീത്തയോ ആകില്ല. വിവാഹം, കുട്ടികൾ, വിജ്ഞാനം എന്നിവയുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങൾ അഭിമുഖീകരിക്കുന്നവർക്ക് ഇത് ശുപാർശ ചെയ്യുക. അതിനാൽ വ്യാഴ ഗ്രഹത്തിന്റെ ദുഷിച്ച അല്ലെങ്കിൽ മോശമായ ഫലങ്ങൾ ഒഴിവാക്കാൻ നിങ്ങൾക്ക് ഈ വൃക്ഷത്തിന്റെ വേര് ഉപയോഗിക്കാവുന്നതാണ്. കനക ഭരണിയുടെ വേരും വ്യാഴ ഗ്രഹത്തിനായി ഉപയോഗിക്കാവുന്നതാണ്.
TREE_ROOT_OF_SHARPUNKHA=ഈ വേര് ശുക്ര ഗ്രഹത്തെ പ്രധിനിധാനം ചെയ്യുന്നു. ജാതകത്തിൽ സ്നേഹം, സൗന്ദര്യം, കല, ബന്ധങ്ങൾ, കാമുകി, വിവാഹം എന്നിവയെ പ്രതിനിധാനം ചെയ്യുന്ന ഗ്രഹമാണ് ശുക്രൻ. ശുക്രൻ നിങ്ങളുടെ ജാതകത്തിൽ നീചസ്ഥാനത്താണെങ്കിൽ, നിങ്ങൾ മേൽപറഞ്ഞ മേഖലകളുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങൾ നേരിടേണ്ടി വരും. ഈ സാഹചര്യത്തിൽ, നിങ്ങൾ വൃക്ഷത്തിന്റെ വേര് ധരിക്കാൻ കഴിയും. ശുക്രന്റെ സ്ഥാനം നിങ്ങളുടെ ജാതകത്തിൽ നല്ലതാണെങ്കിൽ, ശുക്രന്റെ ശക്തി വർദ്ധിപ്പിക്കുന്നതിന് ഈ വൃക്ഷത്തിന്റെ വേര് ഉപയോഗിക്കാം. വൈരക്കല്ലിന് ബദലായി ഇത് ഉപയോഗിക്കാം. എന്നിരുന്നാലും, ശുക്ര ഗ്രഹം ജാതകത്തിൽ ശുഭാസ്ഥാനത്തുള്ളവർക്കു മാത്രം ഡയമണ്ട് ശുപാർശ ചെയ്യാവുന്നതാണ്. വൈരക്കല്ല് ധരിക്കുന്നതിലൂടെ പാർശ്വ ഫലങ്ങളും ഉണ്ട്. അതിനാൽ ഇത് ധരിക്കുന്നതിനു മുൻപ് ഒരു ജ്യോതിഷനുമായി കൂടിയാലോചിക്കേണ്ടതുണ്ട് അതേസമയം വൃക്ഷത്തിന്റെ വേര് ധരിക്കുന്നത് മൂലം യാതൊരു പാർശ്വഫലങ്ങളുമുണ്ടാവില്ല. ചിറ്റമ്മങ്ങിന്റെ വേരും ശുക്രനായി ഉപയോഗിക്കാവുന്നതാണ്.
TREE_ROOT_OF_BICHUA=ഈ വൃക്ഷത്തിന്റെ വേര് "ശനി" ഗ്രഹത്തെ പ്രധിനിധാനം ചെയ്യുന്നു. ശനി, അതിന്റെ ന്യായവിധിക്ക് പേരുകേട്ട ഗ്രഹമാണ്. ശനി വളരെ സാവധാനം ചലിക്കുന്ന ഒരു ഗ്രഹമാണ്. ശനിയുടെ അവസാന ഘട്ടത്തിലാണ് ഇത് വ്യക്തിക്ക് ഫലങ്ങൾ നൽകുക. വേഗത കുറഞ്ഞതിനാൽ തന്നെ എല്ലാകാര്യങ്ങളിലും കാലതാമസമുണ്ടാകും. നിയന്ത്രണങ്ങളും പരിധികളുമായി ബന്ധപ്പെട്ടിരിക്കുന്നു.വൈദിക ജ്യോതിഷത്തിൽ ഇതിനെ ഒരു നീചഗ്രഹമായാണ് കണക്കാക്കപ്പെടുന്നത്. ഇത് ഭയം, ഉത്കണ്ഠ, സമ്മർദ്ദം എന്നിവക്കും ഉയർച്ച, തൊഴിൽ മേഖല, വിദ്യാഭ്യാസം എന്നിവയിൽ നിഷേദാത്മക ഫലങ്ങൾക്കും കാരണമാകും. ശനി നീചസ്ഥാനത്താണെങ്കിൽ ഇത് ജാതകക്കാരന് പൂർണ്ണമായും നീചപാലങ്ങൾ ആയിരിക്കും നൽകുക. ശനി മൂലമുണ്ടാകുന്ന മോശം ഘട്ടങ്ങളെ മറികടക്കാനായി വൃക്ഷത്തിന്റെ വേര് ഉപയോഗിക്കുന്നത് ഒരു പ്രകൃതിദത്ത പരിഹാരമാണ്. ശനി ശുഭാസ്ഥാനത്താണെങ്കിൽ, വ്യക്തികളിൽ ഇത് അനുഗ്രഹം വർഷിക്കും. വേഗതയേറിയ, നല്ല ഫലങ്ങൾ കൈവരിക്കാൻ ശനിയുടെ ശക്തി വർദ്ധിപ്പിക്കുന്നതിന് നിങ്ങൾക്ക് ഈ വൃക്ഷം ഉപയോഗിക്കാം. ശനിയുടെ ഫലങ്ങളെ സന്തുലിതമാക്കുന്നതിന് കടുത്തൂവയുടെ വേരും ഉപയോഗിക്കാം.
TREE_ROOT_OF_CHANDAN=ഈ വൃക്ഷത്തിന്റെ വേര് രാഹു ഗ്രഹത്തെ സൂചിപ്പിക്കുന്നു. രാഹു ഒരു ഗ്രഹമല്ല, അടിസ്ഥാനപരമായി ചന്ദ്രന്റെ ഉത്തര പൂർവ്വത്തെ ആസ്പതമാക്കിയുള്ളതാണ്. വൈദിക ജ്യോതിഷപ്രകാരം ഇതിനെ ഒരു ഗ്രഹമായി തന്നെ കണക്കാക്കപ്പെടുന്നു. ലോകത്തിലെ എല്ലാത്തിനോടും അതിമോഹം ഉണ്ടാക്കുന്ന ഒരു ഗ്രഹമാണ് രാഹു. പ്രാവിണ്യം, വിവരസാങ്കേതികവിദ്യ, രാഷ്ട്രീയം തുടങ്ങിയവയെ പ്രതിനിധാനം ചെയ്യുന്നു. പൊതുജനശ്രദ്ധ ഇത് എല്ലായ്പ്പോഴും ആഗ്രഹിക്കും. ഇതിന് എല്ലാ സുഖസൗകര്യങ്ങളും ആഡംബര വസ്തുക്കളും ആവശ്യമാണ്. ഇത് നിങ്ങളുടെ ജാതകത്തിൽ ദുർബലസ്ഥാനത്താണെങ്കിൽ, രാഹുവിന്റെ നീചഫലം കുറക്കുന്നതിനായി ഈ വൃക്ഷത്തിന്റെ വേര് ധരിക്കാവുന്നതാണ്. രാഹു ഒരു നീചഗ്രഹമായതുകൊണ്ടുതന്നെ, ഇത് വ്യക്തിയെ എല്ലാം നൽകി എപ്പോഴും അനുഗ്രഹിക്കുകയില്ല. എന്നിരുന്നാലും, രാഹുവിന്റെ നീചഫലം കുറയ്ക്കുന്നതിനായി ഇത് നിങ്ങൾക്ക് ശിപാർശ ചെയ്യുന്നു. ഇത് ശുഭാസ്ഥാനത്താണെങ്കിൽ, രാഹുവിന്റെ ശക്തി ഉയർത്തുന്നതിന് ഈ വൃക്ഷത്തിന്റെ വേര് ഉപയോഗിക്കാവുന്നതാണ്. മുത്തങ്ങയുടെ വേരും രാഹു ഗ്രഹത്തിനായി ഉപയോഗിക്കാവുന്നതാണ്.
TREE_ROOT_OF_ASHWAGANDHA=ഈ വൃക്ഷത്തിന്റെ വേര് കേതു ഗ്രഹത്തെ പ്രതിനിധാനം ചെയ്യുന്നു. കേതു ഒരു ഗ്രഹമല്ല. രാഹുവിനെ പോലെ തന്നെ ഇതും ദക്ഷിണ ചന്ദ്ര പൂർവ്വത്തെ ആസ്പതമാക്കിയുള്ളതാണ്. എന്നിരുന്നാലും വൈദിക ജ്യോതിഷപ്രകാരം ഇതിനെ ഒരു ഗ്രഹമായി തന്നെ കണക്കാക്കുന്നു. <a href="http://www.astrosage.com/planet/ketu/"> </a> ഭൗതികസൗകര്യങ്ങളൊന്നും ഇഷ്ടമല്ലാത്ത ഗ്രഹമാണിത്. എല്ലാ ഭൗതിക വസ്തുക്കളിൽ നിന്നും അകന്നു നിൽക്കാൻ ഇത് ആഗ്രഹിക്കുന്നു. ഇത് വളരെ ആത്മീയമായ ഗ്രഹമാണ്, മോക്ഷം ആവശ്യമാണ്. എന്നിരുന്നാലും, ഇത് ഒരു നീച ഗ്രഹമായതുകൊണ്ടുതന്നെ ഇതിന്റെ നീചസ്വഭാവം വ്യക്തികൾക്ക് പ്രശ്നങ്ങൾ സൃഷ്ട്ടിക്കും. നിങ്ങളുടെ ജാതകത്തിൽ ഇത് നീചസ്ഥാനത്താണെങ്കിൽ, കേതുവിന്റെ നീചഫലം കുറയ്ക്കാനായി ഈ വേര് ശുപാർശ ചെയ്യുന്നു. എന്നാൽ ഇത് ശുഭാസ്ഥാനത്താണെങ്കിൽ, ഇത് കേതുവിന്റെ ശക്തി വർപ്പിക്കുന്നതിന് ശുപാർശ ചെയ്യുന്നു.
TREE_ROOT_OF_ARAND=ഈ വേര് ശുക്ര ഗ്രഹത്തെ പ്രധിനിധാനം ചെയ്യുന്നു. ജാതകത്തിൽ സ്നേഹം, സൗന്ദര്യം, കല, ബന്ധങ്ങൾ, കാമുകി, വിവാഹം എന്നിവയെ പ്രതിനിധാനം ചെയ്യുന്ന ഗ്രഹമാണ് ശുക്രൻ. ശുക്രൻ നിങ്ങളുടെ ജാതകത്തിൽ നീചസ്ഥാനത്താണെങ്കിൽ, നിങ്ങൾ മേൽപറഞ്ഞ മേഖലകളുമായി ബന്ധപ്പെട്ട പ്രശ്നങ്ങൾ നേരിടേണ്ടി വരും. ഈ സാഹചര്യത്തിൽ, നിങ്ങൾ വൃക്ഷത്തിന്റെ വേര് ധരിക്കാൻ കഴിയും. ശുക്രന്റെ സ്ഥാനം നിങ്ങളുടെ ജാതകത്തിൽ നല്ലതാണെങ്കിൽ, ശുക്രന്റെ ശക്തി വർദ്ധിപ്പിക്കുന്നതിന് ഈ വൃക്ഷത്തിന്റെ വേര് ഉപയോഗിക്കാം. വൈരക്കല്ലിന് ബദലായി ഇത് ഉപയോഗിക്കാം. എന്നിരുന്നാലും, ശുക്ര ഗ്രഹം ജാതകത്തിൽ ശുഭാസ്ഥാനത്തുള്ളവർക്കു മാത്രം ഡയമണ്ട് ശുപാർശ ചെയ്യാവുന്നതാണ്. വൈരക്കല്ല് ധരിക്കുന്നതിലൂടെ പാർശ്വ ഫലങ്ങളും ഉണ്ട്. അതിനാൽ ഇത് ധരിക്കുന്നതിനു മുൻപ് ഒരു ജ്യോതിഷനുമായി കൂടിയാലോചിക്കേണ്ടതുണ്ട് അതേസമയം വൃക്ഷത്തിന്റെ വേര് ധരിക്കുന്നത് മൂലം യാതൊരു പാർശ്വഫലങ്ങളുമുണ്ടാവില്ല. കാട്ടമരിയുടെ വേരും ശുക്രനായി ഉപയോഗിക്കാവുന്നതാണ്.
TREE_ROOT_OF_DHATURE=ഈ വൃക്ഷവേര് ശനി ഗ്രഹത്തെ സൂചിപ്പിക്കുന്നു. ശനി, അതിന്റെ ന്യായവിധിക്ക് പേരുകേട്ട ഗ്രഹമാണ്. ശനി വളരെ സാവധാനം ചലിക്കുന്ന ഒരു ഗ്രഹമാണ്. ശനിയുടെ അവസാന ഘട്ടത്തിലാണ് ഇത് വ്യക്തിക്ക് ഫലങ്ങൾ നൽകുക. വേഗത കുറഞ്ഞതിനാൽ തന്നെ എല്ലാകാര്യങ്ങളിലും കാലതാമസമുണ്ടാകും. നിയന്ത്രണങ്ങളും പരിധികളുമായി ബന്ധപ്പെട്ടിരിക്കുന്നു. വൈദിക ജ്യോതിഷത്തിൽ ഇതിനെ ഒരു നീചഗ്രഹമായാണ് കണക്കാക്കപ്പെടുന്നത്. ഇത് ഭയം, ഉത്കണ്ഠ, സമ്മർദ്ദം എന്നിവക്കും ഉയർച്ച, തൊഴിൽ മേഖല, വിദ്യാഭ്യാസം എന്നിവയിൽ നിഷേദാത്മക ഫലങ്ങൾക്കും കാരണമാകും. ശനി നീചസ്ഥാനത്താണെങ്കിൽ ഇത് ജാതകക്കാരന് പൂർണ്ണമായും നീചപാലങ്ങൾ ആയിരിക്കും നൽകുക. ശനി മൂലമുണ്ടാകുന്ന മോശം ഘട്ടങ്ങളെ മറികടക്കാനായി വൃക്ഷത്തിന്റെ വേര് ഉപയോഗിക്കുന്നത് ഒരു പ്രകൃതിദത്ത പരിഹാരമാണ്. ശനി ശുഭാസ്ഥാനത്താണെങ്കിൽ, വ്യക്തികളിൽ ഇത് അനുഗ്രഹം വർഷിക്കും. വേഗതയേറിയ, നല്ല ഫലങ്ങൾ കൈവരിക്കാൻ ശനിയുടെ ശക്തി വർദ്ധിപ്പിക്കുന്നതിന് നിങ്ങൾക്ക് ഈ വൃക്ഷം ഉപയോഗിക്കാം. ശനിയുടെ ഫലങ്ങളെ സന്തുലിതമാക്കുന്നതിന് കടുത്തൂവയുടെ വേരും ഉപയോഗിക്കാം.

HOW_TO_USE_TREE_ROOT_OF_BEL=<ul> <li> <a href="http://buy.astrosage.com/jadi-tree-roots/belmool"> കൂവളം </a>, സൂര്യഗ്രഹത്തിനായുള്ള വേര്, കഴുത്തിന് ചുറ്റുമോ അല്ലെങ്കിൽ കൈയിലോ കെട്ടാം. </li> <li> ഇത് ധരിക്കുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിലോ അല്ലെങ്കിൽ ഗംഗാജലത്തിലോ മുക്കുക. </li> <li> ഭഗവാൻ ശിവന് അല്ലെങ്കിൽ വിഷ്ണുവിന് വെള്ള അല്ലെങ്കിൽ ചുവപ്പ് പൂക്കളും ചന്ദനത്തിരിയും പ്രാർത്ഥിച്ച് സമർപ്പിക്കുക, സൂര്യനായുള്ള മന്ത്രം - ഓം ഹ്രാമ് ഹ്രീം ഹ്‌റോമ് സ സുര്യായ നമഃ (Oṃ Hrāṃ Hrīṃ Hrauṃ Saḥ Sūryāya Namaḥ) - 108 തവണ ചൊല്ലുന്നത് ഇതിനെ ഊർജ്ജസ്വലമാക്കും. </li> <li> ഈ ആചാരത്തിന് ശേഷം ഇത് ഞായറാഴ്ച രാവിലെ അല്ലെങ്കിൽ കാർത്തിക, ഉത്രം, ഉത്രാടം നക്ഷത്രങ്ങളിലോ ധരിക്കാം. </li> </ul>
HOW_TO_USE_TREE_ROOT_OF_KHIRNI=<ul> <li>പഴമൂൺപാല, ചന്ദ്ര ഗ്രഹത്തിനായുള്ള വേര്, കഴുത്തിന് ചുറ്റുമോ അല്ലെങ്കിൽ കൈയിലോ കെട്ടാം. </li> <li> ഇത് ധരിക്കുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിലോ അല്ലെങ്കിൽ ഗംഗാജലത്തിലോ മുക്കുക. </li> <li> ശിവ പാർവതിക്ക് വെള്ള പൂക്കളും, അരിയും ചന്ദനത്തിരിയും പ്രാർത്ഥിച്ചു സമർപ്പിക്കുക, ചന്ദ്രനായി - ഓം സ്രാമ് സ്രിമ് സ്രോമ് സ ചന്ദ്രമസേ നമഃ (Oṃ Śrāṃ Śrīṃ Śrauṃ Saḥ Candramase Namaḥ) - 108 തവണ ചൊല്ലുന്നത് ഇതിനെ ഊർജ്ജസ്വലമാക്കും. </li> <li> ഈ ആചാരത്തിന് ശേഷം ഇത് തിങ്കളാഴ്ച അല്ലെങ്കിൽ പൗർണമി ദിവസം, അത്തം, രോഹിണി, തിരുവോണം നക്ഷത്രങ്ങളിലോ ധരിക്കാം. </li> </ul>
HOW_TO_USE_TREE_ROOT_OF_ANANTMOOL=<ul><li><a href="https://buy.astrosage.com/jadi-tree-roots/anantmool"> നന്നാറി </a>, ചൊവ്വ ഗ്രഹത്തിനായുള്ള വേര്, കഴുത്തിന് ചുറ്റുമോ അല്ലെങ്കിൽ കൈയിലോ കെട്ടാം. </li> <li> ഇത് ധരിക്കുന്നതിന് മുൻപ് തിളപ്പിക്കാത്ത പാലിലോ അല്ലെങ്കിൽ ഗംഗാജലത്തിലോ മുക്കുക. </li> <li> ഭഗവാൻ ഹനുമാന് ചുവപ്പു പൂക്കളും ചന്ദനത്തിരിയും സമർപ്പിക്കുക, ചൊവ്വക്കായി - ഓം ക്രാം ക്രീം ക്രോം സ ബൗമായ നമഃ ( Oṃ Krāṃ Krīṃ Krauṃ Saḥ Bhaumāya Namaḥ )- 108 തവണ ചൊല്ലുന്നത് ഇതിനെ ഊർജ്ജസ്വലമാക്കും. </li> <li> ഈ ആചാരത്തിന് ശേഷം ഇത് ചൊവ്വാഴ്ച അല്ലെങ്കിൽ മകയീരം, ചിത്ര, അവിട്ടം നക്ഷത്രങ്ങളിലോ ധരിക്കാം. </li> </ul>
