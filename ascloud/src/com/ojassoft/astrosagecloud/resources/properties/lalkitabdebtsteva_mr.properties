

	 LK_Rin_TEXT					= लाल किताब कुंडलीवर आधारित लाल किताब ऋण
	 RINS							= पूर्वजांचे ऋण#स्व ऋण#मातृ ऋण#स्त्री ऋण#बंधू किंवा नातलग ऋण#कन्या ऋण#अत्याचाराचे ऋण#भविष्यकाळातील ऋण#निसर्ग ऋण	
	 LK_FOREFATHER_DEBTS_SYMPTOM    = लाल किताबानुसार जेव्हा शुक्र, बुध आणी राहु कुंडलीच्या दुसऱ्या, पाचव्या, नवव्या किंवा बाराव्या घरात असतात तेव्हा व्यक्तीला पितरांच्या ऋण पीडू शकतात.
	 LK_FOREFATHER_DEBTS_REASON     = घरातील मोठ्यांनी खानदानी पुजारी बदलले असतील.
	 LK_FOREFATHER_DEBTS_INDICATION = जवळच्या देवळाचा किंवा पिंपळाचा नाश केला असेल.
	 LK_FOREFATHER_DEBTS_REMEDY     = १. सर्व रक्ताच्या नातेवाईकांकडून रुपयाची नाणी गोळा करून एका दिवसात ती रकम देवळाला दान करावी. <br/>२. घरात पिंपळ असल्यास, पाणी घालून त्याची सेवा करावी.
	 FATHER_DEBTS_FALSE             = तुमची कुंडली पितरांच्या ऋण पासून मुक्त आहे.
	 FATHER_DEBTS_TRUE              = तुमच्या कुंडलीत पितरांचे ऋण असू शकतात. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 LK_SELF_DEBTS_SYMPTOM          = लाल किताबानुसार जेव्हा शुक्र, शनि, राहु व केतु कुंडलीच्या पाचव्या घरात असतात तेव्हा व्यक्ती स्व ऋणात अडकलेली असते.
	 LK_SELF_DEBTS_REASON           = तुमच्या पितारांनी व वडिलधार्यांनी पारंपारिक कौटुंबिक चाली पार पाडल्या नाहीत. परमेश्वरावर हवी तेवढी श्रद्धा दाखवली नाही.
	 LK_SELF_DEBTS_INDICATION       = घराखाली चूल असेल किंवा छपराला खूप छिद्रे असतील ज्यातून सूर्यकिरणे आत येऊ शकतात.
	 LK_SELF_DEBTS_REMEDY           = १. सर्व रक्ताच्या नातेवाईकांकडून सम प्रमाणात देणग्या घेऊन यज्ञ करावे.
	 SELF_DEBTS_FALSE               = तुमची कुंडली स्व रुणापासून मुक्त आहे.
	 SELF_DEBTS_TRUE                = स्व ऋण तुमच्या कुंडलीत आहेत. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 LK_MOTHER_DEBTS_SYMPTOM		= लाल किताबानुसार कुंडलीच्या चौथ्या घरात केतु असल्यास, मातृ ऋण असण्याचा संभव असतो.
	 LK_MOTHER_DEBTS_REASON			= ह्याचे कारण असू शकते - पितारांनी आईला छळले असेल किंवा दुर्लक्षिले असेल, किंवा तिच्या तान्ह्या बाळापासून तिला दूर ठेवले असेल, किंवा तिच्या दुःखाला दुर्लक्षिले असेल.
	 LK_MOTHER_DEBTS_INDICATION		= जवळची नदी किंवा विहीर पूजेसाठी न वापरता कचरा फेकण्यासाठी वापरली जात आहे.
	 LK_MOTHER_DEBTS_REMEDY			= १. रक्ताच्या नातेवाईकांकडून समप्रमाणात चांदी गोळा करून त्याच दिवशी नदीत वाहून देणे.
	 MOTHER_DEBTS_FALSE				= मातृरुणापासून तुमची कुंडली मुक्त आहे.
	 MOTHER_DEBTS_TRUE				= तुमच्या कुंडलीत मातृ ऋण असू शकते. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 LK_WOMAN_DEBTS_SYMPTOM			= लाल किताबानुसार जर कुंडलीच्या दुसऱ्या किंवा सातव्या घरात सूर्य, चंद्र, राहु असले तर व्यक्तीस स्त्री ऋण असू शकते.
	 LK_WOMAN_DEBTS_REASON			= ह्याचे कारण असू शकते - स्वार्थापोटी तुमच्या पितारांनी किंवा वडीलधार्या व्यक्तीने गरोदर बाईचा खून केला असेल.
	 LK_WOMAN_DEBTS_INDICATION		= घरात दात असलेले प्राणी असतील, खास करून गाय, किंवा कुळाचा द्वेष करणारे.
	 LK_WOMAN_DEBTS_REMEDY			= १. सर्व रक्ताच्या नातेवाईकांकडून समप्रमाणात पैसे घेऊन त्या पैशांनी १०० गाईंना चविष्ट चारा त्याच दिवशी घालणे.
	 WOMAN_DEBTS_FALSE				= तुमची कुंडली स्त्री रुणापासून मुक्त आहे.
	 WOMAN_DEBTS_TRUE				= तुमच्या कुंडलीत स्त्री ऋण असू शकते. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 LK_RELATIVES_DEBTS_SYMPTOM		= लाल किताबानुसार जेव्हा केतु व बुध कुंडलीच्या पहिल्या किंवा आठव्या घरात असतात, तेव्हा व्यक्तीवर नातलगाचे ऋण असू शकते.
	 LK_RELATIVES_DEBTS_REASON		= ह्याचे कारण असू शकते - तुमच्या एखाद्या पूर्वजाने कोण्याचा पिकाला किंवा घराला आग लावली असेल, किंवा कोणाला विष पाजले असेल किंवा कोणच्या गरोदर म्हशीला मारले असेल.
	 LK_RELATIVES_DEBTS_INDICATION	= नातेवाईकांबद्दल द्वेष, मंगळ सुखी प्रसंगी - जसे मुलांचे वाढदिवस वगैरे कुटुंबापासून दूर राहणे.
	 LK_RELATIVES_DEBTS_REMEDY		= १. सर्व रक्ताच्या नातेवाईकांकडून समप्रमाणात पैसे घेऊन ते एखाद्या हकीम किंवा डॉक्टरला इतरांच्या मदतीसाठी द्यावे. <BR/>२. सर्व रक्ताच्या नातेवाईकांकडून समप्रमाणात पैसे घेऊन त्या पैश्यांनी औषधे विकत घ्यावी व ती एखाद्या सामाजिक संस्थेला दान करावी.
	 RELATIVES_DEBTS_FALSE			= तुमची कुंडली नातलगांच्या रुणापासून मुक्त आहे.
	 RELATIVES_DEBTS_TRUE			= आपकीतुमच्या कुंडलीत नातलग ऋण असू शकते. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 LK_DAUGHTER_DEBTS_SYMPTOM		= लाल किताबानुसार कुंडलीच्या तिसऱ्या किंवा सहाव्या घरात चंद्र असल्यास व्यक्तीला कन्या ऋण असू शकते.
	 LK_DAUGHTER_DEBTS_REASON		= ह्याचे कारण असू शकते कोणी पूर्वजाने किंवा वादिल्धार्याने एखाद्या मुलीला किंवा कोणाच्या बहिणीला त्रास दिला असेल किंवा तिचा खून केला असेल.
	 LK_DAUGHTER_DEBTS_INDICATION	= हरवलेली मुले विकणे किंवा त्याचा गैरवापर करणे.
	 LK_DAUGHTER_DEBTS_REMEDY		= १. सर्व रक्ताच्या नातेवाईकांनी एकत्र पिवळ्या कवड्या विकत घ्यावेत, त्या जाळून राख कराव्यात व त्याच दिवशी नदीत सोडाव्यात.
	 DAUGHTER_DEBTS_FALSE			= तुमची कुंडली कन्या रुणापासून मुक्त आहे.
	 DAUGHTER_DEBTS_TRUE			= तुमची कुंडली कन्या ऋण असू शकते. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 LK_OPPRESSOR_DEBTS_SYMPTOM		= लाल किताबानुसार कुंडलीच्या दहाव्या आणी अकराव्या घरात सूर्य, चंद्र व बुध असले तर व्यक्तीला अत्याचारी ऋण असू शकते.
	 LK_OPPRESSOR_DEBTS_REASON		= ह्याचे कारण असू शकते एखाद्या पूर्वजाने अथवा वादिल्धार्याने कोणाचे घर हिसकावून घेतले असेल व त्याला त्याचे पैसेही दिले नसतील.
	 LK_OPPRESSOR_DEBTS_INDICATION	= घराचे मुख्य द्वार दक्षिणेकडे असेल, किंवा घराची जमीन अशा व्यक्तीकडून घेतली असेल ज्याला पुत्र नसेल किंवा घर एखाद्या विहिरीवर व रस्त्यावर बांधले असेल.
	 LK_OPPRESSOR_DEBTS_REMEDY		= १. १०० ठिकाणच्या माश्यांना खायला घालावे अथवा १०० कामगारांना जेवायला घालावे.
	 OPPRESSOR_DEBTS_FALSE			= तुमची कुंडली अत्याचाराच्या रुणापासून मुक्त आहे. 
	 OPPRESSOR_DEBTS_TRUE			= तुमच्या कुंडलीत अत्याचार ऋण असू शकते. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 LK_UNBORN_DEBTS_SYMPTOM		= लाल किताबानुसार जेव्हा कुंडलीच्या बाराव्या घरात सूर्य, मंगळ व शुक्र असतात तेव्हा व्यक्तीला भविष्यकाळातील ऋण असू शकते.
	 LK_UNBORN_DEBTS_REASON			= ह्याचे कारण असू शकते - एखाद्या पूर्वजाने किंवा वडीलधार्याने नातेवाईकाला किंवा व्याह्यांना दगा दिला असेल ज्याने त्यांचा परिवार उध्वस्त झाला असेल.
	 LK_UNBORN_DEBTS_INDICATION		= पायरी खाली गटार, किंवा घराच्या दक्षिणेकडील भिंतीशी नष्ट झालेलि स्मशानभूमी व भट्टी.
	 LK_UNBORN_DEBTS_REMEDY			= १. सर्व रक्ताच्या नातेवाईकांकडून एक एक नारळ घ्यावा व ते सर्व त्याच दिवशी नदीत सोडावेत.
	 UNBORN_DEBTS_FALSE				= तुमची कुंडली भविष्यकाळातील रुणापासून मुक्त आहे.
	 UNBORN_DEBTS_TRUE				= तुमच्या कुंडलीत भविष्यकाळाचे ऋण असू शकते. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 LK_NATURE_DEBTS_SYMPTOM		= लाल किताबानुसार जेव्हा चंद्र व मंगळ कुंडलीच्या सहाव्या घरात असतात तेव्हा व्यक्तीला निसर्ग ऋण असू शकते.
	 LK_NATURE_DEBTS_REASON			= एखाद्या पूर्वजाने किंवा वडीलधार्या माणसाने एखाद्या माणसाला करुण कुत्र्याप्रमाणे निर्घृणपणे मारले असेल.
	 LK_NATURE_DEBTS_INDICATION		= गोळीने कुत्र्याला मारले, दुसर्याच्या मुलाला मारणे, किंवा स्वतःच्या भाच्याला तो उध्वस्त होईपर्यंत दगा देणे.
	 LK_NATURE_DEBTS_REMEDY			= १. सर्व रक्ताच्या नातेवाईकांकडून पैसे गोल करून त्या पैश्यांनी त्याच दिवशी १०० कुत्र्यांना दुधाचे गोड पदार्थ किंवा खीर खाऊ घालणे. <br/>२. जवळच राहणाऱ्या व लवकर विधवा झालेल्या स्त्रीची सेवा करणे व तिचे आशीर्वाद मिळवणे.
	 NATURE_DEBTS_FALSE				= तुमची कुंडली निसर्ग रुणापासून मुक्त आहे.
	 NATURE_DEBTS_TRUE				= तुमच्या कुंडलीत निसर्ग ऋण असू शकते. वर दिलेले निर्देश आपल्याला लागू पडत असल्यास व आपल्या रक्ताच्या नातेवाईकांच्या कुंडलीत ही असेच योग असल्यास, वरील उपाय करून पाहावेत.
	 ANCESTRAL_DEBTS                = वडिलोपार्जित कर्ज
	 RinIntroduction                = लाल किताबानुसार, कुंडलीच्या कामिंपैकी एक मोठी कमी आहे ऋण. वडिलोपार्जित ऋण म्हणजे पितारांनी व घरातील मोठ्यांनी केलेल्या पापाचे भोग. दुसऱ्या शब्दात सांगायचे तर, हे ऋण म्हणजे इतरांनी केलेल्या चुकीची परतफेड. कुंडलीतील ऋण नातेवाईकांच्या कुंडलीत देखील दिसून येतात. सर्वसाधारणपणे, ह्या ऋणांचा परिणाम अक्ख्या कुटुंबावर पडतो व अक्ख्या कुटुंबाला मिळून त्यावर उपाय करावा लागतो. व्यक्तीला राजयोग असला तरी, ग्रह ऋण दाखवत असल्यास वाईट परिणाम भोगावे लागतात.
	 LK_REASON                      = कारण
	 LK_INDICATION                  = निर्देश
	 LK_REMEDY                      = उपाय
