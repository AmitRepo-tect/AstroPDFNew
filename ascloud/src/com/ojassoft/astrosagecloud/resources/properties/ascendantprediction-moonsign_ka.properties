

     ZODIAC_SIGN                            = ಮೇಷ#ವೃಷಭ#ಮಿಥುನ#ಕರ್ಕ#ಸಿಂಹ#ಕನ್ಯಾ#ತುಲಾ#ವೃಶ್ಚಿಕ#ಧನು#ಮಕರ#ಕುಂಭ#ಮೀನ

     HEALTH_PREDICTION                      = ಮೇಷ ಲಗ್ನ ಜನರು ಸಾಧಾರಣವಾಗಿ ತಲೆನೋವು, ವಿಶೇಷವಾಗಿ ತಲೆಶೂಲೆ, ಬಿಸಿಲಿನ ಝಳ, ನರಶೂಲೆ ಹಾಗೂ ಖಿನ್ನತೆಯಂಥ ರೋಗಗಳಿಂದ ಬಳಲುತ್ತಾರೆ. ಅವರು ಅಜೀರ್ಣತೆ ಹಾಗೂ ನರವ್ಯಾಧಿಗಳಂಥ ವೈದ್ಯಕೀಯ ಸ್ಥಿತಿಗಳನ್ನೂ ಹೊಂದಿರಬಹುದು ಹಾಗೂ ಅವರ ಒರಟುತನ ಹಾಗೂ ದೈಹಿಕ ಶ್ರಮ ಅವರನ್ನು ದೈಹಿಕ ಗಾಯಗಳಿಗೆ ಈಡು ಮಾಡಬಹುದು ಹಾಗೂ ಆಗಾಗ ಮೂಲವ್ಯಾಧಿಯಂಥ ದೂರುಗಳನ್ನೂ ಅವರು ಹೊಂದಿರಬಹುದು. ಅನೇಕ ಮೇಷ ರಾಶಿಯವರು ತಲೆ ಅಥವಾ ಮುಖದ ಮೇಲೆ ಒಂದು ಜನ್ಮದ ಗುರುತಿನ ಜೊತೆ ಹುಟ್ಟಿರುತ್ತಾರೆ. ಮೇಷ ರಾಶಿಯಲ್ಲಿ ಹುಟ್ಟಿದವರು ಅಧಿಕ ರಕ್ತದೊತ್ತಡದಂಥ ವಾಹನೆಯ ತೊಂದರೆಗಳಿಗೆ ಈಡಾಗಬಹುದು #ವೃಷಭವು ಸಾಮಾನ್ಯವಾಗಿ ಒಂದು ಬಲವಾದ ಆರೋಗ್ಯಪೂರ್ಣ ರಾಶಿಯಾಗಿದ್ದರೂ ಅವರಿಗೆ ಜೀವನಪರ್ಯಂತ ಕಾಡುವ ದುರ್ಬಲ ಅಂಶಗಳಿರುತ್ತವೆ. ಅವರು ಅನೇಕ ಬಾರಿ ನರವ್ಯವಸ್ಥೆಗೆ ಸಂಬಂಧಪಟ್ಟ ವ್ಯಾಧಿಗಳಿಂದ ಬಳಲುತ್ತಾರೆ. ಅವರಲ್ಲಿ ಅನೇಕರು, ವಿಶೇಷವಾಗಿ ಮೇನಲ್ಲಿ ಜನಿಸಿದವರು ಅತಿ ತೂಕ ಹೊಂದಿರಬಹುದು. ಅವರು ಲೈಂಗಿಕ ರೋಗಗಳನ್ನು ಹೊಂದಬಹುದು. ಅವರು ಬೆನ್ನುಮೂಳೆಯ ತುದಿ, ಕೆಳದವಡೆ, ಹಲ್ಲು ಹಾಗೂ ಅಂಗುಳಿನ ತೊಂದರೆಗಳನ್ನು ಹೊಂದಬಹುದು. ವೃಷಭ ರಾಶಿಯವರಲ್ಲಿ ಮೂತ್ರಪಿಂಡಗಳು, ಜನನೇಂದ್ರಿಯಗಳು ಹಾಗೂ ಪಿತ್ತಕೋಶ, ಗಟ್ಟಿ ಕುತ್ತಿಗೆ, ಗಂಟಲು ನೋವು ಹಾಗೂ ಕಿವಿನೋವುಗಳ ತೊಂದರೆಗಳು ಸಾಮಾನ್ಯವಾಗಿರುತ್ತವೆ #ಈ ರಾಶಿಯ ಸ್ವಭಾವ ಉದ್ವೇಗ, ನಿರಾಶಾವಾದ, ವಿಧೇಯತನ, ಹಾಗೂ ಅಸಹನೆಯೂ ಆಗಿರುತ್ತದೆ. ಕ್ಷಯ, ಅಸ್ತಮಾ ಹಾಗೂ ರಕ್ತಹೀನತೆ ಸಾಮಾನ್ಯ ತೊಂದರೆಗಳಾಗಿರುತ್ತವೆ. ಅವರು ನರದ ಹಾಗೂ ಶ್ವಾಸದ ವ್ಯಾಧಿಗಳಿಗೆ ಈಡಾಗಬಹುದು ಹಾಗೂ ವಿಶೇಷವಾಗಿ ಶ್ರವಣ ಸಾಮರ್ಥ್ಯದಲ್ಲಿ ತೊಂದರೆ ಉಂಟಾಗಬಹುದು. ಶ್ವಾಸೋಚ್ಛಾಸದ ತೊಂದರೆಗಳು ಹಾಗೂ ಅನೇಕ ನರಸ್ಥಿತಿಗಳು ಸಾಮಾನ್ಯವಾಗಿರುತ್ತವೆ. #ಕರ್ಕ ಲಗ್ನದವರು ಕೆಮ್ಮು, ಅಜೀರ್ಣತೆ, ವಾಯು ಹಾಗೂ ಹೊಟ್ಟೆ, ಯಕೃತ್ತು ಹಾಗೂ ಕರುಳಿನ ಸಾಮಾನ್ಯ ಸಮಸ್ಯೆಗಳನ್ನು ಹೊಂದುವ ಸಾಧ್ಯತೆಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಬಹಳ ಸೂಕ್ಷ್ಮವಾಗಿದ್ದು ಅನೇಕ ಬಾರಿ ಅವರು ಖಿನ್ನತೆ, ರೋಗಭ್ರಮೆ ಹಾಗೂ ಉನ್ಮಾದದಂಥ ಮಾನಸಿಕ ವ್ಯಾಧಿಗಳನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ. ಈ ಅತೀ ಸೂಕ್ಷ್ಮತೆ ದುರ್ಬಲ ಜೀರ್ಣತೆ, ಉದರದ ಉರಿಯೂತ ಹಾಗೂ ಇತರ ಹೊಟ್ಟೆಯ ರೋಗಳಿಗೆ ನಾಂದಿಯಾಗಬಹುದು ಹಾಗೂ ಕೆಮ್ಮು ಹಾಗೂ ದೃಷ್ಟಿ ಮಂದವಾಗುವ ಸಾಧ್ಯತೆಯೂ ಇದೆ. #ಸಿಂಹರಾಶಿಯವರ ರೋಗಗಳು ಸಾಮಾನ್ಯವಾಗಿ ಹೃದಯವನ್ನು ಒಳಗೊಂಡಿರುತ್ತದೆ ಹಾಗೂ ಇದು ಗಂಭೀರವಾದಲ್ಲಿ ಹೃದಯ ನಾಳಗಳು ರಕ್ತ ಹೆಪ್ಪುಗಟ್ಟುವಿಕೆ ಅಥವಾ ತಡೆಗಟ್ಟುವಿಕೆಯಿಂದಾಗಿ ಉಟಾಗುವ ಹೃದಯ ರಕ್ತನಾಳಗಳ ತಡೆಗಟ್ಟುವಿಕೆಯನ್ನು ಒಳಗೊಂಡಿರುತ್ತದೆ. ಕಂಪನಗಳಂಥವುಗಳಿಂದ ಉದ್ವೇಗದ ಒತ್ತಡ ಹೃದಯದ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರಬಹುದು. ಸಿಂಹರಾಶಿಯವರಿಗೆ ಸಂಬಂಧಪಟ್ಟ ನೋವುಗಳು ಬೆನ್ನು ಹಾಗೂ ಶ್ವಾಸಕೋಶಗಳಲ್ಲಿ ನೋವು, ಬೆನ್ನುಮೂಳೆಯ ದೂರುಗಳು, ಹೃದಯ ಹಾಗೂ ರಕ್ತದ ರೋಗಗಳು, ಪಕ್ಕೆಲಬು ಹಾಗೂ ಬದಿಗಳಲಿ ಅನಾರೋಗ್ಯ, ಸೆಳೆತಗಳು, ಸಂತೋಷಗಳು, ಕಣ್ಣಿನ ಕೆಲವು ತೊಂದರೆಗಳೂ ಸೇರಿದಂತೆ ತೀವ್ರವಾಗಿ ಸುಡುವ ಜ್ವರಗಳಾಗಿರುತ್ತವೆ. #ಕರುಳು ಹಾಗೂ ಅಜೀರ್ಣತೆಯ ತೊಂದರೆಗಳು ಕನ್ಯಾ ರಾಶಿಯವರ ಸಾಮಾನ್ಯವಾಗಿ ದೂರುಗಳಾಗಿವೆ. ಚಿತ್ತ ಬದಲಾವಣೆಗಳು ಹಾಗೂ ಹತಾಶೆ ಸುತ್ತಮುತ್ತಲಿನ ಪ್ರದೇಶದಲ್ಲಿರುವವರ್ ಮೇಲೆ ಪರಿಣಾಮ ಬೀರಬಹುದು. ಕನ್ಯಾ ಲಗ್ನವಿರುವವರು ತಮ್ಮ ಲೈಂಗಿಕ ಅಂಗಗಳಲ್ಲಿ ತೊಂದರೆ ಹೊಂದಬಹುದು. ಅವರ ಹೊಟ್ಟೆಯಿಂದಾಗಿ ಅವರು ಪಥ್ಯದ ಬಗ್ಗೆ ಎಚ್ಚರಿಕೆಯಿಂದಿರಬೇಕು, ಹಾಗೂ ಅವರು ವಿಲಕ್ಷಣ ಆಹಾರಗಳ ಬಗೆಗಿನ ತಮ್ಮ ಸೆಳೆತವನ್ನು ನಿಯಂತ್ರಣದಲ್ಲಿಡಬೇಕು #ಬಹಳಷ್ಟು ತುಲಾ ರಾಶಿಯವರು ನಿದ್ರಾಹೀನತೆ, ಸಮೃದ್ಧ ಆಹಾರ ಹಾಗೂ ಅತಿಯಾದ ಮದ್ಯಪಾನದಿಂದ ಉಂಟಾಗುವ ಸೂಕ್ಷ್ಮ ಚರ್ಮವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ತುಲಾ ರಾಶಿಯು ಮೂತ್ರಪಿಂಡ ಹಾಗೂ ಚರ್ಮ, ಟೊಂಕ ಪ್ರದೇಶ, ನಿತಂಬಗಳು, ಕಲಿಜೊತ್ತುಗಳು ಹಾಗೂ ವೃದ್ಧಿಹ್ರಾಸಕ ವ್ಯವಸ್ಥೆಯ ಮೂಲಕ ವಿಸರ್ಜನಾ ಕಾರ್ಯಗಳನ್ನು ನಿಯಂತ್ರಿಸುತ್ತದೆ. ತುಲಾ ರಾಶಿಯು ಮೂತ್ರಪಿಂಡಗಳು, ಕೆಳ ಬೆನ್ನು ಹಾಗೂ ಅಂಡಾಶಯಗಳಿಗೆ ಅಧಿಪತಿಯಾಗಿದೆ. ಕೆಳಬೆನ್ನು ನೋವು ಅಥವಾ ಬಹಳಷ್ಟು ಸಕ್ಕರೆ ಅಥವಾ ಸಮೃದ್ಧ ಆಹಾರದಿಂದ ಉಂಟಾದ ತೊಂದರೆಗಳು ಸಾಮಾನ್ಯ ಆರೋಗ್ಯ ಸಮಸ್ಯೆಗಳಾಗಿವೆ. #ವೃಶ್ಚಿಕವು ಪುನುರುತ್ಪಾದನಾ ಅಂಗಗಳು ಹಾಗೂ ವಿಸರ್ಜನಾ ವ್ಯವಸ್ಥೆಯನ್ನು ಆಳುತ್ತದೆ. ವೃಶ್ಚಿಕವು ಮೂಗು ಹಾಗೂ ಮೂಗಿನ ಮೂಳೆಗಳು, ವಸ್ತಿಕುಹರದ ಪ್ರದೇಶ, ಲೈಂಗಿಕ ಅಂಗಗಳು ಹಾಗೂ ಹೆಮೋಗ್ಲೋಬಿನ್ ಅನ್ನು ಆಳುತ್ತದೆ. ವೃಶ್ಚಿಕವು ಶ್ರೋಣಿ ಕುಹರ ಹಾಗೂ ಪುನುರುತ್ಪಾದನಾ ಹಾಗೂ ಮೂತ್ರ ವ್ಯವಸ್ಥೆಗಳನ್ನು ಆಳುತ್ತದೆ ಹಾಗೂ ಯಕೃತ್ತು ಹಾಗೂ  ಮೂತ್ರಪಿಂಡಗಳ ತೊಂದರೆಗಳು, ಪಿತ್ತಕೋಶ ಹಾಗೂ ಲೈಂಗಿಕ ಅಂಗಗಳಲ್ಲಿ ಕಲ್ಲು ಅಥವಾ ಕಲ್ಲುಬೇನೆಗಳಿಗೆ ಕಾರಣವಾಗಬಹುದು. ವೃಶ್ಚಿಕ ಲಗ್ನವಿರುವವರಲ್ಲಿ ಮೂಲವ್ಯಾಧಿ ಹಾಗೂ ಹುಣ್ಣುಗಳಂಥ ರೋಗಗಳಿರುತ್ತವೆ #ಧನುವಿನ ರೋಗಗಳು ವಿಶೇಷವಾಗಿ ನಿತಂಬ ಹಾಗೂ ತೊಡೆಗಳನ್ನು ಒಳಗೊಂಡಿರುತ್ತದೆ. ಈ ರಾಶಿಯ ಜೊತೆ ಮುಂಚಿನಿಂದಲೂ ಬೆನ್ನು ನೋವಿಗೆ ಸಂಬಂಧ ಕಲ್ಪಿಸಲಾಗಿದೆ. ಜ್ವರದ ದೂರುಗಳು ಹಾಗೂ ಶ್ವಾಸಕೋಶಕ್ಕೆ ಸಂಬಂಧಪಟ್ಟ ಅನಾರೋಗ್ಯಗಳನ್ನ ಗಮನಿಸಬಹುದು. ಸಮೃದ್ಧ ಆಹಾರಗಳು ಹಾಗೂ ಮದ್ಯಪಾನದ ಅಧಿಕ ಸೇವನೆ ಕೆಲವೊಮ್ಮೆ ಟೊಂಕದಲ್ಲಿ ಸಂದು ನೋವಿಗೆ ಕಾರಣವಾಗುತ್ತವೆ. #ಮಕರ ರಾಶಿಯವರು ವಿಟಾದಿಂದ (ಗಾಳಿ) ಉಂಟಾದ ರೋಗಗಳಿಂದ ಬಳಲುತ್ತಾರೆ. ಮಕರ ಲಗ್ನವಿರುವವರು ಸಾಮಾನ್ಯವಾಗಿವಾಗಿ ರೋಗಗಳನ್ನು ಹೊಂದದಿದ್ದರೂ ಒಮ್ಮೆ ಅವರಿಗೆ ರೋಗ ಬಂದರೆ ಅವರಲ್ಲಿ ಆ ಲಕ್ಷಣಗಳು ಹಾಗೇ ಉಳಿಯುತ್ತವೆ ಹಾಗೂ ಅವರು ವ್ಯಾಧಿಭ್ರಮೆಯುಳ್ಳವರಾಗಬಹುದು. ಮಕರ ರಾಶಿಯು ಸಂದುಗಳು, ಕೂದಲು, ಹಲ್ಲು, ಹಾಗೂ ಚರ್ಮ ಹಾಗೂ ವಿಶೇಷವಾಗಿ ನರವ್ಯವಸ್ಥೆಯನ್ನು ಆಳುತ್ತದೆ. ಈ ರಾಶಿಯ ಅಪಘಾತಗಳು ಮುರಿದ ಮೂಳೆಗಳು, ಉಳುಕುಗಳು, ಕೀಲು ತಪ್ಪುವುದು ಹಾಗೂ ಮೊಣಕಾಲುಗಳು ಹಾಗೂ ಕೆಳಗೆ ಗಾಯಗಳನ್ನು ಒಳಗೊಂಡಿರುತ್ತವೆ. #ಕುಂಭವು ಪ್ರವಹನೆ, ಉಸಿರಾಟ ಹಾಗೂ ದೃಷ್ಟಿ, ಹಾಗೂ ಕೆಳ ಅಂಗಾಂಗಗಳನ್ನು ಆಳುತ್ತದೆ. ಅಶುದ್ಧ ರಕ್ತವಿರುವ ಸಾಧ್ಯತೆಯ ಜೊತೆಗೆ ಅನೇಕ ಬಾರಿ ರಕ್ತ ಹಾಗೂ ಪ್ರವಹನೆಗೆ ಸಂಬಂಧಿಸಿದ ರೋಗಗಳನ್ನು ಹೊಂದುತ್ತಾರೆ. ಕುಂಭ ರಾಶಿಯವರು ಅಧಿಕ ರಕ್ತದೊತ್ತಡ ಹಾಗೂ ಹೃದಯದ ಸಮಸ್ಯೆಗಳನ್ನು ಹೊಂದಬಹುದು. ಕುಂಭ ರಾಶಿಯು ಕಣಕಾಲುಗಳು, ಪ್ರವಹನ ವ್ಯವಸ್ಥೆ, ಸೆಲೆತಗಳು, ಅಲರ್ಜಿಗಳು, ಅನಿರೀಕ್ಷಿತ ಅನಾರೋಗ್ಯಗಳು ಹಾಗೂ ವಿಚಿತ್ರ ಅಪಘಾತಗಳಿಗೆ ಅಧಿಪತಿ. ಅವರು ಅನೇಕ ನರದ ಅನಾರೋಗ್ಯಗಳಿಂದಲೂ ಬಳಬಹುದು #ಮೀನರಾಶಿಯು ಅಂತಃಸ್ರಾವಕ ವ್ಯವಸ್ಥೆಯೊಡನೆ ಸಂಬಂಧ ಹೊಂದಿದ್ದು ಇಲ್ಲಿ ಮಧುಮೇಹ ತೀವ್ರವಾದ ಕಾಲಿನ ಸಮಸ್ಯೆಗಳು ಹಾಗೂ ಇತರ ತೊಂದರೆಗಳನ್ನು ಉಂಟುಮಾಡಬಹುದು. ಊತ, ಔಷಧಗಳಿಗೆ ಅಲರ್ಜಿಯ ಪ್ರತಿಕ್ರಿಯೆಗಳು, ಪಾದಗಳಿಗೆ ಗಾಯ ಹಾಗೂ ಸಂಬಂಧಪಟ್ಟ ತೊಂದರೆಗಳು ಸಾಮಾನ್ಯ ದೂರುಗಳಾದರೂ ಮೀನರಾಶಿಯವರ ಮಾನಸಿಕ ಸ್ವಭಾವವೂ ಅವರನ್ನು ಮಾನಸಿಕ ಖಾಯಿಲೆಗಳಿಗೆ ಈಡುಮಾಡಬಹುದು.
     TEMPERAMENT_AND_PERSONALITY_PREDICTION = ಮೇಷ ಲಗ್ನವಿರುವವರು ಅದ್ಭುತ ಚೈತನ್ಯ ಹೊಂದಿರುತ್ತಾರೆ, ಹಾಗೂ ಅವರು ಯಾವತ್ತೂ ಪ್ರವರ್ತನೆಗಾಗಿ ಸಿದ್ಧರಾಗಿರುತ್ತಾರೆ. ಅವರ ವ್ಯಕ್ತಿತ್ವದ ಅತ್ಯಂತ ಪ್ರಮುಖ ಅಂಶವೆಂದರೆ ಅವರ ನೇರವಂತಿಕೆಯಾಗಿದೆ. ಅವರು ಸಹಜ ಮುಂದಾಳುಗಳು; ತಾವೇ ತಮ್ಮ ಯಜಮಾನರಾಗಿರುವುದರಿಂದ ಅವರು ಇತರರಿಂದ ಆಜ್ಞೆಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವುದನ್ನು ಸಹಿಸುವುದಿಲ್ಲ. ಅವರ ಆಕರ್ಷಣೆಯೆಂದರೆ ಅವರ ಅನಿರೀಕ್ಷಿತತೆಯಾಗಿದೆ; ಈ ಗುಣಲಕ್ಷಣವು ಕೆಲವೊಮ್ಮೆ ಅವರನ್ನು ಒಂದೇ ಸಮಯದಲ್ಲಿ ಆಕ್ರಮಣಕಾರಿಯಾಗಿಯೂ ಹಾಗೂ ದುರ್ಬಲರಾಗಿಯೂ ಹಾಗೂ ತುಂಬ ಕೋಪಿಷ್ಟರನ್ನಾಗಿಯೂ ಮಾಡಿದರೂ ಇನ್ನೊಂದು ಕಡೆಯಿಂದ ನೋಡಿದಲ್ಲಿ ಅವರನ್ನು ತುಂಬ ಸುಲಭವಾಗಿ ಒಪ್ಪಿಸಬಹುದು ಅಥವಾ ಸಂತೋಷಪಡಿಸಬಹುದು. ಮೇಷ ಲಗ್ನವಿರುವವರು ನೇರ ಮಾತಿನವರಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ತಮ್ಮ ಮಾತಿನಲ್ಲಿ ನಿಷ್ಠುರ ಹಾಗೂ ನಯವಂತಿಕೆಯಿಲ್ಲದವರಾಗಿರುತ್ತಾರೆ; ಆದ್ದರಿಂದ ಅವರು ತುಂಬ ಸುಲಭವಾಗಿ ಬಿಸಿಬಿಸಿ ವಾಗ್ವಾದ ಅಥವಾ ಚರ್ಚೆಗಳಲ್ಲಿ ಸಿಲುಕುತ್ತಾರೆ. ಅಧ್ಯಯನ ವೈದ್ಯರು ಮೊಂಡಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ಅವರ ಹಠಾತ್ ಕೋಪ ಜನರನ್ನು ಅನೇಕ ಬಾರಿ ಆಶ್ಚರ್ಯಚಿಕಿತರನ್ನಾಗಿಸಿದರೂ ಅವರನ್ನು ಶೀಘ್ರವಾಗಿ ಸಮಾಧಾನಪಡಿಸಬಹುದು. ಅವರ ಆವೇಗವು ಅವರನ್ನು ಕೆಲವೊಮ್ಮೆ ಗಂಭೀರ ಸಮಸ್ಯೆಗಳಿಗೆ ಸಿಲುಕಿಸುತ್ತದೆ. ನೀರನ್ನು ಕಂಡರೆ ಅಷ್ಟೇನೂ ಪ್ರೀತಿಯಿಲ್ಲ ಹಾಗೂ ಅವರಿಗೆ ಸುಂದರ ಕಲೆ ಹಾಗೂ ಸೌಂದರ್ಯದ ಆಸ್ವಾದನೆಯಿರುತ್ತದೆ. ಅವರಲ್ಲಿ ಬಹಳಷ್ಟು ಜನರಿಗೆ ಒಂದು ನಿರ್ದಿಷ್ಟ ಗುರಿಯನ್ನು ತಲುಪಿದ ನಂತರ ವಿಶ್ರಮಿಸುವುದೆಂದರೆ ಬಹಳ ಪ್ರೀತಿ. ಈ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ವ್ಯಕ್ತಿ ಔಚಿತ್ಯಪೂರ್ಣ, ಪ್ರೀತಿಪಾತ್ರರಾಗಿದ್ದರೂ ಕೆಲವೊಮ್ಮೆ ಭಾವಜೀವಿಗಳೂ ಆಗಿರುತ್ತಾರೆ. #ಈ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದ ವ್ಯಕ್ತಿಗಳು ಹೊಸಬರೊಡನೆ ತಮ್ಮ ನಡವಳಿಕೆಯಲ್ಲಿ ಗೂಳಿಯನ್ನು ಪ್ರತಿನಿಧಿಸುತ್ತಾರೆ. ಅವರ ಮೌನದ, ಶಾಂತವಾದ, ಅಂತರ್ಮುಖಿ ಸ್ವಭಾವ ಅವರು ಸ್ನೇಹಪರ ಸ್ವಭಾವರಾಗಿರುವುದನ್ನು ತಡೆಯುವುದರಿಂದ ಅವರಿಗೆ ಹೊಸಬರನ್ನು ಭೇಟಿಯಾಗುವುದು ಅಷ್ಟೇನೂ ಇಷ್ಟದ ಕೆಲಸವಲ್ಲ. ಅವರನ್ನು ಎಚ್ಚರಿಕೆಯಿಂದ ನಿರ್ವಹಿಸದಿದ್ದಲ್ಲಿ ಹಾಗೂ ಆಲಿಸದಿದ್ದಲ್ಲಿ ಅವರು ಇತರರೆಡೆ ದ್ವೇಷಯುಕ್ತ, ಎಚ್ಚರಿಕೆಯ ಹಾಗೂ ಸಂಪ್ರದಾಯಬದ್ಧ ಧೋರಣೆಯನ್ನು ತೋರಿಸಬಹುದು. ಅವರಿಗೆ ಹೊಸಬರನ್ನು ಭೇಟಿ ಮಾಡುವುದು ಮುಜುಗರದ ಕೆಲಸವಾದ್ದರಿಂದ ಅವರಿಗೆ ಹೊಸ ಸ್ನೇಹಿತರನ್ನು ಹೊಂದಲು ಕಷ್ಟವಾಗುತ್ತದೆ. ಅವರು ವಿಶ್ವಾಸಾರ್ಹರು ಹಾಗೂ ಸಕಾರಣವಾಗಿ ಯೋಚಿಸುವವರೂ ಆದ್ದರಿಂದ ಅವರು ವ್ಯಾಪಾರದಲ್ಲಿ ಚೆನ್ನಾಗಿ ಸಾಧನೆ ಮಾಡುತ್ತಾರೆ. ಇವರು ಇಂದ್ರಿಯ ಸುಖಗಳ ವ್ಯಕ್ತಿಗಳಾಗಿದ್ದು ಎಲ್ಲ ರಂಗದಲ್ಲೂ ದೈಹಿಕ ಸುಖವನ್ನು ಅನ್ವೇಷಿಸುತ್ತಾರೆ. ಆದರೆ ಅವರು ಉದ್ಯಮಶೀಲರೂ ಆಗಿದ್ದು ತಮ್ಮದೇ ವೇಗದಲ್ಲಿ ಕೊಟ್ಟಿರುವ ಕೆಲಸವನ್ನು ಸರಿಯಾದ ಸಮಯಕ್ಕೆ ಮುಗಿಸುತ್ತಾರೆ. ಅವರು ಇತರರ ಪ್ರಯತ್ನಗಳನ್ನೂ ಶ್ಲಾಘಿಸುತ್ತಾರೆ ಹಾಗೂ ಅವರ ಪ್ರತಿಭೆಯನ್ನು ಮುಕ್ತವಾಗಿ ಪ್ರಶಂಸಿಸುತ್ತಾರೆ. ಅವರು ಆಗಾಗ ಸರ್ವಾಧಿಕಾರೀ ಧೋರಣೆಯನ್ನೂ ಪ್ರದರ್ಶಿಸಬಹುದು. ವೃಷಭ ರಾಶಿಯವರು ಸುಲಭವಾಗಿ ಆಕರ್ಷಣೆಗೊಳಗಾಗುವುದಿಲ್ಲ ಹಾಗೂ ಅವರು ಆಕರ್ಷಣೆಗೊಳಗಾದರೂ ಅವರು ತಮ್ಮ ಪ್ರೀತಿಪಾತ್ರರೆಡೆ ತುಂಬ ಎಚ್ಚರಿಕೆಯಿಂದ ಹೆಜ್ಜೆ ಹಾಕುತ್ತಾರೆ. ವೃಷಭ ರಾಶಿಯವರು ತಮ್ಮ ಮೌಲ್ಯ ಹಾಗೂ ಸಿದ್ಧಾಂತಗಳ ಬಗ್ಗೆ ಅಚಲ ನಿಲುವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ಅವರ ದೃಷ್ಟಿಕೋನವನ್ನು ಬದಲಿಸುವುದು ತುಂಬ ಕಷ್ಟ. ಆದರೂ ಅವರು ಪ್ರೀತಿಪರರಾಗಿರುತ್ತಾರೆ, ಸತ್ಯವನ್ನು ಪ್ರಶಂಸಿಸುತ್ತಾರೆ ಹಾಗೂ ಇತರರನ್ನು ಆಯಸ್ಕಾಂತದಂತೆ ಸೆಳೆಯುವ ವ್ಯಕ್ತಿತ್ವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಆವೇಗಭರಿತರಲ್ಲದಿದ್ದರೂ ಅವರನ್ನು ಬಹಳವೇ ಕಣಕಿದಲ್ಲಿ ಅವರು ಗೂಳಿಯ ಹಾಗೆ ಕೋಪಿಷ್ಟರಾಗಬಹುದು. ಕೆಲವೊಮ್ಮೆ ಅವರು ಪೂರ್ವಾಗ್ರಹಪೀಡಿತರೂ, ಮೊಂಡು ಹಠದವರೂ ಹಾಗೂ ಅಸಮಂಜಸ ಪ್ರವೃತ್ತಿಗಳವರೂ ಆಗಿರಹುದು, ಅವರು ತಮ್ಮ ಸಂಗಾತಿಗಳನು ಆಯ್ಕೆ ಮಾಡುವಾಗ ತುಂಬ ಎಚ್ಚರಿಕೆಯಿಂದಿರುತ್ತಾರೆ. ಅವರಿಗೆ ಸುಳ್ಳು ಹೇಳುವುದು ಇಷ್ಟವಿಲ್ಲದಿದ್ದರೂ ಅವರನ್ನು ತುಂಬ ಸುಲಭವಾಗಿ ಮೋಸ ಮಾಡಬಹುದು. #ಸಾಮಾನ್ಯವಾಗಿ ಮಿಥುನ ರಾಶಿಯವರು ತುಂಬ ಸಕ್ರಿಯರೂ ಹಾಗೂ ಆಕರ್ಷಣೀಯರೂ ಆಗಿರುತ್ತಾರೆ, ಹಾಗೂ ಇವರು ಮೆಲು ಮಾತಿನಿಂದ ಅದ್ಭುತವಾದ ವಾಗ್ಮಿಗಳಾಗಿರುತ್ತಾರೆ. ಅವರು ತುಂಬ ಸಕ್ರಿಯ ಬಿದ್ದು ಹಾಗೂ ದೇಹಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ, ಹಾಗೂ ಅವರ ನಿಜವಾದ ವಯಸ್ಸಿಗಿಂತ ಅನೇಕ ಬಾರಿ ಕಡಿಮೆ ವಯಸ್ಸಾದವರಂತೆ ಕಾಣುತ್ತಾರೆ. ಪ್ರವರ್ತನೆ ಅವರ ಹುಟ್ಟುಗುಣ. ಇದರ ಕೆಟ್ಟ ಪರಿಣಾಮವೆಂದರೆ ಅವರು ಸ್ವಲ್ಪ ಪ್ರಚೋದನೆಯಿದ್ದರೂ ತಮ್ಮ ಮನಸ್ಸು ಬದಲಿಸುತ್ತಾರೆ ಹಾಗೂ ಒಂದೇ ವಿಷಯದಲ್ಲಿ ಸ್ಥಿರವಾಗಿರುವುದಿಲ್ಲ ಹಾಗೂ ಅವರು ಅವಿಶ್ರಾಂತರೂ, ಸುಲಭವಾಗಿ ಬೇಸರಗೊಳ್ಳುವವರೂ ಹಾಗೂ ಧೀರ್ಘ ಕಾಲದವರೆಗೆ ಯಾವುದಾದರೂ ಒಂದೇ ವಿಷಯದ ಬಗ್ಗೆ ಗಮನಹರಿಸಲು ಸಾಧ್ಯವಿರದವರೂ ಆಗಿರುತ್ತಾರೆ. ತಮ್ಮ ಉದ್ದೇಶಗಳನ್ನು ಪುರೈಸಿಕೊಳ್ಳಲು ಇತರರನ್ನು ಮೋಸ ಮಾಡುವ ಪ್ರವೃತ್ತಿಯೂ ಇರುತ್ತದೆ. ಆದರೆ ಮಿಥುನ ರಾಶಿಯವರು ತಮ್ಮ ಅದ್ಭುತವಾದ ಮನರಂಜನಾತ್ಮಕ ಗುಣದಿಂದಾಗಿ ತಮ್ಮ ನಕಾರಾತ್ಮಕ ಗುಣಗಳು ಮರೆಮಾಚುವಂತೆ ನೋಡಿಕೊಳ್ಳುತ್ತಾರೆ.  ಅವರು ಅವಿಶ್ರಾಂತ ಮನೋಭಾವದವರಾಗಿದ್ದು ಮನಸ್ಸು ಬದಲಿಸುತ್ತಿರುವುದರಿಂದ ಅವರನ್ನು ನಂಬಲಾಗದು. ಮಿಥುನ ರಾಶಿಯವರ ಮನಸ್ಸನ್ನು ಬೌದ್ಧಿಕತೆ ಆವರಿಸಿರುತ್ತದೆ ಹಾಗೂ ಬೌದ್ಧಿಕವಾದ ಎಲ್ಲ ವಿಷಯಗಳಿಗೆ ಅವರು ತುಂಬ ಮಹತ್ವ ನೀಡುತ್ತಾರೆ. ಸಂಪರ್ಕವೂ ಅವರಿಗೆ ತುಂಬ ಮುಖ್ಯವಾದ ವಿಷಯವಾದ್ದರಿಂದ ಅವರು ಯಾವತ್ತೂ ಜ್ಞಾನವನ್ನು ಬಂಧಿಸಿಡುವುದಿಲ್ಲ. ಮಿಥುನ ರಾಶಿಯವರು ಎಲ್ಲ ಸೂರ್ಯ ರಾಶಿಗಳಲ್ಲಿ ಅತ್ಯಂತ ಹೆಚ್ಚು ಬಹುಮುಖೀ ಸಾಮರ್ಥ್ಯವುಳ್ಳವರು. ಅವರು ಒಂದು ಆಯ್ಕೆಯನ್ನು ಆರಿಸಿ ಮಾರನೇ ದಿನವೇ ಅದನ್ನು ಸಂಪೂರ್ಣವಾಗಿ ಬದಲಿಸುತ್ತಾರೆ. ಅವರಿಗೆ ಯಾವುದೂ ಶಿಲಾಶಾಸನವಲ್ಲ. ಅವರು ಮುಕ್ತ ಮನಸ್ಸಿನವರು ಹಾಗೂ ಕುತೂಹಲ ಹಾಗೂ ತಿಳಿದುಕೊಳ್ಳುವ ಬಯಕೆ ಅವರನ್ನು ಸದಾ ಮುನ್ನಡೆಸುತ್ತದೆ. ಮಿಥುನ ರಾಶಿಯವರು ಯಾವತ್ತೂ ಒಂದೇ ಕೆಲಸದಲ್ಲಿ ಸಂಪೂರ್ಣವಾಗಿ ತೊದಗಿಸಿಕೊಳ್ಳುವುದಿಲ್ಲ ಹಾಗೂ ಅವರ ಮುಟ್ಟಿರದಿದ್ದದ್ದೇ ಅವರಿಗೆ ಆಕರ್ಷಣೀಯವಾಗಿ ಕಾಣುತ್ತದೆ. ಅವರಿಗೆ ಸ್ವ-ನಿಯಂತ್ರಣವಿಲ್ಲ.#ಕರ್ಕ ರಾಶಿಯವರು ಸ್ವಪ್ನಲೋದಲ್ಲಿದ್ದಂತೆ ತೋರುವುದು, ಅಪರೋಕ್ಷಜ್ಞಾನ, ಭಾವುಕತೆ ಹಾಗೂ ಒಂದು ಸುರಕ್ಷಿತ ವಾಸಸ್ಥಳದ ಅವಶ್ಯಕತೆ ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಉತ್ತಮವಾದ ಸಂಭಾಷಣಾ ಹಾಗೂ ಸಾಹಿತ್ಯಿಕ ಕೌಶಲ್ಯಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಹಾಸ್ಯಪ್ರಜ್ಞೆಯುಳ್ಳವರೂ, ಉಲ್ಲಾಸಭರಿತರೂ ಹಾಗೂ ಅನಿರಂತರರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಕೆಲವು ಮಟ್ಟದ ಧಾರ್ಮಿಕತೆಯನ್ನೂ ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ಕೆಲವರಿಗೆ  ಅತೀಂದ್ರಿಯ ಪ್ರವೃತ್ತಿಗಳಿರುತ್ತವೆ. ಅವರು ಅದ್ಭುತವಾದ ಜ್ಞಾಪಕಶಕ್ತಿಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ದಯಾಳುಗಳೂ, ಸಂವೇದನಾಶೀಲರೂ ಹಾಗೂ ಸಹಾನುಭೂತಿಯುಳ್ಳವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರಿಗೆ ಮನೆಯೆಮ್ದರೆ ತುಂಬ ಇಷ್ಟ ಹಾಗೂ ಅವರು ತಮ್ಮ ಮನೆಯನ್ನು ತಮಗಿಷ್ಟ ಬಂದಂತೆ ಅಭಿವೃದ್ಧಿಪಡಿಸುತ್ತಾರೆ. ವೈಯುಕ್ತಿಕ ಸಂಬಂಧಗಳಲ್ಲಿ ಕರ್ಕ ರಾಶಿಯವರು ಕಠೋರತೆ ಹಾಗೂ ಮೃದುತ್ವದ ಮಿಶ್ರಣವಾಗಿದ್ದು ಇವರು ಒಂದೆಡೆ, ಭಾವನಾತ್ಮಕರು, ಪ್ರೀತಿಪರರು ಹಾಗೂ ಭಾವುಕರೂ ಆಗಿರುತ್ತಾರೆ ಹಾಗೂ ಇನ್ನೊಂದೆಡೆ ಜಗ್ಗದ ಸ್ವಾಮ್ಯ ಪ್ರವೃತ್ತಿಯವರೂ ಹಾಗೂ ನಿಷ್ಠರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಧಾರಕ ಜ್ಞಾಪಕ ಶಕ್ತಿಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ಅವರಿಗಾದ ಮೋಸ ಹಾಗೂ ಅವಮಾನಗಳನ್ನು ಮರೆಯುವುದಿಲ್ಲ. ಕರ್ಕ ರಾಶಿಯವರಿಗೆ ""ಹಳೆಯದ್ದನ್ನೆಲ್ಲ ಮರೆಯುವ"" ಗುಣ ಅಪರಿಚಿತ; ಅವರು ಯಾವತ್ತೂ ಯಾರ ತಪ್ಪನ್ನೂ ಕ್ಷಮಿಸುವುದಿಲ್ಲ. ಅವರು ಭಾವನಾತ್ಮಕ ಸ್ವಭಾವದಿಂದಾಗಿ ಅವರು ತುಂಬ ಒಳ್ಳೆಯ ಅಥವಾ ತುಂಬ ಕೆಟ್ಟ ಸ್ನೇಹಿತರಾಗಿರಬಹುದು. ಅವರು ಜಾಣರಾಗಿದ್ದು ತಾವು ಮಾಡುವುದರಲ್ಲೆಲ್ಲ ತುಂಬ ಎಚ್ಚರಿಕೆ ವಹಿಸುತ್ತಾರೆ ಹಾಗೂ ಉತ್ಪಾದನಾಶೀಲರಾಗಿರುತ್ತಾರೆ.#ಈ ರಾಶಿಯವರು ಕ್ರಿಯಾಶೀಲ ಹಾಗೂ ಆಕರ್ಷಕ ವ್ಯಕ್ತಿತ್ವದ ಮಾಲಕರು. ಒಬ್ಬ ಸಾಮಾನ್ಯವಾಗಿ ಸಿಂಹ ರಾಶಿಯವರು ಮಹತ್ವಾಕಾಂಕ್ಷಿಗಳು, ಧೈರ್ಯಶಾಲಿಗಳು, ಗಟ್ಟಿ ಮನಸ್ಸಿನವರು, ಸಕಾರಾತ್ಮಕ ಮನೋಭಾವದವರು, ಸ್ವತಂತ್ರರು ಹಾಗೂ ಆತ್ಮವಿಶ್ವಾಸ ಹೊಂದಿರುವವರಾಗಿರುತ್ತಾರೆ. ಅವರು ನೇರವಂತಿಕೆಯ ಹಾಗೂ ಸಂಕೀರ್ಣತೆಯಿಲ್ಲದವರಾಗಿದ್ದು ಅವರಿಗೆ ತಮಗೇನು ಬೇಕು ಎಂದು ತಿಳಿದಿರುತ್ತದೆ ಹಾಗೂ ಅದನ್ನು ಅವರು ಸಂಪೂರ್ಣ ಉತ್ಸಾಹ ಹಾಗೂ ಕ್ರಿಯಾತ್ಮಕ ಚೈತನ್ಯದೊಡನೆ ಬೆನ್ನತ್ತಿಹೋಗುತ್ತಾರೆ. ಸಾಧಾರಣವಾಗಿ ಅವರು ಕೋಪಿಷ್ಟರಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ಕೆಲವೊಮ್ಮೆ ಅಪಮಾನಗೊಂಡಾಗ ಒರಟಾಗಿ ಹಾಗೂ ಮನಸ್ಸಿಗೆ ನೋವಾಗುವಂತೆ ಮಾತನಾಡುತ್ತಾರೆ ಹಾಗೂ ಇವರು ದುರ್ವ್ಯವಹಾರ ಹಾಗೂ ಆಕ್ರಮಣಶೀಲತೆಯಿಂದ ಘಾಸಿಗೊಳ್ಳುತ್ತಾರೆ. ಅವರು ವೈಯುಕ್ತಿಕ ಟೀಕೆಗೆ ಬಹಳ ಸೂಕ್ಷಜ್ಞರಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ಅವರ ಪ್ರಭುತ್ವಕ್ಕೆ ಧಕ್ಕೆ ಬಂದಾಗ ಅವರಿಗೆ ತುಂಬ ಕೋಪ ಬರುತ್ತದೆ. ಅವರು ಹಠವಾದಿಗಳಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ಏನೇ ಬಂದರೂ ತಮ್ಮ ನಂಬಿಕೆಯನ್ನು ಕಾಯ್ದುಕೊಳ್ಳುತ್ತಾರೆ. ಆದರ್ಶವಾದಿ ಹಾಗೂ ಮಾನವತಾವಾದೀ ಸ್ವಭಾವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಮೂಲಭೂತವಾಗಿ ಸಿಂಹ ರಾಶಿಯವರು ಬಾಹ್ಯಮುಖಿಗಳೂ, ಸಂತೋಷಪರರೂ, ದಯಾಳುಗಳೂ, ಸ್ವ-ಅಭಿವ್ಯಕ್ತಿ ಹೊಂದಿರುವವರೂ, ಬುದ್ಧಿವಂತರೂ ಹಾಗೂ ವಿಶಾಲ ಮನಸ್ಸಿನವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಒಂದು ಸ್ಥಿರ ನಿರ್ಧಾರವನ್ನು ಹೊಂದಿರುತ್ತಾರಾದರೂ ಸ್ವಲ್ಪ ಪ್ರಚೋದನೆಯಾದರೂ ಅವರಿಗೆ ಕಡು ಕೋಪ ಬರುತ್ತದೆ ಆದರೆ ಈ ಕೋಪವನ್ನು ಸುಲಭವಾಗಿ ಶಮನಗೊಳಿಸಬಹುದು. ಅವರು ಬಹಳ ಕಾಲ ಸೇಡಿಟ್ಟುಕೊಂಡಿರುತ್ತಾರೆ ಹಾಗೂ ಸ್ವತಂತ್ರವಾಗಿ ಆಲೋಚಿಸುತ್ತಾರೆ. ಅವರು ಧರ್ಮಕ್ಕೆ ಸಂಬಂಧಿಸಿದಂತೆ ಸಂಪ್ರದಾಯಬದ್ಧ ನಿಲುವನ್ನು ಹೊಂದಿದ್ದರೂ ಇತರರ ಪರಿಕಲ್ಪನೆಗಳು ಹಾಗೂ ಪದ್ಧತಿಗಳ ಬಗ್ಗೆ ಸಹಿಷ್ಣುತೆ ಹೊಂದಿರುತ್ತಾರೆ.#ಕನ್ಯಾ ರಾಶಿಯ ಲಗ್ನದವರು ಸಾಮಾನ್ಯವಾಗಿ ಅಂತರ್ಮುಖಿಗಳಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ವಿನಮ್ರರೂ ಹಾಗೂ ಮೆಲುಮಾತಿನವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಸಾಮಾಜಿಕವಾಗಿ ಉನ್ನತಿ ಸಾಧಿಸಲು ತಮಗೆ ಸಹಾಯ ಮಾಡುವವರಲ್ಲಿ ತಮ್ಮ ಸ್ನೇಹಿತರನ್ನು ಕಂಡುಕೊಳ್ಳುತ್ತಾರೆ. ಅವರಿಗೆ ತಡೆಗಳು ಬಂದಾಗ, ಅವರು ಶಾಂತಿಯುತವಾಗಿಯೂ, ವಿಚಾರಪೂರ್ಣರಾಗಿಯೂ ಇರುತ್ತಾರೆ ಹಾಗೂ ಸಮಸ್ಯೆಗೆ ಪರಿಹಾರ ಕಂಡುಹಿಡಿಯಲು ಶ್ರಮಿಸುತ್ತಾರೆ. ಅವರ ಶಾಂತಸ್ವಭಾವವನ್ನು ಕೆಲವೊಮ್ಮೆ ತಣ್ಣಗಿನ ಹಾಗೂ ಲೆಕ್ಕಾಚಾರದ ಪ್ರವೃತ್ತಿಯೆಂದು ಅಪಾರ್ಥ ಮಾಡಲಾಗುತ್ತದೆ. ಅವರಿಗೆ ತುಂಬ ಸಂಕೀರ್ಣ ಸಮಸ್ಯೆಗಳನ್ನೂ ವಿಮರ್ಶಿಸುವ ಹಾಗೂ ಪರಿಹರಿಸುವ ಸಾಮರ್ಥ್ಯವಿರುತ್ತದೆ. ಅವರಿಗೆ ಚಿಕ್ಕಪುಟ್ಟ ವಿವರಗಳನ್ನು ಗಮನಿಸುವ ಅದ್ಭುತ ಸಾಮರ್ಥ್ಯವಿರುತ್ತದಾದರೂ ಕೆಲವೊಮ್ಮೆ ಒಟ್ಟಾರೆ ಚಿತ್ರಣವನ್ನು ನಿರ್ಲಕ್ಷಿಸುತ್ತಾರೆ. ಅವರು ತುಂಬ ಬೌದ್ಧಿಕ ಪ್ರವೃತ್ತಿಯವರಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ವಾಸ್ತವದ ಕೊಳಕು ಹಾಗೂ ದಿಕ್ಕುತಪ್ಪಿಸುವ ಸ್ವರೂಪಕ್ಕೆ ಯಾವುದೇ ರಿಯಾಯಿತಿ ನೀಡುವುದಿಲ್ಲ. ಕನ್ಯಾ ರಾಶಿಯವರು ತುಂಬ ಸ್ನೇಹಪರರಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ಎಲ್ಲದರ ಬಗ್ಗೆಯೂ ತುಂಬ ಜ್ಞಾನ ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ಸಾಮಾನ್ಯವಾಗಿ ಗಮನಿಸುವವರು, ಪ್ರಖರ ಬುದ್ಧಿಮತ್ತೆಯವರು, ವಿಮರ್ಶಾ ಸ್ವಭಾವದವರು ಹಾಗೂ ಸಹಿಷ್ಣುಗಳೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಸ್ನೇಹದಲ್ಲಿ ತುಂಬ ಆಯ್ಕೆಯ ಸ್ವಭಾವದವರಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ಸಂಬಂಧಗಳನ್ನು ಮುಕ್ತವಾಗಿಡಬಯಸುತ್ತಾರೆ.  ಕನ್ಯಾ ಲಗ್ನದವರು ಚಿಂತೆ ಹಾಗೂ ರೋಗಭ್ರಾಂತಿಯನ್ನು ಹೊಂದುವ ಸಾಧ್ಯತೆಯಿದೆ. ಅವರು ತಮ್ಮನ್ನು ತಾವು ಇತರರಿಗೆ ಉಪಯುಕ್ತವಾಗಿಸಿಕೊಳ್ಳುತ್ತಾರೆ ಹಾಗೂ ಇದು ಅನೇಕ ಬಾರಿ ಅವರನ್ನು ಮೋಸಕ್ಕೊಳಗಾಗುವಂತೆ ಹಾಗೂ ದುರ್ಬಳಕೆಗೊಳ್ಳುವಂತೆ ಮಾಡುತ್ತದೆ. ಕನ್ಯಾ ಲಗ್ನದವರು ತಮ್ಮ ಬಗ್ಗೆ ಹಾಗೂ ಇತರರ ಬಗೆಗೂ ಸಣ್ಣ ತಪ್ಪುಗಳನ್ನು ಎತ್ತಿ ತೋರಿಸುತ್ತಾರೆ, ಹಠವಾದಿಗಳಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ವಿಮರ್ಶಾತ್ಮಕ ಮನಸ್ಸಿನವರಾಗಿರುತ್ತಾರೆ.#ತುಲಾ ಲಗ್ನದ ಜನರು ಅವರೇ ಸರಿಯೆಂದು ಅವರಿಗೆ ತಿಳಿದಿರುವಾಗಲೂ ವಾದದ ಹಿಂಸೆಯನ್ನು ಅನುಭವಿಸುವ ಬದಲು ಸಹಕಾರ ನೀಡುತ್ತಾರೆ, ರಾಜಿ ಮಾಡಿಕೊಳ್ಳುತ್ತಾರೆ ಹಾಗೂ ಬಿಟ್ಟುಬಿಡುತ್ತಾರೆ. ಇತರರೊಂದಿಗೆ ಭಿನ್ನಾಭಿಪ್ರಾಯವು ಅವರನ್ನು ಅಸುರಕ್ಷಿತ, ಮತ್ತು ಅಹಿತಕರವಾಗಿಸುತ್ತದೆ. ಅವರು ತಮ್ಮ ಜೀವನದಲ್ಲಿ ಸಾಮರಸ್ಯಕ್ಕಾಗಿ ಹಂಬಲಿಸುತ್ತಾರೆ ಮತ್ತು ಅದನ್ನು ಹೊಂದಲು ಏನು ಬೇಕಾದರೂ ಮಾಡಬಲ್ಲರು. ಅವರು ವಿಶ್ವಾಸಾರ್ಹವಲ್ಲದಿರಬಹುದು ಮತ್ತು ಹಿಂಜಿರಿಯಬಹುದು, ದಿನಚರಿಯ ಬಗ್ಗೆ ಅಸಹಿಷ್ಣುತೆ ಹೊಂದಿರಬಹುದು, ಬೇಸರವಾಗುವಷ್ಟು ಸಂಪ್ರದಾಯವಾದಿಗಳಾಗಿರಬಹುದು ಮತ್ತು ನಾಚಿಕೆಯ ಸ್ವಭಾವದಾಗಿರಬಹುದು. ತುಲಾ ಲಗ್ನದ ಜನರು ನಿಧಾನವಾಗಿ ಕೋಪಗೊಳ್ಳುತ್ತಾರೆ ಮತ್ತು ಅವರು ತಮ್ಮ ಕ್ರೋಧ ತಮ್ಮ ಹಠಾತ್ ಸಿಟ್ಟಿನಿಂದ ಸಿತ್ತಲಿನ ಜನರನ್ನು ದಿಗ್ಭ್ರಮೆಗೊಳಿಸಬಲ್ಲರು. ಅವರು ವಾಸ್ತವವಾದಿಗಳಿಗಿಂತ ಹೆಚ್ಚಾಗಿ ಆದರ್ಶವಾದಿಗಳಾಗಿರುತ್ತಾರೆ; ಹಾಗೂ ಸಾಮಾನ್ಯವಾಗಿ ಗಾಳಿಯಲ್ಲಿ ಗೋಪುರ ನಿರ್ಮಿಸುವಂತ ಯೋಜನೆಗಳ ಬಗ್ಗೆ ವಿಚಾರ ಮಾಡುತ್ತಾರೆ. ಒಬ್ಬ ಸಾಮಾನ್ಯ ತುಲಾ ರಾಶಿಯವರು ಕಲಾತ್ಮಕವಾಗಿ ಮತ್ತು ಸುಸಂಸ್ಕೃತರಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ಸರಿ ಮತ್ತು ತಪ್ಪಿನ ಬಗ್ಗೆ ಬಹಳ ಧೃಢವಾದ ಅಭಿಪ್ರಾಯಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಅವರು ಜನ್ಮತಃ ಪಂಡಿತರಾಗಿರುತ್ತಾರಾದರೂ ಅವರು ಆಕರ್ಷಕ ಮತ್ತು ಪ್ರಾಮಾಣಿಕವಾಗಿಯೂ ಇರುತ್ತಾರೆ. ಅವರು ಅವಿವೇಕದವರಾಗಿರುತ್ತರೆ ಮತ್ತು ಸಾಮಾನ್ಯವಾಗಿ ಶಾಂತಿಪ್ರಿಯರಾಗಿರುತ್ತಾರೆ; ಸುಲಭ ನಡವವಳಿಕೆಯರೂ ಮತ್ತು ಸಮೂಹಜೀವಿಗಳೂ ಆಗಿರುತ್ತಾರೆ. ತುಲಾ ಲಗ್ನದ ಜನರನ್ನು ಅತ್ಯಂತ ಸುಸಂಸ್ಕೃತರೆಂದು ಪರಿಗಣಿಸಲಾಗುತ್ತದೆ. ನೀವು ಚೆನ್ನಾಗಿ ಕಾಣುತ್ತೀರಿ ಮತ್ತು ಆಧುನಿಕತೆ, ಆಕರ್ಷಣೀಯತೆ ಮತ್ತು ಉತ್ತಮ ಅಭಿರುಚಿಯನ್ನು ಹೊಂದಿದ್ದೀರಿ. ಅವರಿಗೆ ಸಾಮಾಜಿಕ ಪರಿಸರ ತುಂಬ ಇಷ್ಟ ಹಾಗೂ ತಮ್ಮ ಸಾಮಾಜಿಕ ಘನತೆಯನ್ನು ವೃದ್ಧಿಸುವುದು ಅವರಿಗೆ ಅಪಾರ ಸಂತೋಷ ನೀಡುತ್ತದೆ. ಅವರು ವಾಸ್ತವವಾದಿಗಳೂ ಹಾಗೂ ತೀರ್ಮಾನಗಳನ್ನು ಕೈಗೊಳ್ಳುವಲ್ಲಿ ನಿಷ್ಪಕ್ಷಪಾತಿಗಳೂ ಎಂದು ಹೇಳಲಾಗುತ್ತದೆ #ವೃಶ್ಚಿಕ ಲಗ್ನದ ಜನರು ಆತ್ಮ ವಿಮರ್ಶೆ, ತೀವ್ರತರದ ಏಕಾಗ್ರತೆ ಮತ್ತು ಬಲವಾದ ಚಾಲನಶಕ್ತಿಯನ್ನು ಹೊಂದಿದ್ದು ಇದು ಸಂಪೂರ್ಣ ಯಶಸ್ಸು ಅಥವಾ ಸಂಪೂರ್ಣ ವೈಫಲ್ಯವನ್ನು ತರುತ್ತದೆ. ಅವರು ಒಂದು ಬಲವಾದ ಆತ್ಮಘಾತುಕ ಪ್ರವೃತ್ತಿಯನ್ನೂ ಹೊಂದಿದ್ದು ಇದರ ಜೊತೆಗಿರುವ ವಿನಾಕಾರಣದ ಕೋಪವನ್ನು ಸಣ್ಣದೊಂದು ಪ್ರಚೋದನೆಯಂದಲೂ ಉದ್ದೀಪಿಸಬಹುದು. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಬಹಳ ಅನುಮಾನ ಪ್ರವೃತ್ತಿಯವರಾಗಿರುತ್ತಾರೆ ಮತ್ತು ತಮ್ಮ ಪ್ರೀತಿಪಾತ್ರರ ಬಗ್ಗೆ ಅಸೂಯೆ ಹೊಂದಿರುತ್ತಾರೆ. ಅವರ ಭಾವನಾತ್ಮಕ ಸಜೀವತೆ ಅವರು ಆಯ್ದುಕೊಳ್ಳುವ ಯಾವುದೇ ವೃತ್ತಿಯಲ್ಲಿ ಎಲ್ಲರೂ ಬೆರಗುಗೊಳ್ಳುವಂತೆ ಮುಂದುವರಿಯಲು, ಪರಿಸ್ಥಿತಿಗಳನ್ನು ಆಧರಿಸಿ ಅದು ಒಳ್ಳೆಯದಕ್ಕಾಗಿರಲಿ ಅಥವಾ ಕೆಟ್ಟದ್ದಕ್ಕಾಗಿರಲಿ, ಸಹಾಯ ಮಾಡುತ್ತದೆ. ಸಾಮಾನ್ಯವಾಗಿ ವೃಶ್ಚಿಕ ಲಗ್ನದ ಜನರು ತೀವ್ರವಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಪ್ರಬಲ ಸ್ವಭಾವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಹಠವಾದಿಗಳೂ, ಆತ್ಮಾಭಿಮಾನಿಗಳೂ ಹಾಗೂ ಶಾಂತರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಯಾವತ್ತೂ ಜೀವನದಲ್ಲಿ ನಲೆ ಹೊಂದುವುದಿಲ್ಲ ಮತ್ತು ಅವರಿಗೆ ಜೀವನವೆಂದರೆ ಅದನ್ನು ಒಂದೋ ಸಂಪೂರ್ಣವಾಗಿ ಬದುಕಬೇಕು ಅಥವಾ ಇಲ್ಲವೇ ಇಲ್ಲ. ಅವರು ಚಟುವಟಿಕೆಯಲ್ಲಿ ತೊಡಗಿದಂತೆ ಕಾಣದಿದ್ದರೂ ಎನು ನಡೆಯುತ್ತಿದೆಯೆಂದು ಅವರಿಗೆ ಯಾವಾಗಲೂ ತಿಳಿದಿದೆ. ಅವರ ಸಹಾನುಭೂತಿ ಅವರನ್ನು ಅತ್ಯುತ್ತಮವಾದ ಮತ್ತು ನಂಬಿಕಾರ್ಹ ಸ್ನೇಹಿತರನ್ನಾಗಿ ಮಾಡಿದರೂ ಅದೇ ಗುಣ ಅವರನ್ನು ಕೆಲವೊಮ್ಮೆ ಅವರನ್ನು ಅತ್ಯಂತ ವಿಶ್ವಾಸಘಾತುಕ ಶತ್ರುವನ್ನಾಗಿ ಮಾಡುತ್ತದೆ. ಅವರು ತಮ್ಮ ಇಡೀ ಶಕ್ತಿ, ಆತ್ಮ ವಿಶ್ವಾಸ, ಮಹತ್ವಾಕಾಂಕ್ಷೆ ಮತ್ತು ಉದಾರತೆಯನ್ನು ಒಟ್ಟಿಗೆ ಹಾಕಿದಾಗ ಅವರು ಎಲ್ಲವನ್ನೂ ಮತ್ತು ಏನನ್ನಾದರೂ ಸಾಧಿಸುತ್ತಾರೆ. ಅವರು ಇತರರಿಂದ ಬಹಳಷ್ಟನ್ನೇ ಬಯಸಿದೂ ಅವರಿಗೇ ಮಾಡಲು ಸಾಧ್ಯವಿಲ್ಲದ್ದನ್ನೇನೂ ಬೇರೆಯವರಿಂದ ಕೇಳುವುದಿಲ್ಲ. #ಒಬ್ಬ ಸಾಮಾನ್ಯ ಧನು ರಾಶಿಯವರು ಪ್ರಖರವಾದ, ದೀದೇಪ್ಯಮಾನ ಸ್ವಭಾವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಭವಿಷ್ಯದೆಡೆ ಬಹುತೇಕವಾಗಿ ಅದಮ್ಯವಾದ ಆಶಾವಾದಿತನವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಸಾಮಾನ್ಯವಾಗಿ ಅವರು ಉತ್ತಮ ಪ್ರಕೃತಿ, ಅನಿಯಂತ್ರಿತ ಮೋಜಿನ ಸ್ವಭಾವ ಮತ್ತು ಸ್ಪೂರ್ತಿದಾಯಕ ಆಧ್ಯಾತ್ಮಿಕ ಬದಿಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಪ್ರತಿಕೂಲ ಪರಿಸ್ಥಿತಿಗಳಲ್ಲಿ ಅವರು ಅಸಹಿಷ್ಣುಗಳಾಗಿರುತ್ತಾರೆ, ಜವಾಬ್ದಾರಿಯ ಭಯ ಹೊಂದಿರುತ್ತಾರೆ, ಲೋಲುಪರೂ, ಮತಾಂಧರೂ ಮತ್ತು ಬೆಳೆಯಲು ನಿರಾಕರಿಸುವವರೂ ಆಗಿರುತ್ತಾರೆ. ಸಂಭಾಷಣೆಯಲ್ಲಿ ತರಾತುರಿಯ ಅವರ ಪ್ರವೃತ್ತಿಯಿಂದಾಗಿ ಅವರು ಅನುದ್ದೇಶಿತವಾಗಿ ಇತರರಿಂದ ಅಪಾರ್ಥಕ್ಕೊಳಗಾಗುತ್ತಾರೆ. ಜೂಜಿನ ಕಡೆಗೂ ಕೂಡ ಅವರ ಒಲವಿರುತ್ತದೆ. ಈ ರಾಶಿಯಲ್ಲಿ ಜನಿಸಿದವರು ಆಶಾವಾದ, ಮಹತ್ವಾಕಾಂಕ್ಷೆ, ಸ್ಫೂರ್ತಿ, ಉತ್ಸಾಹ ಮತ್ತು ವೈಶಾಲ್ಯವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಒಬ್ಬ ಧನು ರಾಶಿಯವರು ಜೀವನದಲ್ಲಿ ಸಕಾರಾತ್ಮಕ ದೃಷ್ಟಿಕೋನವನ್ನು ಹೊಂದಿದ್ದು, ತಮ್ಮ ಉದ್ಯಮಶೀಲತೆ, ಶಕ್ತಿ, ಬುದ್ಧಿ, ಸಾಹಸಶೀಲತೆಯ ಮೂಲಕ ಜೀವನದ ಅನುಭವವನ್ನು ಸಾಧ್ಯವಾದಷ್ಟೂ ವಿಸ್ತರಿಸಬಯಸುತ್ತಾರೆ. ಅವರು ಅನಗತ್ಯವಾಗಿ ಮಾತಾಡುವುದಿಲ್ಲವದರೂ ಅವರ ಮಾತುಗಾರಿಕೆಯಿಂದ ಇತರರು ಅವರೆಡೆಗೆ ಆಕರ್ಷಿತರಾಗುತ್ತಾರೆ. ಅವರು ಪ್ರಯಾಣವನ್ನು ಮತ್ತು ತಮ್ಮ ಸುತ್ತಮುತ್ತಲಿನ ಪರಿಸರವನ್ನು ಅನ್ವೇಷಿಸುವುದನ್ನು ಆನಂದಿಸುತ್ತಾರೆ. ಅವರು, ಗೌರವಾನ್ವಿತರು, ಪ್ರಾಮಾಣಿಕರು, ವಿಶ್ವಾಸಾರ್ಹರು, ಸತ್ಯವಾದಿಗಳು, ಉದಾರಿಗಳು ಮತ್ತು ನ್ಯಾಯದ ಬಗೆಗೆ ಒಲವಿರುವವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ವಿನಮ್ರರಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಪ್ರಬಲವಾದ ಪ್ರಾಮಾಣಿಕತೆಯ ಪ್ರಜ್ಞೆಯ ಜೊತೆ ಆಧ್ಯಾತ್ಮಿಕತೆಯಡೆಗೆ ಒಲವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಧನು ರಾಶಿಯವರು ಬಲವಾದ ಇಚ್ಛಾಶಕ್ತಿಯುಳ್ಳವರೂ ಮತ್ತು ಸಂಘಟನಾ ಚತುರರೂ ಆಗಿರುತ್ತಾರೆ, ಹಾಗೂ ಈ ಸಂಯೋಜನೆ ನಿಮಗೆ ಯಾವುದೇ ಯೋಜನೆಯನ್ನು ಯಶಸ್ವಿಯಾಗಿಸಲು ಸಾಮರ್ಥ್ಯವನ್ನು ನೀಡುತ್ತದೆ. #ಮಕರ ಲಗ್ನದ ಜನರು ಸಾಮಾನ್ಯವಾಗಿ ಧಾರ್ಮಿಕ ಮನೋಭಾವನೆಯ ದೊಡ್ಡ ಪ್ರದರ್ಶನ ಮಾಡಿದರೂ ವಾಸ್ತವವಾಗಿ ಅವರು ತೋರಿಸುವಷ್ಟು ಅವರು ಧಾರ್ಮಿಕ ಮನೋಭಾವದವರಾಗಿರುದಿಲ್ಲ. ಅವರು ಕೇಳುವ ಸ್ವಾರ್ಥಿಗಳು, ಕುತಂತ್ರಿಗಳು, ಗುಟ್ಟಿನವರು ಮತ್ತು ಧೃಢಮನಸ್ಸಿನವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಕೇಳುವುದಕ್ಕಿಂತ ಹೆಚ್ಚಾಗಿ ಮಾತನಾಡುವುದರಿಂದ ಅವರು ಆಗಾಗ್ಗೆ ಅವರ ಮಾತಿನ ಮೇಲೆ ನಿಯಂತ್ರಣ ಕಳೆದುಕೊಳ್ಳಬಹುದು ಹಾಗೂ ಅದು ಇತರರನ್ನು ನೋಯಿಸಬಹುದು. ಒಬ್ಬ ಸಾಮಾನ್ಯ ಮಕರ ರಾಶಿಯವರು ಉತ್ತಮ ಸಂಘಟನಾ ಕೌಶಲಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ, ಅಚ್ಚುಕಟ್ಟಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಕಟು ವಾಸ್ತವವಾದಿಗಳಾಗಿರುತ್ತಾರೆ. ಅವರು ಪ್ರಬಲವಾದ ಕೆಲಸದ ಸಿದ್ಧಾಂತ, ಪ್ರಾಪಂಚಿಕ ಪ್ರವೃತ್ತಿಗಳು, ಮತ್ತು ಸಂಪ್ರದಾಯವಾದಿ ಬುದ್ಧಿ, ಸಾಂಪ್ರದಾಯಿಕತೆ ಮತ್ತು ಅಧಿಕಾರಕ್ಕೆ ಹಚ್ಚಿನ ಗೌರವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಮಕರ ಲಗ್ನದ ಜನರು, ಮಹತ್ವಾಕಾಂಕ್ಷೆಯವರು, ಗಂಭೀರರು ಹಾಗೂ ಕರ್ತವ್ಯಕ್ಕೆ ಬದ್ಧರಾಗಿದ್ದರೂ ಕೆಲವೊಮ್ಮೆ ಪ್ರತೀಕಾರ ಭಾವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ; ಅವರು ಸ್ವಯಂ ಶಿಸ್ತು ಹೊಂದಿರುವವರು, ಜವಾಬ್ದಾರಿಯಿರುವವರು ಮತ್ತು ವಾಸ್ತವವದಿಗಳಾದರೂ ಕೆಲವೊಮ್ಮೆ ಅವರ ಸ್ವಾನುಕಂಪ ಹೆಚ್ಚಾಗುತ್ತದೆ. ಅವರ ತಾರ್ಕಿಕ ಸಾಮರ್ಥ್ಯ ಉತ್ತಮವಾಗಿರುತ್ತದೆ ಮತ್ತು ಅವರು ಉದ್ದೇಶ ಮತ್ತು ಗಮ್ಯದ ಪ್ರಬಲ ಪ್ರಜ್ಞೆಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಮಕರ ರಾಶಿಯವರು ಇತರರ ಜೊತೆ ಅವರ ನಡವಳಿಕೆಯಲ್ಲಿ ಶಾಂತರೂ ಹಾಗೂ ಬಿಗುಮಾನದವರೆಂದೂ ಕಂಡುಬಂದರೂ ಒಮ್ಮೆ ಅವರ ನಂಬಿಕೆ ಗಳಿಸಿದ ಮೇಲೆ ಅವರು ನಿಷ್ಠಾವಂತರಾದ ಹಾಗೂ ಬದ್ಧರಾದ ಸ್ನೇಹಿತರಾಗಿರುತ್ತಾರೆ. ಅವರು ಸಾಮಾಜಿಕ ಪ್ರವೃತ್ತಿ ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ಅವರು ಬಯಸಿದ್ದಕ್ಕಾಗಿ ಎಷ್ಟಾದರೂ ಕೆಲಸ ಮಾಡಲು ಸಿದ್ಧರಿರುತ್ತಾರೆ, ಮತ್ತು ಅವರ ಆತ್ಮಗೌರವ ಅತ್ಯಂತ ಮುಖ್ಯವಾಗಿರುತ್ತದೆ. ಅವರು ತಾತ್ವಿಕತೆಯ ಬದಲಿಗೆ ಹೆಚ್ಚು ಪ್ರಾಪಂಚಿಕ ವಿಧಾನವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ತಮ್ಮ ಸಂತೋಷಕ್ಕೆ ಪ್ರೀತಿಯಲ್ಲಿ ಬೀಳುವ ಸಾಮರ್ಥ್ಯ ಅವರಿಗಿರುತ್ತದೆ. #ಒಬ್ಬ ಸಾಮಾನ್ಯ ಕುಂಭ ರಾಶಿಯವರು ಸಂವಹನದ ತೀವ್ರವಾದ ಬಯಕೆಯ ಗುಣ ಹೊಂದಿರುತ್ತಾರೆ. ಸ್ವಲ್ಪ ಸಂಪ್ರದಾಯವಾದಿ ಅಭಿಪ್ರಾಯಗಳನ್ನು ಹೊಂದಿರುವವರ ಜೊತೆಯಲ್ಲಿ ನೀವು ನಿಮ್ಮ ನಿರಂತರ ಪ್ರಸಾರವನ್ನು ಕಡಿಮೆ ಮಾಡುವುದನ್ನು ಕಲಿಯದಿದ್ದಲ್ಲಿ ನೀವು ಸ್ವಲ್ಪ ಔಚಿತ್ಯಹೀನರೂ ಮತ್ತು ಅಸಭ್ಯರೂ ಎಂದು ಹೇಳಬಹುದು. ಅವರು ಆಸಕ್ತಿದಾಯಕರೂ ಮತ್ತು ಆಕರ್ಷಕರೂ; ನಾಚಿಕೆಯ ಸ್ವಭಾವದವರೂ, ಸೂಕ್ಷ್ಮ ಮನಸ್ಸಿನವರೂ, ಶಾಂತರೂ ಮತ್ತು ಸಹಿಷ್ಣುಗಳೂ ಅಥವಾ ಉತ್ಸಾಹಬರಿತರೂ ಆಗಿರುತ್ತಾರೆ ಮತ್ತು ಪ್ರದರ್ಶನ ಮನೋಭಾವವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಬಲವಾದ ನಂಬಿಕೆಗಳ ಜೊತೆ ತುಂಬ ಬೆಂಬಲ ನೀಡುತ್ತಾರೆ ಮತ್ತು ಅವರು ನಂಬಿದ್ದಕ್ಕಾಗಿ ಹೋರಾಡುತ್ತಾರೆ; ಅವರು ದಾರ್ಶನಿಕರು ಮತ್ತು ಪ್ರವರ್ತಕರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಯಾವುದೇ ಪೂರ್ವಾಗ್ರಹವಿಲ್ಲದಂತಿರುತ್ತಾರೆ ಮತ್ತು ಇತರರ ದೃಷ್ಟಿಕೋನವನ್ನು ಗೌರವಿಸುತ್ತಾರೆ. ಅವರು ಉತ್ತಮ ಕೇಳುಗರು ಮತ್ತು ಅವರ ಸ್ನೇಹಿತರ ಬಗ್ಗೆ ತುಂಬ ಕಾಳಜಿ ವಹಿಸುತ್ತಾರೆ. ಅವರು ದಯಾಳುಗಳು ಮತ್ತು ನೇರವಂತಿಕೆಯವರೂ ಮತ್ತು ಮುಚ್ಚುಮರೆಯಿಲ್ಲದವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಸುಸಂಸ್ಕೃತರೂ ಮತ್ತು ಆದರ್ಶವಾದಿಗಳೂ, ಪ್ರಣಯ ಮನೋಭಾವದವರೂ ಮತ್ತು ಪ್ರಾಯೋಗಿಕ ಸ್ವಭಾವದವರೂ, ಸುಂದರರೂ ಮತ್ತು ಸ್ನೇಹಪರ ವ್ಯಕ್ತಿಗಳೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ನೈಜ ಕಲ್ಪನೆಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಅಗತ್ಯವಿದ್ದಾಗ ಸಹಾಯ ಮಾದಲೂ ಸಾಧ್ಯವಾದಷ್ಟೂ ಪ್ರಯತ್ನಿಸಿದರೂ ಭಾವನಾತ್ಮಕವಾಗಿ ಎಂದಿಗೂ ತೊಡಗಿಸಿಕೊಳ್ಳುವುದಿಲ್ಲ. #ಮೀನರಾಶಿಯ ಲಗ್ನದ ಜನರು ಪ್ರಾಯೋಗಿಕವಲ್ಲದಿದ್ದರೂ ಸಂವೇದನಾಶೀಲರು ಮತ್ತು ಸಹಜ ಪ್ರೇರಣೆಯವರಾಗಿರುತ್ತಾರೆ. ಅವರು ಬಹುಮುಖಿ ಪ್ರತಿಭೆಯವರಾಗಿರುತ್ತಾರೆ ಮತ್ತು ತರ್ಕದ ಬದಲಿಗೆ ಹೆಚ್ಚು ತಿಳಿಯುವ ಮೂಲಕ ವಿಷಯಗಳನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಒಲವು ಹೊಂದಿರುತ್ತಾರೆ. ಚಾಲ್ತಿಯಲ್ಲಿರುವ ವರ್ತನೆಯನ್ನು ಪಾಲಿಸುವಲ್ಲಿ ಬದ್ಧತೆ ಮತ್ತು ಅವರ ಸಾಂಪ್ರದಾಯಿಕತೆಯನ್ನು ಬಿಟ್ಟು ಬೇರೆ ಏನನ್ನಾದರೂ ಬಿಡುತ್ತಾರೆ. ಮೀನರಾಶಿಯವರು ಆತ್ಮವಿಶ್ವಾಸಿಗಳು, ನಿಷ್ಠಾವಂತರು, ಮನೆಯಡೆಗೆ ಪ್ರೀತಿಯಿರುವವರು, ದಯಾಳುಗಳು ಮತ್ತು ಉದಾರಿಗಳಾಗಿರುತ್ತಾರೆ. ಅವರನ್ನು ಸುಲಭವಾಗಿ ದಾರಿತಪ್ಪಿಸಬಹುದು. ಅವರ ಸ್ವಪ್ನಶೀಲ ಮತ್ತು ಅಪ್ರಾಯೋಗಿಕ ಗುಣ ನಿಮಗೆ ಹಾಗೂ ನಿಮ್ಮ ಆಪ್ತರಿಗೆ ಕಷ್ಟಕ ವಿಷಯವಾಗಿದೆ. ಆಶಾವಾದ ಮತ್ತು ನಿರಾಶಾವಾದದ ಮಿಶ್ರಣವಾದ ಇವರು, ಅವರಿಗೆ ಯಾವುದೇ ವಿಷಯದ ಬಗ್ಗೆ ಮನಸ್ಸನ್ನು ಧೃಢಗೊಳಿಸಲು ಕಷ್ಟವಾಗುತ್ತದೆ. ಒಬ್ಬ ಸಾಮಾನ್ಯ ಮೀನರಾಶಿಯವರು ನಾಚಿಕೆಯ ಸ್ವಭಾವದವರಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಅವರ ಸಂಪರ್ಕಕ್ಕೆ ಬರುವ ಎಲ್ಲರಿಗೂ ಪ್ರೀತಿ ಮತ್ತು ವಿಶ್ವಾಸದ ಸೆಲೆಯಾಗಿರುತ್ತಾರೆ. ಅವರು ನಿಜವಾದ ಅರ್ಥದಲ್ಲಿ ಶಾಶ್ವತ ಪ್ರಣಯಿಗಳಾಗಿರುತ್ತಾರೆ ಮತ್ತು ತಮ್ಮ ಸ್ವಂತ ಕಾಲುಗಳ ಮೇಲೆ ನಿಲ್ಲಲು ಹಿಂಜಿರಿಯುತ್ತಾರೆಂಬ ಅರ್ಹವಾದ ಖ್ಯಾತಿ ಹೊಂದಿರುತ್ತಾರೆ. ಮೀನರಾಶಿಯವರು ತುಂಬ ಧಾರ್ಮಿಕರು ಹಾಗೂ ಅತ್ಯಂತ ಮೂಢನಂಬಿಕೆಯವರೂ ಆಗಿರುತ್ತಾರೆ. ಅವರು ಶಾಂತ, ಸಹನೆಯ ಸ್ವಭಾವವನ್ನು ಹೊಂದಿರುತ್ತಾರಾದರೂ ಅದಕ್ಕೆ ರೂಪು ನೀಡುವ ಅಗತ್ಯವಿರುತ್ತದೆ. ಅವರು ಸುತ್ತಮುತ್ತಲಿನ ಪರಿಸರ ಒಳ್ಳೆಯದಿರಲಿ ಅಥವಾ ಕೆಟ್ಟದಿರಲಿ ಅದಕ್ಕೆ ಹೊಂದಿಕೊಳ್ಳುತ್ತಾರೆ; ಅವರು ಉದಾರಿಗಳು, ಸ್ನೇಹಪರರು ಮತ್ತು ದಯಾಳುಗಳಾಗಿರುತ್ತಾರೆ ಹಾಗೂ ಇದರ ಜೊತೆ ಅನುಕಂಪ ಮತ್ತು ದಯೆಯ ಭಾವನೆಗಳಿರುತ್ತವೆ ಹಾಗೂ ಇದರ ಜೊತೆಗೆ ಸುತ್ತಲಿರುವ ಎಲ್ಲದರ ಬಗೆಗೂ ಇತರರ ಭಾವನೆಗಳಿಗೆ ಸಂವೇದನಾಶೀಲರಾಗಿರುತ್ತಾರೆ. 
     PHYSICAL_APPEARANCE_PREDICTION         = ಮೇಷ ಲಗ್ನದ ಜನರು ಎದ್ದು ಕಾಣುವ ಗಲ್ಲ, ಮೂಗು ಮತ್ತು ಬಾಯಿಯ ಜೊತೆಗೆ ಬಲವಾದ ಮತ್ತು ಕೋನೀಯವಾದ ಲಕ್ಷಣಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಸಧೃಢ ಶರೀರ ಹೊಂದಿರುತ್ತಾರೆ, ಸಾಮಾನ್ಯ ಎತ್ತರ, ಮತ್ತು ಗುಂಗುರು ಕೂದಲು, ಚಾಚಿಕೊಂಡಿರುವ ಕಮಾನಿನಂತಿರುವ ಹುಬ್ಬುಗಳು, ಕಂದು ಮೈಬಣ್ಣ, ಗಂಡುಗಳು ವೀರ್ಯವತ್ತಾದ ನಡವಳಿಕೆ, ಮತ್ತು ಸ್ತ್ರೀಯರು ಒಂದು ಕ್ರಿಯಾತ್ಮಕವಾಗಿರುತ್ತಾರೆ. ಅವರ ಇಡೀ ಮೈಕಟ್ಟು ಬಲ ಮತ್ತು ಸ್ಥಿರತೆಯ ಬಗೆಗಿನ ಹೆಚ್ಚುವರಿ ಪ್ರಾಶಸ್ತ್ಯದ ಗುರುತನ್ನು ನೀಡುತ್ತದೆ. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಕಂದು ಅಥವಾ ತಿಳಿ ಗುಂಗುರು ಕೂದಲನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಅವರ ತಲೆಯ ಮೇಲೆ ಒಂದು ಗುರುತು ಅಥವಾ ಗಾಯವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಹೆಚ್ಚಾಗಿ ಪ್ರಮುಖ ರಕ್ತನಾಳಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಅವರ ದೇಹದ ಮೇಲೆ ಗಾಯಗಳಿಂದ ಉಂಟಾಗುವ ಗುರುತುಗಳಿರುತ್ತವೆ. #ವೃಷಭ ಲಗ್ನದವರು ಸಾಮಾನ್ಯವಾಗಿ ಜಡವಾಗಿ ಕಾಣುವ ಸಣ್ಣ ಆಕಾರವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಸಾಮಾನ್ಯವಾಗಿ ಅವರಿಗೆ ಸುಂದರ ಮುಖದ ಅನುಗ್ರಹವಿರುತ್ತಿದ್ದು ದೊಡ್ಡ ಹೊಳೆಯುವ ಕಣ್ಣುಗಳು, ಪರಿಪಕ್ವವಾಗಿರುವ ಕಿವಿ ಮೂಗು ಮತ್ತು ದೊಡ್ಡ ತುಟಿಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ದೇಹದ ರಚನೆಗೆ ಸಂಬಂಧಿಸಿದಂತೆ ಅವರು ಅವರ ಮುಖದಷ್ಟು ಅದೃಷ್ಟಶಾಲಿಗಳಲ್ಲ. ಅವರು ಯಾವುದೇ ಇಷ್ಟವಾಗುವ ತಿರುವುಗಳಿಲ್ಲದ ಚದರ ಆಕಾರದ ದೇಹವನ್ನು ಹೊಂದಿರುತ್ತಿದ್ದು ಪೂರ್ಣ ಕೊಬ್ಬಿದ ಮೈಕಟ್ಟಿರುತ್ತದೆ. ಬೆನ್ನು ಅಥವಾ ಬದಿಗಳಲ್ಲಿ ಕೆಲವು ಗುರುತುಗಳನ್ನು ಹೊಂದಿರಬಹುದು. ವೃಷಭ ಲಗ್ನದ ಜನರು ಸಾಮಾನ್ಯವಾಗಿ ಒಂದು ಆಹ್ಲಾದಕರ ರೂಪವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. #ಮಿಥುನ ಲಗ್ನದ ಜನರು ಹೊಳೆಯುವ ಕಣ್ಣುಗಳು ಮತ್ತು ಚೆನ್ನಾಗಿ ವ್ಯಾಖ್ಯಾನಿಸಲಾದ ಅಭಿವ್ಯಕ್ತಿಪೂರ್ಣ ಚಲನೆಯ ಲಕ್ಷಣಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಒಂದು ಮೃದು, ತೆಳು ಮತ್ತು ನರ ರಚನೆಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರ ಅಂಗಗಳು ಸಾಮಾನ್ಯವಾಗಿ ಫ್ಯಾಷನ್ ಮಾಡೆಲ್ ಗಳ ಹಾಗೆ ಉದ್ದವಾಗಿರುತ್ತವೆ. ಮಿಥುನ ವ್ಯಕ್ತಿಗಳೂ ಉತ್ತಮವಾದ ಮತ್ತು ಪ್ರಿಯವಾದ ರಚನೆಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರ ಅಸಾಧಾರಣ ಮುಖದ ಲಕ್ಷಣಗಳು ಸಣ್ಣ ಕೆನ್ನೆ ಮತ್ತು ಬಿಳೀ ಮೈಬಣ್ಣವನ್ನು ಹೊಂದುವ ಸಾಧ್ಯತೆಯಿದೆ. ಗುಂಗುರು ಕೂದಲು ಅವರ ಆಕರ್ಷಕ ವ್ಯಕ್ತಿತ್ವಕ್ಕೆ ಹೆಚ್ಚು ಲಕ್ಷಣಗಳನ್ನು ಸೇರಿಸುತ್ತದೆ. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಅಗಲವಾದ ಹಣೆಯ ಜೊತೆ ಸ್ಪಷ್ಟವಾದ ಕಣ್ಣುಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಆದರೆ ಇಂತಹ ಆಕರ್ಷಕ ಲಕ್ಷಣ ಮತ್ತು ವ್ಯಕ್ತಿತ್ವವನ್ನು ಹೊಂದಿರುವ ಹೊರತಾಗಿಯೂ ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಅನಾರೋಗ್ಯ ಮತ್ತು ಆರೋಗ್ಯ ಸಮಸ್ಯೆಗಳನ್ನು ಎದುರಿಸಬೇಕಾಗಬಹುದು. #ಕರ್ಕ ಲಗ್ನದ ಜನರು ಗೋಳಾಕಾರದ ಲಕ್ಷಣಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಅವರ ಮೂವತ್ತರ ವಯಸ್ಸನ್ನು ತಲುಪಿದಾಗ ದಪ್ಪವಾಗಬಹುದು. ಕೂದಲು ದಟ್ಟವಾಗಿರುತ್ತದೆ ಮತ್ತು ತೆಳುವಾಗಿರುತ್ತದೆ ಅಥವಾ ವಿರಳವಾಗಿರುತ್ತದೆ. ಮೂಗು ಚಿಕ್ಕದಾಗಿರುತ್ತದೆ ಕಣ್ಣುಗಳು ಹೊರಚಾಚಿರುತ್ತವೆ, ಮತ್ತು ಗಲ್ಲ ಗುಂಡಗಾಗಿರುತ್ತದೆ. ಎತ್ತರ ಸಣ್ಣದರಿಂದ ಸಾಮಾನ್ಯವಾಗಿರುತ್ತದೆ. ಈ ರಾಶಿಯಲ್ಲಿರುವವರು ಅವರ ದೇಹ ರಚನೆಗೆ ಸಂಬಂಧಿಸಿದಂತೆ ಅದೃಷ್ಟವಂತರಲ್ಲ. ಅವರು ಸ್ಥೂಲಕಾಯ ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ನೀಳ ತೋಳುಗಳನ್ನೂ ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಬಹಳವೇನೂ ಎತ್ತರವಿಲ್ಲದಿದ್ದರೂ ಸಾಮಾನ್ಯವಾಗಿ ವಿಶಾಲವಾದ ದೇಹದ ಮೇಲ್ಭಾಗವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಆದರೆ ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಬಿಳೀ ಬಣ್ಣ ಹೊಂದಿರುತ್ತಿದ್ದು ಸ್ವಲ್ಪ ಮಟ್ಟಿಗೆ ಮುಂಚಾಚಿರುವ ಮೂಗನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. #ಸಿಂಹ ಲಗ್ನದವರು ವರ್ಚಸ್ವಿ ವ್ಯಕ್ತಿತ್ವದ ಮಾಲೀಕರಾಗಿದ್ದು ಅವರು ಜನರ ಮೇಲೆ ಭವ್ಯವಾದ ಮತ್ತು ಆಕರ್ಷಣೀಯವಾದ ಅನಿಸಿಕೆಯನ್ನು ಉಂಟುಮಾಡುತ್ತಾರೆ. ಆದರೆ ದೇಹರಚನೆಗೆ ಸಂಬಂಧಪಟ್ಟಂತೆ ಅವರು ಅವರ ವ್ಯಕ್ತಿತ್ವದಷ್ಟು ಅದೃಷ್ಟಶಾಲಿಗಳಲ್ಲ. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಪರಿಪಕ್ವಾಗಿ ರೂಪುಗೊಂಡ ದೇಹದ ಮೇಲ್ಭಾಗದ ಜೊತೆಗೆ ಸಾಧಾರಣ ಎತ್ತರ ಹೊಂದಿರುತ್ತಾರೆ. ಸಿಂಹ ರಾಶಿಯವರು ದೊಡ್ಡದಾದ ಅಂಡಾಕಾರದ ಮುಖವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ಹಳದಿ ಛಾಯೆ ಕಣ್ಣುಗಳು ಹಾಗೂ ಎದ್ದು ಕಾಣುವ ಗಲ್ಲವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಪುರುಷ ಮತ್ತು ಸ್ತ್ರೀ ಸಿಂಹ ರಾಶಿಯವರು ನಿಯಂತ್ರಣ ಹೊಂದಿದಂತೆ ಕಾಣಿಸಬಹುದಾದರೂ ಅವರನ್ನು ಸುಲಭವಾಗಿ ಉತ್ತೇಜಿಸಬಹುದು ಮತ್ತು ಅವರು ಆಕ್ರಮಣಕಾರಿಯಾಗುತ್ತಾರೆ. ತ್ವರಿತ ಪ್ರತಿಕ್ರಿಯೆ ಮತ್ತು ಆಕ್ರಮಣಶೀಲತೆ ಸಾಮಾನ್ಯವಾಗಿರುತ್ತದೆ ಹಾಗೂ ಬಲ ಹಾಗೂ ತೀವ್ರತೆ ಕೂಡ. #ಕನ್ಯಾರಾಶಿಯ ಲಗ್ನದ ಜನರು ಸಾಮಾನ್ಯವಾಗಿ ಸುಲಭ ಸ್ವಭಾವದ ಸ್ವೇಚ್ಛಾಪ್ರವೃತ್ತಿ ಅಥವಾ ಸಾಮಾನ್ಯ ವಿಲಕ್ಷಣತೆಯ ಒಂದು ಚಿತ್ರಣವನ್ನು ದರ್ಶಿಸುತ್ತಾರೆ. ಕನ್ಯಾರಾಶಿಯ ದೇಹದಲ್ಲಿ, ವಿಶೇಷವಾಗಿ ಮುಖದಲ್ಲಿ ಏನೋ'' ಪುಟ್ಟದಾಗಿರುವ'' ಮತ್ತು ಉಳಿದಿರುವುದೇನೋ ಇರುತ್ತದೆ. ಅವರ ಎಚ್ಚರಿಕೆಯಿಂದ ನಡಿಗೆ, ಸಮತೋಲನದ ದೇಹಗಳು ಮತ್ತು ತಾರುಣ್ಯದ, ಮುಗ್ಧತೆಯ ಲಕ್ಷಣಗಳು ಎದ್ದು ಕಾಣುತ್ತವೆ. ಅವರು ಉತ್ತಮ ಹಣೆ ನೇರವಾದ ಮೂಗು ಮತ್ತು ದೊಡ್ಡ ಕೆನ್ನೆಯನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. #ತುಲಾ ಲಗ್ನದ ಜನರು ವೈವಿಧ್ಯಮಯವಾಗಿಯೂ ಹಾಗೂ ವಿಶೇಷವಾಗಿಯೂ ಇರುತ್ತಾರೆ, ಹಾಗೂ ಇವರು ಆಕರ್ಷಕ ದೇಹರಚನೆ ಹಾಗೂ ಎದ್ದು ಕಾಣುವ ತುಟಿಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ಆತ್ಮವಿಶ್ವಾಸ ಸೂಚಿಸುವ ಹಣೆಗಳನ್ನೂ ಹೊಂದಿರುತ್ತಾರೆ. ಈ ಕುಳ್ಳ ಜಾತಿ ಸಾಮಾನ್ಯವಾಗಿ ದಪ್ಪದಾದ ಅಥವಾ ಕಂದು ಬಣ್ಣವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಹಾಗೂ ಕುಟುಕುವ ಮತ್ತು ತೀವ್ರವಾದ ನೋಟವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ತುಲಾ ಲಗ್ನದ ಪುರುಷರು ನಿಶ್ಚಿತವಾದ ರಚನಾತ್ಮಕತಯನ್ನು ಹಾಗೂ ನಿರ್ಧಾರಿತ ತಿರುವುಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ತುಲಾ ಲಗ್ನದ ಜನರಲ್ಲಿ ಒಂದು ತರಾತುರಿಯ ನಮ್ಯತೆಯಿದ್ದು ಇದನ್ನು ಅಗಾಗ ಆಕರ್ಷಣೀಯವೆಂದು ವಿವರಿಸಲಾಗುತ್ತದೆ. ಸಾಮಾನ್ಯವಾಗಿ, ಈ ರಾಶಿಯ ಸ್ತ್ರೀಯರು, ದಪ್ಪವಿರುವ ಬದಲು ಸ್ವೀಕಾರಾರ್ಹವಾದ ದೇಹರಚನೆಯನ್ನು ಹಾಗೂ ಪುರುಷರು ನಾಜೂಕಾದ ಚೈತನ್ಯ ಹಾಗೂ ಧೃಢಕಾಯವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ನೀವು ಮಧ್ಯಮ ಗಾತ್ರದ ಅಥವಾ ಕೆಲವೊಮ್ಮೆ ಎತ್ತರದ ನಿಲುವನ್ನು ಹೊಂದಿರಬಹುದು. #ದೈಹಿಕವಾಗಿ ಹೇಳಬೇಕೆಂದರೆ, ವೃಶ್ಚಿಕ ರಾಶಿಯವರು ಸಾಕಷ್ಟು ಗಟ್ಟಿಮುಟ್ಟಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಸಾಮಾನ್ಯವಾಗಿ ವಿಶಾಲವಾಗಿ ಬಲವಾಗಿರುವ ಭುಜಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಹೇಗಿದ್ದರೂ, ಅವರು ದೃಢಕಾಯರಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಪ್ರತಿರೋಧಕ ಶಕ್ತಿ ಹೊಂದಿರುತ್ತಾರೆ. ಮುಖ ಚೌಕಾಕಾರದಲ್ಲಿದ್ದು ನಿಖರವಾದ ಲಕ್ಷಣಗಳು, ಸೂಕ್ಷ್ಮಗ್ರಾಹಿ ಮತ್ತು ಕಾಂತೀಯ ಕಣ್ಣುಗಳು, ಮತ್ತು ಎದ್ದುವ ಕಾಣುವ ಮಾದಕವಾದ ತುಟಿಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಕೂದಲು ಸಾಮಾನ್ಯವಾಗಿ ಕಂದು ಮತ್ತು ದಪ್ಪವಾಗಿರುತ್ತದೆ. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಕಾಣುವುದು ಒಂದೇ ಸಮಯದಲ್ಲಿ ಆಕರ್ಷಣೆ, ಶಕ್ತಿ, ಗೌಪ್ಯತೆ, ಮತ್ತು ಗಂಭೀರತೆಯ ಅನಿಸಿಕೆ ನೀಡುತ್ತದೆ. #ದೈಹಿಕವಾಗಿ ಹೇಳಬೇಕೆಂದರೆ, ಧನು ಲಗ್ನದ ಜನರು ಸಾಮಾನ್ಯವಾಗಿ ಬಲಶಾಲಿಗಳೂ ಎತ್ತರದವರೂ ಅಥವಾ ತುಂಬ ಎತ್ತರದವರೂ ಆಗಿರುತ್ತಾರೆ ಹಾಗೂ ಇವರು ಪೂರ್ಣ ಮತ್ತು ತರೆದ ಲಕ್ಷಣಗಳು, ನಗುತ್ತಿರುವ ತುಟಿಗಳು, ಮತ್ತು ದಪ್ಪ ಕೂದಲನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಶಕ್ತಿ ಮತ್ತು ಆಕರ್ಷಣೆಯನ್ನು ಪಸರಿಸುತ್ತಾರೆ. ಅವರ ವಯಸ್ಸು ಮೂವತ್ತನ್ನು ತಲುಪಿದಾಗ ಎಲ್ಲಾ ರೀತಿಯ ಅತಿ ಚಟಗಳಿಂದಾಗಿ ಅವರು ದಪ್ಪವಾಗುತ್ತಾರೆ ಹಾಗೂ ತೂಕ ಹೆಚ್ಚಾಗುತ್ತದೆ. ಅವರ ಧೃಢ ಸ್ನಾಯುಗಳು ವಿಶೇಷವಾಗಿ ಚಲನಶೀಲವಲ್ಲ. ಧನು ರಾಶಿಯವರು ಸಾಮಾನ್ಯ ನೋಟ ವರ್ಚಸ್ಸು, ಜೀವಂತಿಕೆ, ಮತ್ತು ಶಕ್ತಿಯ ಅನಿಸಿಕೆ ನೀಡುತ್ತದೆ. ಅವರ ನೋಟ ಖುಷಿಯದ್ದಾಗಿರುತ್ತದೆ, ಮತ್ತು ಅವರ ವೇಷಭೂಷಣ ಪ್ರಾಸಂಗಿಕವಾಗಿದ್ದರೂ ಆದು ಯಾವಾಗಲೂ ಅವರ ಉದಾರ ಪ್ರಕೃತಿ ಮತ್ತು ಸಂದರ್ಭಕ್ಕೆ ತಕ್ಕಂತಿರುತ್ತದೆ. #ಮಕರ ಲಗ್ನದ ಜನರು ಸಾಕಷ್ಟು ತೆಳ್ಳಗೆ, ಎಲುಬಿನ ಹಂದರದಂತೆ, ಮುಜುಗರದ ಉಪಸ್ಥಿತಿ ಹೊಂದಿದ್ದು ಸಣ್ಣದರಿಂದ ಸಾಮಾನ್ಯ ಎತ್ತರ ಹೊಂದಿರುತ್ತಾರೆ. ಆಳವಾದ ಮತ್ತು ಗಂಭೀರ ಕಣ್ಣುಗಳ ಜೊತೆಗಿನ ಈ ಲಕ್ಷಣಗಳು ಚೆನ್ನಾಗಿಯೂ ಮತ್ತು ಒಂದು ಉಳಿಯಿಂದ ಕೆತ್ತಿರುವಂತೆಯೂ ತೋರುತ್ತವೆ. ಅವರು ಹುಬ್ಬುಗಳು ಮತ್ತು ಎದೆಯ ಮೇಲೆ ಒರಟಾದ ಕೂದಲುಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಸಾಮಾನ್ಯವಾಗಿ ದೊಡ್ಡ ತಲೆ ಮತ್ತು ಹಲ್ಲುಗಳನ್ನು ಹೊಂದಿದ್ದು ಇವು ಕೆಲವೊಮ್ಮೆ ತುಟಿಗಳಿಂದ ಹೊರಗೆ ಚಾಚಿಕೊಂಡಿರುತ್ತವೆ. ಸಾಮಾನ್ಯ ನೋಟವು ನಿಷ್ಠುರತೆ, ಧೃಢತೆ, ಅಗಾಧತೆ, ಮತ್ತು ಪರಿಪಕ್ವತೆಯ ಒಂದು ಅನಿಸಿಕೆ ನೀಡುತ್ತದೆ. ಅವರ ನೋಟ ತಟಸ್ಥತೆ, ಸಮಚಿತ್ತತೆ, ಮತ್ತು ಸಾಮಾನ್ಯತೆಯಿಂದ ಗುರುತಿಸಲ್ಪಡುತ್ತದೆ. ಅವರ ಚಿಂತೆ ವಾಸ್ತವತೆಯ ಬಗೆಗೆ ಮಾತ್ರವೇ ಹೊರತು ಮತ್ತು ಸೌಂದರ್ಯದ ಬಗೆಗಲ್ಲ, ಹಾಗೂ ಅವರು ಅದರ ಬಗ್ಗೆ ಯಾವುದೇ ಗಮನ ನೀಡುವುದಿಲ್ಲ. ಅವರು ಸಾಮಾನ್ಯವಾಗಿ ಒಬ್ಬ ವಿಜ್ಞಾನಿ ಅಥವಾ ತತ್ವಜ್ಞಾನಿ, ವಿದ್ವಾಂಸ ಅಥವಾ ಬುದ್ಧಿವಂತ ವ್ಯಕ್ತಿಯ ಹಾಗೆ ಕಾಣುತ್ತಾರೆ. #ಕುಂಭ ರಾಶಿಯವರು ಲಗ್ನದ ಜನರು ಸಾಮಾನ್ಯವಾಗಿ ತೆಳ್ಳಗಿರುತ್ತಾರೆ ಮತ್ತು ಎತ್ತರದ ಬಗ್ಗಿದ ನಿಲುವನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ದೊಡ್ಡ ಮುಖ, ಕುತ್ತಿಗೆ, ಬೆನ್ನು, ಹೊಟ್ಟೆ, ಸೊಂಟ, ತೊಡೆ ಮತ್ತು ಕಾಲುಗಳನ್ನು ಹೊಂದಿರುತ್ತಾರೆ. ಅವರು ಸಾಮಾನ್ಯ ಮತ್ತು ಆಹ್ಲಾದಕರ ಲಕ್ಷಣಗಳು, ಮತ್ತು ದಪ್ಪ ಕೂದಲನ್ನು ಹೊಂದಿರುತ್ತಾರೆ ಮತ್ತು ಅವರ ಕೇಶವಿನ್ಯಾಸ ಸಹಜವಾಗಿ ಅಥವಾ ಅಸಾಮಾನ್ಯವಾಗಿರುತ್ತದೆ. ಮುಖಭಾವ ಚೆನ್ನಾಗಿದ್ದರೂ ಅಲ್ಲಿ ಗಂಭೀರತೆಯನ್ನು ಒಂದು ನೆರಳಿರುತ್ತದೆ. ಕಣ್ಣುಗಳು ಜೀವಂತಿಕೆಯಿಂದ ಮಿನುಗುತ್ತಿರುತ್ತವೆ ಮತ್ತು ತಪ್ಪನ್ನು ಹುಡುಕುವಂತಿರುತ್ತವೆ. ಅವರ ಸಂಪೂರ್ಣ ನೋಟ ಖುಷಿ ಮತ್ತು ಸ್ವಂತಿಕೆಯ ಒಂದು ಅನಿಸಿಕೆ ನೀಡುತ್ತದೆ. ಅವರ ನೋಟ ವಿಲಕ್ಷಣ ಅಥವಾ ಗಂಭೀರವಾಗಿರಬಹುದು. ಹೇಗಿದ್ದರೂ, ಇದು ಯಾವಾಗಲೂ ಆಶ್ಚರ್ಯ ಮೂಡಿಸುತ್ತದೆ. #ಮೀನರಾಶಿಯ ಲಗ್ನದ ಜನರು ವೈವಿಧ್ಯತೆಯಿಲ್ಲದ ರಾಶಿಯವರಾದ್ದರಿಂದ ಅವರು ದಪ್ಪವಾಗಿರುತ್ತಾರೆ ಮತ್ತು ಸಾಮಾನ್ಯ ಮಟ್ಟದವರಾಗಿರುತ್ತಾರೆ. ಇದು ಅನೇಕ ನೋಟಗಳನ್ನು ಹೊಂದಬಹುದಾದ ರಾಶಿಚಕ್ರದ ಏಕಮಾತ್ರ ರಾಶಿಯಾಗಿದೆ. ಅವರ ಕಣ್ಣುಗಳು ದೊಡ್ಡದಾಗಿರುತ್ತವೆ. ಆಕರ್ಷಕವಾಗಿರುತ್ತವೆ, ಸ್ಥಿರವಾಗಿರುತ್ತವೆ ಅಥವಾ ನಿಧಾನವಾಗಿರುತ್ತವೆ, ಮತ್ತು ಸಂಮೋಹನ ಶಕ್ತಿ ಹೊಂದಿದಂತಿರುತ್ತವೆ. ಅವರ ಇಡೀ ದೇಹರಚನೆ ರಹಸ್ಯಮಯವಾದ, ನಿಗೂಢವಾದ, ಪರೋಪಕಾರಿಯಾದ ಮತ್ತು ಶಾಂತವಾದ ಒಂದು ಕಲ್ಪನೆಯನ್ನು ನೀಡುತ್ತದೆ. ವಾಸ್ತವವಾಗಿ, ಮೀನರಾಶಿಯ ಬಾಹ್ಯರೂಪ ಅವರ ವ್ಯಕ್ತಿತ್ವದಂತೆ ಸಂಪೂರ್ಣವಾಗಿ ಗ್ರಹಿಕೆಗೆ ನಿಲುಕದೇ ಉಳಿದುಬಿಡುತ್ತದೆ!
     WELLNESS                               = ಇದಕ್ಕಾಗಿ ಆರೋಗ್ಯ
     DISPOSITION_PERSONALITY                = ಇದಕ್ಕಾಗಿ ಮನೋಧರ್ಮ ಹಾಗೂ ವ್ಯಕ್ತಿತ್ವ
     PHYSICAL_APPEARANCE                    = ಇದಕ್ಕಾಗಿ ವೈಯುಕ್ತಿಕ ದರ್ಶನ
