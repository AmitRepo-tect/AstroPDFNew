
	WHAT_IS_MOON_SIGN	= ચંદ્ર રાશિ શું છે?
	MOON_SIGN_INTRO	= વેદિક જ્યોતિષ જન્માક્ષર માટે સૂર્ય રાશિ કરતા ચંદ્ર રાશિને વધુ મહત્ત્વ આપે છે. હકીકતે, વેદિક જ્યોતિષ કહે છે કે, જો ચંદ્ર લગ્ન કરતા બળવાન હોય તો, જન્મ કુંડળીમાં લગ્ન કે ઉગતી રાશિના સ્થાને ચંદ્ર રાશિને કેન્દ્ર સ્થાને રાખવી જોઈએ. ચંદ્ર રાશિના જન્માક્ષર વ્યક્તિત્વનાં કેટલાંક છુપા રહસ્ય છતા કરે છે, જે દર્શાવવા સૂર્ય રાશિ દ્વારા શક્ય નથી.
