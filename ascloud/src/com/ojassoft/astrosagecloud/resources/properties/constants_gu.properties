LALKITAB_REMEDIES_RULES                =  લાલ કિતાબના ઉપાયો સંબંધિત નિયમો
LALKITAB_REMEDIES_RULES1               =  તમામ ઉપાયો સૂર્ય પ્રકાશ હોય એટલે કે દિવસના કલાકો દરમિયાન અજમાવવાના હોય છે અથવા તો અન્ય કોઇપણ ચોક્કસ સમયે અજમાવવાનું કહેવામાં આવે. કેટલાંક સૂચન કરે છે કે વાદળિયા હવામાનમાં ઉપાયો અજમાવવા ન જોઇએ. વાદળિયું હવામાન શનિ સાથે સંકળાયેલું હોય છે. જોકે, પશ્ચિમમાં કે જ્યાં શિયાળો અંધિરિયો હોય છે અને મોટાભાગના સમયે સૂર્ય પ્રકાશ ન હોય ત્યાં આ પ્રકારના કોઇ અંકુશો નથી.
LALKITAB_REMEDIES_RULES2               =  ઉપાયો લાંબા સમય સુધી કરવા જોઇએ એટલે કે 6 દિવસ, 10 દિવસ, 45 દિવસ વગેરે. આ સાથે ઉપાયો કોઇપણ પ્રકારના વિરામ વગર નિયમિત ધોરણે હાથ ધરવા જોઇએ. જો કોઇ કારણસર ઉપાયોમાં વિરામ થવાની ધારણા હોય તો સારી બાબત એ છે કે આ પ્રકારના સંજોગોમાં ઘરે દૂધમાં ધોયેલા નાના ચોખાને રાખવા જોઇએ. જો 43 દિવસ માટે ઉપાયો કરવામાં આવે અને આ દરમિયાન તમારે ચાર દિવસ માટે મુસાફરી માટે જવું પડે કે જે દરમિયાન તમે ઉપાયો ન કરી શકો તો જ્યારે તમે પાછા ફરો ત્યારે જ્યાંથી તમે ઉપાયો બંધ કર્યાં હોય ત્યાંથી તેને પાછા શરૂ કરવા જોઇએ.
LALKITAB_REMEDIES_RULES3               =  એક સમયે એક જ ઉપાય કરો. જ્યારે પ્રથમ ઉપાય પૂર્ણ થાય ત્યારે જ બીજો ઉપાય કરો. ઉપાયોના ક્રમને યોગ્ય રીતે આગળ ધપાવો. જો ઉપાયો ઉપર યોગ્ય દેખરેખ રાખવું શક્ય ન હોય તો એક દિવસ માટે ઉપાય કરો અને લાંબો ઉપાય પછીથી કરો.
LALKITAB_REMEDIES_RULES4               =  બીજો ઉપાય શરૂ કરતાં પહેલાં થોડાં દિવસ માટે વિરામ લો. જો શક્ય હોય તો તેને એક સપ્તાહ બાદ શરૂ કરો. અને આખરે, જો કોઇ વ્યક્તિ વતી તેના સંબંધી ઉપાયો હાથ ધરે ત્યાં તે વ્યક્તિએ ચોક્કસપણે સંકલ્પ લેવો જોઇએ કે તે હું જે-તે વ્યક્તિ માટે આ ઉપાયો કરી રહ્યો છું અને આ ઉપાયો તે વ્યક્તિ માટે હશે અને તે મને લાગુ પડશે નહીં 


