

	 WHAT_IS_ASCENDANT				= എന്താണ് രാശി?
	 ASCENDANT_PREDICTION			= വേദിക് ജ്യോതിശാസ്ത്രത്തിൽ രാശി വളരെ പ്രധാനപ്പെട്ട ഒന്നായി കരുതുന്നു. ഒരു വ്യക്തിയുടെ ജനന സമയത്ത്, ആകാശത്ത് ഉദിച്ചിരിക്കുന്ന ചിഹ്നത്തെ ആ വ്യക്തിയുടെ രാശി എന്ന് പറയുന്നു. കൂടാതെ ഈ ഭാവത്തിൽ വരുന്ന ചിഹ്നത്തെ ലഗ്നരാശി എന്ന് പറയുന്നു. ഒരു വ്യക്തിയുടെ ജീവിതത്തിലെ ഏറ്റവും ചെറിയ സംഭവങ്ങൾ പോലും ജ്യോതിഷത്തിലൂടെ കണക്കാക്കുവാൻ രാശി സഹായിക്കുന്നു. എന്നാൽ, ദൈനംദിന, വാര, മാസ, വാർഷിക പ്രവചനങ്ങൾ നടത്തുന്നത് ചാന്ദ്രചിഹ്നത്തെയും സൂര്യചിഹ്നത്തെയും അടിസ്ഥാനമാക്കിയാണ്.
