	LK_REMEDIES1										= இனிப்பு ஏதாவது பறவைகளுக்கு கொடுக்கவும்.   
	LK_REMEDIES2										= வீட்டில் தந்தம் ( யானையின் தந்தம்) வைக்கவும்.  
	LK_REMEDIES3										= ஏதாவது இனிப்பு கலந்த பாலுடன் ஆலமரத்தை வழிபாடு செய்யலாம்.  
	MANGLIK_DETAILS_NOTE								= இந்த பரிகாரங்களை நீங்களாக செய்யுமுன் ஒரு ஜோதிடரை அணுகி ஆலோசனை பெற  நாங்கள் வலுவாக உங்களை பரிந்துரைக்கிறோம்.  
