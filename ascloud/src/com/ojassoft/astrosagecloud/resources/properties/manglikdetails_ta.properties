	MANGLIK_DETAILS_PARAGRAPH1							= பொதுவாக செவ்வாய் தோஷம் ஜாதகத்தில் லக்னதிலிருந்தும் சந்திரனிடமிருந்தும் பார்க்கப்படுகிறது
	MANGLIK_DETAILS_FIRST								= ஜாதகத்தில், செவ்வாய் இருக்கும் இடமானது 
	MANGLIK_DETAILS_SECOND								=  ம் வீடு - லக்னத்தில் இருந்து. அதே சமயம் சந்திரன் நின்ற ராசியிலிருந்து செவ்வாய் இருக்கும் இடமானது 
	MANGLIK_DETAILS_THIRD								=  வீடு.
	MANGLIK_DETAILS_HENCE_NOTE							= எனவே செவ்வாய் தோஷமானது
	PRESENT_NEITHER_IN_LAGNA_CHART_NOR_IN_MOON_CHART	= எனவே செவ்வாய் தோஷம் லக்ன விளக்கப்படத்திலோ அல்லது சந்திரன் விளக்கப்படத்திலோ இல்லை.
	MANGLIK_DETAILS_HENCE_NOTE1						= எனவே செவ்வாய் தோஷம் லக்ன ஜாதகத்தில் அல்லது சந்திரன் ஜாதகத்தில் உள்ளது.
	MANGLIK_DETAILS_HENCE_NOTE2						=  எனவே செவ்வாய் தோஷம் லக்ன ஜாதகத்தில் உள்ளது மற்றும் சந்திரன் ஜாதகத்தில் இல்லை.
	MANGLIK_DETAILS_HENCE_NOTE3						= எனவே செவ்வாய் தோஷம் லக்ன ஜாதகத்தில் இல்லை, ஆனால் சந்திரன் ஜாதகத்தில் உள்ளது.
	MANGLIK_DETAILS_PARAGRAPH4							= செவ்வாய் தோஷம் ஒரு நபரின் திருமண வாழ்க்கையில் தடைகளை உருவாக்கும் என  கருதப்படுகிறது.  மற்றும் சிலர் சொல்படி செவ்வாய் தோஷமானது வாழ்க்கை துணைவருக்கு அடிக்கடி நோய் அல்லது இறுதியில் மரணம் விளைவிக்கும் எனக் கூறப்படுகிறது.
	MANGLIK_DETAILS_PARAGRAPH5							= இந்த செவ்வாய் தோஷம் உள்ள நபர் மற்றொரு செவ்வாய் தோஷம் உள்ள நபரை திருமணம் செய்தால் செவ்வாய் தோஷம் ரத்து ஆகிவிடும் மற்றும் எந்த விளைவையும் ஏற்படுத்தாது என்று கருதப்படுகிறது.  
	MANGLIK_DETAILS_SUBHEADING1						=  செவ்வாய் தோஷம் காணப்பட்டால் சில பரிகாரங்கள் / தீர்வுகள்.  
	MANGLIK_DETAILS_SUBHEADING2						=  பரிகாரங்கள் ( திருமணத்திற்கு முன்பே செய்ய வேண்டும் )  
	MANGLIK_DETAILS_SUBHEADING3						=  பரிகாரங்கள் ( திருமணத்திற்கு பிறகு செய்யலாம் )
	MANGLIK_DETAILS_PARAGRAPH6							= கும்ப விவாஹம், விஷ்ணு விவாஹம் மற்றும் அஸ்வத விவாஹம் என செவ்வாய் தோஷத்திற்கு மிகவும் பிரபலமான பரிகாரம் இருக்கிறது. அஸ்வத விவாஹம் என்பது இந்த தோஷம் உள்ள நபருக்கு அரசமரம் அல்லது வாழை மரத்துடன்  திருமணம் செய்த பிறகு அந்த மரமானது வெட்டப்படும் திருமணம் ஆகும்.  மேலும் கும்ப விவாஹம் என்று கூறப்பபடும் கட விவாஹமானது ஒரு பானையுடன் திருமணம் செய்து பின்னர் அதை உடைத்து விடுவது வழக்கமாகும்.
	REMEDIES1											= வழிபாட்டு அறையில் கேசரி கணபதியை ( இறைவன் விநாயகரின் ஆரஞ்சு நிற சிலை ) வைத்து தினசரி வழிபாடு செய்யலாம்.   
	REMEDIES2											= ஹனுமான் சாலிசா தினசரி சொல்வதன் மூலம் இறைவன் ஹனுமானை வழிபடலாம்.  
	REMEDIES3											= மஹா ம்ருத்யஞ்ச பாடல் ( மஹா ம்ருத்யஞ்ச மந்திரம் ஓதலாம்)  
