	RASI_ACCORDING_TO_VEDIC_ASTROLOGY			= વેદિક જ્યોતિષ અનુસાર રાશિ
	RASI_PREDICTION_1							= <p>લાલ અથવા પીળા રંગની પ્રોડક્ટ્સ સાથે પનારો પડે એવા કારોબારમાં તમને ફાયદો થશે. તમારો સ્વભાવ રમૂજી છે અને તમે રતુમડા રંગનો ઉજળો ચહેરો ધરાવો છો. સપ્તાહમાં બુધવાર, સોમવાર અને મંગળવાર તમારા માટે શુકનવંતા દિવસો રહેશે. તમે ગાય, ભેંસ તથા અન્ય પ્રાણીઓની કાળજી લેવા પ્રત્યે ઝુકાવ ધરાવતા હશો. સ્વભાવની દૃષ્ટિએ તમે થોડા આળસું છો પણ હંમેશા અન્ય લોકોના કામ કરવા માટે તૈયાર રહો છો. તમારા મિત્રવર્તુળમાં કન્યા, કુંભ અને મિથુન રાશિના ઘણા મિત્રોનો સમાવેશ થતો હશે. તમે મહત્વાકાંક્ષી અને પ્રગતિશીલ હશો. 20, 26, 33 પછીના વર્ષોમાં તમને તાવ અને શસ્ત્રોના લીધે ભયમાં મૂકાશો. 45, 50 અને 55 વર્ષમાં ટૂંકા જીવન અને અચાનક મૃત્યુનો ભય રહેશે. </p> <b style='padding-left:60%;'>- Romcac or Romuk view point </b> <p> 13, 1 અને સાતમાં વર્ષમાં તમે તાવથી પીડાશો. 3, 12, 5 અને 16મા વર્ષે સરકાર તરફથી ભય ઊભો થશે. 32 અને આઠમાં વર્ષમાં અચાનક મોતનો ભય છવાશે. 25મા વર્ષમાં તમે પોતાનું સંતાન ગુમાવો એવી તકો રહેલી છે, જ્યારે આયુષ્યના ચોથા અને આઠમા વર્ષમાં તમને વાહન તરફથી પીડા મળે અને 3, 12 અને 24મા વર્ષમાં ઝેરના અને ડુબી જવાની દહેશત રહેલી છે. </p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_2							= <p>તમે મુખ્યત્વે સાંધાના ભાગમાં ગુમડા સાથે લાંબા હાથ ધરાવતી એક જાડી વ્યક્તિ હશો અને કફની સમસ્યા ધરાવતા હશો. સપ્તાહમાં શનિવાર, બુધવાર અને શુક્રવાર એ તમારા માટે શુકનિયાળ દિવસો રહેશે અને રવિવાર તમારા માટે અશુભ દિવસ છે. તમને કડવો અને ખાટો સ્વાદ વધુ ગમે છે, તમને ડેરી પેદાશો આરોગવાનું ગમશે. કારોબારમાં તમારા ભાગીદારો મધ્યમ વર્ગીય હશે અને કસ વગરના મિત્રોના કારણે તમારે ભોગવવું પડશે. તમને બગીચાકામ અથવા ખેતી સાથે સંબંધિત હોય એવા કારોબારમાં ફાયદો થશે. મહદઅંશે તમને ઊંચાઈએથી પડી જવાનો ડર લાગતો હશે. પોતાના શત્રુ જોડે હોવ તો પણ તમે હળવા અને ખુશ રહેતા હશો. તમે એક મનમોહક પ્રેમી છો અને મધ્યમ કદની ઊંચાઈ ધરાવો છો. તમને મેકઅપ અને સુંદર પોશાક પહેરવામાં રૂચિ છે. તમને મુખ્યત્વે પેટ અને ગળાને લગતા આરોગ્યના પ્રશ્નો સતાવે છે. </p> <p> તમારા માટે બીજું, ચોથું, પાંચમું અને 18મું વર્ષ પીડાદાયક રહેશે. જ્યારે 32, 44 અને 40મું વર્ષ રોગ અને નુકસાનભર્યું રહેશે. તમે ખોરાક જ્યારે ગરમ હોય ત્યારે આરોગવાના શોખીન છો અને તમે કફ તથા શરદીથી પીડાઓ છો. તમ જૂની તથા એન્ટિક ચીજવસ્તુઓનો સંગ્રહ કરવા તરફ ઝુકાવ ધરાવો છો. </p> <b style='padding-left:60%;'>- Romcac or Romuk view point </b> <p> સ્તન, ગળું અને હડપચીની માંદગીના લીધે તમારે પીડાવું પડશે. ત્રીજા વર્ષે આગનો ડર રહેશે. હાથ અને પગ પર ઇજાની શક્યતા છે, 19મા અને 32મા વર્ષમાં અચાનક મૃત્યુના સંજોગો છે. તમે બીજા લગ્નની મજબૂત શક્યતા ધરાવો છો અને સામાન્ય રીતે તમે બહુ ઓછાં ભાઈબહેન ધરાવો છો. માધવ નવમી શુક્રવાર અથવા રોહિણી નક્ષત્રમાં મૃત્યુની સંભાવના વધુ છે. </p> -યુવનેશ્વર <p> બીજા, પાંચમા અને નવમાં વર્ષમાં તમારે પત્થર અને સ્ત્રીઓથી સાવધાન રહેવાની આવશ્યક્તા છે. તમે પોતાના ગુપ્ત ભાગોના રોગોથી પણ પીડાશો. તમને બહુ ભૂખ લાગતી હશે, તમે કાર્યક્ષમ, સહન કરનારા, દાનશીલ અને સમૃદ્ધ હશો. 15માં અને છઠ્ઠાં વર્ષમાં તમે પાણી, શિંગડાવાળા પ્રાણીઓ, ઝેર, પર્વત, રીંછ અથવા ભૂતોથી પીડાશો. 10મા, 25મા અને 45મું વર્ષ આગ, છૂપી માંદગીઓ અને ભાવનાત્મક બંધનનો ડર લાવશે. </p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_3							= <p>તમે પીઠ અને દર્દથી પીડાતા હશો. સપ્તાહમાં બુધવાર, શુક્રવાર અને શનિવાર તમારા માટે શુકનવંતા રહેશે. તમે એક લેખક, સરકારી કર્મચારી અને બૌદ્ધિક વ્યક્તિ હશો. તમને ચીજોને કડવી અને ખાટી કરવી ગમે છે. તમારા માટે કાળી ચીજ પહેરવી શુકનવંતી સાબિત થશે અને સફેદ રંગના વસ્ત્રો બેડ લક લાવશે. તમે સાફ અને સુઘડ દેખાવવાળા અને જલ્દી પિત્તો ગુમાવનારા વ્યક્તિ હશો. તમારી પાસે તમારું પોતાનું વાહન હશે અને અન્ય લોકોના નાણાં લઇ લેવાની ચતુરાઈ ધરાવતા હશો. તમારા મિત્રોમાં ઘણી બધી સ્ત્રીઓ હશે, તમે પેટની માંદગી ધરાવતા ઓછાં સમૃદ્ધ વ્યક્તિ હશો. 5, 12, 16 અને 27મું વર્ષ ઘણું પીડાદાયક વિતશે. જીવનના પચાસમાં વર્ષે અચાનક મૃત્યુના સંજોગો સર્જાઈ શકે છે. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p> ભવિષ્યમાં તમે મધ્યમ વર્ગના એક ખુશખુશાલ વ્યક્તિ હશો. આયુષ્યના 16મા અને 18મા વર્ષે પાણીનો ડર સર્જાશે. પાંચમા વર્ષે કાનની માંદગી અને 24મા વર્ષે દર્દની દહેશત જોવા મળશે. 38મા વર્ષે અચાનક મોતના સંજોગો સર્જાઈ શકે છે. લાંબા આયુષ્ય બાદ 80મા વર્ષે વૈશાખના 12મા વર્ષમાં, હસ્ત્ર નક્ષત્રમાં, બુધવારે અથવા શુક્રવારે તમારી આત્મા તમારું શરીર છોડશે. જીવનના ત્રીજા, 10મા અને છઠ્ઠાં વર્ષે તમે ત્રણ અસમતુલાથી પીડાશો અને ભૂત તથા મીઠાના ડર સાથે જીવશો. 20મા અને 12મા વર્ષમાં તમને ઘોડા, સાપ, હાથી, પર્વત અને પાણીથી પીડા મળશે. <br/> જીવનના 18મા, નવમાં, 30મા અને પાંચમા વર્ષે, તમે તાવથી પીડાશો. તમે રમૂજી, સમૃદ્ધ, પાતળા હશો અને આઠમા વર્ષે હૃદયની સમસ્યાથી પીડાશો. </p> <b style='padding-left:90%;'>-Yvan</b>
	RASI_PREDICTION_4							= <p>રવિવાર, સોમવાર, મંગળવાર તમારા માટે શુકનવંતા રહેશે, જ્યારે બુધવાર નસીબવંતો નહીં હોય. રવિ, સોમ, મંગળ શુભ દિવસ રહેશે જ્યારે બુધ અશુભ દિવસ રહેશે. શરદીની સમસ્યાઓ, સુંદર ત્વચા સાથે અચનાક મૃત્યુની શક્યતા. 2જા, 8મા, 21મા અને 29મા વર્ષે બિમારી થશે. તમારા પાતળા પગ, બે પત્નિઓ અને પાણી સંબંધિત બિમારી થશે. તમને કમર, માથા અને પગ, આંખની દ્રષ્ટિમાં નબળાઇ રહેશે. આ ઉપરાંત નીચા વર્ગના લોકો સાથે લાગણીસભર જોડાણ રહેશે. શુક્રવાર તમારા માટે અપશુકનીયાળ રહેશે. તમારા માટે કાળો રંગ અપશુકનીયાળ રહેશે અને સફેદ અને લાલ રંગ તમારા માટે શુકનીયાળ સાબિત થશે. </p> <p>તમારા જીવનના 8મા વર્ષે વરસાદ, પાણી અને હવાથી તમને જોખમ લાગશે. તમને સુગંધથી લાભ થશે. તમારા ચંદ્રની સાઇન કેન્સર મકર ચંદ્ર અથવા સંક્રાંતિ દિવસ હોઇ તમે જે કંઇપણ ખરીદશો તે બેગણું થઇ જશે. હવા સંબંધિત તકલીફો, નુકશાની સાથે તમે 48 અથવા 84 વર્ષની ઉંમરે મૃત્યું પામી શકો છો. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p>You will be poor in your youth but be well placed when middle aged. જીવનના 3જા અને 7મા વર્ષે તમને તાવ આવી શકે છે. વર્ષના મુખ્ય ચંદ્ર સાથે તમને પાણીથી ડર લાગી શકે છે જ્યારે સુગંધથી તમારું નસીબ ઉઘડી શકે છે. તમારા જીવનના ત્રીજા વર્ષમાં શરીરને આગથી ડર લાગી શકે છે. જીવનના 3જા અને 7માં વર્ષ દરમિયાન તમે તાવથી પીડાઇ શકો છો. વર્ષ દરમિયાન ચંદ્રનો પ્રભાવ વધશે ત્યારે તમને પાણીથી ડર લાગશે જ્યારે સુગંધથી તમારું નસીબ ઉઘડશે. તમારા જીવનના ત્રીજા વર્ષ દરમિયાન તમારા શરીરના ડાબા હિસ્સાને આગથી જોખમ છે. તમને માથાનો દુખાવો થશે, પરંતુ બાકી બધું તમારા માટે સારું રહેશે. તમે જ્યારે 32 વર્ષના હશો ત્યારે તમારા અચાનક મોતની શક્યતા છે. તમારા જીવનના 29માં વર્ષમાં તમને સાપથી ડર રહેશે. મઘ શુક્લ અથવા શુક્ર નક્ષત્રના શુક્રવારે તમારા મૃત્યુની શક્યતાઓ રહેલી છે. <p> <b style='padding-left:90%;'>-Yvan</b> <p> તમારા જીવનના 4થા, 8મા અને 12મા વર્ષ દરમિયાન તમને માથા અને આંખનો દુખાવો રહેશે. ત્રણ ગ્રહોની સ્થિતિની અસ્થિરતાનું જોખમ રહેલું છે. તમારા જીવનના 16મા અને 24મા વર્ષ દરમિયાન તમને મહિલા, પાણી, પર્વતોથી ડર રહેશે અને શરીરના ગુપ્ત અંગોમાં દર્દ રહી શકે છે. જો તમે ખેતીના વ્યવસાય સાથે સંકળાયેલા હોવ તો ડરપોકપણા છતાં પણ તમે અસરકારક રહેશો. </p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_5							= <p> સપ્તાહ દરમિયાન સોમવાર, મંગળવાર અને રવિવાર તમારા માટે શુકનીયાળ દિવસો રહેશે. તમને પીઠનો દર્દ, ઓછા વાળ, યુદ્ધમાં હાર, દ્વિપત્નિત્વ અને બિનફળદ્રુપતાની સમસ્યાનો સામનો કરવો પડી શકે છે. કમરનો દુખાવો, પેટમાં ચૂંક, હ્રદયની ગંભીર સમસ્યા અને માથાની ઇજા જળવાઇ રહેશે. સૂર્યના પ્રભાવથી તમને લાભ થશે, જ્યારે કે સૂર્યનો પ્રભાવ ઘટવાથી તમે મહિલાથી દૂર થશો, લાભ ધોવાઇ જશે. તમારા જીવનના 4થા અને 8મા વર્ષ દરમિયાન તમને તાવ આવશે. 28માં વર્ષે સરકાર તરફથી ડર લાગશે અને 51માં વર્ષે દર્દ રહેશે. 30મું વર્ષ દર્દકારક રહેશે. જે વર્ષોમાં સૂર્યનો પ્રભાવ વધુ હશે તેમાં તમારા જીવનમાં ડર વધુ રહેશે. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b> <p> જીવનના પ્રથમ વર્ષમાં જોન્ડિસનું જોખમ રહેશે. 5માં વર્ષે પ્રાણીઓ અને આગ દ્વારા હાથ અને પગમાં દુખાવો જોવા મળશે. 13માં વર્ષે ડાયેરિયા અને 32માં વર્ષે અચાનક મૃત્યુ થવાનું જોખમ રહેલું છે. 7માં વર્ષે તમને તાવ રહેવાની શક્યતા છે અને 20માં વર્ષે સાપથી ડર અને 21માં વર્ષે બિમારીનું જોખમ છે. તમે ઝઘડામાં ફસાઇ જશો અને તમને કુખ્યાતનું લેબલ આપવામાં આવશે. 28માં વર્ષે તમને ગુપ્ત અંગોમાં દર્દ રહેશે. અશ્વિનિ નક્ષત્ર, ફાગણ શુક્લના 5માં સોમવારે તમે મૃત્યું જોશો. </p> <b style='padding-left:90%;'>-Yvan</b> <p> જીવનના 5માં, 10માં અને 15માં વર્ષમાં તમને હથિયારો, આગ, પાણીથી જોખમ તેમજ શ્વાસ અને આંખમાં દુખાવો થાય તેવી શક્યતા છે. 30માં વર્ષમાં તીક્ષ્ણ દાંત ધરાવતા અને જંગલી પ્રાણીઓથી જોખમ રહેલું છે. 20માં વર્ષે તમને સાપથી ડર રહેશે. આ ઉપરાંત કાળા જાદૂ અથવા તાવનું પણ જોખમ રહેલું છે. તમે હિંમતવાન, પ્રામાણિક, મહિલા વિરોધી અને તમારા બાળકો રહેશે. </p> <b style='padding-left:84%'>-Janmpradeep</b>
	RASI_PREDICTION_6							= <p> તમારી સુંદર આંખો, લાંબા વાળ અને સારો દેખાવ રહેશે. જ્યારે તમે અન્ય માટે કામ કરશો ત્યારે આળસું રહેશે અને જ્યારે પોતાના માટે કામ કરશો ત્યારે ઝડપથી કામ કરશો. તમે લોકોમાં પ્રખ્યાત રહેશે. </p><p> લેખન, ખેતી, સામાજિક સેવાથી તમારી સંપત્તિ વધશે. તમારા માટે સોમવાર અશુભ રહેશે. ઊંચા પદને કારણે તમને પછડાટ મળી શકે છે. </p> <p> પ્રથમ પત્નિ તમારા માટે સારી સાબિત થશે. જીવનના 4થા અને 9માં વર્ષમાં તમને આંખની સમસ્યા થઇ શકે છે. જીવનના 50મા, 28મા, 30મા અને 47મા વર્ષમાં તમને દર્દ થઇ શકે છે. જીવનના 50મા અને 60મા વર્ષ દરમિયાન તમને જમીન અને વાહનમાંથી નાણા મળશે. જો ગુરુ તમારી ઉપર પ્રભાવી રહેશે તો તમને મિત્રો પાસેથી મોટા લાભ પ્રાપ્ત થશે. જીવનના 30મા વર્ષે તમને મસાની સમસ્યા થશે. તમે એક જાણીતા પરિવાર સાથે સંબંધ ધરાવતા હશો. </p> <p> જીવનના 5મા વર્ષમાં તમને આંખમાં દુખાવો અને 3જા વર્ષમાં આગથી ડર તેમજ 21મા વર્ષે દિવાલો અથવા વૃક્ષોથી અત્યંત ડર લાગશે. તમારી ગરદન ઉપર મોલ રહેશે. 13મા વર્ષે તમને વોમીટ, 15માં વર્ષે સાપ, 30મા વર્ષે જંગલો અને સાપને કારણે મોત થઇ શકે છે. </p> <p> 18મા, 12મા અને 6ઠ્ઠા વર્ષમાં તમને દર્દ, પથરી, મહિલા, હથિયારો અને આગથી જોખમ રહેલું છે. 36મા અને 24મા વર્ષમાં ચોરી અને આગનું જોખમ રહેલું છે. આંખને પણ જોખમ રહેલું છે. </p> <p> આવરદા 90 વર્ષ સુધીની છે અને તમે ધાર્મિક અને હોંશિયાર હશો. સુંદર આંખો, મજબૂત નખ, સુંદર ત્વચા તેમજ તમે સમૃદ્ધ રહેશે. તમે દુનિયાભરની મુસાફરી કરી શકશો. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_7							= <p> તમારી સુંદર આંખો, ઘઉંવર્ણી ત્વચા અને ભારે દાઢી હશે. સરકારી કર્મચારીઓ પ્રત્યે આદર હશે. તમારા માટે બુધવાર, શુક્રવાર અને શનિવાર શુભ દિવસો રહેશે. શરદીથી તમે પીડાશો. સામાન ખરીદી અને વેચાણમાં તમને ઓછો લાભ થશે. માથા અને મોં ઉપર ઇજા થશે. જ્યારે તમે 8 વર્ષના હશો ત્યારે ઉંચાઇએથી પડી જવાની શક્યતા રહેલી છે. તમારો સ્વભાવ સારો રહેશે અને તમે સમૃદ્ધ હશો. તમારા જીવન સાથે ગુપ્તતા રહેશે અને યાત્રા કરશો તેમજ નવી બાબતો શીખશો. એવી વ્યક્તિ કે જે આળસુ છે તે અનાજનો સંગ્રહ કરશે અને તેના વાળ ઝડપથી સફેદ થઇ  જશે. જ્યારે શુક્રનો પ્રભાવ વધારે હશે ત્યારે તમને સુંગંધથી લાભ થશે. તમે નદી અથવા પર્વતના સાનિધ્યમાં રહેવાનું પસંદ કરશો. </p> <p> 3જા, 8મા, 14મા, 26મા, 24મા, 47મા, 55મા અને 63મા વર્ષે તમને શ્વાસ લેવાની તકલીફ થશે. તમને શરદીની સમસ્યા રહેશે. જ્યારે તમે 84 વર્ષના થશો ત્યારે તમે યુવાન જ હશો. 30 વર્ષની ઉંમરે તમારા જીવનમાં અન્ય એક મહિલા પ્રવેશ કરશે. 12મા વર્ષે તમે પાણીથી ડર અને 18મા વર્ષે તમને આગથી ડર લાગશે. 21મા વર્ષે વૃક્ષો અથવા વાહનોથી મૂશ્કેલી થઇ શકે છે. 20મા વર્ષે સાપથી ડર લાગી શકે છે. સામાન્ય રીતે એક બિઝનેસમેન અને સમૃદ્ધ વ્યક્તિની છાપ ઉપસી શકે છે. વૈષાખ શુક્લ દશમીએ મૃત્યુ થઇ શકે છે. મંગળવારે અશ્લેષા. 7મા, 14મા અને 20મા વર્ષે જર્મથી ડર લાગી શકે છે અને પ્રવર્તી રહેલા ત્રણ પરિબળોથી અસર થવાનું જોખમ. 28મા અને 42મા વર્ષે હાથી અથવા પત્થરોથી જોખમ રહેલું છે. 63મા વર્ષે હાથ અને પગમાં દુખાવો થઇ શકે છે. તમને ખુબજ આદર મળશે. તમારા ઉપર લોકોની નજર કેન્દ્રિત રહેશે અને તમે બિઝનેસમેન બનાવાની સ્થિતિમાં હશો. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_8							= <p> તમારી પીઠ, લાલ રંગનો ટોન, દૂધ અને ડેરીની પેદાશો તમારી પસંદગીની ચીજો હશે. તમારા શુભ દિવસો મંગળવાર અને સોમવાર હશે અને બુધવાર અશુભ રહેશે. </p> ખાટી અને કડવી બાબતો તમારા માટે કમનસીબ સાબિત થશે. તમે હંમેશા તમારા સપના ભુલી જશો. તમે નબળા, પ્રાણીઓ માટે પ્રેમાળ, પૂર્વજો અને યુદ્ધથી જંગી નાણા પ્રાપ્ત થશે. તમારા શરીરની ગંધ ખરાબ હશે અને તમને ફળો અને પાણીથી લાભ થશે. </p> <p> જેમિનિ અને લિબ્રાનો પ્રભાવ ધરાવતા મહિનાઓથી જે વ્યક્તિ ઝડપથી વૃદ્ધિ અને પડતી સાધે અને એવી કોઇ વ્યક્તિ કે જે સ્થિતિનો ઝડપથી સ્વિકાર કરે તેમને નુકશાન થશે. </p> <p> તમે ખરાબ કામ કરનારા અને દુશ્મનોથી ઘેરાયેલા રહેશો. 7મા, 14મા અને 28મા વર્ષમાં તમને શ્વાચ્છોશ્વાસની સમસ્યા થશે. 54મા વર્ષ અને ગુરુના વર્ષમાં તમને મોટું નુકશાન થશે. </p> <p> સમયજતાં જ્યારે તમે ચંદ્ર જોશો ત્યારે તમને લાલ પીળી વસ્તુઓ, મહિલાઓથી સુખ મળશે. જ્યારે તમે 75 વર્ષના થશો ત્યારે તમને તાવ આવશે. 25મા વર્ષે અચનાક મૃત્યુનું જોખમ સર્જાશે. 39મા વર્ષે આગનું જોખમ થશે. તમને બાળકો થશે. </p> <p> તમને લડાઇ કરવાનું ગમશે, મહિલાઓથી શરમાશો અને મિત્રોને ખોટા માર્ગે દોરશો. તમે હસ્ત્ર નક્ષત્ર, શુક્લ દશમીના બુધવારે મૃત્યુ પામશો. </p> <p> 8મા, 16મા, 24મા અને 40મા વર્ષે તમે ચોરી, આગ, પરિસ્થિતિ અને તાવથી પીડાશો. 32મા વર્ષે તમે બંધન, ઇજા અને જંતુઓથી પીડાશો. 72મા વર્ષે તમને પાણીથી અસર થશે. તમે નિશ્ચયી અને આદર પ્રાપ્ત કરશો. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_9							= <p> તમને પીઠનો દર્દ રહેશે, ત્વચા ઘઉવર્ણી રહેશે, વાળ ભુખરા રહેશે, આંખો સુંદર રહેશે, ઘુંટણમાં દુખાવો રહેશે. તમે તમારા નજીકના લોકો સાથે ઝઘડો કરશો, ભોજનના શોખીન અને પ્રાણીઓને મારનાર અને યાત્રા કરનારા રહેશો. 18મા, 24મા, 30મા અને 40મા વર્ષે તમને બિમારી થશે. ગુરુવાર, મંગળવાર અને સોમવાર અનુકૂળ દિવસો છે. જ્યારે શનિવાર અનુકૂળ નથી. તમારી ત્રણ પત્નિઓ હશે. મેષ મહિને તમારા માટે યોગ્ય છે અને કેન્સર મહિનો બિનઅનુકૂળ રહેશે. </p> <p> જો ગુરૂ ઉચ્ચ સ્થિતિમાં હોય તો તમને ઓછી અસર થશે. તમારી માતાને અસર થશે અને તમે જંગી નાણા ગુમાવશો અને સ્થિતિ યોગ્ય બનવામાં તમે મૂશ્કેલીઓનો સામનો કરશો. </p> <p> જ્યારે મૂલ નક્ષત્ર હોય ત્યારે મનની સમસ્યાઓ ઉભરે છે. જ્યારે સૂર્ય કર્ક રાશિમાં હોય ત્યારે પીડા અને ત્વચાની બિમારી થાય છે. 7મા, 14મા, 20મા, 35મા અને 25મા વર્ષમાં ઇજા અને પીડા થશે. </p> <p> લાલ, પીળી અને સફેદ ચીજો શુકનીયાળ રહેશે. 64 વર્ષ મહત્તમ વયમર્યાદા છે. વધુમાં, પ્રથમ વર્ષ બિમારીનું છે, 13મા વર્ષે અચાનક મૃત્યુ આવી શકે છે. જ્યારે તમે યુવાન હશો ત્યારે તમે ધનાઢ્ય બનશો, બાળકો ઓછા હશે, પરિવારના સભ્યોની બિમારી માટે હંમેશા ચિંતિત રહેશે, ત્વચાની બિમારી હશે અને ભોજનના શોખીન નહીં હોવ. તમે અષાઢ ક્રિશ્ના પંચમીના શુક્રવારના રોજ મૃત્યુ પામશો. 18મા, 27મા અને 9મા વર્ષે તમે શ્વાસોચ્છવાસની સમસ્યા, આગનો ડર અને શીંગળા અને કાંટાળા પ્રાણીઓની સમસ્યાનો સામનો કરશો. </p> <p> 54મા અને 36મા વર્ષમાં તમે મસા અને ત્રણવાર અસંતુલનથી પીડાશો. તમે હોંશિયાર હશો અને યજ્ઞ સાથે જોડાશો, પરંતુ તમને જીવનમાં સમસ્યાઓનો સામનો કરવો પડશે. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_10							= <p> તમને પીઠની સમસ્યા રહેશે. હાથ, પગ અને કમરમાં દુખાવો રહેશે. તમારા માટે બુધવાર, શનિવાર અને શુક્રવાર શુભ દિવસો રહેશે જ્યારે રવિવાર અશુભ દિવસો રહેશે. </p> <p> મધ ભદ્રપદ મહિનામાં અને લિયોમાં ચંદ્ર હોય ત્યારે નુકશાની અને અન્ય ખતરાની સંભાવના સૌથી વધુ રહેલી છે. 8મા, 16મા, 20મા, 30મા અને 34મા વર્ષ દરમિયાન તીવ્ર પીડા થશે. </p> <p> 44મા અને 59મા વર્ષમાં સૌથી વધુ પીડા રહેશે. તમારી બે બદસુરત પત્નિઓ હશે. જે વર્ષોમાં શનિનો પ્રભાવ વધુ હશે તેમાં તમને કાળી ચીજોથી સૌથી વધુ લાભ થશે. તમને પાણીથી ભય રહેશે. તમે હોંશિયાર છો. 21મા, 32મા અને 5મા વર્ષે તાવ આવશે. 25મા વર્ષે તમને આગથી ડર રહેશે. 35મા વર્ષે તમને અન્ય મહિલાઓ પ્રત્યે આકર્ષણ રહેશે અને દુશ્મનોથી ભય રહે. 10-20 વર્ષે તમને આંખમાં સમસ્યા, ત્વચાની બિમારી, પાણીથી ભય અને હથિયારોથી ડર રહેશે. 30મા વર્ષે તમને આંખની સમસ્યા થશે. 40થી 60 વર્ષ દરમિયાન એપેન્ડિક્સ, મહિલાઓ અને ઝેરથી તમને ખતરો રહેશે. ઓછા નાણા સાથે તમે ગેમ્બલર સાબિક થશો અને હંમેશા ખોટા વ્યક્તિની સંગતમાં રહેશો. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_11							= <p> તમને પેટમાં સમસ્યા, પેટમાં ગઠ્ઠા, શરદી અને તાવની સમસ્યા રહેશે. શુક્રવાર, બુધવાર અને રવિવાર અશુભ દિવસો રહેશે. તમારી ત્વચા ઘઉવર્ણી, સુંદર આંખો, સમૃદ્ધ અને સુખી રહેશે. </p> <p> તમે સતભિષા નક્ષત્ર અથવા દ્વિતિય તિથિમાં મૃત્યુનો સામનો કરવો પડશે. તમે બે પત્નિઓ સાથે વિવિધ ચીજો એકત્ર કરતાં રહેશો અને તમારી આવરદા ટૂંકી રહેશે. </p> <p> તમે પરિવારના સૌથી મોટા વ્યક્તિ, ગરીબી, પ્રેમાળ પત્નિ, બાળક ન ધરાવતી પત્નિ તેમજ તમને કમર ઉપર માર્ક રહેશે. </p> <p> તમે સમુદ્રમાંથી પણ નાણા બનાવશો. તમારા શુભ દિવસોમાં સોમવાર, ગુરુવાર, મંગળવારનો સમાવેશ થાય છે. શુક્રવાર અશુભ બની રહેશે. જો તમારો ગુરુ નબળો હોય તો તમારે ચોક્કસપણે પ્રાર્થના કરવી જોઇએ. જો ગુરુ નબળો હશે તો વેપારમાં નુકશાન થશે. તમને પુત્ર થશે. 2, 4, 9 અને 12મા વર્ષમાં તમને પેટની સમસ્યા થશે. આ વર્ષોમાં તમને પીડા થશે અને તમે અસફળ રહેશો. </p> <p> તમે મદદગાર રહેશો, પરંતુ કામમાં આળસુ રહેશો. વર્ષ 32, 19માં બિમારીઓ આવશે. કડવી દવાઓ તમારા માટે સારી છે. </p> <p> જ્યારે સૂર્ય એક્વેરિયસ રાશિમાં હશે ત્યારે તેનાથી તમને લાભ થશે, પરંતુ ટીબીથી પીડાશો. તમે મીઠાબોલા અને પ્રોફેશ્નલ જીવનમાં સતત કાર્યશીલ રહેશો. પ્રથમ વર્ષમાં તમને બિમારી રહેશે, તમને ત્રણ ભાઇઓ અને તમારા ડાબા હાથ ઉપર માર્ક હહશે. તમારી બે પત્નિઓ હશે. 5મા અને 6ઠ્ઠા વર્ષમાં તમે ગરીબીનો સામનો કરશો. 15મા વર્ષમાં તમને આગથી ડર લાગશે, 12મા વર્ષમાં પાણી અને સાપથી ડર લાગશે. ગુસ્સો, મહિલાઓ તરફી આકર્ષણ, સ્વાર્થી, સતત કાર્યશીલતા અને કામમી હઠીલા રહેશો. તમારી ગરદન લાંબી, સારી ઉંચાઇ અને ભરપૂર વાળ રહેશે. તમે 80 વર્ષ સુધી જીવશો. તમે ક્રિશ્ના ભદ્રપદ નવમી રોહિણીમાં મૃત્યુ પામશો. </p> <p> 11મા વર્ષમાં તમને પાણીથી પીડા થશે અને હંમેશા પાણીથી ડર લાગશે. 16મા વર્ષમાં તમને ડાકણ અને હથિયારોથી ડર લાહશે. 21મા વર્ષમાં તમને સાપથી ડર લાગશે અને કોઇનો આદર કરશો નહીં. 25મા વર્ષે તમે ત્રણવાર અસમતુલનનો સામનો કરશે. 11મા, 22મા અને 33મા વર્ષે તમને જંગલી પ્રાણીઓથી ડર લાગશે. 66મા અને 44મા વર્ષે તમને દાંત, આંખો, કાનની સમસ્યા થશે. તમારી કમર અને હાથ ઉપર એક માર્ક હશે. સામાન્ય રીતે તમે અન્ય લોકોના નાણા ઉપર જીવન ગાળશો અને ગેમ્બલ હશો. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>
	RASI_PREDICTION_12							= <p> ઓપરેશન અથવા અકસ્માતને કારણે તમારું લોહી વહી જવાની શક્યતા સર્જાશે. તમે લક્ઝરી ભોગવશો અને તમારી ત્વચા ઘઉંવર્ણી, સુંદર આંખો, સારું ડ્રેસિંગ, સંગીત પ્રેમી રહેશો. બીજી તરફ તમારા શરીરના ડાબાભાગમાં તમને દુખાવો રહેશે. તમારો સ્વભાવ સારો રહેશે અને સમૃદ્ધ બનશો. તમે મહેમાનોને પસંદ કરશો અને તમને એક સારો પુત્ર રહેશે. પ્રથમ વર્ષમાં તમને પાણીથી ડર લાગશે અને 8 વર્ષે તાવ આવષે અને 32મા વર્ષે અચનાક મૃત્યુ થઇ શકે છે. </p> <p> ગ્રહોની સારી અને ખરાબ સ્થિતિ આવ-જા કરશે અને જો તમે મૂશ્કેલીભર્યાં સમયમાં હશો ત્યારે પણ ગ્રહોની સારી અને ખરાબ સ્થિતિની આવ-જા થઇ રહેશે અને તમારી આવરદા 100 વર્ષની રહેશે. તમારામાં સારો દેખાવ, મોટું માથુ, સુંદર આંખોની દ્રષ્ટિ, શુભેચ્છકોની શુભકામનાઓ, હોંશિયારી, સમૃદ્ધતા, પાણીનો પ્રે, ગુસ્સો, મહિલાઓ પ્રત્યે કુણું વલણ, દાન આપવાની વૃત્તિ જોવા મળશે. તમારા સાત ભાઇ અને બહેન રહેશે. </p> <p> 20મા વર્ષે તમને મૃત્યુની ભય રહેશે અને નદી કિનારે અશ્વિન ક્રિશ્ના ચતુર્થી, ગુરુવાર, રોહિણી નક્ષત્રમાં મૃત્યુ થવાનો અંદાજ છે. </p> <p> 12મા વર્ષે તાવ, 18મા વર્ષે સાપ, 22મા વર્ષે વિદેશ અને 24મા વર્ષે અચાનક મૃત્યુનુ જોખમ રહેલું છે. 27મા વર્ષે પાણીથી જોખમ, 32મા વર્ષે સાપ અને હથિયારોથી ડર લાગશે. તમારા 12મા, 24મા, 40મા અને 48મા વર્ષે તમને કૂતરા, જંગલી પ્રાણીઓથી જોખમ રહેશે. </p> <b style='padding-left:60%;'>-Romcac or Romuk view point</b>

	WHAT_IS_RASI								= Your Rashi As Per Astrology Classics