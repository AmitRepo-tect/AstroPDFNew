#'LalKitab-Remedies-Rules.asp

LALKITAB_REMEDIES_RULES = லால் கிதாப் பரிகாரங்களுடன் தொடர்புடைய விதிமுறைகள்
LALKITAB_REMEDIES_RULES1 =  மற்ற நேரங்களில் செய்யும்படி குறிப்பிட்டு சொல்லப்பட்டாலன்றி, எல்லாப் பரிகாரங்களும் பகல் நேரத்தில் ஏறுபொழுதில் செய்யப்பட வேண்டும். மேகமூட்டமுள்ள நாட்களில் பரிகாரங்கள் செய்யப் படக்கூடாது என்றும் சிலர் கூறுவதுண்டு. மேகமூட்டமுள்ள நாட்களும் இரவு நேரங்களும் சனிக்குரியவை. ஆனால் மேற்குப் பிரதேசங்களில் பெரும்பாலான நேரங்களில் பனியும், குளிரும் இருப்பதால் இத்தகைய கட்டுப்பாடு கிடையாது.
LALKITAB_REMEDIES_RULES2 =  நீண்ட கால அளவில் செய்யக்கூடிய பரிகாரங்களைப் பொறுத்த வரை, உதாரணமாக 6 நாட்கள், 10 நாட்கள், 43 நாட்கள் ஆகியவை, தடையின்றி தொடர்ந்து செய்யப்படவேண்டும். ஏதேனும் தவிர்க்கமுடியாத காரணங்களுக்காக பரிகாரத்தில் தடை ஏற்பட்டால், அந்தச் சூழ்நிலையில் செய்ய வேண்டிய விஷயம் என்னவெனில், சிறிது அரிசியைப் பாலில் கழுவி வீட்டில் வைத்திருக்க வேண்டும் என்பதே. ஒருவேளை அது 43 நாள் பரிகாரமாக இருந்து, அந்த நேரத்தில் நீங்கள் ஒரு நான்கு நாட்கள் வெளியே சென்றுவர வேண்டியிருந்தால், நீங்கள் திரும்பி வந்து, பரிகாரத்தை விட்ட இடத்திலிருந்து தொடரலாம்.
LALKITAB_REMEDIES_RULES3 = ஒரு நேரத்தில் ஒரு பரிகாரம் மட்டும் செய்யவும். முதலாவது பரிகாரம் முடிந்த பிறகே அடுத்த பரிகாரத்தைத் தொடங்கவும். வரிசைப்படி  செய்யும்படி சொல்லியிருந்தால் அதன்படியே செய்யவும். பரிகாரம் செய்யவேண்டிய வரிசை சொல்லப்படாவிட்டால், ஒரு நாள் பரிகாரத்தை முதலில் செய்துவிட்டு நீண்ட நாள் பரிகாரத்தைப் பிறகு செய்வது நலம்.
LALKITAB_REMEDIES_RULES4 = அடுத்த பரிகாரத்தைத் தொடங்கும் முன் சில நாட்கள் இடைவெளி விடுவது நல்லது. முடிந்தால் ஒரு வாரம் கழித்துத் தொடங்குங்கள். இறுதியாக, ஒரு ஜாதகருக்காக அவருடைய இரத்த சொந்தங்களில் யாராவது ஒருவர் பரிகாரம் செய்வதானால் அவர் தன்னுடைய மனதில், இந்தப் பரிகாரத்தை நான் இன்னாருக்காக செய்கிறேன் என்று ‘சங்கல்பம்’ செய்து கொள்ள வேண்டும். இல்லாவிட்டால் அந்தப் பரிகாரம் அவருடைய சொந்தப் பரிகாரமாகிவிடுவதோடு அதன் விளைவுகள் விரும்பத் தகுந்தவையல்ல.

