NAME_COMAPTIBILITY_USING_NUMEROLOGY_P1            = காதலில் இருப்பது ஒரு உன்னதமான உணர்வு. இந்த உணர்வை பலர் விளக்க முயன்றார்கள், ஆனால் முடியவில்லை. எல்லோரும் தங்கள் விருப்பம் போல் இதை உணரலாம், இந்த உணர்வு ரொம்பவே நூதனமானது. நாம் எல்லோரும் காதலை பலவிதமாக வர்ணிக்கலாம். நீங்கள் யாரையேனும் மிகவும் ஆழமாக விரும்புகிறீர்களா, அந்த நபருடன் வாழ்க்கை பூராவும் இருக்க விருப்பமா? அப்படி என்றால், நீங்கள் மிகவும் அதிர்ஷ்டமானவர். எல்லா காதல் உறவும் இந்த இரண்டு நபர்களின் 'பொருத்தம்' என்ற விஷயத்தில் அடங்கியிருக்கிறது. ஆஸ்ட்ரோசேஜ் உங்களுக்கு ஒரு புதுவிதமான அனுபவம் தருகிறது, உங்கள் பெயர் மூலம் உங்களை பற்றி அறிய. உங்களுடைய பொருத்தம் பற்றி அறிவதற்கு நீங்கள் கவலை படவேண்டாம், வேறு எந்த முறையையும் அப்ளை செய்ய வேண்டாம். பெயர் எண் பொருத்தம் மூலம் நீங்கள் உங்கள் பெயர்களை கொடுங்கள், மிகவும் குறைந்த சமயத்தில் உங்கள் பொறுத்த பலன் உங்கள் கையில். இந்த பொருத்தம் நுட்பமாக கணிக்கப்பட்டது. அதனால் எந்த கவலையும் படாமல் இந்த பொருத்தம் மூலம் உங்கள் வாழ்க்கையின் முக்கிய முடிவுகள் எடுக்கலாம். உங்கள் காதல் விஷயத்தில், எந்த பிரச்சனையும் இல்லாமல், மிகவும் தைரியமாக முன்னேருங்கள்.
