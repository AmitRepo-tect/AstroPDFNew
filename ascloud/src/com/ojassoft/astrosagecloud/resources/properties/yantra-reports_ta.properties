HOW_TO_INSTALL_VENUS_YANTRA =<ul><li>சுக்கிரன் யந்திரம் நிறுவதற்கு முன், காய்ச்சாத பால் அல்லது கங்கை நீர் தெளித்து புனித படுத்த வேண்டும் </li><li>இதற்கு பிறகு லக்ஷ்மி தேவிக்கு வெள்ளை பூக்கள், தூபம் மற்றும் ஊதுவத்தி வழிபடவும் மற்றும் சுக்கிரன் மந்திரத்தை  "ௐ த்ராஂ த்ரீஂ த்ரௌஂ ஸஃ ஶுக்ராய நமஃ" மந்திரத்தை 108 முறை உச்சரிக்க வேண்டும் </li></ul>இந்த விதி முறைக்கு பிறகு சுக்கிரன் யந்திரத்தை வெள்ளிக்கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/bharani-nakshatra-characteristics.asp">பரணி</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-phalguni-nakshatra-characteristics.asp">பூரம்</a>, <a href="http://astrosage.com/hindi/nakshatra/purva-shadha-nakshatra-characteristics.asp">பூராடம்</a> நிறுவ வேண்டும். 
HOW_TO_INSTALL_MERCURY_YANTRA =<ul><li>புதன் யந்திரம் நிறுவதற்கு முன், காய்ச்சாத பால் அல்லது கங்கை நீர் தெளித்து புனித படுத்த வேண்டும்</li><li>பிறகு விஸ்ணு பகவானுக்கு மஞ்சள் பூக்கள், தூப விளக்கு, ஊதுவத்தி வழிபாட்டுடன் புதன் மந்திரம் "ௐ ப்ராஂ ப்ரீஂ ப்ரௌஂ ஸஃ புதாய நமஃ" 108 முறை உச்சரிக்க வேண்டும் </li></ul>இந்த விதிமுறைக்கு பிறகு புதன்கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/ashlesha-nakshatra-characteristics.asp">ஆயில்யம்</a>, <a href="http://astrosage.com/hindi/nakshatra/jyeshta-nakshatra-characteristics.asp">கேட்டை</a>, <a href="http://astrosage.com/hindi/nakshatra/revati-nakshatra-characteristics.asp">ரேவதி நட்சத்திரம்</a>இல் இந்த யந்திரத்தை நிறுவலாம். 
HOW_TO_INSTALL_MARS_YANTRA =<ul><li>செவ்வாய் யந்திரம் நிறுவதற்கு முன், காய்ச்சாத பால் அல்லது கங்கை நீர் தெளித்து புனித படுத்த வேண்டும் </li><li>பிறகு ஹனுமான் பகவானுக்கு சிவப்பு பூக்கள், துபை விளக்கு, ஊதுவத்தி வழிபாட்டுடன் "ௐ க்ராஂ க்ரீஂ க்ரௌஂ ஸஃ பௌமாய நமஃ" 108 முறை உச்சரிக்க வேண்டும் </li></ul>இந்த விதிமுறைக்கு பிறகு செவ்வாய் யந்திரத்தை செவ்வாய்க்கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/mrigasira-nakshatra-characteristics.asp">மிருகசீரிடம்</a>, <a href="http://astrosage.com/hindi/nakshatra/chitra-nakshatra-characteristics.asp">சித்திரை</a>, <a href="http://astrosage.com/hindi/nakshatra/dhanishta-nakshatra-characteristics.asp">அவிட்டம் நட்சத்திரம்</a> இல்  நிறுவதால் நன்மை தரும்.
HOW_TO_INSTALL_JUPITER_YANTRA =<ul><li>குரு யந்திரம் நிறுவதற்கு முன், காய்ச்சாத பால் அல்லது கங்கை நீர் தெளித்து புனித படுத்த வேண்டும் </li><li>இதற்கு விஷ்னு பகவானுக்கு மஞ்சம் பூக்கள், தூப விளக்கு, ஊதுவத்தி வழிபாட்டுடன் குரு மந்திரம் "ௐ க்ராஂ க்ரீஂ க்ரௌஂ ஸஃ குரவே நமஃ" உச்சரிக்க வேண்டும் </li></ul>இந்த  விதி முறை நிறுவிய பின்  வியாழக்கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/punarvasu-nakshatra-characteristics.asp">புனர்பூசம்</a>, <a href="http://astrosage.com/hindi/nakshatra/vishakha-nakshatra-characteristics.asp">விசாகம் </a>, <a href="http://astrosage.com/hindi/nakshatra/purva-bhadra-nakshatra-characteristics.asp">பூரட்டாதி நட்சத்திரம்</a> இல் இந்த யந்திரம் நிறுவ வேண்டும்.
HOW_TO_INSTALL_SATURN_YANTRA =<ul><li>சனி யந்திரத்தை  நிறுவதற்கு முன், காய்ச்சாத பால் அல்லது கங்கை நீர் தெளித்து புனித படுத்த வேண்டும் </li><li>பைரவ பகவானுக்கு கருப்பு எள், துபை விளக்கு, ஊதுவத்தி வழிபாட்டுடன் சனி மந்திரம்  "ௐ ப்ராஂ ப்ரீஂ ப்ரௌஂ ஸஃ ஶநைஶ்சராய நமஃ" 108 முறை உச்சரிக்க வேண்டும் </li></ul>இதற்கு பிறகு சனிக்கிழமை சூரியன்  அஸ்தமனத்திற்கு பிறகு அல்லது <a href="http://astrosage.com/hindi/nakshatra/pushya-nakshatra-characteristics.asp">பூசம்</a>, <a href="http://astrosage.com/hindi/nakshatra/anuradha-nakshatra-characteristics.asp">அனுஷம்</a>, <a href="http://astrosage.com/hindi/nakshatra/uttarashadha-nakshatra-characteristics.asp">உத்திராடம் நட்சத்திரம்</a> இல் சனி யந்திரம் நிறுவது நன்மை தரும்.

HOW_TO_INSTALL_RAHU_YANTRA =<ul><li>ராகு யந்திரம் நிறுவதற்கு முன், காய்ச்சாத பால் அல்லது கங்கை நீர் தெளித்து புனித படுத்த வேண்டும்</li><li>இதற்கு பிறகு துர்கா தேவிக்கு சிவப்பு போட்டு, தூப விளக்கு, ஊதுவத்தி வழிபாட்டுடன் ராகு மந்திரம் "ௐ ப்ராஂ ப்ரீஂ ப்ரௌஂ ஸஃ ராஹவே நமஃ" 108 முறை உச்சரிக்க வேண்டும் </li></ul>இதன் விதிமுறை பிறகு சனிக்கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/swati-nakshatra-characteristics.asp">சுவாதி</a>, <a href="http://astrosage.com/hindi/nakshatra/satabishak-nakshatra-characteristics.asp">சதயம்</a>, <a href="http://astrosage.com/hindi/nakshatra/ardra-nakshatra-characteristics.asp">திருவாதிரை நட்சத்திரம்</a>இல் ராகு மந்திரத்தை நிறுவது நன்மை தரும். 
HOW_TO_INSTALL_KETU_YANTRA =<ul><li> கேது யந்திரம் நிறுவதற்கு முன், காய்ச்சாத பால் அல்லது கங்கை நீர் தெளித்து புனித படுத்த வேண்டும்</li><li>பிறகு விநாயகருக்கு அருகம் புள், தூப விளக்கு, ஊதுவத்தி வழிபாட்டுடன் கேது மந்திரம் "ௐ ஸ்ராஂ ஸ்ரீஂ ஸ்ரௌஂ ஸஃ கேதவே நமஃ" 108 முறை உச்சரிக்க வேண்டும் </li></ul>இதன் விதி முறைக்கு பிறகு புதன்கிழமை மற்றும் சனிக்கிழமை அல்லது <a href="http://astrosage.com/hindi/nakshatra/ashwini-nakshatra-characteristics.asp">அஷ்வினி</a>, <a href="http://astrosage.com/hindi/nakshatra/magha-nakshatra-characteristics.asp">மகம்</a>, <a href="http://astrosage.com/hindi/nakshatra/moola-nakshatra-characteristics.asp">மூலம் நட்சத்திரம்</a> இல் இந்த யந்திரத்தை நிறுவ வேண்டும்.



