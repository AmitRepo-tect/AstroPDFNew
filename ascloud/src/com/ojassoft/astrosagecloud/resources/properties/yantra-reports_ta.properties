RAHU_YANTRA =நவ கிரக யந்திரத்திலியே இந்த  கிரக யந்திரம் அதிமுகமாக பயன்படுத்த படுகிறது. வேத ஜோடிட படி இந்த யந்திரத்தின் கடவுளாகும் <a href="http://www.astrosage.com/hindi/planet/rahu/">ராகு</a>இது ஒரு தீய கிரகமாகும். ராகுவின்  விளைவால் ஜாதகக்கரர்களுக்கு எதிர்மறையான மற்றும் கலவையான பலன் கிடைக்கும். தீய கிரக கரத்தினால் இது  முழுயாக நேர்மறையான பலன் கொடுக்காது மற்றும் இந்த காரணத்தினால் ஜோதிடத்தில் <a href="http://buy.astrosage.com/navagrah-yantra/rahu-yantra?&amp;language=hi">ராகு யந்திரம்</a> நிறையப் பயன்படுத்தப்படுகிறது. உங்கள் ஜாதகத்தில் ராகு ஒரு மோசமான நிலையில் இருந்தால், நீங்கள் வாழ்க்கையில் தொல்லைகள், போராட்டங்கள் மற்றும் சவால்களை எதிர்கொள்ள வேண்டியிருக்கும். அத்தகைய சூழ்நிலையில் ராகு யந்திரம் உங்கள் பிரச்சினைகளை நீக்கும். மறுபுறம், ஜாதகத்தில் ராகு நல்ல நிலையில் இருந்தால், அது உங்களுக்கு கலவையான முடிவுகளைத் தரும். இந்த விஷயத்தில் நீங்கள் ராகு யந்திரத்துடன் நல்ல பலன்களைப் பெறுவீர்கள். ராகு யந்திரத்தை நிறுவுவதன் மூலம், நீங்கள் விபத்துக்கள் மற்றும் எதிரிகளிடமிருந்து பாதுகாப்பாக இருப்பீர்கள். இந்த யந்திரம் மூலம் நீங்கள் ஆரோக்கிய நன்மைகளைப் பெறுவீர்கள், மேலும் நீங்கள் மன அமைதியை உணர்வீர்கள். இது தவிர, உங்கள் கெட்ட பழக்கங்கள் அதன் விளைவு காரணமாக தவறவிடப்படும். உங்கள் ஜாதகம் ராகு கிரகத்தால் பாதிக்கப்பட்டிருந்தால், நீங்கள் இந்த யந்திரத்தை நிறுவ வேண்டும்.

