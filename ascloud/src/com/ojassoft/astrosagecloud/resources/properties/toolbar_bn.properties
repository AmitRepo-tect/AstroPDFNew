
	UNSAVED																	= অসংরক্ষিত কুষ্ঠি
	SORYY_YOU_CAN_NOT_SAVE_MORE_CHARTS_PLEASE_UPGRADE_YOUR_PLAN_FOR_TOOLBAR	= আপনার প্লান একটি ফ্রি প্লান যার মধ্যে অধিকতম ১০টি কুষ্ঠি সংরক্ষিত করার অনুমতি আছে। ফ্রি কুষ্ঠি সংরক্ষণের সীমা ১০টি। আপনি আরো কুষ্ঠি সংরক্ষিত করতে চাইলে পুরনো তালিকাগুলি মুছে দিতে পারেন। অথবা আপনি ১০টির বেশী তালিকা সংরক্ষিত করতে পারেন <a onclick=popupvisibility();><font size=3 color=maroon style=cursor:pointer><b> এখানে ক্লিক করে। </b></font></a>
