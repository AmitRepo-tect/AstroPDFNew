
	PERSON												= વ્યક્તિ 
	MANGLIK											= માંગલિક  
	PERSON_IS_MANGLIK									= Person is Manglik
	PERSON_IS_NOT_MANGLIK								= Person is not Manglik
	MANGLIK_DETAILS_PARAGRAPH1							= સમાન્ય રીતે જન્મકુંડળીમાં લગ્ન અને ચંદ્રના સ્થાન પરથી મંગળ દોષ જોવાય છે.
	MANGLIK_DETAILS_FIRST								= જન્મ કુંડળીમાં, મંગળ 
	MANGLIK_DETAILS_SECOND								=  લગ્નથી ભાવમાં આવેલો છે, જયારે ચંદ્ર કુંડળીમાં મંગળ 
	MANGLIK_DETAILS_THIRD								=   ભાવમાં આવેલો છે.
	MANGLIK_DETAILS_HENCE_NOTE							= આમ મંગળ દોષ
	PRESENT_NEITHER_IN_LAGNA_CHART_NOR_IN_MOON_CHART	= અંતઃ મંગળ દોષ લગ્ન કુંડળી અને ચંદ્ર કુંડળી માં હાજર નથી.
	MANGLIK_DETAILS_HENCE_NOTE1						= અંતઃ મંગળ દોષ લગ્ન કુંડળી અને ચંદ્ર કુંડળી બંને માં હાજર છે. .
	MANGLIK_DETAILS_HENCE_NOTE2						= અંતઃ મંગળ દોષ ચંદ્ર કુંડળી માં હાજર નથી પરંતુ લગ્ન  કુંડળી માં હાજર છે.
	MANGLIK_DETAILS_HENCE_NOTE3						= અંતઃ મંગળ દોષ લગ્ન કુંડળી માં હાજર નથી પરંતુ ચંદ્ર કુંડળી માં હાજર છે.
	MANGLIK_DETAILS_PARAGRAPH4							= મંગળ દોષને કારણે વ્યક્તિના વૈવાહિક જીવનમાં તકલીફો આવતી માનવામાં આવે છે. કેટલાક લોકોના મત અનુસાર, મંગળ દોષને કારણે જીવનસાથીને સતત બીમારી રહે છે અને અંતે તે મૃત્યુ પામે છે.
	MANGLIK_DETAILS_PARAGRAPH5							= એવું માનવામાં આવે છે કે જો એક માંગલિક વ્યક્તિ અન્ય માંગલિક વ્યક્તિને પરણશે તો મંગળ દોષ રદ થશે અને તેની કોઈ અસર રહેશે નહિ. 
	MANGLIK_DETAILS_SUBHEADING1						= કેટલાક ઉપાયો (જો મંગળ દોષ હોય તો)
	MANGLIK_DETAILS_SUBHEADING2						= ઉપાયો (લગ્ન પહેલાં કરવા જરૂરી)
	MANGLIK_DETAILS_SUBHEADING3						= ઉપાયો (લગ્ન પછી કરી શકાય)
	MANGLIK_DETAILS_PARAGRAPH6							= કુંભ વિવાહ, વિષ્ણુ વિવાહ અને અશ્વથ વિવાહ મંગળ દોષના સહુથી પ્રચલિત ઉપાયો છે. અશ્વથ વિવાહ એટલે પીપળા કે કેળના વૃક્ષ સાથે લગ્ન અને ત્યાર બાદ તે વૃક્ષને કાપી નાંખવું. ઘટ વિવાહ તરીકે જાણીતો કુંભ વિવાહ એટલે એક ઘડા સાથે લગ્ન અને ત્યાર બાદ તે ઘડાને ફોડી નાંખવો.
	REMEDIES1											= પૂજાઘરમાં કેસરિયા ગણપતિ (ભગવાન ગણેશની કેસરી રંગની મૂર્તિ) રાખી તેમની દરરોજ પૂજા કરવી. 
	REMEDIES2											= દરરોજ હનુમાન ચાલીસાનો પાઠ કરી હનુમાનજીની પૂજા કરવી.
	REMEDIES3											= મહામૃત્યુંજય પાઠ (મહામૃત્યુંજય મંત્રનું પઠન).
	MANGLIK_DETAILS_SUBHEADING4						= ઉપાયો (લાલ કિતાબ આધારિત, લગ્ન બાદ કરી શકાય)
