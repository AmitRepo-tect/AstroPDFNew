
SERVICE_NAME_1                                     = ಒಂದು ಪ್ರಶ್ನೆ ವರದಿ ಕೇಳಿ 
SERVICE_DESC_1                                     = ಮನುಕುಲದ ವಿಕಾಸಕ್ಕೆ ಪ್ರಶ್ನೆಗಳು ಅಗತ್ಯ , ಎನ್ನುವ ಅರಿಸ್ಟಾಟಲ್ ಅವರ ಪ್ರಸಿದ್ಧ ಹೇಳಿಕೆಯಿದೆ. ಪ್ರಶ್ನೆಗಳು ಮಾನವರ ವಿಕಾಸಕ್ಕಷ್ಟೇ ಅಲ್ಲದೇ, ವ್ಯಕ್ತಿಗಳು ಅಭಿವೃದ್ಧಿಗೂ ತುಂಬ ಮುಖ್ಯವಾಗಿದೆ. ಒಬ್ಬರ ಮನಸ್ಸಿನಲ್ಲಿ ಎಲ್ಲೋ ಒಂದೆಡೆ ಸುಪ್ತ ಸಮಸ್ಯೆ ಅಥವಾ ಆಳವಾದ ಗೊಂದಲವಿದ್ದಲ್ಲಿ, ಅದು ಅವನ / ಅವಳ ಬೆಳವಣಿಗೆ ಎಲ್ಲಾ ಸಾಧ್ಯತೆಗಳಿಗೆ ಅಡಚಣೆಯಾಗಬಹುದು. ನೀವು ನಿರ್ದಿಷ್ಟವಾಗಿ ಯಾವುದರ ಬಗೆಗಾದರೂ ಚಿಂತೆ ಮಾಡುತ್ತಿದ್ದೀರಾ? ನೀವು ಕೆಲವು ನಿರ್ದಿಷ್ಟ ವಿಷಯದಲ್ಲಿ ನಡೆಯುವ ವಿಷಯಗಳ ಬಗ್ಗೆ ಭಯ ಹೊಂದಿದ್ದೀರಾ ? <br /> <br /> ಜ್ಯೋತಿಷ್ಯವು ನಿಮ್ಮ ಭವಿಷ್ಯದಲ್ಲಿ ಏನಿದೆಯೆಂದು ತಿಳಿದಿಕೊಳ್ಳಲು ನಿಮಗೆ ಸಹಾಯ ಮಾಡುವ ದೈವಿಕ ವಿಜ್ಞಾನವಾಗಿದೆ. ಇದು ನಿಮ್ಮ ಸಂಶಯಗಳು ಮತ್ತು ಭಯವನ್ನು ಅಳಿಸಿಹಾಕುತ್ತದೆ, ಮತ್ತು ವೃತ್ತಿ, ಮದುವೆ, ಹಣ ಮತ್ತು ಒಟ್ಟಾರೆಯಾಗಿ ಜೀವನದ ಬಗೆಗಿನ ನಿಮ್ಮ ಪ್ರಶ್ನೆಗಳಿಗೆ ಉತ್ತರಿಸುತ್ತದೆ. ಇದು ನಿಮ್ಮನ್ನು ಕಾಡುವ ಪ್ರಶ್ನೆಗಳನ್ನು ತೊಡೆದುಹಾಕುವ ಕೀಲಿಕೈಯಾಗಿದೆ. 

SERVICE_NAME_7                                     = ಆರೋಗ್ಯ & ಫಟ್ ನೆಸ್ ವರದಿ 
SERVICE_DESC_7                                     = ಇದು ಆರೋಗ್ಯವೇ ಭಾಗ್ಯ ಎಂದು ಹೇಳಲಾಗುತ್ತದೆ. ನೀವು ಫಿಟ್ ಆಗಿ ಆರೋಗ್ಯಕರವಾಗಿಲ್ಲದಿದ್ದಲ್ಲಿ, ಸೌಕರ್ಯಗಳು ಮತ್ತು ಇತರ ಲೌಕಿಕ ಸ್ವತ್ತುಗಳು ನಿಷ್ಪ್ರಯೋಜಕವಾಗಿರುತ್ತವೆ. ಪುರಾತನ ಕಾಲದಲ್ಲಿ ಜ್ಯೋತಿಷ್ಯ ಮತ್ತು ವೈದ್ಯಕೀಯ ವಿಜ್ಞಾನ, ಅಂದರೆ ಆಯುರ್ವೇದಗಳು ಪರಸ್ಪರ ಸಂಪೂರ್ಣವಾಗಿ ಸಮ್ಮಿಳಿತವಾಗಿದ್ದವು. ಪ್ರಾಚೀನ ಕಾಲಜ್ಞಾನಿಗಳು ಒಬ್ಬರ ಒಟ್ಟಾರೆ ಯೋಗಕ್ಷೇಮದಲ್ಲಿ ನಕ್ಷತ್ರಗಳ ಪಾತ್ರವನ್ನು ಅರಿತಿದ್ದರು. ಕೆಲವೊಮ್ಮೆ ಆಕಾಶಕಾಯಗಳು ಉಂಟುಮಾಡುವ ಅನಾರೋಗ್ಯದ ಅಡ್ಡಿಯಿಂದಾಗಿ ಔಷಧ ಮತ್ತು ಚಿಕಿತ್ಸೆಗಳು ಕೆಲಸ ಮಾಡುವುದಿಲ್ಲ. ಆದ್ದರಿಂದ, ನಿಮ್ಮ ಸುಧಾರಣೆಗೆ ಜ್ಯೋತಿಷ್ಯದ ಬುದ್ಧಿವಂತಿಕೆ ಕೆಲಸ ಮಾಡಲು ಅವಕಾಶ ನೀಡುವುದು ಅವಶ್ಯವಾಗಿದೆ. <br /> <br /> ನೀವು ನಿಮ್ಮ ಆರೋಗ್ಯ ಮತ್ತು ಫಿಟ್ ನೆಸ್ ಗೆ ಸಂಬಂಧಿಸಿದ ಸಮಸ್ಯೆಗಳನ್ನು ಎದುರಿಸುತ್ತಿದ್ದಲ್ಲಿ ಯಾವಾಗಲೂ ಸಾಧ್ಯವಾದಷ್ಟು ಬೇಗ ಕ್ರಮಗಳನ್ನು ತೆಗೆದುಕೊಳ್ಳುವಂತೆ ಸೂಚಿಸಲಾಗುತ್ತದೆ. ನಮ್ಮ ಸಮಗ್ರ ಆರೋಗ್ಯ ವರದಿ ಸಮಸ್ಯೆಯ ಮೂಲವೆಲ್ಲಿದೆ ಮತ್ತು ಕೆಟ್ಟ ಆರೋಗ್ಯದ ಕೂಪದಿಂದ ಹೊರಬರಲು  ಯಾವ ಜ್ಯೋತಿಷ್ಯಶಾಸ್ತ್ರದ ಕ್ರಮಗಳನ್ನು ಪರಿಗಣನೆಗೆ ತೆಗೆದುಕೊಳ್ಳಬೇಕು ಎಂಬುದನ್ನು ತಿಳಿಸುತ್ತದೆ. 

SERVICE_NAME_14                                    = ದೂರವಾಣಿ ಸಮಾಲೋಚನೆ 
SERVICE_DESC_14                                    = ನಮ್ಮ ಅನುಭವಿ ಜ್ಯೋತಿಷಿಗಳನ್ನು ದೂರವಾಣಿಯ ಮೂಲಕವೂ ಸಂಪರ್ಕಿಸಬಹುದು. ಉತ್ತಮ ಚರ್ಚೆಯನ್ನು ಹೊಂದಿವುದು ಸಂಪತ್ತನ್ನು ಹೊಂದಿದಂತೆ ಎಂದು ಒಂದು ಹಳೆಯ ಕೀನ್ಯಾದ ಗಾದೆ ಹೇಳುತ್ತದೆ. ಒಬ್ಬರು ಮಾತನಾಡಿದಾಗ ಅವರು ಕೇವಲ ಮಾತಿನ ಮೂಲಕ ಮಾತ್ರ ಸಂವಹನ ಮಾಡುವುದಿಲ್ಲ. ಅಲ್ಲಿ ಧ್ವನಿ, ಸ್ವರ ಮತ್ತು ಅದರ ಕಂಪನಗಳೂ ತುಂಬಾ ಪ್ರಮುಖ ಪಾತ್ರ ವಹಿಸುತ್ತವೆ. ಅಲ್ಲದೆ, ಜ್ಯೋತಿಷ್ಯದ ಪ್ರಕಾರ ಇಬ್ಬರು ವ್ಯಕ್ತಿಗಳು ಮಾತನಾಡುವ ಕ್ಷಣವೂ ಜಾತಕನ    ಸಮಸ್ಯೆಯ ಬಗ್ಗೆ ಪ್ರಮುಖ ಮಾಹಿತಿಯನ್ನು ನೀಡುತ್ತದೆ. <br /> <br ವೃತ್ತಿ, ಆರೋಗ್ಯ, ವ್ಯಾಪಾರ, ಪ್ರೀತಿ ಮತ್ತು ಮದುವೆಯಂಥ ಜೀವನಕ್ಕೆ ಸಂಬಂಧಿಸಿದ ಯಾವುದೇ ಆಯಾಮಗಳನ್ನು ಚರ್ಚಿಸಬಹುದು ಮತ್ತು ಇಂಥ ಘಟನೆಗಳ ಹಿಂದಿನ ಜ್ಯೋತಿಷ್ಯಶಾಸ್ತ್ರದ ಕಾರಣಗಳನ್ನು ತಿಳಿಯಲು ಸಾಧ್ಯವಿದೆ. ಯಶಸ್ಸು, ಏಳಿಗೆ ಮತ್ತು ಸಂತೋಷದೆಡೆಗಿನ ನಿಮ್ಮ ಮಾರ್ಗಕ್ಕೆ ತಡೆಯೊಡ್ಡುವ ಯಾವುದೇ ಸಮಸ್ಯೆಯನ್ನು ಪರಿಹರಿಸುವ ಸಲುವಾಗಿ ಪ್ರಾಯೋಗಿಕ ನಿವಾರಣಾ ಪರಿಹಾರಗಳನ್ನು ಕೂಡ ಸಲಹೆ ಮಾಡಬಹುದು. ನಮ್ಮ ಜ್ಯೋತಿಷಿಗಳು ನಿಮ್ಮಿಂದ ಕೇವಲ ಒಂದು ಫೋನ್ ಕರೆ ದೂರದಲ್ಲಿದ್ದಾರೆ. 

SERVICE_NAME_4                                     = ವೃತ್ತಿಜೀವನ ವರದಿಯನ್ನು ಪಡೆಯಿರಿ 
SERVICE_DESC_4                                     = ಒಂದು ಒಳ್ಳೆಯ ಮತ್ತು ಪರಿಪೂರ್ಣ ವೃತ್ತಿ ಜೀವನದ ಒಟ್ಟಾರೆ ಯಶಸ್ಸಿಗೆ ಅತ್ಯಗತ್ಯ. ಈ ಸಮಗ್ರ ವರದಿಯಲ್ಲಿ ನಮ್ಮ ತಜ್ಞ ಜ್ಯೋತಿಷಿಗಳು ನೀವು ಯಾವ ವೃತ್ತಿಯನ್ನು ಆರಿಸಿಕೊಳ್ಳಬೇಕು ವಿವಿಧ ಪ್ರದೇಶಗಳಲ್ಲಿ ನಿಮ್ಮ ಸಾಧ್ಯತೆಗಳೇನು, ಮತ್ತು ನೀವು ಈಗಾಗಲೇ ಉದ್ಯೋಗ ಮಾಡುತ್ತಿದ್ದಲ್ಲಿ ನಿಮ್ಮ ವೃತ್ತಿಜೀವನದ ಸುಧಾರಣೆಗಾಗಿ ನೀವೇನು ಮಾಡಬೇಕು ಹಾಗೂ ಯಾವ ರೀತಿಯ ಗುರಿಗಳನ್ನು ನೀವು ಅಳವಡಿಸಿಕೊಳ್ಳಬೇಕು ಇತ್ಯಾದಿಗಳ ಬಗ್ಗೆ ತಿಳಿಸುತ್ತಾರೆ. ಇವುಗಳ ಜೊತೆಗೆ ನಾವು ಭವಿಷ್ಯದಲ್ಲಿ ನಿಮ್ಮ ವೃತ್ತಿಯ ಪಥವನ್ನೂ ವಿಶ್ಲೇಷಿಸುತ್ತೇವೆ ಮತ್ತು ನಿಮ್ಮ ಕೆಲಸ ಅಥವಾ ವ್ಯವಹಾರದಲ್ಲಿ ನಿಮ್ಮ ಪ್ರಗತಿಗೆ ತಡೆಯೊಡ್ಡಬಹುದಾದ ಸಮಸ್ಯೆಗಳ ಬಗ್ಗೆಯೂ ತಿಳಿಸುತ್ತೇವೆ, ಮತ್ತು ಈ ಸಮಸ್ಯೆಗಳನ್ನು ನಿವಾರಿಸಲು ಪರಿಣಾಮಕಾರಿ ಜ್ಯೋತಿಷ್ಯದ ಪರಿಹಾರಗಳನ್ನೂ ನಿಮಗೆ ಸೂಚಿಸುತ್ತೇವೆ. <br /> <br /> ಈ ವಿವರವಾದ ವರದಿ ಆಳವಾದ ಜ್ಯೋತಿಷ್ಯ ವಿಶ್ಲೇಷಣೆ ಮತ್ತು ಮುಂದಿನ ಹನ್ನೆರಡು ತಿಂಗಳುಗಳಿಗೆ ನಿಮ್ಮ ವ್ಯಾಪಾರ ಅಥವಾ ಕೆಲಸದ ಪ್ರತಿಯೊಂದು ಮಜಲಿಗೂ ಪರಿಹಾರದ ಸಲಹೆಗಳನ್ನು ಒಳಗೊಂಡಿರುತ್ತದೆ. ಈ ವರದಿ ಮುಂದಿರುವ ವರ್ಷಕ್ಕೆ ನಿಮ್ಮ ವೃತ್ತಿಗೆ ಒಂದು ವಿವರವಾದ ಮಾರ್ಗದರ್ಶಿಯಾಗಲಿದೆ. ಪ್ರಾಚೀನ ಜ್ಯೋತಿಷ್ಯದ ಬುದ್ಧಿವಂತಿಕೆ ನೀವು ನಿಮ್ಮ ವೃತ್ತಿಯಲ್ಲಿ ಏಳಿಗೆ ಪಡೆಯಲು ಸಹಾಯವಾಗಲಿ ಮತ್ತು ನಮ್ಮ ತಜ್ಞ ಜ್ಯೋತಿಷಿಗಳಿಂದ ಸಮಗ್ರ ವೃತ್ತಿ ವರದಿಯನ್ನು ಪಡೆಯಿರಿ.

SERVICE_NAME_12                                    = ಹಣಕಾಸು ವರದಿ ಪಡೆಯಿರಿ 
SERVICE_DESC_12                                    = ಇಂದಿನ ಸ್ಪರ್ಧಾತ್ಮಕ ಜಗತ್ತಿನಲ್ಲಿ, ಒಂದು ಬಲವಾದ ಆರ್ಥಿಕ ಸ್ಥಿತಿ ಕೇವಲ ಒಂದು ಐಷಾರಾಮಿಯಾಗಷ್ಟೇ ಇರದೇ ಬದುಕಲು ಮತ್ತು ಬೆಳೆಯುತ್ತಿರಲು ಅವಶ್ಯಕವಾಗಿದೆ. ಆರ್ಥಿಕ ಭದ್ರತೆ ವ್ಯಕ್ತಿಯ ಯೋಗಕ್ಷೇಮಕ್ಕಷ್ಟೇ ಅಲ್ಲದೇ ಅವರ ಸಂಗಾತಿ, ಮಕ್ಕಳು ಮತ್ತು ಇಡೀ ಕುಟುಂಬಕ್ಕೂ ಅತ್ಯವಶ್ಯಕವಾಗಿದೆ. ಹಣಕಾಸಿನ ಬಿಕ್ಕಟ್ಟುಗಳು ಬೆಳವಣಿಗೆಯ ಭವಿಷ್ಯಕ್ಕಷ್ಟೇ ಅಲ್ಲದೇ ಮಾನಸಿಕ ಶಾಂತಿ, ಸಂತೋಷ ಮತ್ತು ಸ್ಥಿರತೆಗೂ ತಡೆಯೊಡ್ಡುತ್ತವೆ. ಜಾನ್ ಎಫ್ ಕೆನಡಿ ಒಮ್ಮೆ ಹೇಳಿದರು ಚೀನೀಯರು ಬಿಕ್ಕಟ್ಟನ್ನು ಬರೆಯಲು ಎರಡು ಬ್ರಷ್ ಸ್ಟ್ರೋಕ್ ಗಳನ್ನು ಬಳಸುತ್ತಾರೆ. ಒಂದು ಬ್ರಷ್ ಅಪಾಯಕ್ಕಾದರೆ ಇನ್ನೊಂದು ಅವಕಾಶಕ್ಕಾಗಿರುತ್ತದೆ. ಒಂದು ಬಿಕ್ಕಟ್ಟಿನಲ್ಲಿ ಅಪಾಯದ ಬಗ್ಗೆ ಎಚ್ಚರದಿಂದಿರಿ ಆದರೆ ಅವಕಾಶವನ್ನು ಗುರುತಿಸಿ ಹಾಗೂ ಇದು ನಿತ್ಯ ಸತ್ಯ .<br /><br /> ದೈವೀಕ ಜ್ಯೋತಿಷ್ಯದ ಬುದ್ಧಿವಂತಿಕೆ ಹಣಕಾಸಿನ ತೊಂದರೆಯನ್ನು ಗುರುತಿಸಲು ಮತ್ತು ವಿಶ್ಲೇಷಿಸಲು ನಿಮಗೆ ಅವಕಾಶ ನೀಡುತ್ತದೆ, ಮತ್ತು ಇದು ನಿಮಗೆ ಸಮಸ್ಯೆಗಳಿಂದ ಹೊರಬರಲು ಕೈಗೊಳ್ಳಬೇಕಾದ ನಿವಾರಣಾ ಕ್ರಮಗಳನ್ನೂ ಸೂಚಿಸುತ್ತದೆ. ಜ್ಯೋತಿಷ್ಯವು ಆರ್ಥಿಕ ಬೇನೆಗೆ ಕೆಲವು ಉತ್ತಮೀಕರಣಗಳನ್ನು ಸಲಹೆ ಮಾಡುವ ವಿಜ್ಞಾನವಷ್ಟೇ ಆಗಿರದೇ ನೀವು ಈಗಾಗಲೇ ಉತ್ತಮವಾಗಿರುವ ನಿಮ್ಮ ಆರ್ಥಿಕ ಸ್ಥಿತಿಯ ಸುಧಾರಣೆಗಾಗಿಯೂ ಜ್ಞಾನವನ್ನು ಪಡೆಯಬಹುದು. ನೀವು ಯಾವುದೇ ಹಣಕಾಸು ಸಂಬಂಧಿಸಿದ ಪ್ರಶ್ನೆಗಳನ್ನು ಹೊಂದಿದ್ದರೆ, ಪ್ರಾಚೀನ ಜ್ಯೋತಿಷ್ಯದ ಬುದ್ಧಿವಂತಿಕೆ ನಿಮಗೆ ಸಹಾಯ ಮಾಡಲು ಅನುವು ಮಾಡಿ ಮತ್ತು ನಮ್ಮ ತಜ್ಞ ಜ್ಯೋತಿಷಿಗಳಿಂದ ಸಮಗ್ರ ಹಣಕಾಸು ವರದಿಯನ್ನು ಪಡೆಯಿರಿ.

SERVICE_NAME_13                                    = ರತ್ನಶಿಲೆಗಳು & ಪರಿಹಾರಗಳು 
SERVICE_DESC_13                                    = ಜ್ಯೋತಿಷ್ಯವನ್ನು ಏಕೆ ಅಷ್ಟೊಂದು ಪರಿಣಾಮಕಾರಿಯೆಂದು ಪರಿಗಣಿಸಲಾಗುತ್ತದೆಂದರೆ ಅದು ಕೇವಲ ಸಮಸ್ಯೆಯನ್ನು ಬೊಟ್ಟು ಮಾಡಿ ತೋರಿಸುವುದಷ್ಟೇ ಅಲ್ಲದೇ ಅವುಗಳನ್ನು ನಿವಾರಿಸಲು ಪ್ರಾಯೋಗಿಕ ಕ್ರಮಗಳನ್ನೂ ಸಲಹೆ ಮಾಡುತ್ತದೆ. ಜ್ಯೋತಿಷ್ಯದ ಸಲಹೆಯ ಪ್ರಕಾರ ಈ ಪರಿಹಾರಗಳನ್ನು ಗಂಭೀರವಾಗಿ ಜಾರಿಗೊಳಿಸಿದಲ್ಲಿ ಅವರು ಆಕಾಶಕಾಯಗಳಿಂದ ಉಂಟಾದ ಪ್ರತಿಕೂಲ ಪರಿಣಾಮಗಳ ನಿರ್ಮೂಲನೆ ಮಾಡಬಹುದು ಹಾಗೂ ಕಷ್ಟಕರ ಸಮಯಗಳಿಂದ ಸುಲಭವಾಗಿ ಹೊರಬರಬಹುದು. <br /> <br /> ರತ್ನಶಿಲೆಗಳು ಖಗೋಳ ಶಕ್ತಿಯ ಅಪಾರ ಪ್ರಮಾಣವನ್ನು ಬಿಡುಗಡೆ ಮಾಡುವ ಸಾಮರ್ಥ್ಯವನ್ನು ಹೊಂದಿದ್ದು ಅವುಗಳನ್ನು ಸೂಕ್ತವಾಗಿ ನಿರ್ದೇಶಿಸಿದಲ್ಲಿ ಅವು ನಿಮ್ಮ ನಿಮ್ಮ ಎಲ್ಲ ಸಮಸ್ಯೆಗಳನ್ನು ಪರಿಹರಿಸುತ್ತವೆ ಹಾಗೂ ನಿಮ್ಮ ಜೀವನದ ಪ್ರತಿ ಆಯಾಮದಲ್ಲಿ ಒಳ್ಳೆಯದನ್ನು ಮಾಡುವುದರಿಂದ ಅವುಗಳನ್ನು ಜ್ಯೋತಿಶಾಸ್ತ್ರದಲ್ಲಿ ಬಹಳ ಮುಖ್ಯವೆಂದು ಪರಿಗಣಿಸಲಾಗಿದೆ. ಆದರೆ ಅಸಮರ್ಪಕವಾಗಿ ನಿರ್ವಹಿಸಿದಲ್ಲಿ ಈ ಖಗೋಳ ಶಕ್ತಿ ನಿಮ್ಮ ಮೇಲೆ ಪ್ರತಿಕೂಲ ಪರಿಣಾಮ ಬೀರಬಹುದು. ಆದ್ದರಿಂದ ನೀವು ಹಣಕಾಸು ಸಂಬಂಧಿತ ವಿಷಯಗಳು, ಪ್ರೀತಿ, ಮದುವೆ, ವೃತ್ತಿ ಮತ್ತು ಶಿಕ್ಷಣ ಇತ್ಯಾದಿಗಳಲ್ಲಿ ಜ್ಯೋತಿಷ್ಯದ ಪರಿಹಾರಗಳು ಮತ್ತು ರತ್ನಶಿಲೆಗಳಿಂದ ನಿಮಗೆ ಲಾಭವಾಗಬೇಕೆಂದು ಬಯಸಿದರೆ ನಮ್ಮ ಚಾಣಾಕ್ಷ ಜ್ಯೋತಿಷಿಗಳು ನೀವು ತೆಗೆದುಕೊಳ್ಳಬೇಕಾದ ಪರಿಹಾರದ ಕ್ರಮಗಳು, ಇವುಗಳನ್ನು ಹೇಗೆ ಮಾಡಬೇಕು, ಯಾವ ರತ್ನಶಿಲೆಗಳನ್ನು ಧರಿಸಬೇಕು ಹಾಗೂ ಹೇಗೆ ಅವುಗಳ ಉಪಯೋಗ ಪಡೆಯಬೇಕು ಎನ್ನುವುದನ್ನು ತಿಳಿಸುತ್ತಾರೆ.

SERVICE_NAME_6                                     = ಮದುವೆ / ಪ್ರೀತಿಯ ವಿಶ್ಲೇಷಣೆ  
SERVICE_DESC_6                                     = ಮದುವೆಗಳು ಸ್ವರ್ಗದಲ್ಲಿ ನಡೆಯುತ್ತವೆನ್ನುತ್ತಾರೆ. ಆದರೆ ನೀವು ನಿಮ್ಮ ಜೀವನವನ್ನು ಕಳೆಯಬಯಸುವರು ಅಥವಾ ಈಗಾಗಲೇ ನಿಮ್ಮ ಯಾರ ಜೊತೆಗೆ ನಿಮ್ಮ ಜೀವನವನ್ನು ಕಳೆಯುತ್ತಿದ್ದೀರೋ ಅವರು ನಿಮಗಾಗಿಯೇ ವಿಶೇಷವಾಗಿ ಜನಿಸಿದವರೆಂದು ನಿಮಗೆ ಖಚಿತತೆಯಿದೆಯೇ? ನೀವು ಸರಿಯಾದ ಸಂಗಾತಿಯನ್ನು ಆರಿಸಿಕೊಂಡಲ್ಲಿ ಜೀವನ ಹೂವಿನ ಹಾಸಿಗೆಯಾಗಿರುತ್ತದೆ. ಆದರೆ ನಿಮ್ಮ ಆಯ್ಕೆ ತಪ್ಪಾಗಿದ್ದಲ್ಲಿ ಅದು ಜೀವನದ ಆಕರ್ಷಣೆ ಹಾಗೂ ಚೈತನ್ಯವನ್ನೇ ಉಡುಗಿಸಬಹುದು. <br /><br /> ಜ್ಯೋತಿಷ್ಯವು ಸರಿಯಾದ ನಿರ್ಧಾರ ತೆಗೆದುಕೊಳ್ಳುವಲ್ಲಿ ನಿಮಗೆ ಸಹಾಯ ಮಾಡಬಹುದು. ಇದು ನೀವು ಒಬ್ಬ ವ್ಯಕ್ತಿಯೊಡನೆ ಹೊಂದಿಕೊಳ್ಳುತ್ತೀರೇ, ನೀವು ಆ ವ್ಯಕ್ತಿಯ ಜೊತೆ ಜೀವನಪಯಣ ಕೈಗೊಳ್ಳುತ್ತೀರೇ ಹಾಗೂ ಸಂಗಾತಿಗಳಾಗಿ ನಿಮಗೆ ಭವಿಷ್ಯದಲ್ಲಿ ಏನು ಕಾದಿದೆ ಎಂದು ಹೇಳಬಹುದು. ನೀವು ಈಗಾಗಲೇ ಮದುವೆಯಾಗಿದ್ದು ವೈವಾಹಿಕ ಜೀವನದಲ್ಲಿ ಸಮಸ್ಯೆಗಳನ್ನು ಎದುರಿಸುತ್ತಿದ್ದಲ್ಲಿ ಅದರಿಂದ ಹೊರಬರಲು ನೀವು ಏನು ಮಾಡಬೇಕು ಎಂದು ತಿಳಿಸುತ್ತದೆ.

SERVICE_NAME_5                                     = ಲಾಲ್ ಕಿತಾಬ್ ಪರಿಹಾರಗಳು 
SERVICE_DESC_5                                     = ಲಾಲ್ ಕಿತಾಬ್ ಆಧ್ಯಾತ್ಮ ಜ್ಞಾನದಿಂದ ಸಮೃದ್ಧವಾದ ಒಂದು ಜ್ಯೋತಿಷ್ಯದ ಭಂಢಾರವಾಗಿದೆ. ಇದು ಜ್ಯೋತಿಷ್ಯ, ಹಸ್ತ ಸಾಮುದ್ರಿಕೆ ಮತ್ತು ವಾಸ್ತುಗಳ ಆಳವಾದ ಒಳನೋಟವನ್ನು ಹೊಂದಿದೆ. ಲಾಲ್ ಕಿತಾಬ್ ಪಂಡಿತ್ ರೂಪಚಂದ್ ಜೋಷಿಯವರಿಂದ ಹಳೆಯ ಉರ್ದು ಉಪಭಾಷೆಯಲ್ಲಿ ಬರೆಯಲ್ಪಟ್ಟಿದೆ ಎಂದು ಹೇಳಲಾಗುತ್ತದೆ ಹಾಗೂ ಇದು ಕಾವ್ಯಾತ್ಮಕ ಶೈಲಿಯಲ್ಲಿನ ಅನೇಕ ಅಧ್ಯಾಯಗಳನ್ನು ಒಳಗೊಂಡಿದೆ. ಲಾಲ್ ಕಿತಾಬ್ ದ್ವಂದ್ವಾರ್ಥತೆಯ ಪರದೆಯ ಹಿಂದೆ ಜ್ಯೋತಿಷ್ಯದ ಭಾರಿ ಗಾಂಭೀರ್ಯತೆಯನ್ನು ಒಳಗೊಂಡಿದೆ. ಇದನ್ನು ಅರ್ಥಮಾಡಿಕೊಳ್ಳಲು ಚುರುಕಿನ ಮತ್ತು ಸೂಕ್ಷ್ಮಗ್ರಾಹಿ ಜ್ಯೋತಿಷ್ಯದ ತಿಳುವಳಿಕೆಯ ಅಗತ್ಯವಿದೆ. <br /> <br /> ಲಾಲ್ ಕಿತಾಬ್ ಅನ್ನು ಅರ್ಥ ಮಾಡಿಕೊಂಡವರೆಲ್ಲರೂ ಅದು ಎಲ್ಲ ಲೌಕಿಕ ಸಮಸ್ಯೆಗಳು ಮತ್ತು ನೋವುಗಳಿಗೆ ಪರಿಹಾರವೆಂದು ಘೋಷಿಸುತ್ತಾರೆ. ಲಾಲ್ ಕಿತಾಬ್ ನಲ್ಲಿನ ಪರಿಹಾರಗಳು ಶಕ್ತಿಶಾಲಿಯಾಗಿಯೂ ಮತ್ತು ಚುರುಕಾಗಿಯೂ ಇದ್ದು ಜನರು ವಿವಿಧ ಸಮಸ್ಯೆಗಳ ಧಾಳಿಗೊಳಗಾಗಿ ಅವರಿಗೆ ಸಮಯವೇ ಇಲ್ಲದ ಆಧುನಿಕ ಕಾಲಕ್ಕೆ ಸಂಬಂಧಿಸಿದೆ. ಈ ಪರಿಹಾರಗಳು ನಿಮ್ಮ ದುರ್ಬಲ ಸ್ಥಾನವನ್ನು ಲೆಕ್ಕಹಾಕುತ್ತವೆ ಹಾಗೂ ಇದರಿಂದಾಗಿ  ನಿಮ್ಮ ದೈಹಿಕ, ಮಾನಸಿಕ ಹಾಗೂ ಆರ್ಥಿಕ ಗುಣಗಳನ್ನು ಶೀಘ್ರವೇ ಗುಣಪಡಿಸಲು ಸಾಧ್ಯವಾಗುತ್ತದೆ. ನೀವು ಲಾಲ್ ಕಿತಾಬ್ ಪರಿಹಾರಗಳನ್ನು ಬಳಸಿ ನಿಮ್ಮ ಸಮಸ್ಯೆಗಳನ್ನು ಬೇಗನೆ ಪರಿಹರಿಸಿಕೊಳ್ಳಲು ಬಯಸಿದಲ್ಲಿ ನಮ್ಮ ಒಳನೋಟವುಳ್ಳ ಜ್ಯೋತಿಷಿಗಳನ್ನು ಕೇಳಿ.

SERVICE_NAME_2                                     = ಜನನ ಸಮಯ ಸರಿಪಡಿಸುವಿಕೆ 
SERVICE_DESC_2                                     = ಜನನ ಸಮಯ ನಿಮ್ಮ ಜಾತಕವನ್ನು ತಯಾರಿಸಲು ಅಗತ್ಯವಾಗಿರುತ್ತದೆ. ಒಂದು ನಿಖರವಾದ ಜನ್ಮ ಸಮಯವಿಲ್ಲದೆ ಒಬ್ಬ ಬುದ್ಧಿವಂತ ಜ್ಯೋತಿಷಿಯೂ ಭವಿಷ್ಯದಲ್ಲಿ ನಿಮಗೇನು ಕಾದಿದೆ ಎನ್ನುವುದನ್ನು ಹೇಳಲು ಸಾಧ್ಯವಿಲ್ಲ. ಆದ್ದರಿಂದ ನಿಮಗೆ ನಿಮ್ಮ ಜನ್ಮದ ನಿಖರವಾದ ಸಮಯ ತಿಳಿದಿರದಿದ್ದರೆ ಅಥವಾ ಆ ಬಗ್ಗೆ ಗೊಂದಲವಿದ್ದರೆ ಚಿಂತಿಸುವ ಅಗತ್ಯವಿಲ್ಲ. ಏಕೆಂದರೆ ವೈದಿಕ ಜ್ಯೋತಿಷ್ಯವು ಜನ್ಮದ ಸಮಯವನ್ನು ನಿಖರವಾಗಿ ಪತ್ತೆಹಚ್ಚಲು ಸಹಾಯ ಮಾಡುತ್ತದೆ. <br /> <br> ಸಂತ ಕಾಳಿದಾಸ ಮತ್ತು ಶ್ರೀ ವರಹಾಮಿಹಿರರಂಥ ಭಾರತೀಯ ಋಷಿಗಳು ಅನೇಕ ವಿಧಾನಗಳನ್ನು ಶಿಫಾರಸ್ಸು ಮಾಡಿದ್ದಾರೆ. ಕೆ.ಪಿ. ವ್ಯವಸ್ಥೆಯೂ ನಿಮ್ಮ ನಿಖರವಾದ ಜನ್ಮ ಸಮಯವನ್ನು ಕಂಡುಹಿಡಿಯಲು ಒಂದು ವಿಶಿಷ್ಟವಾದ ವಿಧಾನವನ್ನು ಹೊಂದಿದೆ. ಇದಲ್ಲದೇ ಒಬ್ಬ ಚುರುಕಾದ ಜ್ಯೋತಿಷಿ ಒಬ್ಬರ ಜೀವನದಲ್ಲಿನ ಪ್ರಮುಖವಾದ ಘಟನೆಗಳ ಬಗ್ಗೆ ತಿಳಿದಿಕೊಂಡಿದ್ದಲ್ಲಿ ಅವರು ನಿಮ್ಮ ಜೀವನದಲ್ಲಿನ ಆ ಘಟನೆಗಳ ಆಧಾರದ ಮೇಲೆ ಜಾತಕನ ನಿಖರವಾದ ಜನ್ಮ ಸಮಯವನ್ನು ಕಂಡುಹಿಡಿಯಬಹುದು. <br /> <br>  ಆದ್ದರಿಂದ, ನಿಮ್ಮ ಜನ್ಮ ಸಮಯವನ್ನು ನಿಖರವಾಗಿ ಲೆಕ್ಕ ಹಾಕಲು ನಾವು ನಿಮಗೆ ನಿಮ್ಮ ಜೀವನದ ಕೆಲವು ಪ್ರಮುಖ ಘಟನೆಗಳು ಮತ್ತು ಈ ಘಟನೆಗಳು ನಡೆದ ಸಮಯ; ಉದಾ: ನಿಮ್ಮ ಮದುವೆಯ ದಿನಾಂಕ, ನಿಮ್ಮ ಮಕ್ಕಳ ಜನ್ಮ ದಿನಾಂಕ, ಪ್ರಮುಖ ಅನಾರೋಗ್ಯ ಮತ್ತು ಮೊದಲ ಉದ್ಯೋಗ ಇತ್ಯಾದಿಗಳನ್ನು ತಿಳಿಸುವಂತೆ ಕೇಳುತ್ತೇವೆ. <br /> <br /> ನಾವು ನಿಮ್ಮ ಜನ್ಮದ ಅಂದಾಜು ಸಮಯ ಅಥವಾ ನಿಮ್ಮ ಜನ್ಮ ಸಮಯದ ಅಂದಾಜು ಅವಧಿಯನ್ನು ಸಮಯ ಹೇಳುವಂತೆಯೂ ಹೇಳುತ್ತೇವೆ; ಉದಾ- 2ರಿಂದ 4 ಗಂಟೆಯ ಮಧ್ಯದಲ್ಲಿ ಇತ್ಯಾದಿ. ನಾವು ಜನ್ಮ ಸಮಯವನ್ನು ನಿಖರವಾಗಿ ಲೆಕ್ಕಾಚಾರ ಹಾಕುತ್ತೇವೆ.

SERVICE_NAME_20                                    = Professional Life of @@currentyear$ 
SERVICE_DESC_20                                    = Get ready to herald into the year @@currentyear1$ with insight into your professional life ahead- from career to jobs, business and finances and other dimensions which do have a profound impact on your professional life. Will 'Pink slips' still rule the roost in year @@currentyear2$ or salaries will be taking an upward swing for you? If you have questions like this in your mind, you will get to know in our comprehensive report. It's not about jobs only, it relates to business and entrepreneurship as well. How the market is going to behave in the New Year and how to plan for that, you can know it in advance. You just have to get in touch, and the mystery called 'tomorrow' could become a mere crossword puzzle for you.
 	
SERVICE_NAME_3  								   = ಆಸ್ಟ್ರೋಸೇಜ್ ಬೃಹತ್ ಕುಂಡಲಿಯನ್ನು 
SERVICE_DESC_3                                     = 250 ಕ್ಕೂ ಹೆಚ್ಚು ಪುಟಗಳ ವರ್ಣರಂಜಿತ ಜಾತಕದಲ್ಲಿ ನೀವು ಕಾಣಬಹುದು: ಈ ಜಾತಕದಲ್ಲಿ ನಿಮ್ಮ ವಿವಾಹ, ವೃತ್ತಿ ಜೀವನ, ಆರ್ಥಿಕ ಜೀವನ, ಅರೋಗ್ಯ, ಮಕ್ಕಳು, ಆಸ್ತಿ ಮತ್ತು ಕುಟುಂಬಕ್ಕೆ ಸಮಬಂಧಿಸಿದ ಪ್ರಮುಖವಾದ ಭವಿಷ್ಯವಾಣಿ ಇದೆ.  ಇದಲ್ಲದೆ ಈ ಜಾತಕದಲ್ಲಿ ನಿಮಗಾಗಿ ಶುಭ ಸಮಯ,  ದಶಾ ಫಲಿತಾಂಶ,  ಐದು ವರ್ಷಗಳ ವಾರ್ಷಿಕ ಫಲಿತಾಂಶ, ರಾಜಯೋಗದ ವಿವರವಾದ ಮಾಹಿತಿ ಮತ್ತು ಸಂಖ್ಯಾಶಾಸ್ತ್ರ ರಿಪೋರ್ಟ್.  ಇದರೊಂದಿಗೆ ಜಾತಕದಲ್ಲಿ ಏಳುವರೆ ಶನಿ, ಕಾಳಸರ್ಪ ದೋಷ  ಮತ್ತು ಮಂಗಳ ದೋಷಗಳ ಬಗ್ಗೆ ಮಾಹಿತಿ ಮತ್ತು ಅವುಗಳಿಂದ ತಪ್ಪಿಸಲಾಗುವ ಪರಿಣಾಮಕಾರಿ ಪರಿಹಾರಗಳ ಬಗೆ ತಿಳಿಸಲಾಗಿದೆ.  ಮನೆ ಫಲಿತಾಂಶ ಮತ್ತು ಗ್ರಹ ಫಲಿತಾಂಶ. ಕೆಪಿ, ಕೆಸಿಐಎಲ್, ಸಂಖ್ಯಾಶಾಸ್ತ್ರ ಸಂಕೀರ್ಣ ಇಂಟರ್ಲಿಂಕ್ಸ್, ನಕ್ಷತ್ರ, ನಾಡಿ, ಜೆಮಿನಿ, ಲಾಲ್ ಕಿತಾಬ್ ಟೇವಾ ಮತ್ತು ಸಾಲ ಇತ್ಯಾದಿಗಳ  ಬಗ್ಗೆ  ವಿವರವಾದ ಲೆಕ್ಕಾಚಾರವಿದೆ.

SERVICE_NAME_8 									   = ರಾಜ ಯೋಗ ರಿಪೋರ್ಟ್ 
SERVICE_DESC_8 									   = ನಮ್ಮ  ಈ ಸೇವೆಯ ಮೂಲಕ ನಿಮ್ಮ ಜಾತಕದಲ್ಲಿ  ರಾಜ ಯೋಗ ಕೂಡುತ್ತಿದೆಯ ಎಂಬುದರ ಬಗ್ಗೆ ತಿಳಿಯಿರಿ. ನಿಮ್ಮ ಜನ್ಮ ಜಾತಕದ ವಿವಿಧ ಮನೆಗಳಲ್ಲಿ ನೆಲೆಗೊಂಡಿರುವ ಯಾವ ಗ್ರಹಗಳು ರಾಜ ಯೋಗವನ್ನು ನಿರ್ಮಿಸುತ್ತಿವೆ, ಇವು ಜೀವನದಲ್ಲಿ ನಿಮ್ಮನ್ನು ಪ್ರಗತಿಯ ಶಿಖರದ ವರೆಗೆ  ಕರೆದೊಯ್ಯುತ್ತವೆ. ಈ ಯೋಗಗಳ ಪರಿಣಾಮದಿಂದ ನಿಮಗೆ ಸರ್ಕಾರಿ ಉದ್ಯೋಗ ದೊರೆಯುತ್ತದೋ ಇಲ್ಲವೋ, ಇಷ್ಟಪಡುತ್ತಿರುವ ಪ್ರೀತಿ ಸಿಗುತ್ತದೆಯೋ ಇಲ್ಲವೋ. ವ್ಯಾಪಾರದಲ್ಲಿ ಯಶಸ್ವಿಯಾಗುವಿರೋ ಇಲ್ಲವೋ,  ಜೀವನದ ಯಾವ ವರ್ಷದಲ್ಲಿ ಅದೃಷ್ಟ ಪಡೆಯುತ್ತಿರ? ನಿಮ್ಮ ಮನಸ್ಸಿನಲ್ಲಿ ಬರುತ್ತಿರುವ ಈ ಎಲ್ಲಾ ಕುತೂಹಲಗಳ ಬಗ್ಗೆ  ನಮ್ಮ ಈ ಸೇವೆಯ ಮೂಲಕ ತಿಳಿಯಿರಿ. ನಿಮ್ಮ ಜಾತಕದಲ್ಲಿ ರಜ್ಜು, ಮೂಸಲ, ನಲ, ವಾಪೀ, ಗದಾ ಮತ್ತು ಶಕಟ ಇತ್ಯಾದಿ ಯೋಗಗಳನ್ನು ಹೊಂದಿದ್ದೀರಾ? ಇಂತಹ ಎಲ್ಲಾ ಯೋಗ ಮತ್ತು ಅವುಗಳ ಪರಿಣಾಮದ ಬಗೆಗಿನ ಆಸಕ್ತಿದಾಯಕ ಮಾಹಿತಿಯನ್ನು ಓದಿ. ವಾಪೀ ಯೋಗದಲ್ಲಿ ಜನಿಸಿರುವ ವ್ಯಕ್ತಿ ಹೇಗೆ ಶ್ರೀಮಂತನಾಗಿರುತ್ತಾನೆ ಎಂಬುದನ್ನು ತಿಳಿಯಿರಿ.  ಮೂಸಲ ಯೋಗದಲ್ಲಿ ಜನಿಸಿರುವ ವ್ಯಕ್ತಿಯು ಜೀವನದಲ್ಲಿ ಆರ್ಥಿಕ ಸಂಪನ್ನತೆ ಮತ್ತು ಗೌರವವನ್ನು ಹೇಗೆ ಪಡೆಯುತ್ತಾನೆ ಎಂಬುದನ್ನು ತಿಳಿಯಿರಿ. ನಲ ಯೋಗಕ್ಕೆ  ಸಂಬಂಧಿಸಿದ ಜನರು ಹೇಗೆ ಜಾಣ ಮತ್ತು ಬುದ್ಧಿವಂತರಾಗಿರುತ್ತಾರೆ?  ರಾಜ ಯೋಗಕ್ಕೆ ಸಂಬಂಧಿಸಿದ ಇಂತಹ ಅನೇಕ ಸಂಗತಿಗಳು ಮತ್ತು ಅವುಗಳ ವಿವರಣೆಯನ್ನು ತಿಳಿಯಿರಿ. 

SERVICE_NAME_9  								   = ವಾರ್ಷಿಕ ಜಾತಕ 2020
SERVICE_DESC_9 									   =  ವೈದಿಕ ಜ್ಯೋತಿಷ್ಯದ ಪ್ರಾಚೀನ  ತತ್ವಗಳ ಮೇಲೆ ಆಧರಿಸಿದ “ ವಾರ್ಷಿಕ ಜಾತಕ 2020” ಅನ್ನು  ವಿಶೇಷವಾಗಿ  ನಿಮಗಾಗಿ  ತಯಾರಿಸಲಾಗಿದೆ. ಇದರಿಂದ  ನೀವು 2020 ರಲ್ಲಿ  ಯಶಸ್ಸು  ಮತ್ತು  ಸಮೃದ್ಧಿಯ  ಹಾದಿಯಲ್ಲಿ  ಮುಂದುವರಿಯಲು  ಸಾಧ್ಯವಾಗುತ್ತದೆ.  ತೆರೆದ ಕಣ್ಣುಗಳಿಂದ ನೀವು ಯಾವಾಗಲು ನೋಡಿದ ಕನಸುಗಳಿಗೆ ಇದು ಪ್ರಮುಖವಾಗಿದೆ - ಉಲ್ಲಾಸ , ಸಂತೋಷ ಮತ್ತು ತೃಪ್ತಿಯಿಂದ ತುಂಬಿರುವ ಕೀ ಇದು. ಇದರಲ್ಲಿ ನೀವು ಪ್ರೀತಿ, ವಿವಾಹ, ವೃತ್ತಿಜೀವನ,  ಕುಟುಂಬ, ವ್ಯಾಪಾರ, ಅರೋಗ್ಯಗಳಂತಹ ಇನ್ನಷ್ಟು ವಿಷಯಗಳ ಬಗ್ಗೆ ಮುನ್ಸೂಚನೆಯನ್ನು ಪಡೆಯುವಿರಿ. ಇವು ವೆಶೇಷವೆಂದು ಅಂವು ಭಾವಿಸುತ್ತೇವೆ ಆದ್ದರಿಂದ ವಾರ್ಷಿಕ ಜಾತಕ  2020 ರಲ್ಲಿ ಸೂಕ್ಹ್ಮ ವಿಶ್ಲೇಷಣೆ, ನಿಖರವಾದ ಭವಿಷ್ಯವಾಣಿ ಮತ್ತು ಸುಲಭವಾದ ಪರಿಹಾರಗಳನ್ನು ನೀಡುತ್ತಿದ್ದೇವೆ. ಇದನ್ನು ಗಮನಾರ್ಹವಾಗಿ ನಿಮಗಾಗೇ ತಯಾರಿಸಲಾಗಿದೆ. ವರ್ಷ 2020 ರಲ್ಲಿ ಸಂತೋಷ, ಉತ್ತಮ ಭವಿಷ್ಯದಿಂದ ತುಂಬಿರುವ ಮತ್ತು  ನೋವಿನಿಂದ ಸ್ವಾತಂತ್ರ್ಯವನ್ನು ಅರೈಸಿ. “ವಾರ್ಷಿಕ ರಾಶಿ ಭವಿಷ್ಯ 2020” ಆಯ್ಕೆ ಮಾಡಿ. 

