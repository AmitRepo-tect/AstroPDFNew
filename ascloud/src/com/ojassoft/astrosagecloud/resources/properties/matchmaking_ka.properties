	MATCH_HOROSCOPE_SHARED_CHART = ನೀವು ಇಲ್ಲಿ ಒಂದು ಹಂಚಿಕೊಂಡಿರುವ (ಸಾರ್ವಜನಿಕ) ಜಾತಕದ ಜೊತೆ ನಿಮ್ಮ ಜಾತಕವನ್ನು ಹೊಂದಿಸಬಹುದು. ನಿಮ್ಮ ಸಂಗಾತಿ ಜಾತಕದ ಹೆಸರನ್ನು ಕೆಳಗಿನ ಪಠ್ಯ ಬಾಕ್ಸ್ ನಲ್ಲಿ ನಮೂದಿಸಿ. ಈ ಲಕ್ಷಣವನ್ನು ಬಳಸಲು ಸಂಗಾತಿಯ ಜಾತಕದ ಹೆಸರು ಸಾರ್ವಜನಿಕವಾಗಿರಬೇಕು ಎಂಬುದನ್ನು ದಯವಿಟ್ಟು ಗಮನಿಸಿ. .<br /><br /> ಉದಾಹರಣೆಗೆ ನೀವು ಒಬ್ಬ ಹುಡುಗನಾಗಿದ್ದು ನೀವು ನಿಮ್ಮ ಜಾತಕವನ್ನು ಕತ್ರಿನಾ ಕೈಫ್ ಳ ಹಂಚಿಕೊಂಡ ಜಾತಕದ ಜೊತೆ ಹೊಂದಿಸಬಯಸಿದಲ್ಲಿ, ಕೆಳಗೆ ಹೀಗೆ ನಮೂದಿಸಿ <b>ಕತ್ರಿನಾ</b>. <br /> <br />
	
