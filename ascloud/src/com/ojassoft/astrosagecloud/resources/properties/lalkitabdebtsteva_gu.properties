	 RINS							= બાપદાદાઓનું ઋણ#પોતાનું ઋણ#માતાનું ઋણ#સ્ત્રીનું ઋણ#ભાઈ અથવા સંબંધીઓનું ઋણ#પુત્રીનું ઋણ#જુલમીનું ઋણ#પેદા ન થયેલું ઋણ#કુદરતનું ઋણ
     LK_FOREFATHER_DEBTS_SYMPTOM    = લાલ કિતાબ અનુસાર જ્યારે શુક્ર, બુધ, રાહુ કુંડળીના બીજા, પાંચમા, નવમા કે બારમા ભાવમાં હોય ત્યારે વ્યક્તિ પૂર્વજોના ઋણથી પીડિત હોઈ શકે.
	 LK_FOREFATHER_DEBTS_REASON     = વડીલોએ કુટુંબના ગોર બદલ્યા હશે.
	 LK_FOREFATHER_DEBTS_INDICATION = નજીકના મંદિર કે પીપળાના વૃક્ષનો નાશ.
	 LK_FOREFATHER_DEBTS_REMEDY     = 1. લોહીનો સંબંધ ધરાવતી દરેક વ્યક્તિ પાસેથી એક રૂપિયાનો સિક્કો ઉઘરાવી, એકઠી થયેલી રકમ એક જ દિવસમાં મંદિરમાં દાન કરી દેવી.<br/>2. જો તમારા ઘરમાં પીપળાનું વૃક્ષ હોય તો તેને પાણી પીવડાવી, તેની પૂજા કરો.
	 FATHER_DEBTS_FALSE             = તમારી કુંડળી પૂર્વજોના ઋણથી મુક્ત છે.
	 FATHER_DEBTS_TRUE              = તમારી કુંડળીમાં પૂર્વજોના ઋણની અસર હોઈ શકે. જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 LK_SELF_DEBTS_SYMPTOM          = લાલ કિતાબ અનુસાર, જ્યારે કુંડળીના પાંચમા ભાવમાં શુક્ર, શનિ, રાહુ, કેતુ આવેલા હોય ત્યારે, વ્યક્તિ સ્વ-ઋણથી પીડિત હોઈ શકે.
	 LK_SELF_DEBTS_REASON           = તમારા પૂર્વજો અને વડીલોએ કૌટુંબિક રીવાજો પાળ્યા ન હતા, તેમજ ઈશ્વર પ્રત્યે શ્રદ્ધા દર્શાવી ન હતી.
	 LK_SELF_DEBTS_INDICATION       = ઘરની નીચે ચૂલો હોઈ શકે, અથવા સીધો સૂર્યપ્રકાશ આવી શકે તે માટે છાપરામાં એક કરતા વધારે છિદ્રો હોઈ શકે.
	 LK_SELF_DEBTS_REMEDY           = 1. કુટુંબના દરેક સભ્ય (લોહીનો સંબંધ ધરાવતા હોય તે) પાસેથી સરખા હિસ્સામાં નાણાં ઉઘરાવી યજ્ઞ કરવો.
	 SELF_DEBTS_FALSE               = તમારી કુંડળી સ્વ-ઋણથી મુક્ત છે.
	 SELF_DEBTS_TRUE                = તમારી કુંડળીમાં સ્વ-ઋણની અસર જોવા મળે છે. જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 LK_MOTHER_DEBTS_SYMPTOM		=  લાલ કિતાબ અનુસાર જ્યારે કેતુ કુંડળીના ચોથા ભાવમાં હોય ત્યારે વ્યક્તિ માતાના ઋણથી પીડિત હોઈ શકે.
	 LK_MOTHER_DEBTS_REASON			=  તમારા પૂર્વજોએ માતાની ઉપેક્ષા કરી હોય, તેને સંતાપ આપ્યો હોય કે તેને તેના બાળકથી દૂર રાખી હોય, અથવા તેના દુઃખને અવગણ્યું હોય ત્યારે આમ થઈ શકે છે.
	 LK_MOTHER_DEBTS_INDICATION		=  નજીકના કુવા કે નદીની પૂજા કરવાને બદલે તેમાં ગંદકી નાંખવામાં આવતી હોય.
	 LK_MOTHER_DEBTS_REMEDY			= 1. લોહીનો સંબંધ ધરાવતી દરેક વ્યક્તિ પાસેથી સરખા પ્રમાણમાં ચાંદી લઈ એક જ દિવસમાં નદીમાં વહાવી દેવું.
	 MOTHER_DEBTS_FALSE				=  તમારી કુંડળીમાં માતાનું ઋણ નથી.
	 MOTHER_DEBTS_TRUE				=  તમારી કુંડળીમાં સ્વ-ઋણની અસર હોઈ શકે. જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 LK_WOMAN_DEBTS_SYMPTOM			=  લાલ કિતાબ અનુસાર જ્યારે સૂર્ય, ચંદ્ર, રાહુ કુંડળીના બીજા કે સાતમાં ભાવમાં હોય ત્યારે વ્યક્તિને સ્ત્રીનું ઋણ હોઈ શકે.
	 LK_WOMAN_DEBTS_REASON			=  પૂર્વજો કે વડીલોએ કોઈ લાલચને કારણે ગર્ભવતી સ્ત્રીનું ખૂન કર્યું હોય ત્યારે આમ થઈ શકે છે.
	 LK_WOMAN_DEBTS_INDICATION		=  ઘરમાં દાંત વાળા પશુઓ, ખાસ કરીને ગાય હશે, અથવા તો કુળ-દ્વેષમાં માનતા હશે.
	 LK_WOMAN_DEBTS_REMEDY			= 1. લોહીનો સંબંધ ધરાવતા સંબંધીઓ પાસેથી સરખા નાણાં ઉધરાવી, 100 ગાયોને સ્વાદિષ્ટ ભોજન કરવો. આ નાણાં એક જ દિવસમાં વાપરી નાંખો.
	 WOMAN_DEBTS_FALSE				=  તમારી કુંડળીમાં સ્ત્રીનું ઋણ નથી.
	 WOMAN_DEBTS_TRUE				=  તમારી કુંડળીમાં સ્ત્રીનું ઋણ હોઈ શકે.  જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 LK_RELATIVES_DEBTS_SYMPTOM		=  લાલ કિતાબ અનુસાર જ્યારે બુધ, કેતુ કુંડળીના પહેલા કે આઠમા ભાવમાં હોય ત્યારે વ્યક્તિ સંબંધીઓના ઋણથી પીડિત હોઈ શકે.
	 LK_RELATIVES_DEBTS_REASON		= તેના કારણમાં તમારા કોઈ પૂર્વજે ઊભો પાક કે કોઈનું ઘર સળગાવ્યું હોવાની, કોઈને ઝેર આપ્યાની, કોઈની ગર્ભવતી ભેંસને મારી નાંખ્યાની શક્યતા હોઈ શકે.
	 LK_RELATIVES_DEBTS_INDICATION	= સંબંધીઓને મળવાનો અણગમો, બાળકોના જન્મદિવસ, તહેવારો કે અન્ય ખુશીના પ્રસંગોએ કુટુંબથી દૂર રહેવું.
	 LK_RELATIVES_DEBTS_REMEDY		= 1. લોહીનો સંબંધ ધરાવતી દરેક વ્યક્તિ પાસેથી સરખા પ્રમાણમાં પૈસા ઉઘરાવી, કોઈ બીજાની મદદ માટે હકીમ કે ડોક્ટરને આપો.<BR/>2. લોહીનો સંબંધ ધરાવતી દરેક વ્યક્તિ પાસેથી સરખા પ્રમાણમાં પૈસા ઉઘરાવી, તેનાથી દવાઓ ખરીદીને કોઈ સખાવતી સંસ્થાને આપો.
	 RELATIVES_DEBTS_FALSE			= તમારી કુંડળી સંબંધીઓના ઋણથી મુક્ત છે.
	 RELATIVES_DEBTS_TRUE			= તમારી કુંડળીમાં સંબંધીઓનું ઋણ હોઈ શકે. જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 LK_DAUGHTER_DEBTS_SYMPTOM		=  લાલ કિતાબ અનુસાર જ્યારે ચંદ્ર કુંડળીના ત્રીજા કે છઠ્ઠા ભાવમાં હોય ત્યારે વ્યક્તિ પુત્રીના ઋણથી પીડિત હોઈ શકે.
	 LK_DAUGHTER_DEBTS_REASON		= તેના કારણમાં તમારા કોઈ પૂર્વજ કે વડીલે કોઈ છોકરી કે કોઈની બહેનનું ખૂન કર્યાની અથવા તેને ત્રાસ આપ્યાની શક્યતા હોઈ શકે.
	 LK_DAUGHTER_DEBTS_INDICATION	= ખોવાયેલા બાળકો વેચવા કે તેનો ફાયદો ઉઠાવવો.
	 LK_DAUGHTER_DEBTS_REMEDY		= 1. લોહીનો સંબંધ ધરાવતી દરેક વ્યક્તિએ થોડી પીળી કોડી ખરીદી તેની રાખ ત્યાં સુધી સળગાવવી અને તે રાખને તે જ દિવસે નદીમાં વહાવી દેવી.
	 DAUGHTER_DEBTS_FALSE			= તમારી કુંડળી પુત્રીના ઋણથી મુક્ત છે.
	 DAUGHTER_DEBTS_TRUE			= તમારી કુંડળીમાં પુત્રીનું ઋણ હોઈ શકે. જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 LK_OPPRESSOR_DEBTS_SYMPTOM		=  લાલ કિતાબ અનુસાર જ્યારે સૂર્ય, ચંદ્ર, મંગળ કુંડળીના દસમા અને અગિયારમા ભાવમાં હોય ત્યારે વ્યક્તિ જુલમગારના ઋણથી પીડિત હોઈ શકે.
	 LK_OPPRESSOR_DEBTS_REASON		= તેના કારણમાં તમારા કોઈ પૂર્વજ કે વડીલે છેતરપીંડીથી કોઈનું ઘર લઈ લીધાની અને તેને નાણાં ન ચૂકવ્યાની શક્યતા હોઈ શકે.
	 LK_OPPRESSOR_DEBTS_INDICATION	= ઘરનું મુખ્યદ્વાર દક્ષિણ દિશામાં હશે, અથવા પુત્ર ન હોય તેવી વ્યક્તિ પાસેથી ઘરની જમીન લીધી હશે, અથવા રસ્તા કે કુવા પર ઘર બાંધ્યું હશે.
	 LK_OPPRESSOR_DEBTS_REMEDY		= 1. વિવિધ 100 જગ્યાની માછલીઓને ચારો નાંખો અથવા 100 શ્રમિકોને જમાડો. 
	 OPPRESSOR_DEBTS_FALSE			= તમારી કુંડળી જુલમગારના ઋણથી મુક્ત છે.
	 OPPRESSOR_DEBTS_TRUE			= તમારી કુંડળીમાં જુલમગારનું ઋણ હોઈ શકે. જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 LK_UNBORN_DEBTS_SYMPTOM		=  લાલ કિતાબ અનુસાર જ્યારે સૂર્ય, શુક્ર, મંગળ કુંડળીના બારમા ભાવમાં હોય ત્યારે વ્યક્તિ અજાતના ઋણથી પીડિત હોઈ શકે.
	 LK_UNBORN_DEBTS_REASON			= તેના કારણમાં તમારા કોઈ પૂર્વજ કે વડીલે લગ્ન દ્વારા બનેલા સંબંધી કે અન્ય કોઈ સંબંધીને દગો આપ્યો હોય જેને કારણે તેના કુટુંબનો નાશ થઈ ગયો હોય તેમ બની શકે.
	 LK_UNBORN_DEBTS_INDICATION		= દરવાજા બહાર વહેતી ગટર, અથવા તૂટેલું અગ્નિદાહનું સ્થાન અથવા ઘરની દક્ષિણ દીવાલ સાથે જોડાયેલી ભઠ્ઠી. 
	 LK_UNBORN_DEBTS_REMEDY			= 1. લોહીનો સંબંધ ધરાવતી દરેક વ્યક્તિ પાસેથી એક નાળીયેર લઈ તે જ દિવસે તેને નદી અથવા વહેતા પાણીમાં વહાવી દો.
	 UNBORN_DEBTS_FALSE				= તમારી કુંડળી અજાતના ઋણથી મુક્ત છે.
	 UNBORN_DEBTS_TRUE				= તમારી કુંડળીમાં અજાતનું ઋણ હોઈ શકે. જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 LK_NATURE_DEBTS_SYMPTOM		=  લાલ કિતાબ અનુસાર જ્યારે ચંદ્ર, મંગળ કુંડળીના છઠ્ઠા ભાવમાં હોય ત્યારે વ્યક્તિ પ્રકૃતિના ઋણથી પીડિત હોઈ શકે.
	 LK_NATURE_DEBTS_REASON			= તમારા કોઈ પૂર્વજ કે વડીલે કુતરા જેવા ગરીબ પશુની હત્યા કરી હોય તેમ બની શકે.
	 LK_NATURE_DEBTS_INDICATION		= ગોળી મારીને કોઈ કૂતરાની હત્યા, કોઈના પુત્રની હત્યા, અથવા ભાણેજ બરબાદ થઈ જાય તેટલી હદે તેને દગો આપવો.
	 LK_NATURE_DEBTS_REMEDY			= 1. લોહીનો સંબંધ ધરાવતી દરેક વ્યક્તિ પાસેથી પૈસા ભેગા કરી તે જ દિવસે 100 કુતરાને દૂધની મીઠાઈ કે ખીર ખવડાવો. <br/> 2. નજીકમાં રહેતી યુવાનવયે વિધવા બનેલી સ્ત્રીની સેવા કરી તેના આશીર્વાદ મેળવો.
	 NATURE_DEBTS_FALSE				= તમારી કુંડળી પ્રકૃતિના ઋણથી મુક્ત છે.
	 NATURE_DEBTS_TRUE				= તમારી કુંડળીમાં પ્રકૃતિનું ઋણ હોઈ શકે. જો ઉપર દર્શાવેલા સંકેતો તમને લાગુ પડતા હોય અને તમારી સાથે લોહીનો સંબંધ ધરાવતી વ્યક્તિઓની કુંડળીમાં પણ આવું જ સંયોજન હોય તો, તમારે ઉપર જણાવેલા ઉપાયો કરવા જોઈએ.
	 ANCESTRAL_DEBTS                = વારસાગત ઋણ
	 RinIntroduction                = લાલ કિતાબ અનુસાર ઋણને જન્મકુંડળીની પ્રધાન નબળાઈઓમાંનું એક માની શકાય. પૂર્વજોનું ઋણ એટલે વ્યક્તિને પૂર્વજો અને વડીલોએ કરેલા પાપની અસર ભોગવવી પડશે. અન્ય શબ્દોમાં, જે-તે વ્યક્તિએ કરેલી ભૂલનું ફળ તેના સંબંધીઓએ ભોગવવું પડશે. તમારા જન્માક્ષરમાં દેખાતું ઋણ અન્ય સંબંધીઓના જન્માક્ષરમાં પણ દેખાશે. સામાન્ય રીતે ઋણને કારણે સમગ્ર કુળને સહન કરવું પડે છે અને આથી સમગ્ર કુળની મદદથી ઉપાયો કરવા જોઈએ. રાજયોગ ધરાવતી વ્યક્તિને પણ ઋણ ઊભું કરતા ગ્રહોને કારણે ખરાબ પરિણામોનો જ સામનો કરવો પડે છે.
	 LK_REASON                      = પ્રયોજન
	 LK_INDICATION                  = સંકેત
	 LK_REMEDY                      = ઉપાય
