
	PERSON												= व्यक्ति   
	MANGLIK											= मांगलिक  
	PERSON_IS_MANGLIK									= व्यक्ति  मांगलिक
	PERSON_IS_NOT_MANGLIK								= व्यक्ति  मांगलिक नहीं
	MANGLIK_DETAILS_PARAGRAPH1							= सामान्यत: मंगल दोष जन्म-कुण्डली में लग्न और चन्द्र से देखा जाता है।
	MANGLIK_DETAILS_FIRST								= आपकी कुण्डली में मंगल लग्न से 
	MANGLIK_DETAILS_SECOND								=  भाव में व चंद्र से 
	MANGLIK_DETAILS_THIRD								=  भाव में है।
	MANGLIK_DETAILS_HENCE_NOTE							= अत: मंगल दोष 
	PRESENT_NEITHER_IN_LAGNA_CHART_NOR_IN_MOON_CHART	= अत: मंगल दोष  न लग्न चार्ट में और न ही चंद्र चार्ट में उपस्थित है।
	MANGLIK_DETAILS_HENCE_NOTE1						= अत: मंगल दोष  लग्न कुण्डली और चंद्र कुण्डली में उपस्थित है।
	MANGLIK_DETAILS_HENCE_NOTE2						= अत: मंगल दोष  लग्न कुण्डली में उपस्थित है और चंद्र कुण्डली में उपस्थित नहीं है।
	MANGLIK_DETAILS_HENCE_NOTE3						= अत: मंगल दोष  लग्न कुण्डली में उपस्थित नहीं है परन्तु चंद्र कुण्डली में उपस्थित है।
	MANGLIK_DETAILS_PARAGRAPH4							= ऐसा माना जाता है कि मंगल दोष वैवाहिक जीवन में समस्याएँ खड़ी करता है। 
	MANGLIK_DETAILS_PARAGRAPH5							= ऐसा माना जाता है कि अगर एक मांगलिक व्यक्ति दूसरे मांगलिक व्यक्ति से विवाह करता है तो मंगल दोष रद्द हो जाता है।
	MANGLIK_DETAILS_SUBHEADING1						= ग्रह शांति (अगर मंगल दोष उपस्थित हो तो)
	MANGLIK_DETAILS_SUBHEADING2						= उपाय (विवाह से पहले किए जाने चाहिए)
	MANGLIK_DETAILS_SUBHEADING3						= उपाय (विवाह पश्चात् भी किए जा सकते हैं।)
	MANGLIK_DETAILS_PARAGRAPH6							= कुंभ विवाह, विष्णु  विवाह और अश्वत्थ विवाह मंगल दोष के सबसे ज़्यादा मान्य उपाय हैं।  अश्वत्थ विवाह का मतलब है पीपल या बरगद के वृक्ष से विवाह कराकर, विवाह के पश्चात् उस वृक्ष को कटवा देना।
	REMEDIES1											= केसरिया गणपति अपने पूजा गृह में रखें एवं रोज़ उनकी पूजा करें। 
	REMEDIES2											= हनुमान जी की पूजा करें और हनुमान चालीसा का पाठ करें।
	REMEDIES3											= महामृत्युंजय का पाठ करें।
	MANGLIK_DETAILS_SUBHEADING4						= उपाय (ये लालकिताब आधारित उपाय हैं जोकि विवाह पश्चात् किए जा सकते हैं)
	LK_REMEDIES1										= चिड़ियों को कुछ मीठा खिलाएँ। 
	LK_REMEDIES2										= घर पर हाथी-दांत रखें। 
	LK_REMEDIES3										= बरगद के पेड़ की पूजा मीठे दूध से करें।
	MANGLIK_DETAILS_NOTE								= हमारा सुझाव है कि इन उपायों को करने से पूर्व किसी योग्य ज्योतिषी की सलाह ले लें।
