 NAMANK_TEXT = @@userName$,ब्रह्मांडीय बल नाम संख्या पर विचार करते हुए किसी व्यक्ति की जीवन संरचना निर्धारित करते हैं। नामांक या नाम संख्या आपके पूर्ण नाम में सभी अक्षरों से ली गई है। ये सभी अक्षरों को एक साथ मिला कर बनती है, जिसे एक्सप्रेशन संख्या या नामांक कहा जाता है। यह वह संख्या है जो इस जीवनकाल में आपकी प्रतिभा और दृष्टिकोण का वर्णन करती है, यदि आप उन्हें विकसित करने और उनका उपयोग करने का चयन करते हैं। आपका नाम आपका सच्चा कंपन है, आपकी आत्मा का माधुर्य, जैसा कि समय में एक दरवाज़े से गुजरा और इस दुनिया में प्रवेश किया। \n\nआपके नाम @@userName$ का विश्लेषण बताता है कि आपका नामांक @@namamkNumber$ है। आइए हम आपको नामांक @@namamkNumber$ की कुछ बुनियादी विशेषताओं के बारे में बताते हैं।.
 MULANK_TEXT = @@userName$, अंक शास्त्र में आपकी सबसे महत्वपूर्ण संख्या उस महीने की तारीख है जिस दिन आपने जन्म लिया था। यह संख्या आपके  व्यक्तित्व के महत्वपूर्ण तत्वों जैसे आपका चरित्र और व्यक्तित्व की पहचान कर सकती है। चाहे आप दबंग हों या शर्मीले, नेता या अनुयायी, यह संख्या आपके संपूर्ण व्यक्तित्व के मूल तत्वों को निर्धारित करती है। इसका कारण यह है कि प्रत्येक संख्या की अपनी प्रकृति और व्यक्तिगत कंपन है। सावधानीपूर्वक विश्लेषण के बाद, हमने आपकी अंक ज्योतिष संख्या को निम्नानुसार ज्ञात किया है:आपका मूलांक है @@radicalNumber$.
 	DESTINY_TEXT1 = आप अति महत्वाकांक्षी हैं और कुशल नेतृत्व क्षमता रखते हैं, जिसके कारण आपको लोगों पर साथ मिलता है और आप अपने लक्ष्यों की पूर्ति करते हैं। आप किसी सीमा में बँध कर नहीं रह सकते। आपके बहुत सारे दोस्त होंगे जो हर काम में आपकी मदद करेंगे। आर्थिक रूप से आप समृद्ध होंगे, लेकिन अधिक भोग विलास और राजसी ठाठ बाट आपको बहुत पसंद हैं। आपको राजनीति के क्षेत्र में अच्छी सफलता मिलेगी और सरकारी क्षेत्र से लाभ मिलने की संभावना है। आप लोगों से सम्मान प्राप्त करना चाहते हैं और यह आपको मिलेगा भी। आपको अत्यधिक खर्च करने से बचना चाहिए और साथ ही साथ जुए या सट्टेबाजी से दूर रहना चाहिए। अपनी आज़ादी का उपयोग संभलकर करना बेहतर होगा। ज्यादा जोखिम न उठाएं और नैतिकता का पालन करें। 
    DESTINY_TEXT2 = आप अत्यधिक सौम्य एवं सुशील हैं तथा साझेदारी में कार्य करना आपको पसंद है। आप महिलाओं का सम्मान करते हैं और आप कल्पनाशील होने के साथ-साथ रोमांटिक और कलात्मक भी हैं। आपको अक्सर दृढ़ मानसिक क्षमता की कमी का एहसास होता है और इसलिए कई बार काम शुरू करने के बाद उसको बीच में ही छोड़ देते हैं। शारीरिक रूप से आप थोड़े कमजोर हो सकते हैं। दूसरे लोग आपका आसानी से फायदा उठाते हैं। आपको स्वयं को संभालने की आदत सीखनी चाहिए और अपना आत्मविश्वास बनाए रखना चाहिए। जो कार्य शुरू करें, उसे पूरा भी करें। हर मुश्किल का सामना ठंडे दिमाग से करें और आसपास के चापलूस लोगों से दूर रहें।
    DESTINY_TEXT3 = आप अन्य लोगों के लिए एक प्रेरणा स्रोत हैं और संवाद आप का मुख्य गुण है। आपके अंदर चौमुखी प्रतिमा है और शायद इसीलिए आप किसी का सहायक बनना पसंद नहीं करते। हालांकि आप अनुशासित हैं और आपका प्रेम विशुद्ध होता है। आप न्याय का पक्ष लेते हैं और काफी बुद्धिमान होते हैं। साथ ही साथ आप की दूर दृष्टि होती है तथा हास्य की ग़जब क्षमता भी आपका एक गुण  है। आप व्यावहारिक दृष्टिकोण रखते हैं। आपको अत्यधिक खर्च से बचना चाहिए और ईर्ष्यालु स्वभाव से दूर रहने का प्रयास करना चाहिए। धनी अथवा ज्ञानी बनने के लिए जल्दबाजी ना करें। द्विस्वभाव व्यक्तित्व और गुस्से पर नियंत्रण रखना आवश्यक होगा तथा बुरे लोगों की संगति भी आपके लिए बेकार साबित होगी। 
    DESTINY_TEXT4 = आपके जीवन में उतार-चढ़ाव की स्थिति कई आती है और कई घटनाएँ अचानक होती हैं जो आपके लिए अच्छे और बुरे दोनों तरह के परिणाम लाती हैं। आप अपने जीवन में उन्नति के शिखर पर आसानी से पहुंच सकते हैं, लेकिन दूसरी ओर लोगों के षड्यंत्र के कारण कुर्सी पर से नीचे भी आ सकते हैं।  आपका दृष्टिकोण दूसरों से भिन्न होता है और आप किसी भी महफ़िल की शान होते हैं। आप बने बनाए कानून और रीति-रिवाजों का विरोध करते हैं और स्वयं नए नियम बनाने के लिए प्रयासरत रहते हैं। आप अत्यधिक बुद्धिमान होते हैं और आपकी बुद्धि तीक्ष्ण होती है। आपको अत्यधिक संवेदनशील और भावुक होने से बचना चाहिए और निराशावादी सोच से स्वयं को दूर रखना चाहिए। आपको अवसरों को पहचानना सीखना चाहिए तथा साथ ही अपनी आक्रामकता को काबू में रखें। 
    DESTINY_TEXT5 = आप एक अच्छे मित्र साबित होते हैं और मानसिक रूप से काफी मजबूत होते हैं। आपकी रुचि सट्टे बाजार, जुए और ट्रेडिंग में हो सकती है। आप एक अच्छा व्यवसाय चला सकते हैं। आपको बोलने की आदत है और इसी के कारण अपने काम निकाल लेते हैं। हालाँकि कई बार पैसा कमाने के लिए नैतिकता को ताक पर रख देते हैं। आपको अपनी ऊर्जा का सदुपयोग करने पर ध्यान देना चाहिए और स्वयं को दुखी करने वाले माहौल से दूर रखना चाहिए।  आपकी आर्थिक स्थिति अपनी बुद्धि और चतुरता के कारण बढ़िया रहेगी और विशेष रूप से आप व्यवसाय में उन्नति करेंगे। 
