   HEALTH_TEXT1 = आप एक अच्छे स्वस्थ्य के स्वामी हैं. लेकिन आपको कुछ ऐसी बीमारियाँ हैं, जिनके होने की संभावना बनी रह सकती है। इनमें मुख्य रूप से हृदय संबंधी समस्या, पंपिंग, ब्लड प्रेशर, रक्त संबंधी समस्या, वृद्धावस्था में उच्च रक्त चाप तथा आँखों से संबंधित समस्या शामिल हैं. इसलिए इनके प्रति सजग रहे और उत्तम स्वास्थ्य का आनंद लें। 
   HEALTH_TEXT2 = आपको ज्यादा सोच विचार करने या गहराई में जाकर चिंता करने की आदत है और यही आपकी सभी समस्याओं की जड़ है। इसकी वजह से आपको पेट संबंधी समस्या,पाचन क्रिया में समस्या, गैस प्रॉब्लम, आँत संबंधी समस्या, ट्यूमर आदि बीमारियाँ परेशान कर सकती हैं। लिहाज़ा स्वयं को चिंता से दूर रखने का प्रयास करें। आपको सलाह दी जाती है कि शराब या फिर मादक पदार्थों का सेवन न करें और उबला हुआ भोजन ग्रहण करें तथा पर्याप्त मात्रा में जल का सेवन करें।
   HEALTH_TEXT3 = आप पर देव गुरु बृहस्पति की छत्र छाया है, जिसकी वजह से आप आम तौर पर ज्यादा चिंतित नहीं होते। फिर  भी कई बार अपने स्वास्थ्य के प्रति लापरवाह हो सकते हैं और इसके परिणामस्वरुप आपको न्युरैटिस (स्नायु-प्रदाह),  साइटिका (पैर अथवा पीठ में दर्द), चर्म रोग आदि होने की संभावना होगी. इसलिए सजग रहे और अपने स्वास्थ्य का ध्यान रखें। 
   HEALTH_TEXT4 = राहु के प्रभाव के कारण आप अपने दिमाग का अधिक इस्तेमाल करते हैं, लेकिन अति हर चीज़ की बुरी होती है। आपको किसी प्रकार का ट्रॉमा, मानसिक अशांति, रक्त संबंधी समस्या, सिर और पीठ में दर्द, मूत्र संबंधी समस्या आदि परेशान कर सकती हैं। इसलिए उत्तम दिनचर्या अपनाएं और ध्यान तथा योग का सहारा लेकर एक उत्तम जीवन व्यतीत करें।  
   HEALTH_TEXT5 = बुध ग्रह के प्रभाव के कारण आपकी बुद्धि अत्यंत तीक्ष्ण होगी और आप अपनी आयु से कम नज़र आएँगे। लेकिन आपको अपने जीवन काल में न्युरैटिस (स्नायु-प्रदाह),  मुँह में छाले, आँखें एवं हाथ, अनिद्रा,  पैरालाइसिस (लकवा) या पोलियो आदि बीमारियाँ होने की संभावना रहेगी। इसलिए स्वयं को अनुशासित रखें और स्वास्थ्य के प्रति लापरवाही न बरतें।   
   HEALTH_TEXT6 = आपके अंक का स्वामी ग्रह शुक्र हैं जो समस्त सुखों का कारक है इसलिए आपको खाने पीने, सजने सँवरने और सुख सुविधाओं का आनंद उठाने में बहुत मज़ा आता है। इसी वजह से भी अनेक बार आप समस्याओं में घिर जाते हैं। आपको मुख्य रूप से गले में समस्या, नाक एवं जीभ  तथा छाती से संबंधित रोग या हृदय संबंधी रोग होने की संभावना अधिक होती है। इसलिए विशेष रूप से ऐसे रोगों के प्रति जागरूक रहे और कोई भी स्वास्थ्य समस्या हो, उसे बिलकुल भी नज़रअंदाज़ न करें।
   HEALTH_TEXT7 = इस अंक में जन्म लेने के कारण आप अधिकतर किसी न किसी रोग से पीड़ित रह सकते हैं  है की आपकी रोग  प्रतिरोधक क्षमता अन्य लोगों  के मुक़ाबले कुछ कम हो।  इसलिए आप किसी भी बीमारी की चपेट में जल्दी ही आ जाते हैं। अचानक से अचेतन हो जाना, सिर में दर्द होना,  हृदय एवं मन संबंधी रोग,  मानसिक शक्ति की हानि, जीभ एवं फेफड़े संबंधी रोग जैसी समस्याएँ आपको समय समय पर परेशान कर सकती हैं। 
   HEALTH_TEXT8 = आप यूँ तो एक अनुशासित व्यक्ति हैं जो जीवन के प्रत्येक क्षेत्र में स्वयं को समुचित महत्व भी देता है और इसी वजह से आप अक्सर अच्छे स्वास्थ्य का आनंद उठाते हैं, लेकिन आपको कुछ गंभीर रोग होने का खतरा सदैव रहता है जोकि विशेष रूप से भोजन की नियमितता या अनुशासन से  भटकने के कारण संभव हैं। इनमें मुख्य रूप से आपको किडनी, आँत, सिर दर्द एवं रक्त संबंधी रोग शामिल हैं जो आपको परेशान कर सकते हैं।
   HEALTH_TEXT9 = इस अंक में जन्म लेने के कारण आप स्वाभाविक रूप से ऊर्जावान हैं इसलिए आप अक्सर निरोगी रहते हैं, लेकिन इसका दूसरा पक्ष ये है कि  आप शीग्र ही गुस्सा करते है या जल्दबाज़ी में कई काम करते हैं जिसकी वजह से आपका स्वास्थ्य भी प्रभित होता है। आपको मुख्य रूप से रक्त समबन्धी समस्याएं, चोट लगना,  छोटी माता, चिकन पॉक्स, या किसी प्रकार की सर्जरी होने की संभावना रहती है। 
    CAREER_TEXT1=आप एकनिष्ठ होकर मेहनत करेंगे तो अपने करियर में बहुत तरक्की प्राप्त करेंगे। आपके लिए बिजली से संबंधित कार्य करना, किसी प्रकार की सर्जरी, किसी देश में राजदूत बनना, आग से संबंधित कार्य, विज्ञान एवं प्रौद्योगिकी, शोध करना, किसी पार्टी के नेता बनना, सशस्त्र सेनाओं में अफ़सर बनना तथा गहने एवं जेवरात का काम करना उत्तम रहेगा। इनके अतिरिक्त इससे मिलते जुलते क्षेत्रों में भी आप उन्नति करेंगे। इसलिए अपने प्रोफेशन को सोच समझकर चुनें। 
    CAREER_TEXT2=इस मूलांक के अंतर्गत जन्म लेने के कारण आप पर चंद्र देव की विशेष कृपा रहेगी और चंद्र देव सभी प्रकार के तरल  पदार्थों पर अपना प्रभाव रखते हैं इसलिए आपके लिए उनसे संबंधित व्यवसाय चुनना बेहतर रहेगा। विशेष रूप से  तरल एवं जूसी मटीरियल, यात्रा संबंधित कार्य, किसी भी काम में दलाली, होटल व्यवसाय, पत्रकारिता, गाना, नृत्य करना, कविता लेखन, प्लॉट्स वर्क, बर्फ से संबंधित कार्य तथा चाँदी अथवा चावल से संबंधित कारोबार करना आपके लिए काफी बेहतर रहेगा। 
    CAREER_TEXT3=इस अंक में जन्म लेने से आप पर बृहस्पति की विशेष कृपा है और इसलिए उनसे संबंधित कोई भी कार्य भी आप अपने हाथ में लेंगे तो आप सफलता प्राप्त करेंगे। यदि आप अध्यापन कार्य, सेवा कार्य,  न्याय से संबंधित कार्य न्यायाधीश, याचिकाकर्ता, सचिव, पुलिस, दार्शनिक योग्यता से संबंधित काम, बैंक अथवा किसी फ़ाइनेंशियल कंपनी में काम करना या फिर विज्ञापन विभाग में काम करेंगे तो आप को जबरदस्त सफलता मिलने के योग बनेंगे। 
    CAREER_TEXT4=अंक 4 के अंतर्गत जन्म लेने के कारण  राहु की ख़ूबियाँ आपके अंदर कूट-कूट कर भरी हुई हैं, इसलिए आपको किसी भी मुश्किल से मुश्किल काम को चुटकियों में हल करना आता है। आपके लिए रेलवे, जहाज़रानी, खदान में काम करना, अन्य तकनीकी कार्य, आशुलिपिक, दर्ज़ी, इंजीनियर, ज्योतिषी, जादूगर, लेक्चरर आदि से संबंधित नौकरी अथवा व्यवसाय करना जबरदस्त सफलता दायक साबित होगा।  इसलिए आप अपना करियर को लेकर परेशान है इन क्षेत्रों में काम करें ताकि आपकी समस्याओं का अंत हो सके। 
    CAREER_TEXT5=इस अंक की खूबियों के रूप में बुध देव की विशेष प्रभाव को प्राप्त होगी जिसकी वजह से आप अपनी बुद्धिमानी के सभी कार्य सफलतापूर्वक कर सकते हैं। आपको ऐसे कार्य करने चाहिए जहां शरीर की ताकत नहीं बल्कि दिमाग की ताकत काम है।  इसलिए आपके लिए बेहतरीन कार्य क्षेत्रों में  इंजीनियर बनना, सेल्स संबंधित कार्य, लेखाकार, रेलवे, टेलीग्राफ़, पत्रकारिता, तंबाकू, रेडियो डीलर, ब्रोकर, आयोग से संबंधित कार्य आपके लिए बेहतरीन साबित होंगे। 
    CAREER_TEXT6=आपका शुक्र देव की विशेष कृपा है वह  खूबसूरती और ग्लैमर के क्षेत्र को परिभाषित करते हैं।  इसलिए इन क्षेत्रों में विशेष रूप से आप को ऊंचा मुकाम प्राप्त हो सकता है।  इसके अतिरिक्त आपको जिन क्षेत्रों में अपने हाथ आज़माने चाहियें उनमें मुख्य रूप से आभूषण, इंजीनियर, वास्तुकला, खाद्य निरीक्षक, होटल, उत्पादकता, उपन्यास लेखक, संग्रहालय, कलाकार बनना शामिल हैं।  
    CAREER_TEXT7=इस अंक के अंतर्गत जन्म लेने के कारण आपको जीवन में संघर्ष करने के अनेक मौके मिले हैं, जिससे आपको बहुत कुछ सीखने को प्राप्त हुआ है। आपके लिए अनेक ऐसे कार्य हैं जिन्हें आप अच्छा लाभ कमा सकते हैं और पैसा भी।  विशेष रूप से आपके लिए फिल्म, यात्रा, एयर होस्टेस, डेयरी फार्म, ड्राइवर, मछली विक्रेता, केमिस्ट, अस्पताल, सी.आई.डी., बॉडी बिल्डर आदि से संबंधित कार्य आपको सफलता दिलाएंगे।  
    CAREER_TEXT8=इस अंक में जन्म लेने के कारण  शनिदेव का स्थायित्व प्राप्त  इसलिए आपकी जीवन में तरक्की में समय लगेगा मगर पक्के तौर पर होगी।  कुछ विशेष कार्य क्षेत्र ऐसे हैं जिनमें आप अच्छा नाम कमा सकते हैं और यदि आपने इनमें से किसी क्षेत्र को अपने प्रोफेशन के रूप में चुनते हैं तो आपको जीवन में सफलता अधिक और जल्दी मिलेगी साथ ही साथ धन कमाने में भी आप सफल होंगे।  इन कार्यों में विशेष रूप से  खिलाड़ी बनना, इंजीनियर, पुलिस, शहर का मेयर बनने के लिए नाव लड़ना, वजन अथवा भार, कॉन्ट्रैक्टर, जेल, मज़दूरी करना, संगीत आदि से संबंधित कार्य करना शामिल हैं। 
    CAREER_TEXT9=मंगल से प्रभावित होने वाला यह अंक  आपको जीवन में स्नेह प्राप्त हुआ है क्योंकि आप नेतृत्व क्षमता से परिपूर्ण हैं और आपके अंदर विशेष रूप से जीवन ऊर्जा है जो आपको अपने कार्य क्षेत्र में आगे लेकर जाएंगे।  आप को विशेष रूप से जो क्षेत्र चलने चाहिए उसमें सेना का अधिकारी बनना,  नेता बनना, पुलिस, कमांडर, फायर वर्क, डॉक्टर, बैंक, केमिस्ट, मशीनरी वर्क से संबंधित कार्य आपको जीवन में उन्नति देने वाले साबित होंगे। 
    FAST_TEXT1=आपको रविवार के दिन व्रत रखना चाहिए जिसे आप शुक्ल पक्ष के रविवार से प्रारंभ कर सकते हैं। व्रत के दौरान केवल एक समय ही भोजन करें और आदित्य हृदय स्त्रोत्र का पाठ करें। आप सूर्य देव के बीज मंत्र का जाप भी कर सकते हैं। संभव हो तो इस दिन नमक का परहेज करें। इस दिन लाल रंग के वस्त्र धारण करें और तांबे के पात्र में जल भरकर सूर्य देव को अर्घ्य दें। 
    FAST_TEXT2=आपको सोमवार का व्रत रखना चाहिए। कम से कम 7 अथवा 16 अथवा 54 सोमवार का व्रत रख सकते हैं। यदि सोमवार के दिन पूर्णिमा अथवा चित्रा नक्षत्र हो तो यह अत्यंत शुभ होता है इस दिन से भी शुरू कर सकते हैं। सफेद रंग के वस्त्र पहनें  तथा भगवान शंकर को दूध अर्पित करें।  व्रत में एक समय ही भोजन करें तथा चंद्र देव के बीज मंत्र का जाप करें।
    FAST_TEXT3=आपको शुक्ल पक्ष से प्रारंभ करके 16 बृहस्पतिवार यह व्रत करना चाहिए।  इसके अतिरिक्त आप 1 वर्ष से 3 वर्ष तक भी यह व्रत कर सकते हैं। पीले रंग के वस्त्र पहने और मस्तक पर हल्दी अथवा केसर का तिलक लगाएँ।  केले के वृक्ष में जल चढ़ाएं तथा पीपल के वृक्ष को छुए बिना उसमें जल अर्पित करें।  ब्राह्मणों को यथाशक्ति भोजन कराएं तथा बृहस्पति के बीज मंत्र का जाप करें। 
    FAST_TEXT4=आपको शनिवार के दिन व्रत करना चाहिए।  इसे आप शुक्ल पक्ष के शनिवार से प्रारंभ कर सकते हैं। इस दिन काले या नीले रंग के वस्त्र पहनना आपके लिए बेहतर रहेगा। आपको 19 या 51 शनिवार यह व्रत करना चाहिए। इस दिन आप  साबुत काली उड़द,काले तिल तथा सरसों के तेल का दान करें। आप राहु के बीज मंत्र का जाप भी कर सकते हैं।   
    FAST_TEXT5=आपको शुक्ल पक्ष के बुधवार से प्रारंभ करके लगभग 17 या 45 बुधवार व्रत करना चाहिए। व्रत में केवल एक समय ही भोजन करें। बुध के बीज मंत्र का जाप करना अति उत्तम रहेगा। इस दिन आपको हरे रंग के कपड़े पहनने चाहिए और  पन्ना रत्न धारण करना चाहिए। आप साबुत मूंग की दाल का सेवन भी कर सकते हैं। इसके साथ-साथ किन्नरों से आशीर्वाद लें तथा घर में बहन, मौसी, चाची, बुआ आदि को हरे रंग की कोई वास्तु भेंट करें। 
    FAST_TEXT6=आप को शुक्रवार का व्रत करना चाहिए। इसके लिए आप शुक्ल पक्ष से व्रत रखना शुरू कर सकते हैं और 21 या 31 व्रत रखने चाहियें। इस दिन सफेद रंग के वस्त्र धारण करें और छोटी कन्याओं के पैर छूकर आशीर्वाद लें और उन्हें सफेद रंग की कोई मिठाई खिलाएँ। आप शुक्र के बीज मंत्र का जाप भी कर सकते हैं। 
    FAST_TEXT7=आपको शुक्ल पक्ष के मंगलवार से प्रारंभ करके व्रत रखना चाहिए।  आप 19 अथवा 21 मंगलवार तक व्रत रखें।  व्रत में एक समय ही भोजन करें और मीठा भोजन ग्रहण करना बेहतर रहेगा।  लाल वस्त्र धारण करें तथा केतु के बीज मंत्र का जाप करें।  छोटे बालकों को इस दिन गुड़ और चने का प्रसाद बांटें।  इसके अतिरिक्त हनुमान मंदिर में जाकर लाल रंग का झंडा लगाएँ। 
    FAST_TEXT8=आपको शुक्ल पक्ष के शनिवार से प्रारंभ करके लगभग 19 अथवा 51 शनिवार व्रत करना चाहिए।  व्रत में केवल एक समय भोजन करें और उड़द की दाल का सेवन करना सर्वोत्तम रहेगा।  शनि देव की आराधना करें तथा पीपल वृक्ष के नीचे संध्या काल में सरसों के तेल का दीपक जलाएं।  यथासंभव शनि मंत्र का जाप करें। 
    FAST_TEXT9=आपको शुक्ल पक्ष के मंगलवार से प्रारंभ करके व्रत रखना चाहिए।  आप 19 अथवा 21 मंगलवार तक व्रत रखें।  व्रत में एक समय ही भोजन करें और मीठा भोजन ग्रहण करना बेहतर रहेगा।  लाल वस्त्र धारण करें तथा मंगल के बीज मंत्र का जाप करें। छोटे बालकों को इस दिन गुड़ और चने का प्रसाद बांटें। साथ ही हनुमानजी की उपासना करें। 
    YANTRA_TEXT1=आपका मूलांक 1 है जिसका स्वामी ग्रह सूर्य है। इसलिए सूर्य ग्रह से शुभ फल पाने के लिए रविवार के दिन सूर्य यंत्र को सूर्य की होरा एवं इसके नक्षत्र (कृत्तिका,उत्तराफाल्गुनी, उत्तराषाढ़ा)  में धारण करना चाहिए। 
    YANTRA_TEXT2=आपका मूलांक 2 है जिसका स्वामी ग्रह चंद्र है। इसलिए चंद्र ग्रह से शुभ परिणाम पाने के लिए चंद यंत्र को सोमवार को चंद्र की होरा और चंद्र के नक्षत्रों (रोहिणी, हस्त, श्रवण) के समय धारण करें।
    YANTRA_TEXT3=आपका मूलांक 3 है जिसका स्वामी ग्रह बृहस्पति है। इसलिए बृहस्पति ग्रह के लाभ पाने के लिए गुरु यंत्र को गुरुवार के दिन बृहस्पति की होरा एवं इसके नक्षत्र (पुनर्वसु, विशाखा, पूर्वाभाद्रपद) के समय धारण करें।
    YANTRA_TEXT4=आपका मूलांक 4 है जिसका स्वामी ग्रह राहु है। इसलिए राहु ग्रह के शुभ फल पाने के लिए राहु यंत्र को बुधवार के दिन राहु के नक्षत्र (आर्द्रा, स्वाति, शतभिषा) में धारण करें।
    YANTRA_TEXT5=आपका मूलांक 5 है जिसका स्वामी ग्रह बुध है। इसलिए बुध ग्रह के शुभ फल पाने के लिए बुध यंत्र को बुधवार के दिन बुध की होरा और बुध के नक्षत्र (अश्लेषा, ज्येष्ठा, रेवती) के समय धारण करना चाहिए।
    YANTRA_TEXT6=आपका मूलांक 6 है जिसका स्वामी ग्रह शुक्र है। इसलिए  शुक्र ग्रह के लाभ पाने के लिए शुक्र यंत्र को शुक्रवार को शुक्र की होरा एवं शुक्र के नक्षत्र (भरणी, पूर्वाफाल्गुनी, पूर्वाषाढ़ा) के समय धारण करें।
    YANTRA_TEXT7=आपका मूलांक 7 है जिसका स्वामी ग्रह केतु है। इसलिए केतु ग्रह से शुभ फल पाने के लिए केतु यंत्र को मंगलवार के दिन केतु के नक्षत्र (अश्विनी, मघा, मूल) में धारण करें।
    YANTRA_TEXT8=आपका मूलांक 8 है जिसका स्वामी ग्रह शनि है। इसलिए शनि ग्रह से शुभ फल पाने के लिए शनि यंत्र को शनिवार के दिन शनि की होरा एवं शनि के नक्षत्र (पुष्य, अनुराधा, उत्तराभाद्रपद) में धारण करें।
    YANTRA_TEXT9=आपका मूलांक 9 है जिसका स्वामी ग्रह मंगल है। इसलिए मंगल ग्रह से शुभ फल पाने के लिए मंगल यंत्र को मंगलवार के दिन मंगल की होरा एवं मंगल के नक्षत्र (मृगशिरा, चित्रा, धनिष्ठा) के समय धारण करें।
    MASTER_NUMBER_TEXT =अंक शास्त्र के अनुसार केवल दो अंक ऐसे हैं जो सबसे विशेष ऊर्जा अपने अंदर समाहित रखते हैं इन्हें मास्टर अंक कहा जाता है। 11 और 22 मास्टर अंक हैं। इनके अंदर गजब की शक्ति और काबिलियत होती है। 
    MASTER_NUMBER_TEXT11 =आपका मास्टर अंक 11 है  और इसी वजह से आपके अंदर किसी भी घटना का पूर्वाभास करने की ग़जब क्षमता है। आप कल्पनाशील होने के साथ-साथ दूर की सोच रखते हैं और इसके साथ साथ कुछ-कुछ अव्यवहारिक भी हैं।आपके अंदर कुशल नेतृत्व क्षमता है और आप लोगों को प्रोत्साहित कर सकते हैं। अगर आप अपने लक्ष्यों पर केंद्रित नहीं रहेंगे तो आपके जीवन में भय का वातावरण  उत्पन्न हो सकता है। आप अपनी क्षमताओं पर विश्वास करते हुए सामाजिक हितों का ध्यान रखें तो आप पाएंगे कि आप से बेहतर कोई नहीं। यह एक आत्मिक अंक है।  
    MASTER_NUMBER_TEXT22 =आपका मास्टर अंक 22  है। इस अंक की सबसे बड़ी ख़ासियत यह है कि यह सभी अंकों में सबसे अधिक शक्तिशाली माना जाता है। आप अपने सपनों और अभिलाषाओं को सच्चाई में बदलने की काबिलियत रखते हैं। आपके अंदर बड़े और ऊँचे विचार, अच्छी निर्णय क्षमता, नेतृत्व की काबिलियत तथा पूर्वाभास की शक्ति और व्यावहारिकता कूट-कूट कर भरी हुई है। आप अक्सर स्वयं पर अधिक ध्यान देते हैं लेकिन आप यह मान कर चलिए कि आपका जीवन किसी छोटे उद्देश्य के लिए नहीं बल्कि विशाल उद्देश्य के लिए हुआ है। आपको समाज के लिए बहुत कुछ करना है। आपको जीवन के शुरुआती दौर में अनेक चुनौतियों का सामना करना पड़ा है, इससे आप मजबूत बने हैं। आपको इस ओर ध्यान देना चाहिए कि जीवन में ऐसे लक्ष्य निर्धारित करें जो आपकी स्वयं की महत्वाकांक्षाओं से ऊपर हों और समाज के हित में हों। आप युग परिवर्तनकारी बन सकते हैं। 
    KARMIC_NUMBER_TEXT=अंक शास्त्र के अनुसार कुछ ऐसे अंक होते हैं जो हमारे पूर्व जन्म के कर्मों के ऋण को प्रदर्शित करते हैं और इसी कारण इस जन्म में हम उन अंकों के अंतर्गत जन्म लेते हैं तथा उन पुराने कर्मों के ऋणों को उतारना  हमारे जीवन का मुख्य उद्देश्य होता है। 13, 14, 16 और 19 कार्मिक अंक कहलाते हैं। 
    KARMIC_NUMBER_TEXT13=इस अंक के कारण आपको जीवन में सफलता पाने के लिए अत्यधिक परिश्रम करना पड़ता है क्योंकि आपके रास्ते में अनेक बाधाएं आती रहती है। आप कई बार खिन्न भी हो जाते हैं आप समझते हैं कि आपके प्रयास व्यर्थ जा रहे हैं। कई बार ऐसा होता है कि आप समस्याओं के आगे घुटने टेक देते हैं पर यह मान लेते हैं कि  इन चुनौतियों से पार पाना आप के बस की बात नहीं।  कई बार आप आलसी और निराशावादी भी हो जाते हैं।  लेकिन जो दिखता है सदैव वो सत्य नहीं होता। आप के प्रयास व्यर्थ नहीं जाते लेकिन आपको कठिन परिश्रम करते रहना होगा यही आपका कर्म ऋण है।  अगर आप ऐसा कर पाने में सफल होते हैं तो आप जीवन के विभिन्न क्षेत्रों में ऊंचाइयां प्राप्त कर सकते हैं। 
    KARMIC_NUMBER_TEXT14=इस अंक के कारण आपके जीवन में अचानक से बने बदलाव आते हैं जो आपके जीवन जीने की दिशा में  परिवर्तन लेकर आते हैं। आपको विभिन्न प्रकार के व्यसनों जैसे शराब, वासनात्मक क्रियाकलाप आदि के संबंध में रुचि होती है और यही वजह बनती है आपके जीवन में  परेशानियों की। आपको सब से बाहर निकलने के लिए जीवन में एक कमिटमेंट रखनी चाहिए। आपके लिए जीवन उतार-चढ़ाव से भरा रहेगा लेकिन यदि आप डर रहेंगे और अपने जीवन के लिए कोई कठिन लक्ष्य बनाकर रखेंगे इन समस्याओं से बचे रहेंगे और अपने जीवन में आशातीत सफलता प्राप्त करेंगे। 
    KARMIC_NUMBER_TEXT16=इस अंक के कारण आपको जीवन में कई बार अपने अहम को छोड़ना पड़ता है और यही  आपको इस जीवन में सीखना है। यह  एक तरीके से आप की शुद्धि ही है।आपको अपनी ईगो से कई बार समझौता करना पड़ेगा और इससे आपको दुख भी पहुँचेगा लेकिन आपको आपको बिलकुल भी निराश नहीं होना चाहिए क्योंकि आपका यही संघर्ष भविष्य में आपको  कामयाबी देगा।  आपके अंदर दूसरों की परेशानियों को जानने और समझने की काबिलियत है लेकिन इसके बावजूद आप कई बार आप स्वयं को अकेला महसूस करेंगे। यदि आप अपने जीवन में विश्वास, कृतज्ञता और शांति को स्थान देंगे तो आप आध्यात्मिक रूप से भी अच्छी उन्नति कर पाएंगे। 
    KARMIC_NUMBER_TEXT19=इस अंक के अंतर्गत जन्म लेने के कारण आपको इस जीवन में मुख्य रूप से आपको दो बातें  सीखनी होंगी, एक शक्ति का सदुपयोग और दूसरा स्वतंत्रता। आपको कई बार ऐसे मौके मिलेंगे कि आपको अपने लिए खड़ा होना पड़ेगा वह भी अकेले क्योंकि आपके निजी जीवन में परेशानी आती  रहेंगी। आप अक्सर लोगों को सुनना पसंद नहीं करेंगे और उनकी सलाह नहीं मानेंगे।  लेकिन आपको ऐसा करना चाहिए और यह मानना चाहिए कि जीवन में अपने लिए उठ खड़े होने के लिए भी आपको कुछ लोगों की आवश्यकता पड़ेगी और यही आपके जीवन की सीख होगी। 
    MULANK_DESC_TEXT1=मूलांक 1 के अंतर्गत जन्म लेने के कारण  आप अत्यंत महत्वाकांक्षी हैं और आप किसी का प्रतिबंध अपने पसंद नहीं करते बल्कि दूसरों से काम करवाना और उनका नेतृत्व करना आपकी पहली खूबी है। आपके ऊपर सूर्य का विशेष प्रभाव रहता है। आप की विचारधारा स्थिर होती हैं और अपने निश्चय पर आप दृढ़ रहते हैं। आप किसी भी संबंध में चाहे वह प्रेम संबंधों अथवा मित्र का लंबे समय तक टिके रहते हैं। आप एक दयालु और दूसरों पर उपकार करने वाले व्यक्ति हैं। आपको मान सम्मान की अधिक चाह होती है। अपनी मेहनत के दम पर आप अच्छा नाम कमाते हैं। सरकारी क्षेत्र में आप का प्रदर्शन सराहनीय होता है। आप धैर्यवान हैं और अपने अध्ययन में पूरा ध्यान देते हैं। आप विपरीत लिंगी जातकों की ओर अधिक आकर्षित होते हैं और इसके कारण कई बार धोखा  भी उठाते हैं। आपको समाज सेवा राजनीति नौकरी अथवा धर्म संबंधित क्षेत्रों में विशेष अनुभव प्राप्त होता है।
    MULANK_DESC_TEXT2=चंद्रमा से मुख्य रूप से प्रभावित होने के कारण आप काफी भावुक होते हैं और किसी भी कार्य को किसी के साथ मिलकर करना पसंद करते हैं। जीवन के प्रत्येक क्षेत्र में अक्सर आपको किसी एक साथी की आवश्यकता होती है।  कभी कभी आप एक साथ कई काम शुरू कर देते हैं लेकिन  मन बदल जाने के कारण कई बार उन्हें बीच में ही छोड़ देते हैं, जिसकी वजह से आप को नुकसान उठाना पड़ता है। कला को पसंद करने वाले और कल्पनाशील होते हैं और लोगों से प्रेम करते हैं। आप एक कुशल प्रेमी हो सकते हैं और अपने परिवार के प्रति समर्पित होते हैं। आप में धीरज की कमी हो सकती है। आप की सामाजिक स्थिति अच्छी होती है और आप समाज में लोकप्रिय होते हैं। आप एक अच्छे मित्र होते हैं  खोजी प्रवृत्ति के होते हैं। आपके जीवन में अनेक उतार-चढ़ाव आते हैं और इस कारण आप भी कई योजनाएं बीच में अटक भी जाती है। आपको अपने आत्मविश्वास को मजबूत बनाना चाहिए।
    MULANK_DESC_TEXT3=बृहस्पति ग्रह से प्रभावित अंक 3 में जन्म लेने के कारण आप कोमल हृदय के व्यक्ति हैं और सत्य वक्ता तथा शांति प्रिय हैं। आप महत्वाकांक्षी हैं और अधिकतर सरकारी नौकरी में अच्छा प्रदर्शन करते हैं। आप में अक्सर तानाशाही प्रवृत्ति देखी जा सकती है। आप अनुशासन प्रिय होते हैं इसलिए  अपने अधीनस्थ लोगों के प्रति थोड़े कठोर भी हो सकते हैं। आपके अंदर सहज ज्ञान होता है और आपको पढ़ना तथा पढ़ाना दोनों पसंद होते हैं, इसलिए बौद्धिक क्षेत्र से संबंधित अनेक उपलब्धियाँ प्राप्त होती हैं। आप मानसिक रूप से  सबल हैं और आपका तर्क और ज्ञान शक्ति काफी अच्छी है। आप को दान पुण्य करना और परोपकार के कार्य करना अधिक पसंद है। कभी-कभी किसी बात के पीछे पड़ जाने से आप झगड़ालू भी हो सकते हैं। लेकिन यह  सत्य है कि आप स्वाभिमानी हैं।
    MULANK_DESC_TEXT4=आपके अंदर हर्षल अथवा राहु का मुख्य प्रभाव है। इसके परिणाम स्वरूप आप दुनिया से हटकर सोच रखते हैं और कुछ नया कर सकते हैं। क्योंकि आपकी राय अन्य लोगों से आसानी से नहीं मिलती, इसलिए अधिकतर लोग आप का विरोध करने लगते हैं। आपको अधिक धन संग्रह करने का शौक नहीं होता बल्कि आपको खुश रहना और अपनी मस्ती में डूबे रहना अधिक पसंद है। आप जमाने से आगे की सोच रखते हैं और अपना विरोध भी खुलकर प्रकट करते हैं। आपका स्वभाव अप्रत्याशित है जिसे आसानी से कोई नहीं पहचान सकता और अगले पल आप क्या करते किसी को कुछ नहीं पता होता यही आपकी खूबी आपको सबसे स्पेशल बनाती है। आप किसी भी महफिल की जान होते हैं। आपको कुछ अच्छा कार्य करने की आदत होती है लेकिन आप यही चाहते हैं कि आप की  इस अच्छाई की लोग तारीफ करें। आप काफी संवेदनशील होते हैं और अक्सर अपने आप को अकेला महसूस करते हैं। आपके मित्रों की संख्या कम होती है लेकिन वे सभी बेहद ईमानदार और निष्ठावान होते हैं।
    MULANK_DESC_TEXT5=बुध ग्रह का प्रभाव होने से आप अधिक मित्र वाले व्यक्ति हैं। आपको मित्रता करने का शौक है और आपकी मित्र मंडली में अधिक लोग होंगे। आपके अंदर व्यापारी होने के गुण सहज रूप से विद्यमान हैं। आप अक्सर लाभ की ओर आकृष्ट होते हैं और कई काम जल्दबाजी में भी करते हैं, जिसका आपको ख़ामियाज़ा भुगतना पड़ता है। आपके अंदर ग़जब की फुर्ती होती है। आप ज्यादा देर तक किसी बात को पाल कर नहीं रखते और इसलिए अधिक देर तक निराश भी नहीं होते। आप नौकरी की अपेक्षा व्यापार को अधिक तरजीह देते हैं। आपके अंदर जल्दबाजी, जल्दी क्रोध आना और चिड़चिड़ापन हो सकता है। आपकी तर्क बेहतर होती है और आपकी वाणी भी असरदार होती है। आप मन से चंचल होते हैं और बुद्धि से संबंधित कामों में अक्सर सफलता प्राप्त करते हैं। आपको शारीरिक परिश्रम की अपेक्षा दिमागी काम करना ज्यादा रास आता है। आपकी सबसे बड़ी खूबी यह है कि आप किसी भी परेशानी से बहुत जल्दी बाहर निकल आते हैं। आपको अपनी मानसिक शक्ति का दुरुपयोग करने से बचना चाहिए।
    MULANK_DESC_TEXT6=शुक्र के प्रभाव के कारण आप सुंदरता के प्रति आकर्षण सबसे अधिक रखते हैं। केवल यही नहीं  किसी भी प्रकार की कला, मनोरंजन साहित्य वस्त्र और संगीत की तरफ आपका रुझान होता है। आपको सजावट और साज सज्जा का काम बहुत पसंद है इसलिए हर काम को बहुत ही खूबसूरती से करते हैं। आपका व्यक्तित्व चुंबकीय होता है जिसके प्रति लोगों का आकर्षण होता है। आपके अंदर किसी बात पर अड़े रहने अथवा ईर्ष्या की भावना अधिक हो सकती है जिसकी वजह से आपको कुछ परेशानी भी उठानी पड़ सकती हैं। आप अधिक विरोध को सहन नहीं कर पाते। आप किसी को जल्दी ही अपना दोस्त बना लेते हैं। घर आने वाले अतिथियों का आदर सत्कार करना कोई आपसे सीखे। आपको कभी-कभी आत्मग्लानि भी होती है और मानसिक तनाव का भी सामना करना पड़ता है। विपरीत लिंगी जातकों के प्रति आपका रुझान अधिक होता है। आपकी सबसे बड़ी खूबी यह है कि आप किसी को भी बहुत जल्दी अपना बना लेते हैं।
    MULANK_DESC_TEXT7=मूलांक 7 के अंतर्गत जन्म लेने से आपके ऊपर  केतु अथवा नेपच्यून का मुख्य प्रभाव है। आपके अंदर सहज रूप से धार्मिकता विद्यमान है। आपको कविता और चित्रकला बहुत पसंद है। आप धार्मिक मामलों में काफी कट्टर हो सकते हैं। किसी भी घटना का पूर्वाभास आप की सबसे बड़ी ताकत है और दूसरों के मन की बात समझने में आप निपुण हैं। हालांकि इसके विपरीत लोगों द्वारा आपको समझ पाना उतना आसान नहीं है। आपको सैर सपाटा करना, घूमना फिरना और अनेक यात्राएं करने में खूब आनंद आता है। आपके जीवन में भौतिक वस्तुओं की कमी हो सकती है। आप अपने मौलिक विचारों के आधार पर ही धन अर्जित करते हैं और दान पुण्य भी करते हैं। आप भविष्य के बारे में चिंता करते हैं, इसलिए अच्छे कार्य करना आपको पसंद है। आपके अंदर कल्पनाशीलता अच्छी होती है  और लोगों को अपनी और आकर्षित करने की विशेष शक्ति होती है। आप एक अच्छे व्यापारी के गुण और विचार अपने अंदर समाहित किए रहते हैं और यदि आप इनका प्रयोग करें तो आप एक सफल व्यवसायी बन सकते हैं। दूसरों को प्रभावित करने की कला आपकी सबसे बड़ी ख़ासियत है।
    MULANK_DESC_TEXT8=आप स्वभाव से ही अधिक मेहनती होते हैं और आपकी इस खूबी का राज़ है मूलांक 8 के स्वामी शनि देव। आप किसी भी संस्थान में सबसे महत्वपूर्ण कड़ी होते हैं लेकिन अक्सर लोगों द्वारा आपकी मेहनत को कम आंका जाता है। आपको अकेलापन और उदासीनता परेशान कर सकती है। आप जीवन में धीरे-धीरे उन्नति करते हैं लेकिन आपकी उन्नति पक्के तौर पर होती है। आपके अंदर बाहरी दिखावा कम होता है इसलिए समाज में अक्सर आप के महत्व को कम समझा जा सकता है। आप अपने काम से मतलब रखते हैं और उसको पूरा करके ही दम लेते हैं। आप बहुत महत्वाकांक्षी हैं और उस महत्वाकांक्षा को पाने के लिए किसी भी हद तक मेहनत करने से पीछे नहीं हटते। आप काफी दयालु और भावुक होते हैं। आप भाग्य पर भरोसा रखने वाले होते हैं और थोड़े धार्मिक प्रवृत्ति के होते हैं। आप अक्सर उच्च पदों तक पहुंचते हैं और किसी भी कुर्बानी को देने  के लिए सदैव तैयार रहते हैं। आप अक्सर ऐसे काम कर जाते हैं जो आपके ना होने पर भी आपको लोगों की यादों में जिंदा रखते हैं। आप या तो जीवन में अत्यधिक सफल होंगे  या अत्यधिक असफल और यह इस बात पर निर्भर करता है कि आप आशावादी  किस हद तक बने रहते हैं।
    MULANK_DESC_TEXT9=इस अंक के अंतर्गत जन्म लेने के कारण मंगल देव की ऊर्जा और शक्तियां आपको प्राप्त होती हैं, जिनकी वजह से आप साहसी होते हैं और कठिनाइयों से बिल्कुल नहीं डरते। आपको शासन व्यवस्था अथवा लोगों का नेतृत्व करने में महारत हासिल होती। लेकिन आप अक्सर क्रोधित हो जाते हैं जिसकी वजह से कई प्रकार की परेशानियां आपके सामने आ जाती हैं। आपके अंदर फुर्ती और जल्दबाजी होती है। आपका जीवन संघर्ष में होता है और आपके शत्रु भी अधिक होते हैं।  हालांकि आप अपने साहस के बल पर इन सभी का सामना कर लेते हैं। आप स्वतंत्र रहना पसंद करते हैं और किसी का प्रभाव आप पर आसानी से नहीं पड़ता। आपको चापलूस लोगों से सावधान रहना चाहिए। आप प्रेम और सहानुभूति पाने के लिए कुछ भी कर सकते हैं। आपको अपनी आलोचना बर्दाश्त नहीं होती, इसलिए आपको स्वयं पर नियंत्रण रखने का प्रयास  करना चाहिए  क्योंकि अत्यधिक आवेग में आप किसी भी हद तक जा सकते हैं। यदि  आप अपने क्रोध पर नियंत्रण रखने में कामयाब हो सकें तो जीवन में काफी भाग्यशाली होंगे और सफलता प्राप्त करेंगे।
    NAMANK_DESC_TEXT1=<p>अंक शास्त्र के अनुसार, यदि आपका जन्मांक 1 है तो आप ऊर्जावान, सक्रिय, अहंकारी एवं कला के प्रति जुनूनी हो सकते हैं। ऐसे व्यक्ति भीड़ का हिस्सा नहीं बल्कि उसका नेतृत्व करने वाले होते हैं। आपकी सहज बुद्धि हमेशा कार्य करती है। आप स्वभाव से ईमानदार और अपनी ग़लतियों को स्वीकार करने वाले होते हैं। ज़मीन से जुड़ा रहना आपको पसंद आता है। आपके चेहरे पर हमेशा मुस्कान रहती है और योजना को लेकर सदैव आशावादी रहते हैं। </p><p><b>करियर: </b>आप शारीरिक कार्य की बजाय मानसिक कार्य को करना पसंद करते हैं। आप अपने अनुभवों से ज्ञान प्राप्त करते हैं। ऐसे व्यक्ति अच्छे लेखक, रिपोर्टर के साथ-साथ सक्रिय तथा रचनात्मक होते है।</p>
    NAMANK_DESC_TEXT2=<p>यह अंक उच्च कल्पना शक्ति, आदर्शवाद और स्वप्न स्वभाव को दर्शाता है। ऐसे व्यक्ति संसार में अपनी कल्पनाओं के साथ जीते हैं। ऐसे जातक अपनी योजनाओं का क्रियान्वयन और किसी कार्य के लिए दूसरों को साथ चलने वाले होते हैं। ये जातक स्वभाव से निस्वार्थी और दूसरों का भला करने वाले होते हैं। </p><p><b>करियर: </b> 2 अंक वाले जातक अच्छे पार्टनर और अच्छे सहयोगी होते हैं। ऐसे व्यक्ति पार्टनरशिप में व्यापार अच्छा करते हैं। आप अशांत और परिवर्तन प्रिय हैं। इसलिए यात्रा करना आपको पसंद आता है और ट्रैबलिंग जॉब में आप उम्दा प्रदर्शन करते हैं। प्रकृति के प्रति आपकी कल्पना आपको रचनात्मक बनाती है। </p>
    NAMANK_DESC_TEXT3=<p>जन्मांक 3 वाले व्यक्ति नैतिक मूल्यों, दैवीय प्रेम एवं न्याय के लिए सदैव आगे रहते हैं। जीवन में भाग्य भी इनका साथ देता है। हर अच्छी चीज़ को ये जातक अपनी ओर आकर्षित करने में कामयाब होते हैं। कड़ा परिश्रम करना इन्हें पसंद होता है। ये एक लीडर के रूप में पैदा होते हैं अपने लक्ष्य को पाने में सफल होते हैं। </p><p><b>करियर: </b>ऐसे व्यक्ति अच्छे न्यायाधीश, कुशल, शिक्षक और दार्शनिक हो सकते हैं।</p>
    NAMANK_DESC_TEXT4=<p>जिन जातकों का जन्मांक 4 होता है वे अपनी ऊर्जा, ताक़त और उन्नति का प्रदर्शन करते हैं। उनकी मानसिक शक्ति बेहद तीव्र होती है। इन जातकों की ख़ास विशेषता होती है कि वे निरंतर अपने लक्ष्य और अपनी सोसायटी में परिवर्तन करते हैं और समाज के बनाए उसूलों और आदर्शों से अपने मन को मुक्त करना चाहते हैं। ऐसे जातक नियमों के विरूद्ध ही चलना पसंद करते हैं। </p><p><b>करियर: </b>जन्मांक 4 वाले जातक अच्छे लेखक, बिजनेसमैन और राजनेता होते हैं</p>
    NAMANK_DESC_TEXT5=<p>जीवन की गूढ़ चीज़ों में आप रुचि रखते हैं। स्वभाव से आप बहुत अशांत और जैसे ही समय के साथ आपकी मूलभूत ज़रुरतें बदलती हैं वैसे ही आप एक नए लक्ष्य के साथ एक नई मंजिल को तलाशते हैं। आपमें नकारात्मक और सकारात्मक दोनों ही पहलू मौजूद होते हैं। बच्चों के साथ समय बिताना आपको पसंद है और परिवार आपकी प्राथमिकता है। अध्यात्म और धर्म जैसे विषयों में आपका झुकाव देखने को मिलता है। </p><p><b>करियर: </b>आपकी रुचि स्पोर्ट्स अधिक रहती है इसलिए आप इस क्षेत्र में अपना करियर बना सकते हैं। आपका बौद्धिक ज्ञान आपको एक बेहतर शोधार्थी और शिक्षाशास्त्री बनाता है।</p>
    NAMANK_DESC_TEXT6=<p>आप कला और सुंदरता के साथ पैदा होते हैं। कला के प्रति आपका अधिक प्रेम देखने को मिलता है। सुंदरता आपके लिए महज़ एक शब्द ही नहीं है। बल्कि आप रिश्तों में सुंदरता को पसंद करते हैं। आप असहमति, खंडन आदि से थोड़े असहज़ दिखाई देते हैं। इसलिए आप दूसरों का सामना करने से कतराते हैं। आपका प्रिय स्वभाव आपको एक अच्छा इंसान बनाता है। आप लोगों को ख़ुश रखना चाहते हैं। आप लोकप्रिय और आशावादी स्वभाव के हैं।</p><p><b>करियर: </b>संगीत, नृत्य, कविता एवं अन्य रचनात्मक कार्यों में आपकी रुचि होती है।</p>
    NAMANK_DESC_TEXT7=<p>आप अपने व्यक्तित्व की मौलिकता और स्वतंत्रता के लिए जाने जाते हैं। आप एक स्वतंत्र पक्षी की तरह समाज के बंधन को न मानते हुए उड़ना चाहते हैं। लोग आपको एक रहस्यमयी व्यक्ति के रूप में देखते हैं और कई बार वे आपको खाली दिमाग वाला कहते हैं। अंक 7 वाले लोग आमतौर पर संसाधन और विश्लेषणात्मक होते हैं और स्थितियों तथा समस्याओं के कारण और प्रभाव को निर्धारित कर सकते हैं। जीवन में, आप जो कुछ भी महसूस करते हैं, उसे हासिल करने के लिए कई व्यक्तिगत बलिदान करते हैं, जो आपके लिए सही और उचित है। </p><p><b>करियर: </b>आप बेहद साहसी हैं,  जिसके परिणामस्वरुप आप अपने घर से दूर नए और अनोखे  की खोज में जायेंगे। इसके अतिरिक्त, आप अपने सहज स्वभाव के कारण घटनाओं को पहले से ही देखने में अधिक प्रवीण हैं। इसलिए, किसी भी ऐसे पेशे से जुड़ना जो आपकी रोमांच की चाह को पूरा कर सके, एक बढ़िया विकल्प है।</p>
    NAMANK_DESC_TEXT8=<p> जन्मांक 8 वाले जातक गंभीर और दार्शनिक होते हैं। आप दृढ़-निश्चयी, दूरदृष्टा एवं परिश्रमी होते हैं। आप अंदर से बेहद संवेदनशील और दूसरों की परवाह करने वाले होते हैं लेकिन बाहर से उतने ही कठोर होते हैं। आप भविष्य को लेकर बेहद सावधान रहते हैं और इस संबंध सोच-समझकर फैसला लेते हैं। आप अपने लक्ष्य पाने के लिए हर एक परिस्थिति से गुजरने में सक्षम होते हैं। </p><p><b>करियर: </b>आप लोगों की नज़र में अक्सर महत्वाकांक्षी और एक सफल व्यक्ति होते हैं। आप अपनी सफलता से दूसरों लोगों के लिए प्रेरणा का कार्य करते हैं। परिणाम स्वरूप आप एक अच्छे प्रबंधक, प्रशासक और व्यापारी होते हैं। सरकारी नौकरी भी आपके लिए अच्छा विकल्प है।</p>
    NAMANK_DESC_TEXT9=<p>आप साहसी और इच्छाशक्ति के प्रबल होते हैं। आप गर्म मिजाज के हैं और अपने विरोधी पर हावी रहते हैं। आप ख़ुद से प्रेम करते हैं और आत्म सम्मान को ऊपर रखते हैं। फिर चाहें लोग आपको ख़िलाफ़ ही क्यों न खडें हों। आप स्वयं ही अपना भाग्य बनाते हैं। आपके अंदर एक गजब का नेतावादी गुण होता है। इसलिए आप आसानी महान लीडर बन जाते हैं। आप एक अच्छे इंसान होते हैं और दोस्तों पर भरोसा करते हैं। दूसरों की भलाई के लिए आप सदैव आगे रहते हैं। आप अपने परिवार वालों से आत्मीय रूप से जुड़े होते हैं। उनके साथ समय बिताना भी आपको पसंद है। </p><p><b>करियर: </b>सेना, राजनीति, अध्यापन एवं समाज सेवा</p>
