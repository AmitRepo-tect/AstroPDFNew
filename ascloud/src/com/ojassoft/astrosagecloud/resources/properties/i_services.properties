

SERVICE_NAME_1  = Ask a Question
SERVICE_DESC_1  = Questions are essential for evolution of mankind, said Aristotle famously. Questions are not only crucial for human evolution, but they are important for the development of individuals too. If one has a problem or deep confusion lurking somewhere in ones mind, it hinders all the prospects of growth for him/her. Are you worried about anything in particular? Do you feel the fear of the things going to take place in some specific matter? <br /><br />Astrology is the divine science that can let you know what destiny holds for you. It can erase your doubts and fears, and answer your queries about career, marriage, money and life as a whole et cetera. It is the key to get rid of worrisome questions.

SERVICE_NAME_7  = Health & Fitness Report 
SERVICE_DESC_7  = It is said that health is the real wealth. If you are not fit and healthy, luxuries and other worldly assets are worthless. In old times, astrology and medical science i.e. Ayurveda were completely entangled with each other. Ancient seers knew the role of starts in one's overall wellbeing. Many times medicines and therapies don't work just due to the impediment nature of illness caused by heavenly bodies. Thus, it is crucial to let astrological wisdom work for your amelioration. <br /><br />If you are facing the issues related to your health and fitness, it is always suggested to take precautionary measures as soon as possible. Our comprehensive health report would tell you what is causing the problem and what astrological measures should be taken into consideration to get out of jinx of the bad health's rut.

SERVICE_NAME_14 = Phone Consult. 
SERVICE_DESC_14 = Our experienced astrologers can also be consulted over telephone. ""Having a good discussion is like having riches"", says an old Kenyan proverb. When one talks, he/she not only communicates through words, but the tone of voice and its vibrations play a vital part too. Also, as per astrology, the moment of two individual talking also provides vital information about native's problem.<br /><br />Any dimension related to life, such as career, health, business, love and marriage etc, can be discussed and one can get to know the astrological reasons behind the happenings. Practical remedial solutions may also be suggested in order to overcome any problem obstructing your path to success, prosperity and happiness. Our astrologers are just a phone call away to help you.

SERVICE_NAME_4  = Get Career Report 
SERVICE_DESC_4  = A good and fulfilling career is essential for overall success in life. Our expert astrologers, in this comprehensive report, will tell you what career you should go for, what are your prospects in different areas, and in case you are already employed, what you should do for the betterment of your career and what kind of goals you should plan et cetera. Along with these things, we will also analyze the course of your career in future and let you know about the possible potholes that can hamper your advancement in your job or business, and also suggest you effective astrological remedies to overcome these problems.<br /><br />This details report will consist of in-depth astrological analysis and remedial suggestions of every aspect of your business or job for next twelve months. This report would prove to be a detailed guide of your career for the year ahead. Let ancient astrological wisdom help you flourish your career and get the comprehensive career report by our expert astrologers.

SERVICE_NAME_12 = Get Finance Report 
SERVICE_DESC_12  = In today's competitive world, a strong financial position is not just a luxury but a necessity in order to survive and keep growing. Financial security is a must not only for the well-being of an individual, but also for those who are related to him/her like one's spouse, children and entire family. Financial crises not only hamper the prospects of growth, but also cramp the mental peace, happiness and stability. John F Kennedy once famously said, ""The Chinese use two brush strokes to write the word 'crisis'. One brush stroke stands for danger; the other for opportunity. In a crisis, be aware of the danger-but recognize the opportunity."" And it is so true.<br /><br />Divine astrological wisdom gives you the opportunity to pinpoint and analyze the cause of financial problems, and it also suggests remedial measures required to be taken in order to get out of hot waters. Astrology is the science that not only advices the amelioration of some financial ailment, but you can also benefit from knowledge for the betterment of your already good financial position. If you have any finance related query, let the ancient astrological wisdom help you and get the comprehensive financial report from our expert astrologers.

SERVICE_NAME_13 = Gemstones & Remedies 
SERVICE_DESC_13 = Astrology is considered so effective because it not only pinpoints the problem, but also nails it down by suggesting the practical remedies to heal the troubles. If one seriously follows these remedial measures as per astrological wisdom, he/she can eradicate adverse consequence caused by heavenly bodies and get out of tough times quite easily.<br /><br />Gemstones are reckoned to be very important astrologically, because they have the capacity to conjure up the immense amount of cosmic energy that, if directed properly, can ameliorate all your problems and gives you powerful boost in every dimension of life. But if mishandled, this cosmic energy can adversely affect you. Therefore, if you want astrological remedies and gemstones to benefit you in matters related to finance, love, marriage, career and education etc, our astute astrologers can suggest you what remedial measure you should take, how to perform these remedies properly, what gemstone to put on, and how to get most of it etc.

SERVICE_NAME_6 = Marriage/Love Analysis 
SERVICE_DESC_6 = It is said that marriages are made in heaven. But are you sure that the one you want to spend your life with or already spending your life with is the special one made for you? It is in your hands to find out whether he or she is the one destined for you i.e. whether you are choosing Mr. Right or Ms. Right for yourself or not. If you choose the right partner, life seems to be a cakewalk. But if your selection is wrong, it can even shatter the charm and the zest of life.<br /><br />Astrology can help you in taking the right decision. It can tell you if you are compatible with a person, whether you should embark the life journey with that person or not and what future holds for two of you as a couple. And in case you are already married and facing problems in your marital life, what you should do in order to get out of the hot waters.

SERVICE_NAME_5 = Lal Kitab Remedies 
SERVICE_DESC_5 = Lal Kitab is an astrological treaty full of mysticism. It contains profound insight into astrology, palmistry and Vastu. Lal Kitab is said to be written in an old dialect of Urdu by Pt. Rupchand Joshi, and it consists of various verses in poetic demeanor. Lal Kitab comprises of sheer magnitude of astrological profundity behind the veils of ambiguity. It requires an astute and penetrating astrological understanding to decode it.<br /><br />Those who understand Lal Kitab proclaim it to be the key of all worldly problems and sufferings. Lal Kitab remedies are very powerful and agile, pertaining to modern times when people are occupied with various problems and they lack time. These remedies figure out Achilles' heel and thus, are able to heal your physical, mental and economical problems quickly. If you want to get your problem resolved quickly using Lal Kitab remedies, ask our insightful astrologers.

SERVICE_NAME_2 = Birth Time Rectification 
SERVICE_DESC_2 = Birth time is essential for making your Horoscope. Without exact time of birth, even an intelligent astrologer cannot predict what future holds for you. Though, if you do not know or are confused about your exact birth time, there is no need to worry. Because Vedic Astrology provides the methods to accurately pinpoint the precise time of birth.<br /><br />There are many of methods suggested by Indian sages like Sage Kalidasa and great Varahamihira. KP System also has a unuiqe method to find out your exact birth time. On top of that, if an astute astrologer knows about major events in one's life, he/she can reverse engineer the exact time of birth of a native on the basis of events in your life.<br /><br />Hence, in order to calculate your birth time precisely, you need to let us know few major events of your life and the time around which these events took place e.g. your date of marriage, date of birth of your children, major illness and first employment etc.<br /><br />We will also require approximate time of birth or duration of time in which, you reckon, your birth time might fall into; like – between 2 pm to 4 pm et cetera. We will meticulously figure out the time of birth.

