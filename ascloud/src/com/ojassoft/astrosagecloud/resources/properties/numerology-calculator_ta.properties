 FAST_TEXT8=சுக்லா பக்ஷாவில் சனிக்கிழமையிலிருந்து தொடங்கி நீங்கள் 19 அல்லது 51 சனிக்கிழமையன்று விரதம் இருக்க வேண்டும். ஒரு நாளுக்கு ஒரு முறை மட்டுமே சாப்பிடுவதும், கறுப்பு கிராம் (உளுது பருப்பு), விரத நாளில் உங்களுக்கு நன்மை பயக்கும். சனீஸ்வரன் கடவுளை வணங்க வேண்டும் மற்றும் ஒரு மரத்தின் கீழ் மலை நேரத்தில் கடுகு ஏண்ணெயில்  விளக்கு வைக்கவும். 
 FAST_TEXT9=சுக்லா பக்ஷாவில் செவ்வாய் தோன்றுகிறது, 19 அல்லது 21 செவ்வாய்க்கு நீங்கள் விரதம்  இருக்க வேண்டும். இந்த நாளில் ஒரு முறை மட்டுமே சாப்பிட்டு இனிப்பு ஏதாவது உண்பது நல்லது. சிவப்பு நிற ஆடைகள் அணிந்து, செவ்வாய் பீஜம் மந்திரத்தை படிக்கவும். மேலும், இந்த நாளில் சிறிய குழந்தைகளுக்கு நீங்கள் வெங்காயம் மற்றும் கிராம் /சுண்டல் ஆகியவற்றை பிரசாதமாக வழங்க வேண்டும். 
 YANTRA_TEXT1=உங்கள் வேர்  எண் 1 என்பதால், உங்கள் கடவுள் கிரகம் சூரியனைக் குறிக்கிறது. எனவே, அவருடைய தெய்வீக கருணை மற்றும் சாதகமான முடிவுகளை அடைவதற்காக, ஞாயிற்றுக்கிழமை சன்யா யந்திரம், ஞாயிற்றுக்கிழமை, சன் ஹோரா மற்றும் நக்ஷத்திரங்களில் (க்ரிதிகா, உத்தரபாளம் ஃபல்குனி, உத்தர ஆஷ்தா).
 YANTRA_TEXT2=சந்திரன் உங்கள் வேர்  நம்பர் 2. இறைவனின் தயவைப் பெறுவதற்காக, திங்களன்று சந்திர யந்திரத்தை நீங்கள் கொண்டுவர வேண்டும், சந்திரனின் ஹோமம் மற்றும் நட்சத்திரங்களின் கீழ், ரோஹினி, ஹஸ்தா மற்றும் ஷ்ரவன் ஆகியவை.
 YANTRA_TEXT3=வேர் எண் 3 கீழ் பிறந்தார், உங்கள் இறைவன் கிரகத்தின் வியாழன். வியாழன் அன்று குரு யந்திரத்தை உங்கள் புராண தெய்வீக கருணைக்கு அடையவும், அதனால் சாதகமான முடிவுகளை அடைவதற்காகவும், நீங்கள் வியாழக்கிழமை, புஷ்வர், விஷாகா, புருவா பராபராடாவில் குருவை வழிபட வேண்டும்.
 YANTRA_TEXT4=உங்கள் வேர் எண் 4 உடன், ராகு என்பவர் உங்கள் இறைவன் கிரகம். எனவே, கிரகத்தை பிரகாசப்படுத்தவும், சாதகமான முடிவுகளை எட்டவும், புதன் அன்று ரகு யந்திரத்தை அதன் நக்ஷத்திரங்கள் (அத்ரா, ஸ்வாட்டி, சதாபஷாக்) கீழ் கொண்டு வர வேண்டும்.
 YANTRA_TEXT5=5 உங்கள் வேர் எண் இருப்பதுடன், புதன் உங்கள் இறைவன் கிரகம். இந்த கிரகத்திலிருந்து தெய்வீக கிருபையையும் சாதகமான முடிவுகளையும் அடைவதற்கு,  புதன்கிழமையன்று , புத்தர் யந்திரத்தை எடுத்துச் செல்ல வேண்டும். அக்ஷேஷா, ஜெய்ஷ்தா, ரேவதி.
 YANTRA_TEXT6=சுக்ரன் 6, நீங்கள் பிறந்த அந்த கீழ் எண் 6, இறைவன். ஆகையால், வெள்ளிக்கிழமை வெள்ளிக்கிழமை சுக்ரா யந்திரத்தை சுமந்து கொண்டு, பாரசீக, புருவா பால்குனி, புர்வா ஆஷ்தா ஆகியோரின் சுக்ரன்ஹொரர் மற்றும் நக்ஷத்திரங்களின் கீழ், இறைவனை சமாதானப்படுத்தி, சாதகமான முடிவுகளை எடுங்கள்.
 YANTRA_TEXT7=கேது என்பது வேர் எண் 7 ல் பிறந்திருக்கும் பூர்வீக மக்களாகும். எனவே கடவுளின் கிருபையையும் சாதகமான முடிவுகளையும் அடைவதற்கு  கேது யந்திரங்களை, அசுவினி, மகா, மற்றும் மூல.
 YANTRA_TEXT8=உங்கள் வேர் எண் 8 உடன், சனி  உங்கள் இறைவன் கிரகம். இறைவனிடமிருந்து அருள்மிகு ஆசீர்வாதம் மற்றும் சாதகமான முடிவுகளை அடைவதற்காக சனியின் ஹரா மற்றும் நக்ஷத்திரங்களில் (புஷியா, அனுராதா, உத்தரப் பட்டாபாடா) சனி யந்திரத்தை நீங்கள் எடுத்துச் செல்ல வேண்டும்.
 YANTRA_TEXT9=உங்கள் வேர் எண் என்பது விரிவான 9 ஆகும், அதாவது உங்கள் கிரகம் செவ்வாய் என்று அர்த்தம். சாதகமான முடிவுகளையும், தெய்வீக ஆசீர்வாதங்களையும் அடைவதற்கு, செவ்வாய் தோஷம் மற்றும் நக்ஷத்திரங்கள், மிருகிரிரா, சித்ரா, மற்றும் அஷ்டிஷ்டா, எங்கே சென்றாலும்  செவ்வாய்  யந்திரத்தை எடுத்துச் செல்ல வேண்டும். 
 MASTER_NUMBER_TEXT=கணித விஞ்ஞானத்தின்படி, தங்களுக்குள்ளேயே சிறப்பு சக்தியைக் கொண்ட இரண்டு எண்களை மட்டுமே கொண்டுள்ளன. அவர்கள் மாஸ்டர் எண்கள் என அழைக்கப்படுகின்றனர்,  11 மற்றும் 22 ஆகும். இத்தகைய மக்களுக்கு அதிர்ச்சியூட்டும் சக்தியும் திறமையும் உண்டு.
 MASTER_NUMBER_TEXT11=உங்கள் மாஸ்டர் எண் 11 ஆகும், இதன் காரணமாக உங்கள் உள்ளுணர்வு திறன்களை அதிர்ச்சியூட்டுகிறது. நீங்கள் கற்பனை மற்றும் படைப்பாற்றல் மட்டும் அல்ல, ஆனால் நீங்கள் பெரிய படத்தையும் பார்க்க முடியும். இருப்பினும், நீங்கள் ஒரு குறிப்பிட்ட அளவுக்கு சாத்தியமற்றது. நீங்கள் பெரிய தலைமை திறன்கள் மற்றும் மற்றவர்களை ஊக்கப்படுத்துவது நல்லது. ஆனால், நீங்கள் உங்கள் இலக்குகளை நோக்கி கவனம் செலுத்தவில்லை என்றால், பயம் ஒரு சூழலில் உங்கள் வாழ்க்கையை சுற்றி முடியும். உங்கள் திறமைகளை நம்புங்கள் மற்றும் சமூக நலனுக்காக வேலை செய்யுங்கள், மேலும் உங்களுடைய விடயத்தில் ஒருவருக்கும் சிறந்தது எதுவுமில்லை என்று உணர்ந்துகொள்வீர்கள். இந்த எண் ஒரு உளவியல் எண்.
 MASTER_NUMBER_TEXT22=உங்கள் மாஸ்டர் எண் 22, இது கணித விஞ்ஞானத்தில் மிகவும் சக்திவாய்ந்த எண்ணாகக் கருதப்படுகிறது. உங்கள் கனவுகள் மற்றும் ஆசைகளை உண்மையாக மாற்றும் திறன் உங்களிடம் உள்ளது. பெரிய யோசனைகள், உயர் சிந்தனை, நல்ல முடிவெடுக்கும் திறமைகள் மற்றும் தலைமைத்துவ குணங்கள் ஆகியவற்றுடன், நீங்கள் உள்ளுணர்வு மற்றும் நடைமுறைத்திறன் ஆகியவற்றின் சக்தியையும் கொண்டிருக்கின்றீர்கள். நீங்கள் அடிக்கடி உங்களை அதிக கவனம் செலுத்த வேண்டும், ஆனால், நீங்கள் ஒரு பெரிய நோக்கத்திற்காக பிறந்து, சமுதாயத்திற்காக நிறைய செய்ய வேண்டும் என்பதை நினைவில் கொள்ள வேண்டும். உங்கள் வாழ்க்கையின் ஆரம்ப கட்டங்களில் நீங்கள் பல தடைகளை எதிர்கொண்டிருக்க வேண்டும், ஆனால் அவர்கள் உங்களை பலப்படுத்திக்கொள்ள அங்கு இருந்தார்கள். எனவே, நீங்கள் எதை வேண்டுமானாலும் அமைக்க வேண்டுமென நீங்கள் உறுதி செய்ய வேண்டும், அது தனிப்பட்ட அபிலாஷைகளுக்கு மேலாக உயர்ந்து, சமூகத்தின் நலனுக்காக இருக்க வேண்டும். இந்த சகாப்தத்தில் ஒரு சக்திவாய்ந்த மாற்றத்திற்கான வினையூக்கியாக நீங்கள் யாராக இருக்கிறீர்கள்.
 KARMIC_NUMBER_TEXT=நம் கடந்த கால வாழ்க்கையின் செயல்களின் குறிக்கோள்களை எண்மயமாக்கல் சில எண்களை அடையாளப்படுத்துகிறது. எங்களின் இந்த நடவடிக்கைகள் நாம் நான்கு குறிப்பிட்ட எண்களின் கீழ் பிறப்பதற்கு காரணம். இத்தகைய மக்களின் முக்கிய நோக்கம் அவர்களின் கர்மா மற்றும் கடந்த கால செயல்களின் கடன்களை திருப்பி செலுத்துவதாகும். இந்த கர்ம எண்கள் 13, 14, 16, மற்றும் 19 ஆகும்.
 KARMIC_NUMBER_TEXT13=இந்த எண்ணின் கீழ் பிறந்ததால், வெற்றியை அடைவதற்கு நீங்கள் வாழ்க்கையில் கடினமாக உழைக்க வேண்டும். கர்மிக் எண் 13 இன் நேரடி தாக்கமாக, நீங்கள் தொடர்ந்து உங்கள் பாதையில் தடைகளை சந்திக்க நேரிடும். இதன் காரணமாக, உங்கள் முயற்சிகள் வீணாகப் போகிறதா என நீங்கள் அடிக்கடி கவலைக்கிடமாக உணர்கிறீர்கள்; நீங்கள் பிரச்சினைகளை எதிர்கொள்வீர்கள் மற்றும் நீங்கள் இந்த சவால்களை சமாளிக்க முடியாது என்று நினைக்கிறேன். நீங்கள் சோம்பேறித்தனமாகவும், நம்பிக்கையற்றவர்களாகவும் மாறினீர்கள். ஆனால், எல்லாவற்றையும் போலவே தோன்றுகிறது என்பதை நினைவில் கொள்ள வேண்டும். உங்கள் முயற்சிகள் வீணாகப் போவதில்லை, ஆனால் நீங்கள் கடுமையாக உழைக்க வேண்டும், கடினமாக உழைக்க வேண்டும், ஏனெனில் இது உங்கள் கர்மா கடனாகும். உங்களுடைய முயற்சியில் வெற்றிகரமாக இருந்தால், வாழ்க்கையின் பல துறைகளில் நீங்கள் பெரிய உயரங்களைத் தொட முடியும்.
 KARMIC_NUMBER_TEXT14=இந்த எண்ணின் கீழ் பிறந்ததால், உங்கள் வாழ்க்கை முறையை மாற்றும் வாழ்க்கையில் திடீரென்று எதிர்பாராத மாற்றங்களை நீங்கள் அடிக்கடி அனுபவிக்கிறீர்கள். மது , தாராளமயமான நடவடிக்கைகள், முதலியன போன்ற பல உன்னத அனுபவங்களில் நீங்கள் ஆர்வத்தை எடுத்துக்கொள்கிறீர்கள், இது உங்களுக்கு ஒரு பிரச்சினையாக மாறிவிடும். இவை அனைத்தையும் தவிர்ப்பதற்கு, நீங்களே ஒரு பொறுப்பைக் கொள்ள வேண்டும். உங்கள் வாழ்க்கை ஒரு ரோலர் கோஸ்டர் சவாலாக இருந்தாலும், நீங்கள் ஒரு நிலைப்பாட்டை எடுத்து வலுவான கடினமான இலக்கை நோக்கி சண்டையிட்டால், நீங்கள் இந்த சிக்கல்களில் இருந்து பாதுகாப்பாக இருப்பீர்கள், விரும்பிய வெற்றியை அடைவீர்கள்.
 KARMIC_NUMBER_TEXT16=இந்த எண்ணின் கீழ் பிறந்ததால், நீங்கள் அடிக்கடி உங்கள் ஈகோவை விட்டுக்கொடுக்க வேண்டும், இந்த வாழ்க்கையில் நீங்கள் கற்றுக்கொள்ள வேண்டியது இதுதான். ஒரு வழி, இந்த செயல்முறை நீங்கள் சுத்திகரிப்பின் ஒரு பகுதியாகும். நீங்கள் உங்கள் ஈகோவுடன் மீண்டும் சமரசம் செய்து கொள்ள வேண்டும், இது உங்களைக் கலக்கமடையச் செய்யும் போது நீங்கள் ஏமாற்றப்படக்கூடாது, ஏனென்றால் இப்போதிருக்கும் போராட்டம் எதிர்காலத்தில் வெற்றி பெறும். மற்றவர்கள் எதிர்கொள்ளும் பிரச்சினைகளை அறிந்துகொண்டு புரிந்துகொள்ளும் திறனை நீங்கள் பெற்றிருக்கிறீர்கள், நீங்கள் அடிக்கடி தனியாகவோ தனிமையாகவோ இருப்பீர்கள். உங்கள் வாழ்க்கையில் விசுவாசம், நன்றியுணர்வு மற்றும் சமாதானத்தை நீங்கள் வைத்திருந்தால், ஆன்மீக ரீதியில் வளர முடியும்.
 KARMIC_NUMBER_TEXT19=இந்த எண் கீழ் பிறந்ததால், நீங்கள் முக்கியமாக இரண்டு விஷயங்களை வாழ்க்கையில் கற்றுக் கொள்ள வேண்டும் - அதிகாரத்தை சரியான முறையில் பயன்படுத்துவது, சுதந்திரம் மற்றொன்று. வாழ்க்கையில் சில சந்தர்ப்பங்கள் இருக்கும், தனிப்பட்ட வாழ்க்கையில் ஏற்படும் சில பிரச்சினைகளைப் பற்றி நீங்கள் தனியாக தனியாக ஒரு நிலைப்பாட்டை எடுக்க வேண்டும். உங்களைச் சுற்றியிருக்கும் மக்களை நீங்கள் கேட்க விரும்புவதில்லை, மேலும் அவர்களது ஆலோசனையையும் ஏற்கமாட்டீர்கள். ஆனால் நீங்கள் அவற்றைக் கவனிக்க வேண்டும், ஏனென்றால் வாழ்க்கையில் முன்னும் பின்னும் மேலே செல்ல நீங்கள் புரிந்து கொள்ள வேண்டும், சில நபர்களின் உதவி தேவைப்படும். இந்த வாழ்க்கையில் இது உங்கள் கற்றல் இருக்கும் 
 MULANK_DESC_TEXT1= நீங்கள்அடிப்படைக்கூறு எண் 1 இன் கீழ் பிறந்ததன் காரணமாக நீங்கள் மிகவும் லட்சியமாக உள்ளீர்கள், யாரையும் தடை செய்ய விரும்பவில்லை, மாறாக உங்கள் முதல் அனுபவம் மற்றவர்களுக்கும் வேலை செய்யும். சூரியன் உங்களுக்கு ஒரு சிறப்பு தாக்கத்தை ஏற்படுத்துகிறது. உங்கள் சித்தாந்தம் நிலையானது மற்றும் உங்கள் உறுதிப்பாட்டில் உறுதியானவர். நீண்ட கால உறவு அல்லது நண்பருடன் நீங்கள் காதலிக்கிறீர்களா? நீங்கள் ஒரு வகையான நபர், மற்றவர்களுக்கு நன்றி செலுத்துபவர். மரியாதைக்கு அதிக மரியாதை வேண்டும். உங்கள் கடின உழைப்பில் நீங்கள் ஒரு நல்ல பெயரைப் பெறுவீர்கள். அரசாங்க துறையில் உங்கள் செயல்திறன் பாராட்டத்தக்கது. நீங்கள் பொறுமையாக இருக்கின்றீர்கள், உங்கள் படிப்புக்கு முழுமையாக கவனம் செலுத்துகிறீர்கள். எதிர் பாலின மக்களிடம் நீங்கள் கவர்ந்திழுக்கிறீர்கள், அதனால்தான் சில நேரங்களில் ஏமாற்றப்படுகிறார்கள். நீங்கள் சமூக சேவை அரசியல் வேலை அல்லது மத சம்பந்தப்பட்ட பகுதிகளில் சிறப்பு அனுபவம் பெறுவீர்கள்.
 MULANK_DESC_TEXT2= முக்கியமாக சந்திரன் செல்வாக்கு காரணமாக, நீங்கள் மிகவும் உணர்ச்சி மற்றும் யாரோ ஒருவருடன் வேலை செய்ய விரும்புகிறார்கள். வாழ்க்கையின் ஒவ்வொரு அம்சத்திலும் ஒரு பங்குதாரர் தேவைப்படுகிறீர்கள். சில நேரங்களில் நீங்கள் நிறைய வேலைகளை ஆரம்பிக்கிறீர்கள் ஆனால் மனதில் மாற்றம் காரணமாக பல முறை அவர்கள் நடுவில் விட்டுவிடுகிறார்கள், இதன் காரணமாக நீங்கள் இழப்பு ஏற்பட வேண்டும். கலை மற்றும் கற்பனை மற்றும் காதல் மக்கள் யார் அந்த. நீங்கள் ஒரு திறமையான காதலனாக இருக்க முடியும் மற்றும் உங்கள் குடும்பத்திற்கு அர்ப்பணித்துள்ளீர்கள். நீங்கள் சகிப்புத்தன்மை இல்லாமல் இருக்கலாம். உங்கள் சமூக நிலை நல்லது, நீங்கள் சமூகத்தில் பிரபலமாக இருப்பீர்கள். நீங்கள் ஆராய்வதற்கான ஒரு நல்ல நண்பன். உங்கள் வாழ்க்கையில் பல ஏற்றம் மற்றும் தாழ்வுகள் உள்ளன, இதன் காரணமாக நீங்கள் பல திட்டங்கள் நடுவில் சிக்கி விடும். நீங்கள் உங்கள் சுய நம்பிக்கையை பலப்படுத்த வேண்டும்.
 MULANK_DESC_TEXT3= குரு பாதிக்கப்பட்ட எண் 3 ல் பிறந்ததால், நீங்கள் ஒரு மென்மையான இதய நபர் மற்றும் உண்மையான பேச்சாளர் மற்றும் அமைதி அன்பே. நீங்கள் லட்சிய மற்றும் பெரும்பாலான அரசாங்க வேலைகள் நன்றாக செய்ய. நீங்கள் ஒரு சர்வாதிகாரத்தை அடிக்கடி காணலாம். நீங்கள் ஒழுக்கத்தை மதிக்கிறீர்கள், எனவே, உங்களுடைய கீழ்த்தரமான மக்களுக்குக் கடினமாக இருக்கலாம். நீங்கள் உள்ளுணர்வை அறிந்திருக்கின்றீர்கள், நீங்கள் படிக்கும் போதனையைப் போன்று இருவரும் இருக்கின்றீர்கள், எனவே புத்திஜீவித துறையில் பல சாதனைகள் உள்ளன. நீங்கள் மனதார வலுவாக இருக்கிறீர்கள், உங்கள் நியாயமும் அறிவும் மிக நன்றாக இருக்கிறது. நீங்கள் தொண்டு மற்றும் அன்பளிப்புகளை நன்கொடையாக விரும்புகிறீர்கள். சில நேரங்களில் நீங்கள் சில விஷயங்களைப் பின்னால் ஆக்கிரமிப்பு இருக்கலாம். ஆனால் நீங்கள் சுய மரியாதை என்று உண்மை.
 MULANK_DESC_TEXT4= நீங்கள் ஹர்ஷால் அல்லது ராகுவின் பிரதான விளைவைக் கொண்டிருக்கின்றீர்கள். இதன் விளைவாக, நீங்கள் உலகத்திலிருந்து விலகிச் சிந்திக்கவும் புதியதை செய்யவும் முடியும். உங்கள் கருத்து மற்றவர்களிடமிருந்து எளிதாக கிடைக்காது என்பதால், பெரும்பாலான மக்கள் உங்களை எதிர்க்கத் தொடங்குகிறார்கள். நீங்கள் அதிக பணத்தை வசூலிக்க விரும்பவில்லை, ஆனால் உங்கள் மகிழ்ச்சியில் மகிழ்ச்சியாகவும் மூழ்கிவிடலாம். நீங்கள் முன்னமே யோசித்து உங்கள் எதிர்ப்பை வெளிப்படையாக வெளிப்படுத்துகிறீர்கள். உங்கள் இயல்பை யாரும் எளிதில் அடையாளம் காணமுடியாது, உங்கள் நிபுணத்துவத்தை மிகவும் சிறப்பானதாக ஆக்குகிறது. நீங்கள் எந்த வகையான நோயாளிகளும். சில நல்ல வேலைகளை செய்ய நீங்கள் பயன்படுத்தப்படுகிறீர்கள், ஆனால் உங்களுடைய இந்த நன்மையை மக்களுக்கு புரிய வைக்க விரும்புகிறீர்கள். நீங்கள் மிகவும் உணர்திறன் கொண்டவர்களாய் இருப்பதால் பெரும்பாலும் தனிமையில் இருப்பீர்கள். உங்கள் நண்பர்களின் எண்ணிக்கை குறைவாகவே உள்ளது, ஆனால் அவர்கள் அனைவரும் நேர்மையானவர்களாகவும் உண்மையுள்ளவர்களாகவும் உள்ளனர்.
 MULANK_DESC_TEXT5= புதன் செல்வாக்கு காரணமாக, நீங்கள் இன்னும் நண்பர்களுடனான நண்பன். நீங்கள் நட்பை நேசிக்கிறீர்கள், மேலும் உங்கள் நண்பர்கள் வட்டத்தில் அதிகமானோர் இருப்பார்கள். நீங்கள் உள்ளே வர்த்தகர்கள் இருப்பது பண்புகள் உடனடியாக கிடைக்கும். நீங்கள் அடிக்கடி லாபம் சம்பாதிக்க மற்றும் அவசரமாக பல விஷயங்களை செய்ய, நீங்கள் பாதிக்கப்பட வேண்டும். உங்களிடம் நிறைய வேதனைகள் உள்ளன. நீண்ட காலமாக நீங்கள் எதையும் வைத்துக்கொள்ளக்கூடாது, எனவே நீண்ட காலத்திற்கு விரக்தியடைய வேண்டாம். வேலையை விட வணிகத்திற்கு அதிக விருப்பம் இருக்கிறீர்கள். நீங்கள் அவசரத்தில், கோபத்தில், எரிச்சலிலும் இருக்கலாம். உங்கள் வாதம் நல்லது, உங்கள் பேச்சு கூட பயனுள்ளதாக இருக்கும். நீங்கள் கால இடைவெளியில் இருக்கிறீர்கள், மேலும் அறிவோடு தொடர்புடைய உங்கள் வேலையில் பெரும்பாலும் வெற்றி பெறுவீர்கள். நீங்கள் உடல் உழைப்பு வேலை செய்வதை விட அதிகமாக செய்கிறீர்கள். உங்கள் மிகுந்த பலம் என்னவென்றால் நீங்கள் எந்தவொரு சிரமத்திலிருந்தும் மிக விரைவாக வெளியே வர வேண்டும். உங்கள் மன வலிமையை தவறாக தவிர்க்க வேண்டும்.
 MULANK_DESC_TEXT6= சுக்ரன்  விளைவு காரணமாக, நீங்கள் அழகாகன தோற்றம் அளிப்பீர்கள். இது மட்டுமல்ல, கலை, பொழுதுபோக்கு இலக்கியம், ஆடை மற்றும் இசை ஆகியவற்றின் மீது நீங்கள் ஒரு போக்கு உள்ளீர்கள். நீங்கள் அலங்காரம் மற்றும் அலங்கரங்களுக்கு  நிறைய முக்கியத்துவம் தருவீர்கள், அதனால் மிகவும் அழகாக அனைத்து வேலை செய்ய. உங்கள் ஆளுமை காந்தமானது, இது மக்களின் கவனத்தை ஈர்க்கிறது. நீங்கள் பொறாமை அல்லது ஒரு பொறாமை உணர்வை உணரலாம், இது உங்களுக்கு ஏதாவது பிரச்சனையை உண்டாக்கும். நீங்கள் இன்னும் எதிர்ப்பை பொறுத்துக்கொள்ள முடியாது. யாராவது உங்கள் நண்பனை விரைவில் உருவாக்கிக்கொள்ளுங்கள். வீட்டிற்கு வரும் விருந்தினர்களை மதிக்க யாரும் உங்களைக் கற்றிருக்கவில்லை. நீங்கள் சில நேரங்களில் சுய பெரு அவமானம்எதிர் கொள்ள வேண்டும் மற்றும் மன அழுத்தத்தை எதிர்கொள்ள வேண்டும். எதிர் பாலின மக்களுக்கு உங்கள் போக்கு அதிகமாக உள்ளது. உங்கள் மிகப்பெரிய வலிமை, நீங்கள் விரைவாக யாரையாவது உருவாக்குகிறீர்கள்.
 MULANK_DESC_TEXT7= அடிப்படைக்கூறு எண் 7 இன் கீழ் பிறந்திருப்பது கேது அல்லது நெப்டியூனின் முக்கிய செல்வாக்காகும். நீங்கள் உள்ளார்ந்த மத வாதம் உள்ளது. உங்களுக்கு  கவிதைகள் மற்றும் ஓவியம் மிகவும் பிடிக்கும். மத விஷயங்களில் நீங்கள் மிகவும் கடினமாக இருக்க முடியும். உங்கள் மிகப்பெரிய பலம் எந்த நிகழ்வின் முன்னோடிகளும் மிகப்பெரிய பலம், மற்றவர்களின் மனம் புரிந்து கொள்ழும் திறன் உங்களுக்கு இருக்கிறது. இருப்பினும் மக்கள் உங்களை புரிந்து கொள்வது மிகவும் எளிது அல்ல. நீங்கள் ஒரு சுற்றுலா செல்வது. சுற்று பயணம் மற்றும் பயணம் செல்வதை மிகவும் விருப்புவீர்கள். உங்கள் வாழ்க்கையில் உடல் பொருட்களின் பற்றாக்குறை இருக்கலாம். நீங்கள் அறக்கட்டளை உங்கள் அசல் கருத்துக்களின் அடிப்படையிலான மேலும் சார்ந்த பணம் சம்பாதிக்க. நீங்கள் எதிர்காலத்தைப் பற்றி கவலைப்படுவீர்கள், எனவே நீங்கள் நல்ல வேலையைச் செய்வீர்கள். கற்பனையானது உங்களிடையே நல்லது, தங்களை ஈர்க்கும் சிறப்பு சக்தி மக்களுக்கு இருக்கிறது. நீங்கள் அடங்கியுள்ள ஒரு நல்ல தொழிலதிபரின் நல்லொழுக்கங்கள் மற்றும் கருத்துக்கள் மூலம் வாழ மற்றும் நீங்கள் அவர்களை பயன்படுத்தினால் எனவே நீங்கள் ஒரு வெற்றிகரமான தொழிலதிபர் ஆக முடியும். மற்றவர்களை பாதிக்கும் கலை  மிகப்பெரிய சிறப்பு.
 MULANK_DESC_TEXT8= உங்கள் சொந்த இயல்பை விட நீங்கள் கடினமாக உழைக்கிறீர்கள், உங்கள் இரகசியம் ராதாவின் இந்த அம்சத்தில், சந்திரன் இறைவன். நீங்கள் எந்த நிறுவனத்திலும் மிக முக்கியமான இணைப்புதான், ஆனால் உங்கள் கடின உழைப்பால் பெரும்பாலும் மக்கள் குறைத்து மதிப்பிடப்படுகிறார்கள். தனிமை மற்றும் மனச்சோர்வை நீங்கள் தொந்தரவு செய்யலாம். நீங்கள் வாழ்க்கையில் மெதுவாக முன்னேறலாம், ஆனால் உங்கள் முன்னேற்றம் நிச்சயம். நீங்கள் குறைந்த வெளிப்புற தோற்றம் கொண்டிருப்பதால், சமுதாயத்தில் உங்கள் முக்கியத்துவத்தை குறைவாக புரிந்து கொள்ள முடியும். உன்னுடைய அர்த்தத்தை உன் வேலையில் இருந்து நீ வைத்துக்கொள்வாய், அதை நிறைவேற்றுவதன் மூலம் அதை நிறைவேற்றுவாய். நீங்கள் மிகவும் லட்சியமாக உள்ளீர்கள், எந்த இலட்சியத்தையும் அடைவதற்கு கடினமாக உழைக்க மறுக்கவில்லை. நீங்கள் மிகவும் அன்பும் உணர்வும் கொண்டவர். நீங்கள் விதியின் ஒரு விசுவாசி மற்றும் சில மத போக்குகளைக் கொண்டிருக்கின்றீர்கள். நீங்கள் பெரும்பாலும் உயர் பதவிகளை அடைந்து எப்போதும் தியாகம் செய்யத் தயாராக உள்ளீர்கள். நீங்கள் இல்லாதபோதும் மக்களை நினைவில் வைத்துக்கொள்வதை நீங்கள் அடிக்கடி செய்கிறீர்கள். நீங்கள் வாழ்க்கையில் மிகவும் வெற்றிகரமானவராக அல்லது மிகவும் தோல்வியுற்றவர்களாக உள்ளீர்கள், மேலும் நீங்கள் எந்த அளவிற்கு நம்பிக்கைக்குள்ளாக்கப்படுகிறீர்களோ அதை சார்ந்திருக்கிறது.
 MULANK_DESC_TEXT9= இந்த எண்ணில்  பிறந்ததால், நீங்கள் செவ்வாய் தேவதையின் ஆற்றல் மற்றும் சக்திகளைப் பெறுவீர்கள், இதன் காரணமாக நீங்கள் தைரியமானவர்களாகவும், சிரமங்களைக் கண்டு பயப்படக் கூடாது. மக்களின் ஆட்சி அல்லது தலைமையை நீங்கள் மாற்றியிருக்கலாம். ஆனால் நீங்கள் சில நேரங்களில் கோபமாக ஆகிவிடுகிறீர்கள், ஏனென்றால் பலவிதமான கஷ்டங்கள் உனக்கு முன்னால் உள்ளன. நீங்கள் சுறுசுறுப்பாகவும் விரைவாகவும் உள்ளே வருகிறீர்கள் உங்கள் வாழ்க்கை மோதல் மற்றும் உங்கள் எதிரிகள் இன்னும் இருக்கிறது. எனினும், உங்கள் தைரியத்தின் பலத்தில் இவை அனைத்தையும் நீங்கள் சந்திக்கிறீர்கள். நீங்கள் சுயாதீனமாக இருக்க விரும்புகிறீர்கள், நீங்கள் எளிதாக எந்தவிதமான செல்வாக்கையும் கொண்டிருக்கவில்லை. நீங்கள் முட்டாள்தனமான மக்களுக்கு எச்சரிக்கையாக இருக்க வேண்டும். அன்பையும் அனுதாபத்தையும் பெற நீங்கள் எதையும் செய்ய முடியும். நீங்கள் உங்கள் விமர்சனத்தை சகித்துக் கொள்ளாதீர்கள், எனவே நீங்களே கட்டுப்படுத்த முயற்சிக்க வேண்டும், ஏனென்றால் தீவிர உந்துதலில் நீங்கள் எந்த அளவிற்கு செல்ல முடியும். உங்கள் கோபத்தை கட்டுப்படுத்த முடிந்தால், நீங்கள் வாழ்க்கையில் மிகவும் அதிர்ஷ்டசாலி அடைவீர்கள், வெற்றி கிடைக்கும்.
 NAMANK_DESC_TEXT1 = <p>உங்கள் பிறந்த எண் 1 என்றால், எண் கணிதம் படி நீங்கள் ஆற்றல், சுறுசுறுப்பான, ஆழ்ந்த, மற்றும் கலை ஆர்வம்.ஒரு பிறந்த எண் 1 சொந்தமாக, நீங்கள் பொதுவாக எந்த வரிசையையும் பிடிக்க விரும்பவில்லை, ஆனால் அதற்கு பதிலாக முன்னணி எடுக்க விரும்புகிறார்கள். உன்னுடைய உள்ளுணர்வு சக்திகள் எப்பொழுதும் வேலை செய்கின்றன. இயல்பாகவே நேர்மையாக, உங்கள் தவறுகளை மனதார ஏற்றுக்கொள்கிறீர்கள். இயற்கையால் ஆவிக்குரிய இடத்தில் நின்று, நீங்கள் சந்தோஷமாக இருக்கிறீர்கள், எப்பொழுதும் புன்னகைத்து, உங்கள் வாழ்க்கைத் திட்டங்களைப் பற்றி மிகவும் நம்பிக்கையுடன் இருக்கிறீர்கள்.</p><p><b>வாழ்கைலட்சியம்: </b>நீங்கள் உளவியல் விட மன வேலை நோக்கி பாராட்டுகிறோம்.நீங்கள் பயணம் மற்றும் கண்காணிப்பு மூலம் அறிவு பெறலாம். பிறப்பு எண் 1 கொண்ட நபர்கள் நல்ல எழுத்தாளர்களாகவோ அல்லது நல்ல செய்தியாளராகவோ ஆகலாம், மேலும் செயலில் மற்றும் ஆக்கப்பூர்வமான மனதுடன் ஆசீர்வதிக்கப்படுகிறார்கள்.</p>
 NAMANK_DESC_TEXT2 = <p>இந்த எண்ணம் உயர் கற்பனை, கருத்துவாதம் மற்றும் கனவு நிறைந்த இயல்பு, அவர்களின் கற்பனை உலகில் வாழ்கிறது. முதலிடத்தைப் போலல்லாமல், மற்றவர்களால் ஒழுங்கமைக்கப்பட்ட திட்டங்கள் மற்றும் செயல்திட்டங்களின் நிறைவேற்றுபவர். உண்மையிலேயே போர் வீரர்களாக நீங்கள் காணும் மற்றவர்களின் நல்வழியில் இயல்பு, தன்னலமற்ற மற்றும் எப்பொழுதும் சிந்திக்க வேண்டும். </p><p><b>வாழ்கை லட்சியம்:</b>பிறப்பு எண் 2 பேர் நல்ல கூட்டாளராகவும் கூட்டுப்பணியாளராகவும் இருப்பதால், அவர்கள் கூட்டாளி வணிகத்தில் நன்றாகவே செய்வார்கள். நீங்கள் மிகவும் அமைதியற்றவர்களாகவும், காதலன் மாற்றாகவும் இருப்பதால், எப்பொழுதும் பயணிக்க வேண்டும், இது நிறைய பயணங்களை உள்ளடக்கிய வேலைகளில் நீங்கள் சிறப்பாக செயல்படுகிறது. இயற்கையால் கற்பனை செய்துகொள்வது.</p>
 NAMANK_DESC_TEXT3 = <p>பிறந்த எண் 3 என்பது அறநெறி, தெய்வீக அன்பு மற்றும் நீதியை இரக்கத்துடன் குறிக்கிறது மற்றும் பெரிய உயரதிகாரிகள் என அழைக்கப்படுகிறது. உன் வாழ்க்கையில் உன் பக்கம் விதியை வைத்திருக்கிறேன். இது உங்கள் வாழ்க்கைக்கு நல்லது என்று எல்லாவற்றையும் ஈர்க்கிறது, அதன் விளைவாக நீங்கள் பிரகாசிக்கிறீர்கள். நீங்கள் கடினமாக உழைக்கிறீர்கள் வேலை செய்ய விரும்புகிறேன். மரியாதைக்குரிய ஒரு தலைவனைப் பெற்றவர், உங்கள் குறிக்கோள் சிறந்தது. </p><p><b>வாழ்கை லட்சியம்: </b>Yநீங்கள்  நீதிபதிகள், திறமைவாய்ந்த, உலகின் ஆசிரியர்கள் மற்றும் தத்துவவாதிகள். </p>
 NAMANK_DESC_TEXT4 = <p>பிறப்பு எண் 4 மக்கள் சக்தி,மற்றும் முன்னேற்றத்தை வெளிப்படுத்துகின்றனர். அவர்கள் மனதில் அதிக திறன்களை கொண்டவர்கள். இந்த எண்ணிக்கையின் தனித்துவமான தன்மை என்பது வாழ்க்கை மற்றும் சமுதாயத்தில் ஏற்படும் மாற்றங்களை தொடர்ந்து நோக்குவதாகும், மேலும் சுற்றுச்சூழல் மற்றும் சமுதாயத்தின் அடிமைத்தனத்திலிருந்து மனதை விடுவிப்பதன் பின் அது தான். நீங்கள் உங்கள் வருடங்களுக்கு முதிர்ச்சி அடைகிறீர்கள். நான்கு பேரும் அசாதாரணமானவர்களாகவும் வித்தியாசமானவர்களாகவும் சில நேரங்களில் விதிகள் மீது கிளர்ச்சி செய்ய வேண்டிய அவசியத்தை உணர்கிறார்கள். </p><p><b>வாழ்கை லட்சியம்: </b>பிறந்த எண் நான்கு சிறந்த எழுத்தாளர், தொழிலதிபர் மற்றும் அரசியல்வாதிகள் செய்கிறது.</p>
 NAMANK_DESC_TEXT5 = <p>வாழ்க்கையின் இரகசிய மர்மங்களில் நீங்கள்  மிகவும் ஆர்வம் காட்டுகிறாய். உங்கள் ஒரே அடிப்படை தேவை அனைத்து நேரம் நகர்த்துவதால் இயல்பு மூலம் நீங்கள் சில ஒரு புதிய இலக்கை நோக்கி செல்கிறது. ஒரு நபர் ஒரு நல்ல மற்றும் தீய பக்க இருவரும் உள்ளது. நீங்கள் குழந்தைகளுடன் நேரத்தை செலவழித்து அன்புடன் முதல் இடத்தில் குடும்ப கவலைகளை வைக்கிறீர்கள். உங்களுடைய ஆன்மீகத் தன்மையைப் பற்றிக் கவலைப்படுவதும் மத ஆன்மாவும். </p><p><b>வாழ்கை லட்சியம்: </b>நீங்கள் விளையாட்டுகளை அனுபவிக்கிறீர்கள், எனவே இது ஒரு வாழ்க்கையாக இதை எடுத்துக் கொள்ளலாம். உங்கள் அறிவார்ந்த மனம், கல்விமானிய மற்றும் ஆராய்ச்சியாளர்களாக உன்னதமாக பொருந்துகிறது. </p>
 NAMANK_DESC_TEXT6 = <p>நீங்கள் ஒரு கலைஞர் மற்றும் அழகு பிறந்தார் மற்றும் கலை நீங்கள் மிகவும் ஈர்க்கிறது. அழகானவர்கள் சொற்களால் மட்டும் அல்ல ஆனால் நீங்கள் உறவுகளில் அழகு நேசிக்கிறீர்கள். நீங்கள் முரண்பாடுகளை முயற்சி செய்து தவிர்க்க வேண்டும், ஏனெனில் சச்சரவு அல்லது கருத்து வேறுபாடு உங்களை சங்கடப்படுத்துகிறது. உங்கள் அன்பான இயல்பு உங்களை ஒரு சூடான, முக்கிய மற்றும் அழகான மனிதனாகப் பார்க்கிறது. நீங்கள் மற்றவர்களைப் பிரியப்படுத்த விரும்புகிறீர்கள். இயற்கையால் நீங்கள் விரும்பும் மற்றும் நம்பிக்கைக்குரியவராக உள்ளீர்கள் </p><p><b>வாழ்கை லட்சியம்:  </b>நீங்கள் இசை, நடனம் கவிதை மற்றும் படைப்பாற்றல் செய்ய வேண்டும் என்று எதையும் ஆர்வமாக உள்ளீர்கள். </p> 
 NAMANK_DESC_TEXT7 = <p>நீங்கள் உங்கள் தனித்துவமான அசல் மற்றும் சுதந்திரத்திற்காக அறியப்பட்டிருக்கிறீர்கள். ஒரு பறவை போன்ற உற்சாகமாக நீங்கள் பாரம்பரிய பாண்டேஜ் மற்றும் நிறுவப்பட்ட விதிமுறைகள் மற்றும் சமூகத்தின் கட்டுப்பாடுகள் உடைக்க விரும்புகிறேன். மக்கள் உங்களை ஒரு மர்மமான ஒரு பிட் மற்றும் பல முறை உங்கள் மனதில் எண்ணம் இருப்பதைக் காணலாம். எண் 7 மக்கள் வழக்கமாக அறிவுரை மற்றும் பகுப்பாய்வு மற்றும் சூழ்நிலைகள் மற்றும் சிக்கல்களில் காரணம் மற்றும் விளைவு தீர்மானிக்க முடியும். வாழ்க்கையில், நீங்கள் எதை உணர்ந்துகொள்கிறீர்கள் என்பதைச் சாதிக்க பல தனிப்பட்ட தியாகங்களை நீங்கள் செய்கிறீர்கள். </p><p><b>வாழ்கை லட்சியம்: </b>உங்களுடைய உள்ளுணர்வு இயல்பு காரணமாக வீட்டிலிருந்து புதிய மற்றும் கவர்ச்சியான மற்றும் இன்னும் அதிகமான வாய்ப்புகளைத் தவிர்ப்பதற்கு நீங்கள் மிகவும் துணிச்சலானவர். சாகசத்திற்கான உங்கள் தாகத்தை திருப்திப்படுத்தும் எந்தவொரு தொழிற்துறையிலும் ஒரு சிறந்த தேர்வாக இருக்கிறது.</p> 
 NAMANK_DESC_TEXT8 = <p>பிறப்பு எண் 8 நபர் தீவிரமான மற்றும் தத்துவமானது. எண் 8 உறுதிப்பாடு, நிலைத்தன்மை மற்றும் விடாமுயற்சி ஆகியவற்றின் அடையாளமாகும். கடினமான வெளியில் இருந்தாலும், உள்ளே நீங்கள் ஒரு சூடான மற்றும் அக்கறையுள்ள நபர். எதிர்காலத்தைப் பற்றி நீங்கள் மிகவும் எச்சரிக்கையாக இருக்க வேண்டும், எப்போதும் எச்சரிக்கையுடன் முடிவு செய்யுங்கள். உங்கள் இலக்குகளை அடைய நீங்கள் பெரும் திசைகளால் செல்ல முடியும். </p><p><b>வாழ்கை லட்சியம்: </b>பொதுமக்களின் கண்களில் நீங்கள் பிரம்மாண்டமான மற்றும் பெரும்பாலும் வெற்றிகரமானவராக உள்ளீர்கள். நீங்கள் மற்றவர்களை ஊக்குவிக்க முனைகின்றீர்கள். இதன் விளைவாக பெரிய மான்ஸர்கள், நிர்வாகிகள் மற்றும் வியாபார மனிதர்களை நீங்கள் உருவாக்கிக் கொள்ளலாம். அரசு வேலைகள் மற்றொரு பெரிய விருப்பம்.</p>
 NAMANK_DESC_TEXT9 = <p>இயல்பாக நீங்கள் வலுவான விருப்பம் மற்றும் தைரியமுள்ளவர். நீங்கள் சூடான தலைவனை வெறுக்கிறீர்கள் ஆனால் சண்டை மற்றும் எதிர்ப்பை சமாளிக்க முடியும். மற்றவர்கள் உன்னை எதிர்த்து நின்று உன்னை நேசிக்கிறார்கள், உன்னை மதிக்கிறார்கள். நீங்கள் உங்கள் சொந்த விதியின் மாஸ்டர் இருக்க வேண்டும் மற்றும் நீங்கள் எளிதாக ஒரு பெரிய தலைவர் இருக்க முடியும். நீங்கள் மிகவும் மனிதாபிமான மனிதர், உங்களுடன் உங்கள் நண்பர்களை அழைத்துச் செல்வதை நம்புகிறீர்கள். ஒரு வாய்ப்பு கொடுக்கப்பட்டால் நீங்கள் மற்றவர்களுக்கு உதவ வேண்டும். உங்கள் குடும்பத்தாரும் வீட்டாரும் வலுவாக இணைந்திருக்கிறார்கள், அவர்களுடன் நேரம் செலவிடுகிறார்கள். </p><p><b>வாழ்கை லட்சியம்:</b>ராணுவம், அரசியல், போதனை மற்றும் சமூக சேவைகள் உங்களுக்கு வேலை.</p>  
