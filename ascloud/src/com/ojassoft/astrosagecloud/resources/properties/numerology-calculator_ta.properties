 NAMANK_TEXT = பிரபஞ்ச சக்திகள் உங்கள் பெயரின் எண்ணிக்கையை கருத்தில் கொண்டு ஒரு தனிநபரின் வாழ்க்கை முறையை தீர்மானிக்கின்றன. நாமங் அல்லது பெயர் எண்ணிக்கை பெறப்பட்ட  எல்லா எழுத்துக்களிலும்  உங்கள் முழு பிறந்த பெயர்  சொல்லுதல் என்னவென்று அழைக்கப்படுகின்றன அல்லது பெயர் எண். இந்த எண்ணிக்கை உங்கள் திறமையெய் வெளிப்படுத்தும்  மற்றும் இந்த வாழ்நாளில் உங்கள் வசம் உள்ள மனப்பான்மை, நீங்கள் அவற்றை உருவாக்கவும் மற்றும் பயன்படுத்தவும். உங்கள் பெயர்  உங்கள் உண்மையான  அதிர்வு ,காலப்போக்கில் அது கடந்து சென்றது போல் உங்கள் ஆத்மாவின் மெல்லிசை மற்றும்  உலகத்தில் பதிவு செயுங்கள்.\n\nஉங்கள் பெயரை ஆய்வு செயுங்கள் @@userName$,  பரிந்துரை செயுங்கள் உங்கள் நாமங் அல்லது பெயர் எண்ணிக்கை @@namamkNumber$. உங்கள் பெயர்  எண்ணின் சில அடிப்படையின் குணாதிசயங்களை நீங்கள் எடுத்துக் கொள்ளலாம் @@namamkNumber$.
 MULANK_TEXT = @@userName$,உங்கள் கணித எண்ணிக்கையில் கணிதம் என்பது நீங்கள் பிறந்த நாளின் தேதி. இந்த எண் உங்கள் பாத்திரம், ஆளுமை மற்றும் தனித்துவத்தின் முக்கிய கூறுகளை அடையாளம் காண முடியும். இந்த எண் உங்கள் மொத்த இருப்பது முக்கிய உறுப்புகள் தீர்மானிக்கிறது. நீங்கள் மேலாதிக்கம் செய்கிறீர்களா அல்லது வெட்கப்படுகிறீரோ, ஒரு தலைவர் அல்லது ஒரு பின்தொடர்பவர் என்பதைப் போன்ற விஷயங்கள். ஒவ்வொரு காரணத்திற்கும் காரணம் அதன் சொந்த தன்மை மற்றும் தனிப்பட்ட அதிர்வு. கவனமாக பகுப்பாய்வு செய்த பின், உங்கள் எண்களின் பிறப்பு எண் பின்வருமாறு வடிவமைக்கப்பட்டுள்ளது: உங்கள் அடிப்படைக்கூறு எண் @@radicalNumber$.
 DESTINY_TEXT1=நீங்கள் பெரிய தலைமை திறமை கொண்ட ஒரு லட்சிய நபர். இதன் விளைவாக, நீங்கள் மக்களுடன் நன்றாகப் பணியாற்றி, அவர்களின் ஆதரவைப் பெறுவீர்கள், உங்கள் இலக்குகளை நிறைவேற்றும் திறன் உடையவர்கள். உங்களுக்கு மட்டுமல்ல, பல நண்பர்களையும் நீங்கள் விரும்புவதற்கு எப்போதும் இருப்பீர்கள். பொருளாதார ரீதியாக, நீங்கள் செழிப்பீர்கள், ஆனால் நீங்களும் அனுபவிக்கவும், ஆடம்பரமாகவும், பணக்காரராகவும் வாழவும் விரும்புகிறவர். அரசியலில் வெற்றி பெறுவீர்கள். அரசாங்கத்துடனான நலன்களைப் பெற நல்ல வாய்ப்பு உள்ளது. விதியை எண் 1 கீழ் பிறந்தால், நீங்கள் மக்களிடமிருந்து மரியாதை பெற விரும்புகிறீர்கள், அதை நீங்கள் பெறுவீர்கள். எனினும், நீங்கள் அதிக செலவுகளை தவிர்க்க வேண்டும், அதே போல் சூதாட்ட அல்லது பந்தயம் போகிறது. உங்கள் சுதந்திரத்தை பயன்படுத்துவதில் ஜாக்கிரதையாக இருங்கள், அதிக ஆபத்தை எடுத்துக் கொள்ளாதீர்கள், உங்கள் அறநெறி மற்றும் நெறிமுறைகளை பின்பற்றவும்.
 DESTINY_TEXT2=நீங்கள் மிகவும் மென்மையான, விவேகமுள்ளவர், நன்கு விரும்பிய நபர், கூட்டுடன் பணிபுரிய விரும்புகிறீர்கள். ஒரு கற்பனை, காதல் மற்றும் ஒரு படைப்பு நபர், நீங்கள் எப்போதும் பெண்கள் மதிக்கிறவர். இருப்பினும், நீங்கள் அடிக்கடி வலுவான மன திறன் இல்லாததால் அனுபவிக்கிறீர்கள், நீங்கள் பெரும்பாலும் உங்கள் பணியை முடிக்கா மாட்டிர்கள்  உடல் ரீதியாக, நீங்கள் சிறிது பலவீனமானவர்கள், மற்றவர்கள் உங்களை எளிதாகப் பயன்படுத்துகிறார்கள். எனவே, நீங்கள் உங்களைக் கையாளவும் சுய நம்பிக்கையைப் பராமரிக்கவும் கற்றுக்கொள்ள வேண்டும். அதே தொனியில், நீங்கள் எடுக்கும் அனைத்து பணிகளையும் பூர்த்தி செய்து சிக்கல்களின் முகத்தில் அமைதியாக இருங்கள். அதோடு மட்டுமல்லாமல், நீங்கள் சுற்றியுள்ள உற்சாகமான மக்களை எச்சரிக்க வேண்டும்.
 DESTINY_TEXT3=நீங்கள் மற்றவர்களுக்காக ஒரு உத்வேகம் ஆதாரமாக இருக்கின்றீர்கள், மேலும் உரையாடல் என்பது உங்களுடைய முக்கிய பண்பு ஆகும். நீங்கள் உள்ளே ஒரு நான்கு பரிமாண சிலை உள்ளது, அதனால் தான் நீங்கள் ஒருவரின் உதவியாளராக இருக்க விரும்பவில்லை. நீங்கள் ஒழுக்கமாக இருப்பினும், உங்கள் அன்பு தூய்மையானது. நீ நீதியை விரும்புகிறாய், மிகவும் புத்திசாலி. அதே சமயத்தில், நீங்கள் ஒரு தொலைநோக்கு பார்வை மற்றும் நகைச்சுவை  திறன் உங்கள் குணங்கள் ஒன்றாகும். நீங்கள் நடைமுறைக் கோட்பாடுகள் உள்ளன. நீங்கள் அதிக செலவை தவிர்க்க வேண்டும் மற்றும் பொறாமை இயல்பு இருந்து தப்பிக்க முயற்சி செய்ய வேண்டும். பணக்காரனாகவோ ஞானியாகவோ மாறிவிடாதீர்கள். இரண்டு நபர்களை ஆளுமை மற்றும் கோபத்தை கட்டுப்படுத்த வேண்டியது அவசியம், மேலும் கெட்ட மனிதர்களின் சங்கமும் பயனற்றதா என்பதை நிரூபிக்கும்.
 DESTINY_TEXT4=உங்களுடைய வாழ்க்கையில் ஏராளமான ஏற்றத்தாழ்வுகள் உள்ளன, பல சம்பவங்கள் திடீரென்று நடக்கும், உங்களுக்கும் நல்ல மற்றும் மோசமான முடிவுகளை வழங்கும். நீங்கள் எளிதாக உங்கள் வாழ்க்கையில் முன்னேற்றம் உச்சத்தை அடைய முடியும், ஏனெனில் நீங்கள் நாற்காலியில் இருந்து கீழே வந்து, ஆனால் மக்கள் மத்தியில் சதிக்க முடியும். உங்கள் அணுகுமுறை மற்றவர்களிடமிருந்து வித்தியாசமானது, நீங்கள் எந்தத் துறையில் மகிமையும் உள்ளீர்கள். நீங்கள் உருவாக்கிய சட்டங்கள் மற்றும் பழக்கங்களை நீங்கள் எதிர்க்கிறீர்கள், தொடர்ந்து புதிய விதிகள் உருவாக்க முயற்சி செய்கிறீர்கள். நீங்கள் மிகவும் புத்திசாலி, உங்கள் உளவுத்துறை கூர்மையானது. நீங்கள் மிகவும் உணர்ச்சிகரமான மற்றும் உணர்ச்சிவசப்படாமல் தவிர்க்க வேண்டும் மற்றும் அவநம்பிக்கை சிந்தனை இருந்து விலகி இருக்க வேண்டும். நீங்கள் வாய்ப்புகளை அடையாளம் காணவும், உங்கள் ஆக்கிரமிப்பு கட்டுப்பாட்டின் கீழ் வைத்திருக்கவும் கற்றுக்கொள்ள வேண்டும்.
 DESTINY_TEXT5=நீங்கள் ஒரு நல்ல நண்பனாக இருப்பதை நிரூபிக்கிறீர்கள், போதிய மனநிலையில் இருக்கிறீர்கள். சூதாட்டம் மற்றும் வர்த்தகம் ஆகியவற்றில் நீங்கள் பந்தயம் கட்டலாம். நீங்கள் ஒரு நல்ல வியாபாரத்தை இயக்க முடியும். உங்களிடம் பேசுவதற்கு பழக்கம் உண்டு, அதனால்தான் உன்னுடைய வேலையை எடுத்துக்கொள்கிறாய். இருப்பினும், பல முறை பணத்தை சம்பாதிக்க மேஜையில் நெறிமுறைகளை வைத்துள்ளனர். நீங்கள் உங்கள் ஆற்றலைப் பயன்படுத்தி கவனம் செலுத்த வேண்டும், மகிழ்ச்சியற்ற சூழ்நிலையிலிருந்து நீங்களே விலகிச் செல்லுங்கள். உங்கள் உளவுத்துறை மற்றும் புத்திசாலித்தனம் காரணமாக உங்கள் நிதி நிலை சிறப்பாக இருக்கும், குறிப்பாக நீங்கள் வணிகத்தில் முன்னேற்றம் செய்யலாம்.
 DESTINY_TEXT6=நீங்கள் எல்லோருக்கும் பிரியமானவர்கள், நல்லொழுக்கம் உள்ளவர்கள். நீங்கள் மற்றவர்களிடம் அக்கறை காட்டுவதையும், படைப்பாற்றலும் படைப்பாற்றல் கொண்டவர்களாகவும் கருணை காட்டுகிறீர்கள். உங்கள் ஆளுமை நான்கு பரிமாண ஈர்ப்பு உள்ளது, சில நேரங்களில் நீங்கள் உங்கள் வேலை அர்ப்பணித்து இல்லை, இது பாதிக்கப்பட வேண்டும். நீங்கள் உள்ளே காதல் உள்ளார்ந்த மற்றும் நீங்கள் அழகான விஷயம் நேசிக்கிறீர்கள் மற்றும்  நீங்கள் பொழுதுபோக்கு அனுபவிக்கிறீர்கள். குருட்டுத்தனமாகவோ அல்லது அவசரத்தில் நடிக்கிறவராகவோ இருந்து நீங்கள் விலகிவிட வேண்டும். மது மற்றும் போதைப்பொருட்களிலிருந்து விலகி இருங்கள், அதிகமான சமூக நடவடிக்கைகளில் ஆர்வம் காட்டாதீர்கள்
 DESTINY_TEXT7=நீங்கள் மிகவும் ஆன்மீக இருக்க முடியும் மற்றும் உண்மையை தேட எந்த வேலை பகுப்பாய்வு. மற்றவர்களைப் புரிந்துகொள்ள உதவும் ஒரு தெய்வீக பார்வை உங்களுக்கு இருக்கிறது. மற்றவர்களுடைய மற்றவர்களின் மதிப்பை விளக்க நீங்கள் வேலை செய்யலாம் மற்றும் வெளிநாடுகளுக்கு நல்ல இடங்களுக்கும் நாடுகளுக்கும் செல்லுங்கள். நீங்கள் மற்றவர்களிடம் ஒரு பெரிய தாக்கத்தை ஏற்படுத்தி, உங்களைச் சுற்றி நேர்மறையான ஆற்றலைக் கொண்டிருக்கிறீர்கள். உங்கள் மனதில் கஷ்டப்படுவதை நீங்கள் தவிர்க்க வேண்டும். இன்பத்திற்கு உலக வேறுபடுகிறார்கள் இல்லை இருங்கள் நீங்கள் சரியான அல்ல அவர்களின் செயல்களை நீங்கள் மற்றும் சிந்திப்பதில்  மற்றம்  இருக்க வேண்டும்.
 DESTINY_TEXT8=உங்கள் உடல் மற்றும் ஆன்மீக வாழ்வில் ஒரு நல்ல சமநிலை உள்ளது. நீங்கள்  சக்திவாய்ந்த இலட்சியத்தின் தலைவன், நீயும் மன்னிக்கிறாய். உன் இதயம் பெரியது நீங்கள் உள்ளே முன்கூட்டியே உள்ளது. நீங்கள் அடிக்கடி சோகமாகவும் தனிமையாகவும் உணர்கிறீர்கள், இது காரணமாக மிகவும் உணர்ச்சிகரமானதாக இருக்கிறது. நீங்கள் மிகவும் வெற்றிகரமான அல்லது மிகவும் வெற்றிகரமாக இருக்கும். நீங்கள் கடமை அளிக்க சொத்தினை முக்கிய சாதனையாகும்  மற்றும் பக்தி வேண்டும். நீங்கள் பதற்றம் விட்டுக் கொடுக்காதே மற்றும் நீங்கள் வேலை தொடர்பான விஷயங்களில் வெளிப்படையாக உங்கள் கருத்துக்களை உங்களுடனே வைத்துக்கொள்ள  வேண்டும். ஆனால் எப்போதும் உங்கள் புள்ளி வலியுறுத்துகின்றனர் தவறு, பல தவறுகள், அவர்கள் ஏற்றுக்கொள்ளும் அவரை எங்கள் எதிர்கால மற்றும் தனிமை பற்றி அவநம்பிக்கை  தவிர்க்கவும்
 DESTINY_TEXT9=வாழ்க்கையின் ஆரம்பத்தில் நீங்கள் சிரமங்களை எதிர்கொள்ள வேண்டியிருக்கும், ஆனால் நீங்கள் ஒரு நல்ல அரசியல்வாதியாக இருக்கலாம். நீங்கள் கலை மற்றும் அவசர வேலை மற்றும் இலவச உணர முடியும். நீங்கள் உள்ளே ஒரு மிகப்பெரிய நிறுவன சக்தி உள்ளது, ஆனால் அது விரைவில் எல்லாம் சரி இல்லை. வாழ்க்கையில் உள்ள விஷயங்களை ஏற்கனவே நீங்கள் உணர்ந்திருக்கலாம். நீங்கள் உதவிகரமான மற்றும் தாராள மனப்பான்மை உள்ளவர் . உங்கள் கோபத்தை நீங்கள் கட்டுப்படுத்த வேண்டும். மேலும், உங்கள் அதிகாரிகளை தொந்தரவு செய்யாதீர்கள். எப்பொழுதும் எதிர்மறையான சூழ்நிலையைத் தவிர்க்க தயாராக இருக்க வேண்டும், நிதி ரீதியாக நீங்கள் பணக்காரனாக இருக்கலாம்
 PLACE_TEXT1=இந்த கிழக்கு திசையில் உங்களுக்கு வெற்றி மற்றும் பாராட்டுக்கள் கிடைக்கும். எனவே நீங்கள் உங்கள் வீட்டின் முக்கியமன நுழைவு வாயிலில் கிழக்கு திசையில் அமைக்கவும். மேலும், உங்கள் வேலை கிழக்கு திசையில் இருந்தால் மிகவும் நல்லது,  பிறகு செழிப்பு உங்கள் வாழ்க்கையில் நிச்சயம் வரும். இந்திய, பாகிஸ்தான், துருக்கி, பர்மா, ஆப்கானிஸ்தான் மற்றும் ஹாங் காங் மற்ற நாடுகள் உங்களுக்கு சாதகமாக இருக்கும், எல்லா சூழ்நிலைகளிலும்.
 PLACE_TEXT2=இந்த வடக்கு -மேற்கு திசையில் (வயயா கான்) உங்களுக்கு சிறந்ததாக இருக்கும், மற்றும் இந்த திசையில் எந்த முயற்சியும் உங்களுக்கு பெரும் சாதனைகளைக் கொண்டு, வெற்றிகரமாக புதிய உயரத்துக்கு உங்களை அழைத்துச் செல்லும். உங்களுக்கு வரவிருக்கும் சாதகமன இடங்கள்; லண்டன், திபெத், பிரான்ஸ், ஜெர்மனி, இலங்கை, டெல்லி, மற்றும் காபூல்  உங்களுக்கு நன்மை தரும்.
 PLACE_TEXT3=உங்கள் வேர் எண் 3 எனவே, இந்த வடக்கு - கிழக்கு  திசையில் (இஷானி மூல) ஏன்பதால் உங்களுக்கு நல்ல அதிர்ஷ்டம், செழிப்பு மற்றும் செல்வம். கூடுதலாக வாழ்கை மற்றும் பணிபுரியும் இடங்கள் யூகே, நேபால், ஹொலண்ட், டென்மார்க், பூட்டான் போன்றவை உங்களுக்கு வெற்றியெய் தரும்.  
 PLACE_TEXT4=நீங்கள் முயற்சி கொள்வீர்கள் வேலை மற்றும் வாழ்கை தெற்கு -மேற்கு (நைரிதியா மூல ) திசையில் தொடங்குவதற்கு அது உங்களுக்கு மிக சிறந்த நிரூபிக்கும். அதே நரம்பு, இத்தாலி, குவைத், ஹங்கேரி, வாஷிங்டன், மும்பை உங்களுக்கு மங்களகரமான இடங்கள் ஆகும் மற்றும் உங்களுக்கு சாதகமாக தீர்வு கிடைக்கும்.
 PLACE_TEXT5=வடக்கு திசையில் உங்களுக்கு மிகவும் சாதகமானதக இருக்கும். நீங்கள் வேர் 5 கீழ் பிறந்தவராவார். எனவே, இந்த திசையில் உங்கள் வேலையில் வெற்றி, சந்தோசங்கள் மற்றும் செழிப்பு கன்பீர்கள். குறிப்பாக, கொரியா, சவூதி அரேபியா, ஸ்பெயின், அமெரிக்கா, கோவா, மற்றும் பிராகுகே  ஆகிய இடங்கள் உங்களுக்கு மிக மங்களகரமாக இருக்கும்.   
 PLACE_TEXT6=இந்த அக்கினி மூலம்  அதாவது, தெற்கு -கிழக்கு திசை உங்களுக்கு வெற்றி மற்றும்  சாதகமான தீர்வை குடுக்கும். எனவே,  இந்த திசையில்  உங்கள்  வேலை விரிவுபடுத்த முயற்சிக்க வேண்டும். மேலும், இந்தியா, இந்தோனேஷியா, வியட்நாம், தாய்லாந்து, சிங்கப்பூர், மலேஷியா ஆகிய இடங்கள் உங்களுக்கு நன்மையையும் பழக்கவழக்கங்களையும் கொண்டு வரும்.   
 PLACE_TEXT7=இஷானி மூல அல்லது வடக்கு -கிழக்கு திசை உங்களுக்கு மிகவும் சாதகமாக இருக்கும் , உங்களின் வேர் எண் 7. இந்த  திசையில் நீங்கள் வேலை மற்றும் தொழில் தொடங்கினாள் வெற்றி மற்றும் சாதனை கொள்வீர்கள், இங்கு வாழும் போது முன்னேற்றம் உங்களுக்கு உதவும். கிரீஸ் ஸ்காட்லாந்து, ரஹோடேசியா, காஷ்மீர், மாஸ்கோ, மற்றும் பேங்கொக் ஆகிய இடங்களில்  உங்களுக்கு நன்மை மற்றும் மங்களகரமாக இருக்கும்.
 PLACE_TEXT8=வாழ்க்கையில் முன்னேறுவதற்கு முன்னும் பின்னும், மேற்கு திசை உங்களுக்கு சிறந்தகஇருக்கும். உங்கள் சொந்த வியாபாரத்தைச் செய்வதில் ஆர்வமாக இருந்தால், இந்த திசையில் வெற்றிகரமாகச் செய்யும் முயற்சிகளை நீங்கள் செய்ய வேண்டும். கூடுதலாக, சீனா, மலாசியா, ஆஸ்திரியா, அடிஸ் அபாபா ஆகியவை உங்களுக்காக முக்கிய இடங்களாகும், அது உங்களுக்கு அதிர்ஷ்டத்தை தரும்.  
 PLACE_TEXT9=தெற்கே நீங்கள் வெற்றி, சந்தோஷம், அமைதியுடன் வாழ்க்கையில் கொண்டுவரும் திசையாகும். எனவே, நீங்கள் உங்கள் வியாபாரத்தை விரிவாக்க விரும்பினால் அல்லது வாழ்க்கையில் முன்னேற விரும்புவீர்களானால், உங்கள் பிறந்த இடத்திலிருந்து இந்த திசையில் அதே முயற்சியை நீங்கள் செய்ய வேண்டும். இந்தோனேஷியாவைப் போலவே உங்கள் நாடுகளுக்கு நாடு, நகரங்கள் மற்றும் மாநிலங்கள் உங்களுக்கு சாதகமான முடிவுகளைத் தருகின்றன.
 TIME_TEXT1=உங்கள் முக்கிய கிரகம் சூரியனைக் குறிக்கிறது. ஒவ்வொரு ஆண்டும் ஏப்ரல் முதல் மே மற்றும் ஆகஸ்ட் முதல் செப்டம்பர் வரையான காலப்பகுதியே உங்களுக்கு நல்லதாக இருக்கும். இந்த வேலையில் நீங்கள் எதைச் செய்தாலும் அதில் வெற்றி கிடைக்கும். இந்த நேரத்தில், உங்கள் மரியாதை மேலும் அதிகரிக்கும்.
 TIME_TEXT2=உங்கள் முக்கிய கடவுள் சந்திரன். இந்த வருடத்தில் உங்களுக்கு  மே மற்றும் ஜூன் மதம் மங்களகரமக இருக்கும். இந்த சமயத்தில் நீங்கள் எந்த தொழில் தொடங்கினாலும் அதில் வெற்றி அதிக வாய்ப்புள்ளது. இதனால் உங்கள் வாழ்க்கையில் வெற்றி பெற முழு முயற்சியுடன் படுபடுவீர்.
 TIME_TEXT3=உங்கள் முக்கியமான கடவுள் குரு. இந்த வருடத்தில் டிசம்பர் மற்றும் ஜனவரி அல்லது மார்ச் மற்றும் ஏப்ரல் வரை மிகவும் பயனுள்ளதக  இருக்கும். இந்த சமயத்தில் நீங்கள் எந்த ஒரு நல்ல காரியங்கள் செய்ய முடிவெடுத்தாலும் அதில் வெற்றி பெற அதிக வாய்ப்புள்ளது, இதுதான் உங்களுக்கு உகந்த சமயமாகும். 
 TIME_TEXT4=உங்கள் முக்கியமான கடவுள் ஹர்ஷல் அவர், மற்றொரு கருத்துப்படி, ராகு அடிப்படைக்கூறு  எண் 4 ஆட்சியாளராக கருதப்படுகிறார். இந்த வருடத்தில் ஜூலை மற்றும் செப்டம்பர் மதம் வரை மிகவும் நன்மையாக இருக்கு மற்றும் இந்த சமயத்தில் நீங்கள் எந்தவொரு நல்ல காரியங்கள் செய்யலாம்.  
 TIME_TEXT5=உங்கள் முக்கியமான கடவுள் புதன்.  ஜூன் மற்றும் ஜூலை அல்லது செப்டம்பர் மற்றும் அக்டோபர் இந்த சமயம் உங்களுக்கு மிகவும் பயனுள்ளதாக இருக்கும். இதனால் நீங்கள் இந்த சமயத்தில் எந்த காரியங்களும் செய்ய நினைத்தாலும், அதை தொடங்காலம். உங்களுக்கு  வெற்றி பெற அதிக வாய்ப்புள்ளது. 
 TIME_TEXT6=உங்கள் முக்கிய கடவுள் சுக்ரன். இந்த வருடத்தின் பொது மார்ச் மற்றும் ஏப்ரல், மே மற்றும் ஜூன் அல்லது அக்டோபர் மற்றும் நவம்பர் வரை உங்கள் சமயம் நன்றாக இருக்கும்.  இந்த சமயத்தில் உங்களுக்கு எல்ல காரியங்களிலும் வெற்றி பெற வாய்ப்புள்ளது  மற்றும்  நீங்கள் சந்தோஷமான வசதிகளை பெறுவீர்கள்.
 TIME_TEXT7=உங்கள் முக்கியமான கடவுள் கேது . இந்த வருடம் ஜூலை மற்றும் ஆகஸ்ட் மாதம் உங்களுக்கு  மிகவும் முக்கியமானதாக இருக்கும். இந்த சமயத்தில் உங்கள் காரியத்தில் வெற்றி பெறுவீர்கள்,  அதே சமயத்தில் வாழ்க்கையில் ஒரு  நல்ல நல்லிணக்கம் இருக்கும். இந்த நேரத்தில் நீங்கள் பயன்படுத்த விரும்பும் எல்லாவற்றையும் செய்யலாம்.
 TIME_TEXT8=உங்கள் முக்கியமான கடவுள் சனிஸ்வரன். இந்த வருடத்தில் ஜனவரி மற்றும் மார்ச் வரை அதற்கு பிறகு அக்டோபர் மற்றும் நவம்பர் வரை மிகவும் சுபம் அல்லது வெற்றியாக கருதப்படுவீர்கள். இதனால் நீங்கள் எந்தவொரு காரியமும் செய்ய நினைத்தாளோ, இந்த நேரத்தில் செய்யலாம்.   
 TIME_TEXT9=உங்கள் முக்கிய கடவுள் செவ்வாய். இந்த வருடத்தின் பொது ஜனவரி மற்றும் பிப்ரவரி, ஏப்ரல் மற்றும் மே அல்லது நவம்பர் மற்றும் டிசம்பர் வரை உங்கள் நேரம் மிகவும் சுபமாக இருக்கும். இந்த நேரத்தில் உங்கள் செயல்களில் வெற்றி பெறுவீர் மற்றும் நீங்கள்  வாழ்க்கையில் உயரத்தில் முன்னேற பாடுபடுவீர்.  
 HEALTH_TEXT1=வேர் எண் 1 கீழ் பிறந்தவர், நீங்கள் ஒரு குதிரை போல ஆரோக்கியமாக இருக்கிறீர்கள், ஆனால் சில நோய்களின் வாய்ப்புகள் இருக்கின்றன. மிக முக்கியமாக, இதய நோய்கள், உந்தி, இரத்த அழுத்தம், இரத்த சம்பந்தமான நோய்கள், வயதான காலத்தில் உயர் இரத்த அழுத்தம், மற்றும் கண் தொடர்பான பிரச்சினைகள் ஆகியவற்றால் நீங்கள் பாதிக்கப்படுவீர்கள். நீங்கள் இந்த கவனமாக இருக்க வேண்டும், உங்கள் ஆரோக்கியமான வாழ்க்கை அனுபவிக்க வேண்டும்.
 HEALTH_TEXT2=உங்கள் எண்ணங்களைப் பற்றி அதிகம் யோசித்துப் பழகுங்கள், அல்லது உங்களுடைய எல்லா பிரச்சனைகளுக்கும் வேறான விஷயங்களைப் பற்றி ஆர்வத்துடன் வாங்குங்கள். இது வயிற்றுப் பிரச்சினைகள், செரிமான குழாயில் உள்ள பிரச்சினைகள், வாயு பிரச்சனைகள், குடல் பிரச்சினைகள், கட்டிகள் போன்ற நோய்களுக்கு வழிவகுக்கும். ஆகையால், நீங்கள் கவலையில் இருந்து விலகி இருக்க வேண்டும். கூடுதலாக, நீங்கள் மது குடிப்பது அல்லது மருந்துகள் அல்லது போதைப்பொருட்களை எடுத்துக்கொள்வதில்லை என்று அறிவுறுத்தினார். மேலும், நீங்கள் வேகவைத்த உணவு சாப்பிட்டு போதுமான தண்ணீர் குடிக்க வேண்டும்.
 HEALTH_TEXT3=இறைவன் வியாழன் நீங்கள் அவரது தெய்வீக கிருபையினால் ஆசீர்வதிக்கின்றீர்கள், அதனால்தான் நீங்கள் பொதுவாக கவலைப்படுவதில்லை. இருப்பினும், நீங்கள் சில நேரங்களில் உங்கள் உடல்நலத்தைப் பற்றி கவலையில்லாமல் இருக்கலாம், இது நீரிழிவு (தடிப்புத் தோல் அழற்சி), துளைத்தல் (கால் அல்லது முதுகுவலி), தோல் நோய்கள் போன்ற பிரச்சனைகளை எதிர்கொள்ளலாம். எனவே, நீங்கள் எச்சரிக்கையாக இருக்க வேண்டும் மற்றும் உங்கள் நல்வாழ்வையும் கவனித்துக் கொள்ள வேண்டும்.
 HEALTH_TEXT4=ராகுவின் செல்வாக்கு காரணமாக, நீங்கள் உங்கள் மூளைகளை தீவிரமாகப் பயன்படுத்திக் கொள்கிறீர்கள், ஆனால் நீங்கள் எதையுமே மிக மோசமானதாக நினைவில் கொள்ள வேண்டும். சில வகையான அதிர்ச்சி, மன அழுத்தம், இரத்த சம்பந்தமான பிரச்சினைகள், தலை மற்றும் முதுகு வலி, சிறுநீர் பிரச்சினைகள் மற்றும் அத்தகைய பிரச்சினைகள் ஆகியவற்றால் நீங்கள் பாதிக்கலாம். எனவே, ஒரு ஆரோக்கியமான வாழ்க்கை முறையை பராமரித்து தியானம் மற்றும் யோகா உதவியுடன் சிறந்த வாழ்க்கை வாழ வேண்டும்.
 HEALTH_TEXT5= உங்கள் வாழ்வில் புதன் விளைவுகளால், நீங்கள் கூர்மையான மனநிலையைப் பெறுவீர்கள், மேலும் நீங்கள் இளையவளாக இருப்பீர்கள். ஆனால் மறுபுறத்தில், உங்கள் வாழ்நாளில் நீரிழிவு (நரம்பு அழற்சி), வாய் புண்கள், கண்கள் மற்றும் கைகள், தூக்கமின்மை, பக்கவாதம் அல்லது போலியோ ஆகியவற்றுடன் தொடர்புடைய பிரச்சினைகள் உங்களுக்கு இருக்கலாம். எனவே, நீங்கள் ஒரு ஒழுக்கமான வாழ்க்கை வாழ வேண்டும் மற்றும் உங்கள் நல்வாழ்வை பற்றி கவனத்துடன் இருக்க வேண்டும்.
 HEALTH_TEXT6=சுக்கிரன், உங்கள் வேர்  எண்ணின் இறைவன், அனைத்து ஆடம்பரங்களுக்கும் முக்கியத்துவம் வாய்ந்தவர், எனவே, நீங்கள் சாப்பிடுவது, குடிப்பது, உடைத்தல் மற்றும் பிற உலகின் சுகபோகங்களை அனுபவிப்பது போன்ற அனுபவங்கள் உண்டு. பெரும்பாலும், இது சிக்கல்களின் இணையத்தில் உங்களை வைக்கலாம். முக்கியமாக, தொண்டைப் பிரச்சினைகள், மூக்கு மற்றும் நாக்கு, மார்பு சம்பந்தமான நோய்கள், அல்லது இதய நோய்கள் ஆகியவற்றுடன் தொடர்புடைய நோய்கள் இதில் அடங்கும். எனவே, நீங்கள் இந்த பற்றி குறிப்பாக விழிப்புடன் இருக்க வேண்டும், மற்றும் எந்த சுகாதார தொடர்பான பிரச்சினைகள் புறக்கணிக்க வேண்டாம்.
 HEALTH_TEXT7=பலர் ஒப்பிடும்போது உங்கள் நோயெதிர்ப்பு அமைப்பு பலவீனமாக இருப்பதால், ஏறக்குறைய 7 அல்லது அதற்கு மேற்பட்ட நோய்களின் பிடியில் நீங்கள் இருக்கலாம் என்று எண் 7 கீழ் பிறந்திருப்பதைக் குறிக்கிறது. இதன் விளைவாக, நீங்கள் அடிக்கடி உடம்பு சரியில்லாமல் இருக்கலாம், திடீரென மயக்கமடைந்து, தலைவலி, இதய நோய்கள் பாதிக்கப்படுவது, மனநல இழப்பு, நாக்கு மற்றும் நுரையீரல் நோய்கள், அவ்வப்போது ஏற்படும்.
 HEALTH_TEXT8=நீங்கள் பொதுவாக ஒரு ஒழுக்கமான நபர் மற்றும் வாழ்வின் அனைத்து துறைகளிலும், நீங்களே போதுமான முக்கியத்துவத்தை வழங்குகிறீர்கள். இதன் விளைவாக, நீங்கள் நல்ல உடல்நிலையை அனுபவிக்க முடியும், ஆனால் உங்கள் வழக்கமான மற்றும் ஒழுக்கநெறியில் இருந்து நீங்கள் விலகிப்போனதால், ஒரு தீவிர வியாதியின் பயம் எப்போதும் அடிவானத்தில் உள்ளது. இவை பெரும்பாலும் உங்கள் சிறுநீரகங்கள், குடல், தலைவலி மற்றும் இரத்த சம்பந்தமான நோய்களுடன் தொடர்புடைய நோய்களாகும்.
 HEALTH_TEXT9=நீங்கள் முழு எண் 9 கீழ் பிறந்தீர்கள், அது உங்களை இயல்பாகவே சுறுசுறுப்பாக ஆக்குகிறது. இதன் விளைவாக நீங்கள் பொதுவாக ஆரோக்கியமாக உள்ளீர்கள், ஆனால் மறுபுறம் நீங்கள் கோபமடைகிறீர்கள் அல்லது அடிக்கடி உங்கள் பணியை விரைவாக முடிக்க வேண்டும், அது உங்கள் ஆரோக்கியத்தை பாதிக்கிறது. முக்கியமாக, நீங்கள் இரத்த சம்பந்தமான பிரச்சினைகள், காயங்கள், சிறுநீரக, கோழிப்பண்ணை, அல்லது கத்திக்கு கீழ் இருக்க வேண்டும், சில வகை அறுவை சிகிச்சையும் உங்களுக்கு சாத்தியமாகும்.
 CAREER_TEXT1=நீங்கள் ஒரு மனதுடன் முற்சி செய்தல் வாழ்கை லட்சியத்தில் பெரிய வளர்ச்சி அடைவீர்கள். நீங்கள் மின்சார போன்ற வேலை செய்ய, ஏதாவது சிகிச்சை, எதாவது நாட்டின் தூதரக பணியாற்ற, நெருப்பு சம்பந்த பட்ட செயல்கள், அறிவியல் மற்றும் தொழில்நுட்பம், ஆராய்ச்சி, கட்சி தலைவர் பதவி, ராணுவத்தில் தளபதி பொறுப்பு அல்லது நகை மற்றும் ரத்தினம் போன்ற வேலைகளால் அமோகமாக இருக்கும். இவை தவிர, நீங்கள் இதே போன்ற பகுதிகளில் முன்னேறலாம். எனவே உங்கள் தொழிலை கவனமாக தேர்வு செய்யவும்.
 CAREER_TEXT2=இந்த பிரகாசத்தின் கீழ் பிறந்ததால், சந்திரன் கடவுளுடன் அனைத்து விதமான திரவங்களிலும் சிறப்பு செல்வாக்கு கொண்டிருப்பார், எனவே நீங்கள் அவர்களிடம் வியாபாரத்தை தேர்வு செய்வது நல்லது. குறிப்பாக, திரவ மற்றும் தழும்பு பொருட்கள், பயண வேலைகள், எந்த வேலை, ஹோட்டல் வணிக, பத்திரிகை, பாடல், நடனம், கவிதை எழுதுதல், சதி வேலை, பனி தொடர்பான வேலை மற்றும் வெள்ளி அல்லது அரிசி தொடர்பான வணிக செய்து இருக்கும்.
 CAREER_TEXT3=இந்த இதழில் பிறந்த எடுத்து வியாழன் உங்களுடன் தான் மகிழ்ச்சி மற்றும் நீங்கள் தொடர்பான உங்கள் கையில் நீங்கள் வெற்றி அடைய வேண்டும், அதனால் எந்த வேலை. நீங்கள் கற்பித்தல் என்றால், பணிக்காகவும், நீதி தொடர்பான பணிகளை நீதிபதி, மனுதாரர், விளம்பர துறை வங்கியொன்றில் செயலாளர், போலீஸ், பணி சார்ந்த தத்துவ தகுதிகள், வேலை அல்லது நிதிநிறுவனமாகக் அல்லது பணியில் நீங்கள் மிகப்பெரிய வெற்றியை காண பயன்படுத்தும்.
 CAREER_TEXT4=அடிப்படைக்கூறு எண் 4 இன் கீழ் பிறந்ததன் காரணமாக ராகுவின் அம்சங்கள் உங்களிடம் உள்ள குறியீட்டை நிரப்பிக் கொண்டிருக்கிறது, எனவே நீங்கள் நகைச்சுவைகளுடன் எந்தவொரு கடினமான வேலையும் தீர்க்க வேண்டும். ரயில், கப்பல், என்னுடையது, வேலை அல்லது தொழில்நுட்ப பணி, சுருக்கெழுத்தாளர், தையல்காரர், பொறியாளர், ஜோதிடர், மந்திரவாதி தொடர்பான வியாபாரத்தில் வேலை, விரிவுரையாளர்கள் முதலியன மிகப்பெரிய வெற்றி கொடுத்து. எனவே உங்கள் வாழ்க்கையைப் பற்றி கவலைப்படுகிறீர்கள், உங்கள் பிரச்சினைகளை முடித்துக்கொள்வதற்காக இந்த பகுதிகளில் வேலை செய்கிறீர்கள்.
 CAREER_TEXT5=புதன் கடவுள் சிறப்பு விளைவு இந்த பிரச்சினை வலிமை என அடைய, இது நீங்கள் காரணமாக உங்கள் விருப்பத்தின் அனைத்து வேலைகளையும் நீங்கள் வெற்றிகரமாக செய்ய முடியும். மனதில் ஆற்றல் உடலின் பலம் அல்ல, ஆனால் மனதின் வேலை அல்ல, அங்கு நீங்கள் வேலை செய்ய வேண்டும். எனவே, விற்பனை தொடர்பான பணி, விற்பனை, கணக்காளர், ரயில்வே, தந்தி, பத்திரிகை, புகையிலை, வானொலி வியாபாரி, தரகர், சிறந்த பணிப் பகுதிகளில் அதிகாரமளித்தல் ஆகியவை உங்களுக்கு சிறந்ததாக இருக்கும்.
 CAREER_TEXT6=இந்த எண் சுக்ரன் கிரகத்தின் சிறப்பு கருணை கொண்டுவருகிறது, நீங்கள் அழகு மற்றும் கவர்ச்சி பகுதிகளில் சிறந்த உங்களுக்கு வரையறுக்கிறது. இவற்றில் இணைக்கப்பட்டுள்ள துறைகளில் வேலை செய்வது, உங்களை வெற்றிகரமாக உயர்த்துகிறது. இந்த கூடுதலாக, நீங்கள் நகைகள், பொறியியல், கட்டிடக்கலை, உணவு ஆய்வாளர், ஹோட்டல், தயாரிப்பு, நாவலை எழுத்தாளர், அருங்காட்சியகங்கள், கலைஞர்கள் மற்றும் பலவற்றின் கையில் உங்கள் கையில் முயற்சி செய்யலாம்.
 CAREER_TEXT7=நீங்கள் இந்த எண்ணிக்கையின்கீழ் பிறந்துவிட்டதால், நீங்கள் வாழ்க்கையில் நிறையப் போராட வேண்டியிருந்தது, நீங்கள் வேறுபட்ட பாடங்களை கற்றுக்கொள்ள உதவியது. இதன் விளைவாக, நீங்கள் வெற்றி, நல்ல அதிர்ஷ்டம், செல்வம் ஆகியவற்றைக் கொண்டுவரும் பல வேலைகள் உள்ளன. இதில் திரைப்படத் துறை, பயணம், விமானப் பணிப்பெண், பால் பண்ணை, டிரைவர், மீன் விற்பனையாளர், வேதியியலாளர், மருத்துவமனை, சிஐடி, உடல் கட்டடம் மற்றும் பிற துறைகளில் அடங்கும்.
 CAREER_TEXT8=சனி கிரகத்தின் சரணாலயத்தில் நீங்கள் பிறந்திருந்தால், முன்னேற்றம் மற்றும் ஊக்குவிப்பு நேரம் எடுக்கும், ஆனால் அவர்கள் நிச்சயமாக உங்களிடம் வருவார்கள். சில துறைகள் உங்களுக்கு சிறந்த உயரங்களை அடைவதற்கும், இந்த குறிப்பிட்ட களங்களில் இருந்து உங்கள் தொழிலை தேர்ந்தெடுப்பதும் உங்களுக்கு வெற்றிகரமாக வெற்றியை அடைய உதவும், மேலும் பணத்தை சம்பாதிப்பதற்கும் செல்வத்தை அதிகரிப்பதற்கும் நல்ல வாய்ப்புகளைத் தருகிறது. இவை, முதன்மையாக ஒரு வீரர், பொறியாளர், பொலிஸ், நகரத்தின் மேயர், எடை அளவீட்டு, ஒப்பந்ததாரர், சிறை, தொழிலாளர் பணி, மற்றும் இசை ஆகியவற்றுள் அடங்கும்.
 CAREER_TEXT9=சிவப்பு கிரகம், செவ்வாய், உங்கள் வாழ்க்கையில் நீங்கள் அதிகமான அன்பைப் பெற்றிருக்கிறீர்கள், நீங்கள் தலைமை பண்புகளுடன் நிரம்பியிருக்கிறீர்கள், உங்களுள் ஒரு குறிப்பிட்ட வாழ்க்கை சக்தியை நீங்கள் வைத்திருக்கின்றீர்கள், இது வாழ்க்கையின் பல துறைகளில் முன்னோக்கி செல்லும். 
 FAST_TEXT1=ஞாயிற்றுக்கிழமை நீங்கள் விரதம் இருக்க வேண்டும், ஞாயிற்றுக்கிழமை ஞாயிற்றுக் கிழமை அன்று ஆரம்பிக்கலாம். விரதம் நேரத்தில் ஒரு வேளை  உணவை உண்ணுங்கள் மற்றும் ஆதித்யா இதய பக்கவாதம் ஓதுங்கள். சூரியன் கடவுளின் விதை மந்திரத்தை நீங்கள் ஓதிக் கொள்ளலாம். முடிந்தால், இந்த நாளில் உப்பு தவிர்க்கவும். இந்த நாளில், சிவப்பு ஆடைகளை அணிந்து, செப்புக் கலரில் தண்ணீரை நிரப்பி, சூரியன் கடவுளை வழிபடவும்.
 FAST_TEXT2=திங்கள் கிழமை, குறைந்தபட்சம் 7 அல்லது 16 அல்லது 54 நாட்கள் வரை விரதம் இருக்க வேண்டும். ஒரு திங்கள் பூர்ணிமாவில் (முழு நிலவு) அல்லது சித்ரா நக்ஷத்திராவில் விழுந்துவிட்டால், இது மிகவும் அருமையானதாக கருதப்படுகிறது, இந்த நாளில் இருந்து உங்கள் விரதங்களை ஆரம்பிப்பது பயனளிக்கும். வெள்ளை நிற துணிகளை அணியுங்கள், சிவபெருமானுக்கு பால் அபிஷேகம் செயுங்கள். பகலில் ஒருமுறை மட்டுமே சாப்பிட வேண்டும், சந்திரன் பீஜம் மந்திரம் உச்சரிக்க வேண்டும்.
 FAST_TEXT3=ஒரு மாதம் சுக்லா பக்ஷாவின் கீழ் விழுந்த ஒருவரிடமிருந்து 16 வியாழக்கிழமை வரை நீங்கள் விரதம் இருக்க வேண்டும். தொடர்ச்சியாக, நீங்கள் ஒரு மூன்று வருடங்கள் இந்த விரதம் வைத்திருக்க முடியும். இந்த நாளில், மஞ்சள் நிற ஆடைகளை அணியுங்கள், உங்கள் நெற்றியில் மஞ்சள் அல்லது சணல் துணியைப் பயன்படுத்துங்கள். ஒரு வாழை மரத்திற்கு நீர் வழங்குதல் மற்றும் அரச மரத்திற்கும் அதே செய்யவும், ஆனால் மரத்தை தொடாதே. உங்கள் திறமையின் அடிப்படையில் பிராமணர்களுக்கு உணவு கொடுங்கள், மற்றும் வியாழன் பீஜ் மந்திரத்தை படிக்கவும்.
 FAST_TEXT4=நீங்கள் 19 அல்லது 51 சனிக்கிழமைகளில் சுக்லா பாக்சில் வீழ்ந்தால் தொடங்கி இருக்க வேண்டும். இந்த நாளில் கருப்பு அல்லது நீல துணிகளை அணிந்துகொள்வது உங்களுக்கு பயனுள்ளதாக இருக்கும். இந்த நாளில் பால்க் கிராம் (சப்பாத் காளி யூரட்), கறுப்பு எள் மற்றும் கடுகு எண்ணெய் ஆகியவற்றை நன்கொடையாக வழங்குதல். நீங்கள் ராஹு பீஜ் மந்திரத்தை படிக்கவும்.
 FAST_TEXT5=சுக்லா பக்ஷாவில் புதன்கிழமையுடன் தொடங்கி, நீங்கள் 17 அல்லது 45 புதன்கிழமைகளில் தவறாமல் விரதம் இருக்க வேண்டும். உண்ணாவிரதத்தில், ஒரு நாளைக்கு ஒரு முறை சாப்பிட்டால் நன்றாக இருக்கும், மேலும் புதன்  பீஜ் மந்திரத்தை படிப்பது  நன்மை பயக்கும். பச்சை வண்ண உடைகள் மற்றும் மரகத ரத்தினங்களை அணியுங்கள். இந்த நாள் பசுமை கிராம்கள் / முழு மூங்கில் (சபாட் மூங் டால்) எடுத்து, திருநங்கைகளிடம் இருந்து  ஆசீர்வாதங்களை எடுத்துக் கொள்ளுங்கள். உங்கள் சகோதரி, அம்மாவின் அத்தை,  தந்தையின்  அத்தை , தாய்வழி மாமாவின் மனைவி  ஆகியவற்றிற்கு சில பச்சை நிற விஷயங்களை பரிசாக வழங்கவும் நீங்கள் முயற்சி செய்ய வேண்டும்.
 FAST_TEXT6=வெள்ளிக்கிழமைகளில் நீங்கள் சுக்லா பக்ஷா மாதத்தில் விழுந்து, 21 அல்லது 31 வெள்ளிக்காசுகள் தொடர வேண்டும். இந்த நாளில், வெள்ளை நிற ஆடைகளை அணிந்து, சிறுமிகளின் அடிகளைத் தொட்டு (கன்னி) தங்களது ஆசீர்வாதங்களை எடுத்து, அவர்களுக்கு வெள்ளை இனிப்பு வழங்கவும். நீங்கள் சுக்ரன் பீஜே மந்திரத்தை படிக்கவும்.
