
JADI_SUGGESTION_REPORT=అందరూ సంతోషకరమైన జీవితాన్ని కోరుకుంటున్నారు. దీని కోసం,  ఆ కోసం మీరు కొన్ని కార్యకలాపాలు చేయడం ద్వారా సంపన్న ఫలితాలను పొందటానికి కృషి చేస్తాము. మేము జ్యోతిష్కులను సంప్రదించి, రత్నాలు సూచిస్తాము మరియు అనేక ఇతర పరిష్కారాలను చేస్తాము. అఅన్నింటిలోనూ సహజ నివారణ ఉంటుంది. మీ జాతకమును విశ్లేషించడం ద్వారా మరియు గ్రహాల ఆకృతిని ఉపయోగించి చెట్టు లేదా వృక్షం యొక్క మూలం గురించి సమాచారాన్ని మీకు ఇస్తాము.
JADI_AND_ITS_IMPORTANCE=రోజువారీ జీవితాలలో మొక్కలు కీలక పాత్ర పోషిస్తాయి. భూగోళంపై మానవ జీవితాన్ని సృష్టించే వనరులు చెట్లు, ఖగోళశాస్త్రం ప్రకారం, మొక్కలు మరియు చెట్లు ఆక్సిజన్ గ్యాస్ విడుదల చేస్తూ శ్వాస తీసుకోవడంలో కార్బన్ డయాక్సైడ్ తీసుకుంటాయి, ఇది మానవ జీవితం యొక్క ప్రధాన మూలం. మనందరికీ తెలిసిన విదంగానే ఆక్సిజన్ వాయువు లేకుండా బ్రతకలేము. ఏ చెట్టు లేదా మొక్క గానీ ఉండకపోతే, మనం శ్వాస చేయలేము, మానవ జీవితం అంతం అవుతుంది. అదేవిధంగా, మనము సంపూర్ణంగా మొక్కలు మరియు చెట్ల ప్రాముఖ్యతను పరిగణించాలి. మూలికల ద్వారా పరిష్కరించబడిన అనేక ఆందోళనలు ఉన్నాయి. చెట్లను ఔషధ ప్రయోజనాల కోసం కూడా ఉపయోగిస్తారు. చెట్టు మూలం వాటిలో ఒకటి.  <a href="http://astrology.astrosage.com/2013/11/jadi-roots-to-reach-planets-hearts.html">చెట్టు మూలం</a> మూలికలు వాటిలో ఉప భాగం.  చెట్టు మూలం జ్యోతిషశాస్త్రంలో దాని స్వంత ప్రాముఖ్యతను కలిగి ఉంది. మీ జాతకచక్రంలో గ్రహం యొక్క చెడు ప్రదేశం ఉన్నట్లయితే ఇది ఒక ఔషధంగా ఉపయోగించవచ్చు. నిర్దిష్ట గ్రహంను సూచించడానికి వివిధ రకాల చెట్ల మూలాలు ఉన్నాయి. జ్యోతిష్యం మరియు రెండు నోడ్స్, అవి రాహు మరియు కేతులలో నిర్వచించిన ఏడు ప్రధాన గ్రహాలు ఉన్నాయి అని మనకు తెలుసు. జ్యోతిషశాస్త్రంలో నిర్వచించిన ఏడు ప్రధాన గ్రహాలు మరియు రాహు, కేతువులు ఉన్నాయి అని మనకు తెలుసు. పర్యావరణ శక్తుల సమతుల్యత కోసం ప్రతి ఒక్కరికి ఒక నిర్దిష్ట మూలం కలిగి ఉంటారు. మీ జాతకము పరిశీలించి తదనుగుణంగా మూలాలు ధరించడం మంచిది. చెట్టు మూలం ముత్యం యొక్క ఉత్తమ ప్రత్యామ్నాయంగా పరిగణించబడుతుంది. ముఖ్యమైన జ్యోతిష్కులు సలహా ఇచ్చిన తరువాత్త అది ధరించినట్లయితే, అది మరింత ప్రయోజనకరంగా ఉంటుంది. ఇది రాళ్ళ కన్నా బాగా పని చేస్తుంది. రాయి బాగా ఖరీదైనది మరియు అందరూ ధరించడం సాధ్యం కాదు, ఆ సందర్భంలో, చెట్టు మూలం వాటిని కావలసిన ఫలితాలను సాధించడానికి మరియు ఏదైనా గ్రహం యొక్క దుష్ప్రభావాలను తగ్గించడానికి వాటిని ధరించడానికి ఉత్తమ ఎంపిక. మీరు చౌకగా ధర వద్ద సులభంగా కనుగొనవచ్చు.
RECOMMENDATIONS=మీకు సరిపడే చెట్టు మూలాన్ని ధరించాలి. మనకు చాల రకాల చెట్లు మరియు మొక్కలు ఉన్నాయి, మీకు సరిపడే చెట్టు యొక్క మూలం కనుగొనేందుకు జ్యోతిష్కుడిని సంప్రదించాలి,  మీ జన్మ పట్టికలో మీ గ్రహాల అమరిక ఆధారంగా లేదా <a href="http://www.astrosage.com/freekphorary/instantchart.asp?charttype=kp"> జనన చార్ట్ </a> ఆధారంగా మాత్రమే ఇది చేయబడుతుంది. చెట్టు మూలాల కోసం మీరు ఎవరైనా జ్యోతిష్కుడిని  సంప్రదించవచ్చు. చెట్టు మూలాలు ధరించడం ద్వారా మీ బలహీనమైన  విషయాలు  మెరుగుపరుచుకోవచ్చు, మేము మీ జనన పట్టిక లో మీ గ్రహాల అమరిక ఆధారంగా వివిధ రకాల మూలాలను పేర్కొన్నాము:
IMPORTANCE_OF_NATURAL_JADI=ఒక సహజ మూలం లేదా వేరు ఈ రోజుల్లో మార్కెట్లలో అరుదుగా దొరుకుతుంది. సాధారణంగా, చెట్టు మూలాలు ప్రపంచవ్యాప్తంగా కృత్రిమంగా తయారు చేయబడుతున్నాయి మరియు పంపిణీ చేయబడుతున్నాయి. ఒక సహజ మూలం ప్రాథమికంగా ఒక వృక్షం యొక్క మూలంగా ఉంటుంది మరియు అందువలన, పరిమిత సంఖ్యలో కనుగొనబడుతుంది. అంతేకాకుండా, వాతావరణం వంటి ఊహించని విషయాలు ఒక ముఖ్యమైన పాత్రను పోషిస్తాయి మరియు కొన్ని సమయాల్లో ఉత్పత్తిని దెబ్బతీస్తాయి. కృత్రిమంగా తయారైన  చెట్ల మూలాలు అసలైనదానికి సమానంగా కనిపిస్తాయి, కానీ ఇది జ్యోతిషశాస్త్రాన్ని ఉపయోగించదు. ఈ సమస్యను పరిష్కరించడానికి, మేము 100% సహజ చెట్ల మూలాలు తీసుకువచ్చాము. మీరు ధరించిన తరువాత అన్ని జ్యోతిషశాస్త్ర ఆశించిన ప్రయోజనాలను పొందుతారు. ఈ చెట్ల మూలాలు ప్రయోగశాలలో కటినమైన విధానాలకు లోనయ్యాయి మరియు పూర్తిగా వాస్తవమైనవిగా గుర్తించబడ్డాయి.

TREE_ROOT_OF_BEL=ఇది సూర్యుని, ఒక రాజ గ్రహంను సూచిస్తుంది. సూర్యుడు ఒక అధికారిక స్థానం, నాయకుడు మరియు ప్రభుత్వం ప్రాతినిధ్యం జ్యోతిష్యం లో ఒక అగ్ని గ్రహం. మీ జాతకంలో తీవ్రంగా అనుగ్రహించి ఉంటే, మీరు ఈ మూలాన్ని ధరించవచ్చు. కారం మరియు మండుతున్న మూలికల ద్వారా గ్రహం యొక్క శక్తి <a href="http://www.astrosage.com/planet/sun/"> సూర్యుడు </a> ను పెంచవచ్చు. ఈ గ్రహం యొక్క దుష్ప్రభావాలు ఈ మూలాన్ని ధరించడం ద్వారా తగ్గించవచ్చు. మీరు కీర్తి, స్థానం మరియు సాంఘిక హోదాతో పోరాడుతుంటే, అది మీ జీవితంలో అధికంగా పెరగడానికి అనుకూల శక్తిని అందిస్తుంది.
TREE_ROOT_OF_KHIRNI=ఈ మూలం వేద జ్యోతిషశాస్త్రంలో చంద్రగ్రహన్ని సూచిస్తుంది. ఈ గ్రహం అందరికీ చాలా ముఖ్యమైనదిగా పరిగణించబడుతుంది. ఇది ఒక వ్యక్తి యొక్క మనస్సును సూచిస్తుంది. ఇక్కడ చెప్పినట్లుగా, "మీ మనస్సు సంతోషంగా ఉంటే, అప్పుడు ప్రతిదీ సంతోషంగా ఉంది ".  సంతోషంగా మరియు ఆరోగ్యకరమైన జీవితాన్ని కలిగి ఉండాలంటే, మనం మానసిక అస్థిరత లేదా అనారోగ్యం నుండి తప్పకుండా ఉండాలి. సంక్షిప్తంగా, మీరు మీ జీవితం లో పెద్ద విజయం సాధించడానికి ఒత్తిడి లేని జీవితం కలిగి ఉండాలి చెప్పగలము. మీరు ఈ మూలం ధరిస్తే ఉంటే, మీరు మానసిక ఉద్రిక్తతలు, మాంద్యం మరియు ఆందోళన నుండి ఉపశమనం ఉంటుంది. చివరికి, మీరు సంతోషమైన జీవితం వైపు నడవవచ్చు.
TREE_ROOT_OF_ANANTMOOL	= ఈ చెట్టు వేరు వేద జ్యోతిషశాస్త్రంలో అంగారక గ్రహంను సూచిస్తుంది. శక్తి, ధైర్యం, ఉత్సాహం మరియు సంకల్ప గ్రహంగా పరిగణించబడుతుంది. మార్స్ సైన్యం, సైనికుడు, పోలీసు లేదా ఎవరైనా, పరిపాలనా స్థానం లేదా తుపాకీని పట్టుకున్న వ్యక్తిని సూచిస్తుంది. మార్స్ మీ శత్రువులతో పోరాడటానికి మరియు పోటీ పరీక్షల్లో విజయం సాధించడానికి శక్తిని మీకు అందిస్తుంది. అంగారక గృహం మీ జాతకంలో తీవ్రంగా అనుగ్రహించబడితే, మీరు ఈ చెట్టు యొక్క మూలాన్ని ధరించవచ్చు ఇది మీ లక్షణాలను బలపరుస్తుంది. మీరు ఏ భయం లేకుండా పని చేయగలరు. మీ విశ్వాసం మరియు శక్తి పెరుగుతుంది. మీరు ఏదైనా పని చేస్తే లేదా ఏదైనా పనిని చేయటానికి ధైర్యం ఉంటే, అప్పుడు మాత్రమే మీరు ఫలితాన్ని పొందగలరు. అందువల్ల అది ఏ పనినైనా చేయగల శక్తిని మీకు అందిస్తుంది. ఇది పోటీ పరీక్షల్లో ఉత్తమంగా రాణించాలనుకున్న వారికి ఇది మంచిది.
TREE_ROOT_OF_VIDHARA=ఈ చెట్టు మూల బుధగ్రహం <a href="https://www.astrosage.com/planet/mercury/"> బుధగ్రహం </a> ను సూచిస్తుంది. బుధగ్రహం వేద జ్యోతిషశాస్త్రంలో ఒక రాకుమారుడు. బుధగ్రహం ద్వారా తార్కిక సామర్థ్యం వస్తుంది అని భావిస్తారు. బుధగ్రహం కమ్యూనికేషన్, తార్కికం, తార్కిక మనస్సు, గణితశాస్త్రం, గణనల మొదలైనవి ప్రాతినిధ్యం వహిస్తుంది. అందువలన, మీరు ఈ ప్రాంతాలకు సంబంధించిన సమస్యలను ఎదుర్కొంటున్నట్లయితే, మీరు ఈ చెట్టు మూలంను ధరించడానికి సూచించబడింది. రత్నాల లాగా ఎటువంటి దుష్ప్రభావాలు ఇందులో ఉండవు. మీరు దీనిని ధరించినట్లయితే, ఇది మీ మాటల సామర్థ్యం, ప్రసంగం మరియు తార్కిక శక్తిని మెరుగుపరుస్తుంది. ఒకవేళ ఒక సారి జ్యోతిష్కులను సంప్రదించి మీ జన్మ పట్టికను విశ్లేషించుకొని మీ జాతకం లో బుధగ్రహం యొక్క అనుగ్రహం సరిగ్గా లేనట్లయితే, అప్పుడు మీరు ఈ చెట్టు యొక్క మూలంను ధరించవచ్చు.
TREE_ROOT_OF_BANANA=ఈ చెట్టు మూలం గ్రహం బృహస్పతిని సూచిస్తుంది. వేద జ్యోతిషశాస్త్రంలో బృహస్పతిని గురు గ్రాహం లాగ మరియు అత్యంత ప్రయోజనకరమైన గ్రహం గా పరిగణించబతుంది. ఇది మన జ్ఞానం, కుటుంబం మరియు పిల్లలను సూచిస్తుంది. బృహస్పతి గ్రాహం మీ జాతకంలో తీవ్రంగా అనుగ్రహించబడితే, మీరు ఈ చెట్టు యొక్క మూలాన్ని దుష్ప్రభావాలని తగ్గించుకోవటానికి ధరించాలి. మన జాతకం లో సరైన అనుగ్రహం లేనప్పటికీ మనకు చేదు అనుభవాలు ఇవ్వని ఏకైక గ్రాహం బృహస్పతి గ్రాహం. ఒక వేళ మీకు సరైన అనుగ్రహం లేకపోతే మంచి ఉండదు అలాగే చెడు కూడా ఉండదు. మీరు వివాహం, పిల్లలు, జ్ఞానం సంబంధించిన సమస్యలను ఎదుర్కొంటున్నట్లయితే అప్పుడు మీకు ఈ చెట్టు మూలం ధరించడం మంచిది. అందువల్ల బ్రీహస్సాతి యొక్క అసమంజసం లేదా చెడు ఫలితాలను వదిలించుకోవడానికి, మీరు ఈ చెట్టు మూలాన్ని ఉపయోగించాలి. భారంగి చెట్టు యొక్క మూలాన్ని బృహస్పతి గ్రాహం కోసం ఉపయోగించవచ్చు.
TREE_ROOT_OF_SHARPUNKHA=శుక్ర గ్రాహం ఈ మూలాన్ని సూచిస్తుంది . శుహ్రాగ్రహం మీ జాతకంలో ప్రేమ, సౌందర్యం, కళ, సంబంధాలు, ప్రియురాలు మరియు వివాహం సంబంధిత విషయాలను సూచిస్తుంది. శుక్ర గ్రాహం యొక్క అనుగ్రహం మీ జాతకం లో సరిగ్గా లేకపోతే మీరు ఈ విషయాలలో సమస్యలను ఎదురుకొంటారు. ఈ సందర్భం లో మీరు ఈ చెట్టు యొక్క మూలాన్ని ధరించాలి. ఒక వేళ మీ జాతక లో శుక్ర గ్రాహం యొక్క అనుగ్రహం బాగా ఉంటె దానిని పెంచుకోవటానికి ఈ మూలాన్ని ధరించవచ్చు. దీనిని వజ్రానికి ప్రత్యామ్నాయంగా ఉపయోగించవచ్చు. అయినప్పటికీ వజ్రాన్ని మీ జన్మ పట్టిక లో మంచి అనుగ్రహం బాగా ఉన్నవారికి. వజ్రం ధరించడం కూడా దుష్ప్రభావాలు కలిగి ఉండవచ్చు. కాబట్టి మీరు మూలాన్ని ధరించే ముందు జూతిష్యుడిని కలిసి తరువాత ధరించాలి, ఎందుకంటే చెట్టు యొక్క మూలాన్ని ధరించడం ద్వారా ఎటువంటి దుష్ప్రభావాలు ఉండవు. తలంబ్రాల చెట్టు యొక్క మూలాన్ని ఉపయీగించవచ్చు.
TREE_ROOT_OF_BICHUA=ఈ చెట్టు మూలం "శని గ్రహాన్ని" సూచిస్తుంది. శని గ్రాహం దాని తీర్పుకు ప్రసిద్ధి చెందింది. శని గ్రాహం మెల్లగా కదిలే గ్రాహం. ఇది జీవితపు వృద్ధ కాలంలో ఫలితాలను అందిస్తుంది. ఎందుకంటే శని గ్రాహం మెల్లగా తిరుగుతుంది. శని గ్రాహం పరిమితులతో ముడిపడి ఉంది. ఇది వేద జ్యోతిషశాస్త్రంలో దుష్ట గ్రహం గా పరిగణించబడుతుంది. ఇది భయం, ఆందోళన, నిస్పృహ మరియు ఇతర ప్రతికూల అంశాలలో పెరుగుదల, కెరీర్, స్థానిక విద్యలో ఉంటుంది.  శనిగ్రహ అనుగ్రహం సరిగ్గా లేకపోతే, దాని పూర్తి దుష్ట స్వభావం స్థానికంగా చూపబడుతుంది. శని కారణంగా సంభవించిన చెడు దశలను అధిగమించడానికి సహజ పరిహారం చెట్టు యొక్క మూలం. శనిగ్రహం సానుకూలంగా అనుగ్రహించబడినట్లైతే, అది వ్యక్తిని ఆశీర్వదిస్తుంది. త్వరిత మరియు మంచి ఫలితాలను పొందటానికి మీరు శని యొక్క అనుగ్రహ బలం పెంచడానికి ఈ మూలాన్ని ఉపయోగించవచ్చు. ఉమ్మెత్త యొక్క మూలం కూడా ఉపయోగించవచ్చు.
TREE_ROOT_OF_CHANDAN=ఈ చెట్టు యొక్క మూలం గ్రహం రాహు గ్రహంని సూచిస్తుంది. రాహు చంద్రుడి యొక్క ఉత్తర భాగం కానీ గ్రాహం కాదు. అయినప్పటికీ, ఇది వేద జ్యోతిషశాస్త్రంలో ఒక గ్రహంగా పరిగణించబడుతుంది. ప్రపంచంలోని కోరికల గురించి రాహువు బాధ్యతగా ఉంటాడు. ఇది తెలివి, సమాచార సాంకేతికత, రాజకీయాలు మొదలైన వాటికి ప్రాతినిధ్యం వహిస్తుంది. ఇది ప్రజల దృష్టిని ఎల్లప్పుడూ కోరుతుంది. ఇది అన్ని రకాల సుఖాలు మరియు విలాస వస్తువులను అందిస్తుంది. మీ జాతకం లో రాహువు యొక్క అనుగ్రహం సరిగా లేకపోతే, మీరు రాహు యొక్క దుష్ప్రభావాలను తగ్గించడానికి ఈ చెట్టు యొక్క మూలంని ధరించవచ్చు. రాహు అనేది దుష్ట గ్రహం, ఇది ఎల్లప్పుడూ అన్ని విషయాలలో వ్యక్తిని ఆశీర్వదించదు. అందువల్ల రాహు యొక్క దుష్ప్రభావాలను తగ్గించాలంటే, ఈ మూలం మీకు మంచిది. ఇది సానుకూలంగా ఉంచుతుంది, మీరు రాహు యొక్క బలం పెంచడానికి ఈ చెట్టు యొక్క మూలాన్ని ఉపయోగించవచ్చు. గ్రహం రాహు కోసం తుంగ ముస్తలు యొక్క మూలాన్ని కూడా ఉపయోగించవచ్చు.
TREE_ROOT_OF_ASHWAGANDHA=ఈ చెట్టు యొక్క మూలం గ్రహం కేతును సూచిస్తుంది. కేతు ఒక గ్రహం కాదు. రాహు వలె, అది కూడా చంద్రుడి దక్షిణ భాగం. ఏదేమైనా, ఇది వేద జ్యోతిషశాస్త్రంలో ఒక గ్రహంగా పరిగణించబడుతుంది. <a href="http://www.astrosage.com/planet/ketu/"> కేతు </a> అనేది అన్ని భౌతిక సౌలభ్యాలను ఇష్టపడని గ్రహం. ఇది అన్ని రకాలైన వస్తువుల నుండి దూరంగా ఉండాలని కోరుకుంటుంది. ఇది చాలా ఆధ్యాత్మిక గ్రహం మరియు మోక్షాన్ని కోరుకుంటుంది. అయితే, ఇది ఒక దుష్ప్రభావం గల గ్రహం, ఇది సహజమైన దుష్ప్రభావం కారణంగా ఒక వ్యక్తికి ఎప్పటికి సమస్యలను చేకూరుస్తుంది. ఇది మీ జాతకంలో తీవ్రంగా అనుగ్రహించబడితే, కేతు యొక్క దుష్ప్రభావాలను తగ్గించడానికి ఈ చెట్టు మూలాన్ని మీ కోసం సిఫార్సు చేయబడింది. ఇది మీ జాతకంలో సానుకూలంగా అనుగ్రహించబడినప్పటికీ, కేతు గ్రహం యొక్క బలాన్ని పెంచుకోవడానికి ఇది సిఫార్సు చేయబడింది.
TREE_ROOT_OF_ARAND=ఈ చెట్టు యొక్క మూలం శుక్ర గ్రహాన్ని సూచిస్తుంది.  శుక్రుడు ప్రేమ, సౌందర్యం, కళ, సంబంధాలు, ప్రియురాలు మరియు జాతకంలో వివాహం ను సూచిస్తుంది. శుక్రుడి యొక్క అనుగ్రహం మీకు సరిగ్గా లేకపోతే మీరు వీటికి సంబదించిన సమస్యలను ఎదురుకొనవచ్చు. ఈ సందర్భం లో మీరు ఈ మూలాన్ని ధరించవచ్చు.ఒకవేళ మీకు శుక్ర గ్రాహం యొక్క అనుగ్రహం సరిగ్గా ఉన్నట్లయితే మీరు మీ అనుగ్రహ బలాన్ని పెంచుకోవటానికి ఉపయోగించవచ్చు. ఇది వజ్రం యొక్క ప్రత్యామ్నాయంగా ఉపయోగించవచ్చు. అయినప్పటికీ వజ్రం సానుకూల అనుగ్రహం ఉన్న వారికే సూచించబడింది. వజ్రం ధరించడం కూడా దుష్ప్రభావాలు కలిగి ఉండవచ్చు. కాబట్టి మీరు మొదట ధరించే ముందు జ్యోతిష్యుడిని సంప్రదించాలి, అయితే ఈ చెట్టు మూలంలో ఎటువంటి దుష్ప్రభావాలు లేవు. శుక్రుడి కోసం వెంపలి చెట్టు యొక్క మూలాన్ని ఉపయోగిస్తారు.
TREE_ROOT_OF_DHATURE=ఈ చెట్టు యొక్క మూలం "శని" గ్రహాన్ని సూచిస్తుంది. శని గ్రాహం తన తీర్పు కోసం ప్రసిద్ధి చెందింది. మరియు శని గ్రాహం మెల్లిగా కదులుతుంది. ఇది వృద్ధ వయసు లో మంచి ఫలితాలను ఇస్తుంది. దాని మందగింపు ద్వారా ఇది ఫలితాలను మెల్లిగా ఇస్తుంది. ఇది పరిమితులతో సంబంధం ఉన్న గ్రాహం ఉంది. ఇది వేద జ్యోతిషశాస్త్రంలో దుష్ట గ్రహం గా పరిగణించబడుతుంది. ఇది భయం, ఆందోళన, నిస్పృహ మరియు ఇతర ప్రతికూల అంశాలలో పెరుగుదల, కెరీర్, స్థానిక విద్యలో శని యొక్క ప్రభావం ఉంటుంది. శని యొక్క అనుగ్రహం సరిగా లేకపోతే, దాని పూర్తి దుష్ట స్వభావం స్థానికంగా చూపబడుతుంది. శని కారణంగా సంభవించిన చెడు దశలను అధిగమించడానికి సహజ పరిహారం ఈ చెట్టు యొక్క మూలం. శని సానుకూలంగా అనుగ్రహించబడితే, అది వ్యక్తిని ఆశీర్వదిస్తుంది. త్వరిత మరియు మంచి ఫలితాలను పొందటానికి మీరు శని బలం పెంచడానికి ఈ చెట్టు మూలంని ఉపయోగించవచ్చు. శని యొక్క ప్రభావాలను సమతుల్యం చేసేందుకు బిచువా మూలం కూడా ఉపయోగించవచ్చు.

HOW_TO_USE_TREE_ROOT_OF_BEL=<ul>     <li>       <a href="http://buy.astrosage.com/jadi-tree-roots/belmool">బిల్వ</a>, సూర్య గ్రాహం యొక్క చెట్టు మూలం, ఈ మూలాన్ని మెడ చుట్టూ లేదంటే చేతికి కట్టుకోవచ్చు. </li>     <li>   ధరించే ముందు పచ్చి పాలు లేదా గంగా జాలం లో ముంచాలి. </li>     <li>    మహాశివునికి ఎరుపు లేదా తెలుపు రంగు పూలను మరియు శుఘంధ పరిమళాలు కలిగిన చెక్కలను అందించి, "ఓం హ్రామ్ హ్రీమ్ హరౌమ్ సహా సూర్యాయ నమః" మంత్రాన్ని 108 సార్లు పాటించండి  యంత్రాన్ని ఉత్తేజపరచడానికి. </li>     <li>      ఈ ఆచారాలను ప్రదర్శించిన తర్వాత, ఆదివారం ఉదయం లేదా కృతిక, ఉత్తర ఫల్గుణి మరియు ఉత్తరాషాఢ నక్షత్రాల సమయంలో ఇది ధరించవచ్చు.</li>  </ul>
HOW_TO_USE_TREE_ROOT_OF_KHIRNI=<ul>     <li>       ఖిరిని, చంద్ర గ్రాహం యొక్క మూలం, ఈ మూలాన్ని మెడ చుట్టూ లేదంటే చేతికి కట్టుకోవచ్చు. </li>     <li>       ధరించే ముందు పచ్చి పాలు లేదా గంగా జాలం లో ముంచాలి. </li>     <li>      మహాశివునికి మరియు పార్వతికి ఎరుపు లేదా తెలుపు రంగు పూలను మరియు శుఘంధ పరిమళాలు కలిగిన చెక్కలను అందించి, మరియు "ఓం శ్రమ్ శ్రీమ్ శ్రౌమ సహా చంద్రమ్స్ నమః" మంత్రాన్ని 108 సార్లు పాటించండి యంత్రాన్ని ఉత్తేజపరచడానికి.  </li>     <li>      ఈ ఆచారాలను పాటించిన తర్వాత హస్త, రోహిణి, మరియు శ్రావణ నక్షత్రాల సమయంలో ధరించవచ్చు.</li>  </ul>
