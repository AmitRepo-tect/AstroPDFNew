 NAMANK_TEXT = @@userName$, విశ్వశక్తి యొక్క వ్యక్తిగత జీవనవిధానమును పేరు సంఖ్యగా పరిగణిస్తారు.పేరుసంఖ్య మీయొక్క పేరులోని అన్ని అక్షరములను కలుపుటవలన ఏర్పడుతుండి. ఈసంఖ్య, మీయొక్క వ్యక్తిత్వమును మరియు మీయొక్క సామర్ధ్యమును తెలుపుతుంది.మీరు వాటిని అభివృద్ధి పరిచి వాటిని వాడుకోదలచన అవి మీయొక్క జీవితాన్ని అనుకూలముగా మారుస్తాయి.మీపేరులోనే మీయొక్క శక్తి దాగిఉంది.ఇది మీమనస్సు గుండా ప్రయాణించి ఈప్రపంచములోకి వస్తుంది.@@userName$ మీపేరును చూసుకొని, మీయొక్క పేరుసంఖ్యను @@namamkNumber$ పొందండి. రండి పేరుసంఖ్య యొక్క కొన్నిముఖ్య విషయాలను తెలుసుకుందాము@@namamkNumber$.
 MULANK_TEXT = @@userName$, సంఖ్యాశాస్త్రములో మీ అతిముఖ్యమైన సంఖ్య మీయొక్క పుట్టిన నెల. ఈ సంఖ్య మీయొక్క వ్యక్తిత్వమును, స్వభావమును, నిలకడను వంటి ముఖ్యమైనవాటిని తెలియచేస్తుంది. ఈ సంఖ్య మీజీవితములోని ముఖ్యాంశాలను నిర్ణయిస్తుంది.మీరు ధైర్యవంతులా లేక సిగ్గుగాలవారా, మరియు నాయకుడిగా ఉంటారా లేక ఫాల్లోవెర్ వంటి విషయాలను తెలియచేస్తుంది.ఎందుకంటే, ప్రతిసంఖ్యకు ఒక బలం మరియుశక్తీ ఉంటాయి. జాగ్రత్తగా, పరిశీలించిన తరువాత, మిముమాయొక్క  సంఖ్యాశాస్త్రం ఆధారముగా మీయొక్క జన్మసంఖ్య: మీయొక్క రాడికల్ సంఖ్య @@radicalNumber$.
 DESTINY_TEXT1 = మీరు గొప్ప నాయకత్వ నైపుణ్యాలతో ఉన్న ప్రతిష్టాత్మక వ్యక్తి. తత్ఫలితంగా, మీరు ప్రజలతో కలిసి, వారి మద్దతును పొందవచ్చు మరియు మీ లక్ష్యాలను నెరవేర్చగల సామర్థ్యాన్ని కలిగి ఉంటారు. మీరు పరిమితంగా ఉండటం ఇష్టపడక, అనేక మంది స్నేహితులను కలిగి ఉంటారు. ఆర్థికంగా, మీరు సంపన్నుడవుతారు, కానీ మీరు కూడా విలాసాలను మరియు రాజరిక జీవనాలను ఆస్వాదించడానికి ఎక్కువగా ఇష్టపడతారు. మీరు రాజకీయాల్లో విజయాన్ని సాధిస్తారు మరియు ప్రభుత్వ రంగం నుండి లాభాలను పొందే మంచి అవకాశం కూడా ఉంది. విధి సంఖ్య 1 కింద జన్మించడం, మీరు ప్రజల నుండి గౌరవం పొందాలనుకుంటే మరియు మీరు కూడా దాన్ని పొందుతారు. అయితే, మీరు అధిక వ్యయాన్ని అలాగే జూదంలోకి లేదా బెట్టింగ్లోకి వెళ్ళడం నివారించాలి. మీ స్వాతంత్రాన్ని ఉపయోగించుకోవడంలో జాగ్రత్త వహించండి, చాలా ప్రమాదం తీసుకొవాడానికి మీ నీతులు మరియు నైతికతలను అనుసరించకండి.
 DESTINY_TEXT2 = మీరు భాగస్వామ్యంలో పనిచేయడానికి ఇష్టపడే చాలా సున్నితమైన, అనుకూలమైన, బాగా ఇష్టపడే వ్యక్తి. ఒక కాల్పనిక, శృంగార మరియు సృజనాత్మక వ్యక్తి, మీరు ఎల్లప్పుడూ మహిళలను గౌరవిస్తారు. ఏదేమైనా, మీరు తరచుగా బలమైన మానసిక సామర్ధ్యం లేకపోవడమే కాక, మీ పనులను అసంపూర్తిగా వదిలేస్తారు. భౌతికంగా, మీరు కొంచెం బలహీనంగా ఉంటారు, మరియు ఇతరులు మీకు సులభంగా ప్రయోజనం పొందుతారు. అందువల్ల, మీరే స్వయంగా వ్యవహరించడానికి, మీ ఆత్మవిశ్వాసాన్ని కాపాడుకోవడం నేర్చుకోవాలి. అదే సిరలో, మీరు చేతిలో తీసుకునే అన్ని పనులను పూర్తి చేసి, సమస్యలు ఎదురవుతూ ప్రశాంతత కలిగి ఉంటారు. దానికితోడు, మీరు చుట్టుపక్కల ఉన్న సుందరమైన వ్యక్తుల గురించి జాగ్రత్త వహించాలి.
 DESTINY_TEXT3 = మీరు ఇతరులకు స్ఫూర్తినిచ్చే విధంగా జీవిస్తారు మరియు మీ వాక్చాతుర్యం మీ యొక్క ఉన్నత ఆకర్షణీయ గుణం. బహుముఖ ప్రతిభ మీ లోపల విలీనం అయి ఉంటారు, అందువల్ల, బహుశా మీరు వేరొకరికి సహాయకులుగా ఉండటానికి ఇష్టపడరు. మీరు మంచి వ్యక్తిత్వం కలిగి ఉంటారు మరియు మంచి క్రమ శిక్షణను కలిగి ఉంటారు, మీ ప్రేమ స్వచ్ఛమైనది మరియు మీరు న్యాయం కోసం జీవిస్తారు. అంతేకాకుండా, మీరు అద్భుతమైన ముందు చూపు కలిగిన వ్యక్తి, హాస్యం యొక్క మంచి భావం మరియు ఆచరణాత్మక దృష్టికోణం కలిగి ఉంటారు. మీరు ఎక్కువ ఖర్చులు చేయడం మానుకోవాలి, మీరు అసూయపడే స్వభావాన్ని నిషేధించడానికి ప్రయత్నించండి, మరియు మీరు డబ్బు సంపాదించడానికి మరియు సంపన్నులు అవడానికి కొత్త పనులను చేయడం మానుకోవాలి. అన్నిటి కంటే, మీరు ద్వంద్వ స్వభావం కలిగిన వ్యక్తిత్వాన్ని నిషేధించాలి మరియు మీ కోపాన్ని తగ్గించాలి, అలాగే మీరు చెడు సావాసాలను తగ్గించాలి ఎందుకంటే వారు మీకు హాని తలపెట్టడానికి అవకాశం ఉంటుంది.
 DESTINY_TEXT4 = మీ జీవితంలో  చాలా హెచ్చు తగ్గులు ఉండవచ్చు, మరియు అనేక ఆకస్మిక సంఘటనలు మీ జీవితంలో చోటు చేసుకోవచ్చు, వీటితో పాటుగా మీకు అనేక మంచి మరియు చేదు ఫలితాలు లభిస్తాయి. మీరు జీవితంలో అనేక ఎత్తులను సులువుగా సాధించగలరు, అదేవిధంగా కొన్ని కుట్రలు మిమ్మల్ని కింద పడేయటానికి ఎక్కువ అవకాశం ఉంటుంది.  మీరు ఇతరులకు ఆకర్షణీయంగా మారడానికి మీ యొక్క విభిన్నమైన ఆలోచనా శైలి మీకు సహాయం చేస్తుంది. మీరు ఒక తిరుగుబాటుదారులు, మీరు శాసనాలు మరియు ఆచారాలను వ్యతిరేకిస్తారు మరియు క్రొత్త నిబంధనలను సృష్టించేందుకు నిరంతరం ప్రయత్నిస్తున్నారు. మీరు ఒక పదునైన ఆలోచన కలిగి ఉన్న తెలివైన వ్యక్తి మరియు మీరు సున్నితంగా మరియు ఉద్వేగపూరిత ఆలోచనలను తగ్గించాలి, అలాగే మీరు నిరాశావాద ఆలోచనలను తగ్గించండి. మీరు జీవితంలో ఎదగడానికి మార్గాలను వెతుక్కోవడంతో పాటుగా, మీ దూకుడు తగ్గించడానికి ప్రయత్నించండి.
 DESTINY_TEXT5 = మీరు ఒక స్నేహపూవికమైన వ్యక్తి మరియు మానసికంగా అత్యున్నత స్వభావం కలిగి ఉంటారు, అలాగే మీరు బెట్టింగ్( పందాలు కట్టడం), షేర్ మార్కెట్,  జూదం మరియు వ్యాపారాలలో మీకు ఎక్కువ ఆసక్తి ఉంటుంది. మీరు ఒక వ్యాపారాన్ని కూడా విజయవంతంగా నడపగలుగుతారు. మీ పనులు పూర్తి చేయడానికి, మీరు ఇతరులను ఒప్పించడానికి ప్రయత్నిస్తారు మరియు వాటిలో విజయవంతం అవుతారు. ఏదేమైనా, మీరు డబ్బు సంపాదించడడానికి ఎక్కువ కష్టపడతారు మరియు కొన్ని సార్లు కొన్ని రకాలైన నిర్ణయాలను మీరు గుడ్డిగా తీసుకోవటానికి అవకాశం ఉంటుంది. మీరు మీ శక్తిని మంచి పనుల కోసం ఉపయోగించడానికి మీరు ఎప్పుడూ కృషి చేయాలి మరియు మిమ్మల్ని మీరు బాధాకరమైన అంశాల నుంచి దూరంగా ఉండటానికి ప్రయత్నించండి. మీ ఆర్ధిక శాఖ చాలా బలంగా ఉంటుంది మరియు మీరు మీ భవిష్యత్తులో చేయబోయే వ్యాపారాలలో మీరు విజయాన్ని సాధిస్తారు. 
 DESTINY_TEXT6 = మీరు భాగ్యకము 6 కింద జన్మించినందున, మీరు ప్రతి ఒక్కరి ఆలోచనలను అందుకోగలుగుతారు మరియు స్నేహపూవికమైన స్వభావం మీకు సహజంగా ఉంటుంది.  మీరు ఒక కారుణ్య స్వభావం కలిగిన వ్యక్తి, మీరు ఇతరుల పట్ల శ్రద్ధ వహించడానికి ఎక్కువ ఆసక్తి చూపుతారు, మీరు సృజనాత్మక నైపుణ్యాలను కూడా కలిగి ఉంటారు. మీరు బహుముఖ అంశాలలో చాలా ఆకర్షణీయంగా ఉంటారు, ఏదేమైనా, కొన్ని సార్లు మీరు మీ పనిలో ఎక్కువ ఆసక్తి కలిగి ఉండరు, అందువల్ల మీరు కొంచెం బాధపడవలసి ఉంటుంది. మీరు పుట్టుకతోనే చిలిపి పనులు చేసే స్వభావం కలిగి ఉంటారు, మీకు అందమైన అంశాల పట్ల మరియు వినోదం పట్ల ఎక్కువ ప్రేమ ఉంటుంది. మీరు వేరేవాళ్లను సులువుగా లేదా తొందపాటుగా నమ్మడానికి ప్రయత్నించకండి. అన్నిటి కంటే ముక్యంగా మీరు మద్యపానం మరియు ఇతర మత్తు పానీయాణాలను తీసుకోకుండా ఉండటానికి ప్రయతించండి మరియు సామజిక అంశాలపై ఎక్కువ ఆసక్తి చూపించడం మానుకోండి.
 DESTINY_TEXT7 = మీరు ఆధ్యాత్మికత పట్ల ఎక్కువ ఆసక్తి కలిగి ఉంటారు మరియు నిజమైన మరియు ఆచరణ ఉన్న పనుల కోసం ఎక్కువ పరితపిస్తుంటారు. మీరు ఒక అత్యున్నతమైన ముందు చూపు కలిగి ఉండటంతో పాటుగా, మీరు సులువుగా ఇతరులను అర్థం చేసుకుంటారు మరియు ఇతరులకు సహాయం చేయడానికి ప్రయత్నిస్తారు. మీరు ఇతరులకు జీవితం యొక్క గొప్పతనం గురించి అర్థం అయ్యేలా చెప్పడానికి పని చేస్తారు మరియు మీరు అనేక ప్రాంతాలు మరియు విదేశాలకు కూడా వెళ్ళవచ్చు. మీ చుట్టూ అనుకూలమైన ఆలోచనలు కలిగి ఉంటారు అందువల్ల మీకు ఇతరులను ఆకర్షించడానికి సులువుగా ఉంటుంది.  అయితే, మీరు విరామం లేని అనుభూతిని మరియు ఏదైనా గురించి చాలా లోతుగా ఆలోచిస్తూ ఉండకుండా మీరు పని చేయాలి. మీరు భౌతిక ఆనందాల పట్ల భిన్నంగా ఉండకూడదు మరియు మీ పని మరియు ఆలోచనలో చురుకుగా ఉండాలి.
 DESTINY_TEXT8 = మీ జీవితంలోని అనేక మానసిక మరియు శారీరిక అంశాల మధ్య మీకు మంచి సమాతుయాల్యత ఉంటుంది. మీరు ఒక శక్తివంతమైన ఆలోచన కలిగి ఉంటారు మరియు మీరు చిన్న విషయాలను ఎక్కువ పట్టించుకోరు. మీకు ఒక పెద్ద మనుసు ఉంటుంది కానీ మీరు మీ లోలోపల బాధపడుతూ మరియు ఒంటరిగా బాధపడతారు ఫలితంగా, మీరు ఎక్కువ మృదువుగా కూడా ఉంటారు. ఈ జీవితంలో మీరు భాగ్యాంకము 8 కింద జన్మించినందున మీరు అత్యంత విజవంతులై ఉంటారు లేకపోతే పూర్తిగా సఫలమై ఉంటారు. మీరు అంతముఖంగా నిజాయితీ కలిగిన వ్యక్తి, అంకితభావం యొక్క ధర్మం మీ కోసం ఒక గొప్ప సాఫల్యం. మీరు మీ ఒత్తిడికి తలవంచకుండా ఉండాలి, మీ పని సంబంధిత విషయాలలో మిమ్మల్ని మీరు ఒప్పుకోవాలి. మీరు తప్పు చేసిన మీ మాట మార్చకుండా ఉండడానికి ప్రయత్నించండి. మీరు తప్పు చేసినట్లు మీకు అనిపిస్తే మీరు ఇతరుల మాటలు సూచనలను పాటించడానికి ప్రయత్నించండి, మరియు ఆచరణలో ఉంచండి.అన్ని రకాలైన నిరాశాభావాలను మీరు మీ జీవితం పై చూపించడం మానుకోండి మరియు ఒంటరిగా ఉండటానికి కారణమయ్యే అంశాల నుంచి దూరంగా ఉండటానికి ప్రయత్నించండి.
 DESTINY_TEXT9 = ఆరంభంలో మీ జీవితంలో మీరు అనేక ఇబ్బందులను మీరు ఎదురుకొనవచ్చు, కానీ మీరు మంచి రాజకీయ నాయకులుగా మారవచ్చు. మీరు కళాత్మకంగా పని చేస్తారు మరియు ఆలోచించడానికి సులువుగా ఉంటారు, మీరు పని చేసే విషయంలో కొంచెం తొందరపాటుతో ఉంటారు. మీకు మంచి సంస్థ నైపుణ్యాలు మరియు శక్తి ఉంటాయి, కానీ దుబారాగా ఉండటం మీకోసం అస్సలు మంచిది కాదు. మీరు తరచుగా ప్రారంభంలో, జరిగే విషయాల గురించి ఒక ఆలోచన లేదా అంతర్ దృష్టిని కలిగి ఉండటానికి ప్రయత్నించండి. మీ స్వభావం ఇతరులకు సహాయకరంగా ఉంటుంది, ఏదేమైనా మీరు కోపాన్ని అదుపులో ఉంచడానికి ఎక్కువ ప్రత్నించండి. అదనంగా, మీరు మీ ఉన్నత  అధికారులను ఇబ్బంది పెట్టకూడదు. మీరు ఆర్థికంగా మంచి శ్రేయస్సును కలిగి ఉంటారు, కానీ మీరు ఎల్లపుడూ తయారు అయి ఉండాలి ప్రతికూలమైన విషయాలను ఎదురుకొనటానికి.
 PLACE_TEXT1 = తూర్పు దిక్కు మీ కోసం విజయం మరియు ప్రశంసలను మీ జీవితంలో అందిస్తుంది. అందువల్ల, మీరు మీ ఇంటి యొక్క ముఖ ద్వారము తూర్పు దిక్కున ఉండేలా చూసుకోండి. అలాగే, మీ ఉద్యోగం ఈ దిశలో అలాగే ఉంటే, అప్పుడు శ్రేయస్సు ఖచ్చితంగా మీ జీవితం లో ఉంటుంది. దేశాలు, పాకిస్థాన్, టర్కీ, బర్మా, ఆఫ్గనిస్తాన్, మరియు హాంగ్ కాంగ్ దేశాలు అన్ని సందర్భాల్లో మీకు అనుకూలంగా ఉంటాయి.
 PLACE_TEXT2 = వాయువ్యమూల(ఉత్తర-పశ్చిమ) దిక్కు మీకు చాలా అనుకూలంగా ఉంటుంది,  మరియు ఈ దిశలో చేసిన ప్రయత్నాలు మీరు గొప్ప విజయాలను తెచ్చి, విజయవంతం అయ్యే కొత్త ఎత్తులకి తీసుకెళతాయి. అనుకూలమైన స్థలాలకు వస్తున్నట్లు; లండన్, టిబెట్, ఫ్రాన్స్, జర్మనీ, శ్రీలంక, ఢిల్లీ, మరియు కాబూల్ దేశాలు మీకు లాభదాయకంగా ఉంటాయి .
 PLACE_TEXT3 = మీ మూల సంఖ్య 3 అయినందున, మీకు, ఈశాన్యం మీకు చాలా అదృష్టకరంగా ఉంటుంది మరియు మీ జీవితంలో శ్రేయస్సు మరియు సంపదను తీసుకొని వస్తుంది. అదనంగా, ఇంగ్లాండ్, నేపాల్, హాలండ్, డెన్మార్క్, భూటాన్ మొదలైన ప్రాంతాలలో నివసించడం లేదా ఉద్యోగం చేయడం మీకు లాభదాయికంగా ఉంటుంది.
 PLACE_TEXT4 = మీరు (దక్షిణ పశ్చిమ) నైరిత్య కోణం లో నివసించడానికి పయత్నించండి మీకు చాలా అనుకూలంగా ఉంటుంది.  అదే సిరలో, ఇటలీ, కువైట్, హంగేరీ, వాషింగ్టన్, ముంబై ప్రదేశాలకు మీకు పవిత్రంగా ఉంటుంది మరియు మీకు మంచి ఫలితాలను తెస్తుంది.
 PLACE_TEXT5 = మీరు మూల సంఖ్యా 5 న జన్మించినందున, ఉత్తర దిక్కు మీకు చాలా అనుకూలంగా ఉంటుంది. అందువల్ల, మీరు ఈ దిక్కున పని చేయటం వాల్ల మీకు మీ జీవితం లో విజయం, ఆనందం మరియు శ్రేయస్సు లభిస్తుంది. ముఖ్యంగా, కొరియా, సౌదీ అరేబియా, స్పెయిన్, అమెరికా, గోవా, మరియు ప్రేగ్ దేశాలు మీ కోసం చాలా పవిత్రమైనవిగా ఉంటాయి మరియు మీకు చాలా లాభదాయొకమని రుజువు చేస్తాయి.
 PLACE_TEXT6 = ఆగ్నేయ కోణం అంటే దక్షిణ-తూర్పు దిక్కు మీకు జీవితంలో విజయాన్ని మరియు అనుకూలమైన ఫలితాలను ఇస్తుంది. అందువల్ల, మీరు మీ పనులను ఈ దిక్కున విస్తరించడానికి ప్రయిత్నించండి. అంతేకాకుండా, భారతదేశం, ఇండోనేషియా, వియత్నాం, థాయ్లాండ్, సింగపూర్, మలేషియాలు మీకు లాభాలు మరియు ప్రశంసలను అందిస్తాయి.
 PLACE_TEXT7 = మీ మూల సంఖ్య 7 అయినందున, ఈశాన్య దిశ అనగా ఉత్తర-తూర్పు దిక్కు మీకు చాలా అనుకూలంగా ఉంటుంది. ఈ దిశలో ఉద్యోగం చేయటం లేదా వ్యాపారం చేయడం మీ కోసం విజయం మరియు సాఫల్యాలను తెస్తుంది, ఇక్కడ నివశిస్తున్నప్పుడు కూడా మీకు పురోగతికి సహాయం చేస్తుంది. గ్రీస్, స్కాట్లాండ్, రోడేషియా, కాశ్మీర్, మాస్కో మరియు బ్యాంకాక్ ప్రాంతాలు మీకు ప్రయోజనకరమైనవి మరియు పవిత్రమైనవి.
 PLACE_TEXT8 = మీ జీవితం లో పురోగతిని పొందటానికి మరియు మంచి ఎత్తుకు ఎదగడానికి, పశ్చిమ దిక్కు మీకు చాలా అద్భుతంగా ఉంటుంది. మీరు మీ స్వంత వ్యాపారాన్ని చేయాలనే ఆసక్తి ఉంటే, అప్పుడు మీరు ఈ దిశలో చేయాలనే ప్రయత్నాలు విజయవంతం అవుతాయి తరువాత మీరు కష్టపది పని చేయవలసి ఉంటుంది. అదనంగా, చైనా, మాలాసియా, ఆస్ట్రియా, పెకింగ్, అడిస్ అబాబా మీకు లాభదాయకమైన ప్రదేశాలు. ఇవి మీకు అదృష్టం మరియు సాఫల్యం తెస్తాయి.
 PLACE_TEXT9 = మీకు మీ జీవితంలో దక్షిణం దిశ మీకు విజయాన్ని, ఆనందాన్ని మరియు ప్రశాంతతను తెస్తుంది. అందువలన, మీరు మీ వ్యాపారాన్ని విస్తరించాలనుకుంటే లేదా జీవితంలో పురోగతిని కోరుకుంటే, మీ జన్మ స్థలం నుండి ఈ దిశలో అదే ప్రయత్నాలు చేయాలి. ఇండోనేషియా వంటి దక్షిణాన ఉన్న దేశాలు, నగరాలు మరియు రాష్ట్రాలు మీకు అనుకూలమైన ఫలితాలు తెస్తాయి.
 TIME_TEXT1 = సూర్య భగవానుడు మీ దైవ గ్రహం, అందువలన, ఏప్రిల్ నుండి మే కాలం మరియు ఆగష్టు నుండి సెప్టెంబర్ వరకు, ప్రతి సంవత్సరం, మీకు ప్రతి అనుకూలంగా ఉంటుంది. ఈ వ్యవధిలో మీరు చేస్తున్న ఏ పని అయినా, మీరు ఖచ్చితంగా వాటిలో విజయాన్ని పొందుతారు. ఈ వ్యవధి లో మీ గౌరవం, పేరు మరియు కీర్తి పెరుగుతుంది.
 TIME_TEXT2 = చంద్రగ్రహం మీ దైవిక గ్రహం కావడం వల్ల, జూన్ నుండి మే వరకు, సంవత్సరానికి, మీరు చాలా పవిత్రమైన సమయం. మీ ప్రయత్నాలలో విజయవంతం కాగల అవకాశాలు మీ కోసం ఈ వ్యవధిలో ఎక్కువగా ఉంటాయి. కాబట్టి, జీవితకాలంలో విజయవంతం కావడానికి మీరు ఈ సమయ వ్యవధిని పూర్తిగా ఉపయోగించుకోవాలి.
 TIME_TEXT3 = గురుగ్రహం మీ మూల సంఖ్య కోసం దైవ గ్రహం, అందువల్ల, డిసెంబరు నుండి జనవరి వరకు, మరియు మార్చి వరకు ఏప్రిల్, ప్రతి సంవత్సరం మీకు ఉపయోగకరంగా ఉంటాయి. ఈ వ్యవధిలో మీరు చేపట్టే ఏ పని అయినా, మీరు విజయవంతం అవుతారు, ఎందుకనగా ఈ సమయం మీ కోసం ఉత్తమమైనది, ఎటువంటి ముఖ్యమైన పనులను ప్రారంభించడానికి అయినా.
 TIME_TEXT4 = హర్షల్ గ్రహం మీ మూల సంఖ్య కోసం దైవిక గ్రహం. మరొక మూలం / అభిప్రాయం ప్రకారం, రాహువు కూడా ఈ మూల సంఖ్యలో దైవిక గ్రహం గా పరిగణించబడ్డాడు.ఫలితంగా, జూలై నుండి సెప్టెంబరు మధ్య కాలంలో ప్రతి సంవత్సరం మీ కోసం చాలా పవిత్రమైనది.  ఈ సమయంలో మీరు చేతిలో తీసుకునే ఏ పని అయినా విజయవంతం అవుతుంది.
 TIME_TEXT5 = బుధగ్రహం మీ దైవిక గ్రహం , కనుక జూన్ నుండి జూలై వరకు మరియు సెప్టెంబరు నుండి అక్టోబరు వరకు మీ కోసం చాలా అనుకూలమైన సమయం. మీరు కోరుకునే ఏ పనులను అయినా ప్రారంభించినట్లయితే, ఈ సమయంలో వ్యవధిలో విజయం సాధించటానికి ఎక్కువ అవకాశం ఉంటుంది.
 TIME_TEXT6 = శుక్రగ్రహం మీ కోసం దైవిక గ్రాహం అయినందున, దాని ఫలితంగా, ఏప్రిల్ నుండి మార్చి వరకు, మే నుండి జూన్ వరకు మరియు అక్టోబర్ నుండి నవంబరు వరకు మీ కోసం ఉపయోగకరంగా ఉంటుంది. ఈ వ్యవధిలో మీరు చేపట్టే లేదా ప్రారంభించే ఏ పనీ విజయవంతం కావడానికి ఎక్కువ అవకాశం ఉంటుంది మరియు మీరు జీవితంలో ఆనందం, సంపద మరియు ఇతర విలాసాలను పొందవచ్చు.
 TIME_TEXT7 = కేతువు  మీ కోసం దైవిక గ్రహం అయినందున, జూలై ఆగస్టు నుండి మీ కాలం చాలా ముఖ్యమైనది. మీరు చేపట్టే అన్ని పనులు ఈ వ్యవధిలో విజయవంతమవుతాయి, మరియు మీరు మీ జీవితంలో మంచి సామరస్యాన్ని అనుభవిస్తారు. జీవితంలో ముందుకు సాగడానికి మీరు ఈ సమయాన్ని బాగా ఉపయోగించుకోవచ్చు.
 TIME_TEXT8 = శనిగ్రహం మీ కోసం దైవిక గ్రహం అవుతుంది. అందువల్ల, జనవరి నుంచి మార్చి మధ్య కాలం, అక్టోబరు నుంచి నవంబరు వరకు ప్రతి సంవత్సరం మీ కోసం చాలా ఉపయోగకరంగా ఉంటుంది. ఈ వ్యవధి మీకు విజయం తెస్తుంది, మరియు మీరు ఇప్పుడు ఏ పవిత్ర లేదా ముఖ్యమైన పనులను ప్రారంభించవచ్చు.
 TIME_TEXT9 = కుజగ్రహం మీ  కోసం దైవిక గ్రహం అయినందున , అందువల్ల,   జనవరి నుంచి ఫిబ్రవరి వరకు, ఏప్రిల్ నుండి మార్చ్ వరకు, నవంబర్ నుండి డిసెంబరు వరకు, మీ కోసం శుభప్రదమైనది. ఈ కాలంలో చేపట్టిన ఏదైనా పనులు మీరు విజయవంతం కావడానికి కొత్త ఎత్తులను సాధించటానికి సహాయపడతాయి మరియు ఫలితంగా మీరు జీవితంలో పురోగతి చెందుతారు.
 HEALTH_TEXT1 = మీరు మీ మూల సంఖ్య 1 కింద జన్మించినందున, మీరు అశ్వము లాగా ఆరోగ్య కరంగా ఉంటారు, కానీ సంభావ్యత వల్ల మీకు కలిగిన చిన్న ఆరోగ్య సమస్యలు అలాగే ఉంటాయి. మీరు గుండె సంబంధిత వ్యాధులు, రక్త పంపిణి, రక్తపోటు, రక్త సంబంధ వ్యాధులు, వృద్ధాప్యంలో అధిక రక్తపోటు, మరియు కంటి సంబంధిత సమస్యల నుండి బాధపడతారు. మీరు ఈ విషయంలో జాగ్రత్త వహించాలి మరియు మీ ఆరోగ్యకరమైన జీవనశైలిని ఆస్వాదించండి.
 HEALTH_TEXT2 = మీకు ఎక్కువగా ఆలోచించే అలవాటు ఎక్కువగా ఉంటుంది, లేదా కొన్ని విషయాలలో మీరు ఎక్కువ ఆవేశంగా ఉంటారు ఇది మీ అన్ని సమస్యలకు మూల కారణం లాగా ఉంటుంది. ఇది కడుపు సమస్యలు, జీర్ణవ్యవస్థలోని సమస్య, గ్యాస్ సమస్య, ప్రేగు సమస్యలు, కణితులు మొదలైన వ్యాధులకు దారి తీస్తుంది. అందువల్ల మీరు చింత నుండి దూరంగా ఉండవలసి ఉంటుంది. అదనంగా, మద్యం తాగడం లేదా ఏ మందులు లేదా మత్తుపదార్థాలు తీసుకోవద్దు అని సూచించబడింది. అంతేకాక, మీరు ఉడికించిన ఆహారాన్ని తిని, తగినంత నీరు త్రాగాలి.
 HEALTH_TEXT3 = గురుగ్రహం తన దైవిక కృప తో మిమ్మలి ఆశీర్వదిస్తున్నాడు అందువల్ల మీరు ఎక్కువ కష్టపడవలసి అవసరం ఉండదు. అయినప్పటికీ, మీరు కొన్నిసార్లు మీరైటిస్ (సోరియాసిస్), తుంటి నొప్పి (అడుగు లేదా బాధా), చర్మ వ్యాధులు వంటి సమస్యలను ఎదుర్కొనే మీ ఆరోగ్యం గురించి అప్రమత్తంగా ఉండవచ్చు. అందువల్ల, మీరు జాగ్రత్తగా ఉండాలని మరియు మీ శ్రేయస్సును జాగ్రత్తగా చూసుకోవాలి.
 HEALTH_TEXT4 = రాహువు యొక్క అనుగ్రహం తో మీరు, మీ తెలివితేటలను బాగా వాడతారు, కానీ మీరు ఎప్పుడు ఎక్కువ బుర్రను ఉపయోగించడం లేదా ఏదైనా విషయాన్ని ఎక్కువగా ఆలోచించడం ఎప్పుడు కూడా మీకు అంత మంచిది కాదు. మీరు గాయం, మానసిక అశాంతి, రక్త సంబంధిత సమస్యలు, తల మరియు వెన్నునొప్పి, మూత్ర సమస్యలు మరియు అటువంటి సమస్యల నుండి బాధపడతారు. అందువలన, ఆరోగ్యవంతమైన జీవనశైలిని కాపాడుకోండి, ధ్యానం మరియు యోగా సహాయంతో ఉత్తమ జీవితాన్ని గడపటానికి ప్రయత్నించండి.
 HEALTH_TEXT5 = బుధగ్రహము యొక్క ప్రభావము మీ జీవితముపై ఉండుటవలన, మీరు తెలివితేటలు కలవారు మరియు మీ వయస్సుకంటె ఎక్కువ యవ్వనంగా కనిపిస్తారు. కానీ, ఇంకోవైపు మీరు నరాల సంబంధిత సమస్యలతో, నోటి పుండ్లు, కళ్ళు మరియు చేతి సంబంధిత సమస్యలు ,ఇస్నోమియా , పక్షవాతము లేదా పోలియో వంటివాటితో భాదపడతారు. కావున మీరు మీ జీవితమును క్రమశిక్షణతో కూడుకుని మరియు ఆరోగ్యవంతమైన జీవితము గడపాలి . 
 HEALTH_TEXT6 = బుధగ్రహం యొక్క ప్రభావాలు జీవితంలో ఉన్నందున, మీరు పదునైన తెలివిని కలిగి ఉంటారు మరియు మీరు మీ వయస్సు కన్నా యవ్వనంగా కనిపిస్తారు. మరోవైపు, మీ జీవితకాలంలో మీరు నరికిత్స్ (నరాల శోథ), నోటి పూతల, కళ్ళు మరియు చేతులు, నిద్రలేమి, పక్షవాతం (పక్షవాతం) లేదా పోలియో మొదలైన వాటికి సంబంధించిన సమస్యలను ఎదుర్కోవలసి రావచ్చు. అందువలన, మీరు ఒక క్రమశిక్షణా జీవితాన్ని తీర్చాలి మరియు మీ అభీష్టానుసారం అజాగ్రత్తగా ఉండకూడదు.
 HEALTH_TEXT7 = సంఖ్య 7 కింద జన్మించడం వలన మీరు కొన్ని లేదా ఇతర అనారోగ్యానికి గురవుతూ ఉంటారు, ఇతరులతో పోలిస్తే మీ రోగనిరోధక వ్యవస్థ బలహీనంగా ఉంటుంది. ఫలితంగా, మీరు తరచూ అనారోగ్యం పొందవచ్చు, మరియు మీరు అకస్మాత్తుగా మందమైన, తలనొప్పి, హృదయ వ్యాధులు, మానసిక శక్తి, నాలుక మరియు ఊపిరితిత్తుల వ్యాధులు సంభవిస్తాయి మరియు అప్పుడప్పుడు అనారోగ్యంతో బాధపడతారు.
 HEALTH_TEXT8 = మీరు సాధారణంగా ఒక క్రమశిక్షణ కలిగిన వ్యక్తి మరియు జీవితంలోని అన్ని రంగాల్లో మీరే తగిన ప్రాముఖ్యతను ఇస్తారు. ఫలితంగా, మీరు మంచి ఆరోగ్యాన్ని ఆస్వాదించగలుగుతారు, అయినప్పటికీ తీవ్రమైన అనారోగ్య భయాందోళన ఎల్లప్పుడూ మీ నియమిత మరియు క్రమశిక్షణ నుండి వైదొలగడం జరుగుతుంది. ఇవి మీ మూత్రపిండాలు, ప్రేగులు, తలనొప్పి, మరియు రక్త సంబంధిత అనారోగ్యాలతో సంబంధం ఉన్న వ్యాధులు.
 HEALTH_TEXT9 = మీరు పూర్తి సంఖ్య 9 కింద జన్మిచారు , మరియు మీరు సహజంగా శక్తివంతమైన వారిగా ఉంటారు. ఫలితంగా మీరు సాధారణంగా ఆరోగ్యంగా ఉంటారు, కానీ మరోవైపు మీ కోరికను త్వరగా లేదా తరచుగా మీ ఆరోగ్యాన్ని ప్రభావితం చేసే త్వరితగతిన మీ పనులను పూర్తి చేయాలి. మీరు రక్తం-సంబంధ సమస్యలు, గాయాలు, మశూచి, కోడిపెక్స్, లేదా కొన్ని రకాల శస్త్రచికిత్సలు కూడా మీ కోసం కచ్చితంగా కత్తి కింద ఉండవలసి ఉంటుంది.
 CAREER_TEXT1 = మీరు తీవ్రంగా కృషి చేస్తే, మీరు చాలా భక్తితో, మీ కెరీర్లో బాగా అభివృద్ధి చెందుతారు మరియు ప్రమోషన్లు పొందుతారు. విద్యుత్తు, అగ్ని, విజ్ఞానశాస్త్రం మరియు సాంకేతికత, పరిశోధన, ఆభరణాలు మరియు రత్నాలు, శస్త్రచికిత్సకు సంబంధించిన కొన్ని రంగాలు, దేశం కోసం ఒక రాయబారిగా, ఒక రాజకీయ నాయకుడు, సైన్యంలో ఒక అధికారి మారడానికి మరియు నగల మరియు ఆభరణాలలో పని చేయడం ఉత్తమం. వీటితో పాటు, మీరు ఇదే ప్రాంతాల్లో కూడా ముందుకు సాగుతారు. కాబట్టి మీ వృత్తి జాగ్రత్తగా ఎంచుకోండి.
 CAREER_TEXT2 = మూల సంఖ్య 2 లో జన్మించిన వ్యక్తులు చంద్రగ్రహం యొక్క దీవెనలు మరియు దైవిక కృపను కలిగి ఉంటారు, మరియు వారు నీటి మరియు ద్రవ విషయాల ప్రాముఖ్యతను కలిగి ఉంటారు, అందుచేత అదే విధంగా సంబంధం కలిగి ఉన్న ఒక క్షేత్రం నుండి మీ వృత్తిని ఎంచుకుంటారు, అప్పుడు అది చాలా ఉపయోగకరంగా ఉంటుంది మీరు. హోటల్, వ్యాపారం, జర్నలిజం, పాడటం, నృత్యం, కవిత్వ రచన, ప్లాట్ వర్క్, మంచుకు సంబంధించిన పని, మరియు వెండి లేదా బియ్యంతో సంబంధం ఉన్న వ్యాపారాలు మీకు అనుకూలంగా ఉంటుంది, ముఖ్యంగా ద్రవ మరియు రసభరిత పదార్థాలు, ప్రయాణ సంబంధిత పని, మీరు చేస్తారు.
 CAREER_TEXT3 = మూల సంఖ్య 3 కింద జన్మించడం వలన మీకు దైవిక కృప మరియు గురుగ్రహం యొక్క ప్రత్యేక ఆశీర్వాదాలు లభిస్తాయి, అందువల్ల అతనికి సంబంధించిన ఏ పనులను మీరు విజయవంతం చేస్తారు. తద్వారా, తాత్విక అర్హతలు, బ్యాంకింగ్ లేదా ఏ ఆర్థిక సంస్థ లేదా ప్రకటన విభాగానికి సంబంధించి బోధన, సేవా పని, న్యాయం సంబంధిత పని, న్యాయమూర్తి, పిటిషనర్, కార్యదర్శి, పోలీసు, పని, జీవితంలో.
 CAREER_TEXT4 = మీ మూల సంఖ్య 4 కాబట్టి, మీ వ్యక్తిత్వం రాహు యొక్క అనేక లక్షణాలను కలిగి ఉంటుంది, అందువల్ల మీరు చాలా కష్టతరమైన పనులు కూడా చాలా సులభంగా పరిష్కరించవచ్చు. రైల్వే, షిప్పింగ్, మైనింగ్, ఇతర సాంకేతిక పని, స్టెనోగ్రాఫర్, దర్జీ, ఇంజనీర్, జ్యోతిష్కుడు, ఇంద్రజాలికుడు, మరియు లెక్చరర్ మొదలైన వాటికి సంబంధించిన రంగాలలో పని చేయడం లేదా వ్యాపారం చేయడం మొదలైనవి మీరు జీవితంలో మంచి విజయాన్ని తెస్తుంది. అందువల్ల, ఈ రంగాల నుండి లేదా సంబంధిత డొమైన్ల నుండి మీ కెరీర్ను ఎంచుకోవడం మీ అన్ని పోరాటాలకు ముగింపును తీసుకురావటానికి సలహా ఇస్తుంది.
 CAREER_TEXT5 = మీ మూల సంఖ్య యొక్క దైవిక గ్రహం బుధగ్రహం. ఈ కారణంగా, ఈ సంఖ్య కింద పుట్టిన మీరు గ్రహం నుండి ప్రత్యేక ప్రభావం పొందుతారు, మీరు తెలివి అన్ని మీ పనులు సాధనకు అనుమతిస్తుంది. అందువల్ల, మీ భౌతిక బలానికి బదులుగా మీ మానసిక బలానికి అవసరమైన వృత్తిని ఎంచుకోవాలి. ఇంజనీరింగ్, అమ్మకపు పని, అకౌంటెన్సీ, రైలుమార్గాలు, టెలిగ్రాఫ్, జర్నలిజం, పొగాకు, రేడియో వ్యవహారాలు, మధ్యవర్తిత్వం, కమిషన్ మరియు క్షేత్రాల విభాగాలు మీకు మరింత లాభదాయకంగా ఉంటాయి.
 CAREER_TEXT6 = ఈ సంఖ్య మీకు శుక్ర గ్రహం యొక్క ప్రత్యేక అనుగ్రహాన్ని తెస్తుంది, ఇది అందం మరియు గ్లామర్ ప్రాంతాల్లో మీకు ఉత్తమమైనదని పేర్కొంటుంది. ఈ తో కనెక్ట్ ఖాళీలను పని మీరు విజయం గొప్ప ఎత్తులు తెస్తుంది. వీటికి అదనంగా, నగల, ఇంజనీరింగ్, ఆర్కిటెక్చర్, ఫుడ్ ఇన్స్పెక్టర్, హోటల్, ప్రొడక్షన్, నవల రచయిత, మ్యూజియం, కళాకారుడు మరియు మొదలైనవి ఉన్న డొమైన్లలో మీ చేతి ప్రయత్నించండి.
 CAREER_TEXT7 = మీరు ఈ సంఖ్య కింద జన్మించినందున, మీరు జీవితంలో చాలా కష్టాలను ఎదుర్కోవలసి ఉంటుంది, ఇది మీరు జీవితంలోని వివిధ పాఠాలను నేర్చుకోవడానికి సహాయపడుతుంది. ఫలితంగా, మీకు విజయం, మంచి అదృష్టం మరియు సంపద తెచ్చే అనేక వృత్తి అవకాశాలు ఉన్నాయి. వీటిలో చలన చిత్ర పరిశ్రమ, ప్రయాణం, ఎయిర్ హోస్టెస్, పాడి పరిశ్రమ, డ్రైవర్, చేప విక్రేత, రసాయన శాస్త్రవేత్త, ఆసుపత్రి, సిఐడీ(CID), బాడీ బిల్డర్ మరియు ఇతర రంగాలలో ఉన్నాయి.
 CAREER_TEXT8 = మీరు శనిగ్రహం యొక్క దైవిక అనుగ్రహం ఉన్న సంఖ్యలో జన్మించినప్పుడు, పురోగతి మరియు ప్రమోషన్ సమయం ఆలస్యం అవవచ్చు, కానీ అవి ఖచ్చితంగా మీకు వస్తాయి. కొన్ని రంగాలలో మీరు గొప్ప ఎత్తులను పొందగలరు మరియు ఈ ప్రత్యేకమైన విషయాల నుండి మీ వృత్తిని ఎంచుకోవడం కూడా మీకు మరింత విజయవంతమైన జీవితాన్ని సాధించటానికి మీకు సహాయపడుతుంది, మరియు డబ్బు సంపాదించడానికి మరియు సంపదకు మంచి అవకాశాలు కూడా తెస్తాయి. ఇవి ప్రధానంగా క్రీడాకారులు, ఇంజనీర్, పోలీసు, మేయర్, బరువు కొలత, కాంట్రాక్టర్, జైలు, శ్రమ పని, మరియు సంగీతం మొదలైన వాటిలో మీకు మంచి అనుగ్రహం లభిస్తుంది.
 CAREER_TEXT9 = మీ సంఖ్య ఎరుపు రంగు గ్రహం, మార్స్ ద్వారా ప్రభావితమవుతుంది, కాబట్టి మీరు మీ జీవితంలో చాలా ప్రేమను పొందుతారు, ఎందుకంటే మీరు నాయకత్వ లక్షణాలతో నిండిపోతారు మరియు మీరు మీ జీవితంలోని వివిధ రంగాలలో ముందుకు సాగుతారు.
 FAST_TEXT1 = మీరు ఆదివారాలు ఉపవాసం ఉండాలి, శుక్ల పక్షం మొదలు అయ్యే సమయంలో మీరు ఉపవాసం మొదలు పెట్టండి. ఉపవాసం ఉన్న రోజులలో కేవలం మీరు ఒక్క సారి మాత్రమే తినండి మరియు ఆదిత్య హృదయ స్తోత్రాన్ని జపించండి. మీరు సూర్య బీజ మంత్రాన్ని కూడా జపించవచ్చు. సాధ్యమైతే, ఈరోజు ఉప్పు నుండి సంయమనాన్ని ప్రయత్నించడం, ఎరుపు రంగు దుస్తులను ధరించండి మరియు ఒక రాగి పాత్రలో నీటిని ఉంచిన తర్వాత, దానిని సూర్యుడికి అందించండి.
 FAST_TEXT2 = మీరు సోమవారం నాడు ఉపవాసం ఉండాలి, కనీసం 7 లేదా 16, కుదిరితే 54 రోజులు కూడా మీరు ఉపవాసం ఉండవచ్చు. ఒక సోమవారం పూర్ణిమ (పౌర్ణమి) లో లేదా చిత్ర నృశ్వరా సమయంలో ఉంటే, ఈ సమయం ప్రత్యేకంగా పవిత్రమైనదిగా పరిగణించబడుతుంది మరియు ఈ రోజు నుంచి మీ ఉపవాసాలు మొదలు పెట్టండి. తెల్లని రంగు దుస్తులను ధరించండి మరియు శివునికి పాలు సమర్పించండి. మీరు రోజులో ఒకసారి మాత్రమే తినండి మరియు చంద్రుని యొక్క బీజ మంత్రం జపించండి.
 FAST_TEXT3 = మీరు 16 గురువారాలు ఉపవాసం ఉండాలి, ఒక నెలలో శుక్ల పక్షాన పడటం నుండి ప్రారంభమవుతుంది. మీరు నిరంతరంగా ఈ ఒకటి నుండి మూడు సంవత్సరాలు కొనసాగించవచ్చు. ఈ రోజున, పసుపు రంగు దుస్తులను ధరించండి మరియు మీ నుదిటి మీద పసుపు లేదా గంధపు తిలకం వర్తించండి. ఒక అరటి చెట్టుకు నీటిని అందించండి మరియు ఒక పిప్పల్ చెట్టుకు అదే చేయండి, కానీ చెట్టుని తాకకుండా. మీ సామర్ధ్యం ప్రకారం బ్రాహ్మణులకు ఆహారం ఇవ్వండి మరియు బృహస్పతి బీజ్ మంత్రాన్ని పఠించండి.
 FAST_TEXT4 = మీరు శుక్ల పక్షాన పడటం మొదలుకొని 19 లేదా 51 శనివారాల కోసం ఉపవాసం చేయాలి. ఈ రోజు నలుపు లేదా నీలం దుస్తులను ధరించడం మీకు ఉపయోగకరంగా ఉంటుంది. ఈ రోజు మినప పప్పులు (సబ్ట్ కాలీ ఉర్డ్), నలుపు నువ్వులు, మరియు ఆవాల నూనె దానం చేయండి. మీరు రాహు బీజ్ మంత్రాన్ని కూడా పాడవచ్చు.
 FAST_TEXT5 = శుక్ల పక్షాల్లో బుధవారం మొదలైంది, మీరు 17 లేదా 45 బుధవారాలకు క్రమంగా ఉపసంహరించాలి. ఉపవాసం ఉండగా, మీరు రోజుకు ఒకసారి మాత్రమే తినడం మంచిది, మరియు బుధ బీజ మంత్రాన్ని జపిస్తూనే ఉండండి. ఆకుపచ్చ రంగు దుస్తులను మరియు పచ్చ రత్నం ధరించాలి. ఈ రోజున పెసర పప్పు / మొత్తం మోంగ (సబ్ట్ట్ మోంగ్ పప్పు) ను తీసుకోండి మరియు నపుంసకుల నుండి దీవెనలు తీసుకోండి. మీరు మీ సోదరి, తల్లి, అత్త (మౌసీ), మేన అత్త (బువ్), మేన మామ (భాచీ) భార్య వంటి వాటికి కొన్ని ఆకుపచ్చ రంగు విషయాలు బహుమతిగా ప్రయత్నించాలి.
 FAST_TEXT6 = శుక్రవారాలలో మీరు ఉపవాసం చేయాలి, ఆ నెల యొక్క శుక్ల పక్షాన పడటం మొదలుకొని, 21 లేదా 31 శుక్రవారాలు కొనసాగుతుంది. ఈ రోజు, తెల్ల రంగు దుస్తులను ధరిస్తారు, చిన్నారుల పాదాలను తాకండి మరియు వారి దీవెనలు తీసుకొని వారికి తెలుపు రంగు తీపి పదార్థాలు అందించండి. మీరు శుక్ర బీజ మంత్రాన్ని కూడా మీరు జపించవచ్చు.
 FAST_TEXT7 = మంగళవారం నుండి మొదలుకొని ఉదయం శుక్ల పక్షాన పడుతున్నప్పుడు, మీరు 19 లేదా 21 మంగళవారాల పాటు ఉపవాసం చేయాలి. ఈ రోజున ఒకసారి మాత్రమే తినండి మరియు తీపి ఆహారాన్ని కలిగి ఉండటం మంచిది. ఎరుపు రంగు దుస్తులను ధరించు, కేతు బీజ మంత్రం శాంతింపచేయండి, చిన్న చిన్న పిల్లలకు బాడీ మరియు గ్రాముల / చిక్పీస్ (చనా పప్పు) యొక్క ప్రసాదం అందించండి. అంతేకాక, మీరు హనుమాన్ దేవాలయానికి వెళ్లి అక్కడ ఎర్ర జెండా ఉంచవచ్చు.
