ion of charm, power, secrecy, and seriousness at the same time.#Physically speaking, Sagittarius Ascendant people are very strong, tall or very tall in most cases, with full and open features, often smiling lips, and thick hair. They radiate energy and charm. They become stout as they age because over-indulgence of all sorts is the cause of their weight gain when they reach their thirties. Their musculature is not particularly athletic. Sagittarius' general appearance gives an impression of charisma, liveliness, and energy. Their look is jovial, and their attire is casual but always in line with their generous nature and the context.#Capricorn Ascendant people are quite slender, bony, awkward presence and of small to average height. The features are fine and seem cut with a chisel, with deep-set and serious eyes. They have stiff hair on the eyebrows and chest. Usually have big head and large teeth sometimes protruding outside the lips. The general appearance gives an impression of sternness, solidity, deepness, and maturity. Their look is marked by neutrality, sobriety, and ordinariness. Their concern is practicality and not aesthetics, which they pay no attention to. They often look like a scientist or a philosopher, a scholar or a wise person.#Aquarius Ascendant people are often spotted slim and of tall stoop stature. They may have large face, neck, back, stomach, waist, thighs and feet. They have regular and pleasant traits, dark and thick hair, and their hairstyle is either sober or unusual. The facial expression is nice with a shade of seriousness. The eyes are sparkling with life and seem to be on the lookout for anything odd. The entire appearance gives an impression of vivacity and originality. Their look may be either eccentric or serious. In any case, it is always astonishing.#Pisces Ascendant people are often plump and of average stature because they are a sign of absolute absence of differentiation. It is the only sign of the Zodiac which can take on many different appearances. The eyes are often large, attractive, quite fixed or slow, and almost hypnotic. The whole physique gives an impression which is somehow misty, mysterious, benevolent and quiet. Actually, Pisces' outward appearance is impossible to classify, similarly to their personality which remains completely elusive! <!--moon-sign.asp-->
