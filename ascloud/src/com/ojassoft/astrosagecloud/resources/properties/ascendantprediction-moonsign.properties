

    ZODIAC_SIGN                               = Aries#Taurus#Gemini#Cancer#Leo#Virgo#Libra#Scorpion#Sagittarius#Capricorn#Aquarius#Pisces
    HEALTH_PREDICTION                         = Aries Ascendant people suffer from disease often pertaining to headaches, particularly migraines, sunstroke, neuralgia and depression. They are also prone to medical conditions like Indigestion and nervous disorders and their rashness, and physical devotion makes them liable to accidents and physical injuries, occasionally subjected to hot complaints like piles. Many Aries individuals are born with a birthmark on the head or facial area. People born under Aries sign are prone to circulatory troubles like high blood pressure etc#Although Taurus is basically a strong healthy sign, they do have their weak spots that cause problems throughout life. Often suffer from ailments related to nervous system. Many of them can be overweight, especially those born in may. They may fall prey to sexual disease. They are prone to cervical vertebrae, lower jaw and teeth, chin and palate problems. Problems with the kidneys, genitals and bladder, stiff necks, sore throats and earaches are common among Taurus.#The nature of this sign is nervousness, pessimism, tameness, or even impatience. Tuberculosis, asthma and anaemia are common problems. They are vulnerable to nervous and respiratory disorders, especially the sense of hearing. Respiratory problems and various nervous conditions are common.#Cancer Ascendants are prone to coughs, indigestion, gas, and general problems with stomach, liver and intestines. They are the most vulnerable as a person they often face emotional disorders such as depression, hypochondria and hysteria. The Excessive sensitivity can lead to weak digestion, gastritis and other stomach disease, and there is a tendency to coughs and weakness of vision.#The diseases of Leo mainly involve the heart, most seriously occlusion of cardiac arteries by blood clot or occlusion bringing on a heart attack. Nervous tension can affect the heart with palpitations and the like. The ailments related to Leo are pain in the back and lungs, spinal complaints, diseases of the heart and blood, sickness in ribs and sides, convulsions, pleasantries, violent burning fevers including, and some trouble of the eyes.#Problems with intestines and constipation are common Virgo complaints. Mood swings and despondency from time to time can adversely affect others in the surrounding area. Virgo Ascendant people may have trouble with their sexual organs. Their stomachs require them to be careful about their diet, it is essential that they treat their fascination with exotic food with extreme care.#Most Libra individuals have sensitive skin that brought up by insomnia, rich food and excessive intake of alcohol. Libra rules the excretory functions through the kidneys and skin, lumbar region, buttocks, adrenals and vasomotor system. Libra rules the kidneys, lower back and ovaries. Lower back pain, and problems caused by too much sugar or rich food are common health problems.#Scorpio rules the reproductive organs and excretory system. Scorpio rules the nose and nasal bones, the pubic area, genital organs and hemoglobin. Scorpio governs the pelvis and reproductive and urinary systems and is prone to ailments of the liver and kidneys, stones and gravel in the bladder or genitals .piles and ulcers are the ailments suffered by Scorpio Ascendant people.#The diseases of Sagittarius particularly involve the hips and thighs. The back pain has long been associated with this sign. The tendency to feverish complaints and ailment related to lungs are also noticeable. The excessive consumption of rich food and drink sometimes leads to arthritic pains in the hips.#Capricorn suffers from disease arise by vita(wind). Capricorn Ascendant people do not readily yield to disease, but once sick they hold onto the symptoms and can become hypochondriacs. Capricorn rules the joints, hair, teeth and skin and nervous system in particular. The accidents from this sign are broken bones, sprains, dislocations and hurts from the knees and below.#Aquarius rules the circulation, breath and eyesight; the bones of the lower limbs. Often suffer disease related with the blood and circulation, with a tendency toward impure blood. Aquarians are prone to hypertension and heart problems. Aquarius rules ankles, circulatory system, cramps, allergies, unexpected illness and freak accidents. They may also suffer from various nervous disorders.#Pisces deals with the endocrine system and diabetes can cause severe foot problems as well as other difficulties. Swelling, allergic reaction to drugs, injuries to the feet and related problems are common complaints, but the Piscean emotional nature can also make them vulnerable to emotional illness.
    TEMPERAMENT_AND_PERSONALITY_PREDICTION    = Aries Ascendant people possess great force and energy, and they are always ready to take the initiative. Their most significant feature of their personality is their straight forwardness. They are natural leaders; they don't like taking orders from others as they are their own boss as well. Their fascination is due to their being unforeseeable: this characteristic sometimes leads to a behaviour which is aggressive and weak at the same time and highly temperamental but on the contrary they can be easily persuaded or pleased. Aries Ascendant people are direct in speech and often too outspoken and undiplomatic; therefore they mostly fall into heated articulation or arguments very easily. They are stubborn and their sudden outburst of anger astonishes people often but they can bring down easily by persuading them. Their impulsiveness sometimes gets them into some serious troubles. Not very fond of water and they appreciate beauty art and elegance. Most of all their kind like relaxing, but only after having reached a prefixed goal. Person born under this sign are sensible, endearing yet emotional at times.#People born under this sign resembles to the bull in their behaviour towards new people. They are not very fond of meeting new people as their silent, quiet and introvert nature resist them being a friendly creature. If they are not handled and listened carefully they could possess resentful, cautious and conservative attitude towards others. They often face difficulty in making new friends as they are hesitant to meet new people. They are reliable and practical hence often do well in business. These people are sensual personalities and seek physical pleasure in all areas however on the other hand they are endeavour and complete the given task at times but according to their own pace. They also appreciate efforts put by others and values their talents openly. At times they can be act bossy. Taurus is not attracted easily, and even when they are, they move towards the person they desire with extreme caution. Taurus persons are very firm about their value and principles its very hard to change their approach. Yet they are affectionate, appreciate truth and have a magnetic personality which often attracts others. They are not impulsive but if they are pushed hard they can be furious like bulls. At times they can be prejudice stubborn and unreasonable. They are extremely cautious when it comes to choose their mates. They don't like telling lies though they can be easily manipulated.#Typical Geminins are very lively and charming, and excellent conversationalists soft spoken tongue. They possessed very active minds and bodies, and are often much younger-looking than they really are. Invention is their stock in trade. On the down side,Forever changing their mind at the drop of a hat they don't stick to one thing they are also restless, easily bored, and unable to concentrate on any one thing for a prolonged period of time.. There is also present a tendency to manipulate others to serve their own purposes. But a Gemini will be more than make up for any negative qualities though the sheer scintillating entertainment value of their very presence. Since they are restless and keep changing their minds, they are notoriously undependable. The intellect dominates Gemini and all things that are intellectual are valued greatly by them. As communication is also important to them, knowledge is never a thing to be hoarded. Geminis are the most versatile of all the sun signs. They will decide on an option and completely change their mind next day. Nothing is ever written in stone by Gemini. They are free soul, driven by curiosity and desire to know. Geminis rarely get deeply absorbed in any one task and anything they haven't touched intrigues them the most. They lack in self-control.#Cancer has the characteristics of dreaminess, intuition, emotion and need for a safe retreat. They are inherently blessed with excellent conversation and literal skills. They are quick-witted, ingenious, vivacious and inconsistence. They also have a certain degree of spirituality some of them are blessed with psychic tendencies. They have excellent memory retention skills. They are kind, sensitive and compassionate. They are very domestic and love fortifying their home environment to their own satisfaction. In personal relationship, cancer is a mixture of toughness and tenderness, Emotional, romantic and sentimental on one side, while stubbornly possessive and loyal on the other side. They possess a retentive memory and rarely forgive slights and hurts. A Cancerian are not familiar with the phrase “let the bygone be bygone”: they never ever forget one's error. As being driven by emotional nature, they can be the best and the worst of friends. They are bright and extremely careful and equally productive in what they do.#People fall under this zodiac sign are the owner of dynamic and attractive personality. A typical Leo is ambitious, courageous, strong willed, positive, independent and self-confident. They are straightforward and uncomplicated individual who know very well what they want and pursue it with complete enthusiasm and a creative spirit. Usually they are temperamental, sometimes blunt and nasty when affronted are deeply hurt by malice or aggression. Too sensitive to personal criticism and when their governance is threatened, they can go into a sudden anger. They are stubborn and will hold onto a belief or stick to a course of action through thick or thin. Possess idealistic and humane nature. Basically Leos are outgoing, happy, kind and generous, self-expressive, intelligent and broad minded. They have a fixed determination but will get unjustifiably into a bad temper at the slightest provocation but the anger can be quickly pacified. They may hold a grudge for long and are an independent thinker. They stick to orthodox principles in religion but are preferably tolerant towards other's precepts and practices.#Virgo Ascendant people are relatively reserved and are polite and soft spoken. They find their friends among those who can help them move up the social stratum. When confronted with obstacles, they stay calm and rational and work on finding a solution. This calmness is sometimes seen as being cold and calculating. They have the ability to analyze and solve the most complex problems. They have wonderful eye for details and thus often neglect the overall issues. They are very intellectual and are tend to make few, if any, concessions to the often dirty and distracting nature of reality. Virgo Ascendant people are very friendly and knowledgeable almost about everything and are usually observant, sharp, critical and patient. They are very selective in friendship and prefer keeping relationships on apparent basis. Virgo Ascendant people are prone to worry and hypochondria. They make their selves useful to others that it often leaves them vulnerable to misuse and mistreatment. Virgo Ascendant people are nit-picker, stickler and critical of self and others.#Libra Ascendant people prefer to cooperate, compromise and will give up, even when they feel right rather than putting up with the torment of an argument. Disagreement with others makes them insecure, and uncomfortable. They crave for harmony in their life and could do whatever it takes to have it. They can be unreliable and hesitant, impatient of routine, boringly conservative and shy. Libra Ascendant people are slow to anger and also may shock everyone around with their sudden outbursts of rage. They are more of an idealist than a realist; often ponder upon schemes like building castles in the air.  A typical Libra is artistic and refined, has very firm opinions regarding right and wrong, and they are a born diploma, but charming and sincere. They are unreasonable and generally peace loving nature; easygoing and gregarious. Libra Ascendant people are also considered to be the most refined. You are good looking and have certain sophistication, appeal and fine taste. They very much like to socialize it gives them immense pleasure in order to escalate their social stratum. They are well known to be objective and impartial in making conclusion.#Scorpio Ascendant people are well known for their characteristics of self-criticism, intense concentration and a passionate steer, which grades in complete success or utter failure. They also have a strong self-destructive streak along with unreasoning temper that can be triggered at a slightest provocation. They are often very suspicious and jealous for their loved ones. Their emotional vitality makes them astonishing in any career they pursue, whether for better or for worse depending upon the circumstances. Typical Scorpio Ascendant people are intense and have powerful natures. They are stubborn, proud and calm. They never settle and for them life is meant to be lived to the fullest or not at all. Rarely found in the axis of the activity but always know just what is going on out of concern. Their compassion makes them the best and the most loyal friend but the same quality sometimes makes them the most treacherous of enemies. They excel at everything and anything, when they put together their entire energy, self-confidence, ambition and generosity. They are demanding of others but will never ask someone to do what you won't be able to do yourself.#A typical Sagittarius has a bright, sunny disposition and an almost incurable optimist approach towards the future. Generally they possess good nature, out of control sense of fun and an inspiring spiritual side. In adverse situations, they are impatient, have the fear of responsibility, self-indulgent, fanaticism and refuse to grow up. They are prone to misunderstood by others unintentionally because their tendency of haste in conversation. Also have the affinity towards gambling. Those born under this sign are characterized by optimism, aspiration, inspiration, enthusiasm and expansiveness. A Sagittarius has a positive outlook on life, are full of enterprise, energy, versatility, adventurousness and eagerness to extend the experience as much as possible. They don't talk unnecessarily their eloquence of speech often allure others. They enjoy travelling around and explore their surroundings. They are honourable, honest, trustworthy, truthful, generous and sincere with a passion of justice. They are usually modest and have inclination towards spiritualism with a strong sense of honesty. Sagittarians are strong-willed and good at organizing, a combination that gives you the ability to bring any project to a successful conclusion.#Capricorn Ascendant people often make big show of being religious but in reality they are not as religious as they pretend to be. They are self centred, cunning, secretive and determined. They do more talking than listening; hence often lose control on what they are saying results in hurting others. A typical Capricorn has good organizational skills, is neat and tidy, have hard headed practicality. They have strong work ethic, materialistic tendencies, a conservative streak, conventionality and great respect for authority. Capricorn Ascendant people are ambitious, serious and dedicated to duty but sometimes vindictive; are self-disciplined, responsible and practical but at times, they can lurch in self-pity. Reasoning ability is excellent and has strong sense of purpose and direction. A Capricorn may appear sober and reserved in their dealings with others, but once they give the trust, they are a loyal and committed friend. Socially oriented, willing endeavour for work for anything they desire, and their self-esteem is extremely important. They have materialistic approach rather than philosophical. They are capable of falling in love for their own pleasure.#A typical Aquarius has the attribute of intense desire to communicate. You are a bit tactless and rude if you don't learn to moderate your constant broadcasting around those whose opinions may be a bit more on the conservative side. They are interesting and attractive; can be shy, sensitive, gentle and patient or enthusiastic and lively with a tendency to be exhibitionists. They are very supporting with strong convictions and fight for what they believe; are visionary and pioneering. They are generally without prejudice and quite tolerant of others point of view. They are good listeners, and care deeply for their friends. They are kind and known to be frank and outspoken. They are refined and idealistic, romantic and practical, personable and amiable person. They can be counted on to come up with original ideas.  They will go out of their way to help when needed but will never get emotionally involved.#Pisces Ascendant people are not practical people but are sensitive and instinctual. They are versatile and tend to understand things by understanding rather than logic. Rigid in observance of prevailing attitude and can forgo anything but their orthodoxy. Piscean are confident, loyal, home-loving, kind and generous. They can be easily misled. Their dreamy and impractical natures are a source of distress to your near and dear ones. Being a mixture of an optimist and a pessimist, they find difficult to make up their minds on any issue. A typical Pisces is shy and is an abiding love and trust for all those who come into contact with them. They are eternally romantic in the classic sense and have well-deserved reputation for hesitant over their own feet. Piscean are extremely superstitious and religious They possess a gentle, patient nature but the one which needs moulding. They adapt surroundings whether good or bad; are generous, friendly and good natured with a true sense of kindness and compassion and yet sensitive to everything around along with the feelings of others. <!--moon-sign.asp-->
