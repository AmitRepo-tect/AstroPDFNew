
SAVE_CHART_AS_IMAGE_FILE_JPEG = ఛార్ట్ ను ఇమేజ్ ఫైల్ (jepg) లాగా సేవ్ చేయండి
PRINT_EMBED_OR_SHARE_CHART_ON_FACEBOOK_TWITTER = ప్రింట్, ఎంబెడ్ లేదా ఫేస్ బుక్/ట్విట్టర్ లో ఛార్ట్ ను షేర్ చేయండి
SAVE_CHART_INTRO_PARA = కొన్నిసార్లు ఆన్ లైన్ షేరింగ్ లేదా ప్రింటింగ్ కొరకు ఛార్ట్ మనకు అవసరమవుతుంది. ఈ పేజి అదే ఉద్దేశ్యంకొరకు ఉపయోగపడుతుంది. క్రింది ఛార్ట్స్ పై కేవలం రైట్ క్లిక్ చేయండి మరియు “సేవ్ పిక్చర్ యాజ్..”  లేదా “సేవ్ ఇమేజ్ యాజ్” అని ఎంచుకుని మరియు మీ స్థానిక పరికరంపై ఛార్ట్ ఫైల్ ను సేవ్ చేయండి. అది ఫైల్ ను ఇంటర్నెట్ లో ప్రఖ్యాతి చెందిన ఇమేజ్ ఫార్మాట్స్ లో ఒకటయిన JEPG ఫార్మాట్ లో సేవ్ చేస్తుంది. ఈ సేవ్ చేయబడిన ఛార్ట్ ను ఫేస్ బుక్ మరియు ట్విట్టర్ వంటి సామాజిక నెట్వర్కింగ్ వెబ్ సైట్లలో షేర్ చేసుకోవచ్చు, లేదా మీ వెబ్ సైట్ లేదా బ్లాగులో ప్రచురించవచ్చు.
