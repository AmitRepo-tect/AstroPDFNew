

	 WHAT_IS_NAKSHATRA							= ನಕ್ಷತ್ರವೆಂದರೇನು?
	 NAKSHATRA_INTRO							= ನಕ್ಷತ್ರ ಹಿಂದೂ ಜ್ಯೋತಿಷ್ಯದಲ್ಲಿ ಚಾಂದ್ರಮಾನ ಮಹಲಿನ ಪದವಾಗಿದೆ. ಒಂದು ನಕ್ಷತ್ರ ಖಗೋಳದಲ್ಲಿರುವ 27 (ಕೆಲವೊಮ್ಮೆ 28) ಕ್ಷೇತ್ರಗಳಲ್ಲಿ ಒಂದಾಗಿದೆ. ಅವುಗಳ ಹೆಸರುಗಳು ಆಯಾ ಕ್ಷೇತ್ರಗಳಲ್ಲಿನ ಪ್ರಮುಖ ನಕ್ಷತ್ರಗಳಿಗೆ ಸಂಬಂಧಿಸಿವೆ. ಇಲ್ಲಿ ನಕ್ಷತ್ರಗಳಿಗೆ ಖಗೋಳದಲ್ಲಿ ನಕ್ಷತ್ರ ಸ್ಪಿಕ ಎಂದು ಕರೆಯಲ್ಪಡುವ ಸಂಸ್ಕೃತದಲ್ಲಿ ಚಿತ್ರಾ ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ (ಇತರ ಕೊಂಚ ವಿಭಿನ್ನ ವ್ಯಾಖ್ಯಾನಗಳು ಅಸ್ತಿತ್ವದಲ್ಲಿವೆ) ಎಂಬ ನಕ್ಷತ್ರದ ಎದುರುಗಡೆಯಿರುವ ಬಿಂದುವಾಗಿದೆ. ಇದನ್ನು ಮೇಷಾದಿ ಅಥವಾ ಮೇಷದ ಆರಂಭ ಎಂದು ಕರೆಯಲಾಗುತ್ತದೆ. ಖಗೋಳವನ್ನು ಪೂರ್ವಾಭಿಮುಖವಾಗಿ ಪ್ರತಿಯೊಂದು ನಕ್ಷತ್ರಗಳಾಗಿ ವಿಂಗಡಿಸಲಾಗಿದೆ. ನಕ್ಷತ್ರಗಳ ಸಂಖ್ಯೆ ಒಂದು ನಾಕ್ಷತ್ರಿಕ ತಿಂಗಳಲ್ಲಿನ ದಿನಗಳ ಸಂಖ್ಯೆಯನ್ನು (ಆಧುನಿಕ ಮೌಲ್ಯ: 27.32 ದಿನಗಳು) ಪ್ರತಿಬಿಂಬಿಸುತ್ತದೆ, ಅಂದರೆ ಒಂದು ನಕ್ಷತ್ರದ ಅಗಲವನ್ನು ಒಂದು ದಿನದಲ್ಲಿ ಚಂದ್ರನು ಹಾಯುವುದು ಎಂದು. ಪ್ರತಿ ನಕ್ಷತ್ರವನ್ನೂ ಮತ್ತೆ ಚತುರ್ಥಾಂಶದಲ್ಲಿ (ಅಥವಾ ಪಾದಗಳಲ್ಲಿ)  ಮತ್ತೆ ವಿಭಜಿಸಲಾಗುತ್ತದೆ. ಇದು ಜನಪ್ರಿಯ ಹಿಂದೂ ಜ್ಯೋತಿಷ್ಯದಲ್ಲಿ ಪಾತ್ರ ವಹಿಸುತ್ತಿದ್ದು ಇಲ್ಲಿ ಪ್ರತಿ ಪಾದವನ್ನು ಒಂದು ಪದಕ್ಕೆ ಸಂಬಂಧ ಕಲ್ಪಿಸಲಾಗುತ್ತಿದ್ದು ಚಂದ್ರನು ಆಯಾ ಪಾದದಲ್ಲಿದ್ದಾಗ ಮಗುವಿಗೆ ನೀಡಿದ ಹೆಸರಿನ ಮೊದಲ ಉಚ್ಚಾರಾಂಶವಾಗಿ ಇದನ್ನು ಸಾಂಪ್ರದಾಯಿಕವಾಗಿ ಆರಿಸಲಾಗುತ್ತದೆ. 
