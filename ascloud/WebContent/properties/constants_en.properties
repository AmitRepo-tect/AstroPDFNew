//LalKitab-Remedies-Rules.asp
LALKITAB_REMEDIES_RULES                =  Rules related to Lal Kitab Remedies
LALKITAB_REMEDIES_RULES1               =  All remedies are to be performed during the day light hours when the Sun is up, unless specifically asked to do at other times. Some suggest that remedies should not be performed on a cloudy day. Cloudy day belongs to the Saturn as does the night. But in the West where winters are dark and bleak for most of the time, there should be no such restriction.
LALKITAB_REMEDIES_RULES2               =  Remedies done over a longer period , say 6 day , 10 days ,43 days etc, should be done  regularly without a break If for any reasons there is an apprehension that there might be a break in the remedy, the best thing to do under these circumstances is to keep at home little rice washed in milk. Suppose it is a 43 day remedy, you had to go out on a journey for four days during which time you could not have done the remedy, you could get back and start the remedy from where you had left.
LALKITAB_REMEDIES_RULES3               =  Do one remedy at a time. Take up the next remedy only when the first remedy is completed. Follow the sequence of remedy if mentioned. The best way to sequence the remedy, if not already mentioned, is to take up one day remedy first and do the lengthy remedy later.
LALKITAB_REMEDIES_RULES4               =  Give a few days break before starting the next remedy. If possible, start it a week later. And finally, if a blood relation is doing the remedy on behalf of the native, he must make a mental `sankalp' that I am doing this remedy for and on behalf of so-and-so, otherwise it would be his remedy and that may not be desirable.

